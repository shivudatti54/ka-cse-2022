<svg width="420" height="400" data-topic-id="joint-probability-distribution-for-two-discrete-random-variables"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background-color: linear-gradient(to bottom, #C7B8EA, #6495ED);">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="20" style="fill: #6495ED; opacity: 0.7;"></rect>
  <text x="15" y="35" style="font-size: 22px; font-family: Arial, sans-serif; fill: #fff;">
    Joint Probability Distribution for Two Discrete Random Variables
  </text>

  <!-- Introduction Section -->
  <rect x="10" y="60" width="400" height="20" style="fill: #C7B8EA; opacity: 0.7;"></rect>
  <text x="15" y="75" style="font-size: 18px; font-family: Arial, sans-serif; fill: #fff;">
    Introduction
  </text>
  <text x="15" y="90" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    A joint probability distribution is a mathematical description of the probability of two or more discrete random variables taking on certain values.
  </text>

  <!-- Definitions Section -->
  <rect x="10" y="115" width="400" height="20" style="fill: #6495ED; opacity: 0.7;"></rect>
  <text x="15" y="130" style="font-size: 18px; font-family: Arial, sans-serif; fill: #fff;">
    Definitions
  </text>
  <text x="15" y="145" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    Joint Probability Distribution: A joint probability distribution is a mathematical representation of the probability of two or more discrete random variables taking on certain values.
  </text>
  <text x="15" y="160" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    Discrete Random Variables: Discrete random variables are variables that can take on only a finite number of distinct values.
  </text>

  <!-- Notations Section -->
  <rect x="10" y="185" width="400" height="20" style="fill: #C7B8EA; opacity: 0.7;"></rect>
  <text x="15" y="200" style="font-size: 18px; font-family: Arial, sans-serif; fill: #fff;">
    Notations
  </text>
  <text x="15" y="215" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    Let X and Y be two discrete random variables.
  </text>
  <text x="15" y="230" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    Joint Probability Distribution of X and Y is denoted as P(X, Y).
  </text>

  <!-- Joint Probability Distribution Formula Section -->
  <rect x="10" y="255" width="400" height="20" style="fill: #6495ED; opacity: 0.7;"></rect>
  <text x="15" y="270" style="font-size: 18px; font-family: Arial, sans-serif; fill: #fff;">
    Joint Probability Distribution Formula
  </text>
  <text x="15" y="285" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    P(X=x, Y=y) = P(X=x, Y=y)
  </text>

  <!-- Properties of Joint Probability Distribution Section -->
  <rect x="10" y="310" width="400" height="20" style="fill: #C7B8EA; opacity: 0.7;"></rect>
  <text x="15" y="325" style="font-size: 18px; font-family: Arial, sans-serif; fill: #fff;">
    Properties of Joint Probability Distribution
  </text>
  <text x="15" y="345" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    Normalization Property: The sum of the joint probability distribution over all possible values of X and Y is equal to 1:
  </text>
  <text x="15" y="360" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    P(X=x) * P(Y=y) = 1
  </text>

  <!-- Example Section -->
  <rect x="10" y="385" width="400" height="20" style="fill: #6495ED; opacity: 0.7;"></rect>
  <text x="15" y="400" style="font-size: 18px; font-family: Arial, sans-serif; fill: #fff;">
    Example
  </text>
  <rect x="10" y="415" width="400" height="20" style="fill: #C7B8EA; opacity: 0.7;"></rect>
  <text x="15" y="435" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    Suppose we have two discrete random variables, X and Y, with the following joint probability distribution:
  </text>
  <rect x="10" y="450" width="400" height="20" style="fill: #6495ED; opacity: 0.7;"></rect>
  <text x="15" y="465" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    | X   | Y   | P(X, Y) |
  </text>
  <rect x="10" y="480" width="400" height="20" style="fill: #C7B8EA; opacity: 0.7;"></rect>
  <text x="15" y="500" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    | 0   | 0   | 0.1     |
  </text>
  <rect x="10" y="520" width="400" height="20" style="fill: #6495ED; opacity: 0.7;"></rect>
  <text x="15" y="540" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    | 0   | 1   | 0.2     |
  </text>

  <!-- Arrow Markers for Connections -->
  <path d="M 10, 55 L 110, 55" style="stroke: #666; stroke-width: 2; stroke-linecap: round; fill: none;"></path>
  <path d="M 10, 95 L 110, 95" style="stroke: #666; stroke-width: 2; stroke-linecap: round; fill: none;"></path>

  <!-- Footer Section -->
  <rect x="10" y="370" width="400" height="30" style="fill: #C7B8EA; opacity: 0.7;"></rect>
  <text x="15" y="385" style="font-size: 18px; font-family: Arial, sans-serif; fill: #fff;">
    Footer
  </text>
  <text x="15" y="405" style="font-size: 16px; font-family: Arial, sans-serif; fill: #666;">
    Developed by [Your Name]
  </text>
</svg>