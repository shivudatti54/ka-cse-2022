<svg width="420" height="400" data-topic-id="covariance-and-correlation">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3498DB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title section -->
  <g transform="translate(10, 20)">
    <text data-narration="Introduction" x="0" y="0" font-size="24" font-family="Arial, sans-serif" fill="#3498DB">Covariance and Correlation</text>
  </g>
  
  <!-- Section: Covariance -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="400" height="100" fill-opacity="0.2" fill="#F7F7F7"/>
    <text data-narration="Covariance is a measure of how much two random variables vary together" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Covariance</text>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Cov(X, Y) = E[(X - E(X))(Y - E(Y))] = 15</text>
  </g>
  
  <!-- Section: Correlation -->
  <g transform="translate(10, 200)">
    <rect x="0" y="0" width="400" height="100" fill-opacity="0.2" fill="#F7F7F7"/>
    <text data-narration="Correlation is a measure of the linear relationship between two random variables" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Correlation</text>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">ρ(X, Y) = Cov(X, Y) / (σX \* σY) = 1</text>
  </g>
  
  <!-- Section: Positive Covariance -->
  <g transform="translate(10, 350)">
    <rect x="0" y="0" width="400" height="100" fill-opacity="0.2" fill="#F7F7F7"/>
    <text data-narration="Positive covariance means the variables tend to increase together" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Positive Covariance</text>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Cov(X, Y) = 15, ρ(X, Y) = 1</text>
    <line x1="10" y1="150" x2="400" y2="150" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  </g>
  
  <!-- Section: Negative Covariance -->
  <g transform="translate(10, 500)">
    <rect x="0" y="0" width="400" height="100" fill-opacity="0.2" fill="#F7F7F7"/>
    <text data-narration="Negative covariance means the variables tend to decrease together" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Negative Covariance</text>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Cov(X, Y) = -15, ρ(X, Y) = -1</text>
    <line x1="10" y1="150" x2="400" y2="150" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  </g>
  
  <!-- Section: Perfect Positive Correlation -->
  <g transform="translate(10, 650)">
    <rect x="0" y="0" width="400" height="100" fill-opacity="0.2" fill="#F7F7F7"/>
    <text data-narration="Perfect positive correlation means the variables are perfectly positively correlated" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Perfect Positive Correlation</text>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Cov(X, Y) = 15, ρ(X, Y) = 1</text>
    <line x1="10" y1="150" x2="400" y2="150" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  </g>
  
  <!-- Section: Perfect Negative Correlation -->
  <g transform="translate(10, 800)">
    <rect x="0" y="0" width="400" height="100" fill-opacity="0.2" fill="#F7F7F7"/>
    <text data-narration="Perfect negative correlation means the variables are perfectly negatively correlated" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Perfect Negative Correlation</text>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Cov(X, Y) = -15, ρ(X, Y) = -1</text>
    <line x1="10" y1="150" x2="400" y2="150" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  </g>
  
  <!-- Section: Zero Correlation -->
  <g transform="translate(10, 950)">
    <rect x="0" y="0" width="400" height="100" fill-opacity="0.2" fill="#F7F7F7"/>
    <text data-narration="Zero correlation means the variables are uncorrelated" x="10" y="20" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Zero Correlation</text>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10"/>
    <animateTransform attributeName="transform" type="translate" from="0,50" to="0,150" dur="2s" begin="0s" repeatCount="indefinite"/>
    <rect x="10" y="50" width="380" height="50" fill="#F7F7F7" rx="10">
      <animate attributeName="opacity" from="1" to="0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="10" y="120" font-size="18" font-family="Arial, sans-serif" fill="#666" dominant-baseline="hanging">Cov(X, Y) = 0, ρ(X, Y) = 0</text>
    <line x1="10" y1="150" x2="400" y2="150" stroke="#3498DB" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 1000)">
    <text x="10" y="1000" font-size="18" font-family="Arial, sans-serif" fill="#3498DB">Data Science Education</text>
  </g>
</svg>