<svg width="420" height="400" data-topic-id="mean-and-variance" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Title and Footer -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A88D8" stop-opacity="1" />
      <stop offset="100%" stop-color="#6495ED" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="20" y="50" width="380" height="300" fill="url(#gradient)" rx="10" />
  <text x="40" y="20" font-size="24" text-anchor="middle" fill="#E0E0E0">Mean and Variance</text>
  <text x="40" y="320" font-size="12" text-anchor="middle" fill="#E0E0E0">Topic: Mean and Variance</text>

  <!-- Section 1: Introduction -->
  <rect x="20" y="50" width="380" height="100" fill="#F5F5F5" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0,50" to="0,30" begin="0s" dur="2s" repeatCount="indefinite" />
  <text x="40" y="70" font-size="18" text-anchor="middle" fill="#3498DB" data-narration="Introduction to Mean and Variance">Introduction</text>
  <line x1="40" y1="90" x2="40" y2="110" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3" />
  <text x="40" y="110" font-size="16" text-anchor="middle" fill="#3498DB" data-narration="Mean and Variance are two fundamental concepts used to describe the distribution of a variable." />

  <!-- Section 2: Mean -->
  <rect x="20" y="170" width="380" height="100" fill="#F5F5F5" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0,170" to="0,150" begin="2s" dur="2s" repeatCount="indefinite" />
  <text x="40" y="190" font-size="18" text-anchor="middle" fill="#2ECC71" data-narration="Mean Definition">Mean Definition</text>
  <text x="40" y="210" font-size="16" text-anchor="middle" fill="#2ECC71" data-narration="The mean of a random variable X is denoted by μ (mu) and is calculated as the sum of all possible values of X multiplied by their respective probabilities:" />
  <text x="40" y="230" font-size="16" text-anchor="middle" fill="#2ECC71" data-narration="μ = E(X) = ∑xP(X=x)" />
  <line x1="40" y1="250" x2="40" y2="270" stroke="#2ECC71" stroke-width="2" stroke-dasharray="3,3" />
  <text x="40" y="270" font-size="16" text-anchor="middle" fill="#2ECC71" data-narration="Example: X = 1, 2, 3 with probabilities 1/3, 1/3, 1/3" />
  <text x="40" y="290" font-size="16" text-anchor="middle" fill="#2ECC71" data-narration="μ = E(X) = (1/3) \* 1 + (1/3) \* 2 + (1/3) \* 3 = 6" />

  <!-- Section 3: Central Limit Theorem -->
  <rect x="20" y="350" width="380" height="100" fill="#F5F5F5" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0,350" to="0,320" begin="4s" dur="2s" repeatCount="indefinite" />
  <text x="40" y="370" font-size="18" text-anchor="middle" fill="#E74C3C" data-narration="Central Limit Theorem">Central Limit Theorem</text>
  <text x="40" y="390" font-size="16" text-anchor="middle" fill="#E74C3C" data-narration="The central limit theorem states that the distribution of the mean of a large sample of independent and identically distributed random variables will be approximately normal, regardless of the original distribution of the variables" />
  <line x1="40" y1="410" x2="40" y2="430" stroke="#E74C3C" stroke-width="2" stroke-dasharray="3,3" />
  <text x="40" y="430" font-size="16" text-anchor="middle" fill="#E74C3C" data-narration="This means that if we take a large enough sample, the distribution of the mean will be approximately normal, regardless of the original distribution of the variables" />

  <!-- Section 4: Variance -->
  <rect x="20" y="510" width="380" height="100" fill="#F5F5F5" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0,510" to="0,480" begin="6s" dur="2s" repeatCount="indefinite" />
  <text x="40" y="530" font-size="18" text-anchor="middle" fill="#8E44AD" data-narration="Variance Definition">Variance Definition</text>
  <text x="40" y="550" font-size="16" text-anchor="middle" fill="#8E44AD" data-narration="The variance of a random variable X is denoted by σ^2 (sigma squared) and is calculated as the sum of the squared differences between each value of X and the mean, multiplied by their respective probabilities:" />
  <text x="40" y="570" font-size="16" text-anchor="middle" fill="#8E44AD" data-narration="σ^2 = E((X-μ)^2) = ∑(x-μ)^2P(X=x)" />
  <line x1="40" y1="590" x2="40" y2="610" stroke="#8E44AD" stroke-width="2" stroke-dasharray="3,3" />
  <text x="40" y="610" font-size="16" text-anchor="middle" fill="#8E44AD" data-narration="Example: X = 1, 2, 3 with probabilities 1/3, 1/3, 1/3" />
  <text x="40" y="630" font-size="16" text-anchor="middle" fill="#8E44AD" data-narration="σ^2 = E((X-μ)^2) = (1/3) \* (1-6)^2 + (1/3) \* (2-6)^2 + (1/3) \* (3-6)^2 = 50/3" />

  <!-- Section 5: Properties -->
  <rect x="20" y="710" width="380" height="100" fill="#F5F5F5" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0,710" to="0,680" begin="8s" dur="2s" repeatCount="indefinite" />
  <text x="40" y="730" font-size="18" text-anchor="middle" fill="#FFC107" data-narration="Properties of Variance">Properties of Variance</text>
  <text x="40" y="750" font-size="16" text-anchor="middle" fill="#FFC107" data-narration="The variance of a random variable has the following properties:" />
  <text x="40" y="770" font-size="16" text-anchor="middle" fill="#FFC107" data-narration="- The variance of a constant is 0" />
  <line x1="40" y1="790" x2="40" y2="810" stroke="#FFC107" stroke-width="2" stroke-dasharray="3,3" />
  <text x="40" y="810" font-size="16" text-anchor="middle" fill="#FFC107" data-narration="- The variance of the sum of independent random variables is equal to the sum of their variances" />
  <text x="40" y="830" font-size="16" text-anchor="middle" fill="#FFC107" data-narration="- The variance of a constant multiple of a random variable is equal to the square of the multiple times the variance of the random variable" />

  <!-- Section 6: Conclusion -->
  <rect x="20" y="920" width="380" height="100" fill="#F5F5F5" rx="10" />
  <animateTransform attributeName="transform" type="translate" from="0,920" to="0,890" begin="10s" dur="2s" repeatCount="indefinite" />
  <text x="40" y="910" font-size="18" text-anchor="middle" fill="#3E8E41" data-narration="Conclusion">Conclusion</text>
  <text x="40" y="930" font-size="16" text-anchor="middle" fill="#3E8E41" data-narration="In conclusion, the mean and variance are two fundamental concepts used to describe the distribution of a variable" />
  <line x1="40" y1="950" x2="40" y2="970" stroke="#3E8E41" stroke-width="2" stroke-dasharray="3,3" />
  <text x="40" y="970" font-size="16" text-anchor="middle" fill="#3E8E41" data-narration="By understanding the mean and variance, we can gain insights into the distribution of a variable and make predictions about the future behavior of the variable" />

  <!-- Arrow markers for connections -->
  <path d="M 40 20 L 40 50" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3" />
  <path d="M 40 170 L 40 190" stroke="#2ECC71" stroke-width="2" stroke-dasharray="3,3" />
  <path d="M 40 350 L 40 370" stroke="#E74C3C" stroke-width="2" stroke-dasharray="3,3" />
  <path d="M 40 510 L 40 530" stroke="#8E44AD" stroke-width="2" stroke-dasharray="3,3" />
  <path d="M 40 710 L 40 730" stroke="#FFC107" stroke-width="2" stroke-dasharray="3,3" />
</svg>