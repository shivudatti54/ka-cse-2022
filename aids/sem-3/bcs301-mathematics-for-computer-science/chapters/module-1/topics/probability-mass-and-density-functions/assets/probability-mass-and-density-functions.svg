<svg width="420" height="400" data-topic-id="probability-mass-and-density-functions">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Probability Mass and Density Functions</title>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <section data-narration="Introduction to PMFs" style="background-color: #F9F9F9; padding: 20px;">
    <h2>Probability Mass Functions</h2>
    <p>A probability mass function (PMF) is a function that assigns a probability to each possible outcome of a discrete random variable.</p>
  </section>
  <section data-narration="Definition of PMFs" style="background-color: #F9F9F9; padding: 20px;">
    <h2>Definition: PMF</h2>
    <p>A probability mass function (PMF) $P$ is defined as:
      <ul>
        <li>$P(X = x) = p_x$ for all possible values $x$ in the sample space $X$</li>
        <li>$p_x \geq 0$ for all $x$ in $X$</li>
        <li>\(\sum_{x \in X} p_x = 1\)</li>
      </ul>
    </p>
  </section>
  <section data-narration="Examples of PMFs" style="background-color: #F9F9F9; padding: 20px;">
    <h2>Examples</h2>
    <ul>
      <li><a href="#coin-toss">Fair six-sided coin toss</a></li>
      <li><a href="#discrete-random-variable">Random variable that can take on values 1, 2, or 3</a></li>
    </ul>
  </section>
  <a href="#coin-toss" id="coin-toss-link"></a>
  <section data-narration="Coin Toss PMF" style="background-color: #F9F9F9; padding: 20px;">
    <h2>Coin Toss PMF</h2>
    <ul>
      <li>$P(Head) = 1/2$</li>
      <li>$P(Tail) = 1/2$</li>
    </ul>
    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" fill="#C7B8EA"/>
      <text x="50" y="55" font-size="24" fill="#fff">Head</text>
      <line x1="25" y1="75" x2="75" y2="75" stroke="#fff" stroke-width="2"/>
      <text x="25" y="65" font-size="24" fill="#fff">Tail</text>
    </svg>