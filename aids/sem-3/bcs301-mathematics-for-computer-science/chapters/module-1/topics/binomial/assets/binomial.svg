<svg width="420" height="400" data-topic-id="binomial-distribution">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" x="0" y="0" width="420" height="400" rx="10" />
  
  <!-- Title at top -->
  <text x="50%" y="20" text-anchor="middle" font-size="24" font-family="Arial" fill="#3498DB">
    Binomial Distribution
  </text>
  
  <!-- Section 1: Introduction -->
  <rect x="20" y="100" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="50%" y="115" text-anchor="middle" font-size="18" font-family="Arial" fill="#2C3E50" data-narration="The binomial distribution is a discrete probability distribution that models the number of successes in a fixed number of independent trials, where each trial has a constant probability of success.">
    Introduction
  </text>
  <animate transform="rotate(360 50% 115)" begin="0s" dur="10s" repeat="forever" />
  
  <!-- Section 2: Definition -->
  <rect x="20" y="170" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="50%" y="185" text-anchor="middle" font-size="18" font-family="Arial" fill="#2C3E50" data-narration="The binomial distribution is defined as the probability distribution of the number of successes in a sequence of `n` independent trials, where each trial has a probability `p` of success, and a probability `(1-p)` of failure.">
    Definition
  </text>
  <animate transform="rotate(720 50% 185)" begin="0s" dur="10s" repeat="forever" />
  
  <!-- Section 3: Formula -->
  <rect x="20" y="230" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="50%" y="245" text-anchor="middle" font-size="18" font-family="Arial" fill="#2C3E50" data-narration="The probability of `k` successes in `n` trials is given by the formula: P(X = k) = (nCk) \* (p^k) \* ((1-p)^(n-k)).">
    Formula
  </text>
  <animate transform="rotate(1080 50% 245)" begin="0s" dur="10s" repeat="forever" />
  
  <!-- Section 4: Example -->
  <rect x="20" y="290" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="50%" y="305" text-anchor="middle" font-size="18" font-family="Arial" fill="#2C3E50" data-narration="Suppose a coin is flipped 5 times, and we want to find the probability of getting exactly 2 heads.">
    Example
  </text>
  <animate transform="rotate(1440 50% 305)" begin="0s" dur="10s" repeat="forever" />
  
  <!-- Section 5: Properties -->
  <rect x="20" y="360" width="380" height="50" fill="#F7F7F7" rx="10" />
  <text x="50%" y="375" text-anchor="middle" font-size="18" font-family="Arial" fill="#2C3E50" data-narration="The binomial distribution has several properties, including symmetry and a constant probability of success.">
    Properties
  </text>
  <animate transform="rotate(1800 50% 375)" begin="0s" dur="10s" repeat="forever" />
  
  <!-- Footer with arrow markers for connections -->
  <rect x="20" y="420" width="380" height="40" fill="#F7F7F7" rx="10" />
  <text x="50%" y="435" text-anchor="middle" font-size="14" font-family="Arial" fill="#2C3E50">
    Learn more at <a href="#">link</a>
  </text>
  <line x1="50%" y1="420" x2="50%" y2="460" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3" />
  <line x1="50%" y1="420" x2="100%" y2="450" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3" />
  <line x1="50%" y1="420" x2="20%" y2="460" stroke="#3498DB" stroke-width="2" stroke-dasharray="3,3" />
</svg>