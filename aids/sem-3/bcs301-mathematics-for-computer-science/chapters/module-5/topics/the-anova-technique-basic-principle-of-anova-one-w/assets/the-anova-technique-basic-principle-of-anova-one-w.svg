<svg width="420" height="400" data-topic-id="anova-technique-basic-principle-of-anova-one-w">
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="1" stop-color="#3498db" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <title>Analysis of Variance (ANOVA)</title>

  <rect x="10" y="10" width="400" height="120" fill="url(#gradient)"/>

  <g transform="translate(15, 150)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" stroke="#666" stroke-width="1"/>
    <text x="10" y="25" fill="#333" font-size="18">Null Hypothesis</text>
    <text x="10" y="45" fill="#333" font-size="18">All group means are equal</text>
  </g>

  <g transform="translate(15, 220)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" stroke="#666" stroke-width="1"/>
    <text x="10" y="25" fill="#333" font-size="18">Alternative Hypothesis</text>
    <text x="10" y="45" fill="#333" font-size="18">At least one group mean is different</text>
  </g>

  <g transform="translate(15, 300)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" stroke="#666" stroke-width="1"/>
    <text x="10" y="25" fill="#333" font-size="18">Steps Involved in ANOVA</text>
    <text x="10" y="45" fill="#333" font-size="18">Calculate mean and variance of each group</text>
    <text x="10" y="65" fill="#333" font-size="18">Calculate overall mean</text>
    <text x="10" y="85" fill="#333" font-size="18">Calculate SSB and SSW</text>
    <text x="10" y="105" fill="#333" font-size="18">Calculate MSB and MSW</text>
  </g>

  <g transform="translate(15, 380)">
    <rect x="0" y="0" width="300" height="50" fill="#f9f9f9" stroke="#666" stroke-width="1"/>
    <text x="10" y="25" fill="#333" font-size="18">Assumptions of ANOVA</text>
    <text x="10" y="45" fill="#333" font-size="18">Data should be normally distributed in each group</text>
    <text x="10" y="65" fill="#333" font-size="18">Data should be independent of each other</text>
    <text x="10" y="85" fill="#333" font-size="18">Data should meet the assumption of equal variances</text>
  </g>

  <g transform="translate(15, 10)">
    <path d="M 0 0 L 10 10 L 20 20 L 30 30 Z" stroke="#666" stroke-width="1"/>
    <text x="10" y="20" fill="#333" font-size="18">Visualizing ANOVA</text>
    <text x="10" y="40" fill="#333" font-size="18">Using a normal distribution</text>
  </g>

  <g transform="translate(15, 40)">
    <path d="M 0 0 L 10 10 L 20 20 L 30 30 Z" stroke="#666" stroke-width="1"/>
    <text x="10" y="20" fill="#333" font-size="18">Value of ANOVA</text>
    <text x="10" y="40" fill="#333" font-size="18">F Statistic</text>
  </g>

  <g transform="translate(15, 70)">
    <path d="M 0 0 L 10 10 L 20 20 L 30 30 Z" stroke="#666" stroke-width="1"/>
    <text x="10" y="20" fill="#333" font-size="18">Interpretation of ANOVA</text>
    <text x="10" y="40" fill="#333" font-size="18">P-value</text>
    <text x="10" y="60" fill="#333" font-size="18">Conclusion</text>
  </g>

  <g transform="translate(15, 100)">
    <path d="M 0 0 L 10 10 L 20 20 L 30 30 Z" stroke="#666" stroke-width="1"/>
    <text x="10" y="20" fill="#333" font-size="18">Real-world Applications</text>
    <text x="10" y="40" fill="#333" font-size="18">Engineering</text>
    <text x="10" y="60" fill="#333" font-size="18">Economics</text>
    <text x="10" y="80" fill="#333" font-size="18">Social Sciences</text>
  </g>

  <g transform="translate(15, 130)">
    <path d="M 0 0 L 10 10 L 20 20 L 30 30 Z" stroke="#666" stroke-width="1"/>
    <text x="10" y="20" fill="#333" font-size="18">Frequently Asked Questions</text>
    <text x="10" y="40" fill="#333" font-size="18">Q: What is ANOVA?</text>
    <text x="10" y="60" fill="#333" font-size="18">A: ANOVA is a statistical technique used to compare means of three or more groups</text>
    <text x="10" y="80" fill="#333" font-size="18">Q: What is the purpose of ANOVA?</text>
    <text x="10" y="100" fill="#333" font-size="18">A: The purpose of ANOVA is to determine if at least one group mean is different</text>
  </g>

  <g transform="translate(15, 160)">
    <path d="M 0 0 L 10 10 L 20 20 L 30 30 Z" stroke="#666" stroke-width="1"/>
    <text x="10" y="20" fill="#333" font-size="18">Conclusion</text>
    <text x="10" y="40" fill="#333" font-size="18">ANOVA is a powerful statistical technique used to compare means of three or more groups</text>
    <text x="10" y="60" fill="#333" font-size="18">It is widely used in fields like engineering, economics, social sciences, and life sciences</text>
    <text x="10" y="80" fill="#333" font-size="18">To analyze the effects of different factors on a response variable</text>
  </g>

  <footer>Copyright 2023</footer>
</svg>