<svg width="420" height="400" data-topic-id="completely-randomized-design">
  <defs>
    <style>
      .gradient {
        background-image: linear-gradient(to bottom, #ADD8E6, #4682B4, #3498DB);
        background-size: 100% 100%;
        background-position: 0% 0%;
      }
    </style>
  </defs>
  <g class="gradient">
    <rect x="0" y="0" width="420" height="400" style="fill-opacity: 0.5;"></rect>
  </g>
  <text x="10" y="10" font-size="24" text-anchor="start" font-family="Arial" font-weight="bold">Completely Randomized Design</text>
  <rect x="10" y="50" width="400" height="150" rx="10" fill="#FFF" data-narration="Overview of Completely Randomized Design"></rect>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <rect x="10" y="50" width="400" height="150" rx="10" fill="#ADD8E6" opacity=".5"></rect>
    <rect x="10" y="50" width="400" height="150" rx="10" fill="#4682B4"></rect>
    <rect x="10" y="50" width="400" height="150" rx="10" fill="#3498DB"></rect>
  </animate>
  <g id="ANOVA">
    <rect x="10" y="220" width="200" height="50" rx="10" fill="#FFF" data-narration="Step 1: Calculate the mean and standard deviation of the response variable"></rect>
    <rect x="220" y="220" width="200" height="50" rx="10" fill="#FFF" data-narration="Step 2: Calculate the F-statistic and p-value"></rect>
    <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
      <rect x="10" y="220" width="200" height="50" rx="10" fill="#ADD8E6" opacity=".5"></rect>
      <rect x="220" y="220" width="200" height="50" rx="10" fill="#4682B4"></rect>
      <rect x="10" y="220" width="200" height="50" rx="10" fill="#3498DB"></rect>
      <rect x="220" y="220" width="200" height="50" rx="10" fill="#8BC34A"></rect>
    </animate>
  </g>
  <g id="independence">
    <rect x="10" y="300" width="200" height="50" rx="10" fill="#FFF" data-narration="Assumption of Independence"></rect>
    <rect x="220" y="300" width="200" height="50" rx="10" fill="#FFF" data-narration="Assumption of Randomization"></rect>
    <rect x="10" y="300" width="200" height="50" rx="10" fill="#ADD8E6" opacity=".5"></rect>
    <rect x="220" y="300" width="200" height="50" rx="10" fill="#4682B4" opacity=".5"></rect>
  </g>
  <g id="normality">
    <rect x="10" y="370" width="200" height="50" rx="10" fill="#FFF" data-narration="Assumption of Normality"></rect>
    <rect x="220" y="370" width="200" height="50" rx="10" fill="#FFF" data-narration="Assumption of Homogeneity of Variance"></rect>
    <rect x="10" y="370" width="200" height="50" rx="10" fill="#ADD8E6" opacity=".5"></rect>
    <rect x="220" y="370" width="200" height="50" rx="10" fill="#4682B4" opacity=".5"></rect>
  </g>
  <g id="advantages">
    <rect x="10" y="400" width="200" height="50" rx="10" fill="#FFF" data-narration="Advantages of Completely Randomized Design"></rect>
    <rect x="220" y="400" width="200" height="50" rx="10" fill="#FFF" data-narration="Limitations of Completely Randomized Design"></rect>
    <rect x="10" y="400" width="200" height="50" rx="10" fill="#ADD8E6" opacity=".5"></rect>
    <rect x="220" y="400" width="200" height="50" rx="10" fill="#4682B4" opacity=".5"></rect>
  </g>
  <g id="footer">
    <rect x="10" y="450" width="400" height="50" rx="10" fill="#FFF" data-narration="Additional Resources"></rect>
  </g>
</svg>