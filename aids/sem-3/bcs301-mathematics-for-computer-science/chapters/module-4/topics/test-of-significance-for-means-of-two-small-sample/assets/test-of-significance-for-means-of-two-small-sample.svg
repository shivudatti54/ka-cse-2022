<svg width="420" height="400" data-topic-id="test-of-significance-for-means-of-two-small-samples">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A98D7"/>
      <stop offset="100%" stop-color="#4FC5E5"/>
      <stop offset="100%" stop-color="#ADD8E7"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>

  <g transform="translate(20, 20)">
    <text x="0" y="10" font-size="24" font-family="Open Sans" text-anchor="start" fill="#1A1D23">Test of Significance for Means of Two Small Samples</text>
  </g>

  <g transform="translate(40, 60)">
    <section data-narration="Introduction">
      <rect x="0" y="0" width="360" height="100" fill="#E0E0E0" rx="10"/>
      <text x="20" y="30" font-size="18" font-family="Open Sans" text-anchor="start" fill="#4C5154">In statistical inference, the test of significance for means of two small samples is a statistical method used to compare the means of two groups to determine if there is a significant difference between them.</text>
    </section>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="0s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(40, 60)">
    <section data-narration="Definitions">
      <rect x="0" y="0" width="360" height="100" fill="#E0E0E0" rx="10"/>
      <text x="20" y="30" font-size="18" font-family="Open Sans" text-anchor="start" fill="#4C5154">
        <tspan>Sample mean:</tspan>
        <tspan x="150">The average value of a dataset.</tspan>
        <tspan x="150" font-size="16" font-weight="bold">Population mean:</tspan>
        <tspan x="150">The average value of a population.</tspan>
        <tspan x="150" font-size="16" font-weight="bold">Sample standard deviation:</tspan>
        <tspan x="150">A measure of the spread or dispersion of a dataset.</tspan>
        <tspan x="150" font-size="16" font-weight="bold">Hypothesis testing:</tspan>
        <tspan x="150">A method used to make conclusions about a population based on a sample of data.</tspan>
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="0s" repeatCount="indefinite"/>
    </section>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(40, 160)">
    <section data-narration="The Problem">
      <rect x="0" y="0" width="360" height="100" fill="#E0E0E0" rx="10"/>
      <text x="20" y="30" font-size="18" font-family="Open Sans" text-anchor="start" fill="#4C5154">When comparing the means of two small samples, we may want to determine if there is a significant difference between them.</text>
    </section>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="4s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(40, 160)">
    <section data-narration="The Solution">
      <rect x="0" y="0" width="360" height="100" fill="#E0E0E0" rx="10"/>
      <text x="20" y="30" font-size="18" font-family="Open Sans" text-anchor="start" fill="#4C5154">To address this problem, we can use the following approach:</text>
    </section>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="6s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(40, 160)">
    <section data-narration="The Paired t-Test">
      <rect x="0" y="0" width="360" height="100" fill="#E0E0E0" rx="10"/>
      <text x="20" y="30" font-size="18" font-family="Open Sans" text-anchor="start" fill="#4C5154">
        <tspan>The paired t-test is a parametric test used to compare the means of two related samples.</tspan>
        <tspan x="150">The test assumes that the samples are paired and that the differences between the pairs are normally distributed.</tspan>
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="8s" repeatCount="indefinite"/>
    </section>
  </g>

  <g transform="translate(40, 200)">
    <section data-narration="Formula">
      <rect x="0" y="0" width="360" height="100" fill="#E0E0E0" rx="10"/>
      <text x="20" y="30" font-size="18" font-family="Open Sans" text-anchor="start" fill="#4C5154">
        <tspan>t = (x̄1 - x̄2) / (s_p \* sqrt(1/n1 + 1/n2))</tspan>
      </text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 100" dur="2s" begin="10s" repeatCount="indefinite"/>
    </section>
  </g>

  <g transform="translate(20, 300)">
    <footer>
      <text x="20" y="350" font-size="18" font-family="Open Sans" text-anchor="start" fill="#4C5154">Learn more about statistical inference and hypothesis testing.</text>
    </footer>
  </g>
</svg>