<svg width="420" height="400" data-topic-id="f-distribution">
  <defs>
    <linearGradient id="pastel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel)" width="100%" height="100%" rx="10" />
  <g transform="translate(10, 10)">
    <rect fill="#F7F7F7" width="300" height="280" rx="10" />
    <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#2F4F7F">Key Management and Distribution</text>
    <rect fill="#F7F7F7" width="300" height="50" rx="10" y="40" />
    <g data-narration="Key Generation">
      <rect fill="#F7F7F7" width="120" height="30" rx="10" y="10" />
      <text x="15" y="20" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Generate Keys</text>
      <text x="15" y="40" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Using Cryptographically Secure RNGs</text>
      <animate transform="translateX(120px)" begin="0s" dur="2s" repeatCount="indefinite" />
    </g>
    <g data-narration="Key Distribution">
      <rect fill="#F7F7F7" width="120" height="30" rx="10" y="80" />
      <text x="15" y="90" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Distribute Keys</text>
      <text x="15" y="110" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Securely to Authorized Parties</text>
      <animate transform="translateX(120px)" begin="2s" dur="2s" repeatCount="indefinite" />
    </g>
    <g data-narration="Key Storage">
      <rect fill="#F7F7F7" width="120" height="30" rx="10" y="130" />
      <text x="15" y="140" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Store Keys</text>
      <text x="15" y="160" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Securely Using Hardware or Software</text>
      <animate transform="translateX(120px)" begin="4s" dur="2s" repeatCount="indefinite" />
    </g>
    <g data-narration="Key Usage">
      <rect fill="#F7F7F7" width="120" height="30" rx="10" y="170" />
      <text x="15" y="180" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Use Keys</text>
      <text x="15" y="200" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Properly in Cryptographic Operations</text>
      <animate transform="translateX(120px)" begin="6s" dur="2s" repeatCount="indefinite" />
    </g>
    <g>
      <rect fill="#F7F7F7" width="120" height="30" rx="10" y="210" />
      <text x="15" y="220" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Rotate Keys</text>
      <text x="15" y="240" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Limit Exposure</text>
    </g>
    <g>
      <rect fill="#F7F7F7" width="120" height="30" rx="10" y="270" />
      <text x="15" y="280" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Monitor</text>
      <text x="15" y="300" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Key Management Process</text>
    </g>
  </g>
  <g>
    <rect fill="#F7F7F7" width="120" height="30" rx="10" y="310" />
    <text x="15" y="320" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Maintain</text>
    <text x="15" y="340" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Key Management Knowledge</text>
  </g>
  <g>
    <rect fill="#F7F7F7" width="120" height="30" rx="10" y="360" />
    <text x="15" y="370" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Review</text>
    <text x="15" y="390" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Key Management Policies</text>
  </g>
  <g>
    <rect fill="#F7F7F7" width="120" height="30" rx="10" y="410" />
    <text x="15" y="420" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Update</text>
    <text x="15" y="440" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Key Management Knowledge</text>
  </g>
  <g>
    <rect fill="#F7F7F7" width="120" height="30" rx="10" y="460" />
    <text x="15" y="470" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Educate</text>
    <text x="15" y="490" font-size="16" font-family="Arial" text-anchor="start" fill="#2F4F7F">Key Management Practices</text>
  </g>
</svg>