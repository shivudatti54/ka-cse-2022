<svg width="420" height="400" data-topic-id="chi-square-distribution-as-a-test-of-goodness-of-fit">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#ACC7F2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" />
  
  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-family="Arial" text-anchor="middle">
    Chi Square Distribution as a Test of Goodness of Fit
  </text>
  
  <!-- Section 1: Introduction -->
  <section id="introduction" data-narration="This is the introduction to the chi-square distribution as a test of goodness of fit.">
    <rect x="20%" y="50%" width="60%" height="30%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="60%" font-size="18" font-family="Arial" text-anchor="middle">
      Introduction
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0 50% 50%" to="360 50% 50%" dur="10s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 2: Definition -->
  <section id="definition" data-narration="The chi-square distribution is a discrete probability distribution that arises from the distribution of a sum of squares of multiple independent random variables.">
    <rect x="20%" y="90%" width="60%" height="30%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="100%" font-size="18" font-family="Arial" text-anchor="middle">
      Definition
    </text>
    <animateTransform attributeName="transform" type="translate" from="50% 90%" to="50% 100%" dur="5s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 3: Null and Alternative Hypotheses -->
  <section id="null-and-alternative-hypotheses" data-narration="Null Hypothesis: The observed frequencies are consistent with a known population distribution. Alternative Hypothesis: The observed frequencies are not consistent with a known population distribution.">
    <rect x="20%" y="130%" width="60%" height="30%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="140%" font-size="18" font-family="Arial" text-anchor="middle">
      Null and Alternative Hypotheses
    </text>
    <animateTransform attributeName="transform" type="translate" from="50% 130%" to="50% 140%" dur="5s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 4: Calculating the Chi-square Statistic -->
  <section id="calculating-chi-square-statistic" data-narration="The chi-square statistic is calculated as follows: χ² = Σ [(observed frequency - expected frequency)^2 / expected frequency].">
    <rect x="20%" y="170%" width="60%" height="30%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="180%" font-size="18" font-family="Arial" text-anchor="middle">
      Calculating the Chi-square Statistic
    </text>
    <animateTransform attributeName="transform" type="translate" from="50% 170%" to="50% 180%" dur="5s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 5: Interpretation of the Chi-square Statistic -->
  <section id="interpretation-of-chi-square-statistic" data-narration="The chi-square statistic follows a chi-square distribution with k-1 degrees of freedom, where k is the number of categories in the observed data.">
    <rect x="20%" y="210%" width="60%" height="30%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="220%" font-size="18" font-family="Arial" text-anchor="middle">
      Interpretation of the Chi-square Statistic
    </text>
    <animateTransform attributeName="transform" type="translate" from="50% 210%" to="50% 220%" dur="5s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Section 6: Conclusion -->
  <section id="conclusion" data-narration="The chi-square distribution is a widely used test for goodness of fit, and it is an essential concept in statistics for computer science.">
    <rect x="20%" y="250%" width="60%" height="30%" fill="#F7F7F7" rx="10" />
    <text x="30%" y="260%" font-size="18" font-family="Arial" text-anchor="middle">
      Conclusion
    </text>
    <animateTransform attributeName="transform" type="translate" from="50% 250%" to="50% 260%" dur="5s" begin="0s" repeatCount="indefinite" />
  </section>
  
  <!-- Footer -->
  <text x="50%" y="350%" font-size="18" font-family="Arial" text-anchor="middle">
    Created by <a href="#">Author Name</a> 2023
  </text>
</svg>