<svg width="420" height="400" data-topic-id="students-t-distribution" xmlns="http://www.w3.org/2000/svg">
  <desc>SVG diagram for Students' T Distribution</desc>
  <title>Students' T Distribution</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <style>
      .section {
        margin-bottom: 20px;
      }
      .label {
        font-weight: bold;
        font-size: 14px;
        color: #333;
      }
      .annotation {
        font-size: 12px;
        color: #666;
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <rect width="100%" height="100%" rx="10" fill="#fff"/>
    <text x="50%" y="50%" font-size="24px" text-anchor="middle" fill="#2F4F7F">Students' T Distribution</text>
    <text x="50%" y="80%" font-size="18px" text-anchor="middle" fill="#666">Key Management and Distribution</text>
  </g>

  <g transform="translate(20, 100)">
    <rect width="80%" height="20" rx="10" fill="#fff"/>
    <text x="10%" y="10%" class="label" fill="#2F4F7F">1. Key Generation</text>
    <text x="10%" y="30%" class="annotation" fill="#666">Keys must be generated using cryptographically secure random number generators.</text>
    <animate transform="translateX(80%)" begin="0s" duration="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 140)">
    <rect width="80%" height="20" rx="10" fill="#fff"/>
    <text x="10%" y="10%" class="label" fill="#2F4F7F">2. Key Distribution</text>
    <text x="10%" y="30%" class="annotation" fill="#666">Various methods exist depending on the cryptographic approach.</text>
    <animate transform="translateX(80%)" begin="2s" duration="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 180)">
    <rect width="80%" height="20" rx="10" fill="#fff"/>
    <text x="10%" y="10%" class="label" fill="#2F4F7F">3. Key Storage</text>
    <text x="10%" y="30%" class="annotation" fill="#666">Hardware Security Modules (HSMs) provide secure storage.</text>
    <animate transform="translateX(80%)" begin="4s" duration="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 220)">
    <rect width="80%" height="20" rx="10" fill="#fff"/>
    <text x="10%" y="10%" class="label" fill="#2F4F7F">4. Key Usage</text>
    <text x="10%" y="30%" class="annotation" fill="#666">Key rotation policies to limit exposure.</text>
    <animate transform="translateX(80%)" begin="6s" duration="2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(20, 260)">
    <rect width="80%" height="20" rx="10" fill="#fff"/>
    <text x="10%" y="10%" class="label" fill="#2F4F7F">5. Destruction</text>
    <text x="10%" y="30%" class="annotation" fill="#666">Keys must be securely destroyed when no longer needed.</text>
  </g>

  <g transform="translate(20, 300)">
    <rect width="80%" height="20" rx="10" fill="#fff"/>
    <text x="10%" y="10%" class="label" fill="#2F4F7F">6. Monitoring</text>
    <text x="10%" y="30%" class="annotation" fill="#666">Regularly monitor key management processes to ensure security.</text>
  </g>

  <g transform="translate(20, 340)">
    <rect width="80%" height="20" rx="10" fill="#fff"/>
    <text x="10%" y="10%" class="label" fill="#2F4F7F">7. Review and Revision</text>
    <text x="10%" y="30%" class="annotation" fill="#666">Regularly review and revise key management policies.</text>
  </g>

  <footer>
    <text x="50%" y="380%" font-size="14px" text-anchor="middle" fill="#333">Last updated: 2023</text>
  </footer>
</svg>