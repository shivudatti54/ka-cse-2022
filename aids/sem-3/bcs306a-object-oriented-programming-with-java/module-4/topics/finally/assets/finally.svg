<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Java try-catch-finally block">
    <text x="50" y="50" font-size="24" fill="#2563eb">Try-Catch-Finally Block</text>
    <rect x="50" y="100" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="135" font-size="18" fill="#ffffff">Try</text>
  </g>
  <g id="step1" data-narration="Try block is used for code that might throw an exception">
    <use href="#step0"/>
    <text x="50" y="200" font-size="18" fill="#8b5cf6">Code that might throw an exception</text>
    <rect x="50" y="250" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="60" y="285" font-size="18" fill="#ffffff">File Operations</text>
    <text x="60" y="315" font-size="18" fill="#ffffff">Database Connections</text>
  </g>
  <g id="step2" data-narration="Catch block is used to handle specific exceptions">
    <use href="#step1"/>
    <rect x="300" y="100" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="310" y="135" font-size="18" fill="#ffffff">Catch</text>
    <text x="300" y="200" font-size="18" fill="#8b5cf6">Handle specific exceptions</text>
    <rect x="300" y="250" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="310" y="285" font-size="18" fill="#ffffff">SpecificExceptionType</text>
  </g>
  <g id="step3" data-narration="Finally block is used for cleanup code that always executes">
    <use href="#step2"/>
    <rect x="550" y="100" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="560" y="135" font-size="18" fill="#ffffff">Finally</text>
    <text x="550" y="200" font-size="18" fill="#8b5cf6">Cleanup code that always executes</text>
    <rect x="550" y="250" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="560" y="285" font-size="18" fill="#ffffff">Close File or Connection</text>
  </g>
  <g id="step4" data-narration="Finally block executes regardless of exceptions">
    <use href="#step3"/>
    <path d="M 550 350 L 550 400" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="520" y="420" font-size="18" fill="#8b5cf6">Regardless of exceptions</text>
  </g>
  <g id="step5" data-narration="Example of try-catch-finally block in Java">
    <use href="#step4"/>
    <rect x="50" y="450" width="700" height="100" fill="#10b981" rx="10"/>
    <text x="60" y="480" font-size="18" fill="#ffffff">try { ... } catch (Exception e) { ... } finally { ... }</text>
  </g>
</svg>