<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Try and Catch in Java">
    <text x="50" y="50" font-size="24" fill="#2563eb">Try and Catch in Java</text>
    <rect x="50" y="100" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="140" font-size="18" fill="#ffffff">Code Execution</text>
  </g>
  <g id="step1" data-narration="Try Block - Code that might throw an exception">
    <use href="#step0" x="0" y="0"/>
    <rect x="300" y="100" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="310" y="140" font-size="18" fill="#ffffff">Try Block</text>
    <line x1="250" y1="125" x2="300" y2="125" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <g id="step2" data-narration="Catch Block - Handler for ExceptionType1">
    <use href="#step1" x="0" y="0"/>
    <rect x="300" y="200" width="200" height="50" fill="#8b5cf6" rx="10"/>
    <text x="310" y="240" font-size="18" fill="#ffffff">Catch Block</text>
    <line x1="250" y1="225" x2="300" y2="225" stroke="#2563eb" stroke-width="2"/>
    <text x="310" y="280" font-size="18" fill="#8b5cf6">ExceptionType1</text>
  </g>
  <g id="step3" data-narration="Multiple Catch Blocks - Handler for ExceptionType2">
    <use href="#step2" x="0" y="0"/>
    <rect x="300" y="300" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="310" y="340" font-size="18" fill="#ffffff">Catch Block</text>
    <line x1="250" y1="325" x2="300" y2="325" stroke="#10b981" stroke-width="2"/>
    <text x="310" y="400" font-size="18" fill="#f59e0b">ExceptionType2</text>
  </g>
  <g id="step4" data-narration="Order of Catch Blocks matters">
    <use href="#step3" x="0" y="0"/>
    <text x="50" y="450" font-size="18" fill="#2563eb">Order of Catch Blocks</text>
    <line x1="50" y1="475" x2="150" y2="475" stroke="#8b5cf6" stroke-width="2"/>
    <text x="160" y="450" font-size="18" fill="#8b5cf6">From specific to general</text>
  </g>
  <g id="step5" data-narration="Example Use Case">
    <use href="#step4" x="0" y="0"/>
    <rect x="500" y="100" width="200" height="200" fill="#10b981" rx="10"/>
    <text x="510" y="150" font-size="18" fill="#ffffff">File Reading</text>
    <text x="510" y="200" font-size="18" fill="#ffffff">Try: Read file</text>
    <text x="510" y="250" font-size="18" fill="#ffffff">Catch: Handle FileNotFoundException</text>
  </g>
  <g id="step6" data-narration="Best Practices">
    <use href="#step5" x="0" y="0"/>
    <text x="50" y="500" font-size="18" fill="#2563eb">Best Practices</text>
    <line x1="50" y1="525" x2="150" y2="525" stroke="#f59e0b" stroke-width="2"/>
    <text x="160" y="500" font-size="18" fill="#f59e0b">Keep try block small</text>
    <text x="160" y="550" font-size="18" fill="#f59e0b">Handle specific exceptions</text>
  </g>
  <g id="step7" data-narration="Common Pitfalls">
    <use href="#step6" x="0" y="0"/>
    <text x="300" y="500" font-size="18" fill="#8b5cf6">Common Pitfalls</text>
    <line x1="300" y1="525" x2="400" y2="525" stroke="#10b981" stroke-width="2"/>
    <text x="410" y="500" font-size="18" fill="#10b981">Swallowing exceptions</text>
    <text x="410" y="550" font-size="18" fill="#10b981">Not logging exceptions</text>
  </g>
  <g id="step8" data-narration="Conclusion">
    <use href="#step7" x="0" y="0"/>
    <text x="50" y="550" font-size="24" fill="#2563eb">Try and Catch in Java</text>
    <text x="50" y="600" font-size="18" fill="#2563eb">Effective error handling is crucial</text>
  </g>
</svg>