<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Java Exceptions">
    <text x="50" y="50" font-size="24" fill="#2563eb">Java Exceptions</text>
    <text x="50" y="100" font-size="18" fill="#8b5cf6">Understanding the 'throw' context</text>
  </g>
  <g id="step1" data-narration="Exception Type and Error Message">
    <use href="#step0" x="0" y="0" />
    <rect x="50" y="150" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="180" font-size="18" fill="#ffffff">Exception Type</text>
    <rect x="300" y="150" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="180" font-size="18" fill="#ffffff">Error Message</text>
    <line x1="250" y1="175" x2="280" y2="175" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="The 'throw' Keyword">
    <use href="#step1" x="0" y="0" />
    <rect x="50" y="250" width="100" height="50" fill="#2563eb" rx="10" />
    <text x="55" y="280" font-size="18" fill="#ffffff">throw</text>
    <line x1="150" y1="275" x2="250" y2="275" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" data-narration="Creating an Exception Object">
    <use href="#step2" x="0" y="0" />
    <rect x="300" y="250" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="280" font-size="18" fill="#ffffff">new ExceptionType()</text>
    <line x1="250" y1="275" x2="280" y2="275" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="Passing the Error Message">
    <use href="#step3" x="0" y="0" />
    <rect x="550" y="250" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="280" font-size="18" fill="#ffffff">("Error Message")</text>
    <line x1="500" y1="275" x2="530" y2="275" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step5" data-narration="Combining 'throw' with Exception Object">
    <use href="#step4" x="0" y="0" />
    <text x="50" y="350" font-size="18" fill="#2563eb">throw new ExceptionType("Error Message");</text>
    <rect x="50" y="400" width="700" height="50" fill="#8b5cf6" rx="10" />
    <text x="60" y="430" font-size="18" fill="#ffffff">Exception is thrown with the specified error message</text>
  </g>
</svg>