<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
<rect width="800" height="600" fill="#f8fafc"/>
<g id="step0" data-narration="Introduction to Abstract Classes in Object-Oriented Programming">
<rect x="50" y="50" width="700" height="50" fill="#2563eb" rx="10"/>
<text x="60" y="90" font-size="24" font-family="Arial" fill="#ffffff">Abstract Classes</text>
</g>
<g id="step1" data-narration="Understanding Pure Virtual Functions and their Declaration">
<rect x="50" y="120" width="700" height="50" fill="#10b981" rx="10"/>
<text x="60" y="160" font-size="24" font-family="Arial" fill="#ffffff">Pure Virtual Functions</text>
<text x="60" y="190" font-size="18" font-family="Arial" fill="#ffffff">Declared with = 0, must be overridden</text>
</g>
<g id="step2" data-narration="Purpose and Benefits of Using Abstract Classes in Programming">
<rect x="50" y="220" width="700" height="100" fill="#f59e0b" rx="10"/>
<text x="60" y="260" font-size="24" font-family="Arial" fill="#ffffff">Why Use Abstract Classes?</text>
<text x="60" y="290" font-size="18" font-family="Arial" fill="#ffffff">Define common interface, enforce implementation, prevent instantiation</text>
</g>
<g id="step3" data-narration="Basic Syntax for Creating an Abstract Class in C++">
<rect x="50" y="330" width="700" height="100" fill="#2563eb" rx="10"/>
<text x="60" y="370" font-size="24" font-family="Arial" fill="#ffffff">Creating Abstract Classes</text>
<text x="60" y="400" font-size="18" font-family="Arial" fill="#ffffff">class Shape { public: virtual double area() const = 0; };</text>
</g>
<g id="step4" data-narration="Implementing Derived Classes from Abstract Base Classes">
<rect x="50" y="440" width="700" height="100" fill="#10b981" rx="10"/>
<text x="60" y="480" font-size="24" font-family="Arial" fill="#ffffff">Derived Classes</text>
<text x="60" y="510" font-size="18" font-family="Arial" fill="#ffffff">class Circle : public Shape { double radius; public: double area() const override; };</text>
</g>
<g id="step5" data-narration="Key Characteristics of Abstract Classes and Their Usage">
<rect x="50" y="560" width="700" height="30" fill="#f59e0b" rx="10"/>
<text x="60" y="590" font-size="24" font-family="Arial" fill="#ffffff">Key Characteristics</text>
</g>
</svg>