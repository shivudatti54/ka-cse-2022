<svg width="420" height="400" data-topic-id="introducing-methods-constructors-the-this_keyword">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1" />
      <stop offset="100%" stop-color="#F7D2C4" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)" />

  <text x="50%" y="20%" font-size="48" fill="#3498db" text-anchor="middle">Introducing Methods, Constructors, The `this` Keyword</text>

  <section data-narration="Methods">
    <rect x="10%" y="30%" width="80%" height="50%" fill="#f9f9f9" rx="10">
      <text x="20%" y="30%" font-size="24" fill="#333" text-anchor="middle">Methods</text>
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" begin="0s" repeatCount="indefinite" />
    </rect>
    <foreignObject x="20%" y="40%" width="60%" height="40%" xml:space="preserve">
      <text x="10%" y="10%" font-size="18" fill="#666">A method is a block of code that performs a specific task.</text>
    </foreignObject>
  </section>

  <section data-narration="Constructor">
    <rect x="10%" y="90%" width="80%" height="50%" fill="#f9f9f9" rx="10">
      <text x="20%" y="90%" font-size="24" fill="#333" text-anchor="middle">Constructors</text>
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" begin="1s" repeatCount="indefinite" />
    </rect>
    <foreignObject x="20%" y="100%" width="60%" height="40%" xml:space="preserve">
      <text x="10%" y="110%" font-size="18" fill="#666">A constructor is a special method that is used to initialize objects when they are created.</text>
    </foreignObject>
  </section>

  <section data-narration="The this keyword">
    <rect x="10%" y="170%" width="80%" height="50%" fill="#f9f9f9" rx="10">
      <text x="20%" y="170%" font-size="24" fill="#333" text-anchor="middle">The `this` keyword</text>
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="4s" begin="2s" repeatCount="indefinite" />
    </rect>
    <foreignObject x="20%" y="180%" width="60%" height="40%" xml:space="preserve">
      <text x="10%" y="190%" font-size="18" fill="#666">The `this` keyword is a reference to the current object.</text>
    </foreignObject>
  </section>

  <footer>
    <rect x="0" y="300" width="100%" height="20%" fill="#3498db" rx="10" />
    <text x="50%" y="310%" font-size="18" fill="#fff" text-anchor="middle">Learn more about Object-Oriented Programming</text>
  </footer>
</svg>