<svg width="420" height="400" data-topic-id="chapter-6-introducing-classes">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="color-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#color-gradient)" rx="10" />
  <!-- Title at top -->
  <text x="50%" y="20" text-anchor="middle" font-size="36" font-family="Arial, sans-serif" fill="#2E4053">
    Chapter 6: Introducing Classes
  </text>
  <!-- Section 1: Introduction to Classes -->
  <section data-narration="Introduction to Classes">
    <rect x="0" y="100" width="420" height="150" fill="#F7F7F7" rx="10" />
    <rect x="0" y="100" width="420" height="150" stroke="#0097A7" stroke-width="2" rx="10" />
    <text x="50%" y="120" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3B5998">
      In Object Oriented Programming (OOP), a class is a blueprint for creating objects that share similar characteristics and behavior.
    </text>
    <animate attributeName="opacity" begin="0s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </section>
  <!-- Section 2: Class Fundamentals -->
  <section data-narration="Class Fundamentals">
    <rect x="0" y="260" width="420" height="150" fill="#F7F7F7" rx="10" />
    <rect x="0" y="260" width="420" height="150" stroke="#0097A7" stroke-width="2" rx="10" />
    <text x="50%" y="280" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3B5998">
      A class consists of:
      <br />
      <br />
      Class Definition: A statement that defines a new class.
      <br />
      <br />
      Class Members: The data and methods that are part of the class.
      <br />
      <br />
      Instantiation: The process of creating an object from a class.
    </text>
    <animate attributeName="opacity" begin="2s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </section>
  <!-- Section 3: Access Modifiers -->
  <section data-narration="Access Modifiers">
    <rect x="0" y="420" width="420" height="150" fill="#F7F7F7" rx="10" />
    <rect x="0" y="420" width="420" height="150" stroke="#0097A7" stroke-width="2" rx="10" />
    <text x="50%" y="440" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3B5998">
      Access Modifiers control access to class members.
      <br />
      <br />
      Public: Can be accessed from anywhere.
      <br />
      <br />
      Private: Can only be accessed within the class.
      <br />
      <br />
      Protected: Can be accessed within the class and by subclasses.
    </text>
    <animate attributeName="opacity" begin="4s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </section>
  <!-- Section 4: Inheritance -->
  <section data-narration="Inheritance">
    <rect x="0" y="590" width="420" height="150" fill="#F7F7F7" rx="10" />
    <rect x="0" y="590" width="420" height="150" stroke="#0097A7" stroke-width="2" rx="10" />
    <text x="50%" y="610" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3B5998">
      Inheritance is the process by which one class can inherit the properties and methods of another class.
    </text>
    <animate attributeName="opacity" begin="6s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </section>
  <!-- Section 5: Polymorphism -->
  <section data-narration="Polymorphism">
    <rect x="0" y="670" width="420" height="150" fill="#F7F7F7" rx="10" />
    <rect x="0" y="670" width="420" height="150" stroke="#0097A7" stroke-width="2" rx="10" />
    <text x="50%" y="690" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3B5998">
      Polymorphism is the ability of an object to take on multiple forms.
    </text>
    <animate attributeName="opacity" begin="8s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </section>
  <!-- Section 6: Declaring Objects -->
  <section data-narration="Declaring Objects">
    <rect x="0" y="750" width="420" height="150" fill="#F7F7F7" rx="10" />
    <rect x="0" y="750" width="420" height="150" stroke="#0097A7" stroke-width="2" rx="10" />
    <text x="50%" y="770" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3B5998">
      An object is created from a class using the `new` keyword.
      <br />
      <br />
      Object reference variable is used to refer to the object.
    </text>
    <animate attributeName="opacity" begin="10s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </section>
  <!-- Section 7: Assigning Object Reference Variables -->
  <section data-narration="Assigning Object Reference Variables">
    <rect x="0" y="830" width="420" height="150" fill="#F7F7F7" rx="10" />
    <rect x="0" y="830" width="420" height="150" stroke="#0097A7" stroke-width="2" rx="10" />
    <text x="50%" y="850" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#3B5998">
      Object reference variable is used to refer to the object created from the class.
      <br />
      <br />
      Assignment operator is used to assign a value to a variable.
    </text>
    <animate attributeName="opacity" begin="12s" dur="2s" from="1" to="0" repeatCount="indefinite" />
  </section>
  <!-- Footer -->
  <text x="50%" y="400" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">
    Chapter 6: Introducing Classes
  </text>
</svg>