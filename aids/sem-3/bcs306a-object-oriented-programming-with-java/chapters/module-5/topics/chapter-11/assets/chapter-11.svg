<svg width="420" height="400" data-topic-id="multithreaded-programming-in-java" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Chapter 11: Multithreaded Programming in Java</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9E4CA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
  <group id="layer-1">
    <rect x="50" y="50" width="220" height="300" fill="#FFFFFF" rx="10"/>
    <text x="50" y="40" font-size="24" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Introduction</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="0s" delay="0s" from="0 0" to="220 0"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="1.5s" delay="0s" from="220 0" to="220 300"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="3s" delay="0s" from="220 300" to="0 300"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="4.5s" delay="0s" from="0 300" to="0 0"/>
    <animateTransform attributeName="transform" type="scale" dur="2000" begin="0s" delay="0s" from="1 1" to="1.2 1.2"/>
    <animateTransform attributeName="transform" type="scale" dur="2000" begin="1.5s" delay="0s" from="1.2 1.2" to="1 1"/>
    <animateTransform attributeName="transform" type="scale" dur="2000" begin="3s" delay="0s" from="1 1" to="1 0.8"/>
    <animateTransform attributeName="transform" type="scale" dur="2000" begin="4.5s" delay="0s" from="1 0.8" to="1.2 1.2"/>
    <text x="100" y="160" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Example 1: Creating a Thread in Java</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="0.5s" delay="0s" from="100 160" to="100 180"/>
    <rect x="100" y="170" width="20" height="20" fill="#FF9900" rx="5"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="1.5s" delay="0s" from="100 180" to="100 200"/>
    <text x="100" y="200" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Thread (extends Thread)</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="2.5s" delay="0s" from="100 200" to="100 220"/>
    <rect x="100" y="210" width="20" height="20" fill="#FF9900" rx="5"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="4s" delay="0s" from="100 220" to="100 240"/>
    <text x="100" y="240" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Runnable (implements Runnable)</text>
  </group>
  <group id="layer-2">
    <rect x="300" y="50" width="220" height="300" fill="#FFFFFF" rx="10"/>
    <text x="300" y="40" font-size="24" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Creating a Thread Programmatically</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="0s" delay="0s" from="300 0" to="300 300"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="1.5s" delay="0s" from="300 300" to="300 320"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="3s" delay="0s" from="300 320" to="300 340"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="4.5s" delay="0s" from="300 340" to="300 360"/>
    <animateTransform attributeName="transform" type="scale" dur="2000" begin="0s" delay="0s" from="1 1" to="1.2 1.2"/>
    <animateTransform attributeName="transform" type="scale" dur="2000" begin="1.5s" delay="0s" from="1.2 1.2" to="1 1"/>
    <animateTransform attributeName="transform" type="scale" dur="2000" begin="3s" delay="0s" from="1 1" to="1 0.8"/>
    <animateTransform attributeName="transform" type="scale" dur="2000" begin="4.5s" delay="0s" from="1 0.8" to="1.2 1.2"/>
    <text x="370" y="160" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Thread thread = new Thread(new MyRunnable());</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="1s" delay="0s" from="370 160" to="370 180"/>
    <rect x="370" y="170" width="20" height="20" fill="#FF9900" rx="5"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="2s" delay="0s" from="370 180" to="370 200"/>
    <text x="370" y="200" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">thread.start();</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="3s" delay="0s" from="370 200" to="370 220"/>
    <rect x="370" y="210" width="20" height="20" fill="#FF9900" rx="5"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="4s" delay="0s" from="370 220" to="370 240"/>
    <text x="370" y="240" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Thread States</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="4.5s" delay="0s" from="370 240" to="370 260"/>
    <rect x="370" y="250" width="20" height="20" fill="#FF9900" rx="5"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="5.5s" delay="0s" from="370 260" to="370 280"/>
    <text x="370" y="280" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Thread States: New, Runnable, Running, Blocked</text>
  </group>
  <group id="layer-3">
    <rect x="50" y="350" width="220" height="50" fill="#FFFFFF" rx="10"/>
    <text x="50" y="340" font-size="18" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Conclusion</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="0s" delay="0s" from="50 350" to="50 370"/>
    <rect x="50" y="360" width="20" height="20" fill="#FF9900" rx="5"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="1s" delay="0s" from="50 370" to="50 390"/>
    <text x="50" y="390" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">Thank you for learning about multithreaded programming in Java!</text>
  </group>
  <group id="layer-4">
    <rect x="300" y="350" width="220" height="50" fill="#FFFFFF" rx="10"/>
    <text x="300" y="340" font-size="18" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">References</text>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="0s" delay="0s" from="300 350" to="300 370"/>
    <rect x="300" y="360" width="20" height="20" fill="#FF9900" rx="5"/>
    <animateTransform attributeName="transform" type="translate" dur="2000" begin="1s" delay="0s" from="300 370" to="300 390"/>
    <text x="300" y="390" font-size="18" font-weight="normal" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">For more information, please visit our website.</text>
  </group>
  <rect x="50" y="0" width="100%" height="20" fill="#2F4F7F" rx="10"/>
  <rect x="0" y="400" width="100%" height="20" fill="#2F4F7F" rx="10"/>
</svg>