<svg width="420" height="400" data-topic-id="interfaces-interfaces-default-interface-methods-us" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:focus="http://www.w3.org/TR/WAI-ARIA-practices/">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#pastel-gradient)" opacity="0.5"/>
  
  <!-- Title at top -->
  <g transform="translate(10, 10)">
    <text font-size="36" font-family="Arial, sans-serif" text-anchor="start">
      Interfaces, Default Interface Methods, Us
    </text>
  </g>
  
  <!-- Section 1: Introduction -->
  <g transform="translate(20, 100)">
    <rect width="350" height="30" rx="5" fill="#F7F7F7" opacity="1"/>
    <animate xlink:href="#title" attributeName="opacity" from="1" to="0" dur="1s" begin="0s"/>
    <animate xlink:href="#text" attributeName="opacity" from="1" to="0" dur="1s" begin="0.5s"/>
    <text id="title" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
      Introduction
    </text>
    <text id="text" font-size="18" font-family="Arial, sans-serif" text-anchor="start" opacity="0">
      In Java, an interface is a abstract class that can't be instantiated on its own and is used to achieve abstraction.
    </text>
  </g>
  
  <!-- Section 2: Definition and Characteristics -->
  <g transform="translate(20, 150)">
    <rect width="350" height="30" rx="5" fill="#F7F7F7" opacity="1"/>
    <animate xlink:href="#title" attributeName="opacity" from="1" to="0" dur="1s" begin="1s"/>
    <animate xlink:href="#text" attributeName="opacity" from="1" to="0" dur="1s" begin="1.5s"/>
    <text id="title" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
      Definition and Characteristics
    </text>
    <text id="text" font-size="18" font-family="Arial, sans-serif" text-anchor="start" opacity="0">
      An interface is a keyword used in Java to define a contract that must be implemented by any class that implements it.
      An interface is an abstract class and can't be instantiated.
      An interface can have multiple inheritance.
      An interface can have multiple methods and variables.
      A class can implement multiple interfaces.
    </text>
  </g>
  
  <!-- Section 3: Default Interface Methods -->
  <g transform="translate(20, 200)">
    <rect width="350" height="30" rx="5" fill="#F7F7F7" opacity="1"/>
    <animate xlink:href="#title" attributeName="opacity" from="1" to="0" dur="1s" begin="2s"/>
    <animate xlink:href="#text" attributeName="opacity" from="1" to="0" dur="1s" begin="2.5s"/>
    <text id="title" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
      Default Interface Methods
    </text>
    <text id="text" font-size="18" font-family="Arial, sans-serif" text-anchor="start" opacity="0">
      In Java 8 and later versions, default interface methods were introduced.
      These methods can be implemented in interfaces.
    </text>
  </g>
  
  <!-- Section 4: Use of Static Methods in an Interface -->
  <g transform="translate(20, 250)">
    <rect width="350" height="30" rx="5" fill="#F7F7F7" opacity="1"/>
    <animate xlink:href="#title" attributeName="opacity" from="1" to="0" dur="1s" begin="3s"/>
    <animate xlink:href="#text" attributeName="opacity" from="1" to="0" dur="1s" begin="3.5s"/>
    <text id="title" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
      Use of Static Methods in an Interface
    </text>
    <text id="text" font-size="18" font-family="Arial, sans-serif" text-anchor="start" opacity="0">
      In Java, static methods can be declared in interfaces.
      These methods can be static or non-static.
    </text>
  </g>
  
  <!-- Section 5: Conclusion -->
  <g transform="translate(20, 300)">
    <rect width="350" height="30" rx="5" fill="#F7F7F7" opacity="1"/>
    <animate xlink:href="#title" attributeName="opacity" from="1" to="0" dur="1s" begin="4s"/>
    <animate xlink:href="#text" attributeName="opacity" from="1" to="0" dur="1s" begin="4.5s"/>
    <text id="title" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
      Conclusion
    </text>
    <text id="text" font-size="18" font-family="Arial, sans-serif" text-anchor="start" opacity="0">
      In conclusion, interfaces are a powerful tool in Java for achieving abstraction.
      They provide a blueprint for implementing classes to follow.
    </text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 380)">
    <rect width="100%" height="30" rx="5" fill="#F7F7F7" opacity="1"/>
    <animate xlink:href="#footer" attributeName="opacity" from="1" to="0" dur="1s" begin="5s"/>
    <text id="footer" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      End of tutorial
    </text>
  </g>
</svg>