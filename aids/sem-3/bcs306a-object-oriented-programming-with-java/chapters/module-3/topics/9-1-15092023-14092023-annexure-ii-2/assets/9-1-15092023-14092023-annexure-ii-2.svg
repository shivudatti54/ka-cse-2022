<svg width="420" height="400" data-topic-id="oop-inheritance" xmlns="http://www.w3.org/2000/svg">
  <desc>Object Oriented Programming with JAVA - Inheritance Basics</desc>
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="1" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <style>
      .title {
        font-size: 24px;
        font-weight: bold;
      }
      .annotation {
        font-size: 18px;
        font-weight: normal;
        fill: #666;
      }
      .connection {
        stroke: #03A9F4;
        stroke-width: 2;
        stroke-dasharray: 5,2;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="360" style="fill: url(#pastel-gradient)"/>
  <text x="50" y="50" class="title">Inheritance Basics</text>
  <text x="20" y="120" class="annotation" data-narration="What is Inheritance?">Inheritance is a mechanism that allows one class to inherit the attributes and methods of another class.</text>
  <rect x="15" y="150" width="350" height="60" rx="10" style="fill: #F7F7F7"/>
  <text x="40" y="160" class="annotation" data-narration="Types of Inheritance">There are three types of inheritance:</text>
  <text x="40" y="180" class="annotation" data-narration="Single Inheritance">Single Inheritance: A child class inherits from a single parent class.</text>
  <text x="40" y="200" class="annotation" data-narration="Multilevel Inheritance">Multilevel Inheritance: A child class inherits from a parent class that itself inherits from another parent class.</text>
  <rect x="15" y="230" width="350" height="60" rx="10" style="fill: #F7F7F7"/>
  <text x="40" y="240" class="annotation" data-narration="Using the super Keyword">The `super` keyword is used to access the parent class's members from a child class.</text>
  <text x="40" y="260" class="annotation" data-narration="Calling a parent class's constructor: `super()`">To call a parent class's constructor: `super()`</text>
  <rect x="15" y="290" width="350" height="60" rx="10" style="fill: #F7F7F7"/>
  <text x="40" y="300" class="annotation" data-narration="Creating a Multilevel Hierarchy">A multilevel hierarchy is created when a child class inherits from a parent class that itself inherits from another parent class.</text>
  <path d="M 50,60 L 80,100" style="stroke: #03A9F4; stroke-width: 2; stroke-dasharray: 5,2"/>
  <path d="M 80,100 L 110,130" style="stroke: #03A9F4; stroke-width: 2; stroke-dasharray: 5,2"/>
  <path d="M 110,130 L 140,160" style="stroke: #03A9F4; stroke-width: 2; stroke-dasharray: 5,2"/>
  <text x="20" y="360" class="annotation" data-narration="Indigo, Teal, Orange Accents">Color Scheme: Indigo, Teal, Orange Accents</text>
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="rotate(360 200 200)" begin="0s" dur="2s"/>
  </animate>
</svg>