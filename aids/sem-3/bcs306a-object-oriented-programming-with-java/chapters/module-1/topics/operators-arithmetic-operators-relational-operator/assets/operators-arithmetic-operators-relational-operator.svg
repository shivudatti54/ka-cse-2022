<svg width="420" height="400" data-topic-id="arithmetic-operators-relational-operators">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#A7C3F7" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%" rx="10" />
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="400" height="220" fill="#FFFFFF" rx="10" />
    <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F">Arithmetic Operators</text>
    <text x="10" y="40" font-size="14" font-family="Arial" fill="#999999">Relational Operators</text>
    <section data-narration="Arithmetic Operators">
      <rect x="0" y="60" width="400" height="50" fill="#F2C464" rx="10" />
      <rect x="0" y="110" width="400" height="50" fill="#F2C464" rx="10" />
      <rect x="0" y="160" width="400" height="50" fill="#F2C464" rx="10" />
      <rect x="0" y="210" width="400" height="50" fill="#F2C464" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0 110" to="0 170" begin="0s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 170" to="0 230" begin="2s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 230" to="0 290" begin="4s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 290" to="0 350" begin="6s" dur="2s" repeatCount="indefinite" />
      <text x="10" y="170" font-size="14" font-family="Arial" fill="#2F4F7F">Order of Operations</text>
      <text x="10" y="190" font-size="14" font-family="Arial" fill="#999999">Parentheses, Exponents, Multiplication and Division, Addition and Subtraction</text>
    </section>
    <section data-narration="Relational Operators">
      <rect x="0" y="260" width="400" height="50" fill="#2F4F7F" rx="10" />
      <rect x="0" y="310" width="400" height="50" fill="#2F4F7F" rx="10" />
      <rect x="0" y="360" width="400" height="50" fill="#2F4F7F" rx="10" />
      <rect x="0" y="410" width="400" height="50" fill="#2F4F7F" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0 310" to="0 370" begin="0s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 370" to="0 430" begin="2s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 430" to="0 490" begin="4s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 490" to="0 550" begin="6s" dur="2s" repeatCount="indefinite" />
      <text x="10" y="370" font-size="14" font-family="Arial" fill="#2F4F7F">Equal to, Not Equal to, Greater than, Less than, Greater than or Equal to, Less than or Equal to</text>
      <text x="10" y="390" font-size="14" font-family="Arial" fill="#999999">Order of Operations is from left to right</text>
    </section>
    <section data-narration="Boolean Logical Operators">
      <rect x="0" y="500" width="400" height="50" fill="#FF9900" rx="10" />
      <rect x="0" y="550" width="400" height="50" fill="#FF9900" rx="10" />
      <rect x="0" y="600" width="400" height="50" fill="#FF9900" rx="10" />
      <rect x="0" y="650" width="400" height="50" fill="#FF9900" rx="10" />
      <animateTransform attributeName="transform" type="translate" from="0 550" to="0 610" begin="0s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 610" to="0 670" begin="2s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 670" to="0 730" begin="4s" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" from="0 730" to="0 790" begin="6s" dur="2s" repeatCount="indefinite" />
