<svg width="420" height="400" data-topic-id="object-oriented-programming-with-java-chapter-2" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B5998" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4C5154" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%" rx="10"/>
  <text text-anchor="middle" x="210" y="20" font-size="24" fill="#fff">Chapter 2: Object-Oriented Programming</text>
  <rect x="0" y="50" width="420" height="10" fill="#fff" rx="5"/>
  <text text-anchor="start" x="15" y="30" font-size="16" fill="#333">What is Object Oriented Programming (OOP)?</text>
  <section data-narration="Two Paradigms of OOP">
    <rect x="0" y="70" width="420" height="50" fill="#fff" rx="5"/>
    <text text-anchor="start" x="15" y="80" font-size="16" fill="#333">Two Paradigms:</text>
    <path stroke="#333" stroke-width="2" fill="none" d="M 20 20 L 400 20"/>
    <animateTransform attributeName="transform" type="translate" from="0 50" to="0 300" dur="2s" begin="0s"/>
    <text text-anchor="start" x="15" y="110" font-size="16" fill="#333">Class-Based Programming</text>
    <path stroke="#333" stroke-width="2" fill="none" d="M 20 250 L 400 250"/>
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 350" dur="2s" begin="0s"/>
    <text text-anchor="start" x="15" y="270" font-size="16" fill="#333">Prototype-Based Programming</text>
  </section>
  <section data-narration="Abstraction">
    <rect x="0" y="420" width="420" height="150" fill="#fff" rx="5"/>
    <text text-anchor="start" x="15" y="430" font-size="16" fill="#333">Abstraction:</text>
    <path stroke="#333" stroke-width="2" fill="none" d="M 20 400 L 400 400"/>
    <animateTransform attributeName="transform" type="translate" from="0 450" to="0 550" dur="2s" begin="0s"/>
    <text text-anchor="start" x="15" y="470" font-size="16" fill="#333">Definition:</text>
    <text text-anchor="start" x="15" y="490" font-size="16" fill="#333">Abstraction is the process of showing only the necessary information to the outside world while hiding the implementation details.</text>
    <text text-anchor="start" x="15" y="510" font-size="16" fill="#333">Example:</text>
    <code>
      <pre>
        public class BankAccount {
          private double balance;

          public BankAccount(double balance) {
            this.balance = balance;
          }

          public double getBalance() {
            return balance;
          }

          public void deposit(double amount) {
            balance += amount;
          }

          public void withdraw(double amount) {
            balance -= amount;
          }
        }
      </pre>
    </section>
  </svg>