<svg viewBox="0 0 800 1300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    
    @keyframes codeReveal {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background - placed OUTSIDE all step groups -->
  <rect width="800" height="1300" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="This diagram covers Java's var keyword introduced in Java 10 for local variable type inference.">
    <rect x="20" y="15" width="760" height="45" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">Type Inference with var Keyword in Java</text>
    <text x="400" y="58" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="11">Java 10+ Local Variable Type Inference (LVTI)</text>
  </g>
  
  <!-- Step 1: What is Type Inference? -->
  <g class="step" id="step1" data-narration="Type inference allows the compiler to automatically determine a variable's type from its initializer value.">
    <rect x="40" y="75" width="720" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <rect x="40" y="75" width="5" height="85" rx="2" fill="#1976d2"/>
    <text x="60" y="95" fill="#1565c0" font-family="Arial" font-size="12" font-weight="bold">What is Type Inference?</text>
    <text x="60" y="118" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">Type inference is the compiler's ability to automatically</tspan>
      <tspan x="60" dy="14">determine a variable's data type from its initializer value.</tspan>
    </text>
    <rect x="450" y="95" width="290" height="50" rx="5" fill="#ffffff" stroke="#bbdefb"/>
    <text x="460" y="112" fill="#1565c0" font-family="Consolas" font-size="10" font-weight="bold">var x = 10;  // Compiler infers: int</text>
    <text x="460" y="128" fill="#1565c0" font-family="Consolas" font-size="10" font-weight="bold">var name = "John";  // Compiler infers: String</text>
  </g>
  
  <!-- Step 2: Why var keyword? -->
  <g class="step" id="step2" data-narration="The var keyword reduces boilerplate code and aligns Java with modern languages like Python and Kotlin.">
    <rect x="40" y="175" width="720" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <rect x="40" y="175" width="5" height="85" rx="2" fill="#ff9800"/>
    <text x="60" y="195" fill="#e65100" font-family="Arial" font-size="12" font-weight="bold">Why var keyword?</text>
    <text x="60" y="218" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">Reduces boilerplate code, improves readability, and aligns Java</tspan>
      <tspan x="60" dy="14">with modern languages like Python, JavaScript, and Kotlin.</tspan>
    </text>
    <rect x="350" y="190" width="180" height="55" rx="5" fill="#ffcdd2"/>
    <text x="360" y="205" fill="#c62828" font-family="Arial" font-size="9" font-weight="bold">Before Java 10:</text>
    <text x="360" y="222" fill="#c62828" font-family="Consolas" font-size="9">List&lt;String&gt; list = new ArrayList&lt;String&gt;();</text>
    <rect x="540" y="190" width="200" height="55" rx="5" fill="#c8e6c9"/>
    <text x="550" y="205" fill="#2e7d32" font-family="Arial" font-size="9" font-weight="bold">With Java 10+:</text>
    <text x="550" y="222" fill="#2e7d32" font-family="Consolas" font-size="9">var list = new ArrayList&lt;String&gt;();</text>
  </g>
  
  <!-- Step 3: Rule - Initializer Mandatory -->
  <g class="step" id="step3" data-narration="The variable must be initialized at declaration time so the compiler can infer its type.">
    <rect x="40" y="275" width="720" height="95" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <rect x="40" y="275" width="5" height="95" rx="2" fill="#f44336"/>
    <text x="60" y="295" fill="#c62828" font-family="Arial" font-size="12" font-weight="bold">Rule 1: Initializer is Mandatory</text>
    <text x="60" y="318" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">The variable MUST be initialized at declaration time. The compiler needs</tspan>
      <tspan x="60" dy="14">the initializer to infer the type. Without it, compilation fails.</tspan>
    </text>
    <rect x="60" y="335" width="320" height="28" rx="4" fill="#c8e6c9" stroke="#4caf50"/>
    <text x="70" y="352" fill="#2e7d32" font-family="Consolas" font-size="10">✓ var x = 10; // Valid - infers int</text>
    <rect x="400" y="335" width="340" height="28" rx="4" fill="#ffcdd2" stroke="#f44336"/>
    <text x="410" y="352" fill="#c62828" font-family="Consolas" font-size="10">✗ var x; // ERROR - cannot infer type</text>
  </g>
  
  <!-- Step 4: Rule - Only Local Variables -->
  <g class="step" id="step4" data-narration="var can only be used for local variables inside methods and constructors, not for instance variables.">
    <rect x="40" y="385" width="720" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <rect x="40" y="385" width="5" height="95" rx="2" fill="#388e3c"/>
    <text x="60" y="405" fill="#1b5e20" font-family="Arial" font-size="12" font-weight="bold">Rule 2: Only for Local Variables</text>
    <text x="60" y="428" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">var can only be used inside methods, constructors, or initializer blocks.</tspan>
      <tspan x="60" dy="14">It CANNOT be used for instance variables, method parameters, or return types.</tspan>
    </text>
    <rect x="60" y="445" width="160" height="28" rx="4" fill="#c8e6c9" stroke="#4caf50"/>
    <text x="70" y="462" fill="#2e7d32" font-family="Arial" font-size="9">✓ Inside methods</text>
    <rect x="230" y="445" width="160" height="28" rx="4" fill="#c8e6c9" stroke="#4caf50"/>
    <text x="240" y="462" fill="#2e7d32" font-family="Arial" font-size="9">✓ Inside constructors</text>
    <rect x="400" y="445" width="160" height="28" rx="4" fill="#c8e6c9" stroke="#4caf50"/>
    <text x="410" y="462" fill="#2e7d32" font-family="Arial" font-size="9">✓ Initializer blocks</text>
    <rect x="570" y="445" width="170" height="28" rx="4" fill="#ffcdd2" stroke="#f44336"/>
    <text x="580" y="462" fill="#c62828" font-family="Arial" font-size="9">✗ Instance variables</text>
  </g>
  
  <!-- Step 5: Rule - Null Not Allowed -->
  <g class="step" id="step5" data-narration="You cannot initialize var with null because the compiler cannot infer a specific type from null.">
    <rect x="40" y="495" width="720" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <rect x="40" y="495" width="5" height="85" rx="2" fill="#f44336"/>
    <text x="60" y="515" fill="#c62828" font-family="Arial" font-size="12" font-weight="bold">Rule 3: Null Initialization Not Allowed</text>
    <text x="60" y="538" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">You cannot initialize var with null. The compiler cannot infer a type from null</tspan>
      <tspan x="60" dy="14">because null is compatible with any object reference type.</tspan>
    </text>
    <rect x="420" y="520" width="320" height="45" rx="4" fill="#ffcdd2" stroke="#f44336"/>
    <text x="430" y="538" fill="#c62828" font-family="Consolas" font-size="10">✗ var x = null; // ERROR</text>
    <text x="430" y="555" fill="#c62828" font-family="Arial" font-size="9">Cannot infer type from null value</text>
  </g>
  
  <!-- Step 6: Not a Keyword -->
  <g class="step" id="step6" data-narration="var is a reserved type name but not a reserved keyword, so you can still use it as an identifier.">
    <rect x="40" y="595" width="720" height="75" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <rect x="40" y="595" width="5" height="75" rx="2" fill="#9c27b0"/>
    <text x="60" y="615" fill="#6a1b9a" font-family="Arial" font-size="12" font-weight="bold">Rule 4: Not a Reserved Keyword</text>
    <text x="60" y="638" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">var is a "reserved type name" but NOT a reserved keyword. You can still use 'var' as</tspan>
      <tspan x="60" dy="14">an identifier (variable, method, class name) without breaking existing code.</tspan>
    </text>
    <rect x="480" y="612" width="260" height="42" rx="4" fill="#e1bee7"/>
    <text x="490" y="630" fill="#6a1b9a" font-family="Consolas" font-size="10">int var = 5; // Still valid!</text>
    <text x="490" y="647" fill="#6a1b9a" font-family="Consolas" font-size="10">String var = "hello";</text>
  </g>
  
  <!-- Step 7: Diamond Operator -->
  <g class="step" id="step7" data-narration="var works with generics and the diamond operator to infer specific types in Java 11+.">
    <rect x="40" y="685" width="720" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <rect x="40" y="685" width="5" height="85" rx="2" fill="#1976d2"/>
    <text x="60" y="705" fill="#1565c0" font-family="Arial" font-size="12" font-weight="bold">Rule 5: Works with Diamond Operator</text>
    <text x="60" y="728" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">var works with generics and the diamond operator. In Java 10, it infers Object.</tspan>
      <tspan x="60" dy="14">In Java 11+, it can infer more specific types from assignment context.</tspan>
    </text>
    <rect x="60" y="745" width="340" height="20" rx="3" fill="#bbdefb"/>
    <text x="70" y="759" fill="#0d47a1" font-family="Consolas" font-size="10">var list = new ArrayList&lt;String&gt;(); // Infers ArrayList&lt;String&gt;</text>
    <rect x="420" y="745" width="320" height="20" rx="3" fill="#bbdefb"/>
    <text x="430" y="759" fill="#0d47a1" font-family="Consolas" font-size="10">var map = new HashMap&lt;Integer, String&gt;();</text>
  </g>
  
  <!-- Step 8: Multiple Variables Not Allowed -->
  <g class="step" id="step8" data-narration="You cannot declare multiple variables in a single statement using var; each needs its own declaration.">
    <rect x="40" y="785" width="720" height="75" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <rect x="40" y="785" width="5" height="75" rx="2" fill="#f44336"/>
    <text x="60" y="805" fill="#c62828" font-family="Arial" font-size="12" font-weight="bold">Rule 6: Cannot Declare Multiple Variables</text>
    <text x="60" y="828" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">You cannot declare multiple variables in a single statement using var.</tspan>
      <tspan x="60" dy="14">Each variable must have its own declaration with an initializer.</tspan>
    </text>
    <rect x="480" y="805" width="260" height="42" rx="4" fill="#ffcdd2" stroke="#f44336"/>
    <text x="490" y="823" fill="#c62828" font-family="Consolas" font-size="10">✗ var a = 1, b = 2;</text>
    <text x="490" y="840" fill="#c62828" font-family="Consolas" font-size="10">// ERROR</text>
  </g>
  
  <!-- Step 9: Lambda and var (Java 11) -->
  <g class="step" id="step9" data-narration="Java 11 introduced var in lambda parameters, allowing type annotations on lambda parameters.">
    <rect x="40" y="875" width="720" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <rect x="40" y="875" width="5" height="85" rx="2" fill="#388e3c"/>
    <text x="60" y="895" fill="#1b5e20" font-family="Arial" font-size="12" font-weight="bold">Java 11 Enhancement: var in Lambda Parameters</text>
    <text x="60" y="918" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">Java 11 introduced the ability to use var in lambda parameters. This allows</tspan>
      <tspan x="60" dy="14">adding type annotations (like @NonNull) to lambda parameters when needed.</tspan>
    </text>
    <rect x="60" y="935" width="340" height="20" rx="3" fill="#c8e6c9"/>
    <text x="70" y="949" fill="#1b5e20" font-family="Consolas" font-size="10">Function&lt;String, Integer&gt; f = s -&gt; s.length();</text>
    <rect x="420" y="935" width="320" height="20" rx="3" fill="#c8e6c9"/>
    <text x="430" y="949" fill="#1b5e20" font-family="Consolas" font-size="10">Function&lt;String, Integer&gt; f = (@NonNull var s) -&gt; s.length();</text>
  </g>
  
  <!-- Step 10: Limitations Summary -->
  <g class="step" id="step10" data-narration="Key limitations: var cannot be used for fields, parameters, return types, compound declarations, or null.">
    <rect x="40" y="975" width="720" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <rect x="40" y="975" width="5" height="85" rx="2" fill="#ff9800"/>
    <text x="60" y="995" fill="#e65100" font-family="Arial" font-size="12" font-weight="bold">Limitations of var</text>
    <g>
      <rect x="60" y="1010" width="110" height="18" rx="3" fill="#ffe0b2"/>
      <text x="65" y="1023" fill="#e65100" font-family="Arial" font-size="8">✗ Field declarations</text>
      <rect x="180" y="1010" width="130" height="18" rx="3" fill="#ffe0b2"/>
      <text x="185" y="1023" fill="#e65100" font-family="Arial" font-size="8">✗ Method parameters</text>
      <rect x="320" y="1010" width="110" height="18" rx="3" fill="#ffe0b2"/>
      <text x="325" y="1023" fill="#e65100" font-family="Arial" font-size="8">✗ Return types</text>
      <rect x="440" y="1010" width="120" height="18" rx="3" fill="#ffe0b2"/>
      <text x="445" y="1023" fill="#e65100" font-family="Arial" font-size="8">✗ Compound decl.</text>
      <rect x="570" y="1010" width="100" height="18" rx="3" fill="#ffe0b2"/>
      <text x="575" y="1023" fill="#e65100" font-family="Arial" font-size="8">✗ Without init.</text>
      <rect x="680" y="1010" width="60" height="18" rx="3" fill="#ffe0b2"/>
      <text x="685" y="1023" fill="#e65100" font-family="Arial" font-size="8">✗ null</text>
    </g>
  </g>
  
  <!-- Step 11: Code Example Recap -->
  <g class="step" id="step11" data-narration="Both explicit typing and var produce identical bytecode; Java remains statically typed throughout.">
    <rect x="40" y="1075" width="720" height="95" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <rect x="40" y="1075" width="5" height="95" rx="2" fill="#1976d2"/>
    <text x="60" y="1095" fill="#1565c0" font-family="Arial" font-size="12" font-weight="bold">Code Examples: Circle Calculation</text>
    <text x="60" y="1118" fill="#424242" font-family="Arial" font-size="10">
      <tspan x="60">Both explicit typing and var produce identical bytecode. The compiler infers</tspan>
      <tspan x="60" dy="14">types at compile-time. Java remains statically typed throughout.</tspan>
    </text>
    <rect x="60" y="1130" width="335" height="35" rx="4" fill="#ffffff" stroke="#1976d2"/>
    <text x="70" y="1145" fill="#1565c0" font-family="Consolas" font-size="9">double radius = 5.5;</text>
    <text x="70" y="1158" fill="#1565c0" font-family="Consolas" font-size="9">double area = Math.PI * radius * radius;</text>
    <rect x="405" y="1130" width="335" height="35" rx="4" fill="#ffffff" stroke="#388e3c"/>
    <text x="415" y="1145" fill="#2e7d32" font-family="Consolas" font-size="9">var r = 5.5;</text>
    <text x="415" y="1158" fill="#2e7d32" font-family="Consolas" font-size="9">var circleArea = Math.PI * r * r;</text>
  </g>
  
  <!-- Step 12: Key Takeaways -->
  <g class="step" id="step12" data-narration="Key takeaways: var requires initialization, works only for local variables, and maintains static typing.">
    <rect x="40" y="1185" width="720" height="95" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <rect x="40" y="1185" width="5" height="95" rx="2" fill="#9c27b0"/>
    <text x="60" y="1205" fill="#6a1b9a" font-family="Arial" font-size="12" font-weight="bold">Key Takeaways</text>
    <g>
      <circle cx="70" cy="1225" r="4" fill="#7b1fa2"/>
      <text x="82" y="1228" fill="#424242" font-family="Arial" font-size="10">var requires mandatory initialization at declaration</text>
      <circle cx="70" cy="1243" r="4" fill="#7b1fa2"/>
      <text x="82" y="1246" fill="#424242" font-family="Arial" font-size="10">Only for local variables - not instance variables or parameters</text>
      <circle cx="420" cy="1225" r="4" fill="#7b1fa2"/>
      <text x="432" y="1228" fill="#424242" font-family="Arial" font-size="10">Java remains statically typed - type inferred at compile-time</text>
      <circle cx="420" cy="1243" r="4" fill="#7b1fa2"/>
      <text x="432" y="1246" fill="#424242" font-family="Arial" font-size="10">var reduces boilerplate without sacrificing type safety</text>
    </g>
  </g>
  
  <!-- Connecting lines between sections -->
  <g>
    <line x1="45" y1="170" x2="45" y2="175" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="270" x2="45" y2="275" stroke="#f44336" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="380" x2="45" y2="385" stroke="#388e3c" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="490" x2="45" y2="495" stroke="#f44336" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="590" x2="45" y2="595" stroke="#9c27b0" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="680" x2="45" y2="685" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="780" x2="45" y2="785" stroke="#f44336" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="870" x2="45" y2="875" stroke="#388e3c" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="970" x2="45" y2="975" stroke="#ff9800" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="1070" x2="45" y2="1075" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="45" y1="1180" x2="45" y2="1185" stroke="#9c27b0" stroke-width="2" stroke-dasharray="4,2"/>
  </g>
</svg>