<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffebee"/>
      <stop offset="100%" stop-color="#ffcdd2"/>
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Code font style -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');
      .step { animation: fadeInSlide 0.6s ease-out; }
      .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
      .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
      .step .code-text { animation: textReveal 0.4s ease-out 0.4s backwards; font-family: 'Fira Code', monospace; }
      
      @keyframes fadeInSlide {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes textReveal {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 300; }
        to { stroke-dashoffset: 0; }
      }
      
      .title-text { font-family: 'Segoe UI', sans-serif; font-weight: 700; }
      .body-text { font-family: 'Segoe UI', sans-serif; }
      .code-text { font-family: 'Fira Code', monospace; font-size: 10px; }
      .keyword { fill: #9c27b0; font-weight: 600; }
      .string { fill: #2e7d32; }
      .type { fill: #1565c0; }
      .comment { fill: #757575; }
      
      .highlight-anim { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1200" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0">
    <rect x="20" y="10" width="760" height="45" rx="10" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" font-size="22" class="title-text">The this Keyword in Java</text>
  </g>
  
  <!-- Step 1: What is this? -->
  <g class="step" id="step1" data-narration="The this keyword refers to the current object inside a class. It's like pointing to yourself.">
    <rect x="20" y="65" width="760" height="85" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="40" y="88" fill="#1565c0" font-size="13" class="title-text" font-weight="600">What is the this Keyword?</text>
    <text x="40" y="110" fill="#424242" font-size="11" class="body-text">The this keyword is a reference variable that refers to the</text>
    <text x="40" y="125" fill="#424242" font-size="11" class="body-text"><tspan fill="#d32f2f" font-weight="600">current object</tspan> of the class. It's used to access instance</text>
    <text x="40" y="140" fill="#424242" font-size="11" class="body-text">variables and methods within the same class.</text>
    <!-- Animated this keyword illustration -->
    <rect x="580" y="80" width="180" height="55" rx="6" fill="white" stroke="#1565c0" stroke-width="2"/>
    <text x="670" y="108" text-anchor="middle" fill="#424242" font-size="11">Current Object</text>
    <text x="670" y="125" text-anchor="middle" fill="#9c27b0" font-size="16" font-weight="600">this</text>
  </g>
  
  <!-- Step 2: Why do we need it? -->
  <g class="step" id="step2" data-narration="We need this to solve naming conflicts when parameter names match instance variable names.">
    <rect x="20" y="160" width="760" height="85" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="40" y="183" fill="#e65100" font-size="13" class="title-text" font-weight="600">Why Do We Need this?</text>
    <text x="40" y="205" fill="#424242" font-size="11" class="body-text">When constructor or method parameters have the same name as</text>
    <text x="40" y="220" fill="#424242" font-size="11" class="body-text">instance variables, they <tspan fill="#d32f2f" font-weight="600">shadow</tspan> the instance variables.</text>
    <text x="40" y="235" fill="#424242" font-size="11" class="body-text">The <tspan fill="#9c27b0" font-weight="600">this</tspan> keyword resolves this naming conflict!</text>
    <!-- Visual comparison -->
    <line x1="520" y1="180" x2="520" y2="230" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="610" y="195" fill="#424242" font-size="10">Parameter</text>
    <text x="610" y="220" fill="#1565c0" font-size="10">Instance Var</text>
    <path d="M 565 200 L 600 200" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowHead)"/>
    <path d="M 565 220 L 600 220" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowHead)"/>
  </g>
  
  <!-- Step 3: Basic Example -->
  <g class="step" id="step3" data-narration="Here's a constructor where this distinguishes the instance variable name from the parameter name.">
    <rect x="20" y="255" width="760" height="105" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="40" y="278" fill="#2e7d32" font-size="13" class="title-text" font-weight="600">Example: Distinguishing Instance Variables</text>
    <!-- Code block -->
    <rect x="40" y="295" width="340" height="55" rx="5" fill="#263238"/>
    <text x="55" y="315" fill="#ffeb3b" font-size="10" class="code-text"><tspan class="keyword">public class</tspan> Student {</text>
    <text x="65" y="330" fill="#b0bec5" font-size="10" class="code-text"><tspan class="type">private</tspan> <tspan class="type">String</tspan> name;</text>
    <text x="65" y="345" fill="#b0bec5" font-size="10" class="code-text"><tspan class="keyword">public</tspan> Student(<tspan class="type">String</tspan> name) {</text>
    <!-- Animated this highlighting -->
    <rect x="180" y="335" width="65" height="16" rx="2" fill="none" stroke="#9c27b0" stroke-width="2" class="highlight-anim"/>
    <text x="195" y="347" fill="#ce93d8" font-size="10" class="code-text">this.name</text>
    <!-- Explanation -->
    <text x="420" y="315" fill="#424242" font-size="10" class="body-text"><tspan fill="#9c27b0" font-weight="600">this.name</tspan> = instance variable</text>
    <text x="420" y="332" fill="#424242" font-size="10" class="body-text"><tspan fill="#ff9800" font-weight="600">name</tspan> = constructor parameter</text>
    <text x="420" y="349" fill="#424242" font-size="10" class="body-text">Assignment: instance = parameter</text>
  </g>
  
  <!-- Step 4: Setter Methods -->
  <g class="step" id="step4" data-narration="In setter methods, this helps assign the parameter value to the instance variable clearly.">
    <rect x="20" y="370" width="760" height="100" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="40" y="393" fill="#7b1fa2" font-size="13" class="title-text" font-weight="600">Using this in Setter Methods</text>
    <!-- Code block -->
    <rect x="40" y="410" width="320" height="50" rx="5" fill="#263238"/>
    <text x="55" y="430" fill="#b0bec5" font-size="10" class="code-text"><tspan class="keyword">public void</tspan> setName(<tspan class="type">String</tspan> name) {</text>
    <text x="65" y="447" fill="#ce93d8" font-size="10" class="code-text"><tspan class="keyword">this</tspan>.name = name;</text>
    <text x="55" y="458" fill="#b0bec5" font-size="10" class="code-text">}</text>
    <!-- Visual flow -->
    <rect x="380" y="420" width="120" height="40" rx="5" fill="white" stroke="#ff9800" stroke-width="2"/>
    <text x="440" y="435" text-anchor="middle" fill="#424242" font-size="10">Parameter</text>
    <text x="440" y="450" text-anchor="middle" fill="#ff9800" font-size="11" font-weight="600">name</text>
    <path d="M 360 440 L 375 440" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowHead)"/>
    
    <rect x="520" y="420" width="120" height="40" rx="5" fill="white" stroke="#1565c0" stroke-width="2"/>
    <text x="580" y="435" text-anchor="middle" fill="#424242" font-size="10">Instance Variable</text>
    <text x="580" y="450" text-anchor="middle" fill="#1565c0" font-size="11" font-weight="600">this.name</text>
    <path d="M 505 440 L 515 440" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowHead)"/>
  </g>
  
  <!-- Step 5: Constructor Chaining -->
  <g class="step" id="step5" data-narration="Constructor chaining uses this to call one constructor from another, reducing code duplication.">
    <rect x="20" y="480" width="760" height="110" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="40" y="503" fill="#1565c0" font-size="13" class="title-text" font-weight="600">Constructor Chaining with this()</text>
    <text x="40" y="525" fill="#424242" font-size="10" class="body-text">Use this(parameter1, parameter2) to invoke another constructor in the same class.</text>
    <!-- Code examples -->
    <rect x="40" y="538" width="340" height="42" rx="5" fill="#263238"/>
    <text x="55" y="555" fill="#ffeb3b" font-size="10" class="code-text"><tspan class="keyword">public</tspan> Student(<tspan class="type">String</tspan> name) {</text>
    <text x="65" y="572" fill="#ce93d8" font-size="10" class="code-text"><tspan class="keyword">this</tspan>(name, 0); <tspan class="comment">// calls 2-param constructor</tspan></text>
    
    <rect x="400" y="538" width="340" height="42" rx="5" fill="#263238"/>
    <text x="415" y="555" fill="#ffeb3b" font-size="10" class="code-text"><tspan class="keyword">public</tspan> Student(<tspan class="type">String</tspan> name, <tspan class="type">int</tspan> usn) {</text>
    <text x="425" y="572" fill="#b0bec5" font-size="10" class="code-text"><tspan class="keyword">this</tspan>.name = name;</text>
    
    <!-- Visual diagram -->
    <path d="M 210 585 Q 260 610 350 585" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrowHead)"/>
    <text x="280" y="620" text-anchor="middle" fill="#1565c0" font-size="9">this(name, 0)</text>
  </g>
  
  <!-- Step 6: Passing Current Object -->
  <g class="step" id="step6" data-narration="Use this to pass the current object as a parameter to other methods in the class.">
    <rect x="20" y="600" width="760" height="105" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="40" y="623" fill="#2e7d32" font-size="13" class="title-text" font-weight="600">Passing Current Object as Parameter</text>
    <!-- Code -->
    <rect x="40" y="640" width="350" height="55" rx="5" fill="#263238"/>
    <text x="55" y="660" fill="#b0bec5" font-size="10" class="code-text"><tspan class="keyword">public void</span> printCurrent() {</text>
    <text x="65" y="677" fill="#ce93d8" font-size="10" class="code-text">printStudent(<tspan class="keyword">this</tspan>); <tspan class="comment">// passes current object</tspan></text>
    <text x="55" y="690" fill="#b0bec5" font-size="10" class="code-text">}</text>
    
    <!-- Visual representation -->
    <rect x="420" y="645" width="100" height="50" rx="8" fill="white" stroke="#388e3c" stroke-width="2"/>
    <text x="470" y="670" text-anchor="middle" fill="#424242" font-size="10">Current Object</text>
    <text x="470" y="688" text-anchor="middle" fill="#9c27b0" font-size="14" font-weight="600">this</text>
    
    <path d="M 380 670 L 415 670" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowHead)"/>
    <text x="470" y="715" text-anchor="middle" fill="#388e3c" font-size="9">Passed as parameter</text>
  </g>
  
  <!-- Step 7: Variable Shadowing -->
  <g class="step" id="step7" data-narration="Variable shadowing happens when parameters hide instance variables. See what goes wrong without this.">
    <rect x="20" y="715" width="760" height="105" rx="8" fill="url(#redGradient)" filter="url(#shadow)"/>
    <text x="40" y="738" fill="#c62828" font-size="13" class="title-text" font-weight="600">Variable Shadowing - Without this</text>
    <!-- Wrong code -->
    <rect x="40" y="755" width="300" height="55" rx="5" fill="#263238"/>
    <text x="55" y="775" fill="#b0bec5" font-size="10" class="code-text"><tspan class="keyword">public</tspan> Student(<tspan class="type">String</tspan> name) {</text>
    <text x="65" y="792" fill="#ef5350" font-size="10" class="code-text">name = name; <tspan class="comment">// WRONG! Both refer to parameter</tspan></text>
    <text x="55" y="805" fill="#b0bec5" font-size="10" class="code-text">}</text>
    
    <!-- Cross symbol -->
    <path d="M 55 795 L 100 795" stroke="#f44336" stroke-width="3"/>
    <text x="115" y="790" fill="#f44336" font-size="16" font-weight="700">✗</text>
    
    <!-- Correct version -->
    <rect x="360" y="755" width="300" height="55" rx="5" fill="#263238"/>
    <text x="375" y="775" fill="#b0bec5" font-size="10" class="code-text"><tspan class="keyword">public</span> Student(<tspan class="type">String</tspan> name) {</text>
    <text x="385" y="792" fill="#66bb6a" font-size="10" class="code-text">name = name; <tspan class="comment">// Both refer to parameter</tspan></text>
    <text x="375" y="805" fill="#b0bec5" font-size="10" class="code-text">}</text>
    <text x="440" y="830" text-anchor="middle" fill="#424242" font-size="10">Instance variable NOT updated!</text>
  </g>
  
  <!-- Step 8: Fixed with this -->
  <g class="step" id="step8" data-narration="Adding this fixes the shadowing issue by explicitly referring to the instance variable.">
    <rect x="20" y="830" width="760" height="95" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="40" y="853" fill="#2e7d32" font-size="13" class="title-text" font-weight="600">Fixed with this Keyword</text>
    <!-- Correct code -->
    <rect x="40" y="870" width="340" height="45" rx="5" fill="#263238"/>
    <text x="55" y="890" fill="#b0bec5" font-size="10" class="code-text"><tspan class="keyword">public</tspan> Student(<tspan class="type">String</tspan> name) {</text>
    <text x="65" y="907" fill="#ce93d8" font-size="10" class="code-text"><tspan class="keyword">this</tspan>.name = name; <tspan class="comment">// CORRECT!</tspan></text>
    
    <!-- Visual explanation -->
    <rect x="420" y="875" width="100" height="35" rx="5" fill="white" stroke="#9c27b0" stroke-width="2"/>
    <text x="470" y="893" text-anchor="middle" fill="#9c27b0" font-size="11" font-weight="600">this.name</text>
    <text x="470" y="906" text-anchor="middle" fill="#424242" font-size="9">instance var</text>
    
    <text x="470" y="930" text-anchor="middle" fill="#388e3c" font-size="10">✓ Instance variable updated!</text>
  </g>
  
  <!-- Step 9: Key Syntax Summary -->
  <g class="step" id="step9" data-narration="Remember these four key uses of this: accessing variables, constructor chaining, passing objects, and setters.">
    <rect x="20" y="935" width="760" height="95" rx="8" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="40" y="960" fill="white" font-size="14" class="title-text" font-weight="600">Key Uses of this Keyword</text>
    
    <!-- Four use cases as cards -->
    <rect x="40" y="975" width="170" height="45" rx="5" fill="white" opacity="0.9"/>
    <text x="125" y="992" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="600">Instance Variables</text>
    <text x="125" y="1008" text-anchor="middle" fill="#424242" font-size="9">this.variableName</text>
    
    <rect x="220" y="975" width="170" height="45" rx="5" fill="white" opacity="0.9"/>
    <text x="305" y="992" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="600">Constructor Chaining</text>
    <text x="305" y="1008" text-anchor="middle" fill="#424242" font-size="9">this(param1, param2)</text>
    
    <rect x="400" y="975" width="170" height="45" rx="5" fill="white" opacity="0.9"/>
    <text x="485" y="992" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="600">Pass Object</text>
    <text x="485" y="1008" text-anchor="middle" fill="#424242" font-size="9">method(this)</text>
    
    <rect x="580" y="975" width="170" height="45" rx="5" fill="white" opacity="0.9"/>
    <text x="665" y="992" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="600">Setter Methods</text>
    <text x="665" y="1008" text-anchor="middle" fill="#424242" font-size="9">this.field = value</text>
  </g>
  
  <!-- Step 10: Exam Tips -->
  <g class="step" id="step10" data-narration="For exams, always check parameter names in constructors and setters, and use this to avoid shadowing bugs.">
    <rect x="20" y="1040" width="760" height="80" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="40" y="1063" fill="#e65100" font-size="13" class="title-text" font-weight="600">Exam Tips &amp; Key Takeaways</text>
    <text x="40" y="1085" fill="#424242" font-size="10" class="body-text">• Pay attention to variable names in constructors and setter methods</text>
    <text x="40" y="1102" fill="#424242" font-size="10" class="body-text">• Use <tspan fill="#9c27b0" font-weight="600">this</tspan> to avoid variable shadowing in Java code</text>
    <text x="40" y="1119" fill="#424242" font-size="10" class="body-text">• Be prepared to identify the purpose of <tspan fill="#9c27b0" font-weight="600">this</tspan> in code snippets</text>
  </g>
  
  <!-- Step 11: Visual Summary Diagram -->
  <g class="step" id="step11" data-narration="This diagram shows the complete picture of how this keyword works within a class context.">
    <rect x="20" y="1130" width="760" height="60" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="400" y="1155" text-anchor="middle" fill="#7b1fa2" font-size="12" class="title-text" font-weight="600">Mastering this = Clear, Maintainable Java Code</text>
    <text x="400" y="1175" text-anchor="middle" fill="#424242" font-size="10">Understanding this keyword is essential for object-oriented programming in Java</text>
  </g>
  
  <!-- Animated decorative elements -->
  <g class="decorations">
    <circle cx="750" cy="30" r="15" fill="none" stroke="#e3f2fd" stroke-width="2">
      <animate attributeName="r" values="15;18;15" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="770" cy="50" r="8" fill="none" stroke="#e8f5e9" stroke-width="2">
      <animate attributeName="r" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>