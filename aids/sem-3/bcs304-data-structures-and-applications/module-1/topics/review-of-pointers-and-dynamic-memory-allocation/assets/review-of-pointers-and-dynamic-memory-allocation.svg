<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes drawArrow {
        0% { stroke-dashoffset: 200; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.05); }
      }
      @keyframes allocateBlock {
        0% { opacity: 0; transform: scale(0.5); }
        100% { opacity: 1; transform: scale(1); }
      }

      .title { animation: fadeIn 1s ease-out; }
      .pointer-var { animation: fadeIn 1s ease-out 0.5s both; }
      .memory-block { animation: fadeIn 1s ease-out 1.5s both; }
      .arrow-link {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: drawArrow 1s ease-out 2s both;
      }
      .malloc-label { animation: fadeIn 1s ease-out 3.5s both; }
      .heap-block { animation: allocateBlock 1s ease-out 4.5s both; }
      .malloc-arrow {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: drawArrow 1s ease-out 5.5s both;
      }
      .highlight { animation: pulse 2s ease-in-out infinite; }
    </style>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#00d4ff"/>
    </marker>

    <marker id="arrowhead-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#4ecdc4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0" text-anchor="middle" class="title">
    Pointers and Dynamic Memory Allocation
  </text>

  <!-- Subtitle -->
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="16" fill="#4ecdc4" text-anchor="middle" class="title">
    Understanding how pointers reference memory locations
  </text>

  <!-- SECTION 1: BASIC POINTER CONCEPT -->
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffe66d" class="title">
    1. Basic Pointer Concept
  </text>

  <!-- Pointer Variable -->
  <g class="pointer-var">
    <rect x="100" y="150" width="150" height="80" fill="#ff6b6b" stroke="#ffe66d" stroke-width="3" rx="8"/>
    <text x="175" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
      Pointer p
    </text>
    <text x="175" y="210" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
      1000
    </text>
    <text x="175" y="230" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle">
      (address)
    </text>
  </g>

  <!-- Arrow from pointer to memory -->
  <path d="M 250 190 Q 350 190, 400 230" stroke="#00d4ff" stroke-width="4" fill="none"
        marker-end="url(#arrowhead)" class="arrow-link"/>

  <!-- Memory Block -->
  <g class="memory-block">
    <rect x="400" y="200" width="200" height="100" fill="#00d4ff" stroke="#4ecdc4" stroke-width="3" rx="8"/>
    <text x="500" y="225" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" text-anchor="middle">
      Memory Address: 1000
    </text>
    <text x="500" y="260" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
      42
    </text>
    <text x="500" y="285" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle">
      (value)
    </text>
  </g>

  <!-- Code Example -->
  <g class="pointer-var">
    <rect x="50" y="320" width="280" height="60" fill="#2a2a3e" stroke="#4ecdc4" stroke-width="2" rx="5"/>
    <text x="60" y="345" font-family="Courier New, monospace" font-size="14" fill="#00d4ff">
      int *p;
    </text>
    <text x="60" y="365" font-family="Courier New, monospace" font-size="14" fill="#00d4ff">
      p = &amp;variable;  // p stores address
    </text>
  </g>

  <!-- SECTION 2: DYNAMIC MEMORY ALLOCATION -->
  <text x="50" y="420" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffe66d" class="malloc-label">
    2. Dynamic Memory Allocation with malloc()
  </text>

  <!-- Stack Section Label -->
  <g class="malloc-label">
    <rect x="50" y="450" width="120" height="40" fill="#2a2a3e" stroke="#ff6b6b" stroke-width="2" rx="5"/>
    <text x="110" y="475" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff6b6b" text-anchor="middle">
      STACK
    </text>
  </g>

  <!-- Heap Section Label -->
  <g class="malloc-label">
    <rect x="550" y="450" width="120" height="40" fill="#2a2a3e" stroke="#4ecdc4" stroke-width="2" rx="5"/>
    <text x="610" y="475" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4ecdc4" text-anchor="middle">
      HEAP
    </text>
  </g>

  <!-- Pointer on Stack -->
  <g class="malloc-label">
    <rect x="50" y="500" width="150" height="70" fill="#ff6b6b" stroke="#ffe66d" stroke-width="3" rx="8"/>
    <text x="125" y="525" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
      ptr
    </text>
    <text x="125" y="550" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
      2048
    </text>
  </g>

  <!-- malloc() process -->
  <g class="malloc-label">
    <rect x="230" y="500" width="280" height="70" fill="#2a2a3e" stroke="#ffe66d" stroke-width="2" rx="5"/>
    <text x="370" y="525" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffe66d" text-anchor="middle">
      malloc(sizeof(int))
    </text>
    <text x="370" y="545" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">
      Allocates memory on heap
    </text>
    <text x="370" y="560" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" text-anchor="middle">
      Returns address 2048
    </text>
  </g>

  <!-- Arrow from ptr to heap block -->
  <path d="M 200 535 Q 400 535, 540 535" stroke="#4ecdc4" stroke-width="4" fill="none"
        marker-end="url(#arrowhead-green)" class="malloc-arrow"/>

  <!-- Allocated Heap Block -->
  <g class="heap-block">
    <rect x="540" y="500" width="200" height="70" fill="#4ecdc4" stroke="#00d4ff" stroke-width="3" rx="8"/>
    <text x="640" y="525" font-family="Arial, sans-serif" font-size="14" fill="#1a1a2e" text-anchor="middle">
      Address: 2048
    </text>
    <text x="640" y="550" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a2e" text-anchor="middle">
      (allocated)
    </text>
  </g>

  <!-- Code Example for malloc -->
  <g class="heap-block">
    <rect x="230" y="390" width="350" height="40" fill="#2a2a3e" stroke="#4ecdc4" stroke-width="2" rx="5"/>
    <text x="240" y="415" font-family="Courier New, monospace" font-size="14" fill="#4ecdc4">
      int *ptr = (int*)malloc(sizeof(int));
    </text>
  </g>

  <!-- Legend -->
  <g class="title">
    <rect x="620" y="100" width="160" height="150" fill="#2a2a3e" stroke="#4ecdc4" stroke-width="2" rx="5"/>
    <text x="700" y="125" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffe66d" text-anchor="middle">
      Legend
    </text>

    <rect x="630" y="140" width="40" height="25" fill="#ff6b6b" rx="3"/>
    <text x="680" y="157" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0">Pointer</text>

    <rect x="630" y="175" width="40" height="25" fill="#00d4ff" rx="3"/>
    <text x="680" y="192" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0">Memory</text>

    <line x1="630" y1="215" x2="670" y2="215" stroke="#00d4ff" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="680" y="220" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0">Points to</text>
  </g>

  <!-- Note -->
  <text x="50" y="595" font-family="Arial, sans-serif" font-size="12" fill="#e0e0e0" class="heap-block">
    Note: Don't forget to free() dynamically allocated memory to avoid memory leaks!
  </text>
</svg>