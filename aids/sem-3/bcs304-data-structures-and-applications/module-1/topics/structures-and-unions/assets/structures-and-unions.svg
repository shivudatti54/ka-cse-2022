<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      @keyframes highlightStruct {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      @keyframes highlightUnion {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      @keyframes slideIn {
        0% { transform: translateX(-50px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }

      @keyframes pulse {
        0%, 100% { fill: #00d4ff; }
        50% { fill: #ff6b6b; }
      }

      .title {
        font-family: Arial, sans-serif;
        font-size: 28px;
        font-weight: bold;
        fill: #e0e0e0;
        animation: fadeIn 1s ease-in;
      }

      .label {
        font-family: Arial, sans-serif;
        font-size: 16px;
        fill: #e0e0e0;
      }

      .code {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #4ecdc4;
      }

      .memory-label {
        font-family: Arial, sans-serif;
        font-size: 12px;
        fill: #ffe66d;
      }

      .struct-highlight {
        animation: highlightStruct 4s ease-in-out infinite;
      }

      .union-highlight {
        animation: highlightUnion 4s ease-in-out infinite 2s;
      }

      .slide-in {
        animation: slideIn 1s ease-out;
      }

      .byte-label {
        font-family: Arial, sans-serif;
        font-size: 10px;
        fill: #e0e0e0;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">Structures vs Unions: Memory Layout</text>

  <!-- Structure Section -->
  <g class="slide-in">
    <text x="100" y="100" class="label" font-weight="bold" fill="#00d4ff">STRUCTURE</text>

    <!-- Code declaration -->
    <text x="100" y="130" class="code">struct Student {</text>
    <text x="120" y="150" class="code">int usn;</text>
    <text x="120" y="170" class="code">char name[20];</text>
    <text x="120" y="190" class="code">float marks;</text>
    <text x="100" y="210" class="code">};</text>

    <!-- Memory layout for struct -->
    <text x="100" y="250" class="label">Memory Layout (Contiguous):</text>

    <!-- USN (4 bytes) -->
    <rect x="100" y="270" width="80" height="40" fill="#00d4ff" opacity="0.7" class="struct-highlight"/>
    <rect x="100" y="270" width="80" height="40" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <text x="140" y="295" text-anchor="middle" class="memory-label">usn</text>
    <text x="140" y="330" text-anchor="middle" class="byte-label">4 bytes</text>

    <!-- Name (20 bytes) -->
    <rect x="190" y="270" width="200" height="40" fill="#4ecdc4" opacity="0.7" class="struct-highlight" style="animation-delay: 0.5s"/>
    <rect x="190" y="270" width="200" height="40" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <text x="290" y="295" text-anchor="middle" class="memory-label">name[20]</text>
    <text x="290" y="330" text-anchor="middle" class="byte-label">20 bytes</text>

    <!-- Marks (4 bytes) -->
    <rect x="400" y="270" width="80" height="40" fill="#ff6b6b" opacity="0.7" class="struct-highlight" style="animation-delay: 1s"/>
    <rect x="400" y="270" width="80" height="40" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <text x="440" y="295" text-anchor="middle" class="memory-label">marks</text>
    <text x="440" y="330" text-anchor="middle" class="byte-label">4 bytes</text>

    <!-- Total size -->
    <text x="100" y="365" class="label" font-weight="bold" fill="#ffe66d">Total Size: 28 bytes</text>
  </g>

  <!-- Union Section -->
  <g class="slide-in" style="animation-delay: 0.5s">
    <text x="100" y="420" class="label" font-weight="bold" fill="#ff6b6b">UNION</text>

    <!-- Code declaration -->
    <text x="100" y="450" class="code">union Data {</text>
    <text x="120" y="470" class="code">int usn;</text>
    <text x="120" y="490" class="code">char name[20];</text>
    <text x="120" y="510" class="code">float marks;</text>
    <text x="100" y="530" class="code">};</text>

    <!-- Memory layout for union -->
    <text x="520" y="100" class="label">Union Memory (Overlapping):</text>

    <!-- Overlapping memory visualization -->
    <g>
      <!-- All three fields share the same space -->
      <rect x="520" y="130" width="200" height="40" fill="#00d4ff" opacity="0.4" class="union-highlight"/>
      <rect x="520" y="130" width="200" height="40" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <text x="620" y="155" text-anchor="middle" class="memory-label" fill="#00d4ff">usn (4 bytes)</text>

      <rect x="520" y="180" width="200" height="40" fill="#4ecdc4" opacity="0.4" class="union-highlight" style="animation-delay: 0.7s"/>
      <rect x="520" y="180" width="200" height="40" fill="none" stroke="#4ecdc4" stroke-width="2"/>
      <text x="620" y="205" text-anchor="middle" class="memory-label" fill="#4ecdc4">name[20] (20 bytes)</text>

      <rect x="520" y="230" width="200" height="40" fill="#ff6b6b" opacity="0.4" class="union-highlight" style="animation-delay: 1.4s"/>
      <rect x="520" y="230" width="200" height="40" fill="none" stroke="#ff6b6b" stroke-width="2"/>
      <text x="620" y="255" text-anchor="middle" class="memory-label" fill="#ff6b6b">marks (4 bytes)</text>

      <!-- Arrow showing they share memory -->
      <path d="M 620 280 L 620 310" stroke="#ffe66d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

      <!-- Actual memory block -->
      <rect x="570" y="320" width="100" height="50" fill="#ffe66d" opacity="0.6"/>
      <rect x="570" y="320" width="100" height="50" fill="none" stroke="#ffe66d" stroke-width="3"/>
      <text x="620" y="350" text-anchor="middle" class="memory-label" fill="#1a1a2e">Shared Memory</text>
    </g>

    <!-- Total size -->
    <text x="520" y="400" class="label" font-weight="bold" fill="#ffe66d">Total Size: 20 bytes (largest member)</text>

    <!-- Key Difference Box -->
    <rect x="520" y="440" width="250" height="120" fill="#1a1a2e" stroke="#ffe66d" stroke-width="2" rx="10"/>
    <text x="645" y="465" text-anchor="middle" class="label" font-weight="bold" fill="#ffe66d">Key Difference:</text>
    <text x="530" y="490" class="label" font-size="13">• Struct: All members exist</text>
    <text x="530" y="510" class="label" font-size="13">  simultaneously</text>
    <text x="530" y="535" class="label" font-size="13">• Union: Only one member</text>
    <text x="530" y="555" class="label" font-size="13">  active at a time</text>
  </g>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#ffe66d"/>
    </marker>
  </defs>
</svg>