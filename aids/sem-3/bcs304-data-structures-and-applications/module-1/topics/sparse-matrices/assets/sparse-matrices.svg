<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      @keyframes highlight {
        0%, 100% { fill: #ff6b6b; opacity: 0.4; }
        50% { fill: #00d4ff; opacity: 0.9; }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      @keyframes drawArrow {
        0% { stroke-dashoffset: 100; }
        100% { stroke-dashoffset: 0; }
      }

      @keyframes slideIn {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      @keyframes highlightRow {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      .title {
        font-family: Arial, sans-serif;
        font-size: 28px;
        font-weight: bold;
        fill: #e0e0e0;
        animation: fadeIn 1s ease-in;
      }

      .label {
        font-family: Arial, sans-serif;
        font-size: 16px;
        fill: #e0e0e0;
      }

      .cell-text {
        font-family: 'Courier New', monospace;
        font-size: 18px;
        fill: #e0e0e0;
        font-weight: bold;
      }

      .non-zero {
        font-family: 'Courier New', monospace;
        font-size: 18px;
        fill: #ffe66d;
        font-weight: bold;
      }

      .table-text {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #1a1a2e;
        font-weight: bold;
      }

      .header-text {
        font-family: Arial, sans-serif;
        font-size: 14px;
        fill: #e0e0e0;
        font-weight: bold;
      }

      .highlight-cell {
        animation: highlight 3s ease-in-out infinite;
      }

      .arrow-path {
        stroke-dasharray: 100;
        animation: drawArrow 2s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Sparse Matrix Representation</text>

  <!-- Original Sparse Matrix -->
  <g id="sparse-matrix">
    <text x="100" y="80" class="label" font-weight="bold" fill="#00d4ff">Sparse Matrix (4×4):</text>

    <!-- Matrix Grid -->
    <g id="matrix-grid">
      <!-- Row 0 -->
      <rect x="100" y="100" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="130" y="138" text-anchor="middle" class="cell-text">0</text>

      <rect x="160" y="100" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="190" y="138" text-anchor="middle" class="cell-text">0</text>

      <rect x="220" y="100" width="60" height="60" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="3" class="highlight-cell">
        <animate attributeName="fill" values="#2a2a4e;#ff6b6b;#2a2a4e" dur="6s" repeatCount="indefinite" begin="0s"/>
      </rect>
      <text x="250" y="138" text-anchor="middle" class="non-zero">5</text>

      <rect x="280" y="100" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="310" y="138" text-anchor="middle" class="cell-text">0</text>

      <!-- Row 1 -->
      <rect x="100" y="160" width="60" height="60" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="3" class="highlight-cell">
        <animate attributeName="fill" values="#2a2a4e;#ff6b6b;#2a2a4e" dur="6s" repeatCount="indefinite" begin="1s"/>
      </rect>
      <text x="130" y="198" text-anchor="middle" class="non-zero">8</text>

      <rect x="160" y="160" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="190" y="198" text-anchor="middle" class="cell-text">0</text>

      <rect x="220" y="160" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="250" y="198" text-anchor="middle" class="cell-text">0</text>

      <rect x="280" y="160" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="310" y="198" text-anchor="middle" class="cell-text">0</text>

      <!-- Row 2 -->
      <rect x="100" y="220" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="130" y="258" text-anchor="middle" class="cell-text">0</text>

      <rect x="160" y="220" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="190" y="258" text-anchor="middle" class="cell-text">0</text>

      <rect x="220" y="220" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="250" y="258" text-anchor="middle" class="cell-text">0</text>

      <rect x="280" y="220" width="60" height="60" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="3" class="highlight-cell">
        <animate attributeName="fill" values="#2a2a4e;#ff6b6b;#2a2a4e" dur="6s" repeatCount="indefinite" begin="2s"/>
      </rect>
      <text x="310" y="258" text-anchor="middle" class="non-zero">3</text>

      <!-- Row 3 -->
      <rect x="100" y="280" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="130" y="318" text-anchor="middle" class="cell-text">0</text>

      <rect x="160" y="280" width="60" height="60" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="3" class="highlight-cell">
        <animate attributeName="fill" values="#2a2a4e;#ff6b6b;#2a2a4e" dur="6s" repeatCount="indefinite" begin="3s"/>
      </rect>
      <text x="190" y="318" text-anchor="middle" class="non-zero">7</text>

      <rect x="220" y="280" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="250" y="318" text-anchor="middle" class="cell-text">0</text>

      <rect x="280" y="280" width="60" height="60" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="310" y="318" text-anchor="middle" class="cell-text">0</text>
    </g>

    <!-- Row/Column indices -->
    <text x="70" y="138" text-anchor="middle" class="label" font-size="12">0</text>
    <text x="70" y="198" text-anchor="middle" class="label" font-size="12">1</text>
    <text x="70" y="258" text-anchor="middle" class="label" font-size="12">2</text>
    <text x="70" y="318" text-anchor="middle" class="label" font-size="12">3</text>

    <text x="130" y="85" text-anchor="middle" class="label" font-size="12">0</text>
    <text x="190" y="85" text-anchor="middle" class="label" font-size="12">1</text>
    <text x="250" y="85" text-anchor="middle" class="label" font-size="12">2</text>
    <text x="310" y="85" text-anchor="middle" class="label" font-size="12">3</text>
  </g>

  <!-- Arrow indicating transformation -->
  <g id="transform-arrow">
    <path d="M 360 210 L 420 210" stroke="#ffe66d" stroke-width="4" fill="none" marker-end="url(#arrowhead)" class="arrow-path"/>
    <text x="390" y="200" text-anchor="middle" class="label" font-size="14" fill="#ffe66d">Convert</text>
  </g>

  <!-- Triplet Representation -->
  <g id="triplet-table">
    <text x="440" y="80" class="label" font-weight="bold" fill="#4ecdc4">Triplet Representation:</text>

    <!-- Table structure -->
    <rect x="440" y="100" width="320" height="45" fill="#00d4ff" stroke="#00d4ff" stroke-width="2" rx="3"/>
    <text x="500" y="128" text-anchor="middle" class="header-text">Row</text>
    <text x="600" y="128" text-anchor="middle" class="header-text">Column</text>
    <text x="700" y="128" text-anchor="middle" class="header-text">Value</text>

    <!-- Vertical dividers for header -->
    <line x1="550" y1="100" x2="550" y2="145" stroke="#1a1a2e" stroke-width="2"/>
    <line x1="650" y1="100" x2="650" y2="145" stroke="#1a1a2e" stroke-width="2"/>

    <!-- Header row (matrix dimensions + non-zero count) -->
    <g style="animation: slideIn 0.8s ease-out;">
      <rect x="440" y="145" width="320" height="40" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
      <text x="500" y="170" text-anchor="middle" class="table-text" fill="#ffe66d">4</text>
      <text x="600" y="170" text-anchor="middle" class="table-text" fill="#ffe66d">4</text>
      <text x="700" y="170" text-anchor="middle" class="table-text" fill="#ffe66d">4</text>
      <line x1="550" y1="145" x2="550" y2="185" stroke="#4ecdc4" stroke-width="1"/>
      <line x1="650" y1="145" x2="650" y2="185" stroke="#4ecdc4" stroke-width="1"/>
    </g>

    <!-- Data rows -->
    <g style="animation: slideIn 0.8s ease-out 0.5s; opacity: 0; animation-fill-mode: forwards;">
      <rect x="440" y="185" width="320" height="40" fill="#ffe66d" stroke="#ff6b6b" stroke-width="2">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite" begin="0s"/>
      </rect>
      <text x="500" y="210" text-anchor="middle" class="table-text">0</text>
      <text x="600" y="210" text-anchor="middle" class="table-text">2</text>
      <text x="700" y="210" text-anchor="middle" class="table-text">5</text>
      <line x1="550" y1="185" x2="550" y2="225" stroke="#1a1a2e" stroke-width="1"/>
      <line x1="650" y1="185" x2="650" y2="225" stroke="#1a1a2e" stroke-width="1"/>
    </g>

    <g style="animation: slideIn 0.8s ease-out 1s; opacity: 0; animation-fill-mode: forwards;">
      <rect x="440" y="225" width="320" height="40" fill="#ffe66d" stroke="#ff6b6b" stroke-width="2">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite" begin="1s"/>
      </rect>
      <text x="500" y="250" text-anchor="middle" class="table-text">1</text>
      <text x="600" y="250" text-anchor="middle" class="table-text">0</text>
      <text x="700" y="250" text-anchor="middle" class="table-text">8</text>
      <line x1="550" y1="225" x2="550" y2="265" stroke="#1a1a2e" stroke-width="1"/>
      <line x1="650" y1="225" x2="650" y2="265" stroke="#1a1a2e" stroke-width="1"/>
    </g>

    <g style="animation: slideIn 0.8s ease-out 1.5s; opacity: 0; animation-fill-mode: forwards;">
      <rect x="440" y="265" width="320" height="40" fill="#ffe66d" stroke="#ff6b6b" stroke-width="2">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite" begin="2s"/>
      </rect>
      <text x="500" y="290" text-anchor="middle" class="table-text">2</text>
      <text x="600" y="290" text-anchor="middle" class="table-text">3</text>
      <text x="700" y="290" text-anchor="middle" class="table-text">3</text>
      <line x1="550" y1="265" x2="550" y2="305" stroke="#1a1a2e" stroke-width="1"/>
      <line x1="650" y1="265" x2="650" y2="305" stroke="#1a1a2e" stroke-width="1"/>
    </g>

    <g style="animation: slideIn 0.8s ease-out 2s; opacity: 0; animation-fill-mode: forwards;">
      <rect x="440" y="305" width="320" height="40" fill="#ffe66d" stroke="#ff6b6b" stroke-width="2">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite" begin="3s"/>
      </rect>
      <text x="500" y="330" text-anchor="middle" class="table-text">3</text>
      <text x="600" y="330" text-anchor="middle" class="table-text">1</text>
      <text x="700" y="330" text-anchor="middle" class="table-text">7</text>
      <line x1="550" y1="305" x2="550" y2="345" stroke="#1a1a2e" stroke-width="1"/>
      <line x1="650" y1="305" x2="650" y2="345" stroke="#1a1a2e" stroke-width="1"/>
    </g>
  </g>

  <!-- Advantages box -->
  <rect x="100" y="380" width="660" height="195" fill="#2a2a4e" stroke="#00d4ff" stroke-width="3" rx="10"/>
  <text x="430" y="410" text-anchor="middle" class="label" font-weight="bold" font-size="20" fill="#00d4ff">Advantages of Triplet Representation</text>

  <g id="advantages">
    <circle cx="130" cy="440" r="5" fill="#4ecdc4"/>
    <text x="145" y="445" class="label" font-size="15">Space Efficiency: Stores only non-zero elements</text>

    <circle cx="130" cy="470" r="5" fill="#4ecdc4"/>
    <text x="145" y="475" class="label" font-size="15">Memory Savings: 4×4 matrix with 4 non-zeros = 5 triplets vs 16 elements</text>

    <circle cx="130" cy="500" r="5" fill="#4ecdc4"/>
    <text x="145" y="505" class="label" font-size="15">First row stores: (rows, columns, non-zero count)</text>

    <circle cx="130" cy="530" r="5" fill="#4ecdc4"/>
    <text x="145" y="535" class="label" font-size="15">Subsequent rows: (row index, column index, value)</text>

    <circle cx="130" cy="560" r="5" fill="#4ecdc4"/>
    <text x="145" y="565" class="label" font-size="15">Critical for large matrices with mostly zeros (e.g., 1000×1000 with 50 values)</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#ffe66d"/>
    </marker>
  </defs>
</svg>