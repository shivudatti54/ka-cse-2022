<svg width="420" height="400" data-topic-id="stacks-and-queues">
    <!-- Gradient background -->
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C5E1F5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C7E5F5" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)" opacity="0.8"/>

    <!-- Title -->
    <g transform="translate(10 10)">
        <text x="0" y="20" font-size="24" font-family="Arial, sans-serif" font-weight="bold" fill="#2E4053" text-anchor="left">
            Stacks and Queues
        </text>
    </g>

    <!-- Section 1: Introduction to Stacks and Queues -->
    <g transform="translate(20 50)">
        <rect x="0" y="0" width="300" height="50" fill="#F7F7F7" rx="5"/>
        <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" font-weight="bold" fill="#2E4053" text-anchor="left" data-narration="Introduction to Stacks and Queues">
            Introduction to Stacks and Queues
        </text>
    </g>
    <animateTransform
        attributeName="transform"
        type="translate"
        from="0 50"
        to="0 70"
        begin="0s"
        dur="2s"
        repeatCount="indefinite"
    />

    <!-- Section 2: Stack -->
    <g transform="translate(20 120)">
        <rect x="0" y="0" width="300" height="150" fill="#F7F7F7" rx="5"/>
        <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="bold" fill="#2E4053" text-anchor="left" data-narration="Stack">
            Stack
        </text>
        <rect x="10" y="60" width="100" height="20" fill="#FFC107" rx="5"/>
        <text x="15" y="65" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" text-anchor="end">
            Push
        </text>
        <text x="15" y="50" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" text-anchor="end">
            Pop
        </text>
        <animateTransform
            attributeName="transform"
            type="translate"
            from="10 60"
            to="10 70"
            begin="0s"
            dur="1s"
            repeatCount="indefinite"
        />
        <animateTransform
            attributeName="transform"
            type="translate"
            from="10 60"
            to="10 70"
            begin="1s"
            dur="1s"
            repeatCount="indefinite"
        />
    </g>

    <!-- Section 3: Queue -->
    <g transform="translate(20 300)">
        <rect x="0" y="0" width="300" height="150" fill="#F7F7F7" rx="5"/>
        <text x="10" y="20" font-size="18" font-family="Arial, sans-serif" font-weight="bold" fill="#2E4053" text-anchor="left" data-narration="Queue">
            Queue
        </text>
        <rect x="10" y="60" width="100" height="20" fill="#FFC107" rx="5"/>
        <text x="15" y="65" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" text-anchor="end">
            Enqueue
        </text>
        <text x="15" y="50" font-size="14" font-family="Arial, sans-serif" fill="#2E4053" text-anchor="end">
            Dequeue
        </text>
        <animateTransform
            attributeName="transform"
            type="translate"
            from="10 60"
            to="10 70"
            begin="0s"
            dur="1s"
            repeatCount="indefinite"
        />
        <animateTransform
            attributeName="transform"
            type="translate"
            from="10 60"
            to="10 70"
            begin="1s"
            dur="1s"
            repeatCount="indefinite"
        />
    </g>

    <!-- Connection arrows -->
    <path d="M 20 50 L 40 50" stroke="#FFC107" stroke-width="2" fill="none"/>
    <path d="M 20 120 L 40 120" stroke="#FFC107" stroke-width="2" fill="none"/>
    <path d="M 20 300 L 40 300" stroke="#FFC107" stroke-width="2" fill="none"/>

    <!-- Footer -->
    <g transform="translate(10 350)">
        <rect x="0" y="0" width="400" height="50" fill="#F7F7F7" rx="5"/>
        <text x="10" y="25" font-size="18" font-family="Arial, sans-serif" font-weight="bold" fill="#2E4053" text-anchor="left">
            Stacks and Queues
        </text>
    </g>
</svg>