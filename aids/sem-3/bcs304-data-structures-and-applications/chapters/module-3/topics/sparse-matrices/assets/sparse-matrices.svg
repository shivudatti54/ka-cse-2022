<svg width="420" height="400" data-topic-id="sparse-matrices">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <style>
      .node {
        fill: none;
        stroke: #3B5998;
        stroke-width: 2px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .edge {
        stroke: #F7DC6F;
        stroke-width: 2px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <title>Sparse Matrices</title>

  <rect x="10" y="10" width="400" height="380" style="fill: url(#pastel-gradient)"/>
  <text x="15" y="20" font-size="24" font-family="Arial Black" text-anchor="middle">
    Sparse Matrices
  </text>

  <g id="parse-tree">
    <circle cx="200" cy="50" r="20" class="node" data-narration="Start symbol: S"/>
    <line x1="180" y1="30" x2="220" y2="30" class="edge"/>
    <circle cx="250" cy="50" r="20" class="node" data-narration="Terminal symbol: A"/>
    <line x1="240" y1="30" x2="270" y2="30" class="edge"/>
    <line x1="240" y1="30" x2="220" y2="30" class="edge"/>
    <circle cx="180" cy="50" r="20" class="node" data-narration="Terminal symbol: b"/>
    <line x1="160" y1="30" x2="180" y2="30" class="edge"/>
    <line x1="160" y1="30" x2="220" y2="30" class="edge"/>
    <circle cx="270" cy="50" r="20" class="node" data-narration="Terminal symbol: a"/>
    <line x1="260" y1="30" x2="280" y2="30" class="edge"/>
    <line x1="260" y1="30" x2="240" y2="30" class="edge"/>
  </g>

  <g id="production-rule">
    <rect x="10" y="140" width="400" height="20" style="fill: #C7B8EA"/>
    <text x="15" y="145" font-size="18" font-family="Arial Black" text-anchor="middle" data-narration="Production rule: S -> AB"/>
    <text x="15" y="155" font-size="18" font-family="Arial Black" text-anchor="middle" data-narration="Splits into non-terminal symbols A and B"/>
    <rect x="10" y="170" width="400" height="20" style="fill: #C5CAE9"/>
    <text x="15" y="175" font-size="18" font-family="Arial Black" text-anchor="middle" data-narration="Production rule: A -> aA | a"/>
    <text x="15" y="185" font-size="18" font-family="Arial Black" text-anchor="middle" data-narration="Can be split into two terminal symbols 'a' and another non-terminal symbol A"/>
    <rect x="10" y="200" width="400" height="20" style="fill: #C5CAE9"/>
    <text x="15" y="205" font-size="18" font-family="Arial Black" text-anchor="middle" data-narration="Production rule: B -> bB | b"/>
    <text x="15" y="215" font-size="18" font-family="Arial Black" text-anchor="middle" data-narration="Can be split into two terminal symbols 'b' and another non-terminal symbol B"/>
  </g>

  <g id="ambiguity">
    <rect x="10" y="300" width="400" height="20" style="fill: #F7DC6F"/>
    <text x="15" y="305" font-size="18" font-family="Arial Black" text-anchor="middle" data-narration="Ambiguity in grammars and languages: A sentence can be parsed in more than one way"/>
    <text x="15" y="315" font-size="18" font-family="Arial Black" text-anchor="middle" data-narration="This can lead to multiple parse trees, each representing a different possible interpretation of the sentence"/>
  </g>

  <g id="footer">
    <text x="10" y="380" font-size="18" font-family="Arial Black" text-anchor="middle">Sparse Matrices</text>
  </g>

  <animate id="animate-parse-tree" begin="0s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="rotate(360 200 50)" begin="0s" dur="1s"/>
    <animateTransform transform="rotate(360 200 50)" begin="1s" dur="1s"/>
  </animate>

  <animate id="animate-production-rule" begin="0s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="translate(200 50)" begin="0s" dur="1s"/>
    <animateTransform transform="translate(200 50)" begin="1s" dur="1s"/>
  </animate>

  <animate id="animate-ambiguity" begin="0s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="translate(200 50)" begin="0s" dur="1s"/>
    <animateTransform transform="translate(200 50)" begin="1s" dur="1s"/>
  </animate>

  <animate id="animate-footer" begin="0s" dur="2s" repeatCount="indefinite">
    <animateTransform transform="translate(200 50)" begin="0s" dur="1s"/>
    <animateTransform transform="translate(200 50)" begin="1s" dur="1s"/>
  </animate>
</svg>