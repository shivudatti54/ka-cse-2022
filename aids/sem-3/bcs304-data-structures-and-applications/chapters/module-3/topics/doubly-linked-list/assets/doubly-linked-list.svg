<svg width="420" height="400" data-topic-id="doubly-linked-list">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="1" />
      <stop offset="50%" stop-color="#C7D2E9" stop-opacity="1" />
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1" />
    </linearGradient>
  </defs>

  <title>
    <text x="50%" y="20%" text-anchor="middle" font-size="24px" font-family="Arial" fill="#3498db">
      Doubly Linked List
    </text>
  </title>

  <rect x="20%" y="50%" width="60%" height="30%" fill="url(#pastel-gradient)" rx="10" />
  <rect x="100%" y="50%" width="60%" height="30%" fill="url(#pastel-gradient)" rx="10" />
  <rect x="40%" y="20%" width="150%" height="20%" fill="#f1f1f1" rx="5" />
  <rect x="40%" y="60%" width="150%" height="20%" fill="#f1f1f1" rx="5" />

  <section data-narration="Overview">
    <text x="20%" y="70%" text-anchor="start" font-size="16px" font-family="Arial" fill="#333">
      A Doubly Linked List is a linked list where each node contains:
    </text>
    <text x="60%" y="70%" text-anchor="start" font-size="16px" font-family="Arial" fill="#333">
      1. Data - The value stored
    </text>
    <text x="120%" y="70%" text-anchor="start" font-size="16px" font-family="Arial" fill="#333">
      2. Next - Pointer to the next node
    </text>
    <text x="180%" y="70%" text-anchor="start" font-size="16px" font-family="Arial" fill="#333">
      3. Prev - Pointer to the previous node
    </text>
  </section>

  <section data-narration="Node Structure">
    <text x="20%" y="100%" text-anchor="start" font-size="16px" font-family="Arial" fill="#333">
      struct Node {
        int data;
        struct Node *next;
        struct Node *prev;
      }
    </text>
  </section>

  <section data-narration="Visualization">
    <rect x="20%" y="150%" width="330%" height="120%" fill="#f1f1f1" rx="5" />
    <rect x="20%" y="150%" width="90%" height="20%" fill="#f1f1f1" rx="5" />
    <rect x="140%" y="150%" width="90%" height="20%" fill="#f1f1f1" rx="5" />
    <animate xlink:href="#arrow" begin="0s" dur="2s" repeatCount="indefinite" />
    <animate xlink:href="#arrow" begin="2s" dur="2s" repeatCount="indefinite" />
  </section>

  <section data-narration="Advantages over Singly Linked List">
    <table>
      <tr>
        <th>Feature</th>
        <th>Singly Linked List</th>
        <th>Doubly Linked List</th>
      </tr>
      <tr>
        <td>Traversal</td>
        <td>Forward only</td>
        <td>Both directions</td>
      </tr>
      <tr>
        <td>Delete node (given pointer)</td>
        <td>O(n)</td>
        <td>O(1)</td>
      </tr>
      <tr>
        <td>Insert before node</td>
        <td>O(n)</td>
        <td>O(1)</td>
      </tr>
      <tr>
        <td>Delete from end</td>
        <td>O(n)</td>
        <td>O(1)</td>
      </tr>
      <tr>
        <td>Memory per node</td>
        <td>Less</td>
        <td>More (extra pointer)</td>
      </tr>
    </table>
  </section>

  <section data-narration="Operations">
    <text x="20%" y="250%" text-anchor="start" font-size="16px" font-family="Arial" fill="#333">
      Here is how you can create a node and insert it at the beginning of the list:
    </text>
    <code>
      <pre>
        struct Node *createNode(int data) {
          struct Node *newNode = (struct Node*)malloc(sizeof(struct Node));
          newNode->data = data;
          newNode->next = NULL;
          newNode->prev = NULL;
          return newNode;
        }

        void insertAtBeginning(struct Node **head, int data) {
          struct Node *newNode = createNode(data);

          if(*head == NULL) {
            *head = newNode;
            return;
          }

          newNode->next = *head;
          (*head)->prev = newNode;
          *head = newNode;
        }
      </pre>
    </code>
  </section>

  <footer>
    <text x="50%" y="380%" text-anchor="middle" font-size="16px" font-family="Arial" fill="#333">
      Doubly Linked List
    </text>
  </footer>

  <symbol id="arrow" viewBox="0 0 10 10">
    <path d="M5 0 L0 5 L5 10" fill="#3498db" stroke="#3498db" stroke-width="2" />
  </symbol>
</svg>