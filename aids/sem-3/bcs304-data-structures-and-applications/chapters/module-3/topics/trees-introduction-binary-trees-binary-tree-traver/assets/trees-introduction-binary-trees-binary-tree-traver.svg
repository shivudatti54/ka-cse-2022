<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="trees-binary-tree-traversals">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="clip-path">
      <rect x="0" y="0" width="100%" height="100%"/>
    </clipPath>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(10, 80)">
    <text x="20" y="20" font-size="24" font-family="Arial" text-anchor="middle">Trees Introduction</text>
    <rect x="60" y="50" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="50" font-size="18" font-family="Arial" text-anchor="middle" data-narration="A tree is a non-linear data structure consisting of nodes, where each node has a value and zero or more child nodes. Trees are used in various applications such as file systems, databases, and web browsers." fill="#66CCCC"/>
    <rect x="60" y="100" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="100" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Key Characteristics of Trees: Each node has a unique value (key), each node has zero or more child nodes, each node has zero or more parent nodes, and there is a root node, which is the topmost node." fill="#66CCCC"/>
    <rect x="60" y="150" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="150" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Binary Trees: A binary tree is a type of tree in which each node has at most two child nodes. The two child nodes are called the left child and the right child." fill="#66CCCC"/>
    <rect x="60" y="200" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="200" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Types of Binary Trees: Full, Empty, and Complete Binary Trees." fill="#66CCCC"/>
    <rect x="60" y="250" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="250" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Binary Tree Traversals: Inorder, Preorder, and Postorder. Each traversal has its own order of visiting nodes." fill="#66CCCC"/>
    <rect x="60" y="300" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="300" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Inorder Traversal: Visits left subtree, current node, and then right subtree." fill="#66CCCC"/>
    <rect x="60" y="350" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="350" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Preorder Traversal: Visits current node, left subtree, and then right subtree." fill="#66CCCC"/>
    <rect x="60" y="400" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="400" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Postorder Traversal: Visits left subtree, right subtree, and then current node." fill="#66CCCC"/>
    <rect x="60" y="450" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="450" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Example: Binary Tree with nodes 1, 2, 3, 4, 5, 6." fill="#66CCCC"/>
    <rect x="60" y="500" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="500" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Arrow markers for connections." fill="#66CCCC"/>
    <rect x="60" y="550" width="300" height="30" fill="#2E4053" rx="10"/>
    <text x="90" y="550" font-size="18" font-family="Arial" text-anchor="middle" data-narration="Title and footer labels." fill="#66CCCC"/>
  </g>
  <path d="M 10, 20 L 380, 20" stroke="#3498db" stroke-width="2" fill="none"/>
  <path d="M 10, 380 L 380, 380" stroke="#3498db" stroke-width="2" fill="none"/>
  <animateTransform dur="5s" begin="0s" attributeName="transform" type="translate" from="0 80" to="0 380"/>
  <animateTransform dur="5s" begin="1.5s" attributeName="transform" type="translate" from="0 80" to="0 380"/>
  <animateTransform dur="5s" begin="3s" attributeName="transform" type="translate" from="0 80" to="0 380"/>
</svg>