<svg width="420" height="400" data-topic-id="text-book.chapter-4-45">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2FFFC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Stack Data Structure</title>
  <rect x="10" y="10" width="400" height="50" fill="url(#pastel-gradient)"/>
  <g data-narration="Introduction">
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif">A stack is a linear data structure that follows the LIFO (Last In First Out) principle</text>
  </g>
  <g data-narration="Definition">
    <rect x="20" y="80" width="360" height="30" fill="#F0F0F0"/>
    <text x="20" y="100" font-size="18" font-family="Arial, sans-serif">A stack is a collection of elements that can be added or removed from the top of the stack</text>
  </g>
  <g data-narration="Types of Stacks">
    <rect x="20" y="150" width="360" height="30" fill="#F0F0F0"/>
    <rect x="20" y="180" width="120" height="30" fill="#CCFFCC"/>
    <text x="20" y="200" font-size="18" font-family="Arial, sans-serif">Linear Stack: can only contain one element at a time</text>
    <rect x="160" y="180" width="120" height="30" fill="#CCFFCC"/>
    <text x="160" y="200" font-size="18" font-family="Arial, sans-serif">Multidimensional Stack: can contain multiple elements at a time</text>
  </g>
  <g data-narration="Operations on a Stack">
    <rect x="20" y="230" width="360" height="30" fill="#F0F0F0"/>
    <rect x="20" y="260" width="120" height="30" fill="#CCFFCC"/>
    <text x="20" y="280" font-size="18" font-family="Arial, sans-serif">Push: adds an element to the top of the stack</text>
    <rect x="160" y="260" width="120" height="30" fill="#CCFFCC"/>
    <text x="160" y="280" font-size="18" font-family="Arial, sans-serif">Pop: removes an element from the top of the stack</text>
    <rect x="20" y="300" width="120" height="30" fill="#CCFFCC"/>
    <text x="20" y="320" font-size="18" font-family="Arial, sans-serif">Peek: returns the top element of the stack without removing it</text>
    <rect x="160" y="300" width="120" height="30" fill="#CCFFCC"/>
    <text x="160" y="320" font-size="18" font-family="Arial, sans-serif">IsEmpty: checks if the stack is empty</text>
    <rect x="20" y="340" width="120" height="30" fill="#CCFFCC"/>
    <text x="20" y="360" font-size="18" font-family="Arial, sans-serif">Size: returns the number of elements in the stack</text>
  </g>
  <g data-narration="Implementation of a Stack">
    <rect x="20" y="400" width="360" height="30" fill="#F0F0F0"/>
    <code>class Stack: def __init__(self): self.stack = []</code>
    <g data-narration="Example in Python">
      <rect x="20" y="440" width="320" height="30" fill="#F0F0F0"/>
      <code>stack = Stack(); stack.push(1); stack.push(2); stack.push(3)</code>
      <g data-narration="Example Use Cases">
        <rect x="20" y="480" width="320" height="30" fill="#F0F0F0"/>
        <code>print(stack.pop()); print(stack.peek()); print(stack.isEmpty()); print(stack.size());</code>
      </g>
    </g>
  </g>
  <g data-narration="Applications">
    <rect x="20" y="530" width="360" height="30" fill="#F0F0F0"/>
    <text x="20" y="550" font-size="18" font-family="Arial, sans-serif">Stacks are used in computer science for parsing expressions, evaluating postfix notation, and implementing recursive algorithms</text>
  </g>
  <rect x="10" y="390" width="400" height="10" fill="#FF9900"/>
  <text x="20" y="410" font-size="18" font-family="Arial, sans-serif">Stack Data Structure</text>
  <rect x="10" y="570" width="400" height="10" fill="#FF9900"/>
  <text x="20" y="590" font-size="18" font-family="Arial, sans-serif">by [Author Name]</text>
</svg>