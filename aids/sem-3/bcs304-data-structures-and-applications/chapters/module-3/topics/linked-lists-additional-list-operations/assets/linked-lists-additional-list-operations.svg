<svg width="420" height="400" data-topic-id="linked-lists-additional-list-operations">
  <style>
    /* Style for the title and footer */
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #2F4F7F;
      margin-bottom: 20px;
    }
    .footer {
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }
    /* Style for sections */
    .section {
      margin-bottom: 20px;
    }
    /* Style for gradients */
    .gradient {
      filter: progid:DXImageTransform.Microsoft.Gradient(startColorstr='#C7B8EA', endColorstr='#87CEEB');
    }
    /* Style for arrows */
    .arrow {
      fill: #2F4F7F;
      stroke: #2F4F7F;
      stroke-width: 2;
    }
  </style>
  <defs>
    <linearGradient id=" gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id=" gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Linked Lists Additional Operations</title>
  <footer>Learn more at <a href="https://example.com">https://example.com</a></footer>
  <g id="linked-lists-additional-list-operations" data-narration="Introduction to Advanced Linked List Operations">
    <rect x="10" y="10" width="400" height="380" fill="url(# gradient1)"/>
    <text x="20" y="20" class="title">Linked Lists Additional Operations</text>
    <rect x="10" y="50" width="400" height="30" fill="white"/>
    <g transform="rotate(45 210 50)">
      <rect x="0" y="0" width="20" height="30" fill="white"/>
      <text x="5" y="10" class="section">Concatenation</text>
      <g data-narration="Algorithm for Concatenation">
        <rect x="10" y="40" width="400" height="20" fill="white"/>
        <text x="20" y="50" class="section">Check if the first list is empty - if so, return the second list</text>
        <rect x="10" y="70" width="400" height="20" fill="white"/>
        <text x="20" y="80" class="section">Traverse to the end of the first list</text>
        <rect x="10" y="100" width="400" height="20" fill="white"/>
        <text x="20" y="110" class="section">Set the next pointer of the last node of the first list to point to the head of the second list</text>
        <rect x="10" y="130" width="400" height="20" fill="white"/>
        <text x="20" y="140" class="section">Return the head of the first list</text>
        <text x="20" y="160" class="section">Implementation Example</text>
        <rect x="10" y="180" width="400" height="20" fill="white"/>
        <text x="20" y="190" class="section">struct Node* concatenate(struct Node* list1, struct Node* list2)</text>
        <rect x="10" y="210" width="400" height="20" fill="white"/>
        <text x="20" y="220" class="section">if (list1 == NULL) return list2;</text>
        <rect x="10" y="240" width="400" height="20" fill="white"/>
        <text x="20" y="250" class="section">if (list2 == NULL) return list1;</text>
        <rect x="10" y="270" width="400" height="20" fill="white"/>
        <text x="20" y="280" class="section">struct Node* temp = list1;</text>
        <rect x="10" y="300" width="400" height="20" fill="white"/>
        <text x="20" y="310" class="section">while (temp->next != NULL) {</text>
        <rect x="10" y="330" width="400" height="20" fill="white"/>
        <text x="20" y="340" class="section">temp = temp->next;</text>
        <rect x="10" y="360" width="400" height="20" fill="white"/>
        <text x="20" y="370" class="section">temp->next = list2;</text>
        <rect x="10" y="390" width="400" height="20" fill="white"/>
        <text x="20" y="400" class="section">return list1;</text>
      </g>
    </g>
    <g transform="rotate(45 330 50)">
      <rect x="0" y="0" width="20" height="30" fill="white"/>
      <text x="5" y="10" class="section">Reversing a Linked List Without Creating New Nodes</text>
      <g data-narration="In-Place Reversal Algorithm">
        <rect x="10" y="40" width="400" height="20" fill="white"/>
        <text x="20" y="50" class="section">struct Node* prev = NULL;</text>
        <rect x="10" y="70" width="400" height="20" fill="white"/>
        <text x="20" y="80" class="section">struct Node* current = head;</text>
        <rect x="10" y="100" width="400" height="20" fill="white"/>
        <text x="20" y="110" class="section">struct Node* next = NULL;</text>
        <rect x="10" y="130" width="400" height="20" fill="white"/>
        <text x="20" y="140" class="section">while (current != NULL) {</text>
        <rect x="10" y="160" width="400" height="20" fill="white"/>
        <text x="20" y="170" class="section">next = current->next;  // Store next node</text>
        <rect x="10" y="190" width="400" height="20" fill="white"/>
        <text x="20" y="200" class="section">current->next = prev;  // Reverse current node's pointer</text>
        <rect x="10" y="220" width="400" height="20" fill="white"/>
        <text x="20" y="230" class="section">prev = current;        // Move pointers one position ahead</text>
        <rect x="10" y="250" width="400" height="20" fill="white"/>
        <text x="20" y="260" class="section">current = next;</text>
        <rect x="10" y="280" width="400" height="20" fill="white"/>
        <text x="20" y="290" class="section">}</text>
        <rect x="10" y="310" width="400" height="20" fill="white"/>
        <text x="20" y="320" class="section">return prev;  // prev becomes the new head</text>
      </g>
    </g>
  </g>
  <g data-narration="Arrow markers for connections">
    <line x1="20" y1="30" x2="40" y2="30" class="arrow"/>
    <line x1="20" y1="70" x2="40" y2="70" class="arrow"/>
    <line x1="20" y1="110" x2="40" y2="110" class="arrow"/>
    <line x1="20" y1="140" x2="40" y2="140" class="arrow"/>
    <line x1="20" y1="170" x2="40" y2="170" class="arrow"/>
    <line x1="20" y1="200" x2="40" y2="200" class="arrow"/>
  </g>
</svg>