<svg width="420" height="400" data-topic-id="queues-queues-circular-queues-using-dynamic-arrays" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C5CAE9" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <title>Queues, Circular Queues, Using Dynamic Arrays</title>
    <g transform="translate(10, 20)">
        <rect x="0" y="0" width="400" height="370" fill="url(#pastel-gradient)"/>
        <text x="20" y="40" font-size="24" font-family="Arial" font-weight="bold" text-anchor="middle">Queues</text>
        <section data-narration="Linear Queue">
            <rect x="10" y="60" width="100" height="30" fill="#66CCCC" rx="5"/>
            <text x="15" y="70" font-size="18" font-family="Arial" text-anchor="middle">Enqueue</text>
            <text x="15" y="80" font-size="18" font-family="Arial" text-anchor="middle">Dequeue</text>
            <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="4s" repeatCount="indefinite"/>
        </section>
        <section data-narration="Circular Queue">
            <rect x="130" y="60" width="100" height="30" fill="#33CC66" rx="5"/>
            <text x="135" y="70" font-size="18" font-family="Arial" text-anchor="middle">Enqueue</text>
            <text x="135" y="80" font-size="18" font-family="Arial" text-anchor="middle">Dequeue</text>
            <line x1="150" y1="70" x2="150" y2="140" stroke="#FF9900" stroke-width="4"/>
        </section>
        <section data-narration="Dynamic Array">
            <rect x="10" y="120" width="100" height="30" fill="#CC66CC" rx="5"/>
            <text x="15" y="130" font-size="18" font-family="Arial" text-anchor="middle">Array Index</text>
            <text x="15" y="140" font-size="18" font-family="Arial" text-anchor="middle">Dynamic</text>
            <animateTransform attributeName="transform" type="translateY" from="0 150" to="0 200" dur="4s" repeatCount="indefinite"/>
        </section>
        <section data-narration="Multiple Stacks and Queues">
            <rect x="130" y="120" width="100" height="30" fill="#66CCCC" rx="5"/>
            <text x="135" y="130" font-size="18" font-family="Arial" text-anchor="middle">Stack</text>
            <text x="135" y="140" font-size="18" font-family="Arial" text-anchor="middle">Queue</text>
            <line x1="150" y1="130" x2="150" y2="140" stroke="#FF9900" stroke-width="4"/>
        </section>
        <footer>
            <text x="20" y="390" font-size="18" font-family="Arial" text-anchor="middle">Queues, Circular Queues, Using Dynamic Arrays</text>
        </footer>
    </g>
</svg>