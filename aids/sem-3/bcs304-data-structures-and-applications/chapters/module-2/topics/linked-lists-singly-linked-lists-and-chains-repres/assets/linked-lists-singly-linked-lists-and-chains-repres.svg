<svg width="420" height="400" data-topic-id="singly-linked-lists-and-chains-representation">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#B2A9FA" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#background-gradient)" rx="10" />
  
  <!-- Title -->
  <text x="50%" y="20" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" fill="#3498DB">
    Singly Linked Lists and Chains Representation
  </text>
  
  <!-- Narration sections -->
  <g id="section-1">
    <rect x="50" y="100" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="50%" y="120" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2C3E50" data-narration="Singly Linked List Definition">
      Definition
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,50,170" to="360,50,170" dur="4s" begin="0s" />
  </g>
  <g id="section-2">
    <rect x="50" y="170" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="50%" y="190" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2C3E50" data-narration="Singly Linked List Example">
      Example
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,50,170" to="360,50,170" dur="4s" begin="1s" />
  </g>
  <g id="section-3">
    <rect x="50" y="240" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="50%" y="260" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2C3E50" data-narration="Operations">
      Operations
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,50,170" to="360,50,170" dur="4s" begin="2s" />
  </g>
  <g id="section-4">
    <rect x="50" y="310" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="50%" y="330" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2C3E50" data-narration="Chains and Lists">
      Chains and Lists
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,50,170" to="360,50,170" dur="4s" begin="3s" />
  </g>
  <g id="section-5">
    <rect x="50" y="390" width="320" height="50" fill="#F7F7F7" rx="10" />
    <text x="50%" y="410" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2C3E50" data-narration="Insertion and Deletion">
      Insertion and Deletion
    </text>
    <animateTransform attributeName="transform" type="rotate" from="0,50,170" to="360,50,170" dur="4s" begin="4s" />
  </g>
  
  <!-- Footer -->
  <text x="50%" y="420" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2C3E50">
    Created by [Your Name]
  </text>
  
  <!-- Arrow markers for connections -->
  <line x1="100" y1="100" x2="200" y2="200" stroke="#3498DB" stroke-width="2" />
  <line x1="200" y1="100" x2="100" y2="200" stroke="#3498DB" stroke-width="2" />
  <line x1="100" y1="200" x2="200" y2="200" stroke="#3498DB" stroke-width="2" />
  <line x1="200" y1="200" x2="100" y2="200" stroke="#3498DB" stroke-width="2" />
</svg>