<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    @keyframes rotateCircle {
      0%, 100% { transform: rotate(0deg); }
    }
    @keyframes element1 {
      0%, 100% { opacity: 1; }
    }
    @keyframes element2 {
      0%, 30% { opacity: 0; }
      35%, 100% { opacity: 1; }
    }
    @keyframes element3 {
      0%, 60% { opacity: 0; }
      65%, 100% { opacity: 1; }
    }
    @keyframes frontPointer {
      0%, 70% { transform: rotate(0deg); }
      75%, 100% { transform: rotate(60deg); }
    }
    @keyframes rearPointer {
      0%, 20% { transform: rotate(0deg); }
      25%, 55% { transform: rotate(60deg); }
      60%, 90% { transform: rotate(120deg); }
      95%, 100% { transform: rotate(180deg); }
    }
    @keyframes slot0Fill {
      0%, 20% { fill: #2d2d44; }
      25%, 70% { fill: #00d4ff; }
      75%, 100% { fill: #2d2d44; }
    }
    @keyframes slot1Fill {
      0%, 20% { fill: #2d2d44; }
      25%, 100% { fill: #00d4ff; }
    }
    @keyframes slot2Fill {
      0%, 55% { fill: #2d2d44; }
      60%, 100% { fill: #00d4ff; }
    }
    @keyframes slot3Fill {
      0%, 90% { fill: #2d2d44; }
      95%, 100% { fill: #00d4ff; }
    }
    @keyframes text0 {
      0%, 20% { opacity: 0; }
      25%, 70% { opacity: 1; }
      75%, 100% { opacity: 0; }
    }
    @keyframes text1 {
      0%, 20% { opacity: 0; }
      25%, 100% { opacity: 1; }
    }
    @keyframes text2 {
      0%, 55% { opacity: 0; }
      60%, 100% { opacity: 1; }
    }
    @keyframes text3 {
      0%, 90% { opacity: 0; }
      95%, 100% { opacity: 1; }
    }
    .slot { stroke: #4ecdc4; stroke-width: 3; }
    .slot-text { fill: #1a1a2e; font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; text-anchor: middle; }
    .index-text { fill: #e0e0e0; font-family: Arial, sans-serif; font-size: 16px; text-anchor: middle; }
    .pointer-text { fill: #ffe66d; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    .title-text { fill: #00d4ff; font-family: Arial, sans-serif; font-size: 32px; font-weight: bold; }
    .subtitle-text { fill: #e0e0e0; font-family: Arial, sans-serif; font-size: 18px; }
  </style>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" class="title-text">Circular Queue</text>
  <text x="400" y="80" text-anchor="middle" class="subtitle-text">Efficient Use of Array Space with Wrap-Around</text>

  <!-- Center point for circular arrangement -->
  <g transform="translate(400, 320)">
    <!-- Draw circular slots (6 slots in a circle) -->

    <!-- Slot 0 (top) -->
    <g transform="rotate(0)">
      <rect x="-40" y="-160" width="80" height="60" rx="8" class="slot" style="animation: slot0Fill 12s infinite;"/>
      <text x="0" y="-125" class="slot-text" style="animation: text0 12s infinite;">10</text>
      <text x="0" y="-95" class="index-text">[0]</text>
    </g>

    <!-- Slot 1 (60 degrees) -->
    <g transform="rotate(60)">
      <rect x="-40" y="-160" width="80" height="60" rx="8" class="slot" style="animation: slot1Fill 12s infinite;"/>
      <text x="0" y="-125" class="slot-text" style="animation: text1 12s infinite;">20</text>
      <text x="0" y="-95" class="index-text">[1]</text>
    </g>

    <!-- Slot 2 (120 degrees) -->
    <g transform="rotate(120)">
      <rect x="-40" y="-160" width="80" height="60" rx="8" class="slot" style="animation: slot2Fill 12s infinite;"/>
      <text x="0" y="-125" class="slot-text" style="animation: text2 12s infinite;">30</text>
      <text x="0" y="-95" class="index-text">[2]</text>
    </g>

    <!-- Slot 3 (180 degrees) -->
    <g transform="rotate(180)">
      <rect x="-40" y="-160" width="80" height="60" rx="8" class="slot" style="animation: slot3Fill 12s infinite;"/>
      <text x="0" y="-125" class="slot-text" style="animation: text3 12s infinite;">40</text>
      <text x="0" y="-95" class="index-text">[3]</text>
    </g>

    <!-- Slot 4 (240 degrees) -->
    <g transform="rotate(240)">
      <rect x="-40" y="-160" width="80" height="60" rx="8" class="slot" fill="#2d2d44"/>
      <text x="0" y="-95" class="index-text">[4]</text>
    </g>

    <!-- Slot 5 (300 degrees) -->
    <g transform="rotate(300)">
      <rect x="-40" y="-160" width="80" height="60" rx="8" class="slot" fill="#2d2d44"/>
      <text x="0" y="-95" class="index-text">[5]</text>
    </g>

    <!-- FRONT pointer (inner circle) -->
    <g style="animation: frontPointer 12s infinite; transform-origin: 0 0;">
      <line x1="0" y1="0" x2="0" y2="-90" stroke="#ffe66d" stroke-width="4" marker-end="url(#arrowFront)"/>
      <text x="0" y="-70" text-anchor="middle" class="pointer-text" fill="#ffe66d">F</text>
    </g>

    <!-- REAR pointer (outer circle) -->
    <g style="animation: rearPointer 12s infinite; transform-origin: 0 0;">
      <line x1="0" y1="0" x2="0" y2="-200" stroke="#ff6b6b" stroke-width="4" marker-end="url(#arrowRear)"/>
      <circle cx="0" cy="0" r="5" fill="#ff6b6b"/>
      <text x="0" y="-210" text-anchor="middle" class="pointer-text" fill="#ff6b6b">R</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 500)">
    <text x="0" y="0" class="subtitle-text">Operations:</text>
    <text x="0" y="25" class="subtitle-text" fill="#4ecdc4">1. Enqueue at REAR (clockwise)</text>
    <text x="0" y="50" class="subtitle-text" fill="#ff6b6b">2. Dequeue from FRONT (clockwise)</text>
  </g>

  <g transform="translate(500, 500)">
    <text x="0" y="0" class="subtitle-text">F = FRONT pointer</text>
    <text x="0" y="25" class="subtitle-text">R = REAR pointer</text>
    <text x="0" y="50" class="subtitle-text" fill="#ffe66d">Wrap-around at end</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowFront" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#ffe66d"/>
    </marker>
    <marker id="arrowRear" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#ff6b6b"/>
    </marker>
  </defs>
</svg>
