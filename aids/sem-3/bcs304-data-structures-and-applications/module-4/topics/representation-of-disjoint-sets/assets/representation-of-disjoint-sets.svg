<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa" />
  <g class="step" id="step1" data-narration="A disjoint set is a collection of sets that have no elements in common.">
    <rect x="50" y="50" width="200" height="100" fill="#e3f2fd" rx="10" />
    <text x="120" y="120" font-size="24" fill="#1976d2">Disjoint Set</text>
  </g>
  <g class="step" id="step2" data-narration="Disjoint sets can be represented using linked lists or arrays.">
    <rect x="300" y="50" width="200" height="100" fill="#e8f5e9" rx="10" />
    <text x="370" y="120" font-size="24" fill="#388e3c">Linked List</text>
    <rect x="550" y="50" width="200" height="100" fill="#fff3e0" rx="10" />
    <text x="620" y="120" font-size="24" fill="#ff9800">Array</text>
  </g>
  <g class="step" id="step3" data-narration="In linked list representation, each element points to the next element.">
    <rect x="300" y="200" width="100" height="50" fill="#e8f5e9" rx="10" />
    <text x="320" y="230" font-size="18" fill="#388e3c">Element 1</text>
    <line x1="400" y1="225" x2="450" y2="225" stroke="#388e3c" marker-end="url(#arrow)" />
    <rect x="450" y="200" width="100" height="50" fill="#e8f5e9" rx="10" />
    <text x="470" y="230" font-size="18" fill="#388e3c">Element 2</text>
  </g>
  <g class="step" id="step4" data-narration="In array representation, the array index represents the element, and the value at that index represents the parent of that element.">
    <rect x="550" y="200" width="100" height="50" fill="#fff3e0" rx="10" />
    <text x="570" y="230" font-size="18" fill="#ff9800">Index 1</text>
    <rect x="550" y="300" width="100" height="50" fill="#fff3e0" rx="10" />
    <text x="570" y="330" font-size="18" fill="#ff9800">Parent 1</text>
  </g>
  <g class="step" id="step5" data-narration="Array representation is more memory-efficient and has better cache efficiency than linked list representation.">
    <rect x="300" y="400" width="200" height="100" fill="#fff3e0" rx="10" />
    <text x="370" y="470" font-size="24" fill="#ff9800">Array Representation</text>
    <rect x="550" y="400" width="200" height="100" fill="#e8f5e9" rx="10" />
    <text x="620" y="470" font-size="24" fill="#388e3c">Linked List Representation</text>
    <line x1="500" y1="450" x2="550" y2="450" stroke="#ff9800" marker-end="url(#arrow)" />
  </g>
  <g class="step" id="step6" data-narration="Disjoint sets have applications in network connectivity, image segmentation, and data clustering.">
    <rect x="50" y="500" width="200" height="100" fill="#f3e5f5" rx="10" />
    <text x="120" y="570" font-size="24" fill="#9c27b0">Network Connectivity</text>
    <rect x="300" y="500" width="200" height="100" fill="#f3e5f5" rx="10" />
    <text x="370" y="570" font-size="24" fill="#9c27b0">Image Segmentation</text>
    <rect x="550" y="500" width="200" height="100" fill="#f3e5f5" rx="10" />
    <text x="620" y="570" font-size="24" fill="#9c27b0">Data Clustering</text>
  </g>
</svg>