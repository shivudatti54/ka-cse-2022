<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes bubbleUp {
        0% { transform: translate(0, 60px); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translate(0, 0); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }

      @keyframes highlight {
        0%, 100% { fill: #ff6b6b; }
        50% { fill: #ff9999; }
      }

      @keyframes pathGlow {
        0%, 100% { stroke-opacity: 0.3; }
        50% { stroke-opacity: 1; }
      }

      .node {
        fill: #00d4ff;
        stroke: #4ecdc4;
        stroke-width: 2;
        animation: fadeIn 0.5s ease-in;
      }

      .node-text {
        fill: #1a1a2e;
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .edge {
        stroke: #4ecdc4;
        stroke-width: 2;
        fill: none;
        opacity: 0.6;
      }

      .title {
        fill: #ffe66d;
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 24px;
        font-weight: bold;
        text-anchor: middle;
      }

      .label {
        fill: #ffe66d;
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 13px;
        font-weight: 600;
      }

      .info-text {
        fill: #e0e0e0;
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 12px;
      }

      .highlight {
        fill: #ff6b6b;
        animation: pulse 2s infinite;
      }

      .insert-node {
        fill: #ff6b6b;
        stroke: #4ecdc4;
        stroke-width: 2;
        animation: bubbleUp 2s ease-in-out infinite;
      }

      .insert-path {
        stroke: #ffe66d;
        stroke-width: 3;
        fill: none;
        stroke-dasharray: 5,5;
        animation: pathGlow 2s ease-in-out infinite;
      }

      .min-label {
        fill: #ffe66d;
        font-size: 11px;
        font-weight: bold;
      }

      .max-label {
        fill: #ffe66d;
        font-size: 11px;
        font-weight: bold;
      }

      .depq-node-min {
        fill: #00d4ff;
        stroke: #4ecdc4;
        stroke-width: 2;
      }

      .depq-node-max {
        fill: #ff6b6b;
        stroke: #4ecdc4;
        stroke-width: 2;
      }

      .array-cell {
        fill: none;
        stroke: #4ecdc4;
        stroke-width: 1.5;
      }

      .array-text {
        fill: #e0e0e0;
        font-family: 'Consolas', monospace;
        font-size: 11px;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <g data-narration="This diagram illustrates priority queues, showing both single-ended priority queues implemented as min and max heaps, and double-ended priority queues that support operations at both ends.">
    <text x="400" y="25" class="title">Priority Queues: Single and Double-Ended</text>
  </g>

  <!-- LEFT SIDE: MIN-HEAP -->
  <g data-narration="A min-heap is a single-ended priority queue where the smallest element is always at the root. It supports efficient insert, delete minimum, and find minimum operations.">
    <text x="200" y="55" class="label" text-anchor="middle">MIN-HEAP (Single-Ended PQ)</text>

    <!-- Edges -->
    <line x1="200" y1="90" x2="160" y2="130" class="edge"/>
    <line x1="200" y1="90" x2="240" y2="130" class="edge"/>
    <line x1="160" y1="130" x2="140" y2="170" class="edge"/>
    <line x1="160" y1="130" x2="180" y2="170" class="edge"/>
    <line x1="240" y1="130" x2="220" y2="170" class="edge"/>

    <!-- Insert animation path -->
    <path d="M 240 130 L 240 170" class="insert-path"/>

    <!-- Nodes -->
    <circle cx="200" cy="90" r="18" class="node"/>
    <text x="200" y="90" class="node-text">3</text>
    <rect x="192" y="72" width="16" height="12" class="highlight" rx="2"/>
    <text x="200" y="79" class="min-label" text-anchor="middle">MIN</text>

    <circle cx="160" cy="130" r="18" class="node"/>
    <text x="160" y="130" class="node-text">5</text>

    <circle cx="240" cy="130" r="18" class="node"/>
    <text x="240" y="130" class="node-text">8</text>

    <circle cx="140" cy="170" r="18" class="node"/>
    <text x="140" y="170" class="node-text">10</text>

    <circle cx="180" cy="170" r="18" class="node"/>
    <text x="180" y="170" class="node-text">12</text>

    <circle cx="220" cy="170" r="18" class="node"/>
    <text x="220" y="170" class="node-text">15</text>

    <!-- Animated insert node -->
    <circle cx="240" cy="170" r="18" class="insert-node"/>
    <text x="240" y="170" class="node-text">4</text>

    <!-- Operations -->
    <text x="200" y="200" class="info-text" text-anchor="middle">Insert: O(log n)</text>
    <text x="200" y="215" class="info-text" text-anchor="middle">DeleteMin: O(log n)</text>
    <text x="200" y="230" class="info-text" text-anchor="middle">FindMin: O(1)</text>
  </g>

  <!-- RIGHT SIDE: MAX-HEAP -->
  <g data-narration="A max-heap is another single-ended priority queue where the largest element is always at the root. It mirrors the min-heap structure but maintains the maximum at the top.">
    <text x="600" y="55" class="label" text-anchor="middle">MAX-HEAP (Single-Ended PQ)</text>

    <!-- Edges -->
    <line x1="600" y1="90" x2="560" y2="130" class="edge"/>
    <line x1="600" y1="90" x2="640" y2="130" class="edge"/>
    <line x1="560" y1="130" x2="540" y2="170" class="edge"/>
    <line x1="560" y1="130" x2="580" y2="170" class="edge"/>
    <line x1="640" y1="130" x2="620" y2="170" class="edge"/>

    <!-- Nodes -->
    <circle cx="600" cy="90" r="18" class="node"/>
    <text x="600" y="90" class="node-text">20</text>
    <rect x="592" y="72" width="16" height="12" class="highlight" rx="2"/>
    <text x="600" y="79" class="max-label" text-anchor="middle">MAX</text>

    <circle cx="560" cy="130" r="18" class="node"/>
    <text x="560" y="130" class="node-text">18</text>

    <circle cx="640" cy="130" r="18" class="node"/>
    <text x="640" y="130" class="node-text">15</text>

    <circle cx="540" cy="170" r="18" class="node"/>
    <text x="540" y="170" class="node-text">12</text>

    <circle cx="580" cy="170" r="18" class="node"/>
    <text x="580" y="170" class="node-text">10</text>

    <circle cx="620" cy="170" r="18" class="node"/>
    <text x="620" y="170" class="node-text">8</text>

    <!-- Operations -->
    <text x="600" y="200" class="info-text" text-anchor="middle">Insert: O(log n)</text>
    <text x="600" y="215" class="info-text" text-anchor="middle">DeleteMax: O(log n)</text>
    <text x="600" y="230" class="info-text" text-anchor="middle">FindMax: O(1)</text>
  </g>

  <!-- BOTTOM: DOUBLE-ENDED PRIORITY QUEUE -->
  <g data-narration="A double-ended priority queue supports both minimum and maximum operations. The min-max heap uses alternating levels where min levels maintain heap order for minimum values and max levels for maximum values.">
    <text x="400" y="260" class="label" text-anchor="middle">DOUBLE-ENDED PRIORITY QUEUE (DEPQ)</text>
    <text x="400" y="278" class="info-text" text-anchor="middle">Min-Max Heap: Alternating Min and Max Levels</text>

    <!-- Level indicators -->
    <text x="50" y="310" class="info-text" font-style="italic">Level 0 (MIN):</text>
    <text x="50" y="350" class="info-text" font-style="italic">Level 1 (MAX):</text>
    <text x="50" y="390" class="info-text" font-style="italic">Level 2 (MIN):</text>

    <!-- Edges -->
    <line x1="400" y1="305" x2="350" y2="345" class="edge"/>
    <line x1="400" y1="305" x2="450" y2="345" class="edge"/>
    <line x1="350" y1="345" x2="310" y2="385" class="edge"/>
    <line x1="350" y1="345" x2="350" y2="385" class="edge"/>
    <line x1="450" y1="345" x2="410" y2="385" class="edge"/>
    <line x1="450" y1="345" x2="450" y2="385" class="edge"/>

    <!-- Min-Max Heap Nodes -->
    <!-- Root (MIN level) -->
    <circle cx="400" cy="305" r="18" class="depq-node-min"/>
    <text x="400" y="305" class="node-text">2</text>

    <!-- Level 1 (MAX level) -->
    <circle cx="350" cy="345" r="18" class="depq-node-max"/>
    <text x="350" y="345" class="node-text">45</text>

    <circle cx="450" cy="345" r="18" class="depq-node-max"/>
    <text x="450" y="345" class="node-text">50</text>

    <!-- Level 2 (MIN level) -->
    <circle cx="310" cy="385" r="18" class="depq-node-min"/>
    <text x="310" y="385" class="node-text">8</text>

    <circle cx="350" cy="385" r="18" class="depq-node-min"/>
    <text x="350" y="385" class="node-text">15</text>

    <circle cx="410" cy="385" r="18" class="depq-node-min"/>
    <text x="410" y="385" class="node-text">10</text>

    <circle cx="450" cy="385" r="18" class="depq-node-min"/>
    <text x="450" y="385" class="node-text">25</text>

    <!-- DEPQ Operations -->
    <text x="200" y="425" class="info-text">FindMin: Returns root (2) - O(1)</text>
    <text x="200" y="440" class="info-text">FindMax: Max of root children (50) - O(1)</text>
    <text x="200" y="455" class="info-text">Supports: DeleteMin AND DeleteMax</text>

    <!-- Implementations -->
    <text x="550" y="425" class="label">Implementations:</text>
    <text x="550" y="440" class="info-text">• Min-Max Heap</text>
    <text x="550" y="455" class="info-text">• Deap (Double-Ended Heap)</text>
    <text x="550" y="470" class="info-text">• Interval Heap</text>
  </g>

  <!-- ARRAY REPRESENTATION -->
  <g data-narration="Binary heaps are efficiently stored in arrays using index relationships. For any node at index i, its parent is at index (i-1)/2, left child at 2i+1, and right child at 2i+2.">
    <text x="400" y="500" class="label" text-anchor="middle">Array Representation (Min-Heap Example)</text>

    <!-- Array cells -->
    <rect x="150" y="510" width="40" height="30" class="array-cell"/>
    <rect x="190" y="510" width="40" height="30" class="array-cell"/>
    <rect x="230" y="510" width="40" height="30" class="array-cell"/>
    <rect x="270" y="510" width="40" height="30" class="array-cell"/>
    <rect x="310" y="510" width="40" height="30" class="array-cell"/>
    <rect x="350" y="510" width="40" height="30" class="array-cell"/>
    <rect x="390" y="510" width="40" height="30" class="array-cell"/>

    <!-- Array values -->
    <text x="170" y="526" class="array-text">3</text>
    <text x="210" y="526" class="array-text">5</text>
    <text x="250" y="526" class="array-text">8</text>
    <text x="290" y="526" class="array-text">10</text>
    <text x="330" y="526" class="array-text">12</text>
    <text x="370" y="526" class="array-text">15</text>
    <text x="410" y="526" class="array-text">4</text>

    <!-- Array indices -->
    <text x="170" y="555" class="array-text" font-size="10">0</text>
    <text x="210" y="555" class="array-text" font-size="10">1</text>
    <text x="250" y="555" class="array-text" font-size="10">2</text>
    <text x="290" y="555" class="array-text" font-size="10">3</text>
    <text x="330" y="555" class="array-text" font-size="10">4</text>
    <text x="370" y="555" class="array-text" font-size="10">5</text>
    <text x="410" y="555" class="array-text" font-size="10">6</text>

    <!-- Formulas -->
    <text x="460" y="525" class="info-text">parent(i) = (i-1)/2</text>
    <text x="460" y="540" class="info-text">left(i) = 2i+1</text>
    <text x="460" y="555" class="info-text">right(i) = 2i+2</text>
  </g>

  <!-- Legend -->
  <g>
    <circle cx="30" cy="580" r="8" class="depq-node-min"/>
    <text x="45" y="585" class="info-text" font-size="11">Min Level</text>

    <circle cx="130" cy="580" r="8" class="depq-node-max"/>
    <text x="145" y="585" class="info-text" font-size="11">Max Level</text>

    <circle cx="240" cy="580" r="8" class="insert-node"/>
    <text x="255" y="585" class="info-text" font-size="11">Inserting</text>
  </g>
</svg>