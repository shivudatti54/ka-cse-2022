<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes insertKey {
        0%, 15% { opacity: 0; transform: translateY(-30px); }
        20%, 35% { opacity: 1; transform: translateY(0); }
        40%, 100% { opacity: 0.3; transform: translateY(0); }
      }
      @keyframes bucketSplit {
        0%, 40% { transform: scaleX(1); }
        45%, 55% { transform: scaleX(1.1); fill: #ff6b6b; }
        60%, 100% { transform: scaleX(1); }
      }
      @keyframes directoryDouble {
        0%, 55% { opacity: 0; }
        60%, 100% { opacity: 1; }
      }
      @keyframes depthUpdate {
        0%, 50% { fill: #e0e0e0; }
        55%, 65% { fill: #ffe66d; transform: scale(1.2); }
        70%, 100% { fill: #e0e0e0; transform: scale(1); }
      }
      @keyframes pointerMove {
        0%, 60% { stroke-dashoffset: 100; }
        70%, 100% { stroke-dashoffset: 0; }
      }
      @keyframes titleGlow {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1; text-shadow: 0 0 15px #00d4ff; }
      }
      @keyframes phaseHighlight {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; fill: #00d4ff; }
      }

      .title {
        font-family: sans-serif;
        font-size: 24px;
        fill: #00d4ff;
        font-weight: bold;
        animation: titleGlow 3s ease-in-out infinite;
      }
      .subtitle {
        font-family: sans-serif;
        font-size: 14px;
        fill: #e0e0e0;
        font-weight: bold;
      }
      .label {
        font-family: sans-serif;
        font-size: 11px;
        fill: #e0e0e0;
      }
      .bucket-box {
        fill: #2a2a3e;
        stroke: #4ecdc4;
        stroke-width: 2;
      }
      .bucket-text {
        font-family: monospace;
        font-size: 13px;
        fill: #ffe66d;
        font-weight: bold;
      }
      .dir-cell {
        fill: #2a2a3e;
        stroke: #00d4ff;
        stroke-width: 2;
      }
      .depth-text {
        font-family: monospace;
        font-size: 12px;
        fill: #e0e0e0;
      }
      .key-text {
        font-family: monospace;
        font-size: 11px;
        fill: #ff6b6b;
      }
      .phase-label {
        font-family: sans-serif;
        font-size: 16px;
        fill: #4ecdc4;
        font-weight: bold;
      }
    </style>

    <marker id="arrow-dir" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#00d4ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" class="title" text-anchor="middle">Dynamic Hashing - Extendible Hashing</text>
  <text x="400" y="55" class="subtitle" text-anchor="middle">Directory doubling and bucket splitting in action</text>

  <!-- Phase 1: Initial State -->
  <g id="phase1">
    <rect x="20" y="75" width="760" height="155" rx="6" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>
    <text x="30" y="95" class="phase-label" style="animation: phaseHighlight 12s ease-in-out infinite;">Phase 1: Initial State (Global Depth = 2)</text>

    <!-- Directory -->
    <g id="initialDirectory">
      <text x="50" y="125" class="label">Directory:</text>

      <rect x="50" y="135" width="40" height="30" class="dir-cell"/>
      <text x="70" y="155" class="depth-text" text-anchor="middle">00</text>

      <rect x="50" y="165" width="40" height="30" class="dir-cell"/>
      <text x="70" y="185" class="depth-text" text-anchor="middle">01</text>

      <rect x="50" y="195" width="40" height="30" class="dir-cell"/>
      <text x="70" y="215" class="depth-text" text-anchor="middle">10</text>

      <!-- Pointers -->
      <line x1="90" y1="150" x2="145" y2="150" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)"/>
      <line x1="90" y1="180" x2="145" y2="180" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)"/>
      <line x1="90" y1="210" x2="145" y2="190" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)"/>
    </g>

    <!-- Buckets -->
    <g id="initialBuckets">
      <rect x="150" y="130" width="90" height="40" class="bucket-box"/>
      <text x="195" y="145" class="bucket-text" text-anchor="middle">Bucket A</text>
      <text x="195" y="160" class="key-text" text-anchor="middle">4, 8, 12</text>
      <text x="250" y="150" class="label">LD=2</text>

      <rect x="150" y="175" width="90" height="40" class="bucket-box"/>
      <text x="195" y="190" class="bucket-text" text-anchor="middle">Bucket B</text>
      <text x="195" y="205" class="key-text" text-anchor="middle">5, 9</text>
      <text x="250" y="195" class="label">LD=2</text>
    </g>

    <text x="350" y="165" class="label">GD = Global Depth</text>
    <text x="350" y="185" class="label">LD = Local Depth</text>
    <text x="350" y="205" class="label">Using last 2 bits for hashing</text>
  </g>

  <!-- Phase 2: Insert causing overflow -->
  <g id="phase2">
    <rect x="20" y="240" width="760" height="145" rx="6" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
    <text x="30" y="260" class="phase-label" fill="#ff6b6b" style="animation: phaseHighlight 12s ease-in-out infinite; animation-delay: 3s;">Phase 2: Insert 20 → Bucket A Full! (Capacity = 3)</text>

    <!-- Directory remains same -->
    <g id="dir2">
      <text x="50" y="285" class="label">Directory:</text>

      <rect x="50" y="295" width="40" height="30" class="dir-cell"/>
      <text x="70" y="315" class="depth-text" text-anchor="middle">00</text>

      <rect x="50" y="325" width="40" height="30" class="dir-cell"/>
      <text x="70" y="345" class="depth-text" text-anchor="middle">01</text>

      <rect x="50" y="355" width="40" height="30" class="dir-cell"/>
      <text x="70" y="375" class="depth-text" text-anchor="middle">10</text>

      <line x1="90" y1="310" x2="145" y2="310" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)"/>
      <line x1="90" y1="340" x2="145" y2="340" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)"/>
      <line x1="90" y1="370" x2="145" y2="350" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)"/>
    </g>

    <!-- Bucket A overflowing -->
    <rect x="150" y="290" width="100" height="40" class="bucket-box" style="animation: bucketSplit 12s ease-in-out infinite; animation-delay: 2s;"/>
    <text x="200" y="305" class="bucket-text" text-anchor="middle">Bucket A</text>
    <text x="200" y="320" class="key-text" text-anchor="middle">4,8,12,20</text>

    <rect x="150" y="335" width="90" height="40" class="bucket-box"/>
    <text x="195" y="350" class="bucket-text" text-anchor="middle">Bucket B</text>
    <text x="195" y="365" class="key-text" text-anchor="middle">5, 9</text>

    <g style="animation: insertKey 12s ease-in-out infinite; animation-delay: 1.5s;">
      <rect x="280" y="285" width="50" height="30" fill="#ff6b6b" opacity="0.8" stroke="#ffe66d" stroke-width="2" rx="4"/>
      <text x="305" y="305" class="bucket-text" text-anchor="middle" fill="#fff">20</text>
      <text x="340" y="305" class="label" fill="#ff6b6b">OVERFLOW!</text>
    </g>
  </g>

  <!-- Phase 3: After split and directory double -->
  <g id="phase3">
    <rect x="20" y="395" width="760" height="185" rx="6" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>
    <text x="30" y="415" class="phase-label" style="animation: phaseHighlight 12s ease-in-out infinite; animation-delay: 6s;">Phase 3: After Split → Global Depth = 3, Directory Doubled</text>

    <!-- New doubled directory -->
    <g id="doubledDir" style="animation: directoryDouble 12s ease-in-out infinite;">
      <text x="50" y="445" class="label">New Directory:</text>

      <rect x="50" y="455" width="45" height="25" class="dir-cell"/>
      <text x="72" y="472" class="depth-text" text-anchor="middle" font-size="11">000</text>

      <rect x="50" y="480" width="45" height="25" class="dir-cell"/>
      <text x="72" y="497" class="depth-text" text-anchor="middle" font-size="11">001</text>

      <rect x="50" y="505" width="45" height="25" class="dir-cell"/>
      <text x="72" y="522" class="depth-text" text-anchor="middle" font-size="11">010</text>

      <rect x="50" y="530" width="45" height="25" class="dir-cell"/>
      <text x="72" y="547" class="depth-text" text-anchor="middle" font-size="11">011</text>

      <rect x="50" y="555" width="45" height="25" class="dir-cell"/>
      <text x="72" y="572" class="depth-text" text-anchor="middle" font-size="11">100</text>

      <!-- Pointers after split -->
      <line x1="95" y1="467" x2="145" y2="467" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)" stroke-dasharray="100" style="animation: pointerMove 12s ease-in-out infinite;"/>
      <line x1="95" y1="492" x2="145" y2="487" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)" stroke-dasharray="100" style="animation: pointerMove 12s ease-in-out infinite;"/>
      <line x1="95" y1="517" x2="145" y2="527" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)" stroke-dasharray="100" style="animation: pointerMove 12s ease-in-out infinite;"/>
      <line x1="95" y1="542" x2="145" y2="542" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)" stroke-dasharray="100" style="animation: pointerMove 12s ease-in-out infinite;"/>
      <line x1="95" y1="567" x2="145" y2="557" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-dir)" stroke-dasharray="100" style="animation: pointerMove 12s ease-in-out infinite;"/>
    </g>

    <!-- Split buckets -->
    <g style="animation: directoryDouble 12s ease-in-out infinite;">
      <rect x="150" y="455" width="90" height="35" class="bucket-box" stroke="#ffe66d"/>
      <text x="195" y="470" class="bucket-text" text-anchor="middle">Bucket A0</text>
      <text x="195" y="485" class="key-text" text-anchor="middle">8</text>
      <text x="250" y="472" class="label" style="animation: depthUpdate 12s ease-in-out infinite;">LD=3</text>

      <rect x="150" y="495" width="90" height="35" class="bucket-box" stroke="#ffe66d"/>
      <text x="195" y="510" class="bucket-text" text-anchor="middle">Bucket A1</text>
      <text x="195" y="525" class="key-text" text-anchor="middle">4,12,20</text>
      <text x="250" y="512" class="label" style="animation: depthUpdate 12s ease-in-out infinite;">LD=3</text>

      <rect x="150" y="535" width="90" height="35" class="bucket-box"/>
      <text x="195" y="550" class="bucket-text" text-anchor="middle">Bucket B</text>
      <text x="195" y="565" class="key-text" text-anchor="middle">5, 9</text>
      <text x="250" y="552" class="label">LD=2</text>
    </g>

    <text x="350" y="470" class="label" fill="#4ecdc4">Bucket A split into A0 and A1</text>
    <text x="350" y="490" class="label" fill="#4ecdc4">Directory doubled: 3 → 6 entries</text>
    <text x="350" y="510" class="label" fill="#4ecdc4">Now using last 3 bits</text>
    <text x="350" y="530" class="label" fill="#ffe66d">GD increased: 2 → 3</text>
    <text x="350" y="550" class="label" fill="#ffe66d">A0, A1 LD increased: 2 → 3</text>
  </g>

  <!-- Summary -->
  <text x="400" y="595" class="label" text-anchor="middle" font-size="10" opacity="0.7">
    Dynamic hashing grows gracefully • Directory doubles when needed • Buckets split independently based on local depth
  </text>
</svg>