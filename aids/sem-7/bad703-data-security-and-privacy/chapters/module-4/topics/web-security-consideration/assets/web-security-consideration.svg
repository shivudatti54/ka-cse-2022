<svg width="420" height="400" data-topic-id="web-security-consideration" viewBox="0 0 420 400">
  <title>Web Security Consideration</title>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="50%" stop-color="#33CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0099CC" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="100" height="20" fill="#FFC107" rx="5"/>
    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">B. Web Security Consideration</text>
  </g>
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="100" height="20" fill="#33CCCC" rx="5"/>
    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">1. Introduction to Web Security</text>
    <animateTransform attributeName="transform" type="rotate" origin="50% 50%" begin="0s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="100" height="20" fill="#FFC107" rx="5"/>
    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">2. Secure Communication (HTTPS)</text>
    <animateTransform attributeName="transform" type="rotate" origin="50% 50%" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="100" height="20" fill="#33CCCC" rx="5"/>
    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">3. Input Validation and Sanitization</text>
    <animateTransform attributeName="transform" type="rotate" origin="50% 50%" begin="4s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="100" height="20" fill="#FFC107" rx="5"/>
    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">4. Password Storage and Hashing</text>
    <animateTransform attributeName="transform" type="rotate" origin="50% 50%" begin="6s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 270)">
    <rect x="0" y="0" width="100" height="20" fill="#33CCCC" rx="5"/>
    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">5. Secure Data Storage</text>
    <animateTransform attributeName="transform" type="rotate" origin="50% 50%" begin="8s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(20, 320)">
