    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">6. Authentication and Authorization</text>
  </g>
  <g transform="translate(20, 380)">
    <rect x="0" y="0" width="100" height="20" fill="#33CCCC" rx="5"/>
    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">7. Secure Coding Practices</text>
  </g>
  <g transform="translate(20, 440)">
    <rect x="0" y="0" width="100" height="20" fill="#FFC107" rx="5"/>
    <text x="5" y="5" font-size="16" fill="#000" text-anchor="middle">8. Web Security Best Practices</text>
  </g>
  <footer>
