<svg width="420" height="400" data-topic-id="172-Chapter-20-201">
  <defs>
    <linearGradient id="background-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7E8F2" stop-opacity="1"/>
      <stop offset="50%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7E8F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Data Security and Privacy</title>
  <rect x="50" y="50" width="320" height="300" fill="url(#background-gradient)"/>
  <g transform="translate(50, 50)">
    <text x="10" y="10" font-size="24" font-family="Arial" fill="#3B5998">Data Security and Privacy</text>
    <rect x="15" y="40" width="300" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="50" font-size="18" font-family="Arial" fill="#3B5998" data-narration="Data Security: Protecting sensitive information from unauthorized access, use, disclosure, disruption, modification, or destruction.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 20" begin="0s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="15" y="70" width="300" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#3B5998" data-narration="Data Privacy: The right to control and manage one's personal information, ensuring it is handled in a way that respects individual autonomy and dignity.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 40" begin="2s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="15" y="100" width="300" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="110" font-size="18" font-family="Arial" fill="#3B5998" data-narration="Measures for Data Security and Privacy include encryption, firewalls, access control, and backup and recovery.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 50" begin="4s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="15" y="130" width="300" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="140" font-size="18" font-family="Arial" fill="#3B5998" data-narration="Data Security Frameworks and Standards include the NIST Cybersecurity Framework, ISO 27001, and GDPR.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 70" begin="6s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="15" y="160" width="300" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="170" font-size="18" font-family="Arial" fill="#3B5998" data-narration="Data Privacy Laws and Regulations include the GDPR and other national laws.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 90" begin="8s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="15" y="190" width="300" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="200" font-size="18" font-family="Arial" fill="#3B5998" data-narration="Protects sensitive information from theft, unauthorized access, or misuse. Maintains trust and credibility in institutions and organizations. Ensures consumer confidence and loyalty.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 110" begin="10s" dur="2s" repeatCount="indefinite"/>
    </text>
    <rect x="15" y="220" width="300" height="20" fill="#FFFFFF" rx="5"/>
    <text x="20" y="230" font-size="18" font-family="Arial" fill="#3B5998" data-narration="Malware, phishing, SQL injection, and man-in-the-middle attacks are common data security threats.">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 130" begin="12s" dur="2s" repeatCount="indefinite"/>
    </text>
    <g transform="translate(0, 300)">
      <rect x="15" y="10" width="300" height="20" fill="#FFFFFF" rx="5"/>
      <text x="20" y="20" font-size="18" font-family="Arial" fill="#3B5998">Footer</text>
    </g>
  </g>
</svg>