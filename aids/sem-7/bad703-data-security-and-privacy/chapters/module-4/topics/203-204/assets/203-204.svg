<svg width="420" height="400" data-topic-id="203-204"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 400"
     style="background: #C7E8F6; background-radius: 10px;">
    <title>Data Privacy Laws and Regulations</title>
    <footer>Learn More</footer>

    <rect x="10" y="10" width="400" height="30" fill="#2F4F7F"/>
    <text x="15" y="35" font-size="18" font-family="Arial" fill="#E0E0E3">Data Privacy Laws and Regulations</text>

    <section data-narration="Overview">
        <rect x="20" y="50" width="380" height="30" fill="#A2D2FF"/>
        <text x="25" y="65" font-size="14" font-family="Arial" fill="#E0E0E3">Overview</text>
        <animateTransform attributeName="transform" type="rotate" from="0 210 50" to="0 210 150" dur="1000" begin="0s"/>
    </section>

    <section data-narration="Definitions">
        <rect x="20" y="150" width="380" height="30" fill="#E0E0E3"/>
        <text x="25" y="165" font-size="14" font-family="Arial" fill="#2F4F7F">Definitions</text>
        <animateTransform attributeName="transform" type="rotate" from="0 210 100" to="0 210 200" dur="1000" begin="1s"/>
        <circle cx="220" cy="120" r="10" fill="#2F4F7F" opacity=".7"/>
        <text x="225" y="130" font-size="12" font-family="Arial" fill="#2F4F7F">Data Subject</text>
        <text x="225" y="150" font-size="12" font-family="Arial" fill="#2F4F7F">Processing</text>
    </section>

    <section data-narration="Types of Data Privacy Laws">
        <rect x="20" y="250" width="380" height="30" fill="#E0E0E3"/>
        <text x="25" y="265" font-size="14" font-family="Arial" fill="#2F4F7F">Types of Data Privacy Laws</text>
        <animateTransform attributeName="transform" type="rotate" from="0 210 300" to="0 210 400" dur="1000" begin="2s"/>
        <rect x="220" y="310" width="10" height="10" fill="#FFC107"/>
        <text x="230" y="320" font-size="12" font-family="Arial" fill="#FFC107">GDPR</text>
        <rect x="240" y="310" width="10" height="10" fill="#FFC107"/>
        <text x="250" y="320" font-size="12" font-family="Arial" fill="#FFC107">HIPAA</text>
        <rect x="260" y="310" width="10" height="10" fill="#FFC107"/>
        <text x="270" y="320" font-size="12" font-family="Arial" fill="#FFC107">CCPA</text>
    </section>

    <section data-narration="Key Concepts">
        <rect x="20" y="350" width="380" height="30" fill="#A2D2FF"/>
        <text x="25" y="365" font-size="14" font-family="Arial" fill="#E0E0E3">Key Concepts</text>
        <animateTransform attributeName="transform" type="rotate" from="0 210 400" to="0 210 500" dur="1000" begin="3s"/>
        <circle cx="220" cy="420" r="10" fill="#2F4F7F" opacity=".7"/>
        <text x="225" y="430" font-size="12" font-family="Arial" fill="#2F4F7F">Data Subject</text>
        <text x="225" y="450" font-size="12" font-family="Arial" fill="#2F4F7F">Processing</text>
    </section>

    <section data-narration="Best Practices">
        <rect x="20" y="450" width="380" height="30" fill="#E0E0E3"/>
        <text x="25" y="465" font-size="14" font-family="Arial" fill="#2F4F7F">Best Practices</text>
        <animateTransform attributeName="transform" type="rotate" from="0 210 500" to="0 210 600" dur="1000" begin="4s"/>
        <rect x="220" y="550" width="10" height="10" fill="#FFC107"/>
        <text x="230" y="560" font-size="12" font-family="Arial" fill="#FFC107">Implement robust security measures</text>
        <rect x="240" y="550" width="10" height="10" fill="#FFC107"/>
        <text x="250" y="560" font-size="12" font-family="Arial" fill="#FFC107">Obtain explicit consent</text>
    </section>

    <footer>Learn More</footer>
</svg>