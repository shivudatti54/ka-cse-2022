  <title>IP Security: An Overview</title>
  <footer>Powered by <a href="https://www.example.com">Example</a></footer>

  <!-- Introduction Section -->
  <section data-narration="IP Security Introduction">
    <h2>IP Security: An Overview</h2>
    <p>IP Security (IPSec) is a suite of security protocols that provides confidentiality, integrity, and authenticity of IP communications over the internet.</p>
  </section>

  <!-- IP Security Overview Section -->
  <section data-narration="IP Security Overview">
    <h2>IP Security Overview</h2>
    <p>IPSec provides two main types of security:</p>
    <ul>
      <li>Transport Layer Security (TLS): Provides confidentiality and integrity of IP packets at the transport layer.</li>
      <li>Network Layer Security: Provides authentication, integrity, and confidentiality of IP packets at the network layer.</li>
    </ul>
  </section>

  <!-- IP Security Policy Section -->
  <section data-narration="IP Security Policy">
    <h2>IP Security Policy</h2>
    <p>An IP Security Policy is a set of security rules and settings that define how IPSec should be used to protect IP communications.</p>
    <ul>
      <li>Authentication: Verifies the identity of the communicating parties.</li>
      <li>Encryption: Protects IP packets from unauthorized access.</li>
      <li>Integrity: Ensures that IP packets are not tampered with during transmission.</li>
      <li>Confidentiality: Protects IP packets from eavesdropping.</li>
    </ul>
  </section>

  <!-- Encapsulating Security Payload (ESP) Section -->
  <section data-narration="Encapsulating Security Payload (ESP)">
    <h2>Encapsulating Security Payload (ESP)</h2>
    <p>ESP is a tunneling protocol that encapsulates IP packets with IPSec security headers.</p>
    <div>
      <rect x="20" y="20" width="380" height="200" rx="10" />
      <path d="M 20,20 L 40,40 L 60,60 L 80,80 L 100,100 L 120,120 L 140,140 L 160,160 L 180,180 L 200,200 Z" />
    </div>
  </section>

  <!-- Combining Security Associations (SAs) Section -->
  <section data-narration="Combining Security Associations (SAs)">
    <h2>Combining Security Associations (SAs)</h2>
    <p>Combining SAs refers to the process of creating a single SA that includes multiple previously established SAs.</p>
    <p>This allows for:</p>
    <ul>
      <li>Efficient use of resources: Combining SAs reduces the overhead of creating multiple SAs.</li>
      <li>Improved performance: Combining SAs enables faster and more efficient communication.</li>
    </ul>
  </section>

  <!-- Internet Key Exchange (IKE) Section -->
  <section data-narration="Internet Key Exchange (IKE)">
    <h2>Internet Key Exchange (IKE)</h2>
    <p>IKE is a protocol that facilitates the exchange of cryptographic keys between parties.</p>
    <p>This enables:</p>
    <ul>
      <li>Secure key exchange: IKE ensures that cryptographic keys are exchanged securely.</li>
      <li>Key agreement: IKE enables parties to agree on cryptographic keys.</li>
    </ul>
  </section>

