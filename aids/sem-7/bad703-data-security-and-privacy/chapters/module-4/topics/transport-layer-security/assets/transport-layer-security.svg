<svg width="420" height="400" data-topic-id="transport-layer-security">
  <defs>
    <style>
      .pastel-gradient {
        fill: #B2FFFC;
        stroke: #0097A7;
        stroke-width: 1;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  <text x="50%" y="20%" font-size="32" font-family="Arial" text-anchor="middle" fill="#0097A7">Transport Layer Security</text>
  <rect x="50%" y="70%" width="300" height="30" fill="#0097A7" rx="5" fill-opacity="0.5"/>
  <text x="50%" y="80%" font-size="18" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Introduction to Transport Layer</text>
  <animateTransform attributeName="transform" type="translate" from="0,70" to="0,100" dur="2s" begin="0s"/>
  <rect x="0" y="90" width="300" height="20" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
  <text x="50%" y="110%" font-size="16" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Key Functions of Transport Layer</text>
  <animateTransform attributeName="transform" type="translate" from="0,100" to="0,130" dur="2s" begin="0.5s"/>
  <g>
    <rect x="20" y="100" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="110%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Segmentation and Reassembly</text>
    <animateTransform attributeName="transform" type="translate" from="20,110" to="20,130" dur="1s" begin="1s"/>
  </g>
  <g>
    <rect x="140" y="100" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="110%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Connection Establishment and Termination</text>
    <animateTransform attributeName="transform" type="translate" from="140,110" to="140,130" dur="1s" begin="1.5s"/>
  </g>
  <g>
    <rect x="20" y="150" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="160%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Reliable Data Transfer</text>
    <animateTransform attributeName="transform" type="translate" from="20,160" to="20,180" dur="1s" begin="2s"/>
  </g>
  <g>
    <rect x="140" y="150" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="160%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Flow Control</text>
    <animateTransform attributeName="transform" type="translate" from="140,160" to="140,180" dur="1s" begin="2.5s"/>
  </g>
  <g>
    <rect x="20" y="190" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="200%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Multiplexing and Demultiplexing</text>
    <animateTransform attributeName="transform" type="translate" from="20,200" to="20,220" dur="1s" begin="3s"/>
  </g>
  <rect x="140" y="190" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
  <text x="50%" y="200%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">User Datagram Protocol (UDP)</text>
  <animateTransform attributeName="transform" type="translate" from="140,200" to="140,220" dur="1s" begin="3.5s"/>
  <g>
    <rect x="20" y="230" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="240%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Connectionless Transport</text>
    <animateTransform attributeName="transform" type="translate" from="20,240" to="20,260" dur="1s" begin="4s"/>
  </g>
  <g>
    <rect x="140" y="230" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="240%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">Best-Effort Delivery</text>
    <animateTransform attributeName="transform" type="translate" from="140,240" to="140,260" dur="1s" begin="4.5s"/>
  </g>
  <g>
    <rect x="20" y="260" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="270%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">No Error Correction</text>
    <animateTransform attributeName="transform" type="translate" from="20,270" to="20,290" dur="1s" begin="5s"/>
  </g>
  <g>
    <rect x="140" y="260" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="270%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">No Flow Control</text>
    <animateTransform attributeName="transform" type="translate" from="140,270" to="140,290" dur="1s" begin="5.5s"/>
  </g>
  <g>
    <rect x="20" y="290" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="300%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">No Congestion Control</text>
    <animateTransform attributeName="transform" type="translate" from="20,300" to="20,320" dur="1s" begin="6s"/>
  </g>
  <g>
    <rect x="140" y="290" width="100" height="10" fill="#F7F7F7" rx="5" fill-opacity="0.5"/>
    <text x="50%" y="300%" font-size="14" font-family="Arial" text-anchor="middle" fill="#9A9A9A">UDP Header Format</text>
    <animateTransform attributeName="transform" type="translate" from="140,300" to="140,320" dur="1s" begin="6.5s"/>
  </g>
  <text x="50%" y="340%" font-size="18" font-family="Arial" text-anchor="middle" fill="#0097A7">Transport Layer Security</text>
  <rect x="0" y="370%" width="420" height="30" fill="#0097A7" rx="5" fill-opacity="0.5"/>
</svg>