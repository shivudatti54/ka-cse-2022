<svg width="420" height="400" data-topic-id="data-hiding-in-images-lsb-encoding-bpcs-steganography" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A7A3C6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10"/>

  <!-- Section 1: Introduction to Data Hiding in Images -->
  <g transform="translate(10, 10)">
    <rect width="400" height="50" fill="#fff" rx="10"/>
    <text data-narration="Introduction to Data Hiding in Images" x="10" y="20" font-size="18" font-family="Arial" text-anchor="start">
      Data hiding in images is a technique used to embed secret information into an image without altering its original content.
    </text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="10 10" to="10 50" dur="2s" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="10 50" to="10 100" dur="2s" begin="2s"/>

  <!-- Section 2: LSB Encoding -->
  <g transform="translate(10, 120)">
    <rect width="400" height="50" fill="#fff" rx="10"/>
    <text data-narration="LSB Encoding" x="10" y="20" font-size="18" font-family="Arial" text-anchor="start">
      LSB encoding is a simple method of data hiding in images.
    </text>
    <rect x="10" y="40" width="30" height="20" fill="#ccc" rx="5"/>
    <text x="40" y="50" font-size="14" font-family="Arial" text-anchor="start">
      The least significant bit (LSB) of each pixel is extracted.
    </text>
    <rect x="60" y="40" width="300" height="20" fill="#ccc" rx="5"/>
    <text x="80" y="50" font-size="14" font-family="Arial" text-anchor="start">
      The secret data is converted into binary format.
    </text>
    <animateTransform attributeName="transform" type="translate" from="60 40" to="60 80" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="80 50" to="80 90" dur="2s" begin="2s"/>
  </g>
  <animateTransform attributeName="transform" type="translate" from="10 120" to="10 170" dur="2s" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="10 170" to="10 220" dur="2s" begin="2s"/>

  <!-- Section 3: BPCS Steganography -->
  <g transform="translate(10, 260)">
    <rect width="400" height="50" fill="#fff" rx="10"/>
    <text data-narration="BPCS Steganography" x="10" y="20" font-size="18" font-family="Arial" text-anchor="start">
      BPCS steganography is a method of data hiding in images that uses a band-pass filter to encode the secret data.
    </text>
    <rect x="10" y="40" width="30" height="20" fill="#ccc" rx="5"/>
    <text x="40" y="50" font-size="14" font-family="Arial" text-anchor="start">
      The image is divided into three bands: red, green, and blue.
    </text>
    <rect x="60" y="40" width="300" height="20" fill="#ccc" rx="5"/>
    <text x="80" y="50" font-size="14" font-family="Arial" text-anchor="start">
      The secret data is converted into binary format.
    </text>
    <rect x="100" y="40" width="300" height="20" fill="#ccc" rx="5"/>
    <text x="120" y="50" font-size="14" font-family="Arial" text-anchor="start">
      The binary format of the secret data is used to create a band-pass filter.
    </text>
    <animateTransform attributeName="transform" type="translate" from="100 40" to="100 80" dur="2s" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" from="120 50" to="120 90" dur="2s" begin="2s"/>
  </g>
  <animateTransform attributeName="transform" type="translate" from="10 260" to="10 310" dur="2s" begin="0s"/>
  <animateTransform attributeName="transform" type="translate" from="10 310" to="10 360" dur="2s" begin="2s"/>

  <!-- Arrow markers for connections -->
  <line x1="10" y1="10" x2="10" y2="400" stroke="#fff" stroke-width="2" marker-end="url(#arrow-markers)"/>
  <line x1="260" y1="260" x2="260" y2="400" stroke="#fff" stroke-width="2" marker-end="url(#arrow-markers)"/>
  <defs>
    <symbol id="arrow-markers" viewBox="0 0 10 10">
      <path d="M 5 0 L 5 10 Z"/>
    </symbol>
  </defs>
</svg>