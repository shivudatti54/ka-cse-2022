<svg width="420" height="400" data-topic-id="data-security-data-hiding-in-text-basic-features-a" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="1" />
      <stop offset="50%" stop-color="#2c4255" stop-opacity="1" />
      <stop offset="100%" stop-color="#1a3c6a" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" style="fill: url(#grad)" />
  <text x="10" y="50" font-size="24" font-family="Arial" fill="#fff">
