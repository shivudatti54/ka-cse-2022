  <text x="20" y="150" font-size="16" font-family="Arial" fill="#333">
    <tspan data-narration="Applications of Data Hiding">Data hiding has numerous applications in various fields, including:</tspan>
  </text>
  <rect x="15" y="180" width="350" height="20" style="fill:#f1e6c8" />
  <text x="20" y="190" font-size="16" font-family="Arial" fill="#333">
    <tspan data-narration="Digital Rights Management (DRM)">Digital Rights Management (DRM):</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate x="15" y="210" begin="0s" dur="2s" repeatCount="indefinite" />
  <rect x="15" y="240" width="350" height="20" style="fill:#f1e6c8" />
  <text x="20" y="250" font-size="16" font-family="Arial" fill="#333">
    <tspan data-narration="Secure Communication">Secure Communication:</tspan>
  </text>
  <rect x="15" y="280" width="350" height="20" style="fill:#f1e6c8" />
  <text x="20" y="290" font-size="16" font-family="Arial" fill="#333">
    <tspan data-narration="Authentication">Authentication:</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate x="15" y="310" begin="0s" dur="2s" repeatCount="indefinite" />
  <rect x="15" y="340" width="350" height="20" style="fill:#f1e6c8" />
  <text x="20" y="350" font-size="16" font-family="Arial" fill="#333">
    <tspan data-narration="Copyright Protection">Copyright Protection:</tspan>
  </text>
  <rect x="10" y="380" width="400" height="30" style="fill:#fff; opacity:0.9" />
  <text x="15" y="390" font-size="18" font-family="Arial" fill="#333">
    <tspan data-narration="Steganography and ASCII Art">Steganography and ASCII Art can be used to create and hide secret messages.</tspan>
  </text>
  <animateTransform attributeName="transform" type="translate" begin="0s" dur="2s" repeatCount="indefinite" />
  <animate x="15" y="410" begin="0s" dur="2s" repeatCount="indefinite" />
