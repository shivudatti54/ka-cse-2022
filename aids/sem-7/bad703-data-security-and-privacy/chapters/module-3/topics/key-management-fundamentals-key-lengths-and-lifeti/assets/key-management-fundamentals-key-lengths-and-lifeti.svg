      <text x="20" y="430" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">Key Rotation</text>
      <data-narration
        x="10"
        y="450"
        width="200"
        height="100"
        font-size="18"
        font-family="Arial, sans-serif"
