      </data-narration>
      <animate
        attributeName="opacity"
        from="1"
        to="0"
        dur="2s"
        begin="6s"
      />
    </g>
    <g id="section-key-generation-techniques">
      <rect x="10" y="210" width="200" height="150" fill="#F7F7F7"/>
      <text x="20" y="230" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">Key Generation Techniques</text>
      <data-narration
        x="10"
        y="250"
        width="200"
        height="100"
        font-size="18"
        font-family="Arial, sans-serif"
        fill="#2E4053"
