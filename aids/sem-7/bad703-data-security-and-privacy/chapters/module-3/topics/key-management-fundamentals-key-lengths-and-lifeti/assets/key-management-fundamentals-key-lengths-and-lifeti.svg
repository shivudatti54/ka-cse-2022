      </data-narration>
      <animate
        attributeName="opacity"
        from="1"
        to="0"
        dur="2s"
        begin="0s"
      />
    </g>
    <g id="section-key-strength">
      <rect x="10" y="210" width="200" height="150" fill="#F7F7F7"/>
      <text x="20" y="230" font-size="24" font-family="Arial, sans-serif" fill="#2E4053">Key Strength</text>
      <data-narration
