<svg width="420" height="400" data-topic-id="key-management-fundamentals-key-lengths-and-lifetimes">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#B2A9FF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <title Key Management Fundamentals: Key Lengths and Lifetimes</title>
  <g id="key-management-fundamentals">
    <g id="section-key-length">
