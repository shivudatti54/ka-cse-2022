    <g id="footer">
      <rect x="10" y="390" width="400" height="10" fill="#2E4053"/>
      <text x="20" y="400" font-size="18" font-family="Arial, sans-serif" fill="#FFFFFF">Learn more about key management fundamentals</text>
    </g>
