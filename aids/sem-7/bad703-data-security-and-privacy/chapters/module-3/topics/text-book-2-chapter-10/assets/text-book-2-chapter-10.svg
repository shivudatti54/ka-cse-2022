<svg width="420" height="400" data-topic-id="data-security-privacy" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" style="background-image: linear-gradient(to bottom, #C7B8EA, #6495ED);">
  <title>Data Security and Privacy</title>
  <rect x="10" y="10" width="400" height="30" fill="#D9E4F5" rx="5" />
