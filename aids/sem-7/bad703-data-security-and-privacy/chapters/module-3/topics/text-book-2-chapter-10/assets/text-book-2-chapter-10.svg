        <polygon points="140,70 160,70 150,80" fill="#FF9800" />
      </animate>
    </g>
    <g>
      <line x1="140" y1="100" x2="160" y2="100" stroke="#FF9800" stroke-width="2" />
      <animate xmlns="http://www.w3.org/2000/svg" begin="1.5s" dur="1.5s" repeatCount="indefinite">
        <polygon points="140,100 160,100 150,110" fill="#FF9800" />
      </animate>
    </g>
  </g>
  <g id="section-3">
    <rect x="10" y="120" width="100" height="30" fill="#F7F7F7" rx="5" />
    <text x="15" y="130" fill="#333" font-size="14" font-family="Arial" font-weight="bold" data-narration="10.3 Types of Data Privacy Threats">Threats to Data Privacy</text>
    <g>
      <line x1="25" y1="150" x2="45" y2="150" stroke="#2196F3" stroke-width="2" />
      <animate xmlns="http://www.w3.org/2000/svg" begin="1.5s" dur="1.5s" repeatCount="indefinite">
        <polygon points="25,150 45,150 35,160" fill="#2196F3" />
