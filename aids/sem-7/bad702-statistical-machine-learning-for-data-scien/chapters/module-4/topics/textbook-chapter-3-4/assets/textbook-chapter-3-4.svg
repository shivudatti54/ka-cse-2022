<svg width="420" height="400" data-topic-id="statistical-machine-learning-for-data-science-chapter-3-4">
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="100%" stop-color="#B2E6CE" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="100%" height="100%" fill="url(#pastel-gradient)"/>
    <g transform="translate(10, 50)">
        <text x="0" y="0" font-size="24" font-family="Arial" fill="#2E4053">Textbook Chapter 3 & 4</text>
    </g>
    <g id="multi-arm-bandit-intro">
        <rect x="50" y="50" width="200" height="100" fill="#2E4053" rx="10" data-narration="Introduction to Multi-Arm Bandit Algorithms"/>
        <animate duration="2000" begin="1000" repeat-count="indefinite">
            <path d="M 50 50 L 150 50" stroke="#2E4053" stroke-width="4" fill="none"/>
            <path d="M 50 150 L 150 150" stroke="#2E4053" stroke-width="4" fill="none"/>
        </animate>
    </g>
    <g id="bandit-problem">
        <rect x="50" y="200" width="200" height="100" fill="#2E4053" rx="10" data-narration="Bandit Problem"/>
        <animate duration="2000" begin="1500" repeat-count="indefinite">
            <path d="M 50 200 L 150 200" stroke="#2E4053" stroke-width="4" fill="none"/>
            <path d="M 50 300 L 150 300" stroke="#2E4053" stroke-width="4" fill="none"/>
        </animate>
    </g>
    <g id="exploration-exploitation-trade-off">
        <rect x="50" y="350" width="200" height="100" fill="#2E4053" rx="10" data-narration="Exploration-Exploitation Trade-off"/>
        <animate duration="2000" begin="2000" repeat-count="indefinite">
            <path d="M 50 350 L 150 350" stroke="#2E4053" stroke-width="4" fill="none"/>
            <path d="M 50 450 L 150 450" stroke="#2E4053" stroke-width="4" fill="none"/>
        </animate>
    </g>
    <g id="epsilon-greedy-algorithm">
        <rect x="50" y="500" width="200" height="100" fill="#2E4053" rx="10" data-narration="Epsilon-Greedy Algorithm"/>
        <animate duration="2000" begin="2500" repeat-count="indefinite">
            <path d="M 50 500 L 150 500" stroke="#2E4053" stroke-width="4" fill="none"/>
            <path d="M 50 600 L 150 600" stroke="#2E4053" stroke-width="4" fill="none"/>
        </animate>
    </g>
    <g id="upper-confidence-bound-algorithm">
        <rect x="50" y="650" width="200" height="100" fill="#2E4053" rx="10" data-narration="Upper Confidence Bound Algorithm"/>
        <animate duration="2000" begin="3000" repeat-count="indefinite">
            <path d="M 50 650 L 150 650" stroke="#2E4053" stroke-width="4" fill="none"/>
            <path d="M 50 750 L 150 750" stroke="#2E4053" stroke-width="4" fill="none"/>
        </animate>
    </g>
    <g id="example">
        <rect x="50" y="800" width="200" height="100" fill="#2E4053" rx="10" data-narration="Example of Multi-Arm Bandit Algorithm"/>
        <animate duration="2000" begin="3500" repeat-count="infinite">
            <path d="M 50 800 L 150 800" stroke="#2E4053" stroke-width="4" fill="none"/>
            <path d="M 50 900 L 150 900" stroke="#2E4053" stroke-width="4" fill="none"/>
            <path d="M 50 1000 L 150 1000" stroke="#2E4053" stroke-width="4" fill="none"/>
        </animate>
    </g>
    <g id="footer">
        <text x="10" y="375" font-size="18" font-family="Arial" fill="#2E4053">Animated Educational Diagram for Statistical Machine Learning for Data Science: Chapter 3 & 4</text>
    </g>
</svg>