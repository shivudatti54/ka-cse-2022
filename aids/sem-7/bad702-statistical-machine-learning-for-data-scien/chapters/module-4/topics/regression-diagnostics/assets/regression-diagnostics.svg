  <!-- Section 4: Diagnostic Tools for Regression -->
  <section data-narration="Diagnostic Tools for Regression">
    <rect x="10" y="390" width="380" height="100" fill="#F7F7F7" opacity="1" rx="10" />
    <text x="15" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
