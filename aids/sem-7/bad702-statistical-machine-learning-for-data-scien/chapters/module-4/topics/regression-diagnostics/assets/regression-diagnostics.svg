<svg width="420" height="400" data-topic-id="regression-diagnostics">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#gradient)" opacity="0.5" />
  
  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
