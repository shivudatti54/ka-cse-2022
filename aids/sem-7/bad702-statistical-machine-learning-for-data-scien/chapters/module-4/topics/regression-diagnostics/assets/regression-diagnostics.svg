  </text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="60" width="380" height="100" fill="#F7F7F7" opacity="1" rx="10" />
    <text x="15" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2E4053">
      Introduction
    </text>
    <animate transform="rotate(360 20 120)" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 20 120 C 30 100 40 90 50 80" stroke="#87CEEB" stroke-width="4" fill="none" />
  </section>

  <!-- Section 2: Assumptions of Simple Linear Regression -->
