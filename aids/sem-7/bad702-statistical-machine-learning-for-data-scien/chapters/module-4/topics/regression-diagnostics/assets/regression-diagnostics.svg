    </text>
    <animate transform="rotate(360 20 440)" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 20 440 C 30 420 40 410 50 400" stroke="#87CEEB" stroke-width="4" fill="none" />
    <path d="M 30 410 L 40 420" stroke="#2E4053" stroke-width="2" fill="none" />
