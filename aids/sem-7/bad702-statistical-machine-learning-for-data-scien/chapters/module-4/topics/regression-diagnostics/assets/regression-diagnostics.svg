    </text>
    <animate transform="rotate(360 20 220)" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 20 220 C 30 200 40 190 50 180" stroke="#87CEEB" stroke-width="4" fill="none" />
    <path d="M 30 180 L 40 190" stroke="#2E4053" stroke-width="2" fill="none" />
    <path d="M 40 190 L 50 180" stroke="#2E4053" stroke-width="2" fill="none" />
  </section>

  <!-- Section 3: Types of Regression Diagnostics -->
  <section data-narration="Types of Regression Diagnostics">
