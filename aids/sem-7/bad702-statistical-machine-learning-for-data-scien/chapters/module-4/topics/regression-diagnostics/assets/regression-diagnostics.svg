    </text>
    <animate transform="rotate(360 20 320)" begin="0s" dur="2s" repeatCount="indefinite" />
    <path d="M 20 320 C 30 300 40 290 50 280" stroke="#87CEEB" stroke-width="4" fill="none" />
    <path d="M 30 280 L 40 290" stroke="#2E4053" stroke-width="2" fill="none" />
    <path d="M 40 290 L 50 280" stroke="#2E4053" stroke-width="2" fill="none" />
