<svg width="420" height="400" data-topic-id="polynomial-and-spline-regression">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Title Section -->
  <section id="title-section">
    <g transform="translate(50, 50)">
      <text x="0" y="0" font-size="36" font-family="Arial, sans-serif" text-anchor="middle" fill="#2F4F7F">
        Polynomial and Spline Regression
      </text>
    </g>
  </section>
  
  <!-- Introduction to Regression -->
  <section id="introduction-to-regression" data-narration="Introduction to Regression">
    <g transform="translate(20, 150)">
      <rect x="0" y="0" width="360" height="200" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
        Regression is a fundamental supervised learning technique used to predict a continuous outcome variable (dependent variable) based on one or more predictor variables (independent variables).
      </text>
      <path d="M 10 10 L 100 100 L 190 10" stroke="#2F4F7F" stroke-width="2" fill="none"/>
      <animate attributeName="opacity" from="1" to="0" dur="2000" begin="0s" delay="2s"/>
    </g>
  </section>
  
  <!-- Linear Regression -->
  <section id="linear-regression" data-narration="Linear Regression">
    <g transform="translate(20, 250)">
      <rect x="0" y="0" width="360" height="200" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
        Linear Regression models the relationship between a dependent variable `y` and one or more independent variables `X` using a linear approach.
      </text>
      <line x1="50" y1="50" x2="170" y2="170" stroke="#2F4F7F" stroke-width="2" fill="none"/>
      <animate attributeName="opacity" from="1" to="0" dur="2000" begin="3s" delay="4s"/>
    </g>
  </section>
  
  <!-- Polynomial Regression -->
  <section id="polynomial-regression" data-narration="Polynomial Regression">
    <g transform="translate(20, 350)">
      <rect x="0" y="0" width="360" height="200" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
        Polynomial Regression is a form of regression analysis that models the relationship between the independent variable `x` and the dependent variable `y` as an `n-th` degree polynomial.
      </text>
      <path d="M 50 50 C 70 70 90 90 110 110" stroke="#2F4F7F" stroke-width="2" fill="none"/>
      <animate attributeName="opacity" from="1" to="0" dur="2000" begin="5s" delay="6s"/>
    </g>
  </section>
  
  <!-- Spline Regression -->
  <section id="spline-regression" data-narration="Spline Regression">
    <g transform="translate(20, 450)">
      <rect x="0" y="0" width="360" height="200" fill="#FFFFFF" rx="10" />
      <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
        Spline Regression is a type of regression analysis that uses spline functions to model the relationship between the independent variable `x` and the dependent variable `y`.
      </text>
      <path d="M 50 50 Q 70 70 90 90 C 110 110 130 130 150 150" stroke="#2F4F7F" stroke-width="2" fill="none"/>
      <animate attributeName="opacity" from="1" to="0" dur="2000" begin="7s" delay="8s"/>
    </g>
  </section>
  
  <!-- Arrow Markers -->
  <g transform="translate(150, 100)">
    <line x1="150" y1="100" x2="250" y2="150" stroke="#2F4F7F" stroke-width="2" fill="none"/>
    <line x1="150" y1="100" x2="250" y2="150" stroke="#2F4F7F" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Footer -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="320" height="40" fill="#FFFFFF" rx="10" />
    <text x="10" y="15" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#2F4F7F">
      Created by [Your Name]
    </text>
  </g>
</svg>