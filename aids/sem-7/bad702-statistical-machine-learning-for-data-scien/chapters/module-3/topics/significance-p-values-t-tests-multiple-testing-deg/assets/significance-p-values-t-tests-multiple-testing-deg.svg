<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="significance-p-values-t-tests-multiple-testing-degrees-of-freedom">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A8D7F5" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>

  <!-- Title -->
  <text x="50%" y="20%" font-size="24" font-weight="bold" text-anchor="middle" fill="#3498db">
    Significance & p-values, t-tests, multiple testing, degrees of freedom
  </text>

  <!-- Section 1: Definition -->
  <rect x="20%" y="150%" width="60%" height="30%" fill="#fff" rx="5"/>
  <text x="50%" y="170%" font-size="16" font-weight="normal" text-anchor="middle" fill="#3c8ef7" data-narration="Definition: Significance refers to the probability that a result occurred by chance.">
    Significance
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,150" to="0,120" dur="500ms" begin="0s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" dur="500ms" begin="0s" repeatCount="indefinite"/>
  <g transform="translate(20%,150%)">
    <circle cx="50%" cy="50%" r="10" fill="#fff" data-topic-id="significance-p-values-t-tests-multiple-testing-degrees-of-freedom"/>
    <text x="50%" y="60%" font-size="14" font-weight="normal" text-anchor="middle" fill="#3c8ef7">
      p-value
    </text>
    <text x="50%" y="70%" font-size="14" font-weight="normal" text-anchor="middle" fill="#3c8ef7">
    </text>
  </g>

  <!-- Section 2: p-value -->
  <rect x="20%" y="200%" width="60%" height="30%" fill="#fff" rx="5"/>
  <text x="50%" y="220%" font-size="16" font-weight="normal" text-anchor="middle" fill="#3c8ef7" data-narration="p-value: The probability of obtaining a result as extreme or more extreme than the one observed, assuming that the null hypothesis is true.">
    p-value
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,200" to="0,180" dur="500ms" begin="0.5s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" dur="500ms" begin="0.5s" repeatCount="indefinite"/>
  <g transform="translate(20%,200%)">
    <circle cx="50%" cy="50%" r="10" fill="#fff" data-topic-id="significance-p-values-t-tests-multiple-testing-degrees-of-freedom"/>
    <text x="50%" y="60%" font-size="14" font-weight="normal" text-anchor="middle" fill="#3c8ef7">
      Small (typically < 0.05)
    </text>
    <text x="50%" y="70%" font-size="14" font-weight="normal" text-anchor="middle" fill="#3c8ef7">
      Large (typically > 0.05)
    </text>
  </g>

  <!-- Section 3: t-test -->
  <rect x="20%" y="280%" width="60%" height="30%" fill="#fff" rx="5"/>
  <text x="50%" y="300%" font-size="16" font-weight="normal" text-anchor="middle" fill="#3c8ef7" data-narration="t-test: A statistical test to determine if there is a significant difference between two groups.">
    t-test
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,280" to="0,260" dur="500ms" begin="1s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" dur="500ms" begin="1s" repeatCount="indefinite"/>
  <g transform="translate(20%,280%)">
    <circle cx="50%" cy="50%" r="10" fill="#fff" data-topic-id="significance-p-values-t-tests-multiple-testing-degrees-of-freedom"/>
    <text x="50%" y="60%" font-size="14" font-weight="normal" text-anchor="middle" fill="#3c8ef7">
      Example: A/B test
    </text>
  </g>

  <!-- Section 4: multiple testing -->
  <rect x="20%" y="350%" width="60%" height="30%" fill="#fff" rx="5"/>
  <text x="50%" y="370%" font-size="16" font-weight="normal" text-anchor="middle" fill="#3c8ef7" data-narration="Multiple testing: When we perform multiple statistical tests, the probability of obtaining a false positive result increases.">
    Multiple testing
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,350" to="0,330" dur="500ms" begin="1.5s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" dur="500ms" begin="1.5s" repeatCount="indefinite"/>
  <g transform="translate(20%,350%)">
    <circle cx="50%" cy="50%" r="10" fill="#fff" data-topic-id="significance-p-values-t-tests-multiple-testing-degrees-of-freedom"/>
    <text x="50%" y="60%" font-size="14" font-weight="normal" text-anchor="middle" fill="#3c8ef7">
      False positive rate
    </text>
  </g>

  <!-- Section 5: degrees of freedom -->
  <rect x="20%" y="410%" width="60%" height="30%" fill="#fff" rx="5"/>
  <text x="50%" y="430%" font-size="16" font-weight="normal" text-anchor="middle" fill="#3c8ef7" data-narration="Degrees of freedom: The number of independent pieces of information used to calculate the standard error.">
    Degrees of freedom
  </text>
  <animateTransform attributeName="transform" type="translate" from="0,410" to="0,390" dur="500ms" begin="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="scale" from="1,1" to="0.5,0.5" dur="500ms" begin="2s" repeatCount="indefinite"/>
  <g transform="translate(20%,410%)">
    <circle cx="50%" cy="50%" r="10" fill="#fff" data-topic-id="significance-p-values-t-tests-multiple-testing-degrees-of-freedom"/>
    <text x="50%" y="60%" font-size="14" font-weight="normal" text-anchor="middle" fill="#3c8ef7">
      Example: t-test
    </text>
  </g>

  <!-- Footer -->
  <text x="50%" y="380%" font-size="14" font-weight="normal" text-anchor="middle" fill="#3c8ef7">
    &copy; 2023
  </text>
</svg>