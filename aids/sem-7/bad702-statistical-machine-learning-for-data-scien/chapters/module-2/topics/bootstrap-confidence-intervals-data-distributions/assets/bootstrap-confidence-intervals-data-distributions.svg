<svg width="420" height="400" data-topic-id="bootstrap-confidence-intervals-data-distributions">
  <!-- Title and footer -->
  <defs>
    <style>
      <!-- Title and footer styles -->
      text {
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: #333;
        position: absolute;
        top: 20px;
        left: 20px;
        transform: rotate(-90deg);
      }
      footer {
        font-size: 10px;
        color: #666;
        text-align: center;
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
      }
    </style>
  </defs>

  <!-- Gradient background -->
  <style>
    /* Background gradient */
    rect {
      fill: linear-gradient(to bottom, #87CEEB, #ADD8E6);
    }
  </style>

  <!-- Background rectangle -->
  <rect x="20" y="20" width="380" height="340" rx="10" fill="url(#gradient)"></rect>

  <!-- Gradient reference -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1" />
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Section 1: Data Distributions -->
  <rect x="20" y="60" width="380" height="120" rx="10" fill="#F0F0F0" data-narration="Data Distributions">
    <animateTransform attribute="transform" type="translate" x="0" y="0" dur="500ms" begin="0s" repeat="indefinite" />
    <animate attributeName="fill" type="color" from="#F0F0F0" to="#ADD8E6" dur="500ms" begin="0s" repeat="indefinite" />
    <text x="20" y="80" text-anchor="middle" font-size="14px" fill="#333">Data Distributions</text>
  </rect>

  <!-- Section 2: Normal Distribution -->
  <rect x="20" y="200" width="380" height="120" rx="10" fill="#F0F0F0" data-narration="Normal Distribution">
    <animateTransform attribute="transform" type="translate" x="0" y="0" dur="500ms" begin="0s" repeat="indefinite" />
    <animate attributeName="fill" type="color" from="#F0F0F0" to="#87CEEB" dur="500ms" begin="0s" repeat="indefinite" />
    <text x="20" y="80" text-anchor="middle" font-size="14px" fill="#333">Height of adults in a population</text>
    <text x="20" y="120" text-anchor="middle" font-size="14px" fill="#333">Symmetric about the mean</text>
  </rect>

  <!-- Section 3: Long Tailed Distribution -->
  <rect x="20" y="320" width="380" height="120" rx="10" fill="#F0F0F0" data-narration="Long Tailed Distribution">
    <animateTransform attribute="transform" type="translate" x="0" y="0" dur="500ms" begin="0s" repeat="indefinite" />
    <animate attributeName="fill" type="color" from="#F0F0F0" to="#FFC107" dur="500ms" begin="0s" repeat="indefinite" />
    <text x="20" y="80" text-anchor="middle" font-size="14px" fill="#333">Income of individuals</text>
    <text x="20" y="120" text-anchor="middle" font-size="14px" fill="#333">Long tail on one side</text>
  </rect>

  <!-- Section 4: Student’s-t Distribution -->
  <rect x="20" y="200" width="380" height="120" rx="10" fill="#F0F0F0" data-narration="Student’s-t Distribution">
    <animateTransform attribute="transform" type="translate" x="0" y="0" dur="500ms" begin="0s" repeat="indefinite" />
    <animate attributeName="fill" type="color" from="#F0F0F0" to="#FF9800" dur="500ms" begin="0s" repeat="indefinite" />
    <text x="20" y="80" text-anchor="middle" font-size="14px" fill="#333">Analyzing the effect of a new treatment on a patient's recovery time</text>
    <text x="20" y="120" text-anchor="middle" font-size="14px" fill="#333">Used in hypothesis testing and confidence intervals</text>
  </rect>

  <!-- Section 5: Confidence Intervals -->
  <rect x="20" y="320" width="380" height="120" rx="10" fill="#F0F0F0" data-narration="Confidence Intervals">
    <animateTransform attribute="transform" type="translate" x="0" y="0" dur="500ms" begin="0s" repeat="indefinite" />
    <animate attributeName="fill" type="color" from="#F0F0F0" to="#03A9F4" dur="500ms" begin="0s" repeat="indefinite" />
    <text x="20" y="80" text-anchor="middle" font-size="14px" fill="#333">Confidence Intervals</text>
    <text x="20" y="120" text-anchor="middle" font-size="14px" fill="#333">Range of values within which a population parameter is likely to lie</text>
  </rect>

  <!-- Arrow markers for connections -->
  <path d="M20 60 L40 60" stroke="#333" stroke-width="2" fill="none" />
  <path d="M20 200 L40 200" stroke="#333" stroke-width="2" fill="none" />
  <path d="M20 320 L40 320" stroke="#333" stroke-width="2" fill="none" />

  <!-- Title and footer -->
  <text x="20" y="20" text-anchor="middle" font-size="24px" fill="#333">Bootstrap Confidence Intervals Data Distributions</text>
  <text x="20" y="380" text-anchor="middle" font-size="14px" fill="#666">2023</text>
</svg>