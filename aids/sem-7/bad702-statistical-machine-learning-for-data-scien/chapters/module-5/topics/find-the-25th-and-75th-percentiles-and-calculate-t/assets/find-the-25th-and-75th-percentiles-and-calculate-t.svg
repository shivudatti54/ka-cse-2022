<svg width="420" height="400" data-topic-id="find-the-25th-and-75th-percentiles-and-calculate-t">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E6DAC3" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
  
  <!-- Title at top -->
  <text x="10" y="20" font-size="24" font-family="Arial" font-weight="bold" text-anchor="start" fill="#3498DB">Finding Percentiles and Calculating T</text>
  
  <!-- Section 1: What are Percentiles? -->
  <rect x="10" y="50" width="400" height="100" fill="#F7F7F7" stroke="#E6DAC3" stroke-width="2"/>
  <text x="10" y="60" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#3498DB">What are Percentiles?</text>
  <text x="10" y="80" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Percentiles are a measure of central tendency used to divide a dataset into equal parts based on the value of its elements.</text>
  <data-narration>Arrange the dataset in ascending order to make it easier to calculate the percentiles.</data-narration>
  
  <!-- Section 2: Why Calculate Percentiles? -->
  <rect x="10" y="170" width="400" height="100" fill="#F7F7F7" stroke="#E6DAC3" stroke-width="2"/>
  <text x="10" y="180" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#3498DB">Why Calculate Percentiles?</text>
  <text x="10" y="200" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Calculating percentiles is crucial in data analysis as it provides a better understanding of the data's distribution.</text>
  <data-narration>Percentiles are used in various statistical techniques, including the calculation of the interquartile range (IQR).</data-narration>
  
  <!-- Section 3: What is the Interquartile Range (IQR)? -->
  <rect x="10" y="270" width="400" height="100" fill="#F7F7F7" stroke="#E6DAC3" stroke-width="2"/>
  <text x="10" y="280" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#3498DB">What is the Interquartile Range (IQR)?</text>
  <text x="10" y="300" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">The interquartile range (IQR) is the difference between the 75th percentile (Q3) and the 25th percentile (Q1) of a dataset.</text>
  <data-narration>The IQR is a measure of the spread or dispersion of the data.</data-narration>
  
  <!-- Section 4: Calculating Percentiles -->
  <rect x="10" y="370" width="400" height="100" fill="#F7F7F7" stroke="#E6DAC3" stroke-width="2"/>
  <text x="10" y="380" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#3498DB">Calculating Percentiles</text>
  <text x="10" y="400" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">To calculate the 25th and 75th percentiles, follow these steps:</text>
  <data-narration>Arrange the dataset in ascending order to make it easier to calculate the percentiles.</data-narration>
  <text x="10" y="420" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Calculate the position of the percentile using the following formula:</text>
  <text x="10" y="440" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Position = (Percentile / 100) \* N</text>
  <text x="10" y="460" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">where:</text>
  <text x="10" y="480" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Position is the position of the percentile</text>
  <text x="10" y="500" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Percentile is the percentile value (25 or 75)</text>
  <text x="10" y="520" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">N is the total number of data points</text>
  <data-narration>Calculate the percentile value using the following formula:</data-narration>
  <text x="10" y="540" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Percentile Value = (Position - 1) \* (Maximum Value - Minimum Value) + Minimum Value</text>
  <text x="10" y="560" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">where:</text>
  <text x="10" y="580" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Percentile Value is the calculated percentile value</text>
  <text x="10" y="600" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Maximum Value is the maximum value in the dataset</text>
  <text x="10" y="620" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Minimum Value is the minimum value in the dataset</text>
  <data-narration>Example:</data-narration>
  <rect x="10" y="630" width="400" height="100" fill="#F7F7F7" stroke="#E6DAC3" stroke-width="2"/>
  <text x="10" y="640" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#3498DB">Suppose we have a dataset with the following values:</text>
  <text x="10" y="660" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">{1, 3, 5, 7, 9, 11}</text>
  <data-narration>Calculate the 25th and 75th percentiles.</data-narration>
  <text x="10" y="680" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Using the steps above, we can calculate the 25th and 75th percentiles as follows:</text>
  <text x="10" y="700" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Position = (25 / 100) \* 6 = 1.5</text>
  <text x="10" y="720" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Percentile Value = (1.5 - 1) \* (11 - 1) + 1 = 5</text>
  <text x="10" y="740" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Therefore, the 25th percentile is 5.</text>
  <text x="10" y="760" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Similarly, we can calculate the 75th percentile as follows:</text>
  <text x="10" y="780" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Position = (75 / 100) \* 6 = 4.5</text>
  <text x="10" y="800" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Percentile Value = (4.5 - 1) \* (11 - 1) + 1 = 9</text>
  <text x="10" y="820" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Therefore, the 75th percentile is 9.</text>
  <data-narration>The interquartile range (IQR) is the difference between the 75th percentile (Q3) and the 25th percentile (Q1) of a dataset.</data-narration>
  <text x="10" y="840" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">IQR = Q3 - Q1 = 9 - 5 = 4</text>
  <data-narration>IQR is a measure of the spread or dispersion of the data.</data-narration>
  
  <!-- Section 5: Conclusion -->
  <rect x="10" y="930" width="400" height="100" fill="#F7F7F7" stroke="#E6DAC3" stroke-width="2"/>
  <text x="10" y="940" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#3498DB">Conclusion</text>
  <text x="10" y="960" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Calculating percentiles and IQR is an essential part of data analysis.</text>
  <data-narration>It helps to understand the distribution of the data and make informed decisions.</data-narration>
  
  <!-- Footer -->
  <rect x="10" y="1030" width="400" height="50" fill="#F7F7F7" stroke="#E6DAC3" stroke-width="2"/>
  <text x="10" y="1040" font-size="18" font-family="Arial" font-weight="normal" text-anchor="start" fill="#666666">Learn more about data analysis and visualization at [website URL]</text>
</svg>