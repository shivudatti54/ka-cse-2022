<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="discriminant-analysis" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background with pastel colors -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64BFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#gradient)"/>

  <!-- Title at top -->
  <text x="20" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#3498DB">Discriminant Analysis</tspan>
  </text>

  <!-- Section 1: Covariance Matrix -->
  <section data-narration="What is a Covariance Matrix?">
    <rect x="10" y="50" width="400" height="50" fill="#FFFFFF" stroke="#F7F7F7" stroke-width="2"/>
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan fill="#2E4053">Covariance Matrix</tspan>
    </text>
    <rect x="20" y="90" width="50" height="50" fill="#E74C3C" rx="5"/>
    <text x="30" y="110" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      <tspan fill="#E74C3C">Measures covariance between features</tspan>
    </text>
  </section>

  <!-- Section 2: Fisher's Linear Discriminant -->
  <section data-narration="What is a Fisher's Linear Discriminant?">
    <rect x="10" y="150" width="400" height="50" fill="#FFFFFF" stroke="#F7F7F7" stroke-width="2"/>
    <text x="20" y="170" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan fill="#2E4053">Fisher's Linear Discriminant</tspan>
    </text>
    <rect x="20" y="190" width="50" height="50" fill="#2E4053" rx="5"/>
    <text x="30" y="210" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      <tspan fill="#2E4053">Maximizes separation between class means</tspan>
    </text>
  </section>

  <!-- Section 3: Sample Mean for Class A -->
  <section data-narration="Calculating the Sample Mean for Class A">
    <rect x="10" y="250" width="400" height="50" fill="#FFFFFF" stroke="#F7F7F7" stroke-width="2"/>
    <text x="20" y="270" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan fill="#2E4053">Class A</tspan>
    </text>
    <rect x="20" y="290" width="50" height="50" fill="#FFC107" rx="5"/>
    <text x="30" y="310" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      <tspan fill="#FFC107">Sample mean: X1 = 13.67, X2 = 23.33</tspan>
    </text>
    <animate attributeName="fill" begin="0s" dur="2s" from="#FFC107" to="#FF9900"/>
  </section>

  <!-- Section 4: Sample Mean for Class B -->
  <section data-narration="Calculating the Sample Mean for Class B">
    <rect x="10" y="350" width="400" height="50" fill="#FFFFFF" stroke="#F7F7F7" stroke-width="2"/>
    <text x="20" y="370" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
      <tspan fill="#2E4053">Class B</tspan>
    </text>
    <rect x="20" y="390" width="50" height="50" fill="#FFC107" rx="5"/>
    <text x="30" y="410" font-size="16" font-family="Arial, sans-serif" text-anchor="start">
      <tspan fill="#FFC107">Sample mean: X1 = 15, X2 = 27.5</tspan>
    </text>
    <animate attributeName="fill" begin="2s" dur="2s" from="#FFC107" to="#FF9900"/>
  </section>

  <!-- Section 5: Connecting the Sample Means -->
  <path d="M 20 420 L 80 420 L 40 380" stroke="#3498DB" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 120 420 L 160 420 L 140 380" stroke="#3498DB" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 20 370 L 80 370 L 40 340" stroke="#3498DB" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 120 370 L 160 370 L 140 340" stroke="#3498DB" stroke-width="2" stroke-dasharray="5,5"/>
  <animate attributeName="stroke-dasharray" begin="0s" dur="2s" from="5,5" to="10,10"/>
  <animate attributeName="stroke-dasharray" begin="2s" dur="2s" from="10,10" to="15,15"/>

  <!-- Footer -->
  <text x="20" y="420" font-size="18" font-family="Arial, sans-serif" text-anchor="start">
    <tspan fill="#2E4053">Discriminant Analysis</tspan>
  </text>
</svg>