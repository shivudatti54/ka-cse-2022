<svg width="420" height="400" data-topic-id="each-containing-50-engineers" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" style="overflow:visible;">
  <style>.background{fill:linear-gradient(90deg,#7A88FF 0%,#6495ED 100%)}.section{border:1px solid #6495ED; padding:10px; margin-bottom:10px;}.section:after{content:""; display:table; clear:both;}</style>
  <rect x="0" y="0" width="420" height="400" class="background"></rect>
  <g transform="translate(0,40)">
    <text x="10" y="20" font-size="24" font-family="Arial" fill="#2F4F7F" class="title">Each Containing 50 Engineers</text>
    <rect x="10" y="50" width="400" height="300" rx="10" class="section" data-narration="Covariance Matrix">
      <animate transform="rotate(0 20 50)" begin="0s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 50)" begin="2s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 50)" begin="4s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 50)" begin="6s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 50)" begin="8s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 50)" begin="10s" dur="2s" repeat="indefinite"/>
      <rect x="10" y="100" width="30" height="30" rx="5" class="arrow" fill="#6495ED"/>
      <text x="20" y="130" font-size="18" font-family="Arial" fill="#2F4F7F" class="data-narration">Covariance Matrix:
        C = Σ[(xi - μx)(yi - μy)],
        where xi and yi are individual data points, μx and μy are the means of the respective features, and Σ represents the sum of the products.
      </text>
    </rect>
    <rect x="10" y="160" width="400" height="300" rx="10" class="section" data-narration="Fisher's Linear Discriminant">
      <animate transform="rotate(0 20 110)" begin="0s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="2s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="4s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="6s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="8s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="10s" dur="2s" repeat="indefinite"/>
      <rect x="10" y="170" width="30" height="30" rx="5" class="arrow" fill="#6495ED"/>
      <text x="20" y="190" font-size="18" font-family="Arial" fill="#2F4F7F" class="data-narration">Fisher's Linear Discriminant:
        L = w^T X,
        where w is the weight vector, X is the feature matrix, and L is the linear combination.
      </text>
    </rect>
    <rect x="10" y="310" width="400" height="300" rx="10" class="section" data-narration="Generalized Linear Models">
      <animate transform="rotate(0 20 250)" begin="0s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 250)" begin="2s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 250)" begin="4s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 250)" begin="6s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 250)" begin="8s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 250)" begin="10s" dur="2s" repeat="indefinite"/>
      <rect x="10" y="330" width="30" height="30" rx="5" class="arrow" fill="#6495ED"/>
      <text x="20" y="350" font-size="18" font-family="Arial" fill="#2F4F7F" class="data-narration">Generalized Linear Models:
        GLM = E(Y | X) = g(μ(X)),
        where Y is the response variable, X is the feature matrix, μ(X) is the mean of the response variable, g is the link function, and E is the expected value.
      </text>
    </rect>
    <rect x="10" y="170" width="400" height="300" rx="10" class="section" data-narration="Interpreting Results">
      <animate transform="rotate(0 20 110)" begin="0s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="2s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="4s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="6s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="8s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 110)" begin="10s" dur="2s" repeat="indefinite"/>
      <rect x="10" y="190" width="30" height="30" rx="5" class="arrow" fill="#6495ED"/>
      <text x="20" y="210" font-size="18" font-family="Arial" fill="#2F4F7F" class="data-narration">Interpreting Results:
        The results of discriminant analysis provide insight into the relationships between the features and the classes.
      </text>
    </rect>
    <rect x="10" y="320" width="400" height="300" rx="10" class="section" data-narration="Conclusion">
      <animate transform="rotate(0 20 260)" begin="0s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 260)" begin="2s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 260)" begin="4s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 260)" begin="6s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 260)" begin="8s" dur="2s" repeat="indefinite"/>
      <animate transform="rotate(0 20 260)" begin="10s" dur="2s" repeat="indefinite"/>
      <rect x="10" y="330" width="30" height="30" rx="5" class="arrow" fill="#6495ED"/>
      <text x="20" y="350" font-size="18" font-family="Arial" fill="#2F4F7F" class="data-narration">Conclusion:
        Discriminant analysis is a powerful tool for classification problems.
      </text>
    </rect>
    <g transform="translate(0,390)">
      <rect x="10" y="0" width="400" height="10" rx="5" class="footer" style="background-color:#2F4F7F">
        <text x="10" y="5" font-size="16" font-family="Arial" fill="#FFFFFF">Footer</text>
      </rect>
    </g>
  </g>
</svg>