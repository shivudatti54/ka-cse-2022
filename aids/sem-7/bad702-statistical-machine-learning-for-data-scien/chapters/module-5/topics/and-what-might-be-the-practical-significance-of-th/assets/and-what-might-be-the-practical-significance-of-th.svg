<svg width="420" height="400" data-topic-id="discriminant-analysis" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="pastel-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="1" stop-color="#C5CAE9" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Discriminant Analysis: Estimating Mean Salary of Software Engineers</title>
  <g transform="translate(10, 10)">
    <path d="M 10 20 L 380 20 L 380 20 Z" stroke="#2E4053" stroke-width="2" fill="none"/>
    <rect x="10" y="50" width="400" height="250" fill="url(#pastel-gradient)"/>
    <text x="20" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Discriminant Analysis</text>
    <text x="20" y="70" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Estimating Mean Salary of Software Engineers</text>
    <section data-narration="Introduction">
      <rect x="10" y="120" width="400" height="50" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
      <text x="20" y="130" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">What is Discriminant Analysis?</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,10" dur="500" begin="-0.5s"/>
    </section>
    <section data-narration="Covariance Matrix">
      <rect x="10" y="180" width="400" height="50" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
      <text x="20" y="190" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Covariance Matrix</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,20" dur="500" begin="-0.5s"/>
    </section>
    <section data-narration="Fisher's Linear Discriminant">
      <rect x="10" y="230" width="400" height="50" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
      <text x="20" y="240" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Fisher's Linear Discriminant</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,30" dur="500" begin="-0.5s"/>
    </section>
    <section data-narration="Generalized Linear Models">
      <rect x="10" y="280" width="400" height="50" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
      <text x="20" y="290" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Generalized Linear Models</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,40" dur="500" begin="-0.5s"/>
    </section>
    <section data-narration="Estimating Mean Salary">
      <rect x="10" y="330" width="400" height="50" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
      <text x="20" y="340" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Estimating Mean Salary</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="500" begin="-0.5s"/>
    </section>
    <section data-narration="Practical Significance">
      <rect x="10" y="380" width="400" height="50" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
      <text x="20" y="390" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Practical Significance</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,60" dur="500" begin="-0.5s"/>
    </section>
    <footer>
      <rect x="10" y="400" width="400" height="10" fill="#2E4053" stroke="#2E4053" stroke-width="2"/>
      <text x="20" y="410" font-size="18" font-family="Arial, sans-serif" text-anchor="middle">Copyright 2023</text>
    </footer>
  </g>
</svg>