<Svg width="420" height="400" data-topic-id="Which-Variables-Seem-To-Have-The-Strongest-Relationships">
  
  <!-- Gradient background -->
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"></rect>
  
  <!-- Title section -->
  <section data-narration="Introduction">
    <rect x="50" y="50" width="320" height="50" fill="#2196f3" rx="10"></rect>
    <text x="150" y="70" font-size="24" font-weight="bold" fill="#fff">Which Variables Seem to Have the Strongest Relationships?</text>
  </section>
  
  <!-- Covariance Matrix section -->
  <section data-narration="Covariance Matrix">
    <rect x="50" y="150" width="320" height="100" fill="#f7f7f7" rx="10"></rect>
    <rect x="50" y="120" width="320" height="5" fill="#ccc"></rect>
    <text x="150" y="140" font-size="18" fill="#666">Covariance Matrix</text>
    <rect x="50" y="100" width="320" height="10" fill="#ccc"></rect>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="1s"></animate>
  </section>
  
  <!-- Fisher’s Linear Discriminant section -->
  <section data-narration="Fisher’s Linear Discriminant">
    <rect x="50" y="250" width="320" height="100" fill="#f7f7f7" rx="10"></rect>
    <rect x="50" y="220" width="320" height="5" fill="#ccc"></rect>
    <text x="150" y="240" font-size="18" fill="#666">Fisher’s Linear Discriminant</text>
    <rect x="50" y="210" width="320" height="10" fill="#ccc"></rect>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="2s"></animate>
    <line x1="150" y1="220" x2="150" y2="280" stroke="#2196f3" stroke-width="2" fill="none" arrowhead="simple" arrowmarker-end="url(#arrowhead)</line>
  </section>
  
  <!-- Generalized Linear Models section -->
  <section data-narration="Generalized Linear Models">
    <rect x="50" y="350" width="320" height="100" fill="#f7f7f7" rx="10"></rect>
    <rect x="50" y="320" width="320" height="5" fill="#ccc"></rect>
    <text x="150" y="340" font-size="18" fill="#666">Generalized Linear Models</text>
    <rect x="50" y="310" width="320" height="10" fill="#ccc"></rect>
    <animate attributeName="opacity" from="1" to="0" dur="2s" begin="3s"></animate>
  </section>
  
  <!-- Arrowhead for connections -->
  <defs>
    <linearGradient id="arrowhead" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ccc" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#ccc" stop-opacity="1"></stop>
    </linearGradient>
  </defs>
  
  <!-- Footer section -->
  <footer>
    <rect x="50" y="400" width="320" height="50" fill="#2196f3" rx="10"></rect>
    <text x="150" y="410" font-size="18" fill="#fff">Educational Diagram</text>
  </footer>
</Svg>