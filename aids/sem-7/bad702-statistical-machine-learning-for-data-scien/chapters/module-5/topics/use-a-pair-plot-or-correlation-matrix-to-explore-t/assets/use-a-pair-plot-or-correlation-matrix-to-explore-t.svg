<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" data-topic-id="use-a-pair-plot-or-correlation-matrix-to-explore-t">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ACC7F2"/>
      <stop offset="50%" stop-color="#66CCCC"/>
      <stop offset="100%" stop-color="#CCFF99"/>
    </linearGradient>
    <style>
      .text {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #666;
      }
      .title {
        font-size: 24px;
        font-weight: bold;
        color: #3498db;
      }
      .footer {
        font-size: 14px;
        color: #666;
        position: absolute;
        bottom: 0;
        width: 100%;
      }
    </style>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <g transform="translate(20, 20)">
    <text class="title" x="50%" y="20" text-anchor="middle">Use a Pair Plot or Correlation Matrix to Explore Relationships between Variables</text>
    <g transform="translate(0, 60)">
      <rect x="10" y="10" width="400" height="50" fill="#fff" rx="10"/>
      <text class="text" x="20" y="20" text-anchor="start">Pair Plot</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,50" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(0, 120)">
      <rect x="10" y="10" width="400" height="50" fill="#fff" rx="10"/>
      <text class="text" x="20" y="20" text-anchor="start">Correlation Matrix</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,80" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(0, 200)">
      <rect x="10" y="10" width="400" height="50" fill="#fff" rx="10"/>
      <text class="text" x="20" y="20" text-anchor="start">Interpretation of Pair Plots and Correlation Matrices</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(0, 280)">
      <rect x="10" y="10" width="400" height="50" fill="#fff" rx="10"/>
      <text class="text" x="20" y="20" text-anchor="start">Strength and Direction of Relationship</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,160" dur="2s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(0, 360)">
      <rect x="10" y="10" width="400" height="50" fill="#fff" rx="10"/>
      <text class="text" x="20" y="20" text-anchor="start">Arrow Markers for Connections</text>
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" dur="2s" repeatCount="indefinite"/>
    </g>
