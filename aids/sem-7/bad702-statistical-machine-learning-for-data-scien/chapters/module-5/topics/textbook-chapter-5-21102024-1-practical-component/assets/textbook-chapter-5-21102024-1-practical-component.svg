<svg width="420" height="400" data-topic-id="ipcc-chapter-5-experiments-1-practical-component" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id=" gradient-background" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A288A"/>
      <stop offset="100%" stop-color="#56B3FA"/>
    </linearGradient>
  </defs>
  <title>Textbook Chapter 5: Experiments 1 - Practical Component</title>
  <rect x="20" y="20" width="380" height="360" fill="url(#gradient-background)"/>
  <g transform="translate(20, 20)">
    <section data-narration="Introduction">
      <rect width="100%" height="100" fill="#E0E0E0"/>
      <text x="50%" y="50%" font-size="24" font-family="Arial" font-weight="bold">Introduction</text>
      <animate transform="translate(50%, 50%) rotate(45deg)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Dataset Description">
      <rect width="100%" height="100" fill="#E0E0E0"/>
      <h2>Dataset Description</h2>
      <text x="50%" y="70%" font-size="18" font-family="Arial">The dataset contains the following features:<br>
        <ul>
          <li>price: the price of a house</li>
          <li>bedrooms: the number of bedrooms in a house</li>
          <li>bathrooms: the number of bathrooms in a house</li>
          <li>sqft: the square footage of a house</li>
          <li>location: the location of a house (categorical variable)</li>
        </ul>
      </text>
      <animate transform="translate(50%, 100%) rotate(45deg)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Descriptive Statistics">
      <rect width="100%" height="100" fill="#E0E0E0"/>
      <h2>Descriptive Statistics</h2>
      <table>
        <tr>
          <th>Variable</th>
          <th>Mean</th>
          <th>Median</th>
          <th>Mode</th>
        </tr>
        <tr>
          <td>price</td>
          <td>$350,000</td>
          <td>$320,000</td>
          <td>$300,000</td>
        </tr>
        <tr>
          <td>bedrooms</td>
          <td>3</td>
          <td>3</td>
          <td>3</td>
        </tr>
        <tr>
          <td>bathrooms</td>
          <td>2</td>
          <td>2</td>
          <td>2</td>
        </tr>
        <tr>
          <td>sqft</td>
          <td>1,800</td>
          <td>1,600</td>
          <td>1,600</td>
        </tr>
      </table>
      <animate transform="translate(50%, 150%) rotate(45deg)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Distribution of Variables">
      <rect width="100%" height="100" fill="#E0E0E0"/>
      <h2>Distribution of Variables</h2>
      <p>
        <span>price: the price of a house is skewed to the right, with a long tail towards higher prices.</span>
        <span>bedrooms and bathrooms: these variables are normally distributed.</span>
        <span>sqft: this variable is also normally distributed.</span>
      </p>
      <animate transform="translate(50%, 200%) rotate(45deg)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Correlation Matrix">
      <rect width="100%" height="100" fill="#E0E0E0"/>
      <h2>Correlation Matrix</h2>
      <table>
        <tr>
          <th>Variable</th>
          <th>price</th>
          <th>bedrooms</th>
          <th>bathrooms</th>
          <th>sqft</th>
        </tr>
        <tr>
          <td>price</td>
          <td>1</td>
          <td>0.8</td>
          <td>0.5</td>
          <td>0.6</td>
        </tr>
        <tr>
          <td>bedrooms</td>
          <td>0.8</td>
          <td>1</td>
          <td>0.2</td>
          <td>0.3</td>
        </tr>
        <tr>
          <td>bathrooms</td>
          <td>0.5</td>
          <td>0.2</td>
          <td>1</td>
          <td>0.2</td>
        </tr>
        <tr>
          <td>sqft</td>
          <td>0.6</td>
          <td>0.3</td>
          <td>0.2</td>
          <td>1</td>
        </tr>
      </table>
      <animate transform="translate(50%, 250%) rotate(45deg)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <section data-narration="Discriminant Analysis">
      <rect width="100%" height="100" fill="#E0E0E0"/>
      <h2>Discriminant Analysis</h2>
      <p>
        <span>Discriminant analysis is a supervised learning technique used to classify data points into different classes based on a set of features.</span>
        <span>We will use the SVM algorithm to perform the analysis.</span>
      </p>
      <animate transform="translate(50%, 300%) rotate(45deg)" begin="0s" dur="2s" repeatCount="indefinite"/>
    </section>
    <footer>
      <p>&copy; 2024</p>
    </footer>
  </g>
</svg>