<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="discriminant-analysis-covariance-matrix-fishers-linear-discriminant">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#A1C9F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#87CEEB" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B3F54" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4F5154" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5C6368" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="teal-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0097A7" stop-opacity="1"/>
      <stop offset="50%" stop-color="#1ABC9C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2ECC71" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FF9800" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFA07A" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>

  <!-- Title -->
  <text x="10" y="20" font-size="24" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
    <tspan>Discriminant Analysis</tspan>
    <tspan> You Take 10 Different Random Samples</tspan>
  </text>

  <!-- Section 1: Covariance Matrix Definition -->
  <section id="covariance-matrix-definition" data-narration="The covariance matrix is a square matrix that summarizes the covariance between different variables in a multivariate dataset.">
    <rect x="10" y="50" width="400" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 60)">
      <rect x="0" y="0" width="200" height="50" fill="#FFC107" rx="10"/>
      <text x="15" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        Covariance Matrix
      </text>
      <text x="15" y="55" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        A square matrix that summarizes the covariance between different variables in a multivariate dataset.
      </text>
    </g>
  </section>

  <!-- Section 2: Example Covariance Matrix -->
  <section id="example-covariance-matrix" data-narration="Suppose we have a dataset with three variables: x1, x2, and x3. The covariance matrix would be:...">
    <rect x="10" y="170" width="400" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 190)">
      <rect x="0" y="0" width="200" height="50" fill="#FF9800" rx="10"/>
      <text x="15" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        Example Covariance Matrix
      </text>
      <text x="15" y="55" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        A dataset with three variables: x1, x2, and x3. The covariance matrix would be:
      </text>
      <rect x="210" y="0" width="150" height="50" fill="#87CEEB" rx="10"/>
      <text x="220" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        |     | x1  | x2  |
      </text>
      <text x="220" y="55" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        | x1  | σ11 | σ12 |
      </text>
      <text x="220" y="95" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        | x2  | σ21 | σ22 |
      </text>
    </g>
  </section>

  <!-- Section 3: Fisher’s Linear Discriminant Definition -->
  <section id="fishers-linear-discriminant-definition" data-narration="Fisher’s Linear Discriminant is a linear combination of features that maximizes the separation between different classes in a dataset....">
    <rect x="10" y="310" width="400" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 330)">
      <rect x="0" y="0" width="200" height="50" fill="#FFC107" rx="10"/>
      <text x="15" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        Fisher’s Linear Discriminant
      </text>
      <text x="15" y="55" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        A linear combination of features that maximizes the separation between different classes in a dataset.
      </text>
    </g>
  </section>

  <!-- Section 4: Example Fisher’s Linear Discriminant -->
  <section id="example-fishers-linear-discriminant" data-narration="Suppose we have a dataset with two classes: class 1 and class 2. The covariance matrix is:...">
    <rect x="10" y="380" width="400" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 410)">
      <rect x="0" y="0" width="200" height="50" fill="#FF9800" rx="10"/>
      <text x="15" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        Example Fisher’s Linear Discriminant
      </text>
      <text x="15" y="55" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        A dataset with two classes: class 1 and class 2. The covariance matrix is:
      </text>
      <rect x="210" y="0" width="150" height="50" fill="#87CEEB" rx="10"/>
      <text x="220" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        |     | x1  | x2  |
      </text>
      <text x="220" y="55" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        | x1  | σ11 | σ12 |
      </text>
      <text x="220" y="95" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        | x2  | σ21 | σ22 |
      </text>
    </g>
  </section>

  <!-- Section 5: Interpretation -->
  <section id="interpretation" data-narration="The covariance matrix provides information about the relationships between different variables in the dataset....">
    <rect x="10" y="500" width="400" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 520)">
      <rect x="0" y="0" width="200" height="50" fill="#FFC107" rx="10"/>
      <text x="15" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        Interpretation
      </text>
      <text x="15" y="55" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        The covariance matrix provides information about the relationships between different variables in the dataset.
      </text>
    </g>
  </section>

  <!-- Section 6: Conclusion -->
  <section id="conclusion" data-narration="In conclusion, the covariance matrix is a fundamental concept in statistics and is used in many machine learning algorithms, including discriminant analysis...">
    <rect x="10" y="590" width="400" height="100" fill="#C7B8EA" rx="10"/>
    <g transform="translate(10, 610)">
      <rect x="0" y="0" width="200" height="50" fill="#FF9800" rx="10"/>
      <text x="15" y="25" font-size="18" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        Conclusion
      </text>
      <text x="15" y="55" font-size="14" font-family="Arial, sans-serif" text-anchor="start" fill="#4F5154">
        In conclusion, the covariance matrix is a fundamental concept in statistics and is used in many machine learning algorithms, including discriminant analysis.
      </text>
    </g>
  </section>

  <!-- Arrows -->
  <polygon points="10,10 20,20 30,30" fill="#4F5154" opacity="0.5"/>
  <polygon points="40,40 50,50 60,60" fill="#87CEEB" opacity="0.5"/>
  <polygon points="70,70 80,80 90,90" fill="#FFC107" opacity="0.5"/>
  <polygon points="100,100 110,110 120,120" fill="#FF9800" opacity="0.5"/>
  <polygon points="130,130 140,140 150,150" fill="#2ECC71" opacity="0.5"/>
  <polygon points="160,160 170,170 180,180" fill="#5C6368" opacity="0.5"/>
  <polygon points="190,190 200,200 210,210" fill="#3B3F54" opacity="0.5"/>
  <polygon points="220,220 230,230 240,240" fill="#A1C9F2" opacity="0.5"/>
  <polygon points="240,240 250,250 260,260" fill="#C7B8EA" opacity="0.5"/>
  <polygon points="260,260 270,270 280,280" fill="#4F5154" opacity="0.5"/>
  <polygon points="280,280 290,290 300,300" fill="#FF9800" opacity="0.5"/>
  <polygon points="300,300 310,310 320,320" fill="#87CEEB" opacity="0.5"/>
  <polygon points="320,320 330,330 340,340" fill="#FFC107" opacity="0.5"/>
  <polygon points="340,340 350,350 360,360" fill="#FF9800" opacity="0.5"/>
  <polygon points="360,360 370,370 380,380" fill="#2ECC71" opacity="0.5"/>
  <polygon points="380,380 390,390 400,400" fill="#5C6368" opacity="0.5"/>
</svg>