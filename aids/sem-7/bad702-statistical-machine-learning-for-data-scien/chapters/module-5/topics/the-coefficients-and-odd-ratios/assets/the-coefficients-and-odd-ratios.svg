<svg width="420" height="400" data-topic-id="the-coefficients-and-odd-ratios" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B9467"/>
      <stop offset="100%" stop-color="#C7F464"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="100%" height="100%"/>

  <!-- Title -->
  <text x="150" y="20" font-size="24" font-family="Arial" text-anchor="middle" fill="#3498db">
    The Coefficients and Odd Ratios
  </text>

  <!-- Section 1: Coefficients -->
  <rect x="10" y="60" width="400" height="40" fill="#f7f7f7" rx="5"/>
  <text x="15" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Coefficients
  </text>
  <text x="15" y="90" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71" data-narration>
    Numerical values representing the change in the predicted outcome for a one-unit change in the input variable.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" begin="0s" repeatCount="indefinite"/>
  <line x1="20" y1="100" x2="300" y2="150" stroke="#2ecc71" stroke-width="2" data-topic-id="the-coefficients-and-odd-ratios" data-point-type="arrow"/>

  <!-- Section 2: Example Coefficients -->
  <rect x="10" y="150" width="400" height="40" fill="#f7f7f7" rx="5"/>
  <text x="15" y="160" font-size="18" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Example Coefficients
  </text>
  <rect x="10" y="180" width="100" height="20" fill="#f7f7f7" rx="5"/>
  <text x="110" y="190" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Age: 0.05
  </text>
  <rect x="10" y="210" width="100" height="20" fill="#f7f7f7" rx="5"/>
  <text x="110" y="220" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Income: 0.10
  </text>
  <text x="15" y="240" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71" data-narration>
    The coefficient of a feature represents its contribution to the model's prediction.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" begin="0s" repeatCount="indefinite"/>
  <line x1="20" y1="100" x2="300" y2="150" stroke="#2ecc71" stroke-width="2" data-topic-id="the-coefficients-and-odd-ratios" data-point-type="arrow"/>

  <!-- Section 3: Odd Ratios -->
  <rect x="10" y="300" width="400" height="40" fill="#f7f7f7" rx="5"/>
  <text x="15" y="310" font-size="18" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Odd Ratios
  </text>
  <text x="15" y="330" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71" data-narration>
    Represent the change in the odds of the positive outcome for a one-unit change in the input variable.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" begin="0s" repeatCount="indefinite"/>
  <line x1="20" y1="100" x2="300" y2="150" stroke="#2ecc71" stroke-width="2" data-topic-id="the-coefficients-and-odd-ratios" data-point-type="arrow"/>

  <!-- Section 4: Example Odd Ratios -->
  <rect x="10" y="370" width="400" height="40" fill="#f7f7f7" rx="5"/>
  <text x="15" y="380" font-size="18" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Example Odd Ratios
  </text>
  <rect x="10" y="410" width="100" height="20" fill="#f7f7f7" rx="5"/>
  <text x="110" y="420" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Age: 1.05
  </text>
  <rect x="10" y="440" width="100" height="20" fill="#f7f7f7" rx="5"/>
  <text x="110" y="450" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Income: 1.10
  </text>
  <text x="15" y="470" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71" data-narration>
    Odd ratios are useful for binary classification problems, as they represent the change in the odds of the positive outcome.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" begin="0s" repeatCount="indefinite"/>
  <line x1="20" y1="100" x2="300" y2="150" stroke="#2ecc71" stroke-width="2" data-topic-id="the-coefficients-and-odd-ratios" data-point-type="arrow"/>

  <!-- Section 5: Conclusion -->
  <rect x="10" y="500" width="400" height="40" fill="#f7f7f7" rx="5"/>
  <text x="15" y="510" font-size="18" font-family="Arial" text-anchor="start" fill="#2ecc71">
    Conclusion
  </text>
  <text x="15" y="530" font-size="16" font-family="Arial" text-anchor="start" fill="#2ecc71" data-narration>
    Understanding coefficients and odd ratios is crucial for interpreting the results of our models.
  </text>
  <animateTransform attributeName="transform" type="rotate" from="0 200 100" to="360 200 100" dur="10s" begin="0s" repeatCount="indefinite"/>
  <line x1="20" y1="100" x2="300" y2="150" stroke="#2ecc71" stroke-width="2" data-topic-id="the-coefficients-and-odd-ratios" data-point-type="arrow"/>

  <!-- Footer -->
  <rect x="10" y="570" width="400" height="40" fill="#2ecc71" rx="5"/>
  <text x="15" y="580" font-size="18" font-family="Arial" text-anchor="start" fill="#3498db">
    Created by [Your Name]
  </text>
</svg>