<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="Create-Visualizations-Such-As-Bar-Plots-Or-Stacked">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="400" fill="url(#pastel-gradient)"/>
  
  <!-- Section 1: Introduction -->
  <section id="section-1" data-narration="Introduction to Bar Plots">
    <rect x="10" y="20" width="400" height="100" fill="#F7F7F7" rx="10"/>
    <text x="20" y="50" font-size="24" font-family="Arial" fill="#333">Bar Plots</text>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#666">A type of visualization that displays categorical data as rectangular bars.</text>
  </section>
  
  <!-- Section 2: Key Features -->
  <section id="section-2" data-narration="Key Features of Bar Plots">
    <rect x="10" y="140" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="140" width="350" height="50" fill="#F7F7F7" rx="10"/>
    <text x="20" y="150" font-size="24" font-family="Arial" fill="#333">Categorical Data</text>
    <text x="20" y="180" font-size="18" font-family="Arial" fill="#666">Rectangular Bars</text>
    <text x="20" y="210" font-size="18" font-family="Arial" fill="#666">Comparison</text>
  </section>
  
  <!-- Section 3: Example Code -->
  <section id="section-3" data-narration="Example Code for Bar Plots">
    <rect x="10" y="280" width="400" height="100" fill="#F7F7F7" rx="10"/>
    <code-container>
      <pre>
        import matplotlib.pyplot as plt
        import numpy as np
        satisfaction_levels = [4, 3, 5, 4, 3, 4, 5, 4, 3, 5]
        repeat_purchases = [10, 5, 15, 10, 5, 15, 10, 5, 15, 10]
        plt.bar(range(len(satisfaction_levels)), satisfaction_levels)
        plt.bar(range(len(repeat_purchases)), repeat_purchases)
        plt.xlabel('Category')
        plt.ylabel('Value')
        plt.title('Satisfaction Levels and Repeat Purchases')
        plt.show()
      </pre>
    </code-container>
  </section>
  
  <!-- Section 4: Stacked Bar Charts -->
  <section id="section-4" data-narration="Stacked Bar Charts">
    <rect x="10" y="380" width="400" height="100" fill="#F7F7F7" rx="10"/>
    <text x="20" y="400" font-size="24" font-family="Arial" fill="#333">Stacked Bar Charts</text>
    <text x="20" y="420" font-size="18" font-family="Arial" fill="#666">A type of bar plot that displays multiple categories on top of each other.</text>
  </section>
  
  <!-- Animation -->
  <animate xmlns="http://www.w3.org/2000/svg" begin="0s" dur="10s" repeatCount="indefinite">
    <rect x="10" y="20" width="400" height="100" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="140" width="400" height="150" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="280" width="400" height="100" fill="#F7F7F7" rx="10"/>
    <rect x="10" y="380" width="400" height="100" fill="#F7F7F7" rx="10"/>
    <text x="20" y="50" font-size="24" font-family="Arial" fill="#333">Bar Plots</text>
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#666">Categorical Data</text>
    <text x="20" y="210" font-size="18" font-family="Arial" fill="#666">Comparison</text>
    <text x="20" y="400" font-size="24" font-family="Arial" fill="#333">Stacked Bar Charts</text>
  </animate>
  
  <!-- Title and Footer -->
  <title>Visualizations: Bar Plots and Stacked Bar Charts</title>
  <footer>&copy; 2023</footer>
</svg>