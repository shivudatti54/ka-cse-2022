<svg width="420" height="400" viewBox="0 0 420 400">
    <defs>
        <style>
            .background {
                fill: #C7E8F5;
                transition: background-color 0.5s;
            }
            .active {
                background-color: #87CEEB;
            }
            .inactive {
                background-color: #C7E8F5;
            }
        </style>
    </defs>
    <rect x="0" y="0" width="420" height="400" class="background" data-topic-id="categorical-data" data-topic-slug="and-categorical-data"/>
    <g data-narration="What is Categorical Data?" class="section">
        <rect x="0" y="0" width="100" height="40" class="active"/>
        <rect x="110" y="0" width="100" height="40" class="inactive"/>
        <rect x="220" y="0" width="100" height="40" class="inactive"/>
        <rect x="330" y="0" width="100" height="40" class="inactive"/>
        <animateTransform attributeName="transform" type="translate" from="0 60" to="0 120" begin=".section1 0s" duration="0.5s"/>
        <animateTransform attributeName="transform" type="translate" from="110 60" to="110 120" begin=".section1 0.2s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="220 60" to="220 120" begin=".section1 0.4s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="330 60" to="330 120" begin=".section1 0.6s" duration="0.3s"/>
        <text x="50" y="20" class="title">What is Categorical Data?</text>
        <text x="50" y="150" class="description">Categorical data is a type of data that cannot be measured numerically, but can be ranked or ordered based on certain characteristics.</text>
    </g>
    <g data-narration="Types of Categorical Data?" class="section">
        <rect x="0" y="150" width="100" height="40" class="active"/>
        <rect x="110" y="150" width="100" height="40" class="inactive"/>
        <rect x="220" y="150" width="100" height="40" class="inactive"/>
        <rect x="330" y="150" width="100" height="40" class="inactive"/>
        <animateTransform attributeName="transform" type="translate" from="0 200" to="0 260" begin=".section2 0s" duration="0.5s"/>
        <animateTransform attributeName="transform" type="translate" from="110 200" to="110 260" begin=".section2 0.2s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="220 200" to="220 260" begin=".section2 0.4s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="330 200" to="330 260" begin=".section2 0.6s" duration="0.3s"/>
        <text x="50" y="170" class="title">Types of Categorical Data?</text>
        <text x="50" y="300" class="description">There are two main types of categorical data: nominal data and ordinal data.</text>
    </g>
    <g data-narration="Nominal Data" class="section">
        <rect x="0" y="300" width="100" height="40" class="active"/>
        <rect x="110" y="300" width="100" height="40" class="inactive"/>
        <rect x="220" y="300" width="100" height="40" class="inactive"/>
        <rect x="330" y="300" width="100" height="40" class="inactive"/>
        <animateTransform attributeName="transform" type="translate" from="0 350" to="0 410" begin=".section3 0s" duration="0.5s"/>
        <animateTransform attributeName="transform" type="translate" from="110 350" to="110 410" begin=".section3 0.2s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="220 350" to="220 410" begin=".section3 0.4s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="330 350" to="330 410" begin=".section3 0.6s" duration="0.3s"/>
        <text x="50" y="320" class="title">Nominal Data</text>
        <text x="50" y="380" class="description">Nominal data is categorical data that has no inherent order or ranking.</text>
    </g>
    <g data-narration="Ordinal Data" class="section">
        <rect x="0" y="400" width="100" height="40" class="active"/>
        <rect x="110" y="400" width="100" height="40" class="inactive"/>
        <rect x="220" y="400" width="100" height="40" class="inactive"/>
        <rect x="330" y="400" width="100" height="40" class="inactive"/>
        <animateTransform attributeName="transform" type="translate" from="0 450" to="0 510" begin=".section4 0s" duration="0.5s"/>
        <animateTransform attributeName="transform" type="translate" from="110 450" to="110 510" begin=".section4 0.2s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="220 450" to="220 510" begin=".section4 0.4s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="330 450" to="330 510" begin=".section4 0.6s" duration="0.3s"/>
        <text x="50" y="420" class="title">Ordinal Data</text>
        <text x="50" y="480" class="description">Ordinal data is categorical data that has a natural order or ranking.</text>
    </g>
    <g data-narration="Analyzing Categorical Data?" class="section">
        <rect x="0" y="0" width="100" height="40" class="active"/>
        <rect x="110" y="0" width="100" height="40" class="inactive"/>
        <rect x="220" y="0" width="100" height="40" class="inactive"/>
        <rect x="330" y="0" width="100" height="40" class="inactive"/>
        <animateTransform attributeName="transform" type="translate" from="0 60" to="0 120" begin=".section5 0s" duration="0.5s"/>
        <animateTransform attributeName="transform" type="translate" from="110 60" to="110 120" begin=".section5 0.2s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="220 60" to="220 120" begin=".section5 0.4s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="330 60" to="330 120" begin=".section5 0.6s" duration="0.3s"/>
        <text x="50" y="20" class="title">Analyzing Categorical Data?</text>
        <text x="50" y="150" class="description">Categorical data can be analyzed using various statistical techniques, including frequency analysis, bar charts, pie charts, and the chi-square test.</text>
    </g>
    <g data-narration="Visualizing Categorical Data?" class="section">
        <rect x="0" y="150" width="100" height="40" class="active"/>
        <rect x="110" y="150" width="100" height="40" class="inactive"/>
        <rect x="220" y="150" width="100" height="40" class="inactive"/>
        <rect x="330" y="150" width="100" height="40" class="inactive"/>
        <animateTransform attributeName="transform" type="translate" from="0 200" to="0 260" begin=".section6 0s" duration="0.5s"/>
        <animateTransform attributeName="transform" type="translate" from="110 200" to="110 260" begin=".section6 0.2s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="220 200" to="220 260" begin=".section6 0.4s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="330 200" to="330 260" begin=".section6 0.6s" duration="0.3s"/>
        <text x="50" y="170" class="title">Visualizing Categorical Data?</text>
        <text x="50" y="300" class="description">Categorical data can be visualized using bar charts, pie charts, and other graphical representations.</text>
    </g>
    <g data-narration="Conclusion" class="section">
        <rect x="0" y="400" width="100" height="40" class="active"/>
        <rect x="110" y="400" width="100" height="40" class="inactive"/>
        <rect x="220" y="400" width="100" height="40" class="inactive"/>
        <rect x="330" y="400" width="100" height="40" class="inactive"/>
        <animateTransform attributeName="transform" type="translate" from="0 450" to="0 510" begin=".section7 0s" duration="0.5s"/>
        <animateTransform attributeName="transform" type="translate" from="110 450" to="110 510" begin=".section7 0.2s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="220 450" to="220 510" begin=".section7 0.4s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="330 450" to="330 510" begin=".section7 0.6s" duration="0.3s"/>
        <text x="50" y="420" class="title">Conclusion</text>
        <text x="50" y="480" class="description">In conclusion, categorical data is a type of data that cannot be measured numerically, but can be ranked or ordered based on certain characteristics.</text>
    </g>
    <g data-narration="References" class="section">
        <rect x="0" y="450" width="100" height="40" class="inactive"/>
        <rect x="110" y="450" width="100" height="40" class="inactive"/>
        <rect x="220" y="450" width="100" height="40" class="inactive"/>
        <rect x="330" y="450" width="100" height="40" class="inactive"/>
        <animateTransform attributeName="transform" type="translate" from="0 500" to="0 560" begin=".section8 0s" duration="0.5s"/>
        <animateTransform attributeName="transform" type="translate" from="110 500" to="110 560" begin=".section8 0.2s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="220 500" to="220 560" begin=".section8 0.4s" duration="0.3s"/>
        <animateTransform attributeName="transform" type="translate" from="330 500" to="330 560" begin=".section8 0.6s" duration="0.3s"/>
        <text x="50" y="470" class="title">References</text>
        <text x="50" y="520" class="description">For more information on categorical data, please refer to the references section.</text>
    </g>
    <text x="50" y="10" class="title">And Categorical Data</text>
    <text x="50" y="400" class="footer">Footer</text>
</svg>