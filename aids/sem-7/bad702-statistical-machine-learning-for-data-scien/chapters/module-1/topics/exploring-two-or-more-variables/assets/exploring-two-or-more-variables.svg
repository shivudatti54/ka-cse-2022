<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" transform="translate(0 0)">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ADD8E6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <circle cx="210" cy="200" r="50" fill="#ADD8E6"/>
  <g id="multivariate-analysis">
    <rect x="10" y="10" width="400" height="300" style="fill: url(#pastel-gradient)"/>
    <text x="15" y="25" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Two or More Variables</text>
    <g id="explaining-variables">
      <title>Explaining Variables</title>
      <rect x="10" y="50" width="300" height="150" style="fill-opacity: 0.5"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin="0s" dur="2s" repeatCount="1"/>
      <animateTransform attributeName="transform" type="translateX" from="10" to="10" begin="0s" dur="2s" repeatCount="1"/>
      <text x="170" y="90" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Data Visualization</text>
      <text x="170" y="120" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Exploring Bivariate and Multivariate Relationships</text>
    </g>
    <g id="types-of-plots">
      <title>Types of Plots</title>
      <rect x="10" y="200" width="300" height="150" style="fill-opacity: 0.5"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin="0s" dur="2s" repeatCount="1"/>
      <animateTransform attributeName="transform" type="translateX" from="10" to="10" begin="0s" dur="2s" repeatCount="1"/>
      <text x="170" y="250" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Scatterplots</text>
      <text x="170" y="280" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Box Plots</text>
      <text x="170" y="310" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Heatmaps</text>
    </g>
    <g id=" scatterplots">
      <title>Scatterplots</title>
      <rect x="10" y="350" width="300" height="150" style="fill-opacity: 0.5"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin="0s" dur="2s" repeatCount="1"/>
      <animateTransform attributeName="transform" type="translateX" from="10" to="10" begin="0s" dur="2s" repeatCount="1"/>
      <text x="170" y="400" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Bivariate Relationships</text>
      <text x="170" y="420" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Correlation Coefficient</text>
      <line x1="200" y1="300" x2="200" y2="350" style="stroke:#ADD8E6; stroke-width:2"/>
      <line x1="250" y1="300" x2="250" y2="350" style="stroke:#ADD8E6; stroke-width:2"/>
    </g>
    <g id="heatmap">
      <title>Heatmap</title>
      <rect x="10" y="500" width="300" height="150" style="fill-opacity: 0.5"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin="0s" dur="2s" repeatCount="1"/>
      <animateTransform attributeName="transform" type="translateX" from="10" to="10" begin="0s" dur="2s" repeatCount="1"/>
      <text x="170" y="550" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Variable Importance</text>
      <text x="170" y="580" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Correlation Coefficient</text>
      <line x1="200" y1="500" x2="200" y2="550" style="stroke:#ADD8E6; stroke-width:2"/>
      <line x1="250" y1="500" x2="250" y2="550" style="stroke:#ADD8E6; stroke-width:2"/>
    </g>
    <g id="box-plots">
      <title>Box Plots</title>
      <rect x="10" y="600" width="300" height="150" style="fill-opacity: 0.5"/>
      <animateTransform attributeName="transform" type="scale" from="1 1" to="1.2 1.2" begin="0s" dur="2s" repeatCount="1"/>
      <animateTransform attributeName="transform" type="translateX" from="10" to="10" begin="0s" dur="2s" repeatCount="1"/>
      <text x="170" y="650" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Outliers</text>
      <text x="170" y="680" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Interquartile Range</text>
      <line x1="200" y1="600" x2="200" y2="650" style="stroke:#ADD8E6; stroke-width:2"/>
      <line x1="250" y1="600" x2="250" y2="650" style="stroke:#ADD8E6; stroke-width:2"/>
    </g>
  </g>
  <g id="footer">
    <rect x="10" y="370" width="400" height="30" style="fill-opacity: 0.5"/>
    <text x="15" y="390" font-size="18" font-family="Arial, sans-serif" text-anchor="start">Educational Diagram</text>
  </g>
  <g id="title">
    <rect x="10" y="10" width="400" height="30" style="fill-opacity: 0.5"/>
    <text x="15" y="30" font-size="24" font-family="Arial, sans-serif" text-anchor="start">Exploring Two or More Variables</text>
  </g>
</svg>