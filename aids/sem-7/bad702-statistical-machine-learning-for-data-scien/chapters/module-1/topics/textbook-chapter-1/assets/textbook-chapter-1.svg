<svg xmlns="http://www.w3.org/2000/svg" 
     width="420" height="400" 
     viewBox="0 0 420 400" 
     data-topic-id="exploratory-data-analysis-estimates-of-locations-and-variability">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0097A7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Title and Footer -->
  <rect x="10" y="10" width="400" height="40" fill="#0097A7" rx="10"/>
  <g transform="translate(10, 60)">
    <text x="0" y="20" fill="#FFFFFF" font-size="24" font-family="Arial" text-anchor="start">Statistical Machine Learning for Data Science</text>
  </g>
  <rect x="10" y="410" width="400" height="40" fill="#0097A7" rx="10"/>
  
  <!-- Section 1: Mean -->
  <rect x="10" y="50" width="200" height="100" fill="#F7F7F7" rx="10"/>
  <text x="10" y="20" fill="#333333" font-size="18" font-family="Arial" text-anchor="start" data-narration="Estimating Locations | Mean">Mean</text>
  <g transform="translate(10, 30)">
    <circle cx="100" cy="50" r="30" fill="#F7F7F7"/>
    <animate transform="rotate(360 100 50)" begin=".5s" dur="2s" repeatCount="	indefinite"/>
  </g>
  <line x1="50" y1="180" x2="170" y2="180" stroke="#0097A7" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
  <g transform="translate(240, 50)">
    <rect width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" fill="#333333" font-size="18" font-family="Arial" text-anchor="start">80</text>
  </g>
  
  <!-- Section 2: Median -->
  <rect x="10" y="170" width="200" height="100" fill="#F7F7F7" rx="10"/>
  <text x="10" y="140" fill="#333333" font-size="18" font-family="Arial" text-anchor="start" data-narration="Estimating Locations | Median">Median</text>
  <g transform="translate(10, 110)">
    <circle cx="100" cy="55" r="30" fill="#F7F7F7"/>
    <animate transform="rotate(360 100 55)" begin=".8s" dur="2s" repeatCount="	indefinite"/>
  </g>
  <line x1="50" y1="215" x2="170" y2="215" stroke="#0097A7" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
  <g transform="translate(240, 110)">
    <rect width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" fill="#333333" font-size="18" font-family="Arial" text-anchor="start">75</text>
  </g>
  
  <!-- Section 3: Mode -->
  <rect x="10" y="290" width="200" height="100" fill="#F7F7F7" rx="10"/>
  <text x="10" y="260" fill="#333333" font-size="18" font-family="Arial" text-anchor="start" data-narration="Estimating Locations | Mode">Mode</text>
  <g transform="translate(10, 190)">
    <circle cx="100" cy="60" r="30" fill="#F7F7F7"/>
    <animate transform="rotate(360 100 60)" begin=".5s" dur="2s" repeatCount="	indefinite"/>
  </g>
  <line x1="50" y1="325" x2="170" y2="325" stroke="#0097A7" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
  <g transform="translate(240, 190)">
    <rect width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" fill="#333333" font-size="18" font-family="Arial" text-anchor="start">Blue</text>
  </g>
  
  <!-- Section 4: Range -->
  <rect x="10" y="350" width="200" height="100" fill="#F7F7F7" rx="10"/>
  <text x="10" y="320" fill="#333333" font-size="18" font-family="Arial" text-anchor="start" data-narration="Estimating Variability | Range">Range</text>
  <g transform="translate(10, 230)">
    <circle cx="100" cy="50" r="30" fill="#F7F7F7"/>
    <animate transform="rotate(360 100 50)" begin=".8s" dur="2s" repeatCount="	indefinite"/>
  </g>
  <line x1="50" y1="370" x2="170" y2="370" stroke="#0097A7" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
  <g transform="translate(240, 230)">
    <rect width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" fill="#333333" font-size="18" font-family="Arial" text-anchor="start">20</text>
  </g>
  
  <!-- Section 5: Interquartile Range -->
  <rect x="10" y="410" width="200" height="100" fill="#F7F7F7" rx="10"/>
  <text x="10" y="380" fill="#333333" font-size="18" font-family="Arial" text-anchor="start" data-narration="Estimating Variability | Interquartile Range">Interquartile Range</text>
  <g transform="translate(10, 290)">
    <circle cx="100" cy="50" r="30" fill="#F7F7F7"/>
    <animate transform="rotate(360 100 50)" begin=".5s" dur="2s" repeatCount="	indefinite"/>
  </g>
  <line x1="50" y1="430" x2="170" y2="430" stroke="#0097A7" stroke-width="2" marker-end="url(#arrow-head)" marker-start="url(#arrow-head)"/>
  <g transform="translate(240, 290)">
    <rect width="100" height="20" fill="#F7F7F7" rx="5"/>
    <text x="10" y="15" fill="#333333" font-size="18" font-family="Arial" text-anchor="start">25</text>
  </g>
</svg>