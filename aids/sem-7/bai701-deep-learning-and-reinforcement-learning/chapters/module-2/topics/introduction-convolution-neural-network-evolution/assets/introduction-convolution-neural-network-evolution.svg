<svg width="420" height="400" data-topic-id="convolutional-neural-network-evolution">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7A88E5" stop-opacity="1" />
      <stop offset="100%" stop-color="#2F4F7F" stop-opacity="1" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" style="fill: url(#gradient); opacity: 0.5;" />
  
  <!-- Title -->
  <g transform="translate(10, 20)">
    <text x="0" y="0" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Introduction to Convolutional Neural Networks (CNNs) Evolution</text>
  </g>
  
  <!-- Section 1: What is a CNN? -->
  <g transform="translate(10, 50)">
    <rect width="360" height="150" rx="10" fill="#FFFFFF" data-narration="What is a Convolutional Neural Network (CNN)?">
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">A CNN is a type of deep learning model that is primarily used for image classification and object detection tasks.</text>
    </rect>
    <animate duration="2000" begin="0s" repeatCount="indefinite">
      <path d="M 50 50 L 50 70 L 90 70 L 90 50" stroke="#FFFFFF" stroke-width="2" fill="none" />
    </animate>
  </g>
  
  <!-- Section 2: Key Characteristics -->
  <g transform="translate(10, 210)">
    <rect width="360" height="150" rx="10" fill="#FFFFFF" data-narration="Key Characteristics of CNNs">
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">CNNs process images at multiple scales, from small features to larger features.</text>
    </rect>
    <animate duration="2000" begin="0s" repeatCount="indefinite">
      <path d="M 50 50 L 70 70 L 90 70 L 100 50" stroke="#FFFFFF" stroke-width="2" fill="none" />
    </animate>
  </g>
  
  <!-- Section 3: Early CNNs -->
  <g transform="translate(10, 370)">
    <rect width="360" height="150" rx="10" fill="#FFFFFF" data-narration="Early CNNs (1990s-2000s)">
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">Early CNNs were introduced in the 1990s and were used for image classification tasks.</text>
    </rect>
    <animate duration="2000" begin="0s" repeatCount="indefinite">
      <path d="M 50 50 L 70 70 L 90 70 L 100 50" stroke="#FFFFFF" stroke-width="2" fill="none" />
    </animate>
  </g>
  
  <!-- Section 4: Deep Belief Networks -->
  <g transform="translate(10, 430)">
    <rect width="360" height="150" rx="10" fill="#FFFFFF" data-narration="Deep Belief Networks (2006)">
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">The introduction of Deep Belief Networks (DBNs) marked the beginning of the modern CNN era.</text>
    </rect>
    <animate duration="2000" begin="0s" repeatCount="indefinite">
      <path d="M 50 50 L 70 70 L 90 70 L 100 50" stroke="#FFFFFF" stroke-width="2" fill="none" />
    </animate>
  </g>
  
  <!-- Section 5: AlexNet -->
  <g transform="translate(10, 490)">
    <rect width="360" height="150" rx="10" fill="#FFFFFF" data-narration="AlexNet (2012)">
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">AlexNet, developed by Alex Krizhevsky, was a significant improvement over previous CNNs.</text>
    </rect>
    <animate duration="2000" begin="0s" repeatCount="indefinite">
      <path d="M 50 50 L 70 70 L 90 70 L 100 50" stroke="#FFFFFF" stroke-width="2" fill="none" />
    </animate>
  </g>
  
  <!-- Section 6: ResNet -->
  <g transform="translate(10, 550)">
    <rect width="360" height="150" rx="10" fill="#FFFFFF" data-narration="ResNet (2016)">
      <text x="10" y="10" font-size="18" font-family="Arial" fill="#2F4F7F" text-anchor="start">ResNet, developed by Kaiming He, introduced the concept of residual learning to improve the performance of CNNs.</text>
    </rect>
    <animate duration="2000" begin="0s" repeatCount="indefinite">
      <path d="M 50 50 L 70 70 L 90 70 L 100 50" stroke="#FFFFFF" stroke-width="2" fill="none" />
    </animate>
  </g>
  
  <!-- Footer -->
  <g transform="translate(10, 610)">
    <text x="0" y="0" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="middle">Convolutional Neural Networks Evolution</text>
  </g>
</svg>