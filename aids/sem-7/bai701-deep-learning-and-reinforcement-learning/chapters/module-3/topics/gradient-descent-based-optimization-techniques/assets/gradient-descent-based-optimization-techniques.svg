<svg width="420" height="400" data-topic-id="gradient-descent-based-optimization-techniques">
  <!-- Title and Footer -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#65C9FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#33A9F5" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="footer-gradient" x1="0%" y1="100%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#33A9F5" stop-opacity="1" />
      <stop offset="100%" stop-color="#65C9FF" stop-opacity="1" />
    </linearGradient>
  </defs>
  <text x="10" y="20" font-size="24" font-family="Arial" text-anchor="start" fill="#FFFFFF" opacity="0.9">Gradient Descent-Based Optimization Techniques</text>
  <rect x="10" y="50" width="400" height="300" fill="url(#gradient)" opacity="0.5" />
  <!-- Section 1: Introduction -->
  <section data-narration="What is Gradient Descent?">
    <rect x="10" y="60" width="370" height="50" fill="#FFFFFF" rx="10" />
    <text x="15" y="70" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">Gradient Descent is an optimization algorithm that iteratively adjusts the model parameters to minimize the loss function.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 100" to="360 190 100" dur="3000" repeatCount="indefinite" begin="0s" />
  </section>
  <!-- Section 2: Key Concepts -->
  <section data-narration="Key Concepts">
    <rect x="10" y="120" width="370" height="50" fill="#FFFFFF" rx="10" />
    <text x="15" y="130" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">Loss Function: A function that measures the difference between the model's predictions and the actual outputs.</text>
    <text x="15" y="160" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">Model Parameters: The weights, biases, and other adjustable values of the model.</text>
    <text x="15" y="190" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">Gradient: The derivative of the loss function with respect to the model parameters.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 100" to="360 190 100" dur="3000" repeatCount="indefinite" begin="1s" />
  </section>
  <!-- Section 3: Stochastic Gradient Descent (SGD) -->
  <section data-narration="Stochastic Gradient Descent (SGD)">
    <rect x="10" y="200" width="370" height="50" fill="#FFFFFF" rx="10" />
    <text x="15" y="210" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">SGD uses a single example from the training dataset to update the model parameters.</text>
    <text x="15" y="240" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">SGD can get stuck in local minima, especially when the learning rate is too high.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 100" to="360 190 100" dur="3000" repeatCount="indefinite" begin="2s" />
  </section>
  <!-- Section 4: Mini-Batch Gradient Descent (MBGD) -->
  <section data-narration="Mini-Batch Gradient Descent (MBGD)">
    <rect x="10" y="290" width="370" height="50" fill="#FFFFFF" rx="10" />
    <text x="15" y="300" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">MBGD uses a small batch of examples from the training dataset to update the model parameters.</text>
    <text x="15" y="330" font-size="18" font-family="Arial" text-anchor="start" fill="#000000">MBGD is more stable than SGD and can escape local minima.</text>
    <animateTransform attributeName="transform" type="rotate" from="0 190 100" to="360 190 100" dur="3000" repeatCount="indefinite" begin="3s" />
  </section>
  <!-- Footer -->
  <rect x="10" y="340" width="400" height="20" fill="url(#footer-gradient)" opacity="0.5" />
  <text x="15" y="350" font-size="18" font-family="Arial" text-anchor="start" fill="#FFFFFF" opacity="0.9">Gradient Descent-Based Optimization Techniques</text>
</svg>