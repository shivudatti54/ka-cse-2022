<svg width="420" height="400" data-topic-id="supervised-deep-learning-architectures-letnet-5">
  <title>LetNet-5 Architecture</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7b8ea" stop-opacity="1" />
      <stop offset="100%" stop-color="#a1c9f2" stop-opacity="1" />
    </linearGradient>
  </defs>
  <body>
    <section data-narration="What is a Deep Neural Network?">
      <rect x="10" y="10" width="400" height="50" fill="url(#pastel-gradient)" rx="10" />
      <text x="20" y="25" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">What is a Deep Neural Network?</text>
    </section>
    <section data-narration="Components of LetNet-5">
      <rect x="10" y="70" width="400" height="50" fill="url(#pastel-gradient)" rx="10" />
      <text x="20" y="85" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">Components of LetNet-5</text>
      <g>
        <path d="M 20,50 L 40,80" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 60,50 L 80,80" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 100,50 L 120,80" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 140,50 L 160,80" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 180,50 L 200,80" stroke="#0097a7" stroke-width="2" fill="none" />
      </g>
      <text x="20" y="120" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">
        Convolutional Layers, Activation Functions, Pooling Layers, and Fully Connected Layers.
      </text>
    </section>
    <section data-narration="Architecture of LetNet-5">
      <rect x="10" y="170" width="400" height="50" fill="url(#pastel-gradient)" rx="10" />
      <text x="20" y="185" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">Architecture of LetNet-5</text>
      <g>
        <path d="M 20,200 L 40,300" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 60,200 L 80,300" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 100,200 L 120,300" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 140,200 L 160,300" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 180,200 L 200,300" stroke="#0097a7" stroke-width="2" fill="none" />
      </g>
      <text x="20" y="250" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">
        Convolutional Layer 1, Max Pooling Layer 1, Convolutional Layer 2, Max Pooling Layer 2, Convolutional Layer 3, Max Pooling Layer 3, and Fully Connected Layer.
      </text>
    </section>
    <section data-narration="Convolutional Layers">
      <rect x="10" y="300" width="400" height="50" fill="url(#pastel-gradient)" rx="10" />
      <text x="20" y="315" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">Convolutional Layers</text>
      <g>
        <path d="M 20,350 L 40,450" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 60,350 L 80,450" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 100,350 L 120,450" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 140,350 L 160,450" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 180,350 L 200,450" stroke="#0097a7" stroke-width="2" fill="none" />
      </g>
      <text x="20" y="420" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">
        Apply filters to input data to produce feature maps.
      </text>
    </section>
    <section data-narration="Fully Connected Layers">
      <rect x="10" y="470" width="400" height="50" fill="url(#pastel-gradient)" rx="10" />
      <text x="20" y="485" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">Fully Connected Layers</text>
      <g>
        <path d="M 20,525 L 40,625" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 60,525 L 80,625" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 100,525 L 120,625" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 140,525 L 160,625" stroke="#0097a7" stroke-width="2" fill="none" />
        <path d="M 180,525 L 200,625" stroke="#0097a7" stroke-width="2" fill="none" />
      </g>
      <text x="20" y="575" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">
        Classify output of network.
      </text>
    </section>
    <footer>
      <text x="20" y="395" fill="#2f4f7f" font-size="18" font-family="Arial, sans-serif">Supervised Deep Learning Architectures: LetNet-5</text>
    </footer>
  </body>
</svg>