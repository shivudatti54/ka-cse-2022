<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:svgo="http://svg.net/svgo">
  <title>Challenges In Training Deep Networks</title>
  <style>
    /* Indigo background */
    body {
      background: #6c5ce7;
    }

    /* Pastel colors */
    text {
      color: #f7dfc6;
    }

    /* Teal and orange accents */
    text {
      fill: #0097a7;
    }

    /* Shadow for arrows */
    .arrow {
      stroke: #0097a7;
      stroke-width: 2;
      fill: none;
    }
  </style>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7dfc6" stop-opacity="1" />
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- SVG container -->
  <g transform="translate(20, 20)">
    <!-- Title -->
    <text data-topic-id="dnn" data-narration="Introduction to Challenges in Deep Networks" x="50%" y="28" font-size="24" font-weight="bold" text-anchor="middle">
      <tspan>Challenges In Training Deep Networks</tspan>
    </text>

    <!-- Section 1: Vanishing and Exploding Gradients -->
    <rect x="50" y="100" width="320" height="100" rx="10" fill="url(#gradient)" />
    <g transform="translate(50, 105)">
      <rect x="0" y="0" width="50" height="20" rx="5" fill="#fff" />
      <text data-topic-id="dnn-vanishing" data-narration="Vanishing Gradients" x="10" y="15" font-size="14">Vanishing Gradients</text>
      <text data-topic-id="dnn-exploding" data-narration="Exploding Gradients" x="10" y="35" font-size="14">Exploding Gradients</text>
      <animate transform="rotate(360 50 105)" begin="1s" dur="2s" fill="freeze" />
    </g>

    <!-- Section 2: Deep Neural Networks and the Curse of Dimensionality -->
    <rect x="50" y="220" width="320" height="100" rx="10" fill="url(#gradient)" />
    <g transform="translate(50, 225)">
      <rect x="0" y="0" width="50" height="20" rx="5" fill="#fff" />
      <text data-topic-id="dnn-curse" data-narration="The Curse of Dimensionality" x="10" y="15" font-size="14">The Curse of Dimensionality</text>
      <text data-topic-id="dnn-overfitting-underfitting" data-narration="Overfitting and Underfitting" x="10" y="35" font-size="14">Overfitting and Underfitting</text>
      <animate transform="rotate(360 50 225)" begin="3s" dur="2s" fill="freeze" />
    </g>

    <!-- Section 3: Overfitting and Underfitting -->
    <rect x="50" y="340" width="320" height="100" rx="10" fill="url(#gradient)" />
    <g transform="translate(50, 345)">
      <rect x="0" y="0" width="50" height="20" rx="5" fill="#fff" />
      <text data-topic-id="dnn-overfitting" data-narration="Overfitting" x="10" y="15" font-size="14">Overfitting</text>
      <text data-topic-id="dnn-underfitting" data-narration="Underfitting" x="10" y="35" font-size="14">Underfitting</text>
      <animate transform="rotate(360 50 345)" begin="5s" dur="2s" fill="freeze" />
    </g>

    <!-- Section 4: Batch Normalization -->
    <rect x="50" y="470" width="320" height="100" rx="10" fill="url(#gradient)" />
    <g transform="translate(50, 475)">
      <rect x="0" y="0" width="50" height="20" rx="5" fill="#fff" />
      <text data-topic-id="dnn-batch-normalization" data-narration="Batch Normalization" x="10" y="15" font-size="14">Batch Normalization</text>
      <text data-topic-id="dnn-batch-normalization-benefits" data-narration="Benefits of Batch Normalization" x="10" y="35" font-size="14">Benefits of Batch Normalization</text>
      <animate transform="rotate(360 50 475)" begin="7s" dur="2s" fill="freeze" />
    </g>

    <!-- Section 5: Regularization Techniques -->
    <rect x="50" y="605" width="320" height="100" rx="10" fill="url(#gradient)" />
    <g transform="translate(50, 610)">
      <rect x="0" y="0" width="50" height="20" rx="5" fill="#fff" />
      <text data-topic-id="dnn-regularization" data-narration="Regularization Techniques" x="10" y="15" font-size="14">Regularization Techniques</text>
      <text data-topic-id="dnn-regularization-benefits" data-narration="Benefits of Regularization Techniques" x="10" y="35" font-size="14">Benefits of Regularization Techniques</text>
      <animate transform="rotate(360 50 610)" begin="9s" dur="2s" fill="freeze" />
    </g>

    <!-- Section 6: Transfer Learning -->
    <rect x="50" y="750" width="320" height="100" rx="10" fill="url(#gradient)" />
    <g transform="translate(50, 755)">
      <rect x="0" y="0" width="50" height="20" rx="5" fill="#fff" />
      <text data-topic-id="dnn-transfer-learning" data-narration="Transfer Learning" x="10" y="15" font-size="14">Transfer Learning</text>
      <text data-topic-id="dnn-transfer-learning-benefits" data-narration="Benefits of Transfer Learning" x="10" y="35" font-size="14">Benefits of Transfer Learning</text>
      <animate transform="rotate(360 50 755)" begin="11s" dur="2s" fill="freeze" />
    </g>

    <!-- Footer -->
    <text x="50%" y="380" font-size="14" text-anchor="middle">By: [Your Name]</text>
  </g>

  <!-- Arrow markers -->
  <g transform="translate(50, 105)">
    <line x1="50" y1="105" x2="110" y2="105" stroke="#0097a7" stroke-width="2" class="arrow" />
  </g>

  <g transform="translate(50, 225)">
    <line x1="50" y1="225" x2="110" y2="225" stroke="#0097a7" stroke-width="2" class="arrow" />
  </g>

  <g transform="translate(50, 345)">
    <line x1="50" y1="345" x2="110" y2="345" stroke="#0097a7" stroke-width="2" class="arrow" />
  </g>

  <g transform="translate(50, 475)">
    <line x1="50" y1="475" x2="110" y2="475" stroke="#0097a7" stroke-width="2" class="arrow" />
  </g>

  <g transform="translate(50, 605)">
    <line x1="50" y1="605" x2="110" y2="605" stroke="#0097a7" stroke-width="2" class="arrow" />
  </g>

  <g transform="translate(50, 755)">
    <line x1="50" y1="755" x2="110" y2="755" stroke="#0097a7" stroke-width="2" class="arrow" />
  </g>
</svg>