<svg width="420" height="400" data-topic-id="ch-42" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7a8cfa" stop-opacity="1"/>
            <stop offset="50%" stop-color="#6c5ce7" stop-opacity="1"/>
            <stop offset="100%" stop-color="#8e44ad" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <!-- Title Section -->
    <rect x="10" y="10" width="400" height="50" rx="10" fill="rgb(124, 140, 250)" data-narration="Title Section" />
    <text x="20" y="30" font-size="24" font-family="Arial" fill="#fff" text-anchor="middle">Training Supervised Deep Learning Networks</text>
    <animateTransform attributeName="transform" type="rotate" from="0 200 50" to="360 200 50" dur="2000" repeatCount="indefinite" begin="0s" />

    <!-- Key Concepts Section -->
    <rect x="10" y="70" width="400" height="50" rx="10" fill="rgb(114, 175, 216)" data-narration="Key Concepts Section" />
    <rect x="10" y="120" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Supervised Learning" />
    <rect x="10" y="150" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Training Data" />
    <rect x="10" y="180" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Model Evaluation" />
    <rect x="10" y="210" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Activation Functions" />
    <rect x="10" y="240" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Types of Activation Functions" />
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 280" dur="2000" repeatCount="indefinite" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 280" dur="2000" repeatCount="indefinite" begin="2s" />
    <animateTransform attributeName="transform" type="translate" from="0 250" to="0 280" dur="2000" repeatCount="indefinite" begin="4s" />

    <!-- Types of Activation Functions Section -->
    <rect x="10" y="50" width="400" height="50" rx="10" fill="rgb(124, 140, 250)" data-narration="Types of Activation Functions Section" />
    <rect x="10" y="110" width="100" height="50" rx="10" fill="rgb(216, 190, 140)" data-narration="Linear Activation Function" />
    <rect x="120" width="100" height="50" rx="10" fill="rgb(216, 190, 140)" data-narration="Sigmoid Activation Function" />
    <rect x="220" width="100" height="50" rx="10" fill="rgb(216, 190, 140)" data-narration="ReLU (Rectified Linear Unit) Activation Function" />
    <rect x="320" width="100" height="50" rx="10" fill="rgb(216, 190, 140)" data-narration="Other Activation Functions" />
    <animateTransform attributeName="transform" type="translate" from="100 120" to="100 150" dur="2000" repeatCount="indefinite" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="100 120" to="100 150" dur="2000" repeatCount="indefinite" begin="2s" />
    <animateTransform attributeName="transform" type="translate" from="100 120" to="100 150" dur="2000" repeatCount="indefinite" begin="4s" />

    <!-- Training Supervised Deep Learning Networks Section -->
    <rect x="10" y="290" width="400" height="50" rx="10" fill="rgb(114, 175, 216)" data-narration="Training Supervised Deep Learning Networks Section" />
    <rect x="10" y="340" width="400" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Initialization" />
    <rect x="10" y="370" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Forward Pass" />
    <rect x="10" y="400" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Loss Calculation" />
    <rect x="10" y="430" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Backward Pass" />
    <rect x="10" y="460" width="350" height="30" rx="10" fill="rgb(216, 190, 140)" data-narration="Optimization" />
    <animateTransform attributeName="transform" type="translate" from="100 350" to="100 380" dur="2000" repeatCount="indefinite" begin="0s" />
    <animateTransform attributeName="transform" type="translate" from="100 350" to="100 380" dur="2000" repeatCount="indefinite" begin="2s" />
    <animateTransform attributeName="transform" type="translate" from="100 350" to="100 380" dur="2000" repeatCount="indefinite" begin="4s" />

    <!-- Footer Section -->
    <rect x="10" y="390" width="400" height="10" rx="5" fill="rgb(124, 140, 250)" data-narration="Footer Section" />
    <text x="20" y="400" font-size="12" font-family="Arial" fill="#fff" text-anchor="middle">Thank you for learning with us!</text>
</svg>