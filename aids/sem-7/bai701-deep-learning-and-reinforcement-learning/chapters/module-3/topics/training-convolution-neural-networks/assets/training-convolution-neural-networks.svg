<svg width="420" height="400" data-topic-id="training-convolution-neural-networks">
  <title>Training Convolution Neural Networks</title>
  <rect x="0" y="0" width="420" height="400" fill="#87CEEB" rx="10"/>
  <rect x="0" y="0" width="420" height="60" fill="#3498DB" rx="10"/>
  <text x="180" y="20" font-size="24" font-family="Arial" fill="#ffffff">Training Convolution Neural Networks</text>
  <rect x="0" y="80" width="420" height="240" fill="#F7F7F7" rx="10"/>
  <section data-narration="Convolutional Layers">
    <rect x="0" y="80" width="420" height="120" fill="#F7F7F7" rx="10"/>
    <text x="20" y="100" font-size="18" font-family="Arial" fill="#000000">Convolutional Layers</text>
    <animate transform="rotate(360 20 100)" attributeName="transform" begin="0s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="120" font-size="18" font-family="Arial" fill="#000000">Convolutional Layers are the building blocks of CNNs. They apply filters to small regions of the input data, scanning the data in both horizontal and vertical directions.</text>
  </section>
  <section data-narration="Pooling Layers">
    <rect x="0" y="200" width="420" height="120" fill="#F7F7F7" rx="10"/>
    <text x="20" y="220" font-size="18" font-family="Arial" fill="#000000">Pooling Layers</text>
    <animate transform="rotate(720 20 220)" attributeName="transform" begin="2s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="240" font-size="18" font-family="Arial" fill="#000000">Pooling Layers are used to downsample the feature maps produced by convolutional layers, reducing the spatial dimensions of the data.</text>
  </section>
  <section data-narration="Activation Functions">
    <rect x="0" y="300" width="420" height="120" fill="#F7F7F7" rx="10"/>
    <text x="20" y="320" font-size="18" font-family="Arial" fill="#000000">Activation Functions</text>
    <animate transform="rotate(1080 20 320)" attributeName="transform" begin="4s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="340" font-size="18" font-family="Arial" fill="#000000">Activation functions are used to introduce non-linearity into the network, allowing the network to learn complex relationships between the input data and the output.</text>
  </section>
  <section data-narration="Filter Application and Output Calculation">
    <rect x="0" y="400" width="420" height="120" fill="#F7F7F7" rx="10"/>
    <text x="20" y="420" font-size="18" font-family="Arial" fill="#000000">Filter Application and Output Calculation</text>
    <animate transform="rotate(1296 20 420)" attributeName="transform" begin="6s" dur="2s" repeatCount="indefinite"/>
    <text x="20" y="440" font-size="18" font-family="Arial" fill="#000000">The filter is applied to a small region of the input data, scanning the data in both horizontal and vertical directions. The output of the convolutional layer is a feature map, which represents the presence of the filter in the input data.</text>
  </section>
  <rect x="0" y="0" width="420" height="60" fill="#3498DB" rx="10"/>
  <text x="180" y="20" font-size="24" font-family="Arial" fill="#ffffff">Training Convolution Neural Networks</text>
  <rect x="0" y="400" width="420" height="60" fill="#F7F7F7" rx="10"/>
  <text x="180" y="420" font-size="18" font-family="Arial" fill="#000000">Footer</text>
</svg>