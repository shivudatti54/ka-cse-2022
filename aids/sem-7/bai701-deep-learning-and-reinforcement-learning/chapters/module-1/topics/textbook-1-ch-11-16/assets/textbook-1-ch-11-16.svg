<svg width="420" height="400" data-topic-id="textbook-1-ch-11-16">
  <rect x="0" y="0" width="420" height="400" fill="#C7B8EA"/>
  <title>Understanding Deep Learning</title>
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#B2B8E6"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)"/>
  <text x="20" y="50" font-size="24" font-family="Arial" font-weight="bold" fill="#2E4053">Introduction to Deep Learning</text>
  <g transform="translate(0, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#FFFFFF">What is Deep Learning?</text>
    <text x="10" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">Deep learning is a subfield of machine learning that involves the use of artificial neural networks with multiple layers to analyze data.</text>
    <animate attributeName="opacity" begin="0s"dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(120, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#FFFFFF">Types of Deep Learning</text>
    <text x="10" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">
      There are two main types of deep learning: 
      <text x="10" y="55" font-size="16" font-family="Arial" fill="#FFFFFF">Feedforward Networks</text>
      and 
      <text x="10" y="70" font-size="16" font-family="Arial" fill="#FFFFFF">Recurrent Neural Networks (RNNs)</text>
    </text>
    <animate attributeName="opacity" begin="2s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(240, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#FFFFFF">Key Benefits of Deep Learning</text>
    <text x="10" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">
      Deep learning models can learn complex patterns in data, leading to improved accuracy.
      Deep learning models can handle large amounts of data and scale more efficiently.
      Deep learning models can be trained on a variety of data types and can be adapted to new tasks.
    </text>
    <animate attributeName="opacity" begin="4s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(360, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#FFFFFF">Limitations of Deep Learning</text>
    <text x="10" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">
      Deep learning models require a lot of computational resources to train and run.
      Deep learning models require large amounts of high-quality data to train effectively.
      Deep learning models can be difficult to interpret, making it challenging to understand why the model made a particular decision.
    </text>
    <animate attributeName="opacity" begin="6s" dur="2s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(0, 360)">
    <rect x="0" y="0" width="100" height="50" fill="#2E4053" rx="5"/>
    <text x="10" y="15" font-size="16" font-family="Arial" fill="#FFFFFF">Common Deep Learning Architectures</text>
    <text x="10" y="40" font-size="16" font-family="Arial" fill="#FFFFFF">
      Convolutional Neural Networks (CNNs) are designed for image classification, object detection, and image generation.
      Recurrent Neural Networks (RNNs) are designed for sequential data, such as speech, text, and time series data.
      Long Short-Term Memory (LSTM) Networks are a type of RNN designed to handle long-term dependencies in data.
    </text>
    <animate attributeName="opacity" begin="8s" dur="2s" repeatCount="indefinite"/>
  </g>
  <text x="20" y="420" font-size="24" font-family="Arial" font-weight="bold" fill="#2E4053">Conclusion</text>
  <rect x="0" y="440" width="420" height="20" fill="#2E4053"/>
</svg>