<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400"
     data-topic-id="How-Learning-Differs-From-Pure-Optimization" xml:lang="en">

    <!-- Title -->
    <title>How Learning Differs from Pure Optimization</title>

    <!-- Background Gradient -->
    <defs marker="url(#marker)">
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#79A3FF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#2196F3" stop-opacity="1"/>
        </linearGradient>
    </defs>

    <linearGradient id="marker" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FFC107" stop-opacity="1"/>
        <stop offset="100%" stop-color="#C51162" stop-opacity="1"/>
    </linearGradient>

    <rect fill="url(#grad)" width="100%" height="100%"/>

    <!-- Section 1: Objective Function -->
    <g transform="translate(20, 100)">
        <rect width="200" height="50" fill="#F7FCFC" rx="10" data-narration="Pure optimization uses a mathematical function to describe the problem to be optimized. The objective function is typically explicit and well-defined."/>
        <text x="50%" y="40%" font-size="18" font-family=" Arial, sans-serif" text-anchor="middle" fill="#2A3F67">Objective Function</text>
        <path stroke="#2A3F67" stroke-width="2" d="M 120,40 L 220,40 Z"/>
    </g>

    <g transform="translate(20, 150)">
        <rect width="200" height="50" fill="#F7FCFC" rx="10" data-narration="Learning uses an implicit objective function defined by the data or environment. The objective function is often not well-defined or explicit."/>
        <text x="50%" y="40%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2A3F67">Learning</text>
        <path stroke="#2A3F67" stroke-width="2" d="M 120,40 L 220,40 Z"/>
    </g>

    <!-- Section 2: Optimization Framework -->
    <g transform="translate(20, 200)">
        <rect width="200" height="50" fill="#F7FCFC" rx="10" data-narration="Pure optimization typically uses gradient-based optimization techniques, such as gradient descent. Learning involves iterative methods, including exploration and exploitation strategies."/>
        <text x="50%" y="40%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2A3F67">Optimization Framework</text>
        <path stroke="#2A3F67" stroke-width="2" d="M 120,40 L 220,40 Z"/>
    </g>

    <g transform="translate(20, 250)">
        <rect width="200" height="50" fill="#F7FCFC" rx="10" data-narration="Learning involves adapting to new data, updating internal models, and refining predictions or actions. The optimization framework is often more flexible and adaptive than pure optimization."/>
        <text x="50%" y="40%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2A3F67">Learning</text>
        <path stroke="#2A3F67" stroke-width="2" d="M 120,40 L 220,40 Z"/>
    </g>

    <!-- Section 3: Exploration-Exploitation Tradeoff -->
    <g transform="translate(20, 300)">
        <rect width="200" height="50" fill="#F7FCFC" rx="10" data-narration="Learning involves a tradeoff between exploration and exploitation. The goal is to balance the need to explore new possibilities with the need to exploit known opportunities."/>
        <text x="50%" y="40%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2A3F67">Exploration-Exploitation Tradeoff</text>
        <path stroke="#2A3F67" stroke-width="2" d="M 120,40 L 220,40 Z"/>
    </g>

    <g transform="translate(20, 350)">
        <rect width="200" height="50" fill="#F7FCFC" rx="10" data-narration="Pure optimization does not involve an exploration-exploitation tradeoff. The goal is to find the optimal solution, regardless of the process."/>
        <text x="50%" y="40%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2A3F67">Pure Optimization</text>
        <path stroke="#2A3F67" stroke-width="2" d="M 120,40 L 220,40 Z"/>
    </g>

    <!-- Footer -->
    <g transform="translate(20, 400)">
        <rect width="100%" height="50" fill="#F7FCFC" rx="10" data-narration="This diagram illustrates the key differences between learning and pure optimization."/>
        <text x="50%" y="40%" font-size="18" font-family="Arial, sans-serif" text-anchor="middle" fill="#2A3F67">Footer</text>
    </g>

    <!-- Animations -->
    <animate id="animate" dur="1000" begin="0s" fill="freeze" repeatCount="indefinite">
        <animateTransform transform="translate(0, 0)" from="0 0" to="420 0" attributeName="x" type="translate"/>
    </animate>

</svg>