<svg width="420" height="400" data-topic-id="challenges-in-neural-network-optimization">
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1" />
      <stop offset="50%" stop-color="#C5CAE9" stop-opacity="1" />
      <stop offset="100%" stop-color="#A1C9F2" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B3F54" stop-opacity="1" />
      <stop offset="50%" stop-color="#4C5154" stop-opacity="1" />
      <stop offset="100%" stop-color="#5C6783" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="1" />
      <stop offset="50%" stop-color="#FF9800" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="1" />
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="400" height="380" fill="url(#pastel-gradient)" rx="10" />
  <text x="15" y="20" fill="#333" font-size="24" font-family="Arial, sans-serif">
    Challenges in Neural Network Optimization
  </text>

  <section data-narration="What is Neural Network Optimization?">
    <rect x="10" y="60" width="400" height="100" fill="#fff" rx="10" />
    <rect x="10" y="70" width="400" height="90" fill="#fff" rx="10" />
    <animateTransform attributeName="transform" type="translateX" from="-50%" to="0%" dur="1s" begin="-0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="50%" dur="1s" begin="0s" />
    <animateTransform attributeName="transform" type="translateX" from="50%" to="0%" dur="1s" begin="0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="-50%" dur="1s" begin="1s" />
    <text x="15" y="90" fill="#333" font-size="18" font-family="Arial, sans-serif">
      Neural network optimization refers to the process of adjusting the model's parameters to minimize the loss function and maximize the accuracy of the model.
    </text>
    <text x="15" y="120" fill="#333" font-size="18" font-family="Arial, sans-serif">
      The optimization process involves finding the optimal set of parameters that result in the lowest loss value.
    </text>
  </section>

  <section data-narration="Vanishing Gradients">
    <rect x="10" y="220" width="400" height="100" fill="#fff" rx="10" />
    <rect x="10" y="230" width="400" height="70" fill="#fff" rx="10" />
    <animateTransform attributeName="transform" type="translateX" from="-50%" to="0%" dur="1s" begin="-0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="50%" dur="1s" begin="0s" />
    <animateTransform attributeName="transform" type="translateX" from="50%" to="0%" dur="1s" begin="0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="-50%" dur="1s" begin="1s" />
    <text x="15" y="260" fill="#333" font-size="18" font-family="Arial, sans-serif">
      Vanishing gradients occur when the gradients of the loss function with respect to the model's parameters become very small during backpropagation.
    </text>
    <text x="15" y="280" fill="#333" font-size="18" font-family="Arial, sans-serif">
      This can happen when the model has a large number of layers or when the activation functions are too small.
    </text>
    <text x="15" y="300" fill="#333" font-size="18" font-family="Arial, sans-serif">
      Techniques such as batch normalization, weight initialization, and using larger activation functions like Leaky ReLU or Swish can help alleviate the vanishing gradient problem.
    </text>
  </section>

  <section data-narration="Exploding Gradients">
    <rect x="10" y="330" width="400" height="100" fill="#fff" rx="10" />
    <rect x="10" y="340" width="400" height="60" fill="#fff" rx="10" />
    <animateTransform attributeName="transform" type="translateX" from="-50%" to="0%" dur="1s" begin="-0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="50%" dur="1s" begin="0s" />
    <animateTransform attributeName="transform" type="translateX" from="50%" to="0%" dur="1s" begin="0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="-50%" dur="1s" begin="1s" />
    <text x="15" y="370" fill="#333" font-size="18" font-family="Arial, sans-serif">
      Exploding gradients occur when the gradients of the loss function with respect to the model's parameters become very large during backpropagation.
    </text>
    <text x="15" y="390" fill="#333" font-size="18" font-family="Arial, sans-serif">
      This can happen when the activation functions are too large or when the model has a large number of parameters.
    </text>
    <text x="15" y="410" fill="#333" font-size="18" font-family="Arial, sans-serif">
      Techniques such as regularization, weight decay, and using smaller activation functions like sigmoid can help alleviate the exploding gradient problem.
    </text>
  </section>

  <section data-narration="Regularization">
    <rect x="10" y="440" width="400" height="100" fill="#fff" rx="10" />
    <rect x="10" y="450" width="400" height="50" fill="#fff" rx="10" />
    <animateTransform attributeName="transform" type="translateX" from="-50%" to="0%" dur="1s" begin="-0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="50%" dur="1s" begin="0s" />
    <animateTransform attributeName="transform" type="translateX" from="50%" to="0%" dur="1s" begin="0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="-50%" dur="1s" begin="1s" />
    <text x="15" y="490" fill="#333" font-size="18" font-family="Arial, sans-serif">
      Regularization is a technique used to prevent overfitting in neural networks.
    </text>
    <text x="15" y="510" fill="#333" font-size="18" font-family="Arial, sans-serif">
      It works by adding a penalty term to the loss function that encourages the model to produce simpler solutions.
    </text>
  </section>

  <section data-narration="Batch Normalization">
    <rect x="10" y="550" width="400" height="100" fill="#fff" rx="10" />
    <rect x="10" y="560" width="400" height="40" fill="#fff" rx="10" />
    <animateTransform attributeName="transform" type="translateX" from="-50%" to="0%" dur="1s" begin="-0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="50%" dur="1s" begin="0s" />
    <animateTransform attributeName="transform" type="translateX" from="50%" to="0%" dur="1s" begin="0.5s" />
    <animateTransform attributeName="transform" type="translateX" from="0%" to="-50%" dur="1s" begin="1s" />
    <text x="15" y="600" fill="#333" font-size="18" font-family="Arial, sans-serif">
      Batch normalization is a technique used to normalize the input data for each layer in a neural network.
    </text>
    <text x="15" y="620" fill="#333" font-size="18" font-family="Arial, sans-serif">
      It helps to stabilize the training process and improve the overall performance of the model.
    </text>
  </section>

  <footer>
    <text x="15" y="380" fill="#333" font-size="18" font-family="Arial, sans-serif">
      Developed by [Your Name]
    </text>
  </footer>
</svg>