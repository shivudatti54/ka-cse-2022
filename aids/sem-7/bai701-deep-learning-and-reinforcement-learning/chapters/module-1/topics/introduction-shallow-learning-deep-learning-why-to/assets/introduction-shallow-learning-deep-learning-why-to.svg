<svg width="420" height="400" data-topic-id="Introduction-to-Deep-Learning" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 400">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66CCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#33CCFF" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <title>Deep Learning Education</title>
  <rect fill="url(#gradient)" x="0" y="0" width="420" height="400"/>
  <rect x="10" y="20" width="400" height="350" fill="#FFFFFF"/>
  <g transform="translate(20, 40)">
    <rect x="0" y="0" width="100" height="50" fill="#FFFFFF" rx="5"/>
    <text x="5" y="10" font-size="16" font-family="Arial" fill="#333333">What is Deep Learning?</text>
    <text x="5" y="30" font-size="14" font-family="Arial" fill="#666666">A subset of Machine Learning inspired by the human brain</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" dur="10s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(120, 40)">
    <rect x="0" y="0" width="100" height="50" fill="#FFFFFF" rx="5"/>
    <text x="5" y="10" font-size="16" font-family="Arial" fill="#333333">Shallow Learning</text>
    <text x="5" y="30" font-size="14" font-family="Arial" fill="#666666">A single layer of nodes</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" dur="10s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(220, 40)">
    <rect x="0" y="0" width="100" height="50" fill="#FFFFFF" rx="5"/>
    <text x="5" y="10" font-size="16" font-family="Arial" fill="#333333">Deep Learning</text>
    <text x="5" y="30" font-size="14" font-family="Arial" fill="#666666">Multiple layers of nodes</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" dur="10s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(320, 40)">
    <rect x="0" y="0" width="100" height="50" fill="#FFFFFF" rx="5"/>
    <text x="5" y="10" font-size="16" font-family="Arial" fill="#333333">Why Deep Learning?</text>
    <text x="5" y="30" font-size="14" font-family="Arial" fill="#666666">Image Recognition, Speech Recognition, NLP</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" dur="10s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 150)">
    <rect x="0" y="0" width="400" height="150" fill="#FFFFFF"/>
    <text x="20" y="20" font-size="16" font-family="Arial" fill="#333333">Benefits of Deep Learning</text>
    <text x="20" y="50" font-size="14" font-family="Arial" fill="#666666">Image Recognition, Speech Recognition, NLP</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" dur="10s" repeatCount="indefinite"/>
    <animate x="100" attributeName="x" from="0" to="200" dur="10s" repeatCount="indefinite"/>
  </g>
  <g transform="translate(10, 320)">
    <rect x="0" y="0" width="400" height="50" fill="#FFFFFF"/>
    <text x="20" y="20" font-size="16" font-family="Arial" fill="#333333">Conclusion</text>
    <text x="20" y="50" font-size="14" font-family="Arial" fill="#666666">Deep Learning is a powerful tool for complex tasks</text>
    <animateTransform attributeName="transform" type="rotate" from="0 100 50" to="360 100 50" dur="10s" repeatCount="indefinite"/>
  </g>
</svg>