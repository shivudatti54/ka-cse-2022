<svg width="420" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400">
    <desc>Data: Convolutional Neural Networks (CNNs) for Text Classification</desc>
    <title>Deep Learning for Text Classification</title>
    <defs>
        <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C7B8EA" stop-opacity="1"/>
            <stop offset="50%" stop-color="#C2E6F5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#C7B8EA" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5E0EA7" stop-opacity="1"/>
            <stop offset="50%" stop-color="#3B5998" stop-opacity="1"/>
            <stop offset="100%" stop-color="#5E0EA7" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <animate id="animation" attributeName="opacity" from="1" to="0" dur="10s" begin="10s" repeatCount="indefinite"/>
    <g id="cnn-architecture">
        <rect x="20" y="20" width="100" height="20" fill="#C7B8EA" rx="5"/>
        <text x="30" y="35" text-anchor="middle" font-size="18" font-family="Arial" fill="#333">Convolutional Neural Networks (CNNs)</text>
        <rect x="20" y="60" width="100" height="20" fill="#C7B8EA" rx="5"/>
        <text x="30" y="75" text-anchor="middle" font-size="18" font-family="Arial" fill="#333">Max Pooling Layer</text>
        <rect x="20" y="100" width="100" height="20" fill="#C7B8EA" rx="5"/>
        <text x="30" y="115" text-anchor="middle" font-size="18" font-family="Arial" fill="#333">Flattening Layer</text>
        <rect x="20" y="140" width="100" height="20" fill="#C7B8EA" rx="5"/>
        <text x="30" y="155" text-anchor="middle" font-size="18" font-family="Arial" fill="#333">Dense Layer</text>
        <rect x="20" y="180" width="100" height="20" fill="#C7B8EA" rx="5"/>
        <text x="30" y="195" text-anchor="middle" font-size="18" font-family="Arial" fill="#333">Dropout Layer</text>
        <rect x="20" y="220" width="100" height="20" fill="#C7B8EA" rx="5"/>
        <text x="30" y="235" text-anchor="middle" font-size="18" font-family="Arial" fill="#333">Softmax Activation</text>
    </g>
    <g id="data-topic-id">
        <rect x="25" y="260" width="380" height="40" fill="#C2E6F5" rx="5"/>
        <text x="30" y="270" text-anchor="middle" font-size="18" font-family="Arial" fill="#333" data-topic-id="Convolutional Neural Networks (CNNs) for Text Classification">CNNs</text>
        <rect x="25" y="310" width="380" height="40" fill="#5E0EA7" rx="5"/>
        <text x="30" y="320" text-anchor="middle" font-size="18" font-family="Arial" fill="#333" data-topic-id="Convolutional Neural Networks (CNNs) for Text Classification">CNNs</text>
    </g>
    <g id="gradient-background">
        <rect x="0" y="0" width="420" height="400" fill="#F7F7F7"/>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#F7F7F7" stop-opacity="1"/>
            <stop offset="50%" stop-color="#E5E5E5" stop-opacity="1"/>
            <stop offset="100%" stop-color="#F7F7F7" stop-opacity="1"/>
        </linearGradient>
        <rect x="0" y="0" width="420" height="400" fill="url(#gradient)"/>
    </g>
    <g id="footnote">
        <rect x="20" y="380" width="380" height="20" fill="#C7B8EA" rx="5"/>
        <text x="30" y="390" text-anchor="middle" font-size="12" font-family="Arial" fill="#333">Data: Convolutional Neural Networks (CNNs) for Text Classification</text>
    </g>
</svg>