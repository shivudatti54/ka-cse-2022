<svg width="420" height="400"
data-topic-id="Framework Of Reinforcement Learning"
style="background-color: #a1c9f2; gradient: linear-gradient(to bottom, #add8e6, #b3d8e6);">
  <!-- Title -->
  <rect x="10" y="10" width="400" height="50" style="fill: #2f4f7f;"/>
  <text x="20" y="30" style="font-size: 24px; color: #ffffff;">Framework of Reinforcement Learning</text>

  <!-- Section 1: Environment -->
  <rect x="10" y="80" width="400" height="100" style="fill: #f5f5f5;"/>
  <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="4s" begin="0s"/>
  <rect x="10" y="90" width="360" height="80" style="fill: #ededed;"/>
  <text x="20" y="110" style="font-size: 18px; color: #333333;" data-narration="A mathematical representation of the external world, interactions with the agent through actions and observations, can be represented as a Markov Decision Process (MDP).">Environment</text>
  <line x1="200" y1="220" x2="200" y2="220" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="200" x2="220" y2="220" style="stroke: #666666; stroke-width: 2;"/>

  <!-- Section 2: Agent -->
  <rect x="10" y="220" width="400" height="100" style="fill: #f5f5f5;"/>
  <rect x="10" y="310" width="400" height="80" style="fill: #ededed;"/>
  <text x="20" y="330" style="font-size: 18px; color: #333333;" data-narration="The agent learns to take actions in the environment to maximize the cumulative reward. Can be a simple or complex system, such as a human or a computer program, uses policies to select actions." >Agent</text>
  <line x1="200" y1="330" x2="200" y2="330" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="310" x2="220" y2="310" style="stroke: #666666; stroke-width: 2;"/>

  <!-- Section 3: Actions -->
  <rect x="10" y="330" width="400" height="100" style="fill: #f5f5f5;"/>
  <rect x="10" y="420" width="400" height="80" style="fill: #ededed;"/>
  <text x="20" y="440" style="font-size: 18px; color: #333333;" data-narration="Choices made by the agent in the environment, can be represented as a discrete or continuous set of values." >Actions</text>
  <line x1="200" y1="440" x2="200" y2="440" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="420" x2="220" y2="420" style="stroke: #666666; stroke-width: 2;"/>

  <!-- Section 4: Observations -->
  <rect x="10" y="430" width="400" height="100" style="fill: #f5f5f5;"/>
  <rect x="10" y="520" width="400" height="80" style="fill: #ededed;"/>
  <text x="20" y="540" style="font-size: 18px; color: #333333;" data-narration="Input data received by the agent from the environment, can be represented as a discrete or continuous set of values." >Observations</text>
  <line x1="200" y1="540" x2="200" y2="540" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="520" x2="220" y2="520" style="stroke: #666666; stroke-width: 2;"/>

  <!-- Section 5: Reward -->
  <rect x="10" y="530" width="400" height="100" style="fill: #f5f5f5;"/>
  <rect x="10" y="620" width="400" height="80" style="fill: #ededed;"/>
  <text x="20" y="640" style="font-size: 18px; color: #333333;" data-narration="Feedback received by the agent from the environment, can be represented as a scalar value." >Reward</text>
  <line x1="200" y1="640" x2="200" y2="640" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="620" x2="220" y2="620" style="stroke: #666666; stroke-width: 2;"/>

  <!-- Section 6: Policy -->
  <rect x="10" y="630" width="400" height="100" style="fill: #f5f5f5;"/>
  <rect x="10" y="720" width="400" height="80" style="fill: #ededed;"/>
  <text x="20" y="740" style="font-size: 18px; color: #333333;" data-narration="Mapping from states to actions, used by the agent to select actions in the environment." >Policy</text>
  <line x1="200" y1="740" x2="200" y2="740" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="720" x2="220" y2="720" style="stroke: #666666; stroke-width: 2;"/>

  <!-- Section 7: Value Function -->
  <rect x="10" y="730" width="400" height="100" style="fill: #f5f5f5;"/>
  <rect x="10" y="820" width="400" height="80" style="fill: #ededed;"/>
  <text x="20" y="840" style="font-size: 18px; color: #333333;" data-narration="Estimation of the expected return for a given state-action pair, used to evaluate the desirability of actions." >Value Function</text>
  <line x1="200" y1="840" x2="200" y2="840" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="820" x2="220" y2="820" style="stroke: #666666; stroke-width: 2;"/>

  <!-- RL Algorithm Types -->
  <rect x="10" y="910" width="400" height="100" style="fill: #f5f5f5;"/>
  <text x="20" y="930" style="font-size: 18px; color: #333333;" data-narration="Model-based RL uses a model of the environment to predict the outcome of actions, typically used in complex environments with high-dimensional state spaces." >Model-Based RL</text>
  <line x1="200" y1="930" x2="200" y2="930" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="910" x2="220" y2="910" style="stroke: #666666; stroke-width: 2;"/>

  <text x="20" y="1040" style="font-size: 18px; color: #333333;" data-narration="Model-free RL learns directly from trial and error, without a model of the environment, typically used in simpler environments with low-dimensional state spaces." >Model-Free RL</text>
  <line x1="200" y1="1040" x2="200" y2="1040" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="1020" x2="220" y2="1020" style="stroke: #666666; stroke-width: 2;"/>

  <!-- Common RL Frameworks -->
  <rect x="10" y="1130" width="400" height="100" style="fill: #f5f5f5;"/>
  <text x="20" y="1150" style="font-size: 18px; color: #333333;" data-narration="Markov Decision Process (MDP) is a mathematical representation of the environment and agent interactions, characterized by states, actions, transitions." >Markov Decision Process (MDP)</text>
  <line x1="200" y1="1150" x2="200" y2="1150" style="stroke: #666666; stroke-width: 2;"/>
  <line x1="200" y1="1130" x2="220" y2="1130" style="stroke: #666666; stroke-width: 2;"/>

</svg>