<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" data-topic-id="design-and-implement-a-deep-learning-network-for-forecasting-time-series-data">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="pastel-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9E4CA"/>
      <stop offset="100%" stop-color="#B2FFFC"/>
    </linearGradient>
  </defs>
  <rect fill="url(#pastel-gradient)" width="420" height="400" rx="10"/>
  
  <!-- Title Section -->
  <section data-narration="Introduction">
    <rect x="10" y="10" width="400" height="50" fill="#2F4F7F" rx="10"/>
    <text x="15" y="30" font-size="24" font-family="Arial" fill="#FFFFFF" text-anchor="start">Design and Implement a Deep Learning Network for Forecasting Time Series Data</text>
    <animate transform="rotate(45 15 30)" begin="0s" dur="2s" repeat="forever"/>
  </section>
  
  <!-- Types of Time Series Data Section -->
  <section data-narration="Time Series Data and Forecasting">
    <rect x="10" y="70" width="400" height="150" fill="#3498DB" rx="10"/>
    <rect x="10" y="220" width="200" height="50" fill="#F1C40F" rx="10"/>
    <rect x="210" y="220" width="180" height="50" fill="#F1C40F" rx="10"/>
    <rect x="10" y="270" width="200" height="50" fill="#F1C40F" rx="10"/>
    <text x="15" y="90" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Simple Time Series</text>
    <text x="225" y="90" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Multi-Variable Time Series</text>
    <text x="15" y="250" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Spatially Correlated Time Series</text>
    <animate transform="translateX(-20 0)" begin="0.5s" dur="1s" repeat="forever"/>
  </section>
  
  <!-- Deep Learning Networks for Time Series Forecasting Section -->
  <section data-narration="Deep Learning Networks for Time Series Forecasting">
    <rect x="10" y="330" width="400" height="150" fill="#2ECC71" rx="10"/>
    <rect x="10" y="480" width="200" height="50" fill="#F1C40F" rx="10"/>
    <rect x="210" y="480" width="180" height="50" fill="#F1C40F" rx="10"/>
    <rect x="10" y="530" width="200" height="50" fill="#F1C40F" rx="10"/>
    <rect x="15" y="390" width="100" height="20" fill="#F1C40F" rx="10"/>
    <rect x="225" y="390" width="100" height="20" fill="#F1C40F" rx="10"/>
    <rect x="15" y="440" width="100" height="20" fill="#F1C40F" rx="10"/>
    <rect x="225" y="440" width="100" height="20" fill="#F1C40F" rx="10"/>
    <text x="15" y="410" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Recurrent Neural Networks (RNNs)</text>
    <text x="225" y="410" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Long Short-Term Memory (LSTM) Networks</text>
    <text x="15" y="460" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Gated Recurrent Unit (GRU) Networks</text>
    <animate transform="translateX(-20 0)" begin="1s" dur="1s" repeat="forever"/>
  </section>
  
  <!-- LSTM Networks Section -->
  <section data-narration="Long Short-Term Memory (LSTM) Networks">
    <rect x="10" y="600" width="400" height="100" fill="#3498DB" rx="10"/>
    <rect x="10" y="700" width="200" height="50" fill="#F1C40F" rx="10"/>
    <rect x="210" y="700" width="180" height="50" fill="#F1C40F" rx="10"/>
    <rect x="10" y="750" width="200" height="50" fill="#F1C40F" rx="10"/>
    <text x="15" y="670" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Memory Cells</text>
    <text x="225" y="670" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Long-Term Dependencies</text>
    <text x="15" y="720" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Efficient Information Flow</text>
    <animate transform="translateX(-20 0)" begin="1.5s" dur="1s" repeat="forever"/>
  </section>
  
  <!-- Footer Section -->
  <footer>
    <rect x="10" y="870" width="400" height="50" fill="#2F4F7F" rx="10"/>
    <text x="15" y="890" font-size="18" font-family="Arial" fill="#FFFFFF" text-anchor="start">Copyright 2023</text>
  </footer>
</svg>