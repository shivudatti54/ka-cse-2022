<svg width="420" height="400" data-topic-id="environment-custom-grid-easily-implemented-in-python"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 420 400" style="background-color: #add8e6; gradient: linear-gradient(to bottom, #add8e6, #6495ed);">
  <!-- Title Section -->
  <rect x="10" y="10" width="400" height="30" fill="#6495ed" rx="5" />
  <text x="20" y="25" font-size="24" font-family="Arial" fill="#ffffff" text-anchor="middle">
    Environment Custom Grid Easily Implemented In Python
  </text>

  <!-- Section 1: Introduction -->
  <section data-narration="Introduction">
    <rect x="10" y="60" width="400" height="120" fill="#f5f5f5" rx="5" />
    <text x="20" y="80" font-size="18" font-family="Arial" fill="#000000" text-anchor="middle">
      In reinforcement learning, an environment is a crucial component that interacts with the agent and provides feedback on its actions.
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2000" begin="0s" fill="freeze" />
  </section>

  <!-- Section 2: Characteristics of a Custom Grid Environment -->
  <section data-narration="Characteristics of a Custom Grid Environment">
    <rect x="10" y="190" width="400" height="120" fill="#f5f5f5" rx="5" />
    <text x="20" y="210" font-size="18" font-family="Arial" fill="#000000" text-anchor="middle">
      A custom grid environment is a discrete environment where the agent navigates through a grid of cells.
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2000" begin="2s" fill="freeze" />
  </section>

  <!-- Section 3: Discrete Space -->
  <section data-narration="Discrete Space">
    <rect x="10" y="320" width="400" height="120" fill="#f5f5f5" rx="5" />
    <text x="20" y="340" font-size="18" font-family="Arial" fill="#000000" text-anchor="middle">
      The environment is divided into a finite number of cells (or states).
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2000" begin="4s" fill="freeze" />
  </section>

  <!-- Section 4: Discrete Actions -->
  <section data-narration="Discrete Actions">
    <rect x="10" y="360" width="400" height="120" fill="#f5f5f5" rx="5" />
    <text x="20" y="380" font-size="18" font-family="Arial" fill="#000000" text-anchor="middle">
      The agent can take a fixed number of discrete actions (e.g., up, down, left, right).
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2000" begin="6s" fill="freeze" />
  </section>

  <!-- Section 5: Reward Function -->
  <section data-narration="Reward Function">
    <rect x="10" y="400" width="400" height="120" fill="#f5f5f5" rx="5" />
    <text x="20" y="420" font-size="18" font-family="Arial" fill="#000000" text-anchor="middle">
      The environment has a reward function that assigns a numerical value to each state-action pair.
    </text>
    <animate xmlns="http://www.w3.org/2000/svg" attributeName="opacity" from="1" to="0" dur="2000" begin="8s" fill="freeze" />
  </section>

  <!-- Footer Section -->
  <rect x="10" y="460" width="400" height="30" fill="#6495ed" rx="5" />
  <text x="20" y="475" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">
    Created by [Your Name]
  </text>
</svg>