<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Empirical estimation models help predict software project effort, cost, and time using historical data. Key models include COCOMO, Function Points, and Putnam Model.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Empirical Estimation Models</text>
  </g>
  
  <g class="step" id="step1" data-narration="Basic COCOMO uses formulas: Effort equals a times KLOC to the power b. Development Time equals c times Effort to the power d. Coefficients vary by project mode.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Basic COCOMO</text>
    <text x="70" y="95" font-family="Arial" font-size="9" fill="#333">Effort = a × (KLOC)^b | Time = c × (Effort)^d</text>
    <rect x="70" y="105" width="180" height="25" rx="3" fill="#c8e6c9"/>
    <text x="80" y="118" font-family="Arial" font-size="8" fill="#2e7d32">Organic: a=2.4, b=1.05</text>
    <rect x="260" y="105" width="180" height="25" rx="3" fill="#c8e6c9"/>
    <text x="270" y="118" font-family="Arial" font-size="8" fill="#2e7d32">Semi-detached: a=3.0, b=1.12</text>
    <rect x="450" y="105" width="180" height="25" rx="3" fill="#c8e6c9"/>
    <text x="460" y="118" font-family="Arial" font-size="8" fill="#2e7d32">Embedded: a=3.6, b=1.20</text>
  </g>
  
  <g class="step" id="step2" data-narration="Intermediate COCOMO adds 15 cost drivers that multiply the base effort. These drivers cover product attributes, computer attributes, personnel attributes, and project attributes.">
    <rect x="50" y="146" width="700" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Intermediate COCOMO</text>
    <text x="70" y="183" font-family="Arial" font-size="9" fill="#333">Effort = [a × (KLOC)^b] × EAF | EAF = Product of 15 Cost Drivers</text>
    <rect x="70" y="195" width="150" height="22" rx="3" fill="#ffe0b2"/>
    <text x="78" y="208" font-family="Arial" font-size="8" fill="#e65100">Product: reliability,</text>
    <rect x="230" y="195" width="150" height="22" rx="3" fill="#ffe0b2"/>
    <text x="238" y="208" font-family="Arial" font-size="8" fill="#e65100">Computer: memory,</text>
    <rect x="390" y="195" width="150" height="22" rx="3" fill="#ffe0b2"/>
    <text x="398" y="208" font-family="Arial" font-size="8" fill="#e65100">Personnel: capability,</text>
    <rect x="550" y="195" width="150" height="22" rx="3" fill="#ffe0b2"/>
    <text x="558" y="208" font-family="Arial" font-size="8" fill="#e65100">Project: tools, schedule</text>
  </g>
  
  <g class="step" id="step3" data-narration="COCOMO II updates the original for modern development. It has three models: Application Composition for RAD, Early Design for architecture, and Post-Architecture for detailed estimation.">
    <rect x="50" y="234" width="700" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">COCOMO II</text>
    <text x="70" y="271" font-family="Arial" font-size="9" fill="#333">Modern update with Scale Factors and Effort Multipliers</text>
    <rect x="70" y="283" width="200" height="22" rx="3" fill="#e1bee7"/>
    <text x="80" y="296" font-family="Arial" font-size="8" fill="#6a1b9a">Application Composition</text>
    <rect x="280" y="283" width="200" height="22" rx="3" fill="#e1bee7"/>
    <text x="290" y="296" font-family="Arial" font-size="8" fill="#6a1b9a">Early Design Model</text>
    <rect x="490" y="283" width="200" height="22" rx="3" fill="#e1bee7"/>
    <text x="500" y="296" font-family="Arial" font-size="8" fill="#6a1b9a">Post-Architecture Model</text>
  </g>
  
  <g class="step" id="step4" data-narration="Function Points measure software size from user perspective, independent of language. Five components: external inputs, outputs, inquiries, internal files, and interface files.">
    <rect x="50" y="322" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Function Point Analysis</text>
    <text x="70" y="359" font-family="Arial" font-size="9" fill="#333">AFP = UAF × VAF | VAF = 0.65 + 0.01 × Σ(Fi)</text>
    <rect x="70" y="370" width="125" height="22" rx="3" fill="#bbdefb"/>
    <text x="75" y="383" font-family="Arial" font-size="7" fill="#0d47a1">External Inputs</text>
    <rect x="205" y="370" width="125" height="22" rx="3" fill="#bbdefb"/>
    <text x="210" y="383" font-family="Arial" font-size="7" fill="#0d47a1">External Outputs</text>
    <rect x="340" y="370" width="125" height="22" rx="3" fill="#bbdefb"/>
    <text x="345" y="383" font-family="Arial" font-size="7" fill="#0d47a1">External Inquiries</text>
    <rect x="475" y="370" width="125" height="22" rx="3" fill="#bbdefb"/>
    <text x="480" y="383" font-family="Arial" font-size="7" fill="#0d47a1">Internal Logical Files</text>
    <rect x="610" y="370" width="130" height="22" rx="3" fill="#bbdefb"/>
    <text x="615" y="383" font-family="Arial" font-size="7" fill="#0d47a1">External Interface Files</text>
  </g>
  
  <g class="step" id="step5" data-narration="Putnam Model relates effort to development time: effort equals size cubed divided by time cubed times productivity squared. The Wideband Delphi technique uses expert consensus.">
    <rect x="50" y="410" width="700" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Putnam Model &amp; Delphi</text>
    <text x="70" y="447" font-family="Arial" font-size="9" fill="#333">Putnam: E = L³ / (t³ × p²) where p = 1000 to 2000</text>
    <rect x="70" y="458" width="320" height="24" rx="3" fill="#ffcdd2"/>
    <text x="80" y="472" font-family="Arial" font-size="8" fill="#b71c1c">Effort inversely proportional to cube of development time</text>
    <rect x="400" y="458" width="320" height="24" rx="3" fill="#ffcdd2"/>
    <text x="410" y="472" font-family="Arial" font-size="8" fill="#b71c1c">Wideband Delphi: Expert estimates → Discussion → Consensus</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: 100 KLOC embedded system yields 570 person-months effort and 20.6 months development time. For 50 KLOC semi-detached with cost drivers, adjusted effort is 319 PM.">
    <rect x="50" y="498" width="700" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example Calculations</text>
    <rect x="70" y="528" width="330" height="52" rx="3" fill="#c8e6c9"/>
    <text x="80" y="541" font-family="Arial" font-size="8" fill="#1b5e20">100 KLOC Embedded:</text>
    <text x="80" y="554" font-family="Arial" font-size="8" fill="#1b5e20">Effort = 3.6 × 100^1.20 = 570.56 PM</text>
    <text x="80" y="567" font-family="Arial" font-size="8" fill="#1b5e20">Time = 2.5 × 570.56^0.32 = 20.58 months</text>
    <rect x="410" y="528" width="330" height="52" rx="3" fill="#c8e6c9"/>
    <text x="420" y="541" font-family="Arial" font-size="8" fill="#1b5e20">50 KLOC Semi-detached + Cost Drivers:</text>
    <text x="420" y="554" font-family="Arial" font-size="8" fill="#1b5e20">Base = 220.32 PM | EAF = 1.449</text>
    <text x="420" y="567" font-family="Arial" font-size="8" fill="#1b5e20">Adjusted = 220.32 × 1.449 = 319.24 PM</text>
  </g>
</svg>