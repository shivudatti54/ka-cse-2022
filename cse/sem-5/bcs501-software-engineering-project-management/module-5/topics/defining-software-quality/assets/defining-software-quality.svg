<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers software quality definitions, models like McCall's and ISO/IEC 25010, quality assurance versus control, and metrics like defect density.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Defining Software Quality</text>
  </g>
  
  <g class="step" id="step1" data-narration="Software quality is the degree to which software satisfies requirements and meets user expectations, varying by context and stakeholder priorities.">
    <rect x="20" y="60" width="760" height="75" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Software Quality?</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">• Degree to which software satisfies specified requirements</text>
    <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">• Meets implicit and explicit user expectations</text>
    <text x="40" y="130" font-family="Arial" font-size="10" fill="#333">• Multi-dimensional: functionality, reliability, usability</text>
  </g>
  
  <g class="step" id="step2" data-narration="McCall's Model provides 11 quality factors in three categories: Product Operation, Revision, and Transition factors for systematic quality assessment.">
    <rect x="20" y="145" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="165" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">McCall's Quality Model (11 Factors)</text>
    <rect x="40" y="180" width="230" height="35" fill="#a5d6a7" rx="3"/>
    <text x="155" y="195" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Product Operation</text>
    <text x="155" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Correctness, Reliability, Efficiency</text>
    <rect x="285" y="180" width="230" height="35" fill="#a5d6a7" rx="3"/>
    <text x="400" y="195" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Product Revision</text>
    <text x="400" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Maintainability, Flexibility, Testability</text>
    <rect x="530" y="180" width="230" height="35" fill="#a5d6a7" rx="3"/>
    <text x="645" y="195" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Product Transition</text>
    <text x="645" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Portability, Reusability</text>
  </g>
  
  <g class="step" id="step3" data-narration="ISO/IEC 25010 defines eight quality characteristics: Functional Suitability, Performance Efficiency, Compatibility, Usability, Reliability, Security, Maintainability, and Portability.">
    <rect x="20" y="235" width="760" height="115" fill="#f3e5f5" rx="5"/>
    <text x="40" y="255" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">ISO/IEC 25010 Standard (8 Characteristics)</text>
    <rect x="40" y="268" width="110" height="35" fill="#ce93d8" rx="3"/>
    <text x="95" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Functional</text>
    <text x="95" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Suitability</text>
    <rect x="160" y="268" width="110" height="35" fill="#ce93d8" rx="3"/>
    <text x="215" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Performance</text>
    <text x="215" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Efficiency</text>
    <rect x="280" y="268" width="110" height="35" fill="#ce93d8" rx="3"/>
    <text x="335" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Compatibility</text>
    <rect x="400" y="268" width="110" height="35" fill="#ce93d8" rx="3"/>
    <text x="455" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Usability</text>
    <rect x="520" y="268" width="110" height="35" fill="#ce93d8" rx="3"/>
    <text x="575" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Reliability</text>
    <rect x="640" y="268" width="130" height="35" fill="#ce93d8" rx="3"/>
    <text x="705" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Security</text>
    <rect x="40" y="308" width="110" height="35" fill="#ce93d8" rx="3"/>
    <text x="95" y="322" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Maintainability</text>
    <rect x="160" y="308" width="110" height="35" fill="#ce93d8" rx="3"/>
    <text x="215" y="322" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Portability</text>
  </g>
  
  <g class="step" id="step4" data-narration="Quality Assurance is proactive and process-oriented, preventing defects through process improvement. Quality Control is reactive and product-oriented, identifying defects through testing.">
    <rect x="20" y="360" width="760" height="75" fill="#fff3e0" rx="5"/>
    <text x="40" y="380" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">QA vs QC: Key Differences</text>
    <rect x="40" y="395" width="340" height="32" fill="#ffe0b2" rx="3"/>
    <text x="210" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">QA: Proactive • Process-oriented • Prevents</text>
    <rect x="400" y="395" width="340" height="32" fill="#ffcdd2" rx="3"/>
    <text x="570" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">QC: Reactive • Product-oriented • Identifies</text>
  </g>
  
  <g class="step" id="step5" data-narration="Defect Density = Total Defects / KLOC. Below 1.0 is excellent, 1.0-2.0 good, 2.0-5.0 average. Quality attributes vary: developers prioritize maintainability, users want functionality, business focuses on ROI.">
    <rect x="20" y="445" width="760" height="80" fill="#e1f5fe" rx="5"/>
    <text x="40" y="465" font-family="Arial" font-size="12" font-weight="bold" fill="#0277bd">Defect Density & Stakeholders</text>
    <rect x="40" y="478" width="355" height="40" fill="#b3e5fc" rx="3"/>
    <text x="217" y="492" text-anchor="middle" font-family="Arial" font-size="9" fill="#01579b">Defect Density = Total Defects / KLOC</text>
    <text x="217" y="508" text-anchor="middle" font-family="Arial" font-size="9" fill="#01579b">&lt;1.0 Excellent | 1-2 Good | 2-5 Average</text>
    <rect x="405" y="478" width="355" height="40" fill="#f8bbd0" rx="3"/>
    <text x="582" y="492" text-anchor="middle" font-family="Arial" font-size="9" fill="#880e4f">Dev: Maintainability | Users: Functionality</text>
    <text x="582" y="508" text-anchor="middle" font-family="Arial" font-size="9" fill="#880e4f">Business: ROI, Time-to-market</text>
  </g>
</svg>