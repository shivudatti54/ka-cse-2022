<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <rect width="800" height="1700" fill="url(#bgGrad)"/>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
  </style>
  
  <text x="400" y="35" font-family="Arial" font-size="20" font-weight="bold" fill="#1565c0" text-anchor="middle">The Place of Software Quality in Project Planning</text>
  <line x1="50" y1="48" x2="750" y2="48" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,5"/>

  <g class="step" id="step0" data-narration="Quality must be integrated from project start, not added later. Let's explore why this matters.">
    <rect x="50" y="60" width="700" height="75" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="82" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">SECTION 1: Introduction</text>
    <text x="400" y="105" font-family="Arial" font-size="11" fill="#e3f2fd" text-anchor="middle">Software quality is a fundamental aspect integrated into every phase of project planning</text>
  </g>

  <g class="step" id="step1" data-narration="Organizations treating quality as afterthought face costly rework, delayed deliveries, and damaged reputation.">
    <rect x="50" y="150" width="340" height="80" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="150" width="340" height="20" rx="8" fill="#ffebee"/>
    <text x="70" y="165" font-family="Arial" font-size="11" fill="#c62828" font-weight="bold">Consequences of Poor Quality</text>
    <text x="70" y="185" font-family="Arial" font-size="10" fill="#333">- Costly rework</text>
    <text x="70" y="200" font-family="Arial" font-size="10" fill="#333">- Customer dissatisfaction</text>
    <text x="70" y="215" font-family="Arial" font-size="10" fill="#333">- Delayed deliveries</text>
    
    <rect x="410" y="150" width="340" height="80" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="410" y="150" width="340" height="20" rx="8" fill="#e8f5e9"/>
    <text x="430" y="165" font-family="Arial" font-size="11" fill="#2e7d32" font-weight="bold">Benefits of Quality Planning</text>
    <text x="430" y="185" font-family="Arial" font-size="10" fill="#333">- Meets user expectations</text>
    <text x="430" y="200" font-family="Arial" font-size="10" fill="#333">- Meets regulatory requirements</text>
    <text x="430" y="215" font-family="Arial" font-size="10" fill="#333">- Lower lifecycle costs</text>
  </g>

  <g class="step" id="step2" data-narration="Software quality is the degree to which software meets requirements. QA prevents defects; QC detects them.">
    <rect x="50" y="245" width="700" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="245" width="230" height="22" rx="8" fill="url(#blueGrad)"/>
    <text x="165" y="262" font-family="Arial" font-size="11" fill="white" font-weight="bold">Software Quality</text>
    <text x="165" y="285" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Degree to which software</text>
    <text x="165" y="300" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">meets requirements</text>
    
    <rect x="285" y="245" width="230" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="285" y="245" width="230" height="22" rx="8" fill="url(#greenGrad)"/>
    <text x="400" y="262" font-family="Arial" font-size="11" fill="white" font-weight="bold">QA - Prevention</text>
    <text x="400" y="285" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Planned systematic</text>
    <text x="400" y="300" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">activities to prevent</text>
    <text x="400" y="315" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">defects in processes</text>
    
    <rect x="520" y="245" width="230" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="520" y="245" width="230" height="22" rx="8" fill="url(#orangeGrad)"/>
    <text x="635" y="262" font-family="Arial" font-size="11" fill="white" font-weight="bold">QC - Detection</text>
    <text x="635" y="285" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Testing and inspection</text>
    <text x="635" y="300" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">activities that identify</text>
    <text x="635" y="315" font-family="Arial" font-size="9" fill="#f57c00" text-anchor="middle">defects in product</text>
  </g>

  <g class="step" id="step3" data-narration="The cost of quality has four categories: prevention, appraisal, internal failure, and external failure costs.">
    <rect x="50" y="350" width="700" height="85" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="400" y="372" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">SECTION 2: Cost of Quality</text>
    <text x="400" y="395" font-family="Arial" font-size="11" fill="#f3e5f5" text-anchor="middle">Four types of quality costs that organizations must budget for</text>
  </g>

  <g class="step" id="step4" data-narration="Prevention costs include training and process definition. Appraisal costs cover testing and inspection activities.">
    <rect x="50" y="450" width="340" height="85" rx="8" fill="#e8f5e9" filter="url(#shadow)"/>
    <rect x="50" y="450" width="340" height="20" rx="8" fill="#388e3c"/>
    <text x="70" y="465" font-family="Arial" font-size="11" fill="white" font-weight="bold">Prevention Costs</text>
    <text x="70" y="488" font-family="Arial" font-size="10" fill="#333">- Training and education</text>
    <text x="70" y="505" font-family="Arial" font-size="10" fill="#333">- Quality planning</text>
    <text x="220" y="505" font-family="Arial" font-size="10" fill="#333">- Process definition</text>
    
    <rect x="410" y="450" width="340" height="85" rx="8" fill="#fff3e0" filter="url(#shadow)"/>
    <rect x="410" y="450" width="340" height="20" rx="8" fill="#ff9800"/>
    <text x="430" y="465" font-family="Arial" font-size="11" fill="white" font-weight="bold">Appraisal Costs</text>
    <text x="430" y="488" font-family="Arial" font-size="10" fill="#333">- Testing activities</text>
    <text x="430" y="505" font-family="Arial" font-size="10" fill="#333">- Inspection and reviews</text>
    <text x="580" y="505" font-family="Arial" font-size="10" fill="#333">- Quality audits</text>
  </g>

  <g class="step" id="step5" data-narration="Internal failure costs occur before delivery. External failure costs happen after delivery, damaging reputation.">
    <rect x="50" y="550" width="340" height="85" rx="8" fill="#ffebee" filter="url(#shadow)"/>
    <rect x="50" y="550" width="340" height="20" rx="8" fill="#f44336"/>
    <text x="70" y="565" font-family="Arial" font-size="11" fill="white" font-weight="bold">Internal Failure Costs</text>
    <text x="70" y="588" font-family="Arial" font-size="10" fill="#333">- Defects before delivery</text>
    <text x="70" y="605" font-family="Arial" font-size="10" fill="#333">- Rework and repair</text>
    <text x="220" y="605" font-family="Arial" font-size="10" fill="#333">- Retesting</text>
    
    <rect x="410" y="550" width="340" height="85" rx="8" fill="#fce4ec" filter="url(#shadow)"/>
    <rect x="410" y="550" width="340" height="20" rx="8" fill="#c62828"/>
    <text x="430" y="565" font-family="Arial" font-size="11" fill="white" font-weight="bold">External Failure Costs</text>
    <text x="430" y="588" font-family="Arial" font-size="10" fill="#333">- Defects after delivery</text>
    <text x="430" y="605" font-family="Arial" font-size="10" fill="#333">- Customer support costs</text>
    <text x="580" y="605" font-family="Arial" font-size="10" fill="#333">- Reputation damage</text>
  </g>

  <g class="step" id="step6" data-narration="Defect costs increase exponentially from requirements to deployment. Early detection saves massive costs.">
    <rect x="50" y="650" width="700" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="400" y="672" font-family="Arial" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">The Exponential Cost Curve</text>
    <text x="400" y="690" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Finding defects early is much cheaper than fixing them later</text>
    
    <line x1="90" y1="735" x2="680" y2="735" stroke="#333" stroke-width="1"/>
    <line x1="90" y1="670" x2="90" y2="735" stroke="#333" stroke-width="1"/>
    <text x="95" y="668" font-family="Arial" font-size="8" fill="#333">Cost</text>
    <text x="670" y="748" font-family="Arial" font-size="8" fill="#333">Development Phase</text>
    
    <rect x="100" y="715" width="80" height="15" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="140" y="726" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">Requirements</text>
    
    <rect x="190" y="705" width="80" height="15" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="230" y="716" font-family="Arial" font-size="8" fill="#f57c00" text-anchor="middle">Design</text>
    
    <rect x="280" y="695" width="80" height="15" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="320" y="706" font-family="Arial" font-size="8" fill="#c62828" text-anchor="middle">Coding</text>
    
    <rect x="370" y="685" width="80" height="15" rx="3" fill="#ffcdd2" stroke="#c62828" stroke-width="1"/>
    <text x="410" y="696" font-family="Arial" font-size="8" fill="#b71c1c" text-anchor="middle">Testing</text>
    
    <rect x="460" y="675" width="80" height="15" rx="3" fill="#ef9a9a" stroke="#b71c1c" stroke-width="1"/>
    <text x="500" y="686" font-family="Arial" font-size="8" fill="#b71c1c" text-anchor="middle">Deployment</text>
    
    <rect x="550" y="665" width="80" height="15" rx="3" fill="#e57373" stroke="#b71c1c" stroke-width="1"/>
    <text x="590" y="676" font-family="Arial" font-size="8" fill="#b71c1c" text-anchor="middle">Post-Launch</text>
    
    <polygon points="100,730 200,730 180,700" fill="#1976d2" opacity="0.6"/>
  </g>
</svg>