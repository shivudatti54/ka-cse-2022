<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Business Case in Software Project Management - A formal document that justifies initiating a project by demonstrating its business value and expected returns.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Business Case in Software Project Management</text>
  </g>
  
  <g class="step" id="step1" data-narration="A business case is a formal document that provides justification for a project, presenting rationale, benefits, costs, risks, and alternatives.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">What is a Business Case?</text>
    <text x="40" y="92" font-family="Arial" font-size="10" fill="#333">A formal, structured document providing justification for initiating a software project by presenting:</text>
    <rect x="40" y="100" width="150" height="30" rx="3" fill="#c8e6c9"/>
    <text x="50" y="112" font-family="Arial" font-size="9" fill="#2e7d32">• Rationale</text>
    <text x="50" y="122" font-family="Arial" font-size="9" fill="#2e7d32">• Expected Benefits</text>
    <rect x="200" y="100" width="150" height="30" rx="3" fill="#c8e6c9"/>
    <text x="210" y="112" font-family="Arial" font-size="9" fill="#2e7d32">• Costs</text>
    <text x="210" y="122" font-family="Arial" font-size="9" fill="#2e7d32">• Risks</text>
    <rect x="360" y="100" width="150" height="30" rx="3" fill="#c8e6c9"/>
    <text x="370" y="112" font-family="Arial" font-size="9" fill="#2e7d32">• Alternatives</text>
    <text x="370" y="122" font-family="Arial" font-size="9" fill="#2e7d32">• Recommendation</text>
    <text x="550" y="115" font-family="Arial" font-size="10" fill="#666" font-style="italic">Bridges business needs with technical solutions</text>
  </g>
  
  <g class="step" id="step2" data-narration="Key components include Executive Summary, Background and Business Need, SMART Objectives, and Options Analysis with multiple alternatives for decision making.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Key Components of a Business Case</text>
    <rect x="40" y="175" width="85" height="42" rx="3" fill="#ffe0b2"/>
    <text x="45" y="187" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">1. Executive</text>
    <text x="45" y="197" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">Summary</text>
    <text x="45" y="208" font-family="Arial" font-size="7" fill="#666">Concise overview</text>
    <rect x="130" y="175" width="85" height="42" rx="3" fill="#ffe0b2"/>
    <text x="135" y="187" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">2. Background</text>
    <text x="135" y="197" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">&amp; Business Need</text>
    <text x="135" y="208" font-family="Arial" font-size="7" fill="#666">Why now?</text>
    <rect x="220" y="175" width="85" height="42" rx="3" fill="#ffe0b2"/>
    <text x="225" y="187" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">3. Objectives</text>
    <text x="225" y="197" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">(SMART)</text>
    <text x="225" y="208" font-family="Arial" font-size="7" fill="#666">Measurable goals</text>
    <rect x="310" y="175" width="85" height="42" rx="3" fill="#ffe0b2"/>
    <text x="315" y="187" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">4. Options</text>
    <text x="315" y="197" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">Analysis</text>
    <text x="315" y="208" font-family="Arial" font-size="7" fill="#666">Compare alternatives</text>
    <rect x="400" y="175" width="85" height="42" rx="3" fill="#ffe0b2"/>
    <text x="405" y="187" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">5. Benefits</text>
    <text x="405" y="197" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">Management</text>
    <text x="405" y="208" font-family="Arial" font-size="7" fill="#666">Quant/Qual</text>
    <rect x="490" y="175" width="85" height="42" rx="3" fill="#ffe0b2"/>
    <text x="495" y="187" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">6. Financial</text>
    <text x="495" y="197" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">Analysis</text>
    <text x="495" y="208" font-family="Arial" font-size="7" fill="#666">ROI, NPV, TCO</text>
    <rect x="580" y="175" width="85" height="42" rx="3" fill="#ffe0b2"/>
    <text x="585" y="187" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">7. Risk</text>
    <text x="585" y="197" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">Assessment</text>
    <text x="585" y="208" font-family="Arial" font-size="7" fill="#666">Identify &amp; mitigate</text>
    <rect x="670" y="175" width="85" height="42" rx="3" fill="#ffe0b2"/>
    <text x="675" y="187" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">8. Recommendation</text>
    <text x="675" y="197" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">&amp; Conclusion</text>
    <text x="675" y="208" font-family="Arial" font-size="7" fill="#666">Preferred option</text>
  </g>
  
  <g class="step" id="step3" data-narration="Financial analysis includes capital costs, operational costs, Total Cost of Ownership, ROI, NPV calculation, and payback period determination for investments.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Financial Analysis Metrics</text>
    <rect x="40" y="262" width="175" height="45" rx="3" fill="#bbdefb"/>
    <text x="50" y="275" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Capital Costs</text>
    <text x="50" y="287" font-family="Arial" font-size="8" fill="#333">Initial investment for</text>
    <text x="50" y="297" font-family="Arial" font-size="8" fill="#333">hardware, software, development</text>
    <rect x="225" y="262" width="175" height="45" rx="3" fill="#bbdefb"/>
    <text x="235" y="275" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Operational Costs</text>
    <text x="235" y="287" font-family="Arial" font-size="8" fill="#333">Ongoing maintenance,</text>
    <text x="235" y="297" font-family="Arial" font-size="8" fill="#333">support, training costs</text>
    <rect x="410" y="262" width="175" height="45" rx="3" fill="#bbdefb"/>
    <text x="420" y="275" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Total Cost of Ownership</text>
    <text x="420" y="287" font-family="Arial" font-size="8" fill="#333">Capital + Operational</text>
    <text x="420" y="297" font-family="Arial" font-size="8" fill="#333">costs over project lifecycle</text>
    <rect x="595" y="262" width="175" height="45" rx="3" fill="#90caf9"/>
    <text x="605" y="275" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">ROI, NPV &amp; Payback</text>
    <text x="605" y="287" font-family="Arial" font-size="8" fill="#333">Return on Investment,</text>
    <text x="605" y="297" font-family="Arial" font-size="8" fill="#333">Net Present Value, recovery time</text>
  </g>
  
  <g class="step" id="step4" data-narration="Options Analysis evaluates at least three alternatives: Do Nothing as baseline, Preferred Solution, and Alternative Solution for comparison in detail.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Options Analysis Methodology</text>
    <rect x="40" y="352" width="230" height="42" rx="3" fill="#e1bee7"/>
    <text x="50" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">Option A: Do Nothing</text>
    <text x="50" y="378" font-family="Arial" font-size="8" fill="#333">Baseline/Status quo - no changes</text>
    <text x="50" y="388" font-family="Arial" font-size="8" fill="#333">Required for comparison</text>
    <rect x="285" y="352" width="230" height="42" rx="3" fill="#ce93d8"/>
    <text x="295" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">Option B: Preferred Solution</text>
    <text x="295" y="378" font-family="Arial" font-size="8" fill="#333">Recommended approach with</text>
    <text x="295" y="388" font-family="Arial" font-size="8" fill="#333">highest strategic fit</text>
    <rect x="530" y="352" width="230" height="42" rx="3" fill="#e1bee7"/>
    <text x="540" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">Option C: Alternative Solution</text>
    <text x="540" y="378" font-family="Arial" font-size="8" fill="#333">Other viable alternatives</text>
    <text x="540" y="388" font-family="Arial" font-size="8" fill="#333">for consideration</text>
  </g>
  
  <g class="step" id="step5" data-narration="Benefits are categorized as Quantitative (monetary) or Qualitative (non-monetary). Financial benefits include cost savings and revenue increases for the organization.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="40" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Benefits Categorization</text>
    <rect x="40" y="440" width="350" height="42" rx="3" fill="#ffcdd2"/>
    <text x="50" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Quantitative Benefits</text>
    <text x="50" y="466" font-family="Arial" font-size="8" fill="#333">Measurable in monetary terms - cost savings, revenue increase,</text>
    <text x="50" y="476" font-family="Arial" font-size="8" fill="#333">efficiency gains, reduced downtime costs</text>
    <rect x="405" y="440" width="350" height="42" rx="3" fill="#ffcdd2"/>
    <text x="415" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Qualitative Benefits</text>
    <text x="415" y="466" font-family="Arial" font-size="8" fill="#333">Difficult to quantify but important - improved customer satisfaction,</text>
    <text x="415" y="476" font-family="Arial" font-size="8" fill="#333">better decision-making, regulatory compliance, employee morale</text>
  </g>
  
  <g class="step" id="step6" data-narration="Business Case vs Project Charter: Business case justifies investment (why), while Project Charter defines scope and authority (what) for projects.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="40" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#00796b">Business Case vs Project Charter</text>
    <rect x="40" y="528" width="340" height="52" rx="3" fill="#b2dfdb"/>
    <text x="50" y="541" font-family="Arial" font-size="10" font-weight="bold" fill="#004d40">Business Case</text>
    <text x="50" y="554" font-family="Arial" font-size="9" fill="#333">Focus: WHY - Justifying the investment</text>
    <text x="50" y="566" font-family="Arial" font-size="9" fill="#333">Demonstrates business value, ROI, benefits</text>
    <text x="50" y="578" font-family="Arial" font-size="9" fill="#333">Developed BEFORE approval</text>
    <rect x="420" y="528" width="340" height="52" rx="3" fill="#80cbc4"/>
    <text x="430" y="541" font-family="Arial" font-size="10" font-weight="bold" fill="#004d40">Project Charter</text>
    <text x="430" y="554" font-family="Arial" font-size="9" fill="#333">Focus: WHAT - Defining project scope</text>
    <text x="430" y="566" font-family="Arial" font-size="9" fill="#333">Defines objectives, deliverables, authority</text>
    <text x="430" y="578" font-family="Arial" font-size="9" fill="#333">Developed AFTER approval</text>
  </g>
</svg>