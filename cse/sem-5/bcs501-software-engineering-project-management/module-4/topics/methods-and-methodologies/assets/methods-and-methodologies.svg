<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Software development methodologies are frameworks that guide creating, testing, and maintaining software systems. They evolved from ad-hoc processes to standardized approaches as software complexity grew.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Software Development Methods and Methodologies</text>
  </g>
  
  <g class="step" id="step1" data-narration="Waterfall is a sequential model with phases: requirements, design, implementation, testing, deployment, and maintenance. Each phase must complete before the next begins, with clear documentation at each stage.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Waterfall Model</text>
    <rect x="40" y="92" width="100" height="35" fill="#bbdefb" rx="4"/>
    <text x="90" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Requirements</text>
    <line x1="140" y1="109" x2="160" y2="109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="170" y="92" width="100" height="35" fill="#bbdefb" rx="4"/>
    <text x="220" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Design</text>
    <line x1="270" y1="109" x2="290" y2="109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="300" y="92" width="120" height="35" fill="#bbdefb" rx="4"/>
    <text x="360" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Implementation</text>
    <line x1="420" y1="109" x2="440" y2="109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="450" y="92" width="100" height="35" fill="#bbdefb" rx="4"/>
    <text x="500" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Testing</text>
    <line x1="550" y1="109" x2="570" y2="109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="580" y="92" width="100" height="35" fill="#bbdefb" rx="4"/>
    <text x="630" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Deploy</text>
    <line x1="680" y1="109" x2="700" y2="109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="710" y="92" width="50" height="35" fill="#bbdefb" rx="4"/>
    <text x="735" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Maint</text>
  </g>
  
  <g class="step" id="step2" data-narration="The V-Model extends Waterfall by pairing each development phase with a corresponding testing phase. The Spiral Model combines iteration with systematic risk analysis through four phases: planning, risk analysis, engineering, and evaluation.">
    <rect x="20" y="146" width="370" height="85" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">V-Model</text>
    <text x="40" y="185" font-family="Arial" font-size="10" fill="#333">Dev left, testing right.</text>
    <text x="40" y="200" font-family="Arial" font-size="10" fill="#333">Emphasizes verification</text>
    <text x="40" y="215" font-family="Arial" font-size="10" fill="#333">and validation.</text>
    
    <rect x="410" y="146" width="370" height="85" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="430" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2">Spiral Model</text>
    <text x="430" y="185" font-family="Arial" font-size="10" fill="#333">Four phases per cycle:</text>
    <text x="430" y="200" font-family="Arial" font-size="10" fill="#333">Planning → Risk Analysis</text>
    <text x="430" y="215" font-family="Arial" font-size="10" fill="#333">→ Engineering → Eval</text>
  </g>
  
  <g class="step" id="step3" data-narration="Agile emphasizes flexibility, collaboration, and customer satisfaction through iterative development. The Agile Manifesto values individuals, working software, customer collaboration, and responding to change.">
    <rect x="20" y="239" width="760" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="261" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32">Agile Methodology</text>
    <text x="40" y="280" font-family="Arial" font-size="11" fill="#333">Four Values:</text>
    <rect x="40" y="290" width="165" height="20" fill="#c8e6c9" rx="3"/>
    <text x="122" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Individuals over processes</text>
    <rect x="215" y="290" width="165" height="20" fill="#c8e6c9" rx="3"/>
    <text x="297" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Working software</text>
    <rect x="390" y="290" width="180" height="20" fill="#c8e6c9" rx="3"/>
    <text x="480" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Customer collaboration</text>
    <rect x="580" y="290" width="180" height="20" fill="#c8e6c9" rx="3"/>
    <text x="670" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Responding to change</text>
  </g>
  
  <g class="step" id="step4" data-narration="Scrum uses fixed-length sprints typically 2-4 weeks. Key roles include Product Owner managing the backlog, Scrum Master facilitating ceremonies, and the Development Team building the product.">
    <rect x="20" y="327" width="760" height="85" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="349" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Scrum Framework</text>
    <rect x="40" y="365" width="120" height="35" fill="#bbdefb" rx="5"/>
    <text x="100" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Product Owner</text>
    <text x="100" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Manages backlog</text>
    <rect x="180" y="365" width="120" height="35" fill="#bbdefb" rx="5"/>
    <text x="240" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Scrum Master</text>
    <text x="240" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Facilitates</text>
    <rect x="320" y="365" width="140" height="35" fill="#bbdefb" rx="5"/>
    <text x="390" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Dev Team</text>
    <text x="390" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">8-10 engineers</text>
    <text x="480" y="370" font-family="Arial" font-size="10" fill="#333">Sprint Events:</text>
    <text x="480" y="385" font-family="Arial" font-size="9" fill="#333">Daily Standup 15 min</text>
    <text x="480" y="400" font-family="Arial" font-size="9" fill="#333">Planning, Review, Retro</text>
  </g>
  
  <g class="step" id="step5" data-narration="DevOps bridges development and operations through collaboration, automation, and continuous delivery. CI/CD pipelines automate building, testing, and deploying code. Popular tools include Jenkins, Docker, and Kubernetes.">
    <rect x="20" y="420" width="760" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="442" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">DevOps Methodology</text>
    <text x="40" y="465" font-family="Arial" font-size="10" fill="#333">Goal: Shorten development cycles, reliable releases</text>
    <rect x="40" y="475" width="140" height="20" fill="#ffe0b2" rx="3"/>
    <text x="110" y="489" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">CI - Continuous Integration</text>
    <rect x="190" y="475" width="140" height="20" fill="#ffe0b2" rx="3"/>
    <text x="260" y="489" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">CD - Continuous Delivery</text>
    <rect x="340" y="475" width="140" height="20" fill="#ffe0b2" rx="3"/>
    <text x="410" y="489" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Infrastructure as Code</text>
    <text x="500" y="465" font-family="Arial" font-size="10" fill="#333">Tools:</text>
    <text x="500" y="480" font-family="Arial" font-size="9" fill="#333">Jenkins, Docker,</text>
    <text x="500" y="494" font-family="Arial" font-size="9" fill="#333">Kubernetes, Ansible</text>
  </g>
  
  <g class="step" id="step6" data-narration="Methodology selection depends on requirements stability, team size, and project complexity. Waterfall suits stable requirements, Agile for changing needs, Spiral for high-risk projects. Modern projects often use hybrid approaches.">
    <rect x="20" y="508" width="760" height="85" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="530" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2">Choosing the Right Methodology</text>
    <rect x="40" y="545" width="130" height="40" fill="#e1bee7" rx="5"/>
    <text x="105" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Waterfall</text>
    <text x="105" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Stable req, small team</text>
    <rect x="180" y="545" width="130" height="40" fill="#e1bee7" rx="5"/>
    <text x="245" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Agile/Scrum</text>
    <text x="245" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Changing requirements</text>
    <rect x="320" y="545" width="130" height="40" fill="#e1bee7" rx="5"/>
    <text x="385" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Spiral</text>
    <text x="385" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">High-risk, complex</text>
    <rect x="460" y="545" width="130" height="40" fill="#e1bee7" rx="5"/>
    <text x="525" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">DevOps</text>
    <text x="525" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Continuous delivery</text>
    <text x="600" y="560" font-family="Arial" font-size="9" fill="#7b1fa2" font-style="italic">Hybrid approaches also common</text>
  </g>
</svg>