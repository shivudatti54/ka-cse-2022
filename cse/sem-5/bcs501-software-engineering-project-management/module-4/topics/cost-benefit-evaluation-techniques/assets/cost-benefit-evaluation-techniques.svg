<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Cost-Benefit Evaluation Techniques, essential methods for analyzing software project economics and making informed investment decisions for organizations worldwide.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Cost-Benefit Evaluation Techniques</text>
  </g>
  
  <g class="step" id="step1" data-narration="Cost-benefit analysis compares total costs against expected benefits to determine if a software project is economically worthwhile for the organization to proceed with development.">
    <rect x="50" y="58" width="340" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="75" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Introduction</text>
    <text x="70" y="92" font-family="Arial" font-size="9" fill="#333">Systematic approach to evaluate</text>
    <text x="70" y="104" font-family="Arial" font-size="9" fill="#333">economic feasibility of software</text>
    <text x="70" y="116" font-family="Arial" font-size="9" fill="#333">projects by comparing costs vs benefits.</text>
    <text x="70" y="130" font-family="Arial" font-size="8" fill="#666">Used for project justification.</text>
    
    <rect x="410" y="58" width="340" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="580" y="75" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Types of Costs</text>
    <text x="430" y="92" font-family="Arial" font-size="9" fill="#333">• Development: One-time initial costs</text>
    <text x="430" y="104" font-family="Arial" font-size="9" fill="#333">• Operation &amp; Maintenance: Ongoing</text>
    <text x="430" y="116" font-family="Arial" font-size="9" fill="#333">• Implementation: Transition costs</text>
    <text x="430" y="130" font-family="Arial" font-size="8" fill="#666">Personnel, hardware, training.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Benefits are categorized as tangible (quantifiable monetary value) or intangible (qualitative improvements), and as direct or indirect based on how they affect business operations.">
    <rect x="50" y="153" width="340" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="170" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Tangible Benefits</text>
    <text x="70" y="187" font-family="Arial" font-size="9" fill="#333">Quantifiable in monetary terms:</text>
    <text x="70" y="199" font-family="Arial" font-size="9" fill="#333">• Increased productivity</text>
    <text x="70" y="211" font-family="Arial" font-size="9" fill="#333">• Reduced labor costs</text>
    <text x="70" y="223" font-family="Arial" font-size="9" fill="#333">• Decreased error rates</text>
    
    <rect x="410" y="153" width="340" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="580" y="170" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Intangible Benefits</text>
    <text x="430" y="187" font-family="Arial" font-size="9" fill="#333">Qualitative improvements:</text>
    <text x="430" y="199" font-family="Arial" font-size="9" fill="#333">• Customer satisfaction</text>
    <text x="430" y="211" font-family="Arial" font-size="9" fill="#333">• Employee morale</text>
    <text x="430" y="223" font-family="Arial" font-size="9" fill="#333">• Competitive advantage</text>
  </g>
  
  <g class="step" id="step3" data-narration="Four main techniques evaluate project viability: ROI measures percentage return, Payback Period shows recovery time, NPV accounts for time value of money, and Break-Even finds profit point.">
    <rect x="50" y="248" width="700" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="265" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Evaluation Techniques</text>
    
    <rect x="60" y="275" width="165" height="52" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="142" y="289" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">ROI</text>
    <text x="70" y="303" font-family="Arial" font-size="8" fill="#333">(Net Benefits / Costs) × 100</text>
    <text x="70" y="315" font-family="Arial" font-size="8" fill="#666">Higher = more profitable</text>
    
    <rect x="235" y="275" width="165" height="52" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="317" y="289" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Payback Period</text>
    <text x="245" y="303" font-family="Arial" font-size="8" fill="#333">Initial Investment / Annual Net</text>
    <text x="245" y="315" font-family="Arial" font-size="8" fill="#666">Shorter = faster recovery</text>
    
    <rect x="410" y="275" width="165" height="52" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="492" y="289" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">NPV</text>
    <text x="420" y="303" font-family="Arial" font-size="8" fill="#333">Σ(Bt - Ct)/(1+r)^t</text>
    <text x="420" y="315" font-family="Arial" font-size="8" fill="#666">Positive = Accept project</text>
    
    <rect x="585" y="275" width="155" height="52" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="662" y="289" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Break-Even</text>
    <text x="595" y="303" font-family="Arial" font-size="8" fill="#333">Investment / Annual Benefits</text>
    <text x="595" y="315" font-family="Arial" font-size="8" fill="#666">Point where cost = benefit</text>
  </g>
  
  <g class="step" id="step4" data-narration="Example: A 10 lakh CRM system with 2.5 lakh annual benefits takes 4 years to payback. NPV example shows negative value at 10% discount rate indicates project rejection.">
    <rect x="50" y="343" width="700" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Numerical Examples</text>
    
    <rect x="60" y="370" width="335" height="52" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="227" y="384" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Example 1: Payback Period</text>
    <text x="70" y="398" font-family="Arial" font-size="8" fill="#333">Investment: ₹10,00,000 | Annual Benefit: ₹2,50,000</text>
    <text x="70" y="410" font-family="Arial" font-size="8" fill="#333">Payback = 10,00,000 ÷ 2,50,000 = 4 years</text>
    
    <rect x="405" y="370" width="335" height="52" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="572" y="384" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Example 2: NPV Calculation</text>
    <text x="415" y="398" font-family="Arial" font-size="8" fill="#333">Initial: ₹5,00,000 | Years 1-3: ₹1.5L, ₹1.9L, ₹2.3L</text>
    <text x="415" y="410" font-family="Arial" font-size="8" fill="#333">NPV = -₹33,914 at 10% discount → Reject</text>
  </g>
  
  <g class="step" id="step5" data-narration="Exam tips: memorize all formulas, remember NPV considers time value of money, positive NPV means accept, and practice numerical problems for better understanding in assessments.">
    <rect x="50" y="438" width="700" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="455" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Exam Tips &amp; Key Formulas</text>
    
    <rect x="60" y="465" width="220" height="52" rx="4" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="170" y="479" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Formulas</text>
    <text x="70" y="493" font-family="Arial" font-size="8" fill="#333">ROI = (Net Benefits / Costs) × 100</text>
    <text x="70" y="505" font-family="Arial" font-size="8" fill="#333">NPV = Σ(Bt - Ct)/(1+r)^t</text>
    
    <rect x="290" y="465" width="220" height="52" rx="4" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="479" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Key Points</text>
    <text x="300" y="493" font-family="Arial" font-size="8" fill="#333">• NPV considers time value of money</text>
    <text x="300" y="505" font-family="Arial" font-size="8" fill="#333">• Positive NPV → Accept project</text>
    
    <rect x="520" y="465" width="220" height="52" rx="4" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="630" y="479" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Common Mistakes</text>
    <text x="530" y="493" font-family="Arial" font-size="8" fill="#333">• Forgetting maintenance costs</text>
    <text x="530" y="505" font-family="Arial" font-size="8" fill="#333">• Not using discount rate in NPV</text>
  </g>
</svg>