<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers management functions, control systems, organizational hierarchy, strategic planning approaches, and how information systems support decision-making processes for achieving business objectives.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Management and Management Control</text>
  </g>
  
  <g class="step" id="step1" data-narration="Management has five core functions: Planning sets goals, Organizing arranges resources, Staffing builds teams, Directing guides people, and Controlling monitors performance.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Five Functions of Management (PLOSS)</text>
    <rect x="40" y="88" width="130" height="45" rx="3" fill="#1976d2"/>
    <text x="105" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Planning</text>
    <rect x="180" y="88" width="130" height="45" rx="3" fill="#1976d2"/>
    <text x="245" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Organizing</text>
    <rect x="320" y="88" width="130" height="45" rx="3" fill="#1976d2"/>
    <text x="385" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Staffing</text>
    <rect x="460" y="88" width="130" height="45" rx="3" fill="#1976d2"/>
    <text x="525" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Directing</text>
    <rect x="600" y="88" width="130" height="45" rx="3" fill="#1976d2"/>
    <text x="665" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Controlling</text>
  </g>
  
  <g class="step" id="step2" data-narration="Organizations have three management levels: Operational handles daily tasks, Middle manages tactical implementation, and Top management handles strategic long-term decisions.">
    <rect x="20" y="150" width="760" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="170" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Three Levels of Management</text>
    <rect x="40" y="185" width="230" height="40" rx="3" fill="#388e3c"/>
    <text x="155" y="203" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Operational (Day-to-day)</text>
    <rect x="280" y="185" width="230" height="40" rx="3" fill="#4caf50"/>
    <text x="395" y="203" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Middle (Tactical)</text>
    <rect x="520" y="185" width="230" height="40" rx="3" fill="#388e3c"/>
    <text x="635" y="203" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Top (Strategic)</text>
  </g>
  
  <g class="step" id="step3" data-narration="Management control ensures organizational resources achieve goals by setting performance standards, measuring actual results, comparing variances, and taking corrective action.">
    <rect x="20" y="242" width="760" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="262" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Control Process Cycle</text>
    <rect x="40" y="275" width="135" height="42" rx="3" fill="#ff9800"/>
    <text x="107" y="292" text-anchor="middle" font-family="Arial" font-size="9" fill="white">1. Set Standards</text>
    <path d="M185 296 L205 296" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="215" y="275" width="135" height="42" rx="3" fill="#ff9800"/>
    <text x="282" y="292" text-anchor="middle" font-family="Arial" font-size="9" fill="white">2. Measure Performance</text>
    <path d="M360 296 L380 296" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="390" y="275" width="135" height="42" rx="3" fill="#ff9800"/>
    <text x="457" y="292" text-anchor="middle" font-family="Arial" font-size="9" fill="white">3. Compare Results</text>
    <path d="M535 296 L555 296" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="565" y="275" width="135" height="42" rx="3" fill="#ff9800"/>
    <text x="632" y="292" text-anchor="middle" font-family="Arial" font-size="9" fill="white">4. Corrective Action</text>
  </g>
  
  <g class="step" id="step4" data-narration="There are three control types: Feedforward prevents problems before they occur, Concurrent monitors during execution, and Feedback corrects after completion.">
    <rect x="20" y="334" width="760" height="75" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="354" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Three Types of Control</text>
    <rect x="40" y="368" width="230" height="32" rx="3" fill="#9c27b0"/>
    <text x="155" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Feedforward (Pre-control)</text>
    <rect x="280" y="368" width="230" height="32" rx="3" fill="#ba68c8"/>
    <text x="395" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Concurrent (Real-time)</text>
    <rect x="520" y="368" width="230" height="32" rx="3" fill="#ba68c8"/>
    <text x="635" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Feedback (Post-control)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Key control techniques include Budgetary Control comparing actual versus budget, MBO for goal-based evaluation, and Balanced Scorecard measuring four performance perspectives.">
    <rect x="20" y="416" width="760" height="75" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="436" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Control Techniques</text>
    <rect x="40" y="450" width="175" height="32" rx="3" fill="#388e3c"/>
    <text x="127" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Budgetary Control</text>
    <rect x="225" y="450" width="175" height="32" rx="3" fill="#4caf50"/>
    <text x="312" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Standard Costing</text>
    <rect x="410" y="450" width="175" height="32" rx="3" fill="#4caf50"/>
    <text x="497" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="white">MBO</text>
    <rect x="595" y="450" width="165" height="32" rx="3" fill="#388e3c"/>
    <text x="677" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Balanced Scorecard</text>
  </g>
  
  <g class="step" id="step6" data-narration="The Balanced Scorecard framework measures organizational performance using four key perspectives: Financial, Customer, Internal Processes, and Learning and Growth for strategic planning.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Balanced Scorecard Four Perspectives</text>
    <rect x="40" y="535" width="170" height="42" rx="3" fill="#1976d2"/>
    <text x="125" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Financial</text>
    <text x="125" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">ROI, Profit, Growth</text>
    <rect x="220" y="535" width="170" height="42" rx="3" fill="#2196f3"/>
    <text x="305" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Customer</text>
    <text x="305" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Satisfaction, Retention</text>
    <rect x="400" y="535" width="170" height="42" rx="3" fill="#2196f3"/>
    <text x="485" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Internal Process</text>
    <text x="485" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Quality, Delivery</text>
    <rect x="580" y="535" width="170" height="42" rx="3" fill="#1976d2"/>
    <text x="665" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Learning &amp; Growth</text>
    <text x="665" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Training, Skills</text>
  </g>
</svg>