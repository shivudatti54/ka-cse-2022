<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Setting Objectives in software engineering provides clear direction, strong team motivation, and measurable success criteria for every project undertaken successfully.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Setting Objectives in Software Engineering</text>
  </g>
  
  <!-- step1: What are Objectives? -->
  <g class="step" id="step1" data-narration="Project objectives are specific, measurable statements that clearly define what a team aims to achieve, and they differ from broader qualitative goals that inspire but lack precision.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What are Objectives?</text>
    <text x="40" y="90" font-family="Arial" font-size="9" fill="#333">Definition: Specific, measurable statements describing what a project aims to achieve</text>
    <rect x="40" y="100" width="220" height="30" fill="#bbdefb" rx="4"/>
    <text x="50" y="112" font-family="Arial" font-size="8" fill="#0d47a1">Strategic (3-5 years)</text>
    <text x="170" y="112" font-family="Arial" font-size="8" fill="#0d47a1">Tactical (1-3 years)</text>
    <rect x="280" y="100" width="220" height="30" fill="#90caf9" rx="4"/>
    <text x="290" y="112" font-family="Arial" font-size="8" fill="#0d47a1">Operational (weeks-months)</text>
    <text x="520" y="112" font-family="Arial" font-size="8" fill="#0d47a1">Three levels cascade</text>
    <line x1="520" y1="120" x2="620" y2="120" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="640" y="112" font-family="Arial" font-size="8" fill="#0d47a1">from strategy to execution</text>
  </g>
  
  <!-- step2: SMART Framework -->
  <g class="step" id="step2" data-narration="The SMART framework helps teams create effective objectives that are Specific, Measurable, Achievable, Relevant, and Time-bound for successful project planning and execution.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">SMART Framework</text>
    <rect x="40" y="175" width="130" height="42" fill="#c8e6c9" rx="4"/>
    <text x="105" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">S</text>
    <text x="105" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Specific</text>
    <text x="105" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Clearly defined</text>
    <rect x="180" y="175" width="130" height="42" fill="#a5d6a7" rx="4"/>
    <text x="245" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">M</text>
    <text x="245" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Measurable</text>
    <text x="245" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Quantifiable</text>
    <rect x="320" y="175" width="130" height="42" fill="#c8e6c9" rx="4"/>
    <text x="385" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">A</text>
    <text x="385" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Achievable</text>
    <text x="385" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Realistic</text>
    <rect x="460" y="175" width="130" height="42" fill="#a5d6a7" rx="4"/>
    <text x="525" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">R</text>
    <text x="525" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Relevant</text>
    <text x="525" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Aligned</text>
    <rect x="600" y="175" width="130" height="42" fill="#c8e6c9" rx="4"/>
    <text x="665" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">T</text>
    <text x="665" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Time-bound</text>
    <text x="665" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Has deadline</text>
  </g>
  
  <!-- step3: Project Objectives Dimensions -->
  <g class="step" id="step3" data-narration="Software project objectives address four key dimensions: Schedule for deadlines, Cost for budget, Quality for standards, and Scope for deliverables.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#f57c00">Project Objectives Dimensions</text>
    <rect x="40" y="263" width="170" height="42" fill="#ffe0b2" rx="4"/>
    <text x="125" y="277" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Schedule</text>
    <text x="125" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Deadlines &amp; milestones</text>
    <rect x="220" y="263" width="170" height="42" fill="#ffcc80" rx="4"/>
    <text x="305" y="277" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Cost</text>
    <text x="305" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Budget &amp; resources</text>
    <rect x="400" y="263" width="170" height="42" fill="#ffe0b2" rx="4"/>
    <text x="485" y="277" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Quality</text>
    <text x="485" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Reliability &amp; performance</text>
    <rect x="580" y="263" width="170" height="42" fill="#ffcc80" rx="4"/>
    <text x="665" y="277" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Scope</text>
    <text x="665" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Features &amp; functions</text>
  </g>
  
  <!-- step4: Quality Objectives -->
  <g class="step" id="step4" data-narration="Quality objectives in software engineering use specific measurable metrics including defect density, code coverage percentage, response time targets, and user satisfaction scores for continuous improvement.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#d32f2f">Quality Objectives (Measurable Metrics)</text>
    <rect x="40" y="353" width="175" height="40" fill="#ffcdd2" rx="4"/>
    <text x="127" y="367" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Defect Density</text>
    <text x="127" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">&lt; 1 defect per KLOC</text>
    <rect x="225" y="353" width="175" height="40" fill="#ef9a9a" rx="4"/>
    <text x="312" y="367" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Code Coverage</text>
    <text x="312" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">≥ 85% test coverage</text>
    <rect x="410" y="353" width="175" height="40" fill="#ffcdd2" rx="4"/>
    <text x="497" y="367" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Response Time</text>
    <text x="497" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">&lt; 2 seconds average</text>
    <rect x="595" y="353" width="175" height="40" fill="#ef9a9a" rx="4"/>
    <text x="682" y="367" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">User Satisfaction</text>
    <text x="682" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">NPS score ≥ 50</text>
  </g>
  
  <!-- step5: OKRs Framework -->
  <g class="step" id="step5" data-narration="OKRs framework combines qualitative Objectives that inspire and motivate teams with measurable Key Results that clearly indicate goal achievement, a methodology famously popularized by Google.">
    <rect x="20" y="410" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">OKRs: Objectives and Key Results</text>
    <rect x="40" y="441" width="330" height="40" fill="#e1bee7" rx="4"/>
    <text x="205" y="455" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">OBJECTIVES (Qualitative)</text>
    <text x="205" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Inspiring goals that motivate teams</text>
    <rect x="380" y="441" width="380" height="40" fill="#ce93d8" rx="4"/>
    <text x="570" y="455" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">KEY RESULTS (Quantitative)</text>
    <text x="570" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Measurable outcomes that prove success</text>
    <text x="205" y="485" font-family="Arial" font-size="8" fill="#7b1fa2">Example: "Deliver exceptional user experience"</text>
    <text x="570" y="485" font-family="Arial" font-size="8" fill="#7b1fa2">Example: "NPS above 50, reduce latency by 60%"</text>
  </g>
  
  <!-- step6: SMART Example -->
  <g class="step" id="step6" data-narration="A poor objective like 'Make the system faster' becomes SMART when it specifies the function, measures current versus target time, and sets a 3-month deadline.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">SMART Example: Converting Poor to Effective Objective</text>
    <rect x="40" y="527" width="340" height="52" fill="#ffcdd2" rx="4"/>
    <text x="210" y="542" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">POOR Objective</text>
    <text x="210" y="558" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">"Make the system faster"</text>
    <text x="210" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Vague • Unmeasurable • No deadline</text>
    <rect x="420" y="527" width="340" height="52" fill="#c8e6c9" rx="4"/>
    <text x="570" y="542" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">SMART Objective</text>
    <text x="570" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">"Reduce customer lookup response time</text>
    <text x="570" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">from 2.5s to 0.5s in 3 months"</text>
    <text x="570" y="580" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Specific • Measurable • Achievable • Relevant • Time-bound</text>
  </g>
</svg>