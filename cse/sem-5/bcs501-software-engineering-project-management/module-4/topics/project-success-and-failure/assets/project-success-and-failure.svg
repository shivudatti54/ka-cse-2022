<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This lesson covers project success criteria, failure causes, and measurement models like Earned Value Management used in software engineering projects worldwide.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Project Success and Failure</text>
  </g>
  
  <g class="step" id="step1" data-narration="Project success traditionally means meeting scope, time, and cost constraints. Modern approaches also consider stakeholder satisfaction, business value delivery, and long-term organizational benefits.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition: Project Success</text>
    <rect x="40" y="88" width="220" height="40" fill="#1976d2" rx="4"/>
    <text x="50" y="104" font-family="Arial" font-size="10" fill="white">Iron Triangle (Traditional)</text>
    <text x="50" y="118" font-family="Arial" font-size="9" fill="#e3f2fd">Scope + Time + Cost</text>
    <rect x="270" y="88" width="220" height="40" fill="#9c27b0" rx="4"/>
    <text x="280" y="104" font-family="Arial" font-size="10" fill="white">Modern Perspective</text>
    <text x="280" y="118" font-family="Arial" font-size="9" fill="#f3e5f5">Stakeholder Satisfaction,</text>
    <text x="280" y="129" font-family="Arial" font-size="9" fill="#f3e5f5">Business Value Delivery</text>
    <rect x="500" y="88" width="260" height="40" fill="#f44336" rx="4"/>
    <text x="510" y="104" font-family="Arial" font-size="10" fill="white">Project Failure Types</text>
    <text x="510" y="118" font-family="Arial" font-size="9" fill="#ffebee">Complete/Partial/Budget/Schedule</text>
  </g>
  
  <g class="step" id="step2" data-narration="Critical Success Factors include clear requirements, strong leadership, a competent team, executive support, user involvement, and effective communication throughout the project lifecycle.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Critical Success Factors (CSFs)</text>
    <rect x="40" y="180" width="115" height="36" fill="#388e3c" rx="4"/>
    <text x="48" y="195" font-family="Arial" font-size="8" fill="white">Clear Requirements</text>
    <rect x="160" y="180" width="115" height="36" fill="#388e3c" rx="4"/>
    <text x="168" y="195" font-family="Arial" font-size="8" fill="white">Strong Leadership</text>
    <rect x="280" y="180" width="115" height="36" fill="#388e3c" rx="4"/>
    <text x="288" y="195" font-family="Arial" font-size="8" fill="white">Competent Team</text>
    <rect x="400" y="180" width="115" height="36" fill="#388e3c" rx="4"/>
    <text x="408" y="195" font-family="Arial" font-size="8" fill="white">Executive Support</text>
    <rect x="520" y="180" width="115" height="36" fill="#388e3c" rx="4"/>
    <text x="528" y="195" font-family="Arial" font-size="8" fill="white">User Involvement</text>
    <rect x="640" y="180" width="120" height="36" fill="#388e3c" rx="4"/>
    <text x="648" y="195" font-family="Arial" font-size="8" fill="white">Effective Communication</text>
  </g>
  
  <g class="step" id="step3" data-narration="Common failure causes include poor requirements, unrealistic expectations, insufficient planning, poor communication, scope creep, inadequate risk management, and various technology issues.">
    <rect x="20" y="234" width="760" height="115" fill="#ffebee" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Top Reasons for Project Failure</text>
    <rect x="40" y="268" width="140" height="36" fill="#f44336" rx="4"/>
    <text x="48" y="283" font-family="Arial" font-size="8" fill="white">Poor Requirements</text>
    <rect x="190" y="268" width="140" height="36" fill="#f44336" rx="4"/>
    <text x="198" y="283" font-family="Arial" font-size="8" fill="white">Unrealistic Expectations</text>
    <rect x="340" y="268" width="140" height="36" fill="#f44336" rx="4"/>
    <text x="348" y="283" font-family="Arial" font-size="8" fill="white">Insufficient Planning</text>
    <rect x="490" y="268" width="140" height="36" fill="#f44336" rx="4"/>
    <text x="498" y="283" font-family="Arial" font-size="8" fill="white">Poor Communication</text>
    <rect x="640" y="268" width="120" height="36" fill="#f44336" rx="4"/>
    <text x="648" y="283" font-family="Arial" font-size="8" fill="white">Scope Creep</text>
    <rect x="95" y="310" width="180" height="36" fill="#f44336" rx="4"/>
    <text x="103" y="325" font-family="Arial" font-size="8" fill="white">Inadequate Risk Mgmt</text>
    <rect x="285" y="310" width="140" height="36" fill="#f44336" rx="4"/>
    <text x="293" y="325" font-family="Arial" font-size="8" fill="white">Technology Issues</text>
    <rect x="435" y="310" width="140" height="36" fill="#f44336" rx="4"/>
    <text x="443" y="325" font-family="Arial" font-size="8" fill="white">Team Issues</text>
    <rect x="585" y="310" width="175" height="36" fill="#f44336" rx="4"/>
    <text x="593" y="325" font-family="Arial" font-size="8" fill="white">Inadequate Testing</text>
  </g>
  
  <g class="step" id="step4" data-narration="Earned Value Management uses CPI and SPI to measure cost and schedule performance. CPI below one indicates over budget, while SPI below one means behind schedule.">
    <rect x="20" y="357" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="377" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Earned Value Management (EVM) Formulas</text>
    <rect x="40" y="391" width="175" height="36" fill="#ff9800" rx="4"/>
    <text x="48" y="406" font-family="Arial" font-size="9" fill="white">CPI = EV / AC</text>
    <text x="48" y="419" font-family="Arial" font-size="8" fill="#fff3e0">Cost Performance Index</text>
    <rect x="225" y="391" width="175" height="36" fill="#ff9800" rx="4"/>
    <text x="233" y="406" font-family="Arial" font-size="9" fill="white">SPI = EV / PV</text>
    <text x="233" y="419" font-family="Arial" font-size="8" fill="#fff3e0">Schedule Performance Index</text>
    <rect x="410" y="391" width="175" height="36" fill="#ff9800" rx="4"/>
    <text x="418" y="406" font-family="Arial" font-size="9" fill="white">EAC = BAC / CPI</text>
    <text x="418" y="419" font-family="Arial" font-size="8" fill="#fff3e0">Estimate at Completion</text>
    <rect x="595" y="391" width="165" height="36" fill="#ff9800" rx="4"/>
    <text x="603" y="406" font-family="Arial" font-size="9" fill="white">VAC = BAC - EAC</text>
    <text x="603" y="419" font-family="Arial" font-size="8" fill="#fff3e0">Variance at Completion</text>
  </g>
  
  <g class="step" id="step5" data-narration="For exams, remember the Iron Triangle, memorize CSFs, practice CPI and SPI calculations, understand stakeholder perspectives differ, and note that project success differs from product success.">
    <rect x="20" y="445" width="760" height="120" fill="#f3e5f5" rx="8"/>
    <text x="40" y="465" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Case Studies and Exam Tips</text>
    <rect x="40" y="479" width="340" height="36" fill="#f44336" rx="4"/>
    <text x="50" y="494" font-family="Arial" font-size="10" fill="white">FAILURE: NHS National Programme for IT (2002-2011)</text>
    <text x="50" y="507" font-family="Arial" font-size="8" fill="#ffebee">£12.7B spent, ultimately abandoned - poor scope management</text>
    <rect x="390" y="479" width="370" height="36" fill="#388e3c" rx="4"/>
    <text x="400" y="494" font-family="Arial" font-size="10" fill="white">SUCCESS: Food Delivery App Project</text>
    <text x="400" y="507" font-family="Arial" font-size="8" fill="#e8f5e9">₹20L, 6 months - clear requirements, agile methodology</text>
    <rect x="40" y="521" width="720" height="34" fill="#9c27b0" rx="4"/>
    <text x="50" y="537" font-family="Arial" font-size="9" fill="white">Key Lesson: Project success requires clear requirements, stakeholder involvement, adaptive planning, and effective communication throughout.</text>
    <text x="40" y="558" font-family="Arial" font-size="8" fill="#e65100">Exam: Remember CPI &lt; 1 = Over Budget | SPI &lt; 1 = Behind Schedule | Project ≠ Product Success</text>
  </g>
</svg>