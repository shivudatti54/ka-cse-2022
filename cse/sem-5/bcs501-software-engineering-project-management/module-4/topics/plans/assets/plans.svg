<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This lesson covers Test Plans in Software Engineering, essential documents that guide the entire testing process for quality software delivery.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Test Plans in Software Engineering</text>
  </g>
  
  <!-- step1: Definition and Purpose -->
  <g class="step" id="step1" data-narration="A Test Plan is a comprehensive document describing scope, approach, resources, and schedule of testing activities per IEEE 829 standard.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Definition &amp; Purpose</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">A Test Plan is a document describing scope, approach, resources, and schedule</text>
    <text x="40" y="116" font-family="Arial" font-size="11" fill="#333">of testing activities. Per IEEE 829, it serves as a blueprint for the</text>
    <text x="40" y="132" font-family="Arial" font-size="11" fill="#333">entire testing process, ensuring quality and reliability of software.</text>
  </g>
  
  <!-- step2: Key Components -->
  <g class="step" id="step2" data-narration="Key components include test items, features to test and not to test, approach, deliverables, environmental needs, staffing, and schedule details.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Key Components (IEEE 829)</text>
    <rect x="40" y="180" width="140" height="38" fill="white" stroke="#388e3c" rx="4"/>
    <text x="50" y="194" font-family="Arial" font-size="9" fill="#333">• Test Plan Identifier</text>
    <text x="50" y="208" font-family="Arial" font-size="9" fill="#333">• Introduction &amp; Scope</text>
    <rect x="190" y="180" width="140" height="38" fill="white" stroke="#388e3c" rx="4"/>
    <text x="200" y="194" font-family="Arial" font-size="9" fill="#333">• Features to Test</text>
    <text x="200" y="208" font-family="Arial" font-size="9" fill="#333">• Features not to Test</text>
    <rect x="340" y="180" width="140" height="38" fill="white" stroke="#388e3c" rx="4"/>
    <text x="350" y="194" font-family="Arial" font-size="9" fill="#333">• Test Approach</text>
    <text x="350" y="208" font-family="Arial" font-size="9" fill="#333">• Deliverables</text>
    <rect x="490" y="180" width="140" height="38" fill="white" stroke="#388e3c" rx="4"/>
    <text x="500" y="194" font-family="Arial" font-size="9" fill="#333">• Environmental</text>
    <text x="500" y="208" font-family="Arial" font-size="9" fill="#333">Requirements</text>
    <rect x="640" y="180" width="130" height="38" fill="white" stroke="#388e3c" rx="4"/>
    <text x="650" y="194" font-family="Arial" font-size="9" fill="#333">• Schedule &amp;</text>
    <text x="650" y="208" font-family="Arial" font-size="9" fill="#333">Milestones</text>
  </g>
  
  <!-- step3: Testing Levels -->
  <g class="step" id="step3" data-narration="Four testing levels exist: unit tests individual modules, integration tests module interactions, system tests end-to-end, and acceptance validates user needs.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Testing Levels</text>
    <rect x="40" y="268" width="165" height="42" fill="white" stroke="#ff9800" rx="4"/>
    <text x="50" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Unit Testing</text>
    <text x="50" y="296" font-family="Arial" font-size="9" fill="#333">Tests individual modules</text>
    <text x="50" y="306" font-family="Arial" font-size="9" fill="#333">and components</text>
    <rect x="215" y="268" width="165" height="42" fill="white" stroke="#ff9800" rx="4"/>
    <text x="225" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Integration Testing</text>
    <text x="225" y="296" font-family="Arial" font-size="9" fill="#333">Tests module interactions</text>
    <text x="225" y="306" font-family="Arial" font-size="9" fill="#333">and interfaces</text>
    <rect x="390" y="268" width="165" height="42" fill="white" stroke="#ff9800" rx="4"/>
    <text x="400" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">System Testing</text>
    <text x="400" y="296" font-family="Arial" font-size="9" fill="#333">Tests complete system</text>
    <text x="400" y="306" font-family="Arial" font-size="9" fill="#333">end-to-end</text>
    <rect x="565" y="268" width="165" height="42" fill="white" stroke="#ff9800" rx="4"/>
    <text x="575" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Acceptance Testing</text>
    <text x="575" y="296" font-family="Arial" font-size="9" fill="#333">Validates user needs</text>
    <text x="575" y="306" font-family="Arial" font-size="9" fill="#333">and business requirements</text>
  </g>
  
  <!-- step4: Test Strategy & Criteria -->
  <g class="step" id="step4" data-narration="Comprehensive test strategies include top-down, bottom-up, sandwich, and big-bang approaches with specific entry criteria that must be met before testing starts.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Test Strategy &amp; Criteria</text>
    <rect x="40" y="360" width="220" height="38" fill="white" stroke="#9c27b0" rx="4"/>
    <text x="50" y="374" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Test Strategies</text>
    <text x="50" y="388" font-family="Arial" font-size="9" fill="#333">Top-Down, Bottom-Up,</text>
    <text x="140" y="388" font-family="Arial" font-size="9" fill="#333">Sandwich, Big-Bang</text>
    <rect x="270" y="360" width="240" height="38" fill="white" stroke="#9c27b0" rx="4"/>
    <text x="280" y="374" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Entry Criteria</text>
    <text x="280" y="388" font-family="Arial" font-size="9" fill="#333">Test cases ready, environment</text>
    <text x="390" y="388" font-family="Arial" font-size="9" fill="#333">setup complete, plan approved</text>
    <rect x="520" y="360" width="250" height="38" fill="white" stroke="#9c27b0" rx="4"/>
    <text x="530" y="374" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Exit Criteria</text>
    <text x="530" y="388" font-family="Arial" font-size="9" fill="#333">All test cases executed, required</text>
    <text x="620" y="388" font-family="Arial" font-size="9" fill="#333">coverage met, critical bugs resolved</text>
  </g>
  
  <!-- step5: Example - E-Commerce -->
  <g class="step" id="step5" data-narration="In an e-commerce checkout testing scenario, we need to verify shopping cart functionality, payment gateway integration, order confirmation, and integrate with email notifications.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Example: E-Commerce Checkout Test Plan</text>
    <rect x="40" y="448" width="130" height="38" fill="white" stroke="#1976d2" rx="4"/>
    <text x="50" y="462" font-family="Arial" font-size="9" fill="#333">Shopping Cart</text>
    <text x="50" y="476" font-family="Arial" font-size="8" fill="#666">Functionality</text>
    <rect x="180" y="448" width="130" height="38" fill="white" stroke="#1976d2" rx="4"/>
    <text x="190" y="462" font-family="Arial" font-size="9" fill="#333">Payment Gateway</text>
    <text x="190" y="476" font-family="Arial" font-size="8" fill="#666">Integration</text>
    <rect x="320" y="448" width="130" height="38" fill="white" stroke="#1976d2" rx="4"/>
    <text x="330" y="462" font-family="Arial" font-size="9" fill="#333">Order</text>
    <text x="330" y="476" font-family="Arial" font-size="8" fill="#666">Confirmation</text>
    <rect x="460" y="448" width="130" height="38" fill="white" stroke="#1976d2" rx="4"/>
    <text x="470" y="462" font-family="Arial" font-size="9" fill="#333">Email</text>
    <text x="470" y="476" font-family="Arial" font-size="8" fill="#666">Notifications</text>
    <rect x="600" y="448" width="170" height="38" fill="#ffebee" stroke="#f44336" rx="4"/>
    <text x="610" y="460" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Risk Mitigation</text>
    <text x="610" y="474" font-family="Arial" font-size="8" fill="#333">Use sandbox for payment</text>
    <text x="690" y="474" font-family="Arial" font-size="8" fill="#333">testing</text>
  </g>
  
  <!-- step6: Summary -->
  <g class="step" id="step6" data-narration="Test plans are essential IEEE 829 documents with components covering scope, strategy, criteria, and deliverables. They ensure systematic testing across all levels of software development.">
    <rect x="20" y="498" width="760" height="85" fill="#e8f5e9" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Summary</text>
    <text x="40" y="540" font-family="Arial" font-size="10" fill="#333">• Test Plans are essential documents following IEEE 829 standard</text>
    <text x="40" y="558" font-family="Arial" font-size="10" fill="#333">• Components include scope, approach, resources, schedule, and risks</text>
    <text x="40" y="576" font-family="Arial" font-size="10" fill="#333">• Entry/Exit criteria define when testing starts and stops</text>
    <text x="400" y="540" font-family="Arial" font-size="10" fill="#333">• Four testing levels: Unit, Integration, System, Acceptance</text>
    <text x="400" y="558" font-family="Arial" font-size="10" fill="#333">• Test Strategy defines approach (top-down, bottom-up, sandwich)</text>
    <text x="400" y="576" font-family="Arial" font-size="10" fill="#333">• Test deliverables include cases, scripts, reports, and defect logs</text>
  </g>
</svg>