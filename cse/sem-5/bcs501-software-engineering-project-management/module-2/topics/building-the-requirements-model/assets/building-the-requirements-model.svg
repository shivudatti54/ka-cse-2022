<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Building the Requirements Model transforms stakeholder needs into structured representations that guide software development, ensuring all functional and quality aspects are captured systematically for successful implementation.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Building the Requirements Model</text>
  </g>
  
  <g class="step" id="step1" data-narration="Analysis modeling captures functional requirements showing what the system does and non-functional requirements covering quality attributes like performance, reliability, usability, and security for complete requirements specification.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="58" width="760" height="20" fill="#1976d2" rx="8"/>
    <text x="35" y="73" font-family="Arial" font-size="11" font-weight="bold" fill="white">1. Analysis Modeling</text>
    <text x="35" y="95" font-family="Arial" font-size="10" fill="#333">Purpose: Captures WHAT the system does (functional) and HOW WELL it performs (non-functional)</text>
    <text x="35" y="110" font-family="Arial" font-size="10" fill="#333">Views: Functional Model, Data Model, Behavioral Model, Object Model</text>
    <rect x="580" y="78" width="180" height="50" fill="#bbdefb" rx="4"/>
    <text x="670" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">Functional + Non-Functional</text>
    <text x="670" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Complete Requirements View</text>
  </g>
  
  <g class="step" id="step2" data-narration="Data Flow Diagrams show how data moves through systems with four components: external entities, processes, data flows, and data stores.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <rect x="20" y="146" width="760" height="20" fill="#388e3c" rx="8"/>
    <text x="35" y="161" font-family="Arial" font-size="11" font-weight="bold" fill="white">2. Data Flow Diagrams (DFDs)</text>
    <text x="35" y="183" font-family="Arial" font-size="10" fill="#333">Four Components: External Entity (source/dest), Process (transformation), Data Flow (path), Data Store (repository)</text>
    <text x="35" y="198" font-family="Arial" font-size="10" fill="#333">Levels: Context Diagram (Level 0) → Level 1 (major functions) → Level 2+ (detailed)</text>
    <circle cx="160" cy="195" r="12" fill="white" stroke="#388e3c" stroke-width="2"/>
    <text x="160" y="199" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">EE</text>
    <rect x="310" y="183" width="50" height="30" fill="white" stroke="#388e3c" stroke-width="2" rx="4"/>
    <text x="335" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">P1</text>
    <path d="M172 195 L310 198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="500" y="183" width="40" height="25" fill="none" stroke="#388e3c" stroke-width="2" rx="2"/>
    <text x="520" y="199" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">DS</text>
    <path d="M360 198 L500 198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <g class="step" id="step3" data-narration="Entity-Relationship diagrams model data structure with entities representing real-world objects, attributes describing their properties, and relationships showing how entities connect. Cardinalities include one-to-one, one-to-many, and many-to-many.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <rect x="20" y="234" width="760" height="20" fill="#ff9800" rx="8"/>
    <text x="35" y="249" font-family="Arial" font-size="11" font-weight="bold" fill="white">3. Entity-Relationship (ER) Diagrams</text>
    <text x="35" y="271" font-family="Arial" font-size="10" fill="#333">Components: Entities (objects), Attributes (properties), Relationships (associations between entities)</text>
    <text x="35" y="286" font-family="Arial" font-size="10" fill="#333">Cardinalities: One-to-One (1:1), One-to-Many (1:N), Many-to-Many (M:N)</text>
    <rect x="200" y="263" width="90" height="40" fill="white" stroke="#ff9800" stroke-width="2" rx="4"/>
    <text x="245" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Customer</text>
    <text x="245" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">id, name, address</text>
    <rect x="420" y="263" width="90" height="40" fill="white" stroke="#ff9800" stroke-width="2" rx="4"/>
    <text x="465" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Account</text>
    <text x="465" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">acc_no, balance, type</text>
    <path d="M290 283 L420 283" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="355" y="275" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">1</text>
    <text x="355" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">*</text>
    <text x="320" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">has</text>
  </g>
  
  <g class="step" id="step4" data-narration="Use case modeling captures functional requirements from user perspective with actors, use cases, basic flows, and alternative flows for complete scenarios.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <rect x="20" y="322" width="760" height="20" fill="#9c27b0" rx="8"/>
    <text x="35" y="337" font-family="Arial" font-size="11" font-weight="bold" fill="white">4. Use Case Modeling</text>
    <text x="35" y="359" font-family="Arial" font-size="10" fill="#333">Actor: External entity interacting with system | Use Case: Sequence of actions producing value for actor</text>
    <text x="35" y="374" font-family="Arial" font-size="10" fill="#333">Structure: Basic Flow (normal path), Alternative Flows (variations/errors), Preconditions, Postconditions</text>
    <rect x="450" y="345" width="140" height="50" fill="white" stroke="#9c27b0" stroke-width="2" rx="4"/>
    <text x="520" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Place Order</text>
    <text x="520" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Basic + Alternative Flows</text>
    <ellipse cx="380" cy="370" rx="30" ry="20" fill="white" stroke="#9c27b0" stroke-width="2"/>
    <text x="380" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">Customer</text>
    <path d="M350 370 L450 370" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="640" y="350" width="120" height="40" fill="#e1bee7" rx="4"/>
    <text x="700" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Include/Extend relationships for reusable behavior</text>
  </g>
  
  <g class="step" id="step5" data-narration="Class diagrams show static object structure with classes, attributes, operations, and relationships. State diagrams capture dynamic object behavior with states and transitions.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <rect x="20" y="410" width="760" height="20" fill="#f44336" rx="8"/>
    <text x="35" y="425" font-family="Arial" font-size="11" font-weight="bold" fill="white">5. Class and State Diagrams</text>
    <text x="35" y="447" font-family="Arial" font-size="10" fill="#333">Class Diagram: Classes (attributes + operations), Relationships (Association, Aggregation, Composition, Inheritance)</text>
    <text x="35" y="462" font-family="Arial" font-size="10" fill="#333">State Diagram: States (conditions), Events (triggers), Transitions (state changes), Actions (operations during transition)</text>
    <rect x="200" y="435" width="160" height="50" fill="white" stroke="#f44336" stroke-width="2" rx="4"/>
    <text x="280" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Order</text>
    <line x1="200" y1="458" x2="360" y2="458" stroke="#f44336" stroke-width="1"/>
    <text x="280" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">+orderId, +status | +place(), +cancel()</text>
    <rect x="500" y="435" width="200" height="50" fill="white" stroke="#f44336" stroke-width="2" rx="4"/>
    <text x="600" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">State Diagram Example</text>
    <text x="600" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Idle → Processing → Completed</text>
    <circle cx="530" cy="460" r="10" fill="none" stroke="#f44336" stroke-width="1.5"/>
    <text x="530" y="464" text-anchor="middle" font-family="Arial" font-size="7" fill="#f44336">S1</text>
  </g>
  
  <g class="step" id="step6" data-narration="Requirements validation ensures models are complete, consistent, and testable through systematic reviews, prototyping, test case generation, and traceability analysis to verify all stakeholder needs are properly addressed.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="498" width="760" height="20" fill="#1976d2" rx="8"/>
    <text x="35" y="513" font-family="Arial" font-size="11" font-weight="bold" fill="white">6. Requirements Validation &amp; Summary</text>
    <text x="35" y="535" font-family="Arial" font-size="10" fill="#333">Validation Techniques: Reviews, Prototyping, Test Case Generation, Traceability Analysis</text>
    <text x="35" y="550" font-family="Arial" font-size="10" fill="#333">Analysis vs Design: Analysis describes WHAT system does; Design describes HOW it implements functionality</text>
    <rect x="35" y="560" width="100" height="22" fill="#388e3c" rx="4"/>
    <text x="85" y="575" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">DFD</text>
    <rect x="145" y="560" width="100" height="22" fill="#ff9800" rx="4"/>
    <text x="195" y="575" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">ER Diagram</text>
    <rect x="255" y="560" width="100" height="22" fill="#9c27b0" rx="4"/>
    <text x="305" y="575" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Use Case</text>
    <rect x="365" y="560" width="100" height="22" fill="#f44336" rx="4"/>
    <text x="415" y="575" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Class Diagram</text>
    <rect x="475" y="560" width="100" height="22" fill="#1976d2" rx="4"/>
    <text x="525" y="575" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">State Diagram</text>
    <text x="620" y="570" font-family="Arial" font-size="9" fill="#666">Complete Requirements Model</text>
  </g>
</svg>