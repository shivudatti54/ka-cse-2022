<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Flow-oriented modeling represents how data transforms through a system using Data Flow Diagrams (DFDs), a core technique in structured systems analysis.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Flow-Oriented Modeling</text>
  </g>
  
  <g class="step" id="step1" data-narration="DFDs use four symbols: External Entities (squares) transform data, Processes (circles) are actors, Data Stores hold information, and Data Flows show movement.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Four DFD Symbols</text>
    <rect x="40" y="85" width="50" height="35" fill="none" stroke="#1976d2" stroke-width="2"/>
    <text x="65" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Entity</text>
    <circle cx="165" cy="102" r="18" fill="none" stroke="#388e3c" stroke-width="2"/>
    <text x="165" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Process</text>
    <rect x="270" y="85" width="55" height="35" fill="none" stroke="#ff9800" stroke-width="2"/>
    <text x="297" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Data Store</text>
    <line x1="360" y1="90" x2="410" y2="90" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="385" y="82" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Data Flow</text>
    <text x="460" y="78" font-family="Arial" font-size="9" fill="#666">DFDs show how data moves and transforms through</text>
    <text x="460" y="92" font-family="Arial" font-size="9" fill="#666">a system, emphasizing dynamic behavior over static</text>
    <text x="460" y="106" font-family="Arial" font-size="9" fill="#666">structure, popularized by Constantine and Yourdon.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Context Diagram (Level 0) shows the system as one process. Level 1 decomposes into 3-7 major processes. Level 2+ shows further detail of subprocesses.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="1" rx="5"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">DFD Levels of Abstraction</text>
    <rect x="40" y="175" width="100" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="3"/>
    <text x="90" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Context (L0)</text>
    <line x1="140" y1="195" x2="180" y2="195" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-green)"/>
    <rect x="180" y="175" width="100" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="3"/>
    <text x="230" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Level 1</text>
    <line x1="280" y1="195" x2="320" y2="195" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-green)"/>
    <rect x="320" y="175" width="100" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="3"/>
    <text x="370" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Level 2+</text>
    <text x="450" y="180" font-family="Arial" font-size="9" fill="#666">Each level adds detail. Processes</text>
    <text x="450" y="194" font-family="Arial" font-size="9" fill="#666">decompose to show sub-processes.</text>
    <text x="450" y="208" font-family="Arial" font-size="9" fill="#666">Balance parent-child levels.</text>
  </g>
  
  <g class="step" id="step3" data-narration="DFD rules: Every process needs input and output. Data stores must have data flowing in and out. No direct flow between external entities.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="1" rx="5"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">DFD Construction Rules</text>
    <rect x="40" y="262" width="170" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="125" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Process</text>
    <text x="125" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Input + Output required</text>
    <rect x="220" y="262" width="170" height="45" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="305" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Data Store</text>
    <text x="305" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Input AND output</text>
    <rect x="400" y="262" width="170" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="485" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Entity</text>
    <text x="485" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">No direct flow</text>
    <rect x="580" y="262" width="180" height="45" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="670" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Data Flow</text>
    <text x="670" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Must connect to process</text>
  </g>
  
  <g class="step" id="step4" data-narration="Example shows Library System Context Diagram with one process connected to Member, Librarian, and Supplier external entities with data flows between them.">
    <rect x="20" y="322" width="760" height="98" fill="#ffffff" stroke="#e8f5e9" stroke-width="1" rx="5"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example: Context Diagram</text>
    <circle cx="400" cy="370" r="25" fill="none" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="366" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Library</text>
    <text x="400" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">System</text>
    <rect x="120" y="345" width="50" height="30" fill="none" stroke="#1976d2" stroke-width="2"/>
    <text x="145" y="363" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Member</text>
    <line x1="170" y1="360" x2="375" y2="360" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <rect x="630" y="345" width="50" height="30" fill="none" stroke="#1976d2" stroke-width="2"/>
    <text x="655" y="363" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Librarian</text>
    <line x1="425" y1="360" x2="630" y2="360" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <rect x="630" y="385" width="50" height="30" fill="none" stroke="#1976d2" stroke-width="2"/>
    <text x="655" y="403" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Supplier</text>
    <line x1="425" y1="395" x2="630" y2="395" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  </g>
  
  <g class="step" id="step5" data-narration="Exam tips: Remember four DFD symbols, context diagram is Level 0, processes must transform data, use verb-object naming, and balance decomposed DFDs.">
    <rect x="20" y="428" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="1" rx="5"/>
    <text x="40" y="445" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips &amp; Common Mistakes</text>
    <rect x="40" y="455" width="220" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="150" y="470" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Remember</text>
    <text x="150" y="485" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Four DFD symbols | Context = Level 0</text>
    <rect x="270" y="455" width="220" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="380" y="470" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Process Naming</text>
    <text x="380" y="485" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Verb + Object (e.g., Calculate Total)</text>
    <rect x="500" y="455" width="260" height="45" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="630" y="470" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Avoid</text>
    <text x="630" y="485" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Process without input/output | Direct entity flow</text>
  </g>
</svg>