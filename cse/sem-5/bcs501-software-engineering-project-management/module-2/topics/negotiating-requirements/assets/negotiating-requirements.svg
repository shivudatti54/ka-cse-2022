<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Requirements negotiation reconciles conflicting stakeholder interests, priorities, and constraints to produce acceptable specifications that enable successful software project delivery and customer satisfaction.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Negotiating Requirements</text>
  </g>
  
  <!-- step1: Understanding Stakeholder Conflicts -->
  <g class="step" id="step1" data-narration="Stakeholder conflicts arise when functional requirements, quality attributes, budget limitations, or aggressive timeline constraints clash between different parties with competing interests and priorities.">
    <rect x="50" y="58" width="700" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Understanding Stakeholder Conflicts</text>
    <rect x="70" y="90" width="140" height="60" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="140" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Functional Conflicts</text>
    <text x="140" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Feature A vs Feature B</text>
    <rect x="220" y="90" width="140" height="60" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="290" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Quality Conflicts</text>
    <text x="290" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Performance vs Security</text>
    <rect x="370" y="90" width="140" height="60" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="440" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Resource Constraints</text>
    <text x="440" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Budget Limitations</text>
    <rect x="520" y="90" width="140" height="60" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="590" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Timeline Conflicts</text>
    <text x="590" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Aggressive Deadlines</text>
  </g>
  
  <!-- step2: Win-Win Approach -->
  <g class="step" id="step2" data-narration="The Win-Win approach by Fisher and Ury separates positions from interests, generates mutual gain options, uses objective criteria, and knows BATNA.">
    <rect x="50" y="166" width="700" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="70" y="186" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">2. The Win-Win Approach (Fisher &amp; Ury)</text>
    <rect x="70" y="200" width="155" height="58" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="147" y="218" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Separate Positions</text>
    <text x="147" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">from Interests</text>
    <rect x="235" y="200" width="155" height="58" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="312" y="218" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Generate Options</text>
    <text x="312" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">for Mutual Gain</text>
    <rect x="400" y="200" width="155" height="58" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="477" y="218" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Use Objective</text>
    <text x="477" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Criteria</text>
    <rect x="565" y="200" width="155" height="58" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="642" y="218" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Know Your</text>
    <text x="642" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">BATNA</text>
  </g>
  
  <!-- step3: Requirements Prioritization -->
  <g class="step" id="step3" data-narration="MoSCoW method prioritizes requirements as Must Have, Should Have, Could Have, and Won't Have. The Kano model classifies needs into Basic Requirements, Performance Needs, and Delighters that create customer satisfaction.">
    <rect x="50" y="274" width="700" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="70" y="294" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">3. Requirements Prioritization Techniques</text>
    <text x="70" y="315" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">MoSCoW Method</text>
    <rect x="70" y="322" width="90" height="44" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="115" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Must Have</text>
    <text x="115" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Project fails without</text>
    <rect x="170" y="322" width="90" height="44" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="215" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Should Have</text>
    <text x="215" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Significant value</text>
    <rect x="270" y="322" width="90" height="44" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="315" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Could Have</text>
    <text x="315" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Desirable not essential</text>
    <rect x="370" y="322" width="90" height="44" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="415" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#6a1b9a">Won't Have</text>
    <text x="415" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Excluded now</text>
    <text x="480" y="315" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Kano Model</text>
    <rect x="480" y="322" width="130" height="44" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="545" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Basic Needs</text>
    <text x="545" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Absence causes dissatisfaction</text>
    <rect x="620" y="322" width="130" height="44" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="685" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Performance</text>
    <text x="685" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">More is better</text>
    <rect x="760" y="322" width="130" height="44" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="825" y="340" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Delighters</text>
    <text x="825" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Unexpected delight</text>
  </g>
  
  <!-- step4: Negotiation Strategies -->
  <g class="step" id="step4" data-narration="Five fundamental negotiation strategies include competing, collaborating, compromising, avoiding, and accommodating. The collaborative or win-win approach typically yields the best outcomes for all stakeholders in requirements negotiations.">
    <rect x="50" y="382" width="700" height="100" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="70" y="402" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">4. Negotiation Strategies</text>
    <rect x="70" y="415" width="110" height="60" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="125" y="435" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Competing</text>
    <text x="125" y="450" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Pursue objectives</text>
    <text x="125" y="460" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">aggressively</text>
    <rect x="190" y="415" width="110" height="60" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="245" y="435" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Collaborating</text>
    <text x="245" y="450" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Find integrative</text>
    <text x="245" y="460" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">solutions together</text>
    <rect x="310" y="415" width="110" height="60" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="365" y="435" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Compromising</text>
    <text x="365" y="450" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Split differences</text>
    <text x="365" y="460" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">reach middle ground</text>
    <rect x="430" y="415" width="110" height="60" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="485" y="435" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Avoiding</text>
    <text x="485" y="450" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Postpone or</text>
    <text x="485" y="460" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">sidestep issues</text>
    <rect x="550" y="415" width="110" height="60" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="605" y="435" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Accommodating</text>
    <text x="605" y="450" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Yield to other</text>
    <text x="605" y="460" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">party's preference</text>
    <rect x="670" y="415" width="80" height="60" rx="4" fill="#e0e0e0" stroke="#757575" stroke-width="1"/>
    <text x="710" y="435" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#424242">Best</text>
    <text x="710" y="447" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#424242">Outcome</text>
    <text x="710" y="460" text-anchor="middle" font-family="Arial" font-size="7" fill="#424242">Collaborating</text>
  </g>
  
  <!-- step5: Validation & Example -->
  <g class="step" id="step5" data-narration="Requirements validation employs systematic reviews, interactive prototyping, and formal sign-off processes to confirm accuracy. Change management procedures handle modifications professionally after initial project agreement is established.">
    <rect x="50" y="490" width="700" height="98" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="70" y="510" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">5. Validation &amp; Conflict Resolution</text>
    <rect x="70" y="522" width="100" height="58" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="120" y="542" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Review Meetings</text>
    <text x="120" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Stakeholder approval</text>
    <rect x="180" y="522" width="100" height="58" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="230" y="542" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Prototyping</text>
    <text x="230" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Demonstrate mockups</text>
    <rect x="290" y="522" width="100" height="58" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="340" y="542" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Sign-off Process</text>
    <text x="340" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Formal agreement</text>
    <rect x="400" y="522" width="100" height="58" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="450" y="542" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Change Management</text>
    <text x="450" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Handle future changes</text>
    <text x="560" y="522" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Resolution Techniques</text>
    <rect x="560" y="532" width="180" height="48" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="650" y="548" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Problem Solving, Smoothing,</text>
    <text x="650" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Forcing, Compromise</text>
  </g>
</svg>