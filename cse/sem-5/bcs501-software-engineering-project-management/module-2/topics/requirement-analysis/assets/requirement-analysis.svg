<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Requirement Analysis bridges problem definition and solution design in SDLC. It identifies what stakeholders truly need. Poor requirements cause 40-60% of project failures.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Requirement Analysis and SRS</text>
  </g>
  
  <!-- step1: Requirements Engineering -->
  <g class="step" id="step1" data-narration="Requirements Engineering has four activities: Elicitation gathers stakeholder needs, Analysis refines and resolves conflicts, Specification documents formally, and Validation ensures correctness.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Requirements Engineering Process</text>
    <rect x="40" y="95" width="140" height="35" fill="#1976d2" rx="3"/>
    <text x="110" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Elicitation</text>
    <rect x="190" y="95" width="140" height="35" fill="#1976d2" rx="3"/>
    <text x="260" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Analysis</text>
    <rect x="340" y="95" width="140" height="35" fill="#1976d2" rx="3"/>
    <text x="410" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Specification</text>
    <rect x="490" y="95" width="140" height="35" fill="#1976d2" rx="3"/>
    <text x="560" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Validation</text>
    <line x1="180" y1="112" x2="190" y2="112" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="330" y1="112" x2="340" y2="112" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="480" y1="112" x2="490" y2="112" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- step2: Types of Requirements -->
  <g class="step" id="step2" data-narration="Functional requirements describe WHAT the system does (behaviors, features). Non-functional requirements describe HOW the system performs (quality attributes like performance and security).">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Types of Requirements</text>
    <rect x="40" y="185" width="340" height="35" fill="#c8e6c9" rx="3"/>
    <text x="60" y="200" font-family="Arial" font-size="10" fill="#2e7d32">Functional: What system DOES</text>
    <text x="60" y="212" font-family="Arial" font-size="9" fill="#388e3c">Authentication, Data processing, Reports</text>
    <rect x="400" y="185" width="340" height="35" fill="#c8e6c9" rx="3"/>
    <text x="420" y="200" font-family="Arial" font-size="10" fill="#2e7d32">Non-Functional: How system PERFORMS</text>
    <text x="420" y="212" font-family="Arial" font-size="9" fill="#388e3c">Performance, Security, Reliability</text>
  </g>
  
  <!-- step3: Gathering Techniques -->
  <g class="step" id="step3" data-narration="Requirements gathering uses interviews for detailed understanding, questionnaires for large groups, observation for workflows, prototyping for unclear needs, and JAD workshops for collaboration.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Requirements Gathering Techniques</text>
    <rect x="40" y="270" width="110" height="38" fill="#ffe0b2" rx="3"/>
    <text x="95" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Interviews</text>
    <text x="95" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Detailed needs</text>
    <rect x="160" y="270" width="110" height="38" fill="#ffe0b2" rx="3"/>
    <text x="215" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Questionnaires</text>
    <text x="215" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Large groups</text>
    <rect x="280" y="270" width="110" height="38" fill="#ffe0b2" rx="3"/>
    <text x="335" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Observation</text>
    <text x="335" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Workflow study</text>
    <rect x="400" y="270" width="110" height="38" fill="#ffe0b2" rx="3"/>
    <text x="455" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Prototyping</text>
    <text x="455" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Validate understanding</text>
    <rect x="520" y="270" width="110" height="38" fill="#ffe0b2" rx="3"/>
    <text x="575" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">JAD Workshops</text>
    <text x="575" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Collaboration</text>
    <rect x="640" y="270" width="110" height="38" fill="#ffe0b2" rx="3"/>
    <text x="695" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Document Analysis</text>
    <text x="695" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Existing systems</text>
  </g>
  
  <!-- step4: SRS Document -->
  <g class="step" id="step4" data-narration="SRS following IEEE 829 includes Introduction (purpose, scope), Overall Description (user characteristics, constraints), Functional Requirements, and Non-Functional Requirements. The IEEE 829 standard provides a comprehensive framework for software documentation.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">SRS Document Structure (IEEE 829)</text>
    <rect x="40" y="360" width="175" height="35" fill="#e1bee7" rx="3"/>
    <text x="127" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">1. Introduction</text>
    <text x="127" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Purpose, Scope, Definitions</text>
    <rect x="225" y="360" width="175" height="35" fill="#e1bee7" rx="3"/>
    <text x="312" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">2. Overall Description</text>
    <text x="312" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">User characteristics, Constraints</text>
    <rect x="410" y="360" width="175" height="35" fill="#e1bee7" rx="3"/>
    <text x="497" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">3. Functional Req</text>
    <text x="497" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Behaviors, Features, Inputs</text>
    <rect x="595" y="360" width="175" height="35" fill="#e1bee7" rx="3"/>
    <text x="682" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">4. Non-Functional Req</text>
    <text x="682" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Performance, Security</text>
  </g>
  
  <!-- step5: Use Case Modeling -->
  <g class="step" id="step5" data-narration="Use cases model system functionality through actors (external entities), use cases (system functions), relationships (include/extend), and flow events with pre/post conditions.">
    <rect x="20" y="410" width="760" height="80" fill="#e1f5fe" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#0277bd">Use Case Modeling</text>
    <rect x="40" y="448" width="150" height="35" fill="#b3e5fc" rx="3"/>
    <text x="115" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b">Actor</text>
    <text x="115" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">External entity</text>
    <rect x="200" y="448" width="150" height="35" fill="#b3e5fc" rx="3"/>
    <text x="275" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b">Use Case</text>
    <text x="275" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">System function</text>
    <rect x="360" y="448" width="150" height="35" fill="#b3e5fc" rx="3"/>
    <text x="435" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b">Pre-condition</text>
    <text x="435" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">Required state</text>
    <rect x="520" y="448" width="150" height="35" fill="#b3e5fc" rx="3"/>
    <text x="595" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b">Post-condition</text>
    <text x="595" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">Final state</text>
    <rect x="680" y="448" width="80" height="35" fill="#b3e5fc" rx="3"/>
    <text x="720" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="#01579b">Flow</text>
    <text x="720" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">Events</text>
  </g>
  
  <!-- step6: Requirements Management -->
  <g class="step" id="step6" data-narration="Requirements management ensures traceability between requirements and artifacts, uses version control, implements change control, and applies prioritization like MoSCoW (Must, Should, Could, Won't).">
    <rect x="20" y="498" width="760" height="90" fill="#ffebee" rx="5"/>
    <text x="40" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Requirements Management</text>
    <rect x="40" y="535" width="165" height="45" fill="#ffcdd2" rx="3"/>
    <text x="122" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Traceability</text>
    <text x="122" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Link requirements</text>
    <text x="122" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">to design/code</text>
    <rect x="215" y="535" width="165" height="45" fill="#ffcdd2" rx="3"/>
    <text x="297" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Version Control</text>
    <text x="297" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Track changes</text>
    <text x="297" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">to requirements</text>
    <rect x="390" y="535" width="165" height="45" fill="#ffcdd2" rx="3"/>
    <text x="472" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Change Control</text>
    <text x="472" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Formal approval</text>
    <text x="472" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">process for changes</text>
    <rect x="565" y="535" width="195" height="45" fill="#ffcdd2" rx="3"/>
    <text x="662" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">MoSCoW Prioritization</text>
    <text x="662" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Must | Should | Could | Won't</text>
  </g>
</svg>