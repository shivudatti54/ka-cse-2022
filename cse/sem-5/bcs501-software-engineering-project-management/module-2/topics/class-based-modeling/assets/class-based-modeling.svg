<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Class-Based Modeling, a fundamental paradigm in object-oriented programming that creates blueprints for objects with defined attributes and behaviors.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Class-Based Modeling</text>
  </g>

  <!-- step1: Classes and Objects -->
  <g class="step" id="step1" data-narration="A class is a user-defined blueprint defining attributes and methods. An object is an instance occupying memory with unique identity.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Classes and Objects</text>
    <rect x="40" y="88" width="220" height="45" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="9" fill="#333">class Rectangle {</text>
    <text x="50" y="114" font-family="Arial" font-size="9" fill="#333">  private double length;</text>
    <text x="50" y="126" font-family="Arial" font-size="9" fill="#333">  public double area() {...}</text>
    <text x="50" y="138" font-family="Arial" font-size="9" fill="#333">}</text>
    <path d="M280,110 L310,110" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <text x="295" y="100" font-family="Arial" font-size="8" fill="#1976d2">instance</text>
    <rect x="320" y="88" width="200" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="330" y="102" font-family="Arial" font-size="9" fill="#333">Rectangle rect =</text>
    <text x="330" y="114" font-family="Arial" font-size="9" fill="#333">new Rectangle();</text>
    <text x="330" y="126" font-family="Arial" font-size="8" fill="#666">(object in heap)</text>
    <text x="560" y="95" font-family="Arial" font-size="9" fill="#666">Blueprint → Instance</text>
    <text x="560" y="110" font-family="Arial" font-size="9" fill="#666">Cookie cutter → Cookie</text>
  </g>

  <!-- step2: Encapsulation -->
  <g class="step" id="step2" data-narration="Encapsulation bundles data with methods and restricts direct access using private, protected, and public modifiers for robust data protection and security.">
    <rect x="20" y="152" width="760" height="75" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="172" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Encapsulation</text>
    <rect x="40" y="182" width="300" height="35" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="195" font-family="Arial" font-size="9" fill="#333">private int marks;</text>
    <text x="50" y="207" font-family="Arial" font-size="9" fill="#333">// Hidden from outside</text>
    <rect x="360" y="182" width="180" height="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="370" y="195" font-family="Arial" font-size="9" fill="#333">public void setMarks(int m)</text>
    <text x="370" y="207" font-family="Arial" font-size="9" fill="#333">{ if(valid) marks=m; }</text>
    <rect x="560" y="182" width="200" height="35" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="570" y="195" font-family="Arial" font-size="9" fill="#333">Invalid: marks = -50</text>
    <text x="570" y="207" font-family="Arial" font-size="9" fill="#333">Blocked by validation!</text>
  </g>

  <!-- step3: Constructors -->
  <g class="step" id="step3" data-narration="Constructors initialize objects when created. Types include default, parameterized, and copy constructors with same name as class, no return type.">
    <rect x="20" y="236" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Constructors</text>
    <rect x="40" y="266" width="230" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="50" y="280" font-family="Arial" font-size="9" fill="#333">// Default Constructor</text>
    <text x="50" y="292" font-family="Arial" font-size="9" fill="#333">public Rectangle() {</text>
    <text x="50" y="304" font-family="Arial" font-size="9" fill="#333">  length=1; breadth=1;</text>
    <text x="50" y="316" font-family="Arial" font-size="9" fill="#333">}</text>
    <rect x="280" y="266" width="230" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="290" y="280" font-family="Arial" font-size="9" fill="#333">// Parameterized</text>
    <text x="290" y="292" font-family="Arial" font-size="9" fill="#333">public Rectangle(double l,</text>
    <text x="290" y="304" font-family="Arial" font-size="9" fill="#333">  double b) { length=l; }</text>
    <rect x="520" y="266" width="240" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="530" y="280" font-family="Arial" font-size="9" fill="#333">// Copy Constructor</text>
    <text x="530" y="292" font-family="Arial" font-size="9" fill="#333">public Rectangle(Rect r) {</text>
    <text x="530" y="304" font-family="Arial" font-size="9" fill="#333">  length=r.length; }</text>
  </g>

  <!-- step4: Access Specifiers -->
  <g class="step" id="step4" data-narration="Access specifiers control member visibility in classes: private restricts to class, protected permits subclass and package access, public allows universal access.">
    <rect x="20" y="325" width="760" height="78" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="345" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Access Specifiers</text>
    <rect x="40" y="355" width="170" height="40" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">private</text>
    <text x="50" y="380" font-family="Arial" font-size="8" fill="#666">Class only</text>
    <text x="50" y="390" font-family="Arial" font-size="8" fill="#666">Data hiding</text>
    <rect x="220" y="355" width="170" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="230" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">protected</text>
    <text x="230" y="380" font-family="Arial" font-size="8" fill="#666">Class + Subclass</text>
    <text x="230" y="390" font-family="Arial" font-size="8" fill="#666">+ Same package</text>
    <rect x="400" y="355" width="170" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="410" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">public</text>
    <text x="410" y="380" font-family="Arial" font-size="8" fill="#666">Anywhere</text>
    <text x="410" y="390" font-family="Arial" font-size="8" fill="#666">No restriction</text>
    <rect x="580" y="355" width="180" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="590" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">default</text>
    <text x="590" y="380" font-family="Arial" font-size="8" fill="#666">Package-private</text>
    <text x="590" y="390" font-family="Arial" font-size="8" fill="#666">Same package only</text>
  </g>

  <!-- step5: Class Relationships -->
  <g class="step" id="step5" data-narration="Class relationships define object connections: association for simple usage, aggregation for weak ownership, composition for strong ownership, and inheritance for specialization.">
    <rect x="20" y="412" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Class Relationships</text>
    <rect x="40" y="442" width="165" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Association</text>
    <text x="50" y="467" font-family="Arial" font-size="8" fill="#666">"uses-a"</text>
    <text x="50" y="478" font-family="Arial" font-size="8" fill="#666">Teacher teaches Course</text>
    <rect x="215" y="442" width="165" height="42" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="225" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Aggregation</text>
    <text x="225" y="467" font-family="Arial" font-size="8" fill="#666">"has-a" (weak)</text>
    <text x="225" y="478" font-family="Arial" font-size="8" fill="#666">Dept has Teachers</text>
    <rect x="390" y="442" width="165" height="42" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="400" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Composition</text>
    <text x="400" y="467" font-family="Arial" font-size="8" fill="#666">"has-a" (strong)</text>
    <text x="400" y="478" font-family="Arial" font-size="8" fill="#666">Car has Engine</text>
    <rect x="565" y="442" width="195" height="42" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="575" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Inheritance</text>
    <text x="575" y="467" font-family="Arial" font-size="8" fill="#666">"is-a" relationship</text>
    <text x="575" y="478" font-family="Arial" font-size="8" fill="#666">Student extends Person</text>
  </g>

  <!-- step6: Static Members -->
  <g class="step" id="step6" data-narration="Static members belong to class, not individual objects. Shared across all instances and accessed directly via class name without requiring object instantiation.">
    <rect x="20" y="501" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="521" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Static Members</text>
    <rect x="40" y="531" width="340" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="545" font-family="Arial" font-size="9" fill="#333">class Bank {</text>
    <text x="50" y="557" font-family="Arial" font-size="9" fill="#333">  static int totalAccounts;</text>
    <text x="50" y="569" font-family="Arial" font-size="9" fill="#333">  static int getTotalAccounts()</text>
    <rect x="400" y="531" width="200" height="42" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="410" y="545" font-family="Arial" font-size="9" fill="#333">// Usage</text>
    <text x="410" y="557" font-family="Arial" font-size="9" fill="#333">Bank b1 = new Bank();</text>
    <text x="410" y="569" font-family="Arial" font-size="9" fill="#333">Bank.getTotalAccounts()</text>
    <rect x="610" y="531" width="150" height="42" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="620" y="545" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Remember:</text>
    <text x="620" y="557" font-family="Arial" font-size="8" fill="#333">Static cannot use</text>
    <text x="620" y="569" font-family="Arial" font-size="8" fill="#333">this or instance vars</text>
  </g>
</svg>