<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Scenario-based modeling uses real-world situations to describe how users interact with a system, making abstract requirements concrete and understandable for all stakeholders.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Scenario-Based Modeling</text>
  </g>
  
  <g class="step" id="step1" data-narration="A scenario is a single example of system interaction, while a use case is a collection of related scenarios describing complete functionality.">
    <rect x="20" y="58" width="760" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Scenarios vs Use Cases</text>
    <rect x="40" y="92" width="220" height="55" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="150" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">SCENARIO</text>
    <text x="150" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Single path example</text>
    <text x="150" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">of system interaction</text>
    <path d="M270,120 L320,120" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="330" y="92" width="220" height="55" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="440" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">USE CASE</text>
    <text x="440" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Collection of scenarios</text>
    <text x="440" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">for a complete function</text>
    <path d="M560,120 L610,120" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <rect x="620" y="92" width="140" height="55" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="690" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">One Use Case</text>
    <text x="690" y="135" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Contains Multiple</text>
    <text x="690" y="147" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Scenarios</text>
  </g>
  
  <g class="step" id="step2" data-narration="A use case has key components: actors who interact, preconditions before starting, the flow of events, and postconditions after completion.">
    <rect x="20" y="166" width="760" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="188" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Use Case Components</text>
    <rect x="40" y="202" width="110" height="55" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="95" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">ACTOR</text>
    <text x="95" y="235" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">User or external</text>
    <text x="95" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">system</text>
    <rect x="160" y="202" width="110" height="55" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="215" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">PRECONDITIONS</text>
    <text x="215" y="235" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Must be true</text>
    <text x="215" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">before starting</text>
    <rect x="280" y="202" width="110" height="55" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="335" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">MAIN FLOW</text>
    <text x="335" y="235" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Primary successful</text>
    <text x="335" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">path to goal</text>
    <rect x="400" y="202" width="130" height="55" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="465" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">ALTERNATIVE FLOWS</text>
    <text x="465" y="235" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Different ways to</text>
    <text x="465" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">achieve goal</text>
    <rect x="540" y="202" width="110" height="55" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="595" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">EXCEPTION FLOWS</text>
    <text x="595" y="235" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Error handling</text>
    <text x="595" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">paths</text>
    <rect x="660" y="202" width="110" height="55" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="715" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">POSTCONDITIONS</text>
    <text x="715" y="235" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Must be true</text>
    <text x="715" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">after completion</text>
  </g>
  
  <g class="step" id="step3" data-narration="Main flow is the happy path. Alternative flows handle user choices, while exception flows handle unexpected errors like network failures.">
    <rect x="20" y="274" width="760" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="296" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Flow Types Explained</text>
    <rect x="40" y="312" width="230" height="55" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="155" y="332" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">MAIN FLOW</text>
    <text x="155" y="350" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Happy path - successful</text>
    <text x="155" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">goal achievement</text>
    <rect x="285" y="312" width="230" height="55" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="400" y="332" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">ALTERNATIVE FLOW</text>
    <text x="400" y="350" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">User choices - planned</text>
    <text x="400" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">variations to goal</text>
    <rect x="530" y="312" width="230" height="55" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="645" y="332" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336" font-weight="bold">EXCEPTION FLOW</text>
    <text x="645" y="350" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Error handling - system</text>
    <text x="645" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">failures, rollback</text>
  </g>
  
  <g class="step" id="step4" data-narration="In online banking fund transfer, the main flow shows successful transfer, while alternative flows handle invalid accounts and exceeded limits.">
    <rect x="20" y="382" width="760" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="404" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Example: Online Banking Fund Transfer</text>
    <rect x="40" y="420" width="700" height="55" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="390" y="440" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0" font-weight="bold">Use Case: Transfer Funds</text>
    <text x="120" y="458" font-family="Arial" font-size="9" fill="#333">Actors: Customer, Banking System</text>
    <text x="120" y="472" font-family="Arial" font-size="9" fill="#333">Main: Select option → Enter details → Confirm → Amount debited</text>
    <text x="480" y="458" font-family="Arial" font-size="9" fill="#ff9800">Alt: Invalid account / Limit exceeded</text>
    <text x="480" y="472" font-family="Arial" font-size="9" fill="#f44336">Exc: Network failure / Rollback transaction</text>
  </g>
  
  <g class="step" id="step5" data-narration="Scenario-based modeling bridges communication gaps between technical and business teams, identifies defects early in development, and generates comprehensive test scenarios for thorough validation across all system functions.">
    <rect x="20" y="490" width="760" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="512" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Key Advantages &amp; Exam Tips</text>
    <rect x="40" y="525" width="145" height="48" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="112" y="542" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">Stakeholder</text>
    <text x="112" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Communication</text>
    <text x="112" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Bridge gap</text>
    <rect x="195" y="525" width="145" height="48" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="267" y="542" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">Early Error</text>
    <text x="267" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Detection</text>
    <text x="267" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Identify gaps</text>
    <rect x="350" y="525" width="145" height="48" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="422" y="542" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">Test Case</text>
    <text x="422" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Generation</text>
    <text x="422" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Validation basis</text>
    <rect x="505" y="525" width="145" height="48" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="577" y="542" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">Remember</text>
    <text x="577" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Scenario = single</text>
    <text x="577" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">path, Use Case = collection</text>
    <rect x="660" y="525" width="110" height="48" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="715" y="542" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Relationships</text>
    <text x="715" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">&lt;&lt;include&gt;&gt;</text>
    <text x="715" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">&lt;&lt;extend&gt;&gt;</text>
  </g>
</svg>