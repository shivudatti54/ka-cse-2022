<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Requirements elicitation is gathering stakeholder needs and expectations for a software system, forming the critical foundation of successful SDLC projects.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Eliciting Requirements in Software Engineering</text>
  </g>

  <g class="step" id="step1" data-narration="Requirements elicitation discovers and gathers what stakeholders need for their software system, including business processes, quality attributes, technical limitations, regulatory compliance, and functional specifications.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition &amp; Scope</text>
    <rect x="70" y="88" width="150" height="40" rx="3" fill="#e3f2fd"/>
    <text x="95" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Functional</text>
    <text x="95" y="114" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">What system does</text>
    <rect x="230" y="88" width="150" height="40" rx="3" fill="#e8f5e9"/>
    <text x="255" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Non-Functional</text>
    <text x="255" y="114" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">How it performs</text>
    <rect x="390" y="88" width="150" height="40" rx="3" fill="#fff3e0"/>
    <text x="415" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Constraints</text>
    <text x="415" y="114" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Limitations</text>
    <rect x="550" y="88" width="180" height="40" rx="3" fill="#f3e5f5"/>
    <text x="640" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Stakeholders</text>
    <text x="640" y="117" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Users, Managers, Experts</text>
  </g>

  <g class="step" id="step2" data-narration="Classical techniques include interviews for direct dialogue, questionnaires for large groups, observation to uncover hidden practices, and document analysis for context.">
    <rect x="50" y="146" width="700" height="80" rx="5" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Classical Techniques</text>
    <rect x="70" y="176" width="155" height="42" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="147" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Interviews</text>
    <text x="147" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Structured/Unstructured</text>
    <text x="147" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Direct clarification</text>
    <rect x="235" y="176" width="155" height="42" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="312" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Questionnaires</text>
    <text x="312" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Large stakeholder groups</text>
    <text x="312" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Quantitative data</text>
    <rect x="400" y="176" width="155" height="42" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="477" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Observation</text>
    <text x="477" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Ethnography/Job shadow</text>
    <text x="477" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Uncovers tacit knowledge</text>
    <rect x="565" y="176" width="165" height="42" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="647" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Document Analysis</text>
    <text x="647" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Existing systems</text>
    <text x="647" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Background context</text>
  </g>

  <g class="step" id="step3" data-narration="Modern techniques include JAD workshops for consensus, use cases for user perspective, prototyping for visual feedback, and brainstorming for creative ideas.">
    <rect x="50" y="234" width="700" height="80" rx="5" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Modern Techniques</text>
    <rect x="70" y="264" width="155" height="42" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="147" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">JAD Sessions</text>
    <text x="147" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Stakeholder workshops</text>
    <text x="147" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Faster consensus</text>
    <rect x="235" y="264" width="155" height="42" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="312" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Use Case Modeling</text>
    <text x="312" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Actor-goal-steps</text>
    <text x="312" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">User perspective</text>
    <rect x="400" y="264" width="155" height="42" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="477" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Prototyping</text>
    <text x="477" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">UI mockups</text>
    <text x="477" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Visual feedback</text>
    <rect x="565" y="264" width="165" height="42" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="647" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Brainstorming</text>
    <text x="647" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Creative idea generation</text>
    <text x="647" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Lateral thinking</text>
  </g>

  <g class="step" id="step4" data-narration="Stakeholder analysis identifies all interested parties including primary users, secondary staff, and tertiary regulators, while power-interest grids help prioritize engagement strategies effectively.">
    <rect x="50" y="322" width="700" height="90" rx="5" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="70" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Stakeholder Analysis</text>
    <rect x="70" y="355" width="210" height="38" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="175" y="369" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Primary Stakeholders</text>
    <text x="175" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">End Users, Customers</text>
    <rect x="290" y="355" width="210" height="38" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="395" y="369" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Secondary Stakeholders</text>
    <text x="395" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Internal Staff, Managers</text>
    <rect x="510" y="355" width="220" height="38" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="620" y="369" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Tertiary Stakeholders</text>
    <text x="620" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Regulators, External Parties</text>
    <text x="400" y="405" font-family="Arial" font-size="9" fill="#666">Use power-interest matrices to prioritize engagement strategies</text>
  </g>

  <g class="step" id="step5" data-narration="Elicitation challenges include scope creep where requirements expand beyond boundaries, tacit knowledge that is hard to articulate, and conflicting stakeholder priorities requiring negotiation.">
    <rect x="50" y="420" width="700" height="80" rx="5" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="70" y="440" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Elicitation Challenges</text>
    <rect x="70" y="452" width="160" height="40" rx="3" fill="#ffebee"/>
    <text x="150" y="466" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Scope Creep</text>
    <text x="150" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Requirements expand</text>
    <text x="150" y="488" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">beyond boundaries</text>
    <rect x="240" y="452" width="160" height="40" rx="3" fill="#e3f2fd"/>
    <text x="320" y="466" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Tacit Knowledge</text>
    <text x="320" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Implicit understanding</text>
    <text x="320" y="488" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">hard to articulate</text>
    <rect x="410" y="452" width="160" height="40" rx="3" fill="#fff3e0"/>
    <text x="490" y="466" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Conflicting Requirements</text>
    <text x="490" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Different stakeholder</text>
    <text x="490" y="488" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">priorities conflict</text>
    <rect x="580" y="452" width="150" height="40" rx="3" fill="#f3e5f5"/>
    <text x="655" y="466" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Political Factors</text>
    <text x="655" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Organizational</text>
    <text x="655" y="488" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">influences</text>
  </g>

  <g class="step" id="step6" data-narration="Use multiple complementary techniques including interviews, observation, JAD workshops, and prototyping together to validate understanding and ensure thorough requirements elicitation iteratively.">
    <rect x="50" y="508" width="700" height="80" rx="5" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Best Practices &amp; Exam Tips</text>
    <rect x="70" y="540" width="215" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="177" y="555" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Combine Techniques</text>
    <text x="177" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Never rely on one method</text>
    <rect x="295" y="540" width="215" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="402" y="555" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Validate Requirements</text>
    <text x="402" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Confirm with stakeholders</text>
    <rect x="520" y="540" width="210" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="625" y="555" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Iterative Process</text>
    <text x="625" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Requirements evolve</text>
    <text x="400" y="580" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Remember: Elicitation ≠ Analysis | Prototypes validate, not implement</text>
  </g>
</svg>