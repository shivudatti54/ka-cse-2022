<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" data-topic-id="the-nature-of-software">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Nature of Software explores definition, characteristics, types, crisis, and evolution of software - the foundation of software engineering today.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" fill="white" font-size="16" font-weight="bold">The Nature of Software</text>
  </g>
  
  <g class="step" id="step1" data-narration="Software is a collection of programs, data, and documentation that instructs a computer system on how to perform specific tasks. It serves as the interface between users and hardware, translating human requirements into machine-executable instructions.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" fill="#1976d2" font-size="13" font-weight="bold">Definition of Software</text>
    <text x="40" y="100" fill="#333" font-size="10">Software is a collection of programs, data, and documentation that instructs a computer</text>
    <text x="40" y="115" fill="#333" font-size="10">system on how to perform specific tasks. It serves as the interface between</text>
    <text x="40" y="130" fill="#333" font-size="10">users and hardware, translating human requirements into machine-executable instructions.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Software has five key characteristics: developed not manufactured, does not wear out, custom-built for specific needs, complexity increases with scale, and flexibility for modifications.">
    <rect x="20" y="151" width="760" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="173" fill="#388e3c" font-size="13" font-weight="bold">Five Key Characteristics</text>
    <rect x="40" y="185" width="140" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="110" y="202" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Developed, Not</text>
    <text x="110" y="215" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Manufactured</text>
    <rect x="190" y="185" width="140" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="260" y="202" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Does Not</text>
    <text x="260" y="215" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Wear Out</text>
    <rect x="340" y="185" width="140" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="410" y="202" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Custom-Built</text>
    <text x="410" y="215" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">for Specific Needs</text>
    <rect x="490" y="185" width="140" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="560" y="202" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Complexity</text>
    <text x="560" y="215" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Increases with Scale</text>
    <rect x="640" y="185" width="130" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="705" y="202" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Flexible for</text>
    <text x="705" y="215" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold">Modifications</text>
  </g>
  
  <g class="step" id="step3" data-narration="Software is classified into System Software (OS, drivers) that manages hardware, and Application Software (MS Office, browsers) that serves user needs. Additional types include embedded, AI, and web applications.">
    <rect x="20" y="244" width="380" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="266" fill="#e65100" font-size="13" font-weight="bold">System Software</text>
    <text x="40" y="285" fill="#333" font-size="10">Manages and controls computer</text>
    <text x="40" y="300" fill="#333" font-size="10">hardware. Examples: Windows,</text>
    <text x="40" y="315" fill="#333" font-size="10">Linux, Android, Device Drivers</text>
    <rect x="130" y="275" width="80" height="50" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="170" y="300" text-anchor="middle" fill="#e65100" font-size="9" font-weight="bold">OS</text>
    <text x="170" y="315" text-anchor="middle" fill="#e65100" font-size="8">Kernel</text>
    <rect x="220" y="275" width="80" height="50" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="260" y="300" text-anchor="middle" fill="#e65100" font-size="9" font-weight="bold">Device</text>
    <text x="260" y="315" text-anchor="middle" fill="#e65100" font-size="8">Drivers</text>
    <rect x="310" y="275" width="80" height="50" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="350" y="300" text-anchor="middle" fill="#e65100" font-size="9" font-weight="bold">Utility</text>
    <text x="350" y="315" text-anchor="middle" fill="#e65100" font-size="8">Programs</text>
    
    <rect x="410" y="244" width="370" height="90" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="430" y="266" fill="#6a1b9a" font-size="13" font-weight="bold">Application Software</text>
    <text x="430" y="285" fill="#333" font-size="10">Performs specific user-oriented</text>
    <text x="430" y="300" fill="#333" font-size="10">tasks. Examples: MS Word, Chrome,</text>
    <text x="430" y="315" fill="#333" font-size="10">Photoshop, SAP ERP</text>
    <rect x="500" y="275" width="80" height="50" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="540" y="300" text-anchor="middle" fill="#6a1b9a" font-size="9" font-weight="bold">Business</text>
    <text x="540" y="315" text-anchor="middle" fill="#6a1b9a" font-size="8">Apps</text>
    <rect x="590" y="275" width="80" height="50" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="630" y="300" text-anchor="middle" fill="#6a1b9a" font-size="9" font-weight="bold">Web</text>
    <text x="630" y="315" text-anchor="middle" fill="#6a1b9a" font-size="8">Browsers</text>
    <rect x="680" y="275" width="90" height="50" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="725" y="300" text-anchor="middle" fill="#6a1b9a" font-size="9" font-weight="bold">Media</text>
    <text x="725" y="315" text-anchor="middle" fill="#6a1b9a" font-size="8">Tools</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Software Crisis (1960s) emerged when demand for complex software exceeded industry capability. Symptoms include budget overruns, schedule delays, poor quality, and unmet requirements, leading to the birth of software engineering.">
    <rect x="20" y="342" width="760" height="90" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="364" fill="#c62828" font-size="13" font-weight="bold">The Software Crisis (1960s)</text>
    <text x="40" y="385" fill="#333" font-size="10">The software crisis refers to difficulties in developing complex software within expected</text>
    <text x="40" y="400" fill="#333" font-size="10">timeframes and budgets while meeting quality requirements. This prompted the emergence</text>
    <text x="40" y="415" fill="#333" font-size="10">of software engineering as a discipline at the NATO Conference in 1968.</text>
    <rect x="500" y="360" width="260" height="60" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="630" y="380" text-anchor="middle" fill="#c62828" font-size="10" font-weight="bold">Symptoms</text>
    <text x="550" y="398" fill="#333" font-size="9">• Budget overruns</text>
    <text x="640" y="398" fill="#333" font-size="9">• Schedule delays</text>
    <text x="710" y="398" fill="#333" font-size="9">• Quality issues</text>
  </g>
  
  <g class="step" id="step5" data-narration="Software evolution progressed through phases: Early Computing → Structured Programming → Object-Oriented Era → Agile Methods → DevOps. Quality attributes include correctness, reliability, efficiency, usability, and maintainability.">
    <rect x="20" y="440" width="760" height="130" rx="5" fill="#e1bee7" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="462" fill="#6a1b9a" font-size="13" font-weight="bold">Evolution of Software Development</text>
    <rect x="40" y="475" width="110" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="95" y="490" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="bold">1940s-1950s</text>
    <text x="95" y="500" text-anchor="middle" fill="#6a1b9a" font-size="7">Early Computing</text>
    <line x1="150" y1="490" x2="175" y2="490" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="180" y="475" width="110" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="235" y="490" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="bold">1960s-1970s</text>
    <text x="235" y="500" text-anchor="middle" fill="#6a1b9a" font-size="7">Structured Prog.</text>
    <line x1="290" y1="490" x2="315" y2="490" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="320" y="475" width="110" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="375" y="490" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="bold">1980s-1990s</text>
    <text x="375" y="500" text-anchor="middle" fill="#6a1b9a" font-size="7">Object-Oriented</text>
    <line x1="430" y1="490" x2="455" y2="490" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="460" y="475" width="110" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="515" y="490" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="bold">2000s</text>
    <text x="515" y="500" text-anchor="middle" fill="#6a1b9a" font-size="7">Agile Methods</text>
    <line x1="570" y1="490" x2="595" y2="490" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="600" y="475" width="110" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="655" y="490" text-anchor="middle" fill="#6a1b9a" font-size="8" font-weight="bold">2010s-Present</text>
    <text x="655" y="500" text-anchor="middle" fill="#6a1b9a" font-size="7">DevOps</text>
    
    <text x="40" y="535" fill="#6a1b9a" font-size="13" font-weight="bold">Key Quality Attributes</text>
    <rect x="40" y="545" width="100" height="20" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="90" y="559" text-anchor="middle" fill="#6a1b9a" font-size="9">Correctness</text>
    <rect x="150" y="545" width="100" height="20" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="200" y="559" text-anchor="middle" fill="#6a1b9a" font-size="9">Reliability</text>
    <rect x="260" y="545" width="100" height="20" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="310" y="559" text-anchor="middle" fill="#6a1b9a" font-size="9">Efficiency</text>
    <rect x="370" y="545" width="100" height="20" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="420" y="559" text-anchor="middle" fill="#6a1b9a" font-size="9">Usability</text>
    <rect x="480" y="545" width="100" height="20" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="530" y="559" text-anchor="middle" fill="#6a1b9a" font-size="9">Maintainability</text>
    <rect x="590" y="545" width="100" height="20" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="640" y="559" text-anchor="middle" fill="#6a1b9a" font-size="9">Portability</text>
    <rect x="700" y="545" width="70" height="20" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="735" y="559" text-anchor="middle" fill="#6a1b9a" font-size="9">Reusability</text>
  </g>
</svg>