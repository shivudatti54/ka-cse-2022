<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic explores what makes modern web applications unique: platform independence, stateless communication, centralized deployment, and universal accessibility across devices.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">The Unique Nature of Web Applications</text>
  </g>
  
  <g class="step" id="step1" data-narration="Web apps use client-server architecture. The browser requests resources while the server handles business logic, data storage, and authentication processes.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Client-Server Architecture</text>
    <rect x="40" y="85" width="100" height="40" rx="3" fill="#1976d2"/>
    <text x="90" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Browser (Client)</text>
    <path d="M150,105 L230,105" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="240" y="85" width="100" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="290" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Web Server</text>
    <path d="M350,105 L430,105" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="440" y="85" width="100" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="490" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Database</text>
    <text x="560" y="100" font-family="Arial" font-size="9" fill="#666">Platform-independent access</text>
    <text x="560" y="115" font-family="Arial" font-size="9" fill="#666">Any device with a browser</text>
  </g>
  
  <g class="step" id="step2" data-narration="HTTP is stateless—each request is independent. Developers use cookies, sessions, and localStorage to maintain user state across requests and improve user experience.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Stateless HTTP &amp; State Management</text>
    <rect x="40" y="175" width="140" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="110" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">HTTP Request 1</text>
    <text x="110" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(No memory)</text>
    <path d="M190,195 L230,195" stroke="#ff9800" stroke-width="2"/>
    <rect x="240" y="175" width="140" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="310" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">HTTP Request 2</text>
    <text x="310" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Still no memory)</text>
    <path d="M390,195 L430,195" stroke="#ff9800" stroke-width="2"/>
    <rect x="440" y="175" width="140" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="510" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Solutions:</text>
    <text x="510" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Cookies, Sessions,</text>
    <text x="510" y="215" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">localStorage</text>
    <path d="M590,195 L630,195" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="640" y="175" width="130" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="705" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">State Maintained</text>
    <text x="705" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(User session)</text>
  </g>
  
  <g class="step" id="step3" data-narration="The thin client model puts most processing on the server, simplifying deployment. Modern apps use AJAX and PWAs for rich experiences.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Thin Client Model &amp; Evolution</text>
    <rect x="40" y="265" width="160" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="120" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Traditional Thin Client</text>
    <text x="120" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Server does most processing</text>
    <path d="M210,285 L260,285" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="270" y="265" width="160" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="350" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Modern Hybrid Client</text>
    <text x="350" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">AJAX, WebSockets, PWA</text>
    <path d="M440,285 L490,285" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="500" y="265" width="160" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="580" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Rich Internet Apps</text>
    <text x="580" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Client-server balance</text>
    <text x="680" y="290" font-family="Arial" font-size="9" fill="#666">Deployment: Centralized</text>
    <text x="680" y="303" font-family="Arial" font-size="9" fill="#666">Updates reach all users</text>
  </g>
  
  <g class="step" id="step4" data-narration="Web apps scale horizontally through load balancers and CDNs for performance. Security requires protecting against XSS, SQL injection, and CSRF attacks in web environments.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Scalability &amp; Security</text>
    <rect x="40" y="355" width="220" height="40" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="150" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Horizontal Scaling</text>
    <text x="150" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Add servers via load balancer</text>
    <rect x="270" y="355" width="220" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="380" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Content Delivery Network</text>
    <text x="380" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">CDN for static content</text>
    <rect x="500" y="355" width="270" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="635" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Security Threats:</text>
    <text x="635" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">XSS, SQL Injection, CSRF</text>
  </g>
  
  <g class="step" id="step5" data-narration="Multi-page apps reload the entire page each time. Single page apps use AJAX to update content dynamically without full reloads.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">MPA vs SPA Comparison</text>
    <rect x="40" y="445" width="340" height="38" rx="3" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="210" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Multi-Page Application (MPA)</text>
    <text x="210" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Full page refresh each request</text>
    <text x="210" y="480" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">HTML sent from server</text>
    <rect x="400" y="445" width="370" height="38" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="585" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Single Page Application (SPA)</text>
    <text x="585" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">AJAX updates, smooth UX</text>
    <text x="585" y="480" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">JSON data + dynamic DOM</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key takeaways: HTTP is stateless but apps maintain state through various mechanisms. Web apps offer platform independence, easy deployment, and horizontal scalability for growth.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key Takeaways</text>
    <rect x="40" y="528" width="145" height="50" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="112" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Platform Independence</text>
    <text x="112" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Any browser, any OS</text>
    <text x="112" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">No installation needed</text>
    <rect x="195" y="528" width="145" height="50" rx="3" fill="#ffccbc" stroke="#ff9800" stroke-width="1"/>
    <text x="267" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Centralized Updates</text>
    <text x="267" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Single deployment</text>
    <text x="267" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">All users get updates</text>
    <rect x="350" y="528" width="145" height="50" rx="3" fill="#d1c4e9" stroke="#9c27b0" stroke-width="1"/>
    <text x="422" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">State Management</text>
    <text x="422" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Cookies, Sessions</text>
    <text x="422" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">localStorage, Tokens</text>
    <rect x="505" y="528" width="145" height="50" rx="3" fill="#b3e5fc" stroke="#0288d1" stroke-width="1"/>
    <text x="577" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#01579b">Horizontal Scaling</text>
    <text x="577" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Add more servers</text>
    <text x="577" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Handle more traffic</text>
    <rect x="660" y="528" width="110" height="50" rx="3" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="715" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Security</text>
    <text x="715" y="556" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">XSS, SQLi, CSRF</text>
    <text x="715" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Prevention needed</text>
  </g>
</svg>