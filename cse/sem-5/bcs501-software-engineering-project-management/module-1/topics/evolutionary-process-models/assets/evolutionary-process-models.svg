<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Evolutionary process models handle changing requirements through iterative development and incremental delivery, allowing software to evolve progressively with continuous stakeholder feedback.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Evolutionary Process Models</text>
  </g>
  
  <g class="step" id="step1" data-narration="The Incremental Model delivers functionality in small increments, building on previous ones. Core features come first, with each increment tested thoroughly before adding more.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Incremental Model</text>
    <rect x="40" y="90" width="120" height="35" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="100" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Increment 1</text>
    <text x="100" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Core Features</text>
    <line x1="160" y1="107" x2="180" y2="107" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="190" y="90" width="120" height="35" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="250" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Increment 2</text>
    <text x="250" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">New Features</text>
    <line x1="310" y1="107" x2="330" y2="107" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="340" y="90" width="120" height="35" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="400" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Increment 3</text>
    <text x="400" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Enhancement</text>
    <line x1="460" y1="107" x2="480" y2="107" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="490" y="90" width="120" height="35" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="550" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Increment N</text>
    <text x="550" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Complete System</text>
    <text x="640" y="105" font-family="Arial" font-size="8" fill="#388e3c">Priority-based</text>
    <text x="640" y="117" font-family="Arial" font-size="8" fill="#388e3c">delivery</text>
  </g>
  
  <g class="step" id="step2" data-narration="The Spiral Model combines iterative prototyping with controlled Waterfall phases. Each spiral loop has four quadrants: planning, risk analysis, engineering, and evaluation.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Spiral Model (Boehm, 1988)</text>
    <ellipse cx="280" cy="196" rx="70" ry="25" fill="none" stroke="#ff9800" stroke-width="2"/>
    <ellipse cx="280" cy="196" rx="45" ry="16" fill="none" stroke="#ff9800" stroke-width="2"/>
    <ellipse cx="280" cy="196" rx="20" ry="7" fill="#ff9800"/>
    <text x="370" y="176" font-family="Arial" font-size="9" fill="#ff9800">Four Quadrants:</text>
    <text x="370" y="190" font-family="Arial" font-size="8" fill="#666">1. Planning</text>
    <text x="370" y="202" font-family="Arial" font-size="8" fill="#666">2. Risk Analysis</text>
    <text x="370" y="214" font-family="Arial" font-size="8" fill="#666">3. Engineering</text>
    <text x="480" y="190" font-family="Arial" font-size="8" fill="#666">4. Evaluation</text>
    <text x="480" y="202" font-family="Arial" font-size="8" fill="#ff9800">Risk-driven</text>
    <text x="480" y="214" font-family="Arial" font-size="8" fill="#ff9800">iteration</text>
    <rect x="600" y="160" width="160" height="55" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="680" y="178" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Key Advantage</text>
    <text x="680" y="192" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Early risk</text>
    <text x="680" y="204" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">identification</text>
  </g>
  
  <g class="step" id="step3" data-narration="The WINWIN Spiral Model extends the basic Spiral Model by adding negotiation at each iteration. Stakeholders define winning conditions for both customer and developer.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">WINWIN Spiral Model</text>
    <rect x="40" y="270" width="200" height="35" fill="#ffffff" stroke="#9c27b0" rx="3"/>
    <text x="140" y="288" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Standard Spiral</text>
    <text x="140" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Planning → Risk → Build → Evaluate</text>
    <line x1="250" y1="287" x2="270" y2="287" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="280" y="270" width="200" height="35" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="380" y="288" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">WINWIN Extension</text>
    <text x="380" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">+ Negotiation Phase</text>
    <text x="500" y="260" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Negotiation:</text>
    <text x="500" y="275" font-family="Arial" font-size="8" fill="#666">Customer Win = Objectives met</text>
    <text x="500" y="288" font-family="Arial" font-size="8" fill="#666">Developer Win = Fair terms</text>
    <text x="500" y="301" font-family="Arial" font-size="8" fill="#666">Establish win conditions each iteration</text>
    <rect x="680" y="265" width="80" height="30" fill="#9c27b0" rx="15"/>
    <text x="720" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">Mutual</text>
    <text x="720" y="294" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">Benefit</text>
  </g>
  
  <g class="step" id="step4" data-narration="Evolutionary Prototyping builds quick initial prototypes for user feedback. The prototype evolves through cycles of review and enhancement until final requirements are met.">
    <rect x="20" y="322" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Evolutionary Prototyping</text>
    <rect x="40" y="355" width="100" height="40" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="90" y="370" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Prototype 1</text>
    <text x="90" y="382" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Basic UI</text>
    <line x1="140" y1="375" x2="155" y2="375" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="160" y="355" width="100" height="40" fill="#90caf9" stroke="#1976d2" rx="3"/>
    <text x="210" y="370" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Prototype 2</text>
    <text x="210" y="382" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">+ Feedback</text>
    <line x1="260" y1="375" x2="275" y2="375" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="280" y="355" width="100" height="40" fill="#64b5f6" stroke="#1976d2" rx="3"/>
    <text x="330" y="370" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Prototype 3</text>
    <text x="330" y="382" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">+ Features</text>
    <line x1="380" y1="375" x2="395" y2="375" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="400" y="355" width="100" height="40" fill="#42a5f5" stroke="#1976d2" rx="3"/>
    <text x="450" y="370" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Prototype N</text>
    <text x="450" y="382" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Final System</text>
    <text x="520" y="360" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Process:</text>
    <text x="520" y="375" font-family="Arial" font-size="8" fill="#666">1. Identify basic requirements</text>
    <text x="520" y="388" font-family="Arial" font-size="8" fill="#666">2. Build quick prototype</text>
    <text x="640" y="375" font-family="Arial" font-size="8" fill="#666">3. Gather feedback</text>
    <text x="640" y="388" font-family="Arial" font-size="8" fill="#666">4. Enhance and repeat</text>
  </g>
  
  <g class="step" id="step5" data-narration="Concurrent Development allows multiple activities to progress simultaneously with interdependencies. Activities trigger dependent tasks upon completion, reducing overall project timeline.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Concurrent Development Model</text>
    <rect x="40" y="445" width="130" height="35" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="105" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Requirements</text>
    <text x="105" y="470" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Analysis</text>
    <line x1="170" y1="462" x2="185" y2="462" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="190" y="445" width="130" height="35" fill="#a5d6a7" stroke="#388e3c" rx="3"/>
    <text x="255" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Design</text>
    <text x="255" y="470" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Coding in parallel</text>
    <line x1="320" y1="462" x2="335" y2="462" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="340" y="445" width="130" height="35" fill="#81c784" stroke="#388e3c" rx="3"/>
    <text x="405" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Testing</text>
    <text x="405" y="470" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Early start possible</text>
    <line x1="470" y1="462" x2="485" y2="462" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="490" y="445" width="130" height="35" fill="#66bb6a" stroke="#388e3c" rx="3"/>
    <text x="555" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Deployment</text>
    <text x="555" y="470" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Release</text>
    <text x="640" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Key Points:</text>
    <text x="640" y="470" font-family="Arial" font-size="8" fill="#666">Interdependent</text>
    <text x="640" y="482" font-family="Arial" font-size="8" fill="#666">activities occur</text>
    <text x="720" y="470" font-family="Arial" font-size="8" fill="#666">concurrently</text>
  </g>
  
  <g class="step" id="step6" data-narration="Evolutionary models suit projects with uncertain requirements. Spiral handles high-risk projects, Incremental works for well-defined needs, and prototyping clarifies unclear requirements.">
    <rect x="20" y="498" width="760" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Model Selection Guide</text>
    <rect x="40" y="530" width="160" height="50" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="120" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Incremental</text>
    <text x="120" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Clear core requirements</text>
    <text x="120" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">with some flexibility</text>
    <rect x="210" y="530" width="160" height="50" fill="#ffcc80" stroke="#ff9800" rx="3"/>
    <text x="290" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Spiral</text>
    <text x="290" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Large, complex,</text>
    <text x="290" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">high-risk projects</text>
    <rect x="380" y="530" width="160" height="50" fill="#ffb74d" stroke="#ff9800" rx="3"/>
    <text x="460" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Evolutionary</text>
    <text x="460" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Poorly understood</text>
    <text x="460" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">requirements</text>
    <rect x="550" y="530" width="160" height="50" fill="#ffa726" stroke="#ff9800" rx="3"/>
    <text x="630" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">WINWIN</text>
    <text x="630" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Negotiation needed</text>
    <text x="630" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">stakeholder alignment</text>
    <text x="720" y="518" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">EXAM TIP</text>
    <text x="720" y="532" font-family="Arial" font-size="8" fill="#666">Spiral = Risk</text>
    <text x="720" y="544" font-family="Arial" font-size="8" fill="#666">management at</text>
    <text x="720" y="556" font-family="Arial" font-size="8" fill="#666">each iteration</text>
    <text x="720" y="568" font-family="Arial" font-size="8" fill="#666">(key differentiator)</text>
    <text x="720" y="580" font-family="Arial" font-size="8" fill="#666">from Waterfall</text>
  </g>
</svg>