<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Unified Process is an iterative and incremental software engineering methodology developed by Jacobson, Booch, and Rumbaugh at Rational Software.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Unified Process (UP)</text>
  </g>
  
  <g class="step" id="step1" data-narration="The UP has four phases: Inception establishes scope, Elaboration stabilizes architecture, Construction builds incrementally, and Transition deploys successfully to users.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Four Phases</text>
    <rect x="40" y="88" width="165" height="40" fill="#bbdefb" rx="3"/>
    <text x="122" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Inception</text>
    <text x="122" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">10%</text>
    <rect x="215" y="88" width="165" height="40" fill="#90caf9" rx="3"/>
    <text x="297" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Elaboration</text>
    <text x="297" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">20%</text>
    <rect x="390" y="88" width="165" height="40" fill="#64b5f6" rx="3"/>
    <text x="472" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Construction</text>
    <text x="472" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">60%</text>
    <rect x="565" y="88" width="165" height="40" fill="#42a5f5" rx="3"/>
    <text x="647" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Transition</text>
    <text x="647" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">10%</text>
  </g>
  
  <g class="step" id="step2" data-narration="UP combines iterative development (repeating activities) with incremental development (adding functionality) in every cycle. Every iteration produces a new working system increment.">
    <rect x="20" y="146" width="370" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Iterative Development</text>
    <text x="40" y="182" font-family="Arial" font-size="9" fill="#2e7d32">Repeats activities through cycles</text>
    <text x="40" y="196" font-family="Arial" font-size="9" fill="#2e7d32">to refine and improve the system</text>
    <text x="40" y="210" font-family="Arial" font-size="9" fill="#2e7d32">each iteration: requirements to deployment</text>
    <rect x="410" y="146" width="370" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="430" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Incremental Development</text>
    <text x="430" y="182" font-family="Arial" font-size="9" fill="#2e7d32">Adds new functionality in each</text>
    <text x="430" y="196" font-family="Arial" font-size="9" fill="#2e7d32">iteration, building upon previous</text>
    <text x="430" y="210" font-family="Arial" font-size="9" fill="#2e7d32">increments to form the complete system</text>
  </g>
  
  <g class="step" id="step3" data-narration="UP defines nine workflows that run concurrently across phases: Business Modeling, Requirements, Analysis/Design, Implementation, Test, Deployment, Config Management, Project Management, and Environment.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Nine Core Workflows</text>
    <text x="40" y="272" font-family="Arial" font-size="9" fill="#ef6c00">1. Business Modeling</text>
    <text x="160" y="272" font-family="Arial" font-size="9" fill="#ef6c00">2. Requirements</text>
    <text x="270" y="272" font-family="Arial" font-size="9" fill="#ef6c00">3. Analysis &amp; Design</text>
    <text x="390" y="272" font-family="Arial" font-size="9" fill="#ef6c00">4. Implementation</text>
    <text x="510" y="272" font-family="Arial" font-size="9" fill="#ef6c00">5. Test</text>
    <text x="40" y="288" font-family="Arial" font-size="9" fill="#ef6c00">6. Deployment</text>
    <text x="140" y="288" font-family="Arial" font-size="9" fill="#ef6c00">7. Config Management</text>
    <text x="280" y="288" font-family="Arial" font-size="9" fill="#ef6c00">8. Project Management</text>
    <text x="420" y="288" font-family="Arial" font-size="9" fill="#ef6c00">9. Environment</text>
    <text x="40" y="304" font-family="Arial" font-size="8" fill="#bf360c">Workflows run concurrently across all phases but with varying emphasis</text>
  </g>
  
  <g class="step" id="step4" data-narration="Key UP artifacts include the Vision Document, Use-Case Model, Software Architecture Document, Design Model, Implementation Model, and comprehensive Test Model.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Key Artifacts Produced</text>
    <rect x="40" y="355" width="110" height="38" fill="#e1bee7" rx="3"/>
    <text x="95" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Vision Document</text>
    <text x="95" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Project scope/objectives</text>
    <rect x="160" y="355" width="110" height="38" fill="#e1bee7" rx="3"/>
    <text x="215" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Use-Case Model</text>
    <text x="215" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Functional requirements</text>
    <rect x="280" y="355" width="110" height="38" fill="#e1bee7" rx="3"/>
    <text x="335" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Architecture Doc</text>
    <text x="335" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Technical architecture</text>
    <rect x="400" y="355" width="110" height="38" fill="#e1bee7" rx="3"/>
    <text x="455" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Design Model</text>
    <text x="455" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">UML diagrams</text>
    <rect x="520" y="355" width="110" height="38" fill="#e1bee7" rx="3"/>
    <text x="575" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Implementation</text>
    <text x="575" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Source code</text>
    <rect x="640" y="355" width="110" height="38" fill="#e1bee7" rx="3"/>
    <text x="695" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Test Model</text>
    <text x="695" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Test plans/cases</text>
  </g>
  
  <g class="step" id="step5" data-narration="UP defines three major milestones: Life Cycle Objective (end of Inception), Life Cycle Architecture (end of Elaboration), and Product Release (end of Transition).">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Three Major Milestones</text>
    <rect x="40" y="445" width="220" height="38" fill="#ffcdd2" rx="3"/>
    <text x="150" y="462" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Life Cycle Objective</text>
    <text x="150" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">End of Inception</text>
    <rect x="290" y="445" width="220" height="38" fill="#ffcdd2" rx="3"/>
    <text x="400" y="462" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Life Cycle Architecture</text>
    <text x="400" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">End of Elaboration</text>
    <rect x="540" y="445" width="220" height="38" fill="#ffcdd2" rx="3"/>
    <text x="650" y="462" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Product Release</text>
    <text x="650" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">End of Transition</text>
  </g>
  
  <g class="step" id="step6" data-narration="UP advantages over waterfall: handles changing requirements, early risk mitigation, continuous stakeholder feedback, testing throughout all phases, and produces working increments rather than just documentation.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Advantages over Waterfall Model</text>
    <rect x="40" y="532" width="145" height="48" fill="#bbdefb" rx="3"/>
    <text x="112" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Risk Management</text>
    <text x="112" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Address risks early</text>
    <text x="112" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">in Elaboration</text>
    <rect x="195" y="532" width="145" height="48" fill="#bbdefb" rx="3"/>
    <text x="267" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Requirements Change</text>
    <text x="267" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Accommodates</text>
    <text x="267" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">changing requirements</text>
    <rect x="350" y="532" width="145" height="48" fill="#bbdefb" rx="3"/>
    <text x="422" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Continuous Testing</text>
    <text x="422" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Testing throughout</text>
    <text x="422" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">all phases</text>
    <rect x="505" y="532" width="145" height="48" fill="#bbdefb" rx="3"/>
    <text x="577" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Working Increments</text>
    <text x="577" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Each iteration</text>
    <text x="577" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">produces working code</text>
    <rect x="660" y="532" width="100" height="48" fill="#bbdefb" rx="3"/>
    <text x="710" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Stakeholder</text>
    <text x="710" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Feedback</text>
    <text x="710" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">at each iteration</text>
  </g>
</svg>