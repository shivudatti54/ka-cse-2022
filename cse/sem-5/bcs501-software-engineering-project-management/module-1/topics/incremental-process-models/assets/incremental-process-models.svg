<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers Incremental Process Models in software engineering, explaining how software is delivered in small manageable pieces for customers.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Incremental Process Models in Software Engineering</text>
  </g>
  
  <!-- step1: Definition -->
  <g class="step" id="step1" data-narration="An incremental process model delivers software in small portions called increments. Each increment adds functionality to the previous one, providing working software early.">
    <rect x="30" y="58" width="740" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is Incremental Process Model?</text>
    <text x="50" y="98" font-family="Arial" font-size="11" fill="#333">A software development approach where the product is designed, implemented, and tested in small</text>
    <text x="50" y="113" font-family="Arial" font-size="11" fill="#333">increments. Each increment builds upon previously built functionality, delivering partial but working software.</text>
    <rect x="600" y="70" width="150" height="55" rx="5" fill="#1976d2"/>
    <text x="675" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Software delivered</text>
    <text x="675" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="white">in SMALL pieces</text>
  </g>
  
  <!-- step2: How It Works -->
  <g class="step" id="step2" data-narration="The model works by first developing core functionality, then adding subsequent increments. Customer feedback after each increment shapes the next development cycle.">
    <rect x="30" y="146" width="740" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">How Incremental Development Works</text>
    <rect x="50" y="180" width="130" height="35" rx="4" fill="#388e3c"/>
    <text x="115" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Increment 1: Core</text>
    <text x="115" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Functionality</text>
    <line x1="180" y1="197" x2="205" y2="197" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="205" y="180" width="130" height="35" rx="4" fill="#4caf50"/>
    <text x="270" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Increment 2</text>
    <text x="270" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Add Features</text>
    <line x1="335" y1="197" x2="360" y2="197" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="360" y="180" width="130" height="35" rx="4" fill="#66bb6a"/>
    <text x="425" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Increment 3</text>
    <text x="425" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="white">More Features</text>
    <line x1="490" y1="197" x2="515" y2="197" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="515" y="180" width="130" height="35" rx="4" fill="#81c784"/>
    <text x="580" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Complete System</text>
    <text x="580" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="white">All Increments</text>
    <text x="650" y="180" font-family="Arial" font-size="9" fill="#388e3c">Each increment: Analysis</text>
    <text x="650" y="193" font-family="Arial" font-size="9" fill="#388e3c">→ Design → Implementation</text>
    <text x="650" y="206" font-family="Arial" font-size="9" fill="#388e3c">→ Customer Feedback</text>
  </g>
  
  <!-- step3: Types -->
  <g class="step" id="step3" data-narration="There are two main types: Sequential Incremental develops one increment after another, while Parallel Incremental develops multiple increments simultaneously for faster delivery.">
    <rect x="30" y="234" width="740" height="88" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Types of Incremental Models</text>
    <rect x="50" y="270" width="330" height="35" rx="5" fill="#ffcc80"/>
    <text x="215" y="290" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Sequential Incremental</text>
    <text x="215" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#5d4037">One after another | Better control | Predictable</text>
    <rect x="400" y="270" width="330" height="35" rx="5" fill="#ffe0b2"/>
    <text x="565" y="290" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Parallel Incremental</text>
    <text x="565" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#5d4037">Simultaneous | Faster delivery | Higher coordination</text>
    <text x="50" y="320" font-family="Arial" font-size="9" fill="#666">Prototyping often serves as precursor—initial prototype validates assumptions and becomes foundation for first increment.</text>
  </g>
  
  <!-- step4: Advantages -->
  <g class="step" id="step4" data-narration="Key advantages include risk reduction through small chunks, early customer feedback for course correction, priority-based development, and significant faster time-to-market.">
    <rect x="30" y="330" width="740" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="350" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Advantages of Incremental Model</text>
    <rect x="50" y="363" width="165" height="40" rx="4" fill="#c8e6c9"/>
    <text x="132" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Risk Reduction</text>
    <text x="132" y="391" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Small manageable chunks</text>
    <rect x="225" y="363" width="165" height="40" rx="4" fill="#c8e6c9"/>
    <text x="307" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Customer Feedback</text>
    <text x="307" y="391" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Early and continuous</text>
    <rect x="400" y="363" width="165" height="40" rx="4" fill="#c8e6c9"/>
    <text x="482" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Priority Development</text>
    <text x="482" y="391" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Most important first</text>
    <rect x="575" y="363" width="165" height="40" rx="4" fill="#c8e6c9"/>
    <text x="657" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Faster Time-to-Market</text>
    <text x="657" y="391" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Core features early</text>
  </g>
  
  <!-- step5: Disadvantages -->
  <g class="step" id="step5" data-narration="Disadvantages include potential system structure degradation, complex resource allocation, significant integration challenges between increments, and need for highly experienced personnel.">
    <rect x="30" y="418" width="740" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="438" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Disadvantages and Challenges</text>
    <rect x="50" y="453" width="160" height="38" rx="4" fill="#ffcdd2"/>
    <text x="130" y="468" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">System Structure</text>
    <text x="130" y="482" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">May degrade over time</text>
    <rect x="220" y="453" width="160" height="38" rx="4" fill="#ffcdd2"/>
    <text x="300" y="468" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Resource Allocation</text>
    <text x="300" y="482" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Complex balancing act</text>
    <rect x="390" y="453" width="160" height="38" rx="4" fill="#ffcdd2"/>
    <text x="470" y="468" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Integration Issues</text>
    <text x="470" y="482" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Testing required</text>
    <rect x="560" y="453" width="180" height="38" rx="4" fill="#ffcdd2"/>
    <text x="650" y="468" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Experienced Personnel</text>
    <text x="650" y="482" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Need skilled teams</text>
  </g>
  
  <!-- step6: Real-world Example -->
  <g class="step" id="step6" data-narration="A University Management System example: Increment 1 builds admission module, Increment 2 adds course registration, later increments add grades, library, and fee payment.">
    <rect x="30" y="506" width="740" height="88" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="526" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Real-world Example: University Management System</text>
    <rect x="50" y="538" width="120" height="45" rx="4" fill="#ce93d8"/>
    <text x="110" y="553" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Increment 1</text>
    <text x="110" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Student Admission</text>
    <text x="110" y="578" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">(Core functionality)</text>
    <rect x="180" y="538" width="120" height="45" rx="4" fill="#ba68c8"/>
    <text x="240" y="553" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Increment 2</text>
    <text x="240" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Course Registration</text>
    <rect x="310" y="538" width="120" height="45" rx="4" fill="#ab47bc"/>
    <text x="370" y="553" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Increment 3</text>
    <text x="370" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Grade Management</text>
    <rect x="440" y="538" width="120" height="45" rx="4" fill="#9c27b0"/>
    <text x="500" y="553" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Increment 4</text>
    <text x="500" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Library Management</text>
    <rect x="570" y="538" width="120" height="45" rx="4" fill="#7b1fa2"/>
    <text x="630" y="553" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Increment 5</text>
    <text x="630" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Fee Payment</text>
    <text x="700" y="553" font-family="Arial" font-size="8" fill="#7b1fa2">University can use</text>
    <text x="700" y="566" font-family="Arial" font-size="8" fill="#7b1fa2">admission system</text>
    <text x="700" y="579" font-family="Arial" font-size="8" fill="#7b1fa2">while developing</text>
    <text x="700" y="592" font-family="Arial" font-size="8" fill="#7b1fa2">other modules</text>
  </g>
</svg>