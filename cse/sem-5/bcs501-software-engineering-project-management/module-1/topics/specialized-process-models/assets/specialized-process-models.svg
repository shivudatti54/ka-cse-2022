<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <g class="step" id="step0" data-narration="Specialized process models in software engineering address specific project constraints beyond traditional linear approaches like Waterfall, providing flexibility for complex development scenarios requiring adaptive planning and iterative delivery.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Specialized Process Models in Software Engineering</text>
  </g>
  
  <g class="step" id="step1" data-narration="The Iterative model uses repeated cycles to develop software incrementally, producing working software at each iteration for progressive refinement and continuous stakeholder feedback during development phases.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Iterative Model</text>
    <rect x="25" y="88" width="180" height="40" rx="3" fill="#ffffff" stroke="#1976d2"/>
    <text x="35" y="102" font-family="Arial" font-size="9" fill="#333">• Feedback-driven cycles</text>
    <text x="35" y="115" font-family="Arial" font-size="9" fill="#333">• Progressive enhancement</text>
    <rect x="215" y="88" width="180" height="40" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="225" y="102" font-family="Arial" font-size="9" fill="#333">• Risk reduction early</text>
    <text x="225" y="115" font-family="Arial" font-size="9" fill="#333">• Flexible requirements</text>
    <text x="600" y="78" font-family="Arial" font-size="9" fill="#666">Best for: Complex projects needing early risk identification</text>
  </g>
  
  <g class="step" id="step2" data-narration="The Incremental model delivers software in functional chunks called increments, building the system piece by piece starting with core features and progressively adding more functionality over multiple delivery cycles.">
    <rect x="10" y="148" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="25" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Incremental Model</text>
    <rect x="25" y="178" width="120" height="40" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="35" y="192" font-family="Arial" font-size="9" fill="#333">Increment 1</text>
    <text x="35" y="205" font-family="Arial" font-size="8" fill="#666">Core Features</text>
    <path d="M145 198 L165 198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="170" y="178" width="120" height="40" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="180" y="192" font-family="Arial" font-size="9" fill="#333">Increment 2</text>
    <text x="180" y="205" font-family="Arial" font-size="8" fill="#666">New Features</text>
    <path d="M290 198 L310 198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="315" y="178" width="120" height="40" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="325" y="192" font-family="Arial" font-size="9" fill="#333">Increment 3</text>
    <text x="325" y="205" font-family="Arial" font-size="8" fill="#666">Additional</text>
    <text x="500" y="168" font-family="Arial" font-size="9" fill="#666">Advantage: Reduced initial delivery time, continuous feedback</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Spiral model combines iterative development with systematic risk assessment through four key phases: planning, risk analysis, engineering, and evaluation for continuous improvement throughout the project lifecycle.">
    <rect x="10" y="238" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="25" y="258" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Spiral Model</text>
    <rect x="25" y="268" width="165" height="40" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="35" y="282" font-family="Arial" font-size="9" fill="#333">• Planning</text>
    <text x="35" y="295" font-family="Arial" font-size="9" fill="#333">• Risk Analysis</text>
    <rect x="200" y="268" width="165" height="40" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="210" y="282" font-family="Arial" font-size="9" fill="#333">• Engineering</text>
    <text x="210" y="295" font-family="Arial" font-size="9" fill="#333">• Evaluation</text>
    <path d="M370 288 L410 288" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="420" y="268" width="180" height="40" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="430" y="282" font-family="Arial" font-size="9" fill="#333">Key Feature:</text>
    <text x="430" y="295" font-family="Arial" font-size="9" fill="#333">Explicit Risk Management</text>
    <text x="610" y="258" font-family="Arial" font-size="9" fill="#666">Best for: Large, complex, high-risk projects</text>
  </g>
  
  <g class="step" id="step4" data-narration="Agile methodology emphasizes flexibility, collaboration, working software delivery, and responding to change over following rigid plans, enabling adaptive project management with iterative sprints and continuous customer collaboration.">
    <rect x="10" y="328" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="25" y="348" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Agile Methodology</text>
    <rect x="25" y="358" width="220" height="40" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="35" y="372" font-family="Arial" font-size="9" fill="#333">Agile Manifesto Values:</text>
    <text x="35" y="385" font-family="Arial" font-size="8" fill="#666">Individuals &gt; Processes | Working Software &gt; Docs</text>
    <text x="35" y="395" font-family="Arial" font-size="8" fill="#666">Customer Collaboration &gt; Contracts | Responding &gt; Plans</text>
    <rect x="255" y="358" width="160" height="40" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="265" y="372" font-family="Arial" font-size="9" fill="#333">Scrum Framework:</text>
    <text x="265" y="385" font-family="Arial" font-size="8" fill="#666">Roles: PO, SM, Team</text>
    <text x="265" y="395" font-family="Arial" font-size="8" fill="#666">Sprints: 2-4 weeks</text>
    <rect x="425" y="358" width="160" height="40" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="435" y="372" font-family="Arial" font-size="9" fill="#333">XP Practices:</text>
    <text x="435" y="385" font-family="Arial" font-size="8" fill="#666">Pair Programming, TDD</text>
    <text x="435" y="395" font-family="Arial" font-size="8" fill="#666">Continuous Integration</text>
    <text x="600" y="348" font-family="Arial" font-size="9" fill="#666">Best for: Changing requirements, rapid delivery</text>
  </g>
  
  <g class="step" id="step5" data-narration="The RAD model emphasizes rapid prototyping with heavy user involvement using graphical tools and automated code generators to accelerate development timelines and validate requirements quickly with stakeholders.">
    <rect x="10" y="418" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="25" y="438" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">5. RAD Model</text>
    <rect x="25" y="448" width="145" height="40" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="35" y="462" font-family="Arial" font-size="9" fill="#333">Requirements Planning</text>
    <text x="35" y="475" font-family="Arial" font-size="8" fill="#666">Combine gathering + planning</text>
    <path d="M170 468 L190 468" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="195" y="448" width="145" height="40" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="205" y="462" font-family="Arial" font-size="9" fill="#333">User Design</text>
    <text x="205" y="475" font-family="Arial" font-size="8" fill="#666">Active user participation</text>
    <path d="M340 468 L360 468" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="365" y="448" width="145" height="40" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="375" y="462" font-family="Arial" font-size="9" fill="#333">Construction</text>
    <text x="375" y="475" font-family="Arial" font-size="8" fill="#666">Component-based, automated</text>
    <path d="M510 468 L530 468" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="535" y="448" width="145" height="40" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="545" y="462" font-family="Arial" font-size="9" fill="#333">Cutover</text>
    <text x="545" y="475" font-family="Arial" font-size="8" fill="#666">Prototype to final system</text>
    <text x="690" y="438" font-family="Arial" font-size="9" fill="#666">Best: Clear requirements, tight timelines</text>
  </g>
  
  <g class="step" id="step6" data-narration="The Prototype model creates initial system approximations to clarify unclear requirements through visual feedback, allowing stakeholders to experience the design early while formal methods use mathematical verification for critical systems.">
    <rect x="10" y="508" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Prototype &amp; Formal Methods</text>
    <rect x="25" y="538" width="180" height="40" rx="3" fill="#ffffff" stroke="#1976d2"/>
    <text x="35" y="552" font-family="Arial" font-size="9" fill="#333">Prototype Model:</text>
    <text x="35" y="565" font-family="Arial" font-size="8" fill="#666">• Horizontal (UI layer)</text>
    <text x="35" y="575" font-family="Arial" font-size="8" fill="#666">• Vertical (full layers)</text>
    <rect x="215" y="538" width="180" height="40" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="225" y="552" font-family="Arial" font-size="9" fill="#333">Formal Methods:</text>
    <text x="225" y="565" font-family="Arial" font-size="8" fill="#666">• Mathematical specification</text>
    <text x="225" y="575" font-family="Arial" font-size="8" fill="#666">• Z, VDM, LARCH</text>
    <rect x="405" y="538" width="180" height="40" rx="3" fill="#ffffff" stroke="#f44336"/>
    <text x="415" y="552" font-family="Arial" font-size="9" fill="#333">V-Model:</text>
    <text x="415" y="565" font-family="Arial" font-size="8" fill="#666">• Unit → Module Design</text>
    <text x="415" y="575" font-family="Arial" font-size="8" fill="#666">• Integration → Architecture</text>
    <text x="600" y="528" font-family="Arial" font-size="9" fill="#666">Selection depends on:</text>
    <text x="600" y="542" font-family="Arial" font-size="8" fill="#666">Requirements stability,</text>
    <text x="600" y="554" font-family="Arial" font-size="8" fill="#666">project size, team experience</text>
  </g>
</svg>