<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Personal Software Process helps individual engineers improve through measurement, while Team Software Process extends these principles to collaborative development teams.">
    <rect x="0" y="0" width="800" height="45" fill="#e3f2fd"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Personal and Team Process Models</text>
  </g>
  
  <g class="step" id="step1" data-narration="PSP provides a measurement-based framework for individual engineers to plan, track, and improve their development processes through disciplined data collection.">
    <rect x="20" y="55" width="760" height="85" rx="8" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Personal Software Process (PSP)</text>
    <text x="40" y="92" font-family="Arial" font-size="10" fill="#333">• Measurement-based approach for individual software development</text>
    <text x="40" y="107" font-family="Arial" font-size="10" fill="#333">• Helps engineers understand productivity and quality patterns</text>
    <text x="40" y="122" font-family="Arial" font-size="10" fill="#333">• Uses historical data for regression models to predict effort</text>
    <rect x="580" y="62" width="180" height="68" rx="5" fill="#e3f2fd"/>
    <text x="670" y="80" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Core Principle</text>
    <text x="670" y="98" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">"You cannot improve</text>
    <text x="670" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">what you cannot measure"</text>
  </g>
  
  <g class="step" id="step2" data-narration="PSP evolves through seven levels from PSP0 (base practices) to PSP3 (continuous improvement), each adding planning, quality, and measurement capabilities.">
    <rect x="20" y="148" width="760" height="80" rx="8" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">PSP Levels (Evolution)</text>
    <rect x="40" y="180" width="95" height="38" rx="4" fill="#e3f2fd"/>
    <text x="87" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">PSP0: Base</text>
    <text x="87" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Time/Defect logs</text>
    <rect x="145" y="180" width="95" height="38" rx="4" fill="#e3f2fd"/>
    <text x="192" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">PSP0.1: Planning</text>
    <text x="192" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Size estimation</text>
    <rect x="250" y="180" width="95" height="38" rx="4" fill="#e3f2fd"/>
    <text x="297" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">PSP1: Process</text>
    <text x="297" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cost/Schedule</text>
    <rect x="355" y="180" width="95" height="38" rx="4" fill="#e3f2fd"/>
    <text x="402" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">PSP1.1: Quality</text>
    <text x="402" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Defect prevention</text>
    <rect x="460" y="180" width="95" height="38" rx="4" fill="#e3f2fd"/>
    <text x="507" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">PSP2: Quality Mgmt</text>
    <text x="507" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Peer reviews</text>
    <rect x="565" y="180" width="95" height="38" rx="4" fill="#e3f2fd"/>
    <text x="612" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">PSP2.1: Reviews</text>
    <text x="612" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Formal checklists</text>
    <rect x="670" y="180" width="95" height="38" rx="4" fill="#1976d2"/>
    <text x="717" y="194" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ffffff">PSP3: Improvement</text>
    <text x="717" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Continuous cycle</text>
  </g>
  
  <g class="step" id="step3" data-narration="TSP defines five key roles: Team Leader, Development Manager, Quality Manager, Planning Manager, and Support Manager for organized team development.">
    <rect x="20" y="236" width="760" height="80" rx="8" fill="#ffffff" stroke="#e8f5e9" stroke-width="2"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Team Software Process (TSP) Roles</text>
    <rect x="40" y="270" width="130" height="38" rx="4" fill="#e8f5e9"/>
    <text x="105" y="284" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Team Leader</text>
    <text x="105" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Coordinates activities</text>
    <rect x="180" y="270" width="130" height="38" rx="4" fill="#e8f5e9"/>
    <text x="245" y="284" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Development Manager</text>
    <text x="245" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Technical aspects</text>
    <rect x="320" y="270" width="130" height="38" rx="4" fill="#e8f5e9"/>
    <text x="385" y="284" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Quality Manager</text>
    <text x="385" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Quality goals</text>
    <rect x="460" y="270" width="130" height="38" rx="4" fill="#e8f5e9"/>
    <text x="525" y="284" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Planning Manager</text>
    <text x="525" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Project tracking</text>
    <rect x="600" y="270" width="130" height="38" rx="4" fill="#e8f5e9"/>
    <text x="665" y="284" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Support Manager</text>
    <text x="665" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Tool/Config support</text>
  </g>
  
  <g class="step" id="step4" data-narration="TSP Development Cycle has five phases: Launch defines team goals, Strategy analyzes requirements, Plan creates schedules, Implementation executes work, and Postmortem reviews results.">
    <rect x="20" y="324" width="760" height="78" rx="8" fill="#ffffff" stroke="#e8f5e9" stroke-width="2"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">TSP Development Cycle</text>
    <rect x="40" y="358" width="130" height="35" rx="4" fill="#388e3c"/>
    <text x="105" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ffffff">1. Launch</text>
    <text x="105" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Goals, roles, contract</text>
    <line x1="170" y1="375" x2="190" y2="375" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="200" y="358" width="130" height="35" rx="4" fill="#388e3c"/>
    <text x="265" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ffffff">2. Strategy</text>
    <text x="265" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Requirements, sizing</text>
    <line x1="330" y1="375" x2="350" y2="375" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="360" y="358" width="130" height="35" rx="4" fill="#388e3c"/>
    <text x="425" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ffffff">3. Plan</text>
    <text x="425" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">WBS, schedules</text>
    <line x1="490" y1="375" x2="510" y2="375" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="520" y="358" width="130" height="35" rx="4" fill="#388e3c"/>
    <text x="585" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ffffff">4. Implementation</text>
    <text x="585" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Design, code, test</text>
    <line x1="650" y1="375" x2="670" y2="375" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="680" y="358" width="85" height="35" rx="4" fill="#388e3c"/>
    <text x="722" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ffffff">5. Postmortem</text>
    <text x="722" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Analysis</text>
  </g>
  
  <g class="step" id="step5" data-narration="Key PSP and TSP formulas include Productivity Rate, Defect Density, Review Effectiveness, SPI, and CPI for measuring and improving software processes.">
    <rect x="20" y="410" width="760" height="95" rx="8" fill="#ffffff" stroke="#fff3e0" stroke-width="2"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Key Formulas</text>
    <rect x="40" y="445" width="170" height="38" rx="4" fill="#fff3e0"/>
    <text x="125" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Productivity Rate</text>
    <text x="125" y="474" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Size / Time</text>
    <rect x="220" y="445" width="170" height="38" rx="4" fill="#fff3e0"/>
    <text x="305" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Defect Density</text>
    <text x="305" y="474" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Defects / Size</text>
    <rect x="400" y="445" width="170" height="38" rx="4" fill="#fff3e0"/>
    <text x="485" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Review Effectiveness</text>
    <text x="485" y="474" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">(Review Found / Total) × 100</text>
    <rect x="580" y="445" width="90" height="38" rx="4" fill="#fff3e0"/>
    <text x="625" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">SPI</text>
    <text x="625" y="474" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">EV / PV</text>
    <rect x="680" y="445" width="90" height="38" rx="4" fill="#fff3e0"/>
    <text x="725" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">CPI</text>
    <text x="725" y="474" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">EV / AC</text>
    <text x="40" y="495" font-family="Arial" font-size="8" fill="#666">Note: SPI/CPI &lt; 1.0 indicates schedule slippage or cost overrun. Target: DRE above 85%</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: For a 1500 LOC project with historical productivity of 46.43 LOC/hour and 1.2x complexity factor, estimated time is approximately 39 hours.">
    <rect x="20" y="513" width="760" height="80" rx="8" fill="#ffffff" stroke="#f3e5f5" stroke-width="2"/>
    <text x="40" y="533" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Example: PSP Size Estimation</text>
    <rect x="40" y="545" width="230" height="40" rx="4" fill="#f3e5f5"/>
    <text x="155" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Historical Data</text>
    <text x="155" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">800 LOC/16hr + 1200 LOC/28hr</text>
    <rect x="280" y="545" width="230" height="40" rx="4" fill="#f3e5f5"/>
    <text x="395" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Average Productivity</text>
    <text x="395" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">(50+42.86)/2 = 46.43 LOC/hr</text>
    <rect x="520" y="545" width="245" height="40" rx="4" fill="#9c27b0"/>
    <text x="642" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ffffff">Estimated Time</text>
    <text x="642" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">1500÷46.43×1.2 ≈ 39 hrs</text>
  </g>
</svg>