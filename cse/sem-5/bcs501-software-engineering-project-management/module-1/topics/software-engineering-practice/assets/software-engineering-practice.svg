<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1700">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    
    <!-- Arrow Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .draw-line {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: drawLine 1s ease-out forwards;
    }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1700" fill="#f8f9fa"/>
  
  <!-- Title Step -->
  <g class="step" id="step0" data-narration="Software engineering provides systematic approaches to develop reliable software solutions.">
    <rect x="20" y="10" width="760" height="45" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Software Engineering Practice</text>
  </g>
  
  <!-- Step 1: What is Software Engineering -->
  <g class="step" id="step1" data-narration="Software engineering combines engineering principles with computer science to produce efficient software systems.">
    <rect x="30" y="70" width="740" height="85" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">What is Software Engineering?</text>
    <text x="50" y="115" font-family="Arial, sans-serif" font-size="10" fill="#424242">A systematic, disciplined approach to developing, operating, and maintaining software.</text>
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="10" fill="#424242">Combines engineering principles with computer science for reliable solutions.</text>
    <!-- Icon representation -->
    <circle cx="700" cy="112" r="25" fill="#1976d2" opacity="0.2"/>
    <text x="700" y="118" text-anchor="middle" font-size="24">⚙️</text>
  </g>
  
  <!-- Step 2: Why It Matters -->
  <g class="step" id="step2" data-narration="Without proper software engineering practices, projects fail with cost overruns and schedule delays.">
    <rect x="30" y="165" width="740" height="85" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="50" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c62828">Why Software Engineering Matters</text>
    <text x="50" y="210" font-family="Arial, sans-serif" font-size="10" fill="#424242">• Every sector relies on software systems (healthcare, finance, education)</text>
    <text x="50" y="225" font-family="Arial, sans-serif" font-size="10" fill="#424242">• Poor practices lead to project failures, cost overruns, and delays</text>
    <!-- Warning icons -->
    <text x="700" y="200" font-size="20">⚠️</text>
    <text x="730" y="200" font-size="20">💰</text>
    <text x="700" y="225" font-size="20">📅</text>
  </g>
  
  <!-- Step 3: SDLC Overview -->
  <g class="step" id="step3" data-narration="The Software Development Life Cycle consists of six key phases: requirements, design, implementation, testing, deployment, and maintenance.">
    <rect x="30" y="265" width="740" height="105" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="290" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Software Development Life Cycle (SDLC)</text>
    <!-- SDLC Flow -->
    <g transform="translate(60, 310)">
      <rect x="0" y="0" width="85" height="30" rx="5" fill="#43a047" opacity="0.8"/>
      <text x="42" y="20" text-anchor="middle" font-size="9" fill="white">Requirements</text>
      <line x1="85" y1="15" x2="100" y2="15" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="100" y="0" width="85" height="30" rx="5" fill="#43a047" opacity="0.8"/>
      <text x="142" y="20" text-anchor="middle" font-size="9" fill="white">Design</text>
      <line x1="185" y1="15" x2="200" y2="15" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="200" y="0" width="95" height="30" rx="5" fill="#43a047" opacity="0.8"/>
      <text x="247" y="20" text-anchor="middle" font-size="9" fill="white">Implementation</text>
      <line x1="295" y1="15" x2="310" y2="15" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="310" y="0" width="70" height="30" rx="5" fill="#43a047" opacity="0.8"/>
      <text x="345" y="20" text-anchor="middle" font-size="9" fill="white">Testing</text>
      <line x1="380" y1="15" x2="395" y2="15" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="395" y="0" width="85" height="30" rx="5" fill="#43a047" opacity="0.8"/>
      <text x="437" y="20" text-anchor="middle" font-size="9" fill="white">Deployment</text>
      <line x1="480" y1="15" x2="495" y2="15" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="495" y="0" width="90" height="30" rx="5" fill="#43a047" opacity="0.8"/>
      <text x="540" y="20" text-anchor="middle" font-size="9" fill="white">Maintenance</text>
    </g>
  </g>
  
  <!-- Step 4: Process Models - Waterfall -->
  <g class="step" id="step4" data-narration="The Waterfall Model is sequential - each phase completes before the next begins. It's simple but rigid.">
    <rect x="30" y="385" width="365" height="90" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="50" y="410" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100">Waterfall Model</text>
    <text x="50" y="428" font-family="Arial, sans-serif" font-size="9" fill="#424242">Sequential approach: each phase must</text>
    <text x="50" y="442" font-family="Arial, sans-serif" font-size="9" fill="#424242">complete before next begins.</text>
    <text x="50" y="460" font-family="Arial, sans-serif" font-size="9" fill="#d84315">✓ Simple to manage</text>
    <text x="170" y="460" font-family="Arial, sans-serif" font-size="9" fill="#d84315">✗ Rigid for changes</text>
    <!-- Waterfall diagram -->
    <g transform="translate(280, 420)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#e65100" stroke-width="3"/>
      <line x1="0" y1="40" x2="60" y2="40" stroke="#e65100" stroke-width="3"/>
      <line x1="60" y1="40" x2="60" y2="0" stroke="#e65100" stroke-width="3"/>
    </g>
  </g>
  
  <!-- Step 5: V-Model -->
  <g class="step" id="step5" data-narration="The V-Model extends Waterfall by emphasizing testing. Each development phase has a corresponding testing phase.">
    <rect x="405" y="385" width="365" height="90" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="425" y="410" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7b1fa2">V-Model</text>
    <text x="425" y="428" font-family="Arial, sans-serif" font-size="9" fill="#424242">Each development phase has</text>
    <text x="425" y="442" font-family="Arial, sans-serif" font-size="9" fill="#424242">corresponding testing phase.</text>
    <!-- V-Model mapping -->
    <g transform="translate(430, 455)">
      <text x="0" y="0" font-size="7" fill="#7b1fa2">Req→Accept</text>
      <text x="70" y="0" font-size="7" fill="#7b1fa2">Design→Sys Test</text>
      <text x="160" y="0" font-size="7" fill="#7b1fa2">Code→Unit Test</text>
    </g>
  </g>
  
  <!-- Step 6: Spiral & Agile -->
  <g class="step" id="step6" data-narration="The Spiral Model combines iterative development with risk analysis. Agile delivers working software in short iterations called sprints.">
    <rect x="30" y="490" width="740" height="90" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="515" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">Spiral &amp; Agile Models</text>
    <!-- Spiral Model -->
    <g transform="translate(50, 530)">
      <text x="0" y="0" font-size="8" fill="#424242">Spiral:</text>
      <ellipse cx="30" cy="20" rx="25" ry="10" fill="none" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="3,2"/>
      <ellipse cx="30" cy="20" rx="18" ry="7" fill="none" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="65" y="24" font-size="8" fill="#424242">Planning→Risk→Engineering→Eval</text>
    </g>
    <!-- Agile -->
    <g transform="translate(320, 530)">
      <text x="0" y="0" font-size="8" fill="#424242">Agile:</text>
      <rect x="0" y="10" width="50" height="20" rx="3" fill="#43a047"/>
      <text x="25" y="24" text-anchor="middle" font-size="7" fill="white">Sprint 1</text>
      <rect x="55" y="10" width="50" height="20" rx="3" fill="#43a047"/>
      <text x="80" y="24" text-anchor="middle" font-size="7" fill="white">Sprint 2</text>
      <rect x="110" y="10" width="50" height="20" rx="3" fill="#43a047"/>
      <text x="135" y="24" text-anchor="middle" font-size="7" fill="white">Sprint 3</text>
      <text x="170" y="24" font-size="8" fill="#2e7d32">Short iterations (2-4 weeks)</text>
    </g>
  </g>
  
  <!-- Step 7: Requirements Engineering -->
  <g class="step" id="step7" data-narration="Requirements Engineering identifies, documents, and validates stakeholder needs through elicitation, analysis, specification, and validation.">
    <rect x="30" y="595" width="740" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="620" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Requirements Engineering</text>
    <!-- Four boxes -->
    <g transform="translate(50, 635)">
      <rect x="0" y="0" width="165" height="40" rx="5" fill="#66bb6a"/>
      <text x="82" y="18" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Elicitation</text>
      <text x="82" y="32" text-anchor="middle" font-size="8" fill="white">Interviews, Surveys</text>
      <rect x="175" y="0" width="165" height="40" rx="5" fill="#66bb6a"/>
      <text x="257" y="18" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Analysis</text>
      <text x="257" y="32" text-anchor="middle" font-size="8" fill="white">Feasibility Check</text>
      <rect x="350" y="0" width="165" height="40" rx="5" fill="#66bb6a"/>
      <text x="432" y="18" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Specification</text>
      <text x="432" y="32" text-anchor="middle" font-size="8" fill="white">SRS Document</text>
      <rect x="525" y="0" width="165" height="40" rx="5" fill="#66bb6a"/>
      <text x="607" y="18" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Validation</text>
      <text x="607" y="32" text-anchor="middle" font-size="8" fill="white">Verify Correctness</text>
    </g>
  </g>
  
  <!-- Step 8: Types of Requirements -->
  <g class="step" id="step8" data-narration="Functional requirements describe what the system does. Non-functional requirements specify how the system performs (speed, security, reliability).">
    <rect x="30" y="710" width="740" height="85" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="50" y="735" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Functional vs Non-Functional Requirements</text>
    <!-- Functional -->
    <g transform="translate(50, 755)">
      <rect x="0" y="0" width="280" height="25" rx="5" fill="#ffa726"/>
      <text x="140" y="17" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Functional Requirements</text>
      <text x="290" y="17" font-size="9" fill="#e65100">"What the system does"</text>
    </g>
    <!-- Non-Functional -->
    <g transform="translate(350, 755)">
      <rect x="0" y="0" width="280" height="25" rx="5" fill="#ffa726"/>
      <text x="140" y="17" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Non-Functional Requirements</text>
      <text x="290" y="17" font-size="9" fill="#e65100">"How system performs"</text>
    </g>
    <!-- Examples -->
    <text x="50" y="788" font-size="8" fill="#424242">Examples: Login, Payment, Search | Examples: Speed, Security, Usability</text>
  </g>
  
  <!-- Step 9: Software Design Concepts - Modularity -->
  <g class="step" id="step9" data-narration="Modularity divides software into independent modules for easier development, testing, and maintenance.">
    <rect x="30" y="810" width="740" height="85" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="50" y="835" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7b1fa2">Design Concept: Modularity</text>
    <text x="50" y="855" font-family="Arial, sans-serif" font-size="10" fill="#424242">Dividing software into separate, independent modules that can be developed, tested,</text>
    <text x="50" y="870" font-family="Arial, sans-serif" font-size="10" fill="#424242">and maintained independently. Improves reusability and maintainability.</text>
    <!-- Module boxes -->
    <g transform="translate(550, 840)">
      <rect x="0" y="0" width="50" height="35" rx="5" fill="#ba68c8"/>
      <text x="25" y="20" text-anchor="middle" font-size="8" fill="white">Module</text>
      <text x="25" y="32" text-anchor="middle" font-size="7" fill="white">A</text>
      <rect x="55" y="0" width="50" height="35" rx="5" fill="#ba68c8"/>
      <text x="80" y="20" text-anchor="middle" font-size="8" fill="white">Module</text>
      <text x="80" y="32" text-anchor="middle" font-size="7" fill="white">B</text>
      <rect x="110" y="0" width="50" height="35" rx="5" fill="#ba68c8"/>
      <text x="135" y="20" text-anchor="middle" font-size="8" fill="white">Module</text>
      <text x="135" y="32" text-anchor="middle" font-size="7" fill="white">C</text>
    </g>
  </g>
  
  <!-- Step 10: Cohesion & Coupling -->
  <g class="step" id="step10" data-narration="High cohesion means elements belong together inside a module. Low coupling means modules are independent. Both are desirable.">
    <rect x="30" y="910" width="740" height="95" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="935" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">Cohesion &amp; Coupling</text>
    <!-- Cohesion -->
    <g transform="translate(50, 955)">
      <rect x="0" y="0" width="180" height="35" rx="5" fill="#42a5f5"/>
      <text x="90" y="15" text-anchor="middle" font-size="11" fill="white" font-weight="bold">COHESION</text>
      <text x="90" y="28" text-anchor="middle" font-size="9" fill="white">Inside a module</text>
      <text x="190" y="20" font-size="9" fill="#1565c0" font-weight="bold">High = ✓ Desirable</text>
      <text x="190" y="32" font-size="8" color="#424242">Elements belong together</text>
    </g>
    <!-- Coupling -->
    <g transform="translate(400, 955)">
      <rect x="0" y="0" width="180" height="35" rx="5" fill="#42a5f5"/>
      <text x="90" y="15" text-anchor="middle" font-size="11" fill="white" font-weight="bold">COUPLING</text>
      <text x="90" y="28" text-anchor="middle" font-size="9" fill="white">Between modules</text>
      <text x="190" y="20" font-size="9" fill="#1565c0" font-weight="bold">Low = ✓ Desirable</text>
      <text x="190" y="32" font-size="8" color="#424242">Minimal dependencies</text>
    </g>
    <!-- Visual representation -->
    <g transform="translate(650, 955)">
      <circle cx="15" cy="17" r="12" fill="#1976d2" opacity="0.3"/>
      <circle cx="45" cy="17" r="12" fill="#1976d2" opacity="0.3"/>
      <line x1="25" y1="17" x2="35" y2="17" stroke="#1976d2" stroke-width="2" stroke-dasharray="3,2"/>
      <text x="30" y="38" text-anchor="middle" font-size="7" fill="#546e7a">Low Coupling</text>
    </g>
  </g>
</svg>