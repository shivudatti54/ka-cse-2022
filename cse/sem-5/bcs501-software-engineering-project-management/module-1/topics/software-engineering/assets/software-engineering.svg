<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Software Engineering applies engineering principles and computer science methodologies to systematically design, develop, test, and maintain reliable, efficient, and high-quality software products that meet user needs.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Software Engineering</text>
  </g>
  
  <g class="step" id="step1" data-narration="The software crisis of the 1960s-70s caused schedule overruns, cost overruns, quality issues, and maintenance difficulties due to poor engineering practices.">
    <rect x="20" y="58" width="760" h="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">The Software Crisis (1960s-1970s)</text>
    <rect x="40" y="88" width="145" height="45" rx="3" fill="white" stroke="#1976d2" stroke-width="0.5"/>
    <text x="112" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Schedule Overruns</text>
    <rect x="195" y="88" width="145" height="45" rx="3" fill="white" stroke="#1976d2" stroke-width="0.5"/>
    <text x="267" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cost Overruns</text>
    <rect x="350" y="88" width="145" height="45" rx="3" fill="white" stroke="#1976d2" stroke-width="0.5"/>
    <text x="422" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Quality Issues</text>
    <rect x="505" y="88" width="145" height="45" rx="3" fill="white" stroke="#1976d2" stroke-width="0.5"/>
    <text x="577" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Maintenance Difficulties</text>
    <rect x="660" y="88" width="110" height="45" rx="3" fill="white" stroke="#1976d2" stroke-width="0.5"/>
    <text x="715" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Documentation Deficiencies</text>
  </g>
  
  <g class="step" id="step2" data-narration="A software process is a structured set of activities including specification, design, implementation, validation, and maintenance that leads to systematic software production and delivery.">
    <rect x="20" y="151" width="760" h="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Software Process &amp; Process Models</text>
    <rect x="40" y="185" width="120" height="42" rx="3" fill="#388e3c"/>
    <text x="100" y="201" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Specification</text>
    <line x1="130" y1="206" x2="150" y2="206" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="155" y="185" width="120" height="42" rx="3" fill="#388e3c"/>
    <text x="215" y="201" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Design</text>
    <line x1="245" y1="206" x2="265" y2="206" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="270" y="185" width="120" height="42" rx="3" fill="#388e3c"/>
    <text x="330" y="201" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Implementation</text>
    <line x1="360" y1="206" x2="380" y2="206" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="385" y="185" width="120" height="42" rx="3" fill="#388e3c"/>
    <text x="445" y="201" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Validation</text>
    <line x1="475" y1="206" x2="495" y2="206" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="500" y="185" width="120" height="42" rx="3" fill="#388e3c"/>
    <text x="560" y="201" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Maintenance</text>
    <rect x="650" y="188" width="120" height="36" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="0.5"/>
    <text x="710" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Process Model</text>
    <text x="710" y="222" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Framework</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Waterfall Model follows sequential phases with fixed requirements. The Incremental Model delivers small increments for early feedback, while the Spiral Model emphasizes risk management through iterative cycles.">
    <rect x="20" y="244" width="760" h="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Key Process Models</text>
    <rect x="40" y="278" width="230" height="45" rx="3" fill="#ff9800"/>
    <text x="155" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Waterfall Model</text>
    <text x="155" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Sequential phases</text>
    <text x="155" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Fixed requirements</text>
    <rect x="285" y="278" width="230" height="45" rx="3" fill="#ff9800"/>
    <text x="400" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Incremental Model</text>
    <text x="400" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Small increments</text>
    <text x="400" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Early delivery</text>
    <rect x="530" y="278" width="240" height="45" rx="3" fill="#ff9800"/>
    <text x="650" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Spiral Model</text>
    <text x="650" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Risk management</text>
    <text x="650" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">4 phases: Planning, Risk, Engineering, Evaluation</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Prototype Model creates quick mockups for gathering requirements. Agile emphasizes individuals and interactions over processes, working software over documentation, customer collaboration over contracts, and responding to change over rigid planning.">
    <rect x="20" y="337" width="760" h="78" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Prototype &amp; Agile Models</text>
    <rect x="40" y="369" width="345" height="40" rx="3" fill="#9c27b0"/>
    <text x="212" y="384" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Prototype Model</text>
    <text x="212" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Quick mockups → Better requirements</text>
    <rect x="400" y="369" width="370" height="40" rx="3" fill="#9c27b0"/>
    <text x="585" y="384" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Agile Manifesto Values</text>
    <text x="585" y="396" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">Individuals &gt; processes | Software &gt; docs | Collaboration &gt; contracts | Change &gt; plan</text>
  </g>
  
  <g class="step" id="step5" data-narration="Requirements Engineering involves four activities: elicitation through interviews and surveys, analysis for conflict resolution and feasibility, specification using use cases and user stories, and validation through reviews and prototyping to ensure quality.">
    <rect x="20" y="423" width="760" h="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="443" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Requirements Engineering</text>
    <rect x="40" y="457" width="165" height="42" rx="3" fill="#1976d2"/>
    <text x="122" y="472" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">1. Elicitation</text>
    <text x="122" y="485" text-anchor="middle" font-family="Arial" font-size="7" fill="#bbdefb">Interviews, surveys</text>
    <line x1="175" y1="478" x2="195" y2="478" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="205" y="457" width="165" height="42" rx="3" fill="#1976d2"/>
    <text x="287" y="472" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">2. Analysis</text>
    <text x="287" y="485" text-anchor="middle" font-family="Arial" font-size="7" fill="#bbdefb">Conflict resolution</text>
    <line x1="340" y1="478" x2="360" y2="478" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="370" y="457" width="165" height="42" rx="3" fill="#1976d2"/>
    <text x="452" y="472" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">3. Specification</text>
    <text x="452" y="485" text-anchor="middle" font-family="Arial" font-size="7" fill="#bbdefb">Use cases, SRS</text>
    <line x1="505" y1="478" x2="525" y2="478" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="535" y="457" width="165" height="42" rx="3" fill="#1976d2"/>
    <text x="617" y="472" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">4. Validation</text>
    <text x="617" y="485" text-anchor="middle" font-family="Arial" font-size="7" fill="#bbdefb">Reviews</text>
    <rect x="710" y="460" width="60" height="36" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="740" y="475" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Functional</text>
    <text x="740" y="487" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">+ Non-Functional</text>
  </g>
  
  <g class="step" id="step6" data-narration="Software quality according to ISO/IEC 25010 includes functional suitability, reliability, security, maintainability, and portability. Key measurement metrics include function points and defect density for assessing development efficiency and product reliability.">
    <rect x="20" y="516" width="760" h="70" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="536" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Software Quality &amp; Metrics</text>
    <rect x="40" y="548" width="95" height="28" rx="3" fill="white" stroke="#f44336" stroke-width="0.5"/>
    <text x="87" y="561" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Function Points</text>
    <rect x="145" y="548" width="95" height="28" rx="3" fill="white" stroke="#f44336" stroke-width="0.5"/>
    <text x="192" y="561" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Defect Density</text>
    <rect x="250" y="548" width="95" height="28" rx="3" fill="white" stroke="#f44336" stroke-width="0.5"/>
    <text x="297" y="561" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">MTBF</text>
    <text x="400" y="553" font-family="Arial" font-size="9" fill="#c62828">ISO/IEC 25010:</text>
    <text x="400" y="566" font-family="Arial" font-size="8" fill="#333">Functional suitability | Reliability | Security | Maintainability | Portability</text>
    <rect x="650" y="545" width="120" height="30" rx="3" fill="#f44336"/>
    <text x="710" y="563" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Exam Tip: Compare</text>
  </g>
</svg>