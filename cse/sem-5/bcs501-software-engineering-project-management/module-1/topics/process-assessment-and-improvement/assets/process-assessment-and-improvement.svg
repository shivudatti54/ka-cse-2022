<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
<marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
</marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="Software process assessment evaluates development practices to identify strengths, weaknesses, and improvement opportunities using established frameworks like CMMI and ISO/IEC 15504.">
<rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
<text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Process Assessment and Improvement</text>
</g>
<g class="step" id="step1" data-narration="CMMI has five maturity levels: Initial (ad-hoc), Managed (basic management), Defined (organizational standards), Quantitatively Managed (data-driven), and Optimizing (continuous improvement).">
<rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
<text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">CMMI Maturity Levels (5 Levels)</text>
<rect x="40" y="88" width="130" height="42" fill="#fff3e0" stroke="#ff9800" rx="3"/>
<text x="105" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Level 1</text>
<text x="105" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Initial</text>
<rect x="175" y="88" width="130" height="42" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
<text x="240" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Level 2</text>
<text x="240" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Managed</text>
<rect x="310" y="88" width="130" height="42" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
<text x="375" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Level 3</text>
<text x="375" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Defined</text>
<rect x="445" y="88" width="130" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
<text x="510" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Level 4</text>
<text x="510" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Quant Managed</text>
<rect x="580" y="88" width="130" height="42" fill="#ffebee" stroke="#f44336" rx="3"/>
<text x="645" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Level 5</text>
<text x="645" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Optimizing</text>
</g>
<g class="step" id="step2" data-narration="ISO/IEC 15504 (SPICE) defines six capability levels from 0 (Incomplete) to 5 (Optimizing), assessing individual processes rather than organizational maturity.">
<rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
<text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">ISO/IEC 15504 (SPICE) Capability Levels</text>
<rect x="40" y="176" width="108" height="42" fill="#ffebee" stroke="#f44336" rx="3"/>
<text x="94" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Level 0</text>
<text x="94" y="203" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Incomplete</text>
<rect x="152" y="176" width="108" height="42" fill="#fff3e0" stroke="#ff9800" rx="3"/>
<text x="206" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Level 1</text>
<text x="206" y="203" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Initial</text>
<rect x="264" y="176" width="108" height="42" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
<text x="318" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Level 2</text>
<text x="318" y="203" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Managed</text>
<rect x="376" y="176" width="108" height="42" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
<text x="430" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Level 3</text>
<text x="430" y="203" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Defined</text>
<rect x="488" y="176" width="108" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
<text x="542" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Level 4</text>
<text x="542" y="203" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Quant Managed</text>
<rect x="600" y="176" width="108" height="42" fill="#ffebee" stroke="#f44336" rx="3"/>
<text x="654" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Level 5</text>
<text x="654" y="203" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Optimizing</text>
</g>
<g class="step" id="step3" data-narration="PDCA cycle drives continuous improvement through four iterative phases: Plan sets objectives, Do implements actions, Check measures outcomes, and Act standardizes successful practices for ongoing organizational growth.">
<rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="5"/>
<text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">PDCA Cycle (Plan-Do-Check-Act)</text>
<circle cx="130" cy="284" r="25" fill="#1976d2"/>
<text x="130" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">PLAN</text>
<text x="130" y="293" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Set objectives</text>
<line x1="155" y1="284" x2="195" y2="284" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
<circle cx="260" cy="284" r="25" fill="#388e3c"/>
<text x="260" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">DO</text>
<text x="260" y="293" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Implement</text>
<line x1="285" y1="284" x2="325" y2="284" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
<circle cx="390" cy="284" r="25" fill="#9c27b0"/>
<text x="390" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">CHECK</text>
<text x="390" y="293" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Measure results</text>
<line x1="415" y1="284" x2="455" y2="284" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
<circle cx="520" cy="284" r="25" fill="#f44336"/>
<text x="520" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">ACT</text>
<text x="520" y="293" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Standardize</text>
<line x1="155" y1="284" x2="155" y2="250" stroke="#ff9800" stroke-width="1" stroke-dasharray="4"/>
<line x1="545" y1="284" x2="545" y2="250" stroke="#ff9800" stroke-width="1" stroke-dasharray="4"/>
<line x1="155" y1="250" x2="545" y2="250" stroke="#ff9800" stroke-width="1" stroke-dasharray="4"/>
<text x="350" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Continuous Improvement</text>
</g>
<g class="step" id="step4" data-narration="Process assessment uses multiple techniques including interviews with stakeholders, document review of procedures, direct observation of work practices, and work product analysis to identify gaps and recommend concrete improvements.">
<rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
<text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Process Assessment Methods</text>
<rect x="40" y="352" width="165" height="42" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
<text x="122" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">Interviews</text>
<text x="122" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Personnel discussions</text>
<rect x="210" y="352" width="165" height="42" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
<text x="292" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Document Review</text>
<text x="292" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Process documentation</text>
<rect x="380" y="352" width="165" height="42" fill="#fff3e0" stroke="#ff9800" rx="3"/>
<text x="462" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">Observation</text>
<text x="462" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Work practice watching</text>
<rect x="550" y="352" width="165" height="42" fill="#ffebee" stroke="#f44336" rx="3"/>
<text x="632" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">Work Product Analysis</text>
<text x="632" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Artifacts examination</text>
</g>
<g class="step" id="step5" data-narration="Higher maturity delivers predictable processes with better quality and improved outcomes. Organizations progress incrementally through defined improvement stages, achieving reduced defects, better schedule adherence, and increased stakeholder confidence.">
<rect x="20" y="410" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
<text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Benefits of Higher Process Maturity</text>
<rect x="40" y="442" width="145" height="42" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
<text x="112" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Predictable Processes</text>
<text x="112" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Consistent outcomes</text>
<rect x="190" y="442" width="145" height="42" fill="#fff3e0" stroke="#ff9800" rx="3"/>
<text x="262" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">Better Quality</text>
<text x="262" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Reduced defects</text>
<rect x="340" y="442" width="145" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
<text x="412" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">Cost Reduction</text>
<text x="412" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Lower rework costs</text>
<rect x="490" y="442" width="145" height="42" fill="#ffebee" stroke="#f44336" rx="3"/>
<text x="562" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">Customer Satisfaction</text>
<text x="562" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">On-time delivery</text>
<rect x="640" y="442" width="135" height="42" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
<text x="707" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">Productivity Gain</text>
<text x="707" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Efficient teams</text>
</g>
<g class="step" id="step6" data-narration="Quality Management Systems like ISO 9001 provide organizational frameworks for consistent quality. CMMI is staged or continuous, while SPICE assesses per-process capability.">
<rect x="20" y="498" width="760" height="90" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
<text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Key Frameworks Comparison</text>
<rect x="40" y="528" width="230" height="54" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
<text x="155" y="542" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">CMMI</text>
<text x="155" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">SEI (Carnegie Mellon)</text>
<text x="155" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Staged & Continuous</text>
<rect x="275" y="528" width="230" height="54" fill="#fff3e0" stroke="#ff9800" rx="3"/>
<text x="390" y="542" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">ISO/IEC 15504 (SPICE)</text>
<text x="390" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">International Standard</text>
<text x="390" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Process Capability Levels 0-5</text>
<rect x="510" y="528" width="230" height="54" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
<text x="625" y="542" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">ISO 9001 (QMS)</text>
<text x="625" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Generic Quality Standard</text>
<text x="625" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Customer Focus & Improvement</text>
</g>
</svg>