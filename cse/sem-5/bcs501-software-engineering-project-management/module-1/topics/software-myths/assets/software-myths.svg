<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
<marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
</marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
</marker>
<marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Software myths are widespread misconceptions about software development that persist in the industry and lead to costly project failures and delays.">
<rect x="0" y="10" width="800" height="40" fill="#455a64" rx="5"/>
<text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">SOFTWARE MYTHS IN SOFTWARE ENGINEERING</text>
</g>

<g class="step" id="step1" data-narration="Management myths include believing textbooks provide complete guidance and that adding programmers can speed up late projects, often causing more complications.">
<rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
<text x="30" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">MANAGEMENT MYTHS</text>
<rect x="30" y="90" width="230" height="38" fill="#bbdefb" rx="4"/>
<text x="40" y="108" font-family="Arial" font-size="9" fill="#0d47a1">"We have a book that tells us how to do it"</text>
<text x="40" y="120" font-family="Arial" font-size="8" fill="#1565c0">Reality: Each project is unique, requires adaptation</text>
<rect x="270" y="90" width="230" height="38" fill="#bbdefb" rx="4"/>
<text x="280" y="108" font-family="Arial" font-size="9" fill="#0d47a1">"Add more programmers to catch up"</text>
<text x="280" y="120" font-family="Arial" font-size="8" fill="#1565c0">Reality: Brooks' Law - adds delay, not speed</text>
<rect x="510" y="90" width="260" height="38" fill="#bbdefb" rx="4"/>
<text x="520" y="108" font-family="Arial" font-size="9" fill="#0d47a1">"Changing requirements restarts project"</text>
<text x="520" y="120" font-family="Arial" font-size="8" fill="#1565c0">Reality: Modular design allows changes</text>
</g>

<g class="step" id="step2" data-narration="Customer myths involve vague requirements and dangerously underestimating the exponential cost of changes. Detailed specifications and use cases are essential for success.">
<rect x="10" y="146" width="780" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
<text x="30" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">CUSTOMER MYTHS</text>
<rect x="30" y="180" width="360" height="38" fill="#c8e6c9" rx="4"/>
<text x="40" y="198" font-family="Arial" font-size="9" fill="#1b5e20">"A general statement of objectives is sufficient"</text>
<text x="40" y="210" font-family="Arial" font-size="8" fill="#2e7d32">Reality: Detailed specs and use cases are essential</text>
<rect x="400" y="180" width="370" height="38" fill="#c8e6c9" rx="4"/>
<text x="410" y="198" font-family="Arial" font-size="9" fill="#1b5e20">"Requirements changes can be accommodated easily"</text>
<text x="410" y="210" font-family="Arial" font-size="8" fill="#2e7d32">Reality: Late changes cost 20-100× more</text>
</g>

<g class="step" id="step3" data-narration="Developer myths include thinking the job ends after programming and that only working code matters. Documentation and testing are equally important.">
<rect x="10" y="234" width="780" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
<text x="30" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">DEVELOPER MYTHS</text>
<rect x="30" y="268" width="230" height="38" fill="#ffe0b2" rx="4"/>
<text x="40" y="286" font-family="Arial" font-size="9" fill="#e65100">"Once we write and run the program, job is done"</text>
<text x="40" y="298" font-family="Arial" font-size="8" fill="#f57c00">Reality: Maintenance accounts for majority of costs</text>
<rect x="270" y="268" width="230" height="38" fill="#ffe0b2" rx="4"/>
<text x="280" y="286" font-family="Arial" font-size="9" fill="#e65100">"Only deliverable worth considering is working program"</text>
<text x="280" y="298" font-family="Arial" font-size="8" fill="#f57c00">Reality: Docs, test plans, design docs equally important</text>
<rect x="510" y="268" width="260" height="38" fill="#ffe0b2" rx="4"/>
<text x="520" y="286" font-family="Arial" font-size="9" fill="#e65100">"I can create a wonderful program in a few weeks"</text>
<text x="520" y="298" font-family="Arial" font-size="8" fill="#f57c00">Reality: Requires user needs, integration, security</text>
</g>

<g class="step" id="step4" data-narration="Technology myths include overestimating tools over practices and believing 100% testing reliability is achievable. Good processes matter more than fancy tools.">
<rect x="10" y="322" width="780" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
<text x="30" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">TECHNOLOGY MYTHS</text>
<rect x="30" y="356" width="360" height="38" fill="#e1bee7" rx="4"/>
<text x="40" y="374" font-family="Arial" font-size="9" fill="#4a148c">"Tools are more important than development practices"</text>
<text x="40" y="386" font-family="Arial" font-size="8" fill="#7b1fa2">Reality: Good processes first, tools enhance them</text>
<rect x="400" y="356" width="370" height="38" fill="#e1bee7" rx="4"/>
<text x="410" y="374" font-family="Arial" font-size="9" fill="#4a148c">"We can achieve 100% reliability with enough testing"</text>
<text x="410" y="386" font-family="Arial" font-size="8" fill="#7b1fa2">Reality: Testing shows defects presence, not absence</text>
</g>

<g class="step" id="step5" data-narration="Real examples show man-month myth causes delays, requirements changes escalate costs exponentially, and working code alone earns lower marks without documentation.">
<rect x="10" y="410" width="780" height="80" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
<text x="30" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">REAL-WORLD EXAMPLES</text>
<rect x="30" y="446" width="240" height="36" fill="#ffcdd2" rx="4"/>
<text x="40" y="460" font-family="Arial" font-size="8" fill="#b71c1c">Man-Month Myth: 3 devs + 3 new = 7 mo</text>
<text x="40" y="474" font-family="Arial" font-size="8" fill="#c62828">instead of planned 6 months</text>
<rect x="280" y="446" width="250" height="36" fill="#ffcdd2" rx="4"/>
<text x="290" y="460" font-family="Arial" font-size="8" fill="#b71c1c">Requirements Cost Escalation:</text>
<text x="290" y="474" font-family="Arial" font-size="8" fill="#c62828">₹50K → ₹150K → ₹350K → ₹1M</text>
<rect x="540" y="446" width="230" height="36" fill="#ffcdd2" rx="4"/>
<text x="550" y="460" font-family="Arial" font-size="8" fill="#b71c1c">Student Project: Working app but</text>
<text x="550" y="474" font-family="Arial" font-size="8" fill="#c62828">no docs = lower marks</text>
</g>

<g class="step" id="step6" data-narration="Key takeaways: Remember Brooks Law, cost escalation factors, and the three myth categories. Focus on processes over tools and understand software engineering extends beyond coding.">
<rect x="10" y="498" width="780" height="90" fill="#e0f2f1" rx="8" stroke="#00796b" stroke-width="2"/>
<text x="30" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#00796b">KEY TAKEAWAYS FOR EXAM</text>
<rect x="30" y="534" width="150" height="45" fill="#b2dfdb" rx="4"/>
<text x="40" y="550" font-family="Arial" font-size="9" fill="#004d40">Brooks' Law</text>
<text x="40" y="562" font-family="Arial" font-size="8" fill="#00695c">Adding manpower to</text>
<text x="40" y="572" font-family="Arial" font-size="8" fill="#00695c">late project delays it</text>
<rect x="190" y="534" width="150" height="45" fill="#b2dfdb" rx="4"/>
<text x="200" y="550" font-family="Arial" font-size="9" fill="#004d40">Cost Multiplier</text>
<text x="200" y="562" font-family="Arial" font-size="8" fill="#00695c">Late changes cost</text>
<text x="200" y="572" font-family="Arial" font-size="8" fill="#00695c">20-100× more</text>
<rect x="350" y="534" width="160" height="45" fill="#b2dfdb" rx="4"/>
<text x="360" y="550" font-family="Arial" font-size="9" fill="#004d40">Three Categories</text>
<text x="360" y="562" font-family="Arial" font-size="8" fill="#00695c">Management, Customer,</text>
<text x="360" y="572" font-family="Arial" font-size="8" fill="#00695c">Developer myths</text>
<rect x="520" y="534" width="250" height="45" fill="#b2dfdb" rx="4"/>
<text x="530" y="550" font-family="Arial" font-size="9" fill="#004d40">Complete Product</text>
<text x="530" y="562" font-family="Arial" font-size="8" fill="#00695c">Working program + docs +</text>
<text x="530" y="572" font-family="Arial" font-size="8" fill="#00695c">test plans + design documents</text>
</g>
</svg>