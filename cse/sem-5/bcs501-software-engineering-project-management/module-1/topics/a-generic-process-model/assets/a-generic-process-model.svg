<svg viewBox="0 0 800 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
    <linearGradient id="waterfallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="incrementalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="radGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="spiralGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="agileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <linearGradient id="summaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes growUp {
      from { transform: scaleY(0); transform-origin: bottom; }
      to { transform: scaleY(1); transform-origin: bottom; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { font-family: 'Segoe UI', sans-serif; font-weight: bold; }
    .body-text { font-family: 'Segoe UI', sans-serif; }
    .label-text { font-family: 'Segoe UI', sans-serif; font-size: 8px; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1350" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Software Engineering Process Models - the structured frameworks that guide software development.">
    <rect x="20" y="10" width="760" height="45" rx="10" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" font-size="22" font-weight="bold" class="title-text">A Generic Process Model</text>
    <text x="400" y="58" text-anchor="middle" fill="#546e7a" font-size="11" class="body-text">Software Engineering Fundamentals | university 2022</text>
  </g>
  
  <!-- Step 1: What is a Process Model? -->
  <g class="step" id="step1" data-narration="A process model is a structured framework defining activities to transform requirements into software products.">
    <rect x="40" y="70" width="720" height="85" rx="8" fill="white" stroke="#cfd8dc" stroke-width="1"/>
    <rect x="40" y="70" width="720" height="20" rx="8" fill="#eceff1"/>
    <text x="55" y="84" fill="#37474f" font-size="11" font-weight="bold" class="title-text">What is a Process Model?</text>
    <text x="55" y="105" fill="#546e7a" font-size="10" class="body-text">A structured framework defining activities, actions, and tasks to transform</text>
    <text x="55" y="120" fill="#546e7a" font-size="10" class="body-text">user requirements into functional software products.</text>
    <text x="55" y="140" fill="#78909c" font-size="9" class="label-text">Key: What → When → How → Who → What Outputs</text>
  </g>
  
  <!-- Step 2: SDLC Overview -->
  <g class="step" id="step2" data-narration="The Software Development Life Cycle (SDLC) encompasses all phases from requirements to maintenance.">
    <rect x="40" y="170" width="720" height="75" rx="8" fill="white" stroke="#cfd8dc" stroke-width="1"/>
    <rect x="40" y="170" width="720" height="20" rx="8" fill="#eceff1"/>
    <text x="55" y="184" fill="#37474f" font-size="11" font-weight="bold" class="title-text">Software Development Life Cycle (SDLC)</text>
    <!-- SDLC Flow -->
    <g transform="translate(80, 210)">
      <rect x="0" y="0" width="90" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
      </rect>
      <text x="45" y="15" text-anchor="middle" fill="#1565c0" font-size="9" font-weight="bold">Requirements</text>
      <path d="M95 11 L110 11" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)">
        <animate attributeName="stroke-dasharray" from="0,20" to="20,0" dur="0.3s" begin="0.8s" fill="freeze"/>
      </path>
      <rect x="115" y="0" width="90" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
      </rect>
      <text x="160" y="15" text-anchor="middle" fill="#1565c0" font-size="9" font-weight="bold">Design</text>
      <path d="M210 11 L225 11" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)">
        <animate attributeName="stroke-dasharray" from="0,20" to="20,0" dur="0.3s" begin="1.1s" fill="freeze"/>
      </path>
      <rect x="230" y="0" width="90" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
      </rect>
      <text x="275" y="15" text-anchor="middle" fill="#1565c0" font-size="9" font-weight="bold">Implementation</text>
      <path d="M325 11 L340 11" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)">
        <animate attributeName="stroke-dasharray" from="0,20" to="20,0" dur="0.3s" begin="1.4s" fill="freeze"/>
      </path>
      <rect x="345" y="0" width="90" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
      </rect>
      <text x="390" y="15" text-anchor="middle" fill="#1565c0" font-size="9" font-weight="bold">Testing</text>
      <path d="M440 11 L455 11" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowhead)">
        <animate attributeName="stroke-dasharray" from="0,20" to="20,0" dur="0.3s" begin="1.7s" fill="freeze"/>
      </path>
      <rect x="460" y="0" width="100" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.3s" fill="freeze"/>
      </rect>
      <text x="510" y="15" text-anchor="middle" fill="#1565c0" font-size="9" font-weight="bold">Maintenance</text>
    </g>
  </g>
  
  <!-- Step 3: Waterfall Model - Phases -->
  <g class="step" id="step3" data-narration="The Waterfall Model follows rigid sequential phases where each phase must complete before the next begins.">
    <rect x="40" y="260" width="720" height="90" rx="8" fill="url(#waterfallGrad)" stroke="#90caf9" stroke-width="1"/>
    <rect x="40" y="260" width="720" height="20" rx="8" fill="#1976d2"/>
    <text x="55" y="274" fill="white" font-size="11" font-weight="bold" class="title-text">Linear Sequential Model (Waterfall)</text>
    <!-- Waterfall diagram -->
    <g transform="translate(80, 295)">
      <polygon points="0,35 30,0 60,35 30,70" fill="#1565c0" stroke="#0d47a1" stroke-width="1" filter="url(#shadow)">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
      </polygon>
      <text x="30" y="30" text-anchor="middle" fill="white" font-size="7" font-weight="bold">REQ</text>
      <polygon points="80,35 110,0 140,35 110,70" fill="#1976d2" stroke="#0d47a1" stroke-width="1" filter="url(#shadow)">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
      </polygon>
      <text x="110" y="30" text-anchor="middle" fill="white" font-size="7" font-weight="bold">DESIGN</text>
      <polygon points="160,35 190,0 220,35 190,70" fill="#1e88e5" stroke="#0d47a1" stroke-width="1" filter="url(#shadow)">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.7s" fill="freeze"/>
      </polygon>
      <text x="190" y="30" text-anchor="middle" fill="white" font-size="7" font-weight="bold">IMPLEMENT</text>
      <polygon points="240,35 270,0 300,35 270,70" fill="#42a5f5" stroke="#1565c0" stroke-width="1" filter="url(#shadow)">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.9s" fill="freeze"/>
      </polygon>
      <text x="270" y="30" text-anchor="middle" fill="white" font-size="7" font-weight="bold">TEST</text>
      <polygon points="320,35 350,0 380,35 350,70" fill="#64b5f6" stroke="#1976d2" stroke-width="1" filter="url(#shadow)">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.1s" fill="freeze"/>
      </polygon>
      <text x="350" y="30" text-anchor="middle" fill="white" font-size="7" font-weight="bold">MAINTAIN</text>
      <!-- Connecting lines showing cascade -->
      <line x1="60" y1="35" x2="80" y2="35" stroke="#546e7a" stroke-width="2" stroke-dasharray="5,3">
        <animate attributeName="stroke-dashoffset" from="50" to="0" dur="0.5s" begin="0.4s" fill="freeze"/>
      </line>
      <line x1="140" y1="35" x2="160" y2="35" stroke="#546e7a" stroke-width="2" stroke-dasharray="5,3">
        <animate attributeName="stroke-dashoffset" from="50" to="0" dur="0.5s" begin="0.6s" fill="freeze"/>
      </line>
      <line x1="220" y1="35" x2="240" y2="35" stroke="#546e7a" stroke-width="2" stroke-dasharray="5,3">
        <animate attributeName="stroke-dashoffset" from="50" to="0" dur="0.5s" begin="0.8s" fill="freeze"/>
      </line>
      <line x1="300" y1="35" x2="320" y2="35" stroke="#546e7a" stroke-width="2" stroke-dasharray="5,3">
        <animate attributeName="stroke-dashoffset" from="50" to="0" dur="0.5s" begin="1.0s" fill="freeze"/>
      </line>
    </g>
  </g>
  
  <!-- Step 4: Waterfall Pros/Cons -->
  <g class="step" id="step4" data-narration="Waterfall offers simplicity and clear milestones but lacks flexibility for changing requirements.">
    <rect x="40" y="365" width="350" height="70" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
    <text x="55" y="380" fill="#2e7d32" font-size="10" font-weight="bold" class="title-text">✓ Advantages</text>
    <text x="55" y="395" fill="#546e7a" font-size="8" class="body-text">• Simple to understand and manage</text>
    <text x="55" y="408" fill="#546e7a" font-size="8" class="body-text">• Clear milestones and deliverables</text>
    <text x="55" y="421" fill="#546e7a" font-size="8" class="body-text">• Works well for small, stable projects</text>
    
    <rect x="410" y="365" width="350" height="70" rx="8" fill="#ffebee" stroke="#ffcdd2" stroke-width="1"/>
    <text x="425" y="380" fill="#c62828" font-size="10" font-weight="bold" class="title-text">✗ Disadvantages</text>
    <text x="425" y="395" fill="#546e7a" font-size="8" class="body-text">• Inflexible to requirement changes</text>
    <text x="425" y="408" fill="#546e7a" font-size="8" class="body-text">• Late testing delays error detection</text>
    <text x="425" y="421" fill="#546e7a" font-size="8" class="body-text">• Customer sees product only at end</text>
  </g>
  
  <!-- Step 5: Incremental Model -->
  <g class="step" id="step5" data-narration="The Incremental Model delivers software in small usable increments, allowing early feedback and flexibility.">
    <rect x="40" y="450" width="720" height="85" rx="8" fill="url(#incrementalGrad)" stroke="#a5d6a7" stroke-width="1"/>
    <rect x="40" y="450" width="720" height="20" rx="8" fill="#388e3c"/>
    <text x="55" y="464" fill="white" font-size="11" font-weight="bold" class="title-text">Incremental Model - Deliver Software in Stages</text>
    <!-- Incremental bars -->
    <g transform="translate(60, 490)">
      <rect x="0" y="25" width="120" height="20" rx="3" fill="#66bb6a" filter="url(#shadow)">
        <animate attributeName="width" from="0" to="120" dur="0.5s" begin="0.3s" fill="freeze"/>
      </rect>
      <text x="60" y="40" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Increment 1: Core</text>
      <rect x="130" y="15" width="120" height="30" rx="3" fill="#4caf50" filter="url(#shadow)">
        <animate attributeName="width" from="0" to="120" dur="0.5s" begin="0.6s" fill="freeze"/>
      </rect>
      <text x="190" y="35" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Increment 2</text>
      <rect x="260" y="5" width="120" height="40" rx="3" fill="#43a047" filter="url(#shadow)">
        <animate attributeName="width" from="0" to="120" dur="0.5s" begin="0.9s" fill="freeze"/>
      </rect>
      <text x="320" y="30" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Increment 3</text>
      <rect x="390" y="-5" width="120" height="50" rx="3" fill="#388e3c" filter="url(#shadow)">
        <animate attributeName="width" from="0" to="120" dur="0.5s" begin="1.2s" fill="freeze"/>
      </rect>
      <text x="450" y="25" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Increment N</text>
    </g>
    <text x="60" y="542" fill="#546e7a" font-size="8" class="label-text">Each increment adds functionality → Customer evaluates → Feedback incorporated</text>
  </g>
  
  <!-- Step 6: RAD Model -->
  <g class="step" id="step6" data-narration="RAD emphasizes rapid prototyping and automated tools for fast development with high customer involvement.">
    <rect x="40" y="550" width="720" height="85" rx="8" fill="url(#radGrad)" stroke="#ffcc80" stroke-width="1"/>
    <rect x="40" y="550" width="720" height="20" rx="8" fill="#f57c00"/>
    <text x="55" y="564" fill="white" font-size="11" font-weight="bold" class="title-text">Rapid Application Development (RAD) Model</text>
    <!-- RAD phases -->
    <g transform="translate(60, 590)">
      <g>
        <rect x="0" y="0" width="100" height="28" rx="5" fill="#ff9800" filter="url(#shadow)">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
        </rect>
        <text x="50" y="18" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Business</text>
        <text x="50" y="28" text-anchor="middle" fill="white" font-size="7">Modeling</text>
      </g>
      <g>
        <rect x="110" y="0" width="100" height="28" rx="5" fill="#ff9800" filter="url(#shadow)">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.4s" fill="freeze"/>
        </rect>
        <text x="160" y="18" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Data</text>
        <text x="160" y="28" text-anchor="middle" fill="white" font-size="7">Modeling</text>
      </g>
      <g>
        <rect x="220" y="0" width="100" height="28" rx="5" fill="#ff9800" filter="url(#shadow)">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
        </rect>
        <text x="270" y="18" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Process</text>
        <text x="270" y="28" text-anchor="middle" fill="white" font-size="7">Modeling</text>
      </g>
      <g>
        <rect x="330" y="0" width="100" height="28" rx="5" fill="#ff9800" filter="url(#shadow)">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
        </rect>
        <text x="380" y="18" text-anchor="middle" fill="white" font-size="8" font-weight="bold">App</text>
        <text x="380" y="28" text-anchor="middle" fill="white" font-size="7">Generation</text>
      </g>
      <g>
        <rect x="440" y="0" width="100" height="28" rx="5" fill="#ff9800" filter="url(#shadow)">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.0s" fill="freeze"/>
        </rect>
        <text x="490" y="18" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Testing</text>
        <text x="490" y="28" text-anchor="middle" fill="white" font-size="7">&amp; Turnover</text>
      </g>
    </g>
    <text x="60" y="643" fill="#e65100" font-size="8" class="label-text">Key: Rapid Prototyping + Component Reuse + Automated Code Generation</text>
  </g>
  
  <!-- Step 7: Spiral Model -->
  <g class="step" id="step7" data-narration="The Spiral Model combines iterative development with systematic risk assessment through multiple cycles.">
    <rect x="40" y="650" width="720" height="90" rx="8" fill="url(#spiralGrad)" stroke="#ce93d8" stroke-width="1"/>
    <rect x="40" y="650" width="720" height="20" rx="8" fill="#7b1fa2"/>
    <text x="55" y="664" fill="white" font-size="11" font-weight="bold" class="title-text">Spiral Model - Risk-Driven Iterative Approach</text>
    <!-- Spiral diagram -->
    <g transform="translate(80, 685)">
      <!-- Spiral path -->
</svg>