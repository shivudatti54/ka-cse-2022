<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Other Agile Process Models - A visual guide covering six major agile methodologies: Kanban, Lean, Crystal, FDD, DSDM, and Scrumban for  students.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Other Agile Process Models</text>
  </g>
  
  <g class="step" id="step1" data-narration="Kanban is a visual workflow method from Toyota. Core practices: visualize workflow, limit WIP, manage flow. Unlike Scrum, it allows continuous work delivery without sprints.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <rect x="20" y="58" width="120" height="85" fill="#1976d2" rx="5"/>
    <text x="80" y="88" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Kanban</text>
    <text x="150" y="80" font-family="Arial" font-size="10" fill="#333">Visual workflow management from Toyota's production system</text>
    <text x="150" y="95" font-family="Arial" font-size="9" fill="#666">• WIP limits prevent overload</text>
    <text x="150" y="108" font-family="Arial" font-size="9" fill="#666">• Continuous flow, no sprints</text>
    <text x="150" y="121" font-family="Arial" font-size="9" fill="#666">• Ideal for support teams</text>
    <line x1="280" y1="75" x2="320" y2="75" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="330" y="80" font-family="Arial" font-size="9" fill="#388e3c">vs Scrum: No fixed iterations</text>
  </g>
  
  <g class="step" id="step2" data-narration="Lean Software Development applies Toyota principles: eliminate waste, build quality in, create knowledge, defer commitment, deliver fast, optimize whole, respect people.">
    <rect x="20" y="151" width="760" height="85" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <rect x="20" y="151" width="120" height="85" fill="#388e3c" rx="5"/>
    <text x="80" y="181" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Lean</text>
    <text x="150" y="173" font-family="Arial" font-size="10" fill="#333">Seven principles from Toyota Production System</text>
    <text x="150" y="188" font-family="Arial" font-size="9" fill="#333">1. Eliminate Waste</text>
    <text x="150" y="201" font-family="Arial" font-size="9" fill="#333">2. Build Quality In</text>
    <text x="150" y="214" font-family="Arial" font-size="9" fill="#333">3. Create Knowledge</text>
    <text x="250" y="188" font-family="Arial" font-size="9" fill="#333">4. Defer Commitment</text>
    <text x="250" y="201" font-family="Arial" font-size="9" fill="#333">5. Deliver Fast</text>
    <text x="250" y="214" font-family="Arial" font-size="9" fill="#333">6. Optimize the Whole</text>
    <text x="340" y="201" font-family="Arial" font-size="9" fill="#333">7. Respect People</text>
    <text x="600" y="185" font-family="Arial" font-size="9" fill="#666">Tools: Value Stream Mapping,</text>
    <text x="600" y="198" font-family="Arial" font-size="9" fill="#666">Kaizen, Poka-Yoke</text>
  </g>
  
  <g class="step" id="step3" data-narration="Crystal methodology scales with team size: Clear (1-8), Yellow (9-20), Orange (21-40), Red (41-80). Emphasizes frequent delivery, osmotic communication, and personal safety.">
    <rect x="20" y="244" width="760" height="85" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <rect x="20" y="244" width="120" height="85" fill="#9c27b0" rx="5"/>
    <text x="80" y="274" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Crystal</text>
    <text x="150" y="266" font-family="Arial" font-size="10" fill="#333">Family of agile methods scaled by team size</text>
    <rect x="150" y="275" width="90" height="45" fill="#fff" stroke="#9c27b0" rx="3"/>
    <text x="195" y="290" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Clear</text>
    <text x="195" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1-8 members</text>
    <rect x="250" y="275" width="90" height="45" fill="#fff" stroke="#9c27b0" rx="3"/>
    <text x="295" y="290" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Yellow</text>
    <text x="295" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">9-20 members</text>
    <rect x="350" y="275" width="90" height="45" fill="#fff" stroke="#9c27b0" rx="3"/>
    <text x="395" y="290" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Orange</text>
    <text x="395" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">21-40 members</text>
    <rect x="450" y="275" width="90" height="45" fill="#fff" stroke="#9c27b0" rx="3"/>
    <text x="495" y="290" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Red</text>
    <text x="495" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">41-80 members</text>
    <text x="560" y="265" font-family="Arial" font-size="8" fill="#666">Properties: Frequent Delivery,</text>
    <text x="560" y="277" font-family="Arial" font-size="8" fill="#666">Reflective Improvement,</text>
    <text x="560" y="289" font-family="Arial" font-size="8" fill="#666">Osmotic Communication,</text>
    <text x="560" y="301" font-family="Arial" font-size="8" fill="#666">Personal Safety, Focus</text>
  </g>
  
  <g class="step" id="step4" data-narration="Feature-Driven Development uses domain modeling for large projects. Key roles: Chief Programmer, Domain Expert, Domain Manager. Process: model domain, build feature list, design and build by feature.">
    <rect x="20" y="337" width="760" height="85" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <rect x="20" y="337" width="120" height="85" fill="#ff9800" rx="5"/>
    <text x="80" y="367" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">FDD</text>
    <text x="150" y="359" font-family="Arial" font-size="10" fill="#333">Feature-Driven Development - for large-scale projects</text>
    <text x="150" y="375" font-family="Arial" font-size="9" fill="#333">Key Roles:</text>
    <text x="150" y="388" font-family="Arial" font-size="8" fill="#666">• Chief Programmer</text>
    <text x="150" y="400" font-family="Arial" font-size="8" fill="#666">• Domain Expert</text>
    <text x="230" y="388" font-family="Arial" font-size="8" fill="#666">• Domain Manager</text>
    <text x="230" y="400" font-family="Arial" font-size="8" fill="#666">• Chief Architect</text>
    <text x="330" y="375" font-family="Arial" font-size="9" fill="#333">Process:</text>
    <text x="330" y="388" font-family="Arial" font-size="8" fill="#666">1. Develop Domain Model</text>
    <text x="330" y="400" font-family="Arial" font-size="8" fill="#666">2. Build Feature List</text>
    <text x="430" y="388" font-family="Arial" font-size="8" fill="#666">3. Plan by Feature</text>
    <text x="430" y="400" font-family="Arial" font-size="8" fill="#666">4. Design by Feature</text>
    <text x="530" y="388" font-family="Arial" font-size="8" fill="#666">5. Build by Feature</text>
    <text x="620" y="375" font-family="Arial" font-size="9" fill="#e65100">Best for: 100+ features</text>
  </g>
  
  <g class="step" id="step5" data-narration="Dynamic Systems Development Method is a formal agile framework with phases: Feasibility Study, Business Study, Functional Model, Design/Build, Implementation. Used in regulated industries.">
    <rect x="20" y="430" width="760" height="85" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <rect x="20" y="430" width="120" height="85" fill="#f44336" rx="5"/>
    <text x="80" y="460" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">DSDM</text>
    <text x="150" y="452" font-family="Arial" font-size="10" fill="#333">Dynamic Systems Development Method - formal agile</text>
    <rect x="150" y="465" width="110" height="40" fill="#fff" stroke="#f44336" rx="3"/>
    <text x="205" y="480" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Feasibility</text>
    <text x="205" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Study</text>
    <line x1="260" y1="485" x2="280" y2="485" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="280" y="465" width="110" height="40" fill="#fff" stroke="#f44336" rx="3"/>
    <text x="335" y="480" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Business</text>
    <text x="335" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Study</text>
    <line x1="390" y1="485" x2="410" y2="485" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="410" y="465" width="110" height="40" fill="#fff" stroke="#f44336" rx="3"/>
    <text x="465" y="480" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Functional</text>
    <text x="465" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Model</text>
    <line x1="520" y1="485" x2="540" y2="485" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="540" y="465" width="110" height="40" fill="#fff" stroke="#f44336" rx="3"/>
    <text x="595" y="480" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Design &amp;</text>
    <text x="595" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Build</text>
    <line x1="650" y1="485" x2="670" y2="485" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="670" y="465" width="90" height="40" fill="#fff" stroke="#f44336" rx="3"/>
    <text x="715" y="480" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Implement</text>
    <text x="715" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">-ation</text>
    <text x="150" y="515" font-family="Arial" font-size="8" fill="#666">Used in: Finance, Healthcare (regulated industries)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Scrumban combines Scrum roles and ceremonies with Kanban's visual board and WIP limits. Ideal for teams transitioning from Scrum to Kanban or handling mixed workloads.">
    <rect x="20" y="523" width="760" height="60" fill="#e0f2f1" stroke="#00796b" stroke-width="2" rx="5"/>
    <rect x="20" y="523" width="120" height="60" fill="#00796b" rx="5"/>
    <text x="80" y="550" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Scrumban</text>
    <text x="150" y="545" font-family="Arial" font-size="10" fill="#333">Hybrid: Scrum + Kanban</text>
    <text x="150" y="560" font-family="Arial" font-size="9" fill="#666">Uses Scrum: Roles (Scrum Master, PO), Ceremonies (Sprints)</text>
    <text x="400" y="545" font-family="Arial" font-size="9" fill="#666">Adopts Kanban: Visual Board, WIP Limits, Flow</text>
    <text x="400" y="560" font-family="Arial" font-size="9" fill="#388e3c">Best for: Teams transitioning to agile, mixed support/development</text>
  </g>
</svg>