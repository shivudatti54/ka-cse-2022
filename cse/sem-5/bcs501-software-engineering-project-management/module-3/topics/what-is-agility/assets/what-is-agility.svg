<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about Agile Methodology, a flexible approach to software development that emphasizes collaboration, iterative progress, and adaptive planning in modern projects.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Agile Methodology - Understanding Agility</text>
  </g>
  
  <g class="step" id="step1" data-narration="Agile is a software development approach that values flexibility, collaboration, and delivering working software incrementally rather than all at once.">
    <rect x="20" y="58" width="760" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Agile?</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">Agile is a flexible, iterative approach to software development that emphasizes:</text>
    <rect x="40" y="110" width="160" height="25" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="126" font-family="Arial" font-size="10" fill="#333">• Collaboration</text>
    <rect x="210" y="110" width="160" height="25" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="126" font-family="Arial" font-size="10" fill="#333">• Iterative Progress</text>
    <rect x="380" y="110" width="160" height="25" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="390" y="126" font-family="Arial" font-size="10" fill="#333">• Customer Satisfaction</text>
    <rect x="550" y="110" width="160" height="25" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="560" y="126" font-family="Arial" font-size="10" fill="#333">• Responding to Change</text>
  </g>
  
  <g class="step" id="step2" data-narration="The Agile Manifesto has four core values: individuals over processes, working software over documentation, customer collaboration, and responding to change.">
    <rect x="20" y="151" width="760" height="85" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="173" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">The Agile Manifesto - Four Values</text>
    <rect x="40" y="188" width="170" height="40" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="202" font-family="Arial" font-size="9" fill="#333"><tspan x="50" dy="0">1. Individuals and</tspan><tspan x="50" dy="12">interactions over</tspan><tspan x="50" dy="12">processes and tools</tspan></text>
    <rect x="220" y="188" width="170" height="40" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="230" y="202" font-family="Arial" font-size="9" fill="#333"><tspan x="230" dy="0">2. Working software</tspan><tspan x="230" dy="12">over comprehensive</tspan><tspan x="230" dy="12">documentation</tspan></text>
    <rect x="400" y="188" width="170" height="40" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="410" y="202" font-family="Arial" font-size="9" fill="#333"><tspan x="410" dy="0">3. Customer</tspan><tspan x="410" dy="12">collaboration over</tspan><tspan x="410" dy="12">contract negotiation</tspan></text>
    <rect x="580" y="188" width="170" height="40" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="590" y="202" font-family="Arial" font-size="9" fill="#333"><tspan x="590" dy="0">4. Responding to</tspan><tspan x="590" dy="12">change over</tspan><tspan x="590" dy="12">following a plan</tspan></text>
  </g>
  
  <g class="step" id="step3" data-narration="Agile differs from Waterfall by using iterative cycles with flexibility, while Waterfall follows rigid sequential phases with fixed upfront requirements in software projects.">
    <rect x="20" y="244" width="760" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="266" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Agile vs Waterfall</text>
    <rect x="40" y="280" width="345" height="40" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="294" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Waterfall (Traditional)</text>
    <text x="50" y="310" font-family="Arial" font-size="9" fill="#333">Sequential, rigid phases, changes difficult, late delivery</text>
    <rect x="400" y="280" width="345" height="40" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="410" y="294" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Agile (Iterative)</text>
    <text x="410" y="310" font-family="Arial" font-size="9" fill="#333">Iterative cycles, flexible to changes, continuous delivery</text>
  </g>
  
  <g class="step" id="step4" data-narration="Scrum is a popular Agile framework with roles like Product Owner, Scrum Master, and Development Team, using sprints of 2-4 weeks.">
    <rect x="20" y="337" width="760" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="359" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Scrum Framework - Key Roles</text>
    <rect x="40" y="375" width="230" height="38" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="389" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Product Owner</text>
    <text x="50" y="404" font-family="Arial" font-size="9" fill="#333">Manages backlog, decides what to build</text>
    <rect x="285" y="375" width="230" height="38" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="295" y="389" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Scrum Master</text>
    <text x="295" y="404" font-family="Arial" font-size="9" fill="#333">Facilitates process, removes blockers</text>
    <rect x="530" y="375" width="230" height="38" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="540" y="389" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Development Team</text>
    <text x="540" y="404" font-family="Arial" font-size="9" fill="#333">Self-organizing, builds the product</text>
  </g>
  
  <g class="step" id="step5" data-narration="Key Agile terms include User Stories in As-Who-What format, Sprints as time-boxed iterations, and Product and Sprint Backlogs for tracking work.">
    <rect x="20" y="430" width="760" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="452" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Key Agile Terminology</text>
    <rect x="40" y="466" width="220" height="40" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="480" font-family="Arial" font-size="9" fill="#333"><tspan x="50" dy="0">User Story: "As a user,</tspan><tspan x="50" dy="11">I want... so that..."</tspan></text>
    <rect x="275" y="466" width="220" height="40" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="285" y="480" font-family="Arial" font-size="9" fill="#333"><tspan x="285" dy="0">Sprint: Time-boxed iteration</tspan><tspan x="285" dy="11">(typically 2-4 weeks)</tspan></text>
    <rect x="510" y="466" width="250" height="40" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="520" y="480" font-family="Arial" font-size="9" fill="#333"><tspan x="520" dy="0">Product Backlog: Prioritized</tspan><tspan x="520" dy="11">list of all work items</tspan></text>
  </g>
  
  <g class="step" id="step6" data-narration="Agile ceremonies include Sprint Planning, Daily Standups, Sprint Reviews, and Retrospectives to ensure continuous improvement and delivery throughout all sprints in project cycles.">
    <rect x="20" y="523" width="760" height="58" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="545" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Scrum Events / Ceremonies</text>
    <rect x="40" y="555" width="165" height="20" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="120" y="569" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Sprint Planning</text>
    <line x1="210" y1="565" x2="230" y2="565" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="235" y="555" width="165" height="20" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="317" y="569" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Daily Standup</text>
    <line x1="405" y1="565" x2="425" y2="565" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="430" y="555" width="165" height="20" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="512" y="569" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Sprint Review</text>
    <line x1="600" y1="565" x2="620" y2="565" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="625" y="555" width="145" height="20" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="697" y="569" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Retrospective</text>
  </g>
</svg>