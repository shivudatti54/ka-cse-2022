<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Extreme Programming is an agile software development framework created by Kent Beck in 1996, emphasizing continuous delivery, technical excellence, and customer satisfaction through collaborative practices.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="42" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1565c0">Extreme Programming (XP)</text>
  </g>
  
  <g class="step" id="step1" data-narration="XP takes traditional software development practices to their extreme limits, implementing continuous integration, thorough testing, and collaborative code ownership to maximize quality and adaptability.">
    <rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">What is Extreme Programming?</text>
    <text x="30" y="100" font-family="Arial" font-size="10" fill="#333">An agile software development framework focusing on higher quality software and better team dynamics.</text>
    <text x="30" y="118" font-family="Arial" font-size="10" fill="#333">Developed by Kent Beck in 1996. Takes good practices to "extreme" levels.</text>
    <rect x="580" y="72" width="180" height="50" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="670" y="92" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Agile Framework</text>
    <text x="670" y="110" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Kent Beck 1996</text>
  </g>
  
  <g class="step" id="step2" data-narration="The XP methodology centers on five fundamental values: Communication to foster team collaboration, Simplicity to maintain clean code, Feedback for continuous improvement, Courage to embrace change, and Respect for all team members.">
    <rect x="10" y="146" width="780" height="80" fill="#fff3e0" stroke="#ffe0b2" stroke-width="2" rx="5"/>
    <text x="30" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">The Five Core Values of XP</text>
    <rect x="30" y="182" width="120" height="32" fill="#ffcc80" rx="3"/>
    <text x="90" y="202" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Communication</text>
    <rect x="160" y="182" width="120" height="32" fill="#ffcc80" rx="3"/>
    <text x="220" y="202" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Simplicity</text>
    <rect x="290" y="182" width="120" height="32" fill="#ffcc80" rx="3"/>
    <text x="350" y="202" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Feedback</text>
    <rect x="420" y="182" width="120" height="32" fill="#ffcc80" rx="3"/>
    <text x="480" y="202" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Courage</text>
    <rect x="550" y="182" width="120" height="32" fill="#ffcc80" rx="3"/>
    <text x="610" y="202" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Respect</text>
  </g>
  
  <g class="step" id="step3" data-narration="XP practices include Planning Game for prioritizing user stories, Small Releases for frequent delivery, Simple Design to avoid over-engineering, and Test-Driven Development for reliable code.">
    <rect x="10" y="234" width="780" height="80" fill="#f3e5f5" stroke="#e1bee7" stroke-width="2" rx="5"/>
    <text x="30" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">XP Practices (1-5)</text>
    <rect x="30" y="270" width="130" height="35" fill="#ce93d8" rx="3"/>
    <text x="95" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">1. Planning Game</text>
    <text x="95" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a148c">Prioritize stories</text>
    <rect x="170" y="270" width="130" height="35" fill="#ce93d8" rx="3"/>
    <text x="235" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">2. Small Releases</text>
    <text x="235" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a148c">Frequent delivery</text>
    <rect x="310" y="270" width="130" height="35" fill="#ce93d8" rx="3"/>
    <text x="375" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">3. Metaphor</text>
    <text x="375" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a148c">Shared story</text>
    <rect x="450" y="270" width="130" height="35" fill="#ce93d8" rx="3"/>
    <text x="515" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">4. Simple Design</text>
    <text x="515" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a148c">Avoid over-engineering</text>
    <rect x="590" y="270" width="130" height="35" fill="#ce93d8" rx="3"/>
    <text x="655" y="282" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">5. TDD</text>
    <text x="655" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a148c">Test-first coding</text>
  </g>
  
  <g class="step" id="step4" data-narration="Refactoring continuously improves code structure without altering external behavior, while pair programming enables real-time code review through driver and navigator collaboration, ensuring higher quality and shared knowledge.">
    <rect x="10" y="322" width="780" height="80" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="2" rx="5"/>
    <text x="30" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">XP Practices (6-9)</text>
    <rect x="30" y="358" width="160" height="35" fill="#81c784" rx="3"/>
    <text x="110" y="370" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">6. Refactoring</text>
    <text x="110" y="384" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Improve structure</text>
    <rect x="200" y="358" width="160" height="35" fill="#81c784" rx="3"/>
    <text x="280" y="370" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">7. Pair Programming</text>
    <text x="280" y="384" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Driver + Navigator</text>
    <rect x="370" y="358" width="160" height="35" fill="#81c784" rx="3"/>
    <text x="450" y="370" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">8. Collective Ownership</text>
    <text x="450" y="384" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Anyone can modify</text>
    <rect x="540" y="358" width="160" height="35" fill="#81c784" rx="3"/>
    <text x="620" y="370" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">9. Continuous Integration</text>
    <text x="620" y="384" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Integrate often</text>
  </g>
  
  <g class="step" id="step5" data-narration="The 40-hour work week maintains sustainable development pace, on-site customer presence ensures immediate feedback on requirements, and coding standards establish uniform practices enabling effective collective code ownership.">
    <rect x="10" y="410" width="780" height="80" fill="#e3f2fd" stroke="#bbdefb" stroke-width="2" rx="5"/>
    <text x="30" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">XP Practices (10-12)</text>
    <rect x="30" y="446" width="200" height="35" fill="#64b5f6" rx="3"/>
    <text x="130" y="458" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">10. 40-Hour Work Week</text>
    <text x="130" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Sustainable pace</text>
    <rect x="240" y="446" width="200" height="35" fill="#64b5f6" rx="3"/>
    <text x="340" y="458" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">11. On-Site Customer</text>
    <text x="340" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Full-time user rep</text>
    <rect x="450" y="446" width="200" height="35" fill="#64b5f6" rx="3"/>
    <text x="550" y="458" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">12. Coding Standards</text>
    <text x="550" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Consistent style</text>
  </g>
  
  <g class="step" id="step6" data-narration="Test-Driven Development follows a Red-Green-Refactor cycle where developers first write a failing test, then implement minimal code to pass it, and finally refactor to improve overall code quality and design.">
    <rect x="10" y="498" width="780" height="90" fill="#ffebee" stroke="#ffcdd2" stroke-width="2" rx="5"/>
    <text x="30" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Test-Driven Development (TDD) Cycle</text>
    <rect x="30" y="535" width="180" height="42" fill="#ef9a9a" rx="5"/>
    <text x="120" y="550" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">RED</text>
    <text x="120" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Write failing test</text>
    <rect x="220" y="535" width="180" height="42" fill="#a5d6a7" rx="5"/>
    <text x="310" y="550" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">GREEN</text>
    <text x="310" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Write minimal code</text>
    <rect x="410" y="535" width="180" height="42" fill="#90caf9" rx="5"/>
    <text x="500" y="550" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">REFACTOR</text>
    <text x="500" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Improve structure</text>
    <text x="620" y="545" font-family="Arial" font-size="9" fill="#333">TDD Benefits:</text>
    <text x="620" y="562" font-family="Arial" font-size="8" fill="#333">• Testable from start</text>
    <text x="620" y="576" font-family="Arial" font-size="8" fill="#333">• Comprehensive test suite</text>
  </g>
</svg>