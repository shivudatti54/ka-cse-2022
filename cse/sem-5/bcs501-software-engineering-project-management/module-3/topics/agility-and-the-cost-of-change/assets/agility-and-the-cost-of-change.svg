<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Today we explore how agility in software development helps manage the cost of change throughout a complete project lifecycle from start to finish.">
    <rect x="0" y="10" width="800" height="45" fill="#1976d2" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Agility and the Cost of Change</text>
  </g>
  
  <g class="step" id="step1" data-narration="In traditional Waterfall development, change costs are low initially but rise dramatically and exponentially as the project progresses through each phase.">
    <rect x="20" y="63" width="760" height="90" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="85" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Traditional Cost of Change Curve</text>
    <path d="M50,115 Q150,110 250,95 Q400,65 600,45" stroke="#f44336" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="50" y="135" font-family="Arial" font-size="9" fill="#666">Requirements</text>
    <text x="580" y="50" font-family="Arial" font-size="9" fill="#f44336">Maintenance</text>
    <text x="280" y="75" font-family="Arial" font-size="9" fill="#666" font-style="italic">Cost increases exponentially</text>
  </g>
  
  <g class="step" id="step2" data-narration="Agile methodologies keep change costs relatively flat by delivering working software frequently and incorporating continuous feedback loops throughout development cycles.">
    <rect x="20" y="161" width="760" height="85" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="183" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Agile Cost of Change Curve</text>
    <path d="M50,130 L600,125" stroke="#388e3c" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="50" y="145" font-family="Arial" font-size="9" fill="#666">Requirements</text>
    <text x="580" y="140" font-family="Arial" font-size="9" fill="#388e3c">Maintenance</text>
    <text x="280" y="170" font-family="Arial" font-size="9" fill="#666" font-style="italic">Cost remains relatively flat</text>
  </g>
  
  <g class="step" id="step3" data-narration="Three core agile practices actively reduce change costs: iterative development for small increments, customer collaboration for ongoing feedback, and adaptive planning for flexibility.">
    <rect x="20" y="254" width="760" height="80" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="276" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Agile Practices That Reduce Change Costs</text>
    <rect x="40" y="290" width="220" height="35" fill="#ffe0b2" rx="3"/>
    <text x="150" y="305" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Iterative Development</text>
    <text x="150" y="317" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Small increments, frequent feedback</text>
    <rect x="290" y="290" width="220" height="35" fill="#ffe0b2" rx="3"/>
    <text x="400" y="305" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Customer Collaboration</text>
    <text x="400" y="317" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Ongoing stakeholder engagement</text>
    <rect x="540" y="290" width="220" height="35" fill="#ffe0b2" rx="3"/>
    <text x="650" y="305" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Adaptive Planning</text>
    <text x="650" y="317" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Rolling wave, flexible priorities</text>
  </g>
  
  <g class="step" id="step4" data-narration="Technical practices actively enable the flat cost curve through Test-Driven Development for safety, Continuous Integration for reliability, and regular refactoring for maintainability.">
    <rect x="20" y="342" width="760" height="80" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="364" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Technical Practices Supporting Low Change Costs</text>
    <rect x="40" y="378" width="230" height="35" fill="#e1bee7" rx="3"/>
    <text x="155" y="393" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Test-Driven Development</text>
    <text x="155" y="405" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Tests first, safety net for changes</text>
    <rect x="285" y="378" width="230" height="35" fill="#e1bee7" rx="3"/>
    <text x="400" y="393" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Continuous Integration</text>
    <text x="400" y="405" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Daily integration, instant feedback</text>
    <rect x="530" y="378" width="230" height="35" fill="#e1bee7" rx="3"/>
    <text x="645" y="393" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Refactoring</text>
    <text x="645" y="405" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Clean code, prevents technical debt</text>
  </g>
  
  <g class="step" id="step5" data-narration="In a Waterfall project, adding a new feature halfway through costs approximately 30-50% more due to cascading ripple effects across all project artifacts.">
    <rect x="20" y="430" width="760" height="80" fill="#ffebee" rx="5" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="452" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example: Waterfall vs Agile for Feature Change</text>
    <rect x="40" y="468" width="350" height="35" fill="#ffcdd2" rx="3"/>
    <text x="215" y="485" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Waterfall Approach</text>
    <text x="215" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Change request, redesign: 30-50% extra cost</text>
    <rect x="410" y="468" width="350" height="35" fill="#c8e6c9" rx="3"/>
    <text x="585" y="485" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Agile Approach</text>
    <text x="585" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Add to backlog, prioritize: cost proportional</text>
  </g>
  
  <g class="step" id="step6" data-narration="The key takeaway is that agile keeps costs flat through iterative delivery, continuous customer feedback, and essential technical practices like TDD and continuous integration.">
    <rect x="20" y="518" width="760" height="75" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="540" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Key Takeaways</text>
    <text x="40" y="560" font-family="Arial" font-size="10" fill="#666">• Traditional: Cost rises exponentially due to ripple effects</text>
    <text x="40" y="575" font-family="Arial" font-size="10" fill="#666">• Agile: Cost stays flat with frequent checkpoints</text>
    <text x="40" y="590" font-family="Arial" font-size="10" fill="#666">• Technical practices (TDD, CI/CD) enable the flat curve</text>
  </g>
</svg>