<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Software Design Concepts, where we explore fundamental principles, architectural approaches, and best practices to transform requirements into well-structured implementation blueprints.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Software Design Concepts</text>
  </g>
  
  <g class="step" id="step1" data-narration="Core design principles include abstraction hiding complex details, refinement for top-down elaboration, modularity dividing software into manageable parts, and information hiding to encapsulate internals.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Design Principles</text>
    <rect x="70" y="85" width="150" height="45" rx="3" fill="#ffffff" stroke="#90caf9"/>
    <text x="145" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Abstraction</text>
    <text x="145" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Hides details</text>
    <rect x="230" y="85" width="150" height="45" rx="3" fill="#ffffff" stroke="#90caf9"/>
    <text x="305" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Refinement</text>
    <text x="305" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Top-down approach</text>
    <rect x="390" y="85" width="150" height="45" rx="3" fill="#ffffff" stroke="#90caf9"/>
    <text x="465" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Modularity</text>
    <text x="465" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Divide software</text>
    <rect x="550" y="85" width="150" height="45" rx="3" fill="#ffffff" stroke="#90caf9"/>
    <text x="625" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Information Hiding</text>
    <text x="625" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Hide internals</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three design approaches exist: function-oriented organizes by operations, object-oriented by objects combining data and methods, and data-oriented focuses on data structures and storage.">
    <rect x="50" y="146" width="700" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Design Approaches</text>
    <rect x="70" y="173" width="210" height="45" rx="3" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="175" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Function-Oriented</text>
    <text x="175" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Organize by operations</text>
    <rect x="295" y="173" width="210" height="45" rx="3" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="400" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Object-Oriented</text>
    <text x="400" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Objects with data &amp; methods</text>
    <rect x="520" y="173" width="210" height="45" rx="3" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="625" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Data-Oriented</text>
    <text x="625" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Focus on data structures</text>
  </g>
  
  <g class="step" id="step3" data-narration="Software architecture styles include layered with stacked tiers, client-server for distributed processing, MVC separating concerns, and microservices composed of small services.">
    <rect x="50" y="234" width="700" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Software Architecture</text>
    <rect x="70" y="261" width="160" height="45" rx="3" fill="#ffffff" stroke="#ffcc80"/>
    <text x="150" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Layered</text>
    <text x="150" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Stacked tiers</text>
    <rect x="240" y="261" width="160" height="45" rx="3" fill="#ffffff" stroke="#ffcc80"/>
    <text x="320" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Client-Server</text>
    <text x="320" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Distributed processing</text>
    <rect x="410" y="261" width="160" height="45" rx="3" fill="#ffffff" stroke="#ffcc80"/>
    <text x="490" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">MVC</text>
    <text x="490" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Model-View-Controller</text>
    <rect x="580" y="261" width="160" height="45" rx="3" fill="#ffffff" stroke="#ffcc80"/>
    <text x="660" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Microservices</text>
    <text x="660" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Collection of services</text>
  </g>
  
  <g class="step" id="step4" data-narration="Component design focuses on cohesion measuring internal binding strength and coupling measuring inter-module dependence; software design aims for high cohesion and low coupling.">
    <rect x="50" y="322" width="700" height="103" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Component Design</text>
    <rect x="70" y="352" width="310" height="42" rx="3" fill="#ffffff" stroke="#ce93d8"/>
    <text x="225" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Cohesion</text>
    <text x="225" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Internal binding (High desirable)</text>
    <rect x="390" y="352" width="310" height="42" rx="3" fill="#ffffff" stroke="#ce93d8"/>
    <text x="545" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Coupling</text>
    <text x="545" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Inter-module dependence (Low desirable)</text>
    <text x="70" y="405" font-family="Arial" font-size="8" fill="#7b1fa2">Cohesion: Functional → Sequential → Communicational → Procedural → Temporal → Logical → Coincidental</text>
    <text x="70" y="418" font-family="Arial" font-size="8" fill="#7b1fa2">Coupling (Best→Worst): Data → Stamp → Control → Common → Content</text>
  </g>
  
  <g class="step" id="step5" data-narration="Interface design defines three types: external interfaces for users and other systems, internal interfaces for component communication, and user interfaces focusing on usability.">
    <rect x="50" y="433" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Interface Design</text>
    <rect x="70" y="463" width="210" height="42" rx="3" fill="#ffffff" stroke="#90caf9"/>
    <text x="175" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">External Interfaces</text>
    <text x="175" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Users, other systems</text>
    <rect x="295" y="463" width="210" height="42" rx="3" fill="#ffffff" stroke="#90caf9"/>
    <text x="400" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Internal Interfaces</text>
    <text x="400" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Component communication</text>
    <rect x="520" y="463" width="210" height="42" rx="3" fill="#ffffff" stroke="#90caf9"/>
    <text x="625" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">User Interface (UI)</text>
    <text x="625" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Usability &amp; accessibility</text>
  </g>
  
  <g class="step" id="step6" data-narration="Practical examples include a library system with Book, Member, Transaction classes demonstrating object-oriented design, and modular design showing cohesive modules for validation, payment, and data access.">
    <rect x="50" y="521" width="700" height="70" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="538" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Examples</text>
    <rect x="70" y="550" width="330" height="35" rx="3" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="235" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Library System: Book, Member, Transaction</text>
    <text x="235" y="576" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">OO Design: Encapsulation, Inheritance</text>
    <rect x="415" y="550" width="315" height="35" rx="3" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="572" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">High Cohesion Modules</text>
    <text x="572" y="576" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Validation, PaymentCalc, Invoice, Notification, DataAccess</text>
  </g>
</svg>