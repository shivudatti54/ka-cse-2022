<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Agile Process is a modern software development methodology that emphasizes flexibility, collaboration, iterative development, and rapid delivery of working software.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">What is an Agile Process?</text>
  </g>
  
  <g class="step" id="step1" data-narration="The Agile Manifesto has four core values: individuals over processes, working software over documentation, customer collaboration, and responding to change.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">The Agile Manifesto - Four Values</text>
    <rect x="20" y="85" width="180" height="45" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="30" y="98" font-family="Arial" font-size="9" fill="#333">Individuals &amp; Interactions</text>
    <text x="30" y="110" font-family="Arial" font-size="8" fill="#666">over Processes &amp; Tools</text>
    <rect x="210" y="85" width="180" height="45" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="98" font-family="Arial" font-size="9" fill="#333">Working Software</text>
    <text x="220" y="110" font-family="Arial" font-size="8" fill="#666">over Comprehensive Docs</text>
    <rect x="400" y="85" width="180" height="45" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="410" y="98" font-family="Arial" font-size="9" fill="#333">Customer Collaboration</text>
    <text x="410" y="110" font-family="Arial" font-size="8" fill="#666">over Contract Negotiation</text>
    <rect x="590" y="85" width="180" height="45" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="600" y="98" font-family="Arial" font-size="9" fill="#333">Responding to Change</text>
    <text x="600" y="110" font-family="Arial" font-size="8" fill="#666">over Following a Plan</text>
  </g>
  
  <g class="step" id="step2" data-narration="Popular Agile frameworks include Scrum with sprints and roles, Kanban with visual boards, and Extreme Programming with technical practices like pair programming.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="20" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Popular Agile Frameworks</text>
    <rect x="20" y="175" width="240" height="45" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="30" y="188" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Scrum</text>
    <text x="30" y="200" font-family="Arial" font-size="8" fill="#333">Sprints (2-4 weeks), Roles: PO,</text>
    <text x="30" y="212" font-family="Arial" font-size="8" fill="#333">Scrum Master, Team</text>
    <rect x="270" y="175" width="240" height="45" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="280" y="188" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Kanban</text>
    <text x="280" y="200" font-family="Arial" font-size="8" fill="#333">Visual workflow, WIP limits,</text>
    <text x="280" y="212" font-family="Arial" font-size="8" fill="#333">Continuous delivery</text>
    <rect x="520" y="175" width="240" height="45" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="530" y="188" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Extreme Programming (XP)</text>
    <text x="530" y="200" font-family="Arial" font-size="8" fill="#333">Pair programming, TDD,</text>
    <text x="530" y="212" font-family="Arial" font-size="8" fill="#333">Continuous integration</text>
  </g>
  
  <g class="step" id="step3" data-narration="Agile is iterative with evolving requirements, continuous customer involvement, and multiple deliveries. Waterfall is sequential with fixed requirements upfront.">
    <rect x="10" y="234" width="780" height="88" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="20" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Agile vs Waterfall Methodology</text>
    <rect x="20" y="262" width="370" height="55" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="30" y="275" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Waterfall</text>
    <text x="30" y="288" font-family="Arial" font-size="8" fill="#333">Sequential, Fixed requirements,</text>
    <text x="30" y="300" font-family="Arial" font-size="8" fill="#333">Limited customer, Single delivery</text>
    <rect x="400" y="262" width="370" height="55" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="410" y="275" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Agile</text>
    <text x="410" y="288" font-family="Arial" font-size="8" fill="#333">Iterative, Evolving requirements,</text>
    <text x="410" y="300" font-family="Arial" font-size="8" fill="#333">Continuous collaboration, Multiple</text>
  </g>
  
  <g class="step" id="step4" data-narration="Scrum ceremonies include Sprint Planning, Daily Stand-up, Review, and Retrospective. Artifacts are Product Backlog and Sprint Backlog.">
    <rect x="10" y="330" width="780" height="75" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="20" y="347" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Scrum Framework - Ceremonies &amp; Artifacts</text>
    <rect x="20" y="358" width="115" height="42" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="25" y="370" font-family="Arial" font-size="8" font-weight="bold" fill="#9c27b0">Sprint Planning</text>
    <text x="25" y="382" font-family="Arial" font-size="7" fill="#333">What &amp; How</text>
    <rect x="145" y="358" width="115" height="42" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="150" y="370" font-family="Arial" font-size="8" font-weight="bold" fill="#9c27b0">Daily Stand-up</text>
    <text x="150" y="382" font-family="Arial" font-size="7" fill="#333">15 min daily</text>
    <rect x="270" y="358" width="115" height="42" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="275" y="370" font-family="Arial" font-size="8" font-weight="bold" fill="#9c27b0">Sprint Review</text>
    <text x="275" y="382" font-family="Arial" font-size="7" fill="#333">Demo work</text>
    <rect x="395" y="358" width="115" height="42" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="370" font-family="Arial" font-size="8" font-weight="bold" fill="#9c27b0">Sprint Retro</text>
    <text x="400" y="382" font-family="Arial" font-size="7" fill="#333">Improve</text>
    <rect x="520" y="358" width="115" height="42" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="525" y="370" font-family="Arial" font-size="8" font-weight="bold" fill="#9c27b0">Product Backlog</text>
    <text x="525" y="382" font-family="Arial" font-size="7" fill="#333">Prioritized</text>
    <rect x="645" y="358" width="115" height="42" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="650" y="370" font-family="Arial" font-size="8" font-weight="bold" fill="#9c27b0">Sprint Backlog</text>
    <text x="650" y="382" font-family="Arial" font-size="7" fill="#333">Current sprint</text>
  </g>
  
  <g class="step" id="step5" data-narration="In Sprint Planning, a team with velocity of 21 story points selects items like User Login (5), Password Reset (8), and Email Notifications (3) totaling 16 points.">
    <rect x="10" y="413" width="780" height="115" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example: Sprint Planning</text>
    <text x="20" y="448" font-family="Arial" font-size="9" fill="#333">Product Backlog Items (Story Points):</text>
    <rect x="20" y="458" width="120" height="28" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="471" font-family="Arial" font-size="8" fill="#333">User Login: 5 pts</text>
    <rect x="150" y="458" width="120" height="28" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="155" y="471" font-family="Arial" font-size="8" fill="#333">Password Reset: 8</text>
    <rect x="280" y="458" width="120" height="28" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="285" y="471" font-family="Arial" font-size="8" fill="#333">Dashboard: 13 pts</text>
    <rect x="410" y="458" width="120" height="28" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="415" y="471" font-family="Arial" font-size="8" fill="#333">User Profile: 5 pts</text>
    <rect x="540" y="458" width="120" height="28" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="545" y="471" font-family="Arial" font-size="8" fill="#333">Email Notify: 3 pts</text>
    <rect x="250" y="493" width="280" height="28" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="390" y="510" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Selected: 5+8+3 = 16 pts (within 21 velocity)</text>
  </g>
</svg>