<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Undecidability is a fundamental concept in computer science and computation theory about problems that no algorithm can solve for all possible inputs.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">UNDECIDABILITY</text>
  </g>
  
  <g class="step" id="step1" data-narration="A problem is decidable if an algorithm always halts with correct yes/no answer. Undecidable means no algorithm exists for all inputs.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Decidable vs Undecidable</text>
    <rect x="40" y="88" width="200" height="40" fill="#e8f5e9" rx="3"/>
    <text x="140" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">DECIDABLE</text>
    <text x="140" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Algorithm always halts</text>
    <text x="140" y="132" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">with correct answer</text>
    <rect x="260" y="88" width="200" height="40" fill="#ffebee" rx="3"/>
    <text x="360" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">UNDECIDABLE</text>
    <text x="360" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">No algorithm exists</text>
    <text x="360" y="132" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">for all inputs</text>
    <rect x="480" y="88" width="280" height="40" fill="#fff3e0" rx="3"/>
    <text x="620" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Recursive Languages</text>
    <text x="620" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">TM accepts/rejects (always halts)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Turing proved in 1936 that no algorithm can decide if any program halts on any input. This is the most famous undecidable problem.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">The Halting Problem</text>
    <text x="40" y="185" font-family="Arial" font-size="9" fill="#333">Given TM M and input w: Does M halt on w?</text>
    <rect x="40" y="195" width="340" height="25" fill="#f3e5f5" rx="3"/>
    <text x="210" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Turing's Proof: Diagonalization + Self-Reference</text>
    <rect x="400" y="165" width="360" height="55" fill="#ffebee" rx="3"/>
    <text x="580" y="182" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Assume H exists (halting solver)</text>
    <text x="580" y="197" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Build D: do opposite of H's prediction</text>
    <text x="580" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Run D on D → contradiction!</text>
  </g>
  
  <g class="step" id="step3" data-narration="Any non-trivial property of a TM's language is undecidable. Properties like emptiness, finiteness, or regularity are all undecidable by Rice's Theorem.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Rice's Theorem</text>
    <text x="40" y="273" font-family="Arial" font-size="9" fill="#333">For any non-trivial property P of L(M): deciding if L(M) has property P is undecidable</text>
    <rect x="40" y="283" width="230" height="25" fill="#e8f5e9" rx="3"/>
    <text x="155" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Non-trivial = not empty, not all</text>
    <rect x="290" y="283" width="220" height="25" fill="#fff3e0" rx="3"/>
    <text x="400" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">UNDECIDABLE Properties:</text>
    <rect x="520" y="250" width="240" height="60" fill="#f8f9fa" stroke="#ddd" rx="3"/>
    <text x="640" y="268" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">• L(M) = ∅ (empty)</text>
    <text x="640" y="282" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">• L(M) is finite</text>
    <text x="640" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">• L(M) = Σ* (all strings)</text>
    <text x="640" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">• L(M) is regular</text>
  </g>
  
  <g class="step" id="step4" data-narration="To prove Q undecidable, reduce known undecidable P to Q. If P ≤ Q and P is undecidable, then Q is undecidable.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Reduction Technique</text>
    <text x="40" y="360" font-family="Arial" font-size="9" fill="#333">Primary method to prove undecidability: transform known undecidable problem to target problem</text>
    <rect x="40" y="370" width="300" height="26" fill="#e3f2fd" rx="3"/>
    <text x="190" y="387" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Many-One Reduction: P ≤ Q</text>
    <path d="M350 375 L450 375" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="460" y="355" width="150" height="40" fill="#f3e5f5" rx="3"/>
    <text x="535" y="373" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">If P undecidable</text>
    <text x="535" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">then Q undecidable</text>
    <rect x="630" y="355" width="130" height="40" fill="#fff3e0" rx="3"/>
    <text x="695" y="370" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Halting Problem</text>
    <text x="695" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">PCP, etc.</text>
  </g>
  
  <g class="step" id="step5" data-narration="The Post Correspondence Problem asks if two string lists have matching concatenations. PCP undecidability is useful for proving other problems undecidable.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Post Correspondence Problem (PCP)</text>
    <text x="40" y="448" font-family="Arial" font-size="9" fill="#333">Given two lists A = w₁...wₖ and B = x₁...xₖ, does there exist indices i₁...iₙ such that wᵢ₁...wᵢₙ = xᵢ₁...xᵢₙ?</text>
    <rect x="40" y="458" width="350" height="26" fill="#e8f5e9" rx="3"/>
    <text x="215" y="474" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Emil Post proved undecidable in 1946</text>
    <rect x="410" y="430" width="350" height="55" fill="#f3e5f5" rx="3"/>
    <text x="585" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Why useful?</text>
    <text x="585" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Simple string manipulation</text>
    <text x="585" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">No TM machinery needed</text>
  </g>
  
  <g class="step" id="step6" data-narration="Practice examples: prove halting problem undecidable via contradiction, use Rice's Theorem for L(M)=Σ*, reduce halting problem to printing problem 'a'.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Examples &amp; Key Points</text>
    <rect x="40" y="528" width="240" height="55" fill="#e3f2fd" rx="3"/>
    <text x="160" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Example 1: Halting Proof</text>
    <text x="160" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Assume H exists → Build D</text>
    <text x="160" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">D halts ↔ D loops → contradiction</text>
    <rect x="290" y="528" width="220" height="55" fill="#e8f5e9" rx="3"/>
    <text x="400" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Example 2: Rice's Theorem</text>
    <text x="400" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">L(M) = Σ* is non-trivial</text>
    <text x="400" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">→ Undecidable by Rice's Theorem</text>
    <rect x="520" y="528" width="240" height="55" fill="#fff3e0" rx="3"/>
    <text x="640" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Example 3: Reduction</text>
    <text x="640" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Build M' that prints 'a' if M halts</text>
    <text x="640" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">M' prints 'a' ↔ M halts on w</text>
  </g>
</svg>