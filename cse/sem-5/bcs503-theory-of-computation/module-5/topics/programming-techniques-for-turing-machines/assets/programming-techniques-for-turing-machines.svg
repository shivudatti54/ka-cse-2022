<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Programming Techniques for Turing Machines - Learn systematic approaches to designing TMs for language recognition and function computation in automata theory.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#0d47a1">Programming Techniques for Turing Machines</text>
  </g>
  
  <g class="step" id="step1" data-narration="Language Recognition: TMs simulate DFAs for regular languages, use stack simulation for context-free languages, and employ systematic searching for recursively enumerable languages.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#0d47a1">1. Language Recognition Techniques</text>
    <rect x="40" y="88" width="220" height="42" fill="#bbdefb" stroke="#64b5f6" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#1565c0">DFA/NFA Simulation</text>
    <text x="50" y="116" font-family="Arial" font-size="9" fill="#1976d2">Regular languages - move</text>
    <text x="50" y="126" font-family="Arial" font-size="9" fill="#1976d2">right, track states</text>
    <rect x="270" y="88" width="220" height="42" fill="#bbdefb" stroke="#64b5f6" rx="3"/>
    <text x="280" y="102" font-family="Arial" font-size="10" fill="#1565c0">Recursive Recognition</text>
    <text x="280" y="116" font-family="Arial" font-size="9" fill="#1976d2">Context-free - simulate</text>
    <text x="280" y="126" font-family="Arial" font-size="9" fill="#1976d2">pushdown stack on tape</text>
    <rect x="500" y="88" width="220" height="42" fill="#bbdefb" stroke="#64b5f6" rx="3"/>
    <text x="510" y="102" font-family="Arial" font-size="10" fill="#1565c0">General RE Languages</text>
    <text x="510" y="116" font-family="Arial" font-size="9" fill="#1976d2">Non-deterministic TM</text>
    <text x="510" y="126" font-family="Arial" font-size="9" fill="#1976d2">enumerates derivations</text>
  </g>
  
  <g class="step" id="step2" data-narration="Function Computation: TMs transform input to output on tape. Unary computation adds symbols, arithmetic operations process bits with carries, and copying uses dedicated subroutines.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#1b5e20">2. Function Computation</text>
    <rect x="40" y="176" width="220" height="42" fill="#c8e6c9" stroke="#81c784" rx="3"/>
    <text x="50" y="190" font-family="Arial" font-size="10" fill="#2e7d32">Unary Number Computation</text>
    <text x="50" y="204" font-family="Arial" font-size="9" fill="#388e3c">n+1: find rightmost 1,</text>
    <text x="50" y="214" font-family="Arial" font-size="9" fill="#388e3c">move right, write 1</text>
    <rect x="270" y="176" width="220" height="42" fill="#c8e6c9" stroke="#81c784" rx="3"/>
    <text x="280" y="190" font-family="Arial" font-size="10" fill="#2e7d32">Arithmetic Operations</text>
    <text x="280" y="204" font-family="Arial" font-size="9" fill="#388e3c">Addition: process LSB,</text>
    <text x="280" y="214" font-family="Arial" font-size="9" fill="#388e3c">handle carries right-to-left</text>
    <rect x="500" y="176" width="220" height="42" fill="#c8e6c9" stroke="#81c784" rx="3"/>
    <text x="510" y="190" font-family="Arial" font-size="10" fill="#2e7d32">Copying String</text>
    <text x="510" y="204" font-family="Arial" font-size="9" fill="#388e3c">Mark start, copy each</text>
    <text x="510" y="214" font-family="Arial" font-size="9" fill="#388e3c">symbol to new area</text>
  </g>
  
  <g class="step" id="step3" data-narration="Composite TMs combine simpler machines using subroutines, parallel composition for independent tasks, and iteration with loop structures for repetitive computations.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">3. Composite Turing Machines</text>
    <rect x="40" y="264" width="220" height="42" fill="#ffe0b2" stroke="#ffb74d" rx="3"/>
    <text x="50" y="278" font-family="Arial" font-size="10" fill="#ef6c00">Subroutines</text>
    <text x="50" y="292" font-family="Arial" font-size="9" fill="#ff9800">Self-contained sections</text>
    <text x="50" y="302" font-family="Arial" font-size="9" fill="#ff9800">perform specific tasks</text>
    <rect x="270" y="264" width="220" height="42" fill="#ffe0b2" stroke="#ffb74d" rx="3"/>
    <text x="280" y="278" font-family="Arial" font-size="10" fill="#ef6c00">Parallel Composition</text>
    <text x="280" y="292" font-family="Arial" font-size="9" fill="#ff9800">Execute independent</text>
    <text x="280" y="302" font-family="Arial" font-size="9" fill="#ff9800">computations together</text>
    <rect x="500" y="264" width="220" height="42" fill="#ffe0b2" stroke="#ffb74d" rx="3"/>
    <text x="510" y="278" font-family="Arial" font-size="10" fill="#ef6c00">Iteration</text>
    <text x="510" y="292" font-family="Arial" font-size="9" fill="#ff9800">Return to earlier state</text>
    <text x="510" y="302" font-family="Arial" font-size="9" fill="#ff9800">until condition met</text>
  </g>
  
  <g class="step" id="step4" data-narration="Encoding uses marker symbols like X, Y to identify positions on tape. Multi-tape simulation encodes multiple tracks using delimiters on a single tape.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#4a148c">4. Encoding and Representation</text>
    <rect x="40" y="352" width="220" height="42" fill="#e1bee7" stroke="#ba68c8" rx="3"/>
    <text x="50" y="366" font-family="Arial" font-size="10" fill="#6a1b9a">Marker Techniques</text>
    <text x="50" y="380" font-family="Arial" font-size="9" fill="#9c27b0">X, Y mark positions;</text>
    <text x="50" y="390" font-family="Arial" font-size="9" fill="#9c27b0">blank B is left boundary</text>
    <rect x="270" y="352" width="220" height="42" fill="#e1bee7" stroke="#ba68c8" rx="3"/>
    <text x="280" y="366" font-family="Arial" font-size="10" fill="#6a1b9a">Multi-Tape Simulation</text>
    <text x="280" y="380" font-family="Arial" font-size="9" fill="#9c27b0">Store multiple tape</text>
    <text x="280" y="390" font-family="Arial" font-size="9" fill="#9c27b0">contents using delimiters</text>
    <rect x="500" y="352" width="220" height="42" fill="#e1bee7" stroke="#ba68c8" rx="3"/>
    <text x="510" y="366" font-family="Arial" font-size="10" fill="#6a1b9a">State Encoding</text>
    <text x="510" y="380" font-family="Arial" font-size="9" fill="#9c27b0">Complex decision logic</text>
    <text x="510" y="390" font-family="Arial" font-size="9" fill="#9c27b0">encoded in states</text>
  </g>
  
  <g class="step" id="step5" data-narration="Design Methodology: Understand the problem, choose tape alphabet, identify computation phases as states, and define all transitions carefully with precision.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1.5" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#b71c1c">5. Design Methodology</text>
    <rect x="40" y="440" width="160" height="42" fill="#ffcdd2" stroke="#e57373" rx="3"/>
    <text x="50" y="454" font-family="Arial" font-size="10" fill="#c62828">1. Understand</text>
    <text x="50" y="468" font-family="Arial" font-size="9" fill="#f44336">Define problem spec</text>
    <text x="50" y="478" font-family="Arial" font-size="9" fill="#f44336">input-output relation</text>
    <rect x="210" y="440" width="160" height="42" fill="#ffcdd2" stroke="#e57373" rx="3"/>
    <text x="220" y="454" font-family="Arial" font-size="10" fill="#c62828">2. Choose Alphabet</text>
    <text x="220" y="468" font-family="Arial" font-size="9" fill="#f44336">Input symbols, markers</text>
    <text x="220" y="478" font-family="Arial" font-size="9" fill="#f44336">B blank, working symbols</text>
    <rect x="380" y="440" width="160" height="42" fill="#ffcdd2" stroke="#e57373" rx="3"/>
    <text x="390" y="454" font-family="Arial" font-size="10" fill="#c62828">3. Identify States</text>
    <text x="390" y="468" font-family="Arial" font-size="9" fill="#f44336">Break into phases:</text>
    <text x="390" y="478" font-family="Arial" font-size="9" fill="#f44336">scan, process, check</text>
    <rect x="550" y="440" width="160" height="42" fill="#ffcdd2" stroke="#e57373" rx="3"/>
    <text x="560" y="454" font-family="Arial" font-size="10" fill="#c62828">4. Define Transitions</text>
    <text x="560" y="468" font-family="Arial" font-size="9" fill="#f44336">For each state-symbol:</text>
    <text x="560" y="478" font-family="Arial" font-size="9" fill="#f44336">write, move, next state</text>
  </g>
  
  <g class="step" id="step6" data-narration="Examples: L equals 0^n1^n uses markers to match pairs. Unary successor appends one symbol. Copying demonstrates the three-phase subroutine technique.">
    <rect x="20" y="498" width="760" height="90" fill="#e0f7fa" stroke="#00acc1" stroke-width="1.5" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#006064">6. Key Examples</text>
    <rect x="40" y="528" width="230" height="52" fill="#b2ebf2" stroke="#4dd0e1" rx="3"/>
    <text x="50" y="542" font-family="Arial" font-size="10" fill="#00838f">Language: L = {0^n 1^n}</text>
    <text x="50" y="556" font-family="Arial" font-size="9" fill="#00acc1">q0: find 0, mark X → q1</text>
    <text x="50" y="568" font-family="Arial" font-size="9" fill="#00acc1">q1: find 1, mark X → q2</text>
    <text x="50" y="578" font-family="Arial" font-size="9" fill="#00acc1">q2: return, repeat until matched</text>
    <rect x="285" y="528" width="230" height="52" fill="#b2ebf2" stroke="#4dd0e1" rx="3"/>
    <text x="295" y="542" font-family="Arial" font-size="10" fill="#00838f">Unary Successor: n → n+1</text>
    <text x="295" y="556" font-family="Arial" font-size="9" fill="#00acc1">q0: read 1, move right</text>
    <text x="295" y="568" font-family="Arial" font-size="9" fill="#00acc1">q0: read blank, write 1</text>
    <text x="295" y="578" font-family="Arial" font-size="9" fill="#00acc1">halt - output has n+1 ones</text>
    <rect x="530" y="528" width="230" height="52" fill="#b2ebf2" stroke="#4dd0e1" rx="3"/>
    <text x="540" y="542" font-family="Arial" font-size="10" fill="#00838f">Copy Binary String</text>
    <text x="540" y="556" font-family="Arial" font-size="9" fill="#00acc1">Phase 1: mark start with X</text>
    <text x="540" y="568" font-family="Arial" font-size="9" fill="#00acc1">Phase 2: copy to right area</text>
    <text x="540" y="578" font-family="Arial" font-size="9" fill="#00acc1">Phase 3: return, add delimiter</text>
  </g>
</svg>