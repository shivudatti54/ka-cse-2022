<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about closure properties of context-free languages, a fundamental topic in automata theory that shows which operations preserve CFLs.">
    <rect x="20" y="10" width="760" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Closure Properties of Context-Free Languages</text>
  </g>
  
  <g class="step" id="step1" data-narration="A closure property means an operation on CFLs always produces another CFL. Key closed operations include union, concatenation, and Kleene star.">
    <rect x="30" y="58" width="740" height="90" rx="6" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">CLOSED UNDER:</text>
    <rect x="50" y="95" width="210" height="40" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="155" y="114" text-anchor="middle" font-family="Arial" font-size="12" fill="#388e3c">Union</text>
    <text x="155" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">L₁ ∪ L₂</text>
    <rect x="270" y="95" width="210" height="40" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="375" y="114" text-anchor="middle" font-family="Arial" font-size="12" fill="#388e3c">Concatenation</text>
    <text x="375" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">L₁L₂</text>
    <rect x="490" y="95" width="210" height="40" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="595" y="114" text-anchor="middle" font-family="Arial" font-size="12" fill="#388e3c">Kleene Star</text>
    <text x="595" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">L*</text>
  </g>
  
  <g class="step" id="step2" data-narration="CFLs are also closed under homomorphism, inverse homomorphism, reversal, and intersection with regular languages, making them robust under many transformations.">
    <rect x="30" y="156" width="740" height="90" rx="6" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="178" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">MORE CLOSED OPERATIONS:</text>
    <rect x="50" y="193" width="170" height="42" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="135" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">Homomorphism</text>
    <text x="135" y="226" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">h(L)</text>
    <rect x="230" y="193" width="170" height="42" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="315" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">Inverse Hom.</text>
    <text x="315" y="226" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">h⁻¹(L)</text>
    <rect x="410" y="193" width="170" height="42" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="495" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">Reversal</text>
    <text x="495" y="226" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Lᴿ</text>
    <rect x="590" y="193" width="170" height="42" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="675" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">Intersection</text>
    <text x="675" y="226" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">CFL ∩ REG</text>
  </g>
  
  <g class="step" id="step3" data-narration="CFLs are NOT closed under general intersection. The classic counterexample shows two CFLs whose intersection generates the non-context-free language a^n b^n c^n.">
    <rect x="30" y="254" width="740" height="90" rx="6" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="276" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">NOT CLOSED UNDER INTERSECTION:</text>
    <rect x="50" y="290" width="340" height="44" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="220" y="308" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">L₁ = {aⁿbⁿcⁱ : n≥0, i≥0}</text>
    <text x="220" y="322" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">L₂ = {aⁱbⁿcⁿ : n≥0, i≥0}</text>
    <line x1="400" y1="312" x2="440" y2="312" stroke="#f44336" stroke-width="2" marker-end="url(#arrowRed)"/>
    <rect x="450" y="290" width="310" height="44" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="605" y="312" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">L₁ ∩ L₂ = {aⁿbⁿcⁿ}</text>
    <text x="605" y="328" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">NOT Context-Free!</text>
  </g>
  
  <g class="step" id="step4" data-narration="CFLs are not closed under complementation or set difference, and this non-closure follows directly from intersection non-closure via De Morgan's law.">
    <rect x="30" y="352" width="740" height="85" rx="6" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="374" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">NOT CLOSED UNDER:</text>
    <rect x="50" y="390" width="340" height="38" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="220" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#f44336">Complementation</text>
    <text x="220" y="426" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">complement(L) may not be CFL</text>
    <rect x="400" y="390" width="340" height="38" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="570" y="412" text-anchor="middle" font-family="Arial" font-size="13" fill="#f44336">Set Difference</text>
    <text x="570" y="426" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">L₁ - L₂ may not be CFL</text>
  </g>
  
  <g class="step" id="step5" data-narration="The key property CFL intersect Regular equals CFL is proven by simulating a PDA and DFA in parallel. This distinguishes CFLs from non-CFLs.">
    <rect x="30" y="445" width="740" height="85" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="467" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">KEY PROOF: CFL ∩ REG = CFL</text>
    <rect x="50" y="482" width="220" height="40" rx="4" fill="#ffffff" stroke="#ff9800"/>
    <text x="160" y="502" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800">Simulate PDA for CFL</text>
    <line x1="275" y1="502" x2="305" y2="502" stroke="#ff9800" stroke-width="2"/>
    <rect x="310" y="482" width="220" height="40" rx="4" fill="#ffffff" stroke="#ff9800"/>
    <text x="420" y="502" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800">Simulate DFA for REG</text>
    <line x1="535" y1="502" x2="565" y2="502" stroke="#ff9800" stroke-width="2"/>
    <rect x="570" y="482" width="180" height="40" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="660" y="502" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Accept if BOTH accept</text>
  </g>
  
  <g class="step" id="step6" data-narration="Remember that regular languages sit inside CFLs, so every regular operation is also a CFL operation. Use this diagram to master closure properties.">
    <rect x="30" y="538" width="740" height="45" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="560" text-anchor="middle" font-family="Arial" font-size="13" fill="#9c27b0">REGS ⊂ CFLs — Know which operations preserve each class!</text>
  </g>
</svg>