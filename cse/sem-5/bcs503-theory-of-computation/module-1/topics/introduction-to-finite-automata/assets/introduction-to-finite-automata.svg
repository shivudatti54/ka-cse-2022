<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the Introduction to Finite Automata. This topic covers the fundamental concept in theory of computation and its applications in computer science.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Introduction to Finite Automata</text>
  </g>
  
  <g class="step" id="step1" data-narration="A Finite Automaton is a 5-tuple M equals open parenthesis Q, sigma, delta, q naught, F close parenthesis that defines the machine structure.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition: Finite Automaton (FA)</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">A Finite Automaton is a 5-tuple M = (Q, Σ, δ, q₀, F) where:</text>
    <text x="50" y="118" font-family="Arial" font-size="10" fill="#555">Q = finite set of states</text>
    <text x="50" y="132" font-family="Arial" font-size="10" fill="#555">Σ = input alphabet (finite set of symbols)</text>
    <text x="280" y="118" font-family="Arial" font-size="10" fill="#555">δ = transition function</text>
    <text x="280" y="132" font-family="Arial" font-size="10" fill="#555">q₀ = start state, F = final states</text>
  </g>
  
  <g class="step" id="step2" data-narration="The five components are states Q, input alphabet sigma, transition function delta, start state q naught, and final states F.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Components of Finite Automaton</text>
    <rect x="40" y="180" width="140" height="38" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="0.5"/>
    <text x="110" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">States (Q)</text>
    <text x="110" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Different conditions</text>
    <rect x="190" y="180" width="140" height="38" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="0.5"/>
    <text x="260" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Input Alphabet (Σ)</text>
    <text x="260" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Valid input symbols</text>
    <rect x="340" y="180" width="140" height="38" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="0.5"/>
    <text x="410" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Transition (δ)</text>
    <text x="410" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">State changes</text>
    <rect x="490" y="180" width="140" height="38" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="0.5"/>
    <text x="560" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Start State (q₀)</text>
    <text x="560" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Begin computation</text>
    <rect x="640" y="180" width="130" height="38" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="0.5"/>
    <text x="705" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Final States (F)</text>
    <text x="705" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Accepting states</text>
  </g>
  
  <g class="step" id="step3" data-narration="DFA has exactly one transition per state-symbol pair, while NFA can have zero, one, or multiple transitions for the same input symbol.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Types of Finite Automata: DFA vs NFA</text>
    <rect x="40" y="270" width="350" height="36" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="0.5"/>
    <text x="60" y="284" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Deterministic FA (DFA)</text>
    <text x="60" y="298" font-family="Arial" font-size="9" fill="#555">Exactly ONE next state for each state-symbol pair. Transition δ: Q × Σ → Q</text>
    <rect x="400" y="270" width="370" height="36" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="0.5"/>
    <text x="420" y="284" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Non-Deterministic FA (NFA)</text>
    <text x="420" y="298" font-family="Arial" font-size="9" fill="#555">Zero, ONE, or MULTIPLE next states. Transition δ: Q × Σ → P(Q)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Finite automata can be represented using transition tables showing next states, or transition graphs with nodes and directed edges in automata diagrams.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Transition Table and Graph Representation</text>
    <rect x="40" y="358" width="200" height="38" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="0.5"/>
    <text x="140" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Transition Table</text>
    <text x="140" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Rows = states, Columns = symbols</text>
    <rect x="250" y="358" width="200" height="38" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="0.5"/>
    <text x="350" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Transition Graph</text>
    <text x="350" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Nodes = states, Edges = transitions</text>
    <text x="470" y="365" font-family="Arial" font-size="9" fill="#555">Start state: incoming arrow →</text>
    <text x="470" y="380" font-family="Arial" font-size="9" fill="#555">Final states: double circles</text>
    <text x="470" y="395" font-family="Arial" font-size="9" fill="#555">Language L(M) = {w | δ*(q₀,w) ∈ F}</text>
  </g>
  
  <g class="step" id="step5" data-narration="Example DFA: accepts strings ending with 1 over alphabet zero one. States q0 and q1, with q1 as final state.">
    <rect x="20" y="410" width="760" height="91" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example 1: DFA Accepting Strings Ending with '1'</text>
    <text x="40" y="450" font-family="Arial" font-size="9" fill="#555">M = (Q, Σ, δ, q₀, F) where Q = {q₀, q₁}, Σ = {0, 1}, Start = q₀, F = {q₁}</text>
    <rect x="40" y="458" width="180" height="28" rx="2" fill="#bbdefb" stroke="#1976d2" stroke-width="0.5"/>
    <text x="130" y="470" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Transition Table</text>
    <text x="50" y="482" font-family="Arial" font-size="8" fill="#333">State</text>
    <text x="90" y="482" font-family="Arial" font-size="8" fill="#333">0</text>
    <text x="130" y="482" font-family="Arial" font-size="8" fill="#333">1</text>
    <text x="60" y="494" font-family="Arial" font-size="8" fill="#333">q₀</text>
    <text x="90" y="494" font-family="Arial" font-size="8" fill="#333">q₀</text>
    <text x="130" y="494" font-family="Arial" font-size="8" fill="#333">q₁</text>
    <text x="240" y="468" font-family="Arial" font-size="9" fill="#2e7d32">"101" → ACCEPTED (ends at q₁)</text>
    <text x="240" y="484" font-family="Arial" font-size="9" fill="#c62828">"100" → REJECTED (ends at q₀)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example NFA: accepts strings starting with ab. Uses three states q0 q1 q2, with q2 as final state for the prefix ab.">
    <rect x="20" y="509" width="760" height="91" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="531" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example 2: NFA Accepting Strings Starting with 'ab'</text>
    <text x="40" y="549" font-family="Arial" font-size="9" fill="#555">M = (Q, Σ, δ, q₀, F) where Q = {q₀, q₁, q₂}, Σ = {a, b}, Start = q₀, F = {q₂}</text>
    <text x="40" y="566" font-family="Arial" font-size="8" fill="#333">Transitions: δ(q₀,a)={q₁}, δ(q₁,b)={q₂}, δ(q₂,a)={q₂}, δ(q₂,b)={q₂}</text>
    <circle cx="80" cy="580" r="12" fill="white" stroke="#388e3c" stroke-width="2"/>
    <circle cx="80" cy="580" r="12" fill="none" stroke="#388e3c" stroke-width="2"/>
    <text x="80" y="584" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">q₀</text>
    <polygon points="95,575 105,580 95,585" fill="#388e3c"/>
    <path d="M105,580 L145,580" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="118" y="572" font-family="Arial" font-size="8" fill="#388e3c">a</text>
    <circle cx="170" cy="580" r="12" fill="white" stroke="#388e3c" stroke-width="2"/>
    <text x="170" y="584" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">q₁</text>
    <path d="M195,580 L235,580" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="208" y="572" font-family="Arial" font-size="8" fill="#388e3c">b</text>
    <circle cx="260" cy="580" r="12" fill="white" stroke="#388e3c" stroke-width="2"/>
    <circle cx="260" cy="580" r="12" fill="none" stroke="#388e3c" stroke-width="2"/>
    <text x="260" y="584" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">q₂</text>
    <text x="380" y="570" font-family="Arial" font-size="9" fill="#2e7d32">"ab" → ACCEPTED</text>
    <text x="380" y="586" font-family="Arial" font-size="9" fill="#c62828">"ba" → REJECTED</text>
  </g>
</svg>