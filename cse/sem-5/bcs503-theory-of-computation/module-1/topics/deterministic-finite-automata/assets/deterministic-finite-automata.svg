<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Deterministic Finite Automata, also called DFA, a fundamental concept in Theory of Computation that models simple computing machines.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#0d47a1">Deterministic Finite Automata (DFA)</text>
  </g>
  
  <g class="step" id="step1" data-narration="A Deterministic Finite Automaton, or DFA, is formally defined as a 5-tuple consisting of states, alphabet, transition function, start state, and accepting states.">
    <rect x="10" y="58" width="780" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#0d47a1">Formal Definition of DFA</text>
    <text x="25" y="100" font-family="Arial" font-size="12" fill="#1565c0">A Deterministic Finite Automaton is a 5-tuple:</text>
    <text x="25" y="122" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">M = (Q, Σ, δ, q₀, F)</text>
    <rect x="400" y="80" width="380" height="55" fill="#ffffff" stroke="#bbdefb" rx="5"/>
    <text x="410" y="100" font-family="Arial" font-size="11" fill="#424242">Where each component has a specific</text>
    <text x="410" y="118" font-family="Arial" font-size="11" fill="#424242">meaning in the machine's structure.</text>
  </g>
  
  <g class="step" id="step2" data-narration="The first component Q represents the finite set of states, while Sigma denotes the input alphabet containing all valid symbols that the machine can read.">
    <rect x="10" y="146" width="780" height="85" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="25" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#1b5e20">Components: Q, Σ, and q₀</text>
    <rect x="25" y="180" width="240" height="42" fill="#c8e6c9" rx="5"/>
    <text x="35" y="198" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Q: States</text>
    <text x="35" y="214" font-family="Arial" font-size="10" fill="#1b5e20">Finite set of states the</text>
    <text x="35" y="226" font-family="Arial" font-size="10" fill="#1b5e20">automaton can be in.</text>
    <rect x="275" y="180" width="240" height="42" fill="#c8e6c9" rx="5"/>
    <text x="285" y="198" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Σ: Alphabet</text>
    <text x="285" y="214" font-family="Arial" font-size="10" fill="#1b5e20">Finite set of input symbols</text>
    <text x="285" y="226" font-family="Arial" font-size="10" fill="#1b5e20">(e.g., {0,1}, {a,b}).</text>
    <rect x="525" y="180" width="240" height="42" fill="#c8e6c9" rx="5"/>
    <text x="535" y="198" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">q₀: Start State</text>
    <text x="535" y="214" font-family="Arial" font-size="10" fill="#1b5e20">The initial state where</text>
    <text x="535" y="226" font-family="Arial" font-size="10" fill="#1b5e20">computation begins.</text>
  </g>
  
  <g class="step" id="step3" data-narration="The transition function delta maps each state-symbol pair to exactly one next state, while F represents the set of accepting or final states in the machine.">
    <rect x="10" y="234" width="780" height="85" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="25" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">Components: δ and F</text>
    <rect x="25" y="268" width="350" height="45" fill="#ffe0b2" rx="5"/>
    <text x="35" y="288" font-family="Arial" font-size="12" font-weight="bold" fill="#ef6c00">δ: Transition Function</text>
    <text x="35" y="304" font-family="Arial" font-size="10" fill="#e65100">Maps Q × Σ → Q. For each state and</text>
    <text x="35" y="316" font-family="Arial" font-size="10" fill="#e65100">input symbol, exactly one next state.</text>
    <rect x="385" y="268" width="180" height="45" fill="#ffe0b2" rx="5"/>
    <text x="395" y="288" font-family="Arial" font-size="12" font-weight="bold" fill="#ef6c00">F: Accepting States</text>
    <text x="395" y="304" font-family="Arial" font-size="10" fill="#e65100">Subset of Q. If the automaton</text>
    <text x="395" y="316" font-family="Arial" font-size="10" fill="#e65100">ends in F, string is accepted.</text>
    <circle cx="660" cy="290" r="20" fill="none" stroke="#ef6c00" stroke-width="2"/>
    <circle cx="660" cy="290" r="14" fill="none" stroke="#ef6c00" stroke-width="2"/>
    <text x="690" y="295" font-family="Arial" font-size="10" fill="#e65100">Accept</text>
  </g>
  
  <g class="step" id="step4" data-narration="The language accepted by a DFA, denoted L of M, consists of all strings that lead from the start state to an accepting state after processing.">
    <rect x="10" y="322" width="780" height="85" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="25" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">Language of a DFA</text>
    <rect x="25" y="358" width="500" height="42" fill="#e1bee7" rx="5"/>
    <text x="35" y="378" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">L(M) = {w ∈ Σ* | δ(q₀, w) ∈ F}</text>
    <text x="35" y="396" font-family="Arial" font-size="10" fill="#6a1b9a">All strings that cause the machine to end in an accepting state.</text>
    <rect x="535" y="358" width="240" height="42" fill="#e1bee7" rx="5"/>
    <text x="545" y="378" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">Extended Transition</text>
    <text x="545" y="392" font-family="Arial" font-size="10" fill="#6a1b9a">δ̂(q, ε) = q (stay on empty)</text>
    <text x="545" y="404" font-family="Arial" font-size="10" fill="#6a1b9a">δ̂(q, wa) = δ(δ̂(q, w), a)</text>
  </g>
  
  <g class="step" id="step5" data-narration="This example shows a DFA that accepts binary strings ending with the symbol '1'. It uses two states to track whether the last symbol read was 0 or 1.">
    <rect x="10" y="410" width="780" height="85" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="25" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">Example: DFA for Strings Ending with '1'</text>
    <circle cx="100" cy="470" r="25" fill="none" stroke="#c62828" stroke-width="2"/>
    <text x="100" y="474" font-family="Arial" font-size="12" fill="#c62828">q₀</text>
    <text x="80" y="455" font-family="Arial" font-size="8" fill="#666">start</text>
    <circle cx="220" cy="470" r="25" fill="none" stroke="#c62828" stroke-width="2"/>
    <circle cx="220" cy="470" r="18" fill="none" stroke="#c62828" stroke-width="2"/>
    <text x="220" y="474" font-family="Arial" font-size="12" fill="#c62828">q₁</text>
    <path d="M125 470 L195 470" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="155" y="465" font-family="Arial" font-size="10" fill="#c62828">1</text>
    <path d="M128 445 Q160 420 195 445" stroke="#c62828" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="155" y="440" font-family="Arial" font-size="10" fill="#c62828">0</text>
    <path d="M245 470 L315 470" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="275" y="465" font-family="Arial" font-size="10" fill="#c62828">0</text>
    <path d="M248 450 Q280 425 315 450" stroke="#c62828" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="275" y="440" font-family="Arial" font-size="10" fill="#c62828">1</text>
    <rect x="340" y="445" width="430" height="42" fill="#ffcdd2" rx="5"/>
    <text x="350" y="463" font-family="Arial" font-size="10" fill="#b71c1c">Q = {q₀,q₁}, Σ = {0,1}, q₀ = q₀, F = {q₁}</text>
    <text x="350" y="480" font-family="Arial" font-size="10" fill="#b71c1c">δ: q₀-0→q₀, q₀-1→q₁, q₁-0→q₀, q₁-1→q₁</text>
  </g>
  
  <g class="step" id="step6" data-narration="Important points to remember: DFAs are deterministic with exactly one transition per state-symbol pair, and they can only accept regular languages, not more complex ones.">
    <rect x="10" y="498" width="780" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="518" font-family="Arial" font-size="14" font-weight="bold" fill="#0d47a1">Key Points and Exam Tips</text>
    <rect x="25" y="530" width="240" height="50" fill="#bbdefb" rx="5"/>
    <text x="35" y="548" font-family="Arial" font-size="10" fill="#0d47a1">• DFAs are deterministic: one</text>
    <text x="35" y="562" font-family="Arial" font-size="10" fill="#0d47a1">  transition per state-symbol.</text>
    <text x="35" y="576" font-family="Arial" font-size="10" fill="#0d47a1">• Start state must be in Q.</text>
    <rect x="275" y="530" width="240" height="50" fill="#bbdefb" rx="5"/>
    <text x="285" y="548" font-family="Arial" font-size="10" fill="#0d47a1">• δ must be total in complete</text>
    <text x="285" y="562" font-family="Arial" font-size="10" fill="#0d47a1">  DFAs (all transitions defined).</text>
    <text x="285" y="576" font-family="Arial" font-size="10" fill="#0d47a1">• ε accepted if q₀ ∈ F.</text>
    <rect x="525" y="530" width="240" height="50" fill="#bbdefb" rx="5"/>
    <text x="535" y="548" font-family="Arial" font-size="10" fill="#0d47a1">• DFAs can only accept regular</text>
    <text x="535" y="562" font-family="Arial" font-size="10" fill="#0d47a1">  languages. Non-regular languages</text>
    <text x="535" y="576" font-family="Arial" font-size="10" fill="#0d47a1">  like {0ⁿ1ⁿ} cannot be accepted.</text>
  </g>
</svg>