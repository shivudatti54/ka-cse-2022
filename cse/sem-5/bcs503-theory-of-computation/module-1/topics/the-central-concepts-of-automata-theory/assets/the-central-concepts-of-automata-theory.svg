<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the Central Concepts of Automata Theory, where we explore alphabets, strings, languages, finite automata, regular expressions, and closure properties that form the foundation of computational theory.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">The Central Concepts of Automata Theory</text>
  </g>
  
  <g class="step" id="step1" data-narration="An alphabet Σ is a finite non-empty set of symbols like {0,1}. A string is a finite sequence. Empty string ε has length zero. Σ* contains all strings including ε.">
    <rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Alphabets and Strings</text>
    <rect x="25" y="82" width="160" height="48" fill="#e3f2fd" rx="3"/>
    <text x="35" y="95" font-family="Arial" font-size="9" fill="#1565c0">Alphabet Σ = {0,1}</text>
    <text x="35" y="108" font-family="Arial" font-size="9" fill="#1565c0">String: finite sequence</text>
    <text x="35" y="121" font-family="Arial" font-size="9" fill="#1565c0">ε = empty string</text>
    <rect x="195" y="82" width="180" height="48" fill="#e8f5e9" rx="3"/>
    <text x="205" y="95" font-family="Arial" font-size="9" fill="#2e7d32">Σ* = {ε, 0, 1, 00, 01, ...}</text>
    <text x="205" y="108" font-family="Arial" font-size="9" fill="#2e7d32">Σ+ = Σ* - {ε}</text>
    <text x="205" y="121" font-family="Arial" font-size="9" fill="#2e7d32">|w| = length of string</text>
    <rect x="385" y="82" width="180" height="48" fill="#fff3e0" rx="3"/>
    <text x="395" y="95" font-family="Arial" font-size="9" fill="#e65100">Operations:</text>
    <text x="395" y="108" font-family="Arial" font-size="9" fill="#e65100">Concatenation, Prefix,</text>
    <text x="395" y="121" font-family="Arial" font-size="9" fill="#e65100">Suffix, Reversal</text>
    <rect x="575" y="82" width="200" height="48" fill="#f3e5f5" rx="3"/>
    <text x="585" y="95" font-family="Arial" font-size="9" fill="#6a1b9a">Examples:</text>
    <text x="585" y="108" font-family="Arial" font-size="9" fill="#6a1b9a">w = "hello", |w| = 5</text>
    <text x="585" y="121" font-family="Arial" font-size="9" fill="#6a1b9a">Binary: Σ = {0,1}</text>
  </g>
  
  <g class="step" id="step2" data-narration="A language is a subset of Σ*, either finite like {a,aa,aaa} or infinite like {aⁿbⁿ|n≥1}. The empty language ∅ differs from {ε} containing empty string.">
    <rect x="10" y="146" width="780" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Language</text>
    <text x="25" y="180" font-family="Arial" font-size="10" fill="#333">A language L is a subset of Σ* (can be finite or infinite)</text>
    <rect x="25" y="188" width="240" height="30" fill="#e8f5e9" rx="3"/>
    <text x="35" y="202" font-family="Arial" font-size="9" fill="#2e7d32">Finite: L = {a, aa, aaa}</text>
    <rect x="275" y="188" width="240" height="30" fill="#fff3e0" rx="3"/>
    <text x="285" y="202" font-family="Arial" font-size="9" fill="#e65100">Infinite: L = {aⁿbⁿ | n ≥ 1}</text>
    <rect x="525" y="188" width="250" height="30" fill="#ffebee" rx="3"/>
    <text x="535" y="202" font-family="Arial" font-size="9" fill="#c62828">Important: ∅ ≠ {ε} ≠ ε</text>
    <text x="25" y="218" font-family="Arial" font-size="10" fill="#333">Described by: enumeration, property, grammar, or automaton</text>
  </g>
  
  <g class="step" id="step3" data-narration="A DFA is M=(Q, Σ, δ, q₀, F) with δ: Q×Σ→Q. Exactly one transition per state-symbol. Input accepted if ends in final state F.">
    <rect x="10" y="234" width="780" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Deterministic Finite Automaton (DFA)</text>
    <rect x="25" y="262" width="350" height="45" fill="#fff3e0" rx="3"/>
    <text x="35" y="275" font-family="Arial" font-size="9" fill="#e65100">DFA: M = (Q, Σ, δ, q₀, F)</text>
    <text x="35" y="288" font-family="Arial" font-size="9" fill="#e65100">Q = finite states, Σ = alphabet</text>
    <text x="35" y="301" font-family="Arial" font-size="9" fill="#e65100">δ: Q × Σ → Q (single next state)</text>
    <rect x="385" y="262" width="180" height="45" fill="#e3f2fd" rx="3"/>
    <text x="395" y="275" font-family="Arial" font-size="9" fill="#1565c0">Acceptance:</text>
    <text x="395" y="288" font-family="Arial" font-size="9" fill="#1565c0">Read input → final state?</text>
    <text x="395" y="301" font-family="Arial" font-size="9" fill="#1565c0">Yes → accept, No → reject</text>
    <rect x="575" y="262" width="200" height="45" fill="#e8f5e9" rx="3"/>
    <text x="585" y="275" font-family="Arial" font-size="9" fill="#2e7d32">Example: Binary divisible by 2</text>
    <text x="585" y="288" font-family="Arial" font-size="9" fill="#2e7d32">States: q₀ (even), q₁ (odd)</text>
    <text x="585" y="301" font-family="Arial" font-size="9" fill="#2e7d32">Accept q₀ (ends in 0)</text>
  </g>
  
  <g class="step" id="step4" data-narration="An NFA has δ: Q×Σ→P(Q) returning sets of states. From a state, multiple transitions possible. Every NFA converts to equivalent DFA via subset construction.">
    <rect x="10" y="322" width="780" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">NFA and DFA-NFA Equivalence</text>
    <rect x="25" y="350" width="300" height="45" fill="#f3e5f5" rx="3"/>
    <text x="35" y="363" font-family="Arial" font-size="9" fill="#6a1b9a">NFA: M = (Q, Σ, δ, q₀, F)</text>
    <text x="35" y="376" font-family="Arial" font-size="9" fill="#6a1b9a">δ: Q × Σ → P(Q) (set of states)</text>
    <text x="35" y="389" font-family="Arial" font-size="9" fill="#6a1b9a">Accepts if ANY path leads to final</text>
    <rect x="335" y="350" width="200" height="45" fill="#e3f2fd" rx="3"/>
    <text x="345" y="363" font-family="Arial" font-size="9" fill="#1565c0">Subset Construction:</text>
    <text x="345" y="376" font-family="Arial" font-size="9" fill="#1565c0">DFA states = subsets of NFA</text>
    <text x="345" y="389" font-family="Arial" font-size="9" fill="#1565c0">states (2ⁿ possibilities)</text>
    <rect x="545" y="350" width="230" height="45" fill="#e8f5e9" rx="3"/>
    <text x="555" y="363" font-family="Arial" font-size="9" fill="#2e7d32">Theorem:</text>
    <text x="555" y="376" font-family="Arial" font-size="9" fill="#2e7d32">Every NFA has equivalent DFA</text>
    <text x="555" y="389" font-family="Arial" font-size="9" fill="#2e7d32">DFA and NFA are equivalent</text>
  </g>
  
  <g class="step" id="step5" data-narration="Regular expressions use union |, concatenation, and Kleene star * to describe languages. Star has highest precedence, then concatenation, then union. a* means zero or more a.">
    <rect x="10" y="410" width="780" height="80" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="25" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Regular Expressions</text>
    <rect x="25" y="438" width="220" height="45" fill="#ffebee" rx="3"/>
    <text x="35" y="451" font-family="Arial" font-size="9" fill="#c62828">Three Operations:</text>
    <text x="35" y="464" font-family="Arial" font-size="9" fill="#c62828">Union (|), Concatenation (·),</text>
    <text x="35" y="477" font-family="Arial" font-size="9" fill="#c62828">Kleene Star (*)</text>
    <rect x="255" y="438" width="160" height="45" fill="#fff3e0" rx="3"/>
    <text x="265" y="451" font-family="Arial" font-size="9" fill="#e65100">Precedence:</text>
    <text x="265" y="464" font-family="Arial" font-size="9" fill="#e65100">* highest, then ·,</text>
    <text x="265" y="477" font-family="Arial" font-size="9" fill="#e65100">then | lowest</text>
    <rect x="425" y="438" width="180" height="45" fill="#e8f5e9" rx="3"/>
    <text x="435" y="451" font-family="Arial" font-size="9" fill="#2e7d32">Examples:</text>
    <text x="435" y="464" font-family="Arial" font-size="9" fill="#2e7d32">a* = {ε,a,aa,aaa,...}</text>
    <text x="435" y="477" font-family="Arial" font-size="9" fill="#2e7d32">(a|b)* = all binary strings</text>
    <rect x="615" y="438" width="160" height="45" fill="#e3f2fd" rx="3"/>
    <text x="625" y="451" font-family="Arial" font-size="9" fill="#1565c0">FA ↔ RE Equivalence:</text>
    <text x="625" y="464" font-family="Arial" font-size="9" fill="#1565c0">Every RE has FA,</text>
    <text x="625" y="477" font-family="Arial" font-size="9" fill="#1565c0">every FA has RE</text>
  </g>
  
  <g class="step" id="step6" data-narration="Regular languages close under union, intersection, complement, concatenation, and Kleene star. Myhill-Nerode: language is regular iff finite indistinguishability classes exist.">
    <rect x="10" y="498" width="780" height="90" fill="#ffffff" stroke="#607d8b" stroke-width="1" rx="5"/>
    <text x="25" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#455a64">Closure Properties &amp; Myhill-Nerode</text>
    <rect x="25" y="526" width="480" height="55" fill="#eceff1" rx="3"/>
    <text x="35" y="539" font-family="Arial" font-size="9" fill="#455a64">Closed under: Union (L₁∪L₂), Intersection (L₁∩L₂), Complement (Σ*-L),</text>
    <text x="35" y="552" font-family="Arial" font-size="9" fill="#455a64">Concatenation (L₁L₂), Kleene Star (L*)</text>
    <text x="35" y="565" font-family="Arial" font-size="9" fill="#455a64">All these preserve regularity</text>
    <rect x="515" y="526" width="260" height="55" fill="#e1f5fe" rx="3"/>
    <text x="525" y="539" font-family="Arial" font-size="9" fill="#0277bd">Myhill-Nerode Theorem:</text>
    <text x="525" y="552" font-family="Arial" font-size="9" fill="#0277bd">L is regular iff number of</text>
    <text x="525" y="565" font-family="Arial" font-size="9" fill="#0277bd">indistinguishability classes is finite</text>
    <text x="25" y="582" font-family="Arial" font-size="8" fill="#78909c">Used to prove non-regularity and minimize DFAs</text>
  </g>
</svg>