<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Structural representations in compiler design include parse trees, ASTs, DAGs, and three-address code. These are intermediate forms used during analysis and optimization phases.">
    <rect x="0" y="0" width="800" height="45" fill="#e3f2fd"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Structural Representations in Compiler Design</text>
  </g>
  
  <g class="step" id="step1" data-narration="A parse tree shows complete derivation with all grammar symbols preserved in the hierarchy. Internal nodes represent non-terminals from the grammar, while leaf nodes represent terminals or tokens.">
    <rect x="10" y="53" width="780" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="70" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Parse Tree (Derivation Tree)</text>
    <text x="25" y="85" font-family="Arial" font-size="9" fill="#333">Shows complete derivation with all grammar symbols preserved</text>
    <rect x="400" y="60" width="180" height="70" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="490" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">E</text>
    <line x1="490" y1="80" x2="440" y2="100" stroke="#1976d2" stroke-width="1"/>
    <line x1="490" y1="80" x2="540" y2="100" stroke="#1976d2" stroke-width="1"/>
    <text x="440" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">E+T</text>
    <text x="540" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">T</text>
    <line x1="440" y1="100" x2="420" y2="118" stroke="#1976d2" stroke-width="1"/>
    <line x1="440" y1="100" x2="460" y2="118" stroke="#1976d2" stroke-width="1"/>
    <text x="420" y="130" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">T</text>
    <text x="460" y="130" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">F</text>
  </g>
  
  <g class="step" id="step2" data-narration="AST is a condensed tree showing only essential program structure without unnecessary syntax. Nodes represent programming constructs like operators, identifiers, and constants rather than grammar symbols.">
    <rect x="10" y="146" width="780" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Abstract Syntax Tree (AST)</text>
    <text x="25" y="178" font-family="Arial" font-size="9" fill="#333">Condensed representation showing programming constructs only</text>
    <rect x="250" y="155" width="300" height="70" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c" font-weight="bold">*</text>
    <line x1="400" y1="180" x2="320" y2="205" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="400" y1="180" x2="480" y2="205" stroke="#388e3c" stroke-width="1.5"/>
    <text x="320" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">+</text>
    <text x="480" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">id</text>
    <line x1="320" y1="205" x2="280" y2="220" stroke="#388e3c" stroke-width="1"/>
    <line x1="320" y1="205" x2="360" y2="220" stroke="#388e3c" stroke-width="1"/>
    <text x="280" y="230" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">id</text>
    <text x="360" y="230" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">id</text>
    <text x="600" y="175" font-family="Arial" font-size="8" fill="#666">Operator nodes: +, *, -</text>
    <text x="600" y="190" font-family="Arial" font-size="8" fill="#666">Identifier nodes: id</text>
    <text x="600" y="205" font-family="Arial" font-size="8" fill="#666">Constant nodes: numbers</text>
  </g>
  
  <g class="step" id="step3" data-narration="A DAG identifies common subexpressions allowing node sharing to eliminate redundancy. Each node can have multiple parents, making it efficient for optimization passes in compilers.">
    <rect x="10" y="239" width="780" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="25" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Directed Acyclic Graph (DAG)</text>
    <text x="25" y="271" font-family="Arial" font-size="9" fill="#333">Eliminates common subexpressions - nodes can have multiple parents</text>
    <rect x="200" y="250" width="200" height="65" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="300" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800" font-weight="bold">+</text>
    <line x1="300" y1="280" x2="250" y2="300" stroke="#ff9800" stroke-width="1.5"/>
    <line x1="300" y1="280" x2="350" y2="300" stroke="#ff9800" stroke-width="1.5"/>
    <text x="250" y="312" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">a</text>
    <text x="350" y="312" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">b</text>
    <path d="M300,295 Q380,270 420,290" stroke="#ff9800" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <path d="M300,295 Q380,320 420,310" stroke="#ff9800" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
    <text x="430" y="295" font-family="Arial" font-size="8" fill="#333">First a+b</text>
    <text x="430" y="315" font-family="Arial" font-size="8" fill="#333">Second a+b</text>
    <text x="560" y="275" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">Advantages:</text>
    <text x="560" y="290" font-family="Arial" font-size="8" fill="#333">• Common subexpression elimination</text>
    <text x="560" y="305" font-family="Arial" font-size="8" fill="#333">• Shows variable usage before redef</text>
    <text x="560" y="320" font-family="Arial" font-size="8" fill="#333">• Helps register allocation</text>
  </g>
  
  <g class="step" id="step4" data-narration="Three-address code breaks complex expressions into simple instructions with at most three operands. Each temporary variable like t1 or t2 stores intermediate computational results for linear representation.">
    <rect x="10" y="332" width="780" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="25" y="349" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Three-Address Code</text>
    <text x="25" y="364" font-family="Arial" font-size="9" fill="#333">Linear representation with max 3 operands per instruction</text>
    <rect x="25" y="375" width="340" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="35" y="390" font-family="Courier" font-size="9" fill="#333">t1 = id + id</text>
    <text x="180" y="390" font-family="Courier" font-size="9" fill="#333">t2 = t1 * id</text>
    <rect x="380" y="375" width="200" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="390" y="390" font-family="Courier" font-size="9" fill="#333">if a &lt; b goto L1</text>
    <text x="490" y="390" font-family="Courier" font-size="9" fill="#333">t3 = a + b</text>
    <text x="600" y="380" font-family="Arial" font-size="8" fill="#9c27b0" font-weight="bold">Instruction Types:</text>
    <text x="600" y="395" font-family="Arial" font-size="8" fill="#333">x = y op z (binary)</text>
    <text x="600" y="410" font-family="Arial" font-size="8" fill="#333">x = op y (unary)</text>
    <text x="720" y="395" font-family="Arial" font-size="8" fill="#333">goto L, if...goto L</text>
  </g>
  
  <g class="step" id="step5" data-narration="This example shows converting the expression id plus id multiplied by id through different representations. The parse tree shows complete derivation, AST shows essential structure, and three-address code uses temporaries.">
    <rect x="10" y="425" width="780" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="25" y="442" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. Example: Expression Conversion</text>
    <text x="25" y="457" font-family="Arial" font-size="9" fill="#333">Input: id + id * id</text>
    <rect x="180" y="438" width="80" height="65" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Parse</text>
    <text x="220" y="470" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Complete</text>
    <text x="220" y="482" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">derivation</text>
    <text x="270" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">→</text>
    <rect x="280" y="438" width="80" height="65" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="320" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">AST</text>
    <text x="320" y="470" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Essential</text>
    <text x="320" y="482" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">structure</text>
    <text x="370" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">→</text>
    <rect x="380" y="438" width="100" height="65" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="430" y="450" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">3AC</text>
    <text x="430" y="465" text-anchor="middle" font-family="Courier" font-size="7" fill="#333">t1=id*id</text>
    <text x="430" y="478" text-anchor="middle" font-family="Courier" font-size="7" fill="#333">t2=id+t1</text>
    <text x="500" y="455" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">Key Points:</text>
    <text x="500" y="472" font-family="Arial" font-size="8" fill="#333">Parse tree: all grammar symbols</text>
    <text x="500" y="487" font-family="Arial" font-size="8" fill="#333">AST: programming constructs only</text>
    <text x="640" y="472" font-family="Arial" font-size="8" fill="#333">3AC: linear, temporaries</text>
  </g>
  
  <g class="step" id="step6" data-narration="Different representations serve different purposes in compilation: parse trees preserve complete derivation, ASTs support semantic analysis, DAGs optimize common subexpressions, and three-address code enables optimization passes. In-order traversal gives the original input string.">
    <rect x="10" y="518" width="780" height="70" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="25" y="535" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Summary: Choosing the Right Representation</text>
    <rect x="25" y="548" width="140" height="32" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="95" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2" font-weight="bold">Parse Tree</text>
    <text x="95" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Preserves all details</text>
    <rect x="175" y="548" width="140" height="32" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="245" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c" font-weight="bold">AST</text>
    <text x="245" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Semantic analysis</text>
    <rect x="325" y="548" width="140" height="32" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="395" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800" font-weight="bold">DAG</text>
    <text x="395" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Common subexpr</text>
    <rect x="475" y="548" width="140" height="32" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="545" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0" font-weight="bold">3AC</text>
    <text x="545" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Optimization</text>
    <text x="630" y="562" font-family="Arial" font-size="8" fill="#666">Exam tip: Remember in-order</text>
    <text x="630" y="575" font-family="Arial" font-size="8" fill="#666">traversal gives input string</text>
  </g>
</svg>