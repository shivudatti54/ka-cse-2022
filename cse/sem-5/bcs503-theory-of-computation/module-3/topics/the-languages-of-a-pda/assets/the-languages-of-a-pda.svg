<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Languages of a Pushdown Automaton - Exploring how PDAs accept strings through final state or empty stack, enabling recognition of context-free languages.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">The Languages of a Pushdown Automaton</text>
  </g>
  
  <g class="step" id="step1" data-narration="A PDA is a 7-tuple M = (Q, Σ, Γ, δ, q₀, Z₀, F) containing states, input alphabet, stack alphabet, transition function, initial state, and final states.">
    <rect x="20" y="58" width="760" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">PDA Definition: M = (Q, Σ, Γ, δ, q₀, Z₀, F)</text>
    <rect x="40" y="88" width="100" height="45" fill="#e3f2fd" rx="3"/>
    <text x="90" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Q: States</text>
    <text x="90" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Σ: Input α</text>
    <rect x="150" y="88" width="100" height="45" fill="#e3f2fd" rx="3"/>
    <text x="200" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Γ: Stack α</text>
    <text x="200" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">δ: Transition</text>
    <rect x="260" y="88" width="100" height="45" fill="#e3f2fd" rx="3"/>
    <text x="310" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">q₀: Initial</text>
    <text x="310" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Z₀: Init Stack</text>
    <rect x="370" y="88" width="80" height="45" fill="#e3f2fd" rx="3"/>
    <text x="410" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">F: Final</text>
    <text x="500" y="103" font-family="Arial" font-size="9" fill="#333">Transition: δ(q,a,X) = {(p,γ)}</text>
    <text x="500" y="120" font-family="Arial" font-size="8" fill="#666">State q, read a, see X on stack</text>
    <text x="500" y="134" font-family="Arial" font-size="8" fill="#666">Move to p, replace X with γ</text>
  </g>
  
  <g class="step" id="step2" data-narration="Acceptance by Final State: String w is accepted if the PDA reaches a final state after consuming all input, ending in configuration (p, ε, γ) where p ∈ F.">
    <rect x="20" y="151" width="760" height="85" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="171" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Acceptance by Final State</text>
    <text x="40" y="192" font-family="Arial" font-size="10" fill="#333">String w is accepted if: (q₀, w, Z₀) ⊢* (p, ε, γ) for some p ∈ F, γ ∈ Γ*</text>
    <rect x="40" y="205" width="180" height="25" fill="#e8f5e9" rx="3"/>
    <text x="130" y="221" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">L(M) = {w | ends in final state}</text>
    <path d="M270" y="185" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="290" y="189" font-family="Arial" font-size="9" fill="#333">Configuration:</text>
    <text x="290" y="204" font-family="Arial" font-size="9" fill="#333">(state, remaining input,</text>
    <text x="290" y="218" font-family="Arial" font-size="9" fill="#333">stack content)</text>
    <rect x="420" y="175" width="350" height="55" fill="#f8f9fa" stroke="#ddd" rx="3"/>
    <text x="435" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Example: "aabb"</text>
    <text x="435" y="208" font-family="Arial" font-size="8" fill="#666">(q₀,aabb,Z₀) → (q₀,abb,AZ₀) →</text>
    <text x="435" y="222" font-family="Arial" font-size="8" fill="#666">(q₀,ε,Z₀) → Accept at final state</text>
  </g>
  
  <g class="step" id="step3" data-narration="Acceptance by Empty Stack: String w is accepted if the PDA completely empties its stack after consuming all input, reaching configuration (q, ε, ε).">
    <rect x="20" y="238" width="760" height="85" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="258" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Acceptance by Empty Stack</text>
    <text x="40" y="279" font-family="Arial" font-size="10" fill="#333">String w is accepted if: (q₀, w, Z₀) ⊢* (q, ε, ε) for some q ∈ Q</text>
    <rect x="40" y="292" width="180" height="25" fill="#fff3e0" rx="3"/>
    <text x="130" y="308" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">N(M) = {w | stack becomes empty}</text>
    <path d="M270" y="272" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="290" y="276" font-family="Arial" font-size="9" fill="#333">Key: Pop all symbols</text>
    <text x="290" y="291" font-family="Arial" font-size="9" fill="#333">including initial Z₀</text>
    <rect x="420" y="250" width="350" height="68" fill="#f8f9fa" stroke="#ddd" rx="3"/>
    <text x="435" y="267" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Example: "aabb" (balanced)</text>
    <text x="435" y="283" font-family="Arial" font-size="8" fill="#666">(q₀,aabb,Z₀) → (q₀,abb,AZ₀) →</text>
    <text x="435" y="297" font-family="Arial" font-size="8" fill="#666">(q₀,bb,AAZ₀) → (q₀,ε,Z₀) →</text>
    <text x="435" y="311" font-family="Arial" font-size="8" fill="#666">(q₀,ε,ε) Accept! Stack empty</text>
  </g>
  
  <g class="step" id="step4" data-narration="Equivalence Theorem states languages accepted by final state and empty stack are identical. We convert between them using bottom markers and transition modifications.">
    <rect x="20" y="325" width="760" height="85" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="345" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Equivalence of Acceptance Methods</text>
    <text x="40" y="366" font-family="Arial" font-size="10" fill="#333">Theorem: L(F) = L(E) — The families of languages accepted by final state and empty stack are identical.</text>
    <rect x="40" y="378" width="340" height="28" fill="#f3e5f5" rx="3"/>
    <text x="60" y="393" font-family="Arial" font-size="9" fill="#9c27b0">Final State → Empty Stack:</text>
    <text x="200" y="393" font-family="Arial" font-size="8" fill="#666">Add new initial state, bottom marker X₀</text>
    <rect x="40" y="408" width="340" height="0" fill="#f3e5f5" rx="3"/>
    <rect x="420" y="378" width="340" height="28" fill="#f3e5f5" rx="3"/>
    <text x="440" y="393" font-family="Arial" font-size="9" fill="#9c27b0">Empty Stack → Final State:</text>
    <text x="600" y="393" font-family="Arial" font-size="8" fill="#666">Add bottom marker, never empty during compute</text>
  </g>
  
  <g class="step" id="step5" data-narration="Deterministic PDAs have at most one move per configuration. Non-deterministic PDAs can have multiple moves, enabling recognition of all context-free languages.">
    <rect x="20" y="412" width="760" height="85" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Deterministic vs Non-Deterministic PDA</text>
    <rect x="40" y="448" width="220" height="45" fill="#ffebee" rx="3"/>
    <text x="150" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">DPDA (Deterministic)</text>
    <text x="150" y="480" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">|δ(q,a,X)| ≤ 1 for all q,a,X</text>
    <rect x="280" y="448" width="220" height="45" fill="#e8f5e9" rx="3"/>
    <text x="390" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">NPDA (Non-Deterministic)</text>
    <text x="390" y="480" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Multiple possible moves allowed</text>
    <text x="520" y="460" font-family="Arial" font-size="9" fill="#333">Language Power:</text>
    <text x="520" y="476" font-family="Arial" font-size="9" fill="#333">• DPDA → DCFL (Deterministic CFL)</text>
    <text x="520" y="491" font-family="Arial" font-size="9" fill="#333">• NPDA → CFL (All Context-Free)</text>
    <text x="640" y="491" font-family="Arial" font-size="8" fill="#666">DCFL ⊂ CFL</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example 1: a^n b^n uses push A for 'a', pop for 'b', accept when stack empties. Example 2: Palindromes ww^r use push phase, ε-move to guess middle, then pop phase.">
    <rect x="20" y="499" width="760" height="90" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="519" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Examples: PDA Constructions</text>
    <rect x="40" y="532" width="340" height="52" fill="#e3f2fd" rx="3"/>
    <text x="50" y="547" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">L₁ = {aⁿbⁿ | n ≥ 0} (Empty Stack)</text>
    <text x="50" y="562" font-family="Arial" font-size="8" fill="#333">δ(q₀,a,Z₀)={(q₀,AZ₀)} push A on 'a'</text>
    <text x="50" y="576" font-family="Arial" font-size="8" fill="#333">δ(q₀,b,A)={(q₀,ε)} pop A on 'b'</text>
    <rect x="400" y="532" width="360" height="52" fill="#e3f2fd" rx="3"/>
    <text x="410" y="547" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">L₂ = {wwʀ | w ∈ {a,b}*} (Final State)</text>
    <text x="410" y="562" font-family="Arial" font-size="8" fill="#333">Push phase: δ(q₀,a,X)={(q₀,aX)} for X∈{a,b,Z₀}</text>
    <text x="410" y="576" font-family="Arial" font-size="8" fill="#333">ε-move: δ(q₀,ε,Z₀)={(q₁,Z₀)} guess middle</text>
    <text x="580" y="576" font-family="Arial" font-size="8" fill="#333">Pop: δ(q₁,a,a)={(q₁,ε)}</text>
  </g>
</svg>