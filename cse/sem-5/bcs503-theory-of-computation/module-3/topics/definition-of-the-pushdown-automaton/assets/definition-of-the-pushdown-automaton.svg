<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the definition of Pushdown Automaton, a computational model that extends finite automata with stack memory for recognizing context-free languages.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="5"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Definition of Pushdown Automaton</text>
  </g>
  
  <g class="step" id="step1" data-narration="A Pushdown Automaton is a finite automaton with an added stack memory that enables recognition of context-free languages like balanced parentheses.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is a PDA?</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">A Pushdown Automaton (PDA) extends finite automata by adding</text>
    <text x="40" y="116" font-family="Arial" font-size="11" fill="#333">an unbounded LIFO stack memory. It can recognize context-free</text>
    <text x="40" y="132" font-family="Arial" font-size="11" fill="#333">languages that finite automata cannot handle, like balanced parentheses.</text>
  </g>
  
  <g class="step" id="step2" data-narration="A PDA is formally defined as a 7-tuple: M equals open parenthesis Q comma Sigma comma Gamma comma delta comma q subscript zero comma Z subscript zero comma F close parenthesis.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Formal 7-Tuple Definition</text>
    <text x="40" y="192" font-family="Arial" font-size="14" fill="#333">M = (Q, Σ, Γ, δ, q₀, Z₀, F)</text>
    <text x="40" y="212" font-family="Arial" font-size="11" fill="#666">Where: Q=states, Σ=input alphabet, Γ=stack alphabet, δ=transition function,</text>
    <text x="40" y="226" font-family="Arial" font-size="11" fill="#666">q₀=start state, Z₀=initial stack symbol, F=accepting states</text>
  </g>
  
  <g class="step" id="step3" data-narration="Q is the finite set of control states, Sigma is the input alphabet, and Gamma is the stack alphabet containing symbols that can be pushed onto the stack.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Components: Q, Σ, Γ</text>
    <rect x="40" y="270" width="220" height="40" fill="#ffe0b2" rx="3"/>
    <text x="50" y="288" font-family="Arial" font-size="11" fill="#333">Q: Finite set of control</text>
    <text x="50" y="302" font-family="Arial" font-size="11" fill="#333">states the PDA can be in</text>
    <rect x="270" y="270" width="220" height="40" fill="#ffe0b2" rx="3"/>
    <text x="280" y="288" font-family="Arial" font-size="11" fill="#333">Σ: Finite input alphabet</text>
    <text x="280" y="302" font-family="Arial" font-size="11" fill="#333">(symbols to read)</text>
    <rect x="500" y="270" width="260" height="40" fill="#ffe0b2" rx="3"/>
    <text x="510" y="288" font-family="Arial" font-size="11" fill="#333">Γ: Stack alphabet</text>
    <text x="510" y="302" font-family="Arial" font-size="11" fill="#333">(symbols for stack)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Delta is the transition function, q subscript zero is the start state, Z subscript zero is the initial stack symbol, and F is the set of accepting states.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Components: δ, q₀, Z₀, F</text>
    <rect x="40" y="358" width="170" height="40" fill="#e1bee7" rx="3"/>
    <text x="50" y="376" font-family="Arial" font-size="11" fill="#333">δ: Transition function</text>
    <text x="50" y="390" font-family="Arial" font-size="11" fill="#333">(state, input, stack → new)</text>
    <rect x="220" y="358" width="150" height="40" fill="#e1bee7" rx="3"/>
    <text x="230" y="376" font-family="Arial" font-size="11" fill="#333">q₀: Start state</text>
    <text x="230" y="390" font-family="Arial" font-size="11" fill="#333">(initial state)</text>
    <rect x="380" y="358" width="170" height="40" fill="#e1bee7" rx="3"/>
    <text x="390" y="376" font-family="Arial" font-size="11" fill="#333">Z₀: Initial stack</text>
    <text x="390" y="390" font-family="Arial" font-size="11" fill="#333">symbol (bottom marker)</text>
    <rect x="560" y="358" width="200" height="40" fill="#e1bee7" rx="3"/>
    <text x="570" y="376" font-family="Arial" font-size="11" fill="#333">F: Accepting states</text>
    <text x="570" y="390" font-family="Arial" font-size="11" fill="#333">(final states)</text>
  </g>
  
  <g class="step" id="step5" data-narration="A PDA configuration is written as open parenthesis q comma w comma alpha close parenthesis. PDAs accept by final state or by empty stack, both methods are equivalent.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Configuration and Acceptance</text>
    <text x="40" y="456" font-family="Arial" font-size="12" fill="#333">Configuration (ID): (q, w, α)</text>
    <text x="200" y="456" font-family="Arial" font-size="11" fill="#666">q=current state, w=remaining input, α=stack contents</text>
    <rect x="40" y="470" width="340" height="18" fill="#ffcdd2" rx="3"/>
    <text x="50" y="484" font-family="Arial" font-size="11" fill="#333">Acceptance by Final State: Reach state in F after consuming all input</text>
    <rect x="390" y="470" width="370" height="18" fill="#ffcdd2" rx="3"/>
    <text x="400" y="484" font-family="Arial" font-size="11" fill="#333">Acceptance by Empty Stack: Stack becomes empty after consuming input</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example PDA for language L equals zero to the power n one to the power n. Push X for each zero, pop X for each one, accept at final state.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Example: PDA for {0ⁿ1ⁿ | n ≥ 1}</text>
    <text x="40" y="542" font-family="Arial" font-size="11" fill="#333">M = ({q₀,q₁,q₂}, {0,1}, {X,Z₀}, δ, q₀, Z₀, {q₂})</text>
    <rect x="40" y="552" width="350" height="32" fill="#bbdefb" rx="3"/>
    <text x="50" y="566" font-family="Arial" font-size="10" fill="#333">δ(q₀,0,Z₀)={(q₀,XZ₀)}  δ(q₀,0,X)={(q₀,XX)}</text>
    <text x="50" y="580" font-family="Arial" font-size="10" fill="#333">δ(q₀,1,X)={(q₁,ε)}  δ(q₁,1,X)={(q₁,ε)}</text>
    <rect x="400" y="552" width="360" height="32" fill="#e8f5e9" rx="3"/>
    <text x="410" y="566" font-family="Arial" font-size="10" fill="#333">Trace "0011": (q₀,0011,Z₀)→(q₀,011,XZ₀)→(q₀,11,XXZ₀)</text>
    <text x="410" y="580" font-family="Arial" font-size="10" fill="#333">→(q₁,1,XZ₀)→(q₁,ε,Z₀)→(q₂,ε,Z₀) Accepted!</text>
  </g>
</svg>