<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Context-Free Grammars are essential in compiler design and formal language theory. This diagram covers CFG definitions, derivations, parse trees, ambiguity, simplification, and normal forms.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Context-Free Grammars (CFGs)</text>
  </g>
  
  <g class="step" id="step1" data-narration="A CFG is a 4-tuple G equals parentheses V comma T comma P comma S. V is non-terminals, T is terminals, P is productions, S is start symbol in the grammar.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">CFG Definition: G = (V, T, P, S)</text>
    <rect x="40" y="88" width="100" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="90" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">V = Variables&#xa;(Non-terminals)</text>
    <rect x="150" y="88" width="100" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="200" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">T = Terminals&#xa;(Alphabet)</text>
    <rect x="260" y="88" width="100" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="310" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">P = Productions&#xa;(Rules)</text>
    <rect x="370" y="88" width="100" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="420" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">S = Start Symbol&#xa;(S ∈ V)</text>
    <text x="540" y="108" font-family="Arial" font-size="9" fill="#666">Example: S → aSb | ε generates aⁿbⁿ</text>
  </g>
  
  <g class="step" id="step2" data-narration="A derivation replaces non-terminals using production rules systematically. Leftmost derivation replaces the leftmost non-terminal first at each step. Rightmost derivation replaces rightmost non-terminal first during parsing.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Derivations: Leftmost and Rightmost</text>
    <text x="40" y="190" font-family="Arial" font-size="9" fill="#333">Grammar: S → SS+ | S* | a | b</text>
    <text x="40" y="208" font-family="Arial" font-size="9" fill="#333">String: a*b + a</text>
    <line x1="200" y1="156" x2="200" y2="216" stroke="#388e3c" stroke-width="1" stroke-dasharray="4"/>
    <text x="220" y="175" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Leftmost:</text>
    <text x="220" y="190" font-family="Arial" font-size="8" fill="#333">S → SS+ → S*+ → a*+ → a*b+ → a*b+a</text>
    <text x="220" y="208" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Rightmost:</text>
    <text x="220" y="223" font-family="Arial" font-size="8" fill="#333">S → SS+ → Sa+ → S*a+ → a*a+ → a*b+a</text>
  </g>
  
  <g class="step" id="step3" data-narration="A parse tree shows hierarchical structure of a derivation clearly. Root contains start symbol, internal nodes represent non-terminals, leaves are terminals or epsilon symbols used in production rules.">
    <rect x="20" y="234" width="760" height="133" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Parse Tree (Derivation Tree)</text>
    <path d="M80 280 L80 310 L120 310 L120 280 Z" fill="none" stroke="#ff9800" stroke-width="1.5"/>
    <text x="100" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">S</text>
    <path d="M80 310 L60 340" stroke="#ff9800" stroke-width="1"/>
    <path d="M120 310 L140 340" stroke="#ff9800" stroke-width="1"/>
    <circle cx="60" cy="350" r="12" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="60" y="354" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">a</text>
    <circle cx="100" cy="350" r="12" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="100" y="354" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">S</text>
    <circle cx="140" cy="350" r="12" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="140" y="354" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">b</text>
    <text x="200" y="280" font-family="Arial" font-size="9" fill="#333">Root: Start Symbol</text>
    <text x="200" y="295" font-family="Arial" font-size="9" fill="#333">Internal: Non-terminals</text>
    <text x="200" y="310" font-family="Arial" font-size="9" fill="#333">Leaves: Terminals or ε</text>
    <text x="200" y="325" font-family="Arial" font-size="9" fill="#333">Inorder → derived string</text>
    <text x="350" y="280" font-family="Arial" font-size="9" fill="#ff9800">Example: S → aSb | ε</text>
    <text x="350" y="295" font-family="Arial" font-size="8" fill="#333">String "ab" has tree:</text>
    <text x="350" y="310" font-family="Arial" font-size="8" fill="#333">S → aSb → ab</text>
  </g>
  
  <g class="step" id="step4" data-narration="A grammar is ambiguous when one string can have multiple distinct parse trees. Grammar S to SS or a generates "aa" with two different derivations showing structural ambiguity clearly.">
    <rect x="20" y="375" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="395" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Ambiguity in Grammars</text>
    <text x="40" y="418" font-family="Arial" font-size="9" fill="#333">Grammar: S → SS | a produces string "aa"</text>
    <path d="M180 408 L180 428 L220 428 L220 408 Z" fill="none" stroke="#f44336"/>
    <text x="200" y="423" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">S → Sa</text>
    <path d="M240 408 L240 428 L280 428 L280 408 Z" fill="none" stroke="#f44336"/>
    <text x="260" y="423" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">S → aS</text>
    <text x="320" y="418" font-family="Arial" font-size="9" fill="#333">S → S+S | S*S | (S) | a</text>
    <text x="320" y="433" font-family="Arial" font-size="8" fill="#333">"a+a*a" → (a+a)*a or a+(a*a)</text>
    <text x="500" y="418" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Unambiguous:</text>
    <text x="500" y="433" font-family="Arial" font-size="8" fill="#333">S → aSb | ε generates aⁿbⁿ</text>
  </g>
  
  <g class="step" id="step5" data-narration="Simplify CFGs by removing useless symbols, epsilon productions, and unit productions in proper sequence. Remove epsilon productions first, then unit productions, then useless non-generating symbols.">
    <rect x="20" y="463" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="483" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Simplification of CFGs</text>
    <rect x="40" y="498" width="160" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="120" y="515" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">1. Remove ε-Productions</text>
    <text x="120" y="529" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">A→ε complicates parsing</text>
    <rect x="210" y="498" width="160" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="290" y="515" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">2. Remove Unit Productions</text>
    <text x="290" y="529" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">A→B where both are non-terminals</text>
    <rect x="380" y="498" width="160" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="460" y="515" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">3. Remove Useless Symbols</text>
    <text x="460" y="529" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Keep only generating and reachable</text>
    <text x="560" y="508" font-family="Arial" font-size="9" fill="#333">Order: ε → Unit → Useless</text>
    <text x="560" y="528" font-family="Arial" font-size="8" fill="#333">Example: S→aSb, A→aA|bA|ε</text>
  </g>
  
  <g class="step" id="step6" data-narration="Chomsky Normal Form has productions A to BC or A to a only. Greibach Normal Form has A to a alpha with terminal first. CNF enables efficient CYK parsing algorithm for all CFLs.">
    <rect x="20" y="551" width="760" height="42" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="571" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Normal Forms: CNF and GNF</text>
    <text x="320" y="571" font-family="Arial" font-size="9" fill="#333">CNF: A → BC or A → a (CYK parsing)</text>
    <text x="540" y="571" font-family="Arial" font-size="9" fill="#333">GNF: A → aα (terminal first)</text>
  </g>
</svg>