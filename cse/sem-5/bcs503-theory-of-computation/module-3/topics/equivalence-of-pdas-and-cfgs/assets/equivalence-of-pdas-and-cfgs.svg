<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The fundamental equivalence theorem for formal languages states that a language is context-free if and only if some pushdown automaton accepts or recognizes it completely.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Equivalence of Pushdown Automata and Context-Free Grammars</text>
  </g>
  
  <g class="step" id="step1" data-narration="CFG to PDA uses three transition types: initialize by pushing start symbol, apply productions to replace nonterminals, and match terminals.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <rect x="20" y="58" width="760" height="22" fill="#388e3c" rx="5"/>
    <text x="30" y="74" font-family="Arial" font-size="12" font-weight="bold" fill="white">CFG to PDA Construction</text>
    <text x="30" y="95" font-family="Arial" font-size="10" fill="#2e7d32">δ(q,ε,Z₀) = {(p,S)}</text>
    <text x="30" y="110" font-family="Arial" font-size="10" fill="#2e7d32">δ(p,ε,A) = {(p,α) | A→α∈P}</text>
    <text x="30" y="125" font-family="Arial" font-size="10" fill="#2e7d32">δ(p,a,a) = {(p,ε)}</text>
  </g>
  
  <g class="step" id="step2" data-narration="PDA to CFG creates variables [pXq] meaning from state p with X on stack, reach state q. Productions derive from each transition.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="5"/>
    <rect x="20" y="146" width="760" height="22" fill="#ff9800" rx="5"/>
    <text x="30" y="162" font-family="Arial" font-size="12" font-weight="bold" fill="white">PDA to CFG Construction</text>
    <text x="30" y="183" font-family="Arial" font-size="10" fill="#e65100">Variables: [pXq] for states p,q∈Q and stack symbol X∈Γ</text>
    <text x="30" y="198" font-family="Arial" font-size="10" fill="#e65100">For δ(q,a,X)={(r,Y₁...Yₖ)}: add productions with [qXr]→a[rY₁s]...</text>
    <text x="30" y="213" font-family="Arial" font-size="10" fill="#e65100">Start: S → [q₀Z₀q] for each final state q∈F</text>
  </g>
  
  <g class="step" id="step3" data-narration="PDAs accept by final state or empty stack. Both modes are equivalent: languages accepted by empty stack equal languages accepted by final state.">
    <rect x="20" y="234" width="760" height="80" fill="#ffebee" rx="5"/>
    <rect x="20" y="234" width="760" height="22" fill="#f44336" rx="5"/>
    <text x="30" y="250" font-family="Arial" font-size="12" font-weight="bold" fill="white">PDA Acceptance Modes</text>
    <rect x="40" y="265" width="220" height="45" fill="white" stroke="#ef9a9a" rx="3"/>
    <text x="50" y="280" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Accept by Final State</text>
    <text x="50" y="295" font-family="Arial" font-size="9" fill="#d32f2f">Reach designated final state</text>
    <text x="50" y="305" font-family="Arial" font-size="9" fill="#d32f2f">after consuming input</text>
    <rect x="270" y="265" width="220" height="45" fill="white" stroke="#ef9a9a" rx="3"/>
    <text x="280" y="280" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Accept by Empty Stack</text>
    <text x="280" y="295" font-family="Arial" font-size="9" fill="#d32f2f">Stack becomes empty</text>
    <text x="280" y="305" font-family="Arial" font-size="9" fill="#d32f2f">after consuming input</text>
    <text x="520" y="290" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Both modes are equivalent!</text>
  </g>
  
  <g class="step" id="step4" data-narration="Example shows CFG S→aSb|ε converting to PDA. The trace demonstrates initialization, production application, terminal matching, and successful acceptance for input aabb.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <rect x="20" y="322" width="760" height="22" fill="#9c27b0" rx="5"/>
    <text x="30" y="338" font-family="Arial" font-size="12" font-weight="bold" fill="white">Example: CFG S→aSb|ε to PDA</text>
    <text x="30" y="360" font-family="Arial" font-size="10" fill="#6a1b9a">CFG: S→aSb | ε</text>
    <text x="30" y="375" font-family="Arial" font-size="10" fill="#6a1b9a">PDA: Q={q,p,f}, Start=S, Z₀</text>
    <text x="30" y="390" font-family="Arial" font-size="9" fill="#7b1fa2">Transitions: δ(q,ε,Z₀)={(p,S)}, δ(p,ε,S)={(p,aSb),(p,ε)}, δ(p,a,a)={(p,ε)}, δ(p,b,b)={(p,ε)}</text>
  </g>
  
  <g class="step" id="step5" data-narration="The execution trace for input aabb shows four key steps: start at initial state q, push start symbol S onto stack, apply production S→aSb repeatedly, then pop terminals matching input until stack empties and PDA accepts.">
    <rect x="20" y="410" width="760" height="102" fill="#e3f2fd" rx="5"/>
    <rect x="20" y="410" width="760" height="22" fill="#1976d2" rx="5"/>
    <text x="30" y="426" font-family="Arial" font-size="12" font-weight="bold" fill="white">Execution Trace for "aabb"</text>
    <line x1="40" y1="448" x2="740" y2="448" stroke="#90caf9" stroke-width="1" stroke-dasharray="4"/>
    <text x="50" y="445" font-family="Arial" font-size="9" fill="#1565c0">Step</text>
    <text x="90" y="445" font-family="Arial" font-size="9" fill="#1565c0">State</text>
    <text x="180" y="445" font-family="Arial" font-size="9" fill="#1565c0">Input</text>
    <text x="350" y="445" font-family="Arial" font-size="9" fill="#1565c0">Stack</text>
    <text x="600" y="445" font-family="Arial" font-size="9" fill="#1565c0">Action</text>
    <text x="50" y="462" font-family="Arial" font-size="8" fill="#1565c0">1</text>
    <text x="90" y="462" font-family="Arial" font-size="8" fill="#1565c0">q</text>
    <text x="180" y="462" font-family="Arial" font-size="8" fill="#1565c0">aabb</text>
    <text x="350" y="462" font-family="Arial" font-size="8" fill="#1565c0">Z₀</text>
    <text x="600" y="462" font-family="Arial" font-size="8" fill="#1565c0">Init</text>
    <text x="50" y="477" font-family="Arial" font-size="8" fill="#1565c0">2</text>
    <text x="90" y="477" font-family="Arial" font-size="8" fill="#1565c0">p</text>
    <text x="180" y="477" font-family="Arial" font-size="8" fill="#1565c0">aabb</text>
    <text x="350" y="477" font-family="Arial" font-size="8" fill="#1565c0">SZ₀</text>
    <text x="600" y="477" font-family="Arial" font-size="8" fill="#1565c0">Push S</text>
    <text x="50" y="492" font-family="Arial" font-size="8" fill="#1565c0">3</text>
    <text x="90" y="492" font-family="Arial" font-size="8" fill="#1565c0">p</text>
    <text x="180" y="492" font-family="Arial" font-size="8" fill="#1565c0">aabb</text>
    <text x="350" y="492" font-family="Arial" font-size="8" fill="#1565c0">aSbZ₀</text>
    <text x="600" y="492" font-family="Arial" font-size="8" fill="#1565c0">S→aSb</text>
    <text x="50" y="505" font-family="Arial" font-size="8" fill="#1565c0">4</text>
    <text x="90" y="505" font-family="Arial" font-size="8" fill="#1565c0">p</text>
    <text x="180" y="505" font-family="Arial" font-size="8" fill="#1565c0">abb</text>
    <text x="350" y="505" font-family="Arial" font-size="8" fill="#1565c0">bZ₀</text>
    <text x="600" y="505" font-family="Arial" font-size="8" fill="#1565c0">Pop a</text>
  </g>
  
  <g class="step" id="step6" data-narration="The Knuth-Thompson theorem establishes that deterministic PDAs correspond exactly to LR(k) grammars. This fundamental connection is vital and widely used in parser generation tools like YACC and Bison.">
    <rect x="20" y="520" width="760" height="75" fill="#e8f5e9" rx="5"/>
    <rect x="20" y="520" width="760" height="22" fill="#388e3c" rx="5"/>
    <text x="30" y="536" font-family="Arial" font-size="12" font-weight="bold" fill="white">Deterministic PDA and LR(k) Grammars</text>
    <rect x="40" y="550" width="340" height="35" fill="white" stroke="#81c784" rx="3"/>
    <text x="50" y="565" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Knuth-Thompson Theorem</text>
    <text x="50" y="580" font-family="Arial" font-size="9" fill="#388e3c">Grammar is LR(k) ⇔ PDA is deterministic</text>
    <rect x="420" y="550" width="340" height="35" fill="white" stroke="#81c784" rx="3"/>
    <text x="430" y="565" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Key Takeaway</text>
    <text x="430" y="580" font-family="Arial" font-size="9" fill="#388e3c">CFGs ↔ PDAs equivalence bridges both</text>
  </g>
</svg>