<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Introduction to Routing Algorithms - essential for understanding how data packets find optimal paths across complex networks in the internet era.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Introduction to Routing Algorithms</text>
  </g>
  
  <g class="step" id="step1" data-narration="Routing determines optimal paths network-wide using complex algorithms. Forwarding is the local router operation of efficiently moving packets between interfaces.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="25" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Routing vs Forwarding</text>
    <rect x="25" y="88" width="340" height="42" rx="3" fill="#c8e6c9"/>
    <text x="35" y="105" font-family="Arial" font-size="10" fill="#2e7d32"><tspan x="35" dy="0">• Routing: Global network-wide process</tspan><tspan x="35" dy="14">• Determines optimal path using algorithms</tspan><tspan x="35" dy="14">• Builds routing tables across network</tspan></text>
    <rect x="380" y="88" width="340" height="42" rx="3" fill="#c8e6c9"/>
    <text x="390" y="105" font-family="Arial" font-size="10" fill="#2e7d32"><tspan x="390" dy="0">• Forwarding: Local per-router operation</tspan><tspan x="390" dy="14">• Moves packets from input to output</tspan><tspan x="390" dy="14">• Uses routing table for decisions</tspan></text>
  </g>
  
  <g class="step" id="step2" data-narration="Routing algorithms classify into static (manual, fixed routes) versus dynamic (auto-adjusts to network changes), and centralized versus distributed decision-making in complex networks.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="25" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Classification of Routing Algorithms</text>
    <rect x="25" y="176" width="180" height="42" rx="3" fill="#ffe0b2"/>
    <text x="35" y="190" font-family="Arial" font-size="9" fill="#e65100"><tspan x="35" dy="0">Based on Adaptation:</tspan><tspan x="35" dy="12">• Static (manual config)</tspan><tspan x="35" dy="12">• Dynamic (auto-adjust)</tspan></text>
    <rect x="215" y="176" width="180" height="42" rx="3" fill="#ffe0b2"/>
    <text x="225" y="190" font-family="Arial" font-size="9" fill="#e65100"><tspan x="225" dy="0">Based on Decision Location:</tspan><tspan x="225" dy="12">• Centralized (single controller)</tspan><tspan x="225" dy="12">• Distributed (per-router)</tspan></text>
    <rect x="405" y="176" width="180" height="42" rx="3" fill="#ffe0b2"/>
    <text x="415" y="190" font-family="Arial" font-size="9" fill="#e65100"><tspan x="415" dy="0">Examples:</tspan><tspan x="415" dy="12">• RIP, OSPF, EIGRP</tspan><tspan x="415" dy="12">• BGP, IS-IS</tspan></text>
  </g>
  
  <g class="step" id="step3" data-narration="Dijkstra's algorithm finds shortest paths network-wide by initializing source distance to zero, then progressively selecting unvisited vertices with minimum distance.">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="25" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Dijkstra's Shortest Path Algorithm</text>
    <rect x="25" y="264" width="530" height="42" rx="3" fill="#e1bee7"/>
    <text x="35" y="278" font-family="Arial" font-size="9" fill="#6a1b9a"><tspan x="35" dy="0">Algorithm Steps: 1) Initialize source=0, others=∞ 2) Select minimum distance vertex 3) Update neighbors' distances 4) Mark visited, repeat until complete</tspan><tspan x="35" dy="14">Time: O(V²) simple, O(E+VlogV) with priority queue</tspan></text>
    <rect x="565" y="264" width="180" height="42" rx="3" fill="#e1bee7"/>
    <text x="575" y="276" font-family="Arial" font-size="9" fill="#6a1b9a"><tspan x="575" dy="0">Bellman-Ford Equation:</tspan><tspan x="575" dy="14" font-weight="bold">D(x,y) = min{c(x,v) + D(v,y)}</tspan></text>
  </g>
  
  <g class="step" id="step4" data-narration="Distance Vector routing uses routers exchanging tables with neighbors, tracking best distance and next hop to each destination. RIP is a classic example.">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="25" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Distance Vector Routing</text>
    <rect x="25" y="352" width="240" height="42" rx="3" fill="#bbdefb"/>
    <text x="35" y="366" font-family="Arial" font-size="9" fill="#0d47a1"><tspan x="35" dy="0">Key Characteristics:</tspan><tspan x="35" dy="12">• Exchange full tables with neighbors</tspan><tspan x="35" dy="12">• Periodic or triggered updates</tspan><tspan x="35" dy="12">• Subject to count-to-infinity</tspan></text>
    <rect x="275" y="352" width="240" height="42" rx="3" fill="#bbdefb"/>
    <text x="285" y="366" font-family="Arial" font-size="9" fill="#0d47a1"><tspan x="285" dy="0">Example Protocol:</tspan><tspan x="285" dy="12">• RIP (Routing Information Protocol)</tspan><tspan x="285" dy="12">• Uses hop count as metric</tspan><tspan x="285" dy="12">• Max 15 hops</tspan></text>
    <rect x="525" y="352" width="240" height="42" rx="3" fill="#bbdefb"/>
    <text x="535" y="366" font-family="Arial" font-size="9" fill="#0d47a1"><tspan x="535" dy="0">Advantage:</tspan><tspan x="535" dy="12">• Simple to implement</tspan><tspan x="535" dy="12">• Low CPU/memory overhead</tspan><tspan x="535" dy="12">• Fast convergence on small networks</tspan></text>
  </g>
  
  <g class="step" id="step5" data-narration="Link State routing maintains complete network topology at each router, flooding neighbor information. OSPF is the major example with faster convergence.">
    <rect x="10" y="410" width="780" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="25" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Link State Routing</text>
    <rect x="25" y="440" width="240" height="42" rx="3" fill="#ffcdd2"/>
    <text x="35" y="454" font-family="Arial" font-size="9" fill="#b71c1c"><tspan x="35" dy="0">Operations:</tspan><tspan x="35" dy="12">1) Hello packets discover neighbors</tspan><tspan x="35" dy="12">2) Flood link state packets</tspan><tspan x="35" dy="12">3) Dijkstra computes shortest paths</tspan></text>
    <rect x="275" y="440" width="240" height="42" rx="3" fill="#ffcdd2"/>
    <text x="285" y="454" font-family="Arial" font-size="9" fill="#b71c1c"><tspan x="285" dy="0">Example Protocol:</tspan><tspan x="285" dy="12">• OSPF (Open Shortest Path First)</tspan><tspan x="285" dy="12">• IS-IS protocol</tspan><tspan x="285" dy="12">• Uses bandwidth as metric</tspan></text>
    <rect x="525" y="440" width="240" height="42" rx="3" fill="#ffcdd2"/>
    <text x="535" y="454" font-family="Arial" font-size="9" fill="#b71c1c"><tspan x="535" dy="0">Advantages:</tspan><tspan x="535" dy="12">• Faster convergence than DV</tspan><tspan x="535" dy="12">• Complete network topology view</tspan><tspan x="535" dy="12">• No count-to-infinity problem</tspan></text>
  </g>
  
  <g class="step" id="step6" data-narration="Path Vector routing maintains complete paths enabling policy-based routing. BGP is the internet's backbone protocol. Hierarchical routing organizes networks into areas to reduce complexity.">
    <rect x="10" y="498" width="780" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="25" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Path Vector &amp; Hierarchical Routing</text>
    <rect x="25" y="528" width="240" height="52" rx="3" fill="#ffe0b2"/>
    <text x="35" y="542" font-family="Arial" font-size="9" fill="#e65100"><tspan x="35" dy="0">Path Vector (e.g., BGP):</tspan><tspan x="35" dy="12">• Maintains complete path to destination</tspan><tspan x="35" dy="12">• Prevents routing loops</tspan><tspan x="35" dy="12">• Supports routing policies</tspan></text>
    <rect x="275" y="528" width="240" height="52" rx="3" fill="#ffe0b2"/>
    <text x="285" y="542" font-family="Arial" font-size="9" fill="#e65100"><tspan x="285" dy="0">Routing Metrics:</tspan><tspan x="285" dy="12">• Hop Count, Bandwidth, Delay</tspan><tspan x="285" dy="12">• Load, Reliability, Cost</tspan><tspan x="285" dy="12">• Different protocols use different metrics</tspan></text>
    <rect x="525" y="528" width="240" height="52" rx="3" fill="#ffe0b2"/>
    <text x="535" y="542" font-family="Arial" font-size="9" fill="#e65100"><tspan x="535" dy="0">Hierarchical Routing:</tspan><tspan x="535" dy="12">• Organizes routers into areas</tspan><tspan x="535" dy="12">• Reduces routing table size</tspan><tspan x="535" dy="12">• Limits update traffic in large networks</tspan></text>
  </g>
</svg>