<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="IPv6 is the latest Internet Protocol version with 128-bit addressing that solves the address exhaustion problem of IPv4, offering improved security and efficiency.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">IPv6 Datagram: Header Structure &amp; Extension Headers</text>
  </g>

  <g class="step" id="step1" data-narration="The IPv6 base header contains exactly 8 fields with a fixed 40-byte size. Version uses 4 bits, Traffic Class handles QoS, and Flow Label enables packet flow identification.">
    <rect x="10" y="58" width="780" height="85" fill="#fff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="30" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">IPv6 Base Header (40 bytes)</text>
    <rect x="30" y="88" width="740" height="45" fill="#e3f2fd" rx="3"/>
    <text x="40" y="102" font-family="Courier" font-size="9" fill="#333">Version(4)</text>
    <text x="80" y="102" font-family="Courier" font-size="9" fill="#333">Traffic(8)</text>
    <text x="130" y="102" font-family="Courier" font-size="9" fill="#333">Flow Label(20)</text>
    <text x="200" y="102" font-family="Courier" font-size="9" fill="#333">Payload Len(16)</text>
    <text x="280" y="102" font-family="Courier" font-size="9" fill="#333">NextHdr(8)</text>
    <text x="345" y="102" font-family="Courier" font-size="9" fill="#333">HopLimit(8)</text>
    <text x="410" y="102" font-family="Courier" font-size="9" fill="#333">Source Address(128)</text>
    <text x="520" y="118" font-family="Courier" font-size="9" fill="#333">Destination Address(128)</text>
  </g>

  <g class="step" id="step2" data-narration="IPv6 introduces optional extension headers placed between the base header and transport layer data, enabling routing, fragmentation, authentication, encryption, and destination options processing.">
    <rect x="10" y="151" width="780" height="85" fill="#fff" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="30" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">IPv6 Extension Headers</text>
    <rect x="30" y="185" width="115" height="42" fill="#e8f5e9" rx="3"/>
    <text x="38" y="198" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Hop-by-Hop</text>
    <text x="38" y="212" font-family="Arial" font-size="7" fill="#333">Router Alert,</text>
    <text x="38" y="222" font-family="Arial" font-size="7" fill="#333">Jumbo Payload</text>
    <rect x="155" y="185" width="115" height="42" fill="#e8f5e9" rx="3"/>
    <text x="163" y="198" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Destination Options</text>
    <text x="163" y="212" font-family="Arial" font-size="7" fill="#333">Mobile IPv6,</text>
    <text x="163" y="222" font-family="Arial" font-size="7" fill="#333">Home Address</text>
    <rect x="280" y="185" width="115" height="42" fill="#e8f5e9" rx="3"/>
    <text x="288" y="198" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Routing</text>
    <text x="288" y="212" font-family="Arial" font-size="7" fill="#333">Source Routing,</text>
    <text x="288" y="222" font-family="Arial" font-size="7" fill="#333">Path Control</text>
    <rect x="405" y="185" width="115" height="42" fill="#e8f5e9" rx="3"/>
    <text x="413" y="198" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Fragment</text>
    <text x="413" y="212" font-family="Arial" font-size="7" fill="#333">Packet Fragmentation</text>
    <text x="413" y="222" font-family="Arial" font-size="7" fill="#333">Reassembly</text>
    <rect x="530" y="185" width="115" height="42" fill="#e8f5e9" rx="3"/>
    <text x="538" y="198" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Authentication</text>
    <text x="538" y="212" font-family="Arial" font-size="7" fill="#333">Data Integrity,</text>
    <text x="538" y="222" font-family="Arial" font-size="7" fill="#333">Authentication</text>
    <rect x="655" y="185" width="115" height="42" fill="#e8f5e9" rx="3"/>
    <text x="663" y="198" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">ESP</text>
    <text x="663" y="212" font-family="Arial" font-size="7" fill="#333">Encryption,</text>
    <text x="663" y="222" font-family="Arial" font-size="7" fill="#333">Confidentiality</text>
  </g>

  <g class="step" id="step3" data-narration="Extension headers must be processed sequentially by routers: Hop-by-Hop first, then Destination Options, Routing, Fragment, Authentication Header, ESP, and final Destination Options before the payload.">
    <rect x="10" y="244" width="780" height="85" fill="#fff" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="30" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Extension Header Processing Order (RFC 2460)</text>
    <rect x="30" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="62" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">IPv6</text>
    <text x="62" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Base</text>
    <path d="M95,300 L110,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="115" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="147" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Hop-by-Hop</text>
    <text x="147" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">(0)</text>
    <path d="M180,300 L195,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="200" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="232" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Dest Opts</text>
    <text x="232" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">(60)</text>
    <path d="M265,300 L280,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="285" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="317" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Routing</text>
    <text x="317" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">(43)</text>
    <path d="M350,300 L365,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="370" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="402" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Fragment</text>
    <text x="402" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">(44)</text>
    <path d="M435,300 L450,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="455" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="487" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">AH</text>
    <text x="487" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">(51)</text>
    <path d="M520,300 L535,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="540" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="572" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">ESP</text>
    <text x="572" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">(50)</text>
    <path d="M605,300 L620,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="625" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="657" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Dest Opts</text>
    <text x="657" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">(60)</text>
    <path d="M690,300 L705,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="710" y="280" width="65" height="40" fill="#fff3e0" rx="3"/>
    <text x="742" y="295" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">TCP/UDP</text>
    <text x="742" y="308" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">(6/17)</text>
  </g>

  <g class="step" id="step4" data-narration="IPv6 addresses are 128 bits represented as 8 groups of 4 hexadecimal digits. Leading zeros can be removed, and one double colon represents consecutive zero groups for compression.">
    <rect x="10" y="337" width="780" height="70" fill="#fff" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="30" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">IPv6 Address Representation &amp; Compression</text>
    <rect x="30" y="370" width="350" height="30" fill="#f3e5f5" rx="3"/>
    <text x="40" y="385" font-family="Courier" font-size="9" fill="#333">Full: 2001:0db8:0000:0000:0000:0000:1428:57ab</text>
    <text x="40" y="396" font-family="Courier" font-size="9" fill="#333">Step1: 2001:db8:0:0:0:0:1428:57ab</text>
    <rect x="390" y="370" width="380" height="30" fill="#e1bee7" rx="3"/>
    <text x="400" y="385" font-family="Courier" font-size="10" font-weight="bold" fill="#7b1fa2">Compressed: 2001:db8::1428:57ab</text>
    <text x="400" y="396" font-family="Arial" font-size="8" fill="#333">(Remove leading zeros, use :: for zeros)</text>
  </g>

  <g class="step" id="step5" data-narration="IPv6 improves upon IPv4 with a larger 128-bit address space, simplified 8-field header, mandatory IPsec security, and Flow Label for Quality of Service management in networks.">
    <rect x="10" y="415" width="780" height="70" fill="#fff" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="30" y="435" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">IPv6 vs IPv4: Key Improvements</text>
    <rect x="30" y="448" width="235" height="32" fill="#ffebee" rx="3"/>
    <text x="40" y="462" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">IPv4: 32-bit, 12+ fields, optional IPsec</text>
    <rect x="275" y="448" width="235" height="32" fill="#ffebee" rx="3"/>
    <text x="285" y="462" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">IPv6: 128-bit, 8 fields, mandatory IPsec</text>
    <rect x="520" y="448" width="250" height="32" fill="#ffebee" rx="3"/>
    <text x="530" y="462" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Flow Label for QoS, Auto-configuration</text>
  </g>

  <g class="step" id="step6" data-narration="Common Next Header values include TCP (6), UDP (17), ICMPv6 (58), Fragment (44), AH (51), and ESP (50). IPv6 supports payloads up to 65,535 bytes with minimum MTU of 1280 bytes.">
    <rect x="10" y="493" width="780" height="95" fill="#fff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="30" y="513" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Points: Next Headers &amp; Payload Limits</text>
    <rect x="30" y="525" width="170" height="55" fill="#e3f2fd" rx="3"/>
    <text x="40" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Next Header Values</text>
    <text x="40" y="555" font-family="Courier" font-size="8" fill="#333">6=TCP 17=UDP 58=ICMPv6</text>
    <text x="40" y="567" font-family="Courier" font-size="8" fill="#333">50=ESP 51=AH 44=Fragment</text>
    <rect x="210" y="525" width="170" height="55" fill="#e3f2fd" rx="3"/>
    <text x="220" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Payload Limits</text>
    <text x="220" y="555" font-family="Arial" font-size="8" fill="#333">Max payload: 65,535 bytes</text>
    <text x="220" y="567" font-family="Arial" font-size="8" fill="#333">Jumbo for larger packets</text>
    <rect x="390" y="525" width="170" height="55" fill="#e3f2fd" rx="3"/>
    <text x="400" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Hop Limit</text>
    <text x="400" y="555" font-family="Arial" font-size="8" fill="#333">Replaces IPv4 TTL field</text>
    <text x="400" y="567" font-family="Arial" font-size="8" fill="#333">Decremented by each router</text>
    <rect x="570" y="525" width="200" height="55" fill="#e3f2fd" rx="3"/>
    <text x="580" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Minimum MTU</text>
    <text x="580" y="555" font-family="Arial" font-size="8" fill="#333">IPv6 min MTU: 1280 bytes</text>
    <text x="580" y="567" font-family="Arial" font-size="8" fill="#333">Path MTU discovery required</text>
  </g>
</svg>