<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Packet switching is a fundamental networking method where digital data breaks into small independent chunks called packets that travel separately across interconnected networks.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Packet Switching</text>
  </g>
  
  <!-- step1: What is Packet Switching -->
  <g class="step" id="step1" data-narration="Unlike circuit switching, packet switching shares network resources dynamically and efficiently. Each individual packet finds and follows its own optimal path through routers independently.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Packet Switching?</text>
    <rect x="40" y="88" width="340" height="40" fill="#e3f2fd" rx="3"/>
    <text x="50" y="105" font-family="Arial" font-size="10" fill="#333">Breaks data into small packets</text>
    <text x="50" y="118" font-family="Arial" font-size="10" fill="#333">Each packet routed independently</text>
    <rect x="400" y="88" width="340" height="40" fill="#fff3e0" rx="3"/>
    <text x="410" y="105" font-family="Arial" font-size="10" fill="#333">No dedicated path needed</text>
    <text x="410" y="118" font-family="Arial" font-size="10" fill="#333">Resources shared dynamically</text>
  </g>
  
  <!-- step2: Packet Structure -->
  <g class="step" id="step2" data-narration="Each packet has a header with source/destination addresses, sequence numbers for reassembly, TTL to prevent infinite loops, and checksum for error detection.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Packet Structure</text>
    <rect x="40" y="176" width="150" height="40" fill="#f3e5f5" rx="3"/>
    <text x="50" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">HEADER</text>
    <text x="50" y="203" font-family="Arial" font-size="8" fill="#333">Src IP, Dest IP</text>
    <text x="50" y="212" font-family="Arial" font-size="8" fill="#333">Seq #, TTL, Checksum</text>
    <rect x="200" y="176" width="340" height="40" fill="#e8f5e9" rx="3"/>
    <text x="210" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">PAYLOAD (DATA)</text>
    <text x="210" y="205" font-family="Arial" font-size="9" fill="#333">Actual application data being transmitted</text>
    <rect x="550" y="176" width="200" height="40" fill="#ffebee" rx="3"/>
    <text x="560" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">TRAILER (Optional)</text>
    <text x="560" y="205" font-family="Arial" font-size="9" fill="#333">Error detection bits</text>
  </g>
  
  <!-- step3: Store-and-Forward -->
  <g class="step" id="step3" data-narration="The store-and-forward mechanism ensures each router receives, stores, checks for errors, then forwards packets to the next node along their path.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Store-and-Forward Mechanism</text>
    <rect x="40" y="265" width="100" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="90" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Sender</text>
    <line x1="140" y1="287" x2="190" y2="287" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="200" y="265" width="100" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="250" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Router 1</text>
    <text x="250" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Store → Check → Forward</text>
    <line x1="300" y1="287" x2="350" y2="287" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="360" y="265" width="100" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="410" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Router 2</text>
    <text x="410" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Store → Check → Forward</text>
    <line x1="460" y1="287" x2="510" y2="287" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="520" y="265" width="100" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="570" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Receiver</text>
    <text x="570" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Reassemble packets</text>
  </g>
  
  <!-- step4: Datagram vs Virtual Circuit -->
  <g class="step" id="step4" data-narration="Datagram packet switching is connectionless where each packet has full address info and may take different paths. Virtual circuit establishes a logical path first.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Types of Packet Switching</text>
    <rect x="40" y="355" width="345" height="40" fill="#e3f2fd" rx="3"/>
    <text x="50" y="368" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Datagram (Connectionless)</text>
    <text x="50" y="382" font-family="Arial" font-size="9" fill="#333">Each packet independent • IP Internet • May arrive out of order</text>
    <rect x="400" y="355" width="345" height="40" fill="#f3e5f5" rx="3"/>
    <text x="410" y="368" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Virtual Circuit (Connection-Oriented)</text>
    <text x="410" y="382" font-family="Arial" font-size="9" fill="#333">Logical path first • Frame Relay/ATM • Guaranteed order</text>
  </g>
  
  <!-- step5: Packet vs Circuit Switching -->
  <g class="step" id="step5" data-narration="Packet switching offers dynamic resource sharing with higher efficiency for bursty traffic, while circuit switching reserves dedicated paths with fixed delays.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Packet Switching vs Circuit Switching</text>
    <rect x="40" y="442" width="230" height="40" fill="#e3f2fd" rx="3"/>
    <text x="50" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Packet Switching</text>
    <text x="50" y="467" font-family="Arial" font-size="8" fill="#333">No dedicated path • Dynamic sharing</text>
    <text x="50" y="477" font-family="Arial" font-size="8" fill="#333">Variable delay • Higher efficiency</text>
    <rect x="280" y="442" width="230" height="40" fill="#ffebee" rx="3"/>
    <text x="290" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Circuit Switching</text>
    <text x="290" y="467" font-family="Arial" font-size="8" fill="#333">Dedicated path • Reserved resources</text>
    <text x="290" y="477" font-family="Arial" font-size="8" fill="#333">Fixed delay • Lower efficiency</text>
    <rect x="520" y="442" width="230" height="40" fill="#e8f5e9" rx="3"/>
    <text x="530" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Why Packet Switching Wins?</text>
    <text x="530" y="467" font-family="Arial" font-size="8" fill="#333">Handles bursty traffic • Resilient to failures</text>
    <text x="530" y="477" font-family="Arial" font-size="8" fill="#333">Scalable • Cost-effective</text>
  </g>
  
  <!-- step6: Delay Calculation Example -->
  <g class="step" id="step6" data-narration="For a 1000-byte packet across 3 links with 1 Mbps bandwidth and 10ms propagation: total delay equals 58 milliseconds including transmission, propagation, and processing delays.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example: End-to-End Delay Calculation</text>
    <rect x="40" y="530" width="720" height="50" fill="#fff3e0" rx="3"/>
    <text x="50" y="545" font-family="Arial" font-size="9" fill="#333">Given: Packet = 1000 bytes (8000 bits), 3 links, 1 Mbps bandwidth,</text>
    <text x="50" y="558" font-family="Arial" font-size="9" fill="#333">10ms propagation per link, 2ms processing per router</text>
    <text x="50" y="572" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Solution: (3 × 8ms) + 30ms + 4ms = <tspan font-weight="bold">58 ms</tspan></text>
    <text x="400" y="572" font-family="Arial" font-size="9" fill="#333">Transmission: 24ms | Propagation: 30ms | Processing: 4ms</text>
  </g>
</svg>