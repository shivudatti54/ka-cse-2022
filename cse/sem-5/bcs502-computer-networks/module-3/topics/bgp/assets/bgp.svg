<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="BGP is the exterior gateway protocol powering the Internet, routing traffic between autonomous systems using TCP port 179 reliably and globally.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Border Gateway Protocol (BGP)</text>
  </g>
  
  <!-- step1: Introduction & AS Concepts -->
  <g class="step" id="step1" data-narration="An Autonomous System is a collection of networks under one administration with a unique ASN, ranging from 1-64511 public or 64512-65535 private.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="75" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">Autonomous System (AS)</text>
    <rect x="20" y="85" width="120" height="45" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="80" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Public ASN</text>
    <text x="80" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">1 - 64511</text>
    <rect x="150" y="85" width="120" height="45" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="210" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Private ASN</text>
    <text x="210" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">64512 - 65535</text>
    <text x="290" y="75" font-family="Arial" font-size="11" fill="#333">eBGP: Between different AS</text>
    <text x="290" y="90" font-family="Arial" font-size="10" fill="#666">TTL=1, changes next-hop</text>
    <text x="480" y="75" font-family="Arial" font-size="11" fill="#333">iBGP: Within same AS</text>
    <text x="480" y="90" font-family="Arial" font-size="10" fill="#666">Preserves next-hop</text>
    <text x="650" y="75" font-family="Arial" font-size="11" fill="#333">Operates over TCP 179</text>
    <text x="650" y="90" font-family="Arial" font-size="10" fill="#666">Path vector algorithm</text>
  </g>
  
  <!-- step2: BGP Message Types -->
  <g class="step" id="step2" data-narration="BGP uses four messages: OPEN establishes sessions, KEEPALIVE maintains them, UPDATE advertises or withdraws routes, and NOTIFICATION reports errors on the protocol.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="20" y="163" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">BGP Message Types</text>
    <rect x="20" y="175" width="180" height="45" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="110" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">OPEN</text>
    <text x="110" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Establishes session, sends AS#, hold time</text>
    <rect x="210" y="175" width="180" height="45" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="300" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">KEEPALIVE</text>
    <text x="300" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Maintains session every 60 seconds</text>
    <rect x="400" y="175" width="180" height="45" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="490" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">UPDATE</text>
    <text x="490" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Advertises or withdraws routes</text>
    <rect x="590" y="175" width="180" height="45" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="680" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">NOTIFICATION</text>
    <text x="680" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Reports errors, closes session</text>
  </g>
  
  <!-- step3: BGP Path Attributes -->
  <g class="step" id="step3" data-narration="BGP attributes include AS_Path for loop prevention, Local Preference for outbound routing, MED for inbound traffic, and Origin indicating route source.">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="20" y="251" font-family="Arial" font-size="12" fill="#ff9800" font-weight="bold">BGP Path Attributes</text>
    <rect x="20" y="263" width="145" height="45" rx="3" fill="#fff" stroke="#ff9800"/>
    <text x="92" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">AS_Path</text>
    <text x="92" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Loop prevention, shortest preferred</text>
    <rect x="175" y="263" width="145" height="45" rx="3" fill="#fff" stroke="#ff9800"/>
    <text x="248" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">Local Preference</text>
    <text x="248" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Outbound traffic, default 100</text>
    <rect x="330" y="263" width="145" height="45" rx="3" fill="#fff" stroke="#ff9800"/>
    <text x="402" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">MED</text>
    <text x="402" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Inbound traffic, lower preferred</text>
    <rect x="485" y="263" width="145" height="45" rx="3" fill="#fff" stroke="#ff9800"/>
    <text x="558" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">Origin</text>
    <text x="558" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">IGP &gt; EGP &gt; Incomplete</text>
    <rect x="640" y="263" width="140" height="45" rx="3" fill="#fff" stroke="#ff9800"/>
    <text x="710" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">Next Hop</text>
    <text x="710" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Next router IP address</text>
  </g>
  
  <!-- step4: BGP Route Selection -->
  <g class="step" id="step4" data-narration="BGP selects routes by: highest Local Preference, then shortest AS_Path, lowest Origin, lowest MED, preferring eBGP, then lowest IGP metric, finally lowest Router ID.">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="20" y="339" font-family="Arial" font-size="12" fill="#9c27b0" font-weight="bold">BGP Route Selection Process</text>
    <rect x="20" y="352" width="740" height="44" rx="3" fill="#fff" stroke="#9c27b0"/>
    <text x="30" y="367" font-family="Arial" font-size="9" fill="#333">1. Highest Local Preference</text>
    <text x="180" y="367" font-family="Arial" font-size="9" fill="#333">2. Shortest AS_Path</text>
    <text x="310" y="367" font-family="Arial" font-size="9" fill="#333">3. Lowest Origin</text>
    <text x="420" y="367" font-family="Arial" font-size="9" fill="#333">4. Lowest MED</text>
    <text x="510" y="367" font-family="Arial" font-size="9" fill="#333">5. eBGP over iBGP</text>
    <text x="620" y="367" font-family="Arial" font-size="9" fill="#333">6. Lowest IGP metric</text>
    <text x="720" y="367" font-family="Arial" font-size="9" fill="#333">7. Lowest Router ID</text>
    <text x="30" y="385" font-family="Arial" font-size="8" fill="#666">(default 100, higher preferred)</text>
    <text x="180" y="385" font-family="Arial" font-size="8" fill="#666">(fewer AS hops)</text>
    <text x="310" y="385" font-family="Arial" font-size="8" fill="#666">(IGP &lt; EGP &lt; ?)</text>
    <text x="420" y="385" font-family="Arial" font-size="8" fill="#666">(same neighboring AS)</text>
    <text x="510" y="385" font-family="Arial" font-size="8" fill="#666">(path type)</text>
    <text x="620" y="385" font-family="Arial" font-size="8" fill="#666">(to next-hop)</text>
    <text x="720" y="385" font-family="Arial" font-size="8" fill="#666">(final tiebreaker)</text>
  </g>
  
  <!-- step5: BGP States -->
  <g class="step" id="step5" data-narration="BGP states progress from Idle (initializing), Connect (TCP waiting), Active (retrying), OpenSent (waiting for OPEN), OpenConfirm (waiting for KEEPALIVE), to Established (session active).">
    <rect x="10" y="410" width="780" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="20" y="427" font-family="Arial" font-size="12" fill="#f44336" font-weight="bold">BGP State Machine</text>
    <rect x="20" y="440" width="115" height="44" rx="3" fill="#fff" stroke="#f44336"/>
    <text x="77" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336" font-weight="bold">Idle</text>
    <text x="77" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Start, init TCP</text>
    <line x1="135" y1="462" x2="155" y2="462" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="160" y="440" width="115" height="44" rx="3" fill="#fff" stroke="#f44336"/>
    <text x="217" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336" font-weight="bold">Connect</text>
    <text x="217" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">TCP completes</text>
    <line x1="275" y1="462" x2="295" y2="462" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="300" y="440" width="115" height="44" rx="3" fill="#fff" stroke="#f44336"/>
    <text x="357" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336" font-weight="bold">Active</text>
    <text x="357" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Retry TCP</text>
    <line x1="415" y1="462" x2="435" y2="462" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="440" y="440" width="115" height="44" rx="3" fill="#fff" stroke="#f44336"/>
    <text x="497" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336" font-weight="bold">OpenSent</text>
    <text x="497" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Wait OPEN</text>
    <line x1="555" y1="462" x2="575" y2="462" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="580" y="440" width="115" height="44" rx="3" fill="#fff" stroke="#f44336"/>
    <text x="637" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336" font-weight="bold">OpenConfirm</text>
    <text x="637" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Wait KEEPALIVE</text>
    <line x1="695" y1="462" x2="715" y2="462" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="720" y="440" width="60" height="44" rx="3" fill="#4caf50" stroke="#2e7d32"/>
    <text x="750" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Estab.</text>
    <text x="750" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Active!</text>
  </g>
  
  <!-- step6: Traffic Engineering Examples -->
  <g class="step" id="step6" data-narration="Traffic engineering uses Local Preference for outbound path selection (higher value wins) and AS_Path prepending for inbound traffic control by artificially extending path length.">
    <rect x="10" y="498" width="780" height="90" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="515" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">Traffic Engineering Techniques</text>
    <rect x="20" y="528" width="370" height="55" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="205" y="543" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">Local Preference - Outbound Traffic</text>
    <text x="205" y="558" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">set local-preference 200 (primary path)</text>
    <text x="205" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">set local-preference 100 (backup path)</text>
    <rect x="400" y="528" width="380" height="55" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="590" y="543" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">AS_Path Prepending - Inbound Traffic</text>
    <text x="590" y="558" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">set as-path prepend 200 200</text>
    <text x="590" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Makes path appear longer, less preferred</text>
  </g>
</svg>