<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="OSPF is a link-state interior gateway protocol that uses Dijkstra's shortest path first algorithm for optimal path calculation within autonomous systems and networks.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Open Shortest Path First (OSPF) Protocol</text>
  </g>
  
  <g class="step" id="step1" data-narration="OSPF uses hierarchical area design with Area 0 as the backbone. All non-backbone areas must connect to Area 0 through ABRs for route summarization.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="75" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">OSPF Areas &amp; Hierarchical Design</text>
    <rect x="80" y="88" width="120" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="140" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Area 0 (Backbone)</text>
    <rect x="240" y="88" width="100" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="290" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Area 1</text>
    <rect x="380" y="88" width="100" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="430" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Area 2</text>
    <path d="M200,108 L240,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M340,108 L380,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="500" y="100" font-family="Arial" font-size="9" fill="#666">ABR: Connects areas</text>
    <text x="500" y="115" font-family="Arial" font-size="9" fill="#666">Stub: Blocks Type 5 LSA</text>
    <text x="500" y="130" font-family="Arial" font-size="9" fill="#666">NSSA: Limited external</text>
  </g>
  
  <g class="step" id="step2" data-narration="Four router types exist in OSPF: Internal Router (same area), Backbone Router (in Area 0), ABR connects areas, and ASBR connects to external networks for redistribution.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="163" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">OSPF Router Types</text>
    <rect x="80" y="178" width="130" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="145" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Internal Router (IR)</text>
    <text x="145" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">All interfaces in one area</text>
    <rect x="230" y="178" width="130" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="295" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Backbone Router (BR)</text>
    <text x="295" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Interface in Area 0</text>
    <rect x="380" y="178" width="130" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="445" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Area Border Router</text>
    <text x="445" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Connects 2+ OSPF areas</text>
    <rect x="530" y="178" width="130" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="595" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">AS Boundary Router</text>
    <text x="595" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Redistributes external routes</text>
  </g>
  
  <g class="step" id="step3" data-narration="OSPF uses five packet types: Hello discovers neighbors, DBD shares database summary, LSR requests updates, LSU sends updates, and LSAck provides acknowledgments for reliability.">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="251" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">OSPF Packet Types</text>
    <rect x="60" y="265" width="100" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="110" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1. Hello</text>
    <text x="110" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Discover neighbors</text>
    <rect x="175" y="265" width="100" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="225" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2. DBD</text>
    <text x="225" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Database Description</text>
    <rect x="290" y="265" width="100" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="340" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">3. LSR</text>
    <text x="340" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Link-State Request</text>
    <rect x="405" y="265" width="100" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="455" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">4. LSU</text>
    <text x="455" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Link-State Update</text>
    <rect x="520" y="265" width="100" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="570" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">5. LSAck</text>
    <text x="570" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">LSA Acknowledgment</text>
    <path d="M160,285 L175,285" stroke="#1976d2" stroke-width="1" marker-end="url(#arrow)"/>
    <path d="M275,285 L290,285" stroke="#1976d2" stroke-width="1" marker-end="url(#arrow)"/>
    <path d="M390,285 L405,285" stroke="#1976d2" stroke-width="1" marker-end="url(#arrow)"/>
    <path d="M505,285 L520,285" stroke="#1976d2" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="640" y="285" font-family="Arial" font-size="9" fill="#666">Hello: 10s (30s NBMA)</text>
    <text x="640" y="298" font-family="Arial" font-size="9" fill="#666">Dead: 4× Hello timer</text>
  </g>
  
  <g class="step" id="step4" data-narration="Five LSA types describe network elements: Type 1 Router LSA, Type 2 Network LSA from DR, Type 3 Summary, Type 4 ASBR Summary, and Type 5 External routes.">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="339" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">Link-State Advertisement (LSA) Types</text>
    <rect x="40" y="355" width="120" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="100" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Type 1: Router</text>
    <text x="100" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Own interfaces</text>
    <rect x="170" y="355" width="120" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="230" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Type 2: Network</text>
    <text x="230" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">DR for broadcast</text>
    <rect x="300" y="355" width="120" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="360" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Type 3: Summary</text>
    <text x="360" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Inter-area routes</text>
    <rect x="430" y="355" width="120" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="490" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Type 4: ASBR Summary</text>
    <text x="490" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Locates ASBR</text>
    <rect x="560" y="355" width="120" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="620" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Type 5: External</text>
    <text x="620" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">External routes</text>
    <text x="700" y="370" font-family="Arial" font-size="9" fill="#666">Multicast:</text>
    <text x="700" y="383" font-family="Arial" font-size="9" fill="#666">224.0.0.5 (All)</text>
    <text x="700" y="396" font-family="Arial" font-size="9" fill="#666">224.0.0.6 (DR)</text>
  </g>
  
  <g class="step" id="step5" data-narration="OSPF cost equals 100 Mbps reference bandwidth divided by interface bandwidth. Lower cost indicates preferred path. Serial is 64, FastEthernet and GigabitEthernet both equal 1.">
    <rect x="10" y="410" width="780" height="105" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="427" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">OSPF Cost &amp; Adjacency States</text>
    <text x="40" y="448" font-family="Arial" font-size="10" fill="#333">Formula: <tspan font-weight="bold">Cost = Reference Bandwidth (100 Mbps) / Interface Bandwidth</tspan></text>
    <rect x="40" y="456" width="140" height="22" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="110" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">FastEth = 1</text>
    <rect x="190" y="456" width="140" height="22" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="260" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Serial ≈ 64</text>
    <rect x="340" y="456" width="160" height="22" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="420" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">GigabitEth = 1</text>
    <text x="510" y="460" font-family="Arial" font-size="9" fill="#666">Adjacency States:</text>
    <text x="510" y="475" font-family="Arial" font-size="8" fill="#666">Down→Init→2-Way→</text>
    <text x="630" y="475" font-family="Arial" font-size="8" fill="#666">ExStart→Exchange→</text>
    <text x="710" y="475" font-family="Arial" font-size="8" fill="#388e3c">Loading→Full</text>
    <text x="40" y="495" font-family="Arial" font-size="9" fill="#666">DR/BDR Election: Highest OSPF priority (0-255) wins in multi-access networks.</text>
    <text x="40" y="508" font-family="Arial" font-size="9" fill="#666">Router ID: Highest loopback IP or highest interface IP if no loopback exists.</text>
  </g>
</svg>