<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="RIP is a distance-vector routing protocol using hop count as metric, with maximum 15 hops. It operates at Application layer using UDP port 520.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Routing Information Protocol (RIP)</text>
  </g>

  <!-- Step 1: Distance Vector Basics -->
  <g class="step" id="step1" data-narration="Each router maintains a routing table with distance to destinations. Distance is measured in hops. A directly connected network has metric 0.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Distance Vector Fundamentals</text>
    <rect x="70" y="85" width="160" height="45" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="80" y="99" font-family="Arial" font-size="9" fill="#333">Router A Table</text>
    <text x="80" y="113" font-family="Arial" font-size="8" fill="#666">Net1: 0 (direct)</text>
    <text x="80" y="123" font-family="Arial" font-size="8" fill="#666">Net2: 1 via B</text>
    <rect x="240" y="85" width="160" height="45" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="250" y="99" font-family="Arial" font-size="9" fill="#333">Router B Table</text>
    <text x="250" y="113" font-family="Arial" font-size="8" fill="#666">Net1: 1 via A</text>
    <text x="250" y="123" font-family="Arial" font-size="8" fill="#666">Net2: 0 (direct)</text>
    <rect x="410" y="85" width="160" height="45" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="420" y="99" font-family="Arial" font-size="9" fill="#333">Router C Table</text>
    <text x="420" y="113" font-family="Arial" font-size="8" fill="#666">Net2: 1 via B</text>
    <text x="420" y="123" font-family="Arial" font-size="8" fill="#666">Net3: 0 (direct)</text>
    <text x="600" y="100" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Max Hop: 15</text>
    <text x="600" y="115" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">16 = Unreachable</text>
  </g>

  <!-- Step 2: RIP Timers -->
  <g class="step" id="step2" data-narration="RIP uses four timers: Update timer broadcasts every 30 seconds, Invalid timer marks routes down at 180s, Holddown prevents loops at 180s, and Flush removes routes at 240s.">
    <rect x="50" y="146" width="700" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">RIP Timers</text>
    <rect x="70" y="175" width="130" height="42" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="80" y="189" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Update</text>
    <text x="80" y="202" font-family="Arial" font-size="8" fill="#333">30 sec</text>
    <text x="80" y="212" font-family="Arial" font-size="7" fill="#666">Broadcast</text>
    <rect x="210" y="175" width="130" height="42" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="220" y="189" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Invalid</text>
    <text x="220" y="202" font-family="Arial" font-size="8" fill="#333">180 sec</text>
    <text x="220" y="212" font-family="Arial" font-size="7" fill="#666">Mark invalid</text>
    <rect x="350" y="175" width="130" height="42" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="360" y="189" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Holddown</text>
    <text x="360" y="202" font-family="Arial" font-size="8" fill="#333">180 sec</text>
    <text x="360" y="212" font-family="Arial" font-size="7" fill="#666">Loop prevent</text>
    <rect x="490" y="175" width="130" height="42" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="500" y="189" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Flush</text>
    <text x="500" y="202" font-family="Arial" font-size="8" fill="#333">240 sec</text>
    <text x="500" y="212" font-family="Arial" font-size="7" fill="#666">Remove route</text>
    <rect x="640" y="175" width="70" height="42" rx="3" fill="#f44336"/>
    <text x="675" y="198" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">UDP</text>
    <text x="675" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="white">520</text>
  </g>

  <!-- Step 3: Loop Prevention -->
  <g class="step" id="step3" data-narration="RIP prevents loops using Split Horizon and Poison Reverse. Split horizon blocks route advertisements back to the source interface. Poison reverse advertises unreachable routes with metric 16.">
    <rect x="50" y="234" width="700" height="98" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="70" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Loop Prevention Mechanisms</text>
    <rect x="70" y="263" width="250" height="55" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="80" y="277" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Split Horizon</text>
    <text x="80" y="291" font-family="Arial" font-size="8" fill="#333">Don't advertise routes back to</text>
    <text x="80" y="301" font-family="Arial" font-size="8" fill="#333">the interface they were learned from</text>
    <rect x="330" y="263" width="250" height="55" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="340" y="277" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Poison Reverse</text>
    <text x="340" y="291" font-family="Arial" font-size="8" fill="#333">Advertise unreachable with</text>
    <text x="340" y="301" font-family="Arial" font-size="8" fill="#333">metric 16 (infinite)</text>
    <rect x="590" y="263" width="150" height="55" rx="3" fill="#f44336"/>
    <text x="665" y="283" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Count to</text>
    <text x="665" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Infinity: 16</text>
    <text x="70" y="330" font-family="Arial" font-size="8" fill="#666">Example: If A learns NetX from B, A won't advertise NetX back to B</text>
  </g>

  <!-- Step 4: RIPv1 vs RIPv2 -->
  <g class="step" id="step4" data-narration="RIPv1 is classful only with no VLSM support. RIPv2 is classless, supports VLSM, uses multicast 224.0.0.9, and includes authentication. RIPv2 also supports triggered updates.">
    <rect x="50" y="340" width="700" height="100" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="70" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">RIPv1 vs RIPv2 Comparison</text>
    <rect x="70" y="368" width="310" height="60" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">RIPv1</text>
    <text x="80" y="398" font-family="Arial" font-size="8" fill="#333">• Classful only</text>
    <text x="80" y="410" font-family="Arial" font-size="8" fill="#333">• No VLSM support</text>
    <text x="200" y="398" font-family="Arial" font-size="8" fill="#333">• Broadcast</text>
    <text x="200" y="410" font-family="Arial" font-size="8" fill="#333">• No auth</text>
    <rect x="390" y="368" width="310" height="60" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="475" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">RIPv2</text>
    <text x="400" y="398" font-family="Arial" font-size="8" fill="#333">• Classless (VLSM/CIDR)</text>
    <text x="400" y="410" font-family="Arial" font-size="8" fill="#333">• Multicast 224.0.0.9</text>
    <text x="520" y="398" font-family="Arial" font-size="8" fill="#333">• MD5 auth</text>
    <text x="520" y="410" font-family="Arial" font-size="8" fill="#333">• Triggered updates</text>
    <text x="400" y="435" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">AD: 120 | Max hops: 15 | UDP: 520</text>
  </g>

  <!-- Step 5: Route Convergence Example -->
  <g class="step" id="step5" data-narration="When a route fails, RIP marks it with metric 16 (unreachable), enters holddown state, marks invalid after 180s, and flushes the route after 240 seconds.">
    <rect x="50" y="448" width="700" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="70" y="465" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Route Failure &amp; Convergence</text>
    <text x="70" y="482" font-family="Arial" font-size="9" fill="#333">Topology: A → B → C (fails)</text>
    <rect x="200" y="478" width="100" height="35" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="250" y="498" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Router B</text>
    <text x="260" y="496" font-family="Arial" font-size="10" fill="#1976d2">→</text>
    <rect x="320" y="478" width="100" height="35" rx="3" fill="#f44336"/>
    <text x="370" y="498" text-anchor="middle" font-family="Arial" font-size="9" fill="white">C fails</text>
    <rect x="440" y="475" width="280" height="42" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="450" y="489" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Convergence:</text>
    <text x="450" y="503" font-family="Arial" font-size="8" fill="#333">0s: C fails, metric=16</text>
    <text x="580" y="503" font-family="Arial" font-size="8" fill="#333">180s: invalid</text>
    <text x="640" y="503" font-family="Arial" font-size="8" fill="#333">240s: flush</text>
  </g>

  <!-- Step 6: Summary -->
  <g class="step" id="step6" data-narration="RIP is suitable for small networks up to 15 hops due to its simplicity and slow convergence. Remember: UDP 520, AD 120, max hops 15, metric 16 means unreachable.">
    <rect x="50" y="536" width="700" height="52" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="553" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Takeaways</text>
    <text x="70" y="570" font-family="Arial" font-size="9" fill="#333">RIP: Distance-vector | Hop count metric | Max 15 hops (16=unreachable) | UDP 520 | AD 120</text>
    <text x="520" y="553" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Best: Small networks</text>
    <text x="520" y="568" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Limit: Slow convergence</text>
  </g>
</svg>