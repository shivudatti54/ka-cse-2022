<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning Wireless Communication Fundamentals. This topic covers electromagnetic spectrum, signal propagation modes, network types, and key formulas for  CSE.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Wireless Communication Fundamentals</text>
  </g>
  
  <g class="step" id="step1" data-narration="The electromagnetic spectrum ranges from 3 kHz to 300 GHz. Higher frequencies offer more bandwidth but shorter ranges and require line-of-sight propagation.">
    <rect x="30" y="58" width="740" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Electromagnetic Spectrum</text>
    <rect x="50" y="85" width="90" height="45" rx="4" fill="#1976d2"/>
    <text x="95" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">LF: 30-300kHz</text>
    <text x="95" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Navigation</text>
    <rect x="150" y="85" width="90" height="45" rx="4" fill="#1976d2"/>
    <text x="195" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">MF: 300k-3MHz</text>
    <text x="195" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">AM Radio</text>
    <rect x="250" y="85" width="90" height="45" rx="4" fill="#1976d2"/>
    <text x="295" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">HF: 3-30MHz</text>
    <text x="295" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Shortwave</text>
    <rect x="350" y="85" width="90" height="45" rx="4" fill="#ff9800"/>
    <text x="395" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">VHF: 30-300MHz</text>
    <text x="395" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">FM/TV</text>
    <rect x="450" y="85" width="90" height="45" rx="4" fill="#ff9800"/>
    <text x="495" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">UHF: 300M-3GHz</text>
    <text x="495" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Cellular/Wi-Fi</text>
    <rect x="550" y="85" width="90" height="45" rx="4" fill="#9c27b0"/>
    <text x="595" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">SHF: 3-30GHz</text>
    <text x="595" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Satellite</text>
    <rect x="650" y="85" width="90" height="45" rx="4" fill="#9c27b0"/>
    <text x="695" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">EHF: 30-300GHz</text>
    <text x="695" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Experimental</text>
  </g>
  
  <g class="step" id="step2" data-narration="Wireless signals propagate via ground waves (below 3 MHz, follows Earth), sky waves (3-30 MHz, ionospheric reflection), or line-of-sight (above 30 MHz, straight path).">
    <rect x="30" y="146" width="740" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Signal Propagation Modes</text>
    <rect x="50" y="175" width="220" height="45" rx="4" fill="#388e3c"/>
    <text x="160" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Ground Wave</text>
    <text x="160" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">&lt;3 MHz | Follows Earth surface</text>
    <rect x="290" y="175" width="220" height="45" rx="4" fill="#ff9800"/>
    <text x="400" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Sky Wave</text>
    <text x="400" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">3-30 MHz | Ionosphere reflection</text>
    <rect x="530" y="175" width="220" height="45" rx="4" fill="#9c27b0"/>
    <text x="640" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Line-of-Sight (LOS)</text>
    <text x="640" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">&gt;30 MHz | Straight path required</text>
  </g>
  
  <g class="step" id="step3" data-narration="Wireless networks are classified by range: WPAN (Bluetooth, 10m), WLAN (Wi-Fi, 100m), WMAN (WiMAX, city), and WWAN (Cellular communication networks for global coverage).">
    <rect x="30" y="234" width="740" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Types of Wireless Networks</text>
    <rect x="50" y="263" width="160" height="45" rx="4" fill="#ff9800"/>
    <text x="130" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">WPAN</text>
    <text x="130" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Bluetooth | 10m range</text>
    <rect x="220" y="263" width="160" height="45" rx="4" fill="#ff9800"/>
    <text x="300" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">WLAN</text>
    <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Wi-Fi (802.11) | 100m</text>
    <rect x="390" y="263" width="160" height="45" rx="4" fill="#f44336"/>
    <text x="470" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">WMAN</text>
    <text x="470" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">WiMAX | City-wide</text>
    <rect x="560" y="263" width="160" height="45" rx="4" fill="#f44336"/>
    <text x="640" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">WWAN</text>
    <text x="640" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Cellular/Satellite | Global</text>
  </g>
  
  <g class="step" id="step4" data-narration="Modulation encodes data onto carrier waves. Analog methods include AM and FM. Digital methods include ASK, FSK, PSK, and QAM for higher data rates.">
    <rect x="30" y="322" width="740" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Modulation Techniques</text>
    <text x="50" y="360" font-family="Arial" font-size="10" fill="#9c27b0">Analog:</text>
    <rect x="100" y="350" width="90" height="35" rx="4" fill="#9c27b0"/>
    <text x="145" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">AM</text>
    <text x="145" y="379" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">Amplitude</text>
    <rect x="200" y="350" width="90" height="35" rx="4" fill="#9c27b0"/>
    <text x="245" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">FM</text>
    <text x="245" y="379" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">Frequency</text>
    <text x="320" y="360" font-family="Arial" font-size="10" fill="#9c27b0">Digital:</text>
    <rect x="370" y="350" width="70" height="35" rx="4" fill="#1976d2"/>
    <text x="405" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">ASK</text>
    <rect x="450" y="350" width="70" height="35" rx="4" fill="#1976d2"/>
    <text x="485" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">FSK</text>
    <rect x="530" y="350" width="70" height="35" rx="4" fill="#1976d2"/>
    <text x="565" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">PSK</text>
    <rect x="610" y="350" width="70" height="35" rx="4" fill="#1976d2"/>
    <text x="645" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">QAM</text>
    <text x="645" y="379" text-anchor="middle" font-family="Arial" font-size="7" fill="#e3f2fd">Amp+Phase</text>
    <rect x="700" y="350" width="60" height="35" rx="4" fill="#388e3c"/>
    <text x="730" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">OFDM</text>
    <text x="730" y="380" text-anchor="middle" font-family="Arial" font-size="6" fill="#e8f5e9">4G/5G</text>
  </g>
  
  <g class="step" id="step5" data-narration="Antennas convert electrical signals to electromagnetic waves. Key parameters include gain (dBi), polarization, radiation pattern, and bandwidth for effective transmission.">
    <rect x="30" y="410" width="740" height="90" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. Antenna Fundamentals</text>
    <circle cx="120" cy="470" r="25" fill="#f44336"/>
    <text x="120" y="466" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Dipole</text>
    <circle cx="200" cy="470" r="25" fill="#f44336"/>
    <text x="200" y="466" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Omni</text>
    <circle cx="280" cy="470" r="25" fill="#f44336"/>
    <text x="280" y="466" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Yagi</text>
    <circle cx="360" cy="470" r="25" fill="#f44336"/>
    <text x="360" y="466" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Dish</text>
    <rect x="420" y="445" width="300" height="50" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="570" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Key Parameters</text>
    <text x="440" y="478" font-family="Arial" font-size="9" fill="#333">Gain (dBi) | Polarization | Bandwidth | Impedance (50Ω)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key wireless formulas include wavelength (λ equals c divided by frequency), free space path loss (PL in decibels), and Shannon capacity (maximum data rate based on bandwidth and signal-to-noise ratio).">
    <rect x="30" y="508" width="740" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="525" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Important Formulas</text>
    <rect x="50" y="538" width="210" height="45" rx="4" fill="#1976d2"/>
    <text x="155" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Wavelength</text>
    <text x="155" y="570" text-anchor="middle" font-family="Arial" font-size="10" fill="#e3f2fd">λ = c / f</text>
    <rect x="280" y="538" width="240" height="45" rx="4" fill="#1976d2"/>
    <text x="400" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Path Loss (dB)</text>
    <text x="400" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#e3f2fd">PL = 20log₁₀(d) + 20log₁₀(f)</text>
    <rect x="540" y="538" width="200" height="45" rx="4" fill="#1976d2"/>
    <text x="640" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Shannon Capacity</text>
    <text x="640" y="570" text-anchor="middle" font-family="Arial" font-size="10" fill="#e3f2fd">C = B × log₂(1+SNR)</text>
  </g>
</svg>