<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Protocol layering organizes network communication into distinct layers, simplifying design and enabling interoperability between different systems worldwide, making networks easier to build and maintain.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Protocol Layering</text>
  </g>
  
  <g class="step" id="step1" data-narration="The OSI model defines seven layers from top to bottom: Application, Presentation, Session, Transport, Network, Data Link, and Physical layers for network communication.">
    <rect x="20" y="58" width="760" height="140" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">OSI Model (7 Layers)</text>
    <rect x="40" y="90" width="740" height="100" rx="3" fill="#ffffff"/>
    <text x="50" y="106" font-family="Arial" font-size="9" fill="#333">7. Application Layer</text>
    <text x="50" y="120" font-family="Arial" font-size="9" fill="#333">6. Presentation Layer</text>
    <text x="50" y="134" font-family="Arial" font-size="9" fill="#333">5. Session Layer</text>
    <text x="50" y="148" font-family="Arial" font-size="9" fill="#333">4. Transport Layer</text>
    <text x="50" y="162" font-family="Arial" font-size="9" fill="#333">3. Network Layer</text>
    <text x="50" y="176" font-family="Arial" font-size="9" fill="#333">2. Data Link Layer</text>
    <text x="50" y="190" font-family="Arial" font-size="9" fill="#333">1. Physical Layer</text>
    <text x="520" y="106" font-family="Arial" font-size="8" fill="#666">HTTP, FTP, SMTP, DNS</text>
    <text x="520" y="120" font-family="Arial" font-size="8" fill="#666">SSL/TLS, JPEG, GIF</text>
    <text x="520" y="134" font-family="Arial" font-size="8" fill="#666">NetBIOS, RPC, PPTP</text>
    <text x="520" y="148" font-family="Arial" font-size="8" fill="#666">TCP, UDP</text>
    <text x="520" y="162" font-family="Arial" font-size="8" fill="#666">IP, ICMP, ARP</text>
    <text x="520" y="176" font-family="Arial" font-size="8" fill="#666">Ethernet, PPP, Frame Relay</text>
    <text x="520" y="190" font-family="Arial" font-size="8" fill="#666">Cables, Hub, Repeater</text>
  </g>
  
  <g class="step" id="step2" data-narration="The TCP/IP model uses four layers that map to OSI: Application, Transport, Internet, and Network Access layers for practical networking implementation.">
    <rect x="20" y="206" width="760" height="110" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="228" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">TCP/IP Model (4 Layers) &amp; OSI Mapping</text>
    <rect x="40" y="238" width="740" height="70" rx="3" fill="#ffffff"/>
    <text x="50" y="256" font-family="Arial" font-size="9" fill="#333">Application Layer ← OSI Layers 5, 6, 7</text>
    <text x="50" y="270" font-family="Arial" font-size="9" fill="#333">Transport Layer ← OSI Layer 4 (TCP, UDP)</text>
    <text x="50" y="284" font-family="Arial" font-size="9" fill="#333">Internet Layer ← OSI Layer 3 (IP, ICMP)</text>
    <text x="50" y="298" font-family="Arial" font-size="9" fill="#333">Network Access ← OSI Layers 1, 2 (Ethernet, PPP)</text>
    <text x="480" y="256" font-family="Arial" font-size="8" fill="#666">HTTP, FTP, SMTP, DNS</text>
    <text x="480" y="270" font-family="Arial" font-size="8" fill="#666">TCP, UDP</text>
    <text x="480" y="284" font-family="Arial" font-size="8" fill="#666">IP, ICMP, ARP</text>
    <text x="480" y="298" font-family="Arial" font-size="8" fill="#666">Ethernet, Wi-Fi</text>
  </g>
  
  <g class="step" id="step3" data-narration="Encapsulation adds headers at each layer when data moves down from sender. Decapsulation removes corresponding headers as data moves up at the receiver side.">
    <rect x="20" y="324" width="760" height="130" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="346" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Encapsulation &amp; Decapsulation</text>
    <rect x="40" y="356" width="340" height="90" rx="3" fill="#ffffff"/>
    <text x="50" y="372" font-family="Arial" font-size="9" fill="#333" font-weight="bold">SENDER (Encapsulation)</text>
    <text x="50" y="386" font-family="Arial" font-size="8" fill="#666">Application Data</text>
    <text x="50" y="398" font-family="Arial" font-size="8" fill="#666">+ App Header → Data PDU</text>
    <text x="50" y="410" font-family="Arial" font-size="8" fill="#666">+ TCP/UDP Header → Segment</text>
    <text x="50" y="422" font-family="Arial" font-size="8" fill="#666">+ IP Header → Packet</text>
    <text x="50" y="434" font-family="Arial" font-size="8" fill="#666">+ Frame Header/Trailer → Frame</text>
    <text x="50" y="446" font-family="Arial" font-size="8" fill="#666">Convert to Bits → Physical</text>
    <rect x="400" y="356" width="340" height="90" rx="3" fill="#ffffff"/>
    <text x="410" y="372" font-family="Arial" font-size="9" fill="#333" font-weight="bold">RECEIVER (Decapsulation)</text>
    <text x="410" y="386" font-family="Arial" font-size="8" fill="#666">Physical receives bits</text>
    <text x="410" y="398" font-family="Arial" font-size="8" fill="#666">Remove Frame Header/Trailer</text>
    <text x="410" y="410" font-family="Arial" font-size="8" fill="#666">Remove IP Header</text>
    <text x="410" y="422" font-family="Arial" font-size="8" fill="#666">Remove TCP/UDP Header</text>
    <text x="410" y="434" font-family="Arial" font-size="8" fill="#666">Remove App Header</text>
    <text x="410" y="446" font-family="Arial" font-size="8" fill="#666">Application Data delivered</text>
  </g>
  
  <g class="step" id="step4" data-narration="TCP provides reliable, connection-oriented communication with error recovery and flow control. UDP provides unreliable, connectionless communication for faster, simpler data transfers.">
    <rect x="20" y="462" width="760" height="110" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="484" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">TCP vs UDP Comparison</text>
    <rect x="40" y="494" width="350" height="70" rx="3" fill="#ffffff"/>
    <text x="50" y="510" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">TCP (Transmission Control Protocol)</text>
    <text x="50" y="524" font-family="Arial" font-size="8" fill="#666">• Reliable, connection-oriented</text>
    <text x="50" y="536" font-family="Arial" font-size="8" fill="#666">• Error recovery &amp; flow control</text>
    <text x="50" y="548" font-family="Arial" font-size="8" fill="#666">• Slower but guaranteed delivery</text>
    <text x="50" y="560" font-family="Arial" font-size="8" fill="#666">• Used by: HTTP, FTP, SMTP, SSH</text>
    <rect x="400" y="494" width="350" height="70" rx="3" fill="#ffffff"/>
    <text x="410" y="510" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">UDP (User Datagram Protocol)</text>
    <text x="410" y="524" font-family="Arial" font-size="8" fill="#666">• Unreliable, connectionless</text>
    <text x="410" y="536" font-family="Arial" font-size="8" fill="#666">• No error recovery</text>
    <text x="410" y="548" font-family="Arial" font-size="8" fill="#666">• Faster but no guarantee</text>
    <text x="410" y="560" font-family="Arial" font-size="8" fill="#666">• Used by: DNS, Video streaming, Gaming</text>
  </g>
</svg>