<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Web services enable communication between different applications over the internet using standardized protocols, allowing seamless data exchange across platforms and programming languages.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Web Services</text>
  </g>
  
  <g class="step" id="step1" data-narration="The web service architecture consists of three main components: service provider creates services, the service requestor consumes them, and the service registry catalogs them for discovery.">
    <rect x="20" y="56" width="760" height="78" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="73" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Web Service Architecture</text>
    <rect x="40" y="83" width="110" height="42" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="95" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Service</text>
    <text x="95" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Provider</text>
    <rect x="200" y="83" width="110" height="42" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="255" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Service</text>
    <text x="255" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Requestor</text>
    <rect x="360" y="83" width="110" height="42" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="415" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Service</text>
    <text x="415" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Registry</text>
    <line x1="150" y1="104" x2="200" y2="104" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="310" y1="104" x2="360" y2="104" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="470" y1="104" x2="520" y2="104" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
  </g>
  
  <g class="step" id="step2" data-narration="SOAP uses XML messages with an Envelope as root, optional Header for metadata, and mandatory Body for actual request or response data, with optional Fault for errors.">
    <rect x="20" y="140" width="760" height="84" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="157" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">SOAP Message Structure</text>
    <rect x="40" y="168" width="160" height="48" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="120" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">SOAP Envelope</text>
    <text x="120" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#e65100">Root Element</text>
    <rect x="215" y="168" width="100" height="48" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="265" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Header</text>
    <text x="265" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#e65100">Optional</text>
    <rect x="330" y="168" width="100" height="48" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="380" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Body</text>
    <text x="380" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#e65100">Mandatory</text>
    <rect x="445" y="168" width="100" height="48" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="495" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Fault</text>
    <text x="495" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#e65100">Error</text>
    <text x="40" y="230" font-family="Arial" font-size="8" fill="#555">XML format over HTTP/SMTP/TCP</text>
  </g>
  
  <g class="step" id="step3" data-narration="RESTful services use HTTP methods: GET retrieves, POST creates, PUT updates, DELETE removes resources. Each request is stateless and self-contained.">
    <rect x="20" y="230" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="247" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">RESTful Web Services</text>
    <rect x="40" y="258" width="85" height="42" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="82" y="274" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">GET</text>
    <text x="82" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Retrieve</text>
    <rect x="135" y="258" width="85" height="42" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="177" y="274" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">POST</text>
    <text x="177" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Create</text>
    <rect x="230" y="258" width="85" height="42" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="272" y="274" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">PUT</text>
    <text x="272" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Update</text>
    <rect x="325" y="258" width="85" height="42" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="367" y="274" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">DELETE</text>
    <text x="367" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Remove</text>
    <rect x="460" y="258" width="200" height="42" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="560" y="274" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Stateless</text>
    <text x="560" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Each request self-contained</text>
  </g>
  
  <g class="step" id="step4" data-narration="WSDL defines service operations using types, messages, portTypes, bindings, services. UDDI is a registry with White, Yellow, and Green pages for publishing and discovering business web services.">
    <rect x="20" y="316" width="370" height="116" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="333" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">WSDL Elements</text>
    <rect x="40" y="345" width="70" height="35" rx="2" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="75" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">types</text>
    <rect x="118" y="345" width="70" height="35" rx="2" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="153" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">message</text>
    <rect x="196" y="345" width="70" height="35" rx="2" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="231" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">portType</text>
    <rect x="274" y="345" width="70" height="35" rx="2" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="309" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">binding</text>
    <rect x="40" y="387" width="70" height="35" rx="2" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="75" y="401" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">service</text>
    <rect x="118" y="387" width="70" height="35" rx="2" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="153" y="401" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">operations</text>
    
    <rect x="405" y="316" width="375" height="116" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="425" y="333" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">UDDI Registry</text>
    <rect x="425" y="345" width="100" height="35" rx="2" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="475" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">White Pages</text>
    <text x="475" y="372" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828">Business</text>
    <rect x="540" y="345" width="100" height="35" rx="2" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="590" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Yellow Pages</text>
    <text x="590" y="372" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828">Categories</text>
    <rect x="655" y="345" width="100" height="35" rx="2" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="705" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Green Pages</text>
    <text x="705" y="372" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828">Tech spec</text>
    <text x="425" y="407" font-family="Arial" font-size="8" fill="#555">Service discovery</text>
  </g>
  
  <g class="step" id="step5" data-narration="REST is lightweight, resource-based with JSON ideal for public APIs and mobile. SOAP is protocol-based with XML and WS-Security for enterprise banking and transactions.">
    <rect x="20" y="438" width="760" height="80" fill="#ffffff" stroke="#555" stroke-width="1"/>
    <text x="40" y="455" font-family="Arial" font-size="12" font-weight="bold" fill="#333">REST vs SOAP Comparison</text>
    <rect x="40" y="466" width="190" height="44" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="135" y="481" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">REST</text>
    <text x="135" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Lightweight, HTTP, JSON</text>
    <text x="135" y="507" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Public APIs, Mobile</text>
    <rect x="250" y="466" width="190" height="44" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="345" y="481" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">SOAP</text>
    <text x="345" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Protocol, XML, WS-Security</text>
    <text x="345" y="507" text-anchor="middle" font-family="Arial" font-size="7" fill="#e65100">Enterprise, Banking</text>
    <rect x="460" y="466" width="200" height="44" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="560" y="481" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">JSON Format</text>
    <text x="560" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Lightweight key-value</text>
    <text x="560" y="507" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Human-readable</text>
  </g>
  
  <g class="step" id="step6" data-narration="Web services provide platform independence, interoperability, reusability, scalability, and modularity for modern distributed systems across different platforms and languages.">
    <rect x="20" y="524" width="760" height="64" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="541" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Advantages of Web Services</text>
    <rect x="40" y="552" width="150" height="28" rx="2" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="115" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Platform Independent</text>
    <rect x="200" y="552" width="130" height="28" rx="2" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="265" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Interoperable</text>
    <rect x="340" y="552" width="120" height="28" rx="2" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Reusable</text>
    <rect x="470" y="552" width="120" height="28" rx="2" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="530" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Scalable</text>
    <rect x="600" y="552" width="140" height="28" rx="2" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="670" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Modular</text>
  </g>
</svg>