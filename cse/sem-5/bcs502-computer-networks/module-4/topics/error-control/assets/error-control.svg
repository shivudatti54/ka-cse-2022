<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <g class="step" id="step0" data-narration="Error control in data communication ensures reliable delivery across unreliable channels using detection, correction, and retransmission techniques to handle transmission errors effectively in networks.">
    <rect x="20" y="10" width="760" height="40" fill="#e3f2fd" rx="8"/>
    <text x="400" y="38" font-size="20" font-weight="bold" fill="#1565c0" text-anchor="middle">Error Control in Data Communication</text>
  </g>
  <g class="step" id="step1" data-narration="Two primary error types occur in data transmission: single-bit errors affect isolated bits due to random noise, while burst errors corrupt multiple consecutive bits caused by impulse interference or channel fading.">
    <rect x="40" y="58" width="720" height="95" fill="#fff3e0" rx="8"/>
    <text x="60" y="82" font-size="14" font-weight="bold" fill="#e65100">Types of Transmission Errors</text>
    <rect x="60" y="100" width="150" height="45" fill="#ff9800" rx="5"/>
    <text x="135" y="122" font-size="12" fill="#ffffff" text-anchor="middle">Single-Bit Error</text>
    <text x="135" y="138" font-size="10" fill="#5d4037" text-anchor="middle">One bit flipped</text>
    <rect x="230" y="100" width="150" height="45" fill="#f57c00" rx="5"/>
    <text x="305" y="122" font-size="12" fill="#ffffff" text-anchor="middle">Burst Error</text>
    <text x="305" y="138" font-size="10" fill="#5d4037" text-anchor="middle">Multiple consecutive bits</text>
  </g>
  <g class="step" id="step2" data-narration="Three main error detection techniques are employed: simple parity check adds one bit for even or odd parity, checksum uses ones complement addition of data segments, and CRC performs polynomial division for robust detection.">
    <rect x="40" y="161" width="720" height="95" fill="#e8f5e9" rx="8"/>
    <text x="60" y="185" font-size="14" font-weight="bold" fill="#2e7d32">Error Detection Techniques</text>
    <rect x="60" y="205" width="220" height="45" fill="#66bb6a" rx="5"/>
    <text x="170" y="225" font-size="12" fill="#ffffff" text-anchor="middle">Parity Check</text>
    <text x="170" y="240" font-size="10" fill="#1b5e20" text-anchor="middle">Simple even/odd bit</text>
    <rect x="300" y="205" width="220" height="45" fill="#43a047" rx="5"/>
    <text x="410" y="225" font-size="12" fill="#ffffff" text-anchor="middle">Checksum</text>
    <text x="410" y="240" font-size="10" fill="#1b5e20" text-anchor="middle">Ones complement sum</text>
    <rect x="540" y="205" width="220" height="45" fill="#388e3c" rx="5"/>
    <text x="650" y="225" font-size="12" fill="#ffffff" text-anchor="middle">CRC</text>
    <text x="650" y="240" font-size="10" fill="#1b5e20" text-anchor="middle">Polynomial division</text>
  </g>
  <g class="step" id="step3" data-narration="Hamming code corrects single-bit errors using redundant parity bits positioned at powers of two (1,2,4,8...) where formula 2^r must satisfy m+r+1 bits for r parity bits covering m data bits.">
    <rect x="40" y="264" width="340" height="107" fill="#f3e5f5" rx="8"/>
    <text x="60" y="288" font-size="14" font-weight="bold" fill="#7b1fa2">Hamming Code</text>
    <text x="60" y="310" font-size="11" fill="#4a148c">Formula: 2^r ≥ m + r + 1</text>
    <text x="60" y="328" font-size="11" fill="#4a148c">Parity positions: 1, 2, 4, 8...</text>
    <text x="60" y="346" font-size="11" fill="#4a148c">Detects &amp; corrects single-bit errors</text>
    <text x="60" y="364" font-size="11" fill="#4a148c">Distance: d_min ≥ 2e+1</text>
    <rect x="420" y="274" width="340" height="85" fill="#fce4ec" rx="8"/>
    <text x="440" y="298" font-size="14" font-weight="bold" fill="#c2185b">CRC Advantage</text>
    <text x="440" y="322" font-size="11" fill="#ad1457">Detects burst errors ≤ r+1 bits</text>
    <text x="440" y="340" font-size="11" fill="#ad1457">where r = generator polynomial degree</text>
    <text x="440" y="358" font-size="11" fill="#ad1457">Used in Ethernet, WiFi, HDLC protocols</text>
  </g>
  <g class="step" id="step4" data-narration="ARQ protocols request retransmission: Stop-and-Wait sends one frame and waits for ACK, Go-Back-N retransmits all frames from error, while Selective Repeat retransmits only the corrupted frame efficiently.">
    <rect x="40" y="379" width="720" height="95" fill="#e1f5fe" rx="8"/>
    <text x="60" y="403" font-size="14" font-weight="bold" fill="#0277bd">ARQ Retransmission Protocols</text>
    <rect x="60" y="422" width="210" height="45" fill="#039be5" rx="5"/>
    <text x="165" y="444" font-size="12" fill="#ffffff" text-anchor="middle">Stop-and-Wait</text>
    <text x="165" y="459" font-size="10" fill="#01579b" text-anchor="middle">One frame, wait for ACK</text>
    <rect x="295" y="422" width="210" height="45" fill="#0288d1" rx="5"/>
    <text x="400" y="444" font-size="12" fill="#ffffff" text-anchor="middle">Go-Back-N</text>
    <text x="400" y="459" font-size="10" fill="#01579b" text-anchor="middle">Retransmits from error</text>
    <rect x="530" y="422" width="210" height="45" fill="#01579b" rx="5"/>
    <text x="635" y="444" font-size="12" fill="#ffffff" text-anchor="middle">Selective Repeat</text>
    <text x="635" y="459" font-size="10" fill="#01579b" text-anchor="middle">Only failed frame resent</text>
  </g>
  <g class="step" id="step5" data-narration="Stop-and-Wait ARQ efficiency equals one divided by one plus two times ratio of propagation to transmission time, making it inefficient for high-latency channels where bandwidth is underutilized during wait periods.">
    <rect x="40" y="482" width="720" height="110" fill="#fff8e1" rx="8"/>
    <text x="60" y="506" font-size="14" font-weight="bold" fill="#f57f17">ARQ Efficiency Formula</text>
    <text x="60" y="532" font-size="13" fill="#f9a825">η = 1 / (1 + 2a) &amp;nbsp;&amp;nbsp;&amp;nbsp; where a = Tp / Tt</text>
    <text x="60" y="557" font-size="11" fill="#f57f17">Tp = propagation delay | Tt = transmission time</text>
    <text x="60" y="577" font-size="11" fill="#f57f17">Inefficient for satellite links with high propagation delay</text>
    <text x="60" y="590" font-size="11" fill="#f57f17">Sliding window protocols improve throughput</text>
  </g>
</svg>