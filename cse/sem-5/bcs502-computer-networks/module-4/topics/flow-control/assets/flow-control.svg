<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <g class="step" id="step0" data-narration="Flow control determines statement execution order in C programs through selection statements, iteration loops, and jump statements that manage program flow.">
    <rect x="50" y="10" width="700" height="40" fill="#e3f2fd" rx="5"/>
    <text x="60" y="35" font-size="20" fill="#1976d2">Flow Control in C Programming</text>
  </g>
  <g class="step" id="step1" data-narration="Selection statements make decisions using if and if-else constructs in C programming. The boolean condition determines which block of code executes at runtime.">
    <rect x="50" y="58" width="700" height="80" fill="#fff3e0" rx="5"/>
    <text x="60" y="80" font-size="14" fill="#e65100"><b>1. Selection Statements (if, if-else)</b></text>
    <rect x="60" y="95" width="180" height="35" fill="#ffe0b2" rx="4"/>
    <text x="70" y="115" font-size="11" fill="#333">if (condition) {</text>
    <text x="70" y="128" font-size="11" fill="#333">    // code</text>
    <text x="190" y="115" font-size="11" fill="#333">}</text>
    <rect x="260" y="95" width="220" height="35" fill="#ffcc80" rx="4"/>
    <text x="270" y="115" font-size="11" fill="#333">if (condition) {</text>
    <text x="270" y="128" font-size="11" fill="#333">    // true block</text>
    <text x="380" y="115" font-size="11" fill="#333">} else {</text>
    <text x="380" y="128" font-size="11" fill="#333">    // false block</text>
  </g>
  <g class="step" id="step2" data-narration="The else-if ladder checks multiple conditions sequentially from top to bottom. Switch statement compares one expression value against multiple constant case values efficiently.">
    <rect x="50" y="146" width="700" height="80" fill="#e8f5e9" rx="5"/>
    <text x="60" y="168" font-size="14" fill="#2e7d32"><b>2. else-if Ladder and Switch Statement</b></text>
    <rect x="60" y="183" width="250" height="35" fill="#c8e6c9" rx="4"/>
    <text x="70" y="203" font-size="10" fill="#333">if (cond1) {} else if (cond2) {}</text>
    <text x="70" y="216" font-size="10" fill="#333">else if (cond3) {} else {}</text>
    <rect x="320" y="183" width="380" height="35" fill="#a5d6a7" rx="4"/>
    <text x="330" y="200" font-size="10" fill="#333">switch(expr) { case 1: break; default: }</text>
    <text x="330" y="213" font-size="10" fill="#333">// expr must be int, char, or enum</text>
  </g>
  <g class="step" id="step3" data-narration="For loops repeat code execution when the number of iterations is known beforehand. The syntax includes three parts: initialization, condition check, and increment operations.">
    <rect x="50" y="234" width="700" height="80" fill="#fce4ec" rx="5"/>
    <text x="60" y="256" font-size="14" fill="#c62828"><b>3. for Loop - Known Iterations</b></text>
    <rect x="60" y="271" width="280" height="35" fill="#ffcdd2" rx="4"/>
    <text x="70" y="291" font-size="11" fill="#333">for (int i=1; i&lt;=n; i++) {</text>
    <text x="70" y="304" font-size="11" fill="#333">    // repeat n times</text>
    <text x="290" y="291" font-size="11" fill="#333">}</text>
    <text x="360" y="290" font-size="10" fill="#666">// init; condition; increment</text>
  </g>
  <g class="step" id="step4" data-narration="While loops check the condition before executing the loop body. Do-while guarantees at least one execution since it checks the condition after the body runs.">
    <rect x="50" y="322" width="700" height="80" fill="#f3e5f5" rx="5"/>
    <text x="60" y="344" font-size="14" fill="#6a1b9a"><b>4. while and do-while Loops</b></text>
    <rect x="60" y="359" width="240" height="35" fill="#e1bee7" rx="4"/>
    <text x="70" y="379" font-size="11" fill="#333">while (condition) {</text>
    <text x="70" y="392" font-size="11" fill="#333">    // check before</text>
    <text x="210" y="379" font-size="11" fill="#333">}</text>
    <rect x="320" y="359" width="280" height="35" fill="#ce93d8" rx="4"/>
    <text x="330" y="379" font-size="11" fill="#333">do {</text>
    <text x="360" y="379" font-size="11" fill="#333">// execute once</text>
    <text x="460" y="379" font-size="11" fill="#333">} while (condition);</text>
    <text x="420" y="400" font-size="9" fill="#666">// checks after execution</text>
  </g>
  <g class="step" id="step5" data-narration="Break statement exits loops entirely and continues after the loop. Continue skips the current iteration and proceeds to the next one in the loop sequence.">
    <rect x="50" y="410" width="700" height="80" fill="#e0f7fa" rx="5"/>
    <text x="60" y="432" font-size="14" fill="#006064"><b>5. Jump Statements - break, continue, goto</b></text>
    <rect x="60" y="447" width="160" height="35" fill="#b2ebf2" rx="4"/>
    <text x="70" y="467" font-size="11" fill="#333">break;</text>
    <text x="70" y="480" font-size="11" fill="#666">// exit loop</text>
    <rect x="230" y="447" width="180" height="35" fill="#80deea" rx="4"/>
    <text x="240" y="467" font-size="11" fill="#333">continue;</text>
    <text x="240" y="480" font-size="11" fill="#666">// skip iteration</text>
    <rect x="420" y="447" width="200" height="35" fill="#4dd0e1" rx="4"/>
    <text x="430" y="467" font-size="11" fill="#333">goto label;</text>
    <text x="430" y="480" font-size="10" fill="#666">// avoid in structured code</text>
  </g>
  <g class="step" id="step6" data-narration="Key differences: if-else handles boolean conditions while switch works with discrete values. While checks condition first, do-while executes at least once. Break exits loops completely while continue skips only the current iteration.">
    <rect x="50" y="498" width="700" height="90" fill="#fffde7" rx="5"/>
    <text x="60" y="520" font-size="14" fill="#f57f17"><b>6. Summary and Key Differences</b></text>
    <rect x="60" y="535" width="320" height="45" fill="#fff9c4" rx="4"/>
    <text x="70" y="555" font-size="10" fill="#333">if/else → boolean conditions</text>
    <text x="70" y="570" font-size="10" fill="#333">switch → discrete values (int, char)</text>
    <text x="70" y="585" font-size="10" fill="#333">for → known iterations</text>
    <rect x="390" y="535" width="290" height="45" fill="#fff9c4" rx="4"/>
    <text x="400" y="555" font-size="10" fill="#333">while → condition first</text>
    <text x="400" y="570" font-size="10" fill="#333">do-while → at least once</text>
    <text x="400" y="585" font-size="10" fill="#333">break exits; continue skips iteration</text>
  </g>
</svg>