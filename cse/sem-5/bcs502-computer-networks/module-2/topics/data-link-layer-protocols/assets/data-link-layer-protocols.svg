<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Data Link Layer Protocols. This topic covers framing, flow control, error detection, and key protocols like HDLC and PPP.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Data Link Layer Protocols</text>
  </g>
  
  <g class="step" id="step1" data-narration="The Data Link Layer is layer 2 in OSI model. It provides node-to-node communication, framing packets, error detection, and flow control.">
    <rect x="20" y="58" width="760" height="95" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Data Link Layer Overview</text>
    <rect x="40" y="90" width="340" height="50" fill="white" stroke="#bbdefb" rx="3"/>
    <text x="50" y="105" font-family="Arial" font-size="9" fill="#333">• Node-to-node reliable delivery</text>
    <text x="50" y="118" font-family="Arial" font-size="9" fill="#333">• Encapsulates packets into frames</text>
    <text x="50" y="131" font-family="Arial" font-size="9" fill="#333">• Error detection &amp; flow control</text>
    <rect x="400" y="90" width="340" height="50" fill="white" stroke="#bbdefb" rx="3"/>
    <text x="410" y="108" font-family="Arial" font-size="9" fill="#333">OSI Model:</text>
    <text x="410" y="120" font-family="Arial" font-size="9" fill="#333">Layer 1: Physical | Layer 2: Data Link | Layer 3: Network</text>
    <text x="410" y="132" font-family="Arial" font-size="9" fill="#333">Data Link sits between Physical and Network layers</text>
  </g>
  
  <g class="step" id="step2" data-narration="Framing techniques include character stuffing with escape characters and bit stuffing inserting zero after five consecutive ones for synchronization and data transparency in network communication.">
    <rect x="20" y="161" width="760" height="95" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="183" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Framing Methods</text>
    <rect x="40" y="195" width="340" height="50" fill="white" stroke="#c8e6c9" rx="3"/>
    <text x="50" y="210" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Character-Oriented (Byte Stuffing)</text>
    <text x="50" y="225" font-family="Arial" font-size="9" fill="#333">Uses special ESC character to distinguish</text>
    <text x="50" y="238" font-family="Arial" font-size="9" fill="#333">data from control characters like DLE STX/ETX</text>
    <rect x="400" y="195" width="340" height="50" fill="white" stroke="#c8e6c9" rx="3"/>
    <text x="410" y="210" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Bit-Oriented (Bit Stuffing)</text>
    <text x="410" y="225" font-family="Arial" font-size="9" fill="#333">Flag: 01111110 | Insert '0' after five 1s</text>
    <text x="410" y="238" font-family="Arial" font-size="9" fill="#333">Used in HDLC protocol</text>
  </g>
  
  <g class="step" id="step3" data-narration="Flow control has two main protocols: Stop-and-Wait sends one frame at a time while Sliding Window allows multiple frames in transit.">
    <rect x="20" y="264" width="760" height="95" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="286" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Flow Control Protocols</text>
    <rect x="40" y="298" width="220" height="50" fill="white" stroke="#ffe0b2" rx="3"/>
    <text x="50" y="313" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Stop-and-Wait</text>
    <text x="50" y="328" font-family="Arial" font-size="9" fill="#333">Send 1 frame → Wait ACK → Repeat</text>
    <text x="50" y="341" font-family="Arial" font-size="9" fill="#333">Efficiency = 1 / (1 + 2a)</text>
    <rect x="280" y="298" width="220" height="50" fill="white" stroke="#ffe0b2" rx="3"/>
    <text x="290" y="313" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Sliding Window</text>
    <text x="290" y="328" font-family="Arial" font-size="9" fill="#333">Multiple frames in transit</text>
    <text x="290" y="341" font-family="Arial" font-size="9" fill="#333">Go-Back-N &amp; Selective Repeat</text>
    <rect x="520" y="298" width="240" height="50" fill="white" stroke="#ffe0b2" rx="3"/>
    <text x="530" y="310" font-family="Arial" font-size="9" fill="#333">Example: Tp=20ms, Tt=2ms</text>
    <text x="530" y="324" font-family="Arial" font-size="9" fill="#333">Efficiency = 2/(2+40) = 4.76%</text>
    <text x="530" y="338" font-family="Arial" font-size="9" fill="#f44336">Very low! Use sliding window</text>
  </g>
  
  <g class="step" id="step4" data-narration="Error detection uses parity checking and CRC while Hamming code can correct single-bit errors using redundant parity bits for reliable data transmission in computer networks.">
    <rect x="20" y="367" width="760" height="95" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="389" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Error Detection &amp; Correction</text>
    <rect x="40" y="401" width="230" height="50" fill="white" stroke="#e1bee7" rx="3"/>
    <text x="50" y="416" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Parity Checking</text>
    <text x="50" y="430" font-family="Arial" font-size="9" fill="#333">Single-bit: Even/Odd parity</text>
    <text x="50" y="443" font-family="Arial" font-size="9" fill="#333">2D parity: Rows &amp; columns</text>
    <rect x="290" y="401" width="230" height="50" fill="white" stroke="#e1bee7" rx="3"/>
    <text x="300" y="416" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">CRC (Cyclic Redundancy Check)</text>
    <text x="300" y="430" font-family="Arial" font-size="9" fill="#333">Polynomial division</text>
    <text x="300" y="443" font-family="Arial" font-size="9" fill="#333">Detects burst errors</text>
    <rect x="540" y="401" width="220" height="50" fill="white" stroke="#e1bee7" rx="3"/>
    <text x="550" y="416" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Hamming Code</text>
    <text x="550" y="430" font-family="Arial" font-size="9" fill="#333">Formula: 2^r ≥ m + r + 1</text>
    <text x="550" y="443" font-family="Arial" font-size="9" fill="#333">Corrects single-bit errors</text>
  </g>
  
  <g class="step" id="step5" data-narration="HDLC is a bit-oriented synchronous protocol while PPP is byte-oriented for dial-up connections, both providing reliable data transmission and error control in computer networking.">
    <rect x="20" y="470" width="760" height="95" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="492" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">HDLC vs PPP Protocols</text>
    <rect x="40" y="504" width="340" height="50" fill="white" stroke="#ffcdd2" rx="3"/>
    <text x="50" y="519" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">HDLC (High-Level Data Link Control)</text>
    <text x="50" y="534" font-family="Arial" font-size="9" fill="#333">Bit-oriented, synchronous | Frame types: I, S, U</text>
    <text x="50" y="547" font-family="Arial" font-size="9" fill="#333">Modes: NRM, ABM, ARM | Used in point-to-point</text>
    <rect x="400" y="504" width="340" height="50" fill="white" stroke="#ffcdd2" rx="3"/>
    <text x="410" y="519" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">PPP (Point-to-Point Protocol)</text>
    <text x="410" y="534" font-family="Arial" font-size="9" fill="#333">Byte-oriented, dial-up internet | LCP + NCP</text>
    <text x="410" y="547" font-family="Arial" font-size="9" fill="#333">Supports authentication PAP/CHAP | Framing with flags</text>
  </g>
  
  <g class="step" id="step6" data-narration="Important formulas to remember include bit stuffing inserting zero after five ones, Hamming code using 2^r ≥ m+r+1, and Stop-wait efficiency formula 1/(1+2a).">
    <rect x="20" y="573" width="760" height="1" fill="transparent"/>
  </g>
</svg>