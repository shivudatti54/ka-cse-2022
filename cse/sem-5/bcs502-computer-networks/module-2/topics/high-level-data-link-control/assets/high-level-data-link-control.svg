<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="HDLC is a bit-oriented Data Link Layer protocol by ISO designed for reliable synchronous serial communication across point-to-point network links.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">High-Level Data Link Control (HDLC)</text>
  </g>

  <!-- step1: Frame Structure -->
  <g class="step" id="step1" data-narration="HDLC frame has six fields: Flag marks start/end, Address identifies station, Control is frame type, Information holds data, and FCS detects errors.">
    <rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="30" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">HDLC Frame Structure</text>
    <rect x="30" y="85" width="80" height="40" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="70" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Flag</text>
    <text x="70" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">8 bits</text>
    <rect x="115" y="85" width="80" height="40" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="155" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Address</text>
    <text x="155" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">8 bits</text>
    <rect x="200" y="85" width="80" height="40" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="240" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Control</text>
    <text x="240" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">8/16 bits</text>
    <rect x="285" y="85" width="250" height="40" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="410" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Information</text>
    <text x="410" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Variable length</text>
    <rect x="540" y="85" width="80" height="40" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="580" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">FCS</text>
    <text x="580" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">16/32 bits</text>
    <rect x="625" y="85" width="80" height="40" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="665" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Flag</text>
    <text x="665" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">8 bits</text>
  </g>

  <!-- step2: Three Frame Types -->
  <g class="step" id="step2" data-narration="I-frames carry user data with send/receive sequence numbers. S-frames handle flow control like RR and RNR. U-frames manage link setup like SABM and DISC.">
    <rect x="10" y="146" width="780" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="30" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Three Frame Types</text>
    <rect x="30" y="175" width="230" height="42" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="145" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Information Frames (I)</text>
    <text x="145" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Carry user data</text>
    <text x="145" y="215" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">N(S), N(R) seq. nos.</text>
    <rect x="270" y="175" width="230" height="42" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="385" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Supervisory Frames (S)</text>
    <text x="385" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Flow control &amp; error recovery</text>
    <text x="385" y="215" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">RR, RNR, REJ, SREJ</text>
    <rect x="510" y="175" width="230" height="42" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="625" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Unnumbered Frames (U)</text>
    <text x="625" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Link management</text>
    <text x="625" y="215" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">SABM, DISC, UA, DM</text>
  </g>

  <!-- step3: Station Configurations -->
  <g class="step" id="step3" data-narration="HDLC supports three station types: Primary controls the link and issues commands. Secondary responds to primary. Combined stations can initiate and respond to frames.">
    <rect x="10" y="234" width="780" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="30" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Station Configurations</text>
    <rect x="30" y="263" width="230" height="42" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="145" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Primary Station</text>
    <text x="145" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Controls link, issues commands</text>
    <rect x="270" y="263" width="230" height="42" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="385" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Secondary Station</text>
    <text x="385" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Operates under primary control</text>
    <rect x="510" y="263" width="230" height="42" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="625" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Combined Station</text>
    <text x="625" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Functions as both primary &amp; secondary</text>
  </g>

  <!-- step4: Bit Stuffing -->
  <g class="step" id="step4" data-narration="Bit stuffing prevents false flags in data. Transmitter inserts a zero after five consecutive ones. Receiver removes zeros following five consecutive ones to restore original data.">
    <rect x="10" y="322" width="780" height="80" fill="#ffffff" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="30" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Bit Stuffing Technique</text>
    <text x="30" y="360" font-family="Arial" font-size="9" fill="#333">Original Data:</text>
    <text x="120" y="360" font-family="Courier" font-size="10" fill="#333">011011111011111101</text>
    <text x="30" y="380" font-family="Arial" font-size="9" fill="#333">After Bit Stuffing:</text>
    <text x="140" y="380" font-family="Courier" font-size="10" fill="#f44336">01101111100111110101</text>
    <rect x="400" y="350" width="160" height="42" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="480" y="368" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Stuffing Rule</text>
    <text x="480" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Insert '0' after five '1's</text>
    <text x="600" y="360" font-family="Arial" font-size="9" fill="#333">Receiver Action:</text>
    <text x="690" y="360" font-family="Courier" font-size="10" fill="#333">Remove stuffed '0'</text>
    <text x="600" y="380" font-family="Arial" font-size="9" fill="#333">Example: 11111 + 0 → 111110</text>
  </g>

  <!-- step5: Operational Modes -->
  <g class="step" id="step5" data-narration="HDLC operates in three modes: NRM requires primary polling for secondary transmission. ARM allows secondary to initiate. ABM enables any combined station to start communication.">
    <rect x="10" y="410" width="780" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="30" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Operational Modes</text>
    <rect x="30" y="440" width="220" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="140" y="456" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Normal Response Mode</text>
    <text x="140" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">NRM: Secondary only when polled</text>
    <rect x="260" y="440" width="220" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="370" y="456" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Asynchronous Response Mode</text>
    <text x="370" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ARM: Secondary can initiate</text>
    <rect x="490" y="440" width="220" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="600" y="456" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Asynchronous Balanced Mode</text>
    <text x="600" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ABM: Combined stations equal</text>
  </g>

  <!-- step6: Error & Flow Control -->
  <g class="step" id="step6" data-narration="HDLC uses CRC-16 or CRC-32 for error detection and supports Go-Back-N and Selective Reject for recovery. Flow control uses RR to indicate ready and RNR for not ready.">
    <rect x="10" y="498" width="780" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="30" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Error &amp; Flow Control</text>
    <rect x="30" y="528" width="340" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="200" y="545" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Error Detection (CRC)</text>
    <text x="200" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CRC-16: x^16 + x^12 + x^5 + 1 (CCITT)</text>
    <text x="200" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CRC-32: 0x04C11DB7 polynomial</text>
    <rect x="380" y="528" width="180" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="470" y="545" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Error Recovery</text>
    <text x="470" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Go-Back-N ARQ</text>
    <text x="470" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Selective Reject ARQ</text>
    <rect x="570" y="528" width="180" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="660" y="545" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Flow Control</text>
    <text x="660" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">RR: Receive Ready (ready)</text>
    <text x="660" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">RNR: Receive Not Ready</text>
  </g>
</svg>