<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
  </marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Random Access File Organization allows direct access to any record without reading preceding records from the beginning. This provides O(1) constant time access to any specific record stored on disk.">
  <rect x="0" y="10" width="800" height="40" fill="#1976d2"/>
  <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Random Access File Organization</text>
</g>

<g class="step" id="step1" data-narration="Sequential access reads records in order until found, taking O(n) time. Random access finds any record directly in O(1) time.">
  <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Sequential vs Random Access</text>
  <rect x="40" y="95" width="160" height="35" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
  <text x="120" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Sequential Access</text>
  <text x="120" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Read until found</text>
  <text x="120" y="132" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">O(n)</text>
  <rect x="220" y="95" width="160" height="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
  <text x="300" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Random Access</text>
  <text x="300" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Direct to location</text>
  <text x="300" y="132" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">O(1)</text>
  <line x1="400" y1="105" x2="440" y2="105" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="109" font-family="Arial" font-size="10" fill="#333">Tape: Sequential only</text>
  <text x="450" y="123" font-family="Arial" font-size="10" fill="#333">Disk: Supports both</text>
</g>

<g class="step" id="step2" data-narration="Relative file organization assigns each record a unique relative record number (RRN). The physical address is calculated as RRN minus one times the fixed record size in bytes.">
  <rect x="20" y="146" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Relative File Organization</text>
  <text x="40" y="188" font-family="Arial" font-size="10" fill="#333">Each record has a Relative Record Number (RRN)</text>
  <rect x="40" y="198" width="250" height="20" fill="#fff" stroke="#1976d2" stroke-width="1" rx="2"/>
  <text x="165" y="212" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Address = (RRN - 1) × Record Size</text>
  <rect x="320" y="195" width="180" height="25" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
  <text x="410" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Example: RRN=25, Size=100B</text>
  <text x="410" y="218" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Address = 2400 bytes</text>
  <rect x="520" y="195" width="200" height="25" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
  <text x="620" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Fixed-size slots required</text>
  <text x="620" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Internal fragmentation</text>
</g>

<g class="step" id="step3" data-narration="Hash functions map keys to storage addresses using mathematical formulas. Common hashing methods include division, mid-square, folding, and multiplication techniques for distributing records.">
  <rect x="20" y="234" width="760" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Direct Access Using Hashing</text>
  <text x="40" y="275" font-family="Arial" font-size="10" fill="#333">Hash function converts key to physical address:</text>
  <rect x="40" y="285" width="140" height="22" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
  <text x="110" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Division: Key mod P</text>
  <rect x="190" y="285" width="140" height="22" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
  <text x="260" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Mid-Square: Square, take middle</text>
  <rect x="340" y="285" width="140" height="22" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
  <text x="410" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Folding: Divide and add parts</text>
  <rect x="490" y="285" width="150" height="22" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
  <text x="565" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Multiplication: M × (Key × A)</text>
  <rect x="40" y="315" width="700" height="1" fill="#1976d2"/>
  <text x="40" y="332" font-family="Arial" font-size="10" fill="#333">Example: Keys 15, 22, 31, 17 with 11 buckets (P=11)</text>
  <text x="450" y="332" font-family="Arial" font-size="10" fill="#388e3c">15→4, 22→0, 31→9, 17→6</text>
</g>

<g class="step" id="step4" data-narration="Hash collisions occur when different keys map to the same storage address. Resolution methods include linear probing, quadratic probing, double hashing, and chaining with linked lists.">
  <rect x="20" y="342" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="40" y="364" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Collision Resolution Techniques</text>
  <rect x="40" y="380" width="200" height="35" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
  <text x="140" y="395" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Open Addressing</text>
  <text x="140" y="408" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Closed Hashing)</text>
  <rect x="250" y="380" width="60" height="20" fill="#fff" stroke="#9c27b0" stroke-width="1" rx="2"/>
  <text x="280" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Linear</text>
  <rect x="320" y="380" width="60" height="20" fill="#fff" stroke="#9c27b0" stroke-width="1" rx="2"/>
  <text x="350" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Quadratic</text>
  <rect x="390" y="380" width="60" height="20" fill="#fff" stroke="#9c27b0" stroke-width="1" rx="2"/>
  <text x="420" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Double</text>
  <rect x="500" y="380" width="120" height="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
  <text x="560" y="395" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Chaining</text>
  <text x="560" y="408" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Open Hashing)</text>
  <text x="640" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Linked lists</text>
  <text x="40" y="422" font-family="Arial" font-size="9" fill="#333">Linear probing: check next slot (addr+1, addr+2...)</text>
</g>

<g class="step" id="step5" data-narration="ISAM combines sequential and random access using indexes. It uses data files for records, index files for key-pointer pairs, and overflow files for handling new insertions efficiently.">
  <rect x="20" y="435" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="40" y="457" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Indexed Sequential Access Method (ISAM)</text>
  <text x="40" y="478" font-family="Arial" font-size="10" fill="#333">Three main components:</text>
  <rect x="40" y="488" width="140" height="20" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
  <text x="110" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Data File</text>
  <text x="110" y="513" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Sequential records</text>
  <rect x="190" y="488" width="140" height="20" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
  <text x="260" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Index File</text>
  <text x="260" y="513" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Key + pointers</text>
  <rect x="340" y="488" width="140" height="20" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
  <text x="410" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Overflow File</text>
  <text x="410" y="513" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">New insertions</text>
</g>

<g class="step" id="step6" data-narration="B+ trees are balanced multi-way trees with all data stored at leaf nodes. Leaf nodes are sequentially linked for efficient range queries with O(log n) access time complexity.">
  <rect x="20" y="523" width="760" height="65" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="40" y="545" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">B+ Trees in File Organization</text>
  <rect x="40" y="555" width="180" height="25" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
  <text x="130" y="567" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Balanced multi-way tree structure</text>
  <text x="130" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">All data at leaf level, sequential leaf links</text>
  <rect x="250" y="555" width="100" height="25" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
  <text x="300" y="567" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">O(log n) access</text>
  <text x="300" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">for any key</text>
  <rect x="370" y="555" width="100" height="25" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
  <text x="420" y="567" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Range queries</text>
  <text x="420" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Sequential scan</text>
</g>
</svg>