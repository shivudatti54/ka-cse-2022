<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Error Control in Data Communication ensures reliable transmission by detecting and correcting errors caused by noise, interference, and signal attenuation during data transfer.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Error Control in Data Communication</text>
  </g>

  <g class="step" id="step1" data-narration="Two primary error types exist in data transmission: single-bit errors affect isolated bits, while burst errors corrupt multiple consecutive bits due to impulse noise or fading.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Types of Errors</text>
    <rect x="40" y="95" width="150" height="35" fill="#c8e6c9" rx="3"/>
    <text x="115" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Single-Bit Error</text>
    <text x="115" y="123" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">1 bit corrupted</text>
    <text x="250" y="115" font-family="Arial" font-size="14" fill="#388e3c">→</text>
    <rect x="300" y="95" width="180" height="35" fill="#c8e6c9" rx="3"/>
    <text x="390" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Burst Error</text>
    <text x="390" y="123" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Multiple consecutive bits</text>
  </g>

  <g class="step" id="step2" data-narration="Simple parity adds one bit to make total 1s even (even parity) or odd (odd parity). It detects only odd numbers of bit errors.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#f57c00">Parity Checking</text>
    <text x="40" y="188" font-family="Arial" font-size="10" fill="#e65100">Data: 1011001 (4 ones)</text>
    <rect x="180" y="176" width="60" height="20" fill="#ffe0b2" rx="3"/>
    <text x="210" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Parity=0</text>
    <text x="260" y="190" font-family="Arial" font-size="10" fill="#f57c00">→ Transmit: 10110010</text>
    <text x="40" y="215" font-family="Arial" font-size="9" fill="#f57c00">Limitation: Cannot detect even number of bit errors (2,4,6...)</text>
  </g>

  <g class="step" id="step3" data-narration="CRC (Cyclic Redundancy Check) uses polynomial division where the sender appends zeros equal to generator degree, divides, and appends remainder as CRC bits.">
    <rect x="20" y="234" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#d32f2f">Cyclic Redundancy Check (CRC)</text>
    <text x="40" y="276" font-family="Arial" font-size="10" fill="#c62828">Data: 110101, Generator: 1011 (degree=3)</text>
    <text x="40" y="295" font-family="Arial" font-size="10" fill="#c62828">1. Append 3 zeros → 110101000</text>
    <text x="250" y="295" font-family="Arial" font-size="10" fill="#c62828">2. Divide by 1011</text>
    <text x="400" y="295" font-family="Arial" font-size="10" fill="#c62828">3. Remainder = 100</text>
    <rect x="520" y="280" width="140" height="22" fill="#ffcdd2" rx="3"/>
    <text x="590" y="296" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">CRC: 100</text>
    <text x="670" y="296" font-family="Arial" font-size="10" fill="#d32f2f">→ Send: 110101<tspan dy="0" font-size="8">100</tspan></text>
  </g>

  <g class="step" id="step4" data-narration="Hamming code uses the formula 2^r ≥ m+r+1 to calculate required parity bits. Parity bit positions are powers of 2: 1, 2, 4, 8, 16, and so on.">
    <rect x="20" y="322" width="760" height="95" fill="#f3e5f5" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Hamming Code</text>
    <text x="40" y="364" font-family="Arial" font-size="10" fill="#6a1b9a">For m=3 data bits: 2^r ≥ 3+r+1 → r=3 parity bits needed</text>
    <text x="40" y="382" font-family="Arial" font-size="10" fill="#6a1b9a">Codeword layout: p1 p2 d1 p3 d2 d3</text>
    <rect x="40" y="392" width="200" height="22" fill="#e1bee7" rx="3"/>
    <text x="140" y="407" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Data: 101 → Codeword: 101101</text>
    <text x="260" y="407" font-family="Arial" font-size="10" fill="#7b1fa2">Parity at positions:</text>
    <text x="380" y="407" font-family="Arial" font-size="9" fill="#6a1b9a">p1(1,3,5), p2(2,3,6), p3(4,5,6)</text>
  </g>

  <g class="step" id="step5" data-narration="During decoding, syndrome bits indicate error position by combining parity check results. Syndrome zero means no error; non-zero binary value shows exactly which bit to flip.">
    <rect x="20" y="425" width="760" height="87" fill="#e3f2fd" rx="5"/>
    <text x="40" y="447" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Hamming Decoding (Error Correction)</text>
    <text x="40" y="467" font-family="Arial" font-size="10" fill="#0d47a1">Received: 101001 (error at position 5)</text>
    <text x="40" y="485" font-family="Arial" font-size="10" fill="#0d47a1">Check parity bits → p1 fails, p2 passes, p3 fails</text>
    <rect x="280" y="455" width="180" height="24" fill="#bbdefb" rx="3"/>
    <text x="370" y="472" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Syndrome = 001 ⊕ 100 = 101</text>
    <text x="470" y="472" font-family="Arial" font-size="10" fill="#1565c0">(binary 5 = position 5)</text>
    <text x="40" y="505" font-family="Arial" font-size="10" fill="#1565c0">Flip bit 5: 101001 → 101101 (corrected!)</text>
  </g>

  <g class="step" id="step6" data-narration="CRC-32 is used in Ethernet, ZIP, and PNG formats, while CRC-16 serves USB and Bluetooth. Hamming SECDED corrects single-bit errors and detects double-bit errors.">
    <rect x="20" y="520" width="760" height="72" fill="#e8f5e9" rx="5"/>
    <text x="40" y="542" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Summary: Technique Comparison</text>
    <rect x="40" y="555" width="110" height="32" fill="#c8e6c9" rx="3"/>
    <text x="95" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Parity</text>
    <text x="95" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Odd errors</text>
    <rect x="160" y="555" width="110" height="32" fill="#c8e6c9" rx="3"/>
    <text x="215" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">CRC</text>
    <text x="215" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Burst errors</text>
    <rect x="280" y="555" width="110" height="32" fill="#c8e6c9" rx="3"/>
    <text x="335" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Hamming</text>
    <text x="335" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Correct single</text>
    <rect x="400" y="555" width="110" height="32" fill="#c8e6c9" rx="3"/>
    <text x="455" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">CRC-32</text>
    <text x="455" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Ethernet/ZIP</text>
    <rect x="520" y="555" width="110" height="32" fill="#c8e6c9" rx="3"/>
    <text x="575" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Checksum</text>
    <text x="575" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Multi-bit detect</text>
  </g>
</svg>