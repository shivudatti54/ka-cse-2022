<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Block Coding adds redundant bits to data for reliable transmission over noisy communication channels, enabling error detection and correction without requiring data retransmission.">
    <rect x="20" y="10" width="760" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Block Coding in Data Communication</text>
  </g>
  
  <g class="step" id="step1" data-narration="Block coding transforms k information bits into n-bit codewords by adding parity bits, enabling error detection and correction without retransmission.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">What is Block Coding?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#2e7d32">Block code transforms fixed-size blocks of k information bits into n-bit</text>
    <text x="40" y="108" font-family="Arial" font-size="10" fill="#2e7d32">codewords (n &gt; k) by adding (n - k) redundant parity bits.</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#2e7d32">Used for error control in communication channels prone to noise.</text>
    <rect x="580" y="70" width="180" height="55" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="670" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Input: k bits</text>
    <text x="670" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">↓ Encoding</text>
    <text x="670" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Output: n bits</text>
  </g>
  
  <g class="step" id="step2" data-narration="Code rate is k/n; lower rates mean more redundancy. Minimum Hamming distance determines detection up to d_min-1 and correction up to floor((d_min-1)/2) errors.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Fundamentals: Parameters</text>
    <text x="40" y="183" font-family="Arial" font-size="10" fill="#e65100">
      <tspan>Code Rate = k/n</tspan>
      <tspan dx="20">|</tspan>
      <tspan dx="20">d_min = minimum Hamming distance</tspan>
    </text>
    <text x="40" y="198" font-family="Arial" font-size="10" fill="#e65100">
      <tspan>Error Detection: d_min - 1 bits</tspan>
      <tspan dx="30">|</tspan>
      <tspan dx="30">Error Correction: floor((d_min - 1)/2) bits</tspan>
    </text>
    <rect x="300" y="160" width="130" height="55" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="365" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">Example: (7,4) Code</text>
    <text x="365" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">k=4, n=7</text>
    <text x="365" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Rate = 4/7 ≈ 0.57</text>
    <rect x="450" y="160" width="140" height="55" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="520" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">Hamming Distance</text>
    <text x="520" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">d_min = 3</text>
    <text x="520" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Detect 2, Correct 1</text>
    <rect x="610" y="160" width="150" height="55" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="685" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">Systematic Form</text>
    <text x="685" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Information bits + parity</text>
    <text x="685" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">G = [I_k | P]</text>
  </g>
  
  <g class="step" id="step3" data-narration="Linear block codes form a vector space over GF(2); the generator matrix G produces codewords c = u × G, while parity-check matrix H validates with syndrome s = c × H^T.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Linear Block Codes</text>
    <text x="40" y="271" font-family="Arial" font-size="10" fill="#6a1b9a">Linear if XOR of any two codewords produces another valid codeword.</text>
    <text x="40" y="286" font-family="Arial" font-size="10" fill="#6a1b9a">Generator Matrix G (k×n): Codeword c = u × G where u is information vector.</text>
    <text x="40" y="301" font-family="Arial" font-size="10" fill="#6a1b9a">Parity-Check Matrix H ((n-k)×n): Syndrome s = c × H^T; s = 0 means valid.</text>
    <rect x="550" y="245" width="210" height="58" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="655" y="262" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">Generator Matrix Example</text>
    <text x="655" y="278" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">G = [1 0 1 1 1</text>
    <text x="655" y="292" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">    0 1 1 0 1]</text>
  </g>
  
  <g class="step" id="step4" data-narration="Hamming codes achieve perfect single-bit error correction. For (7,4) code, parity bits at positions 1,2,4 cover specific bit groups; syndrome directly indicates error position.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Hamming Codes (7,4)</text>
    <text x="40" y="359" font-family="Arial" font-size="10" fill="#0d47a1">Parity at positions 1,2,4. Each parity covers specific bits: p1→{1,3,5,7}, p2→{2,3,6,7}, p4→{4,5,6,7}</text>
    <text x="40" y="374" font-family="Arial" font-size="10" fill="#0d47a1">Encoding data 1011: Place at positions 3,5,6,7. Calculate parity bits → Codeword: 1110011</text>
    <text x="40" y="389" font-family="Arial" font-size="10" fill="#0d47a1">Decoding: Syndrome s = r × H^T; binary value gives error position directly.</text>
    <rect x="520" y="330" width="240" height="62" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="640" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1" font-weight="bold">Syndrome Calculation</text>
    <text x="640" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Received: 1110111 (error at pos 5)</text>
    <text x="640" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Syndrome: s4s2s1 = 101₂ = 5 → Error at position 5</text>
  </g>
  
  <g class="step" id="step5" data-narration="Cyclic codes allow any cyclic shift of a codeword to remain valid, enabling efficient hardware implementation using shift registers. CRC provides strong error detection.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Cyclic Codes &amp; CRC</text>
    <text x="40" y="447" font-family="Arial" font-size="10" fill="#c62828">Cyclic codes: any cyclic shift of a valid codeword is also a codeword. Represented using polynomials.</text>
    <text x="40" y="462" font-family="Arial" font-size="10" fill="#c62828">Generator polynomial g(x) of degree (n-k) divides x^n - 1 in GF(2).</text>
    <text x="40" y="477" font-family="Arial" font-size="10" fill="#c62828">CRC: Cyclic Redundancy Check - error detection using polynomial division. CRC-8, CRC-16, CRC-32 standards.</text>
    <rect x="520" y="420" width="240" height="60" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="640" y="440" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828" font-weight="bold">CRC Applications</text>
    <text x="640" y="457" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Ethernet, USB, WiFi, ZIP files</text>
    <text x="640" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Detects burst errors up to CRC degree</text>
  </g>
  
  <g class="step" id="step6" data-narration="Single parity check is simplest: add one parity bit for even/odd parity. Product codes combine two codes bidimensionally. Used in memory ECC, networking, storage.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Other Codes &amp; Applications</text>
    <text x="40" y="535" font-family="Arial" font-size="10" fill="#2e7d32">Single Parity Check (SPC): k+1 code, detects single-bit errors, cannot correct. Used in serial communication.</text>
    <text x="40" y="550" font-family="Arial" font-size="10" fill="#2e7d32">Product Codes: Combine row and column codes for 2D burst error correction.</text>
    <rect x="40" y="560" width="720" height="20" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="400" y="575" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20" font-weight="bold">Applications: ECC Memory, Digital TV, Cellular Networks, Data Storage</text>
  </g>
</svg>