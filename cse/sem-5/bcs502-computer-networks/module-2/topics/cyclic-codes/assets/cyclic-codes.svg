<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1450" width="800" height="1450">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L1,4 Z" fill="#1976d2"/>
    </marker>
  </defs>

  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawPath {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; font-size: 11px; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 18px; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    .draw-line {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawPath 1.5s ease-out forwards;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="1450" fill="#f8f9fa"/>

  <!-- ==================== STEP 0: Title ==================== -->
  <g class="step" id="step0" data-narration="Welcome to Cyclic Codes - one of the most important classes of linear block codes with powerful algebraic structure.">
    <rect x="40" y="10" width="720" height="45" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="40" text-anchor="middle" fill="white" class="title-text">CYCLIC CODES</text>
    <text x="400" y="58" text-anchor="middle" fill="#e3f2fd" font-size="10">Linear Block Codes with Cyclic Shift Property</text>
  </g>

  <!-- ==================== STEP 1: Definition ==================== -->
  <g class="step" id="step1" data-narration="A cyclic code is a linear block code where any cyclic shift of a valid codeword remains a valid codeword. This is the defining property.">
    <rect x="40" y="70" width="720" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="92" fill="#1565c0" font-weight="bold" font-size="12">DEFINITION: Cyclic Code</text>
    <text x="60" y="110" fill="#333" font-size="10">A linear block code C of length n is cyclic if for every codeword (c₀,c₁,...,cₙ₋₁):</text>
    <text x="60" y="130" fill="#1976d2" font-family="Georgia, serif" font-size="11">(c₀,c₁,...,cₙ₋₁) ∈ C ⇒ (cₙ₋₁,c₀,c₁,...,cₙ₋₂) ∈ C</text>
    <text x="60" y="148" fill="#666" font-size="10">Any cyclic shift produces another valid codeword!</text>
    <!-- Visual: cyclic shift illustration -->
    <rect x="480" y="90" width="260" height="50" rx="5" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="495" y="108" fill="#333" font-size="9" font-family="monospace">1 0 1 1 0 0 1</text>
    <path d="M545 115 L575 115" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="585" y="108" fill="#333" font-size="9" font-family="monospace">1 1 0 1 1 0 0</text>
  </g>

  <!-- ==================== STEP 2: Why Cyclic Codes Matter ==================== -->
  <g class="step" id="step2" data-narration="Cyclic codes are widely used in practice - CRC codes for error detection in Ethernet, ZIP files, PNG images, and many protocols.">
    <rect x="40" y="170" width="720" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="192" fill="#e65100" font-weight="bold" font-size="12">Why Cyclic Codes Matter</text>
    <text x="60" y="212" fill="#333" font-size="10">• Easy hardware implementation using shift registers with feedback</text>
    <text x="60" y="228" fill="#333" font-size="10">• CRC (Cyclic Redundancy Check) - backbone of error detection</text>
    <text x="60" y="244" fill="#333" font-size="10">• Foundation for BCH codes and Reed-Solomon codes</text>
    <!-- Applications icons -->
    <rect x="450" y="195" width="45" height="30" rx="4" fill="#4caf50"/>
    <text x="472" y="215" fill="white" font-size="9" font-weight="bold">ETH</text>
    <rect x="505" y="195" width="45" height="30" rx="4" fill="#2196f3"/>
    <text x="527" y="215" fill="white" font-size="9" font-weight="bold">ZIP</text>
    <rect x="560" y="195" width="45" height="30" rx="4" fill="#9c27b0"/>
    <text x="582" y="215" fill="white" font-size="9" font-weight="bold">PNG</text>
    <rect x="615" y="195" width="45" height="30" rx="4" fill="#ff5722"/>
    <text x="637" y="215" fill="white" font-size="9" font-weight="bold">RS</text>
  </g>

  <!-- ==================== STEP 3: Polynomial Representation ==================== -->
  <g class="step" id="step3" data-narration="In cyclic codes, codewords are represented as polynomials. A codeword (c₀,c₁,...,cₙ₋₁) corresponds to polynomial c(x) = c₀ + c₁x + ... + cₙ₋₁xⁿ⁻¹.">
    <rect x="40" y="270" width="720" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="292" fill="#2e7d32" font-weight="bold" font-size="12">Polynomial Representation</text>
    <text x="60" y="312" fill="#333" font-size="10">Codewords are polynomials of degree less than n:</text>
    <text x="60" y="332" fill="#1b5e20" font-family="Georgia, serif" font-size="14">c(x) = c₀ + c₁x + c₂x² + ... + cₙ₋₁xⁿ⁻¹</text>
    <text x="60" y="352" fill="#333" font-size="10">All polynomial operations are modulo (xⁿ - 1), which means xⁿ ≡ 1</text>
    <!-- Visual: polynomial example -->
    <rect x="400" y="305" width="340" height="50" rx="5" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="420" y="325" fill="#333" font-size="10">Example: c = (1,1,0,1,0,0,1)</text>
    <text x="420" y="345" fill="#1b5e20" font-family="Georgia, serif" font-size="12">c(x) = 1 + x + x³ + x⁶</text>
  </g>

  <!-- ==================== STEP 4: Generator Polynomial ==================== -->
  <g class="step" id="step4" data-narration="The generator polynomial g(x) uniquely determines a cyclic code. It must divide xⁿ-1, and its degree r = n-k gives the number of parity bits.">
    <rect x="40" y="385" width="720" height="100" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="407" fill="#6a1b9a" font-weight="bold" font-size="12">Generator Polynomial g(x)</text>
    <text x="60" y="427" fill="#333" font-size="10">The unique monic polynomial that generates all codewords:</text>
    <text x="60" y="447" fill="#4a148c" font-family="Georgia, serif" font-size="14">c(x) = m(x) × g(x)</text>
    <text x="60" y="467" fill="#333" font-size="10">• g(x) must divide xⁿ - 1</text>
    <text x="60" y="480" fill="#333" font-size="10">• degree(g) = n - k = r (number of parity bits)</text>
    <!-- Visual: factorization -->
    <rect x="380" y="420" width="360" height="55" rx="5" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="440" fill="#333" font-size="10">For (7,4) code: x⁷-1 = (x+1)(x³+x+1)(x³+x²+1)</text>
    <text x="400" y="460" fill="#6a1b9a" font-size="11">g(x) = x³ + x + 1 (degree 3)</text>
  </g>

  <!-- ==================== STEP 5: Generator Matrix ==================== -->
  <g class="step" id="step5" data-narration="The generator matrix G has k rows, each a cyclic shift of g(x). The cyclic property means we conceptually only need one row - the others are its shifts.">
    <rect x="40" y="500" width="720" height="90" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="522" fill="#1565c0" font-weight="bold" font-size="12">Generator Matrix G</text>
    <text x="60" y="542" fill="#333" font-size="10">For g(x) = x³ + x + 1 (degree 3), the (7,4) generator matrix:</text>
    <!-- Matrix visual -->
    <rect x="60" y="555" width="600" height="25" rx="3" fill="white" stroke="#1976d2"/>
    <text x="70" y="572" fill="#1565c0" font-family="monospace" font-size="10">G = [ 1 0 1 1 0 0 0 ]  ← g(x)</text>
    <rect x="60" y="582" width="600" height="25" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="70" y="599" fill="#1565c0" font-family="monospace" font-size="10">    [ 0 1 0 1 1 0 0 ]  ← x·g(x)</text>
    <text x="500" y="572" fill="#666" font-size="9">(k=4 rows)</text>
  </g>

  <!-- ==================== STEP 6: Parity Check Polynomial ==================== -->
  <g class="step" id="step6" data-narration="The parity check polynomial h(x) satisfies g(x) × h(x) = xⁿ - 1. The syndrome of received word r(x) is the remainder when divided by g(x).">
    <rect x="40" y="605" width="720" height="90" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="60" y="627" fill="#c62828" font-weight="bold" font-size="12">Parity Check Polynomial h(x)</text>
    <text x="60" y="647" fill="#333" font-size="10">If xⁿ - 1 = g(x) × h(x), then h(x) is the parity check polynomial:</text>
    <text x="60" y="667" fill="#b71c1c" font-family="Georgia, serif" font-size="14">g(x) × h(x) = xⁿ - 1</text>
    <text x="60" y="687" fill="#333" font-size="10">• degree(h) = k</text>
    <!-- Visual -->
    <rect x="350" y="640" width="390" height="45" rx="5" fill="white" stroke="#f44336"/>
    <text x="370" y="660" fill="#333" font-size="10">For (7,4) with g(x) = x³+x+1:</text>
    <text x="370" y="678" fill="#c62828" font-family="Georgia, serif" font-size="11">h(x) = x⁴ + x³ + x² + 1</text>
  </g>

  <!-- ==================== STEP 7: Non-Systematic Encoding ==================== -->
  <g class="step" id="step7" data-narration="In non-systematic encoding, multiply message polynomial m(x) by generator polynomial g(x). The message bits are NOT directly visible in the codeword.">
    <rect x="40" y="710" width="720" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="732" fill="#2e7d32" font-weight="bold" font-size="12">Non-Systematic Encoding: c(x) = m(x) × g(x)</text>
    <text x="60" y="752" fill="#333" font-size="10">Message m = (1,0,1,1) → m(x) = 1 + x² + x³</text>
    <text x="60" y="772" fill="#333" font-size="10">g(x) = x³ + x + 1</text>
    <!-- Calculation -->
    <rect x="60" y="785" width="680" height="20" rx="3" fill="white" stroke="#388e3c"/>
    <text x="75" y="800" fill="#1b5e20" font-family="monospace" font-size="10">c(x) = (1+x²+x³)(x³+x+1) = x⁶+x⁵+x⁴+x²+x+1</text>
    <text x="60" y="820" fill="#333" font-size="10">Codeword: c = (1,1,1,0,1,1,1)</text>
  </g>

  <!-- ==================== STEP 8: Systematic Encoding ==================== -->
  <g class="step" id="step8" data-narration="In systematic encoding, the message appears unchanged in the codeword. Multiply by x^(n-k), divide by g(x), subtract remainder, then add.">
    <rect x="40" y="825" width="720" height="100" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="847" fill="#e65100" font-weight="bold" font-size="12">Systematic Encoding</text>
    <text x="60" y="867" fill="#333" font-size="10">Step 1: Multiply message by x^(n-k)</text>
    <text x="60" y="885" fill="#333" font-size="10">Step 2: Divide by g(x), get remainder r(x)</text>
    <text x="60" y="903" fill="#333" font-size="10">Step 3: c(x) = x^(n-k)·m(x) - r(x)</text>
    <!-- Example -->
    <rect x="350" y="860" width="395" height="55" rx="5" fill="white" stroke="#ff9800"/>
    <text x="370" y="880" fill="#333" font-size="10">m = (1,0,0,1) → m(x)=1+x³</text>
    <text x="370" y="900" fill="#333" font-size="10">x³·m(x) = x⁶+x³ ÷ g(x): remainder = x+1</text>
    <text x="370" y="918" fill="#e65100" font-family="monospace" font-size="10">c = (1,1,0,1,0,0,1)</text>
  </g>

  <!-- ==================== STEP 9: Syndrome Computation ==================== -->
  <g class="step" id="step9" data-narration="To detect errors, compute the syndrome s(x) = r(x) mod g(x). If s(x) = 0, no error detected. Non-zero syndrome indicates errors in the received word.">
    <rect x="40" y="940" width="720" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="962" fill="#1565c0" font-weight="bold" font-size="12">Syndrome Computation: s(x) = r(x) mod g(x)</text>
    <text x="60" y="982" fill="#333" font-size="10">Received: r = (1,1,1,0,1,1,0) → r(x) = 1+x+x²+x³+x⁴+x⁵</text>
    <text x="60" y="1002" fill="#333" font-size="10">Divide r(x) by g(x) = x³+x+1:</text>
    <!-- Division visual -->
    <rect x="60" y="1012" width="680" height="22" rx="3" fill="white" stroke="#1976d2"/>
    <text x="75" y="1028" fill="#1565c0" font-family="monospace" font-size="10">r(x) ÷ g(x): remainder = x² + x + 1</text>
    <text x="60" y="1045" fill="#c62828" font-weight="bold" font-size="11">Syndrome s(x) = x² + x + 1 ≠ 0 → Error detected!</text>
  </g>

  <!-- ==================== STEP 10: Error Detection Capability ==================== -->
  <g class="step" id="step10" data-narration="Cyclic codes detect all error patterns of weight less than minimum distance d, and ALL burst errors of length ≤ degree of g(x).">
    <rect x="40" y="1055" width="720" height="90" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="1077" fill="#6a1b9a" font-weight="bold" font-size="12">Error Detection Capability</text>
    <text x="60" y="1097" fill="#333" font-size="10">• Detects ALL error patterns of weight &lt; d (minimum distance)</text>
    <text x="60" y="1115" fill="#333" font-size="10">• Detects ALL burst errors of length ≤ degree of g(x)</text>
    <text x="60" y="1133" fill="#333" font-size="10">• Error-correcting capability: t = ⌊(d-1)/2⌋</text>
    <!-- CRC visual -->
    <rect x="400" y="1085" width="345" height="50" rx="5" fill="white" stroke="#9c27b0"/>
    <text x="420" y="1105" fill="#333" font-size="10">CRC-32 (degree 32):</text>
    <text x="420" y="1125" fill="#666" font-size="9">Detects all bursts ≤ 32 bits</text>
    <text x="420" y="1140" fill="#666" font-size="9">Prob. undetected error ≈ 2⁻³²</text>
  </g>

  <!-- ==================== STEP 11: CRC Applications ==================== -->
  <g class="step" id="step11" data-narration="CRC codes are practical cyclic codes used everywhere. CRC-32 uses polynomial x³²+x²⁶+x²³+x²²+x¹⁶+x¹²+x¹¹+x¹⁰+x⁸+x⁷+x⁵+x⁴+x²+x+1.">
    <rect x="40" y="1160" width="720" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="1182" fill="#2e7d32" font-weight="bold" font-size="12">CRC Codes: Practical Applications</text>
    <text x="60" y="1202" fill="#333" font-size="10">Standard CRC polynomials used worldwide:</text>
    <!-- CRC table -->
    <rect x="60" y="1215" width="160" height="25" rx="3" fill="white" stroke="#388e3c"/>
    <text x="70" y="1232" fill="#333" font-size="9">CRC-8: x⁸+x²+x+1</text>
    <rect x="230" y="1215" width="180" height="25" rx="3" fill="white" stroke="#388e3c"/>
    <text x="240" y="1232" fill="#333" font-size="9">CRC-16: x¹⁶+x¹²+x⁵+1</text>
    <rect x="420" y="1215" width="220" height="25" rx="3" fill="white" stroke="#388e3c"/>
    <text x="430" y="1232" fill="#333" font-size="9">CRC-32: x³²+x²⁶+x²³+x²²+...</text>
    <text x="650" y="1232" fill="#666" font-size="9">(Ethernet, ZIP)</text>
  </g>

  <!-- ==================== STEP 12: Connection to BCH and RS ==================== -->
  <g class="step" id="step12" data-narration="BCH codes and Reed-Solomon codes are special types of cyclic codes. This makes cyclic codes foundational for understanding advanced coding schemes.">
    <rect x="40" y="1260" width="720" height="75" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="1282" fill="#e65100" font-weight="bold" font-size="12">Connection to Advanced Codes</text>
    <!-- Hierarchy diagram -->
    <rect x="80" y="1300" width="140" height="35" rx="5" fill="#ff9800"/>
    <text x="150" y="1323" fill="white" font-size="11" text-anchor="middle" font-weight="bold">Cyclic Codes</text>
    <path d="M150 1335 L200 1355" stroke="#e65100" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <path d="M150 1335 L100 1355" stroke="#e65100" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="210" y="1350" width="120" height="35" rx="5" fill="#7b1fa2"/>
    <text x="270" y="1373" fill="white" font-size="10" text-anchor="middle" font-weight="bold">BCH Codes</text>
    <rect x="50" y="1350" width="130" height="35" rx="5" fill="#c62828"/>
    <text x="115" y="1373" fill="white" font-size="10" text-anchor="middle" font-weight="bold">Reed-Solomon</text>
  </g>

  <!-- ==================== STEP 13: Key Takeaways ==================== -->
  <g class="step" id="step13" data-narration="Remember: cyclic codes are ideals in the ring GF(q)[x]/(xⁿ-1), g(x) divides xⁿ-1, syndrome is the remainder, and CRC codes are everywhere!">
    <rect x="40" y="1350" width="720" height="75" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="1372" text-anchor="middle" fill="white" font-weight="bold" font-size="14">KEY TAKEAWAYS</text>
    <text x="400" y="1392" text-anchor="middle" fill="#e3f2fd" font-size="10">Cyclic shift property • g(x) divides xⁿ-1 • Codeword: c=m·g • Syndrome: r mod g • Burst detection ≤ deg(g)</text>
    <text x="400" y="1412" text-anchor="middle" fill="#ffeb99" font-size="10">Foundation for CRC, BCH, and Reed-Solomon codes</text>
  </g>

  <!-- Animations for all steps -->
  <script type="text/javascript">
</svg>