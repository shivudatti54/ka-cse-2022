<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="We study coordination and agreement in group communication for distributed systems, covering multicast protocols, consensus algorithms, and fault tolerance mechanisms for reliable messaging.">
<rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Coordination and Agreement in Group Communication</text>
</g>

<g class="step" id="step1" data-narration="Group communication enables sending messages to multiple processes simultaneously. Groups can be closed or open, providing essential reliability, ordering guarantees, and dynamic membership management capabilities.">
<rect x="10" y="58" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="20" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Group Communication Basics</text>
<rect x="20" y="88" width="230" height="40" rx="3" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
<text x="135" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Closed Groups</text>
<text x="135" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Members only send</text>
<rect x="260" y="88" width="230" height="40" rx="3" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
<text x="375" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Open Groups</text>
<text x="375" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">External processes allowed</text>
<rect x="500" y="88" width="280" height="40" rx="3" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
<text x="640" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Key Properties</text>
<text x="640" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Reliability, Ordering, Membership</text>
</g>

<g class="step" id="step2" data-narration="Multicast types differ in delivery guarantees: Basic has no delivery guarantees, Reliable ensures all correct processes deliver messages, and Ordered maintains proper sequence across recipients.">
<rect x="10" y="146" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="20" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Types of Multicast Communication</text>
<rect x="20" y="176" width="240" height="40" rx="3" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
<text x="140" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">B-Multicast (Basic)</text>
<text x="140" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">No delivery guarantees</text>
<rect x="270" y="176" width="240" height="40" rx="3" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
<text x="390" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">R-Multicast (Reliable)</text>
<text x="390" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">All correct processes deliver</text>
<rect x="520" y="176" width="260" height="40" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
<text x="650" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Ordered Multicast</text>
<text x="650" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">FIFO, Causal, or Total ordering</text>
</g>

<g class="step" id="step3" data-narration="The FLP impossibility result mathematically proves that no deterministic algorithm can guarantee consensus in asynchronous systems with even a single crash failure possibility.">
<rect x="10" y="234" width="780" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="20" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Consensus Problem &amp; FLP Impossibility</text>
<rect x="20" y="264" width="360" height="40" rx="3" fill="#ffffff" stroke="#ef9a9a" stroke-width="1"/>
<text x="200" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">FLP Impossibility Result</text>
<text x="200" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">No deterministic consensus in async with 1 crash</text>
<rect x="390" y="264" width="390" height="40" rx="3" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
<text x="585" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Consensus Requirements</text>
<text x="585" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Agreement, Validity, Termination</text>
</g>

<g class="step" id="step4" data-narration="Paxos achieves distributed consensus using proposers, acceptors, and learners through prepare-promise and propose-accept phases, requiring majority approval from acceptors to finalize decisions.">
<rect x="10" y="322" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="20" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Paxos Consensus Algorithm</text>
<rect x="20" y="352" width="240" height="40" rx="3" fill="#ffffff" stroke="#a5d6a7" stroke-width="1"/>
<text x="140" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Phase 1: Prepare</text>
<text x="140" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Proposer sends prepare with number</text>
<rect x="270" y="352" width="240" height="40" rx="3" fill="#ffffff" stroke="#a5d6a7" stroke-width="1"/>
<text x="390" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Phase 2: Accept</text>
<text x="390" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Acceptors promise and accept proposal</text>
<rect x="520" y="352" width="260" height="40" rx="3" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
<text x="650" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Majority = Consensus</text>
<text x="650" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2f+1 of n processes needed</text>
</g>

<g class="step" id="step5" data-narration="Raft simplifies consensus with leader election and log replication. Byzantine tolerance requires n greater than or equal to 3f plus 1 processes to tolerate f failures.">
<rect x="10" y="410" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="20" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Raft Algorithm &amp; Byzantine Fault Tolerance</text>
<rect x="20" y="440" width="360" height="40" rx="3" fill="#ffffff" stroke="#a5d6a7" stroke-width="1"/>
<text x="200" y="456" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Raft Three Subproblems</text>
<text x="200" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Leader Election, Log Replication, Safety</text>
<rect x="390" y="440" width="390" height="40" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
<text x="585" y="456" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">Byzantine Formula: n ≥ 3f + 1</text>
<text x="585" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Tolerate f Byzantine failures</text>
</g>

<g class="step" id="step6" data-narration="Total ordered multicast uses sequencers for global message ordering. View synchrony ensures atomic group membership changes are seen identically by all participating processes.">
<rect x="10" y="498" width="780" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="20" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Total Ordering &amp; View Synchrony</text>
<rect x="20" y="528" width="240" height="50" rx="3" fill="#ffffff" stroke="#ffcc80" stroke-width="1"/>
<text x="140" y="544" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Total Ordered Multicast</text>
<text x="140" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Sequencer assigns global</text>
<text x="140" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">sequence numbers</text>
<rect x="270" y="528" width="240" height="50" rx="3" fill="#ffffff" stroke="#ffcc80" stroke-width="1"/>
<text x="390" y="544" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">View Synchrony</text>
<text x="390" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">All processes see same</text>
<text x="390" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">membership sequence</text>
<rect x="520" y="528" width="260" height="50" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
<text x="650" y="544" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Key Formulas to Remember</text>
<text x="650" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">FLP: async impossible | 3f+1: Byzantine</text>
</g>
</svg>