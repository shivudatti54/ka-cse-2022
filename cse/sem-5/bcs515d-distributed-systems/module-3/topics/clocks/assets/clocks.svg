<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Clocks are the heartbeat of digital systems, synchronizing all operations from simple watches to complex multi-core processors and embedded devices.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Clocks in Digital Systems</text>
  </g>
  
  <!-- step1: Clock Signal Fundamentals -->
  <g class="step" id="step1" data-narration="A clock signal is a periodic square wave alternating between HIGH and LOW voltage levels at a specific frequency for timing control.">
    <rect x="50" y="58" width="700" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Clock Signal Fundamentals</text>
    <rect x="70" y="88" width="120" height="40" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="130" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Period (T)</text>
    <text x="130" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Time between edges</text>
    <rect x="210" y="88" width="120" height="40" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="270" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Frequency (f)</text>
    <text x="270" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">f = 1/T</text>
    <rect x="350" y="88" width="120" height="40" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="410" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Duty Cycle</text>
    <text x="410" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">% time HIGH</text>
    <path d="M550 88 L550 108 L650 108 L650 118 L520 128 L520 128" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="560" y="105" font-family="Arial" font-size="9" fill="#333">Square Wave</text>
  </g>
  
  <!-- step2: Clock Generation Circuits -->
  <g class="step" id="step2" data-narration="Crystal oscillators provide stable precise frequencies using quartz crystal resonance, while ring oscillators use odd numbers of inverters in feedback loops.">
    <rect x="50" y="146" width="700" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Clock Generation Circuits</text>
    <rect x="70" y="180" width="180" height="35" rx="4" fill="#fff" stroke="#388e3c"/>
    <text x="160" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Crystal Oscillator</text>
    <text x="160" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">High stability, precise</text>
    <rect x="270" y="180" width="180" height="35" rx="4" fill="#fff" stroke="#388e3c"/>
    <text x="360" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Ring Oscillator</text>
    <text x="360" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Odd inverters in loop</text>
    <rect x="470" y="180" width="180" height="35" rx="4" fill="#fff" stroke="#388e3c"/>
    <text x="560" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Voltage-Controlled VCO</text>
    <text x="560" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Frequency by voltage</text>
  </g>
  
  <!-- step3: Flip-Flop Timing Parameters -->
  <g class="step" id="step3" data-narration="Flip-flops require setup time before the clock edge and hold time after, with clock-to-Q delay affecting when output data becomes valid.">
    <rect x="50" y="234" width="700" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Flip-Flop Timing Parameters</text>
    <rect x="70" y="268" width="140" height="35" rx="4" fill="#fff" stroke="#ff9800"/>
    <text x="140" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Setup Time (tsu)</text>
    <text x="140" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Stable before edge</text>
    <rect x="230" y="268" width="140" height="35" rx="4" fill="#fff" stroke="#ff9800"/>
    <text x="300" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Hold Time (th)</text>
    <text x="300" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Stable after edge</text>
    <rect x="390" y="268" width="140" height="35" rx="4" fill="#fff" stroke="#ff9800"/>
    <text x="460" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Clock-to-Q (tcq)</text>
    <text x="460" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Output delay</text>
    <text x="600" y="280" font-family="Arial" font-size="9" fill="#333">Tmin = tcq + tcomb + tsu</text>
    <text x="600" y="295" font-family="Arial" font-size="9" fill="#333">fmax = 1 / Tmin</text>
  </g>
  
  <!-- step4: Synchronous vs Asynchronous -->
  <g class="step" id="step4" data-narration="Synchronous systems use a common clock signal for predictable timing and easier design, while asynchronous systems rely on handshaking signals between components.">
    <rect x="50" y="322" width="700" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Synchronous vs Asynchronous Systems</text>
    <rect x="70" y="356" width="280" height="35" rx="4" fill="#fff" stroke="#9c27b0"/>
    <text x="210" y="375" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Synchronous</text>
    <text x="210" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Common clock, predictable, easier design</text>
    <rect x="370" y="356" width="280" height="35" rx="4" fill="#fff" stroke="#9c27b0"/>
    <text x="510" y="375" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Asynchronous</text>
    <text x="510" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Handshaking, complex, lower power</text>
  </g>
  
  <!-- step5: Clock Distribution and Skew -->
  <g class="step" id="step5" data-narration="Clock skew is the arrival time difference of the clock signal at different components, potentially causing setup and hold violations if excessive skew occurs.">
    <rect x="50" y="410" width="700" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Clock Distribution and Skew</text>
    <rect x="70" y="448" width="200" height="32" rx="4" fill="#fff" stroke="#f44336"/>
    <text x="170" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Clock Skew (Tskew)</text>
    <text x="170" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Arrival time difference</text>
    <text x="300" y="455" font-family="Arial" font-size="9" fill="#333">Setup with skew:</text>
    <text x="300" y="468" font-family="Arial" font-size="9" fill="#333">T ≥ tcq + tcomb + tsu + Tskew</text>
    <text x="300" y="481" font-family="Arial" font-size="9" fill="#333">Hold: th ≤ tcq - Tskew</text>
    <rect x="550" y="448" width="180" height="32" rx="4" fill="#fff" stroke="#f44336"/>
    <text x="640" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Clock Tree</text>
    <text x="640" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Buffers minimize skew</text>
  </g>
  
  <!-- step6: Clock Gating and Dividers -->
  <g class="step" id="step6" data-narration="Clock gating saves significant power by disabling unused circuit blocks, while clock dividers reduce frequency using counters and PLL circuits for multiplication.">
    <rect x="50" y="498" width="700" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Clock Gating and Dividers</text>
    <rect x="70" y="532" width="220" height="45" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="180" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Clock Gating</text>
    <text x="180" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Disable clock to save power</text>
    <text x="180" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">P = CV²f (dynamic)</text>
    <rect x="310" y="532" width="220" height="45" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="420" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Clock Dividers</text>
    <text x="420" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Counter-based division</text>
    <text x="420" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Out = f / N</text>
    <rect x="550" y="532" width="180" height="45" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="640" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">PLL</text>
    <text x="640" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Multiply frequency</text>
    <text x="640" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Clock multiplication</text>
  </g>
</svg>