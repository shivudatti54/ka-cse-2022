<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Remote Procedure Call RPC is a protocol that lets a program execute code on a remote system as if it were a local function call">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Remote Procedure Call (RPC) - Architecture and Concepts</text>
  </g>
  
  <g class="step" id="step1" data-narration="RPC uses a client-server model where the client process initiates a procedure call that executes transparently on a remote server">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="30" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">RPC Architecture Overview</text>
    <rect x="30" y="90" width="100" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="80" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Client</text>
    <text x="80" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Application</text>
    <line x1="130" y1="110" x2="250" y2="110" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="250" y="90" width="100" height="40" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="300" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Client Stub</text>
    <text x="300" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">(Proxy)</text>
    <line x1="350" y1="110" x2="420" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="420" y="90" width="80" height="40" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="460" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Network</text>
    <text x="460" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Transport</text>
    <line x1="500" y1="110" x2="570" y2="110" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="570" y="90" width="100" height="40" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="620" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Server Stub</text>
    <text x="620" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">(Skeleton)</text>
    <line x1="670" y1="110" x2="740" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="740" y="90" width="40" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="760" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Server</text>
  </g>
  
  <g class="step" id="step2" data-narration="The stub acts as a proxy on the client side, while the skeleton serves as the server side proxy, hiding network communication details">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="30" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Stub and Skeleton</text>
    <rect x="30" y="180" width="180" height="38" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="120" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Client Stub</text>
    <text x="120" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Marshals parameters</text>
    <text x="120" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Sends request to server</text>
    <rect x="230" y="180" width="180" height="38" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="320" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Skeleton (Server Stub)</text>
    <text x="320" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Unmarshals parameters</text>
    <text x="320" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Dispatches to procedure</text>
    <rect x="430" y="180" width="180" height="38" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="520" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">IDL Compiler</text>
    <text x="520" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Generates both stubs</text>
    <text x="520" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">from interface definition</text>
    <rect x="630" y="180" width="150" height="38" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="705" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Stubs provide</text>
    <text x="705" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Type safety and</text>
    <text x="705" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Platform independence</text>
  </g>
  
  <g class="step" id="step3" data-narration="IDL defines language-agnostic interfaces for cross-platform compatibility while XDR standardizes data representation across different computer systems for network communication and marshalling">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="30" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">IDL and XDR</text>
    <rect x="30" y="268" width="240" height="38" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="150" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">IDL (Interface Definition Language)</text>
    <text x="150" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Language-agnostic interface spec</text>
    <text x="150" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Defines data types and procedure signatures</text>
    <rect x="290" y="268" width="240" height="38" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="410" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">XDR (External Data Representation)</text>
    <text x="410" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Standard format for data serialization</text>
    <text x="410" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Handles heterogeneous systems</text>
    <rect x="550" y="268" width="230" height="38" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="665" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Marshalling / Unmarshalling</text>
    <text x="665" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Converts data to byte stream</text>
    <text x="665" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Reverse operation at destination</text>
  </g>
  
  <g class="step" id="step4" data-narration="RPC binding locates servers through static binding with compile-time addresses or dynamic binding using registries like portmapper or rpcbind for service discovery">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="30" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Binding and Location Services</text>
    <rect x="30" y="356" width="160" height="38" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="110" y="371" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Static Binding</text>
    <text x="110" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Server address known</text>
    <text x="110" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">at compile time</text>
    <rect x="200" y="356" width="160" height="38" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="280" y="371" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Dynamic Binding</text>
    <text x="280" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Queries registry like</text>
    <text x="280" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">portmap/rpcbind</text>
    <rect x="370" y="356" width="160" height="38" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="450" y="371" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Message Queues</text>
    <text x="450" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Asynchronous RPC</text>
    <text x="450" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Persistent storage</text>
    <rect x="540" y="356" width="240" height="38" rx="3" fill="#ffccbc" stroke="#f44336"/>
    <text x="660" y="371" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">Portmapper / Rpcbind</text>
    <text x="660" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Maps program numbers</text>
    <text x="660" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">to network ports</text>
  </g>
  
  <g class="step" id="step5" data-narration="RPC semantics define reliability levels: at-most-once prevents duplicate execution, at-least-once guarantees execution but may repeat, and exactly-once is ideal but complex to implement">
    <rect x="10" y="410" width="780" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="30" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">RPC Semantics</text>
    <rect x="30" y="444" width="240" height="38" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="150" y="459" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">At-Most-Once</text>
    <text x="150" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Executes zero or one time</text>
    <text x="150" y="482" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Prevents duplicate execution</text>
    <rect x="280" y="444" width="240" height="38" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="400" y="459" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">At-Least-Once</text>
    <text x="400" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Executes at least once</text>
    <text x="400" y="482" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">May execute multiple times</text>
    <rect x="530" y="444" width="250" height="38" rx="3" fill="#ef9a9a" stroke="#b71c1c"/>
    <text x="655" y="459" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Exactly-Once</text>
    <text x="655" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Executes exactly once</text>
    <text x="655" y="482" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Ideal but complex to implement</text>
  </g>
  
  <g class="step" id="step6" data-narration="RPC communication types include synchronous blocking calls where client waits for response, asynchronous with callbacks or futures for non-blocking, and one-way fire-and-forget requests">
    <rect x="10" y="498" width="780" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="30" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Types of RPC Communication</text>
    <rect x="30" y="532" width="230" height="48" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="145" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Synchronous RPC</text>
    <text x="145" y="564" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Client blocks until</text>
    <text x="145" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">response is received</text>
    <rect x="270" y="532" width="230" height="48" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="385" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Asynchronous RPC</text>
    <text x="385" y="564" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Client continues execution</text>
    <text x="385" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">using callbacks or futures</text>
    <rect x="510" y="532" width="270" height="48" rx="3" fill="#a5d6a7" stroke="#1b5e20"/>
    <text x="645" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">One-Way RPC (Fire-and-Forget)</text>
    <text x="645" y="564" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Client sends request but</text>
    <text x="645" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">does not wait for response</text>
  </g>
</svg>