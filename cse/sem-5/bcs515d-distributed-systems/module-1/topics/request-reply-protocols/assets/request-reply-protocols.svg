<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers request-reply protocols, the fundamental foundation of client-server communication in networks used for reliable data exchange between distributed systems.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Request-Reply Protocols</text>
  </g>
  
  <!-- step1: Basic Request-Reply Pattern -->
  <g class="step" id="step1" data-narration="The basic pattern has four sequential steps: the client sends a request, the server processes it, the server sends a reply, and the client receives the response message.">
    <rect x="20" y="58" width="760" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Basic Request-Reply Pattern</text>
    
    <!-- Client box -->
    <rect x="50" y="88" width="80" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="90" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Client</text>
    
    <!-- Arrow to Request -->
    <line x1="130" y1="108" x2="170" y2="108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Request Message -->
    <rect x="180" y="88" width="100" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="230" y="106" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Request</text>
    <text x="230" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Message</text>
    
    <!-- Arrow to Server -->
    <line x1="280" y1="108" x2="340" y2="108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Server box -->
    <rect x="350" y="88" width="80" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="390" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Server</text>
    
    <!-- Arrow to Reply -->
    <line x1="430" y1="108" x2="490" y2="108" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowgreen)"/>
    
    <!-- Reply Message -->
    <rect x="500" y="88" width="100" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="550" y="106" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Reply</text>
    <text x="550" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Message</text>
    
    <!-- Arrow to Client -->
    <line x1="600" y1="108" x2="660" y2="108" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowgreen)"/>
    
    <text x="700" y="113" font-family="Arial" font-size="9" fill="#666">4-step flow</text>
  </g>
  
  <!-- step2: Types of Communication -->
  <g class="step" id="step2" data-narration="There are three primary communication types: Synchronous blocks the client until response arrives, Asynchronous uses callbacks to handle replies, and One-way requests require no reply at all.">
    <rect x="20" y="151" width="760" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Types of Request-Reply Communication</text>
    
    <!-- Synchronous -->
    <rect x="50" y="180" width="200" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="150" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Synchronous</text>
    <text x="150" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Client blocks until reply arrives</text>
    
    <!-- Asynchronous -->
    <rect x="280" y="180" width="200" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="380" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Asynchronous</text>
    <text x="380" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Continue processing, callback handles reply</text>
    
    <!-- One-Way -->
    <rect x="510" y="180" width="200" height="50" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="610" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">One-Way Request</text>
    <text x="610" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">No reply expected (fire-and-forget)</text>
  </g>
  
  <!-- step3: Message Structure -->
  <g class="step" id="step3" data-narration="Request messages contain operation type, request ID, parameters, and addressing. Reply messages include status code, correlation ID, and response data.">
    <rect x="20" y="244" width="760" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="261" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Message Format and Structure</text>
    
    <!-- Request Message Structure -->
    <rect x="50" y="275" width="340" height="48" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="60" y="288" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Request Message</text>
    <text x="60" y="302" font-family="Arial" font-size="8" fill="#e65100">• Operation Type</text>
    <text x="160" y="302" font-family="Arial" font-size="8" fill="#e65100">• Request ID</text>
    <text x="260" y="302" font-family="Arial" font-size="8" fill="#e65100">• Parameters</text>
    <text x="340" y="302" font-family="Arial" font-size="8" fill="#e65100">• Addressing</text>
    
    <!-- Reply Message Structure -->
    <rect x="410" y="275" width="340" height="48" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="420" y="288" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Reply Message</text>
    <text x="420" y="302" font-family="Arial" font-size="8" fill="#2e7d32">• Status Code</text>
    <text x="510" y="302" font-family="Arial" font-size="8" fill="#2e7d32">• Correlation ID</text>
    <text x="620" y="302" font-family="Arial" font-size="8" fill="#2e7d32">• Response Data</text>
  </g>
  
  <!-- step4: Reliability and Error Handling -->
  <g class="step" id="step4" data-narration="Protocols handle failures through timeouts and retries for lost requests, idempotent operations for duplicate handling, and state management for server crashes.">
    <rect x="20" y="337" width="760" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="354" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Reliability and Error Handling</text>
    
    <!-- Problem boxes -->
    <rect x="50" y="368" width="180" height="48" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="140" y="382" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Request Loss</text>
    <text x="140" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Timeout + Retry</text>
    
    <rect x="250" y="368" width="180" height="48" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="340" y="382" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Reply Loss</text>
    <text x="340" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Idempotent Operations</text>
    
    <rect x="450" y="368" width="180" height="48" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="540" y="382" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Server Failure</text>
    <text x="540" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Stateful Protocol</text>
    
    <rect x="650" y="368" width="110" height="48" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="705" y="382" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Solution</text>
    <text x="705" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Exponential Backoff</text>
  </g>
  
  <!-- step5: RPC -->
  <g class="step" id="step5" data-narration="RPC makes remote calls appear local. Client stub marshals parameters, sends request, waits for reply, then unmarshals results back to the program.">
    <rect x="20" y="430" width="760" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="447" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Remote Procedure Call (RPC)</text>
    
    <!-- RPC Flow Diagram -->
    <rect x="50" y="460" width="90" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="95" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Client App</text>
    <text x="95" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">(calls function)</text>
    
    <line x1="140" y1="485" x2="170" y2="485" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="180" y="460" width="80" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="220" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Client Stub</text>
    <text x="220" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">(marshals)</text>
    
    <line x1="260" y1="485" x2="300" y2="485" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="310" y="460" width="80" height="50" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="350" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Network</text>
    <text x="350" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">(transports)</text>
    
    <line x1="390" y1="485" x2="430" y2="485" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="440" y="460" width="80" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="480" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Server Stub</text>
    <text x="480" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">(unmarshals)</text>
    
    <line x1="520" y1="485" x2="550" y2="485" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowgreen)"/>
    
    <rect x="560" y="460" width="80" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="600" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Server</text>
    <text x="600" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">(executes)</text>
    
    <text x="680" y="485" font-family="Arial" font-size="9" fill="#666">gRPC, Thrift, RMI</text>
  </g>
  
  <!-- step6: Examples and Summary -->
  <g class="step" id="step6" data-narration="Common examples include HTTP web requests, database queries via JDBC, and REST API calls. Remember: client-request-server-reply is the core flow.">
    <rect x="20" y="523" width="760" height="60" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="540" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Examples and Exam Tips</text>
    
    <!-- Examples tags -->
    <rect x="50" y="550" width="120" height="28" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="110" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">HTTP GET Request</text>
    <text x="110" y="576" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Web browsing</text>
    
    <rect x="180" y="550" width="140" height="28" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="250" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Database Query</text>
    <text x="250" y="576" text-anchor="middle" font-family="Arial" font-size="7" fill="#e65100">JDBC/ODBC</text>
    
    <rect x="330" y="550" width="120" height="28" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="390" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">REST API Call</text>
    <text x="390" y="576" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">JSON over HTTP</text>
    
    <!-- Key tip -->
    <rect x="600" y="550" width="170" height="28" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="685" y="565" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Remember:</text>
    <text x="685" y="576" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Client → Request → Server → Reply</text>
  </g>
</svg>