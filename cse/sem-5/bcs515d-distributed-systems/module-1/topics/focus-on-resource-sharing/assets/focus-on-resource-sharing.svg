<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to the topic of Resource Sharing in Computer Networks. We'll explore types of resources, sharing models, protocols, and challenges.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Resource Sharing in Computer Networks</text>
  </g>
  
  <!-- Step 1: Definition and Importance -->
  <g class="step" id="step1" data-narration="Resource sharing enables multiple users to access hardware, software, and data resources across a network efficiently, improving productivity and reducing costs.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Definition and Importance</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">Resource sharing allows multiple users and applications to access computing resources</text>
    <text x="40" y="116" font-family="Arial" font-size="11" fill="#333">distributed across a network, including hardware, software, and data.</text>
    <text x="40" y="132" font-family="Arial" font-size="11" fill="#388e3c">Key benefits: Cost reduction, collaboration, improved utilization, distributed computing</text>
  </g>
  
  <!-- Step 2: Types of Resources -->
  <g class="step" id="step2" data-narration="Three main types of resources can be shared: hardware like printers and storage, software applications, and data databases across organizations.">
    <rect x="20" y="151" width="760" height="85" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="173" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Types of Resources</text>
    <!-- Three columns -->
    <rect x="40" y="190" width="220" height="38" fill="#c8e6c9" rx="4"/>
    <text x="50" y="208" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Hardware Resources</text>
    <text x="50" y="222" font-family="Arial" font-size="10" fill="#333">CPU, Storage, Printers, Network</text>
    
    <rect x="280" y="190" width="220" height="38" fill="#c8e6c9" rx="4"/>
    <text x="290" y="208" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Software Resources</text>
    <text x="290" y="222" font-family="Arial" font-size="10" fill="#333">Apps, OS, Tools, SaaS</text>
    
    <rect x="520" y="190" width="220" height="38" fill="#c8e6c9" rx="4"/>
    <text x="530" y="208" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Data Resources</text>
    <text x="530" y="222" font-family="Arial" font-size="10" fill="#333">Databases, Files, Repositories</text>
  </g>
  
  <!-- Step 3: Resource Sharing Models -->
  <g class="step" id="step3" data-narration="Two main models exist: Client-Server provides centralized control with dedicated servers, while Peer-to-Peer offers decentralized equal nodes for direct communication.">
    <rect x="20" y="244" width="760" height="85" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="266" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Resource Sharing Models</text>
    <!-- Two columns comparison -->
    <rect x="40" y="285" width="340" height="38" fill="#ffe0b2" rx="4"/>
    <text x="50" y="302" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Client-Server Model</text>
    <text x="200" y="302" font-family="Arial" font-size="10" fill="#333">Centralized control | Dedicated servers | File/Print/DB servers</text>
    
    <rect x="400" y="285" width="340" height="38" fill="#ffe0b2" rx="4"/>
    <text x="410" y="302" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Peer-to-Peer (P2P) Model</text>
    <text x="560" y="302" font-family="Arial" font-size="10" fill="#333">Decentralized | Equal peers | BitTorrent, file sharing</text>
  </g>
  
  <!-- Step 4: Mechanisms and Protocols -->
  <g class="step" id="step4" data-narration="Key protocols enable resource sharing: RPC executes remote procedure calls, NFS provides Unix file sharing, and SMB handles Windows network printing and file access.">
    <rect x="20" y="337" width="760" height="85" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="359" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Mechanisms and Protocols</text>
    <!-- Three protocol boxes -->
    <rect x="40" y="378" width="230" height="38" fill="#e1bee7" rx="4"/>
    <text x="50" y="395" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">RPC (Remote Procedure Call)</text>
    <text x="180" y="395" font-family="Arial" font-size="10" fill="#333">Execute remote code locally</text>
    
    <rect x="285" y="378" width="230" height="38" fill="#e1bee7" rx="4"/>
    <text x="295" y="395" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">NFS (Network File System)</text>
    <text x="425" y="395" font-family="Arial" font-size="10" fill="#333">Unix/Linux file sharing</text>
    
    <rect x="530" y="378" width="230" height="38" fill="#e1bee7" rx="4"/>
    <text x="540" y="395" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">SMB/CIFS</text>
    <text x="620" y="395" font-family="Arial" font-size="10" fill="#333">Windows file/print sharing</text>
  </g>
  
  <!-- Step 5: Issues in Resource Sharing -->
  <g class="step" id="step5" data-narration="Major challenges include concurrency control for simultaneous access, security vulnerabilities, network performance issues, and ensuring system reliability and fault tolerance.">
    <rect x="20" y="430" width="760" height="85" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="452" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Issues in Resource Sharing</text>
    <!-- Four issue boxes -->
    <rect x="40" y="470" width="170" height="38" fill="#ffcdd2" rx="4"/>
    <text x="50" y="487" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Concurrency Control</text>
    <text x="50" y="500" font-family="Arial" font-size="9" fill="#333">Locking, transactions</text>
    
    <rect x="220" y="470" width="170" height="38" fill="#ffcdd2" rx="4"/>
    <text x="230" y="487" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Security</text>
    <text x="230" y="500" font-family="Arial" font-size="9" fill="#333">Authentication, encryption</text>
    
    <rect x="400" y="470" width="170" height="38" fill="#ffcdd2" rx="4"/>
    <text x="410" y="487" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Performance</text>
    <text x="410" y="500" font-family="Arial" font-size="9" fill="#333">Latency, caching</text>
    
    <rect x="580" y="470" width="170" height="38" fill="#ffcdd2" rx="4"/>
    <text x="590" y="487" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Reliability</text>
    <text x="590" y="500" font-family="Arial" font-size="9" fill="#333">Redundancy, fault tolerance</text>
  </g>
  
  <!-- Step 6: Examples and Summary -->
  <g class="step" id="step6" data-narration="Real-world examples include corporate file servers, cloud computing platforms like AWS and GCP, and distributed databases, all enabling efficient modern resource sharing.">
    <rect x="20" y="523" width="760" height="65" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="545" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Examples and Cloud Computing</text>
    <text x="40" y="565" font-family="Arial" font-size="11" fill="#333">Corporate File Servers | Cloud Services (AWS, GCP) | Distributed Databases</text>
    <text x="40" y="580" font-family="Arial" font-size="10" fill="#388e3c">Cloud computing represents modern resource sharing through virtualization and on-demand service delivery.</text>
  </g>
</svg>