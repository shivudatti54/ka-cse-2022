<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Introduction to Data Structures covers definitions, classifications, complexity analysis, and fundamental operations essential for  CSE students in computer science.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Introduction to Data Structures</text>
  </g>
  
  <g class="step" id="step1" data-narration="A data structure is a specialized format for organizing, processing, and storing data enabling efficient access and modification in applications.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is a Data Structure?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">A specialized format for organizing, processing, and storing data that enables</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">efficient access and modification. It bridges abstract data and physical</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">memory representation in computer systems.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Data structures classify into linear (sequential) and non-linear (hierarchical) types based on element arrangement in various programming scenarios across software development.">
    <rect x="20" y="151" width="760" height="85" fill="#e8f5e9" stroke="#388e3c" rx="8"/>
    <text x="40" y="171" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Classification: Based on Arrangement</text>
    <rect x="40" y="185" width="220" height="45" fill="#c8e6c9" rx="5"/>
    <text x="150" y="202" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Linear Data Structures</text>
    <text x="150" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Arrays, Linked Lists,</text>
    <text x="150" y="230" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Stacks, Queues</text>
    <line x1="270" y1="207" x2="330" y2="207" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="340" y="185" width="220" height="45" fill="#c8e6c9" rx="5"/>
    <text x="450" y="202" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Non-Linear Data Structures</text>
    <text x="450" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Trees, Graphs</text>
  </g>
  
  <g class="step" id="step3" data-narration="Static structures like arrays allocate fixed memory at compile time, while dynamic structures like linked lists allocate memory at runtime.">
    <rect x="20" y="244" width="760" height="85" fill="#fff3e0" stroke="#ff9800" rx="8"/>
    <text x="40" y="264" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Classification: Based on Memory Allocation</text>
    <rect x="40" y="278" width="340" height="45" fill="#ffe0b2" rx="5"/>
    <text x="210" y="295" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Static Data Structures</text>
    <text x="210" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Fixed size at compile time | Fast access | Arrays</text>
    <rect x="400" y="278" width="340" height="45" fill="#ffe0b2" rx="5"/>
    <text x="570" y="295" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Dynamic Data Structures</text>
    <text x="570" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Size at runtime | Flexible | Linked Lists, Trees</text>
  </g>
  
  <g class="step" id="step4" data-narration="Abstract Data Types define operations without implementation. Common ADTs include List, Stack, Queue, and Dictionary with their specific operations each.">
    <rect x="20" y="337" width="760" height="85" fill="#f3e5f5" stroke="#9c27b0" rx="8"/>
    <text x="40" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Abstract Data Types (ADTs)</text>
    <rect x="40" y="370" width="170" height="48" fill="#e1bee7" rx="5"/>
    <text x="125" y="385" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Stack ADT</text>
    <text x="125" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Push, Pop, Peek,</text>
    <text x="125" y="410" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">isEmpty</text>
    <rect x="220" y="370" width="170" height="48" fill="#e1bee7" rx="5"/>
    <text x="305" y="385" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Queue ADT</text>
    <text x="305" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Enqueue, Dequeue,</text>
    <text x="305" y="410" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Front, isEmpty</text>
    <rect x="400" y="370" width="170" height="48" fill="#e1bee7" rx="5"/>
    <text x="485" y="385" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">List ADT</text>
    <text x="485" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Insert, Delete, Search,</text>
    <text x="485" y="410" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Traverse</text>
    <rect x="580" y="370" width="170" height="48" fill="#e1bee7" rx="5"/>
    <text x="665" y="385" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Dictionary ADT</text>
    <text x="665" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Insert, Delete, Search,</text>
    <text x="665" y="410" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Key-Value Access</text>
  </g>
  
  <g class="step" id="step5" data-narration="Time complexity measures execution time using Big-O notation: O(1) constant, O(n) linear, O(log n) logarithmic, O(n²) quadratic in algorithm design and analysis.">
    <rect x="20" y="430" width="760" height="85" fill="#ffebee" stroke="#f44336" rx="8"/>
    <text x="40" y="450" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Time and Space Complexity</text>
    <text x="40" y="468" font-family="Arial" font-size="10" fill="#333">Time Complexity (Big-O):</text>
    <rect x="40" y="475" width="100" height="35" fill="#ffcdd2" rx="4"/>
    <text x="90" y="490" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">O(1)</text>
    <text x="90" y="505" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Constant</text>
    <rect x="150" y="475" width="100" height="35" fill="#ffcdd2" rx="4"/>
    <text x="200" y="490" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">O(n)</text>
    <text x="200" y="505" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Linear</text>
    <rect x="260" y="475" width="100" height="35" fill="#ffcdd2" rx="4"/>
    <text x="310" y="490" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">O(log n)</text>
    <text x="310" y="505" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Logarithmic</text>
    <rect x="370" y="475" width="100" height="35" fill="#ffcdd2" rx="4"/>
    <text x="420" y="490" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">O(n²)</text>
    <text x="420" y="505" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Quadratic</text>
    <text x="490" y="468" font-family="Arial" font-size="10" fill="#333">Space Complexity:</text>
    <text x="490" y="485" font-family="Arial" font-size="9" fill="#333">Memory required as function</text>
    <text x="490" y="498" font-family="Arial" font-size="9" fill="#333">of input size</text>
  </g>
  
  <g class="step" id="step6" data-narration="The five fundamental operations are traversal, insertion, deletion, searching, and sorting. Arrays provide O(1) access but O(n) insertion and deletion.">
    <rect x="20" y="523" width="760" height="65" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="543" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Five Fundamental Operations</text>
    <rect x="40" y="555" width="120" height="28" fill="#bbdefb" rx="4"/>
    <text x="100" y="568" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Traversal</text>
    <rect x="170" y="555" width="120" height="28" fill="#bbdefb" rx="4"/>
    <text x="230" y="568" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Insertion</text>
    <rect x="300" y="555" width="120" height="28" fill="#bbdefb" rx="4"/>
    <text x="360" y="568" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Deletion</text>
    <rect x="430" y="555" width="120" height="28" fill="#bbdefb" rx="4"/>
    <text x="490" y="568" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Searching</text>
    <rect x="560" y="555" width="120" height="28" fill="#bbdefb" rx="4"/>
    <text x="620" y="568" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Sorting</text>
    <text x="700" y="568" font-family="Arial" font-size="8" fill="#666">Arrays: O(1) access, O(n) insert/delete</text>
  </g>
</svg>