<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="File Service Architecture covers systems for file-based storage and access, from local file systems to distributed file services across networks.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">File Service Architecture</text>
  </g>
  
  <!-- step1: Local File System -->
  <g class="step" id="step1" data-narration="Local file systems operate on a single machine, managing disk space through File Control Blocks, directory structures, buffer caches, and I/O schedulers.">
    <rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Local File System Architecture</text>
    <rect x="25" y="85" width="170" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="110" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">File Control Block</text>
    <text x="110" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Metadata, Attributes,</text>
    <text x="110" y="125" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Location, Permissions</text>
    <rect x="205" y="85" width="170" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="290" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Directory Structure</text>
    <text x="290" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Hierarchical Folder</text>
    <text x="290" y="125" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Organization</text>
    <rect x="385" y="85" width="170" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="470" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Buffer Cache</text>
    <text x="470" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Memory Cache for</text>
    <text x="470" y="125" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Frequently Accessed Blocks</text>
    <rect x="565" y="85" width="170" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="650" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">I/O Scheduler</text>
    <text x="650" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Optimizes Disk</text>
    <text x="650" y="125" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Operations Order</text>
  </g>
  
  <!-- step2: Client-Server Model -->
  <g class="step" id="step2" data-narration="In client-server file services, a dedicated server manages storage while clients access files over the network using protocols like NFS or CIFS.">
    <rect x="10" y="146" width="780" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="1"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Client-Server File Service</text>
    <rect x="50" y="180" width="100" height="35" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="100" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Client</text>
    <path d="M150 197 L250 197" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="260" y="165" width="130" height="50" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="325" y="182" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Server</text>
    <text x="325" y="196" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">File System</text>
    <text x="325" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Management</text>
    <path d="M390 197 L490 197" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="500" y="180" width="100" height="35" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="550" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Client</text>
    <text x="620" y="190" font-family="Arial" font-size="9" fill="#666">Network Protocol: NFS, CIFS/SMB</text>
    <text x="620" y="210" font-family="Arial" font-size="8" fill="#666">Centralized management, security, backup</text>
  </g>
  
  <!-- step3: Distributed File System -->
  <g class="step" id="step3" data-narration="Distributed file systems span multiple servers across a network, providing location transparency, horizontal scalability, and high availability through data replication and fault tolerance mechanisms.">
    <rect x="10" y="234" width="780" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="1"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Distributed File System (DFS)</text>
    <rect x="50" y="265" width="100" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="100" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Client</text>
    <path d="M150 285 L200 285" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="210" y="260" width="120" height="50" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="270" y="275" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">NameNode</text>
    <text x="270" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Metadata Only</text>
    <path d="M330 285 L380 285" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="390" y="255" width="80" height="60" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="430" y="270" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">DataNode 1</text>
    <text x="430" y="285" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Block 1</text>
    <rect x="480" y="255" width="80" height="60" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="520" y="270" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">DataNode 2</text>
    <text x="520" y="285" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Block 2</text>
    <rect x="570" y="255" width="80" height="60" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="610" y="270" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">DataNode 3</text>
    <text x="610" y="285" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Block 3</text>
    <text x="670" y="275" font-family="Arial" font-size="8" fill="#666">Location Transparency,</text>
    <text x="670" y="290" font-family="Arial" font-size="8" fill="#666">Horizontal Scaling,</text>
    <text x="670" y="305" font-family="Arial" font-size="8" fill="#666">High Availability</text>
  </g>
  
  <!-- step4: NFS vs CIFS/SMB -->
  <g class="step" id="step4" data-narration="NFS is a Unix/Linux protocol using stateless design, while CIFS/SMB is Windows-based with stateful operations and built-in printer sharing features.">
    <rect x="10" y="322" width="780" height="113" fill="#ffffff" stroke="#f3e5f5" stroke-width="1"/>
    <text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. NFS vs CIFS/SMB Protocol</text>
    <rect x="40" y="355" width="330" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="205" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">NFS (Network File System)</text>
    <text x="205" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Unix/Linux | Stateless (v3) / Stateful (v4) | Kerberos Auth</text>
    <rect x="380" y="355" width="330" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="545" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">CIFS/SMB (Server Message Block)</text>
    <text x="545" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Windows | Stateful | Opportunistic Locking, Printer Sharing</text>
    <rect x="40" y="400" width="150" height="28" fill="#e1bee7" stroke="#7b1fa2" rx="2"/>
    <text x="115" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">NFSv4: Port 2049</text>
    <rect x="200" y="400" width="170" height="28" fill="#e1bee7" stroke="#7b1fa2" rx="2"/>
    <text x="285" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Delegation Support</text>
    <rect x="380" y="400" width="150" height="28" fill="#e1bee7" stroke="#7b1fa2" rx="2"/>
    <text x="455" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">SMB: Port 445</text>
    <rect x="540" y="400" width="170" height="28" fill="#e1bee7" stroke="#7b1fa2" rx="2"/>
    <text x="625" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Windows Integration</text>
  </g>
  
  <!-- step5: File Caching & Replication -->
  <g class="step" id="step5" data-narration="File caching strategies include write-through for immediate consistency and write-back for better performance, while replication copies files across multiple servers for redundancy and disaster recovery.">
    <rect x="10" y="443" width="780" height="83" fill="#ffffff" stroke="#ffebee" stroke-width="1"/>
    <text x="25" y="460" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. File Caching &amp; Replication</text>
    <rect x="40" y="478" width="240" height="35" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="160" y="491" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Write-Through Cache</text>
    <text x="160" y="505" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Immediate sync to server</text>
    <rect x="290" y="478" width="240" height="35" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="410" y="491" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Write-Back Cache</text>
    <text x="410" y="505" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Deferred sync to server</text>
    <rect x="540" y="478" width="200" height="35" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="640" y="491" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">File Replication</text>
    <text x="640" y="505" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Redundancy &amp; Load Balancing</text>
  </g>
  
  <!-- step6: File Locking & Mount Operation -->
  <g class="step" id="step6" data-narration="File locking prevents concurrent modification conflicts with shared and exclusive locks, while NFS mount operations validate clients and register mount points.">
    <rect x="10" y="534" width="780" height="56" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="25" y="551" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. File Locking &amp; NFS Mount Operation</text>
    <rect x="40" y="560" width="180" height="25" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="130" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Shared Lock (Read)</text>
    <rect x="230" y="560" width="180" height="25" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="320" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Exclusive Lock (Write)</text>
    <rect x="420" y="560" width="170" height="25" fill="#bbdefb" stroke="#1565c0" rx="3"/>
    <text x="505" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Advisory/Mandatory</text>
    <rect x="600" y="560" width="150" height="25" fill="#bbdefb" stroke="#1565c0" rx="3"/>
    <text x="675" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">NFS Mount</text>
  </g>
</svg>