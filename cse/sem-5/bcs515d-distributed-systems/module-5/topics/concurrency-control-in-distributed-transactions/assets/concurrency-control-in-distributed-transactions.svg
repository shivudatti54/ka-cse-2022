<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="This topic covers concurrency control in distributed transactions, explaining how databases maintain data consistency and handle multiple simultaneous operations across network nodes.">
<rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="4"/>
<text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Concurrency Control in Distributed Transactions</text>
</g>
<g class="step" id="step1" data-narration="Distributed concurrency control faces unique challenges like communication delays across networks, the lack of a global clock for ordering events, and handling independent node failures.">
<rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="6"/>
<rect x="30" y="68" width="180" height="60" fill="#1976d2" rx="4"/>
<text x="120" y="92" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Communication Delays</text>
<text x="120" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Network latency</text>
<rect x="220" y="68" width="180" height="60" fill="#1976d2" rx="4"/>
<text x="310" y="92" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">No Global Clock</text>
<text x="310" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Logical clocks needed</text>
<rect x="410" y="68" width="180" height="60" fill="#1976d2" rx="4"/>
<text x="500" y="92" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Node Failures</text>
<text x="500" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Independent crashes</text>
<rect x="600" y="68" width="160" height="60" fill="#1976d2" rx="4"/>
<text x="680" y="92" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Data Distribution</text>
<text x="680" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Multi-node consistency</text>
</g>
<g class="step" id="step2" data-narration="Three lock-based approaches exist for managing distributed transactions: centralized uses a single lock manager, primary-copy designates one replica as coordinator, and distributed spreads management across nodes.">
<rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="6"/>
<text x="40" y="168" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Lock-Based Control</text>
<rect x="40" y="180" width="220" height="38" fill="#388e3c" rx="4"/>
<text x="150" y="200" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Centralized</text>
<text x="150" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Single lock manager</text>
<rect x="270" y="180" width="220" height="38" fill="#388e3c" rx="4"/>
<text x="380" y="200" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Primary-Copy</text>
<text x="380" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Designated primary node</text>
<rect x="500" y="180" width="220" height="38" fill="#388e3c" rx="4"/>
<text x="610" y="200" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Distributed</text>
<text x="610" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Lock managers at each node</text>
</g>
<g class="step" id="step3" data-narration="The Two-Phase Commit protocol ensures atomicity in distributed transactions: in Phase 1 the coordinator sends PREPARE messages and participants vote YES or NO before commitment.">
<rect x="20" y="234" width="760" height="105" fill="#fff3e0" rx="6"/>
<text x="40" y="256" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Two-Phase Commit (2PC)</text>
<rect x="40" y="268" width="340" height="38" fill="#ff9800" rx="4"/>
<text x="210" y="288" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Phase 1: PREPARE</text>
<text x="210" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Coordinator asks participants to prepare</text>
<rect x="390" y="268" width="340" height="38" fill="#ff9800" rx="4"/>
<text x="560" y="288" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Phase 2: COMMIT</text>
<text x="560" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="white">If all vote YES, send COMMIT</text>
<path d="M210 310 L210 320 L560 320 L560 310" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
<text x="385" y="335" font-family="Arial" font-size="9" fill="#e65100">Coordinator → All Participants → Decision</text>
</g>
<g class="step" id="step4" data-narration="Timestamp protocols order transactions using timestamps to ensure serializability without locks, including Basic Timestamp Ordering, Thomas Write Rule for skipping obsolete writes, and Multi-Version Timestamp Ordering.">
<rect x="20" y="347" width="760" height="80" fill="#f3e5f5" rx="6"/>
<text x="40" y="369" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Timestamp-Based Protocols</text>
<rect x="40" y="381" width="230" height="38" fill="#9c27b0" rx="4"/>
<text x="155" y="401" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Basic Timestamp Ordering</text>
<text x="155" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Orders by transaction timestamp</text>
<rect x="280" y="381" width="230" height="38" fill="#9c27b0" rx="4"/>
<text x="395" y="401" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Thomas Write Rule</text>
<text x="395" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Skips obsolete writes</text>
<rect x="520" y="381" width="230" height="38" fill="#9c27b0" rx="4"/>
<text x="635" y="401" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">MVTO</text>
<text x="635" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Multiple versions allowed</text>
</g>
<g class="step" id="step5" data-narration="Distributed deadlock detection uses wait-for graphs where nodes represent transactions, and the Chandy-Misra-Haas algorithm detects cycles through probe messages exchanged across distributed nodes.">
<rect x="20" y="435" width="760" height="80" fill="#ffebee" rx="6"/>
<text x="40" y="457" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Distributed Deadlock Detection</text>
<rect x="40" y="469" width="180" height="38" fill="#f44336" rx="4"/>
<text x="130" y="489" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Wait-for Graph</text>
<text x="130" y="501" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Nodes are transactions</text>
<rect x="230" y="469" width="180" height="38" fill="#f44336" rx="4"/>
<text x="320" y="489" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Cycle Detection</text>
<text x="320" y="501" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Cycle means deadlock</text>
<rect x="420" y="469" width="180" height="38" fill="#f44336" rx="4"/>
<text x="510" y="489" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Chandy-Misra-Haas</text>
<text x="510" y="501" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Diffusing computation</text>
<rect x="610" y="469" width="150" height="38" fill="#f44336" rx="4"/>
<text x="685" y="489" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Resolution</text>
<text x="685" y="501" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Abort youngest</text>
</g>
<g class="step" id="step6" data-narration="ACID properties must be preserved in distributed systems: atomicity ensures all-or-nothing execution, consistency maintains valid states, isolation creates serializable behavior, and durability guarantees persisted changes.">
<rect x="20" y="523" width="760" height="75" fill="#e3f2fd" rx="6"/>
<text x="40" y="545" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">ACID Properties in Distributed Systems</text>
<rect x="40" y="555" width="170" height="38" fill="#1976d2" rx="4"/>
<text x="125" y="573" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Atomicity</text>
<text x="125" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="white">All or nothing</text>
<rect x="220" y="555" width="170" height="38" fill="#1976d2" rx="4"/>
<text x="305" y="573" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Consistency</text>
<text x="305" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Valid state maintained</text>
<rect x="400" y="555" width="170" height="38" fill="#1976d2" rx="4"/>
<text x="485" y="573" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Isolation</text>
<text x="485" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Serial execution look</text>
<rect x="580" y="555" width="170" height="38" fill="#1976d2" rx="4"/>
<text x="665" y="573" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Durability</text>
<text x="665" y="585" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Persist after commit</text>
</g>
</svg>