<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This lesson covers distributed deadlocks, a critical challenge in distributed systems where processes across multiple machines wait for each other's resources.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Distributed Deadlocks</text>
  </g>
  
  <g class="step" id="step1" data-narration="Distributed deadlocks occur when processes across multiple sites wait indefinitely for resources held by each other, forming cycles in the global wait-for graph.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Nature of Distributed Deadlocks</text>
    <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">• No global state: Each site has partial knowledge</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">• Communication delays: Messages between sites incur variable delays</text>
    <text x="40" y="128" font-family="Arial" font-size="10" fill="#333">• No central coordinator: Control is fully decentralized</text>
  </g>
  
  <g class="step" id="step2" data-narration="Four Coffman conditions must hold simultaneously: mutual exclusion, hold and wait, no preemption, and circular wait in the wait-for graph.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Four Coffman Conditions (Necessary for Deadlock)</text>
    <rect x="40" y="180" width="160" height="36" fill="#c8e6c9" rx="3"/>
    <text x="120" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">1. Mutual Exclusion</text>
    <text x="120" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">2. Hold and Wait</text>
    <rect x="210" y="180" width="160" height="36" fill="#c8e6c9" rx="3"/>
    <text x="290" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">3. No Preemption</text>
    <text x="290" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">4. Circular Wait</text>
    <text x="450" y="200" font-family="Arial" font-size="10" fill="#333">All four must be present</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Wait-for Graph shows process dependencies. Nodes are processes, edges show which process waits for another. A cycle means deadlock.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Wait-for Graph (WFG)</text>
    <circle cx="100" cy="290" r="20" fill="#ffe0b2" stroke="#ff9800" stroke-width="2"/>
    <text x="100" y="294" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">P1</text>
    <circle cx="200" cy="290" r="20" fill="#ffe0b2" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="294" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">P2</text>
    <path d="M120,280 Q160,260 180,280" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="140" y="265" font-family="Arial" font-size="8" fill="#e65100">waits for</text>
    <circle cx="300" cy="290" r="20" fill="#ffe0b2" stroke="#ff9800" stroke-width="2"/>
    <text x="300" y="294" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">P3</text>
    <path d="M220,280 Q260,260 280,280" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="460" y="280" font-family="Arial" font-size="10" fill="#333">Cycle P1→P2→P3→P1</text>
    <text x="460" y="300" font-family="Arial" font-size="10" fill="#333">indicates deadlock</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Chandy-Misra-Haas algorithm uses special probe messages containing initiator, sender, and destination fields to detect cycles in the distributed wait-for graph across all sites.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">Chandy-Misra-Haas (CMH) Algorithm</text>
    <text x="40" y="362" font-family="Arial" font-size="10" fill="#333">Probe Message Format: (initiator, sender, destination)</text>
    <rect x="40" y="372" width="320" height="24" fill="#e1bee7" rx="4"/>
    <text x="200" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Process initiates probe when waiting</text>
    <text x="400" y="360" font-family="Arial" font-size="9" fill="#333">Steps:</text>
    <text x="400" y="375" font-family="Arial" font-size="9" fill="#333">1. P1 sends probe to P2</text>
    <text x="400" y="388" font-family="Arial" font-size="9" fill="#333">2. If P2 waits, forward probe</text>
    <text x="400" y="401" font-family="Arial" font-size="9" fill="#333">3. Probe returns to initiator = cycle</text>
  </g>
  
  <g class="step" id="step5" data-narration="Resource ordering prevents deadlocks by assigning global order numbers to all resources. Processes must request resources in strictly increasing order, eliminating circular wait conditions.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">Prevention: Resource Ordering</text>
    <text x="40" y="450" font-family="Arial" font-size="10" fill="#333">Assign global order to all resources. Processes must request in increasing order.</text>
    <rect x="40" y="462" width="180" height="22" fill="#c8e6c9" rx="3"/>
    <text x="130" y="478" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">File A = Order 1</text>
    <rect x="230" y="462" width="180" height="22" fill="#c8e6c9" rx="3"/>
    <text x="320" y="478" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Printer = Order 2</text>
    <text x="460" y="475" font-family="Arial" font-size="10" fill="#333">P1 holding A can request printer (2)</text>
    <text x="460" y="490" font-family="Arial" font-size="10" fill="#333">P2 must request A first, preventing cycle</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: Two-site deadlock with P1 at Site A holding R1, waiting for R2 held by P2 at Site B, which waits for R1 held by P1.">
    <rect x="20" y="498" width="760" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Example: Two-Site Deadlock</text>
    <rect x="40" y="532" width="200" height="50" fill="#ffe0b2" rx="4"/>
    <text x="140" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">SITE A</text>
    <text x="140" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">P1: Holds R1, Waits R2</text>
    <rect x="560" y="532" width="200" height="50" fill="#ffe0b2" rx="4"/>
    <text x="660" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">SITE B</text>
    <text x="660" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">P2: Holds R2, Waits R1</text>
    <path d="M240,557 L320,557" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="280" y="550" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">P1 waits</text>
    <path d="M560,557 L480,557" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="520" y="550" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">P2 waits</text>
    <text x="330" y="582" font-family="Arial" font-size="9" fill="#333">CMH detects cycle: P1→P2→P1</text>
  </g>
</svg>