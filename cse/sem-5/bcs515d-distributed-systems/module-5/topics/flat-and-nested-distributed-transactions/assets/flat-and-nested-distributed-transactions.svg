<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Distributed transactions maintain ACID properties across multiple databases and services in modern distributed computing systems, ensuring reliable data consistency and integrity.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Flat and Nested Distributed Transactions</text>
  </g>
  
  <g class="step" id="step1" data-narration="Flat distributed transactions use a single-level structure where all operations execute in one linear sequence across multiple database nodes simultaneously.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="30" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Flat Distributed Transactions</text>
    <rect x="30" y="90" width="150" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="105" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Coordinator</text>
    <line x1="180" y1="107" x2="230" y2="107" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <rect x="240" y="90" width="120" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="300" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">DB Node 1</text>
    <line x1="360" y1="107" x2="410" y2="107" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <rect x="420" y="90" width="120" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="480" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">DB Node 2</text>
    <text x="600" y="110" font-family="Arial" font-size="9" fill="#388e3c">All-or-nothing</text>
    <text x="600" y="125" font-family="Arial" font-size="9" fill="#388e3c">single-level ops</text>
  </g>
  
  <g class="step" id="step2" data-narration="The Two-Phase Commit (2PC) protocol uses prepare and commit phases where a coordinator collects votes from all participant nodes before finalizing.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="30" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Two-Phase Commit (2PC)</text>
    <rect x="30" y="180" width="110" height="35" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="85" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Coordinator</text>
    <line x1="140" y1="197" x2="180" y2="197" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="185" y="200" font-family="Arial" font-size="9" fill="#e65100">Prepare</text>
    <rect x="200" y="180" width="90" height="35" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="245" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Node 1</text>
    <rect x="320" y="180" width="90" height="35" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="365" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Node 2</text>
    <line x1="290" y1="197" x2="320" y2="197" stroke="#ff9800" stroke-width="1.5"/>
    <line x1="410" y1="197" x2="450" y2="197" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="455" y="200" font-family="Arial" font-size="9" fill="#e65100">Vote Yes</text>
    <line x1="140" y1="197" x2="140" y2="215" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="140" y1="215" x2="520" y2="215" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="520" y1="215" x2="520" y2="197" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="520" y1="197" x2="560" y2="197" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="570" y="200" font-family="Arial" font-size="9" fill="#e65100">Commit</text>
    <text x="620" y="190" font-family="Arial" font-size="8" fill="#f44336">Blocking if</text>
    <text x="620" y="203" font-family="Arial" font-size="8" fill="#f44336">coord fails</text>
  </g>
  
  <g class="step" id="step3" data-narration="Nested distributed transactions support hierarchical organization, allowing parent transactions to spawn multiple child sub-transactions for modular execution and better fault isolation.">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="30" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Nested Distributed Transactions</text>
    <rect x="30" y="270" width="200" height="40" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="130" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Parent Transaction</text>
    <line x1="230" y1="290" x2="260" y2="290" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <rect x="270" y="265" width="85" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="312" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Sub-Tx 1</text>
    <rect x="370" y="265" width="85" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="412" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Sub-Tx 2</text>
    <rect x="470" y="265" width="85" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="512" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Sub-Tx 3</text>
    <text x="600" y="280" font-family="Arial" font-size="9" fill="#9c27b0">Closed: all must</text>
    <text x="600" y="295" font-family="Arial" font-size="9" fill="#9c27b0">commit together</text>
    <text x="700" y="280" font-family="Arial" font-size="9" fill="#1976d2">Open: independent</text>
    <text x="700" y="295" font-family="Arial" font-size="9" fill="#1976d2">commit + compensation</text>
  </g>
  
  <g class="step" id="step4" data-narration="Open nested transactions commit sub-transactions independently, using compensating transactions to handle rollbacks gracefully when the parent transaction fails and rolls back.">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="30" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Open Nested Transaction Example</text>
    <rect x="30" y="355" width="180" height="45" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="120" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Process_Order</text>
    <text x="120" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">(Parent)</text>
    <rect x="220" y="355" width="100" height="35" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="270" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Reserve_Inventory</text>
    <text x="270" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">(commits)</text>
    <rect x="330" y="355" width="100" height="35" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="380" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Process_Payment</text>
    <text x="380" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">(commits)</text>
    <rect x="440" y="355" width="100" height="35" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="490" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Send_Notification</text>
    <text x="490" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">(commits)</text>
    <rect x="550" y="355" width="120" height="45" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="610" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Compensating</text>
    <text x="610" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">If parent fails:</text>
    <text x="610" y="400" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Refund, Release</text>
    <line x1="130" y1="400" x2="270" y2="390" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="130" y1="400" x2="380" y2="390" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="130" y1="400" x2="490" y2="390" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <g class="step" id="step5" data-narration="Distributed concurrency control ensures serializable execution across nodes using various synchronization techniques like locking, timestamps, and optimistic validation methods for correctness.">
    <rect x="10" y="410" width="780" height="95" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="30" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Distributed Concurrency Control</text>
    <rect x="30" y="445" width="150" height="50" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="105" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Lock-Based (2PL)</text>
    <text x="105" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Growing/Shrinking</text>
    <rect x="200" y="445" width="150" height="50" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="275" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Timestamp-Based</text>
    <text x="275" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Logical/Vector clocks</text>
    <rect x="370" y="445" width="150" height="50" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="445" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Optimistic</text>
    <text x="445" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Validate at commit</text>
    <text x="550" y="460" font-family="Arial" font-size="9" fill="#388e3c">2PL: Ensures serializability</text>
    <text x="550" y="475" font-family="Arial" font-size="9" fill="#388e3c">by lock phases</text>
    <text x="550" y="490" font-family="Arial" font-size="9" fill="#388e3c">Optimistic: Low conflict</text>
  </g>
  
  <g class="step" id="step6" data-narration="Distributed deadlock detection employs various strategies including centralized, hierarchical, and distributed approaches, analyzing wait-for graphs to identify circular dependencies and resolve them.">
    <rect x="10" y="515" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="30" y="535" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Distributed Deadlock Detection</text>
    <rect x="30" y="550" width="120" height="40" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="90" y="567" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Centralized</text>
    <text x="90" y="580" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">One node collects</text>
    <rect x="170" y="550" width="120" height="40" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="230" y="567" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Hierarchical</text>
    <text x="230" y="580" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Regional detection</text>
    <rect x="310" y="550" width="120" height="40" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="370" y="567" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Distributed</text>
    <text x="370" y="580" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Nodes cooperate</text>
    <rect x="450" y="550" width="120" height="40" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="510" y="567" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Timeout</text>
    <text x="510" y="580" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Simple fallback</text>
    <text x="600" y="560" font-family="Arial" font-size="9" fill="#ff9800">Wait-for graph cycles</text>
    <text x="600" y="575" font-family="Arial" font-size="9" fill="#ff9800">indicate deadlock</text>
  </g>
</svg>