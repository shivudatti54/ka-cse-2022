<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Database Replication - Introduction for  students. This topic covers replication fundamentals, types, architectures, and conflict resolution in distributed databases.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Database Replication - Introduction</text>
  </g>
  
  <!-- Step 1: Definition and Objectives -->
  <g class="step" id="step1" data-narration="Database replication copies and maintains database objects across multiple servers. Key objectives include high availability, load balancing, fault tolerance, and improved performance.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Database Replication?</text>
    <text x="40" y="94" font-family="Arial" font-size="10" fill="#333">Process of copying and maintaining database objects across multiple servers for:</text>
    <rect x="40" y="102" width="100" height="28" rx="3" fill="#fff"/>
    <text x="50" y="114" font-family="Arial" font-size="9" fill="#333">High Availability</text>
    <text x="50" y="124" font-family="Arial" font-size="8" fill="#666">Fault Tolerance</text>
    <rect x="150" y="102" width="100" height="28" rx="3" fill="#fff"/>
    <text x="160" y="114" font-family="Arial" font-size="9" fill="#333">Load Balancing</text>
    <text x="160" y="124" font-family="Arial" font-size="8" fill="#666">Read Distribution</text>
    <rect x="260" y="102" width="100" height="28" rx="3" fill="#fff"/>
    <text x="270" y="114" font-family="Arial" font-size="9" fill="#333">Performance</text>
    <text x="270" y="124" font-family="Arial" font-size="8" fill="#666">Geo-distribution</text>
  </g>
  
  <!-- Step 2: Synchronous vs Asynchronous -->
  <g class="step" id="step2" data-narration="Synchronous replication waits for all replicas to confirm writes, ensuring strong consistency but adding latency. Asynchronous commits immediately with better performance but potential inconsistency.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Synchronous vs Asynchronous Replication</text>
    <rect x="40" y="178" width="330" height="40" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="190" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Synchronous</text>
    <text x="50" y="204" font-family="Arial" font-size="8" fill="#333">Waits for all replicas • Strong consistency</text>
    <text x="50" y="214" font-family="Arial" font-size="8" fill="#333">Higher latency • Critical applications</text>
    <rect x="380" y="178" width="330" height="40" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="390" y="190" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Asynchronous</text>
    <text x="390" y="204" font-family="Arial" font-size="8" fill="#333">Commits immediately • Better performance</text>
    <text x="390" y="214" font-family="Arial" font-size="8" fill="#333">Eventual consistency • E-commerce, social</text>
  </g>
  
  <!-- Step 3: Replication Architectures -->
  <g class="step" id="step3" data-narration="Primary-Replica has one primary handling writes with multiple read replicas. Primary-Primary allows multiple databases to accept writes, providing better write scalability but increased complexity.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Replication Architectures</text>
    <rect x="40" y="266" width="220" height="42" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="278" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Primary-Replica (Master-Slave)</text>
    <text x="50" y="290" font-family="Arial" font-size="8" fill="#333">One primary handles all writes</text>
    <text x="50" y="302" font-family="Arial" font-size="8" fill="#333">Multiple replicas handle reads</text>
    <text x="50" y="312" font-family="Arial" font-size="8" fill="#666">Ideal for read-heavy workloads</text>
    <rect x="270" y="266" width="220" height="42" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="280" y="278" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Primary-Primary (Multi-Master)</text>
    <text x="280" y="290" font-family="Arial" font-size="8" fill="#333">Multiple databases accept writes</text>
    <text x="280" y="302" font-family="Arial" font-size="8" fill="#333">Better write scalability</text>
    <text x="280" y="312" font-family="Arial" font-size="8" fill="#666">Requires conflict resolution</text>
    <!-- Simple diagram -->
    <rect x="540" y="268" width="50" height="30" rx="3" fill="#1976d2"/>
    <text x="565" y="286" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Primary</text>
    <path d="M590,283 L630,268" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)" fill="none"/>
    <path d="M590,283 L630,298" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)" fill="none"/>
    <rect x="630" y="258" width="50" height="25" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="655" y="273" text-anchor="middle" font-family="Arial" font-size="7" fill="#1976d2">Replica1</text>
    <rect x="630" y="288" width="50" height="25" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="655" y="303" text-anchor="middle" font-family="Arial" font-size="7" fill="#1976d2">Replica2</text>
  </g>
  
  <!-- Step 4: Consistency Models -->
  <g class="step" id="step4" data-narration="Strong consistency ensures all replicas return identical data at any time. Eventual consistency allows temporary differences that converge over time. Causal consistency preserves the order of causally related updates.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Consistency Models in Replication</text>
    <rect x="40" y="354" width="220" height="42" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="366" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Strong Consistency</text>
    <text x="50" y="378" font-family="Arial" font-size="8" fill="#333">All replicas return same data</text>
    <text x="50" y="390" font-family="Arial" font-size="8" fill="#333">Achieved via synchronous replication</text>
    <rect x="270" y="354" width="220" height="42" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="280" y="366" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Eventual Consistency</text>
    <text x="280" y="378" font-family="Arial" font-size="8" fill="#333">Replicas converge over time</text>
    <text x="280" y="390" font-family="Arial" font-size="8" fill="#333">Suitable for distributed systems</text>
    <rect x="500" y="354" width="220" height="42" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="510" y="366" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Causal Consistency</text>
    <text x="510" y="378" font-family="Arial" font-size="8" fill="#333">Preserves cause-effect order</text>
    <text x="510" y="390" font-family="Arial" font-size="8" fill="#333">Weaker than strong, stronger than eventual</text>
  </g>
  
  <!-- Step 5: Conflict Resolution -->
  <g class="step" id="step5" data-narration="In multi-master replication, conflicts are resolved using Last-Writer-Wins, First-Writer-Wins, or custom application-defined strategies based on specific business requirements and data needs.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Conflict Resolution in Multi-Master</text>
    <rect x="40" y="442" width="170" height="42" rx="4" fill="#fff" stroke="#f44336"/>
    <text x="50" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Last-Writer-Wins (LWW)</text>
    <text x="50" y="466" font-family="Arial" font-size="8" fill="#333">Most recent timestamp wins</text>
    <text x="50" y="478" font-family="Arial" font-size="8" fill="#666">Simple but may lose data</text>
    <rect x="220" y="442" width="170" height="42" rx="4" fill="#fff" stroke="#ff9800"/>
    <text x="230" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">First-Writer-Wins</text>
    <text x="230" y="466" font-family="Arial" font-size="8" fill="#333">First write accepted</text>
    <text x="230" y="478" font-family="Arial" font-size="8" fill="#666">Subsequent writes rejected</text>
    <rect x="400" y="442" width="170" height="42" rx="4" fill="#fff" stroke="#9c27b0"/>
    <text x="410" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Application-Defined</text>
    <text x="410" y="466" font-family="Arial" font-size="8" fill="#333">Custom merge logic</text>
    <text x="410" y="478" font-family="Arial" font-size="8" fill="#666">Based on business rules</text>
    <rect x="580" y="442" width="180" height="42" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="590" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Advanced Methods</text>
    <text x="590" y="466" font-family="Arial" font-size="8" fill="#333">Vector Clocks, CRDTs</text>
    <text x="590" y="478" font-family="Arial" font-size="8" fill="#666">Conflict-free data types</text>
  </g>
  
  <!-- Step 6: Examples and CAP Theorem -->
  <g class="step" id="step6" data-narration="Real-world examples include banking using synchronous for consistency, e-commerce using primary-replica for read-heavy loads. CAP theorem states you can only guarantee two of consistency, availability, and partition tolerance.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Examples and CAP Theorem</text>
    <rect x="40" y="528" width="240" height="54" rx="4" fill="#fff" stroke="#388e3c"/>
    <text x="50" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Banking Application</text>
    <text x="50" y="552" font-family="Arial" font-size="8" fill="#333">Synchronous replication</text>
    <text x="50" y="562" font-family="Arial" font-size="8" fill="#333">Strong consistency required</text>
    <text x="50" y="572" font-family="Arial" font-size="8" fill="#666">Financial transactions</text>
    <rect x="290" y="528" width="240" height="54" rx="4" fill="#fff" stroke="#ff9800"/>
    <text x="300" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">E-Commerce Website</text>
    <text x="300" y="552" font-family="Arial" font-size="8" fill="#333">Primary-Replica setup</text>
    <text x="300" y="562" font-family="Arial" font-size="8" fill="#333">10K reads, 100 writes/min</text>
    <text x="300" y="572" font-family="Arial" font-size="8" fill="#666">Read-heavy workload</text>
    <rect x="540" y="528" width="220" height="54" rx="4" fill="#fff" stroke="#f44336"/>
    <text x="550" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">CAP Theorem</text>
    <text x="550" y="552" font-family="Arial" font-size="8" fill="#333">Choose ANY TWO of three:</text>
    <text x="550" y="562" font-family="Arial" font-size="8" fill="#333">• Consistency • Availability</text>
    <text x="550" y="572" font-family="Arial" font-size="8" fill="#333">• Partition Tolerance</text>
  </g>
</svg>