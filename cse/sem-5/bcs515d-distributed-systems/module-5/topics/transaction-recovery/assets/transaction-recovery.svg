<svg viewBox="0 0 800 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; font-size: 22px; fill: white; }
    .subtitle-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .body-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #444; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #666; font-weight: 600; }
    .code-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
    .formula-text { font-family: 'Times New Roman', serif; font-size: 13px; fill: #1a237e; font-style: italic; }
  </style>
  
  <rect width="800" height="1500" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0">
    <rect x="0" y="0" width="800" height="55" fill="url(#titleGrad)" rx="0"/>
    <text x="400" y="35" text-anchor="middle" class="title-text">Transaction Recovery in DBMS</text>
    <text x="400" y="48" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#e3f2fd">Ensuring Atomicity and Durability After Failures</text>
  </g>
  
  <!-- Step 1: What is Transaction Recovery? -->
  <g class="step" id="step1" data-narration="Transaction recovery ensures database consistency by restoring the database to a consistent state after any type of failure, preserving ACID properties.">
    <rect x="20" y="65" width="760" height="85" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="40" y="85" class="subtitle-text" font-weight="bold">What is Transaction Recovery?</text>
    <text x="40" y="105" class="body-text">The process of restoring the database to a consistent state after a failure has occurred.</text>
    <text x="40" y="122" class="body-text">Ensures ACID properties: Atomicity (all-or-nothing) and Durability (committed data survives crashes)</text>
    <rect x="580" y="75" width="180" height="55" fill="white" rx="8"/>
    <text x="670" y="95" text-anchor="middle" class="label-text" fill="#1976d2">Recovery Goal</text>
    <text x="670" y="115" text-anchor="middle" class="body-text" fill="#333">Consistent DB State</text>
  </g>
  
  <!-- Step 2: Types of Failures -->
  <g class="step" id="step2" data-narration="Three main failure types require different recovery approaches: transaction failure needs rollback, system crash needs log-based recovery, and media failure needs backup restoration.">
    <rect x="20" y="160" width="760" height="90" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="40" y="180" class="subtitle-text" font-weight="bold">Types of Database Failures</text>
    
    <rect x="40" y="195" width="220" height="45" fill="white" rx="6">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s"/>
    </rect>
    <text x="150" y="212" text-anchor="middle" class="label-text" fill="#ff9800">Transaction Failure</text>
    <text x="150" y="228" text-anchor="middle" class="body-text" font-size="9">Logical errors, deadlocks, abort</text>
    
    <rect x="290" y="195" width="220" height="45" fill="white" rx="6">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s"/>
    </rect>
    <text x="400" y="212" text-anchor="middle" class="label-text" fill="#f44336">System Crash</text>
    <text x="400" y="228" text-anchor="middle" class="body-text" font-size="9">Memory lost, disk intact</text>
    
    <rect x="540" y="195" width="220" height="45" fill="white" rx="6">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s"/>
    </rect>
    <text x="650" y="212" text-anchor="middle" class="label-text" fill="#9c27b0">Media Failure</text>
    <text x="650" y="228" text-anchor="middle" class="body-text" font-size="9">Disk corruption, needs backup</text>
  </g>
  
  <!-- Step 3: The Log-Based Recovery Approach -->
  <g class="step" id="step3" data-narration="The transaction log is a sequential record of all operations, stored on stable storage. It records before-images for undo and after-images for redo operations.">
    <rect x="20" y="260" width="760" height="105" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="40" y="280" class="subtitle-text" font-weight="bold">Log-Based Recovery Approach</text>
    <text x="40" y="300" class="body-text">The log is a sequential record of all transactions and their operations, stored on stable storage.</text>
    
    <!-- Log visualization -->
    <rect x="40" y="315" width="320" height="40" fill="white" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="55" y="332" class="code-text" font-size="9">T1 BEGIN</text>
    <text x="120" y="332" class="code-text" font-size="9" fill="#388e3c">T1 UPDATE X:50→60</text>
    <text x="230" y="332" class="code-text" font-size="9" fill="#388e3c">T1 COMMIT</text>
    
    <line x1="365" y1="335" x2="410" y2="335" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    
    <!-- Database icon -->
    <rect x="420" y="305" width="60" height="60" fill="white" rx="8" stroke="#388e3c" stroke-width="2"/>
    <ellipse cx="450" cy="325" rx="20" ry="8" fill="none" stroke="#388e3c" stroke-width="1.5"/>
    <ellipse cx="450" cy="345" rx="20" ry="8" fill="none" stroke="#388e3c" stroke-width="1.5"/>
    <path d="M430 315 L430 355" stroke="#388e3c" stroke-width="1"/>
    <path d="M470 315 L470 355" stroke="#388e3c" stroke-width="1"/>
    <text x="500" y="330" class="label-text">Database</text>
    
    <!-- Key components -->
    <rect x="550" y="310" width="210" height="45" fill="white" rx="6"/>
    <text x="655" y="328" text-anchor="middle" class="label-text" fill="#388e3c">Log Contains:</text>
    <text x="655" y="345" text-anchor="middle" class="body-text" font-size="9">Transaction ID, Operation, Before/After Images, LSN</text>
  </g>
  
  <!-- Step 4: Write-Ahead Logging -->
  <g class="step" id="step4" data-narration="Write-Ahead Logging requires that log records be written to stable storage BEFORE database modifications are written to disk, ensuring recoverability.">
    <rect x="20" y="375" width="760" height="95" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
    <text x="40" y="395" class="subtitle-text" font-weight="bold">Write-Ahead Logging (WAL) Protocol</text>
    <text x="40" y="415" class="body-text">The log must be written BEFORE the actual database modification. This ensures recovery is possible even if crash occurs during update.</text>
    
    <!-- WAL Diagram -->
    <rect x="80" y="430" width="150" height="45" fill="#9c27b0" rx="6">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s"/>
    </rect>
    <text x="155" y="455" text-anchor="middle" fill="white" font-weight="bold" font-size="11">Write Log First</text>
    
    <line x1="235" y1="452" x2="280" y2="452" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="290" y="430" width="150" height="45" fill="#e3f2fd" rx="6" stroke="#1976d2" stroke-width="2">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s"/>
    </rect>
    <text x="365" y="455" text-anchor="middle" fill="#1976d2" font-weight="bold" font-size="11">Then Update DB</text>
    
    <!-- Formula -->
    <rect x="500" y="425" width="260" height="50" fill="white" rx="6"/>
    <text x="630" y="450" text-anchor="middle" class="formula-text" font-size="14">log_record → database_modification</text>
    <text x="630" y="468" text-anchor="middle" class="body-text" font-size="9" fill="#666">(must precede)</text>
  </g |
  
  <!-- Step 5: Deferred vs Immediate Modification -->
  <g class="step" id="step5" data-narration="Deferred modification postpones database updates until commit time, requiring only REDO during recovery. Immediate modification updates during execution, requiring both UNDO and REDO.">
    <rect x="20" y="480" width="760" height="105" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="40" y="500" class="subtitle-text" font-weight="bold">Deferred vs Immediate Database Modification</text>
    
    <!-- Two columns -->
    <rect x="40" y="515" width="340" height="60" fill="white" rx="8">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.2s"/>
    </rect>
    <text x="210" y="533" text-anchor="middle" class="label-text" fill="#388e3c">Deferred Modification</text>
    <text x="210" y="550" text-anchor="middle" class="body-text" font-size="10">Updates only after COMMIT</text>
    <text x="210" y="565" text-anchor="middle" class="body-text" font-size="10" fill="#388e3c">Recovery: Only REDO needed</text>
    
    <rect x="400" y="515" width="340" height="60" fill="white" rx="8">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.4s"/>
    </rect>
    <text x="570" y="533" text-anchor="middle" class="label-text" fill="#f44336">Immediate Modification</text>
    <text x="570" y="550" text-anchor="middle" class="body-text" font-size="10">Updates during execution</text>
    <text x="570" y="565" text-anchor="middle" class="body-text" font-size="10" fill="#f44336">Recovery: Both UNDO + REDO</text>
  </g>
  
  <!-- Step 6: Deferred Modification Example -->
  <g class="step" id="step6" data-narration="In deferred modification, T1 commits and its updates are applied, but T2 aborts before commit so no changes need rolling back from the database.">
    <rect x="20" y="595" width="760" height="95" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="40" y="615" class="subtitle-text" font-weight="bold">Example: Deferred Modification Recovery</text>
    
    <!-- Timeline visualization -->
    <line x1="60" y1="650" x2="720" y2="650" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1s" begin="0.3s"/>
    </line>
    
    <!-- T1 -->
    <rect x="60" y="655" width="100" height="25" fill="#388e3c" rx="4"/>
    <text x="110" y="673" text-anchor="middle" fill="white" font-size="10" font-weight="bold">T1: BEGIN → COMMIT</text>
    <text x="200" y="673" class="body-text" fill="#388e3c">REDO X+10</text>
    
    <!-- T2 -->
    <rect x="280" y="655" width="100" height="25" fill="#f44336" rx="4"/>
    <text x="330" y="673" text-anchor="middle" fill="white" font-size="10" font-weight="bold">T2: BEGIN → ABORT</text>
    <text x="430" y="673" class="body-text" fill="#666">No changes to undo</text>
    
    <!-- Result -->
    <rect x="520" y="660" width="200" height="25" fill="white" rx="4" stroke="#388e3c" stroke-width="2"/>
    <text x="620" y="677" text-anchor="middle" class="label-text" fill="#388e3c">Result: Only T1's changes applied</text>
  </g>
  
  <!-- Step 7: Immediate Modification Example -->
  <g class="step" id="step7" data-narration="With immediate modification, committed transactions like T1 are redone, while uncommitted transactions like T2 are undone during recovery.">
    <rect x="20" y="700" width="760" height="95" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="40" y="720" class="subtitle-text" font-weight="bold">Example: Immediate Modification Recovery</text>
    
    <!-- Log records -->
    <rect x="40" y="735" width="720" height="50" fill="white" rx="6"/>
    <text x="55" y="752" class="code-text" font-size="9">&lt;T1 BEGIN&gt;</text>
    <text x="130" y="752" class="code-text" font-size="9">&lt;T1 UPDATE X:50→60&gt;</text>
    <text x="260" y="752" class="code-text" font-size="9">&lt;T1 UPDATE Y:100→110&gt;</text>
    <text x="390" y="752" class="code-text" font-size="9">&lt;T2 BEGIN&gt;</text>
    <text x="470" y="752" class="code-text" font-size="9">&lt;T2 UPDATE Z:200→220&gt;</text>
    <text x="580" y="752" class="code-text" font-size="9" fill="#388e3c">&lt;T1 COMMIT&gt;</text>
    <text x="660" y="752" class="code-text" font-size="9" fill="#f44336">CRASH!</text>
    
    <!-- Recovery actions -->
    <rect x="40" y="795" width="330" height="35" fill="#e8f5e9" rx="6" stroke="#388e3c"/>
    <text x="205" y="813" text-anchor="middle" class="label-text" fill="#388e3c">REDO T1: X=60, Y=110</text>
    
    <rect x="390" y="795" width="330" height="35" fill="#ffebee" rx="6" stroke="#f44336"/>
    <text x="555" y="813" text-anchor="middle" class="label-text" fill="#f44336">UNDO T2: Restore Z=200</text>
  </g>
  </g>
</svg>