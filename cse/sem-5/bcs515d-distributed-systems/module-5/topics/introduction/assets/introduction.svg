<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <g class="step" id="step0" data-narration="Welcome to Introduction to Advanced Topics in Computer Science. This module covers problem-solving approaches, algorithm design, data structures, system design principles, and programming paradigms.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="40" y="35" font-size="22" font-weight="bold" fill="#1976d2">Introduction to Advanced Topics in Computer Science</text>
  </g>
  <g class="step" id="step1" data-narration="The module covers key concepts: problem-solving approaches using decomposition, algorithm design and analysis using Big O notation, and fundamental data structures for efficient data organization.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="8"/>
    <text x="40" y="80" font-size="14" font-weight="bold" fill="#1976d2">Key Concepts Overview</text>
    <rect x="40" y="92" width="220" height="38" fill="#e3f2fd" rx="6"/>
    <text x="50" y="108" font-size="11" fill="#1976d2">Problem-Solving</text>
    <text x="50" y="122" font-size="9" fill="#6b7280">Decomposition, Divide-and-Conquer</text>
    <rect x="270" y="92" width="220" height="38" fill="#e8f5e9" rx="6"/>
    <text x="280" y="108" font-size="11" fill="#388e3c">Algorithm Design</text>
    <text x="280" y="122" font-size="9" fill="#6b7280">Time &amp; Space Complexity</text>
    <rect x="500" y="92" width="220" height="38" fill="#fff3e0" rx="6"/>
    <text x="510" y="108" font-size="11" fill="#ff9800">Data Structures</text>
    <text x="510" y="122" font-size="9" fill="#6b7280">Arrays, Lists, Trees, Hash Tables</text>
  </g>
  <g class="step" id="step2" data-narration="System design principles include modularity for breaking systems into components, encapsulation for bundling data with methods, and abstraction for hiding implementation details from users.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="8"/>
    <text x="40" y="168" font-size="14" font-weight="bold" fill="#388e3c">System Design Principles</text>
    <rect x="40" y="180" width="230" height="38" fill="#e8f5e9" rx="6"/>
    <text x="50" y="196" font-size="11" fill="#388e3c">Modularity</text>
    <text x="50" y="210" font-size="9" fill="#6b7280">Divide system into modules</text>
    <rect x="280" y="180" width="230" height="38" fill="#f3e5f5" rx="6"/>
    <text x="290" y="196" font-size="11" fill="#9c27b0">Encapsulation</text>
    <text x="290" y="210" font-size="9" fill="#6b7280">Bundle data with methods</text>
    <rect x="520" y="180" width="230" height="38" fill="#ffebee" rx="6"/>
    <text x="530" y="196" font-size="11" fill="#f44336">Abstraction</text>
    <text x="530" y="210" font-size="9" fill="#6b7280">Hide implementation details</text>
  </g>
  <g class="step" id="step3" data-narration="Four programming paradigms exist: procedural for step-by-step instructions, object-oriented for data-method interaction, functional for mathematical functions, and declarative for describing desired results.">
    <rect x="20" y="234" width="760" height="85" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="8"/>
    <text x="40" y="256" font-size="14" font-weight="bold" fill="#9c27b0">Programming Paradigms</text>
    <rect x="40" y="268" width="170" height="50" fill="#e3f2fd" rx="6"/>
    <text x="50" y="284" font-size="10" fill="#1976d2">Procedural</text>
    <text x="50" y="298" font-size="9" fill="#6b7280">Sequence of instructions</text>
    <rect x="220" y="268" width="170" height="50" fill="#e8f5e9" rx="6"/>
    <text x="230" y="284" font-size="10" fill="#388e3c">Object-Oriented</text>
    <text x="230" y="298" font-size="9" fill="#6b7280">Data with methods</text>
    <rect x="400" y="268" width="170" height="50" fill="#fff3e0" rx="6"/>
    <text x="410" y="284" font-size="10" fill="#ff9800">Functional</text>
    <text x="410" y="298" font-size="9" fill="#6b7280">Mathematical functions</text>
    <rect x="580" y="268" width="170" height="50" fill="#f3e5f5" rx="6"/>
    <text x="590" y="284" font-size="10" fill="#9c27b0">Declarative</text>
    <text x="590" y="298" font-size="9" fill="#6b7280">What, not how</text>
  </g>
  <g class="step" id="step4" data-narration="Algorithm complexity analysis example shows finding maximum in an array has O(n) time complexity. We iterate through n-1 elements performing comparisons and assignments.">
    <rect x="20" y="327" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="8"/>
    <text x="40" y="349" font-size="14" font-weight="bold" fill="#ff9800">Example 1: Algorithm Complexity Analysis</text>
    <text x="40" y="367" font-size="11" fill="#6b7280">Finding maximum in array: Initialize max with first element, then iterate</text>
    <text x="40" y="383" font-size="11" fill="#6b7280">through remaining n-1 elements. Time complexity: O(n) - linear growth.</text>
    <rect x="500" y="353" width="260" height="46" fill="#fff3e0" rx="6"/>
    <text x="510" y="373" font-size="12" font-weight="bold" fill="#ff9800">Time Complexity: O(n)</text>
    <text x="510" y="389" font-size="10" fill="#6b7280">Linear time with input size</text>
  </g>
  <g class="step" id="step5" data-narration="Data structure selection example recommends hash tables for O(1) average lookup by customer ID. Arrays give O(1) access but fixed size, trees provide O(log n) search.">
    <rect x="20" y="415" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="8"/>
    <text x="40" y="437" font-size="14" font-weight="bold" fill="#f44336">Example 2: Choosing Appropriate Data Structure</text>
    <text x="40" y="455" font-size="11" fill="#6b7280">Problem: Store and retrieve customer info by ID with average O(1) retrieval time.</text>
    <rect x="40" y="463" width="180" height="28" fill="#e3f2fd" rx="5"/>
    <text x="50" y="479" font-size="10" fill="#1976d2">Array: O(1) access</text>
    <rect x="230" y="463" width="180" height="28" fill="#e8f5e9" rx="5"/>
    <text x="240" y="479" font-size="10" fill="#388e3c">Linked List: O(n) search</text>
    <rect x="420" y="463" width="180" height="28" fill="#fff3e0" rx="5"/>
    <text x="430" y="479" font-size="10" fill="#ff9800">Tree: O(log n) avg</text>
    <rect x="610" y="463" width="150" height="28" fill="#f3e5f5" rx="5"/>
    <text x="620" y="479" font-size="10" fill="#9c27b0">Hash Table: O(1)</text>
  </g>
  <g class="step" id="step6" data-narration="Design pattern example uses Factory pattern to create different database connections without modifying client code, enabling loose coupling and centralized creation logic.">
    <rect x="20" y="503" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="8"/>
    <text x="40" y="525" font-size="14" font-weight="bold" fill="#1976d2">Example 3: Applying Design Patterns (Factory Pattern)</text>
    <text x="40" y="543" font-size="10" fill="#6b7280">Create MySQL, PostgreSQL, MongoDB connections without modifying client code.</text>
    <rect x="40" y="553" width="340" height="30" fill="#e3f2fd" rx="5"/>
    <text x="50" y="569" font-size="10" fill="#1976d2">DatabaseFactory.create_database(db_type)</text>
    <rect x="390" y="553" width="370" height="30" fill="#e8f5e9" rx="5"/>
    <text x="400" y="569" font-size="10" fill="#388e3c">Benefits: Loose coupling, centralized logic</text>
    <text x="40" y="582" font-size="10" fill="#6b7280">Common patterns: Factory, Singleton, Observer, Strategy, Adapter</text>
  </g>
</svg>