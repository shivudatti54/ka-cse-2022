<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="This topic covers intelligent agents, their interaction with environments, and different agent architectures for AI systems in real-world applications and learning scenarios.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Agents and Environment</text>
  </g>
  
  <!-- Step 1: Agent Definition -->
  <g class="step" id="step1" data-narration="An agent perceives through sensors, reasons with knowledge, acts through actuators, and learns from experience in a continuous cycle continuously.">
    <rect x="50" y="58" width="700" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Agent Definition</text>
    <rect x="70" y="88" width="180" height="40" rx="4" fill="#c8e6c9"/>
    <text x="160" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">SENSORS</text>
    <text x="160" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Perceives</text>
    <path d="M250 108 L290 108" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="300" y="88" width="140" height="40" rx="4" fill="#a5d6a7"/>
    <text x="370" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">AGENT</text>
    <text x="370" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Reasons &amp; Acts</text>
    <path d="M450 108 L490 108" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="500" y="88" width="180" height="40" rx="4" fill="#c8e6c9"/>
    <text x="590" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">ACTUATORS</text>
    <text x="590" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Acts on Environment</text>
    <path d="M620 128 L620 148 L560 148" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="660" y="115" font-family="Arial" font-size="9" fill="#666">Environment</text>
  </g>
  
  <!-- Step 2: PEAS Framework -->
  <g class="step" id="step2" data-narration="PEAS defines task environments: Performance measure evaluates success, Environment is the setting, Actuators affect the world, Sensors perceive it accurately.">
    <rect x="50" y="146" width="700" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">PEAS Framework</text>
    <rect x="70" y="180" width="155" height="36" rx="4" fill="#ffe0b2"/>
    <text x="147" y="200" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">P - Performance</text>
    <text x="147" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Success criteria</text>
    <rect x="235" y="180" width="155" height="36" rx="4" fill="#ffe0b2"/>
    <text x="312" y="200" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">E - Environment</text>
    <text x="312" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Operating setting</text>
    <rect x="400" y="180" width="155" height="36" rx="4" fill="#ffe0b2"/>
    <text x="477" y="200" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">A - Actuators</text>
    <text x="477" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Action devices</text>
    <rect x="565" y="180" width="155" height="36" rx="4" fill="#ffe0b2"/>
    <text x="642" y="200" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">S - Sensors</text>
    <text x="642" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Perception devices</text>
  </g>
  
  <!-- Step 3: Environment Types -->
  <g class="step" id="step3" data-narration="Environments are classified by six properties: observable state, deterministic outcomes, episodic or sequential episodes, static or dynamic changes, and agent interaction.">
    <rect x="50" y="234" width="700" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Environment Properties</text>
    <rect x="70" y="268" width="105" height="36" rx="4" fill="#bbdefb"/>
    <text x="122" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Observable</text>
    <text x="122" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Full/Partial</text>
    <rect x="185" y="268" width="105" height="36" rx="4" fill="#bbdefb"/>
    <text x="237" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Deterministic</text>
    <text x="237" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Predictable?</text>
    <rect x="300" y="268" width="105" height="36" rx="4" fill="#bbdefb"/>
    <text x="352" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Episodic</text>
    <text x="352" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Independent?</text>
    <rect x="415" y="268" width="105" height="36" rx="4" fill="#bbdefb"/>
    <text x="467" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Static</text>
    <text x="467" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Changes?</text>
    <rect x="530" y="268" width="105" height="36" rx="4" fill="#bbdefb"/>
    <text x="582" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Discrete</text>
    <text x="582" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Finite states?</text>
    <rect x="645" y="268" width="105" height="36" rx="4" fill="#bbdefb"/>
    <text x="697" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Single-agent</text>
    <text x="697" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Others?</text>
  </g>
  
  <!-- Step 4: Agent Types -->
  <g class="step" id="step4" data-narration="Five agent types exist: simple reflex uses rules, model-based maintains state, goal-based plans ahead, utility-based optimizes, and learning agents improve from experience.">
    <rect x="50" y="322" width="700" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Agent Architectures</text>
    <rect x="70" y="356" width="118" height="36" rx="4" fill="#e1bee7"/>
    <text x="129" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Simple Reflex</text>
    <text x="129" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Condition-action rules</text>
    <rect x="198" y="356" width="118" height="36" rx="4" fill="#e1bee7"/>
    <text x="257" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Model-Based</text>
    <text x="257" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Internal state</text>
    <rect x="326" y="356" width="118" height="36" rx="4" fill="#e1bee7"/>
    <text x="385" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Goal-Based</text>
    <text x="385" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Future planning</text>
    <rect x="454" y="356" width="118" height="36" rx="4" fill="#e1bee7"/>
    <text x="513" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Utility-Based</text>
    <text x="513" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Optimize outcomes</text>
    <rect x="582" y="356" width="118" height="36" rx="4" fill="#e1bee7"/>
    <text x="641" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Learning</text>
    <text x="641" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Improves over time</text>
  </g>
  
  <!-- Step 5: Examples -->
  <g class="step" id="step5" data-narration="Real-world examples include vacuum cleaners using simple reflex, chess playing with goal-based minimax, and medical diagnosis using utility-based probability calculations.">
    <rect x="50" y="410" width="700" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Examples</text>
    <rect x="70" y="444" width="210" height="36" rx="4" fill="#ffcdd2"/>
    <text x="175" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Vacuum Cleaner</text>
    <text x="175" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Simple Reflex | Fully Observable</text>
    <rect x="290" y="444" width="210" height="36" rx="4" fill="#ffcdd2"/>
    <text x="395" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Chess Agent</text>
    <text x="395" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Goal-Based | Deterministic | Discrete</text>
    <rect x="510" y="444" width="210" height="36" rx="4" fill="#ffcdd2"/>
    <text x="615" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Medical Diagnosis</text>
    <text x="615" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Utility-Based | Partially Observable</text>
  </g>
  
  <!-- Step 6: Key Takeaways -->
  <g class="step" id="step6" data-narration="Remember to always define PEAS first, match agent type to environment complexity, understand rationality is not omniscience, and use simple agents for simple environments.">
    <rect x="50" y="498" width="700" height="85" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key Exam Points</text>
    <rect x="70" y="528" width="220" height="45" rx="4" fill="#c8e6c9"/>
    <text x="180" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">PEAS is Essential</text>
    <text x="180" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Always define PEAS first</text>
    <rect x="300" y="528" width="220" height="45" rx="4" fill="#c8e6c9"/>
    <text x="410" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Rationality ≠ Omniscience</text>
    <text x="410" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Best expected, not perfect</text>
    <rect x="530" y="528" width="200" height="45" rx="4" fill="#c8e6c9"/>
    <text x="630" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Match Agent to Environment</text>
    <text x="630" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Simple needs simple</text>
  </g>
</svg>