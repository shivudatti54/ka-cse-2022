<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="State of the Art represents the highest level of technological development in computing at any given time, encompassing hardware, software, and paradigms.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">State of the Art in Modern Computing</text>
  </g>
  
  <g class="step" id="step1" data-narration="Modern processors use multi-core architectures with 8-16 cores. GPUs have thousands of parallel cores for AI workloads. ASICs provide custom hardware solutions.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Advanced Processor Architectures</text>
    <rect x="40" y="90" width="220" height="40" fill="#ffffff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="150" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Multi-Core CPU</text>
    <text x="150" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">8-16 cores</text>
    <rect x="290" y="90" width="220" height="40" fill="#ffffff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">GPU / GPGPU</text>
    <text x="400" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Thousands of cores</text>
    <rect x="540" y="90" width="220" height="40" fill="#ffffff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="650" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">ASIC</text>
    <text x="650" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Custom hardware</text>
  </g>
  
  <g class="step" id="step2" data-narration="Cloud computing offers three main service models: IaaS provides infrastructure, PaaS offers platforms, SaaS delivers software. Serverless computing adds FaaS capability.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Cloud Computing Paradigms</text>
    <rect x="40" y="182" width="165" height="36" fill="#c8e6c9" rx="4"/>
    <text x="122" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">IaaS</text>
    <text x="122" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Infrastructure</text>
    <line x1="205" y1="200" x2="225" y2="200" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="230" y="182" width="165" height="36" fill="#a5d6a7" rx="4"/>
    <text x="312" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">PaaS</text>
    <text x="312" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Platform</text>
    <line x1="395" y1="200" x2="415" y2="200" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="420" y="182" width="165" height="36" fill="#81c784" rx="4"/>
    <text x="502" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">SaaS</text>
    <text x="502" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Software</text>
    <line x1="585" y1="200" x2="605" y2="200" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="610" y="182" width="165" height="36" fill="#66bb6a" rx="4"/>
    <text x="692" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Serverless / FaaS</text>
    <text x="692" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Event-driven</text>
  </g>
  
  <g class="step" id="step3" data-narration="AI has achieved human-level performance through deep learning with multiple neural network layers. Transformers revolutionized NLP with GPT and BERT models.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">AI and Machine Learning</text>
    <rect x="40" y="270" width="220" height="36" fill="#e1bee7" rx="4"/>
    <text x="150" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Deep Learning</text>
    <text x="150" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Multi-layer neural networks</text>
    <rect x="290" y="270" width="220" height="36" fill="#ce93d8" rx="4"/>
    <text x="400" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Transformers</text>
    <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">GPT, BERT - NLP revolution</text>
    <rect x="540" y="270" width="220" height="36" fill="#ab47bc" rx="4"/>
    <text x="650" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Reinforcement Learning</text>
    <text x="650" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">AlphaGo, autonomous systems</text>
  </g>
  
  <g class="step" id="step4" data-narration="Quantum computing uses qubits that can exist in superposition, enabling parallel computation. Quantum entanglement allows correlated qubit states for advanced algorithms.">
    <rect x="20" y="322" width="760" height="80" fill="#e0f7fa" rx="8" stroke="#00838f" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#00838f">Quantum Computing</text>
    <circle cx="150" cy="370" r="30" fill="#b2ebf2" stroke="#00acc1" stroke-width="2"/>
    <text x="150" y="365" text-anchor="middle" font-family="Arial" font-size="9" fill="#006064">Qubit</text>
    <text x="150" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#006064">|0⟩ + |1⟩</text>
    <text x="220" y="370" font-family="Arial" font-size="10" fill="#00838f">Superposition</text>
    <text x="220" y="385" font-family="Arial" font-size="8" fill="#006064">Parallel computation</text>
    <line x1="290" y1="370" x2="330" y2="370" stroke="#00acc1" stroke-width="1" marker-end="url(#arrowhead)"/>
    <circle cx="390" cy="370" r="30" fill="#b2ebf2" stroke="#00acc1" stroke-width="2"/>
    <text x="390" y="365" text-anchor="middle" font-family="Arial" font-size="9" fill="#006064">Entanglement</text>
    <text x="390" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#006064">Correlated states</text>
    <text x="470" y="370" font-family="Arial" font-size="10" fill="#00838f">Algorithms</text>
    <text x="470" y="385" font-family="Arial" font-size="8" fill="#006064">Shor's, Grover's</text>
    <line x1="530" y1="370" x2="570" y2="370" stroke="#00acc1" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="590" y="345" width="180" height="50" fill="#80deea" rx="4"/>
    <text x="680" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#006064">Quantum Speedup</text>
    <text x="680" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#006064">Exponential for certain problems</text>
  </g>
  
  <g class="step" id="step5" data-narration="IoT connects billions of devices from smart homes to industrial sensors. Edge computing enables real-time processing locally, reducing latency for critical applications.">
    <rect x="20" y="410" width="760" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">IoT and Embedded Systems</text>
    <rect x="40" y="448" width="140" height="34" fill="#ffe0b2" rx="4"/>
    <text x="110" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Smart Home</text>
    <rect x="195" y="448" width="140" height="34" fill="#ffcc80" rx="4"/>
    <text x="265" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Wearables</text>
    <rect x="350" y="448" width="140" height="34" fill="#ffb74d" rx="4"/>
    <text x="420" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Industrial Sensors</text>
    <rect x="505" y="448" width="140" height="34" fill="#ffa726" rx="4"/>
    <text x="575" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Autonomous Vehicles</text>
    <rect x="660" y="448" width="110" height="34" fill="#ff9800" rx="4"/>
    <text x="715" y="460" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Edge Computing</text>
    <text x="715" y="473" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff3e0">Local processing</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam topics include cloud service model differences, quantum advantages over classical computing, and how IoT, cloud, and AI interconnect in modern systems.">
    <rect x="20" y="498" width="760" height="90" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips & Key Relationships</text>
    <rect x="40" y="532" width="230" height="48" fill="#ffcdd2" rx="4"/>
    <text x="155" y="547" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Cloud Models</text>
    <text x="155" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">IaaS vs PaaS vs SaaS</text>
    <text x="155" y="572" text-anchor="middle" font-family="Arial" font-size="7" fill="#b71c1c">Know differences & examples</text>
    <rect x="285" y="532" width="230" height="48" fill="#ef9a9a" rx="4"/>
    <text x="400" y="547" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Quantum vs Classical</text>
    <text x="400" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Grover's: O(√N) vs O(N)</text>
    <text x="400" y="572" text-anchor="middle" font-family="Arial" font-size="7" fill="#b71c1c">Specific problems only</text>
    <rect x="530" y="532" width="240" height="48" fill="#e57373" rx="4"/>
    <text x="650" y="547" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Technology Integration</text>
    <text x="650" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">IoT → Cloud → AI → Edge</text>
    <text x="650" y="572" text-anchor="middle" font-family="Arial" font-size="7" fill="#b71c1c">Understand the data flow</text>
  </g>
</svg>