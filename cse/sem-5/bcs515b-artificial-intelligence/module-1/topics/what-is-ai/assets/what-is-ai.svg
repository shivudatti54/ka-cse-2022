<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This lesson introduces Artificial Intelligence (AI), covering its definition, types, approaches, and real-world applications for  CSE students studying advanced computing concepts.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">What is Artificial Intelligence (AI)</text>
  </g>
  
  <g class="step" id="step1" data-narration="AI simulates human intelligence in machines, enabling them to think, learn, and solve complex problems similar to how humans do.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition of AI</text>
    <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">Artificial Intelligence is the branch of computer science that builds</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">intelligent machines capable of performing tasks requiring human</text>
    <text x="40" y="124" font-family="Arial" font-size="10" fill="#333">intelligence: reasoning, learning, problem-solving, perception, and language.</text>
  </g>
  
  <g class="step" id="step2" data-narration="AI is categorized into three types: Narrow AI for specific tasks, General AI for human-level reasoning, and Super AI beyond human intelligence.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Types of AI</text>
    <rect x="40" y="178" width="220" height="40" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="150" y="192" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Narrow AI (Weak)</text>
    <text x="150" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Current AI: Siri, Alexa,</text>
    <text x="150" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Image Recognition</text>
    <rect x="290" y="178" width="220" height="40" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="400" y="192" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">General AI (Strong)</text>
    <text x="400" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Human-level reasoning,</text>
    <text x="400" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">not yet achieved</text>
    <rect x="540" y="178" width="220" height="40" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="650" y="192" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Super AI</text>
    <text x="650" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Hypothetical: surpasses</text>
    <text x="650" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">human intelligence</text>
  </g>
  
  <g class="step" id="step3" data-narration="Three main AI approaches exist: Symbolic AI uses explicit rules, Machine Learning finds patterns in data, and Deep Learning uses neural networks.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Approaches to AI</text>
    <rect x="40" y="266" width="230" height="42" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="155" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Symbolic AI</text>
    <text x="155" y="294" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Rule-based, explicit rules</text>
    <text x="155" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Expert Systems</text>
    <rect x="285" y="266" width="230" height="42" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="400" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Machine Learning</text>
    <text x="400" y="294" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Learns patterns from data</text>
    <text x="400" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Regression, Decision Trees</text>
    <rect x="530" y="266" width="230" height="42" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="645" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Deep Learning</text>
    <text x="645" y="294" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Neural networks with many</text>
    <text x="645" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">layers (CNNs, RNNs)</text>
  </g>
  
  <g class="step" id="step4" data-narration="AI contains Machine Learning, which contains Deep Learning as a subset. The famous Turing Test checks if machines can convincingly mimic human conversation.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">AI, ML, DL Relationship</text>
    <rect x="40" y="356" width="180" height="40" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="130" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Artificial Intelligence</text>
    <text x="130" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">All AI systems</text>
    <rect x="100" y="360" width="180" height="40" fill="#ce93d8" stroke="#9c27b0" rx="3"/>
    <text x="190" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Machine Learning</text>
    <text x="190" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Subset of AI</text>
    <rect x="160" y="364" width="180" height="40" fill="#ab47bc" stroke="#6a1b9a" rx="3"/>
    <text x="250" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Deep Learning</text>
    <text x="250" y="392" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Subset of ML</text>
    <rect x="420" y="356" width="340" height="40" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="590" y="368" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Turing Test (1950)</text>
    <text x="590" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Machine passes if evaluator cannot distinguish</text>
    <text x="590" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">it from human in text conversation</text>
  </g>
  
  <g class="step" id="step5" data-narration="An intelligent agent in AI perceives its environment through sensors and acts through actuators, forming the fundamental basis of modern AI system design.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Intelligent Agent</text>
    <rect x="40" y="446" width="160" height="40" fill="#ffcdd2" stroke="#f44336" rx="3"/>
    <text x="120" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">SENSORS</text>
    <text x="120" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Perceives environment</text>
    <line x1="200" y1="466" x2="250" y2="466" stroke="#f44336" stroke-width="2" marker-end="url(#arrowRed)"/>
    <rect x="260" y="446" width="160" height="40" fill="#ef9a9a" stroke="#c62828" rx="3"/>
    <text x="340" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">AGENT</text>
    <text x="340" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Processes &amp; decides</text>
    <line x1="420" y1="466" x2="470" y2="466" stroke="#f44336" stroke-width="2" marker-end="url(#arrowRed)"/>
    <rect x="480" y="446" width="160" height="40" fill="#ffcdd2" stroke="#f44336" rx="3"/>
    <text x="560" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">ACTUATORS</text>
    <text x="560" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Acts on environment</text>
  </g>
  
  <g class="step" id="step6" data-narration="Real-world AI examples include email spam classification, chess programs like AlphaZero, and voice assistants that combine speech recognition with natural language processing.">
    <rect x="20" y="498" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Real-World AI Examples</text>
    <rect x="40" y="530" width="230" height="48" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="155" y="544" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Spam Classification</text>
    <text x="155" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">ML learns patterns from</text>
    <text x="155" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">labeled emails to classify spam</text>
    <rect x="285" y="530" width="230" height="48" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="400" y="544" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Chess Programs</text>
    <text x="400" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Deep Blue: rule-based;</text>
    <text x="400" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">AlphaZero: self-taught via RL</text>
    <rect x="530" y="530" width="230" height="48" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="645" y="544" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Voice Assistants</text>
    <text x="645" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Speech recognition, NLU,</text>
    <text x="645" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">response generation, TTS</text>
  </g>
</svg>