<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Classical Planning is a fundamental area of artificial intelligence that focuses on generating valid action sequences to achieve specific goals from given initial states.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Classical Planning</text>
  </g>
  
  <!-- step1: Planning Problem Definition -->
  <g class="step" id="step1" data-narration="A planning problem is formally defined as a tuple containing states S, actions A, initial state I, goal G, and transition function γ mapping state-action pairs to resulting states.">
    <rect x="10" y="60" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Planning Problem: Tuple (S, A, I, G, γ)</text>
    <text x="30" y="100" font-family="Arial" font-size="10" fill="#333">S: Finite set of all states</text>
    <text x="30" y="115" font-family="Arial" font-size="10" fill="#333">A: Set of all possible actions</text>
    <text x="30" y="130" font-family="Arial" font-size="10" fill="#333">I ∈ S: Initial state | G ⊆ S: Goal condition | γ: S × A → S (transition function)</text>
  </g>
  
  <!-- step2: STRIPS Planning -->
  <g class="step" id="step2" data-narration="STRIPS represents actions using preconditions that must be true before execution, add lists showing new true facts, and delete lists indicating facts that become false afterward.">
    <rect x="10" y="150" width="780" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="30" y="170" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">STRIPS Planning Representation</text>
    <rect x="30" y="182" width="180" height="42" fill="#e8f5e9" rx="3"/>
    <text x="120" y="196" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">PRECONDITIONS</text>
    <text x="120" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Conditions required</text>
    <text x="120" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">before action</text>
    <path d="M220,203 L250,203" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="260" y="182" width="180" height="42" fill="#fff3e0" rx="3"/>
    <text x="350" y="196" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">ACTION</text>
    <text x="350" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Pickup(X), Stack,</text>
    <text x="350" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Unstack, Putdown</text>
    <path d="M450,203 L480,203" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="490" y="180" width="130" height="45" fill="#ffebee" rx="3"/>
    <text x="555" y="193" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">ADD LIST</text>
    <text x="555" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">New true facts</text>
    <rect x="630" y="180" width="130" height="45" fill="#f3e5f5" rx="3"/>
    <text x="695" y="193" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">DELETE LIST</text>
    <text x="695" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Removed facts</text>
  </g>
  
  <!-- step3: Forward vs Backward Search -->
  <g class="step" id="step3" data-narration="Forward search progresses from the initial state applying actions until reaching goals; backward search regresses from the goal state toward the initial state by finding applicable actions.">
    <rect x="10" y="240" width="780" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="30" y="260" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">State-Space Search Approaches</text>
    <rect x="30" y="274" width="340" height="42" fill="#e3f2fd" rx="3"/>
    <text x="200" y="288" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Forward Search (Progression)</text>
    <text x="200" y="304" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Start: Initial State → Apply Actions → Goal</text>
    <rect x="390" y="274" width="340" height="42" fill="#e8f5e9" rx="3"/>
    <text x="560" y="288" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Backward Search (Regression)</text>
    <text x="560" y="304" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Start: Goal State → Find Preconditions → Initial</text>
  </g>
  
  <!-- step4: Partial-Order Planning -->
  <g class="step" id="step4" data-narration="Partial-order planning maintains actions in flexible order and resolves open preconditions incrementally through plan refinement, selecting flaws systematically until a complete plan emerges.">
    <rect x="10" y="330" width="780" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="30" y="350" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Partial-Order Planning (POP)</text>
    <rect x="30" y="366" width="200" height="40" fill="#f3e5f5" rx="3"/>
    <text x="130" y="380" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Start Action</text>
    <text x="130" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">No preconditions,</text>
    <text x="130" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">I as effects</text>
    <rect x="250" y="366" width="200" height="40" fill="#f3e5f5" rx="3"/>
    <text x="350" y="380" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Finish Action</text>
    <text x="350" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">G as preconditions,</text>
    <text x="350" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">no effects</text>
    <rect x="470" y="366" width="200" height="40" fill="#ffebee" rx="3"/>
    <text x="570" y="380" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Open Precondition</text>
    <text x="570" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Unachieved condition</text>
    <text x="570" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">resolved by resolvers</text>
  </g>
  
  <!-- step5: Planning Graph and GraphPlan -->
  <g class="step" id="step5" data-narration="Planning graphs feature alternating proposition and action layers that enable efficient planning by providing polynomial-time heuristics and detecting unsolvable problem instances accurately.">
    <rect x="10" y="420" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="440" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Planning Graph and GraphPlan</text>
    <rect x="30" y="458" width="100" height="36" fill="#e3f2fd" rx="3"/>
    <text x="80" y="472" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Proposition</text>
    <text x="80" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Layer 0</text>
    <path d="M135,476 L155,476" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="160" y="458" width="100" height="36" fill="#ffebee" rx="3"/>
    <text x="210" y="472" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Action</text>
    <text x="210" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Layer 0</text>
    <path d="M265,476 L285,476" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="290" y="458" width="100" height="36" fill="#e3f2fd" rx="3"/>
    <text x="340" y="472" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Proposition</text>
    <text x="340" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Layer 1</text>
    <path d="M395,476 L415,476" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="420" y="458" width="100" height="36" fill="#ffebee" rx="3"/>
    <text x="470" y="472" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Action</text>
    <text x="470" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Layer 1</text>
    <path d="M525,476 L545,476" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="550" y="458" width="100" height="36" fill="#e3f2fd" rx="3"/>
    <text x="600" y="472" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Proposition</text>
    <text x="600" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Layer n</text>
    <path d="M655,476 L680,476" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="690" y="455" width="80" height="42" fill="#e8f5e9" rx="3"/>
    <text x="730" y="468" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">GraphPlan</text>
    <text x="730" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">extracts</text>
    <text x="730" y="490" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">plans</text>
  </g>
  
  <!-- step6: Heuristics and PDDL -->
  <g class="step" id="step6" data-narration="Delete-list relaxation ignores action deletions to compute admissible heuristic estimates, while PDDL standardizes planning domains and problems enabling fair comparison of different planning algorithms.">
    <rect x="10" y="510" width="780" height="85" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="30" y="530" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Heuristics and PDDL</text>
    <rect x="30" y="544" width="230" height="46" fill="#e8f5e9" rx="3"/>
    <text x="145" y="560" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Delete-list Relaxation</text>
    <text x="145" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Ignore delete effects → h₁(n)</text>
    <text x="145" y="584" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Admissible (never overestimates)</text>
    <rect x="280" y="544" width="230" height="46" fill="#fff3e0" rx="3"/>
    <text x="395" y="560" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Subgoal Independence</text>
    <text x="395" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Assume independent → sum costs</text>
    <text x="395" y="584" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Fast but not admissible</text>
    <rect x="530" y="544" width="240" height="46" fill="#f3e5f5" rx="3"/>
    <text x="650" y="560" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">PDDL Example</text>
    <text x="650" y="574" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Domain: Blocks-World</text>
    <text x="650" y="584" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Action: STACK(?x, ?y)</text>
  </g>
</svg>