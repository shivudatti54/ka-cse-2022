<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to this lesson on Classical Planning, a fundamental subfield of Artificial Intelligence that deals with finding sequences of actions to achieve goals.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Definition of Classical Planning</text>
  </g>

  <!-- step1: Three Assumptions -->
  <g class="step" id="step1" data-narration="Classical planning assumes three key properties: full observability means complete world knowledge, determinism ensures predictable action outcomes, and the static world has no external interference.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Three Assumptions of Classical Planning</text>
    <rect x="70" y="88" width="200" height="40" rx="3" fill="#c8e6c9"/>
    <text x="170" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Full Observability</text>
    <text x="170" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#4caf50">Complete world knowledge</text>
    <rect x="280" y="88" width="200" height="40" rx="3" fill="#c8e6c9"/>
    <text x="380" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Determinism</text>
    <text x="380" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#4caf50">Predictable outcomes</text>
    <rect x="490" y="88" width="200" height="40" rx="3" fill="#c8e6c9"/>
    <text x="590" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Static World</text>
    <text x="590" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#4caf50">No external interference</text>
  </g>

  <!-- step2: Formal Definition -->
  <g class="step" id="step2" data-narration="A classical planning problem is formally defined as a tuple P equals open parenthesis Sigma comma s-zero comma G close parenthesis, where Sigma is the planning domain, s-zero is the initial state, and G is the goal condition.">
    <rect x="50" y="146" width="700" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Formal Definition</text>
    <rect x="70" y="180" width="660" height="36" rx="3" fill="#ffe0b2"/>
    <text x="400" y="203" text-anchor="middle" font-family="Courier New" font-size="14" fill="#bf360c">P = (Σ, s₀, G)</text>
    <text x="70" y="225" font-family="Arial" font-size="9" fill="#ff9800">Σ = Planning Domain (states, actions, transition) | s₀ = Initial State | G = Goal Condition</text>
  </g>

  <!-- step3: Components - States and Actions -->
  <g class="step" id="step3" data-narration="States represent complete world descriptions as sets of ground atoms. Actions have preconditions that must be true before execution and effects that represent resulting changes.">
    <rect x="50" y="234" width="700" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Components: States and Actions</text>
    <rect x="70" y="268" width="320" height="36" rx="3" fill="#e1bee7"/>
    <text x="230" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">State: Set of Ground Atoms</text>
    <text x="230" y="296" text-anchor="middle" font-family="Courier New" font-size="8" fill="#8e24aa">At(Robot,RoomA), Holding(Box)</text>
    <rect x="400" y="268" width="320" height="36" rx="3" fill="#e1bee7"/>
    <text x="560" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Action Schema</text>
    <text x="560" y="296" text-anchor="middle" font-family="Courier New" font-size="8" fill="#8e24aa">Preconditions + Effects</text>
  </g>

  <!-- step4: Transition Function -->
  <g class="step" id="step4" data-narration="The transition function maps states and actions to new states, following delta colon S cross product A yields S, representing deterministic state transitions in classical planning.">
    <rect x="50" y="322" width="700" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Transition Function and Goal</text>
    <rect x="70" y="356" width="250" height="36" rx="3" fill="#ffcdd2"/>
    <text x="195" y="370" text-anchor="middle" font-family="Courier New" font-size="12" fill="#b71c1c">δ: S × A → S</text>
    <text x="195" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#d32f2f">Successor State Function</text>
    <rect x="330" y="356" width="200" height="36" rx="3" fill="#ffcdd2"/>
    <text x="430" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Goal Condition</text>
    <text x="430" y="384" text-anchor="middle" font-family="Courier New" font-size="8" fill="#d32f2f">Logical formula G</text>
    <rect x="540" y="356" width="190" height="36" rx="3" fill="#ffcdd2"/>
    <text x="635" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Valid Plan</text>
    <text x="635" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#d32f2f">Sequence [a₁,a₂,...,aₙ]</text>
  </g>

  <!-- step5: PDDL -->
  <g class="step" id="step5" data-narration="PDDL (Planning Domain Definition Language) is the standard language for representing planning problems, consisting of domain definitions and specific problem instances.">
    <rect x="50" y="410" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">PDDL: Planning Domain Definition Language</text>
    <rect x="70" y="444" width="330" height="36" rx="3" fill="#bbdefb"/>
    <text x="235" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Domain Definition</text>
    <text x="235" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Predicates, Types, Action Schemas</text>
    <rect x="410" y="444" width="320" height="36" rx="3" fill="#bbdefb"/>
    <text x="570" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Problem Definition</text>
    <text x="570" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Objects, Initial State, Goal</text>
  </g>

  <!-- step6: Example -->
  <g class="step" id="step6" data-narration="In the Blocks World example, we stack blocks A, B, C from initial state OnTable(A), OnTable(B), On(A,B) to goal On(A,B) and On(B,C) using six actions.">
    <rect x="50" y="498" width="700" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Example: Blocks World</text>
    <rect x="70" y="528" width="150" height="50" rx="3" fill="#c8e6c9"/>
    <text x="145" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Initial State</text>
    <text x="145" y="557" text-anchor="middle" font-family="Courier New" font-size="8" fill="#388e3c">OnTable(A)</text>
    <text x="145" y="570" text-anchor="middle" font-family="Courier New" font-size="8" fill="#388e3c">On(A,B)</text>
    <rect x="230" y="528" width="80" height="50" rx="3" fill="#c8e6c9"/>
    <text x="270" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Goal</text>
    <text x="270" y="557" text-anchor="middle" font-family="Courier New" font-size="8" fill="#388e3c">On(A,B)</text>
    <text x="270" y="570" text-anchor="middle" font-family="Courier New" font-size="8" fill="#388e3c">On(B,C)</text>
    <rect x="320" y="528" width="410" height="50" rx="3" fill="#c8e6c9"/>
    <text x="525" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Plan (6 Actions)</text>
    <text x="525" y="557" text-anchor="middle" font-family="Arial" font-size="7" fill="#388e3c">Unstack→Putdown→Pickup→Stack→Pickup→Stack</text>
  </g>
</svg>