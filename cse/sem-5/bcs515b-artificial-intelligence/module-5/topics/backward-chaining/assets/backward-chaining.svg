<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Backward chaining is a goal-driven AI inference technique that starts from a hypothesis and works backwards through rules to find supporting facts.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Backward Chaining in Artificial Intelligence</text>
  </g>
  
  <g class="step" id="step1" data-narration="Backward chaining begins with a goal and checks if it can be proven using rules. It uses depth-first search to recursively prove sub-goals until reaching facts.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Goal-Driven Reasoning</text>
    <text x="40" y="98" font-family="Arial" font-size="10" fill="#333">1. Start with a goal/hypothesis</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">2. Find rules whose conclusions match the goal</text>
    <text x="40" y="126" font-family="Arial" font-size="10" fill="#333">3. Recursively prove each antecedent as sub-goals</text>
  </g>
  
  <g class="step" id="step2" data-narration="AND-OR graphs visualize backward chaining in AI systems. AND nodes require ALL conditions to be true, while OR nodes allow ANY one alternative to succeed.">
    <rect x="20" y="146" width="760" height="105" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">AND-OR Graph Representation</text>
    <rect x="40" y="182" width="100" height="30" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="90" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Goal</text>
    <line x1="90" y1="212" x2="140" y2="235" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="90" y1="212" x2="40" y2="235" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="140" y="220" width="80" height="25" fill="#ce93d8" stroke="#9c27b0" rx="3"/>
    <text x="180" y="236" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">OR Node</text>
    <rect x="10" y="220" width="80" height="25" fill="#ce93d8" stroke="#9c27b0" rx="3"/>
    <text x="50" y="236" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">AND Node</text>
  </g>
  
  <g class="step" id="step3" data-narration="The algorithm checks if goal is a known fact first. If not, it finds matching rules and attempts to prove all antecedents recursively.">
    <rect x="20" y="259" width="760" height="85" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="281" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Backward Chaining Algorithm</text>
    <text x="40" y="299" font-family="Arial" font-size="10" fill="#333">prove(goal):</text>
    <text x="55" y="313" font-family="Courier" font-size="9" fill="#333">if goal in facts: return TRUE</text>
    <text x="55" y="327" font-family="Courier" font-size="9" fill="#333">find rules R where R.conclusion == goal</text>
    <text x="55" y="341" font-family="Courier" font-size="9" fill="#333">for each rule R: if prove(R.antecedents): return TRUE</text>
  </g>
  
  <g class="step" id="step4" data-narration="Example: To prove prescribe_antibiotics, we need to establish respiratory_infection first. This requires proving fever AND cough, both confirmed as true facts from working memory.">
    <rect x="20" y="352" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="374" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example: Medical Diagnosis</text>
    <text x="40" y="392" font-family="Arial" font-size="10" fill="#333">Goal: prescribe_antibiotics</text>
    <text x="40" y="406" font-family="Arial" font-size="10" fill="#333">→ R4: respiratory_infection → prescribe_antibiotics</text>
    <text x="40" y="420" font-family="Arial" font-size="10" fill="#333">→ R1: fever AND cough → respiratory_infection</text>
    <text x="40" y="434" font-family="Arial" font-size="10" fill="#333">Check facts: fever=TRUE, cough=TRUE ✓ Result: TRUE</text>
  </g>
  
  <g class="step" id="step5" data-narration="Backward chaining works top-down from goal to facts using depth-first search, ideal for diagnostic systems with specific hypotheses to test.">
    <rect x="20" y="445" width="760" height="85" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="467" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Comparison: Forward vs Backward Chaining</text>
    <rect x="40" y="483" width="340" height="35" fill="#ffcdd2" rx="3"/>
    <text x="210" y="500" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Backward Chaining</text>
    <text x="210" y="515" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Goal → Facts | Top-down | Depth-first | Diagnostic</text>
    <rect x="420" y="483" width="340" height="35" fill="#ffcdd2" rx="3"/>
    <text x="590" y="500" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Forward Chaining</text>
    <text x="590" y="515" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Facts → Conclusions | Bottom-up | Breadth-first | Monitoring</text>
  </g>
  
  <g class="step" id="step6" data-narration="Termination conditions: definitely SUCCESS when goal is proven true, FAILURE when no rule chain satisfies it, or UNKNOWN when information is insufficient.">
    <rect x="20" y="538" width="760" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="560" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Termination Conditions</text>
    <rect x="40" y="572" width="200" height="22" fill="#c8e6c9" rx="3"/>
    <text x="140" y="587" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">SUCCESS</text>
    <rect x="270" y="572" width="200" height="22" fill="#c8e6c9" rx="3"/>
    <text x="370" y="587" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">FAILURE</text>
    <rect x="500" y="572" width="200" height="22" fill="#c8e6c9" rx="3"/>
    <text x="600" y="587" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">UNKNOWN</text>
  </g>
</svg>