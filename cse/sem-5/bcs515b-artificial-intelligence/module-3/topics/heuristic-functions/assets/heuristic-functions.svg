<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Heuristic functions estimate the cost from any state to the goal. They guide informed search algorithms like A* to find solutions efficiently using domain knowledge.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Heuristic Functions in Artificial Intelligence</text>
  </g>
  
  <g class="step" id="step1" data-narration="The evaluation function f(n) combines actual path cost g(n) with estimated cost h(n): f(n) = g(n) + h(n). This tells us total estimated solution cost through each node.">
    <rect x="10" y="58" width="780" height="80" fill="white" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="30" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Heuristic Evaluation Function</text>
    <text x="30" y="100" font-family="Arial" font-size="15" font-weight="bold" fill="#333">f(n) = g(n) + h(n)</text>
    <rect x="180" y="88" width="120" height="35" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="240" y="107" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">g(n): Cost from</text>
    <text x="240" y="120" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">start to node n</text>
    <rect x="310" y="88" width="120" height="35" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="370" y="107" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">h(n): Estimated</text>
    <text x="370" y="120" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">cost to goal</text>
    <rect x="440" y="88" width="120" height="35" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="500" y="107" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">f(n): Total</text>
    <text x="500" y="120" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">estimated cost</text>
  </g>
  
  <g class="step" id="step2" data-narration="An admissible heuristic never overestimates true cost. A consistent heuristic satisfies the triangle inequality, ensuring f-values never decrease along any path.">
    <rect x="10" y="146" width="780" height="80" fill="white" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="30" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Properties of Heuristic Functions</text>
    <rect x="30" y="180" width="340" height="40" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="200" y="198" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Admissible Heuristic</text>
    <text x="200" y="212" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">h(n) ≤ h*(n) for all nodes</text>
    <text x="200" y="222" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Never overestimates true cost</text>
    <rect x="390" y="180" width="340" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="560" y="198" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Consistent Heuristic</text>
    <text x="560" y="212" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">h(n) ≤ c(n,n') + h(n')</text>
    <text x="560" y="222" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Satisfies triangle inequality</text>
  </g>
  
  <g class="step" id="step3" data-narration="Common heuristics include Manhattan distance for grid movement, Euclidean distance for straight-line paths, and tile count for classic sliding puzzles.">
    <rect x="10" y="234" width="780" height="80" fill="white" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="30" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Types of Heuristic Functions</text>
    <rect x="30" y="268" width="145" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="102" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Trivial (h=0)</text>
    <text x="102" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Converts to uniform-cost</text>
    <rect x="185" y="268" width="145" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="257" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Manhattan Distance</text>
    <text x="257" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">|x1-x2| + |y1-y2|</text>
    <rect x="340" y="268" width="145" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="412" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Euclidean Distance</text>
    <text x="412" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">√((x1-x2)² + (y1-y2)²)</text>
    <rect x="495" y="268" width="145" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="567" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Tile Count</text>
    <text x="567" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Misplaced tiles</text>
    <rect x="650" y="268" width="130" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="715" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Gaschnig's</text>
    <text x="715" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Tiles needing move</text>
  </g>
  
  <g class="step" id="step4" data-narration="In the 8-puzzle, tile count measures misplaced tiles while Manhattan distance sums how far each tile is from its goal position.">
    <rect x="10" y="322" width="780" height="80" fill="white" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="30" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example: 8-Puzzle Heuristics</text>
    <text x="30" y="365" font-family="Arial" font-size="10" fill="#333">State: [1,2,3,4,5,6,0,7,8] → Goal: [1,2,3,4,5,6,7,8,0]</text>
    <rect x="30" y="372" width="280" height="25" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="170" y="389" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">h₁ (Misplaced Tiles) = 2</text>
    <text x="170" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Tiles 7,8 in wrong positions</text>
    <rect x="320" y="372" width="280" height="25" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="460" y="389" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">h₂ (Manhattan Distance) = 4</text>
    <text x="460" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Tile7:2 + Tile8:2 = 4</text>
  </g>
  
  <g class="step" id="step5" data-narration="Stronger heuristics dominate weaker ones and explore fewer nodes. We derive admissible heuristics from relaxed problems, pattern databases, or machine learning.">
    <rect x="10" y="410" width="780" height="80" fill="white" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="30" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Heuristic Dominance and Design</text>
    <rect x="30" y="445" width="230" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="145" y="462" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Dominance</text>
    <text x="145" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">If h₁(n) ≥ h₂(n) for all n,</text>
    <text x="145" y="485" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">h₁ dominates h₂ (expands fewer nodes)</text>
    <rect x="270" y="445" width="250" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="395" y="462" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Relaxed Problems</text>
    <text x="395" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Remove constraints; optimal cost</text>
    <text x="395" y="485" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">becomes admissible heuristic</text>
    <rect x="530" y="445" width="250" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="655" y="462" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Key Theorem</text>
    <text x="655" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">A* with admissible h(n) is</text>
    <text x="655" y="485" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">guaranteed to find optimal solution</text>
  </g>
</svg>