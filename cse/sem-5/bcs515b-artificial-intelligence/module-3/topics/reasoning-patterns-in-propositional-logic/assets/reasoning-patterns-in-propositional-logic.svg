<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Reasoning Patterns in Propositional Logic. We'll explore rules of inference, formal proofs, and proof strategies essential for logical reasoning in computer science.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Reasoning Patterns in Propositional Logic</text>
  </g>
  
  <g class="step" id="step1" data-narration="An argument has premises and a conclusion. It's valid when truth of all premises guarantees the conclusion. A sound argument is valid with actually true premises.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Argument &amp; Validity</text>
    <rect x="40" y="88" width="220" height="42" fill="#c8e6c9" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#2e7d32">Argument: Premises → Conclusion</text>
    <text x="50" y="116" font-family="Arial" font-size="9" fill="#2e7d32">P₁, P₂, ..., Pₙ ⊢ Q</text>
    <rect x="270" y="88" width="240" height="42" fill="#c8e6c9" rx="3"/>
    <text x="280" y="102" font-family="Arial" font-size="10" fill="#2e7d32">Valid: Premises true → Conclusion true</text>
    <text x="280" y="116" font-family="Arial" font-size="9" fill="#2e7d32">Depends on form, not content</text>
    <rect x="520" y="88" width="240" height="42" fill="#c8e6c9" rx="3"/>
    <text x="530" y="102" font-family="Arial" font-size="10" fill="#2e7d32">Sound: Valid + True premises</text>
    <text x="530" y="116" font-family="Arial" font-size="9" fill="#2e7d32">Truth matters in soundness</text>
  </g>
  
  <g class="step" id="step2" data-narration="Eight fundamental rules of inference form the toolkit for propositional proofs. Modus Ponens and Modus Tollens are the most commonly used rules in logical derivations.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Rules of Inference (8 Fundamental)</text>
    <rect x="40" y="178" width="170" height="42" fill="#ffe0b2" rx="3"/>
    <text x="50" y="192" font-family="Arial" font-size="9" fill="#e65100">Modus Ponens</text>
    <text x="50" y="206" font-family="Arial" font-size="8" fill="#e65100">P→Q, P ⊢ Q</text>
    <rect x="220" y="178" width="170" height="42" fill="#ffe0b2" rx="3"/>
    <text x="230" y="192" font-family="Arial" font-size="9" fill="#e65100">Modus Tollens</text>
    <text x="230" y="206" font-family="Arial" font-size="8" fill="#e65100">P→Q, ¬Q ⊢ ¬P</text>
    <rect x="400" y="178" width="170" height="42" fill="#ffe0b2" rx="3"/>
    <text x="410" y="192" font-family="Arial" font-size="9" fill="#e65100">Hypothetical Syllogism</text>
    <text x="410" y="206" font-family="Arial" font-size="8" fill="#e65100">P→Q, Q→R ⊢ P→R</text>
    <rect x="580" y="178" width="180" height="42" fill="#ffe0b2" rx="3"/>
    <text x="590" y="192" font-family="Arial" font-size="9" fill="#e65100">Disjunctive Syllogism</text>
    <text x="590" y="206" font-family="Arial" font-size="8" fill="#e65100">P∨Q, ¬P ⊢ Q</text>
  </g>
  
  <g class="step" id="step3" data-narration="Four more rules complete our toolkit: Addition adds any proposition, Simplification extracts one conjunct, Conjunction combines propositions, and Resolution resolves clauses.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Additional Rules</text>
    <rect x="40" y="266" width="170" height="42" fill="#e1bee7" rx="3"/>
    <text x="50" y="280" font-family="Arial" font-size="9" fill="#6a1b9a">Addition (∨-Intro)</text>
    <text x="50" y="294" font-family="Arial" font-size="8" fill="#6a1b9a">P ⊢ P∨Q</text>
    <rect x="220" y="266" width="170" height="42" fill="#e1bee7" rx="3"/>
    <text x="230" y="280" font-family="Arial" font-size="9" fill="#6a1b9a">Simplification (∧-Elim)</text>
    <text x="230" y="294" font-family="Arial" font-size="8" fill="#6a1b9a">P∧Q ⊢ P</text>
    <rect x="400" y="266" width="170" height="42" fill="#e1bee7" rx="3"/>
    <text x="410" y="280" font-family="Arial" font-size="9" fill="#6a1b9a">Conjunction (∧-Intro)</text>
    <text x="410" y="294" font-family="Arial" font-size="8" fill="#6a1b9a">P, Q ⊢ P∧Q</text>
    <rect x="580" y="266" width="180" height="42" fill="#e1bee7" rx="3"/>
    <text x="590" y="280" font-family="Arial" font-size="9" fill="#6a1b9a">Resolution</text>
    <text x="590" y="294" font-family="Arial" font-size="8" fill="#6a1b9a">P∨Q, ¬P∨R ⊢ Q∨R</text>
  </g>
  
  <g class="step" id="step4" data-narration="A formal proof is a step-by-step derivation where each statement follows from previous ones by rules of inference. The last statement is the proven conclusion.">
    <rect x="20" y="322" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Formal Proof Structure</text>
    <rect x="40" y="354" width="340" height="42" fill="#bbdefb" rx="3"/>
    <text x="50" y="368" font-family="Arial" font-size="9" fill="#0d47a1">Example: Premises P→(Q∨R), P∧¬Q | Prove: R</text>
    <rect x="390" y="354" width="370" height="42" fill="#bbdefb" rx="3"/>
    <text x="400" y="362" font-family="Arial" font-size="8" fill="#0d47a1">1. P→(Q∨R) | Premise</text>
    <text x="400" y="378" font-family="Arial" font-size="8" fill="#0d47a1">2. P∧¬Q | Premise</text>
    <text x="500" y="362" font-family="Arial" font-size="8" fill="#0d47a1">3. P | Simp(2)</text>
    <text x="500" y="378" font-family="Arial" font-size="8" fill="#0d47a1">4. ¬Q | Simp(2)</text>
    <text x="580" y="362" font-family="Arial" font-size="8" fill="#0d47a1">5. Q∨R | MP(1,3)</text>
    <text x="580" y="378" font-family="Arial" font-size="8" fill="#0d47a1">6. R | DS(5,4) ✓</text>
  </g>
  
  <g class="step" id="step5" data-narration="Three proof strategies exist: Direct proof derives conclusion from premises, proof by contraposition proves the equivalent contrapositive, and proof by contradiction assumes negation.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Proof Strategies</text>
    <rect x="40" y="442" width="230" height="42" fill="#c8e6c9" rx="3"/>
    <text x="50" y="456" font-family="Arial" font-size="9" fill="#1b5e20">Direct Proof</text>
    <text x="50" y="470" font-family="Arial" font-size="8" fill="#1b5e20">Premises → Rules → Conclusion</text>
    <rect x="280" y="442" width="230" height="42" fill="#c8e6c9" rx="3"/>
    <text x="290" y="456" font-family="Arial" font-size="9" fill="#1b5e20">Proof by Contraposition</text>
    <text x="290" y="470" font-family="Arial" font-size="8" fill="#1b5e20">Prove ¬Q → ¬P for P → Q</text>
    <rect x="520" y="442" width="240" height="42" fill="#c8e6c9" rx="3"/>
    <text x="530" y="456" font-family="Arial" font-size="9" fill="#1b5e20">Proof by Contradiction</text>
    <text x="530" y="470" font-family="Arial" font-size="8" fill="#1b5e20">Assume ¬P, derive contradiction, conclude P</text>
  </g>
  
  <g class="step" id="step6" data-narration="Remember common fallacies: affirming the consequent and denying the antecedent are invalid. Practice deriving conclusions from multiple premises using these rules.">
    <rect x="20" y="498" width="760" height="90" fill="#ffebee" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Common Fallacies &amp; Tips</text>
    <rect x="40" y="530" width="340" height="52" fill="#ffcdd2" rx="3"/>
    <text x="50" y="544" font-family="Arial" font-size="9" fill="#b71c1c">Fallacy of Affirming Consequent:</text>
    <text x="50" y="558" font-family="Arial" font-size="8" fill="#b71c1c">P→Q, Q ⊢ P (INVALID!)</text>
    <text x="50" y="572" font-family="Arial" font-size="8" fill="#b71c1c">Fallacy of Denying Antecedent:</text>
    <text x="50" y="584" font-family="Arial" font-size="8" fill="#b71c1c">P→Q, ¬P ⊢ ¬Q (INVALID!)</text>
    <rect x="390" y="530" width="370" height="52" fill="#ffcdd2" rx="3"/>
    <text x="400" y="544" font-family="Arial" font-size="9" fill="#b71c1c">Exam Tips:</text>
    <text x="400" y="558" font-family="Arial" font-size="8" fill="#b71c1c">1. Identify rule by premise-conclusion form</text>
    <text x="400" y="572" font-family="Arial" font-size="8" fill="#b71c1c">2. Always cite rule name for each step</text>
    <text x="400" y="584" font-family="Arial" font-size="8" fill="#b71c1c">3. Practice 5+ proofs before exam</text>
  </g>
</svg>