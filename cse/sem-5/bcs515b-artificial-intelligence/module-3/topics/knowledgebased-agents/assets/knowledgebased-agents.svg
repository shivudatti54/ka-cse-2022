<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Knowledge-Based Agents use a knowledge base and logical inference to make decisions, unlike simple reflex agents that use condition-action rules.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Knowledge-Based Agents</text>
  </g>
  
  <g class="step" id="step1" data-narration="The knowledge-based agent has three main components: Knowledge Base stores facts, Inference Engine derives new facts, and Agent Program connects percepts to actions.">
    <rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Agent Architecture</text>
    <rect x="25" y="85" width="180" height="45" fill="#e3f2fd" rx="3"/>
    <text x="115" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Knowledge Base</text>
    <text x="115" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Stores facts &amp; rules</text>
    <rect x="220" y="85" width="180" height="45" fill="#e8f5e9" rx="3"/>
    <text x="310" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Inference Engine</text>
    <text x="310" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Derives new facts</text>
    <rect x="415" y="85" width="180" height="45" fill="#fff3e0" rx="3"/>
    <text x="505" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Agent Program</text>
    <text x="505" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Percepts → Actions</text>
    <line x1="205" y1="108" x2="220" y2="108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="400" y1="108" x2="415" y2="108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="595" y1="108" x2="610" y2="108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="610" y="112" font-family="Arial" font-size="8" fill="#666">cycle</text>
  </g>
  
  <g class="step" id="step2" data-narration="Wumpus World is a 4x4 grid with Agent, Wumpus, Pits, and Gold. Percepts: Stench (Wumpus nearby), Breeze (Pit nearby), Glitter (Gold), Bump, Scream.">
    <rect x="10" y="146" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Wumpus World Environment</text>
    <rect x="25" y="175" width="140" height="45" fill="#f3e5f5" rx="3"/>
    <text x="95" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">4×4 Grid</text>
    <text x="95" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">16 cells</text>
    <rect x="175" y="175" width="100" height="45" fill="#e3f2fd" rx="3"/>
    <text x="225" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Stench</text>
    <text x="225" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Wumpus nearby</text>
    <rect x="285" y="175" width="100" height="45" fill="#e8f5e9" rx="3"/>
    <text x="335" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Breeze</text>
    <text x="335" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Pit nearby</text>
    <rect x="395" y="175" width="100" height="45" fill="#fff3e0" rx="3"/>
    <text x="445" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Glitter</text>
    <text x="445" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Gold here!</text>
    <rect x="505" y="175" width="100" height="45" fill="#ffebee" rx="3"/>
    <text x="555" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Bump</text>
    <text x="555" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Hit wall</text>
    <rect x="615" y="175" width="100" height="45" fill="#f3e5f5" rx="3"/>
    <text x="665" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Scream</text>
    <text x="665" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Wumpus killed</text>
  </g>
  
  <g class="step" id="step3" data-narration="Propositional logic represents Wumpus World facts: B(i,j) for Breeze, S(i,j) for Stench, P(i,j) for Pit, W(i,j) for Wumpus, G(i,j) for Gold at position.">
    <rect x="10" y="234" width="780" height="94" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Knowledge Representation</text>
    <text x="25" y="270" font-family="Arial" font-size="10" fill="#666">Atomic Propositions:</text>
    <rect x="25" y="280" width="120" height="28" fill="#e3f2fd" rx="3"/>
    <text x="85" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">B(i,j)</text>
    <text x="150" y="296" font-family="Arial" font-size="8" fill="#666">Breeze</text>
    <rect x="200" y="280" width="120" height="28" fill="#e8f5e9" rx="3"/>
    <text x="260" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">S(i,j)</text>
    <text x="325" y="296" font-family="Arial" font-size="8" fill="#666">Stench</text>
    <rect x="375" y="280" width="120" height="28" fill="#fff3e0" rx="3"/>
    <text x="435" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">P(i,j)</text>
    <text x="500" y="296" font-family="Arial" font-size="8" fill="#666">Pit</text>
    <rect x="550" y="280" width="120" height="28" fill="#ffebee" rx="3"/>
    <text x="610" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">W(i,j)</text>
    <text x="675" y="296" font-family="Arial" font-size="8" fill="#666">Wumpus</text>
    <text x="25" y="318" font-family="Arial" font-size="9" fill="#666">Rule: B(i,j) ⇔ adjacent pit exists</text>
  </g>
  
  <g class="step" id="step4" data-narration="Modus Ponens: from P⇒Q and P, infer Q. Universal Instantiation: from ∀x P(x), infer P(c). Forward chaining applies rules forward from facts to goals.">
    <rect x="10" y="336" width="780" height="100" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="25" y="353" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Logical Reasoning</text>
    <rect x="25" y="365" width="240" height="40" fill="#e3f2fd" rx="3"/>
    <text x="145" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Modus Ponens</text>
    <text x="145" y="395" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">P⇒Q, P ⊢ Q</text>
    <rect x="280" y="365" width="240" height="40" fill="#e8f5e9" rx="3"/>
    <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Universal Instantiation</text>
    <text x="400" y="395" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">∀x P(x) ⊢ P(c)</text>
    <rect x="535" y="365" width="250" height="40" fill="#fff3e0" rx="3"/>
    <text x="660" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Forward Chaining</text>
    <text x="660" y="395" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Facts → Goal</text>
    <text x="25" y="420" font-family="Arial" font-size="9" fill="#666">Entailment (⊨): Semantic, truth-based — α follows from KB</text>
    <text x="420" y="420" font-family="Arial" font-size="9" fill="#666">Inference (⊢): Syntactic, rule-based — α derived</text>
  </g>
  
  <g class="step" id="step5" data-narration="At [1,1] Breeze ⇒ P(1,2)∨P(2,1). At [1,2] with Stench but NO Breeze: no pit at adjacent cells, so [2,2] is SAFE!">
    <rect x="10" y="444" width="780" height="100" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="25" y="461" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Reasoning Examples</text>
    <text x="25" y="482" font-family="Arial" font-size="10" fill="#666">Example 1: At [1,1], Breeze ⇒ P(1,2)∨P(2,1) — pit in adjacent cell</text>
    <rect x="25" y="492" width="760" height="1" fill="#e0e0e0"/>
    <rect x="25" y="502" width="80" height="35" fill="#e3f2fd" rx="3"/>
    <text x="65" y="518" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">[1,2]</text>
    <text x="65" y="532" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">S=TRUE</text>
    <rect x="115" y="502" width="80" height="35" fill="#e8f5e9" rx="3"/>
    <text x="155" y="518" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">No Breeze</text>
    <text x="155" y="532" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">No pit adjacent</text>
    <line x1="105" y1="520" x2="115" y2="520" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="205" y="502" width="80" height="35" fill="#fff3e0" rx="3"/>
    <text x="245" y="518" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">[2,2]</text>
    <text x="245" y="532" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">SAFE!</text>
    <line x1="195" y1="520" x2="205" y2="520" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="300" y="520" font-family="Arial" font-size="9" fill="#666">No breeze = no adjacent pit, proven safe</text>
  </g>
</svg>