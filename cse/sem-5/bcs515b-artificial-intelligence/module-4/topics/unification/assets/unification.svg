<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Unification is finding a substitution to make two terms identical. It's the core mechanism in Prolog and automated theorem proving.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Unification in Logic Programming</text>
  </g>
  
  <g class="step" id="step1" data-narration="A substitution maps variables to terms, like X/a or {X/john, Y/music}. Applying a substitution replaces all variable occurrences with their bound terms.">
    <rect x="10" y="58" width="780" height="100" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="30" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Substitution</text>
    <rect x="30" y="90" width="220" height="55" rx="3" fill="white" stroke="#1976d2"/>
    <text x="40" y="108" font-family="Arial" font-size="10" fill="#333">Definition:</text>
    <text x="40" y="122" font-family="Arial" font-size="10" fill="#333">θ = {X/t₁, Y/t₂, ...}</text>
    <text x="40" y="136" font-family="Arial" font-size="9" fill="#666">Mapping variables to terms</text>
    <rect x="270" y="90" width="220" height="55" rx="3" fill="white" stroke="#1976d2"/>
    <text x="280" y="108" font-family="Arial" font-size="10" fill="#333">Example:</text>
    <text x="280" y="122" font-family="Arial" font-size="10" fill="#333">θ = {X/john, Y/music}</text>
    <text x="280" y="136" font-family="Arial" font-size="9" fill="#666">X→john, Y→music</text>
    <rect x="510" y="90" width="260" height="55" rx="3" fill="white" stroke="#1976d2"/>
    <text x="520" y="108" font-family="Arial" font-size="10" fill="#333">Composition (right-to-left):</text>
    <text x="520" y="122" font-family="Arial" font-size="10" fill="#333">θ₁θ₂ means apply θ₂ first</text>
    <text x="520" y="136" font-family="Arial" font-size="9" fill="#666">then θ₁</text>
  </g>
  
  <g class="step" id="step2" data-narration="Terms are constants like 'john', variables like X or Y, or compound terms like father(john) with a functor and arguments.">
    <rect x="10" y="166" width="780" height="100" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="30" y="186" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Types of Terms</text>
    <rect x="30" y="200" width="150" height="55" rx="3" fill="white" stroke="#388e3c"/>
    <text x="40" y="218" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Constants</text>
    <text x="40" y="232" font-family="Arial" font-size="10" fill="#333">a, b, john, 5</text>
    <text x="40" y="246" font-family="Arial" font-size="9" fill="#666">Atoms and numbers</text>
    <rect x="200" y="200" width="150" height="55" rx="3" fill="white" stroke="#388e3c"/>
    <text x="210" y="218" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Variables</text>
    <text x="210" y="232" font-family="Arial" font-size="10" fill="#333">X, Y, Z, _</text>
    <text x="210" y="246" font-family="Arial" font-size="9" fill="#666">Capitalized or underscore</text>
    <rect x="370" y="200" width="180" height="55" rx="3" fill="white" stroke="#388e3c"/>
    <text x="380" y="218" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Compound Terms</text>
    <text x="380" y="232" font-family="Arial" font-size="10" fill="#333">father(john), f(X,Y)</text>
    <text x="380" y="246" font-family="Arial" font-size="9" fill="#666">Functor + arguments</text>
    <rect x="570" y="200" width="200" height="55" rx="3" fill="white" stroke="#388e3c"/>
    <text x="580" y="218" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Arity</text>
    <text x="580" y="232" font-family="Arial" font-size="10" fill="#333">father(john) has arity 1</text>
    <text x="580" y="246" font-family="Arial" font-size="9" fill="#666">Number of arguments</text>
  </g>
  
  <g class="step" id="step3" data-narration="A unifier makes two terms identical after applying it. The Most General Unifier leaves maximum flexibility and is unique up to variable renaming.">
    <rect x="10" y="274" width="780" height="100" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="30" y="294" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Unifier and MGU</text>
    <rect x="30" y="310" width="240" height="55" rx="3" fill="white" stroke="#ff9800"/>
    <text x="40" y="328" font-family="Arial" font-size="10" fill="#333">Unifier θ satisfies:</text>
    <text x="40" y="342" font-family="Arial" font-size="10" fill="#333">t₁θ = t₂θ</text>
    <text x="40" y="356" font-family="Arial" font-size="9" fill="#666">Makes terms identical</text>
    <rect x="290" y="310" width="240" height="55" rx="3" fill="white" stroke="#ff9800"/>
    <text x="300" y="328" font-family="Arial" font-size="10" fill="#333">MGU Property:</text>
    <text x="300" y="342" font-family="Arial" font-size="10" fill="#333">Any unifier θ' = MGU · λ</text>
    <text x="300" y="356" font-family="Arial" font-size="9" fill="#666">Least restrictive</text>
    <rect x="550" y="310" width="220" height="55" rx="3" fill="white" stroke="#ff9800"/>
    <text x="560" y="328" font-family="Arial" font-size="10" fill="#333">Example: f(X) and f(a)</text>
    <text x="560" y="342" font-family="Arial" font-size="10" fill="#333">MGU = {X/a}</text>
    <text x="560" y="356" font-family="Arial" font-size="9" fill="#666">Unique up to renaming</text>
  </g>
  
  <g class="step" id="step4" data-narration="The occurs check prevents infinite terms like X = f(X) by verifying the variable doesn't appear in the term it's being bound to.">
    <rect x="10" y="382" width="780" height="100" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="30" y="402" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">4. Occurs Check</text>
    <rect x="30" y="418" width="350" height="55" rx="3" fill="white" stroke="#f44336"/>
    <text x="40" y="436" font-family="Arial" font-size="10" fill="#333">Before binding X = t:</text>
    <text x="40" y="450" font-family="Arial" font-size="10" fill="#333">Check: Does X appear in t?</text>
    <text x="40" y="464" font-family="Arial" font-size="9" fill="#666">If yes → FAIL (no unification)</text>
    <rect x="400" y="418" width="180" height="55" rx="3" fill="white" stroke="#f44336"/>
    <text x="410" y="436" font-family="Arial" font-size="10" fill="#333">X = f(X)</text>
    <text x="410" y="450" font-family="Arial" font-size="10" fill="#f44336">OCCURS CHECK FAILS</text>
    <text x="410" y="464" font-family="Arial" font-size="9" fill="#666">Creates infinite term</text>
    <rect x="600" y="418" width="170" height="55" rx="3" fill="white" stroke="#f44336"/>
    <text x="610" y="436" font-family="Arial" font-size="10" fill="#333">X = f(Y) ✓</text>
    <text x="610" y="450" font-family="Arial" font-size="10" fill="#388e3c">Succeeds</text>
    <text x="610" y="464" font-family="Arial" font-size="9" fill="#666">X not in f(Y)</text>
  </g>
  
  <g class="step" id="step5" data-narration="The algorithm compares structures, checks functors match, and recursively unifies arguments. Unification fails if functors differ or occurs check fails.">
    <rect x="10" y="490" width="780" height="100" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="30" y="510" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">5. Unification Algorithm</text>
    <rect x="30" y="525" width="360" height="55" rx="3" fill="white" stroke="#9c27b0"/>
    <text x="40" y="543" font-family="Arial" font-size="10" fill="#333">Algorithm Steps:</text>
    <text x="40" y="557" font-family="Arial" font-size="9" fill="#333">1. Same constants/variables → identity</text>
    <text x="40" y="570" font-family="Arial" font-size="9" fill="#333">2. Variable → occurs check, then bind</text>
    <text x="200" y="557" font-family="Arial" font-size="9" fill="#333">3. Compound → check functor/arity</text>
    <text x="200" y="570" font-family="Arial" font-size="9" fill="#333">4. Recursively unify arguments</text>
    <rect x="410" y="525" width="180" height="55" rx="3" fill="white" stroke="#9c27b0"/>
    <text x="420" y="543" font-family="Arial" font-size="10" fill="#333">Example:</text>
    <text x="420" y="557" font-family="Arial" font-size="10" fill="#333">likes(X, music)</text>
    <text x="420" y="570" font-family="Arial" font-size="10" fill="#333">likes(john, Y)</text>
    <rect x="610" y="525" width="160" height="55" rx="3" fill="white" stroke="#9c27b0"/>
    <text x="620" y="543" font-family="Arial" font-size="10" fill="#333">MGU =</text>
    <text x="620" y="557" font-family="Arial" font-size="10" fill="#9c27b0">{X/john, Y/music}</text>
    <text x="620" y="570" font-family="Arial" font-size="9" fill="#666">Both become identical</text>
  </g>
</svg>