<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Forward chaining is a data-driven inference technique that starts with known facts and applies logical rules to derive new conclusions.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Forward Chaining in AI</text>
  </g>
  
  <g class="step" id="step1" data-narration="A rule-based system has working memory for facts and production rules. Each rule is IF conditions THEN conclusion. Matching rules fire to add new facts.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="25" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Rule-Based System Components</text>
    <rect x="25" y="90" width="230" height="40" fill="#ffffff" stroke="#1976d2" rx="3"/>
    <text x="140" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Working Memory</text>
    <text x="140" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Fact Base)</text>
    <line x1="255" y1="110" x2="285" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="285" y="90" width="230" height="40" fill="#ffffff" stroke="#1976d2" rx="3"/>
    <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Production Rule</text>
    <text x="400" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">IF conditions THEN action</text>
    <line x1="515" y1="110" x2="545" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="545" y="90" width="230" height="40" fill="#ffffff" stroke="#1976d2" rx="3"/>
    <text x="660" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Inference Engine</text>
    <text x="660" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Matches &amp; Fires Rules</text>
  </g>
  
  <g class="step" id="step2" data-narration="The forward chaining algorithm循环: Initialize facts in working memory, match rules to facts, select rule using conflict resolution, fire rule to add conclusion, repeat until termination.">
    <rect x="10" y="146" width="780" height="80" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="25" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Forward Chaining Algorithm</text>
    <rect x="25" y="180" width="145" height="38" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="97" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">1. Initialize</text>
    <text x="97" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Load facts to WM</text>
    <rect x="175" y="180" width="145" height="38" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="247" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">2. Match</text>
    <text x="247" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Find satisfied rules</text>
    <rect x="325" y="180" width="145" height="38" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="397" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">3. Select</text>
    <text x="397" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Conflict resolution</text>
    <rect x="475" y="180" width="145" height="38" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="547" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">4. Fire</text>
    <text x="547" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Add conclusion to WM</text>
    <rect x="625" y="180" width="145" height="38" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="697" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">5. Repeat</text>
    <text x="697" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Until no rules fire</text>
  </g>
  
  <g class="step" id="step3" data-narration="When multiple rules match, conflict resolution strategies determine which rule fires first. These include priority levels, recency of facts, specificity of rules, and first-appearance order.">
    <rect x="10" y="234" width="780" height="80" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="25" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Conflict Resolution Strategies</text>
    <rect x="25" y="268" width="180" height="40" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="115" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Priority</text>
    <text x="115" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Predefined levels</text>
    <rect x="210" y="268" width="180" height="40" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="300" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Recency</text>
    <text x="300" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Most recent facts</text>
    <rect x="395" y="268" width="180" height="40" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="485" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Specificity</text>
    <text x="485" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">More conditions preferred</text>
    <rect x="580" y="268" width="180" height="40" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="670" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">First</text>
    <text x="670" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Rule order in KB</text>
  </g>
  
  <g class="step" id="step4" data-narration="Forward chaining is bottom-up data-driven reasoning from facts to conclusions. Backward chaining is top-down goal-driven reasoning from goal to supporting facts.">
    <rect x="10" y="322" width="780" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="25" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Data-Driven vs Goal-Driven Reasoning</text>
    <rect x="25" y="358" width="360" height="38" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="205" y="375" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Forward Chaining</text>
    <text x="205" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Data-Driven | Bottom-Up | Facts → Conclusions</text>
    <rect x="395" y="358" width="360" height="38" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="575" y="375" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Backward Chaining</text>
    <text x="575" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Goal-Driven | Top-Down | Goal → Required Facts</text>
  </g>
  
  <g class="step" id="step5" data-narration="Example: Given initial facts {fever, cough, patient_smokes}. Rule R1 fires adding respiratory_infection, and R4 fires adding chronic_bronchitis to working memory.">
    <rect x="10" y="410" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="25" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example: Medical Diagnosis</text>
    <text x="25" y="455" font-family="Arial" font-size="9" fill="#333">Initial Facts:</text>
    <rect x="95" y="443" width="130" height="22" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="160" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">{fever, cough, patient_smokes}</text>
    <text x="240" y="455" font-family="Arial" font-size="9" fill="#333">Rules:</text>
    <rect x="280" y="443" width="130" height="22" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="345" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">R1: fever∧cough→resp_inf</text>
    <rect x="415" y="443" width="130" height="22" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="480" y="458" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">R4: smoke∧cough→bronchitis</text>
    <text x="560" y="455" font-family="Arial" font-size="9" fill="#333">Result:</text>
    <rect x="610" y="443" width="160" height="22" fill="#90caf9" stroke="#1976d2" rx="3"/>
    <text x="690" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">{respiratory_infection, chronic_bronchitis}</text>
  </g>
  
  <g class="step" id="step6" data-narration="Forward chaining is used in diagnostic systems, classification, and configuration. Advantages include exploring all possibilities, while limitations include potential inefficiency and irrelevant conclusions.">
    <rect x="10" y="498" width="780" height="90" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="25" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Applications, Advantages &amp; Limitations</text>
    <rect x="25" y="530" width="240" height="50" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="145" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Applications</text>
    <text x="145" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Diagnostic Systems</text>
    <text x="145" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Classification &amp; Monitoring</text>
    <rect x="275" y="530" width="240" height="50" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="395" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Advantages</text>
    <text x="395" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Explores all possibilities</text>
    <text x="395" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Works well with multiple goals</text>
    <rect x="525" y="530" width="245" height="50" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="647" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Limitations</text>
    <text x="647" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Can be inefficient</text>
    <text x="647" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">May derive irrelevant conclusions</text>
  </g>
</svg>