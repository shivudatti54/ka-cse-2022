<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the study of First-Order Logic. We will explore the syntax structure and semantics meaning for predicate logic in detail.">
    <rect x="10" y="10" width="780" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Syntax and Semantics of First-Order Logic</text>
  </g>
  
  <g class="step" id="step1" data-narration="The alphabet of First-Order Logic has seven main components: logical connectives, quantifiers, variables, constants, functions, predicates, and parentheses for grouping.">
    <rect x="10" y="58" width="780" height="80" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="30" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Alphabet of First-Order Logic</text>
    <rect x="30" y="88" width="110" height="40" rx="4" fill="#e3f2fd"/>
    <text x="85" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Logical Connectives</text>
    <text x="85" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">¬ ∧ ∨ → ↔</text>
    <rect x="150" y="88" width="110" height="40" rx="4" fill="#e3f2fd"/>
    <text x="205" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Quantifiers</text>
    <text x="205" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">∀ (for all), ∃ (exists)</text>
    <rect x="270" y="88" width="110" height="40" rx="4" fill="#e3f2fd"/>
    <text x="325" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Variables</text>
    <text x="325" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">x, y, z, w...</text>
    <rect x="390" y="88" width="110" height="40" rx="4" fill="#e8f5e9"/>
    <text x="445" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Constant Symbols</text>
    <text x="445" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">a, b, c...</text>
    <rect x="510" y="88" width="110" height="40" rx="4" fill="#e8f5e9"/>
    <text x="565" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Function Symbols</text>
    <text x="565" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">f, g, h...</text>
    <rect x="630" y="88" width="140" height="40" rx="4" fill="#fff3e0"/>
    <text x="700" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Predicate Symbols</text>
    <text x="700" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">P, Q, R...</text>
  </g>
  
  <g class="step" id="step2" data-narration="Terms denote objects: constants, variables, or function applications like f(x,y). Atomic formulas are predicates applied to terms, like P(x) or x=y.">
    <rect x="10" y="146" width="780" height="80" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="30" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Terms and Atomic Formulas</text>
    <rect x="30" y="176" width="230" height="40" rx="4" fill="#e3f2fd"/>
    <text x="145" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Terms (denote objects)</text>
    <text x="145" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Constants: a,b | Variables: x,y | Functions: f(x,y), g(a)</text>
    <rect x="280" y="176" width="230" height="40" rx="4" fill="#fff3e0"/>
    <text x="395" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Atomic Formulas</text>
    <text x="395" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">P(x), Q(x,y), x = y (equality)</text>
    <rect x="520" y="176" width="250" height="40" rx="4" fill="#e8f5e9"/>
    <text x="645" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Examples</text>
    <text x="645" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">P(x), Likes(x,y), GreaterThan(x,5), successor(successor(0))</text>
  </g>
  
  <g class="step" id="step3" data-narration="WFFs are built recursively: every atomic formula is a WFF. Combining WFFs with connectives or quantifiers yields more well-formed formulas systematically.">
    <rect x="10" y="234" width="780" height="95" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="30" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Well-Formed Formulas (WFFs)</text>
    <text x="30" y="272" font-family="Arial" font-size="9" fill="#666">Every atomic formula is a WFF. If φ,ψ are WFFs, then:</text>
    <rect x="30" y="280" width="145" height="26" rx="4" fill="#ffebee"/>
    <text x="102" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">¬φ</text>
    <rect x="185" y="280" width="145" height="26" rx="4" fill="#e3f2fd"/>
    <text x="257" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">(φ ∧ ψ), (φ ∨ ψ)</text>
    <rect x="340" y="280" width="145" height="26" rx="4" fill="#e3f2fd"/>
    <text x="412" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">(φ → ψ), (φ ↔ ψ)</text>
    <rect x="495" y="280" width="145" height="26" rx="4" fill="#fff3e0"/>
    <text x="567" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">∀x φ, ∃x φ</text>
    <rect x="650" y="280" width="120" height="26" rx="4" fill="#f3e5f5"/>
    <text x="710" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Nothing else</text>
    <text x="30" y="320" font-family="Arial" font-size="9" fill="#666">Examples: P(x), ¬P(x), ∀x (P(x)→Q(x)), ∃y (R(x,y) ∧ S(y))</text>
  </g>
  
  <g class="step" id="step4" data-narration="Quantifier scope is the subformula after the quantifier. Variables within scope are bound; others are free and require assignments for truth evaluation.">
    <rect x="10" y="337" width="780" height="95" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="30" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Scope of Quantifiers and Variable Binding</text>
    <rect x="30" y="367" width="360" height="40" rx="4" fill="#fff3e0"/>
    <text x="210" y="381" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Quantifier Scope</text>
    <text x="210" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">In ∀x φ, scope is φ. In ∃y ψ, scope is ψ.</text>
    <rect x="400" y="367" width="180" height="40" rx="4" fill="#e8f5e9"/>
    <text x="490" y="381" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Bound Variables</text>
    <text x="490" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">x in ∀x P(x) - bound by quantifier</text>
    <rect x="590" y="367" width="180" height="40" rx="4" fill="#ffebee"/>
    <text x="680" y="381" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Free Variables</text>
    <text x="680" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">y in ∀x P(x,y) - needs assignment</text>
    <text x="30" y="420" font-family="Arial" font-size="9" fill="#666">Example: ∀x (P(x) → ∃y Q(x,y)) — x bound by ∀, y bound by ∃</text>
  </g>
  
  <g class="step" id="step5" data-narration="An interpretation assigns meaning to symbols: a non-empty domain for objects, constants map to domain elements, functions map to operations, predicates to relations.">
    <rect x="10" y="440" width="780" height="75" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="30" y="460" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Semantics: Interpretations</text>
    <rect x="30" y="470" width="170" height="35" rx="4" fill="#e3f2fd"/>
    <text x="115" y="483" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Domain (D)</text>
    <text x="115" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Non-empty set</text>
    <rect x="210" y="470" width="170" height="35" rx="4" fill="#e8f5e9"/>
    <text x="295" y="483" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Constants</text>
    <text x="295" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">c → element in D</text>
    <rect x="390" y="470" width="170" height="35" rx="4" fill="#fff3e0"/>
    <text x="475" y="483" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Functions</text>
    <text x="475" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">f: Dⁿ → D</text>
    <rect x="570" y="470" width="200" height="35" rx="4" fill="#f3e5f5"/>
    <text x="670" y="483" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Predicates</text>
    <text x="670" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">P ⊆ Dⁿ (relation)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Formulas are valid if true in all interpretations, satisfiable if true in at least one interpretation, and unsatisfiable if true in no interpretations.">
    <rect x="10" y="523" width="780" height="70" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="30" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Formula Classification</text>
    <rect x="30" y="553" width="230" height="30" rx="4" fill="#e8f5e9"/>
    <text x="145" y="568" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Valid: True in ALL interpretations</text>
    <rect x="270" y="553" width="230" height="30" rx="4" fill="#fff3e0"/>
    <text x="385" y="568" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Satisfiable: True in SOME interpretation</text>
    <rect x="510" y="553" width="230" height="30" rx="4" fill="#ffebee"/>
    <text x="625" y="568" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Unsatisfiable: True in NO interpretation</text>
  </g>
</svg>