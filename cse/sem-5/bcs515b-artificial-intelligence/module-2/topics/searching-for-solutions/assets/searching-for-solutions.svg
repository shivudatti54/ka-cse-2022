<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Search is a fundamental AI problem-solving technique that explores possible states to find a path from initial to goal state.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
<text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Searching for Solutions in Artificial Intelligence</text>
</g>

<g class="step" id="step1" data-narration="Search explores a space of states to find solutions when direct algorithmic answers don't exist, essential for navigation, games, and planning.">
<rect x="20" y="58" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Introduction to Search in AI</text>
<text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Search is fundamental to AI problem-solving when solutions aren't immediately apparent.</text>
<text x="40" y="110" font-family="Arial" font-size="10" fill="#333">It explores possible states systematically to find a path from start to goal.</text>
<text x="40" y="125" font-family="Arial" font-size="10" fill="#333">Applications: route finding, game playing, puzzles, and automated planning.</text>
</g>

<g class="step" id="step2" data-narration="Problem formulation requires defining four components: initial state, goal state, successor function, and path cost. Each component is essential for properly representing the problem space to be searched by algorithms.">
<rect x="20" y="146" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Problem Formulation: Four Components</text>
<rect x="40" y="180" width="165" height="35" rx="4" fill="#c8e6c9"/>
<text x="122" y="193" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Initial State</text>
<text x="122" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Starting point</text>
<rect x="215" y="180" width="165" height="35" rx="4" fill="#c8e6c9"/>
<text x="297" y="193" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Goal State</text>
<text x="297" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Target to reach</text>
<rect x="390" y="180" width="165" height="35" rx="4" fill="#c8e6c9"/>
<text x="472" y="193" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Successor Function</text>
<text x="472" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Actions available</text>
<rect x="565" y="180" width="165" height="35" rx="4" fill="#c8e6c9"/>
<text x="647" y="193" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Path Cost</text>
<text x="647" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Cost of actions</text>
</g>

<g class="step" id="step3" data-narration="Uninformed search explores without heuristics using different data structures. BFS uses FIFO queue for shortest path while DFS uses LIFO stack for memory efficiency and UCS expands lowest cost first.">
<rect x="20" y="234" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
<text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Uninformed (Blind) Search Strategies</text>
<rect x="40" y="268" width="230" height="40" rx="4" fill="#ffe0b2"/>
<text x="155" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Breadth-First Search (BFS)</text>
<text x="155" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Queue (FIFO) | Complete | Optimal (unit cost)</text>
<text x="155" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Time/Space: O(b^d)</text>
<rect x="285" y="268" width="230" height="40" rx="4" fill="#ffe0b2"/>
<text x="400" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Depth-First Search (DFS)</text>
<text x="400" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Stack (LIFO) | Not complete | Not optimal</text>
<text x="400" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Time: O(b^m) | Space: O(bm)</text>
<rect x="530" y="268" width="230" height="40" rx="4" fill="#ffe0b2"/>
<text x="645" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Uniform Cost Search (UCS)</text>
<text x="645" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Priority Queue | Complete | Optimal</text>
<text x="645" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Expands lowest path cost g(n)</text>
</g>

<g class="step" id="step4" data-narration="Informed search strategies leverage domain-specific knowledge through heuristic functions. Greedy Best-First prioritizes nodes with lowest estimated cost h(n) whereas A* combines g(n) plus h(n) for guaranteed optimality.">
<rect x="20" y="322" width="760" height="95" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
<text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Informed (Heuristic) Search Strategies</text>
<rect x="40" y="358" width="340" height="40" rx="4" fill="#ffcdd2"/>
<text x="210" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Greedy Best-First Search</text>
<text x="210" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Expands node with lowest h(n) | Fast but not guaranteed optimal</text>
<rect x="400" y="358" width="340" height="40" rx="4" fill="#ffcdd2"/>
<text x="570" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">A* Search</text>
<text x="570" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">f(n) = g(n) + h(n) | Complete and optimal if h(n) is admissible</text>
<text x="40" y="410" font-family="Arial" font-size="9" fill="#333">Where g(n) = cost from start to node n, h(n) = estimated cost from n to goal</text>
</g>

<g class="step" id="step5" data-narration="A heuristic h(n) estimates cost from any node to the goal. Admissible heuristics never overestimate true cost, enabling A* to find optimal solutions.">
<rect x="20" y="425" width="760" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<text x="40" y="445" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Heuristic Functions</text>
<text x="40" y="463" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Heuristic h(n):</tspan> Estimates cost from node n to nearest goal state</text>
<rect x="40" y="473" width="340" height="28" rx="4" fill="#e1bee7"/>
<text x="210" y="488" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Admissible Heuristic</text>
<text x="210" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Never overestimates | Guarantees A* optimality</text>
<rect x="400" y="473" width="340" height="28" rx="4" fill="#e1bee7"/>
<text x="570" y="488" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Consistent Heuristic</text>
<text x="570" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">h(n) ≤ c(n,n') + h(n') | Always admissible</text>
<text x="40" y="515" font-family="Arial" font-size="9" fill="#333">Example (8-puzzle): h1 = misplaced tiles, h2 = Manhattan distance (better)</text>
</g>

<g class="step" id="step6" data-narration="Search algorithms are evaluated by completeness, optimality, time complexity, and space complexity. Completeness guarantees finding a solution if one exists while optimality ensures lowest-cost solution is found.">
<rect x="20" y="528" width="760" height="65" rx="8" fill="#e0f7fa" stroke="#00acc1" stroke-width="1"/>
<text x="40" y="548" font-family="Arial" font-size="12" font-weight="bold" fill="#00838f">Properties of Search Algorithms</text>
<rect x="40" y="560" width="160" height="30" rx="4" fill="#b2ebf2"/>
<text x="120" y="573" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#006064">Complete &amp; Optimal</text>
<text x="120" y="584" text-anchor="middle" font-family="Arial" font-size="8" fill="#006064">BFS/UCS/A*</text>
<rect x="215" y="560" width="160" height="30" rx="4" fill="#b2ebf2"/>
<text x="295" y="573" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#006064">Time Complexity</text>
<text x="295" y="584" text-anchor="middle" font-family="Arial" font-size="8" fill="#006064">O(b^d) for BFS</text>
<rect x="390" y="560" width="160" height="30" rx="4" fill="#b2ebf2"/>
<text x="470" y="573" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#006064">Space Complexity</text>
<text x="470" y="584" text-anchor="middle" font-family="Arial" font-size="8" fill="#006064">O(b^d) for BFS</text>
<rect x="565" y="560" width="160" height="30" rx="4" fill="#b2ebf2"/>
<text x="645" y="573" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#006064">b = branching factor</text>
<text x="645" y="584" text-anchor="middle" font-family="Arial" font-size="8" fill="#006064">d = depth, m = max depth</text>
</g>
</svg>