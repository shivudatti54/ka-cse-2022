<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g id="step0" data-narration="Problem-solving agents in AI use search techniques to find sequences of actions that transform an initial state into a desired goal state.">
<rect x="10" y="10" width="780" height="40" fill="#e3f2fd" rx="8"/>
<text x="30" y="36" font-size="22" fill="#1565c0" font-weight="bold">Problem-Solving Agents</text>
</g>
<g id="step1" data-narration="A well-defined problem has five components: initial state where search starts, goal state to achieve, operators that transform states, state space of all reachable states, and path cost.">
<rect x="50" y="60" width="700" height="75" fill="#ffffff" rx="8" stroke="#1976d2" stroke-width="2"/>
<text x="65" y="85" font-size="14" fill="#1565c0" font-weight="bold">Five Components of Well-Defined Problem</text>
<rect x="65" y="95" width="120" height="30" fill="#e3f2fd" rx="4"/>
<text x="75" y="114" font-size="11" fill="#1565c0">Initial State</text>
<rect x="195" y="95" width="120" height="30" fill="#e8f5e9" rx="4"/>
<text x="205" y="114" font-size="11" fill="#2e7d32">Goal State</text>
<rect x="325" y="95" width="130" height="30" fill="#fff3e0" rx="4"/>
<text x="335" y="114" font-size="11" fill="#e65100">Operators/Actions</text>
<rect x="465" y="95" width="130" height="30" fill="#f3e5f5" rx="4"/>
<text x="475" y="114" font-size="11" fill="#7b1fa2">State Space</text>
<rect x="605" y="95" width="130" height="30" fill="#ffebee" rx="4"/>
<text x="615" y="114" font-size="11" fill="#c62828">Path Cost</text>
</g>
<g id="step2" data-narration="Search strategies are divided into uninformed search (BFS, DFS, UCS) with no problem knowledge, and informed search (Greedy, A*) using heuristics to guide the search.">
<rect x="50" y="150" width="340" height="75" fill="#ffffff" rx="8" stroke="#388e3c" stroke-width="2"/>
<text x="65" y="175" font-size="14" fill="#2e7d32" font-weight="bold">Uninformed Search (Blind)</text>
<text x="65" y="195" font-size="11" fill="#388e3c">BFS - Explores level by level</text>
<text x="65" y="210" font-size="11" fill="#388e3c">DFS - Explores depth first</text>
<text x="200" y="195" font-size="11" fill="#388e3c">UCS - Expands lowest g(n)</text>
<text x="200" y="210" font-size="11" fill="#388e3c">No problem knowledge</text>
<rect x="410" y="150" width="340" height="75" fill="#ffffff" rx="8" stroke="#1976d2" stroke-width="2"/>
<text x="425" y="175" font-size="14" fill="#1565c0" font-weight="bold">Informed Search (Heuristic)</text>
<text x="425" y="195" font-size="11" fill="#1565c0">Greedy - Expands lowest h(n)</text>
<text x="425" y="210" font-size="11" fill="#1565c0">A* - Uses f(n) = g(n) + h(n)</text>
<text x="560" y="195" font-size="11" fill="#1565c0">Uses problem-specific</text>
<text x="560" y="210" font-size="11" fill="#1565c0">knowledge (heuristic)</text>
</g>
<g id="step3" data-narration="BFS guarantees the shortest path solution and completeness but has exponential space complexity. DFS is memory-efficient but not complete for infinite spaces.">
<rect x="50" y="240" width="700" height="70" fill="#ffffff" rx="8" stroke="#1976d2" stroke-width="2"/>
<text x="65" y="265" font-size="14" fill="#1565c0" font-weight="bold">Breadth-First Search (BFS)</text>
<text x="65" y="285" font-size="11" fill="#455a64">Complete: Yes</text>
<text x="65" y="300" font-size="11" fill="#455a64">Optimal: Yes (unit costs)</text>
<text x="180" y="285" font-size="11" fill="#455a64">Time: O(b^d)</text>
<text x="180" y="300" font-size="11" fill="#455a64">Space: O(b^d) - Exponential!</text>
<rect x="300" y="255" width="430" height="50" fill="#ffffff" rx="8" stroke="#388e3c" stroke-width="2"/>
<text x="315" y="280" font-size="14" fill="#2e7d32" font-weight="bold">Depth-First Search (DFS)</text>
<text x="315" y="295" font-size="11" fill="#455a64">Complete: No (infinite spaces)</text>
<text x="480" y="295" font-size="11" fill="#455a64">Time: O(b^m) | Space: O(bm)</text>
</g>
<g id="step4" data-narration="A* search combines path cost g(n) and heuristic h(n) to find optimal solutions. It is complete and optimal when the heuristic is admissible (never overestimates true cost).">
<rect x="50" y="325" width="700" height="75" fill="#ffffff" rx="8" stroke="#9c27b0" stroke-width="2"/>
<text x="65" y="350" font-size="14" fill="#7b1fa2" font-weight="bold">A* Search Algorithm</text>
<text x="65" y="375" font-size="12" fill="#455a64">f(n) = g(n) + h(n)</text>
<text x="180" y="375" font-size="11" fill="#455a64">g(n) = actual path cost from start</text>
<text x="360" y="375" font-size="11" fill="#455a64">h(n) = heuristic estimate to goal</text>
<text x="65" y="390" font-size="11" fill="#2e7d32">Complete: Yes (finite, positive costs)</text>
<text x="250" y="390" font-size="11" fill="#2e7d32">Optimal: Yes (if h(n) is admissible)</text>
</g>
<g id="step5" data-narration="A heuristic is admissible if it never overestimates the true cost. Manhattan distance for 8-puzzle is admissible because it underestimates moves needed.">
<rect x="50" y="415" width="340" height="70" fill="#ffffff" rx="8" stroke="#ff9800" stroke-width="2"/>
<text x="65" y="440" font-size="14" fill="#e65100" font-weight="bold">Heuristic Functions</text>
<text x="65" y="460" font-size="11" fill="#455a64">Admissible: h(n) ≤ true cost</text>
<text x="65" y="475" font-size="11" fill="#455a64">Consistent: h(n) ≤ cost(n,n') + h(n')</text>
<rect x="410" y="415" width="340" height="70" fill="#ffffff" rx="8" stroke="#f44336" stroke-width="2"/>
<text x="425" y="440" font-size="14" fill="#c62828" font-weight="bold">8-Puzzle Example</text>
<text x="425" y="460" font-size="11" fill="#455a64">Initial: Random tile arrangement</text>
<text x="425" y="475" font-size="11" fill="#455a64">Goal: Tiles 1-8 in order</text>
<text x="620" y="460" font-size="11" fill="#455a64">h = Manhattan distance</text>
<text x="620" y="475" font-size="11" fill="#455a64">(sum of tile moves needed)</text>
</g>
<g id="step6" data-narration="Common examples include 8-puzzle with sliding tiles, route finding like Romania map, and vacuum cleaner world. These illustrate problem formulation and search application.">
<rect x="50" y="500" width="700" height="80" fill="#ffffff" rx="8" stroke="#7b1fa2" stroke-width="2"/>
<text x="65" y="525" font-size="14" fill="#7b1fa2" font-weight="bold">Problem-Solving Agent Applications</text>
<rect x="65" y="540" width="200" height="32" fill="#e3f2fd" rx="4"/>
<text x="75" y="560" font-size="11" fill="#1565c0">8-Puzzle: Sliding tiles search</text>
<rect x="280" y="540" width="200" height="32" fill="#e8f5e9" rx="4"/>
<text x="290" y="560" font-size="11" fill="#2e7d32">Route Finding: Romania map</text>
<rect x="495" y="540" width="240" height="32" fill="#fff3e0" rx="4"/>
<text x="505" y="560" font-size="11" fill="#e65100">Vacuum Cleaner: Clean all dirt</text>
</g>
</svg>