<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Uninformed search strategies, also called blind search methods in artificial intelligence, use only the basic problem definition without any domain-specific knowledge or heuristics to guide exploration.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Uninformed Search Strategies in AI</text>
  </g>
  
  <!-- step1: Introduction - What is Uninformed Search -->
  <g class="step" id="step1" data-narration="Uninformed search algorithms utilize only the problem definition which includes initial state, goal state, and available operators or actions. No additional heuristics or domain knowledge guides the search process in any way.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is Uninformed Search?</text>
    <rect x="40" y="95" width="220" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="112" font-family="Arial" font-size="10" fill="#333">• No domain knowledge</text>
    <text x="50" y="125" font-family="Arial" font-size="10" fill="#333">• Uses only problem definition</text>
    <rect x="270" y="95" width="220" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="280" y="112" font-family="Arial" font-size="10" fill="#333">• Initial State → Goal State</text>
    <text x="280" y="125" font-family="Arial" font-size="10" fill="#333">• Set of operators/actions</text>
    <rect x="500" y="95" width="270" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="510" y="112" font-family="Arial" font-size="10" fill="#333">Also called: Blind Search</text>
    <text x="510" y="125" font-family="Arial" font-size="10" fill="#333">Systematic exploration</text>
  </g>
  
  <!-- step2: BFS - Breadth-First Search -->
  <g class="step" id="step2" data-narration="BFS explores level by level using a FIFO queue. It guarantees the shortest path in unweighted graphs and is complete.">
    <rect x="20" y="150" width="760" height="85" fill="#e8f5e9" rx="5"/>
    <text x="40" y="172" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">1. Breadth-First Search (BFS)</text>
    <rect x="40" y="190" width="180" height="38" fill="#c8e6c9"/>
    <text x="50" y="205" font-family="Arial" font-size="9" fill="#2e7d32">Data Structure: Queue (FIFO)</text>
    <text x="50" y="218" font-family="Arial" font-size="9" fill="#2e7d32">Explores: Level by level</text>
    <rect x="230" y="190" width="180" height="38" fill="#c8e6c9"/>
    <text x="240" y="205" font-family="Arial" font-size="9" fill="#2e7d32">Completeness: ✓ Complete</text>
    <text x="240" y="218" font-family="Arial" font-size="9" fill="#2e7d32">Optimality: ✓ Optimal (unweighted)</text>
    <rect x="420" y="190" width="170" height="38" fill="#c8e6c9"/>
    <text x="430" y="205" font-family="Arial" font-size="9" fill="#2e7d32">Time: O(b^d)</text>
    <text x="430" y="218" font-family="Arial" font-size="9" fill="#2e7d32">Space: O(b^d)</text>
    <text x="600" y="205" font-family="Arial" font-size="9" fill="#388e3c">b = branching factor</text>
    <text x="600" y="218" font-family="Arial" font-size="9" fill="#388e3c">d = solution depth</text>
  </g>
  
  <!-- step3: DFS - Depth-First Search -->
  <g class="step" id="step3" data-narration="DFS uses a LIFO stack, going deep along each branch before backtracking. It is memory efficient but not complete in infinite spaces.">
    <rect x="20" y="242" width="760" height="90" fill="#fff3e0" rx="5"/>
    <text x="40" y="264" font-family="Arial" font-size="14" font-weight="bold" fill="#f57c00">2. Depth-First Search (DFS)</text>
    <rect x="40" y="282" width="180" height="38" fill="#ffe0b2"/>
    <text x="50" y="297" font-family="Arial" font-size="9" fill="#e65100">Data Structure: Stack (LIFO)</text>
    <text x="50" y="310" font-family="Arial" font-size="9" fill="#e65100">Explores: Deep first, then backtrack</text>
    <rect x="230" y="282" width="180" height="38" fill="#ffe0b2"/>
    <text x="240" y="297" font-family="Arial" font-size="9" fill="#e65100">Completeness: ✗ Incomplete</text>
    <text x="240" y="310" font-family="Arial" font-size="9" fill="#e65100">Optimality: ✗ Not optimal</text>
    <rect x="420" y="282" width="170" height="38" fill="#ffe0b2"/>
    <text x="430" y="297" font-family="Arial" font-size="9" fill="#e65100">Time: O(b^m)</text>
    <text x="430" y="310" font-family="Arial" font-size="9" fill="#e65100">Space: O(bm)</text>
    <text x="600" y="297" font-family="Arial" font-size="9" fill="#f57c00">m = maximum depth</text>
    <text x="600" y="310" font-family="Arial" font-size="9" fill="#f57c00">Advantage: Low memory</text>
  </g>
  
  <!-- step4: UCS - Uniform-Cost Search -->
  <g class="step" id="step4" data-narration="UCS expands nodes with lowest cumulative path cost using a priority queue. It finds optimal cost paths when all costs are positive.">
    <rect x="20" y="340" width="760" height="85" fill="#f3e5f5" rx="5"/>
    <text x="40" y="362" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2">3. Uniform-Cost Search (UCS)</text>
    <rect x="40" y="380" width="200" height="38" fill="#e1bee7"/>
    <text x="50" y="395" font-family="Arial" font-size="9" fill="#4a148c">Data Structure: Priority Queue</text>
    <text x="50" y="408" font-family="Arial" font-size="9" fill="#4a148c">Orders by: Path cost g(n)</text>
    <rect x="250" y="380" width="180" height="38" fill="#e1bee7"/>
    <text x="260" y="395" font-family="Arial" font-size="9" fill="#4a148c">Completeness: ✓ Complete</text>
    <text x="260" y="408" font-family="Arial" font-size="9" fill="#4a148c">(when costs > 0)</text>
    <rect x="440" y="380" width="170" height="38" fill="#e1bee7"/>
    <text x="450" y="395" font-family="Arial" font-size="9" fill="#4a148c">Optimality: ✓ Optimal</text>
    <text x="450" y="408" font-family="Arial" font-size="9" fill="#4a148c">(min cost path)</text>
    <text x="620" y="395" font-family="Arial" font-size="9" fill="#7b1fa2">Time: O(b^(C*/ε))</text>
    <text x="620" y="408" font-family="Arial" font-size="9" fill="#7b1fa2">Space: Similar to BFS</text>
  </g>
  
  <!-- step5: DLS and IDS -->
  <g class="step" id="step5" data-narration="Depth-Limited Search adds a depth limit to DFS. Iterative Deepening repeats DLS with increasing limits, combining BFS and DFS benefits.">
    <rect x="20" y="432" width="760" height="85" fill="#ffebee" rx="5"/>
    <text x="40" y="454" font-family="Arial" font-size="14" font-weight="bold" fill="#d32f2f">4. Depth-Limited &amp; Iterative Deepening</text>
    <rect x="40" y="472" width="350" height="38" fill="#ffcdd2"/>
    <text x="50" y="487" font-family="Arial" font-size="10" fill="#b71c1c">Depth-Limited Search (DLS): Imposes limit l on DFS depth</text>
    <text x="50" y="500" font-family="Arial" font-size="10" fill="#b71c1c">Time: O(b^l) | Space: O(bl) | Complete if solution within limit</text>
    <rect x="400" y="472" width="370" height="38" fill="#ffcdd2"/>
    <text x="410" y="487" font-family="Arial" font-size="10" fill="#b71c1c">Iterative Deepening (IDS): Repeats DLS with limits 0,1,2...</text>
    <text x="410" y="500" font-family="Arial" font-size="10" fill="#b71c1c">Time: O(b^d) | Space: O(bd) | Combines BFS optimality + DFS space</text>
  </g>
  
  <!-- step6: Bidirectional Search & Summary -->
  <g class="step" id="step6" data-narration="Bidirectional search simultaneously explores forward from start and backward from goal, meeting in the middle with significantly reduced time complexity of O(b^(d/2)) for faster solution finding.">
    <rect x="20" y="524" width="760" height="70" fill="#e3f2fd" rx="5"/>
    <text x="40" y="546" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">5. Bidirectional Search &amp; Summary</text>
    <rect x="40" y="561" width="200" height="28" fill="#bbdefb"/>
    <text x="50" y="574" font-family="Arial" font-size="10" fill="#0d47a1">Bidirectional Search:</text>
    <text x="50" y="584" font-family="Arial" font-size="9" fill="#0d47a1">Forward + Backward, meet in middle</text>
    <text x="250" y="574" font-family="Arial" font-size="10" fill="#1976d2">Time: O(b^(d/2))</text>
    <text x="250" y="584" font-family="Arial" font-size="10" fill="#1976d2">Space: O(b^(d/2))</text>
    <rect x="380" y="561" width="380" height="28" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="390" y="574" font-family="Arial" font-size="9" fill="#1565c0">Quick Reference: BFS (queue, shortest path), DFS (stack, low memory), UCS (priority, min cost), IDS (best of both)</text>
  </g>
</svg>