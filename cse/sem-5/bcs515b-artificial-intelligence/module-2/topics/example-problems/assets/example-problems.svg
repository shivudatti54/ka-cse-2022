<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers practical examples of stack and queue operations for  Data Structures exam preparation in clear step-by-step diagrams.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Stack and Queue Operations - Example Problems</text>
  </g>
  
  <g class="step" id="step1" data-narration="Stack trace: PUSH(5) makes [5], PUSH(8) gives [5,8], POP removes 8 leaving [5]. Then PUSH(3), PUSH(7), POP() removes 7, PUSH(9) final.">
    <rect x="10" y="58" width="780" height="88" fill="#e3f2fd" rx="5"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example 1: Stack Trace Operations</text>
    <rect x="25" y="85" width="120" height="45" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="30" y="100" font-family="Arial" font-size="10" fill="#333">Operations:</text>
    <text x="30" y="115" font-family="Arial" font-size="9" fill="#555">PUSH(5), PUSH(8), POP(),</text>
    <text x="30" y="125" font-family="Arial" font-size="9" fill="#555">PUSH(3), PUSH(7), POP(),</text>
    <text x="30" y="135" font-family="Arial" font-size="9" fill="#555">PUSH(9)</text>
    <text x="155" y="100" font-family="Arial" font-size="10" fill="#333">Step-by-step:</text>
    <text x="155" y="115" font-family="Arial" font-size="9" fill="#555">1. PUSH(5) → [5]</text>
    <text x="155" y="127" font-family="Arial" font-size="9" fill="#555">2. PUSH(8) → [5,8]</text>
    <text x="155" y="139" font-family="Arial" font-size="9" fill="#555">3. POP() → remove 8, [5]</text>
    <rect x="300" y="85" width="150" height="45" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="310" y="100" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Final Stack:</text>
    <text x="340" y="118" font-family="Arial" font-size="14" fill="#333">[5, 3, 9]</text>
    <text x="340" y="133" font-family="Arial" font-size="10" fill="#666">Top = 9</text>
  </g>
  
  <g class="step" id="step2" data-narration="Linear queue of size 5: Enqueue 10,20 then Dequeue removes 10. After enqueueing 30,40,50 and Dequeue, trying Enqueue(60) causes overflow.">
    <rect x="10" y="154" width="780" height="80" fill="#e8f5e9" rx="5"/>
    <text x="25" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example 2: Linear Queue Trace (Size=5)</text>
    <rect x="25" y="183" width="200" height="45" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="35" y="198" font-family="Arial" font-size="9" fill="#333">Operations:</text>
    <text x="35" y="212" font-family="Arial" font-size="9" fill="#555">Enq(10), Enq(20), Deq(), Enq(30),</text>
    <text x="35" y="224" font-family="Arial" font-size="9" fill="#555">Enq(40), Enq(50), Deq(), Enq(60)</text>
    <rect x="235" y="183" width="180" height="45" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="245" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Queue Contents:</text>
    <text x="245" y="216" font-family="Arial" font-size="11" fill="#333">FRONT=2, REAR=4</text>
    <text x="245" y="230" font-family="Arial" font-size="10" fill="#333">[30, 40, 50]</text>
    <rect x="425" y="183" width="130" height="45" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="435" y="203" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">OVERFLOW!</text>
    <text x="435" y="218" font-family="Arial" font-size="9" fill="#333">REAR=5, can't enqueue</text>
    <text x="435" y="230" font-family="Arial" font-size="8" fill="#666">Linear queue limitation</text>
  </g>
  
  <g class="step" id="step3" data-narration="Infix to Postfix conversion: A+B*C-(D/E+F) becomes ABC*+DE/+F+-. Operators are pushed to stack based on precedence rules, while parentheses control popping order during the complete conversion process.">
    <rect x="10" y="242" width="780" height="80" fill="#fff3e0" rx="5"/>
    <text x="25" y="259" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Example 3: Infix to Postfix Conversion</text>
    <text x="25" y="278" font-family="Arial" font-size="10" fill="#333">Infix: <tspan font-style="italic">A + B * C - ( D / E + F )</tspan></text>
    <rect x="25" y="288" width="350" height="30" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="35" y="308" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Postfix: ABC*+DE/+F+-</text>
    <rect x="385" y="258" width="395" height="60" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="395" y="273" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Trace Table:</text>
    <text x="395" y="288" font-family="Arial" font-size="8" fill="#555">A→output, +→stack, B→output, *→stack(high),</text>
    <text x="395" y="300" font-family="Arial" font-size="8" fill="#555">C→output, -→pop*, push-, (→stack, D→output,</text>
    <text x="395" y="312" font-family="Arial" font-size="8" fill="#555">/→stack, E→output, +→pop/,push+, F→output, )→pop+</text>
  </g>
  
  <g class="step" id="step4" data-narration="Circular queue size 5 handles wrap-around using modulo. After enqueues and dequeues, REAR wraps to index 0 for final Enqueue(60).">
    <rect x="10" y="330" width="780" height="80" fill="#e8f5e9" rx="5"/>
    <text x="25" y="347" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example 4: Circular Queue Operations (Size=5)</text>
    <rect x="25" y="363" width="200" height="40" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="35" y="378" font-family="Arial" font-size="9" fill="#333">Operations:</text>
    <text x="35" y="393" font-family="Arial" font-size="9" fill="#555">Enq(10,20,30), Deq(2×), Enq(40,50,60)</text>
    <rect x="235" y="358" width="300" height="45" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="245" y="373" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Array State (Index:Value):</text>
    <text x="245" y="390" font-family="Arial" font-size="10" fill="#333">Q[0]=60  Q[1]=-  Q[2]=30  Q[3]=40  Q[4]=50</text>
    <text x="245" y="405" font-family="Arial" font-size="9" fill="#666">FRONT=2, REAR=0 (wrapped via modulo)</text>
    <rect x="545" y="358" width="120" height="45" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="555" y="378" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Valid Elements:</text>
    <text x="555" y="396" font-family="Arial" font-size="11" fill="#333">30, 40, 50, 60</text>
  </g>
  
  <g class="step" id="step5" data-narration="Postfix evaluation: 6 2 + gives 8, 5 * gives 40, 8 4 / gives 2, finally 40 minus 2 equals 38 as the final result after complete stack operations.">
    <rect x="10" y="418" width="780" height="80" fill="#fff3e0" rx="5"/>
    <text x="25" y="435" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Example 5: Postfix Expression Evaluation</text>
    <text x="25" y="458" font-family="Arial" font-size="11" fill="#333">Expression: <tspan font-family="Courier" font-weight="bold">6 2 + 5 * 8 4 / -</tspan></text>
    <rect x="25" y="468" width="280" height="25" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="35" y="485" font-family="Arial" font-size="10" fill="#333">Stack trace: [6]→[6,2]→[8]→[8,5]→[40]→[40,8]→[40,8,4]→[40,2]→[38]</text>
    <rect x="315" y="433" width="100" height="50" fill="#ff9800" rx="5"/>
    <text x="365" y="463" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">RESULT</text>
    <text x="365" y="483" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="white">38</text>
    <rect x="425" y="433" width="365" height="60" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="435" y="450" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Algorithm Steps:</text>
    <text x="435" y="466" font-family="Arial" font-size="8" fill="#555">Push 6, Push 2, +: pop 2,6→6+2=8→push 8</text>
    <text x="435" y="478" font-family="Arial" font-size="8" fill="#555">Push 5, *: pop 5,8→8*5=40→push 40</text>
    <text x="435" y="490" font-family="Arial" font-size="8" fill="#555">Push 8, Push 4, /: pop 4,8→8/4=2→push 2</text>
  </g>
  
  <g class="step" id="step6" data-narration="Exam tips: Draw diagrams showing FRONT and REAR pointers, remember linear queue overflow vs circular efficiency, memorize operator precedence rules, always check underflow before pop.">
    <rect x="10" y="506" width="780" height="85" fill="#f3e5f5" rx="5"/>
    <text x="25" y="523" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Exam Tips for Stack and Queue Problems</text>
    <rect x="25" y="533" width="180" height="52" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="35" y="548" font-family="Arial" font-size="8" font-weight="bold" fill="#333">Stack:</text>
    <text x="35" y="561" font-family="Arial" font-size="8" fill="#555">• Check underflow before pop</text>
    <text x="35" y="573" font-family="Arial" font-size="8" fill="#555">• LIFO: last in first out</text>
    <text x="35" y="585" font-family="Arial" font-size="8" fill="#555">• Top points to newest element</text>
    <rect x="215" y="533" width="180" height="52" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="225" y="548" font-family="Arial" font-size="8" font-weight="bold" fill="#333">Linear Queue:</text>
    <text x="225" y="561" font-family="Arial" font-size="8" fill="#555">• FRONT removes, REAR adds</text>
    <text x="225" y="573" font-family="Arial" font-size="8" fill="#555">• Overflow even if space exists</text>
    <text x="225" y="585" font-family="Arial" font-size="8" fill="#555">• Increment pointers only</text>
    <rect x="405" y="533" width="180" height="52" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="415" y="548" font-family="Arial" font-size="8" font-weight="bold" fill="#333">Circular Queue:</text>
    <text x="415" y="561" font-family="Arial" font-size="8" fill="#555">• REAR = (REAR+1)%SIZE</text>
    <text x="415" y="573" font-family="Arial" font-size="8" fill="#555">• Efficient space utilization</text>
    <text x="415" y="585" font-family="Arial" font-size="8" fill="#555">• Wrap-around using modulo</text>
    <rect x="595" y="533" width="180" height="52" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="605" y="548" font-family="Arial" font-size="8" font-weight="bold" fill="#333">Precedence:</text>
    <text x="605" y="561" font-family="Arial" font-size="8" fill="#555">• () highest</text>
    <text x="605" y="573" font-family="Arial" font-size="8" fill="#555">• */ next</text>
    <text x="605" y="585" font-family="Arial" font-size="8" fill="#555">• +- lowest</text>
  </g>
</svg>