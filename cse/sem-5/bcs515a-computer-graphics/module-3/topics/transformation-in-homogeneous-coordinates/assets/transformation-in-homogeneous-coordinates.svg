<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This lesson covers homogeneous coordinates, a key technique for performing geometric transformations in computer graphics using efficient matrix operations in 3D.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Transformation in Homogeneous Coordinates</text>
  </g>
  
  <g class="step" id="step1" data-narration="Homogeneous coordinates extend 2D points to 3D by adding coordinate w. Setting w equals 1 simplifies calculations while enabling matrix-based transformations.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">1. Homogeneous Coordinates Concept</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#2e7d32">2D Point: (x, y) → (x, y, 1) | 3D Point: (x, y, z) → (x, y, z, 1)</text>
    <text x="40" y="118" font-family="Arial" font-size="10" fill="#2e7d32">The added coordinate enables all affine transformations via matrix multiplication</text>
    <rect x="500" y="75" width="250" height="50" fill="#c8e6c9" rx="3"/>
    <text x="625" y="95" text-anchor="middle" font-family="Arial" font-size="11" fill="#1b5e20">Homogeneous: (x, y, w)</text>
    <text x="625" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Cartesian: x = x̄/w, y = ȳ/w</text>
  </g>
  
  <g class="step" id="step2" data-narration="Translation moves points by adding offsets. The 3x3 matrix has 1s on the diagonal and translation values tx, ty in the last column.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">2. Translation Matrix (2D)</text>
    <rect x="40" y="182" width="140" height="35" fill="#ffe0b2" rx="3"/>
    <text x="110" y="200" text-anchor="middle" font-family="Courier" font-size="11" fill="#e65100">| 1  0  tx |</text>
    <text x="110" y="213" text-anchor="middle" font-family="Courier" font-size="11" fill="#e65100">| 0  1  ty |</text>
    <text x="110" y="226" text-anchor="middle" font-family="Courier" font-size="9" fill="#e65100">| 0  0  1  |</text>
    <text x="220" y="190" font-family="Arial" font-size="10" fill="#ef6c00">Moves point (x,y) → (x+tx, y+ty)</text>
    <text x="220" y="208" font-family="Arial" font-size="10" fill="#ef6c00">Example: Translate (2,3) by (3,-2)</text>
    <text x="220" y="226" font-family="Arial" font-size="10" fill="#ef6c00">Result: (5, 1)</text>
    <rect x="450" y="182" width="140" height="35" fill="#ffe0b2" rx="3"/>
    <text x="520" y="200" text-anchor="middle" font-family="Courier" font-size="10" fill="#e65100">| 1  0  3  |</text>
    <text x="520" y="213" text-anchor="middle" font-family="Courier" font-size="10" fill="#e65100">| 0  1 -2  |</text>
    <text x="520" y="226" text-anchor="middle" font-family="Courier" font-size="9" fill="#e65100">| 0  0  1  |</text>
  </g>
  
  <g class="step" id="step3" data-narration="Scaling changes object size using factors sx and sy. The matrix has scaling values on the diagonal. Rotation uses cosine and sine functions for angular transformations.">
    <rect x="20" y="234" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">3. Scaling and Rotation Matrices</text>
    <text x="40" y="275" font-family="Arial" font-size="10" fill="#1565c0">Scaling Matrix:</text>
    <rect x="40" y="280" width="130" height="30" fill="#bbdefb" rx="3"/>
    <text x="105" y="296" text-anchor="middle" font-family="Courier" font-size="10" fill="#0d47a1">| sx  0  0 |</text>
    <text x="105" y="308" text-anchor="middle" font-family="Courier" font-size="10" fill="#0d47a1">| 0  sy  0 |</text>
    <text x="180" y="282" font-family="Arial" font-size="10" fill="#1565c0">Rotation (θ CCW):</text>
    <rect x="180" y="280" width="150" height="30" fill="#bbdefb" rx="3"/>
    <text x="255" y="290" text-anchor="middle" font-family="Courier" font-size="9" fill="#0d47a1">| cosθ  -sinθ  0 |</text>
    <text x="255" y="302" text-anchor="middle" font-family="Courier" font-size="9" fill="#0d47a1">| sinθ   cosθ  0 |</text>
    <text x="350" y="300" font-family="Arial" font-size="9" fill="#1565c0">Shear X:</text>
    <rect x="385" y="280" width="80" height="30" fill="#bbdefb" rx="3"/>
    <text x="425" y="290" text-anchor="middle" font-family="Courier" font-size="9" fill="#0d47a1">| 1 shx 0 |</text>
    <text x="425" y="302" text-anchor="middle" font-family="Courier" font-size="9" fill="#0d47a1">| 0  1  0 |</text>
    <text x="500" y="275" font-family="Arial" font-size="10" fill="#1565c0">3D Rotation (Z-axis):</text>
    <rect x="500" y="280" width="150" height="30" fill="#bbdefb" rx="3"/>
    <text x="575" y="290" text-anchor="middle" font-family="Courier" font-size="8" fill="#0d47a1">|cosθ -sinθ 0 0|</text>
    <text x="575" y="300" text-anchor="middle" font-family="Courier" font-size="8" fill="#0d47a1">|sinθ  cosθ 0 0|</text>
    <text x="575" y="310" text-anchor="middle" font-family="Courier" font-size="8" fill="#0d47a1">|  0    0  1 0|</text>
  </g>
  
  <g class="step" id="step4" data-narration="Composite transformations multiply multiple matrices into one. The rightmost matrix applies first. Rotating about a pivot requires a translate-rotate-translate sequence to work correctly.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Composite Transformations</text>
    <text x="40" y="365" font-family="Arial" font-size="10" fill="#7b1fa2">Key Principle: Matrix multiplication is not commutative—order matters!</text>
    <text x="40" y="382" font-family="Arial" font-size="10" fill="#7b1fa2">Transformations apply right-to-left: M = T × R means apply R first, then T</text>
    <text x="40" y="400" font-family="Arial" font-size="10" fill="#7b1fa2">Rotate about point P: M = T(P) × Transformation × T(-P)</text>
    <rect x="450" y="345" width="320" height="50" fill="#e1bee7" rx="3"/>
    <text x="610" y="365" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">Rotate (4,3) 90° about (1,1)</text>
    <text x="610" y="385" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">M = T(1,1) × R(90°) × T(-1,-1)</text>
    <text x="610" y="400" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Result: P'(-1, 4)</text>
  </g>
  
  <g class="step" id="step5" data-narration="The graphics pipeline applies transformations in sequence: model, view, projection, and viewport stages. Each stage uses homogeneous coordinate matrices for efficient computation.">
    <rect x="20" y="410" width="760" height="95" fill="#ffebee" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. Transformation Pipeline</text>
    <rect x="40" y="448" width="130" height="35" fill="#ffcdd2" rx="3"/>
    <text x="105" y="465" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Model Transform</text>
    <text x="105" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Position in world</text>
    <line x1="170" y1="465" x2="190" y2="465" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="200" y="448" width="130" height="35" fill="#ffcdd2" rx="3"/>
    <text x="265" y="465" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">View Transform</text>
    <text x="265" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Camera positioning</text>
    <line x1="330" y1="465" x2="350" y2="465" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="360" y="448" width="130" height="35" fill="#ffcdd2" rx="3"/>
    <text x="425" y="465" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Projection</text>
    <text x="425" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">3D to 2D</text>
    <line x1="490" y1="465" x2="510" y2="465" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="520" y="448" width="130" height="35" fill="#ffcdd2" rx="3"/>
    <text x="585" y="465" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Viewport</text>
    <text x="585" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Screen mapping</text>
    <text x="40" y="500" font-family="Arial" font-size="10" fill="#c62828">All stages use homogeneous coordinate transformation matrices</text>
  </g>
  
  <g class="step" id="step6" data-narration="For exam success: memorize all 3x3 transformation matrices, remember right-to-left application order, and practice the three-step method for rotation about arbitrary points.">
    <rect x="20" y="513" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="535" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">6. Exam Tips &amp; Key Takeaways</text>
    <text x="40" y="555" font-family="Arial" font-size="10" fill="#ef6c00">• Always add coordinate '1' for homogeneous representation</text>
    <text x="40" y="570" font-family="Arial" font-size="10" fill="#ef6c00">• Translation: 1s on diagonal; Rotation: cosθ and sinθ pattern</text>
    <text x="40" y="585" font-family="Arial" font-size="10" fill="#ef6c00">• Composite: apply right-to-left—write T × R but R applies first</text>
    <rect x="400" y="535" width="360" height="50" fill="#ffe0b2" rx="3"/>
    <text x="580" y="555" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Common Mistakes to Avoid</text>
    <text x="580" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">× Forgetting the extra coordinate '1'</text>
    <text x="580" y="584" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">× Wrong transformation order</text>
  </g>
</svg>