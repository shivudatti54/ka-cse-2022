<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Affine transformations are fundamental operations in computer graphics that preserve parallel lines and ratios of distances along lines, making them essential for realistic rendering and geometric modeling in modern applications.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Affine Transformations</text>
  </g>

  <!-- step1: Definition & Properties -->
  <g class="step" id="step1" data-narration="An affine transformation follows T(p) = Ap + b formula, preserving collinearity, parallelism, and ratios of distances along lines while mapping points to new positions through linear operations and translation vectors.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Definition &amp; Properties</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">T(p) = Ap + b where A is linear matrix, b is translation vector</text>
    <text x="40" y="118" font-family="Arial" font-size="10" fill="#555">• Parallelism preserved • Ratios preserved • Composition is affine • Inverse is affine</text>
    <rect x="580" y="72" width="180" height="50" fill="#fff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="670" y="92" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Key Property</text>
    <text x="670" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Lines remain lines</text>
    <text x="670" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Parallel lines stay parallel</text>
  </g>

  <!-- step2: Homogeneous Coordinates -->
  <g class="step" id="step2" data-narration="Homogeneous coordinates add a third coordinate w=1 to enable all transformations as matrix multiplication. This clever technique allows translation, rotation, scaling, and shearing to be unified in a single matrix operation framework.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Homogeneous Coordinates</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#333">2D point (x, y) → (x, y, 1) | 3D point (x, y, z) → (x, y, z, 1)</text>
    <text x="40" y="208" font-family="Arial" font-size="10" fill="#555">Enables translation as matrix multiplication • 3×3 matrices in 2D • 4×4 matrices in 3D</text>
    <rect x="520" y="160" width="240" height="52" fill="#fff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="640" y="180" text-anchor="middle" font-family="Courier" font-size="11" fill="#333">| x' |   | a b tx |   | x |</text>
    <text x="640" y="196" text-anchor="middle" font-family="Courier" font-size="11" fill="#333">| y' | = | c d ty | × | y |</text>
    <text x="640" y="212" text-anchor="middle" font-family="Courier" font-size="11" fill="#333">| 1  |   | 0 0  1 |   | 1 |</text>
  </g>

  <!-- step3: Basic Transformations -->
  <g class="step" id="step3" data-narration="Translation moves points by adding tx and ty displacement values. Rotation by angle θ about the origin uses trigonometric functions. Scaling multiplies coordinates by sx and sy factors uniformly or non-uniformly for distortion effects.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Basic Transformations</text>
    
    <!-- Translation box -->
    <rect x="40" y="270" width="150" height="35" fill="#fff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="115" y="284" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">TRANSLATION</text>
    <text x="115" y="298" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">|1 0 tx|</text>
    
    <!-- Rotation box -->
    <rect x="210" y="270" width="150" height="35" fill="#fff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="285" y="284" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">ROTATION</text>
    <text x="285" y="298" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">|cos -sin 0|</text>
    
    <!-- Scaling box -->
    <rect x="380" y="270" width="150" height="35" fill="#fff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="455" y="284" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">SCALING</text>
    <text x="455" y="298" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">|sx 0  0|</text>
    
    <!-- Formulas -->
    <text x="600" y="260" font-family="Arial" font-size="9" fill="#555">Formulas:</text>
    <text x="600" y="276" font-family="Arial" font-size="9" fill="#333">x' = x + tx, y' = y + ty</text>
    <text x="600" y="292" font-family="Arial" font-size="9" fill="#333">x' = xcosθ - ysinθ</text>
    <text x="600" y="308" font-family="Arial" font-size="9" fill="#333">y' = xsinθ + ycosθ</text>
  </g>

  <!-- step4: Shearing & Reflection -->
  <g class="step" id="step4" data-narration="Shearing skews shapes along axes using shx and shy shear factors to distort geometry. Reflection creates mirror images across axes or arbitrary lines through coordinate negation for flip transformations.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Shearing &amp; Reflection</text>
    
    <!-- Shearing -->
    <rect x="40" y="358" width="300" height="35" fill="#fff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="190" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">SHEARING</text>
    <text x="190" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">x-shear: x' = x + shx·y | y-shear: y' = y + shy·x</text>
    
    <!-- Reflection types -->
    <text x="360" y="358" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Reflection:</text>
    <text x="360" y="376" font-family="Arial" font-size="9" fill="#333">x-axis: (x,y)→(x,-y)</text>
    <text x="360" y="394" font-family="Arial" font-size="9" fill="#333">y-axis: (x,y)→(-x,y)</text>
    
    <rect x="520" y="358" width="240" height="35" fill="#fff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="640" y="375" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">| 1  shx  0 | (x-shear)</text>
    <text x="640" y="390" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">| shy 1   0 | (y-shear)</text>
  </g>

  <!-- step5: Composite Transformations -->
  <g class="step" id="step5" data-narration="Multiple transformations combine into one matrix through multiplication for computational efficiency. The order of operations matters critically because matrix multiplication is not commutative in geometric transformation pipelines.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Composite Transformations</text>
    <text x="40" y="452" font-family="Arial" font-size="10" fill="#333">Combine multiple transforms: M = T × R × S (applies right-to-left)</text>
    <text x="40" y="470" font-family="Arial" font-size="9" fill="#555">Order matters: Rotate then Translate ≠ Translate then Rotate</text>
    
    <!-- About arbitrary point process -->
    <rect x="360" y="420" width="380" height="60" fill="#fff" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="550" y="438" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Rotation/Scale about Arbitrary Point</text>
    <text x="550" y="456" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">1. Translate point to origin</text>
    <text x="550" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">2. Apply transform | 3. Translate back</text>
  </g>

  <!-- step6: Example Problem -->
  <g class="step" id="step6" data-narration="Example: Rotating triangle with vertices A(1,1), B(3,1), C(2,3) by 90 degrees counterclockwise about origin yields transformed coordinates A'(-1,1), B'(-1,3), C'(-3,2) through matrix multiplication.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Example: 90° Rotation About Origin</text>
    
    <!-- Original triangle -->
    <text x="40" y="542" font-family="Arial" font-size="10" fill="#333">Original: A(1,1), B(3,1), C(2,3)</text>
    <text x="40" y="560" font-family="Arial" font-size="10" fill="#333">Matrix: |0 -1 0|</text>
    <text x="40" y="578" font-family="Arial" font-size="10" fill="#333">|1  0 0|</text>
    
    <!-- Calculation -->
    <rect x="200" y="530" width="180" height="48" fill="#fff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="290" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">A': x' = 0(1)-1(1) = -1</text>
    <text x="290" y="562" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">y' = 1(1)+0(1) = 1</text>
    <text x="290" y="576" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">A'(-1,1)</text>
    
    <!-- Result -->
    <rect x="420" y="530" width="340" height="48" fill="#1976d2" rx="4"/>
    <text x="590" y="552" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Result: A'(-1,1), B'(-1,3), C'(-3,2)</text>
    <text x="590" y="572" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Triangle rotated 90° CCW about origin</text>
  </g>
</svg>