<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Introduction to modeling a colored cube in 3D graphics. This topic covers vertices, faces, colors, transformations, and the rendering pipeline.">
    <rect x="0" y="0" width="800" height="45" fill="#e3f2fd"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Modeling a Colored Cube</text>
  </g>
  
  <g class="step" id="step1" data-narration="A cube has 8 vertices at coordinates where x, y, z are each plus or minus 0.5, forming a unit cube centered at the origin.">
    <rect x="10" y="53" width="780" height="85" rx="8" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="25" y="70" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. 3D Vertices (8 corners)</text>
    <text x="25" y="88" font-family="Arial" font-size="10" fill="#333">Bottom Face: (-0.5,-0.5,-0.5) to (0.5,0.5,0.5)</text>
    <text x="25" y="103" font-family="Arial" font-size="10" fill="#333">Top Face: (-0.5,0.5,-0.5) to (0.5,0.5,0.5)</text>
    <rect x="550" y="65" width="220" height="55" fill="#e3f2fd" rx="4"/>
    <text x="660" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">8 Vertices</text>
    <text x="660" y="100" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">(±0.5, ±0.5, ±0.5)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Each face uses 4 vertices listed in counter-clockwise order when viewed from outside the cube. This winding direction determines the outward-facing normal vector for proper lighting calculations.">
    <rect x="10" y="146" width="780" height="80" rx="8" fill="#ffffff" stroke="#e8f5e9" stroke-width="2"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Face Winding (CCW)</text>
    <text x="25" y="181" font-family="Arial" font-size="10" fill="#333">Right-hand rule: curl fingers in vertex order, thumb points normal</text>
    <text x="25" y="196" font-family="Arial" font-size="10" fill="#333">GL_CCW = front face by default in OpenGL</text>
    <polygon points="600,160 680,160 680,210 600,210" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="640" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Front Face</text>
    <text x="640" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">v0→v1→v2→v3</text>
  </g>
  
  <g class="step" id="step3" data-narration="Assign RGB colors to each face using normalized float values from 0.0 to 1.0. Each face gets a distinct color for visibility.">
    <rect x="10" y="234" width="780" height="80" rx="8" fill="#ffffff" stroke="#fff3e0" stroke-width="2"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Face Colors (RGB 0.0-1.0)</text>
    <rect x="25" y="262" width="20" height="15" fill="#ff0000"/>
    <text x="50" y="274" font-family="Arial" font-size="9" fill="#333">Front: Red (1,0,0)</text>
    <rect x="130" y="262" width="20" height="15" fill="#00ff00"/>
    <text x="155" y="274" font-family="Arial" font-size="9" fill="#333">Back: Green (0,1,0)</text>
    <rect x="235" y="262" width="20" height="15" fill="#0000ff"/>
    <text x="260" y="274" font-family="Arial" font-size="9" fill="#333">Top: Blue (0,0,1)</text>
    <rect x="340" y="262" width="20" height="15" fill="#ffff00"/>
    <text x="365" y="274" font-family="Arial" font-size="9" fill="#333">Bottom: Yellow</text>
    <rect x="445" y="262" width="20" height="15" fill="#ff00ff"/>
    <text x="470" y="274" font-family="Arial" font-size="9" fill="#333">Right: Magenta</text>
    <rect x="550" y="262" width="20" height="15" fill="#00ffff"/>
    <text x="575" y="274" font-family="Arial" font-size="9" fill="#333">Left: Cyan</text>
  </g>
  
  <g class="step" id="step4" data-narration="Three transformation matrices process vertices in sequence: the Model matrix positions and orients the cube, the View matrix places the camera, and the Projection matrix creates perspective or orthographic projection effects.">
    <rect x="10" y="322" width="780" height="80" rx="8" fill="#ffffff" stroke="#ffebee" stroke-width="2"/>
    <text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">4. Transformation Matrices</text>
    <rect x="25" y="352" width="180" height="40" fill="#ffebee" rx="4"/>
    <text x="115" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Model Matrix</text>
    <text x="115" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Translate, Rotate, Scale</text>
    <rect x="215" y="352" width="180" height="40" fill="#ffebee" rx="4"/>
    <text x="305" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">View Matrix</text>
    <text x="305" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Camera Position</text>
    <rect x="405" y="352" width="180" height="40" fill="#ffebee" rx="4"/>
    <text x="495" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Projection Matrix</text>
    <text x="495" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Perspective / Ortho</text>
    <text x="640" y="370" font-family="Arial" font-size="10" fill="#333">Clip = P × V × M × Vertex</text>
  </g>
  
  <g class="step" id="step5" data-narration="The rendering pipeline processes geometric data through six stages: vertex specification, vertex shader transformation, primitive assembly, rasterization, fragment shader processing, and final per-fragment operations to create the displayed image.">
    <rect x="10" y="410" width="780" height="80" rx="8" fill="#ffffff" stroke="#f3e5f5" stroke-width="2"/>
    <text x="25" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">5. Rendering Pipeline</text>
    <rect x="25" y="442" width="105" height="38" fill="#f3e5f5" rx="3"/>
    <text x="77" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Vertex</text>
    <text x="77" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Specification</text>
    <line x1="130" y1="461" x2="150" y2="461" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="155" y="442" width="105" height="38" fill="#f3e5f5" rx="3"/>
    <text x="207" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Vertex Shader</text>
    <text x="207" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">(Transform)</text>
    <line x1="260" y1="461" x2="280" y2="461" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="285" y="442" width="105" height="38" fill="#f3e5f5" rx="3"/>
    <text x="337" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Primitive</text>
    <text x="337" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Assembly</text>
    <line x1="390" y1="461" x2="410" y2="461" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="415" y="442" width="105" height="38" fill="#f3e5f5" rx="3"/>
    <text x="467" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Rasterization</text>
    <text x="467" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">(Fragments)</text>
    <line x1="520" y1="461" x2="540" y2="461" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="545" y="442" width="105" height="38" fill="#f3e5f5" rx="3"/>
    <text x="597" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Fragment</text>
    <text x="597" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Shader</text>
    <line x1="650" y1="461" x2="670" y2="461" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="675" y="442" width="105" height="38" fill="#f3e5f5" rx="3"/>
    <text x="727" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Per-Fragment</text>
    <text x="727" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Ops + Output</text>
  </g>
  
  <g class="step" id="step6" data-narration="Enable depth testing with GL_DEPTH_TEST so closer faces properly occlude distant ones. Use GL_CULL_FACE to skip rendering back faces, which significantly improves performance by reducing the number of fragments processed.">
    <rect x="10" y="498" width="780" height="85" rx="8" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="25" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Depth Buffering &amp; Face Culling</text>
    <rect x="25" y="528" width="200" height="45" fill="#e3f2fd" rx="4"/>
    <text x="125" y="543" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">glEnable(GL_DEPTH_TEST)</text>
    <text x="125" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Stores depth per pixel</text>
    <rect x="240" y="528" width="200" height="45" fill="#e3f2fd" rx="4"/>
    <text x="340" y="543" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">glDepthFunc(GL_LESS)</text>
    <text x="340" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Pass if depth &lt; stored</text>
    <rect x="455" y="528" width="200" height="45" fill="#e3f2fd" rx="4"/>
    <text x="555" y="543" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">glEnable(GL_CULL_FACE)</text>
    <text x="555" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Skip back faces</text>
    <text x="680" y="550" font-family="Arial" font-size="9" fill="#666">36 vertices total</text>
    <text x="680" y="565" font-family="Arial" font-size="9" fill="#666">(6 faces × 2 triangles × 3)</text>
  </g>
</svg>