<svg viewBox="0 0 800 1560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect:first-child {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; }
    .title { font-weight: bold; font-size: 16px; }
    .subtitle { font-size: 12px; }
    .body { font-size: 10px; }
    .label { font-size: 9px; }
  </style>
  
  <rect width="800" height="1560" fill="#f8f9fa"/>
  
  <!-- STEP 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to rotation in computer graphics. Learn how to rotate points and objects in 2D space.">
    <rect x="0" y="0" width="800" height="55" fill="url(#blueGrad)" rx="0"/>
    <text x="400" y="35" fill="white" text-anchor="middle" class="title" font-size="22">Rotation in Computer Graphics</text>
    <text x="400" y="48" fill="#bbdefb" text-anchor="middle" class="subtitle">Module 3 - Transformation Fundamentals</text>
  </g>
  
  <!-- STEP 1: What is Rotation? -->
  <g class="step" id="step1" data-narration="Rotation is a transformation that rotates a point around a fixed center by a specified angle, preserving shape and size.">
    <rect x="20" y="65" width="760" height="85" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="65" width="8" height="85" fill="#1976d2" rx="4"/>
    <text x="45" y="90" fill="#1976d2" class="title">What is Rotation?</text>
    <text x="45" y="110" fill="#333" class="body">A fundamental transformation that rotates a point or object around</text>
    <text x="45" y="125" fill="#333" class="body">a fixed point (origin or pivot) by a specified angle θ.</text>
    <text x="580" y="100" fill="#666" class="label">Preserves: Shape, Size, Distances</text>
    <circle cx="680" cy="100" r="25" fill="none" stroke="#1976d2" stroke-width="2"/>
    <path d="M680,80 L680,100 L695,100" fill="none" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="680" y="140" fill="#1976d2" class="label" text-anchor="middle">θ</text>
  </g>
  
  <!-- STEP 2: Counter-clockwise vs Clockwise -->
  <g class="step" id="step2" data-narration="Counter-clockwise rotation uses positive angles, clockwise uses negative angles. This is the standard convention in computer graphics.">
    <rect x="20" y="160" width="370" height="85" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="160" width="8" height="85" fill="#388e3c" rx="4"/>
    <text x="45" y="185" fill="#388e3c" class="title">Counter-Clockwise (+θ)</text>
    <text x="45" y="205" fill="#333" class="body">Positive angle direction</text>
    <text x="45" y="220" fill="#333" class="body">Standard in math and graphics</text>
    <circle cx="280" cy="202" r="30" fill="none" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M280,177 L280,202 L300,202" fill="none" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    
    <rect x="410" y="160" width="370" height="85" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="410" y="160" width="8" height="85" fill="#ff9800" rx="4"/>
    <text x="435" y="185" fill="#ff9800" class="title">Clockwise (-θ)</text>
    <text x="435" y="205" fill="#333" class="body">Negative angle direction</text>
    <text x="435" y="220" fill="#333" class="body">Opposite to mathematical convention</text>
    <circle cx="670" cy="202" r="30" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M670,227 L670,202 L650,202" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
  </g>
  
  <!-- STEP 3: Rotation Formula -->
  <g class="step" id="step3" data-narration="The rotation formulas use trigonometric functions: x' equals x cosθ minus y sinθ, and y' equals x sinθ plus y cosθ.">
    <rect x="20" y="255" width="760" height="95" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="255" width="8" height="95" fill="#9c27b0" rx="4"/>
    <text x="45" y="280" fill="#9c27b0" class="title">Rotation Formula (2D)</text>
    <text x="45" y="305" fill="#333" class="body">For a point (x, y) rotated by angle θ about origin:</text>
    <text x="80" y="330" fill="#1565c0" class="formula" font-size="14">x' = x × cos(θ) - y × sin(θ)</text>
    <text x="80" y="345" fill="#1565c0" class="formula" font-size="14">y' = x × sin(θ) + y × cos(θ)</text>
  </g>
  
  <!-- STEP 4: Rotation Matrix -->
  <g class="step" id="step4" data-narration="Rotation can be expressed as a 2x2 transformation matrix with cosθ and sinθ values in specific positions.">
    <rect x="20" y="360" width="760" height="95" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="360" width="8" height="95" fill="#1976d2" rx="4"/>
    <text x="45" y="385" fill="#1976d2" class="title">Rotation Matrix</text>
    <text x="45" y="410" fill="#333" class="body">In homogeneous coordinates, rotation is represented as:</text>
    <rect x="280" y="420" width="140" height="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="295" y="438" fill="#1565c0" class="formula" font-size="12">cosθ  -sinθ</text>
    <text x="355" y="438" fill="#1565c0" class="formula" font-size="12">sinθ   cosθ</text>
    <text x="450" y="438" fill="#666" class="label">× [x y] = [x' y']</text>
  </g>
  
  <!-- STEP 5: Example 1 - 90 degree rotation -->
  <g class="step" id="step5" data-narration="For 90 degree counter-clockwise rotation, cos90 is 0 and sin90 is 1, simplifying the formula significantly.">
    <rect x="20" y="465" width="370" height="95" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="465" width="8" height="95" fill="#388e3c" rx="4"/>
    <text x="45" y="490" fill="#388e3c" class="title">Example: 90° CCW Rotation</text>
    <text x="45" y="515" fill="#333" class="body">cos(90°) = 0, sin(90°) = 1</text>
    <text x="45" y="535" fill="#333" class="body">x' = x(0) - y(1) = -y</text>
    <text x="45" y="550" fill="#333" class="body">y' = x(1) + y(0) = x</text>
    <text x="280" y="530" fill="#388e3c" class="formula" font-size="11">(x, y) → (-y, x)</text>
    
    <rect x="410" y="465" width="370" height="95" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="410" y="465" width="8" height="95" fill="#ff9800" rx="4"/>
    <text x="435" y="490" fill="#ff9800" class="title">Example: 90° CW Rotation</text>
    <text x="435" y="515" fill="#333" class="body">cos(-90°) = 0, sin(-90°) = -1</text>
    <text x="435" y="535" fill="#333" class="body">x' = x(0) - y(-1) = y</text>
    <text x="435" y="550" fill="#333" class="body">y' = x(-1) + y(0) = -x</text>
    <text x="680" y="530" fill="#ff9800" class="formula" font-size="11">(x, y) → (y, -x)</text>
  </g>
  
  <!-- STEP 6: Visual Example - Point Rotation -->
  <g class="step" id="step6" data-narration="Let's visualize rotating point (1, 0) by 90 degrees counter-clockwise to position (0, 1) on the unit circle.">
    <rect x="20" y="570" width="760" height="110" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="570" width="8" height="110" fill="#7b1fa2" rx="4"/>
    <text x="45" y="595" fill="#7b1fa2" class="title">Visual: Rotating (1, 0) by 90°</text>
    <text x="45" y="620" fill="#333" class="body">Original point: P(1, 0) - on positive X-axis</text>
    <text x="45" y="640" fill="#333" class="body">After 90° CCW: P'(0, 1) - moves to positive Y-axis</text>
    <text x="45" y="660" fill="#333" class="body">After 180°: P''(-1, 0) - moves to negative X-axis</text>
    <text x="45" y="680" fill="#333" class="body">After 270°: P'''(0, -1) - moves to negative Y-axis</text>
    <!-- Coordinate system visualization -->
    <line x1="600" y1="640" x2="720" y2="640" stroke="#333" stroke-width="1"/>
    <line x1="660" y1="580" x2="660" y2="700" stroke="#333" stroke-width="1"/>
    <text x="725" y="644" fill="#333" class="label">X</text>
    <text x="660" y="575" fill="#333" class="label">Y</text>
    <circle cx="710" cy="640" r="4" fill="#1976d2"/>
    <circle cx="660" cy="590" r="4" fill="#388e3c"/>
    <circle cx="610" cy="640" r="4" fill="#ff9800"/>
    <circle cx="660" cy="690" r="4" fill="#9c27b0"/>
    <text x="715" y="655" fill="#1976d2" class="label">(1,0)</text>
    <text x="665" y="590" fill="#388e3c" class="label">(0,1)</text>
  </g>
  
  <!-- STEP 7: Rotating a Triangle -->
  <g class="step" id="step7" data-narration="To rotate a polygon, apply the rotation formula to each vertex independently to get the new rotated shape.">
    <rect x="20" y="690" width="760" height="110" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="690" width="8" height="110" fill="#f44336" rx="4"/>
    <text x="45" y="715" fill="#f44336" class="title">Rotating a Triangle</text>
    <text x="45" y="740" fill="#333" class="body">Triangle vertices: A(0,0), B(4,0), C(4,3)</text>
    <text x="45" y="760" fill="#333" class="body">After 90° CCW rotation:</text>
    <text x="45" y="780" fill="#333" class="body">A'(0,0), B'(0,4), C'(-3,4)</text>
    <!-- Original triangle -->
    <polygon points="220,760 260,760 260,730" fill="none" stroke="#f44336" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="235" y="780" fill="#f44336" class="label">Original</text>
    <!-- Rotated triangle -->
    <polygon points="300,760 300,720 330,720" fill="none" stroke="#388e3c" stroke-width="2"/>
    <text x="310" y="780" fill="#388e3c" class="label">Rotated</text>
    <text x="450" y="745" fill="#666" class="body">Each vertex transformed independently using the rotation formulas</text>
  </g>
  
  <!-- STEP 8: Rotation About Arbitrary Point -->
  <g class="step" id="step8" data-narration="To rotate around a point other than origin, first translate to origin, rotate, then translate back.">
    <rect x="20" y="810" width="760" height="110" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="810" width="8" height="110" fill="#ff9800" rx="4"/>
    <text x="45" y="835" fill="#ff9800" class="title">Rotation About Arbitrary Point (Px, Py)</text>
    <text x="45" y="860" fill="#333" class="body">Three-step process:</text>
    <text x="65" y="885" fill="#1976d2" class="body">1. Translate: (x - Px, y - Py) - move pivot to origin</text>
    <text x="65" y="905" fill="#388e3c" class="body">2. Rotate: Apply rotation formula about origin</text>
    <text x="65" y="925" fill="#ff9800" class="body">3. Translate back: (x' + Px, y' + Py)</text>
  </g>
  
  <!-- STEP 9: Common Rotation Angles -->
  <g class="step" id="step9" data-narration="Common rotation angles have known trigonometric values that simplify calculations significantly.">
    <rect x="20" y="930" width="760" height="110" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="930" width="8" height="110" fill="#1976d2" rx="4"/>
    <text x="45" y="955" fill="#1976d2" class="title">Common Rotation Angles</text>
    <rect x="45" y="970" width="120" height="60" fill="#e3f2fd" rx="5"/>
    <text x="55" y="990" fill="#333" class="label" text-anchor="middle">Angle</text>
    <text x="55" y="1005" fill="#333" class="label" text-anchor="middle">cos</text>
    <text x="55" y="1020" fill="#333" class="label" text-anchor="middle">sin</text>
    <text x="105" y="990" fill="#333" class="label" text-anchor="middle">0°</text>
    <text x="105" y="1005" fill="#333" class="label" text-anchor="middle">1</text>
    <text x="105" y="1020" fill="#333" class="label" text-anchor="middle">0</text>
    
    <rect x="175" y="970" width="120" height="60" fill="#e3f2fd" rx="5"/>
    <text x="185" y="990" fill="#333" class="label" text-anchor="middle">90°</text>
    <text x="185" y="1005" fill="#333" class="label" text-anchor="middle">0</text>
    <text x="185" y="1020" fill="#333" class="label" text-anchor="middle">1</text>
    
    <rect x="305" y="970" width="120" height="60" fill="#e3f2fd" rx="5"/>
    <text x="315" y="990" fill="#333" class="label" text-anchor="middle">180°</text>
    <text x="315" y="1005" fill="#333" class="label" text-anchor="middle">-1</text>
    <text x="315" y="1020" fill="#333" class="label" text-anchor="middle">0</text>
    
    <rect x="435" y="970" width="120" height="60" fill="#e3f2fd" rx="5"/>
    <text x="445" y="990" fill="#333" class="label" text-anchor="middle">270°</text>
    <text x="445" y="1005" fill="#333" class="label" text-anchor="middle">0</text>
    <text x="445" y="1020" fill="#333" class="label" text-anchor="middle">-1</text>
    
    <rect x="565" y="970" width="120" height="60" fill="#e3f2fd" rx="5"/>
    <text x="575" y="990" fill="#333" class="label" text-anchor="middle">45°</text>
    <text x="575" y="1005" fill="#333" class="label" text-anchor="middle">0.707</text>
    <text x="575" y="1020" fill="#333" class="label" text-anchor="middle">0.707</text>
    
    <rect x="695" y="970" width="75" height="60" fill="#e3f2fd" rx="5"/>
    <text x="705" y="990" fill="#333" class="label" text-anchor="middle">30°</text>
    <text x="705" y="1005" fill="#333" class="label" text-anchor="middle">0.866</text>
    <text x="705" y="1020" fill="#333" class="label" text-anchor="middle">0.5</text>
  </g>
  
  <!-- STEP 10: Implementation in Code -->
  <g class="step" id="step10" data-narration="Here's how to implement rotation in programming with a simple function that applies the rotation formula.">
    <rect x="20" y="1050" width="760" height="110" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="1050" width="8" height="110" fill="#388e3c" rx="4"/>
    <text x="45" y="1075" fill="#388e3c" class="title">Implementation in Code</text>
    <text x="45" y="1100" fill="#333" class="body" font-family="Courier New, monospace">def rotate_point(x, y, angle_deg):</text>
    <text x="65" y="1120" fill="#333" class="body" font-family="Courier New, monospace">angle_rad = math.radians(angle_deg)</text>
    <text x="65" y="1140" fill="#333" class="body" font-family="Courier New, monospace">x_new = x * cos(angle_rad) - y * sin(angle_rad)</text>
    <text x="65" y="1160" fill="#333" class="body" font-family="Courier New, monospace">y_new = x * sin(angle_rad) + y * cos(angle_rad)</text>
    <text x="65" y="1180" fill="#333" class="body" font-family="Courier New, monospace">return (x_new, y_new)</text>
  </g>
  
  <!-- STEP 11: Applications -->
  <g class="step" id="step11" data-narration="Rotation has many applications in computer graphics including animation, game development, and computer-aided design.">
    <rect x="20" y="1170" width="760" height="110" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="1170" width="8" height="110" fill="#9c27b0" rx="4"/>
    <text x="45" y="1195" fill="#9c27b0" class="title">Applications of Rotation</text>
    <rect x="45" y="1210" width="170" height="60" fill="#f3e5f5" rx="5"/>
    <text x="130" y="1235" fill="#7b1fa2" class="body" text-anchor="middle">Animation</text>
    <text x="130" y="1255" fill="#666" class="label" text-anchor="middle">Game sprites, transitions</text>
    
    <rect x="230" y="1210" width="170" height="60" fill="#e8f5e9" rx="5"/>
    <text x="315" y="1235" fill="#388e3c" class="body" text-anchor="middle">CAD Software</text>
    <text x="315" y="1255" fill="#666" class="label" text-anchor="middle">Object manipulation</text>
    
    <rect x="415" y="1210" width="170" height="60" fill="#fff3e0" rx="5"/>
    <text x="500" y="1235" fill="#f57c00" class="body" text-anchor="middle">Robotics</text>
    <text x="500" y="1255" fill="#666" class="label" text-anchor="middle">Joint rotations</text>
    
    <rect x="600" y="1210" width="170" height="60" fill="#e3f2fd" rx="5"/>
    <text x="685" y="1235" fill="#1976d2" class="body" text-anchor="middle">Image Processing</text>
    <text x="685" y="1255" fill="#666" class="label" text-anchor="middle">Image orientation</text>
  </g>
  
  <!-- STEP 12: Summary -->
  <g class="step" id="step12" data-narration="To summarize: rotation transforms points using trigonometry, preserves shape, and uses positive angles for counter-clockwise direction.">
    <rect x="20" y="1290" width="760" height="120" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="1290" width="8" height="120" fill="#1976d2" rx="4"/>
    <text x="45" y="1315" fill="#1976d2" class="title">Summary: Key Points to Remember</text>
    <text x="60" y="1345" fill="#333" class="body">• Rotation is a rigid transformation that preserves shape and size</text>
    <text x="60" y="1365" fill="#333" class="body">• CCW rotation uses positive angles, CW uses negative angles</text>
    <text x="60" y="1385" fill="#333" class="body">• Formula: x' = x·cosθ - y·sinθ, y' = x·sinθ + y·cosθ</text>
    <text x="60" y="1405" fill="#333" class="body">• Rotation about arbitrary point requires translation first</text>
    <text x="60" y="1425" fill="#333" class="body">• Common angles (90°, 180°, 270°) have simple integer results</text>
  </g>
  
  <!-- STEP 13: Practice Problem -->
  <g class="step" id="step13" data-narration="Practice problem: rotate point (3, 4) by 90 degrees counter-clockwise. The answer is (-4, 3).">
    <rect x="20" y="1420" width="760" height="120" fill="white" rx="10" filter="url(#shadow)"/>
    <rect x="20" y="1420" width="8" height="120" fill="#ff9800" rx="4"/>
    <text x="45" y="1445" fill="#ff9800" class="title">Practice Problem</text>
    <text x="45" y="1475" fill="#333" class="body">Rotate point P(3, 4) by 90° counter-clockwise about the origin.</text>
    <text x="45" y="1500" fill="#333" class="body">Solution:</text>
    <text x="65" y="1525" fill="#333" class="body">x' = 3×cos(90°) - 4×sin(90°) = 3×0 - 4×1 = -4</text>
    <text x="65" y="1545" fill="#333" class="body">y' = 3×sin(90°) + 4×cos(90°) = 3×1 + 4×0 = 3</text>
    <text x="400" y="1520" fill="#388e3c" class="title">Answer: P'(-4, 3)</text>
  </g>
</svg>