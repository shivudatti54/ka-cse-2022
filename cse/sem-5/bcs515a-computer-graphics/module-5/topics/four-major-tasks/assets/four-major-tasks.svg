<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Operating System performs four essential functions: Process Management, Memory Management, File Management, and I/O Management for efficient computer operation.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Four Major Tasks of an OS</text>
  </g>
  
  <g class="step" id="step1" data-narration="Process Management handles creating, scheduling, and terminating processes using the Process Control Block (PCB) data structure and various schedulers for CPU coordination.">
    <rect x="20" y="58" width="760" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. Process Management</text>
    <rect x="40" y="88" width="170" height="60" rx="4" fill="white" stroke="#1976d2"/>
    <text x="50" y="102" font-family="Arial" font-size="9" fill="#333">Process Control Block</text>
    <text x="50" y="116" font-family="Arial" font-size="8" fill="#666">PID, State, PC, Registers</text>
    <rect x="220" y="88" width="170" height="60" rx="4" fill="white" stroke="#1976d2"/>
    <text x="230" y="102" font-family="Arial" font-size="9" fill="#333">Process States</text>
    <text x="230" y="116" font-family="Arial" font-size="8" fill="#666">New, Ready, Running</text>
    <text x="230" y="130" font-family="Arial" font-size="8" fill="#666">Waiting, Terminated</text>
    <rect x="400" y="88" width="170" height="60" rx="4" fill="white" stroke="#1976d2"/>
    <text x="410" y="102" font-family="Arial" font-size="9" fill="#333">Schedulers</text>
    <text x="410" y="116" font-family="Arial" font-size="8" fill="#666">Long, Short, Medium-term</text>
    <rect x="580" y="88" width="180" height="60" rx="4" fill="white" stroke="#1976d2"/>
    <text x="590" y="102" font-family="Arial" font-size="9" fill="#333">IPC Mechanisms</text>
    <text x="590" y="116" font-family="Arial" font-size="8" fill="#666">Shared Memory, Message</text>
    <text x="590" y="130" font-family="Arial" font-size="8" fill="#666">Passing, Pipes, Semaphores</text>
  </g>
  
  <g class="step" id="step2" data-narration="Memory Management allocates RAM to processes using paging, segmentation, and virtual memory techniques for efficient memory resource utilization in the system.">
    <rect x="20" y="166" width="760" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="186" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">2. Memory Management</text>
    <rect x="40" y="196" width="170" height="60" rx="4" fill="white" stroke="#388e3c"/>
    <text x="50" y="210" font-family="Arial" font-size="9" fill="#333">Allocation Methods</text>
    <text x="50" y="224" font-family="Arial" font-size="8" fill="#666">Contiguous, Paging</text>
    <text x="50" y="238" font-family="Arial" font-size="8" fill="#666">Segmentation</text>
    <rect x="220" y="196" width="170" height="60" rx="4" fill="white" stroke="#388e3c"/>
    <text x="230" y="210" font-family="Arial" font-size="9" fill="#333">Virtual Memory</text>
    <text x="230" y="224" font-family="Arial" font-size="8" fill="#666">Demand Paging, Pages</text>
    <text x="230" y="238" font-family="Arial" font-size="8" fill="#666">Frames, Page Faults</text>
    <rect x="400" y="196" width="170" height="60" rx="4" fill="white" stroke="#388e3c"/>
    <text x="410" y="210" font-family="Arial" font-size="9" fill="#333">Page Replacement</text>
    <text x="410" y="224" font-family="Arial" font-size="8" fill="#666">FIFO, LRU, Optimal</text>
    <text x="410" y="238" font-family="Arial" font-size="8" fill="#666">Clock Algorithms</text>
    <rect x="580" y="196" width="180" height="60" rx="4" fill="white" stroke="#388e3c"/>
    <text x="590" y="210" font-family="Arial" font-size="9" fill="#333">Address Translation</text>
    <text x="590" y="224" font-family="Arial" font-size="8" fill="#666">Physical = (Frame ×</text>
    <text x="590" y="238" font-family="Arial" font-size="8" fill="#666">Page Size) + Offset</text>
  </g>
  
  <g class="step" id="step3" data-narration="File Management organizes data on secondary storage using file systems with allocation methods like contiguous, linked, and indexed for efficient data access.">
    <rect x="20" y="274" width="760" height="100" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="294" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">3. File Management</text>
    <rect x="40" y="304" width="170" height="60" rx="4" fill="white" stroke="#ff9800"/>
    <text x="50" y="318" font-family="Arial" font-size="9" fill="#333">File System Structure</text>
    <text x="50" y="332" font-family="Arial" font-size="8" fill="#666">Boot Block, Superblock</text>
    <text x="50" y="346" font-family="Arial" font-size="8" fill="#666">Inode Table, Data Blocks</text>
    <rect x="220" y="304" width="170" height="60" rx="4" fill="white" stroke="#ff9800"/>
    <text x="230" y="318" font-family="Arial" font-size="9" fill="#333">Allocation Methods</text>
    <text x="230" y="332" font-family="Arial" font-size="8" fill="#666">Contiguous (fast)</text>
    <text x="230" y="346" font-family="Arial" font-size="8" fill="#666">Linked, Indexed</text>
    <rect x="400" y="304" width="170" height="60" rx="4" fill="white" stroke="#ff9800"/>
    <text x="410" y="318" font-family="Arial" font-size="9" fill="#333">Directory Implementation</text>
    <text x="410" y="332" font-family="Arial" font-size="8" fill="#666">Single, Two-level</text>
    <text x="410" y="346" font-family="Arial" font-size="8" fill="#666">Tree, Hash-based</text>
    <rect x="580" y="304" width="180" height="60" rx="4" fill="white" stroke="#ff9800"/>
    <text x="590" y="318" font-family="Arial" font-size="9" fill="#333">File Operations</text>
    <text x="590" y="332" font-family="Arial" font-size="8" fill="#666">Create, Open, Read</text>
    <text x="590" y="346" font-family="Arial" font-size="8" fill="#666">Write, Close, Delete</text>
  </g>
  
  <g class="step" id="step4" data-narration="I/O Management handles communication between CPU and peripheral devices using device drivers, buffering, caching, and spooling for optimized input output operations.">
    <rect x="20" y="382" width="760" height="100" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="402" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">4. I/O Management</text>
    <rect x="40" y="412" width="170" height="60" rx="4" fill="white" stroke="#9c27b0"/>
    <text x="50" y="426" font-family="Arial" font-size="9" fill="#333">Device Classification</text>
    <text x="50" y="440" font-family="Arial" font-size="8" fill="#666">Block (HDD, CD-ROM)</text>
    <text x="50" y="454" font-family="Arial" font-size="8" fill="#666">Char, Network Devices</text>
    <rect x="220" y="412" width="170" height="60" rx="4" fill="white" stroke="#9c27b0"/>
    <text x="230" y="426" font-family="Arial" font-size="9" fill="#333">I/O Scheduling</text>
    <text x="230" y="440" font-family="Arial" font-size="8" fill="#666">FCFS, SSTF</text>
    <text x="230" y="454" font-family="Arial" font-size="8" fill="#666">SCAN, C-SCAN</text>
    <rect x="400" y="412" width="170" height="60" rx="4" fill="white" stroke="#9c27b0"/>
    <text x="410" y="426" font-family="Arial" font-size="9" fill="#333">Device Drivers</text>
    <text x="410" y="440" font-family="Arial" font-size="8" fill="#666">Kernel Modules</text>
    <text x="410" y="454" font-family="Arial" font-size="8" fill="#666">OS-Hardware Interface</text>
    <rect x="580" y="412" width="180" height="60" rx="4" fill="white" stroke="#9c27b0"/>
    <text x="590" y="426" font-family="Arial" font-size="9" fill="#333">Optimization Techniques</text>
    <text x="590" y="440" font-family="Arial" font-size="8" fill="#666">Buffering, Caching</text>
    <text x="590" y="454" font-family="Arial" font-size="8" fill="#666">Spooling</text>
  </g>
  
  <g class="step" id="step5" data-narration="These four tasks work together: Process Management coordinates CPU, Memory Management handles RAM, File Management controls storage, and I/O manages peripherals efficiently.">
    <rect x="20" y="490" width="760" height="100" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="510" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Integration Summary</text>
    <rect x="40" y="520" width="150" height="60" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="50" y="535" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Process Mgmt</text>
    <text x="50" y="550" font-family="Arial" font-size="8" fill="#333">CPU Coordination</text>
    <text x="50" y="565" font-family="Arial" font-size="7" fill="#666">PCB, Scheduling</text>
    <path d="M200 550 L240 550" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="250" y="520" width="150" height="60" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="260" y="535" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Memory Mgmt</text>
    <text x="260" y="550" font-family="Arial" font-size="8" fill="#333">RAM Allocation</text>
    <text x="260" y="565" font-family="Arial" font-size="7" fill="#666">Paging, Virtual Memory</text>
    <path d="M410 550 L450 550" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="460" y="520" width="150" height="60" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="470" y="535" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">File Mgmt</text>
    <text x="470" y="550" font-family="Arial" font-size="8" fill="#333">Storage Organization</text>
    <text x="470" y="565" font-family="Arial" font-size="7" fill="#666">File System</text>
    <path d="M620 550 L660 550" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="670" y="520" width="100" height="60" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="680" y="535" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">I/O Mgmt</text>
    <text x="680" y="550" font-family="Arial" font-size="8" fill="#333">Peripherals</text>
    <text x="680" y="565" font-family="Arial" font-size="7" fill="#666">Drivers</text>
  </g>
</svg>