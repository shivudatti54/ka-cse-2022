<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Cohen-Sutherland Line Clipping Algorithm efficiently determines which portions of a line segment are visible within a rectangular clipping window using outcodes.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Cohen-Sutherland Line Clipping</text>
  </g>
  
  <g class="step" id="step1" data-narration="The 4-bit outcode divides the plane into 9 regions using boundary checks: Top=1000, Bottom=0100, Right=0010, Left=0001. Inside window is 0000.">
    <rect x="20" y="58" width="760" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Outcode (Region Code)</text>
    <rect x="40" y="95" width="100" height="35" rx="4" fill="#1976d2"/>
    <text x="90" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Top 1000</text>
    <rect x="150" y="95" width="100" height="35" rx="4" fill="#1976d2"/>
    <text x="200" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Bottom 0100</text>
    <rect x="260" y="95" width="100" height="35" rx="4" fill="#1976d2"/>
    <text x="310" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Right 0010</text>
    <rect x="370" y="95" width="100" height="35" rx="4" fill="#1976d2"/>
    <text x="420" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Left 0001</text>
    <rect x="480" y="95" width="100" height="35" rx="4" fill="#388e3c"/>
    <text x="530" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Inside 0000</text>
    <text x="640" y="110" font-family="Arial" font-size="10" fill="#666">y&gt;ymax | y&lt;ymin | x&gt;xmax | x&lt;xmin</text>
  </g>
  
  <g class="step" id="step2" data-narration="Step 1: Compute outcodes for both endpoints. Step 2: If both 0000, accept. Step 3: If AND non-zero, reject. Else clip and repeat.">
    <rect x="20" y="151" width="760" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="173" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Algorithm Steps</text>
    <rect x="40" y="190" width="160" height="35" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="120" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">1. Compute Outcodes</text>
    <rect x="210" y="190" width="160" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="290" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">2. Both 0000? Accept</text>
    <rect x="380" y="190" width="160" height="35" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="460" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">3. AND ≠ 0? Reject</text>
    <rect x="550" y="190" width="160" height="35" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="630" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">4. Else Clip &amp; Repeat</text>
    <text x="40" y="235" font-family="Arial" font-size="9" fill="#666">Clipping: Find intersection with boundary, replace endpoint, recompute outcode</text>
  </g>
  
  <g class="step" id="step3" data-narration="This example shows a line from P1(200,200) to P2(400,300) inside the rectangular clipping window defined by xmin=100,xmax=500,ymin=100,ymax=400. Both outcodes are 0000 - ACCEPT.">
    <rect x="20" y="244" width="760" height="95" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="266" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Example 1: Completely Inside</text>
    <rect x="40" y="285" width="200" height="30" rx="4" fill="#388e3c"/>
    <text x="140" y="303" text-anchor="middle" font-family="Arial" font-size="11" fill="white">P1(200,200) = 0000</text>
    <rect x="260" y="285" width="200" height="30" rx="4" fill="#388e3c"/>
    <text x="360" y="303" text-anchor="middle" font-family="Arial" font-size="11" fill="white">P2(400,300) = 0000</text>
    <rect x="480" y="285" width="100" height="30" rx="4" fill="#388e3c"/>
    <text x="530" y="303" text-anchor="middle" font-family="Arial" font-size="11" fill="white">ACCEPT</text>
    <text x="40" y="330" font-family="Arial" font-size="9" fill="#666">Window: xmin=100, xmax=500, ymin=100, ymax=400</text>
    <line x1="620" y1="295" x2="720" y2="295" stroke="#1976d2" stroke-width="2"/>
    <text x="670" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Visible</text>
  </g>
  
  <g class="step" id="step4" data-narration="This example shows line from P1(50,200) to P2(80,300) completely outside the clipping window on the left side. Both endpoints have outcode 0001 indicating Left region. AND = 0001 ≠ 0 - REJECT.">
    <rect x="20" y="347" width="760" height="95" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="369" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Example 2: Completely Outside</text>
    <rect x="40" y="388" width="200" height="30" rx="4" fill="#f44336"/>
    <text x="140" y="406" text-anchor="middle" font-family="Arial" font-size="11" fill="white">P1(50,200) = 0001</text>
    <rect x="260" y="388" width="200" height="30" rx="4" fill="#f44336"/>
    <text x="360" y="406" text-anchor="middle" font-family="Arial" font-size="11" fill="white">P2(80,300) = 0001</text>
    <rect x="480" y="388" width="100" height="30" rx="4" fill="#f44336"/>
    <text x="530" y="406" text-anchor="middle" font-family="Arial" font-size="11" fill="white">REJECT</text>
    <text x="40" y="433" font-family="Arial" font-size="9" fill="#666">AND = 0001 AND 0001 = 0001 ≠ 0 → Both share Left region → Line outside</text>
    <line x1="620" y1="398" x2="720" y2="428" stroke="#f44336" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="670" y="448" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Clipped</text>
  </g>
  
  <g class="step" id="step5" data-narration="Complex example with line from P1(50,50) to P2(600,450) crossing multiple window boundaries. P1=0101, P2=1010, AND=0000 so clipping is required. Iterate until both endpoints have outcode 0000.">
    <rect x="20" y="450" width="760" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="472" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Example 3: Requires Clipping</text>
    <rect x="40" y="491" width="150" height="30" rx="4" fill="#9c27b0"/>
    <text x="115" y="509" text-anchor="middle" font-family="Arial" font-size="10" fill="white">P1(50,50) = 0101</text>
    <rect x="200" y="491" width="150" height="30" rx="4" fill="#9c27b0"/>
    <text x="275" y="509" text-anchor="middle" font-family="Arial" font-size="10" fill="white">P2(600,450) = 1010</text>
    <rect x="360" y="491" width="80" height="30" rx="4" fill="#ff9800"/>
    <text x="400" y="509" text-anchor="middle" font-family="Arial" font-size="10" fill="white">AND=0000</text>
    <rect x="450" y="491" width="180" height="30" rx="4" fill="#ff9800"/>
    <text x="540" y="509" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Clip: P1'(100,86) P2'(500,377)</text>
    <text x="40" y="535" font-family="Arial" font-size="9" fill="#666">Iteration 1: P1 clips at Left and Bottom boundaries. Iteration 2: P2 clips at Right and Top boundaries.</text>
  </g>
  
  <g class="step" id="step6" data-narration="Remember these exam tips: Top=8, Bottom=4, Right=2, Left=1 for bit values. The AND test quickly rejects lines. Both outcodes 0000 means inside. Maximum of 4 clipping iterations required for any line.">
    <rect x="20" y="543" width="760" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="565" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Exam Tips</text>
    <text x="40" y="582" font-family="Arial" font-size="10" fill="#666">Memory: T=8, B=4, R=2, L=1 | AND≠0=Reject | Both 0000=Accept | Max 4 iterations | P = P1 + t(P2-P1)</text>
    <text x="700" y="582" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Good Luck!</text>
  </g>
</svg>