<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Line drawing algorithms convert continuous mathematical lines into discrete pixel representations on a raster display grid for computer graphics rendering and visual display systems.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Line Drawing Algorithms</text>
  </g>
  
  <g class="step" id="step1" data-narration="A raster scan display has a grid of pixels. We select which pixels to illuminate to represent a line between two endpoints on this discrete grid.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Raster Scan Display &amp; Pixel Grid</text>
    <rect x="40" y="95" width="100" height="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="90" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">(x₁,y₁)</text>
    <line x1="70" y1="115" x2="160" y2="115" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="160" cy="115" r="3" fill="#1976d2"/>
    <text x="170" y="118" font-family="Arial" font-size="9" fill="#666">Mathematical Line</text>
    <text x="240" y="95" font-family="Arial" font-size="10" fill="#666">Pixel Grid: discrete picture elements arranged</text>
    <text x="240" y="110" font-family="Arial" font-size="10" fill="#666">in rows and columns. Each pixel can be</text>
    <text x="240" y="125" font-family="Arial" font-size="10" fill="#666">illuminated to represent line segments.</text>
  </g>
  
  <g class="step" id="step2" data-narration="The DDA algorithm calculates step sizes from delta values and increments coordinates, rounding to integers. It uses floating-point arithmetic making it computationally expensive.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. DDA Algorithm</text>
    <text x="40" y="190" font-family="Arial" font-size="10" fill="#666">Steps = max(|Δx|,|Δy|)</text>
    <text x="40" y="205" font-family="Arial" font-size="10" fill="#666">x_increment = Δx / steps</text>
    <text x="40" y="220" font-family="Arial" font-size="10" fill="#666">y_increment = Δy / steps</text>
    <rect x="180" y="168" width="200" height="50" fill="#e8f5e9" rx="3"/>
    <text x="280" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Example: (2,3) to (10,7)</text>
    <text x="280" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Δx=8, Δy=4, steps=8</text>
    <text x="280" y="213" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Pixels: (2,3),(3,4),(4,4),(5,5)...</text>
    <text x="400" y="185" font-family="Arial" font-size="10" fill="#f44336">Drawback: Uses floating-point</text>
    <text x="400" y="200" font-family="Arial" font-size="10" fill="#f44336">arithmetic, rounding errors,</text>
    <text x="400" y="215" font-family="Arial" font-size="10" fill="#f44336">slower performance.</text>
  </g>
  
  <g class="step" id="step3" data-narration="Bresenham's algorithm uses only integer arithmetic by analyzing a decision parameter to choose between pixels. It is the industry standard for line drawing.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Bresenham's Line Algorithm</text>
    <text x="40" y="278" font-family="Arial" font-size="10" fill="#666">P₀ = 2Δy - Δx (shallow) or P₀ = 2Δx - Δy (steep)</text>
    <text x="40" y="295" font-family="Arial" font-size="10" fill="#666">If Pᵢ ≥ 0: choose upper pixel, Pᵢ₊₁ = Pᵢ + 2Δy - 2Δx</text>
    <text x="40" y="312" font-family="Arial" font-size="10" fill="#666">If Pᵢ &lt; 0: choose lower pixel, Pᵢ₊₁ = Pᵢ + 2Δy</text>
    <rect x="320" y="248" width="180" height="55" fill="#fff3e0" rx="3"/>
    <text x="410" y="265" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Example: (2,2) to (8,5)</text>
    <text x="410" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">dx=6, dy=3, P₀=0</text>
    <text x="410" y="297" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Pixels: (2,2),(3,3),(4,3),(5,4)...</text>
    <text x="520" y="260" font-family="Arial" font-size="10" fill="#388e3c">✓ Only integer arithmetic</text>
    <text x="520" y="275" font-family="Arial" font-size="10" fill="#388e3c">✓ No rounding errors</text>
    <text x="520" y="290" font-family="Arial" font-size="10" fill="#388e3c">✓ Computationally efficient</text>
  </g>
  
  <g class="step" id="step4" data-narration="The midpoint line algorithm determines which pixel to choose by checking which side of the midpoint the ideal line passes through, using integer arithmetic.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Midpoint Line Algorithm</text>
    <text x="40" y="366" font-family="Arial" font-size="10" fill="#666">Considers region between two adjacent candidate pixels.</text>
    <text x="40" y="383" font-family="Arial" font-size="10" fill="#666">Determines which side of the midpoint the ideal line passes through.</text>
    <text x="40" y="400" font-family="Arial" font-size="10" fill="#666">Uses decision variable updated through integer arithmetic.</text>
    <rect x="280" y="335" width="160" height="55" fill="#f3e5f5" rx="3"/>
    <text x="360" y="352" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Geometric Interpretation</text>
    <text x="360" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Midpoint between candidate</text>
    <text x="360" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">pixels determines selection.</text>
    <text x="460" y="352" font-family="Arial" font-size="10" fill="#666">Similar performance to</text>
    <text x="460" y="367" font-family="Arial" font-size="10" fill="#666">Bresenham. Provides</text>
    <text x="460" y="382" font-family="Arial" font-size="10" fill="#666">alternative geometric view.</text>
  </g>
  
  <g class="step" id="step5" data-narration="Bresenham's algorithm is preferred in practice because it uses only integer arithmetic. DDA uses floating-point while Midpoint offers geometric perspective.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">5. Algorithm Comparison</text>
    <rect x="40" y="450" width="160" height="30" fill="#ffebee" rx="3"/>
    <text x="120" y="470" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">DDA</text>
    <rect x="210" y="450" width="160" height="30" fill="#e8f5e9" rx="3"/>
    <text x="290" y="470" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Bresenham</text>
    <rect x="380" y="450" width="160" height="30" fill="#f3e5f5" rx="3"/>
    <text x="460" y="470" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Midpoint</text>
    <text x="580" y="460" font-family="Arial" font-size="10" fill="#666">Best: Bresenham</text>
    <text x="580" y="478" font-family="Arial" font-size="10" fill="#666">Integer-only,</text>
    <text x="580" y="486" font-family="Arial" font-size="10" fill="#666">efficient.</text>
  </g>
  
  <g class="step" id="step6" data-narration="For steep lines where delta y exceeds delta x, swap axes and use P₀ equals 2Δx minus Δy. Practice numerical examples for exams.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">6. Handling Steep Lines &amp; Exam Tips</text>
    <text x="40" y="542" font-family="Arial" font-size="10" fill="#666">Steep lines: |Δy| &gt; |Δx|, swap roles. Increment y by 1, decide x.</text>
    <text x="40" y="560" font-family="Arial" font-size="10" fill="#666">P₀ = 2Δx - Δy (steep). If Pᵢ ≥ 0: Pᵢ₊₁ = Pᵢ + 2Δx - 2Δy else Pᵢ₊₁ = Pᵢ + 2Δx</text>
    <rect x="350" y="525" width="200" height="55" fill="#e3f2fd" rx="3"/>
    <text x="450" y="542" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Exam Tips</text>
    <text x="450" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Memorize: P₀ = 2Δy - Δx (shallow)</text>
    <text x="450" y="575" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">P₀ = 2Δx - Δy (steep)</text>
    <text x="560" y="540" font-family="Arial" font-size="10" fill="#388e3c">✓ Practice examples</text>
    <text x="560" y="558" font-family="Arial" font-size="10" fill="#388e3c">✓ Integer-only is</text>
    <text x="560" y="576" font-family="Arial" font-size="10" fill="#388e3c">Bresenham's advantage</text>
  </g>
</svg>