<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This chapter covers fundamental implementation strategies for algorithms including iterative and recursive approaches, array and linked data structures with practical examples and time-space analysis.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Basic Implementation Strategies</text>
  </g>
  
  <g class="step" id="step1" data-narration="Iterative approaches use loops for execution with O(1) space complexity. Recursive approaches break problems into smaller subproblems and use the call stack, requiring O(n) space.">
    <rect x="20" y="58" width="760" height="82" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Iterative vs Recursive Approaches</text>
    <rect x="40" y="88" width="340" height="42" fill="#ffffff" rx="3" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#333">Iterative: Loops (for/while)</text>
    <text x="50" y="116" font-family="Arial" font-size="9" fill="#666">• O(1) space complexity</text>
    <text x="50" y="126" font-family="Arial" font-size="9" fill="#666">• Linear execution flow</text>
    <rect x="400" y="88" width="340" height="42" fill="#ffffff" rx="3" stroke="#9c27b0" stroke-width="1"/>
    <text x="410" y="102" font-family="Arial" font-size="10" fill="#9c27b0">Recursive: Self-calls</text>
    <text x="410" y="116" font-family="Arial" font-size="9" fill="#666">• O(n) space (call stack)</text>
    <text x="410" y="126" font-family="Arial" font-size="9" fill="#666">• Base case terminates recursion</text>
  </g>
  
  <g class="step" id="step2" data-narration="Arrays provide contiguous memory locations with O(1) random access by index. They are cache-friendly due to locality but have fixed size limitations and expensive insertions at arbitrary positions.">
    <rect x="20" y="148" width="760" height="82" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Array-Based Implementation</text>
    <rect x="40" y="178" width="340" height="42" fill="#ffffff" rx="3" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="192" font-family="Arial" font-size="10" fill="#333">Advantages</text>
    <text x="50" y="206" font-family="Arial" font-size="9" fill="#666">• O(1) random access by index</text>
    <text x="50" y="216" font-family="Arial" font-size="9" fill="#666">• Cache-friendly contiguous memory</text>
    <rect x="400" y="178" width="340" height="42" fill="#ffffff" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="410" y="192" font-family="Arial" font-size="10" fill="#f44336">Disadvantages</text>
    <text x="410" y="206" font-family="Arial" font-size="9" fill="#666">• Fixed size (requires reallocation)</text>
    <text x="410" y="216" font-family="Arial" font-size="9" fill="#666">• O(n) insert/delete at arbitrary positions</text>
  </g>
  
  <g class="step" id="step3" data-narration="Linked structures use nodes connected by pointers, enabling dynamic size allocation and O(1) insertions at known positions. However, sequential access requires O(n) time and extra memory is needed for pointers.">
    <rect x="20" y="238" width="760" height="82" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="258" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Linked Implementation</text>
    <rect x="40" y="268" width="340" height="42" fill="#ffffff" rx="3" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="282" font-family="Arial" font-size="10" fill="#333">Advantages</text>
    <text x="50" y="296" font-family="Arial" font-size="9" fill="#666">• Dynamic size allocation</text>
    <text x="50" y="306" font-family="Arial" font-size="9" fill="#666">• O(1) insert/delete at known position</text>
    <rect x="400" y="268" width="340" height="42" fill="#ffffff" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="410" y="282" font-family="Arial" font-size="10" fill="#f44336">Disadvantages</text>
    <text x="410" y="296" font-family="Arial" font-size="9" fill="#666">• O(n) search time</text>
    <text x="410" y="306" font-family="Arial" font-size="9" fill="#666">• Extra memory for pointers</text>
  </g>
  
  <g class="step" id="step4" data-narration="Choose iterative when memory is constrained or iteration count is known. Use recursion for tree and graph problems. Arrays suit frequent random access; linked structures suit frequent modifications.">
    <rect x="20" y="328" width="760" height="82" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="348" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">When to Use Which Strategy</text>
    <rect x="40" y="358" width="230" height="42" fill="#ffffff" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="372" font-family="Arial" font-size="9" fill="#333">Iterative: Memory-constrained,</text>
    <text x="50" y="386" font-family="Arial" font-size="9" fill="#333">known iteration count</text>
    <rect x="280" y="358" width="230" height="42" fill="#ffffff" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="290" y="372" font-family="Arial" font-size="9" fill="#333">Recursive: Trees, graphs,</text>
    <text x="290" y="386" font-family="Arial" font-size="9" fill="#333">divide-and-conquer problems</text>
    <rect x="520" y="358" width="240" height="42" fill="#ffffff" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="530" y="372" font-family="Arial" font-size="9" fill="#333">Arrays: Frequent random access.</text>
    <text x="530" y="386" font-family="Arial" font-size="9" fill="#333">Linked: Frequent modifications</text>
  </g>
  
  <g class="step" id="step5" data-narration="Binary search achieves O(log n) time using divide-and-conquer by repeatedly halving the search space. Always use left plus right minus left divided by two to prevent integer overflow issues in implementations.">
    <rect x="20" y="418" width="760" height="82" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="438" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example: Binary Search & Exam Tips</text>
    <rect x="40" y="448" width="350" height="42" fill="#ffffff" rx="3" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="462" font-family="Arial" font-size="9" fill="#333">while(left&lt;=right){mid=left+(right-left)/2;</text>
    <text x="50" y="476" font-family="Arial" font-size="9" fill="#333">if found return mid; else adjust left/right}</text>
    <text x="50" y="490" font-family="Arial" font-size="9" fill="#388e3c">Time: O(log n), Space: O(1)</text>
    <rect x="400" y="448" width="350" height="42" fill="#ffffff" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="410" y="462" font-family="Arial" font-size="9" fill="#333">Key Tips:</text>
    <text x="410" y="476" font-family="Arial" font-size="9" fill="#333">• Define reachable base case in recursion</text>
    <text x="410" y="490" font-family="Arial" font-size="9" fill="#333">• Use left+(right-left)/2 to prevent overflow</text>
  </g>
  
  <g class="step" id="step6" data-narration="Factorial iterative uses a loop with O(n) time and O(1) space. The recursive version has O(n) time complexity but requires O(n) space due to the call stack overhead and can cause stack overflow for large n.">
    <rect x="20" y="508" width="760" height="82" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example: Factorial Calculation</text>
    <rect x="40" y="538" width="350" height="42" fill="#ffffff" rx="3" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="552" font-family="Arial" font-size="9" fill="#333">Iterative: result=1; for(i=2;i&lt;=n;i++)result*=i;</text>
    <text x="50" y="566" font-family="Arial" font-size="9" fill="#388e3c">Time: O(n), Space: O(1)</text>
    <text x="50" y="580" font-family="Arial" font-size="9" fill="#388e3c">Prefer iterative for large n</text>
    <rect x="400" y="538" width="350" height="42" fill="#ffffff" rx="3" stroke="#9c27b0" stroke-width="1"/>
    <text x="410" y="552" font-family="Arial" font-size="9" fill="#333">Recursive: f(n)=n*f(n-1), base f(1)=1</text>
    <text x="410" y="566" font-family="Arial" font-size="9" fill="#9c27b0">Time: O(n), Space: O(n)</text>
    <text x="410" y="580" font-family="Arial" font-size="9" fill="#f44336">Avoid for large n (stack overflow)</text>
  </g>
</svg>