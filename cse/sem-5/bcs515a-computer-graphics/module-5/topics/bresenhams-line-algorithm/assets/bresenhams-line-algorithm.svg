<svg viewBox="0 0 800 1150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; font-weight: bold; }
    .title { font-size: 22px; font-weight: bold; }
    .subtitle { font-size: 14px; }
    .body { font-size: 10px; }
    .label { font-size: 8px; }
  </style>
  
  <rect width="800" height="1150" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0">
    <rect x="0" y="0" width="800" height="55" fill="url(#blueGrad)"/>
    <text x="400" y="35" text-anchor="middle" class="title" fill="#1565c0">Bresenham's Line Algorithm</text>
    <text x="400" y="48" text-anchor="middle" class="subtitle" fill="#1976d2">Efficient Raster Line Drawing in Computer Graphics</text>
  </g>
  
  <!-- Step 1: Raster Graphics Problem -->
  <g class="step" id="step1" data-narration="Raster displays have discrete pixels in a grid. Mathematical lines are continuous, so we must determine which pixels to illuminate.">
    <rect x="20" y="65" width="760" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="85" class="subtitle" font-weight="bold" fill="#1565c0">The Raster Graphics Problem</text>
    <text x="40" y="105" class="body" fill="#333">Display devices consist of discrete pixels arranged in a grid.</text>
    <text x="40" y="120" class="body" fill="#333">Mathematical lines are continuous, but we must choose</text>
    <text x="40" y="135" class="body" fill="#333">which specific pixels best approximate the ideal line.</text>
    <!-- Simple pixel grid visualization -->
    <g transform="translate(520, 75)">
      <rect x="0" y="0" width="50" height="50" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#1976d2" stroke-width="2" stroke-dasharray="50" opacity="0.3">
        <animate attributeName="stroke-dashoffset" from="50" to="0" dur="1s" fill="freeze"/>
      </line>
      <rect x="5" y="5" width="8" height="8" fill="#1976d2" opacity="0.6"/>
      <rect x="18" y="18" width="8" height="8" fill="#1976d2" opacity="0.8"/>
      <rect x="31" y="31" width="8" height="8" fill="#1976d2"/>
    </g>
  </g>
  
  <!-- Step 2: Why Bresenham's Matters -->
  <g class="step" id="step2" data-narration="Bresenham's algorithm uses only integer arithmetic, avoiding slow floating-point operations used by older algorithms like DDA.">
    <rect x="20" y="160" width="760" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="180" class="subtitle" font-weight="bold" fill="#2e7d32">Why Bresenham's Algorithm?</text>
    <text x="40" y="200" class="body" fill="#333">• Uses ONLY integer arithmetic - no floating-point operations</text>
    <text x="40" y="215" class="body" fill="#333">• Much faster than DDA (Digital Differential Analyzer) algorithm</text>
    <text x="40" y="230" class="body" fill="#333">• Minimizes error between actual line and selected pixels</text>
    <!-- Comparison boxes -->
    <g transform="translate(480, 175)">
      <rect x="0" y="0" width="120" height="30" rx="4" fill="#ffebee"/>
      <text x="60" y="18" text-anchor="middle" class="label" fill="#c62828">DDA (Slow)</text>
      <rect x="130" y="0" width="120" height="30" rx="4" fill="#e8f5e9"/>
      <text x="190" y="18" text-anchor="middle" class="label" fill="#2e7d32">Bresenham (Fast)</text>
    </g>
  </g>
  
  <!-- Step 3: Basic Principle -->
  <g class="step" id="step3" data-narration="The algorithm calculates a decision parameter at each step to determine whether the next pixel should be at y or y+1 based on closeness to the true line.">
    <rect x="20" y="255" width="760" height="90" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="275" class="subtitle" font-weight="bold" fill="#e65100">Basic Principle</text>
    <text x="40" y="295" class="body" fill="#333">• Start at pixel (x₀, y₀), iterate through x-coordinates</text>
    <text x="40" y="310" class="body" fill="#333">• For each x, choose between two y-positions: y or y+1</text>
    <text x="40" y="325" class="body" fill="#333">• Decision based on which pixel is closer to the true line</text>
    <text x="40" y="340" class="body" fill="#333">• Uses incremental error calculation instead of distance computation</text>
    <!-- Decision visualization -->
    <g transform="translate(500, 270)">
      <text x="60" y="15" text-anchor="middle" class="label" font-weight="bold">At each step:</text>
      <rect x="10" y="25" width="100" height="50" rx="4" fill="#fff" stroke="#ff9800"/>
      <text x="60" y="42" text-anchor="middle" class="body" fill="#333">Pk &lt; 0?</text>
      <line x1="35" y1="55" x2="35" y2="65" stroke="#ff9800" stroke-width="2"/>
      <line x1="85" y1="55" x2="85" y2="65" stroke="#ff9800" stroke-width="2"/>
      <text x="20" y="60" class="label" fill="#2e7d32">YES: plot (x+1,y)</text>
      <text x="95" y="60" class="label" fill="#c62828">NO: plot (x+1,y+1)</text>
    </g>
  </g>
  
  <!-- Step 4: Decision Parameter Formula -->
  <g class="step" id="step4" data-narration="The initial decision parameter is calculated as P₀ = 2Δy - Δx, where Δx and Δy are the differences in x and y coordinates.">
    <rect x="20" y="355" width="760" height="90" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="375" class="subtitle" font-weight="bold" fill="#6a1b9a">The Decision Parameter</text>
    <text x="40" y="395" class="body" fill="#333">Given two points P₀(x₀,y₀) to P₁(x₁,y₁):</text>
    <text x="40" y="415" class="body formula" fill="#1565c0">Δx = x₁ - x₀  |  Δy = y₁ - y₀  |  Slope m = Δy/Δx</text>
    <text x="40" y="435" class="body formula" fill="#6a1b9a" font-size="14">P₀ = 2Δy - Δx  (Initial Decision Parameter)</text>
    <!-- Visual formula breakdown -->
    <g transform="translate(450, 370)">
      <rect x="0" y="0" width="140" height="65" rx="4" fill="#fff" stroke="#9c27b0"/>
      <text x="70" y="20" text-anchor="middle" class="label" fill="#6a1b9a" font-weight="bold">For First Octant</text>
      <text x="70" y="38" text-anchor="middle" class="body" fill="#333">0 ≤ m ≤ 1</text>
      <text x="70" y="54" text-anchor="middle" class="body" fill="#333">Δx > Δy</text>
    </g>
  </g>
  
  <!-- Step 5: Update Formulas -->
  <g class="step" id="step5" data-narration="At each step, if Pk is negative, we add 2Δy and stay at y. If Pk is non-negative, we add 2Δy - 2Δx and increment y.">
    <rect x="20" y="455" width="760" height="95" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="475" class="subtitle" font-weight="bold" fill="#1565c0">Update Formulas</text>
    <!-- Two case boxes -->
    <g transform="translate(40, 490)">
      <rect x="0" y="0" width="220" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
      <text x="110" y="18" text-anchor="middle" class="body" font-weight="bold" fill="#2e7d32">IF Pk &lt; 0</text>
      <text x="110" y="35" text-anchor="middle" class="formula" fill="#1b5e20">Pk+1 = Pk + 2Δy</text>
      <text x="110" y="45" text-anchor="middle" class="label" fill="#388e3c">Plot: (x+1, y)</text>
    </g>
    <g transform="translate(280, 490)">
      <rect x="0" y="0" width="220" height="50" rx="6" fill="#ffebee" stroke="#f44336"/>
      <text x="110" y="18" text-anchor="middle" class="body" font-weight="bold" fill="#c62828">IF Pk ≥ 0</text>
      <text x="110" y="35" text-anchor="middle" class="formula" fill="#b71c1c">Pk+1 = Pk + 2Δy - 2Δx</text>
      <text x="110" y="45" text-anchor="middle" class="label" fill="#f44336">Plot: (x+1, y+1)</text>
    </g>
  </g>
  
  <!-- Step 6: Algorithm Steps -->
  <g class="step" id="step6" data-narration="The algorithm has six key steps: input coordinates, calculate differences, initialize P₀, plot starting pixel, iterate through x-coordinates, and continue until endpoint.">
    <rect x="20" y="560" width="760" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="580" class="subtitle" font-weight="bold" fill="#2e7d32">Algorithm Steps</text>
    <g transform="translate(40, 595)">
      <text x="0" y="0" class="body" fill="#333">1. Input: (x₀,y₀) and (x₁,y₁)</text>
      <text x="0" y="18" class="body" fill="#333">2. Δx = x₁-x₀, Δy = y₁-y₀</text>
      <text x="0" y="36" class="body" fill="#333">3. P₀ = 2Δy - Δx</text>
      <text x="0" y="54" class="body" fill="#333">4. Plot (x₀,y₀)</text>
      <text x="300" y="0" class="body" fill="#333">5. For each x from x₀ to x₁-1:</text>
      <text x="300" y="18" class="body" fill="#333">   If Pk &lt; 0: plot (x+1,y), Pk+1 = Pk+2Δy</text>
      <text x="300" y="36" class="body" fill="#333">   Else: plot (x+1,y+1), Pk+1 = Pk+2Δy-2Δx</text>
      <text x="300" y="54" class="body" fill="#333">6. Stop at (x₁,y₁)</text>
    </g>
  </g>
  
  <!-- Step 7: Handling Different Octants -->
  <g class="step" id="step7" data-narration="The basic algorithm works for first octant (0≤m≤1). For other octants, we swap x/y roles for steep lines or reflect coordinates for negative slopes.">
    <rect x="20" y="670" width="760" height="90" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="690" class="subtitle" font-weight="bold" fill="#e65100">Handling All Octants</text>
    <text x="40" y="710" class="body" fill="#333">• Basic algorithm: First octant (0 ≤ slope ≤ 1)</text>
    <text x="40" y="725" class="body" fill="#333">• Shallow lines (|Δx| > |Δy|): Iterate along x-axis</text>
    <text x="40" y="740" class="body" fill="#333">• Steep lines (|Δy| > |Δx|): Iterate along y-axis</text>
    <text x="40" y="755" class="body" fill="#333">• Negative slopes: Reflect coordinates or swap endpoints</text>
    <!-- Octant diagram -->
    <g transform="translate(550, 695)">
      <circle cx="40" cy="40" r="35" fill="#fff" stroke="#ff9800"/>
      <line x1="40" y1="40" x2="70" y2="40" stroke="#ff9800" stroke-width="2"/>
      <line x1="40" y1="40" x2="40" y2="10" stroke="#ff9800" stroke-width="2"/>
      <line x1="40" y1="40" x2="61" y2="19" stroke="#ff9800" stroke-width="2" stroke-dasharray="3"/>
      <text x="40" y="78" text-anchor="middle" class="label" fill="#e65100">First Octant</text>
      <text x="75" y="43" class="label" fill="#e65100">x</text>
      <text x="43" y="8" class="label" fill="#e65100">y</text>
    </g>
  </g>
  
  <!-- Step 8: Example 1 -->
  <g class="step" id="step8" data-narration="Let's trace drawing a line from (2,2) to (8,5). We calculate Δx=6, Δy=3, P₀=0, then iterate showing each decision and pixel plotted.">
    <rect x="20" y="770" width="760" height="110" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="790" class="subtitle" font-weight="bold" fill="#1565c0">Example 1: Line from (2,2) to (8,5)</text>
    <text x="40" y="810" class="body" fill="#333">Δx = 8-2 = 6  |  Δy = 5-2 = 3  |  P₀ = 2(3)-6 = 0</text>
    <!-- Pixel grid -->
    <g transform="translate(40, 825)">
      <text x="0" y="0" class="label" fill="#1565c0" font-weight="bold">Step-by-step:</text>
      <rect x="0" y="10" width="350" height="45" rx="3" fill="#fff"/>
      <text x="5" y="25" class="label" fill="#333">k=0: P₀=0≥0 → (3,3), P₁=-6</text>
      <text x="5" y="38" class="label" fill="#333">k=1: P₁=-6&lt;0 → (4,3), P₂=0</text>
      <text x="180" y="25" class="label" fill="#333">k=2: P₂=0≥0 → (5,4), P₃=-6</text>
      <text x="180" y="38" class="label" fill="#333">k=3: P₃=-6&lt;0 → (6,4), P₄=0</text>
      <text x="290" y="25" class="label" fill="#333">k=4: P₄=0≥0 → (7,5)</text>
      <text x="290" y="38" class="label" fill="#333">k=5: P₅=-6&lt;0 → (8,5) END</text>
    </g>
    <!-- Visual pixel grid -->
    <g transform="translate(420, 825)">
      <rect x="0" y="0" width="140" height="50" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
      <!-- Grid lines -->
      <g stroke="#eee" stroke-width="0.5">
        <line x1="20" y1="0" x2="20" y2="50"/>
        <line x1="40" y1="0" x2="40" y2="50"/>
        <line x1="60" y1="0" x2="60" y2="50"/>
        <line x1="80" y1="0" x2="80" y2="50"/>
        <line x1="100" y1="0" x2="100" y2="50"/>
        <line x1="120" y1="0" x2="120" y2="50"/>
        <line x1="0" y1="10" x2="140" y2="10"/>
        <line x1="0" y1="20" x2="140" y2="20"/>
        <line x1="0" y1="30" x2="140" y2="30"/>
        <line x1="0" y1="40" x2="140" y2="40"/>
      </g>
      <!-- Pixels -->
      <rect x="42" y="32" width="8" height="8" fill="#1976d2"/>
      <rect x="62" y="22" width="8" height="8" fill="#1976d2"/>
      <rect x="82" y="22" width="8" height="8" fill="#1976d2"/>
      <rect x="102" y="12" width="8" height="8" fill="#1976d2"/>
      <rect x="122" y="12" width="8" height="8" fill="#1976d2"/>
      <rect x="142" y="2" width="8" height="8" fill="#1976d2"/>
      <text x="5" y="48" class="label" fill="#666">x→</text>
      <text x="0" y="45" class="label" fill="#666" transform="rotate(-90,0,45)">y↓</text>
    </g>
  </g>
  
  <!-- Step 9: Example 2 -->
  <g class="step" id="step9" data-narration="Another example from (0,0) to (5,2) shows how P₀=-1 leads to different pixel selection. The algorithm alternates between horizontal and diagonal steps.">
    <rect x="20" y="890" width="760" height="110" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="910" class="subtitle" font-weight="bold" fill="#6a1b9a">Example 2: Line from (0,0) to (5,2)</text>
    <text x="40" y="930" class="body" fill="#333">Δx = 5  |  Δy = 2  |  P₀ = 2(2)-5 = -1</text>
    <!-- Table -->
    <g transform="translate(40, 948)">
      <rect x="0" y="0" width="450" height="45" rx="3" fill="#fff"/>
      <line x1="0" y1="15" x2="450" y2="15" stroke="#9c27b0" stroke-width="0.5"/>
      <text x="5" y="12" class="label" fill="#6a1b9a" font-weight="bold">Step</text>
      <text x="45" y="12" class="label" fill="#6a1b9a" font-weight="bold">Pk</text>
      <text x="90" y="12" class="label" fill="#6a1b9a" font-weight="bold">Decision</text>
      <text x="170" y="12" class="label" fill="#6a1b9a" font-weight="bold">Pixel</text>
      <text x="260" y="12" class="label" fill="#6a1b9a" font-weight="bold">Pk+1</text>
      <text x="360" y="12" class="label" fill="#6a1b9a" font-weight="bold">Y-stay</text>
      <text x="410" y="12" class="label" fill="#6a1b9a" font-weight="bold">Y-inc</text>
      <!-- Row 1 -->
      <text x="5" y="28" class="label" fill="#333">0</text>
      <text x="45" y="28" class="label" fill="#333">-1</text>
      <text x="90" y="28" class="label" fill="#2e7d32">P₀&lt;0</text>
      <text x="170" y="28" class="label" fill="#333">(1,0)</text>
      <text x="260" y="28" class="label" fill="#333">3</text>
      <text x="380" y="28" class="label" fill="#333">0→0</text>
      <!-- Row 2 -->
      <text x="5" y="42" class="label" fill="#333">1</text>
      <text x="45" y="42" class="label" fill="#333">3</text>
      <text x="90" y="42" class="label" fill="#c62828">P₁≥0</text>
      <text x="170" y="42" class="label" fill="#333">(2,1)</text>
      <text x="260" y="42" class="label" fill="#333">-3</text>
      <text x="380" y="42" class="label" fill="#333">0→1</text>
    </g>
    <!-- Visual -->
    <g transform="translate(520, 950)">
      <rect x="0" y="0" width="100" height="45" fill="#fff" stroke="#ccc"/>
      <rect x="2" y="32" width="8" height="8" fill="#9c27b0"/>
      <rect x="22" y="32" width="8" height="8" fill="#9c27b0"/>
      <rect x="42" y="22" width="8" height="8" fill="#9c27b0"/>
      <rect x="62" y="22" width="8" height="8" fill="#9c27b0"/>
      <rect x="82" y="12" width="8" height="8" fill="#9c27b0"/>
      <text x="0" y="42" class="label" fill="#666">Pixels: (0,0),(1,0),(2,1),(3,1),(4,2),(5,2)</text>
    </g>
  </g>
  
  <!-- Step 10: Summary -->
  <g class="step" id="step10" data-narration="Key takeaways: Remember P₀ = 2Δy - Δx, use Pk&lt;0 to choose lower pixel and update with 2Δy, or use Pk≥0 for upper pixel with 2Δy - 2Δx.">
    <rect x="20" y="1010" width="760" height="120" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="1030" class="subtitle" font-weight="bold" fill="#2e7d32">Key Takeaways</text>
    <g transform="translate(40, 1050)">
      <rect x="0" y="0" width="170" height="70" rx="4" fill="#fff" stroke="#388e3c"/>
      <text x="85" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#2e7d32">Initial Parameter</text>
      <text x="85" y="45" text-anchor="middle" class="formula" fill="#1565c0" font-size="12">P₀ = 2Δy - Δx</text>
    </g>
    <g transform="translate(220, 1050)">
      <rect x="0" y="0" width="180" height="70" rx="4" fill="#fff" stroke="#388e3c"/>
      <text x="90" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#2e7d32">If Pk &lt; 0</text>
      <text x="90" y="45" text-anchor="middle" class="formula" fill="#1565c0" font-size="11">Pk+1 = Pk + 2Δy</text>
      <text x="90" y="60" text-anchor="middle" class="label" fill="#333">Plot: (x+1, y)</text>
    </g>
    <g transform="translate(410, 1050)">
      <rect x="0" y="0" width="180" height="70" rx="4" fill="#fff" stroke="#388e3c"/>
      <text x="90" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#2e7d32">If Pk ≥ 0</text>
      <text x="90" y="45" text-anchor="middle" class="formula" fill="#1565c0" font-size="11">Pk+1 = Pk + 2Δy - 2Δx</text>
      <text x="90" y="60" text-anchor="middle" class="label" fill="#333">Plot: (x+1, y+1)</text>
    </g>
    <g transform="translate(600, 1050)">
      <rect x="0" y="0" width="160" height="70" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
      <text x="80" y="18" text-anchor="middle" class="label" font-weight="bold" fill="#1565c0">Why It Works</text>
      <text x="80" y="40" text-anchor="middle" class="body" fill="#333">Integer-only</text>
      <text x="80" y="55" text-anchor="middle" class="body" fill="#333">arithmetic!</text>
    </g>
  </g>
</svg>