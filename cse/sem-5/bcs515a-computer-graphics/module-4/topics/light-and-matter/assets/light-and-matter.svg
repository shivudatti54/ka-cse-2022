<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers light-matter interaction essential for understanding optical fiber communication systems, photonic devices, and signal transmission principles in modern networks.">
    <rect x="0" y="0" width="800" height="45" fill="#1976d2"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Light and Matter - Optical Communication Fundamentals</text>
  </g>
  
  <g class="step" id="step1" data-narration="Light exhibits wave-particle duality as both electromagnetic wave traveling at 3×10⁸ m/s and as photon particles with energy E equals hν according to Planck's equation.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Wave-Particle Duality of Light</text>
    <rect x="40" y="92" width="220" height="36" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="108" font-family="Arial" font-size="10" fill="#333">Wave: c = λν = 3×10⁸ m/s</text>
    <text x="50" y="122" font-family="Arial" font-size="10" fill="#333">Oscillating E and B fields</text>
    <rect x="280" y="92" width="220" height="36" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="290" y="108" font-family="Arial" font-size="10" fill="#333">Particle: Photon energy</text>
    <text x="290" y="122" font-family="Arial" font-size="10" fill="#333">E = hν = hc/λ</text>
    <rect x="520" y="92" width="240" height="36" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="530" y="108" font-family="Arial" font-size="10" fill="#333">E(eV) = 1240/λ(nm)</text>
    <text x="530" y="122" font-family="Arial" font-size="10" fill="#333">Example: 1550nm → 0.8 eV</text>
  </g>
  
  <g class="step" id="step2" data-narration="When light interacts with materials it can reflect, refract, absorb, or scatter depending on material properties, which directly determine fiber optic performance and signal quality.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Light-Matter Interactions</text>
    <rect x="40" y="184" width="165" height="35" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="198" font-family="Arial" font-size="9" fill="#333">Reflection: θi = θr</text>
    <text x="50" y="212" font-family="Arial" font-size="9" fill="#333">Used in connectors</text>
    <rect x="215" y="184" width="165" height="35" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="225" y="198" font-family="Arial" font-size="9" fill="#333">Refraction: Snell's Law</text>
    <text x="225" y="212" font-family="Arial" font-size="9" fill="#333">n₁sinθ₁ = n₂sinθ₂</text>
    <rect x="390" y="184" width="165" height="35" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="400" y="198" font-family="Arial" font-size="9" fill="#333">Absorption: Light to heat</text>
    <text x="400" y="212" font-family="Arial" font-size="9" fill="#333">Causes attenuation</text>
    <rect x="565" y="184" width="195" height="35" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="575" y="198" font-family="Arial" font-size="9" fill="#333">Scattering: Rayleigh type</text>
    <text x="575" y="212" font-family="Arial" font-size="9" fill="#333">Losses scale as 1/λ⁴</text>
  </g>
  
  <g class="step" id="step3" data-narration="Silica glass forms optical fibers with Germanium and Fluorine dopants that modify refractive index for creating the core-cladding structure required for total internal reflection.">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Optical Fiber Materials</text>
    <rect x="40" y="272" width="280" height="35" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="286" font-family="Arial" font-size="10" fill="#333">Core: Silica (SiO₂), n₁ ≈ 1.48</text>
    <text x="50" y="300" font-family="Arial" font-size="10" fill="#333">Cladding: Doped silica, n₂ ≈ 1.46</text>
    <rect x="330" y="272" width="200" height="35" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="340" y="286" font-family="Arial" font-size="10" fill="#333">NA = √(n₁² - n₂²)</text>
    <text x="340" y="300" font-family="Arial" font-size="10" fill="#333">Acceptance angle: sin⁻¹(NA)</text>
    <rect x="540" y="272" width="220" height="35" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="550" y="286" font-family="Arial" font-size="10" fill="#333">Dopants: GeO₂ ↑n, F ↓n</text>
    <text x="550" y="300" font-family="Arial" font-size="10" fill="#333">Min loss at 1550nm: 0.2 dB/km</text>
  </g>
  
  <g class="step" id="step4" data-narration="LEDs utilize spontaneous emission producing incoherent broad-spectrum light, while lasers use stimulated emission generating coherent narrow-spectrum light ideal for long-distance communication systems.">
    <rect x="20" y="322" width="760" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">4. Light Sources: LED vs Laser</text>
    <rect x="40" y="360" width="340" height="35" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="374" font-family="Arial" font-size="10" fill="#333">LED: Spontaneous emission, incoherent</text>
    <text x="50" y="388" font-family="Arial" font-size="10" fill="#333">Broad spectrum 30-50nm, low cost</text>
    <rect x="390" y="360" width="370" height="35" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="374" font-family="Arial" font-size="10" fill="#333">Laser: Stimulated emission, coherent</text>
    <text x="400" y="388" font-family="Arial" font-size="10" fill="#333">Narrow 1-3nm, high power, long distance</text>
  </g>
  
  <g class="step" id="step5" data-narration="PIN photodiodes convert incoming photons into electrical current through absorption creating electron-hole pairs, whereas APDs provide internal gain via avalanche multiplication for enhanced sensitivity.">
    <rect x="20" y="410" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">5. Photodetectors</text>
    <rect x="40" y="448" width="340" height="35" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="462" font-family="Arial" font-size="10" fill="#333">PIN Photodiode: p-i-n structure</text>
    <text x="50" y="476" font-family="Arial" font-size="10" fill="#333">Absorbs photons → electron-hole pairs</text>
    <rect x="390" y="448" width="370" height="35" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="462" font-family="Arial" font-size="10" fill="#333">APD: Avalanche Photodiode</text>
    <text x="400" y="476" font-family="Arial" font-size="10" fill="#333">Internal gain via impact ionization</text>
  </g>
  
  <g class="step" id="step6" data-narration="Signal attenuation from material absorption and Rayleigh scattering limits transmission distance, while dispersion effects broaden optical pulses reducing bandwidth and requiring compensation techniques.">
    <rect x="20" y="498" width="760" height="85" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">6. Attenuation and Dispersion</text>
    <rect x="40" y="538" width="230" height="38" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="552" font-family="Arial" font-size="9" fill="#333">Attenuation: dB/km loss</text>
    <text x="50" y="566" font-family="Arial" font-size="9" fill="#333">OH⁻ peak at 1383nm (water)</text>
    <rect x="280" y="538" width="230" height="38" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="290" y="552" font-family="Arial" font-size="9" fill="#333">Rayleigh Scattering</text>
    <text x="290" y="566" font-family="Arial" font-size="9" fill="#333">Scales as 1/λ⁴, intrinsic loss</text>
    <rect x="520" y="538" width="240" height="38" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="530" y="552" font-family="Arial" font-size="9" fill="#333">Dispersion: Modal (multimode)</text>
    <text x="530" y="566" font-family="Arial" font-size="9" fill="#333">Chromatic (single-mode), PMD</text>
  </g>
</svg>