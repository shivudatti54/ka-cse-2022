<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Light Sources in Computer Graphics: Essential mathematical models that simulate illumination in virtual 3D environments for realistic rendering and visual accuracy.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Light Sources in Computer Graphics</text>
  </g>
  
  <g class="step" id="step1" data-narration="Ambient light provides uniform non-directional illumination from all directions, preventing surfaces from appearing completely black in shadowed areas and creating base visibility.">
    <rect x="20" y="58" width="760" height="82" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. Ambient Light</text>
    <rect x="40" y="95" width="60" height="30" fill="#90caf9" stroke="#1976d2"/>
    <text x="110" y="113" font-family="Arial" font-size="11" fill="#333">Uniform, non-directional light</text>
    <text x="110" y="128" font-family="Arial" font-size="10" fill="#666">I = k_a × I_a</text>
    <text x="400" y="80" font-family="Arial" font-size="11" fill="#333">Provides base illumination preventing</text>
    <text x="400" y="95" font-family="Arial" font-size="11" fill="#333">complete darkness in shadowed areas.</text>
    <text x="400" y="115" font-family="Arial" font-size="10" fill="#666">Real-world: Overcast sky light</text>
  </g>
  
  <g class="step" id="step2" data-narration="Point lights emit equally in all directions from a single position, following the inverse square law for intensity falloff with distance.">
    <rect x="20" y="148" width="760" height="82" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="170" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">2. Point Light</text>
    <circle cx="70" cy="202" r="8" fill="#ffeb3b" stroke="#f57f17" stroke-width="2"/>
    <line x1="70" y1="202" x2="130" y2="172" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-green)"/>
    <line x1="70" y1="202" x2="130" y2="202" stroke="#ff9800" stroke-width="2"/>
    <line x1="70" y1="202" x2="130" y2="232" stroke="#ff9800" stroke-width="2"/>
    <text x="140" y="187" font-family="Arial" font-size="11" fill="#333">Emits in all directions from</text>
    <text x="140" y="202" font-family="Arial" font-size="11" fill="#333">position (x, y, z)</text>
    <text x="140" y="220" font-family="Arial" font-size="10" fill="#666">I = I_l / (d² + 1)</text>
    <text x="400" y="170" font-family="Arial" font-size="11" fill="#333">Real-world analogy: Light bulb.</text>
    <text x="400" y="185" font-family="Arial" font-size="11" fill="#333">Intensity decreases with square</text>
    <text x="400" y="200" font-family="Arial" font-size="11" fill="#333">of distance (inverse square law).</text>
  </g>
  
  <g class="step" id="step3" data-narration="Directional lights simulate distant sources like the sun with parallel rays and constant intensity regardless of distance, used for outdoor lighting effects.">
    <rect x="20" y="238" width="760" height="82" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="260" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">3. Directional Light</text>
    <line x1="40" y1="284" x2="140" y2="284" stroke="#ff9800" stroke-width="2"/>
    <line x1="50" y1="274" x2="150" y2="274" stroke="#ff9800" stroke-width="2"/>
    <line x1="50" y1="294" x2="150" y2="294" stroke="#ff9800" stroke-width="2"/>
    <polygon points="140,284 135,279 135,289" fill="#ff9800"/>
    <text x="160" y="264" font-family="Arial" font-size="11" fill="#333">Direction vector only,</text>
    <text x="160" y="279" font-family="Arial" font-size="11" fill="#333">no position in space</text>
    <text x="160" y="299" font-family="Arial" font-size="10" fill="#666">Constant intensity</text>
    <text x="400" y="264" font-family="Arial" font-size="11" fill="#333">Simulates sunlight - parallel rays</text>
    <text x="400" y="279" font-family="Arial" font-size="11" fill="#333">from infinitely distant source.</text>
    <text x="400" y="294" font-family="Arial" font-size="10" fill="#666">Real-world: Sunlight</text>
  </g>
  
  <g class="step" id="step4" data-narration="Spotlights emit light within a cone shape with focused direction, angle parameters, and gradual intensity falloff from center to edges for dramatic effects.">
    <rect x="20" y="328" width="760" height="82" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="350" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">4. Spotlight</text>
    <circle cx="70" cy="376" r="6" fill="#ffeb3b" stroke="#f57f17" stroke-width="2"/>
    <polygon points="70,376 130,346 130,406" fill="#fff59d" stroke="#9c27b0" stroke-width="1" opacity="0.7"/>
    <line x1="70" y1="376" x2="110" y2="376" stroke="#9c27b0" stroke-width="2" stroke-dasharray="4"/>
    <text x="140" y="361" font-family="Arial" font-size="11" fill="#333">Cone-shaped illumination</text>
    <text x="140" y="376" font-family="Arial" font-size="11" fill="#333">Direction + cone angle</text>
    <text x="140" y="394" font-family="Arial" font-size="10" fill="#666">I = I_l × cosⁿ(θ)</text>
    <text x="400" y="350" font-family="Arial" font-size="11" fill="#333">Real-world: Flashlight,</text>
    <text x="400" y="365" font-family="Arial" font-size="11" fill="#333">theatrical spotlight.</text>
    <text x="400" y="383" font-family="Arial" font-size="10" fill="#666">Intensity highest at center</text>
  </g>
  
  <g class="step" id="step5" data-narration="Area lights emit from finite surfaces creating soft shadows with penumbras, essential for photorealistic rendering and more natural-looking light distribution in 3D scenes.">
    <rect x="20" y="418" width="760" height="92" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="440" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">5. Area Light + Attenuation</text>
    <rect x="40" y="458" width="40" height="25" fill="#ffcdd2" stroke="#f44336"/>
    <line x1="60" y1="458" x2="60" y2="498" stroke="#f44336" stroke-width="2" stroke-dasharray="3"/>
    <rect x="45" y="498" width="30" height="8" fill="#ffcdd2" stroke="#f44336" stroke-width="1" opacity="0.5"/>
    <text x="100" y="468" font-family="Arial" font-size="11" fill="#333">Emits from surface area</text>
    <text x="100" y="486" font-family="Arial" font-size="11" fill="#333">Creates soft shadows</text>
    <text x="100" y="501" font-family="Arial" font-size="10" fill="#666">(penumbras)</text>
    <text x="280" y="468" font-family="Arial" font-size="11" fill="#333">Attenuation Formula:</text>
    <text x="280" y="486" font-family="Arial" font-size="11" fill="#333">I = 1 / (a₀ + a₁d + a₂d²)</text>
    <text x="280" y="501" font-family="Arial" font-size="10" fill="#666">a₀=constant, a₁=linear, a₂=quadratic</text>
    <text x="500" y="468" font-family="Arial" font-size="11" fill="#333">Used in photorealistic</text>
    <text x="500" y="486" font-family="Arial" font-size="11" fill="#333">rendering for soft shadows.</text>
  </g>
  
  <g class="step" id="step6" data-narration="The Phong illumination model combines ambient, diffuse, and specular components using dot products between surface normal and light vectors to calculate brightness accurately.">
    <rect x="20" y="518" width="760" height="80" fill="#e1f5fe" stroke="#0288d1" stroke-width="1" rx="5"/>
    <text x="40" y="542" font-family="Arial" font-size="14" font-weight="bold" fill="#0288d1">Summary: Phong Illumination Model</text>
    <text x="40" y="565" font-family="Arial" font-size="11" fill="#333">I = I_a×k_a + I_d×k_d×(N·L) + I_s×k_s×(N·H)ⁿ</text>
    <rect x="40" y="575" width="100" height="20" fill="#b3e5fc" stroke="#0288d1" stroke-width="1" rx="3"/>
    <text x="90" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#0288d1">Ambient</text>
    <rect x="150" y="575" width="100" height="20" fill="#81d4fa" stroke="#0288d1" stroke-width="1" rx="3"/>
    <text x="200" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#0288d1">Diffuse</text>
    <rect x="260" y="575" width="100" height="20" fill="#4fc3f7" stroke="#0288d1" stroke-width="1" rx="3"/>
    <text x="310" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#0288d1">Specular</text>
    <text x="380" y="565" font-family="Arial" font-size="10" fill="#333">N = Normal, L = Light, H = Half</text>
    <text x="520" y="565" font-family="Arial" font-size="10" fill="#666">Dot product determines intensity</text>
    <text x="520" y="580" font-family="Arial" font-size="10" fill="#666">based on surface orientation.</text>
  </g>
</svg>