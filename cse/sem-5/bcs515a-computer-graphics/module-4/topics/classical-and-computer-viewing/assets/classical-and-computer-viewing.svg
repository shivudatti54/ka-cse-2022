<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers viewing transformations that convert 3D world coordinates to 2D screen coordinates for display in computer graphics applications.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Classical and Computer Viewing</text>
  </g>
  
  <g class="step" id="step1" data-narration="Viewing transformations map 3D objects to 2D screens using camera models. The process involves coordinate system changes and projection to display the scene.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Viewing Transformations Overview</text>
    <rect x="40" y="95" width="200" height="35" rx="4" fill="#ffffff" stroke="#1976d2"/>
    <text x="140" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">3D World Coordinates</text>
    <path d="M240 112 L280 112" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="290" y="95" width="200" height="35" rx="4" fill="#ffffff" stroke="#1976d2"/>
    <text x="390" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Viewing (Camera) Coordinates</text>
    <path d="M490 112 L530 112" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="540" y="95" width="200" height="35" rx="4" fill="#ffffff" stroke="#1976d2"/>
    <text x="640" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2D Screen Coordinates</text>
  </g>
  
  <g class="step" id="step2" data-narration="The viewing coordinate system uses VRP as camera position, VPN as view direction, VUP for up vector, and RIGHT vector for horizontal orientation.">
    <rect x="20" y="146" width="760" height="96" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Viewing Coordinate System</text>
    <circle cx="120" cy="205" r="25" fill="#ffffff" stroke="#388e3c" stroke-width="2"/>
    <text x="120" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">VRP</text>
    <text x="120" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(View Reference</text>
    <text x="120" y="223" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Point)</text>
    <line x1="145" y1="190" x2="200" y2="165" stroke="#f44336" stroke-width="2"/>
    <text x="205" y="160" font-family="Arial" font-size="9" fill="#f44336">VPN</text>
    <line x1="145" y1="205" x2="200" y2="205" stroke="#ff9800" stroke-width="2"/>
    <text x="205" y="210" font-family="Arial" font-size="9" fill="#ff9800">RIGHT</text>
    <line x1="145" y1="220" x2="200" y2="245" stroke="#9c27b0" stroke-width="2"/>
    <text x="205" y="240" font-family="Arial" font-size="9" fill="#9c27b0">VUP</text>
    <rect x="350" y="165" width="400" height="60" rx="4" fill="#ffffff" stroke="#388e3c"/>
    <text x="360" y="182" font-family="Arial" font-size="10" fill="#388e3c">VRP: Camera position in world coordinates</text>
    <text x="360" y="198" font-family="Arial" font-size="10" fill="#388e3c">VPN: View plane normal (Z-axis direction)</text>
    <text x="360" y="214" font-family="Arial" font-size="10" fill="#388e3c">VUP &amp; RIGHT: Orientation vectors for camera</text>
  </g>
  
  <g class="step" id="step3" data-narration="Window defines the visible region in viewing coordinates while viewport defines the screen area where the final image is displayed for viewing.">
    <rect x="20" y="250" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="272" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Window and Viewport</text>
    <rect x="50" y="290" width="120" height="30" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="2"/>
    <text x="110" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">WINDOW</text>
    <text x="110" y="321" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">(viewing coords)</text>
    <line x1="170" y1="305" x2="230" y2="305" stroke="#ff9800" stroke-width="2" stroke-dasharray="4"/>
    <text x="200" y="295" font-family="Arial" font-size="8" fill="#ff9800">maps to</text>
    <rect x="240" y="280" width="150" height="50" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="2"/>
    <text x="315" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">VIEWPORT</text>
    <text x="315" y="323" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">(screen coords)</text>
    <rect x="450" y="280" width="310" height="40" rx="4" fill="#ffffff" stroke="#ff9800"/>
    <text x="460" y="298" font-family="Arial" font-size="10" fill="#ff9800">x_vp = (x_w - w_left) × (vp_width / w_width) + vp_left</text>
    <text x="460" y="313" font-family="Arial" font-size="9" fill="#666">Aspect ratio must match to prevent distortion</text>
  </g>
  
  <g class="step" id="step4" data-narration="Parallel projection uses parallel projectors and preserves parallel lines in the output. It is commonly used in technical drawings for accurate measurements.">
    <rect x="20" y="340" width="760" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="362" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Parallel Projection</text>
    <path d="M60 397 L60 377 L140 377 L140 397" fill="none" stroke="#9c27b0" stroke-width="2"/>
    <path d="M70 377 L80 347" stroke="#9c27b0" stroke-width="1"/>
    <path d="M130 377 L120 347" stroke="#9c27b0" stroke-width="1"/>
    <text x="100" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">3D Object</text>
    <line x1="80" y1="347" x2="80" y2="317" stroke="#9c27b0" stroke-width="1"/>
    <line x1="120" y1="347" x2="120" y2="317" stroke="#9c27b0" stroke-width="1"/>
    <line x1="60" y1="317" x2="140" y2="317" stroke="#9c27b0" stroke-width="2"/>
    <text x="100" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Projection Plane</text>
    <line x1="80" y1="312" x2="200" y2="312" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3"/>
    <line x1="120" y1="312" x2="200" y2="312" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3"/>
    <circle cx="200" cy="312" r="3" fill="#9c27b0"/>
    <text x="200" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">P'</text>
    <rect x="280" y="357" width="470" height="50" rx="4" fill="#ffffff" stroke="#9c27b0"/>
    <text x="290" y="375" font-family="Arial" font-size="10" fill="#9c27b0">• Projection lines are parallel preserving line relationships</text>
    <text x="290" y="390" font-family="Arial" font-size="10" fill="#9c27b0">• Orthographic: x'=x, y'=y, z'=0 for 2D display</text>
  </g>
  
  <g class="step" id="step5" data-narration="Perspective projection mimics human vision with foreshortening effect where objects appear smaller as distance increases and lines converge at vanishing points.">
    <rect x="20" y="430" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="452" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Perspective Projection</text>
    <path d="M60 489 L60 469 L140 469 L140 489" fill="none" stroke="#1976d2" stroke-width="2"/>
    <path d="M70 469 L75 439" stroke="#1976d2" stroke-width="1"/>
    <path d="M130 469 L125 439" stroke="#1976d2" stroke-width="1"/>
    <text x="100" y="459" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">3D Object</text>
    <line x1="100" y1="454" x2="100" y2="419" stroke="#f44336" stroke-width="2"/>
    <line x1="70" y1="469" x2="100" y2="419" stroke="#1976d2" stroke-width="1" stroke-dasharray="3"/>
    <line x1="130" y1="469" x2="100" y2="419" stroke="#1976d2" stroke-width="1" stroke-dasharray="3"/>
    <line x1="60" y1="419" x2="140" y2="419" stroke="#1976d2" stroke-width="2"/>
    <text x="100" y="414" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Projection Plane</text>
    <circle cx="100" cy="419" r="4" fill="#f44336"/>
    <text x="100" y="409" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">PRP</text>
    <rect x="280" y="444" width="470" height="55" rx="4" fill="#ffffff" stroke="#1976d2"/>
    <text x="290" y="462" font-family="Arial" font-size="10" fill="#1976d2">• Lines converge at Projection Reference Point creating depth</text>
    <text x="290" y="477" font-family="Arial" font-size="10" fill="#1976d2">• Formula: x' = x × d/z, y' = y × d/z for perspective effect</text>
  </g>
  
  <g class="step" id="step6" data-narration="Clipping removes objects outside the viewing volume using Cohen-Sutherland algorithm for efficient rendering. The viewing pipeline proceeds from modeling to viewport transformation for final display.">
    <rect x="20" y="520" width="760" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="542" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Clipping and Viewing Pipeline</text>
    <rect x="40" y="555" width="80" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="80" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Modeling</text>
    <line x1="120" y1="569" x2="135" y2="569" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="140" y="555" width="80" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="180" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Viewing</text>
    <line x1="220" y1="569" x2="235" y2="569" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="240" y="555" width="80" height="28" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="280" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Projection</text>
    <line x1="320" y1="569" x2="335" y2="569" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="340" y="555" width="80" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="380" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Viewport</text>
    <line x1="420" y1="569" x2="435" y2="569" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="440" y="555" width="80" height="28" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="480" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Output</text>
    <text x="540" y="560" font-family="Arial" font-size="9" fill="#666">Clipping removes outside objects</text>
    <text x="540" y="575" font-family="Arial" font-size="9" fill="#666">Cohen-Sutherland algorithm used</text>
  </g>
</svg>