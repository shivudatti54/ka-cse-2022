<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Polygonal Shading. This topic covers three major shading methods used in computer graphics: Flat shading, Gouraud shading, and Phong shading techniques.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Polygonal Shading in Computer Graphics</text>
  </g>
  
  <g class="step" id="step1" data-narration="Flat shading calculates lighting once per polygon using a single normal vector, resulting in a faceted appearance with each polygon having a distinct color and visible edges.">
    <rect x="20" y="58" width="760" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">1. Flat Shading</text>
    <text x="40" y="93" font-family="Arial" font-size="10" fill="#333">One normal per polygon, constant color across face</text>
    <polygon points="120,95 170,120 120,145" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
    <text x="145" y="158" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">N=(0,0,1)</text>
    <text x="210" y="95" font-family="Arial" font-size="10" fill="#333">Formula: I = Iₐkₐ + Iₗkd(N·L)</text>
    <text x="210" y="110" font-family="Arial" font-size="9" fill="#666">Per polygon, fastest, lowest quality</text>
  </g>
  
  <g class="step" id="step2" data-narration="Gouraud shading interpolates vertex intensities across the polygon surface using bilinear interpolation, providing smoother color transitions than flat shading.">
    <rect x="20" y="166" width="760" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="186" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">2. Gouraud Shading</text>
    <text x="40" y="201" font-family="Arial" font-size="10" fill="#333">Interpolates vertex intensities (bilinear interpolation)</text>
    <polygon points="120,195 170,220 120,245" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
    <text x="145" y="258" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">I1=0.3, I2=0.7, I3=0.5</text>
    <text x="210" y="200" font-family="Arial" font-size="10" fill="#333">I(P) = αI₁ + βI₂ + γI₃</text>
    <text x="210" y="215" font-family="Arial" font-size="9" fill="#666">Per vertex, may miss specular highlights</text>
  </g>
  
  <g class="step" id="step3" data-narration="Phong shading interpolates surface normals at each pixel and computes complete lighting including specular highlights for realistic reflections on surfaces.">
    <rect x="20" y="274" width="760" height="90" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="294" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">3. Phong Shading</text>
    <text x="40" y="309" font-family="Arial" font-size="10" fill="#333">Interpolates normals per pixel, complete lighting model</text>
    <polygon points="120,295 170,320 120,345" fill="#9c27b0" stroke="#7b1fa2" stroke-width="1"/>
    <circle cx="145" cy="310" r="8" fill="white" stroke="#ffeb3b" stroke-width="2"/>
    <text x="145" y="358" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">N interpolated</text>
    <text x="210" y="300" font-family="Arial" font-size="10" fill="#333">I = Iₐkₐ + Iₗ[kd(N·L) + ks(R·V)ⁿ]</text>
    <text x="210" y="315" font-family="Arial" font-size="9" fill="#666">Per pixel, highest quality, slowest</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Phong reflection model has three components: ambient light for base illumination, diffuse for matte surfaces, and specular for shiny highlights.">
    <rect x="20" y="372" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="392" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Phong Reflection Components</text>
    <rect x="40" y="405" width="220" height="50" fill="#e8f5e9" stroke="#388e3c" rx="4"/>
    <text x="150" y="420" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Ambient</text>
    <text x="150" y="435" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Iₐ × kₐ</text>
    
    <rect x="290" y="405" width="220" height="50" fill="#fff3e0" stroke="#ff9800" rx="4"/>
    <text x="400" y="420" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Diffuse</text>
    <text x="400" y="435" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Iₗ × kd × (N·L)</text>
    
    <rect x="540" y="405" width="220" height="50" fill="#f3e5f5" stroke="#9c27b0" rx="4"/>
    <text x="650" y="420" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Specular</text>
    <text x="650" y="435" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Iₗ × ks × (R·V)ⁿ</text>
  </g>
  
  <g class="step" id="step5" data-narration="Vertex normals are computed by averaging normals of adjacent polygons for smooth shading. Comparison: Flat (fastest, faceted), Gouraud (medium), Phong (best quality).">
    <rect x="20" y="470" width="760" height="90" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="490" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Vertex Normals &amp; Comparison</text>
    <text x="40" y="508" font-family="Arial" font-size="10" fill="#333">Vertex normal = average of adjacent face normals</text>
    <polygon points="100,510 140,545 100,580" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <polygon points="140,510 180,545 140,580" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <polygon points="180,510 220,545 180,580" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <line x1="130" y1="545" x2="200" y2="545" stroke="#f44336" stroke-width="2"/>
    <text x="250" y="530" font-family="Arial" font-size="10" fill="#333">N_vertex = (N₁+N₂+N₃)/3</text>
    <text x="250" y="548" font-family="Arial" font-size="10" fill="#333">Flat → Gouraud → Phong</text>
    <text x="250" y="563" font-family="Arial" font-size="9" fill="#666">Quality ↑, Speed ↓</text>
  </g>
</svg>