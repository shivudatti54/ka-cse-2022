<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Display Lists are organized repositories of graphics commands stored in memory for efficient rendering of complex scenes in computer graphics applications.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Display Lists in Computer Graphics</text>
  </g>
  
  <!-- step1: Definition and Basic Structure -->
  <g class="step" id="step1" data-narration="A display list is a sequence of graphics commands stored in memory. Each entry contains a command code followed by parameters like coordinates.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">What is a Display List?</text>
    <rect x="40" y="88" width="220" height="42" fill="#e3f2fd" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="9" fill="#333">Display List / Display File</text>
    <text x="50" y="116" font-family="Arial" font-size="8" fill="#666">Stored sequence of graphics</text>
    <text x="50" y="126" font-family="Arial" font-size="8" fill="#666">commands for execution</text>
    <path d="M280 85 L320 85" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="340" y="70" width="120" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="400" y="88" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Command Format</text>
    <text x="400" y="104" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">[DRAW_LINE, x1,y1,x2,y2]</text>
    <text x="400" y="116" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">opcode + parameters</text>
    <rect x="500" y="75" width="260" height="55" fill="#e8f5e9" rx="3"/>
    <text x="510" y="90" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Display Processor</text>
    <text x="510" y="105" font-family="Arial" font-size="8" fill="#333">Interprets commands and</text>
    <text x="510" y="118" font-family="Arial" font-size="8" fill="#333">generates screen output</text>
  </g>
  
  <!-- step2: Types of Display Lists -->
  <g class="step" id="step2" data-narration="Two main types exist: linear display lists store commands sequentially, while nested display lists allow references to sub-lists for reuse.">
    <rect x="20" y="146" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Linear vs Nested Display Lists</text>
    <rect x="40" y="178" width="330" height="50" fill="#f3e5f5" rx="3"/>
    <text x="55" y="192" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Linear</text>
    <text x="55" y="206" font-family="Arial" font-size="7" fill="#666">Command 1 → Command 2 → Command 3</text>
    <text x="55" y="218" font-family="Arial" font-size="7" fill="#666">Sequential, flat structure</text>
    <rect x="390" y="178" width="370" height="50" fill="#fce4ec" rx="3"/>
    <text x="405" y="192" font-family="Arial" font-size="8" font-weight="bold" fill="#c2185b">Nested</text>
    <text x="405" y="206" font-family="Arial" font-size="7" fill="#666">Main List → references sub-list (wheel) → Main List</text>
    <text x="405" y="218" font-family="Arial" font-size="7" fill="#666">Hierarchical, reusable sub-components</text>
  </g>
  
  <!-- step3: Architecture Components -->
  <g class="step" id="step3" data-narration="Display list architecture has four key components: buffer stores commands in memory, pointer tracks current position, processor executes commands, and editing point allows modifications.">
    <rect x="20" y="244" width="760" height="70" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Display List Architecture Components</text>
    <rect x="40" y="276" width="170" height="32" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="125" y="290" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Buffer</text>
    <text x="125" y="302" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Memory</text>
    <rect x="220" y="276" width="170" height="32" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="305" y="290" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">Pointer</text>
    <text x="305" y="302" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Position</text>
    <rect x="400" y="276" width="170" height="32" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="485" y="290" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Processor</text>
    <text x="485" y="302" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Executes</text>
    <rect x="580" y="276" width="180" height="32" fill="#fce4ec" stroke="#f44336" rx="3"/>
    <text x="670" y="290" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Editing Point</text>
    <text x="670" y="302" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Insert/Modify</text>
  </g>
  
  <!-- step4: Transformation Capabilities -->
  <g class="step" id="step4" data-narration="Transformations can be applied to display list segments: translation moves objects, rotation turns them, and scaling changes size using matrix operations.">
    <rect x="20" y="322" width="760" height="75" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Transformation Commands</text>
    <rect x="40" y="352" width="220" height="38" fill="#e3f2fd" rx="3"/>
    <text x="55" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Translation</text>
    <text x="55" y="380" font-family="Arial" font-size="7" fill="#666">(x',y') = (x+tx, y+ty)</text>
    <rect x="270" y="352" width="220" height="38" fill="#fff3e0" rx="3"/>
    <text x="285" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Rotation</text>
    <text x="285" y="380" font-family="Arial" font-size="7" fill="#666">(x',y') = (xcosθ - ysinθ, xsinθ + ycosθ)</text>
    <rect x="500" y="352" width="220" height="38" fill="#e8f5e9" rx="3"/>
    <text x="515" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Scaling</text>
    <text x="515" y="380" font-family="Arial" font-size="7" fill="#666">(x',y') = (x×sx, y×sy)</text>
  </g>
  
  <!-- step5: Editing Operations -->
  <g class="step" id="step5" data-narration="Four main editing operations exist for display lists: insertion adds new commands, deletion removes them, replacement substitutes new commands, and reordering changes the execution sequence.">
    <rect x="20" y="405" width="760" height="70" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="425" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Display List Editing Operations</text>
    <rect x="40" y="437" width="165" height="32" fill="#e8f5e9" rx="3"/>
    <text x="122" y="450" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Insertion</text>
    <text x="122" y="462" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Add commands</text>
    <rect x="215" y="437" width="165" height="32" fill="#ffebee" rx="3"/>
    <text x="297" y="450" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Deletion</text>
    <text x="297" y="462" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Remove commands</text>
    <rect x="390" y="437" width="165" height="32" fill="#fff3e0" rx="3"/>
    <text x="472" y="450" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Replacement</text>
    <text x="472" y="462" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Substitute</text>
    <rect x="565" y="437" width="195" height="32" fill="#e3f2fd" rx="3"/>
    <text x="662" y="450" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">Reordering</text>
    <text x="662" y="462" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Change sequence</text>
  </g>
  
  <!-- step6: Example and Advantages -->
  <g class="step" id="step6" data-narration="A simple house example demonstrates sequential commands. Key advantages include code reusability, easy transformation of entire objects, and memory efficiency through nesting techniques.">
    <rect x="20" y="483" width="760" height="70" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="503" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Example: Simple House Display List</text>
    <rect x="40" y="513" width="340" height="34" fill="#f5f5f5" rx="3"/>
    <text x="50" y="525" font-family="Arial" font-size="7" fill="#333">1. SET_COLOR, RED</text>
    <text x="50" y="536" font-family="Arial" font-size="7" fill="#333">2. DRAW_RECTANGLE, 100,200,200,300</text>
    <text x="50" y="547" font-family="Arial" font-size="7" fill="#333">3. DRAW_TRIANGLE, 100,200,200,200,150,150</text>
    <rect x="400" y="513" width="360" height="34" fill="#e8f5e9" rx="3"/>
    <text x="410" y="525" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Advantages</text>
    <text x="410" y="538" font-family="Arial" font-size="7" fill="#333">• Code reusability • Easy transformations</text>
    <text x="580" y="538" font-family="Arial" font-size="7" fill="#333">• Memory efficiency • Interactive editing</text>
  </g>
</svg>