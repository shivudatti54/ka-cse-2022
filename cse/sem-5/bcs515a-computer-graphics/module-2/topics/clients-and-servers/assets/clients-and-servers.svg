<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The client-server model is the foundation of modern networking where clients request services and servers provide them across distributed systems.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Client-Server Model</text>
  </g>
  
  <g class="step" id="step1" data-narration="A client initiates requests and presents user interfaces. Types include thick clients like desktop apps, thin clients like browsers, and hybrid clients.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">CLIENT</text>
    <rect x="40" y="90" width="120" height="45" fill="#1976d2" rx="4"/>
    <text x="100" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Thick Client</text>
    <text x="100" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">(Desktop Apps)</text>
    <rect x="170" y="90" width="120" height="45" fill="#64b5f6" rx="4"/>
    <text x="230" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Thin Client</text>
    <text x="230" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">(Web Browsers)</text>
    <rect x="300" y="90" width="120" height="45" fill="#90caf9" rx="4"/>
    <text x="360" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Hybrid Client</text>
    <text x="360" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">(Mobile Apps)</text>
    <text x="440" y="110" font-family="Arial" font-size="10" fill="#333">Initiates requests • Provides UI • Local processing</text>
  </g>
  
  <g class="step" id="step2" data-narration="Servers provide services to multiple clients simultaneously. Common types include web servers, application servers, database servers, and DNS servers for different network functions.">
    <rect x="20" y="151" width="760" height="85" fill="#e8f5e9" rx="8"/>
    <text x="40" y="173" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">SERVER</text>
    <rect x="40" y="183" width="100" height="45" fill="#388e3c" rx="4"/>
    <text x="90" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Web Server</text>
    <text x="90" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#c8e6c9">(HTTP : 80)</text>
    <rect x="150" y="183" width="100" height="45" fill="#66bb6a" rx="4"/>
    <text x="200" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="white">App Server</text>
    <text x="200" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#c8e6c9">(Business Logic)</text>
    <rect x="260" y="183" width="100" height="45" fill="#81c784" rx="4"/>
    <text x="310" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Database</text>
    <text x="310" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#c8e6c9">(MySQL:3306)</text>
    <rect x="370" y="183" width="100" height="45" fill="#a5d6a7" rx="4"/>
    <text x="420" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="white">DNS Server</text>
    <text x="420" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">(Port 53)</text>
    <text x="490" y="200" font-family="Arial" font-size="10" fill="#333">Handles multiple requests • Provides services • Centralized resources</text>
  </g>
  
  <g class="step" id="step3" data-narration="HTTP is the request-response protocol used for web communication. Common methods are GET, POST, PUT, and DELETE with status codes.">
    <rect x="20" y="244" width="760" height="85" fill="#fff3e0" rx="8"/>
    <text x="40" y="266" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">HTTP Communication</text>
    <rect x="40" y="280" width="200" height="40" fill="#ffe0b2" rx="4"/>
    <text x="140" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">HTTP Request</text>
    <text x="140" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">GET /api/users HTTP/1.1</text>
    <path d="M250,300 L290,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="300" y="280" width="200" height="40" fill="#ffcc80" rx="4"/>
    <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Server Processing</text>
    <text x="400" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Validate • Query DB • Generate</text>
    <path d="M510,300 L550,300" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="560" y="280" width="200" height="40" fill="#ffb74d" rx="4"/>
    <text x="660" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">HTTP Response</text>
    <text x="660" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">200 OK • 404 Not Found</text>
  </g>
  
  <g class="step" id="step4" data-narration="The three-tier architecture separates presentation, business logic, and data management into distinct layers for improved scalability, maintainability, and flexibility in enterprise applications.">
    <rect x="20" y="337" width="760" height="85" fill="#f3e5f5" rx="8"/>
    <text x="40" y="359" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Three-Tier Architecture</text>
    <rect x="80" y="375" width="180" height="40" fill="#e1bee7" rx="4"/>
    <text x="170" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Presentation Tier</text>
    <text x="170" y="407" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">(Client - Browser/UI)</text>
    <path d="M270,395 L310,395" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="320" y="375" width="180" height="40" fill="#ce93d8" rx="4"/>
    <text x="410" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Application Tier</text>
    <text x="410" y="407" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">(App Server - Logic)</text>
    <path d="M510,395 L550,395" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="560" y="375" width="180" height="40" fill="#ab47bc" rx="4"/>
    <text x="650" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Data Tier</text>
    <text x="650" y="407" text-anchor="middle" font-family="Arial" font-size="8" fill="#e1bee7">(Database Server)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Common ports to remember: HTTP 80, HTTPS 443, FTP 21, DNS 53, SSH 22, and MySQL 3306 for network communication.">
    <rect x="20" y="430" width="760" height="50" fill="#ffebee" rx="8"/>
    <text x="40" y="455" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Important Ports</text>
    <rect x="140" y="440" width="70" height="30" fill="#ef9a9a" rx="4"/>
    <text x="175" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">HTTP:80</text>
    <rect x="220" y="440" width="70" height="30" fill="#ef5350" rx="4"/>
    <text x="255" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="white">HTTPS:443</text>
    <rect x="300" y="440" width="70" height="30" fill="#e57373" rx="4"/>
    <text x="335" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="white">FTP:21</text>
    <rect x="380" y="440" width="70" height="30" fill="#ef9a9a" rx="4"/>
    <text x="415" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">DNS:53</text>
    <rect x="460" y="440" width="70" height="30" fill="#e57373" rx="4"/>
    <text x="495" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="white">SSH:22</text>
    <rect x="540" y="440" width="70" height="30" fill="#ef5350" rx="4"/>
    <text x="575" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="white">MySQL:3306</text>
    <rect x="620" y="440" width="70" height="30" fill="#ef9a9a" rx="4"/>
    <text x="655" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">SMTP:25</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam points: clients request services while servers provide them; HTTP operates as a stateless protocol; three-tier architecture separates presentation, business logic, and data layers.">
    <rect x="20" y="488" width="760" height="50" fill="#e3f2fd" rx="8"/>
    <text x="40" y="510" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Exam Tips</text>
    <text x="140" y="510" font-family="Arial" font-size="10" fill="#333">• Client = requests services • Server = provides services</text>
    <text x="140" y="525" font-family="Arial" font-size="10" fill="#333">• Thick client: local processing • Thin client: server-dependent</text>
    <text x="450" y="510" font-family="Arial" font-size="10" fill="#333">• HTTP: stateless request-response</text>
    <text x="450" y="525" font-family="Arial" font-size="10" fill="#333">• Three-tier: Presentation → Application → Data</text>
  </g>
</svg>