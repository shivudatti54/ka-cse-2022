<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Title slide introducing Event-Driven Programming fundamentals, Input Handling mechanisms, the Delegation Event Model, and Listener patterns used in Java GUI applications.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Event-Driven Programming and Input Handling</text>
  </g>
  
  <g class="step" id="step1" data-narration="Event-driven programming is a paradigm where the application flow is determined by user actions like clicks and key presses, unlike traditional sequential code execution.">
    <rect x="20" y="58" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is Event-Driven Programming?</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">A paradigm where program flow is determined by user actions (clicks,</text>
    <text x="40" y="116" font-family="Arial" font-size="11" fill="#333">keypresses, timer events). Instead of controlling execution, the application</text>
    <text x="40" y="132" font-family="Arial" font-size="11" fill="#333">waits for and responds to events generated by users or the system.</text>
  </g>
  
  <g class="step" id="step2" data-narration="An Event Source is the GUI component where the event occurs (button, text field). The Event Object carries details about what happened to the listener.">
    <rect x="20" y="156" width="760" height="95" fill="#e8f5e9" rx="8"/>
    <text x="40" y="178" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Event Source and Event Object</text>
    <rect x="40" y="192" width="200" height="52" fill="#c8e6c9" rx="4"/>
    <text x="140" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Event Source</text>
    <text x="140" y="224" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">(Button, Frame, TextField)</text>
    <line x1="245" y1="218" x2="265" y2="218" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="270" y="192" width="220" height="52" fill="#c8e6c9" rx="4"/>
    <text x="380" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Event Object</text>
    <text x="380" y="224" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">(ActionEvent, MouseEvent)</text>
    <text x="500" y="210" font-family="Arial" font-size="10" fill="#333">Contains: source,</text>
    <text x="500" y="224" font-family="Arial" font-size="10" fill="#333">timestamp, event type</text>
  </g>
  
  <g class="step" id="step3" data-narration="Event Listeners are interfaces that define handler methods for specific event types. Adapters provide empty implementations so developers only override needed methods.">
    <rect x="20" y="259" width="760" height="90" fill="#fff3e0" rx="8"/>
    <text x="40" y="281" font-family="Arial" font-size="14" font-weight="bold" fill="#f57c00">Event Listeners and Adapters</text>
    <rect x="40" y="295" width="160" height="48" fill="#ffe0b2" rx="4"/>
    <text x="120" y="313" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Listener Interfaces</text>
    <text x="120" y="327" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">ActionListener</text>
    <rect x="210" y="295" width="140" height="48" fill="#ffe0b2" rx="4"/>
    <text x="280" y="313" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">MouseListener</text>
    <rect x="360" y="295" width="120" height="48" fill="#ffe0b2" rx="4"/>
    <text x="420" y="313" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">KeyListener</text>
    <rect x="490" y="295" width="280" height="48" fill="#ffcc80" rx="4"/>
    <text x="630" y="313" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Adapters (Convenience Classes)</text>
    <text x="630" y="327" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">MouseAdapter, KeyAdapter, WindowAdapter</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Delegation Event Model has three parts: Event Source generates events, Event Object carries data, and Event Listener processes and responds to them.">
    <rect x="20" y="357" width="760" height="90" fill="#f3e5f5" rx="8"/>
    <text x="40" y="379" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2">Delegation Event Model</text>
    <rect x="40" y="393" width="180" height="50" fill="#e1bee7" rx="4"/>
    <text x="130" y="411" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">Event Source</text>
    <text x="130" y="425" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">(Generates Event)</text>
    <line x1="225" y1="418" x2="255" y2="418" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="260" y="393" width="180" height="50" fill="#e1bee7" rx="4"/>
    <text x="350" y="411" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">Event Object</text>
    <text x="350" y="425" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">(Carries Data)</text>
    <line x1="445" y1="418" x2="475" y2="418" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="480" y="393" width="180" height="50" fill="#e1bee7" rx="4"/>
    <text x="570" y="411" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">Event Listener</text>
    <text x="570" y="425" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">(Handles Event)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Mouse events include pressed, released, clicked, entered, exited, dragged, and moved. Key events are keyPressed, keyReleased, and keyTyped for keyboard input.">
    <rect x="20" y="455" width="760" height="90" fill="#ffebee" rx="8"/>
    <text x="40" y="477" font-family="Arial" font-size="14" font-weight="bold" fill="#d32f2f">Common Event Types</text>
    <rect x="40" y="491" width="230" height="50" fill="#ffcdd2" rx="4"/>
    <text x="155" y="509" text-anchor="middle" font-family="Arial" font-size="11" fill="#b71c1c">MouseEvent</text>
    <text x="155" y="523" text-anchor="middle" font-family="Arial" font-size="9" fill="#d32f2f">pressed, released, clicked,</text>
    <text x="155" y="535" text-anchor="middle" font-family="Arial" font-size="9" fill="#d32f2f">entered, exited, dragged, moved</text>
    <rect x="280" y="491" width="230" height="50" fill="#ffcdd2" rx="4"/>
    <text x="395" y="509" text-anchor="middle" font-family="Arial" font-size="11" fill="#b71c1c">KeyEvent</text>
    <text x="395" y="523" text-anchor="middle" font-family="Arial" font-size="9" fill="#d32f2f">keyPressed, keyReleased, keyTyped</text>
    <rect x="520" y="491" width="240" height="50" fill="#ffcdd2" rx="4"/>
    <text x="640" y="509" text-anchor="middle" font-family="Arial" font-size="11" fill="#b71c1c">ActionEvent</text>
    <text x="640" y="523" text-anchor="middle" font-family="Arial" font-size="9" fill="#d32f2f">button click, menu selection</text>
  </g>
  
  <g class="step" id="step6" data-narration="The Event Dispatch Thread handles all GUI events sequentially and performs all painting operations. Long-running tasks should use separate threads for a responsive interface.">
    <rect x="20" y="553" width="760" height="40" fill="#e0f7fa" rx="8"/>
    <text x="40" y="575" font-family="Arial" font-size="14" font-weight="bold" fill="#00838f">Event Dispatch Thread (EDT) - Handles GUI events sequentially, performs painting</text>
  </g>
</svg>