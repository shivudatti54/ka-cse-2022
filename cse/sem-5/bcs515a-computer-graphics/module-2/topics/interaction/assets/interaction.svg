<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Human-Computer Interaction HCI is about designing computer systems that people can use easily and effectively through intuitive interfaces and smooth user experiences.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Human-Computer Interaction (HCI)</text>
  </g>
  
  <g class="step" id="step1" data-narration="User-Centered Design puts user needs and goals first through extensive research, creating personas, and iterative testing throughout the entire design process.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="58" width="760" height="25" fill="#1976d2" rx="8"/>
    <text x="40" y="75" font-family="Arial" font-size="12" fill="white" font-weight="bold">User-Centered Design</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">An iterative process where user needs drive all design decisions through</text>
    <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">continuous research, testing, and improvement cycles.</text>
    <text x="680" y="125" font-family="Arial" font-size="9" fill="#1976d2">Analysis → Design → Evaluation → Iteration</text>
  </g>
  
  <g class="step" id="step2" data-narration="Different interaction styles include CLI for experts, GUI with visual elements, touch interfaces, and natural interfaces using speech or gestures.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <rect x="20" y="146" width="760" height="25" fill="#388e3c" rx="8"/>
    <text x="40" y="163" font-family="Arial" font-size="12" fill="white" font-weight="bold">Interaction Styles</text>
    <rect x="40" y="185" width="160" height="35" fill="#c8e6c9" rx="4"/>
    <text x="120" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">CLI</text>
    <text x="120" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Command Line</text>
    <rect x="215" y="185" width="160" height="35" fill="#c8e6c9" rx="4"/>
    <text x="295" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">GUI</text>
    <text x="295" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Windows, Icons, Menus</text>
    <rect x="390" y="185" width="160" height="35" fill="#c8e6c9" rx="4"/>
    <text x="470" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Touch</text>
    <text x="470" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Direct Manipulation</text>
    <rect x="565" y="185" width="160" height="35" fill="#c8e6c9" rx="4"/>
    <text x="645" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">NUI</text>
    <text x="645" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Speech, Gestures</text>
  </g>
  
  <g class="step" id="step3" data-narration="Nielsen's ten usability heuristics provide essential evaluation criteria for interface design, including visibility of status, match to real world, user control, consistency, and error prevention.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <rect x="20" y="234" width="760" height="25" fill="#ff9800" rx="8"/>
    <text x="40" y="251" font-family="Arial" font-size="12" fill="white" font-weight="bold">Nielsen's Usability Heuristics</text>
    <text x="40" y="275" font-family="Arial" font-size="9" fill="#333">1. Visibility of system status</text>
    <text x="200" y="275" font-family="Arial" font-size="9" fill="#333">2. Match with real world</text>
    <text x="360" y="275" font-family="Arial" font-size="9" fill="#333">3. User control</text>
    <text x="500" y="275" font-family="Arial" font-size="9" fill="#333">4. Consistency</text>
    <text x="640" y="275" font-family="Arial" font-size="9" fill="#333">5. Error prevention</text>
    <text x="40" y="295" font-family="Arial" font-size="9" fill="#333">6. Recognition over recall</text>
    <text x="200" y="295" font-family="Arial" font-size="9" fill="#333">7. Flexibility</text>
    <text x="360" y="295" font-family="Arial" font-size="9" fill="#333">8. Minimalist design</text>
    <text x="500" y="295" font-family="Arial" font-size="9" fill="#333">9. Error recovery</text>
    <text x="680" y="295" font-family="Arial" font-size="9" fill="#333">10. Help</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Gulf of Execution is the gap between user goals and interface actions, while the Gulf of Evaluation is the gap in understanding system state.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <rect x="20" y="322" width="760" height="25" fill="#9c27b0" rx="8"/>
    <text x="40" y="339" font-family="Arial" font-size="12" fill="white" font-weight="bold">Cognitive Models: The Gulf of Execution and Evaluation</text>
    <rect x="40" y="360" width="220" height="32" fill="#e1bee7" rx="4"/>
    <text x="150" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Gulf of Execution</text>
    <text x="150" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Gap between user goals</text>
    <text x="150" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">and interface actions</text>
    <line x1="270" y1="376" x2="310" y2="376" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="320" y="360" width="220" height="32" fill="#e1bee7" rx="4"/>
    <text x="430" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Gulf of Evaluation</text>
    <text x="430" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Gap between system state</text>
    <text x="430" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">and user understanding</text>
    <text x="600" y="385" font-family="Arial" font-size="9" fill="#333">Good design minimizes</text>
    <text x="600" y="398" font-family="Arial" font-size="9" fill="#333">both gulfs for better UX</text>
  </g>
  
  <g class="step" id="step5" data-narration="Key design principles include affordances showing how to use objects, mappings between controls and effects, constraints preventing errors, and immediate feedback.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <rect x="20" y="410" width="760" height="25" fill="#f44336" rx="8"/>
    <text x="40" y="427" font-family="Arial" font-size="12" fill="white" font-weight="bold">Design Principles</text>
    <rect x="40" y="450" width="135" height="32" fill="#ffcdd2" rx="4"/>
    <text x="107" y="465" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Affordance</text>
    <text x="107" y="477" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Visual clues for use</text>
    <rect x="185" y="450" width="135" height="32" fill="#ffcdd2" rx="4"/>
    <text x="252" y="465" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Mapping</text>
    <text x="252" y="477" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Controls → Effects</text>
    <rect x="330" y="450" width="135" height="32" fill="#ffcdd2" rx="4"/>
    <text x="397" y="465" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Constraints</text>
    <text x="397" y="477" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Prevent errors</text>
    <rect x="475" y="450" width="135" height="32" fill="#ffcdd2" rx="4"/>
    <text x="542" y="465" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Feedback</text>
    <text x="542" y="477" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Immediate response</text>
    <rect x="620" y="450" width="135" height="32" fill="#ffcdd2" rx="4"/>
    <text x="687" y="465" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Consistency</text>
    <text x="687" y="477" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Similar → Similar</text>
  </g>
  
  <g class="step" id="step6" data-narration="Real examples show login forms with password indicators reduce failures by 40%, and ATMs with clear icons improve transaction speed by 25 percent.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="498" width="760" height="25" fill="#1976d2" rx="8"/>
    <text x="40" y="515" font-family="Arial" font-size="12" fill="white" font-weight="bold">Real-World Examples</text>
    <rect x="40" y="535" width="340" height="45" fill="#bbdefb" rx="4"/>
    <text x="60" y="550" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Login Interface</text>
    <text x="60" y="565" font-family="Arial" font-size="8" fill="#666">Password strength indicator, real-time validation,</text>
    <text x="60" y="577" font-family="Arial" font-size="8" fill="#666">show password toggle - reduces failures by 40%</text>
    <rect x="400" y="535" width="340" height="45" fill="#bbdefb" rx="4"/>
    <text x="420" y="550" font-family="Arial" font-size="9" fill="#333" font-weight="bold">ATM Interface</text>
    <text x="420" y="565" font-family="Arial" font-size="8" fill="#666">Clear icons + text, audio confirmation,</text>
    <text x="420" y="577" font-family="Arial" font-size="8" fill="#666">prominent balance display - 25% faster transactions</text>
  </g>
</svg>