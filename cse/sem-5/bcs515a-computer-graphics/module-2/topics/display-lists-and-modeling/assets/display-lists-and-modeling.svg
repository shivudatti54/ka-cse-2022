<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Display Lists and Modeling in Computer Graphics. We'll explore OpenGL display lists, hierarchical scene construction, and matrix stack techniques for building complex 3D models efficiently.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Display Lists and Modeling in Computer Graphics</text>
  </g>
  
  <g class="step" id="step1" data-narration="A display list is a pre-compiled group of OpenGL commands stored on the GPU server side. Think of it like a recorded macro you can replay anytime for better performance.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is a Display List?</text>
    <rect x="40" y="92" width="720" height="36" fill="#ffffff" rx="3"/>
    <text x="50" y="108" font-family="Arial" font-size="11" fill="#333">A pre-compiled group of OpenGL commands stored on GPU</text>
    <text x="50" y="122" font-family="Arial" font-size="11" fill="#333">Define once, call many times - like a compiled function</text>
  </g>
  
  <g class="step" id="step2" data-narration="To create a display list, first generate an ID with glGenLists, then wrap commands between glNewList and glEndList. Use GL_COMPILE to store without executing.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Creating Display Lists</text>
    <rect x="40" y="180" width="340" height="36" fill="#ffffff" rx="3"/>
    <text x="50" y="196" font-family="Courier" font-size="10" fill="#333">GLuint id = glGenLists(1);</text>
    <text x="50" y="208" font-family="Courier" font-size="10" fill="#333">glNewList(id, GL_COMPILE);</text>
    <rect x="400" y="180" width="360" height="36" fill="#ffffff" rx="3"/>
    <text x="410" y="196" font-family="Arial" font-size="10" fill="#333">GL_COMPILE - Store only, don't run</text>
    <text x="410" y="208" font-family="Arial" font-size="10" fill="#333">GL_COMPILE_AND_EXECUTE - Store and run</text>
  </g>
  
  <g class="step" id="step3" data-narration="Execute display lists with glCallList or glCallLists for multiple. Delete them with glDeleteLists when no longer needed to free GPU memory. They improve performance and network efficiency.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Executing and Deleting Display Lists</text>
    <rect x="40" y="268" width="220" height="36" fill="#ffffff" rx="3"/>
    <text x="50" y="284" font-family="Courier" font-size="10" fill="#333">glCallList(listID);</text>
    <text x="50" y="296" font-family="Courier" font-size="10" fill="#333">glCallLists(n, type, data);</text>
    <rect x="280" y="268" width="200" height="36" fill="#ffffff" rx="3"/>
    <text x="290" y="284" font-family="Courier" font-size="10" fill="#333">glDeleteLists(id, range);</text>
    <rect x="500" y="268" width="260" height="36" fill="#ffebee" rx="3"/>
    <text x="510" y="280" font-family="Arial" font-size="9" fill="#f44336">Advantages:</text>
    <text x="510" y="292" font-family="Arial" font-size="9" fill="#f44336">Performance, Reusability, Network efficiency</text>
  </g>
  
  <g class="step" id="step4" data-narration="Hierarchical modeling builds complex objects from simpler parts using a parent-child tree structure. Each component has its own local coordinate system for independent transformations.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Hierarchical Modeling</text>
    <rect x="40" y="356" width="230" height="36" fill="#ffffff" rx="3"/>
    <text x="50" y="368" font-family="Arial" font-size="10" fill="#333">Complex objects built from</text>
    <text x="50" y="380" font-family="Arial" font-size="10" fill="#333">simpler sub-components</text>
    <rect x="290" y="356" width="200" height="36" fill="#ffffff" rx="3"/>
    <text x="300" y="368" font-family="Arial" font-size="10" fill="#333">Parent-child tree structure</text>
    <text x="300" y="380" font-family="Arial" font-size="10" fill="#333">(Scene Graph / DAG)</text>
    <rect x="510" y="356" width="250" height="36" fill="#ffffff" rx="3"/>
    <text x="520" y="368" font-family="Arial" font-size="10" fill="#333">Transformations propagate</text>
    <text x="520" y="380" font-family="Arial" font-size="10" fill="#333">from parent to all children</text>
  </g>
  
  <g class="step" id="step5" data-narration="The matrix stack uses glPushMatrix to save current state and glPopMatrix to restore it. This isolates transformations for each component, enabling hierarchical modeling.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Matrix Stack for Hierarchical Transformations</text>
    <rect x="40" y="444" width="350" height="36" fill="#ffffff" rx="3"/>
    <text x="50" y="458" font-family="Courier" font-size="10" fill="#333">glPushMatrix();</text>
    <text x="60" y="470" font-family="Courier" font-size="10" fill="#333">glTranslatef(x, y, z); glRotatef(angle, ax, ay, az);</text>
    <rect x="410" y="444" width="350" height="36" fill="#ffffff" rx="3"/>
    <text x="420" y="458" font-family="Courier" font-size="10" fill="#333">drawComponent();</text>
    <text x="420" y="470" font-family="Courier" font-size="10" fill="#333">// Draw in local coords</text>
    <text x="420" y="482" font-family="Courier" font-size="10" fill="#333">glPopMatrix();</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: A robot arm with base, upper arm, and forearm in hierarchy. Changing the base angle rotates the entire arm because the child transformations inherit from parents.">
    <rect x="20" y="498" width="760" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Example: Hierarchical Robot Arm</text>
    <rect x="40" y="532" width="720" height="46" fill="#ffffff" rx="3"/>
    <text x="50" y="548" font-family="Courier" font-size="9" fill="#333">// BASE (root): glPushMatrix(); glTranslatef(0,0,0); glRotatef(baseAngle,0,0,1);</text>
    <text x="50" y="560" font-family="Courier" font-size="9" fill="#333">// ELBOW (child): glTranslatef(100,0,0); glRotatef(elbowAngle,0,0,1); drawForearm();</text>
    <text x="50" y="572" font-family="Courier" font-size="9" fill="#333">// Child inherits parent transform: base angle affects all subsequent parts</text>
  </g>
</svg>