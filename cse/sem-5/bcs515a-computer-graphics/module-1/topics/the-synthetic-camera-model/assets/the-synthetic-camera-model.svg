<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Synthetic Camera Model simulates real cameras in computer graphics. It enables rendering 3D scenes onto 2D displays by mathematically representing camera position, orientation, and viewing parameters.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">The Synthetic Camera Model</text>
  </g>
  
  <g class="step" id="step1" data-narration="Three essential parameters define a synthetic camera: COP (Center of Projection) is the camera position, Look-At is the focus point, and Up Vector specifies which direction is upward (typically Y-axis).">
    <rect x="10" y="58" width="780" height="100" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="30" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Camera Parameters</text>
    <rect x="30" y="95" width="220" height="50" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="140" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">COP (Position)</text>
    <text x="140" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Camera location in 3D</text>
    <rect x="270" y="95" width="220" height="50" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="380" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Look-At Point</text>
    <text x="380" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Target focus point</text>
    <rect x="510" y="95" width="220" height="50" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="620" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Up Vector</text>
    <text x="620" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(0, 1, 0) typically</text>
  </g>
  
  <g class="step" id="step2" data-narration="The camera coordinate system has three orthogonal vectors: U points right, V points up, and N points into the scene (viewing direction). These form an orthonormal basis representing camera orientation.">
    <rect x="10" y="166" width="780" height="100" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="30" y="188" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Camera Coordinate System</text>
    <line x1="100" y1="240" x2="200" y2="240" stroke="#ff9800" stroke-width="2"/>
    <polygon points="200,240 190,235 190,245" fill="#ff9800"/>
    <text x="155" y="230" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">U (Right)</text>
    <line x1="140" y1="200" x2="140" y2="260" stroke="#4caf50" stroke-width="2"/>
    <polygon points="140,200 135,210 145,210" fill="#4caf50"/>
    <text x="120" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#4caf50">V (Up)</text>
    <line x1="180" y1="190" x2="220" y2="250" stroke="#f44336" stroke-width="2"/>
    <polygon points="220,250 215,242 225,242" fill="#f44336"/>
    <text x="230" y="225" font-family="Arial" font-size="9" fill="#f44336">N (View Dir)</text>
    <text x="380" y="200" font-family="Arial" font-size="10" fill="#333">Orthonormal Basis:</text>
    <text x="380" y="218" font-family="Arial" font-size="9" fill="#666">U • V = U • N = V • N = 0</text>
    <text x="380" y="233" font-family="Arial" font-size="9" fill="#666">|U| = |V| = |N| = 1</text>
    <text x="380" y="250" font-family="Arial" font-size="10" fill="#333">Forms 3×3 Rotation Matrix</text>
  </g>
  
  <g class="step" id="step3" data-narration="Field of View (FOV) determines visible scene width, calculated as height equals 2 times near distance times tangent of FOV divided by 2. Near and far planes clip objects outside the viewing range.">
    <rect x="10" y="274" width="780" height="100" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="30" y="296" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">FOV &amp; Clipping Planes</text>
    <path d="M100,340 L200,320 L200,360 L100,340" fill="none" stroke="#9c27b0" stroke-width="2"/>
    <line x1="100" y1="340" x2="160" y2="300" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="120" y="315" font-family="Arial" font-size="9" fill="#f44336">FOV</text>
    <text x="210" y="325" font-family="Arial" font-size="9" fill="#333">Near Plane (dₙ)</text>
    <text x="210" y="345" font-family="Arial" font-size="9" fill="#333">Clips closest objects</text>
    <line x1="250" y1="300" x2="250" y2="380" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="255" y="340" font-family="Arial" font-size="9" fill="#388e3c">Far Plane (d𝑓)</text>
    <text x="255" y="355" font-family="Arial" font-size="9" fill="#388e3c">Clips farthest objects</text>
    <rect x="400" y="310" width="340" height="55" rx="3" fill="#fff" stroke="#9c27b0"/>
    <text x="570" y="330" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">FOV Formula</text>
    <text x="570" y="348" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">height = 2 × dₙ × tan(FOV/2)</text>
    <text x="570" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Typical FOV: 60° - 90°</text>
  </g>
  
  <g class="step" id="step4" data-narration="Viewing transformation converts world coordinates to camera coordinates by positioning camera at origin. Projection transformation then maps 3D camera coordinates to 2D device coordinates for display.">
    <rect x="10" y="382" width="780" height="100" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="30" y="404" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Viewing &amp; Projection Transformations</text>
    <rect x="30" y="420" width="220" height="50" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="140" y="440" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Viewing Transform</text>
    <text x="140" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">World → Camera Space</text>
    <polygon points="255,445 265,445 260,455" fill="#1976d2"/>
    <rect x="270" y="420" width="220" height="50" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="380" y="440" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Projection Transform</text>
    <text x="380" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Camera → 2D Screen</text>
    <rect x="520" y="420" width="260" height="50" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="650" y="438" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Perspective vs Orthographic</text>
    <text x="650" y="456" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Frustum vs Parallelepiped</text>
  </g>
  
  <g class="step" id="step5" data-narration="The viewing frustum is the visible volume defined by near plane, far plane, FOV, and aspect ratio. Perspective frustum is a truncated pyramid; orthographic is a rectangular box. Objects inside are rendered.">
    <rect x="10" y="490" width="780" height="98" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="30" y="512" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">The Viewing Frustum</text>
    <path d="M150,550 L120,500 L180,500 L150,550" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="150" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Perspective</text>
    <text x="150" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Truncated Pyramid</text>
    <rect x="250" y="505" width="60" height="45" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="280" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Ortho</text>
    <text x="280" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Box</text>
    <text x="380" y="520" font-family="Arial" font-size="10" fill="#333">Key Properties:</text>
    <text x="380" y="538" font-family="Arial" font-size="9" fill="#666">• Defined by: FOV, Aspect Ratio, Near, Far</text>
    <text x="380" y="552" font-family="Arial" font-size="9" fill="#666">• Objects outside are clipped (culled)</text>
    <text x="380" y="566" font-family="Arial" font-size="9" fill="#666">• Large Near/Far ratio causes z-fighting</text>
    <rect x="550" y="510" width="220" height="65" rx="3" fill="#fff" stroke="#f44336"/>
    <text x="660" y="532" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Application Areas</text>
    <text x="660" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Games, CAD, VR,</text>
    <text x="660" y="564" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Scientific Visualization</text>
  </g>
</svg>