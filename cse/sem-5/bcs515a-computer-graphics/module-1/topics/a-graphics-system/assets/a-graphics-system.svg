<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers computer graphics system components including display devices, input devices, hard copy devices, and graphics software standards used in modern computing applications.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0d47a1">Computer Graphics System - Components Overview</text>
  </g>

  <!-- step1: Video Display Devices -->
  <g class="step" id="step1" data-narration="Video display devices convert digital data to visual form. Key types include CRT using electron beams, LCD using liquid crystals, Plasma using ionized gas, and LED displays.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#0d47a1">1. Video Display Devices</text>
    <rect x="40" y="85" width="160" height="45" rx="3" fill="#bbdefb"/>
    <text x="120" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">CRT</text>
    <text x="120" y="112" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Electron beams</text>
    <text x="120" y="122" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Phosphor screen</text>
    <rect x="215" y="85" width="160" height="45" rx="3" fill="#bbdefb"/>
    <text x="295" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">LCD</text>
    <text x="295" y="112" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Liquid crystals</text>
    <text x="295" y="122" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Backlight</text>
    <rect x="390" y="85" width="160" height="45" rx="3" fill="#bbdefb"/>
    <text x="470" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Plasma</text>
    <text x="470" y="112" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Ionized gas cells</text>
    <text x="470" y="122" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">UV light phosphors</text>
    <rect x="565" y="85" width="160" height="45" rx="3" fill="#bbdefb"/>
    <text x="645" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">LED</text>
    <text x="645" y="112" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">LED backlight</text>
    <text x="645" y="122" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Energy efficient</text>
  </g>

  <!-- step2: Input Devices -->
  <g class="step" id="step2" data-narration="Input devices include keyboard and mouse for basic input, graphics tablets for precise coordinate input used in CAD, touch screens for direct interaction, and 3D input devices.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20">2. Input Devices</text>
    <rect x="40" y="173" width="110" height="45" rx="3" fill="#c8e6c9"/>
    <text x="95" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Keyboard</text>
    <text x="95" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Alphanumeric input</text>
    <text x="95" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Function keys</text>
    <rect x="165" y="173" width="110" height="45" rx="3" fill="#c8e6c9"/>
    <text x="220" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Mouse</text>
    <text x="220" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Pointing device</text>
    <text x="220" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Click, drag ops</text>
    <rect x="290" y="173" width="110" height="45" rx="3" fill="#c8e6c9"/>
    <text x="345" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Graphics Tablet</text>
    <text x="345" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Digitizer</text>
    <text x="345" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Precision CAD input</text>
    <rect x="415" y="173" width="110" height="45" rx="3" fill="#c8e6c9"/>
    <text x="470" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Touch Screen</text>
    <text x="470" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Direct input</text>
    <text x="470" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Resistive/Capacitive</text>
    <rect x="540" y="173" width="110" height="45" rx="3" fill="#c8e6c9"/>
    <text x="595" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Light Pen</text>
    <text x="595" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Photoelectric</text>
    <text x="595" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Screen pointing</text>
    <rect x="665" y="173" width="105" height="45" rx="3" fill="#c8e6c9"/>
    <text x="717" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">3D Devices</text>
    <text x="717" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Spaceball</text>
    <text x="717" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Data glove</text>
  </g>

  <!-- step3: Hard Copy Devices -->
  <g class="step" id="step3" data-narration="Hard copy devices produce permanent output. Impact printers use mechanical striking while non-impact printers like inkjet and laser use ink or toner without contact.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">3. Hard Copy Devices</text>
    <rect x="40" y="261" width="110" height="45" rx="3" fill="#ffe0b2"/>
    <text x="95" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Impact Printer</text>
    <text x="95" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">Dot matrix</text>
    <text x="95" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">Mechanical strike</text>
    <rect x="165" y="261" width="110" height="45" rx="3" fill="#ffe0b2"/>
    <text x="220" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Inkjet Printer</text>
    <text x="220" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">Sprays ink droplets</text>
    <text x="220" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">300-2400 DPI</text>
    <rect x="290" y="261" width="110" height="45" rx="3" fill="#ffe0b2"/>
    <text x="345" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Laser Printer</text>
    <text x="345" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">Toner + EP process</text>
    <text x="345" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">300-1200 DPI</text>
    <rect x="415" y="261" width="110" height="45" rx="3" fill="#ffe0b2"/>
    <text x="470" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Plotter</text>
    <text x="470" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">Large format</text>
    <text x="470" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">Vector output CAD</text>
    <rect x="540" y="261" width="110" height="45" rx="3" fill="#ffe0b2"/>
    <text x="595" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Screen Capture</text>
    <text x="595" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">Software based</text>
    <text x="595" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">PNG, JPEG, BMP</text>
    <rect x="665" y="261" width="105" height="45" rx="3" fill="#ffe0b2"/>
    <text x="717" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Thermal Wax</text>
    <text x="717" y="288" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">Wax-based ribbon</text>
    <text x="717" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="#ef6c00">High color saturation</text>
  </g>

  <!-- step4: Graphics Software -->
  <g class="step" id="step4" data-narration="Graphics software includes system software like GDI, OpenGL, and DirectX for rendering, along with application software like paint programs and CAD tools for creating graphics.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#4a148c">4. Graphics Software</text>
    <rect x="40" y="350" width="160" height="45" rx="3" fill="#e1bee7"/>
    <text x="120" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">GDI</text>
    <text x="120" y="377" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Windows graphics</text>
    <text x="120" y="387" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Device-independent</text>
    <rect x="215" y="350" width="160" height="45" rx="3" fill="#e1bee7"/>
    <text x="295" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">OpenGL</text>
    <text x="295" y="377" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Cross-platform 3D</text>
    <text x="295" y="387" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Hardware-accelerated</text>
    <rect x="390" y="350" width="160" height="45" rx="3" fill="#e1bee7"/>
    <text x="470" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">DirectX</text>
    <text x="470" y="377" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Microsoft multimedia</text>
    <text x="470" y="387" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Direct3D, DirectDraw</text>
    <rect x="565" y="350" width="160" height="45" rx="3" fill="#e1bee7"/>
    <text x="645" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Paint Programs</text>
    <text x="645" y="377" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Bitmap editing</text>
    <text x="645" y="387" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Photoshop, GIMP</text>
  </g>

  <!-- step5: Graphics Standards -->
  <g class="step" id="step5" data-narration="Graphics standards include GKS for 2D graphics (ISO standard), PHIGS for 3D hierarchical modeling, and CGI for device-level interface connecting graphics systems with hardware.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#e0f7fa" stroke="#00acc1" stroke-width="1"/>
    <text x="40" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#006064">5. Graphics Standards</text>
    <rect x="40" y="438" width="220" height="45" rx="3" fill="#b2ebf2"/>
    <text x="150" y="453" text-anchor="middle" font-family="Arial" font-size="10" fill="#006064">GKS (Graphical Kernel System)</text>
    <text x="150" y="466" text-anchor="middle" font-family="Arial" font-size="7" fill="#00838f">ISO 7942 standard</text>
    <text x="150" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#00838f">2D graphics, device-independent</text>
    <rect x="275" y="438" width="220" height="45" rx="3" fill="#b2ebf2"/>
    <text x="385" y="453" text-anchor="middle" font-family="Arial" font-size="10" fill="#006064">PHIGS</text>
    <text x="385" y="466" text-anchor="middle" font-family="Arial" font-size="7" fill="#00838f">3D capability</text>
    <text x="385" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#00838f">Hierarchical object structure</text>
    <rect x="510" y="438" width="260" height="45" rx="3" fill="#b2ebf2"/>
    <text x="640" y="453" text-anchor="middle" font-family="Arial" font-size="10" fill="#006064">CGI (Computer Graphics Interface)</text>
    <text x="640" y="466" text-anchor="middle" font-family="Arial" font-size="7" fill="#00838f">Device-level interface</text>
    <text x="640" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#00838f">Connects system with devices</text>
  </g>
</svg>