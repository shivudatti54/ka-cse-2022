<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers performance metrics like execution time, throughput, CPI, MIPS, and MFLOPS, along with key formulas, Amdahl's Law, and practical examples.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Performance Characteristics of Computer Systems</text>
  </g>
  
  <g class="step" id="step1" data-narration="Execution time represents the total time to complete a task, including CPU processing, I/O operations, and wait periods. Throughput measures how many tasks can be finished per unit time.">
    <rect x="20" y="58" width="760" height="100" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. Performance Metrics</text>
    <rect x="40" y="95" width="220" height="50" fill="#e3f2fd" rx="3"/>
    <text x="150" y="115" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Execution Time</text>
    <text x="150" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Total time to complete task</text>
    <rect x="270" y="95" width="220" height="50" fill="#e8f5e9" rx="3"/>
    <text x="380" y="115" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Throughput</text>
    <text x="380" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Tasks per unit time</text>
    <rect x="500" y="95" width="260" height="50" fill="#f3e5f5" rx="3"/>
    <text x="630" y="115" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">CPI</text>
    <text x="630" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cycles Per Instruction</text>
  </g>
  
  <g class="step" id="step2" data-narration="The fundamental performance equation calculates Execution Time as the product of Instruction Count, CPI, and Clock Cycle Time, or equivalently divided by Clock Rate.">
    <rect x="20" y="166" width="760" height="100" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="188" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">2. Performance Equation</text>
    <rect x="40" y="205" width="720" height="50" fill="#fff3e0" rx="3"/>
    <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Execution Time = IC × CPI × Clock Cycle Time</text>
    <text x="400" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">or equivalently: Execution Time = (IC × CPI) / Clock Rate</text>
  </g>
  
  <g class="step" id="step3" data-narration="Amdahl's Law calculates maximum speedup: Speedup equals one over one minus f plus f over k, where f is the improved fraction.">
    <rect x="20" y="274" width="760" height="100" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="296" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">3. Amdahl's Law</text>
    <rect x="40" y="315" width="350" height="50" fill="#ffebee" rx="3"/>
    <text x="215" y="340" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Speedup = 1 / [(1-f) + f/k]</text>
    <rect x="400" y="315" width="360" height="50" fill="#e3f2fd" rx="3"/>
    <text x="580" y="330" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">f = fraction improved</text>
    <text x="580" y="345" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">k = improvement factor</text>
  </g>
  
  <g class="step" id="step4" data-narration="For a 2.5 GHz processor executing 500 million instructions with CPI 2.0, the execution time calculates to 0.4 seconds using the performance equation.">
    <rect x="20" y="382" width="760" height="100" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="404" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">4. Example: Execution Time Calculation</text>
    <rect x="40" y="420" width="720" height="52" fill="#e8f5e9" rx="3"/>
    <text x="50" y="438" font-family="Arial" font-size="10" fill="#333">Given: Clock Rate = 2.5 GHz, Instructions = 500M, CPI = 2.0</text>
    <text x="50" y="455" font-family="Arial" font-size="10" fill="#333">Clock Cycle = 1/2.5GHz = 0.4 ns</text>
    <text x="400" y="455" text-anchor="end" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Execution Time = 0.4 seconds</text>
  </g>
  
  <g class="step" id="step5" data-narration="Applying Amdahl's Law to optimize 40 percent of a 100-second program with 5x speedup yields a new execution time of 68 seconds and overall speedup.">
    <rect x="20" y="490" width="760" height="98" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="512" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">5. Example: Amdahl's Law Application</text>
    <rect x="40" y="530" width="720" height="50" fill="#f3e5f5" rx="3"/>
    <text x="50" y="548" font-family="Arial" font-size="10" fill="#333">Given: Original Time = 100s, f = 0.4 (40%), k = 5</text>
    <text x="50" y="565" font-family="Arial" font-size="10" fill="#333">New Time = 100 × [(1-0.4) + 0.4/5] = 100 × 0.68 = 68s</text>
    <text x="400" y="565" text-anchor="end" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Speedup = 1.47×</text>
  </g>
</svg>