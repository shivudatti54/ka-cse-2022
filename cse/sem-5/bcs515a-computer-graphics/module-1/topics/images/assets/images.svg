<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Digital image fundamentals covers image representation, pixel relationships, types, formats, and storage calculations essential for computer science engineering course students.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Digital Image Fundamentals</text>
  </g>
  
  <g class="step" id="step1" data-narration="A digital image is a 2D function f(x,y) where x,y are coordinates and f is intensity. Sampling discretizes coordinates while quantization discretizes intensity values.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Image Definition &amp; Formation</text>
    <rect x="40" y="88" width="220" height="42" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="150" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">f(x,y)</text>
    <text x="150" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">2D Function</text>
    <path d="M265 109 L280 109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="290" y="105" font-family="Arial" font-size="9" fill="#1976d2">Sampling</text>
    <text x="290" y="118" font-family="Arial" font-size="8" fill="#666">Discretize x,y</text>
    <path d="M380 109 L395 109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="405" y="105" font-family="Arial" font-size="9" fill="#ff9800">Quantization</text>
    <text x="405" y="118" font-family="Arial" font-size="8" fill="#666">Discretize f(x,y)</text>
    <rect x="500" y="88" width="265" height="42" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="632" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">256 levels = 8-bit</text>
    <text x="632" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">0 to 255 gray levels</text>
  </g>
  
  <g class="step" id="step2" data-narration="Pixel neighborhoods define spatial relationships: 4-neighbors share edges at north, south, east, and west positions. 8-neighbors include all eight surrounding pixels including diagonal connections.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Pixel Neighborhoods</text>
    <rect x="40" y="180" width="150" height="38" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="115" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">4-Neighborhood</text>
    <text x="115" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Edge-sharing</text>
    <circle cx="115" cy="200" r="3" fill="#388e3c"/>
    <rect x="115" y="183" width="12" height="12" fill="none" stroke="#388e3c" stroke-width="1" rx="1"/>
    <rect x="200" y="180" width="150" height="38" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="275" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">8-Neighborhood</text>
    <text x="275" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Edge + Corner</text>
    <circle cx="275" cy="200" r="3" fill="#9c27b0"/>
    <rect x="268" y="183" width="14" height="14" fill="none" stroke="#9c27b0" stroke-width="1" rx="1"/>
    <rect x="400" y="180" width="180" height="38" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="490" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Connectivity Types</text>
    <text x="490" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">4-connectivity, 8-connectivity</text>
    <rect x="600" y="180" width="165" height="38" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="682" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Pixel = Picture Element</text>
    <text x="682" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Smallest unit in image</text>
  </g>
  
  <g class="step" id="step3" data-narration="Image types include grayscale with 8-bit depth and 256 intensity levels, binary with 1-bit and just two levels, and full color RGB images using 24-bit depth for millions of colors.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Image Types</text>
    <rect x="40" y="268" width="160" height="40" rx="3" fill="white" stroke="#666" stroke-width="1"/>
    <rect x="50" y="278" width="20" height="20" fill="#888"/>
    <text x="80" y="292" font-family="Arial" font-size="9" fill="#333">Grayscale</text>
    <text x="150" y="292" font-family="Arial" font-size="8" fill="#666">8-bit</text>
    <rect x="210" y="268" width="160" height="40" rx="3" fill="white" stroke="#666" stroke-width="1"/>
    <rect x="220" y="278" width="20" height="20" fill="black"/>
    <text x="250" y="292" font-family="Arial" font-size="9" fill="#333">Binary</text>
    <text x="320" y="292" font-family="Arial" font-size="8" fill="#666">1-bit</text>
    <rect x="380" y="268" width="180" height="40" rx="3" fill="white" stroke="#666" stroke-width="1"/>
    <rect x="390" y="278" width="6" height="20" fill="#f44336"/>
    <rect x="399" y="278" width="6" height="20" fill="#388e3c"/>
    <rect x="408" y="278" width="6" height="20" fill="#1976d2"/>
    <text x="430" y="292" font-family="Arial" font-size="9" fill="#333">Color (RGB)</text>
    <text x="510" y="292" font-family="Arial" font-size="8" fill="#666">24-bit</text>
    <rect x="570" y="268" width="195" height="40" rx="3" fill="white" stroke="#666" stroke-width="1"/>
    <text x="667" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Multispectral</text>
    <text x="667" y="298" font-family="Arial" font-size="8" fill="#666">Multiple spectral bands</text>
  </g>
  
  <g class="step" id="step4" data-narration="Common image formats: JPEG uses lossy compression for photos, PNG uses lossless for graphics, BMP stores uncompressed data, GIF supports animation with 256 colors.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Image File Formats</text>
    <rect x="40" y="356" width="110" height="40" rx="3" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="95" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">JPEG</text>
    <text x="95" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Lossy</text>
    <rect x="160" y="356" width="110" height="40" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="215" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">PNG</text>
    <text x="215" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Lossless</text>
    <rect x="280" y="356" width="110" height="40" rx="3" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="335" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">BMP</text>
    <text x="335" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Uncompressed</text>
    <rect x="400" y="356" width="110" height="40" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="455" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">GIF</text>
    <text x="455" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">256 colors</text>
    <rect x="520" y="356" width="110" height="40" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="575" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">TIFF</text>
    <text x="575" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Lossless</text>
    <rect x="640" y="356" width="125" height="40" rx="3" fill="white" stroke="#666" stroke-width="1"/>
    <text x="702" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Use Case</text>
    <text x="702" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Photos/Graphics</text>
  </g>
  
  <g class="step" id="step5" data-narration="Storage formula: M x N x b bytes where MxN is dimensions and b is bytes per pixel. For 1024x768 grayscale image: 1024 x 768 x 1 = 768 KB.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Storage Calculation Example</text>
    <rect x="40" y="444" width="350" height="40" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="215" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1024 x 768 grayscale image</text>
    <text x="215" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">1024 × 768 × 1 byte = 768 KB</text>
    <rect x="400" y="444" width="180" height="40" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="490" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">500x500 color image</text>
    <text x="490" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">750 KB (3 bytes/pixel)</text>
    <rect x="590" y="444" width="175" height="40" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="677" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Quantization to 16 levels</text>
    <text x="677" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">4 bits/pixel, 2:1 ratio</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam points to remember include the f(x,y) definition, distinguishing sampling from quantization, understanding 4-neighbor versus 8-neighbor pixel relationships, and practicing storage calculation formulas.">
    <rect x="20" y="498" width="760" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Exam Tips &amp; Key Formulas</text>
    <rect x="40" y="530" width="145" height="47" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="112" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Storage</text>
    <text x="112" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">M × N × b bytes</text>
    <text x="112" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">b = bytes/pixel</text>
    <rect x="195" y="530" width="145" height="47" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="267" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Intensity Levels</text>
    <text x="267" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">2^n for n-bit image</text>
    <text x="267" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">8-bit = 256 levels</text>
    <rect x="350" y="530" width="145" height="47" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="422" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Nyquist Theorem</text>
    <text x="422" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Sampling freq ≥ 2×</text>
    <text x="422" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">highest freq</text>
    <rect x="505" y="530" width="145" height="47" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="577" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Gray Range</text>
    <text x="577" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">0 to (L-1)</text>
    <text x="577" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">L = levels</text>
    <rect x="660" y="530" width="105" height="47" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="712" y="543" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Remember</text>
    <text x="712" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">JPEG = Lossy</text>
    <text x="712" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">PNG = Lossless</text>
  </g>
</svg>