<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Welcome to the topic of Applications of Computer Graphics. We will explore how computer graphics transforms industries from entertainment to medicine.">
    <rect x="0" y="0" width="800" height="48" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Applications of Computer Graphics</text>
  </g>

  <g class="step" id="step1" data-narration="The entertainment industry uses computer graphics for films and video games. CGI creates fantastical worlds in movies while game engines render interactive experiences in real-time.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="82" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Entertainment Industry</text>
    <rect x="40" y="95" width="170" height="35" fill="#1976d2" rx="4"/>
    <text x="125" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">CGI in Films</text>
    <rect x="220" y="95" width="170" height="35" fill="#1976d2" rx="4"/>
    <text x="305" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Video Games</text>
    <rect x="400" y="95" width="170" height="35" fill="#90caf9" rx="4"/>
    <text x="485" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Real-time Rendering</text>
    <text x="40" y="128" font-family="Arial" font-size="9" fill="#555">Pixar, Disney, Unity, Unreal Engine</text>
  </g>

  <g class="step" id="step2" data-narration="CAD software helps engineers create precise digital models before building physical prototypes. This reduces costs and improves product quality across automotive, aerospace, and architecture industries.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="170" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Computer-Aided Design (CAD)</text>
    <rect x="40" y="183" width="150" height="35" fill="#388e3c" rx="4"/>
    <text x="115" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Digital Prototyping</text>
    <rect x="200" y="183" width="150" height="35" fill="#388e3c" rx="4"/>
    <text x="275" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Parametric Modeling</text>
    <rect x="360" y="183" width="150" height="35" fill="#a5d6a7" rx="4"/>
    <text x="435" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Virtual Testing</text>
    <text x="40" y="216" font-family="Arial" font-size="9" fill="#555">AutoCAD, SolidWorks, CATIA for design</text>
  </g>

  <g class="step" id="step3" data-narration="Scientific visualization converts complex data into visual forms. Scientists use it to study weather patterns, molecular structures, and climate change, making discoveries across all research fields.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="258" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Scientific Visualization</text>
    <rect x="40" y="271" width="140" height="35" fill="#ff9800" rx="4"/>
    <text x="110" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Weather Forecasting</text>
    <rect x="190" y="271" width="140" height="35" fill="#ff9800" rx="4"/>
    <text x="260" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Molecular Modeling</text>
    <rect x="340" y="271" width="140" height="35" fill="#ffcc80" rx="4"/>
    <text x="410" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Climate Analysis</text>
    <text x="40" y="304" font-family="Arial" font-size="9" fill="#555">Visualizes data from simulations and sensors</text>
  </g>

  <g class="step" id="step4" data-narration="Computer graphics transforms education through interactive simulations and virtual training. Flight simulators, virtual labs, and 3D models make learning engaging, safe, and cost-effective.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="346" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Education and Training</text>
    <rect x="40" y="359" width="140" height="35" fill="#f44336" rx="4"/>
    <text x="110" y="376" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Flight Simulators</text>
    <rect x="190" y="359" width="140" height="35" fill="#f44336" rx="4"/>
    <text x="260" y="376" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Virtual Labs</text>
    <rect x="340" y="359" width="140" height="35" fill="#ffcdd2" rx="4"/>
    <text x="410" y="376" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">3D Models</text>
    <text x="40" y="392" font-family="Arial" font-size="9" fill="#555">Safe, cost-effective learning environments</text>
  </g>

  <g class="step" id="step5" data-narration="Graphical User Interfaces make computers accessible to everyone. Windowing systems, icons, menus, and web graphics create intuitive ways for users to interact with technology.">
    <rect x="20" y="410" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="434" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">User Interfaces and Web Graphics</text>
    <rect x="40" y="447" width="130" height="35" fill="#9c27b0" rx="4"/>
    <text x="105" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="white">GUI Design</text>
    <rect x="180" y="447" width="130" height="35" fill="#9c27b0" rx="4"/>
    <text x="245" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Web Graphics</text>
    <rect x="320" y="447" width="130" height="35" fill="#ce93d8" rx="4"/>
    <text x="385" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Interactive UI</text>
    <text x="40" y="480" font-family="Arial" font-size="9" fill="#555">WIMP: Windows, Icons, Menus, Pointers</text>
  </g>

  <g class="step" id="step6" data-narration="GIS and Medical Imaging complete our overview. GIS helps urban planners and navigators, while medical graphics enable 3D reconstructions from CT and MRI scans for diagnosis.">
    <rect x="20" y="498" width="760" height="90" fill="#e0f7fa" rx="8"/>
    <text x="40" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#00838f">GIS and Medical Imaging</text>
    <rect x="40" y="535" width="140" height="35" fill="#00838f" rx="4"/>
    <text x="110" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Geographic Systems</text>
    <rect x="190" y="535" width="140" height="35" fill="#00838f" rx="4"/>
    <text x="260" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Urban Planning</text>
    <rect x="340" y="535" width="140" height="35" fill="#4dd0e1" rx="4"/>
    <text x="410" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="#006064">3D Medical Scan</text>
    <rect x="490" y="535" width="140" height="35" fill="#4dd0e1" rx="4"/>
    <text x="560" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="#006064">Surgical Planning</text>
    <text x="40" y="578" font-family="Arial" font-size="9" fill="#555">Navigation, environmental tracking, CT/MRI reconstruction</text>
  </g>
</svg>