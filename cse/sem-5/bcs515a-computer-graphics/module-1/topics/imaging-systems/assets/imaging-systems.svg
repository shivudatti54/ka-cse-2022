<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Imaging Systems. This topic covers how digital images are captured, processed, stored, and represented for computer vision applications.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Imaging Systems</text>
  </g>
  
  <g class="step" id="step1" data-narration="A digital imaging system has four main components: Acquisition captures the scene, Processing enhances or analyzes, Storage holds the data, and Display renders output.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Components of Imaging System</text>
    <rect x="25" y="85" width="170" height="45" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="110" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Acquisition</text>
    <text x="110" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Optics + Sensors</text>
    <rect x="205" y="85" width="170" height="45" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="290" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Processing</text>
    <text x="290" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Enhance + Analyze</text>
    <rect x="385" y="85" width="170" height="45" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="470" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Storage</text>
    <text x="470" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">BMP, JPEG, PNG</text>
    <rect x="565" y="85" width="170" height="45" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="650" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Display</text>
    <text x="650" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Monitors, Printers</text>
  </g>
  
  <g class="step" id="step2" data-narration="Digital image formation requires two essential steps: Sampling discretizes spatial coordinates to create pixels, while Quantization discretizes intensity values into discrete levels.">
    <rect x="10" y="146" width="780" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Sampling and Quantization</text>
    <rect x="25" y="175" width="350" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="200" y="188" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Sampling</text>
    <text x="200" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Spatial discretization - converts continuous scene to discrete pixels</text>
    <text x="200" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Determines: M × N (Spatial Resolution)</text>
    <rect x="385" y="175" width="350" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="560" y="188" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Quantization</text>
    <text x="560" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Amplitude discretization - assigns intensity levels</text>
    <text x="560" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Determines: Bit Depth (2^b levels)</text>
  </g>
  
  <g class="step" id="step3" data-narration="A digital image is a matrix of intensity values. Grayscale uses 8 bits per pixel (0-255), while color RGB uses 24 bits (8 bits each for R, G, B).">
    <rect x="10" y="234" width="780" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Digital Image Representation</text>
    <rect x="25" y="263" width="200" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="125" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Grayscale Image</text>
    <text x="125" y="292" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Matrix of values 0-255</text>
    <text x="125" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">8-bit, 1 byte/pixel</text>
    <rect x="235" y="263" width="200" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="335" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Color Image (RGB)</text>
    <text x="335" y="292" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Three channels: R, G, B</text>
    <text x="335" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">24-bit, 3 bytes/pixel</text>
    <rect x="445" y="263" width="200" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="545" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Matrix Notation</text>
    <text x="545" y="292" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">f(x,y) = intensity at row x, column y</text>
    <text x="545" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">M × N resolution</text>
    <rect x="655" y="263" width="100" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="705" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Example</text>
    <text x="705" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">512×512</text>
  </g>
  
  <g class="step" id="step4" data-narration="Pixel neighborhoods define spatial relationships. The 4-neighborhood includes north, south, east, west neighbors. The 8-neighborhood includes all eight surrounding pixels.">
    <rect x="10" y="322" width="780" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Pixel Neighborhoods</text>
    <rect x="25" y="352" width="280" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="165" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">4-Neighborhood</text>
    <text x="165" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(x+1,y), (x-1,y), (x,y+1), (x,y-1)</text>
    <text x="165" y="391" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">N, S, E, W only</text>
    <rect x="315" y="352" width="280" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="455" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">8-Neighborhood</text>
    <text x="455" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">All four cardinal + four diagonal neighbors</text>
    <text x="455" y="391" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">N, S, E, W, NE, NW, SE, SW</text>
    <rect x="605" y="352" width="150" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="680" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Connectivity</text>
    <text x="680" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">4-adjacency or 8-adjacency</text>
    <text x="680" y="391" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Based on similarity</text>
  </g>
  
  <g class="step" id="step5" data-narration="Common image formats include BMP for uncompressed storage, JPEG for lossy compression of photos, and PNG for lossless graphics with transparency.">
    <rect x="10" y="410" width="780" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="25" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Image File Formats</text>
    <rect x="25" y="440" width="170" height="42" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="110" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">BMP</text>
    <text x="110" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Uncompressed</text>
    <text x="110" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Large file size</text>
    <rect x="205" y="440" width="170" height="42" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="290" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">JPEG</text>
    <text x="290" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Lossy compression</text>
    <text x="290" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Best for photographs</text>
    <rect x="385" y="440" width="170" height="42" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="470" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">PNG</text>
    <text x="470" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Lossless compression</text>
    <text x="470" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Transparency support</text>
    <rect x="565" y="440" width="170" height="42" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="650" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">GIF</text>
    <text x="650" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Lossless, 256 colors</text>
    <text x="650" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Animation support</text>
  </g>
  
  <g class="step" id="step6" data-narration="Storage calculation formula: Bytes equals pixels multiplied by bit depth divided by eight. A 1024×1024 grayscale image needs one megabyte of storage.">
    <rect x="10" y="498" width="780" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Storage Calculation Example</text>
    <rect x="25" y="528" width="740" height="52" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="35" y="545" font-family="Arial" font-size="10" fill="#1976d2">Formula:</text>
    <text x="90" y="545" font-family="Arial" font-size="10" fill="#666">Storage (bytes) = (M × N × bit_depth) / 8</text>
    <text x="35" y="562" font-family="Arial" font-size="9" fill="#1976d2">Example: 1024×1024 grayscale = (1024×1024×8)/8 = 1,048,576 bytes = 1 MB</text>
    <text x="35" y="575" font-family="Arial" font-size="9" fill="#1976d2">24-bit 640×480 color = (640×480×24)/8 = 921,600 bytes ≈ 0.88 MB</text>
  </g>
</svg>