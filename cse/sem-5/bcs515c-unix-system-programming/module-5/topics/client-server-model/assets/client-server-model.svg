<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="The Client-Server model divides computing responsibilities between clients that request services and servers that provide them efficiently across computer networks.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Client-Server Model</text>
  </g>
  
  <!-- Step 1: Basic Definition -->
  <g class="step" id="step1" data-narration="A client initiates requests while a server listens and responds. Communication uses a request-response pattern over a network using protocols.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Basic Definition</text>
    <rect x="40" y="88" width="180" height="40" fill="#ffffff" stroke="#1976d2" rx="3"/>
    <text x="130" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">CLIENT</text>
    <text x="130" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Requests services</text>
    <rect x="580" y="88" width="180" height="40" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="670" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">SERVER</text>
    <text x="670" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Provides services</text>
    <line x1="220" y1="108" x2="570" y2="108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="400" y="104" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Request-Response</text>
  </g>
  
  <!-- Step 2: Types of Servers -->
  <g class="step" id="step2" data-narration="Servers are categorized by function: web servers deliver HTTP content, database servers manage data, file servers store files, mail servers handle email.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Types of Servers</text>
    <rect x="40" y="180" width="135" height="36" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="107" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Web Server</text>
    <text x="107" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">HTTP/HTTPS:80/443</text>
    <rect x="185" y="180" width="135" height="36" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="252" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Database Server</text>
    <text x="252" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">MySQL, PostgreSQL</text>
    <rect x="330" y="180" width="135" height="36" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="397" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">File Server</text>
    <text x="397" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Centralized storage</text>
    <rect x="475" y="180" width="135" height="36" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="542" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Mail Server</text>
    <text x="542" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">SMTP, POP3, IMAP</text>
    <rect x="620" y="180" width="150" height="36" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="695" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Application Server</text>
    <text x="695" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Tomcat, JBoss, IIS</text>
  </g>
  
  <!-- Step 3: Architectures -->
  <g class="step" id="step3" data-narration="Two-tier has direct client-server communication while three-tier adds an application layer between client and database for better scalability and maintainability.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Client-Server Architectures</text>
    <rect x="40" y="268" width="220" height="40" fill="#ffffff" stroke="#ff9800" rx="3"/>
    <text x="150" y="284" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">Two-Tier Architecture</text>
    <text x="150" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Client → Server (Direct)</text>
    <rect x="290" y="268" width="220" height="40" fill="#ffffff" stroke="#ff9800" rx="3"/>
    <text x="400" y="284" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">Three-Tier Architecture</text>
    <text x="400" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Client → App Server → Database</text>
    <rect x="540" y="268" width="230" height="40" fill="#ffffff" stroke="#ff9800" rx="3"/>
    <text x="655" y="284" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">N-Tier Architecture</text>
    <text x="655" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Multiple layers for enterprise</text>
  </g>
  
  <!-- Step 4: Protocols and Status Codes -->
  <g class="step" id="step4" data-narration="HTTP handles web communication, FTP transfers files, SMTP sends email, POP3/IMAP receive email. Servers return status codes indicating request outcomes.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Communication Protocols</text>
    <rect x="40" y="356" width="140" height="40" fill="#ffffff" stroke="#9c27b0" rx="3"/>
    <text x="110" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">HTTP/HTTPS</text>
    <text x="110" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Web: 80/443</text>
    <rect x="190" y="356" width="100" height="40" fill="#ffffff" stroke="#9c27b0" rx="3"/>
    <text x="240" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">FTP</text>
    <text x="240" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Files: 20/21</text>
    <rect x="300" y="356" width="100" height="40" fill="#ffffff" stroke="#9c27b0" rx="3"/>
    <text x="350" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">SMTP</text>
    <text x="350" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Send: 25</text>
    <rect x="410" y="356" width="100" height="40" fill="#ffffff" stroke="#9c27b0" rx="3"/>
    <text x="460" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">POP3</text>
    <text x="460" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Receive: 110</text>
    <rect x="520" y="356" width="100" height="40" fill="#ffffff" stroke="#9c27b0" rx="3"/>
    <text x="570" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">IMAP</text>
    <text x="570" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Receive: 143</text>
    <rect x="640" y="356" width="130" height="40" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="705" y="368" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336" font-weight="bold">HTTP Status Codes</text>
    <text x="705" y="382" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">200 OK | 404 Not Found | 500 Error</text>
  </g>
  
  <!-- Step 5: Advantages and Disadvantages -->
  <g class="step" id="step5" data-narration="Advantages include centralized resource management, scalability, and efficient resource sharing while disadvantages include server failure impact and network latency issues.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Advantages and Disadvantages</text>
    <rect x="40" y="444" width="340" height="40" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="60" y="458" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">✓ Advantages:</text>
    <text x="60" y="472" font-family="Arial" font-size="8" fill="#666">Centralized management • Scalability • Efficient resource sharing • Better security</text>
    <rect x="400" y="444" width="370" height="40" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="420" y="458" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">✗ Disadvantages:</text>
    <text x="420" y="472" font-family="Arial" font-size="8" fill="#666">Server failure affects all clients • Network latency • Security vulnerabilities</text>
  </g>
  
  <!-- Step 6: Real-World Examples -->
  <g class="step" id="step6" data-narration="Web browsing: Browser requests page from web server. Email: Client sends via SMTP server. Database: App server handles business logic between client and database.">
    <rect x="20" y="498" width="760" height="90" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Real-World Examples</text>
    <rect x="40" y="532" width="220" height="48" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="150" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Web Browsing</text>
    <text x="150" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Browser ↔ Web Server</text>
    <text x="150" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">HTTP GET → 200 OK</text>
    <rect x="290" y="532" width="220" height="48" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="400" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Email System</text>
    <text x="400" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Email Client ↔ Mail Server</text>
    <text x="400" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">SMTP (send) / POP3/IMAP (receive)</text>
    <rect x="540" y="532" width="230" height="48" fill="#ffffff" stroke="#388e3c" rx="3"/>
    <text x="655" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Banking Application</text>
    <text x="655" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Mobile App ↔ App Server ↔ DB</text>
    <text x="655" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Three-tier architecture</text>
  </g>
</svg>