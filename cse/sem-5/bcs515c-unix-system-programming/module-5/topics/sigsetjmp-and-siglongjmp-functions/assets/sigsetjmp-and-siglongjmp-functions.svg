<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1360">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; font-size: 11px; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 18px; }
    .body-text { font-family: Arial, sans-serif; font-size: 10px; }
    .label { font-family: Arial, sans-serif; font-size: 9px; font-weight: bold; }
  </style>
  
  <rect width="800" height="1360" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to sigsetjmp and siglongjmp - powerful functions for non-local jumps with signal handling in UNIX systems.">
    <rect x="50" y="10" width="700" height="45" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" class="title-text">sigsetjmp and siglongjmp Functions</text>
    <text x="400" y="52" text-anchor="middle" fill="#666" font-size="10">Non-Local Jumps with Signal Mask Support in POSIX</text>
  </g>
  
  <!-- Step 1: Introduction - Why do we need these functions? -->
  <g class="step" id="step1" data-narration="Basic setjmp and longjmp cannot handle signal masks properly, leading to unexpected behavior in signal handlers.">
    <rect x="30" y="65" width="740" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="85" fill="#1565c0" class="label">WHY DO WE NEED sigsetjmp/siglongjmp?</text>
    <text x="50" y="102" fill="#333" class="body-text" font-size="11">Problem: Basic setjmp/longjmp don't preserve signal masks during non-local jumps.</text>
    <text x="50" y="118" fill="#333" class="body-text" font-size="11">When a signal handler calls longjmp, blocked signals may become unblocked unexpectedly,</text>
    <text x="50" y="134" fill="#333" class="body-text" font-size="11">causing unpredictable behavior in your program.</text>
  </g>
  
  <!-- Step 2: Comparison Overview -->
  <g class="step" id="step2" data-narration="sigsetjmp and siglongjmp solve this by explicitly saving and restoring the signal mask during jumps.">
    <rect x="30" y="160" width="360" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="50" y="180" fill="#c62828" class="label">setjmp/longjmp (Basic)</text>
    <text x="50" y="198" fill="#333" class="body-text">• Cannot save/restore signal masks</text>
    <text x="50" y="214" fill="#333" class="body-text">• ISO C standard</text>
    <text x="50" y="230" fill="#333" class="body-text">• Not safe in signal handlers</text>
    
    <rect x="410" y="160" width="360" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="430" y="180" fill="#2e7d32" class="label">sigsetjmp/siglongjmp (Enhanced)</text>
    <text x="430" y="198" fill="#333" class="body-text">• Can save/restore signal masks</text>
    <text x="430" y="214" fill="#333" class="body-text">• POSIX standard</text>
    <text x="430" y="230" fill="#333" class="body-text">• Safe for signal handlers</text>
  </g>
  
  <!-- Step 3: sigjmp_buf Data Type -->
  <g class="step" id="step3" data-narration="sigjmp_buf is a special buffer type that stores execution context including the program counter, stack pointer, and optionally the signal mask.">
    <rect x="30" y="260" width="740" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="50" y="285" fill="#6a1b9a" class="label">sigjmp_buf - The Environment Buffer</text>
    <rect x="50" y="300" width="200" height="30" rx="5" fill="#fff" stroke="#9c27b0"/>
    <text x="150" y="320" text-anchor="middle" class="formula" fill="#333">sigjmp_buf buffer;</text>
    <text x="270" y="310" fill="#333" class="body-text">Stores:</text>
    <text x="270" y="326" fill="#333" class="body-text">• Program Counter (PC)</text>
    <text x="400" y="326" fill="#333" class="body-text">• Stack Pointer (SP)</text>
    <text x="530" y="326" fill="#333" class="body-text">• Signal Mask (optional)</text>
  </g>
  
  <!-- Step 4: sigsetjmp Function -->
  <g class="step" id="step4" data-narration="sigsetjmp saves the current execution environment. It returns 0 when first called, and returns the value from siglongjmp on jump.">
    <rect x="30" y="360" width="740" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="385" fill="#1565c0" class="label">sigsetjmp() Function</text>
    <rect x="50" y="405" width="350" height="30" rx="5" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <text x="225" y="425" text-anchor="middle" class="formula" fill="#1565c0" font-size="13">int sigsetjmp(sigjmp_buf env, int savesigs)</text>
    <text x="420" y="415" fill="#333" class="body-text" font-size="11">Returns: int</text>
    <text x="420" y="432" fill="#333" class="body-text" font-size="11">0 = direct call</text>
    <text x="560" y="432" fill="#333" class="body-text" font-size="11">non-zero = from siglongjmp</text>
  </g>
  
  <!-- Step 5: sigsetjmp Parameters -->
  <g class="step" id="step5" data-narration="The sigsetjmp function takes two parameters: env for the buffer and savesigs to control signal mask saving.">
    <rect x="30" y="460" width="365" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="485" fill="#1565c0" class="label">Parameter 1: env</text>
    <text x="50" y="505" fill="#333" class="body-text">sigjmp_buf variable where</text>
    <text x="50" y="521" fill="#333" class="body-text">environment is saved</text>
    <rect x="180" y="500" width="80" height="25" rx="4" fill="#fff" stroke="#1565c0"/>
    <text x="220" y="516" text-anchor="middle" class="formula" font-size="10">env</text>
    
    <rect x="405" y="460" width="365" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="425" y="485" fill="#e65100" class="label">Parameter 2: savesigs</text>
    <text x="425" y="505" fill="#333" class="body-text">Flag controlling signal mask:</text>
    <text x="425" y="525" fill="#333" class="body-text">• Non-zero → Save signal mask</text>
    <text x="565" y="525" fill="#333" class="body-text">• Zero → Don't save</text>
  </g>
  
  <!-- Step 6: siglongjmp Function -->
  <g class="step" id="step6" data-narration="siglongjmp restores the execution context saved by sigsetjmp, including optional signal mask restoration.">
    <rect x="30" y="560" width="740" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="585" fill="#2e7d32" class="label">siglongjmp() Function</text>
    <rect x="50" y="605" width="350" height="30" rx="5" fill="#fff" stroke="#388e3c" stroke-width="2"/>
    <text x="225" y="625" text-anchor="middle" class="formula" fill="#2e7d32" font-size="13">void siglongjmp(sigjmp_buf env, int val)</text>
    <text x="420" y="615" fill="#333" class="body-text" font-size="11">Returns: void</text>
    <text x="420" y="635" fill="#333" class="body-text" font-size="11">Restores PC, SP, and optionally signal mask</text>
  </g>
  
  <!-- Step 7: siglongjmp Parameters -->
  <g class="step" id="step7" data-narration="siglongjmp takes the environment buffer and a value that sigsetjmp will return to distinguish the jump.">
    <rect x="30" y="660" width="365" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="685" fill="#2e7d32" class="label">Parameter 1: env</text>
    <text x="50" y="705" fill="#333" class="body-text">Buffer containing saved</text>
    <text x="50" y="721" fill="#333" class="body-text">environment (from sigsetjmp)</text>
    <rect x="180" y="700" width="80" height="25" rx="4" fill="#fff" stroke="#2e7d32"/>
    <text x="220" y="716" text-anchor="middle" class="formula" font-size="10">env</text>
    
    <rect x="405" y="660" width="365" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="425" y="685" fill="#c62828" class="label">Parameter 2: val</text>
    <text x="425" y="705" fill="#333" class="body-text">Value that sigsetjmp returns</text>
    <text x="425" y="721" fill="#333" class="body-text">(typically non-zero to indicate jump)</text>
    <rect x="580" y="698" width="60" height="25" rx="4" fill="#fff" stroke="#c62828"/>
    <text x="610" y="714" text-anchor="middle" class="formula" font-size="10">val</text>
  </g>
  
  <!-- Step 8: savesigs Parameter Deep Dive -->
  <g class="step" id="step8" data-narration="The savesigs parameter is crucial - it controls whether the signal mask is saved when sigsetjmp is called.">
    <rect x="30" y="760" width="740" height="90" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="50" y="785" fill="#e65100" class="label">The savesigs Parameter - Key Concept!</text>
    <rect x="50" y="800" width="240" height="40" rx="6" fill="#fff" stroke="#ff9800" stroke-width="2"/>
    <text x="170" y="820" text-anchor="middle" class="formula" fill="#333">sigsetjmp(env, 1)</text>
    <text x="170" y="835" text-anchor="middle" fill="#666" font-size="9">savesigs = 1</text>
    <path d="M300,815 L340,815" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="350" y="820" fill="#333" class="body-text">Signal mask SAVED</text>
    <text x="350" y="838" fill="#333" class="body-text">siglongjmp will restore it</text>
    
    <rect x="420" y="800" width="240" height="40" rx="6" fill="#fff" stroke="#ff9800" stroke-width="2"/>
    <text x="540" y="820" text-anchor="middle" class="formula" fill="#333">sigsetjmp(env, 0)</text>
    <text x="540" y="835" text-anchor="middle" fill="#666" font-size="9">savesigs = 0</text>
    <path d="M670,815 L710,815" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)" opacity="0"/>
    <text x="430" y="860" fill="#333" class="body-text">Signal mask NOT saved</text>
    <text x="430" y="840" fill="#333" class="body-text">Behavior like basic setjmp</text>
  </g>
  
  <!-- Step 9: Double Return Behavior -->
  <g class="step" id="step9" data-narration="sigsetjmp returns TWICE - first with value 0 (initial call), then with the value from siglongjmp.">
    <rect x="30" y="865" width="740" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="890" fill="#1565c0" class="label">sigsetjmp Returns TWICE!</text>
    <rect x="50" y="910" width="220" height="30" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="160" y="930" text-anchor="middle" class="body-text" fill="#1565c0">First Call → Returns 0</text>
    <path d="M290,925 L320,925" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="340" y="905" width="220" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="450" y="925" text-anchor="middle" class="body-text" fill="#1565c0">After siglongjmp</text>
    <text x="450" y="940" text-anchor="middle" class="body-text" fill="#1565c0">Returns val (non-zero)</text>
    <text x="600" y="920" fill="#333" class="body-text">Distinguish using:</text>
    <text x="600" y="938" fill="#333" class="body-text">if (ret == 0) { ... }</text>
  </g>
  
  <!-- Step 10: Control Flow Diagram -->
  <g class="step" id="step10" data-narration="This diagram shows how control flows from sigsetjmp to signal handler to siglongjmp and back.">
    <rect x="30" y="965" width="740" height="90" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="990" fill="#2e7d32" class="label">Control Flow Visualization</text>
    <!-- Flow diagram -->
    <rect x="60" y="1005" width="100" height="35" rx="5" fill="#fff" stroke="#388e3c"/>
    <text x="110" y="1027" text-anchor="middle" class="body-text" fill="#2e7d32">sigsetjmp(env,1)</text>
    <path d="M160,1022 L190,1022" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="200" y="1005" width="80" height="35" rx="5" fill="#fff" stroke="#388e3c"/>
    <text x="240" y="1027" text-anchor="middle" class="body-text" fill="#2e7d32">returns 0</text>
    <path d="M280,1022 L310,1022" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="320" y="1005" width="80" height="35" rx="5" fill="#fff" stroke="#ff9800"/>
    <text x="360,1027" text-anchor="middle" class="body-text" fill="#e65100">raise(SIG)</text>
    <path d="M400,1022 L430,1022" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="440" y="1005" width="100" height="35" rx="5" fill="#fff" stroke="#c62828"/>
    <text x="490,1027" text-anchor="middle" class="body-text" fill="#c62828">handler calls</text>
    <text x="490,1040" text-anchor="middle" class="body-text" fill="#c62828">siglongjmp</text>
    <path d="M540,1022 L570,1022" stroke="#c62828" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="580" y="1005" width="80" height="35" rx="5" fill="#fff" stroke="#1976d2"/>
    <text x="620,1027" text-anchor="middle" class="body-text" fill="#1565c0">sigsetjmp</text>
    <text x="620,1040" text-anchor="middle" class="body-text" fill="#1565c0">returns val</text>
  </g>
  
  <!-- Step 11: Important Considerations -->
  <g class="step" id="step11" data-narration="Key considerations: use volatile for variables changed between calls, keep sigjmp_buf in scope, and never call siglongjmp with blocked signal.">
    <rect x="30" y="1070" width="740" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="50" y="1095" fill="#c62828" class="label">Important Considerations</text>
    <rect x="50" y="1110" width="230" height="35" rx="5" fill="#fff" stroke="#c62828"/>
    <text x="165" y="1130" text-anchor="middle" class="body-text" fill="#c62828">volatile qualifier</text>
    <text x="165" y="1142" text-anchor="middle" font-size="9" fill="#666">for modified variables</text>
    
    <rect x="290" y="1110" width="230" height="35" rx="5" fill="#fff" stroke="#c62828"/>
    <text x="405" y="1130" text-anchor="middle" class="body-text" fill="#c62828">sigjmp_buf scope</text>
    <text x="405" y="1142" text-anchor="middle" font-size="9" fill="#666">must remain valid</text>
    
    <rect x="530" y="1110" width="230" height="35" rx="5" fill="#fff" stroke="#c62828"/>
    <text x="645" y="1130" text-anchor="middle" class="body-text" fill="#c62828">No blocked signal</text>
    <text x="645" y="1142" text-anchor="middle" font-size="9" fill="#666">in handler's signal</text>
  </g>
  
  <!-- Step 12: Example Code -->
  <g class="step" id="step12" data-narration="Here's a practical example showing sigsetjmp saving the environment and siglongjmp restoring it from a signal handler.">
    <rect x="30" y="1170" width="740" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="50" y="1195" fill="#6a1b9a" class="label">Code Example</text>
    <rect x="50" y="1210" width="350" height="35" rx="5" fill="#222" stroke="#6a1b9a"/>
    <text x="60" y="1228" class="formula" fill="#4caf50" font-size="10">sigjmp_buf jump_buffer;</text>
    <rect x="410" y="1210" width="350" height="35" rx="5" fill="#222" stroke="#6a1b9a"/>
    <text x="420" y="1228" class="formula" fill="#4caf50" font-size="10">int ret = sigsetjmp(jump_buffer, 1);</text>
    <text x="50" y="1258" fill="#333" class="body-text" font-size="10">if (ret == 0) { // First time - normal execution }</text>
    <text x="300" y="1258" fill="#333" class="body-text" font-size="10">else { // Returned from siglongjmp }</text>
  </g>
  
  <!-- Step 13: Summary -->
  <g class="step" id="step13" data-narration="In summary: sigsetjmp saves context with optional signal mask, siglongjmp restores it, and the savesigs parameter controls mask preservation.">
    <rect x="30" y="1270" width="740" height="75" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="1295" text-anchor="middle" fill="white" class="label" font-size="12">Summary</text>
    <text x="100" y="1315" fill="#e3f2fd" class="body-text" font-size="10">sigsetjmp(env, savesigs) → saves PC, SP,</text>
    <text x="280" y="1315" fill="#e3f2fd" class="body-text" font-size="10">siglongjmp(env, val) → restores all</text>
    <text x="520" y="1315" fill="#e3f2fd" class="body-text" font-size="10">savesigs=1: save mask</text>
    <text x="650" y="1335" fill="#e3f2fd" class="body-text" font-size="10">savesigs=0: don't save</text>
  </g>
</svg>