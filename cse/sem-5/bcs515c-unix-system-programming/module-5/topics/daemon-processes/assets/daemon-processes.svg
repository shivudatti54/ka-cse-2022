<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="A daemon process is a background-running system service that operates independently of user sessions from computer boot until shutdown cleanly.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Daemon Processes in Unix/Linux</text>
  </g>
  
  <g class="step" id="step1" data-narration="A daemon runs completely detached from any controlling terminal, has init or systemd as its parent process, and typically operates with elevated system privileges.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is a Daemon Process?</text>
    <rect x="40" y="98" width="160" height="30" fill="#1976d2" rx="4"/>
    <text x="120" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Background Service</text>
    <rect x="210" y="98" width="160" height="30" fill="#388e3c" rx="4"/>
    <text x="290" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="white">No Controlling TTY</text>
    <rect x="380" y="98" width="160" height="30" fill="#ff9800" rx="4"/>
    <text x="460" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Parent = init (PID 1)</text>
  </g>
  
  <g class="step" id="step2" data-narration="The first step calls fork() to create a child process, then the parent immediately exits. The second step calls setsid() to become session leader and detach from the terminal.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Steps 1-2: fork() and setsid()</text>
    <rect x="40" y="186" width="140" height="28" fill="#388e3c" rx="4"/>
    <text x="110" y="205" text-anchor="middle" font-family="Courier" font-size="11" fill="white">fork()</text>
    <rect x="200" y="186" width="100" height="28" fill="#e0e0e0" rx="4"/>
    <text x="250" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Create child</text>
    <rect x="320" y="186" width="130" height="28" fill="#f44336" rx="4"/>
    <text x="385" y="205" text-anchor="middle" font-family="Courier" font-size="11" fill="white">exit()</text>
    <rect x="470" y="186" width="140" height="28" fill="#e0e0e0" rx="4"/>
    <text x="540" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Parent exits</text>
    <rect x="630" y="186" width="140" height="28" fill="#9c27b0" rx="4"/>
    <text x="700" y="205" text-anchor="middle" font-family="Courier" font-size="11" fill="white">setsid()</text>
  </g>
  
  <g class="step" id="step3" data-narration="Step three performs a second fork to prevent the daemon from ever acquiring a controlling terminal, ensuring complete and permanent detachment from any terminal device.">
    <rect x="20" y="234" width="760" height="100" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Step 3: Second fork() - Recommended</text>
    <rect x="40" y="276" width="320" height="26" fill="#ff9800" rx="4"/>
    <text x="200" y="295" text-anchor="middle" font-family="Courier" font-size="11" fill="white">fork() // Second fork</text>
    <rect x="380" y="276" width="280" height="26" fill="#e0e0e0" rx="4"/>
    <text x="520" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Prevents acquiring controlling terminal</text>
    <text x="40" y="320" font-family="Arial" font-size="9" fill="#666">Why? Second child cannot open a new controlling terminal since it is not a session leader.</text>
  </g>
  
  <g class="step" id="step4" data-narration="Step four changes working directory to root to prevent blocking filesystem unmounts. Step five closes standard streams for complete isolation.">
    <rect x="20" y="342" width="760" height="110" fill="#f3e5f5" rx="8"/>
    <text x="40" y="364" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Steps 4-5: chdir() and close file descriptors</text>
    <rect x="40" y="382" width="160" height="26" fill="#9c27b0" rx="4"/>
    <text x="120" y="401" text-anchor="middle" font-family="Courier" font-size="11" fill="white">chdir("/")</text>
    <rect x="210" y="382" width="180" height="26" fill="#e0e0e0" rx="4"/>
    <text x="300" y="401" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Change to root dir</text>
    <rect x="400" y="382" width="180" height="26" fill="#e0e0e0" rx="4"/>
    <text x="490" y="401" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Prevents fs lock</text>
    <rect x="590" y="382" width="180" height="26" fill="#f44336" rx="4"/>
    <text x="680" y="401" text-anchor="middle" font-family="Courier" font-size="11" fill="white">close(0,1,2)</text>
    <rect x="40" y="418" width="160" height="26" fill="#e0e0e0" rx="4"/>
    <text x="120" y="437" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Close stdin/out/err</text>
  </g>
  
  <g class="step" id="step5" data-narration="Step six sets umask to zero for proper file permissions. This completes the daemon creation sequence F-S-F-C-C-U: Fork, Session, Fork, Chdir, Close, Umask.">
    <rect x="20" y="460" width="760" height="120" fill="#e1f5fe" rx="8"/>
    <text x="40" y="482" font-family="Arial" font-size="14" font-weight="bold" fill="#0288d1">Step 6: umask(0) and Summary</text>
    <rect x="40" y="502" width="140" height="24" fill="#0288d1" rx="4"/>
    <text x="110" y="520" text-anchor="middle" font-family="Courier" font-size="10" fill="white">umask(0)</text>
    <rect x="190" y="502" width="220" height="24" fill="#e0e0e0" rx="4"/>
    <text x="300" y="520" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Set file creation mask to 0</text>
    <rect x="420" y="502" width="160" height="24" fill="#388e3c" rx="4"/>
    <text x="500" y="520" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Examples: cron</text>
    <text x="40" y="550" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Memory Aid: F-S-F-C-C-U</text>
    <text x="40" y="568" font-family="Arial" font-size="9" fill="#666">Fork → Session → Fork → Chdir → Close → Umask</text>
  </g>
</svg>