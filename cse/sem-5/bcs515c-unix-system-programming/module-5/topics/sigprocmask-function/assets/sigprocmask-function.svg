<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The sigprocmask function allows processes to examine and modify their signal mask, which controls which signals can interrupt the process.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Signal Masking with sigprocmask() Function</text>
  </g>
  
  <g class="step" id="step1" data-narration="A signal mask is a set of blocked signals. Blocked signals remain pending until unblocked, protecting critical code sections from interruption.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">What is a Signal Mask?</text>
    <rect x="40" y="88" width="340" height="42" fill="#c8e6c9" rx="3"/>
    <text x="50" y="102" font-family="Courier" font-size="10" fill="#1b5e20">Signal Mask = Set of blocked signals</text>
    <text x="50" y="118" font-family="Arial" font-size="9" fill="#1b5e20">• Blocked signals cannot interrupt process</text>
    <text x="50" y="130" font-family="Arial" font-size="9" fill="#1b5e20">• Blocked signals remain PENDING until unblocked</text>
    <rect x="400" y="88" width="360" height="42" fill="#c8e6c9" rx="3"/>
    <text x="410" y="102" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Process Signal Mask</text>
    <text x="410" y="116" font-family="Arial" font-size="9" fill="#1b5e20">Inherited by child via fork()</text>
    <text x="410" y="128" font-family="Arial" font-size="9" fill="#1b5e20">Each thread has its own mask</text>
  </g>
  
  <g class="step" id="step2" data-narration="The sigprocmask function takes three parameters: how specifies the operation, set defines signals to modify, and oldset stores the previous mask.">
    <rect x="20" y="146" width="760" height="89" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Function Prototype</text>
    <rect x="40" y="178" width="440" height="40" fill="#bbdefb" rx="3"/>
    <text x="50" y="195" font-family="Courier" font-size="11" fill="#0d47a1">int sigprocmask(int how, const sigset_t *set, sigset_t *oldset);</text>
    <text x="500" y="185" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Parameters:</text>
    <text x="500" y="200" font-family="Arial" font-size="9" fill="#1565c0">• how   - Operation: SIG_BLOCK, SIG_UNBLOCK, SIG_SETMASK</text>
    <text x="500" y="214" font-family="Arial" font-size="9" fill="#1565c0">• set   - Signal set (can be NULL)</text>
    <text x="500" y="228" font-family="Arial" font-size="9" fill="#1565c0">• oldset - Stores previous mask (can be NULL)</text>
  </g>
  
  <g class="step" id="step3" data-narration="SIG_BLOCK adds signals to the mask, SIG_UNBLOCK removes signals, and SIG_SETMASK completely replaces the current mask with a new set.">
    <rect x="20" y="243" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="263" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">The 'how' Parameter - Three Operations</text>
    <rect x="40" y="277" width="230" height="40" fill="#ffe0b2" rx="3"/>
    <text x="50" y="291" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">SIG_BLOCK</text>
    <text x="50" y="305" font-family="Arial" font-size="9" fill="#e65100">Add signals TO current mask</text>
    <rect x="285" y="277" width="230" height="40" fill="#ffe0b2" rx="3"/>
    <text x="295" y="291" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">SIG_UNBLOCK</text>
    <text x="295" y="305" font-family="Arial" font-size="9" fill="#e65100">Remove signals FROM mask</text>
    <rect x="530" y="277" width="230" height="40" fill="#ffcc80" rx="3"/>
    <text x="540" y="291" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">SIG_SETMASK</text>
    <text x="540" y="305" font-family="Arial" font-size="9" fill="#e65100">REPLACE mask with new set</text>
  </g>
  
  <g class="step" id="step4" data-narration="Use sigemptyset to create empty sets, sigfillset for all signals, sigaddset to add signals, and sigdelset to remove signals from a set.">
    <rect x="20" y="331" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="351" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Signal Set Operations</text>
    <rect x="40" y="365" width="180" height="40" fill="#e1bee7" rx="3"/>
    <text x="50" y="379" font-family="Courier" font-size="9" fill="#4a148c">sigemptyset(&amp;set)</text>
    <text x="50" y="393" font-family="Arial" font-size="8" fill="#4a148c">→ Initialize empty set</text>
    <rect x="235" y="365" width="180" height="40" fill="#e1bee7" rx="3"/>
    <text x="245" y="379" font-family="Courier" font-size="9" fill="#4a148c">sigfillset(&amp;set)</text>
    <text x="245" y="393" font-family="Arial" font-size="8" fill="#4a148c">→ Initialize full set (all)</text>
    <rect x="430" y="365" width="180" height="40" fill="#e1bee7" rx="3"/>
    <text x="440" y="379" font-family="Courier" font-size="9" fill="#4a148c">sigaddset(&amp;set, sig)</text>
    <text x="440" y="393" font-family="Arial" font-size="8" fill="#4a148c">→ Add signal to set</text>
    <rect x="625" y="365" width="135" height="40" fill="#e1bee7" rx="3"/>
    <text x="635" y="379" font-family="Courier" font-size="9" fill="#4a148c">sigdelset(&amp;set, sig)</text>
    <text x="635" y="393" font-family="Arial" font-size="8" fill="#4a148c">→ Remove signal</text>
  </g>
  
  <g class="step" id="step5" data-narration="This example creates a signal set, adds SIGINT, blocks it using sigprocmask, then restores the old mask to unblock the signal.">
    <rect x="20" y="419" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="439" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Example: Blocking SIGINT Signal</text>
    <rect x="40" y="453" width="360" height="40" fill="#ffcdd2" rx="3"/>
    <text x="50" y="467" font-family="Courier" font-size="9" fill="#b71c1c">sigset_t newmask, oldmask;</text>
    <text x="50" y="481" font-family="Courier" font-size="9" fill="#b71c1c">sigemptyset(&amp;newmask);</text>
    <text x="50" y="491" font-family="Courier" font-size="9" fill="#b71c1c">sigaddset(&amp;newmask, SIGINT);</text>
    <rect x="420" y="453" width="360" height="40" fill="#ffcdd2" rx="3"/>
    <text x="430" y="467" font-family="Courier" font-size="9" fill="#b71c1c">sigprocmask(SIG_BLOCK, &amp;newmask, &amp;oldmask);</text>
    <text x="430" y="481" font-family="Courier" font-size="9" fill="#b71c1c">// SIGINT blocked for 5 seconds</text>
    <text x="430" y="491" font-family="Courier" font-size="9" fill="#b71c1c">sigprocmask(SIG_SETMASK, &amp;oldmask, NULL);</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key points: SIGKILL and SIGSTOP cannot be blocked. Returns 0 on success, -1 on error. Child processes inherit the parent's signal mask.">
    <rect x="20" y="507" width="760" height="85" fill="#e0f2f1" stroke="#00796b" stroke-width="1" rx="5"/>
    <text x="40" y="527" font-family="Arial" font-size="12" font-weight="bold" fill="#004d40">Important Characteristics &amp; Exam Tips</text>
    <rect x="40" y="539" width="230" height="48" fill="#b2dfdb" rx="3"/>
    <text x="50" y="553" font-family="Arial" font-size="9" font-weight="bold" fill="#004d40">Return Value:</text>
    <text x="50" y="567" font-family="Courier" font-size="9" fill="#004d40">0 = Success, -1 = Error</text>
    <text x="50" y="581" font-family="Arial" font-size="8" fill="#004d40">Check errno (e.g., EINVAL)</text>
    <rect x="285" y="539" width="230" height="48" fill="#b2dfdb" rx="3"/>
    <text x="295" y="553" font-family="Arial" font-size="9" font-weight="bold" fill="#004d40">Cannot Block:</text>
    <text x="295" y="567" font-family="Courier" font-size="9" fill="#004d40">SIGKILL, SIGSTOP</text>
    <text x="295" y="581" font-family="Arial" font-size="8" fill="#004d40">These always interrupt</text>
    <rect x="530" y="539" width="230" height="48" fill="#b2dfdb" rx="3"/>
    <text x="540" y="553" font-family="Arial" font-size="9" font-weight="bold" fill="#004d40">Inheritance:</text>
    <text x="540" y="567" font-family="Arial" font-size="9" fill="#004d40">Child inherits mask via fork()</text>
    <text x="540" y="581" font-family="Arial" font-size="8" fill="#004d40">Each thread has own mask</text>
  </g>
</svg>