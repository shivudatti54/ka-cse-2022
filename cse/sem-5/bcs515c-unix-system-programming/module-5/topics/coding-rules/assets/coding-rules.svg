<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Coding Rules and Standards. This module covers essential guidelines for writing maintainable, readable, and professional code that scales well in production environments.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Coding Rules and Standards</text>
  </g>
  
  <g class="step" id="step1" data-narration="Naming conventions use camelCase for variables like customerName, UPPER_SNAKE_CASE for constants like MAX_COUNT, and PascalCase for class names and objects throughout the codebase for consistency.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Naming Conventions</text>
    <rect x="40" y="88" width="220" height="42" fill="#bbdefb" rx="3"/>
    <text x="50" y="102" font-family="monospace" font-size="10" fill="#0d47a1">Variables: customerName</text>
    <text x="50" y="116" font-family="monospace" font-size="10" fill="#0d47a1">Constants: MAX_RETRY</text>
    <rect x="270" y="88" width="220" height="42" fill="#bbdefb" rx="3"/>
    <text x="280" y="102" font-family="monospace" font-size="10" fill="#0d47a1">Functions: calculateTotal()</text>
    <text x="280" y="116" font-family="monospace" font-size="10" fill="#0d47a1">validateInput()</text>
    <rect x="500" y="88" width="220" height="42" fill="#bbdefb" rx="3"/>
    <text x="510" y="102" font-family="monospace" font-size="10" fill="#0d47a1">Classes: CustomerAccount</text>
    <text x="510" y="116" font-family="monospace" font-size="10" fill="#0d47a1">PaymentProcessor</text>
  </g>
  
  <g class="step" id="step2" data-narration="Good documentation explains the why behind code decisions, not just what the code does. Comments should add meaningful context and value, never restating obvious code logic.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Code Documentation</text>
    <rect x="40" y="176" width="340" height="42" fill="#c8e6c9" rx="3"/>
    <text x="50" y="190" font-family="monospace" font-size="9" fill="#1b5e20">def calculate_total(price, qty):</text>
    <text x="50" y="204" font-family="monospace" font-size="9" fill="#1b5e20">    """Calculate order total."""</text>
    <rect x="390" y="176" width="340" height="42" fill="#ffebee" rx="3"/>
    <text x="400" y="190" font-family="monospace" font-size="9" fill="#b71c1c"># Bad: i++ # increment i</text>
    <text x="400" y="204" font-family="monospace" font-size="9" fill="#1b5e20"># Good: # Using cache for perf</text>
  </g>
  
  <g class="step" id="step3" data-narration="Code formatting uses consistent indentation, typically 4 spaces without tabs, with lines limited to under 120 characters for maximum readability across all editors and devices.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">3. Code Formatting</text>
    <rect x="40" y="264" width="160" height="42" fill="#ffe0b2" rx="3"/>
    <text x="50" y="278" font-family="monospace" font-size="10" fill="#e65100">Indentation: 4 spaces</text>
    <text x="50" y="292" font-family="monospace" font-size="10" fill="#e65100">No mixed tabs/spaces</text>
    <rect x="210" y="264" width="160" height="42" fill="#ffe0b2" rx="3"/>
    <text x="220" y="278" font-family="monospace" font-size="10" fill="#e65100">Line length: 80-120</text>
    <text x="220" y="292" font-family="monospace" font-size="10" fill="#e65100">characters max</text>
    <rect x="380" y="264" width="160" height="42" fill="#ffe0b2" rx="3"/>
    <text x="390" y="278" font-family="monospace" font-size="10" fill="#e65100">Brace style: K&amp;R</text>
    <text x="390" y="292" font-family="monospace" font-size="10" fill="#e65100">Consistent throughout</text>
    <rect x="550" y="264" width="180" height="42" fill="#ffe0b2" rx="3"/>
    <text x="560" y="278" font-family="monospace" font-size="10" fill="#e65100">Whitespace: blank lines</text>
    <text x="560" y="292" font-family="monospace" font-size="10" fill="#e65100">separate logical blocks</text>
  </g>
  
  <g class="step" id="step4" data-narration="Function design follows single responsibility: each function does one thing, has three or fewer parameters, and stays under thirty lines for better maintainability.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">4. Function Design Rules</text>
    <rect x="40" y="352" width="170" height="42" fill="#ffcdd2" rx="3"/>
    <text x="50" y="366" font-family="monospace" font-size="10" fill="#b71c1c">Single Responsibility</text>
    <text x="50" y="380" font-family="monospace" font-size="10" fill="#b71c1c">One task per function</text>
    <rect x="220" y="352" width="170" height="42" fill="#ffcdd2" rx="3"/>
    <text x="230" y="366" font-family="monospace" font-size="10" fill="#b71c1c">Max 3 Parameters</text>
    <text x="230" y="380" font-family="monospace" font-size="10" fill="#b71c1c">Use objects if more needed</text>
    <rect x="400" y="352" width="170" height="42" fill="#ffcdd2" rx="3"/>
    <text x="410" y="366" font-family="monospace" font-size="10" fill="#b71c1c">Small Size</text>
    <text x="410" y="380" font-family="monospace" font-size="10" fill="#b71c1c">Under 20-30 lines</text>
    <rect x="580" y="352" width="160" height="42" fill="#ffcdd2" rx="3"/>
    <text x="590" y="366" font-family="monospace" font-size="10" fill="#b71c1c">Avoid Side Effects</text>
    <text x="590" y="380" font-family="monospace" font-size="10" fill="#b71c1c">Pure functions preferred</text>
  </g>
  
  <g class="step" id="step5" data-narration="Error handling uses specific exception types with meaningful messages, validates all inputs early at entry points, and never silently catches or swallows errors without proper logging.">
    <rect x="20" y="410" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">5. Error Handling</text>
    <rect x="40" y="440" width="220" height="42" fill="#e1bee7" rx="3"/>
    <text x="50" y="454" font-family="monospace" font-size="10" fill="#4a148c">Specific Exception Types</text>
    <text x="50" y="468" font-family="monospace" font-size="9" fill="#4a148c">catch ValueError not Exception</text>
    <rect x="270" y="440" width="220" height="42" fill="#e1bee7" rx="3"/>
    <text x="280" y="454" font-family="monospace" font-size="10" fill="#4a148c">Fail Fast</text>
    <text x="280" y="468" font-family="monospace" font-size="9" fill="#4a148c">Validate inputs early</text>
    <rect x="500" y="440" width="230" height="42" fill="#e1bee7" rx="3"/>
    <text x="510" y="454" font-family="monospace" font-size="10" fill="#4a148c">Never Swallow Exceptions</text>
    <text x="510" y="468" font-family="monospace" font-size="9" fill="#4a148c">Log or rethrow errors</text>
  </g>
  
  <g class="step" id="step6" data-narration="Code modularity applies DRY principle, encapsulation, and loose coupling for flexible design. Security requires strict input validation and never storing hardcoded passwords or API keys.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Modularity &amp; Security</text>
    <rect x="40" y="530" width="145" height="50" fill="#bbdefb" rx="3"/>
    <text x="50" y="544" font-family="monospace" font-size="9" fill="#0d47a1">DRY Principle</text>
    <text x="50" y="558" font-family="monospace" font-size="9" fill="#0d47a1">Don't Repeat</text>
    <text x="50" y="570" font-family="monospace" font-size="9" fill="#0d47a1">Yourself</text>
    <rect x="195" y="530" width="145" height="50" fill="#bbdefb" rx="3"/>
    <text x="205" y="544" font-family="monospace" font-size="9" fill="#0d47a1">Encapsulation</text>
    <text x="205" y="558" font-family="monospace" font-size="9" fill="#0d47a1">Private data,</text>
    <text x="205" y="570" font-family="monospace" font-size="9" fill="#0d47a1">public methods</text>
    <rect x="350" y="530" width="145" height="50" fill="#bbdefb" rx="3"/>
    <text x="360" y="544" font-family="monospace" font-size="9" fill="#0d47a1">Loose Coupling</text>
    <text x="360" y="558" font-family="monospace" font-size="9" fill="#0d47a1">Minimize</text>
    <text x="360" y="570" font-family="monospace" font-size="9" fill="#0d47a1">dependencies</text>
    <rect x="505" y="530" width="145" height="50" fill="#bbdefb" rx="3"/>
    <text x="515" y="544" font-family="monospace" font-size="9" fill="#0d47a1">Input Validation</text>
    <text x="515" y="558" font-family="monospace" font-size="9" fill="#0d47a1">Never trust</text>
    <text x="515" y="570" font-family="monospace" font-size="9" fill="#0d47a1">user input</text>
    <rect x="660" y="530" width="100" height="50" fill="#bbdefb" rx="3"/>
    <text x="670" y="544" font-family="monospace" font-size="9" fill="#0d47a1">No hardcoded</text>
    <text x="670" y="558" font-family="monospace" font-size="9" fill="#0d47a1">passwords/</text>
    <text x="670" y="570" font-family="monospace" font-size="9" fill="#0d47a1">API keys</text>
  </g>
</svg>