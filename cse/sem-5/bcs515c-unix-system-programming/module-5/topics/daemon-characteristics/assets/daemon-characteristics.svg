<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This lesson covers daemon characteristics in Unix and Linux operating systems, explaining how background services work for system administrators in detail.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" fill="white" font-weight="bold">Daemon Characteristics in Unix/Linux</text>
  </g>
  
  <!-- step1: What is a Daemon -->
  <g class="step" id="step1" data-narration="A daemon is a background process running detached from any terminal, providing system services from boot until shutdown on systems.">
    <rect x="30" y="58" width="740" height="100" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="75" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">1. What is a Daemon?</text>
    <text x="50" y="92" font-family="Arial" font-size="10" fill="#333">
      <tspan x="50" dy="0">A daemon is a background process that runs continuously, detached from any controlling</tspan>
      <tspan x="50" dy="14">terminal. It provides essential system services like network communication, scheduling,</tspan>
      <tspan x="50" dy="14">logging, and printing. Daemons start at system boot and run until shutdown.</tspan>
    </text>
    <text x="50" y="140" font-family="Arial" font-size="9" fill="#666">Key: Detached from terminal | Runs continuously | Provides services to other processes</text>
  </g>
  
  <!-- step2: Six Essential Characteristics -->
  <g class="step" id="step2" data-narration="The six essential daemon characteristics are: no controlling terminal, parent is init, working directory is root, closed file descriptors, own session, and specific umask.">
    <rect x="30" y="166" width="740" height="100" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="183" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">2. Six Essential Characteristics</text>
    <text x="50" y="200" font-family="Arial" font-size="9" fill="#333">
      <tspan x="50" dy="0">1. No Controlling Terminal - Detached from any tty, immune to terminal signals</tspan>
      <tspan x="50" dy="12">2. Parent Process is init (PID 1) - Ensures proper orphan handling</tspan>
      <tspan x="50" dy="12">3. Working Directory "/" - Prevents blocking file system unmounts</tspan>
      <tspan x="50" dy="12">4. File Descriptors Closed - stdin, stdout, stderr redirected to /dev/null</tspan>
      <tspan x="50" dy="12">5. Own Session/Process Group - Created via setsid() for complete isolation</tspan>
      <tspan x="50" dy="12">6. Specific Umask - Controls file permissions for created files</tspan>
    </text>
  </g>
  
  <!-- step3: Implementation Steps -->
  <g class="step" id="step3" data-narration="The daemon creation uses six steps: fork and exit parent, create new session with setsid, fork again optionally, change directory to root, set umask to zero, and close standard file descriptors.">
    <rect x="30" y="274" width="740" height="100" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="291" font-family="Arial" font-size="12" fill="#ff9800" font-weight="bold">3. Daemon Implementation Steps (Double-Fork Technique)</text>
    <rect x="50" y="300" width="100" height="60" rx="3" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="100" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Step 1: fork()</text>
    <text x="100" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Parent exits</text>
    <text x="100" y="340" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Child continues</text>
    
    <line x1="150" y1="330" x2="170" y2="330" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    
    <rect x="170" y="300" width="100" height="60" rx="3" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="220" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Step 2: setsid()</text>
    <text x="220" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">New session</text>
    <text x="220" y="340" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">leader</text>
    
    <line x1="270" y1="330" x2="290" y2="330" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    
    <rect x="290" y="300" width="100" height="60" rx="3" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="340" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Step 3: fork()</text>
    <text x="340" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Optional)</text>
    <text x="340" y="340" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Prevents terminal</text>
    
    <line x1="390" y1="330" x2="410" y2="330" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    
    <rect x="410" y="300" width="100" height="60" rx="3" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="460" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Step 4: chdir("/")</text>
    <text x="460" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Root directory</text>
    <text x="460" y="340" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">prevents unmount block</text>
    
    <line x1="510" y1="330" x2="530" y2="330" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    
    <rect x="530" y="300" width="100" height="60" rx="3" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="580" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Step 5: umask(0)</text>
    <text x="580" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Set file</text>
    <text x="580" y="340" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">creation mask</text>
    
    <line x1="630" y1="330" x2="650" y2="330" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    
    <rect x="650" y="300" width="100" height="60" rx="3" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="700" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Step 6: close()</text>
    <text x="700" y="328" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">stdin, stdout,</text>
    <text x="700" y="340" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">stderr (fd 0,1,2)</text>
  </g>
  
  <!-- step4: Types and Examples -->
  <g class="step" id="step4" data-narration="There are three types of daemons: standalone running independently, transient started on-demand, and systemd services in modern Linux systems today.">
    <rect x="30" y="382" width="740" height="115" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="399" font-family="Arial" font-size="12" fill="#9c27b0" font-weight="bold">4. Types of Daemons and Common Examples</text>
    
    <rect x="50" y="410" width="220" height="65" rx="3" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
    <text x="160" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#e91e63" font-weight="bold">Standalone Daemons</text>
    <text x="160" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">httpd, sshd, ftpd</text>
    <text x="160" y="452" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Always running</text>
    <text x="160" y="464" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Manage own services</text>
    
    <rect x="290" y="410" width="220" height="65" rx="3" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
    <text x="400" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5" font-weight="bold">Transient Daemons</text>
    <text x="400" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">inetd, xinetd</text>
    <text x="400" y="452" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Started on-demand</text>
    <text x="400" y="464" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Terminate after task</text>
    
    <rect x="530" y="410" width="220" height="65" rx="3" fill="#e0f2f1" stroke="#00695c" stroke-width="1"/>
    <text x="640" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695c" font-weight="bold">Systemd Services</text>
    <text x="640" y="440" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Modern Linux</text>
    <text x="640" y="452" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Dependency handling</text>
    <text x="640" y="464" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Resource management</text>
    
    <text x="50" y="488" font-family="Arial" font-size="9" fill="#666">Common Examples: init(PID1), cron, atd, syslogd, cupsd, ntpd</text>
  </g>
  
  <!-- step5: Signal Handling and Key Points -->
  <g class="step" id="step5" data-narration="Daemons handle signals: SIGHUP triggers configuration reload, SIGTERM requests graceful shutdown, and SIGKILL forces immediate termination from the operating system.">
    <rect x="30" y="505" width="740" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="522" font-family="Arial" font-size="12" fill="#f44336" font-weight="bold">5. Signal Handling in Daemons</text>
    
    <rect x="50" y="532" width="200" height="50" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="150" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">SIGHUP</text>
    <text x="150" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Reload configuration</text>
    
    <rect x="270" y="532" width="200" height="50" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="370" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20" font-weight="bold">SIGTERM</text>
    <text x="370" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Graceful termination</text>
    
    <rect x="490" y="532" width="200" height="50" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="590" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c" font-weight="bold">SIGKILL</text>
    <text x="590" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Immediate termination</text>
    
    <text x="50" y="582" font-family="Arial" font-size="9" fill="#666">Note: Background process (started with &amp;) differs from daemon - it still has a controlling terminal</text>
  </g>
</svg>