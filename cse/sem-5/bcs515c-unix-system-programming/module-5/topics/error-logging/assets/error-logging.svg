<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Error Logging is the process of recording errors, exceptions, and significant events during program execution for debugging, system monitoring, and maintaining software reliability.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Error Logging</text>
  </g>
  
  <g class="step" id="step1" data-narration="Error logging captures detailed information like timestamps, error messages, stack traces, and context when failures occur in applications for effective troubleshooting and analysis.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Error Logging?</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">Recording information about errors, exceptions, and events during program execution.</text>
    <text x="40" y="118" font-family="Arial" font-size="10" fill="#333">Purpose: Debugging, system monitoring, and maintaining software reliability.</text>
    <rect x="580" y="75" width="180" height="50" rx="3" fill="#1976d2"/>
    <text x="670" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">Error Log</text>
    <text x="670" y="112" text-anchor="middle" font-family="Courier" font-size="8" fill="#e3f2fd">[TIME] ERROR: msg</text>
  </g>
  
  <g class="step" id="step2" data-narration="A complete error log entry includes multiple important fields such as timestamp, log level, error message, exception type, stack trace, and context information.">
    <rect x="20" y="151" width="760" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="173" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Components of Error Log Entry</text>
    <rect x="40" y="185" width="100" height="35" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="90" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Timestamp</text>
    <text x="90" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">2024-01-15 10:30:45</text>
    <rect x="150" y="185" width="100" height="35" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="200" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Log Level</text>
    <text x="200" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">ERROR</text>
    <rect x="260" y="185" width="130" height="35" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="325" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Error Message</text>
    <text x="325" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Failed to open file</text>
    <rect x="400" y="185" width="130" height="35" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="465" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Stack Trace</text>
    <text x="465" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">at main() line 42</text>
    <rect x="540" y="185" width="120" height="35" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="600" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Context Info</text>
    <text x="600" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">UserID, SessionID</text>
  </g>
  
  <g class="step" id="step3" data-narration="The logging levels hierarchy ranges from most detailed to least: TRACE, DEBUG, INFO, WARNING, ERROR, and CRITICAL indicating severity of issues found in software.">
    <rect x="20" y="244" width="760" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="266" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Logging Levels</text>
    <rect x="40" y="280" width="105" height="38" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="92" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">TRACE</text>
    <text x="92" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Most detailed</text>
    <line x1="145" y1="299" x2="165" y2="299" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="170" y="280" width="105" height="38" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="222" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">DEBUG</text>
    <text x="222" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Debug info</text>
    <line x1="275" y1="299" x2="295" y2="299" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="300" y="280" width="105" height="38" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="352" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">INFO</text>
    <text x="352" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Normal ops</text>
    <line x1="405" y1="299" x2="425" y2="299" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="430" y="280" width="105" height="38" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="482" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">WARNING</text>
    <text x="482" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Potential issue</text>
    <line x1="535" y1="299" x2="555" y2="299" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="560" y="280" width="105" height="38" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="612" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ERROR</text>
    <text x="612" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Operation failed</text>
    <line x1="665" y1="299" x2="685" y2="299" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="690" y="280" width="70" height="38" rx="3" fill="#f44336"/>
    <text x="725" y="295" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ffffff">CRITICAL</text>
    <text x="725" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffebee">System crash</text>
  </g>
  
  <g class="step" id="step4" data-narration="Four main logging mechanisms exist: file-based for simplicity and local storage, database logging for queries and analysis, centralized logging for distributed systems, and Windows Event Log for system events.">
    <rect x="20" y="337" width="760" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="359" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Types of Error Logging Mechanisms</text>
    <rect x="40" y="375" width="170" height="38" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="125" y="390" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">File-based Logging</text>
    <text x="125" y="405" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Simple, disk storage</text>
    <rect x="220" y="375" width="170" height="38" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="305" y="390" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Database Logging</text>
    <text x="305" y="405" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">SQL queries, analysis</text>
    <rect x="400" y="375" width="170" height="38" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="485" y="390" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Centralized Logging</text>
    <text x="485" y="405" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">ELK, Splunk, Graylog</text>
    <rect x="580" y="375" width="180" height="38" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="670" y="390" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Windows Event Log</text>
    <text x="670" y="405" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Event Viewer tool</text>
  </g>
  
  <g class="step" id="step5" data-narration="Best practices for error logging include logging meaningful information with appropriate severity levels, maintaining consistent formatting, including correlation IDs for tracking, implementing log rotation, and securing sensitive data.">
    <rect x="20" y="430" width="760" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="452" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Best Practices for Error Logging</text>
    <circle cx="60" cy="475" r="12" fill="#f44336"/>
    <text x="60" y="479" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">1</text>
    <text x="80" y="478" font-family="Arial" font-size="9" fill="#333">Log meaningful info with context</text>
    <circle cx="230" cy="475" r="12" fill="#f44336"/>
    <text x="230" y="479" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">2</text>
    <text x="250" y="478" font-family="Arial" font-size="9" fill="#333">Use appropriate log levels</text>
    <circle cx="420" cy="475" r="12" fill="#f44336"/>
    <text x="420" y="479" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">3</text>
    <text x="440" y="478" font-family="Arial" font-size="9" fill="#333">Structure logs consistently</text>
    <circle cx="600" cy="475" r="12" fill="#f44336"/>
    <text x="600" y="479" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">4</text>
    <text x="620" y="478" font-family="Arial" font-size="9" fill="#333">Include correlation IDs</text>
    <circle cx="60" cy="500" r="12" fill="#f44336"/>
    <text x="60" y="504" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">5</text>
    <text x="80" y="503" font-family="Arial" font-size="9" fill="#333">Implement log rotation</text>
    <circle cx="230" cy="500" r="12" fill="#f44336"/>
    <text x="230" y="504" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">6</text>
    <text x="250" y="503" font-family="Arial" font-size="9" fill="#333">Secure log files</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam points to remember: distinguish error handling from logging, understand log level hierarchy, know components of log entries, and learn log rotation mechanisms for effective system maintenance.">
    <rect x="20" y="523" width="760" height="65" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="545" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Exam Tips Summary</text>
    <rect x="40" y="555" width="220" height="25" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="150" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Error Handling vs Logging</text>
    <rect x="270" y="555" width="180" height="25" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="360" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Log Level Hierarchy</text>
    <rect x="460" y="555" width="150" height="25" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="535" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Log Entry Components</text>
    <rect x="620" y="555" width="140" height="25" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="690" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Log Rotation</text>
  </g>
</svg>