<svg viewBox="0 0 800 1050" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .draw-line {
      stroke-dasharray: 500;
      animation: drawLine 1s ease-out forwards;
    }
  </style>
  
  <rect width="800" height="1050" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome! Today we explore the abort function in C programming and Operating Systems.">
    <rect x="0" y="10" width="800" height="45" fill="url(#titleGrad)" rx="0"/>
    <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Abort Function in C and Operating Systems</text>
    <text x="400" y="60" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Understanding abnormal program termination</text>
  </g>
  
  <!-- Step 1: What is abort() -->
  <g class="step" id="step1" data-narration="The abort function causes abnormal program termination by raising the SIGABRT signal without cleanup.">
    <rect x="30" y="80" width="740" height="85" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="102" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">What is abort()?</text>
    <text x="50" y="122" font-family="Courier New, monospace" font-size="12" fill="#333">#include &lt;stdlib.h&gt;</text>
    <text x="50" y="142" font-family="Courier New, monospace" font-size="12" fill="#333">void abort(void);</text>
    <rect x="400" y="95" width="300" height="55" fill="white" rx="5"/>
    <text x="410" y="115" font-family="Arial, sans-serif" font-size="11" fill="#666">Purpose:</text>
    <text x="410" y="135" font-family="Arial, sans-serif" font-size="11" fill="#333">Causes abnormal program termination</text>
  </g>
  
  <!-- Step 2: Key Characteristics -->
  <g class="step" id="step2" data-narration="When abort is called, it sends SIGABRT, generates a core dump, and never returns to the caller.">
    <rect x="30" y="175" width="740" height="90" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="198" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">Key Characteristics</text>
    
    <g transform="translate(50, 215)">
      <circle cx="8" cy="5" r="4" fill="#388e3c"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="10" fill="#333">Raises SIGABRT signal (signal 6 in POSIX)</text>
    </g>
    <g transform="translate(300, 215)">
      <circle cx="8" cy="5" r="4" fill="#388e3c"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="10" fill="#333">Generates core dump for debugging</text>
    </g>
    <g transform="translate(530, 215)">
      <circle cx="8" cy="5" r="4" fill="#388e3c"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="10" fill="#333">Never returns to caller</text>
    </g>
    <g transform="translate(50, 240)">
      <circle cx="8" cy="5" r="4" fill="#f44336"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="10" fill="#333">NO atexit() cleanup functions called</text>
    </g>
    <g transform="translate(300, 240)">
      <circle cx="8" cy="5" r="4" fill="#f44336"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="10" fill="#333">Output buffers NOT flushed</text>
    </g>
    <g transform="translate(530, 240)">
      <circle cx="8" cy="5" r="4" fill="#f44336"/>
      <text x="20" y="10" font-family="Arial, sans-serif" font-size="10" fill="#333">Temporary files NOT closed</text>
    </g>
  </g>
  
  <!-- Step 3: abort() vs exit() Comparison -->
  <g class="step" id="step3" data-narration="Compare abort with exit: abort skips cleanup while exit performs normal termination procedures.">
    <rect x="30" y="275" width="740" height="115" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="298" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">abort() vs exit() - Key Differences</text>
    
    <!-- Table Header -->
    <rect x="50" y="310" width="150" height="22" fill="#ffcc80" rx="3"/>
    <rect x="200" y="310" width="280" height="22" fill="#ffab91" rx="3"/>
    <rect x="480" y="310" width="280" height="22" fill="#ffab91" rx="3"/>
    <text x="125" y="326" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Aspect</text>
    <text x="340" y="326" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">abort()</text>
    <text x="620" y="326" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">exit()</text>
    
    <!-- Row 1 -->
    <rect x="50" y="332" width="150" height="18" fill="#ffe0b2" rx="2"/>
    <rect x="200" y="332" width="280" height="18" fill="white" rx="2"/>
    <rect x="480" y="332" width="280" height="18" fill="white" rx="2"/>
    <text x="125" y="345" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">Cleanup</text>
    <text x="220" y="345" font-family="Arial, sans-serif" font-size="9" fill="#c62828">NO cleanup</text>
    <text x="500" y="345" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32">Performs cleanup</text>
    
    <!-- Row 2 -->
    <rect x="50" y="350" width="150" height="18" fill="#ffe0b2" rx="2"/>
    <rect x="200" y="350" width="280" height="18" fill="white" rx="2"/>
    <rect x="480" y="350" width="280" height="18" fill="white" rx="2"/>
    <text x="125" y="363" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">atexit() calls</text>
    <text x="220" y="363" font-family="Arial, sans-serif" font-size="9" fill="#c62828">NOT called</text>
    <text x="500" y="363" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32">Called in reverse</text>
    
    <!-- Row 3 -->
    <rect x="50" y="368" width="150" height="18" fill="#ffe0b2" rx="2"/>
    <rect x="200" y="368" width="280" height="18" fill="white" rx="2"/>
    <rect x="480" y="368" width="280" height="18" fill="white" rx="2"/>
    <text x="125" y="381" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">Buffers</text>
    <text x="220" y="381" font-family="Arial, sans-serif" font-size="9" fill="#c62828">NOT flushed</text>
    <text x="500" y="381" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32">Flushed automatically</text>
  </g>
  
  <!-- Step 4: Signal Handling Flow -->
  <g class="step" id="step4" data-narration="When abort is called, it raises SIGABRT which triggers the default termination handler.">
    <rect x="30" y="400" width="740" height="100" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="423" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7b1fa2">Signal Handling Flow</text>
    
    <!-- Flow diagram -->
    <rect x="60" y="440" width="120" height="45" fill="#9c27b0" rx="5"/>
    <text x="120" y="460" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">abort()</text>
    <text x="120" y="475" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">called</text>
    
    <line x1="180" y1="462" x2="230" y2="462" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
    
    <rect x="240" y="440" width="120" height="45" fill="#7b1fa2" rx="5"/>
    <text x="300" y="460" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">SIGABRT</text>
    <text x="300" y="475" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">signal raised</text>
    
    <line x1="360" y1="462" x2="410" y2="462" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
    
    <rect x="420" y="440" width="120" height="45" fill="#7b1fa2" rx="5"/>
    <text x="480" y="460" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Signal</text>
    <text x="480" y="475" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Handler</text>
    
    <line x1="540" y1="462" x2="590" y2="462" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
    
    <rect x="600" y="440" width="150" height="45" fill="#d32f2f" rx="5"/>
    <text x="675" y="460" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Process</text>
    <text x="675" y="475" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Terminated + Core Dump</text>
    
    <text x="50" y="505" font-family="Arial, sans-serif" font-size="9" fill="#666">* If SIGABRT caught and handler returns, _exit() is called</text>
  </g>
  
  <!-- Step 5: assert() and abort() -->
  <g class="step" id="step5" data-narration="The assert macro internally calls abort when an assertion fails, terminating the program immediately.">
    <rect x="30" y="510" width="740" height="95" fill="url(#redGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="533" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c62828">assert() Uses abort() Internally</text>
    
    <text x="50" y="555" font-family="Arial, sans-serif" font-size="11" fill="#333">When assert() fails:</text>
    
    <rect x="200" y="545" width="550" height="45" fill="white" rx="5" stroke="#c62828" stroke-width="1"/>
    <text x="210" y="562" font-family="Courier New, monospace" font-size="10" fill="#333">assert(expression);</text>
    <text x="210" y="578" font-family="Arial, sans-serif" font-size="10" fill="#666">↓ if expression is FALSE</text>
    <text x="550" y="562" font-family="Arial, sans-serif" font-size="10" fill="#c62828" text-anchor="end">Calls abort()</text>
    
    <text x="50" y="592" font-family="Arial, sans-serif" font-size="9" fill="#666">* Define NDEBUG to disable assert() (common optimization)</text>
  </g>
  
  <!-- Step 6: Code Example -->
  <g class="step" id="step6" data-narration="This example shows basic abort usage and demonstrates that code after abort never executes.">
    <rect x="30" y="615" width="740" height="110" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="638" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">Example: Basic abort() Usage</text>
    
    <rect x="50" y="655" width="340" height="60" fill="#263238" rx="5"/>
    <text x="60" y="672" font-family="Courier New, monospace" font-size="10" fill="#80cbc4">#include &lt;stdio.h&gt;</text>
    <text x="60" y="686" font-family="Courier New, monospace" font-size="10" fill="#80cbc4">#include &lt;stdlib.h&gt;</text>
    <text x="60" y="700" font-family="Courier New, monospace" font-size="10" fill="#ce93d8">int main() {</text>
    <text x="70" y="714" font-family="Courier New, monospace" font-size="10" fill="#e0e0e0">abort(); // Immediate termination</text>
    
    <rect x="400" y="655" width="350" height="60" fill="#1b5e20" rx="5"/>
    <text x="410" y="680" font-family="Arial, sans-serif" font-size="12" fill="white">Output:</text>
    <text x="410" y="700" font-family="Courier New, monospace" font-size="10" fill="#a5d6a7">Aborted (core dumped)</text>
    <text x="410" y="715" font-family="Arial, sans-serif" font-size="9" fill="#81c784">* Program terminates immediately</text>
    
    <text x="50" y="745" font-family="Arial, sans-serif" font-size="10" fill="#666">Key: Lines after abort() NEVER execute - no return to caller</text>
  </g>
  
  <!-- Step 7: Signal Handler Example -->
  <g class="step" id="step7" data-narration="SIGABRT can be caught with a signal handler, allowing custom cleanup before termination.">
    <rect x="30" y="735" width="740" height="100" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="758" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">Catching SIGABRT with Signal Handler</text>
    
    <rect x="50" y="775" width="340" height="50" fill="#263238" rx="5"/>
    <text x="60" y="790" font-family="Courier New, monospace" font-size="9" fill="#80cbc4">void handler(int sig) {</text>
    <text x="70" y="804" font-family="Courier New, monospace" font-size="9" fill="#e0e0e0">printf("Caught SIGABRT!");</text>
    <text x="70" y="818" font-family="Courier New, monospace" font-size="9" fill="#e0e0e0">_exit(1);</text>
    
    <rect x="400" y="775" width="350" height="50" fill="#e65100" rx="5"/>
    <text x="410" y="790" font-family="Arial, sans-serif" font-size="10" fill="white">Installation:</text>
    <text x="410" y="806" font-family="Courier New, monospace" font-size="9" fill="#ffe0b2">signal(SIGABRT, handler);</text>
    <text x="410" y="820" font-family="Arial, sans-serif" font-size="9" fill="#ffcc80">abort(); // Calls handler first</text>
    
    <text x="50" y="840" font-family="Arial, sans-serif" font-size="9" fill="#666">* If handler returns, abort() typically calls _exit() to ensure termination</text>
  </g>
  
  <!-- Step 8: Core Dump -->
  <g class="step" id="step8" data-narration="Core dump is a memory snapshot saved when abort terminates abnormally, useful for post-mortem debugging.">
    <rect x="30" y="845" width="740" height="65" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="868" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">Core Dump - Debugging Memory Snapshot</text>
    
    <rect x="50" y="880" width="200" height="20" fill="#d32f2f" rx="3"/>
    <text x="150" y="894" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Aborted (core dumped)</text>
    
    <text x="270" y="888" font-family="Arial, sans-serif" font-size="10" fill="#333">Contains: Complete memory image,</text>
    <text x="270" y="902" font-family="Arial, sans-serif" font-size="10" fill="#333">stack traces, register values for debugging</text>
  </g>
  
  <!-- Step 9: Exam Tips -->
  <g class="step" id="step9" data-narration="Remember: abort skips cleanup, sends SIGABRT, never returns, and assert uses abort internally.">
    <rect x="30" y="920" width="740" height="115" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="943" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7b1fa2">Exam Tips &amp; Key Takeaways</text>
    
    <g transform="translate(50, 960)">
      <circle cx="6" cy="6" r="4" fill="#7b1fa2"/>
      <text x="18" y="11" font-family="Arial, sans-serif" font-size="10" fill="#333">abort() does NOT call atexit() functions</text>
    </g>
    <g transform="translate(50, 978)">
      <circle cx="6" cy="6" r="4" fill="#7b1fa2"/>
      <text x="18" y="11" font-family="Arial, sans-serif" font-size="10" fill="#333">abort() sends SIGABRT signal (signal number 6)</text>
    </g>
    <g transform="translate(300, 960)">
      <circle cx="6" cy="6" r="4" fill="#7b1fa2"/>
      <text x="18" y="11" font-family="Arial, sans-serif" font-size="10" fill="#333">abort() does NOT flush buffers</text>
    </g>
    <g transform="translate(300, 978)">
      <circle cx="6" cy="6" r="4" fill="#7b1fa2"/>
      <text x="18" y="11" font-family="Arial, sans-serif" font-size="10" fill="#333">assert() failures call abort()</text>
    </g>
    <g transform="translate(520, 960)">
      <circle cx="6" cy="6" r="4" fill="#7b1fa2"/>
      <text x="18" y="11" font-family="Arial, sans-serif" font-size="10" fill="#333">Core dump generated for debugging</text>
    </g>
    <g transform="translate(520, 978)">
      <circle cx="6" cy="6" r="4" fill="#7b1fa2"/>
      <text x="18" y="11" font-family="Arial, sans-serif" font-size="10" fill="#333">abort() never returns to caller</text>
    </g>
    
    <rect x="50" y="1000" width="700" height="25" fill="#4a148c" rx="3"/>
    <text x="400" y="1017" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Remember: "A-bort" = Abnormal termination (no cleanup!)</text>
  </g>
</svg>