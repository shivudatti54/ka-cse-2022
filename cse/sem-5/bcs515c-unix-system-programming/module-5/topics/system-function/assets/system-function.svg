<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="System calls are the fundamental interface between user programs and the OS kernel, providing controlled access to privileged system operations.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
<text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">System Calls and System Functions</text>
</g>

<g class="step" id="step1" data-narration="System calls directly invoke kernel services and switch from user mode to kernel mode, while library functions are user-space wrappers.">
<rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">System Calls vs System Functions</text>
<rect x="40" y="92" width="330" height="38" fill="#e3f2fd" rx="3"/>
<text x="50" y="108" font-family="Arial" font-size="10" fill="#1976d2">System Calls:</text>
<text x="50" y="122" font-family="Arial" font-size="9" fill="#1565c0">Direct kernel services, mode switch to</text>
<text x="50" y="133" font-family="Arial" font-size="9" fill="#1565c0">kernel mode (privileged), slower</text>
<rect x="380" y="92" width="330" height="38" fill="#e8f5e9" rx="3"/>
<text x="390" y="108" font-family="Arial" font-size="10" fill="#388e3c">System Functions:</text>
<text x="390" y="122" font-family="Arial" font-size="9" fill="#2e7d32">Library wrappers, may use syscalls,</text>
<text x="390" y="133" font-family="Arial" font-size="9" fill="#2e7d32">faster, user-space functions</text>
</g>

<g class="step" id="step2" data-narration="UNIX system calls are categorized into six main groups: Process Control, File Manipulation, Device Management, Information Maintenance, Communication, and Protection.">
<rect x="20" y="146" width="760" height="85" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
<text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Six Categories of System Calls</text>
<rect x="40" y="180" width="110" height="45" fill="#e3f2fd" rx="3"/>
<text x="50" y="195" font-family="Arial" font-size="9" fill="#1976d2">1. Process Control</text>
<text x="50" y="208" font-family="Arial" font-size="8" fill="#1565c0">fork, exec, wait, exit</text>
<text x="50" y="220" font-family="Arial" font-size="8" fill="#1565c0">getpid, getppid</text>
<rect x="160" y="180" width="110" height="45" fill="#e8f5e9" rx="3"/>
<text x="170" y="195" font-family="Arial" font-size="9" fill="#388e3c">2. File Manipulation</text>
<text x="170" y="208" font-family="Arial" font-size="8" fill="#2e7d32">open, read, write, close</text>
<text x="170" y="220" font-family="Arial" font-size="8" fill="#2e7d32">lseek, stat</text>
<rect x="280" y="180" width="110" height="45" fill="#fff3e0" rx="3"/>
<text x="290" y="195" font-family="Arial" font-size="9" fill="#ff9800">3. Device Mgmt</text>
<text x="290" y="208" font-family="Arial" font-size="8" fill="#f57c00">ioctl, fcntl</text>
<text x="290" y="220" font-family="Arial" font-size="8" fill="#f57c00">read, write devices</text>
<rect x="400" y="180" width="110" height="45" fill="#f3e5f5" rx="3"/>
<text x="410" y="195" font-family="Arial" font-size="9" fill="#9c27b0">4. Info Maintenance</text>
<text x="410" y="208" font-family="Arial" font-size="8" fill="#7b1fa2">getpid, getuid, uname</text>
<text x="410" y="220" font-family="Arial" font-size="8" fill="#7b1fa2">gettimeofday</text>
<rect x="520" y="180" width="110" height="45" fill="#ffebee" rx="3"/>
<text x="530" y="195" font-family="Arial" font-size="9" fill="#f44336">5. Communication</text>
<text x="530" y="208" font-family="Arial" font-size="8" fill="#d32f2f">pipe, socket, msgget</text>
<text x="530" y="220" font-family="Arial" font-size="8" fill="#d32f2f">shmget, shmat</text>
<rect x="640" y="180" width="110" height="45" fill="#e3f2fd" rx="3"/>
<text x="650" y="195" font-family="Arial" font-size="9" fill="#1976d2">6. Protection</text>
<text x="650" y="208" font-family="Arial" font-size="8" fill="#1565c0">chmod, chown, umask</text>
<text x="650" y="220" font-family="Arial" font-size="8" fill="#1565c0">chroot</text>
</g>

<g class="step" id="step3" data-narration="fork() creates a new process by duplicating the parent, returning child's PID to parent and 0 to child. exec() replaces the process image with a new program.">
<rect x="20" y="239" width="760" height="85" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
<text x="40" y="261" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Process Control System Calls</text>
<rect x="40" y="275" width="220" height="42" fill="#e8f5e9" rx="3"/>
<text x="50" y="290" font-family="Arial" font-size="10" fill="#2e7d32">fork() - Create New Process</text>
<text x="50" y="305" font-family="Arial" font-size="9" fill="#388e3c">Returns: child PID to parent,</text>
<text x="50" y="317" font-family="Arial" font-size="9" fill="#388e3c">0 to child, -1 on error</text>
<rect x="270" y="275" width="220" height="42" fill="#e8f5e9" rx="3"/>
<text x="280" y="290" font-family="Arial" font-size="10" fill="#2e7d32">exec() Family - Replace Program</text>
<text x="280" y="305" font-family="Arial" font-size="9" fill="#388e3c">execl, execv, execle, execve</text>
<text x="280" y="317" font-family="Arial" font-size="9" fill="#388e3c">Replaces current process image</text>
<rect x="500" y="275" width="130" height="42" fill="#e8f5e9" rx="3"/>
<text x="510" y="290" font-family="Arial" font-size="10" fill="#2e7d32">wait() - Wait for Child</text>
<text x="510" y="305" font-family="Arial" font-size="9" fill="#388e3c">Blocks until child</text>
<text x="510" y="317" font-family="Arial" font-size="9" fill="#388e3c">terminates</text>
<rect x="640" y="275" width="120" height="42" fill="#e8f5e9" rx="3"/>
<text x="650" y="290" font-family="Arial" font-size="10" fill="#2e7d32">exit() - Terminate</text>
<text x="650" y="305" font-family="Arial" font-size="9" fill="#388e3c">Terminates process</text>
<text x="650" y="317" font-family="Arial" font-size="9" fill="#388e3c">with exit status</text>
</g>

<g class="step" id="step4" data-narration="File operations include open(), read(), write(), close(), and lseek(). These manipulate files using file descriptors that are returned by open().">
<rect x="20" y="332" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="354" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">File Manipulation System Calls</text>
<rect x="40" y="368" width="145" height="42" fill="#e3f2fd" rx="3"/>
<text x="50" y="383" font-family="Arial" font-size="10" fill="#1565c0">open() - Open/Create File</text>
<text x="50" y="398" font-family="Arial" font-size="9" fill="#1976d2">Returns file descriptor,</text>
<text x="50" y="410" font-family="Arial" font-size="9" fill="#1976d2">takes path, flags, mode</text>
<rect x="195" y="368" width="145" height="42" fill="#e3f2fd" rx="3"/>
<text x="205" y="383" font-family="Arial" font-size="10" fill="#1565c0">read() - Read Data</text>
<text x="205" y="398" font-family="Arial" font-size="9" fill="#1976d2">Takes fd, buffer, count.</text>
<text x="205" y="410" font-family="Arial" font-size="9" fill="#1976d2">Returns bytes read</text>
<rect x="350" y="368" width="145" height="42" fill="#e3f2fd" rx="3"/>
<text x="360" y="383" font-family="Arial" font-size="10" fill="#1565c0">write() - Write Data</text>
<text x="360" y="398" font-family="Arial" font-size="9" fill="#1976d2">Takes fd, buffer, count.</text>
<text x="360" y="410" font-family="Arial" font-size="9" fill="#1976d2">Returns bytes written</text>
<rect x="505" y="368" width="130" height="42" fill="#e3f2fd" rx="3"/>
<text x="515" y="383" font-family="Arial" font-size="10" fill="#1565c0">close() - Close File</text>
<text x="515" y="398" font-family="Arial" font-size="9" fill="#1976d2">Releases file descriptor.</text>
<text x="515" y="410" font-family="Arial" font-size="9" fill="#1976d2">Must close after use</text>
<rect x="645" y="368" width="115" height="42" fill="#e3f2fd" rx="3"/>
<text x="655" y="383" font-family="Arial" font-size="10" fill="#1565c0">lseek() - Reposition</text>
<text x="655" y="398" font-family="Arial" font-size="9" fill="#1976d2">Changes file offset.</text>
<text x="655" y="410" font-family="Arial" font-size="9" fill="#1976d2">SEEK_SET/END/CUR</text>
</g>

<g class="step" id="step5" data-narration="System call flow: program calls library wrapper, arguments loaded into registers, trap instruction switches to kernel mode, kernel executes and returns result.">
<rect x="20" y="425" width="760" height="75" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
<text x="40" y="447" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">System Call Implementation Mechanism</text>
<rect x="40" y="458" width="130" height="35" fill="#f3e5f5" rx="3"/>
<text x="50" y="472" font-family="Arial" font-size="9" fill="#7b1fa2">1. Call Library Wrapper</text>
<text x="50" y="486" font-family="Arial" font-size="8" fill="#9c27b0">e.g., fork(), open()</text>
<path d="M170,475 L195,475" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="200" y="458" width="130" height="35" fill="#f3e5f5" rx="3"/>
<text x="210" y="472" font-family="Arial" font-size="9" fill="#7b1fa2">2. Load Arguments</text>
<text x="210" y="486" font-family="Arial" font-size="8" fill="#9c27b0">syscall number in %eax</text>
<path d="M330,475 L355,475" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="360" y="458" width="130" height="35" fill="#f3e5f5" rx="3"/>
<text x="370" y="472" font-family="Arial" font-size="9" fill="#7b1fa2">3. TRAP Instruction</text>
<text x="370" y="486" font-family="Arial" font-size="8" fill="#9c27b0">Switch to kernel mode</text>
<path d="M490,475 L515,475" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="520" y="458" width="130" height="35" fill="#f3e5f5" rx="3"/>
<text x="530" y="472" font-family="Arial" font-size="9" fill="#7b1fa2">4. Kernel Executes</text>
<text x="530" y="486" font-family="Arial" font-size="8" fill="#9c27b0">Dispatches to handler</text>
<path d="M650,475 L675,475" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="680" y="458" width="80" height="35" fill="#f3e5f5" rx="3"/>
<text x="690" y="472" font-family="Arial" font-size="9" fill="#7b1fa2">5. Return</text>
<text x="690" y="486" font-family="Arial" font-size="8" fill="#9c27b0">To user mode</text>
</g>

<g class="step" id="step6" data-narration="File descriptors 0, 1, 2 are standard: stdin, stdout, stderr. fork() returns twice, and error handling uses return value -1 with errno.">
<rect x="20" y="508" width="760" height="72" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
<text x="40" y="530" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">File Descriptors &amp; Key Concepts</text>
<rect x="40" y="542" width="180" height="32" fill="#ffebee" rx="3"/>
<text x="50" y="556" font-family="Arial" font-size="10" fill="#d32f2f">Standard File Descriptors:</text>
<text x="50" y="570" font-family="Arial" font-size="9" fill="#f44336">0=stdin, 1=stdout, 2=stderr</text>
<rect x="230" y="542" width="200" height="32" fill="#fff3e0" rx="3"/>
<text x="240" y="556" font-family="Arial" font-size="10" fill="#f57c00">fork() Returns Twice:</text>
<text x="240" y="570" font-family="Arial" font-size="9" fill="#ff9800">Parent gets child PID, child gets 0</text>
<rect x="440" y="542" width="180" height="32" fill="#e8f5e9" rx="3"/>
<text x="450" y="556" font-family="Arial" font-size="10" fill="#2e7d32">Error Handling:</text>
<text x="450" y="570" font-family="Arial" font-size="9" fill="#388e3c">Returns -1 on error, check errno</text>
<rect x="630" y="542" width="130" height="32" fill="#e3f2fd" rx="3"/>
<text x="640" y="556" font-family="Arial" font-size="10" fill="#1565c0">Process Flow:</text>
<text x="640" y="570" font-family="Arial" font-size="9" fill="#1976d2">fork → exec → wait</text>
</g>
</svg>