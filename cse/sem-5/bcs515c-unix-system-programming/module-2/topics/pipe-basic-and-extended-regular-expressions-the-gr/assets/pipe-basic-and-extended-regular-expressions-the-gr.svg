<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This chapter covers pipes for command chaining, basic regular expressions (BRE) and extended regular expressions (ERE), plus the grep family of text search tools in Unix and Linux.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Pipe, BRE, ERE, and Grep</text>
  </g>
  
  <g class="step" id="step1" data-narration="A pipe | connects stdout of one command to stdin of another, enabling command chaining without temporary files. Data flows left to right through the pipeline.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Pipe (|)</text>
    <rect x="40" y="92" width="100" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="90" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#2e7d32">command1</text>
    <line x1="140" y1="110" x2="170" y2="110" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="180" y="92" width="100" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="230" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#2e7d32">command2</text>
    <line x1="280" y1="110" x2="310" y2="110" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="320" y="92" width="100" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="370" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#2e7d32">command3</text>
    <text x="450" y="110" font-family="Arial" font-size="10" fill="#388e3c">stdout → stdin</text>
    <text x="450" y="128" font-family="Arial" font-size="9" fill="#666">Example: ls -l | grep .txt | sort</text>
  </g>
  
  <g class="step" id="step2" data-narration="BRE is grep's default syntax. In BRE, special characters like + ? | () are literals unless escaped with backslash. Use \{n,m\} for quantifiers.">
    <rect x="20" y="146" width="760" height="95" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Basic Regular Expressions (BRE)</text>
    <text x="40" y="190" font-family="Arial" font-size="9" fill="#e65100">Metacharacter</text>
    <text x="130" y="190" font-family="Arial" font-size="9" fill="#e65100">Meaning</text>
    <text x="40" y="206" font-family="monospace" font-size="9" fill="#333">^</text>
    <text x="130" y="206" font-family="Arial" font-size="9" fill="#333">Start of line</text>
    <text x="40" y="220" font-family="monospace" font-size="9" fill="#333">$</text>
    <text x="130" y="220" font-family="Arial" font-size="9" fill="#333">End of line</text>
    <text x="40" y="234" font-family="monospace" font-size="9" fill="#333">.</text>
    <text x="130" y="234" font-family="Arial" font-size="9" fill="#333">Any single character</text>
    <text x="250" y="206" font-family="monospace" font-size="9" fill="#333">[abc]</text>
    <text x="330" y="206" font-family="Arial" font-size="9" fill="#333">Match a, b, or c</text>
    <text x="250" y="220" font-family="monospace" font-size="9" fill="#333">\*</text>
    <text x="330" y="220" font-family="Arial" font-size="9" fill="#333">Zero or more</text>
    <text x="250" y="234" font-family="monospace" font-size="9" fill="#333">\{n,m\}</text>
    <text x="330" y="234" font-family="Arial" font-size="9" fill="#333">n to m occurrences</text>
    <text x="530" y="190" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Escape examples:</text>
    <text x="530" y="208" font-family="monospace" font-size="9" fill="#333">\+ \? \| \( \)</text>
    <text x="530" y="224" font-family="Arial" font-size="9" fill="#666">Matches literal + ? | ( )</text>
  </g>
  
  <g class="step" id="step3" data-narration="ERE is used by egrep or grep -E. It adds metacharacters + ? | and () without escaping, and uses {n,m} directly for quantifiers.">
    <rect x="20" y="249" width="760" height="95" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="271" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Extended Regular Expressions (ERE)</text>
    <text x="40" y="293" font-family="Arial" font-size="9" fill="#6a1b9a">Metacharacter</text>
    <text x="130" y="293" font-family="Arial" font-size="9" fill="#6a1b9a">Meaning</text>
    <text x="40" y="309" font-family="monospace" font-size="9" fill="#333">+</text>
    <text x="130" y="309" font-family="Arial" font-size="9" fill="#333">One or more</text>
    <text x="40" y="323" font-family="monospace" font-size="9" fill="#333">?</text>
    <text x="130" y="323" font-family="Arial" font-size="9" fill="#333">Zero or one</text>
    <text x="250" y="309" font-family="monospace" font-size="9" fill="#333">|</text>
    <text x="330" y="309" font-family="Arial" font-size="9" fill="#333">Alternation (OR)</text>
    <text x="250" y="323" font-family="monospace" font-size="9" fill="#333">( )</text>
    <text x="330" y="323" font-family="Arial" font-size="9" fill="#333">Grouping</text>
    <text x="40" y="337" font-family="monospace" font-size="9" fill="#333">{n,m}</text>
    <text x="130" y="337" font-family="Arial" font-size="9" fill="#333">n to m occurrences</text>
    <text x="530" y="293" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">BRE vs ERE:</text>
    <text x="530" y="311" font-family="monospace" font-size="9" fill="#333">foo\+ (BRE) vs foo+ (ERE)</text>
    <text x="530" y="327" font-family="monospace" font-size="9" fill="#333">foo\|bar vs foo|bar</text>
  </g>
  
  <g class="step" id="step4" data-narration="The grep family has three main tools: grep uses BRE, egrep uses ERE, and fgrep searches literal strings without regex interpretation.">
    <rect x="20" y="352" width="760" height="95" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="374" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">The Grep Family</text>
    <rect x="40" y="388" width="200" height="35" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="140" y="405" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">grep</text>
    <text x="140" y="418" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Basic Regular Expressions</text>
    <rect x="260" y="388" width="200" height="35" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="360" y="405" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">egrep</text>
    <text x="360" y="418" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Extended RE (or grep -E)</text>
    <rect x="480" y="388" width="200" height="35" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="580" y="405" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">fgrep</text>
    <text x="580" y="418" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Fixed string (or grep -F)</text>
    <text x="40" y="440" font-family="Arial" font-size="9" fill="#1565c0">Options:</text>
    <text x="100" y="440" font-family="monospace" font-size="8" fill="#333">-i -v -n -c -l</text>
  </g>
  
  <g class="step" id="step5" data-narration="Example pipeline: find Python files modified in 7 days and search for function using xargs to pass filenames to grep.">
    <rect x="20" y="455" width="760" height="104" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="477" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Example: Pipeline with Grep</text>
    <text x="40" y="500" font-family="monospace" font-size="10" fill="#333">find . -mtime -7 -name "*.py" | xargs grep -l "function"</text>
    <text x="40" y="518" font-family="Arial" font-size="9" fill="#c62828">BRE pattern:</text>
    <text x="110" y="518" font-family="monospace" font-size="8" fill="#333">grep '^[A-Z].*\.$' file.txt</text>
    <text x="320" y="518" font-family="Arial" font-size="9" fill="#c62828">ERE pattern:</text>
    <text x="390" y="518" font-family="monospace" font-size="8" fill="#333">egrep 'error|warning|critical' log.txt</text>
    <text x="40" y="538" font-family="Arial" font-size="9" fill="#333"> BRE: escape special chars with backslash \+ \? \|</text>
    <text x="40" y="552" font-family="Arial" font-size="9" fill="#333"> ERE: use metacharacters directly + ? | ( )</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam tips: remember grep uses BRE by default, escape special characters in BRE, use anchors ^ and $ for line matching, and use word boundaries.">
    <rect x="20" y="567" width="760" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="587" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Exam Tips: grep = BRE, egrep/grep -E = ERE, escape in BRE | for patterns</text>
  </g>
</svg>