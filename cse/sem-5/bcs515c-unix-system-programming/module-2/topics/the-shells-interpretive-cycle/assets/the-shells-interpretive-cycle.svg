<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The shell's interpretive cycle is the five-stage process from reading input to executing commands in Unix-like systems.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">The Shell's Interpretive Cycle</text>
  </g>
  
  <g class="step" id="step1" data-narration="Stage 1: Reading Input - The shell reads command lines from standard input using the readline library for history and completion.">
    <rect x="40" y="58" width="720" height="110" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="60" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Stage 1: READING INPUT</text>
    <rect x="60" y="90" width="180" height="38" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="150" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">User types command</text>
    <text x="150" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">ls -l /home</text>
    <line x1="250" y1="110" x2="290" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="300" y="90" width="160" height="38" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="380" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Readline library</text>
    <text x="380" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">history, completion</text>
    <line x1="470" y1="110" x2="510" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="520" y="90" width="150" height="38" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="595" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Shell buffer</text>
    <text x="595" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">line by line</text>
  </g>
  
  <g class="step" id="step2" data-narration="Stage 2: Tokenization - The shell breaks the command line into words, operators like pipes, redirections, and special characters.">
    <rect x="40" y="177" width="720" height="110" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="60" y="197" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Stage 2: TOKENIZATION</text>
    <text x="60" y="211" font-family="Arial" font-size="9" fill="#666">Input: "ls -l /home/user | grep error > log.txt"</text>
    <rect x="60" y="220" width="90" height="26" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="105" y="237" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">ls</text>
    <rect x="160" y="220" width="45" height="26" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="182" y="237" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">-l</text>
    <rect x="215" y="220" width="110" height="26" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="270" y="237" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">/home/user</text>
    <rect x="335" y="220" width="50" height="26" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="360" y="237" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">|</text>
    <rect x="395" y="220" width="90" height="26" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="440" y="237" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">grep</text>
    <rect x="495" y="220" width="70" height="26" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="530" y="237" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">error</text>
    <rect x="575" y="220" width="45" height="26" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="597" y="237" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">&gt;</text>
    <rect x="630" y="220" width="80" height="26" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="670" y="237" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">log.txt</text>
    <text x="60" y="268" font-family="Arial" font-size="9" fill="#666">Words and Operators identified</text>
  </g>
  
  <g class="step" id="step3" data-narration="Stage 3: Parsing - The shell builds a parse tree from tokens, identifying commands, arguments, pipes, and redirections.">
    <rect x="40" y="296" width="720" height="140" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="60" y="316" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Stage 3: PARSING</text>
    <text x="60" y="330" font-family="Arial" font-size="9" fill="#666">Build parse tree: command → args, pipes connect processes</text>
    <rect x="60" y="342" width="140" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="130" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">ls -l /home</text>
    <rect x="210" y="342" width="45" height="28" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="232" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">|</text>
    <rect x="265" y="342" width="110" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="320" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">grep error</text>
    <rect x="385" y="342" width="45" height="28" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="407" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">&gt;</text>
    <rect x="440" y="342" width="100" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="490" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">output: log.txt</text>
    <text x="60" y="390" font-family="Arial" font-size="9" fill="#666">Command Resolution: check built-ins, aliases, functions, PATH</text>
    <rect x="60" y="398" width="140" height="32" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="130" y="413" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">BUILT-IN</text>
    <text x="130" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">cd, echo, pwd</text>
    <rect x="210" y="398" width="140" height="32" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="280" y="413" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">ALIAS</text>
    <text x="280" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">ll = ls -la</text>
    <rect x="360" y="398" width="160" height="32" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="440" y="413" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">EXTERNAL</text>
    <text x="440" y="425" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">search PATH: /bin/ls</text>
  </g>
  
  <g class="step" id="step4" data-narration="Stage 4: Execution - The shell sets up I/O redirections, creates pipes, forks processes, and executes commands with proper file descriptors.">
    <rect x="40" y="445" width="720" height="140" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="60" y="465" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Stage 4: EXECUTION</text>
    <text x="60" y="479" font-family="Arial" font-size="9" fill="#666">I/O Setup: configure redirections, pipes, file descriptors</text>
    <rect x="60" y="490" width="120" height="26" rx="4" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="120" y="508" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">stdin = 0</text>
    <rect x="190" y="490" width="120" height="26" rx="4" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="250" y="508" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">stdout = 1</text>
    <rect x="320" y="490" width="120" height="26" rx="4" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="380" y="508" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">stderr = 2</text>
    <rect x="450" y="490" width="150" height="26" rx="4" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="525" y="508" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">cmd &amp; (background)</text>
    <text x="60" y="535" font-family="Arial" font-size="9" fill="#666">Process Creation: fork() → exec() for each command</text>
    <rect x="60" y="545" width="700" height="32" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="410" y="560" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">fork() → execvp("ls", args)</text>
    <text x="410" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Parent waits, child runs, status returned</text>
  </g>
</svg>