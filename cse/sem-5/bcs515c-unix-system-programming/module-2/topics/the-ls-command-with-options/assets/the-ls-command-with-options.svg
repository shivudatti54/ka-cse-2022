<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1500">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .term { font-family: 'Courier New', monospace; font-weight: bold; }
    .highlight { fill: #ff9800; }
    .pulse { animation: pulse 2s infinite; }
  </style>
  
  <rect width="800" height="1500" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to learning the ls command, the most fundamental tool for listing directory contents in Unix and Linux systems.">
    <rect x="0" y="0" width="800" height="55" fill="url(#blueGrad)" rx="0"/>
    <text x="400" y="35" font-size="22" font-weight="bold" fill="#1565c0" text-anchor="middle">The ls Command with Options</text>
    <text x="400" y="48" font-size="11" fill="#1976d2" text-anchor="middle">Essential Unix/Linux Directory Listing Utility</text>
  </g>
  
  <!-- Step 1: What is ls -->
  <g class="step" id="step1" data-narration="The ls command, short for list, displays files and directories in your current working folder, essential for navigation.">
    <rect x="30" y="65" width="740" height="85" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="90" font-size="13" font-weight="bold" fill="#1565c0">What is ls Command?</text>
    <text x="50" y="110" font-size="10" fill="#333">ls (list) is the primary Unix/Linux command for viewing directory contents.</text>
    <text x="50" y="125" font-size="10" fill="#333">It displays files, subdirectories, and detailed information about them.</text>
    <rect x="580" y="75" width="160" height="55" fill="#fff" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="660" y="105" font-size="11" font-family="monospace" fill="#1976d2" text-anchor="middle">$ ls</text>
  </g>
  
  <!-- Step 2: Basic Syntax -->
  <g class="step" id="step2" data-narration="The basic syntax follows ls followed by optional flags and the target file or directory path you want to examine.">
    <rect x="30" y="160" width="740" height="90" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="185" font-size="13" font-weight="bold" fill="#2e7d32">Basic Syntax</text>
    <rect x="50" y="200" width="350" height="35" fill="#fff" rx="5" stroke="#388e3c" stroke-width="2"/>
    <text x="225" y="222" font-size="12" font-family="monospace" fill="#388e3c" text-anchor="middle">ls [OPTIONS] [FILE/DIRECTORY]</text>
    <text x="420" y="195" font-size="9" fill="#333">OPTIONS: Flags that modify behavior (-l, -a, -h, etc.)</text>
    <text x="420" y="210" font-size="9" fill="#333">FILE/DIRECTORY: Target to list (defaults to current dir)</text>
    <text x="420" y="225" font-size="9" fill="#333">Example: ls -lah /home/user</text>
  </g>
  
  <!-- Step 3: -l Option -->
  <g class="step" id="step3" data-narration="The -l flag provides long listing format showing permissions, ownership, size, timestamps, and file names in detail.">
    <rect x="30" y="260" width="740" height="110" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="285" font-size="13" font-weight="bold" fill="#e65100">Option: -l (Long Listing Format)</text>
    <text x="50" y="305" font-size="10" fill="#333">Displays detailed information in columnar format:</text>
    <rect x="50" y="315" width="700" height="40" fill="#fff" rx="5" stroke="#ff9800"/>
    <text x="60" y="330" font-size="9" font-family="monospace" fill="#333">drwxr-xr-x  2 user  group  4096 Jan 20 14:00 Documents</text>
    <line x1="180" y1="318" x2="180" y2="352" stroke="#ccc" stroke-width="1"/>
    <line x1="230" y1="318" x2="230" y2="352" stroke="#ccc" stroke-width="1"/>
    <line x1="280" y1="318" x2="280" y2="352" stroke="#ccc" stroke-width="1"/>
    <line x1="350" y1="318" x2="350" y2="352" stroke="#ccc" stroke-width="1"/>
    <line x1="420" y1="318" x2="420" y2="352" stroke="#ccc" stroke-width="1"/>
    <text x="190" y="345" font-size="7" fill="#666">Type+Perm</text>
    <text x="255" y="345" font-size="7" fill="#666">Links</text>
    <text x="295" y="345" font-size="7" fill="#666">Owner</text>
    <text x="365" y="345" font-size="7" fill="#666">Group</text>
    <text x="435" y="345" font-size="7" fill="#666">Size</text>
  </g>
  
  <!-- Step 4: -a Option -->
  <g class="step" id="step4" data-narration="The -a option reveals hidden files starting with a dot, like configuration files .bashrc and .profile.">
    <rect x="30" y="380" width="740" height="90" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="405" font-size="13" font-weight="bold" fill="#6a1b9a">Option: -a (Show Hidden Files)</text>
    <text x="50" y="425" font-size="10" fill="#333">Reveals all files including those starting with dot (.hiddenfile)</text>
    <rect x="50" y="435" width="200" height="25" fill="#fff" rx="5" stroke="#9c27b0"/>
    <text x="150" y="452" font-size="11" font-family="monospace" fill="#9c27b0" text-anchor="middle">ls -a</text>
    <rect x="270" y="430" width="200" height="30" fill="#fff" rx="5" stroke="#9c27b0"/>
    <text x="370" y="450" font-size="9" font-family="monospace" fill="#333" text-anchor="middle">.bashrc  .profile  .config</text>
    <text x="500" y="445" font-size="9" fill="#666">Hidden config files shown</text>
  </g>
  
  <!-- Step 5: -h Option -->
  <g class="step" id="step5" data-narration="When paired with -l, the -h flag displays file sizes in human-readable format using KB, MB, or GB units.">
    <rect x="30" y="480" width="740" height="90" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="505" font-size="13" font-weight="bold" fill="#2e7d32">Option: -h (Human-Readable Sizes)</text>
    <text x="50" y="525" font-size="10" fill="#333">Shows file sizes in KB, MB, GB instead of raw bytes (works with -l)</text>
    <rect x="50" y="535" width="280" height="25" fill="#fff" rx="5" stroke="#388e3c"/>
    <text x="190" y="552" font-size="11" font-family="monospace" fill="#388e3c" text-anchor="middle">ls -lh</text>
    <rect x="350" y="535" width="400" height="25" fill="#fff" rx="5" stroke="#388e3c"/>
    <text x="550" y="552" font-size="10" font-family="monospace" fill="#333" text-anchor="middle">1.2K  45M  3.8G</text>
    <path d="M345 547 L360 547" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
  </g>
  
  <!-- Step 6: -d Option -->
  <g class="step" id="step6" data-narration="The -d option lists directories themselves rather than their contents, useful for examining directory metadata.">
    <rect x="30" y="580" width="740" height="85" fill="url(#redGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="605" font-size="13" font-weight="bold" fill="#c62828">Option: -d (List Directories Themselves)</text>
    <text x="50" y="625" font-size="10" fill="#333">Lists directory information instead of its contents</text>
    <rect x="50" y="635" width="220" height="22" fill="#fff" rx="5" stroke="#f44336"/>
    <text x="160" y="650" font-size="10" font-family="monospace" fill="#c62828" text-anchor="middle">ls -ld mydir</text>
    <text x="290" y="648" font-size="9" fill="#666">vs</text>
    <rect x="320" y="635" width="180" height="22" fill="#fff" rx="5" stroke="#ccc"/>
    <text x="410" y="650" font-size="10" font-family="monospace" fill="#666" text-anchor="middle">ls -l mydir</text>
    <text x="520" y="648" font-size="9" fill="#333">→ lists contents inside</text>
  </g>
  
  <!-- Step 7: -r and -t Options -->
  <g class="step" id="step7" data-narration="The -r reverses sorting order while -t sorts by modification time, newest first, essential for finding recent changes.">
    <rect x="30" y="675" width="740" height="95" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="700" font-size="13" font-weight="bold" fill="#1565c0">Options: -r (Reverse) and -t (Sort by Time)</text>
    <rect x="50" y="715" width="340" height="45" fill="#fff" rx="5" stroke="#1976d2"/>
    <text x="70" y="732" font-size="10" fill="#1565c0">-r: Reverses default alphabetical sorting</text>
    <text x="70" y="748" font-size="10" fill="#1565c0">-t: Sorts by modification time (newest first)</text>
    <text x="220" y="758" font-size="9" font-family="monospace" fill="#666">ls -ltr  ← combined example</text>
    <rect x="410" y="720" width="340" height="40" fill="#e3f2fd" rx="5" stroke="#90caf9"/>
    <text x="430" y="738" font-size="9" fill="#333">Common combinations:</text>
    <text x="430" y="752" font-size="9" font-family="monospace" fill="#1976d2">-lah  -ltr  -lhS  -lR</text>
  </g>
  
  <!-- Step 8: -R Option -->
  <g class="step" id="step8" data-narration="The -R flag recursively lists all subdirectories, displaying the complete directory tree structure.">
    <rect x="30" y="780" width="740" height="90" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="805" font-size="13" font-weight="bold" fill="#e65100">Option: -R (Recursive Listing)</text>
    <text x="50" y="825" font-size="10" fill="#333">Recursively lists all subdirectories showing complete tree structure</text>
    <rect x="50" y="835" width="200" height="25" fill="#fff" rx="5" stroke="#ff9800"/>
    <text x="150" y="852" font-size="11" font-family="monospace" fill="#e65100" text-anchor="middle">ls -R</text>
    <rect x="270" y="800" width="480" height="55" fill="#fff" rx="5" stroke="#ffcc80"/>
    <text x="285" y="818" font-size="9" font-family="monospace" fill="#333">/home:</text>
    <text x="285" y="832" font-size="9" font-family="monospace" fill="#333">  user/ </text>
    <text x="345" y="832" font-size="9" font-family="monospace" fill="#333">documents/  downloads/</text>
    <text x="285" y="846" font-size="9" font-family="monospace" fill="#333">  /home/user/documents:</text>
    <text x="420" y="846" font-size="9" font-family="monospace" fill="#333">notes.txt  report.pdf</text>
  </g>
  
  <!-- Step 9: -i Option -->
  <g class="step" id="step9" data-narration="The -i option displays inode numbers, unique identifiers for each file in the filesystem, useful for finding hard links.">
    <rect x="30" y="880" width="740" height="85" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="905" font-size="13" font-weight="bold" fill="#6a1b9a">Option: -i (Inode Number)</text>
    <text x="50" y="925" font-size="10" fill="#333">Displays inode number - unique file identifier in filesystem</text>
    <rect x="50" y="935" width="200" height="22" fill="#fff" rx="5" stroke="#9c27b0"/>
    <text x="150" y="950" font-size="11" font-family="monospace" fill="#6a1b9a" text-anchor="middle">ls -li</text>
    <rect x="270" y="895" width="300" height="55" fill="#fff" rx="5" stroke="#ce93d8"/>
    <text x="285" y="915" font-size="9" font-family="monospace" fill="#333">1234567 -rw-r--r--</text>
    <text x="285" y="930" font-size="9" font-family="monospace" fill="#333">2345678 -rw-r--r--</text>
    <text x="285" y="945" font-size="9" font-family="monospace" fill="#333">3456789 drwxr-xr-x</text>
    <text x="580" y="925" font-size="9" fill="#666">Inode = unique ID</text>
  </g>
  
  <!-- Step 10: --color Option -->
  <g class="step" id="step10" data-narration="The --color flag enables colored output where different file types appear in distinct colors for easy identification.">
    <rect x="30" y="975" width="740" height="85" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="1000" font-size="13" font-weight="bold" fill="#2e7d32">Option: --color (Colored Output)</text>
    <text x="50" y="1020" font-size="10" fill="#333">Enables colored output for different file types</text>
    <rect x="50" y="1030" width="200" height="22" fill="#fff" rx="5" stroke="#388e3c"/>
    <text x="150" y="1045" font-size="11" font-family="monospace" fill="#388e3c" text-anchor="middle">ls --color</text>
    <rect x="270" y="990" width="480" height="55" fill="#fff" rx="5" stroke="#a5d6a7"/>
    <circle cx="295" cy="1015" r="5" fill="#1976d2"/>
    <text x="305" y="1018" font-size="9" fill="#333">Directory</text>
    <circle cx="380" cy="1015" r="5" fill="#388e3c"/>
    <text x="390" y="1018" font-size="9" fill="#333">Executable</text>
    <circle cx="480" cy="1015" r="5" fill="#fff"/>
    <text x="490" y="1018" font-size="9" fill="#333">Regular File</text>
    <circle cx="580" cy="1015" r="5" fill="#00bcd4"/>
    <text x="590" y="1018" font-size="9" fill="#333">Symlink</text>
    <circle cx="670" cy="1015" r="5" fill="#f44336"/>
    <text x="680" y="1018" font-size="9" fill="#333">Archive</text>
  </g>
  
  <!-- Step 11: Combining Options -->
  <g class="step" id="step11" data-narration="Multiple options can be combined without spaces, like -lah, for powerful directory listing commands.">
    <rect x="30" y="1070" width="740" height="110" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="1095" font-size="13" font-weight="bold" fill="#1565c0">Combining Options</text>
    <text x="50" y="1115" font-size="10" fill="#333">Multiple options can be combined into one string</text>
    <rect x="50" y="1125" width="680" height="45" fill="#fff" rx="5" stroke="#90caf9"/>
    <text x="70" y="1145" font-size="11" font-family="monospace" fill="#1976d2">ls -lah  </text>
    <text x="145" y="1145" font-size="10" fill="#666">← -l (long) + -a (all) + -h (human)</text>
    <text x="70" y="1160" font-size="10" font-family="monospace" fill="#333">ls -ltr  </text>
    <text x="140" y="1160" font-size="10" fill="#666">← long + time sort + reverse</text>
    <text x="350" y="1145" font-size="10" font-family="monospace" fill="#333">ls -R -i</text>
    <text x="430" y="1145" font-size="10" fill="#666">← recursive + inodes</text>
  </g>
  
  <!-- Step 12: Example Output -->
  <g class="step" id="step12" data-narration="This example shows combined options revealing all files with detailed info and readable sizes.">
    <rect x="30" y="1190" width="740" height="110" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="1215" font-size="13" font-weight="bold" fill="#e65100">Example: ls -lah /home/user</text>
    <rect x="50" y="1230" width="350" height="60" fill="#fff" rx="5" stroke="#ffcc80"/>
    <text x="65" y="1248" font-size="9" font-family="monospace" fill="#333">total 48K</text>
    <text x="65" y="1262" font-size="9" font-family="monospace" fill="#333">drwxr-xr-x 5 user user 4096 Jan 20 .</text>
    <text x="65" y="1276" font-size="9" font-family="monospace" fill="#333">drwxr-xr-x 3 root root 4096 Jan 15 ..</text>
    <text x="65" y="1290" font-size="9" font-family="monospace" fill="#333">-rw-r--r-- 1 user user 512 Jan 10 .bashrc</text>
    <rect x="420" y="1230" width="340" height="60" fill="#fff" rx="5" stroke="#ffcc80"/>
    <text x="435" y="1248" font-size="9" font-family="monospace" fill="#333">drwxr-xr-x 2 user user 4096 Jan 18 Documents</text>
    <text x="435" y="1262" font-size="9" font-family="monospace" fill="#333">-rw-r--r-- 1 user user 1.2K Jan 19 project.c</text>
    <text x="435" y="1276" font-size="9" font-family="monospace" fill="#333">-rw-r--r-- 1 user user 45M Jan 20 data.zip</text>
    <text x="435" y="1290" font-size="9" font-family="monospace" fill="#333">-rwxr-xr-x 1 user user 2.4K Jan 18 script.sh</text>
  </g>
  
  <!-- Step 13: Key Takeaways -->
  <g class="step" id="step13" data-narration="Key points: first character shows file type, 9 permission bits, and use -d to list directories themselves.">
    <rect x="30" y="1310" width="740" height="100" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="1335" font-size="13" font-weight="bold" fill="#6a1b9a">Key Takeaways</text>
    <rect x="50" y="1350" width="220" height="50" fill="#fff" rx="5" stroke="#ce93d8"/>
    <text x="65" y="1368" font-size="9" fill="#333">First character = type:</text>
    <text x="65" y="1382" font-size="8" font-family="monospace" fill="#333">- file  d dir  l link</text>
    <text x="65" y="1394" font-size="8" font-family="monospace" fill="#333">c device  b block</text>
    <rect x="280" y="1350" width="230" height="50" fill="#fff" rx="5" stroke="#ce93d8"/>
    <text x="295" y="1368" font-size="9" fill="#333">9 permission bits:</text>
    <text x="295" y="1382" font-size="8" font-family="monospace" fill="#333">rwx rwx rwx</text>
    <text x="295" y="1394" font-size="8" font-family="monospace" fill="#333">user group others</text>
    <rect x="520" y="1350" width="230" height="50" fill="#fff" rx="5" stroke="#ce93d8"/>
    <text x="535" y="1368" font-size="9" fill="#333">Important flags:</text>
    <text x="535" y="1382" font-size="8" font-family="monospace" fill="#333">-d: list dir itself</text>
    <text x="535" y="1394" font-size="8" font-family="monospace" fill="#333">-i: show inodes</text>
  </g>
  
  <!-- Step 14: Common Mistakes -->
  <g class="step" id="step14" data-narration="Avoid these errors: -h needs -l, use -A not -a to exclude dot entries, and remember -d for directory info.">
    <rect x="30" y="1420" width="740" height="70" fill="url(#redGrad)" rx="10" filter="url(#shadow)"/>
    <text x="50" y="1445" font-size="13" font-weight="bold" fill="#c62828">Common Mistakes to Avoid</text>
    <rect x="50" y="1460" width="680" height="25" fill="#fff" rx="5" stroke="#ef9a9a"/>
    <text x="65" y="1476" font-size="9" fill="#333">• -h alone doesn't work → must use with -l  |  • Use -A instead of -a to exclude . and ..  |  • ls without args lists current dir</text>
  </g>
</svg>