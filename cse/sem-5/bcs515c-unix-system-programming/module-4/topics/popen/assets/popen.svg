<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about popen, a powerful C function for creating pipes and executing shell commands for interprocess communication in Unix and Linux systems.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">popen() - Process Pipes in Unix/C Programming</text>
  </g>
  
  <g class="step" id="step1" data-narration="A pipe is a unidirectional communication channel in Unix. It connects the output of one process to the input of another process.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Understanding Pipes in Unix</text>
    <rect x="40" y="95" width="180" height="38" rx="3" fill="#bbdefb"/>
    <text x="50" y="110" font-family="Arial" font-size="9" fill="#0d47a1">One-way pipe</text>
    <text x="50" y="122" font-family="Arial" font-size="8" fill="#0d47a1">Data flows in one direction</text>
    <path d="M250 100 L300 100" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="310" y="80" width="200" height="50" rx="3" fill="#bbdefb"/>
    <text x="320" y="95" font-family="Arial" font-size="9" fill="#0d47a1">Process A</text>
    <text x="320" y="107" font-family="Arial" font-size="8" fill="#0d47a1">stdout ──► stdin</text>
    <text x="320" y="119" font-family="Arial" font-size="8" fill="#0d47a1">Process B</text>
    <path d="M540 100 L590 100" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="600" y="82" width="160" height="45" rx="3" fill="#bbdefb"/>
    <text x="610" y="97" font-family="Arial" font-size="9" fill="#0d47a1">Anonymous pipe</text>
    <text x="610" y="112" font-family="Arial" font-size="8" fill="#0d47a1">Exists only while</text>
    <text x="610" y="122" font-family="Arial" font-size="8" fill="#0d47a1">processes run</text>
  </g>
  
  <g class="step" id="step2" data-narration="The popen function creates a pipe and executes a shell command. It returns a FILE pointer for reading or writing to the command.">
    <rect x="20" y="151" width="760" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="173" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">popen() Function Prototype</text>
    <rect x="40" y="190" width="320" height="38" rx="3" fill="#c8e6c9"/>
    <text x="50" y="205" font-family="Courier New" font-size="11" fill="#1b5e20">FILE *popen(const char *command, const char *mode);</text>
    <rect x="380" y="190" width="200" height="38" rx="3" fill="#c8e6c9"/>
    <text x="390" y="205" font-family="Arial" font-size="9" fill="#1b5e20">Parameters:</text>
    <text x="390" y="218" font-family="Arial" font-size="8" fill="#1b5e20">command: shell command to execute</text>
    <text x="540" y="218" font-family="Arial" font-size="8" fill="#1b5e20">mode: "r" or "w"</text>
    <rect x="600" y="190" width="170" height="38" rx="3" fill="#c8e6c9"/>
    <text x="610" y="205" font-family="Arial" font-size="9" fill="#1b5e20">Returns:</text>
    <text x="610" y="218" font-family="Arial" font-size="8" fill="#1b5e20">FILE* on success, NULL on failure</text>
  </g>
  
  <g class="step" id="step3" data-narration="popen supports two modes: read mode 'r' lets you capture command output, while write mode 'w' lets you send input to a command.">
    <rect x="20" y="244" width="760" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="266" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Two Modes of popen()</text>
    <rect x="40" y="285" width="340" height="35" rx="3" fill="#ffe0b2"/>
    <text x="50" y="300" font-family="Arial" font-size="10" fill="#e65100">Read Mode ("r") - Read from command's stdout</text>
    <text x="50" y="312" font-family="Arial" font-size="8" fill="#e65100">Example: fp = popen("date", "r"); fgets(buffer, sizeof(buffer), fp);</text>
    <rect x="400" y="285" width="340" height="35" rx="3" fill="#ffe0b2"/>
    <text x="410" y="300" font-family="Arial" font-size="10" fill="#e65100">Write Mode ("w") - Write to command's stdin</text>
    <text x="410" y="312" font-family="Arial" font-size="8" fill="#e65100">Example: fp = popen("mail user@host", "w"); fprintf(fp, "message");</text>
  </g>
  
  <g class="step" id="step4" data-narration="pclose closes the pipe and waits for the child process to finish. Always call pclose to prevent zombie processes and resource leaks.">
    <rect x="20" y="337" width="760" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="359" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">pclose() and Error Handling</text>
    <rect x="40" y="375" width="200" height="38" rx="3" fill="#ffcdd2"/>
    <text x="50" y="390" font-family="Courier New" font-size="11" fill="#b71c1c">int pclose(FILE *stream);</text>
    <text x="50" y="405" font-family="Arial" font-size="8" fill="#b71c1c">Closes pipe, waits for process, returns exit status</text>
    <rect x="260" y="375" width="250" height="38" rx="3" fill="#ffcdd2"/>
    <text x="270" y="390" font-family="Arial" font-size="9" fill="#b71c1c">Error Checking:</text>
    <text x="270" y="403" font-family="Arial" font-size="8" fill="#b71c1c">if (fp == NULL) perror("popen failed");</text>
    <rect x="530" y="375" width="240" height="38" rx="3" fill="#ffcdd2"/>
    <text x="540" y="390" font-family="Arial" font-size="9" fill="#b71c1c">Common Errors:</text>
    <text x="540" y="403" font-family="Arial" font-size="8" fill="#b71c1c">ENOMEM, EMFILE, ENOENT (shell not found)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Internally, popen creates a pipe, forks a child process, redirects stdin or stdout, and executes the command through the shell.">
    <rect x="20" y="430" width="760" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="452" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Internal Working of popen()</text>
    <rect x="40" y="470" width="110" height="35" rx="3" fill="#e1bee7"/>
    <text x="45" y="482" font-family="Arial" font-size="8" fill="#4a148c">1. pipe()</text>
    <text x="45" y="496" font-family="Arial" font-size="7" fill="#4a148c">Create pipe</text>
    <rect x="160" y="470" width="110" height="35" rx="3" fill="#e1bee7"/>
    <text x="165" y="482" font-family="Arial" font-size="8" fill="#4a148c">2. fork()</text>
    <text x="165" y="496" font-family="Arial" font-size="7" fill="#4a148c">Clone process</text>
    <rect x="280" y="470" width="110" height="35" rx="3" fill="#e1bee7"/>
    <text x="285" y="482" font-family="Arial" font-size="8" fill="#4a148c">3. redirect</text>
    <text x="285" y="496" font-family="Arial" font-size="7" fill="#4a148c">stdin/stdout</text>
    <rect x="400" y="470" width="110" height="35" rx="3" fill="#e1bee7"/>
    <text x="405" y="482" font-family="Arial" font-size="8" fill="#4a148c">4. exec</text>
    <text x="405" y="496" font-family="Arial" font-size="7" fill="#4a148c">Run command</text>
    <rect x="520" y="470" width="110" height="35" rx="3" fill="#e1bee7"/>
    <text x="525" y="482" font-family="Arial" font-size="8" fill="#4a148c">5. parent</text>
    <text x="525" y="496" font-family="Arial" font-size="7" fill="#4a148c">Returns FILE*</text>
    <rect x="640" y="470" width="130" height="35" rx="3" fill="#e1bee7"/>
    <text x="650" y="482" font-family="Arial" font-size="8" fill="#4a148c">Uses /bin/sh -c</text>
    <text x="650" y="496" font-family="Arial" font-size="7" fill="#4a148c">Shell interpretation</text>
  </g>
  
  <g class="step" id="step6" data-narration="Remember these exam tips: always use pclose, check for NULL, use only 'r' or 'w' mode, and flush buffers before closing in write mode.">
    <rect x="20" y="523" width="760" height="60" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="545" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips & Key Points</text>
    <text x="40" y="565" font-family="Arial" font-size="9" fill="#0d47a1">• Always pair popen() with pclose() to prevent zombie processes</text>
    <text x="280" y="565" font-family="Arial" font-size="9" fill="#0d47a1">• Check return value against NULL</text>
    <text x="470" y="565" font-family="Arial" font-size="9" fill="#0d47a1">• Use fflush() before pclose() in write mode</text>
    <text x="680" y="565" font-family="Arial" font-size="9" fill="#0d47a1">• No combined "rw" mode</text>
  </g>
</svg>