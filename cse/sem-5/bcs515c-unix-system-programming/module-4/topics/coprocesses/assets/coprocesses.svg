<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Coprocesses are background processes in Unix shells with bidirectional communication through stdin and stdout, enabling real-time data exchange between the shell and subprocesses.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Coprocesses in Unix/Linux Shell Programming</text>
  </g>

  <!-- step1: What is a Coprocess -->
  <g class="step" id="step1" data-narration="A coprocess is a background process with two-way communication. The shell can read from its stdout and write to its stdin using file descriptors, unlike regular background jobs.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is a Coprocess?</text>
    <rect x="40" y="92" width="220" height="36" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="108" font-family="Arial" font-size="10" fill="#333">Definition:</text>
    <text x="50" y="122" font-family="Arial" font-size="9" fill="#666">Background process with</text>
    <text x="50" y="133" font-family="Arial" font-size="9" fill="#666">bidirectional I/O</text>
    <path d="M280 95 L340 95" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="350" y="78" width="180" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="360" y="94" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Key Difference:</text>
    <text x="360" y="108" font-family="Arial" font-size="9" fill="#333">Background job (&amp;):</text>
    <text x="360" y="120" font-family="Arial" font-size="8" fill="#666">stdout only</text>
    <text x="440" y="108" font-family="Arial" font-size="9" fill="#333">Coprocess:</text>
    <text x="440" y="120" font-family="Arial" font-size="8" fill="#666">stdin + stdout</text>
    <rect x="550" y="80" width="210" height="48" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="560" y="96" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Introduced in:</text>
    <text x="560" y="110" font-family="Arial" font-size="9" fill="#333">Korn Shell (ksh)</text>
    <text x="560" y="122" font-family="Arial" font-size="9" fill="#333">Bash 4.0+</text>
  </g>

  <!-- step2: Syntax and File Descriptors -->
  <g class="step" id="step2" data-narration="The coproc syntax is: coproc NAME { commands; } or coproc NAME ( commands ). File descriptor NAME[0] reads from stdout, NAME[1] writes to stdin.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Syntax and File Descriptors</text>
    <text x="40" y="190" font-family="Courier" font-size="10" fill="#333">coproc NAME { commands; }</text>
    <text x="40" y="205" font-family="Courier" font-size="10" fill="#333">coproc NAME ( commands )</text>
    <text x="40" y="220" font-family="Arial" font-size="9" fill="#666">Default name: COPROC</text>
    <rect x="280" y="160" width="240" height="56" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="290" y="178" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">File Descriptors:</text>
    <text x="290" y="192" font-family="Courier" font-size="10" fill="#333">${NAME[0]}</text>
    <text x="370" y="192" font-family="Arial" font-size="9" fill="#666">→ read from stdout</text>
    <text x="290" y="208" font-family="Courier" font-size="10" fill="#333">${NAME[1]}</text>
    <text x="370" y="208" font-family="Arial" font-size="9" fill="#666">→ write to stdin</text>
    <rect x="540" y="160" width="220" height="56" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="550" y="178" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Example:</text>
    <text x="550" y="192" font-family="Courier" font-size="9" fill="#333">coproc BC { bc -l; }</text>
    <text x="550" y="208" font-family="Arial" font-size="9" fill="#666">${BC[0]} = read, ${BC[1]} = write</text>
  </g>

  <!-- step3: Properties -->
  <g class="step" id="step3" data-narration="Five key properties: bidirectional communication using pipes, asynchronous execution, own process group for job control, automatic wait on exit, and real-time data exchange.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Properties of Coprocesses</text>
    <rect x="40" y="270" width="140" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="48" y="284" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">1. Bidirectional</text>
    <text x="48" y="298" font-family="Arial" font-size="8" fill="#666">Two-way I/O</text>
    <rect x="190" y="270" width="140" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="198" y="284" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">2. Named Pipes</text>
    <text x="198" y="298" font-family="Arial" font-size="8" fill="#666">Internal IPC</text>
    <rect x="340" y="270" width="140" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="348" y="284" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">3. Asynchronous</text>
    <text x="348" y="298" font-family="Arial" font-size="8" fill="#666">Runs in background</text>
    <rect x="490" y="270" width="140" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="498" y="284" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">4. Process Group</text>
    <text x="498" y="298" font-family="Arial" font-size="8" fill="#666">Job control</text>
    <rect x="640" y="270" width="120" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="648" y="284" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">5. Auto-Wait</text>
    <text x="648" y="298" font-family="Arial" font-size="8" fill="#666">Clean exit</text>
  </g>

  <!-- step4: Example 1 - Calculator -->
  <g class="step" id="step4" data-narration="This example creates a bc calculator coprocess. We write expressions to ${BC[1]} and read results from ${BC[0]}, demonstrating real-time math operations.">
    <rect x="20" y="322" width="760" height="93" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Example 1: Calculator with bc</text>
    <rect x="40" y="358" width="350" height="38" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="48" y="372" font-family="Courier" font-size="9" fill="#333">coproc BC { bc -l; }</text>
    <text x="48" y="386" font-family="Courier" font-size="8" fill="#666">echo "scale=4; 10/3" &gt;&amp;${BC[1]}</text>
    <rect x="400" y="358" width="360" height="38" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="408" y="372" font-family="Courier" font-size="9" fill="#333">read result &lt;&amp;${BC[0]}</text>
    <text x="408" y="386" font-family="Courier" font-size="8" fill="#666">wait $BC_PID</text>
    <text x="40" y="408" font-family="Arial" font-size="10" fill="#666">Output: 3.3333 | 1024 | 10.0000</text>
  </g>

  <!-- step5: Example 2 - Data Processing -->
  <g class="step" id="step5" data-narration="This example processes text through awk. We send data to the coprocess's stdin and read transformed output from stdout, using uppercasing as demonstration.">
    <rect x="20" y="423" width="760" height="95" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="445" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Example 2: Data Processing with awk</text>
    <rect x="40" y="459" width="340" height="38" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="48" y="473" font-family="Courier" font-size="9" fill="#333">coproc AWK { awk '{print toupper($0)}'; }</text>
    <text x="48" y="487" font-family="Courier" font-size="8" fill="#666">echo "hello world" &gt;&amp;${AWK[1]}</text>
    <rect x="390" y="459" width="370" height="38" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="398" y="473" font-family="Courier" font-size="9" fill="#333">exec ${AWK[1]}&gt;&amp;-  # Close write end</text>
    <text x="398" y="487" font-family="Courier" font-size="8" fill="#666">while read line &lt;&amp;${AWK[0]}</text>
    <text x="40" y="510" font-family="Arial" font-size="10" fill="#666">Output: HELLO WORLD | UNIX |  CSE</text>
  </g>

  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Key exam points: remember fd[0]=read, fd[1]=write, always close write end after communication, use wait to prevent zombies, and use read -t timeout to avoid blocking.">
    <rect x="20" y="526" width="760" height="68" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="548" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Exam Tips &amp; Common Mistakes</text>
    <rect x="40" y="560" width="230" height="28" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="48" y="572" font-family="Courier" font-size="8" fill="#333">${NAME[0]} = read</text>
    <text x="48" y="582" font-family="Courier" font-size="8" fill="#333">${NAME[1]} = write</text>
    <rect x="280" y="560" width="240" height="28" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="288" y="572" font-family="Courier" font-size="8" fill="#333">exec ${NAME[1]}&gt;&amp;-  # close</text>
    <text x="288" y="582" font-family="Courier" font-size="8" fill="#333">wait $NAME_PID  # no zombie</text>
    <rect x="530" y="560" width="230" height="28" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="538" y="572" font-family="Courier" font-size="8" fill="#333">read -t timeout</text>
    <text x="538" y="582" font-family="Courier" font-size="8" fill="#333"># prevent block</text>
  </g>
</svg>