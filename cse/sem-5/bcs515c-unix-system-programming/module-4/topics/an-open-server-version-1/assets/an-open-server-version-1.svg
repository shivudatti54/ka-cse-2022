<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This lesson covers open source web servers like Apache and Nginx, their architectures, configurations, and security best practices for web deployment.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Open Source Web Servers</text>
  </g>
  
  <g class="step" id="step1" data-narration="Open source web servers like Apache, Nginx, and Lighttpd power millions of websites. They serve web content over HTTP/HTTPS protocols using client-server architecture.">
    <rect x="20" y="58" width="760" height="100" fill="#e8f5e9" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">What are Open Source Web Servers?</text>
    <rect x="40" y="95" width="160" height="50" fill="#c8e6c9" rx="4"/>
    <text x="120" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Apache HTTP</text>
    <text x="120" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Server (1995)</text>
    <rect x="220" y="95" width="160" height="50" fill="#c8e6c9" rx="4"/>
    <text x="300" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Nginx</text>
    <text x="300" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Engine-X (2004)</text>
    <rect x="400" y="95" width="160" height="50" fill="#c8e6c9" rx="4"/>
    <text x="480" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Lighttpd</text>
    <text x="480" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Lightweight</text>
    <text x="580" y="110" font-family="Arial" font-size="10" fill="#388e3c">→ Client-Server Model</text>
    <text x="580" y="125" font-family="Arial" font-size="10" fill="#388e3c">→ HTTP/HTTPS Protocols</text>
    <text x="580" y="140" font-family="Arial" font-size="10" fill="#388e3c">→ Free &amp; Modifiable</text>
  </g>
  
  <g class="step" id="step2" data-narration="Apache uses a modular design with MPMs (prefork, worker, event) for handling connections. It supports .htaccess files and virtual hosting for multiple websites.">
    <rect x="20" y="166" width="760" height="100" fill="#e3f2fd" rx="8"/>
    <text x="40" y="188" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Apache HTTP Server Features</text>
    <rect x="40" y="205" width="220" height="50" fill="#bbdefb" rx="4"/>
    <text x="150" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Modular Architecture</text>
    <text x="150" y="238" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">60+ modules (mod_rewrite, mod_ssl)</text>
    <rect x="280" y="205" width="220" height="50" fill="#bbdefb" rx="4"/>
    <text x="390" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Multi-Processing Modules</text>
    <text x="390" y="238" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">prefork | worker | event</text>
    <rect x="520" y="205" width="240" height="50" fill="#bbdefb" rx="4"/>
    <text x="640" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Key Features</text>
    <text x="640" y="238" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">.htaccess | Virtual Hosting</text>
    <text x="40" y="250" font-family="Arial" font-size="9" fill="#1976d2">Apache: Process/thread-per-request model</text>
  </g>
  
  <g class="step" id="step3" data-narration="Nginx uses event-driven, non-blocking architecture to handle thousands of concurrent connections efficiently. It excels at static content and reverse proxy.">
    <rect x="20" y="274" width="760" height="100" fill="#fff3e0" rx="8"/>
    <text x="40" y="296" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Nginx Web Server</text>
    <rect x="40" y="315" width="340" height="45" fill="#ffe0b2" rx="4"/>
    <text x="210" y="332" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Event-Driven Architecture</text>
    <text x="210" y="347" text-anchor="middle" font-family="Arial" font-size="9" fill="#ef6c00">Single process handles thousands of connections</text>
    <rect x="400" y="315" width="180" height="45" fill="#ffe0b2" rx="4"/>
    <text x="490" y="332" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Reverse Proxy</text>
    <text x="490" y="347" text-anchor="middle" font-family="Arial" font-size="9" fill="#ef6c00">Distributes to backends</text>
    <rect x="600" y="315" width="160" height="45" fill="#ffe0b2" rx="4"/>
    <text x="680" y="332" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Load Balancing</text>
    <text x="680" y="347" text-anchor="middle" font-family="Arial" font-size="9" fill="#ef6c00">Round-robin, Least Conn</text>
    <text x="40" y="355" font-family="Arial" font-size="9" fill="#ff9800">Nginx: Event loop, non-blocking I/O for high concurrency</text>
  </g>
  
  <g class="step" id="step4" data-narration="HTTP protocol uses GET, POST, PUT, DELETE methods with status codes like 200 (OK), 404 (Not Found), 500 (Error). Keep-Alive enables persistent connections.">
    <rect x="20" y="382" width="760" height="100" fill="#f3e5f5" rx="8"/>
    <text x="40" y="404" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">HTTP Protocol &amp; Virtual Hosting</text>
    <rect x="40" y="420" width="150" height="50" fill="#e1bee7" rx="4"/>
    <text x="115" y="438" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">HTTP Methods</text>
    <text x="115" y="455" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">GET, POST, PUT, DELETE</text>
    <rect x="210" y="420" width="150" height="50" fill="#e1bee7" rx="4"/>
    <text x="285" y="438" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Status Codes</text>
    <text x="285" y="455" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">200, 301, 404, 500</text>
    <rect x="380" y="420" width="180" height="50" fill="#e1bee7" rx="4"/>
    <text x="470" y="438" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Virtual Hosting</text>
    <text x="470" y="455" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Name/IP-based multi-site</text>
    <rect x="580" y="420" width="180" height="50" fill="#e1bee7" rx="4"/>
    <text x="670" y="438" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Keep-Alive</text>
    <text x="670" y="455" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Persistent connections</text>
    <text x="40" y="475" font-family="Arial" font-size="9" fill="#9c27b0">Apache config: /etc/apache2/ | Nginx config: /etc/nginx/</text>
  </g>
  
  <g class="step" id="step5" data-narration="Configure virtual hosts using VHost files, set up reverse proxy with proxy_pass directive, and enable SSL/TLS using Let's Encrypt certificates for HTTPS.">
    <rect x="20" y="490" width="760" height="98" fill="#ffebee" rx="8"/>
    <text x="40" y="512" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Configuration &amp; Security</text>
    <rect x="40" y="530" width="220" height="45" fill="#ffcdd2" rx="4"/>
    <text x="150" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Apache Virtual Host</text>
    <text x="150" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">&lt;VirtualHost *:80&gt;</text>
    <rect x="280" y="530" width="220" height="45" fill="#ffcdd2" rx="4"/>
    <text x="390" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Nginx Reverse Proxy</text>
    <text x="390" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">proxy_pass http://backend;</text>
    <rect x="520" y="530" width="240" height="45" fill="#ffcdd2" rx="4"/>
    <text x="640" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">SSL/TLS (HTTPS)</text>
    <text x="640" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Port 443, Let's Encrypt</text>
    <text x="40" y="582" font-family="Arial" font-size="9" fill="#f44336">Test config: apache2ctl configtest | nginx -t</text>
  </g>
</svg>