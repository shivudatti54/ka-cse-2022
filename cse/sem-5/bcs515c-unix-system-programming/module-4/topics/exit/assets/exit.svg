<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
  </marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="This topic covers exit status codes, the exit command syntax, standard exit codes, conditional checking with $?, and trap for cleanup operations.">
  <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Exit Status and Exit Command in Shell Programming</text>
</g>
<g class="step" id="step1" data-narration="Exit status is a numeric code from 0 to 255 that a process returns to its parent shell. Zero means success, non-zero indicates failure or error condition.">
  <rect x="20" y="58" width="760" height="72" fill="#e3f2fd" rx="8"/>
  <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Exit Status?</text>
  <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">Numeric code (0-255) returned by process to parent indicating status.</text>
  <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">Stored in <tspan font-weight="bold">$?</tspan> immediately after command execution completes.</text>
  <text x="40" y="126" font-family="Arial" font-size="10" fill="#333"><tspan fill="#388e3c" font-weight="bold">0</tspan> = Success | <tspan fill="#f44336" font-weight="bold">Non-zero</tspan> = Failure</text>
</g>
<g class="step" id="step2" data-narration="The exit command terminates a shell script with a status code. Syntax is exit n where n ranges from 0 to 255. Without n, it uses the last command's exit status.">
  <rect x="20" y="138" width="760" height="82" fill="#fff3e0" rx="8"/>
  <text x="40" y="158" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Exit Command Syntax</text>
  <text x="40" y="176" font-family="Arial" font-size="11" fill="#333">exit [n] — Terminates script with status n (0-255)</text>
  <rect x="40" y="186" width="200" height="22" fill="#fff" stroke="#ff9800" rx="4"/>
  <text x="50" y="201" font-family="Courier" font-size="10" fill="#333">exit 0   # Success</text>
  <rect x="250" y="186" width="200" height="22" fill="#fff" stroke="#ff9800" rx="4"/>
  <text x="260" y="201" font-family="Courier" font-size="10" fill="#333">exit 1   # Error</text>
  <text x="40" y="218" font-family="Arial" font-size="9" fill="#666">Note: Values >255 wrap around (modulo 256). No n uses last $?</text>
</g>
<g class="step" id="step3" data-narration="Common standard exit codes include zero for success, one for general errors, two for command misuse, one hundred twenty-six for non-executable files, one hundred twenty-seven for command not found, and one hundred thirty for script interrupted by ctrl+c.">
  <rect x="20" y="228" width="760" height="78" fill="#e8f5e9" rx="8"/>
  <text x="40" y="248" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Standard Exit Codes</text>
  <g transform="translate(40, 262)">
    <rect x="0" y="0" width="45" height="16" fill="#388e3c" rx="3"/>
    <text x="22" y="12" text-anchor="middle" font-family="Arial" font-size="8" fill="white">0</text>
    <text x="55" y="12" font-family="Arial" font-size="9" fill="#333">Success</text>
    <rect x="120" y="0" width="45" height="16" fill="#f44336" rx="3"/>
    <text x="142" y="12" text-anchor="middle" font-family="Arial" font-size="8" fill="white">1</text>
    <text x="175" y="12" font-family="Arial" font-size="9" fill="#333">Error</text>
    <rect x="240" y="0" width="45" height="16" fill="#ff9800" rx="3"/>
    <text x="262" y="12" text-anchor="middle" font-family="Arial" font-size="8" fill="white">2</text>
    <text x="295" y="12" font-family="Arial" font-size="9" fill="#333">Misuse</text>
    <rect x="0" y="20" width="45" height="16" fill="#9c27b0" rx="3"/>
    <text x="22" y="32" text-anchor="middle" font-family="Arial" font-size="8" fill="white">126</text>
    <text x="55" y="32" font-family="Arial" font-size="9" fill="#333">No exec</text>
    <rect x="120" y="20" width="45" height="16" fill="#9c27b0" rx="3"/>
    <text x="142" y="32" text-anchor="middle" font-family="Arial" font-size="8" fill="white">127</text>
    <text x="175" y="32" font-family="Arial" font-size="9" fill="#333">Not found</text>
    <rect x="240" y="20" width="45" height="16" fill="#f44336" rx="3"/>
    <text x="262" y="32" text-anchor="middle" font-family="Arial" font-size="8" fill="white">130</text>
    <text x="295" y="32" font-family="Arial" font-size="9" fill="#333">Ctrl+C</text>
  </g>
</g>
<g class="step" id="step4" data-narration="Check exit status with if condition or logical operators like && and ||. Always capture $? immediately since the next command overwrites it.">
  <rect x="20" y="314" width="760" height="72" fill="#e3f2fd" rx="8"/>
  <text x="40" y="334" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Using Exit Status in Conditionals</text>
  <rect x="40" y="344" width="340" height="35" fill="#fff" stroke="#1976d2" rx="4"/>
  <text x="50" y="358" font-family="Courier" font-size="9" fill="#333">if [ $? -eq 0 ]; then</text>
  <text x="50" y="372" font-family="Courier" font-size="9" fill="#333">  echo "Success"; fi</text>
  <rect x="390" y="344" width="340" height="35" fill="#fff" stroke="#1976d2" rx="4"/>
  <text x="400" y="358" font-family="Courier" font-size="9" fill="#333">cmd &&amp;&amp; echo OK || echo Fail</text>
  <text x="400" y="372" font-family="Courier" font-size="9" fill="#666"># Uses exit status</text>
</g>
<g class="step" id="step5" data-narration="Use return inside functions to send status back to caller. Use exit only to terminate the entire script, never inside functions. The return statement is for functions while exit terminates the whole script execution.">
  <rect x="20" y="394" width="760" height="90" fill="#f3e5f5" rx="8"/>
  <text x="40" y="414" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Return vs Exit in Functions</text>
  <rect x="40" y="424" width="340" height="54" fill="#fff" stroke="#9c27b0" rx="4"/>
  <text x="50" y="438" font-family="Courier" font-size="9" fill="#9c27b0">validate() {</text>
  <text x="50" y="450" font-family="Courier" font-size="9" fill="#333">if [ -z "$1" ]; then</text>
  <text x="50" y="462" font-family="Courier" font-size="9" fill="#333">  return 1; fi</text>
  <text x="50" y="474" font-family="Courier" font-size="9" fill="#333">return 0; }</text>
  <rect x="390" y="424" width="340" height="54" fill="#fff" stroke="#f44336" rx="4"/>
  <text x="400" y="438" font-family="Courier" font-size="9" fill="#333">validate "$input"</text>
  <text x="400" y="450" font-family="Courier" font-size="9" fill="#333">if [ $? -eq 0 ]; then</text>
  <text x="400" y="462" font-family="Courier" font-size="9" fill="#333">  exit 0; fi</text>
  <text x="400" y="474" font-family="Arial" font-size="9" fill="#666">return=func, exit=script</text>
</g>
</svg>