<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The fork() system call creates a new process in Unix-like operating systems by duplicating the calling process completely, generating an identical child process.">
    <rect x="20" y="10" width="760" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Process Creation Using fork() System Call</text>
  </g>
  
  <g class="step" id="step1" data-narration="fork() creates an almost exact copy of the parent process called the child process. Both continue execution after the call.">
    <rect x="20" y="58" width="760" height="115" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is fork()?</text>
    <rect x="40" y="95" width="160" height="28" rx="4" fill="#1976d2"/>
    <text x="120" y="113" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffffff">Parent Process</text>
    <line x1="120" y1="123" x2="120" y2="143" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="160" y="138" font-family="Arial" font-size="10" fill="#1976d2">fork()</text>
    <rect x="40" y="148" width="160" height="28" rx="4" fill="#388e3c"/>
    <text x="120" y="166" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffffff">Child Process</text>
    <text x="220" y="98" font-family="Arial" font-size="10" fill="#333">Creates an exact copy of the calling</text>
    <text x="220" y="113" font-family="Arial" font-size="10" fill="#333">process. Both parent and child continue</text>
    <text x="220" y="128" font-family="Arial" font-size="10" fill="#333">execution from the same point after</text>
    <text x="220" y="143" font-family="Arial" font-size="10" fill="#333">fork() returns.</text>
  </g>
  
  <g class="step" id="step2" data-narration="fork() returns three possible values: positive to parent representing child's PID, zero to the newly created child process, and negative one on error.">
    <rect x="20" y="181" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="203" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">fork() Return Values</text>
    <rect x="40" y="220" width="200" height="26" rx="4" fill="#388e3c"/>
    <text x="140" y="238" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">Positive (Child PID) → Parent</text>
    <rect x="260" y="220" width="200" height="26" rx="4" fill="#1976d2"/>
    <text x="360" y="238" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">Zero (0) → Child Process</text>
    <rect x="480" y="220" width="200" height="26" rx="4" fill="#f44336"/>
    <text x="580" y="238" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">Negative (-1) → Error</text>
  </g>
  
  <g class="step" id="step3" data-narration="Copy-on-Write (COW) optimization allows fork() to be highly efficient by sharing memory pages between parent and child until modification occurs.">
    <rect x="20" y="269" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="291" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Copy-on-Write (COW) Optimization</text>
    <rect x="40" y="309" width="150" height="26" rx="4" fill="#ff9800"/>
    <text x="115" y="327" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">Memory Sharing</text>
    <text x="200" y="309" font-family="Arial" font-size="10" fill="#333">Parent and child share same physical</text>
    <text x="200" y="324" font-family="Arial" font-size="10" fill="#333">memory pages. Copying happens only</text>
    <text x="200" y="339" font-family="Arial" font-size="10" fill="#333">when either modifies a page.</text>
    <rect x="480" y="309" width="260" height="26" rx="4" fill="#ff9800"/>
    <text x="610" y="327" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">Efficient Process Creation</text>
  </g>
  
  <g class="step" id="step4" data-narration="The fork()+exec() pattern is the standard Unix method: fork() creates a child process, then exec() replaces its memory with a new program.">
    <rect x="20" y="357" width="760" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="379" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">fork() + exec() Pattern</text>
    <rect x="40" y="395" width="70" height="26" rx="4" fill="#9c27b0"/>
    <text x="75" y="413" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">fork()</text>
    <line x1="110" y1="408" x2="140" y2="408" stroke="#9c27b0" stroke-width="2"/>
    <polygon points="135,403 145,408 135,413" fill="#9c27b0"/>
    <rect x="150" y="395" width="70" height="26" rx="4" fill="#9c27b0"/>
    <text x="185" y="413" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">exec()</text>
    <text x="240" y="400" font-family="Arial" font-size="10" fill="#333">Standard Unix way to run programs:</text>
    <text x="240" y="415" font-family="Arial" font-size="10" fill="#333">1. fork() creates child process</text>
    <text x="240" y="430" font-family="Arial" font-size="10" fill="#333">2. exec() replaces memory with new program</text>
  </g>
  
  <g class="step" id="step5" data-narration="Parent processes must call wait() to prevent zombies: it blocks until child terminates, retrieves exit status, and reaps the child process.">
    <rect x="20" y="445" width="760" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="467" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Preventing Zombie Processes</text>
    <rect x="40" y="485" width="140" height="26" rx="4" fill="#f44336"/>
    <text x="110" y="503" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">wait() / waitpid()</text>
    <text x="190" y="490" font-family="Arial" font-size="10" fill="#333">Parent calls wait() to:</text>
    <text x="190" y="505" font-family="Arial" font-size="10" fill="#333">• Block until child terminates</text>
    <text x="190" y="520" font-family="Arial" font-size="10" fill="#333">• Retrieve child's exit status</text>
    <rect x="380" y="485" width="140" height="26" rx="4" fill="#e8f5e9"/>
    <text x="450" y="503" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Zombie Process</text>
    <text x="380" y="515" font-family="Arial" font-size="9" fill="#333">Child terminated, parent</text>
    <text x="380" y="527" font-family="Arial" font-size="9" fill="#333">hasn't called wait()</text>
    <rect x="540" y="485" width="140" height="26" rx="4" fill="#e3f2fd"/>
    <text x="610" y="503" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Orphan Process</text>
    <text x="540" y="515" font-family="Arial" font-size="9" fill="#333">Parent terminated while</text>
    <text x="540" y="527" font-family="Arial" font-size="9" fill="#333">child still running</text>
  </g>
  
  <g class="step" id="step6" data-narration="Important functions: getpid() returns current PID, getppid() returns parent's PID, and child should use _exit() instead of exit() after fork().">
    <rect x="20" y="538" width="760" height="62" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="560" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Important Functions &amp; Key Points</text>
    <rect x="40" y="575" width="100" height="22" rx="4" fill="#1976d2"/>
    <text x="90" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">getpid()</text>
    <text x="150" y="583" font-family="Arial" font-size="9" fill="#333">Get current PID</text>
    <rect x="190" y="575" width="100" height="22" rx="4" fill="#1976d2"/>
    <text x="240" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">getppid()</text>
    <text x="300" y="583" font-family="Arial" font-size="9" fill="#333">Get parent PID</text>
    <rect x="340" y="575" width="100" height="22" rx="4" fill="#ff9800"/>
    <text x="390" y="590" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffffff">_exit()</text>
    <text x="450" y="583" font-family="Arial" font-size="9" fill="#333">Use in child</text>
  </g>
</svg>