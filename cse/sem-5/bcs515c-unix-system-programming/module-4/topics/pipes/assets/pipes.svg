<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This lesson covers Pipes in Unix and Linux, which are fundamental IPC mechanisms for inter-process communication and data streaming between related processes.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Pipes in Unix/Linux</text>
  </g>
  
  <g class="step" id="step1" data-narration="A pipe is a unidirectional channel in the kernel allowing sequential data flow between related processes, typically a parent process and its child.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is a Pipe?</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">A unidirectional communication channel in the kernel that connects</text>
    <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">related processes (parent-child) for data streaming.</text>
    <rect x="500" y="78" width="250" height="50" fill="#fff" stroke="#1976d2" strokeWidth="2" rx="3"/>
    <text x="625" y="98" text-anchor="middle" font-family="monospace" font-size="11" fill="#1976d2">Write → [Kernel] → Read</text>
    <text x="625" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Data flows one direction only</text>
  </g>
  
  <g class="step" id="step2" data-narration="Anonymous pipes use the pipe() system call for parent-child communication. Named pipes (FIFOs) use mkfifo() to connect completely unrelated processes via the filesystem.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Types of Pipes</text>
    <rect x="40" y="180" width="340" height="36" fill="#fff" stroke="#388e3c" strokeWidth="1" rx="3"/>
    <text x="210" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Anonymous Pipes</text>
    <text x="210" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Created with pipe(), exists in kernel</text>
    <rect x="420" y="180" width="340" height="36" fill="#fff" stroke="#388e3c" strokeWidth="1" rx="3"/>
    <text x="590" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Named Pipes (FIFOs)</text>
    <text x="590" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Created with mkfifo(), filesystem file</text>
  </g>
  
  <g class="step" id="step3" data-narration="The pipe() system call creates a pipe and returns two file descriptors: pipefd[0] is used for reading, while pipefd[1] is used for writing data.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">pipe() System Call</text>
    <text x="40" y="280" font-family="monospace" font-size="11" fill="#333">int pipefd[2];</text>
    <text x="150" y="280" font-family="monospace" font-size="11" fill="#ff9800">pipe(pipefd);</text>
    <text x="40" y="300" font-family="Arial" font-size="10" fill="#333">Returns 0 on success, -1 on failure. pipefd[0] is read end, pipefd[1] is write end.</text>
    <rect x="400" y="264" width="360" height="40" fill="#fff" stroke="#ff9800" strokeWidth="1" rx="3"/>
    <text x="580" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">pipefd[0] → Read</text>
    <text x="580" y="296" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">pipefd[1] → Write</text>
  </g>
  
  <g class="step" id="step4" data-narration="Pipes have blocking behavior: read() blocks when pipe is empty, write() blocks when pipe is full. EOF is detected when all write ends are closed.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Pipe Behavior</text>
    <rect x="40" y="358" width="220" height="34" fill="#fff" stroke="#f44336" strokeWidth="1" rx="3"/>
    <text x="150" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Blocking Operations</text>
    <text x="150" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">read() blocks on empty</text>
    <text x="150" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">write() blocks on full</text>
    <rect x="280" y="358" width="240" height="34" fill="#fff" stroke="#f44336" strokeWidth="1" rx="3"/>
    <text x="400" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">EOF Detection</text>
    <text x="400" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">read() returns 0 when all</text>
    <text x="400" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">write ends are closed</text>
    <rect x="540" y="358" width="220" height="34" fill="#fff" stroke="#f44336" strokeWidth="1" rx="3"/>
    <text x="650" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">FIFO Ordering</text>
    <text x="650" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Data written first is</text>
    <text x="650" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">read first (64KB buffer)</text>
  </g>
  
  <g class="step" id="step5" data-narration="When fork() is called, the child process inherits pipe file descriptors from parent. Both processes must close unused ends to prevent resource leaks and ensure proper communication.">
    <rect x="20" y="410" width="760" height="95" fill="#f3e5f5" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Pipe with fork() - Parent to Child</text>
    <rect x="40" y="448" width="340" height="32" fill="#fff" stroke="#9c27b0" strokeWidth="1" rx="3"/>
    <text x="210" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">1. pipe(pipefd) before fork</text>
    <text x="210" y="475" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">2. fork() creates child process</text>
    <rect x="400" y="448" width="180" height="32" fill="#fff" stroke="#9c27b0" strokeWidth="1" rx="3"/>
    <text x="490" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Parent:</text>
    <text x="490" y="475" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">close(pipefd[0])</text>
    <rect x="600" y="448" width="160" height="32" fill="#fff" stroke="#9c27b0" strokeWidth="1" rx="3"/>
    <text x="680" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Child:</text>
    <text x="680" y="475" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">close(pipefd[1])</text>
    <line x1="200" y1="488" x2="600" y2="488" stroke="#9c27b0" strokeWidth="1" strokeDasharray="4"/>
    <text x="400" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Parent writes to pipefd[1], Child reads from pipefd[0]</text>
  </g>
  
  <g class="step" id="step6" data-narration="Named pipes (FIFOs) appear as special files in the filesystem enabling unrelated processes to communicate. Use mkfifo() to create them and open like regular files.">
    <rect x="20" y="513" width="760" height="75" fill="#e3f2fd" rx="5"/>
    <text x="40" y="535" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Named Pipes (FIFOs) for Unrelated Processes</text>
    <rect x="40" y="549" width="240" height="30" fill="#fff" stroke="#1976d2" strokeWidth="1" rx="3"/>
    <text x="160" y="562" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">mkfifo("/tmp/myfifo")</text>
    <rect x="300" y="549" width="220" height="30" fill="#fff" stroke="#1976d2" strokeWidth="1" rx="3"/>
    <text x="410" y="562" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">Server: open(O_WRONLY)</text>
    <rect x="540" y="549" width="220" height="30" fill="#fff" stroke="#1976d2" strokeWidth="1" rx="3"/>
    <text x="650" y="562" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">Client: open(O_RDONLY)</text>
  </g>
</svg>