<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This lesson covers process synchronization in Unix/Linux using wait(), waitpid(), and wait3() system calls to manage child processes and prevent zombies effectively.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Process Synchronization: wait(), waitpid(), wait3()</text>
  </g>

  <!-- step1: wait() System Call -->
  <g class="step" id="step1" data-narration="The wait() system call suspends parent execution until any child terminates, returning the child's PID and storing the exit status in the status parameter.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">wait() System Call</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">pid_t wait(int *status);</text>
    <text x="40" y="112" font-family="Arial" font-size="9" fill="#555">• Blocks parent until any child terminates</text>
    <text x="40" y="125" font-family="Arial" font-size="9" fill="#555">• Returns child PID on success, -1 on error (ECHILD)</text>
    <rect x="500" y="72" width="260" height="56" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="510" y="86" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Example:</text>
    <text x="510" y="100" font-family="Courier" font-size="8" fill="#333">pid = fork();</text>
    <text x="510" y="112" font-family="Courier" font-size="8" fill="#333">if(pid == 0) { /* child */ }</text>
    <text x="510" y="124" font-family="Courier" font-size="8" fill="#333">else { wait(&amp;status); }</text>
  </g>

  <!-- step2: waitpid() System Call -->
  <g class="step" id="step2" data-narration="waitpid() provides granular control over which child to wait for, with options like WNOHANG for non-blocking behavior and WUNTRACED for stopped processes.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">waitpid() System Call</text>
    <text x="40" y="183" font-family="Arial" font-size="10" fill="#333">pid_t waitpid(pid_t pid, int *status, int options);</text>
    <text x="40" y="200" font-family="Arial" font-size="9" fill="#555">pid &gt; 0: Wait for specific child | pid = 0: Same process group | pid = -1: Any child</text>
    <text x="40" y="215" font-family="Arial" font-size="9" fill="#555">WNOHANG: Return immediately if no child exited | Equivalent to wait() when pid = -1</text>
    <rect x="500" y="160" width="260" height="56" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="510" y="174" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Non-blocking wait:</text>
    <text x="510" y="188" font-family="Courier" font-size="8" fill="#333">while(1) {</text>
    <text x="518" y="200" font-family="Courier" font-size="8" fill="#333">pid = waitpid(-1, &amp;st, WNOHANG);</text>
    <text x="518" y="212" font-family="Courier" font-size="8" fill="#333">if(pid == 0) { /* do work */ }</text>
  </g>

  <!-- step3: wait3() System Call -->
  <g class="step" id="step3" data-narration="wait3() extends wait() by additionally returning resource usage statistics like CPU time, memory usage, and I/O counts through the rusage structure.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">wait3() System Call</text>
    <text x="40" y="271" font-family="Arial" font-size="10" fill="#333">pid_t wait3(int *status, int options, struct rusage *rusage);</text>
    <text x="40" y="288" font-family="Arial" font-size="9" fill="#555">• Similar to wait() but returns resource usage information</text>
    <text x="40" y="301" font-family="Arial" font-size="9" fill="#555">• rusage includes: user CPU time, system CPU time, page faults, context switches</text>
    <rect x="500" y="248" width="260" height="56" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="510" y="262" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Resource info retrieved:</text>
    <text x="510" y="276" font-family="Courier" font-size="8" fill="#333">ru_utime: user CPU time</text>
    <text x="510" y="288" font-family="Courier" font-size="8" fill="#333">ru_stime: system CPU time</text>
    <text x="510" y="300" font-family="Courier" font-size="8" fill="#333">ru_maxrss: max memory used</text>
  </g>

  <!-- step4: Zombie and Orphan Processes -->
  <g class="step" id="step4" data-narration="A zombie process occurs when a child terminates but the parent hasn't called wait() to collect its status, leaving an entry in the process table.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Zombie and Orphan Processes</text>
    <rect x="40" y="352" width="340" height="42" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Zombie Process (Defunct)</text>
    <text x="50" y="380" font-family="Arial" font-size="8" fill="#333">Child terminated but parent hasn't</text>
    <text x="50" y="392" font-family="Arial" font-size="8" fill="#333">called wait(). Entry remains in</text>
    <text x="50" y="402" font-family="Arial" font-size="8" fill="#333">process table until collected.</text>
    <rect x="420" y="352" width="340" height="42" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="430" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Orphan Process</text>
    <text x="430" y="380" font-family="Arial" font-size="8" fill="#333">Child still running but parent</text>
    <text x="430" y="392" font-family="Arial" font-size="8" fill="#333">terminated. Adopted by init (PID 1)</text>
    <text x="430" y="402" font-family="Arial" font-size="8" fill="#333">which periodically calls wait().</text>
  </g>

  <!-- step5: Status Macros -->
  <g class="step" id="step5" data-narration="Common macros like WIFEXITED, WEXITSTATUS, WIFSIGNALED, and WTERMSIG extract detailed termination information from the status integer returned by wait functions.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Process Termination Status Macros</text>
    <rect x="40" y="442" width="180" height="40" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="456" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Normal Exit:</text>
    <text x="50" y="470" font-family="Courier" font-size="7" fill="#333">WIFEXITED(status)</text>
    <text x="50" y="480" font-family="Courier" font-size="7" fill="#333">WEXITSTATUS(status)</text>
    <rect x="240" y="442" width="180" height="40" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="250" y="456" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Signal Death:</text>
    <text x="250" y="470" font-family="Courier" font-size="7" fill="#333">WIFSIGNALED(status)</text>
    <text x="250" y="480" font-family="Courier" font-size="7" fill="#333">WTERMSIG(status)</text>
    <rect x="440" y="442" width="180" height="40" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="450" y="456" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Process Stopped:</text>
    <text x="450" y="470" font-family="Courier" font-size="7" fill="#333">WIFSTOPPED(status)</text>
    <text x="450" y="480" font-family="Courier" font-size="7" fill="#333">WSTOPSIG(status)</text>
    <rect x="640" y="442" width="120" height="40" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="650" y="456" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Exit Code:</text>
    <text x="650" y="470" font-family="Courier" font-size="7" fill="#333">bits 8-15 (0-255)</text>
    <text x="650" y="480" font-family="Courier" font-size="7" fill="#333">Signal: bits 0-7</text>
  </g>

  <!-- step6: Exam Tips and Summary -->
  <g class="step" id="step6" data-narration="Key exam points include always calling wait to prevent zombie processes, using WNOHANG for non-blocking waits, and understanding how wait3 provides resource usage data.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips and Key Points</text>
    <rect x="40" y="528" width="230" height="52" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="542" font-family="Arial" font-size="8" font-weight="bold" fill="#1976d2">Important Reminders:</text>
    <text x="50" y="555" font-family="Arial" font-size="7" fill="#333">• Always call wait/waitpid to prevent</text>
    <text x="58" y="565" font-family="Arial" font-size="7" fill="#333">  zombie processes</text>
    <text x="50" y="575" font-family="Arial" font-size="7" fill="#333">• wait() equivalent: waitpid(-1,&amp;status,0)</text>
    <rect x="290" y="528" width="230" height="52" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="300" y="542" font-family="Arial" font-size="8" font-weight="bold" fill="#1976d2">wait3() vs waitpid():</text>
    <text x="300" y="555" font-family="Arial" font-size="7" fill="#333">• wait3() provides rusage struct</text>
    <text x="300" y="565" font-family="Arial" font-size="7" fill="#333">• waitpid() provides options control</text>
    <text x="300" y="575" font-family="Arial" font-size="7" fill="#333">• Different purposes and return types</text>
    <rect x="540" y="528" width="220" height="52" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="550" y="542" font-family="Arial" font-size="8" font-weight="bold" fill="#1976d2"> Exam Focus:</text>
    <text x="550" y="555" font-family="Arial" font-size="7" fill="#333">• Status macros are frequently tested</text>
    <text x="550" y="565" font-family="Arial" font-size="7" fill="#333">• Zombie prevention is essential</text>
    <text x="550" y="575" font-family="Arial" font-size="7" fill="#333">• WNOHANG vs blocking behavior</text>
  </g>
</svg>