<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" data-topic-id="introduction">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66bb6a"/><stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ab47bc"/><stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef5350"/><stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="gradTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26a69a"/><stop offset="100%" stop-color="#00796b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Welcome to this lesson on introduction to memory management in operating systems, where we explore how OS handles computer memory efficiently.">
    <rect x="0" y="0" width="800" height="50" fill="url(#gradBlue)" stroke="#1565c0" stroke-width="2"/>
    <text x="400" y="20" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">Introduction to Memory Management</text>
    <text x="400" y="38" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="11">Operating System Concepts -  2022 Scheme</text>
  </g>

  <g class="step" id="step1" data-narration="Memory management is a crucial operating system function that controls computer memory allocation, deallocation, and protection for all running programs to ensure optimal system performance.">
    <rect x="20" y="58" width="760" height="80" rx="6" fill="white" stroke="#1976d2" stroke-width="1.5"/>
    <rect x="20" y="58" width="120" height="80" rx="6" fill="url(#gradBlue)"/>
    <text x="80" y="82" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">What is Memory</text>
    <text x="80" y="97" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Management?</text>
    <text x="160" y="78" fill="#333" font-family="Arial" font-size="11">OS function controlling and coordinating computer memory,</text>
    <text x="160" y="93" fill="#333" font-family="Arial" font-size="11">assigning blocks to programs for optimal performance.</text>
    <text x="160" y="110" fill="#666" font-family="Arial" font-size="10">Key: Allocation, Deallocation, Protection, Sharing</text>
  </g>

  <g class="step" id="step2" data-narration="Three main memory types exist in computer systems: primary memory or RAM for fast access, secondary storage for permanent data retention, and cache for frequently accessed information.">
    <rect x="20" y="146" width="760" height="80" rx="6" fill="white" stroke="#388e3c" stroke-width="1.5"/>
    <text x="50" y="165" fill="#2e7d32" font-family="Arial" font-size="11" font-weight="bold">Types of Memory</text>
    <rect x="30" y="175" width="220" height="45" rx="4" fill="url(#gradGreen)" stroke="#2e7d32"/>
    <text x="140" y="192" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Primary Memory (RAM)</text>
    <text x="140" y="207" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="9">Volatile, fast access, direct CPU access</text>
    <rect x="260" y="175" width="220" height="45" rx="4" fill="url(#gradOrange)" stroke="#e65100"/>
    <text x="370" y="192" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Secondary Memory</text>
    <text x="370" y="207" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">Non-volatile, permanent storage, slower</text>
    <rect x="490" y="175" width="220" height="45" rx="4" fill="url(#gradPurple)" stroke="#7b1fa2"/>
    <text x="600" y="192" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Cache Memory</text>
    <text x="600" y="207" text-anchor="middle" fill="#f3e5f5" font-family="Arial" font-size="9">Small, high-speed, between CPU and RAM</text>
  </g>

  <g class="step" id="step3" data-narration="Physical memory refers to actual RAM chips installed in the system, while virtual memory creates an illusion of more available memory by using secondary storage as swap space.">
    <rect x="20" y="234" width="760" height="80" rx="6" fill="white" stroke="#f57c00" stroke-width="1.5"/>
    <text x="50" y="253" fill="#e65100" font-family="Arial" font-size="11" font-weight="bold">Physical vs Virtual Memory</text>
    <rect x="30" y="263" width="340" height="45" rx="4" fill="url(#gradOrange)" stroke="#e65100"/>
    <text x="200" y="280" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Physical Memory (RAM)</text>
    <text x="200" y="295" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">Actual RAM chips, fixed size, volatile</text>
    <rect x="380" y="263" width="340" height="45" rx="4" fill="url(#gradTeal)" stroke="#00796b"/>
    <text x="550" y="280" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Virtual Memory</text>
    <text x="550" y="295" text-anchor="middle" fill="#e0f2f1" font-family="Arial" font-size="9">Illusion of more memory using swap space</text>
  </g>

  <g class="step" id="step4" data-narration="The four main memory management techniques include contiguous allocation for single block memory, paging using fixed-size frames, segmentation using variable-sized logical segments, and combined paging with segmentation approach.">
    <rect x="20" y="322" width="760" height="80" rx="6" fill="white" stroke="#7b1fa2" stroke-width="1.5"/>
    <text x="50" y="341" fill="#6a1b9a" font-family="Arial" font-size="11" font-weight="bold">Memory Management Techniques</text>
    <rect x="30" y="352" width="170" height="45" rx="4" fill="url(#gradPurple)" stroke="#7b1fa2"/>
    <text x="115" y="368" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Contiguous</text>
    <text x="115" y="382" text-anchor="middle" fill="#f3e5f5" font-family="Arial" font-size="8">Single block allocation</text>
    <rect x="210" y="352" width="170" height="45" rx="4" fill="url(#gradBlue)" stroke="#1565c0"/>
    <text x="295" y="368" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Paging</text>
    <text x="295" y="382" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="8">Fixed-size frames and pages</text>
    <rect x="390" y="352" width="170" height="45" rx="4" fill="url(#gradGreen)" stroke="#2e7d32"/>
    <text x="475" y="368" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Segmentation</text>
    <text x="475" y="382" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="8">Variable-sized segments</text>
    <rect x="570" y="352" width="170" height="45" rx="4" fill="url(#gradRed)" stroke="#c62828"/>
    <text x="655" y="368" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Paging + Segmentation</text>
    <text x="655" y="382" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="8">Combined approach</text>
  </g>

  <g class="step" id="step5" data-narration="Memory protection ensures system security by preventing unauthorized access through base and limit registers, protection bits in page tables, and Memory Management Unit hardware translation.">
    <rect x="20" y="410" width="760" height="80" rx="6" fill="white" stroke="#c62828" stroke-width="1.5"/>
    <text x="50" y="429" fill="#b71c1c" font-family="Arial" font-size="11" font-weight="bold">Memory Protection and Security</text>
    <rect x="30" y="440" width="230" height="45" rx="4" fill="url(#gradRed)" stroke="#c62828"/>
    <text x="145" y="457" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Base and Limit Registers</text>
    <text x="145" y="472" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="9">Defines process address range</text>
    <rect x="270" y="440" width="230" height="45" rx="4" fill="url(#gradOrange)" stroke="#e65100"/>
    <text x="385" y="457" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Protection Bits</text>
    <text x="385" y="472" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">In page tables for access control</text>
    <rect x="510" y="440" width="230" height="45" rx="4" fill="url(#gradTeal)" stroke="#00796b"/>
    <text x="625" y="457" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">MMU Hardware</text>
    <text x="625" y="472" text-anchor="middle" fill="#e0f2f1" font-family="Arial" font-size="9">Translates virtual to physical addresses</text>
  </g>

  <g class="step" id="step6" data-narration="Key formulas for memory management include internal fragmentation as allocated minus requested memory, external fragmentation as sum of free blocks, page number as virtual address divided by page size, and offset calculation.">
    <rect x="20" y="498" width="760" height="90" rx="6" fill="white" stroke="#00796b" stroke-width="1.5"/>
    <text x="50" y="520" fill="#00695c" font-family="Arial" font-size="11" font-weight="bold">Important Formulas and Concepts</text>
    <rect x="30" y="530" width="220" height="52" rx="4" fill="url(#gradTeal)" stroke="#00796b"/>
    <text x="140" y="548" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Internal Fragmentation</text>
    <text x="140" y="562" text-anchor="middle" fill="#e0f2f1" font-family="Arial" font-size="9">= Allocated - Requested</text>
    <text x="140" y="575" text-anchor="middle" fill="#e0f2f1" font-family="Arial" font-size="8">Wasted space within block</text>
    <rect x="260" y="530" width="220" height="52" rx="4" fill="url(#gradBlue)" stroke="#1565c0"/>
    <text x="370" y="548" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">External Fragmentation</text>
    <text x="370" y="562" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="9">= Sum(free blocks) - Request</text>
    <text x="370" y="575" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="8">Scattered free memory</text>
    <rect x="490" y="530" width="130" height="52" rx="4" fill="url(#gradPurple)" stroke="#7b1fa2"/>
    <text x="555" y="548" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Page Number</text>
    <text x="555" y="562" text-anchor="middle" fill="#f3e5f5" font-family="Arial" font-size="9">= VA / Page Size</text>
    <rect x="630" y="530" width="130" height="52" rx="4" fill="url(#gradGreen)" stroke="#2e7d32"/>
    <text x="695" y="548" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Offset</text>
    <text x="695" y="562" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="9">= VA % Page Size</text>
  </g>
</svg>