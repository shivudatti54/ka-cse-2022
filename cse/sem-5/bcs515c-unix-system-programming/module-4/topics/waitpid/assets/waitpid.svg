<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on waitpid, an essential Unix system call for managing child processes and preventing zombie processes in operating systems.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">waitpid() System Call - Process Management</text>
  </g>
  
  <g class="step" id="step1" data-narration="waitpid suspends the parent until a child terminates or a signal arrives. The function returns the child PID on success.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Function Prototype</text>
    <text x="40" y="100" font-family="Courier New" font-size="12" fill="#333">pid_t waitpid(pid_t pid, int *status, int options);</text>
    <text x="40" y="122" font-family="Arial" font-size="10" fill="#666">Returns: Child PID (success), 0 (WNOHANG, no exit), -1 (error)</text>
  </g>
  
  <g class="step" id="step2" data-narration="The pid parameter specifies which child to wait for. Positive values target specific PIDs, zero waits for process groups, negative waits for any child.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">pid Parameter Values</text>
    <rect x="40" y="180" width="160" height="35" fill="#e8f5e9" rx="3"/>
    <text x="120" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">pid &gt; 0</text>
    <text x="120" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Wait for specific PID</text>
    <rect x="210" y="180" width="160" height="35" fill="#e8f5e9" rx="3"/>
    <text x="290" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">pid = 0</text>
    <text x="290" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Same process group</text>
    <rect x="380" y="180" width="160" height="35" fill="#e8f5e9" rx="3"/>
    <text x="460" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">pid = -1</text>
    <text x="460" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Wait any child</text>
    <rect x="550" y="180" width="160" height="35" fill="#e8f5e9" rx="3"/>
    <text x="630" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">pid &lt; -1</text>
    <text x="630" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Wait process group</text>
  </g>
  
  <g class="step" id="step3" data-narration="The options parameter modifies waitpid behavior significantly. WNOHANG makes it non-blocking and returns zero if no child has exited yet, useful for polling.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Options Parameter</text>
    <rect x="40" y="270" width="220" height="35" fill="#fff3e0" rx="3"/>
    <text x="150" y="288" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">WNOHANG</text>
    <text x="150" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Non-blocking, return 0 if no exit</text>
    <rect x="270" y="270" width="220" height="35" fill="#fff3e0" rx="3"/>
    <text x="380" y="288" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">WUNTRACED</text>
    <text x="380" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Report stopped children</text>
    <rect x="500" y="270" width="220" height="35" fill="#fff3e0" rx="3"/>
    <text x="610" y="288" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">WCONTINUED</text>
    <text x="610" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Report continued children</text>
  </g>
  
  <g class="step" id="step4" data-narration="Status macros interpret termination information. WIFEXITED checks for normal exit, WEXITSTATUS gets the code, WIFSIGNALED detects kills by signals, and WTERMSIG retrieves the signal number.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Status Macros</text>
    <rect x="40" y="358" width="165" height="35" fill="#f3e5f5" rx="3"/>
    <text x="122" y="375" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">WIFEXITED(status)</text>
    <text x="122" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">True if normal exit</text>
    <rect x="215" y="358" width="165" height="35" fill="#f3e5f5" rx="3"/>
    <text x="298" y="375" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">WEXITSTATUS(status)</text>
    <text x="298" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Get exit code (0-255)</text>
    <rect x="390" y="358" width="165" height="35" fill="#f3e5f5" rx="3"/>
    <text x="472" y="375" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">WIFSIGNALED(status)</text>
    <text x="472" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">True if killed by signal</text>
    <rect x="565" y="358" width="165" height="35" fill="#f3e5f5" rx="3"/>
    <text x="647" y="375" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">WTERMSIG(status)</text>
    <text x="647" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Get signal number</text>
  </g>
  
  <g class="step" id="step5" data-narration="This example shows a parent forking a child. The parent waits using waitpid and checks the exit status with WIFEXITED and WEXITSTATUS to retrieve the child's return code.">
    <rect x="20" y="410" width="760" height="95" fill="#ffffff" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example: Basic Usage</text>
    <text x="40" y="455" font-family="Courier New" font-size="10" fill="#333">pid = fork();</text>
    <text x="160" y="455" font-family="Courier New" font-size="10" fill="#666">// Child exits</text>
    <text x="40" y="470" font-family="Courier New" font-size="10" fill="#333">waitpid(pid, &amp;status, 0);</text>
    <text x="200" y="470" font-family="Courier New" font-size="10" fill="#666">// Block until child exits</text>
    <text x="40" y="485" font-family="Courier New" font-size="10" fill="#333">if (WIFEXITED(status))</text>
    <text x="210" y="485" font-family="Courier New" font-size="10" fill="#666">// Check normal exit</text>
    <text x="40" y="500" font-family="Courier New" font-size="10" fill="#333">printf("Exit code: %d", WEXITSTATUS(status));</text>
  </g>
  
  <g class="step" id="step6" data-narration="Always use waitpid to properly reap children and prevent zombie processes. Use WNOHANG for non-blocking status checks in event-driven programs and loops.">
    <rect x="20" y="513" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="535" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Key Takeaways</text>
    <rect x="40" y="550" width="340" height="35" fill="#e3f2fd" rx="3"/>
    <text x="60" y="563" font-family="Arial" font-size="10" fill="#1976d2">• Wait for children to prevent zombie processes</text>
    <text x="60" y="577" font-family="Arial" font-size="10" fill="#1976d2">• Use WNOHANG for non-blocking wait in loops</text>
    <rect x="390" y="550" width="340" height="35" fill="#e3f2fd" rx="3"/>
    <text x="410" y="563" font-family="Arial" font-size="10" fill="#1976d2">• waitpid(-1, &amp;status, 0) equals wait(&amp;status)</text>
    <text x="410" y="577" font-family="Arial" font-size="10" fill="#1976d2">• Check WIFEXITED before using WEXITSTATUS</text>
  </g>
</svg>