<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about Python Dictionaries. This lesson covers dictionary creation, access, methods, comprehension, and practical examples for efficient data storage.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Reading and Working with Dictionaries in Python</text>
  </g>
  
  <g class="step" id="step1" data-narration="Dictionaries store key-value pairs in curly braces. Keys must be immutable and hashable (strings, numbers, tuples). Values can be any data type including lists and nested dictionaries.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" fill="#1976d2" font-weight="bold">1. Dictionary Creation</text>
    <rect x="40" y="95" width="340" height="35" fill="white" stroke="#1976d2" rx="3"/>
    <text x="50" y="112" font-family="Courier" font-size="10" fill="#333">student = {"name": "John", "age": 20}</text>
    <rect x="400" y="95" width="340" height="35" fill="white" stroke="#1976d2" rx="3"/>
    <text x="410" y="112" font-family="Courier" font-size="10" fill="#333">mixed = dict(id=101, active=True)</text>
    <text x="40" y="138" font-family="Arial" font-size="9" fill="#666">Keys: immutable (str, num, tuple) | Values: any type</text>
  </g>
  
  <g class="step" id="step2" data-narration="Access dictionary values using square brackets. The get method returns None or a default value if the key does not exist in the dictionary.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" fill="#388e3c" font-weight="bold">2. Accessing Elements</text>
    <rect x="40" y="183" width="220" height="35" fill="white" stroke="#388e3c" rx="3"/>
    <text x="50" y="200" font-family="Courier" font-size="10" fill="#333">student["name"] # raises KeyError</text>
    <rect x="280" y="183" width="220" height="35" fill="white" stroke="#388e3c" rx="3"/>
    <text x="290" y="200" font-family="Courier" font-size="10" fill="#333">student.get("marks", 0) # returns 0</text>
    <rect x="520" y="183" width="220" height="35" fill="white" stroke="#388e3c" rx="3"/>
    <text x="530" y="200" font-family="Courier" font-size="10" fill="#333">"name" in student # True (O(1) check)</text>
    <text x="40" y="222" font-family="Arial" font-size="9" fill="#666">Use get() to avoid KeyError exceptions. The 'in' operator checks key existence.</text>
  </g>
  
  <g class="step" id="step3" data-narration="Dictionary methods: keys, values, items return view objects reflecting changes. Pop removes by key, update merges dictionaries, and setdefault returns value or inserts if missing.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" fill="#ff9800" font-weight="bold">3. Dictionary Methods</text>
    <rect x="40" y="271" width="160" height="35" fill="white" stroke="#ff9800" rx="3"/>
    <text x="50" y="288" font-family="Courier" font-size="9" fill="#333">dict.keys()</text>
    <rect x="210" y="271" width="160" height="35" fill="white" stroke="#ff9800" rx="3"/>
    <text x="220" y="288" font-family="Courier" font-size="9" fill="#333">dict.values()</text>
    <rect x="380" y="271" width="160" height="35" fill="white" stroke="#ff9800" rx="3"/>
    <text x="390" y="288" font-family="Courier" font-size="9" fill="#333">dict.items()</text>
    <rect x="550" y="271" width="100" height="35" fill="white" stroke="#ff9800" rx="3"/>
    <text x="560" y="288" font-family="Courier" font-size="9" fill="#333">pop(key)</text>
    <rect x="660" y="271" width="100" height="35" fill="white" stroke="#ff9800" rx="3"/>
    <text x="670" y="288" font-family="Courier" font-size="9" fill="#333">update()</text>
    <text x="40" y="310" font-family="Arial" font-size="9" fill="#666">View objects reflect dictionary changes. pop() returns removed value. update() merges key-value pairs.</text>
  </g>
  
  <g class="step" id="step4" data-narration="Dictionary comprehension creates dictionaries using key:value syntax. Use conditional expressions to filter items or transform values efficiently in a single readable line.">
    <rect x="20" y="322" width="760" height="118" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" fill="#9c27b0" font-weight="bold">4. Dictionary Comprehension</text>
    <rect x="40" y="359" width="340" height="35" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="50" y="376" font-family="Courier" font-size="10" fill="#333">squares = {x: x**2 for x in range(1, 6)}</text>
    <rect x="400" y="359" width="340" height="35" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="410" y="376" font-family="Courier" font-size="10" fill="#333"># {1:1, 2:4, 3:9, 4:16, 5:25}</text>
    <rect x="40" y="400" width="340" height="35" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="50" y="417" font-family="Courier" font-size="10" fill="#333">keys = ["a","b","c"]; vals = [1,2,3]</text>
    <rect x="400" y="400" width="340" height="35" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="410" y="417" font-family="Courier" font-size="10" fill="#333">combined = dict(zip(keys, vals))</text>
  </g>
  
  <g class="step" id="step5" data-narration="Practical example: Word frequency counter creates empty dict, iterates words, increments count or initializes to one. The O(1) hash lookup makes this highly efficient algorithm.">
    <rect x="20" y="448" width="760" height="70" fill="#ffebee" stroke="#f44336" rx="5"/>
    <text x="40" y="470" font-family="Arial" font-size="13" fill="#f44336" font-weight="bold">5. Example: Word Frequency Counter</text>
    <rect x="40" y="485" width="470" height="25" fill="white" stroke="#f44336" rx="3"/>
    <text x="50" y="500" font-family="Courier" font-size="9" fill="#333">freq[word] = freq.get(word, 0) + 1  # O(1) per word</text>
    <rect x="520" y="485" width="220" height="25" fill="white" stroke="#f44336" rx="3"/>
    <text x="530" y="500" font-family="Courier" font-size="9" fill="#333">Input: "python is python"</text>
  </g>
</svg>