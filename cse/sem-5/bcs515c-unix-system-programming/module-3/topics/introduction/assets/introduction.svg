<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" data-topic-id="introduction">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66bb6a"/><stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ab47bc"/><stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef5350"/><stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="gradTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26a69a"/><stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Introduction to Database Management Systems. We will cover DBMS fundamentals, key concepts, and their importance in modern computing.">
    <rect x="0" y="0" width="800" height="50" fill="url(#gradBlue)" rx="0"/>
    <text x="400" y="22" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">Introduction to Database Management Systems</text>
    <text x="400" y="40" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="12"> 2022 Scheme - CSE Branch</text>
  </g>
  
  <g class="step" id="step1" data-narration="A Database is a structured collection of logically related data. DBMS is software that enables creating, maintaining, and controlling access to databases.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="white" stroke="#1976d2" stroke-width="2"/>
    <rect x="20" y="58" width="120" height="80" rx="8" fill="url(#gradBlue)"/>
    <text x="80" y="85" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">DATABASE</text>
    <text x="80" y="105" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">Structured collection of</text>
    <text x="80" y="118" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">logically related data</text>
    <rect x="160" y="58" width="120" height="80" rx="8" fill="url(#gradGreen)"/>
    <text x="220" y="85" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">DBMS</text>
    <text x="220" y="105" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Software system for</text>
    <text x="220" y="118" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">database management</text>
    <text x="340" y="80" fill="#333" font-family="Arial" font-size="11"><tspan font-weight="bold">DBMS Functions:</tspan> Data Definition, Data Manipulation, Security, Concurrency Control, Backup &amp; Recovery</text>
    <text x="340" y="105" fill="#666" font-family="Arial" font-size="10">• Provides centralized data management • Eliminates data redundancy • Ensures data consistency</text>
    <text x="340" y="125" fill="#666" font-family="Arial" font-size="10">• Enforces integrity constraints • Supports concurrent access • Offers backup and recovery</text>
  </g>
  
  <g class="step" id="step2" data-narration="Data Independence is the ability to change schema at one level without affecting higher levels. Physical independence allows storage changes without logic changes.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="white" stroke="#388e3c" stroke-width="2"/>
    <rect x="20" y="146" width="180" height="80" rx="8" fill="url(#gradGreen)"/>
    <text x="110" y="170" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">DATA INDEPENDENCE</text>
    <text x="110" y="195" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Change schema without</text>
    <text x="110" y="210" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">affecting higher levels</text>
    <rect x="220" y="155" width="260" height="62" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="350" y="175" text-anchor="middle" fill="#2e7d32" font-family="Arial" font-size="12" font-weight="bold">Physical Data Independence</text>
    <text x="350" y="195" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Change storage structure (e.g., tape to SSD)</text>
    <text x="350" y="208" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">without affecting logical schema</text>
    <rect x="500" y="155" width="260" height="62" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="630" y="175" text-anchor="middle" fill="#2e7d32" font-family="Arial" font-size="12" font-weight="bold">Logical Data Independence</text>
    <text x="630" y="195" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Change logical schema without</text>
    <text x="630" y="208" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">affecting application programs</text>
  </g>
  
  <g class="step" id="step3" data-narration="Database Schema is the structural blueprint. Instance is actual data at a moment. Schema is static while instance changes frequently with updates.">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="white" stroke="#f57c00" stroke-width="2"/>
    <rect x="20" y="234" width="180" height="80" rx="8" fill="url(#gradOrange)"/>
    <text x="110" y="258" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">SCHEMA vs INSTANCE</text>
    <text x="110" y="280" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Structure vs Actual Data</text>
    <text x="110" y="298" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Blueprint vs Content</text>
    <rect x="220" y="243" width="170" height="62" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
    <text x="305" y="265" text-anchor="middle" fill="#e65100" font-family="Arial" font-size="12" font-weight="bold">SCHEMA</text>
    <text x="305" y="285" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Structural design - tables,</text>
    <text x="305" y="298" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">relationships, constraints</text>
    <text x="305" y="310" fill="#666" font-family="Arial" font-size="9">(Static - rarely changes)</text>
    <rect x="410" y="243" width="170" height="62" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
    <text x="495" y="265" text-anchor="middle" fill="#e65100" font-family="Arial" font-size="12" font-weight="bold">INSTANCE</text>
    <text x="495" y="285" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Actual data stored at</text>
    <text x="495" y="298" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">a specific point in time</text>
    <text x="495" y="310" fill="#666" font-family="Arial" font-size="9">(Dynamic - changes often)</text>
    <rect x="600" y="243" width="160" height="62" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
    <text x="680" y="265" text-anchor="middle" fill="#e65100" font-family="Arial" font-size="11" font-weight="bold">THREE LEVELS</text>
    <text x="680" y="282" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Internal | Conceptual | External</text>
    <text x="680" y="298" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">(Architecture provides abstraction)</text>
  </g>
  
  <g class="step" id="step4" data-narration="ACID properties ensure reliable transactions: Atomicity (all or nothing), Consistency (valid state to valid state), Isolation (concurrency control), Durability (permanent effects).">
    <rect x="20" y="322" width="760" height="80" rx="8" fill="white" stroke="#9c27b0" stroke-width="2"/>
    <rect x="20" y="322" width="760" height="30" rx="6" fill="url(#gradPurple)"/>
    <text x="400" y="342" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">ACID PROPERTIES - Reliable Transaction Processing</text>
    <rect x="30" y="362" width="170" height="32" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="115" y="378" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-size="11" font-weight="bold">ATOMICITY</text>
    <text x="115" y="390" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">All or Nothing</text>
    <rect x="215" y="362" width="170" height="32" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="300" y="378" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-size="11" font-weight="bold">CONSISTENCY</text>
    <text x="300" y="390" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Valid State to Valid State</text>
    <rect x="400" y="362" width="170" height="32" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="485" y="378" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-size="11" font-weight="bold">ISOLATION</text>
    <text x="485" y="390" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Concurrent Execution</text>
    <rect x="585" y="362" width="175" height="32" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="672" y="378" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-size="11" font-weight="bold">DURABILITY</text>
    <text x="672" y="390" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Permanent Effects</text>
  </g>
  
  <g class="step" id="step5" data-narration="File systems have problems: data redundancy, inconsistency, poor security, and no concurrent access. DBMS solves these through centralized data management.">
    <rect x="20" y="410" width="760" height="80" rx="8" fill="white" stroke="#c62828" stroke-width="2"/>
    <rect x="20" y="410" width="360" height="80" rx="8" fill="#ffebee"/>
    <text x="200" y="435" text-anchor="middle" fill="#c62828" font-family="Arial" font-size="14" font-weight="bold">Traditional File Systems - Problems</text>
    <text x="200" y="458" fill="#333" font-family="Arial" font-size="10">• Data redundancy and wastage of storage</text>
    <text x="200" y="473" fill="#333" font-family="Arial" font-size="10">• Data inconsistency across multiple files</text>
    <text x="200" y="488" fill="#333" font-family="Arial" font-size="10">• Poor security and integrity constraints</text>
    <rect x="400" y="410" width="380" height="80" rx="8" fill="#e8f5e9"/>
    <text x="590" y="435" text-anchor="middle" fill="#2e7d32" font-family="Arial" font-size="14" font-weight="bold">DBMS Advantages</text>
    <text x="590" y="458" fill="#333" font-family="Arial" font-size="10">• Centralized data management</text>
    <text x="590" y="473" fill="#333" font-family="Arial" font-size="10">• Reduced redundancy and improved consistency</text>
    <text x="590" y="488" fill="#333" font-family="Arial" font-size="10">• Enhanced security and concurrency control</text>
  </g>
  
  <g class="step" id="step6" data-narration="The relational model organizes data in tables with rows and columns. SQL is used for querying. Key functions include data definition, manipulation, retrieval, and security.">
    <rect x="20" y="498" width="760" height="90" rx="8" fill="white" stroke="#00796b" stroke-width="2"/>
    <rect x="20" y="498" width="760" height="28" rx="6" fill="url(#gradTeal)"/>
    <text x="400" y="517" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">RELATIONAL MODEL and KEY FUNCTIONS</text>
    <rect x="30" y="535" width="230" height="45" rx="4" fill="#e0f2f1" stroke="#00796b"/>
    <text x="145" y="552" text-anchor="middle" fill="#004d40" font-family="Arial" font-size="11" font-weight="bold">RELATIONAL MODEL</text>
    <text x="145" y="568" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Data in tables (Relations)</text>
    <text x="145" y="580" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Rows = Tuples, Columns = Attributes</text>
    <rect x="275" y="535" width="235" height="45" rx="4" fill="#e0f2f1" stroke="#00796b"/>
    <text x="392" y="552" text-anchor="middle" fill="#004d40" font-family="Arial" font-size="11" font-weight="bold">KEY FUNCTIONS OF DBMS</text>
    <text x="392" y="568" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Data Definition | Data Manipulation | Retrieval</text>
    <text x="392" y="580" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Security | Concurrency | Recovery | Integrity</text>
    <rect x="525" y="535" width="235" height="45" rx="4" fill="#e0f2f1" stroke="#00796b"/>
    <text x="642" y="552" text-anchor="middle" fill="#004d40" font-family="Arial" font-size="11" font-weight="bold">EVOLUTION</text>
    <text x="642" y="568" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">1960s: Flat Files → 1970: Relational</text>
    <text x="642" y="580" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Now: NoSQL, NewSQL, Cloud Databases</text>
  </g>
</svg>