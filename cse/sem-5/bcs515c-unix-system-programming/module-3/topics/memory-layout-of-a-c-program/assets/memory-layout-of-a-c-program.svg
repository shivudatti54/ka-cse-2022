<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about the memory layout of a C program. We'll explore each section from low to high memory addresses.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Memory Layout of a C Program</text>
  </g>
  
  <g class="step" id="step1" data-narration="The complete memory layout from lowest to highest address: Text segment, Data segment, BSS segment, Heap, and Stack in memory order.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="78" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Complete Memory Layout Order (Low → High Address)</text>
    <rect x="100" y="88" width="600" height="40" rx="3" fill="#fff"/>
    <text x="140" y="108" font-family="Arial" font-size="11" fill="#333">Text</text>
    <text x="230" y="108" font-family="Arial" font-size="11" fill="#333">Data</text>
    <text x="310" y="108" font-family="Arial" font-size="11" fill="#333">BSS</text>
    <text x="400" y="108" font-family="Arial" font-size="11" fill="#333">Heap</text>
    <text x="520" y="108" font-family="Arial" font-size="11" fill="#333">Stack</text>
    <text x="660" y="108" font-family="Arial" font-size="9" fill="#666">Low Addr → High Addr</text>
  </g>
  
  <g class="step" id="step2" data-narration="The Text segment stores executable code instructions and is read-only for security. The Data segment holds initialized global and static variables.">
    <rect x="50" y="146" width="340" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Text Segment (Code)</text>
    <text x="70" y="185" font-family="Arial" font-size="10" fill="#333">• Contains executable instructions</text>
    <text x="70" y="200" font-family="Arial" font-size="10" fill="#333">• Read-only for security</text>
    <text x="70" y="215" font-family="Arial" font-size="10" fill="#333">• Loaded from executable file</text>
    
    <rect x="410" y="146" width="340" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="430" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Data Segment</text>
    <text x="430" y="185" font-family="Arial" font-size="10" fill="#333">• Initialized global variables</text>
    <text x="430" y="200" font-family="Arial" font-size="10" fill="#333">• Initialized static variables</text>
    <text x="430" y="215" font-family="Arial" font-size="10" fill="#333">• Read-write permissions</text>
  </g>
  
  <g class="step" id="step3" data-narration="The BSS segment stores uninitialized global and static variables. The OS automatically zero-initializes them for efficiency when the program starts running.">
    <rect x="50" y="234" width="700" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">BSS Segment (Block Started by Symbol)</text>
    <text x="70" y="275" font-family="Arial" font-size="10" fill="#333">• Uninitialized global variables: int global_var;</text>
    <text x="70" y="290" font-family="Arial" font-size="10" fill="#333">• Uninitialized static variables: static int static_var;</text>
    <text x="70" y="305" font-family="Arial" font-size="10" fill="#333">• OS zero-initializes automatically • Mapped to zero pages for efficiency</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Heap is dynamic memory that grows upward. Use malloc, calloc, realloc to allocate and free to deallocate memory explicitly.">
    <rect x="50" y="322" width="700" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Heap (Grows Upward → Higher Addresses)</text>
    <text x="70" y="363" font-family="Arial" font-size="10" fill="#333">• Dynamic allocation: malloc(), calloc(), realloc()</text>
    <text x="70" y="378" font-family="Arial" font-size="10" fill="#333">• Must be explicitly freed with free() • Persists until freed or program ends</text>
    <text x="70" y="393" font-family="Arial" font-size="10" fill="#333">• Shared among all threads • Can cause memory leaks if not freed</text>
    <path d="M680,370 L680,340" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowUp)"/>
    <text x="690" y="360" font-family="Arial" font-size="9" fill="#ff9800">Grows Up</text>
  </g>
  
  <g class="step" id="step5" data-narration="The Stack stores function calls, local variables, and return addresses. It grows downward toward lower addresses in LIFO order properly.">
    <rect x="50" y="410" width="700" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Stack (Grows Downward → Lower Addresses)</text>
    <text x="70" y="451" font-family="Arial" font-size="10" fill="#333">• Local variables (auto), function parameters, return addresses</text>
    <text x="70" y="466" font-family="Arial" font-size="10" fill="#333">• Each function call creates a stack frame • LIFO (Last-In-First-Out) order</text>
    <text x="70" y="481" font-family="Arial" font-size="10" fill="#333">• Automatic allocation/deallocation • Fixed size, can overflow with excessive recursion</text>
    <path d="M680,430 L680,460" stroke="#f44336" stroke-width="2" marker-end="url(#arrowDown)"/>
    <text x="690" y="450" font-family="Arial" font-size="9" fill="#f44336">Grows Down</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: global_initialized in Data, global_uninitialized in BSS, local_var on Stack, malloc'd memory on Heap depending on their storage class type and initialization.">
    <rect x="50" y="498" width="700" height="90" rx="5" fill="#f8f9fa" stroke="#666" stroke-width="1"/>
    <text x="400" y="520" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Variable Storage Example</text>
    <rect x="70" y="530" width="120" height="50" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="130" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">global_init</text>
    <text x="130" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Data Segment</text>
    
    <rect x="200" y="530" width="120" height="50" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="260" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">global_uninit</text>
    <text x="260" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">BSS Segment</text>
    
    <rect x="330" y="530" width="120" height="50" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="390" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">local_var</text>
    <text x="390" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Stack</text>
    
    <rect x="460" y="530" width="120" height="50" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="520" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">malloc() ptr</text>
    <text x="520" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Heap</text>
    
    <rect x="590" y="530" width="140" height="50" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="660" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">static int x = 5</text>
    <text x="660" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Data Segment</text>
  </g>
</svg>