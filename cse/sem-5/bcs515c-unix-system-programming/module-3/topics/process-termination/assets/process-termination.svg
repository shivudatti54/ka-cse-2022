<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
  </defs>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Process Termination in Operating Systems covers how processes end, release resources, communicate exit status to parent processes, and clean up their PCB entries completely.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Process Termination in Operating Systems</text>
  </g>
  
  <!-- step1: Process Termination Basics -->
  <g class="step" id="step1" data-narration="When a process terminates, the OS deallocates all resources like memory and file descriptors, stores the exit status in the PCB, and notifies the parent process immediately.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Process Termination Basics</text>
    <rect x="40" y="88" width="140" height="42" fill="#e3f2fd" rx="3"/>
    <text x="50" y="104" font-family="Arial" font-size="10" fill="#1976d2">Resource Deallocation</text>
    <text x="50" y="118" font-family="Arial" font-size="9" fill="#666">Memory, files, I/O</text>
    <rect x="200" y="88" width="140" height="42" fill="#e3f2fd" rx="3"/>
    <text x="210" y="104" font-family="Arial" font-size="10" fill="#1976d2">Exit Status</text>
    <text x="210" y="118" font-family="Arial" font-size="9" fill="#666">Stored in PCB</text>
    <rect x="360" y="88" width="140" height="42" fill="#e3f2fd" rx="3"/>
    <text x="370" y="104" font-family="Arial" font-size="10" fill="#1976d2">PCB Entry</text>
    <text x="370" y="118" font-family="Arial" font-size="9" fill="#666">Waits for parent read</text>
    <rect x="520" y="88" width="140" height="42" fill="#e3f2fd" rx="3"/>
    <text x="530" y="104" font-family="Arial" font-size="10" fill="#1976d2">Parent Notification</text>
    <text x="530" y="118" font-family="Arial" font-size="9" fill="#666">via signals/wait()</text>
  </g>
  
  <!-- step2: Ways to Terminate -->
  <g class="step" id="step2" data-narration="Processes can terminate voluntarily using exit() or returning from main, or they can be terminated involuntarily by signals like SIGKILL, SIGSEGV, or SIGINT.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Normal Termination (Voluntary)</text>
    <rect x="40" y="180" width="100" height="38" fill="#e8f5e9" rx="3"/>
    <text x="50" y="196" font-family="Arial" font-size="10" fill="#388e3c">exit()</text>
    <text x="50" y="210" font-family="Arial" font-size="8" fill="#666">with cleanup</text>
    <rect x="150" y="180" width="100" height="38" fill="#e8f5e9" rx="3"/>
    <text x="160" y="196" font-family="Arial" font-size="10" fill="#388e3c">return from main</text>
    <text x="160" y="210" font-family="Arial" font-size="8" fill="#666">implicit exit()</text>
    <rect x="260" y="180" width="100" height="38" fill="#e8f5e9" rx="3"/>
    <text x="270" y="196" font-family="Arial" font-size="10" fill="#388e3c">_exit()</text>
    <text x="270" y="210" font-family="Arial" font-size="8" fill="#666">no cleanup</text>
    <text x="400" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Abnormal Termination (Involuntary)</text>
    <rect x="400" y="180" width="100" height="38" fill="#ffebee" rx="3"/>
    <text x="410" y="196" font-family="Arial" font-size="10" fill="#f44336">SIGKILL</text>
    <text x="410" y="210" font-family="Arial" font-size="8" fill="#666">cannot catch</text>
    <rect x="510" y="180" width="100" height="38" fill="#ffebee" rx="3"/>
    <text x="520" y="196" font-family="Arial" font-size="10" fill="#f44336">SIGSEGV</text>
    <text x="520" y="210" font-family="Arial" font-size="8" fill="#666">seg fault</text>
    <rect x="620" y="180" width="100" height="38" fill="#ffebee" rx="3"/>
    <text x="630" y="196" font-family="Arial" font-size="10" fill="#f44336">SIGINT</text>
    <text x="630" y="210" font-family="Arial" font-size="8" fill="#666">Ctrl+C</text>
  </g>
  
  <!-- step3: Exit Status -->
  <g class="step" id="step3" data-narration="The exit status is an integer from 0 to 255 where zero indicates success. The parent retrieves this status using the wait() or waitpid() system calls.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Exit Status Mechanism</text>
    <rect x="40" y="268" width="180" height="38" fill="#fff3e0" rx="3"/>
    <text x="50" y="284" font-family="Arial" font-size="10" fill="#ff9800">Exit Status Convention</text>
    <text x="50" y="298" font-family="Arial" font-size="9" fill="#666">0 = Success, Non-zero = Failure</text>
    <rect x="240" y="268" width="160" height="38" fill="#fff3e0" rx="3"/>
    <text x="250" y="284" font-family="Arial" font-size="10" fill="#ff9800">Range: 0-255</text>
    <text x="250" y="298" font-family="Arial" font-size="9" fill="#666">8-bit integer stored in PCB</text>
    <rect x="420" y="268" width="160" height="38" fill="#fff3e0" rx="3"/>
    <text x="430" y="284" font-family="Arial" font-size="10" fill="#ff9800">Parent Retrieval</text>
    <text x="430" y="298" font-family="Arial" font-size="9" fill="#666">wait() or waitpid()</text>
    <rect x="600" y="268" width="160" height="38" fill="#fff3e0" rx="3"/>
    <text x="610" y="284" font-family="Arial" font-size="10" fill="#ff9800">Status Macros</text>
    <text x="610" y="298" font-family="Arial" font-size="9" fill="#666">WIFEXITED, WEXITSTATUS</text>
  </g>
  
  <!-- step4: wait() and waitpid() -->
  <g class="step" id="step4" data-narration="The wait() system call blocks until any child terminates, while waitpid() allows waiting for a specific child or using WNOHANG for non-blocking behavior.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">wait() and waitpid() System Calls</text>
    <rect x="40" y="356" width="200" height="38" fill="#f3e5f5" rx="3"/>
    <text x="50" y="372" font-family="Arial" font-size="10" fill="#9c27b0">wait()</text>
    <text x="50" y="386" font-family="Arial" font-size="9" fill="#666">Blocks until any child terminates</text>
    <rect x="260" y="356" width="200" height="38" fill="#f3e5f5" rx="3"/>
    <text x="270" y="372" font-family="Arial" font-size="10" fill="#9c27b0">waitpid(pid, &amp;status, flags)</text>
    <text x="270" y="386" font-family="Arial" font-size="9" fill="#666">Wait for specific child or non-blocking</text>
    <text x="480" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Status Macros</text>
    <rect x="480" y="356" width="280" height="38" fill="#f3e5f5" rx="3"/>
    <text x="490" y="368" font-family="Arial" font-size="9" fill="#9c27b0">WIFEXITED | WIFSIGNALED | WIFSTOPPED | WIFCONTINUED</text>
    <text x="490" y="382" font-family="Arial" font-size="9" fill="#666">WEXITSTATUS | WTERMSIG</text>
  </g>
  
  <!-- step5: Zombie Processes -->
  <g class="step" id="step5" data-narration="A zombie process has terminated but parent hasn't read exit status, so it occupies a process table entry. This is a programming error.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Zombie Processes</text>
    <text x="40" y="450" font-family="Arial" font-size="10" fill="#666">"Dead but not buried" - Child terminated, parent hasn't called wait()</text>
    <rect x="360" y="418" width="80" height="60" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="400" y="445" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">CHILD</text>
    <text x="400" y="460" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(Zombie)</text>
    <line x1="440" y1="448" x2="480" y2="448" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="490" y="435" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Parent</text>
    <text x="490" y="450" font-family="Arial" font-size="9" fill="#666">doesn't call wait()</text>
    <text x="490" y="465" font-family="Arial" font-size="9" fill="#666">→ Zombie accumulates!</text>
    <rect x="600" y="418" width="160" height="60" fill="#ffebee" rx="3"/>
    <text x="610" y="435" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Problems:</text>
    <text x="610" y="450" font-family="Arial" font-size="9" fill="#666">• PID exhaustion</text>
    <text x="610" y="463" font-family="Arial" font-size="9" fill="#666">• Process table entry held</text>
  </g>
  
  <!-- step6: Orphan Processes -->
  <g class="step" id="step6" data-narration="An orphan has a terminated parent, so it gets adopted by init (PID 1), which calls wait() to prevent zombie formation.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Orphan Processes</text>
    <text x="40" y="538" font-family="Arial" font-size="10" fill="#666">"Alive but parentless" - Parent exits before child completes</text>
    <rect x="40" y="548" width="80" height="32" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="80" y="568" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Child</text>
    <line x1="120" y1="564" x2="200" y2="564" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4"/>
    <text x="210" y="555" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Parent dies</text>
    <rect x="280" y="548" width="80" height="32" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="320" y="568" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Orphan</text>
    <line x1="360" y1="564" x2="420" y2="564" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4"/>
    <rect x="430" y="548" width="70" height="32" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="465" y="568" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">init</text>
    <text x="465" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(PID 1)</text>
    <text x="520" y="555" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Adoption</text>
    <text x="520" y="570" font-family="Arial" font-size="9" fill="#666">init adopts orphans</text>
    <text x="520" y="582" font-family="Arial" font-size="9" fill="#666">calls wait() periodically</text>
    <rect x="640" y="518" width="120" height="60" fill="#e8f5e9" rx="3"/>
    <text x="650" y="535" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Prevention</text>
    <text x="650" y="550" font-family="Arial" font-size="9" fill="#666">init prevents zombies</text>
    <text x="650" y="563" font-family="Arial" font-size="9" fill="#666">by reaping orphans</text>
  </g>
</svg>