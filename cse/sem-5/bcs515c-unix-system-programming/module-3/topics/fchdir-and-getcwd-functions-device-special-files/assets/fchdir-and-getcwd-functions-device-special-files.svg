<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="This lesson covers fchdir() and getcwd() functions for managing the working directory and device special files in Unix/Linux operating systems.">
<rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
<text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">fchdir() and getcwd() Functions, Device Special Files</text>
</g>

<g class="step" id="step1" data-narration="The working directory is the process current directory serving as the base reference point for resolving relative pathnames in Unix and Linux systems.">
<rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
<text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Working Directory Concept</text>
<rect x="40" y="88" width="200" height="40" fill="#bbdefb" rx="3"/>
<text x="140" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Process</text>
<text x="140" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">CWD: /home/user</text>
<path d="M250,108 L290,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
<text x="320" y="112" font-family="Arial" font-size="10" fill="#333">Relative paths resolved from CWD</text>
</g>

<g class="step" id="step2" data-narration="The fchdir() system call changes the current working directory using an open file descriptor, returning zero on success or minus one on error.">
<rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
<text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">fchdir() Function</text>
<text x="40" y="185" font-family="Courier" font-size="10" fill="#1b5e20">int fchdir(int fd);</text>
<rect x="40" y="198" width="110" height="28" fill="#c8e6c9" rx="3"/>
<text x="95" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">fd: directory file descriptor</text>
<rect x="160" y="198" width="100" height="28" fill="#c8e6c9" rx="3"/>
<text x="210" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Returns: 0 or -1</text>
<text x="280" y="212" font-family="Arial" font-size="9" fill="#333">Fails with ENOTDIR if fd not a directory</text>
</g>

<g class="step" id="step3" data-narration="The getcwd() function returns the absolute pathname string of the current working directory, storing it in the provided buffer for the caller.">
<rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="5"/>
<text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">getcwd() Function</text>
<text x="40" y="273" font-family="Courier" font-size="10" fill="#e65100">char *getcwd(char *buf, size_t size);</text>
<rect x="40" y="286" width="140" height="24" fill="#ffe0b2" rx="3"/>
<text x="110" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">buf: destination buffer</text>
<text x="200" y="302" font-family="Arial" font-size="9" fill="#333">size: buffer size (use PATH_MAX)</text>
<text x="400" y="302" font-family="Arial" font-size="9" fill="#333">Returns pointer to buf or NULL on error</text>
</g>

<g class="step" id="step4" data-narration="Device special files appear as regular files in the file system but represent hardware devices, providing an interface between application programs and actual hardware.">
<rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
<text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Device Special Files</text>
<text x="40" y="362" font-family="Arial" font-size="10" fill="#4a148c">Special files in /dev representing hardware devices</text>
<rect x="40" y="375" width="330" height="20" fill="#e1bee7" rx="3"/>
<text x="205" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Character Device (c) | Block Device (b)</text>
<text x="380" y="390" font-family="Arial" font-size="9" fill="#333">mknod() creates device files</text>
</g>

<g class="step" id="step5" data-narration="Character devices transfer data byte-by-byte without buffering like keyboards and terminals, while block devices use fixed-size buffered blocks like hard disks and CD-ROMs.">
<rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" rx="5"/>
<text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Character vs Block Devices</text>
<rect x="40" y="448" width="340" height="35" fill="#ffcdd2" rx="3"/>
<text x="210" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Character Device (c)</text>
<text x="210" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Byte-by-byte, no buffering: keyboard, terminal</text>
<rect x="390" y="448" width="340" height="35" fill="#ffcdd2" rx="3"/>
<text x="560" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Block Device (b)</text>
<text x="560" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Fixed-size blocks, buffered: hard disk, CD-ROM</text>
</g>

<g class="step" id="step6" data-narration="Each device has a major number for driver identification and a minor number to specify the exact device. Use mknod with S_IFCHR or S_IFBLK to create device files.">
<rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
<text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Device Numbers and mknod()</text>
<rect x="40" y="532" width="180" height="50" fill="#bbdefb" rx="3"/>
<text x="130" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Major Number</text>
<text x="130" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">identifies device driver</text>
<text x="230" y="555" font-family="Arial" font-size="12" fill="#333">+</text>
<rect x="250" y="532" width="180" height="50" fill="#bbdefb" rx="3"/>
<text x="340" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Minor Number</text>
<text x="340" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">identifies specific device</text>
<text x="450" y="555" font-family="Courier" font-size="10" fill="#0d47a1">makedev(maj,min)</text>
<text x="450" y="572" font-family="Courier" font-size="9" fill="#0d47a1">mknod(path,S_IFCHR|0666,dev)</text>
</g>
</svg>