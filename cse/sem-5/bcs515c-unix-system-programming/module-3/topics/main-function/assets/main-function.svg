<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to this lesson on the main function in C programming, the fundamental entry point where program execution begins correctly.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">The Main Function in C Programming</text>
  </g>
  
  <!-- Step 1: Entry Point Concept -->
  <g class="step" id="step1" data-narration="The main function serves as the entry point for every C program. The operating system directly calls main to begin execution of your code.">
    <rect x="10" y="58" width="780" height="97" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="25" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Entry Point Concept</text>
    <rect x="25" y="88" width="320" height="48" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="103" font-family="Courier" font-size="11" fill="#333">int main(void) {</text>
    <text x="45" y="118" font-family="Courier" font-size="11" fill="#333">    // program code</text>
    <text x="45" y="133" font-family="Courier" font-size="11" fill="#333">    return 0;</text>
    <text x="35" y="148" font-family="Courier" font-size="11" fill="#333">}</text>
    <path d="M360 98 L400 98" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="410" y="103" font-family="Arial" font-size="11" fill="#333">OS calls main</text>
    <text x="410" y="118" font-family="Arial" font-size="11" fill="#333">to start program</text>
    <text x="410" y="133" font-family="Arial" font-size="10" fill="#666">Return: exit status</text>
  </g>
  
  <!-- Step 2: Standard Prototype -->
  <g class="step" id="step2" data-narration="The standard form is int main(void), returning an integer. Use return 0 for success, non-zero for failure. Avoid void main() and other non-standard forms.">
    <rect x="10" y="163" width="780" height="78" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="25" y="183" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Standard Prototype</text>
    <rect x="25" y="193" width="200" height="42" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="35" y="208" font-family="Courier" font-size="11" fill="#333">int main(void)</text>
    <text x="35" y="223" font-family="Courier" font-size="11" fill="#333">{ return 0; }</text>
    <rect x="240" y="193" width="200" height="42" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="250" y="208" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Avoid:</text>
    <text x="250" y="223" font-family="Courier" font-size="10" fill="#333">void main() / main()</text>
    <rect x="455" y="193" width="140" height="42" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="465" y="208" font-family="Arial" font-size="11" fill="#333">Return 0 = success</text>
    <text x="465" y="223" font-family="Arial" font-size="10" fill="#333">Return 1 = failure</text>
    <text x="610" y="208" font-family="Arial" font-size="10" fill="#333">Use EXIT_SUCCESS</text>
    <text x="610" y="223" font-family="Arial" font-size="10" fill="#333">and EXIT_FAILURE</text>
  </g>
  
  <!-- Step 3: Command-Line Arguments -->
  <g class="step" id="step3" data-narration="Use int main(int argc, char *argv[]) to accept command-line arguments. The argc parameter holds the count, and argv is an array of string arguments.">
    <rect x="10" y="249" width="780" height="75" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="25" y="269" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Command-Line Arguments</text>
    <rect x="25" y="279" width="340" height="40" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="35" y="294" font-family="Courier" font-size="11" fill="#333">int main(int argc, char *argv[])</text>
    <rect x="380" y="279" width="150" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="390" y="294" font-family="Arial" font-size="11" fill="#333">argc = argument count</text>
    <text x="390" y="309" font-family="Arial" font-size="10" fill="#333">argv[0] = program name</text>
    <rect x="545" y="279" width="110" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="555" y="294" font-family="Arial" font-size="10" fill="#333">argv[1], argv[2]</text>
    <text x="555" y="309" font-family="Arial" font-size="10" fill="#333">are user args</text>
  </g>
  
  <!-- Step 4: Example of argc/argv -->
  <g class="step" id="step4" data-narration="For command ./myprogram hello world, argc equals 3 and argv contains three strings. The program name is always argv[0], with user arguments following.">
    <rect x="10" y="332" width="780" height="82" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="25" y="352" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Example: argc and argv Values</text>
    <text x="25" y="372" font-family="Courier" font-size="11" fill="#333">Command: ./myprogram hello world</text>
    <rect x="25" y="382" width="160" height="26" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="399" font-family="Arial" font-size="11" fill="#333">argc = 3</text>
    <rect x="200" y="382" width="200" height="26" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="210" y="399" font-family="Arial" font-size="11" fill="#333">argv[0] = "./myprogram"</text>
    <rect x="415" y="382" width="160" height="26" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="425" y="399" font-family="Arial" font-size="11" fill="#333">argv[1] = "hello"</text>
    <rect x="590" y="382" width="170" height="26" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="600" y="399" font-family="Arial" font-size="11" fill="#333">argv[2] = "world"</text>
  </g>
  
  <!-- Step 5: Exit Status and Example -->
  <g class="step" id="step5" data-narration="Return 0 to indicate success or non-zero for failure. Check exit status in shell using echo $?. This example sums two command-line arguments.">
    <rect x="10" y="422" width="780" height="100" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="25" y="442" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Exit Status &amp; Complete Example</text>
    <rect x="25" y="452" width="130" height="64" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="467" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Success:</text>
    <text x="35" y="482" font-family="Courier" font-size="9" fill="#333">return 0;</text>
    <text x="35" y="494" font-family="Courier" font-size="9" fill="#333">EXIT_SUCCESS;</text>
    <text x="35" y="506" font-family="Courier" font-size="9" fill="#333">return EXIT_FAILURE;</text>
    <rect x="170" y="452" width="230" height="64" rx="3" fill="#1a1a1a" stroke="#388e3c" stroke-width="1"/>
    <text x="180" y="467" font-family="Courier" font-size="9" fill="#00ff00">#include &lt;stdio.h&gt;</text>
    <text x="180" y="480" font-family="Courier" font-size="9" fill="#00ff00">#include &lt;stdlib.h&gt;</text>
    <text x="180" y="493" font-family="Courier" font-size="9" fill="#00ff00">int main(int argc, char *argv[]) {</text>
    <text x="195" y="506" font-family="Courier" font-size="9" fill="#00ff00">if(argc!=3) return 1;</text>
    <text x="180" y="519" font-family="Courier" font-size="9" fill="#00ff00">printf("%d\n",atoi(argv[1])+atoi(argv[2])); return 0;}</text>
    <rect x="415" y="452" width="370" height="64" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="425" y="467" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Shell Usage:</text>
    <text x="425" y="482" font-family="Courier" font-size="10" fill="#333">./program 5 3</text>
    <text x="425" y="496" font-family="Courier" font-size="10" fill="#333">./program 5 3; echo $?</text>
    <text x="425" y="510" font-family="Arial" font-size="10" fill="#666"># Output: 8, then 0</text>
  </g>
</svg>