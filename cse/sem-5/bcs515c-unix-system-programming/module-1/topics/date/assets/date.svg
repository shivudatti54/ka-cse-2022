<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This lesson covers date handling in C programming using user-defined structures and the standard time.h library for performing various date operations and calculations.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Date Handling in C Programming</text>
  </g>
  
  <g class="step" id="step1" data-narration="In C programming, dates are represented using structures that contain three integer members representing the day, month, and year components of a date value.">
    <rect x="20" y="58" width="760" height="115" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">1. Date Representation Using Structures</text>
    <rect x="40" y="92" width="180" height="38" fill="#ffffff" stroke="#ffcc80" rx="3"/>
    <text x="48" y="108" font-family="Courier" font-size="10" fill="#333">struct Date {</text>
    <text x="56" y="122" font-family="Courier" font-size="10" fill="#333">int day;</text>
    <text x="56" y="136" font-family="Courier" font-size="10" fill="#333">int month;</text>
    <text x="56" y="150" font-family="Courier" font-size="10" fill="#333">int year;</text>
    <text x="48" y="164" font-family="Courier" font-size="10" fill="#333">};</text>
    <text x="250" y="95" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Example usage:</tspan></text>
    <text x="250" y="110" font-family="Courier" font-size="10" fill="#333">struct Date today = {15, 6, 2024};</text>
    <text x="250" y="125" font-family="Courier" font-size="10" fill="#333">printf("%d/%d/%d", today.day,</text>
    <text x="250" y="140" font-family="Courier" font-size="10" fill="#333">today.month, today.year);</text>
  </g>
  
  <g class="step" id="step2" data-narration="The time.h standard library provides the time_t data type for representing seconds since Unix epoch and struct tm for storing broken-down time components.">
    <rect x="20" y="181" width="760" height="85" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="201" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">2. The time.h Library</text>
    <text x="40" y="220" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">time_t:</tspan> stores seconds since Unix epoch (Jan 1, 1970)</text>
    <text x="40" y="236" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">struct tm:</tspan> broken-down time with tm_sec, tm_min, tm_hour, tm_mday(1-31),</text>
    <text x="40" y="252" font-family="Arial" font-size="10" fill="#333">tm_mon(0-11), tm_year(years since 1900), and more</text>
    <text x="400" y="220" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Functions:</tspan></text>
    <text x="400" y="236" font-family="Arial" font-size="10" fill="#333">time() - get current time</text>
    <text x="400" y="252" font-family="Arial" font-size="10" fill="#333">localtime() - convert to struct tm</text>
  </g>
  
  <g class="step" id="step3" data-narration="A leap year occurs when a year is divisible by 4, except for century years which must be divisible by 400 to be considered leap years.">
    <rect x="20" y="274" width="760" height="90" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="294" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">3. Leap Year Detection</text>
    <rect x="40" y="308" width="320" height="50" fill="#ffffff" stroke="#ce93d8" rx="3"/>
    <text x="48" y="325" font-family="Courier" font-size="10" fill="#333">int isLeapYear(int year) {</text>
    <text x="56" y="340" font-family="Courier" font-size="10" fill="#333">return (year%4==0 &amp;&amp; year%100!=0) || (year%400==0);</text>
    <text x="56" y="355" font-family="Courier" font-size="10" fill="#333">}</text>
    <text x="380" y="325" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Days per month:</tspan></text>
    <text x="380" y="340" font-family="Arial" font-size="10" fill="#333">30 days: Apr, Jun, Sep, Nov</text>
    <text x="380" y="355" font-family="Arial" font-size="10" fill="#333">31 days: Jan, Mar, May, Jul, Aug, Oct, Dec</text>
  </g>
  
  <g class="step" id="step4" data-narration="Date validation requires checking that the year is positive, the month falls between 1 and 12, and the day is valid for the specific month.">
    <rect x="20" y="372" width="760" height="90" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="392" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">4. Date Validation</text>
    <text x="40" y="415" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Step 1:</tspan> Verify year is greater than zero</text>
    <text x="40" y="432" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Step 2:</tspan> Ensure month is between 1 and 12</text>
    <text x="40" y="449" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Step 3:</tspan> Validate day is within valid range for that month</text>
    <text x="300" y="415" font-family="Courier" font-size="10" fill="#333">int daysInMonth[] = {31,28,31,30,31,30,</text>
    <text x="300" y="432" font-family="Courier" font-size="10" fill="#333">31,31,30,31,30,31};</text>
    <text x="300" y="449" font-family="Courier" font-size="10" fill="#333">if(month==2 &amp;&amp; isLeapYear) max=29;</text>
  </g>
  
  <g class="step" id="step5" data-narration="Zeller's Congruence calculates the day of the week by treating January and February as months 13 and 14 of the previous year, then applying the formula.">
    <rect x="20" y="470" width="760" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="490" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">5. Day of Week - Zeller's Congruence</text>
    <text x="40" y="512" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Adjustment:</tspan> If month is January or February, add 12 to month and subtract 1 from year</text>
    <text x="40" y="528" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Formula:</tspan> h = (d + (13*(m+1))/5 + k + k/4 + j/4 + 5*j) % 7</text>
    <text x="40" y="544" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Result mapping:</tspan> 0=Saturday, 1=Sunday, 2=Monday, 3=Tuesday, 4=Wednesday, 5=Thursday, 6=Friday</text>
    <rect x="350" y="505" width="180" height="30" fill="#ffffff" stroke="#90caf9" rx="3"/>
    <text x="358" y="520" font-family="Courier" font-size="9" fill="#333">int k = year % 100;</text>
    <text x="358" y="534" font-family="Courier" font-size="9" fill="#333">int j = year / 100;</text>
    <text x="550" y="520" font-family="Arial" font-size="9" fill="#333"><tspan font-weight="bold">Returns 0-6</tspan></text>
    <text x="550" y="535" font-family="Arial" font-size="9" fill="#333">Convert to day name</text>
  </g>
</svg>