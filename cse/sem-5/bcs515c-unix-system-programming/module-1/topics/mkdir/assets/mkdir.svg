<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to mkdir, the essential Linux command for creating directories. This tutorial covers syntax, options, and practical examples for beginners in Unix.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">mkdir - Making Directories in Linux/Unix</text>
  </g>
  
  <!-- Step 1: Basic Syntax -->
  <g class="step" id="step1" data-narration="The mkdir command creates directories. Basic syntax is mkdir directoryname. Default permissions are 755, allowing read and execute for everyone on the system.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Basic Syntax</text>
    <rect x="40" y="95" width="200" height="30" fill="#e3f2fd" rx="3"/>
    <text x="50" y="115" font-family="Courier" font-size="12" fill="#1976d2">mkdir [OPTIONS] DIR_NAME</text>
    <text x="260" y="95" font-family="Arial" font-size="11" fill="#333">Creates directory with default permissions (755)</text>
    <rect x="40" y="118" width="80" height="12" fill="#e8f5e9" rx="2"/>
    <text x="45" y="127" font-family="Courier" font-size="9" fill="#388e3c">rwxr-xr-x</text>
  </g>
  
  <!-- Step 2: Absolute and Relative Paths -->
  <g class="step" id="step2" data-narration="Absolute paths start from root like slash home slash student directory. Relative paths start from current directory using dot notation for current folder access.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#fff3e0" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Absolute vs Relative Paths</text>
    <rect x="40" y="183" width="340" height="32" fill="#fff3e0" rx="3"/>
    <text x="50" y="200" font-family="Courier" font-size="11" fill="#e65100">mkdir /home/student/projects</text>
    <text x="50" y="215" font-family="Arial" font-size="9" fill="#666">Creates at root (absolute path)</text>
    <rect x="400" y="183" width="340" height="32" fill="#fff3e0" rx="3"/>
    <text x="410" y="200" font-family="Courier" font-size="11" fill="#e65100">mkdir ./documents/reports</text>
    <text x="410" y="215" font-family="Arial" font-size="9" fill="#666">Creates relative to current dir</text>
  </g>
  
  <!-- Step 3: -p Option (Parent Directories) -->
  <g class="step" id="step3" data-narration="The minus p flag creates parent directories automatically in one operation. Without it, mkdir fails if any intermediate directory is missing in the path.">
    <rect x="20" y="234" width="760" height="88" fill="#ffffff" stroke="#e8f5e9" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">-p Option: Create Parent Directories</text>
    <rect x="40" y="271" width="300" height="32" fill="#e8f5e9" rx="3"/>
    <text x="50" y="288" font-family="Courier" font-size="11" fill="#2e7d32">mkdir -p /home/user/year2024/month12</text>
    <text x="350" y="288" font-family="Arial" font-size="10" fill="#388e3c">✓ Creates all missing parents</text>
    <rect x="40" y="305" width="700" height="12" fill="#f5f5f5" rx="2"/>
    <text x="45" y="314" font-family="Arial" font-size="9" fill="#666">Without -p: fails if /year2024 or /month12 doesn't exist</text>
  </g>
  
  <!-- Step 4: -m Option (Permissions) -->
  <g class="step" id="step4" data-narration="The minus m flag sets custom permissions using octal mode for security. 755 gives owner full access, others get read-execute permissions only.">
    <rect x="20" y="330" width="760" height="108" fill="#ffffff" stroke="#f3e5f5" rx="5"/>
    <text x="40" y="352" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">-m Option: Set Permissions</text>
    <rect x="40" y="367" width="220" height="32" fill="#f3e5f5" rx="3"/>
    <text x="50" y="384" font-family="Courier" font-size="11" fill="#7b1fa2">mkdir -m 755 shared</text>
    <text x="270" y="384" font-family="Arial" font-size="10" fill="#9c27b0">rwxr-xr-x (everyone can access)</text>
    <rect x="40" y="401" width="220" height="32" fill="#f3e5f5" rx="3"/>
    <text x="50" y="418" font-family="Courier" font-size="11" fill="#7b1fa2">mkdir -m 700 private</text>
    <text x="270" y="418" font-family="Arial" font-size="10" fill="#9c27b0">rwx------ (owner only)</text>
  </g>
  
  <!-- Step 5: Multiple Directories -->
  <g class="step" id="step5" data-narration="Create multiple directories in one command by listing names separated by spaces. Brace expansion creates nested directory structures efficiently in a single operation.">
    <rect x="20" y="446" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" rx="5"/>
    <text x="40" y="468" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Multiple Directories and Brace Expansion</text>
    <rect x="40" y="483" width="250" height="32" fill="#e3f2fd" rx="3"/>
    <text x="50" y="500" font-family="Courier" font-size="11" fill="#1565c0">mkdir dir1 dir2 dir3</text>
    <rect x="300" y="483" width="440" height="32" fill="#e3f2fd" rx="3"/>
    <text x="310" y="500" font-family="Courier" font-size="11" fill="#1565c0">mkdir -p project/{src,docs,tests,build}</text>
    <text x="310" y="514" font-family="Arial" font-size="9" fill="#666">Creates: project/src, project/docs, project/tests, project/build</text>
  </g>
  
  <!-- Step 6: Error Handling and Verification -->
  <g class="step" id="step6" data-narration="Common errors include permission denied, file exists, and no such directory errors. Verify successful creation with ls -ld or find command after running mkdir.">
    <rect x="20" y="534" width="760" height="60" fill="#ffffff" stroke="#ffebee" rx="5"/>
    <text x="40" y="556" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Error Handling and Verification</text>
    <rect x="40" y="568" width="720" height="20" fill="#ffebee" rx="3"/>
    <text x="50" y="582" font-family="Courier" font-size="10" fill="#c62828">Common errors: Permission denied, File exists, No such directory. Verify: ls -ld dirname</text>
  </g>
</svg>