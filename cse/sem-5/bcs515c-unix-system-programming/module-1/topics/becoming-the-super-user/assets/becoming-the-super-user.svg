<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers becoming the super user in Linux. We will learn about root user privileges and how to obtain them safely.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Becoming the Super User (Root User) in Linux</text>
  </g>
  
  <!-- step1: Root User Introduction -->
  <g class="step" id="step1" data-narration="The root user (UID 0) has unrestricted access to all system files, commands, and resources. The home directory is /root.">
    <rect x="30" y="58" width="740" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. The Root User Account</text>
    <rect x="50" y="95" width="160" height="28" rx="4" fill="#1976d2"/>
    <text x="130" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="white">UID = 0</text>
    <text x="220" y="95" font-family="Arial" font-size="10" fill="#333">Privileges:</text>
    <text x="220" y="108" font-family="Arial" font-size="9" fill="#555">Full system access | Home: /root</text>
    <text x="220" y="121" font-family="Arial" font-size="9" fill="#555">Prompt: # when root | UID = 0</text>
  </g>
  
  <!-- step2: The su Command -->
  <g class="step" id="step2" data-narration="The su command switches user identity to become another user. Use su - for a full login shell with root environment variables.">
    <rect x="30" y="141" width="740" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. The su Command (Substitute User)</text>
    <text x="50" y="185" font-family="Arial" font-size="10" fill="#333">Syntax:</text>
    <rect x="110" y="177" width="170" height="20" rx="3" fill="#f5f5f5" stroke="#388e3c" stroke-width="1"/>
    <text x="115" y="191" font-family="monospace" font-size="10" fill="#333">su [options] [user]</text>
    <text x="290" y="185" font-family="Arial" font-size="10" fill="#333">Examples:</text>
    <rect x="360" y="177" width="100" height="20" rx="3" fill="#388e3c"/>
    <text x="410" y="191" text-anchor="middle" font-family="monospace" font-size="10" fill="white">su -</text>
    <rect x="470" y="177" width="150" height="20" rx="3" fill="#388e3c"/>
    <text x="545" y="191" text-anchor="middle" font-family="monospace" font-size="10" fill="white">su - username</text>
    <text x="50" y="215" font-family="Arial" font-size="9" fill="#f44336">Requires root password | Prompt changes to #</text>
  </g>
  
  <!-- step3: The sudo Command -->
  <g class="step" id="step3" data-narration="The sudo command executes single commands with elevated privileges using the user's own password. It must be configured properly in /etc/sudoers file.">
    <rect x="30" y="239" width="740" height="95" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="261" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. The sudo Command (Super User Do)</text>
    <text x="50" y="283" font-family="Arial" font-size="10" fill="#333">Syntax:</text>
    <rect x="110" y="275" width="200" height="20" rx="3" fill="#f5f5f5" stroke="#ff9800" stroke-width="1"/>
    <text x="115" y="289" font-family="monospace" font-size="10" fill="#333">sudo [options] command</text>
    <text x="320" y="283" font-family="Arial" font-size="10" fill="#333">Key options:</text>
    <rect x="400" y="275" width="50" height="20" rx="3" fill="#ff9800"/>
    <text x="425" y="289" text-anchor="middle" font-family="monospace" font-size="10" fill="white">-i</text>
    <text x="460" y="289" font-family="Arial" font-size="9" fill="#555">root shell</text>
    <rect x="520" y="275" width="50" height="20" rx="3" fill="#ff9800"/>
    <text x="545" y="289" text-anchor="middle" font-family="monospace" font-size="10" fill="white">-u</text>
    <text x="580" y="289" font-family="Arial" font-size="9" fill="#555">run as user</text>
    <rect x="50" y="305" width="300" height="20" rx="3" fill="#ff9800"/>
    <text x="200" y="319" text-anchor="middle" font-family="monospace" font-size="10" fill="white">sudo apt-get update</text>
    <text x="360" y="319" font-family="Arial" font-size="9" fill="#f44336">Uses user's password | Timeout ~15 min</text>
  </g>
  
  <!-- step4: /etc/sudoers Configuration -->
  <g class="step" id="step4" data-narration="The /etc/sudoers file configures sudo access permissions for users and groups. Always use the visudo command to safely edit it with syntax checking.">
    <rect x="30" y="342" width="740" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="364" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. /etc/sudoers Configuration</text>
    <text x="50" y="386" font-family="Arial" font-size="10" fill="#333">Edit safely with:</text>
    <rect x="150" y="378" width="80" height="20" rx="3" fill="#9c27b0"/>
    <text x="190" y="392" text-anchor="middle" font-family="monospace" font-size="11" fill="white">visudo</text>
    <text x="240" y="392" font-family="Arial" font-size="9" fill="#555">validates syntax</text>
    <text x="50" y="415" font-family="Arial" font-size="10" fill="#333">Entry format:</text>
    <rect x="130" y="407" width="340" height="20" rx="3" fill="#9c27b0"/>
    <text x="300" y="421" text-anchor="middle" font-family="monospace" font-size="10" fill="white">username ALL=(ALL:ALL) ALL</text>
    <rect x="480" y="407" width="160" height="20" rx="3" fill="#9c27b0"/>
    <text x="560" y="421" text-anchor="middle" font-family="monospace" font-size="9" fill="white">%group ALL=(ALL) ALL</text>
  </g>
  
  <!-- step5: su vs sudo Comparison -->
  <g class="step" id="step5" data-narration="su requires root password while sudo uses the user's own password. sudo provides better security through logging, audit trails, and configurable timeout periods.">
    <rect x="30" y="445" width="740" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="467" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. su vs sudo Comparison</text>
    <rect x="50" y="480" width="90" height="45" rx="3" fill="#f5f5f5" stroke="#f44336" stroke-width="1"/>
    <text x="95" y="493" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#333">Aspect</text>
    <text x="95" y="508" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Password</text>
    <text x="95" y="520" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Security</text>
    
    <rect x="140" y="480" width="150" height="45" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="215" y="493" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">su</text>
    <text x="215" y="508" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Root password</text>
    <text x="215" y="520" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Less secure</text>
    
    <rect x="290" y="480" width="150" height="45" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="365" y="493" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">sudo</text>
    <text x="365" y="508" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">User password</text>
    <text x="365" y="520" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">More secure</text>
    
    <text x="450" y="493" font-family="Arial" font-size="9" fill="#333">Logging:</text>
    <text x="450" y="508" font-family="Arial" font-size="8" fill="#666">su limited | sudo auth.log</text>
    <text x="450" y="520" font-family="Arial" font-size="8" fill="#666">Timeout: no | 15 min</text>
  </g>
  
  <!-- step6: Best Practices -->
  <g class="step" id="step6" data-narration="Always use visudo to edit sudoers, remember prompt changes from dollar to hash for root, and prefer sudo in production for better security and audit trails.">
    <rect x="30" y="538" width="740" height="58" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="560" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">6. Best Practices &amp; Security</text>
    
    <rect x="50" y="572" width="90" height="20" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="95" y="586" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">$ = user</text>
    
    <rect x="150" y="572" width="90" height="20" rx="4" fill="#ff9800"/>
    <text x="195" y="586" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white"># = root</text>
    
    <rect x="250" y="572" width="120" height="20" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="310" y="586" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">ALWAYS use visudo</text>
    
    <rect x="380" y="572" width="100" height="20" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="430" y="586" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Prefer sudo</text>
    
    <text x="490" y="586" font-family="Arial" font-size="9" fill="#666">Root UID=0 | visudo edits /etc/sudoers</text>
  </g>
</svg>