<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning printf in C programming. This function displays formatted output and is essential for displaying program results today.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">printf() in C Programming</text>
  </g>
  
  <g class="step" id="step1" data-narration="printf has syntax: printf format string comma arguments. It returns character count printed. The format string contains text and format specifiers.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Basic Syntax</text>
    <rect x="40" y="88" width="340" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="103" font-family="Courier New" font-size="10" fill="#333">printf("format", arg1, arg2...);</text>
    <text x="50" y="118" font-family="Arial" font-size="9" fill="#666">Returns: int (characters printed)</text>
    <rect x="400" y="88" width="360" height="42" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="410" y="103" font-family="Courier New" font-size="10" fill="#333">int printf(const char *format, ...);</text>
    <text x="410" y="118" font-family="Arial" font-size="9" fill="#666">Function prototype from stdio.h</text>
  </g>
  
  <g class="step" id="step2" data-narration="Format specifiers define output types: percent d for integer, f for float, c for character, s for string, x for hexadecimal.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Format Specifiers</text>
    <rect x="40" y="176" width="130" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="50" y="190" font-family="Courier New" font-size="10" fill="#333">%d or %i → int</text>
    <text x="50" y="205" font-family="Courier New" font-size="10" fill="#333">%f → float/double</text>
    <rect x="180" y="176" width="130" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="190" y="190" font-family="Courier New" font-size="10" fill="#333">%c → char</text>
    <text x="190" y="205" font-family="Courier New" font-size="10" fill="#333">%s → string</text>
    <rect x="320" y="176" width="130" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="330" y="190" font-family="Courier New" font-size="10" fill="#333">%x → hex lower</text>
    <text x="330" y="205" font-family="Courier New" font-size="10" fill="#333">%X → hex upper</text>
    <rect x="460" y="176" width="130" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="470" y="190" font-family="Courier New" font-size="10" fill="#333">%o → octal</text>
    <text x="470" y="205" font-family="Courier New" font-size="10" fill="#333">%% → literal %</text>
    <rect x="600" y="176" width="160" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="610" y="190" font-family="Courier New" font-size="10" fill="#333">%p → pointer</text>
    <text x="610" y="205" font-family="Courier New" font-size="10" fill="#333">%u → unsigned</text>
  </g>
  
  <g class="step" id="step3" data-narration="Escape sequences start with backslash: n for newline, t for tab, backslash double quote for literal quotes in your output.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Escape Sequences</text>
    <rect x="40" y="264" width="100" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="50" y="280" font-family="Courier New" font-size="10" fill="#333">\n → newline</text>
    <text x="50" y="295" font-family="Courier New" font-size="10" fill="#333">\t → tab</text>
    <rect x="150" y="264" width="100" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="160" y="280" font-family="Courier New" font-size="10" fill="#333">\\ → backslash</text>
    <text x="160" y="295" font-family="Courier New" font-size="10" fill="#333">\" → dbl quote</text>
    <rect x="260" y="264" width="100" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="270" y="280" font-family="Courier New" font-size="10" fill="#333">\' → single quote</text>
    <text x="270" y="295" font-family="Courier New" font-size="10" fill="#333">\a → alert</text>
    <rect x="370" y="264" width="100" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="380" y="280" font-family="Courier New" font-size="10" fill="#333">\r → return</text>
    <text x="380" y="295" font-family="Courier New" font-size="10" fill="#333">\b → backspace</text>
    <rect x="500" y="264" width="260" height="42" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="510" y="280" font-family="Courier New" font-size="10" fill="#333">printf("Name: %s\nAge: %d", "Amit", 20);</text>
    <text x="510" y="295" font-family="Arial" font-size="9" fill="#666">Output: Name: Amit (newline) Age: 20</text>
  </g>
  
  <g class="step" id="step4" data-narration="Field width sets minimum characters. Precision controls decimal places for floats and character limit for strings in C programming language.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Field Width and Precision</text>
    <rect x="40" y="352" width="200" height="42" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="368" font-family="Courier New" font-size="10" fill="#333">%5d → 5 char width</text>
    <text x="50" y="383" font-family="Courier New" font-size="10" fill="#333">%10.2f → w:10 p:2</text>
    <rect x="250" y="352" width="200" height="42" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="260" y="368" font-family="Courier New" font-size="10" fill="#333">%.3f → 3 decimals</text>
    <text x="260" y="383" font-family="Courier New" font-size="10" fill="#333">%.5s → 5 chars max</text>
    <rect x="500" y="352" width="260" height="42" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="510" y="368" font-family="Courier New" font-size="10" fill="#333">printf("%10.2f", 3.14);</text>
    <text x="510" y="383" font-family="Arial" font-size="9" fill="#666">Output: _______3.14 (7 spaces + 3.14)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Flags modify output: minus for left-justify, plus shows sign, zero pads with zeros, space adds leading space for positive numbers.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Flags and Modifiers</text>
    <rect x="40" y="440" width="120" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="456" font-family="Courier New" font-size="10" fill="#333">%-5d → left-justify</text>
    <text x="50" y="471" font-family="Courier New" font-size="10" fill="#333">%+d → show +sign</text>
    <rect x="170" y="440" width="120" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="180" y="456" font-family="Courier New" font-size="10" fill="#333">%05d → zero-pad</text>
    <text x="180" y="471" font-family="Courier New" font-size="10" fill="#333">% d → space sign</text>
    <rect x="340" y="440" width="420" height="42" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="350" y="456" font-family="Courier New" font-size="10" fill="#333">printf("%+d | %-5d | %05d", 42, 42, 42);</text>
    <text x="350" y="471" font-family="Arial" font-size="9" fill="#666">Output: +42 | 42___ | 00042</text>
  </g>
  
  <g class="step" id="step6" data-narration="Common mistakes to avoid: using wrong format specifier causes undefined behavior. Remember percent f for float in printf not scanf.">
    <rect x="20" y="498" width="760" height="90" fill="#ffebee" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips and Common Mistakes</text>
    <rect x="40" y="528" width="340" height="52" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="544" font-family="Arial" font-size="10" font-weight="bold" fill="#d32f2f">Common Mistakes:</text>
    <text x="50" y="558" font-family="Courier New" font-size="9" fill="#333">✗ %d for float (use %f)</text>
    <text x="50" y="570" font-family="Courier New" font-size="9" fill="#333">✗ Forgetting \n for newlines</text>
    <text x="200" y="558" font-family="Courier New" font-size="9" fill="#333">✗ No stdio.h header</text>
    <rect x="400" y="528" width="360" height="52" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="410" y="544" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Key Remember:</text>
    <text x="410" y="558" font-family="Courier New" font-size="9" fill="#333">printf returns count of characters printed</text>
    <text x="410" y="570" font-family="Courier New" font-size="9" fill="#333">Specifiers must match argument data types</text>
  </g>
</svg>