<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The type command is a built-in shell command that reveals what a command actually is - an alias, function, built-in, or external file.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">The Type Command in Linux</text>
  </g>
  
  <g class="step" id="step1" data-narration="Linux has four command types: built-ins are inside the shell like cd and echo, external commands are files in /bin or /usr/bin, aliases are shortcuts, and functions are user-defined code blocks.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Four Types of Commands in Linux Shell</text>
    <rect x="40" y="95" width="165" height="40" fill="#1976d2" rx="4"/>
    <text x="122" y="113" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Built-in</text>
    <text x="122" y="127" text-anchor="middle" font-family="Arial" font-size="9" fill="white">cd, echo, pwd</text>
    <rect x="215" y="95" width="165" height="40" fill="#388e3c" rx="4"/>
    <text x="297" y="113" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">External</text>
    <text x="297" y="127" text-anchor="middle" font-family="Arial" font-size="9" fill="white">ls, cp, grep</text>
    <rect x="390" y="95" width="165" height="40" fill="#ff9800" rx="4"/>
    <text x="472" y="113" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Alias</text>
    <text x="472" y="127" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Shortcuts</text>
    <rect x="565" y="95" width="165" height="40" fill="#9c27b0" rx="4"/>
    <text x="647" y="113" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Function</text>
    <text x="647" y="127" text-anchor="middle" font-family="Arial" font-size="9" fill="white">User code</text>
  </g>
  
  <g class="step" id="step2" data-narration="The type command syntax is type followed by options. Use -t for single words, -a for all locations, -p for external paths, and -P to force PATH searches.">
    <rect x="20" y="151" width="760" height="75" fill="#e8f5e9" stroke="#388e3c" rx="8"/>
    <text x="40" y="173" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Syntax: type [options] command_name</text>
    <rect x="40" y="188" width="100" height="30" fill="#388e3c" rx="4"/>
    <text x="90" y="207" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">-t</text>
    <text x="150" y="207" font-family="Arial" font-size="10" fill="#333">Single word</text>
    <rect x="210" y="188" width="100" height="30" fill="#388e3c" rx="4"/>
    <text x="260" y="207" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">-a</text>
    <text x="320" y="207" font-family="Arial" font-size="10" fill="#333">All locations</text>
    <rect x="380" y="188" width="100" height="30" fill="#388e3c" rx="4"/>
    <text x="430" y="207" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">-p</text>
    <text x="490" y="207" font-family="Arial" font-size="10" fill="#333">External path</text>
    <rect x="550" y="188" width="100" height="30" fill="#388e3c" rx="4"/>
    <text x="600" y="207" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">-P</text>
    <text x="660" y="207" font-family="Arial" font-size="10" fill="#333">Force PATH</text>
  </g>
  
  <g class="step" id="step3" data-narration="When you type a command, the shell checks in order: first aliases, then functions, then built-ins, and finally searches PATH for external executables.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Command Resolution Order</text>
    <rect x="40" y="270" width="130" height="38" fill="#ff9800" rx="4"/>
    <text x="105" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">1. Alias</text>
    <line x1="170" y1="289" x2="185" y2="289" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="190" y="270" width="130" height="38" fill="#9c27b0" rx="4"/>
    <text x="255" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">2. Function</text>
    <line x1="320" y1="289" x2="335" y2="289" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="340" y="270" width="130" height="38" fill="#1976d2" rx="4"/>
    <text x="405" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">3. Built-in</text>
    <line x1="470" y1="289" x2="485" y2="289" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="490" y="270" width="130" height="38" fill="#388e3c" rx="4"/>
    <text x="555" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">4. External</text>
    <text x="555" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="white">PATH search</text>
  </g>
  
  <g class="step" id="step4" data-narration="Use type -t for single word output (file, alias, function, builtin), type -a for all locations, and type -p to show only external command paths from PATH.">
    <rect x="20" y="322" width="760" height="85" fill="#ffebee" stroke="#f44336" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Type Command Examples</text>
    <text x="40" y="365" font-family="Arial" font-size="10" fill="#333" font-family="monospace">$ type -t ls</text>
    <text x="120" y="365" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">file</text>
    <text x="200" y="365" font-family="Arial" font-size="10" fill="#333" font-family="monospace">$ type -t cd</text>
    <text x="280" y="365" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">builtin</text>
    <text x="380" y="365" font-family="Arial" font-size="10" fill="#333" font-family="monospace">$ type -a ls</text>
    <text x="470" y="365" font-family="Arial" font-size="10" fill="#333">ls is /bin/ls</text>
    <text x="40" y="385" font-family="Arial" font-size="10" fill="#333" font-family="monospace">$ type -p grep</text>
    <text x="130" y="385" font-family="Arial" font-size="10" fill="#388e3c">/usr/bin/grep</text>
    <text x="260" y="385" font-family="Arial" font-size="10" fill="#333" font-family="monospace">$ type -p cd</text>
    <text x="350" y="385" font-family="Arial" font-size="10" fill="#666">(empty - builtin)</text>
    <rect x="500" y="355" width="270" height="45" fill="#f44336" rx="4"/>
    <text x="635" y="375" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">-P Forces PATH Search</text>
    <text x="635" y="390" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Error if not found in PATH</text>
  </g>
  
  <g class="step" id="step5" data-narration="Use type -P to force the shell to search PATH even for built-in commands. This is useful for finding if a built-in command also has an external version available.">
    <rect x="20" y="415" width="760" height="85" fill="#f3e5f5" stroke="#9c27b0" rx="8"/>
    <text x="40" y="437" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Key Differences: -p vs -P</text>
    <rect x="40" y="455" width="340" height="38" fill="#e1bee7" rx="4"/>
    <text x="60" y="472" font-family="Arial" font-size="10" fill="#333" font-family="monospace">type -p cd</text>
    <text x="180" y="472" font-family="Arial" font-size="10" fill="#666">(returns nothing for builtins)</text>
    <rect x="390" y="455" width="380" height="38" fill="#9c27b0" rx="4"/>
    <text x="410" y="472" font-family="Arial" font-size="10" fill="white" font-family="monospace">type -P cd</text>
    <text x="560" y="472" font-family="Arial" font-size="10" fill="white">(searches PATH even for builtins)</text>
    <text x="400" y="495" font-family="Arial" font-size="10" fill="#666">Use -P to check if an external version exists alongside a builtin</text>
  </g>
</svg>