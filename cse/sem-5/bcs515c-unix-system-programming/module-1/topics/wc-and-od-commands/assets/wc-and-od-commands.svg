<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to this tutorial on the WC and OD commands, two essential Linux utilities for file analysis, data counting, and binary content examination.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">WC and OD Commands in Linux</text>
  </g>
  
  <!-- step1: WC Introduction -->
  <g class="step" id="step1" data-narration="The wc command counts lines, words, characters, and bytes in files. Its syntax is wc option filename, and it supports multiple files at once.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">WC Command (Word Count)</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Syntax: wc [OPTION]... [FILE]...</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">Counts: lines (-l), words (-w), characters (-m), bytes (-c), max line length (-L)</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">Without options: lines words chars bytes filename</text>
  </g>
  
  <!-- step2: WC and OD Examples (side-by-side) -->
  <g class="step" id="step2" data-narration="WC examples use -l for lines and -w for words. OD examples show hex dump with od -A x -t x1 and character view with od -t c.">
    <rect x="20" y="151" width="760" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="171" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">WC Examples</text>
    <text x="40" y="188" font-family="Courier" font-size="9" fill="#333">wc -l notes.txt    → 42 notes.txt</text>
    <text x="40" y="200" font-family="Courier" font-size="9" fill="#333">wc -w notes.txt    → 287 notes.txt</text>
    <text x="40" y="212" font-family="Courier" font-size="9" fill="#333">wc notes.txt       → 42 287 1654 1654</text>
    <text x="40" y="224" font-family="Courier" font-size="9" fill="#333">ls -1 | wc -l      → count files in dir</text>
    <text x="420" y="171" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">OD Examples</text>
    <text x="420" y="188" font-family="Courier" font-size="9" fill="#333">od -A x -t x1 file.bin  → hex dump</text>
    <text x="420" y="200" font-family="Courier" font-size="9" fill="#333">od -t c textfile       → char view</text>
    <text x="420" y="212" font-family="Courier" font-size="9" fill="#333">od -A n -t x1 -N 16   → magic bytes</text>
    <text x="420" y="224" font-family="Courier" font-size="9" fill="#333">od -A d -t d1 -j 16   → decimal dump</text>
    <text x="420" y="236" font-family="Courier" font-size="9" fill="#333">od -A n -t x1 -N 16 image.jpg → ff d8 ff e0...</text>
    <text x="420" y="248" font-family="Courier" font-size="9" fill="#333">Essential for binary files & magic numbers</text>
  </g>
  
  <!-- step3: OD Introduction -->
  <g class="step" id="step3" data-narration="The od command dumps file contents in octal, decimal, hex, or character format. Essential for examining binary files and identifying file types via magic numbers.">
    <rect x="20" y="279" width="760" height="70" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="299" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">OD Command (Octal Dump)</text>
    <text x="40" y="316" font-family="Arial" font-size="10" fill="#333">Syntax: od [OPTION]... [FILE]... Dumps raw binary data in octal/decimal/hex/char formats</text>
    <text x="40" y="330" font-family="Arial" font-size="10" fill="#333">Options: -A (address base), -t (type: d/o/x/c), -j (skip bytes), -N (limit bytes)</text>
  </g>
  
  <!-- step4: Exam Tips -->
  <g class="step" id="step4" data-narration="Remember these key points: wc output order is lines-words-chars-bytes. OD defaults to octal format. Use pipes for both commands.">
    <rect x="20" y="357" width="760" height="70" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="377" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Exam Tips &amp; Summary</text>
    <text x="40" y="394" font-family="Arial" font-size="10" fill="#333">• WC output order: lines → words → characters → bytes → filename</text>
    <text x="40" y="408" font-family="Arial" font-size="10" fill="#333">• OD defaults to octal; use -A x -t x1 for hexadecimal output</text>
    <text x="40" y="422" font-family="Arial" font-size="10" fill="#333">• Both support standard input via pipes: cat file | wc -l</text>
  </g>
  
  <!-- step5: Common Mistakes -->
  <g class="step" id="step5" data-narration="Avoid common errors: don't confuse -m (Unicode characters) with -c (raw bytes). Remember OD defaults to octal format.">
    <rect x="20" y="435" width="760" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="455" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Common Mistakes to Avoid</text>
    <text x="40" y="472" font-family="Arial" font-size="10" fill="#333">• -m counts characters (Unicode), -c counts raw bytes (differ in multi-byte encoding)</text>
    <text x="40" y="486" font-family="Arial" font-size="10" fill="#333">• OD defaults to octal; specify -t x for hex output</text>
  </g>
</svg>