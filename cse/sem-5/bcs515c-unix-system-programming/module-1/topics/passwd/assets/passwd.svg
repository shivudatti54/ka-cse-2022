<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Password Management in Linux. This topic covers the /etc/passwd file, password security mechanisms, and user authentication fundamentals in Unix systems.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Password Management in Linux/Unix Systems</text>
  </g>
  
  <g class="step" id="step1" data-narration="The /etc/passwd file contains fundamental user account information in Linux systems. Format: username:password:UID:GID:GECOS:home:shell. Password field shows 'x' indicating shadow password usage.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">/etc/passwd File Structure</text>
    <text x="25" y="92" font-family="monospace" font-size="10" fill="#333">username:password:UID:GID:GECOS:home_directory:shell</text>
    <rect x="25" y="100" width="90" height="18" fill="#1976d2" rx="2"/>
    <text x="70" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">john</text>
    <rect x="120" y="100" width="40" height="18" fill="#388e3c" rx="2"/>
    <text x="140" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">x</text>
    <rect x="165" y="100" width="50" height="18" fill="#ff9800" rx="2"/>
    <text x="190" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">1001</text>
    <rect x="220" y="100" width="50" height="18" fill="#9c27b0" rx="2"/>
    <text x="245" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">1001</text>
    <rect x="275" y="100" width="120" height="18" fill="#f44336" rx="2"/>
    <text x="335" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">John Smith</text>
    <rect x="400" y="100" width="100" height="18" fill="#1976d2" rx="2"/>
    <text x="450" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">/home/john</text>
    <rect x="505" y="100" width="70" height="18" fill="#388e3c" rx="2"/>
    <text x="540" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">/bin/bash</text>
  </g>
  
  <g class="step" id="step2" data-narration="The /etc/shadow file stores encrypted passwords securely with 9 fields including hash values, expiration dates, warning periods, and password aging policies for system security.">
    <rect x="10" y="146" width="780" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">/etc/shadow File Structure</text>
    <text x="25" y="180" font-family="monospace" font-size="10" fill="#333">username:hash:last_change:min:max:warn:inactive:expire:reserved</text>
    <rect x="25" y="190" width="90" height="18" fill="#ff9800" rx="2"/>
    <text x="70" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">john</text>
    <rect x="120" y="190" width="150" height="18" fill="#f44336" rx="2"/>
    <text x="195" y="203" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffffff">$6$rounds=656000$...</text>
    <rect x="275" y="190" width="50" height="18" fill="#1976d2" rx="2"/>
    <text x="300" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">19000</text>
    <rect x="330" y="190" width="40" height="18" fill="#388e3c" rx="2"/>
    <text x="350" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">1</text>
    <rect x="375" y="190" width="40" height="18" fill="#9c27b0" rx="2"/>
    <text x="395" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">90</text>
    <rect x="420" y="190" width="40" height="18" fill="#ff9800" rx="2"/>
    <text x="440" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">7</text>
    <rect x="465" y="190" width="40" height="18" fill="#e3f2fd" rx="2"/>
    <text x="485" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">-1</text>
    <rect x="510" y="190" width="50" height="18" fill="#e8f5e9" rx="2"/>
    <text x="535" y="203" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Never</text>
  </g>
  
  <g class="step" id="step3" data-narration="Linux systems use password hashing algorithms identified by unique prefixes: $1$ for MD5, $2a$ for Blowfish, $5$ for SHA-256, and $6$ for SHA-512 encryption standards.">
    <rect x="10" y="234" width="780" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Password Hashing Algorithms</text>
    <rect x="25" y="262" width="170" height="45" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="110" y="277" text-anchor="middle" font-family="monospace" font-size="11" fill="#f44336">$1$</text>
    <text x="110" y="292" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">MD5</text>
    <text x="110" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Legacy)</text>
    <rect x="205" y="262" width="170" height="45" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="290" y="277" text-anchor="middle" font-family="monospace" font-size="11" fill="#9c27b0">$2a$</text>
    <text x="290" y="292" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Blowfish</text>
    <text x="290" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Secure)</text>
    <rect x="385" y="262" width="170" height="45" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="470" y="277" text-anchor="middle" font-family="monospace" font-size="11" fill="#1976d2">$5$</text>
    <text x="470" y="292" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">SHA-256</text>
    <text x="470" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Recommended)</text>
    <rect x="565" y="262" width="170" height="45" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="650" y="277" text-anchor="middle" font-family="monospace" font-size="11" fill="#388e3c">$6$</text>
    <text x="650" y="292" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">SHA-512</text>
    <text x="650" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Most Secure)</text>
  </g>
  
  <g class="step" id="step4" data-narration="The passwd command manages user passwords in Linux. Use passwd alone to change your password, or passwd username as root. Key options include -l to lock, -u to unlock, -x for max days, -n for min days.">
    <rect x="10" y="322" width="780" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">passwd Command Usage</text>
    <rect x="25" y="352" width="230" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="140" y="367" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">passwd</text>
    <text x="140" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Change own password</text>
    <rect x="265" y="352" width="230" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="380" y="367" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">passwd -l username</text>
    <text x="380" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Lock user account</text>
    <rect x="505" y="352" width="230" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="620" y="367" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">passwd -x 90 user</text>
    <text x="620" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Set 90 day max validity</text>
    <rect x="25" y="398" width="230" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="140" y="413" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">passwd -u username</text>
    <text x="140" y="428" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Unlock user account</text>
    <rect x="265" y="398" width="230" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="380" y="413" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">passwd -d username</text>
    <text x="380" y="428" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Delete user password</text>
    <rect x="505" y="398" width="230" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="620" y="413" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">passwd -n 7 user</text>
    <text x="620" y="428" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Set 7 day minimum age</text>
  </g>
  
  <g class="step" id="step5" data-narration="User login authentication in Linux follows five key steps: the user enters credentials, the system looks up the username in /etc/passwd, retrieves the hash from /etc/shadow, hashes the input password with the same salt, then compares hashes to verify identity.">
    <rect x="10" y="450" width="780" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="25" y="467" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">User Authentication Process</text>
    <rect x="25" y="480" width="100" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="75" y="495" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1. User</text>
    <text x="75" y="510" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Enter Login</text>
    <line x1="125" y1="500" x2="150" y2="500" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="155" y="480" width="120" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="215" y="495" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2. Lookup</text>
    <text x="215" y="510" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">/etc/passwd</text>
    <line x1="275" y1="500" x2="300" y2="500" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="305" y="480" width="130" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="370" y="495" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">3. Get Hash</text>
    <text x="370" y="510" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">from /etc/shadow</text>
    <line x1="435" y1="500" x2="460" y2="500" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="465" y="480" width="130" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="530" y="495" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">4. Hash Input</text>
    <text x="530" y="510" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">with same salt</text>
    <line x1="595" y1="500" x2="620" y2="500" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="625" y="480" width="100" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="675" y="495" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">5. Compare</text>
    <text x="675" y="510" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Match?</text>
    <line x1="725" y1="500" x2="750" y2="500" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="755" y="480" width="30" height="40" fill="#388e3c" rx="3"/>
    <text x="770" y="505" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffffff">OK</text>
  </g>
</svg>