<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="The River Algorithm is a scan-line based polygon filling technique in computer graphics that processes one horizontal line at a time.">
    <rect x="0" y="0" width="800" height="48" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">River Algorithm in Computer Graphics</text>
  </g>
  
  <!-- Step 1: Core Concept -->
  <g class="step" id="step1" data-narration="The algorithm uses scan-line conversion, processing each horizontal line across the polygon. It calculates where scan lines intersect polygon edges.">
    <rect x="20" y="58" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Scan-Line Conversion</text>
    <rect x="40" y="95" width="80" height="35" fill="#e3f2fd" rx="3"/>
    <text x="80" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Scan Line</text>
    <text x="80" y="124" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">y = k</text>
    <line x1="50" y1="130" x2="250" y2="130" stroke="#1976d2" stroke-width="2"/>
    <polygon points="260,125 270,130 260,135" fill="#1976d2"/>
    <rect x="280" y="100" width="120" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="340" y="113" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Polygon</text>
    <text x="340" y="125" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Region</text>
  </g>
  
  <!-- Step 2: Data Structures -->
  <g class="step" id="step2" data-narration="Two main data structures are used: Edge Table stores edges sorted by minimum y-coordinate, and Active Edge List tracks current scan line intersections.">
    <rect x="20" y="151" width="760" height="85" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="173" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Edge Table and Active Edge List</text>
    <rect x="40" y="190" width="200" height="40" fill="#e8f5e9" rx="3"/>
    <text x="140" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Edge Table (ET)</text>
    <text x="140" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Bucket sorted by ymin</text>
    <polygon points="250,210 260,210 255,200" fill="#388e3c"/>
    <line x1="255" y1="200" x2="255" y2="220" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="280" y="190" width="200" height="40" fill="#e8f5e9" rx="3"/>
    <text x="380" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Active Edge List (AEL)</text>
    <text x="380" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Current scan line edges</text>
  </g>
  
  <!-- Step 3: Intersection Formula -->
  <g class="step" id="step3" data-narration="For each scan line, intersection x-coordinates are calculated using linear interpolation: x equals x1 plus y minus y1 times slope ratio.">
    <rect x="20" y="244" width="760" height="85" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="266" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Intersection Calculation</text>
    <rect x="40" y="280" width="300" height="45" fill="#fff3e0" rx="3"/>
    <text x="190" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Formula: x = x₁ + (y - y₁) ×</text>
    <text x="190" y="318" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">(x₂ - x₁)/(y₂ - y₁)</text>
    <rect x="360" y="285" width="120" height="35" fill="#f3e5f5" rx="3"/>
    <text x="420" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Slope = dx/dy</text>
    <text x="420" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Inverse slope = dy/dx</text>
  </g>
  
  <!-- Step 4: Fill Rules -->
  <g class="step" id="step4" data-narration="The algorithm applies the odd-even rule: starting from left, fill alternating segments between each pair of intersection points in order from left to right.">
    <rect x="20" y="337" width="760" height="85" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="359" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">4. Odd-Even Fill Rule</text>
    <line x1="50" y1="380" x2="450" y2="380" stroke="#f44336" stroke-width="3"/>
    <line x1="50" y1="370" x2="50" y2="390" stroke="#f44336" stroke-width="1"/>
    <line x1="450" y1="370" x2="450" y2="390" stroke="#f44336" stroke-width="1"/>
    <circle cx="150" cy="380" r="4" fill="#f44336"/>
    <circle cx="250" cy="380" r="4" fill="#f44336"/>
    <circle cx="350" cy="380" r="4" fill="#f44336"/>
    <rect x="155" y="375" width="90" height="10" fill="#f44336"/>
    <rect x="255" y="375" width="90" height="10" fill="#f44336"/>
    <text x="200" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">FILL</text>
    <text x="300" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">SKIP</text>
    <text x="400" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">FILL</text>
    <text x="550" y="365" font-family="Arial" font-size="9" fill="#666">Pairs: (x₁,x₂), (x₃,x₄), ...</text>
    <text x="550" y="380" font-family="Arial" font-size="9" fill="#666">Odd segments filled</text>
    <text x="550" y="395" font-family="Arial" font-size="9" fill="#666">Even segments empty</text>
  </g>
  
  <!-- Step 5: Algorithm Steps -->
  <g class="step" id="step5" data-narration="The algorithm follows: Build Edge Table, initialize Active Edge List, process each scan line, update x-coordinates, and remove completed edges.">
    <rect x="20" y="430" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="452" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">5. Algorithm Process</text>
    <rect x="40" y="465" width="130" height="45" fill="#e3f2fd" rx="3"/>
    <text x="105" y="480" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Step 1:</text>
    <text x="105" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Build Edge Table</text>
    <rect x="180" y="465" width="130" height="45" fill="#e8f5e9" rx="3"/>
    <text x="245" y="480" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Step 2:</text>
    <text x="245" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Init AEL</text>
    <rect x="320" y="465" width="130" height="45" fill="#fff3e0" rx="3"/>
    <text x="385" y="480" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Step 3:</text>
    <text x="385" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Process Scan Lines</text>
    <rect x="460" y="465" width="130" height="45" fill="#f3e5f5" rx="3"/>
    <text x="525" y="480" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Step 4:</text>
    <text x="525" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Update x + Sort</text>
    <rect x="600" y="465" width="130" height="45" fill="#ffebee" rx="3"/>
    <text x="665" y="480" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Step 5:</text>
    <text x="665" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Remove edges</text>
  </g>
  
  <!-- Step 6: Example -->
  <g class="step" id="step6" data-narration="For triangle vertices at (2,2), (8,2), (5,8): scan line y=4 intersects left edge at x=3.5, right edge at x=6.5, filling pixels 4 to 6.">
    <rect x="20" y="523" width="760" height="60" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="545" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">6. Example: Triangle at (2,2), (8,2), (5,8)</text>
    <text x="40" y="565" font-family="Arial" font-size="9" fill="#666">Scan line y=4: x-intersections = 3.5 and 6.5 | Fill x from 4 to 6 | Time: O(N + M)</text>
  </g>
</svg>