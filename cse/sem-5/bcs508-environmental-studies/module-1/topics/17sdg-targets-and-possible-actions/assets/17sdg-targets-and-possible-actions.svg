<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Sustainable Development Goals are 17 universal goals adopted by UN member states in 2015 as part of the 2030 Agenda for sustainable development.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Sustainable Development Goals (SDGs): Targets and Possible Actions</text>
  </g>
  
  <g class="step" id="step1" data-narration="SDGs address global challenges including poverty, inequality, climate change, environmental degradation, peace, and justice. They apply to all nations universally.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">What are SDGs?</text>
    <text x="40" y="94" font-family="Arial" font-size="10" fill="#333">17 universal goals adopted in 2015 as part of the 2030 Agenda</text>
    <text x="40" y="108" font-family="Arial" font-size="10" fill="#333">Address: Poverty, Inequality, Climate Change, Environmental Degradation</text>
    <text x="40" y="122" font-family="Arial" font-size="10" fill="#333">Key Difference from MDGs: SDGs are universal (apply to ALL nations)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Goals 1-9 cover: No Poverty, Zero Hunger, Health, Quality Education, Gender Equality, Clean Water, Affordable Clean Energy, Decent Work, and Industry/Infrastructure.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Goals 1-9 Overview</text>
    <text x="40" y="182" font-family="Arial" font-size="9" fill="#333">1-No Poverty  |  2-Zero Hunger  |  3-Good Health  |  4-Quality Education</text>
    <text x="40" y="196" font-family="Arial" font-size="9" fill="#333">5-Gender Equality  |  6-Clean Water  |  7-Affordable Clean Energy</text>
    <text x="40" y="210" font-family="Arial" font-size="9" fill="#333">8-Decent Work  |  9-Industry, Innovation, Infrastructure</text>
    <text x="520" y="182" font-family="Arial" font-size="9" fill="#d84315">Goal 9 most relevant for engineers</text>
    <text x="520" y="196" font-family="Arial" font-size="9" fill="#d84315">Focus: Infrastructure development</text>
    <text x="520" y="210" font-family="Arial" font-size="9" fill="#d84315">Technological advancement</text>
  </g>
  
  <g class="step" id="step3" data-narration="Goals 10-17 include: Reduced Inequalities, Sustainable Cities, Responsible Consumption, Climate Action, Life Below Water, Life on Land, Peace, and Partnerships.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Goals 10-17 Overview</text>
    <text x="40" y="270" font-family="Arial" font-size="9" fill="#333">10-Reduced Inequalities  |  11-Sustainable Cities  |  12-Responsible Consumption</text>
    <text x="40" y="284" font-family="Arial" font-size="9" fill="#333">13-Climate Action  |  14-Life Below Water  |  15-Life on Land</text>
    <text x="40" y="298" font-family="Arial" font-size="9" fill="#333">16-Peace, Justice  |  17-Partnerships for Goals</text>
    <text x="520" y="270" font-family="Arial" font-size="9" fill="#6a1b9a">All 17 goals are integrated</text>
    <text x="520" y="284" font-family="Arial" font-size="9" fill="#6a1b9a">169 targets total across goals</text>
    <text x="520" y="298" font-family="Arial" font-size="9" fill="#6a1b9a">Actions in one affect others</text>
  </g>
  
  <g class="step" id="step4" data-narration="Engineers can contribute through technical design, sustainable practices, research development, community engagement, and policy advocacy for achieving sustainable development outcomes across all sectors.">
    <rect x="20" y="322" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Possible Actions for Engineers</text>
    <rect x="40" y="352" width="170" height="42" fill="#bbdefb" rx="3"/>
    <text x="50" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Technical Contributions</text>
    <text x="50" y="380" font-family="Arial" font-size="8" fill="#333">Sustainable infrastructure,</text>
    <text x="50" y="392" font-family="Arial" font-size="8" fill="#333">Renewable energy, Water tech</text>
    <rect x="220" y="352" width="170" height="42" fill="#c8e6c9" rx="3"/>
    <text x="230" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Professional Practices</text>
    <text x="230" y="380" font-family="Arial" font-size="8" fill="#333">Green building standards,</text>
    <text x="230" y="392" font-family="Arial" font-size="8" fill="#333">Eco-friendly materials</text>
    <rect x="400" y="352" width="170" height="42" fill="#ffe0b2" rx="3"/>
    <text x="410" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Research &amp; Development</text>
    <text x="410" y="380" font-family="Arial" font-size="8" fill="#333">Sustainable technologies,</text>
    <text x="410" y="392" font-family="Arial" font-size="8" fill="#333">Clean energy solutions</text>
  </g>
  
  <g class="step" id="step5" data-narration="For Goal 6 (Clean Water), engineers design treatment plants, filtration systems, and community water management solutions that also support Health and reduced inequalities.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example: Engineering for Clean Water (Goal 6)</text>
    <text x="40" y="448" font-family="Arial" font-size="9" fill="#333">• Implement appropriate technology for local water sources</text>
    <text x="40" y="462" font-family="Arial" font-size="9" fill="#333">• Design cost-effective filtration systems for low-income communities</text>
    <text x="40" y="476" font-family="Arial" font-size="9" fill="#333">• Plan sustainable maintenance and community water management</text>
    <text x="400" y="448" font-family="Arial" font-size="9" fill="#2e7d32">Also addresses: Goal 3 (Health),</text>
    <text x="400" y="462" font-family="Arial" font-size="9" fill="#2e7d32">Goal 10 (Reduced Inequalities),</text>
    <text x="400" y="476" font-family="Arial" font-size="9" fill="#2e7d32">Goal 17 (Partnerships)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam points: Memorize all 17 SDGs, understand their integration, focus on Goals 7, 9, 11, 12, 13 for engineering, remember 2030 deadline.">
    <rect x="20" y="498" width="760" height="85" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips &amp; Key Points</text>
    <rect x="40" y="528" width="140" height="48" fill="#ffcdd2" rx="3"/>
    <text x="48" y="542" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Memorize All 17 SDGs</text>
    <text x="48" y="556" font-family="Arial" font-size="7" fill="#333">Order and numbers important</text>
    <text x="48" y="568" font-family="Arial" font-size="7" fill="#333">UNIVERSAL for all nations</text>
    <rect x="190" y="528" width="140" height="48" fill="#ffcdd2" rx="3"/>
    <text x="198" y="542" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Understand Integration</text>
    <text x="198" y="556" font-family="Arial" font-size="7" fill="#333">One action impacts</text>
    <text x="198" y="568" font-family="Arial" font-size="7" fill="#333">multiple goals</text>
    <rect x="340" y="528" width="140" height="48" fill="#ffcdd2" rx="3"/>
    <text x="348" y="542" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Engineering Focus</text>
    <text x="348" y="556" font-family="Arial" font-size="7" fill="#333">Goals 7, 9, 11, 12, 13</text>
    <text x="348" y="568" font-family="Arial" font-size="7" fill="#333">Most relevant for exams</text>
    <rect x="490" y="528" width="140" height="48" fill="#ffcdd2" rx="3"/>
    <text x="498" y="542" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">MDGs vs SDGs</text>
    <text x="498" y="556" font-family="Arial" font-size="7" fill="#333">MDGs: developing only</text>
    <text x="498" y="568" font-family="Arial" font-size="7" fill="#333">SDGs: universal (all)</text>
    <rect x="640" y="528" width="130" height="48" fill="#ffcdd2" rx="3"/>
    <text x="648" y="542" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Deadline: 2030</text>
    <text x="648" y="556" font-family="Arial" font-size="7" fill="#333">169 targets across</text>
    <text x="648" y="568" font-family="Arial" font-size="7" fill="#333">all 17 goals</text>
  </g>
</svg>