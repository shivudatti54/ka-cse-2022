<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the topic of Sustainability. We will explore the three pillars, global frameworks, green computing practices, and sustainable development goals for engineers.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Sustainability in Engineering</text>
  </g>
  
  <g class="step" id="step1" data-narration="Sustainability means meeting present needs without compromising future generations' ability to meet their own needs. The Brundtland Commission defined this in 1987.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">Definition &amp; Origin</text>
    <text x="40" y="98" font-family="Arial" font-size="10" fill="#333">Sustainability: Meeting present needs without compromising</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">future generations' ability to meet theirs.</text>
    <text x="40" y="130" font-family="Arial" font-size="9" fill="#666">Brundtland Commission (WCED) - 1987</text>
  </g>
  
  <g class="step" id="step2" data-narration="The three pillars of sustainability are Economic viability, Environmental protection, and Social responsibility. All three work together for true sustainability.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">Three Pillars of Sustainability</text>
    <rect x="40" y="180" width="220" height="38" fill="#c8e6c9" rx="4"/>
    <text x="150" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Economic</text>
    <text x="150" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Profitable operations</text>
    <text x="150" y="222" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Long-term value</text>
    <rect x="270" y="180" width="220" height="38" fill="#bbdefb" rx="4"/>
    <text x="380" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Environmental</text>
    <text x="380" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Resource conservation</text>
    <text x="380" y="222" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Reduce emissions</text>
    <rect x="500" y="180" width="220" height="38" fill="#ffe0b2" rx="4"/>
    <text x="610" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">Social</text>
    <text x="610" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Human well-being</text>
    <text x="610" y="222" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Equity &amp; justice</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Triple Bottom Line framework measures success across People, Planet, and Profit. It creates comprehensive performance evaluation beyond financial returns.">
    <rect x="20" y="234" width="760" height="101" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="12" fill="#e65100" font-weight="bold">Triple Bottom Line (3P Framework)</text>
    <circle cx="150" cy="295" r="35" fill="#ffcc80"/>
    <text x="150" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">People</text>
    <text x="150" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Social Impact</text>
    <circle cx="280" cy="295" r="35" fill="#a5d6a7"/>
    <text x="280" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Planet</text>
    <text x="280" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Environmental</text>
    <circle cx="410" cy="295" r="35" fill="#90caf9"/>
    <text x="410" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Profit</text>
    <text x="410" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Financial Returns</text>
    <line x1="500" y1="295" x2="750" y2="295" stroke="#e65100" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
    <text x="510" y="285" font-family="Arial" font-size="9" fill="#333">Sustainable Business</text>
    <text x="510" y="300" font-family="Arial" font-size="8" fill="#666">Long-term value creation</text>
  </g>
  
  <g class="step" id="step4" data-narration="Green Computing reduces IT environmental impact through virtual machines, power management, cloud resource optimization, and proper electronic waste recycling and disposal procedures.">
    <rect x="20" y="343" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="365" font-family="Arial" font-size="12" fill="#7b1fa2" font-weight="bold">Green Computing Practices</text>
    <rect x="40" y="379" width="170" height="38" fill="#e1bee7" rx="4"/>
    <text x="125" y="393" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a" font-weight="bold">Virtualization</text>
    <text x="125" y="409" text-anchor="middle" font-family="Arial" font-size="7" fill="#7b1fa2">Server consolidation</text>
    <rect x="220" y="379" width="170" height="38" fill="#d1c4e9" rx="4"/>
    <text x="305" y="393" text-anchor="middle" font-family="Arial" font-size="9" fill="#4527a0" font-weight="bold">Cloud Computing</text>
    <text x="305" y="409" text-anchor="middle" font-family="Arial" font-size="7" fill="#5e35b1">Maximize utilization</text>
    <rect x="400" y="379" width="170" height="38" fill="#c5cae9" rx="4"/>
    <text x="485" y="393" text-anchor="middle" font-family="Arial" font-size="9" fill="#283593" font-weight="bold">Energy Efficiency</text>
    <text x="485" y="409" text-anchor="middle" font-family="Arial" font-size="7" fill="#3949ab">Low-power hardware</text>
    <rect x="580" y="379" width="180" height="38" fill="#b2dfdb" rx="4"/>
    <text x="670" y="393" text-anchor="middle" font-family="Arial" font-size="9" fill="#00695c" font-weight="bold">E-Waste Management</text>
    <text x="670" y="409" text-anchor="middle" font-family="Arial" font-size="7" fill="#00796b">Recycling &amp; disposal</text>
  </g>
  
  <g class="step" id="step5" data-narration="The UN adopted 17 Sustainable Development Goals in 2015 to address global challenges including poverty, climate action, and responsible consumption.">
    <rect x="20" y="431" width="760" height="89" fill="#e0f2f1" rx="8"/>
    <text x="40" y="453" font-family="Arial" font-size="12" fill="#00695c" font-weight="bold">UN Sustainable Development Goals (17 SDGs - 2015)</text>
    <rect x="40" y="469" width="100" height="35" fill="#81c784" rx="3"/>
    <text x="90" y="484" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20" font-weight="bold">No Poverty</text>
    <text x="90" y="498" text-anchor="middle" font-family="Arial" font-size="6" fill="#2e7d32">Goal 1</text>
    <rect x="150" y="469" width="100" height="35" fill="#4fc3f7" rx="3"/>
    <text x="200" y="484" text-anchor="middle" font-family="Arial" font-size="8" fill="#01579b" font-weight="bold">Clean Energy</text>
    <text x="200" y="498" text-anchor="middle" font-family="Arial" font-size="6" fill="#0277bd">Goal 7</text>
    <rect x="260" y="469" width="100" height="35" fill="#ffb74d" rx="3"/>
    <text x="310" y="484" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">Climate Action</text>
    <text x="310" y="498" text-anchor="middle" font-family="Arial" font-size="6" fill="#ef6c00">Goal 13</text>
    <rect x="370" y="469" width="100" height="35" fill="#ba68c8" rx="3"/>
    <text x="420" y="484" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c" font-weight="bold">Life on Land</text>
    <text x="420" y="498" text-anchor="middle" font-family="Arial" font-size="6" fill="#6a1b9a">Goal 15</text>
    <rect x="480" y="469" width="100" height="35" fill="#4db6ac" rx="3"/>
    <text x="530" y="484" text-anchor="middle" font-family="Arial" font-size="8" fill="#004d40" font-weight="bold">Partnerships</text>
    <text x="530" y="498" text-anchor="middle" font-family="Arial" font-size="6" fill="#00695c">Goal 17</text>
    <text x="600" y="486" font-family="Arial" font-size="9" fill="#333">Key goals for tech:</text>
    <text x="600" y="501" font-family="Arial" font-size="8" fill="#666">Goal 9: Industry &amp; Innovation</text>
    <text x="600" y="513" font-family="Arial" font-size="8" fill="#666">Goal 12: Responsible Consumption</text>
  </g>
  
  <g class="step" id="step6" data-narration="Software optimization reduces energy: 30% server reduction saves 7,884 MWh yearly, cutting 5,518 tonnes CO2 and saving ₹39.4 million annually.">
    <rect x="20" y="528" width="760" height="60" fill="#e8eaf6" rx="8"/>
    <text x="40" y="550" font-family="Arial" font-size="12" fill="#303f9f" font-weight="bold">Energy &amp; Carbon Savings: 30% Server Optimization</text>
    <text x="40" y="570" font-family="Arial" font-size="10" fill="#333">Original: 26,280 MWh/year → Optimized: 18,396 MWh/year</text>
    <text x="40" y="585" font-family="Arial" font-size="9" fill="#2e7d32">Savings: ₹39.4 million/year | 5,518 tonnes CO2 reduced</text>
  </g>
</svg>