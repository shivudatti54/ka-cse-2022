<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Introduction to wetlands as transitional ecosystems between land and water, covering 6 percent of Earth's surface with huge ecological importance.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Wetlands: Essential Ecosystems</text>
  </g>
  
  <g class="step" id="step1" data-narration="Wetlands are lands where water covers soil permanently or seasonally. The Ramsar Convention 1971 defines them as areas with static or flowing water, fresh, brackish, or salt.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Definition &amp; Ramsar Convention</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Wetlands: transitional zones with water-saturated soils</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">Ramsar 1971: areas of marsh, fen, peatland or water</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">Three key characteristics: hydrology, hydrophytic vegetation, hydric soils</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three main types: Inland wetlands like freshwater marshes and swamps, Coastal wetlands including mangroves and salt marshes, and Human-made wetlands such as reservoirs and rice fields.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Types of Wetlands</text>
    <rect x="40" y="180" width="230" height="35" rx="4" fill="#c8e6c9"/>
    <text x="50" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Inland</text>
    <text x="50" y="208" font-family="Arial" font-size="9" fill="#333">Marshes, swamps, bogs, floodplains</text>
    <rect x="285" y="180" width="230" height="35" rx="4" fill="#c8e6c9"/>
    <text x="295" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Coastal</text>
    <text x="295" y="208" font-family="Arial" font-size="9" fill="#333">Mangroves, salt marshes, tidal flats</text>
    <rect x="530" y="180" width="230" height="35" rx="4" fill="#c8e6c9"/>
    <text x="540" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Human-made</text>
    <text x="540" y="208" font-family="Arial" font-size="9" fill="#333">Reservoirs, ponds, rice fields</text>
  </g>
  
  <g class="step" id="step3" data-narration="Key ecological functions include water filtration, flood control, groundwater recharge, carbon sequestration in peatlands, and providing vital habitat for diverse biodiversity.">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">Ecological Functions</text>
    <rect x="40" y="268" width="145" height="35" rx="4" fill="#ffe0b2"/>
    <text x="50" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Water Filtration</text>
    <text x="50" y="295" font-family="Arial" font-size="8" fill="#333">Traps sediments, absorbs</text>
    <rect x="195" y="268" width="145" height="35" rx="4" fill="#ffe0b2"/>
    <text x="205" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Flood Control</text>
    <text x="205" y="295" font-family="Arial" font-size="8" fill="#333">Natural sponges, absorb</text>
    <rect x="350" y="268" width="145" height="35" rx="4" fill="#ffe0b2"/>
    <text x="360" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Groundwater</text>
    <text x="360" y="295" font-family="Arial" font-size="8" fill="#333">Facilitates aquifer</text>
    <rect x="505" y="268" width="145" height="35" rx="4" fill="#ffe0b2"/>
    <text x="515" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Carbon Sequestration</text>
    <text x="515" y="295" font-family="Arial" font-size="8" fill="#333">Peat stores carbon</text>
    <rect x="660" y="268" width="110" height="35" rx="4" fill="#ffe0b2"/>
    <text x="670" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Habitat</text>
    <text x="670" y="295" font-family="Arial" font-size="8" fill="#333">Supports biodiversity</text>
  </g>
  
  <g class="step" id="step4" data-narration="Wetlands provide significant economic value through diverse fishery resources, forest products, tourism opportunities, and supporting agriculture in fertile floodplain regions.">
    <rect x="20" y="322" width="760" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2">Economic Values</text>
    <rect x="40" y="356" width="175" height="35" rx="4" fill="#e1bee7"/>
    <text x="50" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Fishery Resources</text>
    <text x="50" y="383" font-family="Arial" font-size="9" fill="#333">Breeding grounds for fish</text>
    <rect x="225" y="356" width="175" height="35" rx="4" fill="#e1bee7"/>
    <text x="235" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Forest Products</text>
    <text x="235" y="383" font-family="Arial" font-size="9" fill="#333">Timber, fuelwood, medicines</text>
    <rect x="410" y="356" width="175" height="35" rx="4" fill="#e1bee7"/>
    <text x="420" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Tourism</text>
    <text x="420" y="383" font-family="Arial" font-size="9" fill="#333">Ecotourism and recreation</text>
    <rect x="595" y="356" width="175" height="35" rx="4" fill="#e1bee7"/>
    <text x="605" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Agriculture</text>
    <text x="605" y="383" font-family="Arial" font-size="9" fill="#333">Fertile floodplain soil</text>
  </g>
  
  <g class="step" id="step5" data-narration="India has 75 Ramsar sites covering 1.33 million hectares, guided by the Wetlands Conservation and Management Rules 2017 and the National Wetland Conservation Programme.">
    <rect x="20" y="410" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Wetland Conservation in India</text>
    <rect x="40" y="444" width="220" height="35" rx="4" fill="#bbdefb"/>
    <text x="50" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Ramsar Sites</text>
    <text x="50" y="471" font-family="Arial" font-size="9" fill="#333">75 sites, 1.33 million hectares</text>
    <rect x="270" y="444" width="220" height="35" rx="4" fill="#bbdefb"/>
    <text x="280" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Legislation</text>
    <text x="280" y="471" font-family="Arial" font-size="9" fill="#333">Wetlands Rules 2017</text>
    <rect x="500" y="444" width="270" height="35" rx="4" fill="#bbdefb"/>
    <text x="510" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Key Examples</text>
    <text x="510" y="471" font-family="Arial" font-size="9" fill="#333">Chilika, Dal Lake, Bhitarkanika, Vembanad</text>
  </g>
  
  <g class="step" id="step6" data-narration="Major threats include habitat loss from drainage, pollution from industries, invasive species, climate change impacts, and over-exploitation of natural resources requiring urgent conservation.">
    <rect x="20" y="498" width="760" height="90" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">Threats to Wetlands</text>
    <rect x="40" y="532" width="140" height="45" rx="4" fill="#ffcdd2"/>
    <text x="50" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Habitat Loss</text>
    <text x="50" y="559" font-family="Arial" font-size="8" fill="#333">Drainage for agriculture,</text>
    <text x="50" y="570" font-family="Arial" font-size="8" fill="#333">urban development</text>
    <rect x="190" y="532" width="140" height="45" rx="4" fill="#ffcdd2"/>
    <text x="200" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Pollution</text>
    <text x="200" y="559" font-family="Arial" font-size="8" fill="#333">Industrial effluents,</text>
    <text x="200" y="570" font-family="Arial" font-size="8" fill="#333">agricultural runoff</text>
    <rect x="340" y="532" width="140" height="45" rx="4" fill="#ffcdd2"/>
    <text x="350" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Invasive Species</text>
    <text x="350" y="559" font-family="Arial" font-size="8" fill="#333">Competition from</text>
    <text x="350" y="570" font-family="Arial" font-size="8" fill="#333">non-native plants</text>
    <rect x="490" y="532" width="140" height="45" rx="4" fill="#ffcdd2"/>
    <text x="500" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Climate Change</text>
    <text x="500" y="559" font-family="Arial" font-size="8" fill="#333">Altered precipitation,</text>
    <text x="500" y="570" font-family="Arial" font-size="8" fill="#333">sea-level rise</text>
    <rect x="640" y="532" width="130" height="45" rx="4" fill="#ffcdd2"/>
    <text x="650" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Over-exploitation</text>
    <text x="650" y="559" font-family="Arial" font-size="8" fill="#333">Excessive fishing,</text>
    <text x="650" y="570" font-family="Arial" font-size="8" fill="#333">resource extraction</text>
  </g>
</svg>