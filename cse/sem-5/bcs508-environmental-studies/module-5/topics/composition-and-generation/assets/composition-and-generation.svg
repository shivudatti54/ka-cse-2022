<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers Context-Free Grammars: their formal definition, how they generate strings, and how to compose multiple grammars together effectively for parsing.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Composition and Generation of Context-Free Grammars</text>
  </g>
  
  <g class="step" id="step1" data-narration="A CFG is a 4-tuple G equals open parenthesis V comma T comma P comma S close parenthesis. V is variables, T is terminals, P is productions, S is start.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Formal Definition of CFG</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">A CFG is a 4-tuple G = (V, T, P, S) where:</text>
    <text x="50" y="118" font-family="Arial" font-size="10" fill="#555">V = variables (non-terminals)  •  T = terminals (alphabet)</text>
    <text x="50" y="132" font-family="Arial" font-size="10" fill="#555">P = production rules (A → α)  •  S ∈ V = start symbol</text>
  </g>
  
  <g class="step" id="step2" data-narration="The generation process shows how strings derive from the start symbol using production rules. One step uses arrow, multiple steps uses arrow star.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Generation Process</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#333">Strings are derived from S by applying production rules:</text>
    <text x="50" y="208" font-family="Arial" font-size="11" fill="#555">Example: S → aSb | ε generates "aabb"</text>
    <text x="50" y="222" font-family="Arial" font-size="10" fill="#666">S ⇒ aSb ⇒ aaSbb ⇒ aabb (⇒ one step, ⇒* zero or more)</text>
  </g>
  
  <g class="step" id="step3" data-narration="Leftmost derivation replaces the leftmost non-terminal each step, used in top-down parsing. Rightmost derivation replaces the rightmost, for bottom-up parsing.">
    <rect x="20" y="234" width="760" height="91" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Types of Derivations</text>
    <rect x="40" y="270" width="340" height="50" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="50" y="288" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Leftmost Derivation</text>
    <text x="50" y="304" font-family="Arial" font-size="10" fill="#555">Replace leftmost non-terminal</text>
    <text x="50" y="316" font-family="Arial" font-size="10" fill="#666">S ⇒ aSb ⇒ aaSbb ⇒ aabb</text>
    <rect x="420" y="270" width="340" height="50" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="430" y="288" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Rightmost Derivation</text>
    <text x="430" y="304" font-family="Arial" font-size="10" fill="#555">Replace rightmost non-terminal</text>
    <text x="430" y="316" font-family="Arial" font-size="10" fill="#666">S ⇒ aSb ⇒ aaSbb ⇒ aabb</text>
  </g>
  
  <g class="step" id="step4" data-narration="A parse tree shows derivation graphically. Internal nodes are non-terminals, leaves are terminals. In-order traversal of leaves gives the generated string.">
    <rect x="20" y="333" width="760" height="90" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="355" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Parse Trees</text>
    <text x="40" y="375" font-family="Arial" font-size="11" fill="#333">Tree: internal nodes = non-terminals, leaves = terminals</text>
    <text x="50" y="393" font-family="Arial" font-size="10" fill="#555">For "aabb": In-order traversal of leaves yields "aabb"</text>
    <rect x="40" y="405" width="80" height="15" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="2"/>
    <text x="80" y="416" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">S</text>
    <text x="48" y="416" font-family="Arial" font-size="8" fill="#555">a</text>
    <text x="112" y="416" font-family="Arial" font-size="8" fill="#555">b</text>
  </g>
  
  <g class="step" id="step5" data-narration="A grammar is ambiguous if one string has multiple parse trees. This is problematic in compilers since code would have multiple meanings for the same input.">
    <rect x="20" y="431" width="760" height="113" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="453" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Ambiguity in Grammars</text>
    <text x="40" y="473" font-family="Arial" font-size="11" fill="#333">Grammar is ambiguous if a string has two or more distinct parse trees:</text>
    <text x="50" y="493" font-family="Arial" font-size="10" fill="#555">Grammar: S → SS | aSb | ε</text>
    <text x="50" y="509" font-family="Arial" font-size="10" fill="#f44336">String "aabb" has two derivations:</text>
    <text x="60" y="525" font-family="Arial" font-size="9" fill="#666">Derivation 1: S ⇒ SS ⇒ aSbS ⇒ aabb</text>
    <text x="60" y="539" font-family="Arial" font-size="9" fill="#666">Derivation 2: S ⇒ aSb ⇒ aaSbb ⇒ aabb</text>
  </g>
  
  <g class="step" id="step6" data-narration="To compose grammars: union uses S arrow S1 or S2, concatenation uses S arrow S1 S2, Kleene star uses S arrow S1 S or epsilon.">
    <rect x="20" y="552" width="760" height="48" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="572" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Grammar Composition</text>
    <text x="40" y="590" font-family="Arial" font-size="11" fill="#333">Union: S→S1|S2 | Concatenation: S→S1S2 | Kleene*: S→S1S|ε</text>
  </g>
</svg>