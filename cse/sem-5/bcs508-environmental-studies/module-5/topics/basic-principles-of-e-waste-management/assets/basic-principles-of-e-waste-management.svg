<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Basic Principles of E-Waste Management. This topic covers the environmental challenge of managing discarded electronics in a sustainable manner.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Basic Principles of E-Waste Management</text>
  </g>

  <!-- step1: Introduction & Definition -->
  <g class="step" id="step1" data-narration="E-waste refers to discarded electrical and electronic equipment at end-of-life, including computers, phones, TVs, and appliances. India generates about 3.2 million tonnes annually.">
    <rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Introduction: What is E-Waste?</text>
    <rect x="30" y="82" width="740" height="50" fill="#f8f9fa" rx="3"/>
    <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">E-waste: Electrical and electronic equipment at end-of-life (computers, mobiles, TVs, appliances)</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">India generates ~3.2 million tonnes/year; only 20% formally recycled worldwide</text>
  </g>

  <!-- step2: Sources of E-Waste -->
  <g class="step" id="step2" data-narration="E-waste sources include households (appliances), commercial sector (offices, banks, hospitals), industrial (manufacturing equipment), institutional (schools), and agricultural sources like farming equipment.">
    <rect x="10" y="146" width="780" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="30" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Sources of E-Waste</text>
    <rect x="30" y="170" width="170" height="50" fill="#e8f5e9" rx="3"/>
    <text x="40" y="184" font-family="Arial" font-size="10" fill="#333">Household</text>
    <text x="40" y="198" font-family="Arial" font-size="9" fill="#666">Appliances, consumer electronics</text>
    <rect x="210" y="170" width="170" height="50" fill="#e8f5e9" rx="3"/>
    <text x="220" y="184" font-family="Arial" font-size="10" fill="#333">Commercial</text>
    <text x="220" y="198" font-family="Arial" font-size="9" fill="#666">Offices, banks, hospitals</text>
    <rect x="390" y="170" width="170" height="50" fill="#e8f5e9" rx="3"/>
    <text x="400" y="184" font-family="Arial" font-size="10" fill="#333">Industrial</text>
    <text x="400" y="198" font-family="Arial" font-size="9" fill="#666">Manufacturing equipment</text>
    <rect x="570" y="170" width="170" height="50" fill="#e8f5e9" rx="3"/>
    <text x="580" y="184" font-family="Arial" font-size="10" fill="#333">Institutional</text>
    <text x="580" y="198" font-family="Arial" font-size="9" fill="#666">Schools, government offices</text>
  </g>

  <!-- step3: Hazardous Components -->
  <g class="step" id="step3" data-narration="E-waste contains toxic substances: lead damages nerves, mercury harms kidneys, cadmium causes cancer, chromium leads to respiratory problems, and polybrominated flame retardants affect thyroid function.">
    <rect x="10" y="234" width="780" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="30" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">3. Hazardous Components in E-Waste</text>
    <rect x="30" y="258" width="140" height="50" fill="#ffebee" rx="3"/>
    <text x="40" y="272" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Lead (Pb)</text>
    <text x="40" y="286" font-family="Arial" font-size="9" fill="#333">CRTs, circuit boards</text>
    <text x="40" y="298" font-family="Arial" font-size="8" fill="#666">Neurological damage</text>
    <rect x="180" y="258" width="140" height="50" fill="#ffebee" rx="3"/>
    <text x="190" y="272" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Mercury (Hg)</text>
    <text x="190" y="286" font-family="Arial" font-size="9" fill="#333">Flat-panel displays</text>
    <text x="190" y="298" font-family="Arial" font-size="8" fill="#666">Kidney damage</text>
    <rect x="330" y="258" width="140" height="50" fill="#ffebee" rx="3"/>
    <text x="340" y="272" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Cadmium (Cd)</text>
    <text x="340" y="286" font-family="Arial" font-size="9" fill="#333">Batteries, switches</text>
    <text x="340" y="298" font-family="Arial" font-size="8" fill="#666">Carcinogen</text>
    <rect x="480" y="258" width="140" height="50" fill="#ffebee" rx="3"/>
    <text x="490" y="272" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Chromium (Cr6+)</text>
    <text x="490" y="286" font-family="Arial" font-size="9" fill="#333">Corrosion coating</text>
    <text x="490" y="298" font-family="Arial" font-size="8" fill="#666">DNA damage</text>
    <rect x="630" y="258" width="140" height="50" fill="#fff3e0" rx="3"/>
    <text x="640" y="272" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Valuable Metals</text>
    <text x="640" y="286" font-family="Arial" font-size="9" fill="#333">Au, Ag, Cu, Pd</text>
    <text x="640" y="298" font-family="Arial" font-size="8" fill="#666">Can be recovered</text>
  </g>

  <!-- step4: Management Hierarchy -->
  <g class="step" id="step4" data-narration="The waste hierarchy prioritises: Prevention (design longer products), Minimisation (reduce waste), Reuse (donate/refurbish), Recycling (recover materials), Energy recovery, and Disposal (last resort).">
    <rect x="10" y="322" width="780" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="30" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">4. E-Waste Management Hierarchy</text>
    <rect x="30" y="350" width="135" height="45" fill="#e3f2fd" rx="3"/>
    <text x="40" y="364" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">1. Prevention</text>
    <text x="40" y="378" font-family="Arial" font-size="8" fill="#333">Design durable products</text>
    <rect x="175" y="350" width="135" height="45" fill="#e8f5e9" rx="3"/>
    <text x="185" y="364" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">2. Minimisation</text>
    <text x="185" y="378" font-family="Arial" font-size="8" fill="#333">Reduce waste generation</text>
    <rect x="320" y="350" width="135" height="45" fill="#f3e5f5" rx="3"/>
    <text x="330" y="364" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">3. Reuse</text>
    <text x="330" y="378" font-family="Arial" font-size="8" fill="#333">Donate, refurbish</text>
    <rect x="465" y="350" width="135" height="45" fill="#fff3e0" rx="3"/>
    <text x="475" y="364" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">4. Recycling</text>
    <text x="475" y="378" font-family="Arial" font-size="8" fill="#333">Recover materials</text>
    <rect x="610" y="350" width="135" height="45" fill="#ffebee" rx="3"/>
    <text x="620" y="364" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">5. Disposal</text>
    <text x="620" y="378" font-family="Arial" font-size="8" fill="#333">Secure landfill only</text>
    <path d="M100 345 L100 352" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M245 345 L245 352" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M390 345 L390 352" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M535 345 L535 352" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="685" y="372" font-family="Arial" font-size="9" fill="#666">Most preferred</text>
    <text x="685" y="384" font-family="Arial" font-size="8" fill="#999">Least preferred</text>
  </g>

  <!-- step5: Collection, Transportation & Recycling -->
  <g class="step" id="step5" data-narration="Collection methods include designated centres and take-back systems. Transport requires proper packaging and documentation. Recycling involves dismantling, shredding, and material separation.">
    <rect x="10" y="410" width="780" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="30" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">5. Collection, Transportation & Recycling</text>
    <rect x="30" y="438" width="230" height="45" fill="#f3e5f5" rx="3"/>
    <text x="40" y="452" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Collection Methods</text>
    <text x="40" y="466" font-family="Arial" font-size="9" fill="#333">Collection centres, take-back</text>
    <text x="40" y="478" font-family="Arial" font-size="8" fill="#666">Municipal programs, retail drops</text>
    <rect x="270" y="438" width="230" height="45" fill="#f3e5f5" rx="3"/>
    <text x="280" y="452" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Transportation</text>
    <text x="280" y="466" font-family="Arial" font-size="9" fill="#333">Proper packaging, manifests</text>
    <text x="280" y="478" font-family="Arial" font-size="8" fill="#666">Authorised vehicles required</text>
    <rect x="510" y="438" width="250" height="45" fill="#f3e5f5" rx="3"/>
    <text x="520" y="452" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Recycling Process</text>
    <text x="520" y="466" font-family="Arial" font-size="9" fill="#333">Sort → Dismantle → Shred</text>
    <text x="520" y="478" font-family="Arial" font-size="8" fill="#666">Magnetic, eddy current, electrostatic separation</text>
  </g>

  <!-- step6: Regulatory Framework & Summary -->
  <g class="step" id="step6" data-narration="India's E-Waste Rules 2022 mandate 10% EPR target, authorised collection centres, and CPCB online compliance. Violations attract penalties under the regulatory framework.">
    <rect x="10" y="498" width="780" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Regulatory Framework: E-Waste Rules 2022 & Key Takeaways</text>
    <rect x="30" y="526" width="350" height="55" fill="#e3f2fd" rx="3"/>
    <text x="40" y="540" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">E-Waste (Management) Rules 2022</text>
    <text x="40" y="554" font-family="Arial" font-size="9" fill="#333">Extended Producer Responsibility (EPR): 10% target</text>
    <text x="40" y="568" font-family="Arial" font-size="9" fill="#333">Authorised collection centres mandatory</text>
    <text x="40" y="580" font-family="Arial" font-size="8" fill="#666">CPCB portal for online compliance</text>
    <rect x="390" y="526" width="370" height="55" fill="#e8f5e9" rx="3"/>
    <text x="400" y="540" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Key Takeaways</text>
    <text x="400" y="554" font-family="Arial" font-size="9" fill="#333">Never mix e-waste with municipal waste</text>
    <text x="400" y="568" font-family="Arial" font-size="9" fill="#333">Ensure data destruction before disposal</text>
    <text x="400" y="580" font-family="Arial" font-size="8" fill="#666">Use only authorised recyclers</text>
  </g>
</svg>