<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1750">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#388e3c"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1fa2"/>
      <stop offset="100%" style="stop-color:#6a1b9a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d32f2f"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00796b"/>
      <stop offset="100%" style="stop-color:#00695c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <style>
      @keyframes fadeInSlide {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes textReveal {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 1000; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes growBar {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      .step { animation: fadeInSlide 0.6s ease-out; }
      .step rect:first-child {
        animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center;
      }
      .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
      .draw-line {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: drawLine 1.5s ease-out forwards;
      }
      .grow-bar {
        transform-origin: left center;
        animation: growBar 1s ease-out forwards;
      }
    </style>
  </defs>
  
  <rect x="0" y="0" width="800" height="1750" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to E-Waste Management Rules 2022. These rules, notified on 2nd November 2022, represent India's comprehensive approach to managing electronic waste.">
    <rect x="50" y="20" width="700" height="50" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="50" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">E-Waste Management Rules 2022</text>
    <text x="400" y="70" font-family="Arial" font-size="11" fill="#e3f2fd" text-anchor="middle">Ministry of Environment, Forest and Climate Change</text>
  </g>
  
  <!-- Step 1: What is E-Waste -->
  <g class="step" id="step1" data-narration="E-waste refers to discarded electrical or electronic devices like computers, phones, and televisions that have reached end of useful life.">
    <rect x="50" y="85" width="340" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="85" width="8" height="85" rx="4" fill="url(#greenGrad)"/>
    <text x="70" y="110" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is E-Waste?</text>
    <text x="70" y="130" font-family="Arial" font-size="10" fill="#333">Electrical and electronic equipment</text>
    <text x="70" y="145" font-family="Arial" font-size="10" fill="#333">including components, consumables,</text>
    <text x="70" y="160" font-family="Arial" font-size="10" fill="#333">parts and spares that become obsolete.</text>
    <rect x="300" y="100" width="30" height="35" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <rect x="335" y="110" width="25" height="25" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <rect x="365" y="120" width="15" height="15" rx="2" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  </g>
  
  <!-- Step 2: India Context -->
  <g class="step" id="step2" data-narration="India generates approximately 1.7 million tonnes of e-waste annually, ranking among the top five e-waste generating countries globally.">
    <rect x="410" y="85" width="340" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="410" y="85" width="8" height="85" rx="4" fill="url(#orangeGrad)"/>
    <text x="430" y="110" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">India's E-Waste Scenario</text>
    <text x="430" y="130" font-family="Arial" font-size="11" fill="#333">1.7 million tonnes/year</text>
    <text x="430" y="147" font-family="Arial" font-size="11" fill="#333">Top 5 globally in generation</text>
    <text x="430" y="164" font-family="Arial" font-size="10" fill="#666">Rapid tech advancement + consumption</text>
    <rect x="620" y="110" width="100" height="8" rx="2" fill="#eee"/>
    <rect x="620" y="110" width="80" height="8" rx="2" fill="url(#orangeGrad)" class="grow-bar"/>
    <text x="620" y="135" font-family="Arial" font-size="9" fill="#666">India's Share</text>
  </g>
  
  <!-- Step 3: Scope and Applicability -->
  <g class="step" id="step3" data-narration="The rules apply to producers, manufacturers, refurbishers, dismantlers, and recyclers. They cover 21 categories of electrical and electronic equipment.">
    <rect x="50" y="185" width="700" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="185" width="8" height="85" rx="4" fill="url(#purpleGrad)"/>
    <text x="70" y="210" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">Scope and Applicability</text>
    <rect x="70" y="225" width="90" height="30" rx="4" fill="#f3e5f5"/>
    <text x="115" y="242" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">IT and Telecom</text>
    <rect x="170" y="225" width="90" height="30" rx="4" fill="#f3e5f5"/>
    <text x="215" y="242" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">Consumer EEE</text>
    <rect x="270" y="225" width="90" height="30" rx="4" fill="#f3e5f5"/>
    <text x="315" y="242" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">Lamps</text>
    <rect x="370" y="225" width="90" height="30" rx="4" fill="#f3e5f5"/>
    <text x="415" y="242" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">Medical Devices</text>
    <rect x="470" y="225" width="90" height="30" rx="4" fill="#f3e5f5"/>
    <text x="515" y="242" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">plus 16 more...</text>
    <text x="70" y="270" font-family="Arial" font-size="10" fill="#666">Applies to: Producers, Manufacturers, Refurbishers, Dismantlers, Recyclers</text>
  </g>
  
  <!-- Step 4: EPR - Core Concept -->
  <g class="step" id="step4" data-narration="Extended Producer Responsibility (EPR) is the cornerstone of these rules. Producers are accountable for collecting and recycling a specified percentage of their products at end-of-life.">
    <rect x="50" y="285" width="700" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="285" width="8" height="95" rx="4" fill="url(#blueGrad)"/>
    <text x="70" y="310" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Extended Producer Responsibility (EPR) - THE CORE CONCEPT</text>
    <g transform="translate(100, 330)">
      <rect x="0" y="0" width="80" height="35" rx="5" fill="url(#blueGrad)"/>
      <text x="40" y="22" font-family="Arial" font-size="10" fill="white" text-anchor="middle">PRODUCER</text>
      <path d="M85,17 L115,17" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
      <rect x="120" y="0" width="80" height="35" rx="5" fill="url(#orangeGrad)"/>
      <text x="160" y="22" font-family="Arial" font-size="10" fill="white" text-anchor="middle">COLLECTION</text>
      <path d="M205,17 L235,17" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
      <rect x="240" y="0" width="80" height="35" rx="5" fill="url(#greenGrad)"/>
      <text x="280" y="22" font-family="Arial" font-size="10" fill="white" text-anchor="middle">RECYCLER</text>
      <path d="M280,45 Q280,60 200,60 Q120,60 120,45" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" class="draw-line"/>
      <text x="200" y="75" font-family="Arial" font-size="9" fill="#388e3c" text-anchor="middle">Environmentally Sound</text>
    </g>
  </g>
  
  <!-- Step 5: Collection Targets -->
  <g class="step" id="step5" data-narration="Progressive collection targets: Year 1 - 60%, Year 2 - 70%, Year 3 onwards - 80% of EEE placed in market.">
    <rect x="50" y="395" width="700" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="395" width="8" height="95" rx="4" fill="url(#tealGrad)"/>
    <text x="70" y="420" font-family="Arial" font-size="14" font-weight="bold" fill="#00796b">Collection Targets (Progressive)</text>
    <rect x="80" y="440" width="160" height="35" rx="6" fill="#e0f2f1" stroke="#00796b" stroke-width="2"/>
    <text x="160" y="458" font-family="Arial" font-size="11" fill="#00796b" text-anchor="middle">YEAR 1</text>
    <text x="160" y="473" font-family="Arial" font-size="16" font-weight="bold" fill="#00796b" text-anchor="middle">60%</text>
    <rect x="260" y="440" width="160" height="35" rx="6" fill="#e0f2f1" stroke="#00796b" stroke-width="2"/>
    <text x="340" y="458" font-family="Arial" font-size="11" fill="#00796b" text-anchor="middle">YEAR 2</text>
    <text x="340" y="473" font-family="Arial" font-size="16" font-weight="bold" fill="#00796b" text-anchor="middle">70%</text>
    <rect x="440" y="440" width="160" height="35" rx="6" fill="#e0f2f1" stroke="#00796b" stroke-width="2"/>
    <text x="520" y="458" font-family="Arial" font-size="11" fill="#00796b" text-anchor="middle">YEAR 3 plus</text>
    <text x="520" y="473" font-family="Arial" font-size="16" font-weight="bold" fill="#00796b" text-anchor="middle">80%</text>
    <text x="620" y="455" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Based on EEE</text>
    <text x="620" y="470" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">placed in market</text>
    <text x="620" y="485" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">previous year</text>
  </g>
  
  <!-- Step 6: Producer Responsibilities -->
  <g class="step" id="step6" data-narration="Producers must register on CPCB portal, create collection mechanisms, prepare Producer Responsibility Plan, achieve targets, and label products with E-waste Mark.">
    <rect x="50" y="505" width="340" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="505" width="8" height="95" rx="4" fill="url(#blueGrad)"/>
    <text x="70" y="530" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Producer Responsibilities</text>
    <g transform="translate(70, 545)">
      <circle cx="8" cy="5" r="4" fill="#1976d2"/>
      <text x="20" y="9" font-family="Arial" font-size="9" fill="#333">Register on CPCB portal</text>
      <circle cx="8" cy="22" r="4" fill="#1976d2"/>
      <text x="20" y="26" font-family="Arial" font-size="9" fill="#333">Prepare Producer Responsibility Plan</text>
      <circle cx="8" cy="39" r="4" fill="#1976d2"/>
      <text x="20" y="43" font-family="Arial" font-size="9" fill="#333">Set up collection mechanisms</text>
      <circle cx="8" cy="56" r="4" fill="#1976d2"/>
      <text x="20" y="60" font-family="Arial" font-size="9" fill="#333">Achieve collection targets</text>
      <circle cx="8" cy="73" r="4" fill="#1976d2"/>
      <text x="20" y="77" font-family="Arial" font-size="9" fill="#333">Label products with E-waste Mark</text>
      <circle cx="8" cy="90" r="4" fill="#1976d2"/>
      <text x="20" y="94" font-family="Arial" font-size="9" fill="#333">File annual returns by April 30</text>
    </g>
  </g>
  
  <!-- Step 7: Consumer Responsibilities -->
  <g class="step" id="step7" data-narration="Consumers must dispose e-waste only through authorized collection centers. Disposal in municipal bins is PROHIBITED with penalties for violations.">
    <rect x="410" y="505" width="340" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="410" y="505" width="8" height="95" rx="4" fill="url(#redGrad)"/>
    <text x="430" y="530" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Consumer Responsibilities</text>
    <g transform="translate(430, 545)">
      <rect x="0" y="0" width="30" height="25" rx="4" fill="#ffebee"/>
      <text x="15" y="17" font-family="Arial" font-size="16" fill="#4caf50" text-anchor="middle">Y</text>
      <text x="40" y="17" font-family="Arial" font-size="9" fill="#333">Use authorized collection centers</text>
      <rect x="0" y="30" width="30" height="25" rx="4" fill="#ffebee"/>
      <text x="15" y="47" font-family="Arial" font-size="16" fill="#4caf50" text-anchor="middle">Y</text>
      <text x="40" y="47" font-family="Arial" font-size="9" fill="#333">Use producer take-back schemes</text>
      <rect x="0" y="60" width="30" height="25" rx="4" fill="#ffebee"/>
      <text x="15" y="77" font-family="Arial" font-size="16" fill="#f44336" text-anchor="middle">N</text>
      <text x="40" y="77" font-family="Arial" font-size="9" fill="#c62828">NOT in municipal bins</text>
    </g>
    <rect x="610" y="555" width="120" height="35" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
    <text x="670" y="573" font-family="Arial" font-size="9" fill="#c62828" text-anchor="middle">PENALTY for</text>
    <text x="670" y="587" font-family="Arial" font-size="9" fill="#c62828" text-anchor="middle">violations under EPA</text>
  </g>
  
  <!-- Step 8: Recycler and Refurbisher -->
  <g class="step" id="step8" data-narration="Recyclers must obtain EPR authorization from CPCB and follow environmentally sound practices. Refurbishers need SPCB authorization.">
    <rect x="50" y="615" width="700" height="75" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="615" width="8" height="75" rx="4" fill="url(#greenGrad)"/>
    <text x="70" y="640" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Recycler and Refurbisher Responsibilities</text>
    <rect x="80" y="660" width="310" height="20" rx="4" fill="#e8f5e9"/>
    <text x="235" y="674" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">RECYCLERS: EPR Authorization from CPCB, Environmentally sound processing</text>
    <rect x="410" y="660" width="320" height="20" rx="4" fill="#e8f5e9"/>
    <text x="570" y="674" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">REFURBISHERS: SPCB Authorization, Must meet safety standards</text>
  </g>
  
  <!-- Step 9: Collection Mechanisms -->
  <g class="step" id="step9" data-narration="Five collection methods: Direct collection, dealer collection, designated centers, producer return points, and buy-back schemes.">
    <rect x="50" y="705" width="700" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="705" width="8" height="85" rx="4" fill="url(#orangeGrad)"/>
    <text x="70" y="730" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">E-Waste Collection Mechanisms</text>
    <g transform="translate(80, 750)">
      <rect x="0" y="0" width="110" height="25" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="55" y="17" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">Direct Collection</text>
      <rect x="120" y="0" width="110" height="25" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="175" y="17" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">Authorized Dealers</text>
      <rect x="240" y="0" width="110" height="25" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="295" y="17" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">Collection Centers</text>
      <rect x="360" y="0" width="110" height="25" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="415" y="17" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">Return Points</text>
      <rect x="480" y="0" width="110" height="25" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="535" y="17" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">Buy-back Schemes</text>
    </g>
  </g>
</svg>