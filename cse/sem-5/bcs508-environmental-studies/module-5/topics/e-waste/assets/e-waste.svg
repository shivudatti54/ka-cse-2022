<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to the E-Waste Management lesson for engineering students. We'll explore what e-waste is, its impacts, and how to manage it properly.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">E-Waste Management</text>
  </g>
  
  <!-- step1: Definition -->
  <g class="step" id="step1" data-narration="E-waste means discarded electrical and electronic devices at end-of-life, like computers, phones, and TVs. India generates about 1.7 million tonnes annually.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is E-Waste?</text>
    <text x="40" y="98" font-family="Arial" font-size="10" fill="#333">Discarded electrical/electronic devices at end-of-life: computers, mobiles, TVs, refrigerators.</text>
    <text x="40" y="116" font-family="Arial" font-size="10" fill="#333">India generates ~1.7 million tonnes annually. One of the fastest-growing waste streams globally.</text>
  </g>
  
  <!-- step2: Sources and Categories -->
  <g class="step" id="step2" data-narration="E-waste comes from households, businesses, industries, and healthcare facilities. Main categories include ICT equipment, consumer electronics, and office equipment for proper categorization.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Sources and Categories</text>
    <rect x="40" y="180" width="220" height="38" fill="#c8e6c9" rx="4"/>
    <text x="50" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">ICT Equipment</text>
    <text x="50" y="208" font-family="Arial" font-size="8" fill="#333">Computers, laptops, mobiles, routers</text>
    <rect x="270" y="180" width="220" height="38" fill="#c8e6c9" rx="4"/>
    <text x="280" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Consumer Electronics</text>
    <text x="280" y="208" font-family="Arial" font-size="8" fill="#333">TVs, audio systems, cameras</text>
    <rect x="500" y="180" width="260" height="38" fill="#c8e6c9" rx="4"/>
    <text x="510" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Office Equipment</text>
    <text x="510" y="208" font-family="Arial" font-size="8" fill="#333">Printers, scanners, photocopiers</text>
  </g>
  
  <!-- step3: Composition -->
  <g class="step" id="step3" data-narration="E-waste contains valuable recyclable materials like copper, gold, and silver, plus hazardous substances: lead, mercury, cadmium, and chromium that require special handling.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Composition of E-Waste</text>
    <rect x="40" y="268" width="230" height="38" fill="#ffe0b2" rx="4"/>
    <text x="50" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Valuable Materials</text>
    <text x="50" y="296" font-family="Arial" font-size="8" fill="#333">Copper, gold, silver, aluminum, platinum</text>
    <rect x="280" y="268" width="230" height="38" fill="#ffcdd2" rx="4"/>
    <text x="290" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Hazardous Materials</text>
    <text x="290" y="296" font-family="Arial" font-size="8" fill="#333">Lead (CRT), Mercury (switches), Cadmium (batteries), Chromium</text>
    <rect x="520" y="268" width="240" height="38" fill="#e1bee7" rx="4"/>
    <text x="530" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Other Components</text>
    <text x="530" y="296" font-family="Arial" font-size="8" fill="#333">Plastic (ABS, PVC), Glass (CRT, LCD)</text>
  </g>
  
  <!-- step4: Environmental and Health Impacts -->
  <g class="step" id="step4" data-narration="Improper e-waste disposal causes severe environmental damage including soil contamination, water pollution, air pollution, and serious health problems including cancer, neurological damage, and kidney failure.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Environmental and Health Impacts</text>
    <rect x="40" y="356" width="170" height="38" fill="#ffcdd2" rx="4"/>
    <text x="50" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Soil Contamination</text>
    <text x="50" y="384" font-family="Arial" font-size="8" fill="#333">Hazardous substances leach into soil</text>
    <rect x="220" y="356" width="170" height="38" fill="#bbdefb" rx="4"/>
    <text x="230" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Water Pollution</text>
    <text x="230" y="384" font-family="Arial" font-size="8" fill="#333">Toxins enter water bodies</text>
    <rect x="400" y="356" width="170" height="38" fill="#ffe0b2" rx="4"/>
    <text x="410" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Air Pollution</text>
    <text x="410" y="384" font-family="Arial" font-size="8" fill="#333">Open burning releases toxic fumes</text>
    <rect x="580" y="356" width="180" height="38" fill="#f8bbd0" rx="4"/>
    <text x="590" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#880e4f">Health Hazards</text>
    <text x="590" y="384" font-family="Arial" font-size="8" fill="#333">Cancer, neurological damage, kidney failure</text>
  </g>
  
  <!-- step5: Management Hierarchy -->
  <g class="step" id="step5" data-narration="Follow the waste management hierarchy: first source reduction, then reuse, followed by recycling, and finally safe disposal at authorized treatment facilities to minimize environmental impact.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">E-Waste Management Hierarchy</text>
    <rect x="40" y="444" width="165" height="40" fill="#bbdefb" rx="4"/>
    <text x="50" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">1. Source Reduction</text>
    <text x="50" y="472" font-family="Arial" font-size="8" fill="#333">Design longer-life products</text>
    <rect x="215" y="444" width="165" height="40" fill="#c8e6c9" rx="4"/>
    <text x="225" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">2. Reuse</text>
    <text x="225" y="472" font-family="Arial" font-size="8" fill="#333">Repair, refurbish, donate</text>
    <rect x="390" y="444" width="165" height="40" fill="#fff9c4" rx="4"/>
    <text x="400" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#f9a825">3. Recycling</text>
    <text x="400" y="472" font-family="Arial" font-size="8" fill="#333">Recover valuable materials</text>
    <rect x="565" y="444" width="195" height="40" fill="#ffcdd2" rx="4"/>
    <text x="575" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">4. Safe Disposal</text>
    <text x="575" y="472" font-family="Arial" font-size="8" fill="#333">Authorized treatment facilities</text>
  </g>
  
  <!-- step6: EPR and Rules 2022 -->
  <g class="step" id="step6" data-narration="E-Waste Rules 2022 mandate Extended Producer Responsibility requiring producers to finance collection, meet mandatory recycling targets, and register with central pollution control authorities.">
    <rect x="20" y="498" width="760" height="90" fill="#f3e5f5" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">E-Waste (Management) Rules 2022 and EPR</text>
    <rect x="40" y="532" width="345" height="48" fill="#e1bee7" rx="4"/>
    <text x="50" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Extended Producer Responsibility (EPR)</text>
    <text x="50" y="560" font-family="Arial" font-size="8" fill="#333">Producers finance collection and recycling of their products</text>
    <text x="50" y="572" font-family="Arial" font-size="8" fill="#333">Establish take-back systems and meet collection targets</text>
    <rect x="400" y="532" width="360" height="48" fill="#d1c4e9" rx="4"/>
    <text x="410" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#4527a0">Key Provisions</text>
    <text x="410" y="560" font-family="Arial" font-size="8" fill="#333">Producer registration mandatory; specific recycling targets mandated</text>
    <text x="410" y="572" font-family="Arial" font-size="8" fill="#333">Import of e-waste prohibited except for re-export</text>
  </g>
</svg>