<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="This topic covers noise pollution: unwanted sounds causing harm to health, wildlife, and property, with regulatory standards and control measures.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Noise Pollution: Sources, Effects, and Control</text>
  </g>

  <!-- Step 1: What is Noise Pollution -->
  <g class="step" id="step1" data-narration="Noise pollution is unwanted sound exceeding 55 dB that disrupts activities, causes annoyance, or damages health according to WHO guidelines.">
    <rect x="30" y="58" width="740" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="50" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">What is Noise Pollution?</text>
    <rect x="50" y="88" width="220" height="40" rx="3" fill="#c8e6c9"/>
    <text x="60" y="103" font-family="Arial" font-size="9" fill="#2e7d32">Unwanted/harmful sound</text>
    <text x="60" y="116" font-family="Arial" font-size="8" fill="#2e7d32">Exceeds 55 dB (WHO)</text>
    <rect x="280" y="88" width="220" height="40" rx="3" fill="#c8e6c9"/>
    <text x="290" y="103" font-family="Arial" font-size="9" fill="#2e7d32">Affects human health</text>
    <text x="290" y="116" font-family="Arial" font-size="8" fill="#2e7d32">Wildlife &amp; property</text>
    <rect x="510" y="88" width="240" height="40" rx="3" fill="#c8e6c9"/>
    <text x="520" y="103" font-family="Arial" font-size="9" fill="#2e7d32">Mechanical vibration</text>
    <text x="520" y="116" font-family="Arial" font-size="8" fill="#2e7d32">Propagates as longitudinal waves</text>
  </g>

  <!-- Step 2: Nature of Sound -->
  <g class="step" id="step2" data-narration="Sound has four key properties: frequency ranging from 20-20,000 Hz, wavelength calculated as lambda equals velocity over frequency, amplitude determining loudness, and speed of approximately 343 m/s in air.">
    <rect x="30" y="146" width="740" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Nature of Sound - Key Properties</text>
    <rect x="50" y="180" width="165" height="36" rx="3" fill="#bbdefb"/>
    <text x="60" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Frequency (f)</text>
    <text x="60" y="207" font-family="Arial" font-size="8" fill="#1565c0">20-20,000 Hz</text>
    <rect x="225" y="180" width="165" height="36" rx="3" fill="#bbdefb"/>
    <text x="235" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Wavelength (λ)</text>
    <text x="235" y="207" font-family="Arial" font-size="8" fill="#1565c0">λ = v/f</text>
    <rect x="400" y="180" width="165" height="36" rx="3" fill="#bbdefb"/>
    <text x="410" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Amplitude</text>
    <text x="410" y="207" font-family="Arial" font-size="8" fill="#1565c0">Determines loudness</text>
    <rect x="575" y="180" width="175" height="36" rx="3" fill="#bbdefb"/>
    <text x="585" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Speed of Sound</text>
    <text x="585" y="207" font-family="Arial" font-size="8" fill="#1565c0">~343 m/s in air</text>
  </g>

  <!-- Step 3: Sources of Noise -->
  <g class="step" id="step3" data-narration="Major sources of noise pollution include road traffic creating 85-90 dB, aircraft producing 120+ dB, industrial machinery generating 75-110 dB, construction equipment at 80-100 dB, and commercial activities.">
    <rect x="30" y="234" width="740" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="50" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Sources of Noise Pollution</text>
    <rect x="50" y="268" width="175" height="36" rx="3" fill="#ffe0b2"/>
    <text x="60" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Transportation</text>
    <text x="60" y="295" font-family="Arial" font-size="8" fill="#ef6c00">Road: 85-90 dB, Air: 120+ dB</text>
    <rect x="235" y="268" width="175" height="36" rx="3" fill="#ffe0b2"/>
    <text x="245" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Industrial</text>
    <text x="245" y="295" font-family="Arial" font-size="8" fill="#ef6c00">Machinery: 75-110 dB</text>
    <rect x="420" y="268" width="175" height="36" rx="3" fill="#ffe0b2"/>
    <text x="430" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Construction</text>
    <text x="430" y="295" font-family="Arial" font-size="8" fill="#ef6c00">Equipment: 80-100 dB</text>
    <rect x="605" y="268" width="145" height="36" rx="3" fill="#ffe0b2"/>
    <text x="615" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Commercial</text>
    <text x="615" y="295" font-family="Arial" font-size="8" fill="#ef6c00">Markets, entertainment</text>
  </g>

  <!-- Step 4: Effects of Noise -->
  <g class="step" id="step4" data-narration="Health effects include permanent hearing loss above 85 dB, cardiovascular issues, sleep disturbance above 55 dB, and mental health impacts.">
    <rect x="30" y="322" width="740" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="50" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Effects of Noise Pollution</text>
    <rect x="50" y="356" width="175" height="36" rx="3" fill="#ffcdd2"/>
    <text x="60" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Health Effects</text>
    <text x="60" y="383" font-family="Arial" font-size="8" fill="#c62828">Hearing loss, heart disease</text>
    <rect x="235" y="356" width="175" height="36" rx="3" fill="#ffcdd2"/>
    <text x="245" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Sleep Disturbance</text>
    <text x="245" y="383" font-family="Arial" font-size="8" fill="#c62828">Above 55 dB disrupts sleep</text>
    <rect x="420" y="356" width="175" height="36" rx="3" fill="#ffcdd2"/>
    <text x="430" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Mental Health</text>
    <text x="430" y="383" font-family="Arial" font-size="8" fill="#c62828">Anxiety, depression, stress</text>
    <rect x="605" y="356" width="145" height="36" rx="3" fill="#ffcdd2"/>
    <text x="615" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Environmental</text>
    <text x="615" y="383" font-family="Arial" font-size="8" fill="#c62828">Wildlife disruption</text>
  </g>

  <!-- Step 5: Decibel Scale and Standards -->
  <g class="step" id="step5" data-narration="The decibel scale measures sound: 0 dB is hearing threshold, 60 dB is conversation, 85 dB causes damage, and 120 dB is pain threshold.">
    <rect x="30" y="410" width="740" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="50" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Decibel Scale &amp; Indian Standards</text>
    <rect x="50" y="444" width="140" height="36" rx="3" fill="#e1bee7"/>
    <text x="60" y="458" font-family="Arial" font-size="8" fill="#6a1b9a">0 dB - Threshold</text>
    <text x="60" y="471" font-family="Arial" font-size="8" fill="#6a1b9a">40 dB - Library</text>
    <rect x="200" y="444" width="140" height="36" rx="3" fill="#e1bee7"/>
    <text x="210" y="458" font-family="Arial" font-size="8" fill="#6a1b9a">60 dB - Conversation</text>
    <text x="210" y="471" font-family="Arial" font-size="8" fill="#6a1b9a">85 dB - Hearing damage</text>
    <rect x="350" y="444" width="140" height="36" rx="3" fill="#e1bee7"/>
    <text x="360" y="458" font-family="Arial" font-size="8" fill="#6a1b9a">120 dB - Pain threshold</text>
    <text x="360" y="471" font-family="Arial" font-size="8" fill="#6a1b9a">140 dB - Jet takeoff</text>
    <rect x="500" y="444" width="140" height="36" rx="3" fill="#ce93d8"/>
    <text x="510" y="458" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">India Rules 2000</text>
    <text x="510" y="471" font-family="Arial" font-size="8" fill="#4a148c">Residential: 55/45 dB</text>
    <rect x="650" y="444" width="100" height="36" rx="3" fill="#ce93d8"/>
    <text x="660" y="458" font-family="Arial" font-size="8" font-weight="bold" fill="#4a148c">Silence Zone</text>
    <text x="660" y="471" font-family="Arial" font-size="8" fill="#4a148c">50/40 dB</text>
  </g>

  <!-- Step 6: Control Measures -->
  <g class="step" id="step6" data-narration="Three-tier noise control approach uses source control through quieter equipment and maintenance, path control via barriers and green belts, and receptor control with ear protection and building insulation systems.">
    <rect x="30" y="498" width="740" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="50" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Control Measures for Noise Pollution</text>
    <rect x="50" y="532" width="220" height="46" rx="3" fill="#c8e6c9"/>
    <text x="60" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">1. Source Control</text>
    <text x="60" y="560" font-family="Arial" font-size="8" fill="#1b5e20">Quieter machinery, regular</text>
    <text x="60" y="572" font-family="Arial" font-size="8" fill="#1b5e20">maintenance, acoustic enclosures</text>
    <rect x="280" y="532" width="220" height="46" rx="3" fill="#c8e6c9"/>
    <text x="290" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">2. Path Control</text>
    <text x="290" y="560" font-family="Arial" font-size="8" fill="#1b5e20">Noise barriers, green belts</text>
    <text x="290" y="572" font-family="Arial" font-size="8" fill="#1b5e20">buffer zones in urban planning</text>
    <rect x="510" y="532" width="240" height="46" rx="3" fill="#c8e6c9"/>
    <text x="520" y="546" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">3. Receptor Control</text>
    <text x="520" y="560" font-family="Arial" font-size="8" fill="#1b5e20">Earplugs, earmuffs, soundproof</text>
    <text x="520" y="572" font-family="Arial" font-size="8" fill="#1b5e20">buildings, double-glazed windows</text>
  </g>
</svg>