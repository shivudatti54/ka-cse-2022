<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Environmental Pollution is the contamination of natural environment through harmful substances affecting air, water, soil, and causing severe health hazards.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Environmental Pollution</text>
  </g>
  
  <g class="step" id="step1" data-narration="There are five main types: Air pollution from vehicles and industries, Water pollution from sewage and chemicals, Soil pollution from waste, Noise from traffic, and Radioactive pollution from nuclear sources.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="30" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Types of Pollution</text>
    <rect x="30" y="85" width="140" height="45" fill="#ffffff" stroke="#1976d2" rx="3"/>
    <text x="100" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Air Pollution</text>
    <text x="100" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">PM2.5, PM10, SO₂, NOₓ</text>
    <rect x="180" y="85" width="140" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="250" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Water Pollution</text>
    <text x="250" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Organic matter, Heavy metals</text>
    <rect x="330" y="85" width="140" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="400" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Soil Pollution</text>
    <text x="400" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Heavy metals, Pesticides</text>
    <rect x="480" y="85" width="140" height="45" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="550" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Noise Pollution</text>
    <text x="550" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Above 85 dB harmful</text>
    <rect x="630" y="85" width="140" height="45" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="700" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Radioactive</text>
    <text x="700" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Nuclear, Medical waste</text>
  </g>
  
  <g class="step" id="step2" data-narration="Pollution sources are classified as Point Sources with identifiable discharge points like factories, and Non-Point Sources which are diffuse like agricultural runoff.">
    <rect x="10" y="146" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="30" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Pollution Sources: Point vs Non-Point</text>
    <rect x="30" y="175" width="360" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="210" y="192" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Point Sources</text>
    <text x="210" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Identifiable discharge points: factories, sewage pipes</text>
    <rect x="400" y="175" width="360" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="580" y="192" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Non-Point Sources</text>
    <text x="580" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Diffuse pollution: agricultural runoff, urban stormwater</text>
  </g>
  
  <g class="step" id="step3" data-narration="Pollution effects include ecosystem disruption and biodiversity loss, climate change through greenhouse gases, and human health impacts like respiratory and cardiovascular diseases.">
    <rect x="10" y="234" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="30" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Effects of Pollution</text>
    <rect x="30" y="263" width="240" height="45" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="150" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Human Health</text>
    <text x="150" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Respiratory diseases, cancer, cardiovascular problems</text>
    <rect x="280" y="263" width="240" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="400" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Ecosystem Depletion</text>
    <text x="400" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Biodiversity loss, food chain disruption, species extinction</text>
    <rect x="530" y="263" width="240" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="650" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Climate Change</text>
    <text x="650" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Global warming, extreme weather, sea-level rise</text>
  </g>
  
  <g class="step" id="step4" data-narration="Control equipment includes electrostatic precipitators for particles, scrubbers for SO₂, catalytic converters for vehicles, and activated sludge for wastewater treatment.">
    <rect x="10" y="322" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="30" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Pollution Control Equipment</text>
    <rect x="30" y="350" width="180" height="48" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="120" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Electrostatic</text>
    <text x="120" y="379" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Precipitator</text>
    <text x="120" y="391" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Removes PM</text>
    <rect x="220" y="350" width="180" height="48" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="310" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Scrubber</text>
    <text x="310" y="379" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Removes SO₂</text>
    <text x="310" y="391" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Gas absorption</text>
    <rect x="410" y="350" width="180" height="48" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="500" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Catalytic Converter</text>
    <text x="500" y="379" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Vehicle emissions</text>
    <text x="500" y="391" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">CO, NOₓ reduction</text>
    <rect x="600" y="350" width="180" height="48" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="690" y="367" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Activated Sludge</text>
    <text x="690" y="379" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Wastewater treatment</text>
    <text x="690" y="391" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Organic removal</text>
  </g>
  
  <g class="step" id="step5" data-narration="In AQI calculation, the maximum sub-index determines the category. For BOD: multiply DO consumed by dilution factor. BOD below 30 mg/L is required for discharge.">
    <rect x="10" y="410" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="30" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example Calculations</text>
    <rect x="30" y="438" width="370" height="48" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="215" y="454" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Air Quality Index (AQI)</text>
    <text x="215" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">AQI = max sub-index; PM2.5=95→AQI=271, PM10=180→AQI=360</text>
    <text x="215" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Max=360 = Very Unhealthy</text>
    <rect x="410" y="438" width="370" height="48" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="595" y="454" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Biochemical Oxygen Demand (BOD)</text>
    <text x="595" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">BOD = (DO initial - DO final) × Dilution Factor</text>
    <text x="595" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Example: (8-2)×4 = 24 mg/L (Standard: &lt;30 mg/L)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key formulas to remember: BOD, combined noise level, AQI calculation. Indian standards: PM2.5 60 μg/m³, PM10 100 μg/m³. Prevention hierarchy: Prevent > Minimize > Recycle > Treat > Dispose.">
    <rect x="10" y="498" width="780" height="85" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="30" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Formulas &amp; Indian Standards</text>
    <rect x="30" y="525" width="240" height="54" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="150" y="541" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Noise Level (n sources)</text>
    <text x="150" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">L total = L single + 10 log(n)</text>
    <text x="150" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Ex: 90+10log(3)=95 dB</text>
    <rect x="280" y="525" width="240" height="54" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="400" y="541" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Indian Air Quality Standards</text>
    <text x="400" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">PM2.5: 60 μg/m³, PM10: 100 μg/m³</text>
    <text x="400" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">SO₂: 80 ppb, NO₂: 80 ppb (24-hr)</text>
    <rect x="530" y="525" width="240" height="54" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="650" y="541" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Prevention Hierarchy</text>
    <text x="650" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Prevent > Minimize > Recycle</text>
    <text x="650" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Treat > Dispose</text>
  </g>
</svg>