<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Fluoride in drinking water comes from natural and human sources. While beneficial in small amounts, excess fluoride causes serious health problems requiring defluoridation treatment.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#fff">Fluoride Problem in Drinking Water</text>
  </g>

  <!-- step1: Sources of Fluoride -->
  <g class="step" id="step1" data-narration="Fluoride enters water naturally through mineral weathering of fluorite, cryolite, and fluoroapatite rocks. Anthropogenic sources include industrial emissions, phosphate fertilizers, and coal burning.">
    <rect x="40" y="58" width="720" h="82" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="60" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Sources of Fluoride</text>
    <rect x="60" y="88" width="200" height="42" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="102" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">Natural Sources</text>
    <text x="70" y="118" font-family="Arial" font-size="9" fill="#333">• Fluorite (CaF₂)</text>
    <text x="70" y="128" font-family="Arial" font-size="9" fill="#333">• Cryolite (Na₃AlF₆)</text>
    <rect x="270" y="88" width="200" height="42" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="280" y="102" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">Anthropogenic Sources</text>
    <text x="280" y="118" font-family="Arial" font-size="9" fill="#333">• Aluminum smelting</text>
    <text x="280" y="128" font-family="Arial" font-size="9" fill="#333">• Fertilizer factories</text>
    <text x="480" y="100" font-family="Arial" font-size="10" fill="#666">Weathering of fluoride-bearing</text>
    <text x="480" y="115" font-family="Arial" font-size="10" fill="#666">rocks releases fluoride into</text>
    <text x="480" y="130" font-family="Arial" font-size="10" fill="#666">groundwater through leaching.</text>
  </g>

  <!-- step2: Health Effects -->
  <g class="step" id="step2" data-narration="Excessive fluoride causes dental fluorosis with white stains on teeth in children, and skeletal fluorosis with joint pain and bone damage in adults.">
    <rect x="40" y="148" width="720" h="82" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="60" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Health Effects of Fluoride</text>
    <rect x="60" y="182" width="320" height="40" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="70" y="196" font-family="Arial" font-size="11" fill="#f44336" font-weight="bold">Dental Fluorosis</text>
    <text x="70" y="212" font-family="Arial" font-size="10" fill="#333">White spots, stains, pitting on teeth in children (during tooth development)</text>
    <rect x="390" y="182" width="320" height="40" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="196" font-family="Arial" font-size="11" fill="#9c27b0" font-weight="bold">Skeletal Fluorosis</text>
    <text x="400" y="212" font-family="Arial" font-size="10" fill="#333">Joint pain, stiffness, bone hardening in adults after prolonged exposure (10-20 years)</text>
  </g>

  <!-- step3: Fluorosis in India -->
  <g class="step" id="step3" data-narration="India has over 200 million people at risk. Most affected states include Rajasthan, Gujarat, Karnataka, Andhra Pradesh, Telangana, and Madhya Pradesh.">
    <rect x="40" y="238" width="720" h="82" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="60" y="258" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Fluoride Problem in India</text>
    <text x="60" y="280" font-family="Arial" font-size="11" fill="#333">Over <tspan font-weight="bold" fill="#f44336">200 million people</tspan> at risk from fluoride-contaminated water</text>
    <rect x="60" y="292" width="130" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="75" y="306" font-family="Arial" font-size="10" fill="#1976d2">Rajasthan</text>
    <rect x="200" y="292" width="100" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="210" y="306" font-family="Arial" font-size="10" fill="#1976d2">Gujarat</text>
    <rect x="310" y="292" width="120" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="320" y="306" font-family="Arial" font-size="10" fill="#1976d2">Karnataka</text>
    <rect x="440" y="292" width="160" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="450" y="306" font-family="Arial" font-size="10" fill="#1976d2">Andhra Pradesh</text>
    <rect x="610" y="292" width="120" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="620" y="306" font-family="Arial" font-size="10" fill="#1976d2">Telangana</text>
  </g>

  <!-- step4: Permissible Limits -->
  <g class="step" id="step4" data-narration="BIS recommends 1.0 mg/L desirable, 1.5 mg/L acceptable, and 2.0 mg/L permissible limit. WHO guideline is 1.5 mg/L for drinking water.">
    <rect x="40" y="328" width="720" h="82" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="60" y="348" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Permissible Limits for Fluoride</text>
    <rect x="60" y="362" width="160" height="42" rx="4" fill="#fff" stroke="#388e3c"/>
    <text x="125" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c" font-weight="bold">Desirable Limit</text>
    <text x="125" y="395" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">1.0 mg/L</text>
    <rect x="230" y="362" width="160" height="42" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="310" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2" font-weight="bold">Acceptable Limit</text>
    <text x="310" y="395" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">1.5 mg/L</text>
    <rect x="400" y="362" width="180" height="42" rx="4" fill="#fff" stroke="#ff9800"/>
    <text x="490" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800" font-weight="bold">Permissible (No Alternative)</text>
    <text x="490" y="395" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">2.0 mg/L</text>
    <text x="590" y="378" font-family="Arial" font-size="10" fill="#666">WHO Guideline: 1.5 mg/L</text>
    <text x="590" y="393" font-family="Arial" font-size="10" fill="#666">US EPA MCL: 4.0 mg/L</text>
  </g>

  <!-- step5: Defluoridation Methods -->
  <g class="step" id="step5" data-narration="Common defluoridation methods include activated alumina adsorption, reverse osmosis membrane technology, Nalgonda technique using alum and lime, and bone char filtration.">
    <rect x="40" y="418" width="720" h="170" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="60" y="438" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Defluoridation Methods</text>
    <rect x="60" y="452" width="165" height="128" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="142" y="468" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">Activated Alumina</text>
    <text x="70" y="485" font-family="Arial" font-size="9" fill="#333">• Ion exchange adsorption</text>
    <text x="70" y="498" font-family="Arial" font-size="9" fill="#333">• Optimal pH: 5.5-7.0</text>
    <text x="70" y="511" font-family="Arial" font-size="9" fill="#333">• Regenerate with NaOH</text>
    <text x="70" y="524" font-family="Arial" font-size="9" fill="#333">• Most widely used</text>
    <text x="70" y="537" font-family="Arial" font-size="9" fill="#333">• Cost: Medium</text>
    <rect x="235" y="452" width="165" height="128" rx="4" fill="#fff" stroke="#388e3c"/>
    <text x="317" y="468" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">Nalgonda Technique</text>
    <text x="245" y="485" font-family="Arial" font-size="9" fill="#333">• Uses alum + lime</text>
    <text x="245" y="498" font-family="Arial" font-size="9" fill="#333">• Flocculation & settling</text>
    <text x="245" y="511" font-family="Arial" font-size="9" fill="#333">• Low cost method</text>
    <text x="245" y="524" font-family="Arial" font-size="9" fill="#333">• Community level</text>
    <text x="245" y="537" font-family="Arial" font-size="9" fill="#333">• Developed by NEERI</text>
    <rect x="410" y="452" width="165" height="128" rx="4" fill="#fff" stroke="#ff9800"/>
    <text x="492" y="468" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800" font-weight="bold">Reverse Osmosis</text>
    <text x="420" y="485" font-family="Arial" font-size="9" fill="#333">• Membrane technology</text>
    <text x="420" y="498" font-family="Arial" font-size="9" fill="#333">• 85-95% removal</text>
    <text x="420" y="511" font-family="Arial" font-size="9" fill="#333">• High pressure needed</text>
    <text x="420" y="524" font-family="Arial" font-size="9" fill="#333">• Produces brine waste</text>
    <text x="420" y="537" font-family="Arial" font-size="9" fill="#333">• Cost: High</text>
    <rect x="585" y="452" width="165" height="128" rx="4" fill="#fff" stroke="#f44336"/>
    <text x="667" y="468" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336" font-weight="bold">Bone Char</text>
    <text x="595" y="485" font-family="Arial" font-size="9" fill="#333">• Pyrolyzed animal bones</text>
    <text x="595" y="498" font-family="Arial" font-size="9" fill="#333">• Hydroxyapatite based</text>
    <text x="595" y="511" font-family="Arial" font-size="9" fill="#333">• Ion exchange process</text>
    <text x="595" y="524" font-family="Arial" font-size="9" fill="#333">• Requires replacement</text>
    <text x="595" y="537" font-family="Arial" font-size="9" fill="#333">• Cost: Low-Medium</text>
  </g>
</svg>