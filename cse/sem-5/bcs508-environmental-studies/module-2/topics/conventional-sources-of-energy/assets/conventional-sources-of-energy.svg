<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Conventional Sources of Energy are non-renewable energy sources including fossil fuels like coal, petroleum, natural gas, nuclear energy, and sometimes hydroelectric power that drive modern civilization.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Conventional Sources of Energy</text>
  </g>
  
  <g class="step" id="step1" data-narration="Conventional energy sources are non-renewable and include fossil fuels such as coal, petroleum, natural gas, nuclear energy derived from uranium fission, and sometimes hydroelectric power from dams.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="30" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Classification of Conventional Energy Sources</text>
    <rect x="30" y="95" width="140" height="35" rx="3" fill="#c8e6c9"/>
    <text x="100" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Fossil Fuels</text>
    <text x="100" y="123" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Coal, Petroleum, Natural Gas</text>
    <rect x="185" y="95" width="140" height="35" rx="3" fill="#c8e6c9"/>
    <text x="255" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Nuclear Energy</text>
    <text x="255" y="123" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Uranium, Thorium Fission</text>
    <rect x="340" y="95" width="140" height="35" rx="3" fill="#c8e6c9"/>
    <text x="410" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Hydro Power*</text>
    <text x="410" y="123" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Run-of-river, Reservoir</text>
    <text x="495" y="115" font-family="Arial" font-size="9" fill="#555">*Sometimes included in conventional sources</text>
  </g>
  
  <g class="step" id="step2" data-narration="Coal is a fossil fuel formed from ancient plants. Types include Peat (30% C), Lignite (30-40% C), Bituminous (40-80% C), and Anthracite (80%+ C).">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="30" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Coal - Types by Carbon Content</text>
    <rect x="30" y="180" width="170" height="38" rx="3" fill="#ffe0b2"/>
    <text x="115" y="196" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ef6c00">Peat</text>
    <text x="115" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">~30% Carbon</text>
    <rect x="215" y="180" width="170" height="38" rx="3" fill="#ffe0b2"/>
    <text x="300" y="196" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ef6c00">Lignite</text>
    <text x="300" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">30-40% Carbon (Brown Coal)</text>
    <rect x="400" y="180" width="170" height="38" rx="3" fill="#ffe0b2"/>
    <text x="485" y="196" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ef6c00">Bituminous</text>
    <text x="485" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">40-80% Carbon (Most Common)</text>
    <rect x="585" y="180" width="190" height="38" rx="3" fill="#ffe0b2"/>
    <text x="680" y="196" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ef6c00">Anthracite</text>
    <text x="680" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">80%+ Carbon (Highest Grade)</text>
  </g>
  
  <g class="step" id="step3" data-narration="Petroleum is refined through fractional distillation producing various fractions including gasoline (40-150°C), kerosene (150-250°C), diesel (250-400°C), lubricating oil, and bitumen residue for roads.">
    <rect x="10" y="234" width="780" height="93" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="30" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Petroleum Refining - Fractional Distillation</text>
    <rect x="30" y="270" width="135" height="38" rx="3" fill="#ffcdd2"/>
    <text x="97" y="286" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d32f2f">Petrol/Gasoline</text>
    <text x="97" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">40-150°C</text>
    <rect x="175" y="270" width="135" height="38" rx="3" fill="#ffcdd2"/>
    <text x="242" y="286" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d32f2f">Kerosene</text>
    <text x="242" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">150-250°C</text>
    <rect x="320" y="270" width="135" height="38" rx="3" fill="#ffcdd2"/>
    <text x="387" y="286" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d32f2f">Diesel</text>
    <text x="387" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">250-400°C</text>
    <rect x="465" y="270" width="135" height="38" rx="3" fill="#ffcdd2"/>
    <text x="532" y="286" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d32f2f">Lubricating Oil</text>
    <text x="532" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">&gt;400°C</text>
    <rect x="610" y="270" width="165" height="38" rx="3" fill="#ffcdd2"/>
    <text x="692" y="286" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d32f2f">Bitumen</text>
    <text x="692" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Residue (Road Construction)</text>
    <text x="30" y="320" font-family="Arial" font-size="9" fill="#555">Octane Number: Gasoline knocking resistance | Cetane Number: Diesel ignition quality</text>
  </g>
  
  <g class="step" id="step4" data-narration="Natural gas is mainly methane (70-90%) with calorific value 35-40 MJ per cubic meter. It is the cleanest fossil fuel with significantly lower emissions than coal or petroleum.">
    <rect x="10" y="335" width="780" height="105" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="30" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Natural Gas - Composition and Uses</text>
    <rect x="30" y="371" width="240" height="36" rx="3" fill="#e1bee7"/>
    <text x="150" y="387" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">Methane (CH₄)</text>
    <text x="150" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">70-90% of composition</text>
    <rect x="285" y="371" width="240" height="36" rx="3" fill="#e1bee7"/>
    <text x="405" y="387" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">Calorific Value</text>
    <text x="405" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">35-40 MJ/m³</text>
    <rect x="540" y="371" width="235" height="36" rx="3" fill="#e1bee7"/>
    <text x="657" y="387" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">LNG / CNG</text>
    <text x="657" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Liquefied (-162°C) or Compressed (200-250 bar)</text>
    <rect x="30" y="413" width="170" height="22" rx="3" fill="#ce93d8"/>
    <text x="115" y="428" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Cleanest Fossil Fuel</text>
  </g>
  
  <g class="step" id="step5" data-narration="Nuclear energy is generated from Uranium-235 fission in reactors. Key reactor components include enriched fuel, moderator, coolant, neutron-absorbing control rods, and radiation shielding for safety.">
    <rect x="10" y="448" width="780" height="60" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="30" y="470" font-family="Arial" font-size="13" font-weight="bold" fill="#0d47a1">Nuclear Power - Reactor Components</text>
    <text x="30" y="490" font-family="Arial" font-size="10" fill="#1565c0">Nuclear Fuel (Enriched U-235) | Moderator (Water/Graphite) | Coolant (Water/Sodium) | Control Rods (Boron) | Shielding (Concrete)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Hydroelectric power uses flowing water to generate electricity with the formula P equals rho times g times Q times H times efficiency. Types include run-of-river, reservoir-based, and pumped storage facilities.">
    <rect x="10" y="516" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="30" y="538" font-family="Arial" font-size="13" font-weight="bold" fill="#1b5e20">Hydroelectric Power - Key Concepts</text>
    <rect x="30" y="552" width="280" height="38" rx="3" fill="#c8e6c9"/>
    <text x="170" y="568" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Power Equation</text>
    <text x="170" y="582" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">P = ρ × g × Q × H × η</text>
    <rect x="325" y="552" width="140" height="38" rx="3" fill="#c8e6c9"/>
    <text x="395" y="568" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Efficiency</text>
    <text x="395" y="582" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">85-95%</text>
    <rect x="480" y="552" width="180" height="38" rx="3" fill="#c8e6c9"/>
    <text x="570" y="568" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Types</text>
    <text x="570" y="582" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Run-of-river, Reservoir</text>
    <rect x="675" y="552" width="100" height="38" rx="3" fill="#c8e6c9"/>
    <text x="725" y="570" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">India:</text>
    <text x="725" y="583" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">60% from coal</text>
  </g>
</svg>