<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Non-conventional energy sources are renewable alternatives to fossil fuels. They include solar, wind, biomass, geothermal, ocean, and hydrogen energy, essential for sustainable development.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Non-Conventional Sources of Energy</text>
  </g>
  
  <g class="step" id="step1" data-narration="Solar energy uses sunlight converted to electricity via PV cells or thermal systems. Types include monocrystalline and polycrystalline silicon cells with 15-25% efficiency.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. Solar Energy</text>
    <rect x="40" y="95" width="200" height="35" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="140" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Solar PV Cells</text>
    <text x="140" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Electricity from sunlight</text>
    <rect x="260" y="95" width="200" height="35" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="360" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Solar Thermal</text>
    <text x="360" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Heat for turbines</text>
    <rect x="480" y="95" width="280" height="35" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="620" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Efficiency: 15-25%</text>
    <text x="620" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Types: Mono &amp; Poly crystalline</text>
  </g>
  
  <g class="step" id="step2" data-narration="Wind energy uses turbines converting kinetic wind energy to electricity. Power equation: P equals half rho A V cubed Cp, where Cp max is 0.59.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">2. Wind Energy</text>
    <rect x="40" y="185" width="150" height="35" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="115" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">HAWT</text>
    <text x="115" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Horizontal Axis</text>
    <rect x="200" y="185" width="150" height="35" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="275" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">VAWT</text>
    <text x="275" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Vertical Axis</text>
    <rect x="360" y="185" width="400" height="35" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="560" y="202" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">P = ½ × ρ × A × V³ × Cp</text>
    <text x="560" y="216" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Max Cp = 0.59 (Betz Limit)</text>
  </g>
  
  <g class="step" id="step3" data-narration="Biomass energy comes from organic materials converted via combustion, gasification, pyrolysis, anaerobic digestion, or fermentation to produce heat, biogas, and biofuels.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">3. Biomass Energy</text>
    <rect x="40" y="273" width="140" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="110" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Combustion</text>
    <text x="110" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Direct burning</text>
    <rect x="190" y="273" width="140" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="260" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Gasification</text>
    <text x="260" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Producer gas</text>
    <rect x="340" y="273" width="140" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="410" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Pyrolysis</text>
    <text x="410" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Bio-oil</text>
    <rect x="490" y="273" width="140" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="560" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Anaerobic Digest</text>
    <text x="560" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Biogas (CH₄)</text>
    <rect x="640" y="273" width="120" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="700" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Fermentation</text>
    <text x="700" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Ethanol</text>
  </g>
  
  <g class="step" id="step4" data-narration="Geothermal energy uses Earths内部 heat for heating and electricity. Applications include direct heating, flash steam, binary cycle power plants, and heat pumps.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">4. Geothermal Energy</text>
    <rect x="40" y="361" width="220" height="35" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="150" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Direct Heating</text>
    <text x="150" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Greenhouses, district heating</text>
    <rect x="270" y="361" width="220" height="35" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="380" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Flash Steam Plant</text>
    <text x="380" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Steam-driven turbines</text>
    <rect x="500" y="361" width="260" height="35" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="630" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Binary Cycle / Heat Pumps</text>
    <text x="630" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Low temperature resources</text>
  </g>
  
  <g class="step" id="step5" data-narration="Ocean energy includes tidal, wave, ocean thermal (OTEC), and marine current energy. These use ocean movements and temperature differences to generate clean electricity.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">5. Ocean Energy</text>
    <rect x="40" y="449" width="170" height="35" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="125" y="466" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Tidal Energy</text>
    <text x="125" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Tidal barrages/turbines</text>
    <rect x="220" y="449" width="170" height="35" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="305" y="466" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Wave Energy</text>
    <text x="305" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">OWCs, attenuators</text>
    <rect x="400" y="449" width="170" height="35" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="485" y="466" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">OTEC</text>
    <text x="485" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Temperature difference</text>
    <rect x="580" y="449" width="180" height="35" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="670" y="466" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Marine Currents</text>
    <text x="670" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Underwater turbines</text>
  </g>
  
  <g class="step" id="step6" data-narration="Hydrogen is an energy carrier produced by electrolysis or reforming. Fuel cells convert chemical energy to electricity with 40-60% efficiency, emitting only water.">
    <rect x="20" y="498" width="760" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">6. Hydrogen &amp; Fuel Cells</text>
    <rect x="40" y="537" width="340" height="45" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="210" y="555" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Hydrogen Production</text>
    <text x="150" y="570" font-family="Arial" font-size="9" fill="#666">• Electrolysis (water)</text>
    <text x="260" y="570" font-family="Arial" font-size="9" fill="#666">• Steam reforming</text>
    <text x="210" y="582" font-family="Arial" font-size="9" fill="#666">• Biomass gasification</text>
    <rect x="390" y="537" width="370" height="45" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="575" y="555" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Fuel Cell Types</text>
    <text x="430" y="570" font-family="Arial" font-size="9" fill="#666">PEMFC: Vehicles</text>
    <text x="520" y="570" font-family="Arial" font-size="9" fill="#666">SOFC: High temp</text>
    <text x="610" y="570" font-family="Arial" font-size="9" fill="#666">MCFC: Industrial</text>
    <text x="575" y="582" font-family="Arial" font-size="9" fill="#388e3c">Efficiency: 40-60% | Emission: H₂O only</text>
  </g>
</svg>