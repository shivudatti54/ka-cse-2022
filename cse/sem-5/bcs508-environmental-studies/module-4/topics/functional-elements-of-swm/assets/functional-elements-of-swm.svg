<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This educational module covers the six sequential functional elements of solid waste management starting from generation at source to final disposal in landfills.">
    <rect x="10" y="10" width="780" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Functional Elements of Solid Waste Management</text>
  </g>
  
  <g class="step" id="step1" data-narration="Waste generation is the first element, covering residential, commercial, and industrial sources. In India, per capita waste ranges from 200 to 600 grams daily.">
    <rect x="10" y="58" width="780" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="25" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">1. Waste Generation</text>
    <rect x="25" y="88" width="150" height="42" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="100" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Residential</text>
    <text x="100" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Commercial</text>
    <text x="100" y="126" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Industrial</text>
    <rect x="185" y="88" width="150" height="42" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="260" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">MSW Components:</text>
    <text x="260" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Organic + Recyclables + Inert</text>
    <text x="345" y="115" text-anchor="start" font-family="Arial" font-size="10" fill="#1565c0">200-600 g/person/day</text>
    <line x1="260" y1="78" x2="260" y2="138" stroke="#1976d2" stroke-width="1" stroke-dasharray="4"/>
    <text x="260" y="78" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0" font-weight="bold">India</text>
  </g>
  
  <g class="step" id="step2" data-narration="Handling and Separation involves source segregation at generation points, storage in containers, and pre-collection processing like magnetic separation of metals.">
    <rect x="10" y="146" width="780" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="25" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32">2. Handling and Separation</text>
    <rect x="25" y="178" width="120" height="40" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="85" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Source Separation</text>
    <text x="85" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Biodegradable/Recyclable/Residual</text>
    <rect x="155" y="178" width="120" height="40" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="215" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Storage</text>
    <text x="215" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Containers at households</text>
    <rect x="285" y="178" width="120" height="40" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="345" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Pre-collection Processing</text>
    <text x="345" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Magnetic separation</text>
    <line x1="420" y1="166" x2="420" y2="226" stroke="#388e3c" stroke-width="1" stroke-dasharray="4"/>
    <text x="420" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Key Benefit</text>
    <text x="420" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Improves recycling</text>
    <text x="420" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">efficiency significantly</text>
  </g>
  
  <g class="step" id="step3" data-narration="Collection gathers waste from sources to transfer stations. It consumes 50-70 percent of total SWM budget, the largest cost component.">
    <rect x="10" y="234" width="780" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="25" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">3. Collection</text>
    <rect x="25" y="266" width="170" height="40" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="110" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Door-to-door</text>
    <text x="110" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Direct household pickup</text>
    <rect x="205" y="266" width="170" height="40" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="290" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Curbside</text>
    <text x="290" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Roadside collection</text>
    <rect x="385" y="266" width="120" height="40" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="445" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">On-demand</text>
    <text x="445" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">When containers full</text>
    <rect x="515" y="266" width="120" height="40" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="575" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Fixed-time</text>
    <text x="575" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Scheduled pickup</text>
    <line x1="655" y1="254" x2="655" y2="314" stroke="#ff9800" stroke-width="1" stroke-dasharray="4"/>
    <text x="655" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100" font-weight="bold">Cost Impact</text>
    <text x="655" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">50-70%</text>
    <text x="655" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">of total SWM cost</text>
  </g>
  
  <g class="step" id="step4" data-narration="Transfer and Transport moves waste from collection points to processing facilities using transfer stations that consolidate waste into larger vehicles.">
    <rect x="10" y="322" width="780" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="25" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">4. Transfer and Transport</text>
    <rect x="25" y="354" width="130" height="40" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="90" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Direct Transfer</text>
    <text x="90" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Vehicle to vehicle</text>
    <rect x="165" y="354" width="130" height="40" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="230" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Stationary Compact</text>
    <text x="230" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Compacts before loading</text>
    <rect x="305" y="354" width="130" height="40" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="370" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Mobile Transfer</text>
    <text x="370" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Portable containers</text>
    <line x1="450" y1="342" x2="450" y2="402" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="450" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">Transport</text>
    <text x="450" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Compactors</text>
    <text x="450" y="392" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Roll-on-roll-off</text>
    <text x="580" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a" font-weight="bold">Purpose</text>
    <text x="580" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Reduces transport</text>
    <text x="580" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">costs for distant sites</text>
  </g>
  
  <g class="step" id="step5" data-narration="Processing and Recovery transforms waste into useful products through composting, recycling, and energy recovery methods like incineration and biogas. These techniques maximize resource recovery and minimize environmental impact from waste disposal in landfills.">
    <rect x="10" y="410" width="780" height="80" rx="8" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="25" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#004d40">5. Processing and Recovery</text>
    <rect x="25" y="442" width="120" height="40" rx="4" fill="#b2dfdb" stroke="#00796b" stroke-width="1"/>
    <text x="85" y="456" text-anchor="middle" font-family="Arial" font-size="9" fill="#004d40">Composting</text>
    <text x="85" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#004d40">Windrow/In-vessel/Vermi</text>
    <rect x="155" y="442" width="120" height="40" rx="4" fill="#b2dfdb" stroke="#00796b" stroke-width="1"/>
    <text x="215" y="456" text-anchor="middle" font-family="Arial" font-size="9" fill="#004d40">Recycling</text>
    <text x="215" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#004d40">Paper/Plastics/Glass</text>
    <rect x="285" y="442" width="120" height="40" rx="4" fill="#b2dfdb" stroke="#00796b" stroke-width="1"/>
    <text x="345" y="456" text-anchor="middle" font-family="Arial" font-size="9" fill="#004d40">Energy Recovery</text>
    <text x="345" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#004d40">Incineration/Biogas</text>
    <rect x="415" y="442" width="120" height="40" rx="4" fill="#b2dfdb" stroke="#00796b" stroke-width="1"/>
    <text x="475" y="456" text-anchor="middle" font-family="Arial" font-size="9" fill="#004d40">MRF</text>
    <text x="475" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#004d40">Material Recovery Facility</text>
    <line x1="550" y1="430" x2="550" y2="490" stroke="#00796b" stroke-width="1" stroke-dasharray="4"/>
    <text x="550" y="448" text-anchor="middle" font-family="Arial" font-size="9" fill="#004d40" font-weight="bold">Reduces</text>
    <text x="550" y="466" text-anchor="middle" font-family="Arial" font-size="9" fill="#004d40" font-weight="bold">Landfill</text>
    <text x="550" y="480" text-anchor="middle" font-family="Arial" font-size="9" fill="#004d40" font-weight="bold">Burden</text>
  </g>
  
  <g class="step" id="step6" data-narration="Disposal is the final element using sanitary and engineered landfills with composite liners, leachate collection, and gas management systems to prevent groundwater contamination.">
    <rect x="10" y="498" width="780" height="90" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="25" y="522" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">6. Disposal</text>
    <rect x="25" y="534" width="180" height="46" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="115" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Sanitary Landfill</text>
    <text x="115" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Daily compaction + cover</text>
    <text x="115" y="576" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Controlled placement</text>
    <rect x="215" y="534" width="180" height="46" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="305" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Engineered Landfill</text>
    <text x="305" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Composite liner system</text>
    <text x="305" y="576" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Leachate + gas collection</text>
    <line x1="410" y1="522" x2="410" y2="588" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/>
    <text x="410" y="540" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828" font-weight="bold">Key Components</text>
    <text x="410" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Composite Liner</text>
    <text x="410" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Leachate Collection</text>
    <text x="410" y="584" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Gas Management</text>
    <text x="660" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828" font-weight="bold">Legacy Issue</text>
    <text x="660" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Old landfills cause</text>
    <text x="660" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">groundwater risks</text>
  </g>
</svg>