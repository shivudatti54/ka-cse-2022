<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <pattern id="biohazard" patternUnits="userSpaceOnUse" width="20" height="20">
      <circle cx="10" cy="10" r="8" fill="none" stroke="#f44336" stroke-width="1"/>
      <circle cx="10" cy="10" r="4" fill="none" stroke="#f44336" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Biomedical Waste Management Rules 2016 in India replace the older 1998 rules under the Environment Protection Act for all healthcare facilities and hospitals.">
    <rect x="20" y="10" width="760" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Biomedical Waste Management Rules 2016</text>
  </g>
  
  <!-- step1: Introduction & Scope -->
  <g class="step" id="step1" data-narration="These rules apply to all healthcare facilities in India including hospitals, nursing homes, clinics, diagnostic labs, blood banks, and research institutions nationwide.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Scope of Application</text>
    <rect x="40" y="90" width="160" height="38" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="105" font-family="Arial" font-size="9" fill="#333">Hospitals &amp; Nursing Homes</text>
    <text x="50" y="118" font-family="Arial" font-size="9" fill="#333">Clinics &amp; Diagnostic Centers</text>
    <rect x="210" y="90" width="160" height="38" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="105" font-family="Arial" font-size="9" fill="#333">Pathological Laboratories</text>
    <text x="220" y="118" font-family="Arial" font-size="9" fill="#333">Blood Banks</text>
    <rect x="380" y="90" width="160" height="38" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="390" y="105" font-family="Arial" font-size="9" fill="#333">Research Laboratories</text>
    <text x="390" y="118" font-family="Arial" font-size="9" fill="#333">Animal Houses</text>
    <text x="560" y="105" font-family="Arial" font-size="10" fill="#666">Replaced Biomedical Waste</text>
    <text x="560" y="120" font-family="Arial" font-size="10" fill="#666">(Management and Handling)</text>
    <text x="560" y="132" font-family="Arial" font-size="10" fill="#666">Rules, 1998</text>
  </g>
  
  <!-- step2: Four Categories -->
  <g class="step" id="step2" data-narration="Four categories: Yellow for human anatomical and soiled waste, Red for recyclable contaminated items, White for sharps, Blue for glassware.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Four Waste Categories</text>
    <!-- Yellow Category -->
    <rect x="40" y="178" width="165" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <rect x="45" y="183" width="25" height="30" rx="2" fill="#fbc02d"/>
    <text x="75" y="195" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Yellow</text>
    <text x="75" y="208" font-family="Arial" font-size="8" fill="#666">Anatomical, Soiled</text>
    <!-- Red Category -->
    <rect x="215" y="178" width="165" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <rect x="220" y="183" width="25" height="30" rx="2" fill="#e53935"/>
    <text x="250" y="195" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Red</text>
    <text x="250" y="208" font-family="Arial" font-size="8" fill="#666">Recyclable Contaminated</text>
    <!-- White Category -->
    <rect x="390" y="178" width="165" height="40" rx="3" fill="#f5f5f5" stroke="#757575" stroke-width="1"/>
    <rect x="395" y="183" width="25" height="30" rx="2" fill="#e0e0e0" stroke="#9e9e9e"/>
    <text x="425" y="195" font-family="Arial" font-size="9" font-weight="bold" fill="#333">White</text>
    <text x="425" y="208" font-family="Arial" font-size="8" fill="#666">Sharps (Needles, Blades)</text>
    <!-- Blue Category -->
    <rect x="565" y="178" width="165" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <rect x="570" y="183" width="25" height="30" rx="2" fill="#1976d2"/>
    <text x="600" y="195" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Blue</text>
    <text x="600" y="208" font-family="Arial" font-size="8" fill="#666">Glassware</text>
  </g>
  
  <!-- step3: Treatment Methods -->
  <g class="step" id="step3" data-narration="Treatment methods: Incineration at high temperature for yellow waste, Autoclave or Microwave for red category, Mutilation or Shredding for white sharps, and Chemical Disinfection for blue glassware.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Treatment Methods</text>
    <rect x="40" y="268" width="175" height="38" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#fbc02d">Yellow: Incineration</text>
    <text x="50" y="296" font-family="Arial" font-size="8" fill="#666">Temp &gt;800°C or Deep Burial</text>
    <rect x="225" y="268" width="175" height="38" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="235" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e53935">Red: Autoclave/Microwave</text>
    <text x="235" y="296" font-family="Arial" font-size="8" fill="#666">Steam or Microwave Disinfection</text>
    <rect x="410" y="268" width="175" height="38" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="420" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#757575">White: Mutilation/Shred</text>
    <text x="420" y="296" font-family="Arial" font-size="8" fill="#666">Needle Destroyer or Encapsulation</text>
    <rect x="595" y="268" width="175" height="38" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="605" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Blue: Disinfection</text>
    <text x="605" y="296" font-family="Arial" font-size="8" fill="#666">Chemical Disinfection + Recycling</text>
  </g>
  
  <!-- step4: Container Requirements -->
  <g class="step" id="step4" data-narration="All containers must be color-coded with biohazard labels showing waste category, collection date, and facility name clearly displayed for proper segregation.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Container Requirements</text>
    <rect x="40" y="355" width="350" height="38" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="370" font-family="Arial" font-size="9" fill="#333">All containers must display:</text>
    <text x="50" y="383" font-family="Arial" font-size="8" fill="#666">Biohazard Symbol • Waste Category • Date • Facility Name</text>
    <rect x="400" y="355" width="370" height="38" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="410" y="370" font-family="Arial" font-size="9" fill="#333">Container Types:</text>
    <text x="410" y="383" font-family="Arial" font-size="8" fill="#666">Yellow/Red: Non-chlorinated bags • White: Puncture-proof • Blue: Rigid containers</text>
  </g>
  
  <!-- step5: Roles & Authorization -->
  <g class="step" id="step5" data-narration="The occupier holds primary responsibility for waste management. SPCB grants authorization and monitors compliance. Facilities generating under 1000kg/month get one-time authorization, larger facilities need annual renewal.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#0288d1">Roles &amp; Authorization</text>
    <rect x="40" y="445" width="220" height="38" rx="3" fill="white" stroke="#0288d1" stroke-width="1"/>
    <text x="50" y="460" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Occupier</text>
    <text x="50" y="474" font-family="Arial" font-size="8" fill="#666">Head of facility - Primary responsibility</text>
    <rect x="270" y="445" width="220" height="38" rx="3" fill="white" stroke="#0288d1" stroke-width="1"/>
    <text x="280" y="460" font-family="Arial" font-size="9" font-weight="bold" fill="#333">SPCB</text>
    <text x="280" y="474" font-family="Arial" font-size="8" fill="#666">Grants authorization &amp; monitors compliance</text>
    <rect x="500" y="445" width="270" height="38" rx="3" fill="white" stroke="#0288d1" stroke-width="1"/>
    <text x="510" y="460" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Authorization</text>
    <text x="510" y="474" font-family="Arial" font-size="8" fill="#666">&lt;1000kg/month: One-time | &gt;1000kg/month: Annual renewal</text>
  </g>
  
  <!-- step6: CTF & Penalties -->
  <g class="step" id="step6" data-narration="Common Treatment Facility mandatory for small facilities. Non-compliance penalties: imprisonment up to 5 years and fine up to Rs 1 lakh.">
    <rect x="20" y="498" width="760" height="85" rx="5" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">CTF &amp; Penalties</text>
    <rect x="40" y="535" width="340" height="40" rx="3" fill="white" stroke="#c62828" stroke-width="1"/>
    <text x="50" y="550" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Common Treatment Facility (CTF)</text>
    <text x="50" y="563" font-family="Arial" font-size="8" fill="#666">Mandatory for small facilities • Min 500m from residential • Records for 5 years</text>
    <rect x="390" y="535" width="380" height="40" rx="3" fill="white" stroke="#c62828" stroke-width="1"/>
    <text x="400" y="550" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Penalties for Non-Compliance</text>
    <text x="400" y="563" font-family="Arial" font-size="8" fill="#666">Imprisonment up to 5 years OR Fine up to Rs 1 lakh OR Both • Facility closure possible</text>
  </g>
</svg>