<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Solid waste management covers collection, transport, treatment, and disposal of wastes to protect health and environment, crucial for sustainable development.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">SOLID WASTE MANAGEMENT</text>
  </g>
  
  <g class="step" id="step1" data-narration="Four main types: Municipal waste from homes and shops, Industrial byproducts, Hazardous materials threatening health, and Biomedical waste from hospitals.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Classification of Solid Wastes</text>
    <rect x="40" y="88" width="160" height="42" fill="#1976d2" rx="4"/>
    <text x="120" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Municipal (MSW)</text>
    <text x="120" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Household, Commercial</text>
    <rect x="210" y="88" width="160" height="42" fill="#388e3c" rx="4"/>
    <text x="290" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Industrial</text>
    <text x="290" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Slag, Ash, Residues</text>
    <rect x="380" y="88" width="160" height="42" fill="#ff9800" rx="4"/>
    <text x="460" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Hazardous</text>
    <text x="460" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Chemicals, Batteries</text>
    <rect x="550" y="88" width="160" height="42" fill="#f44336" rx="4"/>
    <text x="630" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Biomedical</text>
    <text x="630" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Medical, Pathological</text>
  </g>
  
  <g class="step" id="step2" data-narration="Indian MSW composition shows high organic matter (40-60%), plastics and paper (10-15% each), with moisture content of 40-50% and low calorific value.">
    <rect x="20" y="146" width="760" height="91" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Waste Composition (Indian MSW)</text>
    <rect x="40" y="180" width="120" height="38" fill="#388e3c" rx="4"/>
    <text x="100" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Organic: 40-60%</text>
    <rect x="170" y="180" width="100" height="38" fill="#1976d2" rx="4"/>
    <text x="220" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Plastics: 10-15%</text>
    <rect x="280" y="180" width="100" height="38" fill="#9c27b0" rx="4"/>
    <text x="330" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Paper: 10-15%</text>
    <rect x="390" y="180" width="80" height="38" fill="#ff9800" rx="4"/>
    <text x="430" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Metals: 2-5%</text>
    <rect x="480" y="180" width="80" height="38" fill="#f44336" rx="4"/>
    <text x="520" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Glass: 2-5%</text>
    <rect x="570" y="180" width="100" height="38" fill="#757575" rx="4"/>
    <text x="620" y="198" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Inert: 10-20%</text>
    <text x="40" y="230" font-family="Arial" font-size="9" fill="#388e3c">Key Characteristics: Moisture 40-50% | Bulk Density 400-600 kg/m³</text>
  </g>
  
  <g class="step" id="step3" data-narration="Collection methods include door-to-door pickup, community bins, curbside collection, and transfer stations for efficient waste aggregation and transportation to processing facilities.">
    <rect x="20" y="245" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="265" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Waste Collection Systems</text>
    <line x1="100" y1="286" x2="700" y2="286" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
    <rect x="50" y="296" width="130" height="28" fill="#ff9800" rx="4"/>
    <text x="115" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Door-to-Door</text>
    <line x1="180" y1="286" x2="180" y2="296" stroke="#ff9800" stroke-width="2"/>
    <rect x="195" y="296" width="130" height="28" fill="#ff9800" rx="4"/>
    <text x="260" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Community Bin</text>
    <line x1="325" y1="286" x2="325" y2="296" stroke="#ff9800" stroke-width="2"/>
    <rect x="340" y="296" width="130" height="28" fill="#ff9800" rx="4"/>
    <text x="405" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Curbside</text>
    <line x1="470" y1="286" x2="470" y2="296" stroke="#ff9800" stroke-width="2"/>
    <rect x="485" y="296" width="130" height="28" fill="#ff9800" rx="4"/>
    <text x="550" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Transfer Station</text>
    <line x1="615" y1="286" x2="615" y2="296" stroke="#ff9800" stroke-width="2"/>
    <rect x="630" y="296" width="130" height="28" fill="#ff9800" rx="4"/>
    <text x="695" y="314" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Cost: 60-80%</text>
  </g>
  
  <g class="step" id="step4" data-narration="Processing methods include source segregation at origin, composting for organic waste, vermicomposting using earthworms, and incineration for energy recovery and volume reduction.">
    <rect x="20" y="333" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="353" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Waste Processing Methods</text>
    <rect x="40" y="367" width="140" height="40" fill="#9c27b0" rx="4"/>
    <text x="110" y="384" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Source Segregation</text>
    <text x="110" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Separation at origin</text>
    <rect x="190" y="367" width="140" height="40" fill="#9c27b0" rx="4"/>
    <text x="260" y="384" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Composting</text>
    <text x="260" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Aerobic decomposition</text>
    <rect x="340" y="367" width="140" height="40" fill="#9c27b0" rx="4"/>
    <text x="410" y="384" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Vermicomposting</text>
    <text x="410" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Using earthworms</text>
    <rect x="490" y="367" width="140" height="40" fill="#9c27b0" rx="4"/>
    <text x="560" y="384" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Incineration</text>
    <text x="560" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">90% volume reduction</text>
    <rect x="640" y="367" width="120" height="40" fill="#9c27b0" rx="4"/>
    <text x="700" y="384" text-anchor="middle" font-family="Arial" font-size="10" fill="white">MRF</text>
    <text x="700" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Material Recovery</text>
  </g>
  
  <g class="step" id="step5" data-narration="Primary disposal method is engineered landfill with liner, leachate collection, gas management, and daily cover. Sanitary landfills prevent environmental contamination.">
    <rect x="20" y="421" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="441" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Disposal Methods</text>
    <rect x="40" y="459" width="220" height="38" fill="#f44336" rx="4"/>
    <text x="150" y="477" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Engineered Landfill</text>
    <text x="150" y="490" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Liner, Leachate, Gas Management</text>
    <rect x="270" y="459" width="180" height="38" fill="#e8f5e9" rx="4"/>
    <text x="360" y="477" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">Sanitary Landfill</text>
    <text x="360" y="490" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Daily Cover, Compacted</text>
    <rect x="460" y="459" width="160" height="38" fill="#fff3e0" rx="4"/>
    <text x="540" y="477" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800">Controlled Dump</text>
    <text x="540" y="490" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Basic Engineering</text>
    <rect x="630" y="459" width="130" height="38" fill="#e3f2fd" rx="4"/>
    <text x="695" y="477" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">Brick Kiln Use</text>
    <text x="695" y="490" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Alternative Fuel</text>
  </g>
  
  <g class="step" id="step6" data-narration="3R Principle: Reduce waste at source, Reuse items to extend life, Recycle materials into new products. E-waste rules 2022 manage electronic waste in India.">
    <rect x="20" y="509" width="760" height="85" fill="#e3f2fd" rx="8"/>
    <text x="40" y="529" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">3R Principle &amp; E-Waste Management</text>
    <rect x="40" y="543" width="200" height="46" fill="#1976d2" rx="4"/>
    <text x="140" y="562" text-anchor="middle" font-family="Arial" font-size="12" fill="white">REDUCE</text>
    <text x="140" y="577" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Minimize waste generation</text>
    <rect x="250" y="543" width="200" height="46" fill="#388e3c" rx="4"/>
    <text x="350" y="562" text-anchor="middle" font-family="Arial" font-size="12" fill="white">REUSE</text>
    <text x="350" y="577" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Extend product lifespan</text>
    <rect x="460" y="543" width="200" height="46" fill="#ff9800" rx="4"/>
    <text x="560" y="562" text-anchor="middle" font-family="Arial" font-size="12" fill="white">RECYCLE</text>
    <text x="560" y="577" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Process materials</text>
    <rect x="670" y="543" width="90" height="46" fill="#9c27b0" rx="4"/>
    <text x="715" y="562" text-anchor="middle" font-family="Arial" font-size="10" fill="white">E-Waste</text>
    <text x="715" y="576" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Rules 2022</text>
    <text x="715" y="588" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">India</text>
  </g>
</svg>