<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Steganography: Hiding in Plain Sight</text>

  <g id="step0" class="step" data-narration="Steganography hides the very existence of a message, unlike cryptography which hides its content.">
    <rect x="50" y="60" width="310" height="80" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="205" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Cryptography</text>
    <text x="205" y="105" text-anchor="middle" font-size="12" fill="#333">Protects message CONTENT</text>
    <text x="205" y="125" text-anchor="middle" font-size="12" fill="#666">Output looks encrypted</text>
    <rect x="440" y="60" width="310" height="80" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="595" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#388e3c">Steganography</text>
    <text x="595" y="105" text-anchor="middle" font-size="12" fill="#333">Hides message EXISTENCE</text>
    <text x="595" y="125" text-anchor="middle" font-size="12" fill="#666">Output looks normal</text>
  </g>

  <g id="step1" class="step" data-narration="LSB steganography hides data in the least significant bits of image pixels. Visually undetectable.">
    <text x="400" y="170" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">Image Steganography: LSB Method</text>
    <rect x="50" y="185" width="340" height="100" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Original Pixel (R,G,B)</text>
    <text x="220" y="235" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">R: 10110100</text>
    <text x="220" y="255" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">G: 11001010</text>
    <text x="220" y="275" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">B: 01110110</text>

    <line x1="400" y1="235" x2="430" y2="235" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="440" y="185" width="340" height="100" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="610" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Modified Pixel (msg: 010)</text>
    <text x="610" y="235" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">R: 1011010<tspan fill="#f44336" font-weight="bold">0</tspan></text>
    <text x="610" y="255" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">G: 1100101<tspan fill="#f44336" font-weight="bold">1</tspan></text>
    <text x="610" y="275" text-anchor="middle" font-size="14" font-family="monospace" fill="#333">B: 0111011<tspan fill="#f44336" font-weight="bold">0</tspan></text>
  </g>

  <g id="step2" class="step" data-narration="Audio steganography uses echo hiding, phase coding, and spread spectrum to embed data in sound.">
    <rect x="50" y="300" width="220" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="160" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Audio Stego</text>
    <text x="160" y="345" text-anchor="middle" font-size="11" fill="#333">Echo hiding</text>
    <text x="160" y="360" text-anchor="middle" font-size="11" fill="#333">Phase coding</text>
  </g>

  <g id="step3" class="step" data-narration="Text steganography manipulates whitespace, punctuation, or word choice to encode hidden messages.">
    <rect x="290" y="300" width="220" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Text Stego</text>
    <text x="400" y="345" text-anchor="middle" font-size="11" fill="#333">Whitespace manipulation</text>
    <text x="400" y="360" text-anchor="middle" font-size="11" fill="#333">Synonym substitution</text>
  </g>

  <g id="step4" class="step" data-narration="Video steganography embeds data within individual frames or motion vectors of video files.">
    <rect x="530" y="300" width="220" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="640" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Video Stego</text>
    <text x="640" y="345" text-anchor="middle" font-size="11" fill="#333">Frame-based hiding</text>
    <text x="640" y="360" text-anchor="middle" font-size="11" fill="#333">Motion vector mods</text>
  </g>

  <g id="step5" class="step" data-narration="The strongest approach combines both: encrypt the message first, then hide the ciphertext using steganography.">
    <text x="400" y="400" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">Combined: Crypto-Steganography</text>
    <rect x="50" y="415" width="130" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="115" y="443" text-anchor="middle" font-size="12" fill="#1976d2">Plaintext</text>
    <line x1="185" y1="437" x2="215" y2="437" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="220" y="415" width="130" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="285" y="443" text-anchor="middle" font-size="12" fill="#e65100">Encrypt</text>
    <line x1="355" y1="437" x2="385" y2="437" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="390" y="415" width="130" height="45" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="455" y="443" text-anchor="middle" font-size="12" fill="#9c27b0">Ciphertext</text>
    <line x1="525" y1="437" x2="555" y2="437" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="560" y="415" width="130" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="625" y="443" text-anchor="middle" font-size="12" fill="#388e3c">Hide in Image</text>
  </g>

  <g id="step6" class="step" data-narration="Steganalysis detects hidden messages through statistical analysis and pattern comparison of files.">
    <rect x="50" y="480" width="700" height="45" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Steganalysis: Detecting Hidden Messages</text>
    <text x="400" y="518" text-anchor="middle" font-size="12" fill="#333">Statistical analysis | Pattern detection | Machine learning approaches</text>
  </g>

  <g id="step7" class="step" data-narration="Applications include digital watermarking for copyright, covert communication, and data integrity verification.">
    <rect x="50" y="535" width="160" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="130" y="562" text-anchor="middle" font-size="11" fill="#1976d2">Watermarking</text>
    <rect x="225" y="535" width="160" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="305" y="562" text-anchor="middle" font-size="11" fill="#e65100">Covert Comms</text>
    <rect x="400" y="535" width="160" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="480" y="562" text-anchor="middle" font-size="11" fill="#388e3c">Data Integrity</text>
    <rect x="575" y="535" width="175" height="45" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="662" y="562" text-anchor="middle" font-size="11" fill="#9c27b0">Privacy Protection</text>
  </g>
</svg>
