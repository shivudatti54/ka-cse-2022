<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2">The Strength of DES</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" fill="#666">Data Encryption Standard: Evolution of Security</text>
  
  <!-- Step 0: What is DES -->
  <g class="step" id="step0" data-narration="DES, the Data Encryption Standard, is a symmetric-key block cipher developed by IBM in 1975. It encrypts data in 64-bit blocks using a 56-bit key for security.">
    <rect x="50" y="65" width="700" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">What is DES?</text>
    <text x="400" y="106" text-anchor="middle" font-size="10" fill="#333">1975 Block Cipher • 64-bit Blocks • Symmetric Key • Developed by IBM</text>
  </g>
  
  <!-- Step 1: Key Structure -->
  <g class="step" id="step1" data-narration="DES uses a 56-bit effective key size, which means there are only 2^56 possible keys, approximately 72 quadrillion different combinations that could be used for encryption.">
    <rect x="50" y="130" width="340" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="153" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">56-bit Key Size</text>
    <text x="220" y="171" text-anchor="middle" font-size="10" fill="#333">2^56 ≈ 72 Quadrillion Keys</text>
    
    <rect x="410" y="130" width="340" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="580" y="153" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">16 Rounds</text>
    <text x="580" y="171" text-anchor="middle" font-size="10" fill="#333">Feistel Network Structure</text>
  </g>
  
  <!-- Step 2: Weakness -->
  <g class="step" id="step2" data-narration="With modern computing power, a 56-bit key is considered too short for secure encryption. Brute force attacks can systematically try all possible keys in a relatively short time frame.">
    <rect x="50" y="195" width="700" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">The Main Weakness: Short Key</text>
    <text x="400" y="236" text-anchor="middle" font-size="10" fill="#333">56-bit key is vulnerable to brute force attacks with today's computing power</text>
  </g>
  
  <!-- Step 3: Timeline -->
  <g class="step" id="step3" data-narration="In 1998, the Electronic Frontier Foundation built a specialized machine called the DES Cracker that successfully broke DES encryption in just 56 hours, proving it was no longer secure.">
    <rect x="50" y="260" width="220" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="160" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">1977</text>
    <text x="160" y="297" text-anchor="middle" font-size="9" fill="#333">DES adopted as</text>
    <text x="160" y="309" text-anchor="middle" font-size="9" fill="#333">federal standard</text>
    <text x="160" y="321" text-anchor="middle" font-size="8" fill="#666">US Government</text>
    
    <rect x="290" y="260" width="220" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="400" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#f44336">1998</text>
    <text x="400" y="297" text-anchor="middle" font-size="9" fill="#333">EFF DES Cracker</text>
    <text x="400" y="309" text-anchor="middle" font-size="9" fill="#333">breaks DES in 56 hours</text>
    <text x="400" y="321" text-anchor="middle" font-size="8" fill="#666">Proof of vulnerability</text>
    
    <rect x="530" y="260" width="220" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="640" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">2001</text>
    <text x="640" y="297" text-anchor="middle" font-size="9" fill="#333">AES replaces DES</text>
    <text x="640" y="309" text-anchor="middle" font-size="9" fill="#333">as new standard</text>
    <text x="640" y="321" text-anchor="middle" font-size="8" fill="#666">NIST adopted AES</text>
  </g>
  
  <!-- Step 4: Triple DES -->
  <g class="step" id="step4" data-narration="To address DES's weaknesses, Triple DES applies the DES algorithm three times using either two or three separate 56-bit keys, effectively increasing the security to 112-bit or 168-bit strength.">
    <rect x="50" y="340" width="700" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="363" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Triple DES (3DES): Interim Solution</text>
    <text x="400" y="381" text-anchor="middle" font-size="10" fill="#333">Applies DES three times: 112-bit or 168-bit effective key strength</text>
  </g>
  
  <!-- Step 5: Comparison -->
  <g class="step" id="step5" data-narration="AES, the Advanced Encryption Standard, uses significantly longer keys of 128, 192, or 256 bits and performs much faster while remaining secure against all known practical attacks.">
    <rect x="50" y="405" width="340" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="427" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">DES</text>
    <text x="220" y="443" text-anchor="middle" font-size="9" fill="#333">56-bit key • 64-bit blocks</text>
    <text x="220" y="456" text-anchor="middle" font-size="9" fill="#f44336">No longer secure</text>
    
    <rect x="410" y="405" width="340" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="580" y="427" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">AES</text>
    <text x="580" y="443" text-anchor="middle" font-size="9" fill="#333">128/192/256-bit keys</text>
    <text x="580" y="456" text-anchor="middle" font-size="9" fill="#388e3c">Secure and fast</text>
  </g>
  
  <!-- Step 6: Summary -->
  <g class="step" id="step6" data-narration="The retirement of DES demonstrates why key length is critical for encryption security. Modern systems should always use AES with 256-bit keys to protect sensitive data effectively.">
    <rect x="50" y="475" width="700" height="55" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="498" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Key Lesson</text>
    <text x="400" y="516" text-anchor="middle" font-size="10" fill="#333">DES retirement shows why key length matters. Always use AES with 256-bit keys for sensitive data.</text>
  </g>
</svg>