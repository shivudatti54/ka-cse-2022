<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Substitution Ciphers: Caesar Cipher</text>

  <g id="step0" class="step" data-narration="A substitution cipher replaces each plaintext letter with another letter or symbol. The Caesar cipher is the simplest form, using a fixed shift.">
    <rect x="50" y="55" width="310" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="205" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Substitution Cipher</text>
    <text x="205" y="98" text-anchor="middle" font-size="12" fill="#333">Replace each letter with another</text>
    <rect x="440" y="55" width="310" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="595" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Caesar Cipher</text>
    <text x="595" y="98" text-anchor="middle" font-size="12" fill="#333">Fixed shift of K positions</text>
  </g>

  <g id="step1" class="step" data-narration="The encryption formula is C equals P plus K mod 26. Decryption reverses it: P equals C minus K mod 26. Letters map to numbers A=0 through Z=25.">
    <rect x="50" y="125" width="700" height="65" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Formulas (A=0, B=1, ..., Z=25)</text>
    <text x="250" y="175" text-anchor="middle" font-size="13" fill="#333">Encrypt: C = (P + K) mod 26</text>
    <text x="550" y="175" text-anchor="middle" font-size="13" fill="#333">Decrypt: P = (C - K) mod 26</text>
  </g>

  <g id="step2" class="step" data-narration="Example: Encrypt SECRET with key K=3. Each letter shifts right by 3 positions in the alphabet.">
    <text x="400" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Example: Encrypt "SECRET" with K=3</text>
    <rect x="50" y="228" width="110" height="130" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="105" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">S(18)+3=21</text>
    <text x="105" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">V</text>
    <text x="105" y="290" text-anchor="middle" font-size="11" fill="#333">E(4)+3=7</text>
    <text x="105" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">H</text>
    <text x="105" y="328" text-anchor="middle" font-size="11" fill="#333">C(2)+3=5</text>
    <text x="105" y="346" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">F</text>
    <rect x="175" y="228" width="110" height="130" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="230" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">R(17)+3=20</text>
    <text x="230" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">U</text>
    <text x="230" y="290" text-anchor="middle" font-size="11" fill="#333">E(4)+3=7</text>
    <text x="230" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">H</text>
    <text x="230" y="328" text-anchor="middle" font-size="11" fill="#333">T(19)+3=22</text>
    <text x="230" y="346" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">W</text>
    <rect x="310" y="260" width="180" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Result: VHFUHW</text>
  </g>

  <g id="step3" class="step" data-narration="The Caesar cipher is extremely weak because it only has 25 possible keys. A brute-force attack tries all shifts in seconds.">
    <text x="400" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">Cryptanalysis: Breaking Caesar Cipher</text>
    <rect x="50" y="405" width="340" height="60" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="220" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Brute-Force Attack</text>
    <text x="220" y="450" text-anchor="middle" font-size="12" fill="#333">Only 25 possible keys to try</text>
    <rect x="410" y="405" width="340" height="60" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="580" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Frequency Analysis</text>
    <text x="580" y="450" text-anchor="middle" font-size="12" fill="#333">Most common ciphertext letter = E</text>
  </g>

  <g id="step4" class="step" data-narration="Monoalphabetic ciphers use a random permutation with 26-factorial possible keys, but are still broken by frequency analysis because letter frequencies are preserved.">
    <rect x="50" y="480" width="700" height="50" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Monoalphabetic: 26! keys but still vulnerable</text>
    <text x="400" y="520" text-anchor="middle" font-size="12" fill="#333">Preserves letter frequencies -- defeated by frequency analysis</text>
  </g>

  <g id="step5" class="step" data-narration="Both Caesar and monoalphabetic ciphers are monoalphabetic, using one fixed substitution alphabet. This preserves language statistics, their fatal weakness.">
    <rect x="100" y="545" width="600" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="570" text-anchor="middle" font-size="13" fill="#388e3c">Weakness led to polyalphabetic ciphers (Vigenere) using multiple alphabets</text>
  </g>
</svg>
