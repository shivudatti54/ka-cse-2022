<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">One-Time Pad (Vernam Cipher)</text>

  <g id="step0" class="step" data-narration="The one-time pad is the only cipher proven to be theoretically unbreakable when used correctly.">
    <rect x="150" y="55" width="500" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#388e3c">Theoretically Unbreakable (Shannon, 1949)</text>
  </g>

  <g id="step1" class="step" data-narration="Plaintext and a truly random key of equal length are combined using XOR to produce the ciphertext.">
    <text x="200" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Encryption (XOR)</text>
    <rect x="50" y="135" width="300" height="32" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="200" y="156" text-anchor="middle" font-size="13" font-family="monospace" fill="#333">Plain:  H(72)  E(69)  L(76)  L(76)  O(79)</text>
    <rect x="50" y="172" width="300" height="32" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="200" y="193" text-anchor="middle" font-size="13" font-family="monospace" fill="#e65100">Key:    X(88)  M(77)  K(75)  L(76)  P(80)</text>
    <rect x="50" y="215" width="300" height="32" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="200" y="236" text-anchor="middle" font-size="13" font-family="monospace" fill="#9c27b0">XOR:      24      8     31      0     31</text>
  </g>

  <g id="step2" class="step" data-narration="XOR has a self-inverse property: applying the same key again recovers the original plaintext perfectly.">
    <text x="600" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Decryption (XOR again)</text>
    <rect x="440" y="135" width="310" height="32" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="595" y="156" text-anchor="middle" font-size="13" font-family="monospace" fill="#9c27b0">Cipher:   24      8     31      0     31</text>
    <rect x="440" y="172" width="310" height="32" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="595" y="193" text-anchor="middle" font-size="13" font-family="monospace" fill="#e65100">Key:    X(88)  M(77)  K(75)  L(76)  P(80)</text>
    <rect x="440" y="215" width="310" height="32" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="595" y="236" text-anchor="middle" font-size="13" font-family="monospace" fill="#388e3c">Plain:  H(72)  E(69)  L(76)  L(76)  O(79)</text>
  </g>

  <g id="step3" class="step" data-narration="XOR properties make it ideal: commutative, associative, self-inverse. A XOR A equals zero.">
    <rect x="250" y="265" width="300" height="100" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">XOR Properties</text>
    <text x="400" y="312" text-anchor="middle" font-size="12" fill="#333">A XOR B = B XOR A (commutative)</text>
    <text x="400" y="330" text-anchor="middle" font-size="12" fill="#333">A XOR 0 = A (identity) | A XOR A = 0</text>
    <text x="400" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">A XOR B XOR B = A (decryption!)</text>
  </g>

  <g id="step4" class="step" data-narration="Four strict requirements: truly random key, key at least as long as message, used only once, kept secret.">
    <text x="400" y="395" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Requirements for Perfect Secrecy</text>
    <rect x="30" y="410" width="175" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="117" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">1. Truly Random</text>
    <text x="117" y="452" text-anchor="middle" font-size="10" fill="#666">Not pseudorandom</text>
    <rect x="215" y="410" width="175" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="302" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">2. Key &gt;= Message</text>
    <text x="302" y="452" text-anchor="middle" font-size="10" fill="#666">At least as long</text>
    <rect x="400" y="410" width="175" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="487" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">3. Never Reuse</text>
    <text x="487" y="452" text-anchor="middle" font-size="10" fill="#666">One-time only</text>
    <rect x="585" y="410" width="175" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="672" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">4. Keep Secret</text>
    <text x="672" y="452" text-anchor="middle" font-size="10" fill="#666">Completely secret</text>
  </g>

  <g id="step5" class="step" data-narration="Practical challenges make OTP impractical: key distribution, generation, storage, and synchronization.">
    <text x="400" y="495" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">Practical Challenges</text>
    <rect x="50" y="505" width="160" height="40" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="130" y="530" text-anchor="middle" font-size="11" fill="#f44336">Key Distribution</text>
    <rect x="225" y="505" width="160" height="40" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="305" y="530" text-anchor="middle" font-size="11" fill="#f44336">Key Generation</text>
    <rect x="400" y="505" width="160" height="40" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="480" y="530" text-anchor="middle" font-size="11" fill="#f44336">Key Storage</text>
    <rect x="575" y="505" width="170" height="40" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="660" y="530" text-anchor="middle" font-size="11" fill="#f44336">Synchronization</text>
  </g>

  <g id="step6" class="step" data-narration="Without the key, any plaintext of the same length is equally likely. Theoretically perfect but practically unusable.">
    <rect x="100" y="555" width="600" height="35" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="577" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Theoretically perfect, but practically unusable for most applications</text>
  </g>
</svg>
