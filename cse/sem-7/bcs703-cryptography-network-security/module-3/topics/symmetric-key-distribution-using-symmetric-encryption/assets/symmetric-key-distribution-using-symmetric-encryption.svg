<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers how symmetric keys are distributed securely between parties like Alice and Bob using symmetric encryption protocols today.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">Symmetric Key Distribution using Symmetric Encryption</text>
  </g>
  
  <g class="step" id="step1" data-narration="The key exchange problem: Alice and Bob need to share a secret key over an insecure channel where Eve can eavesdrop.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Exchange Problem</text>
    <rect x="40" y="95" width="100" height="35" fill="#e3f2fd" rx="3"/>
    <text x="90" y="112" font-family="Arial" font-size="10" fill="#1976d2" text-anchor="middle">Alice</text>
    <text x="90" y="123" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Sender</text>
    <line x1="140" y1="112" x2="260" y2="112" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="200" y="105" font-family="Arial" font-size="9" fill="#f44336">Insecure Channel</text>
    <rect x="270" y="95" width="100" height="35" fill="#ffebee" rx="3"/>
    <text x="320" y="112" font-family="Arial" font-size="10" fill="#f44336" text-anchor="middle">Eve</text>
    <text x="320" y="123" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Eavesdropper</text>
    <rect x="440" y="95" width="100" height="35" fill="#e8f5e9" rx="3"/>
    <text x="490" y="112" font-family="Arial" font-size="10" fill="#388e3c" text-anchor="middle">Bob</text>
    <text x="490" y="123" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Receiver</text>
    <line x1="540" y1="112" x2="660" y2="112" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="600" y="105" font-family="Arial" font-size="9" fill="#388e3c">Secure Key Needed</text>
  </g>
  
  <g class="step" id="step2" data-narration="Key Pre-Distribution: A trusted third party generates and distributes key sets to parties in advance of any actual communication begins securely.">
    <rect x="20" y="146" width="760" height="89" fill="#ffffff" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Protocol 1: Key Pre-Distribution</text>
    <rect x="40" y="185" width="120" height="35" fill="#fff3e0" rx="3"/>
    <text x="100" y="202" font-family="Arial" font-size="10" fill="#ff9800" text-anchor="middle">Trusted Third Party</text>
    <text x="100" y="215" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Generates Keys</text>
    <line x1="160" y1="202" x2="220" y2="202" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="290" y="185" width="80" height="35" fill="#e3f2fd" rx="3"/>
    <text x="330" y="202" font-family="Arial" font-size="10" fill="#1976d2" text-anchor="middle">Alice</text>
    <text x="330" y="215" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Key Set A</text>
    <rect x="470" y="185" width="80" height="35" fill="#e8f5e9" rx="3"/>
    <text x="510" y="202" font-family="Arial" font-size="10" fill="#388e3c" text-anchor="middle">Bob</text>
    <text x="510" y="215" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Key Set B</text>
    <text x="620" y="202" font-family="Arial" font-size="9" fill="#666">Limitation: Requires</text>
    <text x="620" y="215" font-family="Arial" font-size="9" fill="#666">trusted party, not</text>
    <text x="620" y="228" font-family="Arial" font-size="9" fill="#666">scalable for large networks</text>
  </g>
  
  <g class="step" id="step3" data-narration="Protocol 2: Key Exchange using Shared Secret. If Alice and Bob share an initial secret, they can encrypt new keys.">
    <rect x="20" y="243" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="265" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Protocol 2: Key Exchange using Shared Secret</text>
    <rect x="40" y="284" width="180" height="35" fill="#f3e5f5" rx="3"/>
    <text x="130" y="301" font-family="Arial" font-size="10" fill="#9c27b0" text-anchor="middle">Alice</text>
    <text x="130" y="314" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Has Shared Secret Key</text>
    <line x1="220" y1="301" x2="280" y2="301" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="290" y="284" width="220" height="35" fill="#fff3e0" rx="3"/>
    <text x="400" y="301" font-family="Arial" font-size="10" fill="#ff9800" text-anchor="middle">Encrypted Key Exchange</text>
    <text x="400" y="314" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">E(SharedSecret, NewKey)</text>
    <line x1="510" y1="301" x2="570" y2="301" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="580" y="284" width="180" height="35" fill="#e8f5e9" rx="3"/>
    <text x="670" y="301" font-family="Arial" font-size="10" fill="#388e3c" text-anchor="middle">Bob</text>
    <text x="670" y="314" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Decrypts with Shared Key</text>
  </g>
  
  <g class="step" id="step4" data-narration="Kerberos Protocol uses a Key Distribution Center (KDC) to securely generate and distribute session keys between parties in a trusted manner for authentication.">
    <rect x="20" y="331" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="353" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Protocol 3: Kerberos Protocol</text>
    <rect x="40" y="369" width="100" height="40" fill="#e8f5e9" rx="3"/>
    <text x="90" y="387" font-family="Arial" font-size="10" fill="#388e3c" text-anchor="middle">Alice</text>
    <line x1="140" y1="389" x2="200" y2="389" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="210" y="369" width="120" height="40" fill="#fff3e0" rx="3"/>
    <text x="270" y="387" font-family="Arial" font-size="10" fill="#ff9800" text-anchor="middle">KDC</text>
    <text x="270" y="401" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Key Distribution Center</text>
    <line x1="330" y1="389" x2="390" y2="389" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="400" y="369" width="100" height="40" fill="#e3f2fd" rx="3"/>
    <text x="450" y="387" font-family="Arial" font-size="10" fill="#1976d2" text-anchor="middle">Session Key</text>
    <text x="450" y="401" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">For Alice and Bob</text>
    <line x1="500" y1="389" x2="560" y2="389" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="570" y="369" width="100" height="40" fill="#e8f5e9" rx="3"/>
    <text x="620" y="387" font-family="Arial" font-size="10" fill="#388e3c" text-anchor="middle">Bob</text>
    <text x="620" y="401" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Receives Session Key</text>
  </g>
  
  <g class="step" id="step5" data-narration="Security considerations in key distribution include key management complexity, secure key exchange challenges, key compromise risks, and ensuring the integrity of cryptographic key handling procedures.">
    <rect x="20" y="419" width="760" height="80" fill="#ffffff" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="441" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Security Considerations</text>
    <rect x="40" y="457" width="230" height="38" fill="#ffebee" rx="3"/>
    <text x="155" y="474" font-family="Arial" font-size="10" fill="#f44336" text-anchor="middle">Key Management</text>
    <text x="155" y="489" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Managing many keys is challenging</text>
    <rect x="285" y="457" width="230" height="38" fill="#fff3e0" rx="3"/>
    <text x="400" y="474" font-family="Arial" font-size="10" fill="#ff9800" text-anchor="middle">Key Exchange Security</text>
    <text x="400" y="489" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Secure exchange is critical</text>
    <rect x="530" y="457" width="230" height="38" fill="#f3e5f5" rx="3"/>
    <text x="645" y="474" font-family="Arial" font-size="10" fill="#9c27b0" text-anchor="middle">Key Compromise</text>
    <text x="645" y="489" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">All encrypted messages vulnerable</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key points: Symmetric distribution shares secret keys; Kerberos uses KDC; main challenges are key management, secure exchange, and compromise prevention for exam success.">
    <rect x="20" y="507" width="760" height="83" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="529" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Summary and Key Definitions</text>
    <rect x="40" y="544" width="180" height="40" fill="#e3f2fd" rx="3"/>
    <text x="130" y="559" font-family="Arial" font-size="9" fill="#1976d2" text-anchor="middle">Symmetric Key Distribution</text>
    <text x="130" y="574" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Sharing secret keys</text>
    <rect x="235" y="544" width="180" height="40" fill="#e8f5e9" rx="3"/>
    <text x="325" y="559" font-family="Arial" font-size="9" fill="#388e3c" text-anchor="middle">Key Exchange Problem</text>
    <text x="325" y="574" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Secure key sharing needed</text>
    <rect x="430" y="544" width="180" height="40" fill="#fff3e0" rx="3"/>
    <text x="520" y="559" font-family="Arial" font-size="9" fill="#ff9800" text-anchor="middle">Kerberos Protocol</text>
    <text x="520" y="574" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">KDC for distribution</text>
    <rect x="625" y="544" width="135" height="40" fill="#f3e5f5" rx="3"/>
    <text x="692" y="559" font-family="Arial" font-size="9" fill="#9c27b0" text-anchor="middle">Exam Tips</text>
    <text x="692" y="574" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Know protocols well</text>
  </g>
</svg>