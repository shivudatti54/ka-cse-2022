<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="X.509 certificates are digital documents that securely bind public keys to entities, enabling trusted internet communication through Public Key Infrastructure.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">X.509 Certificates</text>
  </g>

  <!-- step1: Introduction -->
  <g class="step" id="step1" data-narration="An X.509 certificate is a digital document binding a public key to an entity like a person, organization, or device for secure communication.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is X.509 Certificate?</text>
    <rect x="40" y="88" width="720" height="40" fill="#e3f2fd" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#333">A digital document that binds a public key to an entity (person, organization, or device)</text>
    <text x="50" y="116" font-family="Arial" font-size="10" fill="#333">Ensures secure communication over the internet through Public Key Infrastructure (PKI)</text>
  </g>

  <!-- step2: Structure -->
  <g class="step" id="step2" data-narration="The structure includes Subject, Issuer, Public Key, Serial Number, Validity Period, and Extensions. Certificates are encoded in ASN.1 format, often as Base64.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Certificate Structure</text>
    <rect x="40" y="176" width="150" height="40" fill="#e8f5e9" rx="3"/>
    <text x="50" y="188" font-family="Arial" font-size="9" fill="#333">Subject</text>
    <text x="50" y="202" font-family="Arial" font-size="8" fill="#666">Issuer name, org, location</text>
    <rect x="200" y="176" width="150" height="40" fill="#e8f5e9" rx="3"/>
    <text x="210" y="188" font-family="Arial" font-size="9" fill="#333">Public Key</text>
    <text x="210" y="202" font-family="Arial" font-size="8" fill="#666">Associated with subject</text>
    <rect x="360" y="176" width="150" height="40" fill="#e8f5e9" rx="3"/>
    <text x="370" y="188" font-family="Arial" font-size="9" fill="#333">Serial Number</text>
    <text x="370" y="202" font-family="Arial" font-size="8" fill="#666">Unique ID from issuer</text>
    <rect x="520" y="176" width="150" height="40" fill="#e8f5e9" rx="3"/>
    <text x="530" y="188" font-family="Arial" font-size="9" fill="#333">Validity Period</text>
    <text x="530" y="202" font-family="Arial" font-size="8" fill="#666">Start and expiry dates</text>
    <rect x="680" y="176" width="90" height="40" fill="#e8f5e9" rx="3"/>
    <text x="690" y="188" font-family="Arial" font-size="9" fill="#333">Extensions</text>
    <text x="690" y="202" font-family="Arial" font-size="8" fill="#666">Additional info</text>
  </g>

  <!-- step3: Types -->
  <g class="step" id="step3" data-narration="The four main certificate types include Self-signed (same entity signs), CA-signed (trusted authority), End-entity (issued to users/devices), and Intermediate (used for signing other certificates).">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Types of X.509 Certificates</text>
    <rect x="40" y="264" width="170" height="40" fill="#fff3e0" rx="3"/>
    <text x="50" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Self-Signed</text>
    <text x="50" y="292" font-family="Arial" font-size="8" fill="#333">Signed by same entity</text>
    <rect x="220" y="264" width="170" height="40" fill="#fff3e0" rx="3"/>
    <text x="230" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">CA-Signed</text>
    <text x="230" y="292" font-family="Arial" font-size="8" fill="#333">Signed by trusted CA</text>
    <rect x="400" y="264" width="170" height="40" fill="#fff3e0" rx="3"/>
    <text x="410" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">End-Entity</text>
    <text x="410" y="292" font-family="Arial" font-size="8" fill="#333">Issued to users/devices</text>
    <rect x="580" y="264" width="170" height="40" fill="#fff3e0" rx="3"/>
    <text x="590" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Intermediate</text>
    <text x="590" y="292" font-family="Arial" font-size="8" fill="#333">Signs other certificates</text>
  </g>

  <!-- step4: Certificate Chain -->
  <g class="step" id="step4" data-narration="A certificate chain verifies public key authenticity by linking Root CA (self-signed) to Intermediate CA, then to End-entity certificate through trust validation.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Certificate Chain</text>
    <rect x="40" y="355" width="200" height="35" fill="#f3e5f5" rx="3"/>
    <text x="140" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Root CA Certificate</text>
    <text x="140" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(self-signed)</text>
    <line x1="200" y1="372" x2="280" y2="372" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="290" y="355" width="220" height="35" fill="#f3e5f5" rx="3"/>
    <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Intermediate CA Certificate</text>
    <text x="400" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(signed by Root CA)</text>
    <line x1="450" y1="372" x2="530" y2="372" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="540" y="355" width="200" height="35" fill="#f3e5f5" rx="3"/>
    <text x="640" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">End-Entity Certificate</text>
    <text x="640" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(signed by Intermediate)</text>
  </g>

  <!-- step5: Usage -->
  <g class="step" id="step5" data-narration="X.509 certificates enable secure web browsing (HTTPS), email encryption (S/MIME), VPN authentication for private networks, and digital code signing for software verification.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Applications of X.509 Certificates</text>
    <rect x="40" y="445" width="230" height="35" fill="#ffebee" rx="3"/>
    <text x="155" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Secure Web Browsing</text>
    <text x="155" y="473" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">HTTPS connections</text>
    <rect x="285" y="445" width="230" height="35" fill="#ffebee" rx="3"/>
    <text x="400" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Email Encryption</text>
    <text x="400" y="473" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">S/MIME encryption</text>
    <rect x="530" y="445" width="230" height="35" fill="#ffebee" rx="3"/>
    <text x="645" y="460" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">VPN Authentication</text>
    <text x="645" y="473" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Secure tunnel access</text>
  </g>

  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Essential exam tips include understanding all certificate fields, mastering chain verification steps, familiarizing with encoding formats like ASN.1 and Base64, and practicing identification of common certificate problems.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Points</text>
    <rect x="40" y="530" width="350" height="48" fill="#e3f2fd" rx="3"/>
    <text x="50" y="545" font-family="Arial" font-size="9" fill="#333">• Understand certificate structure and all fields</text>
    <text x="50" y="560" font-family="Arial" font-size="9" fill="#333">• Know the four certificate types and purposes</text>
    <text x="50" y="575" font-family="Arial" font-size="9" fill="#333">• Explain certificate chain verification process</text>
    <rect x="405" y="530" width="350" height="48" fill="#e3f2fd" rx="3"/>
    <text x="415" y="545" font-family="Arial" font-size="9" fill="#333">• Remember encoding formats: ASN.1, Base64, Hex</text>
    <text x="415" y="560" font-family="Arial" font-size="9" fill="#333">• Practice verifying certificate chains</text>
    <text x="415" y="575" font-family="Arial" font-size="9" fill="#333">• Know usage in HTTPS, Email, and VPN</text>
  </g>
</svg>