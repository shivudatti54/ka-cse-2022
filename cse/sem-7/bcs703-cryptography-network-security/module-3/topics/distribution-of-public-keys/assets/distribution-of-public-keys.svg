<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Distribution of Public Keys</text>

  <!-- Step 0: Core Problem -->
  <g id="step0" class="step" data-narration="The fundamental challenge in public-key cryptography is authenticating that a public key truly belongs to its claimed owner. Without verification, an attacker can substitute their own key in a man-in-the-middle attack.">
    <rect x="80" y="55" width="640" height="55" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">Core Problem: How do you trust a public key is authentic?</text>
    <text x="400" y="98" text-anchor="middle" font-size="11" fill="#555">Without verification, Mallory can substitute her key for Bob's (Man-in-the-Middle)</text>
  </g>

  <!-- Step 1: Method 1 - Public Announcement -->
  <g id="step1" class="step" data-narration="The simplest method is public announcement, where users broadcast their keys via email or forums. This is insecure because anyone can forge an announcement claiming a key belongs to someone else.">
    <rect x="40" y="125" width="350" height="75" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="215" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Method 1: Public Announcement</text>
    <text x="215" y="168" text-anchor="middle" font-size="11" fill="#555">Broadcast key via email, forum, or website</text>
    <rect x="115" y="178" width="80" height="16" rx="3" fill="#f44336"/>
    <text x="155" y="190" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">INSECURE</text>
    <text x="260" y="190" font-size="9" fill="#f44336">No way to verify authenticity</text>
  </g>

  <!-- Step 2: Method 2 - Public Directory -->
  <g id="step2" class="step" data-narration="A publicly available directory maintained by a trusted authority stores name-to-key mappings. Users register in person. This is better but the directory is a single point of failure and attack.">
    <rect x="410" y="125" width="350" height="75" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="585" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Method 2: Public Directory</text>
    <text x="585" y="168" text-anchor="middle" font-size="11" fill="#555">Trusted authority maintains {name, key} database</text>
    <rect x="500" y="178" width="80" height="16" rx="3" fill="#ff9800"/>
    <text x="540" y="190" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">MODERATE</text>
    <text x="620" y="190" font-size="9" fill="#ff9800">Single point of failure</text>
  </g>

  <!-- Step 3: Method 3 - PKI with CA -->
  <g id="step3" class="step" data-narration="Public Key Infrastructure uses Certificate Authorities that issue digitally signed X.509 certificates. The CA verifies identity and binds the public key to the owner, creating a hierarchy of trust.">
    <rect x="40" y="215" width="440" height="120" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="260" y="238" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Method 3: PKI (Standard Solution)</text>
    <rect x="60" y="250" width="80" height="35" rx="6" fill="#388e3c"/>
    <text x="100" y="272" text-anchor="middle" font-size="10" fill="#fff">Bob</text>
    <line x1="140" y1="267" x2="185" y2="267" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="163" y="260" text-anchor="middle" font-size="8" fill="#388e3c">CSR</text>
    <rect x="188" y="250" width="90" height="35" rx="6" fill="#1565c0"/>
    <text x="233" y="265" text-anchor="middle" font-size="10" fill="#fff">CA verifies</text>
    <text x="233" y="278" text-anchor="middle" font-size="10" fill="#fff">identity</text>
    <line x1="278" y1="267" x2="323" y2="267" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="300" y="260" text-anchor="middle" font-size="8" fill="#388e3c">signs</text>
    <rect x="326" y="250" width="130" height="35" rx="6" fill="#388e3c"/>
    <text x="391" y="265" text-anchor="middle" font-size="10" fill="#fff">X.509 Certificate</text>
    <text x="391" y="278" text-anchor="middle" font-size="9" fill="#ddd">(ID + PubKey + CA sig)</text>
    <text x="260" y="310" text-anchor="middle" font-size="11" fill="#388e3c" font-weight="bold">Scalable, hierarchical trust - used in SSL/TLS</text>
    <text x="260" y="325" text-anchor="middle" font-size="10" fill="#555">Browser trust stores contain pre-installed root CA keys</text>
  </g>

  <!-- Step 4: Method 4 - Web of Trust -->
  <g id="step4" class="step" data-narration="The Web of Trust, used by PGP, is a decentralized alternative where users sign each other's keys. If Alice trusts Bob and Bob signs Charlie's key, Alice may trust Charlie. It is flexible but less scalable.">
    <rect x="500" y="215" width="260" height="120" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="630" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Method 4: Web of Trust</text>
    <circle cx="545" cy="275" r="16" fill="#9c27b0"/>
    <text x="545" y="280" text-anchor="middle" font-size="8" fill="#fff">Alice</text>
    <circle cx="630" cy="260" r="16" fill="#9c27b0"/>
    <text x="630" y="265" text-anchor="middle" font-size="8" fill="#fff">Bob</text>
    <circle cx="715" cy="275" r="16" fill="#9c27b0"/>
    <text x="715" y="280" text-anchor="middle" font-size="8" fill="#fff">Charlie</text>
    <line x1="561" y1="272" x2="614" y2="263" stroke="#9c27b0" stroke-width="1.5"/>
    <line x1="646" y1="263" x2="699" y2="272" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="630" y="310" text-anchor="middle" font-size="10" fill="#555">Users sign each other's keys</text>
    <text x="630" y="325" text-anchor="middle" font-size="10" fill="#9c27b0">Decentralized (PGP), less scalable</text>
  </g>

  <!-- Step 5: Comparison Table -->
  <g id="step5" class="step" data-narration="Comparing all four methods: Public Announcement is insecure, Directory is moderate, PKI is the standard scalable solution, and Web of Trust is decentralized but less scalable for enterprise use.">
    <rect x="40" y="355" width="720" height="130" rx="10" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Comparison of Distribution Methods</text>
    <line x1="60" y1="388" x2="740" y2="388" stroke="#ccc" stroke-width="1"/>
    <text x="120" y="402" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Method</text>
    <text x="310" y="402" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Trust Model</text>
    <text x="500" y="402" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Security</text>
    <text x="660" y="402" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Scalability</text>
    <line x1="60" y1="408" x2="740" y2="408" stroke="#eee" stroke-width="1"/>
    <text x="120" y="422" text-anchor="middle" font-size="10" fill="#555">Announcement</text>
    <text x="310" y="422" text-anchor="middle" font-size="10" fill="#555">None</text>
    <text x="500" y="422" text-anchor="middle" font-size="10" fill="#f44336">Very Low</text>
    <text x="660" y="422" text-anchor="middle" font-size="10" fill="#555">High</text>
    <text x="120" y="438" text-anchor="middle" font-size="10" fill="#555">Directory</text>
    <text x="310" y="438" text-anchor="middle" font-size="10" fill="#555">Central authority</text>
    <text x="500" y="438" text-anchor="middle" font-size="10" fill="#ff9800">Medium</text>
    <text x="660" y="438" text-anchor="middle" font-size="10" fill="#555">Medium</text>
    <text x="120" y="454" text-anchor="middle" font-size="10" fill="#555">PKI (CA)</text>
    <text x="310" y="454" text-anchor="middle" font-size="10" fill="#555">Hierarchical CAs</text>
    <text x="500" y="454" text-anchor="middle" font-size="10" fill="#388e3c" font-weight="bold">High</text>
    <text x="660" y="454" text-anchor="middle" font-size="10" fill="#388e3c" font-weight="bold">High</text>
    <text x="120" y="470" text-anchor="middle" font-size="10" fill="#555">Web of Trust</text>
    <text x="310" y="470" text-anchor="middle" font-size="10" fill="#555">Peer-to-peer</text>
    <text x="500" y="470" text-anchor="middle" font-size="10" fill="#388e3c">High</text>
    <text x="660" y="470" text-anchor="middle" font-size="10" fill="#ff9800">Low</text>
  </g>

  <!-- Step 6: Key Takeaway -->
  <g id="step6" class="step" data-narration="The key takeaway is that digital certificates issued by trusted CAs are the standard solution for public key distribution. They bind identity to public key and are foundational to HTTPS and secure internet communication.">
    <rect x="80" y="505" width="640" height="70" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="400" y="530" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Key Takeaway</text>
    <text x="400" y="550" text-anchor="middle" font-size="12" fill="#555">Digital certificates (X.509) from trusted CAs are the standard for web security.</text>
    <text x="400" y="566" text-anchor="middle" font-size="11" fill="#555">They enable HTTPS, SSL/TLS, and all secure internet communication today.</text>
  </g>
</svg>
