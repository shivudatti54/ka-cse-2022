<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <g id="step1" class="step" data-narration="Pseudorandom Number Generators produce sequences of numbers that appear random but are generated by deterministic algorithms from a seed value.">
    <text x="400" y="38" font-size="21" font-weight="bold" fill="#1565c0" text-anchor="middle">Pseudorandom Number Generators</text>
    <rect x="200" y="52" width="400" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="400" y="71" font-size="9" fill="#1565c0" text-anchor="middle">Deterministic algorithms that produce apparently random sequences from a seed</text>
  </g>

  <!-- TRNG vs PRNG -->
  <g id="step2" class="step" data-narration="True random number generators use physical sources like thermal noise or radioactive decay. PRNGs use algorithms and are faster and reproducible, but deterministic.">
    <text x="400" y="100" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">TRNG vs PRNG</text>

    <rect x="50" y="110" width="320" height="62" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="210" y="128" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">True RNG (TRNG)</text>
    <text x="210" y="142" font-size="8" fill="#455a64" text-anchor="middle">Source: Physical phenomena (thermal noise, decay)</text>
    <text x="210" y="154" font-size="8" fill="#455a64" text-anchor="middle">Non-deterministic, slow, non-reproducible</text>
    <text x="210" y="166" font-size="8" fill="#2e7d32" text-anchor="middle">Truly unpredictable</text>

    <rect x="430" y="110" width="320" height="62" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="590" y="128" font-size="10" font-weight="bold" fill="#1565c0" text-anchor="middle">Pseudo RNG (PRNG)</text>
    <text x="590" y="142" font-size="8" fill="#455a64" text-anchor="middle">Source: Deterministic algorithm + seed</text>
    <text x="590" y="154" font-size="8" fill="#455a64" text-anchor="middle">Deterministic, fast, reproducible</text>
    <text x="590" y="166" font-size="8" fill="#c62828" text-anchor="middle">Predictable if seed is known</text>
  </g>

  <!-- PRNG Architecture -->
  <g id="step3" class="step" data-narration="A PRNG takes a seed as input, runs it through a deterministic algorithm that maintains internal state, and outputs a stream of pseudorandom bits.">
    <text x="400" y="195" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">PRNG Architecture</text>

    <rect x="60" y="208" width="100" height="36" rx="6" fill="#6a1b9a"/>
    <text x="110" y="230" font-size="10" fill="#ffffff" text-anchor="middle">Seed</text>
    <line x1="163" y1="226" x2="215" y2="226" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="218" y="204" width="160" height="44" rx="6" fill="#1565c0"/>
    <text x="298" y="222" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">Deterministic</text>
    <text x="298" y="236" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">Algorithm</text>
    <line x1="381" y1="226" x2="433" y2="226" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="436" y="204" width="140" height="44" rx="6" fill="#e65100"/>
    <text x="506" y="222" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">Internal State</text>
    <text x="506" y="236" font-size="9" fill="#ffe0b2" text-anchor="middle">Updated each iteration</text>
    <line x1="579" y1="226" x2="631" y2="226" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="634" y="208" width="120" height="36" rx="6" fill="#2e7d32"/>
    <text x="694" y="230" font-size="10" fill="#ffffff" text-anchor="middle">Output Stream</text>
  </g>

  <!-- Randomness Tests -->
  <g id="step4" class="step" data-narration="PRNGs must pass statistical tests for randomness including frequency test, runs test, autocorrelation test, and the Maurer universal test.">
    <text x="400" y="272" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Statistical Randomness Tests</text>

    <rect x="40" y="282" width="165" height="42" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
    <text x="122" y="298" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">Frequency Test</text>
    <text x="122" y="312" font-size="8" fill="#455a64" text-anchor="middle">Equal proportion of 0s and 1s</text>

    <rect x="220" y="282" width="165" height="42" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
    <text x="302" y="298" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">Runs Test</text>
    <text x="302" y="312" font-size="8" fill="#455a64" text-anchor="middle">Expected run lengths</text>

    <rect x="400" y="282" width="175" height="42" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
    <text x="487" y="298" font-size="9" font-weight="bold" fill="#1565c0" text-anchor="middle">Autocorrelation Test</text>
    <text x="487" y="312" font-size="8" fill="#455a64" text-anchor="middle">No pattern between shifts</text>

    <rect x="590" y="282" width="170" height="42" rx="5" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
    <text x="675" y="298" font-size="9" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Maurer Universal</text>
    <text x="675" y="312" font-size="8" fill="#455a64" text-anchor="middle">Compressibility check</text>
  </g>

  <!-- CSPRNG Requirements -->
  <g id="step5" class="step" data-narration="A Cryptographically Secure PRNG must also satisfy forward secrecy meaning you cannot predict future outputs and backward secrecy meaning you cannot recover past outputs.">
    <text x="400" y="348" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Cryptographically Secure PRNG (CSPRNG) Requirements</text>

    <rect x="60" y="358" width="320" height="48" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1.2"/>
    <text x="220" y="376" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Forward Secrecy</text>
    <text x="220" y="392" font-size="8" fill="#455a64" text-anchor="middle">Cannot predict future outputs from past outputs</text>

    <rect x="420" y="358" width="320" height="48" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.2"/>
    <text x="580" y="376" font-size="10" font-weight="bold" fill="#c62828" text-anchor="middle">Backward Secrecy</text>
    <text x="580" y="392" font-size="8" fill="#455a64" text-anchor="middle">Cannot recover past outputs if state is compromised</text>
  </g>

  <!-- Common PRNG Algorithms -->
  <g id="step6" class="step" data-narration="Common PRNG algorithms include Linear Congruential Generators which are fast but insecure, Linear Feedback Shift Registers used in stream ciphers, and the Blum Blum Shub generator which is cryptographically secure.">
    <text x="400" y="430" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Common PRNG Algorithms</text>

    <rect x="40" y="440" width="225" height="52" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="152" y="458" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">LCG</text>
    <text x="152" y="472" font-size="8" fill="#455a64" text-anchor="middle">X(n+1) = (aXn + c) mod m</text>
    <text x="152" y="484" font-size="8" fill="#c62828" text-anchor="middle">Fast but NOT cryptographically secure</text>

    <rect x="288" y="440" width="225" height="52" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
    <text x="400" y="458" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">LFSR</text>
    <text x="400" y="472" font-size="8" fill="#455a64" text-anchor="middle">Linear Feedback Shift Register</text>
    <text x="400" y="484" font-size="8" fill="#455a64" text-anchor="middle">Used in stream ciphers (A5/1, etc.)</text>

    <rect x="536" y="440" width="225" height="52" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="648" y="458" font-size="10" font-weight="bold" fill="#1565c0" text-anchor="middle">BBS Generator</text>
    <text x="648" y="472" font-size="8" fill="#455a64" text-anchor="middle">X(n+1) = X(n)^2 mod n</text>
    <text x="648" y="484" font-size="8" fill="#2e7d32" text-anchor="middle">Cryptographically secure (based on QRP)</text>
  </g>

  <!-- Cryptographic Applications -->
  <g id="step7" class="step" data-narration="PRNGs are critical in cryptography for session key generation, nonce generation for challenge-response protocols, RSA prime generation, and initialization vectors for block cipher modes.">
    <text x="400" y="516" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Cryptographic Applications of PRNGs</text>

    <rect x="40" y="526" width="165" height="32" rx="5" fill="#1565c0"/>
    <text x="122" y="546" font-size="9" fill="#ffffff" text-anchor="middle">Session Key Generation</text>

    <rect x="220" y="526" width="165" height="32" rx="5" fill="#2e7d32"/>
    <text x="302" y="546" font-size="9" fill="#ffffff" text-anchor="middle">Nonce Generation</text>

    <rect x="400" y="526" width="165" height="32" rx="5" fill="#e65100"/>
    <text x="482" y="546" font-size="9" fill="#ffffff" text-anchor="middle">RSA Prime Generation</text>

    <rect x="580" y="526" width="180" height="32" rx="5" fill="#6a1b9a"/>
    <text x="670" y="546" font-size="9" fill="#ffffff" text-anchor="middle">Initialization Vectors (IVs)</text>
  </g>

  <!-- Security Warning -->
  <g id="step8" class="step" data-narration="The security of the entire cryptosystem depends on the quality of random numbers. A weak PRNG can compromise even the strongest encryption algorithm.">
    <rect x="100" y="568" width="600" height="26" rx="5" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
    <text x="400" y="586" font-size="9" font-weight="bold" fill="#c62828" text-anchor="middle">Security of the entire cryptosystem depends on PRNG quality -- weak PRNG breaks strong encryption</text>
  </g>
</svg>
