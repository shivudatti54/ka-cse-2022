<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Man-in-the-middle attack is a dangerous cyber threat where attackers secretly intercept and alter communications between two parties to steal sensitive data.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Man-in-the-middle Attack</text>
  </g>
  
  <g class="step" id="step1" data-narration="In a MITM attack, the attacker secretly positions themselves between the victim and the intended recipient, intercepting and monitoring all communication.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is MITM Attack?</text>
    <rect x="40" y="88" width="720" height="42" fill="white" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#333">Attacker secretly intercepts and may alter</text>
    <text x="50" y="116" font-family="Arial" font-size="10" fill="#333">communication between two parties.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Types of MITM attacks include active eavesdropping which modifies data, passive eavesdropping which only reads, SSL stripping to downgrade connections, and Wi-Fi eavesdropping on compromised networks.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Types of MITM Attacks</text>
    <rect x="40" y="176" width="170" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="50" y="188" font-family="Arial" font-size="9" fill="#333">Active Eavesdropping</text>
    <text x="50" y="200" font-family="Arial" font-size="8" fill="#666">Intercepts and modifies data</text>
    <rect x="220" y="176" width="170" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="230" y="188" font-family="Arial" font-size="9" fill="#333">Passive Eavesdropping</text>
    <text x="230" y="200" font-family="Arial" font-size="8" fill="#666">Only reads, no modification</text>
    <rect x="400" y="176" width="170" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="410" y="188" font-family="Arial" font-size="9" fill="#333">SSL Stripping</text>
    <text x="410" y="200" font-family="Arial" font-size="8" fill="#666">Downgrades HTTPS to HTTP</text>
    <rect x="580" y="176" width="180" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="590" y="188" font-family="Arial" font-size="9" fill="#333">Wi-Fi Eavesdropping</text>
    <text x="590" y="200" font-family="Arial" font-size="8" fill="#666">Uses compromised Wi-Fi</text>
  </g>
  
  <g class="step" id="step3" data-narration="Alice sends a message to Bob, but Charlie intercepts it, reads or modifies it, then forwards the altered message to Bob.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Attack Example: Alice → Charlie → Bob</text>
    <rect x="40" y="264" width="100" height="42" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="90" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2" text-anchor="middle">Alice</text>
    <line x1="140" y1="285" x2="180" y2="285" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="190" y="264" width="100" height="42" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="4"/>
    <text x="240" y="278" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336" text-anchor="middle">CHARLIE</text>
    <text x="240" y="290" font-family="Arial" font-size="8" fill="#f44336" text-anchor="middle">(Attacker)</text>
    <line x1="290" y1="285" x2="330" y2="285" stroke="#f44336" stroke-width="2" stroke-dasharray="4"/>
    <rect x="340" y="264" width="100" height="42" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="390" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Bob</text>
    <line x1="440" y1="285" x2="660" y2="285" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="550" y="278" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Modified message</text>
  </g>
  
  <g class="step" id="step4" data-narration="To prevent MITM attacks, use HTTPS and TLS encryption, implement digital signatures for data integrity, and always verify the recipient's identity before sharing sensitive information.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Prevention Methods</text>
    <rect x="40" y="352" width="170" height="42" fill="white" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="50" y="366" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Secure Protocols</text>
    <text x="50" y="380" font-family="Arial" font-size="8" fill="#666">Use HTTPS, TLS/SSL</text>
    <rect x="220" y="352" width="170" height="42" fill="white" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="230" y="366" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Encryption</text>
    <text x="230" y="380" font-family="Arial" font-size="8" fill="#666">Encrypt all sensitive data</text>
    <rect x="400" y="352" width="170" height="42" fill="white" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="410" y="366" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Digital Signatures</text>
    <text x="410" y="380" font-family="Arial" font-size="8" fill="#666">Verify data integrity</text>
    <rect x="580" y="352" width="180" height="42" fill="white" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="590" y="366" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Identity Verification</text>
    <text x="590" y="380" font-family="Arial" font-size="8" fill="#666">Verify recipient authenticity</text>
  </g>
  
  <g class="step" id="step5" data-narration="Detection techniques include certificate pinning to verify SSL certificates, public key pinning to confirm website authenticity, and hash-based authentication to ensure data integrity.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Detection Techniques</text>
    <rect x="40" y="440" width="230" height="42" fill="white" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="50" y="454" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Certificate Pinning</text>
    <text x="50" y="468" font-family="Arial" font-size="8" fill="#666">Verify SSL certificate authenticity</text>
    <rect x="280" y="440" width="230" height="42" fill="white" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="290" y="454" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Public Key Pinning</text>
    <text x="290" y="468" font-family="Arial" font-size="8" fill="#666">Verify website public key</text>
    <rect x="520" y="440" width="240" height="42" fill="white" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="530" y="454" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Hash-based Authentication</text>
    <text x="530" y="468" font-family="Arial" font-size="8" fill="#666">Verify data integrity using hash</text>
  </g>
  
  <g class="step" id="step6" data-narration="MITM attacks compromise confidentiality, integrity, and authenticity of communications. Use secure protocols like HTTPS and implement proper verification methods to protect your data.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Takeaways</text>
    <rect x="40" y="530" width="350" height="50" fill="white" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="50" y="546" font-family="Arial" font-size="9" fill="#333">• MITM attacks intercept and alter communications</text>
    <text x="50" y="560" font-family="Arial" font-size="9" fill="#333">• Can steal passwords, inject malware, modify data</text>
    <text x="50" y="574" font-family="Arial" font-size="9" fill="#333">• Types: Active/Passive, SSL Stripping, Wi-Fi</text>
    <rect x="400" y="530" width="360" height="50" fill="white" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="410" y="546" font-family="Arial" font-size="9" fill="#333">• Prevention: HTTPS, Encryption, Digital Signatures</text>
    <text x="410" y="560" font-family="Arial" font-size="9" fill="#333">• Detection: Certificate Pinning, Hash Authentication</text>
    <text x="410" y="574" font-family="Arial" font-size="9" fill="#333">• Always verify recipient identity</text>
  </g>
</svg>