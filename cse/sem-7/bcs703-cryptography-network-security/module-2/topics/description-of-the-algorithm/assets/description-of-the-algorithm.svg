<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">DES and AES Algorithm Description</text>

  <g id="step0" class="step" data-narration="DES and AES are symmetric block ciphers. DES uses a Feistel network; AES uses a substitution-permutation network.">
    <rect x="50" y="55" width="320" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">DES: Feistel Network</text>
    <rect x="430" y="55" width="320" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">AES: SPN Structure</text>
  </g>

  <g id="step1" class="step" data-narration="DES: 64-bit block, 56-bit key, 16 rounds. Each round splits data into left and right halves and applies the F function.">
    <text x="210" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">DES Structure</text>
    <rect x="50" y="125" width="320" height="160" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="148" text-anchor="middle" font-size="12" fill="#333">64-bit block | 56-bit key | 16 rounds</text>
    <rect x="75" y="158" width="100" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="125" y="178" text-anchor="middle" font-size="11" fill="#e65100">L(i-1)</text>
    <rect x="195" y="158" width="100" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="245" y="178" text-anchor="middle" font-size="11" fill="#e65100">R(i-1)</text>
    <text x="210" y="210" text-anchor="middle" font-size="11" fill="#333">Li = R(i-1)</text>
    <text x="210" y="228" text-anchor="middle" font-size="11" fill="#333">Ri = L(i-1) XOR F(R(i-1), Ki)</text>
    <text x="210" y="250" text-anchor="middle" font-size="11" fill="#9c27b0">F = Expand + XOR key + S-boxes + P-box</text>
    <text x="210" y="275" text-anchor="middle" font-size="10" fill="#f44336">Deprecated: 56-bit key too short</text>
  </g>

  <g id="step2" class="step" data-narration="AES: 128-bit block, key 128, 192, or 256 bits. Ten rounds for 128-bit key, operating on a 4x4 byte state matrix.">
    <text x="590" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">AES Structure</text>
    <rect x="430" y="125" width="320" height="160" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="148" text-anchor="middle" font-size="12" fill="#333">128-bit block | 128/192/256 key</text>
    <text x="590" y="168" text-anchor="middle" font-size="12" fill="#333">10/12/14 rounds</text>
    <rect x="460" y="178" width="240" height="90" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="580" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Each Round:</text>
    <text x="580" y="216" text-anchor="middle" font-size="11" fill="#333">1. SubBytes (S-box)</text>
    <text x="580" y="232" text-anchor="middle" font-size="11" fill="#333">2. ShiftRows</text>
    <text x="580" y="248" text-anchor="middle" font-size="11" fill="#333">3. MixColumns</text>
    <text x="580" y="264" text-anchor="middle" font-size="11" fill="#333">4. AddRoundKey</text>
  </g>

  <g id="step3" class="step" data-narration="DES F function: expand 32 to 48 bits, XOR with round key, pass through 8 S-boxes, then permute.">
    <text x="210" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">DES Feistel Function (F)</text>
    <rect x="50" y="320" width="70" height="35" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="85" y="342" text-anchor="middle" font-size="10" fill="#e65100">Expand</text>
    <line x1="125" y1="337" x2="140" y2="337" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="145" y="320" width="70" height="35" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="180" y="342" text-anchor="middle" font-size="10" fill="#9c27b0">XOR Ki</text>
    <line x1="220" y1="337" x2="235" y2="337" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="240" y="320" width="70" height="35" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="275" y="342" text-anchor="middle" font-size="10" fill="#f44336">S-boxes</text>
    <line x1="315" y1="337" x2="330" y2="337" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="335" y="320" width="60" height="35" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="365" y="342" text-anchor="middle" font-size="10" fill="#1976d2">P-box</text>
  </g>

  <g id="step4" class="step" data-narration="AES SubBytes provides confusion through nonlinear substitution. ShiftRows and MixColumns provide diffusion.">
    <text x="590" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">AES Operations</text>
    <rect x="430" y="320" width="155" height="35" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="507" y="342" text-anchor="middle" font-size="10" fill="#f44336">SubBytes: Confusion</text>
    <rect x="595" y="320" width="155" height="35" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="672" y="342" text-anchor="middle" font-size="10" fill="#1976d2">ShiftRows: Diffusion</text>
  </g>

  <g id="step5" class="step" data-narration="Key comparison: DES is deprecated with only 56-bit key. AES with 128 to 256-bit keys remains the global standard.">
    <text x="400" y="385" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">Comparison</text>
    <rect x="50" y="395" width="700" height="90" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="180" y="418" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Feature</text>
    <text x="380" y="418" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">DES</text>
    <text x="580" y="418" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">AES</text>
    <line x1="60" y1="425" x2="740" y2="425" stroke="#9c27b0" stroke-width="1"/>
    <text x="180" y="443" text-anchor="middle" font-size="11" fill="#333">Block Size</text>
    <text x="380" y="443" text-anchor="middle" font-size="11" fill="#333">64 bits</text>
    <text x="580" y="443" text-anchor="middle" font-size="11" fill="#333">128 bits</text>
    <text x="180" y="460" text-anchor="middle" font-size="11" fill="#333">Key Length</text>
    <text x="380" y="460" text-anchor="middle" font-size="11" fill="#333">56 bits</text>
    <text x="580" y="460" text-anchor="middle" font-size="11" fill="#333">128/192/256 bits</text>
    <text x="180" y="477" text-anchor="middle" font-size="11" fill="#333">Security</text>
    <text x="380" y="477" text-anchor="middle" font-size="11" fill="#f44336">Broken</text>
    <text x="580" y="477" text-anchor="middle" font-size="11" fill="#388e3c">Secure (current)</text>
  </g>

  <g id="step6" class="step" data-narration="Both ciphers demonstrate confusion from substitution and diffusion from permutation, the core principles of modern ciphers.">
    <rect x="100" y="500" width="600" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="518" text-anchor="middle" font-size="12" fill="#388e3c">Both demonstrate Shannon's principles: Confusion (S-boxes) + Diffusion (permutations)</text>
    <text x="400" y="535" text-anchor="middle" font-size="12" fill="#388e3c">AES is the current global standard for symmetric encryption</text>
  </g>
</svg>
