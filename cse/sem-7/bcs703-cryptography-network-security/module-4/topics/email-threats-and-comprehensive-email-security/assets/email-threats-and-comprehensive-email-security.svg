<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Email Threats &amp; Comprehensive Email Security</text>

  <!-- Step 0: Hub - Email at center -->
  <g id="step0" class="step" data-narration="Email is a primary target for cyber attacks. Multiple threat vectors surround every email communication channel.">
    <circle cx="400" cy="170" r="55" fill="#ffebee" stroke="#f44336" stroke-width="2.5"/>
    <text x="400" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">EMAIL</text>
    <text x="400" y="182" text-anchor="middle" font-size="10" fill="#f44336">Threat Target</text>

    <rect x="120" y="80" width="110" height="35" rx="6" fill="#fff" stroke="#f44336" stroke-width="1.5"/>
    <text x="175" y="102" text-anchor="middle" font-size="10" fill="#f44336">Phishing</text>
    <line x1="230" y1="97" x2="348" y2="145" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrowRed)"/>

    <rect x="570" y="80" width="110" height="35" rx="6" fill="#fff" stroke="#f44336" stroke-width="1.5"/>
    <text x="625" y="102" text-anchor="middle" font-size="10" fill="#f44336">Spoofing</text>
    <line x1="570" y1="97" x2="453" y2="145" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrowRed)"/>

    <rect x="100" y="190" width="110" height="35" rx="6" fill="#fff" stroke="#f44336" stroke-width="1.5"/>
    <text x="155" y="212" text-anchor="middle" font-size="10" fill="#f44336">Malware</text>
    <line x1="210" y1="207" x2="346" y2="180" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrowRed)"/>

    <rect x="590" y="190" width="110" height="35" rx="6" fill="#fff" stroke="#f44336" stroke-width="1.5"/>
    <text x="645" y="212" text-anchor="middle" font-size="10" fill="#f44336">Spam/DoS</text>
    <line x1="590" y1="207" x2="455" y2="180" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  </g>

  <!-- Step 1: Phishing Detail -->
  <g id="step1" class="step" data-narration="Phishing attacks impersonate trusted senders to steal credentials. Always verify sender addresses and avoid clicking suspicious links.">
    <rect x="40" y="250" width="340" height="80" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="210" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">1. Phishing Attacks</text>
    <text x="60" y="298" font-size="11" fill="#555">Impersonates trusted sender to steal</text>
    <text x="60" y="314" font-size="11" fill="#555">credentials, credit cards, or install malware</text>
  </g>

  <!-- Step 2: Email Spoofing -->
  <g id="step2" class="step" data-narration="Email spoofing forges the sender address in email headers. SPF, DKIM, and DMARC protocols detect and prevent this.">
    <rect x="420" y="250" width="340" height="80" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">2. Email Spoofing</text>
    <text x="440" y="298" font-size="11" fill="#555">Forges sender address in headers.</text>
    <text x="440" y="314" font-size="11" fill="#555">Countered by SPF + DKIM + DMARC</text>
  </g>

  <!-- Step 3: Security Layer - Authentication -->
  <g id="step3" class="step" data-narration="Authentication protocols SPF, DKIM, and DMARC work together to verify sender identity and prevent email forgery.">
    <rect x="40" y="350" width="720" height="65" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="372" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Security Layer 1: Authentication</text>
    <rect x="100" y="385" width="80" height="22" rx="5" fill="#1976d2"/>
    <text x="140" y="400" text-anchor="middle" font-size="10" fill="#fff">SPF</text>
    <rect x="210" y="385" width="80" height="22" rx="5" fill="#1976d2"/>
    <text x="250" y="400" text-anchor="middle" font-size="10" fill="#fff">DKIM</text>
    <rect x="320" y="385" width="80" height="22" rx="5" fill="#1976d2"/>
    <text x="360" y="400" text-anchor="middle" font-size="10" fill="#fff">DMARC</text>
    <text x="560" y="400" font-size="11" fill="#555">Verify sender domain identity</text>
  </g>

  <!-- Step 4: Encryption -->
  <g id="step4" class="step" data-narration="Encryption with PGP or S/MIME protects email content confidentiality, ensuring only the intended recipient can read it.">
    <rect x="40" y="430" width="720" height="55" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="452" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Security Layer 2: Encryption</text>
    <rect x="100" y="462" width="80" height="18" rx="4" fill="#388e3c"/>
    <text x="140" y="475" text-anchor="middle" font-size="10" fill="#fff">PGP</text>
    <rect x="210" y="462" width="80" height="18" rx="4" fill="#388e3c"/>
    <text x="250" y="475" text-anchor="middle" font-size="10" fill="#fff">S/MIME</text>
    <rect x="320" y="462" width="80" height="18" rx="4" fill="#388e3c"/>
    <text x="360" y="475" text-anchor="middle" font-size="10" fill="#fff">TLS</text>
    <text x="460" y="475" font-size="11" fill="#555">End-to-end and transport-level encryption</text>
  </g>

  <!-- Step 5: Infrastructure -->
  <g id="step5" class="step" data-narration="Infrastructure defenses include firewalls, spam filters, antivirus scanning, and intrusion detection systems at the mail server.">
    <rect x="40" y="500" width="720" height="45" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="520" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Security Layer 3: Infrastructure</text>
    <text x="400" y="538" text-anchor="middle" font-size="11" fill="#555">Firewalls | Spam Filters | Antivirus | IDS/IPS | Regular Patching</text>
  </g>

  <!-- Step 6: Summary -->
  <g id="step6" class="step" data-narration="Comprehensive email security requires defense in depth: authentication, encryption, and infrastructure protection working together.">
    <rect x="100" y="555" width="600" height="35" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="577" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Defense in Depth: Authentication + Encryption + Infrastructure = Secure Email</text>
  </g>
</svg>
