<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Transport Layer Security (TLS)</text>

  <!-- Step 0: TLS Protocol Stack - Layered Architecture -->
  <g id="step0" class="step" data-narration="TLS sits between the application and transport layers. It has four sub-protocols stacked on the TLS Record Protocol.">
    <text x="400" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">TLS Protocol Architecture</text>
    <!-- Top protocols -->
    <rect x="80" y="80" width="150" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="155" y="105" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">Handshake</text>
    <rect x="240" y="80" width="150" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="315" y="105" text-anchor="middle" font-size="11" fill="#ff9800" font-weight="bold">Change Cipher</text>
    <rect x="400" y="80" width="150" height="40" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="475" y="105" text-anchor="middle" font-size="11" fill="#f44336" font-weight="bold">Alert</text>
    <rect x="560" y="80" width="160" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="640" y="105" text-anchor="middle" font-size="11" fill="#388e3c" font-weight="bold">Application Data</text>
    <!-- Record layer -->
    <rect x="80" y="130" width="640" height="35" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="153" text-anchor="middle" font-size="13" fill="#9c27b0" font-weight="bold">TLS Record Protocol (fragmentation, compression, MAC, encryption)</text>
    <!-- TCP -->
    <rect x="80" y="175" width="640" height="25" rx="4" fill="#eee" stroke="#999" stroke-width="1"/>
    <text x="400" y="192" text-anchor="middle" font-size="11" fill="#666">TCP Transport Layer</text>
  </g>

  <!-- Step 1: TLS Handshake - ClientHello -->
  <g id="step1" class="step" data-narration="The TLS handshake begins with ClientHello containing supported TLS versions, cipher suites, and a random number.">
    <rect x="40" y="215" width="720" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="80" y="240" font-size="13" font-weight="bold" fill="#1976d2">Handshake Step 1:</text>
    <text x="100" y="260" font-size="11" fill="#333">Client</text>
    <line x1="138" y1="256" x2="310" y2="256" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="220" y="250" text-anchor="middle" font-size="10" fill="#1976d2">ClientHello (version, ciphers, random)</text>
    <text x="340" y="260" font-size="11" fill="#333">Server</text>
  </g>

  <!-- Step 2: ServerHello + Certificate -->
  <g id="step2" class="step" data-narration="Server responds with ServerHello choosing the cipher suite, sends its X.509 certificate, and a ServerHelloDone message.">
    <rect x="40" y="280" width="720" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="80" y="305" font-size="13" font-weight="bold" fill="#388e3c">Handshake Step 2:</text>
    <text x="100" y="325" font-size="11" fill="#333">Client</text>
    <line x1="310" y1="321" x2="138" y2="321" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowLeft)"/>
    <text x="220" y="315" text-anchor="middle" font-size="10" fill="#388e3c">ServerHello + Certificate + ServerHelloDone</text>
    <text x="340" y="325" font-size="11" fill="#333">Server</text>
  </g>

  <!-- Step 3: Key Exchange -->
  <g id="step3" class="step" data-narration="Client verifies the certificate, generates a pre-master secret, encrypts it with the server's public key, and sends it.">
    <rect x="40" y="345" width="720" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="80" y="370" font-size="13" font-weight="bold" fill="#ff9800">Handshake Step 3:</text>
    <text x="100" y="390" font-size="11" fill="#333">Client</text>
    <line x1="138" y1="386" x2="310" y2="386" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="220" y="380" text-anchor="middle" font-size="10" fill="#ff9800">ClientKeyExchange (encrypted pre-master secret)</text>
    <text x="340" y="390" font-size="11" fill="#333">Server</text>
    <text x="460" y="380" font-size="10" fill="#555">+ ChangeCipherSpec</text>
    <text x="460" y="395" font-size="10" fill="#555">+ Finished</text>
  </g>

  <!-- Step 4: Server Finished -->
  <g id="step4" class="step" data-narration="Both sides derive the master secret and session keys. Server sends ChangeCipherSpec and Finished to complete the handshake.">
    <rect x="40" y="410" width="720" height="55" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="80" y="435" font-size="13" font-weight="bold" fill="#9c27b0">Handshake Step 4:</text>
    <text x="100" y="455" font-size="11" fill="#333">Client</text>
    <line x1="310" y1="451" x2="138" y2="451" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="445" text-anchor="middle" font-size="10" fill="#9c27b0">ChangeCipherSpec + Finished</text>
    <text x="340" y="455" font-size="11" fill="#333">Server</text>
    <text x="460" y="445" font-size="10" fill="#555">Both derive master secret</text>
    <text x="460" y="460" font-size="10" fill="#555">and symmetric session keys</text>
  </g>

  <!-- Step 5: Secure Data Transfer -->
  <g id="step5" class="step" data-narration="After the handshake, all application data is encrypted and authenticated using the negotiated symmetric cipher and MAC.">
    <rect x="40" y="475" width="720" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="80" y="500" font-size="13" font-weight="bold" fill="#388e3c">Secure Data Transfer:</text>
    <text x="100" y="520" font-size="11" fill="#333">Client</text>
    <line x1="138" y1="516" x2="280" y2="516" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="350" y1="516" x2="138" y2="516" stroke="#388e3c" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="280" y="506" width="170" height="22" rx="4" fill="#388e3c"/>
    <text x="365" y="521" text-anchor="middle" font-size="10" fill="#fff">AES-GCM encrypted data + MAC</text>
    <text x="490" y="520" font-size="11" fill="#333">Server</text>
  </g>

  <!-- Step 6: TLS Record Protocol -->
  <g id="step6" class="step" data-narration="The TLS Record Protocol handles fragmentation, optional compression, MAC computation, and encryption for each data unit.">
    <rect x="40" y="540" width="720" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="565" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Record Protocol: Fragment -> Compress -> MAC -> Encrypt -> Add TLS Header -> Transmit</text>
  </g>
</svg>
