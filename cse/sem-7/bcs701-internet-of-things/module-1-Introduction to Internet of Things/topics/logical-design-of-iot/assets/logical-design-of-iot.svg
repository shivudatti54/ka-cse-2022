<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Logical Design of IoT</text>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#666">Functional blocks and data flow architecture</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>

  <!-- Step 0: Device/Sensing Block -->
  <g id="step0" class="step" data-narration="The Device block contains sensors and actuators that interface with the physical world to collect data.">
    <rect x="30" y="120" width="150" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="10"/>
    <text x="105" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Device Block</text>
    <line x1="50" y1="162" x2="160" y2="162" stroke="#1976d2" stroke-width="1" opacity="0.3"/>
    <text x="105" y="180" text-anchor="middle" font-size="11" fill="#555">Sensors</text>
    <text x="105" y="195" text-anchor="middle" font-size="11" fill="#555">Actuators</text>
    <text x="105" y="210" text-anchor="middle" font-size="11" fill="#555">MCU/MPU</text>
  </g>

  <!-- Step 1: Communication Block with arrow from Device -->
  <g id="step1" class="step" data-narration="The Communication block handles data transfer using protocols like MQTT, HTTP, and CoAP between devices and cloud.">
    <line x1="180" y1="170" x2="225" y2="170" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="203" y="160" text-anchor="middle" font-size="9" fill="#888">Data</text>
    <rect x="230" y="120" width="150" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="10"/>
    <text x="305" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Communication</text>
    <line x1="250" y1="162" x2="360" y2="162" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
    <text x="305" y="180" text-anchor="middle" font-size="11" fill="#555">MQTT, HTTP, CoAP</text>
    <text x="305" y="195" text-anchor="middle" font-size="11" fill="#555">D2D, D2G, G2C</text>
    <text x="305" y="210" text-anchor="middle" font-size="11" fill="#555">IoT Gateways</text>
  </g>

  <!-- Step 2: Data Storage/Processing Block with arrow -->
  <g id="step2" class="step" data-narration="The Processing block stores and analyzes data in the cloud, performing both real-time and batch analytics.">
    <line x1="380" y1="170" x2="425" y2="170" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="403" y="160" text-anchor="middle" font-size="9" fill="#888">Stream</text>
    <rect x="430" y="120" width="150" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="10"/>
    <text x="505" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Processing</text>
    <line x1="450" y1="162" x2="560" y2="162" stroke="#9c27b0" stroke-width="1" opacity="0.3"/>
    <text x="505" y="180" text-anchor="middle" font-size="11" fill="#555">Cloud Storage</text>
    <text x="505" y="195" text-anchor="middle" font-size="11" fill="#555">Real-time Analysis</text>
    <text x="505" y="210" text-anchor="middle" font-size="11" fill="#555">Batch Processing</text>
  </g>

  <!-- Step 3: Application Block with arrow -->
  <g id="step3" class="step" data-narration="The Application block delivers insights to users via dashboards, mobile apps, and APIs with business logic rules.">
    <line x1="580" y1="170" x2="625" y2="170" stroke="#9c27b0" stroke-width="2"/>
    <polygon points="623,166 633,170 623,174" fill="#9c27b0"/>
    <text x="603" y="160" text-anchor="middle" font-size="9" fill="#888">Insights</text>
    <rect x="630" y="120" width="140" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="10"/>
    <text x="700" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Application</text>
    <line x1="650" y1="162" x2="750" y2="162" stroke="#388e3c" stroke-width="1" opacity="0.3"/>
    <text x="700" y="180" text-anchor="middle" font-size="11" fill="#555">Dashboards</text>
    <text x="700" y="195" text-anchor="middle" font-size="11" fill="#555">Mobile Apps</text>
    <text x="700" y="210" text-anchor="middle" font-size="11" fill="#555">APIs / Rules</text>
  </g>

  <!-- Step 4: Feedback/Command loop arrow (bottom return) -->
  <g id="step4" class="step" data-narration="Commands flow back from applications through cloud and communication layers to control actuators, completing the loop.">
    <path d="M700 225 L700 260 L105 260 L105 225" fill="none" stroke="#e91e63" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
    <text x="400" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#e91e63">Command / Feedback Loop</text>
    <text x="400" y="294" text-anchor="middle" font-size="10" fill="#888">User sends commands back to control actuators remotely</text>
  </g>

  <!-- Step 5: Communication Models section -->
  <g id="step5" class="step" data-narration="IoT uses four communication models: request-response, publish-subscribe, push-pull, and exclusive pair for different needs.">
    <text x="400" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">IoT Communication Models</text>
    <!-- Model 1: Request-Response -->
    <rect x="40" y="360" width="160" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="8"/>
    <text x="120" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Request-Response</text>
    <text x="120" y="402" text-anchor="middle" font-size="10" fill="#555">Client asks, server replies</text>
    <text x="120" y="418" text-anchor="middle" font-size="10" font-style="italic" fill="#888">HTTP, CoAP</text>
    <!-- Model 2: Pub-Sub -->
    <rect x="215" y="360" width="160" height="70" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="8"/>
    <text x="295" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Publish-Subscribe</text>
    <text x="295" y="402" text-anchor="middle" font-size="10" fill="#555">Broker routes by topic</text>
    <text x="295" y="418" text-anchor="middle" font-size="10" font-style="italic" fill="#888">MQTT (most popular)</text>
    <!-- Model 3: Push-Pull -->
    <rect x="390" y="360" width="160" height="70" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="8"/>
    <text x="470" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Push-Pull</text>
    <text x="470" y="402" text-anchor="middle" font-size="10" fill="#555">Queue-based decoupling</text>
    <text x="470" y="418" text-anchor="middle" font-size="10" font-style="italic" fill="#888">ZeroMQ</text>
    <!-- Model 4: Exclusive Pair -->
    <rect x="565" y="360" width="190" height="70" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" rx="8"/>
    <text x="660" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#e91e63">Exclusive Pair</text>
    <text x="660" y="402" text-anchor="middle" font-size="10" fill="#555">Bidirectional, stateful</text>
    <text x="660" y="418" text-anchor="middle" font-size="10" font-style="italic" fill="#888">WebSockets</text>
  </g>

  <!-- Step 6: MQTT Detail (most important protocol) -->
  <g id="step6" class="step" data-narration="MQTT uses a broker-based publish-subscribe model where sensors publish to topics and apps subscribe to receive data.">
    <text x="400" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">MQTT: The IoT Standard</text>
    <!-- Publisher -->
    <rect x="80" y="490" width="120" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="6"/>
    <text x="140" y="512" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Publisher</text>
    <text x="140" y="528" text-anchor="middle" font-size="10" fill="#555">(Sensor)</text>
    <!-- Arrow to Broker -->
    <line x1="200" y1="515" x2="290" y2="515" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="245" y="507" text-anchor="middle" font-size="9" fill="#888">Publish</text>
    <!-- Broker -->
    <rect x="295" y="490" width="120" height="50" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="6"/>
    <text x="355" y="512" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Broker</text>
    <text x="355" y="528" text-anchor="middle" font-size="10" fill="#555">(MQTT Server)</text>
    <!-- Arrow to Subscriber -->
    <line x1="415" y1="515" x2="505" y2="515" stroke="#9c27b0" stroke-width="2"/>
    <polygon points="503,511 513,515 503,519" fill="#9c27b0"/>
    <text x="460" y="507" text-anchor="middle" font-size="9" fill="#888">Deliver</text>
    <!-- Subscriber -->
    <rect x="510" y="490" width="130" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="6"/>
    <text x="575" y="512" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Subscriber</text>
    <text x="575" y="528" text-anchor="middle" font-size="10" fill="#555">(Mobile App)</text>
  </g>

  <!-- Step 7: Summary -->
  <g id="step7" class="step" data-narration="Logical design defines the complete data flow from sensing to action through functional blocks and communication models.">
    <rect x="100" y="560" width="600" height="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="15"/>
    <text x="400" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Sense --&gt; Communicate --&gt; Process --&gt; Act --&gt; Feedback Loop</text>
  </g>
</svg>