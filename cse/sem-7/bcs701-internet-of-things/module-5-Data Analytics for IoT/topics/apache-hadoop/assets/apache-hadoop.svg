<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Apache Hadoop - Distributed Architecture</text>

  <g id="step0" class="step" data-narration="Hadoop is a distributed computing framework with HDFS for storage and YARN for resource management.">
    <text x="400" y="60" text-anchor="middle" font-size="12" fill="#666">NameNode + DataNodes cluster diagram with HDFS replication</text>
  </g>

  <g id="step1" class="step" data-narration="The Client Application submits jobs and requests data access to the Hadoop cluster through the NameNode.">
    <rect x="300" y="75" width="200" height="50" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="13" fill="#4a148c" font-weight="bold">Client Application</text>
    <text x="400" y="117" text-anchor="middle" font-size="9" fill="#6a1b9a">Submit jobs, read/write data</text>
  </g>

  <g id="step2" class="step" data-narration="The NameNode is the master server managing file system metadata, block locations, and namespace operations.">
    <line x1="400" y1="125" x2="400" y2="155" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="250" y="155" width="300" height="90" rx="14" fill="#fff3e0" stroke="#ff9800" stroke-width="2.5"/>
    <text x="400" y="180" text-anchor="middle" font-size="15" fill="#e65100" font-weight="bold">NameNode (Master)</text>
    <text x="400" y="200" text-anchor="middle" font-size="10" fill="#bf360c">Metadata | File-to-Block Mapping</text>
    <text x="400" y="218" text-anchor="middle" font-size="10" fill="#bf360c">Namespace Ops | Block Management</text>
    <text x="400" y="236" text-anchor="middle" font-size="9" fill="#f57c00">Heartbeat monitoring from DataNodes</text>
  </g>

  <g id="step3" class="step" data-narration="DataNode 1 stores actual data blocks on local disk and serves read and write requests from clients.">
    <line x1="310" y1="245" x2="170" y2="310" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="60" y="310" width="220" height="130" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="170" y="338" text-anchor="middle" font-size="13" fill="#0d47a1" font-weight="bold">DataNode 1</text>
    <rect x="80" y="350" width="55" height="35" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
    <text x="107" y="372" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Block A</text>
    <rect x="145" y="350" width="55" height="35" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
    <text x="172" y="372" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Block B</text>
    <rect x="210" y="350" width="55" height="35" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="237" y="372" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Block D</text>
    <text x="170" y="410" text-anchor="middle" font-size="8" fill="#1565c0">128MB blocks | Heartbeat every 3s</text>
    <text x="170" y="425" text-anchor="middle" font-size="8" fill="#42a5f5">Local disk storage</text>
  </g>

  <g id="step4" class="step" data-narration="DataNode 2 holds replicas of blocks ensuring fault tolerance. Default replication factor is three copies.">
    <line x1="400" y1="245" x2="400" y2="310" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="290" y="310" width="220" height="130" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="338" text-anchor="middle" font-size="13" fill="#0d47a1" font-weight="bold">DataNode 2</text>
    <rect x="310" y="350" width="55" height="35" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
    <text x="337" y="372" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Block A</text>
    <rect x="375" y="350" width="55" height="35" rx="5" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="402" y="372" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold">Block C</text>
    <rect x="440" y="350" width="55" height="35" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="467" y="372" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Block D</text>
    <text x="400" y="410" text-anchor="middle" font-size="8" fill="#1565c0">Replica blocks for fault tolerance</text>
    <text x="400" y="425" text-anchor="middle" font-size="8" fill="#42a5f5">Auto re-replicate on failure</text>
  </g>

  <g id="step5" class="step" data-narration="DataNode 3 stores additional replicas, providing rack-aware data placement for resilience against failures.">
    <line x1="490" y1="245" x2="630" y2="310" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="520" y="310" width="220" height="130" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="630" y="338" text-anchor="middle" font-size="13" fill="#0d47a1" font-weight="bold">DataNode 3</text>
    <rect x="540" y="350" width="55" height="35" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
    <text x="567" y="372" text-anchor="middle" font-size="9" fill="#0d47a1" font-weight="bold">Block B</text>
    <rect x="605" y="350" width="55" height="35" rx="5" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="632" y="372" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold">Block C</text>
    <rect x="670" y="350" width="55" height="35" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="697" y="372" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Block D</text>
    <text x="630" y="410" text-anchor="middle" font-size="8" fill="#1565c0">Different rack placement</text>
    <text x="630" y="425" text-anchor="middle" font-size="8" fill="#42a5f5">Rack-aware replication</text>
  </g>

  <g id="step6" class="step" data-narration="Block replication ensures every block has three copies across different nodes, surviving hardware failures.">
    <path d="M 170 440 Q 170 465 400 465 Q 630 465 630 440" fill="none" stroke="#e91e63" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="400" y="482" text-anchor="middle" font-size="11" fill="#e91e63" font-weight="bold">Block Replication (Factor = 3)</text>
    <text x="400" y="498" text-anchor="middle" font-size="9" fill="#c2185b">Each block stored on 3 different DataNodes for fault tolerance</text>
  </g>

  <g id="step7" class="step" data-narration="YARN manages cluster resources, allocating CPU and memory to applications through ResourceManager and NodeManagers.">
    <rect x="60" y="515" width="330" height="65" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="225" y="540" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">YARN (Resource Management)</text>
    <text x="225" y="560" text-anchor="middle" font-size="9" fill="#2e7d32">ResourceManager (global) + NodeManagers (per-node)</text>
    <text x="225" y="573" text-anchor="middle" font-size="8" fill="#43a047">ApplicationMaster per job | Container-based allocation</text>
  </g>

  <g id="step8" class="step" data-narration="Hadoop is ideal for batch analytics on massive IoT datasets but needs Storm or Spark for real-time processing.">
    <rect x="410" y="515" width="340" height="65" rx="10" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="580" y="540" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">Hadoop for IoT</text>
    <text x="580" y="560" text-anchor="middle" font-size="9" fill="#bf360c">Petabyte-scale storage | Cost-effective commodity HW</text>
    <text x="580" y="573" text-anchor="middle" font-size="8" fill="#f57c00">Batch analytics | Schema-on-read | High throughput</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
</svg>