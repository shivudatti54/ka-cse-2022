<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Raspberry Pi Interfaces for IoT</text>

  <g id="step0" class="step" data-narration="The Raspberry Pi offers multiple interfaces for IoT applications. These include GPIO pins, communication protocols like I2C, SPI, and UART, as well as USB, Ethernet, wireless, and display interfaces.">
    <rect x="280" y="55" width="240" height="55" rx="10" fill="#1b5e20" stroke="#0d3310" stroke-width="2"/>
    <text x="400" y="78" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Raspberry Pi Board</text>
    <text x="400" y="94" text-anchor="middle" font-size="9" fill="#c8e6c9">Central IoT Platform</text>
  </g>

  <g id="step1" class="step" data-narration="The 40-pin GPIO header is the primary IoT interface. Pins include 3.3V and 5V power, ground pins, and 28 programmable digital I/O pins. Each pin can be set as input or output using Python libraries.">
    <line x1="280" y1="75" x2="175" y2="145" stroke="#ffd600" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="50" y="130" width="250" height="65" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="175" y="150" text-anchor="middle" font-size="11" fill="#f57f17" font-weight="bold">GPIO (40-Pin Header)</text>
    <text x="175" y="166" text-anchor="middle" font-size="9" fill="#333">Power: 3.3V, 5V, GND pins</text>
    <text x="175" y="180" text-anchor="middle" font-size="9" fill="#333">Digital I/O: 28 programmable pins</text>
    <text x="175" y="192" text-anchor="middle" font-size="8" fill="#666">Controlled via RPi.GPIO / gpiozero</text>
  </g>

  <g id="step2" class="step" data-narration="I2C uses two wires, SDA and SCL, to connect multiple sensors on a shared bus. It supports 7-bit addressing at 100-400 kHz, making it ideal for temperature sensors, RTCs, and EEPROMs.">
    <line x1="520" y1="85" x2="620" y2="145" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="530" y="130" width="220" height="65" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="640" y="150" text-anchor="middle" font-size="11" fill="#0d47a1" font-weight="bold">I2C Protocol</text>
    <text x="640" y="166" text-anchor="middle" font-size="9" fill="#1565c0">2 wires: SDA + SCL</text>
    <text x="640" y="180" text-anchor="middle" font-size="9" fill="#1565c0">Multi-device, addressable</text>
    <text x="640" y="192" text-anchor="middle" font-size="8" fill="#42a5f5">100-400 kHz, smbus2 library</text>
  </g>

  <g id="step3" class="step" data-narration="SPI is a high-speed full-duplex protocol using four wires: MOSI, MISO, SCLK, and CE. It can reach tens of MHz, making it suitable for ADCs, displays, and high-speed sensor interfaces.">
    <line x1="280" y1="95" x2="175" y2="225" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="50" y="210" width="250" height="65" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="175" y="230" text-anchor="middle" font-size="11" fill="#880e4f" font-weight="bold">SPI Protocol</text>
    <text x="175" y="246" text-anchor="middle" font-size="9" fill="#c2185b">4 wires: MOSI/MISO/SCLK/CE</text>
    <text x="175" y="260" text-anchor="middle" font-size="9" fill="#c2185b">Full-duplex, high speed</text>
    <text x="175" y="272" text-anchor="middle" font-size="8" fill="#e91e63">Up to tens of MHz, spidev lib</text>
  </g>

  <g id="step4" class="step" data-narration="UART provides asynchronous serial communication using just Tx and Rx lines. It requires no clock signal and uses configurable baud rates. Common uses include GPS modules and Arduino communication.">
    <line x1="520" y1="95" x2="620" y2="225" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="530" y="210" width="220" height="65" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="640" y="230" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">UART Protocol</text>
    <text x="640" y="246" text-anchor="middle" font-size="9" fill="#bf360c">2 wires: Tx + Rx</text>
    <text x="640" y="260" text-anchor="middle" font-size="9" fill="#bf360c">Asynchronous, no clock</text>
    <text x="640" y="272" text-anchor="middle" font-size="8" fill="#ff9800">GPS, serial, pyserial lib</text>
  </g>

  <g id="step5" class="step" data-narration="USB ports connect peripherals like cameras, storage, and WiFi dongles. Ethernet provides stable wired networking at 100 Mbps or 1 Gbps. PoE support is available with additional HATs for remote power delivery.">
    <rect x="50" y="295" width="160" height="70" rx="8" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="130" y="318" text-anchor="middle" font-size="10" fill="#37474f" font-weight="bold">USB Ports</text>
    <text x="130" y="333" text-anchor="middle" font-size="9" fill="#546e7a">Cameras, storage</text>
    <text x="130" y="347" text-anchor="middle" font-size="9" fill="#546e7a">WiFi dongles</text>
    <text x="130" y="360" text-anchor="middle" font-size="8" fill="#78909c">USB 2.0/3.0</text>

    <rect x="230" y="295" width="160" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="310" y="318" text-anchor="middle" font-size="10" fill="#1b5e20" font-weight="bold">Ethernet</text>
    <text x="310" y="333" text-anchor="middle" font-size="9" fill="#2e7d32">Wired network</text>
    <text x="310" y="347" text-anchor="middle" font-size="9" fill="#2e7d32">100Mbps-1Gbps</text>
    <text x="310" y="360" text-anchor="middle" font-size="8" fill="#388e3c">PoE HAT support</text>
  </g>

  <g id="step6" class="step" data-narration="Wireless connectivity includes WiFi for internet access and Bluetooth Low Energy for short-range device communication. CSI connects camera modules and DSI connects touchscreen displays directly to the GPU.">
    <rect x="410" y="295" width="160" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="490" y="318" text-anchor="middle" font-size="10" fill="#0d47a1" font-weight="bold">WiFi + BT</text>
    <text x="490" y="333" text-anchor="middle" font-size="9" fill="#1565c0">2.4/5GHz WiFi</text>
    <text x="490" y="347" text-anchor="middle" font-size="9" fill="#1565c0">BLE 4.2/5.0</text>
    <text x="490" y="360" text-anchor="middle" font-size="8" fill="#42a5f5">Built-in on Pi 3/4</text>

    <rect x="590" y="295" width="160" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="670" y="318" text-anchor="middle" font-size="10" fill="#4a148c" font-weight="bold">CSI + DSI</text>
    <text x="670" y="333" text-anchor="middle" font-size="9" fill="#6a1b9a">Camera interface</text>
    <text x="670" y="347" text-anchor="middle" font-size="9" fill="#6a1b9a">Display interface</text>
    <text x="670" y="360" text-anchor="middle" font-size="8" fill="#9c27b0">Direct GPU access</text>
  </g>

  <g id="step7" class="step" data-narration="Protocol selection depends on speed, number of devices, distance, and power. Use SPI for high speed, I2C for multi-sensor buses, UART for long-distance serial, and GPIO for simple on/off control.">
    <rect x="50" y="385" width="700" height="100" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="400" y="408" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">Protocol Comparison Table</text>

    <text x="120" y="430" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Protocol</text>
    <text x="240" y="430" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Speed</text>
    <text x="360" y="430" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Wires</text>
    <text x="480" y="430" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Devices</text>
    <text x="630" y="430" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Best For</text>

    <text x="120" y="446" text-anchor="middle" font-size="8" fill="#555">I2C</text>
    <text x="240" y="446" text-anchor="middle" font-size="8" fill="#555">100-400kHz</text>
    <text x="360" y="446" text-anchor="middle" font-size="8" fill="#555">2</text>
    <text x="480" y="446" text-anchor="middle" font-size="8" fill="#555">Multiple</text>
    <text x="630" y="446" text-anchor="middle" font-size="8" fill="#555">Sensors, RTCs</text>

    <text x="120" y="460" text-anchor="middle" font-size="8" fill="#555">SPI</text>
    <text x="240" y="460" text-anchor="middle" font-size="8" fill="#555">Tens of MHz</text>
    <text x="360" y="460" text-anchor="middle" font-size="8" fill="#555">4</text>
    <text x="480" y="460" text-anchor="middle" font-size="8" fill="#555">Few (CE lines)</text>
    <text x="630" y="460" text-anchor="middle" font-size="8" fill="#555">ADCs, displays</text>

    <text x="120" y="474" text-anchor="middle" font-size="8" fill="#555">UART</text>
    <text x="240" y="474" text-anchor="middle" font-size="8" fill="#555">Variable baud</text>
    <text x="360" y="474" text-anchor="middle" font-size="8" fill="#555">2</text>
    <text x="480" y="474" text-anchor="middle" font-size="8" fill="#555">Point-to-point</text>
    <text x="630" y="474" text-anchor="middle" font-size="8" fill="#555">GPS, consoles</text>
  </g>

  <g id="step8" class="step" data-narration="When building an IoT system, choose interfaces based on requirements: data rate, number of peripherals, communication distance, power constraints, and compatibility with your sensors and actuators.">
    <rect x="50" y="500" width="700" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="525" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">Interface Selection Guidelines</text>

    <text x="130" y="548" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">High speed?</text>
    <text x="130" y="562" text-anchor="middle" font-size="9" fill="#666">Use SPI</text>

    <text x="280" y="548" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Many sensors?</text>
    <text x="280" y="562" text-anchor="middle" font-size="9" fill="#666">Use I2C</text>

    <text x="430" y="548" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Long range?</text>
    <text x="430" y="562" text-anchor="middle" font-size="9" fill="#666">Use UART</text>

    <text x="580" y="548" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Simple on/off?</text>
    <text x="580" y="562" text-anchor="middle" font-size="9" fill="#666">Use GPIO</text>

    <text x="700" y="548" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">Video?</text>
    <text x="700" y="562" text-anchor="middle" font-size="9" fill="#666">Use CSI</text>
  </g>
</svg>
