<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Precision Agriculture - IoT Farm Layout</text>

  <g id="step0" class="step" data-narration="IoT transforms agriculture with sensors, drones, and automated irrigation to optimize crop yield and resources.">
    <!-- Sky -->
    <rect x="50" y="60" width="700" height="100" rx="8" fill="#e3f2fd"/>
    <!-- Sun -->
    <circle cx="680" cy="90" r="25" fill="#ffd600" stroke="#f9a825" stroke-width="2"/>
    <!-- Cloud -->
    <ellipse cx="150" cy="85" rx="40" ry="18" fill="#fff" stroke="#bbdefb" stroke-width="1"/>
  </g>

  <g id="step1" class="step" data-narration="Soil moisture sensors are deployed across the field to monitor water levels and trigger irrigation when needed.">
    <!-- Field -->
    <rect x="50" y="175" width="700" height="55" rx="6" fill="#a5d6a7" stroke="#66bb6a" stroke-width="1.5"/>
    <!-- Crop icons -->
    <g fill="#2e7d32">
      <line x1="100" y1="195" x2="100" y2="180" stroke="#388e3c" stroke-width="2"/><circle cx="100" cy="178" r="3" fill="#66bb6a"/>
      <line x1="180" y1="195" x2="180" y2="180" stroke="#388e3c" stroke-width="2"/><circle cx="180" cy="178" r="3" fill="#66bb6a"/>
      <line x1="260" y1="195" x2="260" y2="180" stroke="#388e3c" stroke-width="2"/><circle cx="260" cy="178" r="3" fill="#66bb6a"/>
      <line x1="400" y1="195" x2="400" y2="180" stroke="#388e3c" stroke-width="2"/><circle cx="400" cy="178" r="3" fill="#66bb6a"/>
      <line x1="540" y1="195" x2="540" y2="180" stroke="#388e3c" stroke-width="2"/><circle cx="540" cy="178" r="3" fill="#66bb6a"/>
      <line x1="680" y1="195" x2="680" y2="180" stroke="#388e3c" stroke-width="2"/><circle cx="680" cy="178" r="3" fill="#66bb6a"/>
    </g>
    <!-- Soil moisture sensors -->
    <rect x="115" y="200" width="24" height="16" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="127" y="211" text-anchor="middle" font-size="8" fill="#0d47a1" font-weight="bold">SM1</text>
    <rect x="280" y="200" width="24" height="16" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="292" y="211" text-anchor="middle" font-size="8" fill="#0d47a1" font-weight="bold">SM2</text>
    <rect x="450" y="200" width="24" height="16" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="462" y="211" text-anchor="middle" font-size="8" fill="#0d47a1" font-weight="bold">SM3</text>
    <rect x="620" y="200" width="24" height="16" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="632" y="211" text-anchor="middle" font-size="8" fill="#0d47a1" font-weight="bold">SM4</text>
    <text x="400" y="225" text-anchor="middle" font-size="10" fill="#1976d2" font-weight="bold">Soil Moisture Sensors (LoRaWAN)</text>
  </g>

  <g id="step2" class="step" data-narration="A weather station monitors temperature, humidity, wind speed, and rainfall to inform farming decisions.">
    <!-- Weather station -->
    <line x1="100" y1="260" x2="100" y2="295" stroke="#555" stroke-width="3"/>
    <rect x="82" y="295" width="36" height="18" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="100" y="307" text-anchor="middle" font-size="8" fill="#e65100" font-weight="bold">WX</text>
    <!-- Anemometer -->
    <line x1="100" y1="295" x2="88" y2="287" stroke="#666" stroke-width="1.5"/>
    <line x1="100" y1="295" x2="112" y2="287" stroke="#666" stroke-width="1.5"/>
    <circle cx="88" cy="285" r="3" fill="#ff9800"/>
    <circle cx="112" cy="285" r="3" fill="#ff9800"/>
    <text x="100" y="280" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold">Weather Station</text>
    <text x="100" y="325" text-anchor="middle" font-size="8" fill="#bf360c">Temp | Humidity | Wind | Rain</text>
  </g>

  <g id="step3" class="step" data-narration="An IoT-controlled drip irrigation system waters crops precisely based on sensor data, saving up to 30% water.">
    <!-- Irrigation pipes -->
    <line x1="360" y1="260" x2="720" y2="260" stroke="#42a5f5" stroke-width="4"/>
    <circle cx="420" cy="260" r="4" fill="#1565c0"/>
    <circle cx="540" cy="260" r="4" fill="#1565c0"/>
    <circle cx="660" cy="260" r="4" fill="#1565c0"/>
    <!-- Water drops -->
    <text x="420" y="256" text-anchor="middle" font-size="8" fill="#1565c0">&#x2B24;</text>
    <text x="540" y="256" text-anchor="middle" font-size="8" fill="#1565c0">&#x2B24;</text>
    <text x="660" y="256" text-anchor="middle" font-size="8" fill="#1565c0">&#x2B24;</text>
    <!-- Valve -->
    <rect x="352" y="252" width="16" height="16" rx="3" fill="#e91e63" stroke="#c2185b" stroke-width="1.5"/>
    <text x="360" y="262" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">V</text>
    <text x="540" y="285" text-anchor="middle" font-size="9" fill="#e91e63" font-weight="bold">Smart Drip Irrigation System</text>
    <text x="540" y="315" text-anchor="middle" font-size="8" fill="#c2185b">Automated valve control based on sensor data</text>
  </g>

  <g id="step4" class="step" data-narration="Agricultural drones survey crops from above, capturing images for health monitoring and disease detection.">
    <!-- Drone -->
    <rect x="375" y="355" width="45" height="14" rx="3" fill="#9e9e9e" stroke="#616161" stroke-width="1.5"/>
    <line x1="380" y1="355" x2="372" y2="347" stroke="#666" stroke-width="2"/>
    <line x1="415" y1="355" x2="423" y2="347" stroke="#666" stroke-width="2"/>
    <circle cx="371" cy="345" r="5" fill="none" stroke="#666" stroke-width="1.5"/>
    <circle cx="424" cy="345" r="5" fill="none" stroke="#666" stroke-width="1.5"/>
    <rect x="390" y="369" width="12" height="8" rx="2" fill="#42a5f5" stroke="#1565c0" stroke-width="1"/>
    <text x="397" y="375" text-anchor="middle" font-size="8" fill="#fff">CAM</text>
    <text x="397" y="395" text-anchor="middle" font-size="10" fill="#616161" font-weight="bold">Crop Survey Drone</text>
    <!-- Survey area -->
    <rect x="200" y="410" width="400" height="50" rx="6" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="5,4"/>
    <text x="400" y="440" text-anchor="middle" font-size="9" fill="#666">Aerial crop health monitoring zone</text>
  </g>

  <g id="step5" class="step" data-narration="A LoRaWAN gateway collects data from all field sensors and transmits it to the cloud over long range.">
    <!-- Gateway tower -->
    <rect x="80" y="355" width="32" height="55" rx="4" fill="#388e3c" stroke="#1b5e20" stroke-width="2"/>
    <text x="96" y="382" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">GW</text>
    <line x1="96" y1="355" x2="96" y2="342" stroke="#1b5e20" stroke-width="2"/>
    <polygon points="90,342 96,330 102,342" fill="#4caf50"/>
    <!-- Signal waves -->
    <path d="M 75 370 Q 68 365 72 357" fill="none" stroke="#4caf50" stroke-width="1.5"/>
    <path d="M 68 375 Q 58 367 66 355" fill="none" stroke="#4caf50" stroke-width="1"/>
    <text x="96" y="425" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">LoRa Gateway</text>
    <text x="96" y="440" text-anchor="middle" font-size="8" fill="#2e7d32">Collects all sensor data</text>
  </g>

  <g id="step6" class="step" data-narration="Cloud analytics processes sensor data to determine optimal irrigation schedules and predict crop needs.">
    <path d="M 630 360 Q 642 338 666 342 Q 690 332 698 350 Q 718 346 714 366 Q 726 370 718 384 Q 722 398 700 400 Q 692 412 666 408 Q 642 416 634 400 Q 614 402 616 384 Q 606 376 630 360 Z" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="666" y="375" text-anchor="middle" font-size="10" fill="#4a148c" font-weight="bold">Cloud</text>
    <text x="666" y="390" text-anchor="middle" font-size="8" fill="#6a1b9a">Analytics</text>
    <text x="666" y="430" text-anchor="middle" font-size="8" fill="#6a1b9a">Processes sensor data for insights</text>
    <line x1="112" y1="380" x2="630" y2="375" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="5,3"/>
  </g>

  <g id="step7" class="step" data-narration="Farmers access real-time data and control irrigation remotely from a mobile app or web dashboard.">
    <rect x="80" y="485" width="640" height="80" rx="10" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="400" y="510" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold">Precision Agriculture Benefits</text>
    <text x="175" y="535" text-anchor="middle" font-size="10" fill="#333">30% less water</text>
    <text x="325" y="535" text-anchor="middle" font-size="10" fill="#333">Higher crop yield</text>
    <text x="475" y="535" text-anchor="middle" font-size="10" fill="#333">Remote monitoring</text>
    <text x="625" y="535" text-anchor="middle" font-size="10" fill="#333">Data-driven decisions</text>
    <text x="175" y="553" text-anchor="middle" font-size="9" fill="#666">Resource efficiency</text>
    <text x="325" y="553" text-anchor="middle" font-size="9" fill="#666">Quality improvement</text>
    <text x="475" y="553" text-anchor="middle" font-size="9" fill="#666">24/7 access</text>
    <text x="625" y="553" text-anchor="middle" font-size="9" fill="#666">Predictive analytics</text>
  </g>
</svg>
