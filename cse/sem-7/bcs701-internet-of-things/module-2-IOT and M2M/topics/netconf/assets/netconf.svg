<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">NETCONF Protocol for IoT Management</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#666">Session-based configuration management using XML over SSH</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <!-- Step 0: NETCONF Layer Stack -->
  <g id="step0" class="step" data-narration="NETCONF has four protocol layers: Transport provides secure SSH communication, RPC handles request-reply exchanges, Operations define actions like get-config and edit-config, and Content carries the actual configuration data.">
    <text x="130" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Protocol Layers</text>
    <rect x="40" y="95" width="180" height="38" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="130" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Content Layer</text>
    <rect x="40" y="138" width="180" height="38" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="6"/>
    <text x="130" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Operations Layer</text>
    <rect x="40" y="181" width="180" height="38" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="6"/>
    <text x="130" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">RPC Layer</text>
    <rect x="40" y="224" width="180" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="130" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Transport (SSH)</text>
  </g>

  <!-- Step 1: Client-Server Architecture -->
  <g id="step1" class="step" data-narration="NETCONF uses a client-server model where the management application acts as the client sending RPC requests, and IoT devices run NETCONF servers that process those requests and return replies.">
    <rect x="310" y="80" width="160" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="10"/>
    <text x="390" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">NETCONF Client</text>
    <text x="390" y="125" text-anchor="middle" font-size="10" fill="#555">(Management App)</text>
    <text x="390" y="140" text-anchor="middle" font-size="10" fill="#555">Sends RPCs</text>

    <rect x="580" y="80" width="180" height="70" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="10"/>
    <text x="670" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">NETCONF Server</text>
    <text x="670" y="125" text-anchor="middle" font-size="10" fill="#555">(IoT Device Agent)</text>
    <text x="670" y="140" text-anchor="middle" font-size="10" fill="#555">Processes requests</text>

    <line x1="470" y1="105" x2="575" y2="105" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="523" y="98" text-anchor="middle" font-size="9" fill="#888">RPC request</text>
    <line x1="575" y1="130" x2="470" y2="130" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="523" y="145" text-anchor="middle" font-size="9" fill="#888">RPC reply</text>
  </g>

  <!-- Step 2: Core Operations -->
  <g id="step2" class="step" data-narration="NETCONF provides eight core operations. The most important are get-config to retrieve settings, edit-config to modify settings, copy-config to duplicate configs, and lock/unlock to prevent conflicts during edits.">
    <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Core NETCONF Operations</text>
    <rect x="260" y="205" width="130" height="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="6"/>
    <text x="325" y="227" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">&lt;get-config&gt;</text>
    <rect x="405" y="205" width="130" height="35" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="6"/>
    <text x="470" y="227" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">&lt;edit-config&gt;</text>
    <rect x="260" y="248" width="130" height="35" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="6"/>
    <text x="325" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">&lt;copy-config&gt;</text>
    <rect x="405" y="248" width="130" height="35" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" rx="6"/>
    <text x="470" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#e91e63">&lt;lock&gt; / &lt;unlock&gt;</text>
    <rect x="550" y="205" width="120" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="6"/>
    <text x="610" y="227" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">&lt;get&gt;</text>
    <rect x="550" y="248" width="120" height="35" fill="#fff8e1" stroke="#ffa000" stroke-width="1.5" rx="6"/>
    <text x="610" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffa000">&lt;close-session&gt;</text>
  </g>

  <!-- Step 3: SNMP vs NETCONF Comparison -->
  <g id="step3" class="step" data-narration="Compared to SNMP, NETCONF offers stronger security with mandatory SSH, richer data modeling via YANG, and transaction support with atomic commit/rollback, making it far more suitable for complex IoT configurations.">
    <text x="400" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">SNMP vs NETCONF for IoT</text>
    <!-- Table header -->
    <rect x="80" y="325" width="160" height="28" fill="#1976d2" rx="4"/>
    <text x="160" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Feature</text>
    <rect x="240" y="325" width="200" height="28" fill="#e91e63" rx="4"/>
    <text x="340" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">SNMP</text>
    <rect x="440" y="325" width="280" height="28" fill="#388e3c" rx="4"/>
    <text x="580" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">NETCONF</text>
    <!-- Rows -->
    <rect x="80" y="353" width="160" height="24" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
    <text x="160" y="370" text-anchor="middle" font-size="10" fill="#333">Security</text>
    <rect x="240" y="353" width="200" height="24" fill="#fce4ec" stroke="#ddd" stroke-width="0.5"/>
    <text x="340" y="370" text-anchor="middle" font-size="10" fill="#555">Weak (community strings)</text>
    <rect x="440" y="353" width="280" height="24" fill="#e8f5e9" stroke="#ddd" stroke-width="0.5"/>
    <text x="580" y="370" text-anchor="middle" font-size="10" fill="#555">Strong (SSH mandatory)</text>
    <rect x="80" y="377" width="160" height="24" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
    <text x="160" y="394" text-anchor="middle" font-size="10" fill="#333">Data Model</text>
    <rect x="240" y="377" width="200" height="24" fill="#fce4ec" stroke="#ddd" stroke-width="0.5"/>
    <text x="340" y="394" text-anchor="middle" font-size="10" fill="#555">Limited MIBs</text>
    <rect x="440" y="377" width="280" height="24" fill="#e8f5e9" stroke="#ddd" stroke-width="0.5"/>
    <text x="580" y="394" text-anchor="middle" font-size="10" fill="#555">Rich YANG models</text>
    <rect x="80" y="401" width="160" height="24" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
    <text x="160" y="418" text-anchor="middle" font-size="10" fill="#333">Transactions</text>
    <rect x="240" y="401" width="200" height="24" fill="#fce4ec" stroke="#ddd" stroke-width="0.5"/>
    <text x="340" y="418" text-anchor="middle" font-size="10" fill="#555">No</text>
    <rect x="440" y="401" width="280" height="24" fill="#e8f5e9" stroke="#ddd" stroke-width="0.5"/>
    <text x="580" y="418" text-anchor="middle" font-size="10" fill="#555">Yes (atomic commit/rollback)</text>
  </g>

  <!-- Step 4: IoT Management Architecture -->
  <g id="step4" class="step" data-narration="In a typical IoT deployment, the management application communicates through a NETCONF server controller which uses YANG data models to configure multiple IoT devices over secure SSH connections.">
    <text x="400" y="455" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">NETCONF IoT Management Architecture</text>
    <rect x="50" y="468" width="140" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="120" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Mgmt App</text>
    <text x="120" y="503" text-anchor="middle" font-size="9" fill="#555">(NMS Client)</text>
    <line x1="190" y1="490" x2="255" y2="490" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="222" y="484" text-anchor="middle" font-size="8" fill="#888">RPCs</text>

    <rect x="260" y="465" width="150" height="50" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="335" y="487" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">NETCONF Server</text>
    <text x="335" y="503" text-anchor="middle" font-size="9" fill="#555">(Controller)</text>

    <line x1="410" y1="480" x2="475" y2="472" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="410" y1="490" x2="475" y2="490" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="410" y1="500" x2="475" y2="508" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="480" y="460" width="110" height="28" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="6"/>
    <text x="535" y="478" text-anchor="middle" font-size="10" fill="#ff9800">IoT Device 1</text>
    <rect x="480" y="492" width="110" height="28" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="6"/>
    <text x="535" y="510" text-anchor="middle" font-size="10" fill="#ff9800">IoT Device 2</text>

    <rect x="620" y="468" width="140" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="690" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">YANG Models</text>
    <text x="690" y="503" text-anchor="middle" font-size="9" fill="#555">Data schema</text>
    <line x1="620" y1="490" x2="595" y2="490" stroke="#388e3c" stroke-width="1" stroke-dasharray="4,3"/>
  </g>

  <!-- Step 5: Key Advantages -->
  <g id="step5" class="step" data-narration="NETCONF key advantages for IoT include standardized vendor-neutral configuration, transaction support preventing inconsistent states, validation through YANG constraints, and extensibility for adding new device capabilities.">
    <text x="400" y="545" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Key Advantages for IoT</text>
    <rect x="50" y="555" width="160" height="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="15"/>
    <text x="130" y="575" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Standardization</text>
    <rect x="225" y="555" width="140" height="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="15"/>
    <text x="295" y="575" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Transactions</text>
    <rect x="380" y="555" width="140" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="15"/>
    <text x="450" y="575" text-anchor="middle" font-size="10" font-weight="bold" fill="#ff9800">Validation</text>
    <rect x="535" y="555" width="140" height="30" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="15"/>
    <text x="605" y="575" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">Extensibility</text>
  </g>
</svg>
