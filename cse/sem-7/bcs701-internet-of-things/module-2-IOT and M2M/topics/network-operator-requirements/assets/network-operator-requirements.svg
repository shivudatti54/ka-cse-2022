<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Network Operator Requirements for IoT</text>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#666">Six critical requirements organized as capability cards</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <!-- Step 0: Card 1 - Scalability (top-left) -->
  <g id="step0" class="step" data-narration="Network operators must support massive connection density, with technologies like NB-IoT and LTE-M handling millions of low-data devices.">
    <rect x="30" y="75" width="235" height="135" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="10"/>
    <!-- Checkmark icon -->
    <circle cx="60" cy="100" r="14" fill="#1976d2" opacity="0.15"/>
    <path d="M52 100 L58 106 L68 94" fill="none" stroke="#1976d2" stroke-width="2.5" stroke-linecap="round"/>
    <text x="80" y="105" text-anchor="start" font-size="15" font-weight="bold" fill="#1976d2">Scalability</text>
    <line x1="45" y1="115" x2="250" y2="115" stroke="#1976d2" stroke-width="1" opacity="0.3"/>
    <text x="147" y="135" text-anchor="middle" font-size="11" fill="#555">Massive connection support</text>
    <text x="147" y="152" text-anchor="middle" font-size="11" fill="#555">High device density per cell</text>
    <text x="147" y="172" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">NB-IoT, LTE-M, LoRaWAN</text>
    <text x="147" y="190" text-anchor="middle" font-size="9" fill="#888">Billions of IoT connections</text>
  </g>

  <!-- Step 1: Card 2 - Energy Efficiency (top-center) -->
  <g id="step1" class="step" data-narration="Battery-powered sensors must run for years, requiring PSM power saving mode and eDRX extended reception to minimize energy use.">
    <rect x="282" y="75" width="235" height="135" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="10"/>
    <circle cx="312" cy="100" r="14" fill="#ff9800" opacity="0.15"/>
    <path d="M304 100 L310 106 L320 94" fill="none" stroke="#ff9800" stroke-width="2.5" stroke-linecap="round"/>
    <text x="332" y="105" text-anchor="start" font-size="14" font-weight="bold" fill="#ff9800">Energy Efficiency</text>
    <line x1="297" y1="115" x2="502" y2="115" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
    <text x="399" y="135" text-anchor="middle" font-size="11" fill="#555">Years of battery life needed</text>
    <text x="399" y="152" text-anchor="middle" font-size="11" fill="#555">Deep sleep between transmissions</text>
    <text x="399" y="172" text-anchor="middle" font-size="10" font-weight="bold" fill="#ff9800">PSM, eDRX protocols</text>
    <text x="399" y="190" text-anchor="middle" font-size="9" fill="#888">10+ year battery targets</text>
  </g>

  <!-- Step 2: Card 3 - Network Management (top-right) -->
  <g id="step2" class="step" data-narration="Operators need granular traffic control with shaping policies and APN configurations to prevent IoT traffic from congesting the network.">
    <rect x="535" y="75" width="235" height="135" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="10"/>
    <circle cx="565" cy="100" r="14" fill="#388e3c" opacity="0.15"/>
    <path d="M557 100 L563 106 L573 94" fill="none" stroke="#388e3c" stroke-width="2.5" stroke-linecap="round"/>
    <text x="585" y="105" text-anchor="start" font-size="14" font-weight="bold" fill="#388e3c">Traffic Control</text>
    <line x1="550" y1="115" x2="755" y2="115" stroke="#388e3c" stroke-width="1" opacity="0.3"/>
    <text x="652" y="135" text-anchor="middle" font-size="11" fill="#555">Granular flow management</text>
    <text x="652" y="152" text-anchor="middle" font-size="11" fill="#555">Separate IoT from user traffic</text>
    <text x="652" y="172" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Traffic Shaping, APN config</text>
    <text x="652" y="190" text-anchor="middle" font-size="9" fill="#888">Prevent network congestion</text>
  </g>

  <!-- Step 3: Card 4 - Security (bottom-left) -->
  <g id="step3" class="step" data-narration="Security requires eSIM-based authentication, end-to-end encryption, and secure device onboarding to protect the massive IoT attack surface.">
    <rect x="30" y="235" width="235" height="135" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="10"/>
    <circle cx="60" cy="260" r="14" fill="#e91e63" opacity="0.15"/>
    <path d="M52 260 L58 266 L68 254" fill="none" stroke="#e91e63" stroke-width="2.5" stroke-linecap="round"/>
    <text x="80" y="265" text-anchor="start" font-size="15" font-weight="bold" fill="#e91e63">Security</text>
    <line x1="45" y1="275" x2="250" y2="275" stroke="#e91e63" stroke-width="1" opacity="0.3"/>
    <text x="147" y="295" text-anchor="middle" font-size="11" fill="#555">Strong device authentication</text>
    <text x="147" y="312" text-anchor="middle" font-size="11" fill="#555">End-to-end encryption</text>
    <text x="147" y="332" text-anchor="middle" font-size="10" font-weight="bold" fill="#e91e63">eSIM/iSIM, TLS, Secure boot</text>
    <text x="147" y="350" text-anchor="middle" font-size="9" fill="#888">Massive attack surface defense</text>
  </g>

  <!-- Step 4: Card 5 - QoS (bottom-center) -->
  <g id="step4" class="step" data-narration="Different IoT applications need different QoS levels: low latency for alarms versus best-effort for routine sensor readings.">
    <rect x="282" y="235" width="235" height="135" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="10"/>
    <circle cx="312" cy="260" r="14" fill="#9c27b0" opacity="0.15"/>
    <path d="M304 260 L310 266 L320 254" fill="none" stroke="#9c27b0" stroke-width="2.5" stroke-linecap="round"/>
    <text x="332" y="265" text-anchor="start" font-size="14" font-weight="bold" fill="#9c27b0">Quality of Service</text>
    <line x1="297" y1="275" x2="502" y2="275" stroke="#9c27b0" stroke-width="1" opacity="0.3"/>
    <text x="399" y="295" text-anchor="middle" font-size="11" fill="#555">Tiered service levels</text>
    <text x="399" y="312" text-anchor="middle" font-size="11" fill="#555">Latency / reliability guarantees</text>
    <text x="399" y="332" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">QCI classes, Network Slicing</text>
    <text x="399" y="350" text-anchor="middle" font-size="9" fill="#888">Priority: alarms &gt; routine data</text>
  </g>

  <!-- Step 5: Card 6 - Cost-Effectiveness (bottom-right) -->
  <g id="step5" class="step" data-narration="Mass IoT adoption requires low-cost hardware modules and efficient data plans, enabled by simplified cellular modems and LPWAN chips.">
    <rect x="535" y="235" width="235" height="135" fill="#fff8e1" stroke="#ffa000" stroke-width="2" rx="10"/>
    <circle cx="565" cy="260" r="14" fill="#ffa000" opacity="0.15"/>
    <path d="M557 260 L563 266 L573 254" fill="none" stroke="#ffa000" stroke-width="2.5" stroke-linecap="round"/>
    <text x="585" y="265" text-anchor="start" font-size="14" font-weight="bold" fill="#ffa000">Cost-Effectiveness</text>
    <line x1="550" y1="275" x2="755" y2="275" stroke="#ffa000" stroke-width="1" opacity="0.3"/>
    <text x="652" y="295" text-anchor="middle" font-size="11" fill="#555">Low-cost hardware modules</text>
    <text x="652" y="312" text-anchor="middle" font-size="11" fill="#555">Efficient data plans</text>
    <text x="652" y="332" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffa000">LPWAN, Cat-M1, Cat-NB2</text>
    <text x="652" y="350" text-anchor="middle" font-size="9" fill="#888">Low-cost chipsets for mass market</text>
  </g>

  <!-- Step 6: Central connecting element -->
  <g id="step6" class="step" data-narration="All six requirements must be balanced together by network operators to create commercially viable and operationally stable IoT connectivity.">
    <circle cx="400" cy="435" r="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Network</text>
    <text x="400" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Operator</text>
    <!-- Lines from cards to center -->
    <line x1="147" y1="370" x2="370" y2="420" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="399" y1="370" x2="400" y2="395" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="652" y1="370" x2="430" y2="420" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  </g>

  <!-- Step 7: Summary bar -->
  <g id="step7" class="step" data-narration="Understanding these six operator requirements is essential for IoT architects to design scalable, secure, and commercially viable solutions.">
    <rect x="60" y="500" width="680" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="10"/>
    <text x="400" y="522" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Operator Requirements = IoT Viability</text>
    <text x="400" y="540" text-anchor="middle" font-size="11" fill="#555">Scalability + Low Power + Traffic Control + Security + QoS + Low Cost</text>
  </g>
</svg>