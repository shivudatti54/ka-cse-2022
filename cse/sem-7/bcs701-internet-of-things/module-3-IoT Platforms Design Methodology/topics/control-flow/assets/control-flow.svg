<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Control Flow in IoT Systems</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e91e63"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Control flow determines how an IoT system makes decisions based on sensor data readings.">
    <text x="400" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Control flow determines decision-making in IoT systems</text>
  </g>

  <g id="step1" class="step" data-narration="Sensor reads temperature value, which flows into the first conditional check.">
    <text x="200" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">if / elif / else Branching</text>
    <rect x="30" y="103" width="370" height="120" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="140" y="115" width="140" height="30" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Read temp sensor</text>
    <line x1="210" y1="145" x2="210" y2="160" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="210,160 270,185 210,210 150,185" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="210" y="188" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">temp &gt; 30? (if)</text>
    <line x1="270" y1="185" x2="350" y2="185" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <text x="300" y="178" font-size="10" fill="#388e3c" font-weight="bold">Yes</text>
    <rect x="350" y="172" width="40" height="26" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="370" y="189" text-anchor="middle" font-size="9" fill="#2e7d32">Cool</text>
  </g>

  <g id="step2" class="step" data-narration="First diamond checks if temperature exceeds 30, branching to activate cooling if true.">
    <text x="600" y="95" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff9800">elif Condition</text>
    <rect x="430" y="103" width="350" height="120" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <polygon points="600,120 660,145 600,170 540,145" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="600" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">temp &lt; 10?</text>
    <text x="600" y="155" text-anchor="middle" font-size="10" fill="#e65100">(elif)</text>
    <line x1="660" y1="145" x2="720" y2="145" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <text x="680" y="138" font-size="10" fill="#388e3c" font-weight="bold">Yes</text>
    <rect x="720" y="132" width="40" height="26" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="740" y="149" text-anchor="middle" font-size="9" fill="#e65100">Heat</text>
    <text x="615" y="180" font-size="10" fill="#e91e63" font-weight="bold">No</text>
    <line x1="600" y1="170" x2="600" y2="188" stroke="#e91e63" stroke-width="1.5" marker-end="url(#arrowPink)"/>
    <rect x="560" y="188" width="80" height="26" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="600" y="205" text-anchor="middle" font-size="11" fill="#7b1fa2">else: idle</text>
  </g>

  <g id="step3" class="step" data-narration="If first condition fails, elif checks if temperature is below 10 to activate heating.">
    <text x="200" y="245" text-anchor="middle" font-size="15" font-weight="bold" fill="#388e3c">while Loop</text>
    <rect x="30" y="253" width="370" height="130" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="140" y="265" width="120" height="26" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="200" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Initialize</text>
    <line x1="200" y1="291" x2="200" y2="310" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <polygon points="200,310 260,330 200,350 140,330" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="200" y="331" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">running?</text>
    <text x="200" y="342" text-anchor="middle" font-size="9" fill="#2e7d32">(while)</text>
    <text x="270" y="325" font-size="9" fill="#c62828" font-weight="bold">False</text>
    <line x1="260" y1="330" x2="350" y2="330" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowPink)"/>
    <rect x="350" y="318" width="40" height="24" rx="12" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="370" y="334" text-anchor="middle" font-size="9" fill="#c62828">End</text>
    <text x="215" y="360" font-size="9" fill="#388e3c" font-weight="bold">True</text>
    <line x1="200" y1="350" x2="200" y2="365" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <rect x="145" y="365" width="110" height="12" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="200" y="374" text-anchor="middle" font-size="9" fill="#1976d2">Read sensor</text>
  </g>

  <g id="step4" class="step" data-narration="While loops continuously read sensors until a stop condition is met, ideal for IoT monitoring.">
    <text x="600" y="245" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff9800">for Loop</text>
    <rect x="430" y="253" width="350" height="130" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="490" y="265" width="220" height="26" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="600" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">for sensor in sensors:</text>
    <line x1="600" y1="291" x2="600" y2="310" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <polygon points="600,310 650,330 600,350 550,330" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="600" y="327" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">more</text>
    <text x="600" y="338" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">items?</text>
    <text x="660" y="325" font-size="9" fill="#c62828" font-weight="bold">No</text>
    <line x1="650" y1="330" x2="720" y2="330" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowPink)"/>
    <rect x="720" y="318" width="50" height="24" rx="5" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1.5"/>
    <text x="745" y="334" text-anchor="middle" font-size="9" fill="#616161">Done</text>
    <text x="615" y="360" font-size="9" fill="#388e3c" font-weight="bold">Yes</text>
    <line x1="600" y1="350" x2="600" y2="365" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <rect x="540" y="365" width="120" height="12" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="600" y="374" text-anchor="middle" font-size="9" fill="#1976d2">Process sensor[i]</text>
  </g>

  <g id="step5" class="step" data-narration="For loops iterate over sensor arrays or device lists, processing each element sequentially.">
    <text x="200" y="405" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Loop Example</text>
    <rect x="30" y="413" width="370" height="75" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="50" y="425" width="320" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="210" y="441" text-anchor="middle" font-size="10" fill="#1976d2" font-family="monospace">while running: read_data()</text>
    <rect x="50" y="455" width="320" height="22" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.5"/>
    <text x="210" y="471" text-anchor="middle" font-size="10" fill="#e65100" font-family="monospace">for reading in temp_data: avg += reading</text>
  </g>

  <g id="step6" class="step" data-narration="IoT control can be centralized via cloud, decentralized at edge, or a hybrid of both.">
    <text x="600" y="405" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">IoT Control Models</text>
    <rect x="430" y="413" width="350" height="165" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="450" y="428" width="310" height="42" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="470" y="445" font-size="11" font-weight="bold" fill="#1976d2">Centralized (Cloud)</text>
    <text x="470" y="460" font-size="9" fill="#555">All logic in cloud. High power, high latency.</text>
    <rect x="450" y="478" width="310" height="42" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="470" y="495" font-size="11" font-weight="bold" fill="#388e3c">Decentralized (Edge)</text>
    <text x="470" y="510" font-size="9" fill="#555">Logic at edge gateways. Low latency, offline.</text>
    <rect x="450" y="528" width="310" height="42" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="470" y="545" font-size="11" font-weight="bold" fill="#9c27b0">Hybrid</text>
    <text x="470" y="560" font-size="9" fill="#555">Critical at edge + analytics in cloud.</text>
  </g>
</svg>
