<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Python Classes for IoT</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowInherit" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="none" stroke="#9c27b0" stroke-width="1.5"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Classes define blueprints for objects, organizing IoT device attributes and methods together.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">UML Class Diagram for IoT sensor hierarchy</text>
  </g>

  <g id="step1" class="step" data-narration="The base Sensor class defines common attributes like sensor_id, location, and value shared by all sensors.">
    <rect x="250" y="80" width="300" height="180" rx="3" fill="white" stroke="#1976d2" stroke-width="2.5"/>
    <rect x="250" y="80" width="300" height="35" rx="3" fill="#1976d2"/>
    <rect x="250" y="100" width="300" height="15" fill="#1976d2"/>
    <text x="400" y="103" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Sensor</text>
    <text x="372" y="103" font-size="10" fill="#bbdefb">(Base Class)</text>
    <line x1="250" y1="115" x2="550" y2="115" stroke="#1976d2" stroke-width="1"/>
    <text x="265" y="135" font-size="11" fill="#333">- sensor_id: str</text>
    <text x="265" y="152" font-size="11" fill="#333">- location: str</text>
    <text x="265" y="169" font-size="11" fill="#333">- value: float</text>
    <text x="265" y="186" font-size="11" fill="#333">- is_active: bool</text>
    <line x1="250" y1="195" x2="550" y2="195" stroke="#1976d2" stroke-width="1"/>
    <text x="265" y="215" font-size="11" fill="#1976d2">+ __init__(self, id, loc)</text>
    <text x="265" y="232" font-size="11" fill="#1976d2">+ read_value(self) -&gt; float</text>
    <text x="265" y="249" font-size="11" fill="#1976d2">+ get_status(self) -&gt; str</text>
  </g>

  <g id="step2" class="step" data-narration="TemperatureSensor inherits from Sensor, adding specific attributes like unit and scale for temperature data.">
    <rect x="40" y="340" width="220" height="170" rx="3" fill="white" stroke="#388e3c" stroke-width="2"/>
    <rect x="40" y="340" width="220" height="30" rx="3" fill="#388e3c"/>
    <rect x="40" y="355" width="220" height="15" fill="#388e3c"/>
    <text x="150" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="white">TemperatureSensor</text>
    <line x1="40" y1="370" x2="260" y2="370" stroke="#388e3c" stroke-width="1"/>
    <text x="55" y="390" font-size="10" fill="#333">- unit: str = "Celsius"</text>
    <text x="55" y="407" font-size="10" fill="#333">- min_range: float</text>
    <text x="55" y="424" font-size="10" fill="#333">- max_range: float</text>
    <line x1="40" y1="435" x2="260" y2="435" stroke="#388e3c" stroke-width="1"/>
    <text x="55" y="455" font-size="10" fill="#388e3c">+ read_value(self)</text>
    <text x="55" y="472" font-size="10" fill="#388e3c">+ to_fahrenheit(self)</text>
    <text x="55" y="489" font-size="10" fill="#388e3c">+ check_threshold(self, t)</text>
    <text x="55" y="505" font-size="9" fill="#888">Overrides read_value()</text>
    <line x1="150" y1="340" x2="150" y2="290" stroke="#9c27b0" stroke-width="2"/>
    <line x1="150" y1="290" x2="400" y2="290" stroke="#9c27b0" stroke-width="2"/>
    <line x1="400" y1="290" x2="400" y2="260" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowInherit)"/>
    <text x="230" y="283" font-size="10" fill="#9c27b0" font-weight="bold">inherits</text>
  </g>

  <g id="step3" class="step" data-narration="HumiditySensor also inherits from Sensor with its own specific methods for humidity monitoring.">
    <rect x="290" y="340" width="220" height="170" rx="3" fill="white" stroke="#ff9800" stroke-width="2"/>
    <rect x="290" y="340" width="220" height="30" rx="3" fill="#ff9800"/>
    <rect x="290" y="355" width="220" height="15" fill="#ff9800"/>
    <text x="400" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="white">HumiditySensor</text>
    <line x1="290" y1="370" x2="510" y2="370" stroke="#ff9800" stroke-width="1"/>
    <text x="305" y="390" font-size="10" fill="#333">- unit: str = "%RH"</text>
    <text x="305" y="407" font-size="10" fill="#333">- calibration: float</text>
    <line x1="290" y1="420" x2="510" y2="420" stroke="#ff9800" stroke-width="1"/>
    <text x="305" y="440" font-size="10" fill="#e65100">+ read_value(self)</text>
    <text x="305" y="457" font-size="10" fill="#e65100">+ is_humid(self) -&gt; bool</text>
    <text x="305" y="474" font-size="10" fill="#e65100">+ calibrate(self, offset)</text>
    <text x="305" y="505" font-size="9" fill="#888">Overrides read_value()</text>
    <line x1="400" y1="340" x2="400" y2="260" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowInherit)"/>
  </g>

  <g id="step4" class="step" data-narration="GPSSensor extends Sensor with latitude, longitude, and altitude for IoT location tracking devices.">
    <rect x="540" y="340" width="220" height="170" rx="3" fill="white" stroke="#e91e63" stroke-width="2"/>
    <rect x="540" y="340" width="220" height="30" rx="3" fill="#e91e63"/>
    <rect x="540" y="355" width="220" height="15" fill="#e91e63"/>
    <text x="650" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="white">GPSSensor</text>
    <line x1="540" y1="370" x2="760" y2="370" stroke="#e91e63" stroke-width="1"/>
    <text x="555" y="390" font-size="10" fill="#333">- latitude: float</text>
    <text x="555" y="407" font-size="10" fill="#333">- longitude: float</text>
    <text x="555" y="424" font-size="10" fill="#333">- altitude: float</text>
    <line x1="540" y1="435" x2="760" y2="435" stroke="#e91e63" stroke-width="1"/>
    <text x="555" y="455" font-size="10" fill="#c62828">+ get_coordinates(self)</text>
    <text x="555" y="472" font-size="10" fill="#c62828">+ distance_to(self, other)</text>
    <text x="555" y="489" font-size="10" fill="#c62828">+ read_value(self)</text>
    <text x="555" y="505" font-size="9" fill="#888">Returns (lat, lon, alt)</text>
    <line x1="650" y1="340" x2="650" y2="290" stroke="#9c27b0" stroke-width="2"/>
    <line x1="650" y1="290" x2="400" y2="290" stroke="#9c27b0" stroke-width="2"/>
    <text x="570" y="283" font-size="10" fill="#9c27b0" font-weight="bold">inherits</text>
  </g>

  <g id="step5" class="step" data-narration="Key OOP concepts: encapsulation groups data and methods, inheritance reuses code, polymorphism enables flexibility.">
    <rect x="40" y="530" width="720" height="50" rx="8" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="80" y="552" font-size="11" fill="#1976d2" font-weight="bold">Encapsulation</text>
    <text x="80" y="568" font-size="9" fill="#555">Data + methods bundled</text>
    <text x="260" y="552" font-size="11" fill="#388e3c" font-weight="bold">Inheritance</text>
    <text x="260" y="568" font-size="9" fill="#555">Reuse parent class code</text>
    <text x="430" y="552" font-size="11" fill="#ff9800" font-weight="bold">Polymorphism</text>
    <text x="430" y="568" font-size="9" fill="#555">Same method, diff behavior</text>
    <text x="620" y="552" font-size="11" fill="#e91e63" font-weight="bold">Abstraction</text>
    <text x="620" y="568" font-size="9" fill="#555">Hide internal complexity</text>
  </g>

  <g id="step6" class="step" data-narration="UML legend: minus sign means private attribute, plus sign means public method, arrows show inheritance.">
    <rect x="580" y="80" width="180" height="85" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="670" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#37474f">UML Legend</text>
    <text x="600" y="118" font-size="10" fill="#333">- private attribute</text>
    <text x="600" y="135" font-size="10" fill="#1976d2">+ public method</text>
    <line x1="600" y1="148" x2="640" y2="148" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowInherit)"/>
    <text x="650" y="152" font-size="10" fill="#9c27b0">inherits</text>
  </g>
</svg>
