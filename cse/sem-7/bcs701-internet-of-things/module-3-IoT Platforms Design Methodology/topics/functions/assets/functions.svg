<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Python Functions for IoT</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Functions take input parameters, process them internally, and return output values for reusable IoT logic.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">Input - Process - Output model of Python functions</text>
  </g>

  <g id="step1" class="step" data-narration="Parameters are the input values a function receives, like sensor reading, threshold, and device ID.">
    <text x="130" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">INPUT</text>
    <text x="130" y="112" text-anchor="middle" font-size="11" fill="#888">Parameters</text>
    <rect x="40" y="125" width="180" height="40" rx="20" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="130" y="150" text-anchor="middle" font-size="13" fill="#1976d2">temperature: float</text>
    <rect x="40" y="175" width="180" height="40" rx="20" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="130" y="200" text-anchor="middle" font-size="13" fill="#1976d2">threshold: int = 30</text>
    <rect x="40" y="225" width="180" height="40" rx="20" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="130" y="250" text-anchor="middle" font-size="13" fill="#1976d2">device_id: str</text>
    <line x1="220" y1="145" x2="290" y2="200" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="220" y1="195" x2="290" y2="210" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="220" y1="245" x2="290" y2="225" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step2" class="step" data-narration="The function body contains the processing logic: def check_alert validates readings and decides actions.">
    <text x="400" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">PROCESS</text>
    <text x="400" y="112" text-anchor="middle" font-size="11" fill="#888">Function Body</text>
    <rect x="290" y="125" width="220" height="180" rx="5" fill="white" stroke="#ff9800" stroke-width="3"/>
    <rect x="290" y="125" width="220" height="32" rx="5" fill="#ff9800"/>
    <rect x="290" y="142" width="220" height="15" fill="#ff9800"/>
    <text x="400" y="147" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="monospace">def check_alert()</text>
    <text x="308" y="180" font-size="11" fill="#333" font-family="monospace">if temp &gt; threshold:</text>
    <text x="318" y="198" font-size="11" fill="#388e3c" font-family="monospace">alert = True</text>
    <text x="318" y="216" font-size="11" fill="#388e3c" font-family="monospace">msg = "WARNING"</text>
    <text x="308" y="238" font-size="11" fill="#333" font-family="monospace">else:</text>
    <text x="318" y="256" font-size="11" fill="#1976d2" font-family="monospace">alert = False</text>
    <text x="318" y="274" font-size="11" fill="#1976d2" font-family="monospace">msg = "NORMAL"</text>
    <text x="308" y="296" font-size="11" fill="#9c27b0" font-family="monospace">return (alert, msg)</text>
  </g>

  <g id="step3" class="step" data-narration="Functions return output values like alert status and message, enabling modular IoT system design.">
    <text x="650" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">OUTPUT</text>
    <text x="650" y="112" text-anchor="middle" font-size="11" fill="#888">Return Value</text>
    <line x1="510" y1="200" x2="560" y2="170" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="510" y1="220" x2="560" y2="240" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="560" y="145" width="180" height="40" rx="20" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="650" y="170" text-anchor="middle" font-size="13" fill="#388e3c">alert: bool</text>
    <rect x="560" y="215" width="180" height="40" rx="20" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="650" y="240" text-anchor="middle" font-size="13" fill="#388e3c">message: str</text>
  </g>

  <g id="step4" class="step" data-narration="Python supports multiple function types including regular, lambda, built-in, and generator functions.">
    <line x1="50" y1="330" x2="750" y2="330" stroke="#e0e0e0" stroke-width="1"/>
    <text x="400" y="355" text-anchor="middle" font-size="15" font-weight="bold" fill="#37474f">Types of Functions</text>
  </g>

  <g id="step5" class="step" data-narration="Lambda functions provide compact one-line anonymous functions for quick data transformations.">
    <rect x="30" y="370" width="170" height="95" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="115" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Regular Function</text>
    <text x="115" y="408" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">def read_sensor():</text>
    <text x="115" y="425" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">  val = get_data()</text>
    <text x="115" y="442" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">  return val</text>
    <text x="115" y="460" text-anchor="middle" font-size="9" fill="#1976d2">Named, reusable, documented</text>
  </g>

  <g id="step6" class="step" data-narration="Built-in functions like len, max, min, and print are available without import for quick operations.">
    <rect x="215" y="370" width="170" height="95" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="300" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Lambda Function</text>
    <text x="300" y="411" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">to_f = lambda c:</text>
    <text x="300" y="428" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">  c * 9/5 + 32</text>
    <text x="300" y="460" text-anchor="middle" font-size="9" fill="#ff9800">Anonymous, one-line, inline</text>
  </g>

  <g id="step7" class="step" data-narration="Decorators and generators extend function capabilities for caching, timing, and streaming IoT data.">
    <rect x="400" y="370" width="170" height="95" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="485" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Built-in Functions</text>
    <text x="485" y="411" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">len(readings)</text>
    <text x="485" y="428" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">max(values)</text>
    <text x="485" y="445" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">print(status)</text>
    <text x="485" y="460" text-anchor="middle" font-size="9" fill="#388e3c">Pre-defined, no import</text>
  </g>

  <g id="step8" class="step" data-narration="Call the function with actual sensor values and use the returned tuple for IoT alert processing.">
    <rect x="585" y="370" width="170" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="670" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Advanced</text>
    <text x="670" y="408" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">@decorator</text>
    <text x="670" y="425" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">def generator():</text>
    <text x="670" y="442" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">  yield data</text>
    <text x="670" y="460" text-anchor="middle" font-size="9" fill="#9c27b0">Decorators, generators</text>
  </g>

  <g id="step9" class="step" data-narration="Call the function with actual sensor values and use the returned tuple for IoT alert processing.">
    <rect x="100" y="490" width="600" height="85" rx="8" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="120" y="515" font-size="12" font-weight="bold" fill="#37474f">Usage Example:</text>
    <text x="120" y="540" font-size="11" fill="#333" font-family="monospace">alert, msg = check_alert(temp=35.2, threshold=30, device_id="S01")</text>
    <text x="120" y="560" font-size="10" fill="#388e3c" font-family="monospace"># Returns: (True, "WARNING") -- triggers IoT actuator</text>
  </g>
</svg>
