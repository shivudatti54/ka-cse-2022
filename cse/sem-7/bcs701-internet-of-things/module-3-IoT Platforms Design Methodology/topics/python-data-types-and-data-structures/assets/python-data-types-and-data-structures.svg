<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Python Data Types &amp; Data Structures</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Python provides several built-in data types organized into categories for IoT data handling.">
    <text x="400" y="65" text-anchor="middle" font-size="14" fill="#616161">Fundamental types for handling IoT sensor data</text>
  </g>

  <g id="step1" class="step" data-narration="Integer type stores whole numbers like sensor IDs and count values in IoT applications.">
    <rect x="30" y="90" width="170" height="110" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <rect x="30" y="90" width="170" height="30" rx="10" fill="#1976d2"/>
    <rect x="30" y="105" width="170" height="15" fill="#1976d2"/>
    <text x="115" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">int</text>
    <text x="115" y="140" text-anchor="middle" font-size="12" fill="#333">Whole numbers</text>
    <text x="115" y="158" text-anchor="middle" font-size="11" fill="#1976d2" font-family="monospace">sensor_id = 42</text>
    <text x="115" y="175" text-anchor="middle" font-size="11" fill="#1976d2" font-family="monospace">count = 1024</text>
    <text x="115" y="192" text-anchor="middle" font-size="10" fill="#888">IoT: device IDs, counts</text>
  </g>

  <g id="step2" class="step" data-narration="Float type handles decimal sensor readings like temperature 25.7 and humidity 48.3 values.">
    <rect x="215" y="90" width="170" height="110" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <rect x="215" y="90" width="170" height="30" rx="10" fill="#388e3c"/>
    <rect x="215" y="105" width="170" height="15" fill="#388e3c"/>
    <text x="300" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">float</text>
    <text x="300" y="140" text-anchor="middle" font-size="12" fill="#333">Decimal numbers</text>
    <text x="300" y="158" text-anchor="middle" font-size="11" fill="#388e3c" font-family="monospace">temp = 25.7</text>
    <text x="300" y="175" text-anchor="middle" font-size="11" fill="#388e3c" font-family="monospace">humid = 48.3</text>
    <text x="300" y="192" text-anchor="middle" font-size="10" fill="#888">IoT: sensor readings</text>
  </g>

  <g id="step3" class="step" data-narration="String type stores text data like device names, locations, and status messages in IoT systems.">
    <rect x="400" y="90" width="170" height="110" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <rect x="400" y="90" width="170" height="30" rx="10" fill="#ff9800"/>
    <rect x="400" y="105" width="170" height="15" fill="#ff9800"/>
    <text x="485" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">str</text>
    <text x="485" y="140" text-anchor="middle" font-size="12" fill="#333">Text data</text>
    <text x="485" y="158" text-anchor="middle" font-size="11" fill="#e65100" font-family="monospace">name = "Sensor-A"</text>
    <text x="485" y="175" text-anchor="middle" font-size="11" fill="#e65100" font-family="monospace">loc = "Room 3"</text>
    <text x="485" y="192" text-anchor="middle" font-size="10" fill="#888">IoT: device labels</text>
  </g>

  <g id="step4" class="step" data-narration="Boolean type represents True or False states, crucial for actuator on-off control in IoT.">
    <rect x="585" y="90" width="170" height="110" rx="10" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <rect x="585" y="90" width="170" height="30" rx="10" fill="#e91e63"/>
    <rect x="585" y="105" width="170" height="15" fill="#e91e63"/>
    <text x="670" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">bool</text>
    <text x="670" y="140" text-anchor="middle" font-size="12" fill="#333">True / False</text>
    <text x="670" y="158" text-anchor="middle" font-size="11" fill="#c62828" font-family="monospace">active = True</text>
    <text x="670" y="175" text-anchor="middle" font-size="11" fill="#c62828" font-family="monospace">alarm = False</text>
    <text x="670" y="192" text-anchor="middle" font-size="10" fill="#888">IoT: on/off states</text>
  </g>

  <g id="step5" class="step" data-narration="Lists store ordered, mutable sequences of sensor readings that can grow dynamically.">
    <rect x="30" y="230" width="170" height="110" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <rect x="30" y="230" width="170" height="30" rx="10" fill="#1565c0"/>
    <rect x="30" y="245" width="170" height="15" fill="#1565c0"/>
    <text x="115" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="white">list [ ]</text>
    <text x="115" y="278" text-anchor="middle" font-size="12" fill="#333">Ordered, mutable</text>
    <text x="115" y="296" text-anchor="middle" font-size="11" fill="#1976d2" font-family="monospace">[22.5, 23.1, 24]</text>
    <text x="115" y="314" text-anchor="middle" font-size="10" fill="#888">Append, index, slice</text>
    <text x="115" y="330" text-anchor="middle" font-size="10" fill="#888">IoT: sensor log buffer</text>
  </g>

  <g id="step6" class="step" data-narration="Tuples are immutable sequences ideal for fixed sensor configurations and coordinate pairs.">
    <rect x="215" y="230" width="170" height="110" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <rect x="215" y="230" width="170" height="30" rx="10" fill="#2e7d32"/>
    <rect x="215" y="245" width="170" height="15" fill="#2e7d32"/>
    <text x="300" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="white">tuple ( )</text>
    <text x="300" y="278" text-anchor="middle" font-size="12" fill="#333">Ordered, immutable</text>
    <text x="300" y="296" text-anchor="middle" font-size="11" fill="#388e3c" font-family="monospace">(12.97, 77.59)</text>
    <text x="300" y="314" text-anchor="middle" font-size="10" fill="#888">Fixed, hashable</text>
    <text x="300" y="330" text-anchor="middle" font-size="10" fill="#888">IoT: GPS coordinates</text>
  </g>

  <g id="step7" class="step" data-narration="Dictionaries map keys to values, perfect for JSON-like IoT data packets with named fields.">
    <rect x="400" y="230" width="170" height="110" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <rect x="400" y="230" width="170" height="30" rx="10" fill="#e65100"/>
    <rect x="400" y="245" width="170" height="15" fill="#e65100"/>
    <text x="485" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="white">dict { : }</text>
    <text x="485" y="278" text-anchor="middle" font-size="12" fill="#333">Key-value pairs</text>
    <text x="485" y="296" text-anchor="middle" font-size="11" fill="#e65100" font-family="monospace">{"temp": 25.7}</text>
    <text x="485" y="314" text-anchor="middle" font-size="10" fill="#888">Mutable, fast lookup</text>
    <text x="485" y="330" text-anchor="middle" font-size="10" fill="#888">IoT: JSON payloads</text>
  </g>

  <g id="step8" class="step" data-narration="Sets store unique unordered elements, useful for tracking unique device IDs in a network.">
    <rect x="585" y="230" width="170" height="110" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <rect x="585" y="230" width="170" height="30" rx="10" fill="#7b1fa2"/>
    <rect x="585" y="245" width="170" height="15" fill="#7b1fa2"/>
    <text x="670" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="white">set { }</text>
    <text x="670" y="278" text-anchor="middle" font-size="12" fill="#333">Unique, unordered</text>
    <text x="670" y="296" text-anchor="middle" font-size="11" fill="#7b1fa2" font-family="monospace">{1, 2, 3, 5}</text>
    <text x="670" y="314" text-anchor="middle" font-size="10" fill="#888">No duplicates</text>
    <text x="670" y="330" text-anchor="middle" font-size="10" fill="#888">IoT: unique device IDs</text>
  </g>

  <g id="step9" class="step" data-narration="IoT commonly uses JSON, CSV, and Protobuf formats built on these Python data types.">
    <text x="400" y="380" text-anchor="middle" font-size="15" font-weight="bold" fill="#37474f">IoT Data Interchange Formats</text>
    <line x1="100" y1="390" x2="700" y2="390" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="60" y="405" width="200" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="160" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">JSON</text>
    <text x="160" y="450" text-anchor="middle" font-size="11" fill="#555">Human-readable text</text>
    <text x="160" y="468" text-anchor="middle" font-size="11" fill="#555">Uses dict + list</text>
    <text x="160" y="480" text-anchor="middle" font-size="10" fill="#1976d2">Most common in IoT APIs</text>
    <rect x="290" y="405" width="200" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="390" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">CSV</text>
    <text x="390" y="450" text-anchor="middle" font-size="11" fill="#555">Tabular text data</text>
    <text x="390" y="468" text-anchor="middle" font-size="11" fill="#555">Uses list of lists</text>
    <text x="390" y="480" text-anchor="middle" font-size="10" fill="#388e3c">Time-series data export</text>
    <rect x="520" y="405" width="200" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="620" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Protobuf</text>
    <text x="620" y="450" text-anchor="middle" font-size="11" fill="#555">Compact binary format</text>
    <text x="620" y="468" text-anchor="middle" font-size="11" fill="#555">Schema-defined</text>
    <text x="620" y="480" text-anchor="middle" font-size="10" fill="#ff9800">Bandwidth-constrained</text>
  </g>

  <g id="step10" class="step" data-narration="Understanding data types is essential for efficient IoT data handling and transmission.">
    <rect x="100" y="510" width="600" height="55" rx="8" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="400" y="535" text-anchor="middle" font-size="13" font-weight="bold" fill="#37474f">Key Takeaway</text>
    <text x="400" y="555" text-anchor="middle" font-size="12" fill="#555">Python dict maps naturally to JSON -- the lingua franca of IoT data interchange</text>
  </g>
</svg>
