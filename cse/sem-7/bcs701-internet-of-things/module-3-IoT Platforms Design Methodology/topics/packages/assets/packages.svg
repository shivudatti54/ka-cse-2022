<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Packages in IoT Development</text>

  <g id="step0" class="step" data-narration="Packages in IoT are collections of software, libraries, and tools that simplify development by providing pre-built functionalities for device management, data processing, and communication.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">Pre-built software bundles for IoT: device management, data processing, and communication</text>
  </g>

  <g id="step1" class="step" data-narration="IoT packages cover four core areas: device management for registration and firmware updates, data processing for sensor analytics, communication protocols like MQTT and CoAP, and security with encryption.">
    <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Core Package Areas</text>
    <rect x="30" y="105" width="170" height="80" rx="8" fill="#1976d2"/>
    <text x="115" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Device Mgmt</text>
    <text x="115" y="150" text-anchor="middle" font-size="10" fill="#bbdefb">Registration, config</text>
    <text x="115" y="167" text-anchor="middle" font-size="10" fill="#bbdefb">Firmware updates</text>
    <rect x="215" y="105" width="170" height="80" rx="8" fill="#388e3c"/>
    <text x="300" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Data Processing</text>
    <text x="300" y="150" text-anchor="middle" font-size="10" fill="#c8e6c9">Collection, analysis</text>
    <text x="300" y="167" text-anchor="middle" font-size="10" fill="#c8e6c9">Decision-making</text>
    <rect x="400" y="105" width="170" height="80" rx="8" fill="#ff9800"/>
    <text x="485" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Communication</text>
    <text x="485" y="150" text-anchor="middle" font-size="10" fill="#fff3e0">MQTT, CoAP, HTTP</text>
    <text x="485" y="167" text-anchor="middle" font-size="10" fill="#fff3e0">Protocol libraries</text>
    <rect x="585" y="105" width="185" height="80" rx="8" fill="#e91e63"/>
    <text x="677" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Security</text>
    <text x="677" y="150" text-anchor="middle" font-size="10" fill="#fce4ec">Encryption, auth</text>
    <text x="677" y="167" text-anchor="middle" font-size="10" fill="#fce4ec">Access control</text>
  </g>

  <g id="step2" class="step" data-narration="Arduino provides comprehensive hardware interfacing libraries. Node-RED offers flow-based visual programming for IoT. AWS IoT SDK enables cloud integration with device shadows and rules.">
    <text x="400" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Popular IoT Package Platforms</text>
    <rect x="30" y="230" width="230" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="145" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Arduino</text>
    <text x="145" y="275" text-anchor="middle" font-size="10" fill="#555">Microcontroller platform</text>
    <text x="145" y="292" text-anchor="middle" font-size="10" fill="#555">Hardware interfacing libs</text>
    <text x="145" y="309" text-anchor="middle" font-size="10" fill="#555">Sensor and actuator drivers</text>
    <text x="145" y="323" text-anchor="middle" font-size="9" fill="#1976d2">C/C++ ecosystem</text>
    <rect x="280" y="230" width="230" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="395" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Node-RED</text>
    <text x="395" y="275" text-anchor="middle" font-size="10" fill="#555">Flow-based programming</text>
    <text x="395" y="292" text-anchor="middle" font-size="10" fill="#555">Visual drag-and-drop</text>
    <text x="395" y="309" text-anchor="middle" font-size="10" fill="#555">Protocol integration nodes</text>
    <text x="395" y="323" text-anchor="middle" font-size="9" fill="#388e3c">JavaScript/Node.js</text>
    <rect x="530" y="230" width="240" height="100" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="650" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">AWS IoT SDK</text>
    <text x="650" y="275" text-anchor="middle" font-size="10" fill="#555">Cloud integration</text>
    <text x="650" y="292" text-anchor="middle" font-size="10" fill="#555">Device shadows, rules</text>
    <text x="650" y="309" text-anchor="middle" font-size="10" fill="#555">Security and analytics</text>
    <text x="650" y="323" text-anchor="middle" font-size="9" fill="#ff9800">Python/C/JS supported</text>
  </g>

  <g id="step3" class="step" data-narration="Package managers like pip for Python, npm for Node.js, and opkg for embedded Linux handle installation, dependency resolution, and updates for IoT device software.">
    <text x="400" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Package Management</text>
    <rect x="60" y="380" width="200" height="60" rx="6" fill="#1976d2"/>
    <text x="160" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="white">pip (Python)</text>
    <text x="160" y="425" text-anchor="middle" font-size="10" fill="#bbdefb">pip install paho-mqtt</text>
    <rect x="290" y="380" width="200" height="60" rx="6" fill="#388e3c"/>
    <text x="390" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="white">npm (Node.js)</text>
    <text x="390" y="425" text-anchor="middle" font-size="10" fill="#c8e6c9">npm install mqtt</text>
    <rect x="520" y="380" width="220" height="60" rx="6" fill="#ff9800"/>
    <text x="630" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="white">opkg (Embedded)</text>
    <text x="630" y="425" text-anchor="middle" font-size="10" fill="#fff3e0">opkg install package</text>
  </g>

  <g id="step4" class="step" data-narration="OTA updates deliver firmware and software packages wirelessly. Packages must be cryptographically signed to prevent tampering. Rollback plans are essential for safe deployment.">
    <text x="400" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">OTA Updates and Security</text>
    <rect x="30" y="485" width="350" height="55" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="205" y="508" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Security Requirements</text>
    <text x="205" y="528" text-anchor="middle" font-size="10" fill="#555">Crypto-signed packages | Integrity verification | Rollback support</text>
    <rect x="400" y="485" width="370" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="585" y="508" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">OTA Update Flow</text>
    <text x="585" y="528" text-anchor="middle" font-size="10" fill="#555">Build package -> Sign -> Transmit -> Verify -> Install -> Confirm</text>
  </g>

  <g id="step5" class="step" data-narration="Key takeaway: IoT packages reduce development complexity by providing ready-made components for device management, communication, and security across heterogeneous device fleets.">
    <rect x="100" y="555" width="600" height="30" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="400" y="575" text-anchor="middle" font-size="11" fill="#555">Packages simplify IoT dev: pre-built components + secure OTA updates + cross-platform support</text>
  </g>
</svg>
