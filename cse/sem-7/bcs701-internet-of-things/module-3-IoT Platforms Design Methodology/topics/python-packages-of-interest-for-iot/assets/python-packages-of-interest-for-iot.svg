<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Python Packages of Interest for IoT</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Python sits at the center of IoT development, with specialized packages radiating outward for every need.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">Hub-and-spoke diagram: Python at the center of the IoT ecosystem</text>
  </g>

  <g id="step1" class="step" data-narration="Python is the central hub powering IoT development with its simplicity and extensive package ecosystem.">
    <circle cx="400" cy="300" r="70" fill="#1976d2" stroke="#0d47a1" stroke-width="3"/>
    <circle cx="400" cy="300" r="60" fill="#1565c0"/>
    <text x="400" y="290" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Python</text>
    <text x="400" y="312" text-anchor="middle" font-size="11" fill="#bbdefb">IoT Hub</text>
    <text x="400" y="328" text-anchor="middle" font-size="10" fill="#90caf9">pip install</text>
  </g>

  <g id="step2" class="step" data-narration="NumPy provides efficient numerical arrays and math operations for processing batches of sensor data.">
    <line x1="340" y1="250" x2="190" y2="120" stroke="#388e3c" stroke-width="2"/>
    <circle cx="150" cy="100" r="55" fill="#e8f5e9" stroke="#388e3c" stroke-width="2.5"/>
    <text x="150" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">NumPy</text>
    <text x="150" y="108" text-anchor="middle" font-size="9" fill="#555">Numerical arrays</text>
    <text x="150" y="123" text-anchor="middle" font-size="9" fill="#555">Stats, filtering</text>
    <text x="150" y="140" text-anchor="middle" font-size="8" fill="#388e3c">Sensor data math</text>
  </g>

  <g id="step3" class="step" data-narration="Pandas excels at time-series data analysis with DataFrames, resampling, and aggregation for IoT logs.">
    <line x1="445" y1="240" x2="530" y2="110" stroke="#1976d2" stroke-width="2"/>
    <circle cx="555" cy="95" r="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="2.5"/>
    <text x="555" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Pandas</text>
    <text x="555" y="103" text-anchor="middle" font-size="9" fill="#555">DataFrames</text>
    <text x="555" y="118" text-anchor="middle" font-size="9" fill="#555">Time-series analysis</text>
    <text x="555" y="133" text-anchor="middle" font-size="8" fill="#1976d2">IoT log analytics</text>
  </g>

  <g id="step4" class="step" data-narration="Flask creates lightweight REST APIs and web dashboards for controlling and monitoring IoT devices.">
    <line x1="465" y1="280" x2="640" y2="230" stroke="#ff9800" stroke-width="2"/>
    <circle cx="670" cy="220" r="55" fill="#fff3e0" stroke="#ff9800" stroke-width="2.5"/>
    <text x="670" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Flask</text>
    <text x="670" y="228" text-anchor="middle" font-size="9" fill="#555">Web framework</text>
    <text x="670" y="243" text-anchor="middle" font-size="9" fill="#555">REST APIs</text>
    <text x="670" y="258" text-anchor="middle" font-size="8" fill="#ff9800">IoT dashboards</text>
  </g>

  <g id="step5" class="step" data-narration="Paho-MQTT implements the MQTT protocol for lightweight publish-subscribe messaging in IoT networks.">
    <line x1="465" y1="330" x2="640" y2="400" stroke="#e91e63" stroke-width="2"/>
    <circle cx="670" cy="425" r="55" fill="#fce4ec" stroke="#e91e63" stroke-width="2.5"/>
    <text x="670" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">paho-mqtt</text>
    <text x="670" y="428" text-anchor="middle" font-size="9" fill="#555">Pub/Sub messaging</text>
    <text x="670" y="443" text-anchor="middle" font-size="9" fill="#555">QoS levels</text>
    <text x="670" y="458" text-anchor="middle" font-size="8" fill="#e91e63">Device-cloud comm</text>
  </g>

  <g id="step6" class="step" data-narration="RPi.GPIO controls Raspberry Pi hardware pins for reading digital sensors and driving actuators.">
    <line x1="345" y1="355" x2="200" y2="470" stroke="#9c27b0" stroke-width="2"/>
    <circle cx="165" cy="495" r="55" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2.5"/>
    <text x="165" y="483" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">RPi.GPIO</text>
    <text x="165" y="501" text-anchor="middle" font-size="9" fill="#555">Hardware control</text>
    <text x="165" y="516" text-anchor="middle" font-size="9" fill="#555">Digital I/O, PWM</text>
    <text x="165" y="531" text-anchor="middle" font-size="8" fill="#9c27b0">Sensors and LEDs</text>
  </g>

  <g id="step7" class="step" data-narration="Matplotlib visualizes sensor trends, histograms, and real-time data plots for IoT monitoring.">
    <line x1="340" y1="270" x2="120" y2="270" stroke="#ff9800" stroke-width="2"/>
    <circle cx="80" cy="270" r="50" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="80" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Matplotlib</text>
    <text x="80" y="278" text-anchor="middle" font-size="9" fill="#555">Data plotting</text>
    <text x="80" y="293" text-anchor="middle" font-size="9" fill="#555">Charts, graphs</text>
    <text x="80" y="308" text-anchor="middle" font-size="8" fill="#ff9800">Sensor trends</text>
  </g>

  <g id="step8" class="step" data-narration="PySerial enables serial communication with Arduino and GPS modules for hardware interfacing.">
    <line x1="390" y1="370" x2="380" y2="490" stroke="#1976d2" stroke-width="2"/>
    <circle cx="380" cy="535" r="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="380" y="528" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">PySerial</text>
    <text x="380" y="545" text-anchor="middle" font-size="9" fill="#555">Serial comm</text>
    <text x="380" y="558" text-anchor="middle" font-size="8" fill="#1976d2">Arduino, GPS</text>
  </g>

  <g id="step9" class="step" data-narration="Requests library sends HTTP requests to cloud REST APIs for uploading sensor data and receiving commands.">
    <line x1="440" y1="365" x2="540" y2="485" stroke="#388e3c" stroke-width="2"/>
    <circle cx="555" cy="525" r="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="555" y="518" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Requests</text>
    <text x="555" y="535" text-anchor="middle" font-size="9" fill="#555">HTTP client</text>
    <text x="555" y="548" text-anchor="middle" font-size="8" fill="#388e3c">Cloud API calls</text>
  </g>

  <g id="step10" class="step" data-narration="SciPy provides advanced signal processing, filtering, and optimization for IoT sensor data analysis.">
    <line x1="360" y1="240" x2="310" y2="130" stroke="#e91e63" stroke-width="2"/>
    <circle cx="300" cy="110" r="45" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="300" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">SciPy</text>
    <text x="300" y="120" text-anchor="middle" font-size="9" fill="#555">Signal processing</text>
    <text x="300" y="135" text-anchor="middle" font-size="8" fill="#e91e63">Noise filtering</text>
  </g>
</svg>
