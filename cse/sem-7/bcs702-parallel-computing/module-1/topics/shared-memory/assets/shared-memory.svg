<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Shared Memory &amp; Semaphores in IPC</text>

  <g id="step0" class="step" data-narration="Shared memory is the fastest IPC mechanism because processes communicate by reading and writing a common memory region, avoiding kernel copies.">
    <rect x="80" y="60" width="640" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">What is Shared Memory?</text>
    <text x="400" y="102" text-anchor="middle" font-size="11" fill="#555">Fastest IPC: multiple processes access the same memory segment directly</text>
    <rect x="120" y="135" width="120" height="45" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="180" y="162" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Process A</text>
    <rect x="560" y="135" width="120" height="45" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="620" y="162" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Process B</text>
    <rect x="290" y="135" width="220" height="45" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Shared Memory Segment</text>
    <line x1="240" y1="158" x2="290" y2="158" stroke="#1976d2" stroke-width="2"/>
    <line x1="510" y1="158" x2="560" y2="158" stroke="#1976d2" stroke-width="2"/>
  </g>

  <g id="step1" class="step" data-narration="The shared memory lifecycle involves five key system calls: ftok generates a key, shmget creates the segment, shmat attaches it to the process address space, shmdt detaches, and shmctl controls or removes it.">
    <text x="400" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Shared Memory System Calls</text>
    <rect x="60" y="245" width="120" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="120" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">ftok()</text>
    <rect x="200" y="245" width="120" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="260" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">shmget()</text>
    <rect x="340" y="245" width="120" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">shmat()</text>
    <rect x="480" y="245" width="120" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="540" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">shmdt()</text>
    <rect x="620" y="245" width="120" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="680" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">shmctl()</text>
    <text x="120" y="300" text-anchor="middle" font-size="9" fill="#888">Gen key</text>
    <text x="260" y="300" text-anchor="middle" font-size="9" fill="#888">Create/get</text>
    <text x="400" y="300" text-anchor="middle" font-size="9" fill="#888">Attach</text>
    <text x="540" y="300" text-anchor="middle" font-size="9" fill="#888">Detach</text>
    <text x="680" y="300" text-anchor="middle" font-size="9" fill="#888">Control/rm</text>
  </g>

  <g id="step2" class="step" data-narration="Semaphores are synchronization primitives that prevent race conditions on shared memory. The P (wait) operation decrements the value, and the V (signal) operation increments it.">
    <text x="400" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Semaphores for Synchronization</text>
    <rect x="100" y="350" width="250" height="55" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="225" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Wait (P operation)</text>
    <text x="225" y="393" text-anchor="middle" font-size="10" fill="#555">Decrement; block if negative</text>
    <rect x="450" y="350" width="250" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="575" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Signal (V operation)</text>
    <text x="575" y="393" text-anchor="middle" font-size="10" fill="#555">Increment; wake blocked proc</text>
  </g>

  <g id="step3" class="step" data-narration="The producer-consumer problem uses three semaphores: mutex for mutual exclusion, empty to count available slots, and full to count available items in a shared buffer.">
    <rect x="60" y="425" width="680" height="55" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="447" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">Producer-Consumer with 3 Semaphores</text>
    <text x="200" y="470" text-anchor="middle" font-size="10" fill="#555">mutex = 1</text>
    <text x="400" y="470" text-anchor="middle" font-size="10" fill="#555">empty = BUFFER_SIZE</text>
    <text x="600" y="470" text-anchor="middle" font-size="10" fill="#555">full = 0</text>
  </g>

  <g id="step4" class="step" data-narration="System V IPC objects persist in the kernel until explicitly removed with shmctl or semctl, or until system reboot. Use ipcs and ipcrm commands to manage them.">
    <rect x="80" y="500" width="640" height="80" rx="10" fill="#fffde7" stroke="#ffc107" stroke-width="2"/>
    <text x="400" y="525" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">Key Takeaways</text>
    <text x="400" y="548" text-anchor="middle" font-size="11" fill="#333">Shared memory = fastest IPC; Semaphores = synchronization guard</text>
    <text x="400" y="568" text-anchor="middle" font-size="11" fill="#333">IPC objects have kernel persistence -- use ipcrm to clean up</text>
  </g>
</svg>
