<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Parallel Hardware &amp; Software Classification</text>

  <g id="step0" class="step" data-narration="Flynn's Taxonomy classifies computer architectures based on the number of concurrent instruction streams and data streams they can handle. It defines four primary categories.">
    <rect x="250" y="55" width="300" height="40" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b1fa2">Flynn's Taxonomy (1966)</text>
    <line x1="320" y1="95" x2="150" y2="125" stroke="#9c27b0" stroke-width="1.5"/>
    <line x1="370" y1="95" x2="300" y2="125" stroke="#9c27b0" stroke-width="1.5"/>
    <line x1="430" y1="95" x2="500" y2="125" stroke="#9c27b0" stroke-width="1.5"/>
    <line x1="480" y1="95" x2="650" y2="125" stroke="#9c27b0" stroke-width="1.5"/>
    <rect x="80" y="125" width="140" height="50" rx="8" fill="#eeeeee" stroke="#bbb" stroke-width="1.5"/>
    <text x="150" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">SISD</text>
    <text x="150" y="165" text-anchor="middle" font-size="9" fill="#888">Sequential CPU</text>
    <rect x="230" y="125" width="140" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="300" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">SIMD</text>
    <text x="300" y="165" text-anchor="middle" font-size="9" fill="#555">GPUs, Vector procs</text>
    <rect x="430" y="125" width="140" height="50" rx="8" fill="#fffde7" stroke="#ffc107" stroke-width="1.5"/>
    <text x="500" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#f57f17">MISD</text>
    <text x="500" y="165" text-anchor="middle" font-size="9" fill="#888">Fault tolerance</text>
    <rect x="580" y="125" width="140" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="650" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">MIMD</text>
    <text x="650" y="165" text-anchor="middle" font-size="9" fill="#555">Multi-core, Clusters</text>
  </g>

  <g id="step1" class="step" data-narration="SISD is the traditional sequential computer. SIMD executes one instruction on multiple data elements simultaneously, ideal for data-parallel tasks like vector and matrix operations.">
    <rect x="60" y="200" width="340" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="230" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">SISD vs SIMD</text>
    <text x="80" y="248" font-size="10" fill="#555">SISD: 1 processor, 1 instruction, 1 data (von Neumann)</text>
    <text x="80" y="265" font-size="10" fill="#555">SIMD: 1 instruction broadcast to many PEs, each on own data</text>
    <text x="80" y="282" font-size="10" fill="#555">SIMD examples: GPU shader cores, AVX, NEON extensions</text>
  </g>

  <g id="step2" class="step" data-narration="MIMD is the most common and flexible architecture today. Multiple processors operate independently, each executing its own instruction on its own data. It is further classified by memory organization.">
    <rect x="420" y="200" width="340" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="590" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">MIMD Classification</text>
    <text x="440" y="248" font-size="10" fill="#555">Most common parallel architecture today</text>
    <text x="440" y="265" font-size="10" fill="#555">Shared Memory: UMA (SMP) or NUMA</text>
    <text x="440" y="282" font-size="10" fill="#555">Distributed Memory: Clusters, message passing</text>
  </g>

  <g id="step3" class="step" data-narration="Memory architecture determines the programming model. Shared memory uses OpenMP with threads sharing global data. Distributed memory uses MPI with explicit message passing between separate address spaces.">
    <rect x="60" y="310" width="680" height="100" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Memory Architecture and Programming Models</text>
    <rect x="80" y="350" width="300" height="45" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="230" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Shared Memory</text>
    <text x="230" y="388" text-anchor="middle" font-size="10" fill="#555">OpenMP, Pthreads -- threads share variables</text>
    <rect x="420" y="350" width="300" height="45" rx="6" fill="#fff" stroke="#388e3c" stroke-width="1.5"/>
    <text x="570" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Distributed Memory</text>
    <text x="570" y="388" text-anchor="middle" font-size="10" fill="#555">MPI -- processes exchange messages</text>
  </g>

  <g id="step4" class="step" data-narration="Key software challenges include load balancing work evenly, synchronizing parallel tasks to avoid race conditions, and minimizing communication overhead between processing units.">
    <rect x="80" y="430" width="640" height="55" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="400" y="455" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Key Software Challenges</text>
    <text x="200" y="475" text-anchor="middle" font-size="10" fill="#555">Load Balancing</text>
    <text x="400" y="475" text-anchor="middle" font-size="10" fill="#555">Synchronization</text>
    <text x="600" y="475" text-anchor="middle" font-size="10" fill="#555">Communication Overhead</text>
  </g>

  <g id="step5" class="step" data-narration="Most modern systems are MIMD architectures using hybrid memory models. Knowing Flynn's Taxonomy and the shared vs distributed distinction is essential for understanding parallel computing.">
    <rect x="80" y="505" width="640" height="75" rx="10" fill="#fffde7" stroke="#ffc107" stroke-width="2"/>
    <text x="400" y="530" text-anchor="middle" font-size="14" font-weight="bold" fill="#f57f17">Key Takeaways</text>
    <text x="400" y="550" text-anchor="middle" font-size="11" fill="#333">Flynn's Taxonomy: SISD (sequential) | SIMD (data parallel) | MIMD (most common)</text>
    <text x="400" y="568" text-anchor="middle" font-size="11" fill="#333">Memory model determines programming approach: OpenMP vs MPI</text>
  </g>
</svg>
