<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Introduction to Parallel Programming</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Step 0: Intro + Sequential vs Parallel (FULL WIDTH y=40-115) -->
  <g id="step0" class="step" data-narration="Parallel programming divides work among multiple processors to decrease execution time and increase computational throughput. Instead of running tasks one after another, parallel execution runs them simultaneously.">
    <rect x="50" y="40" width="700" height="35" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Execute multiple operations simultaneously to solve problems faster</text>
    <text x="200" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Sequential</text>
    <rect x="80" y="96" width="240" height="20" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="200" y="111" text-anchor="middle" font-size="9" fill="#e65100">Task 1 → Task 2 → Task 3 → Task 4</text>
    <text x="580" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Parallel</text>
    <rect x="480" y="96" width="90" height="20" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="525" y="111" text-anchor="middle" font-size="9" fill="#2e7d32">Task 1 | Task 2</text>
    <rect x="580" y="96" width="90" height="20" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="625" y="111" text-anchor="middle" font-size="9" fill="#2e7d32">Task 3 | Task 4</text>
  </g>

  <!-- Step 1: Why Parallel (LEFT y=125-215) -->
  <g id="step1" class="step" data-narration="Physical limits on clock speed, power walls, big data demands, and real-time processing needs all drive the shift to parallelism.">
    <text x="200" y="137" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Why Parallel Computing?</text>
    <rect x="40" y="145" width="160" height="32" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="120" y="166" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Physical Limits</text>
    <rect x="210" y="145" width="160" height="32" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="290" y="166" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Power Wall</text>
    <rect x="40" y="183" width="160" height="32" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="120" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Big Data</text>
    <rect x="210" y="183" width="160" height="32" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="290" y="204" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Real-Time Needs</text>
  </g>

  <!-- Step 2: Flynn's Taxonomy (RIGHT y=125-215) -->
  <g id="step2" class="step" data-narration="Flynn's Taxonomy classifies architectures into SISD for sequential, SIMD for GPUs and vector processors, MISD for fault tolerance, and MIMD for multi-core and clusters.">
    <text x="600" y="137" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Flynn's Taxonomy</text>
    <rect x="500" y="148" width="200" height="22" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="600" y="164" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">Computer Architectures</text>
    <line x1="540" y1="170" x2="480" y2="182" stroke="#9c27b0" stroke-width="1"/>
    <line x1="570" y1="170" x2="545" y2="182" stroke="#9c27b0" stroke-width="1"/>
    <line x1="630" y1="170" x2="650" y2="182" stroke="#9c27b0" stroke-width="1"/>
    <line x1="660" y1="170" x2="720" y2="182" stroke="#9c27b0" stroke-width="1"/>
    <rect x="430" y="182" width="100" height="32" rx="5" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="480" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">SISD</text>
    <text x="480" y="208" text-anchor="middle" font-size="7" fill="#888">Sequential</text>
    <rect x="538" y="182" width="100" height="32" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="588" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">SIMD</text>
    <text x="588" y="208" text-anchor="middle" font-size="7" fill="#555">GPUs, Vectors</text>
    <rect x="646" y="182" width="50" height="32" rx="5" fill="#fffde7" stroke="#ffc107" stroke-width="1"/>
    <text x="671" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57f17">MISD</text>
    <text x="671" y="208" text-anchor="middle" font-size="7" fill="#888">Rare</text>
    <rect x="702" y="182" width="68" height="32" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="736" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">MIMD</text>
    <text x="736" y="208" text-anchor="middle" font-size="7" fill="#555">Multi-core</text>
  </g>

  <!-- Step 3: Memory Architectures (FULL WIDTH y=225-335) -->
  <g id="step3" class="step" data-narration="Memory architecture splits into shared memory where all cores access one address space, and distributed memory with private per-node memory connected by a network.">
    <text x="400" y="237" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Memory Architectures</text>
    <rect x="40" y="248" width="350" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="215" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Shared Memory</text>
    <rect x="60" y="275" width="50" height="22" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="85" y="290" text-anchor="middle" font-size="8" fill="#0d47a1">Core0</text>
    <rect x="115" y="275" width="50" height="22" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="290" text-anchor="middle" font-size="8" fill="#0d47a1">Core1</text>
    <rect x="170" y="275" width="50" height="22" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="195" y="290" text-anchor="middle" font-size="8" fill="#0d47a1">Core2</text>
    <rect x="225" y="275" width="50" height="22" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="250" y="290" text-anchor="middle" font-size="8" fill="#0d47a1">Core3</text>
    <rect x="60" y="304" width="215" height="20" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="168" y="318" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">Global Shared Memory</text>
    <rect x="410" y="248" width="350" height="85" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="585" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Distributed Memory</text>
    <rect x="430" y="275" width="65" height="35" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="462" y="290" text-anchor="middle" font-size="7" fill="#2e7d32">CPU+Mem</text>
    <text x="462" y="302" text-anchor="middle" font-size="7" fill="#2e7d32">Node 0</text>
    <rect x="502" y="275" width="65" height="35" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="534" y="290" text-anchor="middle" font-size="7" fill="#2e7d32">CPU+Mem</text>
    <text x="534" y="302" text-anchor="middle" font-size="7" fill="#2e7d32">Node 1</text>
    <rect x="574" y="275" width="65" height="35" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="606" y="290" text-anchor="middle" font-size="7" fill="#2e7d32">CPU+Mem</text>
    <text x="606" y="302" text-anchor="middle" font-size="7" fill="#2e7d32">Node 2</text>
    <rect x="646" y="275" width="65" height="35" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="678" y="290" text-anchor="middle" font-size="7" fill="#2e7d32">CPU+Mem</text>
    <text x="678" y="302" text-anchor="middle" font-size="7" fill="#2e7d32">Node 3</text>
    <line x1="430" y1="316" x2="710" y2="316" stroke="#ff9800" stroke-width="2"/>
    <text x="570" y="328" text-anchor="middle" font-size="8" fill="#e65100">Interconnect Network</text>
  </g>

  <!-- Step 4: Programming Models (LEFT y=345-430) -->
  <g id="step4" class="step" data-narration="Three main models exist: shared memory using OpenMP with threads sharing variables, message passing using MPI with explicit send and receive, and data parallel using CUDA for GPUs.">
    <text x="200" y="357" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Programming Models</text>
    <rect x="30" y="365" width="110" height="62" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="85" y="383" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Shared Mem</text>
    <text x="85" y="397" text-anchor="middle" font-size="9" fill="#555">OpenMP, Pthreads</text>
    <text x="85" y="420" text-anchor="middle" font-size="8" fill="#888">Threads share vars</text>
    <rect x="150" y="365" width="110" height="62" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="205" y="383" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Msg Passing</text>
    <text x="205" y="397" text-anchor="middle" font-size="9" fill="#555">MPI</text>
    <text x="205" y="420" text-anchor="middle" font-size="8" fill="#888">Explicit send/recv</text>
    <rect x="270" y="365" width="110" height="62" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="325" y="383" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Data Parallel</text>
    <text x="325" y="397" text-anchor="middle" font-size="9" fill="#555">CUDA, OpenCL</text>
    <text x="325" y="420" text-anchor="middle" font-size="8" fill="#888">GPU-accelerated</text>
  </g>

  <!-- Step 5: Key Challenges (RIGHT y=345-430) -->
  <g id="step5" class="step" data-narration="The four main challenges are partitioning work across processors, minimizing communication overhead, synchronization between tasks using locks and barriers, and load balancing to keep all cores busy.">
    <text x="600" y="357" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Key Challenges</text>
    <rect x="420" y="365" width="85" height="62" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
    <text x="462" y="383" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">Partition</text>
    <text x="462" y="398" text-anchor="middle" font-size="8" fill="#555">Divide work</text>
    <text x="462" y="420" text-anchor="middle" font-size="7" fill="#888">Domain/Functional</text>
    <rect x="510" y="365" width="85" height="62" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="552" y="383" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Communicate</text>
    <text x="552" y="398" text-anchor="middle" font-size="8" fill="#555">Data exchange</text>
    <text x="552" y="420" text-anchor="middle" font-size="7" fill="#888">Minimize xfers</text>
    <rect x="600" y="365" width="85" height="62" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="642" y="383" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">Synchronize</text>
    <text x="642" y="398" text-anchor="middle" font-size="8" fill="#555">Coordinate</text>
    <text x="642" y="420" text-anchor="middle" font-size="7" fill="#888">Locks, barriers</text>
    <rect x="690" y="365" width="85" height="62" rx="6" fill="#fffde7" stroke="#ffc107" stroke-width="1.5"/>
    <text x="732" y="383" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">Balance</text>
    <text x="732" y="398" text-anchor="middle" font-size="8" fill="#555">Equal loads</text>
    <text x="732" y="420" text-anchor="middle" font-size="7" fill="#888">No idle cores</text>
  </g>

  <!-- Step 6: Key Takeaways (FULL WIDTH y=440-590) -->
  <g id="step6" class="step" data-narration="Parallel programming is essential for modern computing. It overcomes single-processor physical limits. Flynn's Taxonomy classifies architectures. Match the programming model to the hardware for best results.">
    <rect x="40" y="440" width="720" height="150" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Key Takeaways</text>
    <text x="70" y="485" font-size="10" fill="#333">1. Parallel computing overcomes single-processor physical limits</text>
    <text x="70" y="505" font-size="10" fill="#333">2. Flynn's Taxonomy: SISD, SIMD, MISD, MIMD classifications</text>
    <text x="70" y="525" font-size="10" fill="#333">3. Shared memory (OpenMP) vs Distributed memory (MPI) paradigms</text>
    <text x="70" y="545" font-size="10" fill="#333">4. Data parallel (CUDA/OpenCL) for GPU-accelerated workloads</text>
    <text x="70" y="565" font-size="10" fill="#333">5. Challenges: partitioning, communication, synchronization, load balance</text>
    <text x="70" y="585" font-size="10" fill="#333">6. Match programming model to hardware architecture for best performance</text>
  </g>
</svg>
