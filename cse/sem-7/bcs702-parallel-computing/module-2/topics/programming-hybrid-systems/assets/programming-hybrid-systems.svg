<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Programming Hybrid Systems - CPU + GPU</text>

  <g id="step0" class="step" data-narration="Hybrid systems combine CPUs and GPUs to leverage the strengths of each. CPUs handle complex sequential logic and control flow, while GPUs accelerate data-parallel computations. This heterogeneous approach is the foundation of modern high-performance computing.">
    <rect x="80" y="60" width="640" height="55" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Heterogeneous Computing: Best of Both Worlds</text>
    <text x="400" y="102" text-anchor="middle" font-size="11" fill="#555">CPUs for sequential logic + GPUs for data-parallel throughput</text>
  </g>

  <g id="step1" class="step" data-narration="The hybrid architecture consists of a host CPU connected to a device GPU via the PCIe bus. The CPU manages control flow and I/O while the GPU handles massively parallel computation. Each has its own separate memory space requiring explicit data transfers.">
    <text x="400" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Hybrid Architecture</text>
    <rect x="80" y="160" width="280" height="130" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Host (CPU)</text>
    <text x="220" y="205" text-anchor="middle" font-size="9" fill="#555">Complex logic, control flow</text>
    <text x="220" y="220" text-anchor="middle" font-size="9" fill="#555">Task management, I/O</text>
    <rect x="110" y="235" width="220" height="30" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="255" text-anchor="middle" font-size="9" fill="#0d47a1">System Memory (RAM)</text>
    <rect x="400" y="195" width="80" height="25" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="440" y="212" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">PCIe</text>
    <line x1="360" y1="207" x2="400" y2="207" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="480" y1="207" x2="520" y2="207" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="520" y="160" width="200" height="130" rx="10" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
    <text x="620" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Device (GPU)</text>
    <text x="620" y="205" text-anchor="middle" font-size="9" fill="#555">Data-parallel compute</text>
    <text x="620" y="220" text-anchor="middle" font-size="9" fill="#555">SIMD/SIMT operations</text>
    <rect x="540" y="235" width="160" height="30" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
    <text x="620" y="255" text-anchor="middle" font-size="9" fill="#2e7d32">GPU Memory (VRAM)</text>
  </g>

  <g id="step2" class="step" data-narration="The hybrid programming workflow follows five steps: initialize on CPU, allocate GPU memory, transfer data from host to device, launch GPU kernels for parallel computation, and transfer results back. Minimizing data transfers is critical for performance.">
    <text x="400" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Hybrid Programming Workflow</text>
    <rect x="60" y="330" width="130" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="125" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">1. CPU Init</text>
    <text x="125" y="363" text-anchor="middle" font-size="7" fill="#555">Setup + allocate</text>
    <line x1="190" y1="352" x2="210" y2="352" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="210" y="330" width="130" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="275" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">2. Copy H->D</text>
    <text x="275" y="363" text-anchor="middle" font-size="7" fill="#555">cudaMemcpy</text>
    <line x1="340" y1="352" x2="360" y2="352" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="360" y="330" width="130" height="45" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <text x="425" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">3. GPU Kernel</text>
    <text x="425" y="363" text-anchor="middle" font-size="7" fill="#555">Parallel compute</text>
    <line x1="490" y1="352" x2="510" y2="352" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="510" y="330" width="130" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="575" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">4. Copy D->H</text>
    <text x="575" y="363" text-anchor="middle" font-size="7" fill="#555">Results back</text>
    <line x1="640" y1="352" x2="660" y2="352" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="660" y="330" width="80" height="45" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="700" y="348" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">5. CPU</text>
    <text x="700" y="363" text-anchor="middle" font-size="7" fill="#555">Post-process</text>
  </g>

  <g id="step3" class="step" data-narration="Key technologies for hybrid programming include CUDA for NVIDIA GPUs, OpenCL for cross-platform computing, and OpenMP with target directives for offloading to accelerators. Each offers different trade-offs between portability and performance.">
    <text x="400" y="400" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Hybrid Programming Technologies</text>
    <rect x="60" y="420" width="215" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="167" y="442" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">CUDA</text>
    <text x="167" y="460" text-anchor="middle" font-size="9" fill="#555">NVIDIA-specific</text>
    <text x="167" y="475" text-anchor="middle" font-size="9" fill="#555">Best performance</text>
    <text x="167" y="490" text-anchor="middle" font-size="9" fill="#555">C/C++ extensions</text>
    <rect x="292" y="420" width="215" height="80" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <text x="399" y="442" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">OpenCL</text>
    <text x="399" y="460" text-anchor="middle" font-size="9" fill="#555">Cross-platform</text>
    <text x="399" y="475" text-anchor="middle" font-size="9" fill="#555">CPU + GPU + FPGA</text>
    <text x="399" y="490" text-anchor="middle" font-size="9" fill="#555">Vendor-neutral</text>
    <rect x="524" y="420" width="215" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="631" y="442" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">OpenMP Target</text>
    <text x="631" y="460" text-anchor="middle" font-size="9" fill="#555">Pragma-based</text>
    <text x="631" y="475" text-anchor="middle" font-size="9" fill="#555">Easy offloading</text>
    <text x="631" y="490" text-anchor="middle" font-size="9" fill="#555">#pragma omp target</text>
  </g>

  <g id="step4" class="step" data-narration="Performance optimization in hybrid systems requires minimizing PCIe data transfers, overlapping computation and communication using asynchronous operations, using pinned memory for faster transfers, and balancing workload between CPU and GPU.">
    <text x="200" y="530" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Minimize Data Transfers</text>
    <text x="200" y="548" text-anchor="middle" font-size="8" fill="#555">Keep data on GPU</text>
    <text x="200" y="562" text-anchor="middle" font-size="8" fill="#555">Use pinned memory</text>
    <text x="200" y="576" text-anchor="middle" font-size="8" fill="#555">Batch transfers</text>
    <text x="600" y="530" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Overlap Compute + Transfer</text>
    <text x="600" y="548" text-anchor="middle" font-size="8" fill="#555">Async operations (streams)</text>
    <text x="600" y="562" text-anchor="middle" font-size="8" fill="#555">Balance CPU and GPU</text>
    <text x="600" y="576" text-anchor="middle" font-size="8" fill="#555">Profile first</text>
  </g>

  <g id="step5" class="step" data-narration="Hybrid systems are essential for modern HPC. The key lessons are understanding CPU versus GPU strengths, minimizing data transfers, choosing the right programming model, and balancing workloads between heterogeneous processors for maximum performance.">
    <rect x="80" y="145" width="640" height="125" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Key Takeaways</text>
    <text x="120" y="190" font-size="10" fill="#333">1. CPU: sequential logic + GPU: data-parallel throughput</text>
    <text x="120" y="208" font-size="10" fill="#333">2. Workflow: Init > Copy H2D > Kernel > Copy D2H > Post-process</text>
    <text x="120" y="226" font-size="10" fill="#333">3. Technologies: CUDA (NVIDIA), OpenCL (portable), OpenMP target</text>
    <text x="120" y="244" font-size="10" fill="#333">4. Minimize PCIe transfers -- biggest performance bottleneck</text>
    <text x="120" y="262" font-size="10" fill="#333">5. Use async operations and streams to overlap work</text>
  </g>
</svg>
