<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">GPU Performance Factors</text>

  <!-- Step 0: Massive parallelism (Concentric Circles) -->
  <g id="step0" class="step" data-narration="GPU performance relies on massive parallelism. Thousands of simple cores execute in SIMT mode for extreme data throughput.">
    <rect x="80" y="60" width="640" height="50" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">GPU Performance = Massive Parallelism + Memory Optimization + Latency Hiding</text>
    <text x="400" y="100" text-anchor="middle" font-size="12" fill="#555">Thousands of cores organized into Streaming Multiprocessors (SMs)</text>
    <!-- SM diagram -->
    <rect x="100" y="125" width="600" height="85" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">GPU = Many Streaming Multiprocessors (SMs)</text>
    <rect x="120" y="155" width="95" height="40" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="167" y="172" text-anchor="middle" font-size="9" fill="#0d47a1">SM 0</text>
    <text x="167" y="186" text-anchor="middle" font-size="8" fill="#555">128 cores</text>
    <rect x="225" y="155" width="95" height="40" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="272" y="172" text-anchor="middle" font-size="9" fill="#0d47a1">SM 1</text>
    <text x="272" y="186" text-anchor="middle" font-size="8" fill="#555">128 cores</text>
    <rect x="330" y="155" width="95" height="40" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="377" y="172" text-anchor="middle" font-size="9" fill="#0d47a1">SM 2</text>
    <text x="377" y="186" text-anchor="middle" font-size="8" fill="#555">128 cores</text>
    <rect x="435" y="155" width="95" height="40" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="482" y="172" text-anchor="middle" font-size="9" fill="#0d47a1">SM 3</text>
    <text x="482" y="186" text-anchor="middle" font-size="8" fill="#555">128 cores</text>
    <text x="560" y="177" text-anchor="middle" font-size="14" fill="#999">...</text>
    <rect x="605" y="155" width="70" height="40" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="640" y="177" text-anchor="middle" font-size="9" fill="#0d47a1">SM N</text>
  </g>

  <!-- Step 1: Memory Hierarchy (LEFT) -->
  <g id="step1" class="step" data-narration="GPU memory hierarchy has registers as fastest, then shared memory per SM, then large but slow global DRAM. Optimize for the fastest levels.">
    <rect x="40" y="225" width="345" height="95" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="212" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">GPU Memory Hierarchy</text>
    <text x="212" y="263" text-anchor="middle" font-size="9" fill="#2e7d32">Registers: Fastest, per-thread</text>
    <text x="212" y="279" text-anchor="middle" font-size="9" fill="#ff9800">Shared Memory: Fast, per-SM</text>
    <text x="212" y="295" text-anchor="middle" font-size="9" fill="#e91e63">Global Memory: Large, SLOW</text>
    <text x="212" y="312" text-anchor="middle" font-size="9" fill="#555">Inner = faster + smaller</text>
  </g>

  <!-- Step 2: Coalesced Access (RIGHT) -->
  <g id="step2" class="step" data-narration="Coalesced memory access means consecutive threads access consecutive memory addresses. This maximizes transfer efficiency from global memory.">
    <rect x="415" y="225" width="345" height="95" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="587" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Memory Coalescing</text>
    <text x="587" y="263" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Coalesced (GOOD)</text>
    <text x="587" y="278" text-anchor="middle" font-size="9" fill="#555">T0:Addr0 | T1:Addr1 | T2:Addr2 | T3:Addr3</text>
    <text x="587" y="293" text-anchor="middle" font-size="9" fill="#2e7d32">= 1 memory transaction</text>
    <text x="587" y="312" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Non-coalesced (BAD)</text>
    <text x="587" y="327" text-anchor="middle" font-size="9" fill="#555">T0:Addr0 | T1:Addr128 | T2:Addr256 | T3:Addr384</text>
    <text x="587" y="342" text-anchor="middle" font-size="9" fill="#c62828">= 4 memory transactions!</text>
  </g>

  <!-- Step 3: Latency Hiding (LEFT) -->
  <g id="step3" class="step" data-narration="GPUs hide memory latency by switching between warps. While one warp waits for data, another warp computes, keeping cores busy.">
    <rect x="40" y="335" width="345" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="212" y="353" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Latency Hiding via Warp Switching</text>
    <text x="70" y="373" font-size="9" fill="#1976d2" font-weight="bold">Warp A:</text>
    <text x="140" y="373" font-size="8" fill="#0d47a1">Compute</text>
    <text x="210" y="373" font-size="8" fill="#c62828">Wait (memory)</text>
    <text x="310" y="373" font-size="8" fill="#0d47a1">Compute</text>

    <text x="70" y="393" font-size="9" fill="#388e3c" font-weight="bold">Warp B:</text>
    <text x="210" y="393" font-size="8" fill="#2e7d32">Compute (runs while A waits)</text>

    <text x="70" y="413" font-size="9" fill="#ff9800" font-weight="bold">Warp C:</text>
    <text x="310" y="413" font-size="8" fill="#e65100">Compute</text>

    <text x="212" y="427" text-anchor="middle" font-size="9" fill="#555">Hardware switches warps instantly -- cores stay busy</text>
  </g>

  <!-- Step 4: Occupancy (RIGHT) -->
  <g id="step4" class="step" data-narration="Occupancy measures active warps per SM. Higher occupancy means better latency hiding. It depends on registers, shared memory, and block size.">
    <rect x="415" y="335" width="345" height="95" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="587" y="353" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Occupancy</text>
    <rect x="450" y="365" width="275" height="22" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="587" y="380" text-anchor="middle" font-size="10" fill="#9c27b0">= Active Warps / Max Warps per SM</text>
    <text x="587" y="400" text-anchor="middle" font-size="9" fill="#555">Limited by:</text>
    <text x="480" y="416" font-size="8" fill="#1976d2">Register Usage</text>
    <text x="587" y="416" font-size="8" fill="#ff9800">Shared Memory</text>
    <text x="690" y="416" font-size="8" fill="#388e3c">Block Size</text>
  </g>

  <!-- Step 5: Tiled matrix multiply (LEFT) -->
  <g id="step5" class="step" data-narration="Tiled matrix multiplication loads tiles into fast shared memory, reducing global accesses. This is the key GPU optimization technique.">
    <rect x="40" y="445" width="345" height="95" rx="8" fill="#fffde7" stroke="#ffc107" stroke-width="2"/>
    <text x="212" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">Optimization: Tiled Matrix Multiply</text>
    <rect x="70" y="478" width="120" height="30" rx="5" fill="#ffcdd2" stroke="#e91e63" stroke-width="1.5"/>
    <text x="130" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">Naive: Global Mem</text>
    <text x="130" y="506" text-anchor="middle" font-size="8" fill="#555">Slow, redundant</text>
    <line x1="195" y1="493" x2="225" y2="493" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="210" y="488" text-anchor="middle" font-size="7" fill="#555">optimize</text>
    <rect x="225" y="478" width="130" height="30" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="290" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">Tiled: Shared Mem</text>
    <text x="290" y="506" text-anchor="middle" font-size="8" fill="#555">10-100x faster</text>
    <text x="212" y="527" text-anchor="middle" font-size="9" fill="#555">Load tile to shared mem, compute, massive reduction in global reads</text>
  </g>

  <!-- Step 6: Summary (RIGHT) -->
  <g id="step6" class="step" data-narration="GPU performance is about parallel algorithm design and memory management. Maximize thread count, coalesce accesses, and use shared memory.">
    <rect x="415" y="445" width="345" height="145" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="587" y="465" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Key Takeaways</text>
    <text x="440" y="485" font-size="10" fill="#333">1. Massive parallelism: thousands of cores in SIMT mode</text>
    <text x="440" y="503" font-size="10" fill="#333">2. Memory: Registers > Shared > Global (optimize for top)</text>
    <text x="440" y="521" font-size="10" fill="#333">3. Coalesced access: consecutive threads, addresses</text>
    <text x="440" y="539" font-size="10" fill="#333">4. Latency hiding: many warps keep cores busy</text>
    <text x="440" y="557" font-size="10" fill="#333">5. Occupancy: balance register and shared memory</text>
    <text x="440" y="575" font-size="10" fill="#333">6. Tiling: load data tiles into shared memory</text>
  </g>
</svg>
