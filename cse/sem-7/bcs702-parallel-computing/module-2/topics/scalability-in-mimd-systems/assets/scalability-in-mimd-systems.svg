<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Scalability in MIMD Systems</text>

  <g id="step0" class="step" data-narration="Scalability measures how well a system handles more work with more resources. Speedup shows how much faster, efficiency shows how well processors are utilized.">
    <rect x="80" y="55" width="640" height="75" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="77" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Key Scalability Metrics</text>
    <text x="250" y="102" text-anchor="middle" font-size="12" fill="#333">Speedup S(p) = T(1) / T(p)</text>
    <text x="550" y="102" text-anchor="middle" font-size="12" fill="#333">Efficiency E(p) = S(p) / p</text>
    <text x="250" y="120" text-anchor="middle" font-size="9" fill="#555">How much faster with p processors</text>
    <text x="550" y="120" text-anchor="middle" font-size="9" fill="#555">How well processors are utilized</text>
  </g>

  <g id="step1" class="step" data-narration="Strong scaling keeps problem size fixed, adding processors to reduce time. Weak scaling grows problem size with processors to maintain constant time.">
    <text x="400" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Strong vs Weak Scaling</text>
    <rect x="80" y="175" width="300" height="100" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
    <text x="230" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Strong Scaling</text>
    <text x="230" y="217" text-anchor="middle" font-size="10" fill="#333">Problem size: FIXED</text>
    <text x="230" y="235" text-anchor="middle" font-size="10" fill="#333">Processors: increasing</text>
    <text x="230" y="255" text-anchor="middle" font-size="9" fill="#888">Goal: reduce execution time</text>
    <rect x="420" y="175" width="300" height="100" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <text x="570" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Weak Scaling</text>
    <text x="570" y="217" text-anchor="middle" font-size="10" fill="#333">Problem size: grows with p</text>
    <text x="570" y="235" text-anchor="middle" font-size="10" fill="#333">Processors: increasing</text>
    <text x="570" y="255" text-anchor="middle" font-size="9" fill="#888">Goal: maintain constant time</text>
  </g>

  <g id="step2" class="step" data-narration="Amdahl's Law limits strong scaling: with 10% sequential code, max speedup is 10x. Gustafson's Law enables near-linear speedup as problem grows with processors.">
    <text x="400" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Scaling Laws</text>
    <rect x="80" y="320" width="300" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="230" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Amdahl's Law (Strong)</text>
    <text x="230" y="362" text-anchor="middle" font-size="10" fill="#333">S(p) = 1 / [f + (1-f)/p]</text>
    <text x="230" y="380" text-anchor="middle" font-size="10" fill="#333">Max speedup = 1/f</text>
    <text x="230" y="396" text-anchor="middle" font-size="9" fill="#555">f=0.1 → max 10x speedup</text>
    <rect x="420" y="320" width="300" height="85" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <text x="570" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Gustafson's Law (Weak)</text>
    <text x="570" y="362" text-anchor="middle" font-size="10" fill="#333">S(p) = p - α(p-1)</text>
    <text x="570" y="380" text-anchor="middle" font-size="10" fill="#333">Near-linear speedup</text>
    <text x="570" y="396" text-anchor="middle" font-size="9" fill="#555">α = serial fraction on 1 proc</text>
  </g>

  <g id="step3" class="step" data-narration="Four main bottlenecks limit scalability: communication overhead between processors, workload imbalance, memory bandwidth saturation, and synchronization costs.">
    <text x="400" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Scalability Bottlenecks</text>
    <rect x="60" y="450" width="160" height="65" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="140" y="472" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Communication</text>
    <text x="140" y="490" text-anchor="middle" font-size="8" fill="#555">Message latency</text>
    <text x="140" y="505" text-anchor="middle" font-size="8" fill="#555">Bandwidth limits</text>
    <rect x="235" y="450" width="160" height="65" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="315" y="472" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Load Imbalance</text>
    <text x="315" y="490" text-anchor="middle" font-size="8" fill="#555">Uneven work</text>
    <text x="315" y="505" text-anchor="middle" font-size="8" fill="#555">Idle processors</text>
    <rect x="410" y="450" width="160" height="65" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="490" y="472" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Memory BW</text>
    <text x="490" y="490" text-anchor="middle" font-size="8" fill="#555">Bandwidth saturation</text>
    <text x="490" y="505" text-anchor="middle" font-size="8" fill="#555">Cache thrashing</text>
    <rect x="585" y="450" width="160" height="65" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="665" y="472" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">Synchronization</text>
    <text x="665" y="490" text-anchor="middle" font-size="8" fill="#555">Barriers, locks</text>
    <text x="665" y="505" text-anchor="middle" font-size="8" fill="#555">Contention</text>
  </g>

  <g id="step4" class="step" data-narration="To improve scalability: overlap communication with computation, use dynamic load balancing, optimize memory access patterns, and design algorithms for the memory hierarchy.">
    <text x="400" y="535" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Improving Scalability</text>
    <rect x="70" y="555" width="130" height="40" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="135" y="572" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">Overlap Comm</text>
    <text x="135" y="587" text-anchor="middle" font-size="8" fill="#555">with compute</text>
    <rect x="215" y="555" width="130" height="40" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="280" y="572" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Load Balance</text>
    <text x="280" y="587" text-anchor="middle" font-size="8" fill="#555">dynamic scheduling</text>
    <rect x="360" y="555" width="130" height="40" rx="6" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/>
    <text x="425" y="572" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Memory Access</text>
    <text x="425" y="587" text-anchor="middle" font-size="8" fill="#555">coalesced patterns</text>
    <rect x="505" y="555" width="130" height="40" rx="6" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1.5"/>
    <text x="570" y="572" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">Hierarchical</text>
    <text x="570" y="587" text-anchor="middle" font-size="8" fill="#555">match memory</text>
    <rect x="650" y="555" width="85" height="40" rx="6" fill="#ffccbc" stroke="#d84315" stroke-width="1.5"/>
    <text x="692" y="572" text-anchor="middle" font-size="9" font-weight="bold" fill="#d84315">Minimize</text>
    <text x="692" y="587" text-anchor="middle" font-size="8" fill="#555">data movement</text>
  </g>
</svg>