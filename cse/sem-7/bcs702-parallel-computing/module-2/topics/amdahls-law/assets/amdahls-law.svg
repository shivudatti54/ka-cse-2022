<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1565c0">Amdahl's Law - Parallel Performance Limits</text>

  <!-- Step 0: Formula Introduction (y=42-120) -->
  <g id="step0" class="step" data-narration="Amdahl's Law predicts the maximum speedup from parallelization. The formula is Speedup equals 1 divided by the sum of the sequential fraction and the parallel fraction divided by the number of processors. The sequential portion fundamentally limits achievable speedup.">
    <rect x="80" y="42" width="640" height="75" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Amdahl's Law Formula</text>
    <text x="400" y="82" text-anchor="middle" font-size="13" fill="#333">Speedup = 1 / [(1 - P) + (P / N)]</text>
    <text x="200" y="105" text-anchor="middle" font-size="10" fill="#555">P = parallelizable fraction</text>
    <text x="400" y="105" text-anchor="middle" font-size="10" fill="#555">N = number of processors</text>
    <text x="600" y="105" text-anchor="middle" font-size="10" fill="#555">(1-P) = sequential fraction</text>
  </g>

  <!-- Step 1: Visual Breakdown (y=125-235) -->
  <g id="step1" class="step" data-narration="A program consists of a sequential portion that cannot be parallelized and a parallel portion distributed across processors. As processors increase, the parallel portion shrinks but the sequential portion remains constant, forming a hard limit on speedup.">
    <text x="400" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Program Execution Breakdown</text>
    <text x="70" y="167" text-anchor="start" font-size="10" fill="#555">1 CPU:</text>
    <rect x="150" y="155" width="130" height="20" rx="4" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="215" y="169" text-anchor="middle" font-size="9" fill="#b71c1c">Sequential (1-P)</text>
    <rect x="280" y="155" width="440" height="20" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
    <text x="500" y="169" text-anchor="middle" font-size="9" fill="#2e7d32">Parallelizable (P)</text>
    <text x="70" y="197" text-anchor="start" font-size="10" fill="#555">4 CPUs:</text>
    <rect x="150" y="185" width="130" height="20" rx="4" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="215" y="199" text-anchor="middle" font-size="9" fill="#b71c1c">Sequential (1-P)</text>
    <rect x="280" y="185" width="110" height="20" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
    <text x="335" y="199" text-anchor="middle" font-size="9" fill="#2e7d32">P/4</text>
    <text x="70" y="227" text-anchor="start" font-size="10" fill="#555">Inf CPUs:</text>
    <rect x="150" y="215" width="130" height="20" rx="4" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="215" y="229" text-anchor="middle" font-size="9" fill="#b71c1c">Sequential remains!</text>
  </g>

  <!-- Step 2: Numerical Example (LEFT y=245-380) -->
  <g id="step2" class="step" data-narration="For a program with 80 percent parallelizable code, using 4 processors gives only 2.5x speedup. With 16 processors, speedup is just 3.48x. Even with infinite processors, the maximum is only 5x because the 20 percent sequential portion dominates.">
    <text x="200" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Example: P = 0.8</text>
    <rect x="40" y="266" width="330" height="18" rx="3" fill="#fffde7" stroke="#ffc107" stroke-width="1"/>
    <text x="100" y="279" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">CPUs</text>
    <text x="215" y="279" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">Calculation</text>
    <text x="335" y="279" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">Speedup</text>
    <rect x="40" y="284" width="330" height="18" fill="#fff"/>
    <text x="100" y="297" text-anchor="middle" font-size="9" fill="#333">N = 4</text>
    <text x="215" y="297" text-anchor="middle" font-size="9" fill="#333">1/[0.2 + 0.8/4]</text>
    <text x="335" y="297" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">2.50x</text>
    <rect x="40" y="302" width="330" height="18" fill="#f5f5f5"/>
    <text x="100" y="315" text-anchor="middle" font-size="9" fill="#333">N = 16</text>
    <text x="215" y="315" text-anchor="middle" font-size="9" fill="#333">1/[0.2 + 0.05]</text>
    <text x="335" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">3.48x</text>
    <rect x="40" y="320" width="330" height="18" fill="#fff"/>
    <text x="100" y="333" text-anchor="middle" font-size="9" fill="#333">N = inf</text>
    <text x="215" y="333" text-anchor="middle" font-size="9" fill="#333">1/[0.2 + 0]</text>
    <text x="335" y="333" text-anchor="middle" font-size="9" font-weight="bold" fill="#e53935">5.00x max</text>
    <rect x="40" y="345" width="330" height="30" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="205" y="365" text-anchor="middle" font-size="9" fill="#e65100">20% sequential limits max speedup to 5x</text>
  </g>

  <!-- Step 3: Gustafson Comparison (RIGHT y=245-380) -->
  <g id="step3" class="step" data-narration="Gustafson's Law offers an optimistic alternative by assuming problem size scales with processors. While Amdahl focuses on fixed-size strong scaling, Gustafson shows that larger problems can achieve near-linear speedup in weak scaling scenarios.">
    <rect x="410" y="248" width="175" height="128" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
    <text x="498" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Amdahl's Law</text>
    <text x="498" y="286" text-anchor="middle" font-size="9" fill="#333">Fixed problem size</text>
    <text x="498" y="302" text-anchor="middle" font-size="9" fill="#333">S = 1/[(1-P) + P/N]</text>
    <text x="498" y="318" text-anchor="middle" font-size="9" fill="#333">Max = 1/(1-P)</text>
    <text x="498" y="340" text-anchor="middle" font-size="9" fill="#e53935">Pessimistic</text>
    <text x="498" y="358" text-anchor="middle" font-size="8" fill="#555">Strong scaling</text>
    <rect x="600" y="248" width="175" height="128" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <text x="688" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Gustafson's Law</text>
    <text x="688" y="286" text-anchor="middle" font-size="9" fill="#333">Scaled problem size</text>
    <text x="688" y="302" text-anchor="middle" font-size="9" fill="#333">S = N + (1-N)*α</text>
    <text x="688" y="318" text-anchor="middle" font-size="9" fill="#333">Near-linear speedup</text>
    <text x="688" y="340" text-anchor="middle" font-size="9" fill="#2e7d32">Optimistic</text>
    <text x="688" y="358" text-anchor="middle" font-size="8" fill="#555">Weak scaling</text>
  </g>

  <!-- Step 4: GPU Context (FULL WIDTH y=390-475) -->
  <g id="step4" class="step" data-narration="In GPU programming, Amdahl's Law is critical because data transfers between CPU and GPU memory, kernel launch overhead, and serial preprocessing all contribute to the sequential fraction that limits the benefit of thousands of GPU cores.">
    <text x="400" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Amdahl's Law in GPU Programming</text>
    <rect x="40" y="412" width="165" height="48" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="122" y="432" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Data Transfer</text>
    <text x="122" y="448" text-anchor="middle" font-size="8" fill="#555">CPU-GPU overhead</text>
    <rect x="215" y="412" width="165" height="48" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="298" y="432" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Kernel Launch</text>
    <text x="298" y="448" text-anchor="middle" font-size="8" fill="#555">Init cost</text>
    <rect x="390" y="412" width="165" height="48" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="472" y="432" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Serial Code</text>
    <text x="472" y="448" text-anchor="middle" font-size="8" fill="#555">Pre/post processing</text>
    <rect x="565" y="412" width="195" height="48" rx="6" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
    <text x="662" y="432" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">GPU Parallel</text>
    <text x="662" y="448" text-anchor="middle" font-size="8" fill="#555">1000s of cores</text>
    <text x="400" y="475" text-anchor="middle" font-size="10" fill="#e53935">Red = sequential bottlenecks limiting GPU speedup</text>
  </g>

  <!-- Step 5: Key Takeaways (FULL WIDTH y=485-590) -->
  <g id="step5" class="step" data-narration="Amdahl's Law teaches that speedup is bounded by the sequential fraction, optimizing serial code matters more than adding processors, and knowing the parallel fraction helps determine the optimal number of processors to avoid diminishing returns.">
    <rect x="40" y="485" width="720" height="108" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="505" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Key Takeaways</text>
    <text x="60" y="525" font-size="10" fill="#333">1. Maximum speedup = 1/(1-P), bounded by sequential fraction</text>
    <text x="60" y="543" font-size="10" fill="#333">2. Optimize sequential code first -- biggest impact on speedup</text>
    <text x="60" y="561" font-size="10" fill="#333">3. Adding more processors gives diminishing returns</text>
    <text x="420" y="525" font-size="10" fill="#333">4. Gustafson's Law is more optimistic for scaled problems</text>
    <text x="420" y="543" font-size="10" fill="#333">5. In GPU programs, minimize data transfer to reduce (1-P)</text>
    <text x="420" y="561" font-size="10" fill="#333">6. Efficiency E = S(p)/p decreases as processors increase</text>
  </g>
</svg>
