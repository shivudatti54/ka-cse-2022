<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Shared Memory Programming: OpenMP Pragmas</text>
  <g id="step0" class="step" data-narration="OpenMP is a shared memory parallel programming model that uses compiler directives called pragmas. The master thread forks into a team of worker threads at a parallel region and joins back after it completes.">
    <text x="400" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Fork-Join Model</text>
    <rect x="50" y="85" width="140" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="120" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Master Thread</text>
    <line x1="190" y1="110" x2="250" y2="85" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="190" y1="110" x2="250" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="190" y1="110" x2="250" y2="135" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="260" y="70" width="120" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="320" y="90" text-anchor="middle" font-size="10" fill="#388e3c">Thread 0</text>
    <rect x="260" y="105" width="120" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="320" y="125" text-anchor="middle" font-size="10" fill="#388e3c">Thread 1</text>
    <rect x="260" y="140" width="120" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="320" y="160" text-anchor="middle" font-size="10" fill="#388e3c">Thread N</text>
    <line x1="380" y1="85" x2="440" y2="110" stroke="#1976d2" stroke-width="2"/>
    <line x1="380" y1="120" x2="440" y2="110" stroke="#1976d2" stroke-width="2"/>
    <line x1="380" y1="155" x2="440" y2="110" stroke="#1976d2" stroke-width="2"/>
    <rect x="450" y="85" width="140" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="520" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Master Thread</text>
    <text x="240" y="190" text-anchor="middle" font-size="11" fill="#ff9800">FORK (parallel region)</text>
    <text x="450" y="190" text-anchor="middle" font-size="11" fill="#ff9800">JOIN (barrier)</text>
  </g>
  <g id="step1" class="step" data-narration="The pragma omp parallel directive creates a parallel region. All code inside the braces is executed by every thread in the team. The number of threads can be set via num_threads clause or environment variable.">
    <text x="400" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">#pragma omp parallel</text>
    <rect x="80" y="80" width="640" height="100" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">#pragma omp parallel</text>
    <text x="400" y="125" text-anchor="middle" font-size="11" fill="#555">{</text>
    <text x="400" y="143" text-anchor="middle" font-size="11" fill="#555">// Every thread executes this block</text>
    <text x="400" y="161" text-anchor="middle" font-size="11" fill="#555">printf("Hello from thread %d", omp_get_thread_num());</text>
    <text x="400" y="178" text-anchor="middle" font-size="11" fill="#555">}</text>
  </g>
  <g id="step2" class="step" data-narration="OpenMP provides runtime functions like omp_get_thread_num() to get the calling thread's ID, omp_get_num_threads() for total thread count, and omp_set_num_threads() to configure the team size.">
    <text x="400" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Runtime Library Functions</text>
    <rect x="50" y="80" width="220" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="160" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">omp_get_thread_num()</text>
    <text x="160" y="125" text-anchor="middle" font-size="10" fill="#555">Returns calling thread's ID</text>
    <text x="160" y="143" text-anchor="middle" font-size="10" fill="#555">(0 to num_threads-1)</text>
    <rect x="290" y="80" width="220" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">omp_get_num_threads()</text>
    <text x="400" y="125" text-anchor="middle" font-size="10" fill="#555">Returns total threads in team</text>
    <text x="400" y="143" text-anchor="middle" font-size="10" fill="#555">Only valid inside parallel</text>
    <rect x="530" y="80" width="220" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="640" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">omp_set_num_threads(n)</text>
    <text x="640" y="125" text-anchor="middle" font-size="10" fill="#555">Sets team size before region</text>
    <text x="640" y="143" text-anchor="middle" font-size="10" fill="#555">Called from serial code</text>
  </g>
  <g id="step3" class="step" data-narration="The pragma omp for directive distributes loop iterations across threads. Combined with parallel as pragma omp parallel for, it creates a team and distributes work in one step. An implicit barrier waits at the end.">
    <text x="400" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Work-Sharing: #pragma omp for</text>
    <rect x="80" y="80" width="640" height="80" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">#pragma omp parallel for</text>
    <text x="400" y="122" text-anchor="middle" font-size="11" fill="#555">for (int i = 0; i &lt; N; i++)</text>
    <text x="400" y="140" text-anchor="middle" font-size="11" fill="#555">result[i] = compute(data[i]); // iterations split among threads</text>
    <text x="400" y="175" text-anchor="middle" font-size="11" fill="#ff9800">Implicit barrier at end -- all threads wait before continuing</text>
  </g>
  <g id="step4" class="step" data-narration="The pragma omp sections directive distributes distinct code blocks to different threads. Each section is executed by exactly one thread. This is useful when you have independent, non-iterative tasks.">
    <text x="400" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Work-Sharing: #pragma omp sections</text>
    <rect x="50" y="245" width="220" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="160" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Section 1</text>
    <text x="160" y="290" text-anchor="middle" font-size="10" fill="#555">compute_partA();</text>
    <text x="160" y="310" text-anchor="middle" font-size="9" fill="#555">Executed by Thread 0</text>
    <rect x="290" y="245" width="220" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Section 2</text>
    <text x="400" y="290" text-anchor="middle" font-size="10" fill="#555">compute_partB();</text>
    <text x="400" y="310" text-anchor="middle" font-size="9" fill="#555">Executed by Thread 1</text>
    <rect x="530" y="245" width="220" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="640" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Section 3</text>
    <text x="640" y="290" text-anchor="middle" font-size="10" fill="#555">compute_partC();</text>
    <text x="640" y="310" text-anchor="middle" font-size="9" fill="#555">Executed by Thread 2</text>
  </g>
  <g id="step5" class="step" data-narration="Synchronization directives include barrier for explicit sync points, critical for mutual exclusion on code blocks, and atomic for hardware-protected single-variable updates. These prevent race conditions in parallel regions.">
    <text x="400" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Synchronization Directives</text>
    <rect x="30" y="385" width="230" height="80" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="145" y="407" text-anchor="middle" font-size="11" font-weight="bold" fill="#e91e63">#pragma omp barrier</text>
    <text x="145" y="427" text-anchor="middle" font-size="10" fill="#555">All threads must arrive</text>
    <text x="145" y="447" text-anchor="middle" font-size="10" fill="#555">before any can proceed</text>
    <rect x="285" y="385" width="230" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="407" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">#pragma omp critical</text>
    <text x="400" y="427" text-anchor="middle" font-size="10" fill="#555">Only one thread at a time</text>
    <text x="400" y="447" text-anchor="middle" font-size="10" fill="#555">executes the code block</text>
    <rect x="540" y="385" width="230" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="655" y="407" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">#pragma omp atomic</text>
    <text x="655" y="427" text-anchor="middle" font-size="10" fill="#555">Hardware-level protection</text>
    <text x="655" y="447" text-anchor="middle" font-size="10" fill="#555">for single variable update</text>
  </g>
  <g id="step6" class="step" data-narration="Key pragmas summary: parallel creates thread team, for distributes loops, sections distributes blocks, critical and atomic protect shared data, and barrier synchronizes threads. Always include omp.h header.">
    <text x="400" y="495" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">OpenMP Pragmas Summary</text>
    <rect x="60" y="515" width="320" height="24" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="220" y="531" text-anchor="middle" font-size="10" fill="#1976d2">parallel -- creates team of threads</text>
    <rect x="60" y="544" width="320" height="24" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="220" y="560" text-anchor="middle" font-size="10" fill="#388e3c">for -- distributes loop iterations</text>
    <rect x="60" y="573" width="320" height="24" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="220" y="589" text-anchor="middle" font-size="10" fill="#ff9800">sections -- distributes code blocks</text>
    <rect x="420" y="515" width="320" height="24" rx="4" fill="#fce4ec" stroke="#e91e63"/>
    <text x="580" y="531" text-anchor="middle" font-size="10" fill="#e91e63">critical -- mutual exclusion</text>
    <rect x="420" y="544" width="320" height="24" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="580" y="560" text-anchor="middle" font-size="10" fill="#9c27b0">atomic -- hardware-level protect</text>
    <rect x="420" y="573" width="320" height="24" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="580" y="589" text-anchor="middle" font-size="10" fill="#1976d2">barrier -- explicit sync point</text>
  </g>
</svg>
