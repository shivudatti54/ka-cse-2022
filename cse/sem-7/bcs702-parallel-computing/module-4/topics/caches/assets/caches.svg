<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Caches in Parallel Computing</text>
  <g id="step0" class="step" data-narration="A cache is a small, fast memory between the CPU and main memory that stores frequently used data. Cache hits are fast, cache misses require slower main memory access, making cache usage critical for performance.">
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">What is a Cache?</text>
    <rect x="50" y="100" width="200" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="150" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">CPU Core</text>
    <text x="150" y="145" text-anchor="middle" font-size="10" fill="#555">Very fast processing</text>
    <text x="150" y="162" text-anchor="middle" font-size="10" fill="#555">Needs data quickly</text>
    <line x1="250" y1="140" x2="310" y2="140" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="310" y="100" width="180" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Cache</text>
    <text x="400" y="145" text-anchor="middle" font-size="10" fill="#555">Small, very fast</text>
    <text x="400" y="162" text-anchor="middle" font-size="10" fill="#388e3c">Hit = instant access</text>
    <line x1="490" y1="140" x2="550" y2="140" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="550" y="100" width="200" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="650" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Main Memory</text>
    <text x="650" y="145" text-anchor="middle" font-size="10" fill="#555">Large, slower</text>
    <text x="650" y="162" text-anchor="middle" font-size="10" fill="#e91e63">Miss = slow fetch</text>
  </g>
  <g id="step1" class="step" data-narration="Modern processors have a multi-level cache hierarchy. L1 is fastest but smallest, L2 is medium, and L3 is largest but slowest of the caches. L1 and L2 are typically private per core, while L3 is shared.">
    <text x="400" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Memory Hierarchy</text>
    <rect x="280" y="220" width="240" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Registers (fastest, bytes)</text>
    <rect x="220" y="255" width="360" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">L1 Cache (32-64 KB, ~1ns)</text>
    <rect x="160" y="290" width="480" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">L2 Cache (256KB-1MB, ~3-10ns)</text>
    <rect x="100" y="325" width="600" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">L3 Cache (shared, 4-32MB, ~10-30ns)</text>
    <rect x="50" y="360" width="700" height="30" rx="4" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="400" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#e91e63">Main Memory (GBs, ~50-100ns)</text>
  </g>
  <g id="step2" class="step" data-narration="Data moves between cache and memory in fixed-size blocks called cache lines, typically 64 bytes. This exploits spatial locality: when one byte is needed, nearby bytes are likely needed soon too.">
    <text x="400" y="410" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Cache Lines: Unit of Transfer</text>
    <rect x="50" y="435" width="700" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="457" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Cache Line = 64 bytes (typical)</text>
    <text x="400" y="475" text-anchor="middle" font-size="10" fill="#555">When CPU reads 1 byte, entire 64-byte line is fetched into cache</text>
    <rect x="50" y="500" width="330" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="523" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Temporal Locality</text>
    <text x="215" y="543" text-anchor="middle" font-size="10" fill="#555">Recently used data likely reused</text>
    <rect x="420" y="500" width="330" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="585" y="523" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Spatial Locality</text>
    <text x="585" y="543" text-anchor="middle" font-size="10" fill="#555">Nearby data likely needed next</text>
  </g>
  <g id="step3" class="step" data-narration="In multicore systems, each core has private L1/L2 caches. Cache coherence protocols like MESI ensure all caches see consistent data. When one core modifies a shared variable, other caches are invalidated.">
    <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Cache Coherence in Multicore</text>
    <rect x="50" y="110" width="200" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="150" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Core 0 L1 Cache</text>
    <text x="150" y="152" text-anchor="middle" font-size="10" fill="#555">X = 10 (Modified)</text>
    <text x="150" y="170" text-anchor="middle" font-size="10" fill="#388e3c">Up-to-date</text>
    <rect x="300" y="110" width="200" height="75" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="400" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#e91e63">Core 1 L1 Cache</text>
    <text x="400" y="152" text-anchor="middle" font-size="10" fill="#555">X = 5 (Invalid!)</text>
    <text x="400" y="170" text-anchor="middle" font-size="10" fill="#e91e63">Stale copy</text>
    <rect x="550" y="110" width="200" height="75" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="650" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">MESI Protocol</text>
    <text x="650" y="152" text-anchor="middle" font-size="10" fill="#555">Modified, Exclusive</text>
    <text x="650" y="170" text-anchor="middle" font-size="10" fill="#555">Shared, Invalid</text>
  </g>
  <g id="step4" class="step" data-narration="False sharing is a critical performance pitfall. It occurs when threads write to different variables on the same cache line. Each write invalidates the line on other cores, causing constant cache misses despite no actual data sharing.">
    <text x="400" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">False Sharing Problem</text>
    <rect x="50" y="235" width="700" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Same Cache Line: | var_A (Thread 0) | var_B (Thread 1) |</text>
    <text x="400" y="273" text-anchor="middle" font-size="10" fill="#e91e63">Thread 0 writes var_A --> invalidates entire line for Thread 1!</text>
    <rect x="50" y="293" width="330" height="55" rx="6" fill="#fce4ec" stroke="#e91e63"/>
    <text x="215" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#e91e63">Result: Cache line ping-pong</text>
    <text x="215" y="333" text-anchor="middle" font-size="10" fill="#555">Severe performance degradation</text>
    <rect x="420" y="293" width="330" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="585" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Fix: Memory Padding</text>
    <text x="585" y="333" text-anchor="middle" font-size="10" fill="#555">Separate variables onto different lines</text>
  </g>
  <g id="step5" class="step" data-narration="Key points: caches bridge the CPU-memory speed gap using a hierarchy of L1/L2/L3. Cache lines are 64-byte transfer units exploiting locality. Coherence protocols keep multicore caches consistent. False sharing must be avoided in parallel programs.">
    <text x="400" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Cache Concepts Summary</text>
    <rect x="60" y="400" width="320" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="220" y="418" text-anchor="middle" font-size="11" fill="#1976d2">1. Cache bridges CPU-memory speed gap</text>
    <rect x="60" y="434" width="320" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="220" y="452" text-anchor="middle" font-size="11" fill="#388e3c">2. Cache lines are 64-byte blocks</text>
    <rect x="60" y="468" width="320" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="220" y="486" text-anchor="middle" font-size="11" fill="#9c27b0">3. L1 private, L3 shared per core</text>
    <rect x="420" y="400" width="320" height="28" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="580" y="418" text-anchor="middle" font-size="11" fill="#ff9800">4. MESI keeps caches coherent</text>
    <rect x="420" y="434" width="320" height="28" rx="4" fill="#fce4ec" stroke="#e91e63"/>
    <text x="580" y="452" text-anchor="middle" font-size="11" fill="#e91e63">5. False sharing kills performance</text>
    <rect x="420" y="468" width="320" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="580" y="486" text-anchor="middle" font-size="11" fill="#1976d2">6. Pad data to avoid false sharing</text>
  </g>
</svg>
