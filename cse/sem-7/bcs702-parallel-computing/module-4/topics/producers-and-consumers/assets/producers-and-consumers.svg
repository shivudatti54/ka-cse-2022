<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">Producers and Consumers Pattern</text>
  <g id="step0" class="step" data-narration="The producer-consumer pattern coordinates threads sharing a bounded buffer where producers add and consumers remove items.">
    <text x="400" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Producer-Consumer Overview</text>
    <rect x="50" y="90" width="200" height="100" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="150" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Producers</text>
    <text x="150" y="140" text-anchor="middle" font-size="11" fill="#555">Generate data</text>
    <text x="150" y="160" text-anchor="middle" font-size="11" fill="#555">Add to buffer</text>
    <line x1="250" y1="140" x2="310" y2="140" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="320" y="90" width="160" height="100" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="400" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Buffer</text>
    <rect x="335" y="125" width="130" height="15" rx="3" fill="#ff9800" opacity="0.3"/>
    <rect x="335" y="145" width="130" height="15" rx="3" fill="#ff9800" opacity="0.3"/>
    <rect x="335" y="165" width="130" height="15" rx="3" fill="#ff9800" opacity="0.3"/>
    <line x1="480" y1="140" x2="540" y2="140" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="550" y="90" width="200" height="100" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="650" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Consumers</text>
    <text x="650" y="140" text-anchor="middle" font-size="11" fill="#555">Take from buffer</text>
    <text x="650" y="160" text-anchor="middle" font-size="11" fill="#555">Process data</text>
  </g>
  <g id="step1" class="step" data-narration="Producers generate data items and place them into the shared buffer. They must block and wait if the buffer is full.">
    <text x="400" y="210" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Producer Behavior</text>
    <rect x="100" y="235" width="600" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="258" text-anchor="middle" font-size="12" fill="#1976d2">1. Generate item  2. Wait if buffer full  3. Lock buffer  4. Insert item  5. Unlock  6. Signal consumer</text>
    <text x="400" y="280" text-anchor="middle" font-size="11" fill="#555">wait(empty); wait(mutex); insert(); signal(mutex); signal(full);</text>
  </g>
  <g id="step2" class="step" data-narration="Consumers take data items from the shared buffer for processing. They must block and wait if the buffer is empty.">
    <text x="400" y="315" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">Consumer Behavior</text>
    <rect x="100" y="340" width="600" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="363" text-anchor="middle" font-size="12" fill="#388e3c">1. Wait if buffer empty  2. Lock buffer  3. Remove item  4. Unlock  5. Signal producer  6. Process</text>
    <text x="400" y="385" text-anchor="middle" font-size="11" fill="#555">wait(full); wait(mutex); remove(); signal(mutex); signal(empty);</text>
  </g>
  <g id="step3" class="step" data-narration="A mutex lock protects the shared buffer ensuring only one thread accesses it at a time to prevent data corruption.">
    <text x="400" y="420" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">Mutex Protection</text>
    <rect x="250" y="445" width="300" height="80" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="400" y="470" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Shared Buffer</text>
    <text x="400" y="495" text-anchor="middle" font-size="11" fill="#555">mutex = 1 (binary semaphore)</text>
    <text x="400" y="515" text-anchor="middle" font-size="10" fill="#888">Only ONE thread can access at a time</text>
  </g>
  <g id="step4" class="step" data-narration="Counting semaphores track available slots. Empty counts free slots for producers. Full counts items for consumers.">
    <text x="400" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c27b0">Semaphore Coordination</text>
    <rect x="50" y="115" width="220" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="160" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">empty = N</text>
    <text x="160" y="165" text-anchor="middle" font-size="10" fill="#555">Free slots for producers</text>
    <rect x="290" y="115" width="220" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">mutex = 1</text>
    <text x="400" y="165" text-anchor="middle" font-size="10" fill="#555">Buffer access lock</text>
    <rect x="530" y="115" width="220" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="640" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">full = 0</text>
    <text x="640" y="165" text-anchor="middle" font-size="10" fill="#555">Items for consumers</text>
  </g>
  <g id="step5" class="step" data-narration="In OpenMP this pattern uses critical sections or locks for mutual exclusion with condition-based waiting for synchronization.">
    <text x="400" y="215" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">OpenMP Implementation</text>
    <rect x="100" y="240" width="600" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="270" text-anchor="middle" font-size="12" fill="#1976d2">#pragma omp critical  for buffer access protection</text>
    <rect x="100" y="310" width="600" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="340" text-anchor="middle" font-size="12" fill="#388e3c">omp_lock_t  for fine-grained lock control</text>
  </g>
  <g id="step6" class="step" data-narration="Producer-consumer is fundamental to pipeline parallelism where processing stages produce and consume data concurrently.">
    <text x="400" y="390" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">Pipeline Parallelism Application</text>
    <rect x="50" y="420" width="130" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="115" y="450" text-anchor="middle" font-size="11" fill="#1976d2">Stage 1</text>
    <line x1="180" y1="445" x2="230" y2="445" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="240" y="420" width="130" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="305" y="450" text-anchor="middle" font-size="11" fill="#388e3c">Stage 2</text>
    <line x1="370" y1="445" x2="420" y2="445" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="430" y="420" width="130" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="495" y="450" text-anchor="middle" font-size="11" fill="#ff9800">Stage 3</text>
    <line x1="560" y1="445" x2="610" y2="445" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="620" y="420" width="130" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="685" y="450" text-anchor="middle" font-size="11" fill="#9c27b0">Output</text>
    <text x="400" y="495" text-anchor="middle" font-size="12" fill="#555">Each stage is a producer for the next and consumer of the previous</text>
  </g>
</svg>
