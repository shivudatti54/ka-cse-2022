<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">Loop-Carried Dependencies in OpenMP</text>
  <g id="step0" class="step" data-narration="Loop-carried dependencies occur when one iteration depends on results computed by a previous iteration blocking parallelization.">
    <text x="400" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#e91e63">What Makes a Loop Non-Parallelizable?</text>
    <rect x="50" y="100" width="340" height="90" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Safe: Independent Iterations</text>
    <text x="220" y="150" text-anchor="middle" font-size="12" fill="#555">b[i] = a[i] * a[i]</text>
    <text x="220" y="175" text-anchor="middle" font-size="10" fill="#388e3c">Each iteration is independent</text>
    <rect x="410" y="100" width="340" height="90" rx="10" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="580" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#e91e63">Unsafe: Dependent Iterations</text>
    <text x="580" y="150" text-anchor="middle" font-size="12" fill="#555">a[i] = a[i-1] + 1</text>
    <text x="580" y="175" text-anchor="middle" font-size="10" fill="#e91e63">Each iteration needs previous result</text>
  </g>
  <g id="step1" class="step" data-narration="Flow dependency or Read-After-Write: iteration i reads data that was written by iteration i minus 1 creating a chain.">
    <text x="400" y="210" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Flow Dependency (RAW)</text>
    <rect x="80" y="245" width="140" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="150" y="270" text-anchor="middle" font-size="12" fill="#1976d2">Iter 0: a[0]</text>
    <line x1="220" y1="265" x2="280" y2="265" stroke="#e91e63" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="290" y="245" width="140" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="360" y="270" text-anchor="middle" font-size="12" fill="#1976d2">Iter 1: a[0]+1</text>
    <line x1="430" y1="265" x2="490" y2="265" stroke="#e91e63" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="500" y="245" width="140" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="570" y="270" text-anchor="middle" font-size="12" fill="#1976d2">Iter 2: a[1]+1</text>
    <text x="400" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Sequential chain: cannot run in parallel</text>
  </g>
  <g id="step2" class="step" data-narration="Prefix sum is a classic example: a[i] equals a[i] plus a[i-1]. Each value depends on the previous making it sequential.">
    <text x="400" y="350" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c27b0">Example: Prefix Sum</text>
    <text x="400" y="380" text-anchor="middle" font-size="13" fill="#555">a[i] = a[i] + a[i-1]</text>
    <rect x="100" y="405" width="80" height="40" rx="4" fill="#f3e5f5" stroke="#9c27b0"/><text x="140" y="430" text-anchor="middle" font-size="11" fill="#9c27b0">a[0]=1</text>
    <line x1="180" y1="425" x2="220" y2="425" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="230" y="405" width="80" height="40" rx="4" fill="#f3e5f5" stroke="#9c27b0"/><text x="270" y="430" text-anchor="middle" font-size="11" fill="#9c27b0">a[1]=3</text>
    <line x1="310" y1="425" x2="350" y2="425" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="360" y="405" width="80" height="40" rx="4" fill="#f3e5f5" stroke="#9c27b0"/><text x="400" y="430" text-anchor="middle" font-size="11" fill="#9c27b0">a[2]=6</text>
    <line x1="440" y1="425" x2="480" y2="425" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="490" y="405" width="80" height="40" rx="4" fill="#f3e5f5" stroke="#9c27b0"/><text x="530" y="430" text-anchor="middle" font-size="11" fill="#9c27b0">a[3]=10</text>
    <text x="400" y="470" text-anchor="middle" font-size="12" fill="#e91e63">Cannot parallelize with simple #pragma omp for</text>
  </g>
  <g id="step3" class="step" data-narration="Anti-dependency or Write-After-Read occurs when a later iteration overwrites data that an earlier iteration reads.">
    <text x="400" y="510" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">Anti-Dependency (WAR)</text>
    <text x="400" y="540" text-anchor="middle" font-size="13" fill="#555">x = a[i]; a[i+1] = x + 2;</text>
    <text x="400" y="565" text-anchor="middle" font-size="12" fill="#ff9800">Iter 0 reads a[1], Iter 1 writes a[1]</text>
  </g>
  <g id="step4" class="step" data-narration="Output dependency occurs when multiple iterations write to the same shared variable causing a race condition.">
    <text x="400" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#e91e63">Output Dependency (WAW)</text>
    <text x="400" y="125" text-anchor="middle" font-size="13" fill="#555">sum += array[i]  (shared sum variable)</text>
    <rect x="100" y="145" width="150" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="175" y="170" text-anchor="middle" font-size="11" fill="#1976d2">T0: sum += 3</text>
    <rect x="270" y="145" width="150" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="345" y="170" text-anchor="middle" font-size="11" fill="#388e3c">T1: sum += 7</text>
    <rect x="440" y="145" width="150" height="40" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="515" y="170" text-anchor="middle" font-size="11" fill="#ff9800">T2: sum += 2</text>
    <text x="400" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Race condition: final value is unpredictable</text>
  </g>
  <g id="step5" class="step" data-narration="The reduction clause solves output dependencies on accumulator variables like sum by creating thread-private copies automatically.">
    <text x="400" y="250" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">Solution: Reduction Clause</text>
    <rect x="100" y="275" width="600" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">#pragma omp parallel for reduction(+:sum)</text>
    <text x="400" y="345" text-anchor="middle" font-size="13" fill="#555">Private copies per thread + safe combination at the end</text>
    <text x="400" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Correct AND efficient for accumulation patterns</text>
  </g>
  <g id="step6" class="step" data-narration="Key rule: if each iteration accesses unique memory locations the loop is safe. Look for index patterns like i-1 or i+1 as red flags.">
    <text x="400" y="415" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Quick Reference</text>
    <rect x="50" y="440" width="340" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Safe: b[i] = a[i] * 2</text>
    <text x="220" y="488" text-anchor="middle" font-size="11" fill="#555">Unique memory per iteration</text>
    <rect x="410" y="440" width="340" height="60" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="580" y="465" text-anchor="middle" font-size="12" font-weight="bold" fill="#e91e63">Unsafe: a[i] = a[i-1] + b[i]</text>
    <text x="580" y="488" text-anchor="middle" font-size="11" fill="#555">Index i-1 = dependency chain</text>
    <rect x="200" y="520" width="400" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="545" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">For sum/product: always use reduction</text>
  </g>
</svg>
