<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Cache Coherence &amp; False Sharing in OpenMP</text>
  <g id="step0" class="step" data-narration="In multicore systems, each core has its own private L1 cache. When threads on different cores access shared data, caches may hold stale copies, creating a cache coherence problem.">
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Multicore Cache Architecture</text>
    <rect x="50" y="95" width="150" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="125" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Core 0</text>
    <text x="125" y="140" text-anchor="middle" font-size="10" fill="#555">L1 Cache</text>
    <text x="125" y="158" text-anchor="middle" font-size="10" fill="#555">X = 5</text>
    <rect x="240" y="95" width="150" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="315" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Core 1</text>
    <text x="315" y="140" text-anchor="middle" font-size="10" fill="#555">L1 Cache</text>
    <text x="315" y="158" text-anchor="middle" font-size="10" fill="#555">X = 5</text>
    <rect x="450" y="95" width="300" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="600" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Shared Main Memory</text>
    <text x="600" y="145" text-anchor="middle" font-size="10" fill="#555">Variable X = 5 (shared)</text>
    <text x="600" y="163" text-anchor="middle" font-size="10" fill="#555">Both cores cache the same data</text>
  </g>
  <g id="step1" class="step" data-narration="Cache coherence protocols like MESI ensure consistency. When Core 0 writes to X, it invalidates Core 1's cached copy, forcing Core 1 to re-fetch the updated value from memory or Core 0.">
    <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Cache Coherence Protocol (MESI)</text>
    <rect x="50" y="215" width="160" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="130" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Core 0 writes X=10</text>
    <text x="130" y="258" text-anchor="middle" font-size="10" fill="#555">State: Modified</text>
    <text x="130" y="278" text-anchor="middle" font-size="10" fill="#1976d2">Cache line updated</text>
    <line x1="210" y1="260" x2="310" y2="260" stroke="#e91e63" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="260" y="252" text-anchor="middle" font-size="9" fill="#e91e63">Invalidate!</text>
    <rect x="310" y="215" width="160" height="90" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="390" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#e91e63">Core 1 (X stale)</text>
    <text x="390" y="258" text-anchor="middle" font-size="10" fill="#555">State: Invalid</text>
    <text x="390" y="278" text-anchor="middle" font-size="10" fill="#e91e63">Must re-fetch X</text>
    <rect x="510" y="220" width="250" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="635" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">MESI States</text>
    <text x="635" y="265" text-anchor="middle" font-size="10" fill="#555">Modified | Exclusive</text>
    <text x="635" y="282" text-anchor="middle" font-size="10" fill="#555">Shared | Invalid</text>
  </g>
  <g id="step2" class="step" data-narration="False sharing occurs when threads on different cores write to different variables that happen to share the same cache line. Each write invalidates the entire line for the other core, causing severe performance degradation.">
    <text x="400" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">False Sharing: The Problem</text>
    <rect x="50" y="345" width="700" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Cache Line (64 bytes): | partial_sums[0] | partial_sums[1] | partial_sums[2] | partial_sums[3] |</text>
    <text x="400" y="385" text-anchor="middle" font-size="10" fill="#e91e63">All four elements fit in ONE cache line!</text>
    <rect x="50" y="410" width="160" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="130" y="430" text-anchor="middle" font-size="10" fill="#1976d2">Thread 0 writes [0]</text>
    <text x="130" y="445" text-anchor="middle" font-size="9" fill="#e91e63">Invalidates line!</text>
    <rect x="230" y="410" width="160" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="310" y="430" text-anchor="middle" font-size="10" fill="#388e3c">Thread 1 writes [1]</text>
    <text x="310" y="445" text-anchor="middle" font-size="9" fill="#e91e63">Invalidates line!</text>
    <rect x="410" y="410" width="160" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="490" y="430" text-anchor="middle" font-size="10" fill="#9c27b0">Thread 2 writes [2]</text>
    <text x="490" y="445" text-anchor="middle" font-size="9" fill="#e91e63">Invalidates line!</text>
    <rect x="590" y="410" width="160" height="50" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="670" y="430" text-anchor="middle" font-size="10" fill="#ff9800">Thread 3 writes [3]</text>
    <text x="670" y="445" text-anchor="middle" font-size="9" fill="#e91e63">Invalidates line!</text>
  </g>
  <g id="step3" class="step" data-narration="In the false sharing example, each thread updates its own element of partial_sums. But since all elements share a cache line, every write by one thread forces cache misses on all other cores. This ping-pong effect destroys performance.">
    <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Cache Line Ping-Pong Effect</text>
    <rect x="80" y="110" width="280" height="100" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="220" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#e91e63">Without Padding</text>
    <text x="220" y="158" text-anchor="middle" font-size="10" fill="#555">int partial_sums[4];</text>
    <text x="220" y="178" text-anchor="middle" font-size="10" fill="#e91e63">All 4 ints in 1 cache line</text>
    <text x="220" y="198" text-anchor="middle" font-size="10" fill="#e91e63">Constant invalidation!</text>
    <rect x="440" y="110" width="280" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="580" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">With Padding</text>
    <text x="580" y="158" text-anchor="middle" font-size="10" fill="#555">int partial_sums[4][16];</text>
    <text x="580" y="178" text-anchor="middle" font-size="10" fill="#388e3c">Each element on own line</text>
    <text x="580" y="198" text-anchor="middle" font-size="10" fill="#388e3c">No false sharing!</text>
  </g>
  <g id="step4" class="step" data-narration="The solution to false sharing is memory padding. By adding extra bytes between variables, each thread's data occupies its own cache line. This eliminates cross-core invalidations while keeping the parallel approach intact.">
    <text x="400" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Solution: Memory Padding</text>
    <rect x="50" y="255" width="700" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Padded Layout: Each element gets its own 64-byte cache line</text>
    <text x="400" y="293" text-anchor="middle" font-size="10" fill="#555">int partial_sums[4][16]; // 16 ints = 64 bytes = 1 cache line</text>
    <rect x="50" y="313" width="160" height="40" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="130" y="338" text-anchor="middle" font-size="10" fill="#1976d2">Line 1: sums[0][0]</text>
    <rect x="230" y="313" width="160" height="40" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="310" y="338" text-anchor="middle" font-size="10" fill="#388e3c">Line 2: sums[1][0]</text>
    <rect x="410" y="313" width="160" height="40" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="490" y="338" text-anchor="middle" font-size="10" fill="#9c27b0">Line 3: sums[2][0]</text>
    <rect x="590" y="313" width="160" height="40" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="670" y="338" text-anchor="middle" font-size="10" fill="#ff9800">Line 4: sums[3][0]</text>
  </g>
  <g id="step5" class="step" data-narration="A better approach to avoid false sharing entirely is to use the OpenMP reduction clause. Each thread accumulates into a private variable, and results are combined at the end, eliminating any shared cache line conflicts.">
    <text x="400" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Best Practice: Use Reduction</text>
    <rect x="100" y="395" width="600" height="65" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="417" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">#pragma omp parallel for reduction(+:total_sum)</text>
    <text x="400" y="437" text-anchor="middle" font-size="11" fill="#555">for (i = 0; i &lt; N; i++) total_sum += array[i];</text>
    <text x="400" y="453" text-anchor="middle" font-size="10" fill="#388e3c">No shared array needed -- OpenMP handles private copies automatically</text>
    <rect x="100" y="475" width="280" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="240" y="500" text-anchor="middle" font-size="11" fill="#388e3c">No false sharing, no padding needed</text>
    <rect x="420" y="475" width="280" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="560" y="500" text-anchor="middle" font-size="11" fill="#1976d2">Automatic combine at barrier</text>
  </g>
  <g id="step6" class="step" data-narration="Key takeaways: false sharing degrades performance when threads write to adjacent memory on the same cache line. Solutions include padding, using reduction clauses, or restructuring data to align with cache line boundaries.">
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Summary: Avoiding False Sharing</text>
    <rect x="60" y="100" width="320" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="220" y="120" text-anchor="middle" font-size="11" fill="#1976d2">1. Identify shared data on same cache line</text>
    <rect x="60" y="138" width="320" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="220" y="158" text-anchor="middle" font-size="11" fill="#388e3c">2. Pad arrays to separate cache lines</text>
    <rect x="60" y="176" width="320" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="220" y="196" text-anchor="middle" font-size="11" fill="#9c27b0">3. Use reduction clause when possible</text>
    <rect x="420" y="100" width="320" height="30" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="580" y="120" text-anchor="middle" font-size="11" fill="#ff9800">4. Align data to cache line boundaries</text>
    <rect x="420" y="138" width="320" height="30" rx="4" fill="#fce4ec" stroke="#e91e63"/>
    <text x="580" y="158" text-anchor="middle" font-size="11" fill="#e91e63">5. Profile with perf/VTune for misses</text>
    <rect x="420" y="176" width="320" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="580" y="196" text-anchor="middle" font-size="11" fill="#1976d2">6. Prefer private variables over shared</text>
  </g>
</svg>
