<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">Trapezoidal Rule with MPI</text>
  <g id="step0" class="step" data-narration="The trapezoidal rule approximates a definite integral by dividing the area under a curve into trapezoids instead of rectangles.">
    <text x="400" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Numerical Integration Concept</text>
    <line x1="100" y1="160" x2="700" y2="160" stroke="#333" stroke-width="2"/>
    <line x1="100" y1="160" x2="100" y2="75" stroke="#333" stroke-width="2"/>
    <path d="M100,145 Q250,75 400,100 Q550,125 700,85" fill="none" stroke="#1976d2" stroke-width="3"/>
    <rect x="200" y="100" width="100" height="60" fill="#e3f2fd" fill-opacity="0.5" stroke="#1976d2" stroke-dasharray="4"/>
    <rect x="400" y="105" width="100" height="55" fill="#e8f5e9" fill-opacity="0.5" stroke="#388e3c" stroke-dasharray="4"/>
    <text x="400" y="185" text-anchor="middle" font-size="12" fill="#555">Approximate area under f(x) from a to b</text>
  </g>
  <g id="step1" class="step" data-narration="The formula uses endpoints and interior points weighted by h over 2: h times bracket f(a) plus 2 times sum of interior points plus f(b) bracket divided by 2.">
    <text x="400" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">The Trapezoidal Formula</text>
    <rect x="100" y="85" width="600" height="50" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="115" text-anchor="middle" font-size="13" fill="#9c27b0">Integral = (h/2) * [f(x0) + 2*f(x1) + 2*f(x2) + ... + f(xn)]</text>
    <text x="400" y="160" text-anchor="middle" font-size="12" fill="#555">h = (b - a) / n, where n = number of subintervals</text>
    <text x="400" y="180" text-anchor="middle" font-size="11" fill="#888">Error is O(h squared) -- doubling n reduces error by 4x</text>
  </g>
  <g id="step2" class="step" data-narration="Domain decomposition: divide the interval a to b among p processes. Each process gets an equal subinterval to compute locally.">
    <text x="400" y="215" text-anchor="middle" font-size="15" font-weight="bold" fill="#388e3c">Step 1: Domain Decomposition</text>
    <rect x="50" y="238" width="700" height="26" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="255" text-anchor="middle" font-size="11" fill="#388e3c">Full interval [a, b]</text>
    <rect x="50" y="278" width="175" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="137" y="300" text-anchor="middle" font-size="10" fill="#1976d2">P0: [a, a+h]</text>
    <rect x="225" y="278" width="175" height="36" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="312" y="300" text-anchor="middle" font-size="10" fill="#388e3c">P1: [a+h, a+2h]</text>
    <rect x="400" y="278" width="175" height="36" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="487" y="300" text-anchor="middle" font-size="10" fill="#ff9800">P2: [a+2h, a+3h]</text>
    <rect x="575" y="278" width="175" height="36" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="662" y="300" text-anchor="middle" font-size="10" fill="#9c27b0">P3: [a+3h, b]</text>
    <text x="400" y="332" text-anchor="middle" font-size="11" fill="#555">Each process computes a local integral over its subinterval</text>
  </g>
  <g id="step3" class="step" data-narration="MPI Broadcast sends parameters a, b, and n from root to all processes. Then each computes its local bounds and trapezoid sum.">
    <text x="400" y="365" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Step 2: Broadcast + Local Compute</text>
    <rect x="300" y="385" width="200" height="35" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="407" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">MPI_Bcast(a, b, n)</text>
    <line x1="300" y1="420" x2="150" y2="450" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="420" x2="400" y2="450" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="500" y1="420" x2="650" y2="450" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="80" y="455" width="140" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="150" y="477" text-anchor="middle" font-size="10" fill="#388e3c">P0: local I0</text>
    <rect x="330" y="455" width="140" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="400" y="477" text-anchor="middle" font-size="10" fill="#388e3c">P1: local I1</text>
    <rect x="580" y="455" width="140" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="650" y="477" text-anchor="middle" font-size="10" fill="#388e3c">P2: local I2</text>
  </g>
  <g id="step4" class="step" data-narration="MPI Reduce with sum operator collects all local integrals at root process zero and adds them to get the total integral.">
    <text x="400" y="60" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff9800">Step 3: MPI_Reduce (SUM)</text>
    <rect x="80" y="85" width="140" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="150" y="104" text-anchor="middle" font-size="10" fill="#1976d2">I0 = 0.005</text>
    <rect x="260" y="85" width="140" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="330" y="104" text-anchor="middle" font-size="10" fill="#388e3c">I1 = 0.036</text>
    <rect x="440" y="85" width="140" height="30" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="510" y="104" text-anchor="middle" font-size="10" fill="#ff9800">I2 = 0.089</text>
    <rect x="620" y="85" width="140" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="690" y="104" text-anchor="middle" font-size="10" fill="#9c27b0">I3 = 0.161</text>
    <line x1="150" y1="115" x2="350" y2="145" stroke="#ff9800" stroke-width="2"/>
    <line x1="330" y1="115" x2="350" y2="145" stroke="#ff9800" stroke-width="2"/>
    <line x1="510" y1="115" x2="450" y2="145" stroke="#ff9800" stroke-width="2"/>
    <line x1="690" y1="115" x2="450" y2="145" stroke="#ff9800" stroke-width="2"/>
    <rect x="300" y="145" width="200" height="35" rx="8" fill="#ff9800" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Total = 0.291</text>
  </g>
  <g id="step5" class="step" data-narration="The parallel complexity is O of n over p plus log p, where n over p is local work and log p is the reduction communication cost.">
    <text x="400" y="215" text-anchor="middle" font-size="15" font-weight="bold" fill="#388e3c">Performance Analysis</text>
    <rect x="50" y="238" width="340" height="70" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Parallel Time</text>
    <text x="220" y="280" text-anchor="middle" font-size="11" fill="#555">T(p) = O(n/p + log p)</text>
    <text x="220" y="298" text-anchor="middle" font-size="10" fill="#888">Local work + reduction cost</text>
    <rect x="410" y="238" width="340" height="70" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="580" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Speedup</text>
    <text x="580" y="280" text-anchor="middle" font-size="11" fill="#555">S = T(1) / T(p)</text>
    <text x="580" y="298" text-anchor="middle" font-size="10" fill="#888">Near-linear for large n</text>
  </g>
  <g id="step6" class="step" data-narration="Key takeaway: broadcast input, compute locally, reduce results. This pattern applies to many MPI parallel computations.">
    <text x="400" y="335" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">MPI Pattern: Broadcast-Compute-Reduce</text>
    <rect x="80" y="360" width="200" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="180" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">1. MPI_Bcast</text>
    <line x1="280" y1="382" x2="320" y2="382" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="330" y="360" width="200" height="45" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="430" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">2. Local Work</text>
    <line x1="530" y1="382" x2="570" y2="382" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="580" y="360" width="200" height="45" rx="8" fill="#ff9800" stroke="#ff9800" stroke-width="2"/>
    <text x="680" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">3. MPI_Reduce</text>
    <text x="400" y="430" text-anchor="middle" font-size="12" fill="#555">This broadcast-compute-reduce pattern is fundamental to MPI</text>
  </g>
</svg>
