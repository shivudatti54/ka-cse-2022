<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
<rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
<text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">GPU Architecture: NVIDIA CUDA</text>

<g id="step0" class="step" data-narration="A GPU contains multiple Streaming Multiprocessors managed by a GigaThread Engine. Each SM independently schedules and executes the threads assigned to it.">
<text x="400" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">High-Level GPU Structure</text>
<rect x="280" y="60" width="240" height="30" rx="5" fill="#1976d2"/>
<text x="400" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">GigaThread Engine</text>
<line x1="320" y1="90" x2="180" y2="115" stroke="#1976d2" stroke-width="2"/>
<line x1="400" y1="90" x2="400" y2="115" stroke="#1976d2" stroke-width="2"/>
<line x1="480" y1="90" x2="620" y2="115" stroke="#1976d2" stroke-width="2"/>
<rect x="110" y="120" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="160" y="142" text-anchor="middle" font-size="9" fill="#1976d2">SM 0</text>
<rect x="220" y="120" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="270" y="142" text-anchor="middle" font-size="9" fill="#1976d2">SM 1</text>
<rect x="330" y="120" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="380" y="142" text-anchor="middle" font-size="9" fill="#1976d2">SM 2</text>
<text x="560" y="142" text-anchor="middle" font-size="10" fill="#888">...</text>
<rect x="590" y="120" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="640" y="142" text-anchor="middle" font-size="9" fill="#1976d2">SM N</text>
</g>

<g id="step1" class="step" data-narration="Each SM contains CUDA cores for arithmetic, Tensor Cores for matrix multiply-accumulate, SFUs for math functions, and warp schedulers that manage groups of 32 threads.">
<text x="400" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Streaming Multiprocessor (SM) Internals</text>
<rect x="60" y="185" width="680" height="85" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<rect x="80" y="195" width="120" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
<text x="140" y="212" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">CUDA Cores</text>
<text x="140" y="225" text-anchor="middle" font-size="7" fill="#555">64 FP32 + INT ALUs</text>
<rect x="210" y="195" width="120" height="30" rx="4" fill="#fff3e0" stroke="#ff9800"/>
<text x="270" y="212" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff9800">Tensor Cores</text>
<text x="270" y="225" text-anchor="middle" font-size="7" fill="#555">Matrix multiply-accumulate</text>
<rect x="340" y="195" width="120" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
<text x="400" y="212" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">SFUs</text>
<text x="400" y="225" text-anchor="middle" font-size="7" fill="#555">sin, cos, sqrt, reciprocal</text>
<rect x="470" y="195" width="130" height="30" rx="4" fill="#fce4ec" stroke="#e91e63"/>
<text x="535" y="212" text-anchor="middle" font-size="9" font-weight="bold" fill="#e91e63">Warp Schedulers</text>
<text x="535" y="225" text-anchor="middle" font-size="7" fill="#555">2-4 schedulers, zero-overhead</text>
<rect x="80" y="230" width="120" height="30" rx="4" fill="#e0f2f1" stroke="#00796b"/>
<text x="140" y="247" text-anchor="middle" font-size="8" font-weight="bold" fill="#00796b">Load/Store Units</text>
<text x="140" y="260" text-anchor="middle" font-size="7" fill="#555">Memory address compute</text>
<text x="320" y="255" text-anchor="middle" font-size="8" fill="#555">Warp = 32 threads executing same instruction (SIMT model)</text>
</g>

<g id="step2" class="step" data-narration="The GPU memory hierarchy ranges from fast per-thread registers to slow off-chip DRAM. Shared memory, L1 and L2 caches provide faster access to data.">
<text x="400" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">GPU Memory Hierarchy</text>
<rect x="340" y="300" width="120" height="18" rx="3" fill="#e91e63"/>
<text x="400" y="313" text-anchor="middle" font-size="8" fill="#fff">Registers (per-thread)</text>
<rect x="290" y="321" width="220" height="18" rx="3" fill="#ff9800"/>
<text x="400" y="334" text-anchor="middle" font-size="8" fill="#fff">Shared Memory (per-block, 48-164KB)</text>
<rect x="240" y="342" width="320" height="18" rx="3" fill="#1976d2"/>
<text x="400" y="355" text-anchor="middle" font-size="8" fill="#fff">L1 Cache (per SM, 32-192KB)</text>
<rect x="190" y="363" width="420" height="18" rx="3" fill="#388e3c"/>
<text x="400" y="376" text-anchor="middle" font-size="8" fill="#fff">L2 Cache (chip-wide, 6-40MB)</text>
<rect x="140" y="384" width="520" height="18" rx="3" fill="#9c27b0"/>
<text x="400" y="397" text-anchor="middle" font-size="8" fill="#fff">Global Memory DRAM (8-80GB, ~400-800 cycles)</text>
<rect x="290" y="406" width="220" height="18" rx="3" fill="#00acc1"/>
<text x="400" y="419" text-anchor="middle" font-size="8" fill="#fff">Constant Memory (64KB)</text>
<rect x="240" y="427" width="320" height="18" rx="3" fill="#5c6bc0"/>
<text x="400" y="440" text-anchor="middle" font-size="8" fill="#fff">Texture Memory (cached, 2D optimized)</text>
<text x="720" y="305" font-size="8" fill="#e91e63">Fast</text>
<text x="720" y="442" font-size="8" fill="#5c6bc0">Large</text>
</g>

<g id="step3" class="step" data-narration="Warp divergence occurs when threads in a warp take different paths. The GPU serializes execution, running each branch with masked threads, reducing efficiency.">
<text x="200" y="470" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">No Warp Divergence</text>
<rect x="80" y="480" width="160" height="30" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="160" y="500" text-anchor="middle" font-size="8" fill="#555">All 32 threads same path</text>
<text x="600" y="470" text-anchor="middle" font-size="11" font-weight="bold" fill="#e91e63">With Warp Divergence</text>
<rect x="520" y="480" width="160" height="30" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="600" y="500" text-anchor="middle" font-size="8" fill="#555">if-else: threads serialized</text>
</g>

<g id="step4" class="step" data-narration="Memory coalescing happens when consecutive threads access consecutive addresses, combining multiple accesses into single efficient memory transactions.">
<text x="400" y="530" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Memory Coalescing</text>
<rect x="60" y="545" width="330" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="225" y="562" text-anchor="middle" font-size="9" fill="#1976d2">Coalesced (Good)</text>
<text x="225" y="576" text-anchor="middle" font-size="7" fill="#555">Thread 0-31 → Addr 0-31</text>
<rect x="410" y="545" width="330" height="40" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="575" y="562" text-anchor="middle" font-size="9" fill="#f44336">Uncoalesced (Poor)</text>
<text x="575" y="576" text-anchor="middle" font-size="7" fill="#555">Thread 0-31 → Addr 0,128,256...</text>
</g>

</svg>