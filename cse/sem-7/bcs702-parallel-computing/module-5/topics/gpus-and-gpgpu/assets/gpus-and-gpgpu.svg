<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
<rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
<text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">GPUs and General-Purpose GPU Computing</text>
<g id="step0" class="step" data-narration="GPUs evolved from fixed graphics accelerators to massively parallel processors capable of general-purpose computing, known as GPGPU, revolutionizing high-performance computing.">
<text x="400" y="65" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">GPU Evolution</text>
<rect x="50" y="90" width="200" height="60" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
<text x="150" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#e91e63">1990s: Fixed Function</text>
<text x="150" y="135" text-anchor="middle" font-size="10" fill="#555">Graphics pipeline only</text>
<line x1="250" y1="120" x2="280" y2="120" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="290" y="90" width="200" height="60" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="390" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">2001: Programmable</text>
<text x="390" y="135" text-anchor="middle" font-size="10" fill="#555">Vertex/pixel shaders</text>
<line x1="490" y1="120" x2="520" y2="120" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="530" y="90" width="220" height="60" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="640" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">2006: CUDA / GPGPU</text>
<text x="640" y="135" text-anchor="middle" font-size="10" fill="#555">General-purpose computing</text>
</g>
<g id="step1" class="step" data-narration="CPUs optimize for low latency with large caches and branch prediction, while GPUs optimize for high throughput with thousands of simple cores, making them ideal for parallel computations.">
<text x="400" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c27b0">CPU vs GPU Architecture</text>
<rect x="50" y="200" width="340" height="120" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="220" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">CPU: Latency Optimized</text>
<text x="220" y="250" text-anchor="middle" font-size="12" fill="#555">4-64 powerful cores</text>
<text x="220" y="270" text-anchor="middle" font-size="12" fill="#555">Large caches, branch prediction</text>
<text x="220" y="290" text-anchor="middle" font-size="11" fill="#1976d2">Fast single-thread performance</text>
<rect x="410" y="200" width="340" height="120" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="580" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">GPU: Throughput Optimized</text>
<text x="580" y="250" text-anchor="middle" font-size="12" fill="#555">1000s of simple cores</text>
<text x="580" y="270" text-anchor="middle" font-size="12" fill="#555">High memory bandwidth</text>
<text x="580" y="290" text-anchor="middle" font-size="11" fill="#388e3c">Massive parallel throughput</text>
</g>
<g id="step2" class="step" data-narration="The CUDA platform provides a C language extension to program GPUs directly with threads, blocks, and grids, without the need for graphics API wrappers, enabling general-purpose computing on GPUs.">
<text x="400" y="345" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">The CUDA Platform</text>
<rect x="50" y="370" width="160" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
<text x="130" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">nvcc Compiler</text>
<text x="130" y="412" text-anchor="middle" font-size="10" fill="#555">CUDA C/C++</text>
<rect x="225" y="370" width="160" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
<text x="305" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Runtime API</text>
<text x="305" y="412" text-anchor="middle" font-size="10" fill="#555">cudaMalloc, cudaMemcpy</text>
<rect x="400" y="370" width="160" height="55" rx="6" fill="#fff3e0" stroke="#ff9800"/>
<text x="480" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Libraries</text>
<text x="480" y="412" text-anchor="middle" font-size="10" fill="#555">cuBLAS, cuDNN, cuFFT</text>
<rect x="575" y="370" width="175" height="55" rx="6" fill="#f3e5f5" stroke="#9c27b0"/>
<text x="662" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Profiling Tools</text>
<text x="662" y="412" text-anchor="middle" font-size="10" fill="#555">Nsight Systems/Compute</text>
</g>
<g id="step3" class="step" data-narration="A CUDA workflow involves allocating GPU memory, copying data to the GPU, launching a kernel, and copying results back, with the host and device having separate memory spaces.">
<text x="400" y="450" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">CUDA Workflow</text>
<rect x="50" y="475" width="130" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="115" y="500" text-anchor="middle" font-size="10" fill="#1976d2">1. cudaMalloc</text>
<line x1="180" y1="495" x2="210" y2="495" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="220" y="475" width="130" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="285" y="500" text-anchor="middle" font-size="10" fill="#388e3c">2. cudaMemcpy</text>
<line x1="350" y1="495" x2="380" y2="495" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="390" y="475" width="130" height="40" rx="6" fill="#ff9800" stroke="#ff9800" stroke-width="2"/>
<text x="455" y="500" text-anchor="middle" font-size="10" fill="#fff">3. kernel&lt;&lt;&lt;&gt;&gt;&gt;</text>
<line x1="520" y1="495" x2="550" y2="495" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="560" y="475" width="130" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="625" y="500" text-anchor="middle" font-size="10" fill="#9c27b0">4. Copy back</text>
<text x="400" y="545" text-anchor="middle" font-size="12" fill="#555">CPU (Host) and GPU (Device) have separate memory spaces</text>
</g>
<g id="step4" class="step" data-narration="GPUs excel at data-parallel, compute-intensive workloads with regular memory access patterns, while CPUs are better suited for serial, branching, and small dataset computations.">
<text x="400" y="580" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">When to Use GPUs</text>
</g>
<g id="step5" class="step" data-narration="Key CUDA terminology includes kernel, a function executed on the GPU, warp, a group of 32 threads executing in lockstep, and SM, the streaming multiprocessor unit.">
<text x="400" y="615" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c27b0">Key CUDA Terminology</text>
</g>
<g id="step6" class="step" data-narration="GPGPU applications span various domains, including deep learning, scientific simulation, image processing, cryptography, and data analytics, leveraging the massive parallel processing capabilities of GPUs.">
<text x="400" y="650" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">GPGPU Applications</text>
</g>
</svg>