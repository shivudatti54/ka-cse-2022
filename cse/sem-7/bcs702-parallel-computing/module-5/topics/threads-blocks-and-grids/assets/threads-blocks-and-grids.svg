<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">CUDA: Threads, Blocks, and Grids</text>
  
  <g id="step0" class="step" data-narration="CUDA uses a three-level hierarchy: threads execute kernel code, blocks group threads on one SM, and grids contain all blocks from a kernel launch.">
    <text x="400" y="52" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">The CUDA Thread Hierarchy</text>
    <rect x="50" y="65" width="700" height="100" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Grid (one kernel launch)</text>
    <rect x="80" y="98" width="150" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="155" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Block (0,0)</text>
    <text x="155" y="140" text-anchor="middle" font-size="9" fill="#555">threads 0-255</text>
    <rect x="250" y="98" width="150" height="55" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="325" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Block (1,0)</text>
    <text x="325" y="140" text-anchor="middle" font-size="9" fill="#555">threads 0-255</text>
    <rect x="420" y="98" width="150" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="495" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Block (2,0)</text>
    <text x="495" y="140" text-anchor="middle" font-size="9" fill="#555">threads 0-255</text>
    <rect x="590" y="98" width="150" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="665" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Block (3,0)</text>
    <text x="665" y="140" text-anchor="middle" font-size="9" fill="#555">threads 0-255</text>
  </g>
  
  <g id="step1" class="step" data-narration="CUDA provides built-in variables: threadIdx identifies each thread in a block, blockIdx identifies each block in a grid, blockDim is block size, gridDim is grid size.">
    <text x="400" y="178" text-anchor="middle" font-size="15" font-weight="bold" fill="#388e3c">Thread Indexing Variables (dim3 type)</text>
    <rect x="50" y="195" width="175" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="137" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">threadIdx</text>
    <text x="137" y="238" text-anchor="middle" font-size="10" fill="#555">pos in block</text>
    <rect x="235" y="195" width="175" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="322" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">blockIdx</text>
    <text x="322" y="238" text-anchor="middle" font-size="10" fill="#555">pos in grid</text>
    <rect x="420" y="195" width="175" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="507" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">blockDim</text>
    <text x="507" y="238" text-anchor="middle" font-size="10" fill="#555">threads per block</text>
    <rect x="605" y="195" width="175" height="55" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="692" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">gridDim</text>
    <text x="692" y="238" text-anchor="middle" font-size="10" fill="#555">blocks in grid</text>
    <rect x="150" y="262" width="500" height="32" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">globalIdx = blockIdx.x × blockDim.x + threadIdx.x</text>
  </g>
  
  <g id="step2" class="step" data-narration="For 1D problems: compute global thread index using blockIdx times blockDim plus threadIdx, then use ceiling division for grid size.">
    <text x="400" y="308" text-anchor="middle" font-size="15" font-weight="bold" fill="#ff9800">1D Indexing Example</text>
    <rect x="80" y="328" width="640" height="75" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="355" text-anchor="middle" font-size="12" fill="#333">int idx = blockIdx.x × blockDim.x + threadIdx.x;</text>
    <text x="400" y="378" text-anchor="middle" font-size="12" fill="#333">if (idx &lt; N) data[idx] = data[idx] × 2.0f;</text>
    <text x="400" y="398" text-anchor="middle" font-size="11" fill="#ff9800">gridSize = (N + blockSize - 1) / blockSize</text>
  </g>
  
  <g id="step3" class="step" data-narration="For 2D grids, both block and grid use dim3 with x and y. Compute column from blockIdx.x and threadIdx.x, row from blockIdx.y and threadIdx.y.">
    <text x="400" y="420" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">2D and 3D Grids</text>
    <rect x="50" y="440" width="340" height="75" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">2D: Images, Matrices</text>
    <text x="220" y="482" text-anchor="middle" font-size="10" fill="#555">dim3 block(16,16); 256 threads</text>
    <text x="220" y="500" text-anchor="middle" font-size="10" fill="#555">col = blockIdx.x × blockDim.x + threadIdx.x</text>
    <rect x="410" y="440" width="340" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="580" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">3D: Volumetric Data</text>
    <text x="580" y="482" text-anchor="middle" font-size="10" fill="#555">dim3 block(8,8,8); 512 threads</text>
    <text x="580" y="500" text-anchor="middle" font-size="10" fill="#555">x,y,z from blockIdx and threadIdx</text>
  </g>
  
  <g id="step4" class="step" data-narration="A warp contains 32 consecutive threads executing in lockstep (SIMT). When threads in a warp branch differently, warp divergence causes serialized execution.">
    <text x="400" y="530" text-anchor="middle" font-size="15" font-weight="bold" fill="#e91e63">Warps: 32-Thread Execution Units</text>
    <rect x="50" y="548" width="700" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="568" text-anchor="middle" font-size="11" fill="#e91e63">Warp 0: threads 0-31 | Warp 1: threads 32-63 | ... (SIMT: all execute same instruction)</text>
  </g>
</svg>