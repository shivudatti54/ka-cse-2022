<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">CUDA Trapezoidal Rule III: Multi-Warp Optimization</text>
  
  <!-- Step 1: Recap tree reduction -->
  <g class="step" id="step1" data-narration="The previous version called __syncthreads() at every tree reduction step. For 256 threads, this means 8 synchronization barriers (log₂256 = 8).">
    <rect x="20" y="30" width="760" height="48" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="35" y="45" font-size="10" font-weight="bold" fill="#1976d2">Step 1: Tree Reduction with Full Sync</text>
    <text x="35" y="60" font-size="8" font-family="monospace" fill="#555">for (s = 128; s > 0; s >>= 1) {</text>
    <text x="50" y="72" font-size="8" font-family="monospace" fill="#555">if (tid &lt; s) sum += data[tid+s];</text>
    <text x="50" y="84" font-size="8" font-family="monospace" fill="#f44336">__syncthreads();</text>
    <text x="200" y="48" font-size="9" fill="#666">256 threads → 8 sync barriers</text>
    <text x="200" y="60" font-size="9" fill="#666">Each __syncthreads() adds overhead</text>
  </g>
  
  <!-- Step 2: Warp concept -->
  <g class="step" id="step2" data-narration="A warp is 32 consecutive threads executing in lockstep on one SM. This is NVIDIA's SIMT model. A 256-thread block contains 8 warps.">
    <rect x="20" y="85" width="760" height="45" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="99" font-size="10" font-weight="bold" fill="#388e3c">Step 2: Warp = 32 Threads in Lockstep (SIMT)</text>
    <rect x="35" y="108" width="60" height="18" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="65" y="120" font-size="8" font-weight="bold" fill="#388e3c">Warp 0</text>
    <text x="100" y="120" font-size="7" fill="#555">(0-31)</text>
    <rect x="105" y="108" width="60" height="18" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="135" y="120" font-size="8" font-weight="bold" fill="#388e3c">Warp 1</text>
    <text x="170" y="120" font-size="7" fill="#555">(32-63)</text>
    <rect x="175" y="108" width="60" height="18" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="205" y="120" font-size="8" font-weight="bold" fill="#388e3c">Warp 2</text>
    <text x="240" y="120" font-size="7" fill="#555">(64-95)</text>
    <text x="290" y="120" font-size="8" fill="#333">... 8 warps total for 256 threads</text>
  </g>
  
  <!-- Step 3: Multi-warp problem -->
  <g class="step" id="step3" data-narration="With multiple warps, different warps execute at different rates. Warp 0 might finish step 3 while Warp 4 is still on step 2, so __syncthreads() is required.">
    <rect x="20" y="138" width="760" height="58" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="35" y="152" font-size="10" font-weight="bold" fill="#ff9800">Step 3: Why __syncthreads() Needed Between Warps</text>
    <rect x="35" y="162" width="120" height="14" rx="2" fill="#ffe0b2"/>
    <text x="95" y="172" font-size="8" fill="#333">Warp 0: step 1 → 2 → 3</text>
    <rect x="35" y="178" width="80" height="14" rx="2" fill="#ffe0b2"/>
    <text x="75" y="188" font-size="8" fill="#333">Warp 4: step 1 → 2</text>
    <text x="160" y="175" font-size="9" fill="#f44336" font-weight="bold">→ __syncthreads() needed!</text>
  </g>

  <!-- Step 4: When sync becomes unnecessary -->
  <g class="step" id="step4" data-narration="When stride drops to 32 or below, only Warp 0 remains active. Threads in a warp execute in lockstep, so they are implicitly synchronized—no barrier needed!">
    <rect x="20" y="200" width="760" height="50" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="35" y="214" font-size="10" font-weight="bold" fill="#9c27b0">Step 4: Sync Unnecessary When Stride ≤ 32</text>
    <text x="35" y="228" font-size="8" fill="#333">Stride 128: threads 0-127 (8 warps) →</text>
    <text x="220" y="228" font-size="8" fill="#f44336">need sync</text>
    <text x="35" y="238" font-size="8" fill="#333">Stride 64: threads 0-63 (2 warps) →</text>
    <text x="210" y="238" font-size="8" fill="#f44336">need sync</text>
    <text x="35" y="248" font-size="8" fill="#333">Stride 32: threads 0-31 (1 warp) →</text>
    <text x="220" y="248" font-size="8" fill="#388e3c" font-weight="bold">NO sync needed!</text>
  </g>

  <!-- Step 5: Approach 1 - volatile -->
  <g class="step" id="step5" data-narration="Approach 1 uses volatile to prevent register caching. The loop stops at stride greater than 32, then manually unrolls the last 6 warp-level additions without sync.">
    <rect x="20" y="256" width="760" height="48" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="35" y="270" font-size="10" font-weight="bold" fill="#1976d2">Step 5: Approach 1 - volatile + Manual Unrolling</text>
    <text x="35" y="285" font-size="8" font-family="monospace" fill="#333">volatile double* vsdata = sdata;</text>
    <text x="35" y="297" font-size="8" font-family="monospace" fill="#333">for (s = blockDim.x/2; s > 32; s >>= 1)</text>
    <text x="200" y="285" font-size="8" fill="#666">// unrolled: strides 32,16,8,4,2,1</text>
    <text x="200" y="297" font-size="8" fill="#388e3c">volatile prevents register caching</text>
  </g>

  <!-- Step 6: Approach 2 - Warp Shuffle -->
  <g class="step" id="step6" data-narration="Warp shuffle __shfl_down_sync lets threads read each other's registers directly. No shared memory needed, no bank conflicts, and only ~1 cycle latency.">
    <rect x="20" y="310" width="760" height="68" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="324" font-size="10" font-weight="bold" fill="#388e3c">Step 6: Approach 2 - Warp Shuffle Instructions</text>
    <text x="35" y="339" font-size="7" font-family="monospace" fill="#333">val += __shfl_down_sync(0xFFFFFFFF, val, 16);</text>
    <text x="35" y="349" font-size="7" font-family="monospace" fill="#333">val += __shfl_down_sync(0xFFFFFFFF, val, 8);</text>
    <text x="35" y="359" font-size="7" font-family="monospace" fill="#333">val += __shfl_down_sync(0xFFFFFFFF, val, 4);</text>
    <text x="35" y="369" font-size="7" font-family="monospace" fill="#333">val += __shfl_down_sync(0xFFFFFFFF, val, 2);</text>
    <text x="35" y="379" font-size="7" font-family="monospace" fill="#333">val += __shfl_down_sync(0xFFFFFFFF, val, 1);</text>
    <text x="250" y="339" font-size="8" fill="#388e3c">✓ No shared memory needed</text>
    <text x="250" y="349" font-size="8" fill="#388e3c">✓ No bank conflicts</text>
    <text x="250" y="359" font-size="8" fill="#388e3c">✓ ~1 cycle latency vs ~5 cycles</text>
  </g>

  <!-- Step 7: Two-phase reduction -->
  <g class="step" id="step7" data-narration="Two-phase reduction: Phase 1 reduces within each warp using shuffles. Phase 2 combines warp results in shared memory with only 1 sync call instead of 8.">
    <rect x="20" y="384" width="760" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="35" y="398" font-size="10" font-weight="bold" fill="#ff9800">Step 7: Two-Phase Reduction</text>
    <rect x="35" y="409" width="130" height="20" rx="3" fill="#ffe0b2"/>
    <text x="100" y="422" font-size="8" font-weight="bold" fill="#333">Phase 1: Intra-Warp</text>
    <text x="175" y="422" font-size="7" fill="#333">8 warps → 8 sums</text>
    <line x1="185" y1="421" x2="205" y2="421" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <rect x="215" y="409" width="150" height="20" rx="3" fill="#ffe0b2"/>
    <text x="290" y="422" font-size="8" font-weight="bold" fill="#333">Phase 2: Inter-Warp</text>
    <text x="375" y="422" font-size="7" fill="#333">8 sums → 1 block sum</text>
    <line x1="385" y1="421" x2="405" y2="421" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="420" y="422" font-size="8" fill="#388e3c" font-weight="bold">Only 1 __syncthreads()!</text>
  </g>

  <!-- Step 8: Performance comparison -->
  <g class="step" id="step8" data-narration="Version III achieves 12-25x speedup with just 1 sync barrier and 256 bytes of shared memory, compared to 8 barriers and 2048 bytes in Version II.">
    <rect x="20" y="440" width="760" height="45" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="35" y="454" font-size="10" font-weight="bold" fill="#9c27b0">Step 8: Performance Comparison</text>
    <rect x="35" y="463" width="85" height="18" rx="2" fill="#f8bbd9"/>
    <text x="77" y="475" font-size="7" fill="#333">I (atomic): 0 sync</text>
    <rect x="130" y="463" width="85" height="18" rx="2" fill="#fff59d"/>
    <text x="172" y="475" font-size="7" fill="#333">II (tree): 8 sync</text>
    <rect x="225" y="463" width="95" height="18" rx="2" fill="#c8e6c9"/>
    <text x="272" y="475" font-size="7" fill="#333">III (warp): 1 sync</text>
    <text x="340" y="467" font-size="8" fill="#388e3c">Shared mem: 256B vs 2048B</text>
    <text x="340" y="479" font-size="8" fill="#388e3c">Speedup: ~12-25x</text>
  </g>
</svg>