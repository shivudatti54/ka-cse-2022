<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">NVIDIA Compute Capabilities</text>
  
  <g id="step0" class="step" data-narration="Compute capability is a version number that defines the hardware features and limits of an NVIDIA GPU, not a performance metric.">
    <text x="50" y="55" text-anchor="start" font-size="14" font-weight="bold" fill="#1976d2">What Is Compute Capability?</text>
    <rect x="50" y="65" width="700" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="85" text-anchor="middle" font-size="13" fill="#333">major.minor (e.g., 7.5, 8.6, 9.0)</text>
    <text x="400" y="108" text-anchor="middle" font-size="11" fill="#666">Major = Architecture Generation | Minor = Incremental Features | NOT a performance indicator</text>
  </g>
  
  <g id="step1" class="step" data-narration="Compute capability determines supported CUDA features like dynamic parallelism and Tensor Cores, hardware limits on threads and memory, and available data types.">
    <text x="50" y="140" text-anchor="start" font-size="14" font-weight="bold" fill="#388e3c">What It Determines</text>
    <rect x="50" y="150" width="220" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="160" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">CUDA Features</text>
    <text x="160" y="190" text-anchor="middle" font-size="9" fill="#555">Dynamic Parallelism, Tensor Cores</text>
    <rect x="290" y="150" width="220" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="400" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Hardware Limits</text>
    <text x="400" y="190" text-anchor="middle" font-size="9" fill="#555">Max threads/block, registers, shared mem</text>
    <rect x="530" y="150" width="220" height="55" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="640" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Data Types</text>
    <text x="640" y="190" text-anchor="middle" font-size="9" fill="#555">FP16, FP64, INT8, TF32, BF16, FP8</text>
  </g>
  
  <g id="step2" class="step" data-narration="Key architecture generations: Tesla 1.x (first CUDA), Fermi 2.x (caches), Kepler 3.x (dynamic parallelism), Pascal 6.x (NVLink), Volta 7.x (Tensor Cores), Ampere 8.x (TF32), Hopper 9.x (FP8).">
    <text x="50" y="225" text-anchor="start" font-size="14" font-weight="bold" fill="#9c27b0">Architecture Generations</text>
    <rect x="50" y="238" width="100" height="45" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="100" y="255" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">1.x Tesla</text>
    <text x="100" y="272" text-anchor="middle" font-size="8" fill="#666">First CUDA</text>
    <rect x="160" y="238" width="100" height="45" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="210" y="255" text-anchor="middle" font-size="9" font-weight="bold" fill="#388e3c">2.x Fermi</text>
    <text x="210" y="272" text-anchor="middle" font-size="8" fill="#666">L1/L2 Caches</text>
    <rect x="270" y="238" width="100" height="45" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="320" y="255" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff9800">3.x Kepler</text>
    <text x="320" y="272" text-anchor="middle" font-size="8" fill="#666">Dyn. Parallelism</text>
    <rect x="380" y="238" width="100" height="45" rx="5" fill="#ffebee" stroke="#f44336"/>
    <text x="430" y="255" text-anchor="middle" font-size="9" font-weight="bold" fill="#f44336">6.x Pascal</text>
    <text x="430" y="272" text-anchor="middle" font-size="8" fill="#666">NVLink, HBM2</text>
    <rect x="490" y="238" width="100" height="45" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="540" y="255" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">7.x Volta</text>
    <text x="540" y="272" text-anchor="middle" font-size="8" fill="#666">Tensor Cores!</text>
    <rect x="600" y="238" width="100" height="45" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="650" y="255" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">8.x Ampere</text>
    <text x="650" y="272" text-anchor="middle" font-size="8" fill="#666">TF32, BF16</text>
    <rect x="710" y="238" width="60" height="45" rx="5" fill="#388e3c" stroke="#388e3c"/>
    <text x="740" y="255" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">9.x</text>
    <text x="740" y="272" text-anchor="middle" font-size="8" fill="#fff">Hopper</text>
  </g>
  
  <g id="step3" class="step" data-narration="Query GPU properties at runtime using cudaGetDeviceProperties to get compute capability version, SM count, memory size, and hardware limits.">
    <text x="50" y="305" text-anchor="start" font-size="14" font-weight="bold" fill="#1976d2">Query Device Properties</text>
    <rect x="50" y="318" width="700" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="400" y="340" text-anchor="middle" font-size="12" font-family="monospace" fill="#1976d2">cudaGetDeviceProperties(&amp;prop, deviceId);</text>
    <text x="400" y="362" text-anchor="middle" font-size="10" fill="#555">major/minor = CC version | multiProcessorCount = SMs | maxThreadsPerBlock = 1024 | totalGlobalMem = memory</text>
  </g>
  
  <g id="step4" class="step" data-narration="Compile with nvcc -arch=sm_XX for specific SASS code. Use -gencode with PTX for forward compatibility across multiple GPU architectures.">
    <text x="50" y="400" text-anchor="start" font-size="14" font-weight="bold" fill="#ff9800">Compiling for Architectures</text>
    <rect x="50" y="413" width="340" height="55" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="220" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">-arch=sm_80</text>
    <text x="220" y="455" text-anchor="middle" font-size="9" fill="#666">Generates SASS for CC 8.0</text>
    <rect x="410" y="413" width="340" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="580" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">-gencode arch=compute_80</text>
    <text x="580" y="455" text-anchor="middle" font-size="9" fill="#666">Includes PTX for forward compat</text>
  </g>
  
  <g id="step5" class="step" data-narration="Common hardware limits: 1024 max threads per block, 64 warps per SM, 65536 registers per SM, 48-228 KB shared memory per SM. Warp size is always 32.">
    <text x="50" y="490" text-anchor="start" font-size="14" font-weight="bold" fill="#e91e63">Hardware Limits (CC 5.0+)</text>
    <rect x="50" y="503" width="160" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="130" y="523" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Threads/Block</text>
    <text x="130" y="538" text-anchor="middle" font-size="11" fill="#333">1024</text>
    <rect x="220" y="503" width="160" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="300" y="523" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Warps/SM</text>
    <text x="300" y="538" text-anchor="middle" font-size="11" fill="#333">64</text>
    <rect x="390" y="503" width="160" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="470" y="523" text-anchor="middle" font-size="10" font-weight="bold" fill="#ff9800">Registers/SM</text>
    <text x="470" y="538" text-anchor="middle" font-size="11" fill="#333">65536</text>
    <rect x="560" y="503" width="180" height="40" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="650" y="523" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">Shared Mem/SM</text>
    <text x="650" y="538" text-anchor="middle" font-size="11" fill="#333">48-228 KB</text>
  </g>
  
  <g id="step6" class="step" data-narration="Use __CUDA_ARCH__ preprocessor macro for conditional compilation to leverage architecture-specific features when available.">
    <text x="50" y="565" text-anchor="start" font-size="14" font-weight="bold" fill="#388e3c">Conditional Compilation</text>
    <rect x="50" y="578" width="700" height="18" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="400" y="592" text-anchor="middle" font-size="9" font-family="monospace" fill="#388e3c">#if __CUDA_ARCH__ >= 800 // Ampere | #elif __CUDA_ARCH__ >= 700 // Volta | #else // Older</text>
  </g>
</svg>