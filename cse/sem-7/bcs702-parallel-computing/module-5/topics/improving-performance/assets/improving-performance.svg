<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Improving Performance in Parallel Computing</text>
  <g id="step0" class="step" data-narration="Performance in parallel computing is measured using speedup and efficiency. Speedup S(p) is the ratio of serial time to parallel time. Efficiency E(p) measures how well each processor is utilized relative to ideal linear speedup.">
    <text x="400" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Performance Metrics</text>
    <rect x="50" y="80" width="330" height="100" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Speedup S(p)</text>
    <text x="215" y="130" text-anchor="middle" font-size="12" fill="#555">S(p) = T(1) / T(p)</text>
    <text x="215" y="150" text-anchor="middle" font-size="10" fill="#555">Ideal: S(p) = p (linear speedup)</text>
    <text x="215" y="168" text-anchor="middle" font-size="10" fill="#e91e63">Rarely achieved due to overheads</text>
    <rect x="420" y="80" width="330" height="100" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="585" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Efficiency E(p)</text>
    <text x="585" y="130" text-anchor="middle" font-size="12" fill="#555">E(p) = S(p) / p</text>
    <text x="585" y="150" text-anchor="middle" font-size="10" fill="#555">Ideal: E(p) = 1 (100%)</text>
    <text x="585" y="168" text-anchor="middle" font-size="10" fill="#555">Measures processor utilization</text>
  </g>
  <g id="step1" class="step" data-narration="Amdahl's Law sets a hard upper bound on speedup. If a fraction f of the program is serial, maximum speedup is 1/f regardless of processor count. Even 5% serial code limits speedup to 20x with infinite processors.">
    <text x="400" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">Amdahl's Law: The Speedup Limit</text>
    <rect x="80" y="225" width="640" height="55" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="400" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="#e91e63">S(p) &lt;= 1 / (f + (1-f)/p)</text>
    <text x="400" y="267" text-anchor="middle" font-size="11" fill="#555">f = serial fraction, p = number of processors</text>
    <rect x="80" y="295" width="200" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="180" y="315" text-anchor="middle" font-size="10" fill="#1976d2">f=10%, max S = 10x</text>
    <text x="180" y="330" text-anchor="middle" font-size="10" fill="#555">Even with infinity procs</text>
    <rect x="300" y="295" width="200" height="45" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="400" y="315" text-anchor="middle" font-size="10" fill="#ff9800">f=5%, max S = 20x</text>
    <text x="400" y="330" text-anchor="middle" font-size="10" fill="#555">Diminishing returns</text>
    <rect x="520" y="295" width="200" height="45" rx="6" fill="#fce4ec" stroke="#e91e63"/>
    <text x="620" y="315" text-anchor="middle" font-size="10" fill="#e91e63">f=1%, max S = 100x</text>
    <text x="620" y="330" text-anchor="middle" font-size="10" fill="#555">Minimize serial fraction!</text>
  </g>
  <g id="step2" class="step" data-narration="Gustafson's Law offers a more optimistic view. It argues that as we add processors, we solve larger problems rather than the same problem faster. This leads to scaled speedup S(p) = p - f*(p-1), showing near-linear speedup for scaled workloads.">
    <text x="400" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Gustafson's Law: Scaled Speedup</text>
    <rect x="80" y="385" width="640" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="407" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">S(p) = p - f * (p - 1)</text>
    <text x="400" y="427" text-anchor="middle" font-size="11" fill="#555">f = serial fraction measured on larger system</text>
    <rect x="80" y="455" width="300" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="230" y="475" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Weak Scaling</text>
    <text x="230" y="490" text-anchor="middle" font-size="10" fill="#555">Problem grows with processor count</text>
    <rect x="420" y="455" width="300" height="45" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="570" y="475" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Strong Scaling</text>
    <text x="570" y="490" text-anchor="middle" font-size="10" fill="#555">Fixed problem, more processors</text>
  </g>
  <g id="step3" class="step" data-narration="Communication overhead is often the biggest bottleneck. Use optimized collective operations like MPI_Bcast and MPI_Reduce instead of manual loops. Overlap communication with computation using non-blocking calls like MPI_Isend and MPI_Irecv.">
    <text x="400" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Strategy 1: Minimize Communication</text>
    <rect x="50" y="90" width="330" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="215" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Use Collective Operations</text>
    <text x="215" y="132" text-anchor="middle" font-size="10" fill="#555">MPI_Bcast, MPI_Reduce</text>
    <text x="215" y="150" text-anchor="middle" font-size="10" fill="#388e3c">Hardware-optimized trees</text>
    <rect x="420" y="90" width="330" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="585" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Overlap Comm + Compute</text>
    <text x="585" y="132" text-anchor="middle" font-size="10" fill="#555">MPI_Isend / MPI_Irecv</text>
    <text x="585" y="150" text-anchor="middle" font-size="10" fill="#388e3c">Non-blocking: compute while waiting</text>
  </g>
  <g id="step4" class="step" data-narration="Load balancing ensures all processors have equal work. Static balancing pre-divides work evenly, ideal for uniform tasks. Dynamic balancing assigns work at runtime from a task pool, essential for irregular or unpredictable workloads.">
    <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Strategy 2: Load Balancing</text>
    <rect x="50" y="215" width="330" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="237" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Static Balancing</text>
    <text x="215" y="257" text-anchor="middle" font-size="10" fill="#555">Pre-divide work equally</text>
    <text x="215" y="275" text-anchor="middle" font-size="10" fill="#555">Good for uniform, predictable work</text>
    <text x="215" y="290" text-anchor="middle" font-size="10" fill="#1976d2">Example: equal array chunks</text>
    <rect x="420" y="215" width="330" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="585" y="237" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Dynamic Balancing</text>
    <text x="585" y="257" text-anchor="middle" font-size="10" fill="#555">Assign work at runtime</text>
    <text x="585" y="275" text-anchor="middle" font-size="10" fill="#555">Good for irregular workloads</text>
    <text x="585" y="290" text-anchor="middle" font-size="10" fill="#ff9800">Example: task pool / work stealing</text>
  </g>
  <g id="step5" class="step" data-narration="To maximize performance, profile code to find hotspots, maximize the parallel fraction to reduce Amdahl's bottleneck, minimize synchronization points like barriers, and reduce idle time through better load distribution.">
    <text x="400" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Performance Improvement Summary</text>
    <rect x="60" y="340" width="320" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="220" y="358" text-anchor="middle" font-size="11" fill="#1976d2">1. Profile code to find bottlenecks</text>
    <rect x="60" y="374" width="320" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="220" y="392" text-anchor="middle" font-size="11" fill="#388e3c">2. Maximize parallel fraction (reduce f)</text>
    <rect x="60" y="408" width="320" height="28" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="220" y="426" text-anchor="middle" font-size="11" fill="#ff9800">3. Minimize communication overhead</text>
    <rect x="420" y="340" width="320" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="580" y="358" text-anchor="middle" font-size="11" fill="#9c27b0">4. Balance load across processors</text>
    <rect x="420" y="374" width="320" height="28" rx="4" fill="#fce4ec" stroke="#e91e63"/>
    <text x="580" y="392" text-anchor="middle" font-size="11" fill="#e91e63">5. Reduce synchronization barriers</text>
    <rect x="420" y="408" width="320" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="580" y="426" text-anchor="middle" font-size="11" fill="#1976d2">6. Use non-blocking communication</text>
  </g>
</svg>
