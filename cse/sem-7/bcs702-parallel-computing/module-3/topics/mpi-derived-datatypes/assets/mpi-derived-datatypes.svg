<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/></marker></defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">MPI Derived Datatypes</text>

  <g id="step0" class="step" data-narration="MPI derived datatypes describe complex non-contiguous memory layouts so MPI can send scattered data efficiently.">
    <text x="400" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Why Derived Datatypes?</text>
    <rect x="50" y="100" width="320" height="100" rx="10" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="210" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#e91e63">Without: Manual Pack/Unpack</text>
    <text x="210" y="150" text-anchor="middle" font-size="11" fill="#555">Copy scattered data to temp buffer</text>
    <text x="210" y="170" text-anchor="middle" font-size="11" fill="#555">Send buffer, receive, unpack</text>
    <text x="210" y="190" text-anchor="middle" font-size="10" fill="#e91e63">Inefficient and error-prone</text>
    <rect x="430" y="100" width="320" height="100" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">With: Derived Datatypes</text>
    <text x="590" y="150" text-anchor="middle" font-size="11" fill="#555">Describe layout once to MPI</text>
    <text x="590" y="170" text-anchor="middle" font-size="11" fill="#555">MPI handles gathering/scattering</text>
    <text x="590" y="190" text-anchor="middle" font-size="10" fill="#388e3c">Clean, optimized, portable</text>
  </g>

  <g id="step1" class="step" data-narration="The lifecycle is: construct the type with a constructor, commit it, use in communication, then free when done.">
    <text x="400" y="230" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c27b0">Derived Type Lifecycle</text>
    <rect x="100" y="260" width="150" height="45" rx="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="175" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Construct</text>
    <line x1="250" y1="283" x2="310" y2="283" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="320" y="260" width="150" height="45" rx="22" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="395" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Commit</text>
    <line x1="470" y1="283" x2="530" y2="283" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="540" y="260" width="150" height="45" rx="22" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="615" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Use</text>
    <line x1="615" y1="305" x2="615" y2="335" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="540" y="340" width="150" height="45" rx="22" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="615" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Free</text>
    <text x="175" y="335" text-anchor="middle" font-size="10" fill="#555">MPI_Type_vector</text>
    <text x="395" y="335" text-anchor="middle" font-size="10" fill="#555">MPI_Type_commit</text>
    <text x="615" y="320" text-anchor="middle" font-size="10" fill="#555">MPI_Send/Recv</text>
    <text x="615" y="405" text-anchor="middle" font-size="10" fill="#555">MPI_Type_free</text>
  </g>

  <g id="step2" class="step" data-narration="MPI_Type_contiguous creates a type for a contiguous block of elements, useful as a building block for more complex types.">
    <text x="400" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">MPI_Type_contiguous</text>
    <text x="400" y="105" text-anchor="middle" font-size="12" fill="#555">Contiguous block of same-type elements</text>
    <rect x="100" y="130" width="600" height="50" rx="4" fill="#fff" stroke="#ccc"/>
    <rect x="100" y="130" width="50" height="50" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="125" y="160" text-anchor="middle" font-size="10" fill="#1976d2">int0</text>
    <rect x="150" y="130" width="50" height="50" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="175" y="160" text-anchor="middle" font-size="10" fill="#1976d2">int1</text>
    <rect x="200" y="130" width="50" height="50" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="225" y="160" text-anchor="middle" font-size="10" fill="#1976d2">int2</text>
    <rect x="250" y="130" width="50" height="50" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="275" y="160" text-anchor="middle" font-size="10" fill="#1976d2">int3</text>
    <rect x="300" y="130" width="50" height="50" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="325" y="160" text-anchor="middle" font-size="10" fill="#1976d2">int4</text>
    <rect x="95" y="125" width="260" height="60" rx="4" fill="none" stroke="#1976d2" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="225" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">count=5 contiguous ints</text>
  </g>

  <g id="step3" class="step" data-narration="MPI_Type_vector handles regularly strided data like matrix columns where elements are evenly spaced in memory.">
    <text x="400" y="250" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">MPI_Type_vector</text>
    <text x="400" y="280" text-anchor="middle" font-size="12" fill="#555">Regularly strided blocks (e.g., matrix column)</text>
    <text x="80" y="310" font-size="11" fill="#888">3x4 Matrix (row-major):</text>
    <rect x="100" y="320" width="50" height="35" fill="#388e3c" opacity="0.8"/><text x="125" y="342" text-anchor="middle" font-size="9" fill="#fff">a00</text>
    <rect x="150" y="320" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="175" y="342" text-anchor="middle" font-size="9" fill="#888">a01</text>
    <rect x="200" y="320" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="225" y="342" text-anchor="middle" font-size="9" fill="#888">a02</text>
    <rect x="250" y="320" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="275" y="342" text-anchor="middle" font-size="9" fill="#888">a03</text>
    <rect x="100" y="355" width="50" height="35" fill="#388e3c" opacity="0.8"/><text x="125" y="377" text-anchor="middle" font-size="9" fill="#fff">a10</text>
    <rect x="150" y="355" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="175" y="377" text-anchor="middle" font-size="9" fill="#888">a11</text>
    <rect x="200" y="355" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="225" y="377" text-anchor="middle" font-size="9" fill="#888">a12</text>
    <rect x="250" y="355" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="275" y="377" text-anchor="middle" font-size="9" fill="#888">a13</text>
    <rect x="100" y="390" width="50" height="35" fill="#388e3c" opacity="0.8"/><text x="125" y="412" text-anchor="middle" font-size="9" fill="#fff">a20</text>
    <rect x="150" y="390" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="175" y="412" text-anchor="middle" font-size="9" fill="#888">a21</text>
    <rect x="200" y="390" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="225" y="412" text-anchor="middle" font-size="9" fill="#888">a22</text>
    <rect x="250" y="390" width="50" height="35" fill="#e8f5e9" stroke="#ccc"/><text x="275" y="412" text-anchor="middle" font-size="9" fill="#888">a23</text>
    <text x="500" y="335" font-size="12" fill="#388e3c">count=3, blocklength=1</text>
    <text x="500" y="355" font-size="12" fill="#388e3c">stride=4 (num columns)</text>
    <text x="500" y="385" font-size="12" font-weight="bold" fill="#388e3c">Selects column 0:</text>
    <text x="500" y="405" font-size="12" fill="#388e3c">a00, a10, a20</text>
  </g>

  <g id="step4" class="step" data-narration="MPI_Type_indexed handles irregularly spaced blocks where each block can have different lengths and offsets.">
    <text x="400" y="450" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">MPI_Type_indexed</text>
    <text x="400" y="480" text-anchor="middle" font-size="12" fill="#555">Arbitrary non-contiguous blocks with varying offsets</text>
    <rect x="60" y="505" width="680" height="40" rx="4" fill="#fff" stroke="#ccc"/>
    <text x="65" y="530" font-size="9" fill="#888">0</text>
    <rect x="120" y="507" width="40" height="36" fill="#ff9800" opacity="0.7"/><text x="140" y="530" text-anchor="middle" font-size="9" fill="#fff">idx1</text>
    <rect x="340" y="507" width="40" height="36" fill="#ff9800" opacity="0.7"/><text x="360" y="530" text-anchor="middle" font-size="9" fill="#fff">idx5</text>
    <rect x="500" y="507" width="120" height="36" fill="#ff9800" opacity="0.7"/><text x="560" y="530" text-anchor="middle" font-size="9" fill="#fff">idx8-10</text>
    <text x="400" y="570" text-anchor="middle" font-size="12" fill="#ff9800">blocklengths=[1, 1, 3], displacements=[1, 5, 8]</text>
  </g>

  <g id="step5" class="step" data-narration="MPI_Type_create_struct is the most general constructor handling mixed types like C structs with different field types.">
    <text x="400" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c27b0">MPI_Type_create_struct</text>
    <text x="400" y="105" text-anchor="middle" font-size="12" fill="#555">Most general: different types, different sizes</text>
    <rect x="100" y="130" width="600" height="90" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">struct Particle</text>
    <rect x="120" y="170" width="100" height="35" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="170" y="192" text-anchor="middle" font-size="10" fill="#1976d2">int id</text>
    <rect x="240" y="170" width="260" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="370" y="192" text-anchor="middle" font-size="10" fill="#388e3c">double value[3]</text>
    <rect x="520" y="170" width="80" height="35" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="560" y="192" text-anchor="middle" font-size="10" fill="#ff9800">char tag</text>
    <text x="400" y="255" text-anchor="middle" font-size="11" fill="#555">Use MPI_Get_address for portable displacement calculation</text>
  </g>

  <g id="step6" class="step" data-narration="Key exam tip: remember Construct then Commit then Use then Free. Displacement units differ between constructors.">
    <text x="400" y="300" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Constructor Comparison</text>
    <rect x="50" y="330" width="170" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="135" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">contiguous</text>
    <text x="135" y="375" text-anchor="middle" font-size="10" fill="#555">Simple blocks</text>
    <text x="135" y="395" text-anchor="middle" font-size="10" fill="#888">Simplest</text>
    <rect x="240" y="330" width="170" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="325" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">vector</text>
    <text x="325" y="375" text-anchor="middle" font-size="10" fill="#555">Regular strides</text>
    <text x="325" y="395" text-anchor="middle" font-size="10" fill="#888">Columns, rows</text>
    <rect x="430" y="330" width="170" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="515" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">indexed</text>
    <text x="515" y="375" text-anchor="middle" font-size="10" fill="#555">Irregular offsets</text>
    <text x="515" y="395" text-anchor="middle" font-size="10" fill="#888">Same base type</text>
    <rect x="620" y="330" width="170" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="705" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">create_struct</text>
    <text x="705" y="375" text-anchor="middle" font-size="10" fill="#555">Mixed types</text>
    <text x="705" y="395" text-anchor="middle" font-size="10" fill="#888">Most general</text>
  </g>
</svg>
