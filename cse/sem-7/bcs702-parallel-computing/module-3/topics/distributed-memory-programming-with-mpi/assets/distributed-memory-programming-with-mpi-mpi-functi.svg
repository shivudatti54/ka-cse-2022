<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Distributed Memory Programming with MPI</text>

  <g class="step" id="step0" data-narration="In distributed memory systems, each process has its own private memory space. They cannot access each other's data directly and must communicate by explicitly sending and receiving messages through the network.">
    <rect x="50" y="45" width="330" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Process 0 (Rank 0)</text>
    <rect x="65" y="75" width="300" height="20" rx="3" fill="#fff" stroke="#bbdefb"/>
    <text x="215" y="89" text-anchor="middle" font-size="10" fill="#555">Private Memory</text>
    <rect x="420" y="45" width="330" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="585" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Process 1 (Rank 1)</text>
    <rect x="435" y="75" width="300" height="20" rx="3" fill="#fff" stroke="#c8e6c9"/>
    <text x="585" y="89" text-anchor="middle" font-size="10" fill="#555">Private Memory</text>
    <line x1="380" y1="95" x2="420" y2="95" stroke="#ff9800" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
    <text x="400" y="130" text-anchor="middle" font-size="10" fill="#ff9800">MPI Messages travel through network</text>
  </g>

  <g class="step" id="step1" data-narration="Every MPI program follows a lifecycle: MPI_Init starts the environment, then you query rank and size to know your identity, perform communication, and finally MPI_Finalize cleanly shuts everything down.">
    <rect x="80" y="155" width="640" height="45" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">MPI Program Lifecycle</text>
    <rect x="90" y="208" width="100" height="30" rx="15" fill="#1976d2"/>
    <text x="140" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">MPI_Init</text>
    <rect x="210" y="208" width="130" height="30" rx="15" fill="#1976d2"/>
    <text x="275" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">rank &amp; size</text>
    <rect x="360" y="208" width="120" height="30" rx="15" fill="#388e3c"/>
    <text x="420" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Send/Recv</text>
    <rect x="500" y="208" width="100" height="30" rx="15" fill="#f44336"/>
    <text x="550" y="228" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">MPI_Finalize</text>
    <line x1="190" y1="223" x2="210" y2="223" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <line x1="340" y1="223" x2="360" y2="223" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <line x1="480" y1="223" x2="500" y2="223" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>
  </g>

  <g class="step" id="step2" data-narration="MPI_Send pushes data from your buffer to another process. You specify the destination rank, a tag to identify the message, and the communicator. MPI_Recv waits for matching data to arrive in your buffer.">
    <rect x="50" y="260" width="340" height="130" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">MPI_Send</text>
    <text x="220" y="300" text-anchor="middle" font-size="9" fill="#555">MPI_Send(buffer, count, datatype,</text>
    <text x="220" y="314" text-anchor="middle" font-size="9" fill="#555">dest, tag, comm)</text>
    <text x="220" y="335" text-anchor="middle" font-size="9" fill="#1976d2">Sends data TO another process</text>
    <text x="220" y="350" text-anchor="middle" font-size="9" fill="#1976d2">dest = receiver's rank number</text>
    <text x="220" y="365" text-anchor="middle" font-size="9" fill="#1976d2">tag = message identifier</text>
    <rect x="410" y="260" width="340" height="130" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="580" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">MPI_Recv</text>
    <text x="580" y="300" text-anchor="middle" font-size="9" fill="#555">MPI_Recv(buffer, count, datatype,</text>
    <text x="580" y="314" text-anchor="middle" font-size="9" fill="#555">source, tag, comm, status)</text>
    <text x="580" y="335" text-anchor="middle" font-size="9" fill="#388e3c">Receives data FROM a process</text>
    <text x="580" y="350" text-anchor="middle" font-size="9" fill="#388e3c">source = sender's rank (or ANY_SOURCE)</text>
    <text x="580" y="365" text-anchor="middle" font-size="9" fill="#388e3c">Blocks until message arrives!</text>
  </g>

  <g class="step" id="step3" data-narration="Each MPI process gets a unique rank from zero to size minus one. Use MPI_Comm_rank to find YOUR rank, and MPI_Comm_size to learn how many processes exist in MPI_COMM_WORLD.">
    <rect x="80" y="400" width="180" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="170" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">MPI_Comm_rank</text>
    <text x="170" y="438" text-anchor="middle" font-size="9" fill="#555">Returns YOUR rank ID</text>
    <rect x="280" y="400" width="180" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="370" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">MPI_Comm_size</text>
    <text x="370" y="438" text-anchor="middle" font-size="9" fill="#555">Returns TOTAL process count</text>
    <rect x="500" y="400" width="220" height="55" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="610" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Process Ranks</text>
    <text x="610" y="438" text-anchor="middle" font-size="9" fill="#555">With 4 processes: 0, 1, 2, 3</text>
  </g>

  <g class="step" id="step4" data-narration="For send and receive to connect, the destination and source ranks must match, the tags must be identical, and communicators must be the same. Mismatches cause the program to hang forever waiting.">
    <rect x="60" y="465" width="680" height="65" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="485" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Message Matching Rules</text>
    <text x="400" y="505" text-anchor="middle" font-size="10" fill="#555">Send dest=1, tag=42 must match Recv source=0, tag=42 — ALL must match or program hangs!</text>
    <text x="400" y="520" text-anchor="middle" font-size="9" fill="#888">MPI_STATUS_IGNORE can be used when you don't need receive status information</text>
  </g>
</svg>