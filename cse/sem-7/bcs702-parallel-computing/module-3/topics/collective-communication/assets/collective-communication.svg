<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1565c0">Collective Communication in MPI</text>

  <g id="step0" class="step" data-narration="Collective communication involves all processes in a communicator. Every process must call the same collective routine. These operations are blocking and optimized for common parallel patterns like distributing and gathering data.">
    <rect x="80" y="50" width="640" height="55" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">All Processes Must Participate in Collective Calls</text>
    <text x="400" y="92" text-anchor="middle" font-size="11" fill="#555">Blocking operations: they return only after all processes complete</text>
  </g>

  <g id="step1" class="step" data-narration="Broadcast sends the same data from root to all processes. Scatter sends different chunks of data from root to each process. Both are one-to-all patterns used for distributing work or configuration to every process.">
    <text x="400" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">One-to-All: Broadcast and Scatter</text>
    <rect x="80" y="140" width="300" height="110" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="230" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">MPI_Bcast</text>
    <text x="230" y="180" text-anchor="middle" font-size="9" fill="#333">Same data to all</text>
    <rect x="110" y="192" width="60" height="18" rx="3" fill="#bbdefb"/>
    <text x="140" y="205" text-anchor="middle" font-size="8" fill="#0d47a1">Root: [D]</text>
    <line x1="170" y1="201" x2="195" y2="220" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="170" y1="201" x2="195" y2="235" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="170" y1="201" x2="195" y2="250" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="230" y="225" font-size="8" fill="#555">P1: [D]</text>
    <text x="230" y="240" font-size="8" fill="#555">P2: [D]</text>
    <rect x="420" y="140" width="300" height="110" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <text x="570" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">MPI_Scatter</text>
    <text x="570" y="180" text-anchor="middle" font-size="9" fill="#333">Different chunks to each</text>
    <rect x="450" y="192" width="100" height="18" rx="3" fill="#c8e6c9"/>
    <text x="500" y="205" text-anchor="middle" font-size="8" fill="#2e7d32">Root: [A,B,C,D]</text>
    <line x1="550" y1="201" x2="575" y2="220" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="550" y1="201" x2="575" y2="235" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="550" y1="201" x2="575" y2="250" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="610" y="225" font-size="8" fill="#555">P1: [A]</text>
    <text x="610" y="240" font-size="8" fill="#555">P2: [B]</text>
  </g>

  <g id="step2" class="step" data-narration="Gather collects data from each process and stores it at root. Reduce combines all values using an operation like SUM or MAX and stores only the result at root. Both are all-to-one patterns for collecting work from processes.">
    <text x="400" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">All-to-One: Gather and Reduce</text>
    <rect x="80" y="285" width="300" height="105" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="230" y="307" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">MPI_Gather</text>
    <text x="230" y="325" text-anchor="middle" font-size="9" fill="#333">Collect data at root</text>
    <text x="140" y="350" font-size="8" fill="#555">P0[A] → P1[B] → P2[C] → P3[D] →</text>
    <line x1="230" y1="355" x2="230" y2="375" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="230" y="385" text-anchor="middle" font-size="8" fill="#e65100">Root: [A,B,C,D]</text>
    <rect x="420" y="285" width="300" height="105" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
    <text x="570" y="307" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">MPI_Reduce</text>
    <text x="570" y="325" text-anchor="middle" font-size="9" fill="#333">Combine with operation</text>
    <text x="470" y="350" font-size="8" fill="#555">P0[3] → P1[7] → P2[2] → P3[5] →</text>
    <line x1="570" y1="355" x2="570" y2="375" stroke="#e53935" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="570" y="385" text-anchor="middle" font-size="8" fill="#c62828">Root: [17] (SUM)</text>
  </g>

  <g id="step3" class="step" data-narration="Allgather gathers data and sends the full result to every process. Allreduce combines values and shares the result with all processes. MPI_Barrier blocks each process until all reach it, ensuring synchronization.">
    <text x="400" y="410" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">All-to-All and Synchronization</text>
    <rect x="80" y="425" width="200" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="180" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">MPI_Allgather</text>
    <text x="180" y="467" text-anchor="middle" font-size="9" fill="#333">All get full gathered data</text>
    <text x="180" y="487" text-anchor="middle" font-size="8" fill="#555">Each: [A,B,C,D]</text>
    <rect x="300" y="425" width="200" height="80" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <text x="400" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">MPI_Allreduce</text>
    <text x="400" y="467" text-anchor="middle" font-size="9" fill="#333">All get reduced result</text>
    <text x="400" y="487" text-anchor="middle" font-size="8" fill="#555">Each: [17] (SUM)</text>
    <rect x="520" y="425" width="200" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="620" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">MPI_Barrier</text>
    <text x="620" y="467" text-anchor="middle" font-size="9" fill="#333">Synchronize all processes</text>
    <text x="620" y="487" text-anchor="middle" font-size="8" fill="#555">Wait until all arrive</text>
  </g>

  <g id="step4" class="step" data-narration="Choose Bcast for same data to all, Scatter for distributing chunks, Gather to collect at root, Reduce to combine values. Use Allgather or Allreduce when every process needs the result, and Barrier to synchronize phases.">
    <rect x="80" y="520" width="640" height="70" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="545" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Choosing the Right Operation</text>
    <text x="130" y="570" font-size="10" fill="#333">Bcast/Scatter:</text>
    <text x="210" y="570" font-size="10" fill="#555">distribute |</text>
    <text x="280" y="570" font-size="10" fill="#333">Gather/Reduce:</text>
    <text x="370" y="570" font-size="10" fill="#555">collect |</text>
    <text x="440" y="570" font-size="10" fill="#333">All-:</text>
    <text x="480" y="570" font-size="10" fill="#555">everyone gets |</text>
    <text x="550" y="570" font-size="10" fill="#333">Barrier:</text>
    <text x="610" y="570" font-size="10" fill="#555">sync</text>
  </g>
</svg>