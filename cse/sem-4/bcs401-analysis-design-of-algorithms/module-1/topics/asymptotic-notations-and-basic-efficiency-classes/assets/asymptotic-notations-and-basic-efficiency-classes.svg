<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1690">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect:first-child {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; }
    .body-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 400; }
    .formula { font-family: 'Courier New', monospace; font-weight: 500; }
    .graph-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 2s ease-out forwards; }
  </style>
  
  <rect width="800" height="1690" fill="url(#bgGradient)"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to asymptotic notations - the mathematical tools for analyzing algorithm efficiency.">
    <rect x="20" y="10" width="760" height="45" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" font-size="20" class="title-text">Asymptotic Notations and Basic Efficiency Classes</text>
    <text x="400" y="62" text-anchor="middle" fill="#546e7a" font-size="11" class="body-text">Algorithm Analysis Fundamentals - university 2022 Scheme</text>
  </g>
  
  <!-- Step 1: Why Asymptotic Notations Matter -->
  <g class="step" id="step1" data-narration="Asymptotic analysis measures how algorithm performance scales with input size, independent of machine specifics.">
    <rect x="30" y="70" width="740" height="90" rx="10" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="70" width="8" height="90" rx="4" fill="#1976d2"/>
    <text x="50" y="92" fill="#1565c0" font-size="13" class="title-text">Why Asymptotic Analysis?</text>
    <text x="50" y="112" fill="#455a64" font-size="10" class="body-text">Instead of measuring exact execution time (machine-dependent), we analyze</text>
    <text x="50" y="126" fill="#455a64" font-size="10" class="body-text">how an algorithm's performance SCALES with input size n.</text>
    <text x="50" y="146" fill="#78909c" font-size="9" class="body-text">This gives us machine-independent, theoretical efficiency guarantees.</text>
    <g transform="translate(520, 85)">
      <rect x="0" y="0" width="40" height="15" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
      <rect x="0" y="20" width="80" height="15" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
      <rect x="0" y="40" width="160" height="15" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
      <text x="180" y="12" fill="#1976d2" font-size="9">n=10</text>
      <text x="180" y="32" fill="#1976d2" font-size="9">n=20</text>
      <text x="180" y="52" fill="#1976d2" font-size="9">n=40</text>
    </g>
  </g>
  
  <!-- Step 2: The Three Key Notations -->
  <g class="step" id="step2" data-narration="Three notations capture algorithm bounds: O for worst-case, Omega for best-case, and Theta for average-case.">
    <rect x="30" y="175" width="740" height="90" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="197" fill="#1565c0" font-size="13" class="title-text">Three Essential Asymptotic Notations</text>
    <g transform="translate(50, 215)">
      <rect x="0" y="0" width="200" height="35" rx="6" fill="url(#blueGrad)"/>
      <text x="100" y="16" text-anchor="middle" fill="#1565c0" font-size="11" class="title-text">Big O - Upper Bound</text>
      <text x="100" y="28" text-anchor="middle" fill="#455a64" font-size="9" class="body-text">Worst-case: at most c times g(n)</text>
    </g>
    <g transform="translate(280, 215)">
      <rect x="0" y="0" width="200" height="35" rx="6" fill="url(#greenGrad)"/>
      <text x="100" y="16" text-anchor="middle" fill="#2e7d32" font-size="11" class="title-text">Big Omega - Lower Bound</text>
      <text x="100" y="28" text-anchor="middle" fill="#455a64" font-size="9" class="body-text">Best-case: at least c times g(n)</text>
    </g>
    <g transform="translate(510, 215)">
      <rect x="0" y="0" width="200" height="35" rx="6" fill="url(#orangeGrad)"/>
      <text x="100" y="16" text-anchor="middle" fill="#e65100" font-size="11" class="title-text">Big Theta - Tight Bound</text>
      <text x="100" y="28" text-anchor="middle" fill="#455a64" font-size="9" class="body-text">Average: Both O AND Omega</text>
    </g>
  </g>
  
  <!-- Step 3: Big O Notation -->
  <g class="step" id="step3" data-narration="Big O provides an upper bound - algorithm running time will not exceed this growth rate for large inputs.">
    <rect x="30" y="280" width="740" height="100" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="305" fill="#1565c0" font-size="13" class="title-text">Big O Notation (O) - Upper Bound</text>
    <text x="50" y="330" fill="#37474f" font-size="10" class="body-text">f(n) = O(g(n)) means f grows no faster than g(n) for large n.</text>
    <text x="50" y="350" fill="#37474f" font-size="10" class="body-text">Formal: There exist constants c and n0 such that 0 is less than or equal to f(n) is less than or equal to c times g(n).</text>
    <g transform="translate(50, 365)">
      <text x="0" y="0" fill="#0d47a1" font-size="11" class="formula">f(n) is less than or equal to c times g(n)</text>
      <line x1="0" y1="5" x2="220" y2="5" stroke="#1565c0" stroke-width="2"/>
      <text x="0" y="18" fill="#546e7a" font-size="9">grows at most as fast as</text>
    </g>
    <g transform="translate(480, 310)">
      <path d="M0,60 Q30,50 60,30 Q80,15 100,5" fill="none" stroke="#1565c0" stroke-width="2" class="graph-line"/>
      <path d="M0,60 Q30,45 60,20 Q80,5 100,0" fill="none" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,3" class="graph-line" style="animation-delay: 0.5s"/>
      <text x="10" y="75" fill="#1565c0" font-size="8">f(n)</text>
      <text x="60" y="75" fill="#1976d2" font-size="8">c times g(n)</text>
    </g>
  </g>
  
  <!-- Step 4: Big Omega Notation -->
  <g class="step" id="step4" data-narration="Big Omega provides a lower bound - algorithm running time grows at least this fast for large inputs.">
    <rect x="30" y="395" width="740" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="420" fill="#2e7d32" font-size="13" class="title-text">Big Omega Notation (Omega) - Lower Bound</text>
    <text x="50" y="445" fill="#37474f" font-size="10" class="body-text">f(n) = Omega(g(n)) means f grows at least as fast as g(n) for large n.</text>
    <text x="50" y="465" fill="#37474f" font-size="10" class="body-text">Formal: There exist constants c and n0 such that f(n) is greater than or equal to c times g(n).</text>
    <g transform="translate(50, 480)">
      <text x="0" y="0" fill="#1b5e20" font-size="11" class="formula">f(n) is greater than or equal to c times g(n)</text>
      <line x1="0" y1="5" x2="260" y2="5" stroke="#388e3c" stroke-width="2"/>
      <text x="0" y="18" fill="#546e7a" font-size="9">grows at least as fast as</text>
    </g>
    <g transform="translate(480, 425)">
      <path d="M0,60 Q30,45 60,20 Q80,5 100,0" fill="none" stroke="#388e3c" stroke-width="2" class="graph-line"/>
      <path d="M0,60 Q30,55 60,40 Q80,30 100,25" fill="none" stroke="#2e7d32" stroke-width="2" stroke-dasharray="5,3" class="graph-line" style="animation-delay: 0.5s"/>
      <text x="10" y="75" fill="#388e3c" font-size="8">f(n)</text>
      <text x="10" y="85" fill="#2e7d32" font-size="8">c times g(n)</text>
    </g>
  </g>
  
  <!-- Step 5: Big Theta Notation -->
  <g class="step" id="step5" data-narration="Big Theta gives a tight bound - algorithm grows exactly at this rate, sandwiched between two constants.">
    <rect x="30" y="510" width="740" height="100" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="50" y="535" fill="#e65100" font-size="13" class="title-text">Big Theta Notation (Theta) - Tight Bound</text>
    <text x="50" y="560" fill="#37474f" font-size="10" class="body-text">f(n) = Theta(g(n)) means f grows exactly as fast as g(n) - both O and Omega!</text>
    <text x="50" y="580" fill="#37474f" font-size="10" class="body-text">Formal: There exist c1, c2, n0 such that c1 times g(n) is less than or equal to f(n) is less than or equal to c2 times g(n).</text>
    <g transform="translate(50, 595)">
      <text x="0" y="0" fill="#e65100" font-size="11" class="formula">c1 times g(n) is less than or equal to f(n) is less than or equal to c2 times g(n)</text>
    </g>
    <g transform="translate(480, 520)">
      <path d="M0,50 Q30,40 60,25 Q80,15 100,10" fill="none" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="4,2" class="graph-line"/>
      <path d="M0,50 Q30,35 60,15 Q80,5 100,0" fill="none" stroke="#e65100" stroke-width="2.5" class="graph-line" style="animation-delay: 0.3s"/>
      <path d="M0,50 Q30,30 60,5 Q80,0 100,0" fill="none" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4,2" class="graph-line" style="animation-delay: 0.6s"/>
      <text x="10" y="70" fill="#388e3c" font-size="7">c1 times g</text>
      <text x="30" y="75" fill="#e65100" font-size="8">f(n)</text>
      <text x="60" y="70" fill="#1976d2" font-size="7">c2 times g</text>
    </g>
  </g>
  
  <!-- Step 6: Little o and Little omega -->
  <g class="step" id="step6" data-narration="Little o is strict upper bound (strictly slower), little omega is strict lower bound (strictly faster).">
    <rect x="30" y="625" width="740" height="85" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="650" fill="#7b1fa2" font-size="13" class="title-text">Little o and Little omega - Non-Tight Bounds</text>
    <g transform="translate(50, 665)">
      <rect x="0" y="0" width="280" height="30" rx="5" fill="#f3e5f5"/>
      <text x="10" y="20" fill="#7b1fa2" font-size="11" class="formula">f(n) = o(g(n))</text>
      <text x="140" y="20" fill="#455a64" font-size="9">Strict upper bound: f grows strictly slower</text>
    </g>
    <g transform="translate(360, 665)">
      <rect x="0" y="0" width="280" height="30" rx="5" fill="#fce4ec"/>
      <text x="10" y="20" fill="#c62828" font-size="11" class="formula">f(n) = omega(g(n))</text>
      <text x="140" y="20" fill="#455a64" font-size="9">Strict lower bound: f grows strictly faster</text>
    </g>
    <text x="50" y="715" fill="#78909c" font-size="9" class="body-text">Example: n = o(n squared) but n is not o(n) | n squared = omega(n) but n squared is not omega(n squared)</text>
  </g>
  
  <!-- Step 7: Properties -->
  <g class="step" id="step7" data-narration="Key properties: transitivity, reflexivity, and symmetry help manipulate and compare asymptotic bounds.">
    <rect x="30" y="725" width="740" height="85" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="750" fill="#1565c0" font-size="13" class="title-text">Properties of Asymptotic Notations</text>
    <g transform="translate(50, 770)">
      <rect x="0" y="0" width="160" height="25" rx="4" fill="#e3f2fd"/>
      <text x="80" y="16" text-anchor="middle" fill="#1565c0" font-size="9">Transitivity</text>
      <text x="165" y="16" fill="#455a64" font-size="8">O to O, Omega to Omega, Theta to Theta</text>
      <rect x="220" y="0" width="140" height="25" rx="4" fill="#e8f5e9"/>
      <text x="290" y="16" text-anchor="middle" fill="#2e7d32" font-size="9">Reflexivity</text>
      <text x="365" y="16" fill="#455a64" font-size="8">f = O(f)</text>
      <rect x="400" y="0" width="140" height="25" rx="4" fill="#fff3e0"/>
      <text x="470" y="16" text-anchor="middle" fill="#e65100" font-size="9">Symmetry</text>
      <text x="545" y="16" fill="#455a64" font-size="8">Theta to Theta</text>
      <rect x="570" y="0" width="160" height="25" rx="4" fill="#f3e5f5"/>
      <text x="650" y="16" text-anchor="middle" fill="#7b1fa2" font-size="9">Transpose Sym.</text>
      <text x="650" y="38" fill="#455a64" font-size="8">O to Omega</text>
    </g>
  </g>
  
  <!-- Step 8: Efficiency Classes Overview -->
  <g class="step" id="step8" data-narration="Common complexity classes from fastest to slowest: constant, logarithmic, linear, quadratic, exponential, factorial.">
    <rect x="30" y="825" width="740" height="105" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="850" fill="#1565c0" font-size="13" class="title-text">Basic Efficiency Classes (in order of growth)</text>
    <g transform="translate(50, 865)">
      <rect x="0" y="0" width="50" height="14" rx="3" fill="#4caf50"/>
      <text x="55" y="11" fill="#2e7d32" font-size="8" class="formula">O(1)</text>
      <text x="90" y="11" fill="#78909c" font-size="8">Constant</text>
      <rect x="160" y="0" width="70" height="14" rx="3" fill="#8bc34a"/>
      <text x="235" y="11" fill="#558b2f" font-size="8" class="formula">O(log n)</text>
      <text x="280" y="11" fill="#78909c" font-size="8">Logarithmic</text>
      <rect x="370" y="0" width="90" height="14" rx="3" fill="#cddc39"/>
      <text x="465" y="11" fill="#827717" font-size="8" class="formula">O(n)</text>
      <text x="500" y="11" fill="#78909c" font-size="8">Linear</text>
      <rect x="580" y="0" width="110" height="14" rx="3" fill="#ffeb3b"/>
      <text x="695" y="11" fill="#f9a825" font-size="8" class="formula">O(n log n)</text>
      <rect x="0" y="22" width="50" height="14" rx="3" fill="#ff9800"/>
      <text x="55" y="33" fill="#e65100" font-size="8" class="formula">O(n squared)</text>
      <text x="90" y="33" fill="#78909c" font-size="8">Quadratic</text>
      <rect x="160" y="22" width="70" height="14" rx="3" fill="#ff5722"/>
      <text x="235" y="33" fill="#bf360c" font-size="8" class="formula">O(n cubed)</text>
      <text x="280" y="33" fill="#78909c" font-size="8">Cubic</text>
      <rect x="370" y="22" width="90" height="14" rx="3" fill="#f44336"/>
      <text x="465" y="33" fill="#c62828" font-size="8" class="formula">O(2 to the n)</text>
      <text x="500" y="33" fill="#78909c" font-size="8">Exponential</text>
      <rect x="580" y="22" width="110" height="14" rx="3" fill="#9c27b0"/>
      <text x="695" y="33" fill="#6a1b9a" font-size="8" class="formula">O(n factorial)</text>
      <path d="M0,55 L720,55" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
      <text x="360" y="68" text-anchor="middle" fill="#607d8b" font-size="8">Increasing Growth Rate</text>
    </g>
  </g>
</svg>