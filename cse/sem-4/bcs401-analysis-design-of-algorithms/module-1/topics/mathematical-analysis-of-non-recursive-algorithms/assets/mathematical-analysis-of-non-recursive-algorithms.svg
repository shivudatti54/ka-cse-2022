<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1400">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffebee"/>
      <stop offset="100%" stop-color="#ffcdd2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes growBar {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .complexity-bar {
      transform-origin: left;
      animation: growBar 1s ease-out forwards;
    }
    .draw-path {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawLine 2s ease-out forwards;
    }
    .highlight {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
  
  <rect width="800" height="1400" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Mathematical Analysis of Non-Recursive Algorithms. This topic forms the foundation for evaluating algorithm efficiency in computer science.">
    <rect x="100" y="10" width="600" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="bold" fill="#1976d2">Mathematical Analysis of Non-Recursive Algorithms</text>
  </g>
  
  <g class="step" id="step1" data-narration="Algorithm analysis determines time and space resources required. It helps compare algorithms and select the most efficient solution for any given problem.">
    <rect x="50" y="65" width="700" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="90" font-size="13" font-weight="bold" fill="#388e3c">Why Algorithm Analysis?</text>
    <text x="70" y="110" font-size="11" fill="#2e7d32">• Compare algorithmic approaches objectively</text>
    <text x="70" y="128" font-size="11" fill="#2e7d32">• Predict performance on large datasets</text>
    <text x="400" y="110" font-size="11" fill="#2e7d32">• Scale efficiently with growing input sizes</text>
    <text x="400" y="128" font-size="11" fill="#2e7d32">• Critical for big data and machine learning</text>
  </g>
  
  <g class="step" id="step2" data-narration="Two fundamental concepts: Basic Operation - the most frequently executed operation, and Input Size (n) - the measure of data processed.">
    <rect x="50" y="160" width="340" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="185" font-size="13" font-weight="bold" fill="#ef6c00">Basic Operation</text>
    <text x="70" y="205" font-size="10" fill="#e65100">Most frequent operation that</text>
    <text x="70" y="220" font-size="10" fill="#e65100">dominates running time.</text>
    <text x="70" y="238" font-size="11" fill="#bf360c">Example: comparison in sorting</text>
    
    <rect x="410" y="160" width="340" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="430" y="185" font-size="13" font-weight="bold" fill="#7b1fa2">Input Size (n)</text>
    <text x="430" y="205" font-size="10" fill="#6a1b9a">Measure of data processed:</text>
    <text x="430" y="220" font-size="10" fill="#6a1b9a">• Array elements (sorting)</text>
    <text x="430" y="238" font-size="10" fill="#6a1b9a">• Matrix dimension or graph vertices</text>
  </g>
  
  <g class="step" id="step3" data-narration="Time complexity has three notations: Big-O (upper bound), Big-Omega (lower bound), and Big-Theta (tight bound) for expressing growth rates.">
    <rect x="50" y="255" width="700" height="115" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="280" font-size="14" font-weight="bold" fill="#1565c0">Asymptotic Notations</text>
    
    <rect x="70" y="295" width="200" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="170" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Big-O (Upper Bound)</text>
    <text x="170" y="335" text-anchor="middle" font-size="10" fill="#1565c0">f(n) = O(g(n))</text>
    <text x="170" y="348" text-anchor="middle" font-size="9" fill="#0d47a1">"At most" g(n)</text>
    
    <rect x="290" y="295" width="200" height="60" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="390" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Big-Ω (Lower Bound)</text>
    <text x="390" y="335" text-anchor="middle" font-size="10" fill="#2e7d32">f(n) = Ω(g(n))</text>
    <text x="390" y="348" text-anchor="middle" font-size="9" fill="#1b5e20">"At least" g(n)</text>
    
    <rect x="510" y="295" width="200" height="60" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="610" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#f57c00">Big-Θ (Tight Bound)</text>
    <text x="610" y="335" text-anchor="middle" font-size="10" fill="#ef6c00">f(n) = Θ(g(n))</text>
    <text x="610" y="348" text-anchor="middle" font-size="9" fill="#e65100">"Exactly" g(n)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Follow these four steps to analyze any non-recursive algorithm: identify basic operation, determine input size, set up summation, then solve it.">
    <rect x="50" y="380" width="700" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="405" font-size="14" font-weight="bold" fill="#2e7d32">Four Steps for Algorithm Analysis</text>
    
    <g class="highlight">
      <rect x="70" y="420" width="150" height="50" rx="5" fill="#c8e6c9"/>
      <text x="145" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Step 1</text>
      <text x="145" y="458" text-anchor="middle" font-size="9" fill="#2e7d32">Identify Basic Op</text>
    </g>
    <line x1="220" y1="445" x2="250" y2="445" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    
    <g class="highlight">
      <rect x="260" y="420" width="150" height="50" rx="5" fill="#c8e6c9"/>
      <text x="335" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Step 2</text>
      <text x="335" y="458" text-anchor="middle" font-size="9" fill="#2e7d32">Determine Input Size</text>
    </g>
    <line x1="410" y1="445" x2="440" y2="445" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    
    <g class="highlight">
      <rect x="450" y="420" width="150" height="50" rx="5" fill="#c8e6c9"/>
      <text x="525" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Step 3</text>
      <text x="525" y="458" text-anchor="middle" font-size="9" fill="#2e7d32">Set up Summation</text>
    </g>
    <line x1="600" y1="445" x2="630" y2="445" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    
    <g class="highlight">
      <rect x="640" y="420" width="100" height="50" rx="5" fill="#c8e6c9"/>
      <text x="690" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Step 4</text>
      <text x="690" y="458" text-anchor="middle" font-size="9" fill="#2e7d32">Solve It</text>
    </g>
  </g>
  
  <g class="step" id="step5" data-narration="Common complexity classes range from fastest O(1) constant to slowest O(n!) factorial time. Each class determines algorithm efficiency.">
    <rect x="50" y="490" width="700" height="115" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="515" font-size="14" font-weight="bold" fill="#e65100">Common Complexity Classes</text>
    
    <g>
      <rect x="70" y="530" width="80" height="12" fill="#4caf50" class="complexity-bar"/>
      <text x="80" y="540" font-size="8" fill="white">O(1) - Constant</text>
    </g>
    <g>
      <rect x="160" y="530" width="100" height="12" fill="#8bc34a" class="complexity-bar" style="animation-delay: 0.1s"/>
      <text x="170" y="540" font-size="8" fill="white">O(log n) - Log</text>
    </g>
    <g>
      <rect x="270" y="530" width="140" height="12" fill="#cddc39" class="complexity-bar" style="animation-delay: 0.2s"/>
      <text x="280" y="540" font-size="8" fill="#333">O(n) - Linear</text>
    </g>
    <g>
      <rect x="420" y="530" width="180" height="12" fill="#ffeb3b" class="complexity-bar" style="animation-delay: 0.3s"/>
      <text x="430" y="540" font-size="8" fill="#333">O(n log n) - Linearithmic</text>
    </g>
    <g>
      <rect x="610" y="530" width="130" height="12" fill="#ff9800" class="complexity-bar" style="animation-delay: 0.4s"/>
      <text x="620" y="540" font-size="8" fill="white">O(n²) - Quadratic</text>
    </g>
    
    <g>
      <rect x="70" y="555" width="130" height="12" fill="#ff5722" class="complexity-bar" style="animation-delay: 0.5s"/>
      <text x="80" y="565" font-size="8" fill="white">O(n³) - Cubic</text>
    </g>
    <g>
      <rect x="210" y="555" width="250" height="12" fill="#f44336" class="complexity-bar" style="animation-delay: 0.6s"/>
      <text x="220" y="565" font-size="8" fill="white">O(2ⁿ) - Exponential</text>
    </g>
    <g>
      <rect x="470" y="555" width="280" height="12" fill="#9c27b0" class="complexity-bar" style="animation-delay: 0.7s"/>
      <text x="480" y="565" font-size="8" fill="white">O(n!) - Factorial</text>
    </g>
    
    <text x="70" y="595" font-size="10" fill="#bf360c">Order: 1 &lt; log n &lt; n &lt; n log n &lt; n² &lt; n³ &lt; 2ⁿ &lt; n!</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example 1: Finding Maximum Element. Basic operation is comparison, runs n-1 times. Complexity: Θ(n) - Linear Time.">
    <rect x="50" y="615" width="700" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="640" font-size="14" font-weight="bold" fill="#1565c0">Example 1: Find Maximum Element</text>
    <text x="70" y="665" font-size="10" font-family="monospace" fill="#0d47a1">for i ← 1 to n-1 do</text>
    <text x="90" y="680" font-size="10" font-family="monospace" fill="#0d47a1">if A[i] > max then max ← A[i]</text>
    
    <rect x="400" y="655" width="340" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="570" y="675" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Analysis</text>
    <text x="570" y="695" text-anchor="middle" font-size="10" fill="#0d47a1">Basic Op: comparison (n-1 times)</text>
    <text x="570" y="710" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">T(n) = Θ(n) = O(n)</text>
  </g>
  
  <g class="step" id="step7" data-narration="Example 2: Matrix Addition. Two nested loops each run n times. Total operations = n². Complexity: Θ(n²) Quadratic Time.">
    <rect x="50" y="725" width="700" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="750" font-size="14" font-weight="bold" fill="#2e7d32">Example 2: Matrix Addition</text>
    <text x="70" y="775" font-size="10" font-family="monospace" fill="#1b5e20">for i ← 0 to n-1 do</text>
    <text x="90" y="790" font-size="10" font-family="monospace" fill="#1b5e20">for j ← 0 to n-1 do</text>
    <text x="110" y="805" font-size="10" font-family="monospace" fill="#1b5e20">C[i][j] ← A[i][j] + B[i][j]</text>
    
    <rect x="400" y="755" width="340" height="60" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="570" y="775" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Analysis</text>
    <text x="570" y="792" text-anchor="middle" font-size="10" fill="#1b5e20">Total = Σ(i=0 to n-1) Σ(j=0 to n-1) 1</text>
    <text x="570" y="810" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">= n × n = n² → Θ(n²)</text>
  </g>
  
  <g class="step" id="step8" data-narration="Example 3: Binary Search. Search space halves each iteration. After k steps: n/2ᵏ. Requires log₂ n iterations. Complexity: Θ(log n).">
    <rect x="50" y="835" width="700" height="100" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="860" font-size="14" font-weight="bold" fill="#7b1fa2">Example 3: Binary Search</text>
    <text x="70" y="885" font-size="10" font-family="monospace" fill="#4a148c">while left ≤ right do</text>
    <text x="90" y="900" font-size="10" font-family="monospace" fill="#4a148c">mid ← (left + right) / 2</text>
    <text x="90" y="915" font-size="10" font-family="monospace" fill="#4a148c">if A[mid] = key then return mid</text>
    
    <rect x="400" y="855" width="340" height="70" rx="6" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="570" y="875" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">Analysis</text>
    <text x="570" y="892" text-anchor="middle" font-size="10" fill="#4a148c">Search space halves each iteration</text>
    <text x="570" y="910" text-anchor="middle" font-size="10" fill="#4a148c">Need smallest k: n/2ᵏ &lt; 1 → 2ᵏ &gt; n</text>
    <text x="570" y="925" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">k = log₂ n → Θ(log n)</text>
  </g>
  
  <g class="step" id="step9" data-narration="Key summation formulas: arithmetic series Σi = n(n+1)/2, geometric series for r&gt;1, and nested loop sums for quadratic complexity.">
    <rect x="50" y="945" width="700" height="100" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="970" font-size="14" font-weight="bold" fill="#e65100">Important Summation Formulas</text>
    
    <rect x="70" y="985" width="320" height="50" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="120" y="1005" font-size="11" font-weight="bold" fill="#ef6c00">Arithmetic Series</text>
    <text x="230" y="1005" font-size="10" fill="#e65100">Σ(i=1 to n) i = n(n+1)/2 = Θ(n²)</text>
    <text x="150" y="1025" font-size="10" fill="#bf360c">Σ(i=1 to n) i² = n(n+1)(2n+1)/6 = Θ(n³)</text>
    
    <rect x="410" y="985" width="320" height="50" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="460" y="1005" font-size="11" font-weight="bold" fill="#ef6c00">Geometric Series (r &gt; 1)</text>
    <text x="570" y="1005" font-size="10" fill="#e65100">Σ(i=0 to n) rⁱ = (rⁿ⁺¹-1)/(r-1) = Θ(rⁿ)</text>
    <text x="500" y="1025" font-size="10" fill="#bf360c">Special: Σ(i=1 to n) 1 = n</text>
  </g>
  
  <g class="step" id="step10" data-narration="Space complexity measures memory requirements including input data and auxiliary space. It is crucial for memory-constrained environments and large-scale processing.">
    <rect x="50" y="1055" width="700" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="70" y="1080" font-size="14" font-weight="bold" fill="#c62828">Space Complexity</text>
    <text x="70" y="1105" font-size="11" fill="#b71c1c">Memory required as function of input size</text>
    <text x="70" y="1125" font-size="10" fill="#b71c1c">• Input data storage + Auxiliary space for temporary variables</text>
    
    <rect x="400" y="1085" width="340" height="45" rx="6" fill="#ffebee" stroke="#f44336"/>
    <text x="570" y="1105" text-anchor="middle" font-size="10" fill="#c62828">Examples:</text>
    <text x="570" y="1122" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">In-place: O(1) | Array: O(n) | Matrix: O(n²)</text>
  </g>
  
  <g class="step" id="step11" data-narration="university Exam Tips: Identify basic operation first, practice summation evaluation, understand when to use Big-O vs Big-Theta, and analyze nested loops carefully.">
    <rect x="50" y="1150" width="700" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="1175" font-size="14" font-weight="bold" fill="#1565c0">university Exam Tips &amp; Common Mistakes</text>
    
    <text x="70" y="1200" font-size="10" fill="#0d47a1">✓ Always identify basic operation first</text>
    <text x="70" y="1218" font-size="10" fill="#0d47a1">✓ Use Big-O for worst case, Big-Theta for tight bound</text>
    <text x="70" y="1236" font-size="10" fill="#0d47a1">✓ Practice arithmetic/geometric series sums</text>
    <text x="400" y="1200" font-size="10" fill="#0d47a1">✓ Drop constants: O(2n) = O(n)</text>
    <text x="400" y="1218" font-size="10" fill="#0d47a1">✓ Consider best/average/worst cases</text>
    <text x="400" y="1236" font-size="10" fill="#0d47a1">✗ Don't confuse O, Ω, and Θ notations</text>
  </g>
  
  <g class="step" id="step12" data-narration="Key Takeaway: Algorithm analysis enables efficient software design. Master the four-step method, understand complexity classes, and practice with examples to excel in university exams.">
    <rect x="50" y="1260" width="700" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="400" y="1285" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">Key Takeaways</text>
    <text x="400" y="1310" text-anchor="middle" font-size="11" fill="#1b5e20">• Algorithm analysis is essential for selecting efficient solutions</text>
    <text x="400" y="1330" text-anchor="middle" font-size="11" fill="#1b5e20">• Master the 4-step analysis: Basic Op → Input Size → Summation → Solve</text>
    <text x="400" y="1348" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Practice regularly to master algorithm analysis!</text>
  </g>
</svg>