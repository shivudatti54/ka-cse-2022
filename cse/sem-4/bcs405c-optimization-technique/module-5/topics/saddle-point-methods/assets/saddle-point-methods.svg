<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Saddle Point Methods are powerful techniques for approximating integrals with large parameters, widely used in engineering mathematics and physics applications for solving complex problems.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Saddle Point Methods</text>
  </g>
  
  <g class="step" id="step1" data-narration="Laplace's Method approximates integrals of the form ∫ exp(λf(x)) dx by expanding around the maximum point x₀, using local quadratic approximation for highly accurate results with large lambda.">
    <rect x="10" y="58" width="780" height="88" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="30" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">1. Laplace's Method</text>
    <text x="30" y="100" font-family="Arial" font-size="10" fill="#333">Approximates ∫ₐᵇ exp(λf(x)) dx by expanding f(x) around its maximum x₀</text>
    <text x="30" y="118" font-family="Arial" font-size="10" fill="#333">Formula: ∫ₐᵇ exp(λf(x)) dx ≈ exp(λf(x₀)) √(2π/(λ|f''(x₀)|))</text>
    <text x="30" y="136" font-family="Arial" font-size="9" fill="#666">Condition: f'(x₀)=0 (saddle point), f''(x₀)&lt;0 (maximum)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Gaussian integrals are foundational: ∫₋∞^∞ e^(-ax²) dx = √(π/a) for a > 0. This formula appears in nearly every saddle point problem and is essential for exams.">
    <rect x="10" y="154" width="780" height="88" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="30" y="176" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">2. Gaussian Integrals</text>
    <text x="30" y="196" font-family="Arial" font-size="10" fill="#333">Basic: ∫₋∞^∞ e^(-x²) dx = √π</text>
    <text x="30" y="214" font-family="Arial" font-size="10" fill="#333">General: ∫₋∞^∞ e^(-ax²) dx = √(π/a) for a &gt; 0</text>
    <text x="30" y="232" font-family="Arial" font-size="9" fill="#666">Shifted: ∫₋∞^∞ e^(-a(x-b)²) dx = √(π/a)</text>
  </g>
  
  <g class="step" id="step3" data-narration="Stirling's formula approximates factorials n! ≈ nⁿe^(-n)√(2πn) for large n, providing excellent accuracy. Even for n=10, the error is less than 1% in practice.">
    <rect x="10" y="250" width="780" height="88" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="30" y="272" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">3. Stirling's Approximation</text>
    <text x="30" y="292" font-family="Arial" font-size="10" fill="#333">Formula: n! ≈ nⁿe^(-n)√(2πn) for large n</text>
    <text x="30" y="310" font-family="Arial" font-size="10" fill="#333">Example: 10! ≈ 10¹⁰ × e⁻¹⁰ × √(20π) ≈ 3.598 × 10⁶</text>
    <text x="30" y="328" font-family="Arial" font-size="9" fill="#666">Exact: 3,628,800 (error ≈ 0.85%)</text>
  </g>
  
  <g class="step" id="step4" data-narration="The method of steepest descent handles oscillatory integrals by deforming the contour through saddle points in the direction of steepest descent to minimize the exponent.">
    <rect x="10" y="346" width="780" height="88" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="30" y="368" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">4. Method of Steepest Descent</text>
    <text x="30" y="388" font-family="Arial" font-size="10" fill="#333">For oscillatory integrals: ∫ f(x) e^(iλg(x)) dx</text>
    <text x="30" y="406" font-family="Arial" font-size="10" fill="#333">Key: Deform contour to pass through saddle points where g'(x)=0</text>
    <text x="30" y="424" font-family="Arial" font-size="9" fill="#666">Direction of steepest descent: imaginary part of exponent is constant</text>
  </g>
  
  <g class="step" id="step5" data-narration="The error function erf(x) has asymptotic form erfc(x) ≈ e^(-x²)/(x√π) for large x values, derived using saddle point techniques for accurate approximations.">
    <rect x="10" y="442" width="780" height="88" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="30" y="464" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">5. Error Function Approximation</text>
    <text x="30" y="484" font-family="Arial" font-size="10" fill="#333">Definition: erf(x) = (2/√π) ∫₀ˣ e^(-t²) dt</text>
    <text x="30" y="502" font-family="Arial" font-size="10" fill="#333">Complementary: erfc(x) = 1 - erf(x)</text>
    <text x="30" y="520" font-family="Arial" font-size="9" fill="#666">Asymptotic: erfc(x) ≈ e^(-x²)/(x√π) for large x</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam tips: identify saddle points with f'(x)=0, verify f''(x)<0 for maximum, distinguish interior from boundary maxima, and memorize the Gaussian integral formula for success.">
    <rect x="10" y="538" width="780" height="52" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="30" y="560" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Exam Tips</text>
    <text x="150" y="560" font-family="Arial" font-size="10" fill="#333">• Find saddle points: f'(x)=0</text>
    <text x="320" y="560" font-family="Arial" font-size="10" fill="#333">• Verify max: f''(x)&lt;0</text>
    <text x="470" y="560" font-family="Arial" font-size="10" fill="#333">• Interior vs boundary maxima</text>
    <text x="640" y="560" font-family="Arial" font-size="10" fill="#333">• Remember: √(π/a) formula</text>
  </g>
</svg>