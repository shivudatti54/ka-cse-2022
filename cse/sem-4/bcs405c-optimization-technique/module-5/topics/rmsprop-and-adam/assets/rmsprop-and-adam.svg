<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on RMSprop and Adam Optimizers, two powerful adaptive learning rate methods for training neural networks efficiently.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">RMSprop and Adam Optimizers</text>
  </g>
  
  <g class="step" id="step1" data-narration="Basic gradient descent updates parameters using a fixed learning rate: w equals w minus eta times the gradient. This can be slow and unstable.">
    <rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="30" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Gradient Descent Basics</text>
    <rect x="30" y="95" width="220" height="35" fill="#e3f2fd" rx="4"/>
    <text x="140" y="117" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">w = w - η × ∂L/∂w</text>
    <text x="270" y="80" font-family="Arial" font-size="11" fill="#666">Problem: Fixed learning rate causes oscillations</text>
    <text x="270" y="95" font-family="Arial" font-size="11" fill="#666">in high-curvature directions.</text>
  </g>
  
  <g class="step" id="step2" data-narration="RMSprop maintains an exponentially weighted average of squared gradients. It divides the learning rate by the root mean square of recent gradients.">
    <rect x="10" y="146" width="780" height="91" fill="#ffffff" stroke="#e8f5e9" stroke-width="2"/>
    <text x="30" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">RMSprop Algorithm</text>
    <rect x="30" y="183" width="340" height="35" fill="#e8f5e9" rx="4"/>
    <text x="200" y="205" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">E[g²] = β × E[g²] + (1-β) × g²</text>
    <rect x="385" y="183" width="340" height="35" fill="#e8f5e9" rx="4"/>
    <text x="555" y="205" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">Δw = -η × g / (√E[g²] + ε)</text>
    <text x="30" y="230" font-family="Arial" font-size="10" fill="#666">β=0.9 decay, ε=10⁻⁸ prevents division by zero</text>
  </g>
  
  <g class="step" id="step3" data-narration="Adam combines momentum with RMSprop by maintaining two moving averages: first moment m for velocity and second moment v for gradient variance.">
    <rect x="10" y="245" width="780" height="91" fill="#ffffff" stroke="#fff3e0" stroke-width="2"/>
    <text x="30" y="267" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Adam Algorithm - Dual Moments</text>
    <rect x="30" y="282" width="240" height="35" fill="#fff3e0" rx="4"/>
    <text x="150" y="304" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">m = β₁m + (1-β₁)g</text>
    <rect x="285" y="282" width="240" height="35" fill="#fff3e0" rx="4"/>
    <text x="405" y="304" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">v = β₂v + (1-β₂)g²</text>
    <rect x="540" y="282" width="240" height="35" fill="#fff3e0" rx="4"/>
    <text x="660" y="304" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Δw = -η × m̂/(√v̂ + ε)</text>
    <text x="30" y="329" font-family="Arial" font-size="10" fill="#666">β₁=0.9 momentum, β₂=0.999 squared gradient</text>
  </g>
  
  <g class="step" id="step4" data-narration="Adam includes bias correction to handle zero-initialized moments. It divides by one minus beta to the power of current timestep for accuracy.">
    <rect x="10" y="344" width="780" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2"/>
    <text x="30" y="366" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Bias Correction in Adam</text>
    <rect x="30" y="381" width="240" height="35" fill="#f3e5f5" rx="4"/>
    <text x="150" y="403" text-anchor="middle" font-family="Arial" font-size="11" fill="#9c27b0">m̂ = m / (1 - β₁ᵗ)</text>
    <rect x="285" y="381" width="240" height="35" fill="#f3e5f5" rx="4"/>
    <text x="405" y="403" text-anchor="middle" font-family="Arial" font-size="11" fill="#9c27b0">v̂ = v / (1 - β₂ᵗ)</text>
    <text x="540" y="381" font-family="Arial" font-size="10" fill="#666">Why needed: Zero init causes</text>
    <text x="540" y="396" font-family="Arial" font-size="10" fill="#666">small updates early in training</text>
  </g>
  
  <g class="step" id="step5" data-narration="RMSprop works well for RNNs and online learning, while Adam is the default for most deep learning tasks due to superior generalization.">
    <rect x="10" y="432" width="780" height="92" fill="#ffffff" stroke="#ffebee" stroke-width="2"/>
    <text x="30" y="454" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">RMSprop vs Adam Comparison</text>
    <rect x="30" y="469" width="345" height="35" fill="#e8f5e9" rx="4"/>
    <text x="202" y="491" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">RMSprop: Best for RNNs, online</text>
    <rect x="390" y="469" width="345" height="35" fill="#e3f2fd" rx="4"/>
    <text x="562" y="491" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">Adam: Default for deep networks</text>
    <text x="30" y="517" font-family="Arial" font-size="10" fill="#666">Both use per-parameter adaptive learning rates unlike vanilla SGD</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam points: Remember Adam default values, always include epsilon for stability, and understand that bias correction prevents slow initial learning.">
    <rect x="10" y="532" width="780" height="60" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="30" y="554" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Takeaways</text>
    <text x="30" y="572" font-family="Arial" font-size="10" fill="#666">Adam defaults: η=0.001, β₁=0.9, β₂=0.999, ε=10⁻⁸ | RMSprop: η=0.01, β=0.9</text>
  </g>
</svg>