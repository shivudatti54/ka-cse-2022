<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers essential gradient identities for machine learning, including sum, product, and chain rules plus common activation function derivatives.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Useful Identities for Computing Gradients</text>
  </g>
  
  <!-- step1: Basic Definitions and Sum Rule -->
  <g class="step" id="step1" data-narration="The gradient ∇ₓf is a vector of partial derivatives showing steepest ascent direction. The sum rule states gradient of a sum equals sum of gradients.">
    <rect x="30" y="58" width="740" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Basic Definition &amp; Sum Rule</text>
    <text x="50" y="98" font-family="Arial" font-size="10" fill="#333">Gradient: ∇ₓf = [∂f/∂x₁, ∂f/∂x₂, ..., ∂f/∂xₙ]ᵀ</text>
    <text x="50" y="115" font-family="Arial" font-size="10" fill="#333">Sum Rule: ∇ₓ[f(x) + g(x)] = ∇ₓf(x) + ∇ₓg(x)</text>
    <text x="50" y="132" font-family="Arial" font-size="10" fill="#333">Extends to: ∇ₓ[Σᵢ fᵢ(x)] = Σᵢ ∇ₓfᵢ(x)</text>
    <rect x="320" y="68" width="180" height="65" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="410" y="88" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Key Property</text>
    <text x="410" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Gradient points in</text>
    <text x="410" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">direction of steepest</text>
    <text x="410" y="131" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ascent (negative for descent)</text>
  </g>
  
  <!-- step2: Product Rule and Chain Rule -->
  <g class="step" id="step2" data-narration="Product rule: gradient of product equals g∇f + f∇g. Chain rule: ∇ₓz = Jᵀ·∇ᵧz where J is Jacobian, essential for backpropagation.">
    <rect x="30" y="151" width="740" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Product Rule &amp; Chain Rule</text>
    <text x="50" y="191" font-family="Arial" font-size="10" fill="#333">Product: ∇ₓ[f(x)g(x)] = g(x)∇ₓf(x) + f(x)∇ₓg(x)</text>
    <text x="50" y="208" font-family="Arial" font-size="10" fill="#333">Example: ∇(x²·sin(x)) = sin(x)·2x + x²·cos(x)</text>
    <text x="50" y="225" font-family="Arial" font-size="10" fill="#333">Chain: ∂z/∂x = (∂z/∂y)·(∂y/∂x) or ∇ₓz = Jᵀ·∇ᵧz</text>
    <rect x="320" y="161" width="200" height="65" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="420" y="181" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Backpropagation</text>
    <text x="420" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Chain rule enables computing</text>
    <text x="420" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">gradients through neural</text>
    <text x="420" y="230" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">network layers</text>
  </g>
  
  <!-- step3: Common Function Gradients -->
  <g class="step" id="step3" data-narration="Linear function aᵀx gradient is a. Quadratic form xᵀAx with symmetric A gives 2Ax. L2 norm ||x||² equals 2x and is always positive.">
    <rect x="30" y="244" width="740" height="98" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Common Function Gradients</text>
    <text x="50" y="284" font-family="Arial" font-size="10" fill="#333">Linear: ∇ₓ(aᵀx) = a</text>
    <text x="50" y="301" font-family="Arial" font-size="10" fill="#333">Quadratic: ∇ₓ(xᵀAx) = 2Ax (A symmetric)</text>
    <text x="50" y="318" font-family="Arial" font-size="10" fill="#333">L2 Norm: ∇ₓ||x||² = ∇ₓ(xᵀx) = 2x</text>
    <text x="50" y="335" font-family="Arial" font-size="10" fill="#333">Log/Exp: ∇log(x)=1/x, ∇exp(x)=exp(x)</text>
    <rect x="320" y="254" width="200" height="65" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="420" y="274" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Important Note</text>
    <text x="420" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">If A is not symmetric:</text>
    <text x="420" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">∇ₓ(xᵀAx) = (A + Aᵀ)x</text>
    <text x="420" y="327" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Always verify dimensions!</text>
  </g>
  
  <!-- step4: Activation Function Gradients -->
  <g class="step" id="step4" data-narration="Sigmoid derivative is σ(x)(1-σ(x)) computed efficiently from output. ReLU gradient is 1 for x>0, 0 for x<0, making computation simple.">
    <rect x="30" y="350" width="740" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Activation Function Gradients</text>
    <text x="50" y="390" font-family="Arial" font-size="10" fill="#333">Sigmoid: σ(x) = 1/(1+e⁻ˣ)</text>
    <text x="50" y="407" font-family="Arial" font-size="10" fill="#333">∇ₓσ(x) = σ(x)(1 - σ(x))</text>
    <text x="50" y="424" font-family="Arial" font-size="10" fill="#333">ReLU: f(x) = max(0, x) → ∇ = 1 if x>0, 0 if x<0</text>
    <rect x="320" y="360" width="200" height="65" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="420" y="380" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Sigmoid Trick</text>
    <text x="420" y="399" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Gradient expressed using</text>
    <text x="420" y="416" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">output only, avoiding</text>
    <text x="420" y="433" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">numerical issues</text>
  </g>
  
  <!-- step5: Jacobian, Hessian, and Softmax -->
  <g class="step" id="step5" data-narration="Jacobian generalizes gradient to vector functions capturing first derivatives. Hessian contains second derivatives for curvature information. Softmax gradient with cross-entropy simplifies elegantly to prediction error.">
    <rect x="30" y="443" width="740" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="463" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Jacobian, Hessian &amp; Softmax</text>
    <text x="50" y="483" font-family="Arial" font-size="10" fill="#333">Jacobian J: Matrix of first partials for f: ℝⁿ→ℝᵐ, each row is gradient of output component</text>
    <text x="50" y="500" font-family="Arial" font-size="10" fill="#333">Hessian H: Second-order partials, Jacobian of gradient, symmetric for scalar functions</text>
    <text x="50" y="517" font-family="Arial" font-size="10" fill="#333">Softmax: ∂softmax(z)ᵢ/∂zⱼ = softmax(z)ᵢ(δᵢⱼ - softmax(z)ⱼ)</text>
    <rect x="450" y="453" width="200" height="65" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="550" y="473" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Cross-Entropy + Softmax</text>
    <text x="550" y="492" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">∂L/∂zⱼ = softmax(z)ⱼ - yⱼ</text>
    <text x="550" y="509" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Simple prediction error!</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Key exam tips: memorize σ'(x)=σ(x)(1-σ(x)) and ∂L/∂z = ŷ-y for softmax. Always verify gradient dimensions match input dimensions for full credit.">
    <rect x="30" y="536" width="740" height="55" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="556" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips &amp; Common Mistakes</text>
    <text x="50" y="576" font-family="Arial" font-size="10" fill="#333">• Memorize: σ'(x)=σ(x)(1-σ(x)) and ∂L/∂z = ŷ - y for softmax</text>
    <text x="50" y="588" font-family="Arial" font-size="10" fill="#333">• Verify dimensions: ∇ₓf must match shape of x | Don't forget transpose in chain rule</text>
  </g>
</svg>