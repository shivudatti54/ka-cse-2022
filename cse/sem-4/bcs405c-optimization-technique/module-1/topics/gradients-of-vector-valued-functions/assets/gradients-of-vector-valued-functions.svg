<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The gradient is a vector of partial derivatives that points in the direction of steepest ascent for multivariable functions and represents the slope.">
    <rect x="0" y="0" width="800" height="48" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Gradients of Vector-Valued Functions</text>
  </g>
  
  <g class="step" id="step1" data-narration="The gradient vector contains partial derivatives with respect to each variable, generalizing the derivative to multivariable functions and their rates.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. The Gradient Vector</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">For f(x,y,z): ‚ąáf = (‚ąāf/‚ąāx, ‚ąāf/‚ąāy, ‚ąāf/‚ąāz) = </text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#333">The del operator: ‚ąá = (‚ąā/‚ąāx, ‚ąā/‚ąāy, ‚ąā/‚ąāz)</text>
    <rect x="280" y="90" width="120" height="40" fill="#e3f2fd" rx="3"/>
    <text x="340" y="115" text-anchor="middle" font-family="Arial" font-size="14" fill="#1976d2">‚ąáf</text>
  </g>
  
  <g class="step" id="step2" data-narration="The directional derivative measures the rate of change in any direction, computed as the dot product of gradient with a unit vector.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Directional Derivative</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#333">D_u f = ‚ąáf ¬∑ u = |‚ąáf| cos(őł)</text>
    <text x="40" y="208" font-family="Arial" font-size="10" fill="#666">where u is a unit vector, őł is angle between ‚ąáf and u</text>
    <rect x="250" y="180" width="200" height="35" fill="#e8f5e9" rx="3"/>
    <text x="350" y="203" text-anchor="middle" font-family="Arial" font-size="12" fill="#388e3c">Always normalize u first!</text>
  </g>
  
  <g class="step" id="step3" data-narration="The maximum rate of increase equals the gradient magnitude in the gradient direction; the minimum is its negative in the opposite direction.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Maximum &amp; Minimum Rates</text>
    <text x="40" y="276" font-family="Arial" font-size="11" fill="#333">Maximum increase: |‚ąáf| in direction of ‚ąáf</text>
    <text x="40" y="296" font-family="Arial" font-size="11" fill="#333">Minimum increase: -|‚ąáf| opposite to ‚ąáf</text>
    <circle cx="580" cy="274" r="35" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="580" y="270" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">max = |‚ąáf|</text>
    <text x="580" y="286" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">min = -|‚ąáf|</text>
  </g>
  
  <g class="step" id="step4" data-narration="Gradient operations follow linearity, product rule, and chain rule, enabling efficient computation of complex multivariable derivatives and simplifying calculus problems.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Gradient Properties</text>
    <text x="40" y="364" font-family="Arial" font-size="10" fill="#333">Linearity: ‚ąá(af + bg) = a‚ąáf + b‚ąág</text>
    <text x="40" y="380" font-family="Arial" font-size="10" fill="#333">Product Rule: ‚ąá(fg) = f‚ąág + g‚ąáf</text>
    <text x="280" y="364" font-family="Arial" font-size="10" fill="#333">Chain Rule:</text>
    <text x="280" y="380" font-family="Arial" font-size="10" fill="#333">d/dt[f(x(t))] = ‚ąáf ¬∑ r'(t)</text>
    <rect x="450" y="350" width="300" height="40" fill="#f3e5f5" rx="3"/>
    <text x="600" y="375" text-anchor="middle" font-family="Arial" font-size="11" fill="#9c27b0">Essential for simplifying computations</text>
  </g>
  
  <g class="step" id="step5" data-narration="For vector-valued functions mapping to multiple dimensions, the gradient generalizes to a Jacobian matrix of all partial derivatives that captures their rates.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. Jacobian Matrix (Vector-Valued)</text>
    <text x="40" y="452" font-family="Arial" font-size="11" fill="#333">For F: ‚ĄĚ‚ĀŅ ‚Üí ‚ĄĚŠĶź, Jacobian J = [‚ąāFŠĶĘ/‚ąāx‚Īľ]</text>
    <text x="40" y="472" font-family="Arial" font-size="11" fill="#333">For F(x,y) = ‚ü®P,Q‚ü©: J = [‚ąāP/‚ąāx ‚ąāP/‚ąāy; ‚ąāQ/‚ąāx ‚ąāQ/‚ąāy]</text>
    <rect x="450" y="440" width="300" height="35" fill="#ffebee" rx="3"/>
    <text x="600" y="462" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">Generalization of gradient to vectors</text>
  </g>
  
  <g class="step" id="step6" data-narration="The gradient is always perpendicular to level curves, a key geometric property used in optimization and path planning algorithms across applications.">
    <rect x="20" y="498" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">6. Level Curves &amp; Example</text>
    <text x="40" y="540" font-family="Arial" font-size="10" fill="#333">Gradient ‚üā level curves: ‚ąáf is normal to f(x,y) = constant</text>
    <text x="40" y="560" font-family="Arial" font-size="10" fill="#333">Example: f(x,y)=x¬≤+y¬≤, ‚ąáf = (2x,2y), at (1,1): ‚ąáf = (2,2)</text>
    <text x="40" y="578" font-family="Arial" font-size="10" fill="#666">Level curves: concentric circles | direction of gradient</text>
    <ellipse cx="620" cy="540" rx="45" ry="30" fill="none" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4,2"/>
    <ellipse cx="620" cy="540" rx="70" ry="45" fill="none" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="620" y1="540" x2="665" y2="520" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="630" y="515" font-family="Arial" font-size="9" fill="#ff9800">‚ąáf</text>
  </g>
</svg>