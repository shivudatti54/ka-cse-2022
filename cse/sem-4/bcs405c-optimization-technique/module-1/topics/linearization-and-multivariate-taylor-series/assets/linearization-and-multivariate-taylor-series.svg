<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Linearization and Multivariate Taylor Series - Essential mathematical techniques for approximating complex nonlinear functions using tangent lines and higher-order polynomial expansions in calculus.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Linearization and Multivariate Taylor Series</text>
  </g>
  
  <g class="step" id="step1" data-narration="Linearization approximates a function near a point using its tangent line. For f(x) near x=a, the linear approximation formula is L(x) = f(a) + f'(a)(x-a).">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">1. Linearization Concept</text>
    <rect x="40" y="90" width="350" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="110" font-family="Arial" font-size="11" fill="#333">Single-variable: L(x) = f(a) + f'(a)(x-a)</text>
    <text x="50" y="125" font-family="Arial" font-size="10" fill="#666">Geometrically: tangent line at (a, f(a))</text>
    <rect x="410" y="90" width="350" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="420" y="110" font-family="Arial" font-size="11" fill="#333">Differential form: dy = f'(a)dx</text>
    <text x="420" y="125" font-family="Arial" font-size="10" fill="#666">For small changes in input</text>
  </g>
  
  <g class="step" id="step2" data-narration="Multivariate Taylor Series extends single-variable concepts to functions of two variables f(x,y), using partial derivatives fₓ and fᵧ at the expansion point (a,b).">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">2. Multivariate Taylor Series</text>
    <rect x="40" y="180" width="720" height="38" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="198" font-family="Courier New" font-size="10" fill="#333">f(x,y) = f(a,b) + fₓ(a,b)(x-a) + fᵧ(a,b)(y-b) + higher order terms</text>
    <text x="50" y="215" font-family="Arial" font-size="10" fill="#666">First-order: linear approximation in two dimensions using partial derivatives</text>
  </g>
  
  <g class="step" id="step3" data-narration="The second-order bivariate Taylor expansion includes mixed partial derivatives fₓᵧ, providing significantly better accuracy than first-order linearization for approximating curved surfaces and nonlinear behavior.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ef6c00">3. Second-Order Bivariate Expansion</text>
    <rect x="40" y="268" width="720" height="38" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="50" y="286" font-family="Courier New" font-size="9" fill="#333">f(x,y) ≈ f(a,b) + fₓ(x-a) + fᵧ(y-b) + ½[fₓₓ(x-a)² + 2fₓᵧ(x-a)(y-b) + fᵧᵧ(y-b)²]</text>
    <text x="50" y="305" font-family="Arial" font-size="10" fill="#666">Includes second derivatives: fₓₓ, fₓᵧ, fᵧᵧ - captures curvature</text>
  </g>
  
  <g class="step" id="step4" data-narration="Example: For f(x,y)=eˣcos(y) expanded about origin (0,0), we calculate f(0,0)=1, first partials fₓ=1 and fᵧ=0, and second partials fₓₓ=1, fₓᵧ=0, fᵧᵧ=-1 for the approximation.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">4. Example: eˣcos(y) at Origin</text>
    <rect x="40" y="356" width="230" height="38" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="50" y="372" font-family="Arial" font-size="10" fill="#333">Given: f(x,y)=eˣcos(y)</text>
    <text x="50" y="387" font-family="Arial" font-size="10" fill="#666">At (0,0): f=1, fₓ=1, fᵧ=0</text>
    <rect x="280" y="356" width="230" height="38" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="290" y="372" font-family="Arial" font-size="10" fill="#333">Second derivatives:</text>
    <text x="290" y="387" font-family="Arial" font-size="10" fill="#666">fₓₓ=1, fₓᵧ=0, fᵧᵧ=-1</text>
    <rect x="520" y="356" width="240" height="38" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="530" y="370" font-family="Arial" font-size="10" fill="#333">Result:</text>
    <text x="530" y="385" font-family="Courier New" font-size="10" fill="#333">f ≈ 1 + x + ½(x² - y²)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Linearization enables error analysis. For volume V=s³ with side error ds=0.1 at s=5, the estimated volume error is dV = 3(5)²(0.1) = ±7.5 cm³.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">5. Error Estimation Application</text>
    <rect x="40" y="444" width="340" height="38" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="460" font-family="Arial" font-size="11" fill="#333">Volume: V = s³, Error: dV = 3s²ds</text>
    <text x="50" y="476" font-family="Arial" font-size="10" fill="#666">At s=5, ds=±0.1 → dV = ±7.5 cm³</text>
    <rect x="400" y="444" width="360" height="38" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="410" y="460" font-family="Arial" font-size="11" fill="#333">Relative error: 7.5/125 = 6%</text>
    <text x="410" y="476" font-family="Arial" font-size="10" fill="#666">2% measurement error → 6% volume error</text>
  </g>
  
  <g class="step" id="step6" data-narration="The Jacobian matrix J contains first-order partial derivatives of vector-valued functions, generalizing the derivative concept for system linearization in numerical methods.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">6. Jacobian Matrix</text>
    <rect x="40" y="534" width="260" height="46" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="550" font-family="Arial" font-size="10" fill="#333">For F(x) = [f₁, f₂, ..., fₘ]ᵀ</text>
    <text x="50" y="566" font-family="Courier New" font-size="10" fill="#333">J = [∂fᵢ/∂xⱼ] for i=1..m, j=1..n</text>
    <rect x="310" y="534" width="240" height="46" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="320" y="550" font-family="Arial" font-size="10" fill="#333">Role in Numerical Methods:</text>
    <text x="320" y="566" font-family="Arial" font-size="10" fill="#666">Essential for Newton's method in multiple dimensions</text>
    <rect x="560" y="534" width="200" height="46" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="570" y="550" font-family="Arial" font-size="10" fill="#333">Key Takeaway:</text>
    <text x="570" y="566" font-family="Arial" font-size="10" fill="#666">Linearization = 1st-order Taylor polynomial</text>
  </g>
</svg>