<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="We study differentiation and partial differentials for functions with multiple variables. This includes partial derivatives, total differentials, and important theorems like Clairaut's and Euler's.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Differentiation and Partial Differentials</text>
  </g>
  
  <g class="step" id="step1" data-narration="A function z equals f of x,y maps ordered pairs to real numbers. Level curves show where f equals constant values.">
    <rect x="30" y="58" width="740" height="80" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Functions of Several Variables</text>
    <rect x="50" y="95" width="340" height="35" rx="4" fill="#e3f2fd"/>
    <text x="60" y="112" font-family="Arial" font-size="10" fill="#333">z = f(x, y)</text>
    <text x="60" y="124" font-family="Arial" font-size="9" fill="#666">maps (x, y) ∈ D ⊆ ℝ² → ℝ</text>
    <rect x="410" y="95" width="340" height="35" rx="4" fill="#e3f2fd"/>
    <text x="420" y="112" font-family="Arial" font-size="10" fill="#333">Level Curves</text>
    <text x="420" y="124" font-family="Arial" font-size="9" fill="#666">set of points where f(x,y) = c</text>
  </g>
  
  <g class="step" id="step2" data-narration="Partial derivative ∂f/∂x treats y as constant while differentiating with respect to x. Similarly ∂f/∂y treats x as constant and computes the rate of change in the y direction.">
    <rect x="30" y="146" width="740" height="80" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">2. Partial Derivatives</text>
    <rect x="50" y="185" width="220" height="35" rx="4" fill="#e3f2fd"/>
    <text x="60" y="202" font-family="Arial" font-size="10" fill="#333">∂f/∂x = lim[h→0] (f(x+h,y) - f(x,y))/h</text>
    <text x="60" y="214" font-family="Arial" font-size="9" fill="#666">treat y as constant</text>
    <rect x="290" y="185" width="220" height="35" rx="4" fill="#e3f2fd"/>
    <text x="300" y="202" font-family="Arial" font-size="10" fill="#333">∂f/∂y = lim[k→0] (f(x,y+k) - f(x,y))/k</text>
    <text x="300" y="214" font-family="Arial" font-size="9" fill="#666">treat x as constant</text>
  </g>
  
  <g class="step" id="step3" data-narration="Higher order partial derivatives include f_xx, f_yy, f_xy, and f_yx. Clairaut's Theorem states that f_xy equals f_yx when both mixed partial derivatives are continuous.">
    <rect x="30" y="234" width="740" height="80" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">3. Higher Order Derivatives &amp; Clairaut's Theorem</text>
    <rect x="50" y="275" width="150" height="30" rx="4" fill="#e8f5e9"/>
    <text x="60" y="290" font-family="Arial" font-size="10" fill="#333">f_xx = ∂²f/∂x²</text>
    <rect x="210" y="275" width="150" height="30" rx="4" fill="#e8f5e9"/>
    <text x="220" y="290" font-family="Arial" font-size="10" fill="#333">f_yy = ∂²f/∂y²</text>
    <rect x="370" y="275" width="150" height="30" rx="4" fill="#e8f5e9"/>
    <text x="380" y="290" font-family="Arial" font-size="10" fill="#333">f_xy = ∂²f/∂x∂y</text>
    <rect x="530" y="275" width="220" height="30" rx="4" fill="#fff3e0"/>
    <text x="540" y="290" font-family="Arial" font-size="10" fill="#333">Clairaut's: f_xy = f_yx (if continuous)</text>
  </g>
  
  <g class="step" id="step4" data-narration="For z equals f of x,y, the total differential dz equals partial f partial x times dx plus partial f partial y times dy, giving linear approximation near a point.">
    <rect x="30" y="322" width="740" height="88" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">4. Total Differential</text>
    <rect x="50" y="365" width="350" height="30" rx="4" fill="#f3e5f5"/>
    <text x="60" y="380" font-family="Arial" font-size="12" fill="#333">dz = (∂f/∂x)dx + (∂f/∂y)dy</text>
    <text x="420" y="380" font-family="Arial" font-size="10" fill="#666">for z = f(x, y)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Chain rule expresses dz/dt as partial z partial x times dx/dt plus partial z partial y times dy/dt. The Jacobian determinant measures local area scaling in transformations.">
    <rect x="30" y="418" width="740" height="80" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="440" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">5. Chain Rule &amp; Jacobian</text>
    <rect x="50" y="463" width="340" height="30" rx="4" fill="#fff3e0"/>
    <text x="60" y="478" font-family="Arial" font-size="10" fill="#333">dz/dt = (∂z/∂x)(dx/dt) + (∂z/∂y)(dy/dt)</text>
    <rect x="410" y="463" width="340" height="30" rx="4" fill="#fff3e0"/>
    <text x="420" y="478" font-family="Arial" font-size="10" fill="#333">J = ∂(x,y)/∂(u,v) = |∂x/∂u ∂x/∂v; ∂y/∂u ∂y/∂v|</text>
  </g>
  
  <g class="step" id="step6" data-narration="Euler's theorem states x times partial f partial x plus y times partial f partial y equals n times f for homogeneous functions of degree n. Taylor series provides local approximation.">
    <rect x="30" y="506" width="740" height="90" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Euler's Theorem &amp; Taylor's Series</text>
    <rect x="50" y="548" width="320" height="40" rx="4" fill="#ffebee"/>
    <text x="60" y="563" font-family="Arial" font-size="10" fill="#333">Euler's: x·∂f/∂x + y·∂f/∂y = n·f</text>
    <text x="60" y="578" font-family="Arial" font-size="9" fill="#666">for homogeneous f of degree n</text>
    <rect x="390" y="548" width="360" height="40" rx="4" fill="#ffebee"/>
    <text x="400" y="563" font-family="Arial" font-size="10" fill="#333">Taylor: f(x+h,y+k) ≈ f + h·f_x + k·f_y + ½(h²f_xx + 2hkf_xy + k²f_yy)</text>
  </g>
</svg>