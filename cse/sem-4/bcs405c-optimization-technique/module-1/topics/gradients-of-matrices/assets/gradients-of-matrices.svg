<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Matrix gradients are matrices of partial derivatives used for optimization in machine learning and deep learning algorithms across neural networks and beyond.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Gradients of Matrices</text>
  </g>
  
  <g class="step" id="step1" data-narration="The gradient of scalar function f with respect to matrix X is matrix of partial derivatives: ∇ₓf equals the matrix containing all ∂f/∂xᵢⱼ terms.">
    <rect x="20" y="58" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Definition: Matrix Gradient</text>
    <rect x="40" y="88" width="720" height="45" fill="#e3f2fd" rx="3"/>
    <text x="50" y="108" font-family="Arial" font-size="11" fill="#333">∇ₓf = ∂f/∂X = [∂f/∂xᵢⱼ]</text>
    <text x="50" y="125" font-family="Arial" font-size="10" fill="#666">Result is m×n matrix matching dimensions of X</text>
  </g>
  
  <g class="step" id="step2" data-narration="For quadratic form xᵀAx, the gradient equals (A plus Aᵀ) times x, which simplifies to 2Ax when matrix A is symmetric.">
    <rect x="20" y="151" width="760" height="85" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="171" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Gradient of Quadratic Forms</text>
    <rect x="40" y="181" width="350" height="45" fill="#e8f5e9" rx="3"/>
    <text x="50" y="200" font-family="Arial" font-size="11" fill="#333">∇ₓ(xᵀAx) = (A + Aᵀ)x</text>
    <text x="50" y="217" font-family="Arial" font-size="10" fill="#666">General case</text>
    <rect x="410" y="181" width="350" height="45" fill="#e8f5e9" rx="3"/>
    <text x="420" y="200" font-family="Arial" font-size="11" fill="#333">∇ₓ(xᵀAx) = 2Ax</text>
    <text x="420" y="217" font-family="Arial" font-size="10" fill="#666">When A is symmetric</text>
  </g>
  
  <g class="step" id="step3" data-narration="Matrix gradients follow linearity, product rule, and chain rule properties, similar to scalar calculus but require careful handling of matrix dimensions to consider.">
    <rect x="20" y="244" width="760" height="85" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="264" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Properties of Matrix Gradients</text>
    <rect x="40" y="274" width="230" height="45" fill="#fff3e0" rx="3"/>
    <text x="50" y="293" font-family="Arial" font-size="10" fill="#333">∇ₓ(af + bg) = a∇ₓf + b∇ₓg</text>
    <text x="50" y="308" font-family="Arial" font-size="9" fill="#666">Linearity</text>
    <rect x="280" y="274" width="230" height="45" fill="#fff3e0" rx="3"/>
    <text x="290" y="293" font-family="Arial" font-size="10" fill="#333">∇ₓ(gh) = g∇ₓh + h∇ₓg</text>
    <text x="290" y="308" font-family="Arial" font-size="9" fill="#666">Product Rule</text>
    <rect x="520" y="274" width="240" height="45" fill="#fff3e0" rx="3"/>
    <text x="530" y="293" font-family="Arial" font-size="10" fill="#333">∇ₓf = (∇ᵧh)ᵀ ∇ₓY</text>
    <text x="530" y="308" font-family="Arial" font-size="9" fill="#666">Chain Rule</text>
  </g>
  
  <g class="step" id="step4" data-narration="Key trace-gradient formulas include gradient of tr(AX) equals Aᵀ, and gradient of tr(AXᵀB) equals AB - these relationships are essential for matrix calculus in optimization.">
    <rect x="20" y="337" width="760" height="85" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Trace and Gradient Relationships</text>
    <rect x="40" y="367" width="220" height="45" fill="#f3e5f5" rx="3"/>
    <text x="50" y="386" font-family="Arial" font-size="11" fill="#333">∇ₓ(tr(AX)) = Aᵀ</text>
    <text x="50" y="402" font-family="Arial" font-size="9" fill="#666">Simple case</text>
    <rect x="270" y="367" width="240" height="45" fill="#f3e5f5" rx="3"/>
    <text x="280" y="386" font-family="Arial" font-size="10" fill="#333">∇ₓ(tr(XᵀAX)) = 2AX</text>
    <text x="280" y="402" font-family="Arial" font-size="9" fill="#666">When A is symmetric</text>
    <rect x="520" y="367" width="240" height="45" fill="#f3e5f5" rx="3"/>
    <text x="530" y="386" font-family="Arial" font-size="10" fill="#333">∇ₓ(tr(AXᵀB)) = AB</text>
    <text x="530" y="402" font-family="Arial" font-size="9" fill="#666">Product of matrices</text>
  </g>
  
  <g class="step" id="step5" data-narration="The Jacobian generalizes derivatives to vector-valued functions mapping from ℝⁿ to ℝᵐ, while the Hessian matrix contains second-order partial derivatives critical for optimization problems.">
    <rect x="20" y="430" width="760" height="85" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="450" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Jacobian and Hessian Matrices</text>
    <rect x="40" y="460" width="350" height="45" fill="#ffebee" rx="3"/>
    <text x="50" y="479" font-family="Arial" font-size="11" fill="#333">Jacobian: Jᵢⱼ = ∂fᵢ/∂xⱼ</text>
    <text x="50" y="495" font-family="Arial" font-size="9" fill="#666">Vector-valued functions f: ℝⁿ → ℝᵐ</text>
    <rect x="410" y="460" width="350" height="45" fill="#ffebee" rx="3"/>
    <text x="420" y="479" font-family="Arial" font-size="11" fill="#333">Hessian: Hᵢⱼ = ∂²f/∂xᵢ∂xⱼ</text>
    <text x="420" y="495" font-family="Arial" font-size="9" fill="#666">Symmetric, determines critical points</text>
  </g>
  
  <g class="step" id="step6" data-narration="Matrix gradients enable gradient descent optimization, where we move opposite to the gradient to minimize functions in machine learning algorithms.">
    <rect x="20" y="523" width="760" height="65" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="543" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Application: Gradient Descent</text>
    <rect x="40" y="553" width="720" height="28" fill="#e3f2fd" rx="3"/>
    <text x="50" y="572" font-family="Arial" font-size="11" fill="#333">x_new = x_old - η∇ₓf</text>
    <text x="580" y="572" font-family="Arial" font-size="10" fill="#666">η = learning rate</text>
  </g>
</svg>