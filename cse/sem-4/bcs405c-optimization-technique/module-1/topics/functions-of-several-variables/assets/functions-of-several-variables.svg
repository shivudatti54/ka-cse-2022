<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Functions of Several Variables extends single-variable calculus to multivariable functions, essential for engineering, physics, optimization, and mathematical modeling in various applications.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Functions of Several Variables</text>
  </g>
  
  <g class="step" id="step1" data-narration="A function maps n-tuples to a real number. Example f(x,y)=x²+y² defines a surface in 3D space with level curves as alternatives.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Functions of Several Variables</text>
    <rect x="40" y="95" width="200" height="38" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="50" y="112" font-family="Arial" font-size="10" fill="#333">f(x,y) = x² + y²</text>
    <text x="50" y="126" font-family="Arial" font-size="9" fill="#666">Domain: ℝ², Range: [0,∞)</text>
    <text x="260" y="95" font-family="Arial" font-size="10" fill="#333"><tspan x="260" dy="0">• Maps ℝⁿ → ℝ</tspan><tspan x="260" dy="14">• Represented as surfaces</tspan><tspan x="260" dy="14">• Level curves (contour lines)</tspan></text>
  </g>
  
  <g class="step" id="step2" data-narration="Partial derivative ∂f/∂x measures rate of change in x-direction while treating y as constant. Notation uses ∂ not d for partial derivatives.">
    <rect x="20" y="152" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="174" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Partial Derivatives</text>
    <rect x="40" y="190" width="320" height="35" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="50" y="208" font-family="Arial" font-size="10" fill="#333">∂f/∂x = lim(h→0) [f(x+h,y) - f(x,y)]/h</text>
    <text x="380" y="190" font-family="Arial" font-size="10" fill="#333"><tspan x="380" dy="0">∂f/∂y = lim(h→0) [f(x,y+h) - f(x,y)]/h</tspan><tspan x="380" dy="14">Higher order: ∂²f/∂x², ∂²f/∂x∂y</tspan><tspan x="380" dy="14">Clairaut: ∂²f/∂x∂y = ∂²f/∂y∂x</tspan></text>
  </g>
  
  <g class="step" id="step3" data-narration="The Jacobian matrix contains all first-order partial derivatives arranged in a matrix. For scalar functions it becomes gradient vector ∇f, crucial for transformations and solving systems of equations.">
    <rect x="20" y="240" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="262" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Jacobian Matrix</text>
    <rect x="40" y="278" width="250" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="4"/>
    <text x="50" y="298" font-family="Arial" font-size="10" fill="#333">J = [∂fᵢ/∂xⱼ]  (m×n matrix)</text>
    <text x="310" y="262" font-family="Arial" font-size="10" fill="#333"><tspan x="310" dy="0">For f(x,y): ∇f = (∂f/∂x, ∂f/∂y)</tspan><tspan x="310" dy="14">Jacobian determinant for variable transform</tspan><tspan x="310" dy="14">Nonzero → inverse function exists (local)</tspan></text>
  </g>
  
  <g class="step" id="step4" data-narration="Chain rule for multivariable functions generalizes single-variable derivative rules. Formula ∂z/∂u = ∂f/∂x·∂x/∂u + ∂f/∂y·∂y/∂u requires careful identification of all intermediate variables and their dependencies.">
    <rect x="20" y="328" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="350" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Chain Rule</text>
    <rect x="40" y="366" width="680" height="35" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="50" y="378" font-family="Arial" font-size="10" fill="#333">z = f(x,y), x = g(u,v), y = h(u,v)</text>
    <text x="50" y="392" font-family="Arial" font-size="10" fill="#333">∂z/∂u = ∂f/∂x·∂x/∂u + ∂f/∂y·∂y/∂u</text>
    <text x="280" y="378" font-family="Arial" font-size="10" fill="#333">∂z/∂v = ∂f/∂x·∂x/∂v + ∂f/∂y·∂y/∂v</text>
  </g>
  
  <g class="step" id="step5" data-narration="Taylor's expansion approximates f(x,y) near point (a,b) using first and second-order terms with partial derivatives at the expansion point, enabling local polynomial approximation and numerical computation methods.">
    <rect x="20" y="416" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="438" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. Taylor's Series (Two Variables)</text>
    <rect x="40" y="454" width="700" height="35" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="50" y="466" font-family="Arial" font-size="10" fill="#333">f(x,y) ≈ f(a,b) + fₓ(x-a) + fᵧ(y-b) + ½[fₓₓ(x-a)² + 2fₓᵧ(x-a)(y-b) + fᵧᵧ(y-b)²]</text>
    <text x="40" y="490" font-family="Arial" font-size="9" fill="#666">Used for local approximation, numerical methods, and optimization near critical points</text>
  </g>
  
  <g class="step" id="step6" data-narration="Critical points satisfy ∂f/∂x = ∂f/∂y = 0. Use Hessian D = fₓₓfᵧᵧ - fₓᵧ² to classify: D>0 max/min, D<0 saddle, D=0 inconclusive.">
    <rect x="20" y="504" width="760" height="85" fill="#e3f2fd" rx="8"/>
    <text x="40" y="526" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">6. Maxima and Minima</text>
    <rect x="40" y="542" width="160" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="50" y="555" font-family="Arial" font-size="10" fill="#333">Critical Point:</text>
    <text x="50" y="570" font-family="Arial" font-size="9" fill="#333">∂f/∂x = 0, ∂f/∂y = 0</text>
    <rect x="220" y="542" width="300" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="230" y="555" font-family="Arial" font-size="10" fill="#333">Hessian: D = fₓₓfᵧᵧ - (fₓᵧ)²</text>
    <text x="230" y="570" font-family="Arial" font-size="9" fill="#333">D>0, fₓₓ&lt;0: max | D>0, fₓₓ>0: min | D&lt;0: saddle</text>
  </g>
</svg>