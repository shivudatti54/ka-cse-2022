<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Emotional impact refers to feelings users experience during product interaction. It directly influences satisfaction, engagement, and loyalty in digital products.">
<rect x="10" y="10" width="780" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Emotional Impact in User Experience</text>
</g>

<g class="step" id="step1" data-narration="Don Norman's Three Levels include visceral for instant reactions, behavioral for usability feelings, and reflective for long-term emotional connections with users.">
<rect x="10" y="58" width="780" height="95" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="30" y="75" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Norman&apos;s Three Levels of Design</text>
<rect x="30" y="85" width="240" height="60" rx="5" fill="#c8e6c9"/>
<text x="150" y="100" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">VISERAL</text>
<text x="150" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Immediate reactions</text>
<text x="150" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">(colors, shapes, sounds)</text>
<rect x="280" y="85" width="240" height="60" rx="5" fill="#c8e6c9"/>
<text x="400" y="100" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">BEHAVIORAL</text>
<text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Feelings from usability</text>
<text x="400" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">(performance, function)</text>
<rect x="530" y="85" width="240" height="60" rx="5" fill="#c8e6c9"/>
<text x="650" y="100" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">REFLECTIVE</text>
<text x="650" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Long-term connections</text>
<text x="650" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">(personal meaning)</text>
</g>

<g class="step" id="step2" data-narration="The PAD model measures emotions through Pleasure, Arousal, and Dominance. Affective computing uses AI to detect emotions while microinteractions create engagement.">
<rect x="10" y="161" width="780" height="95" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="30" y="178" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">Key Frameworks &amp; Concepts</text>
<rect x="30" y="190" width="175" height="58" rx="5" fill="#ffe0b2"/>
<text x="117" y="205" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">PAD Model</text>
<text x="117" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">P + A + D = Emotion</text>
<text x="117" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Pleasure, Arousal</text>
<rect x="215" y="190" width="175" height="58" rx="5" fill="#ffe0b2"/>
<text x="302" y="205" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Affective Computing</text>
<text x="302" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">AI detects emotions</text>
<text x="302" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">sentiment analysis</text>
<rect x="400" y="190" width="175" height="58" rx="5" fill="#ffe0b2"/>
<text x="487" y="205" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Microinteractions</text>
<text x="487" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Small design moments</text>
<text x="487" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">animations, feedback</text>
<rect x="585" y="190" width="185" height="58" rx="5" fill="#ffe0b2"/>
<text x="677" y="205" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Emotional Mapping</text>
<text x="677" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Journey stages</text>
<text x="677" y="232" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">target emotions</text>
</g>

<g class="step" id="step3" data-narration="Fitness apps add celebratory animations, progress bars with encouraging messages, and social sharing to increase retention by 40% in 30 days.">
<rect x="10" y="264" width="780" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="30" y="281" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2">Example 1: Fitness App Motivation</text>
<rect x="30" y="293" width="230" height="58" rx="5" fill="#e1bee7"/>
<text x="145" y="308" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Problem</text>
<text x="145" y="322" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Users abandon apps</text>
<text x="145" y="335" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">after 2 weeks</text>
<path d="M270 317 L310 317" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="320" y="293" width="230" height="58" rx="5" fill="#e1bee7"/>
<text x="435" y="308" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Solution</text>
<text x="435" y="322" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Celebration animations</text>
<text x="435" y="335" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">progress bars</text>
<path d="M560 317 L600 317" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="610" y="293" width="170" height="58" rx="5" fill="#c8e6c9"/>
<text x="695" y="308" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Outcome</text>
<text x="695" y="322" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">+40% retention</text>
<text x="695" y="335" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">(30-day)</text>
</g>

<g class="step" id="step4" data-narration="Redesigned error messages use friendly robot illustrations, clear language, and large action buttons to significantly reduce support tickets by 62%.">
<rect x="10" y="367" width="780" height="95" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="30" y="384" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">Example 2: Error Message Redesign</text>
<rect x="30" y="396" width="230" height="58" rx="5" fill="#ffcdd2"/>
<text x="145" y="411" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Original</text>
<text x="145" y="425" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">&quot;Error 404: File not found&quot;</text>
<text x="145" y="438" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Negative, technical</text>
<path d="M270 420 L310 420" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="320" y="396" width="230" height="58" rx="5" fill="#c8e6c9"/>
<text x="435" y="411" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Redesigned</text>
<text x="435" y="425" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">&quot;Oops! We couldn&apos;t find that&quot;</text>
<text x="435" y="438" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Friendly + actions</text>
<path d="M560 420 L600 420" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="610" y="396" width="170" height="58" rx="5" fill="#c8e6c9"/>
<text x="695" y="411" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Result</text>
<text x="695" y="425" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">-62% tickets</text>
<text x="695" y="438" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">support</text>
</g>

<g class="step" id="step5" data-narration="For exams: differentiate usability from emotional impact, memorize Norman's levels, use PAD model, link design to business outcomes, practice case studies.">
<rect x="10" y="470" width="780" height="120" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="30" y="490" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">Exam Tips &amp; Key Takeaways</text>
<g transform="translate(30, 502)">
<rect x="0" y="0" width="110" height="50" rx="4" fill="#bbdefb"/>
<text x="55" y="14" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">1. Differentiate</text>
<text x="55" y="27" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">usability vs</text>
<text x="55" y="40" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">emotional impact</text>
</g>
<g transform="translate(150, 502)">
<rect x="0" y="0" width="110" height="50" rx="4" fill="#bbdefb"/>
<text x="55" y="14" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">2. Memorize</text>
<text x="55" y="27" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Norman&apos;s Three</text>
<text x="55" y="40" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Levels with examples</text>
</g>
<g transform="translate(270, 502)">
<rect x="0" y="0" width="110" height="50" rx="4" fill="#bbdefb"/>
<text x="55" y="14" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">3. Use PAD</text>
<text x="55" y="27" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">model when</text>
<text x="55" y="40" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">analyzing emotions</text>
</g>
<g transform="translate(390, 502)">
<rect x="0" y="0" width="110" height="50" rx="4" fill="#bbdefb"/>
<text x="55" y="14" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">4. Discuss both</text>
<text x="55" y="27" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">positive and</text>
<text x="55" y="40" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">negative impacts</text>
</g>
<g transform="translate(510, 502)">
<rect x="0" y="0" width="110" height="50" rx="4" fill="#bbdefb"/>
<text x="55" y="14" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">5. Link to</text>
<text x="55" y="27" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">business</text>
<text x="55" y="40" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">outcomes (retention)</text>
</g>
<g transform="translate(630, 502)">
<rect x="0" y="0" width="140" height="50" rx="4" fill="#bbdefb"/>
<text x="70" y="14" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">6. Practice case</text>
<text x="70" y="27" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">studies from</text>
<text x="70" y="40" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Duolingo, Slack</text>
</g>
<rect x="30" y="560" width="740" height="30" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="400" y="579" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Key: Visceral = instant reaction | Behavioral = usability | Reflective = long-term meaning</text>
</g>
</svg>