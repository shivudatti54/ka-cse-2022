<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="This title slide introduces the topic of justifying UX investments through business cases, explaining why design matters to stakeholders and profitability.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">User Experience Needs a Business Case</text>
</g>

<g class="step" id="step1" data-narration="UX has evolved from being an afterthought to a critical business driver. ROI compares costs against benefits like reduced support costs and increased conversion rates.">
<rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
<text x="30" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Why UX Needs Business Case</text>
<rect x="30" y="90" width="230" height="42" fill="#e3f2fd" rx="3"/>
<text x="40" y="105" font-family="Arial" font-size="10" fill="#333">• Evolution: Design-afterthought →</text>
<text x="40" y="118" font-family="Arial" font-size="10" fill="#333">  Critical business driver</text>
<text x="40" y="130" font-family="Arial" font-size="9" fill="#333">• Links decisions to outcomes</text>
<rect x="270" y="90" width="230" height="42" fill="#e8f5e9" rx="3"/>
<text x="280" y="105" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">ROI Formula</text>
<text x="280" y="120" font-family="Arial" font-size="10" fill="#333">ROI = (Net Benefit / Cost)</text>
<text x="280" y="132" font-family="Arial" font-size="9" fill="#666">Benefits: reduced support, higher conversion</text>
<rect x="510" y="90" width="260" height="42" fill="#fff3e0" rx="3"/>
<text x="520" y="105" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Key Metrics</text>
<text x="520" y="120" font-family="Arial" font-size="10" fill="#333">• CLV (Customer Lifetime Value)</text>
<text x="520" y="132" font-family="Arial" font-size="10" fill="#333">• NPS (Net Promoter Score)</text>
</g>

<g class="step" id="step2" data-narration="A business case structure typically includes four key sections: problem statement, proposed UX solution, detailed cost-benefit analysis, and comprehensive risk assessment.">
<rect x="10" y="146" width="780" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
<text x="30" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Business Case Structure</text>
<rect x="30" y="180" width="170" height="38" fill="#f3e5f5" rx="3"/>
<text x="40" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">1. Problem Statement</text>
<text x="40" y="210" font-family="Arial" font-size="9" fill="#333">e.g., 70% cart abandonment</text>
<rect x="210" y="180" width="170" height="38" fill="#f3e5f5" rx="3"/>
<text x="220" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">2. Proposed Solution</text>
<text x="220" y="210" font-family="Arial" font-size="9" fill="#333">One-page checkout design</text>
<rect x="390" y="180" width="170" height="38" fill="#f3e5f5" rx="3"/>
<text x="400" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">3. Cost-Benefit</text>
<text x="400" y="210" font-family="Arial" font-size="9" fill="#333">₹5L cost vs ₹300L gain</text>
<rect x="570" y="180" width="170" height="38" fill="#f3e5f5" rx="3"/>
<text x="580" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">4. Risk Assessment</text>
<text x="580" y="210" font-family="Arial" font-size="9" fill="#333">Delays, adoption issues</text>
</g>

<g class="step" id="step3" data-narration="This practical example demonstrates e-commerce checkout optimization where a ₹5L development cost resulted in a 15% conversion increase worth ₹25L monthly revenue.">
<rect x="10" y="234" width="780" height="75" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
<text x="30" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example 1: E-Commerce Checkout</text>
<rect x="30" y="268" width="170" height="35" fill="#ffebee" rx="3"/>
<text x="40" y="283" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Problem</text>
<text x="40" y="297" font-family="Arial" font-size="9" fill="#333">70% cart abandonment</text>
<rect x="210" y="268" width="170" height="35" fill="#e8f5e9" rx="3"/>
<text x="220" y="283" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Solution</text>
<text x="220" y="297" font-family="Arial" font-size="9" fill="#333">One-page checkout</text>
<rect x="390" y="268" width="170" height="35" fill="#fff3e0" rx="3"/>
<text x="400" y="283" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Investment</text>
<text x="400" y="297" font-family="Arial" font-size="9" fill="#333">Development: ₹5L</text>
<rect x="570" y="268" width="170" height="35" fill="#e3f2fd" rx="3"/>
<text x="580" y="283" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">ROI Result</text>
<text x="580" y="297" font-family="Arial" font-size="9" fill="#333">Annual Return: 5900%</text>
</g>

<g class="step" id="step4" data-narration="Healthcare app redesign for elderly users: Voice navigation and larger touch targets reduced support calls by 40% and increased premium subscriptions significantly.">
<rect x="10" y="317" width="780" height="75" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
<text x="30" y="337" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Example 2: Healthcare App Redesign</text>
<rect x="30" y="351" width="230" height="35" fill="#ffebee" rx="3"/>
<text x="40" y="366" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Problem</text>
<text x="40" y="380" font-family="Arial" font-size="9" fill="#333">Low elderly user adoption</text>
<rect x="270" y="351" width="230" height="35" fill="#fff3e0" rx="3"/>
<text x="280" y="366" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">UX Solution</text>
<text x="280" y="380" font-family="Arial" font-size="9" fill="#333">Voice navigation, larger targets</text>
<rect x="510" y="351" width="250" height="35" fill="#e8f5e9" rx="3"/>
<text x="520" y="366" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Quantified Benefits</text>
<text x="520" y="380" font-family="Arial" font-size="9" fill="#333">40% support reduction, 25% more subs</text>
</g>

<g class="step" id="step5" data-narration="Enterprise software training reduced from 8 hours to contextual in-app guidance, saving 65% time and ₹18L annually. The HEART framework helps measure UX effectiveness.">
<rect x="10" y="400" width="780" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
<text x="30" y="420" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example 3: Enterprise Training</text>
<rect x="30" y="434" width="165" height="40" fill="#ffebee" rx="3"/>
<text x="40" y="449" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Problem</text>
<text x="40" y="464" font-family="Arial" font-size="9" fill="#333">8h onboarding per employee</text>
<rect x="205" y="434" width="165" height="40" fill="#e3f2fd" rx="3"/>
<text x="215" y="449" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Solution</text>
<text x="215" y="464" font-family="Arial" font-size="9" fill="#333">In-app guidance walkthroughs</text>
<rect x="380" y="434" width="165" height="40" fill="#e8f5e9" rx="3"/>
<text x="390" y="449" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Result</text>
<text x="390" y="464" font-family="Arial" font-size="9" fill="#333">65% time reduction</text>
<rect x="555" y="434" width="165" height="40" fill="#fff3e0" rx="3"/>
<text x="565" y="449" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Annual Savings</text>
<text x="565" y="464" font-family="Arial" font-size="9" fill="#333">₹18 Lakhs/year</text>
</g>

<g class="step" id="step6" data-narration="Key takeaways emphasize aligning UX initiatives with business metrics, utilizing ROI formulas and cost-benefit tables, and studying measurement frameworks like HEART for success.">
<rect x="10" y="488" width="780" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
<text x="30" y="508" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Key Takeaways for Exam</text>
<rect x="30" y="522" width="720" height="38" fill="#f3e5f5" rx="3"/>
<text x="40" y="538" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">HEART Framework:</text>
<text x="110" y="538" font-family="Arial" font-size="10" fill="#333">Happiness (surveys) • Engagement (usage) • Adoption (sign-ups) • Retention (churn) • Task Success</text>
<text x="40" y="555" font-family="Arial" font-size="9" fill="#666">Exam Tip: Leading indicators (user satisfaction) differ from lagging indicators (revenue, market share)</text>
</g>
</svg>