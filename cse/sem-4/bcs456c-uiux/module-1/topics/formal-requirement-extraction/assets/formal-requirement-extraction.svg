<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This title slide introduces the Formal Requirement Extraction course module, covering techniques for converting stakeholder needs into precise mathematical specifications for safety-critical systems.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Formal Requirement Extraction</text>
  </g>
  
  <g class="step" id="step1" data-narration="Formal requirement extraction transforms informal stakeholder needs into mathematically precise specifications, ensuring unambiguous communication and reducing project risks from misinterpretations in safety-critical applications.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Introduction</text>
    <text x="40" y="94" font-family="Arial" font-size="10" fill="#333">Formal requirement extraction converts stakeholder needs into precise mathematical specifications.</text>
    <text x="40" y="108" font-family="Arial" font-size="10" fill="#333">This process ensures unambiguous communication, reducing project risks from misinterpretations.</text>
    <text x="40" y="122" font-family="Arial" font-size="10" fill="#333">Standards like ISO 26262 and DO-178C mandate formal methods for safety-critical systems.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Key concepts include stakeholder analysis for identifying all parties, NLP techniques for parsing requirements, traceability matrices for linking requirements to design elements, and formal verification through model checking.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Key Concepts</text>
    <rect x="40" y="176" width="140" height="50" fill="#e8f5e9" rx="3"/>
    <text x="50" y="188" font-family="Arial" font-size="9" fill="#2e7d32">Stakeholder Analysis</text>
    <text x="50" y="200" font-family="Arial" font-size="8" fill="#333">Identifying all parties</text>
    <text x="50" y="212" font-family="Arial" font-size="8" fill="#333">in requirements gathering</text>
    <rect x="190" y="176" width="140" height="50" fill="#e8f5e9" rx="3"/>
    <text x="200" y="188" font-family="Arial" font-size="9" fill="#2e7d32">NLP Techniques</text>
    <text x="200" y="200" font-family="Arial" font-size="8" fill="#333">Parsing informal</text>
    <text x="200" y="212" font-family="Arial" font-size="8" fill="#333">requirements</text>
    <rect x="340" y="176" width="140" height="50" fill="#e8f5e9" rx="3"/>
    <text x="350" y="188" font-family="Arial" font-size="9" fill="#2e7d32">Traceability Matrix</text>
    <text x="350" y="200" font-family="Arial" font-size="8" fill="#333">Linking requirements</text>
    <text x="350" y="212" font-family="Arial" font-size="8" fill="#333">to design elements</text>
    <rect x="490" y="176" width="140" height="50" fill="#e8f5e9" rx="3"/>
    <text x="500" y="188" font-family="Arial" font-size="9" fill="#2e7d32">Formal Verification</text>
    <text x="500" y="200" font-family="Arial" font-size="8" fill="#333">Model checking,</text>
    <text x="500" y="212" font-family="Arial" font-size="8" fill="#333">theorem proving</text>
  </g>
  
  <g class="step" id="step3" data-narration="Formal specification languages like Z notation use mathematical schema calculus with declaration and predicate parts, VDM provides model-based specification, and temporal logic handles time-dependent behaviors with operators.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Formal Specification Languages</text>
    <rect x="40" y="266" width="220" height="44" fill="#f3e5f5" rx="3"/>
    <text x="50" y="278" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Z Notation</text>
    <text x="50" y="290" font-family="Arial" font-size="9" fill="#333">Mathematical schema calculus</text>
    <text x="50" y="302" font-family="Arial" font-size="9" fill="#333">with declaration and predicate</text>
    <rect x="270" y="266" width="220" height="44" fill="#f3e5f5" rx="3"/>
    <text x="280" y="278" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">VDM</text>
    <text x="280" y="290" font-family="Arial" font-size="9" fill="#333">Vienna Development Method</text>
    <text x="280" y="302" font-family="Arial" font-size="9" fill="#333">model-based specification</text>
    <rect x="500" y="266" width="220" height="44" fill="#f3e5f5" rx="3"/>
    <text x="510" y="278" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Temporal Logic</text>
    <text x="510" y="290" font-family="Arial" font-size="9" fill="#333">Time-dependent systems</text>
    <text x="510" y="302" font-family="Arial" font-size="9" fill="#333">□ (Always), ◇ (Eventually)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Requirement validation includes consistency checking to ensure no contradictions, completeness analysis to verify all scenarios are covered, and conflict detection using model checking for identifying contradictory requirements.">
    <rect x="20" y="322" width="760" height="93" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Requirement Validation</text>
    <circle cx="70" cy="365" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="369" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">1</text>
    <text x="95" y="369" font-family="Arial" font-size="10" fill="#333">Consistency Checking</text>
    <circle cx="70" cy="395" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="399" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">2</text>
    <text x="95" y="399" font-family="Arial" font-size="10" fill="#333">Completeness Analysis</text>
    <rect x="260" y="352" width="240" height="44" fill="#fff3e0" rx="3"/>
    <text x="270" y="364" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Conflict Detection</text>
    <text x="270" y="378" font-family="Arial" font-size="9" fill="#333">Identifying contradictory</text>
    <text x="270" y="390" font-family="Arial" font-size="9" fill="#333">requirements using model checking</text>
    <rect x="510" y="352" width="240" height="44" fill="#fff3e0" rx="3"/>
    <text x="520" y="364" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Validation vs Verification</text>
    <text x="520" y="378" font-family="Arial" font-size="9" fill="#333">Validation: right requirements</text>
    <text x="520" y="390" font-family="Arial" font-size="9" fill="#333">Verification: system right</text>
  </g>
  
  <g class="step" id="step5" data-narration="Real-world examples include elevator control systems where door open implies speed equals zero, banking systems requiring balance to exceed withdrawal amounts, and traffic lights using temporal logic for safe transitions.">
    <rect x="20" y="423" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="443" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Examples</text>
    <rect x="40" y="455" width="230" height="44" fill="#ffebee" rx="3"/>
    <text x="50" y="467" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Elevator Control</text>
    <text x="50" y="479" font-family="Arial" font-size="8" fill="#333">door_open ⇒ speed = 0</text>
    <text x="50" y="491" font-family="Arial" font-size="8" fill="#333">Z: ∀e: Elevator • ...</text>
    <rect x="280" y="455" width="230" height="44" fill="#ffebee" rx="3"/>
    <text x="290" y="467" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Banking System</text>
    <text x="290" y="479" font-family="Arial" font-size="8" fill="#333">pre: balance ≥ amount</text>
    <text x="290" y="491" font-family="Arial" font-size="8" fill="#333">post: balance = balance~ - amount</text>
    <rect x="520" y="455" width="230" height="44" fill="#ffebee" rx="3"/>
    <text x="530" y="467" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Traffic Light</text>
    <text x="530" y="479" font-family="Arial" font-size="8" fill="#333">□(green ⇒ ◇(yellow ∧ ¬green))</text>
    <text x="530" y="491" font-family="Arial" font-size="8" fill="#333">Temporal logic specification</text>
  </g>
  
  <g class="step" id="step6" data-narration="Important exam topics include differentiating functional versus non-functional requirements, understanding Z schema structure with declaration and predicate parts, and practicing conversion of shall statements into formal logic expressions.">
    <rect x="20" y="511" width="760" height="77" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="531" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Exam Tips</text>
    <rect x="40" y="543" width="155" height="42" fill="#e3f2fd" rx="3"/>
    <text x="48" y="555" font-family="Arial" font-size="8" fill="#1565c0">• Differentiate functional vs</text>
    <text x="48" y="567" font-family="Arial" font-size="8" fill="#333">non-functional requirements</text>
    <text x="48" y="579" font-family="Arial" font-size="8" fill="#333">• Memorize 2-3 patterns</text>
    <rect x="205" y="543" width="155" height="42" fill="#e3f2fd" rx="3"/>
    <text x="213" y="555" font-family="Arial" font-size="8" fill="#1565c0">• Understand Z schema</text>
    <text x="213" y="567" font-family="Arial" font-size="8" fill="#333">structure: declaration +</text>
    <text x="213" y="579" font-family="Arial" font-size="8" fill="#333">predicate parts</text>
    <rect x="370" y="543" width="155" height="42" fill="#e3f2fd" rx="3"/>
    <text x="378" y="555" font-family="Arial" font-size="8" fill="#1565c0">• Practice converting</text>
    <text x="378" y="567" font-family="Arial" font-size="8" fill="#333">"shall" statements to</text>
    <text x="378" y="579" font-family="Arial" font-size="8" fill="#333">formal logic</text>
    <rect x="535" y="543" width="155" height="42" fill="#e3f2fd" rx="3"/>
    <text x="543" y="555" font-family="Arial" font-size="8" fill="#1565c0">• Know differences:</text>
    <text x="543" y="567" font-family="Arial" font-size="8" fill="#333">Z, VDM, B Method</text>
    <text x="543" y="579" font-family="Arial" font-size="8" fill="#333">• Validation vs Verify</text>
  </g>
</svg>