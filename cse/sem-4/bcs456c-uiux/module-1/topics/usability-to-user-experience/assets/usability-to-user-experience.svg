<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic explores how software design evolved from basic usability to comprehensive user experience, crucial for modern CSE applications and digital product development.">
    <rect x="20" y="10" width="760" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">From Usability to User Experience</text>
  </g>
  
  <g class="step" id="step1" data-narration="Usability has five key components: learnability, efficiency, memorability, error prevention, and user satisfaction. These metrics help evaluate how easily users can accomplish tasks.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">USABILITY: Five Key Components</text>
    <rect x="40" y="85" width="130" height="50" rx="4" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
    <text x="105" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Learnability</text>
    <text x="105" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Easy to learn</text>
    <rect x="180" y="85" width="130" height="50" rx="4" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
    <text x="245" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Efficiency</text>
    <text x="245" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Fast task completion</text>
    <rect x="320" y="85" width="130" height="50" rx="4" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
    <text x="385" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Memorability</text>
    <text x="385" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Retain knowledge</text>
    <rect x="460" y="85" width="130" height="50" rx="4" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
    <text x="525" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Errors</text>
    <text x="525" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Prevent &amp; recover</text>
    <rect x="600" y="85" width="130" height="50" rx="4" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
    <text x="665" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Satisfaction</text>
    <text x="665" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Pleasant experience</text>
  </g>
  
  <g class="step" id="step2" data-narration="User experience expands beyond functionality to include emotional design, information architecture, interaction design, accessibility, and cross-platform consistency for holistic product quality.">
    <rect x="20" y="151" width="760" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">USER EXPERIENCE: Key Elements</text>
    <rect x="40" y="180" width="140" height="48" rx="4" fill="#ffffff" stroke="#ce93d8" stroke-width="1"/>
    <text x="110" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Emotional Design</text>
    <text x="110" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Visceral, Behavioral, Reflective</text>
    <rect x="190" y="180" width="140" height="48" rx="4" fill="#ffffff" stroke="#ce93d8" stroke-width="1"/>
    <text x="260" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Information Architecture</text>
    <text x="260" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Content organization</text>
    <rect x="340" y="180" width="140" height="48" rx="4" fill="#ffffff" stroke="#ce93d8" stroke-width="1"/>
    <text x="410" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Interaction Design</text>
    <text x="410" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">User-system dialogue</text>
    <rect x="490" y="180" width="130" height="48" rx="4" fill="#ffffff" stroke="#ce93d8" stroke-width="1"/>
    <text x="555" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Accessibility</text>
    <text x="555" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Inclusive design</text>
    <rect x="630" y="180" width="140" height="48" rx="4" fill="#ffffff" stroke="#ce93d8" stroke-width="1"/>
    <text x="700" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Cross-Platform</text>
    <text x="700" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Consistent experience</text>
  </g>
  
  <g class="step" id="step3" data-narration="Usability is objective, measuring task completion efficiency. UX is subjective, capturing emotional impact, desirability, and overall value perception throughout the user journey.">
    <rect x="20" y="244" width="760" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="261" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">USABILITY vs USER EXPERIENCE</text>
    <rect x="40" y="275" width="340" height="45" rx="4" fill="#ffe0b2" stroke="#ffb74d" stroke-width="1"/>
    <text x="210" y="290" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">USABILITY</text>
    <text x="210" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Objective | Task-focused | Efficiency</text>
    <rect x="400" y="275" width="340" height="45" rx="4" fill="#ffe0b2" stroke="#ffb74d" stroke-width="1"/>
    <text x="570" y="290" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">USER EXPERIENCE</text>
    <text x="570" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Subjective | Emotional | Holistic Journey</text>
    <path d="M270 290 L320 290" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="295" y="280" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">UX includes usability +</text>
    <text x="295" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">desirability &amp; value</text>
  </g>
  
  <g class="step" id="step4" data-narration="Key design laws include Fitts' Law for interactive elements, Hick's Law for decision-making, and Gestalt principles for visual hierarchy in modern interface design.">
    <rect x="20" y="337" width="760" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="354" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">KEY DESIGN LAWS &amp; PRINCIPLES</text>
    <rect x="40" y="368" width="220" height="46" rx="4" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
    <text x="150" y="382" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Fitts' Law</text>
    <text x="150" y="397" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Time to reach target depends on</text>
    <text x="150" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">distance and size of element</text>
    <rect x="270" y="368" width="220" height="46" rx="4" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
    <text x="380" y="382" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Hick's Law</text>
    <text x="380" y="397" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">More choices = longer decision time</text>
    <text x="380" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Simplify options for faster response</text>
    <rect x="500" y="368" width="270" height="46" rx="4" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
    <text x="635" y="382" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Gestalt Principles</text>
    <text x="635" y="397" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Similarity, Proximity, Closure</text>
    <text x="635" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Create visual hierarchy &amp; grouping</text>
  </g>
  
  <g class="step" id="step5" data-narration="Nielsen's 10 Heuristics guide UX evaluation: visibility, system-user match, user control, consistency, error prevention, recognition, flexibility, minimal design, error recovery, and help.">
    <rect x="20" y="430" width="760" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="447" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">NIELSEN'S 10 HEURISTICS</text>
    <rect x="40" y="458" width="152" height="50" rx="4" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1"/>
    <text x="116" y="470" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">1. Visibility</text>
    <text x="116" y="482" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">System status</text>
    <text x="116" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">always visible</text>
    <rect x="200" y="458" width="152" height="50" rx="4" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1"/>
    <text x="276" y="470" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">2. Match System</text>
    <text x="276" y="482" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Real world</text>
    <text x="276" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">conventions</text>
    <rect x="360" y="458" width="152" height="50" rx="4" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1"/>
    <text x="436" y="470" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">3. User Control</text>
    <text x="436" y="482" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Exit, undo,</text>
    <text x="436" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">redo options</text>
    <rect x="520" y="458" width="152" height="50" rx="4" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1"/>
    <text x="596" y="470" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">4. Consistency</text>
    <text x="596" y="482" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Platform &amp;</text>
    <text x="596" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">internal consistency</text>
    <rect x="680" y="458" width="90" height="50" rx="4" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1"/>
    <text x="725" y="470" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">5-10</text>
    <text x="725" y="482" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Error prevention</text>
    <text x="725" y="492" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">to help docs</text>
  </g>
  
  <g class="step" id="step6" data-narration="Real examples: E-commerce checkout reduced abandonment by 40%, mobile banking saw 35% more transactions after UX redesign. Remember HEART framework and ISO 9241 for exams.">
    <rect x="20" y="523" width="760" height="60" rx="5" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
    <text x="40" y="540" font-family="Arial" font-size="12" font-weight="bold" fill="#0288d1">EXAMPLES &amp; EXAM TIPS</text>
    <rect x="40" y="548" width="240" height="28" rx="4" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="1"/>
    <text x="160" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#01579b">E-Commerce: 70% to 30% abandonment</text>
    <text x="160" y="571" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">40% reduction with UX improvements</text>
    <rect x="290" y="548" width="230" height="28" rx="4" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="1"/>
    <text x="405" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#01579b">Mobile Banking: 35% more transactions</text>
    <text x="405" y="571" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">After simplifying menu structure</text>
    <rect x="530" y="548" width="240" height="28" rx="4" fill="#b3e5fc" stroke="#4fc3f7" stroke-width="1"/>
    <text x="650" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#01579b">Remember: HEART Framework</text>
    <text x="650" y="571" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Happiness, Engagement, Adoption, Retention, Task success</text>
  </g>
</svg>