<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to learning about Needs and Requirements, which form the essential foundation of software engineering and system design for successful project delivery.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff">Needs &amp; Requirements</text>
  </g>
  
  <!-- step1: Needs vs Requirements -->
  <g class="step" id="step1" data-narration="Needs represent broad high-level stakeholder aspirations and business goals, while requirements translate them into specific, measurable, and testable system characteristics and functional specifications.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">NEEDS vs REQUIREMENTS</text>
    <rect x="40" y="85" width="340" height="45" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="100" font-family="Arial" font-size="10" fill="#333">NEEDS</text>
    <text x="50" y="115" font-family="Arial" font-size="9" fill="#666">Broad aspirations (e.g., "Improve</text>
    <text x="50" y="125" font-family="Arial" font-size="9" fill="#666">customer service")</text>
    <rect x="400" y="85" width="340" height="45" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="410" y="100" font-family="Arial" font-size="10" fill="#388e3c">REQUIREMENTS</text>
    <text x="410" y="115" font-family="Arial" font-size="9" fill="#666">Specific, measurable specs</text>
    <text x="410" y="125" font-family="Arial" font-size="9" fill="#666">(e.g., "Response &lt;2 sec")</text>
  </g>
  
  <!-- step2: Types of Requirements -->
  <g class="step" id="step2" data-narration="Requirements are systematically classified into functional requirements describing system capabilities, non-functional requirements defining quality attributes, business requirements aligning with organizational objectives, and user requirements capturing end-user expectations.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">TYPES OF REQUIREMENTS</text>
    <rect x="40" y="175" width="170" height="45" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">FUNCTIONAL</text>
    <text x="50" y="200" font-family="Arial" font-size="8" fill="#666">System capabilities</text>
    <text x="50" y="212" font-family="Arial" font-size="8" fill="#666">(e.g., User login)</text>
    <rect x="220" y="175" width="170" height="45" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="230" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">NON-FUNCTIONAL</text>
    <text x="230" y="200" font-family="Arial" font-size="8" fill="#666">Quality attributes</text>
    <text x="230" y="212" font-family="Arial" font-size="8" fill="#666">(e.g., 99.9% uptime)</text>
    <rect x="400" y="175" width="170" height="45" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="410" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">BUSINESS</text>
    <text x="410" y="200" font-family="Arial" font-size="8" fill="#666">Org objectives</text>
    <text x="410" y="212" font-family="Arial" font-size="8" fill="#666">(e.g., +20% sales)</text>
    <rect x="580" y="175" width="170" height="45" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="590" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">USER</text>
    <text x="590" y="200" font-family="Arial" font-size="8" fill="#666">End-user expectations</text>
    <text x="590" y="212" font-family="Arial" font-size="8" fill="#666">(e.g., Intuitive UI)</text>
  </g>
  
  <!-- step3: Requirements Engineering Process -->
  <g class="step" id="step3" data-narration="The four-stage requirements engineering process systematically progresses through elicitation to gather stakeholder needs, analysis to resolve conflicts and check feasibility, specification to document detailed requirements in SRS, and validation through reviews and prototyping.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">REQUIREMENTS ENGINEERING PROCESS</text>
    <rect x="40" y="263" width="160" height="45" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="125" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">1. ELICITATION</text>
    <text x="125" y="292" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Interviews, surveys,</text>
    <text x="125" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">workshops</text>
    <line x1="200" y1="285" x2="215" y2="285" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="220" y="263" width="160" height="45" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="300" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">2. ANALYSIS</text>
    <text x="300" y="292" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Conflict resolution,</text>
    <text x="300" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">feasibility checks</text>
    <line x1="380" y1="285" x2="395" y2="285" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="400" y="263" width="160" height="45" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="480" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">3. SPECIFICATION</text>
    <text x="480" y="292" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">SRS document</text>
    <text x="480" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">creation</text>
    <line x1="560" y1="285" x2="575" y2="285" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="580" y="263" width="160" height="45" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="660" y="278" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">4. VALIDATION</text>
    <text x="660" y="292" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Reviews, prototyping</text>
    <text x="660" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">testing</text>
  </g>
  
  <!-- step4: Prioritization Techniques -->
  <g class="step" id="step4" data-narration="MoSCoW and Kano are popular prioritization techniques used extensively in software projects to rank requirements based on business value, implementation complexity, and customer satisfaction impact.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">PRIORITIZATION TECHNIQUES</text>
    <rect x="40" y="352" width="350" height="45" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="50" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">MoSCoW Method</text>
    <text x="50" y="380" font-family="Arial" font-size="9" fill="#666">M-Must have | S-Should have</text>
    <text x="50" y="392" font-family="Arial" font-size="9" fill="#666">C-Could have | W-Won't have</text>
    <rect x="400" y="352" width="350" height="45" fill="#ffffff" stroke="#e91e63" stroke-width="1" rx="3"/>
    <text x="410" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#e91e63">Kano Model</text>
    <text x="410" y="380" font-family="Arial" font-size="9" fill="#666">Basic needs | Performance</text>
    <text x="410" y="392" font-family="Arial" font-size="9" fill="#666">Excitement features</text>
  </g>
  
  <!-- step5: Example - Library Management System -->
  <g class="step" id="step5" data-narration="In a library management system, the fundamental need to track books efficiently and reduce losses translates into functional requirements for ISBN-based search, non-functional requirements for fast response time, and business requirements for reducing operational losses significantly.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">EXAMPLE: Library Management System</text>
    <rect x="40" y="440" width="220" height="45" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="453" font-family="Arial" font-size="9" fill="#333">NEED:</text>
    <text x="50" y="467" font-family="Arial" font-size="8" fill="#666">"Track books efficiently"</text>
    <rect x="270" y="440" width="230" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="280" y="453" font-family="Arial" font-size="9" fill="#1976d2">FR01:</text>
    <text x="280" y="467" font-family="Arial" font-size="8" fill="#666">ISBN-based search</text>
    <rect x="510" y="440" width="130" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="520" y="453" font-family="Arial" font-size="9" fill="#388e3c">NFR01:</text>
    <text x="520" y="467" font-family="Arial" font-size="8" fill="#666">&lt;3 sec response</text>
    <rect x="650" y="440" width="110" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="660" y="453" font-family="Arial" font-size="9" fill="#ff9800">BR01:</text>
    <text x="660" y="467" font-family="Arial" font-size="8" fill="#666">-30% loss</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Remember to clearly differentiate between stakeholder needs and specific requirements in exam answers, thoroughly memorize the four-stage requirements engineering process sequence, and correctly apply MoSCoW prioritization categories for maximum scoring potential in  examinations.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">EXAM TIPS</text>
    <text x="40" y="535" font-family="Arial" font-size="9" fill="#333">1. Differentiate needs (why) vs requirements (what)</text>
    <text x="40" y="550" font-family="Arial" font-size="9" fill="#333">2. Memorize 4-stage RE process: Elicitation, Analysis, Specification, Validation</text>
    <text x="40" y="565" font-family="Arial" font-size="9" fill="#333">3. MoSCoW: Must, Should, Could, Won't</text>
    <text x="40" y="580" font-family="Arial" font-size="9" fill="#333">4. Traceability: Vertical (need to test) and Horizontal (req to req)</text>
  </g>
</svg>