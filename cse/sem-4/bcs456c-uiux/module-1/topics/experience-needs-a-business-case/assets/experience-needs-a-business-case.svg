<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="This topic explains why IT projects require formal business cases for approval. A business case documents costs, benefits, risks, and expected returns to help decision-makers evaluate proposals objectively.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="4"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Experience Needs a Business Case</text>
  </g>

  <g class="step" id="step1" data-narration="A business case justifies IT investments by analyzing costs, benefits, risks, and alternatives. Even expert-driven proposals need formal evidence of value before approval.">
    <rect x="10" y="58" width="780" height="95" fill="#e3f2fd" rx="6" stroke="#1976d2" stroke-width="2"/>
    <text x="25" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is a Business Case?</text>
    <text x="25" y="92" font-family="Arial" font-size="10" fill="#333">A documented justification for an IT investment outlining expected benefits, costs,</text>
    <text x="25" y="105" font-family="Arial" font-size="10" fill="#333">and ROI. It helps stakeholders make informed decisions about resource allocation.</text>
    <text x="25" y="125" font-family="Arial" font-size="10" font-style="italic" fill="#666">Why it matters: Prevents costly failures and ensures accountability in decision-making.</text>
  </g>

  <g class="step" id="step2" data-narration="A complete business case includes problem definition, objectives, options analysis, cost-benefit comparison, risk assessment, and stakeholder impact analysis for decision-making.">
    <rect x="10" y="163" width="780" height="95" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="2"/>
    <text x="25" y="180" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Key Components</text>
    <rect x="25" y="195" width="145" height="50" fill="white" rx="3"/>
    <text x="35" y="208" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Problem Statement</text>
    <text x="35" y="220" font-family="Arial" font-size="8" fill="#555">Clear organizational</text>
    <text x="35" y="230" font-family="Arial" font-size="8" fill="#555">challenge definition</text>
    <rect x="180" y="195" width="145" height="50" fill="white" rx="3"/>
    <text x="190" y="208" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Objectives</text>
    <text x="190" y="220" font-family="Arial" font-size="8" fill="#555">Measurable goals</text>
    <text x="190" y="230" font-family="Arial" font-size="8" fill="#555">for the solution</text>
    <rect x="335" y="195" width="145" height="50" fill="white" rx="3"/>
    <text x="345" y="208" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Cost-Benefit Analysis</text>
    <text x="345" y="220" font-family="Arial" font-size="8" fill="#555">Quantitative comparison</text>
    <text x="345" y="230" font-family="Arial" font-size="8" fill="#555">of expenses vs returns</text>
    <rect x="490" y="195" width="145" height="50" fill="white" rx="3"/>
    <text x="500" y="208" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Risk Assessment</text>
    <text x="500" y="220" font-family="Arial" font-size="8" fill="#555">Implementation</text>
    <text x="500" y="230" font-family="Arial" font-size="8" fill="#555">challenges identification</text>
    <rect x="645" y="195" width="145" height="50" fill="white" rx="3"/>
    <text x="655" y="208" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Stakeholder Impact</text>
    <text x="655" y="220" font-family="Arial" font-size="8" fill="#555">How changes affect</text>
    <text x="655" y="230" font-family="Arial" font-size="8" fill="#555">users and processes</text>
  </g>

  <g class="step" id="step3" data-narration="Key financial metrics include ROI: net benefits divided by costs times 100, NPV for present value of future cash flows, and payback period showing recovery time.">
    <rect x="10" y="268" width="780" height="95" fill="#fff3e0" rx="6" stroke="#ff9800" stroke-width="2"/>
    <text x="25" y="285" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Financial Metrics</text>
    <rect x="25" y="300" width="180" height="55" fill="white" rx="3"/>
    <text x="35" y="315" font-family="Arial" font-size="10" font-weight="bold" fill="#333">ROI (Return on Investment)</text>
    <text x="35" y="330" font-family="Arial" font-size="9" fill="#555">ROI = (Net Benefits / Costs) × 100</text>
    <text x="35" y="345" font-family="Arial" font-size="8" fill="#666">Higher percentage = better return</text>
    <rect x="215" y="300" width="180" height="55" fill="white" rx="3"/>
    <text x="225" y="315" font-family="Arial" font-size="10" font-weight="bold" fill="#333">NPV (Net Present Value)</text>
    <text x="225" y="330" font-family="Arial" font-size="9" fill="#555">PV of benefits - PV of costs</text>
    <text x="225" y="345" font-family="Arial" font-size="8" fill="#666">Positive NPV = financially viable</text>
    <rect x="405" y="300" width="180" height="55" fill="white" rx="3"/>
    <text x="415" y="315" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Payback Period</text>
    <text x="415" y="330" font-family="Arial" font-size="9" fill="#555">Time to recover initial investment</text>
    <text x="415" y="345" font-family="Arial" font-size="8" fill="#666">Shorter = less risk</text>
    <rect x="595" y="300" width="180" height="55" fill="white" rx="3"/>
    <text x="605" y="315" font-family="Arial" font-size="10" font-weight="bold" fill="#333">TCO (Total Cost of Ownership)</text>
    <text x="605" y="330" font-family="Arial" font-size="9" fill="#555">All costs over system lifetime</text>
    <text x="605" y="345" font-family="Arial" font-size="8" fill="#666">Includes maintenance, training</text>
  </g>

  <g class="step" id="step4" data-narration="In the CRM example, SaaS saved $150k upfront with 18-month payback. Cloud migration showed $1.08M NPV over 3 years. Failed AI projects lack user adoption metrics.">
    <rect x="10" y="373" width="780" height="95" fill="#f3e5f5" rx="6" stroke="#9c27b0" stroke-width="2"/>
    <text x="25" y="390" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Real-World Examples</text>
    <rect x="25" y="405" width="245" height="58" fill="white" rx="3"/>
    <text x="35" y="420" font-family="Arial" font-size="9" font-weight="bold" fill="#333">CRM Implementation</text>
    <text x="35" y="433" font-family="Arial" font-size="8" fill="#555">Custom build $200k vs SaaS $50k/yr</text>
    <text x="35" y="446" font-family="Arial" font-size="8" fill="#555">SaaS selected: 18-month payback</text>
    <rect x="280" y="405" width="245" height="58" fill="white" rx="3"/>
    <text x="290" y="420" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Cloud Migration</text>
    <text x="290" y="433" font-family="Arial" font-size="8" fill="#555">Cost: $120k + $20k/mo operational</text>
    <text x="290" y="446" font-family="Arial" font-size="8" fill="#555">Benefit: $50k/mo saved | 3yr NPV: $1.08M</text>
    <rect x="535" y="405" width="245" height="58" fill="white" rx="3"/>
    <text x="545" y="420" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Failed AI Project</text>
    <text x="545" y="433" font-family="Arial" font-size="8" fill="#555">Problem: No market validation</text>
    <text x="545" y="446" font-family="Arial" font-size="8" fill="#f44336">Result: $500k spent, 12% user adoption</text>
  </g>

  <g class="step" id="step5" data-narration="For exams: memorize ROI formula, compare 3+ options, highlight risk mitigation, use real examples, distinguish tangible versus intangible benefits, practice executive summaries.">
    <rect x="10" y="478" width="780" height="100" fill="#ffebee" rx="6" stroke="#f44336" stroke-width="2"/>
    <text x="25" y="495" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Exam Tips &amp; Key Takeaways</text>
    <circle cx="40" cy="520" r="6" fill="#f44336"/>
    <text x="55" y="524" font-family="Arial" font-size="9" fill="#333">Memorize CBA formulas: ROI = (Net Benefits / Costs) × 100</text>
    <circle cx="40" cy="540" r="6" fill="#f44336"/>
    <text x="55" y="544" font-family="Arial" font-size="9" fill="#333">Always compare at least 3 options in case studies</text>
    <circle cx="40" cy="560" r="6" fill="#f44336"/>
    <text x="55" y="564" font-family="Arial" font-size="9" fill="#333">Highlight risk mitigation strategies for bonus marks</text>
    <rect x="280" y="510" width="230" height="60" fill="white" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="290" y="525" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Governance Frameworks</text>
    <text x="290" y="540" font-family="Arial" font-size="8" fill="#555">COBIT, ITIL for project approvals</text>
    <text x="290" y="555" font-family="Arial" font-size="8" fill="#555">Often asked in 5-mark questions</text>
    <rect x="520" y="510" width="260" height="60" fill="white" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="530" y="525" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Distinguish Benefits</text>
    <text x="530" y="540" font-family="Arial" font-size="8" fill="#555">Tangible: measurable (cost savings)</text>
    <text x="530" y="555" font-family="Arial" font-size="8" fill="#555">Intangible: qualitative (user satisfaction)</text>
  </g>
</svg>