<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers extracting interaction design requirements - identifying user needs, business goals, and technical constraints for digital products to ensure successful implementation.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Extracting Interaction Design Requirements &amp; Needs</text>
  </g>
  
  <!-- step1: Introduction -->
  <g class="step" id="step1" data-narration="Requirements extraction is the systematic process of identifying user needs, business goals, and technical constraints that shape product development and ensure successful implementation.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">1. Introduction</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Requirements extraction identifies user needs, business goals, and technical constraints</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">for digital products. This phase bridges user expectations with technical implementation.</text>
    <text x="40" y="128" font-family="Arial" font-size="9" fill="#666">Prevents costly redesigns and ensures accessibility standards compliance.</text>
  </g>
  
  <!-- step2: User Research Methods -->
  <g class="step" id="step2" data-narration="Key user research methods include contextual inquiries, diary studies, and the AEIOU framework covering Activities, Environments, Interactions, Objects, Users for comprehensive analysis.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">2. User Research Methods</text>
    <rect x="40" y="180" width="220" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Contextual Inquiries</text>
    <text x="50" y="208" font-family="Arial" font-size="8" fill="#333">Observing users in their</text>
    <text x="50" y="218" font-family="Arial" font-size="8" fill="#333">natural environment</text>
    <rect x="270" y="180" width="220" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="280" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Diary Studies</text>
    <text x="280" y="208" font-family="Arial" font-size="8" fill="#333">Longitudinal tracking of</text>
    <text x="280" y="218" font-family="Arial" font-size="8" fill="#333">user behaviors over time</text>
    <rect x="500" y="180" width="260" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="510" y="194" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">AEIOU Framework</text>
    <text x="510" y="208" font-family="Arial" font-size="8" fill="#333">Activities, Environments,</text>
    <text x="510" y="218" font-family="Arial" font-size="8" fill="#333">Interactions, Objects, Users</text>
  </g>
  
  <!-- step3: Requirements Categorization -->
  <g class="step" id="step3" data-narration="Requirements are categorized into functional requirements for system capabilities, non-functional requirements for performance and security, and user experience requirements for accessibility and user satisfaction.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">3. Requirements Categorization</text>
    <rect x="40" y="268" width="230" height="42" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="50" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Functional Requirements</text>
    <text x="50" y="296" font-family="Arial" font-size="8" fill="#333">What the product must do -</text>
    <text x="50" y="306" font-family="Arial" font-size="8" fill="#333">system capabilities</text>
    <rect x="285" y="268" width="230" height="42" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="295" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Non-Functional Requirements</text>
    <text x="295" y="296" font-family="Arial" font-size="8" fill="#333">How the product must behave -</text>
    <text x="295" y="306" font-family="Arial" font-size="8" fill="#333">performance, security</text>
    <rect x="530" y="268" width="230" height="42" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="540" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">UX Requirements</text>
    <text x="540" y="296" font-family="Arial" font-size="8" fill="#333">User experience quality -</text>
    <text x="540" y="306" font-family="Arial" font-size="8" fill="#333">accessibility, satisfaction</text>
  </g>
  
  <!-- step4: Analysis Techniques -->
  <g class="step" id="step4" data-narration="Analysis techniques include the Kano Model for feature prioritization based on satisfaction, the MoSCoW Method for requirements classification, and Hierarchical Task Analysis for breaking down user tasks.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">4. Analysis Techniques</text>
    <rect x="40" y="356" width="230" height="42" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="50" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Kano Model</text>
    <text x="50" y="384" font-family="Arial" font-size="8" fill="#333">Prioritizing features based on</text>
    <text x="50" y="394" font-family="Arial" font-size="8" fill="#333">customer satisfaction</text>
    <rect x="285" y="356" width="230" height="42" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="295" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">MoSCoW Method</text>
    <text x="295" y="384" font-family="Arial" font-size="8" fill="#333">Must-have, Should-have,</text>
    <text x="295" y="394" font-family="Arial" font-size="8" fill="#333">Could-have, Won't-have</text>
    <rect x="530" y="356" width="230" height="42" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="540" y="370" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Hierarchical Task Analysis</text>
    <text x="540" y="384" font-family="Arial" font-size="8" fill="#333">Breaking down user tasks</text>
    <text x="540" y="394" font-family="Arial" font-size="8" fill="#333">into hierarchical steps</text>
  </g>
  
  <!-- step5: Example -->
  <g class="step" id="step5" data-narration="Example: E-Learning platform - user interviews revealed lack of progress tracking, leading to requirements for completion percentages and achievement badges to improve engagement.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">5. Example: E-Learning Platform</text>
    <rect x="40" y="444" width="350" height="42" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="458" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Problem</text>
    <text x="50" y="472" font-family="Arial" font-size="8" fill="#333">Users abandon courses mid-way due to</text>
    <text x="50" y="482" font-family="Arial" font-size="8" fill="#333">lack of progress visibility</text>
    <rect x="405" y="444" width="355" height="42" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="415" y="458" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Solution Requirements</text>
    <text x="415" y="472" font-family="Arial" font-size="8" fill="#333">"System shall display course completion %"</text>
    <text x="415" y="482" font-family="Arial" font-size="8" fill="#333">"Users should earn badges after modules"</text>
  </g>
  
  <!-- step6: Best Practices -->
  <g class="step" id="step6" data-narration="Best practices include collaborating with stakeholders, applying empathy in user research, and using iterative design to refine requirements based on continuous stakeholder feedback and validation.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#1565c0" stroke-width="1" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">6. Best Practices &amp; Exam Tips</text>
    <rect x="40" y="534" width="220" height="48" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="548" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Best Practices</text>
    <text x="50" y="562" font-family="Arial" font-size="8" fill="#333">• Collaboration with stakeholders</text>
    <text x="50" y="574" font-family="Arial" font-size="8" fill="#333">• Empathy in user research</text>
    <text x="50" y="586" font-family="Arial" font-size="8" fill="#333">• Iterative design refinement</text>
    <rect x="275" y="534" width="220" height="48" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="285" y="548" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Exam Tips</text>
    <text x="285" y="562" font-family="Arial" font-size="8" fill="#333">• Differentiate functional vs UX</text>
    <text x="285" y="574" font-family="Arial" font-size="8" fill="#333">• Use CASE format for statements</text>
    <text x="285" y="586" font-family="Arial" font-size="8" fill="#333">• Remember Nielsen's 10 heuristics</text>
    <rect x="510" y="534" width="250" height="48" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="520" y="548" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Documentation Formats</text>
    <text x="520" y="562" font-family="Arial" font-size="8" fill="#333">• User stories with INVEST criteria</text>
    <text x="520" y="574" font-family="Arial" font-size="8" fill="#333">• Use case diagrams with UML</text>
    <text x="520" y="586" font-family="Arial" font-size="8" fill="#333">• Requirement traceability matrices</text>
  </g>
</svg>