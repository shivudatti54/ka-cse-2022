<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Methods for Requirement Extraction. This topic covers essential techniques used in software engineering to gather and document stakeholder needs.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Methods for Requirement Extraction</text>
  </g>
  
  <g class="step" id="step1" data-narration="Requirement extraction identifies stakeholder needs and bridges business objectives with technical implementation. It reduces rework and establishes clear project scope.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Requirement Extraction?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">• Identifies, analyzes, and documents system requirements</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">• Bridges business objectives with technical implementation</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">• Reduces development rework and establishes clear scope</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three primary methods are interviews, surveys, and workshops. Interviews involve structured Q&amp;A sessions with stakeholders. Surveys collect scalable quantitative data.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Primary Methods: Interviews, Surveys, Workshops</text>
    <rect x="40" y="178" width="220" height="40" fill="#c8e6c9" rx="5"/>
    <text x="50" y="192" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Interviews</text>
    <text x="50" y="206" font-family="Arial" font-size="8" fill="#333">Structured Q&amp;A with stakeholders</text>
    <rect x="270" y="178" width="220" height="40" fill="#c8e6c9" rx="5"/>
    <text x="280" y="192" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Surveys/Questionnaires</text>
    <text x="280" y="206" font-family="Arial" font-size="8" fill="#333">Scalable for large user groups</text>
    <rect x="500" y="178" width="260" height="40" fill="#c8e6c9" rx="5"/>
    <text x="510" y="192" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Workshops (JAD Sessions)</text>
    <text x="510" y="206" font-family="Arial" font-size="8" fill="#333">Collaborative group discussions</text>
  </g>
  
  <g class="step" id="step3" data-narration="Observation studies users in their natural work environment to find unstated needs. Document analysis reviews existing systems to identify implicit requirements.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Observation &amp; Document Analysis</text>
    <rect x="40" y="268" width="340" height="42" fill="#ffe0b2" rx="5"/>
    <text x="50" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Observation/Ethnography</text>
    <text x="50" y="296" font-family="Arial" font-size="9" fill="#333">Study users in natural environment</text>
    <text x="50" y="308" font-family="Arial" font-size="9" fill="#333">Identifies unarticulated needs</text>
    <rect x="390" y="268" width="370" height="42" fill="#ffe0b2" rx="5"/>
    <text x="400" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Document Analysis</text>
    <text x="400" y="296" font-family="Arial" font-size="9" fill="#333">Review existing manuals and legacy systems</text>
    <text x="400" y="308" font-family="Arial" font-size="9" fill="#333">Helps identify implicit requirements</text>
  </g>
  
  <g class="step" id="step4" data-narration="Prototyping creates mockups for early feedback. User stories use the format 'As a role, I want feature to benefit' in Agile projects.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Prototyping &amp; User Stories</text>
    <rect x="40" y="356" width="340" height="42" fill="#e1bee7" rx="5"/>
    <text x="50" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Prototyping</text>
    <text x="50" y="384" font-family="Arial" font-size="9" fill="#333">Throwaway vs Evolutionary types</text>
    <text x="50" y="396" font-family="Arial" font-size="9" fill="#333">Enables early user feedback</text>
    <rect x="390" y="356" width="370" height="42" fill="#e1bee7" rx="5"/>
    <text x="400" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">User Stories</text>
    <text x="400" y="384" font-family="Arial" font-size="9" fill="#333">Format: "As a [role], I want [feature]"</text>
    <text x="400" y="396" font-family="Arial" font-size="9" fill="#333">Captures user perspectives effectively</text>
  </g>
  
  <g class="step" id="step5" data-narration="Key prioritization techniques include MoSCoW method and Kano model. Compare methods: interviews for depth, surveys for breadth, observation for context.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Prioritization &amp; Comparison</text>
    <rect x="40" y="444" width="220" height="42" fill="#ffcdd2" rx="5"/>
    <text x="50" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">MoSCoW Method</text>
    <text x="50" y="472" font-family="Arial" font-size="9" fill="#333">Must/Should/Could/Won't have</text>
    <rect x="270" y="444" width="220" height="42" fill="#ffcdd2" rx="5"/>
    <text x="280" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Kano Model</text>
    <text x="280" y="472" font-family="Arial" font-size="9" fill="#333">Basic/Satisfaction/Excitement</text>
    <rect x="500" y="444" width="260" height="42" fill="#ffcdd2" rx="5"/>
    <text x="510" y="458" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Method Selection</text>
    <text x="510" y="472" font-family="Arial" font-size="9" fill="#333">Interviews: depth, Surveys: breadth</text>
  </g>
  
  <g class="step" id="step6" data-narration="For exams: compare any two methods, memorize IEEE 830 SRS standard, practice writing user stories with INVEST criteria. Focus on traceability matrix applications.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Takeaways</text>
    <text x="40" y="536" font-family="Arial" font-size="10" fill="#333">• Compare any two methods (e.g., Interviews vs Surveys)</text>
    <text x="40" y="550" font-family="Arial" font-size="10" fill="#333">• Memorize IEEE 830 standard for SRS documentation</text>
    <text x="40" y="564" font-family="Arial" font-size="10" fill="#333">• Practice user stories with INVEST criteria (Independent, Negotiable, Valuable, Estimable, Small, Testable)</text>
    <text x="40" y="578" font-family="Arial" font-size="10" fill="#333">• Know traceability matrix applications and requirement prioritization</text>
  </g>
</svg>