<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="Welcome to this lesson on extracting interaction design requirements for  CSE students. We'll explore user research, personas, and usability evaluation methods.">
<rect x="20" y="10" width="760" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Extracting Interaction Design Requirements</text>
</g>
<g class="step" id="step1" data-narration="User research methods include interviews for in-depth qualitative insights, surveys for large-scale quantitative data collection, and direct observation through ethnographic field studies of users.">
<rect x="20" y="58" width="760" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Step 1: User Research Methods</text>
<rect x="40" y="88" width="220" height="48" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
<text x="50" y="102" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Interviews</text>
<text x="50" y="116" font-family="Arial" font-size="9" fill="#2e7d32">Structured conversations to</text>
<text x="50" y="128" font-family="Arial" font-size="9" fill="#2e7d32">understand user pain points</text>
<rect x="270" y="88" width="220" height="48" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
<text x="280" y="102" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Surveys</text>
<text x="280" y="116" font-family="Arial" font-size="9" fill="#2e7d32">Quantitative data collection</text>
<text x="280" y="128" font-family="Arial" font-size="9" fill="#2e7d32">through questionnaires</text>
<rect x="500" y="88" width="220" height="48" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
<text x="510" y="102" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Observation</text>
<text x="510" y="116" font-family="Arial" font-size="9" fill="#2e7d32">Ethnographic studies of</text>
<text x="510" y="128" font-family="Arial" font-size="9" fill="#2e7d32">user behavior in context</text>
</g>
<g class="step" id="step2" data-narration="Personas are fictional user archetypes with demographics, goals, and motivations. Scenarios describe narrative user interactions while use cases define formal system-actor sequences for requirements.">
<rect x="20" y="151" width="760" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="40" y="171" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Step 2: Personas, Scenarios &amp; Use Cases</text>
<rect x="40" y="181" width="240" height="48" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
<text x="50" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#ef6c00">Personas</text>
<text x="50" y="209" font-family="Arial" font-size="9" fill="#ef6c00">Fictional user archetypes</text>
<text x="50" y="221" font-family="Arial" font-size="9" fill="#ef6c00">with demographics and goals</text>
<rect x="290" y="181" width="240" height="48" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
<text x="300" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#ef6c00">Scenarios</text>
<text x="300" y="209" font-family="Arial" font-size="9" fill="#ef6c00">Narrative descriptions: "As a</text>
<text x="300" y="221" font-family="Arial" font-size="9" fill="#ef6c00">student, I want to..."</text>
<rect x="540" y="181" width="220" height="48" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
<text x="550" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#ef6c00">Use Cases</text>
<text x="550" y="209" font-family="Arial" font-size="9" fill="#ef6c00">UML diagrams for system</text>
<text x="550" y="221" font-family="Arial" font-size="9" fill="#ef6c00">boundary definition</text>
</g>
<g class="step" id="step3" data-narration="WCAG accessibility guidelines require color contrast ratios of at least 4.5:1 for normal text and ensure screen reader compatibility across three conformance levels: A, AA, and AAA.">
<rect x="20" y="244" width="760" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="40" y="264" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">Step 3: Accessibility &amp; Information Architecture</text>
<rect x="40" y="274" width="360" height="48" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
<text x="50" y="288" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">WCAG Guidelines</text>
<text x="50" y="302" font-family="Arial" font-size="9" fill="#6a1b9a">Color contrast 4.5:1, screen readers,</text>
<text x="50" y="314" font-family="Arial" font-size="9" fill="#6a1b9a">three levels: A, AA, AAA</text>
<rect x="410" y="274" width="360" height="48" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
<text x="420" y="288" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Information Architecture</text>
<text x="420" y="302" font-family="Arial" font-size="9" fill="#6a1b9a">Card sorting for content org,</text>
<text x="420" y="314" font-family="Arial" font-size="9" fill="#6a1b9a">navigation flows &amp; sitemaps</text>
</g>
<g class="step" id="step4" data-narration="Key interaction design formulas include Fitts Law for predicting movement time, Hick-Hyman Law for decision time based on choices, and SUS score for measuring system usability.">
<rect x="20" y="337" width="760" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="40" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Step 4: Important Formulas &amp; Laws</text>
<rect x="40" y="367" width="240" height="48" rx="3" fill="#ffcdd2" stroke="#f44336"/>
<text x="50" y="381" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Fitts' Law</text>
<text x="50" y="395" font-family="Arial" font-size="9" fill="#b71c1c">MT = a + b log₂(1 + D/W)</text>
<text x="50" y="407" font-family="Arial" font-size="9" fill="#b71c1c">Movement time prediction</text>
<rect x="290" y="367" width="240" height="48" rx="3" fill="#ffcdd2" stroke="#f44336"/>
<text x="300" y="381" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">Hick-Hyman Law</text>
<text x="300" y="395" font-family="Arial" font-size="9" fill="#b71c1c">RT = a + b log₂(n)</text>
<text x="300" y="407" font-family="Arial" font-size="9" fill="#b71c1c">Decision time vs choices</text>
<rect x="540" y="367" width="220" height="48" rx="3" fill="#ffcdd2" stroke="#f44336"/>
<text x="550" y="381" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">SUS Score</text>
<text x="550" y="395" font-family="Arial" font-size="9" fill="#b71c1c">(Sum - 10) × 2.5</text>
<text x="550" y="407" font-family="Arial" font-size="9" fill="#b71c1c">System Usability Scale</text>
</g>
<g class="step" id="step5" data-narration="Nielsen's ten usability heuristics guide interface evaluation: visibility of system status, user control and freedom, consistency, error prevention, recognition over recall, flexibility, help with errors, and documentation.">
<rect x="20" y="430" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="40" y="450" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Step 5: Nielsen's 10 Usability Heuristics</text>
<rect x="40" y="460" width="145" height="48" rx="3" fill="#bbdefb" stroke="#1976d2"/>
<text x="48" y="474" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">1. Visibility of Status</text>
<text x="48" y="486" font-family="Arial" font-size="8" fill="#1565c0">System keeps user</text>
<text x="48" y="498" font-family="Arial" font-size="8" fill="#1565c0">informed</text>
<rect x="193" y="460" width="145" height="48" rx="3" fill="#bbdefb" stroke="#1976d2"/>
<text x="201" y="474" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">2. User Control</text>
<text x="201" y="486" font-family="Arial" font-size="8" fill="#1565c0">Exit, undo, redo</text>
<text x="201" y="498" font-family="Arial" font-size="8" fill="#1565c0">options available</text>
<rect x="346" y="460" width="145" height="48" rx="3" fill="#bbdefb" stroke="#1976d2"/>
<text x="354" y="474" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">3. Consistency</text>
<text x="354" y="486" font-family="Arial" font-size="8" fill="#1565c0">Platform &amp; internal</text>
<text x="354" y="498" font-family="Arial" font-size="8" fill="#1565c0">consistency</text>
<rect x="499" y="460" width="145" height="48" rx="3" fill="#bbdefb" stroke="#1976d2"/>
<text x="507" y="474" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">4. Error Prevention</text>
<text x="507" y="486" font-family="Arial" font-size="8" fill="#1565c0">Confirmation dialogs</text>
<text x="507" y="498" font-family="Arial" font-size="8" fill="#1565c0">for destructive actions</text>
<rect x="652" y="460" width="118" height="48" rx="3" fill="#bbdefb" stroke="#1976d2"/>
<text x="660" y="474" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">5. Recognition</text>
<text x="660" y="486" font-family="Arial" font-size="8" fill="#1565c0">Recall less, recognize</text>
<text x="660" y="498" font-family="Arial" font-size="8" fill="#1565c0">more</text>
</g>
<g class="step" id="step6" data-narration="Exam tips: differentiate functional vs interaction requirements, use MoSCoW prioritization, apply triangulation, and remember 5 test users find 80% of usability issues.">
<rect x="20" y="523" width="760" height="65" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="40" y="543" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">Step 6: Exam Tips &amp; Key Points</text>
<text x="40" y="562" font-family="Arial" font-size="10" fill="#2e7d32">• Process: Research → Analyze → Document → Validate</text>
<text x="280" y="562" font-family="Arial" font-size="10" fill="#2e7d32">• MoSCoW: Must, Should, Could, Won't have</text>
<text x="540" y="562" font-family="Arial" font-size="10" fill="#2e7d32">• 5 users find 80% issues (Nielsen)</text>
</g>
</svg>