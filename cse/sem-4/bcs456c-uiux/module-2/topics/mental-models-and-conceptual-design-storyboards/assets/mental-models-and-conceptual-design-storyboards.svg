<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Mental Models and Conceptual Design Storyboards - essential tools for user-centered software design in HCI courses, helping students create intuitive interfaces.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Mental Models &amp; Conceptual Design Storyboards</text>
  </g>

  <!-- step1: Mental Models -->
  <g class="step" id="step1" data-narration="Mental models are cognitive frameworks users develop to understand system interaction, with three key components: affordances, constraints, and mapping for intuitive design.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Mental Models</text>
    <text x="40" y="90" font-family="Arial" font-size="10" fill="#333">User's internal understanding of how a system works, shaped by experiences</text>
    <rect x="40" y="100" width="220" height="30" fill="#e3f2fd" rx="3"/>
    <text x="50" y="112" font-family="Arial" font-size="9" fill="#1976d2">Affordances (perceived actions)</text>
    <text x="180" y="112" font-family="Arial" font-size="9" fill="#1976d2">Constraints (limitations)</text>
    <rect x="270" y="100" width="220" height="30" fill="#e3f2fd" rx="3"/>
    <text x="280" y="112" font-family="Arial" font-size="9" fill="#1976d2">Mapping (relationship controls)</text>
    <text x="400" y="112" font-family="Arial" font-size="9" fill="#1976d2">Types: System model vs User model</text>
  </g>

  <!-- step2: Conceptual Design -->
  <g class="step" id="step2" data-narration="Conceptual design translates mental models into high-level system blueprints, focusing on user goals through flow, artifact, and physical models for effective UX.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="163" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Conceptual Design</text>
    <text x="40" y="178" font-family="Arial" font-size="10" fill="#333">High-level system representation focusing on user goals, created before wireframing</text>
    <rect x="40" y="188" width="230" height="30" fill="#e8f5e9" rx="3"/>
    <text x="50" y="200" font-family="Arial" font-size="9" fill="#388e3c">Flow Models (processes)</text>
    <text x="190" y="200" font-family="Arial" font-size="9" fill="#388e3c">Artifact Models (objects)</text>
    <rect x="280" y="188" width="200" height="30" fill="#e8f5e9" rx="3"/>
    <text x="290" y="200" font-family="Arial" font-size="9" fill="#388e3c">Physical Models (environment)</text>
    <text x="500" y="200" font-family="Arial" font-size="9" fill="#388e3c">Created via: Card sorting, User journeys</text>
  </g>

  <!-- step3: Storyboards -->
  <g class="step" id="step3" data-narration="Storyboards are sequential visual narratives showing user-system interactions with actors, scenes, actions, and annotations in both linear and branching types for clarity.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="251" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Storyboards</text>
    <text x="40" y="266" font-family="Arial" font-size="10" fill="#333">Sequential visual narratives depicting user interactions with the proposed solution</text>
    <rect x="40" y="276" width="180" height="30" fill="#fff3e0" rx="3"/>
    <text x="50" y="288" font-family="Arial" font-size="9" fill="#ff9800">ACTORS: Actors, Context</text>
    <text x="130" y="288" font-family="Arial" font-size="9" fill="#ff9800">Tasks, Objects</text>
    <rect x="230" y="276" width="150" height="30" fill="#fff3e0" rx="3"/>
    <text x="240" y="288" font-family="Arial" font-size="9" fill="#ff9800">Relationships, Sequence</text>
    <text x="400" y="288" font-family="Arial" font-size="9" fill="#333">Types:</text>
    <rect x="450" y="276" width="80" height="15" fill="#ffcc80" rx="2"/>
    <text x="490" y="287" font-family="Arial" font-size="8" fill="#333">Linear</text>
    <rect x="540" y="276" width="90" height="15" fill="#ffcc80" rx="2"/>
    <text x="585" y="287" font-family="Arial" font-size="8" fill="#333">Branching</text>
  </g>

  <!-- step4: Relationship Triangle -->
  <g class="step" id="step4" data-narration="The three components form a relationship triangle where mental models inform conceptual design, which guides storyboard creation to validate user understanding effectively.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="339" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Relationship Triangle</text>
    <polygon points="400,355 300,395 500,395" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="365" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Mental Models</text>
    <text x="320" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Inform</text>
    <text x="480" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Guide</text>
    <polygon points="400,355 500,315 300,315" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="330" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Conceptual Design</text>
    <text x="520" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Validates</text>
    <polygon points="250,375 180,355 180,395" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="215" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Storyboards</text>
  </g>

  <!-- step5: Banking App Example -->
  <g class="step" id="step5" data-narration="Banking app example shows five storyboard frames demonstrating a complete user flow: fingerprint login, transfer button, recipient selection, OTP verification, and success confirmation.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="427" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. Example: Banking App Storyboard</text>
    <rect x="40" y="436" width="120" height="45" fill="#ffebee" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="100" y="448" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Frame 1</text>
    <text x="100" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Fingerprint</text>
    <text x="100" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Login</text>
    <rect x="170" y="436" width="120" height="45" fill="#ffebee" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="230" y="448" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Frame 2</text>
    <text x="230" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Transfer</text>
    <text x="230" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Button</text>
    <rect x="300" y="436" width="120" height="45" fill="#ffebee" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="360" y="448" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Frame 3</text>
    <text x="360" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Auto-filled</text>
    <text x="360" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Recipients</text>
    <rect x="430" y="436" width="120" height="45" fill="#ffebee" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="490" y="448" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Frame 4</text>
    <text x="490" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">OTP</text>
    <text x="490" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Verification</text>
    <rect x="560" y="436" width="120" height="45" fill="#ffebee" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="620" y="448" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Frame 5</text>
    <text x="620" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Success</text>
    <text x="620" y="472" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Animation</text>
    <line x1="160" y1="458" x2="170" y2="458" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="290" y1="458" x2="300" y2="458" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="420" y1="458" x2="430" y2="458" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="550" y1="458" x2="560" y2="458" stroke="#f44336" stroke-width="1" marker-end="url(#arrow)"/>
  </g>

  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="For exams: differentiate system vs user models, remember the ACTORS framework, create five or more annotated frames, and follow the ten-mark question structure carefully.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#607d8b" stroke-width="2" rx="5"/>
    <text x="40" y="515" font-family="Arial" font-size="13" font-weight="bold" fill="#607d8b">6. Exam Tips</text>
    <rect x="40" y="525" width="340" height="55" fill="#eceff1" rx="3"/>
    <text x="50" y="538" font-family="Arial" font-size="9" fill="#333">• Differentiate system model vs user mental model</text>
    <text x="50" y="550" font-family="Arial" font-size="9" fill="#333">• Use ACTORS: Actors, Context, Tasks, Objects,</text>
    <text x="50" y="560" font-family="Arial" font-size="9" fill="#333">  Relationships, Sequence</text>
    <text x="50" y="572" font-family="Arial" font-size="9" fill="#333">• Include 5+ frames with annotations in storyboards</text>
    <rect x="390" y="525" width="380" height="55" fill="#eceff1" rx="3"/>
    <text x="400" y="538" font-family="Arial" font-size="9" fill="#333">• 10-mark structure: Problem → Mental Model → Design →</text>
    <text x="400" y="550" font-family="Arial" font-size="9" fill="#333">  Storyboard → Validation</text>
    <text x="400" y="562" font-family="Arial" font-size="9" fill="#333">• Reference: Don Norman (Mental Models), Cooper</text>
    <text x="400" y="574" font-family="Arial" font-size="9" fill="#333">• Remember: These tools are iterative, not linear</text>
  </g>
</svg>