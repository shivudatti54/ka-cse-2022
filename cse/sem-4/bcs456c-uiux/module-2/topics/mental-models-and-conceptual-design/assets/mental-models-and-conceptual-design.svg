<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Mental models represent users' internal understanding of how systems work. Conceptual design translates these mental models into interactive system blueprints for effective user-centered development.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
<text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Mental Models and Conceptual Design</text>
</g>

<g class="step" id="step1" data-narration="A mental model is a user's cognitive framework for system interaction, shaped by past experiences and expectations about cause-effect relationships.">
<rect x="20" y="58" width="760" height="82" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">1. Mental Models</text>
<rect x="40" y="88" width="180" height="42" fill="#e3f2fd" rx="4"/>
<text x="130" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">User's Internal</text>
<text x="130" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Understanding</text>
<line x1="220" y1="109" x2="250" y2="109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="260" y="88" width="200" height="42" fill="#e8f5e9" rx="4"/>
<text x="360" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Cognitive Framework</text>
<text x="360" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">for Interaction</text>
<line x1="460" y1="109" x2="490" y2="109" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="500" y="88" width="260" height="42" fill="#fff3e0" rx="4"/>
<text x="630" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Example: Underlined Text</text>
<text x="630" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">is Clickable (Web Convention)</text>
</g>

<g class="step" id="step2" data-narration="Conceptual design creates high-level system organization including information architecture, interaction patterns, and navigation models, developed through user personas, stories, and realistic scenarios.">
<rect x="20" y="148" width="760" height="97" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">2. Conceptual Design</text>
<rect x="40" y="182" width="220" height="40" fill="#e3f2fd" rx="4"/>
<text x="150" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Information</text>
<text x="150" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Architecture</text>
<rect x="270" y="182" width="220" height="40" fill="#e8f5e9" rx="4"/>
<text x="380" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Interaction</text>
<text x="380" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Patterns</text>
<rect x="500" y="182" width="260" height="40" fill="#fff3e0" rx="4"/>
<text x="630" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Navigation</text>
<text x="630" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Models</text>
<text x="400" y="238" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Created through: Personas, User Stories, Scenario-based Design</text>
</g>

<g class="step" id="step3" data-narration="Affordances indicate perceived action possibilities that users recognize in interface elements. Mapping shows clear control-effect relationships between user actions and system responses. Both principles help align design with user mental models for intuitive interaction.">
<rect x="20" y="253" width="760" height="97" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="273" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">3. Design Principles: Affordances &amp; Mapping</text>
<rect x="40" y="287" width="340" height="40" fill="#f3e5f5" rx="4"/>
<text x="210" y="303" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Affordances</text>
<text x="210" y="317" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Perceived action possibilities</text>
<rect x="400" y="287" width="360" height="40" fill="#fce4ec" rx="4"/>
<text x="580" y="303" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c2185b">Mapping</text>
<text x="580" y="317" text-anchor="middle" font-family="Arial" font-size="9" fill="#c2185b">Control-Effect Relationships</text>
<text x="400" y="343" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Affordance Example: Button shape suggests clickability | Mapping Example: Oven knob matches burner positions</text>
</g>

<g class="step" id="step4" data-narration="Prototyping has two distinct types: low-fidelity wireframes for early concept validation and quick iteration, and high-fidelity interactive mockups for detailed user testing and realistic feedback before final development.">
<rect x="20" y="358" width="760" height="97" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="378" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">4. Prototyping Fidelity</text>
<rect x="40" y="392" width="345" height="40" fill="#e3f2fd" rx="4"/>
<text x="212" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Low-Fidelity</text>
<text x="212" y="424" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Wireframes (Paper/Digital)</text>
<rect x="395" y="392" width="365" height="40" fill="#e8f5e9" rx="4"/>
<text x="577" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">High-Fidelity</text>
<text x="577" y="424" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Interactive Mockups</text>
<text x="400" y="448" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Low-fidelity validates mental models early | High-fidelity tests detailed interactions before development</text>
</g>

<g class="step" id="step5" data-narration="ATM redesign example: identified user mental model of linear withdrawal flow, made withdrawal primary, added progress indicator, validated with paper prototypes.">
<rect x="20" y="463" width="760" height="82" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="483" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Example 1: ATM Interface Redesign</text>
<rect x="40" y="497" width="175" height="40" fill="#ffebee" rx="4"/>
<text x="127" y="513" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Problem</text>
<text x="127" y="527" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Confusion, Cancellations</text>
<rect x="225" y="497" width="175" height="40" fill="#fff3e0" rx="4"/>
<text x="312" y="513" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Mental Model</text>
<text x="312" y="527" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Withdrawal-first Flow</text>
<rect x="410" y="497" width="175" height="40" fill="#e8f5e9" rx="4"/>
<text x="497" y="513" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Solution</text>
<text x="497" y="527" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Primary Withdrawal Button</text>
<rect x="595" y="497" width="165" height="40" fill="#e3f2fd" rx="4"/>
<text x="677" y="513" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Validation</text>
<text x="677" y="527" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Paper Prototypes</text>
</g>

<g class="step" id="step6" data-narration="E-Learning platform example: discovered users had a book-like navigation mental model, added chapter tree structure and progress tracker, successfully reducing course dropout rates by 35 percent through improved user experience.">
<rect x="20" y="553" width="760" height="42" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="573" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Example 2: E-Learning Platform Navigation</text>
</g>
</svg>