<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers how digital interfaces intentionally guide user actions and decisions using psychological principles for better engagement outcomes and user satisfaction.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Design Influencing User Behaviour</text>
  </g>
  
  <g class="step" id="step1" data-narration="Persuasive Technology uses three key principles: Reduction simplifies user actions, Tunneling provides guided experiences, and Tailoring personalizes content for individual needs.">
    <rect x="10" y="58" width="780" height="82" fill="#e3f2fd" rx="8"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Persuasive Technology Principles</text>
    <rect x="25" y="85" width="240" height="45" fill="#1976d2" rx="4"/>
    <text x="145" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Reduction</text>
    <text x="145" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Simplifies actions</text>
    <rect x="280" y="85" width="240" height="45" fill="#1976d2" rx="4"/>
    <text x="400" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Tunneling</text>
    <text x="400" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Guided sequences</text>
    <rect x="535" y="85" width="240" height="45" fill="#1976d2" rx="4"/>
    <text x="655" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Tailoring</text>
    <text x="655" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Personalized content</text>
  </g>
  
  <g class="step" id="step2" data-narration="Fogg's Behavior Model states Behavior equals Motivation plus Ability plus Trigger, and all three elements must converge simultaneously for user action to occur.">
    <rect x="10" y="148" width="780" height="98" fill="#e8f5e9" rx="8"/>
    <text x="25" y="167" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Fogg's Behavior Model (B = M + A + T)</text>
    <circle cx="145" cy="213" r="28" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
    <text x="145" y="208" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Motivation</text>
    <text x="145" y="221" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Desire to act</text>
    <line x1="173" y1="213" x2="227" y2="213" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="267" cy="213" r="28" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
    <text x="267" y="208" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Ability</text>
    <text x="267" y="221" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Easy to do</text>
    <line x1="295" y1="213" x2="349" y2="213" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="389" cy="213" r="28" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
    <text x="389" y="208" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Trigger</text>
    <text x="389" y="221" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Prompt to act</text>
    <rect x="530" y="183" width="245" height="50" fill="#2e7d32" rx="4"/>
    <text x="652" y="208" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">BEHAVIOR</text>
    <text x="652" y="224" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8e6c9">All three must converge</text>
  </g>
  
  <g class="step" id="step3" data-narration="Three powerful cognitive biases in design: Anchoring uses initial information to shape decisions, Scarcity creates urgency through limited availability, and Social Proof leverages user activity.">
    <rect x="10" y="254" width="780" height="82" fill="#fff3e0" rx="8"/>
    <text x="25" y="273" font-family="Arial" font-size="12" font-weight="bold" fill="#f57c00">Cognitive Biases in UX Design</text>
    <rect x="25" y="286" width="240" height="42" fill="#ff9800" rx="4"/>
    <text x="145" y="303" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Anchoring Effect</text>
    <text x="145" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Initial info influences decisions</text>
    <rect x="280" y="286" width="240" height="42" fill="#ff9800" rx="4"/>
    <text x="400" y="303" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Scarcity Principle</text>
    <text x="400" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Limited offers create urgency</text>
    <rect x="535" y="286" width="240" height="42" fill="#ff9800" rx="4"/>
    <text x="655" y="303" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Social Proof</text>
    <text x="655" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Display user activity/trust</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Hook Model creates habits through four phases: Trigger initiates action, Action is the user behavior, Variable Reward provides excitement, and Investment builds long-term loyalty.">
    <rect x="10" y="344" width="780" height="82" fill="#f3e5f5" rx="8"/>
    <text x="25" y="363" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">The Hook Model (Habit Formation)</text>
    <rect x="25" y="376" width="180" height="42" fill="#9c27b0" rx="4"/>
    <text x="115" y="394" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">1. Trigger</text>
    <text x="115" y="409" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Prompt to act</text>
    <line x1="205" y1="397" x2="235" y2="397" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="245" y="376" width="180" height="42" fill="#9c27b0" rx="4"/>
    <text x="335" y="394" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">2. Action</text>
    <text x="335" y="409" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">User behavior</text>
    <line x1="425" y1="397" x2="455" y2="397" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="465" y="376" width="180" height="42" fill="#9c27b0" rx="4"/>
    <text x="555" y="394" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">3. Variable Reward</text>
    <text x="555" y="409" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Exciting surprise</text>
    <line x1="645" y1="397" x2="675" y2="397" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="685" y="376" width="90" height="42" fill="#9c27b0" rx="4"/>
    <text x="730" y="394" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">4. Invest</text>
    <text x="730" y="409" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Build value</text>
  </g>
  
  <g class="step" id="step5" data-narration="Ethical design distinguishes dark patterns from benevolent nudges: dark patterns deceive users into unwanted actions while nudges help without manipulation, preserving user autonomy and informed consent.">
    <rect x="10" y="434" width="780" height="82" fill="#ffebee" rx="8"/>
    <text x="25" y="453" font-family="Arial" font-size="12" font-weight="bold" fill="#d32f2f">Ethical Considerations</text>
    <rect x="25" y="466" width="350" height="42" fill="#f44336" rx="4"/>
    <text x="200" y="484" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Dark Patterns (Avoid)</text>
    <text x="200" y="499" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Deceptive UI tricks users into unwanted actions</text>
    <rect x="390" y="466" width="385" height="42" fill="#388e3c" rx="4"/>
    <text x="582" y="484" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Benevolent Nudges (Use)</text>
    <text x="582" y="499" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Helpful prompts that preserve user freedom</text>
  </g>
  
  <g class="step" id="step6" data-narration="Real-world examples show these techniques: Social media uses infinite scroll and FOMO notifications; E-commerce displays stock indicators and progress bars; Fitness apps leverage streaks and rewards.">
    <rect x="10" y="524" width="780" height="70" fill="#e0e0e0" rx="8"/>
    <text x="25" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Real-World Applications</text>
    <rect x="25" y="554" width="240" height="34" fill="#1976d2" rx="4"/>
    <text x="145" y="569" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Social Media</text>
    <text x="145" y="582" text-anchor="middle" font-family="Arial" font-size="7" fill="#e3f2fd">Infinite scroll, FOMO notifications</text>
    <rect x="280" y="554" width="240" height="34" fill="#ff9800" rx="4"/>
    <text x="400" y="569" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">E-Commerce</text>
    <text x="400" y="582" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff3e0">Stock alerts, checkout progress</text>
    <rect x="535" y="554" width="240" height="34" fill="#4caf50" rx="4"/>
    <text x="655" y="569" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Fitness Apps</text>
    <text x="655" y="582" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Streaks, rewards, challenges</text>
  </g>
</svg>