<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about Sketching in Computer Science - efficient probabilistic data structures for big data stream processing problems with accuracy guarantees.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Sketching in Computer Science</text>
  </g>
  
  <g class="step" id="step1" data-narration="Sketching provides space-efficient probabilistic data structures that enable approximate solutions for big data analysis and streaming applications with minimal memory usage.">
    <rect x="10" y="58" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is Sketching?</text>
    <text x="30" y="100" font-family="Arial" font-size="11" fill="#333">Space-efficient probabilistic data structures enabling approximate solutions to complex</text>
    <text x="30" y="116" font-family="Arial" font-size="11" fill="#333">computational problems in big data and streaming scenarios.</text>
    <rect x="550" y="75" width="200" height="50" fill="#e3f2fd" rx="5"/>
    <text x="650" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Trade-off:</text>
    <text x="650" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Accuracy ↔ Space</text>
  </g>
  
  <g class="step" id="step2" data-narration="Bloom Filter is a probabilistic membership testing structure using multiple hash functions. It may have false positives but never false negatives.">
    <rect x="10" y="146" width="780" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="30" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Bloom Filter</text>
    <text x="30" y="188" font-family="Arial" font-size="11" fill="#333">Probabilistic structure for membership queries using multiple hash functions.</text>
    <text x="30" y="204" font-family="Arial" font-size="11" fill="#333">False positives possible, FALSE NEGATIVES impossible.</text>
    <rect x="250" y="160" width="120" height="55" fill="#e8f5e9" rx="5"/>
    <text x="310" y="182" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Applications:</text>
    <text x="310" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Spell Checkers</text>
    <text x="310" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Network Routers</text>
  </g>
  
  <g class="step" id="step3" data-narration="Count-Min Sketch estimates element frequencies in data streams using a 2D array with hash functions, providing strong approximation guarantees for frequency analysis.">
    <rect x="10" y="234" width="780" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="30" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Count-Min Sketch</text>
    <text x="30" y="276" font-family="Arial" font-size="11" fill="#333">Streaming frequency estimation tool using 2D array with hash functions.</text>
    <text x="30" y="292" font-family="Arial" font-size="11" fill="#333">Provides (ε, δ)-approximation guarantees. Take MIN across all hash functions.</text>
    <rect x="400" y="250" width="180" height="55" fill="#fff3e0" rx="5"/>
    <text x="490" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Used For:</text>
    <text x="490" y="288" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Trend Detection</text>
    <text x="490" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Heavy Hitters</text>
  </g>
  
  <g class="step" id="step4" data-narration="HyperLogLog estimates cardinality or unique count using advanced probabilistic counting with harmonic mean, achieving remarkably efficient O(log log n) space complexity.">
    <rect x="10" y="322" width="780" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="30" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">HyperLogLog</text>
    <text x="30" y="364" font-family="Arial" font-size="11" fill="#333">Cardinality estimation algorithm using probabilistic counting with harmonic mean.</text>
    <text x="30" y="380" font-family="Arial" font-size="11" fill="#333">Achieves O(log log n) space complexity. Error ≈ 1.04/√m.</text>
    <rect x="400" y="335" width="180" height="55" fill="#f3e5f5" rx="5"/>
    <text x="490" y="357" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Applied In:</text>
    <text x="490" y="373" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Unique Visitors</text>
    <text x="490" y="387" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Distributed Analytics</text>
  </g>
  
  <g class="step" id="step5" data-narration="Example: Bloom filter with 3 hash functions and 10-bit array. After inserting 5 and 7, checking 5 returns probably present since all hashed positions are set.">
    <rect x="10" y="410" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Example: Bloom Filter</text>
    <text x="30" y="452" font-family="Arial" font-size="11" fill="#333">3 hash functions, 10-bit array. Insert 5: h1=5, h2=5, h3=8 → set bits 5,5,8</text>
    <text x="30" y="468" font-family="Arial" font-size="11" fill="#333">Insert 7: h1=7, h2=9, h3=0 → set bits 7,9,0. Check 5: bits 5,5,8 all set → Probably present</text>
    <rect x="520" y="425" width="250" height="55" fill="#e3f2fd" rx="5"/>
    <text x="645" y="445" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Final Bit Array:</text>
    <text x="645" y="465" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">1 0 0 0 0 1 0 1 1 1</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam points: Bloom has no false negatives. Count-Min uses minimum estimate. HyperLogLog error formula. Use Counting Bloom for deletions.">
    <rect x="10" y="498" width="780" height="90" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="30" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Exam Tips</text>
    <text x="30" y="542" font-family="Arial" font-size="10" fill="#333">1. Bloom filters: NO false negatives, CANNOT delete (use Counting Bloom)</text>
    <text x="30" y="558" font-family="Arial" font-size="10" fill="#333">2. Count-Min Sketch: MIN value across hash functions gives best estimate</text>
    <text x="30" y="574" font-family="Arial" font-size="10" fill="#333">3. HyperLogLog error: ≈ 1.04/√m where m = number of registers</text>
    <rect x="450" y="525" width="320" height="55" fill="#ffebee" rx="5"/>
    <text x="610" y="545" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Formula:</text>
    <text x="610" y="562" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Bloom FP: (1-e^(-kn/m))^k</text>
    <text x="610" y="577" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Count-Min: min across all rows</text>
  </g>
</svg>