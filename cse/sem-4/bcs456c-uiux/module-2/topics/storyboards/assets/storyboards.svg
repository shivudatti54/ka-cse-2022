<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Storyboards are visual representations showing user interactions with a system through sequential illustrations, helping designers map out user flows and experiences.">
    <rect x="10" y="10" width="780" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Storyboards in UX Design</text>
  </g>

  <!-- step1: What is a Storyboard -->
  <g class="step" id="step1" data-narration="A storyboard displays sequential panels where each frame shows a specific interface state or user action during interaction, creating a visual narrative of the user journey.">
    <rect x="10" y="58" width="780" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is a Storyboard?</text>
    <rect x="25" y="88" width="100" height="40" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Panel 1</text>
    <text x="75" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">User clicks</text>
    <path d="M135,108 L165,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="175" y="88" width="100" height="40" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="225" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Panel 2</text>
    <text x="225" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Form appears</text>
    <path d="M285,108 L315,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="325" y="88" width="100" height="40" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="375" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Panel 3</text>
    <text x="375" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">User submits</text>
    <path d="M435,108 L465,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="475" y="88" width="100" height="40" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="2"/>
    <text x="525" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Panel 4</text>
    <text x="525" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Success!</text>
    <text x="600" y="108" font-family="Arial" font-size="9" fill="#666">Sequential flow of user</text>
    <text x="600" y="122" font-family="Arial" font-size="9" fill="#666">interactions with system</text>
  </g>

  <!-- step2: Key Components -->
  <g class="step" id="step2" data-narration="Key storyboard elements include panels as frames showing interface states, transitions as arrows indicating flow, annotations as text descriptions, and hotspots showing interactive areas.">
    <rect x="10" y="146" width="780" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="25" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key Components</text>
    <rect x="25" y="180" width="140" height="35" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="95" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Panel</text>
    <text x="95" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Single frame</text>
    <rect x="175" y="180" width="140" height="35" rx="4" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="245" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Transition</text>
    <text x="245" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Arrow flow</text>
    <rect x="325" y="180" width="140" height="35" rx="4" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="395" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Annotation</text>
    <text x="395" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Text notes</text>
    <rect x="475" y="180" width="140" height="35" rx="4" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="545" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Hotspot</text>
    <text x="545" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Click area</text>
    <text x="630" y="195" font-family="Arial" font-size="9" fill="#666">User action triggers</text>
    <text x="630" y="207" font-family="Arial" font-size="9" fill="#666">system response</text>
  </g>

  <!-- step3: E-Commerce Example -->
  <g class="step" id="step3" data-narration="An e-commerce checkout storyboard shows panels: cart page, shipping form, address entry, payment options, card submission, and order confirmation page.">
    <rect x="10" y="234" width="780" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="25" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Example: E-Commerce Checkout</text>
    <rect x="25" y="268" width="65" height="35" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="57" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cart</text>
    <path d="M95,285 L115,285" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="120" y="268" width="65" height="35" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="152" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Shipping</text>
    <path d="M190,285 L210,285" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="215" y="268" width="65" height="35" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="247" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Address</text>
    <path d="M285,285 L305,285" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="310" y="268" width="65" height="35" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="342" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Payment</text>
    <path d="M380,285 L400,285" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="405" y="268" width="65" height="35" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="437" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Submit</text>
    <path d="M475,285 L495,285" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="500" y="268" width="65" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="532" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Confirm</text>
    <text x="580" y="285" font-family="Arial" font-size="9" fill="#666">6-panel checkout flow</text>
  </g>

  <!-- step4: Mobile Onboarding -->
  <g class="step" id="step4" data-narration="Mobile app onboarding typically includes welcome screen, permission request, profile creation, dashboard display, and feature tooltips for guiding new users through the app.">
    <rect x="10" y="322" width="780" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="25" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Example: Mobile App Onboarding</text>
    <rect x="25" y="356" width="55" height="35" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="52" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Welcome</text>
    <path d="M85,373 L105,373" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="110" y="356" width="55" height="35" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="137" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Permission</text>
    <path d="M170,373 L190,373" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="195" y="356" width="55" height="35" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="222" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Profile</text>
    <path d="M255,373 L275,373" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="280" y="356" width="55" height="35" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="307" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Dashboard</text>
    <path d="M340,373 L360,373" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="365" y="356" width="55" height="35" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="392" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Tooltip</text>
    <text x="435" y="375" font-family="Arial" font-size="9" fill="#666">5-step onboarding sequence</text>
  </g>

  <!-- step5: Best Practices -->
  <g class="step" id="step5" data-narration="Follow the 3-click rule ensuring users reach key features within three interactions. Apply Hicks Law for fewer choices and Fitts Law for larger clickable targets.">
    <rect x="10" y="410" width="780" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="25" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Best Practices &amp; Rules</text>
    <rect x="25" y="445" width="180" height="35" rx="4" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="115" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">3-Click Rule</text>
    <text x="115" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Key features in 3 clicks</text>
    <rect x="215" y="445" width="180" height="35" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="305" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Hick's Law</text>
    <text x="305" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">More choices = slower decisions</text>
    <rect x="405" y="445" width="180" height="35" rx="4" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="495" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Fitts' Law</text>
    <text x="495" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Larger buttons are easier</text>
    <rect x="595" y="445" width="180" height="35" rx="4" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="685" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">One Action</text>
    <text x="685" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">One interaction per panel</text>
  </g>

  <!-- step6: Tools & Exam Tips -->
  <g class="step" id="step6" data-narration="Use Balsamiq, Figma, or Adobe XD for creating digital storyboards. Practice converting user stories to 6-panel sequences for exams to ensure success in assessments.">
    <rect x="10" y="498" width="780" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Tools &amp; Exam Preparation</text>
    <rect x="25" y="535" width="100" height="40" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="553" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Balsamiq</text>
    <rect x="135" y="535" width="100" height="40" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="185" y="553" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Figma</text>
    <rect x="245" y="535" width="100" height="40" rx="4" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="295" y="553" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Adobe XD</text>
    <text x="360" y="548" font-family="Arial" font-size="9" fill="#666">Digital tools for</text>
    <text x="360" y="562" font-family="Arial" font-size="9" fill="#666">storyboard creation</text>
    <rect x="25" y="585" width="760" height="0" fill="none"/>
    <text x="460" y="548" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Exam Tips:</text>
    <text x="460" y="562" font-family="Arial" font-size="9" fill="#666">• Focus on clarity - one action per panel</text>
    <text x="460" y="576" font-family="Arial" font-size="9" fill="#666">• Show error states and exceptional flows</text>
    <text x="640" y="576" font-family="Arial" font-size="9" fill="#666">• Practice user story to storyboard conversion</text>
  </g>
</svg>