<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Design perspectives in software engineering provide multiple viewpoints for analyzing and modeling complex systems from different angles throughout the development lifecycle.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff">Design Perspectives in Software Engineering</text>
  </g>
  
  <g class="step" id="step1" data-narration="The three primary perspectives serve distinct purposes: structural analysis focuses on components and relationships, behavioral design captures dynamic interactions and workflows, while deployment planning addresses hardware and infrastructure requirements for implementation.">
    <rect x="20" y="58" width="760" height="85" fill="#ffffff" stroke="#e0e0e0" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Three Design Perspectives</text>
    
    <rect x="40" y="90" width="220" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="150" y="108" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">STRUCTURAL</text>
    <text x="150" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Components &amp; relationships</text>
    
    <rect x="290" y="90" width="220" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="400" y="108" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">BEHAVIORAL</text>
    <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Interactions &amp; workflows</text>
    
    <rect x="540" y="90" width="220" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="650" y="108" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">DEPLOYMENT</text>
    <text x="650" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Hardware &amp; infrastructure</text>
  </g>
  
  <g class="step" id="step2" data-narration="The structural perspective employs UML class diagrams to represent modules, inheritance hierarchies, and interface definitions, providing a comprehensive framework for organizing code structure and establishing clear relationships between system components during development.">
    <rect x="20" y="151" width="760" height="85" fill="#ffffff" stroke="#e0e0e0" rx="5"/>
    <text x="40" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Structural Perspective - Class Diagrams</text>
    
    <rect x="40" y="185" width="300" height="40" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="190" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Class diagrams show attributes,</text>
    <text x="190" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">methods &amp; relationships</text>
    
    <rect x="360" y="185" width="200" height="40" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="460" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Package diagrams for</text>
    <text x="460" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">module organization</text>
    
    <rect x="580" y="185" width="180" height="40" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="670" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Design patterns like</text>
    <text x="670" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">MVC, Adapter, Facade</text>
  </g>
  
  <g class="step" id="step3" data-narration="The behavioral perspective models dynamic system behavior through sequence diagrams illustrating object interactions, state machines tracking entity transitions, and use case realizations demonstrating how users accomplish specific goals within the system architecture.">
    <rect x="20" y="244" width="760" height="85" fill="#ffffff" stroke="#e0e0e0" rx="5"/>
    <text x="40" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Behavioral Perspective - Interaction Diagrams</text>
    
    <rect x="40" y="278" width="250" height="40" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="165" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Sequence diagrams for</text>
    <text x="165" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">message passing flow</text>
    
    <rect x="310" y="278" width="230" height="40" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="425" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">State transition diagrams</text>
    <text x="425" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">showing object states</text>
    
    <rect x="560" y="278" width="200" height="40" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="660" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Use case realizations</text>
    <text x="660" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">and workflow modeling</text>
  </g>
  
  <g class="step" id="step4" data-narration="The deployment perspective addresses physical implementation by mapping software components to hardware resources, designing network topology for connectivity, and evaluating cloud versus on-premise infrastructure options for scalable system performance.">
    <rect x="20" y="337" width="760" height="85" fill="#ffffff" stroke="#e0e0e0" rx="5"/>
    <text x="40" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Deployment Perspective - Physical Architecture</text>
    
    <rect x="40" y="371" width="230" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="155" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Hardware-software</text>
    <text x="155" y="401" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">mapping &amp; allocation</text>
    
    <rect x="290" y="371" width="230" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="405" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Network topology &amp;</text>
    <text x="405" y="401" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">connectivity design</text>
    
    <rect x="540" y="371" width="220" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="650" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cloud vs on-premise</text>
    <text x="650" y="401" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">deployment strategies</text>
  </g>
  
  <g class="step" id="step5" data-narration="Cross-cutting concerns like security, logging, performance optimization, and error handling permeate all architectural perspectives and require aspect-oriented programming solutions to maintain modularity across the entire system design.">
    <rect x="20" y="430" width="760" height="85" fill="#ffffff" stroke="#e0e0e0" rx="5"/>
    <text x="40" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Cross-Cutting Concerns</text>
    
    <rect x="40" y="464" width="170" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="125" y="481" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Security</text>
    <text x="125" y="494" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Authentication, encryption</text>
    
    <rect x="230" y="464" width="170" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="315" y="481" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Logging</text>
    <text x="315" y="494" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Audit trails, diagnostics</text>
    
    <rect x="420" y="464" width="170" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="505" y="481" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Performance</text>
    <text x="505" y="494" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Optimization, caching</text>
    
    <rect x="610" y="464" width="150" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="685" y="481" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Error Handling</text>
    <text x="685" y="494" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Exception management</text>
  </g>
  
  <g class="step" id="step6" data-narration="For exam success, understand when to apply each design perspective, practice drawing relevant UML diagrams for each category, and remember cross-cutting concerns impact all architectural views requiring careful consideration throughout design.">
    <rect x="20" y="523" width="760" height="60" fill="#ffffff" stroke="#e0e0e0" rx="5"/>
    <text x="40" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips &amp; Key Reminders</text>
    
    <text x="40" y="565" font-family="Arial" font-size="9" fill="#333">• Compare perspectives using examples like ATM (behavioral), E-Commerce (structural), Hospital (deployment)</text>
    <text x="40" y="578" font-family="Arial" font-size="9" fill="#333">• Practice drawing class, sequence, and deployment diagrams - know which perspective each belongs to</text>
  </g>
</svg>