<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="User Personas: fictional characters representing target users. They help software teams build user-centered products by defining who we're designing for.">
<rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">User Personas in Software Engineering</text>
</g>
<g class="step" id="step1" data-narration="User personas are fictional characters representing target users. They help software teams build user-centered products by defining who we're designing for.">
<rect x="10" y="58" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="20" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">What are User Personas?</text>
<text x="20" y="90" font-family="Arial" font-size="10" fill="#333">Definition: Research-based fictional characters representing target user groups.</text>
<text x="20" y="105" font-family="Arial" font-size="10" fill="#333">Purpose: Bridge gap between technical requirements and human needs in software design.</text>
<text x="20" y="120" font-family="Arial" font-size="10" fill="#333">Use: Guide feature prioritization, UI decisions, and validate design choices.</text>
</g>
<g class="step" id="step2" data-narration="Each persona has five key components that define who users are: demographics, behaviors, goals, pain points, and environmental context for using software.">
<rect x="10" y="146" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
<text x="20" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Key Components of a Persona</text>
<rect x="20" y="172" width="145" height="50" rx="3" fill="#fff8e1"/>
<text x="25" y="185" font-family="Arial" font-size="9" font-weight="bold" fill="#333">1. Demographics</text>
<text x="25" y="197" font-family="Arial" font-size="8" fill="#555">Age, occupation, tech-savviness</text>
<rect x="170" y="172" width="145" height="50" rx="3" fill="#fff8e1"/>
<text x="175" y="185" font-family="Arial" font-size="9" font-weight="bold" fill="#333">2. Behaviors</text>
<text x="175" y="197" font-family="Arial" font-size="8" fill="#555">Usage frequency, preferred devices</text>
<rect x="320" y="172" width="145" height="50" rx="3" fill="#fff8e1"/>
<text x="325" y="185" font-family="Arial" font-size="9" font-weight="bold" fill="#333">3. Goals</text>
<text x="325" y="197" font-family="Arial" font-size="8" fill="#555">User motivations and desires</text>
<rect x="470" y="172" width="145" height="50" rx="3" fill="#fff8e1"/>
<text x="475" y="185" font-family="Arial" font-size="9" font-weight="bold" fill="#333">4. Pain Points</text>
<text x="475" y="197" font-family="Arial" font-size="8" fill="#555">Frustrations and challenges</text>
<rect x="620" y="172" width="145" height="50" rx="3" fill="#fff8e1"/>
<text x="625" y="185" font-family="Arial" font-size="9" font-weight="bold" fill="#333">5. Context</text>
<text x="625" y="197" font-family="Arial" font-size="8" fill="#555">Physical/social environment</text>
</g>
<g class="step" id="step3" data-narration="There are three persona types: primary users are main targets, secondary are occasional users, and anti-personas define who not to design for.">
<rect x="10" y="234" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<text x="20" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Three Types of Personas</text>
<rect x="20" y="260" width="240" height="50" rx="3" fill="#e1bee7"/>
<text x="30" y="275" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Primary Persona</text>
<text x="30" y="288" font-family="Arial" font-size="9" fill="#333">Main target user (e.g., Tech-Savvy Student)</text>
<rect x="270" y="260" width="240" height="50" rx="3" fill="#e1bee7"/>
<text x="280" y="275" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Secondary Persona</text>
<text x="280" y="288" font-family="Arial" font-size="9" fill="#333">Occasional users (e.g., Administrator)</text>
<rect x="520" y="260" width="240" height="50" rx="3" fill="#e1bee7"/>
<text x="530" y="275" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Anti-Persona</text>
<text x="530" y="288" font-family="Arial" font-size="9" fill="#333">Users NOT targeted (prevents scope creep)</text>
</g>
<g class="step" id="step4" data-narration="The persona creation process involves four critical steps that ensure accuracy: user research through interviews and surveys, data clustering to identify patterns, scenario mapping for day-in-the-life narratives, and validation testing.">
<rect x="10" y="322" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="20" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Creation Process</text>
<rect x="20" y="350" width="180" height="48" rx="3" fill="#bbdefb"/>
<text x="30" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">1. User Research</text>
<text x="30" y="378" font-family="Arial" font-size="9" fill="#333">Interviews, surveys</text>
<rect x="210" y="350" width="180" height="48" rx="3" fill="#bbdefb"/>
<text x="220" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">2. Data Clustering</text>
<text x="220" y="378" font-family="Arial" font-size="9" fill="#333">Identify patterns</text>
<rect x="400" y="350" width="180" height="48" rx="3" fill="#bbdefb"/>
<text x="410" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">3. Scenario Mapping</text>
<text x="410" y="378" font-family="Arial" font-size="9" fill="#333">Day-in-the-life narratives</text>
<rect x="590" y="350" width="180" height="48" rx="3" fill="#bbdefb"/>
<text x="600" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">4. Validation</text>
<text x="600" y="378" font-family="Arial" font-size="9" fill="#333">Usability testing</text>
</g>
<g class="step" id="step5" data-narration="Personas apply throughout the entire SDLC to guide development decisions: during requirements gathering, for feature prioritization in backlog management, during interface design for UI/UX decisions, and during usability evaluation for testing metrics.">
<rect x="10" y="410" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="20" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Application in SDLC</text>
<rect x="20" y="438" width="185" height="48" rx="3" fill="#c8e6c9"/>
<text x="30" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Requirements</text>
<text x="30" y="466" font-family="Arial" font-size="9" fill="#333">Gathering phase</text>
<rect x="215" y="438" width="185" height="48" rx="3" fill="#c8e6c9"/>
<text x="225" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Feature Priority</text>
<text x="225" y="466" font-family="Arial" font-size="9" fill="#333">Prioritize backlog</text>
<rect x="410" y="438" width="185" height="48" rx="3" fill="#c8e6c9"/>
<text x="420" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Interface Design</text>
<text x="420" y="466" font-family="Arial" font-size="9" fill="#333">UI/UX decisions</text>
<rect x="605" y="438" width="185" height="48" rx="3" fill="#c8e6c9"/>
<text x="615" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Evaluation</text>
<text x="615" y="466" font-family="Arial" font-size="9" fill="#333">Usability metrics</text>
</g>
<g class="step" id="step6" data-narration="Two examples: Priya needs quick checkout implying one-click reorder. Dr. Arvind needs fast data access implying voice search design solutions.">
<rect x="10" y="498" width="780" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
<text x="20" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Real-World Examples</text>
<rect x="20" y="525" width="370" height="60" rx="3" fill="#fff8e1"/>
<text x="30" y="540" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Priya R., 28 - Marketing Executive</text>
<text x="30" y="553" font-family="Arial" font-size="9" fill="#555">E-commerce user, shops 3x/week</text>
<text x="30" y="563" font-family="Arial" font-size="9" fill="#555">Goal: Quick checkout | Pain: Complex navigation</text>
<text x="30" y="575" font-family="Arial" font-size="8" fill="#e65100">→ One-click reorder, loading optimization</text>
<rect x="400" y="525" width="370" height="60" rx="3" fill="#fff8e1"/>
<text x="410" y="540" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Dr. Arvind M., 45 - Physician</text>
<text x="410" y="553" font-family="Arial" font-size="9" fill="#555">Healthcare system, uses tablet during rounds</text>
<text x="410" y="563" font-family="Arial" font-size="9" fill="#555">Goal: Fast patient data access | Pain: Unintuitive EHR</text>
<text x="410" y="575" font-family="Arial" font-size="8" fill="#e65100">→ Voice-command enabled quick search</text>
</g>
</svg>