<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
  </marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Ideation is the creative process of generating, developing, and communicating new ideas in software engineering and product design contexts today.">
  <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Ideation - Creative Idea Generation in Software Engineering</text>
</g>

<g class="step" id="step1" data-narration="Ideation encourages out-of-box thinking, facilitates collaborative problem-solving, and helps identify multiple solutions before committing significant resources to development and implementation.">
  <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="5"/>
  <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Why Ideation Matters</text>
  <rect x="40" y="92" width="220" height="36" fill="#c8e6c9" rx="3"/>
  <text x="50" y="110" font-family="Arial" font-size="10" fill="#2e7d32">• Out-of-box thinking</text>
  <text x="50" y="122" font-family="Arial" font-size="10" fill="#2e7d32">• Collaborative problem-solving</text>
  <rect x="270" y="92" width="220" height="36" fill="#c8e6c9" rx="3"/>
  <text x="280" y="110" font-family="Arial" font-size="10" fill="#2e7d32">• Multiple solution identification</text>
  <text x="280" y="122" font-family="Arial" font-size="10" fill="#2e7d32">• Bridge theory to practice</text>
  <rect x="500" y="92" width="260" height="36" fill="#c8e6c9" rx="3"/>
  <text x="510" y="110" font-family="Arial" font-size="10" fill="#2e7d32">• Foundation for SDLC phases</text>
  <text x="510" y="122" font-family="Arial" font-size="10" fill="#2e7d32">• Essential for hackathons & projects</text>
</g>

<g class="step" id="step2" data-narration="Brainstorming generates spontaneous ideas in groups with no criticism. Mind Mapping visually represents ideas around a central concept for system design.">
  <rect x="20" y="146" width="760" height="115" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="5"/>
  <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Brainstorming &amp; Mind Mapping</text>
  <rect x="40" y="182" width="340" height="36" fill="#ffe0b2" rx="3"/>
  <text x="50" y="198" font-family="Arial" font-size="10" fill="#e65100"><b>Rules:</b> No criticism, Quantity over quality, Build on others' ideas</text>
  <rect x="40" y="222" width="340" height="30" fill="#ffe0b2" rx="3"/>
  <text x="50" y="240" font-family="Arial" font-size="10" fill="#e65100"><b>Applications:</b> Feature selection, Algorithm optimization</text>
  <rect x="400" y="182" width="360" height="70" fill="#ffe0b2" rx="3"/>
  <text x="410" y="198" font-family="Arial" font-size="10" fill="#e65100"><b>Mind Mapping:</b> Visual representation of ideas</text>
  <text x="410" y="212" font-family="Arial" font-size="10" fill="#e65100">around a central concept</text>
  <text x="410" y="226" font-family="Arial" font-size="10" fill="#e65100"><b>Tools:</b> XMind, Miro, Hand-drawn diagrams</text>
  <text x="410" y="240" font-family="Arial" font-size="10" fill="#e65100"><b>Used for:</b> System architecture, Database design</text>
</g>

<g class="step" id="step3" data-narration="SCAMPER is a systematic technique with seven triggers: Substitute, Combine, Adapt, Modify, Put to other uses, Eliminate, and Reverse for innovative problem-solving.">
  <rect x="20" y="269" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="5"/>
  <text x="40" y="291" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">SCAMPER Technique (7 Triggers)</text>
  <rect x="40" y="305" width="160" height="36" fill="#e1bee7" rx="3"/>
  <text x="50" y="319" font-family="Arial" font-size="9" fill="#6a1b9a"><b>S</b>ubstitute • <b>C</b>ombine • <b>A</b>dapt</text>
  <text x="50" y="333" font-family="Arial" font-size="9" fill="#6a1b9a"><b>M</b>odify • <b>P</b>ut to other uses</text>
  <rect x="210" y="305" width="160" height="36" fill="#e1bee7" rx="3"/>
  <text x="220" y="319" font-family="Arial" font-size="9" fill="#6a1b9a"><b>E</b>liminate</text>
  <text x="220" y="333" font-family="Arial" font-size="9" fill="#6a1b9a"><b>R</b>everse</text>
  <rect x="380" y="305" width="380" height="36" fill="#e1bee7" rx="3"/>
  <text x="390" y="319" font-family="Arial" font-size="10" fill="#6a1b9a"><b>Example:</b> Improve sorting algorithm - Substitute quicksort with mergesort,</text>
  <text x="390" y="333" font-family="Arial" font-size="10" fill="#6a1b9a">Combine with caching, Modify pivot selection strategy</text>
</g>

<g class="step" id="step4" data-narration="Six Thinking Hats uses parallel thinking with six perspectives: White facts, Red emotions, Black risks, Yellow benefits, Green creativity, Blue process.">
  <rect x="20" y="357" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1.5" rx="5"/>
  <text x="40" y="379" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Six Thinking Hats - Edward de Bono's Method</text>
  <rect x="40" y="393" width="115" height="36" fill="#ffcdd2" rx="3"/>
  <text x="50" y="407" font-family="Arial" font-size="9" fill="#b71c1c"><b>White</b> Facts/Data</text>
  <text x="50" y="421" font-family="Arial" font-size="8" fill="#b71c1c">Objective information</text>
  <rect x="160" y="393" width="115" height="36" fill="#ffcdd2" rx="3"/>
  <text x="170" y="407" font-family="Arial" font-size="9" fill="#b71c1c"><b>Red</b> Emotions</text>
  <text x="170" y="421" font-family="Arial" font-size="8" fill="#b71c1c">Feelings &amp; intuition</text>
  <rect x="280" y="393" width="115" height="36" fill="#ffcdd2" rx="3"/>
  <text x="290" y="407" font-family="Arial" font-size="9" fill="#b71c1c"><b>Black</b> Risks</text>
  <text x="290" y="421" font-family="Arial" font-size="8" fill="#b71c1c">Critical judgment</text>
  <rect x="400" y="393" width="115" height="36" fill="#ffcdd2" rx="3"/>
  <text x="410" y="407" font-family="Arial" font-size="9" fill="#b71c1c"><b>Yellow</b> Benefits</text>
  <text x="410" y="421" font-family="Arial" font-size="8" fill="#b71c1c">Optimism &amp; logic</text>
  <rect x="520" y="393" width="115" height="36" fill="#ffcdd2" rx="3"/>
  <text x="530" y="407" font-family="Arial" font-size="9" fill="#b71c1c"><b>Green</b> Creativity</text>
  <text x="530" y="421" font-family="Arial" font-size="8" fill="#b71c1c">New ideas &amp; alternatives</text>
  <rect x="640" y="393" width="120" height="36" fill="#ffcdd2" rx="3"/>
  <text x="650" y="407" font-family="Arial" font-size="9" fill="#b71c1c"><b>Blue</b> Process</text>
  <text x="650" y="421" font-family="Arial" font-size="8" fill="#b71c1c">Control &amp; organization</text>
</g>

<g class="step" id="step5" data-narration="Design Thinking has five iterative phases: Empathize, Define, Ideate, Prototype, and Test for human-centered problem-solving and innovative product development strategies.">
  <rect x="20" y="445" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="5"/>
  <text x="40" y="467" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Design Thinking - 5 Phases</text>
  <rect x="40" y="485" width="130" height="32" fill="#bbdefb" rx="3"/>
  <text x="105" y="503" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">1. EMPATHIZE</text>
  <text x="105" y="515" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">User research</text>
  <rect x="175" y="485" width="130" height="32" fill="#bbdefb" rx="3"/>
  <text x="240" y="503" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">2. DEFINE</text>
  <text x="240" y="515" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Problem statement</text>
  <rect x="310" y="485" width="130" height="32" fill="#bbdefb" rx="3"/>
  <text x="375" y="503" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">3. IDEATE</text>
  <text x="375" y="515" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Generate ideas</text>
  <rect x="445" y="485" width="130" height="32" fill="#bbdefb" rx="3"/>
  <text x="510" y="503" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">4. PROTOTYPE</text>
  <text x="510" y="515" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Build models</text>
  <rect x="580" y="485" width="130" height="32" fill="#bbdefb" rx="3"/>
  <text x="645" y="503" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">5. TEST</text>
  <text x="645" y="515" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">User feedback</text>
  <polygon points="170,501 175,493 180,501" fill="#1976d2"/>
  <polygon points="305,501 310,493 315,501" fill="#1976d2"/>
  <polygon points="440,501 445,493 450,501" fill="#1976d2"/>
  <polygon points="575,501 580,493 585,501" fill="#1976d2"/>
</g>

<g class="step" id="step6" data-narration="Example: Campus app with AR wayfinding and QR codes. Exam tips: Memorize SCAMPER triggers, remember 5 design thinking phases, practice mind maps.">
  <rect x="20" y="533" width="760" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="5"/>
  <text x="40" y="555" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Examples &amp; Exam Tips</text>
  <rect x="40" y="568" width="350" height="20" fill="#c8e6c9" rx="3"/>
  <text x="50" y="582" font-family="Arial" font-size="10" fill="#2e7d32"><b>Case Study:</b> Campus Navigation App with AR + QR</text>
  <rect x="400" y="568" width="360" height="20" fill="#c8e6c9" rx="3"/>
  <text x="410" y="582" font-family="Arial" font-size="10" fill="#2e7d32"><b>Exam:</b> Memorize 7 SCAMPER, 5 DT phases, practice mind maps</text>
</g>
</svg>