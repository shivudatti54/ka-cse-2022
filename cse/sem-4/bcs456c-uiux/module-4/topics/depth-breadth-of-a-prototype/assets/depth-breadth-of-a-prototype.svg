<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
<marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
</marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="This lecture covers depth and breadth dimensions in prototyping, exploring how much detail versus coverage to include in your prototype designs for effective user feedback.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Depth and Breadth of a Prototype</text>
</g>

<g class="step" id="step1" data-narration="Prototyping has two key dimensions that designers must balance carefully. Depth focuses on detailed implementation within specific features, while Breadth covers the range across the entire system for complete user experience validation.">
<rect x="20" y="58" width="760" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
<text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What are Depth and Breadth?</text>
<rect x="40" y="90" width="340" height="45" fill="#e3f2fd" rx="3"/>
<text x="50" y="104" font-family="Arial" font-size="11" fill="#1976d2"><tspan font-weight="bold">DEPTH</tspan></text>
<text x="50" y="118" font-family="Arial" font-size="10" fill="#333">Level of detail in specific features</text>
<text x="50" y="130" font-family="Arial" font-size="10" fill="#333">Complex logic, error handling</text>
<rect x="400" y="90" width="340" height="45" fill="#e8f5e9" rx="3"/>
<text x="410" y="104" font-family="Arial" font-size="11" fill="#388e3c"><tspan font-weight="bold">BREADTH</tspan></text>
<text x="410" y="118" font-family="Arial" font-size="10" fill="#333">Range of features covered</text>
<text x="410" y="130" font-family="Arial" font-size="10" fill="#333">End-to-end workflow demonstration</text>
</g>

<g class="step" id="step2" data-narration="Prototype depth means implementing complex business logic, comprehensive error handling, and thorough technical validation. For example, a payment gateway with full transaction lifecycle including refunds, disputes, and reconciliation processes.">
<rect x="20" y="151" width="760" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
<text x="40" y="173" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Prototype Depth Characteristics</text>
<rect x="40" y="183" width="230" height="45" fill="#e3f2fd" rx="3"/>
<text x="50" y="197" font-family="Arial" font-size="10" fill="#333">• Complex business logic</text>
<text x="50" y="211" font-family="Arial" font-size="10" fill="#333">• Error handling &amp; edge cases</text>
<text x="50" y="221" font-family="Arial" font-size="10" fill="#333">• Technical validation required</text>
<rect x="290" y="183" width="230" height="45" fill="#fff3e0" rx="3"/>
<text x="300" y="197" font-family="Arial" font-size="10" fill="#333">• Full stack implementation</text>
<text x="300" y="211" font-family="Arial" font-size="10" fill="#333">• Real API integrations</text>
<text x="300" y="221" font-family="Arial" font-size="10" fill="#333">• Production-like behavior</text>
<rect x="540" y="183" width="220" height="45" fill="#ffebee" rx="3"/>
<text x="550" y="192" font-family="Arial" font-size="10" fill="#f44336"><tspan font-weight="bold">Example:</tspan></text>
<text x="550" y="206" font-family="Arial" font-size="10" fill="#333">Payment gateway with</text>
<text x="550" y="220" font-family="Arial" font-size="10" fill="#333">full transaction lifecycle</text>
</g>

<g class="step" id="step3" data-narration="Prototype breadth covers maximum user stories and demonstrates complete navigation flow across the system. For example, an e-commerce application with placeholder screens for customers, sellers, and administrators to show all possible user journeys.">
<rect x="20" y="244" width="760" height="85" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
<text x="40" y="266" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Prototype Breadth Characteristics</text>
<rect x="40" y="276" width="230" height="45" fill="#e8f5e9" rx="3"/>
<text x="50" y="290" font-family="Arial" font-size="10" fill="#333">• Maximum user stories</text>
<text x="50" y="304" font-family="Arial" font-size="10" fill="#333">• System navigation flow</text>
<text x="50" y="314" font-family="Arial" font-size="10" fill="#333">• UX workflow demonstration</text>
<rect x="290" y="276" width="230" height="45" fill="#e8f5e9" rx="3"/>
<text x="300" y="290" font-family="Arial" font-size="10" fill="#333">• UI surface implementation</text>
<text x="300" y="304" font-family="Arial" font-size="10" fill="#333">• Placeholder screens</text>
<text x="300" y="314" font-family="Arial" font-size="10" fill="#333">• Basic interactions only</text>
<rect x="540" y="276" width="220" height="45" fill="#e8f5e9" rx="3"/>
<text x="550" y="285" font-family="Arial" font-size="10" fill="#388e3c"><tspan font-weight="bold">Example:</tspan></text>
<text x="550" y="299" font-family="Arial" font-size="10" fill="#333">E-commerce app with</text>
<text x="550" y="313" font-family="Arial" font-size="10" fill="#333">all user role screens</text>
</g>

<g class="step" id="step4" data-narration="Vertical prototyping is depth-focused, implementing full stack development for specific features to validate technical feasibility. Horizontal prototyping is breadth-focused, providing surface-level UI across all areas to demonstrate complete user workflows.">
<rect x="20" y="337" width="760" height="85" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
<text x="40" y="359" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Vertical vs Horizontal Prototyping</text>
<rect x="40" y="369" width="345" height="45" fill="#f3e5f5" rx="3"/>
<text x="50" y="383" font-family="Arial" font-size="11" fill="#9c27b0"><tspan font-weight="bold">VERTICAL (Depth-Focused)</tspan></text>
<text x="50" y="397" font-family="Arial" font-size="10" fill="#333">Full stack for specific features</text>
<text x="50" y="407" font-family="Arial" font-size="10" fill="#333">Deep dive into critical areas</text>
<rect x="405" y="369" width="345" height="45" fill="#f3e5f5" rx="3"/>
<text x="415" y="383" font-family="Arial" font-size="11" fill="#9c27b0"><tspan font-weight="bold">HORIZONTAL (Breadth-Focused)</tspan></text>
<text x="415" y="397" font-family="Arial" font-size="10" fill="#333">Surface-level across system</text>
<text x="415" y="407" font-family="Arial" font-size="10" fill="#333">Wide coverage, shallow depth</text>
</g>

<g class="step" id="step5" data-narration="Trade-offs in prototyping depend on multiple factors including available time, project resources, identified risk priorities, and stakeholder needs. Depth requires more development time, while breadth demands greater coordination across different teams and components.">
<rect x="20" y="430" width="760" height="85" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
<text x="40" y="452" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Trade-off Considerations</text>
<rect x="40" y="462" width="175" height="45" fill="#fff3e0" rx="3"/>
<text x="50" y="476" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Time Constraints</tspan></text>
<text x="50" y="490" font-family="Arial" font-size="9" fill="#333">Deadline pressures</text>
<text x="50" y="502" font-family="Arial" font-size="9" fill="#333">Sprint duration</text>
<rect x="225" y="462" width="175" height="45" fill="#fff3e0" rx="3"/>
<text x="235" y="476" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Resource Availability</tspan></text>
<text x="235" y="490" font-family="Arial" font-size="9" fill="#333">Team expertise</text>
<text x="235" y="502" font-family="Arial" font-size="9" fill="#333">Budget allocation</text>
<rect x="410" y="462" width="175" height="45" fill="#fff3e0" rx="3"/>
<text x="420" y="476" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Risk Priorities</tspan></text>
<text x="420" y="490" font-family="Arial" font-size="9" fill="#333">Technical risks</text>
<text x="420" y="502" font-family="Arial" font-size="9" fill="#333">Usability risks</text>
<rect x="595" y="462" width="175" height="45" fill="#fff3e0" rx="3"/>
<text x="605" y="476" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Stakeholder Needs</tspan></text>
<text x="605" y="490" font-family="Arial" font-size="9" fill="#333">Communication goals</text>
<text x="605" y="502" font-family="Arial" font-size="9" fill="#333">Feedback requirements</text>
</g>

<g class="step" id="step6" data-narration="Evolutionary prototyping strategically combines both dimensions, starting with broad system coverage before diving deep into critical features. This approach aligns perfectly with Agile iterative development principles for continuous improvement and stakeholder feedback.">
<rect x="20" y="523" width="760" height="70" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
<text x="40" y="545" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Evolutionary Prototyping: Combining Both</text>
<rect x="40" y="555" width="345" height="30" fill="#e8f5e9" rx="3"/>
<text x="50" y="569" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Phase 1 - Breadth:</tspan> UI for all screens, validate flow</text>
<rect x="405" y="555" width="345" height="30" fill="#e3f2fd" rx="3"/>
<text x="415" y="569" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Phase 2 - Depth:</tspan> API integration, error handling</text>
</g>
</svg>