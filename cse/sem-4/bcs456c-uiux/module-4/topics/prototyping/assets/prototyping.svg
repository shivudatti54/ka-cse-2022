<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Prototyping is a software development approach that creates preliminary versions of a system to explore ideas and clarify requirements early.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">PROTOTYPING IN SOFTWARE ENGINEERING</text>
  </g>
  
  <!-- step1: Three Main Types -->
  <g class="step" id="step1" data-narration="There are three main types: Throwaway for quick validation, Evolutionary for continuous refinement, and Incremental for parallel component development.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">THREE MAIN TYPES OF PROTOTYPING</text>
    
    <!-- Type 1: Throwaway -->
    <rect x="40" y="90" width="220" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="150" y="107" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">THROWAWAY</text>
    <text x="150" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Quick, disposable for</text>
    <text x="150" y="130" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">requirement validation</text>
    
    <line x1="270" y1="115" x2="290" y2="115" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    
    <!-- Type 2: Evolutionary -->
    <rect x="290" y="90" width="220" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="107" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">EVOLUTIONARY</text>
    <text x="400" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Continuously refined</text>
    <text x="400" y="130" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">into final product</text>
    
    <line x1="520" y1="115" x2="540" y2="115" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    
    <!-- Type 3: Incremental -->
    <rect x="540" y="90" width="220" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="650" y="107" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">INCREMENTAL</text>
    <text x="650" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Components developed</text>
    <text x="650" y="130" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">separately and integrated</text>
  </g>
  
  <!-- step2: Prototyping Process -->
  <g class="step" id="step2" data-narration="The prototyping process has five key steps: identify requirements, develop prototype, evaluate with users, refine through iteration, then implement final system.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">PROTOTYPING PROCESS</text>
    
    <rect x="40" y="180" width="120" height="38" rx="3" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
    <text x="100" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">1. Identify</text>
    <text x="100" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Requirements</text>
    
    <line x1="165" y1="200" x2="175" y2="200" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    
    <rect x="180" y="180" width="120" height="38" rx="3" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
    <text x="240" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">2. Develop</text>
    <text x="240" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Prototype</text>
    
    <line x1="305" y1="200" x2="315" y2="200" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    
    <rect x="320" y="180" width="120" height="38" rx="3" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
    <text x="380" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">3. Evaluate</text>
    <text x="380" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">with Users</text>
    
    <line x1="445" y1="200" x2="455" y2="200" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    
    <rect x="460" y="180" width="120" height="38" rx="3" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
    <text x="520" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">4. Refine</text>
    <text x="520" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Iteration</text>
    
    <line x1="585" y1="200" x2="595" y2="200" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    
    <rect x="600" y="180" width="120" height="38" rx="3" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
    <text x="660" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">5. Final</text>
    <text x="660" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Implementation</text>
  </g>
  
  <!-- step3: Advantages -->
  <g class="step" id="step3" data-narration="Prototyping offers key advantages: early user involvement, reduced development time, better requirement understanding, and effective risk management.">
    <rect x="20" y="234" width="370" height="70" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="252" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">ADVANTAGES</text>
    <circle cx="55" cy="268" r="4" fill="#388e3c"/>
    <text x="65" y="272" font-family="Arial" font-size="9" fill="#333">Early user involvement</text>
    <circle cx="55" cy="284" r="4" fill="#388e3c"/>
    <text x="65" y="288" font-family="Arial" font-size="9" fill="#333">Reduced development time</text>
    <circle cx="55" cy="300" r="4" fill="#388e3c"/>
    <text x="65" y="304" font-family="Arial" font-size="9" fill="#333">Better requirement clarity</text>
  </g>
  
  <!-- step4: Limitations - NOW AT Y=322 (after step3 ends at 304) -->
  <g class="step" id="step4" data-narration="Limitations include potential scope creep, overemphasis on aesthetics, and confusion between prototype and final product during stakeholder reviews.">
    <rect x="410" y="322" width="370" height="70" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="430" y="340" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">LIMITATIONS</text>
    <circle cx="445" cy="356" r="4" fill="#f44336"/>
    <text x="455" y="360" font-family="Arial" font-size="9" fill="#333">Potential scope creep</text>
    <circle cx="445" cy="372" r="4" fill="#f44336"/>
    <text x="455" y="376" font-family="Arial" font-size="9" fill="#333">Overemphasis on aesthetics</text>
    <circle cx="445" cy="388" r="4" fill="#f44336"/>
    <text x="455" y="392" font-family="Arial" font-size="9" fill="#333">Prototype vs product confusion</text>
  </g>
  
  <!-- step5: Real World Examples - Y=410 -->
  <g class="step" id="step5" data-narration="Real examples include E-Commerce checkout prototypes, Inventory systems using evolutionary prototyping, and Mobile banking with incremental module development.">
    <rect x="20" y="410" width="760" height="70" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="428" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">REAL-WORLD EXAMPLES</text>
    
    <rect x="40" y="440" width="230" height="35" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="155" y="455" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">E-Commerce Checkout</text>
    <text x="155" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Throwaway (Figma)</text>
    
    <rect x="285" y="440" width="230" height="35" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="455" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Inventory Management</text>
    <text x="400" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Evolutionary (CRUD)</text>
    
    <rect x="530" y="440" width="230" height="35" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="645" y="455" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Mobile Banking App</text>
    <text x="645" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Incremental modules</text>
  </g>
  
  <!-- step6: Exam Tips - Y=498 -->
  <g class="step" id="step6" data-narration="For exams, memorize five process steps, compare waterfall vs prototyping, know three types, and practice drawing the workflow diagram.">
    <rect x="20" y="498" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">EXAM TIPS & KEY TAKEAWAYS</text>
    
    <rect x="40" y="530" width="160" height="45" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="120" y="545" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Memorize 5 Steps</text>
    <text x="120" y="560" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Identify → Develop →</text>
    <text x="120" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Evaluate → Refine → Implement</text>
    
    <rect x="215" y="530" width="160" height="45" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="295" y="545" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Compare Approaches</text>
    <text x="295" y="560" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Waterfall vs</text>
    <text x="295" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Prototyping</text>
    
    <rect x="390" y="530" width="160" height="45" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="470" y="545" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Know 3 Types</text>
    <text x="470" y="560" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Throwaway,</text>
    <text x="470" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Evolutionary, Incremental</text>
    
    <rect x="565" y="530" width="160" height="45" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="645" y="545" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Practice Diagrams</text>
    <text x="645" y="560" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Draw workflow</text>
    <text x="645" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">cycles</text>
  </g>
</svg>