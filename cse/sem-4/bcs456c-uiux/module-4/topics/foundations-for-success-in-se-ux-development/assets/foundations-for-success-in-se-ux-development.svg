<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Foundations for Success in SE and UX Development. This essential topic covers both software engineering principles and user experience design fundamentals for building successful applications.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Foundations for Success in SE/UX Development</text>
  </g>
  
  <!-- step1: Introduction - SE & UX Overview -->
  <g class="step" id="step1" data-narration="Software Engineering provides systematic development approaches while UX Development creates intuitive interfaces. Together they ensure technical robustness and user satisfaction.">
    <rect x="10" y="60" width="780" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="30" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Software Engineering (SE)</text>
    <rect x="30" y="88" width="230" height="50" fill="#e3f2fd" rx="3"/>
    <text x="40" y="105" font-family="Arial" font-size="9" fill="#1565c0">• Requirements Analysis</text>
    <text x="40" y="120" font-family="Arial" font-size="9" fill="#1565c0">• Design &amp; Testing</text>
    <text x="40" y="135" font-family="Arial" font-size="9" fill="#1565c0">• Maintenance &amp; SDLC</text>
    
    <text x="285" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">User Experience (UX)</text>
    <rect x="285" y="88" width="230" height="50" fill="#e8f5e9" rx="3"/>
    <text x="295" y="105" font-family="Arial" font-size="9" fill="#2e7d32">• Intuitive Interfaces</text>
    <text x="295" y="120" font-family="Arial" font-size="9" fill="#2e7d32">• User Research</text>
    <text x="295" y="135" font-family="Arial" font-size="9" fill="#2e7d32">• Usability Testing</text>
    
    <line x1="525" y1="105" x2="560" y2="105" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="530" y="95" font-family="Arial" font-size="9" fill="#e65100">Integration</text>
    <rect x="570" y="88" width="200" height="50" fill="#fff3e0" rx="3"/>
    <text x="580" y="105" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Technical Robustness</text>
    <text x="580" y="120" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">+ User Satisfaction</text>
  </g>
  
  <!-- step2: Key Concepts Overview -->
  <g class="step" id="step2" data-narration="Six essential key concepts form the foundation for success: User-Centered Design, Agile Methodology, Usability Testing, SDLC, Information Architecture, and Accessibility Standards in web development.">
    <rect x="10" y="155" width="780" height="85" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="30" y="175" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key Concepts</text>
    
    <rect x="30" y="185" width="110" height="48" fill="#e3f2fd" rx="3"/>
    <text x="38" y="200" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">UCD</text>
    <text x="38" y="212" font-family="Arial" font-size="7" fill="#1565c0">User-Centered</text>
    <text x="38" y="224" font-family="Arial" font-size="7" fill="#1565c0">Design</text>
    
    <rect x="145" y="185" width="110" height="48" fill="#e8f5e9" rx="3"/>
    <text x="153" y="200" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Agile</text>
    <text x="153" y="212" font-family="Arial" font-size="7" fill="#2e7d32">Iterative</text>
    <text x="153" y="224" font-family="Arial" font-size="7" fill="#2e7d32">Development</text>
    
    <rect x="260" y="185" width="110" height="48" fill="#fff3e0" rx="3"/>
    <text x="268" y="200" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Usability</text>
    <text x="268" y="212" font-family="Arial" font-size="7" fill="#e65100">Testing</text>
    <text x="268" y="224" font-family="Arial" font-size="7" fill="#e65100">A/B, Heuristics</text>
    
    <rect x="375" y="185" width="110" height="48" fill="#f3e5f5" rx="3"/>
    <text x="383" y="200" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">SDLC</text>
    <text x="383" y="212" font-family="Arial" font-size="7" fill="#7b1fa2">Waterfall,</text>
    <text x="383" y="224" font-family="Arial" font-size="7" fill="#7b1fa2">Spiral, DevOps</text>
    
    <rect x="490" y="185" width="110" height="48" fill="#ffebee" rx="3"/>
    <text x="498" y="200" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Info Arch</text>
    <text x="498" y="212" font-family="Arial" font-size="7" fill="#c62828">Sitemaps,</text>
    <text x="498" y="224" font-family="Arial" font-size="7" fill="#c62828">Wireframes</text>
    
    <rect x="605" y="185" width="155" height="48" fill="#e0f2f1" rx="3"/>
    <text x="613" y="200" font-family="Arial" font-size="8" font-weight="bold" fill="#00695c">Accessibility</text>
    <text x="613" y="212" font-family="Arial" font-size="7" fill="#00695c">WCAG 2.1 Standards</text>
    <text x="613" y="224" font-family="Arial" font-size="7" fill="#00695c">Perceivable, Operable</text>
  </g>
  
  <!-- step3: SDLC & Agile Details -->
  <g class="step" id="step3" data-narration="SDLC has five phases: requirements, design, development, testing, and deployment. Agile uses sprints, stand-ups, and user stories for iterative delivery.">
    <rect x="10" y="250" width="780" height="90" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="30" y="270" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">SDLC Phases</text>
    
    <rect x="30" y="280" width="120" height="55" fill="#e3f2fd" rx="3"/>
    <text x="90" y="295" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">1. Requirements</text>
    <text x="90" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Gathering &amp; Analysis</text>
    
    <rect x="155" y="280" width="120" height="55" fill="#e3f2fd" rx="3"/>
    <text x="215" y="295" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">2. Design</text>
    <text x="215" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Architecture &amp; UML</text>
    
    <rect x="280" y="280" width="120" height="55" fill="#e3f2fd" rx="3"/>
    <text x="340" y="295" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">3. Development</text>
    <text x="340" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Coding &amp; Integration</text>
    
    <rect x="405" y="280" width="120" height="55" fill="#e3f2fd" rx="3"/>
    <text x="465" y="295" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">4. Testing</text>
    <text x="465" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Unit, Integration, QA</text>
    
    <rect x="530" y="280" width="120" height="55" fill="#e3f2fd" rx="3"/>
    <text x="590" y="295" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">5. Deployment</text>
    <text x="590" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Release &amp; Maintenance</text>
    
    <rect x="660" y="280" width="110" height="55" fill="#e8f5e9" rx="3"/>
    <text x="715" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Agile</text>
    <text x="715" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Sprints, Stand-ups</text>
    <text x="715" y="322" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">User Stories</text>
  </g>
  
  <!-- step4: UX Process & Accessibility -->
  <g class="step" id="step4" data-narration="UX design processes include creating personas, user journeys, wireframes, and interactive prototypes for testing. WCAG accessibility guidelines require perceivable, operable, understandable, and robust content for all users.">
    <rect x="10" y="350" width="780" height="90" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="30" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">UX Design Process</text>
    
    <rect x="30" y="382" width="130" height="52" fill="#fff3e0" rx="3"/>
    <text x="42" y="397" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Personas</text>
    <text x="42" y="410" font-family="Arial" font-size="7" fill="#bf360c">User archetypes for</text>
    <text x="42" y="422" font-family="Arial" font-size="7" fill="#bf360c">target audience</text>
    
    <rect x="165" y="382" width="130" height="52" fill="#fff3e0" rx="3"/>
    <text x="177" y="397" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">User Journeys</text>
    <text x="177" y="410" font-family="Arial" font-size="7" fill="#bf360c">Mapping user paths</text>
    <text x="177" y="422" font-family="Arial" font-size="7" fill="#bf360c">through the product</text>
    
    <rect x="300" y="382" width="130" height="52" fill="#fff3e0" rx="3"/>
    <text x="312" y="397" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Wireframes</text>
    <text x="312" y="410" font-family="Arial" font-size="7" fill="#bf360c">Low-fidelity page</text>
    <text x="312" y="422" font-family="Arial" font-size="7" fill="#bf360c">structure layouts</text>
    
    <rect x="435" y="382" width="130" height="52" fill="#fff3e0" rx="3"/>
    <text x="447" y="397" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Prototyping</text>
    <text x="447" y="410" font-family="Arial" font-size="7" fill="#bf360c">Interactive mockups</text>
    <text x="447" y="422" font-family="Arial" font-size="7" fill="#bf360c">for testing</text>
    
    <text x="570" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">WCAG 2.1 Principles</text>
    <rect x="570" y="382" width="200" height="52" fill="#f3e5f5" rx="3"/>
    <text x="580" y="398" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">P.O.U.R.</text>
    <text x="580" y="412" font-family="Arial" font-size="7" fill="#7b1fa2">Perceivable • Operable</text>
    <text x="580" y="426" font-family="Arial" font-size="7" fill="#7b1fa2">Understandable • Robust</text>
  </g>
  
  <!-- step5: Examples & Formulas -->
  <g class="step" id="step5" data-narration="Example: E-commerce UCD involves user interviews, personas, prototyping, and testing. Key formulas include SUS Score and Fitts Law for usability evaluation.">
    <rect x="10" y="450" width="780" height="85" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="30" y="470" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Example: UCD in E-Commerce</text>
    
    <rect x="30" y="482" width="140" height="48" fill="#ffebee" rx="3"/>
    <text x="40" y="496" font-family="Arial" font-size="8" fill="#c62828">1. User Interviews</text>
    <text x="40" y="510" font-family="Arial" font-size="7" fill="#b71c1c">Identify pain points</text>
    <text x="40" y="522" font-family="Arial" font-size="7" fill="#b71c1c">in checkout</text>
    
    <rect x="175" y="482" width="140" height="48" fill="#ffebee" rx="3"/>
    <text x="185" y="496" font-family="Arial" font-size="8" fill="#c62828">2. Create Personas</text>
    <text x="185" y="510" font-family="Arial" font-size="7" fill="#b71c1c">Target users like</text>
    <text x="185" y="522" font-family="Arial" font-size="7" fill="#b71c1c">professionals, elderly</text>
    
    <rect x="320" y="482" width="140" height="48" fill="#ffebee" rx="3"/>
    <text x="330" y="496" font-family="Arial" font-size="8" fill="#c62828">3. Design Prototypes</text>
    <text x="330" y="510" font-family="Arial" font-size="7" fill="#b71c1c">Low-fidelity designs</text>
    <text x="330" y="522" font-family="Arial" font-size="7" fill="#b71c1c">addressing issues</text>
    
    <rect x="465" y="482" width="140" height="48" fill="#ffebee" rx="3"/>
    <text x="475" y="496" font-family="Arial" font-size="8" fill="#c62828">4. Usability Testing</text>
    <text x="475" y="510" font-family="Arial" font-size="7" fill="#b71c1c">Test with 10+ users,</text>
    <text x="475" y="522" font-family="Arial" font-size="7" fill="#b71c1c">measure completion</text>
    
    <rect x="610" y="482" width="160" height="48" fill="#e8f5e9" rx="3"/>
    <text x="620" y="496" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Key Formulas</text>
    <text x="620" y="510" font-family="Arial" font-size="7" fill="#1b5e20">SUS = (Sum scores) × 2.5</text>
    <text x="620" y="522" font-family="Arial" font-size="7" fill="#1b5e20">Fitts: T = a + b log₂(1 + D/W)</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="For exams: memorize SDLC phases, compare Waterfall versus Agile, sketch wireframes, learn WCAG principles, study failed UX cases, and practice UML diagrams.">
    <rect x="10" y="545" width="780" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="30" y="562" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Exam Tips: </text>
    <text x="100" y="562" font-family="Arial" font-size="9" fill="#424242">Memorize SDLC phases • Compare Waterfall vs Agile • Sketch wireframes • Learn WCAG P.O.U.R. </text>
    <text x="30" y="578" font-family="Arial" font-size="9" fill="#424242">Study failed UX cases • Practice UML diagrams • Revise SUS, NPS metrics • Create flashcards for key terms</text>
  </g>
</svg>