<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic explores how software engineering foundations connect with core computer science concepts for systematic development of quality software applications.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Connections with Software Engineering Foundations</text>
  </g>
  
  <!-- step1: Introduction -->
  <g class="step" id="step1" data-narration="Software Engineering provides systematic approaches, quality assurance, and structured development lifecycles that connect computer science theory to practical implementation of software systems.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Introduction</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Software Engineering Foundations form the bedrock of systematic software development.</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">Key connections include: algorithm optimization, data structure selection, and system architecture.</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">Enables: systematic problem-solving, informed design decisions, and quality assurance throughout development.</text>
  </g>
  
  <!-- step2: SDLC -->
  <g class="step" id="step2" data-narration="SDLC phases connect to CS: Requirements maps to problem analysis, Design to algorithm design, Implementation to coding, Testing to verification.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Software Development Life Cycle (SDLC)</text>
    <rect x="40" y="178" width="100" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="70" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Phases</text>
    <text x="70" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Req → Design</text>
    <text x="70" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">→ Impl → Test</text>
    <rect x="150" y="178" width="120" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="180" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Models</text>
    <text x="180" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Waterfall, Agile</text>
    <text x="180" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Spiral, V-Model</text>
    <text x="300" y="195" font-family="Arial" font-size="10" fill="#333">Connects to CS: Maps to algorithm</text>
    <text x="300" y="210" font-family="Arial" font-size="10" fill="#333">development stages and complexity analysis</text>
  </g>
  
  <!-- step3: Design Principles -->
  <g class="step" id="step3" data-narration="SOLID principles ensure maintainable code: Single Responsibility, Open-Closed, Liskov Substitution, Interface Segregation, Dependency Inversion guide object-oriented design decisions for developers and teams.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Design Principles</text>
    <rect x="40" y="268" width="145" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="50" y="282" font-family="Arial" font-size="9" fill="#9c27b0">SOLID Principles:</text>
    <text x="50" y="295" font-family="Arial" font-size="8" fill="#333">S - Single Responsibility</text>
    <text x="50" y="305" font-family="Arial" font-size="8" fill="#333">O - Open/Closed</text>
    <rect x="195" y="268" width="100" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="205" y="282" font-family="Arial" font-size="9" fill="#9c27b0">Coupling vs Cohesion</text>
    <text x="205" y="295" font-family="Arial" font-size="8" fill="#333">Low coupling</text>
    <text x="205" y="305" font-family="Arial" font-size="8" fill="#333">High cohesion</text>
    <rect x="305" y="268" width="120" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="315" y="282" font-family="Arial" font-size="9" fill="#9c27b0">Architectural Patterns</text>
    <text x="315" y="295" font-family="Arial" font-size="8" fill="#333">MVC, Microservices</text>
    <text x="315" y="305" font-family="Arial" font-size="8" fill="#333">Layered Architecture</text>
    <text x="440" y="290" font-family="Arial" font-size="10" fill="#333">Apply patterns for decoupled,</text>
    <text x="440" y="305" font-family="Arial" font-size="10" fill="#333">scalable system design</text>
  </g>
  
  <!-- step4: Verification & Validation -->
  <g class="step" id="step4" data-narration="Verification asks are we building it right through testing. Validation asks are we building the right thing through stakeholder feedback and user acceptance reviews.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Verification &amp; Validation</text>
    <rect x="40" y="358" width="200" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="50" y="372" font-family="Arial" font-size="9" fill="#ff9800">Verification</text>
    <text x="50" y="385" font-family="Arial" font-size="8" fill="#333">"Are we building it right?"</text>
    <text x="130" y="385" font-family="Arial" font-size="8" fill="#333">Static &amp; Dynamic Testing</text>
    <rect x="250" y="358" width="200" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="260" y="372" font-family="Arial" font-size="9" fill="#ff9800">Validation</text>
    <text x="260" y="385" font-family="Arial" font-size="8" fill="#333">"Are we building the right thing?"</text>
    <text x="340" y="385" font-family="Arial" font-size="8" fill="#333">User acceptance, Reviews</text>
    <text x="470" y="365" font-family="Arial" font-size="10" fill="#333">Testing Types:</text>
    <text x="470" y="380" font-family="Arial" font-size="9" fill="#333">Unit • Integration • System</text>
    <text x="470" y="395" font-family="Arial" font-size="9" fill="#333">Static: Code reviews, Inspections</text>
  </g>
  
  <!-- step5: Software Metrics -->
  <g class="step" id="step5" data-narration="Software metrics measure code quality: Cyclomatic Complexity equals edges minus nodes plus two, connecting directly to algorithm complexity analysis and testing estimation.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Software Metrics</text>
    <rect x="40" y="448" width="180" height="38" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="50" y="462" font-family="Arial" font-size="9" fill="#f44336">Cyclomatic Complexity</text>
    <text x="50" y="476" font-family="Arial" font-size="9" fill="#333">M = E - N + 2P (Edges-Nodes+2)</text>
    <rect x="230" y="448" width="100" height="38" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="240" y="462" font-family="Arial" font-size="9" fill="#f44336">Code Churn</text>
    <text x="240" y="476" font-family="Arial" font-size="9" fill="#333">Lines changed</text>
    <rect x="340" y="448" width="120" height="38" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="350" y="462" font-family="Arial" font-size="9" fill="#f44336">Maintainability</text>
    <text x="350" y="476" font-family="Arial" font-size="9" fill="#333">Index measurement</text>
    <text x="480" y="465" font-family="Arial" font-size="10" fill="#333">Connects to CS:</text>
    <text x="480" y="480" font-family="Arial" font-size="9" fill="#333">Algorithm complexity analysis</text>
    <text x="600" y="480" font-family="Arial" font-size="9" fill="#333">High complexity = more testing</text>
  </g>
  
  <!-- step6: Examples Summary -->
  <g class="step" id="step6" data-narration="Key formula: Cyclomatic Complexity equals E minus N plus two P. Remember verification versus validation distinction for software engineering exams and quality assurance fundamentals.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Formulas</text>
    <rect x="40" y="535" width="230" height="48" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="50" y="550" font-family="Arial" font-size="9" fill="#1976d2">Important Formulas:</text>
    <text x="50" y="565" font-family="Arial" font-size="9" fill="#333">Cyclomatic Complexity = E - N + 2P</text>
    <text x="50" y="578" font-family="Arial" font-size="9" fill="#333">Where E = edges, N = nodes, P = exit points</text>
    <rect x="280" y="535" width="240" height="48" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="290" y="550" font-family="Arial" font-size="9" fill="#1976d2">Exam Preparation:</text>
    <text x="290" y="565" font-family="Arial" font-size="9" fill="#333">Compare SDLC models with pros/cons</text>
    <text x="290" y="578" font-family="Arial" font-size="9" fill="#333">Practice UML diagrams (Class, Sequence)</text>
    <rect x="530" y="535" width="245" height="48" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="540" y="550" font-family="Arial" font-size="9" fill="#1976d2">Key Distinctions:</text>
    <text x="540" y="565" font-family="Arial" font-size="9" fill="#333">Verification vs Validation</text>
    <text x="540" y="578" font-family="Arial" font-size="9" fill="#333">Coupling vs Cohesion</text>
  </g>
</svg>