<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Welcome to learning about the important connections between computer science theory and software engineering practices in real-world development projects today.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
<text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Connections with Software Engineering</text>
</g>

<g class="step" id="step1" data-narration="The Software Development Life Cycle, known as SDLC, includes six important phases: Requirements gathering, System design, Implementation, Testing, Deployment, and Maintenance for ongoing support.">
<rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">SDLC Phases</text>
<rect x="40" y="88" width="100" height="40" fill="#e3f2fd" rx="3"/>
<text x="90" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Requirements</text>
<rect x="150" y="88" width="100" height="40" fill="#e3f2fd" rx="3"/>
<text x="200" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Design</text>
<rect x="260" y="88" width="100" height="40" fill="#e3f2fd" rx="3"/>
<text x="310" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Implementation</text>
<rect x="370" y="88" width="100" height="40" fill="#e3f2fd" rx="3"/>
<text x="420" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Testing</text>
<rect x="480" y="88" width="100" height="40" fill="#e3f2fd" rx="3"/>
<text x="530" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Deployment</text>
<rect x="590" y="88" width="100" height="40" fill="#e3f2fd" rx="3"/>
<text x="640" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Maintenance</text>
<path d="M140,108 L150,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M250,108 L260,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M360,108 L370,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M470,108 L480,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M580,108 L590,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
</g>

<g class="step" id="step2" data-narration="Let us compare two popular software development methodologies: The Waterfall model is sequential and rigid with fixed requirements, while Agile is iterative and flexible with welcoming changing requirements throughout the project.">
<rect x="20" y="146" width="370" height="89" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
<text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Waterfall Model</text>
<text x="40" y="182" font-family="Arial" font-size="9" fill="#666">Sequential phases</text>
<text x="40" y="196" font-family="Arial" font-size="9" fill="#666">Fixed requirements</text>
<text x="40" y="210" font-family="Arial" font-size="9" fill="#666">Good for regulatory compliance</text>
<rect x="40" y="220" width="60" height="12" fill="#fff3e0" rx="2"/>
<text x="70" y="229" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Linear</text>

<rect x="410" y="146" width="370" height="89" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
<text x="430" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Agile Methodology</text>
<text x="430" y="182" font-family="Arial" font-size="9" fill="#666">Iterative sprints</text>
<text x="430" y="196" font-family="Arial" font-size="9" fill="#666">Adaptive to changes</text>
<text x="430" y="210" font-family="Arial" font-size="9" fill="#666">Customer collaboration</text>
<rect x="430" y="220" width="60" height="12" fill="#e8f5e9" rx="2"/>
<text x="460" y="229" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Iterative</text>
</g>

<g class="step" id="step3" data-narration="Design patterns provide reusable solutions to common software design problems and are categorized into three main types: Creational patterns handle object creation, Structural patterns manage composition, and Behavioral patterns define interaction.">
<rect x="20" y="243" width="240" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
<text x="40" y="263" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Creational Patterns</text>
<text x="40" y="279" font-family="Arial" font-size="9" fill="#666">Factory Method</text>
<text x="40" y="293" font-family="Arial" font-size="9" fill="#666">Singleton</text>
<text x="40" y="307" font-family="Arial" font-size="9" fill="#666">Builder</text>

<rect x="280" y="243" width="240" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
<text x="300" y="263" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Structural Patterns</text>
<text x="300" y="279" font-family="Arial" font-size="9" fill="#666">Adapter</text>
<text x="300" y="293" font-family="Arial" font-size="9" fill="#666">Composite</text>
<text x="300" y="307" font-family="Arial" font-size="9" fill="#666">Decorator</text>

<rect x="540" y="243" width="240" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
<text x="560" y="263" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Behavioral Patterns</text>
<text x="560" y="279" font-family="Arial" font-size="9" fill="#666">Observer</text>
<text x="560" y="293" font-family="Arial" font-size="9" fill="#666">Strategy</text>
<text x="560" y="307" font-family="Arial" font-size="9" fill="#666">Command</text>
</g>

<g class="step" id="step4" data-narration="Software testing occurs at multiple distinct levels: Unit testing examines individual components in isolation, Integration testing verifies interfaces between components, and System testing evaluates the complete integrated application end-to-end for quality assurance.">
<rect x="20" y="331" width="760" height="90" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
<text x="40" y="351" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Software Testing Levels</text>
<rect x="40" y="364" width="220" height="38" fill="#ffebee" rx="3"/>
<text x="150" y="381" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Unit Testing</text>
<text x="150" y="395" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Test individual components</text>

<rect x="290" y="364" width="220" height="38" fill="#ffebee" rx="3"/>
<text x="400" y="381" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Integration Testing</text>
<text x="400" y="395" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Test component interfaces</text>

<rect x="540" y="364" width="220" height="38" fill="#ffebee" rx="3"/>
<text x="650" y="381" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">System Testing</text>
<text x="650" y="395" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Test complete system</text>

<text x="40" y="414" font-family="Arial" font-size="9" fill="#666">Techniques: White-box (internal structure) vs Black-box (functionality)</text>
</g>

<g class="step" id="step5" data-narration="Essential development tools include UML diagrams which visually represent software designs and architecture, Git provides powerful version control for team collaboration, and CI/CD pipelines automate continuous building and deployment of software applications.">
<rect x="20" y="429" width="240" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="449" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">UML Diagrams</text>
<text x="40" y="467" font-family="Arial" font-size="9" fill="#666">Class Diagram</text>
<text x="40" y="481" font-family="Arial" font-size="9" fill="#666">Sequence Diagram</text>
<text x="40" y="495" font-family="Arial" font-size="9" fill="#666">Activity Diagram</text>

<rect x="280" y="429" width="240" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="300" y="449" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Version Control (Git)</text>
<text x="400" y="467" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Repository</text>
<text x="400" y="481" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Branch, Merge, Pull Request</text>
<text x="400" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Collaboration</text>

<rect x="540" y="429" width="240" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="560" y="449" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">CI/CD Pipeline</text>
<text x="660" y="467" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Build → Test → Deploy</text>
<text x="660" y="481" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Automation</text>
<text x="660" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Jenkins, Docker</text>
</g>

<g class="step" id="step6" data-narration="Software engineers use critical quality metrics: Cyclomatic Complexity measures code quality and maintainability, COCOMO provides mathematical models for estimating development effort and timeline, and Test Coverage percentage indicates how thoroughly the test suite validates application functionality.">
<rect x="20" y="517" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
<text x="40" y="537" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key Formulas and Metrics</text>

<rect x="40" y="549" width="220" height="40" fill="#e8f5e9" rx="3"/>
<text x="150" y="565" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Cyclomatic Complexity</text>
<text x="150" y="579" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">V(G) = E - N + 2P</text>

<rect x="290" y="549" width="220" height="40" fill="#e8f5e9" rx="3"/>
<text x="400" y="565" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">COCOMO Model</text>
<text x="400" y="579" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Effort = a × (KLOC)^b</text>

<rect x="540" y="549" width="220" height="40" fill="#e8f5e9" rx="3"/>
<text x="650" y="565" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Test Coverage</text>
<text x="650" y="579" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Executed / Total Paths × 100</text>
</g>
</svg>