<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic explores the critical challenge of bridging software engineering and user experience design in modern application development teams today.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">The Challenge of Connecting SE and UX</text>
  </g>
  
  <!-- step1: Introduction - SE vs UX -->
  <g class="step" id="step1" data-narration="Software Engineering focuses on functionality and reliability while UX emphasizes usability and user satisfaction. These disciplines often operate in silos.">
    <rect x="10" y="58" width="780" height="80" fill="#fff" stroke="#e0e0e0" stroke-width="1" rx="5"/>
    <text x="30" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Introduction: The Gap</text>
    <rect x="30" y="88" width="220" height="40" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="140" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">Software Engineering</text>
    <text x="140" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Functionality, Reliability, Maintainability</text>
    <rect x="280" y="88" width="220" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="390" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0" font-weight="bold">User Experience</text>
    <text x="390" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Usability, Accessibility, Satisfaction</text>
    <path d="M530,108 L610,108" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="650" y="112" font-family="Arial" font-size="10" fill="#666">Bridging the gap is essential</text>
  </g>
  
  <!-- step2: Differing Priorities -->
  <g class="step" id="step2" data-narration="SE prioritizes code efficiency, security, and scalability while UX focuses on intuitive navigation, emotional appeal, and accessibility for diverse users.">
    <rect x="10" y="146" width="780" height="80" fill="#fff" stroke="#e0e0e0" stroke-width="1" rx="5"/>
    <text x="30" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Key Concepts: Differing Priorities</text>
    <rect x="30" y="180" width="160" height="36" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="110" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">Code Efficiency</text>
    <rect x="200" y="180" width="160" height="36" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="280" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">Security</text>
    <rect x="370" y="180" width="160" height="36" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="450" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">Scalability</text>
    <rect x="540" y="180" width="160" height="36" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="620" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0" font-weight="bold">Intuitive Navigation</text>
    <rect x="710" y="180" width="70" height="36" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="745" y="198" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0" font-weight="bold">Accessibility</text>
  </g>
  
  <!-- step3: Communication Gaps & Lifecycle -->
  <g class="step" id="step3" data-narration="Communication gaps arise from technical jargon versus design terminology. SE uses documentation while UX relies on visual communication and prototyping.">
    <rect x="10" y="234" width="780" height="80" fill="#fff" stroke="#e0e0e0" stroke-width="1" rx="5"/>
    <text x="30" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Communication Gaps & Lifecycle</text>
    <rect x="30" y="268" width="230" height="36" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="145" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">SE: Documentation Focus</text>
    <text x="145" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">UML, CI/CD Pipelines</text>
    <rect x="280" y="268" width="230" height="36" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="395" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">UX: Visual Communication</text>
    <text x="395" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Wireframing, Prototyping</text>
    <rect x="530" y="268" width="120" height="36" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="590" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Waterfall</text>
    <text x="590" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">vs Iterative</text>
    <rect x="670" y="268" width="110" height="36" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="725" y="286" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828" font-weight="bold">Testing vs Prototyping</text>
    <text x="725" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Conflict Point</text>
  </g>
  
  <!-- step4: Metrics and Evaluation -->
  <g class="step" id="step4" data-narration="SE measures success through code coverage and defect density. UX uses task success rates and System Usability Scale for evaluation.">
    <rect x="10" y="322" width="780" height="80" fill="#fff" stroke="#e0e0e0" stroke-width="1" rx="5"/>
    <text x="30" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Metrics and Evaluation</text>
    <rect x="30" y="356" width="180" height="36" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="120" y="374" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">SE Metrics</text>
    <text x="120" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Code Coverage, Defect Density</text>
    <rect x="230" y="356" width="180" height="36" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="320" y="374" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0" font-weight="bold">UX Metrics</text>
    <text x="320" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Task Success Rate, SUS</text>
    <rect x="430" y="356" width="180" height="36" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="520" y="374" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">ISO Standards</text>
    <text x="520" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">25010 (SE) vs 9241 (UX)</text>
    <rect x="630" y="356" width="150" height="36" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="705" y="374" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">Hybrid Approach</text>
    <text x="705" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Combine both metrics</text>
  </g>
  
  <!-- step5: Examples -->
  <g class="step" id="step5" data-narration="Banking apps use biometric login with progressive disclosure for security. E-commerce combines lazy loading with CDN to deliver fast, rich media experiences to users.">
    <rect x="10" y="410" width="780" height="80" fill="#fff" stroke="#e0e0e0" stroke-width="1" rx="5"/>
    <text x="30" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Real-World Examples</text>
    <rect x="30" y="444" width="240" height="36" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="150" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Banking App</text>
    <text x="150" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Biometric + Progressive Disclosure</text>
    <rect x="280" y="444" width="240" height="36" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="400" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">E-commerce Platform</text>
    <text x="400" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Lazy Loading + CDN</text>
    <rect x="530" y="444" width="240" height="36" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="650" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Healthcare System</text>
    <text x="650" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Layered Error Reporting</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Apply Agile UX and Design Sprints. Discuss trade-offs like technical debt versus usability debt. Reference ISO 9241 for UX and 25010 for SE quality.">
    <rect x="10" y="498" width="780" height="90" fill="#fff" stroke="#e0e0e0" stroke-width="1" rx="5"/>
    <text x="30" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Exam Tips & Key Takeaways</text>
    <rect x="30" y="528" width="110" height="50" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="85" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2" font-weight="bold">Contrast SE</text>
    <text x="85" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2" font-weight="bold">vs UX</text>
    <text x="85" y="569" text-anchor="middle" font-family="Arial" font-size="7" fill="#1976d2">objectives</text>
    <rect x="150" y="528" width="110" height="50" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="205" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0" font-weight="bold">Agile UX</text>
    <text x="205" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0" font-weight="bold">Design</text>
    <text x="205" y="569" text-anchor="middle" font-family="Arial" font-size="7" fill="#9c27b0">Sprints</text>
    <rect x="270" y="528" width="130" height="50" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="335" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">Technical Debt</text>
    <text x="335" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100" font-weight="bold">vs Usability</text>
    <text x="335" y="569" text-anchor="middle" font-family="Arial" font-size="7" fill="#e65100">Debt</text>
    <rect x="410" y="528" width="130" height="50" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="475" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32" font-weight="bold">ISO Standards</text>
    <text x="475" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32" font-weight="bold">25010 (SE)</text>
    <text x="475" y="569" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">9241 (UX)</text>
    <rect x="550" y="528" width="110" height="50" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="605" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828" font-weight="bold">Prototyping</text>
    <text x="605" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828" font-weight="bold">bridges</text>
    <text x="605" y="569" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828">SE-UX gaps</text>
    <rect x="670" y="528" width="110" height="50" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="725" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2" font-weight="bold">AI-driven</text>
    <text x="725" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2" font-weight="bold">UX Analytics</text>
    <text x="725" y="569" text-anchor="middle" font-family="Arial" font-size="7" fill="#1976d2">emerging trend</text>
  </g>
</svg>