<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers fidelity in prototyping, a key concept in software engineering for  CSE students studying software design and development methodologies for real-world applications.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Fidelity of Prototypes</text>
  </g>
  
  <g class="step" id="step1" data-narration="Fidelity measures how closely a prototype resembles the final product, impacting development cost, feedback quality, and early error detection during the design phase of software projects.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Fidelity?</text>
    <rect x="40" y="92" width="720" height="2" fill="#1976d2"/>
    <text x="40" y="112" font-family="Arial" font-size="11" fill="#333">Fidelity = How closely prototype matches final product</text>
    <text x="40" y="128" font-family="Arial" font-size="11" fill="#333">Higher fidelity = More detail, cost, but better feedback</text>
  </g>
  
  <g class="step" id="step2" data-narration="There are three main types of fidelity in prototyping: Visual fidelity covers colors and typography, Functional fidelity simulates behavior and interactions, and Content fidelity uses realistic data.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Types of Fidelity</text>
    <rect x="40" y="180" width="720" height="2" fill="#388e3c"/>
    <rect x="40" y="192" width="220" height="36" fill="#c8e6c9" rx="4"/>
    <text x="50" y="208" font-family="Arial" font-size="10" fill="#2e7d32">Visual: Colors, fonts, layout</text>
    <rect x="270" y="192" width="220" height="36" fill="#c8e6c9" rx="4"/>
    <text x="280" y="208" font-family="Arial" font-size="10" fill="#2e7d32">Functional: Behavior, interactions</text>
    <rect x="500" y="192" width="220" height="36" fill="#c8e6c9" rx="4"/>
    <text x="510" y="208" font-family="Arial" font-size="10" fill="#2e7d32">Content: Realistic data/text</text>
  </g>
  
  <g class="step" id="step3" data-narration="Low-fidelity prototypes are basic mockups using paper sketches or wireframes. They are fast to create and focus on structure and layout rather than visual aesthetics for early validation.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Low-Fidelity Prototypes</text>
    <rect x="40" y="268" width="720" height="2" fill="#ff9800"/>
    <rect x="40" y="280" width="160" height="30" fill="#ffe0b2" rx="4"/>
    <text x="50" y="300" font-family="Arial" font-size="10" fill="#e65100">Quick to create</text>
    <rect x="210" y="280" width="160" height="30" fill="#ffe0b2" rx="4"/>
    <text x="220" y="300" font-family="Arial" font-size="10" fill="#e65100">Paper/digital wireframes</text>
    <rect x="380" y="280" width="160" height="30" fill="#ffe0b2" rx="4"/>
    <text x="390" y="300" font-family="Arial" font-size="10" fill="#e65100">Focus on structure</text>
    <rect x="550" y="280" width="160" height="30" fill="#ffe0b2" rx="4"/>
    <text x="560" y="300" font-family="Arial" font-size="10" fill="#e65100">Example: Balsamiq</text>
  </g>
  
  <g class="step" id="step4" data-narration="High-fidelity prototypes are interactive, pixel-perfect designs that closely mimic the final product. They are commonly used for usability testing, stakeholder presentations, and validating complex user interactions.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">High-Fidelity Prototypes</text>
    <rect x="40" y="356" width="720" height="2" fill="#9c27b0"/>
    <rect x="40" y="368" width="160" height="30" fill="#e1bee7" rx="4"/>
    <text x="50" y="388" font-family="Arial" font-size="10" fill="#6a1b9a">Interactive, clickable</text>
    <rect x="210" y="368" width="160" height="30" fill="#e1bee7" rx="4"/>
    <text x="220" y="388" font-family="Arial" font-size="10" fill="#6a1b9a">Pixel-perfect design</text>
    <rect x="380" y="368" width="160" height="30" fill="#e1bee7" rx="4"/>
    <text x="390" y="388" font-family="Arial" font-size="10" fill="#6a1b9a">Usability testing</text>
    <rect x="550" y="368" width="160" height="30" fill="#e1bee7" rx="4"/>
    <text x="560" y="388" font-family="Arial" font-size="10" fill="#6a1b9a">Example: Figma, Adobe XD</text>
  </g>
  
  <g class="step" id="step5" data-narration="Evolutionary prototypes evolve through iterations to become the final product in Agile development. Throwaway prototypes are created for quick validation and discarded after gathering essential user feedback.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Evolutionary vs Throwaway Prototyping</text>
    <rect x="40" y="444" width="350" height="40" fill="#ffcdd2" rx="4"/>
    <text x="50" y="462" font-family="Arial" font-size="11" fill="#c62828">Evolutionary: Becomes final product</text>
    <text x="50" y="478" font-family="Arial" font-size="10" fill="#b71c1c">Used in Agile development</text>
    <rect x="400" y="444" width="350" height="40" fill="#ffcdd2" rx="4"/>
    <text x="410" y="462" font-family="Arial" font-size="11" fill="#c62828">Throwaway: Discarded after testing</text>
    <text x="410" y="478" font-family="Arial" font-size="10" fill="#b71c1c">Used for quick validation</text>
  </g>
  
  <g class="step" id="step6" data-narration="Choose fidelity based on project goals: low-fi for early stages and brainstorming, high-fi for thorough testing. Popular tools include Figma, Axure RP, Adobe XD, and Balsamiq for creating prototypes.">
    <rect x="20" y="498" width="760" height="90" fill="#e1f5fe" rx="8"/>
    <text x="40" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#0277bd">Trade-offs &amp; Tools</text>
    <rect x="40" y="534" width="720" height="2" fill="#0277bd"/>
    <rect x="40" y="546" width="230" height="36" fill="#b3e5fc" rx="4"/>
    <text x="50" y="562" font-family="Arial" font-size="10" fill="#01579b">Low-fi: Faster, cheaper, limited testing</text>
    <rect x="280" y="546" width="230" height="36" fill="#b3e5fc" rx="4"/>
    <text x="290" y="562" font-family="Arial" font-size="10" fill="#01579b">High-fi: Time-consuming, better feedback</text>
    <rect x="520" y="546" width="220" height="36" fill="#b3e5fc" rx="4"/>
    <text x="530" y="562" font-family="Arial" font-size="10" fill="#01579b">Tools: Figma, Adobe XD, Axure, Balsamiq</text>
  </g>
</svg>