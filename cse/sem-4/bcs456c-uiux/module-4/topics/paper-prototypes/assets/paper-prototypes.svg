<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Paper Prototypes are a low-fidelity design technique using hand-drawn sketches to quickly visualize and test user interfaces for usability and design validation.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#1976d2">Paper Prototypes</text>
  </g>
  
  <!-- step1: Definition & Introduction -->
  <g class="step" id="step1" data-narration="Paper prototyping simulates interactive interfaces using hand-drawn sketches, enabling early usability detection and collaborative design exploration at minimal cost and time.">
    <rect x="20" y="58" width="760" height="82" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Paper Prototyping?</text>
    <rect x="40" y="88" width="340" height="42" rx="4" fill="white"/>
    <text x="50" y="104" font-family="Arial" font-size="10" fill="#333">Low-fidelity design technique using</text>
    <text x="50" y="118" font-family="Arial" font-size="10" fill="#333">hand-drawn sketches to visualize UIs</text>
    <rect x="400" y="88" width="340" height="42" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="410" y="104" font-family="Arial" font-size="10" fill="#333">Key Benefits: Early issue detection,</text>
    <text x="410" y="118" font-family="Arial" font-size="10" fill="#333">collaborative design, reduced costs</text>
  </g>
  
  <!-- step2: Fidelity Levels & Components -->
  <g class="step" id="step2" data-narration="Low-fidelity uses basic sketches while high-fidelity uses detailed digital mockups. Paper prototypes typically include screens, widgets, navigation elements, and interactive components.">
    <rect x="20" y="149" width="760" height="82" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="169" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Fidelity Levels &amp; Components</text>
    <rect x="40" y="182" width="220" height="40" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="196" font-family="Arial" font-size="10" fill="#333">Low-Fidelity: Basic sketches,</text>
    <text x="50" y="210" font-family="Arial" font-size="10" fill="#333">minimal visual details</text>
    <rect x="280" y="182" width="220" height="40" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="290" y="196" font-family="Arial" font-size="10" fill="#333">High-Fidelity: Digital mockups,</text>
    <text x="290" y="210" font-family="Arial" font-size="10" fill="#333">polished visual design</text>
    <rect x="520" y="182" width="240" height="40" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="530" y="196" font-family="Arial" font-size="10" fill="#333">Components: Screens, Widgets,</text>
    <text x="530" y="210" font-family="Arial" font-size="10" fill="#333">Navigation (arrows/notes)</text>
  </g>
  
  <!-- step3: Creation Process -->
  <g class="step" id="step3" data-narration="The five-stage process includes planning requirements, sketching rapidly using templates, assembling components, testing with real users, and iterating designs based on feedback.">
    <rect x="20" y="240" width="760" height="82" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="260" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Creation Process (5 Stages)</text>
    <circle cx="100" cy="295" r="18" fill="#388e3c"/>
    <text x="100" y="299" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Plan</text>
    <line x1="130" y1="295" x2="170" y2="295" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="200" cy="295" r="18" fill="#4caf50"/>
    <text x="200" y="299" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Sketch</text>
    <line x1="230" y1="295" x2="270" y2="295" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="300" cy="295" r="18" fill="#66bb6a"/>
    <text x="300" y="299" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Assemble</text>
    <line x1="330" y1="295" x2="370" y2="295" stroke="#66bb6a" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="400" cy="295" r="18" fill="#81c784"/>
    <text x="400" y="299" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Test</text>
    <line x1="430" y1="295" x2="470" y2="295" stroke="#81c784" stroke-width="2" marker-end="url(#arrow)"/>
    <circle cx="500" cy="295" r="18" fill="#a5d6a7"/>
    <text x="500" y="299" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Iterate</text>
    <rect x="560" y="280" width="200" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="660" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Rapid Iteration Loop</text>
  </g>
  
  <!-- step4: Testing Methodology -->
  <g class="step" id="step4" data-narration="The Wizard of Oz technique uses humans to simulate system responses, while the think-aloud protocol collects verbal feedback from users during task completion and problem-solving.">
    <rect x="20" y="331" width="760" height="82" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="351" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Testing Methodology</text>
    <rect x="40" y="365" width="230" height="40" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="379" font-family="Arial" font-size="10" fill="#333">Wizard of Oz: Human simulates</text>
    <text x="50" y="393" font-family="Arial" font-size="10" fill="#333">system responses to user actions</text>
    <rect x="290" y="365" width="230" height="40" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="300" y="379" font-family="Arial" font-size="10" fill="#333">Think-Aloud: User verbalizes</text>
    <text x="300" y="393" font-family="Arial" font-size="10" fill="#333">thoughts during task completion</text>
    <rect x="540" y="365" width="220" height="40" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="550" y="379" font-family="Arial" font-size="10" fill="#333">A/B Testing: Compare different</text>
    <text x="550" y="393" font-family="Arial" font-size="10" fill="#333">prototype versions</text>
  </g>
  
  <!-- step5: Advantages & Comparison -->
  <g class="step" id="step5" data-narration="Paper prototypes are cost-effective and enable early validation of design concepts while facilitating collaboration among team members with minimal technical skills required.">
    <rect x="20" y="422" width="760" height="82" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="442" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Advantages &amp; Comparison</text>
    <rect x="40" y="456" width="350" height="40" rx="4" fill="#c8e6c9"/>
    <text x="50" y="470" font-family="Arial" font-size="10" fill="#333">Advantages: Cost-effective, Early validation,</text>
    <text x="50" y="484" font-family="Arial" font-size="10" fill="#333">Collaborative, No technical skills needed</text>
    <rect x="410" y="456" width="350" height="40" rx="4" fill="#ffcdd2"/>
    <text x="420" y="470" font-family="Arial" font-size="10" fill="#333">vs Digital: Higher cost, Longer dev time,</text>
    <text x="420" y="484" font-family="Arial" font-size="10" fill="#333">Less flexible for early changes</text>
  </g>
  
  <!-- step6: Examples & Exam Tips -->
  <g class="step" id="step6" data-narration="Common examples include login screens, checkout flows, and navigation menus. For exams, memorize the 5-stage process and key testing metrics such as success rate and error frequency.">
    <rect x="20" y="513" width="760" height="75" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="533" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Examples &amp; Exam Tips</text>
    <rect x="40" y="548" width="220" height="32" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="562" font-family="Arial" font-size="9" fill="#333">Ex1: Mobile Login with Forgot Password</text>
    <rect x="280" y="548" width="220" height="32" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="290" y="562" font-family="Arial" font-size="9" fill="#333">Ex2: E-Commerce Checkout Flow</text>
    <rect x="520" y="548" width="240" height="32" rx="4" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
    <text x="530" y="560" font-family="Arial" font-size="9" fill="#333">Tips: 5-stage process, Testing metrics</text>
    <text x="530" y="572" font-family="Arial" font-size="9" fill="#333">(success rate, error frequency, task time)</text>
  </g>
</svg>