<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="UX Design Guidelines - Learn core principles for creating intuitive, efficient, and enjoyable digital experiences that meet user needs and business goals.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">UX Design Guidelines</text>
  </g>
  
  <g class="step" id="step1" data-narration="UX design focuses on meaningful experiences. It combines psychology, design principles, and technical constraints to solve real user problems and deliver value.">
    <rect x="20" y="58" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">What is UX Design?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">User Experience design creates meaningful interactions with digital products.</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">It ensures interfaces are intuitive, efficient, and enjoyable to use.</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">Combines psychology, design principles, and technical constraints to solve problems.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Key concepts include usability (learnability, efficiency, error prevention), accessibility (WCAG guidelines), and consistency in layout, interactions, and terminology across platforms.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key UX Concepts</text>
    <rect x="40" y="178" width="145" height="35" fill="#c8e6c9" rx="4"/>
    <text x="60" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Usability</text>
    <text x="60" y="204" font-family="Arial" font-size="8" fill="#333">Learnability, Efficiency,</text>
    <text x="60" y="212" font-family="Arial" font-size="8" fill="#333">Error Prevention</text>
    <rect x="200" y="178" width="145" height="35" fill="#c8e6c9" rx="4"/>
    <text x="220" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Accessibility</text>
    <text x="220" y="204" font-family="Arial" font-size="8" fill="#333">WCAG Guidelines,</text>
    <text x="220" y="212" font-family="Arial" font-size="8" fill="#333">Disability Support</text>
    <rect x="360" y="178" width="145" height="35" fill="#c8e6c9" rx="4"/>
    <text x="380" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Consistency</text>
    <text x="380" y="204" font-family="Arial" font-size="8" fill="#333">Uniform layout,</text>
    <text x="380" y="212" font-family="Arial" font-size="8" fill="#333">terminology, actions</text>
    <rect x="520" y="178" width="145" height="35" fill="#c8e6c9" rx="4"/>
    <text x="540" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Visual Hierarchy</text>
    <text x="540" y="204" font-family="Arial" font-size="8" fill="#333">Size, color, spacing</text>
    <text x="540" y="212" font-family="Arial" font-size="8" fill="#333">guide attention</text>
  </g>
  
  <g class="step" id="step3" data-narration="Fitts's Law: time to reach a target depends on distance and size. Hick's Law: decision time increases with number of choices.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Important UX Laws</text>
    <rect x="40" y="268" width="340" height="35" fill="#ffe0b2" rx="4"/>
    <text x="55" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Fitts's Law</text>
    <text x="140" y="282" font-family="Arial" font-size="9" fill="#333">MT = a + b log₂(D/W + 1)</text>
    <text x="55" y="295" font-family="Arial" font-size="8" fill="#555">Time to reach target = Distance / Size of target</text>
    <rect x="400" y="268" width="340" height="35" fill="#ffe0b2" rx="4"/>
    <text x="415" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Hick's Law</text>
    <text x="500" y="282" font-family="Arial" font-size="9" fill="#333">RT = a + b log₂(n)</text>
    <text x="415" y="295" font-family="Arial" font-size="8" fill="#555">Decision time increases with number of options</text>
  </g>
  
  <g class="step" id="step4" data-narration="Nielsen's 10 heuristics include: visibility of system status, match between system and real world, user control and freedom, and consistency with system standards.">
    <rect x="20" y="322" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Nielsen's 10 Usability Heuristics</text>
    <rect x="40" y="355" width="110" height="35" fill="#bbdefb" rx="4"/>
    <text x="48" y="368" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">1. Visibility</text>
    <text x="48" y="380" font-family="Arial" font-size="7" fill="#333">System status</text>
    <rect x="160" y="355" width="110" height="35" fill="#bbdefb" rx="4"/>
    <text x="168" y="368" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">2. Match</text>
    <text x="168" y="380" font-family="Arial" font-size="7" fill="#333">Real world</text>
    <rect x="280" y="355" width="110" height="35" fill="#bbdefb" rx="4"/>
    <text x="288" y="368" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">3. User Control</text>
    <text x="288" y="380" font-family="Arial" font-size="7" fill="#333">Undo/Redo</text>
    <rect x="400" y="355" width="110" height="35" fill="#bbdefb" rx="4"/>
    <text x="408" y="368" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">4. Consistency</text>
    <text x="408" y="380" font-family="Arial" font-size="7" fill="#333">Standards</text>
    <rect x="520" y="355" width="110" height="35" fill="#bbdefb" rx="4"/>
    <text x="528" y="368" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">5. Error Prevention</text>
    <text x="528" y="380" font-family="Arial" font-size="7" fill="#333">Confirmation</text>
    <rect x="640" y="355" width="110" height="35" fill="#bbdefb" rx="4"/>
    <text x="648" y="368" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1">6-10</text>
    <text x="648" y="380" font-family="Arial" font-size="7" fill="#333">Recognition, Help</text>
  </g>
  
  <g class="step" id="step5" data-narration="Real examples: registration form reduced from 12 to 5 fields increased completions by 40%. E-commerce single-page checkout reduced abandonment by 25%.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Real-World UX Examples</text>
    <rect x="40" y="445" width="340" height="35" fill="#ffcdd2" rx="4"/>
    <text x="55" y="458" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Registration Form Improvement</text>
    <text x="55" y="470" font-family="Arial" font-size="8" fill="#333">12 fields → 5 fields + validation = 40% more completions</text>
    <rect x="400" y="445" width="340" height="35" fill="#ffcdd2" rx="4"/>
    <text x="415" y="458" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">E-Commerce Checkout</text>
    <text x="415" y="470" font-family="Arial" font-size="8" fill="#333">Multi-page → Single-page + guest checkout = 25% less abandonment</text>
  </g>
  
  <g class="step" id="step6" data-narration="Best practices include mobile-first design with 48px+ touch targets, 4.5:1 color contrast ratios, F-pattern layout, and cognitive load reduction through chunking and progressive disclosure.">
    <rect x="20" y="498" width="760" height="90" fill="#e8f5e9" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Best Practices &amp; Exam Tips</text>
    <rect x="40" y="532" width="145" height="45" fill="#c8e6c9" rx="4"/>
    <text x="50" y="545" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Mobile-First</text>
    <text x="50" y="556" font-family="Arial" font-size="7" fill="#333">Touch targets</text>
    <text x="50" y="563" font-family="Arial" font-size="7" fill="#333">>48px, responsive</text>
    <text x="50" y="573" font-family="Arial" font-size="7" fill="#333">layout</text>
    <rect x="200" y="532" width="145" height="45" fill="#c8e6c9" rx="4"/>
    <text x="210" y="545" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Accessibility</text>
    <text x="210" y="556" font-family="Arial" font-size="7" fill="#333">WCAG 2.1</text>
    <text x="210" y="563" font-family="Arial" font-size="7" fill="#333">4.5:1 contrast,</text>
    <text x="210" y="573" font-family="Arial" font-size="7" fill="#333">Section 508</text>
    <rect x="360" y="532" width="145" height="45" fill="#c8e6c9" rx="4"/>
    <text x="370" y="545" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Cognitive Load</text>
    <text x="370" y="556" font-family="Arial" font-size="7" fill="#333">Chunking,</text>
    <text x="370" y="563" font-family="Arial" font-size="7" fill="#333">progressive</text>
    <text x="370" y="573" font-family="Arial" font-size="7" fill="#333">disclosure</text>
    <rect x="520" y="532" width="145" height="45" fill="#c8e6c9" rx="4"/>
    <text x="530" y="545" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Exam Focus</text>
    <text x="530" y="556" font-family="Arial" font-size="7" fill="#333">Nielsen's 10,</text>
    <text x="530" y="563" font-family="Arial" font-size="7" fill="#333">Fitts/Hick's Law,</text>
    <text x="530" y="573" font-family="Arial" font-size="7" fill="#333">WCAG levels</text>
  </g>
</svg>