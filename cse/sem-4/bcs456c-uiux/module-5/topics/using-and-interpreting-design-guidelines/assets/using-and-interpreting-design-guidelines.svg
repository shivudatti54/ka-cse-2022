<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Design guidelines are systematic recommendations that help create consistent, usable software interfaces by reducing design decisions and improving user experience across applications.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Using and Interpreting Design Guidelines</text>
  </g>
  
  <g class="step" id="step1" data-narration="Design guidelines reduce cognitive load, ensure consistency across screens, meet accessibility requirements for diverse users, and ultimately accelerate development time and costs.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Why Design Guidelines Matter</text>
    <rect x="40" y="95" width="170" height="35" fill="#1976d2" rx="3"/>
    <text x="125" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Reduce Cognitive Load</text>
    <rect x="220" y="95" width="170" height="35" fill="#388e3c" rx="3"/>
    <text x="305" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Ensure Consistency</text>
    <rect x="400" y="95" width="170" height="35" fill="#ff9800" rx="3"/>
    <text x="485" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Meet Accessibility</text>
    <rect x="580" y="95" width="180" height="35" fill="#9c27b0" rx="3"/>
    <text x="670" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Accelerate Development</text>
  </g>
  
  <g class="step" id="step2" data-narration="Four main categories exist: prescriptive rules specifying exact implementations, principle-based concepts providing flexible direction, platform-specific guidelines for particular environments, and accessibility standards for inclusive design.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Types of Design Guidelines</text>
    <rect x="40" y="185" width="165" height="35" fill="#388e3c" rx="3"/>
    <text x="122" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Prescriptive</text>
    <text x="122" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Specific rules</text>
    <rect x="215" y="185" width="165" height="35" fill="#4caf50" rx="3"/>
    <text x="297" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Principle-Based</text>
    <text x="297" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Broad concepts</text>
    <rect x="390" y="185" width="165" height="35" fill="#66bb6a" rx="3"/>
    <text x="472" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Platform-Specific</text>
    <text x="472" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Material, HIG</text>
    <rect x="565" y="185" width="195" height="35" fill="#81c784" rx="3"/>
    <text x="662" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Accessibility Standards</text>
    <text x="662" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">WCAG 2.1, Section 508</text>
  </g>
  
  <g class="step" id="step3" data-narration="Four core design principles guide interface creation: maintaining visual consistency across elements, providing continuous system feedback, preventing errors through validation, and offering flexible customization for diverse user needs.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Core Principles</text>
    <circle cx="90" cy="290" r="22" fill="#ff9800"/>
    <text x="90" y="286" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Consistency</text>
    <text x="90" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Uniform layouts</text>
    <circle cx="200" cy="290" r="22" fill="#ff9800"/>
    <text x="200" y="286" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Feedback</text>
    <text x="200" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Status visibility</text>
    <circle cx="310" cy="290" r="22" fill="#ff9800"/>
    <text x="310" y="286" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Error Prevention</text>
    <text x="310" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Input validation</text>
    <circle cx="420" cy="290" r="22" fill="#ff9800"/>
    <text x="420" y="286" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Flexibility</text>
    <text x="420" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Customizable UI</text>
    <text x="520" y="265" font-family="Arial" font-size="11" fill="#e65100" font-weight="bold">Nielsen's 10 Heuristics:</text>
    <text x="520" y="280" font-family="Arial" font-size="9" fill="#555">Visibility, Match, Control,</text>
    <text x="520" y="293" font-family="Arial" font-size="9" fill="#555">Consistency, Error Prevention,</text>
    <text x="520" y="306" font-family="Arial" font-size="9" fill="#555">Recognition, Flexibility, Minimalism</text>
  </g>
  
  <g class="step" id="step4" data-narration="Interpretation involves three steps: analyzing context to understand users, devices, and objectives; mapping priorities to classify requirements as mandatory or recommended; and resolving conflicts between competing guidelines.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Interpretation Process</text>
    <rect x="40" y="360" width="220" height="35" fill="#9c27b0" rx="3"/>
    <text x="150" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">1. Context Analysis</text>
    <text x="150" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#f3e5f5">Identify users &amp; devices</text>
    <line x1="265" y1="377" x2="290" y2="377" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="295" y="360" width="220" height="35" fill="#ba68c8" rx="3"/>
    <text x="405" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">2. Priority Mapping</text>
    <text x="405" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#f3e5f5">Classify mandatory/recommended</text>
    <line x1="520" y1="377" x2="545" y2="377" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="550" y="360" width="220" height="35" fill="#ce93d8" rx="3"/>
    <text x="660" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">3. Conflict Resolution</text>
    <text x="660" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Handle contradictions</text>
  </g>
  
  <g class="step" id="step5" data-narration="This WCAG example shows accessible form implementation with proper ARIA labels for screen readers, full keyboard navigation support, and adequate color contrast ratios meeting WCAG AA accessibility standards.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">WCAG Implementation Example</text>
    <rect x="40" y="450" width="340" height="35" fill="#f44336" rx="3"/>
    <text x="60" y="465" font-family="Courier" font-size="9" fill="white">&lt;label for="email" class="sr-only"&gt;Email&lt;/label&gt;</text>
    <text x="60" y="477" font-family="Courier" font-size="9" fill="white">&lt;input id="email" aria-describedby="help"&gt;</text>
    <rect x="400" y="450" width="370" height="35" fill="#388e3c" rx="3"/>
    <text x="420" y="465" font-family="Arial" font-size="10" fill="white" font-weight="bold">WCAG Criteria Applied:</text>
    <text x="420" y="478" font-family="Arial" font-size="9" fill="#e8f5e9">1.3.1 Info &amp; Relationships | 2.1.1 Keyboard | 1.4.3 Contrast</text>
  </g>
  
  <g class="step" id="step6" data-narration="Exam tips include citing specific guideline versions like WCAG 2.1 or ISO 9241-210, distinguishing platform-specific from general rules, memorizing core WCAG success criteria, and documenting all exceptions with clear justification.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Points</text>
    <rect x="40" y="535" width="150" height="45" fill="#1976d2" rx="3"/>
    <text x="115" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Cite Specific Versions</text>
    <text x="115" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">WCAG 2.1 vs 2.0</text>
    <text x="115" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">ISO 9241-210</text>
    <rect x="200" y="535" width="150" height="45" fill="#1976d2" rx="3"/>
    <text x="275" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Memorize WCAG</text>
    <text x="275" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">1.4.3 Contrast 4.5:1</text>
    <text x="275" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">POUR Principles</text>
    <rect x="360" y="535" width="150" height="45" fill="#1976d2" rx="3"/>
    <text x="435" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Use Mnemonics</text>
    <text x="435" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">"CECRM" for</text>
    <text x="435" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">heuristics</text>
    <rect x="520" y="535" width="150" height="45" fill="#388e3c" rx="3"/>
    <text x="595" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Document Exceptions</text>
    <text x="595" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Always note</text>
    <text x="595" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">trade-offs</text>
    <rect x="680" y="535" width="90" height="45" fill="#ff9800" rx="3"/>
    <text x="725" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Practice</text>
    <text x="725" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="white">ATM redesign</text>
  </g>
</svg>