<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="UX Design Guidelines cover planning, translation, and physical action components for effective interface design and user experience optimization in digital products.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">UX Design Guidelines: Planning, Translation &amp; Physical Action</text>
  </g>

  <!-- Step 1: Guidelines & Examples -->
  <g class="step" id="step1" data-narration="Guidelines provide rules for UI design. Examples include Apple's Human Interface Guidelines and Material Design. They should be clear and easy to understand.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <rect x="20" y="58" width="8" height="80" fill="#1976d2" rx="4"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Guidelines &amp; Examples</text>
    <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">Definition: Guidelines that provide rules for designing user interfaces (UIs)</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">Examples: Apple's Human Interface Guidelines, Material Design Guidelines</text>
    <rect x="580" y="70" width="180" height="50" fill="#e3f2fd" rx="3"/>
    <text x="670" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Key Takeaway:</text>
    <text x="670" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Clear, concise &amp; easy to understand</text>
  </g>

  <!-- Step 2: Planning -->
  <g class="step" id="step2" data-narration="Planning involves defining problems, researching users, creating wireframes, building prototypes, and conducting usability tests to validate designs with real user feedback.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <rect x="20" y="146" width="8" height="80" fill="#388e3c" rx="4"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Planning</text>
    <text x="40" y="184" font-family="Arial" font-size="10" fill="#333">Key Concepts: Problem definition, User research, Wireframing &amp; prototyping, Usability testing</text>
    <text x="40" y="202" font-family="Arial" font-size="10" fill="#333">Formula: Heuristic evaluation - A method for evaluating usability based on a set of heuristics</text>
    <rect x="500" y="158" width="260" height="56" fill="#e8f5e9" rx="3"/>
    <text x="630" y="178" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Planning Process</text>
    <text x="630" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Research → Define → Wireframe → Test</text>
  </g>

  <!-- Step 3: Translation -->
  <g class="step" id="step3" data-narration="Translation means adapting designs for target audiences, considering cultural and language differences while creating an actionable translation plan for global product deployment.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <rect x="20" y="234" width="8" height="80" fill="#ff9800" rx="4"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Translation</text>
    <text x="40" y="272" font-family="Arial" font-size="10" fill="#333">Key Concepts: Understanding target audience, Identifying cultural and language differences, Creating translation plan</text>
    <text x="40" y="290" font-family="Arial" font-size="10" fill="#333">Formula: Fitts' Law - Mathematical model for predicting time to reach a target</text>
    <rect x="540" y="246" width="220" height="56" fill="#fff3e0" rx="3"/>
    <text x="630" y="268" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Target Audience Analysis</text>
    <text x="630" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Cultural context + Language adaptation</text>
  </g>

  <!-- Step 4: Physical Action -->
  <g class="step" id="step4" data-narration="Physical action covers user gestures, touch targets, and accessibility. The Law of Least Effort states users choose options requiring least effort.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <rect x="20" y="322" width="8" height="80" fill="#9c27b0" rx="4"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Physical Action</text>
    <text x="40" y="360" font-family="Arial" font-size="10" fill="#333">Key Concepts: Gestures and movements, Touch targets and feedback, Accessibility considerations</text>
    <text x="40" y="378" font-family="Arial" font-size="10" fill="#333">Theorem: Law of Least Effort - Users choose options requiring least amount of effort</text>
    <rect x="540" y="334" width="220" height="56" fill="#f3e5f5" rx="3"/>
    <text x="630" y="356" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Design Principles</text>
    <text x="630" y="373" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Accessible • Responsive • Intuitive</text>
  </g>

  <!-- Step 5: Outcomes -->
  <g class="step" id="step5" data-narration="Outcomes measure success through user satisfaction, business ROI, and key metrics like Net Promoter Score for comprehensive UX effectiveness evaluation.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <rect x="20" y="410" width="8" height="80" fill="#1976d2" rx="4"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">5. Outcomes</text>
    <text x="40" y="448" font-family="Arial" font-size="10" fill="#333">Key Concepts: User satisfaction and engagement, Business outcomes and ROI, Measuring UX success</text>
    <text x="40" y="466" font-family="Arial" font-size="10" fill="#333">Formula: Net Promoter Score (NPS) - A metric for measuring user satisfaction</text>
    <rect x="500" y="422" width="260" height="56" fill="#e3f2fd" rx="3"/>
    <text x="630" y="442" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Success Metrics</text>
    <text x="630" y="460" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">NPS + Engagement + ROI</text>
  </g>

  <!-- Step 6: Assessment & Overall -->
  <g class="step" id="step6" data-narration="Assessment involves usability testing and A/B testing with analytics. Overall approach combines human-centered design with empathy-driven iterative design thinking methodology.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <rect x="20" y="498" width="8" height="90" fill="#388e3c" rx="4"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">6. Assessment &amp; 7. Overall</text>
    <text x="40" y="538" font-family="Arial" font-size="10" fill="#333">Assessment: Usability testing, A/B testing, Analytics and data-driven design</text>
    <text x="40" y="552" font-family="Arial" font-size="10" fill="#333">Formula: Conversion rate - Measuring effectiveness of a design</text>
    <text x="40" y="568" font-family="Arial" font-size="10" fill="#333">Overall: Human-centered design, Empathy, Design thinking, Iterative design</text>
    <rect x="540" y="510" width="220" height="66" fill="#e8f5e9" rx="3"/>
    <text x="630" y="532" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Golden Rule of Design</text>
    <text x="630" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Design should be intuitive</text>
    <text x="630" y="564" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">and easy to use</text>
  </g>
</svg>