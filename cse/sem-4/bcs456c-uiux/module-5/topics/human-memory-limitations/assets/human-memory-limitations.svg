<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Human memory limitations are crucial for designing effective user interfaces. This diagram covers the three-stage memory model, Miller's Law, and practical design applications.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" fill="white" font-weight="bold">Human Memory Limitations</text>
  </g>
  
  <g class="step" id="step1" data-narration="The three-stage memory model processes information sequentially. Sensory memory captures brief raw data, short-term memory holds it temporarily, and long-term stores it permanently.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">Three-Stage Memory Model</text>
    <rect x="40" y="90" width="200" height="40" rx="4" fill="#bbdefb"/>
    <text x="140" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Sensory Memory</text>
    <text x="140" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">(&lt;1 second)</text>
    <path d="M250,110 L280,110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="290" y="90" width="200" height="40" rx="4" fill="#bbdefb"/>
    <text x="390" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Short-Term Memory</text>
    <text x="390" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">(15-30 seconds)</text>
    <path d="M500,110 L530,110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="540" y="90" width="200" height="40" rx="4" fill="#bbdefb"/>
    <text x="640" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Long-Term Memory</text>
    <text x="640" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1"> Unlimited</text>
  </g>
  
  <g class="step" id="step2" data-narration="Miller's Law states short-term memory holds 7±2 items. This fundamental limit directly impacts interface design decisions like menu item counts and form field groupings.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="166" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">Short-Term Memory: Miller's Law (7±2)</text>
    <rect x="40" y="180" width="340" height="38" rx="4" fill="#c8e6c9"/>
    <text x="210" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Capacity: 7±2 items</text>
    <text x="210" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">(George Miller, 1956)</text>
    <rect x="400" y="180" width="340" height="38" rx="4" fill="#c8e6c9"/>
    <text x="570" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Duration: 15-30 seconds</text>
    <text x="570" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">without rehearsal</text>
  </g>
  
  <g class="step" id="step3" data-narration="Sensory memory has two key types: iconic memory stores visual information for less than a second, while echoic memory retains auditory input for 3-4 seconds.">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="254" font-family="Arial" font-size="12" fill="#e65100" font-weight="bold">Sensory Memory Details</text>
    <rect x="40" y="268" width="350" height="38" rx="4" fill="#ffe0b2"/>
    <text x="215" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#bf360c">Iconic Memory (Visual)</text>
    <text x="215" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#bf360c">0.5 - 1 second retention</text>
    <rect x="410" y="268" width="350" height="38" rx="4" fill="#ffe0b2"/>
    <text x="585" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#bf360c">Echoic Memory (Auditory)</text>
    <text x="585" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#bf360c">3 - 4 seconds retention</text>
  </g>
  
  <g class="step" id="step4" data-narration="Cognitive load theory identifies three types: intrinsic (task complexity), extraneous (poor design), and germane (learning effort). Effective interfaces minimize extraneous load.">
    <rect x="20" y="322" width="760" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="342" font-family="Arial" font-size="12" fill="#7b1fa2" font-weight="bold">Cognitive Load Theory</text>
    <rect x="40" y="358" width="230" height="36" rx="4" fill="#e1bee7"/>
    <text x="155" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Intrinsic Load</text>
    <text x="155" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Task complexity</text>
    <rect x="285" y="358" width="230" height="36" rx="4" fill="#e1bee7"/>
    <text x="400" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Extraneous Load</text>
    <text x="400" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Poor presentation</text>
    <rect x="530" y="358" width="230" height="36" rx="4" fill="#e1bee7"/>
    <text x="645" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Germane Load</text>
    <text x="645" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a148c">Learning effort</text>
  </g>
  
  <g class="step" id="step5" data-narration="Design applications include chunking phone numbers as xxx-xxx-xxxx, limiting menus to 5 options, and creating effective memorable passwords like CorrectHorseBatteryStaple.">
    <rect x="20" y="410" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="430" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">Design Applications</text>
    <rect x="40" y="448" width="230" height="35" rx="4" fill="#bbdefb"/>
    <text x="155" y="467" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Chunking: Phone (xxx-xxx-xxxx)</text>
    <rect x="285" y="448" width="230" height="35" rx="4" fill="#bbdefb"/>
    <text x="400" y="467" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Limit Menu Items: 5 options</text>
    <rect x="530" y="448" width="230" height="35" rx="4" fill="#bbdefb"/>
    <text x="645" y="467" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Memorable Passwords</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key principles: use recognition over recall (menus vs commands), implement progressive disclosure, and keep error messages visible until acknowledged to combat memory decay.">
    <rect x="20" y="498" width="760" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="520" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">Key Design Principles</text>
    <rect x="40" y="535" width="220" height="45" rx="4" fill="#c8e6c9"/>
    <text x="150" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Recognition over Recall</text>
    <text x="150" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Menus > Commands</text>
    <rect x="275" y="535" width="220" height="45" rx="4" fill="#c8e6c9"/>
    <text x="385" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Progressive Disclosure</text>
    <text x="385" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Show info when needed</text>
    <rect x="510" y="535" width="250" height="45" rx="4" fill="#c8e6c9"/>
    <text x="635" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Persistent Error Messages</text>
    <text x="635" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Until acknowledged</text>
  </g>
</svg>