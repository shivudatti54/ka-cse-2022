<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Measurement instruments are essential tools for quantifying physical quantities, analyzing system performance, and debugging electronic circuits in computer engineering applications and research.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Measurement Instruments</text>
  </g>
  
  <!-- step1: Classification -->
  <g class="step" id="step1" data-narration="Instruments are classified as analog versus digital for signal type, active versus passive for power requirement, absolute versus secondary for calibration method, and contact versus non-contact for measurement approach.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Classification of Instruments</text>
    <rect x="25" y="85" width="170" height="42" fill="white" rx="3" stroke="#1976d2" stroke-width="1"/>
    <text x="35" y="100" font-family="Arial" font-size="9" fill="#333">Analog vs Digital</text>
    <text x="35" y="115" font-family="Arial" font-size="8" fill="#666">Continuous vs discrete</text>
    <rect x="205" y="85" width="170" height="42" fill="white" rx="3" stroke="#1976d2" stroke-width="1"/>
    <text x="215" y="100" font-family="Arial" font-size="9" fill="#333">Active vs Passive</text>
    <text x="215" y="115" font-family="Arial" font-size="8" fill="#666">Needs power vs no power</text>
    <rect x="385" y="85" width="170" height="42" fill="white" rx="3" stroke="#1976d2" stroke-width="1"/>
    <text x="395" y="100" font-family="Arial" font-size="9" fill="#333">Absolute vs Secondary</text>
    <text x="395" y="115" font-family="Arial" font-size="8" fill="#666">Reference vs calibrated</text>
    <rect x="565" y="85" width="170" height="42" fill="white" rx="3" stroke="#1976d2" stroke-width="1"/>
    <text x="575" y="100" font-family="Arial" font-size="9" fill="#333">Contact vs Non-contact</text>
    <text x="575" y="115" font-family="Arial" font-size="8" fill="#666">Physical vs remote</text>
  </g>
  
  <!-- step2: Essential Characteristics -->
  <g class="step" id="step2" data-narration="Key characteristics include accuracy for closeness to true value, precision for repeatability, resolution for smallest detectable change, linearity for input-output proportionality, and bandwidth for frequency range capability.">
    <rect x="10" y="146" width="780" height="80" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Essential Characteristics</text>
    <rect x="25" y="175" width="145" height="42" fill="white" rx="3" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Accuracy</text>
    <text x="35" y="205" font-family="Arial" font-size="8" fill="#666">Closeness to true value</text>
    <rect x="180" y="175" width="145" height="42" fill="white" rx="3" stroke="#388e3c" stroke-width="1"/>
    <text x="190" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Precision</text>
    <text x="190" y="205" font-family="Arial" font-size="8" fill="#666">Repeatability of measurements</text>
    <rect x="335" y="175" width="145" height="42" fill="white" rx="3" stroke="#388e3c" stroke-width="1"/>
    <text x="345" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Resolution</text>
    <text x="345" y="205" font-family="Arial" font-size="8" fill="#666">Smallest detectable change</text>
    <rect x="490" y="175" width="145" height="42" fill="white" rx="3" stroke="#388e3c" stroke-width="1"/>
    <text x="500" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Bandwidth</text>
    <text x="500" y="205" font-family="Arial" font-size="8" fill="#666">Frequency range of operation</text>
    <rect x="645" y="175" width="130" height="42" fill="white" rx="3" stroke="#388e3c" stroke-width="1"/>
    <text x="655" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Linearity</text>
    <text x="655" y="205" font-family="Arial" font-size="8" fill="#666">Input-output proportionality</text>
  </g>
  
  <!-- step3: Common Instruments -->
  <g class="step" id="step3" data-narration="Digital multimeters combine voltmeter, ammeter, and ohmmeter functions to measure electrical parameters. Oscilloscopes visualize time-domain signals while logic analyzers capture complex digital circuit signals for debugging.">
    <rect x="10" y="234" width="780" height="80" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Common Computer Engineering Instruments</text>
    <rect x="25" y="262" width="145" height="44" fill="white" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="35" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Digital Multimeter</text>
    <text x="35" y="293" font-family="Arial" font-size="8" fill="#666">V, A, Ω measurement</text>
    <rect x="180" y="262" width="145" height="44" fill="white" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="190" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Oscilloscope</text>
    <text x="190" y="293" font-family="Arial" font-size="8" fill="#666">Visualize waveforms</text>
    <rect x="335" y="262" width="145" height="44" fill="white" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="345" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Logic Analyzer</text>
    <text x="345" y="293" font-family="Arial" font-size="8" fill="#666">Digital timing capture</text>
    <rect x="490" y="262" width="145" height="44" fill="white" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="500" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Signal Generator</text>
    <text x="500" y="293" font-family="Arial" font-size="8" fill="#666">Produce test signals</text>
    <rect x="645" y="262" width="130" height="44" fill="white" rx="3" stroke="#ff9800" stroke-width="1"/>
    <text x="655" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Network Analyzer</text>
    <text x="655" y="293" font-family="Arial" font-size="8" fill="#666">S-parameters, RF</text>
  </g>
  
  <!-- step4: Important Formulas -->
  <g class="step" id="step4" data-narration="Key formulas include Nyquist theorem for proper signal sampling rate, percentage error calculation for accuracy measurement, oscilloscope bandwidth formula, and ADC quantization error formula for digital conversion precision.">
    <rect x="10" y="322" width="780" height="80" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Important Formulas</text>
    <rect x="25" y="352" width="220" height="42" fill="white" rx="3" stroke="#9c27b0" stroke-width="1"/>
    <text x="35" y="367" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Nyquist Theorem</text>
    <text x="35" y="382" font-family="Arial" font-size="8" fill="#666">fs > 2 × fmax (sampling rate)</text>
    <rect x="255" y="352" width="220" height="42" fill="white" rx="3" stroke="#9c27b0" stroke-width="1"/>
    <text x="265" y="367" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Error Calculation</text>
    <text x="265" y="382" font-family="Arial" font-size="8" fill="#666">% error = |Vm - Va|/Va × 100</text>
    <rect x="485" y="352" width="140" height="42" fill="white" rx="3" stroke="#9c27b0" stroke-width="1"/>
    <text x="495" y="367" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Oscilloscope BW</text>
    <text x="495" y="382" font-family="Arial" font-size="8" fill="#666">BW = 0.35/trise</text>
    <rect x="635" y="352" width="140" height="42" fill="white" rx="3" stroke="#9c27b0" stroke-width="1"/>
    <text x="645" y="367" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Quantization Error</text>
    <text x="645" y="382" font-family="Arial" font-size="8" fill="#666">Q = Vrange/2^n</text>
  </g>
  
  <!-- step5: Smart Instrumentation -->
  <g class="step" id="step5" data-narration="Smart instrumentation includes automated test equipment for production testing, virtual instruments like LabVIEW for software-defined measurement, sensor networks for IoT distributed data collection, and machine learning integration for analytics.">
    <rect x="10" y="410" width="780" height="80" fill="#ffebee" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="25" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Smart Instrumentation</text>
    <rect x="25" y="440" width="170" height="42" fill="white" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="35" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Automated Test Equipment</text>
    <text x="35" y="470" font-family="Arial" font-size="8" fill="#666">ATE systems for production testing</text>
    <rect x="205" y="440" width="170" height="42" fill="white" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="215" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Virtual Instruments</text>
    <text x="215" y="470" font-family="Arial" font-size="8" fill="#666">LabVIEW, software-defined instruments</text>
    <rect x="385" y="440" width="170" height="42" fill="white" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="395" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Sensor Networks & IoT</text>
    <text x="395" y="470" font-family="Arial" font-size="8" fill="#666">Distributed measurement nodes</text>
    <rect x="565" y="440" width="210" height="42" fill="white" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="575" y="455" font-family="Arial" font-size="9" font-weight="bold" fill="#333">ML in Measurement</text>
    <text x="575" y="470" font-family="Arial" font-size="8" fill="#666">AI-powered analytics and prediction</text>
  </g>
  
  <!-- step6: Exam Tips and Common Mistakes -->
  <g class="step" id="step6" data-narration="Focus on analog versus digital differences, memorize error formulas, understand oscilloscope controls, and avoid common mistakes like improper probe settings and ignoring loading effects on measurements.">
    <rect x="10" y="498" width="780" height="85" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips & Common Mistakes</text>
    <rect x="25" y="525" width="235" height="50" fill="white" rx="3" stroke="#1976d2" stroke-width="1"/>
    <text x="35" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Exam Tips</text>
    <text x="35" y="555" font-family="Arial" font-size="8" fill="#666">• Compare analog vs digital</text>
    <text x="35" y="567" font-family="Arial" font-size="8" fill="#666">• Practice error calculation</text>
    <rect x="270" y="525" width="235" height="50" fill="white" rx="3" stroke="#f44336" stroke-width="1"/>
    <text x="280" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Common Mistakes</text>
    <text x="280" y="555" font-family="Arial" font-size="8" fill="#666">• Wrong probe setting at high freq</text>
    <text x="280" y="567" font-family="Arial" font-size="8" fill="#666">• Ignoring loading effects</text>
    <rect x="515" y="525" width="260" height="50" fill="white" rx="3" stroke="#388e3c" stroke-width="1"/>
    <text x="525" y="540" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Tools for Practice</text>
    <text x="525" y="555" font-family="Arial" font-size="8" fill="#666">• Wireshark for network analysis</text>
    <text x="525" y="567" font-family="Arial" font-size="8" fill="#666">• Linux: free, top, ping commands</text>
  </g>
</svg>