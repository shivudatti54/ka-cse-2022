<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Software metrics are quantitative measures used to assess software quality, process efficiency, and project performance in software engineering for continuous improvement.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Software Metrics and Targets</text>
  </g>
  
  <g class="step" id="step1" data-narration="Metrics help identify process improvement areas, predict timelines, evaluate quality, and enable data-driven project decisions for better outcomes and stakeholder satisfaction.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Why Use Metrics?</text>
    <rect x="40" y="88" width="170" height="42" fill="#e3f2fd" rx="4"/>
    <text x="125" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Process Improvement</text>
    <text x="125" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Identify weak areas</text>
    <rect x="220" y="88" width="170" height="42" fill="#e8f5e9" rx="4"/>
    <text x="305" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Predictability</text>
    <text x="305" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Timeline &amp; cost estimates</text>
    <rect x="400" y="88" width="170" height="42" fill="#fff3e0" rx="4"/>
    <text x="485" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Quality Evaluation</text>
    <text x="485" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Code quality attributes</text>
    <rect x="580" y="88" width="180" height="42" fill="#f3e5f5" rx="4"/>
    <text x="670" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Data-Driven Decisions</text>
    <text x="670" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Objective analysis</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three main metric types exist: Process metrics measure development efficiency, Product metrics assess code characteristics, and Project metrics track execution.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Types of Metrics</text>
    <rect x="40" y="180" width="230" height="38" fill="#e3f2fd" rx="4"/>
    <text x="155" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Process Metrics</text>
    <text x="155" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Cycle time, Defect removal rate</text>
    <rect x="280" y="180" width="230" height="38" fill="#f3e5f5" rx="4"/>
    <text x="395" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Product Metrics</text>
    <text x="395" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Complexity, Maintainability, LOC</text>
    <rect x="520" y="180" width="240" height="38" fill="#fff3e0" rx="4"/>
    <text x="640" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Project Metrics</text>
    <text x="640" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Effort variance, Schedule adherence</text>
  </g>
  
  <g class="step" id="step3" data-narration="Key formulas: Defect Density equals total defects divided by KLOC. Code Coverage is tested lines divided by total lines times hundred.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Important Formulas</text>
    <rect x="40" y="268" width="340" height="38" fill="#fff3e0" rx="4"/>
    <text x="210" y="283" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Defect Density</text>
    <text x="210" y="297" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">= Total Defects / KLOC (target: &lt;1.0)</text>
    <rect x="390" y="268" width="170" height="38" fill="#e8f5e9" rx="4"/>
    <text x="475" y="283" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Code Coverage</text>
    <text x="475" y="297" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">= (Tested/Total)×100</text>
    <rect x="570" y="268" width="190" height="38" fill="#e3f2fd" rx="4"/>
    <text x="665" y="283" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Cyclomatic Complexity</text>
    <text x="665" y="297" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">= E - N + 2P (target: &lt;10)</text>
  </g>
  
  <g class="step" id="step4" data-narration="SMART targets are Specific, Measurable, Achievable, Relevant, and Time-bound goals that provide clear direction for teams to achieve objectives effectively.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">SMART Targets</text>
    <rect x="40" y="356" width="130" height="38" fill="#f3e5f5" rx="4"/>
    <text x="105" y="371" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Specific</text>
    <text x="105" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Clear goal</text>
    <rect x="175" y="356" width="130" height="38" fill="#e3f2fd" rx="4"/>
    <text x="240" y="371" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Measurable</text>
    <text x="240" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Quantifiable</text>
    <rect x="310" y="356" width="130" height="38" fill="#e8f5e9" rx="4"/>
    <text x="375" y="371" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Achievable</text>
    <text x="375" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Realistic</text>
    <rect x="445" y="356" width="130" height="38" fill="#fff3e0" rx="4"/>
    <text x="510" y="371" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Relevant</text>
    <text x="510" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Aligned</text>
    <rect x="580" y="356" width="180" height="38" fill="#ffebee" rx="4"/>
    <text x="670" y="371" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Time-bound</text>
    <text x="670" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Deadline set</text>
  </g>
  
  <g class="step" id="step5" data-narration="Leading indicators predict future outcomes like bug rates and code complexity. Lagging indicators show past results like defect density and customer satisfaction after release.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Leading vs Lagging Indicators</text>
    <rect x="40" y="448" width="350" height="34" fill="#e8f5e9" rx="4"/>
    <text x="215" y="463" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Leading Indicators (Predictive)</text>
    <text x="215" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Code churn, Build success rate, Test pass rate</text>
    <rect x="400" y="448" width="360" height="34" fill="#ffebee" rx="4"/>
    <text x="580" y="463" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Lagging Indicators (Outcome)</text>
    <text x="580" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Defect density, MTTR, Customer satisfaction scores</text>
  </g>
  
  <g class="step" id="step6" data-narration="Remember to memorize all key formulas with their correct units, understand metric types, practice SMART targets, and know the ISO 9126 quality characteristics for exams.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Terms</text>
    <rect x="40" y="530" width="220" height="50" fill="#e3f2fd" rx="4"/>
    <text x="150" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">KPIs &amp; Baselines</text>
    <text x="150" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Velocity, MTTR, Historical comparison</text>
    <rect x="270" y="530" width="250" height="50" fill="#f3e5f5" rx="4"/>
    <text x="395" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">ISO/IEC 9126</text>
    <text x="395" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">6 quality: Functionality, Reliability, Usability, Efficiency, Maintainability, Portability</text>
    <rect x="530" y="530" width="230" height="50" fill="#fff3e0" rx="4"/>
    <text x="645" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Avoid Mistakes</text>
    <text x="645" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Don't confuse KLOC with FP, avoid vanity metrics</text>
  </g>
</svg>