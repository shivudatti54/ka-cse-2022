<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="UX Goals are objectives that guide product design to create meaningful user interactions in modern digital contexts, balancing user needs with business objectives.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">UX Goals - User Experience Design Fundamentals</text>
  </g>
  
  <g class="step" id="step1" data-narration="UX Goals focus on user satisfaction, emotional impact, and overall experience quality, while Usability Goals focus on task efficiency and error reduction.">
    <rect x="20" y="58" width="760" height="100" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">UX Goals vs Usability Goals</text>
    <rect x="40" y="95" width="340" height="50" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="50" y="115" font-family="Arial" font-size="11" fill="#333">UX Goals: Satisfaction, Emotion,</text>
    <text x="50" y="130" font-family="Arial" font-size="11" fill="#333">Overall Experience Quality</text>
    <rect x="400" y="95" width="340" height="50" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="410" y="115" font-family="Arial" font-size="11" fill="#333">Usability: Learnability, Efficiency,</text>
    <text x="410" y="130" font-family="Arial" font-size="11" fill="#333">Error Reduction, Satisfaction</text>
  </g>
  
  <g class="step" id="step2" data-narration="User-Centered Design prioritizes user needs through comprehensive research, creating detailed personas, and conducting iterative usability testing to validate design decisions effectively.">
    <rect x="20" y="166" width="760" height="100" fill="#e8f5e9" rx="8"/>
    <text x="40" y="188" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">User-Centered Design Process</text>
    <rect x="40" y="205" width="160" height="50" fill="#c8e6c9" rx="4"/>
    <text x="50" y="225" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">1. User Research</text>
    <text x="50" y="240" font-family="Arial" font-size="9" fill="#333">Surveys, Interviews</text>
    <rect x="220" y="205" width="160" height="50" fill="#c8e6c9" rx="4"/>
    <text x="230" y="225" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">2. Create Personas</text>
    <text x="230" y="240" font-family="Arial" font-size="9" fill="#333">User Profiles</text>
    <rect x="400" y="205" width="160" height="50" fill="#c8e6c9" rx="4"/>
    <text x="410" y="225" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">3. Design Solutions</text>
    <text x="410" y="240" font-family="Arial" font-size="9" fill="#333">Wireframes, Prototypes</text>
    <rect x="580" y="205" width="160" height="50" fill="#c8e6c9" rx="4"/>
    <text x="590" y="225" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">4. Usability Testing</text>
    <text x="590" y="240" font-family="Arial" font-size="9" fill="#333">Validate & Iterate</text>
  </g>
  
  <g class="step" id="step3" data-narration="Nielsen's 10 Usability Heuristics include visibility of system status, match between system and real world, user control, and error prevention.">
    <rect x="20" y="274" width="760" height="100" fill="#fff3e0" rx="8"/>
    <text x="40" y="296" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Nielsen's 10 Usability Heuristics</text>
    <rect x="40" y="315" width="230" height="50" fill="#ffe0b2" rx="4"/>
    <text x="50" y="330" font-family="Arial" font-size="10" fill="#e65100">1. Visibility of System Status</text>
    <text x="50" y="345" font-family="Arial" font-size="9" fill="#333">2. Match System & Real World</text>
    <rect x="285" y="315" width="230" height="50" fill="#ffe0b2" rx="4"/>
    <text x="295" y="330" font-family="Arial" font-size="10" fill="#e65100">3. User Control & Freedom</text>
    <text x="295" y="345" font-family="Arial" font-size="9" fill="#333">4. Consistency & Standards</text>
    <rect x="530" y="315" width="230" height="50" fill="#ffe0b2" rx="4"/>
    <text x="540" y="330" font-family="Arial" font-size="10" fill="#e65100">5. Error Prevention</text>
    <text x="540" y="345" font-family="Arial" font-size="9" fill="#333">6. Recognition Rather Than Recall</text>
  </g>
  
  <g class="step" id="step4" data-narration="The HEART Framework measures UX with Happiness, Engagement, Adoption, Retention, and Task Success metrics for comprehensive evaluation of digital product experiences.">
    <rect x="20" y="382" width="760" height="100" fill="#f3e5f5" rx="8"/>
    <text x="40" y="404" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">HEART Framework (UX Metrics)</text>
    <rect x="40" y="425" width="130" height="50" fill="#e1bee7" rx="4"/>
    <text x="50" y="445" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">H - Happiness</text>
    <text x="50" y="460" font-family="Arial" font-size="9" fill="#333">User Satisfaction</text>
    <rect x="185" y="425" width="130" height="50" fill="#e1bee7" rx="4"/>
    <text x="195" y="445" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">E - Engagement</text>
    <text x="195" y="460" font-family="Arial" font-size="9" fill="#333">Active Usage</text>
    <rect x="330" y="425" width="130" height="50" fill="#e1bee7" rx="4"/>
    <text x="340" y="445" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">A - Adoption</text>
    <text x="340" y="460" font-family="Arial" font-size="9" fill="#333">New Users</text>
    <rect x="475" y="425" width="130" height="50" fill="#e1bee7" rx="4"/>
    <text x="485" y="445" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">R - Retention</text>
    <text x="485" y="460" font-family="Arial" font-size="9" fill="#333">Returning Users</text>
    <rect x="620" y="425" width="130" height="50" fill="#e1bee7" rx="4"/>
    <text x="630" y="445" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">T - Task Success</text>
    <text x="630" y="460" font-family="Arial" font-size="9" fill="#333">Efficiency Metrics</text>
  </g>
  
  <g class="step" id="step5" data-narration="WCAG Accessibility Principles ensure digital products are Perceivable, Operable, Understandable, and Robust for users with disabilities across different platforms and devices.">
    <rect x="20" y="490" width="760" height="100" fill="#ffebee" rx="8"/>
    <text x="40" y="512" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">WCAG 2.1 Accessibility Principles</text>
    <rect x="40" y="530" width="170" height="50" fill="#ffcdd2" rx="4"/>
    <text x="50" y="550" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Perceivable</text>
    <text x="50" y="565" font-family="Arial" font-size="9" fill="#333">Text alternatives, captions</text>
    <rect x="225" y="530" width="170" height="50" fill="#ffcdd2" rx="4"/>
    <text x="235" y="550" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Operable</text>
    <text x="235" y="565" font-family="Arial" font-size="9" fill="#333">Keyboard navigation</text>
    <rect x="410" y="530" width="170" height="50" fill="#ffcdd2" rx="4"/>
    <text x="420" y="550" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Understandable</text>
    <text x="420" y="565" font-family="Arial" font-size="9" fill="#333">Clear language, predictable</text>
    <rect x="595" y="530" width="170" height="50" fill="#ffcdd2" rx="4"/>
    <text x="605" y="550" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Robust</text>
    <text x="605" y="565" font-family="Arial" font-size="9" fill="#333">Compatible with assistive tech</text>
  </g>
</svg>