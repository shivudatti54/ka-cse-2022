<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="UX Metrics introduces quantitative measures for evaluating user experience in software design and digital interfaces, helping teams improve overall usability and product quality effectively.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">UX Metrics</text>
  </g>
  
  <g class="step" id="step1" data-narration="UX Metrics are quantitative measures evaluating user effectiveness, efficiency, and satisfaction with digital products and interfaces across various real-world usage scenarios and workflows.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Introduction to UX Metrics</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">UX Metrics are quantitative measures used to evaluate:</text>
    <rect x="40" y="105" width="210" height="25" rx="3" fill="#bbdefb"/>
    <text x="145" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Effectiveness</text>
    <rect x="260" y="105" width="210" height="25" rx="3" fill="#bbdefb"/>
    <text x="365" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Efficiency</text>
    <rect x="480" y="105" width="210" height="25" rx="3" fill="#bbdefb"/>
    <text x="585" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Satisfaction</text>
  </g>
  
  <g class="step" id="step2" data-narration="Performance metrics include Task Success Rate, Error Rate, and Time on Task, which directly measure user behavior and task completion during product interactions and workflows.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Performance Metrics (Behavioral)</text>
    <rect x="40" y="180" width="230" height="38" rx="3" fill="#c8e6c9"/>
    <text x="155" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Task Success Rate</text>
    <text x="155" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">% users completing tasks</text>
    <rect x="285" y="180" width="230" height="38" rx="3" fill="#c8e6c9"/>
    <text x="400" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Error Rate</text>
    <text x="400" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Frequency of user errors</text>
    <rect x="530" y="180" width="230" height="38" rx="3" fill="#c8e6c9"/>
    <text x="645" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Time on Task</text>
    <text x="645" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Avg. time to complete task</text>
  </g>
  
  <g class="step" id="step3" data-narration="Perception-based metrics include SUS, NPS, and CSAT which measure user attitudes and loyalty through standardized survey questionnaires and feedback collection methods.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Perception Metrics (Attitudinal)</text>
    <rect x="40" y="268" width="230" height="38" rx="3" fill="#ffe0b2"/>
    <text x="155" y="283" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">SUS Score</text>
    <text x="155" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#ef6c00">0-100 scale, &gt;68 = above avg</text>
    <rect x="285" y="268" width="230" height="38" rx="3" fill="#ffe0b2"/>
    <text x="400" y="283" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">NPS</text>
    <text x="400" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#ef6c00">Loyalty: -100 to +100</text>
    <rect x="530" y="268" width="230" height="38" rx="3" fill="#ffe0b2"/>
    <text x="645" y="283" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">CSAT</text>
    <text x="645" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#ef6c00">Satisfaction: 1-5 scale</text>
  </g>
  
  <g class="step" id="step4" data-narration="Task Success Rate measures the percentage of users who successfully complete a given objective by dividing successful completions by total attempts and multiplying by 100.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Example 1: Task Success Rate</text>
    <rect x="40" y="355" width="340" height="40" rx="3" fill="#e1bee7"/>
    <text x="60" y="370" font-family="Arial" font-size="9" fill="#4a148c">Scenario: 20 users attempted upload, 15 succeeded</text>
    <text x="60" y="385" font-family="Arial" font-size="9" fill="#4a148c">Formula: (15 / 20) × 100 = 75%</text>
    <rect x="400" y="355" width="360" height="40" rx="3" fill="#e1bee7"/>
    <text x="420" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Formula</text>
    <text x="420" y="385" font-family="Arial" font-size="9" fill="#4a148c">Task Success Rate = (Successful / Total) × 100</text>
  </g>
  
  <g class="step" id="step5" data-narration="SUS Score calculation involves adjusting odd-numbered responses by subtracting 1 and even-numbered responses by subtracting from 5, then summing and multiplying by 2.5.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Example 2: SUS Score Calculation</text>
    <rect x="40" y="445" width="340" height="38" rx="3" fill="#ffcdd2"/>
    <text x="60" y="458" font-family="Arial" font-size="9" fill="#b71c1c">Responses: [4,3,5,2,4,3,5,2,4,3]</text>
    <text x="60" y="473" font-family="Arial" font-size="9" fill="#b71c1c">Step 1: Odd items -1, Even from 5</text>
    <rect x="400" y="445" width="360" height="38" rx="3" fill="#ffcdd2"/>
    <text x="420" y="458" font-family="Arial" font-size="9" fill="#b71c1c">Step 2: Sum adjusted = 31, Score = 31 × 2.5</text>
    <text x="420" y="473" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Result: 77.5 (Above Average)</text>
  </g>
  
  <g class="step" id="step6" data-narration="CSAT calculates the percentage of positive ratings from survey responses. Key exam tips include memorizing formulas and understanding metric differences for practical applications.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#e0f2f1" stroke="#00796b" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#00796b">Example 3: CSAT &amp; Exam Tips</text>
    <rect x="40" y="530" width="220" height="50" rx="3" fill="#b2dfdb"/>
    <text x="50" y="545" font-family="Arial" font-size="9" fill="#004d40">50×5 + 30×4 + 10×3 + 5×2 + 5×1</text>
    <text x="50" y="560" font-family="Arial" font-size="9" fill="#004d40">Avg score = 540/100 = 4.0</text>
    <text x="50" y="575" font-family="Arial" font-size="9" font-weight="bold" fill="#004d40">Positive responses = 80%, CSAT = 80%</text>
    <rect x="280" y="530" width="480" height="50" rx="3" fill="#b2dfdb"/>
    <text x="295" y="545" font-family="Arial" font-size="9" font-weight="bold" fill="#004d40">Exam Tips:</text>
    <text x="295" y="558" font-family="Arial" font-size="8" fill="#004d40">1. Memorize formulas: Task Success, SUS, CSAT, NPS</text>
    <text x="295" y="570" font-family="Arial" font-size="8" fill="#004d40">2. SUS &gt;68 is above average | NPS = %Promoters - %Detractors</text>
    <text x="295" y="582" font-family="Arial" font-size="8" fill="#004d40">3. Pair quantitative metrics with qualitative user feedback</text>
  </g>
</svg>