<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Wireframes are visual blueprints showing the skeletal framework of websites using simple shapes. They represent basic structure before detailed visual design.">
    <rect x="200" y="8" width="400" height="42" fill="#1976d2" rx="6"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">WIREFRAMES IN UI/UX DESIGN</text>
  </g>

  <!-- step1: Definition -->
  <g class="step" id="step1" data-narration="A wireframe is a visual blueprint showing the skeletal framework of websites or applications using simple shapes and labels. It represents the basic structure before adding detailed visual design elements.">
    <rect x="50" y="58" width="700" height="82" fill="url(#blueGrad)" rx="8" stroke="#1976d2" stroke-width="1"/>
    <circle cx="85" cy="98" r="18" fill="#1976d2"/>
    <text x="85" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">1</text>
    <text x="120" y="83" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">What is a Wireframe?</text>
    <text x="120" y="105" font-family="Arial, sans-serif" font-size="11" fill="#333">A visual blueprint of digital products showing structure, layout</text>
    <text x="120" y="120" font-family="Arial, sans-serif" font-size="11" fill="#333">and functionality using simple shapes before visual design.</text>
  </g>

  <!-- step2: Types -->
  <g class="step" id="step2" data-narration="Two wireframe types exist: low-fidelity uses basic sketches with boxes and grayscale placeholders, while high-fidelity provides detailed digital versions with full interactivity.">
    <rect x="50" y="148" width="340" height="88" fill="url(#greenGrad)" rx="8" stroke="#388e3c" stroke-width="1"/>
    <circle cx="85" cy="185" r="18" fill="#388e3c"/>
    <text x="85" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">2</text>
    <text x="120" y="170" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Low-Fidelity (Lo-Fi)</text>
    <text x="120" y="190" font-family="Arial, sans-serif" font-size="10" fill="#333">Basic sketches using boxes, lines</text>
    <text x="120" y="205" font-family="Arial, sans-serif" font-size="10" fill="#333">and placeholder text. Grayscale.</text>
    <rect x="410" y="148" width="340" height="88" fill="url(#orangeGrad)" rx="8" stroke="#f57c00" stroke-width="1"/>
    <circle cx="445" cy="185" r="18" fill="#f57c00"/>
    <text x="445" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">3</text>
    <text x="480" y="170" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">High-Fidelity (Hi-Fi)</text>
    <text x="480" y="190" font-family="Arial, sans-serif" font-size="10" fill="#333">Digital versions with more detail</text>
    <text x="480" y="205" font-family="Arial, sans-serif" font-size="10" fill="#333">and interactivity. Pixel-specific.</text>
  </g>

  <!-- step3: Core Components -->
  <g class="step" id="step3" data-narration="Core wireframe components include layout structure like headers and footers, navigation elements, content placeholders for text and images, and interactive form fields.">
    <rect x="50" y="244" width="700" height="88" fill="url(#purpleGrad)" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <circle cx="85" cy="280" r="18" fill="#9c27b0"/>
    <text x="85" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">4</text>
    <text x="120" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7b1fa2">Core Components</text>
    <rect x="120" y="278" width="140" height="45" fill="white" rx="4" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="190" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7b1fa2">Layout Structure</text>
    <text x="190" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">(header, footer)</text>
    <rect x="270" y="278" width="140" height="45" fill="white" rx="4" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="340" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7b1fa2">Navigation</text>
    <text x="340" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">(menus, buttons)</text>
    <rect x="420" y="278" width="140" height="45" fill="white" rx="4" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="490" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7b1fa2">Content Areas</text>
    <text x="490" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">(text, images)</text>
    <rect x="570" y="278" width="140" height="45" fill="white" rx="4" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="640" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7b1fa2">Forms & Inputs</text>
    <text x="640" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">(fields, links)</text>
  </g>

  <!-- step4: Design Principles & Tools -->
  <g class="step" id="step4" data-narration="Key principles include hierarchy, affordance, and consistency. Popular tools are Balsamiq for sketching, Figma for collaboration, and Adobe XD for prototypes.">
    <rect x="50" y="340" width="700" height="88" fill="url(#redGrad)" rx="8" stroke="#f44336" stroke-width="1"/>
    <circle cx="85" cy="375" r="18" fill="#f44336"/>
    <text x="85" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">5</text>
    <text x="120" y="360" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c62828">Principles &amp; Tools</text>
    <rect x="120" y="375" width="145" height="42" fill="white" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="192" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Hierarchy</text>
    <text x="192" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">Visual importance</text>
    <rect x="275" y="375" width="145" height="42" fill="white" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="347" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Affordance</text>
    <text x="347" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">Interactive hints</text>
    <rect x="430" y="375" width="145" height="42" fill="white" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="502" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Consistency</text>
    <text x="502" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">Uniform patterns</text>
    <rect x="585" y="375" width="145" height="42" fill="#1976d2" rx="4"/>
    <text x="657" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Tools</text>
    <text x="657" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e3f2fd">Balsamiq, Figma, XD</text>
  </g>

  <!-- step5: SDLC Context -->
  <g class="step" id="step5" data-narration="Wireframing occurs during the Requirement Analysis phase in SDLC. It serves as an effective communication tool between designers, developers, and stakeholders to validate concepts early.">
    <rect x="50" y="436" width="700" height="80" fill="url(#greenGrad)" rx="8" stroke="#388e3c" stroke-width="1"/>
    <circle cx="85" cy="470" r="18" fill="#388e3c"/>
    <text x="85" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">6</text>
    <text x="120" y="455" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">SDLC Phase: Requirement Analysis</text>
    <text x="120" y="478" font-family="Arial, sans-serif" font-size="11" fill="#333">Communication tool between designers, developers, and stakeholders.</text>
    <text x="120" y="495" font-family="Arial, sans-serif" font-size="11" fill="#333">Validates concepts early before coding begins.</text>
  </g>

  <!-- step6: Summary -->
  <g class="step" id="step6" data-narration="Wireframes are essential low-cost prototypes that save time and money by catching usability issues early. They bridge the gap between abstract ideas and functional products.">
    <rect x="50" y="524" width="700" height="66" fill="url(#blueGrad)" rx="8" stroke="#1976d2" stroke-width="1"/>
    <circle cx="85" cy="557" r="18" fill="#1976d2"/>
    <text x="85" y="563" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">7</text>
    <text x="120" y="542" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">Why Wireframes Matter</text>
    <text x="120" y="565" font-family="Arial, sans-serif" font-size="11" fill="#333">Essential low-cost prototypes that save time by catching usability issues early.</text>
  </g>
</svg>