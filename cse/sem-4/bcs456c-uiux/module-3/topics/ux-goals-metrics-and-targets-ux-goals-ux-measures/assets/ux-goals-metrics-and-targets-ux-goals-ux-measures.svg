<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This lesson covers UX Goals, Metrics, and Targets for  CSE 2022 scheme. Learn to set measurable objectives, track user experience, and establish benchmarks.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">UX Goals, Metrics &amp; Targets</text>
  </g>
  
  <g class="step" id="step1" data-narration="UX Goals define outcomes, Metrics measure quantitatively, and Targets set benchmarks. This triad aligns user needs with business objectives for effective design.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Introduction</text>
    <line x1="40" y1="88" x2="760" y2="88" stroke="#90caf9" stroke-width="1"/>
    <text x="40" y="102" font-family="Arial" font-size="10" fill="#333">UX Goals → Metrics → Targets forms a feedback loop for user-centered design.</text>
    <text x="40" y="116" font-family="Arial" font-size="10" fill="#333">Key purposes: Justify design investments, track improvements, meet WCAG 2.1 standards.</text>
    <text x="40" y="130" font-family="Arial" font-size="10" fill="#333">Essential for reducing user abandonment and communicating to stakeholders.</text>
  </g>
  
  <g class="step" id="step2" data-narration="UX Goals are strategic objectives using SMART criteria: Specific, Measurable, Achievable, Relevant, and Time-bound. Types include Performance, Satisfaction, and Accessibility goals.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">UX Goals</text>
    <line x1="40" y1="176" x2="760" y2="176" stroke="#a5d6a7" stroke-width="1"/>
    <rect x="40" y="186" width="145" height="32" fill="#c8e6c9" rx="4"/>
    <text x="112" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">SMART Criteria</text>
    <text x="112" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Specific|M|Achievable|R|Time-bound</text>
    <rect x="195" y="186" width="120" height="32" fill="#c8e6c9" rx="4"/>
    <text x="255" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Performance</text>
    <text x="255" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Efficiency goals</text>
    <rect x="325" y="186" width="120" height="32" fill="#c8e6c9" rx="4"/>
    <text x="385" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Satisfaction</text>
    <text x="385" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Perception goals</text>
    <rect x="455" y="186" width="120" height="32" fill="#c8e6c9" rx="4"/>
    <text x="515" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Accessibility</text>
    <text x="515" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Inclusivity goals</text>
    <text x="600" y="200" font-family="Arial" font-size="9" fill="#333">Example: "Reduce cart abandonment"</text>
    <text x="600" y="218" font-family="Arial" font-size="8" fill="#666">Aligned with business KPIs</text>
  </g>
  
  <g class="step" id="step3" data-narration="Behavioral Metrics track actions: Task Success Rate, Time-on-Task, Error Rate. Attitudinal Metrics capture perceptions: SUS (0-100 scale) and NPS scores.">
    <rect x="20" y="234" width="760" height="89" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">UX Metrics</text>
    <line x1="40" y1="264" x2="760" y2="264" stroke="#ffcc80" stroke-width="1"/>
    <rect x="40" y="274" width="220" height="44" fill="#ffe0b2" rx="4"/>
    <text x="150" y="288" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#bf360c">Behavioral Metrics</text>
    <text x="150" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Task Success Rate | Time-on-Task</text>
    <text x="150" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Error Rate per session</text>
    <rect x="270" y="274" width="220" height="44" fill="#ffe0b2" rx="4"/>
    <text x="380" y="288" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#bf360c">Attitudinal Metrics</text>
    <text x="380" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">SUS: 10-item questionnaire (0-100)</text>
    <text x="380" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">NPS: Recommendation likelihood</text>
    <text x="500" y="300" font-family="Arial" font-size="9" font-weight="bold" fill="#bf360c">Benchmarks:</text>
    <text x="500" y="312" font-family="Arial" font-size="8" fill="#333">Good SUS: 68+ | Task Success: 92-95%</text>
  </g>
  
  <g class="step" id="step4" data-narration="The HEART Framework provides composite metrics: Happiness, Engagement, Adoption, Retention, and Task Success. Google's GSM model connects Goals, Signals, and Metrics.">
    <rect x="20" y="331" width="760" height="95" fill="#f3e5f5" rx="8"/>
    <text x="40" y="351" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">HEART Framework &amp; GQM</text>
    <line x1="40" y1="361" x2="760" y2="361" stroke="#ce93d8" stroke-width="1"/>
    <rect x="40" y="371" width="100" height="30" fill="#e1bee7" rx="4"/>
    <text x="90" y="387" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">Happiness</text>
    <text x="90" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">User satisfaction</text>
    <rect x="150" y="371" width="100" height="30" fill="#e1bee7" rx="4"/>
    <text x="200" y="387" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">Engagement</text>
    <text x="200" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Depth of interaction</text>
    <rect x="260" y="371" width="100" height="30" fill="#e1bee7" rx="4"/>
    <text x="310" y="387" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">Adoption</text>
    <text x="310" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">New user signup</text>
    <rect x="370" y="371" width="100" height="30" fill="#e1bee7" rx="4"/>
    <text x="420" y="387" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">Retention</text>
    <text x="420" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">User loyalty</text>
    <rect x="480" y="371" width="100" height="30" fill="#e1bee7" rx="4"/>
    <text x="530" y="387" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4a148c">Task Success</text>
    <text x="530" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Goal completion</text>
    <rect x="590" y="371" width="180" height="30" fill="#d1c4e9" rx="4"/>
    <text x="680" y="382" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#311b92">GQM Model</text>
    <text x="680" y="394" text-anchor="middle" font-family="Arial" font-size="7" fill="#311b92">Goal → Question → Metric</text>
  </g>
  
  <g class="step" id="step5" data-narration="UX Targets are quantitative benchmarks using baseline comparisons, competitor analysis, or industry standards. Example: Increase checkout completion from 35% to 50%.">
    <rect x="20" y="434" width="760" height="103" fill="#ffebee" rx="8"/>
    <text x="40" y="454" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">UX Targets &amp; Examples</text>
    <line x1="40" y1="464" x2="760" y2="464" stroke="#ef9a9a" stroke-width="1"/>
    <rect x="40" y="474" width="340" height="30" fill="#ffcdd2" rx="4"/>
    <text x="210" y="488" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">E-commerce Checkout Example</text>
    <text x="210" y="500" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Goal: Reduce cart abandonment | Target: 50% (from 35%)</text>
    <rect x="390" y="474" width="380" height="30" fill="#ffcdd2" rx="4"/>
    <text x="580" y="488" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Mobile App Onboarding Example</text>
    <text x="580" y="500" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Goal: Improve feature discovery | Target: 65% completion (from 40%)</text>
    <text x="40" y="520" font-family="Arial" font-size="9" fill="#333">Methods: Baseline Pre/Post | Competitor Benchmark | Industry Standard</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key Formulas: Task Success = (Success/Total)×100. SUS = (Sum-10)×2.5. NPS = %Promoters - %Detractors. Remember: 78+ SUS = Grade A.">
    <rect x="20" y="545" width="760" height="55" fill="#e1f5fe" rx="8"/>
    <text x="40" y="565" font-family="Arial" font-size="12" font-weight="bold" fill="#01579b">Formulas &amp; Exam Tips</text>
    <line x1="40" y1="572" x2="760" y2="572" stroke="#81d4fa" stroke-width="1"/>
    <text x="580" y="590" font-family="Arial" font-size="9" fill="#01579b">Task Success: (Success/Total)×100 | SUS: (Sum-10)×2.5 | NPS: %Promoters-%Detractors</text>
  </g>
</svg>