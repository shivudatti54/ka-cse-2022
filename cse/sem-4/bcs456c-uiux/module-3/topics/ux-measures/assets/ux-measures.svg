<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="UX Measures are quantitative and qualitative metrics that evaluate user interaction with digital products. These metrics help assess effectiveness, efficiency, and user satisfaction.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">UX Measures</text>
  </g>
  
  <g class="step" id="step1" data-narration="Quantitative UX metrics are numerical measurements. Key metrics include Success Rate, Time-on-Task, Error Rate, and the System Usability Scale (SUS).">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Quantitative UX Metrics</text>
    <rect x="40" y="85" width="165" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="122" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Success Rate</text>
    <text x="122" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(task completion %)</text>
    <rect x="215" y="85" width="165" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="297" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Time-on-Task</text>
    <text x="297" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(avg completion time)</text>
    <rect x="390" y="85" width="165" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="477" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Error Rate</text>
    <text x="477" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(frequency of errors)</text>
    <rect x="565" y="85" width="165" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="647" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">SUS Score</text>
    <text x="647" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(10-item questionnaire)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Qualitative UX measures are descriptive data. User Feedback provides direct comments, Heatmaps show interaction patterns, and Cognitive Walkthroughs simulate user testing.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Qualitative UX Measures</text>
    <rect x="40" y="173" width="230" height="45" fill="white" stroke="#388e3c" rx="3"/>
    <text x="155" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">User Feedback</text>
    <text x="155" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Direct user comments</text>
    <rect x="285" y="173" width="230" height="45" fill="white" stroke="#388e3c" rx="3"/>
    <text x="400" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Heatmaps</text>
    <text x="400" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Click density patterns</text>
    <rect x="530" y="173" width="230" height="45" fill="white" stroke="#388e3c" rx="3"/>
    <text x="645" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Cognitive Walkthrough</text>
    <text x="645" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Simulated user testing</text>
  </g>
  
  <g class="step" id="step3" data-narration="Key formulas: Success Rate equals successful tasks divided by total tasks times 100. SUS Score sums responses and multiplies by 2.5 for a 0-100 scale.">
    <rect x="20" y="234" width="760" height="128" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Important Formulas</text>
    <rect x="40" y="263" width="340" height="45" fill="white" stroke="#ff9800" rx="3"/>
    <text x="210" y="283" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Success Rate = (Successful / Total) × 100</text>
    <text x="210" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Example: (40/50) × 100 = 80%</text>
    <rect x="400" y="263" width="340" height="45" fill="white" stroke="#ff9800" rx="3"/>
    <text x="570" y="283" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Error Rate = (Total Errors / Tasks) × 100</text>
    <text x="570" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Measures mistake frequency</text>
    <rect x="40" y="316" width="700" height="40" fill="white" stroke="#ff9800" rx="3"/>
    <text x="390" y="338" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">SUS Score = Sum of Responses × 2.5 (0-100 scale, >68 is good)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Accessibility uses WCAG levels A, AA, AAA. SUS benchmark above 68 indicates good usability. Benchmarking compares products against industry standards.">
    <rect x="20" y="370" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="40" y="390" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Accessibility & Benchmarks</text>
    <rect x="40" y="399" width="230" height="45" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="155" y="418" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">WCAG Levels</text>
    <text x="155" y="433" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">A → AA → AAA compliance</text>
    <rect x="285" y="399" width="230" height="45" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="400" y="418" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">SUS Benchmark</text>
    <text x="400" y="433" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Score > 68 = Good usability</text>
    <rect x="530" y="399" width="230" height="45" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="645" y="418" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Benchmarking</text>
    <text x="645" y="433" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Compare industry standards</text>
  </g>
  
  <g class="step" id="step5" data-narration="Exam focus: memorize success rate, error rate, SUS formulas. Know SUS > 68 is good. WCAG has three levels. Differentiate quantitative from qualitative measures.">
    <rect x="20" y="458" width="760" height="80" fill="#ffebee" stroke="#f44336" rx="5"/>
    <text x="40" y="478" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips</text>
    <circle cx="60" cy="500" r="4" fill="#f44336"/>
    <text x="75" y="504" font-family="Arial" font-size="9" fill="#333">Memorize success rate, error rate, SUS formulas</text>
    <circle cx="60" cy="520" r="4" fill="#f44336"/>
    <text x="75" y="524" font-family="Arial" font-size="9" fill="#333">SUS > 68 indicates good usability (above average)</text>
    <circle cx="280" cy="500" r="4" fill="#f44336"/>
    <text x="295" y="504" font-family="Arial" font-size="9" fill="#333">Quantitative = numbers, Qualitative = descriptive</text>
    <circle cx="280" cy="520" r="4" fill="#f44336"/>
    <text x="295" y="524" font-family="Arial" font-size="9" fill="#333">WCAG has three levels: A, AA, AAA</text>
    <circle cx="530" cy="500" r="4" fill="#f44336"/>
    <text x="545" y="504" font-family="Arial" font-size="9" fill="#333">Know heatmap interpretation</text>
    <circle cx="530" cy="520" r="4" fill="#f44336"/>
    <text x="545" y="524" font-family="Arial" font-size="9" fill="#333">WCAG principles: POUR (Perceivable, Operable, Understandable, Robust)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key UX terms: learnability (ease of learning), error recovery (recovering from mistakes), benchmarking (comparing versions), and usability (overall user experience quality).">
    <rect x="20" y="546" width="760" height="45" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="566" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Terms</text>
    <rect x="120" y="556" width="100" height="30" fill="white" stroke="#1976d2" rx="2"/>
    <text x="170" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Learnability</text>
    <rect x="230" y="556" width="100" height="30" fill="white" stroke="#1976d2" rx="2"/>
    <text x="280" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Error Recovery</text>
    <rect x="340" y="556" width="100" height="30" fill="white" stroke="#1976d2" rx="2"/>
    <text x="390" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Benchmarking</text>
    <rect x="450" y="556" width="100" height="30" fill="white" stroke="#1976d2" rx="2"/>
    <text x="500" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Usability</text>
    <rect x="560" y="556" width="100" height="30" fill="white" stroke="#1976d2" rx="2"/>
    <text x="610" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">WCAG POUR</text>
  </g>
</svg>