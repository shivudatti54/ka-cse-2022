<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this comprehensive lecture on Design and Production in Software Engineering, where we explore modern development methodologies and best practices for building scalable software systems.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff">Design and Production in Software Engineering</text>
  </g>
  
  <g class="step" id="step1" data-narration="Design-Production is a systematic process that bridges theoretical design and practical implementation, ensuring scalability, maintainability, reliability, and continuous delivery in modern software systems through DevOps integration.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Introduction to Design-Production</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">Systematic process transforming requirements into functional products ready for deployment.</text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#333">Bridges design and implementation with DevOps and cloud computing integration.</text>
    <rect x="600" y="75" width="150" height="50" fill="#1976d2" rx="5"/>
    <text x="675" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffffff">Key Focus Areas</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three major architectural patterns are essential: MVC separates application logic into model, view, and controller components, microservices enable independent deployment of services, and distributed systems trade simplicity for scalability.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Architectural Patterns</text>
    <rect x="40" y="185" width="230" height="30" fill="#c8e6c9" rx="4"/>
    <text x="155" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">MVC (Model-View-Controller)</text>
    <rect x="285" y="185" width="230" height="30" fill="#c8e6c9" rx="4"/>
    <text x="400" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Microservices</text>
    <rect x="530" y="185" width="230" height="30" fill="#c8e6c9" rx="4"/>
    <text x="645" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Distributed Systems</text>
  </g>
  
  <g class="step" id="step3" data-narration="SOLID principles ensure maintainable and flexible object-oriented code: Single Responsibility ensures one class does one job, Open-Closed allows extension without modification, Liskov Substitution permits proper subclass usage.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Design Principles</text>
    <rect x="40" y="275" width="140" height="28" fill="#ffe0b2" rx="4"/>
    <text x="110" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Single Responsibility</text>
    <rect x="190" y="275" width="140" height="28" fill="#ffe0b2" rx="4"/>
    <text x="260" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Open-Closed</text>
    <rect x="340" y="275" width="140" height="28" fill="#ffe0b2" rx="4"/>
    <text x="410" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Liskov Substitution</text>
    <rect x="490" y="275" width="140" height="28" fill="#ffe0b2" rx="4"/>
    <text x="560" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Interface Segregation</text>
    <rect x="640" y="275" width="130" height="28" fill="#ffe0b2" rx="4"/>
    <text x="705" y="294" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Dependency Inversion</text>
  </g>
  
  <g class="step" id="step4" data-narration="Production readiness involves three key technologies: CI/CD pipelines automate the build, test, and deployment process, Docker provides lightweight containerization, and Kubernetes orchestrates containers at massive scale.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Production Readiness</text>
    <rect x="40" y="360" width="240" height="32" fill="#e1bee7" rx="5"/>
    <text x="160" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">CI/CD Pipelines</text>
    <text x="160" y="392" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Jenkins, GitHub Actions</text>
    <rect x="300" y="360" width="240" height="32" fill="#e1bee7" rx="5"/>
    <text x="420" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Containerization</text>
    <text x="420" y="392" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Docker</text>
    <rect x="560" y="360" width="210" height="32" fill="#e1bee7" rx="5"/>
    <text x="665" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Orchestration</text>
    <text x="665" y="392" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Kubernetes</text>
  </g>
  
  <g class="step" id="step5" data-narration="Three practical examples demonstrate real-world applications: RESTful API design using Spring Boot for web services, CI/CD pipeline setup with GitHub Actions and AWS for automation, and database scaling via sharding or NoSQL solutions.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Practical Examples</text>
    <rect x="40" y="450" width="240" height="30" fill="#ffcdd2" rx="4"/>
    <text x="160" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">RESTful API (Spring Boot)</text>
    <line x1="280" y1="465" x2="300" y2="465" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="310" y="450" width="220" height="30" fill="#ffcdd2" rx="4"/>
    <text x="420" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">CI/CD Pipeline (GitHub Actions)</text>
    <line x1="530" y1="465" x2="550" y2="465" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="560" y="450" width="210" height="30" fill="#ffcdd2" rx="4"/>
    <text x="665" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Database Scaling (MongoDB)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Exam tips: focus on understanding monolithic vs microservices architectural differences, SOLID principles with real-world examples, CI/CD workflow stages, basic Docker commands, and SQL versus NoSQL database trade-offs.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Points</text>
    <rect x="40" y="535" width="180" height="40" fill="#bbdefb" rx="4"/>
    <text x="130" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Monolithic vs Microservices</text>
    <text x="130" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Architecture Differences</text>
    <rect x="235" y="535" width="180" height="40" fill="#bbdefb" rx="4"/>
    <text x="325" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">SOLID Principles</text>
    <text x="325" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Real-world Examples</text>
    <rect x="430" y="535" width="180" height="40" fill="#bbdefb" rx="4"/>
    <text x="520" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">CI/CD Workflow</text>
    <text x="520" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Build, Test, Deploy</text>
    <rect x="625" y="535" width="145" height="40" fill="#bbdefb" rx="4"/>
    <text x="697" y="550" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Docker Commands</text>
    <text x="697" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">build, compose up</text>
  </g>
</svg>