<svg viewBox="0 0 800 1500" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#1565c0"/>
<stop offset="100%" stop-color="#0d47a1"/>
</linearGradient>
<linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#e3f2fd"/>
<stop offset="100%" stop-color="#bbdefb"/>
</linearGradient>
<linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#e8f5e9"/>
<stop offset="100%" stop-color="#c8e6c9"/>
</linearGradient>
<linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#fff3e0"/>
<stop offset="100%" stop-color="#ffe0b2"/>
</linearGradient>
<linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#f3e5f5"/>
<stop offset="100%" stop-color="#e1bee7"/>
</linearGradient>
<linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#ffebee"/>
<stop offset="100%" stop-color="#ffcdd2"/>
</linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
</filter>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
</defs>

<style>
@keyframes fadeInSlide {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
from { opacity: 0; transform: scale(0.85); }
to { opacity: 1; transform: scale(1); }
}
@keyframes textReveal {
from { opacity: 0; transform: translateX(-10px); }
to { opacity: 1; transform: translateX(0); }
}
@keyframes pulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.03); }
}
@keyframes drawLine {
from { stroke-dashoffset: 300; }
to { stroke-dashoffset: 0; }
}
.step { animation: fadeInSlide 0.6s ease-out; }
.step rect {
animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
transform-origin: center;
}
.step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
.glow { animation: pulse 2s infinite; }
.line-anim { stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawLine 1.5s ease-out forwards; }
</style>

<rect width="800" height="1500" fill="#f8f9fa"/>

<!-- STEP 0: Title -->
<g class="step" id="step0" data-narration="Welcome to Basic C Data Types for Microcontroller Programming. Understanding data types is essential for embedded systems development.">
<rect x="20" y="10" width="760" height="50" rx="10" fill="url(#titleGradient)" filter="url(#shadow)"/>
<text x="400" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="white">Basic C Data Types for Microcontroller Programming</text>
</g>

<!-- STEP 1: Why Data Types Matter -->
<g class="step" id="step1" data-narration="Data types determine how data is stored in memory, affecting both performance and memory usage in resource-constrained microcontrollers.">
<rect x="20" y="70" width="760" height="85" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
<text x="40" y="95" font-size="14" font-weight="bold" fill="#1565c0">Why Data Types Matter in Microcontrollers</text>
<text x="40" y="115" font-size="10" fill="#424242">• Memory is limited (2KB-64KB RAM typical)</text>
<text x="40" y="130" font-size="10" fill="#424242">• Direct hardware interaction requires precise data sizes</text>
<text x="40" y="145" font-size="10" fill="#424242">• Choosing wrong type causes bugs or wastes precious memory</text>
</g>

<!-- STEP 2: Primary Data Types Overview -->
<g class="step" id="step2" data-narration="C provides three primary groups: integers for whole numbers, floating-point for decimals, and characters for text data.">
<rect x="20" y="165" width="760" height="85" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
<text x="40" y="190" font-size="14" font-weight="bold" fill="#2e7d32">Primary Data Types in C</text>
<rect x="40" y="205" width="180" height="35" rx="5" fill="#4caf50" opacity="0.7"/>
<text x="130" y="222" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Integer (int)</text>
<rect x="235" y="205" width="180" height="35" rx="5" fill="#2196f3" opacity="0.7"/>
<text x="325" y="222" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Floating-Point</text>
<rect x="430" y="205" width="180" height="35" rx="5" fill="#ff9800" opacity="0.7"/>
<text x="520" y="222" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Character (char)</text>
<text x="625" y="222" font-size="10" fill="#616161">Building blocks for all C programs</text>
</g>

<!-- STEP 3: Integer Types -->
<g class="step" id="step3" data-narration="Integer types store whole numbers. On 8-bit microcontrollers, int is 2 bytes with range -32,768 to 32,767.">
<rect x="20" y="260" width="760" height="95" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
<text x="40" y="285" font-size="14" font-weight="bold" fill="#1565c0">Integer Types (int)</text>
<rect x="40" y="300" width="120" height="45" rx="6" fill="#1976d2"/>
<text x="100" y="318" text-anchor="middle" font-size="10" fill="white">short int</text>
<text x="100" y="333" text-anchor="middle" font-size="9" fill="#bbdefb">2 bytes</text>
<rect x="175" y="300" width="120" height="45" rx="6" fill="#1565c0"/>
<text x="235" y="318" text-anchor="middle" font-size="10" fill="white">int</text>
<text x="235" y="333" text-anchor="middle" font-size="9" fill="#bbdefb">2 bytes (8-bit)</text>
<rect x="310" y="300" width="120" height="45" rx="6" fill="#0d47a1"/>
<text x="370" y="318" text-anchor="middle" font-size="10" fill="white">long int</text>
<text x="370" y="333" text-anchor="middle" font-size="9" fill="#bbdefb">4 bytes</text>
<rect x="445" y="300" width="130" height="45" rx="6" fill="#1976d2"/>
<text x="510" y="318" text-anchor="middle" font-size="10" fill="white">unsigned int</text>
<text x="510" y="333" text-anchor="middle" font-size="9" fill="#bbdefb">0 to 65,535</text>
<path d="M 100 355 L 510 355" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)" class="line-anim"/>
<text x="510" y="375" font-size="9" fill="#616161">Range depends on bits and signedness</text>
</g>

<!-- STEP 4: Floating-Point Types -->
<g class="step" id="step4" data-narration="Float stores single-precision decimals (4 bytes, ~7 digits). Double provides double precision (8 bytes), but is rarely used in microcontrollers.">
<rect x="20" y="365" width="760" height="90" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
<text x="40" y="390" font-size="14" font-weight="bold" fill="#2e7d32">Floating-Point Types</text>
<rect x="40" y="405" width="200" height="40" rx="6" fill="#4caf50"/>
<text x="140" y="422" text-anchor="middle" font-size="11" fill="white" font-weight="bold">float</text>
<text x="140" y="436" text-anchor="middle" font-size="9" fill="#c8e6c9">4 bytes, ~7 digits precision</text>
<rect x="260" y="405" width="200" height="40" rx="6" fill="#388e3c"/>
<text x="360" y="422" text-anchor="middle" font-size="11" fill="white" font-weight="bold">double</text>
<text x="360" y="436" text-anchor="middle" font-size="9" fill="#c8e6c9">8 bytes, ~15 digits (rarely used)</text>
<text x="480" y="422" font-size="10" fill="#616161">Example:</text>
<text x="480" y="438" font-size="10" fill="#1565c0" font-family="monospace">float temp = 25.75;</text>
</g>

<!-- STEP 5: Character Type -->
<g class="step" id="step5" data-narration="Char stores single characters (1 byte). Can hold ASCII values, small integers from -128 to 127 (signed) or 0 to 255 (unsigned).">
<rect x="20" y="465" width="760" height="85" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
<text x="40" y="490" font-size="14" font-weight="bold" fill="#e65100">Character Type (char)</text>
<rect x="40" y="505" width="100" height="35" rx="6" fill="#ff9800"/>
<text x="90" y="522" text-anchor="middle" font-size="10" fill="white" font-weight="bold">char</text>
<text x="90" y="535" text-anchor="middle" font-size="8" fill="#ffe0b2">1 byte always</text>
<text x="160" y="520" font-size="10" fill="#424242">Stores:</text>
<text x="160" y="535" font-size="10" fill="#424242">'A', 'b', '$' (enclosed in single quotes)</text>
<rect x="350" y="505" width="180" height="35" rx="6" fill="#ef6c00"/>
<text x="440" y="522" text-anchor="middle" font-size="10" fill="white">Range (signed):</text>
<text x="440" y="535" text-anchor="middle" font-size="9" fill="#ffe0b2">-128 to 127</text>
<rect x="550" y="505" width="180" height="35" rx="6" fill="#f57c00"/>
<text x="640" y="522" text-anchor="middle" font-size="10" fill="white">Range (unsigned):</text>
<text x="640" y="535" text-anchor="middle" font-size="9" fill="#ffe0b2">0 to 255</text>
</g>

<!-- STEP 6: Type Modifiers -->
<g class="step" id="step6" data-narration="Type modifiers alter characteristics: signed/unsigned changes range, short/long changes size. Use unsigned for peripheral registers.">
<rect x="20" y="560" width="760" height="90" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
<text x="40" y="585" font-size="14" font-weight="bold" fill="#7b1fa2">Type Modifiers</text>
<rect x="40" y="600" width="160" height="40" rx="6" fill="#9c27b0"/>
<text x="120" y="615" text-anchor="middle" font-size="10" fill="white" font-weight="bold">signed / unsigned</text>
<text x="120" y="630" text-anchor="middle" font-size="8" fill="#e1bee7">Alters value range</text>
<rect x="215" y="600" width="160" height="40" rx="6" fill="#7b1fa2"/>
<text x="295" y="615" text-anchor="middle" font-size="10" fill="white" font-weight="bold">short / long</text>
<text x="295" y="630" text-anchor="middle" font-size="8" fill="#e1bee7">Changes storage size</text>
<text x="390" y="615" font-size="10" fill="#424242">Example:</text>
<text x="390" y="632" font-size="10" fill="#1565c0" font-family="monospace">unsigned char counter;</text>
<rect x="550" y="600" width="200" height="40" rx="6" fill="#f44336" opacity="0.8"/>
<text x="650" y="615" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Important!</text>
<text x="650" y="630" text-anchor="middle" font-size="8" fill="white">Use unsigned for ADC, timers</text>
</g>

<!-- STEP 7: const Qualifier -->
<g class="step" id="step7" data-narration="The const qualifier declares read-only variables. Use for pin numbers, thresholds, and configuration constants that must never change.">
<rect x="20" y="660" width="760" height="85" rx="8" fill="url(#redGradient)" filter="url(#shadow)"/>
<text x="40" y="685" font-size="14" font-weight="bold" fill="#c62828">const Qualifier - Read-Only Variables</text>
<rect x="40" y="700" width="300" height="35" rx="6" fill="#e53935"/>
<text x="190" y="718" text-anchor="middle" font-size="10" fill="white" font-weight="bold">const int LED_PIN = 13;</text>
<text x="350" y="718" font-size="10" fill="#616161">Cannot be modified after init</text>
<rect x="40" y="745" width="350" height="35" rx="6" fill="#c62828"/>
<text x="215" y="763" text-anchor="middle" font-size="10" fill="white">const float PI = 3.14159;</text>
<text x="400" y="763" font-size="10" fill="#424242">Use for constants in MCU code</text>
</g>

<!-- STEP 8: volatile Qualifier -->
<g class="step" id="step8" data-narration="Volatile tells compiler the variable may change unexpectedly (hardware registers, ISR variables). Prevents optimization errors.">
<rect x="20" y="755" width="760" height="90" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
<text x="40" y="780" font-size="14" font-weight="bold" fill="#1565c0">volatile Qualifier - Critical for Microcontrollers</text>
<rect x="40" y="795" width="280" height="40" rx="6" fill="#1565c0"/>
<text x="180" y="812" text-anchor="middle" font-size="10" fill="white" font-weight="bold">volatile uint8_t* reg;</text>
<text x="180" y="827" text-anchor="middle" font-size="8" fill="#bbdefb">Hardware register pointer</text>
<rect x="335" y="795" width="280" height="40" rx="6" fill="#0d47a1"/>
<text x="475" y="812" text-anchor="middle" font-size="10" fill="white" font-weight="bold">volatile int button_flag;</text>
<text x="475" y="827" text-anchor="middle" font-size="8" fill="#bbdefb">Modified by ISR</text>
<text x="630" y="820" font-size="10" fill="#c62828" font-weight="bold">⚠ MUST use for hardware!</text>
</g>

<!-- STEP 9: stdint.h Fixed-Width Types -->
<g class="step" id="step9" data-narration="The stdint.h provides fixed-width types guaranteeing specific bit sizes: uint8_t, int16_t, uint32_t for portable microcontroller code.">
<rect x="20" y="855" width="760" height="95" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
<text x="40" y="880" font-size="14" font-weight="bold" fill="#2e7d32">stdint.h - Fixed-Width Integer Types (C99)</text>
<rect x="40" y="895" width="140" height="45" rx="6" fill="#4caf50"/>
<text x="110" y="910" text-anchor="middle" font-size="10" fill="white" font-weight="bold">int8_t / uint8_t</text>
<text x="110" y="928" text-anchor="middle" font-size="8" fill="#c8e6c9">8-bit: -128 to 127 / 0-255</text>
<rect x="195" y="895" width="140" height="45" rx="6" fill="#388e3c"/>
<text x="265" y="910" text-anchor="middle" font-size="10" fill="white" font-weight="bold">int16_t / uint16_t</text>
<text x="265" y="928" text-anchor="middle" font-size="8" fill="#c8e6c9">16-bit: ±32K / 0-65K</text>
<rect x="350" y="895" width="140" height="45" rx="6" fill="#2e7d32"/>
<text x="420" y="910" text-anchor="middle" font-size="10" fill="white" font-weight="bold">int32_t / uint32_t</text>
<text x="420" y="928" text-anchor="middle" font-size="8" fill="#c8e6c9">32-bit: ±2B / 0-4B</text>
<text x="505" y="910" font-size="10" fill="#424242">Include:</text>
<text x="505" y="928" font-size="10" fill="#1565c0" font-family="monospace">#include &lt;stdint.h&gt;</text>
</g>

<!-- STEP 10: Memory Considerations -->
<g class="step" id="step10" data-narration="In microcontrollers, using uint8_t instead of int for loop counters saves memory. Every byte counts in embedded systems!">
<rect x="20" y="960" width="760" height="90" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
<text x="40" y="985" font-size="14" font-weight="bold" fill="#e65100">Memory Considerations in Microcontrollers</text>
<rect x="40" y="1000" width="350" height="40" rx="6" fill="#ff9800"/>
<text x="215" y="1015" text-anchor="middle" font-size="10" fill="white">Memory-Efficient Approach</text>
<text x="215" y="1032" text-anchor="middle" font-size="9" fill="#ffe0b2">uint8_t i; for(i=0; i&lt;256; i++) buffer[i]=i;</text>
<rect x="405" y="1000" width="330" height="40" rx="6" fill="#ef6c00"/>
<text x="570" y="1015" text-anchor="middle" font-size="10" fill="white">vs</text>
<text x="570" y="1032" text-anchor="middle" font-size="9" fill="#ffe0b2">int i; (wastes memory on 8-bit MCU)</text>
<text x="40" y="1060" font-size="10" fill="#424242">Tip: Using uint8_t for loop counters saves 1 byte per variable in 8-bit microcontrollers.</text>
</g>

<!-- STEP 11: Enumerated Types -->
<g class="step" id="step11" data-narration="Enums define named integer constants, perfect for state machines in microcontrollers. Improves code readability with meaningful names.">
<rect x="20" y="1060" width="760" height="90" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
<text x="40" y="1085" font-size="14" font-weight="bold" fill="#7b1fa2">Enumerated Types (enum) - Great for State Machines</text>
<rect x="40" y="1100" width="320" height="40" rx="6" fill="#9c27b0"/>
<text x="200" y="1115" text-anchor="middle" font-size="10" fill="white" font-weight="bold">typedef enum {</text>
<text x="200" y="1132" text-anchor="middle" font-size="8" fill="#e1bee7">STATE_IDLE=0, STATE_READING, STATE_ERROR</text>
<text x="200" y="1144" text-anchor="middle" font-size="9" fill="#e1bee7">} system_state_t;</text>
<rect x="375" y="1100" width="200" height="40" rx="6" fill="#7b1fa2"/>
<text x="475" y="1120" text-anchor="middle" font-size="10" fill="white">Usage:</text>
<text x="475" y="1138" font-size="9" fill="#e1bee7">system_state_t current = STATE_IDLE;</text>
<text x="590" y="1120" font-size="9" fill="#424242">Debuggers show names,</text>
<text x="590" y="1135" font-size="9" fill="#424242">not raw numbers!</text>
</g>

<!-- STEP 12: Boolean Types -->
<g class="step" id="step12" data-narration="C99 introduced bool from stdbool.h for cleaner boolean logic. Use true/false instead of 1/0 in microcontroller programs.">
<rect x="20" y="1160" width="760" height="80" rx="8" fill="url(#redGradient)" filter="url(#shadow)"/>
<text x="40" y="1185" font-size="14" font-weight="bold" fill="#c62828">Boolean Types (stdbool.h) - C99 Standard</text>
<rect x="40" y="1200" width="250" height="30" rx="6" fill="#e53935"/>
<text x="165" y="1218" text-anchor="middle" font-size="10" fill="white">#include &lt;stdbool.h&gt;</text>
<rect x="305" y="1200" width="180" height="30" rx="6" fill="#c62828"/>
<text x="395" y="1218" text-anchor="middle" font-size="10" fill="white">bool data_ready = false;</text>
<text x="500" y="1218" font-size="10" fill="#424242">Clean boolean logic!</text>
<rect x="40" y="1240" width="350" height="30" rx="6" fill="#b71c1c"/>
<text x="215" y="1258" text-anchor="middle" font-size="10" fill="white">if(data_ready &amp;&amp; !timeout) { // process }</text>
</g>

<!-- STEP 13: Common Mistakes to Avoid -->
<g class="step" id="step13" data-narration="Avoid assuming int is always 4 bytes. Don't forget volatile for hardware. Use unsigned for predictable peripheral behavior.">
<rect x="20" y="1250" width="760" height="85" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
<text x="40" y="1275" font-size="14" font-weight="bold" fill="#1565c0">Common Mistakes to Avoid</text>
<rect x="40" y="1290" width="230" height="35" rx="6" fill="#f44336" opacity="0.8"/>
<text x="155" y="1307" text-anchor="middle" font-size="10" fill="white">❌ Assuming int = 4 bytes</text>
<text x="155" y="1320" text-anchor="middle" font-size="8" fill="white">It varies (2 bytes on 8-bit MCU)</text>
<rect x="285" y="1290" width="230" height="35" rx="6" fill="#f44336" opacity="0.8"/>
<text x="400" y="1307" text-anchor="middle" font-size="10" fill="white">❌ Forgetting volatile</text>
<text x="400" y="1320" text-anchor="middle" font-size="8" fill="white">Hardware registers need it</text>
<rect x="530" y="1290" width="230" height="35" rx="6" fill="#f44336" opacity="0.8"/>
<text x="645" y="1307" text-anchor="middle" font-size="10" fill="white">❌ Using signed for registers</text>
<text x="645" y="1320" text-anchor="middle" font-size="8" fill="white">Use unsigned for ADC/timers</text>
</g>

<!-- STEP 14: Summary -->
<g class="step" id="step14" data-narration="Key takeaways: Use stdint.h for fixed-width types, const for constants, volatile for hardware registers. Choose data types based on memory constraints.">
<rect x="20" y="1345" width="760" height="85" rx="8" fill="url(#titleGradient)" filter="url(#shadow)"/>
<text x="400" y="1370" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Summary - Key Takeaways</text>
<rect x="40" y="1385" width="170" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
<text x="125" y="1402" text-anchor="middle" font-size="9" fill="white">stdint.h for portability</text>
<rect x="225" y="1385" width="170" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
<text x="310" y="1402" text-anchor="middle" font-size="9" fill="white">const for constants</text>
<rect x="410" y="1385" width="170" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
<text x="495" y="1402" text-anchor="middle" font-size="9" fill="white">volatile for hardware</text>
<rect x="595" y="1385" width="170" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
<text x="680" y="1402" text-anchor="middle" font-size="9" fill="white">uint8_t saves memory</text>
<text x="400" y="1435" text-anchor="middle" font-size="11" fill="white">Master these concepts for successful microcontroller programming!</text>
</g>
</svg>