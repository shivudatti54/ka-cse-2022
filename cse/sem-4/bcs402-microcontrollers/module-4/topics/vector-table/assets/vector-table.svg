<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1420">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
  </style>

  <rect width="800" height="1420" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Welcome to our exploration of the Vector Table in ARM Cortex-M microcontrollers, a fundamental concept for embedded systems.">
    <rect x="100" y="10" width="600" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2">Vector Table in ARM Cortex-M</text>
  </g>

  <g class="step" id="step1" data-narration="The vector table is a critical memory structure containing addresses of exception handlers that enables interrupt processing in microcontrollers.">
    <rect x="50" y="65" width="700" height="85" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="90" font-size="14" font-weight="bold" fill="#1976d2">What is a Vector Table?</text>
    <text x="70" y="110" font-size="11" fill="#424242">A memory structure storing 32-bit addresses of exception handlers at a</text>
    <text x="70" y="125" font-size="11" fill="#424242">predefined location (typically 0x08000000 for STM32 flash memory).</text>
    <rect x="500" y="80" width="230" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="615" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Enables</text>
    <text x="615" y="122" text-anchor="middle" font-size="10" fill="#1976d2">Interrupt Handling</text>
  </g>

  <g class="step" id="step2" data-narration="Unlike ARM7/ARM9, Cortex-M uses address-based vector tables instead of instruction-based, allowing runtime relocation flexibility.">
    <rect x="50" y="160" width="700" height="85" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="185" font-size="14" font-weight="bold" fill="#388e3c">ARM Cortex-M vs ARM7/ARM9</text>
    <text x="70" y="205" font-size="11" fill="#424242">Cortex-M: Contains addresses (32-bit words) → Can be relocated at runtime</text>
    <text x="70" y="220" font-size="11" fill="#424242">ARM7/ARM9: Contains instructions (LDR PC, [PC, #offset]) → Fixed location</text>
    <text x="400" y="215" font-size="20" fill="#388e3c" font-weight="bold">→</text>
    <rect x="430" y="185" width="300" height="45" rx="8" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="580" y="207" text-anchor="middle" font-size="12" fill="#388e3c">More Flexible &amp; Efficient</text>
  </g>

  <g class="step" id="step3" data-narration="The first two entries are critical: Initial MSP at offset 0x000 loads the stack pointer, and Reset Handler at 0x004 starts execution.">
    <rect x="50" y="255" width="700" height="95" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="280" font-size="14" font-weight="bold" fill="#7b1fa2">Vector Table Structure (First Entries)</text>
    <rect x="70" y="295" width="180" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="160" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Offset 0x000</text>
    <text x="160" y="327" text-anchor="middle" font-size="10" fill="#7b1fa2">Initial MSP</text>
    <rect x="260" y="295" width="180" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="350" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Offset 0x004</text>
    <text x="350" y="327" text-anchor="middle" font-size="10" fill="#7b1fa2">Reset Handler</text>
    <rect x="450" y="295" width="180" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="540" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Offset 0x008</text>
    <text x="540" y="327" text-anchor="middle" font-size="10" fill="#7b1fa2">NMI Handler</text>
    <path d="M 140 295 L 140 285 L 160 280" stroke="#9c27b0" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="160" y="275" text-anchor="middle" font-size="9" fill="#9c27b0">Loads first</text>
  </g>

  <g class="step" id="step4" data-narration="Cortex-M4 defines system exceptions from Reset (priority -1) through SysTick, followed by up to 240 external interrupt requests.">
    <rect x="50" y="360" width="700" height="105" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="385" font-size="14" font-weight="bold" fill="#e65100">Exception Types in Cortex-M4</text>
    <rect x="70" y="400" width="100" height="50" rx="5" fill="#ffe0b2">
      <text x="120" y="418" text-anchor="middle" font-size="9" fill="#e65100">1-2</text>
      <text x="120" y="432" text-anchor="middle" font-size="9" fill="#e65100">Reset, NMI</text>
    </rect>
    <rect x="180" y="400" width="100" height="50" rx="5" fill="#ffe0b2">
      <text x="230" y="418" text-anchor="middle" font-size="9" fill="#e65100">3-10</text>
      <text x="230" y="432" text-anchor="middle" font-size="9" fill="#e65100">System Faults</text>
    </rect>
    <rect x="290" y="400" width="100" height="50" rx="5" fill="#ffe0b2">
      <text x="340" y="418" text-anchor="middle" font-size="9" fill="#e65100">11-15</text>
      <text x="340" y="432" text-anchor="middle" font-size="9" fill="#e65100">System Calls</text>
    </rect>
    <rect x="400" y="400" width="100" height="50" rx="5" fill="#ffcc80">
      <text x="450" y="418" text-anchor="middle" font-size="9" fill="#e65100">16+</text>
      <text x="450" y="432" text-anchor="middle" font-size="9" fill="#e65100">External IRQs</text>
    </rect>
    <text x="520" y="430" font-size="16" fill="#e65100" font-weight="bold">→</text>
    <text x="550" y="425" font-size="11" fill="#e65100">Up to 240</text>
    <text x="550" y="440" font-size="10" fill="#e65100">external interrupts</text>
  </g>

  <g class="step" id="step5" data-narration="The vector address formula calculates any handler location: Base Address + (Exception Number × 4 bytes per word).">
    <rect x="50" y="475" width="700" height="85" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="500" font-size="14" font-weight="bold" fill="#1976d2">Vector Address Formula</text>
    <rect x="70" y="515" width="380" height="35" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="260" y="537" text-anchor="middle" font-size="18" font-weight="bold" fill="#1976d2">Vector Address = Base + (Exception Number × 4)</text>
    <rect x="470" y="515" width="260" height="35" rx="8" fill="#bbdefb"/>
    <text x="600" y="535" text-anchor="middle" font-size="13" fill="#1565c0">Each entry = 4 bytes</text>
    <text x="600" y="545" text-anchor="middle" font-size="10" fill="#1565c0">(one 32-bit word)</text>
  </g>

  <g class="step" id="step6" data-narration="For STM32F4 at flash base 0x08000000: Reset is at 0x08000004, NMI at 0x08000008, and IRQ0 at 0x08000040.">
    <rect x="50" y="570" width="700" height="90" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="595" font-size="14" font-weight="bold" fill="#388e3c">Example: STM32F4 Vector Table Addresses</text>
    <rect x="70" y="610" width="160" height="40" rx="6" fill="#c8e6c9">
      <text x="150" y="628" text-anchor="middle" font-size="11" fill="#2e7d32">Reset Handler</text>
      <text x="150" y="642" text-anchor="middle" font-size="10" fill="#388e3c">0x08000004</text>
    </rect>
    <rect x="240" y="610" width="160" height="40" rx="6" fill="#c8e6c9">
      <text x="320" y="628" text-anchor="middle" font-size="11" fill="#2e7d32">NMI Handler</text>
      <text x="320" y="642" text-anchor="middle" font-size="10" fill="#388e3c">0x08000008</text>
    </rect>
    <rect x="410" y="610" width="160" height="40" rx="6" fill="#c8e6c9">
      <text x="490" y="628" text-anchor="middle" font-size="11" fill="#2e7d32">Hard Fault</text>
      <text x="490" y="642" text-anchor="middle" font-size="10" fill="#388e3c">0x0800000C</text>
    </rect>
    <rect x="580" y="610" width="160" height="40" rx="6" fill="#81c784">
      <text x="660" y="628" text-anchor="middle" font-size="11" fill="#1b5e20">IRQ0</text>
      <text x="660" y="642" text-anchor="middle" font-size="10" fill="#2e7d32">0x08000040</text>
    </rect>
  </g>

  <g class="step" id="step7" data-narration="Vector tables require alignment to 2^(N+1) bytes where N is the number of bits for interrupts, ensuring efficient indexing.">
    <rect x="50" y="670" width="700" height="85" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="695" font-size="14" font-weight="bold" fill="#7b1fa2">Vector Table Alignment Requirement</text>
    <rect x="70" y="710" width="420" height="35" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="280" y="732" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c27b0">Alignment = 2^(N+1) bytes</text>
    <rect x="510" y="710" width="220" height="35" rx="8" fill="#e1bee7"/>
    <text x="620" y="730" text-anchor="middle" font-size="11" fill="#7b1fa2">N = bits for IRQ count</text>
    <text x="70" y="755" font-size="10" fill="#7b1fa2">For 32 interrupts: 2^(5+1) = 64 bytes | For 240 interrupts: 2^(8+1) = 512 bytes</text>
  </g>

  <g class="step" id="step8" data-narration="The VTOR register at address 0xE000ED08 allows relocating the vector table during runtime for bootloader and RAM-based handlers.">
    <rect x="50" y="765" width="700" height="95" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="790" font-size="14" font-weight="bold" fill="#e65100">Vector Table Offset Register (VTOR)</text>
    <rect x="70" y="805" width="200" height="45" rx="8" fill="#ffcc80" stroke="#e65100" stroke-width="2"/>
    <text x="170" y="825" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Register Address</text>
    <text x="170" y="840" text-anchor="middle" font-size="13" fill="#bf360c">0xE000ED08</text>
    <rect x="280" y="805" width="200" height="45" rx="8" fill="#ffe0b2">
      <text x="380" y="825" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Purpose</text>
      <text x="380" y="840" text-anchor="middle" font-size="11" fill="#bf360c">Runtime relocation</text>
    </rect>
    <rect x="490" y="805" width="240" height="45" rx="8" fill="#fff3e0">
      <text x="610" y="825" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Applications</text>
      <text x="610" y="840" text-anchor="middle" font-size="10" fill="#bf360c">Bootloader, RAM-based vectors</text>
    </rect>
  </g>

  <g class="step" id="step9" data-narration="To relocate vector table to RAM: copy 128 entries from flash to RAM, disable interrupts, then update VTOR to new location.">
    <rect x="50" y="870" width="700" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="895" font-size="14" font-weight="bold" fill="#388e3c">Example: Relocate Vector Table to RAM</text>
    <rect x="70" y="910" width="320" height="50" rx="6" fill="#c8e6c9">
      <text x="80" y="928" font-size="10" fill="#2e7d32">// Copy vectors to RAM</text>
      <text x="80" y="943" font-size="10" fill="#2e7d32">for(i=0; i&lt;128; i++) ram[i] = flash[i];</text>
    </rect>
    <rect x="400" y="910" width="160" height="50" rx="6" fill="#a5d6a7">
      <text x="410" y="928" font-size="10" fill="#1b5e20">// Disable interrupts</text>
      <text x="410" y="943" font-size="10" fill="#1b5e20">__disable_irq();</text>
    </rect>
    <rect x="570" y="910" width="160" height="50" rx="6" fill="#81c784">
      <text x="580" y="928" font-size="10" fill="#1b5e20">// Update VTOR</text>
      <text x="580" y="943" font-size="10" fill="#1b5e20">SCB->VTOR = 0x20000000;</text>
    </rect>
  </g>

  <g class="step" id="step10" data-narration="In startup code, vector table is defined using attribute section with weak aliases for default handlers like NMI and HardFault.">
    <rect x="50" y="980" width="700" height="100" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="1005" font-size="14" font-weight="bold" fill="#1976d2">Startup Code - Vector Table Definition</text>
    <rect x="70" y="1020" width="320" height="50" rx="6" fill="#bbdefb">
      <text x="80" y="1038" font-size="9" fill="#1565c0">typedef void (*vector_table_entry_t)(void);</text>
      <text x="80" y="1053" font-size="9" fill="#1565c0">vector_table_entry_t vector_table[]</text>
      <text x="80" y="1065" font-size="9" fill="#1565c0">__attribute__((section(".vectors")))</text>
    </rect>
    <rect x="400" y="1020" width="160" height="50" rx="6" fill="#90caf9">
      <text x="410" y="1045" font-size="10" fill="#0d47a1">Weak alias</text>
      <text x="410" y="1060" font-size="9" fill="#1565c0">__attribute__((weak,</text>
      <text x="410" y="1072" font-size="9" fill="#1565c0">alias("Default_Handler"))</text>
    </rect>
    <rect x="570" y="1020" width="160" height="50" rx="6" fill="#64b5f6">
      <text x="580" y="1045" font-size="10" fill="#0d47a1">Entries:</text>
      <text x="580" y="1060" font-size="9" fill="#1565c0">[0] = &amp;_estack</text>
      <text x="580" y="1072" font-size="9" fill="#1565c0">[1] = Reset_Handler</text>
    </rect>
  </g>

  <g class="step" id="step11" data-narration="Using CMSIS framework, define the handler function with the correct name and enable it in both peripheral and NVIC for interrupts to work.">
    <rect x="50" y="1090" width="700" height="100" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="1115" font-size="14" font-weight="bold" fill="#7b1fa2">CMSIS Interrupt Configuration</text>
    <rect x="70" y="1130" width="220" height="50" rx="6" fill="#e1bee7">
      <text x="80" y="1150" font-size="10" fill="#6a1b9a">// Define handler</text>
      <text x="80" y="1165" font-size="10" fill="#6a1b9a">void TIM2_IRQHandler(void)</text>
    </rect>
    <rect x="300" y="1130" width="160" height="50" rx="6" fill="#ce93d8">
      <text x="310" y="1150" font-size="10" fill="#4a148c">// Enable in NVIC</text>
      <text x="310" y="1165" font-size="10" fill="#4a148c">NVIC_EnableIRQ(TIM2_IRQn)</text>
    </rect>
    <rect x="470" y="1130" width="160" height="50" rx="6" fill="#ba68c8">
      <text x="480" y="1150" font-size="10" fill="#4a148c">// Set priority</text>
      <text x="480" y="1165" font-size="10" fill="#4a148c">NVIC_SetPriority(n, 3)</text>
    </rect>
    <text x="640" y="1165" font-size="18" fill="#7b1fa2">→</text>
  </g>

  <g class="step" id="step12" data-narration="Remember these key formulas: vector address calculation and alignment requirement, plus the VTOR register location.">
    <rect x="50" y="1200" width="700" height="85" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="1225" font-size="14" font-weight="bold" fill="#e65100">Key Formulas to Remember</text>
    <rect x="70" y="1240" width="280" height="35" rx="6" fill="#ffe0b2">
      <text x="210" y="1262" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Vector Address = Base + (Exception# × 4)</text>
    </rect>
    <rect x="360" y="1240" width="200" height="35" rx="6" fill="#ffcc80">
      <text x="460" y="1262" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Alignment = 2^(N+1) bytes</text>
    </rect>
    <rect x="570" y="1240" width="160" height="35" rx="6" fill="#fff3e0">
      <text x="650" y="1262" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">VTOR = 0xE000ED08</text>
    </rect>
  </g>

  <g class="step" id="step13" data-narration="Exam tips: Entry 0 is MSP, entry 1 is Reset Handler, calculate table size as (16 + IRQs) × 4 bytes, and remember the reset sequence.">
    <rect x="50" y="1295" width="700" height="85" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="1320" font-size="14" font-weight="bold" fill="#1976d2">Exam Tips &amp; Common Mistakes</text>
    <rect x="70" y="1335" width="140" height="35" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="1357" text-anchor="middle" font-size="10" fill="#1976d2">Entry 0 = MSP</text>
    <text x="140" y="1368" text-anchor="middle" font-size="9" fill="#1565c0">Entry 1 = Reset</text>
    <rect x="220" y="1335" width="160" height="35" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="300" y="1357" text-anchor="middle" font-size="10" fill="#1976d2">Table Size Formula</text>
    <text x="300" y="1368" text-anchor="middle" font-size="9" fill="#1565c0">(16 + IRQs) × 4 bytes</text>
    <rect x="390" y="1335" width="180" height="35" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="480" y="1357" text-anchor="middle" font-size="10" fill="#1976d2">Reset Sequence</text>
    <text x="480" y="1368" text-anchor="middle" font-size="9" fill="#1565c0">Load MSP → Jump to Reset</text>
    <rect x="580" y="1335" width="150" height="35" rx="6" fill="#90caf9" stroke="#1976d2" stroke-width="1"/>
    <text x="655" y="1357" text-anchor="middle" font-size="10" fill="#1976d2">Common Mistake</text>
    <text x="655" y="1368" text-anchor="middle" font-size="9" fill="#1565c0">Confusing table with ISR</text>
  </g>
</svg>