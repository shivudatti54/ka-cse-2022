<svg viewBox="0 0 800 1480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; font-weight: bold; }
  </style>
  
  <rect width="800" height="1480" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Timer/Counter Programming in 8051. Learn to generate precise delays and count external events.">
    <rect x="100" y="10" width="600" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">Timer/Counter Programming in 8051 Microcontroller</text>
  </g>
  
  <!-- Step 1: Introduction -->
  <g class="step" id="step1" data-narration="Timers enable precise time measurement, event counting, and generation of accurate delays essential for embedded applications.">
    <rect x="40" y="65" width="720" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="85" font-size="12" font-weight="bold" fill="#2e7d32">Why Timer/Counter Matters</text>
    <text x="60" y="105" font-size="10" fill="#388e3c">• Generate precise time delays for embedded applications</text>
    <text x="60" y="120" font-size="10" fill="#388e3c">• Create baud rates for serial communication (UART)</text>
    <text x="60" y="135" font-size="10" fill="#388e3c">• Count external events (sensor pulses, encoder ticks)</text>
  </g>
  
  <!-- Step 2: 8051 Timer Overview -->
  <g class="step" id="step2" data-narration="The 8051 has two 16-bit timers (T0 and T1), each consisting of TH and TL registers for counting.">
    <rect x="40" y="160" width="720" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="180" font-size="12" font-weight="bold" fill="#e65100">8051 Timer Architecture</text>
    <rect x="60" y="195" width="150" height="40" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="80" y="212" font-size="9" fill="#e65100" font-weight="bold">Timer 0 (T0)</text>
    <text x="80" y="228" font-size="8" fill="#e65100">TH0 (High) | TL0 (Low)</text>
    <rect x="220" y="195" width="150" height="40" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="240" y="212" font-size="9" fill="#e65100" font-weight="bold">Timer 1 (T1)</text>
    <text x="240" y="228" font-size="8" fill="#e65100">TH1 (High) | TL1 (Low)</text>
    <text x="400" y="210" font-size="10" fill="#e65100">Each timer = 16-bit</text>
    <text x="400" y="228" font-size="10" fill="#e65100">Max count = 65,536</text>
  </g>
  
  <!-- Step 3: Timer vs Counter Mode -->
  <g class="step" id="step3" data-narration="Timer mode uses internal oscillator pulses while Counter mode counts external events on T0/T1 pins.">
    <rect x="40" y="255" width="720" height="100" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="275" font-size="12" font-weight="bold" fill="#7b1fa2">Timer Mode vs Counter Mode</text>
    <rect x="60" y="290" width="320" height="55" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="75" y="308" font-size="10" font-weight="bold" fill="#7b1fa2">TIMER Mode (C/T = 0)</text>
    <text x="75" y="325" font-size="9" fill="#7b1fa2">Internal oscillator provides clock</text>
    <text x="75" y="340" font-size="9" fill="#7b1fa2">Increments each machine cycle</text>
    <rect x="390" y="290" width="320" height="55" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="405" y="308" font-size="10" font-weight="bold" fill="#7b1fa2">COUNTER Mode (C/T = 1)</text>
    <text x="405" y="325" font-size="9" fill="#7b1fa2">External pins T0(P3.4), T1(P3.5)</text>
    <text x="405" y="340" font-size="9" fill="#7b1fa2">Increments on negative transition</text>
  </g>
  
  <!-- Step 4: TMOD Register -->
  <g class="step" id="step4" data-narration="The TMOD register configures timer mode: M1/M0 select mode, C/T chooses timer/counter, GATE enables external trigger.">
    <rect x="40" y="365" width="720" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="385" font-size="12" font-weight="bold" fill="#1565c0">TMOD Register (8-bit Configuration)</text>
    <rect x="60" y="400" width="680" height="55" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="100" y="420" font-size="9" fill="#1565c0" font-weight="bold">Timer 1</text>
    <text x="160" y="420" font-size="8" fill="#1565c0">GATE</text>
    <text x="210" y="420" font-size="8" fill="#1565c0">C/T</text>
    <text x="260" y="420" font-size="8" fill="#1565c0">M1</text>
    <text x="300" y="420" font-size="8" fill="#1565c0">M0</text>
    <text x="380" y="420" font-size="9" fill="#1565c0" font-weight="bold">Timer 0</text>
    <text x="450" y="420" font-size="8" fill="#1565c0">GATE</text>
    <text x="500" y="420" font-size="8" fill="#1565c0">C/T</text>
    <text x="550" y="420" font-size="8" fill="#1565c0">M1</text>
    <text x="590" y="420" font-size="8" fill="#1565c0">M0</text>
    <line x1="60" y1="430" x2="740" y2="430" stroke="#1976d2" stroke-width="0.5" stroke-dasharray="4"/>
    <text x="100" y="448" font-size="8" fill="#1565c0">7</text>
    <text x="160" y="448" font-size="8" fill="#1565c0">Ext</text>
    <text x="210" y="448" font-size="8" fill="#1565c0">0=Timer</text>
    <text x="260" y="448" font-size="8" fill="#1565c0">Mode</text>
    <text x="300" y="448" font-size="8" fill="#1565c0">Select</text>
    <text x="450" y="448" font-size="8" fill="#1565c0">Ext</text>
    <text x="500" y="448" font-size="8" fill="#1565c0">0=Timer</text>
    <text x="550" y="448" font-size="8" fill="#1565c0">Mode</text>
    <text x="590" y="448" font-size="8" fill="#1565c0">Select</text>
  </g>
  
  <!-- Step 5: Four Timer Modes -->
  <g class="step" id="step5" data-narration="Four modes exist: Mode 0 (13-bit), Mode 1 (16-bit), Mode 2 (8-bit auto-reload), Mode 3 (split timer).">
    <rect x="40" y="475" width="720" height="110" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="495" font-size="12" font-weight="bold" fill="#e65100">Four Timer Modes (M1 M0 bits)</text>
    <rect x="60" y="510" width="165" height="65" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="75" y="528" font-size="9" font-weight="bold" fill="#e65100">Mode 0</text>
    <text x="75" y="543" font-size="8" fill="#e65100">13-bit timer</text>
    <text x="75" y="558" font-size="8" fill="#e65100">Max: 8192 counts</text>
    <text x="75" y="570" font-size="7" fill="#e65100">8048 compatible</text>
    <rect x="235" y="510" width="165" height="65" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="250" y="528" font-size="9" font-weight="bold" fill="#e65100">Mode 1</text>
    <text x="250" y="543" font-size="8" fill="#e65100">16-bit timer</text>
    <text x="250" y="558" font-size="8" fill="#e65100">Max: 65536 counts</text>
    <text x="250" y="570" font-size="7" fill="#e65100">Most common</text>
    <rect x="410" y="510" width="165" height="65" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="425" y="528" font-size="9" font-weight="bold" fill="#e65100">Mode 2</text>
    <text x="425" y="543" font-size="8" fill="#e65100">8-bit auto-reload</text>
    <text x="425" y="558" font-size="8" fill="#e65100">Max: 256 counts</text>
    <text x="425" y="570" font-size="7" fill="#e65100">Baud rate gen.</text>
    <rect x="585" y="510" width="165" height="65" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="600" y="528" font-size="9" font-weight="bold" fill="#e65100">Mode 3</text>
    <text x="600" y="543" font-size="8" fill="#e65100">Split timer</text>
    <text x="600" y="558" font-size="8" fill="#e65100">Two 8-bit timers</text>
    <text x="600" y="570" font-size="7" fill="#e65100">Timer 0 only</text>
  </g>
  
  <!-- Step 6: TCON Register -->
  <g class="step" id="step6" data-narration="TCON register controls timer operation with TR0/TR1 for run control and TF0/TF1 as overflow flags.">
    <rect x="40" y="595" width="720" height="80" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="615" font-size="12" font-weight="bold" fill="#2e7d32">TCON Register - Timer Control</text>
    <rect x="60" y="630" width="680" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="100" y="650" font-size="9" fill="#2e7d32" font-weight="bold">TF1</text>
    <text x="160" y="650" font-size="9" fill="#2e7d32" font-weight="bold">TR1</text>
    <text x="220" y="650" font-size="9" fill="#2e7d32" font-weight="bold">TF0</text>
    <text x="280" y="650" font-size="9" fill="#2e7d32" font-weight="bold">TR0</text>
    <text x="360" y="650" font-size="8" fill="#2e7d32">Overflow</text>
    <text x="440" y="650" font-size="8" fill="#2e7d32">Run/Stop</text>
    <text x="540" y="650" font-size="8" fill="#2e7d32">Overflow</text>
    <text x="620" y="650" font-size="8" fill="#2e7d32">Run/Stop</text>
  </g>
  
  <!-- Step 7: Machine Cycle -->
  <g class="step" id="step7" data-narration="8051 uses 12 oscillator cycles for one machine cycle. For 11.0592MHz, machine cycle equals 1.085 microseconds.">
    <rect x="40" y="685" width="720" height="95" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="60" y="705" font-size="12" font-weight="bold" fill="#c62828">Machine Cycle &amp; Delay Formula</text>
    <rect x="60" y="720" width="320" height="50" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="75" y="740" font-size="10" fill="#c62828" font-weight="bold">Machine Cycle Formula</text>
    <text x="75" y="758" font-size="10" fill="#c62828" class="formula">Machine Cycle = 12 / Fosc</text>
    <rect x="390" y="720" width="320" height="50" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="405" y="740" font-size="10" fill="#c62828" font-weight="bold">Timer Delay Formula</text>
    <text x="405" y="758" font-size="9" fill="#c62828" class="formula">Delay = (65536 - Initial) × MC</text>
  </g>
  
  <!-- Step 8: Example 1 - 10ms Delay -->
  <g class="step" id="step8" data-narration="For 10ms delay with 11.0592MHz: Machine cycle=1.085μs, counts needed=9216, initial value=56320 (0xDC00).">
    <rect x="40" y="790" width="720" height="115" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="810" font-size="12" font-weight="bold" fill="#1565c0">Example 1: Generate 10ms Delay (Mode 1, 11.0592MHz)</text>
    <rect x="60" y="825" width="220" height="70" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="845" font-size="9" fill="#1565c0" font-weight="bold">Step 1: Machine Cycle</text>
    <text x="75" y="862" font-size="9" fill="#1565c0">MC = 12/11.0592MHz</text>
    <text x="75" y="877" font-size="9" fill="#1565c0">MC = 1.085 μs</text>
    <rect x="290" y="825" width="220" height="70" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="305" y="845" font-size="9" fill="#1565c0" font-weight="bold">Step 2: Count Required</text>
    <text x="305" y="862" font-size="9" fill="#1565c0">Counts = 10ms / 1.085μs</text>
    <text x="305" y="877" font-size="9" fill="#1565c0">Counts = 9216</text>
    <rect x="520" y="825" width="220" height="70" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="535" y="845" font-size="9" fill="#1565c0" font-weight="bold">Step 3: Initial Value</text>
    <text x="535" y="862" font-size="9" fill="#1565c0">Initial = 65536 - 9216</text>
    <text x="535" y="877" font-size="9" fill="#1565c0">TH0=0xDC, TL0=0x00</text>
  </g>
  
  <!-- Step 9: Assembly Code -->
  <g class="step" id="step9" data-narration="Assembly code loads TMOD=0x01 for 16-bit mode, loads TH0/TL0 with DC00h, starts timer, waits for overflow flag.">
    <rect x="40" y="915" width="720" height="90" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="935" font-size="12" font-weight="bold" fill="#7b1fa2">Assembly Program for 10ms Delay</text>
    <rect x="60" y="950" width="340" height="45" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="70" y="968" font-size="9" fill="#7b1fa2" font-family="monospace">MOV TMOD, #01H    ;T0, Mode 1</text>
    <text x="70" y="985" font-size="9" fill="#7b1fa2" font-family="monospace">MOV TH0, #0DCH   ;Load high byte</text>
    <rect x="410" y="950" width="340" height="45" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="420" y="968" font-size="9" fill="#7b1fa2" font-family="monospace">MOV TL0, #00H    ;Load low byte</text>
    <text x="420" y="985" font-size="9" fill="#7b1fa2" font-family="monospace">SETB TR0         ;Start Timer</text>
  </g>
  
  <!-- Step 10: LED Blink -->
  <g class="step" id="step10" data-narration="For 1-second LED blink, use 50ms timer with 20 iterations. TH1=0x4C, TL1=0x00 for 50ms at 11.0592MHz.">
    <rect x="40" y="1015" width="720" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="1035" font-size="12" font-weight="bold" fill="#2e7d32">Example 2: Blink LED with 1 Second Delay</text>
    <rect x="60" y="1050" width="330" height="55" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="75" y="1070" font-size="9" fill="#2e7d32" font-weight="bold">Timer Calculation for 50ms</text>
    <text x="75" y="1087" font-size="9" fill="#2e7d32">Counts = 50ms / 1.085μs = 46080</text>
    <text x="75" y="1102" font-size="9" fill="#2e7d32">Initial = 65536 - 46080 = 0x4C00</text>
    <rect x="400" y="1050" width="350" height="55" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="415" y="1070" font-size="9" fill="#2e7d32" font-weight="bold">Assembly Logic</text>
    <text x="415" y="1087" font-size="9" fill="#2e7d32">MOV R0, #20      ;20 × 50ms = 1s</text>
    <text x="415" y="1102" font-size="9" fill="#2e7d32">CPL P1.0         ;Toggle LED</text>
  </g>
  
  <!-- Step 11: Counter Mode -->
  <g class="step" id="step11" data-narration="Counter mode counts external pulses on T0 pin. Configure TMOD=0x05 for 16-bit counter, load TH0=0xFF, TL0=0x98.">
    <rect x="40" y="1125" width="720" height="95" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="1145" font-size="12" font-weight="bold" fill="#e65100">Example 3: Counter Mode - Count 100 Pulses</text>
    <rect x="60" y="1160" width="250" height="50" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="75" y="1180" font-size="9" fill="#e65100" font-weight="bold">TMOD Configuration</text>
    <text x="75" y="1198" font-size="9" fill="#e65100">TMOD = 05H (Counter, Mode 1)</text>
    <rect x="320" y="1160" width="250" height="50" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="335" y="1180" font-size="9" fill="#e65100" font-weight="bold">Initial Value</text>
    <text x="335" y="1198" font-size="9" fill="#e65100">Initial = 65536 - 100 = 0xFF98</text>
    <rect x="580" y="1160" width="170" height="50" rx="5" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="595" y="1180" font-size="9" fill="#e65100" font-weight="bold">Key Operations</text>
    <text x="595" y="1198" font-size="9" fill="#e65100">SETB TR0 - Start</text>
  </g>
  
  <!-- Step 12: Key Formulas Summary -->
  <g class="step" id="step12" data-narration="Remember: Machine cycle = 12/Fosc, Delay = (65536-initial)×MC. For 12MHz, MC=1μs; for 11.0592MHz, MC=1.085μs.">
    <rect x="40" y="1230" width="720" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="1250" font-size="12" font-weight="bold" fill="#1565c0">Key Formulas Summary</text>
    <rect x="60" y="1265" width="210" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="1285" font-size="9" fill="#1565c0" font-weight="bold">12MHz Crystal</text>
    <text x="75" y="1300" font-size="8" fill="#1565c0">MC = 1μs, Max delay = 65.536ms</text>
    <rect x="280" y="1265" width="210" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="295" y="1285" font-size="9" fill="#1565c0" font-weight="bold">11.0592MHz Crystal</text>
    <text x="295" y="1300" font-size="8" fill="#1565c0">MC = 1.085μs, Max delay = 71.1ms</text>
    <rect x="500" y="1265" width="250" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="515" y="1285" font-size="9" fill="#1565c0" font-weight="bold">Initial Value Formula</text>
    <text x="515" y="1300" font-size="8" fill="#1565c0">Initial = 65536 - (Delay/MC)</text>
  </g>
  
  <!-- Step 13: Exam Tips -->
  <g class="step" id="step13" data-narration="Key exam points: TMOD bits M1/M0/C/T/GATE, Mode 1 vs Mode 2 difference, always clear TF flag after overflow.">
    <rect x="40" y="1325" width="720" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="60" y="1345" font-size="12" font-weight="bold" fill="#c62828">Exam Tips &amp; Common Mistakes</text>
    <text x="60" y="1365" font-size="9" fill="#c62828">• TMOD: M1-M0 select mode, C/T selects timer/counter, GATE enables external control</text>
    <text x="60" y="1382" font-size="9" fill="#c62828">• Mode 1 (16-bit) vs Mode 2 (8-bit auto-reload) - Mode 2 for baud rate generation</text>
    <text x="60" y="1399" font-size="9" fill="#c62828">• Common mistakes: Forgetting to clear TF flag, wrong crystal frequency, incorrect TH/TL order</text>
  </g>
</svg>