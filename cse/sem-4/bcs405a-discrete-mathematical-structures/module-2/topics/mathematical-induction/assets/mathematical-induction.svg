<svg viewBox="0 0 800 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    
    <!-- Arrow Marker -->
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    
    <!-- Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Styles -->
    <style>
      @keyframes fadeInSlide {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes textReveal {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 1000; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes formulaReveal {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes dominoFall {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(30deg); }
        100% { transform: rotate(80deg); }
      }
      .step { animation: fadeInSlide 0.6s ease-out; }
      .step rect {
        animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center;
      }
      .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
      .formula { animation: formulaReveal 0.5s ease-out forwards; opacity: 0; }
      .draw-line {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: drawLine 1.5s ease-out forwards;
      }
      .highlight { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1500" fill="#f8f9fa"/>
  
  <!-- Title Step -->
  <g class="step" id="step0" data-narration="Mathematical Induction is a fundamental proof technique for establishing truths about infinite sequences of natural numbers.">
    <rect x="10" y="10" width="780" height="50" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="white">Mathematical Induction</text>
    <text x="400" y="58" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">university - Discrete Mathematical Structures</text>
  </g>
  
  <!-- Step 1: Introduction - Why Induction Matters -->
  <g class="step" id="step1" data-narration="Induction is the cornerstone for proving statements about natural numbers, essential for algorithm analysis and program correctness.">
    <rect x="20" y="70" width="760" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="95" font-size="14" font-weight="bold" fill="#1565c0">Why Mathematical Induction?</text>
    <text x="40" y="115" font-size="10" fill="#424242">• Proves statements about infinite sequences with finite proof</text>
    <text x="40" y="130" font-size="10" fill="#424242">• Foundation for recursive algorithms and time complexity</text>
    <text x="40" y="145" font-size="10" fill="#424242">• Essential for Data Structures, Algorithms, Theory of Computation</text>
  </g>
  
  <!-- Step 2: The Domino Analogy -->
  <g class="step" id="step2" data-narration="The domino analogy explains induction: push the first domino and ensure each knocks down the next, causing a chain reaction.">
    <rect x="20" y="165" width="760" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="190" font-size="14" font-weight="bold" fill="#2e7d32">The Domino Analogy</text>
    <!-- Domino chain visualization -->
    <rect x="150" y="205" width="15" height="35" rx="2" fill="#4caf50" class="highlight"/>
    <rect x="180" y="205" width="15" height="35" rx="2" fill="#66bb6a"/>
    <rect x="210" y="205" width="15" height="35" rx="2" fill="#81c784"/>
    <rect x="240" y="205" width="15" height="35" rx="2" fill="#a5d6a7"/>
    <rect x="270" y="205" width="15" height="35" rx="2" fill="#c8e6c9"/>
    <text x="320" y="222" font-size="10" fill="#2e7d32">Base Case → Inductive Step → All Fall!</text>
    <text x="40" y="240" font-size="10" fill="#424242">Think of it as an infinite row of dominoes - prove first falls and each triggers the next.</text>
  </g>
  
  <!-- Step 3: Principle of Mathematical Induction -->
  <g class="step" id="step3" data-narration="The weak form states: if P(1) is true and P(k) implies P(k+1), then P(n) holds for all natural numbers.">
    <rect x="20" y="260" width="760" height="95" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="285" font-size="14" font-weight="bold" fill="#e65100">Principle of Mathematical Induction (Weak Form)</text>
    <text x="40" y="310" font-size="11" fill="#424242">For predicate P(n) on ℕ:</text>
    <text x="60" y="330" font-size="11" fill="#1565c0">1. Base Case: P(1) is true</text>
    <text x="60" y="345" font-size="11" fill="#1565c0">2. Inductive Step: ∀k≥1, P(k) → P(k+1)</text>
    <text x="350" y="330" font-size="11" fill="#2e7d32">Then ∀n∈ℕ: P(n) is true</text>
    <path d="M60 350 L340 350" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Step 4: Strong Induction -->
  <g class="step" id="step4" data-narration="Strong induction allows using all previous cases P(1), P(2), ..., P(k) to prove P(k+1), not just the immediate predecessor.">
    <rect x="20" y="365" width="760" height="95" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="390" font-size="14" font-weight="bold" fill="#7b1fa2">Strong (Second) Mathematical Induction</text>
    <text x="40" y="415" font-size="11" fill="#424242">For predicate P(n) on ℕ:</text>
    <text x="60" y="435" font-size="11" fill="#7b1fa2">1. Base Cases: P(1), P(2), ..., P(b) are true</text>
    <text x="60" y="450" font-size="11" fill="#7b1fa2">2. Inductive Step: P(1)∧P(2)∧...∧P(k) → P(k+1)</text>
    <text x="350" y="435" font-size="11" fill="#2e7d32">Then ∀n∈ℕ: P(n) is true</text>
    <text x="40" y="425" font-size="9" fill="#616161">Use when: recursive definitions, multiple previous cases, divisibility</text>
  </g>
  
  <!-- Step 5: Extended PMI -->
  <g class="step" id="step5" data-narration="Extended PMI allows starting from any integer m, not just 1 or 0, useful for proving statements for n ≥ m.">
    <rect x="20" y="470" width="760" height="70" rx="8" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="40" y="495" font-size="14" font-weight="bold" fill="#00695c">Extended Principle of Mathematical Induction</text>
    <text x="40" y="520" font-size="11" fill="#424242">If P(m) is true and P(k) → P(k+1) for all k ≥ m, then P(n) is true for all n ≥ m.</text>
  </g>
  
  <!-- Step 6: Well-Ordering Principle -->
  <g class="step" id="step6" data-narration="The Well-Ordering Principle states every non-empty set of natural numbers has a least element, logically equivalent to induction.">
    <rect x="20" y="550" width="760" height="70" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="575" font-size="14" font-weight="bold" fill="#c62828">Well-Ordering Principle</text>
    <text x="40" y="600" font-size="11" fill="#424242">Every non-empty set of natural numbers has a least element. Logically equivalent to:</text>
    <text x="550" y="600" font-size="10" fill="#7b1fa2">PMI ⇔ Strong Induction ⇔ Well-Ordering</text>
  </g>
  
  <!-- Step 7: Example 1 - Sum Formula -->
  <g class="step" id="step7" data-narration="Example: Prove 1+2+...+n = n(n+1)/2. Base case n=1 gives 1=1. Assume true for k, prove for k+1.">
    <rect x="20" y="630" width="760" height="105" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="655" font-size="14" font-weight="bold" fill="#1565c0">Example 1: Sum of First n Natural Numbers</text>
    <text x="40" y="680" font-size="10" fill="#424242">Problem: Prove 1 + 2 + 3 + ... + n = n(n+1)/2 for all n ∈ ℕ</text>
    <text x="50" y="700" font-size="10" fill="#2e7d32">Base Case (n=1): LHS = 1, RHS = 1(2)/2 = 1 ✓</text>
    <text x="50" y="715" font-size="10" fill="#e65100">Inductive Hypothesis: Assume 1+2+...+k = k(k+1)/2</text>
    <text x="50" y="730" font-size="10" fill="#7b1fa2">Prove P(k+1): 1+...+k+(k+1) = [k(k+1)/2] + (k+1) = (k+1)(k+2)/2 ✓</text>
  </g>
  
  <!-- Step 8: Example 2 - Divisibility -->
  <g class="step" id="step8" data-narration="Divisibility example: Prove 3^(2n)-1 is divisible by 8. Base case n=1 gives 8. Use algebraic manipulation to show k implies k+1.">
    <rect x="20" y="745" width="760" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="770" font-size="14" font-weight="bold" fill="#2e7d32">Example 2: Divisibility Proof</text>
    <text x="40" y="795" font-size="10" fill="#424242">Problem: Prove 3^(2n) - 1 is divisible by 8 for all n ∈ ℕ</text>
    <text x="50" y="815" font-size="10" fill="#2e7d32">Base Case (n=1): 3² - 1 = 8, divisible by 8 ✓</text>
    <text x="50" y="830" font-size="10" fill="#e65100">Inductive Step: 3^(2(k+1))-1 = 9·3^(2k)-1 = 8·3^(2k) + (3^(2k)-1) = 8(3^(2k)+m)</text>
    <text x="50" y="845" font-size="10" fill="#7b1fa2">Thus divisible by 8 ✓</text>
  </g>
  
  <!-- Step 9: Example 3 - Strong Induction with Fibonacci -->
  <g class="step" id="step9" data-narration="Fibonacci example using strong induction: Prove F(n) &lt; 2^n. Need two base cases since recurrence uses two previous terms.">
    <rect x="20" y="855" width="760" height="100" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="880" font-size="14" font-weight="bold" fill="#7b1fa2">Example 3: Strong Induction - Fibonacci</text>
    <text x="40" y="905" font-size="10" fill="#424242">Problem: F(1)=1, F(2)=1, F(n)=F(n-1)+F(n-2), prove F(n) &lt; 2^n</text>
    <text x="50" y="925" font-size="10" fill="#2e7d32">Base Cases: F(1)=1&lt;2, F(2)=1&lt;4 ✓</text>
    <text x="50" y="940" font-size="10" fill="#e65100">Inductive Hypothesis: Assume F(i) &lt; 2^i for 1 ≤ i ≤ k</text>
    <text x="50" y="955" font-size="10" fill="#7b1fa2">Inductive Step: F(k+1)=F(k)+F(k-1) &lt; 2^k + 2^(k-1) &lt; 2^k + 2^k = 2^(k+1) ✓</text>
  </g>
  
  <!-- Step 10: Example 4 - Inequality with Extended Induction -->
  <g class="step" id="step10" data-narration="Extended induction example: Prove 2^n &gt; n² for n ≥ 5. Base case starts at n=5, prove for all subsequent integers.">
    <rect x="20" y="965" width="760" height="95" rx="8" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="40" y="990" font-size="14" font-weight="bold" fill="#00695c">Example 4: Inequality - Extended PMI</text>
    <text x="40" y="1015" font-size="10" fill="#424242">Problem: Prove 2^n > n² for all n ≥ 5</text>
    <text x="50" y="1035" font-size="10" fill="#2e7d32">Base Case (n=5): 2⁵=32 > 5²=25 ✓</text>
    <text x="50" y="1050" font-size="10" fill="#e65100">Inductive Step: 2^(k+1) = 2·2^k > 2·k² > (k+1)² for k≥5</text>
    <text x="400" y="1050" font-size="10" fill="#7b1fa2">Since 2k²-(k+1)² = k²-2k-1 > 0 ✓</text>
  </g>
  
  <!-- Step 11: Exam Tips -->
  <g class="step" id="step11" data-narration="Key exam tips: identify base case correctly, write clear inductive hypothesis, know when to use strong induction, and state conclusion clearly.">
    <rect x="20" y="1070" width="760" height="90" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="1095" font-size="14" font-weight="bold" fill="#e65100">Exam Tips & Common Mistakes</text>
    <text x="40" y="1115" font-size="10" fill="#424242">1. Identify base case correctly (n=0, n=1, or n=m)</text>
    <text x="40" y="1130" font-size="10" fill="#424242">2. Write clear hypothesis: "Assume P(k) true for arbitrary k≥base"</text>
    <text x="40" y="1145" font-size="10" fill="#424242">3. Know when to use strong induction: recursive definitions, multiple previous cases</text>
    <text x="400" y="1115" font-size="10" fill="#c62828">4. For divisibility: express n+1 in terms of n</text>
    <text x="400" y="1130" font-size="10" fill="#c62828">5. Conclude: "By PMI, P(n) true ∀n∈ℕ"</text>
    <text x="400" y="1145" font-size="10" fill="#c62828">6. Don't forget the base case!</text>
  </g>
  
  <!-- Step 12: Summary -->
  <g class="step" id="step12" data-narration="In summary: induction proves infinite statements via base case and chain reaction. Use weak form for simple cases, strong form for complex recursive proofs.">
    <rect x="20" y="1170" width="760" height="95" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="1195" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Summary: Key Takeaways</text>
    <text x="60" y="1220" font-size="11" fill="#e3f2fd">• Weak PMI: Base Case + P(k)→P(k+1)</text>
    <text x="60" y="1240" font-size="11" fill="#e3f2fd">• Strong PMI: Multiple Base Cases + P(1)∧...∧P(k)→P(k+1)</text>
    <text x="350" y="1220" font-size="11" fill="#e3f2fd">• Extended PMI: Start from any integer m</text>
    <text x="350" y="1240" font-size="11" fill="#e3f2fd">• Equivalent: PMI ⇔ Strong ⇔ Well-Ordering</text>
    <text x="60" y="1260" font-size="10" fill="rgba(255,255,255,0.8)">Master these patterns: Sum formulas, Divisibility, Inequalities, Recursive sequences</text>
  </g>
  
  <!-- Step 13: Conclusion -->
  <g class="step" id="step13" data-narration="Practice is essential. Master sum formulas, divisibility proofs, and inequality proofs - these are the most common exam question types.">
    <rect x="20" y="1275" width="760" height="65" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="400" y="1305" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Keep Practicing!</text>
    <text x="400" y="1325" text-anchor="middle" font-size="11" fill="#424242">Practice at least 3-4 problems from each category: sum formulas, divisibility, and inequalities</text>
  </g>
</svg>