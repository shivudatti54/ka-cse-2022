<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Projections in Engineering Drawing covers orthographic, isometric, and perspective methods essential for technical communication, manufacturing, and design in modern industries today.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Projections in Engineering Drawing</text>
  </g>
  
  <!-- step1: Classification -->
  <g class="step" id="step1" data-narration="Projections divide into parallel projections with parallel projecting lines used in engineering, and perspective projections converging at a vanishing point for natural views.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. Classification of Projections</text>
    <rect x="40" y="95" width="340" height="35" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="112" font-family="Arial" font-size="11" fill="#333">Parallel Projections</text>
    <text x="50" y="124" font-family="Arial" font-size="9" fill="#666">Lines remain parallel (orthographic, oblique)</text>
    <rect x="400" y="95" width="340" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="410" y="112" font-family="Arial" font-size="11" fill="#333">Perspective Projections</text>
    <text x="410" y="124" font-family="Arial" font-size="9" fill="#666">Lines converge at vanishing point</text>
  </g>
  
  <!-- step2: Orthographic -->
  <g class="step" id="step2" data-narration="First angle projection places object between observer and plane with views beyond the object, while third angle places plane between observer and object.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">2. Orthographic Projection</text>
    <rect x="40" y="183" width="340" height="35" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="198" font-family="Arial" font-size="11" fill="#333">First Angle Projection</text>
    <text x="50" y="212" font-family="Arial" font-size="9" fill="#666">Object between observer and plane</text>
    <rect x="400" y="183" width="340" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="410" y="198" font-family="Arial" font-size="11" fill="#333">Third Angle Projection</text>
    <text x="410" y="212" font-family="Arial" font-size="9" fill="#666">Plane between observer and object</text>
  </g>
  
  <!-- step3: Points and Lines -->
  <g class="step" id="step3" data-narration="Point projections onto planes give coordinates: vertical plane yields x,z, horizontal plane gives x,y, and profile plane provides y,z coordinates.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">3. Projection of Points and Lines</text>
    <rect x="40" y="270" width="220" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="50" y="285" font-family="Arial" font-size="10" fill="#333">V.P. Projection: (x, z)</text>
    <text x="50" y="298" font-family="Arial" font-size="9" fill="#666">True length if line parallel</text>
    <rect x="270" y="270" width="220" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="280" y="285" font-family="Arial" font-size="10" fill="#333">H.P. Projection: (x, y)</text>
    <text x="280" y="298" font-family="Arial" font-size="9" fill="#666">Point if line perpendicular</text>
    <rect x="500" y="270" width="250" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="510" y="285" font-family="Arial" font-size="10" fill="#333">P.P. Projection: (y, z)</text>
    <text x="510" y="298" font-family="Arial" font-size="9" fill="#666">Reduced if line inclined</text>
  </g>
  
  <!-- step4: Isometric -->
  <g class="step" id="step4" data-narration="Isometric projection uses three axes at 120 degrees, with a scale factor of 0.816 for true length conversion and circles appearing as ellipses.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">4. Isometric Projection</text>
    <rect x="40" y="360" width="220" height="35" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="50" y="375" font-family="Arial" font-size="10" fill="#333">Axes at 120° intervals</text>
    <text x="50" y="388" font-family="Arial" font-size="9" fill="#666">Three faces visible</text>
    <rect x="270" y="360" width="220" height="35" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="280" y="375" font-family="Arial" font-size="10" fill="#333">Isometric Scale: 0.816</text>
    <text x="280" y="388" font-family="Arial" font-size="9" fill="#666">True length × 0.816</text>
    <rect x="500" y="360" width="250" height="35" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="510" y="375" font-family="Arial" font-size="10" fill="#333">Circles appear as ellipses</text>
    <text x="510" y="388" font-family="Arial" font-size="9" fill="#666">Major axis 1.22d, minor 0.71d</text>
  </g>
  
  <!-- step5: Oblique -->
  <g class="step" id="step5" data-narration="Oblique projection draws front face true-to-size with receding lines at angles; cavalier uses full scale while cabinet uses half scale.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">5. Oblique Projection</text>
    <rect x="40" y="450" width="340" height="35" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="467" font-family="Arial" font-size="11" fill="#333">Cavalier Projection</text>
    <text x="50" y="480" font-family="Arial" font-size="9" fill="#666">Receding lines at full true length</text>
    <rect x="400" y="450" width="340" height="35" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="410" y="467" font-family="Arial" font-size="11" fill="#333">Cabinet Projection</text>
    <text x="410" y="480" font-family="Arial" font-size="9" fill="#666">Receding lines at half scale</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Remember: first and third angle symbols differ by cone position, adjacent views must align, hidden lines use dashes, and apply 0.816 scale for isometric.">
    <rect x="20" y="498" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">6. Key Exam Tips</text>
    <circle cx="55" cy="545" r="4" fill="#1976d2"/>
    <text x="70" y="549" font-family="Arial" font-size="10" fill="#333">Use correct first/third angle symbol</text>
    <circle cx="230" cy="545" r="4" fill="#388e3c"/>
    <text x="245" y="549" font-family="Arial" font-size="10" fill="#333">Align adjacent views correctly</text>
    <circle cx="400" cy="545" r="4" fill="#ff9800"/>
    <text x="415" y="549" font-family="Arial" font-size="10" fill="#333">Hidden lines shown as dashed</text>
    <circle cx="560" cy="545" r="4" fill="#9c27b0"/>
    <text x="575" y="549" font-family="Arial" font-size="10" fill="#333">Apply 0.816 for isometric</text>
    <circle cx="55" cy="568" r="4" fill="#f44336"/>
    <text x="70" y="572" font-family="Arial" font-size="10" fill="#333">Circles become ellipses in isometric</text>
    <circle cx="280" cy="568" r="4" fill="#1976d2"/>
    <text x="295" y="572" font-family="Arial" font-size="10" fill="#333">HT and VT are line traces</text>
  </g>
</svg>