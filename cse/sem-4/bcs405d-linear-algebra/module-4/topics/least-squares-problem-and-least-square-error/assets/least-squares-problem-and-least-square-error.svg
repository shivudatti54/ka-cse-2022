<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the Least-Squares Problem. We'll explore how to find the best solution when we have more equations than unknowns.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Least-Squares Problem and Least Square Error</text>
  </g>
  
  <g class="step" id="step1" data-narration="Given Ax equals b with more equations than unknowns, we minimize the squared residual. This finds the best approximate solution.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Step 1: Problem Formulation</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#2e7d32">Given overdetermined system Ax = b (m equations, n unknowns, m ≥ n)</text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#2e7d32">Objective: Minimize residual r = b - Ax</text>
    <text x="200" y="100" font-family="Arial" font-size="12" fill="#1b5e20">Minimize ||r||² = ||b - Ax||²</text>
  </g>
  
  <g class="step" id="step2" data-narration="The normal equations provide the key: A transpose A times x-hat equals A transpose b. This gives the optimal solution.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Step 2: Normal Equations</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#e65100">The least-squares solution satisfies:</text>
    <text x="280" y="188" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">AᵀAx̂ = Aᵀb</text>
    <text x="40" y="210" font-family="Arial" font-size="11" fill="#e65100">When A has full column rank: x̂ = (AᵀA)⁻¹Aᵀb</text>
  </g>
  
  <g class="step" id="step3" data-narration="Geometrically, we project vector b onto the column space of A. The residual becomes perpendicular to this subspace in the vector space.">
    <rect x="20" y="234" width="760" height="93" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Step 3: Geometric Interpretation</text>
    <text x="40" y="276" font-family="Arial" font-size="11" fill="#4a148c">Least-squares finds the orthogonal projection of b onto Col(A)</text>
    <rect x="40" y="288" width="120" height="25" fill="#ce93d8" rx="3"/>
    <text x="100" y="306" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">b (in ℝᵐ)</text>
    <line x1="100" y1="306" x2="250" y2="306" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="175" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Ax̂ (projection)</text>
    <text x="450" y="276" font-family="Arial" font-size="11" fill="#4a148c">Residual r ⟂ Col(A)</text>
    <text x="450" y="292" font-family="Arial" font-size="11" fill="#4a148c">Aᵀr = 0 (orthogonality)</text>
  </g>
  
  <g class="step" id="step4" data-narration="For linear regression fitting y equals a plus b x, we set up matrix V and solve normal equations to find coefficients a and b.">
    <rect x="20" y="335" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="5"/>
    <text x="40" y="357" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Step 4: Linear Regression (Curve Fitting)</text>
    <text x="40" y="377" font-family="Arial" font-size="11" fill="#0d47a1">Fit line y = a + bx to data points</text>
    <text x="40" y="393" font-family="Arial" font-size="10" fill="#0d47a1">V = [[1,1],[1,2],[1,3],[1,4]], y = [1,3,2,4]</text>
    <text x="40" y="409" font-family="Arial" font-size="11" fill="#0d47a1">VᵀV = [[4,10],[10,30]], Vᵀy = [10,29]</text>
  </g>
  
  <g class="step" id="step5" data-narration="Solving the normal equations yields the coefficients. For this data, we get y equals 0.5 plus 0.8 times x as the best fit line.">
    <rect x="20" y="423" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="5"/>
    <text x="40" y="445" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Step 5: Solving for Coefficients</text>
    <text x="40" y="465" font-family="Arial" font-size="11" fill="#1b5e20">Solving normal equations:</text>
    <text x="200" y="465" font-family="Arial" font-size="13" font-weight="bold" fill="#1b5e20">a = 0.5, b = 0.8</text>
    <text x="40" y="485" font-family="Arial" font-size="11" fill="#1b5e20">Best-fit line: y = 0.5 + 0.8x</text>
    <text x="40" y="501" font-family="Arial" font-size="10" fill="#1b5e20">Fitted: 1.3, 2.1, 2.9, 3.7 | SSE = 1.8</text>
  </g>
  
  <g class="step" id="step6" data-narration="The least square error is the minimum sum of squared residuals. This measures how well our model fits the data overall.">
    <rect x="20" y="511" width="760" height="85" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="5"/>
    <text x="40" y="533" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Step 6: Least Square Error</text>
    <text x="40" y="553" font-family="Arial" font-size="11" fill="#e65100">Least Square Error = min ||b - Ax̂||² = ||r||²</text>
    <text x="40" y="571" font-family="Arial" font-size="11" fill="#e65100">For our example: SSE = Σ(yᵢ - ŷᵢ)² = 1.8</text>
    <text x="40" y="589" font-family="Arial" font-size="10" fill="#e65100">Lower SSE = better fit | Perfect fit when SSE = 0</text>
  </g>
</svg>