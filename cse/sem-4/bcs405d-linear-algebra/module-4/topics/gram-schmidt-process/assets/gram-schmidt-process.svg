<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Gram-Schmidt process converts any set of linearly independent vectors into an orthonormal set that spans exactly the same subspace as the original vectors.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Gram-Schmidt Process</text>
  </g>
  
  <g class="step" id="step1" data-narration="First, we recall key definitions: inner product u·v equals the sum of products of components. The norm is the vector's length.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="8"/>
    <text x="30" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Key Definitions</text>
    <rect x="30" y="95" width="220" height="35" fill="#ffffff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="112" font-family="Arial" font-size="11" fill="#333">Inner Product: u·v = Σuᵢvᵢ</text>
    <text x="40" y="126" font-family="Arial" font-size="11" fill="#333">Norm: ||v|| = √(v·v)</text>
    <rect x="260" y="95" width="240" height="35" fill="#ffffff" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="270" y="112" font-family="Arial" font-size="11" fill="#333">Orthogonal: u·v = 0 (perpendicular)</text>
    <text x="270" y="126" font-family="Arial" font-size="11" fill="#333">Unit Vector: ||v|| = 1</text>
    <rect x="510" y="95" width="260" height="35" fill="#ffffff" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="520" y="112" font-family="Arial" font-size="11" fill="#333">Orthonormal: Both orthogonal</text>
    <text x="520" y="126" font-family="Arial" font-size="11" fill="#333">and unit length (||v|| = 1)</text>
  </g>
  
  <g class="step" id="step2" data-narration="The projection formula finds how much of vector v lies in the direction of u. This is the core calculation used throughout Gram-Schmidt.">
    <rect x="10" y="146" width="780" height="80" fill="#e8f5e9" rx="8"/>
    <text x="30" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Projection Formula</text>
    <rect x="30" y="185" width="740" height="35" fill="#ffffff" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="205" font-family="Arial" font-size="13" fill="#333">proj<u>v</u> = ((v·u) / (u·u)) × u</text>
    <text x="400" y="205" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">This projects v onto the direction of u</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Gram-Schmidt algorithm: start with u1 equal to v1, then subtract projections onto all previous u vectors from each new vj.">
    <rect x="10" y="234" width="780" height="91" fill="#fff3e0" rx="8"/>
    <text x="30" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Gram-Schmidt Orthogonalization</text>
    <rect x="30" y="273" width="350" height="35" fill="#ffffff" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="293" font-family="Arial" font-size="12" fill="#333">Step 1: u₁ = v₁</text>
    <rect x="390" y="273" width="380" height="35" fill="#ffffff" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="410" y="293" font-family="Arial" font-size="12" fill="#333">Step 2: uⱼ = vⱼ - Σᵢ₌₁^(j-1) proj<uᵢ>(vⱼ)</text>
    <text x="30" y="318" font-family="Arial" font-size="10" fill="#666">Each new vector subtracts projections onto ALL previous orthogonal vectors</text>
  </g>
  
  <g class="step" id="step4" data-narration="In this example with v1=[1,1] and v2=[1,0], we first set u1 equal to v1, then compute u2 by subtracting the projection of v2 onto u1.">
    <rect x="10" y="333" width="780" height="80" fill="#f3e5f5" rx="8"/>
    <text x="30" y="355" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Example in ℝ²</text>
    <text x="30" y="379" font-family="Arial" font-size="11" fill="#333">Given: v₁ = [1,1]ᵀ, v₂ = [1,0]ᵀ</text>
    <rect x="200" y="366" width="280" height="40" fill="#ffffff" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="215" y="383" font-family="Arial" font-size="11" fill="#333">u₁ = v₁ = [1,1]ᵀ</text>
    <text x="215" y="399" font-family="Arial" font-size="11" fill="#333">proj_u1(v₂) = (1/2)[1,1] = [0.5,0.5]</text>
    <rect x="490" y="366" width="280" height="40" fill="#ffffff" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="505" y="383" font-family="Arial" font-size="11" fill="#333">u₂ = v₂ - proj = [1,0] - [0.5,0.5]</text>
    <text x="505" y="399" font-family="Arial" font-size="11" fill="#333">u₂ = [0.5, -0.5]ᵀ</text>
  </g>
  
  <g class="step" id="step5" data-narration="After creating orthogonal vectors, we normalize them by dividing each by its norm to obtain orthonormal vectors with unit length that remain orthogonal.">
    <rect x="10" y="421" width="780" height="80" fill="#ffebee" rx="8"/>
    <text x="30" y="443" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Normalization to Orthonormal</text>
    <rect x="30" y="461" width="340" height="35" fill="#ffffff" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="481" font-family="Arial" font-size="12" fill="#333">eⱼ = uⱼ / ||uⱼ||</text>
    <rect x="380" y="446" width="390" height="50" fill="#ffffff" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="395" y="466" font-family="Arial" font-size="11" fill="#333">e₁ = [1,1]/√2 = [1/√2, 1/√2]ᵀ</text>
    <text x="395" y="481" font-family="Arial" font-size="11" fill="#333">e₂ = [0.5,-0.5]/√0.5 = [1/√2, -1/√2]ᵀ</text>
    <text x="395" y="493" font-family="Arial" font-size="10" fill="#666">Verify: e₁·e₂ = 0 ✓</text>
  </g>
  
  <g class="step" id="step6" data-narration="Gram-Schmidt enables QR decomposition where matrix A equals Q times R, and Q contains orthonormal columns obtained directly from this orthogonalization process.">
    <rect x="10" y="509" width="780" height="85" fill="#e3f2fd" rx="8"/>
    <text x="30" y="533" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">QR Decomposition Application</text>
    <rect x="30" y="551" width="200" height="38" fill="#ffffff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="45" y="567" font-family="Arial" font-size="11" fill="#333">Q = [e₁ e₂] =</text>
    <text x="45" y="582" font-family="Arial" font-size="11" fill="#333">[1/√2, 1/√2]</text>
    <rect x="240" y="551" width="200" height="38" fill="#ffffff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="255" y="567" font-family="Arial" font-size="11" fill="#333">R = [||v₁||, v₂·e₁]</text>
    <text x="255" y="582" font-family="Arial" font-size="11" fill="#333">[0, ||u₂||]</text>
    <rect x="450" y="551" width="320" height="38" fill="#e8f5e9" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="465" y="567" font-family="Arial" font-size="10" fill="#333">Modified Gram-Schmidt (MGS)</text>
    <text x="465" y="581" font-family="Arial" font-size="10" fill="#333">is numerically more stable</text>
    <text x="465" y="593" font-family="Arial" font-size="10" fill="#333">than Classical (CGS)</text>
  </g>
</svg>