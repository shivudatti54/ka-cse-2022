<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Inner product spaces generalize Euclidean geometry by adding concepts of length, angle measurement, and orthogonality to abstract vector spaces over real or complex fields.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Inner Product Spaces</text>
  </g>
  
  <g class="step" id="step1" data-narration="An inner product is a binary operation mapping pairs of vectors to scalars, satisfying conjugate symmetry, linearity in the first argument, and positive-definiteness axioms.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition: Inner Product</text>
    <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">A function ⟨·,·⟩: V×V → F satisfying:</text>
    <text x="50" y="112" font-family="Arial" font-size="9" fill="#555">1. Conjugate Symmetry: ⟨u,v⟩ = ⟨v,u⟩</text>
    <text x="50" y="126" font-family="Arial" font-size="9" fill="#555">2. Linearity: ⟨αu+v,w⟩ = α⟨u,w⟩ + ⟨v,w⟩</text>
    <rect x="400" y="95" width="370" height="35" rx="3" fill="#fff" stroke="#ccc"/>
    <text x="410" y="110" font-family="Arial" font-size="9" fill="#555">3. Positive-definite:</text>
    <text x="410" y="122" font-family="Arial" font-size="9" fill="#555">⟨v,v⟩ ≥ 0, equals 0 iff v = 0</text>
  </g>
  
  <g class="step" id="step2" data-narration="Common examples of inner products include the dot product on R^n, the L2 integral on continuous functions, and the trace product on matrices.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Examples of Inner Products</text>
    <rect x="40" y="180" width="220" height="38" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="50" y="195" font-family="Arial" font-size="9" fill="#333">R^n (Euclidean):</text>
    <text x="50" y="208" font-family="Arial" font-size="9" fill="#555">⟨u,v⟩ = u₁v₁ + u₂v₂ + ... + uₙvₙ</text>
    <rect x="270" y="180" width="240" height="38" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="280" y="195" font-family="Arial" font-size="9" fill="#333">C[a,b] (Functions):</text>
    <text x="280" y="208" font-family="Arial" font-size="9" fill="#555">⟨f,g⟩ = ∫ₐᵇ f(x)g(x)dx (L²)</text>
    <rect x="520" y="180" width="250" height="38" rx="3" fill="#fff" stroke="#388e3c"/>
    <text x="530" y="195" font-family="Arial" font-size="9" fill="#333">M_mn (Matrices):</text>
    <text x="530" y="208" font-family="Arial" font-size="9" fill="#555">⟨A,B⟩ = trace(BᵀA)</text>
  </g>
  
  <g class="step" id="step3" data-narration="Every inner product induces a norm defined as the square root of the inner product of a vector with itself, enabling length measurement in the space.">
    <rect x="20" y="234" width="760" height="95" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Norm Induced and Key Inequalities</text>
    <rect x="40" y="268" width="340" height="40" rx="3" fill="#fff" stroke="#ff9800"/>
    <text x="50" y="283" font-family="Arial" font-size="10" fill="#333">Norm induced by inner product:</text>
    <text x="50" y="298" font-family="Arial" font-size="11" fill="#555">||v|| = √⟨v,v⟩</text>
    <rect x="400" y="268" width="370" height="40" rx="3" fill="#fff" stroke="#ff9800"/>
    <text x="410" y="283" font-family="Arial" font-size="10" fill="#333">Cauchy-Schwarz Inequality:</text>
    <text x="410" y="298" font-family="Arial" font-size="11" fill="#555">|⟨u,v⟩| ≤ ||u|| · ||v||</text>
    <text x="40" y="325" font-family="Arial" font-size="9" fill="#555">Triangle: ||u+v|| ≤ ||u||+||v||</text>
  </g>
  
  <g class="step" id="step4" data-narration="Two vectors are orthogonal when their inner product equals zero, and orthogonal sets of non-zero vectors are always linearly independent.">
    <rect x="20" y="337" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Orthogonality</text>
    <rect x="40" y="371" width="300" height="40" rx="3" fill="#fff" stroke="#9c27b0"/>
    <text x="50" y="386" font-family="Arial" font-size="10" fill="#333">Definition: u ⟂ v iff ⟨u,v⟩ = 0</text>
    <text x="50" y="401" font-family="Arial" font-size="9" fill="#555">Pythagorean: if u ⟂ v, ||u+v||² = ||u||²+||v||²</text>
    <rect x="350" y="371" width="200" height="40" rx="3" fill="#fff" stroke="#9c27b0"/>
    <text x="360" y="386" font-family="Arial" font-size="9" fill="#333">Orthogonal Set:</text>
    <text x="360" y="400" font-family="Arial" font-size="9" fill="#555">All pairs ⟨uᵢ,uⱼ⟩ = 0 for i≠j</text>
    <rect x="560" y="371" width="210" height="40" rx="3" fill="#fff" stroke="#9c27b0"/>
    <text x="570" y="386" font-family="Arial" font-size="9" fill="#333">Orthonormal:</text>
    <text x="570" y="400" font-family="Arial" font-size="9" fill="#555">Orthogonal + each ||eᵢ|| = 1</text>
  </g>
  
  <g class="step" id="step5" data-narration="The Gram-Schmidt process constructs an orthogonal set from linearly independent vectors by successively subtracting vector projections onto previous basis vectors.">
    <rect x="20" y="425" width="760" height="95" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="445" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Gram-Schmidt Orthogonalization</text>
    <text x="40" y="463" font-family="Arial" font-size="10" fill="#333">Given independent {v₁,v₂,...,vₙ}, compute orthogonal {u₁,u₂,...,uₙ}:</text>
    <rect x="40" y="473" width="350" height="42" rx="3" fill="#fff" stroke="#f44336"/>
    <text x="50" y="487" font-family="Arial" font-size="9" fill="#555">u₁ = v₁</text>
    <text x="50" y="500" font-family="Arial" font-size="9" fill="#555">u₂ = v₂ - (⟨v₂,u₁⟩/⟨u₁,u₁⟩)u₁</text>
    <rect x="400" y="470" width="370" height="45" rx="3" fill="#fff" stroke="#f44336"/>
    <text x="410" y="484" font-family="Arial" font-size="9" fill="#555">For k≥2: uₖ = vₖ - Σᵢ₌₁ᵏ⁻¹ (⟨vₖ,uᵢ⟩/⟨uᵢ,uᵢ⟩)uᵢ</text>
    <text x="410" y="498" font-family="Arial" font-size="9" fill="#555">Normalize: eᵢ = uᵢ/||uᵢ|| to get orthonormal</text>
  </g>
  
  <g class="step" id="step6" data-narration="The projection formula projects one vector onto another using inner products, and in orthonormal bases, any vector decomposes as a sum of its Fourier coefficients.">
    <rect x="20" y="528" width="760" height="65" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="548" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Projection Formula and Summary</text>
    <rect x="40" y="562" width="320" height="26" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="50" y="576" font-family="Arial" font-size="10" fill="#555">proj_u(v) = (⟨v,u⟩/⟨u,u⟩) × u</text>
    <rect x="370" y="562" width="400" height="26" rx="3" fill="#fff" stroke="#1976d2"/>
    <text x="380" y="576" font-family="Arial" font-size="10" fill="#555">v = Σ⟨v,eᵢ⟩eᵢ (Fourier expansion in orthonormal basis)</text>
  </g>
</svg>