<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Chalk and Talk Method is a traditional teaching approach that uses a blackboard or whiteboard along with verbal explanation to deliver content to students simultaneously in the classroom.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Chalk and Talk Method of Teaching</text>
  </g>
  
  <g class="step" id="step1" data-narration="This classic method combines visual writing on the board with verbal explanation, engaging both visual and auditory learning channels for better understanding and retention of concepts by students.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition &amp; Core Principles</text>
    <rect x="30" y="92" width="160" height="36" rx="3" fill="#1976d2"/>
    <text x="110" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">CHALK</text>
    <text x="110" y="123" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Writing on Board</text>
    <line x1="195" y1="115" x2="225" y2="115" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="235" y="92" width="160" height="36" rx="3" fill="#1976d2"/>
    <text x="315" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">TALK</text>
    <text x="315" y="123" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Verbal Explanation</text>
    <line x1="400" y1="115" x2="430" y2="115" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="450" y="115" font-family="Arial" font-size="9" fill="#333">Dual Coding Theory:</text>
    <text x="450" y="128" font-family="Arial" font-size="8" fill="#666">Visual + Auditory = Better Retention</text>
  </g>
  
  <g class="step" id="step2" data-narration="The chalk and talk method follows three essential phases: first preparing content and materials, then delivering it through writing and explanation, and finally engaging students through questions and discussions.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Three Phases of Teaching</text>
    <rect x="40" y="182" width="220" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="150" y="200" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">1. Preparation</text>
    <text x="150" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Organize content, diagrams, formulas</text>
    <rect x="290" y="182" width="220" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="200" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">2. Delivery</text>
    <text x="400" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Write &amp; explain sequentially</text>
    <rect x="540" y="182" width="220" height="35" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="650" y="200" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">3. Interaction</text>
    <text x="650" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Q&amp;A, discussions, problem-solving</text>
  </g>
  
  <g class="step" id="step3" data-narration="The chalk and talk method offers key advantages including cost-effectiveness with minimal infrastructure needs, real-time flexibility to adjust pacing, step-by-step demonstrations ideal for algorithms, and encourages active student note-taking.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Advantages</text>
    <rect x="40" y="270" width="170" height="36" rx="3" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="125" y="286" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Cost-Effective</text>
    <text x="125" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#388e3c">Minimal infrastructure needed</text>
    <rect x="225" y="270" width="170" height="36" rx="3" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="310" y="286" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Real-Time Flexibility</text>
    <text x="310" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#388e3c">Adjust pacing instantly</text>
    <rect x="410" y="270" width="170" height="36" rx="3" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="495" y="286" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Step-by-Step</text>
    <text x="495" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#388e3c">Algorithm &amp; problem solving</text>
    <rect x="595" y="270" width="170" height="36" rx="3" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="680" y="286" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Active Note-Taking</text>
    <text x="680" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#388e3c">Students engage actively</text>
  </g>
  
  <g class="step" id="step4" data-narration="Despite its benefits, the chalk and talk method has notable limitations such as students becoming passive learners, writing on the board consuming valuable time, teacher fatigue from continuous writing, and difficulty managing large classes.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Limitations</text>
    <rect x="40" y="358" width="165" height="36" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="122" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Passive Learning</text>
    <text x="122" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#f44336">Students may become passive</text>
    <rect x="220" y="358" width="165" height="36" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="302" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Time-Consuming</text>
    <text x="302" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#f44336">Writing takes more time</text>
    <rect x="400" y="358" width="165" height="36" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="482" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Teacher Fatigue</text>
    <text x="482" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#f44336">Continuous writing strain</text>
    <rect x="580" y="358" width="185" height="36" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="672" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Large Classes</text>
    <text x="672" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#f44336">Individual attention difficult</text>
  </g>
  
  <g class="step" id="step5" data-narration="Effective chalk and talk teaching requires best practices such as using colored markers for emphasis, maintaining eye contact with students, using abbreviations to save time, leaving content visible for reference, and summarizing key points at the end.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Best Practices</text>
    <rect x="40" y="446" width="140" height="36" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="110" y="462" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Use Colors</text>
    <text x="110" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#ff9800">Highlight important points</text>
    <rect x="195" y="446" width="140" height="36" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="265" y="462" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Eye Contact</text>
    <text x="265" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#ff9800">Balance board &amp; students</text>
    <rect x="350" y="446" width="140" height="36" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="420" y="462" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Abbreviate</text>
    <text x="420" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#ff9800">Save time, stay clear</text>
    <rect x="505" y="446" width="140" height="36" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="575" y="462" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Leave Content</text>
    <text x="575" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#ff9800">Reference previous points</text>
    <rect x="660" y="446" width="105" height="36" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="712" y="462" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Summarize</text>
    <text x="712" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#ff9800">Recap key concepts</text>
  </g>
  
  <g class="step" id="step6" data-narration="In computer science education, chalk and talk remains excellent for teaching algorithms like binary search with step-by-step pointer movement, SQL JOIN operations with table visualizations, and process state transitions in operating systems with diagrams.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="522" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">CSE Examples &amp; Modern Relevance</text>
    <rect x="40" y="535" width="220" height="45" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="150" y="552" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Binary Search</text>
    <text x="150" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Step-by-step pointer movement</text>
    <text x="150" y="575" text-anchor="middle" font-family="Arial" font-size="7" fill="#9c27b0">Time: O(log n)</text>
    <rect x="280" y="535" width="220" height="45" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="390" y="552" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">SQL JOINs</text>
    <text x="390" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Draw tables, show results</text>
    <text x="390" y="575" text-anchor="middle" font-family="Arial" font-size="7" fill="#9c27b0">Compare INNER, LEFT, RIGHT</text>
    <rect x="520" y="535" width="245" height="45" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="642" y="552" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Process States</text>
    <text x="642" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">State transition diagrams</text>
    <text x="642" y="575" text-anchor="middle" font-family="Arial" font-size="7" fill="#9c27b0">New → Ready → Running → Exit</text>
  </g>
</svg>