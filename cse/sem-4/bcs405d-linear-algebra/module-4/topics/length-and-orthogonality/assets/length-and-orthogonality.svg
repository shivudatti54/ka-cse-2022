<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Length and Orthogonality. We'll explore how to measure vector magnitudes using norms and determine perpendicular vectors through dot products.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Length and Orthogonality</text>
  </g>
  
  <g class="step" id="step1" data-narration="The Euclidean norm measures vector length. For vector v equals three, four, the length equals square root of nine plus sixteen equals five.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Norm (Length) of a Vector</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">||v|| = √(v₁² + v₂² + ... + vₙ²)</text>
    <rect x="200" y="88" width="60" height="40" fill="none" stroke="#1976d2" stroke-width="2"/>
    <line x1="200" y1="128" x2="260" y2="88" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="220" y="122" font-family="Arial" font-size="10" fill="#666">(3,4)</text>
    <text x="270" y="115" font-family="Arial" font-size="11" fill="#333">||v|| = 5</text>
    <text x="450" y="100" font-family="Arial" font-size="10" fill="#666">Properties: Positivity, Scalability, Triangle Inequality</text>
  </g>
  
  <g class="step" id="step2" data-narration="A unit vector has length one. To normalize vector three, four, divide each component by its length five, giving zero point six, zero point eight.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Unit Vector (Normalization)</text>
    <text x="40" y="190" font-family="Arial" font-size="11" fill="#333">û = v / ||v||</text>
    <rect x="180" y="165" width="50" height="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="205" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">v = (3,4)</text>
    <text x="250" y="182" font-family="Arial" font-size="12" fill="#666">→</text>
    <rect x="280" y="165" width="50" height="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="305" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">û = (0.6,0.8)</text>
    <text x="360" y="182" font-family="Arial" font-size="11" fill="#333">||û|| = √(0.6² + 0.8²) = 1</text>
    <text x="500" y="190" font-family="Arial" font-size="10" fill="#666">Dividing by norm gives unit length</text>
  </g>
  
  <g class="step" id="step3" data-narration="Distance between vectors equals the norm of their difference. For vectors one, zero and zero, one, the distance equals square root of two.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Distance Between Vectors</text>
    <text x="40" y="278" font-family="Arial" font-size="11" fill="#333">d(u, v) = ||u - v||</text>
    <circle cx="150" cy="290" r="3" fill="#ff9800"/>
    <circle cx="190" cy="270" r="3" fill="#ff9800"/>
    <line x1="150" y1="290" x2="190" y2="270" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="165" y="278" font-family="Arial" font-size="9" fill="#666">u</text>
    <text x="195" y="268" font-family="Arial" font-size="9" fill="#666">v</text>
    <text x="230" y="280" font-family="Arial" font-size="10" fill="#333">Example: u=(1,0), v=(0,1)</text>
    <text x="380" y="280" font-family="Arial" font-size="10" fill="#333">d = ||(1,-1)|| = √2</text>
    <text x="550" y="290" font-family="Arial" font-size="10" fill="#666">Satisfies metric properties</text>
  </g>
  
  <g class="step" id="step4" data-narration="Cauchy-Schwarz bounds dot product by the product of norms. Using this, the angle between vectors equals inverse cosine of dot product over norm product.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Cauchy-Schwarz &amp; Angle Between Vectors</text>
    <text x="40" y="368" font-family="Arial" font-size="11" fill="#333">|u·v| ≤ ||u|| ||v||</text>
    <text x="200" y="368" font-family="Arial" font-size="11" fill="#333">cos θ = (u·v) / (||u|| ||v||)</text>
    <text x="40" y="388" font-family="Arial" font-size="10" fill="#666">Example: a=(1,0,1), b=(1,1,0)</text>
    <text x="40" y="402" font-family="Arial" font-size="10" fill="#666">a·b = 1, ||a||=√2, ||b||=√2</text>
    <text x="200" y="388" font-family="Arial" font-size="10" fill="#333">cos θ = 1/(√2×√2) = 1/2</text>
    <text x="200" y="402" font-family="Arial" font-size="10" fill="#333">θ = arccos(1/2) = 60°</text>
    <text x="450" y="388" font-family="Arial" font-size="10" fill="#666">Equality when vectors are parallel</text>
  </g>
  
  <g class="step" id="step5" data-narration="Two vectors are orthogonal when their dot product equals zero. For perpendicular vectors, the squared sum equals sum of squares.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. Orthogonal Vectors &amp; Pythagorean Theorem</text>
    <text x="40" y="456" font-family="Arial" font-size="11" fill="#333">u ⊥ v ⟺ u·v = 0</text>
    <text x="180" y="456" font-family="Arial" font-size="11" fill="#333">||u+v||² = ||u||² + ||v||²</text>
    <line x1="100" y1="480" x2="100" y2="440" stroke="#f44336" stroke-width="2"/>
    <line x1="100" y1="480" x2="180" y2="480" stroke="#f44336" stroke-width="2"/>
    <line x1="100" y1="440" x2="180" y2="480" stroke="#f44336" stroke-width="2" stroke-dasharray="4"/>
    <text x="85" y="465" font-family="Arial" font-size="9" fill="#f44336">u</text>
    <text x="135" y="488" font-family="Arial" font-size="9" fill="#f44336">v</text>
    <text x="250" y="452" font-family="Arial" font-size="10" fill="#666">Example: u=(1,2,2), v=(2,1,-2)</text>
    <text x="250" y="468" font-family="Arial" font-size="10" fill="#666">u·v = 2+2-4 = 0 ⟹ orthogonal</text>
    <text x="250" y="484" font-family="Arial" font-size="10" fill="#666">||u+v||² = 18 = ||u||² + ||v||² ✓</text>
  </g>
  
  <g class="step" id="step6" data-narration="An orthogonal set has perpendicular vectors; orthonormal means orthogonal plus unit length. The dimension of a subspace plus its complement equals n.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">6. Orthogonal &amp; Orthonormal Sets</text>
    <rect x="40" y="535" width="140" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="110" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">Orthogonal Set</text>
    <text x="110" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">vᵢ·vⱼ = 0 for i≠j</text>
    <text x="110" y="578" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Non-zero ⟹ linearly independent</text>
    <rect x="200" y="535" width="140" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="270" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">Orthonormal Set</text>
    <text x="270" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Orthogonal + ||vᵢ|| = 1</text>
    <text x="270" y="578" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Basis simplifies: v = Σ(v·uᵢ)uᵢ</text>
    <rect x="380" y="535" width="140" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="450" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">Orthogonal Complement</text>
    <text x="450" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">W⊥ = {v : v·w = 0 ∀w∈W}</text>
    <text x="450" y="578" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">dim(W) + dim(W⊥) = n</text>
    <text x="580" y="560" font-family="Arial" font-size="10" fill="#666">Standard basis in ℝ³:</text>
    <text x="580" y="578" font-family="Arial" font-size="10" fill="#333">e₁=(1,0,0), e₂=(0,1,0), e₃=(0,0,1)</text>
  </g>
</svg>