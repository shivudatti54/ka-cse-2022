<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ff9800"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#9c27b0"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#f44336"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0">Inner Products and Orthogonal Spaces</text>

  <!-- Step 0: Definition & Axioms -->
  <g class="step" id="step0" data-narration="An inner product on vector space V maps ordered pairs to scalars, satisfying symmetry, linearity, and positive-definiteness axioms.">
    <rect x="40" y="45" width="720" height="75" fill="url(#blueGrad)" rx="8"/>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565C0">Inner Product Definition</text>
    <text x="60" y="85" font-family="Arial, sans-serif" font-size="11" fill="#333">Function ⟨·,·⟩: V × V → F satisfying for all u,v,w ∈ V, α ∈ F:</text>
    <text x="60" y="102" font-family="Arial, sans-serif" font-size="10" fill="#333">1. Symmetry: ⟨u,v⟩ = ⟨v,u⟩  |  2. Linearity: ⟨αu+v,w⟩ = α⟨u,w⟩ + ⟨v,w⟩</text>
    <text x="60" y="115" font-family="Arial, sans-serif" font-size="10" fill="#333">3. Positive-definite: ⟨v,v⟩ ≥ 0, and ⟨v,v⟩ = 0 ⇔ v = 0</text>
  </g>

  <!-- Step 1: Common Examples -->
  <g class="step" id="step1" data-narration="Common inner products include the Euclidean dot product in ℝⁿ, weighted products with positive weights, function integrals, and complex conjugate products.">
    <rect x="40" y="128" width="720" height="75" fill="url(#greenGrad)" rx="8"/>
    <text x="60" y="148" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Common Examples</text>
    <text x="60" y="168" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-style="italic">Standard in ℝⁿ:</tspan> ⟨x,y⟩ = Σxᵢyᵢ  |  <tspan font-style="italic">Weighted:</tspan> ⟨x,y⟩_w = Σwᵢxᵢyᵢ</text>
    <text x="60" y="185" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-style="italic">Functions:</tspan> ⟨f,g⟩ = ∫ₐᵇ f(x)g(x)dx  |  <tspan font-style="italic">Complex ℂⁿ:</tspan> ⟨z,w⟩ = Σzᵢw̄ᵢ</text>
    <text x="60" y="198" font-family="Arial, sans-serif" font-size="10" fill="#555">A vector space with an inner product is called an inner product space.</text>
  </g>

  <!-- Step 2: Norm and Cauchy-Schwarz -->
  <g class="step" id="step2" data-narration="The norm is ‖v‖ = √⟨v,v⟩. Cauchy-Schwarz says |⟨u,v⟩| ≤ ‖u‖·‖v‖ with equality for dependent vectors.">
    <rect x="40" y="211" width="720" height="75" fill="url(#orangeGrad)" rx="8"/>
    <text x="60" y="231" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Norm Induced &amp; Cauchy-Schwarz</text>
    <text x="60" y="251" font-family="Arial, sans-serif" font-size="12" fill="#333"><tspan font-weight="bold">Norm:</tspan> ‖v‖ = √⟨v,v⟩  (satisfies positivity, homogeneity, triangle inequality)</text>
    <text x="60" y="271" font-family="Arial, sans-serif" font-size="12" fill="#333"><tspan font-weight="bold">Cauchy-Schwarz:</tspan> |⟨u,v⟩| ≤ ‖u‖·‖v‖  (equality iff u,v linearly dependent)</text>
    <text x="60" y="286" font-family="Arial, sans-serif" font-size="10" fill="#555">Example: u=(1,2,2), v=(1,0,1) → |⟨u,v⟩|=3 ≤ ‖u‖·‖v‖=3√2≈4.24 ✓</text>
  </g>

  <!-- Step 3: Angles and Orthogonality -->
  <g class="step" id="step3" data-narration="For non-zero vectors, cos θ = ⟨u,v⟩/‖u‖‖v‖. Vectors are orthogonal when ⟨u,v⟩ = 0, yielding the Pythagorean theorem.">
    <rect x="40" y="294" width="720" height="75" fill="url(#purpleGrad)" rx="8"/>
    <text x="60" y="314" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6a1b9a">Angles &amp; Orthogonality</text>
    <text x="60" y="334" font-family="Arial, sans-serif" font-size="12" fill="#333"><tspan font-weight="bold">Angle:</tspan> cos θ = ⟨u,v⟩ / (‖u‖‖v‖)  for non-zero u,v in real spaces</text>
    <text x="60" y="354" font-family="Arial, sans-serif" font-size="12" fill="#333"><tspan font-weight="bold">Orthogonal:</tspan> u ⟂ v ⇔ ⟨u,v⟩ = 0</text>
    <text x="60" y="369" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">Pythagorean:</tspan> If u ⟂ v, then ‖u+v‖² = ‖u‖² + ‖v‖²</text>
  </g>

  <!-- Step 4: Orthogonal and Orthonormal Sets -->
  <g class="step" id="step4" data-narration="Orthogonal sets have ⟨eᵢ,eⱼ⟩ = 0 for i≠j. Orthonormal sets add unit norm. In an orthonormal basis, coordinates are simply inner products.">
    <rect x="40" y="377" width="720" height="75" fill="url(#redGrad)" rx="8"/>
    <text x="60" y="397" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c62828">Orthogonal &amp; Orthonormal Bases</text>
    <text x="60" y="417" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">Orthogonal:</tspan> ⟨eᵢ,eⱼ⟩ = 0 for i ≠ j  |  <tspan font-weight="bold">Orthonormal:</tspan> ⟨eᵢ,eⱼ⟩ = δᵢⱼ</text>
    <text x="60" y="435" font-family="Arial, sans-serif" font-size="11" fill="#333">Standard basis in ℝⁿ is orthonormal: e₁=(1,0,...,0), e₂=(0,1,0,...,0), ...</text>
    <text x="60" y="450" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">Coordinates:</tspan> If v = Σcᵢeᵢ, then cᵢ = ⟨v,eᵢ⟩ (simple inner products!)</text>
  </g>

  <!-- Step 5: Gram-Schmidt Process -->
  <g class="step" id="step5" data-narration="Gram-Schmidt turns independent vectors into orthogonal ones. Each new vector subtracts projections onto previous ones. Optional normalization gives orthonormal basis.">
    <rect x="40" y="460" width="720" height="75" fill="#e0f2f1" rx="8"/>
    <text x="60" y="480" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#004d40">Gram-Schmidt Orthogonalization</text>
    <text x="60" y="500" font-family="Arial, sans-serif" font-size="11" fill="#333"><tspan font-weight="bold">Algorithm:</tspan> u₁ = v₁; for k≥2: uₖ = vₖ - Σⱼ⟨vₖ,uⱼ⟩/⟨uⱼ,uⱼ⟩ · uⱼ</text>
    <text x="60" y="520" font-family="Arial, sans-serif" font-size="11" fill="#333">Example: v₁=(1,1), v₂=(1,0) → u₁=(1,1), u₂=(½,-½) [verify: ⟨u₁,u₂⟩=0]</text>
    <text x="60" y="535" font-family="Arial, sans-serif" font-size="10" fill="#555">Optional normalization: eₖ = uₖ/‖uₖ‖ gives orthonormal basis</text>
  </g>
</svg>