<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to linear combinations, a fundamental concept in linear algebra that forms the basis for understanding vector spaces and their structures.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Linear Combinations</text>
  </g>
  
  <g class="step" id="step1" data-narration="A linear combination combines vectors with scalars: c₁v₁ + c₂v₂ + ... + cₙvₙ. Coefficients can be any real numbers.">
    <rect x="40" y="58" width="720" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="60" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Definition: Linear Combination</text>
    <text x="60" y="105" font-family="Arial" font-size="12" fill="#333">Given vectors v₁, v₂, ..., vₙ and scalars c₁, c₂, ..., cₙ:</text>
    <text x="60" y="125" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">c₁v₁ + c₂v₂ + ... + cₙvₙ</text>
    <rect x="320" y="88" width="420" height="40" rx="6" fill="#fff" stroke="#ddd"/>
    <text x="330" y="108" font-family="Arial" font-size="11" fill="#666">Example in ℝ³: (x,y,z) = x(1,0,0) + y(0,1,0) + z(0,0,1)</text>
  </g>
  
  <g class="step" id="step2" data-narration="The span contains ALL possible linear combinations of given vectors. Geometrically, it creates lines, planes, or entire multidimensional spaces depending on the vectors used.">
    <rect x="40" y="146" width="720" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="60" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Span of Vectors</text>
    <text x="60" y="193" font-family="Arial" font-size="12" fill="#333">span{v₁,v₂,...,vₙ} = {c₁v₁ + c₂v₂ + ... + cₙvₙ : cᵢ ∈ ℝ}</text>
    <text x="60" y="215" font-family="Arial" font-size="11" fill="#666">• 1 vector → line through origin</text>
    <text x="220" y="215" font-family="Arial" font-size="11" fill="#666">• 2 non-parallel in ℝ² → entire plane (ℝ²)</text>
    <text x="520" y="215" font-family="Arial" font-size="11" fill="#666">• 3 independent in ℝ³ → all of ℝ³</text>
  </g>
  
  <g class="step" id="step3" data-narration="Vectors are linearly independent if only the trivial combination produces zero. Otherwise, they're dependent and one can be expressed using others.">
    <rect x="40" y="234" width="720" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="60" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Linear Independence Test</text>
    <text x="60" y="281" font-family="Arial" font-size="12" fill="#333">Set up equation: c₁v₁ + c₂v₂ + ... + cₙvₙ = 0</text>
    <rect x="280" y="248" width="460" height="56" rx="6" fill="#fff" stroke="#ddd"/>
    <text x="290" y="268" font-family="Arial" font-size="11" fill="#388e3c">Independent:</text>
    <text x="290" y="283" font-family="Arial" font-size="11" fill="#333">Only solution c₁=c₂=...=cₙ=0</text>
    <text x="500" y="268" font-family="Arial" font-size="11" fill="#f44336">Dependent:</text>
    <text x="500" y="283" font-family="Arial" font-size="11" fill="#333">Non-trivial solution exists; at least one vector is redundant</text>
  </g>
  
  <g class="step" id="step4" data-narration="To express a vector as a linear combination, set up and solve a system of equations. Not all vectors can be expressed!">
    <rect x="40" y="322" width="720" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="60" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Example 1: Express (3,7,4) using v₁=(1,2,1), v₂=(2,3,0), v₃=(1,1,-1)</text>
    <text x="60" y="369" font-family="Arial" font-size="11" fill="#333">System: a + 2b + c = 3,  2a + 3b + c = 7,  a - c = 4</text>
    <rect x="280" y="332" width="460" height="60" rx="6" fill="#fff" stroke="#ddd"/>
    <text x="290" y="352" font-family="Arial" font-size="11" fill="#f44336">Result: No solution!</text>
    <text x="290" y="367" font-family="Arial" font-size="11" fill="#333">From equations: a + b = 3.5 but also a + b = 11/3</text>
    <text x="290" y="382" font-family="Arial" font-size="11" fill="#333">Since 3.5 ≠ 11/3, (3,7,4) is NOT in the span</text>
  </g>
  
  <g class="step" id="step5" data-narration="Let's test independence using matrix row reduction. The result proves all coefficients must be zero, confirming independence and showing they span the entire space.">
    <rect x="40" y="410" width="720" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="60" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Example 2: Test independence of v₁=(1,1,0), v₂=(1,0,1), v₃=(0,1,1)</text>
    <text x="60" y="457" font-family="Arial" font-size="11" fill="#333">Matrix: [1 1 0; 1 0 1; 0 1 1] → Row reduce → [1 1 0; 0 -1 1; 0 0 2]</text>
    <rect x="280" y="420" width="460" height="60" rx="6" fill="#fff" stroke="#ddd"/>
    <text x="290" y="440" font-family="Arial" font-size="11" fill="#388e3c">Solution: c₁=0, c₂=0, c₃=0 (only trivial!)</text>
    <text x="290" y="455" font-family="Arial" font-size="11" fill="#333">→ Vectors are LINEARLY INDEPENDENT</text>
    <text x="290" y="470" font-family="Arial" font-size="11" fill="#333">They span ℝ³ (3 independent vectors in ℝ³)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key theorems: n+1 vectors in ℝⁿ are always dependent. n independent vectors in ℝⁿ span the entire space. Remember these for exams!">
    <rect x="40" y="498" width="720" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="60" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Key Theorems &amp; Exam Tips</text>
    <rect x="60" y="530" width="220" height="48" rx="6" fill="#fff" stroke="#388e3c"/>
    <text x="70" y="547" font-family="Arial" font-size="10" fill="#388e3c">n+1 Theorem:</text>
    <text x="70" y="561" font-family="Arial" font-size="10" fill="#333">Any n+1 vectors in ℝⁿ</text>
    <text x="70" y="573" font-family="Arial" font-size="10" fill="#333">are linearly dependent</text>
    <rect x="290" y="530" width="220" height="48" rx="6" fill="#fff" stroke="#9c27b0"/>
    <text x="300" y="547" font-family="Arial" font-size="10" fill="#9c27b0">Spanning Theorem:</text>
    <text x="300" y="561" font-family="Arial" font-size="10" fill="#333">n independent vectors</text>
    <text x="300" y="573" font-family="Arial" font-size="10" fill="#333">in ℝⁿ span ℝⁿ</text>
    <rect x="520" y="530" width="220" height="48" rx="6" fill="#fff" stroke="#ff9800"/>
    <text x="530" y="547" font-family="Arial" font-size="10" fill="#ff9800">2D Shortcut:</text>
    <text x="530" y="561" font-family="Arial" font-size="10" fill="#333">Vectors (a,b), (c,d) in ℝ²</text>
    <text x="530" y="573" font-family="Arial" font-size="10" fill="#333">dependent iff ad-bc=0</text>
  </g>
</svg>