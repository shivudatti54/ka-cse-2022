<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Basis and dimension are fundamental concepts in linear algebra that describe the structure and size of vector spaces comprehensively for students learning mathematics.">
    <rect x="0" y="0" width="800" height="45" fill="#e3f2fd"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Basis and Dimension</text>
  </g>
  
  <g class="step" id="step1" data-narration="A vector space V has vector addition and scalar multiplication. A linear combination uses scalars to multiply vectors and add them together.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Vector Space &amp; Linear Combination</text>
    <rect x="40" y="90" width="220" height="40" rx="3" fill="#e3f2fd"/>
    <text x="50" y="107" font-family="Arial" font-size="10" fill="#333">Vector Space V: set with</text>
    <text x="50" y="120" font-family="Arial" font-size="9" fill="#333">addition &amp; scalar multiplication</text>
    <line x1="280" y1="110" x2="310" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="330" y="90" width="420" height="40" rx="3" fill="#e3f2fd"/>
    <text x="340" y="107" font-family="Arial" font-size="10" fill="#333">Linear Combination:</text>
    <text x="340" y="120" font-family="Arial" font-size="9" fill="#333">v = a₁v₁ + a₂v₂ + ... + aₖvₖ</text>
  </g>
  
  <g class="step" id="step2" data-narration="The span of vectors is all possible linear combinations. Vectors are linearly independent if only the trivial combination equals zero.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#ffffff" stroke="#e8f5e9" stroke-width="2"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Span &amp; Linear Independence</text>
    <rect x="40" y="180" width="340" height="38" rx="3" fill="#e8f5e9"/>
    <text x="50" y="195" font-family="Arial" font-size="10" fill="#333">Span(S) = {a₁v₁ + ... + aₖvₖ : aᵢ ∈ F}</text>
    <text x="50" y="208" font-family="Arial" font-size="9" fill="#333">If span(S) = V, then S spans V</text>
    <rect x="400" y="180" width="360" height="38" rx="3" fill="#e8f5e9"/>
    <text x="410" y="195" font-family="Arial" font-size="10" fill="#333">Linearly Independent:</text>
    <text x="410" y="208" font-family="Arial" font-size="9" fill="#333">a₁v₁ + ... + aₖvₖ = 0 ⇒ all aᵢ = 0</text>
  </g>
  
  <g class="step" id="step3" data-narration="A basis is a set that both spans the vector space and is linearly independent. The standard basis for R^n uses unit vectors.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#ffffff" stroke="#fff3e0" stroke-width="2"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Basis of a Vector Space</text>
    <rect x="40" y="268" width="350" height="38" rx="3" fill="#fff3e0"/>
    <text x="50" y="283" font-family="Arial" font-size="10" fill="#333">B is a BASIS for V if:</text>
    <text x="50" y="296" font-family="Arial" font-size="9" fill="#333">1) span(B) = V &amp; 2) B is linearly independent</text>
    <rect x="410" y="268" width="350" height="38" rx="3" fill="#fff3e0"/>
    <text x="420" y="283" font-family="Arial" font-size="10" fill="#333">Standard Basis for ℝⁿ:</text>
    <text x="420" y="296" font-family="Arial" font-size="9" fill="#333">e₁=(1,0,0), e₂=(0,1,0), ..., eₙ=(0,0,1)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Dimension is the number of vectors in any basis. All bases have equal size for a given vector space. Key formulas: dim(R^n)=n, dim(P_n)=n+1, dim(M_mn)=mn.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#ffffff" stroke="#f3e5f5" stroke-width="2"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Dimension</text>
    <text x="40" y="360" font-family="Arial" font-size="10" fill="#333">If V has basis with n elements, then dim(V) = n</text>
    <rect x="40" y="368" width="180" height="26" rx="3" fill="#f3e5f5"/>
    <text x="50" y="383" font-family="Arial" font-size="9" fill="#333">dim(ℝⁿ) = n</text>
    <rect x="230" y="368" width="180" height="26" rx="3" fill="#f3e5f5"/>
    <text x="240" y="383" font-family="Arial" font-size="9" fill="#333">dim(Pₙ) = n + 1</text>
    <rect x="420" y="368" width="180" height="26" rx="3" fill="#f3e5f5"/>
    <text x="430" y="383" font-family="Arial" font-size="9" fill="#333">dim(Mₘₙ) = m × n</text>
    <rect x="610" y="368" width="150" height="26" rx="3" fill="#f3e5f5"/>
    <text x="620" y="383" font-family="Arial" font-size="9" fill="#333">dim({0}) = 0</text>
  </g>
  
  <g class="step" id="step5" data-narration="Example: Check if S={(1,2,3),(4,5,6),(7,8,9)} is a basis for R^3 by finding determinant. Since det=0, vectors are dependent, not a basis.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#ffffff" stroke="#ffebee" stroke-width="2"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Example: Checking a Basis</text>
    <text x="40" y="448" font-family="Arial" font-size="9" fill="#333">S = {(1,2,3), (4,5,6), (7,8,9)} in ℝ³</text>
    <rect x="200" y="440" width="280" height="42" rx="3" fill="#ffebee"/>
    <text x="210" y="455" font-family="Arial" font-size="9" fill="#333">det = 1(45-48) - 4(18-24) + 7(12-15)</text>
    <text x="210" y="468" font-family="Arial" font-size="9" fill="#333">= -3 + 24 - 21 = 0</text>
    <rect x="500" y="440" width="260" height="42" rx="3" fill="#ffebee"/>
    <text x="510" y="455" font-family="Arial" font-size="10" fill="#333">Since det = 0:</text>
    <text x="510" y="468" font-family="Arial" font-size="9" fill="#333">Matrix is singular → linearly dependent</text>
    <text x="40" y="482" font-family="Arial" font-size="9" fill="#f44336">NOT a basis for ℝ³</text>
  </g>
  
  <g class="step" id="step6" data-narration="Subspace theorem states that dim(W) is less than or equal to dim(V), with equality implying W equals V. Every independent set can be extended to form a complete basis.">
    <rect x="20" y="498" width="760" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Theorems &amp; Properties</text>
    <rect x="40" y="532" width="230" height="42" rx="3" fill="#e3f2fd"/>
    <text x="50" y="547" font-family="Arial" font-size="9" fill="#333">Subspace Dimension Theorem:</text>
    <text x="50" y="560" font-family="Arial" font-size="9" fill="#333">dim(W) ≤ dim(V); if equal, W = V</text>
    <rect x="280" y="532" width="240" height="42" rx="3" fill="#e3f2fd"/>
    <text x="290" y="547" font-family="Arial" font-size="9" fill="#333">Basis Extension Theorem:</text>
    <text x="290" y="560" font-family="Arial" font-size="9" fill="#333">Every independent set extends to a basis</text>
    <rect x="530" y="532" width="230" height="42" rx="3" fill="#e3f2fd"/>
    <text x="540" y="547" font-family="Arial" font-size="9" fill="#333">Coordinate Representation:</text>
    <text x="540" y="560" font-family="Arial" font-size="9" fill="#333">v = c₁v₁ + ... + cₙvₙ → [v]ᵦ = (c₁,...,cₙ)</text>
  </g>
</svg>