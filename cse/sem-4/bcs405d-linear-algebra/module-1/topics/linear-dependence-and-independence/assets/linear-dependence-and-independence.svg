<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to linear dependence and independence, fundamental and important concepts in linear algebra that determine if vectors contain redundant information.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Linear Dependence and Independence</text>
  </g>
  
  <g class="step" id="step1" data-narration="A linear combination multiplies vectors by scalars and adds them. The span is all possible combinations of a set of vectors.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Linear Combination</text>
    <text x="40" y="98" font-family="Arial" font-size="11" fill="#333">A vector v = c₁v₁ + c₂v₂ + ... + ckvk where cᵢ are scalars</text>
    <text x="40" y="116" font-family="Arial" font-size="11" fill="#333">Example: (3,4,5) = 3(1,0,0) + 4(0,1,0) + 5(0,0,1) in R³</text>
    <line x1="400" y1="70" x2="400" y2="126" stroke="#1976d2" stroke-width="1" stroke-dasharray="4"/>
    <text x="420" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Span</text>
    <text x="420" y="98" font-family="Arial" font-size="11" fill="#333">span{v₁,v₂,...,vk} = all linear combinations</text>
    <text x="420" y="116" font-family="Arial" font-size="11" fill="#333">Represents all vectors reachable using given directions</text>
  </g>
  
  <g class="step" id="step2" data-narration="Vectors are linearly dependent if we can find non-zero scalars that sum to zero vector. At least one vector can be written as a combination of others.">
    <rect x="20" y="146" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Linear Dependence Definition</text>
    <text x="40" y="186" font-family="Arial" font-size="11" fill="#333">Vectors {v₁,v₂,...,vk} are dependent if ∃ scalars cᵢ (not all zero) such that:</text>
    <text x="60" y="204" font-family="Arial" font-size="12" fill="#333" font-style="italic">c₁v₁ + c₂v₂ + ... + ckvk = 0</text>
    <text x="420" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Key Property</text>
    <text x="420" y="186" font-family="Arial" font-size="11" fill="#333">At least one vector can be expressed</text>
    <text x="420" y="201" font-family="Arial" font-size="11" fill="#333">as a combination of others</text>
    <text x="420" y="216" font-family="Arial" font-size="11" fill="#333">v₂ = cv₁ or v₁ = cv₂</text>
  </g>
  
  <g class="step" id="step3" data-narration="Vectors are linearly independent when the only solution to the zero combination is all scalars being zero. No vector is redundant.">
    <rect x="20" y="234" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Linear Independence Definition</text>
    <text x="40" y="274" font-family="Arial" font-size="11" fill="#333">Vectors are independent if c₁v₁ + c₂v₂ + ... + ckvk = 0</text>
    <text x="60" y="292" font-family="Arial" font-size="12" fill="#333" font-style="italic">implies c₁ = c₂ = ... = ck = 0 (only trivial solution)</text>
    <text x="40" y="310" font-family="Arial" font-size="11" fill="#333">No vector can be written as combination of others</text>
    <line x1="400" y1="246" x2="400" y2="302" stroke="#388e3c" stroke-width="1" stroke-dasharray="4"/>
    <text x="420" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Geometric Meaning</text>
    <text x="420" y="274" font-family="Arial" font-size="11" fill="#333">In R²: independent vectors point</text>
    <text x="420" y="289" font-family="Arial" font-size="11" fill="#333">in different directions, form basis</text>
    <text x="420" y="307" font-family="Arial" font-size="11" fill="#333">In R³: 3 vectors not in same plane</text>
  </g>
  
  <g class="step" id="step4" data-narration="Important theorems: any set with zero vector is dependent; two vectors dependent if one is a scalar multiple; maximum n independent vectors in R^n.">
    <rect x="20" y="322" width="760" height="85" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Key Theorems</text>
    <rect x="40" y="355" width="110" height="40" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="45" y="368" font-family="Arial" font-size="10" fill="#333">Zero Vector Rule</text>
    <text x="45" y="382" font-family="Arial" font-size="9" fill="#333">Set with 0 is ALWAYS</text>
    <text x="45" y="392" font-family="Arial" font-size="9" fill="#333">dependent</text>
    <rect x="160" y="355" width="120" height="40" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="165" y="368" font-family="Arial" font-size="10" fill="#333">Two-Vector Test</text>
    <text x="165" y="382" font-family="Arial" font-size="9" fill="#333">Dependent if one is</text>
    <text x="165" y="392" font-family="Arial" font-size="9" fill="#333">scalar multiple</text>
    <rect x="290" y="355" width="120" height="40" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="295" y="368" font-family="Arial" font-size="10" fill="#333">Maximum Vectors</text>
    <text x="295" y="382" font-family="Arial" font-size="9" fill="#333">In R^n, max n</text>
    <text x="295" y="392" font-family="Arial" font-size="9" fill="#333">independent vectors</text>
    <rect x="420" y="355" width="110" height="40" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="425" y="368" font-family="Arial" font-size="10" fill="#333">Determinant Test</text>
    <text x="425" y="382" font-family="Arial" font-size="9" fill="#333">det ≠ 0 means</text>
    <text x="425" y="392" font-family="Arial" font-size="9" fill="#333">independent</text>
    <rect x="540" y="355" width="110" height="40" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="545" y="368" font-family="Arial" font-size="10" fill="#333">Rank Test</text>
    <text x="545" y="382" font-family="Arial" font-size="9" fill="#333">Rank equals number</text>
    <text x="545" y="392" font-family="Arial" font-size="9" fill="#333">of independent vectors</text>
  </g>
  
  <g class="step" id="step5" data-narration="Example: vectors (1,2) and (2,4) in R2 are dependent because v2 equals 2 times v1, making them lie on the same line.">
    <rect x="20" y="415" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="437" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Example 1: Dependent Vectors in R²</text>
    <text x="40" y="455" font-family="Arial" font-size="11" fill="#333">Check: v₁=(1,2), v₂=(2,4)</text>
    <text x="40" y="472" font-family="Arial" font-size="11" fill="#333">c₁(1,2) + c₂(2,4) = (0,0) → c₁+2c₂=0, 2c₁+4c₂=0</text>
    <text x="40" y="489" font-family="Arial" font-size="11" fill="#333">Non-trivial solution: c₁=-2, c₂=1 works!</text>
    <rect x="400" y="430" width="150" height="55" fill="#e1bee7"/>
    <text x="410" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Conclusion</text>
    <text x="410" y="467" font-family="Arial" font-size="11" fill="#333">DEPENDENT</text>
    <text x="410" y="482" font-family="Arial" font-size="10" fill="#333">v₂ = 2v₁</text>
    <line x1="560" y1="457" x2="580" y2="457" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="590" y="461" font-family="Arial" font-size="12" fill="#9c27b0">Same line!</text>
  </g>
  
  <g class="step" id="step6" data-narration="The standard basis vectors (1,0,0), (0,1,0), (0,0,1) in R3 are linearly independent, forming the standard basis that spans the entire three-dimensional space with dimension 3.">
    <rect x="20" y="503" width="760" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="525" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Example 2: Independent Vectors in R³ (Standard Basis)</text>
    <text x="40" y="543" font-family="Arial" font-size="11" fill="#333">Check: v₁=(1,0,0), v₂=(0,1,0), v₃=(0,0,1)</text>
    <text x="40" y="560" font-family="Arial" font-size="11" fill="#333">c₁v₁ + c₂v₂ + c₃v₃ = (0,0,0) → c₁=0, c₂=0, c₃=0</text>
    <text x="40" y="577" font-family="Arial" font-size="11" fill="#333">Only trivial solution → INDEPENDENT</text>
    <rect x="400" y="517" width="120" height="65" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="410" y="537" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Standard Basis</text>
    <text x="410" y="555" font-family="Arial" font-size="11" fill="#333">Dimension = 3</text>
    <text x="410" y="572" font-family="Arial" font-size="10" fill="#333">Spans entire R³</text>
    <text x="600" y="535" font-family="Arial" font-size="11" fill="#666">Remember:</text>
    <text x="600" y="552" font-family="Arial" font-size="10" fill="#666">Dependent = redundant</text>
    <text x="600" y="567" font-family="Arial" font-size="10" fill="#666">Independent = unique</text>
    <text x="600" y="582" font-family="Arial" font-size="10" fill="#666">directions</text>
  </g>
</svg>