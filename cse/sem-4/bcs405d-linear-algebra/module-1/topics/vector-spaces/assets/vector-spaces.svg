<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Vector spaces are collections of vectors that can be added together and multiplied by scalars, forming abstract mathematical structures governed by ten fundamental axioms.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Vector Spaces</text>
  </g>

  <!-- step1: Definition -->
  <g class="step" id="step1" data-narration="A vector space V over a field F has vector addition and scalar multiplication operations, satisfying axioms including commutativity, associativity, and distributivity for closure.">
    <rect x="20" y="58" width="760" height="80" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Definition: Vector Space V over F</text>
    <text x="40" y="98" font-family="Arial" font-size="10" fill="#333">Two operations: Vector Addition (u+v) and Scalar Multiplication (αv)</text>
    <text x="40" y="114" font-family="Arial" font-size="10" fill="#333">10 Axioms: Commutativity, Associativity, Zero Vector, Additive Inverse,</text>
    <text x="40" y="128" font-family="Arial" font-size="10" fill="#333">Scalar Associativity, Identity, Distributivity</text>
    <rect x="580" y="68" width="180" height="60" rx="4" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="670" y="85" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Examples:</text>
    <text x="670" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Rⁿ, R[m×n], Pₙ, C[a,b]</text>
    <text x="670" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Standard Vector Spaces</text>
  </g>

  <!-- step2: Subspaces -->
  <g class="step" id="step2" data-narration="A subset W of V is a subspace if it contains the zero vector, and is closed under addition and scalar multiplication.">
    <rect x="20" y="146" width="760" height="80" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Subspace: Three Conditions for W ⊆ V</text>
    <rect x="40" y="182" width="220" height="35" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="150" y="196" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1. Non-empty: 0 ∈ W</text>
    <text x="150" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(contains zero vector)</text>
    <rect x="270" y="182" width="220" height="35" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="380" y="196" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2. Closed under Addition</text>
    <text x="380" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">u, v ∈ W ⇒ u+v ∈ W</text>
    <rect x="500" y="182" width="220" height="35" rx="4" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="610" y="196" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">3. Closed under Scalar Mult.</text>
    <text x="610" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">v ∈ W, α ∈ F ⇒ αv ∈ W</text>
  </g>

  <!-- step3: Linear Combinations and Span -->
  <g class="step" id="step3" data-narration="A linear combination α₁v₁ + ... + αₙvₙ produces new vectors from existing ones. The span is all possible linear combinations of a set S in V.">
    <rect x="20" y="234" width="760" height="93" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Linear Combination &amp; Span</text>
    <rect x="40" y="270" width="340" height="35" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="210" y="286" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Linear Combination:</text>
    <text x="210" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">α₁v₁ + α₂v₂ + ... + αₙvₙ</text>
    <rect x="400" y="270" width="360" height="35" rx="4" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="580" y="286" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Span(S) = {all linear combinations of S}</text>
    <text x="580" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Smallest subspace containing S</text>
    <text x="40" y="320" font-family="Arial" font-size="9" fill="#666">If span(S) = V, then S is a spanning set of V</text>
  </g>

  <!-- step4: Linear Dependence/Independence -->
  <g class="step" id="step4" data-narration="Vectors are linearly dependent when non-zero scalars exist making their combination equal zero, and any set containing the zero vector is dependent. Otherwise they are independent.">
    <rect x="20" y="335" width="760" height="95" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="40" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Linear Dependence &amp; Independence</text>
    <rect x="40" y="373" width="350" height="35" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="215" y="389" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Linearly Dependent:</text>
    <text x="215" y="403" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">∃ scalars αᵢ ≠ 0: α₁v₁+...+αₙvₙ = 0</text>
    <rect x="400" y="373" width="350" height="35" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="575" y="389" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Linearly Independent:</text>
    <text x="575" y="403" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">α₁v₁+...+αₙvₙ = 0 ⇒ αᵢ = 0 ∀i</text>
    <text x="40" y="423" font-family="Arial" font-size="9" fill="#666">• Any set with zero vector is dependent • In Rⁿ, more than n vectors is always dependent</text>
  </g>

  <!-- step5: Basis and Dimension -->
  <g class="step" id="step5" data-narration="A basis is a linearly independent set that spans V, and dimension is the number of vectors in any basis of V, which is always consistent.">
    <rect x="20" y="438" width="760" height="97" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="40" y="460" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Basis &amp; Dimension</text>
    <rect x="40" y="476" width="230" height="35" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="155" y="492" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">BASIS = Independent + Spans V</text>
    <text x="155" y="506" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Every vector uniquely expressed</text>
    <rect x="280" y="476" width="160" height="35" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="360" y="492" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">DIMENSION</text>
    <text x="360" y="506" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">dim(V) = |basis|</text>
    <rect x="450" y="476" width="310" height="35" rx="4" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="605" y="492" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Standard Basis for Rⁿ:</text>
    <text x="605" y="506" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">e₁=(1,0,...), e₂=(0,1,0,...), ..., eₙ</text>
    <text x="40" y="528" font-family="Arial" font-size="9" fill="#666">Dimension Theorem: If W is subspace of V, then dim(W) ≤ dim(V)</text>
  </g>

  <!-- step6: Examples Summary -->
  <g class="step" id="step6" data-narration="Common vector space examples include R³ with standard basis e₁e₂e₃, matrices R[m×n] with dimension m×n, and polynomials Pₙ with dimension n+1.">
    <rect x="20" y="543" width="760" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="40" y="565" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Key Examples: R³ (dim=3), R[m×n] (dim=m×n), Pₙ (dim=n+1)</text>
  </g>
</svg>