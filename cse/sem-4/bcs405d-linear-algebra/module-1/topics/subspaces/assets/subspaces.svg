<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Subspaces are subsets of vector spaces that themselves form vector spaces under inherited linear operations of addition and scalar multiplication.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Subspaces in Linear Algebra</text>
  </g>
  
  <g class="step" id="step1" data-narration="A subset W of V is a subspace if three conditions hold: zero vector belongs to W, closure under addition, and closure under scalar multiplication.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e3f2fd"/>
    <text x="25" y="78" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">Definition of Subspace</text>
    <rect x="25" y="88" width="240" height="42" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="35" y="102" font-family="Arial" font-size="9" fill="#333">1. Zero vector: 0 ∈ W</text>
    <text x="35" y="116" font-family="Arial" font-size="9" fill="#333">2. Closed under addition:</text>
    <text x="45" y="126" font-family="Arial" font-size="9" fill="#333">u,v ∈ W ⇒ u+v ∈ W</text>
    <text x="145" y="102" font-family="Arial" font-size="9" fill="#333">3. Scalar multiplication:</text>
    <text x="145" y="116" font-family="Arial" font-size="9" fill="#333">v ∈ W, c ∈ F ⇒ cv ∈ W</text>
  </g>
  
  <g class="step" id="step2" data-narration="The subspace test systematically checks these three conditions. If all pass, W is guaranteed to be a subspace of V.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#e8f5e9"/>
    <text x="25" y="166" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">The Subspace Test</text>
    <rect x="25" y="178" width="350" height="40" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="192" font-family="Arial" font-size="9" fill="#333">Step 1: Verify 0 ∈ W</text>
    <text x="35" y="208" font-family="Arial" font-size="9" fill="#333">Step 2: Check u+v ∈ W for all u,v ∈ W</text>
    <text x="200" y="192" font-family="Arial" font-size="9" fill="#333">Step 3: Check cv ∈ W for all v ∈ W, c ∈ F</text>
    <rect x="385" y="178" width="395" height="40" rx="3" fill="#c8e6c9"/>
    <text x="395" y="195" font-family="Arial" font-size="9" fill="#333">These three conditions are</text>
    <text x="395" y="210" font-family="Arial" font-size="9" fill="#333">NECESSARY and SUFFICIENT</text>
  </g>
  
  <g class="step" id="step3" data-narration="Every vector space has at least two subspaces: the trivial subspace {0} containing only the zero vector, and the whole space V itself.">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#fff3e0"/>
    <text x="25" y="254" font-family="Arial" font-size="12" fill="#ff9800" font-weight="bold">Trivial Subspaces</text>
    <rect x="25" y="268" width="250" height="38" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="35" y="284" font-family="Arial" font-size="10" fill="#333" font-weight="bold">{0} Subspace (Zero Subspace)</text>
    <text x="35" y="298" font-family="Arial" font-size="9" fill="#666">Contains only the zero vector</text>
    <rect x="285" y="268" width="250" height="38" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="295" y="284" font-family="Arial" font-size="10" fill="#333" font-weight="bold">V (Improper Subspace)</text>
    <text x="295" y="298" font-family="Arial" font-size="9" fill="#666">The entire vector space itself</text>
    <text x="545" y="284" font-family="Arial" font-size="9" fill="#333">All other subspaces are</text>
    <text x="545" y="298" font-family="Arial" font-size="9" fill="#333">called NONTRIVIAL or PROPER</text>
  </g>
  
  <g class="step" id="step4" data-narration="In R², subspaces are: the origin point, any line through the origin, or the entire plane R². Lines not through origin fail the test.">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#f3e5f5"/>
    <text x="25" y="342" font-family="Arial" font-size="12" fill="#9c27b0" font-weight="bold">Geometric Examples in R²</text>
    <rect x="25" y="356" width="230" height="38" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="35" y="372" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Subspaces of R²:</text>
    <text x="35" y="386" font-family="Arial" font-size="9" fill="#388e3c">• {0} - single point</text>
    <text x="100" y="386" font-family="Arial" font-size="9" fill="#388e3c">• Lines through origin</text>
    <text x="195" y="386" font-family="Arial" font-size="9" fill="#388e3c">• R² itself</text>
    <rect x="265" y="356" width="250" height="38" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="275" y="372" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">NOT Subspaces:</text>
    <text x="275" y="386" font-family="Arial" font-size="9" fill="#666">Lines not through origin fail</text>
    <text x="525" y="372" font-family="Arial" font-size="9" fill="#333">Example: W={(x,1):x∈R}</text>
    <text x="525" y="386" font-family="Arial" font-size="9" fill="#333">(0,0)∉W, fails zero vector test</text>
  </g>
  
  <g class="step" id="step5" data-narration="The span of any set of vectors forms a subspace. Span(S) equals all linear combinations and is the smallest subspace containing S.">
    <rect x="10" y="410" width="780" height="80" rx="5" fill="#e3f2fd"/>
    <text x="25" y="430" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">Span and Subspace Generation</text>
    <rect x="25" y="444" width="340" height="38" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="35" y="460" font-family="Arial" font-size="10" fill="#333">span{v₁,v₂,...,vₖ} = {c₁v₁+...+cₖvₖ : cᵢ∈F}</text>
    <text x="35" y="474" font-family="Arial" font-size="9" fill="#666">All linear combinations of the vectors</text>
    <rect x="375" y="444" width="220" height="38" rx="3" fill="#bbdefb"/>
    <text x="385" y="460" font-family="Arial" font-size="9" fill="#333" font-weight="bold">THEOREM:</text>
    <text x="385" y="474" font-family="Arial" font-size="9" fill="#333">span(S) is ALWAYS a subspace</text>
    <text x="605" y="460" font-family="Arial" font-size="9" fill="#333">Smallest subspace</text>
    <text x="605" y="474" font-family="Arial" font-size="9" fill="#333">containing S</text>
  </g>
  
  <g class="step" id="step6" data-narration="The null space of a matrix A, containing all solutions to Ax=0, is always a subspace of Rⁿ. This is a key concept in linear algebra.">
    <rect x="10" y="498" width="780" height="90" rx="5" fill="#e8f5e9"/>
    <text x="25" y="518" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">Important Example: Null Space</text>
    <rect x="25" y="532" width="340" height="48" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="548" font-family="Arial" font-size="9" fill="#333">null(A) = {x ∈ Rⁿ : Ax = 0}</text>
    <text x="35" y="562" font-family="Arial" font-size="9" fill="#333">Example: A = [[1,2],[2,4]]</text>
    <text x="35" y="576" font-family="Arial" font-size="9" fill="#333">null(A) = {t(-2,1) : t ∈ R}</text>
    <rect x="375" y="532" width="200" height="48" rx="3" fill="#c8e6c9"/>
    <text x="385" y="548" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Verification:</text>
    <text x="385" y="562" font-family="Arial" font-size="9" fill="#333">0 ∈ null(A) when t=0</text>
    <text x="385" y="576" font-family="Arial" font-size="9" fill="#333">Closed under + and scalar mult.</text>
    <rect x="585" y="532" width="195" height="48" rx="3" fill="#a5d6a7"/>
    <text x="595" y="560" font-family="Arial" font-size="10" fill="#333" font-weight="bold" text-anchor="middle">Homogeneous systems</text>
    <text x="595" y="576" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">ALWAYS give subspaces</text>
  </g>
</svg>