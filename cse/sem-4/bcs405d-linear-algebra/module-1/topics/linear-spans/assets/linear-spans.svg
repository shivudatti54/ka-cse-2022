<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Linear Spans! Today we will explore this fundamental concept in linear algebra that describes all possible linear combinations of vectors.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Linear Spans in Vector Spaces</text>
  </g>
  
  <g class="step" id="step1" data-narration="A linear combination of vectors v1, v2, ..., vk is an expression: alpha1 times v1 plus alpha2 times v2, up to alpha-k times vk, where alphas are scalars.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Linear Combination</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">A linear combination of vectors v₁, v₂, ..., vₖ is:</text>
    <text x="40" y="120" font-family="Arial" font-size="12" font-style="italic" fill="#1976d2">α₁v₁ + α₂v₂ + ... + αₖvₖ</text>
    <text x="280" y="120" font-family="Arial" font-size="11" fill="#333">where α₁, α₂, ..., αₖ are scalars (real numbers).</text>
  </g>
  
  <g class="step" id="step2" data-narration="The linear span of a set S equals all possible linear combinations of vectors in S. We denote this as span of S, containing every vector reachable from S.">
    <rect x="20" y="146" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">2. Definition of Linear Span</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#333">The span of a set S = {v₁, v₂, ..., vₖ} is:</text>
    <text x="40" y="208" font-family="Arial" font-size="12" font-style="italic" fill="#9c27b0">span(S) = {α₁v₁ + α₂v₂ + ... + αₖvₖ : αᵢ ∈ ℝ}</text>
    <text x="320" y="208" font-family="Arial" font-size="11" fill="#333">Contains ALL possible linear combinations!</text>
    <text x="40" y="226" font-family="Arial" font-size="10" fill="#f44336">Special case: span(∅) = {0}</text>
  </g>
  
  <g class="step" id="step3" data-narration="A key theorem states the span of any set of vectors is always a subspace. This means spans contain the zero vector and close under addition and scalar multiplication.">
    <rect x="20" y="234" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">3. Span is Always a Subspace</text>
    <text x="40" y="276" font-family="Arial" font-size="11" fill="#333">Theorem: For any set S ⊆ V, span(S) is a subspace of V.</text>
    <rect x="40" y="286" width="180" height="20" fill="#c8e6c9" rx="4"/>
    <text x="50" y="300" font-family="Arial" font-size="10" fill="#2e7d32">• Contains zero vector</text>
    <rect x="230" y="286" width="180" height="20" fill="#c8e6c9" rx="4"/>
    <text x="240" y="300" font-family="Arial" font-size="10" fill="#2e7d32">• Closed under addition</text>
    <rect x="420" y="286" width="180" height="20" fill="#c8e6c9" rx="4"/>
    <text x="430" y="300" font-family="Arial" font-size="10" fill="#2e7d32">• Closed under scalar mult.</text>
  </g>
  
  <g class="step" id="step4" data-narration="Consider S equals (1,2) and (2,4) in R2. Since (2,4) equals 2 times (1,2), the span is only a line through the origin, not all of R2.">
    <rect x="20" y="322" width="760" height="89" fill="#fff3e0" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">4. Example: Span in ℝ²</text>
    <text x="40" y="364" font-family="Arial" font-size="11" fill="#333">Let S = {(1,2), (2,4)} in ℝ²</text>
    <text x="200" y="364" font-family="Arial" font-size="10" fill="#e65100">(2,4) = 2(1,2), so vectors are dependent</text>
    <text x="40" y="384" font-family="Arial" font-size="11" fill="#333">span(S) = {(t, 2t) : t ∈ ℝ}</text>
    <text x="250" y="384" font-family="Arial" font-size="11" font-style="italic" fill="#ff9800">A line through origin!</text>
    <text x="40" y="404" font-family="Arial" font-size="10" fill="#f44336">≠ ℝ² because (0,1) cannot be written this way</text>
  </g>
  
  <g class="step" id="step5" data-narration="The standard basis vectors e1, e2, e3 span all of R3. Any vector (a,b,c) equals a times e1 plus b times e2 plus c times e3, so span equals R3.">
    <rect x="20" y="420" width="760" height="89" fill="#e3f2fd" rx="8"/>
    <text x="40" y="442" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">5. Standard Basis Spans ℝ³</text>
    <text x="40" y="462" font-family="Arial" font-size="11" fill="#333">Standard basis: e₁=(1,0,0), e₂=(0,1,0), e₃=(0,0,1)</text>
    <text x="40" y="482" font-family="Arial" font-size="11" fill="#333">For any vector (a,b,c) ∈ ℝ³:</text>
    <text x="40" y="502" font-family="Arial" font-size="12" font-style="italic" fill="#1976d2">(a,b,c) = a·e₁ + b·e₂ + c·e₃</text>
    <text x="260" y="502" font-family="Arial" font-size="11" fill="#388e3c">∴ span{e₁,e₂,e₃} = ℝ³</text>
  </g>
  
  <g class="step" id="step6" data-narration="To check if w is in span of given vectors, set up equations w equals linear combination, then solve the system. Inconsistent systems mean w is not in the span.">
    <rect x="20" y="518" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="540" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">6. Checking if w ∈ span(S)</text>
    <text x="40" y="560" font-family="Arial" font-size="11" fill="#333">Step 1: Write w = c₁v₁ + c₂v₂ + ... + cₖvₖ</text>
    <text x="40" y="580" font-family="Arial" font-size="11" fill="#333">Step 2: Form system. Step 3: Solve - Consistent → w ∈ span(S)</text>
    <text x="560" y="580" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">Key Exam Tip!</text>
  </g>
</svg>