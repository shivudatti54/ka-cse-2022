<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers coordinate systems in computer graphics, including Cartesian, screen, and world coordinates with transformations for rendering 2D and 3D graphics.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Coordinates in Computer Graphics</text>
  </g>
  
  <g class="step" id="step1" data-narration="Three main coordinate systems exist: Cartesian uses x and y axes, screen coordinates place origin at top-left with Y downward, world coordinates define a virtual 3D scene.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Coordinate Systems</text>
    <rect x="40" y="88" width="220" height="45" rx="3" fill="#e3f2fd"/>
    <text x="50" y="102" font-family="Arial" font-size="9" fill="#1976d2">Cartesian (2D)</text>
    <text x="50" y="115" font-family="Arial" font-size="8" fill="#666">Origin (0,0), X right, Y up</text>
    <rect x="270" y="88" width="220" height="45" rx="3" fill="#e8f5e9"/>
    <text x="280" y="102" font-family="Arial" font-size="9" fill="#388e3c">Screen Coordinates</text>
    <text x="280" y="115" font-family="Arial" font-size="8" fill="#666">Origin top-left, Y downward</text>
    <rect x="500" y="88" width="220" height="45" rx="3" fill="#fff3e0"/>
    <text x="510" y="102" font-family="Arial" font-size="9" fill="#ff9800">World Coordinates</text>
    <text x="510" y="115" font-family="Arial" font-size="8" fill="#666">Right-handed 3D system</text>
  </g>
  
  <g class="step" id="step2" data-narration="Homogeneous coordinates extend 2D points to (x,y,1) and 3D to (x,y,z,1), enabling all geometric transformations as efficient matrix multiplications in pipeline stages.">
    <rect x="20" y="148" width="760" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Homogeneous Coordinates</text>
    <rect x="40" y="180" width="340" height="45" rx="3" fill="#f3e5f5"/>
    <text x="50" y="195" font-family="Arial" font-size="9" fill="#9c27b0">2D Point Conversion</text>
    <text x="50" y="210" font-family="Arial" font-size="8" fill="#666">(x, y) → (x, y, 1) in homogeneous form</text>
    <rect x="390" y="180" width="340" height="45" rx="3" fill="#f3e5f5"/>
    <text x="400" y="195" font-family="Arial" font-size="9" fill="#9c27b0">3D Point Conversion</text>
    <text x="400" y="210" font-family="Arial" font-size="8" fill="#666">(x, y, z) → (x, y, z, 1) in homogeneous form</text>
  </g>
  
  <g class="step" id="step3" data-narration="Translation moves points using a matrix with identity values and offset values in the last column. Scaling uses diagonal values for size changes.">
    <rect x="20" y="238" width="760" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="258" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Translation and Scaling Matrices</text>
    <rect x="40" y="270" width="340" height="45" rx="3" fill="#fff3e0"/>
    <text x="50" y="285" font-family="Arial" font-size="9" fill="#ff9800">Translation Matrix T(Tx,Ty,Tz)</text>
    <text x="50" y="300" font-family="Arial" font-size="8" fill="#666">|1 0 0 Tx| |0 1 0 Ty| |0 0 1 Tz| |0 0 0 1|</text>
    <rect x="390" y="270" width="340" height="45" rx="3" fill="#fff3e0"/>
    <text x="400" y="285" font-family="Arial" font-size="9" fill="#ff9800">Scaling Matrix S(Sx,Sy,Sz)</text>
    <text x="400" y="300" font-family="Arial" font-size="8" fill="#666">|Sx 0 0 0| |0 Sy 0 0| |0 0 Sz 0| |0 0 0 1|</text>
  </g>
  
  <g class="step" id="step4" data-narration="Rotation matrix uses cosine and sine functions. For 90 degrees counterclockwise, cos equals 0 and sin equals 1, transforming point (1,0) to (0,1).">
    <rect x="20" y="328" width="760" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="348" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Rotation Matrix (Z-axis 2D)</text>
    <rect x="40" y="360" width="500" height="45" rx="3" fill="#fff3e0"/>
    <text x="50" y="375" font-family="Arial" font-size="9" fill="#ff9800">2D Rotation Matrix R(θ)</text>
    <text x="50" y="390" font-family="Arial" font-size="8" fill="#666">|cosθ -sinθ 0| |sinθ cosθ 0| |0 0 1| - rotates θ degrees CCW</text>
    <rect x="550" y="360" width="180" height="45" rx="3" fill="#e8f5e9"/>
    <text x="560" y="375" font-family="Arial" font-size="9" fill="#388e3c">Example: 90° CCW</text>
    <text x="560" y="390" font-family="Arial" font-size="8" fill="#666">P(1,0) → P(0,1)</text>
  </g>
  
  <g class="step" id="step5" data-narration="The graphics pipeline progresses through five stages: Modeling coordinates define object geometry, then World, View, NDC, and finally Screen coordinates for display.">
    <rect x="20" y="418" width="760" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="438" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Coordinate Transformation Pipeline</text>
    <rect x="40" y="450" width="120" height="45" rx="3" fill="#e3f2fd"/>
    <text x="100" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Modeling</text>
    <line x1="160" y1="472" x2="185" y2="472" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="190" y="450" width="120" height="45" rx="3" fill="#e3f2fd"/>
    <text x="250" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">World</text>
    <line x1="310" y1="472" x2="335" y2="472" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="340" y="450" width="120" height="45" rx="3" fill="#e3f2fd"/>
    <text x="400" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">View/Camera</text>
    <line x1="460" y1="472" x2="485" y2="472" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="490" y="450" width="120" height="45" rx="3" fill="#e3f2fd"/>
    <text x="550" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">NDC</text>
    <line x1="610" y1="472" x2="635" y2="472" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="640" y="450" width="120" height="45" rx="3" fill="#e3f2fd"/>
    <text x="700" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Screen</text>
  </g>
  
  <g class="step" id="step6" data-narration="Exam tips: Remember screen Y increases downward, add 1 for homogeneous conversion, use right-hand rule for 3D, and apply transformations right to left in matrix multiplication.">
    <rect x="20" y="508" width="760" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="2"/>
    <text x="40" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips and Key Reminders</text>
    <rect x="40" y="540" width="160" height="45" rx="3" fill="#ffebee"/>
    <text x="50" y="555" font-family="Arial" font-size="8" fill="#f44336">Screen Coordinates</text>
    <text x="50" y="568" font-family="Arial" font-size="7" fill="#666">Origin top-left, Y downward</text>
    <rect x="210" y="540" width="160" height="45" rx="3" fill="#ffebee"/>
    <text x="220" y="555" font-family="Arial" font-size="8" fill="#f44336">Homogeneous Division</text>
    <text x="220" y="568" font-family="Arial" font-size="7" fill="#666">Divide by w after transformation</text>
    <rect x="380" y="540" width="160" height="45" rx="3" fill="#ffebee"/>
    <text x="390" y="555" font-family="Arial" font-size="8" fill="#f44336">Right-Hand Rule</text>
    <text x="390" y="568" font-family="Arial" font-size="7" fill="#666">Thumb=Z, Index=X, Middle=Y</text>
    <rect x="550" y="540" width="210" height="45" rx="3" fill="#ffebee"/>
    <text x="560" y="555" font-family="Arial" font-size="8" fill="#f44336">Transformation Order</text>
    <text x="560" y="568" font-family="Arial" font-size="7" fill="#666">Matrix multiplication not commutative; apply right to left</text>
  </g>
</svg>