<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about Row Space and Column Space, fundamental concepts in linear algebra with practical engineering applications in  exam.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Row Space and Column Space of a Matrix</text>
  </g>
  
  <g class="step" id="step1" data-narration="Row Space R(A) is all linear combinations of row vectors in R^n. Column Space C(A) is in R^m. Their dimensions are always equal.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Definitions</text>
    <rect x="40" y="92" width="220" height="36" fill="#e3f2fd" rx="3"/>
    <text x="50" y="108" font-family="Arial" font-size="11" fill="#1976d2">Row Space R(A)</text>
    <text x="50" y="122" font-family="Arial" font-size="10" fill="#333">span{r₁, r₂, ..., r_m} ⊂ ℝⁿ</text>
    <rect x="280" y="92" width="220" height="36" fill="#e8f5e9" rx="3"/>
    <text x="290" y="108" font-family="Arial" font-size="11" fill="#388e3c">Column Space C(A)</text>
    <text x="290" y="122" font-family="Arial" font-size="10" fill="#333">span{c₁, c₂, ..., c_n} ⊂ ℝᵐ</text>
    <text x="550" y="105" font-family="Arial" font-size="11" fill="#333">Key Result:</text>
    <text x="550" y="120" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">dim(Row) = dim(Col) = rank(A)</text>
  </g>
  
  <g class="step" id="step2" data-narration="To find Row Space, reduce matrix to RREF. The nonzero rows form the basis. Rank equals number of nonzero rows.">
    <rect x="20" y="146" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Finding Row Space</text>
    <text x="40" y="190" font-family="Arial" font-size="11" fill="#333">Step 1: Reduce to RREF</text>
    <text x="40" y="205" font-family="Arial" font-size="10" fill="#666">A → RREF using Gaussian elimination</text>
    <text x="250" y="190" font-family="Arial" font-size="11" fill="#333">Step 2: Basis</text>
    <text x="250" y="205" font-family="Arial" font-size="10" fill="#666">Nonzero rows of RREF = basis for R(A)</text>
    <text x="450" y="190" font-family="Arial" font-size="11" fill="#333">Rank</text>
    <text x="450" y="205" font-family="Arial" font-size="10" fill="#666">Number of nonzero rows</text>
    <rect x="450" y="215" width="120" height="16" fill="#fff3e0" rx="2"/>
    <text x="460" y="227" font-family="Arial" font-size="10" fill="#ff9800">rank(A) = r ≤ min(m,n)</text>
  </g>
  
  <g class="step" id="step3" data-narration="To find Column Space: identify pivot columns in RREF, then use corresponding columns from the ORIGINAL matrix for the basis.">
    <rect x="20" y="244" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="266" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Finding Column Space</text>
    <text x="40" y="288" font-family="Arial" font-size="11" fill="#333">Step 1: Find pivot columns in RREF</text>
    <text x="40" y="303" font-family="Arial" font-size="10" fill="#666">Identify leading 1s in RREF</text>
    <text x="280" y="288" font-family="Arial" font-size="11" fill="#333">Step 2: Take CORRESPONDING columns</text>
    <text x="280" y="303" font-family="Arial" font-size="10" fill="#666">from ORIGINAL matrix A</text>
    <rect x="520" y="275" width="240" height="40" fill="#ffebee" rx="3"/>
    <text x="530" y="292" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">⚠️ Common Mistake</text>
    <text x="530" y="306" font-family="Arial" font-size="9" fill="#333">Don't use RREF columns!</text>
    <text x="530" y="318" font-family="Arial" font-size="9" fill="#666">Use original A columns instead</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Rank-Nullity Theorem states rank plus nullity equals n. Nullity is the dimension of the solution space for Ax equals zero.">
    <rect x="20" y="332" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="354" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Rank-Nullity Theorem</text>
    <text x="40" y="380" font-family="Arial" font-size="13" fill="#333">For m×n matrix A:</text>
    <rect x="180" y="368" width="180" height="35" fill="#f3e5f5" rx="3"/>
    <text x="190" y="385" font-family="Arial" font-size="12" fill="#9c27b0">rank(A) + nullity(A) = n</text>
    <text x="230" y="402" font-family="Arial" font-size="10" fill="#666">dim(Row A) + dim(Null A) = n</text>
    <text x="420" y="380" font-family="Arial" font-size="11" fill="#333">where</text>
    <text x="420" y="398" font-family="Arial" font-size="10" fill="#333">nullity(A) = dim{N(A)} = n - rank(A)</text>
    <rect x="580" y="365" width="180" height="38" fill="#fff3e0" rx="3"/>
    <text x="590" y="380" font-family="Arial" font-size="10" fill="#333">Null Space N(A):</text>
    <text x="590" y="395" font-family="Arial" font-size="10" fill="#333">All solutions to Ax = 0</text>
    <text x="590" y="408" font-family="Arial" font-size="9" fill="#666">Subspace of ℝⁿ</text>
  </g>
  
  <g class="step" id="step5" data-narration="For matrix A, row space basis comes from RREF nonzero rows. Column space basis uses original matrix pivot columns to form a valid basis.">
    <rect x="20" y="420" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="442" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Example: A = [[1,2,1],[2,4,2],[1,1,2]]</text>
    <text x="40" y="470" font-family="Arial" font-size="10" fill="#333">RREF(A) = [[1,0,3],[0,1,-1],[0,0,0]]</text>
    <rect x="200" y="458" width="140" height="35" fill="#e3f2fd" rx="3"/>
    <text x="210" y="473" font-family="Arial" font-size="10" fill="#1976d2">Row Space Basis:</text>
    <text x="210" y="487" font-family="Arial" font-size="9" fill="#333">{[1,0,3], [0,1,-1]}</text>
    <rect x="360" y="458" width="160" height="35" fill="#e8f5e9" rx="3"/>
    <text x="370" y="473" font-family="Arial" font-size="10" fill="#388e3c">Column Space Basis:</text>
    <text x="370" y="487" font-family="Arial" font-size="9" fill="#333">{col₁, col₂} of original A</text>
    <rect x="540" y="458" width="200" height="35" fill="#fff3e0" rx="3"/>
    <text x="550" y="473" font-family="Arial" font-size="10" fill="#ff9800">Rank = 2, Nullity = 1</text>
    <text x="550" y="487" font-family="Arial" font-size="9" fill="#333">Verification: 2 + 1 = 3 ✓</text>
  </g>
  
  <g class="step" id="step6" data-narration="Null space is orthogonal to row space. Left null space is orthogonal to column space. This is fundamental in linear transformations.">
    <rect x="20" y="508" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="530" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Orthogonal Complements</text>
    <rect x="40" y="545" width="320" height="42" fill="#e3f2fd" rx="3"/>
    <text x="50" y="560" font-family="Arial" font-size="11" fill="#1976d2">Null Space = Row Space⊥</text>
    <text x="50" y="575" font-family="Arial" font-size="10" fill="#333">N(A) ⟂ R(A) in ℝⁿ</text>
    <text x="50" y="588" font-family="Arial" font-size="9" fill="#666">Every null space vector ⟂ every row</text>
    <rect x="380" y="545" width="320" height="42" fill="#e8f5e9" rx="3"/>
    <text x="390" y="560" font-family="Arial" font-size="11" fill="#388e3c">Left Null Space = Column Space⊥</text>
    <text x="390" y="575" font-family="Arial" font-size="10" fill="#333">N(Aᵀ) ⟂ C(A) in ℝᵐ</text>
    <text x="390" y="588" font-family="Arial" font-size="9" fill="#666">Null space of Aᵀ is orthogonal to column</text>
  </g>
</svg>