<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Rank-Nullity Theorem is a fundamental result in linear algebra relating the dimensions of kernel and range of linear transformations.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Rank-Nullity Theorem</text>
  </g>
  
  <g class="step" id="step1" data-narration="The kernel or null space of T contains all vectors mapping to zero. Its dimension is called nullity, representing free variables in Ax equals zero.">
    <rect x="30" y="58" width="740" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Kernel (Null Space)</text>
    <text x="50" y="94" font-family="Arial" font-size="10" fill="#333">ker(T) = {v ∈ V : T(v) = 0}</text>
    <text x="50" y="108" font-family="Arial" font-size="10" fill="#333">Dimension = nullity(T) = dim(ker(T))</text>
    <rect x="400" y="68" width="350" height="65" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="420" y="85" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Example</text>
    <text x="420" y="100" font-family="Arial" font-size="9" fill="#333">For Ax = 0 where A = [[1,2,3],[2,4,6]]</text>
    <text x="420" y="114" font-family="Arial" font-size="9" fill="#333">x + 2y + 3z = 0 has 2 free variables</text>
    <text x="420" y="128" font-family="Arial" font-size="9" fill="#333">⇒ nullity = 2</text>
  </g>
  
  <g class="step" id="step2" data-narration="The range or column space is the set of all output vectors. Its dimension is the rank, equal to linearly independent columns in the matrix.">
    <rect x="30" y="151" width="740" height="85" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="50" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Range (Column Space)</text>
    <text x="50" y="187" font-family="Arial" font-size="10" fill="#333">range(T) = {T(v) : v ∈ V}</text>
    <text x="50" y="201" font-family="Arial" font-size="10" fill="#333">Dimension = rank(T) = dim(range(T))</text>
    <rect x="400" y="161" width="350" height="65" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="420" y="178" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Example</text>
    <text x="420" y="193" font-family="Arial" font-size="9" fill="#333">For A = [[1,2,3],[2,4,6]], only row R₁ is non-zero</text>
    <text x="420" y="207" font-family="Arial" font-size="9" fill="#333">⇒ rank = 1 (one independent row)</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Rank-Nullity Theorem states that the domain dimension equals rank plus nullity. For an m×n matrix, n equals rank plus nullity.">
    <rect x="30" y="244" width="740" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="50" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Rank-Nullity Theorem</text>
    <text x="50" y="285" font-family="Arial" font-size="14" font-weight="bold" fill="#333">dim(V) = rank(T) + nullity(T)</text>
    <text x="50" y="305" font-family="Arial" font-size="12" fill="#333">For matrix A (m×n):</text>
    <text x="50" y="322" font-family="Arial" font-size="14" font-weight="bold" fill="#333">n = rank(A) + nullity(A)</text>
    <rect x="400" y="254" width="350" height="65" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="420" y="272" font-family="Arial" font-size="10" fill="#388e3c">Key: n = number of columns (domain dimension)</text>
    <text x="420" y="288" font-family="Arial" font-size="10" fill="#333">Common error: using rows instead of columns</text>
    <text x="420" y="304" font-family="Arial" font-size="10" fill="#f44336">Must equal columns, not rows!</text>
  </g>
  
  <g class="step" id="step4" data-narration="Using the theorem: for a 3×3 matrix with rank 1, nullity equals 3 minus 1, giving nullity equals 2. This verifies our calculation.">
    <rect x="30" y="337" width="740" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="50" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Verification Example</text>
    <text x="50" y="377" font-family="Arial" font-size="10" fill="#333">Matrix A = [[1,2,3],[2,4,6],[1,2,3]] → rank = 1 (row reduction)</text>
    <text x="50" y="395" font-family="Arial" font-size="10" fill="#333">n = 3 columns</text>
    <text x="50" y="413" font-family="Arial" font-size="12" font-weight="bold" fill="#333">nullity = n - rank = 3 - 1 = 2</text>
    <rect x="300" y="347" width="450" height="65" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="320" y="368" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Check: rank + nullity = 1 + 2 = 3 = n ✓</text>
    <text x="320" y="388" font-family="Arial" font-size="10" fill="#333">Solution space: x + 2y + 3z = 0 has 2 free vars</text>
  </g>
  
  <g class="step" id="step5" data-narration="For systems Ax equals b, rank determines solution existence while nullity determines solution count. Infinite solutions occur when nullity exceeds zero.">
    <rect x="30" y="430" width="740" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="50" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Application to Linear Systems</text>
    <text x="50" y="470" font-family="Arial" font-size="10" fill="#333">System Ax = b consistency: rank(A) = rank([A|b])</text>
    <text x="50" y="488" font-family="Arial" font-size="10" fill="#333">Unique solution: rank(A) = rank([A|b]) = n</text>
    <text x="50" y="506" font-family="Arial" font-size="10" fill="#333">Infinite solutions: rank(A) = rank([A|b]) &lt; n</text>
    <rect x="380" y="440" width="370" height="65" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Example: x+y+z=3, 2x+2y+2z=6</text>
    <text x="400" y="478" font-family="Arial" font-size="10" fill="#333">rank = 1, variables = 3</text>
    <text x="400" y="496" font-family="Arial" font-size="10" fill="#333">nullity = 3-1 = 2 ⇒ infinite solutions</text>
  </g>
  
  <g class="step" id="step6" data-narration="Full rank matrices have zero nullity, meaning only trivial solution exists. They are invertible, a key property for solving linear systems.">
    <rect x="30" y="523" width="740" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="50" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Full Rank Matrix Properties</text>
    <text x="50" y="565" font-family="Arial" font-size="10" fill="#333">Full rank (rank = n) ⇒ nullity = 0, Ax = 0 has only trivial solution</text>
    <text x="50" y="580" font-family="Arial" font-size="10" fill="#333">Full rank square matrix ⇒ invertible (determinant ≠ 0)</text>
    <rect x="400" y="533" width="350" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="420" y="550" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Always verify: rank + nullity = columns</text>
    <text x="420" y="566" font-family="Arial" font-size="10" fill="#333">This is your built-in answer check!</text>
  </g>
</svg>