<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Invertible Linear Transformations. Today we explore what makes a linear transformation reversible, and learn about the conditions that guarantee an inverse exists.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Invertible Linear Transformations</text>
  </g>
  
  <g class="step" id="step1" data-narration="A linear transformation T maps vectors between vector spaces, satisfying two key properties: T of a sum equals sum of T values, and T of a scaled vector equals scaled T value for all vectors.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Linear Transformation Definition</text>
    <rect x="40" y="88" width="340" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#333">T: V → W satisfies:</text>
    <text x="50" y="116" font-family="Arial" font-size="10" fill="#333">1. T(u + v) = T(u) + T(v)</text>
    <text x="50" y="128" font-family="Arial" font-size="10" fill="#333">2. T(αv) = αT(v)</text>
    <rect x="400" y="88" width="360" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="410" y="102" font-family="Arial" font-size="10" fill="#333">Example: T(x,y) = (2x+y, x-y)</text>
    <text x="410" y="116" font-family="Arial" font-size="10" fill="#333">Matrix: [[2,1],[1,-1]]</text>
    <text x="410" y="128" font-family="Arial" font-size="10" fill="#333">Maps R² → R²</text>
  </g>
  
  <g class="step" id="step2" data-narration="An inverse transformation T superscript negative one exists when T is bijective, meaning it is both one-to-one and onto, satisfying composition identities for all vectors in the domain and codomain.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Inverse Transformation</text>
    <rect x="40" y="176" width="230" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="190" font-family="Arial" font-size="10" fill="#333">T is invertible if ∃ S: W→V</text>
    <text x="50" y="204" font-family="Arial" font-size="10" fill="#333">with S(T(v)) = v and T(S(w)) = w</text>
    <rect x="290" y="176" width="230" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="300" y="190" font-family="Arial" font-size="10" fill="#333">Notation: S = T⁻¹</text>
    <text x="300" y="204" font-family="Arial" font-size="10" fill="#333">Inverse is UNIQUE when exists</text>
    <rect x="540" y="176" width="220" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="550" y="190" font-family="Arial" font-size="10" fill="#333">Bijective = One-to-one</text>
    <text x="550" y="204" font-family="Arial" font-size="10" fill="#333">AND Onto</text>
  </g>
  
  <g class="step" id="step3" data-narration="For finite-dimensional spaces, T is invertible if and only if kernel equals zero vector, rank equals full dimension, or equivalently T is injective meaning it preserves distinct inputs.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Characterizations of Invertibility</text>
    <rect x="40" y="264" width="175" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="50" y="278" font-family="Arial" font-size="9" fill="#333">T is ONE-TO-ONE</text>
    <text x="50" y="290" font-family="Arial" font-size="9" fill="#333">T(u)=T(v) ⇒ u=v</text>
    <text x="50" y="302" font-family="Arial" font-size="9" fill="#333">Ker(T) = {0}</text>
    <rect x="225" y="264" width="175" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="235" y="278" font-family="Arial" font-size="9" fill="#333">T is ONTO</text>
    <text x="235" y="290" font-family="Arial" font-size="9" fill="#333">Im(T) = W</text>
    <text x="235" y="302" font-family="Arial" font-size="9" fill="#333">Every w∈W has preimage</text>
    <rect x="410" y="264" width="175" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="420" y="278" font-family="Arial" font-size="9" fill="#333">RANK-NULLITY</text>
    <text x="420" y="290" font-family="Arial" font-size="9" fill="#333">dim(Ker) + dim(Im) = dim(V)</text>
    <text x="420" y="302" font-family="Arial" font-size="9" fill="#333">If invertible: dim(Im)=dim(V)</text>
    <rect x="595" y="264" width="165" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="605" y="278" font-family="Arial" font-size="9" fill="#333">BASIS MAPPING</text>
    <text x="605" y="290" font-family="Arial" font-size="9" fill="#333">T(basis of V) = basis of W</text>
    <text x="605" y="302" font-family="Arial" font-size="9" fill="#333">iff T is invertible</text>
  </g>
  
  <g class="step" id="step4" data-narration="A linear transformation on real n-dimensional space is invertible if and only if its matrix representation has non-zero determinant. The inverse transformation uses the matrix inverse to recover original vectors.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Matrix Representation &amp; Invertibility</text>
    <rect x="40" y="352" width="230" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="50" y="366" font-family="Arial" font-size="10" fill="#333">T(x) = Ax where A is m×n</text>
    <text x="50" y="380" font-family="Arial" font-size="10" fill="#333">If m=n (square), check det(A)</text>
    <rect x="290" y="352" width="230" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="300" y="366" font-family="Arial" font-size="10" fill="#333">T invertible ⇔ det(A) ≠ 0</text>
    <text x="300" y="380" font-family="Arial" font-size="10" fill="#333">A is non-singular</text>
    <rect x="540" y="352" width="220" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="550" y="366" font-family="Arial" font-size="10" fill="#333">If A invertible:</text>
    <text x="550" y="380" font-family="Arial" font-size="10" fill="#333">T⁻¹(y) = A⁻¹y</text>
    <line x1="200" y1="373" x2="280" y2="373" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="370" y1="373" x2="530" y2="373" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
  </g>
  
  <g class="step" id="step5" data-narration="Key properties include: the inverse of a composition reverses the order of operations, so the inverse of S times T equals T inverse times S inverse, and invertible transformations always preserve dimension of the underlying vector space.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Properties of Inverse Transformations</text>
    <rect x="40" y="440" width="220" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="454" font-family="Arial" font-size="10" fill="#333">(S ∘ T)⁻¹ = T⁻¹ ∘ S⁻¹</text>
    <text x="50" y="468" font-family="Arial" font-size="9" fill="#666">Order REVERSES!</text>
    <rect x="280" y="440" width="150" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="290" y="454" font-family="Arial" font-size="10" fill="#333">(T⁻¹)⁻¹ = T</text>
    <text x="290" y="468" font-family="Arial" font-size="9" fill="#666">Inverse of inverse</text>
    <rect x="450" y="440" width="150" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="460" y="454" font-family="Arial" font-size="10" fill="#333">(αT)⁻¹ = (1/α)T⁻¹</text>
    <text x="460" y="468" font-family="Arial" font-size="9" fill="#666">Scalar multiple</text>
    <rect x="620" y="440" width="140" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="630" y="454" font-family="Arial" font-size="10" fill="#333">dim(V) = dim(W)</text>
    <text x="630" y="468" font-family="Arial" font-size="9" fill="#666">Preserves dimension</text>
  </g>
  
  <g class="step" id="step6" data-narration="For T(x,y) = (2x+y, x-y), matrix A has det = -3, so T inverse of a and b equals a plus b over three and a minus two b over three.">
    <rect x="20" y="498" width="760" height="90" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example: Finding T⁻¹</text>
    <rect x="40" y="528" width="350" height="52" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="542" font-family="Arial" font-size="10" fill="#333">T(x,y) = (2x+y, x-y)</text>
    <text x="50" y="556" font-family="Arial" font-size="10" fill="#333">Matrix A = [[2,1],[1,-1]]</text>
    <text x="50" y="570" font-family="Arial" font-size="10" fill="#333">det(A) = 2(-1) - 1(1) = -3 ≠ 0</text>
    <rect x="410" y="528" width="350" height="52" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="420" y="542" font-family="Arial" font-size="10" fill="#333">A⁻¹ = (1/-3)×[[-1,-1],[-1,2]]</text>
    <text x="420" y="556" font-family="Arial" font-size="10" fill="#333">A⁻¹ = [[1/3,1/3],[1/3,-2/3]]</text>
    <text x="420" y="570" font-family="Arial" font-size="10" fill="#333">T⁻¹(a,b) = ((a+b)/3, (a-2b)/3)</text>
  </g>
</svg>