<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome! Today we explore kernel and image of linear transformations, key concepts in linear algebra with applications in engineering and data science.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Kernel and Image of a Linear Transformation</text>
  </g>
  
  <!-- step1: Overview -->
  <g class="step" id="step1" data-narration="A linear transformation T maps vectors from domain V to codomain W. The kernel contains inputs mapping to zero; the image contains all possible outputs.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Linear Transformation T: V → W</text>
    <rect x="40" y="88" width="200" height="40" fill="#e3f2fd" rx="3"/>
    <text x="140" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">Domain V</text>
    <text x="140" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(input space)</text>
    <path d="M260,108 L340,108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="300" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">T</text>
    <rect x="360" y="88" width="200" height="40" fill="#fff3e0" rx="3"/>
    <text x="460" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800">Codomain W</text>
    <text x="460" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(output space)</text>
  </g>
  
  <!-- step2: Kernel Definition -->
  <g class="step" id="step2" data-narration="The kernel (or null space) Ker(T) is all vectors in V mapping to zero in W. It reveals information lost during transformation.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Kernel (Null Space) - Ker(T)</text>
    <text x="40" y="186" font-family="Arial" font-size="11" fill="#333">Ker(T) = {v ∈ V : T(v) = 0}</text>
    <rect x="40" y="198" width="340" height="20" fill="#e8f5e9" rx="3"/>
    <text x="210" y="213" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Subspace of Domain V</text>
    <text x="420" y="186" font-family="Arial" font-size="10" fill="#666">• Always contains zero vector</text>
    <text x="420" y="202" font-family="Arial" font-size="10" fill="#666">• If u,v ∈ Ker(T), then u+v ∈ Ker(T)</text>
    <text x="420" y="218" font-family="Arial" font-size="10" fill="#666">• Dimension = nullity(T)</text>
  </g>
  
  <!-- step3: Image Definition -->
  <g class="step" id="step3" data-narration="The image (or range) Im(T) represents all outputs obtainable from T. It shows what the transformation can actually produce across the entire codomain W.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Image (Range) - Im(T)</text>
    <text x="40" y="274" font-family="Arial" font-size="11" fill="#333">Im(T) = {w ∈ W : w = T(v) for some v ∈ V}</text>
    <rect x="40" y="286" width="340" height="20" fill="#fff3e0" rx="3"/>
    <text x="210" y="301" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Subspace of Codomain W</text>
    <text x="420" y="274" font-family="Arial" font-size="10" fill="#666">• Always contains zero vector</text>
    <text x="420" y="290" font-family="Arial" font-size="10" fill="#666">• If w₁,w₂ ∈ Im(T), then w₁+w₂ ∈ Im(T)</text>
    <text x="420" y="306" font-family="Arial" font-size="10" fill="#666">• Dimension = rank(T)</text>
  </g>
  
  <!-- step4: Rank-Nullity Theorem -->
  <g class="step" id="step4" data-narration="The Rank-Nullity Theorem states: dim(V) = nullity(T) + rank(T). This fundamental relationship connects kernel and image dimensions, revealing structural properties of linear transformations between vector spaces.">
    <rect x="20" y="322" width="760" height="97" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Rank-Nullity Theorem</text>
    <rect x="40" y="355" width="500" height="35" fill="#f3e5f5" rx="5"/>
    <text x="290" y="378" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">dim(V) = nullity(T) + rank(T)</text>
    <text x="560" y="362" font-family="Arial" font-size="10" fill="#666">For T: V → W</text>
    <text x="560" y="378" font-family="Arial" font-size="10" fill="#666">V is finite-dimensional</text>
    <text x="40" y="412" font-family="Arial" font-size="10" fill="#666">Example: If T: ℝ⁴ → ℝ³ has rank 2, then nullity = 4 - 2 = 2</text>
  </g>
  
  <!-- step5: One-to-One and Onto -->
  <g class="step" id="step5" data-narration="A transformation is one-to-one iff kernel equals only zero (nullity zero). It is onto iff image equals codomain (rank equals codomain dimension).">
    <rect x="20" y="427" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="447" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">One-to-One and Onto</text>
    <rect x="40" y="462" width="220" height="35" fill="#ffebee" rx="3"/>
    <text x="150" y="479" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">One-to-One (Injective)</text>
    <text x="150" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Ker(T) = {0}</text>
    <rect x="280" y="462" width="220" height="35" fill="#e3f2fd" rx="3"/>
    <text x="390" y="479" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Onto (Surjective)</text>
    <text x="390" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Im(T) = W</text>
    <rect x="520" y="462" width="240" height="35" fill="#e8f5e9" rx="3"/>
    <text x="640" y="479" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Isomorphism</text>
    <text x="640" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Both one-to-one AND onto</text>
  </g>
  
  <!-- step6: Summary -->
  <g class="step" id="step6" data-narration="Remember: kernel is in domain (solves Ax=0), image is column space of A. Use rank-nullity to check your answers: domain dimension equals rank plus nullity.">
    <rect x="20" y="515" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="535" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Takeaways</text>
    <text x="40" y="555" font-family="Arial" font-size="10" fill="#333">• For matrix A: Kernel = null space of A (solutions to Ax = 0)</text>
    <text x="40" y="571" font-family="Arial" font-size="10" fill="#333">• For matrix A: Image = column space of A (span of columns)</text>
    <text x="40" y="587" font-family="Arial" font-size="10" fill="#333">• Rank = number of pivot columns; Nullity = n - rank(A)</text>
    <text x="400" y="555" font-family="Arial" font-size="10" fill="#666">Always verify:</text>
    <text x="400" y="571" font-family="Arial" font-size="10" fill="#666">dim(domain) = rank + nullity</text>
    <text x="400" y="587" font-family="Arial" font-size="10" fill="#666">This is the Rank-Nullity Theorem!</text>
  </g>
</svg>