<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on Singular and Non-Singular Linear Transformations, important key concepts in linear algebra for engineering students to understand.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Singular and Non-Singular Linear Transformations</text>
  </g>
  
  <g class="step" id="step1" data-narration="A linear transformation T maps vectors between spaces, preserving both vector addition and scalar multiplication operations, so T(u+v) equals T(u)+T(v).">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="5"/>
    <text x="30" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Linear Transformation Definition</text>
    <text x="30" y="92" font-family="Arial" font-size="10" fill="#333">T: V → W is linear if for all u,v ∈ V and scalar c:</text>
    <rect x="30" y="100" width="340" height="30" fill="#ffffff" stroke="#1976d2" rx="3"/>
    <text x="40" y="113" font-family="Arial" font-size="10" fill="#333">T(u + v) = T(u) + T(v)</text>
    <text x="200" y="113" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">(Additivity)</text>
    <rect x="380" y="100" width="340" height="30" fill="#ffffff" stroke="#1976d2" rx="3"/>
    <text x="390" y="113" font-family="Arial" font-size="10" fill="#333">T(cv) = c·T(v)</text>
    <text x="540" y="113" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">(Homogeneity)</text>
  </g>
  
  <g class="step" id="step2" data-narration="The kernel, or null space, consists of all input vectors that map to zero under transformation T, while the range contains all possible output vectors resulting from T.">
    <rect x="10" y="146" width="780" height="80" fill="#e8f5e9" rx="5"/>
    <text x="30" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Kernel (Null Space) and Range (Image)</text>
    <rect x="30" y="175" width="350" height="45" fill="#c8e6c9" rx="3"/>
    <text x="40" y="188" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Kernel (Ker T)</text>
    <text x="40" y="202" font-family="Arial" font-size="9" fill="#333">{v ∈ V : T(v) = 0}</text>
    <text x="40" y="214" font-family="Arial" font-size="9" fill="#555">Subspace of V</text>
    <rect x="420" y="175" width="350" height="45" fill="#c8e6c9" rx="3"/>
    <text x="430" y="188" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Range (Image)</text>
    <text x="430" y="202" font-family="Arial" font-size="9" fill="#333">{w ∈ W : w = T(v) for some v∈V}</text>
    <text x="430" y="214" font-family="Arial" font-size="9" fill="#555">Subspace of W</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Rank-Nullity Theorem states that kernel dimension plus range dimension equals domain dimension: dim(Ker T) + dim(Range T) = dim(V).">
    <rect x="10" y="234" width="780" height="80" fill="#fff3e0" rx="5"/>
    <text x="30" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#f57c00">Rank-Nullity Theorem</text>
    <text x="30" y="270" font-family="Arial" font-size="11" fill="#333">For T: V → W with V finite-dimensional:</text>
    <rect x="30" y="280" width="740" height="28" fill="#ffe0b2" rx="3"/>
    <text x="400" y="298" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">dim(Ker T) + dim(Range T) = dim(V)</text>
    <text x="200" y="310" font-family="Arial" font-size="9" fill="#555">nullity</text>
    <text x="600" y="310" font-family="Arial" font-size="9" fill="#555">rank</text>
  </g>
  
  <g class="step" id="step4" data-narration="A singular transformation fails to be one-to-one because its kernel contains non-zero vectors, and when represented as a matrix, its determinant equals zero.">
    <rect x="10" y="322" width="780" height="80" fill="#f3e5f5" rx="5"/>
    <text x="30" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Singular (Non-Invertible) Transformation</text>
    <rect x="30" y="352" width="240" height="45" fill="#e1bee7" rx="3"/>
    <text x="40" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Key Properties</text>
    <text x="40" y="380" font-family="Arial" font-size="9" fill="#333">• Not one-to-one</text>
    <text x="40" y="392" font-family="Arial" font-size="9" fill="#333">• Ker(T) contains non-zero vectors</text>
    <rect x="280" y="352" width="240" height="45" fill="#e1bee7" rx="3"/>
    <text x="290" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Determinant Test</text>
    <text x="290" y="382" font-family="Arial" font-size="10" fill="#333">For matrix A:</text>
    <text x="290" y="394" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">|A| = 0 → Singular</text>
    <rect x="530" y="352" width="240" height="45" fill="#e1bee7" rx="3"/>
    <text x="540" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">No Inverse Exists</text>
    <text x="540" y="380" font-family="Arial" font-size="9" fill="#333">• Cannot recover original</text>
    <text x="540" y="392" font-family="Arial" font-size="9" fill="#333">• Rank less than dim(V)</text>
  </g>
  
  <g class="step" id="step5" data-narration="A non-singular transformation is one-to-one with only the zero vector in its kernel; when expressed as a matrix, its determinant is non-zero, and an inverse transformation exists.">
    <rect x="10" y="410" width="780" height="80" fill="#e3f2fd" rx="5"/>
    <text x="30" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Non-Singular (Invertible) Transformation</text>
    <rect x="30" y="440" width="240" height="45" fill="#bbdefb" rx="3"/>
    <text x="40" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Key Properties</text>
    <text x="40" y="468" font-family="Arial" font-size="9" fill="#333">• One-to-one (injective)</text>
    <text x="40" y="480" font-family="Arial" font-size="9" fill="#333">• Ker(T) = {0} only</text>
    <rect x="280" y="440" width="240" height="45" fill="#bbdefb" rx="3"/>
    <text x="290" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Determinant Test</text>
    <text x="290" y="470" font-family="Arial" font-size="10" fill="#333">For matrix A:</text>
    <text x="290" y="482" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">|A| ≠ 0 → Non-Singular</text>
    <rect x="530" y="440" width="240" height="45" fill="#bbdefb" rx="3"/>
    <text x="540" y="453" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Inverse Exists</text>
    <text x="540" y="468" font-family="Arial" font-size="9" fill="#333">• T⁻¹ exists such that</text>
    <text x="540" y="480" font-family="Arial" font-size="9" fill="#333">• T⁻¹(T(v)) = v for all v</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: T(x,y) = (2x+y, x-y) has matrix with det = -3, so T is non-singular with inverse T⁻¹(a,b) = ((-a-b)/3, (-a+2b)/3).">
    <rect x="10" y="498" width="780" height="90" fill="#ffebee" rx="5"/>
    <text x="30" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Example: Classify T: R² → R² defined by T(x,y) = (2x + y, x - y)</text>
    <rect x="30" y="525" width="180" height="55" fill="#ffcdd2" rx="3"/>
    <text x="40" y="538" font-family="Arial" font-size="9" fill="#333">Matrix form:</text>
    <text x="40" y="550" font-family="Arial" font-size="10" fill="#333">A = [[2, 1], [1, -1]]</text>
    <text x="40" y="562" font-family="Arial" font-size="9" fill="#333">det(A) = 2(-1) - 1(1) = -3</text>
    <text x="40" y="574" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Since det(A) ≠ 0 → Non-Singular</text>
    <rect x="220" y="525" width="280" height="55" fill="#ffcdd2" rx="3"/>
    <text x="230" y="538" font-family="Arial" font-size="9" fill="#333">Inverse transformation:</text>
    <text x="230" y="550" font-family="Arial" font-size="10" fill="#333">A⁻¹ = (1/3)[[-1, -1], [-1, 2]]</text>
    <text x="230" y="562" font-family="Arial" font-size="9" fill="#333">T⁻¹(a,b) = ((-a-b)/3, (-a+2b)/3)</text>
    <rect x="510" y="525" width="270" height="55" fill="#e8f5e9" rx="3"/>
    <text x="520" y="540" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Quick Summary</text>
    <text x="520" y="555" font-family="Arial" font-size="9" fill="#333">|A| = 0 → Singular (no inverse)</text>
    <text x="520" y="567" font-family="Arial" font-size="9" fill="#333">|A| ≠ 0 → Non-Singular (has inverse)</text>
    <text x="520" y="579" font-family="Arial" font-size="9" fill="#333">Nullity &gt; 0 → Singular</text>
  </g>
</svg>