<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Matrix Representation of Linear Transformations. We'll explore how matrices encode linear transformations between vector spaces and their key properties.">
    <rect x="20" y="10" width="760" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Matrix Representation of Linear Transformations</text>
  </g>
  
  <!-- step1: Definition of Linear Transformation -->
  <g class="step" id="step1" data-narration="A linear transformation T preserves vector addition and scalar multiplication. It satisfies T(u+v) equals T(u)+T(v), and T(cu) equals c times T(u).">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">1. Linear Transformation Definition</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">T: V → W is linear if for all u,v∈V, c∈ℝ:</text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#333">• Additivity: T(u + v) = T(u) + T(v)</text>
    <text x="40" y="132" font-family="Arial" font-size="11" fill="#333">• Homogeneity: T(cu) = cT(u)</text>
  </g>
  
  <!-- step2: Matrix Representation Theorem -->
  <g class="step" id="step2" data-narration="The fundamental theorem states every linear transformation has a matrix representation. The j-th column equals the image of the j-th basis vector.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">2. Matrix Representation Theorem</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#333">For T: ℝⁿ → ℝᵐ with standard basis {e₁,...,eₙ}:</text>
    <text x="40" y="205" font-family="Arial" font-size="12" fill="#333">[T] = [T(e₁)  T(e₂)  ...  T(eₙ)]  ← columns are basis images</text>
    <text x="40" y="225" font-family="Arial" font-size="11" fill="#333">For any x∈ℝⁿ: T(x) = [T]x  (matrix multiplication)</text>
  </g>
  
  <!-- step3: Example Finding Matrix -->
  <g class="step" id="step3" data-narration="Let's find the matrix for T(x,y) = (2x+y, x-3y). Apply T to basis vectors e1=(1,0) and e2=(0,1) to get the columns.">
    <rect x="20" y="234" width="760" height="93" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">3. Example: T(x,y) = (2x + y, x - 3y)</text>
    <text x="40" y="276" font-family="Arial" font-size="11" fill="#333">T(e₁)=T(1,0)=(2,1) → column [2,1]ᵀ</text>
    <text x="40" y="292" font-family="Arial" font-size="11" fill="#333">T(e₂)=T(0,1)=(1,-3) → column [1,-3]ᵀ</text>
    <text x="300" y="276" font-family="Arial" font-size="14" fill="#333">A =</text>
    <rect x="330" y="256" width="50" height="50" fill="white" stroke="#9c27b0" stroke-width="2"/>
    <text x="355" y="275" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">2</text>
    <text x="355" y="290" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1</text>
    <text x="355" y="305" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1</text>
    <text x="355" y="320" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">-3</text>
  </g>
  
  <!-- step4: Composition Property -->
  <g class="step" id="step4" data-narration="Matrix multiplication corresponds to composing linear transformations. The matrix of S∘T equals the matrix product of S times T, preserving the order of operations.">
    <rect x="20" y="335" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="357" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">4. Composition: [S ∘ T] = [S][T]</text>
    <text x="40" y="377" font-family="Arial" font-size="11" fill="#333">If S: ℝᵐ→ℝᵏ and T: ℝⁿ→ℝᵐ, then for any x:</text>
    <text x="40" y="395" font-family="Arial" font-size="12" fill="#333">(S ∘ T)(x) = S(T(x)) = [S][T]x</text>
    <text x="280" y="395" font-family="Arial" font-size="11" fill="#f44336">← inner transformation is rightmost matrix</text>
    <text x="40" y="413" font-family="Arial" font-size="11" fill="#333">Example: If T has matrix A and S has matrix B, then S∘T has matrix BA</text>
  </g>
  
  <!-- step5: Change of Basis -->
  <g class="step" id="step5" data-narration="To change basis, use the formula: new matrix equals P inverse times old matrix times P, where P is the change of basis matrix.">
    <rect x="20" y="423" width="760" height="89" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="445" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">5. Change of Basis</text>
    <text x="40" y="465" font-family="Arial" font-size="11" fill="#333">If P = [I]ᵇᵇ' is the change-of-basis matrix from B to B':</text>
    <text x="40" y="485" font-family="Arial" font-size="13" fill="#333">[T]ᵇ'ᵇ' = P⁻¹ [T]ᵇᵇ P</text>
    <text x="260" y="485" font-family="Arial" font-size="11" fill="#666">(transform matrix to new basis)</text>
    <text x="40" y="508" font-family="Arial" font-size="11" fill="#333">Non-std bases: j-th column = coords of T(vⱼ) in new basis</text>
  </g>
  
  <!-- step6: Key Properties Summary -->
  <g class="step" id="step6" data-narration="Key properties: Kernel equals null space of matrix, image equals column space. Dimension rule: domain dimension is columns, codomain dimension is rows.">
    <rect x="20" y="520" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="542" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">6. Key Properties &amp; Exam Tips</text>
    <text x="40" y="562" font-family="Arial" font-size="11" fill="#333">• Kernel(T) = Null([T]); Image(T) = Col([T])</text>
    <text x="40" y="578" font-family="Arial" font-size="11" fill="#333">• T: ℝⁿ→ℝᵐ → matrix m×n (rows=codim, cols=dom)</text>
    <text x="40" y="594" font-family="Arial" font-size="11" fill="#333">• Verify linearity first; test with sample vector</text>
  </g>
</svg>