<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers linear transformations in R2, mapping vectors to vectors while preserving vector addition and scalar multiplication fundamentally in 2D space.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Geometric Linear Transformation of R2</text>
  </g>
  
  <g class="step" id="step1" data-narration="A linear transformation T maps R2 to R2 and must satisfy additivity T(u+v)=T(u)+T(v) and homogeneity T(cv)=cT(v), ensuring all linearity conditions hold true.">
    <rect x="20" y="58" width="760" height="95" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Definition of Linear Transformation</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">A function T: R2 → R2 is linear if for all u,v∈R2 and c∈R:</text>
    <text x="40" y="118" font-family="Arial" font-size="10" fill="#333">1. T(u + v) = T(u) + T(v)  <tspan fill="#1976d2">Additivity</tspan></text>
    <text x="40" y="133" font-family="Arial" font-size="10" fill="#333">2. T(cu) = cT(u)  <tspan fill="#1976d2">Homogeneity</tspan></text>
    <text x="40" y="148" font-family="Arial" font-size="9" fill="#666">Implies: T(0)=0, T(-v)=-T(v)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Every linear transformation corresponds to a 2x2 matrix A where T(v)=Av. The columns are images of basis vectors e1 and e2.">
    <rect x="20" y="161" width="760" height="95" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="183" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Matrix Representation</text>
    <text x="40" y="203" font-family="Arial" font-size="10" fill="#333">For T(e1)=(a,c), T(e2)=(b,d): Matrix A = [a b; c d]</text>
    <text x="40" y="221" font-family="Arial" font-size="10" fill="#333">Apply to vector (x,y): T(x,y) = [ax+by; cx+dy]</text>
    <text x="300" y="203" font-family="Arial" font-size="11" fill="#388e3c" font-weight="bold">Example:</text>
    <text x="300" y="221" font-family="Arial" font-size="10" fill="#333">Rotation 90°: R(90°) = [0 -1; 1 0]</text>
    <text x="300" y="238" font-family="Arial" font-size="10" fill="#333">Scaling by 2: S(2,3) = [2 0; 0 3]</text>
    <text x="300" y="255" font-family="Arial" font-size="10" fill="#333">Shear x-axis k=1: [1 1; 0 1]</text>
  </g>
  
  <g class="step" id="step3" data-narration="Key transformations include Rotation R(θ), Scaling S(sx,sy), Shear Sh(k), Reflection, and Projection. Each has a specific 2x2 matrix form used for computation in linear algebra applications.">
    <rect x="20" y="264" width="760" height="95" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="286" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Types of Geometric Transformations</text>
    <text x="40" y="306" font-family="Arial" font-size="10" fill="#333">Rotation R(θ): [cosθ -sinθ; sinθ cosθ]</text>
    <text x="40" y="326" font-family="Arial" font-size="10" fill="#333">Scaling S(sx,sy): [sx 0; 0 sy]</text>
    <text x="40" y="346" font-family="Arial" font-size="10" fill="#333">Shear horizontal: [1 k; 0 1] | vertical: [1 0; k 1]</text>
    <text x="320" y="306" font-family="Arial" font-size="10" fill="#333">Reflection x-axis: [1 0; 0 -1]</text>
    <text x="320" y="326" font-family="Arial" font-size="10" fill="#333">Reflection y=x: [0 1; 1 0]</text>
    <text x="320" y="346" font-family="Arial" font-size="10" fill="#333">Projection x-axis: [1 0; 0 0]</text>
    <text x="550" y="306" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">det > 0: preserves orientation</text>
    <text x="550" y="326" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">det < 0: reverses orientation</text>
    <text x="550" y="346" font-family="Arial" font-size="10" font-weight="bold" fill="#666">det = 0: singular (collapses dimension)</text>
  </g>
  
  <g class="step" id="step4" data-narration="To compose transformations, multiply matrices in reverse order carefully. T2 followed by T1 corresponds to matrix M1 multiplied by M2, and matrix multiplication order always matters significantly.">
    <rect x="20" y="367" width="760" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="389" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Composition of Transformations</text>
    <text x="40" y="409" font-family="Arial" font-size="10" fill="#333">For transformations T1 (matrix A) then T2 (matrix B): combined = B × A</text>
    <text x="40" y="429" font-family="Arial" font-size="10" fill="#333">Matrix multiplication is non-commutative: order matters!</text>
    <text x="40" y="449" font-family="Arial" font-size="9" fill="#666">Example: Rotate 45° then scale by 2 → Matrix: [2 0; 0 2] × R(45°)</text>
    <line x1="320" y1="395" x2="720" y2="395" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="330" y="415" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Inverse Transformations</text>
    <text x="330" y="435" font-family="Arial" font-size="10" fill="#333">R(θ)⁻¹ = R(-θ) = R(θ)ᵀ</text>
    <text x="330" y="453" font-family="Arial" font-size="10" fill="#333">S(sx,sy)⁻¹ = S(1/sx, 1/sy)</text>
    <text x="520" y="435" font-family="Arial" font-size="9" fill="#666">A is invertible iff det(A) ≠ 0</text>
  </g>
  
  <g class="step" id="step5" data-narration="Eigenvectors are directions unchanged by transformation, scaled by eigenvalues for analysis. They reveal the fundamental invariant directions of the transformation in linear algebra applications.">
    <rect x="20" y="470" width="760" height="118" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="492" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Eigenvalues and Eigenvectors</text>
    <text x="40" y="512" font-family="Arial" font-size="10" fill="#333">For matrix A: Av = λv where v ≠ 0 is eigenvector, λ is eigenvalue</text>
    <text x="40" y="532" font-family="Arial" font-size="10" fill="#333">Geometric meaning: eigenvectors are directions that remain invariant (scaled by λ)</text>
    <text x="40" y="552" font-family="Arial" font-size="10" fill="#333">λ = 1: direction unchanged | λ = -1: direction reversed | λ = 0: collapses to origin</text>
    <text x="40" y="572" font-family="Arial" font-size="9" fill="#666">Find eigenvalues from det(A - λI) = 0</text>
    <line x1="320" y1="498" x2="750" y2="498" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/>
    <text x="330" y="518" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Key Formulas</text>
    <text x="330" y="538" font-family="Arial" font-size="10" fill="#333">det(A) = λ₁ × λ₂ (product of eigenvalues)</text>
    <text x="330" y="558" font-family="Arial" font-size="10" fill="#333">tr(A) = λ₁ + λ₂ (sum of eigenvalues)</text>
    <text x="330" y="578" font-family="Arial" font-size="9" fill="#666">Used in PCA, stability analysis</text>
  </g>
</svg>