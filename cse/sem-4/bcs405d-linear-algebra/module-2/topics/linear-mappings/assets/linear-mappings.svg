<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Linear Mappings, also called linear transformations. They are functions between vector spaces that preserve vector addition and scalar multiplication.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Linear Mappings</text>
  </g>
  
  <g class="step" id="step1" data-narration="A function T from V to W is linear if T(u+v)=T(u)+T(v) and T(αv)=αT(v) for all vectors u,v in V and scalars α.">
    <rect x="40" y="60" width="720" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="60" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition of Linear Mapping</text>
    <rect x="60" y="92" width="330" height="36" rx="5" fill="#ffffff" stroke="#90caf9"/>
    <text x="70" y="108" font-family="Arial" font-size="10" fill="#333">T(u+v) = T(u) + T(v)  and  T(αv) = αT(v)</text>
    <rect x="410" y="92" width="330" height="36" rx="5" fill="#bbdefb" stroke="#90caf9"/>
    <text x="420" y="108" font-family="Arial" font-size="10" fill="#333">Combined: T(αu+βv) = αT(u) + βT(v)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Key properties: T always maps zero to zero, preserves negatives, and maps linear combinations to linear combinations of transformed images.">
    <rect x="40" y="145" width="720" height="75" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="60" y="165" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Properties of Linear Mappings</text>
    <rect x="60" y="177" width="160" height="36" rx="4" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="70" y="192" font-family="Arial" font-size="9" fill="#333">T(0_V) = 0_W</text>
    <text x="70" y="206" font-family="Arial" font-size="8" fill="#666">Zero → Zero</text>
    <rect x="230" y="177" width="160" height="36" rx="4" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="240" y="192" font-family="Arial" font-size="9" fill="#333">T(-v) = -T(v)</text>
    <text x="240" y="206" font-family="Arial" font-size="8" fill="#666">Preserves negatives</text>
    <rect x="400" y="177" width="160" height="36" rx="4" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="410" y="192" font-family="Arial" font-size="9" fill="#333">Injective ⇔ Ker={0}</text>
    <text x="410" y="206" font-family="Arial" font-size="8" fill="#666">One-to-one</text>
    <rect x="570" y="177" width="160" height="36" rx="4" fill="#ffffff" stroke="#a5d6a7"/>
    <text x="580" y="192" font-family="Arial" font-size="9" fill="#333">Surjective ⇔ Im=W</text>
    <text x="580" y="206" font-family="Arial" font-size="8" fill="#666">Onto</text>
  </g>
  
  <g class="step" id="step3" data-narration="The kernel of T contains all vectors in V that map to zero in W. It is a subspace of V with dimension called nullity.">
    <rect x="40" y="230" width="720" height="75" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="60" y="250" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Kernel (Null Space)</text>
    <rect x="60" y="262" width="340" height="38" rx="5" fill="#ffffff" stroke="#ffcc80"/>
    <text x="70" y="278" font-family="Arial" font-size="10" fill="#333">Ker(T) = {v ∈ V : T(v) = 0_W}</text>
    <text x="70" y="292" font-family="Arial" font-size="9" fill="#666">All vectors mapping to zero</text>
    <rect x="420" y="262" width="320" height="38" rx="5" fill="#ffe0b2" stroke="#ffcc80"/>
    <text x="430" y="278" font-family="Arial" font-size="10" fill="#333">nullity(T) = dim(Ker(T))</text>
    <text x="430" y="292" font-family="Arial" font-size="9" fill="#666">Dimension of kernel</text>
  </g>
  
  <g class="step" id="step4" data-narration="The range (image) is all vectors in W that equal T(v) for some v in V. It is a subspace of W with dimension equal to rank.">
    <rect x="40" y="315" width="720" height="75" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="60" y="335" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Range (Image)</text>
    <rect x="60" y="347" width="340" height="38" rx="5" fill="#ffffff" stroke="#ce93d8"/>
    <text x="70" y="363" font-family="Arial" font-size="10" fill="#333">Im(T) = {w ∈ W : w = T(v), v∈V}</text>
    <text x="70" y="377" font-family="Arial" font-size="9" fill="#666">All achievable outputs</text>
    <rect x="420" y="347" width="320" height="38" rx="5" fill="#e1bee7" stroke="#ce93d8"/>
    <text x="430" y="363" font-family="Arial" font-size="10" fill="#333">rank(T) = dim(Im(T))</text>
    <text x="430" y="377" font-family="Arial" font-size="9" fill="#666">Dimension of image</text>
  </g>
  
  <g class="step" id="step5" data-narration="The Rank-Nullity Theorem: dim(Ker(T)) + dim(Im(T)) = dim(V). This is essential for understanding linear transformations.">
    <rect x="40" y="400" width="720" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="60" y="420" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Rank-Nullity Theorem</text>
    <rect x="60" y="432" width="260" height="45" rx="5" fill="#ffffff" stroke="#ef9a9a"/>
    <text x="70" y="450" font-family="Arial" font-size="11" fill="#333">dim(Ker(T)) + dim(Im(T))</text>
    <text x="70" y="468" font-family="Arial" font-size="10" fill="#666">= dim(V)  (nullity + rank = dim domain)</text>
    <rect x="340" y="432" width="200" height="45" rx="5" fill="#ffcdd2" stroke="#ef9a9a"/>
    <text x="350" y="455" font-family="Arial" font-size="10" fill="#333">Exam Essential!</text>
    <rect x="560" y="432" width="180" height="45" rx="5" fill="#ffcdd2" stroke="#ef9a9a"/>
    <text x="570" y="455" font-family="Arial" font-size="10" fill="#333">T: ℝⁿ→ℝᵐ</text>
    <text x="570" y="470" font-family="Arial" font-size="9" fill="#666">m×n matrix</text>
  </g>
  
  <g class="step" id="step6" data-narration="Every linear map T(x)=Ax where A is an m×n matrix. Matrix columns are T(e1), T(e2), etc. Composition corresponds to matrix multiplication.">
    <rect x="40" y="495" width="720" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="60" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Matrix Representation</text>
    <rect x="60" y="527" width="200" height="52" rx="5" fill="#ffffff" stroke="#90caf9"/>
    <text x="70" y="543" font-family="Arial" font-size="9" fill="#333">T(x) = Ax</text>
    <text x="70" y="558" font-family="Arial" font-size="9" fill="#333">m×n matrix A</text>
    <text x="70" y="572" font-family="Arial" font-size="8" fill="#666">Linear map from ℝⁿ to ℝᵐ</text>
    <rect x="280" y="527" width="240" height="52" rx="5" fill="#bbdefb" stroke="#90caf9"/>
    <text x="290" y="543" font-family="Arial" font-size="9" fill="#333">Columns of A:</text>
    <text x="290" y="558" font-family="Arial" font-size="9" fill="#333">T(e₁), T(e₂), ..., T(eₙ)</text>
    <text x="290" y="572" font-family="Arial" font-size="8" fill="#666">Images of basis vectors</text>
    <rect x="540" y="527" width="200" height="52" rx="5" fill="#ffffff" stroke="#90caf9"/>
    <text x="550" y="543" font-family="Arial" font-size="9" fill="#333">Composition:</text>
    <text x="550" y="558" font-family="Arial" font-size="9" fill="#333">[T∘S] = [T][S]</text>
    <text x="550" y="572" font-family="Arial" font-size="8" fill="#666">Matrix multiplication</text>
  </g>
</svg>