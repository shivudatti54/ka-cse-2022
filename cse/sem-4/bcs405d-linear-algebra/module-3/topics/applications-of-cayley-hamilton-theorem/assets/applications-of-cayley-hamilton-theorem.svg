<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Cayley-Hamilton Theorem is a fundamental and elegant result in linear algebra. It states that every square matrix satisfies its own characteristic equation completely.">
    <rect x="20" y="10" width="760" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Applications of Cayley-Hamilton Theorem</text>
  </g>
  
  <g class="step" id="step1" data-narration="The theorem states: if p(λ) is the characteristic polynomial of matrix A, then p(A) equals the zero matrix. This directly implies that A satisfies its own equation.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Cayley-Hamilton Theorem Statement</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">For n×n matrix A with characteristic polynomial p(λ) = det(λI - A) = λⁿ + c₁λⁿ⁻¹ + ... + cₙ</text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#333">Then: p(A) = Aⁿ + c₁Aⁿ⁻¹ + ... + cₙI = O (zero matrix)</text>
    <text x="40" y="132" font-family="Arial" font-size="10" fill="#666">Key: Matrix A "satisfies" its own characteristic equation</text>
  </g>
  
  <g class="step" id="step2" data-narration="For a 2×2 matrix A = [[a,b],[c,d]], the characteristic polynomial is λ² - (a+d)λ + (ad-bc). The constant term equals the determinant of A.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Characteristic Polynomial</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#333">For 2×2 matrix A = [[a,b],[c,d]], compute det(λI - A):</text>
    <rect x="40" y="198" width="280" height="24" rx="4" fill="#c8e6c9"/>
    <text x="180" y="214" text-anchor="middle" font-family="Courier New" font-size="11" fill="#2e7d32">p(λ) = λ² - (a+d)λ + (ad-bc)</text>
    <text x="340" y="208" font-family="Arial" font-size="10" fill="#666">Eigenvalues are roots of p(λ)</text>
    <text x="340" y="222" font-family="Arial" font-size="10" fill="#666">Constant term c₂ = det(A)</text>
  </g>
  
  <g class="step" id="step3" data-narration="To compute high powers like A⁴, use the recurrence derived from the characteristic equation. A² equals a linear combination of A and identity matrix I.">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Computing Powers of Matrices</text>
    <text x="40" y="276" font-family="Arial" font-size="11" fill="#333">From characteristic equation: A² + c₁A + c₂I = O, then A² = -c₁A - c₂I</text>
    <text x="40" y="294" font-family="Arial" font-size="11" fill="#333">A³ = A·A² = -c₁A² - c₂A = (c₁²-c₂)A + c₁c₂I</text>
    <rect x="350" y="256" width="280" height="50" rx="4" fill="#ffe0b2"/>
    <text x="490" y="276" font-family="Arial" font-size="11" fill="#e65100">General formula:</text>
    <text x="490" y="294" font-family="Courier New" font-size="10" fill="#e65100">Aⁿ = -c₁Aⁿ⁻¹ - c₂Aⁿ⁻² - ... - cₙI</text>
  </g>
  
  <g class="step" id="step4" data-narration="For a 2×2 matrix, the inverse can be found using the Cayley-Hamilton formula A⁻¹ = c₂I - c₁A, when the determinant c₂ is non-zero.">
    <rect x="20" y="322" width="760" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Finding Matrix Inverse</text>
    <text x="40" y="364" font-family="Arial" font-size="11" fill="#333">From characteristic equation A² + c₁A + c₂I = O, multiply by A⁻¹ (when det(A) ≠ 0)</text>
    <text x="40" y="382" font-family="Arial" font-size="11" fill="#333">A + c₁I + c₂A⁻¹ = O, so A⁻¹ = -(1/c₂)(A + c₁I)</text>
    <text x="380" y="364" font-family="Arial" font-size="10" fill="#666">For 2×2 case: c₁ = -(a+d), c₂ = det(A)</text>
    <text x="380" y="382" font-family="Arial" font-size="10" fill="#666">A⁻¹ = c₂I - c₁A (the simple formula)</text>
    <rect x="600" y="344" width="160" height="50" rx="4" fill="#e1bee7"/>
    <text x="680" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Requires</text>
    <text x="680" y="382" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">det(A) ≠ 0</text>
  </g>
  
  <g class="step" id="step5" data-narration="Example 1: For A = [[1,2],[3,4]], we compute p(λ) = λ² - 5λ - 2. Using CHT, A² = 5A + 2I, giving A⁴ = 145A + 54I = [[199,290],[435,634]].">
    <rect x="20" y="415" width="760" height="85" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="437" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Example 1: Computing A⁴</text>
    <text x="40" y="457" font-family="Arial" font-size="11" fill="#333">A = [[1,2],[3,4]], p(λ) = λ² - 5λ - 2</text>
    <text x="40" y="475" font-family="Arial" font-size="11" fill="#333">CHT: A² = 5A + 2I → A³ = 27A + 10I → A⁴ = 145A + 54I</text>
    <rect x="350" y="437" width="220" height="55" rx="4" fill="#c8e6c9"/>
    <text x="460" y="460" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">A⁴ = [[199, 290],</text>
    <text x="460" y="478" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">[435, 634]]</text>
    <text x="590" y="457" font-family="Arial" font-size="10" fill="#666">Verify: Direct multiply</text>
    <text x="590" y="475" font-family="Arial" font-size="10" fill="#666">A⁴ × A⁰ = A⁴ ✓</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example 2: For A = [[2,1],[1,1]], we find A⁻¹ = 3I - A = [[1,-1],[-1,2]]. Verify: multiplying A × A⁻¹ yields the identity matrix I.">
    <rect x="20" y="508" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="530" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Example 2: Finding Inverse</text>
    <text x="40" y="550" font-family="Arial" font-size="11" fill="#333">A = [[2,1],[1,1]], p(λ) = λ² - 3λ + 1</text>
    <text x="40" y="568" font-family="Arial" font-size="11" fill="#333">A⁻¹ = 3I - A = [[1,-1],[-1,2]]</text>
    <rect x="280" y="530" width="180" height="50" rx="4" fill="#ffe0b2"/>
    <text x="370" y="555" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Verification:</text>
    <text x="370" y="572" text-anchor="middle" font-family="Courier New" font-size="10" fill="#e65100">A × A⁻¹ = I ✓</text>
    <text x="480" y="550" font-family="Arial" font-size="10" fill="#666">Identity matrix:</text>
    <text x="480" y="568" font-family="Arial" font-size="10" fill="#666">[[1,0],[0,1]]</text>
  </g>
</svg>