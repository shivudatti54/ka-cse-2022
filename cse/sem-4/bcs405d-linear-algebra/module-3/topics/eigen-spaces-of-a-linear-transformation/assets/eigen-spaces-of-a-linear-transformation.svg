<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the module on Eigen-Spaces of a Linear Transformation. We'll explore eigenvalues, eigenvectors, eigenspaces, diagonalization, and their important applications in linear algebra.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Eigen-Spaces of a Linear Transformation</text>
  </g>
  
  <g class="step" id="step1" data-narration="An eigenvector v satisfies T(v) equals lambda times v, where lambda is the eigenvalue. The direction remains unchanged under transformation.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Eigenvalues and Eigenvectors</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">Definition: T(v) = λv where v ≠ 0, λ ∈ F</text>
    <rect x="40" y="110" width="200" height="20" fill="#bbdefb" rx="3"/>
    <text x="50" y="124" font-family="Arial" font-size="10" fill="#1565c0">Eigenvector: non-zero vector</text>
    <rect x="260" y="110" width="180" height="20" fill="#bbdefb" rx="3"/>
    <text x="270" y="124" font-family="Arial" font-size="10" fill="#1565c0">Eigenvalue: scalar λ</text>
    <text x="500" y="100" font-family="Arial" font-size="11" fill="#333">Property: Direction unchanged</text>
    <text x="500" y="118" font-family="Arial" font-size="11" fill="#333">T maps each eigenspace to itself</text>
  </g>
  
  <g class="step" id="step2" data-narration="The characteristic equation det(A - λI) equals zero gives us the eigenvalues. This is a polynomial of degree n for an n×n matrix.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Characteristic Equation</text>
    <text x="40" y="190" font-family="Arial" font-size="11" fill="#333">Characteristic Polynomial: f(λ) = det(A - λI)</text>
    <text x="40" y="210" font-family="Arial" font-size="11" fill="#333">Characteristic Equation: f(λ) = 0 → eigenvalues are roots</text>
    <rect x="300" y="185" width="200" height="30" fill="#c8e6c9" rx="3"/>
    <text x="400" y="205" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Example: A = [[3,1],[1,3]]</text>
    <text x="520" y="205" font-family="Arial" font-size="10" fill="#333">det(A-λI) = (3-λ)²-1 = (λ-2)(λ-4)</text>
    <text x="520" y="220" font-family="Arial" font-size="10" fill="#333">Eigenvalues: λ = 2, 4</text>
  </g>
  
  <g class="step" id="step3" data-narration="For each eigenvalue λ, the eigenspace Eλ contains all eigenvectors plus zero. It's the null space of (A - λI).">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Eigenspaces</text>
    <text x="40" y="278" font-family="Arial" font-size="11" fill="#333">Eλ = {v : (A - λI)v = 0} = N(A - λI)</text>
    <rect x="40" y="288" width="200" height="18" fill="#ffe0b2" rx="3"/>
    <text x="50" y="301" font-family="Arial" font-size="10" fill="#e65100">For λ = 2: E₂ = span{[1,-1]ᵀ}</text>
    <rect x="260" y="288" width="220" height="18" fill="#ffe0b2" rx="3"/>
    <text x="270" y="301" font-family="Arial" font-size="10" fill="#e65100">For λ = 4: E₄ = span{[1,1]ᵀ}</text>
    <text x="540" y="278" font-family="Arial" font-size="11" fill="#333">Eigenspace is a subspace</text>
    <text x="540" y="295" font-family="Arial" font-size="11" fill="#333">Contains all eigenvectors for λ</text>
    <text x="540" y="312" font-family="Arial" font-size="11" fill="#333">plus the zero vector</text>
  </g>
  
  <g class="step" id="step4" data-narration="Algebraic multiplicity is how many times an eigenvalue appears as a root. Geometric multiplicity is the dimension of its eigenspace.">
    <rect x="20" y="322" width="760" height="90" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Multiplicities</text>
    <rect x="40" y="355" width="180" height="40" fill="#e1bee7" rx="3"/>
    <text x="50" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Algebraic (am)</text>
    <text x="50" y="385" font-family="Arial" font-size="9" fill="#333">Count of λ as root</text>
    <text x="130" y="385" font-family="Arial" font-size="9" fill="#333">in char. polynomial</text>
    <rect x="240" y="355" width="180" height="40" fill="#e1bee7" rx="3"/>
    <text x="250" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Geometric (gm)</text>
    <text x="250" y="385" font-family="Arial" font-size="9" fill="#333">Dimension of eigenspace Eλ</text>
    <text x="450" y="370" font-family="Arial" font-size="11" fill="#333">Key Relation:</text>
    <text x="450" y="388" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">1 ≤ gm(λ) ≤ am(λ)</text>
    <text x="450" y="405" font-family="Arial" font-size="10" fill="#333">Always true for each eigenvalue</text>
  </g>
  
  <g class="step" id="step5" data-narration="The Cayley-Hamilton theorem states every matrix satisfies its own characteristic equation. We verify this by substituting the matrix into the equation.">
    <rect x="20" y="420" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="442" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. Cayley-Hamilton Theorem</text>
    <text x="40" y="465" font-family="Arial" font-size="11" fill="#333">Every square matrix satisfies its own characteristic equation: f(A) = O</text>
    <rect x="40" y="475" width="280" height="18" fill="#ffcdd2" rx="3"/>
    <text x="50" y="488" font-family="Arial" font-size="9" fill="#c62828">A = [[1,2],[3,4]], f(λ) = λ² - 5λ - 2</text>
    <text x="340" y="465" font-family="Arial" font-size="11" fill="#333">Verify:</text>
    <rect x="390" y="455" width="180" height="35" fill="#ffcdd2" rx="3"/>
    <text x="400" y="470" font-family="Arial" font-size="9" fill="#c62828">f(A) = A² - 5A - 2I</text>
    <text x="400" y="485" font-family="Arial" font-size="9" fill="#c62828">= [[7,10],[15,22]] - [[5,10],[15,20]] - [[2,0],[0,2]]</text>
    <text x="600" y="475" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">= [[0,0],[0,0]] ✓</text>
  </g>
  
  <g class="step" id="step6" data-narration="A matrix is diagonalizable if geometric multiplicities sum to n, or equivalently if gm equals am for all eigenvalues completely.">
    <rect x="20" y="508" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="530" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">6. Diagonalization</text>
    <text x="40" y="555" font-family="Arial" font-size="11" fill="#333">A is diagonalizable ⇔ P⁻¹AP = D (D is diagonal)</text>
    <rect x="40" y="565" width="300" height="18" fill="#bbdefb" rx="3"/>
    <text x="50" y="578" font-family="Arial" font-size="10" fill="#1565c0">P = eigenvectors as columns, D = eigenvalues</text>
    <text x="360" y="555" font-family="Arial" font-size="11" fill="#333">Criteria:</text>
    <rect x="430" y="545" width="200" height="35" fill="#bbdefb" rx="3"/>
    <text x="440" y="560" font-family="Arial" font-size="9" fill="#1565c0">Sum of gm = n</text>
    <text x="440" y="575" font-family="Arial" font-size="9" fill="#1565c0">or gm(λ) = am(λ) for all λ</text>
    <text x="650" y="560" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Distinct eigenvalues</text>
    <text x="650" y="575" font-family="Arial" font-size="10" fill="#333">→ always diagonalizable</text>
  </g>
</svg>