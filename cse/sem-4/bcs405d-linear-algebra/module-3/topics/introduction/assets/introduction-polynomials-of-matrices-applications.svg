<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to learning about functions in Python, one of the most important building blocks of programming that every developer should master.">
    <rect x="200" y="10" width="400" height="40" fill="#1976d2" rx="6"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Introduction to Functions in Python</text>
  </g>
  
  <!-- step1: What is a Function -->
  <g class="step" id="step1" data-narration="A function is a reusable block of code that performs a specific task and can be called from anywhere in your program.">
    <rect x="40" y="58" width="720" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <circle cx="70" cy="98" r="18" fill="#1976d2"/>
    <text x="70" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">1</text>
    <text x="100" y="82" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">What is a Function?</text>
    <text x="100" y="102" font-family="Arial, sans-serif" font-size="12" fill="#333">A reusable block of code that performs a specific task.</text>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="12" fill="#333">Helps follow DRY principle: Don't Repeat Yourself.</text>
  </g>
  
  <!-- step2: Function Syntax -->
  <g class="step" id="step2" data-narration="Functions are defined using the def keyword, followed by the function name, parameters in parentheses, and a colon to start the body.">
    <rect x="40" y="146" width="720" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <circle cx="70" cy="186" r="18" fill="#388e3c"/>
    <text x="70" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">2</text>
    <text x="100" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">Function Syntax</text>
    <text x="100" y="195" font-family="Courier New, monospace" font-size="12" fill="#333">def function_name(parameter1, parameter2):</text>
    <text x="100" y="215" font-family="Courier New, monospace" font-size="12" fill="#333">    """Docstring"""  # Optional documentation</text>
  </g>
  
  <!-- step3: Parameters and Arguments -->
  <g class="step" id="step3" data-narration="Python supports positional parameters, default parameters, keyword arguments, and variable-length arguments using star notation like *args and **kwargs for flexible calls.">
    <rect x="40" y="234" width="720" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <circle cx="70" cy="274" r="18" fill="#ff9800"/>
    <text x="70" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">3</text>
    <text x="100" y="258" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">Parameters and Arguments</text>
    <text x="100" y="280" font-family="Arial, sans-serif" font-size="11" fill="#333">• Positional: def func(a, b) | Default: def func(a=10)</text>
    <text x="100" y="298" font-family="Arial, sans-serif" font-size="11" fill="#333">• Keyword: func(name="Alice") | Variable: *args, **kwargs</text>
  </g>
  
  <!-- step4: Return Statement -->
  <g class="step" id="step4" data-narration="The return statement exits a function and sends a value back to the caller. Functions without return default to None.">
    <rect x="40" y="322" width="720" height="80" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <circle cx="70" cy="362" r="18" fill="#f44336"/>
    <text x="70" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">4</text>
    <text x="100" y="346" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c62828">Return Statement</text>
    <text x="100" y="368" font-family="Courier New, monospace" font-size="12" fill="#333">return result  # Returns value to caller</text>
    <text x="100" y="388" font-family="Arial, sans-serif" font-size="11" fill="#333">Functions can return multiple values as a tuple. Without return, function returns None.</text>
  </g>
  
  <!-- step5: Variable Scope -->
  <g class="step" id="step5" data-narration="Python follows the LEGB rule: Local, Enclosing, Global, and Built-in scopes determine where variables can be accessed and how they are resolved.">
    <rect x="40" y="410" width="720" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <circle cx="70" cy="450" r="18" fill="#9c27b0"/>
    <text x="70" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">5</text>
    <text x="100" y="434" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">Variable Scope (LEGB Rule)</text>
    <text x="100" y="458" font-family="Arial, sans-serif" font-size="11" fill="#333">• Local: Inside function | Enclosing: Nested functions | Global: Outside functions</text>
    <text x="100" y="476" font-family="Arial, sans-serif" font-size="11" fill="#333">• Built-in: Python's pre-defined names | Use global keyword to modify global vars</text>
  </g>
  
  <!-- step6: Types of Functions -->
  <g class="step" id="step6" data-narration="Python has built-in functions like print and len, user-defined functions you create, lambda anonymous functions for quick operations, and recursive functions that call themselves.">
    <rect x="40" y="498" width="720" height="90" fill="#e0f2f1" rx="8" stroke="#00796b" stroke-width="2"/>
    <circle cx="70" cy="543" r="18" fill="#00796b"/>
    <text x="70" y="549" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">6</text>
    <text x="100" y="527" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#004d40">Types of Functions</text>
    <text x="100" y="550" font-family="Arial, sans-serif" font-size="11" fill="#333">1. Built-in: print(), len(), input(), str(), int() | 2. User-defined: Created by programmers</text>
    <text x="100" y="568" font-family="Arial, sans-serif" font-size="11" fill="#333">3. Lambda: Anonymous single-expression functions (lambda x: x*2) | 4. Recursive: Calls itself</text>
  </g>
</svg>