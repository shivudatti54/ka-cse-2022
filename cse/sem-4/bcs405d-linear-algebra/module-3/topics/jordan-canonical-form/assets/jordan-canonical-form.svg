<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Jordan Canonical Form extends diagonalization theory to matrices that cannot be diagonalized, revealing their complete structural information through Jordan blocks.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Jordan Canonical Form</text>
  </g>
  
  <g class="step" id="step1" data-narration="For any square matrix A, there exists a Jordan matrix J such that A equals P times J times P inverse.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Jordan Canonical Form?</text>
    <text x="20" y="92" font-family="Arial" font-size="10" fill="#333">A = PJP⁻¹ where J is a block diagonal matrix</text>
    <text x="20" y="107" font-family="Arial" font-size="10" fill="#333">Each block (Jordan block) has eigenvalue λ on</text>
    <text x="20" y="122" font-family="Arial" font-size="10" fill="#333">diagonal and 1s on the superdiagonal.</text>
    <rect x="400" y="75" width="200" height="55" rx="3" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="500" y="92" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Jordan Block Jk(λ)</text>
    <text x="500" y="108" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">λ 1 0 ... 0</text>
    <text x="500" y="120" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0 λ 1 ... 0</text>
  </g>
  
  <g class="step" id="step2" data-narration="Algebraic multiplicity counts how many times an eigenvalue appears as a root, while geometric multiplicity is the dimension of its eigenspace.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="20" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Multiplicity Concepts</text>
    <text x="20" y="180" font-family="Arial" font-size="10" fill="#333">• Algebraic Multiplicity (mᵃ): count from characteristic polynomial</text>
    <text x="20" y="195" font-family="Arial" font-size="10" fill="#333">• Geometric Multiplicity (mᵍ): dimension of null(A - λI)</text>
    <text x="20" y="210" font-family="Arial" font-size="10" fill="#333">• Key: 1 ≤ mᵍ ≤ mᵃ always holds</text>
    <text x="20" y="225" font-family="Arial" font-size="10" fill="#333">• Diagonalizable when mᵍ = mᵃ for all eigenvalues</text>
    <rect x="350" y="160" width="180" height="58" rx="3" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="440" y="177" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Example</text>
    <text x="440" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">λ = 2, mᵃ = 2</text>
    <text x="440" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">mᵍ = 1 (one Jordan block)</text>
  </g>
  
  <g class="step" id="step3" data-narration="Generalized eigenvectors satisfy a power of A minus lambda I applied to them equals zero, extending beyond regular eigenvectors and enabling complete decomposition.">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="20" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Generalized Eigenvectors</text>
    <text x="20" y="268" font-family="Arial" font-size="10" fill="#333">v is a generalized eigenvector of rank k if (A - λI)ᵏv = 0</text>
    <text x="20" y="283" font-family="Arial" font-size="10" fill="#333">but (A - λI)ᵏ⁻¹v ≠ 0</text>
    <text x="20" y="298" font-family="Arial" font-size="10" fill="#333">A Jordan chain: v₁ ← v₂ ← v₃ where (A-λI)vᵢ₊₁ = vᵢ</text>
    <text x="20" y="313" font-family="Arial" font-size="10" fill="#333">Columns of P are eigenvectors in Jordan chain order.</text>
    <rect x="350" y="250" width="200" height="56" rx="3" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="450" y="267" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Primary Decomposition</text>
    <text x="450" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Vⁿ = ⊕ Vλ (direct sum of</text>
    <text x="450" y="297" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">generalized eigenspaces)</text>
  </g>
  
  <g class="step" id="step4" data-narration="To find the Jordan form, compute the characteristic polynomial to identify eigenvalues, then find eigenspaces and construct Jordan chains systematically.">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="20" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Procedure to Find Jordan Form</text>
    <text x="20" y="356" font-family="Arial" font-size="10" fill="#333">1. Find eigenvalues from det(A - λI) = 0</text>
    <text x="20" y="371" font-family="Arial" font-size="10" fill="#333">2. For each λ, find null(A - λI) → geometric multiplicity</text>
    <text x="20" y="386" font-family="Arial" font-size="10" fill="#333">3. Find generalized eigenvectors solving (A - λI)ᵏv = 0</text>
    <text x="20" y="401" font-family="Arial" font-size="10" fill="#333">4. Construct P from Jordan chains, J has blocks for each chain</text>
    <rect x="400" y="340" width="180" height="54" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="490" y="357" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Key Properties</text>
    <text x="490" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#333"># blocks for λ = mᵍ(λ)</text>
    <text x="490" y="387" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">block sizes sum to mᵃ(λ)</text>
  </g>
  
  <g class="step" id="step5" data-narration="For matrix A equals two by two with two ones, the eigenvalue two appears twice algebraically but only once geometrically.">
    <rect x="10" y="410" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example 1: A = [[2,1],[0,2]]</text>
    <text x="20" y="444" font-family="Arial" font-size="10" fill="#333">det(A - λI) = (2-λ)² = 0 ⇒ λ = 2 (mᵃ = 2)</text>
    <text x="20" y="459" font-family="Arial" font-size="10" fill="#333">A - 2I = [[0,1],[0,0]], nullspace = span{[1,0]ᵀ}, mᵍ = 1</text>
    <text x="20" y="474" font-family="Arial" font-size="10" fill="#333">Since mᵃ = 2, mᵍ = 1 → one 2×2 Jordan block needed</text>
    <text x="20" y="489" font-family="Arial" font-size="10" fill="#333">J = [[2,1],[0,2]] (already in Jordan form!)</text>
    <rect x="400" y="430" width="180" height="52" rx="3" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="490" y="447" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Verification</text>
    <text x="490" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">charpoly(J) = (λ-2)²</text>
    <text x="490" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">matches original matrix</text>
  </g>
  
  <g class="step" id="step6" data-narration="When geometric multiplicity equals algebraic multiplicity for every eigenvalue, the matrix becomes diagonalizable and the Jordan form is simply a diagonal matrix.">
    <rect x="10" y="498" width="780" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="20" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example 2: Diagonalizable Case</text>
    <text x="20" y="532" font-family="Arial" font-size="10" fill="#333">B = [[4,2,2],[2,4,2],[2,2,4]], eigenvalues: λ=6 (mᵃ=1), λ=2 (mᵃ=2)</text>
    <text x="20" y="547" font-family="Arial" font-size="10" fill="#333">For λ=6: one eigenvector [1,1,1]ᵀ, mᵍ=1 = mᵃ</text>
    <text x="20" y="562" font-family="Arial" font-size="10" fill="#333">For λ=2: two eigenvectors [1,-1,0]ᵀ, [1,0,-1]ᵀ, mᵍ=2 = mᵃ</text>
    <text x="20" y="577" font-family="Arial" font-size="10" fill="#333">Matrix is diagonalizable → J = diag(6,2,2)</text>
    <rect x="380" y="515" width="180" height="65" rx="3" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="470" y="532" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Key Takeaways</text>
    <text x="470" y="547" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">mᵍ = mᵃ ⇒ diagonalizable</text>
    <text x="470" y="562" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">mᵍ &lt; mᵃ ⇒ Jordan blocks</text>
    <text x="470" y="577" text-anchor="middle" font-family="Arial" font-size="9" fill="#333"># blocks = mᵍ for each λ</text>
  </g>
</svg>