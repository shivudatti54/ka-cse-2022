<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="420" height="400" data-topic-id="diagonalization-and-orthogonal-diagonalization-of">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1976D2"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#388E3C"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#F57C00"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#009688"/>
      <stop offset="100%" style="stop-color:#00796B"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9C27B0"/>
      <stop offset="100%" style="stop-color:#7B1FA2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565C0">**Diagonalization and Orthogonal Diagonalization of Real Symmetric Matrices**</text>
  <g data-narration="Orthogonality: The columns of P are orthogonal unit vectors, i.e., P^T P = I, where I is the identity matrix.">
    <rect x="30" y="60" width="360" height="60" fill="url(#grad1)" rx="8" opacity="0.9"/>
    <circle cx="50" cy="90" r="12" fill="white" opacity="0.3"/>
    <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">1</text>
    <text x="75" y="83" font-family="Arial, sans-serif" font-size="11" fill="white">Orthogonality: The columns of P are orthogonal</text>
    <text x="75" y="99" font-family="Arial, sans-serif" font-size="11" fill="white">unit vectors, i.e., P^T P = I, where I is the</text>
  </g>
  <g data-narration="Diagonalization: The diagonal entries of D are the eigenvalues of A, and the columns of P are the corresponding eigenvectors.">
    <rect x="30" y="125" width="360" height="60" fill="url(#grad2)" rx="8" opacity="0.9"/>
    <circle cx="50" cy="155" r="12" fill="white" opacity="0.3"/>
    <text x="50" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">2</text>
    <text x="75" y="148" font-family="Arial, sans-serif" font-size="11" fill="white">Diagonalization: The diagonal entries of D are</text>
    <text x="75" y="164" font-family="Arial, sans-serif" font-size="11" fill="white">the eigenvalues of A, and the columns of P are the</text>
  </g>
  <g data-narration="Assume that the eigenvectors corresponding to distinct eigenvalues are linearly dependent.">
    <rect x="30" y="190" width="360" height="60" fill="url(#grad3)" rx="8" opacity="0.9"/>
    <circle cx="50" cy="220" r="12" fill="white" opacity="0.3"/>
    <text x="50" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">3</text>
    <text x="75" y="213" font-family="Arial, sans-serif" font-size="11" fill="white">Assume that the eigenvectors corresponding to</text>
    <text x="75" y="229" font-family="Arial, sans-serif" font-size="11" fill="white">distinct eigenvalues are linearly dependent.</text>
  </g>
  <g data-narration="Then, there exists a non-zero vector v such that a_i v = 0, where a_i are the distinct eigenvalues.">
    <rect x="30" y="255" width="360" height="60" fill="url(#grad4)" rx="8" opacity="0.9"/>
    <circle cx="50" cy="285" r="12" fill="white" opacity="0.3"/>
    <text x="50" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">4</text>
    <text x="75" y="278" font-family="Arial, sans-serif" font-size="11" fill="white">Then, there exists a non-zero vector v such that</text>
    <text x="75" y="294" font-family="Arial, sans-serif" font-size="11" fill="white">a_i v = 0, where a_i are the distinct eigenvalues.</text>
  </g>
  <g data-narration="Multiplying both sides by P^T, we get P^T a_i v = 0, which implies v = 0, a contradiction.">
    <rect x="30" y="320" width="360" height="60" fill="url(#grad5)" rx="8" opacity="0.9"/>
    <circle cx="50" cy="350" r="12" fill="white" opacity="0.3"/>
    <text x="50" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">5</text>
    <text x="75" y="343" font-family="Arial, sans-serif" font-size="11" fill="white">Multiplying both sides by P^T, we get P^T a_i v =</text>
    <text x="75" y="359" font-family="Arial, sans-serif" font-size="11" fill="white">0, which implies v = 0, a contradiction.</text>
  </g>
</svg>