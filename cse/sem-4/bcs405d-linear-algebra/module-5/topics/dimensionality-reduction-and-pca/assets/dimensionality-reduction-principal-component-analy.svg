<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0">Dimensionality Reduction and Principal Component Analysis (PCA)</text>
  
  <g class="step" id="step0" data-narration="PCA is a dimensionality reduction technique that transforms high-dimensional data into a lower-dimensional representation while preserving maximum variance in the dataset for analysis and visualization.">
    <rect x="40" y="50" width="720" height="40" fill="#e3f2fd" rx="5"/>
    <text x="400" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1976d2">What is PCA? Dimensionality reduction technique that finds orthogonal axes of maximum variance</text>
  </g>
  
  <g class="step" id="step1" data-narration="In the first step, we standardize the input data by centering each feature to zero mean and scaling to unit variance using the z-score formula for equal contribution.">
    <rect x="40" y="100" width="720" height="80" fill="#e8f5e9" rx="5"/>
    <rect x="50" y="110" width="80" height="60" fill="#388e3c" rx="4"/>
    <text x="90" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">1</text>
    <text x="150" y="125" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Standardize Data</text>
    <text x="150" y="143" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">z = (x - μ) / σ</text>
    <text x="150" y="160" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">Ensures all features contribute equally</text>
    <text x="280" y="125" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Original data X: n samples × d features</text>
    <text x="280" y="142" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Each feature standardized to mean=0,</text>
    <text x="280" y="159" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">variance=1</text>
  </g>
  
  <g class="step" id="step2" data-narration="We compute the covariance matrix which is a d by d symmetric matrix that captures how all pairs of features vary together in the standardized dataset.">
    <rect x="40" y="190" width="720" height="80" fill="#fff3e0" rx="5"/>
    <rect x="50" y="200" width="80" height="60" fill="#ff9800" rx="4"/>
    <text x="90" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">2</text>
    <text x="150" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Covariance Matrix</text>
    <text x="150" y="233" font-family="Arial, sans-serif" font-size="11" fill="#e65100">Σ = (1/(n-1)) × XᵀX</text>
    <text x="150" y="250" font-family="Arial, sans-serif" font-size="10" fill="#ff9800">d × d matrix capturing feature relationships</text>
    <text x="280" y="215" font-family="Arial, sans-serif" font-size="11" fill="#ff9800">Measures how features vary together:</text>
    <text x="280" y="232" font-family="Arial, sans-serif" font-size="11" fill="#ff9800">Positive = increase together</text>
    <text x="280" y="249" font-family="Arial, sans-serif" font-size="11" fill="#ff9800">Negative = inverse relationship</text>
  </g>
  
  <g class="step" id="step3" data-narration="The eigen decomposition extracts the principal components by finding eigenvalues and eigenvectors of the covariance matrix, where eigenvectors represent new orthogonal axes of variation.">
    <rect x="40" y="280" width="720" height="80" fill="#e8f5e9" rx="5"/>
    <rect x="50" y="290" width="80" height="60" fill="#388e3c" rx="4"/>
    <text x="90" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">3</text>
    <text x="150" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Eigen Decomposition</text>
    <text x="150" y="323" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Av = λv</text>
    <text x="150" y="340" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">Eigenvectors = principal component directions</text>
    <text x="280" y="305" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Eigenvalue (λ): amount of variance captured</text>
    <text x="280" y="322" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Eigenvector (v): direction of that variance</text>
    <text x="280" y="339" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">First PC has largest eigenvalue</text>
  </g>
  
  <g class="step" id="step4" data-narration="We sort eigenvalues in descending order and select the top k components that collectively explain at least ninety-five percent of the total variance in the data.">
    <rect x="40" y="370" width="720" height="80" fill="#fff3e0" rx="5"/>
    <rect x="50" y="380" width="80" height="60" fill="#ff9800" rx="4"/>
    <text x="90" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">4</text>
    <text x="150" y="395" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Select Components</text>
    <text x="150" y="413" font-family="Arial, sans-serif" font-size="11" fill="#e65100">Sort λ: λ₁ ≥ λ₂ ≥ ... ≥ λd</text>
    <text x="150" y="430" font-family="Arial, sans-serif" font-size="10" fill="#ff9800">Choose k where cumulative ≥ 95%</text>
    <text x="280" y="395" font-family="Arial, sans-serif" font-size="11" fill="#ff9800">Explained variance ratio = λᵢ / Σλⱼ</text>
    <text x="280" y="412" font-family="Arial, sans-serif" font-size="11" fill="#ff9800">Cumulative = Σ(λ₁ to λₖ) / Σλ × 100</text>
    <text x="280" y="429" font-family="Arial, sans-serif" font-size="11" fill="#ff9800">Scree plot shows elbow point</text>
  </g>
  
  <g class="step" id="step5" data-narration="The final transformation projects the original data onto these k principal components by matrix multiplication, effectively reducing dimensionality while preserving key variance information.">
    <rect x="40" y="460" width="720" height="80" fill="#e8f5e9" rx="5"/>
    <rect x="50" y="470" width="80" height="60" fill="#388e3c" rx="4"/>
    <text x="90" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">5</text>
    <text x="150" y="485" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Transform Data</text>
    <text x="150" y="503" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">X_transformed = X × Wₖ</text>
    <text x="150" y="520" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">Wₖ = matrix of top k eigenvectors</text>
    <text x="280" y="485" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Original: n × d → Transformed: n × k</text>
    <text x="280" y="502" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Where k &lt; d (typically k = 1 to 10)</text>
    <text x="280" y="519" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Example: 10000D image → 50D (95% variance)</text>
  </g>
  
  <g class="step" id="step6" data-narration="PCA offers advantages like reduced overfitting, lower computational costs, and enables visualization of high-dimensional data, but it assumes linear relationships and may lose interpretability.">
    <rect x="40" y="550" width="720" height="40" fill="#f3e5f5" rx="5"/>
    <text x="60" y="568" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7b1fa2">Advantages:</text>
    <text x="125" y="568" font-family="Arial, sans-serif" font-size="10" fill="#9c27b0">Reduces overfitting, noise, and computational cost | Enables visualization</text>
    <text x="400" y="568" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c62828">Limitations:</text>
    <text x="480" y="568" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f">Assumes linear relationships | Sensitive to outliers | Loses interpretability</text>
  </g>
</svg>