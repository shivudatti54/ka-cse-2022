<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Chalk and Talk is a traditional teaching method where instructors explain concepts verbally while writing key points and diagrams on a board for visual reinforcement.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Chalk and Talk Teaching Method</text>
  </g>
  
  <g class="step" id="step1" data-narration="Definition: Chalk and talk combines oral explanation with visual reinforcement through board writing, making it ideal for step-by-step problem solving in technical subjects.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition &amp; Characteristics</text>
    <text x="40" y="92" font-family="Arial" font-size="10" fill="#333">• Oral communication with verbal cues and emphasis</text>
    <text x="40" y="106" font-family="Arial" font-size="10" fill="#333">• Visual aid through board writing reinforces learning</text>
    <text x="40" y="120" font-family="Arial" font-size="10" fill="#333">• Sequential, structured presentation of topics</text>
    <text x="400" y="120" font-family="Arial" font-size="10" fill="#333">• Teacher-centered with immediate feedback</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three essential phases: Preparation involves planning content and organizing notes; Presentation requires maintaining eye contact and writing legibly; Interaction includes asking questions and encouraging discussions.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key Components</text>
    <rect x="40" y="175" width="220" height="45" fill="#c8e6c9" rx="3"/>
    <text x="150" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Preparation</text>
    <text x="150" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Plan lecture notes,</text>
    <text x="150" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">identify key concepts</text>
    <rect x="290" y="175" width="220" height="45" fill="#c8e6c9" rx="3"/>
    <text x="400" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Presentation</text>
    <text x="400" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Maintain eye contact,</text>
    <text x="400" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">speak clearly, write legibly</text>
    <rect x="540" y="175" width="220" height="45" fill="#c8e6c9" rx="3"/>
    <text x="650" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Interaction</text>
    <text x="650" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Incorporate questions,</text>
    <text x="650" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">pause for comprehension</text>
  </g>
  
  <g class="step" id="step3" data-narration="This method offers several key advantages including structured learning, mathematical clarity through step-by-step derivations, customizable pacing based on student comprehension, and cost-effectiveness since it requires minimal technology.">
    <rect x="20" y="234" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Advantages</text>
    <text x="40" y="268" font-family="Arial" font-size="10" fill="#333">1. Structured and well-organized presentation</text>
    <text x="40" y="282" font-family="Arial" font-size="10" fill="#333">2. Ideal for step-by-step derivations</text>
    <text x="40" y="296" font-family="Arial" font-size="10" fill="#333">3. Customizable pace based on comprehension</text>
    <text x="300" y="268" font-family="Arial" font-size="10" fill="#333">4. Cost-effective, minimal technology needed</text>
    <text x="300" y="282" font-family="Arial" font-size="10" fill="#333">5. Proven effectiveness in engineering education</text>
    <text x="300" y="296" font-family="Arial" font-size="10" fill="#333">6. Real-time clarification and note-taking support</text>
  </g>
  
  <g class="step" id="step4" data-narration="However, there are notable drawbacks: students often become passive listeners, large classes receive limited individual attention, and teachers face physical strain from extended standing and writing sessions.">
    <rect x="20" y="322" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Limitations</text>
    <text x="40" y="356" font-family="Arial" font-size="10" fill="#333">1. Students may become passive listeners</text>
    <text x="40" y="370" font-family="Arial" font-size="10" fill="#333">2. Limited individual attention in large classes</text>
    <text x="40" y="384" font-family="Arial" font-size="10" fill="#333">3. Physical demands on teachers (standing, writing)</text>
    <text x="320" y="356" font-family="Arial" font-size="10" fill="#333">4. Retention issues for verbal learners</text>
    <text x="320" y="370" font-family="Arial" font-size="10" fill="#333">5. May feel outdated vs modern methods</text>
    <text x="320" y="384" font-family="Arial" font-size="10" fill="#333">6. Difficult to maintain engagement throughout</text>
  </g>
  
  <g class="step" id="step5" data-narration="For example, teaching Binary Search involves writing the problem statement, explaining the divide-and-conquer approach, demonstrating pseudocode, working through a sample array, and deriving the time complexity formula.">
    <rect x="20" y="410" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Example: Teaching Binary Search</text>
    <text x="40" y="447" font-family="Arial" font-size="10" fill="#333">1. Write problem: "Find position of target in sorted array"</text>
    <text x="40" y="461" font-family="Arial" font-size="10" fill="#333">2. Explain concept: "Divide search space in half each iteration"</text>
    <text x="40" y="475" font-family="Arial" font-size="10" fill="#333">3. Write pseudocode with low, high, mid variables</text>
    <text x="420" y="447" font-family="Arial" font-size="10" fill="#333">4. Run example: Array [2,5,8,12,16], target=8</text>
    <text x="420" y="461" font-family="Arial" font-size="10" fill="#333">5. Show each iteration on the board</text>
    <text x="420" y="475" font-family="Arial" font-size="10" fill="#333">6. Derive and write Time Complexity: O(log n)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Exam tips: Follow logical lecture sequence, note key definitions on board, practice problems, understand diagrams, and review notes within 24 hours.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2"> Exam Tips</text>
    <text x="40" y="535" font-family="Arial" font-size="10" fill="#333">• Follow the logical sequence of topics as taught in lectures</text>
    <text x="40" y="549" font-family="Arial" font-size="10" fill="#333">• Note key definitions and formulas written on the board</text>
    <text x="40" y="563" font-family="Arial" font-size="10" fill="#333">• Practice problem-solving approaches demonstrated in class</text>
    <text x="420" y="535" font-family="Arial" font-size="10" fill="#333">• Understand diagrams and flowcharts from lectures</text>
    <text x="420" y="549" font-family="Arial" font-size="10" fill="#333">• Review lecture notes within 24 hours for better retention</text>
    <text x="420" y="563" font-family="Arial" font-size="10" fill="#333">• Prepare comparative answers for concepts explained together</text>
  </g>
</svg>