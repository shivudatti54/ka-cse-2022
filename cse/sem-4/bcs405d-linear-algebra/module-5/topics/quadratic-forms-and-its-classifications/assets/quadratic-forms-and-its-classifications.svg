<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning Quadratic Forms, an essential concept in linear algebra with wide applications in optimization problems, physics, and engineering systems.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Quadratic Forms and Its Classifications</text>
  </g>
  
  <g class="step" id="step1" data-narration="A quadratic form is a homogeneous polynomial of degree two, mathematically expressed as Q(x) equals x transpose A x where A is symmetric.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Definition of Quadratic Form</text>
    <text x="40" y="96" font-family="Arial" font-size="11" fill="#333">Q(x) = Σᵢ Σⱼ aᵢⱼ xᵢxⱼ where aᵢⱼ = aⱼᵢ (symmetric)</text>
    <text x="40" y="114" font-family="Arial" font-size="11" fill="#333">Matrix Form: Q(x) = xᵀAx, where x = [x₁,x₂,...,xₙ]ᵀ and A = Aᵀ</text>
    <rect x="580" y="68" width="180" height="60" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="670" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Example: n=2</text>
    <text x="670" y="106" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Q = ax² + 2bxy + cy²</text>
  </g>
  
  <g class="step" id="step2" data-narration="To construct the symmetric matrix representation, the coefficient of the cross term xy is divided equally between positions (1,2) and (2,1).">
    <rect x="20" y="146" width="760" height="94" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Matrix Representation</text>
    <text x="40" y="184" font-family="Arial" font-size="11" fill="#333">For Q = ax² + 2bxy + cy², the symmetric matrix is:</text>
    <rect x="40" y="194" width="120" height="24" fill="#ffffff" stroke="#388e3c" stroke-width="2" rx="3"/>
    <text x="100" y="210" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">A = [a b; b c]</text>
    <text x="200" y="210" font-family="Arial" font-size="10" fill="#666">← Split coefficient 2b equally</text>
    <circle cx="360" cy="200" r="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="360" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Diagonal</text>
    <text x="360" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Elements</text>
    <text x="360" y="222" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">aᵢᵢ → xᵢ²</text>
    <circle cx="480" cy="200" r="35" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="480" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Off-Diagonal</text>
    <text x="480" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Elements</text>
    <text x="480" y="222" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">aᵢⱼ = aⱼᵢ = ½coeff</text>
  </g>
  
  <g class="step" id="step3" data-narration="The five classifications depend on the sign of Q(x) for all non-zero vectors. Positive definite means Q(x) is strictly greater than zero for any non-zero input.">
    <rect x="20" y="248" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="268" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Classification of Quadratic Forms</text>
    <rect x="40" y="282" width="135" height="40" fill="#e3f2fd" stroke="#1976d2" rx="4"/>
    <text x="107" y="296" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Positive Definite</text>
    <text x="107" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Q(x) &gt; 0 ∀x≠0</text>
    
    <rect x="185" y="282" width="135" height="40" fill="#ffebee" stroke="#f44336" rx="4"/>
    <text x="252" y="296" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Negative Definite</text>
    <text x="252" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Q(x) &lt; 0 ∀x≠0</text>
    
    <rect x="330" y="282" width="145" height="40" fill="#e8f5e9" stroke="#388e3c" rx="4"/>
    <text x="402" y="296" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Positive Semidefinite</text>
    <text x="402" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Q(x) ≥ 0 ∀x≠0</text>
    
    <rect x="485" y="282" width="145" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="4"/>
    <text x="557" y="296" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Negative Semidefinite</text>
    <text x="557" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Q(x) ≤ 0 ∀x≠0</text>
    
    <rect x="640" y="282" width="130" height="40" fill="#ffe0b2" stroke="#ef6c00" rx="4"/>
    <text x="705" y="296" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Indefinite</text>
    <text x="705" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Q &gt; 0 and Q &lt; 0</text>
  </g>
  
  <g class="step" id="step4" data-narration="Sylvester's criterion determines definiteness using leading principal minors: all positive indicates positive definite, while alternating signs starting with negative indicates negative definite.">
    <rect x="20" y="336" width="760" height="100" fill="#e3f2fd" rx="8"/>
    <text x="40" y="356" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Sylvester's Criterion (Leading Principal Minors)</text>
    <rect x="40" y="370" width="340" height="36" fill="#e8f5e9" stroke="#388e3c" rx="4"/>
    <text x="210" y="384" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Positive Definite: D₁ &gt; 0, D₂ &gt; 0, ..., Dₙ &gt; 0</text>
    <text x="210" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(all leading principal minors positive)</text>
    
    <rect x="400" y="370" width="370" height="36" fill="#ffebee" stroke="#f44336" rx="4"/>
    <text x="585" y="384" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Negative Definite: D₁ &lt; 0, D₂ &gt; 0, D₃ &lt; 0, ...(-1)ⁿDₙ &gt; 0</text>
    <text x="585" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(alternating signs, starting negative)</text>
    
    <text x="40" y="420" font-family="Arial" font-size="10" fill="#333">For 2×2 matrix [a b; b c]:</text>
    <text x="40" y="434" font-family="Arial" font-size="9" fill="#666">• Positive definite: a &gt; 0 and det &gt; 0</text>
    <text x="180" y="434" font-family="Arial" font-size="9" fill="#666">• Negative definite: a &lt; 0 and det &gt; 0</text>
    <text x="340" y="434" font-family="Arial" font-size="9" fill="#666">• Indefinite: det &lt; 0</text>
  </g>
  
  <g class="step" id="step5" data-narration="The eigenvalue criterion provides an equivalent test: definiteness is determined entirely by whether all eigenvalues are positive, negative, or mixed in sign.">
    <rect x="20" y="444" width="760" height="70" fill="#f3e5f5" rx="8"/>
    <text x="40" y="464" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Eigenvalue Criterion</text>
    <text x="40" y="482" font-family="Arial" font-size="11" fill="#333">For symmetric A with eigenvalues λ₁,...,λₙ:</text>
    <rect x="220" y="472" width="100" height="22" fill="#c8e6c9" rx="3"/>
    <text x="270" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">λᵢ &gt; 0 → Pos Def</text>
    <rect x="330" y="472" width="100" height="22" fill="#ffcdd2" rx="3"/>
    <text x="380" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">λᵢ &lt; 0 → Neg Def</text>
    <rect x="440" y="472" width="100" height="22" fill="#ffe0b2" rx="3"/>
    <text x="490" y="486" text-anchor="middle" font-family="Arial" font-size="9" fill="#ef6c00">Mixed → Indefinite</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: The quadratic form Q equals 3x squared plus 4xy plus 5y squared corresponds to matrix A equals three, two, two, five. Both principal minors are positive, confirming positive definiteness.">
    <rect x="20" y="522" width="760" height="68" fill="#fff3e0" rx="8"/>
    <text x="40" y="542" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Example: Q(x,y) = 3x² + 4xy + 5y²</text>
    <rect x="40" y="554" width="180" height="30" fill="#ffffff" stroke="#ff9800" rx="4"/>
    <text x="130" y="568" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Matrix A = [3 2; 2 5]</text>
    <text x="240" y="570" font-family="Arial" font-size="16" fill="#ff9800">→</text>
    <rect x="270" y="554" width="200" height="30" fill="#ffffff" stroke="#ff9800" rx="4"/>
    <text x="370" y="568" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">D₁=3>0, D₂=11>0</text>
    <text x="490" y="570" font-family="Arial" font-size="16" fill="#ff9800">→</text>
    <rect x="520" y="554" width="130" height="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="4"/>
    <text x="585" y="568" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">POSITIVE DEFINITE</text>
  </g>
</svg>