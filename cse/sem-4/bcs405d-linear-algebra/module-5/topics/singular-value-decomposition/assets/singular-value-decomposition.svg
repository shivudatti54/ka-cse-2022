<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="Welcome to Singular Value Decomposition, the most powerful and versatile matrix factorization technique used throughout engineering, science, and data analysis applications.">
<rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
<text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Singular Value Decomposition (SVD)</text>
</g>
<g class="step" id="step1" data-narration="SVD decomposes any matrix A into three matrices: A equals U times Sigma times V transpose. U and V are orthogonal, Sigma is diagonal.">
<rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">SVD Definition: A = UΣVᵀ</text>
<rect x="40" y="95" width="160" height="35" fill="#e3f2fd" rx="3"/>
<text x="120" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">U: m×m orthogonal</text>
<rect x="220" y="95" width="160" height="35" fill="#fff3e0" rx="3"/>
<text x="300" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800">Σ: m×n diagonal</text>
<rect x="400" y="95" width="160" height="35" fill="#e8f5e9" rx="3"/>
<text x="480" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#388e3c">V: n×n orthogonal</text>
<rect x="580" y="95" width="120" height="35" fill="#f3e5f5" rx="3"/>
<text x="640" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="#9c27b0">Vᵀ: transpose</text>
</g>
<g class="step" id="step2" data-narration="The diagonal entries of Sigma are singular values: sigma one through sigma r, always non-negative and arranged in descending order from largest to smallest.">
<rect x="20" y="146" width="760" height="104" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
<text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Singular Values (σ)</text>
<rect x="40" y="185" width="700" height="35" fill="#fff3e0" rx="3"/>
<text x="390" y="207" text-anchor="middle" font-family="Courier New" font-size="16" fill="#e65100">σ₁ ≥ σ₂ ≥ ... ≥ σᵣ > 0</text>
<text x="40" y="240" font-family="Arial" font-size="10" fill="#666">Computing: σᵢ = √λᵢ(AᵀA) = √λᵢ(AAᵀ)</text>
</g>
<g class="step" id="step3" data-narration="Key properties: SVD exists for all matrices unlike eigendecomposition. U and V are orthogonal, and rank equals number of non-zero singular values.">
<rect x="20" y="258" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
<text x="40" y="280" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Properties of SVD</text>
<rect x="40" y="295" width="220" height="35" fill="#e8f5e9" rx="3"/>
<text x="150" y="312" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Exists for ALL matrices</text>
<text x="150" y="324" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">unlike eigenvalue decomposition</text>
<rect x="280" y="295" width="220" height="35" fill="#e8f5e9" rx="3"/>
<text x="390" y="312" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">U and V orthogonal</text>
<text x="390" y="324" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">UᵀU = I, VᵀV = I</text>
<rect x="520" y="295" width="220" height="35" fill="#e8f5e9" rx="3"/>
<text x="630" y="312" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">rank(A) = #non-zero σᵢ</text>
<text x="630" y="324" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">||A||₂ = σ₁</text>
</g>
<g class="step" id="step4" data-narration="The Eckart-Young theorem states the best rank-k approximation uses only the k largest singular values with their corresponding singular vectors from U and V.">
<rect x="20" y="346" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
<text x="40" y="368" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Eckart-Young Theorem: Low-Rank Approximation</text>
<rect x="40" y="385" width="340" height="32" fill="#f3e5f5" rx="3"/>
<text x="210" y="405" text-anchor="middle" font-family="Arial" font-size="12" fill="#9c27b0">A_k = U_k Σ_k V_kᵀ</text>
<rect x="400" y="385" width="340" height="32" fill="#f3e5f5" rx="3"/>
<text x="570" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Best rank-k approximation</text>
<text x="570" y="411" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">in 2-norm and Frobenius norm</text>
</g>
<g class="step" id="step5" data-narration="In image compression, SVD approximates a matrix using only k singular values, dramatically reducing storage from m times n to k times m plus n plus one values.">
<rect x="20" y="434" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
<text x="40" y="456" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Application: Image Compression</text>
<rect x="40" y="472" width="320" height="32" fill="#ffebee" rx="3"/>
<text x="200" y="492" text-anchor="middle" font-family="Courier New" font-size="10" fill="#c62828">A = [[10,10,10,10],[10,20,20,10],[10,20,20,10],[10,10,10,10]]</text>
<path d="M380 490 L420 490" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="440" y="472" width="320" height="32" fill="#e3f2fd" rx="3"/>
<text x="600" y="492" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">Storage: mn → k(m+n+1)</text>
</g>
<g class="step" id="step6" data-narration="The pseudoinverse uses SVD to solve linear systems: A plus equals V Sigma plus U transpose, providing stable minimum-norm solutions for all systems.">
<rect x="20" y="522" width="760" height="66" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
<text x="40" y="544" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Pseudoinverse &amp; Solving Linear Systems</text>
<rect x="280" y="558" width="470" height="25" fill="#e3f2fd" rx="3"/>
<text x="515" y="575" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">A⁺ = VΣ⁺Uᵀ gives minimum-norm least-squares solution</text>
</g>
</svg>