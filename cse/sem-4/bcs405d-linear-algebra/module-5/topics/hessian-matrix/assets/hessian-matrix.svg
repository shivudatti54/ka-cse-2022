<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Hessian Matrix is a square matrix of second-order partial derivatives. It helps analyze local curvature of multivariable functions and classify critical points.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Hessian Matrix</text>
  </g>
  
  <g class="step" id="step1" data-narration="For a function f(x,y), the Hessian is H equals fxx fxy over fyx fyy. The matrix contains all second-order partial derivatives.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Definition</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">For f(x,y): H = [∂²f/∂x²  ∂²f/∂x∂y]</text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#333">          [∂²f/∂y∂x  ∂²f/∂y²]</text>
    <text x="320" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Matrix Form</text>
    <text x="320" y="100" font-family="Arial" font-size="11" fill="#333">H = [fₓₓ  fₓᵧ]</text>
    <text x="320" y="118" font-family="Arial" font-size="11" fill="#333">    [fᵧₓ  fᵧᵧ]</text>
  </g>
  
  <g class="step" id="step2" data-narration="The determinant D equals fxx times fyy minus fxy squared. D greater than zero with fxx positive means local minimum, D greater than zero with fxx negative means local maximum.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Second Derivative Test</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#333">Discriminant: D = fₓₓ × fᵧᵧ - (fₓᵧ)²</text>
    <text x="40" y="206" font-family="Arial" font-size="11" fill="#333">D > 0, fₓₓ > 0 → Local Minimum</text>
    <text x="40" y="220" font-family="Arial" font-size="11" fill="#333">D > 0, fₓₓ < 0 → Local Maximum</text>
    <text x="320" y="168" font-family="Arial" font-size="11" fill="#333">D < 0 → Saddle Point</text>
    <text x="320" y="186" font-family="Arial" font-size="11" fill="#333">D = 0 → Test Inconclusive</text>
  </g>
  
  <g class="step" id="step3" data-narration="Example: f equals x squared plus y squared minus 2x minus 4y plus 5. The critical point is 1,2. The Hessian is 2,0 over 0,2 with determinant 4, so it's a local minimum.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Example 1: Local Minimum</text>
    <text x="40" y="276" font-family="Arial" font-size="11" fill="#333">f(x,y) = x² + y² - 2x - 4y + 5</text>
    <text x="40" y="294" font-family="Arial" font-size="11" fill="#333">∂f/∂x = 2x-2 = 0 → x=1</text>
    <text x="40" y="308" font-family="Arial" font-size="11" fill="#333">∂f/∂y = 2y-4 = 0 → y=2</text>
    <text x="350" y="256" font-family="Arial" font-size="11" fill="#333">Critical Point: (1,2)</text>
    <text x="350" y="274" font-family="Arial" font-size="11" fill="#333">H = [2  0]  D = 4</text>
    <text x="350" y="292" font-family="Arial" font-size="11" fill="#333">     [0  2]</text>
    <text x="350" y="308" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Result: Local Minimum</text>
  </g>
  
  <g class="step" id="step4" data-narration="Example: f equals x squared minus y squared. At origin, Hessian is 2,0 over 0,-2 with determinant -4. Negative determinant means saddle point.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example 2: Saddle Point</text>
    <text x="40" y="364" font-family="Arial" font-size="11" fill="#333">f(x,y) = x² - y²</text>
    <text x="40" y="382" font-family="Arial" font-size="11" fill="#333">∂f/∂x = 2x = 0 → x = 0</text>
    <text x="40" y="396" font-family="Arial" font-size="11" fill="#333">∂f/∂y = -2y = 0 → y = 0</text>
    <text x="350" y="344" font-family="Arial" font-size="11" fill="#333">Critical Point: (0,0)</text>
    <text x="350" y="362" font-family="Arial" font-size="11" fill="#333">H = [2   0]  D = -4</text>
    <text x="350" y="380" font-family="Arial" font-size="11" fill="#333">     [0  -2]</text>
    <text x="350" y="398" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Result: Saddle Point</text>
  </g>
  
  <g class="step" id="step5" data-narration="Eigenvalues determine curvature. All positive eigenvalues indicate local minimum. All negative eigenvalues indicate local maximum. Mixed signs indicate saddle point.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Eigenvalues and Definiteness</text>
    <text x="40" y="452" font-family="Arial" font-size="11" fill="#333">Eigenvalue Classification:</text>
    <text x="40" y="470" font-family="Arial" font-size="11" fill="#333">All λ > 0 → Positive Definite → Local Minimum</text>
    <text x="40" y="488" font-family="Arial" font-size="11" fill="#333">All λ < 0 → Negative Definite → Local Maximum</text>
    <text x="350" y="452" font-family="Arial" font-size="11" fill="#333">Mixed λ → Indefinite → Saddle Point</text>
    <text x="350" y="470" font-family="Arial" font-size="11" fill="#333">Hessian is symmetric due to</text>
    <text x="350" y="488" font-family="Arial" font-size="11" fill="#333">Clairaut's theorem (mixed partials equal)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Newton's method uses xk+1 equals xk minus H inverse times gradient. For f equals x squared plus 2y squared from point 1,1, it converges to minimum in one iteration.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Newton's Method for Optimization</text>
    <text x="40" y="540" font-family="Arial" font-size="11" fill="#333">Formula: xₖ₊₁ = xₖ - H⁻¹∇f</text>
    <text x="40" y="558" font-family="Arial" font-size="11" fill="#333">Example: f(x,y) = x² + 2y² from (1,1)</text>
    <text x="40" y="576" font-family="Arial" font-size="11" fill="#333">∇f = [2x, 4y], H = [2  0]</text>
    <text x="350" y="520" font-family="Arial" font-size="11" fill="#333">At (1,1): ∇f = [2, 4]</text>
    <text x="350" y="538" font-family="Arial" font-size="11" fill="#333">H⁻¹ = [1/2  0]</text>
    <text x="350" y="556" font-family="Arial" font-size="11" fill="#333">      [0   1/4]</text>
    <text x="350" y="578" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Converges to (0,0) in 1 iteration</text>
  </g>
</svg>