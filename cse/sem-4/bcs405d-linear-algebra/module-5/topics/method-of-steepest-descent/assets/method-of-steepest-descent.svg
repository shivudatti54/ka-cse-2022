<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Method of Steepest Descent finds local minima by moving in the negative gradient direction. Developed by Cauchy in 1847, it's foundational for modern optimization algorithms used across engineering and machine learning.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">Method of Steepest Descent (Gradient Descent)</text>
  </g>
  
  <g class="step" id="step1" data-narration="The gradient ∇f points in steepest ascent direction. For minimization, we move in the opposite direction: negative gradient -∇f gives steepest descent.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Key Concept: Gradient Vector</text>
    <text x="40" y="98" font-family="Arial" font-size="10" fill="#333">∇f(x) = [∂f/∂x₁, ∂f/∂x₂, ..., ∂f/∂xₙ]ᵀ</text>
    <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">Gradient points in direction of steepest ASCENT</text>
    <text x="40" y="132" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Steepest DESCENT direction = -∇f(x)</text>
    <rect x="500" y="75" width="250" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="625" y="95" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Visual Concept</text>
    <circle cx="560" cy="110" r="15" fill="#f44336"/>
    <text x="580" y="114" font-family="Arial" font-size="9" fill="#333">Start</text>
    <line x1="575" y1="110" x2="650" y2="85" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="660" y="90" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">-∇f</text>
    <circle cx="680" cy="80" r="8" fill="#4caf50"/>
  </g>
  
  <g class="step" id="step2" data-narration="The iteration formula xₖ₊₁ = xₖ - αₖ∇f(xₖ) updates our position by moving along the negative gradient scaled by step size αₖ.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Iteration Formula</text>
    <text x="40" y="190" font-family="Arial" font-size="14" fill="#333">xₖ₊₁ = xₖ - αₖ∇f(xₖ)</text>
    <text x="40" y="210" font-family="Arial" font-size="10" fill="#555">where αₖ = optimal step size (learning rate)</text>
    <rect x="250" y="160" width="200" height="55" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="350" y="180" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Step Size Selection</text>
    <text x="350" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Minimize φ(α) = f(xₖ - α∇f(xₖ))</text>
    <text x="350" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">dφ/dα = 0 gives optimal αₖ</text>
    <rect x="480" y="160" width="280" height="55" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="620" y="180" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Termination Criteria</text>
    <text x="620" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">||∇f(xₖ)|| &lt; ε or ||xₖ₊₁ - xₖ|| &lt; ε</text>
    <text x="620" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">|f(xₖ₊₁) - f(xₖ)| &lt; ε</text>
  </g>
  
  <g class="step" id="step3" data-narration="Example: Minimize f(x₁,x₂) = x₁² + 2x₂² - 2x₁x₂ - 2x₂ + 1 starting from x₀ = [0,0]. We compute gradient and find optimal step size.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Example: Two-Variable Quadratic Function</text>
    <text x="40" y="275" font-family="Arial" font-size="10" fill="#333">f(x₁,x₂) = x₁² + 2x₂² - 2x₁x₂ - 2x₂ + 1</text>
    <text x="40" y="292" font-family="Arial" font-size="10" fill="#333">∇f = [2x₁ - 2x₂, 4x₂ - 2x₁ - 2]</text>
    <text x="40" y="309" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">At x₀ = [0,0]: ∇f(x₀) = [0, -2]</text>
    <rect x="350" y="250" width="200" height="55" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="450" y="270" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Find Optimal α</text>
    <text x="450" y="288" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">φ(α) = 8α² - 4α + 1</text>
    <text x="450" y="302" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">α = 0.25 (from dφ/dα = 0)</text>
  </g>
  
  <g class="step" id="step4" data-narration="We update x₁ = x₀ - 0.25×[0,-2] = [0, 0.5]. The second iteration gradient is ∇f(x₁) = [-1, 0]. We repeat until convergence at [1,1].">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Iteration Process</text>
    <rect x="40" y="355" width="220" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="150" y="368" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Iteration 1</text>
    <text x="150" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">x₁ = [0, 0.5]</text>
    <rect x="270" y="355" width="220" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="380" y="368" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Iteration 2</text>
    <text x="380" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">x₂ = [0.5, 0.5]</text>
    <rect x="500" y="355" width="220" height="38" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="610" y="368" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Convergence</text>
    <text x="610" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">x* = [1, 1], f(x*) = 0</text>
    <text x="40" y="398" font-family="Arial" font-size="9" fill="#555">For quadratic functions with exact line search, n iterations for n-dimensional problem</text>
  </g>
  
  <g class="step" id="step5" data-narration="Convergence is linear - slower than Newton-Raphson's quadratic convergence. The method exhibits zigzag patterns for ill-conditioned problems with elongated valleys.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Convergence Properties</text>
    <text x="40" y="455" font-family="Arial" font-size="10" fill="#333">• Linear convergence rate (slower than Newton-Raphson's quadratic)</text>
    <text x="40" y="472" font-family="Arial" font-size="10" fill="#333">• Zigzag pattern in elongated valleys due to orthogonal search directions</text>
    <text x="40" y="489" font-family="Arial" font-size="10" fill="#333">• For quadratic: converges in n iterations with exact line search</text>
    <rect x="320" y="425" width="220" height="55" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="430" y="445" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Advantages over Newton-Raphson</text>
    <text x="430" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">• Only first-order derivatives needed</text>
    <text x="430" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">• No matrix inversion required</text>
    <rect x="550" y="425" width="210" height="55" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="655" y="445" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Limitations</text>
    <text x="655" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">• Slow convergence near minimum</text>
    <text x="655" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">• May find local minima</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key formula: xₖ₊₁ = xₖ - αₖ∇f(xₖ). Use optimal step size from line search. Terminate when gradient norm is small. This method is foundational for machine learning optimization.">
    <rect x="20" y="498" width="760" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="522" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Summary - Key Takeaways</text>
    <text x="40" y="545" font-family="Arial" font-size="11" fill="#333">• Core Formula: <tspan font-weight="bold">xₖ₊₁ = xₖ - αₖ∇f(xₖ)</tspan></text>
    <text x="40" y="563" font-family="Arial" font-size="10" fill="#333">• Move in direction of <tspan font-weight="bold">negative gradient</tspan> (-∇f) for descent</text>
    <text x="40" y="581" font-family="Arial" font-size="10" fill="#333">• Find optimal αₖ by solving <tspan font-weight="bold">d/dα [f(xₖ - α∇f(xₖ))] = 0</tspan></text>
    <rect x="400" y="510" width="340" height="65" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="570" y="530" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Exam Tips</text>
    <text x="570" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Remember the iteration formula</text>
    <text x="570" y="562" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Line search is crucial for fast convergence</text>
    <text x="570" y="576" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Convergence is linear, not quadratic</text>
  </g>
</svg>