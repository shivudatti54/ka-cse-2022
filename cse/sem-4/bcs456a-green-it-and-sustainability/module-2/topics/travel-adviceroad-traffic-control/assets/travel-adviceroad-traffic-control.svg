<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Road Traffic Control uses computer science to optimize traffic flow, reduce congestion, and enhance road safety in modern urban cities.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Road Traffic Control Systems</text>
  </g>

  <!-- Step 1: Three-Layer Architecture -->
  <g class="step" id="step1" data-narration="Traffic control has three layers: Detection uses sensors, Processing analyzes data with algorithms, and Actuation implements control decisions through signals.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Three-Layer Architecture</text>
    <rect x="40" y="90" width="220" height="40" fill="#bbdefb" rx="4"/>
    <text x="150" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Detection Layer</text>
    <text x="150" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Sensors, Cameras, IoT</text>
    <line x1="260" y1="110" x2="290" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="300" y="90" width="220" height="40" fill="#bbdefb" rx="4"/>
    <text x="410" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Processing Layer</text>
    <text x="410" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Algorithms, Control Systems</text>
    <line x1="520" y1="110" x2="550" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="560" y="90" width="200" height="40" fill="#bbdefb" rx="4"/>
    <text x="660" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Actuation Layer</text>
    <text x="660" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Signals, VMS, Barriers</text>
  </g>

  <!-- Step 2: Traffic Signal Timing -->
  <g class="step" id="step2" data-narration="Traffic signals work through fixed-time plans, actuated control responding to vehicles, and adaptive systems like SCOOT and SCATS that optimize in real-time.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Traffic Signal Control Types</text>
    <rect x="40" y="180" width="170" height="40" fill="#c8e6c9" rx="4"/>
    <text x="125" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Fixed-Time</text>
    <text x="125" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Pre-programmed cycles</text>
    <rect x="220" y="180" width="170" height="40" fill="#c8e6c9" rx="4"/>
    <text x="305" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Actuated Control</text>
    <text x="305" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Real-time detection</text>
    <rect x="400" y="180" width="170" height="40" fill="#a5d6a7" rx="4"/>
    <text x="485" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">SCOOT</text>
    <text x="485" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">UK adaptive system</text>
    <rect x="580" y="180" width="180" height="40" fill="#a5d6a7" rx="4"/>
    <text x="670" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">SCATS</text>
    <text x="670" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Australian adaptive</text>
  </g>

  <!-- Step 3: Traffic Flow Theory -->
  <g class="step" id="step3" data-narration="The fundamental traffic equation is flow equals density times speed: q equals k times u. This relationship drives all traffic engineering calculations.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Traffic Flow Theory</text>
    <rect x="40" y="268" width="340" height="40" fill="#ffe0b2" rx="4"/>
    <text x="210" y="286" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">Fundamental Equation</text>
    <text x="210" y="302" text-anchor="middle" font-family="Arial" font-size="12" fill="#f57c00">q = k × u</text>
    <rect x="400" y="268" width="180" height="40" fill="#ffe0b2" rx="4"/>
    <text x="490" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Greenshields Model</text>
    <text x="490" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">u = umax × (1 - k/kjam)</text>
    <rect x="590" y="268" width="180" height="40" fill="#ffe0b2" rx="4"/>
    <text x="680" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Capacity</text>
    <text x="680" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">Max flow: 1800 veh/hr/lane</text>
  </g>

  <!-- Step 4: Webster's Formula -->
  <g class="step" id="step4" data-narration="Webster's formula calculates optimal cycle time using lost time and critical v/c ratios. Cycle equals one-point-five L plus five over one minus Y.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Webster's Signal Timing Formula</text>
    <rect x="40" y="356" width="240" height="40" fill="#e1bee7" rx="4"/>
    <text x="160" y="374" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">Cycle Time Formula</text>
    <text x="160" y="390" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">C = (1.5L + 5) / (1 - Y)</text>
    <rect x="300" y="356" width="150" height="40" fill="#e1bee7" rx="4"/>
    <text x="375" y="374" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Where</text>
    <text x="375" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">L = lost time, Y = sum v/c</text>
    <rect x="470" y="356" width="150" height="40" fill="#e1bee7" rx="4"/>
    <text x="545" y="374" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">Green Time</text>
    <text x="545" y="390" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">g = (C - L) × (v/c critical)</text>
    <rect x="640" y="356" width="130" height="40" fill="#e1bee7" rx="4"/>
    <text x="705" y="374" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">Capacity</text>
    <text x="705" y="390" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">qmax = (g/C) × saturation</text>
  </g>

  <!-- Step 5: ITS Components -->
  <g class="step" id="step5" data-narration="Intelligent Transportation Systems include ATMS for monitoring, ATIS for traveler information, and various vehicle detection technologies like loops and cameras.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Intelligent Transportation Systems (ITS)</text>
    <rect x="40" y="448" width="230" height="36" fill="#ffcdd2" rx="4"/>
    <text x="155" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">ATMS</text>
    <text x="155" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Traffic Management</text>
    <rect x="280" y="448" width="230" height="36" fill="#ffcdd2" rx="4"/>
    <text x="395" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">ATIS</text>
    <text x="395" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Traveler Information</text>
    <rect x="520" y="448" width="250" height="36" fill="#ffcdd2" rx="4"/>
    <text x="645" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Detection Tech</text>
    <text x="645" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Loops, Cameras, Radar, Bluetooth</text>
  </g>

  <!-- Step 6: Queue Theory -->
  <g class="step" id="step6" data-narration="Queue theory models traffic delays using deterministic or random models. Maximum queue equals vehicles arriving during red time minus vehicles served during green.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Queue Theory Applications</text>
    <rect x="40" y="535" width="230" height="45" fill="#bbdefb" rx="4"/>
    <text x="155" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Deterministic Queue</text>
    <text x="155" y="566" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Uniform arrival and service</text>
    <text x="155" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Q = q × r / 3600</text>
    <rect x="285" y="535" width="230" height="45" fill="#bbdefb" rx="4"/>
    <text x="400" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Random Queue (M/M/1)</text>
    <text x="400" y="566" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Poisson arrivals</text>
    <text x="400" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Exponential service times</text>
    <rect x="530" y="535" width="240" height="45" fill="#bbdefb" rx="4"/>
    <text x="650" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Delay Formula</text>
    <text x="650" y="566" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">d = C(1-g/C)² / 2g(1-g/C)</text>
    <text x="650" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Webster's delay equation</text>
  </g>
</svg>