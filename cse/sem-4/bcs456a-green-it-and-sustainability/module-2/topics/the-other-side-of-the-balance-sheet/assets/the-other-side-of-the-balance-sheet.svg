<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
  </marker>
  <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
  </marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="The balance sheet has two main sides: assets are on one side, while liabilities plus shareholders' equity appear on the other side to balance perfectly.">
<rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">The Other Side of the Balance Sheet</text>
</g>

<g class="step" id="step1" data-narration="Liabilities are obligations from past transactions requiring future outflow of economic resources. They are classified as current or non-current based on when due.">
<rect x="10" y="58" width="780" height="80" rx="5" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Classification of Liabilities</text>
<rect x="25" y="85" width="350" height="45" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="35" y="100" font-family="Arial" font-size="10" fill="#1565c0">Current Liabilities</text>
<text x="35" y="115" font-family="Arial" font-size="8" fill="#666">Due within one year</text>
<rect x="385" y="85" width="350" height="45" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="395" y="100" font-family="Arial" font-size="10" fill="#2e7d32">Non-Current Liabilities</text>
<text x="395" y="115" font-family="Arial" font-size="8" fill="#666">Due beyond one year</text>
</g>

<g class="step" id="step2" data-narration="Current liabilities include accounts payable for goods, short-term bank loans, accrued expenses for services, unearned revenue, and current portion of long-term debt due within one year.">
<rect x="10" y="146" width="780" height="80" rx="5" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Current Liabilities Examples</text>
<g>
<rect x="25" y="175" width="140" height="42" rx="3" fill="#e3f2fd"/>
<text x="30" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Accounts Payable</text>
<text x="30" y="200" font-family="Arial" font-size="7" fill="#666">Amounts owed to</text>
<text x="30" y="210" font-family="Arial" font-size="7" fill="#666">suppliers for credit</text>
</g>
<g>
<rect x="175" y="175" width="140" height="42" rx="3" fill="#e3f2fd"/>
<text x="180" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Short-term Loans</text>
<text x="180" y="200" font-family="Arial" font-size="7" fill="#666">Bank borrowings</text>
<text x="180" y="210" font-family="Arial" font-size="7" fill="#666">repayable within one year</text>
</g>
<g>
<rect x="325" y="175" width="140" height="42" rx="3" fill="#e3f2fd"/>
<text x="330" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Accrued Expenses</text>
<text x="330" y="200" font-family="Arial" font-size="7" fill="#666">Incurred but not paid</text>
<text x="330" y="210" font-family="Arial" font-size="7" fill="#666">e.g., salaries, rent</text>
</g>
<g>
<rect x="475" y="175" width="140" height="42" rx="3" fill="#e3f2fd"/>
<text x="480" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Unearned Revenue</text>
<text x="480" y="200" font-family="Arial" font-size="7" fill="#666">Payments received</text>
<text x="480" y="210" font-family="Arial" font-size="7" fill="#666">in advance</text>
</g>
<g>
<rect x="625" y="175" width="140" height="42" rx="3" fill="#e3f2fd"/>
<text x="630" y="188" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Current Portion</text>
<text x="630" y="200" font-family="Arial" font-size="7" fill="#666">Portion of long-term</text>
<text x="630" y="210" font-family="Arial" font-size="7" fill="#666">debt due within year</text>
</g>
</g>

<g class="step" id="step3" data-narration="Non-current liabilities include long-term bank loans, bonds payable to investors, deferred tax liabilities from accounting differences, and lease liabilities from finance leases with maturity beyond one year.">
<rect x="10" y="234" width="780" height="80" rx="5" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Non-Current Liabilities Examples</text>
<g>
<rect x="25" y="263" width="175" height="42" rx="3" fill="#e8f5e9"/>
<text x="30" y="276" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Long-term Loans</text>
<text x="30" y="288" font-family="Arial" font-size="7" fill="#666">Bank borrowings with</text>
<text x="30" y="298" font-family="Arial" font-size="7" fill="#666">maturity over one year</text>
</g>
<g>
<rect x="210" y="263" width="175" height="42" rx="3" fill="#e8f5e9"/>
<text x="215" y="276" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Bonds Payable</text>
<text x="215" y="288" font-family="Arial" font-size="7" fill="#666">Debt securities issued</text>
<text x="215" y="298" font-family="Arial" font-size="7" fill="#666">with fixed maturity</text>
</g>
<g>
<rect x="395" y="263" width="175" height="42" rx="3" fill="#e8f5e9"/>
<text x="400" y="276" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Deferred Tax Liabilities</text>
<text x="400" y="288" font-family="Arial" font-size="7" fill="#666">Taxes owed in future</text>
<text x="400" y="298" font-family="Arial" font-size="7" fill="#666">from accounting differences</text>
</g>
<g>
<rect x="580" y="263" width="175" height="42" rx="3" fill="#e8f5e9"/>
<text x="585" y="276" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Lease Liabilities</text>
<text x="585" y="288" font-family="Arial" font-size="7" fill="#666">Obligations under</text>
<text x="585" y="298" font-family="Arial" font-size="7" fill="#666">finance leases</text>
</g>
</g>

<g class="step" id="step4" data-narration="Shareholders' equity represents the residual claim on assets after paying all liabilities. It includes share capital from investors and accumulated reserves or surplus retained in the business.">
<rect x="10" y="322" width="780" height="80" rx="5" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Shareholders' Equity Components</text>
<rect x="25" y="352" width="350" height="42" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<text x="35" y="365" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">Share Capital</text>
<text x="35" y="378" font-family="Arial" font-size="7" fill="#666">Invested by shareholders:</text>
<text x="35" y="388" font-family="Arial" font-size="7" fill="#666">equity and preference shares</text>
<rect x="385" y="352" width="350" height="42" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<text x="395" y="365" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">Reserves and Surplus</text>
<text x="395" y="378" font-family="Arial" font-size="7" fill="#666">General reserve, capital</text>
<text x="395" y="388" font-family="Arial" font-size="7" fill="#666">reserve, retained earnings</text>
</g>

<g class="step" id="step5" data-narration="The fundamental accounting equation states that assets equal liabilities plus shareholders' equity, and this balance must always be maintained in every financial transaction recorded.">
<rect x="10" y="410" width="780" height="105" rx="5" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="25" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">The Accounting Equation</text>
<rect x="150" y="442" width="150" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="225" y="462" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">ASSETS</text>
<text x="300" y="462" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">=</text>
<rect x="320" y="442" width="150" height="40" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="395" y="458" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">LIABILITIES</text>
<text x="395" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Current + Non-Current</text>
<text x="470" y="462" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">+</text>
<rect x="490" y="442" width="150" height="40" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="565" y="458" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">EQUITY</text>
<text x="565" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Share Capital + Reserves</text>
<path d="M 225 490 L 565 490" stroke="#666" stroke-width="1" stroke-dasharray="4"/>
<text x="400" y="505" text-anchor="middle" font-family="Arial" font-size="9" font-style="italic" fill="#666">Must always balance</text>
</g>

<g class="step" id="step6" data-narration="Debt financing offers tax-deductible interest but creates repayment obligations. Equity financing avoids mandatory repayment but dilutes existing ownership. Companies must balance both sources for optimal capital structure.">
<rect x="10" y="523" width="780" height="77" rx="5" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="25" y="540" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Debt vs Equity Financing</text>
<rect x="25" y="552" width="350" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
<text x="35" y="565" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Debt Financing</text>
<text x="35" y="578" font-family="Arial" font-size="7" fill="#666">✓ Tax-deductible | ✓ No dilution | ✗ Fixed obligations</text>
<rect x="385" y="552" width="350" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="395" y="565" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Equity Financing</text>
<text x="395" y="578" font-family="Arial" font-size="7" fill="#666">✓ No repayment | ✓ Lower risk | ✗ Dilutes ownership</text>
</g>
</svg>