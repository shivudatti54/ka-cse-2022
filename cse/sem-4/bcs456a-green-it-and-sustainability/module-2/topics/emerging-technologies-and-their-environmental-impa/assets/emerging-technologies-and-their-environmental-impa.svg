<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <g class="step" id="step0" data-narration="This topic introduces emerging technologies and their environmental impact, essential knowledge for computer science students, engineers, and sustainability professionals in the digital age.">
    <rect x="20" y="10" width="760" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Emerging Technologies and Their Environmental Impact</text>
  </g>
  
  <!-- Step 1: Energy Consumption Overview -->
  <g class="step" id="step1" data-narration="Data centers consume 2-3% of global electricity, with cooling systems using 40-50% of total energy. AI training emits massive carbon.">
    <rect x="20" y="58" width="760" height="82" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">1. Energy Consumption of Technologies</text>
    <rect x="40" y="95" width="160" height="35" rx="3" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="120" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Data Centers</text>
    <text x="120" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">2-3% global electricity</text>
    <rect x="215" y="95" width="160" height="35" rx="3" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="295" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">AI/ML Training</text>
    <text x="295" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">5 cars lifetime CO2</text>
    <rect x="390" y="95" width="160" height="35" rx="3" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="470" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Bitcoin Mining</text>
    <text x="470" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">150 TWh/year</text>
    <rect x="565" y="95" width="160" height="35" rx="3" fill="#fff" stroke="#f44336" stroke-width="1"/>
    <text x="645" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">IoT Devices</text>
    <text x="645" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Billions connected</text>
  </g>
  
  <!-- Step 2: E-Waste -->
  <g class="step" id="step2" data-narration="E-waste grows 3-5% annually and poses major environmental threats. Devices last only 2-3 years, containing toxic materials like lead and mercury that cause severe soil and water contamination.">
    <rect x="20" y="148" width="760" height="82" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="40" y="170" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">2. Electronic Waste (E-Waste)</text>
    <rect x="40" y="185" width="230" height="35" rx="3" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="155" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Annual Growth Rate</text>
    <text x="155" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">3-5% per year</text>
    <rect x="285" y="185" width="230" height="35" rx="3" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Device Lifecycle</text>
    <text x="400" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">2-3 years only</text>
    <rect x="530" y="185" width="235" height="35" rx="3" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="647" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">India E-Waste</text>
    <text x="647" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">~2 million tonnes</text>
  </g>
  
  <!-- Step 3: Carbon Footprint -->
  <g class="step" id="step3" data-narration="The ICT sector contributes 2-4% of global carbon emissions, comparable to aviation. This includes direct emissions from manufacturing, indirect emissions from electricity use, and supply chain emissions.">
    <rect x="20" y="238" width="760" height="112" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="40" y="260" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">3. Carbon Footprint of Technology</text>
    <circle cx="120" cy="305" r="40" fill="#fff" stroke="#9c27b0" stroke-width="2"/>
    <text x="120" y="298" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">ICT Sector</text>
    <text x="120" y="310" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">2-4%</text>
    <text x="120" y="322" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Global Emissions</text>
    <rect x="200" y="280" width="160" height="50" rx="3" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="280" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Direct Emissions</text>
    <text x="280" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Manufacturing</text>
    <text x="280" y="322" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Transport</text>
    <rect x="375" y="280" width="160" height="50" rx="3" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="455" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Indirect Emissions</text>
    <text x="455" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Electricity</text>
    <text x="455" y="322" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Operation</text>
    <rect x="550" y="280" width="215" height="50" rx="3" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="657" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Supply Chain</text>
    <text x="657" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Component Manufacturing</text>
    <text x="657" y="322" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Logistics</text>
  </g>
  
  <!-- Step 4: Green Computing -->
  <g class="step" id="step4" data-narration="Green computing employs energy-efficient hardware, virtualization for server consolidation, intelligent power management, renewable energy sources like solar and wind, and optimized algorithms.">
    <rect x="20" y="358" width="760" height="82" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="40" y="380" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">4. Green Computing Strategies</text>
    <rect x="40" y="395" width="140" height="38" rx="3" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="110" y="410" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Energy-Efficient</text>
    <text x="110" y="422" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Hardware</text>
    <rect x="195" y="395" width="140" height="38" rx="3" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="265" y="410" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Virtualization</text>
    <text x="265" y="422" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">70-80% reduction</text>
    <rect x="350" y="395" width="140" height="38" rx="3" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="420" y="410" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Power Management</text>
    <text x="420" y="422" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Sleep modes</text>
    <rect x="505" y="395" width="140" height="38" rx="3" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="575" y="410" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Renewable Energy</text>
    <text x="575" y="422" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Solar, Wind</text>
    <rect x="660" y="395" width="105" height="38" rx="3" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="712" y="410" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Optimized</text>
    <text x="712" y="422" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Algorithms</text>
  </g>
  
  <!-- Step 5: Environmental Impact Assessment -->
  <g class="step" id="step5" data-narration="Environmental Impact Assessment uses Life Cycle Assessment, energy audits, carbon footprint calculations, and proper e-waste management for safe recycling and disposal.">
    <rect x="20" y="448" width="760" height="82" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="40" y="470" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">5. Environmental Impact Assessment (EIA)</text>
    <rect x="40" y="485" width="175" height="38" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="127" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Life Cycle Assessment</text>
    <text x="127" y="512" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Manufacturing to disposal</text>
    <rect x="230" y="485" width="175" height="38" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="317" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Energy Audits</text>
    <text x="317" y="512" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Measure and optimize</text>
    <rect x="420" y="485" width="175" height="38" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="507" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Carbon Footprint</text>
    <text x="507" y="512" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Calculate GHG emissions</text>
    <rect x="610" y="485" width="155" height="38" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="687" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">E-Waste Management</text>
    <text x="687" y="512" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Proper disposal</text>
  </g>
  
  <!-- Step 6: Key Formulas -->
  <g class="step" id="step6" data-narration="Key formulas include PUE for data center efficiency, annual energy as power multiplied by 8760 hours, and CO2 calculated by multiplying energy by the emission factor.">
    <rect x="20" y="538" width="760" height="55" rx="5" fill="#fff8e1" stroke="#ffa000" stroke-width="1.5"/>
    <text x="40" y="560" font-family="Arial" font-size="12" font-weight="bold" fill="#ffa000">6. Key Formulas for Calculations</text>
    <text x="260" y="580" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">PUE = Total Facility Energy / IT Energy</text>
    <text x="480" y="580" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Annual Energy = Power × 8760</text>
    <text x="680" y="580" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">CO2 = Energy × Emission Factor</text>
  </g>
</svg>