<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Building Management Systems are computer-based control systems that automate and optimize building equipment for improved efficiency, occupant comfort, and significant energy savings across all subsystems.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Building Management Systems (BMS)</text>
  </g>
  
  <g class="step" id="step1" data-narration="A Building Management System is a computer-based control system that manages HVAC, lighting, fire safety, and security systems in buildings to optimize operational efficiency and reduce costs.">
    <rect x="30" y="60" width="740" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="50" y="82" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">What is BMS?</text>
    <rect x="50" y="95" width="160" height="48" rx="3" fill="#c8e6c9"/>
    <text x="60" y="112" font-family="Arial" font-size="10" fill="#2e7d32">Computer-based control</text>
    <text x="60" y="125" font-family="Arial" font-size="10" fill="#2e7d32">system for buildings</text>
    <rect x="220" y="95" width="160" height="48" rx="3" fill="#c8e6c9"/>
    <text x="230" y="112" font-family="Arial" font-size="10" fill="#2e7d32">Manages HVAC, Lighting,</text>
    <text x="230" y="125" font-family="Arial" font-size="10" fill="#2e7d32">Fire Safety, Security</text>
    <rect x="390" y="95" width="160" height="48" rx="3" fill="#c8e6c9"/>
    <text x="400" y="112" font-family="Arial" font-size="10" fill="#2e7d32">Ensures Energy</text>
    <text x="400" y="125" font-family="Arial" font-size="10" fill="#2e7d32">Efficiency &amp; Comfort</text>
    <rect x="560" y="95" width="190" height="48" rx="3" fill="#c8e6c9"/>
    <text x="570" y="112" font-family="Arial" font-size="10" fill="#2e7d32">Reduces Operational</text>
    <text x="570" y="125" font-family="Arial" font-size="10" fill="#2e7d32">Costs by 30-40%</text>
  </g>
  
  <g class="step" id="step2" data-narration="BMS has three levels: Field Level with sensors and actuators, Automation Level with controllers, and Management Level with central stations.">
    <rect x="30" y="158" width="740" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="50" y="180" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Three-Level Architecture</text>
    <rect x="50" y="195" width="230" height="45" rx="3" fill="#ffe0b2"/>
    <text x="60" y="213" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Field Level (Level 0)</text>
    <text x="60" y="227" font-family="Arial" font-size="9" fill="#e65100">Sensors, Actuators, DDCs</text>
    <line x1="280" y1="217" x2="310" y2="217" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="320" y="195" width="230" height="45" rx="3" fill="#ffe0b2"/>
    <text x="330" y="213" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Automation Level (Level 1)</text>
    <text x="330" y="227" font-family="Arial" font-size="9" fill="#e65100">Controllers, PLCs, Automation</text>
    <line x1="550" y1="217" x2="580" y2="217" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="590" y="195" width="160" height="45" rx="3" fill="#ffe0b2"/>
    <text x="600" y="213" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Management Level</text>
    <text x="600" y="227" font-family="Arial" font-size="9" fill="#e65100">Server, Operator Interface</text>
  </g>
  
  <g class="step" id="step3" data-narration="Key BMS protocols include BACnet for building automation, LonWorks with Neuron Chips, Modbus for device connectivity, and KNX for building control.">
    <rect x="30" y="256" width="740" height="90" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="50" y="278" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Communication Protocols</text>
    <rect x="50" y="295" width="170" height="45" rx="3" fill="#e1bee7"/>
    <text x="60" y="312" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">BACnet</text>
    <text x="60" y="326" font-family="Arial" font-size="9" fill="#6a1b9a">Building Automation</text>
    <rect x="230" y="295" width="170" height="45" rx="3" fill="#e1bee7"/>
    <text x="240" y="312" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">LonWorks</text>
    <text x="240" y="326" font-family="Arial" font-size="9" fill="#6a1b9a">Neuron Chip Technology</text>
    <rect x="410" y="295" width="170" height="45" rx="3" fill="#e1bee7"/>
    <text x="420" y="312" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Modbus</text>
    <text x="420" y="326" font-family="Arial" font-size="9" fill="#6a1b9a">RTU/ASCII/TCP</text>
    <rect x="590" y="295" width="160" height="45" rx="3" fill="#e1bee7"/>
    <text x="600" y="312" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">KNX</text>
    <text x="600" y="326" font-family="Arial" font-size="9" fill="#6a1b9a">European Standard</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Building Management System controls HVAC for temperature regulation, manages lighting for energy savings, oversees fire safety, handles security access, and monitors elevators for optimal building operations.">
    <rect x="30" y="354" width="740" height="90" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="50" y="376" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Subsystems Managed by BMS</text>
    <rect x="50" y="393" width="130" height="45" rx="3" fill="#ffcdd2"/>
    <text x="60" y="410" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">HVAC Control</text>
    <text x="60" y="423" font-family="Arial" font-size="9" fill="#c62828">Temp, Humidity, Air Quality</text>
    <rect x="190" y="393" width="130" height="45" rx="3" fill="#ffcdd2"/>
    <text x="200" y="410" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Lighting Control</text>
    <text x="200" y="423" font-family="Arial" font-size="9" fill="#c62828">Daylight, Occupancy</text>
    <rect x="330" y="393" width="130" height="45" rx="3" fill="#ffcdd2"/>
    <text x="340" y="410" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Fire Safety</text>
    <text x="340" y="423" font-family="Arial" font-size="9" fill="#c62828">Alarms, Smoke Control</text>
    <rect x="470" y="393" width="130" height="45" rx="3" fill="#ffcdd2"/>
    <text x="480" y="410" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Security</text>
    <text x="480" y="423" font-family="Arial" font-size="9" fill="#c62828">Access, CCTV, Intrusion</text>
    <rect x="610" y="393" width="140" height="45" rx="3" fill="#ffcdd2"/>
    <text x="620" y="410" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Elevator Control</text>
    <text x="620" y="423" font-family="Arial" font-size="9" fill="#c62828">Status, Maintenance</text>
  </g>
  
  <g class="step" id="step5" data-narration="Control strategies range from simple on-off to PID control. BMS provides energy savings through demand limiting, load shifting, and optimal start-stop.">
    <rect x="30" y="452" width="740" height="105" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="50" y="474" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Control Strategies &amp; Energy Management</text>
    <rect x="50" y="490" width="220" height="60" rx="3" fill="#bbdefb"/>
    <text x="60" y="508" font-family="Arial" font-size="11" font-weight="bold" fill="#0d47a1">Control Strategies</text>
    <text x="60" y="523" font-family="Arial" font-size="9" fill="#0d47a1">• On-Off: Simple on/off</text>
    <text x="60" y="536" font-family="Arial" font-size="9" fill="#0d47a1">• P: Proportional output</text>
    <text x="160" y="536" font-family="Arial" font-size="9" fill="#0d47a1">• PI: Eliminates error</text>
    <text x="160" y="523" font-family="Arial" font-size="9" fill="#0d47a1">• PID: Best for processes</text>
    <rect x="280" y="490" width="230" height="60" rx="3" fill="#bbdefb"/>
    <text x="290" y="508" font-family="Arial" font-size="11" font-weight="bold" fill="#0d47a1">Energy Management Features</text>
    <text x="290" y="523" font-family="Arial" font-size="9" fill="#0d47a1">• Demand Limiting: Peak shaving</text>
    <text x="290" y="536" font-family="Arial" font-size="9" fill="#0d47a1">• Load Shifting: Off-peak operation</text>
    <text x="410" y="536" font-family="Arial" font-size="9" fill="#0d47a1">• Optimal Start/Stop</text>
    <rect x="520" y="490" width="230" height="60" rx="3" fill="#bbdefb"/>
    <text x="530" y="508" font-family="Arial" font-size="11" font-weight="bold" fill="#0d47a1">Advantages of BMS</text>
    <text x="530" y="523" font-family="Arial" font-size="9" fill="#0d47a1">• 30-40% Energy Savings</text>
    <text x="530" y="536" font-family="Arial" font-size="9" fill="#0d47a1">• Improved Occupant Comfort</text>
    <text x="650" y="536" font-family="Arial" font-size="9" fill="#0d47a1">• Remote Monitoring</text>
  </g>
</svg>