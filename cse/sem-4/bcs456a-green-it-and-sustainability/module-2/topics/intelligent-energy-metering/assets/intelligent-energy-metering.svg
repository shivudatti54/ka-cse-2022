<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Intelligent Energy Metering, or Smart Metering, modernizes power distribution by enabling real-time data collection, two-way communication, and advanced energy management between consumers and utilities.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Intelligent Energy Metering</text>
  </g>
  
  <g class="step" id="step1" data-narration="Traditional meters use rotating aluminum discs measuring only total kWh with manual reading. Smart meters are digital devices measuring energy, reactive power, voltage, current, and power factor with automated data transmission.">
    <rect x="20" y="60" width="350" height="75" fill="#e3f2fd" rx="5"/>
    <text x="195" y="78" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Traditional Meter</text>
    <rect x="30" y="85" width="80" height="40" fill="#bbdefb" rx="3"/>
    <text x="70" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Electromechanical</text>
    <text x="70" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Disc</text>
    <line x1="115" y1="105" x2="140" y2="105" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="160" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Manual Read</text>
    <text x="160" y="121" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Only kWh</text>
    
    <rect x="390" y="60" width="390" height="75" fill="#e8f5e9" rx="5"/>
    <text x="585" y="78" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Smart Meter</text>
    <rect x="405" y="88" width="65" height="38" fill="#c8e6c9" rx="3"/>
    <text x="437" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Digital</text>
    <text x="437" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">MCU/DSP</text>
    <line x1="475" y1="107" x2="500" y2="107" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="520" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Two-way</text>
    <text x="520" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Remote Control</text>
    <text x="640" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Multi-Parameter</text>
    <text x="640" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">kWh,kVARh,V,I,PF</text>
  </g>
  
  <g class="step" id="step2" data-narration="A smart meter contains five key blocks: Measurement Unit with sensors and ADCs, Processing Unit with microcontroller, Communication Unit for data transfer, Display Unit showing readings, and Power Supply with battery backup.">
    <rect x="20" y="145" width="760" height="85" fill="#fff3e0" rx="5"/>
    <text x="400" y="162" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Smart Meter Architecture</text>
    
    <rect x="35" y="175" width="130" height="45" fill="#ffe0b2" rx="4"/>
    <text x="100" y="190" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Measurement Unit</text>
    <text x="100" y="205" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">CTs/Shunts, ADCs</text>
    <text x="100" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">2-4 kHz Sampling</text>
    
    <line x1="165" y1="197" x2="185" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="190" y="175" width="130" height="45" fill="#ffe0b2" rx="4"/>
    <text x="255" y="190" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Processing Unit</text>
    <text x="255" y="205" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">32-bit MCU/DSP</text>
    <text x="255" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">Energy Calc, Storage</text>
    
    <line x1="320" y1="197" x2="340" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="345" y="175" width="130" height="45" fill="#ffe0b2" rx="4"/>
    <text x="410" y="190" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Communication Unit</text>
    <text x="410" y="205" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">PLC, RF Mesh, GPRS</text>
    <text x="410" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">Two-way Data</text>
    
    <line x1="475" y1="197" x2="495" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="500" y="175" width="130" height="45" fill="#ffe0b2" rx="4"/>
    <text x="565" y="190" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Display Unit</text>
    <text x="565" y="205" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">LCD/LED Display</text>
    <text x="565" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">Real-time Readings</text>
    
    <line x1="630" y1="197" x2="650" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="655" y="175" width="115" height="45" fill="#ffe0b2" rx="4"/>
    <text x="712" y="190" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Power Supply</text>
    <text x="712" y="205" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">5V DC + Battery</text>
    <text x="712" y="216" text-anchor="middle" font-family="Arial" font-size="7" fill="#bf360c">Data Retention</text>
  </g>
  
  <g class="step" id="step3" data-narration="AMI infrastructure includes smart meters at consumer premises, Data Concentrator Units collecting data from 500-1000 meters, communication networks, MDMS databases, Head-End Systems, and Customer Information Systems for billing.">
    <rect x="20" y="238" width="760" height="82" fill="#f3e5f5" rx="5"/>
    <text x="400" y="255" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Advanced Metering Infrastructure (AMI)</text>
    
    <rect x="35" y="268" width="100" height="42" fill="#e1bee7" rx="4"/>
    <text x="85" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Smart Meters</text>
    <text x="85" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">End-point Devices</text>
    <text x="85" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">at Consumer</text>
    
    <line x1="135" y1="289" x2="155" y2="289" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="160" y="268" width="110" height="42" fill="#e1bee7" rx="4"/>
    <text x="215" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Data Concentrator</text>
    <text x="215" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Collects 500-1000</text>
    <text x="215" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Meters per Area</text>
    
    <line x1="270" y1="289" x2="290" y2="289" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="295" y="268" width="100" height="42" fill="#e1bee7" rx="4"/>
    <text x="345" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Communication</text>
    <text x="345" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Backhaul Network</text>
    <text x="345" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">to Control Center</text>
    
    <line x1="395" y1="289" x2="415" y2="289" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="420" y="268" width="95" height="42" fill="#e1bee7" rx="4"/>
    <text x="467" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">MDMS</text>
    <text x="467" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Meter Data</text>
    <text x="467" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Management System</text>
    
    <line x1="515" y1="289" x2="535" y2="289" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="540" y="268" width="95" height="42" fill="#e1bee7" rx="4"/>
    <text x="587" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Head-End System</text>
    <text x="587" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Central Server</text>
    <text x="587" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Communication</text>
    
    <line x1="635" y1="289" x2="655" y2="289" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="660" y="268" width="110" height="42" fill="#e1bee7" rx="4"/>
    <text x="715" y="283" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Customer Info</text>
    <text x="715" y="296" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Billing System</text>
    <text x="715" y="306" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Customer Mgmt</text>
  </g>
  
  <g class="step" id="step4" data-narration="Communication protocols include PLC using power lines cost-effectively, RF Mesh for mesh topology with redundancy, GPRS for remote areas, and Zigbee for in-home device communication.">
    <rect x="20" y="328" width="760" height="82" fill="#e3f2fd" rx="5"/>
    <text x="400" y="345" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Communication Protocols</text>
    
    <rect x="35" y="358" width="170" height="42" fill="#bbdefb" rx="4"/>
    <text x="120" y="373" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Power Line Communication</text>
    <text x="120" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Uses Existing Power Lines</text>
    <text x="120" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Low/High Speed PLC</text>
    
    <rect x="220" y="358" width="170" height="42" fill="#bbdefb" rx="4"/>
    <text x="305" y="373" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">RF Mesh Networking</text>
    <text x="305" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Mesh Topology, Redundant</text>
    <text x="305" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">IEEE 802.15.4g, Wi-SUN</text>
    
    <rect x="405" y="358" width="170" height="42" fill="#bbdefb" rx="4"/>
    <text x="490" y="373" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">GPRS/3G/4G Cellular</text>
    <text x="490" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Mobile Network Based</text>
    <text x="490" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Wide Coverage, Recurring Cost</text>
    
    <rect x="590" y="358" width="180" height="42" fill="#bbdefb" rx="4"/>
    <text x="680" y="373" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Zigbee / IEEE 802.15.4</text>
    <text x="680" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">Low Power, In-home</text>
    <text x="680" y="398" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">2.4GHz ISM Band</text>
  </g>
  
  <g class="step" id="step5" data-narration="Key features include remote reading eliminating manual work, Time-of-Use tariffs for load management, prepaid metering, remote disconnect/reconnect, power quality monitoring, and demand response programs.">
    <rect x="20" y="418" width="760" height="75" fill="#e8f5e9" rx="5"/>
    <text x="400" y="435" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Key Features &amp; Benefits</text>
    
    <rect x="35" y="448" width="110" height="35" fill="#c8e6c9" rx="3"/>
    <text x="90" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Remote Reading</text>
    <text x="90" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">No Manual Visit</text>
    
    <rect x="155" y="448" width="110" height="35" fill="#c8e6c9" rx="3"/>
    <text x="210" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Time-of-Use</text>
    <text x="210" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Peak/Off-Peak Rates</text>
    
    <rect x="275" y="448" width="110" height="35" fill="#c8e6c9" rx="3"/>
    <text x="330" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Prepaid Metering</text>
    <text x="330" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Pay in Advance</text>
    
    <rect x="395" y="448" width="110" height="35" fill="#c8e6c9" rx="3"/>
    <text x="450" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Remote Disconnect</text>
    <text x="450" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">On/Off Control</text>
    
    <rect x="515" y="448" width="115" height="35" fill="#c8e6c9" rx="3"/>
    <text x="572" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Power Quality</text>
    <text x="572" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">V,I,Harmonics</text>
    
    <rect x="640" y="448" width="130" height="35" fill="#c8e6c9" rx="3"/>
    <text x="705" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2e7d32">Demand Response</text>
    <text x="705" y="476" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">Load Shifting</text>
  </g>
  
  <g class="step" id="step6" data-narration="Security challenges include data privacy risks, meter tampering detection, and cyberattacks requiring encryption. Key formulas: Apparent Power S=V×I, Active Power P=S×PF, and Energy = Power × Time.">
    <rect x="20" y="501" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="400" y="518" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Security &amp; Key Formulas</text>
    
    <rect x="35" y="528" width="230" height="45" fill="#ffcdd2" rx="4"/>
    <text x="150" y="543" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Security Concerns</text>
    <text x="150" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Data Privacy, Tampering, DoS Attacks</text>
    <text x="150" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Encryption &amp; Authentication Required</text>
    
    <rect x="280" y="528" width="240" height="45" fill="#ffcdd2" rx="4"/>
    <text x="400" y="543" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Key Formulas</text>
    <text x="400" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">S = V × I (VA) | P = S × PF (W)</text>
    <text x="400" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Energy = Power × Time (kWh)</text>
    
    <rect x="535" y="528" width="235" height="45" fill="#ffcdd2" rx="4"/>
    <text x="652" y="543" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Data Management</text>
    <text x="652" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">15-30 min Intervals, 1-2 MB/month</text>
    <text x="652" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Load Profiling, Theft Detection</text>
  </g>
</svg>