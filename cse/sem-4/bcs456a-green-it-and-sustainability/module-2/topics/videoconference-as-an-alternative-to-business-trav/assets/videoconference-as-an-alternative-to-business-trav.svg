<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Video conferencing enables real-time visual communication between remote participants using IP networks, offering a cost-effective and flexible alternative to expensive business travel.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Video Conference as Alternative to Business Travel</text>
  </g>
  
  <g class="step" id="step1" data-narration="Video conferencing uses cameras, microphones, codecs, and network infrastructure. The H.323 standard enables interoperability between different vendors over IP networks.">
    <rect x="20" y="58" width="760" height="85" fill="white" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Video Conferencing Architecture</text>
    <rect x="40" y="88" width="140" height="45" fill="#e3f2fd" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="9" fill="#333">Components:</text>
    <text x="50" y="115" font-family="Arial" font-size="8" fill="#555">• Camera, Mic, Speaker</text>
    <text x="50" y="125" font-family="Arial" font-size="8" fill="#555">• Codec (H.264/H.265)</text>
    <text x="50" y="135" font-family="Arial" font-size="8" fill="#555">• Network (IP/ISDN)</text>
    <rect x="200" y="88" width="180" height="45" fill="#e8f5e9" rx="3"/>
    <text x="210" y="102" font-family="Arial" font-size="9" fill="#333">H.320 Standard:</text>
    <text x="210" y="115" font-family="Arial" font-size="8" fill="#555">ISDN-based video conferencing</text>
    <text x="210" y="125" font-family="Arial" font-size="8" fill="#555">Legacy systems</text>
    <text x="210" y="135" font-family="Arial" font-size="8" fill="#555">Narrow bandwidth</text>
    <rect x="400" y="88" width="180" height="45" fill="#e8f5e9" rx="3"/>
    <text x="410" y="102" font-family="Arial" font-size="9" fill="#333">H.323 Standard:</text>
    <text x="410" y="115" font-family="Arial" font-size="8" fill="#555">IP-based conferencing</text>
    <text x="410" y="125" font-family="Arial" font-size="8" fill="#555">Interoperability support</text>
    <text x="410" y="135" font-family="Arial" font-size="8" fill="#555">Modern standard</text>
    <rect x="600" y="88" width="160" height="45" fill="#fff3e0" rx="3"/>
    <text x="610" y="102" font-family="Arial" font-size="9" fill="#333">Protocol Stack:</text>
    <text x="610" y="115" font-family="Arial" font-size="8" fill="#555">SIP/H.323 (Signaling)</text>
    <text x="610" y="125" font-family="Arial" font-size="8" fill="#555">RTP/RTCP (Media)</text>
    <text x="610" y="135" font-family="Arial" font-size="8" fill="#555">TLS/SRTP (Security)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Video compression uses I-frames, P-frames, and B-frames to reduce bandwidth. H.264 provides 50% bandwidth savings over older standards while maintaining quality.">
    <rect x="20" y="146" width="760" height="85" fill="white" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Video Compression &amp; QoS Requirements</text>
    <rect x="40" y="176" width="160" height="50" fill="#e8f5e9" rx="3"/>
    <text x="50" y="190" font-family="Arial" font-size="9" fill="#333">Compression Types:</text>
    <text x="50" y="203" font-family="Arial" font-size="8" fill="#555">I-frames: Full frame data</text>
    <text x="50" y="214" font-family="Arial" font-size="8" fill="#555">P-frames: Delta from previous</text>
    <text x="50" y="225" font-family="Arial" font-size="8" fill="#555">B-frames: Delta bidirectionally</text>
    <rect x="220" y="176" width="140" height="50" fill="#e8f5e9" rx="3"/>
    <text x="230" y="190" font-family="Arial" font-size="9" fill="#333">Codec Standards:</text>
    <text x="230" y="203" font-family="Arial" font-size="8" fill="#555">H.264: 50% savings</text>
    <text x="230" y="214" font-family="Arial" font-size="8" fill="#555">H.265: HEVC, better</text>
    <text x="230" y="225" font-family="Arial" font-size="8" fill="#555">G.711/G.728: Audio</text>
    <rect x="380" y="176" width="390" height="50" fill="#fff3e0" rx="3"/>
    <text x="390" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#333">QoS Parameters:</text>
    <text x="450" y="190" font-family="Arial" font-size="8" fill="#555">Bandwidth: 512Kbps-4Mbps</text>
    <text x="580" y="190" font-family="Arial" font-size="8" fill="#555">Latency: &lt;150ms</text>
    <text x="450" y="203" font-family="Arial" font-size="8" fill="#555">Jitter: &lt;30ms</text>
    <text x="580" y="203" font-family="Arial" font-size="8" fill="#555">Packet Loss: &lt;1%</text>
    <text x="450" y="216" font-family="Arial" font-size="8" fill="#555">HD (720p): 1.5-2 Mbps</text>
    <text x="580" y="216" font-family="Arial" font-size="8" fill="#555">4K: 8-10 Mbps</text>
  </g>
  
  <g class="step" id="step3" data-narration="Room-based systems offer superior quality for dedicated spaces. Desktop and mobile apps provide flexibility at lower costs. Cloud solutions scale easily without heavy infrastructure.">
    <rect x="20" y="234" width="760" height="85" fill="white" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Types of Video Conferencing Solutions</text>
    <rect x="40" y="264" width="230" height="50" fill="#fff3e0" rx="3"/>
    <text x="50" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Room-Based Systems</text>
    <text x="50" y="290" font-family="Arial" font-size="8" fill="#555">High-quality cameras, professional audio</text>
    <text x="50" y="302" font-family="Arial" font-size="8" fill="#555">Examples: Cisco, Poly, Zoom Rooms</text>
    <text x="50" y="314" font-family="Arial" font-size="8" fill="#555">High investment required</text>
    <rect x="285" y="264" width="230" height="50" fill="#fff3e0" rx="3"/>
    <text x="295" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Desktop/Mobile Apps</text>
    <text x="295" y="290" font-family="Arial" font-size="8" fill="#555">Zoom, Teams, Meet, Webex</text>
    <text x="295" y="302" font-family="Arial" font-size="8" fill="#555">Flexible, lower cost</text>
    <text x="295" y="314" font-family="Arial" font-size="8" fill="#555">May compromise quality</text>
    <rect x="530" y="264" width="230" height="50" fill="#fff3e0" rx="3"/>
    <text x="540" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Cloud-Based Solutions</text>
    <text x="540" y="290" font-family="Arial" font-size="8" fill="#555">Scalable infrastructure</text>
    <text x="540" y="302" font-family="Arial" font-size="8" fill="#555">Reduced on-prem costs</text>
    <text x="540" y="314" font-family="Arial" font-size="8" fill="#555">Subscription model</text>
  </g>
  
  <g class="step" id="step4" data-narration="A 3-person team traveling to Hyderabad costs ₹65,000 versus ₹23,000 for video conferencing. This represents 65% savings, making virtual meetings economically attractive.">
    <rect x="20" y="322" width="760" height="85" fill="white" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Cost-Benefit Analysis Example</text>
    <rect x="40" y="352" width="340" height="50" fill="#ffebee" rx="3"/>
    <text x="50" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Direct Travel Costs (Bangalore to Hyderabad):</text>
    <text x="50" y="378" font-family="Arial" font-size="8" fill="#555">Airfare: ₹24,000 | Hotel: ₹24,000 | Meals: ₹9,000</text>
    <text x="50" y="390" font-family="Arial" font-size="8" fill="#555">Transport: ₹3,000 | Misc: ₹5,000 | <tspan font-weight="bold">Total: ₹65,000</tspan></text>
    <rect x="400" y="352" width="180" height="50" fill="#e8f5e9" rx="3"/>
    <text x="410" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Video Conference Cost:</text>
    <text x="410" y="378" font-family="Arial" font-size="8" fill="#555">Hardware: ₹8,000 (one-time)</text>
    <text x="410" y="390" font-family="Arial" font-size="8" fill="#555">Software: ₹15,000/yr | <tspan font-weight="bold">First meeting: ₹23,000</tspan></text>
    <rect x="600" y="352" width="170" height="50" fill="#e3f2fd" rx="3"/>
    <text x="610" y="366" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Savings Calculation:</text>
    <text x="610" y="378" font-family="Arial" font-size="8" fill="#555">₹65,000 - ₹23,000 = ₹42,000</text>
    <text x="610" y="390" font-family="Arial" font-size="8" fill="#1976d2" font-weight="bold">65% Cost Savings!</text>
  </g>
  
  <g class="step" id="step5" data-narration="Video conferencing security employs robust authentication, encryption protocols, and granular access control mechanisms. TLS safeguards signaling pathways while SRTP shields media transmissions from interception and unauthorized access.">
    <rect x="20" y="410" width="760" height="85" fill="white" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Security Considerations</text>
    <rect x="40" y="440" width="240" height="50" fill="#f3e5f5" rx="3"/>
    <text x="50" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Authentication Methods:</text>
    <text x="50" y="466" font-family="Arial" font-size="8" fill="#555">Password protection</text>
    <text x="50" y="478" font-family="Arial" font-size="8" fill="#555">Waiting room feature</text>
    <text x="50" y="490" font-family="Arial" font-size="8" fill="#555">Corporate identity integration</text>
    <rect x="300" y="440" width="240" height="50" fill="#f3e5f5" rx="3"/>
    <text x="310" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Encryption Protocols:</text>
    <text x="310" y="466" font-family="Arial" font-size="8" fill="#555">TLS: Transport Layer Security</text>
    <text x="310" y="478" font-family="Arial" font-size="8" fill="#555">SRTP: Secure Real-time Transport</text>
    <text x="310" y="490" font-family="Arial" font-size="8" fill="#555">End-to-end encryption</text>
    <rect x="560" y="440" width="200" height="50" fill="#f3e5f5" rx="3"/>
    <text x="570" y="454" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Privacy Concerns:</text>
    <text x="570" y="466" font-family="Arial" font-size="8" fill="#555">Unauthorized recording</text>
    <text x="570" y="478" font-family="Arial" font-size="8" fill="#555">Screen share exposure</text>
    <text x="570" y="490" font-family="Arial" font-size="8" fill="#555">Zoom bombing prevention</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key points: H.323 is the standard for IP video conferencing. QoS requires latency under 150ms, jitter under 30ms, and packet loss under 1%. Organizations save 50-70% on travel costs.">
    <rect x="20" y="498" width="760" height="90" fill="white" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Key Points Summary</text>
    <rect x="40" y="528" width="180" height="55" fill="#e3f2fd" rx="3"/>
    <text x="50" y="542" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Standards:</text>
    <text x="50" y="554" font-family="Arial" font-size="8" fill="#555">H.320: ISDN based</text>
    <text x="50" y="564" font-family="Arial" font-size="8" fill="#555">H.323: IP based</text>
    <text x="50" y="574" font-family="Arial" font-size="8" fill="#555">H.264/H.265: Codecs</text>
    <rect x="240" y="528" width="180" height="55" fill="#e3f2fd" rx="3"/>
    <text x="250" y="542" font-family="Arial" font-size="9" font-weight="bold" fill="#333">QoS Thresholds:</text>
    <text x="250" y="554" font-family="Arial" font-size="8" fill="#555">Latency: &lt;150ms</text>
    <text x="250" y="564" font-family="Arial" font-size="8" fill="#555">Jitter: &lt;30ms</text>
    <text x="250" y="574" font-family="Arial" font-size="8" fill="#555">Packet Loss: &lt;1%</text>
    <rect x="440" y="528" width="180" height="55" fill="#e3f2fd" rx="3"/>
    <text x="450" y="542" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Bandwidth:</text>
    <text x="450" y="554" font-family="Arial" font-size="8" fill="#555">SD: 512Kbps-1Mbps</text>
    <text x="450" y="564" font-family="Arial" font-size="8" fill="#555">HD: 1.5-2 Mbps</text>
    <text x="450" y="574" font-family="Arial" font-size="8" fill="#555">4K: 8-10 Mbps</text>
    <rect x="640" y="528" width="120" height="55" fill="#e8f5e9" rx="3"/>
    <text x="650" y="542" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Benefits:</text>
    <text x="650" y="554" font-family="Arial" font-size="8" fill="#555">50-70% cost savings</text>
    <text x="650" y="564" font-family="Arial" font-size="8" fill="#555">Reduced carbon footprint</text>
    <text x="650" y="574" font-family="Arial" font-size="8" fill="#555">Increased productivity</text>
  </g>
</svg>