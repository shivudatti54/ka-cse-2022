<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Functionality defines what a software system does. It encompasses all features, capabilities, and core services that meet user needs and business requirements.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Functionality in Software Engineering</text>
  </g>
  
  <g class="step" id="step1" data-narration="Functionality represents behavioral aspects - the specific tasks and operations a system performs to meet user requirements and business objectives.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Functionality?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">The set of functions a software system performs to meet user requirements.</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">Includes: data processing, calculations, business logic, and user interface interactions.</text>
    <rect x="550" y="70" width="180" height="50" fill="#e3f2fd" rx="3"/>
    <text x="640" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Defines WHAT</text>
    <text x="640" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">the system does</text>
  </g>
  
  <g class="step" id="step2" data-narration="Functional requirements specify what the system must do. Each requirement defines a specific task or service the system should provide.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Functional Requirements</text>
    <text x="40" y="183" font-family="Arial" font-size="10" fill="#333">Specific statements describing what the system must do. Examples:</text>
    <rect x="40" y="193" width="220" height="25" fill="#e8f5e9" rx="3"/>
    <text x="50" y="210" font-family="Arial" font-size="9" fill="#388e3c">Transfer funds between accounts</text>
    <rect x="270" y="193" width="220" height="25" fill="#e8f5e9" rx="3"/>
    <text x="280" y="210" font-family="Arial" font-size="9" fill="#388e3c">Display account balance</text>
    <rect x="500" y="193" width="220" height="25" fill="#e8f5e9" rx="3"/>
    <text x="510" y="210" font-family="Arial" font-size="9" fill="#388e3c">Generate monthly statements</text>
  </g>
  
  <g class="step" id="step3" data-narration="Functional decomposition breaks major functions into smaller sub-functions recursively until each represents a single well-defined task that is easy to understand and implement.">
    <rect x="20" y="234" width="760" height="115" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Functional Decomposition</text>
    <text x="40" y="271" font-family="Arial" font-size="10" fill="#333">Top-down approach: break complex functions into simpler sub-functions.</text>
    
    <rect x="250" y="285" width="80" height="22" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="290" y="300" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">System</text>
    <line x1="290" y1="307" x2="290" y2="320" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="180" y="324" width="100" height="20" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="230" y="338" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Function A</text>
    
    <rect x="300" y="324" width="100" height="20" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="350" y="338" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Function B</text>
    
    <rect x="420" y="324" width="100" height="20" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="470" y="338" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Function C</text>
  </g>
  
  <g class="step" id="step4" data-narration="Core functions are essential operations defining primary purpose and value. Auxiliary functions support core functions with administrative tasks, data management, and system maintenance.">
    <rect x="20" y="357" width="360" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="377" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Core Functions</text>
    <text x="40" y="394" font-family="Arial" font-size="10" fill="#333">Essential operations defining</text>
    <text x="40" y="407" font-family="Arial" font-size="10" fill="#333">system's primary purpose.</text>
    <rect x="40" y="417" width="200" height="12" fill="#f3e5f5" rx="2"/>
    <text x="50" y="426" font-family="Arial" font-size="8" fill="#9c27b0">Primary value proposition</text>
    
    <rect x="420" y="357" width="360" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="440" y="377" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Auxiliary Functions</text>
    <text x="440" y="394" font-family="Arial" font-size="10" fill="#333">Support core functions:</text>
    <text x="440" y="407" font-family="Arial" font-size="10" fill="#333">Admin tasks, data management,</text>
    <text x="440" y="420" font-family="Arial" font-size="10" fill="#333">system maintenance</text>
  </g>
  
  <g class="step" id="step5" data-narration="A functional requirement follows the format: Trigger → Input → Processing → Output → Destination. Each function must be testable and verifiable.">
    <rect x="20" y="445" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="465" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Functional Requirement Format</text>
    
    <rect x="40" y="480" width="120" height="35" fill="#e3f2fd" rx="3"/>
    <text x="100" y="493" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Trigger</text>
    <text x="100" y="507" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Event</text>
    
    <line x1="160" y1="497" x2="180" y2="497" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="190" y="480" width="120" height="35" fill="#e8f5e9" rx="3"/>
    <text x="250" y="493" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Input</text>
    <text x="250" y="507" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Data</text>
    
    <line x1="310" y1="497" x2="330" y2="497" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="340" y="480" width="120" height="35" fill="#fff3e0" rx="3"/>
    <text x="400" y="493" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Processing</text>
    <text x="400" y="507" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Logic</text>
    
    <line x1="460" y1="497" x2="480" y2="497" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="490" y="480" width="120" height="35" fill="#f3e5f5" rx="3"/>
    <text x="550" y="493" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Output</text>
    <text x="550" y="507" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Result</text>
    
    <line x1="610" y1="497" x2="630" y2="497" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="640" y="480" width="120" height="35" fill="#ffebee" rx="3"/>
    <text x="700" y="493" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Destination</text>
    <text x="700" y="507" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">User/System</text>
  </g>
  
  <g class="step" id="step6" data-narration="Functionality testing verifies each function works as specified through systematic input-output validation. Requirements must be complete, consistent, and verifiable for effective testing.">
    <rect x="20" y="533" width="760" height="60" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="553" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Functionality Testing</text>
    <text x="40" y="570" font-family="Arial" font-size="10" fill="#333">Verifies each function works as specified. Ensures correct results for valid inputs</text>
    <text x="40" y="583" font-family="Arial" font-size="10" fill="#333">and proper handling of invalid inputs. Must be complete, consistent, and verifiable.</text>
  </g>
</svg>