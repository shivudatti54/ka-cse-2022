<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about increased number of separate functions, a fundamental principle in software engineering that promotes better program design and organization.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="4"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Increased Number of Separate Functions</text>
  </g>
  
  <g class="step" id="step1" data-narration="Function decomposition breaks complex problems into smaller, manageable tasks. Each function should have a single purpose, clear interface, and perform one specific operation.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="4"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Function Decomposition</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Breaking complex problems into smaller, manageable sub-problems handled by separate functions.</text>
    <text x="40" y="112" font-family="Arial" font-size="9" fill="#555">• Each function has single, well-defined purpose</text>
    <text x="40" y="125" font-family="Arial" font-size="9" fill="#555">• Functions are independent with simple interfaces</text>
  </g>
  
  <g class="step" id="step2" data-narration="Cohesion measures how well elements inside a function work together. Higher cohesion means better design, with functional cohesion being ideal and most desirable.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="4"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Cohesion (How well elements belong together)</text>
    <rect x="40" y="178" width="340" height="40" fill="#c8e6c9" rx="3"/>
    <text x="50" y="192" font-family="Arial" font-size="9" fill="#2e7d32">Weak → Strong:</text>
    <text x="50" y="206" font-family="Arial" font-size="8" fill="#333">Coincidental → Logical → Temporal → Procedural → Communicational → Sequential → Functional</text>
    <rect x="400" y="178" width="180" height="40" fill="#a5d6a7" rx="3"/>
    <text x="410" y="200" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">IDEAL: Functional Cohesion</text>
    <text x="410" y="212" font-family="Arial" font-size="8" fill="#2e7d32">Each element contributes to exactly one task</text>
  </g>
  
  <g class="step" id="step3" data-narration="Coupling measures interdependence between different modules in a system. Lower coupling is generally preferred, with data coupling being the ideal goal to achieve.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="4"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Coupling (Interdependence between modules)</text>
    <rect x="40" y="266" width="340" height="40" fill="#ffe0b2" rx="3"/>
    <text x="50" y="280" font-family="Arial" font-size="9" fill="#e65100">High Coupling (Avoid):</text>
    <text x="50" y="294" font-family="Arial" font-size="8" fill="#333">Content → Common → Control → Stamp</text>
    <rect x="400" y="266" width="180" height="40" fill="#ffcc80" rx="3"/>
    <text x="410" y="288" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">BEST: Data Coupling</text>
    <text x="410" y="300" font-family="Arial" font-size="8" fill="#333">Modules communicate via parameters only</text>
  </g>
  
  <g class="step" id="step4" data-narration="More separate functions provide five key benefits: improved code readability, easier unit testing, enhanced reusability across projects, better long-term maintainability, and smoother team collaboration.">
    <rect x="20" y="322" width="760" height="80" fill="#e8f5e9" rx="4"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">4. Benefits of More Separate Functions</text>
    <rect x="40" y="354" width="145" height="40" fill="#c8e6c9" rx="3"/>
    <text x="50" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Readability</text>
    <text x="50" y="380" font-family="Arial" font-size="8" fill="#333">Self-documenting code</text>
    <rect x="195" y="354" width="145" height="40" fill="#c8e6c9" rx="3"/>
    <text x="205" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Testing</text>
    <text x="205" y="380" font-family="Arial" font-size="8" fill="#333">Unit testing possible</text>
    <rect x="350" y="354" width="145" height="40" fill="#c8e6c9" rx="3"/>
    <text x="360" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Reusability</text>
    <text x="360" y="380" font-family="Arial" font-size="8" fill="#333">Use across programs</text>
    <rect x="505" y="354" width="145" height="40" fill="#c8e6c9" rx="3"/>
    <text x="515" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Maintainability</text>
    <text x="515" y="380" font-family="Arial" font-size="8" fill="#333">Changes isolated</text>
    <rect x="660" y="354" width="110" height="40" fill="#c8e6c9" rx="3"/>
    <text x="670" y="368" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Collaboration</text>
    <text x="670" y="380" font-family="Arial" font-size="8" fill="#333">Parallel work</text>
  </g>
  
  <g class="step" id="step5" data-narration="Over-decomposition has notable drawbacks including performance overhead from excessive function calls, increased naming complexity, and difficulty with mental context switching while reading code.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="4"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. Trade-offs & Considerations</text>
    <rect x="40" y="442" width="230" height="40" fill="#ffcdd2" rx="3"/>
    <text x="50" y="456" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Over-decomposition</text>
    <text x="50" y="470" font-family="Arial" font-size="8" fill="#333">Too many tiny functions</text>
    <rect x="280" y="442" width="230" height="40" fill="#ffcdd2" rx="3"/>
    <text x="290" y="456" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Performance Impact</text>
    <text x="290" y="470" font-family="Arial" font-size="8" fill="#333">Function call overhead</text>
    <rect x="520" y="442" width="250" height="40" fill="#ffcdd2" rx="3"/>
    <text x="530" y="456" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Context Switching</text>
    <text x="530" y="470" font-family="Arial" font-size="8" fill="#333">Hard to follow code flow</text>
  </g>
  
  <g class="step" id="step6" data-narration="A practical example shows payroll calculation properly decomposed into separate functions: read employee data, calculate regular pay, calculate overtime, compute tax, process deductions, and print the paycheck.">
    <rect x="20" y="498" width="760" height="90" fill="#f3e5f5" rx="4"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">6. Example: Payroll System Decomposition</text>
    <rect x="40" y="528" width="740" height="52" fill="#e1bee7" rx="3"/>
    <text x="50" y="544" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Poor Design (Single Function):</text>
    <text x="50" y="558" font-family="Courier" font-size="8" fill="#333">calculatePayroll() → Does everything!</text>
    <text x="50" y="572" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Good Design (Decomposed):</text>
    <text x="160" y="572" font-family="Courier" font-size="8" fill="#333">readEmployeeData() → calculateRegularPay() → calculateOvertimePay() → calculateTax() → printPaycheck()</text>
  </g>
</svg>