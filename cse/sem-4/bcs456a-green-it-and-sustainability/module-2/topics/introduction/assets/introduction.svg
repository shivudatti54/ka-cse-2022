<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
<marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
</marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="Stack and Queue are fundamental linear data structures in computer science that organize data with specific access patterns for different use cases.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Stack and Queue - Introduction</text>
</g>
<g class="step" id="step1" data-narration="A Stack follows Last In First Out (LIFO) principle - the most recently added element is removed first, similar to a stack of plates in a cafeteria.">
<rect x="20" y="58" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
<text x="400" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">STACK (LIFO - Last In First Out)</text>
<rect x="50" y="88" width="40" height="40" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
<text x="70" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">10</text>
<rect x="50" y="88" width="40" height="20" fill="#90caf9"/>
<text x="70" y="101" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Top</text>
<line x1="130" y1="98" x2="160" y2="98" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
<text x="170" y="98" font-family="Arial" font-size="9" fill="#333">Push adds to top</text>
<text x="170" y="112" font-family="Arial" font-size="9" fill="#333">Pop removes from top</text>
<text x="750" y="98" text-anchor="end" font-family="Arial" font-size="9" fill="#666">Example: push 10, push 20 → pop returns 20 first</text>
</g>
<g class="step" id="step2" data-narration="A Queue follows First In First Out (FIFO) principle - elements are added at the rear and removed from the front, like people waiting in a line.">
<rect x="20" y="151" width="760" height="85" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
<text x="400" y="168" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">QUEUE (FIFO - First In First Out)</text>
<rect x="60" y="185" width="30" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
<text x="75" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">F</text>
<rect x="95" y="185" width="30" height="40" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
<text x="110" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">10</text>
<rect x="130" y="185" width="30" height="40" fill="#81c784" stroke="#388e3c" stroke-width="1"/>
<text x="145" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">20</text>
<rect x="165" y="185" width="30" height="40" fill="#66bb6a" stroke="#388e3c" stroke-width="1"/>
<text x="180" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">30</text>
<rect x="200" y="185" width="30" height="40" fill="#4caf50" stroke="#388e3c" stroke-width="1"/>
<text x="215" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">R</text>
<text x="280" y="195" font-family="Arial" font-size="9" fill="#333">Enqueue → Rear</text>
<text x="280" y="209" font-family="Arial" font-size="9" fill="#333">Dequeue ← Front</text>
<text x="750" y="195" text-anchor="end" font-family="Arial" font-size="9" fill="#666">Example: enqueue 10,20,30 → dequeue returns 10 first</text>
</g>
<g class="step" id="step3" data-narration="Stack operations include push to add elements, pop to remove from top, peek to view top element, and isEmpty isFull to check status efficiently.">
<rect x="20" y="244" width="370" height="85" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
<text x="205" y="261" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Stack Operations</text>
<rect x="50" y="275" width="60" height="35" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
<text x="80" y="297" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">push(x)</text>
<rect x="120" y="275" width="60" height="35" fill="#ffcc80" stroke="#ff9800" stroke-width="1"/>
<text x="150" y="297" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">pop()</text>
<rect x="190" y="275" width="60" height="35" fill="#ffb74d" stroke="#ff9800" stroke-width="1"/>
<text x="220" y="297" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">peek()</text>
<rect x="260" y="275" width="60" height="35" fill="#ffa726" stroke="#ff9800" stroke-width="1"/>
<text x="290" y="297" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">isEmpty</text>
<text x="205" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">All operations O(1) time complexity</text>
<g class="step" id="step4" data-narration="Queue operations include enqueue to add at rear, dequeue to remove from front, front and rear to view elements at both ends.">
<rect x="405" y="244" width="375" height="85" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
<text x="592" y="261" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Queue Operations</text>
<rect x="430" y="275" width="60" height="35" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
<text x="460" y="297" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">enqueue</text>
<rect x="500" y="275" width="60" height="35" fill="#ce93d8" stroke="#9c27b0" stroke-width="1"/>
<text x="530" y="297" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">dequeue</text>
<rect x="570" y="275" width="60" height="35" fill="#ba68c8" stroke="#9c27b0" stroke-width="1"/>
<text x="600" y="297" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">front</text>
<rect x="640" y="275" width="60" height="35" fill="#ab47bc" stroke="#9c27b0" stroke-width="1"/>
<text x="670" y="297" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">rear</text>
<text x="592" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">All operations O(1) time complexity</text>
</g>
<g class="step" id="step5" data-narration="Types of queues include Simple Queue (linear), Circular Queue wraps around using modulo, Priority Queue processes by importance, and Deque allows both ends.">
<rect x="20" y="337" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
<text x="400" y="354" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Types of Queues</text>
<rect x="40" y="368" width="160" height="45" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
<text x="120" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#0d47a1">Simple Queue</text>
<text x="120" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Linear FIFO</text>
<rect x="210" y="368" width="160" height="45" fill="#90caf9" stroke="#1976d2" stroke-width="1"/>
<text x="290" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#0d47a1">Circular Queue</text>
<text x="290" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Wraps (rear+1)%MAX</text>
<rect x="380" y="368" width="160" height="45" fill="#64b5f6" stroke="#1976d2" stroke-width="1"/>
<text x="460" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#0d47a1">Priority Queue</text>
<text x="460" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">By importance</text>
<rect x="550" y="368" width="160" height="45" fill="#42a5f5" stroke="#1976d2" stroke-width="1"/>
<text x="630" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Deque</text>
<text x="630" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Both ends</text>
<rect x="720" y="368" width="60" height="45" fill="#1976d2" stroke="#0d47a1" stroke-width="1"/>
<text x="750" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">No memory waste</text>
</g>
<g class="step" id="step6" data-narration="Exam tips: Remember LIFO equals Stack and FIFO equals Queue always. Always check overflow before push, underflow before pop, and use modulo for circular queue indices.">
<rect x="20" y="430" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
<text x="400" y="447" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Exam Tips &amp; Implementation</text>
<rect x="40" y="460" width="145" height="42" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
<text x="112" y="478" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Remember</text>
<text x="112" y="492" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">LIFO = Stack</text>
<text x="112" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">FIFO = Queue</text>
<rect x="195" y="460" width="145" height="42" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
<text x="267" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Always Check</text>
<text x="267" y="492" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Overflow before push</text>
<text x="267" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Underflow before pop</text>
<rect x="350" y="460" width="145" height="42" fill="#81c784" stroke="#388e3c" stroke-width="1"/>
<text x="422" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Circular Queue</text>
<text x="422" y="492" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Full: (rear+1)%MAX==front</text>
<text x="422" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Empty: front==rear</text>
<rect x="505" y="460" width="130" height="42" fill="#66bb6a" stroke="#2e7d32" stroke-width="1"/>
<text x="570" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">Array Implementation</text>
<text x="570" y="492" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Fixed size • O(1) access</text>
<rect x="645" y="460" width="125" height="42" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
<text x="707" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">Linked List Impl</text>
<text x="707" y="492" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Dynamic • No overflow</text>
</g>
</g>
</svg>