<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This lecture covers dematerialization of product chain, explaining how physical products transform into digital alternatives that eliminate traditional supply chain steps entirely.">
    <rect x="0" y="0" width="800" height="40" fill="#1976d2"/>
    <text x="400" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Dematerialization of Product Chain</text>
  </g>
  
  <!-- step1: Definition -->
  <g class="step" id="step1" data-narration="Dematerialization replaces physical goods with digital equivalents, eliminating supply chain steps like manufacturing, warehousing, physical distribution, and retail operations through electronic delivery.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is Dematerialization?</text>
    <text x="40" y="95" font-family="Arial" font-size="11" fill="#333">Process of replacing physical products, processes, and services with digital</text>
    <text x="40" y="110" font-family="Arial" font-size="11" fill="#333">alternatives that serve the same function without material substance.</text>
    <text x="40" y="128" font-family="Arial" font-size="10" fill="#666">Key: Digital data replaces physical goods flow in supply chain</text>
  </g>
  
  <!-- step2: Three Types -->
  <g class="step" id="step2" data-narration="Three types exist: product dematerialization converts physical goods like books into digital formats, process dematerialization shifts paper workflows to electronic, and service dematerialization moves delivery online.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Three Types of Dematerialization</text>
    <rect x="40" y="178" width="220" height="40" fill="#c8e6c9" rx="4"/>
    <text x="50" y="193" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Product</text>
    <text x="50" y="208" font-family="Arial" font-size="9" fill="#2e7d32">Books→E-books, CDs→Streaming</text>
    <rect x="270" y="178" width="220" height="40" fill="#c8e6c9" rx="4"/>
    <text x="280" y="193" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Process</text>
    <text x="280" y="208" font-family="Arial" font-size="9" fill="#2e7d32">Paper invoices→E-invoicing</text>
    <rect x="500" y="178" width="220" height="40" fill="#c8e6c9" rx="4"/>
    <text x="510" y="193" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Service</text>
    <text x="510" y="208" font-family="Arial" font-size="9" fill="#2e7d32">Telemedicine, online education</text>
  </g>
  
  <!-- step3: Components -->
  <g class="step" id="step3" data-narration="The dematerialized product chain includes digital product creation, electronic payment systems, digital rights management for IP protection, and customer authentication for secure access.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Components of Dematerialized Product Chain</text>
    <rect x="40" y="268" width="145" height="38" fill="#ffe0b2" rx="3"/>
    <text x="48" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Digital Product</text>
    <text x="48" y="296" font-family="Arial" font-size="8" fill="#e65100">Creation</text>
    <rect x="195" y="268" width="145" height="38" fill="#ffe0b2" rx="3"/>
    <text x="203" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Electronic</text>
    <text x="203" y="296" font-family="Arial" font-size="8" fill="#e65100">Payment Systems</text>
    <rect x="350" y="268" width="145" height="38" fill="#ffe0b2" rx="3"/>
    <text x="358" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Digital Rights</text>
    <text x="358" y="296" font-family="Arial" font-size="8" fill="#e65100">Management</text>
    <rect x="505" y="268" width="145" height="38" fill="#ffe0b2" rx="3"/>
    <text x="513" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Customer</text>
    <text x="513" y="296" font-family="Arial" font-size="8" fill="#e65100">Authentication</text>
  </g>
  
  <!-- step4: Traditional vs Dematerialized -->
  <g class="step" id="step4" data-narration="Traditional supply chains require inventory, transportation, warehouses, and retail stores. Dematerialized chains use digital infrastructure, cloud storage, and online platforms instead.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Traditional vs Dematerialized Supply Chain</text>
    <rect x="40" y="355" width="350" height="40" fill="#e1bee7" rx="4"/>
    <text x="50" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Traditional Chain</text>
    <text x="50" y="385" font-family="Arial" font-size="9" fill="#6a1b9a">Inventory, Transportation, Warehousing, Retail</text>
    <rect x="400" y="355" width="350" height="40" fill="#e1bee7" rx="4"/>
    <text x="410" y="370" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Dematerialized Chain</text>
    <text x="410" y="385" font-family="Arial" font-size="9" fill="#6a1b9a">Digital Infrastructure, Cloud Storage, Online Platforms</text>
  </g>
  
  <!-- step5: Examples -->
  <g class="step" id="step5" data-narration="Practical examples include software shifting from physical CDs to downloads, banking moving from branches to mobile apps, and media transforming from CDs to streaming services.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Real-World Examples</text>
    <rect x="40" y="445" width="240" height="38" fill="#ffcdd2" rx="4"/>
    <text x="50" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Software Distribution</text>
    <text x="50" y="475" font-family="Arial" font-size="9" fill="#c62828">Physical CDs → Digital Downloads</text>
    <rect x="290" y="445" width="240" height="38" fill="#ffcdd2" rx="4"/>
    <text x="300" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Financial Services</text>
    <text x="300" y="475" font-family="Arial" font-size="9" fill="#c62828">Branch Banking → Mobile Apps</text>
    <rect x="540" y="445" width="240" height="38" fill="#ffcdd2" rx="4"/>
    <text x="550" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Media Industry</text>
    <text x="550" y="475" font-family="Arial" font-size="9" fill="#c62828">Music CDs → Streaming Services</text>
  </g>
  
  <!-- step6: Advantages and Challenges -->
  <g class="step" id="step6" data-narration="Dematerialization offers cost reduction, instant global delivery, and environmental benefits. However, challenges include cybersecurity risks, digital divide issues, and infrastructure requirements.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Advantages and Challenges</text>
    <rect x="40" y="530" width="345" height="52" fill="#bbdefb" rx="4"/>
    <text x="50" y="545" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">Advantages</text>
    <text x="50" y="560" font-family="Arial" font-size="9" fill="#0d47a1">• Cost reduction (no manufacturing, transport)</text>
    <text x="50" y="573" font-family="Arial" font-size="9" fill="#0d47a1">• Instant global delivery via internet</text>
    <rect x="395" y="530" width="345" height="52" fill="#ffecb3" rx="4"/>
    <text x="405" y="545" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Challenges</text>
    <text x="405" y="560" font-family="Arial" font-size="9" fill="#e65100">• Cybersecurity risks and data protection</text>
    <text x="405" y="573" font-family="Arial" font-size="9" fill="#e65100">• Digital divide and infrastructure needs</text>
  </g>
</svg>