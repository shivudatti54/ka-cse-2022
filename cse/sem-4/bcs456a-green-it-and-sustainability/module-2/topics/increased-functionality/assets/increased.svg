<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <g id="step0" data-narration="Inheritance in OOP allows classes to acquire properties and behaviors from existing classes, increasing functionality through extension and reuse of code efficiently in software design.">
    <rect x="50" y="10" width="700" height="40" fill="#1976d2" rx="8"/>
    <text x="400" y="38" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">Inheritance and Extending Functionality</text>
  </g>
  <g id="step1" data-narration="A base class defines common attributes and methods that can be inherited by derived classes, promoting code reusability and establishing hierarchical relationships between different class types.">
    <rect x="50" y="60" width="700" height="85" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="87" font-size="14" fill="#1976d2" font-weight="bold">Base Class (Parent)</text>
    <rect x="70" y="97" width="120" height="40" fill="#1976d2" rx="6"/>
    <text x="130" y="122" font-size="12" fill="#ffffff" text-anchor="middle">Vehicle</text>
    <text x="70" y="137" font-size="10" fill="#333">- brand: String</text>
    <text x="70" y="149" font-size="10" fill="#333">+ start(): void</text>
    <path d="M 200 117 L 280 117" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="240" y="107" font-size="10" fill="#1976d2">extends</text>
    <text x="320" y="87" font-size="14" fill="#388e3c" font-weight="bold">Derived Class (Child)</text>
    <rect x="320" y="97" width="120" height="40" fill="#388e3c" rx="6"/>
    <text x="380" y="122" font-size="12" fill="#ffffff" text-anchor="middle">Car</text>
    <text x="460" y="109" font-size="10" fill="#333">Inherits: brand, start()</text>
    <text x="460" y="124" font-size="10" fill="#388e3c">+ wheels: int</text>
    <text x="460" y="139" font-size="10" fill="#388e3c">+ honk(): void</text>
  </g>
  <g id="step2" data-narration="Java supports single, multilevel, hierarchical, and hybrid inheritance patterns. C++ additionally supports multiple inheritance through multiple direct base classes for greater flexibility in class design.">
    <rect x="50" y="155" width="700" height="85" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="182" font-size="14" fill="#388e3c" font-weight="bold">Types of Inheritance</text>
    <rect x="70" y="199" width="100" height="35" fill="#388e3c" rx="5"/>
    <text x="120" y="221" font-size="11" fill="#ffffff" text-anchor="middle">Single</text>
    <text x="180" y="216" font-size="10" fill="#333">One parent</text>
    <rect x="240" y="199" width="100" height="35" fill="#388e3c" rx="5"/>
    <text x="290" y="221" font-size="11" fill="#ffffff" text-anchor="middle">Multilevel</text>
    <text x="350" y="216" font-size="10" fill="#333">Parent-Child-Grandchild</text>
    <rect x="430" y="199" width="100" height="35" fill="#388e3c" rx="5"/>
    <text x="480" y="221" font-size="11" fill="#ffffff" text-anchor="middle">Hierarchical</text>
    <text x="540" y="216" font-size="10" fill="#333">One parent, many children</text>
    <rect x="620" y="199" width="100" height="35" fill="#388e3c" rx="5"/>
    <text x="670" y="221" font-size="11" fill="#ffffff" text-anchor="middle">Multiple</text>
    <text x="670" y="234" font-size="10" fill="#333">(C++ only)</text>
  </g>
  <g id="step3" data-narration="Method overriding allows a subclass to provide a specific implementation of a method already defined in its parent class, enabling runtime polymorphism and customizing inherited behavior dynamically.">
    <rect x="50" y="250" width="700" height="85" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="277" font-size="14" fill="#ff9800" font-weight="bold">Method Overriding Example</text>
    <rect x="70" y="291" width="250" height="38" fill="#ff9800" rx="5"/>
    <text x="195" y="314" font-size="11" fill="#ffffff" text-anchor="middle">class Animal { void speak() { "Sound" } }</text>
    <path d="M 330 310 L 380 310" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="355" y="301" font-size="10" fill="#ff9800">override</text>
    <rect x="390" y="291" width="250" height="38" fill="#ff9800" rx="5"/>
    <text x="515" y="314" font-size="11" fill="#ffffff" text-anchor="middle">class Dog extends Animal { @Override speak() { "Barks" } }</text>
  </g>
  <g id="step4" data-narration="The super keyword calls the parent constructor, accesses parent methods, and ensures proper initialization in the inheritance chain by explicitly referencing the superclass members and constructors.">
    <rect x="50" y="345" width="700" height="85" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="372" font-size="14" fill="#9c27b0" font-weight="bold">Using super Keyword</text>
    <rect x="70" y="388" width="300" height="36" fill="#9c27b0" rx="5"/>
    <text x="220" y="411" font-size="11" fill="#ffffff" text-anchor="middle">class SavingsAccount extends Account</text>
    <text x="380" y="405" font-size="10" fill="#333">SavingsAccount(String id, double bal) {</text>
    <text x="380" y="420" font-size="10" fill="#9c27b0">super(id, bal);</text>
    <text x="380" y="433" font-size="10" fill="#333">}</text>
    <text x="550" y="393" font-size="10" fill="#333">Calls parent constructor</text>
    <text x="550" y="408" font-size="10" fill="#9c27b0">super.methodName()</text>
    <text x="550" y="423" font-size="10" fill="#333">Calls parent method</text>
  </g>
  <g id="step5" data-narration="Abstract classes can have both abstract and concrete methods with single inheritance. Interfaces provide 100% abstraction and support multiple implementations in Java for flexible contract-based design.">
    <rect x="50" y="440" width="700" height="85" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="467" font-size="14" fill="#f44336" font-weight="bold">Abstract Classes vs Interfaces</text>
    <rect x="70" y="482" width="200" height="38" fill="#f44336" rx="5"/>
    <text x="170" y="505" font-size="11" fill="#ffffff" text-anchor="middle">abstract class Shape</text>
    <text x="280" y="505" font-size="10" fill="#333">{ abstract double area(); }</text>
    <rect x="400" y="482" width="180" height="38" fill="#f44336" rx="5"/>
    <text x="490" y="505" font-size="11" fill="#ffffff" text-anchor="middle">interface Drawable</text>
    <text x="590" y="505" font-size="10" fill="#333">{ void draw(); }</text>
    <text x="70" y="528" font-size="10" fill="#333">Can have concrete methods</text>
    <text x="220" y="528" font-size="10" fill="#333">Single inheritance</text>
    <text x="400" y="528" font-size="10" fill="#333">100% abstraction</text>
    <text x="520" y="528" font-size="10" fill="#333">Multiple implementation</text>
  </g>
  <g id="step6" data-narration="Runtime polymorphism allows a parent reference variable to hold child objects. Method calls are dynamically resolved at runtime based on the actual object type for flexible behavior.">
    <rect x="50" y="535" width="700" height="55" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="562" font-size="14" fill="#1976d2" font-weight="bold">Runtime Polymorphism</text>
    <text x="280" y="562" font-size="11" fill="#333">Shape s = new Circle(5);</text>
    <text x="520" y="562" font-size="11" fill="#333">s.area() calls Circle's implementation</text>
    <text x="280" y="580" font-size="10" fill="#388e3c">Parent reference, child object</text>
    <text x="520" y="580" font-size="10" fill="#ff9800">Dynamic method dispatch</text>
  </g>
</svg>