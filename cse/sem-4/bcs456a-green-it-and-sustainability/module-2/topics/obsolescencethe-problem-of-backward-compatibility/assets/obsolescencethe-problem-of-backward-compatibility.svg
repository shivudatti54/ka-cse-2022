<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic explains obsolescence in software systems and how backward compatibility helps manage it across technology generations, preserving long-term investments.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">Obsolescence and Backward Compatibility</text>
  </g>
  
  <g class="step" id="step1" data-narration="Obsolescence makes technology outdated and unusable. Backward compatibility ensures new systems work with old data, interfaces, and legacy components over time.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">1. What Are Obsolescence and Backward Compatibility?</text>
    <rect x="40" y="92" width="340" height="36" fill="#bbdefb" rx="4"/>
    <text x="50" y="108" font-family="Arial" font-size="9" fill="#0d47a1">Obsolescence: Process by which</text>
    <text x="50" y="120" font-family="Arial" font-size="9" fill="#0d47a1">technology becomes outdated, unsupported,</text>
    <text x="50" y="132" font-family="Arial" font-size="9" fill="#0d47a1">or unusable over time.</text>
    <rect x="420" y="92" width="340" height="36" fill="#bbdefb" rx="4"/>
    <text x="430" y="108" font-family="Arial" font-size="9" fill="#0d47a1">Backward Compatibility: Property</text>
    <text x="430" y="120" font-family="Arial" font-size="9" fill="#0d47a1">allowing new systems to work with</text>
    <text x="430" y="132" font-family="Arial" font-size="9" fill="#0d47a1">old data, formats, and interfaces.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Four types of obsolescence: Functional from changed requirements, Technical from superseded standards, Economic from high maintenance costs, and Legal from regulatory changes.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">2. Types of Obsolescence</text>
    <rect x="40" y="182" width="170" height="35" fill="#ffe0b2" rx="3"/>
    <text x="50" y="196" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Functional</text>
    <text x="50" y="208" font-family="Arial" font-size="8" fill="#bf360c">Requirements change</text>
    <rect x="220" y="182" width="170" height="35" fill="#ffe0b2" rx="3"/>
    <text x="230" y="196" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Technical</text>
    <text x="230" y="208" font-family="Arial" font-size="8" fill="#bf360c">Old tech superseded</text>
    <rect x="400" y="182" width="170" height="35" fill="#ffe0b2" rx="3"/>
    <text x="410" y="196" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Economic</text>
    <text x="410" y="208" font-family="Arial" font-size="8" fill="#bf360c">Cost exceeds benefit</text>
    <rect x="580" y="182" width="170" height="35" fill="#ffe0b2" rx="3"/>
    <text x="590" y="196" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Legal</text>
    <text x="590" y="208" font-family="Arial" font-size="8" fill="#bf360c">Regulatory changes</text>
  </g>
  
  <g class="step" id="step3" data-narration="Five strategies achieve backward compatibility: preserving APIs, supporting old file formats, using emulation layers, graceful degradation, and version negotiation between systems.">
    <rect x="20" y="234" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">3. Strategies for Backward Compatibility</text>
    <rect x="40" y="270" width="135" height="36" fill="#c8e6c9" rx="3"/>
    <text x="48" y="284" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Interface Preservation</text>
    <text x="48" y="296" font-family="Arial" font-size="7" fill="#2e7d32">Maintain API signatures</text>
    <rect x="185" y="270" width="135" height="36" fill="#c8e6c9" rx="3"/>
    <text x="193" y="284" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Data Format</text>
    <text x="193" y="296" font-family="Arial" font-size="7" fill="#2e7d32">Support legacy files</text>
    <rect x="330" y="270" width="135" height="36" fill="#c8e6c9" rx="3"/>
    <text x="338" y="284" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Emulation Layers</text>
    <text x="338" y="296" font-family="Arial" font-size="7" fill="#2e7d32">Simulate old systems</text>
    <rect x="475" y="270" width="135" height="36" fill="#c8e6c9" rx="3"/>
    <text x="483" y="284" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Graceful Degradation</text>
    <text x="483" y="296" font-family="Arial" font-size="7" fill="#2e7d32">Reduce not fail</text>
    <rect x="620" y="270" width="140" height="36" fill="#c8e6c9" rx="3"/>
    <text x="628" y="284" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20">Version Negotiation</text>
    <text x="628" y="296" font-family="Arial" font-size="7" fill="#2e7d32">Agree on capabilities</text>
  </g>
  
  <g class="step" id="step4" data-narration="Maintaining backward compatibility is difficult due to accumulating complexity, security vulnerabilities in legacy code, performance trade-offs, and conflicting development priorities.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">4. Challenges of Maintaining Backward Compatibility</text>
    <rect x="40" y="358" width="230" height="36" fill="#ffcdd2" rx="3"/>
    <text x="50" y="372" font-family="Arial" font-size="9" fill="#b71c1c">Complexity Accumulation</text>
    <text x="50" y="386" font-family="Arial" font-size="8" fill="#c62828">Legacy code paths become unmanageable</text>
    <rect x="285" y="358" width="230" height="36" fill="#ffcdd2" rx="3"/>
    <text x="295" y="372" font-family="Arial" font-size="9" fill="#b71c1c">Security Vulnerabilities</text>
    <text x="295" y="386" font-family="Arial" font-size="8" fill="#c62828">Old protocols may have unfixable flaws</text>
    <rect x="530" y="358" width="230" height="36" fill="#ffcdd2" rx="3"/>
    <text x="540" y="372" font-family="Arial" font-size="9" fill="#b71c1c">Performance Trade-offs</text>
    <text x="540" y="386" font-family="Arial" font-size="8" fill="#c62828">Newer efficient formats cannot be used</text>
  </g>
  
  <g class="step" id="step5" data-narration="Semantic versioning uses major.minor.patch format: major breaks compatibility and requires caution, minor adds new features while staying compatible, and patch fixes bugs safely and predictably.">
    <rect x="20" y="410" width="760" height="92" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">5. Semantic Versioning (SemVer)</text>
    <rect x="40" y="450" width="220" height="32" fill="#e1bee7" rx="3"/>
    <text x="150" y="465" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#4a148c">MAJOR</text>
    <text x="150" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Incompatible API changes</text>
    <rect x="290" y="450" width="220" height="32" fill="#e1bee7" rx="3"/>
    <text x="400" y="465" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#4a148c">MINOR</text>
    <text x="400" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Backward-compatible features</text>
    <rect x="540" y="450" width="220" height="32" fill="#e1bee7" rx="3"/>
    <text x="650" y="465" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#4a148c">PATCH</text>
    <text x="650" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Backward-compatible fixes</text>
    <text x="150" y="498" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Example: 2.1.3 → 2.2.0 (compatible)</text>
    <text x="400" y="498" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Example: 2.1.3 → 3.0.0 (breaking)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Real-world examples: Windows preserves old APIs for compatibility, web browsers support legacy HTML/JS, and databases maintain SQL compatibility across versions.">
    <rect x="20" y="510" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="534" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">6. Real-World Examples</text>
    <rect x="40" y="548" width="230" height="32" fill="#bbdefb" rx="3"/>
    <text x="50" y="562" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Windows OS</text>
    <text x="50" y="574" font-family="Arial" font-size="8" fill="#1565c0">Win32 API stable for decades</text>
    <rect x="285" y="548" width="230" height="32" fill="#bbdefb" rx="3"/>
    <text x="295" y="562" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Web Browsers</text>
    <text x="295" y="574" font-family="Arial" font-size="8" fill="#1565c0">Old HTML4, JS still work</text>
    <rect x="530" y="548" width="230" height="32" fill="#bbdefb" rx="3"/>
    <text x="540" y="562" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Database Systems</text>
    <text x="540" y="574" font-family="Arial" font-size="8" fill="#1565c0">SQL compatibility across versions</text>
  </g>
</svg>