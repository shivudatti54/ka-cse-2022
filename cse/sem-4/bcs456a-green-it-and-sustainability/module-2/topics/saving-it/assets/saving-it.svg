<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="File handling enables permanent data storage in C. Learn to open, read, write, and close files using standard functions properly.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">File Handling and Data Persistence in C</text>
  </g>
  
  <!-- step1: FILE Structure -->
  <g class="step" id="step1" data-narration="The FILE structure stores file metadata like buffer and position. A file pointer declares a handle for file operations: FILE *fp;">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">FILE Structure &amp; File Pointer</text>
    <rect x="40" y="88" width="200" height="40" fill="#e3f2fd" rx="3"/>
    <text x="140" y="108" text-anchor="middle" font-family="Courier" font-size="11" fill="#1976d2">FILE *fp;</text>
    <text x="260" y="100" font-family="Arial" font-size="10" fill="#333">Stores file buffer,</text>
    <text x="260" y="115" font-family="Arial" font-size="10" fill="#333">position, error status</text>
    <rect x="480" y="88" width="280" height="40" fill="#fff3e0" rx="3"/>
    <text x="620" y="108" text-anchor="middle" font-family="Courier" font-size="10" fill="#ff9800">Handle for file operations</text>
  </g>
  
  <!-- step2: fopen() Modes -->
  <g class="step" id="step2" data-narration="fopen() opens files with modes: r (read), w (write), a (append). Returns NULL on failure - always check before proceeding!">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">fopen() Function &amp; Modes</text>
    <rect x="40" y="180" width="100" height="35" fill="#e8f5e9" rx="3"/>
    <text x="90" y="200" text-anchor="middle" font-family="Courier" font-size="10" fill="#388e3c">"r" - Read</text>
    <rect x="150" y="180" width="100" height="35" fill="#e8f5e9" rx="3"/>
    <text x="200" y="200" text-anchor="middle" font-family="Courier" font-size="10" fill="#388e3c">"w" - Write</text>
    <rect x="260" y="180" width="100" height="35" fill="#e8f5e9" rx="3"/>
    <text x="310" y="200" text-anchor="middle" font-family="Courier" font-size="10" fill="#388e3c">"a" - Append</text>
    <rect x="370" y="180" width="100" height="35" fill="#e8f5e9" rx="3"/>
    <text x="420" y="200" text-anchor="middle" font-family="Courier" font-size="10" fill="#388e3c">"r+" - R/W</text>
    <rect x="480" y="180" width="100" height="35" fill="#e8f5e9" rx="3"/>
    <text x="530" y="200" text-anchor="middle" font-family="Courier" font-size="10" fill="#388e3c">"w+" - R/W</text>
    <rect x="590" y="180" width="100" height="35" fill="#e8f5e9" rx="3"/>
    <text x="640" y="200" text-anchor="middle" font-family="Courier" font-size="10" fill="#388e3c">"a+" - R/W</text>
    <text x="700" y="205" font-family="Arial" font-size="9" fill="#f44336">Check NULL!</text>
  </g>
  
  <!-- step3: Writing Functions -->
  <g class="step" id="step3" data-narration="fprintf() writes formatted data like printf(). fputs() writes strings without formatting. Both functions return character count or error on success.">
    <rect x="20" y="234" width="760" height="93" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Writing to Files</text>
    <rect x="40" y="268" width="340" height="40" fill="#fff3e0" rx="3"/>
    <text x="210" y="282" text-anchor="middle" font-family="Courier" font-size="10" fill="#ff9800">fprintf(fp, "Name: %s, Age: %d", name, age);</text>
    <rect x="400" y="268" width="250" height="40" fill="#fff3e0" rx="3"/>
    <text x="525" y="282" text-anchor="middle" font-family="Courier" font-size="10" fill="#ff9800">fputs("Hello!", fp);</text>
    <text x="40" y="320" font-family="Arial" font-size="9" fill="#333">Formatted output (like printf)</text>
    <text x="400" y="320" font-family="Arial" font-size="9" fill="#333">String only (no formatting)</text>
  </g>
  
  <!-- step4: Reading Functions -->
  <g class="step" id="step4" data-narration="fscanf() reads formatted data from files, stopping at whitespace boundaries. fgets() reads entire lines including spaces and preserves newline characters properly for text processing.">
    <rect x="20" y="335" width="760" height="95" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="355" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Reading from Files</text>
    <rect x="40" y="369" width="340" height="40" fill="#f3e5f5" rx="3"/>
    <text x="210" y="383" text-anchor="middle" font-family="Courier" font-size="10" fill="#9c27b0">fscanf(fp, "%s %d", name, &amp;age);</text>
    <rect x="400" y="369" width="360" height="40" fill="#f3e5f5" rx="3"/>
    <text x="580" y="383" text-anchor="middle" font-family="Courier" font-size="10" fill="#9c27b0">fgets(buffer, sizeof(buffer), fp);</text>
    <text x="40" y="423" font-family="Arial" font-size="9" fill="#333">Stops at whitespace - good for simple data</text>
    <text x="400" y="423" font-family="Arial" font-size="9" fill="#333">Reads full line with spaces - good for names</text>
  </g>
  
  <!-- step5: Character I/O and EOF -->
  <g class="step" id="step5" data-narration="fgetc() reads one character, fputc() writes one character. EOF (-1) marks the file end. Use in loops for sequential byte processing.">
    <rect x="20" y="438" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="458" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Character I/O &amp; EOF</text>
    <rect x="40" y="472" width="240" height="40" fill="#ffebee" rx="3"/>
    <text x="160" y="488" text-anchor="middle" font-family="Courier" font-size="10" fill="#f44336">ch = fgetc(fp);</text>
    <rect x="290" y="472" width="240" height="40" fill="#ffebee" rx="3"/>
    <text x="410" y="488" text-anchor="middle" font-family="Courier" font-size="10" fill="#f44336">fputc('A', fp);</text>
    <text x="160" y="506" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Read one character</text>
    <text x="410" y="506" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Write one character</text>
    <rect x="540" y="472" width="220" height="40" fill="#ffebee" rx="3"/>
    <text x="650" y="488" text-anchor="middle" font-family="Courier" font-size="10" fill="#f44336">while(ch != EOF)</text>
    <text x="650" y="506" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Check for End Of File</text>
  </g>
  
  <!-- step6: Closing and Summary -->
  <g class="step" id="step6" data-narration="fclose() closes files, flushing buffers and releasing resources. Always close files in your application to prevent data loss and resource leaks.">
    <rect x="20" y="526" width="760" height="74" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="546" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Closing Files &amp; Best Practices</text>
    <rect x="40" y="560" width="200" height="35" fill="#e3f2fd" rx="3"/>
    <text x="140" y="580" text-anchor="middle" font-family="Courier" font-size="11" fill="#1976d2">fclose(fp);</text>
    <rect x="260" y="560" width="500" height="35" fill="#e8f5e9" rx="3"/>
    <text x="510" y="572" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Key Points:</text>
    <text x="510" y="586" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Always check NULL after fopen() | Close files with fclose() | Use "a" to append, "w" overwrites</text>
  </g>
</svg>