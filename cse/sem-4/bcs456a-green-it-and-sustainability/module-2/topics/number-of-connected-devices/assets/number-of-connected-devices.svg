<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to learning about the number of connected devices in computer networks, covering network topologies, connection formulas, and the roles of various network devices in data transmission.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">Number of Connected Devices in Computer Networks</text>
  </g>
  
  <!-- step1: Network Topologies Overview -->
  <g class="step" id="step1" data-narration="Five main network topologies exist: bus uses a single backbone cable, star connects to a central hub, ring forms a closed loop, mesh links every device to every other, and tree combines star and bus in a hierarchy.">
    <rect x="20" y="58" width="760" height="100" rx="5" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Network Topologies</text>
    
    <!-- Bus -->
    <rect x="40" y="85" width="130" height="65" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <line x1="50" y1="117" x2="160" y2="117" stroke="#ff9800" stroke-width="2"/>
    <circle cx="70" cy="117" r="4" fill="#ff9800"/>
    <circle cx="100" cy="117" r="4" fill="#ff9800"/>
    <circle cx="130" cy="117" r="4" fill="#ff9800"/>
    <text x="85" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Bus</text>
    
    <!-- Star -->
    <rect x="180" y="85" width="130" height="65" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <circle cx="245" cy="117" r="10" fill="#388e3c"/>
    <line x1="245" y1="107" x2="245" y2="95" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="255" y1="122" x2="270" y2="130" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="235" y1="122" x2="220" y2="130" stroke="#388e3c" stroke-width="1.5"/>
    <circle cx="245" cy="92" r="4" fill="#388e3c"/>
    <circle cx="273" cy="133" r="4" fill="#388e3c"/>
    <circle cx="217" cy="133" r="4" fill="#388e3c"/>
    <text x="245" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Star</text>
    
    <!-- Ring -->
    <rect x="320" y="85" width="130" height="65" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <ellipse cx="385" cy="117" rx="35" ry="15" fill="none" stroke="#9c27b0" stroke-width="1.5"/>
    <circle cx="350" cy="117" r="4" fill="#9c27b0"/>
    <circle cx="385" cy="102" r="4" fill="#9c27b0"/>
    <circle cx="420" cy="117" r="4" fill="#9c27b0"/>
    <text x="385" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Ring</text>
    
    <!-- Mesh -->
    <rect x="460" y="85" width="130" height="65" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <circle cx="490" cy="105" r="5" fill="#f44336"/>
    <circle cx="540" cy="105" r="5" fill="#f44336"/>
    <circle cx="515" cy="135" r="5" fill="#f44336"/>
    <line x1="493" y1="108" x2="537" y2="108" stroke="#f44336" stroke-width="1"/>
    <line x1="493" y1="108" x2="517" y2="132" stroke="#f44336" stroke-width="1"/>
    <line x1="537" y1="108" x2="517" y2="132" stroke="#f44336" stroke-width="1"/>
    <text x="525" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Mesh</text>
    
    <!-- Tree -->
    <rect x="600" y="85" width="130" height="65" rx="3" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
    <circle cx="665" cy="100" r="8" fill="#0288d1"/>
    <line x1="665" y1="108" x2="625" y2="130" stroke="#0288d1" stroke-width="1.5"/>
    <line x1="665" y1="108" x2="665" y2="130" stroke="#0288d1" stroke-width="1.5"/>
    <line x1="665" y1="108" x2="705" y2="130" stroke="#0288d1" stroke-width="1.5"/>
    <circle cx="620" cy="133" r="4" fill="#0288d1"/>
    <circle cx="665" cy="133" r="4" fill="#0288d1"/>
    <circle cx="710" cy="133" r="4" fill="#0288d1"/>
    <text x="665" y="148" text-anchor="middle" font-family="Arial" font-size="9" fill="#01579b">Tree</text>
  </g>
  
  <!-- step2: Connection Formulas -->
  <g class="step" id="step2" data-narration="The mesh formula n times n minus 1 divided by 2 calculates all point-to-point connections. Star and ring both require n connections equal to the number of devices, while bus uses just one main backbone cable.">
    <rect x="20" y="166" width="760" height="100" rx="5" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="183" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Connection Formulas</text>
    
    <!-- Mesh Formula -->
    <rect x="40" y="195" width="220" height="65" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="150" y="212" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Mesh Topology</text>
    <text x="150" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Connections = n(n-1)/2</text>
    <text x="150" y="247" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Full mesh, highest reliability</text>
    
    <!-- Star Formula -->
    <rect x="275" y="195" width="220" height="65" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="385" y="212" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Star Topology</text>
    <text x="385" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Connections = n</text>
    <text x="385" y="247" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">One link per device to hub</text>
    
    <!-- Ring Formula -->
    <rect x="510" y="195" width="220" height="65" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="620" y="212" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Ring Topology</text>
    <text x="620" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Connections = n</text>
    <text x="620" y="247" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Each device to two neighbors</text>
  </g>
  
  <!-- step3: Example Calculation -->
  <g class="step" id="step3" data-narration="For a mesh network with 8 devices, applying the formula 8 times 7 divided by 2 equals 28 connections. This example shows how the mesh formula calculates actual physical links needed for full connectivity.">
    <rect x="20" y="274" width="760" height="100" rx="5" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="291" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Example: Mesh Connections (n=8)</text>
    
    <!-- Problem -->
    <text x="40" y="310" font-family="Arial" font-size="10" fill="#333">Problem: Calculate connections for 8 devices in full mesh topology</text>
    
    <!-- Solution Box -->
    <rect x="40" y="318" width="350" height="50" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="335" font-family="Arial" font-size="10" fill="#333">Solution: Connections = n(n-1)/2</text>
    <text x="50" y="350" font-family="Arial" font-size="10" fill="#333">= 8(8-1)/2 = 8×7/2 = 56/2 = 28 connections</text>
    
    <!-- Visual mesh representation -->
    <rect x="420" y="315" width="350" height="55" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="595" y="330" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Result: 28 Physical Links</text>
    <circle cx="460" cy="350" r="5" fill="#f44336"/>
    <circle cx="510" cy="350" r="5" fill="#f44336"/>
    <circle cx="560" cy="350" r="5" fill="#f44336"/>
    <circle cx="610" cy="350" r="5" fill="#f44336"/>
    <circle cx="660" cy="350" r="5" fill="#f44336"/>
    <circle cx="710" cy="350" r="5" fill="#f44336"/>
    <circle cx="760" cy="350" r="5" fill="#f44336"/>
    <circle cx="810" cy="350" r="5" fill="#f44336"/>
    <text x="595" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Each device connects to all others</text>
  </g>
  
  <!-- step4: Network Devices and OSI Layers -->
  <g class="step" id="step4" data-narration="Network devices operate at different OSI layers: hubs work at physical layer one, switches at data link layer two using MAC addresses, and routers operate at network layer three using IP addresses for packet routing.">
    <rect x="20" y="382" width="760" height="100" rx="5" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="399" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Network Devices and OSI Layers</text>
    
    <!-- Hub -->
    <rect x="40" y="410" width="145" height="68" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="112" y="426" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Hub</text>
    <text x="112" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Physical Layer</text>
    <text x="112" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Layer 1)</text>
    <text x="112" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Broadcasts to all ports</text>
    
    <!-- Switch -->
    <rect x="200" y="410" width="145" height="68" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="272" y="426" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Switch</text>
    <text x="272" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Data Link Layer</text>
    <text x="272" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Layer 2)</text>
    <text x="272" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Uses MAC addresses</text>
    
    <!-- Router -->
    <rect x="360" y="410" width="145" height="68" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="432" y="426" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Router</text>
    <text x="432" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Network Layer</text>
    <text x="432" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Layer 3)</text>
    <text x="432" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Uses IP addresses</text>
    
    <!-- Bridge -->
    <rect x="520" y="410" width="145" height="68" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="592" y="426" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">Bridge</text>
    <text x="592" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Data Link Layer</text>
    <text x="592" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Layer 2)</text>
    <text x="592" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Filters by MAC address</text>
    
    <!-- Gateway -->
    <rect x="680" y="410" width="90" height="68" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="725" y="426" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Gateway</text>
    <text x="725" y="442" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">All Layers</text>
    <text x="725" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(Multi-layer)</text>
    <text x="725" y="468" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Protocol conversion</text>
  </g>
  
  <!-- step5: Topology Comparison Summary -->
  <g class="step" id="step5" data-narration="Star topology dominates modern networks for easy management, while mesh offers best fault tolerance. The mesh formula n times n minus 1 divided by 2 becomes impractical above fifteen devices due to exponential connection growth.">
    <rect x="20" y="490" width="760" height="98" rx="5" fill="#ffffff" stroke="#0288d1" stroke-width="1"/>
    <text x="40" y="507" font-family="Arial" font-size="12" font-weight="bold" fill="#01579b">Topology Comparison Summary</text>
    
    <!-- Comparison Table Header -->
    <rect x="40" y="515" width="720" height="20" fill="#e1f5fe" stroke="#0288d1" stroke-width="0.5"/>
    <text x="60" y="529" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Topology</text>
    <text x="180" y="529" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Connections</text>
    <text x="300" y="529" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Advantage</text>
    <text x="480" y="529" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Disadvantage</text>
    <text x="650" y="529" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Common Use</text>
    
    <!-- Row 1: Star -->
    <rect x="40" y="535" width="720" height="18" fill="#ffffff" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="60" y="547" font-family="Arial" font-size="8" fill="#333">Star</text>
    <text x="180" y="547" font-family="Arial" font-size="8" fill="#333">n</text>
    <text x="300" y="547" font-family="Arial" font-size="8" fill="#333">Easy management</text>
    <text x="480" y="547" font-family="Arial" font-size="8" fill="#333">Hub failure affects all</text>
    <text x="650" y="547" font-family="Arial" font-size="8" fill="#333">Modern LANs</text>
    
    <!-- Row 2: Mesh -->
    <rect x="40" y="553" width="720" height="18" fill="#fff8e1" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="60" y="565" font-family="Arial" font-size="8" fill="#333">Mesh</text>
    <text x="180" y="565" font-family="Arial" font-size="8" fill="#333">n(n-1)/2</text>
    <text x="300" y="565" font-family="Arial" font-size="8" fill="#333">Highest reliability</text>
    <text x="480" y="565" font-family="Arial" font-size="8" fill="#333">Expensive, complex</text>
    <text x="650" y="565" font-family="Arial" font-size="8" fill="#333">Critical networks</text>
    
    <!-- Row 3: Ring -->
    <rect x="40" y="571" width="720" height="17" fill="#f3e5f5" stroke="#e0e0e0" stroke-width="0.5"/>
    <text x="60" y="582" font-family="Arial" font-size="8" fill="#333">Ring</text>
    <text x="180" y="582" font-family="Arial" font-size="8" fill="#333">n</text>
    <text x="300" y="582" font-family="Arial" font-size="8" fill="#333">No collisions</text>
    <text x="480" y="582" font-family="Arial" font-size="8" fill="#333">One break disrupts</text>
    <text x="650" y="582" font-family="Arial" font-size="8" fill="#333">Token Ring networks</text>
  </g>
</svg>