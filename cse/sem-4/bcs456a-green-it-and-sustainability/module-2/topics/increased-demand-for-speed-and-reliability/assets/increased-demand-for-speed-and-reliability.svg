<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title Step -->
  <g class="step" id="step0" data-narration="This topic explores the increased demand for speed and reliability in modern computer systems, covering memory hierarchy, caching, and fault tolerance.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">Increased Demand for Speed and Reliability</text>
  </g>
  
  <!-- Step 1: Factors Driving Demand -->
  <g class="step" id="step1" data-narration="The demand for speed comes from exponential data growth, real-time applications, and user expectations for instant responses. The memory wall gap between processor and memory speeds is a key challenge.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Factors Driving Speed Demand</text>
    <rect x="25" y="85" width="230" height="45" rx="3" fill="#c8e6c9" stroke="#4caf50" stroke-width="1"/>
    <text x="35" y="98" font-family="Arial" font-size="9" fill="#2e7d32">Data Growth</text>
    <text x="35" y="112" font-family="Arial" font-size="8" fill="#388e3c">2.5 quintillion bytes/day</text>
    <rect x="265" y="85" width="230" height="45" rx="3" fill="#c8e6c9" stroke="#4caf50" stroke-width="1"/>
    <text x="275" y="98" font-family="Arial" font-size="9" fill="#2e7d32">Real-Time Apps</text>
    <text x="275" y="112" font-family="Arial" font-size="8" fill="#388e3c">Video, IoT, e-commerce</text>
    <rect x="505" y="85" width="265" height="45" rx="3" fill="#c8e6c9" stroke="#4caf50" stroke-width="1"/>
    <text x="515" y="98" font-family="Arial" font-size="9" fill="#2e7d32">Memory Wall</text>
    <text x="515" y="112" font-family="Arial" font-size="8" fill="#388e3c">Processor faster than memory</text>
  </g>
  
  <!-- Step 2: Memory Hierarchy -->
  <g class="step" id="step2" data-narration="The memory hierarchy solves the speed-capacity tradeoff using multiple levels. Registers are fastest, followed by L1/L2/L3 caches, RAM, and finally storage devices like SSDs and HDDs.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Memory Hierarchy</text>
    <rect x="25" y="175" width="110" height="42" rx="3" fill="#ffcc80" stroke="#ff9800" stroke-width="1"/>
    <text x="80" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Registers</text>
    <text x="80" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Fastest, Few</text>
    <line x1="135" y1="196" x2="155" y2="196" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="165" y="175" width="110" height="42" rx="3" fill="#ffcc80" stroke="#ff9800" stroke-width="1"/>
    <text x="220" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">L1/L2 Cache</text>
    <text x="220" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">32KB-256KB</text>
    <line x1="275" y1="196" x2="295" y2="196" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="305" y="175" width="110" height="42" rx="3" fill="#ffcc80" stroke="#ff9800" stroke-width="1"/>
    <text x="360" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">RAM</text>
    <text x="360" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">8GB-64GB</text>
    <line x1="415" y1="196" x2="435" y2="196" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="445" y="175" width="110" height="42" rx="3" fill="#ffcc80" stroke="#ff9800" stroke-width="1"/>
    <text x="500" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">SSD/HDD</text>
    <text x="500" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">TB Capacity</text>
    <line x1="555" y1="196" x2="575" y2="196" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="585" y="175" width="185" height="42" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="620" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Speed vs Capacity</text>
    <text x="620" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">Faster = Smaller, Costlier</text>
  </g>
  
  <!-- Step 3: Cache Performance -->
  <g class="step" id="step3" data-narration="Caches improve performance using temporal and spatial locality. Average Memory Access Time equals hit time plus miss rate multiplied by miss penalty. Good locality achieves over ninety-five percent hit rates.">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Cache Performance and AMAT</text>
    <rect x="25" y="262" width="350" height="44" rx="3" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="35" y="275" font-family="Arial" font-size="9" fill="#c62828">AMAT Formula</text>
    <text x="35" y="290" font-family="Arial" font-size="8" fill="#d32f2f">AMAT = Hit Time + (Miss Rate × Miss Penalty)</text>
    <text x="35" y="302" font-family="Arial" font-size="8" fill="#d32f2f">Multi-level: L1 + L1miss × (L2 + L2miss × Mem)</text>
    <rect x="385" y="262" width="160" height="44" rx="3" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="395" y="275" font-family="Arial" font-size="9" fill="#c62828">Locality Principles</text>
    <text x="395" y="290" font-family="Arial" font-size="8" fill="#d32f2f">Temporal: access again</text>
    <text x="395" y="302" font-family="Arial" font-size="8" fill="#d32f2f">Spatial: access nearby</text>
    <rect x="555" y="262" width="215" height="44" rx="3" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="565" y="275" font-family="Arial" font-size="9" fill="#c62828">Example Calculation</text>
    <text x="565" y="290" font-family="Arial" font-size="8" fill="#d32f2f">95% L1 (4c) + 3% L2 (12c) + 2% Mem</text>
    <text x="565" y="302" font-family="Arial" font-size="8" fill="#d32f2f">= 8.16 cycles average</text>
  </g>
  
  <!-- Step 4: Reliability Techniques -->
  <g class="step" id="step4" data-narration="Reliability techniques include ECC memory for error detection and correction, RAID systems for storage redundancy, and fault tolerance through component redundancy. Mean Time Between Failures measures system reliability.">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Reliability Techniques</text>
    <rect x="25" y="352" width="240" height="42" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="35" y="365" font-family="Arial" font-size="9" fill="#6a1b9a">ECC Memory</text>
    <text x="35" y="380" font-family="Arial" font-size="8" fill="#7b1fa2">Detects/corrects bit errors</text>
    <text x="35" y="390" font-family="Arial" font-size="8" fill="#7b1fa2">Used in servers, critical systems</text>
    <rect x="275" y="352" width="240" height="42" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="285" y="365" font-family="Arial" font-size="9" fill="#6a1b9a">RAID Systems</text>
    <text x="285" y="380" font-family="Arial" font-size="8" fill="#7b1fa2">RAID 0: performance, RAID 1: mirror</text>
    <text x="285" y="390" font-family="Arial" font-size="8" fill="#7b1fa2">RAID 5/6: parity for reliability</text>
    <rect x="525" y="352" width="245" height="42" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="535" y="365" font-family="Arial" font-size="9" fill="#6a1b9a">MTBF and Availability</text>
    <text x="535" y="380" font-family="Arial" font-size="8" fill="#7b1fa2">MTBF: Mean Time Between Failures</text>
    <text x="535" y="390" font-family="Arial" font-size="8" fill="#7b1fa2">Five nines: 99.999% availability</text>
  </g>
  
  <!-- Step 5: Amdahl's Law -->
  <g class="step" id="step5" data-narration="Amdahl's Law calculates maximum speedup from parallel processing using the formula speedup equals one divided by serial fraction plus parallel fraction divided by processor count.">
    <rect x="10" y="410" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="25" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Amdahl's Law and Parallelism</text>
    <rect x="25" y="440" width="240" height="42" rx="3" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="35" y="453" font-family="Arial" font-size="9" fill="#1565c0">Speedup Formula</text>
    <text x="35" y="468" font-family="Arial" font-size="8" fill="#1976d2">Speedup = 1 / (S + (1-S)/N)</text>
    <text x="35" y="478" font-family="Arial" font-size="8" fill="#1976d2">S = serial fraction, N = processors</text>
    <rect x="275" y="440" width="250" height="42" rx="3" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="285" y="453" font-family="Arial" font-size="9" fill="#1565c0">Example: 20% Serial Code</text>
    <text x="285" y="468" font-family="Arial" font-size="8" fill="#1976d2">2 cores: 1.67×, 4 cores: 2.5×</text>
    <text x="285" y="478" font-family="Arial" font-size="8" fill="#1976d2">8 cores: 3.33× speedup</text>
    <rect x="535" y="440" width="235" height="42" rx="3" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="545" y="453" font-family="Arial" font-size="9" fill="#1565c0">Parallelism Levels</text>
    <text x="545" y="468" font-family="Arial" font-size="8" fill="#1976d2">ILP: instruction-level parallelism</text>
    <text x="545" y="478" font-family="Arial" font-size="8" fill="#1976d2">Thread-level: multi-core, GPU</text>
  </g>
  
  <!-- Step 6: Summary and Exam Tips -->
  <g class="step" id="step6" data-narration="Key exam topics include memory hierarchy tradeoffs, cache performance formulas, Amdahl's Law calculations, RAID levels, and reliability metrics. Practice AMAT calculations and understand locality principles.">
    <rect x="10" y="498" width="780" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="25" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Summary and Exam Tips</text>
    <rect x="25" y="528" width="370" height="52" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="35" y="541" font-family="Arial" font-size="9" fill="#2e7d32">Key Formulas to Remember</text>
    <text x="35" y="555" font-family="Arial" font-size="8" fill="#388e3c">AMAT = Hit Time + (Miss Rate × Miss Penalty)</text>
    <text x="35" y="567" font-family="Arial" font-size="8" fill="#388e3c">Speedup = 1 / (S + (1-S)/N)</text>
    <text x="35" y="577" font-family="Arial" font-size="8" fill="#388e3c">Availability = MTBF / (MTBF + MTTR)</text>
    <rect x="405" y="528" width="365" height="52" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="415" y="541" font-family="Arial" font-size="9" fill="#2e7d32">Exam Preparation Tips</text>
    <text x="415" y="555" font-family="Arial" font-size="8" fill="#388e3c">1. Practice AMAT calculations with different caches</text>
    <text x="415" y="567" font-family="Arial" font-size="8" fill="#388e3c">2. Know RAID 0, 1, 5, 6 tradeoffs</text>
    <text x="415" y="577" font-family="Arial" font-size="8" fill="#388e3c">3. Understand locality for cache optimization</text>
  </g>
</svg>