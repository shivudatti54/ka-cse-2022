<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Introduction to measurements and sustainability in software engineering covering metrics, formulas, green computing practices, and key performance indicators for exam preparation.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Measurements and Sustainability in Software Engineering</text>
  </g>
  
  <!-- step1: Software Metrics Overview -->
  <g class="step" id="step1" data-narration="Software metrics quantify attributes of products and processes. Key categories include size-oriented metrics like LOC and Function Points, complexity metrics such as Cyclomatic Complexity, and quality metrics measuring defects and reliability.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Software Metrics Overview</text>
    <rect x="40" y="88" width="220" height="42" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#333">Size-Oriented</text>
    <text x="50" y="116" font-family="Arial" font-size="9" fill="#666">LOC, Function Points</text>
    <rect x="270" y="88" width="220" height="42" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="280" y="102" font-family="Arial" font-size="10" fill="#333">Complexity</text>
    <text x="280" y="116" font-family="Arial" font-size="9" fill="#666">Cyclomatic, Halstead</text>
    <rect x="500" y="88" width="220" height="42" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="510" y="102" font-family="Arial" font-size="10" fill="#333">Quality</text>
    <text x="510" y="116" font-family="Arial" font-size="9" fill="#666">Defect Density, MTBF</text>
  </g>
  
  <!-- step2: Function Points -->
  <g class="step" id="step2" data-narration="Function Points measure functionality from the user's perspective by counting inputs, outputs, inquiries, files, and interfaces. Adjusted FP = Unadjusted FP × Complexity Adjustment Factor. This language-independent metric supports effort estimation.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Function Points (FP)</text>
    <rect x="40" y="180" width="350" height="38" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="50" y="194" font-family="Arial" font-size="10" fill="#333">Components:</text>
    <text x="50" y="208" font-family="Arial" font-size="9" fill="#666">EI×4 + EO×5 + EQ×4 + ILF×10 + EIF×7</text>
    <rect x="400" y="180" width="350" height="38" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="410" y="194" font-family="Arial" font-size="10" fill="#333">Formula: Adjusted FP = UFP × CAF</text>
    <text x="410" y="208" font-family="Arial" font-size="9" fill="#666">Example: 79 FP (UFP) × 1.0 (CAF) = 79 FP</text>
  </g>
  
  <!-- step3: Cyclomatic Complexity -->
  <g class="step" id="step3" data-narration="Cyclomatic Complexity measures independent execution paths in code. Formula: V(G) = Number of Decision Points + 1. A value above 10 suggests code needs refactoring. Higher complexity requires more test cases for path coverage.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Cyclomatic Complexity</text>
    <rect x="40" y="268" width="350" height="38" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="50" y="282" font-family="Arial" font-size="10" fill="#333">Formula: V(G) = E - N + 2P</text>
    <text x="50" y="296" font-family="Arial" font-size="9" fill="#666">Or: V(G) = Decision Points + 1</text>
    <rect x="400" y="268" width="350" height="38" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="410" y="282" font-family="Arial" font-size="10" fill="#333">Example: 2 decision points</text>
    <text x="410" y="296" font-family="Arial" font-size="9" fill="#666">V(G) = 2 + 1 = 3 paths (needs 3 test cases)</text>
  </g>
  
  <!-- step4: Earned Value Management -->
  <g class="step" id="step4" data-narration="Earned Value Management combines scope, schedule, and cost metrics. CPI = EV/AC indicates cost efficiency; SPI = EV/PV shows schedule performance. Values below 1.0 signal problems requiring corrective action.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Earned Value Management (EVM)</text>
    <rect x="40" y="356" width="160" height="38" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="370" font-family="Arial" font-size="10" fill="#333">Planned Value (PV)</text>
    <text x="50" y="384" font-family="Arial" font-size="9" fill="#666">Budgeted cost for scheduled work</text>
    <rect x="210" y="356" width="160" height="38" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="220" y="370" font-family="Arial" font-size="10" fill="#333">Earned Value (EV)</text>
    <text x="220" y="384" font-family="Arial" font-size="9" fill="#666">Budgeted cost of completed work</text>
    <rect x="380" y="356" width="160" height="38" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="390" y="370" font-family="Arial" font-size="10" fill="#333">Actual Cost (AC)</text>
    <text x="390" y="384" font-family="Arial" font-size="9" fill="#666">Actual cost of work performed</text>
    <rect x="550" y="356" width="210" height="38" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="560" y="370" font-family="Arial" font-size="10" fill="#333">CPI = EV/AC, SPI = EV/PV</text>
    <text x="560" y="384" font-family="Arial" font-size="9" fill="#666">&lt;1.0 means over budget/behind schedule</text>
  </g>
  
  <!-- step5: Sustainability and Green Computing -->
  <g class="step" id="step5" data-narration="Sustainable software engineering minimizes environmental impact while maintaining economic viability. Green computing includes energy-efficient algorithms, virtualization, cloud optimization, and resource-efficient code design.">
    <rect x="20" y="410" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Sustainability and Green Computing</text>
    <rect x="40" y="444" width="230" height="38" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="50" y="458" font-family="Arial" font-size="10" fill="#333">Environmental</text>
    <text x="50" y="472" font-family="Arial" font-size="9" fill="#666">Energy efficiency, carbon reduction</text>
    <rect x="280" y="444" width="230" height="38" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="290" y="458" font-family="Arial" font-size="10" fill="#333">Economic</text>
    <text x="290" y="472" font-family="Arial" font-size="9" fill="#666">Cost-effective, long-term viability</text>
    <rect x="520" y="444" width="240" height="38" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="530" y="458" font-family="Arial" font-size="10" fill="#333">Social</text>
    <text x="530" y="472" font-family="Arial" font-size="9" fill="#666">Responsible technology practices</text>
  </g>
  
  <!-- step6: Key Formulas Summary -->
  <g class="step" id="step6" data-narration="Key formulas: Function Points = UFP × CAF, Cyclomatic V(G) = Decision Points + 1, EVM: CPI = EV/AC, SPI = EV/PV, CV = EV - AC, SV = EV - PV. Practice numerical problems for exam success.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Key Formulas Summary</text>
    <rect x="40" y="532" width="355" height="48" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="546" font-family="Arial" font-size="10" fill="#333">Function Points: UFP = Σ(Weight × Count)</text>
    <text x="50" y="560" font-family="Arial" font-size="9" fill="#666">Adjusted FP = UFP × CAF</text>
    <text x="50" y="574" font-family="Arial" font-size="9" fill="#666">Cyclomatic: V(G) = Decision Points + 1</text>
    <rect x="405" y="532" width="355" height="48" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="415" y="546" font-family="Arial" font-size="10" fill="#333">EVM Metrics:</text>
    <text x="415" y="560" font-family="Arial" font-size="9" fill="#666">CPI = EV/AC, SPI = EV/PV</text>
    <text x="415" y="574" font-family="Arial" font-size="9" fill="#666">CV = EV - AC, SV = EV - PV</text>
  </g>
</svg>