<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Consideration is a fundamental element in contract law under the Indian Contract Act, 1872. It represents something of value exchanged between parties.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">CONSIDERATION IN CONTRACT LAW</text>
  </g>
  
  <!-- Step 1: Definition -->
  <g class="step" id="step1" data-narration="Consideration means something for something - quid pro quo. It's the bargained-for exchange that makes a promise legally enforceable, not a gratuitous gift.">
    <rect x="30" y="58" width="740" height="80" rx="5" fill="#ffffff" stroke="#388e3c" stroke-width="2"/>
    <text x="50" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Definition &amp; Meaning</text>
    <rect x="50" y="85" width="200" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="150" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">QUID PRO QUO</text>
    <text x="150" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">"Something for Something"</text>
    <line x1="270" y1="105" x2="310" y2="105" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="320" y="100" font-family="Arial" font-size="10" fill="#333">Section 2(d) defines consideration as:</text>
    <text x="320" y="115" font-family="Arial" font-size="9" fill="#555">act/abstinence done at promisor's desire</text>
    <text x="320" y="128" font-family="Arial" font-size="9" fill="#555">in exchange for the promise</text>
  </g>
  
  <!-- Step 2: Types -->
  <g class="step" id="step2" data-narration="Types include executory, executed, past, unilateral, and bilateral consideration. Each type represents different stages of promise performance and exchange of value.">
    <rect x="30" y="146" width="740" height="80" rx="5" fill="#ffffff" stroke="#9c27b0" stroke-width="2"/>
    <text x="50" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Types of Consideration</text>
    <rect x="50" y="175" width="130" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="115" y="188" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">EXECUTORY</text>
    <text x="115" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Future Promise</text>
    <rect x="190" y="175" width="130" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="255" y="188" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">EXECUTED</text>
    <text x="255" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Act Already Done</text>
    <rect x="330" y="175" width="130" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="395" y="188" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">PAST</text>
    <text x="395" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Before Promise</text>
    <rect x="470" y="175" width="130" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="535" y="188" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">UNILATERAL</text>
    <text x="535" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">One-sided</text>
    <rect x="610" y="175" width="130" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="675" y="188" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">BILATERAL</text>
    <text x="675" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Mutual Exchange</text>
  </g>
  
  <!-- Step 3: Rules -->
  <g class="step" id="step3" data-narration="Valid consideration must be real, possible, certain, and legal. It cannot be an existing legal duty, impossible, or for illegal purposes.">
    <rect x="30" y="234" width="740" height="80" rx="5" fill="#ffffff" stroke="#ff9800" stroke-width="2"/>
    <text x="50" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Rules for Valid Consideration</text>
    <rect x="50" y="265" width="160" height="40" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="130" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">MUST BE REAL</text>
    <text x="130" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Not illusory or impossible</text>
    <rect x="220" y="265" width="160" height="40" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="300" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">MUST BE CERTAIN</text>
    <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Definite and specific</text>
    <rect x="390" y="265" width="160" height="40" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="470" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">MUST BE LEGAL</text>
    <text x="470" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Not illegal or immoral</text>
    <rect x="560" y="265" width="180" height="40" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="650" y="280" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">NOT EXISTING DUTY</text>
    <text x="650" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Must add new obligation</text>
  </g>
  
  <!-- Step 4: Exceptions -->
  <g class="step" id="step4" data-narration="Section 25 exceptions allow no consideration: natural love and affection between family, past voluntary services, and time-barred debts under the limitation Act.">
    <rect x="30" y="322" width="740" height="80" rx="5" fill="#ffffff" stroke="#f44336" stroke-width="2"/>
    <text x="50" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Section 25 Exceptions</text>
    <rect x="50" y="355" width="220" height="38" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="160" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Natural Love &amp; Affection</text>
    <text x="160" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Written + Registered</text>
    <rect x="280" y="355" width="220" height="38" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="390" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Past Voluntary Services</text>
    <text x="390" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Compensation for prior help</text>
    <rect x="510" y="355" width="240" height="38" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="630" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Time-Barred Debt</text>
    <text x="630" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Debt barred by limitation</text>
  </g>
  
  <!-- Step 5: Consideration vs Motive -->
  <g class="step" id="step5" data-narration="Consideration is the legal basis for a promise, while motive is the personal reason. Courts care about legal value, not economic adequacy.">
    <rect x="30" y="410" width="740" height="80" rx="5" fill="#ffffff" stroke="#1976d2" stroke-width="2"/>
    <text x="50" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Consideration vs Motive</text>
    <rect x="50" y="445" width="300" height="35" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="200" y="460" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">CONSIDERATION</text>
    <text x="200" y="473" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Legal basis - the exchange value</text>
    <rect x="360" y="445" width="300" height="35" rx="3" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="510" y="460" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">MOTIVE</text>
    <text x="510" y="473" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Personal reason - irrelevant legally</text>
    <text x="670" y="460" font-family="Arial" font-size="9" fill="#666">Courts don't assess</text>
    <text x="670" y="473" font-family="Arial" font-size="9" fill="#666">adequacy, only</text>
    <text x="670" y="486" font-family="Arial" font-size="9" fill="#666">existence!</text>
  </g>
  
  <!-- Step 6: Exam Tips -->
  <g class="step" id="step6" data-narration="For exams: memorize Section 2(d), remember quid pro quo, and apply the four-step problem-solving approach with relevant case laws and illustrations.">
    <rect x="30" y="498" width="740" height="90" rx="5" fill="#ffffff" stroke="#388e3c" stroke-width="2"/>
    <text x="50" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Exam Tips &amp; Problem-Solving Approach</text>
    <rect x="50" y="530" width="165" height="48" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="132" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">STEP 1</text>
    <text x="132" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Identify the</text>
    <text x="132" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">promises</text>
    <rect x="225" y="530" width="165" height="48" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="307" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">STEP 2</text>
    <text x="307" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Check desire of</text>
    <text x="307" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">the promisor</text>
    <rect x="400" y="530" width="165" height="48" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="482" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">STEP 3</text>
    <text x="482" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Verify real/legal/</text>
    <text x="482" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">certain consideration</text>
    <rect x="575" y="530" width="175" height="48" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="662" y="545" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">STEP 4</text>
    <text x="662" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Check Section 25</text>
    <text x="662" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">exceptions</text>
  </g>
</svg>