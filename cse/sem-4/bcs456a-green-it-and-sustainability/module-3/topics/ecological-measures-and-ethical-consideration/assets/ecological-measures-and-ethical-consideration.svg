<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This chapter introduces ecological measures, ethical considerations, and green computing practices for sustainable IT and environmental responsibility in modern computing">
    <rect x="20" y="10" width="760" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#0d47a1">Ecological Measures and Ethical Considerations</text>
  </g>
  
  <!-- step1: Green Computing -->
  <g class="step" id="step1" data-narration="Green computing responsibly uses IT resources through energy-efficient hardware, virtualization technology, power management systems, and sustainable manufacturing processes for environmental benefit">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Green Computing</text>
    <rect x="40" y="85" width="160" height="45" rx="4" fill="#c8e6c9"/>
    <text x="50" y="100" font-family="Arial" font-size="9" fill="#1b5e20">• Energy-efficient hardware</text>
    <text x="50" y="113" font-family="Arial" font-size="9" fill="#1b5e20">• Virtualization technology</text>
    <text x="50" y="126" font-family="Arial" font-size="9" fill="#1b5e20">• Power management systems</text>
    <rect x="210" y="85" width="180" height="45" rx="4" fill="#c8e6c9"/>
    <text x="220" y="100" font-family="Arial" font-size="9" fill="#1b5e20">Four Pillars:</text>
    <text x="220" y="113" font-family="Arial" font-size="9" fill="#1b5e20">1. Energy Efficiency</text>
    <text x="220" y="126" font-family="Arial" font-size="9" fill="#1b5e20">2. Waste Reduction</text>
    <rect x="400" y="85" width="180" height="45" rx="4" fill="#a5d6a7"/>
    <text x="410" y="100" font-family="Arial" font-size="9" fill="#1b5e20">3. Sustainable Materials</text>
    <text x="410" y="113" font-family="Arial" font-size="9" fill="#1b5e20">4. Lifecycle Assessment</text>
    <rect x="590" y="85" width="180" height="45" rx="4" fill="#a5d6a7"/>
    <text x="600" y="100" font-family="Arial" font-size="9" fill="#1b5e20">ICT Sector Impact:</text>
    <text x="600" y="115" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">2-4% Global CO₂</text>
  </g>
  
  <!-- step2: E-waste Management -->
  <g class="step" id="step2" data-narration="E-waste management is critical as electronic waste is the fastest-growing waste stream globally requiring certified recycling, secure data destruction, and Extended Producer Responsibility programs">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Electronic Waste Management</text>
    <rect x="40" y="175" width="140" height="42" rx="4" fill="#ffe0b2"/>
    <text x="48" y="190" font-family="Arial" font-size="9" fill="#bf360c">• Responsible disposal</text>
    <text x="48" y="203" font-family="Arial" font-size="9" fill="#bf360c">• Certified recyclers</text>
    <text x="48" y="216" font-family="Arial" font-size="9" fill="#bf360c">• Data destruction</text>
    <rect x="190" y="175" width="160" height="42" rx="4" fill="#ffcc80"/>
    <text x="198" y="190" font-family="Arial" font-size="9" fill="#bf360c">Extended Producer</text>
    <text x="198" y="203" font-family="Arial" font-size="9" fill="#bf360c">Responsibility (EPR)</text>
    <text x="198" y="216" font-family="Arial" font-size="9" fill="#bf360c">Manufacturer accountability</text>
    <rect x="360" y="175" width="140" height="42" rx="4" fill="#ffe0b2"/>
    <text x="368" y="190" font-family="Arial" font-size="9" fill="#bf360c">• Urban mining</text>
    <text x="368" y="203" font-family="Arial" font-size="9" fill="#bf360c">• Metal recovery</text>
    <text x="368" y="216" font-family="Arial" font-size="9" fill="#bf360c">• Recycling targets</text>
    <rect x="510" y="175" width="260" height="42" rx="4" fill="#ffcc80"/>
    <text x="520" y="190" font-family="Arial" font-size="9" fill="#bf360c">WEEE Directive: Sets collection, recycling,</text>
    <text x="520" y="203" font-family="Arial" font-size="9" fill="#bf360c">recovery targets for electronic waste.</text>
    <text x="520" y="216" font-family="Arial" font-size="9" fill="#bf360c">RoHS: Restricts hazardous substances.</text>
  </g>
  
  <!-- step3: Data Center Energy -->
  <g class="step" id="step3" data-narration="Data centers consume approximately 1-2% of global electricity and require efficient cooling solutions including hot aisle containment, free air cooling, and renewable energy integration">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#0d47a1">Data Center Energy Efficiency</text>
    <rect x="40" y="263" width="120" height="42" rx="4" fill="#bbdefb"/>
    <text x="48" y="278" font-family="Arial" font-size="9" fill="#0d47a1">Cooling:</text>
    <text x="48" y="291" font-family="Arial" font-size="9" fill="#0d47a1">• Hot/cold aisle</text>
    <text x="48" y="304" font-family="Arial" font-size="9" fill="#0d47a1">• Liquid cooling</text>
    <rect x="170" y="263" width="120" height="42" rx="4" fill="#90caf9"/>
    <text x="178" y="278" font-family="Arial" font-size="9" fill="#0d47a1">Free Air Cooling:</text>
    <text x="178" y="291" font-family="Arial" font-size="9" fill="#0d47a1">Natural climate</text>
    <text x="178" y="304" font-family="Arial" font-size="9" fill="#0d47a1">utilization</text>
    <rect x="300" y="263" width="130" height="42" rx="4" fill="#bbdefb"/>
    <text x="308" y="278" font-family="Arial" font-size="9" fill="#0d47a1">PUE Metric:</text>
    <text x="308" y="291" font-family="Arial" font-size="9" fill="#0d47a1">Power Usage</text>
    <text x="308" y="304" font-family="Arial" font-size="9" fill="#0d47a1">Effectiveness</text>
    <rect x="440" y="263" width="120" height="42" rx="4" fill="#90caf9"/>
    <text x="448" y="278" font-family="Arial" font-size="9" fill="#0d47a1">Renewable</text>
    <text x="448" y="291" font-family="Arial" font-size="9" fill="#0d47a1">Energy:</text>
    <text x="448" y="304" font-family="Arial" font-size="9" fill="#0d47a1">Solar, Wind, Hydro</text>
    <rect x="570" y="263" width="200" height="42" rx="4" fill="#64b5f6"/>
    <text x="580" y="278" font-family="Arial" font-size="9" fill="#0d47a1">Virtualization Impact:</text>
    <text x="580" y="291" font-family="Arial" font-size="9" fill="#0d47a1">60-80% energy reduction</text>
    <text x="580" y="304" font-family="Arial" font-size="9" fill="#0d47a1">via server consolidation</text>
  </g>
  
  <!-- step4: Ethical Frameworks -->
  <g class="step" id="step4" data-narration="Four ethical frameworks guide environmental decisions in technology: utilitarian approaches maximizing benefit, rights-based ethics protecting environment, virtue ethics emphasizing stewardship, and care ethics for communities">
    <rect x="20" y="322" width="760" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Ethical Frameworks for Environmental Responsibility</text>
    <rect x="40" y="352" width="165" height="42" rx="4" fill="#e1bee7"/>
    <text x="48" y="367" font-family="Arial" font-size="9" fill="#4a148c">Utilitarian Approach</text>
    <text x="48" y="380" font-family="Arial" font-size="8" fill="#4a148c">Maximize overall</text>
    <text x="48" y="392" font-family="Arial" font-size="8" fill="#4a148c">environmental benefit</text>
    <rect x="215" y="352" width="165" height="42" rx="4" fill="#ce93d8"/>
    <text x="223" y="367" font-family="Arial" font-size="9" fill="#4a148c">Rights-based Ethics</text>
    <text x="223" y="380" font-family="Arial" font-size="8" fill="#4a148c">Right to clean environment</text>
    <text x="223" y="392" font-family="Arial" font-size="8" fill="#4a148c">for present and future</text>
    <rect x="390" y="352" width="165" height="42" rx="4" fill="#e1bee7"/>
    <text x="398" y="367" font-family="Arial" font-size="9" fill="#4a148c">Virtue Ethics</text>
    <text x="398" y="380" font-family="Arial" font-size="8" fill="#4a148c">Environmental stewardship</text>
    <text x="398" y="392" font-family="Arial" font-size="8" fill="#4a148c">as professional virtue</text>
    <rect x="565" y="352" width="205" height="42" rx="4" fill="#ce93d8"/>
    <text x="573" y="367" font-family="Arial" font-size="9" fill="#4a148c">Care Ethics</text>
    <text x="573" y="380" font-family="Arial" font-size="8" fill="#4a148c">Responsibility towards local</text>
    <text x="573" y="392" font-family="Arial" font-size="8" fill="#4a148c">and global communities</text>
  </g>
  
  <!-- step5: CSR and Regulations -->
  <g class="step" id="step5" data-narration="Corporate Social Responsibility includes sustainability reporting, carbon neutrality commitments, and supply chain auditing. Key regulations are RoHS, WEEE, EPEAT, and ISO 14001 standards">
    <rect x="20" y="410" width="760" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">CSR and Regulatory Compliance</text>
    <rect x="40" y="440" width="180" height="42" rx="4" fill="#ffcdd2"/>
    <text x="48" y="455" font-family="Arial" font-size="9" fill="#b71c1c">CSR Activities:</text>
    <text x="48" y="468" font-family="Arial" font-size="8" fill="#b71c1c">• GRI sustainability reporting</text>
    <text x="48" y="480" font-family="Arial" font-size="8" fill="#b71c1c">• Carbon neutrality commitments</text>
    <rect x="230" y="440" width="130" height="42" rx="4" fill="#ef9a9a"/>
    <text x="238" y="455" font-family="Arial" font-size="9" fill="#b71c1c">RoHS</text>
    <text x="238" y="468" font-family="Arial" font-size="8" fill="#b71c1c">Restriction of</text>
    <text x="238" y="480" font-family="Arial" font-size="8" fill="#b71c1c">Hazardous Substances</text>
    <rect x="370" y="440" width="130" height="42" rx="4" fill="#ffcdd2"/>
    <text x="378" y="455" font-family="Arial" font-size="9" fill="#b71c1c">WEEE</text>
    <text x="378" y="468" font-family="Arial" font-size="8" fill="#b71c1c">Waste Electrical</text>
    <text x="378" y="480" font-family="Arial" font-size="8" fill="#b71c1c">Electronic Equipment</text>
    <rect x="510" y="440" width="130" height="42" rx="4" fill="#ef9a9a"/>
    <text x="518" y="455" font-family="Arial" font-size="9" fill="#b71c1c">EPEAT</text>
    <text x="518" y="468" font-family="Arial" font-size="8" fill="#b71c1c">Product environmental</text>
    <text x="518" y="480" font-family="Arial" font-size="8" fill="#b71c1c">rating system</text>
    <rect x="650" y="440" width="120" height="42" rx="4" fill="#ffcdd2"/>
    <text x="658" y="455" font-family="Arial" font-size="9" fill="#b71c1c">ISO 14001</text>
    <text x="658" y="468" font-family="Arial" font-size="8" fill="#b71c1c">Environmental</text>
    <text x="658" y="480" font-family="Arial" font-size="8" fill="#b71c1c">Management Systems</text>
  </g>
  
  <!-- step6: Examples and Formulas -->
  <g class="step" id="step6" data-narration="Virtualization example: 50 servers to 10 servers equals 68% power reduction, saving approximately 148,920 kWh annually. Key formula: PUE equals total facility energy divided by IT energy">
    <rect x="20" y="498" width="760" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Key Examples and Formulas</text>
    <rect x="40" y="527" width="280" height="52" rx="4" fill="#c8e6c9"/>
    <text x="48" y="542" font-family="Arial" font-size="9" fill="#1b5e20">Virtualization Example:</text>
    <text x="48" y="555" font-family="Arial" font-size="8" fill="#1b5e20">50 servers (500W each) → 10 servers (800W)</text>
    <text x="48" y="568" font-family="Arial" font-size="8" fill="#1b5e20">Power reduction: (25000-8000)/25000 = 68%</text>
    <text x="48" y="581" font-family="Arial" font-size="8" fill="#1b5e20">Annual savings: 148,920 kWh at ₹8/kWh</text>
    <rect x="330" y="527" width="200" height="52" rx="4" fill="#a5d6a7"/>
    <text x="338" y="542" font-family="Arial" font-size="9" fill="#1b5e20">Important Formulas:</text>
    <text x="338" y="555" font-family="Arial" font-size="8" fill="#1b5e20">Power Reduction % = (Original - New)/Original</text>
    <text x="338" y="568" font-family="Arial" font-size="8" fill="#1b5e20">Energy (kWh) = Power (kW) × Hours × Days</text>
    <text x="338" y="581" font-family="Arial" font-size="8" fill="#1b5e20">PUE = Total Facility Energy / IT Energy</text>
    <rect x="540" y="527" width="230" height="52" rx="4" fill="#c8e6c9"/>
    <text x="548" y="542" font-family="Arial" font-size="9" fill="#1b5e20">Exam Tips:</text>
    <text x="548" y="555" font-family="Arial" font-size="8" fill="#1b5e20">• Remember PUE ideal value is 1.0</text>
    <text x="548" y="568" font-family="Arial" font-size="8" fill="#1b5e20">• Green computing has four pillars</text>
    <text x="548" y="581" font-family="Arial" font-size="8" fill="#1b5e20">• Virtualization reduces energy by 60-80%</text>
  </g>
</svg>