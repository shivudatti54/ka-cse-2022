<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="ICT Technical Measures protect information systems from unauthorized access, modification, disclosure, or destruction using hardware, software, and procedural security mechanisms.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">ICT Technical Measures</text>
  </g>
  
  <g class="step" id="step1" data-narration="Access Control has three main models: DAC lets resource owners decide access, MAC uses strict classification levels, and RBAC assigns permissions by job roles.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="5"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Access Control Models</text>
    <rect x="25" y="85" width="240" height="45" fill="#1976d2" rx="3"/>
    <text x="145" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="white">DAC (Discretionary)</text>
    <text x="145" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Owner controls access</text>
    <rect x="275" y="85" width="240" height="45" fill="#388e3c" rx="3"/>
    <text x="395" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="white">MAC (Mandatory)</text>
    <text x="395" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">System-enforced classification</text>
    <rect x="525" y="85" width="240" height="45" fill="#9c27b0" rx="3"/>
    <text x="645" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="white">RBAC (Role-Based)</text>
    <text x="645" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Permissions by job function</text>
  </g>
  
  <g class="step" id="step2" data-narration="Symmetric encryption uses one key for both encryption and decryption (AES, DES) and is fast but faces key distribution challenges.">
    <rect x="10" y="146" width="780" height="80" fill="#e8f5e9" rx="5"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Symmetric Encryption</text>
    <rect x="25" y="175" width="360" height="42" fill="#388e3c" rx="3"/>
    <text x="205" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Same Key for Encryption &amp; Decryption</text>
    <text x="205" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#e8f5e9">Algorithms: AES, DES, 3DES | Fast but key distribution problem</text>
    <text x="430" y="190" font-family="Arial" font-size="10" fill="#388e3c">vs</text>
    <rect x="455" y="175" width="320" height="42" fill="#ff9800" rx="3"/>
    <text x="615" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Public/Private Key Pair</text>
    <text x="615" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff3e0">Algorithms: RSA, ECC | Solves key distribution, slower</text>
  </g>
  
  <g class="step" id="step3" data-narration="Hash functions produce fixed-size output (MD5, SHA-256) for data integrity. Digital signatures use private keys for digital authentication and non-repudiation.">
    <rect x="10" y="234" width="780" height="80" fill="#fff3e0" rx="5"/>
    <text x="25" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Hash Functions &amp; Digital Signatures</text>
    <rect x="25" y="263" width="365" height="42" fill="#ff9800" rx="3"/>
    <text x="207" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Hash Functions</text>
    <text x="207" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e9">One-way function for integrity</text>
    <text x="207" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e9">MD5, SHA-1, SHA-256</text>
    <rect x="400" y="263" width="365" height="42" fill="#f44336" rx="3"/>
    <text x="582" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Digital Signatures</text>
    <text x="582" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Sender's private key signs, public key verifies</text>
    <text x="582" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Authentication, Non-repudiation, Integrity</text>
  </g>
  
  <g class="step" id="step4" data-narration="Firewalls include packet filtering (header only), stateful inspection (tracks connections), proxy (application layer), and NGFW (deep packet inspection and advanced threat protection).">
    <rect x="10" y="322" width="780" height="80" fill="#f3e5f5" rx="5"/>
    <text x="25" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Firewall Types</text>
    <rect x="25" y="352" width="180" height="42" fill="#9c27b0" rx="3"/>
    <text x="115" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Packet Filter</text>
    <text x="115" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">Headers only | Layer 3</text>
    <rect x="215" y="352" width="180" height="42" fill="#1976d2" rx="3"/>
    <text x="305" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Stateful Inspection</text>
    <text x="305" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#e3f2fd">Track connections | Layer 4</text>
    <rect x="405" y="352" width="180" height="42" fill="#388e3c" rx="3"/>
    <text x="495" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Proxy Firewall</text>
    <text x="495" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">App layer | Intermediary</text>
    <rect x="595" y="352" width="180" height="42" fill="#ff9800" rx="3"/>
    <text x="685" y="367" text-anchor="middle" font-family="Arial" font-size="9" fill="white">NGFW</text>
    <text x="685" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff3e0">DPI, IPS, App awareness</text>
  </g>
  
  <g class="step" id="step5" data-narration="IDS monitors and alerts on threats passively. IPS actively blocks detected threats in real-time. Types include network-based and host-based systems.">
    <rect x="10" y="410" width="780" height="80" fill="#ffebee" rx="5"/>
    <text x="25" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. IDS vs IPS</text>
    <rect x="25" y="440" width="375" height="42" fill="#f44336" rx="3"/>
    <text x="212" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Intrusion Detection System (IDS)</text>
    <text x="212" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Monitors and ALERTS only | Passive detection</text>
    <rect x="410" y="440" width="365" height="42" fill="#388e3c" rx="3"/>
    <text x="592" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Intrusion Prevention System (IPS)</text>
    <text x="592" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Actively BLOCKS threats | Real-time prevention</text>
  </g>
  
  <g class="step" id="step6" data-narration="VPNs create encrypted tunnels (IPSec, SSL/TLS) for secure remote access. WPA3 is the current Wi-Fi security standard providing robust protection for wireless networks.">
    <rect x="10" y="498" width="780" height="90" fill="#e3f2fd" rx="5"/>
    <text x="25" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Network Security Measures</text>
    <rect x="25" y="528" width="245" height="52" fill="#1976d2" rx="3"/>
    <text x="147" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="white">VPN (Virtual Private Network)</text>
    <text x="147" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Encrypted tunnels: IPSec, SSL/TLS</text>
    <text x="147" y="569" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Remote access &amp; site-to-site</text>
    <rect x="280" y="528" width="245" height="52" fill="#9c27b0" rx="3"/>
    <text x="402" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Wireless Security</text>
    <text x="402" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">WPA3 current standard</text>
    <text x="402" y="569" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Uses SAE for key exchange</text>
    <rect x="535" y="528" width="240" height="52" fill="#ff9800" rx="3"/>
    <text x="655" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Network Segmentation</text>
    <text x="655" y="557" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Divide networks into segments</text>
    <text x="655" y="569" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Contain breaches, limit attacker movement</text>
  </g>
</svg>