<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to the module on Systems Engineering for Designing Sustainable ICT. This topic covers holistic approaches to creating environmentally responsible technology solutions.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Systems Engineering for Designing Sustainable ICT</text>
  </g>
  
  <!-- step1: Systems Engineering Fundamentals -->
  <g class="step" id="step1" data-narration="Systems engineering is an interdisciplinary approach for designing complex systems throughout their lifecycle, focusing on stakeholder needs and holistic system thinking.">
    <rect x="40" y="58" width="720" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="60" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Fundamentals of Systems Engineering</text>
    <rect x="60" y="90" width="140" height="38" rx="4" fill="#1976d2"/>
    <text x="130" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Systems Thinking</text>
    <text x="130" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Holistic approach</text>
    <rect x="210" y="90" width="140" height="38" rx="4" fill="#1976d2"/>
    <text x="280" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Lifecycle Perspective</text>
    <text x="280" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Cradle to grave</text>
    <rect x="360" y="90" width="140" height="38" rx="4" fill="#1976d2"/>
    <text x="430" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Stakeholder Analysis</text>
    <text x="430" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Needs identification</text>
    <text x="520" y="105" font-family="Arial" font-size="9" fill="#333">Key principles include understanding</text>
    <text x="520" y="118" font-family="Arial" font-size="9" fill="#333">requirements and ensuring all</text>
    <text x="520" y="131" font-family="Arial" font-size="9" fill="#333">stakeholder needs are satisfied.</text>
  </g>
  
  <!-- step2: Sustainable ICT Design Principles -->
  <g class="step" id="step2" data-narration="Sustainable ICT design integrates energy efficiency, material selection, and design for disassembly to minimize environmental impact throughout the product lifecycle.">
    <rect x="40" y="146" width="720" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="60" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Sustainable ICT Design Principles</text>
    <rect x="60" y="180" width="120" height="36" rx="4" fill="#388e3c"/>
    <text x="120" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Energy Efficiency</text>
    <text x="120" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Minimize consumption</text>
    <rect x="190" y="180" width="120" height="36" rx="4" fill="#388e3c"/>
    <text x="250" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Material Selection</text>
    <text x="250" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Eco-friendly choices</text>
    <rect x="320" y="180" width="130" height="36" rx="4" fill="#388e3c"/>
    <text x="385" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Design for Disassembly</text>
    <text x="385" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Easy recycling</text>
    <rect x="460" y="180" width="130" height="36" rx="4" fill="#388e3c"/>
    <text x="525" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Extended Producer</text>
    <text x="525" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Responsibility (EPR)</text>
    <text x="600" y="195" font-family="Arial" font-size="8" fill="#333">RoHS directive restricts</text>
    <text x="600" y="208" font-family="Arial" font-size="8" fill="#333">hazardous substances in</text>
    <text x="600" y="221" font-family="Arial" font-size="8" fill="#333">electronic components.</text>
  </g>
  
  <!-- step3: Green Computing Strategies -->
  <g class="step" id="step3" data-narration="Green computing strategies include virtualization, cloud computing, power management, and green software development to reduce computing's environmental footprint across data centers and end-user devices.">
    <rect x="40" y="234" width="720" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="60" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Green Computing Strategies</text>
    <rect x="60" y="268" width="160" height="38" rx="4" fill="#ff9800"/>
    <text x="140" y="287" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Virtualization</text>
    <text x="140" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">15-25% → 80%+ utilization</text>
    <rect x="230" y="268" width="160" height="38" rx="4" fill="#ff9800"/>
    <text x="310" y="287" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Cloud Computing</text>
    <text x="310" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Server consolidation</text>
    <rect x="400" y="268" width="140" height="38" rx="4" fill="#ff9800"/>
    <text x="470" y="287" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Power Management</text>
    <text x="470" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Sleep modes, scaling</text>
    <rect x="550" y="268" width="140" height="38" rx="4" fill="#ff9800"/>
    <text x="620" y="287" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Green Software</text>
    <text x="620" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Efficient code</text>
  </g>
  
  <!-- step4: Lifecycle Assessment -->
  <g class="step" id="step4" data-narration="Lifecycle Assessment follows ISO 14040/14044 standards across four key phases: Goal and Scope Definition, Inventory Analysis, Impact Assessment, and Interpretation for continuous improvement.">
    <rect x="40" y="322" width="720" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="60" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Lifecycle Assessment (LCA) - ISO 14040/14044</text>
    <rect x="60" y="358" width="165" height="36" rx="4" fill="#9c27b0"/>
    <text x="142" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Goal &amp; Scope Definition</text>
    <text x="142" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">Purpose, boundaries, functional unit</text>
    <line x1="225" y1="376" x2="235" y2="376" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="245" y="358" width="165" height="36" rx="4" fill="#9c27b0"/>
    <text x="327" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Inventory Analysis</text>
    <text x="327" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">Inputs/outputs data collection</text>
    <line x1="410" y1="376" x2="420" y2="376" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="430" y="358" width="165" height="36" rx="4" fill="#9c27b0"/>
    <text x="512" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Impact Assessment</text>
    <text x="512" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">Global warming, acidification</text>
    <line x1="595" y1="376" x2="605" y2="376" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="615" y="358" width="135" height="36" rx="4" fill="#9c27b0"/>
    <text x="682" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Interpretation</text>
    <text x="682" y="388" text-anchor="middle" font-family="Arial" font-size="7" fill="#f3e5f5">Results analysis</text>
  </g>
  
  <!-- step5: ICT for Sustainability Applications -->
  <g class="step" id="step5" data-narration="ICT enables sustainability transformation in smart grids, intelligent transportation, environmental monitoring, and precision agriculture through IoT sensor networks, data analytics, and real-time decision making.">
    <rect x="40" y="410" width="720" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="60" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. ICT for Sustainability Applications</text>
    <rect x="60" y="446" width="170" height="36" rx="4" fill="#f44336"/>
    <text x="145" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Smart Grids</text>
    <text x="145" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Optimize energy distribution</text>
    <rect x="240" y="446" width="170" height="36" rx="4" fill="#f44336"/>
    <text x="325" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Intelligent Transportation</text>
    <text x="325" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Traffic flow optimization</text>
    <rect x="420" y="446" width="160" height="36" rx="4" fill="#f44336"/>
    <text x="500" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Environmental Monitoring</text>
    <text x="500" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Air quality, water resources</text>
    <rect x="590" y="446" width="160" height="36" rx="4" fill="#f44336"/>
    <text x="670" y="463" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Precision Agriculture</text>
    <text x="670" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">IoT for resource optimization</text>
  </g>
  
  <!-- step6: Key Metrics and Formulas -->
  <g class="step" id="step6" data-narration="Important metrics include PUE = Total Facility Energy / IT Equipment Energy, with ideal value of 1.0. Key exam topics also include RoHS, WEEE regulations.">
    <rect x="40" y="498" width="720" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="60" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">6. Key Metrics &amp; Important Formulas</text>
    <rect x="60" y="535" width="200" height="45" rx="4" fill="#1976d2"/>
    <text x="160" y="555" text-anchor="middle" font-family="Arial" font-size="11" fill="white">PUE Formula</text>
    <text x="160" y="572" text-anchor="middle" font-family="Arial" font-size="10" fill="white">PUE = Total Facility Energy</text>
    <text x="160" y="585" text-anchor="middle" font-family="Arial" font-size="10" fill="white">/ IT Equipment Energy</text>
    <rect x="270" y="535" width="120" height="45" rx="4" fill="#388e3c"/>
    <text x="330" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Ideal PUE</text>
    <text x="330" y="572" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">1.0</text>
    <rect x="400" y="535" width="100" height="45" rx="4" fill="#ff9800"/>
    <text x="450" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="white">RoHS</text>
    <text x="450" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Hazardous</text>
    <text x="450" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Substances</text>
    <rect x="510" y="535" width="100" height="45" rx="4" fill="#9c27b0"/>
    <text x="560" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="white">WEEE</text>
    <text x="560" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="white">E-waste</text>
    <text x="560" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Recycling</text>
    <rect x="620" y="535" width="130" height="45" rx="4" fill="#f44336"/>
    <text x="685" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="white">ISO 14001</text>
    <text x="685" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Environmental</text>
    <text x="685" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Management</text>
  </g>
</svg>