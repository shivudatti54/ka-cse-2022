<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Course Learning Outcomes (CLOs) define what students know, understand, and can do after completing a course, using the standard phrase: At the end of the course, the student will be able to...">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Course Learning Outcomes (CLOs) in Engineering Education</text>
  </g>

  <!-- step1: Definition and Purpose -->
  <g class="step" id="step1" data-narration="CLOs are specific statements describing expected student achievements after a course. They guide curriculum design, teaching methods, and assessment strategies in outcome-based education.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition &amp; Purpose</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Course Learning Outcomes (CLOs) are specific statements that describe what students</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">should know, understand, and be able to do after completing a course.</text>
    <text x="40" y="128" font-family="Arial" font-size="10" fill="#333">They align with OBE (Outcome-Based Education) mandated by NBA for  engineering.</text>
  </g>

  <!-- step2: Bloom's Taxonomy - Cognitive Domain -->
  <g class="step" id="step2" data-narration="Bloom's Taxonomy cognitive domain has six levels: Remember, Understand, Apply, Analyze, Evaluate, and Create - progressing from basic recall to original creation.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Bloom's Taxonomy - Cognitive Domain</text>
    <rect x="40" y="178" width="100" height="18" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="90" y="191" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">1. Remember</text>
    <rect x="145" y="178" width="100" height="18" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="195" y="191" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">2. Understand</text>
    <rect x="250" y="178" width="100" height="18" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="300" y="191" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">3. Apply</text>
    <rect x="355" y="178" width="100" height="18" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="405" y="191" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">4. Analyze</text>
    <rect x="460" y="178" width="100" height="18" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="510" y="191" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">5. Evaluate</text>
    <rect x="565" y="178" width="100" height="18" fill="#a5d6a7" stroke="#388e3c" rx="3"/>
    <text x="615" y="191" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">6. Create</text>
    <text x="40" y="215" font-family="Arial" font-size="10" fill="#333">Action verbs: Define, Explain, Implement, Compare, Judge, Design</text>
  </g>

  <!-- step3: Three Domains -->
  <g class="step" id="step3" data-narration="The three learning domains in education are Cognitive for knowledge and mental skills, Psychomotor for physical abilities, and Affective for attitudes and emotions in learning.">
    <rect x="20" y="234" width="760" height="75" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Three Domains of Learning</text>
    <rect x="40" y="265" width="230" height="40" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="155" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Cognitive</text>
    <text x="155" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Mental skills</text>
    <rect x="285" y="265" width="230" height="40" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="400" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Psychomotor</text>
    <text x="400" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Physical skills</text>
    <rect x="530" y="265" width="230" height="40" fill="#ffe0b2" stroke="#ff9800" rx="3"/>
    <text x="645" y="280" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Affective</text>
    <text x="645" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Attitudes &amp; values</text>
  </g>

  <!-- step4: COs vs POs -->
  <g class="step" id="step4" data-narration="Program Outcomes (POs) are broad graduate attributes; Course Outcomes (COs) are specific to a course. Each course has 4-6 COs mapped to POs for NBA accreditation.">
    <rect x="20" y="317" width="760" height="85" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="337" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Course Outcomes (COs) vs Program Outcomes (POs)</text>
    <rect x="40" y="350" width="350" height="35" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="215" y="365" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Program Outcomes (POs)</text>
    <text x="215" y="379" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Broad - entire program</text>
    <rect x="405" y="350" width="350" height="35" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="580" y="365" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Course Outcomes (COs)</text>
    <text x="580" y="379" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Specific - individual courses</text>
    <text x="215" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#666"> CSE: 12 POs</text>
    <text x="580" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">4-6 COs per course</text>
  </g>

  <!-- step5: Constructive Alignment -->
  <g class="step" id="step5" data-narration="Constructive alignment ensures learning outcomes, teaching activities, and assessments are coherent. Effective outcomes use specific, measurable action verbs from Bloom's taxonomy.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Constructive Alignment</text>
    <rect x="40" y="445" width="160" height="40" fill="#ffcdd2" stroke="#f44336" rx="3"/>
    <text x="120" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Outcomes</text>
    <text x="120" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">What students learn</text>
    <line x1="200" y1="465" x2="215" y2="465" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="220" y="445" width="160" height="40" fill="#ffcdd2" stroke="#f44336" rx="3"/>
    <text x="300" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Teaching</text>
    <text x="300" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">How taught</text>
    <line x1="380" y1="465" x2="395" y2="465" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="400" y="445" width="160" height="40" fill="#ffcdd2" stroke="#f44336" rx="3"/>
    <text x="480" y="460" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Assessment</text>
    <text x="480" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">How measured</text>
    <text x="620" y="460" font-family="Arial" font-size="9" fill="#666">Use measurable verbs:</text>
    <text x="620" y="476" font-family="Arial" font-size="8" fill="#666">Design, Implement, Analyze</text>
  </g>

  <!-- step6: Examples and Tips -->
  <g class="step" id="step6" data-narration="Example: Design normalized DB schemas up to 3NF. Exam tips: Understand format, identify Bloom's level, map COs to POs, use measurable action verbs.">
    <rect x="20" y="498" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Examples &amp; Exam Tips</text>
    <rect x="40" y="530" width="345" height="40" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="212" y="546" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">Example: DBMS Course</text>
    <text x="212" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">CO1: Design normalized schemas up to 3NF</text>
    <rect x="395" y="530" width="365" height="40" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="577" y="546" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">Exam Tips</text>
    <text x="577" y="560" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">1. Use standard format</text>
    <text x="577" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">2. Identify Bloom's level</text>
  </g>
</svg>