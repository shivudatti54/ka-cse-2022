<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="This slide introduces energy consumption reduction techniques in computing systems using physical properties of electronic circuits, semiconductor devices, and power management strategies.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Energy Consumption Reduction Using Physical Properties</text>
  </g>

  <g class="step" id="step1" data-narration="Dynamic power equation: P equals alpha times C load times V dd squared times f. Voltage reduction gives quadratic power savings.">
    <rect x="20" y="58" width="760" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Fundamental Power Equation: P_dynamic = α × C_load × V_dd² × f</text>
    <rect x="40" y="88" width="150" height="60" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="115" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">α = Switching</text>
    <text x="115" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Activity Factor</text>
    <rect x="200" y="88" width="150" height="60" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="275" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">C_load = Load</text>
    <text x="275" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Capacitance</text>
    <rect x="360" y="88" width="150" height="60" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="435" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">V_dd = Supply</text>
    <text x="435" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Voltage (Quadratic!)</text>
    <rect x="520" y="88" width="150" height="60" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="595" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">f = Clock</text>
    <text x="595" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Frequency</text>
    <text x="700" y="140" font-family="Arial" font-size="10" fill="#f44336" font-weight="bold">Key: Voltage² = Most Impact!</text>
  </g>

  <g class="step" id="step2" data-narration="DVFS reduces voltage and frequency together during low workload periods, saving fifty to seventy percent power with moderate performance loss in processors.">
    <rect x="20" y="166" width="760" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="186" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Dynamic Voltage and Frequency Scaling (DVFS)</text>
    <rect x="40" y="200" width="200" height="55" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="140" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">High Performance</text>
    <text x="140" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">1.2V, 2.0GHz → 15W</text>
    <path d="M250,227 L260,227" marker-end="url(#arrow-green)" stroke="#388e3c" stroke-width="2"/>
    <rect x="270" y="200" width="200" height="55" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="370" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">DVFS Reduced</text>
    <text x="370" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">0.8V, 1.33GHz → 4.5W</text>
    <text x="500" y="220" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">≈70% Power Savings!</text>
    <rect x="500" y="230" width="250" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="625" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Linux Governors: performance,</text>
    <text x="625" y="262" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">powersave, ondemand, conservative</text>
  </g>

  <g class="step" id="step3" data-narration="Clock gating technique disables clock signals to idle circuit blocks, effectively eliminating switching power consumption in unused functional units of digital systems.">
    <rect x="20" y="274" width="760" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="294" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Clock Gating Technique</text>
    <text x="40" y="315" font-family="Arial" font-size="10" fill="#333">Clock network consumes 20-40% of total chip power. Gating unused clocks saves significant energy.</text>
    <rect x="40" y="328" width="220" height="35" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="150" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Without Gating: Always ON</text>
    <rect x="270" y="328" width="220" height="35" fill="#ffe0b2" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="380" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">With Gating: 60% Disabled</text>
    <rect x="500" y="328" width="260" height="35" fill="#ffcc80" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="630" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Result: ~60% Clock Power Savings</text>
    <text x="40" y="375" font-family="Arial" font-size="9" fill="#666">Implemented by synthesis tools or manual insertion for functional units</text>
  </g>

  <g class="step" id="step4" data-narration="Static power from leakage current dominates in idle states. MTCMOS uses high threshold voltage transistors for standby and low threshold for performance.">
    <rect x="20" y="392" width="760" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="412" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Static Power and Leakage Management</text>
    <text x="40" y="432" font-family="Arial" font-size="10" fill="#333">Static power from leakage current (subthreshold, gate leakage) accounts for 30-50% in deep sub-micron processes.</text>
    <rect x="40" y="442" width="230" height="45" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="155" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">MTCMOS</text>
    <text x="155" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">High-Vth for standby</text>
    <rect x="280" y="442" width="230" height="45" fill="#e1bee7" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="395" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Body Biasing</text>
    <text x="395" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Forward/Reverse bias</text>
    <rect x="520" y="442" width="240" height="45" fill="#ce93d8" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="640" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Power Gating</text>
    <text x="640" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Complete unit shutdown</text>
  </g>

  <g class="step" id="step5" data-narration="Memory uses DRAM power modes and cache management. Thermal throttling reduces performance when temperature exceeds safe limits for system reliability.">
    <rect x="20" y="500" width="760" height="90" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Memory Power and Thermal Management</text>
    <rect x="40" y="532" width="180" height="50" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="130" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">DRAM Power Modes</text>
    <text x="130" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Active, Idle, Precharge</text>
    <text x="130" y="577" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Power-down, Self-refresh</text>
    <rect x="230" y="532" width="180" height="50" fill="#ffcdd2" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="320" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Cache Power</text>
    <text x="320" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Way-based disabling</text>
    <text x="320" y="577" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cache decay techniques</text>
    <rect x="420" y="532" width="180" height="50" fill="#ef9a9a" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="510" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Thermal Throttling</text>
    <text x="510" y="565" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Clock/Voltage throttling</text>
    <text x="510" y="577" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Task migration</text>
    <rect x="610" y="532" width="150" height="50" fill="#e57373" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="685" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Key Metric</text>
    <text x="685" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">EDP = Energy × Delay</text>
  </g>
</svg>