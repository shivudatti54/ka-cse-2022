<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <g id="step0" data-narration="Direct effects in software metrics are immediate, measurable impacts of code characteristics on quality attributes like maintainability and sustainability quality.">
    <rect x="25" y="10" width="750" height="40" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="38" font-size="20" fill="#1976d2" font-weight="bold">Direct Effects and Sustainability During Use</text>
  </g>
  <g id="step1" data-narration="Direct effects are observable consequences of specific software characteristics that can be measured immediately without complex inference or prediction analysis.">
    <rect x="25" y="58" width="750" height="85" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-size="14" fill="#1976d2" font-weight="bold">1. Definition: Direct Effects in Software Metrics</text>
    <text x="40" y="100" font-size="11" fill="#333333">Direct effects are immediate, measurable impacts of code characteristics</text>
    <text x="40" y="118" font-size="11" fill="#333333">(complexity, coupling, size) on quality attributes that can be observed</text>
    <text x="40" y="136" font-size="11" fill="#333333">without complex inference or prediction. Contrast with indirect effects.</text>
  </g>
  <g id="step2" data-narration="Key direct effects include code complexity increasing maintainability challenges, coupling creating changeability issues, and code size affecting overall comprehensibility in systems.">
    <rect x="25" y="151" width="750" height="95" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="173" font-size="14" fill="#388e3c" font-weight="bold">2. Primary Direct Effects</text>
    <rect x="40" y="185" width="220" height="52" rx="5" fill="#c8e6c9"/>
    <text x="50" y="203" font-size="11" fill="#2e7d32" font-weight="bold">Complexity → Maintainability</text>
    <text x="50" y="220" font-size="10" fill="#2e7d32">Higher cyclomatic complexity</text>
    <text x="50" y="232" font-size="10" fill="#2e7d32">increases defect likelihood</text>
    <rect x="270" y="185" width="220" height="52" rx="5" fill="#c8e6c9"/>
    <text x="280" y="203" font-size="11" fill="#2e7d32" font-weight="bold">Coupling → Changeability</text>
    <text x="280" y="220" font-size="10" fill="#2e7d32">Direct dependencies create</text>
    <text x="280" y="232" font-size="10" fill="#2e7d32">ripple effects across modules</text>
    <rect x="500" y="185" width="220" height="52" rx="5" fill="#c8e6c9"/>
    <text x="510" y="203" font-size="11" fill="#2e7d32" font-weight="bold">Size → Comprehensibility</text>
    <text x="510" y="220" font-size="10" fill="#2e7d32">Larger files require more</text>
    <text x="510" y="232" font-size="10" fill="#2e7d32">cognitive effort to understand</text>
  </g>
  <g id="step3" data-narration="Sustainability during use has three key dimensions: operational resource efficiency, maintenance ease of changes, and environmental energy consumption in software systems.">
    <rect x="25" y="254" width="750" height="90" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="276" font-size="14" fill="#e65100" font-weight="bold">3. Sustainability During Use: Three Dimensions</text>
    <rect x="40" y="290" width="230" height="45" rx="5" fill="#ffe0b2"/>
    <text x="50" y="308" font-size="11" fill="#ef6c00" font-weight="bold">Operational</text>
    <text x="50" y="324" font-size="10" fill="#ef6c00">Resource efficiency, memory, CPU</text>
    <rect x="285" y="290" width="230" height="45" rx="5" fill="#ffe0b2"/>
    <text x="295" y="308" font-size="11" fill="#ef6c00" font-weight="bold">Maintenance</text>
    <text x="295" y="324" font-size="10" fill="#ef6c00">Ease of fixes, readability</text>
    <rect x="530" y="290" width="230" height="45" rx="5" fill="#ffe0b2"/>
    <text x="540" y="308" font-size="11" fill="#ef6c00" font-weight="bold">Environmental</text>
    <text x="540" y="324" font-size="10" fill="#ef6c00">Energy consumption, storage</text>
  </g>
  <g id="step4" data-narration="Key metrics for sustainability prediction include cyclomatic complexity, coupling metrics such as CBO, afferent and efferent, and cohesion metrics like LCOM patterns.">
    <rect x="25" y="352" width="750" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="374" font-size="14" fill="#7b1fa2" font-weight="bold">4. Key Metrics for Sustainability Prediction</text>
    <text x="40" y="395" font-size="11" fill="#333"><tspan font-weight="bold">Size:</tspan> LOC, Function Points, Halstead Volume | <tspan font-weight="bold">Complexity:</tspan> Cyclomatic, Essential, Design</text>
    <text x="40" y="415" font-size="11" fill="#333"><tspan font-weight="bold">Coupling:</tspan> CBO, Afferent (Ca), Efferent (Ce) | <tspan font-weight="bold">Cohesion:</tspan> LCOM, CAM</text>
    <rect x="40" y="425" width="230" height="15" rx="3" fill="#e1bee7"/>
    <text x="50" y="436" font-size="10" fill="#6a1b9a">Cyclomatic Complexity = Decision Points + 1</text>
    <rect x="280" y="425" width="230" height="15" rx="3" fill="#e1bee7"/>
    <text x="290" y="436" font-size="10" fill="#6a1b9a">Instability I = Ce / (Ce + Ca)</text>
  </g>
  <g id="step5" data-narration="Threshold values help assess risk: cyclomatic complexity over 20 means high risk, CBO above 9 is critical, and LCOM above 4 indicates poor cohesion.">
    <rect x="25" y="455" width="750" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="477" font-size="14" fill="#c62828" font-weight="bold">5. Threshold Values for Risk Assessment</text>
    <rect x="40" y="492" width="160" height="40" rx="5" fill="#ffcdd2"/>
    <text x="50" y="508" font-size="10" fill="#b71c1c" font-weight="bold">Cyclomatic Complexity</text>
    <text x="50" y="522" font-size="9" fill="#b71c1c">Low: 1-10 | Mod: 11-20 | High: &gt;20</text>
    <rect x="210" y="492" width="160" height="40" rx="5" fill="#ffcdd2"/>
    <text x="220" y="508" font-size="10" fill="#b71c1c" font-weight="bold">CBO (per class)</text>
    <text x="220" y="522" font-size="9" fill="#b71c1c">Low: &lt;5 | Mod: 5-9 | High: &gt;9</text>
    <rect x="380" y="492" width="160" height="40" rx="5" fill="#ffcdd2"/>
    <text x="390" y="508" font-size="10" fill="#b71c1c" font-weight="bold">LCOM</text>
    <text x="390" y="522" font-size="9" fill="#b71c1c">Low: 0-2 | Mod: 3-4 | High: &gt;4</text>
    <rect x="550" y="492" width="200" height="40" rx="5" fill="#ffcdd2"/>
    <text x="560" y="508" font-size="10" fill="#b71c1c" font-weight="bold">Lines per Function</text>
    <text x="560" y="522" font-size="9" fill="#b71c1c">Low: &lt;20 | Mod: 20-50 | High: &gt;50</text>
  </g>
  <g id="step6" data-narration="High cohesion with low coupling indicates better software sustainability. Use multiple metrics together for accurate assessment, not isolated values or single metrics.">
    <rect x="25" y="548" width="750" height="38" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="572" font-size="12" fill="#1976d2" font-weight="bold">Key Insight:</text>
    <text x="120" y="572" font-size="11" fill="#333">High cohesion + low coupling = better sustainability. Use multiple metrics together for accurate assessment.</text>
  </g>
</svg>