<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to learning about evaluating sustainability effects in modern engineering and technology practices for our university course and career preparation.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Evaluating Sustainability Effects</text>
  </g>
  
  <!-- step1: What is Sustainability Evaluation -->
  <g class="step" id="step1" data-narration="Sustainability evaluation is the systematic process of measuring, analyzing, and interpreting environmental, social, and economic impacts of products and processes to enable informed decisions.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="url(#blueGrad)" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Sustainability Evaluation?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Process of measuring, analyzing &amp; interpreting environmental, social &amp; economic impacts of</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">products, processes &amp; systems. Essential for IT industry facing carbon emissions from data centers.</text>
    <text x="40" y="128" font-family="Arial" font-size="9" fill="#666">Key methods: LCA, Carbon Footprint Analysis, EIA, Green Computing Metrics</text>
  </g>
  
  <!-- step2: Life Cycle Assessment (LCA) -->
  <g class="step" id="step2" data-narration="LCA, following ISO 14040/14044 standards, is a comprehensive method for evaluating environmental impacts across all product lifecycle stages from raw material extraction to end-of-life disposal.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="url(#greenGrad)" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Life Cycle Assessment (LCA) - ISO 14040/14044</text>
    <rect x="40" y="178" width="150" height="45" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="115" y="192" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">1. Goal &amp; Scope</text>
    <text x="115" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Define boundaries,</text>
    <text x="115" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">functional unit</text>
    <path d="M190 200 L210 200" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="220" y="178" width="150" height="45" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="295" y="192" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">2. Inventory Analysis</text>
    <text x="295" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Collect data on</text>
    <text x="295" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">energy, water, materials</text>
    <path d="M370 200 L390 200" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="400" y="178" width="150" height="45" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="475" y="192" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">3. Impact Assessment</text>
    <text x="475" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Evaluate significance of</text>
    <text x="475" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">environmental impacts</text>
    <path d="M550 200 L570 200" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="580" y="178" width="150" height="45" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="655" y="192" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">4. Interpretation</text>
    <text x="655" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Analyze results, draw</text>
    <text x="655" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">conclusions &amp; recommend</text>
  </g>
  
  <!-- step3: Carbon Footprint & Emission Scopes -->
  <g class="step" id="step3" data-narration="Carbon footprint analysis measures greenhouse gas emissions in CO2 equivalent across three distinct scopes: direct emissions, indirect energy-related emissions, and value chain emissions.">
    <rect x="20" y="234" width="760" height="93" rx="8" fill="url(#orangeGrad)" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Carbon Footprint Analysis - Emission Scopes</text>
    <rect x="40" y="268" width="220" height="40" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="150" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Scope 1: Direct Emissions</text>
    <text x="150" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Owned sources (fuel combustion)</text>
    <rect x="280" y="268" width="220" height="40" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="390" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Scope 2: Indirect Energy</text>
    <text x="390" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Purchased electricity, steam, cooling</text>
    <rect x="520" y="268" width="220" height="40" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="630" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Scope 3: Value Chain</text>
    <text x="630" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">All other indirect emissions</text>
    <text x="40" y="320" font-family="Arial" font-size="10" fill="#333">Formula: Carbon Footprint = Energy (kWh) × Emission Factor (kg CO2/kWh)</text>
  </g>
  
  <!-- step4: Green Computing Metrics -->
  <g class="step" id="step4" data-narration="Green computing metrics include PUE for data center efficiency measurement, virtualization ratios for server consolidation tracking, and software energy consumption analysis for optimization.">
    <rect x="20" y="335" width="760" height="80" rx="8" fill="url(#purpleGrad)" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="355" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Green Computing Metrics (CSE Focus)</text>
    <rect x="40" y="371" width="180" height="38" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="130" y="385" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Power Usage Effectiveness</text>
    <text x="130" y="399" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">PUE = Total / IT Energy</text>
    <text x="130" y="407" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Ideal: 1.0, Good: 1.1-1.2</text>
    <rect x="240" y="371" width="180" height="38" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="330" y="385" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Data Center Efficiency</text>
    <text x="330" y="399" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">kW per rack or per sq ft</text>
    <text x="330" y="407" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Lower = more efficient</text>
    <rect x="440" y="371" width="180" height="38" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="530" y="385" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Virtualization Ratio</text>
    <text x="530" y="399" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">% of virtualized servers</text>
    <text x="530" y="407" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Can reduce energy 50-80%</text>
    <rect x="640" y="371" width="130" height="38" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="705" y="385" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Software Energy</text>
    <text x="705" y="399" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Energy per code execution</text>
    <text x="705" y="407" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Green coding matters</text>
  </g>
  
  <!-- step5: Key Examples -->
  <g class="step" id="step5" data-narration="The use phase dominates laptop lifecycle assessment, contributing approximately 87% of total carbon footprint, while data centers collectively consume 1-2% of global electricity annually.">
    <rect x="20" y="423" width="760" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="443" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Key Examples &amp; Statistics</text>
    <rect x="40" y="457" width="340" height="40" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="210" y="471" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Laptop LCA Example</text>
    <text x="210" y="485" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Manufacturing: 400kg | Use: 2,920kg (87%) | End-of-Life: -30kg</text>
    <rect x="400" y="457" width="340" height="40" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="570" y="471" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Data Center Example</text>
    <text x="570" y="485" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">125kW × 8,760h × 0.7 = 766,500 kg CO2/year</text>
    <text x="40" y="510" font-family="Arial" font-size="10" fill="#333">Cloud vs On-Premise: Cloud reduces carbon footprint by 60-90% through shared infrastructure</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Remember these key concepts: LCA's four phases, emission scopes one through three, PUE formula calculations, the 3R sustainability principle, and ISO 14040/14044 standards for environmental assessment.">
    <rect x="20" y="521" width="760" height="75" rx="8" fill="url(#blueGrad)" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="541" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Takeaways</text>
    <rect x="40" y="555" width="150" height="38" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="115" y="569" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">LCA 4 Phases</text>
    <text x="115" y="581" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Goal → Inventory →</text>
    <text x="115" y="589" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Impact → Interpret</text>
    <rect x="205" y="555" width="150" height="38" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="280" y="569" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Emission Scopes</text>
    <text x="280" y="581" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Scope 1: Direct</text>
    <text x="280" y="589" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Scope 2: Energy | Scope 3</text>
    <rect x="370" y="555" width="150" height="38" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="445" y="569" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">PUE Formula</text>
    <text x="445" y="581" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">PUE = Total / IT Energy</text>
    <text x="445" y="589" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">1.0 is perfect</text>
    <rect x="535" y="555" width="110" height="38" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="590" y="569" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">3R Principle</text>
    <text x="590" y="581" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Reduce Reuse</text>
    <text x="590" y="589" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Recycle</text>
    <rect x="660" y="555" width="110" height="38" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="715" y="569" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">ISO Standards</text>
    <text x="715" y="581" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ISO 14040/14044</text>
    <text x="715" y="589" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">LCA Methodology</text>
  </g>
</svg>