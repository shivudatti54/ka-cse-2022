<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Green Information Technology - learning about sustainable computing practices that reduce environmental impact while improving energy efficiency and lowering operational costs.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2e7d32">Green Information Technology: A Sustainable Approach</text>
  </g>
  
  <!-- Step 1: Definition and Three Pillars -->
  <g class="step" id="step1" data-narration="Green IT is the practice of using IT resources efficiently to minimize environmental impact, covering design, manufacturing, use, and disposal.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">What is Green IT?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Green IT minimizes environmental impact of computing through sustainable practices across</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">the entire product lifecycle. Three pillars: Environmental Protection, Economic Viability,</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">Social Responsibility. Data centers consume 1-2% of global electricity.</text>
  </g>
  
  <!-- Step 2: Key Strategies -->
  <g class="step" id="step2" data-narration="Key Green IT strategies include green computing, energy-efficient hardware with DVFS technology, power management features, green procurement, and comprehensive recycling programs for all electronic equipment.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Key Strategies</text>
    <rect x="40" y="178" width="170" height="50" rx="3" fill="#fff8e1" stroke="#ffb74d"/>
    <text x="125" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Green Computing</text>
    <text x="125" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Efficient design,</text>
    <text x="125" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">manufacturing, use</text>
    <rect x="220" y="178" width="170" height="50" rx="3" fill="#fff8e1" stroke="#ffb74d"/>
    <text x="305" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Energy-Efficient HW</text>
    <text x="305" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">DVFS, SSDs,</text>
    <text x="305" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">power management</text>
    <rect x="400" y="178" width="170" height="50" rx="3" fill="#fff8e1" stroke="#ffb74d"/>
    <text x="485" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Green Procurement</text>
    <text x="485" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Lifecycle assessment,</text>
    <text x="485" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">eco-friendly vendors</text>
    <rect x="580" y="178" width="180" height="50" rx="3" fill="#fff8e1" stroke="#ffb74d"/>
    <text x="670" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Recycling Programs</text>
    <text x="670" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">E-waste management,</text>
    <text x="670" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">refurbishing</text>
  </g>
  
  <!-- Step 3: Virtualization & Cloud -->
  <g class="step" id="step3" data-narration="Virtualization runs multiple VMs on one physical server, reducing hardware needs. Cloud computing enables on-demand resource sharing and green data centers.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Virtualization &amp; Cloud Computing</text>
    <rect x="40" y="268" width="240" height="40" rx="3" fill="#c8e6c9" stroke="#66bb6a"/>
    <text x="160" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Virtualization</text>
    <text x="160" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">50-80% energy savings</text>
    <path d="M290,288 L330,288" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    <rect x="340" y="268" width="240" height="40" rx="3" fill="#c8e6c9" stroke="#66bb6a"/>
    <text x="460" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Cloud Computing</text>
    <text x="460" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">On-demand resource sharing</text>
    <path d="M590,288 L630,288" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    <rect x="640" y="268" width="120" height="40" rx="3" fill="#c8e6c9" stroke="#66bb6a"/>
    <text x="700" y="283" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Green Data Centers</text>
    <text x="700" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Renewable energy</text>
  </g>
  
  <!-- Step 4: E-Waste Management -->
  <g class="step" id="step4" data-narration="E-waste contains toxic materials like lead, mercury, cadmium, and chromium that cause serious health issues. Proper recycling recovers valuable metals and prevents dangerous groundwater contamination.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">E-Waste Management</text>
    <text x="40" y="360" font-family="Arial" font-size="10" fill="#333">Hazardous Materials in E-Waste:</text>
    <rect x="40" y="368" width="100" height="28" rx="3" fill="#ffcdd2" stroke="#ef9a9a"/>
    <text x="90" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Lead</text>
    <text x="90" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Nerve damage</text>
    <rect x="150" y="368" width="100" height="28" rx="3" fill="#ffcdd2" stroke="#ef9a9a"/>
    <text x="200" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Mercury</text>
    <text x="200" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Brain damage</text>
    <rect x="260" y="368" width="100" height="28" rx="3" fill="#ffcdd2" stroke="#ef9a9a"/>
    <text x="310" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Cadmium</text>
    <text x="310" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Kidney damage</text>
    <rect x="370" y="368" width="100" height="28" rx="3" fill="#ffcdd2" stroke="#ef9a9a"/>
    <text x="420" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Chromium</text>
    <text x="420" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Cancer risk</text>
    <rect x="480" y="368" width="280" height="28" rx="3" fill="#ffcdd2" stroke="#ef9a9a"/>
    <text x="620" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Recycling Recovery</text>
    <text x="620" y="394" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">500kg metals + 200kg plastics per tonne</text>
  </g>
  
  <!-- Step 5: Energy Calculation Example -->
  <g class="step" id="step5" data-narration="Virtualization example: 50 servers at 300W can consolidate to just 15 servers, saving 70% energy and approximately ₹6.4 lakh annually in electricity costs for the organization.">
    <rect x="20" y="410" width="760" height="90" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Example: Data Center Virtualization</text>
    <rect x="40" y="445" width="340" height="40" rx="3" fill="#ede7f6" stroke="#b39ddb"/>
    <text x="210" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Before Virtualization</text>
    <text x="210" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">50 servers × 300W × 8760h = 131,400 kWh</text>
    <rect x="390" y="445" width="370" height="40" rx="3" fill="#ede7f6" stroke="#b39ddb"/>
    <text x="575" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">After Virtualization</text>
    <text x="575" y="476" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">15 servers × 300W × 8760h = 39,420 kWh</text>
    <text x="40" y="492" font-family="Arial" font-size="10" fill="#333">Annual Savings: 70% reduction = ₹6,43,860 at ₹7/kWh</text>
  </g>
  
  <!-- Step 6: Key Formulas & PUE -->
  <g class="step" id="step6" data-narration="Key formulas: Energy = Power × Time, PUE = Total Facility Energy / IT Energy. Green IT reduces costs and carbon footprint while maintaining efficiency.">
    <rect x="20" y="508" width="760" height="80" rx="5" fill="#e1f5fe" stroke="#0288d1" stroke-width="2"/>
    <text x="40" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#01579b">Key Formulas &amp; Metrics</text>
    <rect x="40" y="540" width="200" height="42" rx="3" fill="#b3e5fc" stroke="#4fc3f7"/>
    <text x="140" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b">Server Energy</text>
    <text x="140" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">Power(W) × Hours = Wh</text>
    <rect x="250" y="540" width="200" height="42" rx="3" fill="#b3e5fc" stroke="#4fc3f7"/>
    <text x="350" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b">PUE Metric</text>
    <text x="350" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">Total Facility / IT Energy</text>
    <rect x="460" y="540" width="200" height="42" rx="3" fill="#b3e5fc" stroke="#4fc3f7"/>
    <text x="560" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b">Virtualization Savings</text>
    <text x="560" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">(1 - Consolidated/Total) × 100%</text>
    <text x="670" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b">Exam Tips</text>
    <text x="670" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">Memorize definitions,</text>
    <text x="670" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#0277bd">pillars, and formulas</text>
  </g>
</svg>