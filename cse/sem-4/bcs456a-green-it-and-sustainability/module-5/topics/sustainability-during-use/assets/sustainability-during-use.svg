<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Sustainability during use minimizes environmental, economic, and social impact of software throughout its operational lifecycle, reducing carbon emissions and extending useful software life through careful design practices.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Sustainability During Use</text>
  </g>
  
  <g class="step" id="step1" data-narration="Energy-efficient design uses optimized algorithms, lazy evaluation, caching, and power-aware computing to minimize software power consumption and extend battery life on portable devices while reducing data center energy costs.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. Energy-Efficient Software Design</text>
    <rect x="40" y="90" width="170" height="40" fill="#ffffff" rx="4"/>
    <text x="125" y="106" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Algorithm Optimization</text>
    <text x="125" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">O(n²) → O(n log n)</text>
    <rect x="220" y="90" width="170" height="40" fill="#ffffff" rx="4"/>
    <text x="305" y="106" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Lazy Evaluation</text>
    <text x="305" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Defer computation</text>
    <rect x="400" y="90" width="170" height="40" fill="#ffffff" rx="4"/>
    <text x="485" y="106" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Caching Strategies</text>
    <text x="485" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Avoid redundancy</text>
    <rect x="580" y="90" width="180" height="40" fill="#ffffff" rx="4"/>
    <text x="670" y="106" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Power-Aware Computing</text>
    <text x="670" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Low-power modes</text>
  </g>
  
  <g class="step" id="step2" data-narration="Resource optimization minimizes memory, CPU, storage, and network usage through efficient management and load balancing techniques that reduce server requirements and improve overall system efficiency across cloud deployments.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">2. Resource Optimization</text>
    <rect x="40" y="180" width="175" height="38" fill="#ffffff" rx="4"/>
    <text x="127" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Memory Management</text>
    <text x="127" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Efficient allocation</text>
    <rect x="225" y="180" width="175" height="38" fill="#ffffff" rx="4"/>
    <text x="312" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Load Balancing</text>
    <text x="312" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Distribute workload</text>
    <rect x="410" y="180" width="175" height="38" fill="#ffffff" rx="4"/>
    <text x="497" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Network Efficiency</text>
    <text x="497" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Compression, minimal transfer</text>
    <rect x="595" y="180" width="175" height="38" fill="#ffffff" rx="4"/>
    <text x="682" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Storage Optimization</text>
    <text x="682" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Data formats</text>
  </g>
  
  <g class="step" id="step3" data-narration="Sustainable maintenance through modular design, comprehensive documentation, strong code quality, and thorough test coverage extends software lifecycle without requiring complete redevelopment, reducing waste and development costs over time.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">3. Sustainable Maintenance Practices</text>
    <rect x="40" y="268" width="175" height="38" fill="#ffffff" rx="4"/>
    <text x="127" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Modular Design</text>
    <text x="127" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Independent modules</text>
    <rect x="225" y="268" width="175" height="38" fill="#ffffff" rx="4"/>
    <text x="312" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Documentation</text>
    <text x="312" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Comprehensive support</text>
    <rect x="410" y="268" width="175" height="38" fill="#ffffff" rx="4"/>
    <text x="497" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Code Quality</text>
    <text x="497" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Clean, readable code</text>
    <rect x="595" y="268" width="175" height="38" fill="#ffffff" rx="4"/>
    <text x="682" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Test Coverage</text>
    <text x="682" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Thorough testing</text>
  </g>
  
  <g class="step" id="step4" data-narration="Software evolution requires extensibility, scalability, and technical debt management to adapt to changing requirements without requiring complete system replacement, minimizing electronic waste from discarded hardware and software systems.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">4. Software Evolution and Adaptability</text>
    <rect x="40" y="356" width="230" height="38" fill="#ffffff" rx="4"/>
    <text x="155" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Extensibility</text>
    <text x="155" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Add new features easily</text>
    <rect x="280" y="356" width="230" height="38" fill="#ffffff" rx="4"/>
    <text x="395" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Scalability</text>
    <text x="395" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Handle increased workloads</text>
    <rect x="520" y="356" width="250" height="38" fill="#ffffff" rx="4"/>
    <text x="645" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Technical Debt Management</text>
    <text x="645" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Reduce accumulated debt</text>
  </g>
  
  <g class="step" id="step5" data-narration="Green computing metrics measure sustainability through power consumption per operation, carbon footprint from energy use, and resource utilization rates to identify optimization opportunities in data center and edge computing environments.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">5. Green Computing Metrics</text>
    <rect x="40" y="444" width="220" height="38" fill="#ffffff" rx="4"/>
    <text x="150" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Power Consumption</text>
    <text x="150" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Energy per operation</text>
    <rect x="270" y="444" width="220" height="38" fill="#ffffff" rx="4"/>
    <text x="380" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Carbon Footprint</text>
    <text x="380" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">kWh × CO₂ intensity</text>
    <rect x="500" y="444" width="270" height="38" fill="#ffffff" rx="4"/>
    <text x="635" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Resource Utilization Rate</text>
    <text x="635" y="472" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Active time / Total time</text>
  </g>
  
  <g class="step" id="step6" data-narration="Optimizing bubble sort from O(n²) to quicksort O(n log n) reduces processing time by 90% with significant energy savings, while caching reduces database queries by 80-90% and response time by 50-70%.">
    <rect x="20" y="498" width="760" height="90" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">6. Practical Examples</text>
    <rect x="40" y="530" width="340" height="50" fill="#ffffff" rx="4"/>
    <text x="210" y="544" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Algorithm Optimization Impact</text>
    <text x="210" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Bubble sort O(n²) → Quicksort O(n log n)</text>
    <text x="210" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">90% faster, significant energy savings</text>
    <rect x="390" y="530" width="380" height="50" fill="#ffffff" rx="4"/>
    <text x="580" y="544" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Caching Impact</text>
    <text x="580" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Database queries reduced by 80-90%</text>
    <text x="580" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Response time improved 50-70%</text>
  </g>
</svg>