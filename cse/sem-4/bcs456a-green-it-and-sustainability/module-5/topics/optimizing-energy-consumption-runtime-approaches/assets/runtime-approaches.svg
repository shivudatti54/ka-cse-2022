<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Runtime Approaches in Green IT">
    <text x="50" y="50" font-size="24" fill="#2563eb">Runtime Approaches in Green IT</text>
    <text x="50" y="80" font-size="18" fill="#8b5cf6">Strategies for minimizing environmental impact during execution</text>
  </g>
  <g id="step1" data-narration="Dynamic Voltage and Frequency Scaling (DVFS)">
    <rect x="50" y="120" width="200" height="100" fill="#10b981" rx="10" />
    <text x="60" y="150" font-size="18" fill="#ffffff">DVFS</text>
    <text x="60" y="180" font-size="14" fill="#ffffff">Adjusts CPU voltage and frequency based on workload</text>
    <line x1="250" y1="160" x2="350" y2="160" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="How DVFS works">
    <rect x="350" y="120" width="200" height="100" fill="#10b981" rx="10" />
    <text x="360" y="150" font-size="18" fill="#ffffff">Low Workload</text>
    <text x="360" y="180" font-size="14" fill="#ffffff">Reduce CPU voltage and frequency</text>
    <line x1="550" y1="160" x2="650" y2="160" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" data-narration="Dynamic Resource Scheduling (DRS) and Consolidation">
    <rect x="50" y="250" width="200" height="100" fill="#10b981" rx="10" />
    <text x="60" y="280" font-size="18" fill="#ffffff">DRS</text>
    <text x="60" y="310" font-size="14" fill="#ffffff">Live-migrates VMs to consolidate workloads</text>
    <line x1="250" y1="290" x2="350" y2="290" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="How DRS works">
    <rect x="350" y="250" width="200" height="100" fill="#10b981" rx="10" />
    <text x="360" y="280" font-size="18" fill="#ffffff">Underutilized Servers</text>
    <text x="360" y="310" font-size="14" fill="#ffffff">Migrate VMs and power down idle servers</text>
    <line x1="550" y1="290" x2="650" y2="290" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step5" data-narration="Example of DRS in a data center">
    <rect x="50" y="380" width="200" height="100" fill="#10b981" rx="10" />
    <text x="60" y="410" font-size="18" fill="#ffffff">Data Center</text>
    <text x="60" y="440" font-size="14" fill="#ffffff">30% capacity on a weekend, consolidate 30 VMs onto 4 hosts</text>
    <line x1="250" y1="420" x2="350" y2="420" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step6" data-narration="Benefits of Runtime Approaches">
    <rect x="350" y="380" width="200" height="100" fill="#10b981" rx="10" />
    <text x="360" y="410" font-size="18" fill="#ffffff">Benefits</text>
    <text x="360" y="440" font-size="14" fill="#ffffff">Reduced energy consumption, increased efficiency, and cost savings</text>
  </g>
  <g id="step7" data-narration="Real-world applications of Runtime Approaches">
    <rect x="50" y="520" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="540" font-size="18" fill="#ffffff">Real-world Applications</text>
    <text x="60" y="570" font-size="14" fill="#ffffff">Data centers, cloud computing, and mobile devices</text>
  </g>
  <g id="step8" data-narration="Conclusion">
    <rect x="350" y="520" width="200" height="50" fill="#10b981" rx="10" />
    <text x="360" y="540" font-size="18" fill="#ffffff">Conclusion</text>
    <text x="360" y="570" font-size="14" fill="#ffffff">Runtime Approaches are crucial for reducing environmental impact in IT</text>
  </g>
</svg>