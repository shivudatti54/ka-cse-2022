<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to this module on optimizing application energy consumption. We'll explore sources of energy drain, profiling techniques, and practical optimization strategies.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Optimizing Energy Consumption of Applications</text>
  </g>
  
  <!-- step1: Sources of Energy Consumption -->
  <g class="step" id="step1" data-narration="The main energy consumers in applications are CPU processing, memory access, display and graphics, wireless communication, and sensors or peripherals for mobile and embedded systems.">
    <rect x="30" y="58" width="740" height="85" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="45" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">1. Sources of Energy Consumption</text>
    <rect x="45" y="88" width="140" height="45" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="115" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">CPU Processing</text>
    <text x="115" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Largest consumer</text>
    <rect x="195" y="88" width="140" height="45" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="265" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Memory Access</text>
    <text x="265" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Cache vs DRAM</text>
    <rect x="345" y="88" width="140" height="45" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="415" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Display/Graphics</text>
    <text x="415" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">30-50% on mobile</text>
    <rect x="495" y="88" width="140" height="45" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="565" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Wireless Comm</text>
    <text x="565" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">RF transmission</text>
    <rect x="645" y="88" width="110" height="45" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="700" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Sensors</text>
    <text x="700" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">GPS, camera</text>
  </g>
  
  <!-- step2: Energy Profiling -->
  <g class="step" id="step2" data-narration="Before optimizing, profile your app to find energy hotspots. Use power measurement tools, profiling APIs like Android Profiler, and system tracing to identify where energy is wasted.">
    <rect x="30" y="151" width="740" height="85" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="45" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">2. Energy Profiling &amp; Analysis</text>
    <rect x="45" y="185" width="220" height="42" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="155" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Power Measurement</text>
    <text x="155" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Hardware monitors, software APIs</text>
    <rect x="275" y="185" width="220" height="42" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="385" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Profiling Tools</text>
    <text x="385" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Android Profiler, Xcode Energy Organizer</text>
    <rect x="505" y="185" width="220" height="42" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="615" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Tracing &amp; Logging</text>
    <text x="615" y="216" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">System traces, identify wake locks</text>
  </g>
  
  <!-- step3: Algorithm &amp; Code Level Optimizations -->
  <g class="step" id="step3" data-narration="Algorithm optimizations include reducing computational complexity, using efficient data structures, and approximate computing. Code-level optimizations use loop optimization and bitwise operations.">
    <rect x="30" y="244" width="740" height="85" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="45" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">3. Algorithm &amp; Code-Level Optimizations</text>
    <rect x="45" y="278" width="230" height="42" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="160" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Algorithm Optimizations</text>
    <text x="160" y="309" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Complexity reduction, cache-friendly structures</text>
    <rect x="285" y="278" width="230" height="42" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Code Optimizations</text>
    <text x="400" y="309" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Loop optimization, function inlining</text>
    <rect x="525" y="278" width="230" height="42" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="640" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Bitwise Operations</text>
    <text x="640" y="309" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Use AND instead of modulo (1 vs multiple cycles)</text>
  </g>
  
  <!-- step4: System Level Optimizations -->
  <g class="step" id="step4" data-narration="System-level optimizations utilize power management APIs like DVFS, optimize background processing with WorkManager, and reduce network calls through caching and compression.">
    <rect x="30" y="337" width="740" height="85" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="45" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">4. System-Level Optimizations</text>
    <rect x="45" y="371" width="170" height="42" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="130" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Power Management</text>
    <text x="130" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">DVFS, sleep modes, CPU scaling</text>
    <rect x="225" y="371" width="170" height="42" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="310" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Background Processing</text>
    <text x="310" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">WorkManager, JobScheduler</text>
    <rect x="405" y="371" width="170" height="42" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="490" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Network Optimization</text>
    <text x="490" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Caching, compression, batching</text>
    <rect x="585" y="371" width="170" height="42" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="670" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Energy-Aware Patterns</text>
    <text x="670" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Event-driven, lazy evaluation</text>
  </g>
  
  <!-- step5: Mobile Specific Considerations -->
  <g class="step" id="step5" data-narration="Mobile apps require special handling: proper activity lifecycle management, careful wake lock usage, and efficient location services using passive providers when possible.">
    <rect x="30" y="430" width="740" height="85" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="45" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. Mobile-Specific Optimizations</text>
    <rect x="45" y="464" width="170" height="42" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="130" y="479" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Activity Lifecycle</text>
    <text x="130" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">onPause, onResume, release resources</text>
    <rect x="225" y="464" width="170" height="42" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="310" y="479" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Wake Locks</text>
    <text x="310" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Use partial locks, release promptly</text>
    <rect x="405" y="464" width="170" height="42" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="490" y="479" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Location Services</text>
    <text x="490" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Passive provider, batch updates</text>
    <rect x="585" y="464" width="170" height="42" rx="4" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="670" y="479" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Doze &amp; App Standby</text>
    <text x="670" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Respect battery saver modes</text>
  </g>
  
  <!-- step6: Key Takeaways -->
  <g class="step" id="step6" data-narration="Key points: CPU is largest energy consumer, profile before optimizing, reduce network calls significantly, and remember trade-offs between energy efficiency and performance.">
    <rect x="30" y="523" width="740" height="60" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="45" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key Takeaways</text>
    <text x="45" y="563" font-family="Arial" font-size="10" fill="#2e7d32">• Profile before optimizing • CPU &gt; Display &gt; Radio are main consumers • Network calls are expensive (reduce, cache, compress)</text>
    <text x="45" y="578" font-family="Arial" font-size="10" fill="#2e7d32">• Bitwise ops save energy • Trade-offs: slower at lower voltage often saves more energy than faster processing</text>
  </g>
</svg>