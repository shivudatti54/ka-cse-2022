<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on analyzing energy consumption in applications, a crucial topic for mobile and embedded systems development and optimization.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Analyzing the Energy Consumption of an Application</text>
  </g>
  
  <g class="step" id="step1" data-narration="Energy consumption analysis is critical for mobile devices with limited battery capacity and embedded systems running on constrained power sources.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Why Analyze Energy Consumption?</text>
    <rect x="40" y="90" width="150" height="38" fill="#c8e6c9" rx="3"/>
    <text x="45" y="105" font-family="Arial" font-size="9" fill="#2e7d32">Mobile Devices</text>
    <text x="45" y="118" font-family="Arial" font-size="8" fill="#388e3c">Limited battery capacity</text>
    <rect x="205" y="90" width="150" height="38" fill="#c8e6c9" rx="3"/>
    <text x="210" y="105" font-family="Arial" font-size="9" fill="#2e7d32">Embedded Systems</text>
    <text x="210" y="118" font-family="Arial" font-size="8" fill="#388e3c">Constrained power sources</text>
    <rect x="370" y="90" width="150" height="38" fill="#c8e6c9" rx="3"/>
    <text x="375" y="105" font-family="Arial" font-size="9" fill="#2e7d32">User Experience</text>
    <text x="375" y="118" font-family="Arial" font-size="8" fill="#388e3c">Longer battery life matters</text>
    <rect x="535" y="90" width="180" height="38" fill="#c8e6c9" rx="3"/>
    <text x="540" y="105" font-family="Arial" font-size="9" fill="#2e7d32">Software Engineering</text>
    <text x="540" y="118" font-family="Arial" font-size="8" fill="#388e3c">Energy-efficient app design</text>
  </g>
  
  <g class="step" id="step2" data-narration="The five primary energy consumers in mobile applications are the CPU, display screen, wireless radios, GPS and sensors, and storage I/O operations.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Primary Energy Consumers</text>
    <rect x="40" y="182" width="130" height="35" fill="#ffe0b2" rx="3"/>
    <text x="70" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">CPU</text>
    <text x="70" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Largest consumer</text>
    <rect x="180" y="182" width="130" height="35" fill="#ffe0b2" rx="3"/>
    <text x="210" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Display</text>
    <text x="210" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Brightness drains power</text>
    <rect x="320" y="182" width="130" height="35" fill="#ffe0b2" rx="3"/>
    <text x="350" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Wireless Radios</text>
    <text x="350" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">WiFi, BT, Cellular</text>
    <rect x="460" y="182" width="130" height="35" fill="#ffe0b2" rx="3"/>
    <text x="490" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">GPS / Sensors</text>
    <text x="490" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">High power polling</text>
    <rect x="600" y="182" width="130" height="35" fill="#ffe0b2" rx="3"/>
    <text x="630" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Storage I/O</text>
    <text x="630" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#bf360c">Read/write operations</text>
  </g>
  
  <g class="step" id="step3" data-narration="Energy profiling measures consumption using hardware tools like power analyzers for accuracy, or software tools like Battery Historian for accessibility.">
    <rect x="20" y="234" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Energy Profiling Techniques</text>
    <rect x="40" y="270" width="340" height="38" fill="#bbdefb" rx="3"/>
    <text x="50" y="285" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">Hardware-based Profiling</text>
    <text x="50" y="299" font-family="Arial" font-size="8" fill="#1565c0">Power analyzers, high accuracy</text>
    <rect x="400" y="270" width="340" height="38" fill="#bbdefb" rx="3"/>
    <text x="410" y="285" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">Software-based Profiling</text>
    <text x="410" y="299" font-family="Arial" font-size="8" fill="#1565c0">Batterystats, Battery Historian</text>
  </g>
  
  <g class="step" id="step4" data-narration="The energy formula calculates total consumption as the sum of power times time for each component: Total Energy equals sum of P subscript i times T subscript i.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Energy Model Formula</text>
    <rect x="40" y="358" width="220" height="35" fill="#e1bee7" rx="3"/>
    <text x="50" y="378" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">E = Σ(Pᵢ × Tᵢ)</text>
    <text x="270" y="378" font-family="Arial" font-size="10" fill="#7b1fa2">Total Energy = Sum of (Power × Time)</text>
    <rect x="40" y="395" width="340" height="25" fill="#ce93d8" rx="3"/>
    <text x="50" y="407" font-family="Arial" font-size="9" fill="#4a148c">Pᵢ = Power consumption (Watts)</text>
    <text x="240" y="407" font-family="Arial" font-size="9" fill="#4a148c">Tᵢ = Time in that state (seconds)</text>
    <rect x="400" y="395" width="340" height="25" fill="#ce93d8" rx="3"/>
    <text x="410" y="407" font-family="Arial" font-size="9" fill="#4a148c">Example: CPU 0.5W × 200s = 100J</text>
    <text x="580" y="407" font-family="Arial" font-size="9" fill="#4a148c">for 100 images</text>
  </g>
  
  <g class="step" id="step5" data-narration="Hardware components have power states: active (full power), idle (reduced), and sleep (minimal), with significant energy cost for wake-up transitions.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Power States and Wake-up Cost</text>
    <rect x="40" y="446" width="140" height="35" fill="#ffcdd2" rx="3"/>
    <text x="50" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">ACTIVE</text>
    <text x="50" y="474" font-family="Arial" font-size="8" fill="#c62828">Full power computation</text>
    <rect x="190" y="446" width="140" height="35" fill="#ffcdd2" rx="3"/>
    <text x="200" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">IDLE</text>
    <text x="200" y="474" font-family="Arial" font-size="8" fill="#c62828">Reduced power waiting</text>
    <rect x="340" y="446" width="140" height="35" fill="#ffcdd2" rx="3"/>
    <text x="350" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">SLEEP</text>
    <text x="350" y="474" font-family="Arial" font-size="8" fill="#c62828">Minimal power memory</text>
    <rect x="490" y="446" width="140" height="35" fill="#ef9a9a" rx="3"/>
    <text x="500" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c">WAKE-UP</text>
    <text x="500" y="474" font-family="Arial" font-size="8" fill="#c62828">Energy penalty cost</text>
    <text x="640" y="462" font-family="Arial" font-size="9" fill="#d32f2f">⚠ Frequent wake-ups</text>
    <text x="640" y="474" font-family="Arial" font-size="8" fill="#d32f2f">waste more energy!</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key optimization strategies include computation offloading, batch processing, adaptive algorithms, cache optimization, and efficient network protocols.">
    <rect x="20" y="498" width="760" height="85" fill="#e8f5e9" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Energy Optimization Strategies</text>
    <rect x="40" y="532" width="130" height="42" fill="#c8e6c9" rx="3"/>
    <text x="50" y="547" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Computation</text>
    <text x="50" y="559" font-family="Arial" font-size="8" fill="#2e7d32">Offloading to cloud</text>
    <text x="50" y="569" font-family="Arial" font-size="8" fill="#388e3c">or edge servers</text>
    <rect x="180" y="532" width="130" height="42" fill="#c8e6c9" rx="3"/>
    <text x="190" y="547" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Batch</text>
    <text x="190" y="559" font-family="Arial" font-size="8" fill="#2e7d32">Processing</text>
    <text x="190" y="569" font-family="Arial" font-size="8" fill="#388e3c">Group operations</text>
    <rect x="320" y="532" width="130" height="42" fill="#c8e6c9" rx="3"/>
    <text x="330" y="547" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Adaptive</text>
    <text x="330" y="559" font-family="Arial" font-size="8" fill="#2e7d32">Algorithms</text>
    <text x="330" y="569" font-family="Arial" font-size="8" fill="#388e3c">Dynamic scaling</text>
    <rect x="460" y="532" width="130" height="42" fill="#c8e6c9" rx="3"/>
    <text x="470" y="547" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Cache</text>
    <text x="470" y="559" font-family="Arial" font-size="8" fill="#2e7d32">Optimization</text>
    <text x="470" y="569" font-family="Arial" font-size="8" fill="#388e3c">Reduce memory access</text>
    <rect x="600" y="532" width="140" height="42" fill="#c8e6c9" rx="3"/>
    <text x="610" y="547" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Network</text>
    <text x="610" y="559" font-family="Arial" font-size="8" fill="#2e7d32">Protocols</text>
    <text x="610" y="569" font-family="Arial" font-size="8" fill="#388e3c">Efficient data transfer</text>
  </g>
</svg>