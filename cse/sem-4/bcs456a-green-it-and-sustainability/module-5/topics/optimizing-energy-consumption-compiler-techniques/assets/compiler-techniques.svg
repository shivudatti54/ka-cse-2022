<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Energy consumption is critical in modern computing from mobile devices to data centers. Compilers optimize code for energy efficiency through intelligent transformations.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" font-size="18" fill="#1976d2" text-anchor="middle">Optimizing Energy Consumption - Compiler Techniques</text>
  </g>
  
  <g class="step" id="step1" data-narration="Energy has two sources: dynamic energy from circuit switching (E equals C V squared f) and static leakage energy when circuits are idle.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="85" font-size="14" fill="#1976d2" font-weight="bold">1. Sources of Energy Consumption</text>
    <rect x="40" y="100" width="340" height="30" fill="#1976d2" rx="4"/>
    <text x="50" y="120" font-size="12" fill="#ffffff">Dynamic Energy: E = CV²f</text>
    <rect x="400" y="100" width="340" height="30" fill="#388e3c" rx="4"/>
    <text x="410" y="120" font-size="12" fill="#ffffff">Static Energy: Leakage current</text>
    <text x="40" y="138" font-size="10" fill="#666">Voltage reduction has quadratic impact on energy savings</text>
  </g>
  
  <g class="step" id="step2" data-narration="Compilers use instruction-level energy models that assign costs to instructions based on type and execution unit usage for optimization decisions.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="173" font-size="14" fill="#388e3c" font-weight="bold">2. Instruction-Level Energy Modeling</text>
    <rect x="40" y="190" width="220" height="28" fill="#388e3c" rx="4"/>
    <text x="50" y="209" font-size="11" fill="#ffffff">Arithmetic: Moderate energy</text>
    <rect x="280" y="190" width="220" height="28" fill="#f44336" rx="4"/>
    <text x="290" y="209" font-size="11" fill="#ffffff">Memory: High energy (cache miss)</text>
    <rect x="520" y="190" width="220" height="28" fill="#ff9800" rx="4"/>
    <text x="530" y="209" font-size="11" fill="#ffffff">Branch: Misprediction penalty</text>
    <text x="40" y="225" font-size="10" fill="#666">Models guide compilers to select energy-efficient instruction sequences</text>
  </g>
  
  <g class="step" id="step3" data-narration="Loop optimizations reduce energy by minimizing overhead: unrolling executes multiple iterations per pass, fusion combines adjacent loops, and tiling improves cache usage.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="261" font-size="14" fill="#ff9800" font-weight="bold">3. Loop Optimization Techniques</text>
    <rect x="40" y="280" width="230" height="26" fill="#ff9800" rx="4"/>
    <text x="50" y="298" font-size="11" fill="#ffffff">Loop Unrolling: Reduces overhead</text>
    <rect x="285" y="280" width="230" height="26" fill="#ff9800" rx="4"/>
    <text x="295" y="298" font-size="11" fill="#ffffff">Loop Fusion: Combines loops</text>
    <rect x="530" y="280" width="230" height="26" fill="#ff9800" rx="4"/>
    <text x="540" y="298" font-size="11" fill="#ffffff">Loop Tiling: Improves cache locality</text>
    <text x="40" y="313" font-size="10" fill="#666">Loop optimizations offer highest energy savings due to repetitive execution</text>
  </g>
  
  <g class="step" id="step4" data-narration="Data layout transformations optimize memory access patterns through array padding to prevent cache conflicts and merging to improve spatial locality.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="349" font-size="14" fill="#9c27b0" font-weight="bold">4. Data Layout Transformations</text>
    <rect x="40" y="368" width="340" height="26" fill="#9c27b0" rx="4"/>
    <text x="50" y="386" font-size="11" fill="#ffffff">Array Padding: Prevents cache line conflicts</text>
    <rect x="400" y="368" width="340" height="26" fill="#9c27b0" rx="4"/>
    <text x="410" y="386" font-size="11" fill="#ffffff">Array Merging: AoS to SoA conversion</text>
    <text x="40" y="401" font-size="10" fill="#666">Row-major vs column-major access affects cache efficiency significantly</text>
  </g>
  
  <g class="step" id="step5" data-narration="Branch optimization significantly reduces energy by improving prediction accuracy and using conditional moves to eliminate misprediction penalties from pipeline flushes.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="437" font-size="14" fill="#f44336" font-weight="bold">5. Branch Optimization</text>
    <rect x="40" y="456" width="340" height="26" fill="#f44336" rx="4"/>
    <text x="50" y="474" font-size="11" fill="#ffffff">Branch Prediction Hints: Guide hardware</text>
    <rect x="400" y="456" width="340" height="26" fill="#f44336" rx="4"/>
    <text x="410" y="474" font-size="11" fill="#ffffff">Conditional Moves: Eliminate branches</text>
    <text x="40" y="489" font-size="10" fill="#666">Mispredictions cause pipeline flushes wasting significant energy</text>
  </g>
  
  <g class="step" id="step6" data-narration="Strength reduction replaces expensive operations like multiplication with cheaper additions, saving 40-60 percent energy. DVFS and instruction scheduling further optimize power consumption.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="525" font-size="14" fill="#1976d2" font-weight="bold">6. Examples and Advanced Techniques</text>
    <rect x="40" y="545" width="220" height="35" fill="#1976d2" rx="4"/>
    <text x="50" y="560" font-size="10" fill="#ffffff">Strength Reduction:</text>
    <text x="50" y="573" font-size="9" fill="#ffffff">i*8 → i+8 (40-60% savings)</text>
    <rect x="280" y="545" width="220" height="35" fill="#388e3c" rx="4"/>
    <text x="290" y="560" font-size="10" fill="#ffffff">Loop Unrolling:</text>
    <text x="290" y="573" font-size="9" fill="#ffffff">4-way unroll reduces overhead 75%</text>
    <rect x="520" y="545" width="220" height="35" fill="#ff9800" rx="4"/>
    <text x="530" y="560" font-size="10" fill="#ffffff">Data Layout Swap:</text>
    <text x="530" y="573" font-size="9" fill="#ffffff">Row-major access saves 60-80%</text>
  </g>
</svg>