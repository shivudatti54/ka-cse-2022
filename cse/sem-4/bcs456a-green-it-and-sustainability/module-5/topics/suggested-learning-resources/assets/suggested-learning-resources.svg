  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers essential learning resources for  CSE 2022 scheme students including textbooks, online platforms, development tools, and practice websites.">
    <rect x="10" y="10" width="780" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Suggested Learning Resources for  CSE</text>
  </g>
  
  <g class="step" id="step1" data-narration="Official  resources include the e-learning portal offering lecture notes, video tutorials, and previous year question papers essential for exam preparation.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="5"/>
    <rect x="20" y="68" width="150" height="60" fill="#1976d2" rx="4"/>
    <text x="95" y="98" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white"> E-Learning</text>
    <text x="95" y="112" text-anchor="middle" font-family="Arial" font-size="8" fill="white">elearning.university.edu</text>
    <text x="185" y="78" font-family="Arial" font-size="10" fill="#333"> Official Resources</text>
    <text x="185" y="92" font-family="Arial" font-size="9" fill="#555">• Lecture notes and video tutorials</text>
    <text x="185" y="104" font-family="Arial" font-size="9" fill="#555">• Previous year question papers</text>
    <text x="185" y="116" font-family="Arial" font-size="9" fill="#555">• Syllabus books from university press</text>
    <rect x="520" y="70" width="90" height="30" fill="#388e3c" rx="3"/>
