    <text x="80" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="white">40%</text>
    <rect x="150" y="532" width="120" height="45" fill="#f44336" rx="4"/>
    <text x="210" y="550" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Textbooks</text>
    <text x="210" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="white">30%</text>
    <rect x="280" y="532" width="120" height="45" fill="#f44336" rx="4"/>
    <text x="340" y="550" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Online Practice</text>
    <text x="340" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="white">20%</text>
    <rect x="410" y="532" width="120" height="45" fill="#f44336" rx="4"/>
    <text x="470" y="550" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Revision</text>
    <text x="470" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="white">10%</text>
    <text x="560" y="538" font-family="Arial" font-size="9" fill="#333">Key Tips:</text>
    <text x="560" y="552" font-family="Arial" font-size="8" fill="#555">• Solve last 5 years papers</text>
