    <rect x="20" y="156" width="760" height="60" fill="#c8e6c9" rx="4"/>
    <text x="400" y="172" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Recommended Textbooks</text>
    <text x="60" y="190" font-family="Arial" font-size="9" fill="#333">Data Structures:</text>
    <text x="60" y="202" font-family="Arial" font-size="8" fill="#555">Cormen, Lafore</text>
    <text x="220" y="190" font-family="Arial" font-size="9" fill="#333">DBMS:</text>
    <text x="220" y="202" font-family="Arial" font-size="8" fill="#555">Korth, Elmasri</text>
    <text x="380" y="190" font-family="Arial" font-size="9" fill="#333">Operating Systems:</text>
