    <text x="665" y="90" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">40% Weight</text>
  </g>
  
  <g class="step" id="step2" data-narration="Standard textbooks like Cormen for Algorithms, Korth for DBMS, and Silberschatz for OS provide in-depth academic conceptual understanding beyond syllabus requirements.">
