  <g class="step" id="step6" data-narration="Strategic allocation: 40%  materials, 30% reference textbooks, 20% online practice, 10% revision. Solve previous papers and join study groups.">
    <rect x="10" y="498" width="780" height="90" fill="#ffebee" rx="5"/>
