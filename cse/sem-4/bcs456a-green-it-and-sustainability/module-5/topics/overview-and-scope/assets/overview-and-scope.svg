<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This lesson covers computer networks overview, types, topologies, OSI and TCP/IP models, transmission media, and network devices for  CSE students.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Overview and Scope of Computer Networks</text>
  </g>
  
  <!-- step1: Network Types -->
  <g class="step" id="step1" data-narration="A computer network connects computing devices to share resources. Networks are classified by geography: PAN, LAN, MAN, and WAN.">
    <rect x="20" y="58" width="760" height="75" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Network Types by Geography</text>
    <rect x="40" y="90" width="170" height="36" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="125" y="106" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">PAN</text>
    <text x="125" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Personal Area</text>
    
    <rect x="220" y="90" width="170" height="36" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="305" y="106" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">LAN</text>
    <text x="305" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Local Area</text>
    
    <rect x="400" y="90" width="170" height="36" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="4"/>
    <text x="485" y="106" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">MAN</text>
    <text x="485" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Metropolitan</text>
    
    <rect x="580" y="90" width="170" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="665" y="106" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">WAN</text>
    <text x="665" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Wide Area</text>
  </g>
  
  <!-- step2: Network Topologies -->
  <g class="step" id="step2" data-narration="Network topology defines node arrangements: Bus, Ring, Star, Mesh, and Tree. Star topology with central hub is most common.">
    <rect x="20" y="141" width="760" height="75" fill="#e8f5e9" rx="8"/>
    <text x="40" y="161" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Network Topologies</text>
    
    <rect x="40" y="172" width="140" height="38" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <line x1="50" y1="194" x2="170" y2="194" stroke="#388e3c" stroke-width="2"/>
    <circle cx="60" cy="194" r="3" fill="#388e3c"/>
    <circle cx="110" cy="194" r="3" fill="#388e3c"/>
    <circle cx="160" cy="194" r="3" fill="#388e3c"/>
    <text x="110" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Bus</text>
    
    <rect x="190" y="172" width="140" height="38" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="4"/>
    <ellipse cx="260" cy="191" rx="25" ry="12" fill="none" stroke="#ff9800" stroke-width="2"/>
    <circle cx="260" cy="179" r="3" fill="#ff9800"/>
    <circle cx="235" cy="191" r="3" fill="#ff9800"/>
    <circle cx="285" cy="191" r="3" fill="#ff9800"/>
    <text x="260" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Ring</text>
    
    <rect x="340" y="172" width="140" height="38" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <circle cx="410" cy="192" r="8" fill="#1976d2"/>
    <line x1="402" y1="186" x2="380" y2="174" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="418" y1="186" x2="440" y2="174" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="410" y1="200" x2="410" y2="215" stroke="#1976d2" stroke-width="1.5"/>
    <circle cx="380" cy="174" r="3" fill="#1976d2"/>
    <circle cx="440" cy="174" r="3" fill="#1976d2"/>
    <circle cx="410" cy="215" r="3" fill="#1976d2"/>
    <text x="410" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Star</text>
    
    <rect x="490" y="172" width="140" height="38" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <circle cx="525" cy="182" r="4" fill="#9c27b0"/>
    <circle cx="595" cy="182" r="4" fill="#9c27b0"/>
    <circle cx="560" cy="205" r="4" fill="#9c27b0"/>
    <line x1="529" y1="184" x2="591" y2="184" stroke="#9c27b0" stroke-width="1.5"/>
    <line x1="529" y1="186" x2="557" y2="202" stroke="#9c27b0" stroke-width="1.5"/>
    <line x1="591" y1="186" x2="563" y2="202" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="560" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Mesh</text>
    
    <rect x="640" y="172" width="130" height="38" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="4"/>
    <circle cx="705" cy="178" r="5" fill="#f44336"/>
    <line x1="705" y1="183" x2="660" y2="200" stroke="#f44336" stroke-width="1.5"/>
    <line x1="705" y1="183" x2="705" y2="200" stroke="#f44336" stroke-width="1.5"/>
    <line x1="705" y1="183" x2="750" y2="200" stroke="#f44336" stroke-width="1.5"/>
    <circle cx="660" cy="200" r="3" fill="#f44336"/>
    <circle cx="705" cy="200" r="3" fill="#f44336"/>
    <circle cx="750" cy="200" r="3" fill="#f44336"/>
    <text x="705" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Tree</text>
  </g>
  
  <!-- step3: OSI Model -->
  <g class="step" id="step3" data-narration="The OSI model has seven layers: Physical, Data Link, Network, Transport, Session, Presentation, and Application. Remember: Please Do Not Throw Sausage Pizza Away.">
    <rect x="20" y="224" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="244" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">OSI Reference Model (7 Layers)</text>
    
    <rect x="40" y="256" width="55" height="44" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2"/>
    <text x="67" y="268" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#f44336">L7</text>
    <text x="67" y="279" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">App</text>
    <text x="67" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Data</text>
    
    <rect x="100" y="256" width="55" height="44" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2"/>
    <text x="127" y="268" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#f44336">L6</text>
    <text x="127" y="279" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Pre</text>
    <text x="127" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Data</text>
    
    <rect x="160" y="256" width="55" height="44" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2"/>
    <text x="187" y="268" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#f44336">L5</text>
    <text x="187" y="279" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Ses</text>
    <text x="187" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Data</text>
    
    <rect x="220" y="256" width="55" height="44" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="2"/>
    <text x="247" y="268" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#1976d2">L4</text>
    <text x="247" y="279" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Trans</text>
    <text x="247" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Seg</text>
    
    <rect x="280" y="256" width="55" height="44" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="2"/>
    <text x="307" y="268" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#1976d2">L3</text>
    <text x="307" y="279" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Net</text>
    <text x="307" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Pkt</text>
    
    <rect x="340" y="256" width="55" height="44" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="2"/>
    <text x="367" y="268" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#1976d2">L2</text>
    <text x="367" y="279" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">DL</text>
    <text x="367" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Frame</text>
    
    <rect x="400" y="256" width="55" height="44" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="2"/>
    <text x="427" y="268" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#1976d2">L1</text>
    <text x="427" y="279" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Phy</text>
    <text x="427" y="290" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Bits</text>
    
    <text x="480" y="264" font-family="Arial" font-size="9" fill="#666">Mnemonic:</text>
    <text x="480" y="278" font-family="Arial" font-size="8" font-weight="bold" fill="#ff9800">Please Do Not Throw</text>
    <text x="480" y="292" font-family="Arial" font-size="8" font-weight="bold" fill="#ff9800">Sausage Pizza Away</text>
  </g>
  
  <!-- step4: TCP/IP Model -->
  <g class="step" id="step4" data-narration="TCP/IP has four layers: Application, Transport, Internet, and Network Interface. Application layer combines OSI's Session, Presentation, and Application.">
    <rect x="20" y="312" width="760" height="85" fill="#f3e5f5" rx="8"/>
    <text x="40" y="332" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">TCP/IP Model vs OSI Model</text>
    
    <rect x="40" y="346" width="140" height="45" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="110" y="360" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">TCP/IP (4 Layers)</text>
    <text x="110" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">App | Trans | Net | Link</text>
    
    <rect x="190" y="346" width="140" height="45" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="260" y="360" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">OSI (7 Layers)</text>
    <text x="260" y="375" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">App | Ses | Pre | D | N | T | Ph</text>
    
    <rect x="350" y="346" width="140" height="20" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="2"/>
    <text x="420" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">TCP/IP App = OSI L5-7</text>
    
    <rect x="500" y="346" width="140" height="20" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="2"/>
    <text x="570" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">TCP/IP Trans = OSI L4</text>
    
    <rect x="350" y="370" width="140" height="20" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="2"/>
    <text x="420" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">TCP/IP Net = OSI L3</text>
    
    <rect x="500" y="370" width="140" height="20" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2"/>
    <text x="570" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">TCP/IP Link = OSI L1-2</text>
  </g>
  
  <!-- step5: Transmission Media & Network Devices -->
  <g class="step" id="step5" data-narration="Guided media: twisted pair, coaxial, fiber. Unguided: radio, microwaves, satellite. Devices: hub (L1), switch (L2), router (L3), gateway.">
    <rect x="20" y="405" width="760" height="95" fill="#e3f2fd" rx="8"/>
    <text x="40" y="425" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Transmission Media & Network Devices</text>
    
    <text x="40" y="443" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Guided</text>
    <rect x="40" y="449" width="160" height="22" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="2"/>
    <text x="120" y="464" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Twisted Pair / Coaxial / Fiber</text>
    
    <text x="210" y="443" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Wireless</text>
    <rect x="210" y="449" width="95" height="22" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="2"/>
    <text x="257" y="464" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Radio/Microwave</text>
    
    <rect x="315" y="449" width="95" height="22" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="2"/>
    <text x="362" y="464" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Satellite</text>
    
    <text x="420" y="443" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Devices</text>
    <rect x="420" y="449" width="60" height="22" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="2"/>
    <text x="450" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Hub</text>
    <text x="450" y="468" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">L1</text>
    
    <rect x="488" y="449" width="60" height="22" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="2"/>
    <text x="518" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1976d2">Switch</text>
    <text x="518" y="468" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">L2</text>
    
    <rect x="556" y="449" width="60" height="22" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="2"/>
    <text x="586" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#ff9800">Router</text>
    <text x="586" y="468" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">L3</text>
    
    <rect x="624" y="449" width="60" height="22" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="2"/>
    <text x="654" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#9c27b0">Gateway</text>
    <text x="694" y="462" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Proto</text>
    
    <rect x="694" y="449" width="76" height="22" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="2"/>
    <text x="732" y="462" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Subnet</text>
  </g>
</svg>