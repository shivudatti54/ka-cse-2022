<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Sustainable Software Design. This topic covers creating eco-friendly software that minimizes environmental impact while meeting functional requirements and business needs.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Sustainable Software Design</text>
  </g>
  
  <g class="step" id="step1" data-narration="The Green Software Foundation defines eight core principles: energy efficiency, hardware efficiency, energy proportionality, capacity planning, monitoring, fixture optimization, yield optimization, and climate commitment.">
    <rect x="20" y="58" width="760" height="85" fill="#e8f5e9" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Eight Principles of Green Software Engineering</text>
    <rect x="40" y="88" width="340" height="48" fill="#c8e6c9" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="9" fill="#2e7d32">1. Energy Efficiency</text>
    <text x="50" y="114" font-family="Arial" font-size="9" fill="#2e7d32">2. Hardware Efficiency</text>
    <text x="50" y="126" font-family="Arial" font-size="9" fill="#2e7d32">3. Energy Proportionality</text>
    <text x="50" y="138" font-family="Arial" font-size="9" fill="#2e7d32">4. Capacity Planning</text>
    <rect x="400" y="88" width="340" height="48" fill="#c8e6c9" rx="3"/>
    <text x="410" y="102" font-family="Arial" font-size="9" fill="#2e7d32">5. Monitoring</text>
    <text x="410" y="114" font-family="Arial" font-size="9" fill="#2e7d32">6. Fixture Optimization</text>
    <text x="410" y="126" font-family="Arial" font-size="9" fill="#2e7d32">7. Yield Optimization</text>
    <text x="410" y="138" font-family="Arial" font-size="9" fill="#2e7d32">8. Climate Commitment</text>
  </g>
  
  <g class="step" id="step2" data-narration="Software carbon footprint measures greenhouse gas emissions throughout the software lifecycle. Carbon intensity varies by region based on energy sources like renewable or fossil fuels.">
    <rect x="20" y="151" width="760" height="85" fill="#fff3e0" rx="5"/>
    <text x="40" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#f57c00">Software Carbon Footprint</text>
    <rect x="40" y="185" width="220" height="42" fill="#ffe0b2" rx="3"/>
    <text x="50" y="200" font-family="Arial" font-size="9" fill="#e65100">Carbon = Energy × Intensity</text>
    <text x="50" y="212" font-family="Arial" font-size="9" fill="#e65100">Energy (Wh) = Power (W) × Time (h)</text>
    <text x="50" y="224" font-family="Arial" font-size="9" fill="#e65100">PUE = Total Facility / IT Energy</text>
    <rect x="280" y="185" width="220" height="42" fill="#ffe0b2" rx="3"/>
    <text x="290" y="200" font-family="Arial" font-size="9" fill="#e65100">Carbon Intensity by Region</text>
    <text x="290" y="212" font-family="Arial" font-size="9" fill="#e65100">Renewable regions: 0.05 kg/kWh</text>
    <text x="290" y="224" font-family="Arial" font-size="9" fill="#e65100">Fossil regions: 0.5 kg/kWh</text>
    <rect x="520" y="185" width="220" height="42" fill="#ffe0b2" rx="3"/>
    <text x="530" y="200" font-family="Arial" font-size="9" fill="#e65100">Key Metrics</text>
    <text x="530" y="212" font-family="Arial" font-size="9" fill="#e65100">Energy per Transaction</text>
    <text x="530" y="224" font-family="Arial" font-size="9" fill="#e65100">Software Efficiency Ratio</text>
  </g>
  
  <g class="step" id="step3" data-narration="Energy-aware architectures include event-driven design, microservices for independent scaling, serverless computing, and multi-level caching to minimize idle processing and reduce overall energy consumption.">
    <rect x="20" y="244" width="760" height="85" fill="#e1f5fe" rx="5"/>
    <text x="40" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#0277bd">Energy-Aware Architecture Patterns</text>
    <rect x="40" y="278" width="165" height="42" fill="#b3e5fc" rx="3"/>
    <text x="50" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Event-Driven</text>
    <text x="50" y="306" font-family="Arial" font-size="8" fill="#01579b">Minimize idle processing</text>
    <text x="50" y="318" font-family="Arial" font-size="8" fill="#01579b">Process on demand only</text>
    <rect x="215" y="278" width="165" height="42" fill="#b3e5fc" rx="3"/>
    <text x="225" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Microservices</text>
    <text x="225" y="306" font-family="Arial" font-size="8" fill="#01579b">Independent scaling</text>
    <text x="225" y="318" font-family="Arial" font-size="8" fill="#01579b">Scale only needed components</text>
    <rect x="390" y="278" width="165" height="42" fill="#b3e5fc" rx="3"/>
    <text x="400" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Serverless</text>
    <text x="400" y="306" font-family="Arial" font-size="8" fill="#01579b">Auto-scale on demand</text>
    <text x="400" y="318" font-family="Arial" font-size="8" fill="#01579b">Pay only for usage</text>
    <rect x="565" y="278" width="175" height="42" fill="#b3e5fc" rx="3"/>
    <text x="575" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#01579b">Multi-Level Cache</text>
    <text x="575" y="306" font-family="Arial" font-size="8" fill="#01579b">Reduce redundant work</text>
    <text x="575" y="318" font-family="Arial" font-size="8" fill="#01579b">Minimize data transfer</text>
  </g>
  
  <g class="step" id="step4" data-narration="Code-level optimizations include loop optimization, lazy evaluation, efficient data structures like hash tables, and efficient memory management to reduce energy consumption significantly.">
    <rect x="20" y="337" width="760" height="85" fill="#f3e5f5" rx="5"/>
    <text x="40" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Code-Level Optimization Techniques</text>
    <rect x="40" y="371" width="175" height="42" fill="#e1bee7" rx="3"/>
    <text x="50" y="386" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Loop Optimization</text>
    <text x="50" y="398" font-family="Arial" font-size="8" fill="#4a148c">Reduce iteration overhead</text>
    <text x="50" y="410" font-family="Arial" font-size="8" fill="#4a148c">Minimize loop iterations</text>
    <rect x="225" y="371" width="175" height="42" fill="#e1bee7" rx="3"/>
    <text x="235" y="386" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Lazy Evaluation</text>
    <text x="235" y="398" font-family="Arial" font-size="8" fill="#4a148c">Defer expensive computations</text>
    <text x="235" y="410" font-family="Arial" font-size="8" fill="#4a148c">Compute only when needed</text>
    <rect x="410" y="371" width="175" height="42" fill="#e1bee7" rx="3"/>
    <text x="420" y="386" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Efficient Data Structures</text>
    <text x="420" y="398" font-family="Arial" font-size="8" fill="#4a148c">Hash tables vs linear search</text>
    <text x="420" y="410" font-family="Arial" font-size="8" fill="#4a148c">O(1) vs O(n) complexity</text>
    <rect x="595" y="371" width="145" height="42" fill="#e1bee7" rx="3"/>
    <text x="605" y="386" font-family="Arial" font-size="9" font-weight="bold" fill="#4a148c">Memory Management</text>
    <text x="605" y="398" font-family="Arial" font-size="8" fill="#4a148c">Minimize GC overhead</text>
    <text x="605" y="410" font-family="Arial" font-size="8" fill="#4a148c">Efficient allocation patterns</text>
  </g>
  
  <g class="step" id="step5" data-narration="Real-world examples show caching reduces energy by 88%, batch processing improves throughput fourfold, and hybrid cloud deployment cuts carbon emissions by 72 percent.">
    <rect x="20" y="430" width="760" height="85" fill="#ffebee" rx="5"/>
    <text x="40" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Practical Examples</text>
    <rect x="40" y="464" width="230" height="42" fill="#ffcdd2" rx="3"/>
    <text x="50" y="479" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Green Caching Strategy</text>
    <text x="50" y="491" font-family="Arial" font-size="8" fill="#b71c1c">90% cache hit: 1.39 Wh → 0.164 Wh</text>
    <text x="50" y="503" font-family="Arial" font-size="8" fill="#b71c1c">Energy reduction: 88%</text>
    <rect x="280" y="464" width="230" height="42" fill="#ffcdd2" rx="3"/>
    <text x="290" y="479" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Batch Processing</text>
    <text x="290" y="491" font-family="Arial" font-size="8" fill="#b71c1c">Processing: 10s → 2s per batch</text>
    <text x="290" y="503" font-family="Arial" font-size="8" fill="#b71c1c">Throughput improved 4x</text>
    <rect x="520" y="464" width="220" height="42" fill="#ffcdd2" rx="3"/>
    <text x="530" y="479" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Hybrid Cloud Deployment</text>
    <text x="530" y="491" font-family="Arial" font-size="8" fill="#b71c1c">80% renewable + 20% fossil</text>
    <text x="530" y="503" font-family="Arial" font-size="8" fill="#b71c1c">Carbon reduction: 72%</text>
  </g>
  
  <g class="step" id="step6" data-narration="For exams, memorize the eight green principles, practice energy formulas, remember architectural patterns, and understand that sustainability balances environmental concerns with functionality.">
    <rect x="20" y="523" width="760" height="55" fill="#e8eaf6" rx="5"/>
    <text x="40" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#303f9f">Exam Tips Summary</text>
    <text x="200" y="543" font-family="Arial" font-size="9" fill="#1a237e">• Memorize 8 green principles</text>
    <text x="360" y="543" font-family="Arial" font-size="9" fill="#1a237e">• Practice energy formulas</text>
    <text x="500" y="543" font-family="Arial" font-size="9" fill="#1a237e">• Know architecture patterns</text>
    <text x="200" y="560" font-family="Arial" font-size="9" fill="#1a237e">• Balance sustainability with functionality</text>
    <text x="420" y="560" font-family="Arial" font-size="9" fill="#1a237e">• Remember: code optimizations matter</text>
    <text x="600" y="560" font-family="Arial" font-size="9" fill="#1a237e">• Green ≠ just hardware</text>
  </g>
</svg>