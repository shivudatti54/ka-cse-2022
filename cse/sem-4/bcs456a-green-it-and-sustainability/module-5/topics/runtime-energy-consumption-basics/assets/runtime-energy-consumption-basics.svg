<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#666"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Welcome to Runtime Energy Consumption Basics. This topic covers power, energy, sources of consumption, DVFS, power states, and green computing.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
<text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Runtime Energy Consumption Basics</text>
</g>

<g class="step" id="step1" data-narration="Power is the rate measured in Watts, and energy is total consumption over time. Energy equals Power multiplied by Time, fundamental for calculations.">
<rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Power and Energy Relationship</text>
<rect x="40" y="85" width="300" height="45" fill="white" stroke="#1976d2" stroke-width="1"/>
<text x="190" y="102" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Energy (J) = Power (W) × Time (s)</text>
<text x="190" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Example: 15W × 30s = 450J</text>
<rect x="360" y="85" width="400" height="45" fill="white" stroke="#388e3c" stroke-width="1"/>
<text x="560" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Power measures rate, Energy measures total</text>
<text x="560" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Watt = Joules per second</text>
</g>

<g class="step" id="step2" data-narration="At runtime, energy is consumed by the CPU, memory (RAM), storage devices, display screens, network interfaces, cooling systems, and other hardware components.">
<rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Sources of Energy Consumption</text>
<rect x="40" y="175" width="110" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="95" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">CPU</text>
<text x="95" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Largest consumer</text>
<rect x="160" y="175" width="110" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="215" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Memory</text>
<text x="215" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">RAM operations</text>
<rect x="280" y="175" width="110" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="335" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Storage</text>
<text x="335" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">HDD/SSD access</text>
<rect x="400" y="175" width="110" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="455" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Display</text>
<text x="455" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Screen backlight</text>
<rect x="520" y="175" width="110" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="575" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Network</text>
<text x="575" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Data transfer</text>
<rect x="640" y="175" width="110" height="42" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="695" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Cooling</text>
<text x="695" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Heat removal</text>
</g>

<g class="step" id="step3" data-narration="DVFS reduces power by lowering voltage and frequency. Power is proportional to voltage squared times frequency, enabling significant energy savings.">
<rect x="20" y="234" width="760" height="91" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
<text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. DVFS (Dynamic Voltage and Frequency Scaling)</text>
<rect x="40" y="262" width="280" height="45" fill="white" stroke="#ff9800" stroke-width="1"/>
<text x="180" y="280" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Power ∝ V² × f</text>
<text x="180" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Voltage squared times frequency</text>
<rect x="340" y="262" width="180" height="45" fill="white" stroke="#f44336" stroke-width="1"/>
<text x="430" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">High Performance</text>
<text x="430" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">3.0 GHz, 40W</text>
<rect x="540" y="262" width="180" height="45" fill="white" stroke="#388e3c" stroke-width="1"/>
<text x="630" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Low Power</text>
<text x="630" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">1.5 GHz, ~10W</text>
<text x="180" y="318" font-family="Arial" font-size="8" fill="#666">Reducing V by 30% and f by 50% saves ~75% power</text>
</g>

<g class="step" id="step4" data-narration="Power states include Active (full power), Idle (ready state), Sleep (RAM retained), Hibernation (disk save, powered off), and Shutdown during operation.">
<rect x="20" y="333" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<text x="40" y="350" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Power States and Management</text>
<rect x="40" y="363" width="140" height="42" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="110" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Active (S0/C0)</text>
<text x="110" y="393" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Max power, full operation</text>
<rect x="190" y="363" width="140" height="42" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
<text x="260" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Idle</text>
<text x="260" y="393" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Ready, low power</text>
<rect x="340" y="363" width="140" height="42" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
<text x="410" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Sleep (S3)</text>
<text x="410" y="393" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">RAM retained</text>
<rect x="490" y="363" width="140" height="42" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="3"/>
<text x="560" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Hibernation</text>
<text x="560" y="393" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">State saved to disk</text>
<rect x="640" y="363" width="120" height="42" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
<text x="700" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Shutdown</text>
<text x="700" y="393" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Zero power</text>
</g>

<g class="step" id="step5" data-narration="Energy profiling measures software energy consumption using hardware sensors or software estimation via performance counters, power models, and analytical methods.">
<rect x="20" y="421" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="40" y="438" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">5. Energy Profiling and Measurement</text>
<rect x="40" y="451" width="330" height="42" fill="white" stroke="#1976d2" stroke-width="1"/>
<text x="205" y="466" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Hardware-Level Profiling</text>
<text x="205" y="481" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Power meters and built-in sensors measure actual power draw</text>
<rect x="390" y="451" width="330" height="42" fill="white" stroke="#ff9800" stroke-width="1"/>
<text x="555" y="466" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Software-Level Estimation</text>
<text x="555" y="481" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Performance counters and energy models estimate consumption</text>
<text x="400" y="501" font-family="Arial" font-size="9" fill="#666">Tools: Intel Power Gadget, AMD μProf, embedded system profilers</text>
</g>

<g class="step" id="step6" data-narration="Key metrics include Performance per Watt and Energy-Delay Product. Software optimization through algorithms, data access patterns, and I/O reduces energy.">
<rect x="20" y="509" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="40" y="526" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">6. Energy Efficiency Metrics and Software Optimization</text>
<rect x="40" y="539" width="220" height="42" fill="white" stroke="#388e3c" stroke-width="1"/>
<text x="150" y="555" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Performance per Watt</text>
<text x="150" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Operations per Joule</text>
<rect x="275" y="539" width="220" height="42" fill="white" stroke="#9c27b0" stroke-width="1"/>
<text x="385" y="555" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Energy-Delay Product</text>
<text x="385" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">EDP = Energy × Delay</text>
<rect x="510" y="539" width="250" height="42" fill="white" stroke="#ff9800" stroke-width="1"/>
<text x="635" y="555" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Software Optimization</text>
<text x="635" y="570" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Algorithms, data access, I/O patterns</text>
</g>
</svg>