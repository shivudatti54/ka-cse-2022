<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on Sustainability and the Product Life Cycle in software engineering, where we explore green computing practices and environmental responsibility in software development.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Sustainability and the Product Life Cycle</text>
  </g>
  
  <g class="step" id="step1" data-narration="Sustainable software engineering focuses on minimizing environmental impact through energy-efficient code, optimized resource usage, and carbon-aware operations throughout the entire software development lifecycle.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Sustainable Software Engineering?</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">Development practice that minimizes environmental impact while meeting functional requirements.</text>
    <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">Key goals: energy efficiency, optimized resource usage, carbon-aware operations.</text>
    <text x="40" y="130" font-family="Arial" font-size="10" fill="#333">Data centers consume 1-2% of global electricity - software sustainability is critical.</text>
  </g>
  
  <g class="step" id="step2" data-narration="The software product life cycle consists of five sequential phases: Requirements and Design, Development and Testing, Deployment and Release, Operation and Maintenance, and finally Retirement and Disposal.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Five Phases of Software Product Life Cycle</text>
    <rect x="40" y="180" width="120" height="35" fill="#c8e6c9" rx="3"/>
    <text x="100" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">1. Requirements</text>
    <text x="100" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">&amp; Design</text>
    <rect x="170" y="180" width="120" height="35" fill="#c8e6c9" rx="3"/>
    <text x="230" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">2. Development</text>
    <text x="230" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">&amp; Testing</text>
    <rect x="300" y="180" width="120" height="35" fill="#c8e6c9" rx="3"/>
    <text x="360" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">3. Deployment</text>
    <text x="360" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">&amp; Release</text>
    <rect x="430" y="180" width="120" height="35" fill="#c8e6c9" rx="3"/>
    <text x="490" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">4. Operation</text>
    <text x="490" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">&amp; Maintenance</text>
    <rect x="560" y="180" width="120" height="35" fill="#c8e6c9" rx="3"/>
    <text x="620" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">5. Retirement</text>
    <text x="620" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">&amp; Disposal</text>
  </g>
  
  <g class="step" id="step3" data-narration="There are eight key principles of sustainable software engineering: energy efficiency, hardware efficiency, carbon awareness, energy proportionality, shifting computation, measuring sustainability, optimization for climate, and sustainable supply chain management.">
    <rect x="20" y="234" width="760" height="107" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Eight Sustainable Software Engineering Principles</text>
    <rect x="40" y="268" width="160" height="35" fill="#ffe0b2" rx="3"/>
    <text x="120" y="283" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">1. Energy Efficiency</text>
    <rect x="210" y="268" width="160" height="35" fill="#ffe0b2" rx="3"/>
    <text x="290" y="283" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">2. Hardware Efficiency</text>
    <rect x="380" y="268" width="160" height="35" fill="#ffe0b2" rx="3"/>
    <text x="460" y="283" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">3. Carbon Awareness</text>
    <rect x="550" y="268" width="160" height="35" fill="#ffe0b2" rx="3"/>
    <text x="630" y="283" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">4. Energy Proportionality</text>
    <rect x="40" y="305" width="160" height="35" fill="#ffe0b2" rx="3"/>
    <text x="120" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">5. Shifting Computation</text>
    <rect x="210" y="305" width="160" height="35" fill="#ffe0b2" rx="3"/>
    <text x="290" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">6. Measuring Sustainability</text>
    <rect x="380" y="305" width="160" height="35" fill="#ffe0b2" rx="3"/>
    <text x="460" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">7. Optimization for Climate</text>
    <rect x="550" y="305" width="160" height="35" fill="#ffe0b2" rx="3"/>
    <text x="630" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">8. Sustainable Supply Chain</text>
  </g>
  
  <g class="step" id="step4" data-narration="Software carbon footprint consists of three main components: embodied carbon from hardware manufacturing, operational carbon from energy consumption during use, and user device carbon from end-user hardware.">
    <rect x="20" y="349" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="371" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Carbon Footprint in Software</text>
    <rect x="40" y="385" width="220" height="35" fill="#e1bee7" rx="3"/>
    <text x="150" y="402" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Embodied Carbon</text>
    <text x="150" y="415" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Hardware manufacturing energy</text>
    <rect x="270" y="385" width="220" height="35" fill="#e1bee7" rx="3"/>
    <text x="380" y="402" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Operational Carbon</text>
    <text x="380" y="415" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Energy during software operation</text>
    <rect x="500" y="385" width="220" height="35" fill="#e1bee7" rx="3"/>
    <text x="610" y="402" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">User Device Carbon</text>
    <text x="610" y="415" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">End-user device energy consumption</text>
  </g>
  
  <g class="step" id="step5" data-narration="Practical examples of sustainable software include query optimization that reduces data transfer by 70 percent, caching strategies that cut database queries by 80 percent, and green hosting that reduces carbon emissions by 40 to 60 percent.">
    <rect x="20" y="437" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="459" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Practical Examples of Sustainable Software</text>
    <rect x="40" y="473" width="230" height="35" fill="#ffcdd2" rx="3"/>
    <text x="155" y="489" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Query Optimization</text>
    <text x="155" y="502" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">70% less data transfer, 50% faster</text>
    <rect x="280" y="473" width="230" height="35" fill="#ffcdd2" rx="3"/>
    <text x="395" y="489" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Caching Strategy</text>
    <text x="395" y="502" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">80% fewer database queries</text>
    <rect x="520" y="473" width="230" height="35" fill="#ffcdd2" rx="3"/>
    <text x="635" y="489" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Green Hosting</text>
    <text x="635" y="502" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">40-60% carbon emission reduction</text>
  </g>
  
  <g class="step" id="step6" data-narration="For your exam, remember the five life cycle phases, eight sustainability principles, three carbon footprint components, and green computing strategies including virtualization, cloud computing, and algorithmic efficiency.">
    <rect x="20" y="525" width="760" height="65" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="547" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips: Key Points to Remember</text>
    <text x="40" y="567" font-family="Arial" font-size="10" fill="#333">• Five phases: Requirements, Development, Deployment, Maintenance, Retirement</text>
    <text x="40" y="582" font-family="Arial" font-size="10" fill="#333">• Eight principles | Three carbon types | Green computing: Virtualization, Cloud, Algorithmic Efficiency</text>
  </g>
</svg>