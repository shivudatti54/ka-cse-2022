<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the topic of Challenges Ahead in Computer Science and Engineering. We will explore six major challenges facing the computing industry.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Challenges Ahead in Computer Science and Engineering</text>
  </g>
  
  <g class="step" id="step1" data-narration="Hardware limitations threaten Moore's Law as transistors approach atomic scale. Quantum effects like electron tunneling prevent further miniaturization of chips.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">1. Hardware Limitations</text>
    <rect x="40" y="92" width="220" height="36" fill="#1976d2" rx="4"/>
    <text x="50" y="107" font-family="Arial" font-size="10" fill="white">Transistor Miniaturization</text>
    <text x="270" y="100" font-family="Arial" font-size="9" fill="#333">Approaching atomic scale limits due to</text>
    <text x="270" y="114" font-family="Arial" font-size="9" fill="#333">quantum tunneling effects</text>
    <rect x="460" y="92" width="220" height="36" fill="#1976d2" rx="4"/>
    <text x="470" y="107" font-family="Arial" font-size="10" fill="white">Heat Dissipation Challenge</text>
    <text x="690" y="100" font-family="Arial" font-size="9" fill="#333">Energy efficiency critical in</text>
    <text x="690" y="114" font-family="Arial" font-size="9" fill="#333">modern processor design</text>
  </g>
  
  <g class="step" id="step2" data-narration="Data privacy and security are major concerns. Over 2.5 quintillion bytes of data are created daily, raising questions about protection and misuse.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">2. Data Privacy and Security</text>
    <rect x="40" y="180" width="160" height="36" fill="#388e3c" rx="4"/>
    <text x="50" y="195" font-family="Arial" font-size="10" fill="white">2.5 Quintillion Bytes</text>
    <text x="50" y="208" font-family="Arial" font-size="8" fill="#e8f5e9">Created daily worldwide</text>
    <rect x="210" y="180" width="180" height="36" fill="#388e3c" rx="4"/>
    <text x="220" y="195" font-family="Arial" font-size="10" fill="white">Cybersecurity Threats</text>
    <text x="220" y="208" font-family="Arial" font-size="8" fill="#e8f5e9">Ransomware, APTs, AI attacks</text>
    <rect x="400" y="180" width="180" height="36" fill="#388e3c" rx="4"/>
    <text x="410" y="195" font-family="Arial" font-size="10" fill="white">Real-time Detection</text>
    <text x="410" y="208" font-family="Arial" font-size="8" fill="#e8f5e9">Systems must respond instantly</text>
    <text x="590" y="195" font-family="Arial" font-size="9" fill="#333">Challenge: Balance data</text>
    <text x="590" y="209" font-family="Arial" font-size="9" fill="#333">utility with privacy rights</text>
  </g>
  
  <g class="step" id="step3" data-narration="AI ethics raise critical questions about accountability and bias. AI systems can perpetuate existing societal biases found in training data.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">3. Ethical Implications of AI</text>
    <rect x="40" y="268" width="180" height="36" fill="#9c27b0" rx="4"/>
    <text x="50" y="283" font-family="Arial" font-size="10" fill="white">Accountability Gap</text>
    <text x="50" y="296" font-family="Arial" font-size="8" fill="#f3e5f5">Who is responsible for AI errors?</text>
    <rect x="230" y="268" width="180" height="36" fill="#9c27b0" rx="4"/>
    <text x="240" y="283" font-family="Arial" font-size="10" fill="white">Algorithmic Bias</text>
    <text x="240" y="296" font-family="Arial" font-size="8" fill="#f3e5f5">AI amplifies data biases</text>
    <rect x="420" y="268" width="180" height="36" fill="#9c27b0" rx="4"/>
    <text x="430" y="283" font-family="Arial" font-size="10" fill="white">Job Displacement</text>
    <text x="430" y="296" font-family="Arial" font-size="8" fill="#f3e5f5">Automation threatens many jobs</text>
    <text x="610" y="280" font-family="Arial" font-size="9" fill="#333">Solutions: Fairness metrics,</text>
    <text x="610" y="294" font-family="Arial" font-size="9" fill="#333">bias audits, transparency</text>
  </g>
  
  <g class="step" id="step4" data-narration="Computing contributes 4 percent of global carbon emissions. Data centers consume massive energy for computation and cooling operations worldwide annually.">
    <rect x="20" y="322" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">4. Environmental Impact</text>
    <rect x="40" y="356" width="140" height="36" fill="#ff9800" rx="4"/>
    <text x="50" y="371" font-family="Arial" font-size="10" fill="white">4% Global Emissions</text>
    <text x="50" y="384" font-family="Arial" font-size="8" fill="#fff3e0">ICT sector carbon footprint</text>
    <rect x="190" y="356" width="140" height="36" fill="#ff9800" rx="4"/>
    <text x="200" y="371" font-family="Arial" font-size="10" fill="white">Data Center Energy</text>
    <text x="200" y="384" font-family="Arial" font-size="8" fill="#fff3e0">Massive power and cooling</text>
    <rect x="340" y="356" width="140" height="36" fill="#ff9800" rx="4"/>
    <text x="350" y="371" font-family="Arial" font-size="10" fill="white">E-Waste Generation</text>
    <text x="350" y="384" font-family="Arial" font-size="8" fill="#fff3e0">Device disposal problems</text>
    <text x="500" y="365" font-family="Arial" font-size="9" fill="#333">Solutions: Renewable energy,</text>
    <text x="500" y="379" font-family="Arial" font-size="9" fill="#333">efficient algorithms, recycling</text>
  </g>
  
  <g class="step" id="step5" data-narration="Software complexity makes verification difficult. Millions of lines of code power critical systems, and testing alone cannot catch all defects.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">5. Software Complexity</text>
    <rect x="40" y="444" width="200" height="36" fill="#f44336" rx="4"/>
    <text x="50" y="459" font-family="Arial" font-size="10" fill="white">Verification Challenges</text>
    <text x="50" y="472" font-family="Arial" font-size="8" fill="#ffebee">Testing insufficient for complex systems</text>
    <rect x="250" y="444" width="200" height="36" fill="#f44336" rx="4"/>
    <text x="260" y="459" font-family="Arial" font-size="10" fill="white">Dependency Risks</text>
    <text x="260" y="472" font-family="Arial" font-size="8" fill="#ffebee">Libraries introduce unknown vulnerabilities</text>
    <text x="460" y="460" font-family="Arial" font-size="9" fill="#333">Speed vs Security tradeoff</text>
    <text x="460" y="474" font-family="Arial" font-size="9" fill="#333">in agile development</text>
  </g>
  
  <g class="step" id="step6" data-narration="The digital divide creates inequality in access to technology and skills. Bridging it requires infrastructure, literacy education, and affordable access.">
    <rect x="20" y="498" width="760" height="90" fill="#e1f5fe" rx="8"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#0277bd">6. Digital Divide</text>
    <rect x="40" y="532" width="160" height="44" fill="#0288d1" rx="4"/>
    <text x="50" y="547" font-family="Arial" font-size="10" fill="white">Infrastructure Gap</text>
    <text x="50" y="560" font-family="Arial" font-size="8" fill="#e1f5fe">No reliable internet access</text>
    <text x="50" y="572" font-family="Arial" font-size="8" fill="#e1f5fe">for billions of people</text>
    <rect x="210" y="532" width="160" height="44" fill="#0288d1" rx="4"/>
    <text x="220" y="547" font-family="Arial" font-size="10" fill="white">Digital Literacy</text>
    <text x="220" y="560" font-family="Arial" font-size="8" fill="#e1f5fe">Skills needed to use</text>
    <text x="220" y="572" font-family="Arial" font-size="8" fill="#e1f5fe">technology effectively</text>
    <rect x="380" y="532" width="160" height="44" fill="#0288d1" rx="4"/>
    <text x="390" y="547" font-family="Arial" font-size="10" fill="white">Economic Access</text>
    <text x="390" y="560" font-family="Arial" font-size="8" fill="#e1f5fe">Affordable devices and</text>
    <text x="390" y="572" font-family="Arial" font-size="8" fill="#e1f5fe">connectivity needed</text>
    <text x="550" y="555" font-family="Arial" font-size="9" fill="#333">Solutions require policy,</text>
    <text x="550" y="569" font-family="Arial" font-size="9" fill="#333">investment, and education</text>
  </g>
</svg>