<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ff9800"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#9c27b0"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#f44336"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to the Introduction to Data Structures module for  2022 Scheme in the Computer Science and Engineering study curriculum.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Introduction to Data Structures</text>
  </g>

  <!-- step1: Definition -->
  <g class="step" id="step1" data-narration="A data structure is a specialized format for organizing, processing, storing and managing data that enables efficient access and modification of information.">
    <rect x="20" y="58" width="760" height="85" fill="url(#blueGrad)" rx="8"/>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">What is a Data Structure?</text>
    <text x="40" y="100" font-family="Arial, sans-serif" font-size="11" fill="#333">A data structure is a specialized format for organizing, processing, storing and managing</text>
    <text x="40" y="116" font-family="Arial, sans-serif" font-size="11" fill="#333">data that enables efficient access and modification of information.</text>
    <rect x="550" y="75" width="210" height="50" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="655" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1976d2">Key Characteristic</text>
    <text x="655" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Efficient Access</text>
  </g>

  <!-- step2: Classification - Primitive vs Non-Primitive -->
  <g class="step" id="step2" data-narration="Data structures are classified into primitive types such as int, float, char, and bool, versus non-primitive types including arrays, linked lists, trees, and graphs.">
    <rect x="20" y="151" width="760" height="103" fill="url(#greenGrad)" rx="8"/>
    <text x="40" y="173" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Classification: Primitive vs Non-Primitive</text>
    
    <!-- Primitive Box -->
    <rect x="40" y="185" width="330" height="40" fill="#c8e6c9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="55" y="202" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Primitive:</text>
    <text x="130" y="202" font-family="Arial, sans-serif" font-size="10" fill="#333">int, float, char, bool (basic types)</text>
    
    <!-- Non-Primitive Box -->
    <rect x="40" y="230" width="330" height="18" fill="#c8e6c9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="55" y="247" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Non-Primitive:</text>
    <text x="150" y="247" font-family="Arial, sans-serif" font-size="10" fill="#333">Arrays, Linked Lists, Stacks, Queues</text>
    
    <!-- Right side: Further classification -->
    <rect x="390" y="185" width="370" height="58" fill="#fff" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="405" y="203" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Non-Primitive Further Classified as:</text>
    <text x="405" y="220" font-family="Arial, sans-serif" font-size="10" fill="#333">Linear: Arrays, Linked Lists,</text>
    <text x="405" y="233" font-family="Arial, sans-serif" font-size="10" fill="#333">Stacks, Queues</text>
    <text x="405" y="246" font-family="Arial, sans-serif" font-size="10" fill="#333">Non-Linear: Trees, Graphs</text>
  </g>

  <!-- step3: Linear vs Non-Linear -->
  <g class="step" id="step3" data-narration="Linear data structures arrange elements sequentially with each element connected to previous and next neighbors, while non-linear structures form hierarchical relationships like trees or mesh connections like graphs.">
    <rect x="20" y="262" width="760" height="85" fill="url(#orangeGrad)" rx="8"/>
    <text x="40" y="284" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100">Linear vs Non-Linear Data Structures</text>
    
    <!-- Linear Box -->
    <rect x="40" y="298" width="345" height="40" fill="#ffe0b2" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="55" y="315" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100">Linear:</text>
    <text x="110" y="315" font-family="Arial, sans-serif" font-size="10" fill="#333">Elements in sequence, connected to previous and next</text>
    <text x="55" y="330" font-family="Arial, sans-serif" font-size="10" fill="#333">Examples: Arrays, Linked Lists, Stacks, Queues</text>
    
    <!-- Non-Linear Box -->
    <rect x="400" y="298" width="360" height="40" fill="#ffccbc" rx="5" stroke="#ff5722" stroke-width="1"/>
    <text x="415" y="315" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d84315">Non-Linear:</text>
    <text x="485" y="315" font-family="Arial, sans-serif" font-size="10" fill="#333">Elements have hierarchical or mesh relationships</text>
    <text x="415" y="330" font-family="Arial, sans-serif" font-size="10" fill="#333">Examples: Trees, Graphs</text>
  </g>

  <!-- step4: Static vs Dynamic -->
  <g class="step" id="step4" data-narration="Static data structures allocate fixed memory at compile time, while dynamic structures allocate memory during runtime and can resize as needed for flexible data storage.">
    <rect x="20" y="355" width="760" height="85" fill="url(#purpleGrad)" rx="8"/>
    <text x="40" y="377" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6a1b9a">Static vs Dynamic Data Structures</text>
    
    <!-- Static Box -->
    <rect x="40" y="393" width="345" height="38" fill="#e1bee7" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="55" y="410" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6a1b9a">Static:</text>
    <text x="100" y="410" font-family="Arial, sans-serif" font-size="10" fill="#333">Memory allocated at compile time</text>
    <text x="55" y="425" font-family="Arial, sans-serif" font-size="10" fill="#333">Example: Arrays (fixed size)</text>
    
    <!-- Dynamic Box -->
    <rect x="400" y="393" width="360" height="38" fill="#d1c4e9" rx="5" stroke="#7b1fa2" stroke-width="1"/>
    <text x="415" y="410" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6a1b9a">Dynamic:</text>
    <text x="475" y="410" font-family="Arial, sans-serif" font-size="10" fill="#333">Memory allocated at runtime</text>
    <text x="415" y="425" font-family="Arial, sans-serif" font-size="10" fill="#333">Examples: Linked Lists, Trees, Graphs</text>
  </g>

  <!-- step5: Five Basic Operations -->
  <g class="step" id="step5" data-narration="The five fundamental operations performed on data structures are traversal, insertion, deletion, searching to find elements, and sorting to arrange data in order.">
    <rect x="20" y="448" width="760" height="85" fill="url(#redGrad)" rx="8"/>
    <text x="40" y="470" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c62828">Five Basic Operations on Data Structures</text>
    
    <!-- Five operations as boxes -->
    <rect x="40" y="483" width="130" height="40" fill="#ffcdd2" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="105" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Traversal</text>
    <text x="105" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Visit all elements</text>
    
    <rect x="175" y="483" width="130" height="40" fill="#ffcdd2" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="240" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Insertion</text>
    <text x="240" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Add new element</text>
    
    <rect x="310" y="483" width="130" height="40" fill="#ffcdd2" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="375" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Deletion</text>
    <text x="375" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Remove element</text>
    
    <rect x="445" y="483" width="130" height="40" fill="#ffcdd2" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="510" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Searching</text>
    <text x="510" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Find element</text>
    
    <rect x="580" y="483" width="180" height="40" fill="#ffcdd2" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="670" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Sorting</text>
    <text x="670" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Arrange in order</text>
  </g>

  <!-- step6: Importance and Examples -->
  <g class="step" id="step6" data-narration="Choosing the right data structure directly impacts algorithm efficiency, for example array insertion takes O(n) time because all elements must be shifted.">
    <rect x="20" y="541" width="760" height="50" fill="url(#blueGrad)" rx="8"/>
    <text x="40" y="563" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">Importance: Efficiency Matters!</text>
    
    <!-- Example comparison -->
    <rect x="40" y="573" width="720" height="12" fill="#bbdefb" rx="2" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="582" font-family="Arial, sans-serif" font-size="9" fill="#333">Array Insert at Beginning: O(n) - must shift all elements | Linked List Insert: O(1) - just update pointer</text>
  </g>
</svg>