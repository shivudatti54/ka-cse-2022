<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic explores the evolving landscape of computer science, emerging technologies, and the challenges facing computing professionals in the 21st century.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">The Agenda and Challenges Ahead</text>
  </g>
  
  <g class="step" id="step1" data-narration="Digital transformation integrates digital tech into society, including cloud computing, IoT connecting devices, big data analytics, and AI/ML systems worldwide.">
    <rect x="30" y="58" width="740" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">1. Digital Transformation Agenda</text>
    <rect x="50" y="88" width="160" height="45" rx="3" fill="#ffffff" stroke="#1976d2"/>
    <text x="130" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Cloud Computing</text>
    <text x="130" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Scalable on-demand</text>
    <text x="130" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">resources</text>
    <rect x="220" y="88" width="160" height="45" rx="3" fill="#ffffff" stroke="#1976d2"/>
    <text x="300" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Internet of Things</text>
    <text x="300" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">75B devices by</text>
    <text x="300" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2025</text>
    <rect x="390" y="88" width="160" height="45" rx="3" fill="#ffffff" stroke="#1976d2"/>
    <text x="470" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Big Data Analytics</text>
    <text x="470" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2.5 quintillion</text>
    <text x="470" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">bytes daily</text>
    <rect x="560" y="88" width="160" height="45" rx="3" fill="#ffffff" stroke="#1976d2"/>
    <text x="640" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">AI / Machine Learning</text>
    <text x="640" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Intelligent systems</text>
    <text x="640" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">for decisions</text>
  </g>
  
  <g class="step" id="step2" data-narration="Emerging technologies shaping computing future: quantum computing for complex problems, edge computing for real-time processing, blockchain for security, and 5G networks.">
