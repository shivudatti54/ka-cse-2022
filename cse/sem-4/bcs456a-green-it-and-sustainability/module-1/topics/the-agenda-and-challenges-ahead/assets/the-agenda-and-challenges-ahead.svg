    <text x="132" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Quantum Computing</text>
    <text x="132" y="211" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Quantum supremacy</text>
    <text x="132" y="221" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">race</text>
    <rect x="225" y="181" width="165" height="45" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="307" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Edge Computing</text>
    <text x="307" y="211" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Process near</text>
    <text x="307" y="221" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">the source</text>
    <rect x="400" y="181" width="165" height="45" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="482" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Blockchain</text>
    <text x="482" y="211" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Decentralized</text>
    <text x="482" y="221" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">immutable ledger</text>
    <rect x="575" y="181" width="165" height="45" rx="3" fill="#ffffff" stroke="#388e3c"/>
    <text x="657" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">5G and Beyond</text>
    <text x="657" y="211" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Ultra-low latency</text>
    <text x="657" y="221" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">networks</text>
  </g>
  
