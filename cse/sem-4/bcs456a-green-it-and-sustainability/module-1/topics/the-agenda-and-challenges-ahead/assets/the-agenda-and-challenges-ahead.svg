    <rect x="30" y="244" width="740" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">3. Key Challenges - Part 1</text>
    <rect x="50" y="274" width="220" height="45" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="160" y="289" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Cybersecurity Threats</text>
    <text x="160" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">$10.5T cost by 2025</text>
    <rect x="280" y="274" width="220" height="45" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="390" y="289" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Privacy Concerns</text>
    <text x="390" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">GDPR, data ownership</text>
    <rect x="510" y="274" width="220" height="45" rx="3" fill="#ffffff" stroke="#ff9800"/>
    <text x="620" y="289" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Digital Divide</text>
    <text x="620" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Unequal access</text>
  </g>
  
  <g class="step" id="step4" data-narration="Additional challenges: environmental impact from data centers consuming 1% global electricity, ethical AI bias issues, and critical talent shortage in the industry.">
    <rect x="30" y="337" width="740" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">4. Key Challenges - Part 2</text>
    <rect x="50" y="367" width="220" height="45" rx="3" fill="#ffffff" stroke="#f44336"/>
    <text x="160" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Environmental Impact</text>
    <text x="160" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1% global electricity</text>
    <rect x="280" y="367" width="220" height="45" rx="3" fill="#ffffff" stroke="#f44336"/>
    <text x="390" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Ethical AI</text>
    <text x="390" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Bias, accountability</text>
    <rect x="510" y="367" width="220" height="45" rx="3" fill="#ffffff" stroke="#f44336"/>
    <text x="620" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Talent Shortage</text>
    <text x="620" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Millions unfilled roles</text>
  </g>
  
  <g class="step" id="step5" data-narration="Real-world applications: smart cities use IoT and AI for traffic management, healthcare AI detects diseases early, sustainable data centers use renewable energy.">
    <rect x="30" y="430" width="740" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">5. Real-World Applications</text>
    <rect x="50" y="460" width="230" height="45" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="165" y="475" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Smart City</text>
    <text x="165" y="490" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">IoT + AI for traffic</text>
    <rect x="285" y="460" width="230" height="45" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="400" y="475" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Healthcare AI</text>
    <text x="400" y="490" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Disease detection</text>
    <rect x="520" y="460" width="230" height="45" rx="3" fill="#ffffff" stroke="#9c27b0"/>
    <text x="635" y="475" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Green Computing</text>
    <text x="635" y="490" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Renewable energy</text>
  </g>
  
  <g class="step" id="step6" data-narration=" exam tips: know key definitions, understand four industrial revolutions, categorize challenges, connect concepts to Indian context, and include ethical dimensions.">
    <rect x="30" y="523" width="740" height="65" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">6. Exam Tips for </text>
    <text x="50" y="565" font-family="Arial" font-size="9" fill="#666">• Know definitions (IoT, cloud, edge) | </text>
    <text x="270" y="565" font-family="Arial" font-size="9" fill="#666">• 4 Industrial Revolutions | </text>
    <text x="430" y="565" font-family="Arial" font-size="9" fill="#666">• Indian context (Digital India) | </text>
    <text x="600" y="565" font-family="Arial" font-size="9" fill="#666">• Include ethics</text>
  </g>
