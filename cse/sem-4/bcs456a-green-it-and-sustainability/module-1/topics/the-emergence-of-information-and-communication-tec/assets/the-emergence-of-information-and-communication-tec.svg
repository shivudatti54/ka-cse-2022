<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers the evolution of ICT from mainframes to modern cloud computing and its impact on society in today's digital world.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">The Emergence of Information and Communication Technology</text>
  </g>
  
  <g class="step" id="step1" data-narration="ICT combines computing and telecommunications to capture, store, process, and transmit information across networks globally, enabling instant worldwide communication and digital transformation.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is ICT?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">ICT (Information and Communication Technology) integrates computing with telecommunications to enable</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">information capture, storage, processing, and transmission across networks in milliseconds.</text>
    <text x="40" y="128" font-family="Arial" font-size="10" font-style="italic" fill="#666">Key: Digital Convergence + Communication Focus = ICT</text>
  </g>
  
  <g class="step" id="step2" data-narration="ICT evolved through five generations spanning from vacuum tubes to modern intelligent systems powering today's interconnected digital ecosystems and advanced AI applications worldwide.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Five Generations of ICT Evolution</text>
    <rect x="40" y="178" width="130" height="40" fill="#c8e6c9" rx="3"/>
    <text x="55" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">1950s-60s</text>
    <text x="55" y="208" font-family="Arial" font-size="8" fill="#2e7d32">Vacuum Tubes</text>
    <text x="55" y="218" font-family="Arial" font-size="8" fill="#2e7d32">ENIAC, UNIVAC</text>
    <rect x="180" y="178" width="130" height="40" fill="#c8e6c9" rx="3"/>
    <text x="195" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">1960s-70s</text>
    <text x="195" y="208" font-family="Arial" font-size="8" fill="#2e7d32">Transistors</text>
    <text x="195" y="218" font-family="Arial" font-size="8" fill="#2e7d32">OS, Dial-up</text>
    <rect x="320" y="178" width="130" height="40" fill="#c8e6c9" rx="3"/>
    <text x="335" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">1970s-80s</text>
    <text x="335" y="208" font-family="Arial" font-size="8" fill="#2e7d32">IC, Microprocessor</text>
    <text x="335" y="218" font-family="Arial" font-size="8" fill="#2e7d32">LANs emerge</text>
    <rect x="460" y="178" width="130" height="40" fill="#c8e6c9" rx="3"/>
    <text x="475" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">1980s-90s</text>
    <text x="475" y="208" font-family="Arial" font-size="8" fill="#2e7d32">WWW (1989)</text>
    <text x="475" y="218" font-family="Arial" font-size="8" fill="#2e7d32">GUI, Internet</text>
    <rect x="600" y="178" width="130" height="40" fill="#c8e6c9" rx="3"/>
    <text x="615" y="192" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">1990s-Present</text>
    <text x="615" y="208" font-family="Arial" font-size="8" fill="#2e7d32">Mobile, Cloud</text>
    <text x="615" y="218" font-family="Arial" font-size="8" fill="#2e7d32">IoT, AI</text>
  </g>
  
  <g class="step" id="step3" data-narration="ICT infrastructure has four essential pillars: computing hardware, communication networks, data management systems, and user applications that work together seamlessly for digital services.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Four Components of ICT Infrastructure</text>
    <rect x="40" y="268" width="175" height="38" fill="#ffe0b2" rx="3"/>
    <text x="50" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Computing Infrastructure</text>
    <text x="50" y="296" font-family="Arial" font-size="8" fill="#e65100">Servers, workstations, OS, virtualization</text>
    <rect x="225" y="268" width="175" height="38" fill="#ffe0b2" rx="3"/>
    <text x="235" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Communication Infrastructure</text>
    <text x="235" y="296" font-family="Arial" font-size="8" fill="#e65100">Routers, switches, fiber, protocols</text>
    <rect x="410" y="268" width="175" height="38" fill="#ffe0b2" rx="3"/>
    <text x="420" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Data Management Systems</text>
    <text x="420" y="296" font-family="Arial" font-size="8" fill="#e65100">Databases, data warehouses, big data</text>
    <rect x="595" y="268" width="175" height="38" fill="#ffe0b2" rx="3"/>
    <text x="605" y="282" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Application Layer</text>
    <text x="605" y="296" font-family="Arial" font-size="8" fill="#e65100">ERP, CRM, cloud services</text>
  </g>
  
  <g class="step" id="step4" data-narration="ICT transformed economics through e-commerce, society via social media, education with e-learning, and healthcare with telemedicine, creating unprecedented global connectivity and new opportunities.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Impact of ICT on Society</text>
    <rect x="40" y="358" width="170" height="38" fill="#e1bee7" rx="3"/>
    <text x="50" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">Economic Impact</text>
    <text x="50" y="386" font-family="Arial" font-size="8" fill="#7b1fa2">E-commerce, digital banking, 24/7 markets</text>
    <rect x="220" y="358" width="170" height="38" fill="#e1bee7" rx="3"/>
    <text x="230" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">Social Impact</text>
    <text x="230" y="386" font-family="Arial" font-size="8" fill="#7b1fa2">Social media, online communities</text>
    <rect x="400" y="358" width="170" height="38" fill="#e1bee7" rx="3"/>
    <text x="410" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">Educational Impact</text>
    <text x="410" y="386" font-family="Arial" font-size="8" fill="#7b1fa2">E-learning, digital libraries, virtual labs</text>
    <rect x="580" y="358" width="170" height="38" fill="#e1bee7" rx="3"/>
    <text x="590" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">Healthcare Impact</text>
    <text x="590" y="386" font-family="Arial" font-size="8" fill="#7b1fa2">EHR, telemedicine, medical imaging</text>
  </g>
  
  <g class="step" id="step5" data-narration="Real-world ICT examples include smartphone messaging replacing letters, Amazon's digital marketplace transforming retail, and ERP systems automating business operations across enterprises worldwide.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Real-World Examples</text>
    <rect x="40" y="448" width="240" height="36" fill="#ffcdd2" rx="3"/>
    <text x="50" y="462" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Communication Evolution</text>
    <text x="50" y="476" font-family="Arial" font-size="8" fill="#c62828">1980: Letters → 1995: Email → 2010: Smartphones → Today: Video calls</text>
    <rect x="290" y="448" width="240" height="36" fill="#ffcdd2" rx="3"/>
    <text x="300" y="462" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">E-Commerce (Amazon)</text>
    <text x="300" y="476" font-family="Arial" font-size="8" fill="#c62828">Digital marketplace + Cloud + AI recommendations + Digital payments</text>
    <rect x="540" y="448" width="220" height="36" fill="#ffcdd2" rx="3"/>
    <text x="550" y="462" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Business Operations (ERP)</text>
    <text x="550" y="476" font-family="Arial" font-size="8" fill="#c62828">Real-time inventory tracking, automated orders, instant reporting</text>
  </g>
  
  <g class="step" id="step6" data-narration="Remember that ICT emphasizes communication over traditional IT, understand the five generations, master the four components, and know the convergence concept thoroughly for exams.">
    <rect x="20" y="498" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Takeaways</text>
    <text x="40" y="538" font-family="Arial" font-size="10" fill="#333">• ICT ≠ IT: ICT emphasizes the "Communication" aspect - convergence of computing + telecommunications</text>
    <text x="40" y="555" font-family="Arial" font-size="10" fill="#333">• Five Generations: Vacuum tubes → Transistors → IC → Microprocessors → Intelligent Systems</text>
    <text x="40" y="572" font-family="Arial" font-size="10" fill="#333">• Four Pillars: Computing, Communication, Data Management, Applications</text>
    <text x="480" y="555" font-family="Arial" font-size="10" fill="#c62828">WWW invented in 1989 by Tim Berners-Lee</text>
  </g>
</svg>