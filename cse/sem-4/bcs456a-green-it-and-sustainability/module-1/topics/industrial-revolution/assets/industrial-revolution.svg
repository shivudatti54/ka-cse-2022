<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The Industrial Revolution transformed societies from agrarian to industrial through four distinct technological revolutions spanning over 250 years of technological development and economic transformation.">
    <rect x="20" y="10" width="760" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">The Four Industrial Revolutions</text>
  </g>
  
  <g class="step" id="step1" data-narration="First Revolution (1760-1840): Steam power mechanized textile production, creating factories and shifting workers from homes to urban industrial centers across nations.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">First Industrial Revolution</text>
    <text x="40" y="98" font-family="Arial" font-size="11" fill="#388e3c">1760 - 1840</text>
    <rect x="200" y="72" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="260" y="92" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Steam Engine</text>
    <text x="260" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">James Watt</text>
    <rect x="340" y="72" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="92" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Spinning Jenny</text>
    <text x="400" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Textiles</text>
    <rect x="480" y="72" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="540" y="92" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Power Loom</text>
    <text x="540" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Mechanization</text>
    <text x="640" y="88" font-family="Arial" font-size="9" fill="#666">Factory systems</text>
    <text x="640" y="102" font-family="Arial" font-size="9" fill="#666">Urbanization begins</text>
    <text x="640" y="116" font-family="Arial" font-size="9" fill="#666">Steam power</text>
  </g>
  
  <g class="step" id="step2" data-narration="Second Revolution (1870-1914): Electricity enabled mass production and the assembly line, making automobiles affordable and creating modern factories that revolutionized manufacturing worldwide.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Second Industrial Revolution</text>
    <text x="40" y="186" font-family="Arial" font-size="11" fill="#2e7d32">1870 - 1914</text>
    <rect x="200" y="160" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="260" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Electricity</text>
    <text x="260" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Power anywhere</text>
    <rect x="340" y="160" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Assembly Line</text>
    <text x="400" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Henry Ford</text>
    <rect x="480" y="160" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="540" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Telephone</text>
    <text x="540" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Communication</text>
    <text x="640" y="176" font-family="Arial" font-size="9" fill="#666">Mass production</text>
    <text x="640" y="190" font-family="Arial" font-size="9" fill="#666">Steel industry</text>
    <text x="640" y="204" font-family="Arial" font-size="9" fill="#666">Modern cities</text>
  </g>
  
  <g class="step" id="step3" data-narration="Third Revolution (1960s-2000): Semiconductors enabled computers, automation, and the internet, creating the digital age and software industry that transformed global communication and business operations.">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Third Industrial Revolution</text>
    <text x="40" y="274" font-family="Arial" font-size="11" fill="#e65100">1960s - 2000</text>
    <rect x="200" y="248" width="120" height="50" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="260" y="268" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Semiconductors</text>
    <text x="260" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Transistors, ICs</text>
    <rect x="340" y="248" width="120" height="50" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="268" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Computers</text>
    <text x="400" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">PCs, Mainframes</text>
    <rect x="480" y="248" width="120" height="50" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="540" y="268" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Internet</text>
    <text x="540" y="284" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">WWW, Networks</text>
    <text x="640" y="264" font-family="Arial" font-size="9" fill="#666">Digital systems</text>
    <text x="640" y="278" font-family="Arial" font-size="9" fill="#666">Automation (PLCs)</text>
    <text x="640" y="292" font-family="Arial" font-size="9" fill="#666">Software industry</text>
  </g>
  
  <g class="step" id="step4" data-narration="Fourth Revolution (2010-present): AI, IoT, robotics, and cyber-physical systems create smart factories with real-time data and intelligent automation that is transforming industries across the globe.">
    <rect x="20" y="322" width="760" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Fourth Industrial Revolution</text>
    <text x="40" y="362" font-family="Arial" font-size="11" fill="#7b1fa2">2010 - Present</text>
    <rect x="200" y="336" width="100" height="50" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="250" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">AI / ML</text>
    <text x="250" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Intelligence</text>
    <rect x="310" y="336" width="100" height="50" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="360" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">IoT</text>
    <text x="360" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Sensors</text>
    <rect x="420" y="336" width="100" height="50" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="470" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Robotics</text>
    <text x="470" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Automation</text>
    <rect x="530" y="336" width="100" height="50" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="580" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Cloud</text>
    <text x="580" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Computing</text>
    <text x="660" y="350" font-family="Arial" font-size="9" fill="#666">Cyber-physical</text>
    <text x="660" y="364" font-family="Arial" font-size="9" fill="#666">Smart factories</text>
    <text x="660" y="378" font-family="Arial" font-size="9" fill="#666">Digital twins</text>
  </g>
  
  <g class="step" id="step5" data-narration="Cyber-physical systems combine physical machinery with digital monitoring and AI, enabling predictive maintenance and real-time optimization in manufacturing operations globally.">
    <rect x="20" y="410" width="760" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Cyber-Physical Systems</text>
    <text x="40" y="450" font-family="Arial" font-size="10" fill="#666">Core of Industry 4.0</text>
    <rect x="200" y="424" width="130" height="50" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="265" y="444" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Sensors</text>
    <text x="265" y="460" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Collect data</text>
    <line x1="330" y1="449" x2="350" y2="449" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="360" y="424" width="130" height="50" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="425" y="444" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Cloud/Edge</text>
    <text x="425" y="460" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Process data</text>
    <line x1="490" y1="449" x2="510" y2="449" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="520" y="424" width="130" height="50" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="585" y="444" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">AI Analytics</text>
    <text x="585" y="460" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Optimize decisions</text>
    <line x1="650" y1="449" x2="670" y2="449" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="680" y="424" width="80" height="50" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="720" y="444" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Actuators</text>
    <text x="720" y="460" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Control</text>
  </g>
  
  <g class="step" id="step6" data-narration="For CSE engineers, Industry 4.0 offers careers in AI development, IoT systems, cloud platforms, and data analytics shaping smart manufacturing.">
    <rect x="20" y="498" width="760" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Industry 4.0 for CSE Engineers</text>
    <text x="40" y="540" font-family="Arial" font-size="10" fill="#666">Career opportunities and relevance</text>
    <rect x="40" y="552" width="80" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="80" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">AI/ML Dev</text>
    <rect x="130" y="552" width="80" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="170" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">IoT Systems</text>
    <rect x="220" y="552" width="80" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="260" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Cloud Eng</text>
    <rect x="310" y="552" width="80" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="350" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Data Science</text>
    <rect x="400" y="552" width="80" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="440" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Robotics</text>
    <rect x="490" y="552" width="80" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="530" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Cybersecurity</text>
    <rect x="580" y="552" width="80" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="620" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Edge Computing</text>
    <rect x="670" y="552" width="90" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="715" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Digital Twins</text>
  </g>
</svg>