<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Sustainable cloud computing minimizes environmental impact while maintaining economic viability and social responsibility across global information technology infrastructure and operations.">
    <rect x="50" y="10" width="700" height="45" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Sustainable Cloud Computing Applications</text>
  </g>
  
  <!-- step1: Energy & PUE -->
  <g class="step" id="step1" data-narration="Data centers consume approximately one to two percent of global electricity, and PUE measures energy efficiency. Lower PUE values indicate superior infrastructure performance with reduced waste.">
    <rect x="50" y="63" width="700" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="83" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Energy Consumption &amp; PUE</text>
    <rect x="70" y="95" width="140" height="40" rx="3" fill="#c8e6c9"/>
    <text x="140" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Data Centers</text>
    <text x="140" y="129" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">1-2% Global Electricity</text>
    <path d="M220,115 L280,115" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="290" y="95" width="180" height="40" rx="3" fill="#a5d6a7"/>
    <text x="380" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">PUE = Total / IT Energy</text>
    <text x="380" y="129" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Ideal: 1.1-1.2 | Legacy: 2.0+</text>
    <path d="M480,115 L540,115" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="550" y="95" width="180" height="40" rx="3" fill="#81c784"/>
    <text x="640" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Efficient Data Center</text>
    <text x="640" y="129" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Lower Energy Waste</text>
  </g>
  
  <!-- step2: Green Cloud Architecture -->
  <g class="step" id="step2" data-narration="Green cloud architecture leverages virtualization, dynamic provisioning, and intelligent energy-aware scheduling techniques to optimize resource utilization and minimize energy consumption across systems.">
    <rect x="50" y="156" width="700" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="176" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Green Cloud Architecture</text>
    <rect x="70" y="190" width="130" height="36" rx="3" fill="#ffe0b2"/>
    <text x="135" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Virtualization</text>
    <path d="M205,208 L255,208" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="260" y="190" width="130" height="36" rx="3" fill="#ffcc80"/>
    <text x="325" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Dynamic Provisioning</text>
    <path d="M395,208 L445,208" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="450" y="190" width="130" height="36" rx="3" fill="#ffb74d"/>
    <text x="515" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Energy-Aware Scheduling</text>
    <path d="M585,208 L635,208" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="640" y="190" width="90" height="36" rx="3" fill="#ffa726"/>
    <text x="685" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Server Consolidation</text>
    <text x="70" y="240" font-family="Arial" font-size="9" fill="#e65100">• Live migration enables workloads to move between servers</text>
  </g>
  
  <!-- step3: VM Consolidation Example -->
  <g class="step" id="step3" data-narration="Virtual machine consolidation example demonstrates efficiency gains: 500 VMs at twenty percent utilization originally required fifty servers, but after consolidation to sixty percent, only thirty servers are needed.">
    <rect x="50" y="254" width="700" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="274" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">VM Consolidation Example</text>
    <rect x="70" y="288" width="280" height="40" rx="3" fill="#bbdefb"/>
    <text x="210" y="302" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">BEFORE: 500 VMs @ 20% Utilization</text>
    <text x="210" y="318" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">50 servers × 500W = 25,000W</text>
    <path d="M360,308 L400,308" stroke="#1976d2" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="410" y="288" width="280" height="40" rx="3" fill="#90caf9"/>
    <text x="550" y="302" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">AFTER: 500 VMs @ 60% Utilization</text>
    <text x="550" y="318" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">30 servers × 500W = 15,000W</text>
    <text x="695" y="308" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32">40% Savings!</text>
  </g>
  
  <!-- step4: Carbon-Aware Computing -->
  <g class="step" id="step4" data-narration="Carbon-aware computing schedules workloads based on regional energy source carbon intensity. Wind regions emit far less carbon dioxide compared to coal-dependent regions, enabling cleaner operations.">
    <rect x="50" y="347" width="700" height="95" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="367" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Carbon-Aware Computing</text>
    <rect x="70" y="383" width="190" height="35" rx="3" fill="#e1bee7"/>
    <text x="165" y="400" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Coal Region</text>
    <text x="165" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">0.8 kg CO2/kWh</text>
    <rect x="270" y="383" width="190" height="35" rx="3" fill="#ce93d8"/>
    <text x="365" y="400" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Wind Region</text>
    <text x="365" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">0.1 kg CO2/kWh</text>
    <rect x="470" y="383" width="190" height="35" rx="3" fill="#ab47bc"/>
    <text x="565" y="400" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Peak Wind Hours</text>
    <text x="565" y="413" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">0.05 kg CO2/kWh (87.5% less)</text>
    <text x="70" y="435" font-family="Arial" font-size="9" fill="#7b1fa2">• Schedule batch jobs during high renewable energy availability</text>
  </g>
  
  <!-- step5: Renewable Energy & Providers -->
  <g class="step" id="step5" data-narration="Major cloud providers commit to one hundred percent renewable energy usage. Google, Microsoft, and Amazon invest heavily in solar, wind, and other clean energy projects worldwide.">
    <rect x="50" y="450" width="700" height="100" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="470" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Renewable Energy &amp; Cloud Providers</text>
    <rect x="70" y="486" width="200" height="38" rx="3" fill="#c8e6c9"/>
    <text x="170" y="502" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Google Cloud</text>
    <text x="170" y="517" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">100% Renewable Since 2017</text>
    <rect x="285" y="486" width="200" height="38" rx="3" fill="#a5d6a7"/>
    <text x="385" y="502" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">Microsoft Azure</text>
    <text x="385" y="517" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Carbon Negative by 2030</text>
    <rect x="500" y="486" width="180" height="38" rx="3" fill="#81c784"/>
    <text x="590" y="502" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">AWS</text>
    <text x="590" y="517" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">100% Renewable by 2025</text>
    <text x="70" y="540" font-family="Arial" font-size="9" fill="#2e7d32">• On-site solar/wind generation • Grid matching with renewable certificates</text>
  </g>
  
  <!-- step6: Software Optimization & Summary -->
  <g class="step" id="step6" data-narration="Software-level optimizations include efficient algorithms, data compression, intelligent caching mechanisms, and proper operating system and database configuration tuning for energy savings.">
    <rect x="50" y="558" width="700" height="40" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="575" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Software-Level Energy Optimization</text>
    <rect x="280" y="572" width="90" height="20" rx="3" fill="#ffcdd2"/>
    <text x="325" y="586" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Algorithms</text>
    <rect x="380" y="572" width="90" height="20" rx="3" fill="#ef9a9a"/>
    <text x="425" y="586" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Compression</text>
    <rect x="480" y="572" width="90" height="20" rx="3" fill="#e57373"/>
    <text x="525" y="586" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Caching</text>
    <rect x="580" y="572" width="150" height="20" rx="3" fill="#ef5350"/>
    <text x="655" y="586" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">System Tuning</text>
  </g>
</svg>