<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Cloud Computing and Sustainability explores how cloud services can be designed and managed to minimize environmental impact while maximizing efficiency.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Cloud Computing and Sustainability</text>
  </g>
  
  <g class="step" id="step1" data-narration="Cloud computing provides on-demand access to shared computing resources over the internet through three main service models, enabling scalable and flexible infrastructure for businesses worldwide.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#e3f2fd"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Cloud Service Models</text>
    <rect x="70" y="88" width="210" height="40" rx="3" fill="#1976d2"/>
    <text x="175" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">IaaS</text>
    <text x="175" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">e.g., AWS EC2</text>
    <rect x="295" y="88" width="210" height="40" rx="3" fill="#1976d2"/>
    <text x="400" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">PaaS</text>
    <text x="400" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">e.g., Heroku</text>
    <rect x="520" y="88" width="210" height="40" rx="3" fill="#1976d2"/>
    <text x="625" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">SaaS</text>
    <text x="625" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">e.g., Gmail</text>
  </g>
  
  <g class="step" id="step2" data-narration="Data centers consume 1-2% of global electricity, with each facility using power equivalent to a small city for servers and cooling.">
    <rect x="50" y="146" width="700" height="80" rx="5" fill="#ffebee"/>
    <text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">The Environmental Challenge</text>
    <rect x="70" y="180" width="300" height="35" rx="3" fill="#f44336"/>
    <text x="220" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Data Centers: 1-2% Global Electricity</text>
    <text x="380" y="195" font-family="Arial" font-size="9" fill="#333">→ Continuous power for servers,</text>
    <text x="380" y="208" font-family="Arial" font-size="9" fill="#333">→ cooling systems, infrastructure</text>
    <text x="380" y="221" font-family="Arial" font-size="9" fill="#333">→ Carbon emissions & environmental impact</text>
  </g>
  
  <g class="step" id="step3" data-narration="Green Cloud Computing aims to minimize energy consumption, reduce carbon emissions, optimize resources, and extend hardware lifespan through sustainable practices and efficient resource management.">
    <rect x="50" y="234" width="700" height="80" rx="5" fill="#e8f5e9"/>
    <text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Green Cloud Computing Goals</text>
    <rect x="70" y="268" width="160" height="38" rx="3" fill="#4caf50"/>
    <text x="150" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Minimize Energy</text>
    <rect x="240" y="268" width="160" height="38" rx="3" fill="#4caf50"/>
    <text x="320" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Reduce Emissions</text>
    <rect x="410" y="268" width="160" height="38" rx="3" fill="#4caf50"/>
    <text x="490" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Optimize Resources</text>
    <rect x="580" y="268" width="160" height="38" rx="3" fill="#4caf50"/>
    <text x="660" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Extend Hardware Life</text>
  </g>
  
  <g class="step" id="step4" data-narration="Virtualization enables multiple VMs on one server, improving utilization and reducing infrastructure costs. Server consolidation reduces physical servers by 60-80%, significantly lowering energy consumption.">
    <rect x="50" y="322" width="700" height="80" rx="5" fill="#e3f2fd"/>
    <text x="70" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Virtualization &amp; Energy Efficiency</text>
    <rect x="70" y="356" width="320" height="35" rx="3" fill="#1976d2"/>
    <text x="230" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Virtualization: Multiple VMs per Physical Server</text>
    <rect x="400" y="356" width="335" height="35" rx="3" fill="#1976d2"/>
    <text x="567" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Server Consolidation: 60-80% Energy Reduction</text>
    <text x="70" y="400" font-family="Arial" font-size="9" fill="#555">Key Techniques:</text>
    <text x="140" y="400" font-family="Arial" font-size="9" fill="#333">VM Migration</text>
    <text x="220" y="400" font-family="Arial" font-size="9" fill="#333">Live Migration</text>
    <text x="300" y="400" font-family="Arial" font-size="9" fill="#333">Load Balancing</text>
    <text x="380" y="400" font-family="Arial" font-size="9" fill="#333">Put Idle Servers to Sleep</text>
  </g>
  
  <g class="step" id="step5" data-narration="Energy-aware scheduling, DVFS, and location-aware computing optimize power usage by dynamically adjusting processor speed and intelligently placing workloads in energy-efficient data center locations.">
    <rect x="50" y="410" width="700" height="80" rx="5" fill="#fff3e0"/>
    <text x="70" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Energy-Aware Resource Allocation</text>
    <rect x="70" y="444" width="220" height="35" rx="3" fill="#ff9800"/>
    <text x="180" y="466" text-anchor="middle" font-family="Arial" font-size="10" fill="white">DVFS: Dynamic Voltage &amp; Frequency Scaling</text>
    <rect x="300" y="444" width="220" height="35" rx="3" fill="#ff9800"/>
    <text x="410" y="466" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Energy-Aware Scheduling</text>
    <rect x="530" y="444" width="210" height="35" rx="3" fill="#ff9800"/>
    <text x="635" y="466" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Location-Aware Computing</text>
    <text x="70" y="488" font-family="Arial" font-size="9" fill="#555">Benefits: Places workloads in cooler climates, uses renewable energy regions, reduces cooling needs.</text>
  </g>
  
  <g class="step" id="step6" data-narration="PUE measures data center efficiency. A PUE of 1.1-1.2 is excellent. CUE and WUE track carbon emissions and water usage respectively.">
    <rect x="50" y="498" width="700" height="90" rx="5" fill="#f3e5f5"/>
    <text x="70" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Data Center Efficiency Metrics</text>
    <rect x="70" y="532" width="200" height="45" rx="3" fill="#9c27b0"/>
    <text x="170" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="white">PUE = Total Facility / IT Equipment</text>
    <text x="170" y="566" text-anchor="middle" font-family="Arial" font-size="9" fill="#f3e5f5">Lower is better (ideal: 1.0)</text>
    <rect x="280" y="532" width="200" height="45" rx="3" fill="#9c27b0"/>
    <text x="380" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="white">CUE: Carbon Usage Effectiveness</text>
    <text x="380" y="566" text-anchor="middle" font-family="Arial" font-size="9" fill="#f3e5f5">CO2 emissions per computing unit</text>
    <rect x="490" y="532" width="200" height="45" rx="3" fill="#9c27b0"/>
    <text x="590" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="white">WUE: Water Usage Effectiveness</text>
    <text x="590" y="566" text-anchor="middle" font-family="Arial" font-size="9" fill="#f3e5f5">Water consumption for cooling</text>
  </g>
</svg>