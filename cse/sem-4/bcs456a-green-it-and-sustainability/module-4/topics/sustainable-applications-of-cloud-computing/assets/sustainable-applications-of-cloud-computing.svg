<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Cloud computing transforms how we deploy applications with scalability and flexibility, but data centers consume 1-2% of global electricity, raising urgent sustainability concerns.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" fill="white" font-weight="bold">Sustainable Applications of Cloud Computing</text>
  </g>
  
  <g class="step" id="step1" data-narration="Green cloud computing minimizes energy use and carbon emissions through three pillars: energy efficiency, resource optimization, and environmental impact reduction.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="13" fill="#388e3c" font-weight="bold">Green Cloud Computing Fundamentals</text>
    <rect x="40" y="88" width="220" height="42" fill="#c8e6c9" rx="4"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#2e7d32">Energy Efficiency</text>
    <text x="50" y="116" font-family="Arial" font-size="9" fill="#388e3c">Minimize power per computation</text>
    <rect x="270" y="88" width="220" height="42" fill="#c8e6c9" rx="4"/>
    <text x="280" y="102" font-family="Arial" font-size="10" fill="#2e7d32">Resource Optimization</text>
    <text x="280" y="116" font-family="Arial" font-size="9" fill="#388e3c">Avoid over/under-provisioning</text>
    <rect x="500" y="88" width="220" height="42" fill="#c8e6c9" rx="4"/>
    <text x="510" y="102" font-family="Arial" font-size="10" fill="#2e7d32">Environmental Impact</text>
    <text x="510" y="116" font-family="Arial" font-size="9" fill="#388e3c">Water, e-waste, supply chain</text>
  </g>
  
  <g class="step" id="step2" data-narration="Modern data centers use free cooling, hot/cold aisle containment, and strategic location selection to significantly reduce overall energy consumption and operational costs.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="13" fill="#e65100" font-weight="bold">Energy-Efficient Data Center Design</text>
    <rect x="40" y="176" width="170" height="42" fill="#ffe0b2" rx="4"/>
    <text x="50" y="190" font-family="Arial" font-size="10" fill="#ef6c00">Free Cooling</text>
    <text x="50" y="204" font-family="Arial" font-size="8" fill="#ff9800">Use outside air/water for cooling</text>
    <rect x="220" y="176" width="170" height="42" fill="#ffe0b2" rx="4"/>
    <text x="230" y="190" font-family="Arial" font-size="10" fill="#ef6c00">Airflow Management</text>
    <text x="230" y="204" font-family="Arial" font-size="8" fill="#ff9800">Hot/cold aisle containment</text>
    <rect x="400" y="176" width="170" height="42" fill="#ffe0b2" rx="4"/>
    <text x="410" y="190" font-family="Arial" font-size="10" fill="#ef6c00">Location Selection</text>
    <text x="410" y="204" font-family="Arial" font-size="8" fill="#ff9800">Cooler climates, renewable energy</text>
    <rect x="580" y="176" width="170" height="42" fill="#ffe0b2" rx="4"/>
    <text x="590" y="190" font-family="Arial" font-size="10" fill="#ef6c00">PUE Optimization</text>
    <text x="590" y="204" font-family="Arial" font-size="8" fill="#ff9800">Target PUE 1.1-1.4</text>
  </g>
  
  <g class="step" id="step3" data-narration="Virtualization enables multiple virtual machines to run on a single physical server, improving utilization from 15-25% to 60-80%, dramatically reducing physical hardware and associated infrastructure costs.">
    <rect x="20" y="234" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="13" fill="#1565c0" font-weight="bold">Virtualization and Resource Consolidation</text>
    <rect x="40" y="264" width="340" height="42" fill="#bbdefb" rx="4"/>
    <text x="50" y="278" font-family="Arial" font-size="10" fill="#0d47a1">Traditional Data Center</text>
    <text x="50" y="292" font-family="Arial" font-size="9" fill="#1976d2">15-25% utilization, more servers</text>
    <line x1="390" y1="285" x2="430" y2="285" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="440" y="264" width="320" height="42" fill="#bbdefb" rx="4"/>
    <text x="450" y="278" font-family="Arial" font-size="10" fill="#0d47a1">Virtualized Environment</text>
    <text x="450" y="292" font-family="Arial" font-size="9" fill="#1976d2">60-80% utilization, VM consolidation</text>
  </g>
  
  <g class="step" id="step4" data-narration="Energy-aware scheduling treats power consumption as a primary optimization metric, using DVFS and intelligent workload consolidation to dramatically minimize energy usage across data centers.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="13" fill="#6a1b9a" font-weight="bold">Energy-Aware Scheduling Algorithms</text>
    <rect x="40" y="352" width="230" height="42" fill="#e1bee7" rx="4"/>
    <text x="50" y="366" font-family="Arial" font-size="10" fill="#4a148c">DVFS</text>
    <text x="50" y="380" font-family="Arial" font-size="8" fill="#9c27b0">Dynamic Voltage/Frequency Scaling</text>
    <rect x="280" y="352" width="230" height="42" fill="#e1bee7" rx="4"/>
    <text x="290" y="366" font-family="Arial" font-size="10" fill="#4a148c">Workload Consolidation</text>
    <text x="290" y="380" font-family="Arial" font-size="8" fill="#9c27b0">Combine tasks to minimize active servers</text>
    <rect x="520" y="352" width="230" height="42" fill="#e1bee7" rx="4"/>
    <text x="530" y="366" font-family="Arial" font-size="10" fill="#4a148c">ML-Based Prediction</text>
    <text x="530" y="380" font-family="Arial" font-size="8" fill="#9c27b0">Predict patterns, proactive allocation</text>
  </g>
  
  <g class="step" id="step5" data-narration="Sustainable architecture uses microservices for precise scaling, event-driven processing for off-peak hours, and edge computing to reduce data transmission energy.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="13" fill="#2e7d32" font-weight="bold">Sustainable Application Architecture</text>
    <rect x="40" y="440" width="175" height="42" fill="#c8e6c9" rx="4"/>
    <text x="50" y="454" font-family="Arial" font-size="10" fill="#1b5e20">Microservices</text>
    <text x="50" y="468" font-family="Arial" font-size="8" fill="#388e3c">Independent scaling per component</text>
    <rect x="225" y="440" width="175" height="42" fill="#c8e6c9" rx="4"/>
    <text x="235" y="454" font-family="Arial" font-size="10" fill="#1b5e20">Event-Driven</text>
    <text x="235" y="468" font-family="Arial" font-size="8" fill="#388e3c">Batch processing during off-peak</text>
    <rect x="410" y="440" width="175" height="42" fill="#c8e6c9" rx="4"/>
    <text x="420" y="454" font-family="Arial" font-size="10" fill="#1b5e20">Edge Computing</text>
    <text x="420" y="468" font-family="Arial" font-size="8" fill="#388e3c">Process closer to users</text>
    <rect x="595" y="440" width="165" height="42" fill="#c8e6c9" rx="4"/>
    <text x="605" y="454" font-family="Arial" font-size="10" fill="#1b5e20">Data Optimization</text>
    <text x="605" y="468" font-family="Arial" font-size="8" fill="#388e3c">Compression, deduplication</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key metrics include PUE measuring facility efficiency, CUE adding carbon factors, and WUE tracking water usage for cooling in data centers.">
    <rect x="20" y="498" width="760" height="90" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="518" font-family="Arial" font-size="13" fill="#e65100" font-weight="bold">Cloud Sustainability Metrics and Measurement</text>
    <rect x="40" y="528" width="230" height="52" fill="#ffe0b2" rx="4"/>
    <text x="50" y="542" font-family="Arial" font-size="10" fill="#bf360c">PUE</text>
    <text x="50" y="556" font-family="Arial" font-size="9" fill="#ff9800">Power Usage Effectiveness</text>
    <text x="50" y="570" font-family="Arial" font-size="9" fill="#e65100">PUE = Total Facility / IT Energy</text>
    <rect x="280" y="528" width="230" height="52" fill="#ffe0b2" rx="4"/>
    <text x="290" y="542" font-family="Arial" font-size="10" fill="#bf360c">CUE</text>
    <text x="290" y="556" font-family="Arial" font-size="9" fill="#ff9800">Carbon Usage Effectiveness</text>
    <text x="290" y="570" font-family="Arial" font-size="9" fill="#e65100">Extends PUE with carbon intensity</text>
    <rect x="520" y="528" width="230" height="52" fill="#ffe0b2" rx="4"/>
    <text x="530" y="542" font-family="Arial" font-size="10" fill="#bf360c">WUE</text>
    <text x="530" y="556" font-family="Arial" font-size="9" fill="#ff9800">Water Usage Effectiveness</text>
    <text x="530" y="570" font-family="Arial" font-size="9" fill="#e65100">Measures cooling water consumption</text>
  </g>
</svg>