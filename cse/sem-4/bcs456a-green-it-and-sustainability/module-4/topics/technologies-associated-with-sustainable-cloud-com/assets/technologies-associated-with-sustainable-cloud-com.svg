<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Sustainable cloud computing minimizes environmental impact while maintaining economic viability and social equity in cloud infrastructure worldwide today for generations.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Technologies Associated with Sustainable Cloud Computing</text>
  </g>
  
  <g class="step" id="step1" data-narration="Server virtualization improves hardware utilization from 15-30% to 70-80%, reducing physical servers and energy consumption through live migration techniques effectively.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Energy-Efficient Virtualization</text>
    <rect x="40" y="88" width="160" height="40" fill="white" stroke="#1976d2" rx="4"/>
    <text x="120" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Server Virtualization</text>
    <text x="120" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">15-30% → 70-80%</text>
    <rect x="210" y="88" width="160" height="40" fill="white" stroke="#1976d2" rx="4"/>
    <text x="290" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Live Migration</text>
    <text x="290" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Workload Consolidation</text>
    <rect x="380" y="88" width="160" height="40" fill="white" stroke="#1976d2" rx="4"/>
    <text x="460" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Containerization</text>
    <text x="460" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Docker, Kubernetes</text>
    <rect x="550" y="88" width="210" height="40" fill="#e3f2fd" stroke="#1976d2" rx="4"/>
    <text x="655" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Energy Impact</text>
    <text x="655" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Fewer servers, less power</text>
  </g>
  
  <g class="step" id="step2" data-narration="Green data centers use hot aisle containment improving cooling efficiency by 30-40%, with PUE metrics as low as 1.1-1.2 for optimal performance.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Green Data Center Design</text>
    <rect x="40" y="176" width="200" height="40" fill="white" stroke="#388e3c" rx="4"/>
    <text x="140" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Hot Aisle/Cold Aisle</text>
    <text x="140" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">30-40% cooling improvement</text>
    <rect x="250" y="176" width="200" height="40" fill="white" stroke="#388e3c" rx="4"/>
    <text x="350" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Free Air Cooling</text>
    <text x="350" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Up to 90% in cold climates</text>
    <rect x="460" y="176" width="140" height="40" fill="#388e3c" rx="4"/>
    <text x="530" y="193" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">PUE Metric</text>
    <text x="530" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="white">1.1 - 1.2 (ideal)</text>
    <rect x="610" y="176" width="150" height="40" fill="white" stroke="#388e3c" rx="4"/>
    <text x="685" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Evaporative Cooling</text>
    <text x="685" y="206" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Natural cooling</text>
  </g>
  
  <g class="step" id="step3" data-narration="Cloud providers use PPAs, RECs, and renewable matching to power infrastructure, scheduling workloads during peak solar or wind generation to maximize clean energy usage.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Renewable Energy Integration</text>
    <rect x="40" y="264" width="180" height="40" fill="white" stroke="#ff9800" rx="4"/>
    <text x="130" y="281" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Power Purchase Agreements</text>
    <text x="130" y="294" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Long-term renewable contracts</text>
    <rect x="230" y="264" width="180" height="40" fill="white" stroke="#ff9800" rx="4"/>
    <text x="320" y="281" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Renewable Energy Certificates</text>
    <text x="320" y="294" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">RECs for offsetting</text>
    <rect x="420" y="264" width="180" height="40" fill="white" stroke="#ff9800" rx="4"/>
    <text x="510" y="281" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Solar &amp; Wind Energy</text>
    <text x="510" y="294" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Direct renewable power</text>
    <rect x="610" y="264" width="150" height="40" fill="#ff9800" rx="4"/>
    <text x="685" y="281" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Workload Scheduling</text>
    <text x="685" y="294" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Match renewables</text>
  </g>
  
  <g class="step" id="step4" data-narration="Auto-scaling reduces energy by 40-60% compared to static provisioning, with geographic load balancing reducing carbon emissions by 20-40% through intelligent distribution.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Dynamic Resource Provisioning &amp; Auto-Scaling</text>
    <rect x="40" y="352" width="200" height="40" fill="white" stroke="#9c27b0" rx="4"/>
    <text x="140" y="369" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Auto-Scaling</text>
    <text x="140" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">40-60% energy savings</text>
    <rect x="250" y="352" width="200" height="40" fill="white" stroke="#9c27b0" rx="4"/>
    <text x="350" y="369" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Workload Scheduling</text>
    <text x="350" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Energy-aware algorithms</text>
    <rect x="460" y="352" width="200" height="40" fill="white" stroke="#9c27b0" rx="4"/>
    <text x="560" y="369" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Geographic Load Balancing</text>
    <text x="560" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">20-40% carbon reduction</text>
    <rect x="670" y="352" width="90" height="40" fill="#9c27b0" rx="4"/>
    <text x="715" y="369" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Demand-Based</text>
    <text x="715" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Resources</text>
  </g>
  
  <g class="step" id="step5" data-narration="DVFS reduces power consumption during idle periods following cubic relationship, with server idle power management and memory hibernation for additional savings.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. Power Management Techniques</text>
    <rect x="40" y="440" width="220" height="40" fill="white" stroke="#f44336" rx="4"/>
    <text x="150" y="457" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">DVFS</text>
    <text x="150" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Voltage/Frequency scaling</text>
    <rect x="270" y="440" width="220" height="40" fill="white" stroke="#f44336" rx="4"/>
    <text x="380" y="457" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Server Idle Management</text>
    <text x="380" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Low-power sleep states</text>
    <rect x="500" y="440" width="180" height="40" fill="white" stroke="#f44336" rx="4"/>
    <text x="590" y="457" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Memory Hibernation</text>
    <text x="590" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Spin-down inactive</text>
    <rect x="690" y="440" width="70" height="40" fill="#f44336" rx="4"/>
    <text x="725" y="457" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Multi-Level</text>
    <text x="725" y="470" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="white">Control</text>
  </g>
  
  <g class="step" id="step6" data-narration="SDN enables network-wide energy optimization through traffic engineering and device sleep modes, while storage tiering reduces energy by 40-60% across data centers.">
    <rect x="20" y="498" width="760" height="90" fill="#e1f5fe" stroke="#0288d1" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#0288d1">6. SDN for Energy &amp; Storage Optimization</text>
    <rect x="40" y="528" width="230" height="50" fill="white" stroke="#0288d1" rx="4"/>
    <text x="155" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Software-Defined Networking</text>
    <text x="155" y="561" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">20-30% network savings</text>
    <text x="155" y="572" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Sleep modes, traffic engineering</text>
    <rect x="280" y="528" width="230" height="50" fill="white" stroke="#0288d1" rx="4"/>
    <text x="395" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Storage Tiering</text>
    <text x="395" y="561" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">SSD → Magnetic → Archive</text>
    <text x="395" y="572" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">40-60% energy reduction</text>
    <rect x="520" y="528" width="240" height="50" fill="#0288d1" rx="4"/>
    <text x="640" y="548" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Data Reduction</text>
    <text x="640" y="561" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Deduplication &amp; Compression</text>
    <text x="640" y="572" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Less storage = less power</text>
  </g>
</svg>