<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Transaction Processing ensures reliable data integrity in multi-user database environments by enforcing ACID properties across all database operations efficiently and securely.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565C0">Transaction Processing and Concurrency Control</text>
  </g>
  
  <g class="step" id="step1" data-narration="A transaction is a logical unit of work with read and write operations that must execute atomically as a single operation.">
    <rect x="40" y="58" width="720" height="85" fill="white" stroke="#1976d2" stroke-width="2" rx="8"/>
    <circle cx="70" cy="100" r="18" fill="#1976d2"/>
    <text x="70" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">1</text>
    <text x="100" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976d2">What is a Transaction?</text>
    <text x="100" y="108" font-family="Arial, sans-serif" font-size="12" fill="#333">A logical unit of work consisting of</text>
    <text x="100" y="125" font-family="Arial, sans-serif" font-size="12" fill="#333">read and write operations that must</text>
    <text x="100" y="142" font-family="Arial, sans-serif" font-size="12" fill="#333">execute atomically as a single operation.</text>
  </g>
  
  <g class="step" id="step2" data-narration="ACID properties define four fundamental transaction guarantees: Atomicity, Consistency, Isolation, and Durability that together ensure reliable database processing and maintain data integrity.">
    <rect x="40" y="151" width="720" height="85" fill="white" stroke="#388e3c" stroke-width="2" rx="8"/>
    <circle cx="70" cy="193" r="18" fill="#388e3c"/>
    <text x="70" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">2</text>
    <text x="100" y="178" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#388e3c">ACID Properties</text>
    <rect x="100" y="195" width="130" height="35" fill="#e8f5e9" rx="4"/>
    <text x="115" y="212" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Atomicity</text>
    <rect x="240" y="195" width="130" height="35" fill="#e8f5e9" rx="4"/>
    <text x="255" y="212" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Consistency</text>
    <rect x="380" y="195" width="130" height="35" fill="#e8f5e9" rx="4"/>
    <text x="395" y="212" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Isolation</text>
    <rect x="520" y="195" width="130" height="35" fill="#e8f5e9" rx="4"/>
    <text x="535" y="212" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Durability</text>
  </g>
  
  <g class="step" id="step3" data-narration="Atomicity guarantees all-or-nothing execution so either all operations succeed together or none do, preventing partial updates in the database system completely.">
    <rect x="40" y="244" width="350" height="85" fill="white" stroke="#ff9800" stroke-width="2" rx="8"/>
    <circle cx="70" cy="286" r="18" fill="#ff9800"/>
    <text x="70" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">3</text>
    <text x="100" y="271" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">Atomicity</text>
    <text x="100" y="291" font-family="Arial, sans-serif" font-size="11" fill="#333">All-or-nothing execution:</text>
    <text x="100" y="306" font-family="Arial, sans-serif" font-size="11" fill="#333">either all operations</text>
    <text x="100" y="321" font-family="Arial, sans-serif" font-size="11" fill="#333">succeed or none do.</text>
    
    <rect x="410" y="244" width="350" height="85" fill="white" stroke="#f44336" stroke-width="2" rx="8"/>
    <circle cx="440" cy="286" r="18" fill="#f44336"/>
    <text x="440" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">4</text>
    <text x="470" y="271" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c62828">Consistency</text>
    <text x="470" y="291" font-family="Arial, sans-serif" font-size="11" fill="#333">Valid state transitions:</text>
    <text x="470" y="306" font-family="Arial, sans-serif" font-size="11" fill="#333">DB moves from one</text>
    <text x="470" y="321" font-family="Arial, sans-serif" font-size="11" fill="#333">consistent state to another.</text>
  </g>
  
  <g class="step" id="step4" data-narration="Isolation ensures each concurrent transaction executes independently without interference, while durability guarantees committed changes survive any system failures or crashes permanently.">
    <rect x="40" y="337" width="350" height="85" fill="white" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <circle cx="70" cy="379" r="18" fill="#9c27b0"/>
    <text x="70" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">5</text>
    <text x="100" y="364" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">Isolation</text>
    <text x="100" y="384" font-family="Arial, sans-serif" font-size="11" fill="#333">Concurrent execution appears</text>
    <text x="100" y="399" font-family="Arial, sans-serif" font-size="11" fill="#333">isolated: each transaction</text>
    <text x="100" y="414" font-family="Arial, sans-serif" font-size="11" fill="#333">executes as if alone.</text>
    
    <rect x="410" y="337" width="350" height="85" fill="white" stroke="#00796b" stroke-width="2" rx="8"/>
    <circle cx="440" cy="379" r="18" fill="#00796b"/>
    <text x="440" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">6</text>
    <text x="470" y="364" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#004d40">Durability</text>
    <text x="470" y="384" font-family="Arial, sans-serif" font-size="11" fill="#333">Committed changes persist</text>
    <text x="470" y="399" font-family="Arial, sans-serif" font-size="11" fill="#333">permanently even after</text>
    <text x="470" y="414" font-family="Arial, sans-serif" font-size="11" fill="#333">system failures.</text>
  </g>
  
  <g class="step" id="step5" data-narration="Concurrency control is essential in multi-user databases to prevent anomalies like lost updates, dirty reads, and inconsistent data retrieval across transactions.">
    <rect x="40" y="430" width="720" height="85" fill="white" stroke="#1976d2" stroke-width="2" rx="8"/>
    <circle cx="70" cy="472" r="18" fill="#1976d2"/>
    <text x="70" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">7</text>
    <text x="100" y="457" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976d2">Why Concurrency Control?</text>
    <rect x="100" y="475" width="155" height="35" fill="#e3f2fd" rx="4"/>
    <text x="115" y="492" font-family="Arial, sans-serif" font-size="10" fill="#1565C0">Lost Updates</text>
    <rect x="265" y="475" width="155" height="35" fill="#ffebee" rx="4"/>
    <text x="280" y="492" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Dirty Reads</text>
    <rect x="430" y="475" width="155" height="35" fill="#fff3e0" rx="4"/>
    <text x="445" y="492" font-family="Arial, sans-serif" font-size="10" fill="#e65100">Non-Repeatable</text>
    <text x="445" y="504" font-family="Arial, sans-serif" font-size="10" fill="#e65100">Reads</text>
    <rect x="595" y="475" width="155" height="35" fill="#f3e5f5" rx="4"/>
    <text x="610" y="492" font-family="Arial, sans-serif" font-size="10" fill="#6a1b9a">Phantom</text>
    <text x="610" y="504" font-family="Arial, sans-serif" font-size="10" fill="#6a1b9a">Reads</text>
  </g>
  
  <g class="step" id="step6" data-narration="This banking example demonstrates ACID in action: transferring money between accounts atomically maintains the total balance while preserving data consistency.">
    <rect x="40" y="523" width="720" height="65" fill="white" stroke="#388e3c" stroke-width="2" rx="8"/>
    <circle cx="70" cy="555" r="18" fill="#388e3c"/>
    <text x="70" y="561" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">8</text>
    <text x="100" y="540" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#388e3c">Example: Bank Transfer (A:₹5000 → B:₹3000)</text>
    <text x="100" y="562" font-family="Arial, sans-serif" font-size="11" fill="#333">ACID ensures atomic debit and credit: total balance (₹8000) is maintained,</text>
    <text x="100" y="578" font-family="Arial, sans-serif" font-size="11" fill="#333">changes persist after commit, and concurrent transactions see consistent states.</text>
  </g>
</svg>