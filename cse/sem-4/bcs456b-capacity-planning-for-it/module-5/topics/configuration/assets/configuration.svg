<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Configuration Management covers systematic change control in software systems, ensuring integrity through version tracking, consistent environments, and controlled release processes across the entire software development lifecycle.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Configuration Management</text>
  </g>
  
  <g class="step" id="step1" data-narration="Configuration management systematically controls changes to software, maintaining integrity through version tracking and consistent environments across development, testing, and production.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Configuration Management?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Systematic process of handling changes to software in a controlled manner.</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">Ensures system integrity over time by tracking modifications and managing versions.</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">Crucial for DevOps, cloud computing, and CI/CD pipelines.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Key concepts include Configuration Items as identifiable components, Baselines as reference points, and Version Control using Git for tracking changes.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Key Concepts</text>
    <rect x="40" y="178" width="100" height="40" fill="#c8e6c9" rx="3"/>
    <text x="90" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Configuration</text>
    <text x="90" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Items</text>
    <rect x="150" y="178" width="100" height="40" fill="#c8e6c9" rx="3"/>
    <text x="200" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Baselines</text>
    <text x="200" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Reference Points</text>
    <rect x="260" y="178" width="100" height="40" fill="#c8e6c9" rx="3"/>
    <text x="310" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Version</text>
    <text x="310" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Control (Git)</text>
    <rect x="370" y="178" width="100" height="40" fill="#c8e6c9" rx="3"/>
    <text x="420" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Environment</text>
    <text x="420" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Management</text>
    <rect x="480" y="178" width="100" height="40" fill="#c8e6c9" rx="3"/>
    <text x="530" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Idempotency</text>
    <text x="530" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Same Result</text>
    <rect x="590" y="178" width="100" height="40" fill="#c8e6c9" rx="3"/>
    <text x="640" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Immutable</text>
    <text x="640" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Infrastructure</text>
  </g>
  
  <g class="step" id="step3" data-narration="Popular tools include Ansible for agentless automation, Puppet and Chef for agent-based management, and Terraform for Infrastructure-as-Code in cloud environments.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Configuration Management Tools</text>
    <rect x="40" y="268" width="160" height="40" fill="#ffe0b2" rx="3"/>
    <text x="120" y="282" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Ansible</text>
    <text x="120" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Agentless</text>
    <rect x="210" y="268" width="160" height="40" fill="#ffe0b2" rx="3"/>
    <text x="290" y="282" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Puppet</text>
    <text x="290" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Agent-based</text>
    <rect x="380" y="268" width="160" height="40" fill="#ffe0b2" rx="3"/>
    <text x="460" y="282" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Chef</text>
    <text x="460" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Agent-based</text>
    <rect x="550" y="268" width="160" height="40" fill="#ffe0b2" rx="3"/>
    <text x="630" y="282" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Terraform</text>
    <text x="630" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">IaC Tool</text>
  </g>
  
  <g class="step" id="step4" data-narration="Environment management separates configurations for development, testing, and production using YAML, JSON, and .env files to maintain consistency across systems.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Environment Management</text>
    <rect x="40" y="356" width="220" height="40" fill="#e1bee7" rx="3"/>
    <text x="150" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Development</text>
    <text x="150" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Local testing</text>
    <line x1="260" y1="376" x2="290" y2="376" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="300" y="356" width="220" height="40" fill="#e1bee7" rx="3"/>
    <text x="410" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Testing</text>
    <text x="410" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">QA verification</text>
    <line x1="520" y1="376" x2="550" y2="376" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="560" y="356" width="220" height="40" fill="#e1bee7" rx="3"/>
    <text x="670" y="372" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Production</text>
    <text x="670" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Live systems</text>
  </g>
  
  <g class="step" id="step5" data-narration="This Ansible playbook example shows installing Apache and copying configuration files to webservers, demonstrating idempotent automation. Remember Ansible is agentless while Puppet uses agents, understand checksums for validation, and know mutable versus immutable infrastructure.">
    <rect x="20" y="410" width="760" height="95" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example: Ansible Playbook</text>
    <rect x="40" y="444" width="720" height="35" fill="#ffcdd2" rx="3"/>
    <text x="50" y="456" font-family="Courier New" font-size="9" fill="#c62828">- name: Configure Apache</text>
    <text x="70" y="466" font-family="Courier New" font-size="9" fill="#c62828">  hosts: webservers</text>
    <text x="50" y="478" font-family="Courier New" font-size="9" fill="#c62828">  tasks:</text>
    <text x="70" y="488" font-family="Courier New" font-size="9" fill="#c62828">    - apt: name=apache2 state=present</text>
    <text x="40" y="502" font-family="Arial" font-size="9" fill="#c62828">Exam: Ansible=Agentless, Puppet=Agent | Checksums | Mutable vs Immutable</text>
  </g>
</svg>