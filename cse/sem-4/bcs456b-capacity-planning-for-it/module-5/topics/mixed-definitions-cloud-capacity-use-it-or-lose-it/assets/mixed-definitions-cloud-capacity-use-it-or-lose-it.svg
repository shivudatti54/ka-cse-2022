<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Learn about cloud capacity management, the Use It or Lose It model, and effective cost optimization strategies for cloud resources.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Mixed Definitions in Cloud Capacity: Use It or Lose It Model</text>
  </g>
  
  <!-- Step 1: Cloud Capacity Types -->
  <g class="step" id="step1" data-narration="Three main cloud capacity types exist: Reserved Instances offer discounted pre-paid rates, On-Demand provides pay-as-you-go flexibility, and Spot Instances use bid-based temporary capacity.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Cloud Capacity Types</text>
    <rect x="40" y="90" width="220" height="40" fill="#e3f2fd" rx="3"/>
    <text x="150" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Reserved Instances</text>
    <text x="150" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Pre-paid, discounted rates</text>
    <rect x="270" y="90" width="220" height="40" fill="#e8f5e9" rx="3"/>
    <text x="380" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">On-Demand Instances</text>
    <text x="380" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Pay-as-you-go model</text>
    <rect x="500" y="90" width="220" height="40" fill="#fff3e0" rx="3"/>
    <text x="610" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Spot Instances</text>
    <text x="610" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Bid-based temporary capacity</text>
  </g>
  
  <!-- Step 2: Use It or Lose It Principle -->
  <g class="step" id="step2" data-narration="The Use It or Lose It principle applies to time-bound reservations. Unused reserved capacity cannot be carried forward, requiring precise demand forecasting to avoid financial losses.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Use It or Lose It Principle</text>
    <rect x="40" y="180" width="330" height="38" fill="#e8f5e9" rx="3"/>
    <text x="205" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Time-Bound Reservations</text>
    <text x="205" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Applies to AWS Reserved Instances</text>
    <path d="M390,199 L405,199" marker-end="url(#arrowGreen)" stroke="#388e3c" stroke-width="2"/>
    <rect x="430" y="180" width="330" height="38" fill="#ffebee" rx="3"/>
    <text x="595" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Unused Capacity Lost</text>
    <text x="595" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Cannot be carried forward</text>
  </g>
  
  <!-- Step 3: Capacity Measurement Units -->
  <g class="step" id="step3" data-narration="Capacity is measured using vCPU for processing power, GiB-hours for memory consumption, and IOPS for storage performance metrics in cloud environments.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Capacity Measurement Units</text>
    <rect x="40" y="270" width="230" height="38" fill="#fff3e0" rx="3"/>
    <text x="155" y="287" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800">vCPU</text>
    <text x="155" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Virtual Central Processing Units</text>
    <rect x="280" y="270" width="230" height="38" fill="#f3e5f5" rx="3"/>
    <text x="395" y="287" text-anchor="middle" font-family="Arial" font-size="11" fill="#9c27b0">GiB-hours</text>
    <text x="395" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Memory consumption over time</text>
    <rect x="520" y="270" width="240" height="38" fill="#e3f2fd" rx="3"/>
    <text x="640" y="287" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">IOPS</text>
    <text x="640" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Input/Output Operations Per Second</text>
  </g>
  
  <!-- Step 4: Auto-scaling Strategies & Cloud Waste -->
  <g class="step" id="step4" data-narration="Auto-scaling includes horizontal and vertical scaling with predictive or reactive policies. Cloud waste includes zombie infrastructure, over-provisioned resources, and orphaned storage.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Auto-scaling &amp; Cloud Waste</text>
    <rect x="40" y="358" width="345" height="38" fill="#f3e5f5" rx="3"/>
    <text x="212" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Auto-scaling Strategies</text>
    <text x="212" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Horizontal/Vertical, Predictive/Reactive</text>
    <rect x="395" y="358" width="365" height="38" fill="#ffebee" rx="3"/>
    <text x="577" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Cloud Waste Components</text>
    <text x="577" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Zombie infra, Over-provisioned, Orphaned storage</text>
  </g>
  
  <!-- Step 5: Reserved Instance Cost Example -->
  <g class="step" id="step5" data-narration="Example: 10 reserved instances at $0.10/hr used 8 on average results in net loss of $3,504. Better solution is 8 reserved plus 2 on-demand instances.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Reserved Instance Calculation</text>
    <text x="40" y="452" font-family="Arial" font-size="9" fill="#666">10 reserved × $0.10 × 8760 = $8,760</text>
    <text x="40" y="467" font-family="Arial" font-size="9" fill="#666">8 used × $0.15 × 8760 = $10,512 + 2 unused × $0.10 × 8760 = $1,752</text>
    <text x="40" y="482" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Net Loss = $8,760 - $12,264 = -$3,504</text>
    <rect x="400" y="440" width="360" height="42" fill="#e8f5e9" rx="3"/>
    <text x="580" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Optimal Solution</text>
    <text x="580" y="473" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Use 8 Reserved + 2 On-Demand</text>
  </g>
  
  <!-- Step 6: Storage Tiering & Exam Tips -->
  <g class="step" id="step6" data-narration="Storage tiering: Hot data on SSD, Cool on HDD, Archive on Glacier reduces costs. Use CUBES framework: Cost, Utilization, Bottlenecks, Elasticity, SLA requirements.">
    <rect x="20" y="498" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Storage Tiering &amp; Exam Tips</text>
    <rect x="40" y="532" width="220" height="42" fill="#e3f2fd" rx="3"/>
    <text x="150" y="546" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Hot: SSD ($0.12/GB)</text>
    <text x="150" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">500GB daily access</text>
    <rect x="270" y="532" width="220" height="42" fill="#fff3e0" rx="3"/>
    <text x="380" y="546" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Cool: HDD ($0.05/GB)</text>
    <text x="380" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2TB weekly access</text>
    <rect x="500" y="532" width="240" height="42" fill="#e8f5e9" rx="3"/>
    <text x="620" y="546" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Archive: Glacier ($0.01)</text>
    <text x="620" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">5TB yearly access</text>
    <rect x="40" y="578" width="710" height="0" fill="none"/>
    <text x="40" y="578" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">CUBES Framework: Cost analysis → Utilization metrics → Bottleneck ID → Elasticity → SLA Requirements</text>
  </g>
</svg>