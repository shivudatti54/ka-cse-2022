<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Mixed definitions combine different programming paradigms, data types, and declaration styles to create flexible, powerful type systems in modern languages.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Mixed Definitions in Programming</text>
  </g>
  
  <g class="step" id="step1" data-narration="Key concepts include type coercion, duck typing, function overloading, union types, type inference, and mixin classes for flexible programming in modern languages.">
    <rect x="20" y="58" width="760" h="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Core Concepts</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">• Type Coercion: Automatic conversion between data types</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">• Duck Typing: If it walks like a duck, it's a duck</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">• Union Types: Variables holding multiple data types</text>
    <text x="280" y="95" font-family="Arial" font-size="10" fill="#333">• Function Overloading: Multiple implementations</text>
    <text x="280" y="110" font-family="Arial" font-size="10" fill="#333">• Type Inference: Automatic type detection</text>
    <text x="280" y="125" font-family="Arial" font-size="10" fill="#333">• Mixin Classes: Combining functionalities</text>
  </g>
  
  <g class="step" id="step2" data-narration="In JavaScript type coercion, numbers automatically convert to strings during addition, while multiplication forces string-to-number conversion for calculations and computations.">
    <rect x="20" y="146" width="760" h="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Example 1: Type Coercion (JavaScript)</text>
    <text x="40" y="185" font-family="Courier" font-size="10" fill="#333">console.log(5 + "5"); // "55" - number coerces to string</text>
    <text x="40" y="200" font-family="Courier" font-size="10" fill="#333">console.log("5" * 2);  // 10 - string coerces to number</text>
    <text x="40" y="215" font-family="Arial" font-size="9" fill="#666">JavaScript automatically converts types based on the operation performed</text>
  </g>
  
  <g class="step" id="step3" data-narration="TypeScript union types allow variables to hold multiple data types like number or string, enabling flexible function parameters and type-safe operations.">
    <rect x="20" y="234" width="760" h="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example 2: Union Types (TypeScript)</text>
    <text x="40" y="275" font-family="Courier" font-size="10" fill="#333">function printId(id: number | string): void {</text>
    <text x="40" y="290" font-family="Courier" font-size="10" fill="#333">  console.log(`ID: ${id}`);  // Works with both types</text>
    <text x="40" y="305" font-family="Courier" font-size="10" fill="#333">}  printId(101);    // Valid  printId("id22"); // Also valid</text>
  </g>
  
  <g class="step" id="step4" data-narration="Python mixin classes enable multiple inheritance through separate Flyer and Swimmer classes that combine functionalities into a single Duck class design.">
    <rect x="20" y="322" width="760" h="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Example 3: Mixin Classes (Python)</text>
    <text x="40" y="365" font-family="Courier" font-size="10" fill="#333">class Flyer:          def fly(self): print("Flying")</text>
    <text x="40" y="380" font-family="Courier" font-size="10" fill="#333">class Swimmer:        def swim(self): print("Swimming")</text>
    <text x="40" y="395" font-family="Courier" font-size="10" fill="#333">class Duck(Flyer, Swimmer): pass  # Mixin inheritance</text>
  </g>
  
  <g class="step" id="step5" data-narration="Static typing in Java and C++ catches errors early at compile time, while dynamic typing in Python and JavaScript offers more runtime flexibility.">
    <rect x="20" y="410" width="760" h="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Static vs Dynamic Typing Comparison</text>
    <rect x="40" y="445" width="340" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Static Typing (Java, C++)</text>
    <text x="50" y="475" font-family="Arial" font-size="9" fill="#333">Types fixed at compile time</text>
    <text x="180" y="475" font-family="Arial" font-size="9" fill="#333">Early error detection</text>
    <rect x="420" y="445" width="340" height="38" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="430" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Dynamic Typing (Python, JS)</text>
    <text x="430" y="475" font-family="Arial" font-size="9" fill="#333">Types resolved at runtime</text>
    <text x="560" y="475" font-family="Arial" font-size="9" fill="#333">Maximum flexibility</text>
  </g>
  
  <g class="step" id="step6" data-narration="Exam success requires understanding static vs dynamic typing differences, memorizing JavaScript coercion rules, and practicing generic functions with mixin class patterns.">
    <rect x="20" y="498" width="760" h="90" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips and Learning Objectives</text>
    <text x="40" y="538" font-family="Arial" font-size="10" fill="#333">• Know static vs dynamic typing differences for type system comparison</text>
    <text x="40" y="553" font-family="Arial" font-size="10" fill="#333">• Memorize JavaScript type coercion rules for automatic conversions</text>
    <text x="280" y="538" font-family="Arial" font-size="10" fill="#333">• Practice function overloading in C++ and Java languages</text>
    <text x="280" y="553" font-family="Arial" font-size="10" fill="#333">• Design mixin class patterns for code reuse in OOP</text>
    <text x="520" y="538" font-family="Arial" font-size="10" fill="#333">• Understand union types for flexible parameter handling</text>
    <text x="520" y="553" font-family="Arial" font-size="10" fill="#333">• Apply generics in Java collections for type safety</text>
  </g>
</svg>