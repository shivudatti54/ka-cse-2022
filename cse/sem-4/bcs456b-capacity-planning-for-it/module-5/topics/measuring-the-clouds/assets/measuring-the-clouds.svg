<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers cloud metrics: performance measurement, cost analysis, scalability evaluation, and SLA compliance monitoring for enterprise cloud deployments worldwide.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Measuring the Clouds</text>
  </g>
  
  <g class="step" id="step1" data-narration="Cloud measurement optimizes resource use and costs. Key areas include performance benchmarks, cost analysis, scalability evaluation, and availability tracking for cloud services.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Why Measure Cloud Services?</text>
    <rect x="40" y="88" width="160" height="40" fill="#1976d2" rx="4"/>
    <text x="120" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Performance</text>
    <text x="120" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Latency, Throughput</text>
    <rect x="220" y="88" width="160" height="40" fill="#388e3c" rx="4"/>
    <text x="300" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Cost</text>
    <text x="300" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Pay-as-you-go</text>
    <rect x="400" y="88" width="160" height="40" fill="#ff9800" rx="4"/>
    <text x="480" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Scalability</text>
    <text x="480" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Elasticity</text>
    <rect x="580" y="88" width="160" height="40" fill="#9c27b0" rx="4"/>
    <text x="660" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">SLA</text>
    <text x="660" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Uptime</text>
  </g>
  
  <g class="step" id="step2" data-narration="Performance metrics include throughput, latency, availability, and resource utilization for CPU, RAM, and storage. These measure how efficiently cloud resources perform under various workloads.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Performance Metrics</text>
    <rect x="40" y="180" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="125" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Throughput</text>
    <text x="125" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Requests/sec</text>
    <rect x="220" y="180" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="305" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Latency</text>
    <text x="305" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Response ms</text>
    <rect x="400" y="180" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="485" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Availability</text>
    <text x="485" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">99.9% uptime</text>
    <rect x="580" y="180" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="665" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Utilization</text>
    <text x="665" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">CPU/RAM %</text>
  </g>
  
  <g class="step" id="step3" data-narration="Cloud costs include compute instance hours, storage tiers, and data transfer fees. Understanding pricing models prevents unexpected bills and helps organizations optimize cloud spending efficiently.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Cost Measurement</text>
    <rect x="40" y="268" width="230" height="36" fill="#ff9800" rx="4"/>
    <text x="155" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Compute Instances</text>
    <text x="155" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">On-demand/Reserved</text>
    <rect x="280" y="268" width="230" height="36" fill="#ff9800" rx="4"/>
    <text x="395" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Storage Tiers</text>
    <text x="395" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Hot vs Cold</text>
    <rect x="520" y="268" width="230" height="36" fill="#ff9800" rx="4"/>
    <text x="635" y="286" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Data Transfer</text>
    <text x="635" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Cross-AZ fees</text>
  </g>
  
  <g class="step" id="step4" data-narration="Scalability includes vertical scaling (adding CPU/RAM to existing nodes) and horizontal scaling (adding more nodes). The Elasticity Index measures how well cloud resources adapt to changing workloads.">
    <rect x="20" y="322" width="760" height="100" fill="#f3e5f5" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Scalability &amp; Elasticity</text>
    <rect x="40" y="356" width="340" height="36" fill="#9c27b0" rx="4"/>
    <text x="210" y="374" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Vertical Scaling</text>
    <text x="210" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Add CPU/RAM to nodes</text>
    <rect x="400" y="356" width="340" height="36" fill="#9c27b0" rx="4"/>
    <text x="570" y="374" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Horizontal Scaling</text>
    <text x="570" y="386" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Add more nodes</text>
    <rect x="200" y="400" width="400" height="22" fill="#7b1fa2" rx="4"/>
    <text x="400" y="415" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Elasticity Index = (Peak - Base) / Base</text>
  </g>
  
  <g class="step" id="step5" data-narration="Native tools like AWS CloudWatch and Azure Monitor track metrics. SLA metrics include MTBF and RTO for disaster recovery planning and measuring service reliability standards.">
    <rect x="20" y="430" width="760" height="85" fill="#e3f2fd" rx="8"/>
    <text x="40" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Tools &amp; SLA Metrics</text>
    <rect x="40" y="464" width="220" height="32" fill="#1976d2" rx="4"/>
    <text x="150" y="480" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">AWS CloudWatch</text>
    <text x="150" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Monitoring</text>
    <rect x="270" y="464" width="220" height="32" fill="#1976d2" rx="4"/>
    <text x="380" y="480" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Azure Monitor</text>
    <text x="380" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Microsoft</text>
    <rect x="500" y="464" width="240" height="32" fill="#1976d2" rx="4"/>
    <text x="620" y="480" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">SLA Metrics</text>
    <text x="620" y="492" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">MTBF, RTO</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key formula: Availability equals uptime divided by total time times 100. For example, 99.9% SLA allows only 43.2 minutes of downtime per month for enterprise services.">
    <rect x="20" y="523" width="760" height="65" fill="#ffebee" rx="8"/>
    <text x="40" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Key Formulas</text>
    <rect x="40" y="557" width="340" height="26" fill="#f44336" rx="4"/>
    <text x="210" y="575" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Availability = (Uptime / Total) × 100</text>
    <rect x="400" y="557" width="340" height="26" fill="#f44336" rx="4"/>
    <text x="570" y="575" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">99.9% = 43.2 min/month</text>
  </g>
</svg>