<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="We begin our exploration of Virtualization and Cloud Computing, a transformative technology combination that is revolutionizing modern IT infrastructure worldwide today.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Virtualization and Cloud Computing</text>
  </g>
  
  <g class="step" id="step1" data-narration="Virtualization creates virtual versions of computing resources like servers and storage, enabling multiple VMs to run on one physical machine efficiently.">
    <rect x="20" y="60" width="760" h="95" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="40" y="82" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is Virtualization?</text>
    <rect x="40" y="92" width="180" height="50" fill="#e3f2fd" rx="4"/>
    <text x="130" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Hypervisor</text>
    <text x="130" y="126" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Software Layer</text>
    <path d="M170,117 L210,117" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="220" y="92" width="200" height="50" fill="#e8f5e9" rx="4"/>
    <text x="320" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Physical Machine</text>
    <text x="320" y="126" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Server Hardware</text>
    <path d="M420,117 L460,117" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="470" y="92" width="280" height="50" fill="#fff3e0" rx="4"/>
    <text x="610" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Virtual Machines</text>
    <text x="610" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">VM1 | VM2 | VM3 | VM4</text>
  </g>
  
  <g class="step" id="step2" data-narration="NIST defines cloud computing with five characteristics and three service models: IaaS provides infrastructure, PaaS offers platforms, and SaaS delivers software.">
    <rect x="20" y="165" width="760" h="100" fill="#ffffff" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="40" y="187" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">NIST Cloud Characteristics &amp; Service Models</text>
    <text x="40" y="205" font-family="Arial" font-size="10" fill="#666">5 Characteristics:</text>
    <text x="40" y="218" font-family="Arial" font-size="9" fill="#333">On-demand • Network Access • Pooling • Elasticity • Measured</text>
    <rect x="200" y="225" width="130" height="30" fill="#e3f2fd" rx="4"/>
    <text x="265" y="244" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">IaaS</text>
    <text x="265" y="252" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">EC2, AWS</text>
    <rect x="340" y="225" width="130" height="30" fill="#e8f5e9" rx="4"/>
    <text x="405" y="244" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">PaaS</text>
    <text x="405" y="252" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">App Engine</text>
    <rect x="480" y="225" width="130" height="30" fill="#fff3e0" rx="4"/>
    <text x="545" y="244" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">SaaS</text>
    <text x="545" y="252" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Salesforce</text>
    <rect x="620" y="225" width="140" height="30" fill="#f3e5f5" rx="4"/>
    <text x="690" y="244" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">4 Deployment</text>
    <text x="690" y="252" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Public, Private, Hybrid</text>
  </g>
  
  <g class="step" id="step3" data-narration="Hypervisors come in two types: Type 1 runs directly on hardware for enterprise use, while Type 2 runs on host operating systems for testing.">
    <rect x="20" y="275" width="760" h="95" fill="#ffffff" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="40" y="297" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Hypervisor Types &amp; Deployment Models</text>
    <rect x="40" y="312" width="160" height="45" fill="#e3f2fd" rx="4"/>
    <text x="120" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">Type 1: Bare-metal</text>
    <text x="120" y="342" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">VMware ESXi, Hyper-V</text>
    <rect x="210" y="312" width="160" height="45" fill="#e8f5e9" rx="4"/>
    <text x="290" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">Type 2: Hosted</text>
    <text x="290" y="342" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">VirtualBox, VMware WS</text>
    <rect x="400" y="312" width="160" height="45" fill="#fff3e0" rx="4"/>
    <text x="480" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Public Cloud</text>
    <text x="480" y="342" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">AWS, Azure, GCP</text>
    <rect x="570" y="312" width="100" height="45" fill="#f3e5f5" rx="4"/>
    <text x="620" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#7b1fa2">Private</text>
    <text x="620" y="342" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">OpenStack</text>
    <rect x="680" y="312" width="80" height="45" fill="#ffebee" rx="4"/>
    <text x="720" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#c62828">Hybrid</text>
    <text x="720" y="342" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Mix</text>
  </g>
  
  <g class="step" id="step4" data-narration="Containerization using Docker and Kubernetes offers lightweight alternatives to VMs, enabling faster deployment and better resource efficiency in cloud environments.">
    <rect x="20" y="380" width="760" h="95" fill="#ffffff" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="40" y="402" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Containerization &amp; Cloud Management</text>
    <rect x="40" y="417" width="200" height="50" fill="#f3e5f5" rx="4"/>
    <text x="140" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#7b1fa2">Containerization</text>
    <text x="140" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Docker • Kubernetes</text>
    <rect x="250" y="417" width="130" height="50" fill="#e3f2fd" rx="4"/>
    <text x="315" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">Load Balancing</text>
    <text x="315" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Distributes Traffic</text>
    <rect x="390" y="417" width="130" height="50" fill="#e8f5e9" rx="4"/>
    <text x="455" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">Auto-scaling</text>
    <text x="455" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Scales Resources</text>
    <rect x="530" y="417" width="130" height="50" fill="#fff3e0" rx="4"/>
    <text x="595" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">SLA</text>
    <text x="595" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Uptime Guarantees</text>
    <rect x="670" y="417" width="90" height="50" fill="#ffebee" rx="4"/>
    <text x="715" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#c62828">Security</text>
    <text x="715" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">IAM, Encryption</text>
  </g>
  
  <g class="step" id="step5" data-narration="For exams, remember the NIST 5-4-3 model, understand hypervisor differences, know IaaS/PaaS/SaaS examples clearly, and practice cloud cost calculation and architecture diagrams thoroughly.">
    <rect x="20" y="485" width="760" h="100" fill="#ffffff" stroke="#f44336" stroke-width="2" rx="8"/>
    <text x="40" y="507" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Exam Tips &amp; Cost Calculation</text>
    <text x="40" y="527" font-family="Arial" font-size="10" fill="#666">NIST 5-4-3 Model:</text>
    <text x="40" y="541" font-family="Arial" font-size="9" fill="#333">5 Characteristics • 4 Deployment Models • 3 Service Models</text>
    <rect x="40" y="550" width="340" height="25" fill="#e3f2fd" rx="4"/>
    <text x="210" y="567" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Cost Example: 10 t3.medium × $0.05/hr × 730hrs + 500GB S3 × $0.023 = $376.50/month</text>
    <rect x="400" y="520" width="180" height="55" fill="#fff3e0" rx="4"/>
    <text x="490" y="540" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Key Providers</text>
    <text x="490" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">AWS • Azure • GCP</text>
    <rect x="590" y="520" width="170" height="55" fill="#e8f5e9" rx="4"/>
    <text x="675" y="540" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">VM Creation Steps</text>
    <text x="675" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Install • Allocate Resources • Mount ISO • Configure Network</text>
  </g>
</svg>