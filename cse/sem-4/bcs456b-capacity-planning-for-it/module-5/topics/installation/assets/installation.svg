<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Software Installation. This topic covers the complete process of setting up applications, from manual setups to automated deployments.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Software Installation</text>
  </g>
  
  <g class="step" id="step1" data-narration="Installation types include manual setup by users running executables, silent automated installations using scripts and .msi packages, and network deployment across multiple systems using enterprise tools like SCCM.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Installation Types</text>
    <rect x="40" y="88" width="220" height="40" fill="#1976d2" rx="3"/>
    <text x="150" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Manual Installation</text>
    <text x="150" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">User-driven executables</text>
    <rect x="280" y="88" width="220" height="40" fill="#1976d2" rx="3"/>
    <text x="390" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Silent Installation</text>
    <text x="390" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Unattended .msi scripts</text>
    <rect x="520" y="88" width="220" height="40" fill="#1976d2" rx="3"/>
    <text x="630" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Network Installation</text>
    <text x="630" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">SCCM, Ansible deployment</text>
  </g>
  
  <g class="step" id="step2" data-narration="Dependency management handles shared libraries like DLLs in Windows and .so files in Linux, plus runtime environments and package managers.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Dependency Management</text>
    <rect x="40" y="176" width="170" height="40" fill="#388e3c" rx="3"/>
    <text x="125" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Shared Libraries</text>
    <text x="125" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">DLLs (Windows), .so (Linux)</text>
    <rect x="230" y="176" width="170" height="40" fill="#388e3c" rx="3"/>
    <text x="315" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Runtime Environments</text>
    <text x="315" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Java JRE, .NET Framework</text>
    <rect x="420" y="176" width="170" height="40" fill="#388e3c" rx="3"/>
    <text x="505" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Package Managers</text>
    <text x="505" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">apt-get, pip, npm</text>
    <rect x="610" y="176" width="150" height="40" fill="#f44336" rx="3"/>
    <text x="685" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="white">DLL Hell</text>
    <text x="685" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Common error to avoid</text>
  </g>
  
  <g class="step" id="step3" data-narration="Environment configuration involves setting system PATH variables for executables, Windows registry entries for application settings, configuration files for app preferences, and proper user permissions for security.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Environment Configuration</text>
    <rect x="40" y="264" width="170" height="40" fill="#ff9800" rx="3"/>
    <text x="125" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="white">PATH Variables</text>
    <text x="125" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">System executable directories</text>
    <rect x="230" y="264" width="170" height="40" fill="#ff9800" rx="3"/>
    <text x="315" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Registry Entries</text>
    <text x="315" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Windows system settings</text>
    <rect x="420" y="264" width="170" height="40" fill="#ff9800" rx="3"/>
    <text x="505" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Config Files</text>
    <text x="505" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">.env, .conf files</text>
    <rect x="610" y="264" width="150" height="40" fill="#ff9800" rx="3"/>
    <text x="685" y="283" text-anchor="middle" font-family="Arial" font-size="10" fill="white">User Permissions</text>
    <text x="685" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Access control setup</text>
  </g>
  
  <g class="step" id="step4" data-narration="Verification includes checksum validation using MD5 or SHA hashes to verify file integrity, smoke testing for basic functionality, and log file analysis for errors.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Verification &amp; Testing</text>
    <rect x="40" y="352" width="240" height="40" fill="#f44336" rx="3"/>
    <text x="160" y="371" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Checksum Validation</text>
    <text x="160" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">MD5 produces 128-bit hash</text>
    <rect x="300" y="352" width="200" height="40" fill="#f44336" rx="3"/>
    <text x="400" y="371" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Smoke Testing</text>
    <text x="400" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Post-install basic checks</text>
    <rect x="520" y="352" width="240" height="40" fill="#f44336" rx="3"/>
    <text x="640" y="371" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Log File Analysis</text>
    <text x="640" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">setupapi.log, /var/log</text>
  </g>
  
  <g class="step" id="step5" data-narration="Practical examples show Python on Windows with PATH configuration, LAMP stack installation on Ubuntu using apt, and Docker container deployment for modern deployment.">
    <rect x="20" y="410" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Practical Examples</text>
    <rect x="40" y="440" width="230" height="40" fill="#9c27b0" rx="3"/>
    <text x="155" y="459" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Python on Windows</text>
    <text x="155" y="472" text-anchor="middle" font-family="Courier" font-size="8" fill="#f3e5f5">python --version</text>
    <rect x="290" y="440" width="230" height="40" fill="#9c27b0" rx="3"/>
    <text x="405" y="459" text-anchor="middle" font-family="Arial" font-size="10" fill="white">LAMP Stack Ubuntu</text>
    <text x="405" y="472" text-anchor="middle" font-family="Courier" font-size="8" fill="#f3e5f5">sudo apt install apache2</text>
    <rect x="540" y="440" width="220" height="40" fill="#9c27b0" rx="3"/>
    <text x="650" y="459" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Docker Container</text>
    <text x="650" y="472" text-anchor="middle" font-family="Courier" font-size="8" fill="#f3e5f5">docker run -d -p 8080</text>
  </g>
  
  <g class="step" id="step6" data-narration="Exam tips: remember the installation sequence from pre-check to validation, know .msi versus .deb package differences, always mention checksum verification, and understand containerization advantages for deployment.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips &amp; Common Mistakes</text>
    <rect x="40" y="528" width="345" height="50" fill="#1976d2" rx="3"/>
    <text x="212" y="545" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Key Points to Remember</text>
    <text x="212" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Installation sequence: Pre-check → Dependencies</text>
    <text x="212" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">→ Install → Configure → Validate</text>
    <rect x="405" y="528" width="345" height="50" fill="#f44336" rx="3"/>
    <text x="577" y="545" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Common Mistakes to Avoid</text>
    <text x="577" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Skipping prerequisite checks, ignoring</text>
    <text x="577" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">dependency warnings, forgetting PATH setup</text>
  </g>
</svg>