<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Software Project Management Issues - Key challenges that cause IT project failures and how to address them effectively in modern software development environments.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Software Project Management Issues</text>
  </g>
  
  <!-- step1: Seven Key Issues -->
  <g class="step" id="step1" data-narration="Seven major issues affect software projects: Scope Creep, Resource Allocation, Technical Debt, Communication Breakdown, Risk Management, Requirement Ambiguity, and Time Estimation Errors.">
    <rect x="20" y="58" width="760" height="82" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Seven Key Project Management Issues</text>
    
    <rect x="40" y="90" width="100" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="90" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Scope Creep</text>
    <text x="90" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Uncontrolled growth</text>
    
    <rect x="150" y="90" width="100" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="200" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Resource Allocation</text>
    <text x="200" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Optimal distribution</text>
    
    <rect x="260" y="90" width="100" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="310" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Technical Debt</text>
    <text x="310" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Future costs</text>
    
    <rect x="370" y="90" width="100" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="420" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Communication</text>
    <text x="420" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Information gaps</text>
    
    <rect x="480" y="90" width="100" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="530" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Risk Management</text>
    <text x="530" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Failure to mitigate</text>
    
    <rect x="590" y="90" width="90" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="635" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Requirements</text>
    <text x="635" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Ambiguity issues</text>
    
    <rect x="690" y="90" width="70" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="725" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Time Estimation</text>
    <text x="725" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Missed deadlines</text>
  </g>
  
  <!-- step2: Scope Creep Example -->
  <g class="step" id="step2" data-narration="Scope Creep: Uncontrolled expansion of requirements without time or budget adjustments. Example shows an e-commerce project with client-requested feature additions.">
    <rect x="20" y="148" width="760" height="82" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Example 1: Scope Creep in E-Commerce</text>
    
    <rect x="40" y="182" width="230" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="155" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Problem</text>
    <text x="155" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Client adds features after requirements freeze</text>
    
    <path d="M280 202 L320 202" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="330" y="182" width="430" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="545" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Solutions</text>
    <text x="420" y="214" font-family="Arial" font-size="9" fill="#388e3c">1. Change control process</text>
    <text x="530" y="214" font-family="Arial" font-size="9" fill="#388e3c">2. Impact analysis</text>
    <text x="640" y="214" font-family="Arial" font-size="9" fill="#388e3c">3. Renegotiate timeline</text>
  </g>
  
  <!-- step3: Technical Debt Example -->
  <g class="step" id="step3" data-narration="Technical Debt: Accumulated shortcuts causing future maintenance costs that slow down development. Example shows legacy systems with quick fixes causing instability and reduced productivity over time.">
    <rect x="20" y="238" width="760" height="82" fill="#fff3e0" rx="8"/>
    <text x="40" y="258" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Example 2: Technical Debt in Legacy System</text>
    
    <rect x="40" y="272" width="230" height="40" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="4"/>
    <text x="155" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Problem</text>
    <text x="155" y="304" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Quick fixes causing system instability</text>
    
    <path d="M280 292 L320 292" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="330" y="272" width="430" height="40" fill="#ffe0b2" stroke="#ff9800" stroke-width="1" rx="4"/>
    <text x="545" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Solutions</text>
    <text x="380" y="304" font-family="Arial" font-size="9" fill="#ff9800">1. Code audit</text>
    <text x="470" y="304" font-family="Arial" font-size="9" fill="#ff9800">2. Refactoring</text>
    <text x="560" y="304" font-family="Arial" font-size="9" fill="#ff9800">3. 20% sprint time</text>
    <text x="660" y="304" font-family="Arial" font-size="9" fill="#ff9800">4. CI/CD pipeline</text>
  </g>
  
  <!-- step4: Communication Breakdown Example -->
  <g class="step" id="step4" data-narration="Communication Breakdown: Information gaps in distributed teams due to timezone differences causing missed deadlines, duplicate work, and coordination issues that derail project timelines.">
    <rect x="20" y="328" width="760" height="82" fill="#ffebee" rx="8"/>
    <text x="40" y="348" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example 3: Communication in Distributed Teams</text>
    
    <rect x="40" y="362" width="230" height="40" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="155" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Problem</text>
    <text x="155" y="394" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Timezone differences causing delays</text>
    
    <path d="M280 382 L320 382" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="330" y="362" width="430" height="40" fill="#ffcdd2" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="545" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Solutions</text>
    <text x="380" y="394" font-family="Arial" font-size="9" fill="#f44336">1. Overlap hours</text>
    <text x="480" y="394" font-family="Arial" font-size="9" fill="#f44336">2. Jira/Slack tools</text>
    <text x="590" y="394" font-family="Arial" font-size="9" fill="#f44336">3. Video standups</text>
    <text x="700" y="394" font-family="Arial" font-size="9" fill="#f44336">4. Central docs</text>
  </g>
  
  <!-- step5: Important Formulas -->
  <g class="step" id="step5" data-narration="Key formulas for project tracking: Earned Value metrics including Schedule Variance (SV=EV-PV) and Cost Variance (CV=EV-AC), Brooks Law stating that adding people to a late project delays it further, plus the COCOMO effort estimation model.">
    <rect x="20" y="418" width="760" height="82" fill="#f3e5f5" rx="8"/>
    <text x="40" y="438" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Key Formulas and Theorems</text>
    
    <rect x="40" y="452" width="180" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="130" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Schedule Variance</text>
    <text x="130" y="484" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">SV = EV - PV</text>
    
    <rect x="230" y="452" width="180" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="320" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Cost Variance</text>
    <text x="320" y="484" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">CV = EV - AC</text>
    
    <rect x="420" y="452" width="180" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="510" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Brooks Law</text>
    <text x="510" y="484" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Adding people delays</text>
    
    <rect x="610" y="452" width="150" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="685" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">COCOMO</text>
    <text x="685" y="484" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Effort = a x KLOC^b</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Exam preparation tips: Remember STCQ constraints which define project success, distinguish between risk as potential future event and issue as current problem, practice Earned Value Management calculations, and understand IEEE 1058 standards for documentation.">
    <rect x="20" y="508" width="760" height="72" fill="#e1f5fe" rx="8"/>
    <text x="40" y="528" font-family="Arial" font-size="13" font-weight="bold" fill="#0277bd">Exam Tips and Key Points</text>
    
    <text x="40" y="548" font-family="Arial" font-size="10" fill="#333">STCQ: Scope, Time, Cost, Quality (4 project constraints)</text>
    <text x="280" y="548" font-family="Arial" font-size="10" fill="#333">Risk equals potential, Issue equals current problem</text>
    <text x="520" y="548" font-family="Arial" font-size="10" fill="#333">IEEE 1058 PM standard is essential</text>
    
    <text x="40" y="568" font-family="Arial" font-size="10" fill="#333">68% projects fail due to poor requirements</text>
    <text x="280" y="568" font-family="Arial" font-size="10" fill="#333">Agile sprints handle changes better</text>
    <text x="520" y="568" font-family="Arial" font-size="10" fill="#333">Daily standups reduce communication gaps</text>
  </g>
</svg>