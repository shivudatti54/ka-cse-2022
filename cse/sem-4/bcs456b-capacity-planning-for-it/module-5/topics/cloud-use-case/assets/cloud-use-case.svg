<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Cloud computing enables on-demand resource access over the internet with pay-per-use pricing models, eliminating capital expenses and enabling rapid scaling across industries worldwide.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Cloud Computing Use Cases</text>
  </g>
  
  <!-- step1: Web Hosting and Auto Scaling -->
  <g class="step" id="step1" data-narration="Web hosting in the cloud leverages auto-scaling groups to handle variable traffic patterns dynamically, with AWS Auto Scaling automatically adding instances when CPU utilization exceeds the 70% threshold for optimal performance and cost efficiency.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="75" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">1. Web Hosting &amp; Auto Scaling</text>
    <rect x="70" y="85" width="140" height="40" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Traffic Spike</text>
    <path d="M215 105 L250 105" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="260" y="85" width="160" height="40" rx="3" fill="#1976d2"/>
    <text x="340" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="white">AWS Auto Scaling</text>
    <text x="340" y="113" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">70% CPU threshold</text>
    <path d="M425 105 L460 105" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="470" y="85" width="180" height="40" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="560" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Scale Out: Add Instance</text>
    <text x="560" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Cost: Pay per use</text>
  </g>
  
  <!-- step2: Big Data Analytics -->
  <g class="step" id="step2" data-narration="Big data analytics leverages cloud data warehouses like BigQuery, Redshift, and Synapse to perform petabyte-scale analysis with flexible pay-per-query pricing, enabling organizations to derive insights without managing expensive on-premise infrastructure.">
    <rect x="50" y="146" width="700" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="163" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">2. Big Data Analytics</text>
    <rect x="70" y="178" width="120" height="35" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="130" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Raw Data</text>
    <text x="130" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">TB/PB scale</text>
    <path d="M195 195 L230 195" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="240" y="175" width="130" height="40" rx="3" fill="#388e3c"/>
    <text x="305" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Cloud Data Warehouse</text>
    <text x="305" y="203" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Redshift, BigQuery, Synapse</text>
    <path d="M375 195 L410 195" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="420" y="178" width="150" height="35" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="495" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Analytics &amp; Insights</text>
    <text x="495" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">$5/TB on-demand</text>
    <rect x="580" y="178" width="160" height="35" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="660" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cost Savings</text>
    <text x="660" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">90% vs on-prem</text>
  </g>
  
  <!-- step3: Disaster Recovery -->
  <g class="step" id="step3" data-narration="Cloud disaster recovery delivers rapid business continuity with RTO in minutes and RPO in seconds through continuous asynchronous replication to secure cloud infrastructure, eliminating expensive duplicate data centers while ensuring data integrity and fast failover capabilities.">
    <rect x="50" y="234" width="700" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="70" y="251" font-family="Arial" font-size="12" fill="#f44336" font-weight="bold">3. Disaster Recovery (DR)</text>
    <rect x="70" y="265" width="180" height="35" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="160" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">On-Premises Data Center</text>
    <text x="160" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Primary Site</text>
    <path d="M255 282 L300 282" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M300 275 L300 289" stroke="#f44336" stroke-width="2"/>
    <path d="M300 265 L340 282" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/>
    <rect x="350" y="262" width="100" height="40" rx="3" fill="#f44336"/>
    <text x="400" y="277" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Continuous</text>
    <text x="400" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">Replication</text>
    <path d="M455 282 L500 282" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="510" y="265" width="170" height="35" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="595" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cloud DR Site</text>
    <text x="595" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Standby Instances</text>
    <rect x="510" y="302" width="170" height="10" rx="2" fill="#fff3e0"/>
    <text x="595" y="310" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">RTO: minutes | RPO: seconds</text>
  </g>
  
  <!-- step4: Machine Learning & AI -->
  <g class="step" id="step4" data-narration="Cloud machine learning services like AWS SageMaker and Google Vertex AI democratize artificial intelligence by providing fully managed environments for model training, automated hyperparameter tuning, one-click deployment, and pre-trained APIs for common use cases.">
    <rect x="50" y="322" width="700" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="70" y="339" font-family="Arial" font-size="12" fill="#9c27b0" font-weight="bold">4. Machine Learning &amp; AI</text>
    <rect x="70" y="355" width="130" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="135" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Training Data</text>
    <text x="135" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Images, Text, Sensor</text>
    <path d="M205 372 L250 372" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="260" y="350" width="140" height="40" rx="3" fill="#9c27b0"/>
    <text x="330" y="365" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Managed ML Platform</text>
    <text x="330" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">SageMaker, Vertex AI</text>
    <path d="M405 372 L450 372" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="460" y="355" width="130" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="525" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Model Training</text>
    <text x="525" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">GPU Clusters</text>
    <path d="M595 372 L640 372" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="650" y="355" width="90" height="35" rx="3" fill="#9c27b0"/>
    <text x="695" y="367" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Pre-trained</text>
    <text x="695" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">AI APIs</text>
  </g>
  
  <!-- step5: IoT Data Management -->
  <g class="step" id="step5" data-narration="IoT platforms in the cloud connect millions of sensors and devices securely using MQTT and HTTPS protocols, enabling real-time data ingestion and stream processing with IoT Core for predictive maintenance and operational efficiency.">
    <rect x="50" y="410" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="427" font-family="Arial" font-size="12" fill="#1976d2" font-weight="bold">5. IoT Data Management</text>
    <circle cx="100" cy="460" r="15" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="100" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Device</text>
    <text x="100" y="468" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">1M+</text>
    <circle cx="150" cy="460" r="15" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="150" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Device</text>
    <circle cx="200" cy="460" r="15" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="200" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Device</text>
    <text x="150" y="485" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Millions of IoT Sensors</text>
    <path d="M220 460 L280 460" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="290" y="440" width="120" height="40" rx="3" fill="#1976d2"/>
    <text x="350" y="455" text-anchor="middle" font-family="Arial" font-size="9" fill="white">IoT Core / Hub</text>
    <text x="350" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#e3f2fd">Device Registration &amp; Messaging</text>
    <path d="M420 460 L480 460" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="490" y="440" width="100" height="40" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="540" y="455" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Real-time</text>
    <text x="540" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Stream Processing</text>
    <path d="M600 460 L660 460" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="670" y="440" width="70" height="40" rx="3" fill="#388e3c"/>
    <text x="705" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Cloud</text>
    <text x="705" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Analytics</text>
  </g>
  
  <!-- step6: DevOps - IaC and CI/CD -->
  <g class="step" id="step6" data-narration="DevOps practices leverage Infrastructure as Code tools like Terraform and CloudFormation alongside CI/CD pipelines in services such as CodePipeline and CloudBuild to enable fully automated, version-controlled deployments with rapid feedback loops and consistent environments.">
    <rect x="50" y="498" width="700" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="515" font-family="Arial" font-size="12" fill="#388e3c" font-weight="bold">6. DevOps: IaC &amp; CI/CD</text>
    <rect x="70" y="530" width="80" height="45" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="110" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Code</text>
    <path d="M155 552 L185 552" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="190" y="527" width="80" height="50" rx="3" fill="#388e3c"/>
    <text x="230" y="542" text-anchor="middle" font-family="Arial" font-size="8" fill="white">CI/CD Pipeline</text>
    <text x="230" y="555" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Build, Test, Deploy</text>
    <text x="230" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">CodePipeline, CloudBuild</text>
    <path d="M275 552 L305 552" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="310" y="530" width="80" height="45" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="350" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">IaC Template</text>
    <text x="350" y="560" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">CloudFormation, Terraform</text>
    <path d="M395 552 L425 552" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="430" y="530" width="100" height="45" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="480" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cloud Provisioning</text>
    <text x="480" y="560" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Auto-create resources</text>
    <path d="M535 552 L565 552" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="570" y="530" width="90" height="45" rx="3" fill="#388e3c"/>
    <text x="615" y="545" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Production</text>
    <text x="615" y="560" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Auto-scaling enabled</text>
    <rect x="670" y="540" width="70" height="35" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="705" y="555" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Benefits</text>
    <text x="705" y="568" text-anchor="middle" font-family="Arial" font-size="7" fill="#ff9800">Version control</text>
  </g>
</svg>