<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Cloud Capacity Management. This topic covers essential techniques for optimizing computing resources while controlling costs in cloud environments.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Cloud Capacity Management</text>
  </g>
  
  <g class="step" id="step1" data-narration="Cloud Capacity Management ensures the right computing resources are available to meet application demands while optimizing costs through dynamic allocation and proactive planning.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Cloud Capacity Management?</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">Ensuring optimal computing resources to meet app demands while controlling costs.</text>
    <text x="40" y="118" font-family="Arial" font-size="10" fill="#333">Five key dimensions: CPU, RAM, Storage, Network Bandwidth, IOPS</text>
    <rect x="600" y="72" width="150" height="50" fill="#fff" stroke="#1976d2" rx="4"/>
    <text x="675" y="92" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Dynamic Resource</text>
    <text x="675" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Allocation</text>
    <text x="675" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Optimization</text>
  </g>
  
  <g class="step" id="step2" data-narration="Scalability means adding resources to handle growth in a planned proactive manner. Elasticity automatically scales resources up or down in real-time reactive response to demand changes.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Scalability vs Elasticity</text>
    <rect x="40" y="182" width="340" height="35" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="210" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">SCALABILITY</text>
    <text x="210" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Planned/proactive scaling</text>
    <rect x="420" y="182" width="340" height="35" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="590" y="198" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">ELASTICITY</text>
    <text x="590" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Automatic real-time scaling</text>
  </g>
  
  <g class="step" id="step3" data-narration="Cloud providers offer diverse pricing models: On-Demand for pay-per-use, Reserved for discounted long-term commitments, Spot for bid-based interruptible instances, and Dedicated Hosts for compliance.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Resource Provisioning Models</text>
    <rect x="40" y="270" width="165" height="36" fill="#fff" stroke="#ff9800" rx="4"/>
    <text x="122" y="286" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">On-Demand</text>
    <text x="122" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Pay-per-use</text>
    <rect x="215" y="270" width="165" height="36" fill="#fff" stroke="#ff9800" rx="4"/>
    <text x="297" y="286" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Reserved</text>
    <text x="297" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1-3 yr discounted</text>
    <rect x="390" y="270" width="165" height="36" fill="#fff" stroke="#ff9800" rx="4"/>
    <text x="472" y="286" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Spot</text>
    <text x="472" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Bid-based</text>
    <rect x="565" y="270" width="195" height="36" fill="#fff" stroke="#ff9800" rx="4"/>
    <text x="662" y="286" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Dedicated Host</text>
    <text x="662" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Physical server</text>
  </g>
  
  <g class="step" id="step4" data-narration="Auto-scaling automatically adjusts compute resources based on policies triggered by metrics like CPU utilization with cool-down periods to prevent oscillation and ensure stability.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Auto-Scaling Components</text>
    <rect x="40" y="358" width="140" height="36" fill="#fff" stroke="#9c27b0" rx="4"/>
    <text x="110" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Scaling Policies</text>
    <text x="110" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Rules for scale</text>
    <rect x="190" y="358" width="140" height="36" fill="#fff" stroke="#9c27b0" rx="4"/>
    <text x="260" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Metrics</text>
    <text x="260" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">CPU, Memory</text>
    <rect x="340" y="358" width="140" height="36" fill="#fff" stroke="#9c27b0" rx="4"/>
    <text x="410" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Cool-down</text>
    <text x="410" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Wait time</text>
    <rect x="490" y="358" width="140" height="36" fill="#fff" stroke="#9c27b0" rx="4"/>
    <text x="560" y="374" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Health Checks</text>
    <text x="560" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Instance health</text>
    <rect x="640" y="350" width="120" height="50" fill="#e1bee7" rx="4"/>
    <text x="700" y="368" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Scale Out</text>
    <text x="700" y="382" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CPU 70%+</text>
    <text x="700" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Scale In &lt;30%</text>
  </g>
  
  <g class="step" id="step5" data-narration="Example: With 10000 RPM required and 500 RPM capacity per instance, you need 20 base instances plus 6 headroom for 30% peak load, totaling 26 instances.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Load Balancing &amp; Calculation Example</text>
    <rect x="40" y="448" width="180" height="35" fill="#fff" stroke="#1976d2" rx="4"/>
    <text x="130" y="464" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Load Balancing</text>
    <text x="130" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Distributes traffic</text>
    <rect x="230" y="448" width="100" height="35" fill="#fff" stroke="#1976d2" rx="4"/>
    <text x="280" y="464" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Metrics</text>
    <text x="280" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CPU, RAM</text>
    <rect x="340" y="448" width="100" height="35" fill="#fff" stroke="#1976d2" rx="4"/>
    <text x="390" y="464" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Performance</text>
    <text x="390" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Latency</text>
    <rect x="450" y="448" width="310" height="35" fill="#fff3e0" stroke="#ff9800" rx="4"/>
    <text x="605" y="464" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Calculation</text>
    <text x="605" y="478" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">10K RPM ÷ 500 = 20 + 6 headroom = 26 instances</text>
  </g>
</svg>