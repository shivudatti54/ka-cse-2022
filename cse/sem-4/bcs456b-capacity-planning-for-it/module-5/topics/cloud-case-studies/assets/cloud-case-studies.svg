<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers real-world cloud computing case studies including Netflix migration to AWS, Spotify on Google Cloud Platform, Adobe's Azure transition, and government cloud initiatives worldwide.">
    <rect x="20" y="10" width="760" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" strokeWidth="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Cloud Computing Case Studies</text>
  </g>
  
  <!-- step1: Netflix Case Study -->
  <g class="step" id="step1" data-narration="Netflix migrated to AWS after a 2008 database failure. They moved from monolithic to microservices architecture using EC2, S3, DynamoDB, and Lambda services.">
    <rect x="20" y="58" width="760" height="85" rx="8" fill="#e8f5e9" stroke="#388e3c" strokeWidth="2"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">1. Netflix Migration to AWS</text>
    <rect x="40" y="88" width="180" height="45" rx="4" fill="#c8e6c9"/>
    <text x="130" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">2009-2015</text>
    <text x="130" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Full Migration</text>
    <rect x="230" y="88" width="200" height="45" rx="4" fill="#c8e6c9"/>
    <text x="330" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Services: EC2, S3</text>
    <text x="330" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">DynamoDB, Lambda</text>
    <rect x="440" y="88" width="200" height="45" rx="4" fill="#c8e6c9"/>
    <text x="540" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">200M+ Subscribers</text>
    <text x="540" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Global Scale</text>
    <text x="650" y="115" font-family="Arial" font-size="9" fill="#388e3c">Microservices Architecture</text>
  </g>
  
  <!-- step2: Spotify Case Study -->
  <g class="step" id="step2" data-narration="Spotify uses Google Cloud Platform with GKE for container orchestration. They run over 1,000 microservices using BigQuery, Pub/Sub, and Cloud Spanner.">
    <rect x="20" y="151" width="760" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" strokeWidth="2"/>
    <text x="40" y="171" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">2. Spotify on Google Cloud Platform</text>
    <rect x="40" y="181" width="160" height="45" rx="4" fill="#ffe0b2"/>
    <text x="120" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">500M+ Users</text>
    <text x="120" y="211" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Global Reach</text>
    <rect x="210" y="181" width="180" height="45" rx="4" fill="#ffe0b2"/>
    <text x="300" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">GKE</text>
    <text x="300" y="211" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Kubernetes Engine</text>
    <rect x="400" y="181" width="160" height="45" rx="4" fill="#ffe0b2"/>
    <text x="480" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">1,000+</text>
    <text x="480" y="211" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Microservices</text>
    <text x="570" y="195" font-family="Arial" font-size="9" fill="#e65100">BigQuery | Pub/Sub</text>
    <text x="570" y="210" font-family="Arial" font-size="9" fill="#e65100">Cloud Spanner</text>
  </g>
  
  <!-- step3: Adobe and Airbnb -->
  <g class="step" id="step3" data-narration="Adobe shifted from boxed software to Azure-based Creative Cloud subscription. Airbnb uses AWS with EC2, Lambda, and CloudFront for rapid scaling.">
    <rect x="20" y="244" width="760" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" strokeWidth="2"/>
    <text x="40" y="264" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">3. Adobe Azure &amp; Airbnb AWS</text>
    <rect x="40" y="274" width="140" height="45" rx="4" fill="#e1bee7"/>
    <text x="110" y="291" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Adobe</text>
    <text x="110" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Azure Cloud</text>
    <rect x="190" y="274" width="160" height="45" rx="4" fill="#e1bee7"/>
    <text x="270" y="291" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Creative Cloud</text>
    <text x="270" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Subscription Model</text>
    <rect x="360" y="274" width="140" height="45" rx="4" fill="#e1bee7"/>
    <text x="430" y="291" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Airbnb</text>
    <text x="430" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">AWS</text>
    <rect x="510" y="274" width="160" height="45" rx="4" fill="#e1bee7"/>
    <text x="590" y="291" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Auto Scaling</text>
    <text x="590" y="304" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">CloudFront CDN</text>
    <text x="680" y="290" font-family="Arial" font-size="9" fill="#7b1fa2">Rapid Startup</text>
    <text x="680" y="305" font-family="Arial" font-size="9" fill="#7b1fa2">Scaling</text>
  </g>
  
  <!-- step4: Government Cloud -->
  <g class="step" id="step4" data-narration="Government cloud initiatives include UK G-Cloud and Indian MeghRaj. They focus on security, data sovereignty, and cost optimization for public services.">
    <rect x="20" y="337" width="760" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" strokeWidth="2"/>
    <text x="40" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">4. Government Cloud Initiatives</text>
    <rect x="40" y="367" width="150" height="45" rx="4" fill="#bbdefb"/>
    <text x="115" y="384" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">UK G-Cloud</text>
    <text x="115" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Digital Marketplace</text>
    <rect x="200" y="367" width="150" height="45" rx="4" fill="#bbdefb"/>
    <text x="275" y="384" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">India MeghRaj</text>
    <text x="275" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">e-Gov Cloud</text>
    <rect x="360" y="367" width="120" height="45" rx="4" fill="#bbdefb"/>
    <text x="420" y="384" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">IaaS/PaaS/SaaS</text>
    <text x="420" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Classification</text>
    <rect x="490" y="367" width="130" height="45" rx="4" fill="#bbdefb"/>
    <text x="555" y="384" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1">Security</text>
    <text x="555" y="397" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Data Sovereignty</text>
    <text x="630" y="380" font-family="Arial" font-size="9" fill="#1565c0">Cost Optimization</text>
    <text x="630" y="395" font-family="Arial" font-size="9" fill="#1565c0">for Public Sector</text>
  </g>
  
  <!-- step5: Cost Optimization -->
  <g class="step" id="step5" data-narration="Netflix achieved 60% cost savings using Reserved Instances for steady workloads, Spot Instances for batch processing, and Auto Scaling for variable traffic.">
    <rect x="20" y="430" width="760" height="85" rx="8" fill="#ffebee" stroke="#f44336" strokeWidth="2"/>
    <text x="40" y="450" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. Cost Optimization Example</text>
    <text x="40" y="468" font-family="Arial" font-size="10" fill="#c62828">Netflix achieved ~60% cost savings on AWS</text>
    <rect x="40" y="475" width="200" height="32" rx="4" fill="#ffcdd2"/>
    <text x="140" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Reserved Instances</text>
    <text x="250" y="493" font-family="Arial" font-size="20" fill="#f44336">→</text>
    <rect x="270" y="475" width="180" height="32" rx="4" fill="#ffcdd2"/>
    <text x="360" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Spot Instances</text>
    <text x="460" y="493" font-family="Arial" font-size="20" fill="#f44336">→</text>
    <rect x="480" y="475" width="180" height="32" rx="4" fill="#ffcdd2"/>
    <text x="570" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">Savings Plans</text>
    <text x="670" y="490" font-family="Arial" font-size="11" font-weight="bold" fill="#d32f2f">60% Savings</text>
  </g>
  
  <!-- step6: Hybrid Cloud -->
  <g class="step" id="step6" data-narration="Hybrid cloud combines on-premises data for sensitive workloads with cloud services. Banking example: Direct Connect, VPN, and PrivateLink for secure connectivity.">
    <rect x="20" y="523" width="760" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" strokeWidth="2"/>
    <text x="40" y="543" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">6. Hybrid Cloud Architecture</text>
    <rect x="40" y="552" width="120" height="24" rx="4" fill="#c8e6c9"/>
    <text x="100" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">On-Premises</text>
    <text x="170" y="566" font-family="Arial" font-size="14" fill="#388e3c">↔</text>
    <rect x="190" y="552" width="120" height="24" rx="4" fill="#c8e6c9"/>
    <text x="250" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">Direct Connect</text>
    <text x="320" y="566" font-family="Arial" font-size="14" fill="#388e3c">↔</text>
    <rect x="340" y="552" width="120" height="24" rx="4" fill="#c8e6c9"/>
    <text x="400" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">AWS Cloud</text>
    <text x="470" y="566" font-family="Arial" font-size="14" fill="#388e3c">↔</text>
    <rect x="490" y="552" width="120" height="24" rx="4" fill="#c8e6c9"/>
    <text x="550" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">PrivateLink</text>
    <rect x="620" y="552" width="140" height="24" rx="4" fill="#c8e6c9"/>
    <text x="690" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">RTO: 4hrs, RPO: 15min</text>
  </g>
</svg>