<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the Anonymous Desktop Software Company case study. We'll explore organizational structure, SDLC, methodologies, version control, QA, and licensing.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Anonymous Desktop Software Company</text>
  </g>
  
  <g class="step" id="step1" data-narration="The company has a pyramid structure with product managers at top, followed by team leads, developers, testers, and support staff working cross-functionally.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Organizational Structure</text>
    <rect x="40" y="88" width="90" height="40" rx="4" fill="#1976d2"/>
    <text x="85" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Product Owner</text>
    <rect x="145" y="88" width="90" height="40" rx="4" fill="#1976d2"/>
    <text x="190" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Team Lead</text>
    <rect x="250" y="88" width="70" height="40" rx="4" fill="#42a5f5"/>
    <text x="285" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Dev</text>
    <rect x="335" y="88" width="70" height="40" rx="4" fill="#42a5f5"/>
    <text x="370" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="white">QA</text>
    <rect x="420" y="88" width="70" height="40" rx="4" fill="#42a5f5"/>
    <text x="455" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="white">UI/UX</text>
    <rect x="505" y="88" width="70" height="40" rx="4" fill="#90caf9"/>
    <text x="540" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Support</text>
    <rect x="590" y="88" width="70" height="40" rx="4" fill="#90caf9"/>
    <text x="625" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Docs</text>
    <text x="680" y="105" font-family="Arial" font-size="9" fill="#666">Cross-functional teams collaborate in Agile</text>
  </g>
  
  <g class="step" id="step2" data-narration="The SDLC includes requirements analysis, design, implementation, testing, deployment, and maintenance. Desktop apps need OS compatibility and system resource considerations.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Software Development Life Cycle</text>
    <rect x="40" y="178" width="105" height="40" rx="4" fill="#4caf50"/>
    <text x="92" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Requirements</text>
    <text x="92" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">OS, RAM, Storage</text>
    <line x1="145" y1="198" x2="155" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="160" y="178" width="105" height="40" rx="4" fill="#4caf50"/>
    <text x="212" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Design</text>
    <text x="212" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">UI, Architecture</text>
    <line x1="265" y1="198" x2="275" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="280" y="178" width="105" height="40" rx="4" fill="#4caf50"/>
    <text x="332" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Implementation</text>
    <text x="332" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Coding, Standards</text>
    <line x1="385" y1="198" x2="395" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="400" y="178" width="105" height="40" rx="4" fill="#4caf50"/>
    <text x="452" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Testing</text>
    <text x="452" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Unit, Integration</text>
    <line x1="505" y1="198" x2="515" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="520" y="178" width="105" height="40" rx="4" fill="#4caf50"/>
    <text x="572" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Deployment</text>
    <text x="572" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Installer, Updates</text>
    <line x1="625" y1="198" x2="635" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="640" y="178" width="105" height="40" rx="4" fill="#4caf50"/>
    <text x="692" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Maintenance</text>
    <text x="692" y="212" text-anchor="middle" font-family="Arial" font-size="7" fill="#e8f5e9">Patches, Updates</text>
  </g>
  
  <g class="step" id="step3" data-narration="Companies use Agile methods like Scrum with two-week sprints, daily standups, and retrospectives. Waterfall works for stable requirements in regulated industries.">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Development Methodologies</text>
    <rect x="40" y="268" width="180" height="38" rx="6" fill="#ff9800"/>
    <text x="130" y="282" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Agile - Scrum</text>
    <text x="130" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff3e0">Sprints, Standups, Retrospectives</text>
    <rect x="235" y="268" width="180" height="38" rx="6" fill="#ffb74d"/>
    <text x="325" y="282" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100" font-weight="bold">Agile - Kanban</text>
    <text x="325" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Continuous Flow, WIP Limits</text>
    <rect x="430" y="268" width="180" height="38" rx="6" fill="#ffcc80"/>
    <text x="520" y="282" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100" font-weight="bold">Waterfall</text>
    <text x="520" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Sequential, Well-defined Requirements</text>
    <text x="640" y="285" font-family="Arial" font-size="9" fill="#666">Hybrid approaches also common</text>
  </g>
  
  <g class="step" id="step4" data-narration="Git manages source code with branching strategies like GitFlow. CI/CD pipelines automate building, testing, and packaging for consistent, reliable releases across environments.">
    <rect x="20" y="322" width="760" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Version Control &amp; CI/CD</text>
    <rect x="40" y="356" width="130" height="38" rx="6" fill="#9c27b0"/>
    <text x="105" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Git Version Control</text>
    <text x="105" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">commit, push, pull, merge</text>
    <rect x="185" y="356" width="130" height="38" rx="6" fill="#ba68c8"/>
    <text x="250" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Branching Strategy</text>
    <text x="250" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">GitFlow, Trunk-based</text>
    <rect x="330" y="356" width="130" height="38" rx="6" fill="#ba68c8"/>
    <text x="395" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">CI Pipeline</text>
    <text x="395" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Build, Test Automation</text>
    <rect x="475" y="356" width="130" height="38" rx="6" fill="#ba68c8"/>
    <text x="540" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">CD Pipeline</text>
    <text x="540" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#f3e5f5">Package, Deploy, Release</text>
    <text x="630" y="375" font-family="Arial" font-size="9" fill="#666">Jira, Azure DevOps</text>
  </g>
  
  <g class="step" id="step5" data-narration="QA includes functional testing, performance benchmarks, cross-platform compatibility, security testing, and usability evaluation. Bugs are tracked through their complete lifecycle.">
    <rect x="20" y="410" width="760" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Quality Assurance Practices</text>
    <rect x="40" y="448" width="110" height="34" rx="5" fill="#ef5350"/>
    <text x="95" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Functional</text>
    <text x="95" y="475" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffebee">Feature verification</text>
    <rect x="165" y="448" width="110" height="34" rx="5" fill="#ef5350"/>
    <text x="220" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Performance</text>
    <text x="220" y="475" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffebee">Speed, Memory, CPU</text>
    <rect x="290" y="448" width="110" height="34" rx="5" fill="#ef5350"/>
    <text x="345" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Compatibility</text>
    <text x="345" y="475" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffebee">Windows, macOS, Linux</text>
    <rect x="415" y="448" width="110" height="34" rx="5" fill="#ef5350"/>
    <text x="470" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Security</text>
    <text x="470" y="475" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffebee">Vulnerability scanning</text>
    <rect x="540" y="448" width="110" height="34" rx="5" fill="#ef5350"/>
    <text x="595" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">Usability</text>
    <text x="595" y="475" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffebee">User experience</text>
    <text x="670" y="470" font-family="Arial" font-size="9" fill="#666">Bug tracking: Jira</text>
  </g>
  
  <g class="step" id="step6" data-narration="Software uses proprietary, freemium, subscription, or open-source licensing. Distribution is via direct download, retail, or OEM partnerships with hardware makers.">
    <rect x="20" y="498" width="760" height="90" rx="8" fill="#e1f5fe" stroke="#0288d1" stroke-width="2"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#0288d1">Licensing &amp; Distribution Models</text>
    <rect x="40" y="532" width="145" height="48" rx="6" fill="#0288d1"/>
    <text x="112" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Proprietary</text>
    <text x="112" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#e1f5fe">Single/Multi-user license</text>
    <text x="112" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#b3e5fc">One-time purchase</text>
    <rect x="200" y="532" width="145" height="48" rx="6" fill="#29b6f6"/>
    <text x="272" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Freemium</text>
    <text x="272" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#e1f5fe">Basic free, Premium paid</text>
    <text x="272" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#01579b">In-app purchases</text>
    <rect x="360" y="532" width="145" height="48" rx="6" fill="#29b6f6"/>
    <text x="432" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">Subscription</text>
    <text x="432" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#e1f5fe">Recurring payments</text>
    <text x="432" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#01579b">Monthly/Annual</text>
    <rect x="520" y="532" width="145" height="48" rx="6" fill="#4fc3f7"/>
    <text x="592" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="#01579b" font-weight="bold">Open Source</text>
    <text x="592" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#01579b">Source code available</text>
    <text x="592" y="574" text-anchor="middle" font-family="Arial" font-size="7" fill="#01579b">License terms apply</text>
    <text x="690" y="550" font-family="Arial" font-size="9" fill="#666">Distribution:</text>
    <text x="690" y="565" font-family="Arial" font-size="8" fill="#666">• Direct Download</text>
    <text x="690" y="580" font-family="Arial" font-size="8" fill="#666">• App Stores</text>
  </g>
</svg>