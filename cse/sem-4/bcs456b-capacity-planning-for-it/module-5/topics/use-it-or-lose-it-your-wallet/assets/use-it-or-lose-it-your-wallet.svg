<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Use It or Lose It - Your Wallet. This topic covers memory management principles in operating systems for computer science students learning about resource allocation.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Use It or Lose It - Your Wallet: Memory Management</text>
  </g>
  
  <g class="step" id="step1" data-narration="The use-it-or-lose-it principle means memory allocated but unused should be reclaimed by the system to prevent resource exhaustion in modern computer systems.">
    <rect x="10" y="58" width="780" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. The Use It or Lose It Principle</text>
    <text x="30" y="95" font-family="Arial" font-size="10" fill="#333">Memory that is allocated but not actively used should be reclaimed by the system.</text>
    <text x="30" y="110" font-family="Arial" font-size="10" fill="#333">Prevents resource exhaustion and ensures efficient system performance.</text>
    <rect x="550" y="78" width="200" height="50" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="650" y="98" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Core Idea</text>
    <text x="650" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Use memory or lose it</text>
  </g>
  
  <g class="step" id="step2" data-narration="Memory management involves controlling computer memory: physical RAM, virtual memory, pages, frames, and page tables to efficiently allocate and track system resources.">
    <rect x="10" y="151" width="780" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">2. Memory Management Fundamentals</text>
    <rect x="30" y="185" width="140" height="40" fill="#e3f2fd" rx="3"/>
    <text x="100" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Physical Memory</text>
    <text x="100" y="215" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Actual RAM chips</text>
    <rect x="180" y="185" width="140" height="40" fill="#fff3e0" rx="3"/>
    <text x="250" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Virtual Memory</text>
    <text x="250" y="215" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Process address space</text>
    <rect x="330" y="185" width="140" height="40" fill="#e8f5e9" rx="3"/>
    <text x="400" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Pages</text>
    <text x="400" y="215" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">4KB virtual blocks</text>
    <rect x="480" y="185" width="140" height="40" fill="#f3e5f5" rx="3"/>
    <text x="550" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Frames</text>
    <text x="550" y="215" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Physical blocks</text>
    <rect x="630" y="185" width="140" height="40" fill="#ffebee" rx="3"/>
    <text x="700" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Page Table</text>
    <text x="700" y="215" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">VA to PA mapping</text>
  </g>
  
  <g class="step" id="step3" data-narration="Page replacement algorithms like LRU and FIFO decide which pages to evict when memory is full, following use-it-or-lose-it principles for optimal system performance.">
    <rect x="10" y="244" width="780" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">3. Page Replacement Algorithms</text>
    <rect x="30" y="278" width="220" height="42" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="140" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">LRU (Least Recently Used)</text>
    <text x="140" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Evicts least recently used pages</text>
    <rect x="260" y="278" width="220" height="42" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="370" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">FIFO (First In First Out)</text>
    <text x="370" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Evicts oldest page in memory</text>
    <rect x="490" y="278" width="220" height="42" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="600" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Optimal</text>
    <text x="600" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Evicts page used furthest in future</text>
  </g>
  
  <g class="step" id="step4" data-narration="Virtual memory implements use-it-or-lose-it through demand paging, loading pages only when needed and swapping out unused ones to optimize system performance and resource utilization.">
    <rect x="10" y="337" width="780" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">4. Virtual Memory &amp; Demand Paging</text>
    <rect x="30" y="372" width="300" height="40" fill="#e3f2fd" rx="3"/>
    <text x="180" y="387" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Demand Paging</text>
    <text x="180" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Pages loaded only when first accessed</text>
    <rect x="340" y="372" width="220" height="40" fill="#e8f5e9" rx="3"/>
    <text x="450" y="387" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Working Set</text>
    <text x="450" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Pages currently actively used</text>
    <rect x="570" y="372" width="200" height="40" fill="#ffebee" rx="3"/>
    <text x="670" y="387" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Thrashing</text>
    <text x="670" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Excessive swapping degrades performance</text>
  </g>
  
  <g class="step" id="step5" data-narration="Programming languages implement use-it-or-lose-it through garbage collection, smart pointers, and RAII for automatic memory management to prevent leaks and ensure efficient resource usage.">
    <rect x="10" y="430" width="780" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">5. Resource Management in Programming</text>
    <rect x="30" y="465" width="230" height="35" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="145" y="480" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Garbage Collection</text>
    <text x="145" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Java, Python, C# - automatic</text>
    <rect x="270" y="465" width="230" height="35" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="385" y="480" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Smart Pointers</text>
    <text x="385" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">C++ unique_ptr, shared_ptr</text>
    <rect x="510" y="465" width="230" height="35" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="625" y="480" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">RAII</text>
    <text x="625" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Resources acquired in constructors</text>
  </g>
  
  <g class="step" id="step6" data-narration="The wallet analogy: your wallet has limited space, keep frequently used items accessible, remove unused items to make room for new ones in your physical memory.">
    <rect x="10" y="518" width="780" height="65" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="30" y="538" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Wallet Analogy &amp; Key Takeaways</text>
    <rect x="30" y="552" width="500" height="22" fill="#fff3e0" rx="3"/>
    <text x="280" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Wallet = Physical Memory | Hot pages = frequently used items | Cold pages = items to remove</text>
    <rect x="540" y="552" width="230" height="22" fill="#e8f5e9" rx="3"/>
    <text x="655" y="565" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Belady's Anomaly: FIFO can increase faults with more frames</text>
  </g>
</svg>