<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Cloud Computing is a paradigm shift in IT, providing on-demand computing resources over the internet through shared pools of configurable resources.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white">CLOUD COMPUTING</text>
  </g>
  
  <g class="step" id="step1" data-narration="NIST defines cloud computing with five essential characteristics: on-demand self-service, broad network access, resource pooling, rapid elasticity, and measured service.">
    <rect x="20" y="58" width="760" height="85" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">NIST Five Characteristics</text>
    <rect x="40" y="88" width="135" height="45" fill="#1976d2" rx="4"/>
    <text x="108" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="white">On-Demand</text>
    <text x="108" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Self-Service</text>
    <rect x="185" y="88" width="135" height="45" fill="#1976d2" rx="4"/>
    <text x="253" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Broad Network</text>
    <text x="253" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Access</text>
    <rect x="330" y="88" width="135" height="45" fill="#1976d2" rx="4"/>
    <text x="398" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Resource</text>
    <text x="398" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Pooling</text>
    <rect x="475" y="88" width="135" height="45" fill="#1976d2" rx="4"/>
    <text x="543" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Rapid</text>
    <text x="543" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Elasticity</text>
    <rect x="620" y="88" width="135" height="45" fill="#1976d2" rx="4"/>
    <text x="688" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Measured</text>
    <text x="688" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Service</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three service models exist: IaaS provides infrastructure (EC2), PaaS provides platforms (App Engine), and SaaS provides complete software (Office 365).">
    <rect x="20" y="151" width="760" height="85" fill="#e8f5e9" rx="8"/>
    <text x="40" y="171" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Cloud Service Models</text>
    <rect x="40" y="185" width="230" height="42" fill="#4caf50" rx="4"/>
    <text x="155" y="202" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">IaaS</text>
    <text x="155" y="216" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Infrastructure as a Service</text>
    <text x="155" y="228" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Ex: AWS EC2, Azure VMs</text>
    <rect x="285" y="185" width="230" height="42" fill="#4caf50" rx="4"/>
    <text x="400" y="202" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">PaaS</text>
    <text x="400" y="216" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Platform as a Service</text>
    <text x="400" y="228" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Ex: Google App Engine</text>
    <rect x="530" y="185" width="230" height="42" fill="#4caf50" rx="4"/>
    <text x="645" y="202" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">SaaS</text>
    <text x="645" y="216" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Software as a Service</text>
    <text x="645" y="228" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Ex: Microsoft Office 365</text>
  </g>
  
  <g class="step" id="step3" data-narration="Four deployment models: Public cloud for general use, Private cloud for single organizations, Hybrid combines both, and Community cloud for shared concerns.">
    <rect x="20" y="244" width="760" height="85" fill="#fff3e0" rx="8"/>
    <text x="40" y="264" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Cloud Deployment Models</text>
    <rect x="40" y="278" width="175" height="42" fill="#ff9800" rx="4"/>
    <text x="128" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Public Cloud</text>
    <text x="128" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="white">AWS, Azure, GCP</text>
    <rect x="225" y="278" width="175" height="42" fill="#ff9800" rx="4"/>
    <text x="313" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Private Cloud</text>
    <text x="313" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="white">On-premises</text>
    <rect x="410" y="278" width="175" height="42" fill="#ff9800" rx="4"/>
    <text x="498" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Hybrid Cloud</text>
    <text x="498" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Public + Private</text>
    <rect x="595" y="278" width="175" height="42" fill="#ff9800" rx="4"/>
    <text x="683" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Community Cloud</text>
    <text x="683" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Shared organizations</text>
  </g>
  
  <g class="step" id="step4" data-narration="Virtualization is the foundation of cloud computing, enabling multiple virtual machines on one physical server with isolation, live migration, and dynamic allocation.">
    <rect x="20" y="337" width="760" height="85" fill="#f3e5f5" rx="8"/>
    <text x="40" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Virtualization in Cloud</text>
    <rect x="40" y="370" width="700" height="42" fill="#ce93d8" rx="4"/>
    <text x="390" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Hypervisors (VMware ESXi, Hyper-V, KVM) create virtual machines</text>
    <text x="390" y="402" text-anchor="middle" font-family="Arial" font-size="10" fill="white">enabling hardware abstraction, resource isolation, live migration, and snapshots.</text>
    <rect x="40" y="375" width="20" height="32" fill="#9c27b0" rx="2"/>
    <text x="50" y="395" font-family="Arial" font-size="16" fill="white">▶</text>
  </g>
  
  <g class="step" id="step5" data-narration="Cloud security follows a shared responsibility model where providers secure infrastructure, physical servers, and networks while consumers protect data, access management, applications, and user identities.">
    <rect x="20" y="430" width="760" height="85" fill="#ffebee" rx="8"/>
    <text x="40" y="450" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Cloud Security - Shared Responsibility</text>
    <rect x="40" y="465" width="340" height="42" fill="#ef9a9a" rx="4"/>
    <text x="210" y="482" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Provider Responsibilities</text>
    <text x="210" y="496" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Physical security, network security, infrastructure, encryption at rest</text>
    <rect x="400" y="465" width="340" height="42" fill="#ef9a9a" rx="4"/>
    <text x="570" y="482" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Consumer Responsibilities</text>
    <text x="570" y="496" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Data classification, IAM, access control, application security</text>
  </g>
  
  <g class="step" id="step6" data-narration="Cloud computing transforms CapEx to OpEx, offering scalability, elasticity, and cost optimization. Auto-scaling can reduce costs by matching resources to demand.">
    <rect x="20" y="523" width="760" height="57" fill="#e1f5fe" rx="8"/>
    <text x="40" y="543" font-family="Arial" font-size="13" font-weight="bold" fill="#0277bd">Benefits &amp; Cost Example</text>
    <rect x="200" y="550" width="180" height="22" fill="#0277bd" rx="4"/>
    <text x="290" y="565" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Traditional: $7,200/mo</text>
    <rect x="420" y="550" width="180" height="22" fill="#4caf50" rx="4"/>
    <text x="510" y="565" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Cloud Elastic: $3,600/mo</text>
    <text x="620" y="560" font-family="Arial" font-size="9" fill="#0277bd">50% savings!</text>
  </g>
</svg>