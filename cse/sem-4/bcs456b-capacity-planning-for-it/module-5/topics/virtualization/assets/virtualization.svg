<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Virtualization - the fundamental technology that creates virtual versions of physical computing resources like servers, storage, and networks for efficient cloud computing.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#1976d2">VIRTUALIZATION</text>
  </g>
  
  <!-- Step 1: What is Virtualization -->
  <g class="step" id="step1" data-narration="Virtualization abstracts physical hardware resources, allowing multiple operating systems to run simultaneously on a single physical machine, greatly improving resource utilization and cost efficiency.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">What is Virtualization?</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#2e7d32">Technology that creates virtual versions of hardware resources like servers, storage, and networks.</text>
    <text x="40" y="118" font-family="Arial" font-size="10" fill="#2e7d32">Enables multiple OS to run concurrently on one physical machine, improving resource utilization.</text>
    <rect x="600" y="68" width="160" height="60" fill="#c8e6c9" rx="5"/>
    <text x="680" y="95" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Host Machine</text>
    <text x="680" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Physical Hardware</text>
  </g>
  
  <!-- Step 2: Hypervisor Types -->
  <g class="step" id="step2" data-narration="Hypervisors manage VMs. Type 1 runs directly on hardware (bare-metal), while Type 2 runs on top of an operating system.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Hypervisor Types (VMM)</text>
    <rect x="40" y="180" width="340" height="36" fill="#ffe0b2" rx="5"/>
    <text x="210" y="198" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Type 1: Bare-metal</text>
    <text x="210" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">VMware ESXi, Hyper-V</text>
    <rect x="400" y="180" width="340" height="36" fill="#ffe0b2" rx="5"/>
    <text x="570" y="198" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Type 2: Hosted</text>
    <text x="570" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">VirtualBox, VMware Workstation</text>
    <line x1="210" y1="155" x2="210" y2="180" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="570" y1="155" x2="570" y2="180" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Step 3: VM Components -->
  <g class="step" id="step3" data-narration="A Virtual Machine contains virtual CPU, memory, storage, and network interface components - all managed efficiently by the hypervisor for complete isolation and resource control.">
    <rect x="20" y="234" width="760" height="88" fill="#e3f2fd" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Virtual Machine Components</text>
    <rect x="40" y="270" width="160" height="35" fill="#bbdefb" rx="4"/>
    <text x="120" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">vCPU</text>
    <rect x="210" y="270" width="160" height="35" fill="#bbdefb" rx="4"/>
    <text x="290" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">vRAM</text>
    <rect x="380" y="270" width="160" height="35" fill="#bbdefb" rx="4"/>
    <text x="460" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">vStorage</text>
    <rect x="550" y="270" width="160" height="35" fill="#bbdefb" rx="4"/>
    <text x="630" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">vNIC</text>
    <text x="120" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Virtual CPU cores</text>
    <text x="290" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Virtual memory</text>
    <text x="460" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Virtual disk space</text>
    <text x="630" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Virtual network card</text>
  </g>
  
  <!-- Step 4: Virtualization Approaches -->
  <g class="step" id="step4" data-narration="Three main approaches exist in virtualization technology: Full virtualization simulates all hardware components, paravirtualization uses a modified OS, and containerization shares the host kernel for lightweight deployment.">
    <rect x="20" y="330" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="352" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Virtualization Approaches</text>
    <rect x="40" y="366" width="230" height="35" fill="#e1bee7" rx="4"/>
    <text x="155" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Full Virtualization</text>
    <text x="155" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Complete hardware simulation</text>
    <rect x="285" y="366" width="230" height="35" fill="#e1bee7" rx="4"/>
    <text x="400" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Paravirtualization</text>
    <text x="400" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Modified OS cooperates with hypervisor</text>
    <rect x="530" y="366" width="230" height="35" fill="#e1bee7" rx="4"/>
    <text x="645" y="383" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Containerization</text>
    <text x="645" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Lightweight, shares host kernel</text>
  </g>
  
  <!-- Step 5: Live Migration -->
  <g class="step" id="step5" data-narration="Live migration moves running VMs between physical hosts without downtime using memory transfer techniques and seamless network rerouting for uninterrupted service delivery.">
    <rect x="20" y="418" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="440" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Live Migration Process</text>
    <rect x="40" y="456" width="130" height="35" fill="#ffcdd2" rx="4"/>
    <text x="105" y="473" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">1. Pre-copy</text>
    <text x="105" y="486" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Memory transfer</text>
    <rect x="180" y="456" width="130" height="35" fill="#ffcdd2" rx="4"/>
    <text x="245" y="473" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">2. Stop &amp; Copy</text>
    <text x="245" y="486" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Final state transfer</text>
    <rect x="320" y="456" width="130" height="35" fill="#ffcdd2" rx="4"/>
    <text x="385" y="473" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">3. Resume</text>
    <text x="385" y="486" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">VM runs on new host</text>
    <rect x="460" y="456" width="130" height="35" fill="#ffcdd2" rx="4"/>
    <text x="525" y="473" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">4. Cleanup</text>
    <text x="525" y="486" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Remove source VM</text>
    <rect x="600" y="456" width="160" height="35" fill="#ef9a9a" rx="4"/>
    <text x="680" y="473" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">Use Cases</text>
    <text x="680" y="486" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">Load balancing, maintenance</text>
  </g>
  
  <!-- Step 6: Server Consolidation Example -->
  <g class="step" id="step6" data-narration="Server consolidation uses virtualization to run multiple VMs on one physical server, reducing hardware costs and power consumption while improving overall resource efficiency and utilization.">
    <rect x="20" y="506" width="760" height="94" fill="#e8f5e9" rx="8"/>
    <text x="40" y="530" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Server Consolidation Example</text>
    <rect x="40" y="543" width="150" height="40" fill="#c8e6c9" rx="4"/>
    <text x="115" y="558" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Host Server</text>
    <text x="115" y="571" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">16 cores, 64GB RAM</text>
    <path d="M 195 563 L 265 563" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="275" y="538" width="100" height="30" fill="#a5d6a7" rx="3"/>
    <text x="325" y="556" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Web VM</text>
    <text x="325" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">4 cores, 8GB</text>
    <rect x="385" y="538" width="100" height="30" fill="#a5d6a7" rx="3"/>
    <text x="435" y="556" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">DB VM</text>
    <text x="435" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">4 cores, 16GB</text>
    <rect x="495" y="538" width="100" height="30" fill="#a5d6a7" rx="3"/>
    <text x="545" y="556" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">App VM</text>
    <text x="545" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">4 cores, 8GB</text>
    <rect x="605" y="538" width="100" height="30" fill="#a5d6a7" rx="3"/>
    <text x="655" y="556" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Backup VM</text>
    <text x="655" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">4 cores, 32GB</text>
    <text x="40" y="593" font-family="Arial" font-size="9" fill="#2e7d32">Total: 16 cores allocated, 64GB RAM used. Hypervisor manages resource allocation and isolation.</text>
  </g>
</svg>