<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Computing resource evolution spans from 1940s mainframes to modern cloud and edge computing, transforming how we access and utilize computational power.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Computing Resource Evolutions</text>
  </g>
  
  <!-- Step 1: Processing Resources Evolution -->
  <g class="step" id="step1" data-narration="Processors evolved from ENIAC's 18,000 vacuum tubes to modern multi-core CPUs with billions of transistors, following Moore's Law and architectural innovations.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Processing Evolution</text>
    <rect x="40" y="88" width="100" height="40" fill="#e3f2fd" rx="3"/>
    <text x="90" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Vacuum Tubes</text>
    <text x="90" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1940s-50s</text>
    <line x1="140" y1="108" x2="160" y2="108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="170" y="88" width="100" height="40" fill="#e8f5e9" rx="3"/>
    <text x="220" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Transistors</text>
    <text x="220" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1950s-60s</text>
    <line x1="270" y1="108" x2="290" y2="108" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="300" y="88" width="100" height="40" fill="#fff3e0" rx="3"/>
    <text x="350" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Integrated Circuits</text>
    <text x="350" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1960s-70s</text>
    <line x1="400" y1="108" x2="420" y2="108" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="430" y="88" width="100" height="40" fill="#f3e5f5" rx="3"/>
    <text x="480" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Microprocessors</text>
    <text x="480" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1970s-Present</text>
    <line x1="530" y1="108" x2="550" y2="108" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="560" y="88" width="100" height="40" fill="#ffebee" rx="3"/>
    <text x="610" y="107" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Multi-Core CPUs</text>
    <text x="610" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2000s-Present</text>
    <text x="680" y="118" font-family="Arial" font-size="8" fill="#666">Billion+ transistors</text>
  </g>
  
  <!-- Step 2: Memory Hierarchy Evolution -->
  <g class="step" id="step2" data-narration="Memory evolved from magnetic core to DRAM, with cache hierarchies (L1/L2/L3) and storage advancing from HDDs to SSDs and NVMe drives.">
    <rect x="20" y="146" width="760" height="86" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Memory Hierarchy</text>
    <rect x="40" y="180" width="90" height="35" fill="#e3f2fd" rx="3"/>
    <text x="85" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">L1/L2/L3 Cache</text>
    <text x="85" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">0.8-8 ns</text>
    <line x1="130" y1="197" x2="145" y2="197" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="150" y="180" width="90" height="35" fill="#e8f5e9" rx="3"/>
    <text x="195" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">DDR5 RAM</text>
    <text x="195" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">20 ns, 64GB</text>
    <line x1="240" y1="197" x2="255" y2="197" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="260" y="180" width="90" height="35" fill="#fff3e0" rx="3"/>
    <text x="305" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">NVMe SSD</text>
    <text x="305" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">10 μs, 7 GB/s</text>
    <line x1="350" y1="197" x2="365" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="370" y="180" width="90" height="35" fill="#f3e5f5" rx="3"/>
    <text x="415" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">HDD</text>
    <text x="415" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2-10 ms, TB</text>
    <text x="40" y="230" font-family="Arial" font-size="8" fill="#666">← Faster, Smaller | Slower, Larger →</text>
    <rect x="500" y="180" width="260" height="35" fill="#f8f9fa" rx="3" stroke="#ddd"/>
    <text x="630" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cache Evolution</text>
    <text x="630" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Multi-level (L1/L2/L3), 3D-stacked</text>
  </g>
  
  <!-- Step 3: Network Evolution -->
  <g class="step" id="step3" data-narration="Networks evolved from ARPANET to modern 5G, with Ethernet advancing from 10 Mbps to 100+ Gbps and wireless standards delivering multi-gigabit speeds.">
    <rect x="20" y="240" width="760" height="74" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="260" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Network Evolution</text>
    <rect x="40" y="274" width="130" height="30" fill="#e3f2fd" rx="3"/>
    <text x="105" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">ARPANET (1969)</text>
    <text x="105" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Packet Switching</text>
    <line x1="170" y1="289" x2="185" y2="289" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="190" y="274" width="130" height="30" fill="#e8f5e9" rx="3"/>
    <text x="255" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Ethernet</text>
    <text x="255" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">10 Mbps → 100+ Gbps</text>
    <line x1="320" y1="289" x2="335" y2="289" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="340" y="274" width="130" height="30" fill="#fff3e0" rx="3"/>
    <text x="405" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Wi-Fi Standards</text>
    <text x="405" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">802.11 → Wi-Fi 6E/7</text>
    <line x1="470" y1="289" x2="485" y2="289" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="490" y="274" width="130" height="30" fill="#f3e5f5" rx="3"/>
    <text x="555" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">5G Cellular</text>
    <text x="555" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">&lt;10ms Latency</text>
    <line x1="620" y1="289" x2="635" y2="289" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="640" y="274" width="120" height="30" fill="#ffebee" rx="3"/>
    <text x="700" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Fiber Optic</text>
    <text x="700" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Terabit speeds</text>
  </g>
  
  <!-- Step 4: Cloud Computing Evolution -->
  <g class="step" id="step4" data-narration="Cloud computing evolved from mainframe time-sharing through utility computing to modern IaaS, PaaS, and SaaS models offering 200+ cloud services.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Cloud Computing Evolution</text>
    <rect x="40" y="356" width="110" height="36" fill="#e3f2fd" rx="3"/>
    <text x="95" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Mainframe Time-Sharing</text>
    <text x="95" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1960s-70s</text>
    <line x1="150" y1="374" x2="165" y2="374" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="170" y="356" width="110" height="36" fill="#e8f5e9" rx="3"/>
    <text x="225" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Client-Server</text>
    <text x="225" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1980s-90s</text>
    <line x1="280" y1="374" x2="295" y2="374" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="300" y="356" width="110" height="36" fill="#fff3e0" rx="3"/>
    <text x="355" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Utility Computing</text>
    <text x="355" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1990s-2000s</text>
    <line x1="410" y1="374" x2="425" y2="374" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="430" y="356" width="110" height="36" fill="#f3e5f5" rx="3"/>
    <text x="485" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Cloud IaaS/PaaS</text>
    <text x="485" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2006+ (AWS)</text>
    <line x1="540" y1="374" x2="555" y2="374" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="560" y="356" width="180" height="36" fill="#ffebee" rx="3"/>
    <text x="650" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Modern Multi-Cloud</text>
    <text x="650" y="384" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">200+ Services, Edge Hybrid</text>
  </g>
  
  <!-- Step 5: Virtualization vs Containerization -->
  <g class="step" id="step5" data-narration="Virtualization runs multiple VMs with separate OS, while containers share the host OS kernel, offering faster startup and efficient resource utilization.">
    <rect x="20" y="410" width="760" height="114" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Virtualization vs Containerization</text>
    <rect x="40" y="448" width="340" height="30" fill="#e3f2fd" rx="3"/>
    <text x="210" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Virtualization (VM)</text>
    <text x="210" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Multiple guest OS, VMware 1999</text>
    <rect x="420" y="448" width="340" height="30" fill="#e8f5e9" rx="3"/>
    <text x="590" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Containerization</text>
    <text x="590" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Shared kernel, Docker 2013</text>
    <rect x="40" y="488" width="220" height="26" fill="#fff3e0" rx="3"/>
    <text x="150" y="503" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">VM: Minutes startup</text>
    <text x="150" y="512" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Full isolation</text>
    <rect x="270" y="488" width="220" height="26" fill="#fff3e0" rx="3"/>
    <text x="380" y="503" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Container: Seconds startup</text>
    <text x="380" y="512" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Lightweight</text>
    <rect x="500" y="488" width="270" height="26" fill="#f3e5f5" rx="3"/>
    <text x="635" y="503" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Use Cases: VM=Legacy | Container=CI/CD</text>
  </g>
  
  <!-- Step 6: Edge Computing Evolution -->
  <g class="step" id="step6" data-narration="Edge computing brings computation closer to data sources, forming an edge-cloud continuum from IoT devices to centralized data centers for latency-sensitive applications.">
    <rect x="20" y="532" width="760" height="60" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="552" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Edge Computing: IoT → Gateways → Regional DC → Cloud DC</text>
    <rect x="40" y="562" width="130" height="24" fill="#ffebee" rx="3"/>
    <text x="105" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">IoT Devices</text>
    <text x="105" y="583" text-anchor="middle" font-family="Arial" font-size="7" fill="#999">Ultra-edge</text>
    <line x1="170" y1="574" x2="185" y2="574" stroke="#f44336" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="190" y="562" width="130" height="24" fill="#f3e5f5" rx="3"/>
    <text x="255" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">Edge Gateways</text>
    <text x="255" y="583" text-anchor="middle" font-family="Arial" font-size="7" fill="#999">Near-edge</text>
    <line x1="320" y1="574" x2="335" y2="574" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="340" y="562" width="130" height="24" fill="#fff3e0" rx="3"/>
    <text x="405" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">Regional DC</text>
    <text x="405" y="583" text-anchor="middle" font-family="Arial" font-size="7" fill="#999">Mid-edge</text>
    <line x1="470" y1="574" x2="485" y2="574" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="490" y="562" width="130" height="24" fill="#e8f5e9" rx="3"/>
    <text x="555" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Cloud DC</text>
    <text x="555" y="583" text-anchor="middle" font-family="Arial" font-size="7" fill="#999">Core</text>
    <text x="640" y="575" font-family="Arial" font-size="8" fill="#333">Edge-Cloud Continuum</text>
  </g>
</svg>