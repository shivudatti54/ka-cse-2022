<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Deployment is the critical SDLC phase that makes software available in production environments, evolving from manual processes to automated DevOps practices.">
    <rect x="0" y="0" width="800" height="48" fill="#1976d2" rx="0"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Deployment in Software Engineering</text>
  </g>
  
  <g class="step" id="step1" data-narration="The deployment process flows through four main phases: Build Creation packages code into deployable artifacts like JAR files or Docker images.">
    <rect x="20" y="56" width="760" height="82" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Deployment Process Overview</text>
    <rect x="40" y="88" width="140" height="40" fill="#1976d2" rx="3"/>
    <text x="110" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Build Creation</text>
    <path d="M185 108 L205 108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="210" y="88" width="140" height="40" fill="#1976d2" rx="3"/>
    <text x="280" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Configuration</text>
    <path d="M355 108 L375 108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="380" y="88" width="140" height="40" fill="#1976d2" rx="3"/>
    <text x="450" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Installation</text>
    <path d="M525 108 L545 108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="550" y="88" width="140" height="40" fill="#1976d2" rx="3"/>
    <text x="620" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Verification</text>
  </g>
  
  <g class="step" id="step2" data-narration="Software progresses through multiple environments: Development for coding, Testing for QA, Staging for final validation, UAT for users, and Production for end-users.">
    <rect x="20" y="145" width="760" height="82" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="164" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Deployment Environments</text>
    <rect x="40" y="178" width="130" height="40" fill="#388e3c" rx="3"/>
    <text x="105" y="203" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Development</text>
    <rect x="180" y="178" width="130" height="40" fill="#388e3c" rx="3"/>
    <text x="245" y="203" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Testing</text>
    <rect x="320" y="178" width="130" height="40" fill="#388e3c" rx="3"/>
    <text x="385" y="203" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Staging</text>
    <rect x="460" y="178" width="130" height="40" fill="#388e3c" rx="3"/>
    <text x="525" y="203" text-anchor="middle" font-family="Arial" font-size="10" fill="white">UAT</text>
    <rect x="600" y="178" width="130" height="40" fill="#388e3c" rx="3"/>
    <text x="665" y="203" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Production</text>
  </g>
  
  <g class="step" id="step3" data-narration="Key deployment strategies include Big Bang for complete replacement, Rolling for incremental updates, Blue-Green for instant rollback, and Canary for gradual rollout.">
    <rect x="20" y="234" width="760" height="82" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="253" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Deployment Strategies</text>
    <rect x="40" y="268" width="160" height="40" fill="#ff9800" rx="3"/>
    <text x="120" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Big Bang</text>
    <rect x="210" y="268" width="160" height="40" fill="#ff9800" rx="3"/>
    <text x="290" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Rolling</text>
    <rect x="380" y="268" width="160" height="40" fill="#ff9800" rx="3"/>
    <text x="460" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Blue-Green</text>
    <rect x="550" y="268" width="160" height="40" fill="#ff9800" rx="3"/>
    <text x="630" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Canary</text>
  </g>
  
  <g class="step" id="step4" data-narration="CI/CD automates delivery: Continuous Integration merges code with automated tests, Continuous Delivery prepares for release, and Continuous Deployment automates production.">
    <rect x="20" y="323" width="760" height="82" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">CI/CD Pipeline</text>
    <rect x="40" y="358" width="180" height="40" fill="#9c27b0" rx="3"/>
    <text x="130" y="383" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Continuous Integration</text>
    <path d="M225 378 L255 378" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="260" y="358" width="180" height="40" fill="#9c27b0" rx="3"/>
    <text x="350" y="383" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Continuous Delivery</text>
    <path d="M445 378 L475 378" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="480" y="358" width="180" height="40" fill="#9c27b0" rx="3"/>
    <text x="570" y="383" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Continuous Deployment</text>
  </g>
  
  <g class="step" id="step5" data-narration="Docker containers package applications with all dependencies for consistent deployment, while Kubernetes orchestrates containers at scale with self-healing and auto-scaling capabilities.">
    <rect x="20" y="412" width="760" height="82" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="431" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Containerization &amp; Orchestration</text>
    <rect x="40" y="448" width="300" height="40" fill="#1976d2" rx="3"/>
    <text x="190" y="473" text-anchor="middle" font-family="Arial" font-size="12" fill="white">Docker Containers</text>
    <rect x="360" y="448" width="300" height="40" fill="#1976d2" rx="3"/>
    <text x="510" y="473" text-anchor="middle" font-family="Arial" font-size="12" fill="white">Kubernetes (K8s)</text>
  </g>
  
  <g class="step" id="step6" data-narration="IaC tools like Terraform automate infrastructure provisioning, while monitoring tools enable quick issue detection and automated rollback ensures continuous service availability.">
    <rect x="20" y="500" width="760" height="85" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="519" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Automation, Monitoring &amp; Rollback</text>
    <rect x="40" y="535" width="220" height="40" fill="#f44336" rx="3"/>
    <text x="150" y="560" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Infrastructure as Code</text>
    <rect x="275" y="535" width="220" height="40" fill="#f44336" rx="3"/>
    <text x="385" y="560" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Monitoring (Prometheus, ELK)</text>
    <rect x="510" y="535" width="220" height="40" fill="#f44336" rx="3"/>
    <text x="620" y="560" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Automated Rollback</text>
  </g>
</svg>