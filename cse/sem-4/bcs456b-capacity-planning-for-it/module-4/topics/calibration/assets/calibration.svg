<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#388e3c"/>
    </marker>
  </defs>

  <g class="step" id="step0" data-narration="Calibration in machine learning ensures predicted probabilities match actual outcome frequencies. Let's explore how to measure and fix miscalibrated models.">
    <rect x="10" y="10" width="780" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Calibration in Machine Learning</text>
  </g>

  <g class="step" id="step1" data-narration="A perfectly calibrated model means when it predicts eighty percent probability, the event truly occurs eighty percent of the time. Predicted probability equals actual frequency.">
    <rect x="10" y="58" width="780" height="80" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="74" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Model Calibration?</text>
    <rect x="30" y="80" width="350" height="50" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="205" y="96" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Definition</text>
    <text x="205" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Predicted probabilities match actual outcome</text>
    <text x="205" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">frequencies: P(Y=1 | P̂(Y=1)=p) = p</text>
    <rect x="420" y="80" width="350" height="50" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="595" y="96" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Miscalibration Problem</text>
    <text x="595" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Model says 80% → actual is only 55%</text>
    <text x="595" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">⚠ Dangerous in medical, finance, autonomous systems</text>
  </g>

  <g class="step" id="step2" data-narration="Reliability diagrams plot predicted probability against actual positive rate. A perfectly calibrated model follows the forty-five degree diagonal line exactly.">
    <rect x="10" y="146" width="780" height="85" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="162" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Reliability Diagram (Calibration Plot)</text>
    <!-- Mini chart area -->
    <rect x="40" y="170" width="100" height="55" fill="white" stroke="#388e3c" stroke-width="1" rx="2"/>
    <line x1="55" y1="220" x2="135" y2="220" stroke="#333" stroke-width="0.8"/>
    <line x1="55" y1="220" x2="55" y2="175" stroke="#333" stroke-width="0.8"/>
    <line x1="55" y1="220" x2="135" y2="175" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,2"/>
    <!-- Overconfident curve below diagonal -->
    <polyline points="65,215 80,207 95,200 110,195 125,192" fill="none" stroke="#f44336" stroke-width="1.5"/>
    <circle cx="65" cy="215" r="2" fill="#f44336"/>
    <circle cx="95" cy="200" r="2" fill="#f44336"/>
    <circle cx="125" cy="192" r="2" fill="#f44336"/>
    <text x="90" y="230" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Predicted Prob →</text>
    <text x="37" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#333" transform="rotate(-90,37,198)">Actual</text>

    <!-- Legend boxes -->
    <rect x="165" y="170" width="195" height="52" rx="4" fill="white" stroke="#388e3c" stroke-width="0.8"/>
    <text x="262" y="184" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Interpretation</text>
    <line x1="175" y1="192" x2="190" y2="192" stroke="#aaa" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="195" y="195" font-family="Arial" font-size="8" fill="#333">Diagonal = Perfect Calibration</text>
    <text x="175" y="207" font-family="Arial" font-size="8" fill="#1976d2">▲ Above diagonal = Underconfident</text>
    <text x="175" y="218" font-family="Arial" font-size="8" fill="#f44336">▼ Below diagonal = Overconfident</text>

    <!-- ECE/MCE boxes -->
    <rect x="385" y="170" width="190" height="52" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="480" y="184" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">ECE (Expected Cal. Error)</text>
    <text x="480" y="197" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ECE = Σ (|Bᵦ|/n)·|acc(Bᵦ)-conf(Bᵦ)|</text>
    <text x="480" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Weighted avg error across bins</text>
    <text x="480" y="219" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">ECE = 0 → Perfect calibration</text>

    <rect x="595" y="170" width="180" height="52" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="685" y="184" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">MCE (Max Cal. Error)</text>
    <text x="685" y="197" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">MCE = max |acc(Bᵦ)-conf(Bᵦ)|</text>
    <text x="685" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Worst-case bin error</text>
    <text x="685" y="219" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Critical for safety applications</text>
  </g>

  <g class="step" id="step3" data-narration="Three main calibration methods exist: Platt Scaling uses sigmoid transformation, Isotonic Regression is non-parametric, and Temperature Scaling adjusts softmax sharpness.">
    <rect x="10" y="239" width="780" height="80" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="400" y="255" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Calibration Methods Overview</text>

    <rect x="25" y="262" width="240" height="50" rx="5" fill="white" stroke="#1976d2" stroke-width="1.5"/>
    <text x="145" y="276" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">🔵 Platt Scaling</text>
    <text x="145" y="288" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Sigmoid: P = 1/(1+exp(Af+B))</text>
    <text x="145" y="299" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Parametric · Best for SVMs · Small data OK</text>

    <rect x="280" y="262" width="240" height="50" rx="5" fill="white" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="276" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">🟢 Isotonic Regression</text>
    <text x="400" y="288" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Monotonic step function fitting</text>
    <text x="400" y="299" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Non-parametric · Flexible · Needs more data</text>

    <rect x="535" y="262" width="240" height="50" rx="5" fill="white" stroke="#ff9800" stroke-width="1.5"/>
    <text x="655" y="276" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">🟠 Temperature Scaling</text>
    <text x="655" y="288" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Softmax with T: exp(zᵢ/T)/Σexp(zⱼ/T)</text>
    <text x="655" y="299" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Single param · Best for neural nets · Simple</text>
  </g>

  <g class="step" id="step4" data-narration="Temperature scaling example: with logits two, one, zero-point-one, raising temperature from one to two softens the overconfident prediction from seventy-six percent down to fifty percent.">
    <rect x="10" y="327" width="780" height="80" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="343" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Temperature Scaling Example: Logits [2.0, 1.0, 0.1]</text>

    <rect x="30" y="350" width="230" height="50" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="145" y="364" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">T = 1 (Original, Overconfident)</text>
    <text x="145" y="377" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">C1: 76.3%  C2: 23.2%  C3: 0.5%</text>
    <rect x="50" y="385" width="140" height="8" rx="2" fill="#eee"/>
    <rect x="50" y="385" width="107" height="8" rx="2" fill="#f44336" opacity="0.7"/>

    <line x1="275" y1="370" x2="320" y2="370" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="297" y="365" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">T=2</text>

    <rect x="335" y="350" width="230" height="50" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="450" y="364" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">T = 2 (Softened, Calibrated)</text>
    <text x="450" y="377" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">C1: 50.2%  C2: 30.4%  C3: 19.4%</text>
    <rect x="355" y="385" width="140" height="8" rx="2" fill="#eee"/>
    <rect x="355" y="385" width="70" height="8" rx="2" fill="#388e3c" opacity="0.7"/>

    <rect x="590" y="350" width="185" height="50" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="682" y="364" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Key Rule</text>
    <text x="682" y="378" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">T &gt; 1 → Softer (less confident)</text>
    <text x="682" y="391" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">T &lt; 1 → Sharper (more confident)</text>
  </g>

  <g class="step" id="step5" data-narration="Let's compute ECE with five bins. Bins four and five show high overconfidence. The weighted average gives ECE of zero-point-zero-eight-eight, indicating moderate miscalibration.">
    <rect x="10" y="415" width="780" height="80" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="431" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">ECE Calculation Example (n=1000, 5 bins)</text>

    <rect x="25" y="437" width="110" height="52" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="80" y="449" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Bin 1 (0-0.2)</text>
    <text x="80" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">n=200 |0.10-0.12|</text>
    <text x="80" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">gap=0.02 ✓</text>
    <rect x="30" y="477" width="100" height="5" rx="1" fill="#eee"/><rect x="30" y="477" width="5" height="5" rx="1" fill="#388e3c"/>

    <rect x="145" y="437" width="110" height="52" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="200" y="449" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Bin 2 (0.2-0.4)</text>
    <text x="200" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">n=250 |0.30-0.28|</text>
    <text x="200" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">gap=0.02 ✓</text>
    <rect x="150" y="477" width="100" height="5" rx="1" fill="#eee"/><rect x="150" y="477" width="5" height="5" rx="1" fill="#388e3c"/>

    <rect x="265" y="437" width="110" height="52" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="320" y="449" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Bin 3 (0.4-0.6)</text>
    <text x="320" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">n=200 |0.50-0.48|</text>
    <text x="320" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">gap=0.02 ✓</text>
    <rect x="270" y="477" width="100" height="5" rx="1" fill="#eee"/><rect x="270" y="477" width="5" height="5" rx="1" fill="#388e3c"/>

    <rect x="385" y="437" width="110" height="52" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="440" y="449" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Bin 4 (0.6-0.8)</text>
    <text x="440" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">n=200 |0.70-0.55|</text>
    <text x="440" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">gap=0.15 ⚠</text>
    <rect x="390" y="477" width="100" height="5" rx="1" fill="#eee"/><rect x="390" y="477" width="40" height="5" rx="1" fill="#f44336"/>

    <rect x="505" y="437" width="110" height="52" rx="3" fill="white" stroke="#f44336" stroke-width="1.5"/>
    <text x="560" y="449" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#f44336">Bin 5 (0.8-1.0)</text>
    <text x="560" y="460" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">n=150 |0.90-0.60|</text>
    <text x="560" y="471" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">gap=0.30 ⚠⚠</text>
    <rect x="510" y="477" width="100" height="5" rx="1" fill="#eee"/><rect x="510" y="477" width="75" height="5" rx="1" fill="#f44336"/>

    <rect x="630" y="437" width="150" height="52" rx="5" fill="#1976d2"/>
    <text x="705" y="454" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">ECE Result</text>
    <text x="705" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="white">(4+5+4+30+45)/1000</text>
    <text x="705" y="482" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ffeb3b">= 0.088</text>
  </g>

  <g class="step" id="step6" data-narration="Remember these exam essentials: calibration is not accuracy, know each method's best use case, and practice computing ECE. Temperature scaling is most popular for neural networks.">
    <rect x="10" y="503" width="780" height="85" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="519" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">🎯 Key Takeaways &amp; Exam Tips</text>

    <rect x="25" y="526" width="185" height="55" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="117" y="539" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">⚡ Core Distinction</text>
    <text x="117" y="551" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Accuracy ≠ Calibration</text>
    <text x="117" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">High accuracy can still have</text>
    <text x="117" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">poor probability estimates</text>

    <rect x="220" y="526" width="185" height="55" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="312" y="539" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">📋 Method Selection</text>
    <text x="312" y="551" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">SVM/small data → Platt Scaling</text>
    <text x="312" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Large data → Isotonic Regression</text>
    <text x="312" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Neural Nets → Temperature Scaling</text>

    <rect x="415" y="526" width="185" height="55" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="507" y="539" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">📊 Reliability Diagram</text>
    <text x="507" y="551" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Above diagonal = Underconfident</text>
    <text x="507" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Below diagonal = Overconfident</text>
    <text x="507" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">On diagonal = Well-calibrated</text>

    <rect x="610" y="526" width="170" height="55" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="695" y="539" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">🔢 Formulas to Remember</text>
    <text x="695" y="551" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ECE = Σ(|Bᵦ|/n)·|acc-conf|</text>
    <text x="695" y="562" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Platt: 1/(1+exp(Af+B))</text>
    <text x="695" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Temp: exp(z/T)/Σexp(zⱼ/T)</text>
  </g>
</svg>