<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Trend prediction forecasts future values using historical data patterns, essential for data-driven decisions in finance, sales, strategic operations, and planning.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Predicting Trends - Time Series Forecasting</text>
  </g>
  
  <g class="step" id="step1" data-narration="Time series data has three components: trend shows long-term direction, seasonality repeats patterns, and noise is random variation in datasets.">
    <rect x="20" y="58" width="760" height="85" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Time Series Components</text>
    <rect x="40" y="95" width="220" height="38" fill="#c8e6c9" rx="3"/>
    <text x="150" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">TREND</text>
    <text x="150" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Long-term direction</text>
    <rect x="270" y="95" width="220" height="38" fill="#c8e6c9" rx="3"/>
    <text x="380" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">SEASONALITY</text>
    <text x="380" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Repeating patterns</text>
    <rect x="500" y="95" width="220" height="38" fill="#c8e6c9" rx="3"/>
    <text x="610" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">NOISE</text>
    <text x="610" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Random variation</text>
  </g>
  
  <g class="step" id="step2" data-narration="Moving averages smooth data: SMA uses equal weights, WMA allows custom weights, EMA gives exponential weight to recent points and values.">
    <rect x="20" y="151" width="760" height="85" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="173" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Moving Averages</text>
    <rect x="40" y="190" width="230" height="38" fill="#ffe0b2" rx="3"/>
    <text x="155" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Simple Moving Average</text>
    <text x="155" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#bf360c">SMA = (x₁+...+xₙ)/n</text>
    <rect x="280" y="190" width="230" height="38" fill="#ffe0b2" rx="3"/>
    <text x="395" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Weighted Moving Average</text>
    <text x="395" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#bf360c">WMA = Σ(wᵢxᵢ)/Σwᵢ</text>
    <rect x="520" y="190" width="230" height="38" fill="#ffe0b2" rx="3"/>
    <text x="635" y="207" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Exponential Moving Average</text>
    <text x="635" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#bf360c">EMAₜ = αxₜ+(1-α)EMAₜ₋₁</text>
  </g>
  
  <g class="step" id="step3" data-narration="Exponential smoothing forecasts by weighting recent observations more significantly. Holt's method adds trend components for capturing data with clear direction.">
    <rect x="20" y="244" width="760" height="85" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="266" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Exponential Smoothing Methods</text>
    <rect x="40" y="285" width="345" height="38" fill="#e1bee7" rx="3"/>
    <text x="212" y="302" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Simple Exponential Smoothing</text>
    <text x="212" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Fₜ₊₁ = αxₜ + (1-α)Fₜ | No trend/seasonality</text>
    <rect x="395" y="285" width="345" height="38" fill="#e1bee7" rx="3"/>
    <text x="567" y="302" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Holt's Linear Trend Method</text>
    <text x="567" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Level + Trend components | Captures direction</text>
  </g>
  
  <g class="step" id="step4" data-narration="Linear regression fits y = mx + c to data using least squares, finding slope m and intercept c to predict future values.">
    <rect x="20" y="337" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="359" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Linear Trend Analysis</text>
    <rect x="40" y="378" width="540" height="38" fill="#bbdefb" rx="3"/>
    <text x="310" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Linear Equation: y = mx + c</text>
    <text x="310" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Slope m = Σ(x-x̄)(y-ȳ) / Σ(x-x̄)² | Intercept c = ȳ - mx̄</text>
    <rect x="590" y="378" width="170" height="38" fill="#bbdefb" rx="3"/>
    <text x="675" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Example</text>
    <text x="675" y="410" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Q1→Q4: 50,55,62,68</text>
  </g>
  
  <g class="step" id="step5" data-narration="Forecast accuracy uses MAE for average error, MSE for squared errors, RMSE for penalizing large errors, and MAPE for percentage error.">
    <rect x="20" y="430" width="760" height="85" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="452" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Forecast Accuracy Metrics</text>
    <rect x="40" y="470" width="175" height="38" fill="#ffcdd2" rx="3"/>
    <text x="127" y="487" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">MAE</text>
    <text x="127" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Mean Absolute Error</text>
    <rect x="225" y="470" width="175" height="38" fill="#ffcdd2" rx="3"/>
    <text x="312" y="487" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">MSE</text>
    <text x="312" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Mean Squared Error</text>
    <rect x="410" y="470" width="175" height="38" fill="#ffcdd2" rx="3"/>
    <text x="497" y="487" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">RMSE</text>
    <text x="497" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Root Mean Squared</text>
    <rect x="595" y="470" width="175" height="38" fill="#ffcdd2" rx="3"/>
    <text x="682" y="487" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">MAPE</text>
    <text x="682" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Mean Abs Percentage</text>
  </g>
  
  <g class="step" id="step6" data-narration="Choose methods based on data: SMA for simple smoothing, Holt for trends, Holt-Winters for seasonality. Higher alpha responds faster to changes.">
    <rect x="20" y="523" width="760" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="545" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Method Selection Guide</text>
    <text x="40" y="568" font-family="Arial" font-size="10" fill="#e65100">• SMA/WMA: Flat data | • Holt's: Trend only | • Holt-Winters: Trend + Seasonality | • α↑ = responsive, α↓ = smooth</text>
  </g>
</svg>