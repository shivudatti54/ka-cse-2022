<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Automated Deployment Philosophies. We'll explore CI/CD practices, deployment strategies, modern DevOps approaches, and essential techniques for reliable software releases.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Automated Deployment Philosophies</text>
  </g>
  
  <g class="step" id="step1" data-narration="Continuous Integration frequently merges code with automated builds and tests. Continuous Deployment extends CI by automatically deploying validated changes to production environments.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">CI/CD Foundations</text>
    <rect x="40" y="88" width="340" height="40" rx="3" fill="#c8e6c9"/>
    <text x="50" y="105" font-family="Arial" font-size="10" fill="#2e7d32">Continuous Integration (CI):</text>
    <text x="50" y="118" font-family="Arial" font-size="9" fill="#1b5e20">Frequent code integration with</text>
    <text x="50" y="128" font-family="Arial" font-size="9" fill="#1b5e20">automated build &amp; test verification</text>
    <rect x="400" y="88" width="340" height="40" rx="3" fill="#c8e6c9"/>
    <text x="410" y="105" font-family="Arial" font-size="10" fill="#2e7d32">Continuous Deployment (CD):</text>
    <text x="410" y="118" font-family="Arial" font-size="9" fill="#1b5e20">Auto-deploys all validated</text>
    <text x="410" y="128" font-family="Arial" font-size="9" fill="#1b5e20">changes to production</text>
  </g>
  
  <g class="step" id="step2" data-narration="Blue-green deployment uses two identical environments for instant rollback. Canary releases to a small user subset first, while rolling updates deploy incrementally in batches.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Deployment Strategies</text>
    <rect x="40" y="176" width="230" height="42" rx="3" fill="#ffe0b2"/>
    <text x="50" y="190" font-family="Arial" font-size="10" fill="#e65100">Blue-Green</text>
    <text x="50" y="203" font-family="Arial" font-size="8" fill="#bf360c">Two identical environments</text>
    <text x="50" y="215" font-family="Arial" font-size="8" fill="#bf360c">Instant rollback capability</text>
    <rect x="285" y="176" width="230" height="42" rx="3" fill="#ffe0b2"/>
    <text x="295" y="190" font-family="Arial" font-size="10" fill="#e65100">Canary</text>
    <text x="295" y="203" font-family="Arial" font-size="8" fill="#bf360c">Release to small user group</text>
    <text x="295" y="215" font-family="Arial" font-size="8" fill="#bf360c">First, then gradual rollout</text>
    <rect x="530" y="176" width="230" height="42" rx="3" fill="#ffe0b2"/>
    <text x="540" y="190" font-family="Arial" font-size="10" fill="#e65100">Rolling</text>
    <text x="540" y="203" font-family="Arial" font-size="8" fill="#bf360c">Incremental batch updates</text>
    <text x="540" y="215" font-family="Arial" font-size="8" fill="#bf360c">No double infrastructure needed</text>
  </g>
  
  <g class="step" id="step3" data-narration="Feature flags toggle features without code deployment, enabling trunk-based development and instant kill-switch capabilities. Infrastructure as Code manages infrastructure through definition files.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Feature Flags &amp; IaC</text>
    <rect x="40" y="264" width="350" height="42" rx="3" fill="#e1bee7"/>
    <text x="50" y="278" font-family="Arial" font-size="10" fill="#6a1b9a">Feature Flags</text>
    <text x="50" y="292" font-family="Arial" font-size="8" fill="#4a148c">Toggle features without deployment</text>
    <text x="50" y="304" font-family="Arial" font-size="8" fill="#4a148c">Supports A/B testing &amp; instant rollback</text>
    <rect x="410" y="264" width="350" height="42" rx="3" fill="#e1bee7"/>
    <text x="420" y="278" font-family="Arial" font-size="10" fill="#6a1b9a">Infrastructure as Code</text>
    <text x="420" y="292" font-family="Arial" font-size="8" fill="#4a148c">Define infrastructure in code files</text>
    <text x="420" y="304" font-family="Arial" font-size="8" fill="#4a148c">Tools: Terraform, Ansible, CloudFormation</text>
  </g>
  
  <g class="step" id="step4" data-narration="Deployment pipelines automate the journey from source code to production through quality gates: source, build, test, staging, and production stages.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Deployment Pipeline Stages</text>
    <rect x="40" y="352" width="140" height="42" rx="3" fill="#bbdefb"/>
    <text x="50" y="367" font-family="Arial" font-size="9" fill="#0d47a1">1. Source</text>
    <text x="50" y="380" font-family="Arial" font-size="8" fill="#1565c0">Code push trigger</text>
    <rect x="190" y="352" width="100" height="42" rx="3" fill="#bbdefb"/>
    <text x="200" y="367" font-family="Arial" font-size="9" fill="#0d47a1">2. Build</text>
    <text x="200" y="380" font-family="Arial" font-size="8" fill="#1565c0">Compile code</text>
    <rect x="300" y="352" width="100" height="42" rx="3" fill="#bbdefb"/>
    <text x="310" y="367" font-family="Arial" font-size="9" fill="#0d47a1">3. Test</text>
    <text x="310" y="380" font-family="Arial" font-size="8" fill="#1565c0">Unit &amp; integration</text>
    <rect x="410" y="352" width="100" height="42" rx="3" fill="#bbdefb"/>
    <text x="420" y="367" font-family="Arial" font-size="9" fill="#0d47a1">4. Staging</text>
    <text x="420" y="380" font-family="Arial" font-size="8" fill="#1565c0">Pre-production</text>
    <rect x="520" y="352" width="100" height="42" rx="3" fill="#90caf9"/>
    <text x="530" y="367" font-family="Arial" font-size="9" fill="#0d47a1">5. Production</text>
    <text x="530" y="380" font-family="Arial" font-size="8" fill="#1565c0">Live deployment</text>
    <line x1="180" y1="373" x2="190" y2="373" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="290" y1="373" x2="300" y2="373" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="400" y1="373" x2="410" y2="373" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="510" y1="373" x2="520" y2="373" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  
  <g class="step" id="step5" data-narration="Immutable infrastructure replaces servers rather than modifying them, ensuring consistency and simpler rollbacks. This approach treats servers as disposable cattle, not pets.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Immutable Infrastructure</text>
    <rect x="40" y="440" width="340" height="42" rx="3" fill="#ffcdd2"/>
    <text x="50" y="455" font-family="Arial" font-size="10" fill="#b71c1c">Pets vs Cattle Analogy</text>
    <text x="50" y="468" font-family="Arial" font-size="9" fill="#c62828">Servers are disposable resources</text>
    <text x="50" y="480" font-family="Arial" font-size="9" fill="#c62828">Replace instead of modify</text>
    <rect x="400" y="440" width="340" height="42" rx="3" fill="#ffcdd2"/>
    <text x="410" y="455" font-family="Arial" font-size="10" fill="#b71c1c">Key Benefits</text>
    <text x="410" y="468" font-family="Arial" font-size="9" fill="#c62828">Consistency, simple rollback,</text>
    <text x="410" y="480" font-family="Arial" font-size="9" fill="#c62828">no configuration drift</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key takeaways: Automated deployment reduces errors and ensures consistency. Choose blue-green for instant rollback, canary for gradual testing, and feature flags for flexible releases.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Summary: Key Takeaways</text>
    <rect x="40" y="530" width="170" height="50" rx="3" fill="#ffe0b2"/>
    <text x="50" y="545" font-family="Arial" font-size="9" fill="#e65100">Automated Deployment</text>
    <text x="50" y="558" font-family="Arial" font-size="8" fill="#bf360c">Reduces human errors,</text>
    <text x="50" y="570" font-family="Arial" font-size="8" fill="#bf360c">ensures consistency</text>
    <rect x="220" y="530" width="170" height="50" rx="3" fill="#ffe0b2"/>
    <text x="230" y="545" font-family="Arial" font-size="9" fill="#e65100">Blue-Green</text>
    <text x="230" y="558" font-family="Arial" font-size="8" fill="#bf360c">Zero downtime,</text>
    <text x="230" y="570" font-family="Arial" font-size="8" fill="#bf360c">instant rollback</text>
    <rect x="400" y="530" width="170" height="50" rx="3" fill="#ffe0b2"/>
    <text x="410" y="545" font-family="Arial" font-size="9" fill="#e65100">Canary</text>
    <text x="410" y="558" font-family="Arial" font-size="8" fill="#bf360c">Test with real users,</text>
    <text x="410" y="570" font-family="Arial" font-size="8" fill="#bf360c">gradual rollout</text>
    <rect x="580" y="530" width="180" height="50" rx="3" fill="#ffe0b2"/>
    <text x="590" y="545" font-family="Arial" font-size="9" fill="#e65100">Feature Flags</text>
    <text x="590" y="558" font-family="Arial" font-size="8" fill="#bf360c">Decouple deployment</text>
    <text x="590" y="570" font-family="Arial" font-size="8" fill="#bf360c">from release</text>
  </g>
</svg>