<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Automated Installation Tools enable IT professionals to deploy and configure operating systems across multiple servers simultaneously, eliminating manual installation processes entirely.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Automated Installation Tools</text>
  </g>
  
  <g class="step" id="step1" data-narration="Installation automation handles initial OS provisioning and base system setup, while configuration management tools manage ongoing software updates, system settings, and infrastructure changes after installation completes.">
    <rect x="50" y="58" width="700" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Configuration Management vs Installation Automation</text>
    <rect x="70" y="95" width="200" height="38" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="170" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Installation Automation</text>
    <text x="170" y="126" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Kickstart, Preseed</text>
    <line x1="280" y1="114" x2="320" y2="114" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="330" y="95" width="200" height="38" rx="3" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="430" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Configuration Management</text>
    <text x="430" y="126" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Ansible, Puppet, Chef</text>
    <text x="540" y="120" font-family="Arial" font-size="9" fill="#555">Initial OS Setup → Ongoing Management</text>
  </g>
  
  <g class="step" id="step2" data-narration="Ansible is an agentless automation tool using YAML playbooks. It uses SSH connections to push configurations to managed nodes without installing agents.">
    <rect x="50" y="152" width="700" height="97" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="174" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Ansible - Agentless Automation</text>
    <rect x="70" y="190" width="140" height="38" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="140" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Agentless</text>
    <text x="140" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">No agents needed</text>
    <rect x="220" y="190" width="140" height="38" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="290" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Push-Based</text>
    <text x="290" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">SSH to managed nodes</text>
    <rect x="370" y="190" width="140" height="38" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="440" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">YAML Playbooks</text>
    <text x="440" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Human-readable</text>
    <rect x="520" y="190" width="140" height="38" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="590" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Idempotent</text>
    <text x="590" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Same result every run</text>
    <text x="70" y="242" font-family="Arial" font-size="9" fill="#666">Key: Agentless SSH-based | Declarative | Low learning curve</text>
  </g>
  
  <g class="step" id="step3" data-narration="Puppet and Chef are agent-based configuration management tools that use pull architecture. Puppet uses custom DSL while Chef uses Ruby-based recipes for automation.">
    <rect x="50" y="257" width="700" height="98" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="279" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Puppet and Chef - Agent-Based Tools</text>
    <rect x="70" y="296" width="300" height="38" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="220" y="313" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Puppet</text>
    <text x="220" y="327" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Puppet DSL | Master-Agent | Pull model</text>
    <rect x="380" y="296" width="300" height="38" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="530" y="313" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Chef</text>
    <text x="530" y="327" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Ruby-based | Cookbooks/Recipes | Pull model</text>
    <text x="70" y="348" font-family="Arial" font-size="9" fill="#666">Architecture: Both require agents on managed nodes, communicating with central server</text>
  </g>
  
  <g class="step" id="step4" data-narration="Kickstart automates RHEL/CentOS installations using configuration files defining partitioning, packages, and post-install scripts. Preseed does the same for Debian/Ubuntu systems with predefined answers.">
    <rect x="50" y="363" width="700" height="101" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="385" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Kickstart and Preseed - OS Installation</text>
    <rect x="70" y="403" width="310" height="38" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="225" y="421" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Kickstart (RHEL/CentOS)</text>
    <text x="225" y="435" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Partitioning, packages, post-install scripts</text>
    <rect x="390" y="403" width="310" height="38" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="545" y="421" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Preseed (Debian/Ubuntu)</text>
    <text x="545" y="435" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Network install, partitioning recipes</text>
    <text x="70" y="457" font-family="Arial" font-size="9" fill="#666">Use case: Automated OS provisioning across multiple servers without manual intervention</text>
  </g>
  
  <g class="step" id="step5" data-narration="Cloud-Init initializes cloud instances across AWS, Azure, and GCP. It handles hostname, SSH keys, packages, and runs custom scripts during boot for consistent cloud deployment.">
    <rect x="50" y="472" width="700" height="99" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="494" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Cloud-Init - Cloud Instance Initialization</text>
    <rect x="70" y="513" width="150" height="35" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="145" y="528" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Local Stage</text>
    <text x="145" y="542" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">initramfs</text>
    <rect x="230" y="513" width="150" height="35" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="305" y="528" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Network Stage</text>
    <text x="305" y="542" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">DNS, network</text>
    <rect x="390" y="513" width="150" height="35" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="465" y="528" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Config Stage</text>
    <text x="465" y="542" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Modules</text>
    <rect x="550" y="513" width="150" height="35" rx="3" fill="#ffcdd2" stroke="#f44336"/>
    <text x="625" y="528" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Final Stage</text>
    <text x="625" y="542" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">User data</text>
    <text x="70" y="564" font-family="Arial" font-size="9" fill="#666">Supports AWS, Azure, GCP, OpenStack - handles early initialization uniformly</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key differences: Ansible is agentless and push-based, Puppet and Chef require agents with pull model. Choose based on infrastructure needs and learning curve preferences.">
    <rect x="50" y="579" width="700" height="21" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="594" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Summary: Ansible=Agentless/Push | Puppet+Chef=Agent/Pull | Kickstart=OS install</text>
  </g>
</svg>