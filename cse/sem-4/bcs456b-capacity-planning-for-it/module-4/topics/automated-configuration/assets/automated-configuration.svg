<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Automated Configuration is managing IT systems through automation tools instead of manual processes, essential for modern cloud and DevOps environments.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Automated Configuration</text>
  </g>
  
  <!-- step1: What is Automated Config -->
  <g class="step" id="step1" data-narration="Automated configuration uses tools like Ansible, Puppet, Chef, and SaltStack to manage systems through code rather than manual configuration steps.">
    <rect x="20" y="58" width="760" height="75" fill="#e8f5e9" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">What is Automated Configuration?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#2e7d32">Managing/provisioning systems through automation tools instead of manual processes.</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#2e7d32">Enables consistent, repeatable, and scalable deployment across environments.</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#2e7d32">Key tools: Ansible, Puppet, Chef, SaltStack | Cloud: Terraform, CloudFormation</text>
  </g>
  
  <!-- step2: Configuration Management & IaC -->
  <g class="step" id="step2" data-narration="Configuration Management tracks system changes to maintain integrity and consistency across all servers, while IaC defines infrastructure in version-controllable code files for automated deployment.">
    <rect x="20" y="142" width="370" height="85" fill="#fff3e0" rx="5"/>
    <text x="35" y="162" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Configuration Management (CM)</text>
    <text x="35" y="178" font-family="Arial" font-size="9" fill="#e65100">• Track and control system changes</text>
    <text x="35" y="190" font-family="Arial" font-size="9" fill="#e65100">• Stages: Identify → Control →</text>
    <text x="35" y="202" font-family="Arial" font-size="9" fill="#e65100">  Status Accounting → Verify</text>
    <text x="35" y="214" font-family="Arial" font-size="9" fill="#e65100">• Ensures consistency & reproducibility</text>
    
    <rect x="405" y="142" width="375" height="85" fill="#f3e5f5" rx="5"/>
    <text x="420" y="162" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Infrastructure as Code (IaC)</text>
    <text x="420" y="178" font-family="Arial" font-size="9" fill="#6a1b9a">• Define infrastructure in code files</text>
    <text x="420" y="190" font-family="Arial" font-size="9" fill="#6a1b9a">• Version control for infrastructure</text>
    <text x="420" y="202" font-family="Arial" font-size="9" fill="#6a1b9a">• Declarative: what end-state to achieve</text>
    <text x="420" y="214" font-family="Arial" font-size="9" fill="#6a1b9a">• Imperative: step-by-step procedures</text>
  </g>
  
  <!-- step3: Tool Comparison -->
  <g class="step" id="step3" data-narration="Ansible uses push-based agentless SSH model with YAML playbooks. Puppet and Chef use pull-based agent models with their own DSL languages.">
    <rect x="20" y="236" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="35" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Tool Comparison: Ansible | Puppet | Chef | SaltStack</text>
    
    <!-- Table header -->
    <rect x="30" y="265" width="140" height="14" fill="#1565c0" rx="2"/>
    <rect x="170" y="265" width="140" height="14" fill="#1565c0" rx="2"/>
    <rect x="310" y="265" width="140" height="14" fill="#1565c0" rx="2"/>
    <rect x="450" y="265" width="140" height="14" fill="#1565c0" rx="2"/>
    <rect x="590" y="265" width="140" height="14" fill="#1565c0" rx="2"/>
    
    <text x="35" y="275" font-family="Arial" font-size="8" font-weight="bold" fill="white">Ansible</text>
    <text x="175" y="275" font-family="Arial" font-size="8" font-weight="bold" fill="white">Puppet</text>
    <text x="315" y="275" font-family="Arial" font-size="8" font-weight="bold" fill="white">Chef</text>
    <text x="455" y="275" font-family="Arial" font-size="8" font-weight="bold" fill="white">SaltStack</text>
    <text x="595" y="275" font-family="Arial" font-size="8" font-weight="bold" fill="white">Terraform</text>
    
    <!-- Row 1 -->
    <text x="35" y="288" font-family="Arial" font-size="7" fill="#0d47a1">Push Model</text>
    <text x="175" y="288" font-family="Arial" font-size="7" fill="#0d47a1">Pull Model</text>
    <text x="315" y="288" font-family="Arial" font-size="7" fill="#0d47a1">Pull Model</text>
    <text x="455" y="288" font-family="Arial" font-size="7" fill="#0d47a1">Pull Model</text>
    <text x="595" y="288" font-family="Arial" font-size="7" fill="#0d47a1">Declarative</text>
    
    <!-- Row 2 -->
    <text x="35" y="299" font-family="Arial" font-size="7" fill="#0d47a1">Agentless</text>
    <text x="175" y="299" font-family="Arial" font-size="7" fill="#0d47a1">Agent Required</text>
    <text x="315" y="299" font-family="Arial" font-size="7" fill="#0d47a1">Agent Required</text>
    <text x="455" y="299" font-family="Arial" font-size="7" fill="#0d47a1">Minion Agent</text>
    <text x="595" y="299" font-family="Arial" font-size="7" fill="#0d47a1">IaC Tool</text>
    
    <!-- Row 3 -->
    <text x="35" y="310" font-family="Arial" font-size="7" fill="#0d47a1">YAML</text>
    <text x="175" y="310" font-family="Arial" font-size="7" fill="#0d47a1">Puppet DSL</text>
    <text x="315" y="310" font-family="Arial" font-size="7" fill="#0d47a1">Ruby DSL</text>
    <text x="455" y="310" font-family="Arial" font-size="7" fill="#0d47a1">YAML+Jinja2</text>
    <text x="595" y="310" font-family="Arial" font-size="7" fill="#0d47a1">HCL/JSON</text>
  </g>
  
  <!-- step4: Key Properties -->
  <g class="step" id="step4" data-narration="Idempotency ensures applying config multiple times yields same result. Desired State Configuration defines the end goal, and drift detection finds deviations.">
    <rect x="20" y="325" width="240" height="80" fill="#ffebee" rx="5"/>
    <text x="35" y="345" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Idempotency</text>
    <text x="35" y="360" font-family="Arial" font-size="9" fill="#c62828">Property ensuring same config</text>
    <text x="35" y="372" font-family="Arial" font-size="9" fill="#c62828">applied multiple times produces</text>
    <text x="35" y="384" font-family="Arial" font-size="9" fill="#c62828">identical result as applying once.</text>
    <text x="35" y="396" font-family="Arial" font-size="8" fill="#b71c1c">Tools check state before changes</text>
    
    <rect x="275" y="325" width="250" height="80" fill="#e8f5e9" rx="5"/>
    <text x="290" y="345" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Desired State Configuration</text>
    <text x="290" y="360" font-family="Arial" font-size="9" fill="#2e7d32">Define desired end-state, not</text>
    <text x="290" y="372" font-family="Arial" font-size="9" fill="#2e7d32">step-by-step procedures. Tool</text>
    <text x="290" y="384" font-family="Arial" font-size="9" fill="#2e7d32">determines necessary actions.</text>
    <text x="290" y="396" font-family="Arial" font-size="8" fill="#1b5e20">PowerShell DSC is example</text>
    
    <rect x="540" y="325" width="240" height="80" fill="#fff3e0" rx="5"/>
    <text x="555" y="345" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Configuration Drift</text>
    <text x="555" y="360" font-family="Arial" font-size="9" fill="#e65100">Actual config deviates from</text>
    <text x="555" y="372" font-family="Arial" font-size="9" fill="#e65100">baseline over time. Causes:</text>
    <text x="555" y="384" font-family="Arial" font-size="9" fill="#e65100">manual changes, updates, patches</text>
    <text x="555" y="396" font-family="Arial" font-size="8" fill="#bf360c">Tools detect &amp; remediate drift</text>
  </g>
  
  <!-- step5: Push vs Pull Models -->
  <g class="step" id="step5" data-narration="Push model: Control node pushes configs to nodes (Ansible). Pull model: Agents poll server for configs periodically (Puppet, Chef, Salt).">
    <rect x="20" y="414" width="760" height="70" fill="#f3e5f5" rx="5"/>
    <text x="35" y="434" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Push vs Pull Models</text>
    
    <!-- Push Model Box -->
    <rect x="35" y="445" width="320" height="32" fill="#e1bee7" rx="3"/>
    <text x="45" y="458" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">PUSH MODEL (Ansible)</text>
    <text x="180" y="458" font-family="Arial" font-size="8" fill="#6a1b9a">Control node pushes configs via SSH/WinRM</text>
    <text x="45" y="470" font-family="Arial" font-size="8" fill="#6a1b9a">Immediate feedback, simpler architecture, no agents</text>
    
    <!-- Arrow -->
    <line x1="365" y1="461" x2="415" y2="461" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Pull Model Box -->
    <rect x="425" y="445" width="340" height="32" fill="#e1bee7" rx="3"/>
    <text x="435" y="458" font-family="Arial" font-size="9" font-weight="bold" fill="#7b1fa2">PULL MODEL (Puppet, Chef, Salt)</text>
    <text x="580" y="458" font-family="Arial" font-size="8" fill="#6a1b9a">Agents poll server at intervals for updated configs</text>
    <text x="435" y="470" font-family="Arial" font-size="8" fill="#6a1b9a">Scales well, but requires agent installation on nodes</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="For exams: Know difference between push/pull models, idempotency, IaC vs config management tools, and key Ansible components like inventory and playbooks.">
    <rect x="20" y="493" width="760" height="85" fill="#e3f2fd" rx="5"/>
    <text x="35" y="513" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Points</text>
    
    <text x="35" y="530" font-family="Arial" font-size="9" fill="#1565c0">1. Push (Ansible) vs Pull (Puppet/Chef/Salt) models - know which tool uses which</text>
    <text x="35" y="542" font-family="Arial" font-size="9" fill="#1565c0">2. Idempotency: applying config repeatedly yields same result - tools check state first</text>
    <text x="35" y="554" font-family="Arial" font-size="9" fill="#1565c0">3. IaC (Terraform) = provisioning | Config Mgmt (Ansible) = configuring existing systems</text>
    <text x="35" y="566" font-family="Arial" font-size="9" fill="#1565c0">4. Ansible: Inventory, Modules, Playbooks, Variables, Facts | YAML-based</text>
    <text x="35" y="578" font-family="Arial" font-size="9" fill="#1565c0">5. Practice writing basic playbooks/manifests for user creation, package installation</text>
  </g>
</svg>