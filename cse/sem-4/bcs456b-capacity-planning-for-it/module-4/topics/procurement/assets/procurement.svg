<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Procurement in cloud computing is the process of acquiring cloud services from external vendors, including selection, contracting, and ongoing management.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Procurement in Cloud Computing</text>
  </g>
  
  <g class="step" id="step1" data-narration="The three cloud service models are IaaS, PaaS, and SaaS. Each has distinctly different procurement responsibilities allocated between providers and consumers.">
    <rect x="20" y="60" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Cloud Service Models</text>
    <rect x="40" y="92" width="220" height="45" fill="#e3f2fd" rx="3"/>
    <text x="150" y="108" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">IaaS</text>
    <text x="150" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Virtual servers, storage,</text>
    <text x="150" y="132" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">networking</text>
    <rect x="290" y="92" width="220" height="45" fill="#e8f5e9" rx="3"/>
    <text x="400" y="108" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">PaaS</text>
    <text x="400" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Dev platforms, databases,</text>
    <text x="400" y="132" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">middleware</text>
    <rect x="540" y="92" width="220" height="45" fill="#fff3e0" rx="3"/>
    <text x="650" y="108" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">SaaS</text>
    <text x="650" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Ready-to-use software</text>
    <text x="650" y="132" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">applications over internet</text>
  </g>
  
  <g class="step" id="step2" data-narration="When selecting a cloud vendor, thoroughly evaluate service reliability, security certifications, scalability, pricing models, data sovereignty compliance, and overall support quality.">
    <rect x="20" y="155" width="760" height="85" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="175" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Vendor Selection Criteria</text>
    <rect x="40" y="190" width="145" height="40" fill="#e8f5e9" rx="3"/>
    <text x="112" y="203" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Reliability</text>
    <text x="112" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Uptime, disaster recovery</text>
    <rect x="195" y="190" width="145" height="40" fill="#e3f2fd" rx="3"/>
    <text x="267" y="203" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Security</text>
    <text x="267" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Encryption, access controls</text>
    <rect x="350" y="190" width="145" height="40" fill="#fff3e0" rx="3"/>
    <text x="422" y="203" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Scalability</text>
    <text x="422" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Handle growing workloads</text>
    <rect x="505" y="190" width="145" height="40" fill="#f3e5f5" rx="3"/>
    <text x="577" y="203" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Pricing</text>
    <text x="577" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Pay-per-use, reserved</text>
    <rect x="660" y="190" width="100" height="40" fill="#ffebee" rx="3"/>
    <text x="710" y="203" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Compliance</text>
    <text x="710" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ISO 27001, SOC 2</text>
  </g>
  
  <g class="step" id="step3" data-narration="Service Level Agreements define critical metrics including availability (99.9-99.99%), performance benchmarks, support response times, backup procedures, and financial penalties for non-compliance.">
    <rect x="20" y="250" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="270" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Service Level Agreements (SLAs)</text>
    <rect x="40" y="285" width="230" height="35" fill="#fff3e0" rx="3"/>
    <text x="155" y="298" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Availability</text>
    <text x="155" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">99.9% (8.76h/yr) to 99.99%</text>
    <rect x="285" y="285" width="150" height="35" fill="#e3f2fd" rx="3"/>
    <text x="360" y="298" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Performance</text>
    <text x="360" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Response times, latency</text>
    <rect x="450" y="285" width="150" height="35" fill="#e8f5e9" rx="3"/>
    <text x="525" y="298" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Support Response</text>
    <text x="525" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">15min critical, 1hr high</text>
    <rect x="615" y="285" width="145" height="35" fill="#f3e5f5" rx="3"/>
    <text x="687" y="298" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Penalties</text>
    <text x="687" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Credits for SLA breach</text>
  </g>
  
  <g class="step" id="step4" data-narration="Effective cost management includes detailed TCO analysis comparing cloud versus on-premise, reserved instances for significant savings, and resource tagging for tracking all expenses.">
    <rect x="20" y="340" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="360" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Cost Management</text>
    <rect x="40" y="375" width="180" height="35" fill="#f3e5f5" rx="3"/>
    <text x="130" y="388" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">TCO Analysis</text>
    <text x="130" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Hardware + Software + Personnel</text>
    <rect x="235" y="375" width="180" height="35" fill="#e8f5e9" rx="3"/>
    <text x="325" y="388" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Reserved Instances</text>
    <text x="325" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">40-60% savings on baseline</text>
    <rect x="430" y="375" width="160" height="35" fill="#fff3e0" rx="3"/>
    <text x="510" y="388" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Resource Tagging</text>
    <text x="510" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Track by dept/project</text>
    <rect x="605" y="375" width="155" height="35" fill="#e3f2fd" rx="3"/>
    <text x="682" y="388" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Pay-as-you-go</text>
    <text x="682" y="402" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Match usage to demand</text>
  </g>
  
  <g class="step" id="step5" data-narration="Avoiding vendor lock-in risks requires using containerization, standard APIs, portable data formats, and strategic multi-cloud distribution across multiple cloud providers for maximum flexibility.">
    <rect x="20" y="430" width="760" height="70" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Vendor Lock-in Prevention</text>
    <rect x="40" y="465" width="165" height="28" fill="#ffebee" rx="3"/>
    <text x="122" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Containerization</text>
    <text x="122" y="489" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Docker, Kubernetes</text>
    <rect x="215" y="465" width="165" height="28" fill="#e3f2fd" rx="3"/>
    <text x="297" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Standard APIs</text>
    <text x="297" y="489" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">REST, cloud-native</text>
    <rect x="390" y="465" width="165" height="28" fill="#e8f5e9" rx="3"/>
    <text x="472" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Portable Formats</text>
    <text x="472" y="489" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CSV, JSON, SQL export</text>
    <rect x="565" y="465" width="195" height="28" fill="#fff3e0" rx="3"/>
    <text x="662" y="478" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Multi-cloud Strategy</text>
    <text x="662" y="489" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Distribute across providers</text>
  </g>
  
  <g class="step" id="step6" data-narration="Compliance requirements include data protection regulations such as GDPR and HIPAA, strict data residency rules for geographic data storage, and proper audit trail capabilities.">
    <rect x="20" y="510" width="760" height="70" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="530" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Compliance and Exit Strategy</text>
    <rect x="40" y="545" width="230" height="28" fill="#e3f2fd" rx="3"/>
    <text x="155" y="558" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Data Protection</text>
    <text x="155" y="569" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GDPR, HIPAA, PCI-DSS</text>
    <rect x="285" y="545" width="165" height="28" fill="#e8f5e9" rx="3"/>
    <text x="367" y="558" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Data Residency</text>
    <text x="367" y="569" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Geographic location rules</text>
    <rect x="465" y="545" width="145" height="28" fill="#fff3e0" rx="3"/>
    <text x="537" y="558" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Audit Capabilities</text>
    <text x="537" y="569" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Logging, monitoring</text>
    <rect x="625" y="545" width="135" height="28" fill="#f3e5f5" rx="3"/>
    <text x="692" y="558" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Exit Strategy</text>
    <text x="692" y="569" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Data portability terms</text>
  </g>
</svg>