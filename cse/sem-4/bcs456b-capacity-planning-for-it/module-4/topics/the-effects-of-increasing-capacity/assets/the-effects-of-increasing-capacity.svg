<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic explains how increasing memory capacity significantly affects computer system performance, including trade-offs between speed, cost, and overall power.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Effects of Increasing Capacity in Memory Systems</text>
  </g>
  
  <g class="step" id="step1" data-narration="Cache capacity is the data storage amount. Larger caches improve hit rates by storing more frequently accessed data and reducing cache misses.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Cache Capacity &amp; Hit Rate</text>
    <rect x="40" y="88" width="160" height="40" fill="white" stroke="#1976d2" rx="4"/>
    <text x="120" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Small Cache</text>
    <text x="120" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Low hit rate</text>
    <path d="M200 108 L260 108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="280" y="88" width="160" height="40" fill="white" stroke="#388e3c" rx="4"/>
    <text x="360" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Large Cache</text>
    <text x="360" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">High hit rate</text>
    <text x="480" y="100" font-family="Arial" font-size="9" fill="#666">Improves hit rate by storing</text>
    <text x="480" y="114" font-family="Arial" font-size="9" fill="#666">more temporal &amp; spatial</text>
    <text x="480" y="128" font-family="Arial" font-size="9" fill="#666">locality data</text>
  </g>
  
  <g class="step" id="step2" data-narration="A key trade-off: increasing capacity increases access time. Larger memory arrays need more complex addressing, longer word lines, and higher latency.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">2. Access Time Trade-off</text>
    <rect x="40" y="180" width="120" height="36" fill="white" stroke="#ff9800" rx="4"/>
    <text x="100" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Small Cache</text>
    <text x="100" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Fast access</text>
    <rect x="180" y="180" width="120" height="36" fill="white" stroke="#f44336" rx="4"/>
    <text x="240" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Large Cache</text>
    <text x="240" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Slow access</text>
    <text x="340" y="190" font-family="Arial" font-size="9" fill="#666">Larger capacity means</text>
    <text x="340" y="204" font-family="Arial" font-size="9" fill="#666">longer word lines, more</text>
    <text x="340" y="218" font-family="Arial" font-size="9" fill="#666">parasitic capacitance</text>
  </g>
  
  <g class="step" id="step3" data-narration="With larger caches, miss rate decreases dramatically. However, this follows diminishing returns: doubling capacities does not halve the miss rate.">
    <rect x="20" y="234" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">3. Miss Rate &amp; Diminishing Returns</text>
    <text x="40" y="278" font-family="Arial" font-size="9" fill="#666">Miss Rate</text>
    <line x1="80" y1="300" x2="80" y2="270" stroke="#666" stroke-width="1"/>
    <line x1="80" y1="300" x2="280" y2="300" stroke="#666" stroke-width="1"/>
    <text x="280" y="310" font-family="Arial" font-size="8" fill="#666">Capacity →</text>
    <polyline points="80,285 120,275 160,260 200,250 240,245 280,242" fill="none" stroke="#388e3c" stroke-width="2"/>
    <text x="340" y="270" font-family="Arial" font-size="9" fill="#333">Each doubling of cache</text>
    <text x="340" y="284" font-family="Arial" font-size="9" fill="#333">size gives smaller</text>
    <text x="340" y="298" font-family="Arial" font-size="9" fill="#333">miss rate improvements</text>
    <text x="580" y="270" font-family="Arial" font-size="9" fill="#666">Example:</text>
    <text x="580" y="286" font-family="Arial" font-size="9" fill="#666">4KB→8KB: -25% miss</text>
    <text x="580" y="300" font-family="Arial" font-size="9" fill="#666">8KB→16KB: -15% miss</text>
  </g>
  
  <g class="step" id="step4" data-narration="AMAT formula: Hit Time + Miss Rate × Miss Penalty. Increasing lower-level cache size reduces effective miss penalty for upper levels.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Average Memory Access Time (AMAT)</text>
    <text x="40" y="370" font-family="Arial" font-size="11" fill="#333">AMAT = Hit Time<tspan dy="0">L1</tspan> + Miss Rate<tspan dy="0">L1</tspan> × (Hit Time<tspan dy="0">L2</tspan> + Miss Rate<tspan dy="0">L2</tspan> × Miss Penalty)</text>
    <rect x="300" y="378" width="200" height="16" fill="white" stroke="#9c27b0" rx="2"/>
    <text x="400" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Example: 1 + 0.05×(10+0.2×100)</text>
    <text x="520" y="390" font-family="Arial" font-size="9" fill="#388e3c">= 2.5 cycles</text>
    <text x="540" y="370" font-family="Arial" font-size="9" fill="#666">Reducing L2 miss rate to 10%:</text>
    <text x="540" y="390" font-family="Arial" font-size="9" fill="#666">= 2.0 cycles (20% improvement)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Larger caches consume more silicon area and power. This trade-off is critical for mobile and embedded systems with strict constraints.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. Cost &amp; Power Trade-offs</text>
    <circle cx="100" cy="460" r="30" fill="white" stroke="#f44336" stroke-width="2"/>
    <text x="100" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Silicon</text>
    <text x="100" y="467" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Area</text>
    <circle cx="200" cy="460" r="30" fill="white" stroke="#f44336" stroke-width="2"/>
    <text x="200" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Power</text>
    <text x="200" y="467" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Consumption</text>
    <circle cx="300" cy="460" r="30" fill="white" stroke="#f44336" stroke-width="2"/>
    <text x="300" y="455" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cost</text>
    <text x="300" y="467" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">per Bit</text>
    <path d="M140 460 L170 460" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M230 460 L270 460" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="380" y="455" font-family="Arial" font-size="9" fill="#666">L1 caches: 32-64KB</text>
    <text x="380" y="471" font-family="Arial" font-size="9" fill="#666">L2/L3 caches: 256KB-MB</text>
    <text x="380" y="487" font-family="Arial" font-size="9" fill="#666">Trade-off: performance vs constraints</text>
  </g>
  
  <g class="step" id="step6" data-narration="Higher associativity reduces conflict misses but significantly increases hardware complexity and access time especially. Choose based on program access patterns.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Associativity &amp; Capacity Relationship</text>
    <rect x="40" y="532" width="160" height="46" fill="white" stroke="#1976d2" rx="4"/>
    <text x="120" y="546" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Direct-Mapped</text>
    <text x="120" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1 way per set</text>
    <text x="120" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Conflict misses</text>
    <rect x="220" y="532" width="160" height="46" fill="white" stroke="#388e3c" rx="4"/>
    <text x="300" y="546" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">2-Way Set-Associative</text>
    <text x="300" y="560" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2 ways per set</text>
    <text x="300" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Fewer conflicts</text>
    <text x="420" y="545" font-family="Arial" font-size="9" fill="#666">8KB cache comparison:</text>
    <text x="420" y="561" font-family="Arial" font-size="9" fill="#666">Direct-mapped: 128 sets</text>
    <text x="420" y="577" font-family="Arial" font-size="9" fill="#666">2-way: 64 sets, better performance</text>
  </g>
</svg>