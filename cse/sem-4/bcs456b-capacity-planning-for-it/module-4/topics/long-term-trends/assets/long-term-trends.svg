<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>

  <g class="step" id="step0" data-narration="This topic covers long-term trends in time series data, their identification methods, statistical analysis techniques, and practical applications in business forecasting.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Long-Term Trends in Data Analysis</text>
  </g>

  <g class="step" id="step1" data-narration="A long-term trend represents the smooth, gradual movement of data over an extended period, ignoring short-term fluctuations and seasonal variations.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="58" width="760" height="22" fill="#1976d2" rx="8"/>
    <text x="40" y="73" font-family="Arial" font-size="12" fill="white" font-weight="bold">What is a Long-Term Trend?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">• Trend (T) = smooth, sustained movement over long period</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">• Ignores short-term fluctuations, noise, and seasonal effects</text>
    <text x="40" y="129" font-family="Arial" font-size="10" fill="#333">• Caused by: population growth, technology changes, economic development</text>
  </g>

  <g class="step" id="step2" data-narration="Three main types of trends exist: linear trends move at a constant rate, non-linear trends follow curved patterns, and secular trends span decades of data.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <rect x="20" y="146" width="760" height="22" fill="#388e3c" rx="8"/>
    <text x="40" y="161" font-family="Arial" font-size="12" fill="white" font-weight="bold">Types of Trends</text>
    <rect x="40" y="178" width="220" height="50" fill="#c8e6c9" rx="4"/>
    <text x="50" y="193" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Linear Trend</text>
    <text x="50" y="208" font-family="Arial" font-size="9" fill="#333">T(t) = a + bt</text>
    <text x="50" y="220" font-family="Arial" font-size="9" fill="#333">Constant rate change</text>
    <rect x="270" y="178" width="220" height="50" fill="#c8e6c9" rx="4"/>
    <text x="280" y="193" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Non-Linear Trend</text>
    <text x="280" y="208" font-family="Arial" font-size="9" fill="#333">T(t) = ae^bt or a+bt+ct²</text>
    <text x="280" y="220" font-family="Arial" font-size="9" fill="#333">Curved patterns</text>
    <rect x="500" y="178" width="260" height="50" fill="#c8e6c9" rx="4"/>
    <text x="510" y="193" font-family="Arial" font-size="10" fill="#2e7d32" font-weight="bold">Secular Trend</text>
    <text x="510" y="208" font-family="Arial" font-size="9" fill="#333">Very long-term (decades)</text>
    <text x="510" y="220" font-family="Arial" font-size="9" fill="#333">Structural changes</text>
  </g>

  <g class="step" id="step3" data-narration="Three primary methods help identify trends: graphical visual inspection for initial analysis, moving average smoothing to remove noise, and least squares statistical fitting for precise mathematical modeling.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <rect x="20" y="234" width="760" height="22" fill="#ff9800" rx="8"/>
    <text x="40" y="249" font-family="Arial" font-size="12" fill="white" font-weight="bold">Methods for Identifying Trends</text>
    <rect x="40" y="266" width="230" height="42" fill="#ffe0b2" rx="4"/>
    <text x="50" y="280" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">Graphical Method</text>
    <text x="50" y="295" font-family="Arial" font-size="9" fill="#333">Plot data, visually inspect</text>
    <text x="50" y="305" font-family="Arial" font-size="9" fill="#333">Simple but subjective</text>
    <rect x="280" y="266" width="230" height="42" fill="#ffe0b2" rx="4"/>
    <text x="290" y="280" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">Moving Average</text>
    <text x="290" y="295" font-family="Arial" font-size="9" fill="#333">Average over window period</text>
    <text x="290" y="305" font-family="Arial" font-size="9" fill="#333">Smooths short-term fluctuations</text>
    <rect x="520" y="266" width="240" height="42" fill="#ffe0b2" rx="4"/>
    <text x="530" y="280" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">Least Squares Method</text>
    <text x="530" y="295" font-family="Arial" font-size="9" fill="#333">Fits best-fit line: min residual</text>
    <text x="530" y="305" font-family="Arial" font-size="9" fill="#333">Provides T = a + bt equation</text>
  </g>

  <g class="step" id="step4" data-narration="Time series decomposition separates data into trend, seasonal, cyclical, and residual components using additive or multiplicative models for comprehensive analysis.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <rect x="20" y="322" width="760" height="22" fill="#9c27b0" rx="8"/>
    <text x="40" y="337" font-family="Arial" font-size="12" fill="white" font-weight="bold">Time Series Decomposition (TSCI)</text>
    <rect x="40" y="354" width="350" height="42" fill="#e1bee7" rx="4"/>
    <text x="50" y="368" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">Additive Model: Y = T + S + C + R</text>
    <text x="50" y="383" font-family="Arial" font-size="9" fill="#333">Seasonal variation remains constant</text>
    <text x="50" y="393" font-family="Arial" font-size="9" fill="#333">Used when trend level is stable</text>
    <rect x="400" y="354" width="360" height="42" fill="#e1bee7" rx="4"/>
    <text x="410" y="368" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">Multiplicative Model: Y = T × S × C × R</text>
    <text x="410" y="383" font-family="Arial" font-size="9" fill="#333">Seasonal variation changes with trend</text>
    <text x="410" y="393" font-family="Arial" font-size="9" fill="#333">Used for exponential growth/decline</text>
  </g>

  <g class="step" id="step5" data-narration="The 3-month moving average smooths the data by calculating sequential means: March equals 126.7, April shows 133.3, May displays 138.3, and June reaches 145, clearly indicating an upward trend in the series.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <rect x="20" y="410" width="760" height="22" fill="#f44336" rx="8"/>
    <text x="40" y="425" font-family="Arial" font-size="12" fill="white" font-weight="bold">Example: Moving Average Calculation</text>
    <text x="40" y="448" font-family="Arial" font-size="10" fill="#333">Data: Jan=120, Feb=135, Mar=125, Apr=140, May=150, Jun=145 (lakhs)</text>
    <text x="40" y="463" font-family="Arial" font-size="10" fill="#333">3-month CMA: Mar=126.7 | Apr=133.3 | May=138.3 | Jun=145</text>
    <rect x="40" y="472" width="200" height="14" fill="#ffcdd2" rx="2"/>
    <text x="45" y="482" font-family="Arial" font-size="9" fill="#c62828">Trend: Increasing (126.7 → 145)</text>
  </g>

  <g class="step" id="step6" data-narration="Applying least squares regression to the revenue data yields a slope of b=16 and intercept of a=33.4, establishing the trend equation T=33.4+16t. The Year 7 prediction comes to 145.4 crores.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="498" width="760" height="22" fill="#1976d2" rx="8"/>
    <text x="40" y="513" font-family="Arial" font-size="12" fill="white" font-weight="bold">Example: Linear Trend Equation (Least Squares)</text>
    <text x="40" y="535" font-family="Arial" font-size="10" fill="#333">Data: Year 1=50, Y2=65, Y3=82, Y4=95, Y5=115 (crores)</text>
    <text x="40" y="550" font-family="Arial" font-size="10" fill="#333">Formulas: b = (nΣty - ΣtΣy)/(nΣt² - (Σt)²), a = (Σy - bΣt)/n</text>
    <rect x="40" y="560" width="280" height="24" fill="#bbdefb" rx="4"/>
    <text x="45" y="572" font-family="Arial" font-size="10" fill="#0d47a1">b = 16, a = 33.4 → T = 33.4 + 16t</text>
    <rect x="330" y="560" width="280" height="24" fill="#bbdefb" rx="4"/>
    <text x="335" y="572" font-family="Arial" font-size="10" fill="#0d47a1">Year 7: T = 33.4 + 16(7) = 145.4 crores</text>
  </g>
</svg>