<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers deployment strategies, CI/CD pipelines, automated testing, and modern deployment philosophies for achieving reliable software releases in production environments.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Deployment and Automated Deployment Philosophies</text>
  </g>
  
  <!-- step1: Deployment Approaches -->
  <g class="step" id="step1" data-narration="Manual deployment is error-prone and inconsistent. Scripted deployment uses automation tools like Ansible or Chef. Fully automated requires zero human intervention after code commit to the repository.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Deployment Approaches</text>
    <rect x="40" y="88" width="220" height="40" fill="#bbdefb" rx="4"/>
    <text x="150" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Manual Deployment</text>
    <text x="150" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Error-prone, inconsistent</text>
    
    <rect x="290" y="88" width="220" height="40" fill="#90caf9" rx="4"/>
    <text x="400" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Scripted Deployment</text>
    <text x="400" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Ansible, Chef, Puppet</text>
    
    <rect x="540" y="88" width="220" height="40" fill="#64b5f6" rx="4"/>
    <text x="650" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Fully Automated</text>
    <text x="650" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Jenkins, GitLab CI</text>
  </g>
  
  <!-- step2: CI/CD Pipeline -->
  <g class="step" id="step2" data-narration="CI merges code frequently with automated builds and tests. CD automates delivery to production environments, while continuous deployment releases changes automatically to end users in production.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">CI/CD Pipeline Stages</text>
    
    <rect x="40" y="180" width="100" height="36" fill="#c8e6c9" rx="4"/>
    <text x="90" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Source</text>
    
    <line x1="140" y1="198" x2="170" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    
    <rect x="170" y="180" width="100" height="36" fill="#a5d6a7" rx="4"/>
    <text x="220" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Build</text>
    
    <line x1="270" y1="198" x2="300" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    
    <rect x="300" y="180" width="100" height="36" fill="#81c784" rx="4"/>
    <text x="350" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Test</text>
    
    <line x1="400" y1="198" x2="430" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    
    <rect x="430" y="180" width="100" height="36" fill="#66bb6a" rx="4"/>
    <text x="480" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Staging</text>
    
    <line x1="530" y1="198" x2="560" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    
    <rect x="560" y="180" width="100" height="36" fill="#4caf50" rx="4"/>
    <text x="610" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Production</text>
    
    <text x="650" y="195" font-family="Arial" font-size="8" fill="#2e7d32">CI: Merge often + auto test</text>
    <text x="650" y="210" font-family="Arial" font-size="8" fill="#2e7d32">CD: Auto prepare release</text>
    <text x="650" y="225" font-family="Arial" font-size="8" fill="#2e7d32">Deploy: Auto release</text>
  </g>
  
  <!-- step3: Blue-Green & Canary -->
  <g class="step" id="step3" data-narration="Blue-green deployment uses two identical environments with instant traffic switch between them. Canary releases to small user percentage first, then gradually increases rollout across the entire user base.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Blue-Green vs Canary Deployment</text>
    
    <!-- Blue-Green -->
    <rect x="40" y="268" width="320" height="36" fill="#ffe0b2" rx="4"/>
    <text x="200" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Blue-Green Deployment</text>
    <rect x="60" y="290" width="80" height="10" fill="#1976d2" rx="2"/>
    <text x="100" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Blue (v1)</text>
    <rect x="150" y="290" width="80" height="10" fill="#4caf50" rx="2"/>
    <text x="190" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Green (v2)</text>
    <line x1="270" y1="295" x2="300" y2="295" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="320" y="298" font-family="Arial" font-size="7" fill="#e65100">Instant switch</text>
    
    <!-- Canary -->
    <rect x="400" y="268" width="360" height="36" fill="#e1bee7" rx="4"/>
    <text x="580" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Canary Release</text>
    <rect x="420" y="290" width="200" height="10" fill="#bbdefb" rx="2"/>
    <text x="520" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="#0d47a1">5% → 20% → 50% → 100%</text>
    <text x="650" y="298" font-family="Arial" font-size="7" fill="#7b1fa2">Gradual rollout</text>
    
    <text x="200" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Zero downtime, instant rollback</text>
    <text x="580" y="312" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Limited risk, real-user feedback</text>
  </g>
  
  <!-- step4: Rolling & Feature Toggles -->
  <g class="step" id="step4" data-narration="Rolling deployment updates application instances incrementally one by one. Feature toggles enable turning features on or off in production without requiring code redeployment or restarting servers.">
    <rect x="20" y="322" width="760" height="95" fill="#fce4ec" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Rolling Deployment &amp; Feature Toggles</text>
    
    <!-- Rolling -->
    <rect x="40" y="356" width="340" height="36" fill="#ffcdd2" rx="4"/>
    <text x="210" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Rolling Deployment</text>
    <rect x="60" y="378" width="300" height="8" fill="#1976d2" rx="2"/>
    <rect x="135" y="378" width="70" height="8" fill="#388e3c" rx="2"/>
    <rect x="210" y="378" width="70" height="8" fill="#4caf50" rx="2"/>
    <rect x="285" y="378" width="70" height="8" fill="#ff9800" rx="2"/>
    <text x="210" y="395" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828">v1 → v2 → v3 → v4 (incremental)</text>
    
    <!-- Feature Toggles -->
    <rect x="400" y="356" width="360" height="36" fill="#d1c4e9" rx="4"/>
    <text x="580" y="370" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Feature Toggles (Flags)</text>
    <text x="420" y="385" font-family="Arial" font-size="8" fill="#4a148c">Flag: new_checkout = ON/OFF</text>
    <text x="420" y="398" font-family="Arial" font-size="8" fill="#4a148c">Enable features without redeploy</text>
    
    <text x="210" y="416" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">No extra infrastructure, complex rollback</text>
    <text x="580" y="416" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Test in production, gradual exposure</text>
  </g>
  
  <!-- step5: IaC -->
  <g class="step" id="step5" data-narration="Infrastructure as Code (IaC) manages servers through versioned configuration files, ensuring consistent and reproducible deployment environments across development, testing, and production stages.">
    <rect x="20" y="425" width="760" height="65" fill="#e0f7fa" rx="8"/>
    <text x="40" y="445" font-family="Arial" font-size="13" font-weight="bold" fill="#006064">Infrastructure as Code (IaC)</text>
    
    <rect x="40" y="458" width="220" height="25" fill="#b2ebf2" rx="4"/>
    <text x="150" y="472" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#006064">Terraform</text>
    
    <rect x="280" y="458" width="220" height="25" fill="#80deea" rx="4"/>
    <text x="390" y="472" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#006064">CloudFormation</text>
    
    <rect x="520" y="458" width="220" height="25" fill="#4dd0e1" rx="4"/>
    <text x="630" y="472" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#006064">Ansible</text>
    
    <text x="400" y="490" text-anchor="middle" font-family="Arial" font-size="9" fill="#00838f">Version-controlled infrastructure for consistent, reproducible environments</text>
  </g>
  
  <!-- step6: Docker & Kubernetes -->
  <g class="step" id="step6" data-narration="Docker containers package applications with their dependencies for consistency across all environments. Kubernetes orchestrates containers with automatic scaling, rollbacks, and load balancing for production deployments.">
    <rect x="20" y="498" width="760" height="90" fill="#f3e5f5" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#4a148c">Container Orchestration: Docker &amp; Kubernetes</text>
    
    <!-- Docker -->
    <rect x="40" y="532" width="340" height="46" fill="#e1bee7" rx="4"/>
    <text x="210" y="548" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#4a148c">Docker Containers</text>
    <text x="210" y="562" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Package app + dependencies = consistent environments</text>
    <text x="210" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Dev → Staging → Production identical</text>
    
    <!-- Kubernetes -->
    <rect x="400" y="532" width="360" height="46" fill="#ce93d8" rx="4"/>
    <text x="580" y="548" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#4a148c">Kubernetes (K8s)</text>
    <text x="580" y="562" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">Automated deployment, scaling, management of containerized apps</text>
    <text x="580" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#7b1fa2">Auto rollback | Service discovery | Load balancing | Self-healing</text>
  </g>
</svg>