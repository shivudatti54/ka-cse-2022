<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Applications of Monitoring covers system, process, network, security, storage, and application monitoring for comprehensive OS performance, security, and resource optimization.">
    <rect x="10" y="10" width="780" height="40" rx="5" fill="#1976d2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Applications of Monitoring</text>
  </g>
  
  <!-- step1: System Performance Monitoring -->
  <g class="step" id="step1" data-narration="System Performance Monitoring tracks CPU usage, memory consumption, and disk I/O operations using tools like top, vmstat, and iostat for system health analysis.">
    <rect x="10" y="58" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">System Performance Monitoring</text>
    <rect x="20" y="82" width="110" height="45" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">CPU</text>
    <text x="75" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">top, vmstat</text>
    <text x="75" y="120" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">utilization %</text>
    <rect x="140" y="82" width="110" height="45" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="190" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Memory</text>
    <text x="190" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">free, top</text>
    <text x="190" y="120" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">RAM usage</text>
    <rect x="260" y="82" width="110" height="45" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="310" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Disk I/O</text>
    <text x="310" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">iostat, iotop</text>
    <text x="310" y="120" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">throughput</text>
    <text x="430" y="95" font-family="Arial" font-size="9" fill="#666">Load Average: avg processes in ready state (1/5/15 min)</text>
    <text x="430" y="115" font-family="Arial" font-size="9" fill="#666">Compare with CPU cores: below = healthy, above = overloaded</text>
  </g>
  
  <!-- step2: Process Monitoring -->
  <g class="step" id="step2" data-narration="Process Monitoring tracks individual process states including Running, Ready, Blocked, and Zombie. Commands like ps, pstree, and kill manage processes.">
    <rect x="10" y="146" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="20" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Process Monitoring</text>
    <rect x="20" y="170" width="85" height="45" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="62" y="183" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Running</text>
    <text x="62" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">executing</text>
    <rect x="115" y="170" width="85" height="45" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="157" y="183" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Ready</text>
    <text x="157" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">waiting CPU</text>
    <rect x="210" y="170" width="85" height="45" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="252" y="183" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">Blocked</text>
    <text x="252" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">waiting I/O</text>
    <rect x="305" y="170" width="85" height="45" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="347" y="183" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Zombie</text>
    <text x="347" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">terminated</text>
    <text x="430" y="183" font-family="Arial" font-size="9" fill="#666">Commands: ps, pstree, top, htop</text>
    <text x="430" y="200" font-family="Arial" font-size="9" fill="#666">Process attributes: PID, PPID, priority, CPU%, MEM%</text>
  </g>
  
  <!-- step3: Network Monitoring -->
  <g class="step" id="step3" data-narration="Network Monitoring tracks bandwidth, latency, packet loss, and connections using ping, traceroute, netstat, and tcpdump for comprehensive network analysis and troubleshooting.">
    <rect x="10" y="234" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="20" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Network Monitoring</text>
    <rect x="20" y="258" width="95" height="45" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="67" y="271" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">ping</text>
    <text x="67" y="286" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">connectivity</text>
    <rect x="125" y="258" width="95" height="45" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="172" y="271" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">traceroute</text>
    <text x="172" y="286" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">path trace</text>
    <rect x="230" y="258" width="95" height="45" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="277" y="271" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">netstat</text>
    <text x="277" y="286" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">connections</text>
    <rect x="335" y="258" width="95" height="45" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="382" y="271" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">tcpdump</text>
    <text x="382" y="286" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">packet capture</text>
    <text x="460" y="271" font-family="Arial" font-size="9" fill="#666">Metrics: bandwidth, latency, packet loss, error rates</text>
    <text x="460" y="290" font-family="Arial" font-size="9" fill="#666">Protocol: SNMP for network device management</text>
  </g>
  
  <!-- step4: Security Monitoring -->
  <g class="step" id="step4" data-narration="Security Monitoring detects unauthorized access through log analysis, intrusion detection systems like Snort and Suricata, and real-time alerting for critical security events and anomalies.">
    <rect x="10" y="322" width="780" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="20" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Security Monitoring</text>
    <rect x="20" y="346" width="140" height="45" rx="3" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="90" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Log Files</text>
    <text x="90" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">/var/log/auth.log</text>
    <rect x="170" y="346" width="140" height="45" rx="3" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="240" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Intrusion Detection</text>
    <text x="240" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Snort, Suricata, OSSEC</text>
    <rect x="320" y="346" width="140" height="45" rx="3" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="390" y="359" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Real-time Alerts</text>
    <text x="390" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">critical events</text>
    <text x="480" y="359" font-family="Arial" font-size="9" fill="#666">Monitor: failed logins, file changes, network anomalies</text>
    <text x="480" y="378" font-family="Arial" font-size="9" fill="#666">Compliance: audit trails for security policies</text>
  </g>
  
  <!-- step5: Storage Monitoring -->
  <g class="step" id="step5" data-narration="Storage Monitoring tracks disk space, inode usage, and storage health using df, du, and smartctl to prevent disk exhaustion and data loss.">
    <rect x="10" y="410" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="20" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Storage Monitoring</text>
    <rect x="20" y="434" width="110" height="45" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="75" y="447" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">df</text>
    <text x="75" y="462" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">disk space</text>
    <rect x="140" y="434" width="110" height="45" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="195" y="447" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">du</text>
    <text x="195" y="462" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">file sizes</text>
    <rect x="260" y="434" width="110" height="45" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="315" y="447" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">smartctl</text>
    <text x="315" y="462" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">SMART health</text>
    <rect x="380" y="434" width="110" height="45" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="435" y="447" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">fsck</text>
    <text x="435" y="462" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">fs check</text>
    <text x="510" y="447" font-family="Arial" font-size="9" fill="#666">Metrics: used/total space, inode usage, I/O latency</text>
    <text x="510" y="466" font-family="Arial" font-size="9" fill="#666">Prevents: disk exhaustion, data loss, performance degradation</text>
  </g>
  
  <!-- step6: Application Monitoring & Summary -->
  <g class="step" id="step6" data-narration="Application Monitoring uses APM tools like Prometheus and Grafana to track application performance, response times, and resource consumption for optimization.">
    <rect x="10" y="498" width="780" height="90" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="20" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Application Monitoring & Summary</text>
    <rect x="20" y="522" width="100" height="55" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="538" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">APM Tools</text>
    <text x="70" y="552" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Prometheus</text>
    <text x="70" y="563" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Grafana</text>
    <text x="130" y="545" font-family="Arial" font-size="9" fill="#666">Transaction times,</text>
    <text x="130" y="560" font-family="Arial" font-size="9" fill="#666">bottlenecks, logs</text>
    <rect x="220" y="522" width="550" height="55" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="495" y="538" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Key Takeaways</text>
    <text x="250" y="555" font-family="Arial" font-size="8" fill="#666">1. Monitor CPU/Memory/Disk for performance</text>
    <text x="250" y="568" font-family="Arial" font-size="8" fill="#666">2. Track process states: Running, Ready, Blocked, Zombie</text>
    <text x="410" y="555" font-family="Arial" font-size="8" fill="#666">3. Use ping/traceroute/netstat for network</text>
    <text x="410" y="568" font-family="Arial" font-size="8" fill="#666">4. Review logs for security and troubleshooting</text>
  </g>
</svg>