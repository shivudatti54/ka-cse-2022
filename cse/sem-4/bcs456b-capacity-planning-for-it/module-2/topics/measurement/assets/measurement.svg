<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers software measurement fundamentals, metrics classification, Function Points analysis, COCOMO effort estimation, and cyclomatic complexity measurement for quality assessment.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Software Measurement and Metrics</text>
  </g>
  
  <g class="step" id="step1" data-narration="Measurement assigns quantitative numbers to software attributes using well-defined rules. Software metrics are derived measures for products, processes, and resource evaluation.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Foundations &amp; Metrics Classification</text>
    <rect x="40" y="88" width="220" height="42" fill="#e3f2fd" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="9" fill="#1565c0">• Measurement: assigning numbers</text>
    <text x="50" y="115" font-family="Arial" font-size="9" fill="#1565c0">  to software attributes</text>
    <text x="50" y="125" font-family="Arial" font-size="9" fill="#1565c0">• Direct: LOC, defects counted</text>
    <text x="50" y="135" font-family="Arial" font-size="9" fill="#1565c0">• Indirect: effort from size</text>
    <rect x="270" y="88" width="230" height="42" fill="#e8f5e9" rx="3"/>
    <text x="280" y="102" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Product Metrics</text>
    <text x="280" y="115" font-family="Arial" font-size="9" fill="#2e7d32">Size: LOC, Function Points</text>
    <text x="280" y="125" font-family="Arial" font-size="9" fill="#2e7d32">Complexity: Cyclomatic</text>
    <text x="380" y="125" font-family="Arial" font-size="9" fill="#2e7d32">Quality: Defect Density</text>
    <rect x="510" y="88" width="250" height="42" fill="#fff3e0" rx="3"/>
    <text x="520" y="102" font-family="Arial" font-size="9" font-weight="bold" fill="#f57c00">Process &amp; Resource</text>
    <text x="520" y="115" font-family="Arial" font-size="9" fill="#e65100">Process: Defect removal,</text>
    <text x="590" y="115" font-family="Arial" font-size="9" fill="#e65100">productivity</text>
    <text x="520" y="125" font-family="Arial" font-size="9" fill="#e65100">Resource: Effort, cost,</text>
    <text x="590" y="125" font-family="Arial" font-size="9" fill="#e65100">duration</text>
  </g>
  
  <g class="step" id="step2" data-narration="Function Point Analysis measures software size from user perspective. Five functional components: EI, EO, EQ, EIF, and ILF are weighted by complexity levels for accurate sizing.">
    <rect x="20" y="146" width="760" height="91" fill="#ffffff" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Function Point Analysis (FPA)</text>
    <text x="40" y="182" font-family="Arial" font-size="9" fill="#333">Five Components:</text>
    <rect x="40" y="188" width="140" height="30" fill="#f3e5f5" rx="2"/>
    <text x="50" y="200" font-family="Arial" font-size="8" fill="#7b1fa2">EI: External Input (3/4/6)</text>
    <rect x="190" y="188" width="140" height="30" fill="#f3e5f5" rx="2"/>
    <text x="200" y="200" font-family="Arial" font-size="8" fill="#7b1fa2">EO: External Output (4/5/7)</text>
    <rect x="340" y="188" width="140" height="30" fill="#f3e5f5" rx="2"/>
    <text x="350" y="200" font-family="Arial" font-size="8" fill="#7b1fa2">EQ: External Inquiry (3/4/6)</text>
    <rect x="490" y="188" width="140" height="30" fill="#f3e5f5" rx="2"/>
    <text x="500" y="200" font-family="Arial" font-size="8" fill="#7b1fa2">EIF: Interface File (5/7/10)</text>
    <rect x="640" y="188" width="130" height="30" fill="#f3e5f5" rx="2"/>
    <text x="650" y="200" font-family="Arial" font-size="8" fill="#7b1fa2">ILF: Logical File (7/10/15)</text>
    <text x="40" y="230" font-family="Arial" font-size="9" fill="#333">Adjusted FP = Unadjusted FP × VAF, where VAF = 0.65 + (14 characteristics sum)/100</text>
  </g>
  
  <g class="step" id="step3" data-narration="Basic COCOMO model estimates effort using KLOC and development mode. Three distinct modes exist: organic, semi-detached, and embedded with unique scaling constants.">
    <rect x="20" y="246" width="760" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="266" font-family="Arial" font-size="12" font-weight="bold" fill="#f57c00">COCOMO Model</text>
    <text x="40" y="284" font-family="Arial" font-size="9" fill="#333">Effort = a × (KLOC)^b person-months | Duration = c × (Effort)^d months</text>
    <rect x="40" y="292" width="220" height="30" fill="#fff3e0" rx="3"/>
    <text x="50" y="302" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Organic Mode</text>
    <text x="140" y="302" font-family="Arial" font-size="9" fill="#333">a=2.4, b=1.05</text>
    <text x="200" y="302" font-family="Arial" font-size="9" fill="#333">c=2.5, d=0.38</text>
    <rect x="270" y="292" width="220" height="30" fill="#fff3e0" rx="3"/>
    <text x="280" y="302" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Semi-Detached</text>
    <text x="390" y="302" font-family="Arial" font-size="9" fill="#333">a=3.0, b=1.12</text>
    <text x="450" y="302" font-family="Arial" font-size="9" fill="#333">c=2.5, d=0.35</text>
    <rect x="500" y="292" width="220" height="30" fill="#fff3e0" rx="3"/>
    <text x="510" y="302" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">Embedded Mode</text>
    <text x="620" y="302" font-family="Arial" font-size="9" fill="#333">a=3.6, b=1.20</text>
    <text x="680" y="302" font-family="Arial" font-size="9" fill="#333">c=2.5, d=0.32</text>
    <text x="40" y="324" font-family="Arial" font-size="9" fill="#333">Example: 25 KLOC organic = 68.35 PM effort, 17.8 months duration, ~4 developers</text>
  </g>
  
  <g class="step" id="step4" data-narration="Cyclomatic Complexity measures linearly independent paths using V(G) = E - N + 2P or simply decision points + 1. Values above 10 need refactoring.">
    <rect x="20" y="334" width="760" height="80" fill="#ffffff" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="354" font-family="Arial" font-size="12" font-weight="bold" fill="#d32f2f">Cyclomatic Complexity</text>
    <rect x="40" y="367" width="350" height="40" fill="#ffebee" rx="3"/>
    <text x="50" y="380" font-family="Arial" font-size="9" fill="#c62828">Formula: V(G) = E - N + 2P</text>
    <text x="50" y="394" font-family="Arial" font-size="9" fill="#c62828">or simply: Number of decision points + 1</text>
    <text x="200" y="394" font-family="Arial" font-size="9" fill="#c62828">E=edges, N=nodes, P=connected components</text>
    <rect x="400" y="367" width="370" height="40" fill="#ffebee" rx="3"/>
    <text x="410" y="380" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">Interpretation</text>
    <text x="410" y="394" font-family="Arial" font-size="9" fill="#333">1-10: Low risk, well-structured</text>
    <text x="530" y="394" font-family="Arial" font-size="9" fill="#333">11-20: Moderate risk</text>
    <text x="640" y="394" font-family="Arial" font-size="9" fill="#333">&gt;20: High risk, refactor needed</text>
  </g>
  
  <g class="step" id="step5" data-narration="Four measurement scales exist: nominal (categories), ordinal (ordered), interval (no true zero), and ratio (true zero). Each allows different statistics.">
    <rect x="20" y="422" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="442" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Measurement Scales</text>
    <rect x="40" y="457" width="170" height="38" fill="#e8f5e9" rx="3"/>
    <text x="50" y="470" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Nominal</text>
    <text x="50" y="484" font-family="Arial" font-size="8" fill="#333">Categories only (type)</text>
    <text x="130" y="484" font-family="Arial" font-size="8" fill="#333">Mode only</text>
    <rect x="220" y="457" width="170" height="38" fill="#e8f5e9" rx="3"/>
    <text x="230" y="470" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Ordinal</text>
    <text x="230" y="484" font-family="Arial" font-size="8" fill="#333">Ordered categories</text>
    <text x="310" y="484" font-family="Arial" font-size="8" fill="#333">(severity levels)</text>
    <rect x="400" y="457" width="170" height="38" fill="#e8f5e9" rx="3"/>
    <text x="410" y="470" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Interval</text>
    <text x="410" y="484" font-family="Arial" font-size="8" fill="#333">Meaningful intervals</text>
    <text x="490" y="484" font-family="Arial" font-size="8" fill="#333">(Celsius, no true zero)</text>
    <rect x="580" y="457" width="190" height="38" fill="#e8f5e9" rx="3"/>
    <text x="590" y="470" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">Ratio</text>
    <text x="590" y="484" font-family="Arial" font-size="8" fill="#333">True zero exists</text>
    <text x="670" y="484" font-family="Arial" font-size="8" fill="#333">(LOC, effort)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Function Points provide language-independence over LOC. Key exam topics include FP components, COCOMO formulas, complexity thresholds, metric classification, and measurement scale types.">
    <rect x="20" y="510" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="530" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Key Exam Points</text>
    <rect x="40" y="542" width="230" height="42" fill="#e3f2fd" rx="3"/>
    <text x="50" y="555" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">FP vs LOC Advantages</text>
    <text x="50" y="568" font-family="Arial" font-size="8" fill="#333">• Language-independent</text>
    <text x="50" y="580" font-family="Arial" font-size="8" fill="#333">• User-oriented functional size</text>
    <rect x="280" y="542" width="240" height="42" fill="#e3f2fd" rx="3"/>
    <text x="290" y="555" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Metric vs Measure</text>
    <text x="290" y="568" font-family="Arial" font-size="8" fill="#333">Measure: raw quantitative value</text>
    <text x="290" y="580" font-family="Arial" font-size="8" fill="#333">Metric: derived for decisions</text>
    <rect x="530" y="542" width="240" height="42" fill="#e3f2fd" rx="3"/>
    <text x="540" y="555" font-family="Arial" font-size="9" font-weight="bold" fill="#0d47a1">Exam Formulas</text>
    <text x="540" y="568" font-family="Arial" font-size="8" fill="#333">FP = Unadjusted FP × VAF</text>
    <text x="540" y="580" font-family="Arial" font-size="8" fill="#333">COCOMO: Effort = a×(KLOC)^b</text>
  </g>
</svg>