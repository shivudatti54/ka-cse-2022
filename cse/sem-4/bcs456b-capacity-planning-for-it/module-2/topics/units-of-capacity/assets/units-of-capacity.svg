<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about Units of Capacity in Computer Systems. We'll explore how computers measure and organize data storage efficiently.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Units of Capacity in Computer Systems</text>
  </g>
  
  <g class="step" id="step1" data-narration="The fundamental unit is the bit, representing 0 or 1. A nibble has 4 bits, and a byte contains 8 bits, the standard addressable unit.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Basic Data Units</text>
    <rect x="40" y="95" width="200" height="30" fill="#bbdefb" rx="3"/>
    <text x="140" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#0d47a1">Bit (0 or 1)</text>
    <rect x="260" y="95" width="200" height="30" fill="#90caf9" rx="3"/>
    <text x="360" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#0d47a1">Nibble (4 bits)</text>
    <rect x="480" y="95" width="280" height="30" fill="#64b5f6" rx="3"/>
    <text x="620" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#0d47a1">Byte (8 bits) - Standard Unit</text>
  </g>
  
  <g class="step" id="step2" data-narration="Decimal prefixes use powers of 10, while Binary prefixes use powers of 2. This difference causes the 7.4% discrepancy in storage reporting.">
    <rect x="20" y="146" width="760" height="90" fill="#e8f5e9" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Decimal vs Binary Prefixes</text>
    <rect x="40" y="185" width="340" height="40" fill="#c8e6c9" rx="3"/>
    <text x="60" y="202" font-family="Arial" font-size="11" fill="#1b5e20">Decimal (SI): K=10³, M=10⁶, G=10⁹</text>
    <text x="60" y="218" font-family="Arial" font-size="10" fill="#1b5e20">1 KB = 1,000 bytes</text>
    <rect x="400" y="185" width="340" height="40" fill="#a5d6a7" rx="3"/>
    <text x="420" y="202" font-family="Arial" font-size="11" fill="#1b5e20">Binary (IEC): Ki=2¹⁰, Mi=2²⁰, Gi=2³⁰</text>
    <text x="420" y="218" font-family="Arial" font-size="10" fill="#1b5e20">1 KiB = 1,024 bytes</text>
    <text x="620" y="235" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">~7.4% difference at Giga level</text>
  </g>
  
  <g class="step" id="step3" data-narration="Memory follows a hierarchy: Word is the natural processor unit, cache ranges KB to MB, while RAM uses GB, all using binary addressing.">
    <rect x="20" y="244" width="760" height="95" fill="#fff3e0" rx="5"/>
    <text x="40" y="266" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Memory Organization Hierarchy</text>
    <rect x="40" y="285" width="170" height="42" fill="#ffe0b2" rx="3"/>
    <text x="125" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Word</text>
    <text x="125" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">8, 16, 32, 64 bits</text>
    <rect x="225" y="285" width="170" height="42" fill="#ffcc80" rx="3"/>
    <text x="310" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Cache (L1/L2/L3)</text>
    <text x="310" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">16 KB to MB</text>
    <rect x="410" y="285" width="170" height="42" fill="#ffb74d" rx="3"/>
    <text x="495" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">RAM</text>
    <text x="495" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">4 GB to 128 GB</text>
    <rect x="595" y="285" width="165" height="42" fill="#ffa726" rx="3"/>
    <text x="677" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Secondary Storage</text>
    <text x="677" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">GB to TB</text>
  </g>
  
  <g class="step" id="step4" data-narration="For a 32-bit byte-addressable system, maximum memory is 2³² bytes, which equals approximately 4 GB. This is why 32-bit systems have a 4 GB limit.">
    <rect x="20" y="347" width="760" height="85" fill="#f3e5f5" rx="5"/>
    <text x="40" y="369" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Maximum Addressable Memory Calculation</text>
    <rect x="40" y="385" width="300" height="35" fill="#e1bee7" rx="3"/>
    <text x="50" y="402" font-family="Arial" font-size="11" fill="#4a148c">32-bit address bus, byte-addressable</text>
    <rect x="360" y="385" width="150" height="35" fill="#ce93d8" rx="3"/>
    <text x="435" y="400" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">2³² addresses</text>
    <text x="435" y="415" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">= 4,294,967,296</text>
    <rect x="530" y="385" width="230" height="35" fill="#ba68c8" rx="3"/>
    <text x="645" y="400" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">= 4 GiB ≈ 4.29 GB</text>
    <text x="645" y="415" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">32-bit system limit</text>
  </g>
  
  <g class="step" id="step5" data-narration="Storage manufacturers use decimal prefixes. A 1 TB drive shows as 931 GB in binary. This explains why advertised capacity differs from OS reported capacity.">
    <rect x="20" y="440" width="760" height="85" fill="#ffebee" rx="5"/>
    <text x="40" y="462" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Storage Capacity Discrepancy</text>
    <rect x="40" y="478" width="340" height="35" fill="#ffcdd2" rx="3"/>
    <text x="50" y="495" font-family="Arial" font-size="11" fill="#b71c1c">Manufacturer (Decimal): 1 TB = 10¹² bytes</text>
    <text x="50" y="508" font-family="Arial" font-size="10" fill="#b71c1c">= 1,000,000,000,000 bytes</text>
    <rect x="400" y="478" width="360" height="35" fill="#ef9a9a" rx="3"/>
    <text x="580" y="495" text-anchor="middle" font-family="Arial" font-size="11" fill="#b71c1c">OS shows (Binary): 0.9095 TiB</text>
    <text x="580" y="508" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">≈ 931.32 GiB</text>
  </g>
  
  <g class="step" id="step6" data-narration="To convert between systems: divide decimal by 1000, or multiply by 0.931 for the binary equivalent. Always verify which units your system uses.">
    <rect x="20" y="533" width="760" height="55" fill="#e3f2fd" rx="5"/>
    <text x="40" y="555" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Quick Conversion Reference</text>
    <text x="40" y="578" font-family="Arial" font-size="11" fill="#0d47a1">Decimal → Binary: divide by 1,000 | Binary → Decimal: multiply by 1,024</text>
  </g>
</svg>