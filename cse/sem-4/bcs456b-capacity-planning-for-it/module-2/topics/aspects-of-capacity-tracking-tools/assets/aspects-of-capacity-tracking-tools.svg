<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Capacity tracking tools monitor IT infrastructure resources like CPU, memory, storage, and network to ensure optimal performance and cost efficiency in cloud environments.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Aspects of Capacity Tracking Tools</text>
  </g>
  
  <g class="step" id="step1" data-narration="Capacity tracking involves continuous monitoring of computational resources. It prevents system failures, optimizes resource allocation, and ensures applications meet performance Service Level Agreements.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Capacity Tracking?</text>
    <rect x="40" y="92" width="180" height="36" fill="#1976d2" rx="4"/>
    <text x="130" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Prevents Failures</text>
    <rect x="230" y="92" width="180" height="36" fill="#1976d2" rx="4"/>
    <text x="320" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Optimizes Resources</text>
    <text x="320" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="white">and Costs</text>
    <rect x="420" y="92" width="180" height="36" fill="#1976d2" rx="4"/>
    <text x="510" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Ensures SLA</text>
    <text x="510" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Compliance</text>
    <rect x="610" y="92" width="160" height="36" fill="#1976d2" rx="4"/>
    <text x="690" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Enables</text>
    <text x="690" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Proactive Planning</text>
  </g>
  
  <g class="step" id="step2" data-narration="Capacity tools track four core metric categories: Compute (CPU utilization, vCPU allocation), Memory (RAM, swap usage), Storage (disk space, IOPS), and Network (bandwidth, latency).">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Core Metrics Tracked</text>
    <rect x="40" y="182" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="125" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Compute (CPU)</text>
    <text x="125" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8e6c9">vCPU, Queue Length</text>
    <rect x="220" y="182" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="305" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Memory (RAM)</text>
    <text x="305" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8e6c9">Swap, Paging, Leaks</text>
    <rect x="400" y="182" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="485" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Storage</text>
    <text x="485" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8e6c9">Disk, IOPS, Latency</text>
    <rect x="580" y="182" width="190" height="36" fill="#388e3c" rx="4"/>
    <text x="675" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Network</text>
    <text x="675" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#c8e6c9">Bandwidth, Latency</text>
  </g>
  
  <g class="step" id="step3" data-narration="Three main types: Agent-Based (Nagios, Zabbix) provide deep insights but need installation; Agentless (SNMP-based) are easier to deploy; Cloud-Native tools (CloudWatch, Azure Monitor) integrate with providers.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Types of Capacity Tracking Tools</text>
    <rect x="40" y="270" width="230" height="38" fill="#ff9800" rx="4"/>
    <text x="155" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Agent-Based Tools</text>
    <text x="155" y="303" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffe0b2">Nagios, Zabbix, Datadog</text>
    <rect x="280" y="270" width="230" height="38" fill="#ff9800" rx="4"/>
    <text x="395" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Agentless Tools</text>
    <text x="395" y="303" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffe0b2">SolarWinds, SNMP-based</text>
    <rect x="520" y="270" width="250" height="38" fill="#ff9800" rx="4"/>
    <text x="645" y="288" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Cloud-Native Tools</text>
    <text x="645" y="303" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffe0b2">CloudWatch, Azure Monitor</text>
  </g>
  
  <g class="step" id="step4" data-narration="Threshold-based alerting notifies administrators when resources exceed limits. Static thresholds use fixed values; dynamic thresholds use machine learning to adapt to normal patterns.">
    <rect x="20" y="322" width="760" height="105" fill="#ffebee" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Threshold-Based Alerts</text>
    <rect x="40" y="358" width="340" height="38" fill="#f44336" rx="4"/>
    <text x="210" y="376" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Static Thresholds</text>
    <text x="210" y="391" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffcdd2">Fixed values (CPU &gt; 80%)</text>
    <rect x="390" y="358" width="340" height="38" fill="#f44336" rx="4"/>
    <text x="560" y="376" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Dynamic Thresholds</text>
    <text x="560" y="391" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffcdd2">ML-based, adapts to patterns</text>
    <text x="40" y="420" font-family="Arial" font-size="9" fill="#666">Notification: Email, SMS, Slack, PagerDuty</text>
  </g>
  
  <g class="step" id="step5" data-narration="Modern capacity tracking uses a three-layer architecture: Data Collection (agents, SNMP, APIs), Processing (aggregation, stream processing), and Presentation (dashboards, reports, APIs).">
    <rect x="20" y="436" width="760" height="76" fill="#f3e5f5" rx="8"/>
    <text x="40" y="458" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Three-Layer Architecture</text>
    <rect x="40" y="474" width="200" height="30" fill="#9c27b0" rx="4"/>
    <text x="140" y="492" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Data Collection</text>
    <line x1="245" y1="489" x2="265" y2="489" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="270" y="474" width="200" height="30" fill="#9c27b0" rx="4"/>
    <text x="370" y="492" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Processing</text>
    <line x1="475" y1="489" x2="495" y2="489" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="500" y="474" width="200" height="30" fill="#9c27b0" rx="4"/>
    <text x="600" y="492" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Presentation</text>
  </g>
  
  <g class="step" id="step6" data-narration="Cost optimization in capacity tracking helps reduce cloud spending through right-sizing instances, purchasing reserved capacity plans, and generating utilization reports to identify idle or underutilized resources.">
    <rect x="20" y="522" width="760" height="66" fill="#e8f5e9" rx="8"/>
    <text x="40" y="544" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Cost Optimization Features</text>
    <rect x="40" y="558" width="220" height="24" fill="#388e3c" rx="4"/>
    <text x="150" y="574" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Right-Sizing</text>
    <rect x="270" y="558" width="220" height="24" fill="#388e3c" rx="4"/>
    <text x="380" y="574" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Reserved Instances</text>
    <rect x="500" y="558" width="270" height="24" fill="#388e3c" rx="4"/>
    <text x="635" y="574" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Utilization Reports</text>
  </g>
</svg>