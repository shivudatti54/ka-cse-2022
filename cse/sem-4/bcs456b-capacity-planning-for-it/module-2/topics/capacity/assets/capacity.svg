<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Capacity in Data Structures defines the maximum number of elements a container can hold at any point in memory allocation and storage management.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Capacity in Data Structures</text>
  </g>
  
  <g class="step" id="step1" data-narration="Static data structures reserve fixed capacity at compile time and cannot change size, while dynamic structures allocate memory and resize automatically during runtime execution.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Static vs Dynamic Data Structures</text>
    <rect x="40" y="85" width="160" height="45" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="120" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">STATIC</text>
    <text x="120" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Fixed size at compile</text>
    <text x="120" y="125" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Cannot resize</text>
    <path d="M240 107 L280 107" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="300" y="85" width="180" height="45" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="390" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">DYNAMIC</text>
    <text x="390" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Capacity changes at runtime</text>
    <text x="390" y="125" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Uses resize mechanism</text>
  </g>
  
  <g class="step" id="step2" data-narration="Dynamic arrays implement geometric growth by doubling capacity when full, allocating a new larger array and copying all existing elements to the new memory location.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Dynamic Array Capacity Management</text>
    <rect x="40" y="175" width="340" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="60" y="188" font-family="Arial" font-size="9" fill="#666">Initial: capacity=1, size=0</text>
    <text x="60" y="200" font-family="Arial" font-size="9" fill="#666">Add 1: size=1, capacity=1 (no resize)</text>
    <text x="60" y="212" font-family="Arial" font-size="9" fill="#666">Add 2: size=2, FULL → resize to 2</text>
    <text x="420" y="188" font-family="Arial" font-size="9" fill="#666">Add 3: size=3, capacity=2 (full)</text>
    <text x="420" y="200" font-family="Arial" font-size="9" fill="#666">Resize to 4, copy 2 elements</text>
    <text x="420" y="212" font-family="Arial" font-size="9" fill="#666">Strategy: Double capacity each time</text>
  </g>
  
  <g class="step" id="step3" data-narration="Amortized analysis proves O(1) insertion cost because geometric growth makes resize operations occur less frequently as the array size increases significantly over time.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Amortized Time Complexity</text>
    <rect x="40" y="263" width="220" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="278" font-family="Arial" font-size="10" fill="#333">Why O(1) Amortized?</text>
    <text x="50" y="292" font-family="Arial" font-size="9" fill="#666">Resizes at: 1,2,4,8,16...n</text>
    <text x="50" y="302" font-family="Arial" font-size="9" fill="#666">Total copies: 1+2+4+...+n = 2n-1</text>
    <rect x="280" y="263" width="220" height="42" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="290" y="278" font-family="Arial" font-size="10" fill="#333">Linear Growth: O(n)</text>
    <text x="290" y="292" font-family="Arial" font-size="9" fill="#666">Resizes at: 1,2,3,4,5...n</text>
    <text x="290" y="302" font-family="Arial" font-size="9" fill="#666">Total copies: n(n+1)/2 = O(n²)</text>
    <rect x="520" y="263" width="220" height="42" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="530" y="278" font-family="Arial" font-size="10" fill="#333">Geometric Growth: O(1)</text>
    <text x="530" y="292" font-family="Arial" font-size="9" fill="#666">Amortized: (n + 2n)/n = O(1)</text>
    <text x="530" y="302" font-family="Arial" font-size="9" fill="#666">Constant factor per operation</text>
  </g>
  
  <g class="step" id="step4" data-narration="Stacks and queues track capacity using pointer variables: the top pointer for stack operations, and front plus rear pointers for both linear and circular queue implementations.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Capacity in Stacks and Queues</text>
    <rect x="40" y="352" width="240" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="367" font-family="Arial" font-size="10" fill="#333">Stack: Grows from bottom</text>
    <text x="50" y="380" font-family="Arial" font-size="9" fill="#666">Uses 'top' pointer</text>
    <text x="50" y="390" font-family="Arial" font-size="9" fill="#666">Push: increment top, overflow if full</text>
    <rect x="300" y="352" width="240" height="42" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="310" y="367" font-family="Arial" font-size="10" fill="#333">Linear Queue: Shift on dequeue</text>
    <text x="310" y="380" font-family="Arial" font-size="9" fill="#666">O(n) dequeue performance</text>
    <text x="310" y="390" font-family="Arial" font-size="9" fill="#666">Wasteful of front space</text>
    <rect x="560" y="352" width="200" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="570" y="367" font-family="Arial" font-size="10" fill="#333">Circular Queue</text>
    <text x="570" y="380" font-family="Arial" font-size="9" fill="#666">Wraparound indexing</text>
    <text x="570" y="390" font-family="Arial" font-size="9" fill="#666">O(1) enqueue and dequeue</text>
  </g>
  
  <g class="step" id="step5" data-narration="Setting an explicit initial capacity eliminates costly resize operations during growth, but guessing too high wastes memory, so predefined sizes warrant explicit capacity allocation in advance.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Initial Capacity Considerations</text>
    <rect x="40" y="440" width="340" height="42" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="455" font-family="Arial" font-size="10" fill="#333">With Initial Capacity</text>
    <text x="50" y="468" font-family="Arial" font-size="9" fill="#666">ArrayList&lt;Integer&gt; list = new ArrayList&lt;&gt;(1000000);</text>
    <text x="50" y="478" font-family="Arial" font-size="9" fill="#388e3c">No resize needed, optimal performance</text>
    <rect x="400" y="440" width="340" height="42" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="410" y="455" font-family="Arial" font-size="10" fill="#333">Default Initialization</text>
    <text x="410" y="468" font-family="Arial" font-size="9" fill="#666">ArrayList starts at capacity 10</text>
    <text x="410" y="478" font-family="Arial" font-size="9" fill="#f44336">17 resizes needed for 1M elements</text>
  </g>
  
  <g class="step" id="step6" data-narration="This practical example traces inserting numbers 1 through 10 into a doubling dynamic array, showing exactly three resize operations and eleven total element copies during the entire process.">
    <rect x="20" y="498" width="760" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="515" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Example: Dynamic Array Growth (Insert 1-10)</text>
    <rect x="40" y="527" width="720" height="52" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="542" font-family="Arial" font-size="9" fill="#333">Insert 1: size=1, cap=1</text>
    <text x="130" y="542" font-family="Arial" font-size="9" fill="#333">Insert 2: size=2, cap=2 (resize, copy 1)</text>
    <text x="290" y="542" font-family="Arial" font-size="9" fill="#333">Insert 3-4: size=4, cap=4</text>
    <text x="410" y="542" font-family="Arial" font-size="9" fill="#333">Insert 5-8: size=8, cap=8</text>
    <text x="500" y="542" font-family="Arial" font-size="9" fill="#f44336">Insert 9: size=9, cap=8 (resize, copy 8)</text>
    <text x="50" y="558" font-family="Arial" font-size="9" fill="#333">Insert 10: size=10, cap=16</text>
    <text x="150" y="558" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">Total Resize Operations: 3</text>
    <text x="330" y="558" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">Total Elements Copied: 11</text>
    <text x="490" y="558" font-family="Arial" font-size="10" fill="#388e3c" font-weight="bold">Amortized: ~2.2 ops/insertion</text>
    <text x="660" y="558" font-family="Arial" font-size="8" fill="#666">(9 insertions + 11 copies)/9</text>
  </g>
</svg>