<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Capacity Planning in Operating Systems determines optimal computing resources needed to meet workload demands efficiently while maintaining performance standards and service quality.">
    <rect x="20" y="10" width="760" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Capacity Planning in Operating Systems</text>
  </g>
  
  <g class="step" id="step1" data-narration="Without capacity planning, under-provisioning causes serious performance issues and system crashes while over-provisioning wastes significant money. Effective planning balances both optimally.">
    <rect x="20" y="58" width="760" height="80" rx="8" fill="#ffffff" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Why Capacity Planning Matters</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">• Prevents performance degradation from under-provisioning</text>
    <text x="40" y="116" font-family="Arial" font-size="10" fill="#333">• Avoids unnecessary costs from over-provisioning</text>
    <text x="40" y="132" font-family="Arial" font-size="10" fill="#333">• Ensures resources available when needed</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three time horizons exist: short-term covers days to weeks for daily fluctuations, medium-term spans months for seasonal changes, and long-term addresses years for major infrastructure.">
    <rect x="20" y="146" width="760" height="80" rx="8" fill="#ffffff" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Types of Capacity Planning</text>
    <rect x="40" y="180" width="230" height="40" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="155" y="194" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Short-term</text>
    <text x="155" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Days to weeks</text>
    <rect x="285" y="180" width="230" height="40" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="400" y="194" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Medium-term</text>
    <text x="400" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Months</text>
    <rect x="530" y="180" width="230" height="40" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="645" y="194" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Long-term</text>
    <text x="645" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">1-3+ years</text>
  </g>
  
  <g class="step" id="step3" data-narration="Four key resources need planning: CPU handles processing, Memory manages RAM, Storage covers disk space, and Network handles bandwidth today.">
    <rect x="20" y="234" width="760" height="80" rx="8" fill="#ffffff" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Four Key Resources</text>
    <rect x="40" y="270" width="170" height="38" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="125" y="284" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">CPU</text>
    <text x="125" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cores, speed, threads</text>
    <rect x="220" y="270" width="170" height="38" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="305" y="284" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Memory</text>
    <text x="305" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">RAM, page faults</text>
    <rect x="400" y="270" width="170" height="38" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="485" y="284" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Storage</text>
    <text x="485" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Disk, IOPS, capacity</text>
    <rect x="580" y="270" width="180" height="38" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="670" y="284" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Network</text>
    <text x="670" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Bandwidth, latency</text>
  </g>
  
  <g class="step" id="step4" data-narration="The capacity planning process follows six steps: characterize workload, monitor performance, analyze trends, model capacity, forecast needs, then optimize resources.">
    <rect x="20" y="322" width="760" height="80" rx="8" fill="#ffffff" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Capacity Planning Process</text>
    <rect x="40" y="358" width="110" height="38" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="95" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">1. Characterize</text>
    <text x="95" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Workload</text>
    <rect x="160" y="358" width="110" height="38" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="215" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">2. Monitor</text>
    <text x="215" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Performance</text>
    <rect x="280" y="358" width="110" height="38" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="335" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">3. Analyze</text>
    <text x="335" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Trends</text>
    <rect x="400" y="358" width="110" height="38" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="455" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">4. Model</text>
    <text x="455" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Capacity</text>
    <rect x="520" y="358" width="110" height="38" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="575" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">5. Forecast</text>
    <text x="575" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Future Needs</text>
    <rect x="640" y="358" width="120" height="38" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="700" y="372" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#c62828">6. Optimize</text>
    <text x="700" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Resources</text>
  </g>
  
  <g class="step" id="step5" data-narration="Key formulas include: Utilization equals used divided by total times 100, capacity headroom is total minus used, and Little's Law is L equals lambda times W.">
    <rect x="20" y="410" width="760" height="80" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Key Formulas</text>
    <rect x="40" y="448" width="220" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="150" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Utilization %</text>
    <text x="150" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">(Used/Total)×100</text>
    <rect x="270" y="448" width="220" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="380" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Capacity Headroom</text>
    <text x="380" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Total - Current Usage</text>
    <rect x="500" y="448" width="260" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="630" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Little's Law</text>
    <text x="630" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">L = λ × W (avg items = rate × time)</text>
  </g>
  
  <g class="step" id="step6" data-narration="Remember: keep CPU and memory below 80% utilization, storage with 20% free. Always optimize before buying hardware. Monitor, analyze, forecast, then plan.">
    <rect x="20" y="498" width="760" height="99" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Exam Tips &amp; Summary</text>
    <text x="40" y="542" font-family="Arial" font-size="10" fill="#333">• CPU/Memory: Keep utilization below 70-80% for healthy headroom</text>
    <text x="40" y="558" font-family="Arial" font-size="10" fill="#333">• Storage: Maintain 20-30% free space for performance and snapshots</text>
    <text x="40" y="574" font-family="Arial" font-size="10" fill="#333">• Always explore optimization (load balancing, tuning) before adding hardware</text>
    <text x="40" y="590" font-family="Arial" font-size="10" fill="#333">• Create baselines first - essential for identifying abnormal behavior</text>
  </g>
</svg>