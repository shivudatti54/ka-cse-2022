<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers process management in operating systems, including process states, scheduling algorithms, interprocess communication techniques, and various types of IPC.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Process Management in Operating Systems</text>
  </g>
  
  <g class="step" id="step1" data-narration="A process is a program in execution with components: program code, program counter, CPU registers, stack, heap, data section, and system resources.">
    <rect x="20" y="58" width="760" height="95" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Process Definition</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">A process is a program in execution - it includes:</text>
    <rect x="40" y="108" width="160" height="35" rx="4" fill="white" stroke="#90caf9"/>
    <text x="50" y="122" font-family="Arial" font-size="9" fill="#333">• Program Code</text>
    <text x="50" y="136" font-family="Arial" font-size="9" fill="#333">• Program Counter (PC)</text>
    <rect x="210" y="108" width="160" height="35" rx="4" fill="white" stroke="#90caf9"/>
    <text x="220" y="122" font-family="Arial" font-size="9" fill="#333">• CPU Registers</text>
    <text x="220" y="136" font-family="Arial" font-size="9" fill="#333">• Stack</text>
    <rect x="380" y="108" width="160" height="35" rx="4" fill="white" stroke="#90caf9"/>
    <text x="390" y="122" font-family="Arial" font-size="9" fill="#333">• Heap</text>
    <text x="390" y="136" font-family="Arial" font-size="9" fill="#333">• Data Section</text>
    <rect x="550" y="108" width="180" height="35" rx="4" fill="white" stroke="#90caf9"/>
    <text x="560" y="122" font-family="Arial" font-size="9" fill="#333">• System Resources</text>
    <text x="560" y="136" font-family="Arial" font-size="9" fill="#333">(Files, I/O, Network)</text>
  </g>
  
  <g class="step" id="step2" data-narration="The five process states are: New (being created), Ready (waiting for CPU), Running (executing), Waiting (blocked for I/O), and Terminated.">
    <rect x="20" y="161" width="760" height="95" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="183" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Five Process States</text>
    <rect x="40" y="195" width="120" height="50" rx="6" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="100" y="215" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">NEW</text>
    <text x="100" y="230" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Created</text>
    <line x1="160" y1="220" x2="195" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="200" y="195" width="120" height="50" rx="6" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="260" y="215" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">READY</text>
    <text x="260" y="230" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Waiting for CPU</text>
    <line x1="320" y1="220" x2="355" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="360" y="195" width="120" height="50" rx="6" fill="#66bb6a" stroke="#388e3c"/>
    <text x="420" y="215" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">RUNNING</text>
    <text x="420" y="230" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Executing</text>
    <line x1="480" y1="220" x2="515" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="520" y="195" width="120" height="50" rx="6" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="580" y="215" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">WAITING</text>
    <text x="580" y="230" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">Blocked (I/O)</text>
    <line x1="520" y1="245" x2="380" y2="245" stroke="#666" stroke-width="1.5"/>
    <line x1="380" y1="245" x2="380" y2="220" stroke="#666" stroke-width="1.5"/>
    <line x1="200" y1="245" x2="100" y2="245" stroke="#666" stroke-width="1.5"/>
    <line x1="100" y1="245" x2="100" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="640" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Timer interrupt</text>
    <text x="640" y="235" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">or preemption</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Process Control Block (PCB) stores process ID, state, CPU registers, memory info, scheduling details, accounting, and I/O status information.">
    <rect x="20" y="264" width="760" height="95" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="286" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">Process Control Block (PCB)</text>
    <rect x="40" y="298" width="350" height="52" rx="4" fill="white" stroke="#ffcc80"/>
    <text x="50" y="312" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Process Identification</text>
    <text x="50" y="326" font-family="Arial" font-size="9" fill="#333">• PID (Process ID) • PPID (Parent PID)</text>
    <text x="50" y="340" font-family="Arial" font-size="9" fill="#333">• User/Group IDs</text>
    <rect x="400" y="298" width="170" height="52" rx="4" fill="white" stroke="#ffcc80"/>
    <text x="410" y="312" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">CPU Registers</text>
    <text x="410" y="326" font-family="Arial" font-size="9" fill="#333">• Program Counter</text>
    <text x="410" y="340" font-family="Arial" font-size="9" fill="#333">• General Purpose Registers</text>
    <rect x="580" y="298" width="180" height="52" rx="4" fill="white" stroke="#ffcc80"/>
    <text x="590" y="312" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Memory Management</text>
    <text x="590" y="326" font-family="Arial" font-size="9" fill="#333">• Page Tables</text>
    <text x="590" y="340" font-family="Arial" font-size="9" fill="#333">• Memory Limits</text>
    <rect x="200" y="298" width="180" height="52" rx="4" fill="white" stroke="#ffcc80" opacity="0"/>
    <rect x="40" y="298" width="720" height="22" rx="4" fill="#ffe0b2" opacity="0"/>
    <rect x="40" y="325" width="720" height="22" rx="4" fill="#ffe0b2" opacity="0"/>
  </g>
  
  <g class="step" id="step4" data-narration="CPU scheduling algorithms like FCFS, SJF, Priority, and Round Robin are used to decide which process runs on the CPU at a given time.">
    <rect x="20" y="367" width="760" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="389" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2">CPU Scheduling Algorithms</text>
    <rect x="40" y="403" width="170" height="50" rx="6" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="125" y="420" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">FCFS</text>
    <text x="125" y="436" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">First Come First Served</text>
    <rect x="220" y="403" width="170" height="50" rx="6" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="305" y="420" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">SJF</text>
    <text x="305" y="436" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Shortest Job First</text>
    <rect x="400" y="403" width="170" height="50" rx="6" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="485" y="420" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Priority</text>
    <text x="485" y="436" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">By Priority Level</text>
    <rect x="580" y="403" width="180" height="50" rx="6" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="670" y="420" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Round Robin</text>
    <text x="670" y="436" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Fixed Time Quantum</text>
    <text x="40" y="462" font-family="Arial" font-size="9" fill="#666">Long-term: controls multiprogramming degree | Short-term: selects ready process | Medium-term: swapping</text>
  </g>
  
  <g class="step" id="step5" data-narration="fork() creates a child process by duplicating the parent, returning twice (parent gets child PID, child gets 0). exec() replaces the process image with a new program.">
    <rect x="20" y="470" width="760" height="125" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="492" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">Process Creation: fork() and exec()</text>
    <rect x="40" y="506" width="340" height="65" rx="6" fill="white" stroke="#ef9a9a"/>
    <text x="210" y="524" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">fork() System Call</text>
    <text x="210" y="540" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Creates child process (duplicate of parent)</text>
    <text x="210" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Returns TWICE: Parent gets child PID, Child gets 0</text>
    <rect x="400" y="506" width="340" height="65" rx="6" fill="white" stroke="#ef9a9a"/>
    <text x="570" y="524" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">exec() System Call</text>
    <text x="570" y="540" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Replaces current process image with new program</text>
    <text x="570" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Child executes different program after fork()</text>
    <rect x="40" y="576" width="700" height="1" fill="#ef9a9a"/>
    <text x="40" y="588" font-family="Arial" font-size="9" fill="#666">wait() - Parent waits for child to complete | Exit status returned to parent</text>
  </g>
</svg>