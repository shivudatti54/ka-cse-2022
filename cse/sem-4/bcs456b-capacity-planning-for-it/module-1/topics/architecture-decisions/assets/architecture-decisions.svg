<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Architecture decisions are fundamental design choices that shape software system structure, addressing functional and non-functional requirements early in project lifecycle.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Architecture Decisions</text>
  </g>
  
  <g class="step" id="step1" data-narration="Stakeholders include end-users, developers, operations, and business teams, each with unique concerns like usability, maintainability, deployability, cost, and regulatory compliance for software systems.">
    <rect x="20" y="58" width="760" height="78" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. Stakeholders and Their Concerns</text>
    <rect x="40" y="92" width="160" height="36" fill="#e3f2fd" rx="3"/>
    <text x="120" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">End-Users</text>
    <text x="120" y="119" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Usability, Performance</text>
    <rect x="210" y="92" width="160" height="36" fill="#e8f5e9" rx="3"/>
    <text x="290" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Developers</text>
    <text x="290" y="119" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Maintainability, Testability</text>
    <rect x="380" y="92" width="160" height="36" fill="#fff3e0" rx="3"/>
    <text x="460" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Operations</text>
    <text x="460" y="119" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Deployability, Monitoring</text>
    <rect x="550" y="92" width="160" height="36" fill="#f3e5f5" rx="3"/>
    <text x="630" y="107" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Business</text>
    <text x="630" y="119" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Cost, Time-to-Market</text>
  </g>
  
  <g class="step" id="step2" data-narration="Quality attributes are measurable non-functional properties like performance, scalability, availability, security, and maintainability, evaluated through concrete scenarios with specific measurable criteria.">
    <rect x="20" y="146" width="760" height="78" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">2. Quality Attributes and Scenarios</text>
    <rect x="40" y="182" width="110" height="34" fill="#e8f5e9" rx="3"/>
    <text x="95" y="197" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Performance</text>
    <text x="95" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">&lt;3s response</text>
    <rect x="160" y="182" width="110" height="34" fill="#e8f5e9" rx="3"/>
    <text x="215" y="197" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Scalability</text>
    <text x="215" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Handle load</text>
    <rect x="280" y="182" width="110" height="34" fill="#e8f5e9" rx="3"/>
    <text x="335" y="197" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Availability</text>
    <text x="335" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">99.9% uptime</text>
    <rect x="400" y="182" width="110" height="34" fill="#e8f5e9" rx="3"/>
    <text x="455" y="197" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Security</text>
    <text x="455" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Auth required</text>
    <rect x="520" y="182" width="110" height="34" fill="#e8f5e9" rx="3"/>
    <text x="575" y="197" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Maintainability</text>
    <text x="575" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Easy changes</text>
    <rect x="640" y="182" width="110" height="34" fill="#e8f5e9" rx="3"/>
    <text x="695" y="197" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Modifiability</text>
    <text x="695" y="209" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Low coupling</text>
  </g>
  
  <g class="step" id="step3" data-narration="Key architectural patterns include monolithic (simple but hard to scale), microservices (scalable but complex), layered (structured), event-driven, and service-oriented architectures for different needs.">
    <rect x="20" y="234" width="760" height="78" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">3. Architectural Patterns</text>
    <rect x="40" y="270" width="170" height="35" fill="#fff3e0" rx="3"/>
    <text x="125" y="284" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Monolithic</text>
    <text x="125" y="297" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Simple, hard to scale</text>
    <rect x="220" y="270" width="170" height="35" fill="#fff3e0" rx="3"/>
    <text x="305" y="284" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Microservices</text>
    <text x="305" y="297" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Scalable, complex</text>
    <rect x="400" y="270" width="170" height="35" fill="#fff3e0" rx="3"/>
    <text x="485" y="284" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Layered</text>
    <text x="485" y="297" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Structured, clear layers</text>
    <rect x="580" y="270" width="180" height="35" fill="#fff3e0" rx="3"/>
    <text x="670" y="284" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Event-Driven</text>
    <text x="670" y="297" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Loose coupling, async</text>
  </g>
  
  <g class="step" id="step4" data-narration="An Architecture Decision Record documents each decision with title, status, context, decision, and consequences for future team reference and traceability purposes in projects.">
    <rect x="20" y="322" width="760" height="78" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">4. Architecture Decision Records (ADRs)</text>
    <rect x="40" y="358" width="130" height="35" fill="#f3e5f5" rx="3"/>
    <text x="105" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Title</text>
    <text x="105" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Brief description</text>
    <rect x="180" y="358" width="130" height="35" fill="#f3e5f5" rx="3"/>
    <text x="245" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Status</text>
    <text x="245" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Proposed/Accepted</text>
    <rect x="320" y="358" width="130" height="35" fill="#f3e5f5" rx="3"/>
    <text x="385" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Context</text>
    <text x="385" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Background/motivation</text>
    <rect x="460" y="358" width="130" height="35" fill="#f3e5f5" rx="3"/>
    <text x="525" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Decision</text>
    <text x="525" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Chosen action</text>
    <rect x="600" y="358" width="160" height="35" fill="#f3e5f5" rx="3"/>
    <text x="680" y="373" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">Consequences</text>
    <text x="680" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Positive &amp; negative outcomes</text>
  </g>
  
  <g class="step" id="step5" data-narration="Trade-off analysis uses the ATAM method to evaluate architectural alternatives against quality attributes, systematically identifying risks and balancing competing priorities across stakeholders.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">5. Trade-off Analysis (ATAM)</text>
    <rect x="40" y="448" width="700" height="35" fill="#ffebee" rx="3"/>
    <text x="390" y="466" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Present Approaches → Identify Priorities → Analyze Attributes → Find Trade-offs → Decide</text>
    <text x="390" y="479" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Example: Security vs Performance vs Cost trade-offs in system design</text>
  </g>
  
  <g class="step" id="step6" data-narration="The decision process follows seven structured steps: identify the problem, gather information, generate alternatives, evaluate options, select the best solution, document decisions, and continuously review outcomes.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">6. Decision-Making Process</text>
    <rect x="40" y="532" width="95" height="50" fill="#e3f2fd" rx="3"/>
    <text x="87" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">1. Identify</text>
    <text x="87" y="559" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Problem</text>
    <rect x="145" y="532" width="95" height="50" fill="#e3f2fd" rx="3"/>
    <text x="192" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">2. Gather</text>
    <text x="192" y="559" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Information</text>
    <rect x="250" y="532" width="95" height="50" fill="#e3f2fd" rx="3"/>
    <text x="297" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">3. Generate</text>
    <text x="297" y="559" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Alternatives</text>
    <rect x="355" y="532" width="95" height="50" fill="#e3f2fd" rx="3"/>
    <text x="402" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">4. Evaluate</text>
    <text x="402" y="559" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Alternatives</text>
    <rect x="460" y="532" width="95" height="50" fill="#e3f2fd" rx="3"/>
    <text x="507" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">5. Select</text>
    <text x="507" y="559" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Solution</text>
    <rect x="565" y="532" width="95" height="50" fill="#e3f2fd" rx="3"/>
    <text x="612" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">6. Document</text>
    <text x="612" y="559" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Decision</text>
    <rect x="670" y="532" width="95" height="50" fill="#e3f2fd" rx="3"/>
    <text x="717" y="547" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">7. Review</text>
    <text x="717" y="559" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">&amp; Refine</text>
  </g>
</svg>