<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to E-Commerce Systems. We'll explore online shopping architecture, business models, payment processing, and order fulfillment in detail for modern retailers worldwide.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Buying Stuff - Introduction to E-Commerce Systems</text>
  </g>
  
  <!-- step1: E-Commerce Overview -->
  <g class="step" id="step1" data-narration="E-commerce involves electronic buying and selling of goods and services online, covering product catalogs, shopping carts, secure payments, and efficient order fulfillment.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. E-Commerce Overview</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">Electronic commerce: commercial transactions over the internet</text>
    <text x="40" y="116" font-family="Arial" font-size="11" fill="#333">Key components: Product Catalog, Shopping Cart, Payment Gateway, Order Fulfillment</text>
    <rect x="500" y="70" width="260" height="55" fill="#1976d2" rx="5"/>
    <text x="630" y="95" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">24/7 Global Shopping</text>
    <text x="630" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Amazon, Flipkart, eBay</text>
  </g>
  
  <!-- step2: Business Models -->
  <g class="step" id="step2" data-narration="Four primary e-commerce models exist: B2C sells to consumers, B2B is business-to-business, C2C enables consumer-to-consumer sales, and C2B offers reverse pricing.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">2. E-Commerce Business Models</text>
    <rect x="40" y="185" width="165" height="32" fill="#c8e6c9" rx="4"/>
    <text x="122" y="202" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32" font-weight="bold">B2C</text>
    <text x="122" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Business→Consumer</text>
    <rect x="215" y="185" width="165" height="32" fill="#c8e6c9" rx="4"/>
    <text x="297" y="202" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32" font-weight="bold">B2B</text>
    <text x="297" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Business→Business</text>
    <rect x="390" y="185" width="165" height="32" fill="#c8e6c9" rx="4"/>
    <text x="472" y="202" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32" font-weight="bold">C2C</text>
    <text x="472" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Consumer→Consumer</text>
    <rect x="565" y="185" width="165" height="32" fill="#c8e6c9" rx="4"/>
    <text x="647" y="202" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32" font-weight="bold">C2B</text>
    <text x="647" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Consumer→Business</text>
  </g>
  
  <!-- step3: Database Schema -->
  <g class="step" id="step3" data-narration="E-commerce databases utilize normalized tables including products, customers, orders, and order_items, connected through proper foreign key relationships for data integrity.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">3. Product Catalog &amp; Database Schema</text>
    <rect x="40" y="272" width="130" height="32" fill="#ffe0b2" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="105" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">products</text>
    <text x="105" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">id, name, price, stock</text>
    <line x1="170" y1="288" x2="190" y2="288" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowhead-orange)"/>
    <rect x="200" y="272" width="130" height="32" fill="#ffe0b2" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="265" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">customers</text>
    <text x="265" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">id, name, email</text>
    <line x1="330" y1="288" x2="350" y2="288" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowhead-orange)"/>
    <rect x="360" y="272" width="130" height="32" fill="#ffe0b2" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="425" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">orders</text>
    <text x="425" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">id, customer_id, total</text>
    <line x1="490" y1="288" x2="510" y2="288" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowhead-orange)"/>
    <rect x="520" y="272" width="130" height="32" fill="#ffe0b2" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="585" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">order_items</text>
    <text x="585" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">order_id, product_id, qty</text>
    <text x="660" y="295" font-family="Arial" font-size="10" fill="#666">Uses Elasticsearch</text>
  </g>
  
  <!-- step4: Shopping Cart -->
  <g class="step" id="step4" data-narration="Shopping carts store items temporarily using sessions, cookies, or database storage, managing quantities, discounts, shipping calculations, and abandoned cart recovery features.">
    <rect x="20" y="322" width="760" height="90" fill="#f3e5f5" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">4. Shopping Cart Architecture</text>
    <rect x="40" y="360" width="220" height="32" fill="#e1bee7" rx="4"/>
    <text x="150" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a" font-weight="bold">Session-Based Cart</text>
    <text x="150" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Server-side storage</text>
    <rect x="270" y="360" width="220" height="32" fill="#e1bee7" rx="4"/>
    <text x="380" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a" font-weight="bold">Cookie-Based Cart</text>
    <text x="380" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Client-side storage</text>
    <rect x="500" y="360" width="220" height="32" fill="#e1bee7" rx="4"/>
    <text x="610" y="378" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a" font-weight="bold">Database Cart</text>
    <text x="610" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Persistent storage</text>
    <text x="40" y="412" font-family="Arial" font-size="10" fill="#333">Cart Total = Σ(price × quantity)</text>
  </g>
  
  <!-- step5: Payment Gateway -->
  <g class="step" id="step5" data-narration="Payment gateways like Stripe and PayPal handle secure tokenization, encryption, and bank communication while ensuring full PCI-DSS compliance for data protection.">
    <rect x="20" y="420" width="760" height="85" fill="#ffebee" rx="8"/>
    <text x="40" y="442" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">5. Payment Gateway Integration</text>
    <text x="40" y="465" font-family="Arial" font-size="11" fill="#333">Payment Flow:</text>
    <rect x="40" y="475" width="90" height="18" fill="#ffcdd2" rx="3"/>
    <text x="85" y="488" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Review</text>
    <line x1="130" y1="484" x2="140" y2="484" stroke="#f44336" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="145" y="475" width="90" height="18" fill="#ffcdd2" rx="3"/>
    <text x="190" y="488" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Tokenize</text>
    <line x1="235" y1="484" x2="245" y2="484" stroke="#f44336" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="250" y="475" width="90" height="18" fill="#ffcdd2" rx="3"/>
    <text x="295" y="488" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Authorize</text>
    <line x1="340" y1="484" x2="350" y2="484" stroke="#f44336" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="355" y="475" width="90" height="18" fill="#c8e6c9" rx="3"/>
    <text x="400" y="488" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Confirm</text>
    <text x="500" y="465" font-family="Arial" font-size="10" fill="#333">Gateways: PayPal, Stripe</text>
    <text x="500" y="480" font-family="Arial" font-size="9" fill="#666">Requires PCI-DSS Compliance</text>
  </g>
  
  <!-- step6: Order Fulfillment -->
  <g class="step" id="step6" data-narration="Order fulfillment follows a sequential pipeline: order placement, payment confirmation, inventory deduction, packaging, shipping, and final delivery with tracking updates.">
    <rect x="20" y="513" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="535" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">6. Order Processing &amp; Fulfillment</text>
    <rect x="40" y="550" width="85" height="30" fill="#bbdefb" rx="4"/>
    <text x="82" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1" font-weight="bold">Order</text>
    <text x="82" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Placement</text>
    <line x1="125" y1="565" x2="132" y2="565" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="137" y="550" width="85" height="30" fill="#bbdefb" rx="4"/>
    <text x="179" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1" font-weight="bold">Payment</text>
    <text x="179" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Confirm</text>
    <line x1="222" y1="565" x2="229" y2="565" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="234" y="550" width="85" height="30" fill="#bbdefb" rx="4"/>
    <text x="276" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1" font-weight="bold">Inventory</text>
    <text x="276" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">Deduct</text>
    <line x1="319" y1="565" x2="326" y2="565" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="331" y="550" width="85" height="30" fill="#bbdefb" rx="4"/>
    <text x="373" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#0d47a1" font-weight="bold">Pack</text>
    <text x="373" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#0d47a1">&amp; Ship</text>
    <line x1="416" y1="565" x2="423" y2="565" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="428" y="550" width="85" height="30" fill="#c8e6c9" rx="4"/>
    <text x="470" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32" font-weight="bold">Delivery</text>
    <text x="470" y="575" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">&amp; Track</text>
    <text x="550" y="560" font-family="Arial" font-size="10" fill="#333">Security: SSL/TLS, CSRF</text>
    <text x="550" y="575" font-family="Arial" font-size="9" fill="#666">Scale: Caching, Load Balancer</text>
  </g>
</svg>