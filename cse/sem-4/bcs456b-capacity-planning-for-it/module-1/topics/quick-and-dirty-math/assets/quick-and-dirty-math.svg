<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <g class="step" id="step0" data-narration="Quick and Dirty Math introduces practical techniques for estimating algorithm performance without precise mathematical derivations. This approach helps computer science students quickly analyze and compare algorithm efficiency during technical interviews and exams.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Quick and Dirty Math: Algorithmic Complexity Estimation</text>
  </g>
  
  <g class="step" id="step1" data-narration="Big-O notation describes the upper bound of algorithm growth rate, telling worst-case time complexity by focusing on dominant terms and ignoring constants.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Big-O Notation</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">Common complexity classes (fastest to slowest):</text>
    <rect x="40" y="110" width="60" height="18" fill="#e8f5e9" rx="3"/>
    <text x="70" y="123" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">O(1)</text>
    <rect x="110" y="110" width="60" height="18" fill="#e8f5e9" rx="3"/>
    <text x="140" y="123" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">O(log n)</text>
    <rect x="180" y="110" width="60" height="18" fill="#e8f5e9" rx="3"/>
    <text x="210" y="123" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">O(n)</text>
    <rect x="250" y="110" width="70" height="18" fill="#fff3e0" rx="3"/>
    <text x="285" y="123" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">O(n log n)</text>
    <rect x="330" y="110" width="60" height="18" fill="#fff3e0" rx="3"/>
    <text x="360" y="123" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">O(n²)</text>
    <rect x="400" y="110" width="60" height="18" fill="#ffebee" rx="3"/>
    <text x="430" y="123" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">O(2ⁿ)</text>
  </g>
  
  <g class="step" id="step2" data-narration="The Four Steps Method: 1) Identify the basic operation, 2) Count its executions, 3) Express as function of n, 4) Simplify to dominant term.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Four Steps Method</text>
    <circle cx="60" cy="195" r="12" fill="#388e3c"/>
    <text x="60" y="199" text-anchor="middle" font-family="Arial" font-size="12" fill="white">1</text>
    <text x="80" y="199" font-family="Arial" font-size="10" fill="#333">Identify basic operation</text>
    <circle cx="200" cy="195" r="12" fill="#388e3c"/>
    <text x="200" y="199" text-anchor="middle" font-family="Arial" font-size="12" fill="white">2</text>
    <text x="220" y="199" font-family="Arial" font-size="10" fill="#333">Count executions</text>
    <circle cx="340" cy="195" r="12" fill="#388e3c"/>
    <text x="340" y="199" text-anchor="middle" font-family="Arial" font-size="12" fill="white">3</text>
    <text x="360" y="199" font-family="Arial" font-size="10" fill="#333">Express as f(n)</text>
    <circle cx="470" cy="195" r="12" fill="#388e3c"/>
    <text x="470" y="199" text-anchor="middle" font-family="Arial" font-size="12" fill="white">4</text>
    <text x="490" y="199" font-family="Arial" font-size="10" fill="#333">Simplify (drop constants)</text>
    <text x="40" y="218" font-family="Arial" font-size="10" fill="#666">Example: Nested loop with inner running (n-1)+(n-2)+...+1 = n(n-1)/2 → O(n²)</text>
  </g>
  
  <g class="step" id="step3" data-narration="Quick Rules: Single loop is O(n), nested loops multiply complexity, loop with i*=2 indicates O(log n), recursive halving gives O(log n).">
    <rect x="20" y="234" width="760" height="91" fill="#fff3e0" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Quick Rules for Loops</text>
    <rect x="40" y="275" width="150" height="30" fill="#ffebee" rx="3"/>
    <text x="115" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">for i in range(n):</text>
    <text x="115" y="306" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">O(n)</text>
    <rect x="200" y="275" width="150" height="30" fill="#ffebee" rx="3"/>
    <text x="275" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">for i in range(n):</text>
    <text x="275" y="306" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">for j in range(n):</text>
    <text x="275" y="318" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">O(n²)</text>
    <rect x="360" y="275" width="150" height="30" fill="#e8f5e9" rx="3"/>
    <text x="435" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">i *= 2:</text>
    <text x="435" y="306" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">O(log n)</text>
    <rect x="520" y="275" width="150" height="30" fill="#e8f5e9" rx="3"/>
    <text x="595" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Halving n each step:</text>
    <text x="595" y="306" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">O(log n)</text>
    <text x="40" y="320" font-family="Arial" font-size="9" fill="#666">Key: Watch loop conditions—i*=2 means logarithmic, not linear!</text>
  </g>
  
  <g class="step" id="step4" data-narration="Space complexity measures memory requirements: fixed part (constants) plus variable part (dynamic allocation, recursion stack). Array of size n is O(n).">
    <rect x="20" y="333" width="760" height="89" fill="#f3e5f5" rx="5"/>
    <text x="40" y="355" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Space Complexity</text>
    <rect x="40" y="371" width="200" height="35" fill="#ede7f6" rx="3"/>
    <text x="50" y="386" font-family="Arial" font-size="10" fill="#7b1fa2">Fixed Part:</text>
    <text x="50" y="401" font-family="Arial" font-size="9" fill="#666">Constants, fixed-size variables</text>
    <rect x="250" y="371" width="200" height="35" fill="#ede7f6" rx="3"/>
    <text x="260" y="386" font-family="Arial" font-size="10" fill="#7b1fa2">Variable Part:</text>
    <text x="260" y="401" font-family="Arial" font-size="9" fill="#666">Dynamic memory, recursion stack</text>
    <rect x="460" y="371" width="150" height="35" fill="#e1bee7" rx="3"/>
    <text x="535" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Array[n]</text>
    <text x="535" y="399" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">→ O(n)</text>
    <rect x="620" y="371" width="150" height="35" fill="#e1bee7" rx="3"/>
    <text x="695" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">2D Array[n][n]</text>
    <text x="695" y="399" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">→ O(n²)</text>
  </g>
  
  <g class="step" id="step5" data-narration="Master Theorem solves divide-and-conquer recurrences T(n)=aT(n/b)+f(n) by comparing f(n) with n^log_b(a): smaller yields n^log_b(a), equal yields n^log_b(a)log n, larger yields f(n).">
    <rect x="20" y="430" width="760" height="75" fill="#e3f2fd" rx="5"/>
    <text x="40" y="452" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Master Theorem: T(n) = aT(n/b) + f(n)</text>
    <rect x="40" y="468" width="220" height="30" fill="#bbdefb" rx="3"/>
    <text x="150" y="481" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Case 1: f(n) &lt; n^log_b(a) → Θ(n^log_b(a))</text>
    <rect x="270" y="468" width="220" height="30" fill="#bbdefb" rx="3"/>
    <text x="380" y="481" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Case 2: f(n) = Θ(n^log_b(a)) → Θ(n^log_b(a) log n)</text>
    <rect x="500" y="468" width="270" height="30" fill="#bbdefb" rx="3"/>
    <text x="635" y="481" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Case 3: f(n) &gt; n^log_b(a) → Θ(f(n))</text>
  </g>
  
  <g class="step" id="step6" data-narration="Exam Tips: Drop constants, find dominant term, memorize Master Theorem cases. Binary search proves O(log n) by repeatedly halving the search space size.">
    <rect x="20" y="513" width="760" height="75" fill="#e8f5e9" rx="5"/>
    <text x="40" y="535" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Exam Tips &amp; Key Examples</text>
    <rect x="40" y="550" width="230" height="30" fill="#c8e6c9" rx="3"/>
    <text x="155" y="567" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Binary Search: halving space</text>
    <text x="155" y="579" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">n/2^k ≤ 1 → k ≥ log₂(n) = O(log n)</text>
    <rect x="280" y="550" width="230" height="30" fill="#c8e6c9" rx="3"/>
    <text x="395" y="567" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Common Mistake:</text>
    <text x="395" y="579" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Confusing O(n) with O(log n)</text>
    <rect x="520" y="550" width="250" height="30" fill="#c8e6c9" rx="3"/>
    <text x="645" y="567" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Quick: Drop constants, find dominant term</text>
    <text x="645" y="579" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Memorize all 3 Master Theorem cases</text>
  </g>
</svg>