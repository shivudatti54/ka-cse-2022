<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Today we explore two fundamental data structures in computer science: Arrays with their contiguous memory layout, and Linked Lists using dynamic node pointers for flexible storage.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Arrays vs Linked Lists: Two Different Animals</text>
  </g>
  
  <g class="step" id="step1" data-narration="Arrays store elements in consecutive memory locations enabling direct index access, while linked lists use scattered nodes connected through pointers for dynamic sizing flexibility.">
    <rect x="10" y="58" width="780" height="85" fill="#e3f2fd" rx="8"/>
    <text x="30" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">ARRAY</text>
    <text x="30" y="100" font-family="Arial" font-size="11" fill="#333">Contiguous memory | Fixed size | O(1) random access</text>
    <rect x="200" y="70" width="50" height="50" fill="#1976d2" stroke="#0d47a1" stroke-width="2" rx="4"/>
    <text x="225" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">0</text>
    <rect x="252" y="70" width="50" height="50" fill="#1976d2" stroke="#0d47a1" stroke-width="2" rx="4"/>
    <text x="277" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">1</text>
    <rect x="304" y="70" width="50" height="50" fill="#1976d2" stroke="#0d47a1" stroke-width="2" rx="4"/>
    <text x="329" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">2</text>
    <rect x="356" y="70" width="50" height="50" fill="#1976d2" stroke="#0d47a1" stroke-width="2" rx="4"/>
    <text x="381" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">3</text>
    <text x="420" y="100" font-family="Arial" font-size="11" fill="#666">← Consecutive memory locations</text>
    
    <text x="550" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">LINKED LIST</text>
    <text x="550" y="100" font-family="Arial" font-size="11" fill="#333">Dynamic size | Scattered memory | O(n) sequential access</text>
    <rect x="550" y="70" width="40" height="40" fill="#388e3c" stroke="#1b5e20" stroke-width="2" rx="4"/>
    <text x="570" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="white">10</text>
    <path d="M590 90 L630 90" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="630,90 620,85 620,95" fill="#388e3c"/>
    <rect x="632" y="70" width="40" height="40" fill="#388e3c" stroke="#1b5e20" stroke-width="2" rx="4"/>
    <text x="652" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="white">20</text>
    <path d="M672 90 L712 90" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="712,90 702,85 702,95" fill="#388e3c"/>
    <rect x="714" y="70" width="40" height="40" fill="#388e3c" stroke="#1b5e20" stroke-width="2" rx="4"/>
    <text x="734" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="white">NULL</text>
  </g>
  
  <g class="step" id="step2" data-narration="Arrays deliver blazing fast O(1) random access through simple index calculations, yet inserting or deleting elements requires shifting all subsequent items costing O(n) time.">
    <rect x="10" y="151" width="780" height="93" fill="#e8f5e9" rx="8"/>
    <text x="30" y="175" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Array Operations - Time Complexity</text>
    <rect x="30" y="190" width="220" height="30" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="45" y="210" font-family="Arial" font-size="11" fill="#333">Access by Index</text>
    <text x="200" y="210" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">O(1)</text>
    
    <rect x="260" y="190" width="220" height="30" fill="#fff" stroke="#f44336" rx="4"/>
    <text x="275" y="210" font-family="Arial" font-size="11" fill="#333">Insertion at Middle</text>
    <text x="430" y="210" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">O(n)</text>
    
    <rect x="490" y="190" width="220" height="30" fill="#fff" stroke="#f44336" rx="4"/>
    <text x="505" y="210" font-family="Arial" font-size="11" fill="#333">Deletion at Middle</text>
    <text x="660" y="210" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">O(n)</text>
    
    <text x="30" y="238" font-family="Arial" font-size="11" fill="#666">Advantage: Fast random access | Disadvantage: Expensive insert/delete</text>
  </g>
  
  <g class="step" id="step3" data-narration="Linked lists shine with O(1) insertion and deletion by merely updating pointer references, though searching requires traversing nodes sequentially taking O(n) time complexity.">
    <rect x="10" y="252" width="780" height="93" fill="#fff3e0" rx="8"/>
    <text x="30" y="276" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Linked List Operations - Time Complexity</text>
    <rect x="30" y="291" width="220" height="30" fill="#fff" stroke="#f44336" rx="4"/>
    <text x="45" y="311" font-family="Arial" font-size="11" fill="#333">Access by Index</text>
    <text x="200" y="311" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">O(n)</text>
    
    <rect x="260" y="291" width="220" height="30" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="275" y="311" font-family="Arial" font-size="11" fill="#333">Insert at Beginning</text>
    <text x="430" y="311" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">O(1)</text>
    
    <rect x="490" y="291" width="220" height="30" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="505" y="311" font-family="Arial" font-size="11" fill="#333">Delete at Beginning</text>
    <text x="660" y="311" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">O(1)</text>
    
    <text x="30" y="339" font-family="Arial" font-size="11" fill="#666">Advantage: Fast insert/delete | Disadvantage: No random access</text>
  </g>
  
  <g class="step" id="step4" data-narration="Arrays suffer from fixed memory allocation wasting space when capacity exceeds usage, while linked lists use exactly needed memory but incur pointer overhead for each node.">
    <rect x="10" y="353" width="780" height="85" fill="#f3e5f5" rx="8"/>
    <text x="30" y="377" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Memory Comparison</text>
    <text x="30" y="396" font-family="Arial" font-size="12" fill="#333">ARRAY: Fixed 100 bytes allocated</text>
    <rect x="30" y="401" width="200" height="20" fill="#9c27b0" rx="2"/>
    <rect x="230" y="401" width="80" height="20" fill="#e0e0e0" rx="2"/>
    <text x="320" y="416" font-family="Arial" font-size="10" fill="#666">26 used + 74 wasted</text>
    
    <text x="400" y="396" font-family="Arial" font-size="12" fill="#333">LINKED LIST: Exact allocation</text>
    <rect x="400" y="401" width="40" height="20" fill="#9c27b0" rx="2"/>
    <rect x="442" y="401" width="30" height="20" fill="#7b1fa2" rx="2"/>
    <rect x="474" y="401" width="40" height="20" fill="#9c27b0" rx="2"/>
    <rect x="516" y="401" width="30" height="20" fill="#7b1fa2" rx="2"/>
    <rect x="548" y="401" width="40" height="20" fill="#9c27b0" rx="2"/>
    <rect x="590" y="401" width="30" height="20" fill="#7b1fa2" rx="2"/>
    <rect x="622" y="401" width="40" height="20" fill="#9c27b0" rx="2"/>
    <rect x="664" y="401" width="30" height="20" fill="#7b1fa2" rx="2"/>
    <rect x="696" y="401" width="40" height="20" fill="#9c27b0" rx="2"/>
    <text x="740" y="416" font-family="Arial" font-size="10" fill="#666">Data+Ptr</text>
  </g>
  
  <g class="step" id="step5" data-narration="Cache performance varies dramatically between structures: arrays benefit from CPU prefetching due to contiguous memory, while linked lists frequently miss cache lines causing expensive page faults.">
    <rect x="10" y="446" width="780" height="97" fill="#e3f2fd" rx="8"/>
    <text x="30" y="470" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Cache Performance &amp; Memory Access</text>
    <rect x="30" y="486" width="350" height="30" fill="#fff" stroke="#1976d2" stroke-width="2" rx="4"/>
    <text x="45" y="506" font-family="Arial" font-size="12" fill="#333">ARRAY - Contiguous Memory</text>
    <text x="300" y="506" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Cache-Friendly ✓</text>
    
    <rect x="400" y="486" width="350" height="30" fill="#fff" stroke="#ff9800" stroke-width="2" rx="4"/>
    <text x="415" y="506" font-family="Arial" font-size="12" fill="#333">LINKED LIST - Scattered Memory</text>
    <text x="670" y="506" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Cache-Unfriendly ✗</text>
    
    <text x="30" y="536" font-family="Arial" font-size="11" fill="#666">Contiguous allocation enables CPU prefetching | Pointer chasing causes page faults</text>
  </g>
  
  <g class="step" id="step6" data-narration="Choose arrays when you need fast indexed access and cache-friendly performance for known sizes, and pick linked lists for dynamic sizing with frequent insertions and deletions anywhere.">
    <rect x="10" y="551" width="780" height="45" fill="#e8f5e9" rx="8"/>
    <text x="30" y="570" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">When to Use: ARRAYS for fixed size/access | LINKED LISTS for dynamic/insertions</text>
  </g>
</svg>