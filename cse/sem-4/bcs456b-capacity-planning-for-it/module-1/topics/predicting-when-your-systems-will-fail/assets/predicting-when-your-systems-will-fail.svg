<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic teaches how to predict system failures using reliability metrics like MTBF, continuous monitoring, and implementing fault tolerance techniques to maximize system uptime.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Predicting When Your Systems Will Fail</text>
  </g>
  
  <g class="step" id="step1" data-narration="Reliability metrics measure system performance: MTBF is average time between repairs, MTTF is time to first failure, and MTTR is repair duration.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Key Reliability Metrics</text>
    <rect x="40" y="95" width="220" height="35" fill="#e3f2fd" rx="3"/>
    <text x="50" y="112" font-family="Arial" font-size="10" fill="#333">MTBF: Mean Time Between</text>
    <text x="50" y="124" font-family="Arial" font-size="10" fill="#666">Failures (repairable systems)</text>
    <rect x="270" y="95" width="220" height="35" fill="#e3f2fd" rx="3"/>
    <text x="280" y="112" font-family="Arial" font-size="10" fill="#333">MTTF: Mean Time To Failure</text>
    <text x="280" y="124" font-family="Arial" font-size="10" fill="#666">(non-repairable systems)</text>
    <rect x="500" y="95" width="220" height="35" fill="#e3f2fd" rx="3"/>
    <text x="510" y="112" font-family="Arial" font-size="10" fill="#333">MTTR: Mean Time To Repair</text>
    <text x="510" y="124" font-family="Arial" font-size="10" fill="#666">Includes diagnosis and fix time</text>
  </g>
  
  <g class="step" id="step2" data-narration="The availability formula shows system uptime percentage as a ratio of MTBF to total cycle time. Higher MTBF and lower MTTR mean better availability and less downtime for users.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">System Availability Formula</text>
    <rect x="40" y="185" width="350" height="35" fill="#e8f5e9" rx="3"/>
    <text x="60" y="205" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Availability = MTBF / (MTBF + MTTR)</text>
    <rect x="400" y="185" width="340" height="35" fill="#fff3e0" rx="3"/>
    <text x="410" y="200" font-family="Arial" font-size="11" fill="#333">Example: MTBF=2000h, MTTR=4h</text>
    <text x="410" y="215" font-family="Arial" font-size="11" fill="#333">Availability = 2000/2004 = 99.8%</text>
  </g>
  
  <g class="step" id="step3" data-narration="Hardware failures follow a bathtub curve: high early failure rate in new components, steady useful life period, then increasing wear-out failures as components age over time.">
    <rect x="20" y="234" width="760" height="96" fill="#ffffff" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Bathtub Curve - Failure Rate Phases</text>
    <rect x="60" y="290" width="80" height="30" fill="#ffebee" rx="2"/>
    <text x="100" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Early Failures</text>
    <rect x="150" y="290" width="80" height="30" fill="#e8f5e9" rx="2"/>
    <text x="190" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Useful Life</text>
    <rect x="240" y="290" width="90" height="30" fill="#fff3e0" rx="2"/>
    <text x="285" y="308" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Wear-Out</text>
    <text x="450" y="270" font-family="Arial" font-size="10" fill="#666">Hardware degrades over time,</text>
    <text x="450" y="285" font-family="Arial" font-size="10" fill="#666">software failures are often random</text>
  </g>
  
  <g class="step" id="step4" data-narration="Failure prediction techniques include threshold monitoring for performance alerts, statistical analysis of historical trends, and machine learning models for detecting subtle failure patterns before they occur.">
    <rect x="20" y="338" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="360" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Failure Prediction Techniques</text>
    <rect x="40" y="376" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="50" y="391" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Threshold-Based Monitoring</text>
    <text x="50" y="404" font-family="Arial" font-size="9" fill="#666">CPU, memory, disk SMART data</text>
    <rect x="280" y="376" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="290" y="391" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Statistical Analysis</text>
    <text x="290" y="404" font-family="Arial" font-size="9" fill="#666">Time series, regression models</text>
    <rect x="520" y="376" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="530" y="391" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Machine Learning</text>
    <text x="530" y="404" font-family="Arial" font-size="9" fill="#666">Classification, anomaly detection</text>
  </g>
  
  <g class="step" id="step5" data-narration="Fault tolerance includes redundancy with backup hardware components, periodic checkpointing to save system state for recovery, and graceful degradation strategies to maintain partial operation during failures.">
    <rect x="20" y="426" width="760" height="80" fill="#ffffff" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="448" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Fault Tolerance Mechanisms</text>
    <rect x="40" y="464" width="230" height="35" fill="#ffebee" rx="3"/>
    <text x="50" y="479" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Redundancy</text>
    <text x="50" y="492" font-family="Arial" font-size="9" fill="#666">RAID, dual power, clustering</text>
    <rect x="280" y="464" width="230" height="35" fill="#ffebee" rx="3"/>
    <text x="290" y="479" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Checkpointing</text>
    <text x="290" y="492" font-family="Arial" font-size="9" fill="#666">Save state, resume from last checkpoint</text>
    <rect x="520" y="464" width="230" height="35" fill="#ffebee" rx="3"/>
    <text x="530" y="479" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Graceful Degradation</text>
    <text x="530" y="492" font-family="Arial" font-size="9" fill="#666">Reduced functionality on failure</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key exam formula: Availability equals MTBF divided by MTBF plus MTTR. Remember MTBF is for repairable systems, MTTF for non-repairable ones.">
    <rect x="20" y="514" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="536" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Exam Tips Summary</text>
    <rect x="40" y="551" width="340" height="38" fill="#e3f2fd" rx="3"/>
    <text x="50" y="566" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Must Remember Formula</text>
    <text x="50" y="580" font-family="Arial" font-size="11" fill="#333">Availability = MTBF / (MTBF + MTTR)</text>
    <rect x="390" y="551" width="360" height="38" fill="#e8f5e9" rx="3"/>
    <text x="400" y="566" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Common Mistakes to Avoid</text>
    <text x="400" y="580" font-family="Arial" font-size="9" fill="#333">• Confusing MTBF with MTTF</text>
  </g>
</svg>