<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to data storytelling for system monitoring. Learn how to transform raw system statistics into meaningful visual insights that drive better decisions.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white">Making Your System Stats Tell Stories</text>
  </g>
  
  <!-- step1: Understanding System Statistics -->
  <g class="step" id="step1" data-narration="System statistics are quantitative measurements: CPU utilization shows processing capacity use, while memory usage tracks RAM consumption patterns during operation.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Understanding System Statistics</text>
    <rect x="40" y="88" width="140" height="40" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="110" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">CPU Utilization</text>
    <text x="110" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">% processing capacity</text>
    <rect x="190" y="88" width="140" height="40" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="260" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Memory Usage</text>
    <text x="260" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">RAM consumption</text>
    <rect x="340" y="88" width="140" height="40" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="410" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Disk I/O</text>
    <text x="410" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Read/write ops</text>
    <rect x="490" y="88" width="140" height="40" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="560" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Network Traffic</text>
    <text x="560" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Bandwidth usage</text>
    <rect x="640" y="88" width="140" height="40" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="710" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">App Metrics</text>
    <text x="710" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Request rates</text>
  </g>
  
  <!-- step2: Three-Component Framework -->
  <g class="step" id="step2" data-narration="Data storytelling combines three essential components: raw statistics collected from systems, the narrative providing context and meaning, and visualization for effective communication.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">The Three-Component Framework</text>
    <rect x="80" y="180" width="180" height="36" fill="#c8e6c9" rx="3"/>
    <text x="170" y="200" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">DATA</text>
    <text x="170" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Raw statistics</text>
    <line x1="260" y1="198" x2="320" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="320" y="180" width="180" height="36" fill="#c8e6c9" rx="3"/>
    <text x="410" y="200" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">NARRATIVE</text>
    <text x="410" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Context &amp; insights</text>
    <line x1="500" y1="198" x2="560" y2="198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="560" y="180" width="180" height="36" fill="#c8e6c9" rx="3"/>
    <text x="650" y="200" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">VISUALIZATION</text>
    <text x="650" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Charts &amp; graphs</text>
  </g>
  
  <!-- step3: Context and Comparison -->
  <g class="step" id="step3" data-narration="Statistics gain meaning through comparison with temporal baselines, expected versus actual values, correlation between metrics, and detection of unusual patterns.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">Context and Comparison</text>
    <rect x="40" y="268" width="170" height="38" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="125" y="284" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Temporal</text>
    <text x="125" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">vs historical baselines</text>
    <rect x="220" y="268" width="170" height="38" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="305" y="284" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Expected vs Actual</text>
    <text x="305" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">vs thresholds/SLAs</text>
    <rect x="400" y="268" width="170" height="38" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="485" y="284" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Correlation</text>
    <text x="485" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Metric relationships</text>
    <rect x="580" y="268" width="180" height="38" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="670" y="284" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Anomaly Detection</text>
    <text x="670" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Unusual patterns</text>
  </g>
  
  <!-- step4: Visualization Principles -->
  <g class="step" id="step4" data-narration="Effective visualization requires four key principles: clarity for immediate understanding, accuracy in data representation, efficiency through minimal ink, and professional aesthetics.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Visualization Principles</text>
    <rect x="40" y="356" width="165" height="40" fill="#e1bee7" rx="3"/>
    <text x="122" y="372" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">CLARITY</text>
    <text x="122" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Immediately understandable</text>
    <rect x="215" y="356" width="165" height="40" fill="#e1bee7" rx="3"/>
    <text x="298" y="372" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">ACCURACY</text>
    <text x="298" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Preserves data relationships</text>
    <rect x="390" y="356" width="165" height="40" fill="#e1bee7" rx="3"/>
    <text x="472" y="372" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">EFFICIENCY</text>
    <text x="472" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Minimize ink-to-data</text>
    <rect x="565" y="356" width="195" height="40" fill="#e1bee7" rx="3"/>
    <text x="662" y="372" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">AESTHETICS</text>
    <text x="662" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Professional appearance</text>
  </g>
  
  <!-- step5: Key Metrics and KPIs -->
  <g class="step" id="step5" data-narration="Key Performance Indicators measure critical system goals: availability shows uptime percentage, response time tracks request delays, throughput counts transactions, and error rate tracks failures.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">Key Metrics and KPIs</text>
    <rect x="40" y="448" width="175" height="36" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="127" y="464" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Availability</text>
    <text x="127" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">% time operational</text>
    <rect x="225" y="448" width="175" height="36" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="312" y="464" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Response Time</text>
    <text x="312" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Avg process time</text>
    <rect x="410" y="448" width="175" height="36" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="497" y="464" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Throughput</text>
    <text x="497" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Trans./time unit</text>
    <rect x="595" y="448" width="175" height="36" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="682" y="464" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Error Rate</text>
    <text x="682" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">% failed operations</text>
  </g>
  
  <!-- step6: Dashboard Design -->
  <g class="step" id="step6" data-narration="Different audiences need different dashboards: executives view high-level summaries for decisions, engineers monitor real-time operations for issues, and analysts explore historical trends for planning.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="522" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Dashboard Design</text>
    <rect x="40" y="536" width="220" height="44" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="150" y="553" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Executive Dashboard</text>
    <text x="150" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">High-level overview for management</text>
    <rect x="270" y="536" width="220" height="44" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="380" y="553" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Operational Dashboard</text>
    <text x="380" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Real-time monitoring for engineers</text>
    <rect x="500" y="536" width="260" height="44" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="630" y="553" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Analytical Dashboard</text>
    <text x="630" y="568" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Historical trends for planning</text>
  </g>
</svg>