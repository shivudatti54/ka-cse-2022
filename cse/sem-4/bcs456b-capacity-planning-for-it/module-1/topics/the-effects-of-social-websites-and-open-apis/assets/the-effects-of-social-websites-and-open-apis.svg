<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers social websites and open APIs, exploring their effects on communication, business, technology integration, and modern digital society.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">The Effects of Social Websites and Open APIs</text>
  </g>
  
  <g class="step" id="step1" data-narration="Social websites are web platforms where users create profiles, share content, and connect with others globally for networking and entertainment purposes.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Social Websites Overview</text>
    <rect x="40" y="88" width="160" height="40" fill="#1976d2" rx="4"/>
    <text x="120" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Facebook</text>
    <rect x="210" y="88" width="160" height="40" fill="#1976d2" rx="4"/>
    <text x="290" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Twitter</text>
    <rect x="380" y="88" width="160" height="40" fill="#1976d2" rx="4"/>
    <text x="460" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Instagram</text>
    <rect x="550" y="88" width="160" height="40" fill="#1976d2" rx="4"/>
    <text x="630" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="white">LinkedIn</text>
    <text x="40" y="132" font-family="Arial" font-size="9" fill="#666">Create profiles, share content, connect globally</text>
  </g>
  
  <g class="step" id="step2" data-narration="Positive effects include enhanced global communication, business transformation through marketing, rapid information sharing, educational opportunities, and community building worldwide today.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Positive Effects of Social Websites</text>
    <rect x="40" y="180" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="125" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Global Connectivity</text>
    <rect x="220" y="180" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="305" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Business Marketing</text>
    <rect x="400" y="180" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="485" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Info Dissemination</text>
    <rect x="580" y="180" width="170" height="36" fill="#388e3c" rx="4"/>
    <text x="665" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Educational Access</text>
  </g>
  
  <g class="step" id="step3" data-narration="Negative effects involve privacy concerns from data collection, mental health impacts, misinformation spread, and security threats like phishing across online platforms.">
    <rect x="20" y="234" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Negative Effects of Social Websites</text>
    <rect x="40" y="268" width="170" height="36" fill="#f44336" rx="4"/>
    <text x="125" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Privacy Concerns</text>
    <rect x="220" y="268" width="170" height="36" fill="#f44336" rx="4"/>
    <text x="305" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Mental Health Issues</text>
    <rect x="400" y="268" width="170" height="36" fill="#f44336" rx="4"/>
    <text x="485" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Misinformation</text>
    <rect x="580" y="268" width="170" height="36" fill="#f44336" rx="4"/>
    <text x="665" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Security Threats</text>
  </g>
  
  <g class="step" id="step4" data-narration="Open APIs are publicly accessible interfaces enabling software communication. They accelerate innovation, create ecosystem effects, and empower developers to build integrated applications easily.">
    <rect x="20" y="322" width="760" height="95" fill="#f3e5f5" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Open APIs - Definition &amp; Benefits</text>
    <rect x="40" y="356" width="230" height="36" fill="#9c27b0" rx="4"/>
    <text x="155" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Innovation Acceleration</text>
    <rect x="280" y="356" width="230" height="36" fill="#9c27b0" rx="4"/>
    <text x="395" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Ecosystem Development</text>
    <rect x="520" y="356" width="230" height="36" fill="#9c27b0" rx="4"/>
    <text x="635" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Data Integration</text>
    <text x="40" y="410" font-family="Arial" font-size="9" fill="#666">Open APIs: Publicly accessible protocols for software communication</text>
  </g>
  
  <g class="step" id="step5" data-narration="Common API types include social media APIs for login and sharing, payment APIs like Stripe, and mapping APIs for location services.">
    <rect x="20" y="425" width="760" height="95" fill="#fff3e0" rx="8"/>
    <text x="40" y="445" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Examples of Open APIs</text>
    <rect x="40" y="463" width="175" height="32" fill="#ff9800" rx="4"/>
    <text x="127" y="482" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Social Media APIs</text>
    <rect x="225" y="463" width="175" height="32" fill="#ff9800" rx="4"/>
    <text x="312" y="482" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Payment APIs</text>
    <rect x="410" y="463" width="175" height="32" fill="#ff9800" rx="4"/>
    <text x="497" y="482" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Maps APIs</text>
    <rect x="595" y="463" width="175" height="32" fill="#ff9800" rx="4"/>
    <text x="682" y="482" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Banking APIs</text>
    <text x="40" y="512" font-family="Arial" font-size="9" fill="#666">Facebook, Twitter APIs • Stripe, PayPal • Google Maps • Open Banking</text>
  </g>
  
  <g class="step" id="step6" data-narration="Social login uses OAuth to authenticate users via social media. APIs enable e-commerce integration, unified analytics, seamless services, and enhanced user experience across platforms.">
    <rect x="20" y="528" width="760" height="65" fill="#e3f2fd" rx="8"/>
    <text x="40" y="548" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Synergy: Social Websites + Open APIs</text>
    <rect x="40" y="560" width="345" height="28" fill="#1976d2" rx="4"/>
    <text x="212" y="577" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Social Login (OAuth)</text>
    <rect x="395" y="560" width="345" height="28" fill="#1976d2" rx="4"/>
    <text x="567" y="577" text-anchor="middle" font-family="Arial" font-size="10" fill="white">E-commerce Integration</text>
  </g>
</svg>