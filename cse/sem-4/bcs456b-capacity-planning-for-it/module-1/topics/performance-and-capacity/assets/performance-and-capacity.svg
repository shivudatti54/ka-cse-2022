<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Performance and Capacity are essential for system reliability. Performance measures speed and efficiency while capacity defines maximum workload a system can handle.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#ffffff">Performance and Capacity</text>
  </g>
  
  <!-- step1: Performance Metrics -->
  <g class="step" id="step1" data-narration="Key performance metrics include Response Time (request to response duration), Throughput (requests per second), Latency (delay), and Resource Utilization (CPU, memory usage).">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="25" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Performance Metrics</text>
    <rect x="25" y="85" width="170" height="45" fill="#ffffff" rx="3" stroke="#bbdefb"/>
    <text x="35" y="100" font-family="Arial" font-size="10" fill="#333">Response Time</text>
    <text x="35" y="115" font-family="Arial" font-size="8" fill="#666">Request to response (ms/s)</text>
    <rect x="205" y="85" width="170" height="45" fill="#ffffff" rx="3" stroke="#bbdefb"/>
    <text x="215" y="100" font-family="Arial" font-size="10" fill="#333">Throughput</text>
    <text x="215" y="115" font-family="Arial" font-size="8" fill="#666">Requests per second (RPS)</text>
    <rect x="385" y="85" width="170" height="45" fill="#ffffff" rx="3" stroke="#bbdefb"/>
    <text x="395" y="100" font-family="Arial" font-size="10" fill="#333">Latency</text>
    <text x="395" y="115" font-family="Arial" font-size="8" fill="#666">Delay before first response</text>
    <rect x="565" y="85" width="170" height="45" fill="#ffffff" rx="3" stroke="#bbdefb"/>
    <text x="575" y="100" font-family="Arial" font-size="10" fill="#333">Resource Utilization</text>
    <text x="575" y="115" font-family="Arial" font-size="8" fill="#666">CPU, Memory, Disk, Network</text>
  </g>
  
  <!-- step2: Capacity Planning -->
  <g class="step" id="step2" data-narration="Capacity Planning determines infrastructure needs. Vertical Scaling adds resources to existing machines while Horizontal Scaling adds more machines to distribute workload efficiently.">
    <rect x="10" y="146" width="780" height="80" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="25" y="163" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Capacity Planning</text>
    <rect x="25" y="175" width="350" height="42" fill="#ffffff" rx="3" stroke="#c8e6c9"/>
    <text x="35" y="188" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Vertical Scaling (Scale-Up)</text>
    <text x="35" y="202" font-family="Arial" font-size="8" fill="#555">Add CPU, RAM, Storage to existing machines</text>
    <text x="35" y="212" font-family="Arial" font-size="8" fill="#555">Simple but has limits and higher cost</text>
    <rect x="385" y="175" width="350" height="42" fill="#ffffff" rx="3" stroke="#c8e6c9"/>
    <text x="395" y="188" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Horizontal Scaling (Scale-Out)</text>
    <text x="395" y="202" font-family="Arial" font-size="8" fill="#555">Add more machines to distribute workload</text>
    <text x="395" y="212" font-family="Arial" font-size="8" fill="#555">Better flexibility and fault tolerance</text>
  </g>
  
  <!-- step3: Performance Testing -->
  <g class="step" id="step3" data-narration="Performance Testing types include Load Testing (normal/peak loads), Stress Testing (beyond capacity), Endurance Testing (sustained load), and Spike Testing (rapid load changes).">
    <rect x="10" y="234" width="780" height="80" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="25" y="251" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Performance Testing Types</text>
    <rect x="25" y="263" width="180" height="42" fill="#ffffff" rx="3" stroke="#ffe0b2"/>
    <text x="35" y="276" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Load Testing</text>
    <text x="35" y="290" font-family="Arial" font-size="8" fill="#555">Simulate expected normal and peak workloads</text>
    <rect x="215" y="263" width="180" height="42" fill="#ffffff" rx="3" stroke="#ffe0b2"/>
    <text x="225" y="276" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Stress Testing</text>
    <text x="225" y="290" font-family="Arial" font-size="8" fill="#555">Push beyond normal capacity to find breaking points</text>
    <rect x="405" y="263" width="180" height="42" fill="#ffffff" rx="3" stroke="#ffe0b2"/>
    <text x="415" y="276" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Endurance Testing</text>
    <text x="415" y="290" font-family="Arial" font-size="8" fill="#555">Sustained load over hours/days to find leaks</text>
    <rect x="595" y="263" width="180" height="42" fill="#ffffff" rx="3" stroke="#ffe0b2"/>
    <text x="605" y="276" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">Spike Testing</text>
    <text x="605" y="290" font-family="Arial" font-size="8" fill="#555">Rapid dramatic load changes to test scaling</text>
  </g>
  
  <!-- step4: Optimization Techniques -->
  <g class="step" id="step4" data-narration="Optimization techniques include Caching (store frequently accessed data in memory), Database Optimization (indexing, query tuning), Asynchronous Processing (background jobs), and CDNs (static content delivery).">
    <rect x="10" y="322" width="780" height="80" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="25" y="339" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Optimization Techniques</text>
    <rect x="25" y="352" width="175" height="42" fill="#ffffff" rx="3" stroke="#e1bee7"/>
    <text x="35" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Caching</text>
    <text x="35" y="379" font-family="Arial" font-size="8" fill="#555">Store frequently accessed data in memory</text>
    <rect x="210" y="352" width="175" height="42" fill="#ffffff" rx="3" stroke="#e1bee7"/>
    <text x="220" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Database Optimization</text>
    <text x="220" y="379" font-family="Arial" font-size="8" fill="#555">Indexing, query tuning, connection pooling</text>
    <rect x="395" y="352" width="175" height="42" fill="#ffffff" rx="3" stroke="#e1bee7"/>
    <text x="405" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Async Processing</text>
    <text x="405" y="379" font-family="Arial" font-size="8" fill="#555">Background jobs with message queues</text>
    <rect x="580" y="352" width="195" height="42" fill="#ffffff" rx="3" stroke="#e1bee7"/>
    <text x="590" y="365" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">CDN (Content Delivery)</text>
    <text x="590" y="379" font-family="Arial" font-size="8" fill="#555">Global distribution of static content</text>
  </g>
  
  <!-- step5: Example - Throughput Calculation -->
  <g class="step" id="step5" data-narration="Example: A system processes 10,000 requests in 100 seconds. Throughput equals 10,000 divided by 100, which equals 100 RPS. Response time and throughput have an inverse relationship.">
    <rect x="10" y="410" width="780" height="80" fill="#ffebee" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="25" y="427" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example: Throughput Calculation</text>
    <rect x="25" y="440" width="360" height="42" fill="#ffffff" rx="3" stroke="#ffcdd2"/>
    <text x="35" y="453" font-family="Arial" font-size="10" fill="#333">Given: 10,000 requests in 100 seconds, avg response time 200ms</text>
    <text x="35" y="467" font-family="Arial" font-size="10" fill="#333">Throughput = 10,000 / 100 = 100 RPS</text>
    <rect x="395" y="440" width="360" height="42" fill="#ffffff" rx="3" stroke="#ffcdd2"/>
    <text x="405" y="453" font-family="Arial" font-size="10" fill="#333">Formula: Throughput = Total Requests / Total Time</text>
    <text x="405" y="467" font-family="Arial" font-size="10" fill="#333">Little's Law: L = λW (requests in system = arrival rate × response time)</text>
  </g>
  
  <!-- step6: Bottleneck Analysis -->
  <g class="step" id="step6" data-narration="Example: High memory utilization (85%) with low CPU (45%) indicates memory bottleneck causing paging. Solutions include adding RAM, optimizing code, and implementing caching strategies.">
    <rect x="10" y="498" width="780" height="90" fill="#ffebee" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="25" y="515" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example: Bottleneck Identification</text>
    <rect x="25" y="528" width="160" height="52" fill="#ffffff" rx="3" stroke="#ffcdd2"/>
    <text x="35" y="541" font-family="Arial" font-size="10" fill="#333">Resource Utilization:</text>
    <text x="35" y="554" font-family="Arial" font-size="9" fill="#333">CPU: 45%  Memory: 85%</text>
    <text x="35" y="567" font-family="Arial" font-size="9" fill="#333">Disk: 30%  Network: 25%</text>
    <rect x="195" y="528" width="240" height="52" fill="#ffcdd2" rx="3"/>
    <text x="205" y="541" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Bottleneck: Memory</text>
    <text x="205" y="554" font-family="Arial" font-size="9" fill="#333">85% utilization causing paging</text>
    <text x="205" y="567" font-family="Arial" font-size="9" fill="#333">explains high response time</text>
    <rect x="445" y="528" width="330" height="52" fill="#ffffff" rx="3" stroke="#ffcdd2"/>
    <text x="455" y="541" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Solutions:</text>
    <text x="455" y="554" font-family="Arial" font-size="9" fill="#555">1. Add RAM  2. Fix memory leaks</text>
    <text x="455" y="567" font-family="Arial" font-size="9" fill="#555">3. Implement caching  4. Optimize data structures</text>
  </g>
</svg>