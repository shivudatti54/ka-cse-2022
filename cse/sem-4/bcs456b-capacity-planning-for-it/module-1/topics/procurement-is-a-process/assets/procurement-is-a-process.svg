<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Procurement is a Process - This topic explains how organizations systematically acquire goods, services, and resources from external vendors to meet project requirements in software engineering.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Procurement is a Process</text>
  </g>
  
  <g class="step" id="step1" data-narration="Procurement is not just purchasing; it is a systematic process of acquiring goods, services, and resources from external vendors to meet organizational needs.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is Procurement?</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">Procurement is the systematic process of acquiring goods, services, and</text>
    <text x="40" y="115" font-family="Arial" font-size="11" fill="#333">resources from external vendors to meet project requirements.</text>
    <text x="40" y="132" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Key: It involves planning, evaluation, and management—not just buying!</text>
  </g>
  
  <g class="step" id="step2" data-narration="The procurement process has six key phases in sequence: requirement identification, market analysis, supplier selection, contract management, delivery and acceptance, and contract closure.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Six Phases of Procurement Process</text>
    <rect x="40" y="178" width="720" height="40" rx="3" fill="white"/>
    <text x="50" y="193" font-family="Arial" font-size="10" fill="#333">1. Requirement ID</text>
    <text x="150" y="193" font-family="Arial" font-size="10" fill="#333">→ 2. Market Analysis</text>
    <text x="270" y="193" font-family="Arial" font-size="10" fill="#333">→ 3. Supplier Selection</text>
    <text x="410" y="193" font-family="Arial" font-size="10" fill="#333">→ 4. Contract Mgmt</text>
    <text x="530" y="193" font-family="Arial" font-size="10" fill="#333">→ 5. Delivery/Accept</text>
    <text x="660" y="193" font-family="Arial" font-size="10" fill="#333">→ 6. Closure</text>
    <polygon points="145,190 150,185 150,195" fill="#388e3c"/>
    <polygon points="265,190 270,185 270,195" fill="#388e3c"/>
    <polygon points="405,190 410,185 410,195" fill="#388e3c"/>
    <polygon points="525,190 530,185 530,195" fill="#388e3c"/>
    <polygon points="655,190 660,185 660,195" fill="#388e3c"/>
  </g>
  
  <g class="step" id="step3" data-narration="There are three main types of procurement in software engineering projects: off-the-shelf software for ready solutions, custom development for specific needs, and staff augmentation to supplement internal teams with external talent.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Types of Procurement in Software Engineering</text>
    <rect x="40" y="268" width="230" height="38" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Off-the-Shelf (OTS) Software</text>
    <text x="50" y="296" font-family="Arial" font-size="9" fill="#333">Ready-made solutions like ERP, CRM</text>
    <rect x="285" y="268" width="230" height="38" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="295" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Custom Development</text>
    <text x="295" y="296" font-family="Arial" font-size="9" fill="#333">Outsourcing specific tasks/projects</text>
    <rect x="530" y="268" width="230" height="38" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="540" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Staff Augmentation</text>
    <text x="540" y="296" font-family="Arial" font-size="9" fill="#333">Contractors to supplement internal teams</text>
  </g>
  
  <g class="step" id="step4" data-narration="The make-or-buy decision involves six key factors: comparing internal versus external costs, evaluating technical capability, assessing time-to-market impact, considering strategic importance, analyzing vendor risk, and planning for scalability.">
    <rect x="20" y="322" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Make-or-Buy Decision Factors</text>
    <rect x="40" y="358" width="110" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">COST</text>
    <text x="50" y="385" font-family="Arial" font-size="8" fill="#333">Internal vs External</text>
    <rect x="160" y="358" width="110" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="170" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">CAPABILITY</text>
    <text x="170" y="385" font-family="Arial" font-size="8" fill="#333">Technical Expertise</text>
    <rect x="280" y="358" width="110" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="290" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">TIME</text>
    <text x="290" y="385" font-family="Arial" font-size="8" fill="#333">Time-to-Market</text>
    <rect x="400" y="358" width="110" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="410" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">STRATEGIC</text>
    <text x="410" y="385" font-family="Arial" font-size="8" fill="#333">Competitive Advantage</text>
    <rect x="520" y="358" width="110" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="530" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">RISK</text>
    <text x="530" y="385" font-family="Arial" font-size="8" fill="#333">Vendor Dependency</text>
    <rect x="640" y="358" width="120" height="35" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="650" y="372" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">SCALABILITY</text>
    <text x="650" y="385" font-family="Arial" font-size="8" fill="#333">Growth Requirements</text>
  </g>
  
  <g class="step" id="step5" data-narration="Three contract types allocate risk differently: fixed-price puts risk on vendor, time-and-materials puts risk on buyer, and cost-plus reduces vendor risk with buyer oversight.">
    <rect x="20" y="410" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Contract Types and Risk Allocation</text>
    <rect x="40" y="448" width="230" height="35" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Fixed-Price Contract</text>
    <text x="50" y="476" font-family="Arial" font-size="9" fill="#333">Risk to Vendor | Best for clear requirements</text>
    <rect x="285" y="448" width="230" height="35" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="295" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Time and Materials (T&amp;M)</text>
    <text x="295" y="476" font-family="Arial" font-size="9" fill="#333">Risk to Buyer | Best for changing scope</text>
    <rect x="530" y="448" width="230" height="35" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="540" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Cost-Plus Contract</text>
    <text x="540" y="476" font-family="Arial" font-size="9" fill="#333">Reduced Vendor Risk | Needs buyer oversight</text>
  </g>
  
  <g class="step" id="step6" data-narration="Service Level Agreements define vendor service standards including availability, response time, resolution time, support hours, penalties, and exclusions for accountability.">
    <rect x="20" y="498" width="760" height="90" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Service Level Agreements (SLAs)</text>
    <text x="40" y="540" font-family="Arial" font-size="10" fill="#333">Key Components:</text>
    <rect x="40" y="548" width="140" height="32" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="560" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Availability</text>
    <text x="50" y="573" font-family="Arial" font-size="8" fill="#333">e.g., 99.9% uptime</text>
    <rect x="190" y="548" width="140" height="32" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="200" y="560" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Response Time</text>
    <text x="200" y="573" font-family="Arial" font-size="8" fill="#333">Max time to acknowledge</text>
    <rect x="340" y="548" width="140" height="32" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="350" y="560" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Resolution Time</text>
    <text x="350" y="573" font-family="Arial" font-size="8" fill="#333">Target for problem fix</text>
    <rect x="490" y="548" width="140" height="32" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="500" y="560" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Support Hours</text>
    <text x="500" y="573" font-family="Arial" font-size="8" fill="#333">24/7 or business hours</text>
    <rect x="640" y="548" width="120" height="32" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="650" y="560" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Penalties</text>
    <text x="650" y="573" font-family="Arial" font-size="8" fill="#333">Consequences for failure</text>
  </g>
</svg>