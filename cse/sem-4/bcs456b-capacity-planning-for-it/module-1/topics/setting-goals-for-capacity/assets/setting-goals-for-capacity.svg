<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers setting goals for capacity planning in IT infrastructure, including key concepts, the SMART framework, and practical calculations for optimal resource management.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Setting Goals for Capacity</text>
  </g>
  
  <!-- step1: Introduction & Definition -->
  <g class="step" id="step1" data-narration="Capacity planning determines computing resources needed to meet current and future workload demands efficiently, balancing cost and performance while ensuring service level agreements are met.">
    <rect x="50" y="58" width="700" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. What is Capacity Planning?</text>
    <text x="70" y="95" font-family="Arial" font-size="10" fill="#333">Process of determining computing resources needed to meet</text>
    <text x="70" y="108" font-family="Arial" font-size="10" fill="#333">workload demands efficiently and cost-effectively.</text>
    <rect x="450" y="70" width="280" height="60" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="460" y="85" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Key Objective:</text>
    <text x="460" y="98" font-family="Arial" font-size="9" fill="#333">Balance cost vs performance</text>
    <text x="460" y="110" font-family="Arial" font-size="9" fill="#333">Avoid under/over-provisioning</text>
    <text x="460" y="122" font-family="Arial" font-size="9" fill="#333">Ensure SLA compliance</text>
  </g>
  
  <!-- step2: Key Components -->
  <g class="step" id="step2" data-narration="Capacity planning involves four key components: workload characterization to understand patterns, performance baselines for metrics, demand forecasting for predictions, and resource modeling for analysis.">
    <rect x="50" y="151" width="700" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="70" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">2. Key Components</text>
    <rect x="70" y="185" width="150" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="80" y="198" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Workload</text>
    <text x="80" y="210" font-family="Arial" font-size="8" fill="#333">Characterization</text>
    <text x="80" y="220" font-family="Arial" font-size="8" fill="#666">Patterns, peaks</text>
    <rect x="230" y="185" width="150" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="240" y="198" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Performance</text>
    <text x="240" y="210" font-family="Arial" font-size="8" fill="#333">Baselines</text>
    <text x="240" y="220" font-family="Arial" font-size="8" fill="#666">CPU, memory, I/O</text>
    <rect x="390" y="185" width="150" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="198" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Demand</text>
    <text x="400" y="210" font-family="Arial" font-size="8" fill="#333">Forecasting</text>
    <text x="400" y="220" font-family="Arial" font-size="8" fill="#666">Predict future needs</text>
    <rect x="550" y="185" width="180" height="40" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="560" y="198" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Resource</text>
    <text x="560" y="210" font-family="Arial" font-size="8" fill="#333">Modeling</text>
    <text x="560" y="220" font-family="Arial" font-size="8" fill="#666">Mathematical models</text>
  </g>
  
  <!-- step3: Types of Capacity -->
  <g class="step" id="step3" data-narration="There are four types of capacity: scalable for cloud VMs with elastic resources, fixed for dedicated hardware, peak for maximum demand handling, and sustainable for continuous operation.">
    <rect x="50" y="244" width="700" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="70" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">3. Types of Capacity</text>
    <rect x="70" y="280" width="160" height="40" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="80" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Scalable</text>
    <text x="80" y="305" font-family="Arial" font-size="8" fill="#333">Cloud VMs, elastic</text>
    <text x="80" y="315" font-family="Arial" font-size="8" fill="#666">Easy to increase/decrease</text>
    <rect x="240" y="280" width="160" height="40" rx="3" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="250" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Fixed</text>
    <text x="250" y="305" font-family="Arial" font-size="8" fill="#333">Dedicated hardware</text>
    <text x="250" y="315" font-family="Arial" font-size="8" fill="#666">Long lead time to modify</text>
    <rect x="410" y="280" width="160" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="420" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Peak</text>
    <text x="420" y="305" font-family="Arial" font-size="8" fill="#333">Maximum demand level</text>
    <text x="420" y="315" font-family="Arial" font-size="8" fill="#666">Highest resource needed</text>
    <rect x="580" y="280" width="160" height="40" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="590" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Sustainable</text>
    <text x="590" y="305" font-family="Arial" font-size="8" fill="#333">Continuous operation</text>
    <text x="590" y="315" font-family="Arial" font-size="8" fill="#666">Can maintain indefinitely</text>
  </g>
  
  <!-- step4: SMART Goals -->
  <g class="step" id="step4" data-narration="SMART goals for capacity must be Specific, Measurable, Achievable, Relevant, and Time-bound with clear performance targets that guide infrastructure decisions and resource allocation.">
    <rect x="50" y="337" width="700" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="70" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">4. SMART Goals Framework</text>
    <rect x="70" y="375" width="100" height="40" rx="3" fill="#1976d2"/>
    <text x="120" y="388" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">S</text>
    <text x="120" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Specific</text>
    <rect x="180" y="375" width="100" height="40" rx="3" fill="#1976d2"/>
    <text x="230" y="388" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">M</text>
    <text x="230" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Measurable</text>
    <rect x="290" y="375" width="100" height="40" rx="3" fill="#1976d2"/>
    <text x="340" y="388" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">A</text>
    <text x="340" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Achievable</text>
    <rect x="400" y="375" width="100" height="40" rx="3" fill="#1976d2"/>
    <text x="450" y="388" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">R</text>
    <text x="450" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Relevant</text>
    <rect x="510" y="375" width="100" height="40" rx="3" fill="#1976d2"/>
    <text x="560" y="388" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">T</text>
    <text x="560" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Time-bound</text>
    <rect x="620" y="370" width="120" height="50" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="630" y="383" font-family="Arial" font-size="8" font-weight="bold" fill="#388e3c">Example Goal:</text>
    <text x="630" y="395" font-family="Arial" font-size="8" fill="#333">99.9% availability,</text>
    <text x="630" y="407" font-family="Arial" font-size="8" fill="#333">&lt;200ms response,</text>
    <text x="630" y="419" font-family="Arial" font-size="8" fill="#333">CPU 40-70% utilization</text>
  </g>
  
  <!-- step5: Metrics -->
  <g class="step" id="step5" data-narration="Key capacity metrics include utilization rate, throughput, response time, queue length, and saturation point to monitor system health and identify performance bottlenecks proactively.">
    <rect x="50" y="430" width="700" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="70" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">5. Key Metrics</text>
    <rect x="70" y="465" width="130" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="80" y="477" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Utilization Rate</text>
    <text x="80" y="489" font-family="Arial" font-size="8" fill="#333">% of resources in use</text>
    <text x="80" y="500" font-family="Arial" font-size="7" fill="#666">Target: 40-70% for CPU</text>
    <rect x="210" y="465" width="130" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="477" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Throughput</text>
    <text x="220" y="489" font-family="Arial" font-size="8" fill="#333">Transactions per time</text>
    <text x="220" y="500" font-family="Arial" font-size="7" fill="#666">reqs/sec, ops/hr</text>
    <rect x="350" y="465" width="130" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="360" y="477" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Response Time</text>
    <text x="360" y="489" font-family="Arial" font-size="8" fill="#333">Request completion</text>
    <text x="360" y="500" font-family="Arial" font-size="7" fill="#666">Target: &lt;200ms typical</text>
    <rect x="490" y="465" width="130" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="500" y="477" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Saturation Point</text>
    <text x="500" y="489" font-family="Arial" font-size="8" fill="#333">Performance degrades</text>
    <text x="500" y="500" font-family="Arial" font-size="7" fill="#666">Beyond this, issues</text>
    <rect x="630" y="465" width="110" height="40" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="640" y="477" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Queue Length</text>
    <text x="640" y="489" font-family="Arial" font-size="8" fill="#333">Pending requests</text>
    <text x="640" y="500" font-family="Arial" font-size="7" fill="#666">Indicates bottlenecks</text>
  </g>
  
  <!-- step6: Formulas -->
  <g class="step" id="step6" data-narration="Important formulas for capacity planning include peak requests equals concurrent users times requests per minute, and memory equals users times memory required per session.">
    <rect x="50" y="523" width="700" height="60" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="70" y="543" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Key Formulas</text>
    <rect x="70" y="555" width="180" height="22" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="80" y="566" font-family="Arial" font-size="9" fill="#333">Peak Requests = Users × Req/User/min</text>
    <rect x="260" y="555" width="180" height="22" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="270" y="566" font-family="Arial" font-size="9" fill="#333">Memory = Users × Memory/Session</text>
    <rect x="450" y="555" width="180" height="22" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="460" y="566" font-family="Arial" font-size="9" fill="#333">Storage = Current × (1+Growth)^Years</text>
    <rect x="640" y="555" width="100" height="22" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="650" y="566" font-family="Arial" font-size="9" fill="#333">Buffer = Base × 1.2-1.3</text>
  </g>
</svg>