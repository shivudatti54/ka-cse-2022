<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers different kinds of software requirements, including functional, non-functional, user, system, and domain requirements, and explains how to measure them for quality assurance and project success.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Different Kinds of Requirements and Measurements</text>
  </g>

  <!-- step1: Overview of Requirements Classification -->
  <g class="step" id="step1" data-narration="Requirements engineering is the systematic process of discovering, analyzing, validating, and documenting stakeholder needs to bridge user expectations with system implementation, preventing costly project failures and rework.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Requirements Classification Overview</text>
    <rect x="40" y="95" width="145" height="32" fill="#ffffff" stroke="#1976d2" rx="4"/>
    <text x="112" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Functional</text>
    <rect x="195" y="95" width="145" height="32" fill="#ffffff" stroke="#ff9800" rx="4"/>
    <text x="267" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Non-Functional</text>
    <rect x="350" y="95" width="145" height="32" fill="#ffffff" stroke="#9c27b0" rx="4"/>
    <text x="422" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">User Requirements</text>
    <rect x="505" y="95" width="145" height="32" fill="#ffffff" stroke="#388e3c" rx="4"/>
    <text x="577" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">System Requirements</text>
    <rect x="660" y="95" width="110" height="32" fill="#ffffff" stroke="#f44336" rx="4"/>
    <text x="715" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Domain</text>
  </g>

  <!-- step2: Functional Requirements -->
  <g class="step" id="step2" data-narration="Functional requirements define specific system behavior including inputs, outputs, processing logic, data transformations, and exception handling scenarios that the software must support to meet user business needs.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Functional Requirements</text>
    <text x="40" y="190" font-family="Arial" font-size="10" fill="#333">Define what the system MUST do - observable behaviors, features, and functions.</text>
    <rect x="40" y="205" width="220" height="15" fill="#c8e6c9" rx="2"/>
    <text x="50" y="216" font-family="Arial" font-size="9" fill="#2e7d32">• Search products by name/category</text>
    <rect x="270" y="205" width="220" height="15" fill="#c8e6c9" rx="2"/>
    <text x="280" y="216" font-family="Arial" font-size="9" fill="#2e7d32">• Generate monthly PDF reports</text>
    <rect x="500" y="205" width="220" height="15" fill="#c8e6c9" rx="2"/>
    <text x="510" y="216" font-family="Arial" font-size="9" fill="#2e7d32">• Reset password via email</text>
  </g>

  <!-- step3: Non-Functional Requirements -->
  <g class="step" id="step3" data-narration="Non-functional requirements define quality attributes that determine how well the system performs in terms of speed under load, reliability for continuous operation, security of data, and overall usability for end users.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Non-Functional Requirements (Quality Attributes)</text>
    <rect x="40" y="275" width="130" height="30" fill="#ffe0b2" rx="4"/>
    <text x="105" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Performance</text>
    <text x="105" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">&lt;3s response</text>
    <rect x="180" y="275" width="130" height="30" fill="#ffccbc" rx="4"/>
    <text x="245" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#d84315">Reliability</text>
    <text x="245" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">99.9% uptime</text>
    <rect x="320" y="275" width="130" height="30" fill="#d1c4e9" rx="4"/>
    <text x="385" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Security</text>
    <text x="385" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">AES-256 encrypt</text>
    <rect x="460" y="275" width="130" height="30" fill="#b3e5fc" rx="4"/>
    <text x="525" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#0277bd">Usability</text>
    <text x="525" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">&lt;10min learn</text>
    <rect x="600" y="275" width="130" height="30" fill="#c8e6c9" rx="4"/>
    <text x="665" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Maintainability</text>
    <text x="665" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">80% test coverage</text>
  </g>

  <!-- step4: User vs System & Domain Requirements -->
  <g class="step" id="step4" data-narration="User requirements capture high-level user expectations and business goals in natural language, while system requirements provide detailed technical specifications for developers to implement the software solution correctly.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">User vs System Requirements + Domain Requirements</text>
    <rect x="40" y="362" width="220" height="32" fill="#e1bee7" rx="4"/>
    <text x="150" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7b1fa2">User Requirements</text>
    <text x="150" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">High-level, natural language</text>
    <rect x="270" y="362" width="220" height="32" fill="#d1c4e9" rx="4"/>
    <text x="380" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#5e35b1">System Requirements</text>
    <text x="380" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Detailed, technical specs</text>
    <rect x="500" y="362" width="250" height="32" fill="#ffccbc" rx="4"/>
    <text x="625" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d84315">Domain Requirements</text>
    <text x="625" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Industry regulations, standards</text>
  </g>

  <!-- step5: Requirements Measurements -->
  <g class="step" id="step5" data-narration="Requirements metrics measure software quality through various dimensions: completeness tracks captured requirements coverage, stability monitors change frequency, testability evaluates verifiability, and consistency checks for conflicts.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Requirements Measurements (Metrics)</text>
    <rect x="40" y="452" width="120" height="30" fill="#bbdefb" rx="4"/>
    <text x="100" y="467" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Completeness</text>
    <text x="100" y="477" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">% with criteria</text>
    <rect x="170" y="452" width="120" height="30" fill="#bbdefb" rx="4"/>
    <text x="230" y="467" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Stability</text>
    <text x="230" y="477" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Change frequency</text>
    <rect x="300" y="452" width="120" height="30" fill="#bbdefb" rx="4"/>
    <text x="360" y="467" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Consistency</text>
    <text x="360" y="477" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Conflict count</text>
    <rect x="430" y="452" width="120" height="30" fill="#bbdefb" rx="4"/>
    <text x="490" y="467" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Testability</text>
    <text x="490" y="477" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Measurable criteria</text>
    <rect x="560" y="452" width="120" height="30" fill="#bbdefb" rx="4"/>
    <text x="620" y="467" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Traceability</text>
    <text x="620" y="477" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Link coverage</text>
  </g>

  <!-- step6: FURPS+ and SMART Criteria -->
  <g class="step" id="step6" data-narration="FURPS+ classifies requirements into Functional, Usability, Reliability, Performance, and Security categories plus implementation constraints. The SMART framework ensures requirements are Specific, Measurable, Achievable, Realistic, and Time-bound.">
    <rect x="20" y="498" width="760" height="85" fill="#e8f5e9" stroke="#388e3c" rx="8"/>
    <text x="40" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">FURPS+ Model + SMART Criteria</text>
    <rect x="40" y="540" width="340" height="35" fill="#c8e6c9" rx="4"/>
    <text x="210" y="555" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">FURPS+</text>
    <text x="210" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">F=Functional, U=Usability, R=Reliability, P=Performance, S=Security + Constraints</text>
    <rect x="390" y="540" width="340" height="35" fill="#c8e6c9" rx="4"/>
    <text x="560" y="555" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">SMART</text>
    <text x="560" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Specific, Measurable, Achievable, Realistic, Time-bound</text>
    <rect x="40" y="580" width="720" height="1" fill="#a5d6a7"/>
  </g>
</svg>