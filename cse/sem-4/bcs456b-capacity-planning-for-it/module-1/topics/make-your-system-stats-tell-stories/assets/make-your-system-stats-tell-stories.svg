<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This presentation teaches how to transform raw system statistics into compelling data stories that drive meaningful insights and actions for system administrators.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Making Your System Stats Tell Stories</text>
  </g>
  
  <g class="step" id="step1" data-narration="System statistics are quantitative measurements describing resource usage including CPU, memory, disk, and network. Raw numbers alone rarely convey meaning without proper context, interpretation, and narrative framing to tell a complete story.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What Are System Statistics?</text>
    <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">System statistics are quantitative measurements describing CPU, memory, disk, and network</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">resource usage. Raw numbers need context to become meaningful insights.</text>
    <rect x="700" y="70" width="50" height="50" fill="#1976d2" rx="5"/>
    <text x="725" y="100" text-anchor="middle" font-family="Arial" font-size="24" fill="white">?</text>
  </g>
  
  <g class="step" id="step2" data-narration="Four key categories define system metrics: CPU tracks utilization and load, Memory monitors RAM and swap, Disk I/O measures throughput and latency, and Network analyzes bandwidth and errors.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Four Categories of System Metrics</text>
    <rect x="40" y="180" width="160" height="35" fill="#388e3c" rx="3"/>
    <text x="120" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="white">CPU</text>
    <text x="120" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">utilization, load</text>
    <rect x="210" y="180" width="160" height="35" fill="#388e3c" rx="3"/>
    <text x="290" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Memory</text>
    <text x="290" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">RAM, swap, cache</text>
    <rect x="380" y="180" width="160" height="35" fill="#388e3c" rx="3"/>
    <text x="460" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Disk I/O</text>
    <text x="460" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">throughput, latency</text>
    <rect x="550" y="180" width="160" height="35" fill="#388e3c" rx="3"/>
    <text x="630" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Network</text>
    <text x="630" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">bandwidth, errors</text>
  </g>
  
  <g class="step" id="step3" data-narration="Data storytelling combines data, narrative, and visuals into a powerful process. The five-step workflow involves establishing context, identifying patterns, building narrative, creating visualizations, and extracting actionable insights.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">The Data Storytelling Process</text>
    <rect x="40" y="268" width="100" height="35" fill="#ff9800" rx="3"/>
    <text x="90" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">1. Context</text>
    <line x1="140" y1="285" x2="160" y2="285" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="170" y="268" width="100" height="35" fill="#ff9800" rx="3"/>
    <text x="220" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">2. Pattern</text>
    <line x1="270" y1="285" x2="290" y2="285" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="300" y="268" width="100" height="35" fill="#ff9800" rx="3"/>
    <text x="350" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">3. Narrative</text>
    <line x1="400" y1="285" x2="420" y2="285" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="430" y="268" width="100" height="35" fill="#ff9800" rx="3"/>
    <text x="480" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">4. Visualize</text>
    <line x1="530" y1="285" x2="550" y2="285" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)"/>
    <rect x="560" y="268" width="100" height="35" fill="#ff9800" rx="3"/>
    <text x="610" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="white">5. Insight</text>
    <text x="700" y="300" font-family="Arial" font-size="9" fill="#666">Combine data + narrative + visuals</text>
  </g>
  
  <g class="step" id="step4" data-narration="Command-line utilities like top, vmstat, iostat, netstat, free, ps, and sar provide immediate insights. Enterprise platforms such as Nagios, Zabbix, Prometheus, and Grafana offer advanced monitoring capabilities.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Tools for System Monitoring</text>
    <rect x="40" y="356" width="340" height="35" fill="#9c27b0" rx="3"/>
    <text x="60" y="372" font-family="Arial" font-size="10" fill="white">Command-line: top, vmstat, iostat,</text>
    <text x="60" y="384" font-family="Arial" font-size="9" fill="#f3e5f5">netstat, free, ps, sar</text>
    <rect x="400" y="356" width="340" height="35" fill="#9c27b0" rx="3"/>
    <text x="420" y="372" font-family="Arial" font-size="10" fill="white">Advanced Platforms: Nagios, Zabbix,</text>
    <text x="420" y="384" font-family="Arial" font-size="9" fill="#f3e5f5">Prometheus, Grafana</text>
  </g>
  
  <g class="step" id="step5" data-narration="In this real-world example, CPU metrics show 85% user time and 10% system time. The data story reveals a CPU-bound application requiring code optimization or horizontal scaling as the recommended action.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Example 1: CPU Issue Diagnosis</text>
    <rect x="40" y="445" width="200" height="35" fill="#f44336" rx="3"/>
    <text x="140" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="white">%Cpu(s): 85.2 us, 10.3 sy</text>
    <text x="140" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffebee">4.5 id, 0.0 wa</text>
    <text x="260" y="460" font-family="Arial" font-size="10" fill="#333">Story: CPU is 85% user-space,</text>
    <text x="260" y="474" font-family="Arial" font-size="10" fill="#333">10% kernel. Indicates CPU-bound app.</text>
    <path d="M 480 462 L 560 462" stroke="#f44336" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
    <rect x="570" y="445" width="180" height="35" fill="#388e3c" rx="3"/>
    <text x="660" y="462" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Action: Optimize code</text>
    <text x="660" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">or scale horizontally</text>
  </g>
  
  <g class="step" id="step6" data-narration="In this memory leak example, memory progressively increases from 4.2GB to 13.4GB over five days. Swap usage begins appearing on day four, indicating a critical memory leak requiring immediate investigation and remediation.">
    <rect x="20" y="498" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Example 2: Memory Leak Detection</text>
    <rect x="40" y="532" width="300" height="40" fill="#1976d2" rx="3"/>
    <text x="60" y="548" font-family="Arial" font-size="9" fill="white">Day 1: 4.2GB | Day 2: 6.8GB | Day 3: 9.1GB</text>
    <text x="60" y="562" font-family="Arial" font-size="9" fill="white">Day 4: 11.2GB + 128MB swap | Day 5: 13.4GB + 512MB swap</text>
    <line x1="350" y1="552" x2="400" y2="552" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="410" y="530" width="100" height="40" fill="#f44336" rx="3"/>
    <text x="460" y="545" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Pattern:</text>
    <text x="460" y="558" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Memory Leak!</text>
    <text x="530" y="545" font-family="Arial" font-size="10" fill="#333">Upward trend with</text>
    <text x="530" y="560" font-family="Arial" font-size="10" fill="#333">swap = critical issue</text>
    <rect x="680" y="535" width="80" height="35" fill="#388e3c" rx="3"/>
    <text x="720" y="555" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Action:</text>
    <text x="720" y="567" text-anchor="middle" font-family="Arial" font-size="8" fill="#e8f5e9">Find &amp; fix leak</text>
  </g>
</svg>