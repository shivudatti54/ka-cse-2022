<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This educational topic covers capacity planning for software projects and the various types of requirements that engineers must understand and manage effectively.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Setting Goals for Capacity and Different Kinds of Requirements</text>
  </g>
  
  <g class="step" id="step1" data-narration="Capacity is the maximum work an organization can handle. Capacity planning determines resources needed to meet project objectives within constraints.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Capacity Planning Overview</text>
    <text x="40" y="94" font-family="Arial" font-size="10" fill="#333">Capacity: Maximum work an organization/team can handle in a given time</text>
    <text x="40" y="108" font-family="Arial" font-size="10" fill="#333">Capacity Planning: Process of determining resources needed to meet project objectives</text>
    <text x="40" y="122" font-family="Arial" font-size="10" fill="#333">Key Relationship: Clear requirements enable realistic capacity planning</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three main types of capacity exist in organizations: human resources with skilled personnel, infrastructure including hardware and servers, and overall organizational capability for handling projects.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Types of Capacity</text>
    <rect x="40" y="175" width="220" height="50" fill="#fff" stroke="#ff9800" stroke-width="0.5" rx="3"/>
    <text x="150" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Human Resource</text>
    <text x="150" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Developers, Testers,</text>
    <text x="150" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Designers, Managers</text>
    <rect x="270" y="175" width="220" height="50" fill="#fff" stroke="#ff9800" stroke-width="0.5" rx="3"/>
    <text x="380" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Infrastructure</text>
    <text x="380" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Servers, Storage,</text>
    <text x="380" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Networking Equipment</text>
    <rect x="500" y="175" width="220" height="50" fill="#fff" stroke="#ff9800" stroke-width="0.5" rx="3"/>
    <text x="610" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Organizational</text>
    <text x="610" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Project handling,</text>
    <text x="610" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Expertise management</text>
  </g>
  
  <g class="step" id="step3" data-narration="Six steps set capacity goals: analyze scope, estimate effort using COCOMO or function points, assess team skills, define constraints, add buffer, validate with stakeholders.">
    <rect x="20" y="234" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Steps in Setting Capacity Goals</text>
    <rect x="40" y="265" width="110" height="45" fill="#fff" stroke="#1976d2" stroke-width="0.5" rx="3"/>
    <text x="95" y="278" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">1. Analyze</text>
    <text x="95" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Project Scope</text>
    <text x="95" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Features, Deliverables</text>
    <rect x="160" y="265" width="110" height="45" fill="#fff" stroke="#1976d2" stroke-width="0.5" rx="3"/>
    <text x="215" y="278" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">2. Estimate</text>
    <text x="215" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Effort (COCOMO,</text>
    <text x="215" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Function Points)</text>
    <rect x="280" y="265" width="110" height="45" fill="#fff" stroke="#1976d2" stroke-width="0.5" rx="3"/>
    <text x="335" y="278" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">3. Assess</text>
    <text x="335" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Team Skills,</text>
    <text x="335" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Experience</text>
    <rect x="400" y="265" width="110" height="45" fill="#fff" stroke="#1976d2" stroke-width="0.5" rx="3"/>
    <text x="455" y="278" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">4. Define</text>
    <text x="455" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Constraints:</text>
    <text x="455" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Budget, Deadline</text>
    <rect x="520" y="265" width="110" height="45" fill="#fff" stroke="#1976d2" stroke-width="0.5" rx="3"/>
    <text x="575" y="278" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">5. Buffer</text>
    <text x="575" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">15-30% for</text>
    <text x="575" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Contingency</text>
    <rect x="640" y="265" width="110" height="45" fill="#fff" stroke="#1976d2" stroke-width="0.5" rx="3"/>
    <text x="695" y="278" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">6. Validate</text>
    <text x="695" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">With all</text>
    <text x="695" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Stakeholders</text>
  </g>
  
  <g class="step" id="step4" data-narration="Functional requirements define system behavior: what the system does in response to inputs. Examples include user authentication, report generation, shopping cart calculations, and payment processing.">
    <rect x="20" y="322" width="760" height="97" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Functional Requirements</text>
    <text x="40" y="358" font-family="Arial" font-size="10" fill="#333">Define SPECIFIC BEHAVIOR and functions the system must perform:</text>
    <rect x="40" y="368" width="340" height="30" fill="#fff" stroke="#f44336" stroke-width="0.5" rx="3"/>
    <text x="210" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">"System shall allow users to create accounts"</text>
    <rect x="390" y="368" width="340" height="30" fill="#fff" stroke="#f44336" stroke-width="0.5" rx="3"/>
    <text x="560" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">"System shall generate monthly reports in PDF"</text>
    <text x="40" y="412" font-family="Arial" font-size="9" fill="#555">Captured through: Use Cases, User Stories, Functional Specifications</text>
  </g>
  
  <g class="step" id="step5" data-narration="Non-functional requirements specify quality attributes: performance, scalability, reliability, security, usability, maintainability, and portability. They define how well the system performs.">
    <rect x="20" y="427" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="447" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Non-Functional Requirements (Quality Attributes)</text>
    <rect x="40" y="459" width="100" height="42" fill="#fff" stroke="#9c27b0" stroke-width="0.5" rx="3"/>
    <text x="90" y="471" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Performance</text>
    <text x="90" y="483" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Response time,</text>
    <text x="90" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">throughput</text>
    <rect x="150" y="459" width="100" height="42" fill="#fff" stroke="#9c27b0" stroke-width="0.5" rx="3"/>
    <text x="200" y="471" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Scalability</text>
    <text x="200" y="483" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Handle increased</text>
    <text x="200" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">load</text>
    <rect x="260" y="459" width="100" height="42" fill="#fff" stroke="#9c27b0" stroke-width="0.5" rx="3"/>
    <text x="310" y="471" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Reliability</text>
    <text x="310" y="483" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Availability,</text>
    <text x="310" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">MTBF</text>
    <rect x="370" y="459" width="100" height="42" fill="#fff" stroke="#9c27b0" stroke-width="0.5" rx="3"/>
    <text x="420" y="471" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Security</text>
    <text x="420" y="483" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Authentication,</text>
    <text x="420" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Encryption</text>
    <rect x="480" y="459" width="100" height="42" fill="#fff" stroke="#9c27b0" stroke-width="0.5" rx="3"/>
    <text x="530" y="471" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Usability</text>
    <text x="530" y="483" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Ease of use,</text>
    <text x="530" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Learning curve</text>
    <rect x="590" y="459" width="100" height="42" fill="#fff" stroke="#9c27b0" stroke-width="0.5" rx="3"/>
    <text x="640" y="471" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Maintainability</text>
    <text x="640" y="483" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Code quality,</text>
    <text x="640" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Modifications</text>
    <rect x="700" y="459" width="60" height="42" fill="#fff" stroke="#9c27b0" stroke-width="0.5" rx="3"/>
    <text x="730" y="471" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Portability</text>
    <text x="730" y="483" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cross-</text>
    <text x="730" y="495" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">platform</text>
  </g>
  
  <g class="step" id="step6" data-narration="Use MoSCoW prioritization to resolve conflicts: Must Have (60%), Should Have (25%), Could Have (10%), Won't Have (5%). This matches capacity to requirements.">
    <rect x="20" y="515" width="760" height="75" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="535" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Requirements Prioritization: MoSCoW Method</text>
    <text x="40" y="553" font-family="Arial" font-size="10" fill="#333">Resolves capacity vs requirements conflicts by prioritizing scope:</text>
    <rect x="40" y="563" width="145" height="22" fill="#f44336" stroke="#d32f2f" stroke-width="0.5" rx="3"/>
    <text x="112" y="576" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">Must Have (60%)</text>
    <rect x="195" y="563" width="145" height="22" fill="#ff9800" stroke="#f57c00" stroke-width="0.5" rx="3"/>
    <text x="267" y="576" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">Should Have (25%)</text>
    <rect x="350" y="563" width="145" height="22" fill="#4caf50" stroke="#388e3c" stroke-width="0.5" rx="3"/>
    <text x="422" y="576" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">Could Have (10%)</text>
    <rect x="505" y="563" width="145" height="22" fill="#9e9e9e" stroke="#757575" stroke-width="0.5" rx="3"/>
    <text x="577" y="576" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">Won't Have (5%)</text>
  </g>
</svg>