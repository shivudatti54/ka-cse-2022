<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="API capacity determines how many requests a system can handle while maintaining performance. Understanding this relationship is essential for building scalable applications.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">API Usage and Its Effect on Capacity</text>
  </g>
  
  <g class="step" id="step1" data-narration="Three main API patterns exist: RESTful APIs are stateless and scalable, GraphQL allows precise data fetching but needs query optimization, and WebSocket provides persistent real-time connections.">
    <rect x="20" y="58" width="760" height="80" fill="#fff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">API Architecture Patterns</text>
    <rect x="40" y="95" width="220" height="35" fill="#e3f2fd" rx="3"/>
    <text x="150" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">RESTful APIs</text>
    <text x="150" y="124" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Stateless, scalable</text>
    <rect x="270" y="95" width="220" height="35" fill="#f3e5f5" rx="3"/>
    <text x="380" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">GraphQL APIs</text>
    <text x="380" y="124" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Flexible queries</text>
    <rect x="500" y="95" width="220" height="35" fill="#fff3e0" rx="3"/>
    <text x="610" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">WebSocket APIs</text>
    <text x="610" y="124" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Real-time, persistent</text>
  </g>
  
  <g class="step" id="step2" data-narration="Four key factors affect API capacity: request complexity impacts processing time, payload size increases bandwidth, authentication adds cryptographic overhead, and concurrent connections consume server resources.">
    <rect x="20" y="146" width="760" height="80" fill="#fff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Factors Affecting API Capacity</text>
    <rect x="40" y="185" width="170" height="33" fill="#e8f5e9" rx="3"/>
    <text x="125" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Request Complexity</text>
    <text x="125" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Processing time</text>
    <rect x="220" y="185" width="170" height="33" fill="#e8f5e9" rx="3"/>
    <text x="305" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Payload Size</text>
    <text x="305" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Bandwidth usage</text>
    <rect x="400" y="185" width="170" height="33" fill="#e8f5e9" rx="3"/>
    <text x="485" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Authentication</text>
    <text x="485" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Crypto overhead</text>
    <rect x="580" y="185" width="170" height="33" fill="#e8f5e9" rx="3"/>
    <text x="665" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Concurrent Connections</text>
    <text x="665" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Memory, descriptors</text>
  </g>
  
  <g class="step" id="step3" data-narration="Rate limiting controls client requests using three algorithms: Token Bucket allows burst traffic, Leaky Bucket smooths traffic to constant rate, and Fixed Window counts requests in time periods.">
    <rect x="20" y="234" width="760" height="80" fill="#fff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Rate Limiting Strategies</text>
    <rect x="40" y="275" width="230" height="30" fill="#fff3e0" rx="3"/>
    <text x="155" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Token Bucket</text>
    <text x="155" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Allows bursts</text>
    <rect x="285" y="275" width="230" height="30" fill="#fff3e0" rx="3"/>
    <text x="400" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Leaky Bucket</text>
    <text x="400" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Smooths traffic</text>
    <rect x="530" y="275" width="230" height="30" fill="#fff3e0" rx="3"/>
    <text x="645" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Fixed Window Counter</text>
    <text x="645" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Simple, boundary spikes</text>
  </g>
  
  <g class="step" id="step4" data-narration="Caching improves capacity at three levels: Client-side stores responses locally, Server-side uses CDN or Redis, and HTTP caching uses ETags and Cache-Control headers for browsers.">
    <rect x="20" y="322" width="760" height="80" fill="#fff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Caching Strategies</text>
    <rect x="40" y="360" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="155" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Client-Side Caching</text>
    <text x="155" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Local storage</text>
    <rect x="285" y="360" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="400" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">Server-Side Caching</text>
    <text x="400" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">CDN, Redis, Memcached</text>
    <rect x="530" y="360" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="645" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">HTTP Caching</text>
    <text x="645" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">ETags, Cache-Control</text>
  </g>
  
  <g class="step" id="step5" data-narration="Database connection management improves capacity through pooling for reuse, query optimization with indexing, and read replicas for distributing read load across multiple servers.">
    <rect x="20" y="410" width="760" height="80" fill="#fff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Database Connection Management</text>
    <rect x="40" y="450" width="230" height="33" fill="#ffebee" rx="3"/>
    <text x="155" y="467" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Connection Pooling</text>
    <text x="155" y="479" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Reuse connections</text>
    <rect x="285" y="450" width="230" height="33" fill="#ffebee" rx="3"/>
    <text x="400" y="467" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Query Optimization</text>
    <text x="400" y="479" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Proper indexing</text>
    <rect x="530" y="450" width="230" height="33" fill="#ffebee" rx="3"/>
    <text x="645" y="467" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Read Replicas</text>
    <text x="645" y="479" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Distribute read load</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key formula: Maximum RPS equals concurrent connections divided by average response time. Apply 70-80 percent safety margin for practical capacity. Example: 1000 connections at 100ms equals 10000 theoretical RPS.">
    <rect x="20" y="498" width="760" height="90" fill="#fff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="522" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Capacity Calculation Example</text>
    <rect x="40" y="535" width="340" height="45" fill="#e3f2fd" rx="3"/>
    <text x="210" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Throughput Formula</text>
    <text x="210" y="567" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">RPS = Concurrent Connections / Response Time</text>
    <rect x="400" y="535" width="360" height="45" fill="#e8f5e9" rx="3"/>
    <text x="580" y="552" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Example Calculation</text>
    <text x="580" y="567" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">1000 ÷ 0.1s = 10,000 RPS (theoretical)</text>
    <text x="580" y="580" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Practical: 7,000-8,000 RPS (70-80% safety)</text>
  </g>
</svg>