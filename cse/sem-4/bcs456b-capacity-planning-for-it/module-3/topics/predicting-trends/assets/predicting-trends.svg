<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ff9800"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#9c27b0"/>
    </linearGradient>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#f44336"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565C0">Predicting Trends in Data Analytics</text>

  <g class="step" id="step0" data-narration="An introduction to predicting trends in data analytics, covering time series analysis, moving averages, exponential smoothing, and forecasting methods for business decisions.">
    <rect x="30" y="10" width="740" height="40" fill="#e3f2fd" rx="5"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1976d2">Overview: Trend Types, Time Series, Moving Averages, Exponential Smoothing, Linear Regression</text>
  </g>

  <g class="step" id="step1" data-narration="A trend is the general direction data moves over time—upward, downward, or stable. Types include secular, seasonal, cyclical, and random patterns.">
    <rect x="30" y="58" width="740" height="82" fill="url(#gradBlue)" rx="8"/>
    <circle cx="60" cy="99" r="15" fill="#1976d2"/>
    <text x="60" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">1</text>
    <text x="90" y="78" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565C0">Understanding Trends</text>
    <text x="90" y="96" font-family="Arial, sans-serif" font-size="11" fill="#333">Types: Secular (long-term), Seasonal (periodic), Cyclical (business cycles), Random</text>
    <text x="90" y="114" font-family="Arial, sans-serif" font-size="11" fill="#333">Trend identifies long-term direction ignoring short-term noise.</text>
    <rect x="500" y="70" width="250" height="58" fill="white" rx="5" opacity="0.7"/>
    <text x="520" y="88" font-family="Arial, sans-serif" font-size="10" fill="#333">↑ Secular (years/decades)</text>
    <text x="520" y="106" font-family="Arial, sans-serif" font-size="10" fill="#333">↔ Seasonal (fixed periods)</text>
    <text x="520" y="122" font-family="Arial, sans-serif" font-size="10" fill="#333">⟳ Cyclical (long cycles)</text>
  </g>

  <g class="step" id="step2" data-narration="Time series has four components: Trend, Seasonal, Cyclical, and Random. Additive model Y=T+S+C+R, Multiplicative Y=T×S×C×R for varying patterns.">
    <rect x="30" y="148" width="740" height="82" fill="url(#gradGreen)" rx="8"/>
    <circle cx="60" cy="189" r="15" fill="#388e3c"/>
    <text x="60" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">2</text>
    <text x="90" y="168" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Time Series Components</text>
    <text x="90" y="186" font-family="Arial, sans-serif" font-size="11" fill="#333">T=Trend (long-term), S=Seasonal (periodic), C=Cyclical (oscillatory), R=Random</text>
    <text x="90" y="206" font-family="Arial, sans-serif" font-size="11" fill="#333">Additive: Y = T+S+C+R | Multiplicative: Y = T × S × C × R</text>
    <rect x="500" y="168" width="250" height="50" fill="white" rx="5" opacity="0.7"/>
    <text x="515" y="188" font-family="Arial, sans-serif" font-size="10" fill="#333">Multiplicative when seasonal</text>
    <text x="515" y="205" font-family="Arial, sans-serif" font-size="10" fill="#333">variations increase with trend.</text>
  </g>

  <g class="step" id="step3" data-narration="Moving averages smooth data by averaging consecutive points. SMA gives equal weights; WMA and EMA give more weight to recent values.">
    <rect x="30" y="238" width="740" height="82" fill="url(#gradOrange)" rx="8"/>
    <circle cx="60" cy="279" r="15" fill="#ff9800"/>
    <text x="60" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">3</text>
    <text x="90" y="258" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Moving Averages</text>
    <text x="90" y="276" font-family="Arial, sans-serif" font-size="11" fill="#333">SMA(n) = (X₁+X₂+...+Xₙ)/n | Equal weights to all periods</text>
    <text x="90" y="296" font-family="Arial, sans-serif" font-size="11" fill="#333">EMA: α×X(t)+(1-α)×EMA(t-1) | WMA: weighted recent values higher importance</text>
    <rect x="500" y="258" width="250" height="50" fill="white" rx="5" opacity="0.7"/>
    <text x="515" y="278" font-family="Arial, sans-serif" font-size="10" fill="#333">Example: 12,15,14,18 → SMA(3)</text>
    <text x="515" y="295" font-family="Arial, sans-serif" font-size="10" fill="#333">= (12+15+14)/3 = 13.67</text>
  </g>

  <g class="step" id="step4" data-narration="Exponential smoothing assigns exponentially decreasing weights to past data. Holt's adds trend, Holt-Winters includes seasonal for complex forecasting.">
    <rect x="30" y="328" width="740" height="82" fill="url(#gradPurple)" rx="8"/>
    <circle cx="60" cy="369" r="15" fill="#9c27b0"/>
    <text x="60" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">4</text>
    <text x="90" y="348" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6a1b9a">Exponential Smoothing</text>
    <text x="90" y="366" font-family="Arial, sans-serif" font-size="11" fill="#333">Simple: S(t) = α×X(t) + (1-α)×S(t-1) | For stationary data</text>
    <text x="90" y="386" font-family="Arial, sans-serif" font-size="11" fill="#333">Holt's: L(t)+T(t) for trend | Holt-Winters: adds seasonal factor</text>
    <rect x="500" y="348" width="250" height="50" fill="white" rx="5" opacity="0.7"/>
    <text x="515" y="368" font-family="Arial, sans-serif" font-size="10" fill="#333">α = level smoothing, β = trend</text>
    <text x="515" y="385" font-family="Arial, sans-serif" font-size="10" fill="#333">(0 &lt; α, β &lt; 1)</text>
  </g>

  <g class="step" id="step5" data-narration="Linear regression finds trend line Y = a + bt, where b is slope (rate of change) and a is y-intercept (starting baseline value).">
    <rect x="30" y="418" width="740" height="82" fill="url(#gradRed)" rx="8"/>
    <circle cx="60" cy="459" r="15" fill="#f44336"/>
    <text x="60" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">5</text>
    <text x="90" y="438" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c62828">Linear Regression Trend</text>
    <text x="90" y="456" font-family="Arial, sans-serif" font-size="11" fill="#333">Equation: Y = a + bt | b = (nΣtY - ΣtΣY) / (nΣt² - (Σt)²)</text>
    <text x="90" y="476" font-family="Arial, sans-serif" font-size="11" fill="#333">Example: 20,25,28,35,42 → b=5.4, a=13.8 → Year7 = 13.8+5.4(7) = 51.6</text>
    <rect x="500" y="438" width="250" height="50" fill="white" rx="5" opacity="0.7"/>
    <text x="515" y="458" font-family="Arial, sans-serif" font-size="10" fill="#333">Convert years to 1,2,3...</text>
    <text x="515" y="475" font-family="Arial, sans-serif" font-size="10" fill="#333">before calculation</text>
  </g>

  <g class="step" id="step6" data-narration="Forecast accuracy uses metrics: MAE for average error, MSE for squared errors, RMSE as root mean square, and MAPE for percentage error.">
    <rect x="30" y="508" width="740" height="70" fill="#e0f2f1" rx="8"/>
    <circle cx="60" cy="543" r="15" fill="#00796b"/>
    <text x="60" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">6</text>
    <text x="90" y="528" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#004d40">Forecast Accuracy Metrics</text>
    <text x="90" y="550" font-family="Arial, sans-serif" font-size="11" fill="#333">MAE=Σ|Y-F|/n | MSE=Σ(Y-F)²/n | RMSE=√MSE | MAPE=(Σ|Y-F|/Y)×100/n</text>
    <rect x="500" y="520" width="250" height="45" fill="white" rx="5" opacity="0.7"/>
    <text x="515" y="542" font-family="Arial, sans-serif" font-size="10" fill="#333">Lower values = better forecast</text>
    <text x="515" y="558" font-family="Arial, sans-serif" font-size="10" fill="#333">Compare models using RMSE or MAPE</text>
  </g>
</svg>