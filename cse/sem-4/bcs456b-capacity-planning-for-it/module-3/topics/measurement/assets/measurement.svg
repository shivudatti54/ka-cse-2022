<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step0" data-narration="Software measurement assigns numbers to software attributes and characteristics. Metrics quantify the degree to which software products possess desired attributes for quality assessment.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="30" y="30" font-size="20" fill="#1976d2" font-weight="bold">Software Measurement and Metrics</text>
    <text x="550" y="30" font-size="12" fill="#388e3c"> - Software Engineering</text>
  </g>
  
  <g id="step1" data-narration="Software metrics classify into three categories: product metrics measure code quality, process metrics gauge development efficiency, and project metrics track cost and schedule.">
    <rect x="30" y="58" width="740" height="85" fill="#e3f2fd" rx="8"/>
    <text x="45" y="82" font-size="14" fill="#1976d2" font-weight="bold">Classification of Software Metrics</text>
    <rect x="45" y="95" width="220" height="38" fill="#1976d2" rx="5"/>
    <text x="55" y="112" font-size="11" fill="#ffffff">Product Metrics</text>
    <text x="55" y="125" font-size="9" fill="#e3f2fd">Size, Complexity, Quality</text>
    <rect x="280" y="95" width="220" height="38" fill="#388e3c" rx="5"/>
    <text x="290" y="112" font-size="11" fill="#ffffff">Process Metrics</text>
    <text x="290" y="125" font-size="9" fill="#e8f5e9">Defect Density, Productivity</text>
    <rect x="515" y="95" width="220" height="38" fill="#ff9800" rx="5"/>
    <text x="525" y="112" font-size="11" fill="#ffffff">Project Metrics</text>
    <text x="525" y="125" font-size="9" fill="#fff3e0">Effort, Schedule, Cost</text>
  </g>
  
  <g id="step2" data-narration="Lines of Code (LOC) measures code size. PLOC counts all lines, SLOC counts developer-written lines, LLOC counts only executable statements.">
    <rect x="30" y="151" width="740" height="85" fill="#e8f5e9" rx="8"/>
    <text x="45" y="175" font-size="14" fill="#388e3c" font-weight="bold">Size-Oriented Metrics: Lines of Code (LOC)</text>
    <rect x="45" y="190" width="160" height="38" fill="#388e3c" rx="5"/>
    <text x="55" y="207" font-size="11" fill="#ffffff">Physical LOC (PLOC)</text>
    <text x="55" y="220" font-size="9" fill="#e8f5e9">All lines including blanks</text>
    <rect x="220" y="190" width="160" height="38" fill="#388e3c" rx="5"/>
    <text x="230" y="207" font-size="11" fill="#ffffff">Source LOC (SLOC)</text>
    <text x="230" y="220" font-size="9" fill="#e8f5e9">Developer-written code</text>
    <rect x="395" y="190" width="160" height="38" fill="#388e3c" rx="5"/>
    <text x="405" y="207" font-size="11" fill="#ffffff">Logical LOC (LLOC)</text>
    <text x="405" y="220" font-size="9" fill="#e8f5e9">Executable statements</text>
    <text x="570" y="205" font-size="10" fill="#2e7d32">Advantages: Simple, language-independent</text>
    <text x="570" y="220" font-size="10" fill="#c62828">Disadvantages: Doesn't measure quality</text>
  </g>
  
  <g id="step3" data-narration="Function Point Analysis measures software functionality using five key components: External Inputs, Outputs, Inquiries, Interfaces, and Internal Files for accurate project sizing and estimation.">
    <rect x="30" y="244" width="740" height="85" fill="#fff3e0" rx="8"/>
    <text x="45" y="268" font-size="14" fill="#ff9800" font-weight="bold">Function Point Analysis (FPA)</text>
    <rect x="45" y="285" width="135" height="35" fill="#ff9800" rx="4"/>
    <text x="55" y="300" font-size="10" fill="#ffffff">EI - External Inputs</text>
    <rect x="190" y="285" width="135" height="35" fill="#ff9800" rx="4"/>
    <text x="200" y="300" font-size="10" fill="#ffffff">EO - External Outputs</text>
    <rect x="335" y="285" width="135" height="35" fill="#ff9800" rx="4"/>
    <text x="345" y="300" font-size="10" fill="#ffffff">EQ - External Inquiries</text>
    <rect x="480" y="285" width="135" height="35" fill="#ff9800" rx="4"/>
    <text x="490" y="300" font-size="10" fill="#ffffff">EFI - External Interfaces</text>
    <rect x="625" y="285" width="135" height="35" fill="#ff9800" rx="4"/>
    <text x="635" y="300" font-size="10" fill="#ffffff">ILF - Internal Files</text>
    <text x="45" y="325" font-size="11" fill="#e65100">FP = Count × [0.65 + (0.01 × ΣVIF)] where VIF = Value Influence Factor (14 factors rated 0-5)</text>
  </g>
  
  <g id="step4" data-narration="Halstead metrics use program syntax: n1 unique operators, n2 unique operands. Derived measures include Volume V and Difficulty D formulas.">
    <rect x="30" y="337" width="740" height="85" fill="#f3e5f5" rx="8"/>
    <text x="45" y="361" font-size="14" fill="#9c27b0" font-weight="bold">Halstead's Software Science Metrics</text>
    <text x="45" y="385" font-size="11" fill="#7b1fa2">Primitive Measures:</text>
    <rect x="45" y="395" width="100" height="20" fill="#9c27b0" rx="3"/>
    <text x="50" y="410" font-size="9" fill="#ffffff">n1 = unique operators</text>
    <rect x="155" y="395" width="100" height="20" fill="#9c27b0" rx="3"/>
    <text x="160" y="410" font-size="9" fill="#ffffff">n2 = unique operands</text>
    <rect x="265" y="395" width="100" height="20" fill="#9c27b0" rx="3"/>
    <text x="270" y="410" font-size="9" fill="#ffffff">N1 = total operators</text>
    <rect x="375" y="395" width="100" height="20" fill="#9c27b0" rx="3"/>
    <text x="380" y="410" font-size="9" fill="#ffffff">N2 = total operands</text>
    <text x="490" y="385" font-size="11" fill="#7b1fa2">Derived Measures:</text>
    <rect x="490" y="395" width="150" height="20" fill="#7b1fa2" rx="3"/>
    <text x="495" y="410" font-size="9" fill="#ffffff">Volume V = N × log2(n)</text>
    <rect x="650" y="395" width="110" height="20" fill="#7b1fa2" rx="3"/>
    <text x="655" y="410" font-size="9" fill="#ffffff">Difficulty D = (n1/2) × (N2/n2)</text>
  </g>
  
  <g id="step5" data-narration="Cyclomatic Complexity V(G) equals E minus N plus 2P, or simply D plus one where D is decision points. Values above 10 indicate risk.">
    <rect x="30" y="430" width="740" height="85" fill="#ffebee" rx="8"/>
    <text x="45" y="454" font-size="14" fill="#f44336" font-weight="bold">Cyclomatic Complexity (McCabe's Metrics)</text>
    <text x="45" y="478" font-size="11" fill="#c62828">Flow Graph Formula: V(G) = E - N + 2P</text>
    <text x="45" y="495" font-size="11" fill="#c62828">Decision Points Formula: V(G) = D + 1</text>
    <rect x="280" y="465" width="150" height="40" fill="#f44336" rx="5"/>
    <text x="290" y="482" font-size="10" fill="#ffffff">Complexity Interpretation:</text>
    <text x="290" y="497" font-size="9" fill="#ffcdd2">1-10: Low Risk</text>
    <rect x="440" y="465" width="140" height="40" fill="#ff9800" rx="5"/>
    <text x="450" y="482" font-size="10" fill="#ffffff">11-20: Moderate</text>
    <text x="450" y="497" font-size="9" fill="#fff3e0">21-40: High Risk</text>
    <rect x="590" y="465" width="140" height="40" fill="#c62828" rx="5"/>
    <text x="600" y="482" font-size="10" fill="#ffffff">Above 40: Very High</text>
    <text x="600" y="497" font-size="9" fill="#ffcdd2">Risk, Untestable</text>
  </g>
  
  <g id="step6" data-narration="Defect Density measures defects per KLOC. COCOMO estimates effort using formula E = a × (KLOC)^b for organic, semi-detached, and embedded modes.">
    <rect x="30" y="523" width="740" height="60" fill="#e3f2fd" rx="8"/>
    <text x="45" y="547" font-size="14" fill="#1976d2" font-weight="bold">Quality Metrics and Effort Estimation</text>
    <rect x="45" y="560" width="200" height="18" fill="#1976d2" rx="3"/>
    <text x="50" y="573" font-size="9" fill="#ffffff">Defect Density = Defects / KLOC</text>
    <text x="260" y="573" font-size="9" fill="#1565c0">Good: 0.1 - 2.0 defects/KLOC</text>
    <rect x="400" y="560" width="200" height="18" fill="#388e3c" rx="3"/>
    <text x="405" y="573" font-size="9" fill="#ffffff">COCOMO: E = a × (KLOC)^b</text>
    <text x="610" y="565" font-size="8" fill="#2e7d32">Organic: a=2.4,b=1.05</text>
    <text x="610" y="577" font-size="8" fill="#2e7d32">Semi-detached: a=3.0,b=1.12</text>
  </g>
</svg>