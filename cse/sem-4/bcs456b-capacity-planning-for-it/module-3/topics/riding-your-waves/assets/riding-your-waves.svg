<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about signal propagation and wave analysis in computing systems. This topic covers fundamental wave properties, propagation mechanisms, and digital signal conversion techniques.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Riding Your Waves: Signal Propagation and Wave Analysis</text>
  </g>
  
  <g class="step" id="step1" data-narration="A wave transfers energy through a medium without permanent displacement of matter. Key wave properties include wavelength measured in meters, frequency in Hertz, amplitude representing energy, and phase position.">
    <rect x="20" y="60" width="760" height="95" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">1. Fundamental Wave Properties</text>
    <rect x="40" y="90" width="160" height="55" fill="white" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="50" y="105" font-family="Arial" font-size="10" fill="#333">Wavelength (λ)</text>
    <text x="50" y="118" font-family="Arial" font-size="9" fill="#666">Distance between peaks</text>
    <text x="50" y="130" font-family="Arial" font-size="9" fill="#666">Measured in meters</text>
    <rect x="210" y="90" width="160" height="55" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="220" y="105" font-family="Arial" font-size="10" fill="#333">Frequency (f)</text>
    <text x="220" y="118" font-family="Arial" font-size="9" fill="#666">Oscillations per unit time</text>
    <text x="220" y="130" font-family="Arial" font-size="9" fill="#666">Measured in Hertz (Hz)</text>
    <rect x="380" y="90" width="160" height="55" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="390" y="105" font-family="Arial" font-size="10" fill="#333">Amplitude</text>
    <text x="390" y="118" font-family="Arial" font-size="9" fill="#666">Max displacement from</text>
    <text x="390" y="130" font-family="Arial" font-size="9" fill="#666">equilibrium, represents energy</text>
    <rect x="550" y="90" width="160" height="55" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="560" y="105" font-family="Arial" font-size="10" fill="#333">Phase</text>
    <text x="560" y="118" font-family="Arial" font-size="9" fill="#666">Position in waveform cycle</text>
    <text x="560" y="130" font-family="Arial" font-size="9" fill="#666">Measured in degrees/radians</text>
  </g>
  
  <g class="step" id="step2" data-narration="Digital computing systems use different wave types for specific purposes. Sinusoidal waves enable mathematical analysis, square waves represent binary data signals, and sawtooth waves assist in signal synthesis applications.">
    <rect x="20" y="165" width="760" height="95" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="185" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">2. Types of Waves in Computing</text>
    <rect x="40" y="200" width="220" height="50" fill="white" stroke="#388e3c" stroke-width="1" rx="3"/>
    <path d="M50 225 Q70 210 90 225 Q110 240 130 225 Q150 210 170 225 Q190 240 210 225" stroke="#1976d2" stroke-width="2" fill="none"/>
    <text x="230" y="225" font-family="Arial" font-size="10" fill="#333">Sinusoidal Wave</text>
    <text x="230" y="238" font-family="Arial" font-size="9" fill="#666">y(t) = A sin(2πft + φ)</text>
    <rect x="280" y="200" width="220" height="50" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <path d="M290 210 L290 240 L340 210 L340 240 L390 210 L390 240" stroke="#ff9800" stroke-width="2" fill="none"/>
    <text x="410" y="225" font-family="Arial" font-size="10" fill="#333">Square Wave</text>
    <text x="410" y="238" font-family="Arial" font-size="9" fill="#666">Binary signals (0s and 1s)</text>
    <rect x="520" y="200" width="220" height="50" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <path d="M530 210 L560 240 L590 210 L620 240 L650 210 L680 240" stroke="#f44336" stroke-width="2" fill="none"/>
    <text x="690" y="225" font-family="Arial" font-size="10" fill="#333">Sawtooth Wave</text>
    <text x="690" y="238" font-family="Arial" font-size="9" fill="#666">Used in signal synthesis</text>
  </g>
  
  <g class="step" id="step3" data-narration="Waves propagate through various mechanisms including free space following the inverse square law, guided transmission lines, reflection off surfaces, and diffraction bending around obstacles in communication systems.">
    <rect x="20" y="270" width="760" height="95" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="290" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">3. Wave Propagation Mechanisms</text>
    <rect x="40" y="305" width="175" height="50" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <circle cx="65" cy="330" r="12" stroke="#1976d2" stroke-width="2" fill="none"/>
    <circle cx="95" cy="330" r="8" stroke="#1976d2" stroke-width="2" fill="none"/>
    <circle cx="120" cy="330" r="4" stroke="#1976d2" stroke-width="2" fill="none"/>
    <text x="145" y="325" font-family="Arial" font-size="9" fill="#333">Free Space</text>
    <text x="145" y="338" font-family="Arial" font-size="8" fill="#666">Inverse square law</text>
    <rect x="225" y="305" width="175" height="50" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <rect x="235" y="315" width="60" height="30" stroke="#388e3c" stroke-width="2" fill="none" rx="2"/>
    <line x1="255" y1="330" x2="285" y2="330" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="305" y="325" font-family="Arial" font-size="9" fill="#333">Guided</text>
    <text x="305" y="338" font-family="Arial" font-size="8" fill="#666">Transmission lines</text>
    <rect x="410" y="305" width="175" height="50" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <line x1="420" y1="330" x2="450" y2="330" stroke="#9c27b0" stroke-width="2"/>
    <line x1="450" y1="330" x2="480" y2="310" stroke="#9c27b0" stroke-width="2" stroke-dasharray="4"/>
    <line x1="450" y1="330" x2="480" y2="350" stroke="#9c27b0" stroke-width="2" stroke-dasharray="4"/>
    <text x="490" y="325" font-family="Arial" font-size="9" fill="#333">Reflection</text>
    <text x="490" y="338" font-family="Arial" font-size="8" fill="#666">Bounce off surfaces</text>
    <rect x="595" y="305" width="175" height="50" fill="white" stroke="#ff9800" stroke-width="1" rx="3"/>
    <line x1="605" y1="325" x2="635" y2="335" stroke="#f44336" stroke-width="2"/>
    <line x1="635" y1="335" x2="665" y2="325" stroke="#f44336" stroke-width="2"/>
    <text x="675" y="325" font-family="Arial" font-size="9" fill="#333">Diffraction</text>
    <text x="675" y="338" font-family="Arial" font-size="8" fill="#666">Bend around obstacles</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Fourier Transform decomposes complex signals into their constituent frequency components, enabling efficient spectrum analysis and supporting filter design for advanced digital signal processing applications.">
    <rect x="20" y="375" width="760" height="95" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="395" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">4. Signal Analysis Techniques</text>
    <rect x="40" y="410" width="230" height="50" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="50" y="428" font-family="Arial" font-size="10" fill="#333">Fourier Transform</text>
    <text x="50" y="442" font-family="Arial" font-size="9" fill="#666">Decomposes time-domain signal</text>
    <text x="50" y="454" font-family="Arial" font-size="9" fill="#666">into frequency components</text>
    <rect x="280" y="410" width="230" height="50" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <text x="290" y="428" font-family="Arial" font-size="10" fill="#333">Fast Fourier Transform (FFT)</text>
    <text x="290" y="442" font-family="Arial" font-size="9" fill="#666">Efficient algorithm for</text>
    <text x="290" y="454" font-family="Arial" font-size="9" fill="#666">discrete Fourier transform</text>
    <rect x="520" y="410" width="250" height="50" fill="white" stroke="#9c27b0" stroke-width="1" rx="3"/>
    <line x1="535" y1="435" x2="555" y2="435" stroke="#1976d2" stroke-width="2"/>
    <line x1="560" y1="420" x2="560" y2="450" stroke="#1976d2" stroke-width="2"/>
    <line x1="560" y1="435" x2="570" y2="435" stroke="#1976d2" stroke-width="2"/>
    <line x1="575" y1="430" x2="575" y2="440" stroke="#1976d2" stroke-width="2"/>
    <line x1="585" y1="425" x2="585" y2="445" stroke="#1976d2" stroke-width="2"/>
    <line x1="595" y1="430" x2="595" y2="440" stroke="#1976d2" stroke-width="2"/>
    <line x1="605" y1="435" x2="625" y2="435" stroke="#1976d2" stroke-width="2"/>
    <text x="635" y="428" font-family="Arial" font-size="10" fill="#333">Spectrum Analysis</text>
    <text x="635" y="442" font-family="Arial" font-size="9" fill="#666">Visual representation of</text>
    <text x="635" y="454" font-family="Arial" font-size="9" fill="#666">signal frequency content</text>
  </g>
  
  <g class="step" id="step5" data-narration="Analog-to-digital conversion involves three key processes: sampling at twice the maximum frequency per the Nyquist theorem, quantizing amplitude values, and encoding results into binary representation.">
    <rect x="20" y="480" width="760" height="105" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="500" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">5. Digital Conversion: Sampling, Quantization, Encoding</text>
    <rect x="40" y="515" width="140" height="60" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="533" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Sampling</text>
    <line x1="50" y1="545" x2="80" y2="545" stroke="#1976d2" stroke-width="2"/>
    <line x1="55" y1="540" x2="55" y2="550" stroke="#1976d2" stroke-width="1"/>
    <line x1="75" y1="540" x2="75" y2="550" stroke="#1976d2" stroke-width="1"/>
    <line x1="100" y1="545" x2="130" y2="545" stroke="#f44336" stroke-width="2"/>
    <line x1="100" y1="540" x2="100" y2="550" stroke="#f44336" stroke-width="1"/>
    <line x1="130" y1="540" x2="130" y2="550" stroke="#f44336" stroke-width="1"/>
    <text x="145" y="568" font-family="Arial" font-size="9" fill="#666">Nyquist: f_s ≥ 2 × f_max</text>
    <rect x="200" y="515" width="140" height="60" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="210" y="533" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Quantization</text>
    <line x1="210" y1="555" x2="330" y2="555" stroke="#388e3c" stroke-width="2"/>
    <line x1="230" y1="545" x2="230" y2="565" stroke="#388e3c" stroke-width="1"/>
    <line x1="270" y1="540" x2="270" y2="570" stroke="#388e3c" stroke-width="1"/>
    <line x1="310" y1="545" x2="310" y2="565" stroke="#388e3c" stroke-width="1"/>
    <text x="230" y="542" font-family="Arial" font-size="8" fill="#666">3.2</text>
    <text x="270" y="537" font-family="Arial" font-size="8" fill="#666">3.8</text>
    <text x="310" y="542" font-family="Arial" font-size="8" fill="#666">4.1</text>
    <rect x="360" y="515" width="140" height="60" fill="white" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="370" y="533" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Encoding</text>
    <text x="370" y="550" font-family="Arial" font-size="9" fill="#333">Convert to binary</text>
    <text x="370" y="563" font-family="Arial" font-size="9" fill="#666">01001110...</text>
    <rect x="520" y="515" width="250" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="530" y="533" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Key Formulas</text>
    <text x="530" y="550" font-family="Arial" font-size="10" fill="#333">v = f × λ (Wave equation)</text>
    <text x="530" y="566" font-family="Arial" font-size="10" fill="#333">m = (A_max - A_min)/(A_max + A_min)</text>
  </g>
</svg>