<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Predicting Trends: Riding Your Waves - Learn time series analysis, trend identification, seasonal patterns, and forecasting techniques for data-driven business decisions.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Predicting Trends: Riding Your Waves</text>
  </g>
  
  <g class="step" id="step1" data-narration="Time series is sequential data recorded at successive intervals. Key components are trend (long-term direction), seasonality (repeating patterns), and noise (random variations).">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="58" width="760" height="25" fill="#1976d2" rx="8"/>
    <text x="40" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="white">1. Understanding Time Series</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">Time series: sequence of data points at successive time intervals with temporal dependency.</text>
    <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">Key components: Trend (long-term movement), Seasonality (periodic patterns), Noise (random variations).</text>
    <rect x="680" y="70" width="80" height="50" fill="#1976d2" rx="4"/>
    <text x="720" y="100" text-anchor="middle" font-family="Arial" font-size="20" fill="white">T + S + R</text>
  </g>
  
  <g class="step" id="step2" data-narration="Trends include monotonic (always up or down), secular (long-term direction), cyclical (long-period oscillations), and seasonal (regular yearly patterns observed annually).">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <rect x="20" y="146" width="760" height="25" fill="#388e3c" rx="8"/>
    <text x="40" y="163" font-family="Arial" font-size="13" font-weight="bold" fill="white">2. Types of Trends</text>
    <text x="40" y="188" font-family="Arial" font-size="10" fill="#333">• Monotonic: consistently increases or decreases without reversal</text>
    <text x="40" y="203" font-family="Arial" font-size="10" fill="#333">• Secular: long-term trend over years or decades</text>
    <text x="280" y="188" font-family="Arial" font-size="10" fill="#333">• Cyclical: repeating ups and downs over long periods</text>
    <text x="280" y="203" font-family="Arial" font-size="10" fill="#333">• Seasonal: regular patterns within a calendar year</text>
    <rect x="550" y="158" width="210" height="55" fill="#c8e6c9" rx="4"/>
    <text x="655" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Identify trend type first</text>
    <text x="655" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">to choose right method</text>
  </g>
  
  <g class="step" id="step3" data-narration="Simple Moving Average (SMA) averages N consecutive points. Formula: SMA(t) equals one over N times the sum of N previous values.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <rect x="20" y="234" width="760" height="25" fill="#ff9800" rx="8"/>
    <text x="40" y="251" font-family="Arial" font-size="13" font-weight="bold" fill="white">3. Moving Averages</text>
    <text x="40" y="276" font-family="Arial" font-size="10" fill="#333">Simple Moving Average (SMA): SMA(t) = (1/n) × Σx(t-i) for i from 0 to n-1</text>
    <text x="40" y="291" font-family="Arial" font-size="10" fill="#333">Example: 3-month SMA for sales [120, 135, 128, 142] = (142+128+135)/3 = 135</text>
    <text x="450" y="276" font-family="Arial" font-size="10" fill="#333">WMA: assigns weights to recent observations</text>
    <text x="450" y="291" font-family="Arial" font-size="10" fill="#333">Window size controls smoothing level</text>
    <rect x="650" y="256" width="110" height="45" fill="#ffe0b2" rx="4"/>
    <text x="705" y="278" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Window = 3</text>
    <text x="705" y="293" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">SMA = 135</text>
  </g>
  
  <g class="step" id="step4" data-narration="Exponential smoothing assigns exponentially decreasing weights to older data. Formula: next forecast equals alpha times actual plus one minus alpha times previous forecast.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <rect x="20" y="322" width="760" height="25" fill="#9c27b0" rx="8"/>
    <text x="40" y="339" font-family="Arial" font-size="13" font-weight="bold" fill="white">4. Exponential Smoothing</text>
    <text x="40" y="364" font-family="Arial" font-size="10" fill="#333">Formula: F(t+1) = α × D(t) + (1-α) × F(t), where α (alpha) is smoothing constant (0 to 1)</text>
    <text x="40" y="379" font-family="Arial" font-size="10" fill="#333">Higher α = more responsive to recent changes. Lower α = smoother but slower to adapt.</text>
    <rect x="320" y="354" width="180" height="35" fill="#e1bee7" rx="4"/>
    <text x="410" y="377" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Single: No trend/season</text>
    <rect x="510" y="354" width="180" height="35" fill="#e1bee7" rx="4"/>
    <text x="600" y="377" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Double: Handles trend</text>
    <rect x="700" y="354" width="60" height="35" fill="#e1bee7" rx="4"/>
    <text x="730" y="377" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Triple</text>
  </g>
  
  <g class="step" id="step5" data-narration="Time series decomposition separates data into trend, seasonal, and residual components using additive or multiplicative models for better forecasting accuracy.">
    <rect x="20" y="410" width="760" height="89" fill="#ffebee" rx="8"/>
    <rect x="20" y="410" width="760" height="25" fill="#f44336" rx="8"/>
    <text x="40" y="427" font-family="Arial" font-size="13" font-weight="bold" fill="white">5. Time Series Decomposition</text>
    <rect x="40" y="445" width="340" height="35" fill="#ffcdd2" rx="4"/>
    <text x="210" y="468" text-anchor="middle" font-family="Arial" font-size="11" fill="#c62828">Additive: Y(t) = T(t) + S(t) + R(t)</text>
    <rect x="400" y="445" width="340" height="35" fill="#ffcdd2" rx="4"/>
    <text x="570" y="468" text-anchor="middle" font-family="Arial" font-size="11" fill="#c62828">Multiplicative: Y(t) = T(t) × S(t) × R(t)</text>
    <text x="40" y="492" font-family="Arial" font-size="10" fill="#333">Use additive when seasonal variations are constant; multiplicative when they vary with data level.</text>
  </g>
  
  <g class="step" id="step6" data-narration="ARIMA combines autoregression, differencing, and moving average. Parameters p, d, q are selected using ACF and PACF plots. Stationarity is essential.">
    <rect x="20" y="507" width="760" height="81" fill="#e1f5fe" rx="8"/>
    <rect x="20" y="507" width="760" height="25" fill="#0288d1" rx="8"/>
    <text x="40" y="524" font-family="Arial" font-size="13" font-weight="bold" fill="white">6. ARIMA Models</text>
    <text x="40" y="549" font-family="Arial" font-size="10" fill="#333">ARIMA(p,d,q): p = lag observations, d = differencing degree, q = moving average order</text>
    <text x="40" y="564" font-family="Arial" font-size="10" fill="#333">Stationarity required: mean, variance constant over time. Use ADF test to check.</text>
    <text x="40" y="579" font-family="Arial" font-size="10" fill="#333">ACF helps find q (MA order), PACF helps find p (AR order). Differencing achieves stationarity (d parameter).</text>
    <rect x="550" y="537" width="210" height="40" fill="#b3e5fc" rx="4"/>
    <text x="655" y="561" text-anchor="middle" font-family="Arial" font-size="11" fill="#01579b">ACF → q, PACF → p</text>
  </g>
</svg>