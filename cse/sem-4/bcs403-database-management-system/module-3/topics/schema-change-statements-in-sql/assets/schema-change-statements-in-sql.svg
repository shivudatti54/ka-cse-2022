<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1600">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    <linearGradient id="summaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
    
    <!-- Arrow Marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes codeType {
      from { width: 0; }
      to { width: 100%; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .highlight { animation: pulse 2s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1600" fill="#f8f9fa"/>
  
  <!-- STEP 0: Title Card -->
  <g class="step" id="step0" data-narration="Welcome to Schema Change Statements in SQL. Learn how to modify database structures efficiently and safely.">
    <rect x="50" y="10" width="700" height="50" rx="10" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="white">Schema Change Statements in SQL</text>
    <text x="400" y="62" text-anchor="middle" font-size="12" fill="#546e7a">DDL Commands for Database Evolution</text>
  </g>
  
  <!-- STEP 1: What are Schema Changes -->
  <g class="step" id="step1" data-narration="Schema change statements modify database structure after creation, enabling databases to evolve with changing requirements.">
    <rect x="50" y="75" width="700" height="85" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="70" y="95" font-size="13" font-weight="bold" fill="#1565c0">What Are Schema Change Statements?</text>
    <text x="70" y="115" font-size="10" fill="#37474f">DDL commands that modify existing database objects without recreation.</text>
    <text x="70" y="132" font-size="10" fill="#37474f">Essential for: Adding new columns, modifying constraints, optimizing performance.</text>
    <rect x="580" y="90" width="150" height="55" rx="6" fill="#1976d2" opacity="0.1"/>
    <text x="655" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">ALTER</text>
    <text x="655" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">DROP</text>
    <text x="655" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">TRUNCATE</text>
  </g>
  
  <!-- STEP 2: Why Schema Changes Matter -->
  <g class="step" id="step2" data-narration="In real-world applications, requirements evolve. Schema changes allow databases to adapt without losing existing data.">
    <rect x="50" y="175" width="700" height="85" rx="8" fill="url(#tealGradient)" filter="url(#shadow)"/>
    <text x="70" y="195" font-size="13" font-weight="bold" fill="#00695c">Why Do We Need Schema Changes?</text>
    <text x="70" y="218" font-size="10" fill="#37474f">▸ Business requirements evolve (add customer phone numbers, loyalty points)</text>
    <text x="70" y="233" font-size="10" fill="#37474f">▸ Performance optimization (create indexes for faster queries)</text>
    <text x="70" y="248" font-size="10" fill="#37474f">▸ Database normalization (restructure tables for 3NF compliance)</text>
    <path d="M620 130 Q 700 180 620 230" stroke="#00695c" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" opacity="0.6"/>
    <text x="630" y="185" font-size="11" fill="#00695c" font-style="italic">Evolution</text>
  </g>
  
  <!-- STEP 3: ALTER TABLE - Add Column -->
  <g class="step" id="step3" data-narration="ALTER TABLE ADD adds new columns to existing tables. Existing rows receive default values or NULL.">
    <rect x="50" y="275" width="700" height="90" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="70" y="295" font-size="13" font-weight="bold" fill="#1565c0">ALTER TABLE: Adding Columns</text>
    <rect x="70" y="310" width="400" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="80" y="327" font-family="monospace" font-size="10" fill="#81c784">ALTER TABLE Employee</text>
    <text x="80" y="342" font-family="monospace" font-size="10" fill="#81c784">ADD COLUMN Phone VARCHAR(15);</text>
    <rect x="500" y="310" width="230" height="45" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="510" y="325" font-size="9" fill="#388e3c" font-weight="bold">Result:</text>
    <text x="510" y="340" font-size="9" fill="#2e7d32">New column added at end</text>
    <text x="510" y="352" font-size="9" fill="#2e7d32">Existing rows: NULL or DEFAULT</text>
  </g>
  
  <!-- STEP 4: ALTER TABLE - Modify Column -->
  <g class="step" id="step4" data-narration="ALTER TABLE MODIFY changes column definitions: data types, size, constraints, and default values.">
    <rect x="50" y="380" width="700" height="90" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="70" y="400" font-size="13" font-weight="bold" fill="#e65100">ALTER TABLE: Modifying Columns</text>
    <rect x="70" y="415" width="400" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="80" y="432" font-family="monospace" font-size="10" fill="#ffcc80">-- MySQL Syntax</text>
    <text x="80" y="447" font-family="monospace" font-size="10" fill="#ffcc80">ALTER TABLE Employee</text>
    <text x="80" y="460" font-family="monospace" font-size="10" fill="#ffcc80">MODIFY Salary DECIMAL(12,2);</text>
    <rect x="500" y="415" width="230" height="45" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="510" y="430" font-size="9" fill="#e65100" font-weight="bold">Note:</text>
    <text x="510" y="445" font-size="9" fill="#bf360c">PostgreSQL: MODIFY COLUMN</text>
    <text x="510" y="457" font-size="9" fill="#bf360c">SQL Server: ALTER COLUMN</text>
  </g>
  
  <!-- STEP 5: ALTER TABLE - Drop Column -->
  <g class="step" id="step5" data-narration="ALTER TABLE DROP permanently removes a column and all its data. This action cannot be undone without backup.">
    <rect x="50" y="485" width="700" height="90" rx="8" fill="url(#redGradient)" filter="url(#shadow)"/>
    <text x="70" y="505" font-size="13" font-weight="bold" fill="#c62828">ALTER TABLE: Dropping Columns</text>
    <rect x="70" y="520" width="400" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="80" y="537" font-family="monospace" font-size="10" fill="#ef9a9a">ALTER TABLE Employee</text>
    <text x="80" y="552" font-family="monospace" font-size="10" fill="#ef9a9a">DROP COLUMN PhoneNumber;</text>
    <rect x="500" y="520" width="230" height="45" rx="5" fill="#ffebee" stroke="#f44336"/>
    <text x="510" y="535" font-size="9" fill="#c62828" font-weight="bold">⚠ Warning:</text>
    <text x="510" y="550" font-size="9" fill="#b71c1c">Permanently removes data</text>
    <text x="510" y="562" font-size="9" fill="#b71c1c">Drop FK constraints first</text>
  </g>
  
  <!-- STEP 6: ALTER TABLE - Add Constraints -->
  <g class="step" id="step6" data-narration="ALTER TABLE ADD CONSTRAINT creates primary keys, foreign keys, unique constraints, and check conditions.">
    <rect x="50" y="590" width="700" height="90" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="70" y="610" font-size="13" font-weight="bold" fill="#6a1b9a">ALTER TABLE: Adding Constraints</text>
    <rect x="70" y="625" width="190" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="80" y="642" font-family="monospace" font-size="9" fill="#ce93d8">ALTER TABLE Orders</text>
    <text x="80" y="656" font-family="monospace" font-size="9" fill="#ce93d8">ADD FOREIGN KEY</text>
    <text x="80" y="668" font-family="monospace" font-size="9" fill="#ce93d8">(CustID) REFERENCES</text>
    
    <rect x="275" y="625" width="190" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="285" y="642" font-family="monospace" font-size="9" fill="#ce93d8">ALTER TABLE Employee</text>
    <text x="285" y="656" font-family="monospace" font-size="9" fill="#ce93d8">ADD CONSTRAINT</text>
    <text x="285" y="668" font-family="monospace" font-size="9" fill="#ce93d8">pk_emp PRIMARY KEY</text>
    
    <rect x="480" y="625" width="250" height="45" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="490" y="640" font-size="9" fill="#6a1b9a" font-weight="bold">Constraint Types:</text>
    <text x="490" y="655" font-size="9" fill="#4a148c">PRIMARY KEY, FOREIGN KEY</text>
    <text x="490" y="667" font-size="9" fill="#4a148c">UNIQUE, CHECK, NOT NULL</text>
  </g>
  
  <!-- STEP 7: DROP Statement -->
  <g class="step" id="step7" data-narration="DROP completely removes database objects. DROP TABLE deletes structure and data permanently.">
    <rect x="50" y="695" width="700" height="90" rx="8" fill="url(#redGradient)" filter="url(#shadow)"/>
    <text x="70" y="715" font-size="13" font-weight="bold" fill="#c62828">DROP Statement: Complete Removal</text>
    <rect x="70" y="730" width="250" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="80" y="747" font-family="monospace" font-size="10" fill="#ef9a9a">DROP TABLE Employee;</text>
    <text x="80" y="760" font-family="monospace" font-size="9" fill="#ef9a9a">-- Removes structure + data</text>
    
    <rect x="335" y="730" width="250" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="345" y="747" font-family="monospace" font-size="10" fill="#ef9a9a">DROP DATABASE CompanyDB;</text>
    <text x="345" y="760" font-family="monospace" font-size="9" fill="#ef9a9a">-- Removes entire database</text>
    
    <rect x="600" y="730" width="130" height="45" rx="5" fill="#ffebee" stroke="#f44336"/>
    <text x="610" y="745" font-size="9" fill="#c62828" font-weight="bold">Safe Practice:</text>
    <text x="610" y="760" font-size="9" fill="#b71c1c">DROP TABLE IF EXISTS</text>
  </g>
  
  <!-- STEP 8: TRUNCATE vs DELETE vs DROP -->
  <g class="step" id="step8" data-narration="Understand the critical differences: DROP removes structure, TRUNCATE removes all rows fast, DELETE removes conditionally.">
    <rect x="50" y="800" width="700" height="95" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="70" y="820" font-size="13" font-weight="bold" fill="#2e7d32">Comparison: DROP vs TRUNCATE vs DELETE</text>
    
    <!-- Column headers -->
    <rect x="70" y="835" width="160" height="20" rx="3" fill="#388e3c" opacity="0.3"/>
    <text x="150" y="849" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">DROP</text>
    <rect x="245" y="835" width="160" height="20" rx="3" fill="#388e3c" opacity="0.3"/>
    <text x="325" y="849" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">TRUNCATE</text>
    <rect x="420" y="835" width="160" height="20" rx="3" fill="#388e3c" opacity="0.3"/>
    <text x="500" y="849" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">DELETE</text>
    <rect x="595" y="835" width="135" height="20" rx="3" fill="#388e3c" opacity="0.3"/>
    <text x="662" y="849" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">Type</text>
    
    <!-- Row 1 -->
    <rect x="70" y="860" width="160" height="25" rx="3" fill="#e8f5e9"/>
    <text x="150" y="877" text-anchor="middle" font-size="9" fill="#2e7d32">Removes table</text>
    <rect x="245" y="860" width="160" height="25" rx="3" fill="#e8f5e9"/>
    <text x="325" y="877" text-anchor="middle" font-size="9" fill="#2e7d32">Keeps table</text>
    <rect x="420" y="860" width="160" height="25" rx="3" fill="#e8f5e9"/>
    <text x="500" y="877" text-anchor="middle" font-size="9" fill="#2e7d32">Keeps table</text>
    <rect x="595" y="860" width="135" height="25" rx="3" fill="#e8f5e9"/>
    <text x="662" y="877" text-anchor="middle" font-size="8" font-weight="bold" fill="#1b5e20">Structure</text>
    
    <!-- Row 2 -->
    <rect x="70" y="890" width="160" height="25" rx="3" fill="#e8f5e9"/>
    <text x="150" y="907" text-anchor="middle" font-size="9" fill="#2e7d32">Cannot rollback</text>
    <rect x="245" y="890" width="160" height="25" rx="3" fill="#e8f5e9"/>
    <text x="325" y="907" text-anchor="middle" font-size="9" fill="#2e7d32">Usually cannot</text>
    <rect x="420" y="890" width="160" height="25" rx="3" fill="#e8f5e9"/>
    <text x="500" y="907" text-anchor="middle" font-size="9" fill="#2e7d32">Can rollback</text>
    <rect x="595" y="890" width="135" height="25" rx="3" fill="#e8f5e9"/>
    <text x="662" y="907" text-anchor="middle" font-size="8" font-weight="bold" fill="#1b5e20">Rollback</text>
  </g>
  
  <!-- STEP 9: Index Management -->
  <g class="step" id="step9" data-narration="Indexes improve query performance by creating fast lookup structures. CREATE INDEX speeds up data retrieval.">
    <rect x="50" y="910" width="700" height="90" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="70" y="930" font-size="13" font-weight="bold" fill="#1565c0">Index Management</text>
    <rect x="70" y="945" width="280" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="80" y="962" font-family="monospace" font-size="10" fill="#90caf9">-- Create Index</text>
    <text x="80" y="977" font-family="monospace" font-size="10" fill="#90caf9">CREATE INDEX idx_dept</text>
    <text x="80" y="990" font-family="monospace" font-size="10" fill="#90caf9">ON Employee(DeptID);</text>
    
    <rect x="365" y="945" width="180" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="375" y="962" font-family="monospace" font-size="10" fill="#90caf9">-- Unique Index</text>
    <text x="375" y="977" font-family="monospace" font-size="10" fill="#90caf9">CREATE UNIQUE INDEX</text>
    <text x="375" y="990" font-family="monospace" font-size="10" fill="#90caf9">uk_email ON Employee(Email);</text>
    
    <rect x="560" y="945" width="170" height="45" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="570" y="960" font-size="9" fill="#1565c0" font-weight="bold">DROP Index:</text>
    <text x="570" y="975" font-size="9" fill="#0d47a1">MySQL: DROP INDEX</text>
    <text x="570" y="987" font-size="9" fill="#0d47a1">PostgreSQL: DROP INDEX</text>
  </g>
  
  <!-- STEP 10: View Management -->
  <g class="step" id="step10" data-narration="Views are virtual tables defined by queries. CREATE VIEW simplifies complex queries; DROP removes the view definition.">
    <rect x="50" y="1015" width="700" height="90" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="70" y="1035" font-size="13" font-weight="bold" fill="#6a1b9a">View Management</text>
    <rect x="70" y="1050" width="330" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="80" y="1067" font-family="monospace" font-size="10" fill="#ce93d8">CREATE VIEW EmployeeDetails AS</text>
    <text x="80" y="1081" font-family="monospace" font-size="9" fill="#ce93d8">SELECT e.Name, d.DeptName, e.Salary</text>
    <text x="80" y="1093" font-family="monospace" font-size="9" fill="#ce93d8">FROM Employee e JOIN Dept d ON e.DeptID=d.ID;</text>
    
    <rect x="415" y="1050" width="150" height="45" rx="5" fill="#263238" opacity="0.9"/>
    <text x="425" y="1067" font-family="monospace" font-size="10" fill="#ce93d8">DROP VIEW</text>
    <text x="425" y="1081" font-family="monospace" font-size="10" fill="#ce93d8">EmployeeDetails;</text>
    <text x="425" y="1093" font-family="monospace" font-size="9" fill="#ce93d8">-- Removes only the view</text>
    
    <rect x="580" y="1050" width="150" height="45" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="590" y="1067" font-size="9" fill="#6a1b9a" font-weight="bold">Note:</text>
    <text x="590" y="1081" font-size="9" fill="#4a148c">Underlying tables</text>
    <text x="590" y="1093" font-size="9" fill="#4a148c">are NOT affected</text>
  </g>
</svg>