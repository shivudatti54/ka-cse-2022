<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1460">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    
    <!-- Filters for shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes highlight {
      0%, 100% { fill-opacity: 1; }
      50% { fill-opacity: 0.5; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; }
    .dashed-line {
      stroke-dasharray: 10, 5;
      animation: drawLine 1s ease-out forwards;
    }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1460" fill="#f8f9fa"/>
  
  <!-- SECTION 1: INTRODUCTION -->
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to our exploration of Fourth Normal Form. We will learn how to handle multivalued dependencies in databases.">
    <rect x="50" y="10" width="700" height="45" rx="10" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Multivalued Dependency and Fourth Normal Form</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze"/>
  </g>
  
  <!-- Step 1: Problem Introduction -->
  <g class="step" id="step1" data-narration="Earlier normal forms handle functional dependencies, but fail when attributes have independent multiple values causing redundancy.">
    <rect x="50" y="65" width="700" height="85" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="70" y="90" font-size="14" font-weight="bold" fill="#1565c0">The Problem: Beyond Functional Dependencies</text>
    <text x="70" y="115" font-size="11" fill="#424242">1NF-3NF and BCNF handle single-value dependencies</text>
    <text x="70" y="132" font-size="11" fill="#424242">But what about multiple independent values?</text>
    <rect x="520" y="80" width="180" height="55" rx="6" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <text x="610" y="105" text-anchor="middle" font-size="11" fill="#1976d2">BCNF handles</text>
    <text x="610" y="122" text-anchor="middle" font-size="11" fill="#1976d2">Functional Dependencies</text>
    <path d="M400 115 L520 107" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Step 2: The Solution Preview -->
  <g class="step" id="step2" data-narration="Fourth Normal Form, introduced by Ronald Fagin in 1977, specifically addresses multivalued dependencies causing redundancy.">
    <rect x="50" y="160" width="700" height="85" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="70" y="185" font-size="14" font-weight="bold" fill="#2e7d32">Solution: Fourth Normal Form (4NF)</text>
    <text x="70" y="210" font-size="11" fill="#424242">Ronald Fagin, 1977 - Handles independent multivalued attributes</text>
    <text x="70" y="227" font-size="11" fill="#424242">Ensures no relation contains two or more independent MVDs</text>
    <circle cx="680" cy="202" r="25" fill="#388e3c"/>
    <text x="680" y="208" text-anchor="middle" font-size="24" fill="white" font-weight="bold">4NF</text>
  </g>
  
  <!-- SECTION 2: DEEP DIVE -->
  
  <!-- Step 3: MVD Definition -->
  <g class="step" id="step3" data-narration="A multivalued dependency exists when attribute B has multiple independent values for each value of attribute A in relation R.">
    <rect x="50" y="260" width="700" height="95" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="70" y="285" font-size="14" font-weight="bold" fill="#e65100">Multivalued Dependency (MVD) Definition</text>
    <text x="70" y="315" font-size="13" font-family="serif" fill="#1565c0">A ↠ B holds in R if for each value of A,</text>
    <text x="70" y="335" font-size="11" fill="#424242">the set of B values is independent of all other attributes</text>
    <rect x="400" y="300" width="280" height="40" rx="6" fill="#fff" stroke="#ff9800" stroke-width="2"/>
    <text x="540" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">A ↠ B</text>
    <text x="540" y="342" text-anchor="middle" font-size="10" fill="#757575">"A multidetermines B"</text>
  </g>
  
  <!-- Step 4: Key Properties -->
  <g class="step" id="step4" data-narration="MVDs have unique properties: independence of values and symmetry, unlike functional dependencies which don't have these characteristics.">
    <rect x="50" y="365" width="700" height="95" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="70" y="390" font-size="14" font-weight="bold" fill="#6a1b9a">Key Characteristics of MVDs</text>
    <rect x="70" y="410" width="310" height="40" rx="6" fill="#fff" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="225" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">1. Independence of Values</text>
    <text x="225" y="446" text-anchor="middle" font-size="9" fill="#757575">B values appear with all combinations</text>
    
    <rect x="400" y="410" width="310" height="40" rx="6" fill="#fff" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="555" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">2. Symmetry Property</text>
    <text x="555" y="446" text-anchor="middle" font-size="9" fill="#757575">If A↠B, then A�师范学院(R-A-B)</text>
  </g>
  
  <!-- Step 5: Trivial vs Non-Trivial -->
  <g class="step" id="step5" data-narration="Trivial MVDs don't cause redundancy when B is subset of A or A∪B equals all attributes. Non-trivial MVDs create redundancy.">
    <rect x="50" y="470" width="700" height="95" rx="8" fill="url(#redGradient)" filter="url(#shadow)"/>
    <text x="70" y="495" font-size="14" font-weight="bold" fill="#c62828">Trivial vs Non-Trivial MVDs</text>
    
    <rect x="70" y="515" width="320" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="230" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Trivial MVD</text>
    <text x="230" y="550" text-anchor="middle" font-size="10" fill="#424242">B ⊆ A or A ∪ B = R (No redundancy)</text>
    
    <rect x="410" y="515" width="320" height="40" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="570" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Non-Trivial MVD</text>
    <text x="570" y="550" text-anchor="middle" font-size="10" fill="#424242">B ⊄ A and A ∪ B ≠ R (Causes redundancy)</text>
  </g>
  
  <!-- Step 6: 4NF Definition -->
  <g class="step" id="step6" data-narration="A relation is in 4NF when for every non-trivial MVD A�师范学院B, attribute A must be a candidate key of the relation.">
    <rect x="50" y="575" width="700" height="95" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="70" y="600" font-size="14" font-weight="bold" fill="#1565c0">Fourth Normal Form (4NF) Definition</text>
    <rect x="70" y="625" width="450" height="35" rx="6" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <text x="295" y="648" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">R is in 4NF iff ∀ non-trivial MVDs A�师范学院B: A is a candidate key</text>
    <rect x="540" y="620" width="180" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="630" y="640" text-anchor="middle" font-size="11" fill="#1565c0">Stricter than BCNF</text>
    <text x="630" y="654" text-anchor="middle" font-size="9" fill="#757575">(candidate key vs superkey)</text>
  </g>
  
  <!-- Step 7: 4NF vs BCNF Relationship -->
  <g class="step" id="step7" data-narration="Every 4NF relation is in BCNF, but not every BCNF relation is in 4NF. 4NF handles MVDs while BCNF handles FDs.">
    <rect x="50" y="680" width="700" height="85" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="70" y="705" font-size="14" font-weight="bold" fill="#2e7d32">4NF ⊂ BCNF Relationship</text>
    
    <rect x="70" y="720" width="200" height="35" rx="6" fill="#fff" stroke="#388e3c"/>
    <text x="170" y="742" text-anchor="middle" font-size="12" fill="#2e7d32">4NF (handles MVDs)</text>
    
    <path d="M270 737 L300 737" stroke="#388e3c" stroke-width="2"/>
    <path d="M270 740 L300 740" stroke="#388e3c" stroke-width="2"/>
    <path d="M270 734 L300 734" stroke="#388e3c" stroke-width="2"/>
    
    <rect x="310" y="720" width="200" height="35" rx="6" fill="#fff" stroke="#388e3c"/>
    <text x="410" y="742" text-anchor="middle" font-size="12" fill="#2e7d32">BCNF (handles FDs)</text>
    
    <path d="M510 737 L580 737" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="590" y="720" width="140" height="35" rx="6" fill="#fff" stroke="#388e3c"/>
    <text x="660" y="742" text-anchor="middle" font-size="11" fill="#2e7d32">All 4NF ∈ BCNF</text>
  </g>
  
  <!-- Step 8: Example - TEACHES -->
  <g class="step" id="step8" data-narration="Consider TEACHES(Professor, Course, Textbook) where Dr. Smith teaches multiple courses and uses multiple textbooks independently.">
    <rect x="50" y="775" width="700" height="95" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="70" y="800" font-size="14" font-weight="bold" fill="#e65100">Example 1: TEACHES(Professor, Course, Textbook)</text>
    
    <!-- Table -->
    <rect x="70" y="815" width="550" height="45" rx="4" fill="#fff" stroke="#e65100"/>
    <line x1="70" y1="830" x2="620" y2="830" stroke="#e65100" stroke-width="1"/>
    <line x1="200" y1="815" x2="200" y2="860" stroke="#e65100" stroke-width="1"/>
    <line x1="380" y1="815" x2="380" y2="860" stroke="#e65100" stroke-width="1"/>
    <text x="135" y="825" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Professor</text>
    <text x="290" y="825" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Course</text>
    <text x="500" y="825" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Textbook</text>
    <text x="135" y="850" text-anchor="middle" font-size="9" fill="#424242">Dr. Smith</text>
    <text x="290" y="850" text-anchor="middle" font-size="9" fill="#424242">DBMS, ADA</text>
    <text x="500" y="850" text-anchor="middle" font-size="9" fill="#424hardt">DB, SQL</text>
    
    <rect x="630" y="820" width="100" height="40" rx="6" fill="#fff3e0" stroke="#ff9800"/>
    <text x="680" y="840" text-anchor="middle" font-size="10" fill="#e65100">MVDs:</text>
    <text x="680" y="855" text-anchor="middle" font-size="9" fill="#e65100">Prof�师范学院Course</text>
  </g>
  
  <!-- Step 9: Decomposition Algorithm -->
  <g class="step" id="step9" data-narration="To decompose for 4NF: for non-trivial MVD A�师范学院B, create R1(A,B) and R2(A, R-A-B). This decomposition is always lossless.">
    <rect x="50" y="880" width="700" height="95" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="70" y="905" font-size="14" font-weight="bold" fill="#6a1b9a">4NF Decomposition Algorithm</text>
    
    <text x="70" y="930" font-size="12" fill="#424242">For non-trivial MVD A�师范学院B:</text>
    
    <rect x="70" y="940" width="300" height="25" rx="4" fill="#fff" stroke="#9c27b0"/>
    <text x="220" y="958" text-anchor="middle" font-size="11" fill="#6a1b9a">R1(A, B)</text>
    
    <text x="380" y="955" font-size="16" fill="#9c27b0">+</text>
    
    <rect x="400" y="940" width="300" height="25" rx="4" fill="#fff" stroke="#9c27b0"/>
    <text x="550" y="958" text-anchor="middle" font-size="11" fill="#6a1b9a">R2(A, R - A - B)</text>
    
    <text x="400" y="975" text-anchor="middle" font-size="10" fill="#757575">Guaranteed lossless-join decomposition</text>
  </g>
  
  <!-- Step 10: Example Decomposition -->
  <g class="step" id="step10" data-narration="For TEACHES, decomposing by Professor�师范学院Course gives two 4NF relations: PROFESSOR_COURSES and PROFESSOR_TEXTBOOKS.">
    <rect x="50" y="985" width="700" height="95" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="70" y="1010" font-size="14" font-weight="bold" fill="#1565c0">Decomposing TEACHES to 4NF</text>
    
    <!-- Left relation -->
    <rect x="70" y="1030" width="280" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="1052" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">PROFESSOR_COURSES</text>
    <text x="210" y="1066" text-anchor="middle" font-size="10" fill="#757575">(Professor, Course) - Key: Professor</text>
    
    <!-- Right relation -->
    <rect x="370" y="1030" width="280" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="510" y="1052" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">PROFESSOR_TEXTBOOKS</text>
    <text x="510" y="1066" text-anchor="middle" font-size="10" fill="#757575">(Professor, Textbook) - Key: Professor</text>
    
    <circle cx="630" cy="1050" r="20" fill="#4caf50"/>
    <text x="630" y="1055" text-anchor="middle" font-size="20" fill="white">✓</text>
  </g>
  
  <!-- Step 11: Example 2 - STUDENT_ACTIVITY -->
  <g class="step" id="step11" data-narration="STUDENT_ACTIVITY shows independent MVDs: StudentID�师范学院Activity and StudentID�师范学院Equipment both violate 4NF.">
    <rect x="50" y="1090" width="700" height="85" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="70" y="1115" font-size="14" font-weight="bold" fill="#2e7d32">Example 2: STUDENT_ACTIVITY</text>
    
    <text x="70" y="1135" font-size="11" fill="#424242">Independent MVDs: StudentID�师范学院Activity, StudentID�师范学院Equipment</text>
    <text x="70" y="1152" font-size="11" fill="#424242">Decompose into: (StudentID, Activity) and (StudentID, Equipment)</text>
    
    <rect x="550" y="1125" width="180" height="40" rx="6" fill="#fff" stroke="#388e3c"/>
    <text x="640" y="1145" text-anchor="middle" font-size="11" fill="#2e7d32">Both in 4NF</text>
    <text x="640" y="1160" text-anchor="middle" font-size="10" fill="#757575">Key: StudentID</text>
  </g>
  
  <!-- SECTION 3: SUMMARY -->
  
  <!-- Step 12: Key Takeaways -->
  <g class="step" id="step12" data-narration="Remember: 4NF requires candidate keys for non-trivial MVDs. All 4NF relations are in BCNF, but not vice versa.">
    <rect x="50" y="1185" width="700" height="85" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="70" y="1210" font-size="14" font-weight="bold" fill="#e65100">Key Takeaways</text>
    
    <rect x="70" y="1225" width="220" height="35" rx="6" fill="#fff" stroke="#ff9800"/>
    <text x="180" y="1243" text-anchor="middle" font-size="10" fill="#e65100">4NF: Candidate Key</text>
    <text x="180" y="1256" text-anchor="middle" font-size="9" fill="#757575">for all non-trivial MVDs</text>
    
    <rect x="300" y="1225" width="220" height="35" rx="6" fill="#fff" stroke="#ff9800"/>
    <text x="410" y="1243" text-anchor="middle" font-size="10" fill="#e65100">Symmetry Property</text>
    <text x="410" y="1256" text-anchor="middle" font-size="9" fill="#757575">A�师范学院B implies A�师范学院(R-A-B)</text>
    
    <rect x="530" y="1225" width="200" height="35" rx="6" fill="#fff" stroke="#ff9800"/>
    <text x="630" y="1243" text-anchor="middle" font-size="10" fill="#e65100">Lossless Decomposition</text>
    <text x="630" y="1256" text-anchor="middle" font-size="9" fill="#757575">Guaranteed by algorithm</text>
  </g>
  
  <!-- Step 13: Exam Tips -->
  <g class="step" id="step13" data-narration="Exam tips: Check BCNF first, then MVDs. Remember candidate key requirement is stricter than BCNF's superkey. Use symmetry to find hidden MVDs.">
    <rect x="50" y="1280" width="700" height="75" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="70" y="1305" font-size="14" font-weight="bold" fill="#6a1b9a">Exam Tips & Summary</text>
    
    <text x="70" y="1328" font-size="10" fill="#424242">1. Check BCNF first, then analyze MVDs  |  2. Use symmetry property to find hidden MVDs</text>
    <text x="70" y="1345" font-size="10" fill="#424242">3. Remember: 4NF⊂BCNF⊂3NF  |  4. Candidate key requirement (stricter than BCNF's superkey)</text>
    
    <circle cx="700" cy="1318" r="22" fill="#9c27b0"/>
    <text x="700" y="1324" text-anchor="middle" font-size="28" fill="white">🎓</text>
  </g>

  <!-- Animated elements -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.3s" fill="freeze"/>
  </g>
</svg>