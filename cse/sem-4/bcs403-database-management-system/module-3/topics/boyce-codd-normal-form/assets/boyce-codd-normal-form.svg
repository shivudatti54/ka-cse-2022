<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1360">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1360" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Boyce-Codd Normal Form, a critical topic in database normalization for eliminating anomalies.">
    <rect x="0" y="0" width="800" height="50" fill="url(#titleGrad)"/>
    <text x="400" y="32" text-anchor="middle" font-size="22" fill="white" font-weight="bold">Boyce-Codd Normal Form (BCNF)</text>
    <text x="400" y="45" text-anchor="middle" font-size="10" fill="#e3f2fd">Database Management System - university Syllabus</text>
  </g>
  
  <!-- Step 1: Introduction - Why BCNF -->
  <g class="step" id="step1" data-narration="BCNF eliminates database anomalies like insertion, deletion, and update issues that 3NF cannot fully address.">
    <rect x="40" y="60" width="720" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="85" font-size="14" fill="#1565c0" font-weight="bold">Why BCNF Matters</text>
    <text x="60" y="105" font-size="11" fill="#333">BCNF was introduced in 1974 by Raymond Boyce and Edgar Codd to address</text>
    <text x="60" y="120" font-size="11" fill="#333">anomalies not fully resolved by Third Normal Form (3NF).</text>
    <rect x="550" y="75" width="180" height="55" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="640" y="95" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">Primary Goal</text>
    <text x="640" y="115" text-anchor="middle" font-size="11" fill="#d32f2f">Eliminate ALL anomalies</text>
  </g>
  
  <!-- Step 2: Normalization Hierarchy -->
  <g class="step" id="step2" data-narration="BCNF sits at the top of the normalization hierarchy after 1NF, 2NF, and 3NF, being more stringent than all.">
    <rect x="40" y="160" width="720" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="185" font-size="14" fill="#2e7d32" font-weight="bold">Normalization Hierarchy</text>
    <!-- Hierarchy pyramid -->
    <polygon points="400,195 480,195 460,210 420,210" fill="#81c784"/>
    <polygon points="420,210 460,210 440,230 400,230" fill="#66bb6a"/>
    <polygon points="400,230 440,230 420,250 380,250" fill="#4caf50"/>
    <polygon points="380,250 420,250 400,270 360,270" fill="#388e3c"/>
    <text x="550" y="205" font-size="12" fill="#2e7d32" font-weight="bold">1NF → 2NF → 3NF → BCNF</text>
    <text x="550" y="225" font-size="10" fill="#333">Each level builds upon</text>
    <text x="550" y="238" font-size="10" fill="#333">the previous, becoming</text>
    <text x="550" y="251" font-size="10" fill="#333">more stringent.</text>
  </g>
  
  <!-- Step 3: Functional Dependencies -->
  <g class="step" id="step3" data-narration="A functional dependency A → B means for every value of A, there is exactly one value of B in the relation.">
    <rect x="40" y="260" width="720" height="95" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="285" font-size="14" fill="#e65100" font-weight="bold">Functional Dependency (FD)</text>
    <text x="60" y="310" font-size="11" fill="#333">Definition: If attribute A functionally determines attribute B, then for every</text>
    <text x="60" y="325" font-size="11" fill="#333">value of A, there is exactly one value of B. Denoted as: A → B</text>
    <!-- Visual example -->
    <rect x="60" y="335" width="150" height="30" rx="4" fill="#fff" stroke="#ff9800"/>
    <text x="135" y="355" text-anchor="middle" font-size="11" fill="#333" font-family="monospace">A → B</text>
    <text x="230" y="355" font-size="10" fill="#666">("A determines B")</text>
    <!-- Arrow animation -->
    <path d="M350,345 L390,345" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <rect x="400" y="335" width="80" height="30" rx="4" fill="#fff" stroke="#4caf50"/>
    <text x="440" y="355" text-anchor="middle" font-size="10" fill="#333">Unique B</text>
  </g>
  
  <!-- Step 4: Candidate Keys & Superkeys -->
  <g class="step" id="step4" data-narration="A candidate key is a minimal superkey that uniquely identifies all tuples. A superkey can have extra attributes.">
    <rect x="40" y="370" width="720" height="95" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="395" font-size="14" fill="#6a1b9a" font-weight="bold">Candidate Keys &amp; Superkeys</text>
    <!-- Two column layout -->
    <rect x="60" y="410" width="300" height="45" rx="5" fill="#fff" stroke="#9c27b0"/>
    <text x="210" y="430" text-anchor="middle" font-size="11" fill="#6a1b9a" font-weight="bold">Candidate Key</text>
    <text x="210" y="447" text-anchor="middle" font-size="10" fill="#333">Minimal superkey - no proper subset</text>
    <text x="210" y="457" text-anchor="middle" font-size="10" fill="#333">can uniquely identify tuples</text>
    <rect x="380" y="410" width="300" height="45" rx="5" fill="#fff" stroke="#9c27b0"/>
    <text x="530" y="430" text-anchor="middle" font-size="11" fill="#6a1b9a" font-weight="bold">Superkey</text>
    <text x="530" y="447" text-anchor="middle" font-size="10" fill="#333">Set of attributes that uniquely</text>
    <text x="530" y="457" text-anchor="middle" font-size="10" fill="#333">identify tuples - may have extras</text>
  </g>
  
  <!-- Step 5: BCNF Definition -->
  <g class="step" id="step5" data-narration="BCNF requires that for every FD X → Y, X must be a superkey. This is stricter than 3NF's requirements.">
    <rect x="40" y="480" width="720" height="100" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="60" y="505" font-size="14" fill="#c62828" font-weight="bold">BCNF Definition (Formal)</text>
    <text x="60" y="530" font-size="12" fill="#333" font-family="'Courier New', monospace">A relation R is in BCNF if ∀ non-trivial FD X → Y:</text>
    <text x="60" y="550" font-size="14" fill="#c62828" font-family="'Courier New', monospace" font-weight="bold">         X must be a SUPERKEY of R</text>
    <!-- Visual formula -->
    <rect x="380" y="555" width="350" height="40" rx="5" fill="#fff" stroke="#c62828" stroke-width="2"/>
    <text x="555" y="578" text-anchor="middle" font-size="14" fill="#333" font-family="'Courier New', monospace">X → Y requires X = superkey</text>
    <!-- Note -->
    <text x="60" y="595" font-size="10" fill="#666">Note: Superkey contains at least one candidate key</text>
  </g>
  
  <!-- Step 6: 3NF vs BCNF -->
  <g class="step" id="step6" data-narration="3NF allows Y to be a prime attribute even if X is not a superkey, but BCNF eliminates this exception.">
    <rect x="40" y="595" width="720" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="620" font-size="14" fill="#1565c0" font-weight="bold">3NF vs BCNF - Key Difference</text>
    <!-- Comparison -->
    <rect x="60" y="635" width="280" height="50" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="200" y="655" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">3NF Condition</text>
    <text x="200" y="672" text-anchor="middle" font-size="10" fill="#333">X is superkey OR Y is prime attribute</text>
    <rect x="380" y="635" width="280" height="50" rx="5" fill="#ffebee" stroke="#f44336"/>
    <text x="520" y="655" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">BCNF Condition</text>
    <text x="520" y="672" text-anchor="middle" font-size="10" fill="#333">X MUST be a superkey (stricter)</text>
    <!-- Arrow -->
    <path d="M360,660 L370,660" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <text x="60" y="695" font-size="10" fill="#666">Every BCNF relation is in 3NF, but not vice versa.</text>
  </g>
  
  <!-- Step 7: Decomposition Algorithm -->
  <g class="step" id="step7" data-narration="The BCNF algorithm finds violating FDs, decomposes relations into R1 and R2, then repeats until all satisfy BCNF.">
    <rect x="40" y="710" width="720" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="735" font-size="14" fill="#2e7d32" font-weight="bold">BCNF Decomposition Algorithm</text>
    <!-- Steps -->
    <rect x="60" y="750" width="680" height="50" rx="5" fill="#fff" stroke="#388e3c"/>
    <circle cx="90" cy="775" r="12" fill="#388e3c"/>
    <text x="90" y="779" text-anchor="middle" font-size="11" fill="white" font-weight="bold">1</text>
    <text x="115" y="779" font-size="10" fill="#333">Find violating FD X → Y where X is not a superkey</text>
    <circle cx="90" cy="795" r="12" fill="#388e3c"/>
    <text x="90" y="799" text-anchor="middle" font-size="11" fill="white" font-weight="bold">2</text>
    <text x="115" y="799" font-size="10" fill="#333">Decompose: R1 = X ∪ Y, R2 = R - Y</text>
    <text x="550" y="787" font-size="9" fill="#666">Repeat until all in BCNF</text>
  </g>
  
  <!-- Step 8: Lossless Join -->
  <g class="step" id="step8" data-narration="Lossless join ensures decomposed relations can be joined to get exactly the original data without losses.">
    <rect x="40" y="825" width="720" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="850" font-size="14" fill="#e65100" font-weight="bold">Lossless Join &amp; Dependency Preservation</text>
    <text x="60" y="875" font-size="11" fill="#333">Lossless Join: (R1 ∩ R2) → R1 or (R1 ∩ R2) → R2 must hold.</text>
    <text x="60" y="890" font-size="10" fill="#333">Common attributes form a key for at least one relation.</text>
    <!-- Visual -->
    <rect x="450" y="860" width="280" height="40" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="590" y="880" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">BCNF = Always Lossless</text>
    <text x="590" y="895" text-anchor="middle" font-size="9" fill="#666">But may NOT preserve dependencies</text>
  </g>
  
  <!-- Step 9: Example 1 - Already in BCNF -->
  <g class="step" id="step9" data-narration="In this cyclic FD example A→B→C→A, all attributes are candidate keys, so the relation is already in BCNF.">
    <rect x="40" y="925" width="720" height="95" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="950" font-size="14" fill="#6a1b9a" font-weight="bold">Example 1: Already in BCNF</text>
    <text x="60" y="975" font-size="11" fill="#333">R(A,B,C) with FDs: A→B, B→C, C→A</text>
    <!-- Cyclic diagram -->
    <circle cx="200" cy="1010" r="25" fill="#e1bee7" stroke="#9c27b0" stroke-width="2"/>
    <text x="200" y="1015" text-anchor="middle" font-size="12" fill="#6a1b9a" font-weight="bold">A</text>
    <circle cx="280" cy="1010" r="25" fill="#e1bee7" stroke="#9c27b0" stroke-width="2"/>
    <text x="280" y="1015" text-anchor="middle" font-size="12" fill="#6a1b9a" font-weight="bold">B</text>
    <circle cx="240" cy="1045" r="25" fill="#e1bee7" stroke="#9c27b0" stroke-width="2"/>
    <text x="240" y="1050" text-anchor="middle" font-size="12" fill="#6a1b9a" font-weight="bold">C</text>
    <!-- Arrows -->
    <path d="M223,1010 Q240,990 258,1010" stroke="#9c27b0" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M280,1035 Q295,1055 260,1055" stroke="#9c27b0" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M215,1045 Q195,1065 220,1035" stroke="#9c27b0" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <text x="400" y="1000" font-size="10" fill="#2e7d32" font-weight="bold">All are Candidate Keys!</text>
    <text x="400" y="1015" font-size="10" fill="#333">A→B: A is key ✓</text>
    <text x="400" y="1030" font-size="10" fill="#333">B→C: B is key ✓</text>
    <text x="400" y="1045" font-size="10" fill="#333">C→A: C is key ✓</text>
    <text x="400" y="1060" font-size="11" fill="#2e7d32" font-weight="bold">Already in BCNF!</text>
  </g>
  
  <!-- Step 10: Example 2 - Decomposition -->
  <g class="step" id="step10" data-narration="In STUDENT relation, SID→Sname violates BCNF since SID is not a superkey. We decompose into R1 and R2.">
    <rect x="40" y="1035" width="720" height="105" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="1060" font-size="14" fill="#1565c0" font-weight="bold">Example 2: Decomposition Needed</text>
    <text x="60" y="1085" font-size="10" fill="#333">STUDENT(SID, Sname, Cname, Grade) FDs: SID→Sname, (SID,Cname)→Grade</text>
    <!-- Original -->
    <rect x="60" y="1095" width="200" height="35" rx="4" fill="#fff" stroke="#1976d2"/>
    <text x="160" y="1115" text-anchor="middle" font-size="10" fill="#333">Candidate Key: (SID, Cname)</text>
    <!-- Violation -->
    <rect x="280" y="1095" width="200" height="35" rx="4" fill="#ffebee" stroke="#f44336"/>
    <text x="380" y="1115" text-anchor="middle" font-size="10" fill="#c62828">SID → Sname VIOLATES BCNF!</text>
    <text x="380" y="1130" text-anchor="middle" font-size="9" fill="#666">SID is NOT a superkey</text>
    <!-- Decomposition result -->
    <text x="60" y="1155" font-size="11" fill="#333" font-weight="bold">Decomposition:</text>
    <rect x="130" y="1145" width="130" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="195" y="1162" text-anchor="middle" font-size="10" fill="#333">R1(SID, Sname)</text>
    <text x="195" y="1175" text-anchor="middle" font-size="9" fill="#388e3c">SID → Sname ✓</text>
    <rect x="280" y="1145" width="180" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="370" y="1162" text-anchor="middle" font-size="10" fill="#333">R2(SID, Cname, Grade)</text>
    <text x="370" y="1175" text-anchor="middle" font-size="9" fill="#388e3c">(SID,Cname) → Grade ✓</text>
    <text x="500" y="1160" font-size="10" fill="#2e7d32" font-weight="bold">Lossless: SID is key of R1</text>
  </g>
  
  <!-- Step 11: Example 3 - Complex -->
  <g class="step" id="step11" data-narration="For R(A,B,C,D) with FDs AB→C, C→D, D→A, we decompose twice to reach BCNF with three relations.">
    <rect x="40" y="1155" width="720" height="95" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="60" y="1180" font-size="14" fill="#c62828" font-weight="bold">Example 3: Complex Decomposition</text>
    <text x="60" y="1205" font-size="10" fill="#333">R(A,B,C,D) FDs: AB→C, C→D, D→A. Candidate Key: AB</text>
    <!-- Violations -->
    <text x="60" y="1225" font-size="10" fill="#c62828">Violations: C→D (C not superkey), D→A (D not superkey)</text>
    <!-- Steps -->
    <rect x="200" y="1195" width="120" height="30" rx="4" fill="#fff" stroke="#f44336"/>
    <text x="260" y="1213" text-anchor="middle" font-size="9" fill="#333">1st: R1(C,D), R2(A,B,C)</text>
    <rect x="340" y="1195" width="130" height="30" rx="4" fill="#fff" stroke="#f44336"/>
    <text x="405" y="1213" text-anchor="middle" font-size="9" fill="#333">2nd: R2→R2a(C,A), R2b(A,B,C)</text>
    <!-- Final -->
    <text x="500" y="1210" font-size="11" fill="#2e7d32" font-weight="bold">Final BCNF:</text>
    <rect x="580" y="1195" width="160" height="45" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="660" y="1208" text-anchor="middle" font-size="9" fill="#333">R1(C,D): C→D</text>
    <text x="660" y="1222" text-anchor="middle" font-size="9" fill="#333">R2a(C,A): C→A</text>
    <text x="660" y="1236" text-anchor="middle" font-size="9" fill="#333">R2b(A,B,C): AB→C</text>
  </g>
  
  <!-- Step 12: Key Summary -->
  <g class="step" id="step12" data-narration="Remember: BCNF requires X to be a superkey for every FD. Find candidate keys first, then decompose violating relations.">
    <rect x="40" y="1265" width="720" height="80" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="1290" font-size="14" fill="#2e7d32" font-weight="bold">Key Points Summary</text>
    <text x="60" y="1315" font-size="10" fill="#333">• BCNF: For every FD X→Y, X must be a superkey</text>
    <text x="60" y="1330" font-size="10" fill="#333">• Always find candidate keys BEFORE checking BCNF</text>
    <text x="380" y="1315" font-size="10" fill="#333">• BCNF decomposition is always lossless</text>
    <text x="380" y="1330" font-size="10" fill="#333">• May NOT preserve all dependencies</text>
    <text x="60" y="1350" font-size="11" fill="#1565c0" font-weight="bold">Every BCNF relation is in 3NF, but not vice versa!</text>
  </g>
  
  <!-- Step 13: Exam Tips -->
  <g class="step" id="step13" data-narration="For exams: memorize the BCNF definition, practice finding candidate keys, show each decomposition step clearly, verify lossless join.">
    <rect x="40" y="1360" width="720" height="60" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="1385" font-size="14" fill="#e65100" font-weight="bold">Exam Tips</text>
    <text x="180" y="1385" font-size="10" fill="#333">1. Memorize: X must be superkey for every FD</text>
    <text x="380" y="1385" font-size="10" fill="#333">2. Always find candidate keys first</text>
    <text x="560" y="1385" font-size="10" fill="#333">3. Show each decomposition step</text>
    <text x="180" y="1405" font-size="10" fill="#333">4. Verify lossless join after decomposition</text>
    <text x="380" y="1405" font-size="10" fill="#333">5. BCNF ≠ always dependency preserving</text>
    <text x="560" y="1405" font-size="10" fill="#333">6. Practice multiple examples!</text>
  </g>
</svg>