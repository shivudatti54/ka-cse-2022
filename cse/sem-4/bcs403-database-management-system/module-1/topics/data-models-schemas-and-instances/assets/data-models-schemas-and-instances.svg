<svg viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ab47bc"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f57c00"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .draw-line {
      stroke-dasharray: 300;
      animation: drawLine 1.5s ease-out forwards;
    }
  </style>
  
  <rect x="0" y="0" width="800" height="1100" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to understanding database fundamentals. We explore how data models, schemas, and instances form the backbone of modern DBMS.">
    <rect x="20" y="10" width="760" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Data Models, Schemas, and Instances</text>
  </g>
  
  <!-- Step 1: Why Data Models Matter -->
  <g class="step" id="step1" data-narration="Data models provide a formal framework for organizing data. They define structure, relationships, and constraints for database systems.">
    <rect x="30" y="65" width="740" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="65" width="8" height="85" rx="4" fill="#388e3c"/>
    <text x="50" y="85" font-size="13" font-weight="bold" fill="#1976d2">Why Data Models Matter</text>
    <text x="50" y="105" font-size="10" fill="#555">Data models provide abstraction - separating logical data organization from physical storage details.</text>
    <text x="50" y="122" font-size="10" fill="#555">They enable efficient data manipulation and ensure data integrity through constraints.</text>
    <text x="650" y="115" font-size="24" fill="#388e3c">📊</text>
    <path class="draw-line" d="M50,135 L750,135" stroke="#e0e0e0" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Step 2: Types of Data Models -->
  <g class="step" id="step2" data-narration="There are four main data models: hierarchical (tree structure), network (graph), relational (tables), and object-oriented (objects).">
    <rect x="30" y="160" width="740" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="50" y="180" font-size="13" font-weight="bold" fill="#1976d2">Types of Data Models</text>
    
    <!-- Hierarchical -->
    <rect x="50" y="195" width="165" height="45" rx="5" fill="#fff3e0"/>
    <text x="133" y="212" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Hierarchical</text>
    <text x="133" y="228" text-anchor="middle" font-size="8" fill="#e65100">Tree-like structure</text>
    
    <!-- Network -->
    <rect x="225" y="195" width="165" height="45" rx="5" fill="#e3f2fd"/>
    <text x="308" y="212" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Network</text>
    <text x="308" y="228" text-anchor="middle" font-size="8" fill="#1565c0">Graph relationships</text>
    
    <!-- Relational -->
    <rect x="400" y="195" width="165" height="45" rx="5" fill="#e8f5e9"/>
    <text x="483" y="212" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Relational</text>
    <text x="483" y="228" text-anchor="middle" font-size="8" fill="#2e7d32">Tables with rows/columns</text>
    
    <!-- Object-Oriented -->
    <rect x="575" y="195" width="165" height="45" rx="5" fill="#f3e5f5"/>
    <text x="658" y="212" text-anchor="middle" font-size="10" font-weight="bold" fill="#7b1fa2">Object-Oriented</text>
    <text x="658" y="228" text-anchor="middle" font-size="8" fill="#7b1fa2">Objects with methods</text>
  </g>
  
  <!-- Step 3: Three-Schema Architecture Overview -->
  <g class="step" id="step3" data-narration="The ANSI-SPARC three-schema architecture separates database views into external, conceptual, and internal levels for data independence.">
    <rect x="30" y="260" width="740" height="90" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Three-Schema Architecture (ANSI-SPARC)</text>
    
    <!-- Three boxes diagram -->
    <rect x="80" y="300" width="180" height="35" rx="5" fill="#ffcdd2"/>
    <text x="170" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">External Schema</text>
    
    <rect x="310" y="300" width="180" height="35" rx="5" fill="#c8e6c9"/>
    <text x="400" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Conceptual Schema</text>
    
    <rect x="540" y="300" width="180" height="35" rx="5" fill="#bbdefb"/>
    <text x="630" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Internal Schema</text>
    
    <!-- Arrows -->
    <path d="M260,317 L305,317" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M490,317 L535,317" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  </g>
  
  <!-- Step 4: Internal Schema -->
  <g class="step" id="step4" data-narration="Internal schema is the lowest level describing physical storage: file organizations, indexing methods, and access paths for data retrieval.">
    <rect x="30" y="360" width="740" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="360" width="8" height="90" rx="4" fill="#1565c0"/>
    <text x="50" y="380" font-size="13" font-weight="bold" fill="#1565c0">1. Internal Schema (Lowest Level)</text>
    <text x="50" y="400" font-size="10" fill="#555">• Describes physical storage structure</text>
    <text x="50" y="415" font-size="10" fill="#555">• File organizations, indexing, access paths</text>
    <text x="50" y="430" font-size="10" fill="#555">• Concerned with performance optimization</text>
    
    <!-- Storage representation -->
    <rect x="500" y="380" width="250" height="60" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
    <text x="625" y="400" text-anchor="middle" font-size="9" fill="#1565c0">Physical Storage</text>
    <text x="625" y="415" text-anchor="middle" font-size="8" fill="#555">Index: B+ Tree</text>
    <text x="625" y="428" text-anchor="middle" font-size="8" fill="#555">Disk: 1024 blocks</text>
  </g>
  
  <!-- Step 5: Conceptual Schema -->
  <g class="step" id="step5" data-narration="Conceptual schema provides the logical community view of the entire database, independent of physical storage details.">
    <rect x="30" y="460" width="740" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="460" width="8" height="90" rx="4" fill="#388e3c"/>
    <text x="50" y="480" font-size="13" font-weight="bold" fill="#388e3c">2. Conceptual Schema (Middle Level)</text>
    <text x="50" y="500" font-size="10" fill="#555">• Logical view from organization's perspective</text>
    <text x="50" y="515" font-size="10" fill="#555">• Defines all entities, relationships, constraints</text>
    <text x="50" y="530" font-size="10" fill="#555">• Community view - shared by all users</text>
    
    <!-- ER Diagram representation -->
    <rect x="500" y="480" width="250" height="60" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="625" y="500" text-anchor="middle" font-size="9" fill="#388e3c">Logical Structure</text>
    <circle cx="580" cy="522" r="12" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="580" y="526" text-anchor="middle" font-size="8" fill="#2e7d32">S</text>
    <line x1="592" y1="522" x2="658" y2="522" stroke="#388e3c" stroke-width="1"/>
    <circle cx="670" cy="522" r="12" fill="#a5d6a7" stroke="#388e3c"/>
    <text x="670" y="526" text-anchor="middle" font-size="8" fill="#2e7d32">C</text>
  </g>
  
  <!-- Step 6: External Schema -->
  <g class="step" id="step6" data-narration="External schema describes user-specific views, customizing data presentation for different users or applications.">
    <rect x="30" y="560" width="740" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="560" width="8" height="90" rx="4" fill="#c62828"/>
    <text x="50" y="580" font-size="13" font-weight="bold" fill="#c62828">3. External Schema (Highest Level)</text>
    <text x="50" y="600" font-size="10" fill="#555">• User-specific or application-specific views</text>
    <text x="50" y="615" font-size="10" fill="#555">• Different users see different portions of data</text>
    <text x="50" y="630" font-size="10" fill="#555">• Provides security and data abstraction</text>
    
    <!-- User views -->
    <rect x="480" y="580" width="130" height="60" rx="5" fill="#ffebee" stroke="#c62828"/>
    <text x="545" y="600" text-anchor="middle" font-size="9" fill="#c62828">Student View</text>
    <text x="545" y="618" text-anchor="middle" font-size="7" fill="#555">My grades, courses</text>
    
    <rect x="620" y="580" width="130" height="60" rx="5" fill="#fff3e0" stroke="#e65100"/>
    <text x="685" y="600" text-anchor="middle" font-size="9" fill="#e65100">Admin View</text>
    <text x="685" y="618" text-anchor="middle" font-size="7" fill="#555">All records, reports</text>
  </g>
  
  <!-- Step 7: Schema vs Instance -->
  <g class="step" id="step7" data-narration="Schema defines database structure (blueprint), while instance is actual data at a point in time. Schema is static; instance changes frequently.">
    <rect x="30" y="660" width="740" height="110" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="660" width="8" height="110" rx="4" fill="#7b1fa2"/>
    <text x="50" y="680" font-size="13" font-weight="bold" fill="#7b1fa2">Schema vs Instance</text>
    
    <!-- Schema box -->
    <rect x="50" y="695" width="320" height="65" rx="5" fill="#f3e5f5" stroke="#7b1fa2"/>
    <text x="210" y="715" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">SCHEMA (Structure)</text>
    <text x="210" y="732" text-anchor="middle" font-size="9" fill="#555">PRODUCT(product_id, name, price, stock)</text>
    <text x="210" y="748" text-anchor="middle" font-size="8" fill="#7b1fa2">Static - changes infrequently</text>
    
    <!-- Instance boxes -->
    <rect x="380" y="695" width="370" height="30" rx="4" fill="#e8f5e9"/>
    <text x="400" y="713" font-size="8" fill="#2e7d32">T1: Laptop@89999, Mouse@599</text>
    
    <rect x="380" y="730" width="370" height="30" rx="4" fill="#fff3e0"/>
    <text x="400" y="748" font-size="8" fill="#e65100">T2: Laptop@84999(+5 sold), +USB Hub</text>
    
    <text x="565" y="720" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">Instances</text>
    <text x="565" y="760" text-anchor="middle" font-size="8" fill="#7b1fa2">Dynamic - changes frequently</text>
  </g>
  
  <!-- Step 8: Data Independence -->
  <g class="step" id="step8" data-narration="Data independence allows schema changes at one level without affecting higher levels: physical independence protects conceptual from internal changes.">
    <rect x="30" y="780" width="740" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="780" width="8" height="95" rx="4" fill="#f57c00"/>
    <text x="50" y="800" font-size="13" font-weight="bold" fill="#f57c00">Data Independence</text>
    
    <!-- Physical Independence -->
    <rect x="50" y="815" width="320" height="50" rx="5" fill="#fff3e0"/>
    <text x="210" y="835" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Physical Data Independence</text>
    <text x="210" y="852" text-anchor="middle" font-size="8" fill="#555">Internal Schema → Conceptual unchanged</text>
    
    <!-- Logical Independence -->
    <rect x="400" y="815" width="320" height="50" rx="5" fill="#e3f2fd"/>
    <text x="560" y="835" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Logical Data Independence</text>
    <text x="560" y="852" text-anchor="middle" font-size="8" fill="#555">Conceptual Schema → External unchanged</text>
    
    <text x="400" y="875" text-anchor="middle" font-size="9" fill="#f57c00">Key: Changes at lower level don't affect higher level views</text>
  </g>
  
  <!-- Step 9: Subschemas -->
  <g class="step" id="step9" data-narration="Subschemas are subsets of external schema, defining specific user views with authorized data access for security and customization.">
    <rect x="30" y="885" width="740" height="80" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="885" width="8" height="80" rx="4" fill="#1976d2"/>
    <text x="50" y="905" font-size="13" font-weight="bold" fill="#1976d2">Subschemas</text>
    <text x="50" y="925" font-size="10" fill="#555">• Derived from external schema - specific user/application views</text>
    <text x="50" y="940" font-size="10" fill="#555">• Provide security by restricting access to authorized data portions</text>
    <text x="50" y="955" font-size="10" fill="#555">• Each user sees only what they need - enables data hiding and protection</text>
    
    <!-- Subschema visual -->
    <rect x="550" y="905" width="200" height="50" rx="5" fill="url(#blueGrad)" opacity="0.8"/>
    <text x="650" y="925" text-anchor="middle" font-size="9" fill="white">Hospital Database</text>
    <text x="650" y="940" text-anchor="middle" font-size="7" fill="white">Patient: Medical history only</text>
    <text x="650" y="952" text-anchor="middle" font-size="7" fill="white">Doctor: + Diagnoses, prescriptions</text>
  </g>
  
  <!-- Step 10: Summary -->
  <g class="step" id="step10" data-narration="In summary: Data models structure databases; three-schema architecture provides abstraction; schema is static blueprint while instance holds actual data.">
    <rect x="20" y="975" width="760" height="110" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="400" y="998" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Key Takeaways</text>
    
    <text x="80" y="1020" font-size="9" fill="white">✓ Data Models: Hierarchical, Network, Relational, OOD</text>
    <text x="80" y="1035" font-size="9" fill="white">✓ Three-Schema: External → Conceptual → Internal</text>
    <text x="400" y="1020" font-size="9" fill="white">✓ Schema = Structure (blueprint), Instance = Actual Data</text>
    <text x="400" y="1035" font-size="9" fill="white">✓ Data Independence: Physical & Logical protection</text>
    <text x="650" y="1027" text-anchor="middle" font-size="10" fill="white">ANSI-SPARC 1975</text>
    <text x="400" y="1075" text-anchor="middle" font-size="8" fill="white" opacity="0.8">Master these concepts to understand database architecture fundamentals</text>
  </g>
</svg>