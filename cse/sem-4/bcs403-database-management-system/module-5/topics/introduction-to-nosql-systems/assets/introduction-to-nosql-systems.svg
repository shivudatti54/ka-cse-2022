<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1520">
<defs>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1565c0"/>
    <stop offset="100%" style="stop-color:#42a5f5"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#2e7d32"/>
    <stop offset="100%" style="stop-color:#66bb6a"/>
  </linearGradient>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#e65100"/>
    <stop offset="100%" style="stop-color:#ff9800"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#6a1b9a"/>
    <stop offset="100%" style="stop-color:#ab47bc"/>
  </linearGradient>
  <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#c62828"/>
    <stop offset="100%" style="stop-color:#ef5350"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
  </filter>
  <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
  </marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
    <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
  </marker>
</defs>

<style>
  @keyframes fadeInSlide {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes textReveal {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes drawLine {
    from { stroke-dashoffset: 500; }
    to { stroke-dashoffset: 0; }
  }
  .step { animation: fadeInSlide 0.6s ease-out; }
  .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
  .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
  .title-box { fill: url(#titleGrad); }
  .highlight { fill: #ff9800; font-weight: bold; }
</style>

<rect width="800" height="1520" fill="#f8f9fa"/>

<!-- STEP 0: Title -->
<g class="step" id="step0" data-narration="Welcome to Introduction to NoSQL Systems. This topic covers modern database technologies that power today's internet applications.">
  <rect x="0" y="0" width="800" height="50" fill="url(#titleGrad)"/>
  <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="white">Introduction to NoSQL Systems</text>
  <text x="400" y="45" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">2022 Scheme - CSE Branch</text>
</g>

<!-- STEP 1: What is NoSQL? -->
<g class="step" id="step1" data-narration="NoSQL stands for Not Only SQL, representing databases designed for flexible schema, horizontal scalability, and distributed data storage.">
  <rect x="20" y="60" width="760" height="85" rx="8" fill="#e3f2fd" filter="url(#shadow)"/>
  <text x="40" y="85" font-size="14" font-weight="bold" fill="#1565c0">What is NoSQL?</text>
  <text x="40" y="105" font-size="11" fill="#333">NoSQL = "Not Only SQL"</text>
  <text x="40" y="120" font-size="10" fill="#555">• Flexible schema design</text>
  <text x="40" y="133" font-size="10" fill="#555">• Horizontal scalability (scale-out)</text>
  <rect x="520" y="70" width="240" height="60" rx="6" fill="#e8f5e9"/>
  <text x="640" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Why NoSQL?</text>
  <text x="640" y="112" text-anchor="middle" font-size="10" fill="#333">Handle massive unstructured</text>
  <text x="640" y="124" text-anchor="middle" font-size="10" fill="#333">data volumes efficiently</text>
</g>

<!-- STEP 2: Evolution -->
<g class="step" id="step2" data-narration="Traditional RDBMS struggled with unstructured data, leading to NoSQL emergence. Companies like Google and Amazon pioneered this shift.">
  <rect x="20" y="160" width="760" height="85" rx="8" fill="#fff3e0" filter="url(#shadow)"/>
  <text x="40" y="185" font-size="14" font-weight="bold" fill="#e65100">Evolution: RDBMS → NoSQL</text>
  <path d="M180 200 L280 200" stroke="#ff9800" stroke-width="3" marker-end="url(#arrowBlue)">
    <animate attributeName="stroke-dasharray" from="0,100" to="100,0" dur="1s" fill="freeze"/>
  </path>
  <rect x="80" y="185" width="90" height="40" rx="5" fill="#ef5350"/>
  <text x="125" y="205" text-anchor="middle" font-size="10" fill="white" font-weight="bold">RDBMS</text>
  <text x="125" y="218" text-anchor="middle" font-size="8" fill="white">Structured data</text>
  <rect x="290" y="185" width="90" height="40" rx="5" fill="#66bb6a"/>
  <text x="335" y="205" text-anchor="middle" font-size="10" fill="white" font-weight="bold">NoSQL</text>
  <text x="335" y="218" text-anchor="middle" font-size="8" fill="white">Unstructured</text>
  <text x="400" y="205" font-size="10" fill="#555">Web apps grew →</text>
  <text x="400" y="220" font-size="10" fill="#555">Massive data volumes</text>
  <rect x="500" y="185" width="260" height="45" rx="5" fill="#e1bee7"/>
  <text x="630" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">Real-world Usage</text>
  <text x="630" y="218" text-anchor="middle" font-size="9" fill="#333">Facebook, Google, Amazon, Netflix</text>
</g>

<!-- STEP 3: Types of NoSQL - Overview -->
<g class="step" id="step3" data-narration="There are four main types of NoSQL databases: Document, Key-Value, Column Family, and Graph databases, each optimized for specific use cases.">
  <rect x="20" y="260" width="760" height="90" rx="8" fill="#e8eaf6" filter="url(#shadow)"/>
  <text x="40" y="285" font-size="14" font-weight="bold" fill="#303f9f">Four Types of NoSQL Databases</text>
  <rect x="40" y="300" width="170" height="40" rx="5" fill="#42a5f5"/>
  <text x="125" y="320" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Document</text>
  <rect x="220" y="300" width="170" height="40" rx="5" fill="#66bb6a"/>
  <text x="305" y="320" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Key-Value</text>
  <rect x="400" y="300" width="170" height="40" rx="5" fill="#ff9800"/>
  <text x="485" y="320" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Column Family</text>
  <rect x="580" y="300" width="180" height="40" rx="5" fill="#ab47bc"/>
  <text x="670" y="320" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Graph</text>
  <text x="400" y="345" text-anchor="middle" font-size="9" fill="#666">MongoDB, Redis, Cassandra, Neo4j</text>
</g>

<!-- STEP 4: Document Databases -->
<g class="step" id="step4" data-narration="Document databases store data in JSON/BSON format with flexible schemas. MongoDB is the most popular example, ideal for content management systems.">
  <rect x="20" y="360" width="760" height="90" rx="8" fill="#e3f2fd" filter="url(#shadow)"/>
  <rect x="30" y="375" width="35" height="35" rx="4" fill="#42a5f5"/>
  <text x="47" y="397" text-anchor="middle" font-size="18" fill="white">D</text>
  <text x="75" y="385" font-size="13" font-weight="bold" fill="#1565c0">Document Databases</text>
  <text x="75" y="400" font-size="10" fill="#555">Store data as JSON/BSON documents</text>
  <text x="75" y="415" font-size="9" fill="#777">Each document has key-value pairs with varying structures</text>
  <rect x="350" y="375" width="410" height="60" rx="6" fill="#263238"/>
  <text x="555" y="395" text-anchor="middle" font-size="11" fill="#4fc3f7">Example: MongoDB</text>
  <text x="555" y="410" text-anchor="middle" font-size="9" fill="#b0bec5" font-family="monospace">{ name: "Rahul", marks: { math: 85 } }</text>
  <text x="555" y="423" text-anchor="middle" font-size="9" fill="#b0bec5" font-family="monospace">{ name: "Priya", sports: "cricket" }</text>
</g>

<!-- STEP 5: Key-Value Stores -->
<g class="step" id="step5" data-narration="Key-value stores provide O(1) time complexity for read/write operations. Redis is widely used for caching and session management in web apps.">
  <rect x="20" y="460" width="760" height="90" rx="8" fill="#e8f5e9" filter="url(#shadow)"/>
  <rect x="30" y="475" width="35" height="35" rx="4" fill="#66bb6a"/>
  <text x="47" y="497" text-anchor="middle" font-size="18" fill="white">K</text>
  <text x="75" y="485" font-size="13" font-weight="bold" fill="#2e7d32">Key-Value Stores</text>
  <text x="75" y="500" font-size="10" fill="#555">Simplest NoSQL - keys map to values</text>
  <text x="75" y="515" font-size="9" fill="#777">Extremely fast O(1) operations</text>
  <rect x="350" y="475" width="410" height="60" rx="6" fill="#1b5e20"/>
  <text x="555" y="495" text-anchor="middle" font-size="11" fill="#81c784">Example: Redis</text>
  <text x="555" y="510" text-anchor="middle" font-size="9" fill="#a5d6a7" font-family="monospace">SET user:123 "session_data"</text>
  <text x="555" y="523" text-anchor="middle" font-size="9" fill="#a5d6a7" font-family="monospace">GET user:123 → "session_data"</text>
</g>

<!-- STEP 6: Column Family Stores -->
<g class="step" id="step6" data-narration="Column family databases store data in columns rather than rows, optimized for analytical queries. Apache Cassandra handles massive write workloads efficiently.">
  <rect x="20" y="560" width="760" height="90" rx="8" fill="#fff3e0" filter="url(#shadow)"/>
  <rect x="30" y="575" width="35" height="35" rx="4" fill="#ff9800"/>
  <text x="47" y="597" text-anchor="middle" font-size="18" fill="white">C</text>
  <text x="75" y="585" font-size="13" font-weight="bold" fill="#e65100">Column Family Stores</text>
  <text x="75" y="600" font-size="10" fill="#555">Data stored in columns, not rows</text>
  <text x="75" y="615" font-size="9" fill="#777">Excellent for analytical workloads and time-series data</text>
  <rect x="350" y="575" width="410" height="60" rx="6" fill="#e65100"/>
  <text x="555" y="595" text-anchor="middle" font-size="11" fill="#ffcc80">Example: Apache Cassandra</text>
  <text x="555" y="610" text-anchor="middle" font-size="9" fill="#fff3e0" font-family="monospace">RowKey | Column1 | Column2 | Column3</text>
  <text x="555" y="623" text-anchor="middle" font-size="9" fill="#fff3e0" font-family="monospace">User1 | name=John | email=j@ | phone=123</text>
</g>

<!-- STEP 7: Graph Databases -->
<g class="step" id="step7" data-narration="Graph databases use nodes and edges to represent relationships. Neo4j excels at social networks, fraud detection, and recommendation engines.">
  <rect x="20" y="660" width="760" height="90" rx="8" fill="#f3e5f5" filter="url(#shadow)"/>
  <rect x="30" y="675" width="35" height="35" rx="4" fill="#ab47bc"/>
  <text x="47" y="697" text-anchor="middle" font-size="18" fill="white">G</text>
  <text x="75" y="685" font-size="13" font-weight="bold" fill="#6a1b9a">Graph Databases</text>
  <text x="75" y="700" font-size="10" fill="#555">Nodes = entities, Edges = relationships</text>
  <text x="75" y="715" font-size="9" fill="#777">Perfect for interconnected data</text>
  <circle cx="550" cy="705" r="20" fill="#e1bee7">
    <animate attributeName="r" values="0;20" dur="0.5s" fill="freeze"/>
  </circle>
  <circle cx="620" cy="705" r="20" fill="#e1bee7">
    <animate attributeName="r" values="0;20" dur="0.5s" begin="0.3s" fill="freeze"/>
  </circle>
  <circle cx="585" cy="745" r="20" fill="#e1bee7">
    <animate attributeName="r" values="0;20" dur="0.5s" begin="0.6s" fill="freeze"/>
  </circle>
  <path d="M570 705 L600 705" stroke="#7b1fa2" stroke-width="3">
    <animate attributeName="stroke-dasharray" from="0,30" to="30,0" dur="0.5s" begin="0.3s" fill="freeze"/>
  </path>
  <path d="M560 715 L575 735" stroke="#7b1fa2" stroke-width="3">
    <animate attributeName="stroke-dasharray" from="0,30" to="30,0" dur="0.5s" begin="0.6s" fill="freeze"/>
  </path>
  <path d="M605 715 L590 735" stroke="#7b1fa2" stroke-width="3">
    <animate attributeName="stroke-dasharray" from="0,30" to="30,0" dur="0.5s" begin="0.8s" fill="freeze"/>
  </path>
  <text x="670" y="715" font-size="10" fill="#6a1b9a" font-weight="bold">Neo4j Example</text>
</g>

<!-- STEP 8: CAP Theorem -->
<g class="step" id="step8" data-narration="The CAP theorem states distributed databases can provide only two of three guarantees: Consistency, Availability, and Partition Tolerance simultaneously.">
  <rect x="20" y="760" width="760" height="110" rx="8" fill="#ffebee" filter="url(#shadow)"/>
  <text x="40" y="785" font-size="14" font-weight="bold" fill="#c62828">CAP Theorem (Brewer's Theorem)</text>
  <text x="40" y="802" font-size="10" fill="#555">Distributed databases can guarantee only TWO of three:</text>
  
  <polygon points="200,830 170,860 230,860" fill="#1976d2" opacity="0.3"/>
  <polygon points="280,830 250,860 310,860" fill="#388e3c" opacity="0.3"/>
  <polygon points="240,855 240,895 280,895" fill="#ff9800" opacity="0.3"/>
  
  <circle cx="200" cy="830" r="25" fill="#1976d2"/>
  <text x="200" y="826" text-anchor="middle" font-size="9" fill="white" font-weight="bold">C</text>
  <text x="200" y="835" text-anchor="middle" font-size="7" fill="white">Consistency</text>
  
  <circle cx="280" cy="830" r="25" fill="#388e3c"/>
  <text x="280" y="826" text-anchor="middle" font-size="9" fill="white" font-weight="bold">A</text>
  <text x="280" y="835" text-anchor="middle" font-size="7" fill="white">Availability</text>
  
  <circle cx="240" cy="880" r="25" fill="#ff9800"/>
  <text x="240" y="876" text-anchor="middle" font-size="9" fill="white" font-weight="bold">P</text>
  <text x="240" y="885" text-anchor="middle" font-size="7" fill="white">Partition</text>
  <text x="240" y="893" text-anchor="middle" font-size="7" fill="white">Tolerance</text>
  
  <text x="330" y="815" font-size="10" font-weight="bold" fill="#333">Since partitions are inevitable:</text>
  <text x="330" y="830" font-size="9" fill="#555">• CP Systems: Consistency + Partition Tolerance</text>
  <text x="330" y="845" font-size="9" fill="#555">• AP Systems: Availability + Partition Tolerance</text>
  <text x="330" y="860" font-size="9" fill="#555">• (CA not possible in distributed systems)</text>
  
  <rect x="550" y="800" width="210" height="55" rx="5" fill="#e8eaf6"/>
  <text x="655" y="820" text-anchor="middle" font-size="10" font-weight="bold" fill="#303f9f">Choose Wisely!</text>
  <text x="655" y="835" text-anchor="middle" font-size="8" fill="#555">Inventory: CP (Cassandra)</text>
  <text x="655" y="848" text-anchor="middle" font-size="8" fill="#555">Social Feed: AP (DynamoDB)</text>
</g>

<!-- STEP 9: ACID vs BASE -->
<g class="step" id="step9" data-narration="RDBMS uses ACID (Atomicity, Consistency, Isolation, Durability) while NoSQL follows BASE (Basically Available, Soft State, Eventual Consistency).">
  <rect x="20" y="880" width="760" height="100" rx="8" fill="#eceff1" filter="url(#shadow)"/>
  <text x="40" y="905" font-size="14" font-weight="bold" fill="#37474f">ACID (RDBMS) vs BASE (NoSQL)</text>
  
  <rect x="40" y="920" width="330" height="50" rx="6" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
  <text x="205" y="935" text-anchor="middle" font-size="11" font-weight="bold" fill="#303f9f">ACID Properties</text>
  <text x="205" y="950" text-anchor="middle" font-size="9" fill="#555">Atomicity | Consistency | Isolation | Durability</text>
  <text x="205" y="962" text-anchor="middle" font-size="8" fill="#777">All-or-nothing transactions</text>
  
  <rect x="390" y="920" width="330" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="555" y="935" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">BASE Properties</text>
  <text x="555" y="950" text-anchor="middle" font-size="9" fill="#555">Basically Available | Soft State | Eventual Consistency</text>
  <text x="555" y="962" text-anchor="middle" font-size="8" fill="#777">Sacrifices immediate consistency</text>
  
  <text x="400" y="1005" font-size="10" fill="#333">
    <tspan font-weight="bold">Key Difference:</tspan> ACID guarantees immediate consistency; BASE accepts stale data that eventually becomes consistent.
  </text>
</g>

<!-- STEP 10: Scalability -->
<g class="step" id="step10" data-narration="NoSQL databases excel at horizontal scaling by adding more servers. RDBMS typically uses vertical scaling, adding resources to a single server.">
  <rect x="20" y="990" width="760" height="90" rx="8" fill="#e0f2f1" filter="url(#shadow)"/>
  <text x="40" y="1015" font-size="14" font-weight="bold" fill="#00695c">Scalability: Horizontal vs Vertical</text>
  
  <rect x="40" y="1030" width="340" height="40" rx="5" fill="#ef5350"/>
  <text x="210" y="1050" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Vertical Scaling (Scale-Up)</text>
  <text x="210" y="1063" text-anchor="middle" font-size="9" fill="white">RDBMS approach - Add CPU/RAM to one server</text>
  
  <rect x="400" y="1030" width="340" height="40" rx="5" fill="#66bb6a"/>
  <text x="570" y="1050" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Horizontal Scaling (Scale-Out)</text>
  <text x="570" y="1063" text-anchor="middle" font-size="9" fill="white">NoSQL approach - Add more servers to cluster</text>
  
  <path d="M250 1020 L200 1020 L200 1075 L250 1075" stroke="#ef5350" stroke-width="2" stroke-dasharray="5,3" fill="none">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" fill="freeze"/>
  </path>
  <text x="180" y="1050" text-anchor="middle" font-size="20" fill="#ef5350">↑</text>
  
  <path d="M500 1025 L500 1045 M520 1025 L520 1045 M540 1025 L540 1045" stroke="#66bb6a" stroke-width="3">
    <animate attributeName="stroke-dasharray" from="0,20" to="20,0" dur="1s" fill="freeze"/>
  </path>
  <path d="M500 1050 L500 1070 M520 1050 L520 1070 M540 1050 L540 1070" stroke="#66bb6a" stroke-width="3">
    <animate attributeName="stroke-dasharray" from="0,20" to="20,0" dur="1s" begin="0.3s" fill="freeze"/>
  </path>
  <text x="570" y="1020" font-size="10" fill="#2e7d32">Linear performance with nodes!</text>
</g>

<!-- STEP 11: Schema Flexibility -->
<g class="step" id="step11" data-narration="NoSQL databases allow dynamic schema changes without downtime. Each document in a collection can have different fields - perfect for evolving applications.">
  <rect x="20" y="1090" width="760" height="90" rx="8" fill="#fce4ec" filter="url(#shadow)"/>
  <text x="40" y="1115" font-size="14" font-weight="bold" fill="#ad1457">Schema Flexibility in NoSQL</text>
  <text x="40" y="1135" font-size="10" fill="#555">Store heterogeneous data in the same collection - no predefined structure required!</text>
  
  <rect x="40" y="1150" width="220" height="25" rx="4" fill="#f8bbd0" stroke="#e91e63"/>
  <text x="150" y="1167" text-anchor="middle" font-size="9" font-family="monospace" fill="#333">{ name: "Rahul", marks: 85 }</text>
  
  <rect x="270" y="1150" width="220" height="25" rx="4" fill="#f8bbd0" stroke="#e91e63"/>
  <text x="380" y="1167" text-anchor="middle" font-size="9" font-family="monospace" fill="#333">{ name: "Priya", sports: "cricket" }</text>
  
  <rect x="500" y="1150" width="260" height="25" rx="4" fill="#f8bbd0" stroke="#e91e63"/>
  <text x="630" y="1167" text-anchor="middle" font-size="9" font-family="monospace" fill="#333">{ name: "Amit", age: 20, active: true }</text>
  
  <text x="400" y="1195" text-anchor="middle" font-size="10" fill="#880e4f">
  </g>
</svg>