<svg viewBox="0 0 800 1550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="introGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="assertionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="triggerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="exampleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="summaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <linearGradient id="diffGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .step { animation: fadeInSlide 0.6s ease-out forwards; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .code-text { font-family: 'Courier New', monospace; font-size: 10px; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1550" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to learning about database Assertions and Triggers for enforcing complex business rules.">
    <rect x="50" y="10" width="700" height="45" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="18" fill="white" font-weight="bold">Specifying Constraints as Assertions and Action Triggers</text>
  </g>
  
  <!-- Step 1: Why Basic Constraints Aren't Enough -->
  <g class="step" id="step1" data-narration="Basic constraints like primary keys cannot enforce complex cross-table business rules that span multiple tables.">
    <rect x="40" y="70" width="720" height="85" rx="8" fill="url(#introGrad)" filter="url(#shadow)"/>
    <text x="60" y="95" font-size="13" fill="#1565c0" font-weight="bold">Why Basic Constraints Fall Short</text>
    <text x="60" y="115" font-size="10" fill="#333">• Single table/column limitations</text>
    <text x="60" y="130" font-size="10" fill="#333">• No cross-table rule enforcement</text>
    <text x="60" y="145" font-size="10" fill="#333">• Cannot perform cascading actions</text>
    <!-- Icon: Lock with X -->
    <circle cx="650" cy="112" r="25" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="650" y="118" text-anchor="middle" font-size="24" fill="#f44336">⚠</text>
  </g>
  
  <!-- Step 2: Constraint Hierarchy -->
  <g class="step" id="step2" data-narration="SQL provides domain, key, referential, and check constraints, but each has specific limitations for complex rules.">
    <rect x="40" y="165" width="720" height="85" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="60" y="190" font-size="13" fill="#1565c0" font-weight="bold">SQL Constraint Hierarchy</text>
    <!-- Constraint boxes -->
    <rect x="60" y="205" width="140" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="130" y="222" text-anchor="middle" font-size="9" fill="#2e7d32">Domain</text>
    <rect x="210" y="205" width="140" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="280" y="222" text-anchor="middle" font-size="9" fill="#1565c0">Key</text>
    <rect x="360" y="205" width="150" height="35" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="435" y="222" text-anchor="middle" font-size="9" fill="#e65100">Referential</text>
    <rect x="520" y="205" width="140" height="35" rx="5" fill="#fce4ec" stroke="#e91e63"/>
    <text x="590" y="222" text-anchor="middle" font-size="9" fill="#c2185b">Check</text>
  </g>
  
  <!-- Step 3: What are Assertions -->
  <g class="step" id="step3" data-narration="Assertions are declarative constraints enforcing conditions across multiple tables that must always be true.">
    <rect x="40" y="265" width="720" height="95" rx="8" fill="url(#assertionGrad)" filter="url(#shadow)"/>
    <text x="60" y="290" font-size="14" fill="#2e7d32" font-weight="bold">What is an Assertion?</text>
    <text x="60" y="310" font-size="10" fill="#333">A schema-level object that enforces complex business rules involving</text>
    <text x="60" y="325" font-size="10" fill="#333">multiple tables. Unlike table constraints, assertions are database-wide.</text>
    <!-- Syntax box -->
    <rect x="400" y="300" width="340" height="50" rx="5" fill="#1b5e20" opacity="0.9"/>
    <text x="420" y="320" font-size="10" fill="#a5d6a7" class="code-text">CREATE ASSERTION assertion_name</text>
    <text x="420" y="338" font-size="10" fill="#a5d6a7" class="code-text">CHECK (condition);</text>
  </g>
  
  <!-- Step 4: Assertion Examples -->
  <g class="step" id="step4" data-narration="Example assertions enforce rules like no employee earning more than their manager or budget limits.">
    <rect x="40" y="375" width="720" height="95" rx="8" fill="url(#exampleGrad)" filter="url(#shadow)"/>
    <text x="60" y="400" font-size="14" fill="#7b1fa2" font-weight="bold">Assertion Examples</text>
    <!-- Example 1 -->
    <rect x="60" y="415" width="330" height="45" rx="5" fill="#4a148c"/>
    <text x="75" y="432" font-size="9" fill="#ce93d8" class="code-text">-- No employee earns more than manager</text>
    <text x="75" y="448" font-size="9" fill="#ce93d8" class="code-text">CHECK (NOT EXISTS (SELECT ... WHERE e.salary > m.salary))</text>
    <!-- Example 2 -->
    <rect x="400" y="415" width="350" height="45" rx="5" fill="#4a148c"/>
    <text x="415" y="432" font-size="9" fill="#ce93d8" class="code-text">-- Department budget limit</text>
    <text x="415" y="448" font-size="9" fill="#ce93d8" class="code-text">CHECK (SUM(budget) <= total_budget)</text>
  </g>
  
  <!-- Step 5: Trigger Components -->
  <g class="step" id="step5" data-narration="Triggers have four key components: event, timing, level, and body that defines the action to execute.">
    <rect x="40" y="485" width="720" height="100" rx="8" fill="url(#triggerGrad)" filter="url(#shadow)"/>
    <text x="60" y="510" font-size="14" fill="#e65100" font-weight="bold">Trigger Components</text>
    <!-- Four components -->
    <rect x="60" y="525" width="150" height="50" rx="6" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="135" y="545" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">EVENT</text>
    <text x="135" y="562" text-anchor="middle" font-size="8" fill="#333">INSERT/UPDATE/DELETE</text>
    
    <rect x="220" y="525" width="150" height="50" rx="6" fill="#ffcc80" stroke="#ff9800"/>
    <text x="295" y="545" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">TIMING</text>
    <text x="295" y="562" text-anchor="middle" font-size="8" fill="#333">BEFORE/AFTER/INSTEAD OF</text>
    
    <rect x="380" y="525" width="150" height="50" rx="6" fill="#ffb74d" stroke="#ff9800"/>
    <text x="455" y="545" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">LEVEL</text>
    <text x="455" y="562" text-anchor="middle" font-size="8" fill="#333">ROW/STATEMENT</text>
    
    <rect x="540" y="525" width="150" height="50" rx="6" fill="#ffa726" stroke="#ff9800"/>
    <text x="615" y="545" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">BODY</text>
    <text x="615" y="562" text-anchor="middle" font-size="8" fill="#333">PL/SQL Statements</text>
  </g>
  
  <!-- Step 6: BEFORE vs AFTER Triggers -->
  <g class="step" id="step6" data-narration="BEFORE triggers validate data before insertion; AFTER triggers log changes after the operation completes.">
    <rect x="40" y="600" width="720" height="100" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="60" y="625" font-size="14" fill="#e65100" font-weight="bold">BEFORE vs AFTER Triggers</text>
    
    <!-- BEFORE -->
    <rect x="60" y="640" width="280" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="200" y="660" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">BEFORE Trigger</text>
    <text x="200" y="678" text-anchor="middle" font-size="9" fill="#333">Execute BEFORE DML • Data validation</text>
    
    <!-- Arrow -->
    <path d="M350 665 L370 665" stroke="#666" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <!-- AFTER -->
    <rect x="380" y="640" width="280" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="520" y="660" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">AFTER Trigger</text>
    <text x="520" y="678" text-anchor="middle" font-size="9" fill="#333">Execute AFTER DML • Audit trails</text>
    
    <!-- Timing flow -->
    <rect x="150" y="700" width="400" height="25" rx="4" fill="#eee"/>
    <text x="350" y="717" text-anchor="middle" font-size="9" fill="#666">DML Statement → BEFORE → DML Executes → AFTER</text>
  </g>
  
  <!-- Step 7: ROW vs STATEMENT Level -->
  <g class="step" id="step7" data-narration="ROW-level triggers fire for each affected row; STATEMENT-level triggers fire once per entire statement.">
    <rect x="40" y="715" width="720" height="90" rx="8" fill="#fff9c4" filter="url(#shadow)"/>
    <text x="60" y="740" font-size="14" fill="#f57f17" font-weight="bold">ROW vs STATEMENT Level</text>
    
    <rect x="60" y="755" width="300" height="40" rx="5" fill="#fff59d" stroke="#fbc02d"/>
    <text x="210" y="775" text-anchor="middle" font-size="11" fill="#f57f17" font-weight="bold">ROW-level: FOR EACH ROW</text>
    <text x="210" y="788" text-anchor="middle" font-size="9" fill="#333">Executes once per affected row</text>
    
    <rect x="380" y="755" width="300" height="40" rx="5" fill="#fffde7" stroke="#fbc02d"/>
    <text x="530" y="775" text-anchor="middle" font-size="11" fill="#f57f17" font-weight="bold">STATEMENT-level</text>
    <text x="530" y="788" text-anchor="middle" font-size="9" fill="#333">Executes once for entire statement</text>
  </g>
  
  <!-- Step 8: OLD and NEW References -->
  <g class="step" id="step8" data-narration="Use :OLD for existing values and :NEW for new values in row-level triggers to access changing data.">
    <rect x="40" y="820" width="720" height="90" rx="8" fill="#e0f2f1" filter="url(#shadow)"/>
    <text x="60" y="845" font-size="14" fill="#00695c" font-weight="bold">:OLD and :NEW References</text>
    
    <!-- Table showing OLD/NEW -->
    <rect x="60" y="860" width="680" height="40" rx="5" fill="#004d40"/>
    <text x="120" y="882" text-anchor="middle" font-size="10" fill="#80cbc4">Operation</text>
    <text x="280" y="882" text-anchor="middle" font-size="10" fill="#80cbc4">:OLD value</text>
    <text x="460" y="882" text-anchor="middle" font-size="10" fill="#80cbc4">:NEW value</text>
    <text x="640" y="882" text-anchor="middle" font-size="10" fill="#80cbc4">Use Case</text>
    
    <rect x="60" y="890" width="680" height="12" rx="3" fill="#00796b"/>
    <text x="120" y="899" text-anchor="middle" font-size="8" fill="#e0f2f1">INSERT</text>
    <text x="280" y="899" text-anchor="middle" font-size="8" fill="#e0f2f1">NULL</text>
    <text x="460" y="899" text-anchor="middle" font-size="8" fill="#e0f2f1">New value</text>
    <text x="640" y="899" text-anchor="middle" font-size="8" fill="#e0f2f1">Set defaults</text>
  </g>
  
  <!-- Step 9: Trigger Example - Audit Trail -->
  <g class="step" id="step9" data-narration="This trigger automatically logs salary changes to an audit table whenever an employee salary is updated.">
    <rect x="40" y="925" width="720" height="95" rx="8" fill="url(#exampleGrad)" filter="url(#shadow)"/>
    <text x="60" y="950" font-size="14" fill="#7b1fa2" font-weight="bold">Trigger Example: Audit Trail</text>
    
    <!-- Trigger code -->
    <rect x="60" y="965" width="680" height="45" rx="5" fill="#4a148c"/>
    <text x="75" y="982" font-size="9" fill="#ce93d8" class="code-text">CREATE TRIGGER audit_salary</text>
    <text x="75" y="997" font-size="9" fill="#ce93d8" class="code-text">AFTER UPDATE OF salary ON employee</text>
    <text x="480" y="997" font-size="9" fill="#ce93d8" class="code-text">FOR EACH ROW</text>
    <text x="75" y="1012" font-size="9" fill="#ce93d8" class="code-text">BEGIN INSERT INTO audit VALUES(:OLD.salary, :NEW.salary, SYSDATE); END;</text>
  </g>
  
  <!-- Step 10: INSTEAD OF Triggers -->
  <g class="step" id="step10" data-narration="INSTEAD OF triggers enable DML operations on complex views that would otherwise be non-updatable.">
    <rect x="40" y="1035" width="720" height="85" rx="8" fill="url(#diffGrad)" filter="url(#shadow)"/>
    <text x="60" y="1060" font-size="14" fill="#c2185b" font-weight="bold">INSTEAD OF Triggers</text>
    <text x="60" y="1080" font-size="10" fill="#333">Used on complex views to enable INSERT, UPDATE, DELETE operations</text>
    <text x="60" y="1095" font-size="10" fill="#333">that would otherwise fail on non-updatable views.</text>
    
    <rect x="400" y="1065" width="340" height="45" rx="5" fill="#880e4f"/>
    <text x="420" y="1082" font-size="9" fill="#f48fb1" class="code-text">CREATE TRIGGER trigger_name</text>
    <text x="420" y="1098" font-size="9" fill="#f48fb1" class="code-text">INSTEAD OF INSERT ON view_name</text>
  </g>
  
  <!-- Step 11: Assertions vs Triggers -->
  <g class="step" id="step11" data-narration="Assertions are declarative constraints while triggers are procedural code; assertions have limited DBMS support.">
    <rect x="40" y="1135" width="720" height="100" rx="8" fill="#fff" filter="url(#shadow)"/>
    <text x="60" y="1160" font-size="14" fill="#1565c0" font-weight="bold">Assertions vs Triggers Comparison</text>
    
    <!-- Comparison table -->
    <rect x="60" y="1175" width="700" height="50" rx="5" fill="#eceff1"/>
    <text x="100" y="1195" font-size="10" fill="#37474f" font-weight="bold">Aspect</text>
    <text x="260" y="1195" font-size="10" fill="#37474f" font-weight="bold">Assertions</text>
    <text x="480" y="1195" font-size="10" fill="#37474f" font-weight="bold">Triggers</text>
    <text x="650" y="1195" font-size="10" fill="#37474f" font-weight="bold">Difference</text>
    
    <line x1="60" y1="1205" x2="760" y2="1205" stroke="#90a4ae" stroke-width="1"/>
    <text x="100" y="1225" font-size="9" fill="#333">Nature</text>
    <text x="260" y="1225" font-size="9" fill="#333">Declarative</text>
    <text x="480" y="1225" font-size="9" fill="#333">Procedural</text>
    
    <text x="100" y="1242" font-size="9" fill="#333">Support</text>
    <text x="260" y="1242" font-size="9" fill="#333">Limited</text>
    <text x="480" y="1242" font-size="9" fill="#333">Widely Supported</text>
  </g>
  
  <!-- Step 12: Mutating Table Problem -->
  <g class="step" id="step12" data-narration="The mutating table problem occurs when a row-level trigger tries to query or modify its own triggering table.">
    <rect x="40" y="1250" width="720" height="80" rx="8" fill="#ffebee" filter="url(#shadow)"/>
    <text x="60" y="1275" font-size="14" fill="#c62828" font-weight="bold">⚠ The Mutating Table Problem</text>
    <text x="60" y="1295" font-size="10" fill="#333">Row-level triggers CANNOT query or modify the same table that triggered them.</text>
    <text x="60" y="1310" font-size="10" fill="#333">This causes ORA-04091 error. Solution: Use statement-level triggers or compound triggers.</text>
    
    <!-- Warning icon -->
    <circle cx="680" cy="1290" r="20" fill="#ffcdd2" stroke="#ef5350"/>
    <text x="680" y="1295" text-anchor="middle" font-size="18" fill="#c62828">!</text>
  </g>
  
  <!-- Step 13: Key Takeaways -->
  <g class="step" id="step13" data-narration="Assertions enforce cross-table rules declaratively; triggers execute actions automatically on DML events.">
    <rect x="40" y="1345" width="720" height="90" rx="8" fill="url(#summaryGrad)" filter="url(#shadow)"/>
    <text x="60" y="1370" font-size="14" fill="#006064" font-weight="bold">Key Takeaways</text>
    
    <rect x="60" y="1385" width="220" height="40" rx="5" fill="#b2dfdb" stroke="#00897b"/>
    <text x="170" y="1403" text-anchor="middle" font-size="10" fill="#004d40" font-weight="bold">Assertions</text>
    <text x="170" y="1418" text-anchor="middle" font-size="9" fill="#333">Declarative • Cross-table rules</text>
    
    <rect x="290" y="1385" width="220" height="40" rx="5" fill="#b3e5fc" stroke="#0288d1"/>
    <text x="400" y="1403" text-anchor="middle" font-size="10" fill="#01579b" font-weight="bold">Triggers</text>
    <text x="400" y="1418" text-anchor="middle" font-size="9" fill="#333">Procedural • Automated actions</text>
    
    <rect x="520" y="1385" width="220" height="40" rx="5" fill="#ffecb3" stroke="#ffa000"/>
    <text x="630" y="1403" text-anchor="middle" font-size="10" fill="#ff6f00" font-weight="bold">Remember</text>
    <text x="630" y="1418" text-anchor="middle" font-size="9" fill="#333">:OLD/:NEW • BEFORE/AFTER</text>
  </g>
  
  <!-- Step 14: Exam Tips -->
  <g class="step" id="step14" data-narration="Remember: assertions check after DML with automatic rollback; triggers fire on specific events with :OLD and :NEW references.">
    <rect x="40" y="1450" width="720" height="70" rx="8" fill="#e1f5fe" filter="url(#shadow)"/>
    <text x="60" y="1475" font-size="14" fill="#0277bd" font-weight="bold">📝 Exam Tips</text>
    <text x="60" y="1495" font-size="10" fill="#333">• Assertions use CREATE ASSERTION name CHECK(condition)</text>
    <text x="400" y="1495" font-size="10" fill="#333">• BEFORE triggers = validation</text>
    <text x="60" y="1512" font-size="10" fill="#333">• :NEW is NULL for DELETE; :OLD is NULL for INSERT</text>
    <text x="400" y="1512" font-size="10" fill="#333">• RAISE_APPLICATION_ERROR for custom errors</text>
  </g>
</svg>