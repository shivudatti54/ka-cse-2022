<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Digraphs consist of vertices connected by directed edges, while binary relations describe how elements from sets relate to each other.">
    <rect x="0" y="0" width="800" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Digraphs and Binary Relations</text>
  </g>
  
  <g class="step" id="step1" data-narration="A digraph G equals (V, E) where V is vertices and E is directed edges. Types include simple, multi-digraph, complete, regular, and tournament digraphs.">
    <rect x="20" y="53" width="760" height="78" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Digraph Definition: G = (V, E)</text>
    <rect x="40" y="85" width="140" height="38" fill="#e3f2fd" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#1976d2">V = {v₁, v₂, v₃...}</text>
    <text x="50" y="115" font-family="Arial" font-size="10" fill="#1976d2">E = {(u,v) | u,v ∈ V}</text>
    <text x="200" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Types:</text>
    <text x="200" y="91" font-family="Arial" font-size="10" fill="#333">• Simple: no loops, ≤1 edge per direction</text>
    <text x="200" y="105" font-family="Arial" font-size="10" fill="#333">• Complete: edge between every pair</text>
    <text x="200" y="119" font-family="Arial" font-size="10" fill="#333">• Tournament: exactly one edge between pairs</text>
  </g>
  
  <g class="step" id="step2" data-narration="Indegree counts edges entering a vertex. Outdegree counts edges leaving. Source has indegree zero; sink has outdegree zero in a digraph.">
    <rect x="20" y="139" width="760" height="98" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="161" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Digraph Terminology</text>
    <circle cx="100" cy="195" r="20" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="100" y="200" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">a</text>
    <line x1="100" y1="175" x2="100" y2="145" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="120" y1="195" x2="155" y2="195" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="135" y1="215" x2="100" y2="215" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="55" y="230" font-family="Arial" font-size="9" fill="#333">Indegree(a) = 2</text>
    <text x="125" y="230" font-family="Arial" font-size="9" fill="#333">Outdegree(a) = 2</text>
    <text x="220" y="161" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Special Vertices:</text>
    <text x="220" y="177" font-family="Arial" font-size="10" fill="#333">• Source: indegree = 0</text>
    <text x="220" y="191" font-family="Arial" font-size="10" fill="#333">• Sink: outdegree = 0</text>
    <text x="220" y="205" font-family="Arial" font-size="10" fill="#333">• Isolated: indegree = outdegree = 0</text>
    <text x="360" y="161" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Paths &amp; Cycles:</text>
    <text x="360" y="177" font-family="Arial" font-size="10" fill="#333">• Walk: sequence of connected vertices</text>
    <text x="360" y="191" font-family="Arial" font-size="10" fill="#333">• Path: walk with no repeats</text>
    <text x="360" y="205" font-family="Arial" font-size="10" fill="#333">• Cycle: path returning to start</text>
  </g>
  
  <g class="step" id="step3" data-narration="A binary relation R from set A to set B is a subset of A×B. It can be represented as ordered pairs, as a matrix, or as a digraph.">
    <rect x="20" y="245" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="267" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Binary Relations: Three Representations</text>
    <rect x="40" y="280" width="220" height="35" fill="#e8f5e9" rx="3"/>
    <text x="50" y="295" font-family="Arial" font-size="10" fill="#388e3c">Set of Pairs:</text>
    <text x="50" y="308" font-family="Arial" font-size="10" fill="#333">R = {(1,2), (2,3), (3,1)}</text>
    <rect x="270" y="280" width="230" height="35" fill="#fff3e0" rx="3"/>
    <text x="280" y="295" font-family="Arial" font-size="10" fill="#ff9800">Matrix:</text>
    <text x="280" y="308" font-family="Arial" font-size="9" fill="#333">[0 1 0; 0 0 1; 1 0 0]</text>
    <rect x="510" y="280" width="260" height="35" fill="#f3e5f5" rx="3"/>
    <text x="520" y="295" font-family="Arial" font-size="10" fill="#9c27b0">Digraph:</text>
    <text x="520" y="308" font-family="Arial" font-size="10" fill="#333">Vertices = {1,2,3}, edges as arrows</text>
  </g>
  
  <g class="step" id="step4" data-narration="Relation properties: reflexive has all (a,a); irreflexive has none. Symmetric means (a,b) implies (b,a). Antisymmetric means (a,b) and (b,a) implies a equals b.">
    <rect x="20" y="333" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="355" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Properties of Relations (on set A)</text>
    <rect x="40" y="368" width="145" height="35" fill="#e3f2fd" rx="3"/>
    <text x="50" y="382" font-family="Arial" font-size="9" fill="#1976d2">Reflexive: (a,a)∈R ∀a∈A</text>
    <rect x="195" y="368" width="145" height="35" fill="#ffebee" rx="3"/>
    <text x="205" y="382" font-family="Arial" font-size="9" fill="#f44336">Irreflexive: (a,a)∉R ∀a∈A</text>
    <rect x="350" y="368" width="145" height="35" fill="#e8f5e9" rx="3"/>
    <text x="360" y="382" font-family="Arial" font-size="9" fill="#388e3c">Symmetric: aRb → bRa</text>
    <rect x="505" y="368" width="145" height="35" fill="#fff3e0" rx="3"/>
    <text x="515" y="382" font-family="Arial" font-size="9" fill="#ff9800">Antisymmetric: aRb∧bRa→a=b</text>
    <rect x="660" y="368" width="110" height="35" fill="#f3e5f5" rx="3"/>
    <text x="670" y="382" font-family="Arial" font-size="9" fill="#9c27b0">Transitive: aRb∧bRc→aRc</text>
    <text x="40" y="405" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Equivalence: Reflexive + Symmetric + Transitive</text>
    <text x="250" y="405" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Partial Order: Reflexive + Antisymmetric + Transitive</text>
  </g>
  
  <g class="step" id="step5" data-narration="Operations on relations include union, intersection, complement, inverse, and composition, each defining how to combine or transform relations mathematically for analysis.">
    <rect x="20" y="421" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="443" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Operations on Relations</text>
    <rect x="40" y="458" width="110" height="35" fill="#e3f2fd" rx="3"/>
    <text x="50" y="472" font-family="Arial" font-size="9" fill="#1976d2">Union: R∪S</text>
    <text x="50" y="485" font-family="Arial" font-size="8" fill="#333">(a,b)∈R or S</text>
    <rect x="160" y="458" width="110" height="35" fill="#e8f5e9" rx="3"/>
    <text x="170" y="472" font-family="Arial" font-size="9" fill="#388e3c">Intersection: R∩S</text>
    <text x="170" y="485" font-family="Arial" font-size="8" fill="#333">(a,b)∈R and S</text>
    <rect x="280" y="458" width="110" height="35" fill="#ffebee" rx="3"/>
    <text x="290" y="472" font-family="Arial" font-size="9" fill="#f44336">Complement: R̄</text>
    <text x="290" y="485" font-family="Arial" font-size="8" fill="#333">(a,b)∉R in A×B</text>
    <rect x="400" y="458" width="110" height="35" fill="#fff3e0" rx="3"/>
    <text x="410" y="472" font-family="Arial" font-size="9" fill="#ff9800">Inverse: R⁻¹</text>
    <text x="410" y="485" font-family="Arial" font-size="8" fill="#333">(b,a) for (a,b)∈R</text>
    <rect x="520" y="458" width="110" height="35" fill="#f3e5f5" rx="3"/>
    <text x="530" y="472" font-family="Arial" font-size="9" fill="#9c27b0">Composition: R∘S</text>
    <text x="530" y="485" font-family="Arial" font-size="8" fill="#333">(a,c)∃b:(a,b)∈S,(b,c)∈R</text>
  </g>
  
  <g class="step" id="step6" data-narration="Closures add minimal elements: reflexive adds (a,a); symmetric adds reverse edges; transitive adds indirect paths. Warshall's algorithm computes transitive closure efficiently.">
    <rect x="20" y="509" width="760" height="90" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="531" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Closures of Relations</text>
    <rect x="40" y="545" width="180" height="45" fill="#e3f2fd" rx="3"/>
    <text x="50" y="560" font-family="Arial" font-size="10" fill="#1976d2">Reflexive Closure</text>
    <text x="50" y="575" font-family="Arial" font-size="9" fill="#333">Add missing (a,a) loops</text>
    <text x="130" y="587" font-family="Arial" font-size="8" fill="#666">R∪{(a,a)}</text>
    <rect x="230" y="545" width="180" height="45" fill="#e8f5e9" rx="3"/>
    <text x="240" y="560" font-family="Arial" font-size="10" fill="#388e3c">Symmetric Closure</text>
    <text x="240" y="575" font-family="Arial" font-size="9" fill="#333">Add reverse edges (b,a)</text>
    <text x="320" y="587" font-family="Arial" font-size="8" fill="#666">R∪R⁻¹</text>
    <rect x="420" y="545" width="180" height="45" fill="#fff3e0" rx="3"/>
    <text x="430" y="560" font-family="Arial" font-size="10" fill="#ff9800">Transitive Closure</text>
    <text x="430" y="575" font-family="Arial" font-size="9" fill="#333">Add indirect paths</text>
    <text x="500" y="587" font-family="Arial" font-size="8" fill="#666">R⁺ or R*</text>
    <rect x="610" y="545" width="160" height="45" fill="#f3e5f5" rx="3"/>
    <text x="620" y="560" font-family="Arial" font-size="10" fill="#9c27b0">Warshall's Algorithm</text>
    <text x="620" y="575" font-family="Arial" font-size="9" fill="#333">M[i][j] |= M[i][k] &amp; M[k][j]</text>
    <text x="40" y="597" font-family="Arial" font-size="9" fill="#666">Example: R={(1,2),(2,3)} → {(1,2),(2,3),(1,3)}</text>
  </g>
</svg>