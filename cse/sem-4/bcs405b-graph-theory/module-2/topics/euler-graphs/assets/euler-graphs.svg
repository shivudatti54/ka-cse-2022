<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Euler Graphs are named after Leonhard Euler, who solved the famous Seven Bridges of Königsberg problem in 1736, establishing the foundation of graph theory.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1565c0">Euler Graphs</text>
  </g>
  
  <g class="step" id="step1" data-narration="An Eulerian Circuit is a closed trail covering each edge exactly once. An Eulerian Trail is an open trail covering all edges once.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="400" y="75" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">KEY DEFINITIONS</text>
    <rect x="40" y="88" width="220" height="40" fill="#e3f2fd" rx="3"/>
    <text x="150" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Eulerian Circuit</text>
    <text x="150" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Closed trail, all edges once</text>
    <rect x="290" y="88" width="220" height="40" fill="#e8f5e9" rx="3"/>
    <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Eulerian Trail</text>
    <text x="400" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Open trail, all edges once</text>
    <rect x="540" y="88" width="220" height="40" fill="#fff3e0" rx="3"/>
    <text x="650" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#f57c00">Semi-Eulerian</text>
    <text x="650" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Has trail, not circuit</text>
  </g>
  
  <g class="step" id="step2" data-narration="Euler's Circuit Theorem states all vertices must have even degree for an Eulerian circuit to exist. Euler's Trail Theorem requires exactly two odd-degree vertices for a trail.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="400" y="163" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">EULER'S THEOREMS</text>
    <rect x="50" y="180" width="330" height="36" fill="#e3f2fd" rx="3"/>
    <text x="215" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Circuit: All vertices have EVEN degree</text>
    <rect x="420" y="180" width="330" height="36" fill="#fff3e0" rx="3"/>
    <text x="585" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#f57c00">Trail: Exactly 2 vertices ODD degree</text>
  </g>
  
  <g class="step" id="step3" data-narration="If more than two vertices have odd degree, no Eulerian trail exists. With two odd vertices, trail starts at one and ends at the other.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="400" y="251" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">IMPORTANT COROLLARIES</text>
    <rect x="40" y="265" width="230" height="40" fill="#ffebee" rx="3"/>
    <text x="155" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">More than 2 odd vertices</text>
    <text x="155" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">No Eulerian trail or circuit</text>
    <rect x="285" y="265" width="230" height="40" fill="#fff3e0" rx="3"/>
    <text x="400" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">Exactly 2 odd vertices</text>
    <text x="400" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Trail from odd to odd vertex</text>
    <rect x="530" y="265" width="230" height="40" fill="#e8f5e9" rx="3"/>
    <text x="645" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">All vertices even degree</text>
    <text x="645" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Circuit from any vertex</text>
  </g>
  
  <g class="step" id="step4" data-narration="Fleury's algorithm avoids bridges unless no alternative exists, carefully selecting edges to maintain trail continuity. Hierholzer's algorithm builds circuits and splices them together efficiently.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="400" y="339" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">ALGORITHMS FOR EULERIAN TRAILS</text>
    <rect x="40" y="355" width="350" height="40" fill="#f3e5f5" rx="3"/>
    <text x="215" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Fleury's Algorithm</text>
    <text x="215" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Avoid bridges unless necessary</text>
    <rect x="410" y="355" width="350" height="40" fill="#e1bee7" rx="3"/>
    <text x="585" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Hierholzer's Algorithm</text>
    <text x="585" y="385" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Build circuits, splice together</text>
  </g>
  
  <g class="step" id="step5" data-narration="Consider graph with vertices A,B,C,D and edges AB,BC,CD,DA,AC. Degrees: A=3, B=2, C=3, D=2. A valid trail exists from vertex A to C.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="400" y="427" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">EXAMPLE: Degree Calculation</text>
    <circle cx="120" cy="470" r="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="120" y="475" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">A</text>
    <text x="120" y="488" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">deg=3</text>
    <circle cx="200" cy="470" r="18" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="200" y="475" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">B</text>
    <text x="200" y="488" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">deg=2</text>
    <circle cx="200" cy="440" r="18" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="445" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">C</text>
    <text x="200" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">deg=3</text>
    <circle cx="120" cy="440" r="18" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="120" y="445" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c2185b">D</text>
    <text x="120" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">deg=2</text>
    <line x1="120" y1="452" x2="200" y2="458" stroke="#666" stroke-width="1.5"/>
    <line x1="120" y1="458" x2="200" y2="470" stroke="#666" stroke-width="1.5"/>
    <line x1="128" y1="440" x2="192" y2="440" stroke="#666" stroke-width="1.5"/>
    <line x1="128" y1="458" x2="192" y2="458" stroke="#666" stroke-width="1.5"/>
    <text x="400" y="455" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">A→B→C→D→A→C is an Eulerian trail</text>
    <text x="400" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Two odd vertices (A,C) = Eulerian trail exists</text>
    <rect x="500" y="445" width="260" height="30" fill="#e3f2fd" rx="3"/>
    <text x="630" y="465" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Trail: A → B → C → D → A → C</text>
  </g>
  
  <g class="step" id="step6" data-narration="Remember: Eulerian paths cover each edge exactly once, while Hamiltonian paths visit each vertex exactly once. Always check graph connectivity first before applying Euler's theorems.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="400" y="515" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">EXAM TIPS &amp; KEY DIFFERENCES</text>
    <rect x="40" y="528" width="230" height="50" fill="#e3f2fd" rx="3"/>
    <text x="155" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Eulerian</text>
    <text x="155" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Edges: each exactly once</text>
    <text x="155" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Euler = Edges</text>
    <rect x="285" y="528" width="230" height="50" fill="#fce4ec" rx="3"/>
    <text x="400" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#c2185b">Hamiltonian</text>
    <text x="400" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Vertices: each exactly once</text>
    <text x="400" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Hamilton = Vertices</text>
    <rect x="530" y="528" width="230" height="50" fill="#e8f5e9" rx="3"/>
    <text x="645" y="543" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Always Check</text>
    <text x="645" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1. Connectivity first</text>
    <text x="645" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2. Then vertex degrees</text>
  </g>
</svg>