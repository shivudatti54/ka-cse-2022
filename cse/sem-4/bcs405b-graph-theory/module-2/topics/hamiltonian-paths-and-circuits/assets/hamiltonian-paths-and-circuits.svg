<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
  </marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Welcome to Hamiltonian Paths and Circuits. We'll explore paths visiting each vertex exactly once and their applications in optimization problems.">
  <rect x="10" y="10" width="780" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Hamiltonian Paths and Circuits</text>
</g>

<g class="step" id="step1" data-narration="A Hamiltonian path visits each vertex exactly once without returning to start. A Hamiltonian circuit returns to the starting vertex.">
  <rect x="10" y="58" width="780" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="30" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Definitions</text>
  <rect x="30" y="90" width="200" height="40" rx="5" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="130" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">Hamiltonian Path</text>
  <text x="130" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Visit each vertex once</text>
  <text x="290" y="108" font-family="Arial" font-size="20" fill="#388e3c">→</text>
  <rect x="330" y="90" width="200" height="40" rx="5" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="430" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">Hamiltonian Circuit</text>
  <text x="430" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Returns to start vertex</text>
  <text x="570" y="110" font-family="Arial" font-size="10" fill="#388e3c">A→B→C→D→E</text>
  <text x="570" y="125" font-family="Arial" font-size="10" fill="#388e3c">A→B→C→D→E→A</text>
</g>

<g class="step" id="step2" data-narration="Eulerian paths visit each edge exactly once. Hamiltonian paths visit each vertex exactly once. They are fundamentally different problems in graph theory.">
  <rect x="10" y="146" width="780" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="30" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Eulerian vs Hamiltonian</text>
  <rect x="30" y="180" width="340" height="38" rx="5" fill="#ffe0b2" stroke="#ff9800"/>
  <text x="200" y="196" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">EULERIAN</text>
  <text x="200" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Visit each EDGE exactly once</text>
  <text x="200" y="222" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">Polynomial-time solution exists</text>
  <rect x="390" y="180" width="340" height="38" rx="5" fill="#ffe0b2" stroke="#ff9800"/>
  <text x="560" y="196" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">HAMILTONIAN</text>
  <text x="560" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Visit each VERTEX exactly once</text>
  <text x="560" y="222" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">NP-complete problem</text>
</g>

<g class="step" id="step3" data-narration="Dirac's Theorem states: if minimum degree δ ≥ n/2 for n≥3 vertices, the graph is guaranteed to always be Hamiltonian.">
  <rect x="10" y="234" width="780" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  <text x="30" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Dirac's Theorem (1952)</text>
  <rect x="30" y="268" width="440" height="38" rx="5" fill="#e1bee7" stroke="#9c27b0"/>
  <text x="250" y="286" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">If δ ≥ n/2 for n ≥ 3, graph is Hamiltonian</text>
  <text x="250" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">Sufficient condition (not necessary)</text>
  <rect x="490" y="268" width="280" height="38" rx="5" fill="#e1bee7" stroke="#9c27b0"/>
  <text x="630" y="286" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">Example: n=6, δ=3</text>
  <text x="630" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#7b1fa2">3 ≥ 6/2 = 3 ✓ Hamiltonian</text>
</g>

<g class="step" id="step4" data-narration="Ore's Theorem generalizes Dirac's: if deg(u)+deg(v) ≥ n for all non-adjacent vertex pairs, the graph is proven to be Hamiltonian.">
  <rect x="10" y="322" width="780" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
  <text x="30" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Ore's Theorem (1960)</text>
  <rect x="30" y="356" width="440" height="38" rx="5" fill="#ffcdd2" stroke="#f44336"/>
  <text x="250" y="374" text-anchor="middle" font-family="Arial" font-size="11" fill="#b71c1c">If deg(u)+deg(v) ≥ n for all non-adjacent (u,v)</text>
  <text x="250" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Then graph is Hamiltonian</text>
  <rect x="490" y="356" width="280" height="38" rx="5" fill="#ffcdd2" stroke="#f44336"/>
  <text x="630" y="374" text-anchor="middle" font-family="Arial" font-size="11" fill="#b71c1c">Example: n=8, any non-adjacent pair</text>
  <text x="630" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">deg(u)+deg(v) ≥ 8 ✓ Hamiltonian</text>
</g>

<g class="step" id="step5" data-narration="Complete graphs Kn are always Hamiltonian. Complete bipartite Km,n is Hamiltonian only when m equals n. Wheel and n-cube graphs are also Hamiltonian.">
  <rect x="10" y="410" width="780" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="30" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Hamiltonian Graph Families</text>
  <rect x="30" y="448" width="170" height="35" rx="5" fill="#bbdefb" stroke="#1976d2"/>
  <text x="115" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">Complete Kn</text>
  <text x="115" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Always Hamiltonian (n≥3)</text>
  <rect x="210" y="448" width="170" height="35" rx="5" fill="#bbdefb" stroke="#1976d2"/>
  <text x="295" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">Km,n Bipartite</text>
  <text x="295" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Hamiltonian only if m=n</text>
  <rect x="390" y="448" width="170" height="35" rx="5" fill="#bbdefb" stroke="#1976d2"/>
  <text x="475" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">Wheel Wn</text>
  <text x="475" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Hamiltonian for n≥4</text>
  <rect x="570" y="448" width="200" height="35" rx="5" fill="#bbdefb" stroke="#1976d2"/>
  <text x="670" y="464" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1">n-Cube Qn</text>
  <text x="670" y="477" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Hamiltonian for all n≥2</text>
</g>

<g class="step" id="step6" data-narration="The Hamiltonian path problem is NP-complete with no efficient algorithm. The Traveling Salesman Problem is its most famous real-world application.">
  <rect x="10" y="498" width="780" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="30" y="522" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">NP-Completeness &amp; Applications</text>
  <rect x="30" y="536" width="350" height="44" rx="5" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="205" y="554" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1b5e20">NP-Complete (Karp, 1972)</text>
  <text x="205" y="568" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">No polynomial-time algorithm known</text>
  <text x="205" y="582" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">P ≠ NP would prove none exists</text>
  <rect x="400" y="536" width="370" height="44" rx="5" fill="#c8e6c9" stroke="#388e3c"/>
  <text x="585" y="554" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1b5e20">Traveling Salesman Problem</text>
  <text x="585" y="568" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Find shortest Hamiltonian circuit</text>
  <text x="585" y="582" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Classic optimization application</text>
</g>
</svg>