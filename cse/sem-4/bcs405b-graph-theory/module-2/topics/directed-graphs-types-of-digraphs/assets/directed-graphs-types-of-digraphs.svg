<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about Directed Graphs and their types. We'll explore simple digraphs, tournaments, DAGs, complete digraphs, and connectivity concepts in detail.">
    <rect x="0" y="0" width="800" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Types of Directed Graphs (Digraphs)</text>
  </g>
  
  <g class="step" id="step1" data-narration="A digraph G equals V comma E where V is vertices and E is directed edges. Each edge has a tail and head with direction from tail to head.">
    <rect x="20" y="53" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="73" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Basic Definition: Digraph G = (V, E)</text>
    <circle cx="100" cy="110" r="15" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="100" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">A</text>
    <circle cx="200" cy="110" r="15" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="200" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">B</text>
    <line x1="113" y1="110" x2="187" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="240" y="114" font-family="Arial" font-size="9" fill="#333">Edge (A→B): tail=A, head=B</text>
    <text x="40" y="95" font-family="Arial" font-size="9" fill="#666">outdegree(A)=1, indegree(A)=0</text>
  </g>
  
  <g class="step" id="step2" data-narration="A Simple Digraph has no loops and no multiple edges. A Complete Digraph has an edge between every pair of vertices in one or both directions.">
    <rect x="20" y="141" width="360" height="72" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="160" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Simple Digraph</text>
    <circle cx="80" cy="190" r="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="80" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">A</text>
    <circle cx="140" cy="190" r="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="140" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">B</text>
    <line x1="90" y1="190" x2="130" y2="190" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="165" y="193" font-family="Arial" font-size="8" fill="#333">No loops,</text>
    <text x="165" y="205" font-family="Arial" font-size="8" fill="#333">no multi-edges</text>
    
    <rect x="400" y="141" width="380" height="72" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="420" y="160" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Complete Digraph</text>
    <circle cx="480" cy="190" r="12" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="480" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">A</text>
    <circle cx="540" cy="190" r="12" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="540" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">B</text>
    <line x1="490" y1="190" x2="530" y2="190" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="565" y="193" font-family="Arial" font-size="8" fill="#333">One edge per</text>
    <text x="565" y="205" font-family="Arial" font-size="8" fill="#333">pair (A→B or B→A)</text>
  </g>
  
  <g class="step" id="step3" data-narration="A Symmetric Digraph has edges in both directions for every pair. An Asymmetric Digraph has at most one direction between any two vertices.">
    <rect x="20" y="224" width="360" height="72" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="243" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Symmetric Digraph</text>
    <circle cx="100" cy="273" r="14" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="100" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">A</text>
    <circle cx="180" cy="273" r="14" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="180" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">B</text>
    <line x1="112" y1="273" x2="168" y2="273" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="168" y1="273" x2="112" y2="273" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="210" y="263" font-family="Arial" font-size="8" fill="#333">Both (A,B)</text>
    <text x="210" y="278" font-family="Arial" font-size="8" fill="#333">and (B,A)</text>
    
    <rect x="400" y="224" width="380" height="72" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="420" y="243" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Asymmetric Digraph</text>
    <circle cx="480" cy="273" r="14" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="480" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">A</text>
    <circle cx="560" cy="273" r="14" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="560" y="276" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">B</text>
    <line x1="492" y1="273" x2="548" y2="273" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="590" y="263" font-family="Arial" font-size="8" fill="#333">At most one</text>
    <text x="590" y="278" font-family="Arial" font-size="8" fill="#333">direction per pair</text>
  </g>
  
  <g class="step" id="step4" data-narration="A Regular Digraph has equal outdegree for all vertices. A Tournament is an orientation of a complete graph with exactly one edge between each pair.">
    <rect x="20" y="307" width="360" height="72" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="326" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Regular Digraph (k=1)</text>
    <circle cx="80" cy="356" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="80" y="359" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">A</text>
    <circle cx="140" cy="356" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="140" y="359" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">B</text>
    <circle cx="200" cy="356" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="200" y="359" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">C</text>
    <line x1="92" y1="356" x2="128" y2="356" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="152" y1="356" x2="188" y2="356" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="230" y="359" font-family="Arial" font-size="8" fill="#333">od(A)=od(B)=od(C)=1</text>
    
    <rect x="400" y="307" width="380" height="72" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="420" y="326" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Tournament (n=3)</text>
    <circle cx="470" cy="356" r="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="470" y="359" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">A</text>
    <circle cx="530" cy="356" r="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="530" y="359" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">B</text>
    <circle cx="590" cy="356" r="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="359" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">C</text>
    <line x1="480" y1="351" x2="520" y2="361" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <line x1="540" y1="356" x2="580" y2="356" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <line x1="585" y1="366" x2="545" y2="376" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="620" y="359" font-family="Arial" font-size="8" fill="#333">Has Hamiltonian path</text>
  </g>
  
  <g class="step" id="step5" data-narration="A DAG is a Directed Acyclic Graph with no directed cycles. Every DAG has at least one source vertex with indegree zero and one sink vertex.">
    <rect x="20" y="390" width="760" height="82" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="409" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">DAG (Directed Acyclic Graph)</text>
    <circle cx="100" cy="435" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="100" y="438" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">S</text>
    <text x="90" y="465" font-family="Arial" font-size="7" fill="#ff9800">source</text>
    <circle cx="200" cy="435" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="438" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">A</text>
    <circle cx="320" cy="435" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="320" y="438" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">B</text>
    <circle cx="440" cy="435" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="440" y="438" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">C</text>
    <circle cx="560" cy="435" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="560" y="438" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">D</text>
    <circle cx="680" cy="435" r="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="680" y="438" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">T</text>
    <text x="670" y="465" font-family="Arial" font-size="7" fill="#ff9800">sink</text>
    <line x1="113" y1="435" x2="187" y2="435" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <line x1="213" y1="435" x2="307" y2="435" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <line x1="333" y1="435" x2="427" y2="435" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <line x1="453" y1="435" x2="547" y2="435" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <line x1="573" y1="435" x2="667" y2="435" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
  </g>
  
  <g class="step" id="step6" data-narration="A digraph is strongly connected if paths exist in both directions between any vertices. Weakly connected means ignoring direction, the graph is connected.">
    <rect x="20" y="483" width="760" height="100" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="502" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Connectivity: Strong vs Weak</text>
    
    <circle cx="120" cy="545" r="16" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="120" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">A</text>
    <circle cx="220" cy="545" r="16" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">B</text>
    <circle cx="320" cy="545" r="16" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="320" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">C</text>
    <line x1="134" y1="545" x2="206" y2="545" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="306" y1="545" x2="234" y2="545" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="234" y1="535" x2="306" y2="525" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="306" y1="565" x2="234" y2="575" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="180" y="525" font-family="Arial" font-size="10" fill="#9c27b0" font-weight="bold">Strongly Connected</text>
    <text x="130" y="580" font-family="Arial" font-size="8" fill="#333">Path A→B→C→A exists</text>
    
    <circle cx="520" cy="545" r="16" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="520" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">X</text>
    <circle cx="620" cy="545" r="16" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="620" y="548" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Y</text>
    <line x1="534" y1="545" x2="606" y2="545" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="570" y="525" font-family="Arial" font-size="10" fill="#9c27b0" font-weight="bold">Weakly Connected</text>
    <text x="540" y="580" font-family="Arial" font-size="8" fill="#333">Treat edges undirected to connect</text>
  </g>
</svg>