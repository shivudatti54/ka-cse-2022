<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Operations on Graphs are fundamental transformations that create new graphs from existing ones. These include union, complement, join, and various graph products used in computer science applications.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1565c0">Operations on Graphs</text>
  </g>
  
  <g class="step" id="step1" data-narration="Basic operations include adding or removing vertices and edges. Adding vertex v creates G+v, while removing vertex v also removes all incident edges.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Basic Operations</text>
    <rect x="40" y="88" width="60" height="40" fill="none" stroke="#1976d2" stroke-width="2" rx="3"/>
    <circle cx="55" cy="100" r="4" fill="#1976d2"/>
    <circle cx="85" cy="100" r="4" fill="#1976d2"/>
    <line x1="55" y1="100" x2="85" y2="100" stroke="#1976d2" stroke-width="2"/>
    <text x="55" y="118" font-family="Arial" font-size="8" fill="#666">G</text>
    <rect x="120" y="88" width="60" height="40" fill="none" stroke="#388e3c" stroke-width="2" rx="3"/>
    <circle cx="135" cy="100" r="4" fill="#388e3c"/>
    <circle cx="165" cy="100" r="4" fill="#388e3c"/>
    <circle cx="150" cy="90" r="4" fill="#388e3c"/>
    <line x1="135" y1="100" x2="165" y2="100" stroke="#388e3c" stroke-width="2"/>
    <line x1="150" y1="90" x2="150" y2="96" stroke="#388e3c" stroke-width="2"/>
    <text x="150" y="118" font-family="Arial" font-size="8" fill="#666">G+v</text>
    <rect x="220" y="88" width="60" height="40" fill="none" stroke="#f44336" stroke-width="2" rx="3"/>
    <circle cx="235" cy="100" r="4" fill="#f44336"/>
    <circle cx="265" cy="100" r="4" fill="#f44336"/>
    <text x="235" y="118" font-family="Arial" font-size="8" fill="#666">G-v</text>
    <rect x="320" y="88" width="60" height="40" fill="none" stroke="#9c27b0" stroke-width="2" rx="3"/>
    <circle cx="335" cy="100" r="4" fill="#9c27b0"/>
    <circle cx="365" cy="100" r="4" fill="#9c27b0"/>
    <line x1="335" y1="100" x2="365" y2="100" stroke="#9c27b0" stroke-width="2"/>
    <line x1="350" y1="100" x2="350" y2="115" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="335" y="118" font-family="Arial" font-size="8" fill="#666">G+e</text>
    <text x="400" y="95" font-family="Arial" font-size="9" fill="#666">Vertex: add v / remove v+edges</text>
    <text x="400" y="115" font-family="Arial" font-size="9" fill="#666">Edge: add e / remove e</text>
  </g>
  
  <g class="step" id="step2" data-narration="Graph union combines all vertices and edges from both graphs. Intersection retains only common vertices and edges. Disjoint union keeps graphs separate.">
    <rect x="20" y="146" width="760" height="89" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Union and Intersection</text>
    <rect x="40" y="180" width="100" height="35" fill="none" stroke="#1976d2" stroke-width="2" rx="3"/>
    <circle cx="60" cy="195" r="5" fill="#1976d2"/>
    <circle cx="90" cy="195" r="5" fill="#1976d2"/>
    <circle cx="120" cy="195" r="5" fill="#1976d2"/>
    <line x1="60" y1="195" x2="120" y2="195" stroke="#1976d2" stroke-width="2"/>
    <text x="100" y="228" font-family="Arial" font-size="8" fill="#666">G₁</text>
    <rect x="180" y="180" width="100" height="35" fill="none" stroke="#388e3c" stroke-width="2" rx="3"/>
    <circle cx="200" cy="195" r="5" fill="#388e3c"/>
    <circle cx="230" cy="195" r="5" fill="#388e3c"/>
    <circle cx="260" cy="195" r="5" fill="#388e3c"/>
    <line x1="200" y1="195" x2="260" y2="195" stroke="#388e3c" stroke-width="2"/>
    <line x1="200" y1="195" x2="230" y2="195" stroke="#388e3c" stroke-width="2"/>
    <text x="230" y="228" font-family="Arial" font-size="8" fill="#666">G₂</text>
    <text x="310" y="195" font-family="Arial" font-size="10" fill="#666">∪</text>
    <rect x="330" y="180" width="100" height="35" fill="none" stroke="#9c27b0" stroke-width="2" rx="3"/>
    <circle cx="350" cy="195" r="5" fill="#9c27b0"/>
    <circle cx="380" cy="195" r="5" fill="#9c27b0"/>
    <circle cx="410" cy="195" r="5" fill="#9c27b0"/>
    <circle cx="320" cy="195" r="5" fill="#9c27b0"/>
    <line x1="350" y1="195" x2="410" y2="195" stroke="#9c27b0" stroke-width="2"/>
    <line x1="320" y1="195" x2="350" y2="195" stroke="#9c27b0" stroke-width="2"/>
    <text x="380" y="228" font-family="Arial" font-size="8" fill="#666">G₁∪G₂</text>
    <text x="470" y="195" font-family="Arial" font-size="10" fill="#666">∩</text>
    <rect x="490" y="180" width="60" height="35" fill="none" stroke="#ff9800" stroke-width="2" rx="3"/>
    <circle cx="510" cy="195" r="5" fill="#ff9800"/>
    <circle cx="540" cy="195" r="5" fill="#ff9800"/>
    <line x1="510" y1="195" x2="540" y2="195" stroke="#ff9800" stroke-width="2"/>
    <text x="520" y="228" font-family="Arial" font-size="8" fill="#666">G₁∩G₂</text>
    <text x="600" y="195" font-family="Arial" font-size="9" fill="#666">Union: V₁∪V₂, E₁∪E₂</text>
    <text x="600" y="210" font-family="Arial" font-size="9" fill="#666">Intersection: V₁∩V₂, E₁∩E₂</text>
  </g>
  
  <g class="step" id="step3" data-narration="The complement of a graph G has the same vertices but edges where G has no edges. A graph and its complement together form a complete graph Kₙ.">
    <rect x="20" y="243" width="760" height="91" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="263" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Graph Complement (G̅)</text>
    <rect x="40" y="277" width="100" height="40" fill="none" stroke="#1976d2" stroke-width="2" rx="3"/>
    <circle cx="60" cy="292" r="5" fill="#1976d2"/>
    <circle cx="90" cy="292" r="5" fill="#1976d2"/>
    <circle cx="120" cy="292" r="5" fill="#1976d2"/>
    <line x1="60" y1="292" x2="90" y2="292" stroke="#1976d2" stroke-width="2"/>
    <line x1="90" y1="292" x2="120" y2="292" stroke="#1976d2" stroke-width="2"/>
    <text x="90" y="327" font-family="Arial" font-size="8" fill="#666">G = P₃</text>
    <text x="160" y="294" font-family="Arial" font-size="14" fill="#666">→</text>
    <rect x="190" y="277" width="100" height="40" fill="none" stroke="#9c27b0" stroke-width="2" rx="3"/>
    <circle cx="210" cy="292" r="5" fill="#9c27b0"/>
    <circle cx="240" cy="292" r="5" fill="#9c27b0"/>
    <circle cx="270" cy="292" r="5" fill="#9c27b0"/>
    <line x1="210" y1="292" x2="270" y2="292" stroke="#9c27b0" stroke-width="2"/>
    <text x="240" y="327" font-family="Arial" font-size="8" fill="#666">G̅ = K₃</text>
    <text x="320" y="294" font-family="Arial" font-size="14" fill="#666">+</text>
    <rect x="350" y="277" width="50" height="40" fill="none" stroke="#f44336" stroke-width="2" rx="3"/>
    <circle cx="375" cy="292" r="5" fill="#f44336"/>
    <text x="375" y="327" font-family="Arial" font-size="8" fill="#666">G̅</text>
    <text x="430" y="294" font-family="Arial" font-size="14" fill="#666">=</text>
    <rect x="460" y="277" width="60" height="40" fill="none" stroke="#ff9800" stroke-width="2" rx="3"/>
    <circle cx="475" cy="292" r="5" fill="#ff9800"/>
    <circle cx="490" cy="292" r="5" fill="#ff9800"/>
    <circle cx="505" cy="292" r="5" fill="#ff9800"/>
    <line x1="475" y1="292" x2="505" y2="292" stroke="#ff9800" stroke-width="2"/>
    <line x1="475" y1="292" x2="490" y2="297" stroke="#ff9800" stroke-width="2"/>
    <line x1="490" y1="297" x2="505" y2="292" stroke="#ff9800" stroke-width="2"/>
    <text x="490" y="327" font-family="Arial" font-size="8" fill="#666">K₃</text>
    <text x="560" y="289" font-family="Arial" font-size="9" fill="#666">Complement inverts adjacency</text>
    <text x="560" y="304" font-family="Arial" font-size="9" fill="#666">G + G̅ = Kₙ (complete)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Graph join connects every vertex of one graph to every vertex of another disjoint graph. P₂ + K₁ creates a triangle K₃.">
    <rect x="20" y="342" width="760" height="90" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="362" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Graph Join (G₁ + G₂)</text>
    <rect x="40" y="376" width="60" height="40" fill="none" stroke="#1976d2" stroke-width="2" rx="3"/>
    <circle cx="55" cy="390" r="5" fill="#1976d2"/>
    <circle cx="85" cy="390" r="5" fill="#1976d2"/>
    <line x1="55" y1="390" x2="85" y2="390" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="425" font-family="Arial" font-size="8" fill="#666">P₂</text>
    <rect x="120" y="386" width="25" height="20" fill="none" stroke="#388e3c" stroke-width="2" rx="3"/>
    <circle cx="132" cy="396" r="5" fill="#388e3c"/>
    <text x="132" y="425" font-family="Arial" font-size="8" fill="#666">K₁</text>
    <text x="160" y="395" font-family="Arial" font-size="14" fill="#666">+</text>
    <text x="180" y="395" font-family="Arial" font-size="10" fill="#666">(join)</text>
    <rect x="220" y="376" width="70" height="40" fill="none" stroke="#9c27b0" stroke-width="2" rx="3"/>
    <circle cx="240" cy="390" r="5" fill="#9c27b0"/>
    <circle cx="270" cy="390" r="5" fill="#9c27b0"/>
    <circle cx="255" cy="380" r="5" fill="#9c27b0"/>
    <line x1="240" y1="390" x2="270" y2="390" stroke="#9c27b0" stroke-width="2"/>
    <line x1="240" y1="390" x2="255" y2="380" stroke="#9c27b0" stroke-width="2"/>
    <line x1="270" y1="390" x2="255" y2="380" stroke="#9c27b0" stroke-width="2"/>
    <text x="255" y="425" font-family="Arial" font-size="8" fill="#666">K₃</text>
    <text x="320" y="385" font-family="Arial" font-size="9" fill="#666">Join: connect every</text>
    <text x="320" y="400" font-family="Arial" font-size="9" fill="#666">vertex of G₁ to G₂</text>
    <rect x="420" y="376" width="80" height="40" fill="none" stroke="#1976d2" stroke-width="2" rx="3"/>
    <circle cx="435" cy="390" r="4" fill="#1976d2"/>
    <circle cx="465" cy="390" r="4" fill="#1976d2"/>
    <circle cx="450" cy="402" r="4" fill="#1976d2"/>
    <circle cx="480" cy="402" r="4" fill="#1976d2"/>
    <line x1="435" y1="390" x2="465" y2="390" stroke="#1976d2" stroke-width="2"/>
    <line x1="450" y1="402" x2="480" y2="402" stroke="#1976d2" stroke-width="2"/>
    <text x="460" y="425" font-family="Arial" font-size="8" fill="#666">G₁</text>
    <rect x="510" y="386" width="25" height="20" fill="none" stroke="#388e3c" stroke-width="2" rx="3"/>
    <circle cx="522" cy="396" r="4" fill="#388e3c"/>
    <text x="522" y="425" font-family="Arial" font-size="8" fill="#666">G₂</text>
    <text x="550" y="395" font-family="Arial" font-size="14" fill="#666">→</text>
    <rect x="580" y="376" width="90" height="40" fill="none" stroke="#f44336" stroke-width="2" rx="3"/>
    <circle cx="595" cy="390" r="4" fill="#f44336"/>
    <circle cx="625" cy="390" r="4" fill="#f44336"/>
    <circle cx="610" cy="402" r="4" fill="#f44336"/>
    <circle cx="640" cy="402" r="4" fill="#f44336"/>
    <line x1="595" y1="390" x2="625" y2="390" stroke="#f44336" stroke-width="2"/>
    <line x1="595" y1="390" x2="610" y2="402" stroke="#f44336" stroke-width="2"/>
    <line x1="595" y1="390" x2="640" y2="402" stroke="#f44336" stroke-width="2"/>
    <line x1="625" y1="390" x2="610" y2="402" stroke="#f44336" stroke-width="2"/>
    <line x1="625" y1="390" x2="640" y2="402" stroke="#f44336" stroke-width="2"/>
    <line x1="610" y1="402" x2="640" y2="402" stroke="#f44336" stroke-width="2"/>
    <text x="620" y="425" font-family="Arial" font-size="8" fill="#666">Complete bipartite</text>
  </g>
  
  <g class="step" id="step5" data-narration="Four graph products differ in adjacency rules: Cartesian (one coordinate matches), Strong (Cartesian or both adjacent), Tensor (both adjacent), Lexicographic.">
    <rect x="20" y="440" width="760" height="92" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="460" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Graph Products</text>
    <text x="40" y="485" font-family="Arial" font-size="9" fill="#1976d2">Cartesian (×)</text>
    <text x="40" y="498" font-family="Arial" font-size="8" fill="#666">(u₁,v₁)~(u₂,v₂) if u₁=u₂&amp;v₁~v₂</text>
    <text x="40" y="510" font-family="Arial" font-size="8" fill="#666">OR v₁=v₂&amp;u₁~u₂</text>
    <text x="150" y="485" font-family="Arial" font-size="9" fill="#388e3c">Strong (⊠)</text>
    <text x="150" y="498" font-family="Arial" font-size="8" fill="#666">Cartesian OR both adjacent</text>
    <text x="270" y="485" font-family="Arial" font-size="9" fill="#9c27b0">Tensor/×</text>
    <text x="270" y="498" font-family="Arial" font-size="8" fill="#666">Both must be adjacent</text>
    <text x="370" y="485" font-family="Arial" font-size="9" fill="#ff9800">Lexicographic [ ]</text>
    <text x="370" y="498" font-family="Arial" font-size="8" fill="#666">u₁~u₂ OR u₁=u₂&amp;v₁~v₂</text>
    <rect x="500" y="478" width="140" height="35" fill="none" stroke="#1976d2" stroke-width="2" rx="3"/>
    <circle cx="520" cy="492" r="4" fill="#1976d2"/>
    <circle cx="550" cy="492" r="4" fill="#1976d2"/>
    <circle cx="610" cy="492" r="4" fill="#1976d2"/>
    <circle cx="520" cy="508" r="4" fill="#1976d2"/>
    <circle cx="550" cy="508" r="4" fill="#1976d2"/>
    <circle cx="610" cy="508" r="4" fill="#1976d2"/>
    <line x1="520" y1="492" x2="550" y2="492" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="550" y1="492" x2="610" y2="492" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="520" y1="508" x2="550" y2="508" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="550" y1="508" x2="610" y2="508" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="520" y1="492" x2="520" y2="508" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="550" y1="492" x2="550" y2="508" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="610" y1="492" x2="610" y2="508" stroke="#1976d2" stroke-width="1.5"/>
    <text x="565" y="525" font-family="Arial" font-size="7" fill="#666">C₃ × P₂ = Prism</text>
  </g>
  
  <g class="step" id="step6" data-narration="Graphs are isomorphic if a bijection preserves adjacency. A graph minor results from edge deletions, contractions, and removing isolated vertices.">
    <rect x="20" y="540" width="760" height="55" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="560" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Isomorphism and Graph Minor</text>
    <text x="200" y="560" font-family="Arial" font-size="9" fill="#666">Isomorphic: bijection preserves adjacency</text>
    <text x="380" y="560" font-family="Arial" font-size="9" fill="#666">Graph Minor: edge deletion + contraction + remove isolated</text>
  </g>
</svg>