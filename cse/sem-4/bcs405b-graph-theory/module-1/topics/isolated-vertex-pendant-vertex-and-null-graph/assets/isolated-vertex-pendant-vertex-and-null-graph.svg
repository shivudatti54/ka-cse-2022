<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="We study three important graph concepts: isolated vertices with degree zero, pendant vertices with degree one, and null graphs with no edges.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Isolated Vertex, Pendant Vertex, and Null Graph</text>
  </g>
  
  <g class="step" id="step1" data-narration="An isolated vertex has degree zero, meaning no edge connects it to any other vertex. It appears alone with no connections in the graph.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Isolated Vertex</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#2e7d32">Definition: A vertex with degree 0, not adjacent to any other vertex.</text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#2e7d32">Properties: Degree = 0, cannot be part of any path, row/column in adjacency matrix is all zeros.</text>
    <circle cx="650" cy="98" r="20" fill="#fff" stroke="#388e3c" stroke-width="2"/>
    <text x="650" y="103" text-anchor="middle" font-family="Arial" font-size="14" fill="#388e3c">e</text>
  </g>
  
  <g class="step" id="step2" data-narration="A pendant vertex (leaf vertex) has degree exactly one, connected to exactly one other vertex. It acts as an endpoint in the graph structure.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Pendant Vertex (Leaf)</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#e65100">Definition: A vertex with degree 1, connected to exactly one other vertex.</text>
    <text x="40" y="206" font-family="Arial" font-size="11" fill="#e65100">Properties: Degree = 1, has one neighbor, edge is called pendant/leaf edge.</text>
    <circle cx="600" cy="186" r="18" fill="#fff" stroke="#ff9800" stroke-width="2"/>
    <text x="600" y="191" text-anchor="middle" font-family="Arial" font-size="14" fill="#ff9800">b</text>
    <line x1="600" y1="186" x2="660" y2="186" stroke="#ff9800" stroke-width="2"/>
    <circle cx="660" cy="186" r="18" fill="#fff" stroke="#ff9800" stroke-width="2"/>
    <text x="660" y="191" text-anchor="middle" font-family="Arial" font-size="14" fill="#ff9800">a</text>
  </g>
  
  <g class="step" id="step3" data-narration="A null graph contains no edges. All vertices (if present) are isolated with degree zero. It is also called an edgeless or empty graph.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Null Graph</text>
    <text x="40" y="276" font-family="Arial" font-size="11" fill="#6a1b9a">Definition: A graph with no edges. All vertices (if any) are isolated.</text>
    <text x="40" y="294" font-family="Arial" font-size="11" fill="#6a1b9a">Properties: |E| = 0, all vertices degree = 0, adjacency matrix is zero matrix.</text>
    <circle cx="580" cy="274" r="16" fill="#fff" stroke="#9c27b0" stroke-width="2"/>
    <text x="580" y="279" text-anchor="middle" font-family="Arial" font-size="12" fill="#9c27b0">v1</text>
    <circle cx="620" cy="274" r="16" fill="#fff" stroke="#9c27b0" stroke-width="2"/>
    <text x="620" y="279" text-anchor="middle" font-family="Arial" font-size="12" fill="#9c27b0">v2</text>
    <circle cx="660" cy="274" r="16" fill="#fff" stroke="#9c27b0" stroke-width="2"/>
    <text x="660" y="279" text-anchor="middle" font-family="Arial" font-size="12" fill="#9c27b0">v3</text>
  </g>
  
  <g class="step" id="step4" data-narration="Example: Graph G with V = {a,b,c,d,e} and E = {(a,b), (a,c), (c,d)}. Vertex b and d are pendant (degree 1), vertex e is isolated (degree 0).">
    <rect x="20" y="322" width="760" height="85" fill="#ffebee" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Example: Identifying Vertices</text>
    <text x="40" y="362" font-family="Arial" font-size="11" fill="#c62828">V = {a,b,c,d,e}, E = {(a,b), (a,c), (c,d)}</text>
    <text x="40" y="378" font-family="Arial" font-size="11" fill="#c62828">deg(b)=1 (pendant), deg(d)=1 (pendant), deg(e)=0 (isolated)</text>
    <circle cx="560" cy="362" r="14" fill="#fff" stroke="#f44336" stroke-width="2"/>
    <text x="560" y="367" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">a</text>
    <circle cx="590" cy="362" r="14" fill="#fff" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="367" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">b</text>
    <line x1="574" y1="362" x2="576" y2="362" stroke="#f44336" stroke-width="2"/>
    <circle cx="560" cy="390" r="14" fill="#fff" stroke="#f44336" stroke-width="2"/>
    <text x="560" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">c</text>
    <circle cx="590" cy="390" r="14" fill="#fff" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#f44336">d</text>
    <line x1="560" y1="376" x2="560" y2="376" stroke="#f44336" stroke-width="2"/>
    <circle cx="670" cy="362" r="14" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <text x="670" y="367" text-anchor="middle" font-family="Arial" font-size="11" fill="#1976d2">e</text>
  </g>
  
  <g class="step" id="step5" data-narration="Key summary: Isolated vertex degree is 0, pendant vertex degree is 1. Null graph has zero edges. Handshaking Lemma: sum of degrees equals twice the number of edges.">
    <rect x="20" y="415" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="437" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Key Summary Points</text>
    <text x="40" y="457" font-family="Arial" font-size="11" fill="#1b5e20">• Isolated: degree = 0 | Pendant: degree = 1 | Null: |E| = 0</text>
    <text x="40" y="475" font-family="Arial" font-size="11" fill="#1b5e20">• Handshaking Lemma: Σdeg(v) = 2 × |E|</text>
    <rect x="450" y="430" width="310" height="55" fill="#fff" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="460" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Quick Reference</text>
    <text x="460" y="468" font-family="Arial" font-size="10" fill="#2e7d32">Isolated: deg=0</text>
    <text x="460" y="482" font-family="Arial" font-size="10" fill="#2e7d32">Pendant: deg=1</text>
    <text x="580" y="468" font-family="Arial" font-size="10" fill="#2e7d32">Null: |E|=0</text>
    <text x="580" y="482" font-family="Arial" font-size="10" fill="#2e7d32">Tree leaves</text>
  </g>
</svg>