<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on connected graphs, disconnected graphs, and components in graph theory explained with examples and formulas.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Connected Graphs, Disconnected Graphs and Components</text>
  </g>
  
  <g class="step" id="step1" data-narration="A connected graph has a path between every pair of vertices. There is always a route from any vertex to any other vertex in the graph structure.">
    <rect x="20" y="58" width="350" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="195" y="75" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">CONNECTED GRAPH</text>
    <text x="195" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Path exists between every pair</text>
    <circle cx="120" cy="110" r="10" fill="#1976d2"/>
    <circle cx="180" cy="110" r="10" fill="#1976d2"/>
    <circle cx="240" cy="110" r="10" fill="#1976d2"/>
    <circle cx="180" cy="75" r="10" fill="#1976d2"/>
    <line x1="120" y1="110" x2="180" y2="110" stroke="#1976d2" stroke-width="2"/>
    <line x1="180" y1="110" x2="240" y2="110" stroke="#1976d2" stroke-width="2"/>
    <line x1="180" y1="110" x2="180" y2="75" stroke="#1976d2" stroke-width="2"/>
    <text x="112" y="135" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">A</text>
    <text x="172" y="135" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">B</text>
    <text x="232" y="135" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">C</text>
    <text x="175" y="68" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">D</text>
  </g>
  
  <g class="step" id="step2" data-narration="A disconnected graph can be split into two or more separate parts called components. No path exists between vertices in different components of the graph.">
    <rect x="400" y="150" width="380" height="87" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="590" y="167" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">DISCONNECTED GRAPH</text>
    <text x="590" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">No path between different parts</text>
    <circle cx="480" cy="202" r="10" fill="#f44336"/>
    <circle cx="530" cy="202" r="10" fill="#f44336"/>
    <line x1="480" y1="202" x2="530" y2="202" stroke="#f44336" stroke-width="2"/>
    <text x="472" y="227" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">A</text>
    <text x="522" y="227" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">B</text>
    <circle cx="680" cy="202" r="10" fill="#f44336"/>
    <circle cx="730" cy="202" r="10" fill="#f44336"/>
    <line x1="680" y1="202" x2="730" y2="202" stroke="#f44336" stroke-width="2"/>
    <text x="672" y="227" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">C</text>
    <text x="722" y="227" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">D</text>
    <text x="605" y="217" text-anchor="middle" font-family="Arial" font-size="8" fill="#999">No path between these groups</text>
  </g>
  
  <g class="step" id="step3" data-narration="Connected components are maximal connected subgraphs in a larger graph. Each component represents a separate connected region where all vertices can reach each other.">
    <rect x="20" y="245" width="760" height="91" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="400" y="262" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">CONNECTED COMPONENTS</text>
    <text x="400" y="275" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">A maximal connected subgraph that cannot be extended further</text>
    <circle cx="100" cy="302" r="8" fill="#388e3c"/>
    <circle cx="140" cy="302" r="8" fill="#388e3c"/>
    <circle cx="120" cy="282" r="8" fill="#388e3c"/>
    <line x1="100" y1="302" x2="140" y2="302" stroke="#388e3c" stroke-width="2"/>
    <line x1="100" y1="302" x2="120" y2="282" stroke="#388e3c" stroke-width="2"/>
    <line x1="140" y1="302" x2="120" y2="282" stroke="#388e3c" stroke-width="2"/>
    <rect x="80" y="315" width="60" height="18" fill="#c8e6c9" rx="3"/>
    <text x="110" y="328" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Comp 1</text>
    <circle cx="240" cy="302" r="8" fill="#388e3c"/>
    <circle cx="280" cy="302" r="8" fill="#388e3c"/>
    <line x1="240" y1="302" x2="280" y2="302" stroke="#388e3c" stroke-width="2"/>
    <rect x="225" y="315" width="50" height="18" fill="#c8e6c9" rx="3"/>
    <text x="250" y="328" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">Comp 2</text>
    <text x="550" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ω(G) = number of components</text>
    <text x="550" y="295" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Find using DFS or BFS</text>
  </g>
  
  <g class="step" id="step4" data-narration="DFS and BFS algorithms identify connected components by traversing vertices systematically. Each complete traversal marks one component in the graph structure.">
    <rect x="20" y="340" width="760" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="400" y="357" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">FINDING COMPONENTS: DFS AND BFS</text>
    <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Both algorithms have O(V + E) time complexity</text>
    <rect x="40" y="380" width="180" height="40" fill="#ffe0b2" rx="3"/>
    <text x="130" y="394" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">DFS Algorithm</text>
    <text x="50" y="406" text-anchor="start" font-family="Arial" font-size="7" fill="#666">Mark unvisited, run DFS</text>
    <rect x="240" y="380" width="180" height="40" fill="#ffe0b2" rx="3"/>
    <text x="330" y="394" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">BFS Algorithm</text>
    <text x="250" y="406" text-anchor="start" font-family="Arial" font-size="7" fill="#666">Mark unvisited, run BFS</text>
    <rect x="440" y="380" width="150" height="40" fill="#ffe0b2" rx="3"/>
    <text x="515" y="390" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e65100">Result</text>
    <text x="515" y="403" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Each traversal = 1 component</text>
    <text x="620" y="398" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Repeat for unvisited</text>
  </g>
  
  <g class="step" id="step5" data-narration="Whitney's inequality states vertex connectivity is less than or equal to edge connectivity. For any graph, minimum edges equals n minus k components formula.">
    <rect x="20" y="438" width="760" height="114" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="400" y="455" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">KEY FORMULAS &amp; WHITNEY'S INEQUALITY</text>
    <text x="400" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">κ(G) ≤ λ(G) ≤ δ(G)</text>
    <rect x="30" y="480" width="150" height="35" fill="#e1bee7" rx="3"/>
    <text x="105" y="494" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Connected: n-1</text>
    <text x="105" y="508" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">min edges</text>
    <rect x="195" y="480" width="150" height="35" fill="#e1bee7" rx="3"/>
    <text x="270" y="494" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">Disconnected: n-k</text>
    <text x="270" y="508" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">min edges (k=comp)</text>
    <rect x="360" y="480" width="140" height="35" fill="#e1bee7" rx="3"/>
    <text x="430" y="494" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">κ(G) = κ ≤ λ</text>
    <text x="430" y="508" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">vertex connectivity</text>
    <rect x="515" y="480" width="140" height="35" fill="#e1bee7" rx="3"/>
    <text x="585" y="494" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#7b1fa2">λ(G) = λ ≤ δ</text>
    <text x="585" y="508" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">edge connectivity</text>
    <text x="680" y="495" text-anchor="middle" font-family="Arial" font-size="7" fill="#7b1fa2">Complete K4:</text>
    <text x="680" y="507" text-anchor="middle" font-family="Arial" font-size="7" fill="#7b1fa2">κ=λ=δ=3</text>
  </g>
</svg>