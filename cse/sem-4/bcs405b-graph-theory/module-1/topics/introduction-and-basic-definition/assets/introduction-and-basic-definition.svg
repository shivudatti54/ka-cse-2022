<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Introduction to Data Structures. We'll explore data organization, classification, ADTs, complexity analysis, and practical programming fundamentals and applications.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Introduction to Data Structures</text>
  </g>
  
  <g class="step" id="step1" data-narration="Data is information processed by computers, stored in binary form. It includes primitive types like int, float, char, bool and non-primitive types like arrays.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Data?</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Information processed by computers, stored in binary form (0s and 1s)</text>
    <rect x="40" y="105" width="160" height="25" fill="#e3f2fd" rx="3"/>
    <text x="50" y="120" font-family="Arial" font-size="9" fill="#1976d2">Primitive Types:</text>
    <text x="50" y="130" font-family="Arial" font-size="8" fill="#333">int, float, char, bool</text>
    <rect x="210" y="105" width="200" height="25" fill="#e8f5e9" rx="3"/>
    <text x="220" y="120" font-family="Arial" font-size="9" fill="#388e3c">Non-Primitive Types:</text>
    <text x="220" y="130" font-family="Arial" font-size="8" fill="#333">Arrays, Structures, Pointers</text>
  </g>
  
  <g class="step" id="step2" data-narration="A data structure is a way of organizing data in memory for efficient access and modification. It defines relationships between data elements and provides operations.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is a Data Structure?</text>
    <text x="40" y="183" font-family="Arial" font-size="10" fill="#333">A specialized format for organizing, processing, and storing data for efficient access and modification</text>
    <rect x="40" y="195" width="340" height="25" fill="#fff3e0" rx="3"/>
    <text x="50" y="210" font-family="Arial" font-size="9" fill="#ff9800">Example: Array vs Linked List</text>
    <text x="50" y="220" font-family="Arial" font-size="8" fill="#333">Array: O(1) access, O(n) insert | Linked List: O(n) access, O(1) insert</text>
  </g>
  
  <g class="step" id="step3" data-narration="Data structures are classified into Linear (sequential arrangement: arrays, linked lists, stacks, queues) and Non-Linear (hierarchical/network: trees, graphs) various complex structures.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Classification of Data Structures</text>
    <rect x="40" y="268" width="340" height="40" fill="#e3f2fd" rx="3"/>
    <text x="50" y="282" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">Linear Data Structures</text>
    <text x="50" y="295" font-family="Arial" font-size="8" fill="#333">Elements arranged sequentially</text>
    <text x="50" y="306" font-family="Arial" font-size="8" fill="#666">Examples: Arrays, Linked Lists, Stacks, Queues</text>
    <rect x="400" y="268" width="340" height="40" fill="#f3e5f5" rx="3"/>
    <text x="410" y="282" font-family="Arial" font-size="10" fill="#9c27b0" font-weight="bold">Non-Linear Data Structures</text>
    <text x="410" y="295" font-family="Arial" font-size="8" fill="#333">Hierarchical or network relationships</text>
    <text x="410" y="306" font-family="Arial" font-size="8" fill="#666">Examples: Trees, Graphs</text>
  </g>
  
  <g class="step" id="step4" data-narration="An Abstract Data Type (ADT) defines a data type by its behavior (operations) rather than implementation. It separates interface from implementation details.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Abstract Data Type (ADT)</text>
    <text x="40" y="360" font-family="Arial" font-size="10" fill="#333">Defines behavior (operations) without specifying implementation details</text>
    <rect x="40" y="370" width="180" height="26" fill="#e8f5e9" rx="3"/>
    <text x="50" y="382" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Stack ADT Operations:</text>
    <text x="50" y="394" font-family="Arial" font-size="8" fill="#333">push, pop, peek, isEmpty</text>
    <rect x="230" y="370" width="180" height="26" fill="#e8f5e9" rx="3"/>
    <text x="240" y="382" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Queue ADT Operations:</text>
    <text x="240" y="394" font-family="Arial" font-size="8" fill="#333">enqueue, dequeue, front, rear</text>
    <rect x="420" y="370" width="180" height="26" fill="#fff3e0" rx="3"/>
    <text x="430" y="382" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">Implementation:</text>
    <text x="430" y="394" font-family="Arial" font-size="8" fill="#333">Array or Linked List</text>
  </g>
  
  <g class="step" id="step5" data-narration="Common data structure operations include traversal, insertion, deletion, search, sorting, and merging. Each structure optimizes different operations for greatly improved efficiency.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Data Structure Operations</text>
    <rect x="40" y="442" width="120" height="42" fill="#ffebee" rx="3"/>
    <text x="50" y="455" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">Traversal</text>
    <text x="50" y="467" font-family="Arial" font-size="8" fill="#333">Visit all elements</text>
    <text x="50" y="478" font-family="Arial" font-size="8" fill="#666">Insertion</text>
    <rect x="170" y="442" width="120" height="42" fill="#ffebee" rx="3"/>
    <text x="180" y="455" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">Deletion</text>
    <text x="180" y="467" font-family="Arial" font-size="8" fill="#333">Remove element</text>
    <text x="180" y="478" font-family="Arial" font-size="8" fill="#666">Search</text>
    <rect x="300" y="442" width="120" height="42" fill="#ffebee" rx="3"/>
    <text x="310" y="455" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">Sorting</text>
    <text x="310" y="467" font-family="Arial" font-size="8" fill="#333">Arrange in order</text>
    <text x="310" y="478" font-family="Arial" font-size="8" fill="#666">Merging</text>
    <rect x="430" y="442" width="120" height="42" fill="#ffebee" rx="3"/>
    <text x="440" y="455" font-family="Arial" font-size="9" fill="#f44336" font-weight="bold">Access</text>
    <text x="440" y="467" font-family="Arial" font-size="8" fill="#333">Get element by index</text>
    <text x="440" y="478" font-family="Arial" font-size="8" fill="#666">Update</text>
  </g>
  
  <g class="step" id="step6" data-narration="Time complexity using Big-O notation: O(1) constant, O(log n) logarithmic, O(n) linear, O(n²) quadratic. Choose structure based on operation frequency.">
    <rect x="20" y="498" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Time &amp; Space Complexity (Big-O Notation)</text>
    <rect x="40" y="528" width="160" height="50" fill="#e3f2fd" rx="3"/>
    <text x="50" y="542" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">Time Complexities:</text>
    <text x="50" y="555" font-family="Arial" font-size="8" fill="#333">O(1) - Constant</text>
    <text x="50" y="566" font-family="Arial" font-size="8" fill="#333">O(log n) - Logarithmic</text>
    <text x="50" y="577" font-family="Arial" font-size="8" fill="#333">O(n) - Linear</text>
    <rect x="210" y="528" width="160" height="50" fill="#e3f2fd" rx="3"/>
    <text x="220" y="542" font-family="Arial" font-size="9" fill="#1976d2" font-weight="bold">Examples:</text>
    <text x="220" y="555" font-family="Arial" font-size="8" fill="#333">Array access: O(1)</text>
    <text x="220" y="566" font-family="Arial" font-size="8" fill="#333">Linear search: O(n)</text>
    <text x="220" y="577" font-family="Arial" font-size="8" fill="#333">Binary search: O(log n)</text>
    <rect x="380" y="528" width="180" height="50" fill="#fff3e0" rx="3"/>
    <text x="390" y="542" font-family="Arial" font-size="9" fill="#ff9800" font-weight="bold">Key Insight:</text>
    <text x="390" y="555" font-family="Arial" font-size="8" fill="#333">Choose data structure</text>
    <text x="390" y="566" font-family="Arial" font-size="8" fill="#333">based on most</text>
    <text x="390" y="577" font-family="Arial" font-size="8" fill="#333">frequent operation</text>
    <rect x="570" y="528" width="180" height="50" fill="#e8f5e9" rx="3"/>
    <text x="580" y="542" font-family="Arial" font-size="9" fill="#388e3c" font-weight="bold">Space Complexity:</text>
    <text x="580" y="555" font-family="Arial" font-size="8" fill="#333">Memory required as</text>
    <text x="580" y="566" font-family="Arial" font-size="8" fill="#333">function of input size</text>
    <text x="580" y="577" font-family="Arial" font-size="8" fill="#333">O(n), O(1), O(log n)</text>
  </g>
</svg>