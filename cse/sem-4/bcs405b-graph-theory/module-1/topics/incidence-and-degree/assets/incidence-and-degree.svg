<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on Incidence and Degree in Graph Theory, fundamental concepts that form the backbone of graph analysis.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Incidence and Degree in Graph Theory</text>
  </g>
  
  <g class="step" id="step1" data-narration="A vertex is a fundamental unit represented as a dot. An edge connects two vertices. Incidence means an edge touches its endpoint vertices.">
    <rect x="20" y="58" width="760" height="94" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Basic Definitions</text>
    <rect x="40" y="88" width="120" height="40" fill="#1976d2" rx="20"/>
    <text x="100" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Vertex (V)</text>
    <text x="100" y="126" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Point or circle</text>
    <rect x="180" y="88" width="120" height="40" fill="#1976d2" rx="20"/>
    <text x="240" y="112" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Edge (E)</text>
    <text x="240" y="126" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Connection</text>
    <text x="380" y="88" font-family="Arial" font-size="11" fill="#333">Incidence: Edge e={u,v} is</text>
    <text x="380" y="102" font-family="Arial" font-size="11" fill="#333">incident on vertices u and v</text>
    <circle cx="500" cy="108" r="15" fill="none" stroke="#1976d2" stroke-width="2"/>
    <circle cx="560" cy="108" r="15" fill="none" stroke="#1976d2" stroke-width="2"/>
    <line x1="515" y1="108" x2="545" y2="108" stroke="#1976d2" stroke-width="2"/>
    <text x="530" y="132" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">e</text>
    <text x="500" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">u</text>
    <text x="560" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">v</text>
  </g>
  
  <g class="step" id="step2" data-narration="The degree of a vertex is the count of edges incident to it. Loops count as 2. Special vertices include isolated and pendant.">
    <rect x="20" y="160" width="760" height="70" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="40" y="180" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Degree of a Vertex</text>
    <text x="40" y="200" font-family="Arial" font-size="11" fill="#333">deg(v) = number of edges incident to v (loop = 2)</text>
    <rect x="320" y="175" width="150" height="35" fill="#388e3c" rx="5"/>
    <text x="395" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Isolated: deg = 0</text>
    <rect x="490" y="175" width="150" height="35" fill="#388e3c" rx="5"/>
    <text x="565" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Pendant: deg = 1</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Handshaking Lemma states the sum of all vertex degrees equals twice the number of edges. This is graph theory's key theorem.">
    <rect x="20" y="238" width="760" height="70" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="40" y="258" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Handshaking Lemma</text>
    <text x="40" y="285" font-family="Arial" font-size="14" fill="#333">Σ deg(v) = 2|E|</text>
    <rect x="200" y="253" width="260" height="45" fill="#ff9800" rx="5"/>
    <text x="330" y="273" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Each edge has 2 endpoints</text>
    <text x="330" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="white">so contributes 2 to total degree</text>
    <text x="480" y="263" font-family="Arial" font-size="10" fill="#333">Corollary: Number of</text>
    <text x="480" y="278" font-family="Arial" font-size="10" fill="#333">odd-degree vertices is even</text>
  </g>
  
  <g class="step" id="step4" data-narration="Odd vertices have odd degree; even vertices have even degree. The number of odd vertices is always even per the handshaking lemma.">
    <rect x="20" y="316" width="760" height="70" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="40" y="336" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Odd and Even Vertices</text>
    <circle cx="90" cy="360" r="18" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="90" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">deg=3</text>
    <text x="90" y="368" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Odd</text>
    <circle cx="160" cy="360" r="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="160" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">deg=2</text>
    <text x="160" y="368" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Even</text>
    <circle cx="230" cy="360" r="18" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="230" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">deg=1</text>
    <text x="230" y="368" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Odd</text>
    <circle cx="300" cy="360" r="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="300" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">deg=4</text>
    <text x="300" y="368" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Even</text>
    <rect x="360" y="345" width="180" height="35" fill="#9c27b0" rx="5"/>
    <text x="450" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Odd vertices = 2 (even)</text>
  </g>
  
  <g class="step" id="step5" data-narration="A regular graph has all vertices with the same degree. Complete graph K-n is n-1 regular. The degree sequence lists all degrees.">
    <rect x="20" y="394" width="760" height="70" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="414" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Regular Graphs and Degree Sequence</text>
    <rect x="40" y="432" width="180" height="28" fill="#1976d2" rx="5"/>
    <text x="130" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="white">r-regular: all deg = r</text>
    <rect x="240" y="432" width="200" height="28" fill="#1976d2" rx="5"/>
    <text x="340" y="450" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Kₙ is (n-1)-regular</text>
    <text x="460" y="432" font-family="Arial" font-size="10" fill="#333">Degree Seq:</text>
    <text x="460" y="448" font-family="Arial" font-size="9" fill="#666">(3,3,2,2,1,0)</text>
    <text x="460" y="462" font-family="Arial" font-size="9" fill="#666">|E| = nr/2</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: A 3-regular graph with 8 vertices has 12 edges. Sum of degrees equals 24, which equals 2 times 12, perfectly verifying the handshaking lemma.">
    <rect x="20" y="472" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="40" y="492" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Example: 3-Regular Graph with 8 Vertices</text>
    <text x="40" y="520" font-family="Arial" font-size="11" fill="#333">|V| = 8, r = 3 → Σ deg(v) = 24</text>
    <rect x="200" y="500" width="200" height="42" fill="#388e3c" rx="5"/>
    <text x="300" y="522" text-anchor="middle" font-family="Arial" font-size="11" fill="white">24 = 2|E|</text>
    <text x="300" y="538" text-anchor="middle" font-family="Arial" font-size="10" fill="white">|E| = 12 ✓</text>
    <text x="420" y="520" font-family="Arial" font-size="10" fill="#666">Max edges = n(n-1)/2 = 28</text>
  </g>
</svg>