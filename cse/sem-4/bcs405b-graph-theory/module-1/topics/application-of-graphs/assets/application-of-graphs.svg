<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to the Applications of Graphs topic. We'll explore how graph theory solves real-world problems in computer science and engineering.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Application of Graphs</text>
  </g>
  
  <!-- Step 1: Types of Graphs -->
  <g class="step" id="step1" data-narration="Graphs come in different types: Undirected graphs model symmetric relationships like friendships. Directed graphs handle asymmetric ones like web links. Weighted graphs carry costs or distances.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Types of Graphs</text>
    <rect x="40" y="88" width="220" height="42" fill="#fff" stroke="#1976d2" rx="3"/>
    <text x="50" y="102" font-family="Arial" font-size="10" fill="#333">Undirected: Social networks,</text>
    <text x="50" y="115" font-family="Arial" font-size="10" fill="#333">roads (bidirectional)</text>
    <rect x="270" y="88" width="220" height="42" fill="#fff" stroke="#1976d2" rx="3"/>
    <text x="280" y="102" font-family="Arial" font-size="10" fill="#333">Directed (Digraph): Web pages,</text>
    <text x="280" y="115" font-family="Arial" font-size="10" fill="#333">task dependencies</text>
    <rect x="500" y="88" width="260" height="42" fill="#fff" stroke="#1976d2" rx="3"/>
    <text x="510" y="102" font-family="Arial" font-size="10" fill="#333">Weighted: GPS routes, network</text>
    <text x="510" y="115" font-family="Arial" font-size="10" fill="#333">design with costs</text>
  </g>
  
  <!-- Step 2: Graph Representations -->
  <g class="step" id="step2" data-narration="We represent graphs using either adjacency matrices for dense graphs, taking O(V²) space, or adjacency lists for sparse graphs using O(V plus E) space.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Graph Representations</text>
    <rect x="40" y="176" width="340" height="42" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="50" y="190" font-family="Arial" font-size="10" fill="#333">Adjacency Matrix: 2D array, O(1) lookup,</text>
    <text x="50" y="203" font-family="Arial" font-size="10" fill="#333">O(V²) space - best for dense graphs</text>
    <rect x="390" y="176" width="370" height="42" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="400" y="190" font-family="Arial" font-size="10" fill="#333">Adjacency List: Neighbor lists, O(V+E) space,</text>
    <text x="400" y="203" font-family="Arial" font-size="10" fill="#333">efficient for sparse graphs like social networks</text>
  </g>
  
  <!-- Step 3: Traversal Algorithms -->
  <g class="step" id="step3" data-narration="BFS explores layer by layer using a queue, finding shortest paths in unweighted graphs. DFS goes deep using recursion or stack for cycle detection and topological sort.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Graph Traversal: BFS vs DFS</text>
    <rect x="40" y="264" width="340" height="42" fill="#fff" stroke="#ff9800" rx="3"/>
    <text x="50" y="278" font-family="Arial" font-size="10" fill="#333">BFS (Breadth-First): Queue-based,</text>
    <text x="50" y="291" font-family="Arial" font-size="10" fill="#333">shortest path in unweighted graphs</text>
    <rect x="390" y="264" width="370" height="42" fill="#fff" stroke="#ff9800" rx="3"/>
    <text x="400" y="278" font-family="Arial" font-size="10" fill="#333">DFS (Depth-First): Stack/recursion, explores</text>
    <text x="400" y="291" font-family="Arial" font-size="10" fill="#333">deep first - for cycles and topological sort</text>
  </g>
  
  <!-- Step 4: Important Algorithms -->
  <g class="step" id="step4" data-narration="Dijkstra finds shortest paths using a priority queue in O((V+E) log V) time. Minimum spanning trees connect all vertices with minimum cost using Kruskal or Prim.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Key Algorithms</text>
    <rect x="40" y="352" width="340" height="42" fill="#fff" stroke="#9c27b0" rx="3"/>
    <text x="50" y="366" font-family="Arial" font-size="10" fill="#333">Dijkstra: Shortest path, priority queue,</text>
    <text x="50" y="379" font-family="Arial" font-size="10" fill="#333">O((V+E) log V), powers GPS navigation</text>
    <rect x="390" y="352" width="370" height="42" fill="#fff" stroke="#9c27b0" rx="3"/>
    <text x="400" y="366" font-family="Arial" font-size="10" fill="#333">MST (Kruskal/Prim): Minimum cost network</text>
    <text x="400" y="379" font-family="Arial" font-size="10" fill="#333">design, O(E log V), for roads and telecom</text>
  </g>
  
  <!-- Step 5: Topological Sort -->
  <g class="step" id="step5" data-narration="Topological sort orders vertices in DAGs so dependencies come first. It schedules tasks, builds systems, and plans course prerequisites efficiently.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Topological Sorting</text>
    <rect x="40" y="440" width="720" height="42" fill="#fff" stroke="#f44336" rx="3"/>
    <text x="50" y="454" font-family="Arial" font-size="10" fill="#333">For DAGs only: Linear ordering where for every edge uv, u comes before v.</text>
    <text x="50" y="467" font-family="Arial" font-size="10" fill="#333">Applications: Task scheduling, build systems, course prerequisites planning.</text>
  </g>
  
  <!-- Step 6: Exam Tips -->
  <g class="step" id="step6" data-narration="For exams, remember: BFS for shortest path, DFS for depth. Dijkstra fails with negative weights. Use adjacency list for sparse graphs. Always verify DAG before topological sort.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Points</text>
    <rect x="40" y="528" width="230" height="52" fill="#fff" stroke="#1976d2" rx="3"/>
    <text x="50" y="542" font-family="Arial" font-size="9" fill="#333">• BFS = queue, shortest path</text>
    <text x="50" y="554" font-family="Arial" font-size="9" fill="#333">• DFS = stack/recursion, cycles</text>
    <text x="50" y="566" font-family="Arial" font-size="9" fill="#333">• Dijkstra needs non-negative weights</text>
    <rect x="280" y="528" width="230" height="52" fill="#fff" stroke="#1976d2" rx="3"/>
    <text x="290" y="542" font-family="Arial" font-size="9" fill="#333">• Matrix: O(V²), List: O(V+E)</text>
    <text x="290" y="554" font-family="Arial" font-size="9" fill="#333">• MST: Kruskal for sparse,</text>
    <text x="290" y="566" font-family="Arial" font-size="9" fill="#333">Prim for dense graphs</text>
    <rect x="520" y="528" width="240" height="52" fill="#fff" stroke="#1976d2" rx="3"/>
    <text x="530" y="542" font-family="Arial" font-size="9" fill="#333">• Topo sort needs DAG</text>
    <text x="530" y="554" font-family="Arial" font-size="9" fill="#333">• Draw graphs when solving</text>
    <text x="530" y="566" font-family="Arial" font-size="9" fill="#333">• Relate algorithms to real apps</text>
  </g>
</svg>