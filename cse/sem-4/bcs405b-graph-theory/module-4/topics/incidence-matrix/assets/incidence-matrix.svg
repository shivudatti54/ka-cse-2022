<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="The incidence matrix is an n by m matrix representing relationships between vertices and edges in a graph, showing which vertices connect to which edges.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Incidence Matrix - Graph Theory</text>
  </g>
  
  <g class="step" id="step1" data-narration="For undirected graph G with n vertices and m edges, entry Mij equals 1 if vertex vi is incident to edge ej, otherwise 0.">
    <rect x="20" y="58" width="760" height="85" fill="white" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Undirected Incidence Matrix Definition</text>
    <text x="40" y="98" font-family="Arial" font-size="10" fill="#333">For graph G=(V,E) with n vertices, m edges:</text>
    <text x="40" y="113" font-family="Arial" font-size="10" fill="#333">M[i,j] = 1 if vertex vi is incident to edge ej</text>
    <text x="40" y="128" font-family="Arial" font-size="10" fill="#333">M[i,j] = 0 otherwise</text>
    <rect x="500" y="75" width="260" height="55" fill="#e3f2fd" rx="3"/>
    <text x="510" y="92" font-family="Arial" font-size="9" fill="#1565c0">Example Graph:</text>
    <circle cx="545" cy="115" r="8" fill="none" stroke="#1976d2" stroke-width="2"/>
    <text x="545" y="119" font-family="Arial" font-size="8" fill="#1565c0" text-anchor="middle">v1</text>
    <circle cx="575" cy="115" r="8" fill="none" stroke="#1976d2" stroke-width="2"/>
    <text x="575" y="119" font-family="Arial" font-size="8" fill="#1565c0" text-anchor="middle">v2</text>
    <line x1="553" y1="115" x2="567" y2="115" stroke="#1976d2" stroke-width="2"/>
    <text x="610" y="118" font-family="Arial" font-size="8" fill="#333">e1=(v1,v2)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Each column sums to 2 because every undirected edge has exactly two endpoints. Each row sum equals the degree of that vertex.">
    <rect x="20" y="151" width="760" height="114" fill="white" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="173" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Key Properties - Undirected Graph</text>
    <rect x="40" y="190" width="340" height="35" fill="#e8f5e9" rx="3"/>
    <text x="50" y="205" font-family="Arial" font-size="10" fill="#2e7d32">Column Sum = 2</text>
    <text x="50" y="218" font-family="Arial" font-size="9" fill="#333">Each edge has two endpoints</text>
    <rect x="400" y="190" width="340" height="35" fill="#e8f5e9" rx="3"/>
    <text x="410" y="205" font-family="Arial" font-size="10" fill="#2e7d32">Row Sum = degree(vi)</text>
    <text x="410" y="218" font-family="Arial" font-size="9" fill="#333">Number of edges incident to vertex</text>
    <rect x="40" y="235" width="720" height="25" fill="#fff3e0" rx="3"/>
    <text x="50" y="252" font-family="Arial" font-size="9" fill="#e65100">Rank = n-1 for connected graph | Matrix is always singular (determinant = 0)</text>
  </g>
  
  <g class="step" id="step3" data-narration="For directed graphs, use signed incidence matrix: +1 at tail, -1 at head, 0 otherwise. Each column sum equals zero as required.">
    <rect x="20" y="273" width="760" height="85" fill="white" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="295" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Signed Incidence Matrix (Directed Graph)</text>
    <text x="40" y="313" font-family="Arial" font-size="10" fill="#333">M[i,j] = +1 if vi is tail (initial) of arc aj</text>
    <text x="40" y="327" font-family="Arial" font-size="10" fill="#333">M[i,j] = -1 if vi is head (terminal) of arc aj</text>
    <text x="40" y="341" font-family="Arial" font-size="10" fill="#333">M[i,j] = 0 otherwise</text>
    <rect x="400" y="287" width="360" height="60" fill="#fff3e0" rx="3"/>
    <text x="410" y="304" font-family="Arial" font-size="9" fill="#e65100">Example: v1→v2, v2→v3, v1→v3</text>
    <text x="420" y="321" font-family="Courier" font-size="9" fill="#333">v1:  1  0  1</text>
    <text x="420" y="334" font-family="Courier" font-size="9" fill="#333">v2: -1  1  0</text>
    <text x="520" y="321" font-family="Courier" font-size="9" fill="#333">v3:  0 -1 -1</text>
  </g>
  
  <g class="step" id="step4" data-narration="The Laplacian matrix L is computed as M times M transpose. Kirchhoff's famous matrix-tree theorem uses cofactors to count spanning trees in any graph.">
    <rect x="20" y="366" width="760" height="85" fill="white" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="388" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Properties - Directed Incidence Matrix</text>
    <rect x="40" y="404" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="50" y="419" font-family="Arial" font-size="10" fill="#6a1b9a">Column Sum = 0</text>
    <text x="50" y="432" font-family="Arial" font-size="9" fill="#333">One +1 and one -1 per column</text>
    <rect x="285" y="404" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="295" y="419" font-family="Arial" font-size="10" fill="#6a1b9a">Laplacian: L = M × Mᵀ</text>
    <text x="295" y="432" font-family="Arial" font-size="9" fill="#333">Fundamental in spectral graph theory</text>
    <rect x="530" y="404" width="230" height="35" fill="#f3e5f5" rx="3"/>
    <text x="540" y="419" font-family="Arial" font-size="10" fill="#6a1b9a">Rank = n - 1</text>
    <text x="540" y="432" font-family="Arial" font-size="9" fill="#333">For strongly connected directed graph</text>
  </g>
  
  <g class="step" id="step5" data-narration="To verify: sum each column equals 2 for undirected or 0 for directed. Row sums give vertex degrees. Practice constructing both matrix types carefully.">
    <rect x="20" y="459" width="760" height="90" fill="white" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="481" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Verification &amp; Exam Tips</text>
    <rect x="40" y="494" width="220" height="45" fill="#ffebee" rx="3"/>
    <text x="50" y="509" font-family="Arial" font-size="9" fill="#c62828">Check Your Matrix:</text>
    <text x="50" y="523" font-family="Arial" font-size="9" fill="#333">Column sums: 2 (undirected) or 0 (directed)</text>
    <text x="50" y="535" font-family="Arial" font-size="9" fill="#333">Row sums = degrees</text>
    <rect x="280" y="494" width="240" height="45" fill="#ffebee" rx="3"/>
    <text x="290" y="509" font-family="Arial" font-size="9" fill="#c62828">Common Mistakes:</text>
    <text x="290" y="523" font-family="Arial" font-size="9" fill="#333">Confusing with adjacency matrix</text>
    <text x="290" y="535" font-family="Arial" font-size="9" fill="#333">Wrong signs in directed graphs</text>
    <rect x="540" y="494" width="220" height="45" fill="#ffebee" rx="3"/>
    <text x="550" y="509" font-family="Arial" font-size="9" fill="#c62828">Applications:</text>
    <text x="550" y="523" font-family="Arial" font-size="9" fill="#333">Network flow, circuit theory KCL/KVL</text>
    <text x="550" y="535" font-family="Arial" font-size="9" fill="#333">Matrix-tree theorem for spanning trees</text>
  </g>
</svg>