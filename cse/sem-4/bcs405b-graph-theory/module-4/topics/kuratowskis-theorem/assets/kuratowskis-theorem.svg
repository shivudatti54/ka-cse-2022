<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Kuratowski's Theorem characterizes planar graphs using two forbidden subgraphs: K5 and K3,3.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Kuratowski's Theorem</text>
  </g>
  
  <!-- step1: Planar Graph Definition -->
  <g class="step" id="step1" data-narration="A planar graph can be drawn on a plane without edge crossings. Euler's formula is V minus E plus F equals 2 for connected planar graphs.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="8"/>
    <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Planar Graph</text>
    <text x="25" y="90" font-family="Arial" font-size="10" fill="#333">Drawn on plane without edges crossing. Euler: V - E + F = 2</text>
    <text x="25" y="105" font-family="Arial" font-size="10" fill="#333">Edge Bound: E ≤ 3V - 6 for simple planar graphs (V ≥ 3)</text>
  </g>
  
  <!-- step2: K5 Graph -->
  <g class="step" id="step2" data-narration="K5 is a complete graph with five vertices and ten edges. Every pair of vertices connects. It is non-planar and one of the two forbidden subgraphs.">
    <rect x="10" y="146" width="780" height="107" fill="#e8f5e9" rx="8"/>
    <text x="25" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">K5 - Complete Graph on 5 Vertices</text>
    <text x="25" y="178" font-family="Arial" font-size="10" fill="#333">5 vertices, 10 edges, every pair connected</text>
    <circle cx="150" cy="210" r="20" fill="none" stroke="#388e3c" stroke-width="2"/>
    <circle cx="220" cy="180" r="20" fill="none" stroke="#388e3c" stroke-width="2"/>
    <circle cx="220" cy="240" r="20" fill="none" stroke="#388e3c" stroke-width="2"/>
    <circle cx="290" cy="210" r="20" fill="none" stroke="#388e3c" stroke-width="2"/>
    <circle cx="185" cy="165" r="20" fill="none" stroke="#388e3c" stroke-width="2"/>
    <text x="300" y="210" font-family="Arial" font-size="10" fill="#d32f2f" font-weight="bold">NON-PLANAR</text>
  </g>
  
  <!-- step3: K3,3 Graph -->
  <g class="step" id="step3" data-narration="K3,3 is a complete bipartite graph with six vertices in two sets of three, fully connected across partitions. This is the second forbidden subgraph.">
    <rect x="10" y="261" width="780" height="144" fill="#fff3e0" rx="8"/>
    <text x="25" y="278" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">K3,3 - Complete Bipartite Graph</text>
    <text x="25" y="293" font-family="Arial" font-size="10" fill="#333">6 vertices (3+3), 9 edges, complete connections between partitions</text>
    <circle cx="150" cy="330" r="15" fill="none" stroke="#ff9800" stroke-width="2"/>
    <circle cx="150" cy="360" r="15" fill="none" stroke="#ff9800" stroke-width="2"/>
    <circle cx="150" cy="390" r="15" fill="none" stroke="#ff9800" stroke-width="2"/>
    <circle cx="250" cy="330" r="15" fill="none" stroke="#ff9800" stroke-width="2"/>
    <circle cx="250" cy="360" r="15" fill="none" stroke="#ff9800" stroke-width="2"/>
    <circle cx="250" cy="390" r="15" fill="none" stroke="#ff9800" stroke-width="2"/>
    <line x1="165" y1="330" x2="235" y2="330" stroke="#ff9800" stroke-width="1.5"/>
    <line x1="165" y1="360" x2="235" y2="360" stroke="#ff9800" stroke-width="1.5"/>
    <line x1="165" y1="390" x2="235" y2="390" stroke="#ff9800" stroke-width="1.5"/>
    <line x1="165" y1="330" x2="235" y2="390" stroke="#ff9800" stroke-width="1.5"/>
    <line x1="165" y1="390" x2="235" y2="330" stroke="#ff9800" stroke-width="1.5"/>
    <line x1="165" y1="360" x2="235" y2="360" stroke="#ff9800" stroke-width="1.5"/>
    <text x="300" y="360" font-family="Arial" font-size="10" fill="#d32f2f" font-weight="bold">NON-PLANAR</text>
  </g>
  
  <!-- step4: Subdivision -->
  <g class="step" id="step4" data-narration="A subdivision replaces an edge with a path through new vertices. Homeomorphic graphs share topological structure. Subdivisions of K5 or K3,3 remain non-planar.">
    <rect x="10" y="413" width="780" height="80" fill="#ffebee" rx="8"/>
    <text x="25" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Subdivision &amp; Homeomorphism</text>
    <text x="25" y="445" font-family="Arial" font-size="10" fill="#333">Subdivision: Replace edge (u,v) with path through new vertices</text>
    <text x="25" y="460" font-family="Arial" font-size="10" fill="#333">Preserves non-planarity: Even subdivided K5 or K3,3 makes graph non-planar</text>
  </g>
  
  <!-- step5: Theorem + Key Points -->
  <g class="step" id="step5" data-narration="Kuratowski's Theorem: A finite graph is planar if and only if it does not contain a subgraph that is a subdivision of K5 or K3,3.">
    <rect x="10" y="501" width="780" height="92" fill="#f3e5f5" rx="8"/>
    <text x="25" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Kuratowski's Theorem (Formal)</text>
    <text x="25" y="533" font-family="Arial" font-size="10" fill="#333">Graph is planar iff it does NOT contain a subdivision of K5 or K3,3</text>
    <rect x="25" y="546" width="350" height="10" fill="#e0e0e0" rx="2"/>
    <rect x="25" y="546" width="175" height="10" fill="#9c27b0" rx="2"/>
    <text x="25" y="580" font-family="Arial" font-size="10" fill="#1976d2" font-weight="bold">Key: K5(5V,10E) | K3,3(6V,9E) | E ≤ 3V - 6 | No subdivisions = Planar</text>
  </g>
</svg>