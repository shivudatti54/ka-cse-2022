<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers different ways to represent planar graphs, including geometric embeddings, combinatorial structures, and dual graphs with practical applications in circuit design.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Different Representations of Planar Graphs</text>
  </g>
  
  <g class="step" id="step1" data-narration="A planar graph can be drawn on a plane without edges crossing. The geometric representation shows vertices as points and edges as lines.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Geometric Representation (Embedding)</text>
    <line x1="80" y1="110" x2="120" y2="110" stroke="#1976d2" stroke-width="2"/>
    <circle cx="100" cy="95" r="8" fill="#1976d2"/>
    <circle cx="140" cy="110" r="8" fill="#1976d2"/>
    <circle cx="100" cy="125" r="8" fill="#1976d2"/>
    <text x="170" y="118" font-family="Arial" font-size="9" fill="#333">Vertices as points, edges as</text>
    <text x="170" y="130" font-family="Arial" font-size="9" fill="#333">lines without crossings</text>
  </g>
  
  <g class="step" id="step2" data-narration="Combinatorial representation uses adjacency lists or matrices plus specialized structures like half-edges to capture cyclic ordering around vertices for graph algorithms.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Combinatorial Representation</text>
    <rect x="40" y="180" width="150" height="35" fill="white" stroke="#388e3c"/>
    <text x="50" y="195" font-family="Arial" font-size="9" fill="#333">Adjacency List:</text>
    <text x="50" y="207" font-family="Arial" font-size="8" fill="#333">A: B, C, D</text>
    <text x="110" y="207" font-family="Arial" font-size="8" fill="#333">B: A, C</text>
    <rect x="210" y="180" width="180" height="35" fill="white" stroke="#388e3c"/>
    <text x="220" y="195" font-family="Arial" font-size="9" fill="#333">Adjacency Matrix:</text>
    <text x="220" y="207" font-family="Courier" font-size="7" fill="#333">[0 1 1 1]</text>
    <text x="280" y="207" font-family="Courier" font-size="7" fill="#333">[1 0 1 0]</text>
    <text x="410" y="180" width="150" height="35" fill="white" stroke="#388e3c"/>
    <text x="420" y="195" font-family="Arial" font-size="9" fill="#333">Half-edge Structure</text>
    <text x="420" y="207" font-family="Arial" font-size="8" fill="#333">Captures cyclic order</text>
  </g>
  
  <g class="step" id="step3" data-narration="The dual graph represents faces as vertices. Each face becomes a node, and adjacent faces connect by edges along original boundaries.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Dual Graph Representation</text>
    <circle cx="150" cy="280" r="20" fill="white" stroke="#ff9800" stroke-width="2"/>
    <text x="150" y="284" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">F1</text>
    <circle cx="200" cy="280" r="20" fill="white" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="284" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">F2</text>
    <circle cx="175" cy="260" r="15" fill="white" stroke="#ff9800" stroke-width="2"/>
    <text x="175" y="264" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">F3</text>
    <line x1="160" y1="275" x2="190" y2="275" stroke="#ff9800" stroke-width="2"/>
    <line x1="165" y1="270" x2="165" y2="248" stroke="#ff9800" stroke-width="2"/>
    <line x1="185" y1="270" x2="185" y2="248" stroke="#ff9800" stroke-width="2"/>
    <text x="280" y="265" font-family="Arial" font-size="9" fill="#333">Original faces become</text>
    <text x="280" y="277" font-family="Arial" font-size="9" fill="#333">vertices in dual</text>
    <text x="280" y="295" font-family="Arial" font-size="9" fill="#333">Dual of dual = original</text>
  </g>
  
  <g class="step" id="step4" data-narration="Euler's formula relates vertices, edges, and faces: n minus e plus f equals 2. This helps verify planarity and count elements.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Euler's Formula &amp; Properties</text>
    <rect x="40" y="355" width="200" height="40" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="140" y="375" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">n - e + f = 2</text>
    <text x="250" y="368" font-family="Arial" font-size="9" fill="#333">Edge Bounds:</text>
    <text x="250" y="382" font-family="Arial" font-size="8" fill="#333">e ≤ 3n - 6 (with triangles)</text>
    <text x="250" y="394" font-family="Arial" font-size="8" fill="#333">e ≤ 2n - 4 (triangle-free)</text>
    <rect x="420" y="355" width="200" height="40" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="520" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Min vertex degree ≤ 5</text>
    <text x="520" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">in any planar graph</text>
  </g>
  
  <g class="step" id="step5" data-narration="Kuratowski's theorem states a graph is planar if it has no subdivision of K5 or K33. These are the fundamental non-planar graphs.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Kuratowski's Theorem</text>
    <text x="50" y="450" font-family="Arial" font-size="9" fill="#333">Non-planar if contains subdivision of:</text>
    <rect x="180" y="438" width="120" height="45" fill="white" stroke="#f44336" rx="3"/>
    <text x="240" y="452" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">K5</text>
    <text x="240" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">5 vertices,</text>
    <text x="240" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">10 edges</text>
    <rect x="320" y="438" width="120" height="45" fill="white" stroke="#f44336" rx="3"/>
    <text x="380" y="452" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">K3,3</text>
    <text x="380" y="465" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">3+3 vertices,</text>
    <text x="380" y="476" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">9 edges</text>
    <text x="470" y="450" font-family="Arial" font-size="9" fill="#333">Planar families:</text>
    <text x="470" y="465" font-family="Arial" font-size="8" fill="#333">Trees, Cycles Cn,</text>
    <text x="470" y="477" font-family="Arial" font-size="8" fill="#333">Wheels Wn, K4</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key examples demonstrate how to verify planarity using Euler's formula, prove non-planarity through edge bounds, and identify planar graph families for practical engineering problems.">
    <rect x="20" y="498" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Examples &amp; Applications</text>
    <rect x="40" y="530" width="220" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="50" y="545" font-family="Arial" font-size="8" fill="#333">Example 1: n=8, e=12</text>
    <text x="50" y="558" font-family="Arial" font-size="8" fill="#333">8-12+f=2 → f=6 faces</text>
    <rect x="270" y="530" width="220" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="280" y="545" font-family="Arial" font-size="8" fill="#333">Example 2: K3,3 n=6, e=9</text>
    <text x="280" y="558" font-family="Arial" font-size="8" fill="#333">9 > 2(6)-4=8, non-planar</text>
    <rect x="500" y="530" width="220" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="510" y="545" font-family="Arial" font-size="8" fill="#333">Applications: Circuit design,</text>
    <text x="510" y="558" font-family="Arial" font-size="8" fill="#333">road networks, map coloring</text>
  </g>
</svg>