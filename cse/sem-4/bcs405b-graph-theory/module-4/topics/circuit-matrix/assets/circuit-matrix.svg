<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Circuit matrices represent graph topology for network analysis using linear algebra, enabling efficient solving of electrical circuit problems and network flow calculations.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Circuit Matrix Representations in Graph Theory</text>
  </g>
  
  <!-- step1: Incidence Matrix -->
  <g class="step" id="step1" data-narration="The incidence matrix A is n by m, where n is vertices and m is edges. Each column shows which vertices an edge connects.">
    <rect x="20" y="58" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">1. Incidence Matrix (A): n×m</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">A[i,j]=1 if vertex i incident to edge j | Directed: +1 leaves, -1 enters</text>
    <rect x="380" y="68" width="380" height="60" fill="white" stroke="#ccc"/>
    <text x="520" y="82" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e1  e2  e3  e4  e5</text>
    <text x="390" y="95" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">v1</text>
    <text x="390" y="108" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">v2</text>
    <text x="390" y="121" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">v3</text>
    <text x="435" y="95" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="470" y="95" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="505" y="95" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="540" y="95" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="575" y="95" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="435" y="108" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="470" y="108" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="505" y="108" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="540" y="108" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="575" y="108" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="435" y="121" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="470" y="121" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
  </g>
  
  <!-- step2: Graph Visualization -->
  <g class="step" id="step2" data-narration="This graph has four vertices and five edges forming a cycle with a diagonal. The diagonal creates one fundamental circuit.">
    <rect x="20" y="146" width="760" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Example Graph: 4 vertices, 5 edges</text>
    <circle cx="200" cy="200" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="200" y="204" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1</text>
    <circle cx="280" cy="200" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="280" y="204" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2</text>
    <circle cx="280" cy="140" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="280" y="144" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">3</text>
    <circle cx="200" cy="140" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="200" y="144" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">4</text>
    <line x1="212" y1="195" x2="268" y2="145" stroke="#333" stroke-width="1.5"/>
    <line x1="212" y1="145" x2="268" y2="195" stroke="#333" stroke-width="1.5"/>
    <line x1="188" y1="195" x2="188" y2="152" stroke="#333" stroke-width="1.5"/>
    <line x1="268" y1="195" x2="268" y2="152" stroke="#333" stroke-width="1.5"/>
    <line x1="212" y1="195" x2="268" y2="195" stroke="#333" stroke-width="1.5"/>
    <text x="250" y="168" font-family="Arial" font-size="8" fill="#666">e5</text>
    <text x="250" y="185" font-family="Arial" font-size="8" fill="#666">e1</text>
    <text x="185" y="175" font-family="Arial" font-size="8" fill="#666">e4</text>
    <text x="285" y="175" font-family="Arial" font-size="8" fill="#666">e2</text>
    <text x="235" y="205" font-family="Arial" font-size="8" fill="#666">e3</text>
    <text x="400" y="180" font-family="Arial" font-size="10" fill="#333">Spanning Tree T = {e1, e2, e3, e4}</text>
    <text x="400" y="195" font-family="Arial" font-size="10" fill="#333">Chord: e5 (creates fundamental circuit)</text>
    <text x="400" y="210" font-family="Arial" font-size="9" fill="#666">Cyclomatic number = 5-4+1 = 1</text>
  </g>
  
  <!-- step3: Circuit Matrix -->
  <g class="step" id="step3" data-narration="The circuit matrix B is m by c, where each column represents one circuit. Entry B(i,j) equals 1 if edge i is in circuit j.">
    <rect x="20" y="234" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">2. Circuit Matrix (B): m×c</text>
    <text x="40" y="271" font-family="Arial" font-size="10" fill="#333">B[i,j] = 1 if edge i belongs to circuit j, else 0</text>
    <rect x="380" y="244" width="200" height="60" fill="white" stroke="#ccc"/>
    <text x="480" y="258" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">C1  C2  C3</text>
    <text x="390" y="272" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e1</text>
    <text x="390" y="285" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e2</text>
    <text x="390" y="298" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e3</text>
    <text x="430" y="272" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="470" y="272" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="510" y="272" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="430" y="285" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="470" y="285" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="510" y="285" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="430" y="298" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="470" y="298" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="510" y="298" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="620" y="275" font-family="Arial" font-size="9" fill="#666">Each column = one circuit</text>
  </g>
  
  <!-- step4: Fundamental Circuit Matrix -->
  <g class="step" id="step4" data-narration="The fundamental circuit matrix Bf uses a spanning tree. Adding chord e5 to tree edges creates one fundamental circuit: e1-e2-e5.">
    <rect x="20" y="322" width="760" height="97" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">3. Fundamental Circuit Matrix (Bf): m×(m-n+1)</text>
    <text x="40" y="359" font-family="Arial" font-size="10" fill="#333">With T={e1,e2,e3,e4}, chord e5 creates circuit: e5+e1+e2</text>
    <rect x="280" y="332" width="200" height="75" fill="white" stroke="#ccc"/>
    <text x="380" y="346" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">C1</text>
    <text x="290" y="360" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e1</text>
    <text x="330" y="360" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="290" y="373" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e2</text>
    <text x="330" y="373" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="370" y="373" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="290" y="386" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e3</text>
    <text x="330" y="386" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="370" y="386" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="290" y="399" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e4</text>
    <text x="330" y="399" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">0</text>
    <text x="370" y="399" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="290" y="412" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">e5</text>
    <text x="330" y="412" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">1</text>
    <text x="520" y="370" font-family="Arial" font-size="9" fill="#666">Tree: e1-e4 | Chord: e5</text>
  </g>
  
  <!-- step5: Cut-Set Matrix -->
  <g class="step" id="step5" data-narration="A cut-set is minimal edges whose removal disconnects the graph. Each tree edge defines a fundamental cut-set with the chord.">
    <rect x="20" y="428" width="760" height="100" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="448" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">4. Fundamental Cut-Set Matrix (Qf): m×(n-1)</text>
    <text x="40" y="465" font-family="Arial" font-size="10" fill="#333">Each tree edge forms cut-set: Q1={e1,e5}, Q2={e2,e5}, Q3={e3,e5}, Q4={e4,e5}</text>
    <rect x="280" y="445" width="250" height="70" fill="white" stroke="#ccc"/>
    <text x="350" y="459" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">Q1  Q2  Q3  Q4</text>
    <text x="290" y="472" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">e1</text>
    <text x="330" y="472" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">1</text>
    <text x="370" y="472" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="410" y="472" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="450" y="472" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="290" y="485" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">e2</text>
    <text x="330" y="485" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="370" y="485" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">1</text>
    <text x="410" y="485" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="450" y="485" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="290" y="498" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">e3</text>
    <text x="330" y="498" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="370" y="498" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="410" y="498" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">1</text>
    <text x="450" y="498" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="290" y="511" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">e4</text>
    <text x="330" y="511" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="370" y="511" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="410" y="511" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">0</text>
    <text x="450" y="511" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">1</text>
    <text x="290" y="524" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">e5</text>
    <text x="330" y="524" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">1</text>
    <text x="370" y="524" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">1</text>
    <text x="410" y="524" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">1</text>
    <text x="450" y="524" text-anchor="middle" font-family="Courier" font-size="8" fill="#333">1</text>
  </g>
  
  <!-- step6: Relationships and Summary -->
  <g class="step" id="step6" data-narration="Key relationship: Bf times Qf-transpose equals zero. For planar graphs, circuit matrix of G equals cut-set matrix of dual graph.">
    <rect x="20" y="536" width="760" height="60" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="40" y="556" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">5. Key Relationships</text>
    <text x="40" y="573" font-family="Arial" font-size="10" fill="#333">Orthogonality: Bf × Qf^T = 0 | Cyclomatic: m-n+k | Rank(A)=n-1 | Planar Duality: circuits(G)=cutsets(G*)</text>
    <text x="40" y="588" font-family="Arial" font-size="9" fill="#666">Tree edges: (n-1) cut-sets | Chords: (m-n+1) fundamental circuits</text>
  </g>
</svg>