<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about Geometric Dual of Graphs, a fundamental concept in planar graph theory that maps faces to vertices and edges to edges.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Geometric Dual of Graphs</text>
  </g>
  
  <g class="step" id="step1" data-narration="A planar graph can be drawn without edge crossings. It divides the plane into regions called faces, including one unbounded exterior face.">
    <rect x="20" y="58" width="760" height="95" fill="#e8f5e9" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Planar Graph and Faces</text>
    <rect x="40" y="95" width="200" height="45" fill="white" stroke="#388e3c" stroke-width="1"/>
    <polygon points="140,110 170,130 110,130" fill="none" stroke="#388e3c" stroke-width="2"/>
    <circle cx="140" cy="125" r="3" fill="#388e3c"/>
    <text x="180" y="115" font-family="Arial" font-size="10" fill="#388e3c">3 vertices</text>
    <text x="180" y="128" font-family="Arial" font-size="10" fill="#388e3c">3 edges</text>
    <text x="280" y="80" font-family="Arial" font-size="11" fill="#2e7d32">Faces:</text>
    <rect x="280" y="95" width="220" height="45" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="290" y="112" font-family="Arial" font-size="10" fill="#2e7d32">f₁: Interior face (bounded)</text>
    <text x="290" y="127" font-family="Arial" font-size="10" fill="#2e7d32">f₂: Exterior face (unbounded)</text>
    <text x="520" y="112" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Euler's Formula:</text>
    <text x="520" y="128" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">f = m - n + 2</text>
  </g>
  
  <g class="step" id="step2" data-narration="To construct the geometric dual, place one vertex in each face of G. Connect two vertices in G* if their faces share an edge.">
    <rect x="20" y="162" width="760" height="100" fill="#fff3e0" rx="5"/>
    <text x="40" y="185" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Definition of Geometric Dual</text>
    <text x="40" y="205" font-family="Arial" font-size="11" fill="#e65100">Given connected planar graph G with fixed embedding:</text>
    <rect x="40" y="215" width="340" height="35" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="230" font-family="Arial" font-size="10" fill="#e65100">1. Place one vertex in each face of G (including exterior)</text>
    <text x="50" y="243" font-family="Arial" font-size="10" fill="#e65100">2. Connect vertices if faces share a common edge</text>
    <text x="420" y="205" font-family="Arial" font-size="11" fill="#e65100">Notation: G* (G-star) is the geometric dual of G</text>
    <rect x="420" y="218" width="340" height="32" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="430" y="232" font-family="Arial" font-size="10" fill="#e65100">Edges on exterior face create loops in dual</text>
    <text x="430" y="245" font-family="Arial" font-size="10" fill="#e65100">Multiple shared edges create parallel edges</text>
  </g>
  
  <g class="step" id="step3" data-narration="The dual preserves vertex-face counts: vertices of G* equal faces of G, and faces of G* equal vertices of G.">
    <rect x="20" y="270" width="760" height="100" fill="#e3f2fd" rx="5"/>
    <text x="40" y="293" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Key Properties</text>
    <rect x="40" y="310" width="160" height="50" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="328" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Vertex-Face</text>
    <text x="50" y="342" font-family="Arial" font-size="10" fill="#1565c0">|V(G*)| = f (faces of G)</text>
    <text x="50" y="355" font-family="Arial" font-size="10" fill="#1565c0">|F(G*)| = n (vertices of G)</text>
    <rect x="210" y="310" width="160" height="50" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="328" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Edge Preservation</text>
    <text x="220" y="342" font-family="Arial" font-size="10" fill="#1565c0">|E(G*)| = |E(G)|</text>
    <text x="220" y="355" font-family="Arial" font-size="10" fill="#1565c0">1 edge in G → 1 edge in G*</text>
    <rect x="380" y="310" width="180" height="50" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="390" y="328" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Degree Relationship</text>
    <text x="390" y="342" font-family="Arial" font-size="10" fill="#1565c0">deg*(v*) = edges around</text>
    <text x="390" y="355" font-family="Arial" font-size="10" fill="#1565c0">corresponding face in G</text>
    <rect x="570" y="310" width="190" height="50" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="580" y="328" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Cycle-Cutset Duality</text>
    <text x="580" y="342" font-family="Arial" font-size="10" fill="#1565c0">Cycle in G → Cutset in G*</text>
    <text x="580" y="355" font-family="Arial" font-size="10" fill="#1565c0">Cutset in G → Cycle in G*</text>
  </g>
  
  <g class="step" id="step4" data-narration="Let us look at a concrete example: The triangle graph K3 has 2 faces. Its geometric dual G* has 2 vertices connected by 3 parallel edges, forming a multigraph.">
    <rect x="20" y="378" width="760" height="100" fill="#f3e5f5" rx="5"/>
    <text x="40" y="400" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Example 1: Dual of Triangle (K3)</text>
    <rect x="40" y="415" width="160" height="55" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <polygon points="120,435 100,460 140,460" fill="none" stroke="#9c27b0" stroke-width="2"/>
    <circle cx="100" cy="460" r="3" fill="#9c27b0"/>
    <circle cx="140" cy="460" r="3" fill="#9c27b0"/>
    <circle cx="120" cy="435" r="3" fill="#9c27b0"/>
    <text x="170" y="435" font-family="Arial" font-size="10" fill="#7b1fa2">Original G</text>
    <text x="170" y="450" font-family="Arial" font-size="9" fill="#7b1fa2">3 vertices, 3 edges</text>
    <text x="170" y="462" font-family="Arial" font-size="9" fill="#7b1fa2">2 faces (interior, exterior)</text>
    <path d="M 220 442 Q 240 425 260 442 Q 240 460 220 442" fill="none" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="280" y="415" width="160" height="55" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <circle cx="330" cy="435" r="12" fill="#ce93d8" stroke="#9c27b0" stroke-width="2"/>
    <circle cx="390" cy="435" r="12" fill="#ce93d8" stroke="#9c27b0" stroke-width="2"/>
    <path d="M 345 435 Q 360 420 375 435" fill="none" stroke="#9c27b0" stroke-width="2"/>
    <path d="M 345 440 Q 360 435 375 440" fill="none" stroke="#9c27b0" stroke-width="2"/>
    <path d="M 345 445 Q 360 450 375 445" fill="none" stroke="#9c27b0" stroke-width="2"/>
    <text x="320" y="465" font-family="Arial" font-size="10" fill="#7b1fa2">Dual G*</text>
    <text x="320" y="477" font-family="Arial" font-size="9" fill="#7b1fa2">2 vertices, 3 parallel edges</text>
    <text x="480" y="420" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2">Result:</text>
    <text x="480" y="438" font-family="Arial" font-size="10" fill="#7b1fa2">Dual of K3 is a multigraph</text>
    <text x="480" y="455" font-family="Arial" font-size="10" fill="#7b1fa2">with 2 vertices and 3 edges</text>
    <text x="480" y="470" font-family="Arial" font-size="10" fill="#7b1fa2">between them</text>
  </g>
  
  <g class="step" id="step5" data-narration="Wheel graphs Wn for n≥4 are self-dual. The dual of cycle Cn is another cycle Cn. These are important exam results.">
    <rect x="20" y="486" width="760" height="100" fill="#ffebee" rx="5"/>
    <text x="40" y="508" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Examples 2 &amp; 3: More Duals</text>
    <rect x="40" y="523" width="220" height="55" fill="white" stroke="#f44336" stroke-width="1"/>
    <circle cx="100" cy="550" r="20" fill="none" stroke="#f44336" stroke-width="2"/>
    <circle cx="100" cy="550" r="4" fill="#f44336"/>
    <line x1="100" y1="550" x2="80" y2="535" stroke="#f44336" stroke-width="1.5"/>
    <line x1="100" y1="550" x2="120" y2="535" stroke="#f44336" stroke-width="1.5"/>
    <line x1="100" y1="550" x2="80" y2="565" stroke="#f44336" stroke-width="1.5"/>
    <line x1="100" y1="550" x2="120" y2="565" stroke="#f44336" stroke-width="1.5"/>
    <text x="130" y="545" font-family="Arial" font-size="10" fill="#c62828">C₄ (square)</text>
    <text x="130" y="560" font-family="Arial" font-size="9" fill="#c62828">with diagonal → C₃</text>
    <text x="130" y="572" font-family="Arial" font-size="9" fill="#c62828">(triangle dual)</text>
    <rect x="280" y="523" width="180" height="55" fill="white" stroke="#f44336" stroke-width="1"/>
    <circle cx="340" cy="545" r="15" fill="none" stroke="#f44336" stroke-width="2"/>
    <circle cx="340" cy="545" r="3" fill="#f44336"/>
    <line x1="340" y1="545" x2="325" y2="535" stroke="#f44336" stroke-width="1.5"/>
    <line x1="340" y1="545" x2="355" y2="535" stroke="#f44336" stroke-width="1.5"/>
    <line x1="340" y1="545" x2="325" y2="562" stroke="#f44336" stroke-width="1.5"/>
    <line x1="340" y1="545" x2="355" y2="562" stroke="#f44336" stroke-width="1.5"/>
    <text x="370" y="545" font-family="Arial" font-size="10" fill="#c62828">Wheel W₄</text>
    <text x="370" y="560" font-family="Arial" font-size="9" fill="#c62828">Self-dual!</text>
    <text x="370" y="572" font-family="Arial" font-size="9" fill="#c62828">(Wₙ for n≥4)</text>
    <rect x="480" y="523" width="280" height="55" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="490" y="540" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Exam Tips:</text>
    <text x="490" y="556" font-family="Arial" font-size="9" fill="#c62828">• Always include exterior face in dual construction</text>
    <text x="490" y="570" font-family="Arial" font-size="9" fill="#c62828">• Verify: |E(G*)| = |E(G)| and deg*(v*) = edges around face</text>
  </g>
</svg>