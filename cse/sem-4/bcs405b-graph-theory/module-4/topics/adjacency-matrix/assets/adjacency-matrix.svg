<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to learning about Adjacency Matrix representation, a fundamental way to represent graphs using a two-dimensional array for efficient edge operations.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" fill="white" font-weight="bold">Adjacency Matrix Representation of Graphs</text>
  </g>
  
  <g class="step" id="step1" data-narration="An adjacency matrix A is n by n where A[i][j] equals 1 if an edge exists between vertices i and j, otherwise 0.">
    <rect x="20" y="58" width="760" height="93" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="14" fill="#1976d2" font-weight="bold">Definition: Adjacency Matrix</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">For a graph with n vertices, create an n×n matrix A where:</text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#333">A[i][j] = 1 if edge (vi, vj) exists; otherwise A[i][j] = 0</text>
    <rect x="280" y="88" width="220" height="40" fill="white" stroke="#1976d2" rx="4"/>
    <text x="390" y="108" text-anchor="middle" font-family="Courier" font-size="11" fill="#333">Example: 3×3 Matrix</text>
    <text x="390" y="122" text-anchor="middle" font-family="Courier" font-size="10" fill="#1976d2">0 1 1</text>
    <text x="390" y="133" text-anchor="middle" font-family="Courier" font-size="10" fill="#1976d2">1 0 0</text>
    <text x="390" y="144" text-anchor="middle" font-family="Courier" font-size="10" fill="#1976d2">1 0 0</text>
  </g>
  
  <g class="step" id="step2" data-narration="For undirected graphs, the matrix is symmetric: A[i][j] always equals A[j][i]. Let us build a matrix for vertices 1 to 5 with edges.">
    <rect x="20" y="159" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" rx="8"/>
    <text x="40" y="181" font-family="Arial" font-size="14" fill="#388e3c" font-weight="bold">Undirected Graph: Symmetric Property</text>
    <text x="40" y="201" font-family="Arial" font-size="11" fill="#333">Edges: (1,2), (1,4), (2,3), (2,5), (3,4), (4,5)</text>
    <text x="40" y="219" font-family="Arial" font-size="11" fill="#333">Set both A[u][v] = A[v][u] = 1 for each edge</text>
    <rect x="320" y="171" width="280" height="60" fill="white" stroke="#388e3c" rx="4"/>
    <text x="380" y="188" font-family="Arial" font-size="10" fill="#666">1</text>
    <text x="380" y="203" font-family="Arial" font-size="10" fill="#666">2</text>
    <text x="380" y="218" font-family="Arial" font-size="10" fill="#666">3</text>
    <text x="400" y="188" font-family="Courier" font-size="9" fill="#333">0 1 0 1 0</text>
    <text x="400" y="203" font-family="Courier" font-size="9" fill="#333">1 0 1 0 1</text>
    <text x="400" y="218" font-family="Courier" font-size="9" fill="#333">0 1 0 1 0</text>
    <text x="460" y="188" font-family="Courier" font-size="9" fill="#333">1 0 1 0 1</text>
    <text x="460" y="203" font-family="Courier" font-size="9" fill="#333">0 1 0 1 0</text>
  </g>
  
  <g class="step" id="step3" data-narration="In directed graphs, row sum gives outdegree while column sum gives indegree. The matrix is typically asymmetric with directed edges.">
    <rect x="20" y="247" width="760" height="80" fill="#fff3e0" stroke="#ff9800" rx="8"/>
    <text x="40" y="269" font-family="Arial" font-size="14" fill="#ff9800" font-weight="bold">Directed Graph: Row and Column Sums</text>
    <text x="40" y="289" font-family="Arial" font-size="11" fill="#333">Edges: A→B, A→C, B→D, C→D, D→A</text>
    <rect x="240" y="259" width="280" height="60" fill="white" stroke="#ff9800" rx="4"/>
    <text x="290" y="277" font-family="Arial" font-size="9" fill="#666">A B C D</text>
    <text x="290" y="291" font-family="Arial" font-size="9" fill="#666">A</text>
    <text x="290" y="305" font-family="Arial" font-size="9" fill="#666">B</text>
    <text x="315" y="291" font-family="Courier" font-size="9" fill="#333">0 1 1 0</text>
    <text x="315" y="305" font-family="Courier" font-size="9" fill="#333">0 0 0 1</text>
    <text x="355" y="291" font-family="Arial" font-size="9" fill="#666">Outdegree(A) = 2</text>
    <text x="355" y="305" font-family="Arial" font-size="9" fill="#666">Indegree(D) = 2</text>
  </g>
  
  <g class="step" id="step4" data-narration="Matrix powers reveal path information. Entry A squared bracket i j counts walks of length 2 between vertices i and j.">
    <rect x="20" y="335" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" rx="8"/>
    <text x="40" y="357" font-family="Arial" font-size="14" fill="#9c27b0" font-weight="bold">Matrix Powers for Path Counting</text>
    <text x="40" y="377" font-family="Arial" font-size="11" fill="#333">Using A²[i][j] = number of walks of length 2 from vertex i to j</text>
    <text x="40" y="395" font-family="Arial" font-size="11" fill="#333">For our undirected graph, A²[1][3] = 1×1 + 1×1 = 2 paths</text>
    <rect x="320" y="347" width="260" height="60" fill="white" stroke="#9c27b0" rx="4"/>
    <text x="380" y="368" font-family="Arial" font-size="10" fill="#666">Path 1: 1 → 2 → 3</text>
    <text x="380" y="385" font-family="Arial" font-size="10" fill="#666">Path 2: 1 → 4 → 3</text>
    <text x="380" y="402" font-family="Arial" font-size="10" fill="#9c27b0" font-weight="bold">A²[1][3] = 2</text>
  </g>
  
  <g class="step" id="step5" data-narration="Adjacency matrix offers O(1) edge lookup but uses O(V squared) space. Adjacency list uses O(V plus E) space for sparse graphs.">
    <rect x="20" y="423" width="760" height="80" fill="#ffebee" stroke="#f44336" rx="8"/>
    <text x="40" y="445" font-family="Arial" font-size="14" fill="#f44336" font-weight="bold">Time and Space Complexity Comparison</text>
    <rect x="40" y="461" width="340" height="35" fill="white" stroke="#f44336" rx="4"/>
    <text x="50" y="477" font-family="Arial" font-size="10" fill="#333">Operation</text>
    <text x="130" y="477" font-family="Arial" font-size="10" fill="#333">Adjacency Matrix</text>
    <text x="240" y="477" font-family="Arial" font-size="10" fill="#333">Adjacency List</text>
    <text x="50" y="491" font-family="Arial" font-size="9" fill="#666">Edge lookup</text>
    <text x="140" y="491" font-family="Arial" font-size="9" fill="#388e3c">O(1)</text>
    <text x="250" y="491" font-family="Arial" font-size="9" fill="#666">O(degree)</text>
    <rect x="400" y="461" width="340" height="35" fill="white" stroke="#f44336" rx="4"/>
    <text x="410" y="477" font-family="Arial" font-size="10" fill="#333">Space (sparse graph)</text>
    <text x="450" y="491" font-family="Arial" font-size="9" fill="#f44336">O(V²) - wasteful</text>
    <text x="560" y="491" font-family="Arial" font-size="9" fill="#388e3c">O(V + E) - efficient</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key takeaways: matrix is symmetric for undirected graphs, row sums give degrees, powers count paths. Use matrix for dense graphs, list for sparse.">
    <rect x="20" y="511" width="760" height="79" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="40" y="533" font-family="Arial" font-size="14" fill="#1976d2" font-weight="bold">Summary: Key Points to Remember</text>
    <text x="40" y="555" font-family="Arial" font-size="10" fill="#333">• Undirected = symmetric matrix | Directed = asymmetric matrix</text>
    <text x="40" y="571" font-family="Arial" font-size="10" fill="#333">• Row sum = outdegree (directed) or degree (undirected) | Column sum = indegree</text>
    <text x="40" y="587" font-family="Arial" font-size="10" fill="#333">• Diagonal is zero for simple graphs (no self-loops) | A²[i][j] counts 2-length paths</text>
  </g>
</svg>