<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic covers planar graphs, Euler's formula, Kuratowski's theorem, and the Four Color Theorem, essential for  exams in graph theory.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">PLANAR GRAPHS</text>
  </g>
  
  <g class="step" id="step1" data-narration="A planar graph can be drawn on a plane without edge crossings. The regions bounded by edges are called faces, including the outer face.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Definition of Planar Graph</text>
    <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">A graph G=(V,E) is planar if it can be drawn on a plane without</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">edge crossings. Such a drawing is called a plane graph or planar embedding.</text>
    <text x="40" y="128" font-family="Arial" font-size="10" fill="#333">Regions bounded by edges are called faces. The unbounded region is the outer face.</text>
  </g>
  
  <g class="step" id="step2" data-narration="Euler's formula states v - e + f = 2 for connected planar graphs. For graphs with k components, it becomes v - e + f = k + 1.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Euler's Formula</text>
    <text x="40" y="184" font-family="Arial" font-size="11" fill="#333">For any connected planar graph: <tspan font-weight="bold">v - e + f = 2</tspan></text>
    <text x="40" y="202" font-family="Arial" font-size="10" fill="#333">where v = vertices, e = edges, f = faces</text>
    <text x="40" y="220" font-family="Arial" font-size="10" fill="#333">For k connected components: v - e + f = k + 1</text>
    <circle cx="700" cy="186" r="25" fill="#388e3c"/>
    <text x="700" y="192" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">v-e+f=2</text>
  </g>
  
  <g class="step" id="step3" data-narration="From Euler's formula derive: e ≤ 3v - 6 for simple planar graphs. For triangle-free graphs: e ≤ 2v - 4. Every planar graph has a vertex of degree at most 5.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Important Corollaries</text>
    <text x="40" y="272" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Corollary 1:</tspan> For simple connected planar graph with v ≥ 3:</text>
    <text x="55" y="288" font-family="Arial" font-size="10" fill="#333">• e ≤ 3v - 6</text>
    <text x="55" y="302" font-family="Arial" font-size="10" fill="#333">• If triangle-free: e ≤ 2v - 4</text>
    <text x="320" y="272" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Corollary 2:</tspan> Every planar graph has a vertex</text>
    <text x="335" y="288" font-family="Arial" font-size="10" fill="#333">of degree at most 5</text>
    <rect x="500" y="260" width="260" height="45" fill="#ff9800" rx="5"/>
    <text x="630" y="282" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">Key Exam Formula</text>
    <text x="630" y="298" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">e ≤ 3v - 6</text>
  </g>
  
  <g class="step" id="step4" data-narration="Kuratowski's theorem: A graph is non-planar if and only if it contains a subdivision of K5 (complete graph on 5 vertices) or K3,3 (bipartite graph).">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Kuratowski's Theorem</text>
    <text x="40" y="360" font-family="Arial" font-size="10" fill="#333">A graph is non-planar iff it contains a subdivision (homeomorphic copy) of:</text>
    <rect x="40" y="370" width="160" height="25" fill="#9c27b0" rx="4"/>
    <text x="120" y="387" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">K5 (Complete)</text>
    <rect x="220" y="370" width="160" height="25" fill="#9c27b0" rx="4"/>
    <text x="300" y="387" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">K3,3 (Bipartite)</text>
    <text x="420" y="360" font-family="Arial" font-size="10" fill="#333">K5: 5 vertices, 10 edges</text>
    <text x="420" y="378" font-family="Arial" font-size="10" fill="#333">K3,3: 3+3 vertices, 9 edges</text>
    <text x="420" y="396" font-family="Arial" font-size="10" fill="#333">Violates e ≤ 3v-6 inequality</text>
    <line x1="70" y1="320" x2="70" y2="330" stroke="#9c27b0" stroke-width="2"/>
    <line x1="230" y1="320" x2="230" y2="330" stroke="#9c27b0" stroke-width="2"/>
  </g>
  
  <g class="step" id="step5" data-narration="The Four Color Theorem states any planar graph can be colored with at most 4 colors. Dual graphs have vertices representing faces of the original graph.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="8"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Four Color Theorem &amp; Dual Graphs</text>
    <rect x="40" y="442" width="200" height="40" fill="#f44336" rx="6"/>
    <text x="140" y="462" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Four Color Theorem</text>
    <text x="140" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Any planar graph needs ≤ 4 colors</text>
    <text x="260" y="455" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Dual Graph G*:</tspan></text>
    <text x="275" y="472" font-family="Arial" font-size="10" fill="#333">• Vertex in each face of G</text>
    <text x="275" y="486" font-family="Arial" font-size="10" fill="#333">• Edge connects adjacent face vertices</text>
    <text x="450" y="455" font-family="Arial" font-size="10" fill="#333"><tspan font-weight="bold">Homeomorphism:</tspan></text>
    <text x="465" y="472" font-family="Arial" font-size="10" fill="#333">Adding/removing degree-2</text>
    <text x="465" y="486" font-family="Arial" font-size="10" fill="#333">vertices preserves planarity</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: A graph with v=6, e=12 has f = 2 + 12 - 6 = 8 faces. Maximum edges for triangle-free planar graph with v=8 is 12.">
    <rect x="20" y="498" width="760" height="99" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Exam Examples</text>
    <rect x="40" y="530" width="330" height="50" fill="#1976d2" rx="5"/>
    <text x="205" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Example 1: Find faces</text>
    <text x="205" y="562" text-anchor="middle" font-family="Arial" font-size="9" fill="white">v=6, e=12 → f = 2 + 12 - 6 = <tspan font-weight="bold">8 faces</tspan></text>
    <rect x="390" y="530" width="370" height="50" fill="#388e3c" rx="5"/>
    <text x="575" y="548" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Example 2: Max edges (triangle-free)</text>
    <text x="575" y="562" text-anchor="middle" font-family="Arial" font-size="9" fill="white">v=8 → Max e = 2(8) - 4 = <tspan font-weight="bold">12 edges</tspan></text>
    <text x="40" y="590" font-family="Arial" font-size="9" fill="#666"> Tip: Memorize v-e+f=2, e≤3v-6, and K5,K3,3 as minimal non-planar graphs</text>
  </g>
</svg>