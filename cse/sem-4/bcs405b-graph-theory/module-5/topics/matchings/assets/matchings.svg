<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Matchings in graphs is a fundamental concept where we pair vertices with edges without sharing vertices. This topic covers definitions, types, and important theorems.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Matchings in Graphs</text>
  </g>
  
  <g class="step" id="step1" data-narration="A matching M is a set of edges where no two edges share a vertex. Matched vertices are incident to matching edges; unmatched vertices are free vertices.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Definition of Matching</text>
    <rect x="40" y="95" width="60" height="35" fill="none" stroke="#1976d2" stroke-width="2" rx="3"/>
    <text x="70" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">A</text>
    <text x="70" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">B</text>
    <line x1="70" y1="108" x2="70" y2="118" stroke="#1976d2" stroke-width="2"/>
    <circle cx="50" cy="100" r="4" fill="#388e3c"/>
    <circle cx="90" cy="100" r="4" fill="#388e3c"/>
    <circle cx="50" cy="130" r="4" fill="#f44336"/>
    <circle cx="90" cy="130" r="4" fill="#f44336"/>
    <line x1="50" y1="100" x2="90" y2="130" stroke="#388e3c" stroke-width="2"/>
    <text x="120" y="105" font-family="Arial" font-size="9" fill="#333">M = {AB} is valid</text>
    <text x="120" y="120" font-family="Arial" font-size="9" fill="#333">Green = matched, Red = free</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three types: Maximal cannot add edges, Maximum has most edges, Perfect matches all vertices. Every maximum is maximal but not vice versa.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Types of Matchings</text>
    <rect x="40" y="185" width="220" height="35" fill="#e8f5e9" rx="3"/>
    <text x="150" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Maximal</text>
    <text x="150" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Cannot add more edges</text>
    <rect x="290" y="185" width="220" height="35" fill="#fff3e0" rx="3"/>
    <text x="400" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">Maximum</text>
    <text x="400" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Maximum size ν(G)</text>
    <rect x="540" y="185" width="220" height="35" fill="#f3e5f5" rx="3"/>
    <text x="650" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Perfect</text>
    <text x="650" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">All |V|/2 vertices matched</text>
  </g>
  
  <g class="step" id="step3" data-narration="In bipartite graphs, vertices split into two sets X and Y with edges only between sets. Complete matching covers all vertices in the smaller partition.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Bipartite Graph Matching</text>
    <text x="60" y="280" font-family="Arial" font-size="10" fill="#1976d2">X:</text>
    <circle cx="80" cy="280" r="8" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="80" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">x1</text>
    <circle cx="105" cy="280" r="8" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="105" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">x2</text>
    <circle cx="130" cy="280" r="8" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="130" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">x3</text>
    <text x="180" y="280" font-family="Arial" font-size="10" fill="#f44336">Y:</text>
    <circle cx="200" cy="280" r="8" fill="#ffebee" stroke="#f44336"/>
    <text x="200" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">y1</text>
    <circle cx="225" cy="280" r="8" fill="#ffebee" stroke="#f44336"/>
    <text x="225" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">y2</text>
    <circle cx="250" cy="280" r="8" fill="#ffebee" stroke="#f44336"/>
    <text x="250" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">y3</text>
    <circle cx="275" cy="280" r="8" fill="#ffebee" stroke="#f44336"/>
    <text x="275" y="284" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">y4</text>
    <line x1="80" y1="272" x2="200" y2="288" stroke="#999" stroke-width="1"/>
    <line x1="80" y1="272" x2="225" y2="288" stroke="#999" stroke-width="1"/>
    <line x1="105" y1="272" x2="225" y2="288" stroke="#999" stroke-width="1"/>
    <line x1="105" y1="272" x2="250" y2="288" stroke="#999" stroke-width="1"/>
    <line x1="130" y1="272" x2="250" y2="288" stroke="#999" stroke-width="1"/>
    <line x1="130" y1="272" x2="275" y2="288" stroke="#999" stroke-width="1"/>
    <line x1="80" y1="288" x2="200" y2="288" stroke="#388e3c" stroke-width="2"/>
    <line x1="105" y1="288" x2="250" y2="288" stroke="#388e3c" stroke-width="2"/>
    <line x1="130" y1="288" x2="225" y2="288" stroke="#388e3c" stroke-width="2"/>
    <text x="350" y="280" font-family="Arial" font-size="9" fill="#333">Edges only X→Y</text>
    <text x="350" y="295" font-family="Arial" font-size="9" fill="#333">Matching size ≤ min(|X|,|Y|)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Hall's Theorem: In bipartite graph G=(X∪Y,E), matching covering X exists iff for every subset S of X, |N(S)| ≥ |S|. Check all subsets.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Hall's Marriage Theorem</text>
    <text x="40" y="370" font-family="Arial" font-size="10" fill="#333">For S ⊆ X, matching covering X exists iff |N(S)| ≥ |S|:</text>
    <rect x="40" y="380" width="340" height="18" fill="#f3e5f5" rx="2"/>
    <text x="210" y="393" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">N(S) = set of neighbors of S in Y</text>
    <text x="400" y="370" font-family="Arial" font-size="9" fill="#333">Example: X={a,b,c}, Y={1,2,3,4}</text>
    <text x="400" y="385" font-family="Arial" font-size="9" fill="#333">Edges: a-1,2 | b-2,3 | c-3,4</text>
    <text x="400" y="400" font-family="Arial" font-size="9" fill="#388e3c">Check: {a}:2≥1 ✓ {b}:2≥1 ✓ {c}:2≥1 ✓</text>
  </g>
  
  <g class="step" id="step5" data-narration="An augmenting path alternates between non-M and M edges, starting and ending at unmatched vertices. Toggling increases matching by 1 edge.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. Augmenting Paths</text>
    <text x="60" y="460" font-family="Arial" font-size="10" fill="#333">Berge's Lemma: Matching M is maximum iff no augmenting path exists</text>
    <rect x="60" y="475" width="300" height="12" fill="#ffebee" rx="2"/>
    <text x="210" y="484" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">Alternating: unmatched → matched → unmatched</text>
    <circle cx="400" cy="470" r="10" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="400" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">x</text>
    <circle cx="450" cy="470" r="10" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="450" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">y</text>
    <circle cx="500" cy="470" r="10" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="500" y="474" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">z</text>
    <line x1="410" y1="470" x2="440" y2="470" stroke="#999" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="460" y1="470" x2="490" y2="470" stroke="#388e3c" stroke-width="2"/>
    <text x="455" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">in M</text>
    <text x="505" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">free</text>
  </g>
  
  <g class="step" id="step6" data-narration="König's Theorem: In bipartite graphs, minimum vertex cover size equals maximum matching size. Use alternating paths from unmatched Y vertices.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. König's Theorem</text>
    <text x="40" y="545" font-family="Arial" font-size="10" fill="#333">Minimum vertex cover size = Maximum matching size in bipartite graphs</text>
    <rect x="40" y="555" width="450" height="25" fill="#e3f2fd" rx="3"/>
    <text x="265" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Find min VC: Start from unmatched Y → alternating paths → (X - X_reach) ∪ (Y ∩ Y_reach)</text>
    <text x="510" y="545" font-family="Arial" font-size="10" fill="#333">Example:</text>
    <text x="510" y="560" font-family="Arial" font-size="9" fill="#333">Max matching: {x1y1,x2y2,x3y3}</text>
    <text x="510" y="575" font-family="Arial" font-size="9" fill="#333">Size = 3 = Min VC size</text>
    <text x="510" y="588" font-family="Arial" font-size="9" fill="#388e3c">Min VC = {x1,x2,y4}</text>
  </g>
</svg>