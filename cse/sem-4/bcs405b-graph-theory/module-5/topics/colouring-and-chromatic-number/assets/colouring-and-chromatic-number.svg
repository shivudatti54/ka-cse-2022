<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on Graph Coloring and Chromatic Number. We'll explore how to color vertices properly and find the minimum colors needed.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Graph Coloring and Chromatic Number</text>
  </g>
  
  <g class="step" id="step1" data-narration="Proper coloring assigns colors to vertices so adjacent vertices never share the same color. Each color class forms an independent set with no edges between them.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" strokeWidth="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Definition: Proper Graph Coloring</text>
    <circle cx="100" cy="115" r="18" fill="#f44336"/>
    <circle cx="150" cy="115" r="18" fill="#1976d2"/>
    <circle cx="200" cy="115" r="18" fill="#f44336"/>
    <line x1="118" y1="115" x2="132" y2="115" stroke="#333" strokeWidth="2"/>
    <line x1="168" y1="115" x2="182" y2="115" stroke="#333" strokeWidth="2"/>
    <text x="240" y="112" font-family="Arial" font-size="9" fill="#333">Adjacent vertices</text>
    <text x="240" y="125" font-family="Arial" font-size="9" fill="#333">must have different colors</text>
    <rect x="380" y="85" width="380" height="50" rx="3" fill="white" stroke="#ddd"/>
    <text x="400" y="105" font-family="Arial" font-size="10" fill="#333">Color Class = Independent Set</text>
    <text x="400" y="122" font-family="Arial" font-size="9" fill="#666">(vertices of same color, no edges between them)</text>
  </g>
  
  <g class="step" id="step2" data-narration="The chromatic number χ(G) is the minimum colors needed. Complete graphs need n colors, cycles need 2 or 3 depending on parity, and bipartite graphs need just 2.">
    <rect x="20" y="151" width="760" height="85" rx="5" fill="#f3e5f5" stroke="#9c27b0" strokeWidth="2"/>
    <text x="40" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Chromatic Numbers of Special Graphs</text>
    <rect x="40" y="185" width="165" height="42" rx="3" fill="white" stroke="#9c27b0"/>
    <text x="122" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Complete Graph Kn</text>
    <text x="122" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">χ(Kn) = n</text>
    <rect x="215" y="185" width="165" height="42" rx="3" fill="white" stroke="#9c27b0"/>
    <text x="297" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Even Cycle C2n</text>
    <text x="297" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">χ(C2n) = 2</text>
    <rect x="390" y="185" width="165" height="42" rx="3" fill="white" stroke="#9c27b0"/>
    <text x="472" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Odd Cycle C2n+1</text>
    <text x="472" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">χ(C2n+1) = 3</text>
    <rect x="565" y="185" width="165" height="42" rx="3" fill="white" stroke="#9c27b0"/>
    <text x="647" y="200" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Bipartite Graph</text>
    <text x="647" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">χ(G) = 2</text>
  </g>
  
  <g class="step" id="step3" data-narration="The Four Color Theorem states any planar graph needs at most 4 colors. The greedy algorithm colors vertices in order using the first available color.">
    <rect x="20" y="244" width="760" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" strokeWidth="2"/>
    <text x="40" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Four Color Theorem and Greedy Coloring</text>
    <rect x="40" y="278" width="240" height="42" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="160" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Four Color Theorem</text>
    <text x="160" y="309" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Any planar graph: χ(G) ≤ 4</text>
    <rect x="290" y="278" width="240" height="42" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="410" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Greedy Algorithm Steps</text>
    <text x="410" y="309" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Order vertices, assign first available color</text>
    <rect x="540" y="278" width="220" height="42" rx="3" fill="white" stroke="#ddd"/>
    <text x="650" y="293" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#666">Important Bounds</text>
    <text x="650" y="309" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">χ(G) ≥ ω(G) and χ(G) ≤ Δ(G)+1</text>
  </g>
  
  <g class="step" id="step4" data-narration="For odd cycle C5, we need 3 colors. For complete bipartite K3,4, only 2 colors suffice since bipartition sets have no internal edges.">
    <rect x="20" y="337" width="760" height="98" rx="5" fill="#fff3e0" stroke="#ff9800" strokeWidth="2"/>
    <text x="40" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Example 1: C5 (Odd Cycle) → χ = 3</text>
    <circle cx="80" cy="390" r="15" fill="#f44336"/>
    <circle cx="130" cy="365" r="15" fill="#1976d2"/>
    <circle cx="130" cy="415" r="15" fill="#388e3c"/>
    <circle cx="180" cy="390" r="15" fill="#f44336"/>
    <circle cx="155" cy="390" r="15" fill="#1976d2"/>
    <text x="230" y="385" font-family="Arial" font-size="9" fill="#333">v5 adjacent to v1 and v4</text>
    <text x="230" y="400" font-family="Arial" font-size="9" fill="#333">needs third color (Green)</text>
    <line x1="80" y1="390" x2="130" y2="365" stroke="#333" strokeWidth="1.5"/>
    <line x1="130" y1="365" x2="130" y2="415" stroke="#333" strokeWidth="1.5"/>
    <line x1="130" y1="415" x2="180" y2="390" stroke="#333" strokeWidth="1.5"/>
    <line x1="180" y1="390" x2="155" y2="390" stroke="#333" strokeWidth="1.5"/>
    <line x1="155" y1="390" x2="80" y2="390" stroke="#333" strokeWidth="1.5"/>
    <line x1="155" y1="390" x2="130" y2="365" stroke="#333" strokeWidth="1.5"/>
    <rect x="400" y="352" width="360" height="62" rx="3" fill="#fff8e1" stroke="#ff9800"/>
    <text x="580" y="370" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Example 2: K3,4 (Complete Bipartite)</text>
    <text x="580" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Partition A = {a1,a2,a3} → Color 1 (Red)</text>
    <text x="580" y="403" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Partition B = {b1,b2,b3,b4} → Color 2 (Blue)</text>
    <text x="580" y="418" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">χ(K3,4) = 2</text>
  </g>
  
  <g class="step" id="step5" data-narration="For exams, remember: χ(Kn)=n, cycles need 2 or 3, bipartite is always 2, planar graphs need at most 4 colors. Know the lower and upper bounds.">
    <rect x="20" y="443" width="760" height="85" rx="5" fill="#ffebee" stroke="#f44336" strokeWidth="2"/>
    <text x="40" y="463" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Exam Tips: Key Points to Remember</text>
    <rect x="40" y="475" width="145" height="45" rx="3" fill="white" stroke="#f44336"/>
    <text x="112" y="491" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Basic Graphs</text>
    <text x="112" y="506" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">χ(Kn)=n, χ(Cn)=2/3</text>
    <text x="112" y="517" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">χ(bipartite)=2</text>
    <rect x="195" y="475" width="145" height="45" rx="3" fill="white" stroke="#f44336"/>
    <text x="267" y="491" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Bounds</text>
    <text x="267" y="506" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">χ(G) ≥ ω(G)</text>
    <text x="267" y="517" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">χ(G) ≤ Δ(G)+1</text>
    <rect x="350" y="475" width="145" height="45" rx="3" fill="white" stroke="#f44336"/>
    <text x="422" y="491" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Four Color Theorem</text>
    <text x="422" y="506" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Planar graph:</text>
    <text x="422" y="517" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">χ(G) ≤ 4</text>
    <rect x="505" y="475" width="145" height="45" rx="3" fill="white" stroke="#f44336"/>
    <text x="577" y="491" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Bipartite Test</text>
    <text x="577" y="506" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">No odd cycle</text>
    <text x="577" y="517" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">⇔ 2-colorable</text>
    <rect x="660" y="475" width="100" height="45" rx="3" fill="white" stroke="#f44336"/>
    <text x="710" y="500" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Greedy</text>
    <text x="710" y="515" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Depends on</text>
  </g>
  
  <g class="step" id="step6" data-narration="Applications include scheduling problems, register allocation in compilers, and frequency assignment in mobile networks. The chromatic index deals with edge coloring.">
    <rect x="20" y="536" width="760" height="55" rx="5" fill="#e1f5fe" stroke="#0288d1" strokeWidth="2"/>
    <text x="40" y="556" font-family="Arial" font-size="12" font-weight="bold" fill="#0288d1">Applications &amp; Summary</text>
    <rect x="150" y="545" width="130" height="38" rx="3" fill="white" stroke="#0288d1"/>
    <text x="215" y="558" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#0288d1">Scheduling</text>
    <text x="215" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Assign time slots</text>
    <rect x="290" y="545" width="130" height="38" rx="3" fill="white" stroke="#0288d1"/>
    <text x="355" y="558" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#0288d1">Register Allocation</text>
    <text x="355" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Compiler optimization</text>
    <rect x="430" y="545" width="130" height="38" rx="3" fill="white" stroke="#0288d1"/>
    <text x="495" y="558" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#0288d1">Map Coloring</text>
    <text x="495" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Four Color Theorem</text>
    <rect x="570" y="545" width="130" height="38" rx="3" fill="white" stroke="#0288d1"/>
    <text x="635" y="558" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#0288d1">Frequency Assignment</text>
    <text x="635" y="570" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Mobile networks</text>
  </g>
</svg>