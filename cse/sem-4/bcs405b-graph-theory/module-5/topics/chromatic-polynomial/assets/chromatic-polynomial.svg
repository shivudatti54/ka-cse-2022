<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to the Chromatic Polynomial topic. We'll explore how to count proper graph colorings using polynomial functions and understand key formulas for special graph types.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Chromatic Polynomial</text>
  </g>
  
  <g class="step" id="step1" data-narration="A proper coloring assigns colors to vertices so adjacent vertices never share the same color. The chromatic number is the minimum colors needed.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Basic Definitions</text>
    <text x="40" y="96" font-family="Arial" font-size="10" fill="#333">• Proper Coloring: No two adjacent vertices share the same color</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">• Chromatic Number χ(G): Minimum colors needed for proper coloring</text>
    <text x="40" y="128" font-family="Arial" font-size="10" fill="#333">• Chromatic Polynomial P(G,k): Number of proper colorings using exactly k colors</text>
  </g>
  
  <g class="step" id="step2" data-narration="The chromatic polynomial has degree n with leading coefficient 1. Coefficients alternate in sign. For any graph with edges, P(G,0) equals zero and P(G,1) also equals zero.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#e8f5e9" stroke-width="2" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Fundamental Properties</text>
    <text x="40" y="184" font-family="Arial" font-size="10" fill="#333">• Degree: P(G,k) is degree n with leading coefficient 1 for connected graph</text>
    <text x="40" y="200" font-family="Arial" font-size="10" fill="#333">• Sign Pattern: Coefficients alternate in sign</text>
    <text x="40" y="216" font-family="Arial" font-size="10" fill="#333">• P(G,0) = 0 and P(G,1) = 0 for any graph with at least one edge</text>
  </g>
  
  <g class="step" id="step3" data-narration="For special graphs, we have simple formulas: complete graph K_n uses falling factorial, empty graph uses k to the power n, path uses k times k minus one raised to n-1.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#fff3e0" stroke-width="2" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Special Graph Formulas</text>
    <rect x="40" y="265" width="170" height="50" fill="#fff3e0" rx="3"/>
    <text x="50" y="280" font-family="Arial" font-size="9" fill="#333">Complete Kₙ: P(Kₙ,k) = k(k-1)(k-2)...</text>
    <text x="50" y="294" font-family="Arial" font-size="9" fill="#333">Empty: P(ⱼₙ,k) = kⁿ</text>
    <text x="50" y="308" font-family="Arial" font-size="9" fill="#333">Path Pₙ: P(Pₙ,k) = k(k-1)ⁿ⁻¹</text>
    <rect x="220" y="265" width="180" height="50" fill="#fff3e0" rx="3"/>
    <text x="230" y="280" font-family="Arial" font-size="9" fill="#333">Cycle Cₙ: P(Cₙ,k) = (k-1)ⁿ + (-1)ⁿ(k-1)</text>
    <text x="230" y="294" font-family="Arial" font-size="9" fill="#333">Tree (n vertices): P(Tₙ,k) = k(k-1)ⁿ⁻¹</text>
    <text x="230" y="308" font-family="Arial" font-size="9" fill="#333">Bipartite Kₘ,ₙ: P = kᵐ(k-1)ⁿ + kⁿ(k-1)ᵐ</text>
  </g>
  
  <g class="step" id="step4" data-narration="The deletion-contraction algorithm is the key method. For any edge e, the chromatic polynomial equals polynomial of G minus e minus polynomial of G contracted by e.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#f3e5f5" stroke-width="2" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Deletion-Contraction Algorithm</text>
    <text x="40" y="362" font-family="Arial" font-size="11" fill="#333" font-style="italic">P(G, k) = P(G - e, k) - P(G / e, k)</text>
    <rect x="40" y="375" width="330" height="20" fill="#f3e5f5" rx="3"/>
    <text x="50" y="389" font-family="Arial" font-size="9" fill="#333">G - e: Delete edge e from graph</text>
    <rect x="380" y="375" width="330" height="20" fill="#f3e5f5" rx="3"/>
    <text x="390" y="389" font-family="Arial" font-size="9" fill="#333">G / e: Contract edge e (merge endpoints)</text>
  </g>
  
  <g class="step" id="step5" data-narration="For triangle K3, the polynomial equals k times k minus one times k minus two. Using three colors, we get six valid colorings which equals three factorial.">
    <rect x="20" y="410" width="760" height="101" fill="#ffffff" stroke="#ffebee" stroke-width="2" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example 1: Triangle K₃</text>
    <text x="40" y="450" font-family="Arial" font-size="10" fill="#333">P(K₃,k) = k(k-1)(k-2) = k³ - 3k² + 2k</text>
    <text x="40" y="468" font-family="Arial" font-size="10" fill="#333">Verification: k=1 → 0 ✓ | k=2 → 0 ✓ | k=3 → 6 (3! ways) ✓</text>
    <text x="40" y="486" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example 2: Cycle C₄</text>
    <text x="400" y="486" font-family="Arial" font-size="10" fill="#333">P(C₄,k) = (k-1)⁴ + (k-1) = k(k-1)(k²-3k+3)</text>
    <text x="400" y="504" font-family="Arial" font-size="10" fill="#333">Verification: k=1 → 0 ✓ | k=2 → 2 ✓ | k=3 → 9 ✓</text>
  </g>
  
  <g class="step" id="step6" data-narration="For exam success, memorize special graph formulas, practice deletion-contraction thoroughly, and always verify answers by substituting k equals zero, one, and two.">
    <rect x="20" y="519" width="760" height="81" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="539" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Exam Tips &amp; Key Points</text>
    <rect x="40" y="551" width="230" height="42" fill="#e3f2fd" rx="3"/>
    <text x="50" y="565" font-family="Arial" font-size="9" fill="#333">• Memorize Kₙ, Pₙ, Cₙ formulas</text>
    <text x="50" y="579" font-family="Arial" font-size="9" fill="#333">• χ(G) = smallest k where P(G,k) > 0</text>
    <text x="50" y="593" font-family="Arial" font-size="9" fill="#333">• |coeff of kⁿ⁻¹| = number of edges</text>
    <rect x="280" y="551" width="230" height="42" fill="#e3f2fd" rx="3"/>
    <text x="290" y="565" font-family="Arial" font-size="9" fill="#333">• Always verify: test k=0,1,2</text>
    <text x="290" y="579" font-family="Arial" font-size="9" fill="#333">• Trees: P(Tₙ,k) = k(k-1)ⁿ⁻¹</text>
    <text x="290" y="593" font-family="Arial" font-size="9" fill="#333">• Bipartite iff P(G,2) > 0</text>
    <rect x="520" y="551" width="230" height="42" fill="#e3f2fd" rx="3"/>
    <text x="530" y="565" font-family="Arial" font-size="9" fill="#333">• Work backwards from options</text>
    <text x="530" y="579" font-family="Arial" font-size="9" fill="#333">• Use Whitney's theorem for complex graphs</text>
    <text x="530" y="593" font-family="Arial" font-size="9" fill="#333">• Practice deletion-contraction steps</text>
  </g>
</svg>