<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
<marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
</marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
</marker>
</defs>

<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="This is the title slide introducing the Four Color Problem and Five Color Problem, important topics in graph theory and topology.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Four Color Problem and Five Color Problem</text>
</g>

<g class="step" id="step1" data-narration="The Four Color Problem was posed in 1852 by Francis Guthrie when coloring England's counties. It asks if any map can use at most four colors so adjacent regions differ.">
<rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">1. Four Color Problem - Introduction</text>
<rect x="40" y="88" width="220" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
<text x="50" y="102" font-family="Arial" font-size="10" fill="#333">Origin: Francis Guthrie, 1852</text>
<text x="50" y="116" font-family="Arial" font-size="9" fill="#666">Coloring counties of England</text>
<rect x="270" y="88" width="220" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
<text x="280" y="102" font-family="Arial" font-size="10" fill="#333">Question</text>
<text x="280" y="116" font-family="Arial" font-size="9" fill="#666">Can every map be colored</text>
<text x="280" y="126" font-family="Arial" font-size="9" fill="#666">with at most 4 colors?</text>
<rect x="500" y="88" width="260" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
<text x="510" y="102" font-family="Arial" font-size="10" fill="#333">Solved: 1976</text>
<text x="510" y="116" font-family="Arial" font-size="9" fill="#666">By Kenneth Appel and</text>
<text x="510" y="126" font-family="Arial" font-size="9" fill="#666">Wolfgang Haken</text>
</g>

<g class="step" id="step2" data-narration="Percy Heawood proved in 1890 that five colors always suffice for planar maps. His constructive proof came 86 years before the Four Color Theorem was proven.">
<rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">2. Five Color Theorem - Heawood 1890</text>
<rect x="40" y="180" width="160" height="36" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
<text x="50" y="194" font-family="Arial" font-size="10" fill="#333">Proved by</text>
<text x="50" y="206" font-family="Arial" font-size="10" fill="#333">Percy Heawood</text>
<rect x="210" y="180" width="160" height="36" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
<text x="220" y="194" font-family="Arial" font-size="10" fill="#333">Year</text>
<text x="220" y="206" font-family="Arial" font-size="10" fill="#333">1890</text>
<rect x="380" y="180" width="160" height="36" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
<text x="390" y="194" font-family="Arial" font-size="10" fill="#333">Constructive</text>
<text x="390" y="206" font-family="Arial" font-size="10" fill="#333">Proof</text>
<rect x="550" y="180" width="210" height="36" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
<text x="560" y="194" font-family="Arial" font-size="10" fill="#333">Every planar map can be</text>
<text x="560" y="206" font-family="Arial" font-size="10" fill="#333">colored with at most 5 colors</text>
</g>

<g class="step" id="step3" data-narration="A planar graph can be drawn without edges crossing. Euler's Formula states for connected planar graphs: V - E + F equals 2, where V is vertices, E edges, F faces.">
<rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
<text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">3. Planar Graphs and Euler's Formula</text>
<rect x="40" y="268" width="200" height="36" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
<text x="50" y="282" font-family="Arial" font-size="10" fill="#333">Planar Graph</text>
<text x="50" y="294" font-family="Arial" font-size="9" fill="#666">No edges cross when drawn</text>
<rect x="250" y="268" width="200" height="36" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
<text x="260" y="282" font-family="Arial" font-size="10" fill="#333">Euler's Formula</text>
<text x="260" y="294" font-family="Arial" font-size="9" fill="#666">V - E + F = 2</text>
<rect x="460" y="268" width="300" height="36" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
<text x="470" y="282" font-family="Arial" font-size="10" fill="#333">V = Vertices, E = Edges, F = Faces</text>
<text x="470" y="294" font-family="Arial" font-size="9" fill="#666">For any connected planar graph</text>
</g>

<g class="step" id="step4" data-narration="Graph coloring assigns colors to vertices so no adjacent vertices share a color. The dual graph represents map regions as vertices, connecting neighboring regions with edges.">
<rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">4. Graph Coloring and Dual Graph</text>
<rect x="40" y="356" width="160" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
<text x="50" y="370" font-family="Arial" font-size="10" fill="#333">Graph Coloring</text>
<text x="50" y="382" font-family="Arial" font-size="9" fill="#666">Adjacent vertices</text>
<text x="50" y="392" font-family="Arial" font-size="9" fill="#666">get different colors</text>
<rect x="210" y="356" width="160" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
<text x="220" y="370" font-family="Arial" font-size="10" fill="#333">Chromatic Number</text>
<text x="220" y="382" font-family="Arial" font-size="9" fill="#666">χ(G) = minimum</text>
<text x="220" y="392" font-family="Arial" font-size="9" fill="#666">colors needed</text>
<rect x="380" y="356" width="200" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
<text x="390" y="370" font-family="Arial" font-size="10" fill="#333">Dual Graph</text>
<text x="390" y="382" font-family="Arial" font-size="9" fill="#666">Vertex in each region,</text>
<text x="390" y="392" font-family="Arial" font-size="9" fill="#666">edge for shared boundary</text>
<rect x="590" y="356" width="170" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
<text x="600" y="370" font-family="Arial" font-size="10" fill="#333">Adjacency</text>
<text x="600" y="382" font-family="Arial" font-size="9" fill="#666">Shared boundary,</text>
<text x="600" y="392" font-family="Arial" font-size="9" fill="#666">not just a point</text>
</g>

<g class="step" id="step5" data-narration="The Four Color Theorem was proved in 1976 by Appel and Haken using computer assistance. It was the first major theorem proved with significant computer help, checking nearly 2000 configurations.">
<rect x="20" y="410" width="760" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
<text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">5. Four Color Theorem Details</text>
<rect x="40" y="444" width="160" height="36" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
<text x="50" y="458" font-family="Arial" font-size="10" fill="#333">Theorem</text>
<text x="50" y="470" font-family="Arial" font-size="9" fill="#666">Every planar graph</text>
<text x="50" y="478" font-family="Arial" font-size="9" fill="#666">needs ≤ 4 colors</text>
<rect x="210" y="444" width="160" height="36" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
<text x="220" y="458" font-family="Arial" font-size="10" fill="#333">Proof Year</text>
<text x="220" y="470" font-family="Arial" font-size="10" fill="#333">1976</text>
<text x="220" y="478" font-family="Arial" font-size="9" fill="#666">Appel &amp; Haken</text>
<rect x="380" y="444" width="180" height="36" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
<text x="390" y="458" font-family="Arial" font-size="10" fill="#333">Computer-Assisted</text>
<text x="390" y="470" font-family="Arial" font-size="9" fill="#666">First major theorem</text>
<text x="390" y="478" font-family="Arial" font-size="9" fill="#666">proved by computer</text>
<rect x="570" y="444" width="190" height="36" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
<text x="580" y="458" font-family="Arial" font-size="10" fill="#333">Checked ~2000</text>
<text x="580" y="470" font-family="Arial" font-size="9" fill="#666">configurations</text>
<text x="580" y="478" font-family="Arial" font-size="9" fill="#666">K4 needs exactly 4 colors</text>
</g>

<g class="step" id="step6" data-narration="The Five Color Theorem uses vertex degree at most 5 and Kempe chains algorithmically. Every planar graph contains a vertex of degree 5 or less, enabling recursive coloring.">
<rect x="20" y="498" width="760" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">6. Five Color Theorem - Key Points</text>
<rect x="40" y="532" width="150" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
<text x="50" y="546" font-family="Arial" font-size="10" fill="#333">Key Property</text>
<text x="50" y="558" font-family="Arial" font-size="9" fill="#666">Every planar graph</text>
<text x="50" y="568" font-family="Arial" font-size="9" fill="#666">has vertex degree ≤ 5</text>
<rect x="200" y="532" width="150" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
<text x="210" y="546" font-family="Arial" font-size="10" fill="#333">Kempe Chains</text>
<text x="210" y="558" font-family="Arial" font-size="9" fill="#666">Connected subgraph</text>
<text x="210" y="568" font-family="Arial" font-size="9" fill="#666">with two colors</text>
<rect x="360" y="532" width="150" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
<text x="370" y="546" font-family="Arial" font-size="10" fill="#333">Algorithm</text>
<text x="370" y="558" font-family="Arial" font-size="9" fill="#666">Recursive coloring</text>
<text x="370" y="568" font-family="Arial" font-size="9" fill="#666">approach possible</text>
<rect x="520" y="532" width="240" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
<text x="530" y="546" font-family="Arial" font-size="10" fill="#333">Timeline</text>
<text x="530" y="558" font-family="Arial" font-size="9" fill="#666">Problem 1852 → Five Color 1890 → Four Color 1976</text>
</g>
</svg>