<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Greedy coloring is a heuristic that assigns the smallest available color to each vertex without conflicts with already-colored neighbors during graph processing.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2">Greedy Coloring Algorithm</text>
  </g>
  
  <!-- step1: Graph Coloring Basics -->
  <g class="step" id="step1" data-narration="Graph coloring assigns colors to vertices so adjacent vertices have different colors. The minimum colors needed is the chromatic number χ(G).">
    <rect x="20" y="58" width="760" height="95" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Graph Coloring Basics</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">• Assign colors to vertices so no adjacent vertices share the same color</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">• Chromatic number χ(G) = minimum colors needed for optimal coloring</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">• Greedy coloring is a fast heuristic, not guaranteed to find χ(G)</text>
    <!-- Simple graph visual -->
    <circle cx="580" cy="98" r="12" fill="#f44336"/>
    <circle cx="620" cy="98" r="12" fill="#4caf50"/>
    <circle cx="600" cy="125" r="12" fill="#2196f3"/>
    <line x1="580" y1="98" x2="620" y2="98" stroke="#333" stroke-width="1.5"/>
    <line x1="580" y1="98" x2="600" y2="125" stroke="#333" stroke-width="1.5"/>
    <line x1="620" y1="98" x2="600" y2="125" stroke="#333" stroke-width="1.5"/>
    <text x="580" y="78" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">v1</text>
    <text x="620" y="78" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">v2</text>
    <text x="600" y="150" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">v3</text>
  </g>
  
  <!-- step2: Greedy Framework -->
  <g class="step" id="step2" data-narration="The greedy algorithm processes vertices in order, assigning the smallest color not used by already-colored neighbors. It runs in O(V+E) time.">
    <rect x="20" y="161" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="181" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Greedy Coloring Framework</text>
    <text x="40" y="198" font-family="Arial" font-size="10" fill="#333">1. Process vertices in a predetermined order</text>
    <text x="40" y="213" font-family="Arial" font-size="10" fill="#333">2. For each vertex, find smallest color unused by colored neighbors</text>
    <text x="40" y="228" font-family="Arial" font-size="10" fill="#333">3. Assign that color and continue to next vertex</text>
    <rect x="400" y="175" width="350" height="55" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="410" y="192" font-family="Courier" font-size="9" fill="#333">GREEDY-COLOR(G):</text>
    <text x="410" y="205" font-family="Courier" font-size="8" fill="#333">for each vertex v in order:</text>
    <text x="420" y="217" font-family="Courier" font-size="8" fill="#333">available[color[u]] = FALSE</text>
    <text x="420" y="229" font-family="Courier" font-size="8" fill="#333">color[v] = smallest i where</text>
    <text x="430" y="239" font-family="Courier" font-size="8" fill="#333">available[i] = TRUE</text>
  </g>
  
  <!-- step3: Welsh-Powell and DSATUR -->
  <g class="step" id="step3" data-narration="Welsh-Powell sorts vertices by descending degree and assigns colors greedily, while DSATUR uses saturation degree for dynamic vertex selection effectively.">
    <rect x="20" y="249" width="760" height="80" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="269" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Welsh-Powell &amp; DSATUR Algorithms</text>
    <text x="40" y="286" font-family="Arial" font-size="10" fill="#333">Welsh-Powell: Sort by degree descending, assign smallest available color</text>
    <text x="40" y="301" font-family="Arial" font-size="10" fill="#333">DSATUR: Select vertex with highest saturation degree (ties by degree)</text>
    <text x="40" y="316" font-family="Arial" font-size="10" fill="#333">Update saturation after each vertex colored for better results</text>
    <!-- Visualization -->
    <rect x="400" y="260" width="350" height="55" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="420" y="277" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Key Insight:</text>
    <text x="420" y="292" font-family="Arial" font-size="9" fill="#333">Welsh-Powell: static order (by degree)</text>
    <text x="420" y="306" font-family="Arial" font-size="9" fill="#333">DSATUR: dynamic order (by saturation)</text>
    <text x="420" y="320" font-family="Arial" font-size="9" fill="#333">Both guarantee ≤ Δ+1 colors</text>
  </g>
  
  <!-- step4: Vertex Ordering Impact -->
  <g class="step" id="step4" data-narration="Vertex ordering dramatically affects greedy coloring results, as different orders may use different numbers of colors on the same graph structure.">
    <rect x="20" y="337" width="760" height="90" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Vertex Ordering Impact</text>
    <text x="40" y="374" font-family="Arial" font-size="10" fill="#333">Order matters: Same graph + different order = different coloring quality</text>
    <!-- Comparison boxes -->
    <rect x="40" y="382" width="220" height="30" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="50" y="395" font-family="Arial" font-size="9" fill="#333">Order: v1→v2→v3→v4</text>
    <text x="170" y="395" text-anchor="end" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Uses 3 colors</text>
    
    <rect x="280" y="382" width="220" height="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="290" y="395" font-family="Arial" font-size="9" fill="#333">Order: v4→v3→v2→v1</text>
    <text x="410" y="395" text-anchor="end" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Uses 2 colors</text>
    
    <rect x="520" y="382" width="240" height="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="530" y="395" font-family="Arial" font-size="9" fill="#333">DSATUR (dynamic)</text>
    <text x="650" y="395" text-anchor="end" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Uses 2 colors</text>
    
    <text x="40" y="420" font-family="Arial" font-size="9" fill="#666">Finding optimal ordering is as hard as the original coloring problem itself.</text>
  </g>
  
  <!-- step5: Examples and Bounds -->
  <g class="step" id="step5" data-narration="Greedy coloring always uses at most Δ+1 colors, achieving optimal 2-coloring on paths but needing n colors for complete graph K_n.">
    <rect x="20" y="435" width="760" height="85" fill="#ffffff" stroke="#e3f2fd" stroke-width="2" rx="5"/>
    <text x="40" y="455" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Examples and Bounds</text>
    <text x="40" y="472" font-family="Arial" font-size="10" fill="#333">• Path graph v1-v2-v3-v4-v5: optimal 2 colors (alternating pattern)</text>
    <text x="40" y="487" font-family="Arial" font-size="10" fill="#333">• Complete graph K4: needs 4 colors (each vertex adjacent to all others)</text>
    <text x="40" y="502" font-family="Arial" font-size="10" fill="#333">• Upper bound: Greedy always uses ≤ Δ+1 colors (Δ = maximum degree)</text>
    <text x="40" y="517" font-family="Arial" font-size="10" fill="#333">• Perfect/chordal graphs: greedy with right order achieves optimal χ(G)</text>
    <!-- Key formula box -->
    <rect x="450" y="447" width="310" height="65" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="460" y="467" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Key Bounds</text>
    <text x="460" y="484" font-family="Arial" font-size="10" fill="#333">Time: O(V+E) with adjacency lists</text>
    <text x="460" y="499" font-family="Arial" font-size="10" fill="#333">Colors: ≤ Δ + 1 (worst case)</text>
    <text x="460" y="514" font-family="Arial" font-size="10" fill="#333">Optimal on: perfect graphs, chordal graphs</text>
  </g>
</svg>