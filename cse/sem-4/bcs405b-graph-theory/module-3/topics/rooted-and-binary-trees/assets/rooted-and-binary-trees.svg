<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This presentation covers Rooted Trees and Binary Trees including definitions, properties, types, representations, traversals, and key formulas for exam preparation.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white">Rooted Trees and Binary Trees</text>
  </g>
  
  <g class="step" id="step1" data-narration="A rooted tree has a designated root node with no parent. Every other node connects through unique paths defining parent-child relationships clearly.">
    <rect x="10" y="58" width="780" height="105" fill="#e3f2fd" rx="8"/>
    <text x="30" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Rooted Tree Terminology</text>
    <circle cx="400" cy="105" r="15" fill="#1976d2" stroke="#0d47a1" stroke-width="2"/>
    <text x="400" y="109" text-anchor="middle" font-family="Arial" font-size="9" fill="white">R</text>
    <line x1="385" y1="115" x2="320" y2="145" stroke="#666" stroke-width="1.5"/>
    <line x1="415" y1="115" x2="480" y2="145" stroke="#666" stroke-width="1.5"/>
    <circle cx="320" cy="150" r="12" fill="#42a5f5" stroke="#1565c0" stroke-width="2"/>
    <text x="320" y="154" text-anchor="middle" font-family="Arial" font-size="8" fill="white">A</text>
    <circle cx="480" cy="150" r="12" fill="#42a5f5" stroke="#1565c0" stroke-width="2"/>
    <text x="480" y="154" text-anchor="middle" font-family="Arial" font-size="8" fill="white">B</text>
    <text x="560" y="85" font-family="Arial" font-size="9" fill="#333">Root: Node with no parent</text>
    <text x="560" y="100" font-family="Arial" font-size="9" fill="#333">Parent: Has child(ren) below</text>
    <text x="560" y="115" font-family="Arial" font-size="9" fill="#333">Leaf: No children</text>
    <text x="560" y="130" font-family="Arial" font-size="9" fill="#333">Level: Distance from root</text>
  </g>
  
  <g class="step" id="step2" data-narration="Binary trees limit each node to at most two children: left and right. Maximum nodes equals 2^(h+1) - 1 for height h.">
    <rect x="10" y="171" width="780" height="95" fill="#e8f5e9" rx="8"/>
    <text x="30" y="191" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Binary Tree Properties</text>
    <circle cx="200" cy="220" r="15" fill="#388e3c" stroke="#1b5e20" stroke-width="2"/>
    <text x="200" y="224" text-anchor="middle" font-family="Arial" font-size="9" fill="white">A</text>
    <line x1="185" y1="228" x2="150" y2="250" stroke="#666" stroke-width="1.5"/>
    <line x1="215" y1="228" x2="250" y2="250" stroke="#666" stroke-width="1.5"/>
    <circle cx="145" cy="255" r="12" fill="#66bb6a" stroke="#2e7d32" stroke-width="2"/>
    <text x="145" y="259" text-anchor="middle" font-family="Arial" font-size="8" fill="white">B</text>
    <circle cx="255" cy="255" r="12" fill="#66bb6a" stroke="#2e7d32" stroke-width="2"/>
    <text x="255" y="259" text-anchor="middle" font-family="Arial" font-size="8" fill="white">C</text>
    <text x="380" y="200" font-family="Arial" font-size="10" fill="#2e7d32">Properties:</text>
    <text x="380" y="215" font-family="Arial" font-size="9" fill="#333">• Max nodes: 2^(h+1) - 1</text>
    <text x="380" y="230" font-family="Arial" font-size="9" fill="#333">• Min height: ⌊log₂n⌋</text>
    <text x="380" y="245" font-family="Arial" font-size="9" fill="#333">• Leaf theorem: n₀ = n₂ + 1</text>
  </g>
  
  <g class="step" id="step3" data-narration="Full binary trees have zero or two children per node. Complete trees fill left-to-right, perfect trees have all levels completely filled.">
    <rect x="10" y="274" width="780" height="90" fill="#fff3e0" rx="8"/>
    <text x="30" y="294" font-family="Arial" font-size="13" font-weight="bold" fill="#f57c00">Types of Binary Trees</text>
    <text x="80" y="315" font-family="Arial" font-size="9" fill="#e65100">Full</text>
    <circle cx="110" cy="330" r="12" fill="#ff9800" stroke="#e65100" stroke-width="1.5"/>
    <line x1="98" y1="335" x2="80" y2="350" stroke="#666" stroke-width="1"/>
    <line x1="122" y1="335" x2="140" y2="350" stroke="#666" stroke-width="1"/>
    <circle cx="75" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <circle cx="145" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <text x="220" y="315" font-family="Arial" font-size="9" fill="#e65100">Complete</text>
    <circle cx="250" cy="330" r="12" fill="#ff9800" stroke="#e65100" stroke-width="1.5"/>
    <line x1="238" y1="335" x2="220" y2="350" stroke="#666" stroke-width="1"/>
    <line x1="262" y1="335" x2="280" y2="350" stroke="#666" stroke-width="1"/>
    <circle cx="215" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <circle cx="235" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <circle cx="285" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <text x="360" y="315" font-family="Arial" font-size="9" fill="#e65100">Perfect</text>
    <circle cx="390" cy="330" r="12" fill="#ff9800" stroke="#e65100" stroke-width="1.5"/>
    <line x1="378" y1="335" x2="355" y2="350" stroke="#666" stroke-width="1"/>
    <line x1="402" y1="335" x2="425" y2="350" stroke="#666" stroke-width="1"/>
    <circle cx="350" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <circle cx="370" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <circle cx="410" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <circle cx="430" cy="355" r="8" fill="#ffcc80" stroke="#ff9800"/>
    <text x="500" y="315" font-family="Arial" font-size="9" fill="#333">Full: 0 or 2 children</text>
    <text x="500" y="330" font-family="Arial" font-size="9" fill="#333">Complete: fill left-to-right</text>
    <text x="500" y="345" font-family="Arial" font-size="9" fill="#333">Perfect: all levels full</text>
  </g>
  
  <g class="step" id="step4" data-narration="Array stores level-by-level: parent(i)=(i-1)/2, left=2i+1, right=2i+2. Linked uses struct with data, left, right pointers.">
    <rect x="10" y="372" width="780" height="85" fill="#ffebee" rx="8"/>
    <text x="30" y="392" font-family="Arial" font-size="13" font-weight="bold" fill="#d32f2f">Binary Tree Representations</text>
    <text x="50" y="415" font-family="Arial" font-size="10" fill="#c62828">Array</text>
    <rect x="50" y="422" width="150" height="18" fill="#ffcdd2" stroke="#ef5350" rx="3"/>
    <text x="60" y="435" font-family="Arial" font-size="8" fill="#333">A  B  C  D  E</text>
    <text x="50" y="450" font-family="Arial" font-size="8" fill="#666">Index: 0  1  2  3  4</text>
    <text x="220" y="415" font-family="Arial" font-size="10" fill="#c62828">Linked (struct)</text>
    <rect x="220" y="422" width="35" height="20" fill="#ffcdd2" stroke="#ef5350" rx="3"/>
    <rect x="260" y="422" width="18" height="20" fill="#ffcdd2" stroke="#ef5350" rx="3"/>
    <rect x="283" y="422" width="18" height="20" fill="#ffcdd2" stroke="#ef5350" rx="3"/>
    <text x="320" y="415" font-family="Arial" font-size="9" fill="#c62828">Formulas:</text>
    <text x="320" y="430" font-family="Arial" font-size="8" fill="#333">Parent = (i-1)/2</text>
    <text x="320" y="445" font-family="Arial" font-size="8" fill="#333">Left = 2i+1</text>
    <text x="320" y="460" font-family="Arial" font-size="8" fill="#333">Right = 2i+2</text>
  </g>
  
  <g class="step" id="step5" data-narration="Inorder visits Left-Root-Right, Preorder visits Root-Left-Right, Postorder visits Left-Right-Root, Level order visits level-by-level using queue.">
    <rect x="10" y="465" width="780" height="90" fill="#f3e5f5" rx="8"/>
    <text x="30" y="485" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">Tree Traversals</text>
    <circle cx="100" cy="515" r="14" fill="#9c27b0" stroke="#6a1b9a" stroke-width="2"/>
    <text x="100" y="519" text-anchor="middle" font-family="Arial" font-size="9" fill="white">A</text>
    <line x1="86" y1="520" x2="65" y2="535" stroke="#666" stroke-width="1.5"/>
    <line x1="114" y1="520" x2="135" y2="535" stroke="#666" stroke-width="1.5"/>
    <circle cx="60" cy="540" r="11" fill="#ce93d8" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="60" y="544" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a148c">B</text>
    <circle cx="140" cy="540" r="11" fill="#ce93d8" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="140" y="544" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a148c">C</text>
    <text x="220" y="505" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Inorder:</text>
    <text x="220" y="520" font-family="Arial" font-size="8" fill="#333">B → A → C</text>
    <text x="220" y="535" font-family="Arial" font-size="7" fill="#666">L-Root-Right</text>
    <text x="320" y="505" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Preorder:</text>
    <text x="320" y="520" font-family="Arial" font-size="8" fill="#333">A → B → C</text>
    <text x="320" y="535" font-family="Arial" font-size="7" fill="#666">Root-Left-Right</text>
    <text x="420" y="505" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Postorder:</text>
    <text x="420" y="520" font-family="Arial" font-size="8" fill="#333">B → C → A</text>
    <text x="420" y="535" font-family="Arial" font-size="7" fill="#666">Left-Right-Root</text>
    <text x="520" y="505" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Level:</text>
    <text x="520" y="520" font-family="Arial" font-size="8" fill="#333">A → B → C</text>
    <text x="520" y="535" font-family="Arial" font-size="7" fill="#666">Queue-based</text>
  </g>
  
  <g class="step" id="step6" data-narration="Height counts edges to deepest leaf, leaf=0. Remember n₀ = n₂ + 1. Inorder on BST gives sorted order.">
    <rect x="10" y="563" width="780" height="35" fill="#e0f2f1" rx="8"/>
    <text x="30" y="583" font-family="Arial" font-size="13" font-weight="bold" fill="#00695c">Key: Height=edges, Leaf theorem n₀=n₂+1, Inorder on BST=sorted</text>
  </g>
</svg>