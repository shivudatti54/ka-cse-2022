<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Fundamental circuits form the essential building blocks of digital electronics and computer architecture, enabling all modern computing operations and system designs.">
    <rect x="0" y="10" width="800" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1565c0">Fundamental Circuits</text>
  </g>
  
  <g class="step" id="step1" data-narration="Combinational circuits produce outputs based solely on current inputs without memory, while sequential circuits incorporate memory elements to store past states for decision making.">
    <rect x="10" y="68" width="780" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="25" y="88" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">COMBINATIONAL CIRCUITS</text>
    <text x="25" y="105" font-family="Arial" font-size="9" fill="#1b5e20">Output = f(present inputs) | No memory | Examples: MUX, Decoder, Adder</text>
    <rect x="400" y="68" width="380" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="415" y="88" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">SEQUENTIAL CIRCUITS</text>
    <text x="415" y="105" font-family="Arial" font-size="9" fill="#bf360c">Output = f(present inputs, past states) | Has memory | Examples: Flip-Flops, Counters</text>
  </g>
  
  <g class="step" id="step2" data-narration="Three basic gates: AND outputs HIGH only when all inputs are HIGH. OR outputs HIGH when any input is HIGH, while NOT inverts the signal.">
    <rect x="10" y="156" width="780" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="25" y="176" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">BASIC LOGIC GATES</text>
    <g transform="translate(25, 190)">
      <rect x="0" y="0" width="80" height="35" fill="none" stroke="#7b1fa2" stroke-width="1.5" rx="3"/>
      <text x="40" y="22" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">AND</text>
      <text x="10" y="12" font-family="Arial" font-size="8" fill="#7b1fa2">A</text>
      <text x="10" y="28" font-family="Arial" font-size="8" fill="#7b1fa2">B</text>
      <text x="70" y="22" font-family="Arial" font-size="8" fill="#7b1fa2">Y</text>
    </g>
    <g transform="translate(150, 190)">
      <rect x="0" y="0" width="80" height="35" fill="none" stroke="#7b1fa2" stroke-width="1.5" rx="3"/>
      <text x="40" y="22" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">OR</text>
      <text x="10" y="12" font-family="Arial" font-size="8" fill="#7b1fa2">A</text>
      <text x="10" y="28" font-family="Arial" font-size="8" fill="#7b1fa2">B</text>
      <text x="70" y="22" font-family="Arial" font-size="8" fill="#7b1fa2">Y</text>
    </g>
    <g transform="translate(275, 190)">
      <rect x="0" y="0" width="50" height="35" fill="none" stroke="#7b1fa2" stroke-width="1.5" rx="3"/>
      <text x="25" y="22" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a148c">NOT</text>
      <text x="10" y="20" font-family="Arial" font-size="8" fill="#7b1fa2">A</text>
      <text x="40" y="22" font-family="Arial" font-size="8" fill="#7b1fa2">Y</text>
    </g>
    <text x="400" y="185" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Derived Gates</text>
    <text x="400" y="200" font-family="Arial" font-size="9" fill="#4a148c">NAND: Y = (AB)' | NOR: Y = (A+B)'</text>
    <text x="400" y="215" font-family="Arial" font-size="9" fill="#4a148c">XOR: Y = A⊕B | XNOR: Y = (A⊕B)'</text>
    <text x="680" y="195" font-family="Arial" font-size="9" fill="#1b5e20">Y = A·B</text>
    <text x="680" y="210" font-family="Arial" font-size="9" fill="#1b5e20">Y = A+B</text>
    <text x="680" y="225" font-family="Arial" font-size="9" fill="#1b5e20">Y = A'</text>
  </g>
  
  <g class="step" id="step3" data-narration="A multiplexer selects one input from multiple sources using select lines. A 4-to-1 MUX uses 2 select lines to choose among 4 data inputs and route it to output.">
    <rect x="10" y="244" width="780" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="25" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">MULTIPLEXER (MUX) - 4-to-1</text>
    <text x="25" y="282" font-family="Arial" font-size="9" fill="#0d47a1">Select: S1 S0 choose I0-I3 | Y = I0·S1'·S0' + I1·S1'·S0 + I2·S1·S0' + I3·S1·S0</text>
    <g transform="translate(280, 260)">
      <rect x="0" y="0" width="80" height="50" fill="none" stroke="#1565c0" stroke-width="1.5" rx="3"/>
      <text x="40" y="20" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">4:1</text>
      <text x="40" y="32" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">MUX</text>
      <line x1="-25" y1="10" x2="0" y2="10" stroke="#1565c0" stroke-width="1"/>
      <line x1="-25" y1="20" x2="0" y2="20" stroke="#1565c0" stroke-width="1"/>
      <line x1="-25" y1="30" x2="0" y2="30" stroke="#1565c0" stroke-width="1"/>
      <line x1="-25" y1="40" x2="0" y2="40" stroke="#1565c0" stroke-width="1"/>
      <line x1="-40" y1="55" x2="-20" y2="55" stroke="#1565c0" stroke-width="1"/>
      <line x1="-40" y1="60" x2="-20" y2="60" stroke="#1565c0" stroke-width="1"/>
      <line x1="80" y1="25" x2="100" y2="25" stroke="#1565c0" stroke-width="1" marker-end="url(#arrowhead)"/>
      <text x="-50" y="12" font-family="Arial" font-size="7" fill="#1565c0">I0</text>
      <text x="-50" y="22" font-family="Arial" font-size="7" fill="#1565c0">I1</text>
      <text x="-50" y="32" font-family="Arial" font-size="7" fill="#1565c0">I2</text>
      <text x="-50" y="42" font-family="Arial" font-size="7" fill="#1565c0">I3</text>
      <text x="-55" y="57" font-family="Arial" font-size="7" fill="#1565c0">S1</text>
      <text x="-55" y="62" font-family="Arial" font-size="7" fill="#1565c0">S0</text>
      <text x="85" y="28" font-family="Arial" font-size="7" fill="#1565c0">Y</text>
    </g>
    <text x="480" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">DEMUX - 1-to-4</text>
    <text x="480" y="282" font-family="Arial" font-size="9" fill="#0d47a1">Distributes single input to one output based on select lines</text>
    <g transform="translate(580, 260)">
      <rect x="0" y="0" width="80" height="50" fill="none" stroke="#1565c0" stroke-width="1.5" rx="3"/>
      <text x="40" y="20" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">1:4</text>
      <text x="40" y="32" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">DEMUX</text>
      <line x1="-25" y1="25" x2="0" y2="25" stroke="#1565c0" stroke-width="1"/>
      <line x1="-40" y1="55" x2="-20" y2="55" stroke="#1565c0" stroke-width="1"/>
      <line x1="-40" y1="60" x2="-20" y2="60" stroke="#1565c0" stroke-width="1"/>
      <line x1="80" y1="10" x2="100" y2="10" stroke="#1565c0" stroke-width="1"/>
      <line x1="80" y1="20" x2="100" y2="20" stroke="#1565c0" stroke-width="1"/>
      <line x1="80" y1="30" x2="100" y2="30" stroke="#1565c0" stroke-width="1"/>
      <line x1="80" y1="40" x2="100" y2="40" stroke="#1565c0" stroke-width="1"/>
      <text x="-50" y="28" font-family="Arial" font-size="7" fill="#1565c0">I</text>
      <text x="-55" y="57" font-family="Arial" font-size="7" fill="#1565c0">S1</text>
      <text x="-55" y="62" font-family="Arial" font-size="7" fill="#1565c0">S0</text>
      <text x="103" y="12" font-family="Arial" font-size="7" fill="#1565c0">Y0</text>
      <text x="103" y="22" font-family="Arial" font-size="7" fill="#1565c0">Y1</text>
      <text x="103" y="32" font-family="Arial" font-size="7" fill="#1565c0">Y2</text>
      <text x="103" y="42" font-family="Arial" font-size="7" fill="#1565c0">Y3</text>
    </g>
  </g>
  
  <g class="step" id="step4" data-narration="Encoders convert 2^n inputs to n outputs, while decoders perform the reverse operation by converting n inputs to 2^n outputs with one-hot encoding.">
    <rect x="10" y="332" width="780" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="25" y="352" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">ENCODER - 8-to-3</text>
    <text x="25" y="370" font-family="Arial" font-size="9" fill="#bf360c">Converts 8 input lines to 3-bit binary code | Priority encoder handles multiple active inputs</text>
    <g transform="translate(30, 380)">
      <rect x="0" y="0" width="180" height="20" fill="none" stroke="#e65100" stroke-width="1"/>
      <text x="15" y="14" font-family="Arial" font-size="7" fill="#e65100">I0</text>
      <text x="40" y="14" font-family="Arial" font-size="7" fill="#e65100">I1</text>
      <text x="65" y="14" font-family="Arial" font-size="7" fill="#e65100">I2</text>
      <text x="90" y="14" font-family="Arial" font-size="7" fill="#e65100">I3</text>
      <text x="115" y="14" font-family="Arial" font-size="7" fill="#e65100">I4</text>
      <text x="140" y="14" font-family="Arial" font-size="7" fill="#e65100">I5</text>
      <text x="165" y="14" font-family="Arial" font-size="7" fill="#e65100">I6</text>
      <text x="185" y="14" font-family="Arial" font-size="7" fill="#e65100">I7</text>
      <rect x="0" y="22" width="180" height="20" fill="none" stroke="#e65100" stroke-width="1"/>
      <text x="60" y="35" font-family="Arial" font-size="8" font-weight="bold" fill="#bf360c">A B C</text>
    </g>
    <text x="300" y="352" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">DECODER - 3-to-8</text>
    <text x="300" y="370" font-family="Arial" font-size="9" fill="#bf360c">Converts 3-bit input to one of 8 outputs | Y0=A'B'C', Y7=ABC</text>
    <g transform="translate(300, 380)">
      <rect x="0" y="0" width="50" height="20" fill="none" stroke="#e65100" stroke-width="1"/>
      <text x="15" y="14" font-family="Arial" font-size="7" fill="#e65100">A B C</text>
      <rect x="52" y="0" width="180" height="20" fill="none" stroke="#e65100" stroke-width="1"/>
      <text x="67" y="14" font-family="Arial" font-size="7" fill="#e65100">Y0</text>
      <text x="92" y="14" font-family="Arial" font-size="7" fill="#e65100">Y1</text>
      <text x="117" y="14" font-family="Arial" font-size="7" fill="#e65100">Y2</text>
      <text x="142" y="14" font-family="Arial" font-size="7" fill="#e65100">Y3</text>
      <text x="167" y="14" font-family="Arial" font-size="7" fill="#e65100">Y4</text>
      <text x="192" y="14" font-family="Arial" font-size="7" fill="#e65100">Y5</text>
      <text x="217" y="14" font-family="Arial" font-size="7" fill="#e65100">Y6</text>
      <text x="235" y="14" font-family="Arial" font-size="7" fill="#e65100">Y7</text>
    </g>
  </g>
  
  <g class="step" id="step5" data-narration="Latches are level-triggered memory elements like the SR latch with Set and Reset inputs, while flip-flops are edge-triggered devices that capture input at clock transitions.">
    <rect x="10" y="420" width="780" height="80" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="25" y="440" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">SR LATCH (Level-Triggered)</text>
    <text x="25" y="460" font-family="Arial" font-size="9" fill="#b71c1c">S=1,R=0 → Q=1 | S=0,R=1 → Q=0 | S=0,R=0 → No change | S=1,R=1 → Forbidden</text>
    <g transform="translate(25, 468)">
      <rect x="0" y="0" width="70" height="25" fill="none" stroke="#c62828" stroke-width="1.5" rx="2"/>
      <text x="35" y="16" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">SR LATCH</text>
      <line x1="-20" y1="8" x2="0" y2="8" stroke="#c62828" stroke-width="1"/>
      <line x1="-20" y1="17" x2="0" y2="17" stroke="#c62828" stroke-width="1"/>
      <line x1="70" y1="8" x2="90" y2="8" stroke="#c62828" stroke-width="1"/>
      <line x1="70" y1="17" x2="90" y2="17" stroke="#c62828" stroke-width="1"/>
      <text x="-30" y="11" font-family="Arial" font-size="7" fill="#c62828">S</text>
      <text x="-30" y="20" font-family="Arial" font-size="7" fill="#c62828">R</text>
      <text x="95" y="11" font-family="Arial" font-size="7" fill="#c62828">Q</text>
      <text x="95" y="20" font-family="Arial" font-size="7" fill="#c62828">Q'</text>
    </g>
    <text x="300" y="440" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">FLIP-FLOPS (Edge-Triggered)</text>
    <g transform="translate(300, 455)">
      <rect x="0" y="0" width="55" height="35" fill="none" stroke="#c62828" stroke-width="1.5" rx="2"/>
      <text x="27" y="15" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">SR FF</text>
      <line x1="-12" y1="10" x2="0" y2="10" stroke="#c62828" stroke-width="1"/>
      <line x1="-12" y1="20" x2="0" y2="20" stroke="#c62828" stroke-width="1"/>
      <line x1="-12" y1="30" x2="0" y2="30" stroke="#c62828" stroke-width="1"/>
      <line x1="55" y1="17" x2="70" y2="17" stroke="#c62828" stroke-width="1" marker-end="url(#arrowhead)"/>
      <text x="-22" y="13" font-family="Arial" font-size="6" fill="#c62828">S</text>
      <text x="-22" y="23" font-family="Arial" font-size="6" fill="#c62828">R</text>
      <text x="-22" y="33" font-family="Arial" font-size="6" fill="#c62828">CLK</text>
      <text x="75" y="20" font-family="Arial" font-size="7" fill="#c62828">Q</text>
    </g>
    <g transform="translate(370, 455)">
      <rect x="0" y="0" width="55" height="35" fill="none" stroke="#c62828" stroke-width="1.5" rx="2"/>
      <text x="27" y="15" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">D FF</text>
      <line x1="-12" y1="10" x2="0" y2="10" stroke="#c62828" stroke-width="1"/>
      <line x1="-12" y1="30" x2="0" y2="30" stroke="#c62828" stroke-width="1"/>
      <line x1="55" y1="17" x2="70" y2="17" stroke="#c62828" stroke-width="1" marker-end="url(#arrowhead)"/>
      <text x="-22" y="13" font-family="Arial" font-size="6" fill="#c62828">D</text>
      <text x="-22" y="33" font-family="Arial" font-size="6" fill="#c62828">CLK</text>
      <text x="75" y="20" font-family="Arial" font-size="7" fill="#c62828">Q</text>
    </g>
    <g transform="translate(440, 455)">
      <rect x="0" y="0" width="55" height="35" fill="none" stroke="#c62828" stroke-width="1.5" rx="2"/>
      <text x="27" y="15" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">JK FF</text>
      <line x1="-12" y1="8" x2="0" y2="8" stroke="#c62828" stroke-width="1"/>
      <line x1="-12" y1="17" x2="0" y2="17" stroke="#c62828" stroke-width="1"/>
      <line x1="-12" y1="30" x2="0" y2="30" stroke="#c62828" stroke-width="1"/>
      <line x1="55" y1="17" x2="70" y2="17" stroke="#c62828" stroke-width="1" marker-end="url(#arrowhead)"/>
      <text x="-22" y="11" font-family="Arial" font-size="6" fill="#c62828">J</text>
      <text x="-22" y="20" font-family="Arial" font-size="6" fill="#c62828">K</text>
      <text x="-22" y="33" font-family="Arial" font-size="6" fill="#c62828">CLK</text>
      <text x="75" y="20" font-family="Arial" font-size="7" fill="#c62828">Q</text>
    </g>
    <g transform="translate(510, 455)">
      <rect x="0" y="0" width="55" height="35" fill="none" stroke="#c62828" stroke-width="1.5" rx="2"/>
      <text x="27" y="15" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">T FF</text>
      <line x1="-12" y1="10" x2="0" y2="10" stroke="#c62828" stroke-width="1"/>
      <line x1="-12" y1="30" x2="0" y2="30" stroke="#c62828" stroke-width="1"/>
      <line x1="55" y1="17" x2="70" y2="17" stroke="#c62828" stroke-width="1" marker-end="url(#arrowhead)"/>
      <text x="-22" y="13" font-family="Arial" font-size="6" fill="#c62828">T</text>
      <text x="-22" y="33" font-family="Arial" font-size="6" fill="#c62828">CLK</text>
      <text x="75" y="20" font-family="Arial" font-size="7" fill="#c62828">Q</text>
    </g>
    <text x="580" y="465" font-family="Arial" font-size="8" fill="#b71c1c">D: Q=D | JK: J=K=1→Toggle</text>
    <text x="580" y="478" font-family="Arial" font-size="8" fill="#b71c1c">T: T=1→Toggle | SR: Same as latch</text>
  </g>
  
  <g class="step" id="step6" data-narration="Registers store multiple bits using groups of flip-flops for temporary data in CPUs, while counters sequence through binary states using flip-flops to track events or time.">
    <rect x="10" y="508" width="780" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="25" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20">REGISTER - N-bit Storage</text>
    <text x="25" y="546" font-family="Arial" font-size="9" fill="#2e7d32">Group of flip-flops storing N bits | Used in CPU for temporary data storage</text>
    <g transform="translate(25, 555)">
      <rect x="0" y="0" width="20" height="30" fill="none" stroke="#1b5e20" stroke-width="1.5" rx="2"/>
      <text x="10" y="20" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">D-FF</text>
      <line x1="20" y1="15" x2="30" y2="15" stroke="#1b5e20" stroke-width="1"/>
      <line x1="30" y1="15" x2="30" y2="22" stroke="#1b5e20" stroke-width="1"/>
      <line x1="30" y1="22" x2="40" y2="22" stroke="#1b5e20" stroke-width="1"/>
      <rect x="40" y="0" width="20" height="30" fill="none" stroke="#1b5e20" stroke-width="1.5" rx="2"/>
      <text x="50" y="20" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">D-FF</text>
      <line x1="60" y1="15" x2="70" y2="15" stroke="#1b5e20" stroke-width="1"/>
      <line x1="70" y1="15" x2="70" y2="22" stroke="#1b5e20" stroke-width="1"/>
      <line x1="70" y1="22" x2="80" y2="22" stroke="#1b5e20" stroke-width="1"/>
      <rect x="80" y="0" width="20" height="30" fill="none" stroke="#1b5e20" stroke-width="1.5" rx="2"/>
      <text x="90" y="20" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">D-FF</text>
      <line x1="100" y1="15" x2="110" y2="15" stroke="#1b5e20" stroke-width="1"/>
      <line x1="110" y1="15" x2="110" y2="22" stroke="#1b5e20" stroke-width="1"/>
      <line x1="110" y1="22" x2="120" y2="22" stroke="#1b5e20" stroke-width="1"/>
      <rect x="120" y="0" width="20" height="30" fill="none" stroke="#1b5e20" stroke-width="1.5" rx="2"/>
      <text x="130" y="20" text-anchor="middle" font-family="Arial" font-size="7" fill="#1b5e20">D-FF</text>
      <line x1="0" y1="22" x2="-10" y2="22" stroke="#1b5e20" stroke-width="1"/>
      <line x1="140" y1="15" x2="150" y2="15" stroke="#1b5e20" stroke-width="1" marker-end="url(#arrowgreen)"/>
      <line x1="-10" y1="22" x2="-10" y2="12" stroke="#1b5e20" stroke-width="1"/>
      <line x1="-10" y1="12" x2="150" y2="12" stroke="#1b5e20" stroke-width="1"/>
      <text x="155" y="18" font-family="Arial" font-size="7" fill="#1b5e20">Q3Q2Q1Q0</text>
      <text x="-20" y="25" font-family="Arial" font-size="7" fill="#1b5e20">D</text>
    </g>
  </g>
</svg>