<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Properties of Trees. We'll explore tree terminology, types, mathematical properties, BST operations, array representation, and key exam tips.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Properties of Trees</text>
  </g>
  
  <!-- step1: Basic Tree Terminology -->
  <g class="step" id="step1" data-narration="A tree has a root at top, leaves at bottom with no children. Nodes have parent-child relationships with degree counting children.">
    <rect x="10" y="58" width="780" height="80" fill="#e3f2fd" rx="8"/>
    <text x="30" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Basic Tree Terminology</text>
    <rect x="30" y="88" width="140" height="40" fill="white" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="100" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Root (no parent)</text>
    <rect x="180" y="88" width="140" height="40" fill="white" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="250" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Leaf (no children)</text>
    <rect x="330" y="88" width="140" height="40" fill="white" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Degree: #children</text>
    <rect x="480" y="88" width="140" height="40" fill="white" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="550" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Depth: root to node</text>
    <rect x="630" y="88" width="140" height="40" fill="white" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="700" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Height: node to leaf</text>
  </g>
  
  <!-- step2: Binary Tree Types -->
  <g class="step" id="step2" data-narration="Binary trees have at most two children. A complete tree fills levels left-to-right, a full tree has zero or two children, and a perfect tree has all leaves at same level.">
    <rect x="10" y="146" width="780" height="80" fill="#e8f5e9" rx="8"/>
    <text x="30" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Types of Binary Trees</text>
    <!-- Binary Tree -->
    <rect x="30" y="180" width="170" height="36" fill="white" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="115" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Binary Tree</text>
    <text x="115" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(≤2 children)</text>
    <!-- Complete -->
    <rect x="220" y="180" width="170" height="36" fill="white" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="305" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Complete</text>
    <text x="305" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(filled left)</text>
    <!-- Full -->
    <rect x="410" y="180" width="170" height="36" fill="white" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="495" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Full/Proper</text>
    <text x="495" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(0 or 2 children)</text>
    <!-- Perfect -->
    <rect x="600" y="180" width="170" height="36" fill="white" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="685" y="202" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Perfect</text>
    <text x="685" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">(all leaves same level)</text>
  </g>
  
  <!-- step3: Mathematical Properties -->
  <g class="step" id="step3" data-narration="Key formulas: maximum nodes equals 2^(h+1) minus 1. The leaf theorem states leaf nodes equal internal nodes with two children plus one.">
    <rect x="10" y="234" width="780" height="80" fill="#fff3e0" rx="8"/>
    <text x="30" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Mathematical Properties</text>
    <rect x="30" y="268" width="230" height="36" fill="white" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="145" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Max Nodes = 2^(h+1) - 1</text>
    <text x="145" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">for height h</text>
    <rect x="280" y="268" width="230" height="36" fill="white" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="395" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Min Height = ⌊log₂(n)⌋</text>
    <text x="395" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">for n nodes</text>
    <rect x="530" y="268" width="240" height="36" fill="white" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="650" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Leaf = Degree2 + 1</text>
    <text x="650" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">(Important Theorem!)</text>
  </g>
  
  <!-- step4: BST & Traversals -->
  <g class="step" id="step4" data-narration="Binary Search Trees store left values less than root and right values greater. Inorder gives sorted output, preorder copies trees, postorder deletes trees.">
    <rect x="10" y="322" width="780" height="80" fill="#f3e5f5" rx="8"/>
    <text x="30" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">BST &amp; Tree Traversals</text>
    <rect x="30" y="356" width="230" height="36" fill="white" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="145" y="373" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">BST Property:</text>
    <text x="145" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Left &lt; Root &lt; Right</text>
    <rect x="280" y="356" width="155" height="36" fill="white" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="357" y="373" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Inorder:</text>
    <text x="357" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">L→Root→R (sorted)</text>
    <rect x="455" y="356" width="155" height="36" fill="white" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="532" y="373" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Preorder:</text>
    <text x="532" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Root→L→R (copy)</text>
    <rect x="630" y="356" width="140" height="36" fill="white" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="700" y="373" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Postorder:</text>
    <text x="700" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">L→R→Root (delete)</text>
  </g>
  
  <!-- step5: Array Representation -->
  <g class="step" id="step5" data-narration="Complete binary trees store efficiently in arrays. For index i, parent is at floor((i-1)/2), left child at 2i+1, and right child at 2i+2.">
    <rect x="10" y="410" width="780" height="89" fill="#e3f2fd" rx="8"/>
    <text x="30" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Array Representation (Complete Binary Tree)</text>
    <rect x="30" y="448" width="240" height="32" fill="white" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="150" y="465" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Parent(i) = ⌊(i-1)/2⌋</text>
    <rect x="290" y="448" width="240" height="32" fill="white" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="410" y="465" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Left Child(i) = 2i + 1</text>
    <rect x="550" y="448" width="220" height="32" fill="white" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="660" y="465" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Right Child(i) = 2i + 2</text>
    <text x="400" y="492" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Example: Index 7 → Parent=3, Left=15, Right=16</text>
  </g>
  
  <!-- step6: Exam Tips -->
  <g class="step" id="step6" data-narration="Remember these exam tips: height of single node is zero, not one. BST search is O(h) balanced but O(n) for skewed trees. Level-order uses a queue.">
    <rect x="10" y="507" width="780" height="76" fill="#ffebee" rx="8"/>
    <text x="30" y="527" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Exam Tips &amp; Common Mistakes</text>
    <rect x="30" y="539" width="235" height="34" fill="white" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="147" y="554" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">⚠ Height of single node = 0</text>
    <text x="147" y="567" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">⚠ Empty tree height = -1</text>
    <rect x="280" y="539" width="235" height="34" fill="white" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="397" y="554" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">⚠ BST: O(h) = O(log n) balanced</text>
    <text x="397" y="567" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">⚠ Skewed BST: O(n) = linear search</text>
    <rect x="530" y="539" width="240" height="34" fill="white" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="650" y="554" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">⚠ Level-order needs Queue</text>
    <text x="650" y="567" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">⚠ DFS: Stack/recursion</text>
  </g>
</svg>