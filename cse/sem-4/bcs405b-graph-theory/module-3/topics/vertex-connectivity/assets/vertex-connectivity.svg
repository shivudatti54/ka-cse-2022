<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Vertex Connectivity in Graphs. We'll explore how graphs resist disconnection by removing vertices and edges, learning key connectivity measures.">
    <rect x="0" y="0" width="800" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#0d47a1">Vertex Connectivity in Graphs</text>
  </g>
  
  <g class="step" id="step1" data-narration="Vertex connectivity κ(G) is the minimum vertices to disconnect. Edge connectivity λ(G) measures edge removal. Minimum degree δ(G) is smallest vertex degree.">
    <rect x="10" y="55" width="780" height="85" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="30" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#0d47a1">Key Definitions</text>
    <rect x="30" y="85" width="230" height="45" fill="#e3f2fd" rx="3"/>
    <text x="40" y="102" font-family="Arial" font-size="10" fill="#1565c0">Vertex Connectivity</text>
    <text x="40" y="118" font-family="Arial" font-size="9" fill="#333">κ(G) = min vertices to disconnect</text>
    <rect x="275" y="85" width="230" height="45" fill="#e8f5e9" rx="3"/>
    <text x="285" y="102" font-family="Arial" font-size="10" fill="#2e7d32">Edge Connectivity</text>
    <text x="285" y="118" font-family="Arial" font-size="9" fill="#333">λ(G) = min edges to disconnect</text>
    <rect x="520" y="85" width="230" height="45" fill="#fff3e0" rx="3"/>
    <text x="530" y="102" font-family="Arial" font-size="10" fill="#e65100">Minimum Degree</text>
    <text x="530" y="118" font-family="Arial" font-size="9" fill="#333">δ(G) = smallest vertex degree</text>
  </g>
  
  <g class="step" id="step2" data-narration="Whitney's Theorem establishes κ(G) ≤ λ(G) ≤ δ(G). Vertex connectivity never exceeds edge connectivity, which never exceeds minimum degree in any graph.">
    <rect x="10" y="148" width="780" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="30" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Whitney's Theorem</text>
    <text x="400" y="195" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#7b1fa2">κ(G) ≤ λ(G) ≤ δ(G)</text>
    <rect x="150" y="208" width="140" height="15" fill="#e1bee7" rx="2"/>
    <text x="220" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">κ(G) = vertex connectivity</text>
    <rect x="330" y="208" width="140" height="15" fill="#e1bee7" rx="2"/>
    <text x="400" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">λ(G) = edge connectivity</text>
    <rect x="510" y="208" width="140" height="15" fill="#e1bee7" rx="2"/>
    <text x="580" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#4a148c">δ(G) = minimum degree</text>
  </g>
  
  <g class="step" id="step3" data-narration="Special graphs: Kₙ has κ=λ=δ=n-1, cycles Cₙ have κ=λ=2, bipartite Kₘₙ has κ=λ=min(m,n).">
    <rect x="10" y="236" width="780" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="30" y="256" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20">Special Graph Classes</text>
    <rect x="30" y="270" width="230" height="40" fill="#e8f5e9" rx="3"/>
    <text x="145" y="287" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Complete Graph Kₙ</text>
    <text x="145" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">κ = λ = δ = n-1</text>
    <rect x="285" y="270" width="230" height="40" fill="#e8f5e9" rx="3"/>
    <text x="400" y="287" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Cycle Cₙ (n≥3)</text>
    <text x="400" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">κ = λ = 2</text>
    <rect x="540" y="270" width="230" height="40" fill="#e8f5e9" rx="3"/>
    <text x="655" y="287" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Complete Bipartite Kₘₙ</text>
    <text x="655" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">κ = λ = min(m,n)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Menger's Theorem: maximum vertex-disjoint paths between two vertices equals the minimum vertex cut size separating them.">
    <rect x="10" y="324" width="780" height="80" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="30" y="344" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Menger's Theorem</text>
    <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ef6c00">Maximum Vertex-Disjoint Paths = Minimum Vertex Cut</text>
    <rect x="120" y="380" width="260" height="20" fill="#fff3e0" rx="3"/>
    <text x="250" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Vertex-disjoint paths from s to t</text>
    <rect x="420" y="380" width="260" height="20" fill="#fff3e0" rx="3"/>
    <text x="550" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Minimum vertices separating s from t</text>
  </g>
  
  <g class="step" id="step5" data-narration="Wheel graph W₆: outer vertices degree 3 (δ=3), vertex connectivity κ=2. Verifies κ ≤ δ, so 2 ≤ 3.">
    <rect x="10" y="412" width="780" height="80" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="30" y="432" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Example: Wheel Graph W₆</text>
    <circle cx="180" cy="465" r="15" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
    <text x="180" y="469" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#b71c1c">v₀</text>
    <circle cx="130" cy="430" r="10" fill="#ffebee" stroke="#c62828"/>
    <text x="130" y="433" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">v₁</text>
    <circle cx="230" cy="430" r="10" fill="#ffebee" stroke="#c62828"/>
    <text x="230" y="433" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">v₂</text>
    <circle cx="250" cy="470" r="10" fill="#ffebee" stroke="#c62828"/>
    <text x="250" y="473" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">v₃</text>
    <circle cx="110" cy="470" r="10" fill="#ffebee" stroke="#c62828"/>
    <text x="110" y="473" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">v₄</text>
    <line x1="175" y1="455" x2="135" y2="438" stroke="#c62828" stroke-width="1"/>
    <line x1="185" y1="455" x2="225" y2="438" stroke="#c62828" stroke-width="1"/>
    <line x1="190" y1="468" x2="245" y2="470" stroke="#c62828" stroke-width="1"/>
    <line x1="170" y1="468" x2="115" y2="470" stroke="#c62828" stroke-width="1"/>
    <line x1="130" y1="440" x2="220" y2="440" stroke="#c62828" stroke-width="1"/>
    <line x1="115" y1="460" x2="115" y2="480" stroke="#c62828" stroke-width="1"/>
    <line x1="240" y1="460" x2="240" y2="480" stroke="#c62828" stroke-width="1"/>
    <text x="350" y="450" font-family="Arial" font-size="10" fill="#333">δ(W₆) = 3 (outer vertices)</text>
    <text x="350" y="468" font-family="Arial" font-size="10" fill="#333">κ(W₆) = 2 (remove 2 outer)</text>
    <text x="350" y="486" font-family="Arial" font-size="10" fill="#333">Verifies: κ ≤ δ → 2 ≤ 3</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key formulas: κ(G) ≤ λ(G) ≤ δ(G). Kₙ has κ=n-1, cycles have κ=2. Apply Menger's theorem for disjoint paths.">
    <rect x="10" y="500" width="780" height="85" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="30" y="525" font-family="Arial" font-size="12" font-weight="bold" fill="#0d47a1">Summary &amp; Key Formulas</text>
    <text x="30" y="550" font-family="Arial" font-size="10" fill="#1565c0">• κ(G) ≤ λ(G) ≤ δ(G) — Whitney's Theorem</text>
    <text x="30" y="568" font-family="Arial" font-size="10" fill="#1565c0">• Complete Graph Kₙ: κ = λ = δ = n-1</text>
    <text x="280" y="550" font-family="Arial" font-size="10" fill="#1565c0">• Cycle Cₙ: κ = λ = 2 (n≥3)</text>
    <text x="280" y="568" font-family="Arial" font-size="10" fill="#1565c0">• Kₘₙ: κ = λ = min(m,n)</text>
    <text x="530" y="550" font-family="Arial" font-size="10" fill="#1565c0">• Menger's: disjoint paths = cut size</text>
    <text x="530" y="568" font-family="Arial" font-size="10" fill="#1565c0">• κ ≤ δ always holds</text>
  </g>
</svg>