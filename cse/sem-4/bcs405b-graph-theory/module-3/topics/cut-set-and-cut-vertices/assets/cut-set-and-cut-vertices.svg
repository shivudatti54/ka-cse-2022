<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to this lesson on Cut-Sets and Cut-Vertices in graph theory. We will learn about vertex and edge connectivity and their practical applications.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Cut-Sets and Cut-Vertices</text>
  </g>
  
  <g class="step" id="step1" data-narration="A cut-vertex is a vertex whose removal disconnects the graph, increasing the number of connected components in the remaining graph.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">1. Cut-Vertex (Articulation Point)</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">Definition: A vertex v is a cut-vertex if removing v (and all incident edges)</text>
    <text x="40" y="118" font-family="Arial" font-size="11" fill="#333">increases the number of connected components in G.</text>
    <rect x="400" y="92" width="120" height="30" fill="#1976d2" rx="3"/>
    <text x="460" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="white">v is cut-vertex</text>
  </g>
  
  <g class="step" id="step2" data-narration="A bridge is an edge whose removal disconnects the graph. An edge is a bridge if and only if it does not lie on any cycle.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">2. Bridge (Cut-Edge)</text>
    <text x="40" y="188" font-family="Arial" font-size="11" fill="#333">Definition: An edge e = {u,v} is a bridge if removing e disconnects the graph.</text>
    <text x="40" y="206" font-family="Arial" font-size="11" fill="#333">Property: An edge is a bridge iff it does not lie on any cycle.</text>
    <line x1="420" y1="175" x2="480" y2="175" stroke="#388e3c" stroke-width="3"/>
    <circle cx="420" cy="175" r="5" fill="#388e3c"/>
    <circle cx="480" cy="175" r="5" fill="#388e3c"/>
    <text x="450" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Bridge</text>
  </g>
  
  <g class="step" id="step3" data-narration="A cut-set is a minimal set of edges whose removal disconnects the graph. Types include minimal cut-set and minimum cut-set.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="5"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">3. Cut-Set</text>
    <text x="40" y="276" font-family="Arial" font-size="11" fill="#333">Definition: A set of edges whose removal disconnects the graph.</text>
    <text x="40" y="294" font-family="Arial" font-size="11" fill="#333">Minimal: No proper subset disconnects the graph.</text>
    <text x="40" y="312" font-family="Arial" font-size="11" fill="#333">Minimum: Cut-set with minimum number of edges.</text>
    <rect x="420" y="260" width="200" height="40" fill="#ff9800" rx="3"/>
    <text x="520" y="285" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Edge Cut-Set</text>
  </g>
  
  <g class="step" id="step4" data-narration="Edge connectivity λ(G) is the minimum edges to disconnect G. Vertex connectivity κ(G) is the minimum vertices to disconnect G.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="5"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">4. Edge and Vertex Connectivity</text>
    <text x="40" y="364" font-family="Arial" font-size="11" fill="#333">Edge Connectivity λ(G): Minimum edges whose removal disconnects G.</text>
    <text x="40" y="382" font-family="Arial" font-size="11" fill="#333">Vertex Connectivity κ(G): Minimum vertices whose removal disconnects G.</text>
    <text x="40" y="400" font-family="Arial" font-size="11" fill="#333">Whitney's Theorem: κ(G) ≤ λ(G) ≤ δ(G)</text>
    <rect x="450" y="350" width="180" height="40" fill="#9c27b0" rx="3"/>
    <text x="540" y="375" text-anchor="middle" font-family="Arial" font-size="11" fill="white">λ(G) ≤ δ(G), κ(G) ≤ δ(G)</text>
  </g>
  
  <g class="step" id="step5" data-narration="DFS algorithm finds cut-vertices using discovery time and low values. A non-root vertex is a cut-vertex if low[child] ≥ discovery[vertex].">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="5"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">5. Finding Cut-Vertices (DFS Algorithm)</text>
    <text x="40" y="452" font-family="Arial" font-size="11" fill="#333">For each vertex v, compute discovery time d[v] and earliest reachable low[v].</text>
    <text x="40" y="470" font-family="Arial" font-size="11" fill="#333">Root: Cut-vertex if it has ≥2 children in DFS tree.</text>
    <text x="40" y="488" font-family="Arial" font-size="11" fill="#333">Non-root v: Cut-vertex if ∃ child u such that low[u] ≥ d[v].</text>
    <rect x="450" y="438" width="200" height="35" fill="#f44336" rx="3"/>
    <text x="550" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="white">O(V+E) time complexity</text>
  </g>
  
  <g class="step" id="step6" data-narration="Example: In this graph, vertices B, C, D are cut-vertices and edges B-C and C-E are bridges. This clearly demonstrates the concepts learned in this lesson.">
    <rect x="20" y="498" width="760" height="100" fill="#e3f2fd" rx="5"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">6. Example</text>
    <text x="40" y="540" font-family="Arial" font-size="11" fill="#333">Identify cut-vertices and bridges in this graph:</text>
    <line x1="200" y1="535" x2="260" y2="535" stroke="#1976d2" stroke-width="2"/>
    <line x1="260" y1="535" x2="320" y2="535" stroke="#f44336" stroke-width="3"/>
    <line x1="260" y1="535" x2="260" y2="585" stroke="#1976d2" stroke-width="2"/>
    <line x1="260" y1="585" x2="320" y2="585" stroke="#1976d2" stroke-width="2"/>
    <line x1="320" y1="535" x2="320" y2="585" stroke="#f44336" stroke-width="3"/>
    <circle cx="200" cy="535" r="8" fill="#1976d2"/>
    <text x="200" y="539" text-anchor="middle" font-family="Arial" font-size="8" fill="white">A</text>
    <circle cx="260" cy="535" r="8" fill="#f44336"/>
    <text x="260" y="539" text-anchor="middle" font-family="Arial" font-size="8" fill="white">B</text>
    <circle cx="320" cy="535" r="8" fill="#f44336"/>
    <text x="320" y="539" text-anchor="middle" font-family="Arial" font-size="8" fill="white">C</text>
    <circle cx="260" cy="585" r="8" fill="#f44336"/>
    <text x="260" y="589" text-anchor="middle" font-family="Arial" font-size="8" fill="white">D</text>
    <circle cx="320" cy="585" r="8" fill="#1976d2"/>
    <text x="320" y="589" text-anchor="middle" font-family="Arial" font-size="8" fill="white">E</text>
    <text x="450" y="530" font-family="Arial" font-size="10" fill="#333">Cut-vertices: B, C, D</text>
    <text x="450" y="550" font-family="Arial" font-size="10" fill="#333">Bridges: B-C, C-E</text>
    <text x="450" y="570" font-family="Arial" font-size="10" fill="#333">Not cut-vertices: A, E (degree 1)</text>
  </g>
</svg>