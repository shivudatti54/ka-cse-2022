<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="Edge-connectivity measures network resilience against link failures. It quantifies the minimum edges needed to completely disconnect a graph into components.">
<rect x="10" y="10" width="780" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Edge-Connectivity in Graph Theory</text>
</g>
<g class="step" id="step1" data-narration="An edge cut is a set of edges whose removal disconnects the graph. The minimum edge cut has the smallest cardinality among all such edge sets.">
<rect x="10" y="58" width="780" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="20" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Edge Cut Definition</text>
<rect x="20" y="85" width="180" height="45" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
<text x="110" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Edge Cut</text>
<text x="110" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">Set of edges whose</text>
<text x="110" y="126" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">removal disconnects</text>
<path d="M210 107 L250 107" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
<text x="270" y="100" font-family="Arial" font-size="11" fill="#2e7d32">Example: C₄ (cycle)</text>
<text x="270" y="115" font-family="Arial" font-size="10" fill="#388e3c">A---B</text>
<text x="270" y="127" font-family="Arial" font-size="10" fill="#388e3c">|   |</text>
<text x="270" y="139" font-family="Arial" font-size="10" fill="#388e3c">C---D</text>
<text x="420" y="100" font-family="Arial" font-size="11" fill="#2e7d32">Minimum Edge Cut</text>
<text x="420" y="115" font-family="Arial" font-size="10" fill="#388e3c">Removing any single edge</text>
<text x="420" y="127" font-family="Arial" font-size="10" fill="#388e3c">keeps C₄ connected</text>
<text x="420" y="139" font-family="Arial" font-size="10" fill="#388e3c">λ(C₄) = 2 edges needed</text>
</g>
<g class="step" id="step2" data-narration="Edge-connectivity λ(G) equals the minimum edges whose removal disconnects the graph. The inequality δ ≥ λ ≥ κ always holds for any graph.">
<rect x="10" y="151" width="780" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="20" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Edge-Connectivity Definition</text>
<rect x="20" y="180" width="240" height="45" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
<text x="140" y="197" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Formula</text>
<text x="140" y="212" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">λ(G) = min{|E'| : G-E' disconnected}</text>
<text x="140" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#bf360c">(Minimum edge cut size)</text>
<text x="280" y="180" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Fundamental Inequality</text>
<rect x="280" y="193" width="200" height="35" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
<text x="380" y="210" text-anchor="middle" font-family="Arial" font-size="12" fill="#e65100">δ(G) ≥ λ(G) ≥ κ(G)</text>
<text x="380" y="223" text-anchor="middle" font-family="Arial" font-size="9" fill="#bf360c">min degree ≥ edge-connectivity ≥ vertex-connectivity</text>
<text x="500" y="180" font-family="Arial" font-size="11" fill="#ff9800">For disconnected graphs:</text>
<text x="500" y="195" font-family="Arial" font-size="10" fill="#e65100">λ(G) = 0</text>
<text x="500" y="210" font-family="Arial" font-size="10" fill="#e65100">Cannot compute edge-connectivity</text>
<text x="500" y="225" font-family="Arial" font-size="10" fill="#e65100">of disconnected graph</text>
</g>
<g class="step" id="step3" data-narration="Edge-connectivity values for special graphs: Kₙ has n-1, cycle Cₙ has 2, path and star have 1, Kₘ,ₙ has min(m,n).">
<rect x="10" y="239" width="780" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="20" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Edge-Connectivity of Special Graphs</text>
<rect x="20" y="267" width="140" height="45" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
<text x="90" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Complete Kₙ</text>
<text x="90" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">λ = n - 1</text>
<rect x="170" y="267" width="140" height="45" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
<text x="240" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Cycle Cₙ</text>
<text x="240" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">λ = 2 (n ≥ 3)</text>
<rect x="320" y="267" width="140" height="45" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
<text x="390" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Path Pₙ</text>
<text x="390" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">λ = 1</text>
<rect x="470" y="267" width="140" height="45" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
<text x="540" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Star K₁,ₙ</text>
<text x="540" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">λ = 1</text>
<rect x="620" y="267" width="160" height="45" rx="3" fill="#e1bee7" stroke="#9c27b0"/>
<text x="700" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Complete Bipartite</text>
<text x="700" y="300" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">λ = min(m, n)</text>
</g>
<g class="step" id="step4" data-narration="Local edge-connectivity λ(u,v) measures minimum edges to separate vertices u and v. Whitney's Theorem states λ(G) equals the minimum λ(u,v).">
<rect x="10" y="327" width="780" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="20" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Local Edge-Connectivity &amp; Whitney's Theorem</text>
<rect x="20" y="355" width="220" height="45" rx="3" fill="#bbdefb" stroke="#1976d2"/>
<text x="130" y="373" text-anchor="middle" font-family="Arial" font-size="11" fill="#0d47a1">Local Edge-Connectivity</text>
<text x="130" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">λ(u,v) = min edges to separate u,v</text>
<text x="260" y="365" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Whitney's Theorem</text>
<text x="260" y="383" font-family="Arial" font-size="11" fill="#1565c0">λ(G) = min{λ(u,v) : u ≠ v ∈ V(G)}</text>
<text x="260" y="400" font-family="Arial" font-size="10" fill="#0d47a1">Global = minimum local edge-connectivity</text>
<rect x="480" y="355" width="300" height="45" rx="3" fill="#bbdefb" stroke="#1976d2"/>
<text x="630" y="373" text-anchor="middle" font-family="Arial" font-size="11" fill="#0d47a1">Max-Flow Min-Cut Connection</text>
<text x="630" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Max s-t flow = Min s-t edge cut</text>
<text x="630" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">(Flow algorithms compute edge-connectivity)</text>
</g>
<g class="step" id="step5" data-narration="Example: For graph G with vertices u,v,w,x, minimum local edge-connectivity is 1. Global λ(G) equals 1 by applying Whitney's Theorem.">
<rect x="10" y="415" width="780" height="90" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="20" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Example: Computing Edge-Connectivity</text>
<rect x="20" y="443" width="160" height="45" rx="3" fill="#ffcdd2" stroke="#f44336"/>
<text x="100" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Graph G</text>
<text x="100" y="475" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">u---v</text>
<text x="100" y="487" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">| /|</text>
<text x="100" y="499" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">w---x</text>
<text x="200" y="455" font-family="Arial" font-size="11" fill="#c62828">Local λ values:</text>
<text x="200" y="473" font-family="Arial" font-size="10" fill="#b71c1c">λ(u,v)=1, λ(u,w)=1</text>
<text x="200" y="488" font-family="Arial" font-size="10" fill="#b71c1c">λ(v,x)=1, λ(u,x)=2</text>
<rect x="350" y="443" width="180" height="45" rx="3" fill="#ffcdd2" stroke="#f44336"/>
<text x="440" y="460" text-anchor="middle" font-family="Arial" font-size="11" fill="#c62828">Minimum Local</text>
<text x="440" y="475" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">min = min{1,1,1,2}</text>
<text x="440" y="487" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">min = 1</text>
<text x="550" y="460" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">By Whitney's Theorem</text>
<text x="550" y="480" font-family="Arial" font-size="12" fill="#b71c1c">λ(G) = min = 1</text>
<text x="550" y="500" font-family="Arial" font-size="11" fill="#c62828">Removing edge (u,v) disconnects G</text>
</g>
<g class="step" id="step6" data-narration="A k-edge-connected graph has λ(G) ≥ k, remaining connected after removing any k-1 edges. Edge-connectivity is crucial for network fault tolerance.">
<rect x="10" y="513" width="780" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="20" y="530" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">K-Edge-Connected Graphs &amp; Summary</text>
<rect x="20" y="542" width="200" height="45" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
<text x="120" y="560" text-anchor="middle" font-family="Arial" font-size="11" fill="#1b5e20">K-Edge-Connected</text>
<text x="120" y="575" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">λ(G) ≥ k</text>
<text x="120" y="587" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Connected after removing (k-1) edges</text>
<rect x="230" y="542" width="250" height="45" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
<text x="355" y="560" text-anchor="middle" font-family="Arial" font-size="11" fill="#1b5e20">Key Formulas</text>
<text x="355" y="575" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">Kₙ: λ=n-1 | Cₙ: λ=2 | Pₙ: λ=1</text>
<text x="355" y="587" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Kₘ,ₙ: λ=min(m,n) | K₁,ₙ: λ=1</text>
<rect x="490" y="542" width="290" height="45" rx="3" fill="#c8e6c9" stroke="#388e3c"/>
<text x="635" y="560" text-anchor="middle" font-family="Arial" font-size="11" fill="#1b5e20">Exam Tips</text>
<text x="635" y="575" text-anchor="middle" font-family="Arial" font-size="10" fill="#2e7d32">δ ≥ λ ≥ κ | Verify answers with inequality</text>
<text x="635" y="587" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Remember: cycles need 2 edges to disconnect</text>
</g>
</svg>