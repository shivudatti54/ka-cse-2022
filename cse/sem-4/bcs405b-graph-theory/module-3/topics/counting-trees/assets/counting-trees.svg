<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Counting Trees explores methods to enumerate distinct tree structures in graph theory, essential for network design and algorithm analysis applications.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">COUNTING TREES</text>
  </g>

  <g class="step" id="step1" data-narration="A tree is a connected graph with no cycles having n vertices and n-1 edges. A spanning tree includes all vertices of the original graph.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Basic Definitions</text>
    <rect x="40" y="92" width="220" height="36" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="4"/>
    <text x="50" y="108" font-family="Arial" font-size="10" fill="#333">Tree: Connected, acyclic</text>
    <text x="50" y="122" font-family="Arial" font-size="10" fill="#333">graph (n vertices, n-1 edges)</text>
    <rect x="280" y="92" width="220" height="36" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="290" y="108" font-family="Arial" font-size="10" fill="#333">Spanning Tree: Subgraph</text>
    <text x="290" y="122" font-family="Arial" font-size="10" fill="#333">that is a tree, all vertices</text>
    <rect x="520" y="92" width="240" height="36" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="530" y="108" font-family="Arial" font-size="10" fill="#333">Labeled Tree: Unique vertex</text>
    <text x="530" y="122" font-family="Arial" font-size="10" fill="#333">identifiers (1 to n)</text>
  </g>

  <g class="step" id="step2" data-narration="Cayley's Formula states the number of labeled trees on n vertices equals n^(n-2). This remarkable result gives 125 trees for 5 vertices.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Cayley's Formula: n^(n-2)</text>
    <text x="40" y="190" font-family="Arial" font-size="11" fill="#333">For n labeled vertices, number of trees = n^(n-2)</text>
    <rect x="40" y="200" width="160" height="20" fill="#c8e6c9" rx="4"/>
    <text x="50" y="214" font-family="Arial" font-size="10" fill="#2e7d32">n=2: 2^0 = 1 tree</text>
    <rect x="210" y="200" width="160" height="20" fill="#c8e6c9" rx="4"/>
    <text x="220" y="214" font-family="Arial" font-size="10" fill="#2e7d32">n=3: 3^1 = 3 trees</text>
    <rect x="380" y="200" width="160" height="20" fill="#c8e6c9" rx="4"/>
    <text x="390" y="214" font-family="Arial" font-size="10" fill="#2e7d32">n=4: 4^2 = 16 trees</text>
    <rect x="550" y="200" width="160" height="20" fill="#c8e6c9" rx="4"/>
    <text x="560" y="214" font-family="Arial" font-size="10" fill="#2e7d32">n=5: 5^3 = 125 trees</text>
  </g>

  <g class="step" id="step3" data-narration="A Prüfer sequence of length n-2 uniquely encodes a labeled tree. Each of the n^(n-2) sequences corresponds to exactly one tree.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Prüfer Sequence Encoding</text>
    <text x="40" y="278" font-family="Arial" font-size="11" fill="#333">Sequence of length n-2; each element is a vertex label (1 to n)</text>
    <rect x="40" y="288" width="340" height="20" fill="#ffe0b2" rx="4"/>
    <text x="50" y="302" font-family="Arial" font-size="10" fill="#e65100">Example: For n=6, Prüfer (2,2,5) decodes to edges: 1-2, 3-2, 4-5, 6-5</text>
    <rect x="400" y="288" width="360" height="20" fill="#ffe0b2" rx="4"/>
    <text x="410" y="302" font-family="Arial" font-size="10" fill="#e65100">Bijection proof: n^(n-2) sequences → n^(n-2) labeled trees</text>
  </g>

  <g class="step" id="step4" data-narration="Kirchhoff's Matrix-Tree Theorem: The number of spanning trees equals any cofactor of the Laplacian matrix. Apply to any connected graph.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Kirchhoff's Matrix-Tree Theorem</text>
    <text x="40" y="366" font-family="Arial" font-size="11" fill="#333">Steps: Build Laplacian L (deg on diagonal, -1 for edges), delete one row/column, find determinant</text>
    <rect x="40" y="376" width="240" height="20" fill="#e1bee7" rx="4"/>
    <text x="50" y="390" font-family="Arial" font-size="10" fill="#6a1b9a">K4 Laplacian: each vertex degree 3</text>
    <rect x="300" y="376" width="220" height="20" fill="#e1bee7" rx="4"/>
    <text x="310" y="390" font-family="Arial" font-size="10" fill="#6a1b9a">Delete row4 &amp; col4: 3×3 matrix</text>
    <rect x="540" y="376" width="220" height="20" fill="#e1bee7" rx="4"/>
    <text x="550" y="390" font-family="Arial" font-size="10" fill="#6a1b9a">det(M) = 16 = 4^(4-2) = n^(n-2)</text>
  </g>

  <g class="step" id="step5" data-narration="Binary trees use Catalan numbers: C_n = (1/(n+1))×(2n choose n). Rooted labeled trees count is n^(n-1), multiplying by n choices for root.">
    <rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Types of Trees in Counting</text>
    <rect x="40" y="450" width="230" height="34" fill="#ffcdd2" rx="4"/>
    <text x="50" y="464" font-family="Arial" font-size="10" fill="#c62828">Binary Trees:</text>
    <text x="50" y="478" font-family="Arial" font-size="10" fill="#c62828">C_n = (1/(n+1)) × (2n choose n)</text>
    <rect x="290" y="450" width="230" height="34" fill="#ffcdd2" rx="4"/>
    <text x="300" y="464" font-family="Arial" font-size="10" fill="#c62828">Rooted Labeled Trees:</text>
    <text x="300" y="478" font-family="Arial" font-size="10" fill="#c62828">n^(n-1) = n × n^(n-2)</text>
    <rect x="540" y="450" width="230" height="34" fill="#ffcdd2" rx="4"/>
    <text x="550" y="464" font-family="Arial" font-size="10" fill="#c62828">Unlabeled (Free) Trees:</text>
    <text x="550" y="478" font-family="Arial" font-size="10" fill="#c62828">Complex sequence: 1,1,1,2,3,6,11...</text>
  </g>

  <g class="step" id="step6" data-narration="Remember: Cayley's n^(n-2) for labeled trees, Kirchhoff for spanning trees, Catalan for binary trees. Prüfer sequences provide complete encoding proof.">
    <rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Summary &amp; Key Formulas</text>
    <rect x="40" y="535" width="175" height="45" fill="#bbdefb" rx="4"/>
    <text x="50" y="550" font-family="Arial" font-size="10" fill="#0d47a1">Cayley's Formula</text>
    <text x="50" y="565" font-family="Arial" font-size="10" fill="#0d47a1">Labeled: n^(n-2)</text>
    <text x="50" y="580" font-family="Arial" font-size="10" fill="#0d47a1">Rooted: n^(n-1)</text>
    <rect x="230" y="535" width="175" height="45" fill="#bbdefb" rx="4"/>
    <text x="240" y="550" font-family="Arial" font-size="10" fill="#0d47a1">Kirchhoff's Theorem</text>
    <text x="240" y="565" font-family="Arial" font-size="10" fill="#0d47a1">Spanning trees =</text>
    <text x="240" y="580" font-family="Arial" font-size="10" fill="#0d47a1">det(any cofactor)</text>
    <rect x="420" y="535" width="175" height="45" fill="#bbdefb" rx="4"/>
    <text x="430" y="550" font-family="Arial" font-size="10" fill="#0d47a1">Binary Trees</text>
    <text x="430" y="565" font-family="Arial" font-size="10" fill="#0d47a1">Catalan: C_n =</text>
    <text x="430" y="580" font-family="Arial" font-size="10" fill="#0d47a1">(2n)!/((n+1)!n!)</text>
    <rect x="610" y="535" width="160" height="45" fill="#bbdefb" rx="4"/>
    <text x="620" y="550" font-family="Arial" font-size="10" fill="#0d47a1">Prüfer Sequence</text>
    <text x="620" y="565" font-family="Arial" font-size="10" fill="#0d47a1">Length: n-2</text>
    <text x="620" y="580" font-family="Arial" font-size="10" fill="#0d47a1">Bijective encoding</text>
  </g>
</svg>