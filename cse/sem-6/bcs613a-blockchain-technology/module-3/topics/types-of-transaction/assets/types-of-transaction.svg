<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ff9800"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="35" font-size="22" font-weight="bold" fill="#1976d2" text-anchor="middle">Types of Blockchain Transactions</text>
  <line x1="100" y1="45" x2="700" y2="45" stroke="#1976d2" stroke-width="2"/>

  <!-- Step 0: Introduction -->
  <g id="step0" data-narration="A blockchain transaction is a record of an exchange that is digitally signed by the sender, validated by the network, recorded permanently in a block, and becomes immutable once confirmed.">
    <text x="30" y="70" font-size="14" fill="#388e3c" font-weight="bold">Step 1: What is a Blockchain Transaction?</text>
    <rect x="30" y="85" width="220" height="55" fill="url(#gradBlue)" rx="8" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="105" font-size="11" fill="#333">Digitally Signed</text>
    <text x="40" y="120" font-size="11" fill="#333">Validated &amp; Recorded</text>
    <text x="40" y="135" font-size="11" fill="#333">Immutable Once Confirmed</text>
  </g>

  <!-- Step 1: Transaction Elements -->
  <g id="step1" data-narration="Every blockchain transaction contains several key elements: a unique transaction ID which is a hash identifier, sender and receiver addresses, the amount being transferred, a timestamp, a digital signature for authorization, and a transaction fee paid to validators.">
    <use href="#step0"/>
    <text x="280" y="70" font-size="14" fill="#ff9800" font-weight="bold">Step 2: Common Transaction Elements</text>
    <rect x="280" y="85" width="240" height="55" fill="url(#gradOrange)" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="290" y="105" font-size="11" fill="#333">TxID • Sender • Receiver</text>
    <text x="290" y="120" font-size="11" fill="#333">Amount • Timestamp</text>
    <text x="290" y="135" font-size="11" fill="#333">Digital Signature • Fee</text>
  </g>

  <!-- Step 2: UTXO Model -->
  <g id="step2" data-narration="The UTXO model is used by Bitcoin. Transactions consume previous outputs and create new ones, where each output can only be spent once. This provides better privacy through address reuse avoidance and enables parallel processing of independent outputs.">
    <use href="#step1"/>
    <text x="30" y="160" font-size="14" fill="#388e3c" font-weight="bold">Step 3: UTXO-Based Transactions</text>
    <text x="30" y="180" font-size="11" fill="#666">Used by Bitcoin, Litecoin</text>
    <rect x="30" y="195" width="160" height="50" fill="url(#gradGreen)" rx="8" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="215" font-size="10" fill="#333">Unspent Transaction</text>
    <text x="40" y="230" font-size="10" fill="#333">Output (UTXO)</text>
    <circle cx="95" cy="245" r="3" fill="#388e3c"/>
    <line x1="95" y1="245" x2="95" y2="255" stroke="#388e3c" stroke-width="1"/>
    <rect x="55" y="258" width="80" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="65" y="273" font-size="9" fill="#333">Input → Output</text>
    <text x="145" y="220" font-size="9" fill="#666">Better privacy</text>
    <text x="145" y="235" font-size="9" fill="#666">Parallel processing</text>
    <text x="145" y="250" font-size="9" fill="#666">No account balance</text>
  </g>

  <!-- Step 3: Account Model -->
  <g id="step3" data-narration="The account model is used by Ethereum. It works like traditional bank accounts with direct balances. Transactions simply modify account balances, making it easier to check balance and implement smart contracts, though it has lower privacy since accounts can be tracked.">
    <use href="#step2"/>
    <text x="280" y="160" font-size="14" fill="#9c27b0" font-weight="bold">Step 4: Account-Based Transactions</text>
    <text x="280" y="180" font-size="11" fill="#666">Used by Ethereum, EOS</text>
    <rect x="280" y="195" width="160" height="50" fill="url(#gradPurple)" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <text x="290" y="215" font-size="10" fill="#333">Direct Account</text>
    <text x="290" y="230" font-size="10" fill="#333">Balance</text>
    <circle cx="360" cy="220" r="12" fill="none" stroke="#9c27b0" stroke-width="2"/>
    <text x="355" y="225" font-size="14" fill="#9c27b0" font-weight="bold">ETH</text>
    <text x="450" y="215" font-size="9" fill="#666">Simpler mental model</text>
    <text x="450" y="230" font-size="9" fill="#666">Smart contracts</text>
    <text x="450" y="245" font-size="9" fill="#666">Easy balance check</text>
  </g>

  <!-- Step 4: Transaction by Purpose -->
  <g id="step4" data-narration="Transactions can be classified by purpose: value transfers send cryptocurrency, smart contract deployments create new contracts, contract invocations call functions, token transfers move tokens like NFTs, and multi-signature transactions require multiple approvals.">
    <use href="#step3"/>
    <text x="30" y="300" font-size="14" fill="#1976d2" font-weight="bold">Step 5: Classification by Purpose</text>
    <rect x="30" y="320" width="110" height="35" fill="#e3f2fd" rx="6" stroke="#1976d2"/>
    <text x="45" y="338" font-size="9" fill="#333" text-anchor="middle">Value Transfer</text>
    <rect x="150" y="320" width="110" height="35" fill="#e3f2fd" rx="6" stroke="#1976d2"/>
    <text x="165" y="338" font-size="9" fill="#333" text-anchor="middle">Contract Deploy</text>
    <rect x="270" y="320" width="110" height="35" fill="#e3f2fd" rx="6" stroke="#1976d2"/>
    <text x="285" y="338" font-size="9" fill="#333" text-anchor="middle">Contract Invoke</text>
    <rect x="390" y="320" width="110" height="35" fill="#e3f2fd" rx="6" stroke="#1976d2"/>
    <text x="405" y="338" font-size="9" fill="#333" text-anchor="middle">Token Transfer</text>
    <rect x="510" y="320" width="110" height="35" fill="#e3f2fd" rx="6" stroke="#1976d2"/>
    <text x="525" y="338" font-size="9" fill="#333" text-anchor="middle">Multi-Sig</text>
    <rect x="630" y="320" width="110" height="35" fill="#e3f2fd" rx="6" stroke="#1976d2"/>
    <text x="645" y="338" font-size="9" fill="#333" text-anchor="middle">Coinbase</text>
    <line x1="95" y1="355" x2="95" y2="365" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="205" y1="355" x2="205" y2="365" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="325" y1="355" x2="325" y2="365" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="445" y1="355" x2="445" y2="365" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="565" y1="355" x2="565" y2="365" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Step 5: Privacy Classification -->
  <g id="step5" data-narration="Transactions are also classified by privacy level. Transparent transactions like Bitcoin and Ethereum are visible to everyone on the blockchain. Private transactions use techniques like ring signatures in Monero or zk-SNARKs in Zcash to hide transaction details.">
    <use href="#step4"/>
    <text x="30" y="385" font-size="14" fill="#ff9800" font-weight="bold">Step 6: Classification by Privacy</text>
    <rect x="30" y="405" width="150" height="60" fill="url(#gradOrange)" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="425" font-size="12" fill="#333" font-weight="bold">Transparent</text>
    <text x="40" y="445" font-size="10" fill="#666">Bitcoin, Ethereum</text>
    <text x="40" y="458" font-size="9" fill="#666">All details visible</text>
    <rect x="200" y="405" width="150" height="60" fill="url(#gradOrange)" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="210" y="425" font-size="12" fill="#333" font-weight="bold">Private</text>
    <text x="210" y="445" font-size="10" fill="#666">Monero, Zcash, Dash</text>
    <text x="210" y="458" font-size="9" fill="#666">Hidden details</text>
    <text x="370" y="420" font-size="10" fill="#666">Ring signatures,</text>
    <text x="370" y="435" font-size="10" fill="#666">zk-SNARKs hide</text>
    <text x="370" y="450" font-size="10" fill="#666">sender &amp; amount</text>
  </g>

  <!-- Step 6: Transaction Lifecycle -->
  <g id="step6" data-narration="A transaction goes through a lifecycle: creation by the user, digital signing with private key, broadcasting to the network, validation by nodes, placement in mempool, mining to include in a block, confirmation when block is added, and finality after multiple confirmations.">
    <use href="#step5"/>
    <text x="30" y="490" font-size="14" fill="#388e3c" font-weight="bold">Step 7: Transaction Lifecycle</text>
    <rect x="30" y="510" width="60" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="45" y="527" font-size="8" fill="#333" text-anchor="middle">Create</text>
    <rect x="95" y="510" width="60" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="110" y="527" font-size="8" fill="#333" text-anchor="middle">Sign</text>
    <rect x="160" y="510" width="60" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="175" y="527" font-size="8" fill="#333" text-anchor="middle">Broadcast</text>
    <rect x="225" y="510" width="60" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="240" y="527" font-size="8" fill="#333" text-anchor="middle">Validate</text>
    <rect x="290" y="510" width="60" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="305" y="527" font-size="8" fill="#333" text-anchor="middle">Mempool</text>
    <rect x="355" y="510" width="60" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="370" y="527" font-size="8" fill="#333" text-anchor="middle">Mine</text>
    <rect x="420" y="510" width="75" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="435" y="527" font-size="8" fill="#333" text-anchor="middle">Confirm</text>
    <rect x="500" y="510" width="60" height="25" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="515" y="527" font-size="8" fill="#333" text-anchor="middle">Finality</text>
    <line x1="90" y1="522" x2="95" y2="522" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowGreen)"/>
    <line x1="155" y1="522" x2="160" y2="522" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowGreen)"/>
    <line x1="220" y1="522" x2="225" y2="522" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowGreen)"/>
    <line x1="285" y1="522" x2="290" y2="522" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowGreen)"/>
    <line x1="350" y1="522" x2="355" y2="522" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowGreen)"/>
    <line x1="415" y1="522" x2="420" y2="522" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowGreen)"/>
    <line x1="495" y1="522" x2="500" y2="522" stroke="#388e3c" stroke-width="1" marker-end="url(#arrowGreen)"/>
  </g>

  <!-- Step 7: Summary -->
  <g id="step7" data-narration="Key takeaways include understanding UTXO versus account models, knowing transaction purposes like value transfer and smart contracts, recognizing privacy types, and remembering special transactions such as coinbase, multi-signature, and atomic swaps.">
    <use href="#step6"/>
    <text x="600" y="490" font-size="14" fill="#9c27b0" font-weight="bold">Step 8: Key Takeaways</text>
    <rect x="580" y="510" width="190" height="55" fill="url(#gradPurple)" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <text x="590" y="528" font-size="10" fill="#333">UTXO vs Account models</text>
    <text x="590" y="543" font-size="10" fill="#333">Transaction purposes</text>
    <text x="590" y="558" font-size="10" fill="#333">Privacy levels &amp; lifecycle</text>
  </g>
</svg>