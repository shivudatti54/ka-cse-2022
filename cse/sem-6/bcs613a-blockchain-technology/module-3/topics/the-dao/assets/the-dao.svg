<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#555"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="The DAO was a Decentralized Autonomous Organization created on Ethereum in 2016, designed as a decentralized investment fund that allowed community members to propose and vote on projects.">
<rect x="0" y="10" width="800" height="40" fill="#e3f2fd"/>
<text x="400" y="35" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">The DAO - Decentralized Autonomous Organization</text>
</g>
<g class="step" id="step1" data-narration="The DAO allowed users to deposit Ether and vote on investment proposals. It was governed by token holders who decided fund allocations.">
<rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5"/>
<text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is a DAO?</text>
<rect x="40" y="88" width="200" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
<text x="140" y="108" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Users Deposit</text>
<text x="140" y="120" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Ether (ETH)</text>
<path d="M250,108 L280,108" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="290" y="88" width="200" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
<text x="390" y="108" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Vote on</text>
<text x="390" y="120" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Proposals</text>
<path d="M500,108 L530,108" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="540" y="88" width="200" height="40" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="3"/>
<text x="640" y="108" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Invest Funds</text>
<text x="640" y="120" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Decentralized</text>
</g>
<g class="step" id="step2" data-narration="The DAO smart contract had three main functions: voting mechanism for proposal decisions, deposit and withdrawal functions for managing funds, and transaction execution for distributing capital to approved projects.">
<rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5"/>
<text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">DAO Smart Contract Structure</text>
<rect x="40" y="176" width="220" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="150" y="194" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Voting Mechanism</text>
<rect x="280" y="176" width="220" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="390" y="194" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Deposit/Withdraw</text>
<rect x="520" y="176" width="220" height="40" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="630" y="194" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Execute Transactions</text>
</g>
<g class="step" id="step3" data-narration="The vulnerability was in the split function that allowed recursive calls without updating the balance first, which let attackers withdraw funds repeatedly in a single transaction before the contract could update the balance.">
<rect x="20" y="234" width="760" height="80" fill="#ffebee" rx="5"/>
<text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">The Vulnerability (Recursive Call)</text>
<rect x="40" y="264" width="340" height="45" fill="#ffffff" stroke="#f44336" stroke-width="1" rx="3"/>
<text x="210" y="282" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Function: splitDAO()</text>
<text x="210" y="296" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Balance not updated before transfer</text>
<text x="210" y="306" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">→ Attacker calls repeatedly</text>
<rect x="400" y="264" width="340" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
<text x="570" y="282" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">The Exploit Logic</text>
<text x="570" y="296" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Withdraw → Update Balance → Withdraw</text>
<text x="570" y="306" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">(Attack: Withdraw before update)</text>
</g>
<g class="step" id="step4" data-narration="In June 2016, the hacker exploited the vulnerability and drained 3.6 million Ether, worth approximately 50 million dollars at that time.">
<rect x="20" y="322" width="760" height="80" fill="#fff3e0" rx="5"/>
<text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">The DAO Hack - June 2016</text>
<rect x="40" y="352" width="350" height="40" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
<text x="215" y="372" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">3.6 Million ETH Stolen</text>
<text x="215" y="386" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">(~$50 Million at the time)</text>
<rect x="410" y="352" width="350" height="40" fill="#ffffff" stroke="#ff9800" stroke-width="1" rx="3"/>
<text x="585" y="372" font-family="Arial" font-size="11" fill="#333" text-anchor="middle"> ~14% of all ETH in circulation</text>
<text x="585" y="386" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Largest crypto hack at that time</text>
</g>
<g class="step" id="step5" data-narration="The hack led to a hard fork in Ethereum, creating two chains: Ethereum (ETH) and Ethereum Classic (ETC) with different philosophies.">
<rect x="20" y="410" width="760" height="80" fill="#f3e5f5" rx="5"/>
<text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Consequence: Ethereum Hard Fork</text>
<rect x="40" y="440" width="340" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
<text x="210" y="460" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">Ethereum (ETH)</text>
<text x="210" y="475" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Reversed the hack (Rollback)</text>
<rect x="400" y="440" width="340" height="40" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
<text x="570" y="460" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">Ethereum Classic (ETC)</text>
<text x="570" y="475" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Kept original chain (Immutable)</text>
</g>
<g class="step" id="step6" data-narration="Key lessons for developers: always audit smart contracts thoroughly, implement proper access controls, and test extensively on testnets before deploying any code to the mainnet for public use.">
<rect x="20" y="498" width="760" height="90" fill="#e8f5e9" rx="5"/>
<text x="40" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Lessons Learned</text>
<rect x="40" y="528" width="220" height="50" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="150" y="545" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Smart Contract Audits</text>
<text x="150" y="560" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Thorough code reviews</text>
<text x="150" y="572" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">are essential</text>
<rect x="280" y="528" width="220" height="50" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="390" y="545" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Security First</text>
<text x="390" y="560" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Validate inputs and</text>
<text x="390" y="572" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">access controls</text>
<rect x="520" y="528" width="220" height="50" fill="#ffffff" stroke="#388e3c" stroke-width="1" rx="3"/>
<text x="630" y="545" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Test Extensively</text>
<text x="630" y="560" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Testnets before</text>
<text x="630" y="572" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">mainnet deployment</text>
</g>
</svg>