<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Blockchain Oracles</text>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  
  <g id="step0" class="step" data-narration="Oracles are services that bring real-world data like prices, weather, and events to smart contracts on the blockchain, solving the data access problem.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">Smart contracts cannot access external data without oracle services</text>
  </g>
  
  <g id="step1" class="step" data-narration="Smart contracts are deterministic and isolated by design. They cannot fetch data from APIs, websites, IoT sensors, or any outside information sources.">
    <rect x="40" y="80" width="300" height="75" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="190" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">The Oracle Problem</text>
    <text x="190" y="128" text-anchor="middle" font-size="11" fill="#333">Blockchain is isolated from</text>
    <text x="190" y="143" text-anchor="middle" font-size="11" fill="#333">the outside world by design</text>
    <line x1="340" y1="118" x2="420" y2="118" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <g id="step2" class="step" data-narration="Oracles solve this problem by fetching external data from real-world sources and securely delivering it to smart contracts on the blockchain.">
    <rect x="420" y="80" width="340" height="75" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">The Solution: Oracles</text>
    <text x="590" y="128" text-anchor="middle" font-size="11" fill="#333">Bridge between off-chain data</text>
    <text x="590" y="143" text-anchor="middle" font-size="11" fill="#333">and on-chain smart contracts</text>
  </g>
  
  <g id="step3" class="step" data-narration="The oracle data flow goes from external sources like APIs and sensors to the oracle network for validation, then to the smart contract for execution.">
    <text x="400" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Oracle Data Flow</text>
    <rect x="40" y="195" width="150" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="115" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">External Data</text>
    <text x="115" y="233" text-anchor="middle" font-size="9" fill="#333">APIs, IoT, Sensors</text>
    <line x1="190" y1="220" x2="240" y2="220" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="240" y="195" width="150" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="315" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Oracle Network</text>
    <text x="315" y="233" text-anchor="middle" font-size="9" fill="#333">Validate + Aggregate</text>
    <line x1="390" y1="220" x2="440" y2="220" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="440" y="195" width="150" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="515" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Smart Contract</text>
    <text x="515" y="233" text-anchor="middle" font-size="9" fill="#333">Uses data on-chain</text>
    <line x1="590" y1="220" x2="640" y2="220" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="640" y="195" width="120" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="700" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Action</text>
    <text x="700" y="233" text-anchor="middle" font-size="9" fill="#333">Execute logic</text>
  </g>
  
  <g id="step4" class="step" data-narration="Common oracle use cases include price feeds for DeFi lending, weather data for insurance payouts, and random numbers for gaming and lottery applications.">
    <rect x="40" y="270" width="220" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="150" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Price Feeds</text>
    <text x="150" y="313" text-anchor="middle" font-size="10" fill="#333">DeFi, Lending, DEXs</text>
    <rect x="290" y="270" width="220" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Weather Data</text>
    <text x="400" y="313" text-anchor="middle" font-size="10" fill="#333">Insurance, Parametric</text>
    <rect x="540" y="270" width="220" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="650" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Random Numbers</text>
    <text x="650" y="313" text-anchor="middle" font-size="10" fill="#333">Gaming, Lotteries</text>
  </g>
  
  <g id="step5" class="step" data-narration="If an oracle provides wrong data, the smart contract executes incorrectly. This centralization risk defeats blockchain's trustless nature and security properties.">
    <rect x="60" y="345" width="680" height="50" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Centralization Risk</text>
    <text x="400" y="385" text-anchor="middle" font-size="11" fill="#333">Wrong oracle data causes incorrect contract execution, defeating blockchain's trustless design</text>
  </g>
  
  <g id="step6" class="step" data-narration="Chainlink solves this with decentralized oracle networks where many node operators stake tokens and validate data through consensus before delivery.">
    <rect x="60" y="415" width="680" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="435" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Chainlink: Decentralized Oracle Network</text>
    <text x="400" y="455" text-anchor="middle" font-size="11" fill="#333">Multiple node operators stake tokens and reach consensus to provide reliable data</text>
  </g>
  
  <g id="step7" class="step" data-narration="Oracle types include software oracles for APIs, hardware oracles for IoT sensors, inbound for external data to blockchain, and outbound for blockchain data to external systems.">
    <text x="400" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Types of Oracles</text>
    <rect x="40" y="510" width="180" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="130" y="528" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Software Oracles</text>
    <text x="130" y="545" text-anchor="middle" font-size="9" fill="#333">APIs, Web Data</text>
    <rect x="230" y="510" width="180" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="320" y="528" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Hardware Oracles</text>
    <text x="320" y="545" text-anchor="middle" font-size="9" fill="#333">IoT Sensors</text>
    <rect x="420" y="510" width="170" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="505" y="528" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Inbound Oracles</text>
    <text x="505" y="545" text-anchor="middle" font-size="9" fill="#333">External to Blockchain</text>
    <rect x="600" y="510" width="160" height="45" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="680" y="528" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">Outbound Oracles</text>
    <text x="680" y="545" text-anchor="middle" font-size="9" fill="#333">Blockchain to External</text>
  </g>
</svg>