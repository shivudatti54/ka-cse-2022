<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2" />
      <stop offset="100%" stop-color="#388e3c" />
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Smart Contracts History</text>

  <g id="step1" class="step" data-narration="A smart contract is a self-executing program stored on a blockchain that automatically enforces agreement terms when conditions are met.">
    <rect x="50" y="50" width="700" height="60" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">What is a Smart Contract?</text>
    <text x="400" y="95" text-anchor="middle" font-size="14" fill="#333">Self-executing program on blockchain - like a digital vending machine</text>
  </g>

  <g id="step2" class="step" data-narration="Nick Szabo coined the term in the 1990s, defining it as a computerized transaction protocol. Ethereum in 2015 provided the secure environment to make it real.">
    <rect x="50" y="125" width="330" height="55" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="215" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">Nick Szabo (1990s)</text>
    <text x="215" y="168" text-anchor="middle" font-size="12" fill="#333">Coined the term "smart contract"</text>
    <rect x="420" y="125" width="330" height="55" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="585" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#ef6c00">Ethereum (2015)</text>
    <text x="585" y="168" text-anchor="middle" font-size="12" fill="#333">First practical smart contracts</text>
  </g>

  <g id="step3" class="step" data-narration="The core idea removes trusted third parties like lawyers or banks by encoding agreement rules and penalties directly into immutable blockchain code.">
    <rect x="50" y="195" width="700" height="55" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="218" text-anchor="middle" font-size="15" font-weight="bold" fill="#7b1fa2">Core Idea: Trustless Transactions</text>
    <text x="400" y="238" text-anchor="middle" font-size="13" fill="#333">Remove intermediaries - encode rules into code on an immutable blockchain</text>
  </g>

  <g id="step4" class="step" data-narration="The lifecycle flows from creation where developers write code in languages like Solidity, to deployment paying gas fees, execution by transactions, then finalization on-chain.">
    <text x="400" y="270" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Smart Contract Lifecycle</text>
    <rect x="60" y="280" width="155" height="45" fill="#e3f2fd" rx="6"/>
    <text x="137" y="307" text-anchor="middle" font-size="13" fill="#1565c0" font-weight="bold">Creation</text>
    <text x="137" y="320" text-anchor="middle" font-size="10" fill="#555">Write code</text>
    <line x1="215" y1="302" x2="235" y2="302" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowHead)"/>
    <rect x="240" y="280" width="155" height="45" fill="#fff3e0" rx="6"/>
    <text x="317" y="307" text-anchor="middle" font-size="13" fill="#ef6c00" font-weight="bold">Deployment</text>
    <text x="317" y="320" text-anchor="middle" font-size="10" fill="#555">Deploy to chain</text>
    <line x1="395" y1="302" x2="415" y2="302" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowHead)"/>
    <rect x="420" y="280" width="155" height="45" fill="#e8f5e9" rx="6"/>
    <text x="497" y="307" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="bold">Execution</text>
    <text x="497" y="320" text-anchor="middle" font-size="10" fill="#555">Trigger by tx</text>
    <line x1="575" y1="302" x2="595" y2="302" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowHead)"/>
    <rect x="600" y="280" width="140" height="45" fill="#f3e5f5" rx="6"/>
    <text x="670" y="307" text-anchor="middle" font-size="13" fill="#7b1fa2" font-weight="bold">Finalization</text>
    <text x="670" y="320" text-anchor="middle" font-size="10" fill="#555">Recorded on chain</text>
  </g>

  <g id="step5" class="step" data-narration="Key properties make smart contracts powerful: they are autonomous (auto-execute), deterministic (same input yields same output), immutable (cannot change), and transparent (publicly verifiable).">
    <text x="400" y="350" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">Key Characteristics</text>
    <rect x="60" y="360" width="145" height="40" fill="#1976d2" rx="6"/>
    <text x="132" y="380" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Autonomous</text>
    <rect x="220" y="360" width="145" height="40" fill="#388e3c" rx="6"/>
    <text x="292" y="380" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Deterministic</text>
    <rect x="380" y="360" width="145" height="40" fill="#f44336" rx="6"/>
    <text x="452" y="380" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Immutable</text>
    <rect x="540" y="360" width="145" height="40" fill="#ff9800" rx="6"/>
    <text x="612" y="380" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Transparent</text>
    <rect x="625" y="405" width="145" height="40" fill="#9c27b0" rx="6"/>
    <text x="697" y="425" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Trustless</text>
    <text x="132" y="415" text-anchor="middle" font-size="10" fill="#666">Auto-execute</text>
    <text x="292" y="415" text-anchor="middle" font-size="10" fill="#666">Same input, same output</text>
    <text x="452" y="415" text-anchor="middle" font-size="10" fill="#666">Code cannot be changed</text>
    <text x="612" y="415" text-anchor="middle" font-size="10" fill="#666">Publicly verifiable</text>
    <text x="697" y="440" text-anchor="middle" font-size="10" fill="#666">No need to trust others</text>
  </g>

  <g id="step6" class="step" data-narration="Smart contracts rely on cryptography: digital signatures authenticate transactions, hash functions secure addresses and state, and asymmetric key pairs manage ownership.">
    <rect x="50" y="465" width="240" height="50" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="170" y="488" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Digital Signatures</text>
    <text x="170" y="505" text-anchor="middle" font-size="11" fill="#333">ECDSA authenticates transactions</text>
    <rect x="305" y="465" width="240" height="50" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="425" y="488" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Hash Functions</text>
    <text x="425" y="505" text-anchor="middle" font-size="11" fill="#333">Secure addresses and state</text>
    <rect x="560" y="465" width="190" height="50" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="655" y="488" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Asymmetric Keys</text>
    <text x="655" y="505" text-anchor="middle" font-size="11" fill="#333">Public-private key pairs</text>
  </g>

  <g id="step7" class="step" data-narration="Smart contracts beat traditional contracts: faster execution, lower cost, automated without intermediaries, but face limitations like immutability bugs and oracle problems.">
    <rect x="50" y="530" width="350" height="50" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="225" y="552" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef6c00">Advantages</text>
    <text x="225" y="570" text-anchor="middle" font-size="12" fill="#333">Faster • Cheaper • Automated • Transparent</text>
    <rect x="415" y="530" width="335" height="50" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="582" y="552" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Limitations</text>
    <text x="582" y="570" text-anchor="middle" font-size="12" fill="#333">Immutability bugs • Oracle problem • Scalability • Legal uncertainty</text>
  </g>
</svg>