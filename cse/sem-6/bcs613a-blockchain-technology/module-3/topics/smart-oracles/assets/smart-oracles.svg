<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="Smart oracles are trusted entities that securely bridge blockchain smart contracts with real-world data sources, enabling dynamic and reliable external interactions.">
<rect x="50" y="10" width="700" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="35" font-family="Arial" font-size="20" font-weight="bold" fill="#1976d2" text-anchor="middle">Smart Oracles</text>
</g>
<g class="step" id="step1" data-narration="A smart oracle is a trusted entity providing secure external data like prices or weather to smart contracts, acting as a blockchain bridge.">
<rect x="50" y="58" width="700" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="70" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Definition</text>
<rect x="70" y="88" width="280" height="60" rx="5" fill="#c8e6c9"/>
<text x="80" y="108" font-family="Arial" font-size="10" fill="#2e7d32">Smart Oracle</text>
<text x="80" y="122" font-family="Arial" font-size="9" fill="#1b5e20">Trusted entity that provides</text>
<text x="80" y="134" font-family="Arial" font-size="9" fill="#1b5e20">external data to smart contracts</text>
<text x="370" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Key Characteristics</text>
<rect x="370" y="88" width="360" height="60" rx="5" fill="#c8e6c9"/>
<text x="380" y="105" font-family="Arial" font-size="10" fill="#2e7d32">• Decentralized - Not controlled by single entity</text>
<text x="380" y="120" font-family="Arial" font-size="10" fill="#2e7d32">• Autonomous - Operates without human intervention</text>
<text x="380" y="135" font-family="Arial" font-size="10" fill="#2e7d32">• Flexible - Handles various data sources and formats</text>
</g>
<g class="step" id="step2" data-narration="Three main types of smart oracles exist: software oracles provide data from online sources, hardware oracles use physical sensors, and human oracles involve people.">
<rect x="50" y="166" width="700" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="70" y="186" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Types of Smart Oracles</text>
<rect x="70" y="200" width="200" height="42" rx="5" fill="#ffe0b2"/>
<text x="140" y="215" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Software Oracle</text>
<text x="140" y="228" font-family="Arial" font-size="8" fill="#bf360c" text-anchor="middle">Server-based programs</text>
<text x="140" y="238" font-family="Arial" font-size="8" fill="#bf360c" text-anchor="middle">providing online data</text>
<rect x="300" y="200" width="200" height="42" rx="5" fill="#ffe0b2"/>
<text x="400" y="215" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Hardware Oracle</text>
<text x="400" y="228" font-family="Arial" font-size="8" fill="#bf360c" text-anchor="middle">Physical devices with</text>
<text x="400" y="238" font-family="Arial" font-size="8" fill="#bf360c" text-anchor="middle">sensors providing data</text>
<rect x="530" y="200" width="200" height="42" rx="5" fill="#ffe0b2"/>
<text x="630" y="215" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Human Oracle</text>
<text x="630" y="228" font-family="Arial" font-size="8" fill="#bf360c" text-anchor="middle">Individuals providing</text>
<text x="630" y="238" font-family="Arial" font-size="8" fill="#bf360c" text-anchor="middle">verified data manually</text>
</g>
<g class="step" id="step3" data-narration="Smart oracles enable practical real-world applications including supply chain tracking, financial price feeds, weather data for insurance, and many more use cases.">
<rect x="50" y="259" width="700" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="70" y="279" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Applications</text>
<rect x="70" y="293" width="200" height="42" rx="5" fill="#e1bee7"/>
<text x="170" y="310" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Supply Chain Management</text>
<text x="170" y="325" font-family="Arial" font-size="8" fill="#4a148c" text-anchor="middle">Track goods movement in real-time</text>
<rect x="300" y="293" width="200" height="42" rx="5" fill="#e1bee7"/>
<text x="400" y="310" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Financial Markets</text>
<text x="400" y="325" font-family="Arial" font-size="8" fill="#4a148c" text-anchor="middle">Real-time price data for contracts</text>
<rect x="530" y="293" width="200" height="42" rx="5" fill="#e1bee7"/>
<text x="630" y="310" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Weather Forecasting</text>
<text x="630" y="325" font-family="Arial" font-size="8" fill="#4a148c" text-anchor="middle">Weather data for insurance contracts</text>
</g>
<g class="step" id="step4" data-narration="Smart oracles offer advantages like increased accuracy and security but face challenges including scalability issues, security vulnerabilities, and regulatory concerns.">
<rect x="50" y="352" width="700" height="125" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="70" y="372" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Advantages</text>
<rect x="70" y="386" width="280" height="80" rx="5" fill="#bbdefb"/>
<text x="80" y="402" font-family="Arial" font-size="9" fill="#0d47a1">• Increased accuracy of data</text>
<text x="80" y="416" font-family="Arial" font-size="9" fill="#0d47a1">• Improved security through</text>
<text x="80" y="428" font-family="Arial" font-size="9" fill="#0d47a1">  decentralization and autonomy</text>
<text x="80" y="440" font-family="Arial" font-size="9" fill="#0d47a1">• Increased flexibility for data sources</text>
<text x="370" y="372" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Challenges &amp; Limitations</text>
<rect x="370" y="386" width="360" height="80" rx="5" fill="#ffcdd2"/>
<text x="380" y="402" font-family="Arial" font-size="9" fill="#b71c1c">• Scalability - Difficult to scale with</text>
<text x="380" y="416" font-family="Arial" font-size="9" fill="#b71c1c">  large amounts of data</text>
<text x="380" y="430" font-family="Arial" font-size="9" fill="#b71c1c">• Security - Vulnerable to threats if</text>
<text x="380" y="444" font-family="Arial" font-size="9" fill="#b71c1c">  not properly designed</text>
<text x="380" y="458" font-family="Arial" font-size="9" fill="#b71c1c">• Regulation - May face regulatory</text>
<text x="380" y="470" font-family="Arial" font-size="9" fill="#b71c1c">  requirements for sensitive data</text>
</g>
<g class="step" id="step5" data-narration="For exams, remember: smart oracles bridge blockchain and real world, have three types, three applications, and balance advantages against challenges.">
<rect x="50" y="485" width="700" height="105" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="70" y="505" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Exam Tips Summary</text>
<rect x="70" y="519" width="660" height="62" rx="5" fill="#ffe0b2"/>
<text x="80" y="537" font-family="Arial" font-size="10" fill="#e65100">1. Define smart oracle: trusted entity providing external data to smart contracts</text>
<text x="80" y="553" font-family="Arial" font-size="10" fill="#e65100">2. Three types: Software (online), Hardware (sensors), Human (individuals)</text>
<text x="80" y="569" font-family="Arial" font-size="10" fill="#e65100">3. Applications: Supply chain, Financial markets, Weather forecasting</text>
<text x="80" y="585" font-family="Arial" font-size="10" fill="#e65100">4. Advantages (accuracy, security, flexibility) vs Challenges (scalability, security, regulation)</text>
</g>
</svg>