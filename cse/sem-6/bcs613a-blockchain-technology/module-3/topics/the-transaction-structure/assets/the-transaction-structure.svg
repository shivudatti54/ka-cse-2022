<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title Area -->
  <text x="400" y="35" font-size="22" fill="#1565c0" text-anchor="middle" font-weight="bold">The Transaction Structure in Blockchain</text>
  <line x1="50" y1="50" x2="750" y2="50" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- STEP 1: Transaction Input -->
  <g id="step1" data-narration="A transaction input acts like a pointer to money you received before. It contains three key parts: the previous transaction ID, which output index you're using, and an unlocking script that proves you own the funds.">
    <rect x="50" y="70" width="280" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="190" y="95" font-size="16" fill="#1976d2" text-anchor="middle" font-weight="bold">Transaction Input</text>
    
    <!-- Three input components as vertical list -->
    <rect x="70" y="110" width="240" height="42" fill="#ffffff" stroke="#90caf9" stroke-width="1" rx="4"/>
    <text x="190" y="125" font-size="13" fill="#1565c0" text-anchor="middle">1. Previous Tx Hash (TxID)</text>
    <text x="190" y="142" font-size="11" fill="#78909c" text-anchor="middle">Reference to prior transaction</text>
    
    <rect x="70" y="158" width="240" height="42" fill="#ffffff" stroke="#90caf9" stroke-width="1" rx="4"/>
    <text x="190" y="173" font-size="13" fill="#1565c0" text-anchor="middle">2. Output Index (Vout)</text>
    <text x="190" y="190" font-size="11" fill="#78909c" text-anchor="middle">Which output to spend (0, 1, 2...)</text>
    
    <rect x="70" y="206" width="240" height="42" fill="#ffffff" stroke="#90caf9" stroke-width="1" rx="4"/>
    <text x="190" y="221" font-size="13" fill="#1565c0" text-anchor="middle">3. Unlocking Script (ScriptSig)</text>
    <text x="190" y="238" font-size="11" fill="#78909c" text-anchor="middle">Your signature + public key</text>
  </g>
  
  <!-- STEP 2: Transaction Output -->
  <g id="step2" data-narration="Transaction outputs define where the money goes and under what conditions. Each output holds an amount and a locking script that only allows the recipient to spend those funds later with their private key.">
    <rect x="370" y="70" width="280" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="510" y="95" font-size="16" fill="#388e3c" text-anchor="middle" font-weight="bold">Transaction Output</text>
    
    <rect x="390" y="110" width="240" height="42" fill="#ffffff" stroke="#a5d6a7" stroke-width="1" rx="4"/>
    <text x="510" y="125" font-size="13" fill="#2e7d32" text-anchor="middle">1. Amount</text>
    <text x="510" y="142" font-size="11" fill="#78909c" text-anchor="middle">Value in Satoshis (BTC) or Wei (ETH)</text>
    
    <rect x="390" y="158" width="240" height="42" fill="#ffffff" stroke="#a5d6a7" stroke-width="1" rx="4"/>
    <text x="510" y="173" font-size="13" fill="#2e7d32" text-anchor="middle">2. Locking Script (ScriptPubKey)</text>
    <text x="510" y="190" font-size="11" fill="#78909c" text-anchor="middle">Recipient's address or spending rules</text>
  </g>
  
  <!-- STEP 3: Transaction Metadata -->
  <g id="step3" data-narration="Transaction metadata provides essential information for processing: the version number tells nodes which rules to follow, counts specify how many inputs and outputs exist, and locktime controls when the transaction can be added to the blockchain.">
    <rect x="50" y="270" width="600" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="350" y="295" font-size="16" fill="#e65100" text-anchor="middle" font-weight="bold">Transaction Metadata</text>
    
    <!-- Four metadata fields in a horizontal row -->
    <rect x="70" y="310" width="130" height="40" fill="#ffffff" stroke="#ffcc80" stroke-width="1" rx="4"/>
    <text x="135" y="328" font-size="12" fill="#ef6c00" text-anchor="middle">Version</text>
    <text x="135" y="342" font-size="10" fill="#9e9e9e" text-anchor="middle">v1 or v2</text>
    
    <rect x="215" y="310" width="130" height="40" fill="#ffffff" stroke="#ffcc80" stroke-width="1" rx="4"/>
    <text x="280" y="328" font-size="12" fill="#ef6c00" text-anchor="middle">Input Count</text>
    <text x="280" y="342" font-size="10" fill="#9e9e9e" text-anchor="middle">How many inputs</text>
    
    <rect x="360" y="310" width="130" height="40" fill="#ffffff" stroke="#ffcc80" stroke-width="1" rx="4"/>
    <text x="425" y="328" font-size="12" fill="#ef6c00" text-anchor="middle">Output Count</text>
    <text x="425" y="342" font-size="10" fill="#9e9e9e" text-anchor="middle">How many outputs</text>
    
    <rect x="505" y="310" width="130" height="40" fill="#ffffff" stroke="#ffcc80" stroke-width="1" rx="4"/>
    <text x="570" y="328" font-size="12" fill="#ef6c00" text-anchor="middle">Locktime</text>
    <text x="570" y="342" font-size="10" fill="#9e9e9e" text-anchor="middle">Earliest valid time</text>
  </g>
  
  <!-- STEP 4: Complete Transaction Structure -->
  <g id="step4" data-narration="A complete transaction chains inputs to outputs. The example shows Alice spending 1 BTC: she uses a previous transaction as input, sends 0.5 BTC to Bob as output, and gets 0.4995 BTC back as change minus a 0.0005 fee.">
    <rect x="50" y="380" width="340" height="140" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="220" y="405" font-size="16" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Complete Transaction Structure</text>
    
    <!-- Visual: Input -> Outputs flow -->
    <rect x="70" y="420" width="80" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="110" y="442" font-size="12" fill="#1565c0" text-anchor="middle">INPUT</text>
    <text x="110" y="456" font-size="10" fill="#78909c" text-anchor="middle">1.0 BTC</text>
    
    <polygon points="150,445 170,445 160,455" fill="#9c27b0"/>
    <line x1="150" y1="445" x2="170" y2="445" stroke="#9c27b0" stroke-width="2"/>
    
    <rect x="180" y="420" width="190" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="275" y="435" font-size="11" fill="#2e7d32" text-anchor="middle">OUTPUT 1: Bob</text>
    <text x="275" y="450" font-size="10" fill="#78909c" text-anchor="middle">0.5 BTC + ScriptPubKey</text>
    
    <rect x="180" y="475" width="190" height="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="6"/>
    <text x="275" y="492" font-size="11" fill="#2e7d32" text-anchor="middle">OUTPUT 2: Change to Alice</text>
    <text x="275" y="504" font-size="10" fill="#78909c" text-anchor="middle">0.4995 BTC</text>
    
    <!-- Fee calculation visual -->
    <rect x="410" y="380" width="240" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="8"/>
    <text x="530" y="405" font-size="14" fill="#c62828" text-anchor="middle" font-weight="bold">Transaction Fee</text>
    <text x="530" y="425" font-size="12" fill="#d32f2f" text-anchor="middle">Input Total: 1.0 BTC</text>
    <text x="530" y="445" font-size="12" fill="#d32f2f" text-anchor="middle">Output Total: 0.9995 BTC</text>
    <line x1="470" y1="455" x2="590" y2="455" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/>
    <text x="530" y="472" font-size="12" fill="#c62828" text-anchor="middle" font-weight="bold">Fee: 0.0005 BTC</text>
  </g>
  
  <!-- STEP 5: Lifecycle Flow -->
  <g id="step5" data-narration="After signing with your private key, the transaction broadcasts to the network where nodes verify it's valid. Once miners include it in a block, the transaction becomes permanent and confirmed on the blockchain.">
    <rect x="50" y="535" width="700" height="50" fill="#e0f7fa" stroke="#00acc1" stroke-width="2" rx="8"/>
    <text x="400" y="555" font-size="14" fill="#00838f" text-anchor="middle" font-weight="bold">Lifecycle: Sign → Broadcast → Validate → Mine (Block) → Confirmed</text>
    
    <!-- Lifecycle steps as small boxes -->
    <rect x="70" y="545" width="80" height="30" fill="#ffffff" stroke="#00acc1" stroke-width="1" rx="4"/>
    <text x="110" y="565" font-size="11" fill="#006064" text-anchor="middle">1. Sign</text>
    
    <rect x="170" y="545" width="80" height="30" fill="#ffffff" stroke="#00acc1" stroke-width="1" rx="4"/>
    <text x="210" y="565" font-size="11" fill="#006064" text-anchor="middle">2. Broadcast</text>
    
    <rect x="270" y="545" width="80" height="30" fill="#ffffff" stroke="#00acc1" stroke-width="1" rx="4"/>
    <text x="310" y="565" font-size="11" fill="#006064" text-anchor="middle">3. Validate</text>
    
    <rect x="370" y="545" width="80" height="30" fill="#ffffff" stroke="#00acc1" stroke-width="1" rx="4"/>
    <text x="410" y="565" font-size="11" fill="#006064" text-anchor="middle">4. Mine</text>
    
    <rect x="470" y="545" width="80" height="30" fill="#ffffff" stroke="#00acc1" stroke-width="1" rx="4"/>
    <text x="510" y="565" font-size="11" fill="#006064" text-anchor="middle">5. Confirm</text>
    
    <!-- Arrow indicators -->
    <polygon points="150,560 160,560 155,555" fill="#00acc1"/>
    <polygon points="250,560 260,560 255,555" fill="#00acc1"/>
    <polygon points="350,560 360,560 355,555" fill="#00acc1"/>
    <polygon points="450,560 460,560 455,555" fill="#00acc1"/>
    
    <!-- Ethereum note -->
    <text x="600" y="560" font-size="10" fill="#78909c" text-anchor="end">*Ethereum uses account model (nonce, gas, data)</text>
  </g>
</svg>