<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">Smart Contract Templates</text>

  <g id="step1" class="step" data-narration="Smart contract templates are reusable code blueprints for common blockchain agreements. They work like pre-fabricated building blocks, letting developers configure ready-made secure code instead of writing everything from scratch.">
    <rect x="50" y="55" width="700" height="55" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="78" text-anchor="middle" font-size="15" fill="#1565c0">What Are Smart Contract Templates?</text>
    <text x="400" y="96" text-anchor="middle" font-size="12" fill="#424242">Reusable code scaffolds for specific types of agreements or transactions</text>
  </g>

  <g id="step2" class="step" data-narration="Three key characteristics make templates valuable: standardization ensures consistent business processes across industries, security comes from extensive community auditing, and efficiency dramatically reduces development time and costs.">
    <rect x="50" y="125" width="220" height="75" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="160" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">Standardization</text>
    <text x="160" y="170" text-anchor="middle" font-size="11" fill="#424242">Consistent business processes</text>
    <text x="160" y="185" text-anchor="middle" font-size="11" fill="#424242">across industries</text>
    
    <rect x="290" y="125" width="220" height="75" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">Security</text>
    <text x="400" y="170" text-anchor="middle" font-size="11" fill="#424242">Extensively audited by</text>
    <text x="400" y="185" text-anchor="middle" font-size="11" fill="#424242">community and security firms</text>
    
    <rect x="530" y="125" width="220" height="75" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="640" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#6a1b9a">Efficiency</text>
    <text x="640" y="170" text-anchor="middle" font-size="11" fill="#424242">Reduces development</text>
    <text x="640" y="185" text-anchor="middle" font-size="11" fill="#424242">time and costs drastically</text>
  </g>

  <g id="step3" class="step" data-narration="The workflow involves three stages: first, select an appropriate template from a trusted library like OpenZeppelin, then configure its parameters for your specific needs, and finally deploy it as a unique contract on the blockchain.">
    <rect x="50" y="215" width="210" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="155" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">1. Selection</text>
    <text x="155" y="260" text-anchor="middle" font-size="11" fill="#424242">Choose template from</text>
    <text x="155" y="275" text-anchor="middle" font-size="11" fill="#424242">library (OpenZeppelin)</text>
    
    <line x1="260" y1="255" x2="280" y2="255" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <rect x="295" y="215" width="210" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">2. Parameterization</text>
    <text x="400" y="260" text-anchor="middle" font-size="11" fill="#424242">Configure variables like</text>
    <text x="400" y="275" text-anchor="middle" font-size="11" fill="#424242">parties, amount, duration</text>
    
    <line x1="505" y1="255" x2="525" y2="255" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <rect x="540" y="215" width="210" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="645" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">3. Deployment</text>
    <text x="645" y="260" text-anchor="middle" font-size="11" fill="#424242">Compile and deploy</text>
    <text x="645" y="275" text-anchor="middle" font-size="11" fill="#424242">unique contract instance</text>
  </g>

  <g id="step4" class="step" data-narration="Two major token standards exist: ERC-20 is for fungible tokens where each unit is identical like currency, while ERC-721 is for non-fungible tokens representing unique digital assets like artwork or collectibles.">
    <rect x="50" y="310" width="340" height="70" fill="#e1f5fe" rx="8" stroke="#0288d1" stroke-width="2"/>
    <text x="220" y="335" text-anchor="middle" font-size="15" font-weight="bold" fill="#01579b">ERC-20 Token Standard</text>
    <text x="220" y="355" text-anchor="middle" font-size="11" fill="#424242">Fungible tokens - each unit is identical</text>
    <text x="220" y="370" text-anchor="middle" font-size="11" fill="#424242">Used for cryptocurrencies and utility tokens</text>
    
    <rect x="410" y="310" width="340" height="70" fill="#fce4ec" rx="8" stroke="#c2185b" stroke-width="2"/>
    <text x="630" y="335" text-anchor="middle" font-size="15" font-weight="bold" fill="#880e4f">ERC-721 Token Standard</text>
    <text x="630" y="355" text-anchor="middle" font-size="11" fill="#424242">Non-fungible tokens - each is unique</text>
    <text x="630" y="370" text-anchor="middle" font-size="11" fill="#424242">Used for NFTs, digital art, and collectibles</text>
  </g>

  <g id="step5" class="step" data-narration="Beyond tokens, common templates include multi-signature wallets requiring multiple approvals for security, escrow contracts that hold funds until conditions are met, and time-locked contracts that release assets after a specific period.">
    <rect x="50" y="395" width="220" height="60" fill="#fff8e1" rx="8" stroke="#f9a825" stroke-width="2"/>
    <text x="160" y="418" text-anchor="middle" font-size="14" font-weight="bold" fill="#f57f17">Multi-Signature Wallets</text>
    <text x="160" y="438" text-anchor="middle" font-size="11" fill="#424242">Require M-of-N approvals</text>
    
    <rect x="290" y="395" width="220" height="60" fill="#efebe9" rx="8" stroke="#6d4c41" stroke-width="2"/>
    <text x="400" y="418" text-anchor="middle" font-size="14" font-weight="bold" fill="#4e342e">Escrow Contracts</text>
    <text x="400" y="438" text-anchor="middle" font-size="11" fill="#424242">Hold funds until conditions met</text>
    
    <rect x="530" y="395" width="220" height="60" fill="#e0f7fa" rx="8" stroke="#00838f" stroke-width="2"/>
    <text x="640" y="418" text-anchor="middle" font-size="14" font-weight="bold" fill="#006064">Time-Locked Contracts</text>
    <text x="640" y="438" text-anchor="middle" font-size="11" fill="#424242">Release funds after specific time</text>
  </g>

  <g id="step6" class="step" data-narration="OpenZeppelin Contracts is the industry-standard library providing battle-tested templates for Ethereum and EVM-compatible blockchains. It secures billions of dollars in value and powers most decentralized applications today.">
    <rect x="50" y="470" width="700" height="55" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="492" text-anchor="middle" font-size="15" font-weight="bold" fill="#6a1b9a">OpenZeppelin Library</text>
    <text x="400" y="512" text-anchor="middle" font-size="12" fill="#424242">Industry-standard, battle-tested templates securing billions across Ethereum and EVM chains</text>
  </g>

  <g id="step7" class="step" data-narration="Using templates accelerates dApp development, reduces security vulnerabilities through community auditing, and enables interoperability across wallets and exchanges. This lowers barriers for developers and powers the blockchain ecosystem.">
    <rect x="50" y="540" width="700" height="45" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="560" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Key Benefits: Accelerate Development • Reduce Security Risks • Enable Interoperability</text>
  </g>
</svg>