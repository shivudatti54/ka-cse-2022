<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step0" data-narration="The Genesis Block is the very first block in any blockchain, serving as the foundational starting point with Block Height 0.">
    <text x="400" y="35" font-size="22" font-weight="bold" fill="#1976d2" text-anchor="middle">The Genesis Block</text>
    <text x="400" y="55" font-size="14" fill="#9c27b0" text-anchor="middle">The origin of the entire blockchain</text>
    <rect x="300" y="75" width="200" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="105" font-size="18" fill="#1976d2" text-anchor="middle" font-weight="bold">Block 0</text>
    <text x="400" y="125" font-size="12" fill="#666" text-anchor="middle">Genesis Block</text>
  </g>
  
  <g id="step1" data-narration="Unlike other blocks, the Genesis Block has no previous block. Its previous hash field is set to all zeros, a null value.">
    <rect x="50" y="155" width="220" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="160" y="185" font-size="16" fill="#1976d2" text-anchor="middle" font-weight="bold">Block 0</text>
    <text x="160" y="205" font-size="11" fill="#666" text-anchor="middle">Height: 0</text>
    <line x1="270" y1="190" x2="320" y2="190" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="320" y="170" width="180" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="410" y="195" font-size="12" fill="#e65100" text-anchor="middle">Previous Hash:</text>
    <text x="410" y="210" font-size="10" fill="#e65100" text-anchor="middle">0x0000...0000 (NULL)</text>
    <text x="560" y="190" font-size="13" fill="#666">No predecessor</text>
  </g>
  
  <g id="step2" data-narration="The Genesis Block header contains specific technical attributes: block height of zero, null previous hash, a timestamp, nonce, and Merkle root.">
    <rect x="50" y="245" width="700" height="85" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="400" y="270" font-size="14" fill="#388e3c" text-anchor="middle" font-weight="bold">BLOCK HEADER ATTRIBUTES</text>
    <rect x="70" y="285" width="130" height="35" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="135" y="308" font-size="12" fill="#388e3c" text-anchor="middle">Block Height: 0</text>
    <rect x="210" y="285" width="160" height="35" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="290" y="308" font-size="11" fill="#388e3c" text-anchor="middle">Previous Hash: 0x00...</text>
    <rect x="380" y="285" width="130" height="35" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="445" y="308" font-size="12" fill="#388e3c" text-anchor="middle">Timestamp</text>
    <rect x="520" y="285" width="100" height="35" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="570" y="308" font-size="12" fill="#388e3c" text-anchor="middle">Nonce</text>
    <rect x="630" y="285" width="100" height="35" fill="#fff" stroke="#388e3c" rx="4"/>
    <text x="680" y="308" font-size="11" fill="#388e3c" text-anchor="middle">Merkle Root</text>
  </g>
  
  <g id="step3" data-narration="The Genesis Block contains a special coinbase transaction rewarding 50 BTC to address 1A1zP1eP5QGefi2DMPTfTL5, but these coins are permanently unspendable.">
    <rect x="50" y="350" width="350" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="225" y="375" font-size="14" fill="#e65100" text-anchor="middle" font-weight="bold">COINBASE TRANSACTION</text>
    <text x="225" y="400" font-size="12" fill="#333" text-anchor="middle">Reward: 50 BTC</text>
    <text x="225" y="418" font-size="11" fill="#666" text-anchor="middle">To: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa</text>
    <rect x="420" y="365" width="330" height="50" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="8"/>
    <text x="585" y="390" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">UNSPENDABLE</text>
    <text x="585" y="408" font-size="11" fill="#666" text-anchor="middle">Code prevents spending these coins</text>
  </g>
  
  <g id="step4" data-narration="The Genesis Block is immutable because changing it would require recalculating every subsequent block, which is computationally infeasible through Proof-of-Work.">
    <text x="50" y="455" font-size="15" fill="#1976d2" font-weight="bold">Immutability Through Proof-of-Work</text>
    <rect x="50" y="470" width="90" height="45" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="95" y="490" font-size="10" fill="#1976d2" text-anchor="middle">Block 0</text>
    <text x="95" y="502" font-size="8" fill="#666" text-anchor="middle">Genesis</text>
    <line x1="140" y1="492" x2="170" y2="492" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="170" y="470" width="90" height="45" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="215" y="490" font-size="10" fill="#1976d2" text-anchor="middle">Block 1</text>
    <line x1="260" y1="492" x2="290" y2="492" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="290" y="470" width="90" height="45" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="335" y="490" font-size="10" fill="#1976d2" text-anchor="middle">Block 2</text>
    <line x1="380" y1="492" x2="410" y2="492" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="430" y="490" font-size="11" fill="#666">... and so on</text>
    <rect x="550" y="465" width="200" height="55" fill="#f3e5f5" stroke="#9c27b0" rx="8"/>
    <text x="650" y="485" font-size="12" fill="#9c27b0" text-anchor="middle" font-weight="bold">Trust Anchor</text>
    <text x="650" y="505" font-size="10" fill="#666" text-anchor="middle">All nodes must agree on</text>
    <text x="650" y="515" font-size="10" fill="#666" text-anchor="middle">genesis block hash</text>
  </g>
  
  <g id="step5" data-narration="Satoshi embedded The Times newspaper headline in the genesis block as a timestamp and political statement about Bitcoin's purpose as an alternative to centralized banking.">
    <rect x="50" y="535" width="700" height="50" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="400" y="555" font-size="12" fill="#6a1b9a" text-anchor="middle" font-weight="bold">EMBEDDED MESSAGE</text>
    <text x="400" y="575" font-size="11" fill="#333" text-anchor="middle">"The Times 03/Jan/2009 Chancellor on brink of second bailout for banks"</text>
    <text x="730" y="570" font-size="10" fill="#666" text-anchor="end">Jan 3, 2009</text>
  </g>
</svg>