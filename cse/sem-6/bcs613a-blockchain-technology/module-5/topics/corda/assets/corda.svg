<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="Corda is an open-source blockchain platform developed by R3 for building interoperable networks for financial services and regulated markets globally.">
<rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
<text x="400" y="35" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Corda - Distributed Ledger Technology</text>
</g>
<g class="step" id="step1" data-narration="Corda is a DLT enabling secure, private, scalable data sharing between businesses. It uses a unique architecture different from traditional blockchains.">
<rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
<text x="40" y="80" fill="#1976d2" font-size="13" font-weight="bold">Introduction</text>
<text x="40" y="98" fill="#333" font-size="10">Corda is an open-source blockchain platform developed by R3 for</text>
<text x="40" y="112" fill="#333" font-size="10">financial services and regulated markets. It enables secure, private,</text>
<text x="40" y="126" fill="#333" font-size="10">and scalable data sharing between parties through unique DLT architecture.</text>
</g>
<g class="step" id="step2" data-narration="A Node is an entity participating in the Corda network with its own ledger copy. The Ledger stores all transaction history divided into partitions accessible only to authorized nodes.">
<rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
<text x="40" y="168" fill="#388e3c" font-size="13" font-weight="bold">Architecture: Nodes &amp; Ledger</text>
<rect x="40" y="180" width="180" height="38" fill="#c8e6c9" rx="4"/>
<text x="130" y="195" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">Node</text>
<text x="130" y="210" text-anchor="middle" fill="#333" font-size="9">Entity with ledger copy</text>
<path d="M240 199 L250 199" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="260" y="180" width="200" height="38" fill="#c8e6c9" rx="4"/>
<text x="360" y="195" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">Ledger</text>
<text x="360" y="210" text-anchor="middle" fill="#333" font-size="9">Distributed database of transactions</text>
</g>
<g class="step" id="step3" data-narration="Transactions update the ledger with inputs, outputs, and commands. Smart Contracts in Kotlin validate transactions ensuring all network rule compliance.">
<rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
<text x="40" y="256" fill="#e65100" font-size="13" font-weight="bold">Architecture: Transactions &amp; Smart Contracts</text>
<rect x="40" y="268" width="180" height="40" fill="#ffe0b2" rx="4"/>
<text x="130" y="283" text-anchor="middle" fill="#ef6c00" font-size="11" font-weight="bold">Transaction</text>
<text x="130" y="298" text-anchor="middle" fill="#333" font-size="9">Inputs + Outputs + Commands</text>
<rect x="240" y="268" width="180" height="40" fill="#ffe0b2" rx="4"/>
<text x="330" y="283" text-anchor="middle" fill="#ef6c00" font-size="11" font-weight="bold">Smart Contract</text>
<text x="330" y="298" text-anchor="middle" fill="#333" font-size="9">Written in Kotlin, validates txns</text>
<path d="M440 288 L450 288" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="460" y="268" width="180" height="40" fill="#ffe0b2" rx="4"/>
<text x="550" y="283" text-anchor="middle" fill="#ef6c00" font-size="11" font-weight="bold">Validation</text>
<text x="550" y="298" text-anchor="middle" fill="#333" font-size="9">Ensures network rule compliance</text>
</g>
<g class="step" id="step4" data-narration="Corda features include interoperability between networks, high scalability for enterprise, advanced security via cryptography, and private transactions between nodes today.">
<rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
<text x="40" y="344" fill="#7b1fa2" font-size="13" font-weight="bold">Features of Corda</text>
<rect x="40" y="356" width="170" height="40" fill="#e1bee7" rx="4"/>
<text x="125" y="371" text-anchor="middle" fill="#6a1b9a" font-size="11" font-weight="bold">Interoperability</text>
<text x="125" y="386" text-anchor="middle" fill="#333" font-size="8">Cross-network communication</text>
<rect x="220" y="356" width="170" height="40" fill="#e1bee7" rx="4"/>
<text x="305" y="371" text-anchor="middle" fill="#6a1b9a" font-size="11" font-weight="bold">Scalability</text>
<text x="305" y="386" text-anchor="middle" fill="#333" font-size="8">High transaction volumes</text>
<rect x="400" y="356" width="170" height="40" fill="#e1bee7" rx="4"/>
<text x="485" y="371" text-anchor="middle" fill="#6a1b9a" font-size="11" font-weight="bold">Security</text>
<text x="485" y="386" text-anchor="middle" fill="#333" font-size="8">Advanced cryptography</text>
<rect x="580" y="356" width="180" height="40" fill="#e1bee7" rx="4"/>
<text x="670" y="371" text-anchor="middle" fill="#6a1b9a" font-size="11" font-weight="bold">Private Transactions</text>
<text x="670" y="386" text-anchor="middle" fill="#333" font-size="8">Node-to-node data sharing</text>
</g>
<g class="step" id="step5" data-narration="Corda applications include Trade Finance for document exchange, Supply Chain Finance for tracking goods, and Identity Verification for secure identity sharing.">
<rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
<text x="40" y="432" fill="#c62828" font-size="13" font-weight="bold">Applications of Corda</text>
<rect x="40" y="444" width="220" height="40" fill="#ffcdd2" rx="4"/>
<text x="150" y="459" text-anchor="middle" fill="#b71c1c" font-size="11" font-weight="bold">Trade Finance</text>
<text x="150" y="474" text-anchor="middle" fill="#333" font-size="8">Secure document &amp; payment exchange</text>
<rect x="270" y="444" width="220" height="40" fill="#ffcdd2" rx="4"/>
<text x="380" y="459" text-anchor="middle" fill="#b71c1c" font-size="11" font-weight="bold">Supply Chain Finance</text>
<text x="380" y="474" text-anchor="middle" fill="#333" font-size="8">Real-time tracking &amp; payments</text>
<rect x="500" y="444" width="260" height="40" fill="#ffcdd2" rx="4"/>
<text x="630" y="459" text-anchor="middle" fill="#b71c1c" font-size="11" font-weight="bold">Identity Verification</text>
<text x="630" y="474" text-anchor="middle" fill="#333" font-size="8">Secure private identity sharing</text>
</g>
<g class="step" id="step6" data-narration="Key points: Corda uses Kotlin, open-source, unique privacy-focused architecture. Exam tips focus on architecture, features, applications, and smart contract validation.">
<rect x="20" y="498" width="760" height="90" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
<text x="40" y="520" fill="#1976d2" font-size="13" font-weight="bold">Key Points &amp; Exam Tips</text>
<text x="40" y="538" fill="#333" font-size="10">• Corda: Open-source DLT by R3, built with Kotlin</text>
<text x="40" y="552" fill="#333" font-size="10">• Unique privacy-focused: only share data with involved parties</text>
<text x="40" y="566" fill="#333" font-size="10">• Architecture: Nodes, Ledger, Transactions, Smart Contracts</text>
<text x="40" y="580" fill="#333" font-size="10">• Exam: Know features, applications, and smart contract validation role</text>
</g>
</svg>