<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="Hyperledger is an open-source collaborative effort created by the Linux Foundation to advance cross-industry blockchain technologies for enterprise applications worldwide.">
<rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
<text x="400" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Hyperledger as a Protocol</text>
</g>
<g class="step" id="step1" data-narration="Hyperledger serves as an umbrella project with modular architecture, hosting Fabric, Sawtooth, and Corda platforms specifically designed for enterprise blockchain solutions.">
<rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
<text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">What is Hyperledger?</text>
<text x="40" y="96" font-family="Arial" font-size="10" fill="#333">An open-source collaborative effort by Linux Foundation</text>
<text x="40" y="112" font-family="Arial" font-size="10" fill="#333">Umbrella project for cross-industry blockchain technologies</text>
<text x="40" y="128" font-family="Arial" font-size="10" fill="#333">Framework for building enterprise blockchain apps and networks</text>
</g>
<g class="step" id="step2" data-narration="Hyperledger Fabric provides a modular foundation for enterprise applications, Sawtooth offers scalable PoET consensus mechanism, and Corda enables private business solutions.">
<rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
<text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Hyperledger Platforms</text>
<rect x="40" y="180" width="220" height="36" fill="#c8e6c9" rx="4"/>
<text x="150" y="194" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">Fabric</text>
<text x="150" y="208" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">Modular Enterprise Platform</text>
<rect x="270" y="180" width="220" height="36" fill="#c8e6c9" rx="4"/>
<text x="380" y="194" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">Sawtooth Lake</text>
<text x="380" y="208" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">PoET Consensus, Scalable</text>
<rect x="500" y="180" width="220" height="36" fill="#c8e6c9" rx="4"/>
<text x="610" y="194" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">Corda</text>
<text x="610" y="208" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">Enterprise Private Solutions</text>
</g>
<g class="step" id="step3" data-narration="The protocol has four layers: Network for node communication, Data for storage/validation, Consensus for agreement, and Application for smart contracts.">
<rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
<text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Hyperledger Protocol Layers</text>
<rect x="40" y="268" width="170" height="36" fill="#ffe0b2" rx="4"/>
<text x="125" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ef6c00" text-anchor="middle">Network Layer</text>
<text x="125" y="296" font-family="Arial" font-size="8" fill="#ef6c00" text-anchor="middle">Node Communication</text>
<rect x="220" y="268" width="170" height="36" fill="#ffe0b2" rx="4"/>
<text x="305" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ef6c00" text-anchor="middle">Data Layer</text>
<text x="305" y="296" font-family="Arial" font-size="8" fill="#ef6c00" text-anchor="middle">Storage &amp; Validation</text>
<rect x="400" y="268" width="170" height="36" fill="#ffe0b2" rx="4"/>
<text x="485" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ef6c00" text-anchor="middle">Consensus Layer</text>
<text x="485" y="296" font-family="Arial" font-size="8" fill="#ef6c00" text-anchor="middle">PoW, PoS, BFT</text>
<rect x="580" y="268" width="170" height="36" fill="#ffe0b2" rx="4"/>
<text x="665" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#ef6c00" text-anchor="middle">Application Layer</text>
<text x="665" y="296" font-family="Arial" font-size="8" fill="#ef6c00" text-anchor="middle">Smart Contracts, APIs, SDKs</text>
</g>
<g class="step" id="step4" data-narration="Hyperledger offers exceptional modularity for building custom applications, scalability for large enterprise networks, robust security through its architecture, and flexibility across diverse use cases.">
<rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
<text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">Advantages of Hyperledger</text>
<rect x="40" y="356" width="170" height="36" fill="#e1bee7" rx="4"/>
<text x="125" y="372" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Modularity</text>
<text x="125" y="386" font-family="Arial" font-size="8" fill="#6a1b9a" text-anchor="middle">Custom Apps &amp; Networks</text>
<rect x="220" y="356" width="170" height="36" fill="#e1bee7" rx="4"/>
<text x="305" y="372" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Scalability</text>
<text x="305" y="386" font-family="Arial" font-size="8" fill="#6a1b9a" text-anchor="middle">Large-scale Networks</text>
<rect x="400" y="356" width="170" height="36" fill="#e1bee7" rx="4"/>
<text x="485" y="372" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Security</text>
<text x="485" y="386" font-family="Arial" font-size="8" fill="#6a1b9a" text-anchor="middle">High-level Protection</text>
<rect x="580" y="356" width="170" height="36" fill="#e1bee7" rx="4"/>
<text x="665" y="372" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Flexibility</text>
<text x="665" y="386" font-family="Arial" font-size="8" fill="#6a1b9a" text-anchor="middle">Wide Range of Use Cases</text>
</g>
<g class="step" id="step5" data-narration="For exams, students should understand the architecture components including Fabric, Sawtooth, and Corda, along with protocol layers, key advantages, and how Hyperledger compares to other blockchain platforms.">
<rect x="20" y="410" width="760" height="80" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
<text x="40" y="430" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Exam Tips &amp; Key Takeaways</text>
<text x="40" y="450" font-family="Arial" font-size="10" fill="#333">• Understand Hyperledger architecture: Fabric, Sawtooth, Corda</text>
<text x="40" y="466" font-family="Arial" font-size="10" fill="#333">• Know the 4 protocol layers: Network, Data, Consensus, Application</text>
<text x="40" y="482" font-family="Arial" font-size="10" fill="#333">• Remember advantages: Modularity, Scalability, Security, Flexibility</text>
<text x="400" y="482" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Key Difference: Hyperledger = Permissioned Enterprise Blockchain</text>
</g>
<g class="step" id="step6" data-narration="Hyperledger differs significantly from public blockchains like Ethereum because it is permissioned, provides enhanced privacy features, and is specifically designed for business transactions and enterprise use cases.">
<rect x="20" y="498" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
<text x="40" y="518" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Hyperledger vs Other Blockchains</text>
<rect x="40" y="532" width="340" height="36" fill="#bbdefb" rx="4"/>
<text x="210" y="548" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1" text-anchor="middle">Hyperledger</text>
<text x="210" y="562" font-family="Arial" font-size="8" fill="#0d47a1" text-anchor="middle">Permissioned | Enterprise | Private | Modular</text>
<rect x="400" y="532" width="340" height="36" fill="#ffcdd2" rx="4"/>
<text x="570" y="548" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c" text-anchor="middle">Public Blockchains (Ethereum)</text>
<text x="570" y="562" font-family="Arial" font-size="8" fill="#b71c1c" text-anchor="middle">Permissionless | Public | PoW/PoS | Single Platform</text>
</g>
</svg>