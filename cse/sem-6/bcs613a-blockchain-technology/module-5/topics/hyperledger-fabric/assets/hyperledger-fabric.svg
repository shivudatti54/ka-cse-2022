<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Hyperledger Fabric, an open-source permissioned blockchain platform developed by the Linux Foundation for building enterprise-grade distributed applications with modular architecture and advanced security features.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Hyperledger Fabric</text>
  </g>
  
  <g class="step" id="step1" data-narration="Hyperledger Fabric is a modular, scalable blockchain platform developed by the Linux Foundation as part of the Hyperledger project. It provides a flexible and secure foundation for building enterprise-grade decentralized applications with customizable consensus and smart contracts.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">Introduction</text>
    <text x="40" y="100" font-family="Arial, sans-serif" font-size="11" fill="#333">Open-source permissioned blockchain platform developed by Linux Foundation's</text>
    <text x="40" y="116" font-family="Arial, sans-serif" font-size="11" fill="#333">Hyperledger project. Provides modular, scalable, and secure foundation for</text>
    <text x="40" y="132" font-family="Arial, sans-serif" font-size="11" fill="#333">building enterprise blockchain applications.</text>
  </g>
  
  <g class="step" id="step2" data-narration="The architecture has four main components: peer nodes for blockchain storage, orderers for transaction ordering, clients for interaction, and certificate authority for security.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#388e3c">Architecture Components</text>
    <rect x="40" y="182" width="160" height="36" fill="#c8e6c9" rx="4"/>
    <text x="120" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Peer Nodes</text>
    <rect x="210" y="182" width="160" height="36" fill="#c8e6c9" rx="4"/>
    <text x="290" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Orderer Nodes</text>
    <rect x="380" y="182" width="160" height="36" fill="#c8e6c9" rx="4"/>
    <text x="460" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Client Nodes</text>
    <rect x="550" y="182" width="160" height="36" fill="#c8e6c9" rx="4"/>
    <text x="630" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Certificate Authority</text>
  </g>
  
  <g class="step" id="step3" data-narration="Key features include permissioned network for authorized access, modular architecture for customization, high scalability for enterprise needs, and strong security with certificates and encryption.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff9800">Key Features</text>
    <rect x="40" y="270" width="175" height="38" fill="#ffe0b2" rx="4"/>
    <text x="127" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e65100">Permissioned Network</text>
    <rect x="225" y="270" width="175" height="38" fill="#ffe0b2" rx="4"/>
    <text x="312" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e65100">Modular Architecture</text>
    <rect x="410" y="270" width="175" height="38" fill="#ffe0b2" rx="4"/>
    <text x="497" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e65100">Scalability</text>
    <rect x="595" y="270" width="175" height="38" fill="#ffe0b2" rx="4"/>
    <text x="682" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e65100">Security</text>
  </g>
  
  <g class="step" id="step4" data-narration="Hyperledger Fabric serves three major domains: supply chain for tracking goods, financial services for secure transactions, and healthcare for managing medical records.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="344" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9c27b0">Use Cases</text>
    <rect x="40" y="358" width="230" height="38" fill="#e1bee7" rx="4"/>
    <text x="155" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6a1b9a">Supply Chain Management</text>
    <rect x="285" y="358" width="230" height="38" fill="#e1bee7" rx="4"/>
    <text x="400" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6a1b9a">Financial Services</text>
    <rect x="530" y="358" width="230" height="38" fill="#e1bee7" rx="4"/>
    <text x="645" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6a1b9a">Healthcare</text>
  </g>
  
  <g class="step" id="step5" data-narration="In supply chain example: manufacturer creates product, warehouse stores and tracks it, then ownership transfers to buyer with blockchain-recorded transaction.">
    <rect x="20" y="410" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">Example: Supply Chain System</text>
    <rect x="40" y="450" width="200" height="34" fill="#bbdefb" rx="4"/>
    <text x="140" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0d47a1">Manufacturer creates product</text>
    <line x1="240" y1="467" x2="260" y2="467" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="270" y="450" width="200" height="34" fill="#bbdefb" rx="4"/>
    <text x="370" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0d47a1">Warehouse stores and tracks</text>
    <line x1="470" y1="467" x2="490" y2="467" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="500" y="450" width="220" height="34" fill="#bbdefb" rx="4"/>
    <text x="610" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0d47a1">Ownership transfers to buyer</text>
  </g>
  
  <g class="step" id="step6" data-narration="For exams: remember the four architecture components, four key features, three main use cases, and the supply chain workflow example.">
    <rect x="20" y="498" width="760" height="90" fill="#e8f5e9" rx="8"/>
    <text x="40" y="520" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#388e3c">Exam Tips &amp; Key Points</text>
    <text x="40" y="540" font-family="Arial, sans-serif" font-size="10" fill="#333">1. Architecture: Peer, Orderer, Client nodes + Certificate Authority</text>
    <text x="40" y="556" font-family="Arial, sans-serif" font-size="10" fill="#333">2. Features: Permissioned network, modular, scalable, secure</text>
    <text x="40" y="572" font-family="Arial, sans-serif" font-size="10" fill="#333">3. Use cases: Supply chain, financial services, healthcare</text>
    <text x="40" y="588" font-family="Arial, sans-serif" font-size="10" fill="#333">4. Benefits: Improved security, scalability, transparency</text>
  </g>
</svg>