<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/></marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Decentralized Autonomous Corporations represent a revolutionary new organizational model powered by blockchain technology, smart contracts, and distributed token-based governance systems worldwide.">
<rect x="50" y="10" width="700" height="40" rx="8" fill="#e1bee7"/>
<text x="400" y="38" font-family="Arial" font-size="18" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Decentralized Autonomous Corporations (DACs)</text>
</g>

<g class="step" id="step1" data-narration="A DAC is a blockchain-based organization run by smart contracts. No CEOs, no board meetings, no central authority—just code and distributed consensus for all decisions.">
<rect x="50" y="58" width="700" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">What is a DAC?</text>
<rect x="70" y="88" width="200" height="40" rx="4" fill="#e1bee7"/>
<text x="170" y="113" font-family="Arial" font-size="10" fill="#4a148c" text-anchor="middle">Traditional Corp</text>
<text x="170" y="125" font-family="Arial" font-size="8" fill="#7b1fa2" text-anchor="middle">Hierarchies • Central Authority</text>
<path d="M290 108 L330 108" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="340" y="88" width="200" height="40" rx="4" fill="#c8e6c9"/>
<text x="440" y="113" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">DAC</text>
<text x="440" y="125" font-family="Arial" font-size="8" fill="#388e3c" text-anchor="middle">Code • Consensus • Tokens</text>
</g>

<g class="step" id="step2" data-narration="Every DAC rests on three pillars: blockchain for immutable records, smart contracts for automated execution, and tokens for voting rights across the network.">
<rect x="50" y="146" width="700" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20">Three Core Components</text>
<rect x="70" y="180" width="210" height="38" rx="4" fill="#c8e6c9"/>
<text x="175" y="198" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">Blockchain</text>
<text x="175" y="212" font-family="Arial" font-size="8" fill="#388e3c" text-anchor="middle">Immutable Ledger</text>
<rect x="295" y="180" width="210" height="38" rx="4" fill="#c8e6c9"/>
<text x="400" y="198" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">Smart Contracts</text>
<text x="400" y="212" font-family="Arial" font-size="8" fill="#388e3c" text-anchor="middle">Self-Executing Rules</text>
<rect x="520" y="180" width="210" height="38" rx="4" fill="#c8e6c9"/>
<text x="625" y="198" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">Governance Tokens</text>
<text x="625" y="212" font-family="Arial" font-size="8" fill="#388e3c" text-anchor="middle">Voting Rights</text>
</g>

<g class="step" id="step3" data-narration="Token holders submit proposals and vote on decisions through democratic mechanisms. Smart contracts automatically execute the outcomes without any human intervention needed ever.">
<rect x="50" y="234" width="700" height="91" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#0d47a1">How DAC Governance Works</text>
<rect x="70" y="268" width="140" height="38" rx="4" fill="#bbdefb"/>
<text x="140" y="288" font-family="Arial" font-size="9" fill="#0d47a1" text-anchor="middle">1. Submit Proposal</text>
<rect x="220" y="268" width="140" height="38" rx="4" fill="#bbdefb"/>
<text x="290" y="288" font-family="Arial" font-size="9" fill="#0d47a1" text-anchor="middle">2. Token Vote</text>
<rect x="370" y="268" width="140" height="38" rx="4" fill="#bbdefb"/>
<text x="440" y="288" font-family="Arial" font-size="9" fill="#0d47a1" text-anchor="middle">3. Tally Results</text>
<rect x="520" y="268" width="140" height="38" rx="4" fill="#90caf9"/>
<text x="590" y="288" font-family="Arial" font-size="9" fill="#0d47a1" text-anchor="middle">4. Auto-Execute</text>
<path d="M655 287 L690 287" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
<text x="70" y="318" font-family="Arial" font-size="8" fill="#1565c0">Code enforces rules 24/7 without intermediaries</text>
</g>

<g class="step" id="step4" data-narration="DACs offer complete transparency since everyone can see the public ledger, faster operations through code automation, and global participation across borders without restrictions.">
<rect x="50" y="333" width="700" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
<text x="70" y="353" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Key Advantages</text>
<rect x="70" y="367" width="200" height="38" rx="4" fill="#ffe0b2"/>
<text x="170" y="386" font-family="Arial" font-size="10" fill="#e65100" text-anchor="middle">Transparency</text>
<text x="170" y="399" font-family="Arial" font-size="8" fill="#ef6c00" text-anchor="middle">Public Ledger for All</text>
<rect x="290" y="367" width="200" height="38" rx="4" fill="#ffe0b2"/>
<text x="390" y="386" font-family="Arial" font-size="10" fill="#e65100" text-anchor="middle">Efficiency</text>
<text x="390" y="399" font-family="Arial" font-size="8" fill="#ef6c00" text-anchor="middle">Automated Execution</text>
<rect x="510" y="367" width="200" height="38" rx="4" fill="#ffe0b2"/>
<text x="610" y="386" font-family="Arial" font-size="10" fill="#e65100" text-anchor="middle">Global Access</text>
<text x="610" y="399" font-family="Arial" font-size="8" fill="#ef6c00" text-anchor="middle">Anyone, Anywhere</text>
</g>

<g class="step" id="step5" data-narration="Real DACs include Dash for decentralized governance, BitShares for decentralized exchange operations, and The DAO for venture funding and investment management.">
<rect x="50" y="421" width="700" height="80" rx="8" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
<text x="70" y="441" font-family="Arial" font-size="12" font-weight="bold" fill="#1a237e">Real-World Examples</text>
<rect x="70" y="455" width="210" height="38" rx="4" fill="#c5cae9"/>
<text x="175" y="477" font-family="Arial" font-size="10" fill="#1a237e" text-anchor="middle">Dash</text>
<text x="175" y="489" font-family="Arial" font-size="8" fill="#303f9f" text-anchor="middle">Decentralized Governance</text>
<rect x="295" y="455" width="210" height="38" rx="4" fill="#c5cae9"/>
<text x="400" y="477" font-family="Arial" font-size="10" fill="#1a237e" text-anchor="middle">BitShares</text>
<text x="400" y="489" font-family="Arial" font-size="8" fill="#303f9f" text-anchor="middle">Decentralized Exchange</text>
<rect x="520" y="455" width="210" height="38" rx="4" fill="#9fa8da"/>
<text x="625" y="477" font-family="Arial" font-size="10" fill="#1a237e" text-anchor="middle">The DAO</text>
<text x="625" y="489" font-family="Arial" font-size="8" fill="#303f9f" text-anchor="middle">Venture Capital DAC</text>
</g>

<g class="step" id="step6" data-narration="Key challenges include scalability limitations on networks, unclear regulatory frameworks globally, and security vulnerabilities in code. The future depends on solving these while preserving decentralization.">
<rect x="50" y="509" width="700" height="90" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
<text x="70" y="529" font-family="Arial" font-size="12" font-weight="bold" fill="#b71c1c">Challenges &amp; Future</text>
<rect x="70" y="543" width="150" height="46" rx="4" fill="#ffcdd2"/>
<text x="145" y="563" font-family="Arial" font-size="9" fill="#b71c1c" text-anchor="middle">Scalability</text>
<text x="145" y="577" font-family="Arial" font-size="8" fill="#c62828" text-anchor="middle">Network Limits</text>
<rect x="240" y="543" width="150" height="46" rx="4" fill="#ffcdd2"/>
<text x="315" y="563" font-family="Arial" font-size="9" fill="#b71c1c" text-anchor="middle">Regulation</text>
<text x="315" y="577" font-family="Arial" font-size="8" fill="#c62828" text-anchor="middle">Legal Uncertainty</text>
<rect x="410" y="543" width="150" height="46" rx="4" fill="#ffcdd2"/>
<text x="485" y="563" font-family="Arial" font-size="9" fill="#b71c1c" text-anchor="middle">Security</text>
<text x="485" y="577" font-family="Arial" font-size="8" fill="#c62828" text-anchor="middle">Code Vulnerabilities</text>
<rect x="580" y="543" width="150" height="46" rx="4" fill="#ef9a9a"/>
<text x="655" y="563" font-family="Arial" font-size="9" fill="#b71c1c" text-anchor="middle">Future Outlook</text>
<text x="655" y="577" font-family="Arial" font-size="8" fill="#c62828" text-anchor="middle">Balanced Solutions</text>
</g>
</svg>