<svg viewBox="0 0 800 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .tree-edge { stroke-dasharray: 300; animation: drawLine 1s ease-out forwards; }
    .node-circle { animation: scaleIn 0.4s ease-out backwards; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="920" fill="#f8f9fa"/>
  
  <!-- STEP 0: Title -->
  <g class="step" id="step0" data-narration="Patricia Trees are efficient data structures for storing and searching strings, crucial in blockchain technology.">
    <rect x="0" y="0" width="800" height="50" fill="url(#titleGrad)" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">PATRICIA TREES</text>
    <text x="400" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e3f2fd">Radix Trees in Computer Science &amp; Blockchain</text>
  </g>
  
  <!-- STEP 1: What is Patricia Tree -->
  <g class="step" id="step1" data-narration="A Patricia tree is a compressed trie that stores prefixes efficiently, ideal for large datasets like blockchain state.">
    <rect x="20" y="60" width="760" h="85" fill="url(#blueGrad)" rx="8" filter="url(#shadow)"/>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">What is a Patricia Tree?</text>
    <text x="40" y="100" font-family="Arial, sans-serif" font-size="10" fill="#333">A Patricia tree (Practical Algorithm to Retrieve Information Coded in Alphanumeric) is a</text>
    <text x="40" y="115" font-family="Arial, sans-serif" font-size="10" fill="#333">compressed trie that stores prefixes efficiently. Each node represents a shared prefix,</text>
    <text x="40" y="130" font-family="Arial, sans-serif" font-size="10" fill="#333">making it perfect for blockchain state storage where keys share common prefixes.</text>
    <!-- Visual icon -->
    <circle cx="700" cy="102" r="25" fill="#1976d2" opacity="0.2"/>
    <path d="M685,102 L695,112 L715,92" stroke="#1976d2" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- STEP 2: Trie vs Patricia Comparison -->
  <g class="step" id="step2" data-narration="Unlike regular tries with single characters per node, Patricia trees compress paths with shared prefixes into single nodes.">
    <rect x="20" y="155" width="370" h="95" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="35" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f44336">Regular Trie</text>
    <text x="35" y="190" font-family="Arial, sans-serif" font-size="9" fill="#666">Each edge = 1 character</text>
    <!-- Trie visualization -->
    <circle cx="60" cy="215" r="8" fill="#ffebee" stroke="#f44336" stroke-width="2" class="node-circle"/>
    <text x="56" y="218" font-size="7" text-anchor="middle" fill="#f44336">R</text>
    <line x1="68" y1="215" x2="90" y2="200" stroke="#f44336" stroke-width="1.5" class="tree-edge"/>
    <text x="75" y="202" font-size="7" fill="#f44336">a</text>
    <line x1="68" y1="215" x2="90" y2="230" stroke="#f44336" stroke-width="1.5" class="tree-edge"/>
    <text x="75" y="238" font-size="7" fill="#f44336">e</text>
    <circle cx="95" cy="200" r="8" fill="#ffebee" stroke="#f44336" stroke-width="2" class="node-circle" style="animation-delay:0.2s"/>
    <text x="91" y="203" font-size="7" text-anchor="middle" fill="#f44336">d</text>
    <circle cx="120" cy="200" r="8" fill="#ffebee" stroke="#f44336" stroke-width="2" class="node-circle" style="animation-delay:0.4s"/>
    <text x="116" y="203" font-size="7" text-anchor="middle" fill="#f44336">*</text>
    
    <rect x="405" y="155" width="375" h="95" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="420" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#388e3c">Patricia Tree</text>
    <text x="420" y="190" font-family="Arial, sans-serif" font-size="9" fill="#666">Edges can hold multiple chars</text>
    <!-- Patricia visualization -->
    <circle cx="450" cy="215" r="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" class="node-circle"/>
    <text x="446" y="218" font-size="8" text-anchor="middle" fill="#388e3c">R</text>
    <line x1="460" y1="215" x2="500" y2="215" stroke="#388e3c" stroke-width="2" class="tree-edge"/>
    <text x="478" y="210" font-size="8" fill="#388e3c">"ea"</text>
    <circle cx="510" cy="215" r="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" class="node-circle" style="animation-delay:0.3s"/>
    <text x="506" y="218" font-size="8" text-anchor="middle" fill="#388e3c">d*</text>
  </g>
  
  <!-- STEP 3: Node Structure -->
  <g class="step" id="step3" data-narration="Each Patricia tree node contains a key prefix, child nodes array, and optional value - enabling efficient storage.">
    <rect x="20" y="260" width="760" h="95" fill="url(#purpleGrad)" rx="8" filter="url(#shadow)"/>
    <text x="40" y="282" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7b1fa2">Node Structure</text>
    <!-- Node diagram -->
    <rect x="40" y="295" width="180" h="45" fill="white" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="130" y="315" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">Node</text>
    <line x1="130" y1="325" x2="130" y2="335" stroke="#9c27b0" stroke-width="1"/>
    <text x="70" y="352" font-size="9" fill="#666">prefix: "0x12ab"</text>
    <text x="180" y="352" font-size="9" fill="#666">value: 100 ETH</text>
    
    <!-- Child nodes representation -->
    <text x="260" y="315" font-size="11" fill="#7b1fa2">Children:</text>
    <rect x="260" y="325" width="50" h="20" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="285" y="339" text-anchor="middle" font-size="9" fill="#333">[0]</text>
    <rect x="320" y="325" width="50" h="20" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="345" y="339" text-anchor="middle" font-size="9" fill="#333">[1]</text>
    <rect x="380" y="325" width="50" h="20" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="405" y="339" text-anchor="middle" font-size="9" fill="#333">[f]</text>
    <text x="445" y="337" font-size="9" fill="#666">→ 16 branches (0-f)</text>
    
    <!-- Properties list -->
    <rect x="550" y="295" width="220" h="50" fill="white" rx="5"/>
    <text x="560" y="312" font-size="9" fill="#333">• prefix: shared string</text>
    <text x="560" y="327" font-size="9" fill="#333">• children: Hash → Node</text>
    <text x="560" y="342" font-size="9" fill="#333">• value: optional data</text>
  </g>
  
  <!-- STEP 4: Insertion & Search -->
  <g class="step" id="step4" data-narration="To insert or search, we traverse from root following edges matching key characters until we reach the target.">
    <rect x="20" y="365" width="760" h="100" fill="url(#orangeGrad)" rx="8" filter="url(#shadow)"/>
    <text x="40" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Insertion &amp; Search Operations</text>
    
    <!-- Search path visualization -->
    <text x="40" y="408" font-size="10" fill="#333">Search for key: "0xA7F3"</text>
    
    <!-- Tree structure for search demo -->
    <circle cx="80" cy="440" r="12" fill="white" stroke="#ff9800" stroke-width="2" class="node-circle"/>
    <text x="80" y="444" text-anchor="middle" font-size="8" fill="#e65100">Root</text>
    
    <line x1="92" y1="440" x2="140" y2="420" stroke="#ff9800" stroke-width="2" class="tree-edge"/>
    <rect x="140" y="408" width="35" h="20" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="157" y="423" text-anchor="middle" font-size="8" fill="#e65100">"0x"</text>
    
    <line x1="175" y1="420" x2="220" y2="440" stroke="#ff9800" stroke-width="2" class="tree-edge"/>
    <rect x="220" y="428" width="40" h="20" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="240" y="443" text-anchor="middle" font-size="8" fill="#e65100">"A7"</text>
    
    <line x1="260" y1="440" x2="300" y2="420" stroke="#ff9800" stroke-width="2" class="tree-edge"/>
    <rect x="300" y="408" width="45" h="20" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="322" y="423" text-anchor="middle" font-size="8" fill="#e65100">"F3*"</text>
    
    <!-- Search result -->
    <circle cx="345" cy="420" r="10" fill="#4caf50" stroke="#388e3c" stroke-width="2" class="node-circle" style="animation-delay:0.5s"/>
    <text x="345" y="424" text-anchor="middle" font-size="7" fill="white">✓</text>
    
    <!-- Arrow showing traversal -->
    <path d="M380 430 L400 430 L400 455 L430 455" stroke="#e65100" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowGreen)"/>
    <text x="385" y="445" font-size="9" fill="#e65100">Found!</text>
    
    <!-- Complexity box -->
    <rect x="550" y="410" width="210" h="45" fill="white" rx="5"/>
    <text x="560" y="428" font-size="10" font-weight="bold" fill="#333">Time Complexity:</text>
    <text x="560" y="445" font-size="9" fill="#666">Search: O(k) where k = key length</text>
    <text x="560" y="456" font-size="9" fill="#666">Insert: O(k) with Merkle proof</text>
  </g>
  
  <!-- STEP 5: Advantages -->
  <g class="step" id="step5" data-narration="Patricia trees offer efficient storage through prefix sharing, fast O(k) operations, and flexible data handling.">
    <rect x="20" y="475" width="760" h="100" fill="url(#greenGrad)" rx="8" filter="url(#shadow)"/>
    <text x="40" y="497" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Advantages of Patricia Trees</text>
    
    <!-- Three advantage cards -->
    <rect x="40" y="510" width="220" h="55" fill="white" rx="6"/>
    <circle cx="65" cy="535" r="15" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="65" y="539" text-anchor="middle" font-size="14" fill="#388e3c">💾</text>
    <text x="90" y="530" font-size="11" font-weight="bold" fill="#333">Efficient Storage</text>
    <text x="90" y="545" font-size="9" fill="#666">Prefix compression reduces</text>
    <text x="90" y="557" font-size="9" fill="#666">redundant data storage</text>
    
    <rect x="280" y="510" width="220" h="55" fill="white" rx="6"/>
    <circle cx="305" cy="535" r="15" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="305" y="539" text-anchor="middle" font-size="14" fill="#388e3c">⚡</text>
    <text x="330" y="530" font-size="11" font-weight="bold" fill="#333">Fast Operations</text>
    <text x="330" y="545" font-size="9" fill="#666">O(k) search &amp; insert where</text>
    <text x="330" y="557" font-size="9" fill="#666">k = key length in nibbles</text>
    
    <rect x="520" y="510" width="240" h="55" fill="white" rx="6"/>
    <circle cx="545" cy="535" r="15" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="545" y="539" text-anchor="middle" font-size="14" fill="#388e3c">🔧</text>
    <text x="570" y="530" font-size="11" font-weight="bold" fill="#333">Flexible Data</text>
    <text x="570" y="545" font-size="9" fill="#666">Stores strings, integers,</text>
    <text x="570" y="557" font-size="9" fill="#666">and arbitrary byte arrays</text>
  </g>
  
  <!-- STEP 6: Blockchain Use Cases -->
  <g class="step" id="step6" data-narration="In blockchain, Patricia trees manage account balances, smart contract storage, and enable efficient state verification.">
    <rect x="20" y="585" width="760" h="100" fill="url(#blueGrad)" rx="8" filter="url(#shadow)"/>
    <text x="40" y="607" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">Blockchain Use Cases</text>
    
    <!-- Ethereum state trie illustration -->
    <rect x="40" y="620" width="160" h="55" fill="white" rx="5"/>
    <text x="55" y="638" font-size="10" font-weight="bold" fill="#1976d2">State Trie</text>
    <text x="55" y="653" font-size="9" fill="#666">Account balances</text>
    <text x="55" y="666" font-size="9" fill="#666">Nonce, code hash</text>
    <!-- Connection -->
    <line x1="200" y1="647" x2="220" y2="647" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,2"/>
    
    <rect x="230" y="620" width="160" h="55" fill="white" rx="5"/>
    <text x="245" y="638" font-size="10" font-weight="bold" fill="#1976d2">Storage Trie</text>
    <text x="245" y="653" font-size="9" fill="#666">Contract state data</text>
    <text x="245" y="666" font-size="9" fill="#666">Key-value pairs</text>
    <line x1="390" y1="647" x2="410" y2="647" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,2"/>
    
    <rect x="420" y="620" width="160" h="55" fill="white" rx="5"/>
    <text x="435" y="638" font-size="10" font-weight="bold" fill="#1976d2">Transaction Trie</text>
    <text x="435" y="653" font-size="9" fill="#666">Block transactions</text>
    <text x="435" y="666" font-size="9" fill="#666">Receipts &amp; logs</text>
    <line x1="580" y1="647" x2="600" y2="647" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,2"/>
    
    <rect x="610" y="620" width="150" h="55" fill="#e3f2fd" rx="5"/>
    <text x="625" y="638" font-size="10" font-weight="bold" fill="#1565c0">Merkle Proof</text>
    <text x="625" y="653" font-size="9" fill="#666">Verify data integrity</text>
    <text x="625" y="666" font-size="9" fill="#666">Light client support</text>
    
    <!-- Ethereum logo hint -->
    <text x="700" y="640" font-size="20" fill="#627eea">◈</text>
  </g>
  
  <!-- STEP 7: Comparison -->
  <g class="step" id="step7" data-narration="Compared to hash tables and arrays, Patricia trees provide ordered traversal and Merkle proofs, at the cost of complexity.">
    <rect x="20" y="695" width="760" h="95" fill="url(#redGrad)" rx="8" filter="url(#shadow)"/>
    <text x="40" y="717" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c62828">Comparison with Other Structures</text>
    
    <!-- Comparison table -->
    <rect x="40" y="730" width="230" h="50" fill="white" rx="4"/>
    <text x="50" y="748" font-size="10" font-weight="bold" fill="#333">Hash Table</text>
    <text x="130" y="748" font-size="9" fill="#666">O(1) average</text>
    <text x="50" y="763" font-size="8" fill="#999">No ordering, no proofs</text>
    
    <rect x="285" y="730" width="230" h="50" fill="white" rx="4"/>
    <text x="295" y="748" font-size="10" font-weight="bold" fill="#333">Patricia Tree</text>
    <text x="375" y="748" font-size="9" fill="#666">O(k) = O(64)</text>
    <text x="295" y="763" font-size="8" fill="#999">Ordered + Merkle proofs</text>
    
    <rect x="530" y="730" width="230" h="50" fill="white" rx="4"/>
    <text x="540" y="748" font-size="10" font-weight="bold" fill="#333">Sparse Array</text>
    <text x="630" y="748" font-size="9" fill="#666">O(1) index</text>
    <text x="540" y="763" font-size="8" fill="#999">Large space, no prefix sharing</text>
  </g>
  
  <!-- STEP 8: Summary -->
  <g class="step" id="step8" data-narration="Patricia trees efficiently manage blockchain state with prefix compression, fast operations, and verifiable Merkle proofs.">
    <rect x="20" y="800" width="760" h="100" fill="url(#titleGrad)" rx="8" filter="url(#shadow)"/>
    <text x="40" y="825" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Key Takeaways</text>
    
    <!-- Summary points -->
    <text x="40" y="850" font-size="10" fill="#e3f2fd">✓</text>
    <text x="55" y="850" font-size="10" fill="white">Patricia trees are compressed tries storing prefixes efficiently</text>
    
    <text x="40" y="870" font-size="10" fill="#e3f2fd">✓</text>
    <text x="55" y="870" font-size="10" fill="white">Each node has prefix, children map, and optional value</text>
    
    <text x="280" y="850" font-size="10" fill="#e3f2fd">✓</text>
    <text x="295" y="850" font-size="10" fill="white">Search/Insert: O(k) where k = key length</text>
    
    <text x="280" y="870" font-size="10" fill="#e3f2fd">✓</text>
    <text x="295" y="870" font-size="10" fill="white">Used in Ethereum: State, Storage, Transaction tries</text>
    
    <text x="520" y="850" font-size="10" fill="#e3f2fd">✓</text>
    <text x="535" y="850" font-size="10" fill="white">Provide Merkle proofs for light clients</text>
    
    <text x="520" y="870" font-size="10" fill="#e3f2fd">✓</text>
    <text x="535" y="870" font-size="10" fill="white">Trade-off: More complex than hash tables</text>
    
    <!-- Exam tip -->
    <rect x="600" y="820" width="170" h="35" fill="rgba(255,255,255,0.2)" rx="4"/>
    <text x="610" y="835" font-size="9" fill="white" font-weight="bold">Exam Tip:</text>
    <text x="610" y="848" font-size="8" fill="#e3f2fd">Remember Ethereum uses</text>
    <text x="610" y="858" font-size="8" fill="#e3f2fd">Merkle Patricia Trees!</text>
  </g>
</svg>