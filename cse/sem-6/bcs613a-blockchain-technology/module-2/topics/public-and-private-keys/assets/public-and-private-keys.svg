<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step1" data-narration="Public-Key Cryptography uses two mathematically linked keys. The private key signs transactions to prove ownership, while the public key verifies those signatures without revealing secrets.">
    <text x="30" y="40" font-size="22" fill="#1976d2" font-weight="bold">Public and Private Keys</text>
    <text x="30" y="65" font-size="14" fill="#555">Foundation of Blockchain Security</text>
    <rect x="30" y="85" width="720" height="2" fill="#e3f2fd"/>
    <rect x="30" y="95" width="220" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="45" y="120" font-size="16" fill="#1976d2" font-weight="bold">Public Key</text>
    <text x="45" y="140" font-size="12" fill="#555">Share freely - like username</text>
    <text x="45" y="155" font-size="12" fill="#555">Verifies signatures</text>
    <rect x="270" y="95" width="220" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="285" y="120" font-size="16" fill="#f44336" font-weight="bold">Private Key</text>
    <text x="285" y="140" font-size="12" fill="#555">Keep secret - like password</text>
    <text x="285" y="155" font-size="12" fill="#555">Signs transactions</text>
    <path d="M220 135 L290 135" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>
    <text x="235" y="125" font-size="11" fill="#9c27b0">Mathematically</text>
    <text x="235" y="145" font-size="11" fill="#9c27b0">Linked</text>
  </g>
  
  <g id="step2" data-narration="Think of the private key as the master key to a safety deposit box. Only you have it, and anyone with it controls everything inside. It must be kept absolutely secret.">
    <text x="30" y="200" font-size="18" fill="#1976d2" font-weight="bold">The Private Key - Your Master Key</text>
    <rect x="30" y="220" width="340" height="120" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <ellipse cx="90" cy="270" rx="35" ry="25" fill="#ff9800"/>
    <text x="75" y="275" font-size="20" fill="white">🔑</text>
    <text x="135" y="255" font-size="15" fill="#e65100" font-weight="bold">Private Key</text>
    <text x="135" y="275" font-size="12" fill="#555">256-bit secret number</text>
    <text x="135" y="290" font-size="12" fill="#555">Signs transactions</text>
    <text x="135" y="305" font-size="12" fill="#f44336">⚠ Never share!</text>
    <rect x="390" y="220" width="360" height="120" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="410" y="250" font-size="14" fill="#9c27b0" font-weight="bold">Safety Deposit Box Analogy</text>
    <text x="410" y="275" font-size="13" fill="#555">Private key = Master key to your box</text>
    <text x="410" y="295" font-size="13" fill="#555">Only YOU should have this key</text>
    <text x="410" y="315" font-size="13" fill="#f44336">Lose it = Lose your assets forever</text>
  </g>
  
  <g id="step3" data-narration="The public key is like a publicly listed box number. People can send you money knowing your box number, but only your private key can open it.">
    <text x="30" y="360" font-size="18" fill="#1976d2" font-weight="bold">The Public Key - Your Address</text>
    <rect x="30" y="380" width="340" height="120" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <rect x="60" y="410" width="50" height="60" rx="5" fill="#388e3c"/>
    <text x="68" y="445" font-size="24" fill="white">📬</text>
    <text x="125" y="410" font-size="15" fill="#2e7d32" font-weight="bold">Public Key</text>
    <text x="125" y="430" font-size="12" fill="#555">Derived from private key</text>
    <text x="125" y="445" font-size="12" fill="#555">Share freely with anyone</text>
    <text x="125" y="460" font-size="12" fill="#555">Generate wallet addresses</text>
    <rect x="390" y="380" width="360" height="120" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="410" y="410" font-size="14" fill="#9c27b0" font-weight="bold">Box Number Analogy</text>
    <text x="410" y="435" font-size="13" fill="#555">Public key = Box number people know</text>
    <text x="410" y="455" font-size="13" fill="#555">Others send crypto using this address</text>
    <text x="410" y="475" font-size="13" fill="#555">Cannot access funds without private key</text>
  </g>
  
  <g id="step4" data-narration="The keys have a special one-way relationship. It's easy to create a public key from a private key, but mathematically impossible to reverse and find the private key.">
    <text x="30" y="520" font-size="18" fill="#1976d2" font-weight="bold">One-Way Mathematical Relationship</text>
    <rect x="30" y="545" width="720" height="50" rx="8" fill="#e3f2fd"/>
    <rect x="50" y="555" width="80" height="30" rx="4" fill="#f44336"/>
    <text x="65" y="575" font-size="12" fill="white" font-weight="bold">Private Key</text>
    <path d="M140 570 L190 570" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="150" y="560" font-size="10" fill="#9c27b0">One-way</text>
    <text x="152" y="585" font-size="10" fill="#9c27b0">function</text>
    <rect x="200" y="555" width="80" height="30" rx="4" fill="#388e3c"/>
    <text x="215" y="575" font-size="12" fill="white" font-weight="bold">Public Key</text>
    <text x="300" y="575" font-size="13" fill="#555">Easy to derive,</text>
    <text x="300" y="590" font-size="13" fill="#555">impossible to reverse!</text>
    <path d="M380 570 L420 570" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="430" y="555" width="100" height="30" rx="4" fill="#388e3c"/>
    <text x="455" y="575" font-size="11" fill="white" font-weight="bold">Address</text>
    <text x="540" y="575" font-size="12" fill="#555">Hashed public key</text>
  </g>
  
  <g id="step5" data-narration="In a transaction: you sign with your private key, the network receives your public key, and mathematical verification proves you authorized it without revealing your secret.">
    <text x="400" y="200" font-size="18" fill="#1976d2" font-weight="bold">Transaction Flow</text>
    <rect x="400" y="220" width="370" height="130" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <rect x="420" y="240" width="60" height="50" rx="5" fill="#f44336"/>
    <text x="432" y="268" font-size="10" fill="white">You</text>
    <path d="M485 265 L520 265" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="495" y="255" font-size="10" fill="#1976d2">Sign</text>
    <rect x="530" y="240" width="60" height="50" rx="5" fill="#388e3c"/>
    <text x="545" y="268" font-size="10" fill="white">Transaction</text>
    <path d="M595 265 L630 265" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="605" y="255" font-size="10" fill="#1976d2">Broadcast</text>
    <rect x="640" y="240" width="60" height="50" rx="5" fill="#1976d2"/>
    <text x="652" y="268" font-size="10" fill="white">Network</text>
    <text x="420" y="315" font-size="12" fill="#555">1. Wallet uses private key to sign</text>
    <text x="420" y="332" font-size="12" fill="#555">2. Transaction + signature sent to network</text>
    <text x="420" y="349" font-size="12" fill="#555">3. Network uses public key to verify ✓</text>
  </g>
  
  <g id="step6" data-narration="The private key gives complete control over your crypto assets. Never share it, or someone can steal everything. There is no password recovery in decentralized systems.">
    <text x="400" y="360" font-size="18" fill="#f44336" font-weight="bold">⚠ Critical Security Warning</text>
    <rect x="400" y="380" width="370" height="90" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="420" y="410" font-size="14" fill="#c62828" font-weight="bold">Private Key = Full Control</text>
    <text x="420" y="430" font-size="13" fill="#555">• If someone gets your private key, they can</text>
    <text x="430" y="447" font-size="13" fill="#555">transfer ALL your crypto to their address</text>
    <text x="420" y="464" font-size="13" fill="#f44336" font-weight="bold">• No "forgot password" - lost key means lost funds forever!</text>
  </g>
</svg>