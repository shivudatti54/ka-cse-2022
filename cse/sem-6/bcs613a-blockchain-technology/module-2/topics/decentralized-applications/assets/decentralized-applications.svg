<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="Decentralized applications, known as dApps, are blockchain-based programs that offer security, transparency, and community-driven development without any central control or authority.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">Decentralized Applications (dApps)</text>
  </g>
  
  <!-- step1: Characteristics -->
  <g class="step" id="step1" data-narration="dApps have four key traits: they run on decentralized networks, operate autonomously without intermediaries, maintain open-source code, and ensure full transparency for all users.">
    <rect x="50" y="58" width="700" height="90" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Characteristics</text>
    <rect x="70" y="85" width="150" height="55" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="145" y="100" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2" text-anchor="middle">Decentralized</text>
    <text x="145" y="118" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">No single entity</text>
    <text x="145" y="130" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">controls the app</text>
    <rect x="230" y="85" width="150" height="55" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="305" y="100" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2" text-anchor="middle">Autonomous</text>
    <text x="305" y="118" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">Independent operation</text>
    <text x="305" y="130" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">no intermediaries</text>
    <rect x="390" y="85" width="150" height="55" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="465" y="100" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2" text-anchor="middle">Open-Source</text>
    <text x="465" y="118" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">Code publicly</text>
    <text x="465" y="130" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">reviewable &amp; editable</text>
    <rect x="550" y="85" width="150" height="55" rx="3" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="625" y="100" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2" text-anchor="middle">Transparent</text>
    <text x="625" y="118" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">Public data for</text>
    <text x="625" y="130" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">transaction tracking</text>
  </g>
  
  <!-- step2: Benefits -->
  <g class="step" id="step2" data-narration="dApps provide robust security through blockchain technology, resist censorship effectively, maintain complete transparency, and empower communities to govern applications collectively.">
    <rect x="50" y="156" width="700" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="173" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Benefits</text>
    <rect x="70" y="183" width="150" height="55" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="145" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Security</text>
    <text x="145" y="216" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">Tamper-proof</text>
    <text x="145" y="228" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">blockchain base</text>
    <rect x="230" y="183" width="150" height="55" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="305" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Censorship Resistant</text>
    <text x="305" y="216" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">No single entity</text>
    <text x="305" y="228" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">can manipulate app</text>
    <rect x="390" y="183" width="150" height="55" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="465" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Transparency</text>
    <text x="465" y="216" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">Users can verify</text>
    <text x="465" y="228" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">all transactions</text>
    <rect x="550" y="183" width="150" height="55" rx="3" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="625" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Community-Driven</text>
    <text x="625" y="216" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">Users contribute to</text>
    <text x="625" y="228" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">governance &amp; dev</text>
  </g>
  
  <!-- step3: Platforms -->
  <g class="step" id="step3" data-narration="Three major blockchain platforms enable dApp development: Ethereum provides a robust smart contract ecosystem, Polkadot offers interoperability between chains, and Solana delivers high-speed transactions.">
    <rect x="50" y="254" width="700" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="70" y="271" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Development Platforms</text>
    <rect x="70" y="281" width="210" height="55" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="175" y="296" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800" text-anchor="middle">Ethereum</text>
    <text x="175" y="314" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Robust smart contract</text>
    <text x="175" y="326" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">ecosystem for dApps</text>
    <rect x="295" y="281" width="210" height="55" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="400" y="296" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800" text-anchor="middle">Polkadot</text>
    <text x="400" y="314" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Interoperability between</text>
    <text x="400" y="326" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">different blockchains</text>
    <rect x="520" y="281" width="210" height="55" rx="3" fill="#ffffff" stroke="#ff9800" stroke-width="1"/>
    <text x="625" y="296" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800" text-anchor="middle">Solana</text>
    <text x="625" y="314" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">High-speed and scalable</text>
    <text x="625" y="326" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">high-performance dApps</text>
  </g>
  
  <!-- step4: Examples -->
  <g class="step" id="step4" data-narration="Popular dApps include Uniswap for decentralized exchange trading, MakerDAO for lending and stablecoin generation, and OpenSea for buying and selling NFT digital assets.">
    <rect x="50" y="352" width="700" height="90" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="70" y="369" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Examples of dApps</text>
    <rect x="70" y="379" width="210" height="55" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="175" y="394" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0" text-anchor="middle">Uniswap</text>
    <text x="175" y="412" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Decentralized Exchange</text>
    <text x="175" y="424" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Trustless crypto trading</text>
    <rect x="295" y="379" width="210" height="55" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="394" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0" text-anchor="middle">MakerDAO</text>
    <text x="400" y="412" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Decentralized Lending</text>
    <text x="400" y="424" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Provides DAI stablecoin</text>
    <rect x="520" y="379" width="210" height="55" rx="3" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="625" y="394" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0" text-anchor="middle">OpenSea</text>
    <text x="625" y="412" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">NFT Marketplace</text>
    <text x="625" y="424" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Buy, sell, trade NFTs</text>
  </g>
  
  <!-- step5: Key Concepts -->
  <g class="step" id="step5" data-narration="dApps use smart contracts for self-execution without intermediaries and blockchain as a secure decentralized ledger, together forming the foundational technology of Web3 applications.">
    <rect x="50" y="450" width="700" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="70" y="467" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Key Concepts</text>
    <rect x="70" y="477" width="310" height="45" rx="3" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="225" y="492" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336" text-anchor="middle">Smart Contract</text>
    <text x="225" y="508" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Self-executing code as terms</text>
    <rect x="395" y="477" width="310" height="45" rx="3" fill="#ffffff" stroke="#f44336" stroke-width="1"/>
    <text x="550" y="492" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336" text-anchor="middle">Blockchain</text>
    <text x="550" y="508" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Decentralized secure ledger</text>
  </g>
</svg>