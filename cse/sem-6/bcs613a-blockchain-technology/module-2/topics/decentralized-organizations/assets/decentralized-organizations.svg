<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Decentralized organizations transform traditional hierarchical structures into distributed networks where power, decision-making, and resource allocation are shared broadly across participant communities.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">Decentralized Organizations</text>
  </g>
  
  <!-- Step 1: Definition -->
  <g class="step" id="step1" data-narration="A decentralized organization operates without central authority, using distributed networks, consensus mechanisms, and cryptographic protocols to make transparent decisions and coordinate global participant activities.">
    <rect x="50" y="58" width="700" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is a Decentralized Organization?</text>
    <rect x="70" y="88" width="660" height="40" rx="3" fill="#ffffff" stroke="#bbdefb"/>
    <text x="80" y="105" font-family="Arial" font-size="10" fill="#333">An organization where</text>
    <text x="80" y="118" font-family="Arial" font-size="10" fill="#333">control is distributed across</text>
    <text x="80" y="131" font-family="Arial" font-size="10" fill="#333">network participants, not held</text>
    <text x="200" y="105" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Decision-making</text>
    <text x="200" y="118" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">by a central authority</text>
    <text x="380" y="105" font-family="Arial" font-size="10" fill="#333">Uses</text>
    <text x="380" y="118" font-family="Arial" font-size="10" fill="#333">consensus protocols</text>
    <text x="480" y="105" font-family="Arial" font-size="10" fill="#333">and distributed</text>
    <text x="480" y="118" font-family="Arial" font-size="10" fill="#333">ledger technology</text>
  </g>
  
  <!-- Step 2: Key Characteristics -->
  <g class="step" id="step2" data-narration="Decentralized organizations feature distributed authority, transparent operations visible to all participants, token-based economic incentives, and community-driven governance mechanisms through democratic voting and proposal systems.">
    <rect x="50" y="146" width="700" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Key Characteristics</text>
    <rect x="70" y="176" width="150" height="42" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="80" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Distributed Authority</text>
    <text x="80" y="203" font-family="Arial" font-size="8" fill="#555">Power spread across</text>
    <text x="80" y="213" font-family="Arial" font-size="8" fill="#555">network participants</text>
    <rect x="230" y="176" width="150" height="42" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="240" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Transparency</text>
    <text x="240" y="203" font-family="Arial" font-size="8" fill="#555">Open access to</text>
    <text x="240" y="213" font-family="Arial" font-size="8" fill="#555">data and rules</text>
    <rect x="390" y="176" width="150" height="42" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="400" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Token Incentives</text>
    <text x="400" y="203" font-family="Arial" font-size="8" fill="#555">Native tokens align</text>
    <text x="400" y="213" font-family="Arial" font-size="8" fill="#555">participant interests</text>
    <rect x="550" y="176" width="150" height="42" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="560" y="190" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Community Governance</text>
    <text x="560" y="203" font-family="Arial" font-size="8" fill="#555">Voting and proposals</text>
    <text x="560" y="213" font-family="Arial" font-size="8" fill="#555">drive decisions</text>
  </g>
  
  <!-- Step 3: Centralized vs Decentralized -->
  <g class="step" id="step3" data-narration="Centralized organizations have rigid top-down hierarchies with single points of failure and control, while decentralized ones use peer-to-peer networks, consensus algorithms, and distributed ledgers.">
    <rect x="50" y="234" width="700" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Centralized vs Decentralized</text>
    <rect x="70" y="268" width="280" height="40" rx="3" fill="#ffffff" stroke="#ffcc80"/>
    <text x="145" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Centralized</text>
    <text x="200" y="282" font-family="Arial" font-size="10" fill="#555">→</text>
    <text x="250" y="282" font-family="Arial" font-size="9" fill="#555">Hierarchical,</text>
    <text x="250" y="294" font-family="Arial" font-size="9" fill="#555">single point of control</text>
    <rect x="360" y="268" width="280" height="40" rx="3" fill="#ffffff" stroke="#81c784"/>
    <text x="435" y="282" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Decentralized</text>
    <text x="500" y="282" font-family="Arial" font-size="10" fill="#555">→</text>
    <text x="550" y="282" font-family="Arial" font-size="9" fill="#555">Flat network,</text>
    <text x="550" y="294" font-family="Arial" font-size="9" fill="#555">distributed control</text>
    <path d="M320,288 L350,288" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
  </g>
  
  <!-- Step 4: Blockchain and DAOs -->
  <g class="step" id="step4" data-narration="Blockchain technology and DAOs enable decentralized governance through self-executing smart contracts, cryptographic tokens, and transparent token-based voting systems that replace traditional management hierarchies.">
    <rect x="50" y="322" width="700" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="70" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Technology Enablers: Blockchain &amp; DAOs</text>
    <rect x="70" y="356" width="200" height="40" rx="3" fill="#ffffff" stroke="#e1bee7"/>
    <text x="170" y="372" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0" text-anchor="middle">Blockchain</text>
    <text x="170" y="385" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Immutable ledger</text>
    <rect x="280" y="356" width="200" height="40" rx="3" fill="#ffffff" stroke="#e1bee7"/>
    <text x="380" y="372" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0" text-anchor="middle">Smart Contracts</text>
    <text x="380" y="385" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Self-executing rules</text>
    <rect x="490" y="356" width="200" height="40" rx="3" fill="#ffffff" stroke="#e1bee7"/>
    <text x="590" y="372" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0" text-anchor="middle">DAO</text>
    <text x="590" y="385" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Token voting governance</text>
    <path d="M270,376 L280,376" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <path d="M480,376 L490,376" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
  </g>
  
  <!-- Step 5: Benefits -->
  <g class="step" id="step5" data-narration="Decentralized organizations offer resilience against censorship and system failures, global accessibility across borders, reduced corruption through transparency, and accelerated innovation through open collaboration.">
    <rect x="50" y="410" width="700" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Benefits of Decentralization</text>
    <rect x="70" y="444" width="160" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="150" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Resilience</text>
    <text x="150" y="474" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">No single point of failure</text>
    <rect x="240" y="444" width="160" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="320" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Global Access</text>
    <text x="320" y="474" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Anyone can participate</text>
    <rect x="410" y="444" width="160" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="490" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Transparency</text>
    <text x="490" y="474" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Reduced corruption risk</text>
    <rect x="580" y="444" width="160" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="660" y="460" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Innovation</text>
    <text x="660" y="474" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Fast iteration cycles</text>
  </g>
  
  <!-- Step 6: Challenges and Examples -->
  <g class="step" id="step6" data-narration="Key challenges include coordination complexity across global participants and governance disputes. Real examples like Bitcoin, Ethereum, and MakerDAO demonstrate successful live decentralized implementations worldwide.">
    <rect x="50" y="498" width="700" height="90" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="70" y="518" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Challenges &amp; Real-World Examples</text>
    <rect x="70" y="528" width="320" height="54" rx="3" fill="#ffffff" stroke="#ffcdd2"/>
    <text x="85" y="544" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Challenges</text>
    <text x="85" y="558" font-family="Arial" font-size="8" fill="#555">• Coordination complexity</text>
    <text x="85" y="570" font-family="Arial" font-size="8" fill="#555">• Slow decision-making</text>
    <text x="85" y="582" font-family="Arial" font-size="8" fill="#555">• Governance disputes</text>
    <rect x="400" y="528" width="340" height="54" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
    <text x="415" y="544" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Examples</text>
    <text x="415" y="558" font-family="Arial" font-size="8" fill="#555">Bitcoin - P2P currency network</text>
    <text x="415" y="570" font-family="Arial" font-size="8" fill="#555">Ethereum - Smart contract platform</text>
    <text x="415" y="582" font-family="Arial" font-size="8" fill="#555">MakerDAO - Decentralized lending</text>
  </g>
</svg>