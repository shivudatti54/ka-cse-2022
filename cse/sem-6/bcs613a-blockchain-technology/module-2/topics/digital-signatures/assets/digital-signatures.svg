<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<!-- step0: Title -->
<g class="step" id="step0" data-narration="Digital signatures are cryptographic techniques that verify the authenticity and integrity of digital messages using private keys and mathematical schemes for secure communication.">
<rect x="200" y="10" width="400" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="36" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">Digital Signatures</text>
</g>

<!-- step1: Definition -->
<g class="step" id="step1" data-narration="A digital signature is a unique cryptographic code generated using the sender's private key and hash function, then appended to a document to verify identity and ensure message integrity.">
<rect x="50" y="58" width="700" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="70" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">What is a Digital Signature?</text>
<text x="70" y="100" font-family="Arial" font-size="10" fill="#2e7d32">A cryptographic technique to verify authenticity and integrity of digital messages.</text>
<text x="70" y="118" font-family="Arial" font-size="10" fill="#2e7d32">Generated using sender's private key + hash function → unique code appended to document.</text>
<rect x="580" y="68" width="150" height="60" rx="4" fill="#c8e6c9" stroke="#388e3c"/>
<text x="655" y="95" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">Sender's</text>
<text x="655" y="110" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">Private Key</text>
</g>

<!-- step2: Process Flow -->
<g class="step" id="step2" data-narration="The signing process has four steps: hash the message, encrypt with private key, append signature, then verify at recipient end.">
<rect x="50" y="146" width="700" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="70" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">How It Works: 4 Steps</text>
<rect x="70" y="180" width="120" height="35" rx="4" fill="#ffe0b2" stroke="#ff9800"/>
<text x="130" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">1. Hash</text>
<text x="130" y="210" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Message → Digest</text>
<line x1="190" y1="197" x2="210" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="220" y="180" width="120" height="35" rx="4" fill="#ffe0b2" stroke="#ff9800"/>
<text x="280" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">2. Encrypt</text>
<text x="280" y="210" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Digest + Private Key</text>
<line x1="340" y1="197" x2="360" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="370" y="180" width="120" height="35" rx="4" fill="#ffe0b2" stroke="#ff9800"/>
<text x="430" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">3. Append</text>
<text x="430" y="210" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Signature to Message</text>
<line x1="490" y1="197" x2="510" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="520" y="180" width="120" height="35" rx="4" fill="#ffe0b2" stroke="#ff9800"/>
<text x="580" y="198" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">4. Verify</text>
<text x="580" y="210" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Public Key decrypts</text>
<line x1="640" y1="197" x2="660" y2="197" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="670" y="180" width="70" height="35" rx="4" fill="#ffcc80" stroke="#ff9800"/>
<text x="705" y="200" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">Match?</text>
</g>

<!-- step3: Types -->
<g class="step" id="step3" data-narration="Two main types of digital signatures exist: symmetric uses the same secret key for both encryption and decryption, while asymmetric uses key pairs for secure verification.">
<rect x="50" y="234" width="700" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="70" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2">Types of Digital Signatures</text>
<rect x="70" y="270" width="320" height="35" rx="4" fill="#e1bee7" stroke="#9c27b0"/>
<text x="230" y="288" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2" text-anchor="middle">Symmetric</text>
<text x="230" y="300" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">Same key for encryption &amp; decryption</text>
<rect x="410" y="270" width="320" height="35" rx="4" fill="#e1bee7" stroke="#9c27b0"/>
<text x="570" y="288" font-family="Arial" font-size="11" font-weight="bold" fill="#7b1fa2" text-anchor="middle">Asymmetric (Public Key)</text>
<text x="570" y="300" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">Private key signs, Public key verifies</text>
</g>

<!-- step4: Advantages -->
<g class="step" id="step4" data-narration="Three key advantages of digital signatures include authentication confirming sender identity, integrity ensuring the message remains unchanged, and non-repudiation preventing the sender from denying they sent it.">
<rect x="50" y="322" width="700" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="70" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Advantages</text>
<rect x="70" y="358" width="210" height="35" rx="4" fill="#ffcdd2" stroke="#f44336"/>
<text x="175" y="375" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828" text-anchor="middle">Authentication</text>
<text x="175" y="387" font-family="Arial" font-size="9" fill="#c62828" text-anchor="middle">Verifies sender identity</text>
<rect x="295" y="358" width="210" height="35" rx="4" fill="#ffcdd2" stroke="#f44336"/>
<text x="400" y="375" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828" text-anchor="middle">Integrity</text>
<text x="400" y="387" font-family="Arial" font-size="9" fill="#c62828" text-anchor="middle">Message unchanged during transit</text>
<rect x="520" y="358" width="210" height="35" rx="4" fill="#ffcdd2" stroke="#f44336"/>
<text x="625" y="375" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828" text-anchor="middle">Non-Repudiation</text>
<text x="625" y="387" font-family="Arial" font-size="9" fill="#c62828" text-anchor="middle">Sender cannot deny sending</text>
</g>

<!-- step5: Applications -->
<g class="step" id="step5" data-narration="Digital signatures secure blockchain transactions by verifying authenticity, validate e-commerce agreements to ensure trust, and confirm digital contract agreements with legal recognition across jurisdictions worldwide.">
<rect x="50" y="410" width="700" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="70" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Applications</text>
<rect x="70" y="446" width="220" height="35" rx="4" fill="#bbdefb" stroke="#1976d2"/>
<text x="180" y="465" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Blockchain</text>
<text x="180" y="477" font-family="Arial" font-size="9" fill="#1565c0" text-anchor="middle">Secures transactions</text>
<rect x="305" y="446" width="220" height="35" rx="4" fill="#bbdefb" stroke="#1976d2"/>
<text x="415" y="465" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">E-Commerce</text>
<text x="415" y="477" font-family="Arial" font-size="9" fill="#1565c0" text-anchor="middle">Verifies online transactions</text>
<rect x="540" y="446" width="200" height="35" rx="4" fill="#bbdefb" stroke="#1976d2"/>
<text x="640" y="465" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">Digital Contracts</text>
<text x="640" y="477" font-family="Arial" font-size="9" fill="#1565c0" text-anchor="middle">Confirms agreements</text>
</g>

<!-- step6: Cryptographic Primitives -->
<g class="step" id="step6" data-narration="Three cryptographic primitives enable digital signatures: hash functions creating unique message digests, symmetric cryptography using shared secret keys, and asymmetric cryptography with public and private key pairs for verification.">
<rect x="50" y="498" width="700" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="70" y="520" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Cryptographic Primitives</text>
<rect x="70" y="536" width="210" height="42" rx="4" fill="#c8e6c9" stroke="#388e3c"/>
<text x="175" y="553" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">Hash Functions</text>
<text x="175" y="567" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">Message → Fixed digest</text>
<text x="175" y="578" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">(One-way function)</text>
<rect x="295" y="536" width="210" height="42" rx="4" fill="#c8e6c9" stroke="#388e3c"/>
<text x="400" y="553" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">Symmetric Cryptography</text>
<text x="400" y="567" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">Same key encrypt/decrypt</text>
<text x="400" y="578" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">(Shared secret)</text>
<rect x="520" y="536" width="210" height="42" rx="4" fill="#c8e6c9" stroke="#388e3c"/>
<text x="625" y="553" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">Asymmetric Cryptography</text>
<text x="625" y="567" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">Public &amp; Private key pair</text>
<text x="625" y="578" font-family="Arial" font-size="8" fill="#2e7d32" text-anchor="middle">(RSA, ECDSA)</text>
</g>
</svg>