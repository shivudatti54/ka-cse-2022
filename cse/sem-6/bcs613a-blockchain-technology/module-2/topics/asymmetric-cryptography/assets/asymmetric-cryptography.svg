<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Elliptic Curve Cryptography (ECC)</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step1" class="step" data-narration="An elliptic curve follows the equation y² = x³ + ax + b over a finite field. Points on this curve form a group with special addition rules.">
    <text x="400" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Elliptic Curve Equation</text>
    <text x="400" y="75" text-anchor="middle" font-size="14" font-style="italic" fill="#333">y² = x³ + ax + b</text>
    <rect x="120" y="90" width="560" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="108" text-anchor="middle" font-size="11" fill="#333">Finite field ensures coordinates wrap around like a clock, making curve</text>
    <text x="400" y="122" text-anchor="middle" font-size="11" fill="#333">points wrap within a fixed range for cryptographic operations</text>
  </g>
  <g id="step2" class="step" data-narration="ECC security relies on the Elliptic Curve Discrete Logarithm Problem. Given points P and kP, finding k is mathematically infeasible to compute.">
    <text x="400" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Security Basis: ECDLP</text>
    <rect x="80" y="175" width="180" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="170" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Base Point G</text>
    <line x1="260" y1="198" x2="310" y2="198" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="310" y="175" width="180" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Multiply by k</text>
    <line x1="490" y1="198" x2="540" y2="198" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="540" y="175" width="180" height="45" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="630" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#f44336">Public Key Q = kG</text>
    <text x="400" y="245" text-anchor="middle" font-size="10" fill="#666">Computing Q from k is easy, but finding k from Q is computationally impossible</text>
  </g>
  <g id="step3" class="step" data-narration="ECC needs far smaller keys than RSA for equivalent security. A 256-bit ECC key matches a 3072-bit RSA key in protection level.">
    <text x="400" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Key Size Comparison</text>
    <rect x="60" y="290" width="210" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="165" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">RSA Key Size</text>
    <text x="165" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">3072 bits</text>
    <text x="400" y="305" text-anchor="middle" font-size="18" fill="#388e3c">=</text>
    <rect x="420" y="290" width="210" height="60" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="525" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">ECC Key Size</text>
    <text x="525" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">256 bits</text>
    <text x="400" y="370" text-anchor="middle" font-size="10" fill="#666">Same security with 12x smaller keys: ECC is ideal for mobile and blockchain</text>
  </g>
  <g id="step4" class="step" data-narration="ECDH key exchange lets Alice and Bob create a shared secret. Each keeps a private key and shares the public key derived from a common base point.">
    <text x="400" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">ECDH Key Exchange</text>
    <rect x="40" y="415" width="220" height="55" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="150" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Alice</text>
    <text x="150" y="452" text-anchor="middle" font-size="10" fill="#333">Private: dₐ | Public: Qₐ = dₐ×G</text>
    <line x1="260" y1="442" x2="330" y2="442" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4"/>
    <rect x="330" y="415" width="140" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Exchange Public Keys</text>
    <text x="400" y="452" text-anchor="middle" font-size="10" fill="#666">over any channel</text>
    <line x1="470" y1="442" x2="540" y2="442" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4"/>
    <rect x="540" y="415" width="220" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="650" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Bob</text>
    <text x="650" y="452" text-anchor="middle" font-size="10" fill="#333">Private: d_b | Public: Q_b = d_b×G</text>
    <text x="400" y="490" text-anchor="middle" font-size="10" fill="#333">Shared Secret: S = dₐ×Q_b = d_b×Qₐ (both compute same result)</text>
  </g>
  <g id="step5" class="step" data-narration="ECDSA creates digital signatures using a private key. The signature contains two values r and s, verified using the sender's public key without revealing the private key.">
    <text x="400" y="515" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">ECDSA Digital Signatures</text>
    <rect x="50" y="535" width="230" height="50" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="165" y="555" text-anchor="middle" font-size="11" font-weight="bold" fill="#f44336">Sign with Private Key</text>
    <text x="165" y="570" text-anchor="middle" font-size="9" fill="#333">s = k⁻¹(H(m) + d×r) mod n</text>
    <line x1="280" y1="560" x2="320" y2="560" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="320" y="535" width="160" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="400" y="555" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Signature (r, s)</text>
    <text x="400" y="570" text-anchor="middle" font-size="9" fill="#666">proves ownership</text>
    <line x1="480" y1="560" x2="520" y2="560" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="520" y="535" width="230" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="635" y="555" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Verify with Public Key</text>
    <text x="635" y="570" text-anchor="middle" font-size="9" fill="#333">check r ≡ (u₁×G + u₂×Q).x mod n</text>
  </g>
</svg>