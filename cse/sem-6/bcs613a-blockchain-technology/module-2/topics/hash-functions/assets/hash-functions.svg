<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Hash functions are mathematical functions that convert input data of any size into a fixed-size output called a hash value or digest.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="0"/>
    <text x="400" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Hash Functions in Blockchain</text>
  </g>
  
  <g class="step" id="step1" data-narration="A hash function takes any input and produces a fixed-size unique output. The same input always produces the same hash value.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What are Hash Functions?</text>
    <rect x="40" y="95" width="100" height="30" fill="#fff" stroke="#1976d2" stroke-width="2" rx="4"/>
    <text x="90" y="115" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Input Data</text>
    <line x1="140" y1="110" x2="180" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="180" y="95" width="120" height="30" fill="#fff" stroke="#1976d2" stroke-width="2" rx="4"/>
    <text x="240" y="115" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Hash Function</text>
    <line x1="300" y1="110" x2="340" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="340" y="95" width="120" height="30" fill="#1976d2" rx="4"/>
    <text x="400" y="115" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Hash: a1b2c3...</text>
    <text x="40" y="135" font-family="Arial" font-size="9" fill="#555">Input: any size → Hash: fixed size output (e.g., 256-bit)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Hash functions must be deterministic, non-invertible, produce fixed output size, be collision-resistant for security, and compute efficiently across all input sizes.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Key Properties of Hash Functions</text>
    <rect x="40" y="185" width="165" height="32" fill="#fff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="122" y="200" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Deterministic</text>
    <text x="122" y="212" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Same input → Same output</text>
    <rect x="215" y="185" width="165" height="32" fill="#fff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="297" y="200" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Non-invertible</text>
    <text x="297" y="212" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Cannot reverse hash to input</text>
    <rect x="390" y="185" width="165" height="32" fill="#fff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="472" y="200" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Fixed Output Size</text>
    <text x="472" y="212" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Always same length output</text>
    <rect x="565" y="185" width="165" height="32" fill="#fff" stroke="#388e3c" stroke-width="1" rx="4"/>
    <text x="647" y="200" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Collision-resistant</text>
    <text x="647" y="212" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Hard to find same hash</text>
  </g>
  
  <g class="step" id="step3" data-narration="Two main categories exist: cryptographic hash functions prioritize security and collision resistance like SHA-256 and Keccak-256, while non-cryptographic versions emphasize speed for data structures like CRC32.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Types of Hash Functions</text>
    <rect x="40" y="275" width="340" height="35" fill="#fff" stroke="#ff9800" stroke-width="1" rx="4"/>
    <text x="210" y="290" font-family="Arial" font-size="11" fill="#ff9800" text-anchor="middle" font-weight="bold">Cryptographic Hash Functions</text>
    <text x="210" y="303" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Security focused: SHA-256, Keccak-256, RIPEMD-160</text>
    <rect x="400" y="275" width="340" height="35" fill="#fff" stroke="#ff9800" stroke-width="1" rx="4"/>
    <text x="570" y="290" font-family="Arial" font-size="11" fill="#ff9800" text-anchor="middle" font-weight="bold">Non-Cryptographic Hash Functions</text>
    <text x="570" y="303" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Speed focused: CRC32, MurmurHash, xxHash</text>
  </g>
  
  <g class="step" id="step4" data-narration="Hash functions enable data integrity verification across distributed ledgers, link consecutive blocks cryptographically, verify transaction authenticity, and execute smart contracts automatically in blockchain networks.">
    <rect x="20" y="322" width="760" height="80" fill="#ffebee" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Applications in Blockchain</text>
    <rect x="40" y="360" width="170" height="35" fill="#fff" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="125" y="375" font-family="Arial" font-size="10" fill="#333" text-anchor="middle" font-weight="bold">Data Integrity</text>
    <text x="125" y="388" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Tamper-proof data</text>
    <rect x="220" y="360" width="170" height="35" fill="#fff" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="305" y="375" font-family="Arial" font-size="10" fill="#333" text-anchor="middle" font-weight="bold">Block Linking</text>
    <text x="305" y="388" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Chain blocks together</text>
    <rect x="400" y="360" width="170" height="35" fill="#fff" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="485" y="375" font-family="Arial" font-size="10" fill="#333" text-anchor="middle" font-weight="bold">Transaction Verification</text>
    <text x="485" y="388" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Verify valid transactions</text>
    <rect x="580" y="360" width="170" height="35" fill="#fff" stroke="#f44336" stroke-width="1" rx="4"/>
    <text x="665" y="375" font-family="Arial" font-size="10" fill="#333" text-anchor="middle" font-weight="bold">Smart Contracts</text>
    <text x="665" y="388" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Automate logic</text>
  </g>
  
  <g class="step" id="step5" data-narration="Bitcoin relies on SHA-256 for mining and transaction verification, Ethereum employs Keccak-256 for transaction processing, and Bitcoin also uses RIPEMD-160 for generating shorter address outputs.">
    <rect x="20" y="410" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Common Hash Functions in Blockchain</text>
    <rect x="40" y="450" width="220" height="35" fill="#fff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="150" y="468" font-family="Arial" font-size="11" fill="#9c27b0" text-anchor="middle" font-weight="bold">SHA-256</text>
    <text x="150" y="480" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Bitcoin, produces 256-bit hash</text>
    <rect x="270" y="450" width="220" height="35" fill="#fff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="380" y="468" font-family="Arial" font-size="11" fill="#9c27b0" text-anchor="middle" font-weight="bold">Keccak-256</text>
    <text x="380" y="480" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Ethereum, produces 256-bit hash</text>
    <rect x="500" y="450" width="220" height="35" fill="#fff" stroke="#9c27b0" stroke-width="1" rx="4"/>
    <text x="610" y="468" font-family="Arial" font-size="11" fill="#9c27b0" text-anchor="middle" font-weight="bold">RIPEMD-160</text>
    <text x="610" y="480" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Bitcoin addresses, 160-bit output</text>
  </g>
  
  <g class="step" id="step6" data-narration="Hash functions remain fundamental to blockchain security through their deterministic nature, one-way computation, and collision resistance that enable trustless verification and immutable record-keeping across decentralized networks.">
    <rect x="20" y="498" width="760" height="98" fill="#e3f2fd" rx="8"/>
    <text x="40" y="520" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Exam Tips & Key Takeaways</text>
    <circle cx="60" cy="545" r="5" fill="#1976d2"/>
    <text x="75" y="549" font-family="Arial" font-size="10" fill="#333">Hash functions convert any input to fixed-size unique output</text>
    <circle cx="60" cy="565" r="5" fill="#1976d2"/>
    <text x="75" y="569" font-family="Arial" font-size="10" fill="#333">Cryptographic types prioritize security; non-cryptographic prioritize speed</text>
    <circle cx="60" cy="585" r="5" fill="#1976d2"/>
    <text x="75" y="589" font-family="Arial" font-size="10" fill="#333">Collision-resistance and non-invertibility are essential for blockchain security</text>
    <rect x="500" y="540" width="250" height="40" fill="#1976d2" rx="6"/>
    <text x="625" y="565" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Blockchain = Secure &amp; Tamper-proof</text>
  </g>
</svg>