<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Cryptographic Primitives in Blockchain</text>
  
  <g id="step0" class="step" data-narration="Cryptographic primitives are the fundamental building blocks that secure all blockchain data and enable trustless transactions.">
    <text x="400" y="58" text-anchor="middle" font-size="12" fill="#616161">Hash functions, digital signatures, encryption, and Merkle trees work together</text>
  </g>
  
  <g id="step1" class="step" data-narration="A cryptographic hash function takes any input and produces a fixed-size output. SHA-256 is used in Bitcoin for block hashing.">
    <rect x="40" y="72" width="720" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">1. Cryptographic Hash Functions (SHA-256)</text>
    <rect x="80" y="105" width="120" height="18" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="118" text-anchor="middle" font-size="9" fill="#333">Input Data</text>
    <text x="140" y="130" text-anchor="middle" font-size="8" fill="#1976d2">Any size</text>
    <line x1="200" y1="118" x2="240" y2="118" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="250" y="105" width="100" height="18" rx="3" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="300" y="118" text-anchor="middle" font-size="9" fill="#333">SHA-256</text>
    <line x1="350" y1="118" x2="390" y2="118" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="400" y="105" width="120" height="18" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="460" y="118" text-anchor="middle" font-size="8" fill="#388e3c">Hash: 256 bits</text>
    <rect x="550" y="105" width="190" height="40" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="645" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Five Properties:</text>
    <text x="645" y="132" text-anchor="middle" font-size="8" fill="#333">Deterministic</text>
    <text x="645" y="142" text-anchor="middle" font-size="8" fill="#333">Quick computation</text>
    <text x="700" y="132" text-anchor="middle" font-size="8" fill="#333">One-way (pre-image)</text>
    <text x="700" y="142" text-anchor="middle" font-size="8" fill="#333">Avalanche effect</text>
  </g>
  
  <g id="step2" class="step" data-narration="Merkle trees organize transaction hashes in a tree structure. The root hash is stored in the block header for verification.">
    <rect x="40" y="168" width="720" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="188" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">2. Merkle Trees</text>
    <rect x="350" y="200" width="100" height="18" rx="4" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
    <text x="400" y="213" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Merkle Root</text>
    <line x1="365" y1="218" x2="290" y2="232" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="435" y1="218" x2="510" y2="232" stroke="#388e3c" stroke-width="1.5"/>
    <rect x="220" y="232" width="140" height="16" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="290" y="244" text-anchor="middle" font-size="8" fill="#1976d2">Hash(Hash0 + Hash1)</text>
    <rect x="440" y="232" width="140" height="16" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="510" y="244" text-anchor="middle" font-size="8" fill="#1976d2">Hash(Hash2 + Hash3)</text>
    <text x="400" y="262" text-anchor="middle" font-size="8" fill="#666">Enables SPV: verify transactions without downloading entire blockchain</text>
  </g>
  
  <g id="step3" class="step" data-narration="Digital signatures prove ownership. The sender signs the message hash with their private key, and anyone can verify with the public key.">
    <rect x="40" y="258" width="720" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">3. Digital Signature Process</text>
    <rect x="60" y="290" width="150" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="135" y="302" text-anchor="middle" font-size="8" fill="#333">Message</text>
    <text x="135" y="314" text-anchor="middle" font-size="7" fill="#666">Hash it first</text>
    <line x1="210" y1="304" x2="260" y2="304" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="270" y="290" width="80" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="310" y="302" text-anchor="middle" font-size="8" fill="#333">Private Key</text>
    <text x="310" y="314" text-anchor="middle" font-size="7" fill="#666">Sign it</text>
    <line x1="350" y1="304" x2="390" y2="304" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="400" y="290" width="90" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="445" y="302" text-anchor="middle" font-size="8" fill="#333">Signature</text>
    <text x="445" y="314" text-anchor="middle" font-size="7" fill="#666">(r, s values)</text>
    <line x1="490" y1="304" x2="540" y2="304" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="550" y="290" width="80" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="590" y="302" text-anchor="middle" font-size="8" fill="#333">Public Key</text>
    <text x="590" y="314" text-anchor="middle" font-size="7" fill="#666">Verify</text>
    <line x1="630" y1="304" x2="660" y2="304" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="670" y="290" width="70" height="28" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="705" y="302" text-anchor="middle" font-size="8" fill="#333">Valid?</text>
    <text x="705" y="314" text-anchor="middle" font-size="7" fill="#666">Match?</text>
  </g>
  
  <g id="step4" class="step" data-narration="ECDSA uses elliptic curve cryptography. It provides strong security with smaller keys than RSA, making it efficient for blockchain.">
    <rect x="40" y="338" width="720" height="60" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">4. ECDSA (Elliptic Curve Digital Signature Algorithm)</text>
    <text x="250" y="378" text-anchor="middle" font-size="11" fill="#333">Bitcoin &amp; Ethereum use ECDSA</text>
    <text x="400" y="378" text-anchor="middle" font-size="11" fill="#333">256-bit ECC key ≈ 3072-bit RSA security</text>
    <text x="550" y="378" text-anchor="middle" font-size="11" fill="#333">Smaller signatures, faster verification</text>
  </g>
  
  <g id="step5" class="step" data-narration="Symmetric encryption uses one key for both parties, fast but has key distribution problems. Asymmetric uses key pairs to solve this.">
    <rect x="40" y="408" width="340" height="70" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="210" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#c2185b">Symmetric (One Key)</text>
    <text x="210" y="446" text-anchor="middle" font-size="10" fill="#333">Same key encrypts and decrypts</text>
    <text x="210" y="460" text-anchor="middle" font-size="9" fill="#666">AES, DES - fast but key sharing problem</text>
    <text x="210" y="473" text-anchor="middle" font-size="9" fill="#666">Used for wallet file encryption</text>
    <rect x="420" y="408" width="340" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="590" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Asymmetric (Key Pair)</text>
    <text x="590" y="446" text-anchor="middle" font-size="10" fill="#333">Public key shares, private key secret</text>
    <text x="590" y="460" text-anchor="middle" font-size="9" fill="#666">RSA, ECC - solves distribution problem</text>
    <text x="590" y="473" text-anchor="middle" font-size="9" fill="#666">Blockchain addresses from public key</text>
  </g>
  
  <g id="step6" class="step" data-narration="In a transaction: hash the data, sign with private key, broadcast with signature, verify with public key, store in Merkle tree.">
    <rect x="40" y="488" width="720" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="508" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">5. Complete Transaction Flow</text>
    <rect x="60" y="518" width="90" height="22" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="105" y="532" text-anchor="middle" font-size="8" fill="#333">Create TX</text>
    <line x1="150" y1="529" x2="180" y2="529" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="180" y="518" width="80" height="22" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="532" text-anchor="middle" font-size="8" fill="#333">Hash</text>
    <line x1="260" y1="529" x2="290" y2="529" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="290" y="518" width="90" height="22" rx="3" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="335" y="532" text-anchor="middle" font-size="8" fill="#333">Sign (PrivKey)</text>
    <line x1="380" y1="529" x2="410" y2="529" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="410" y="518" width="100" height="22" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="460" y="532" text-anchor="middle" font-size="8" fill="#333">Broadcast</text>
    <line x1="510" y1="529" x2="540" y2="529" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="540" y="518" width="90" height="22" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="585" y="532" text-anchor="middle" font-size="8" fill="#333">Verify (PubKey)</text>
    <line x1="630" y1="529" x2="660" y2="529" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="660" y="518" width="80" height="22" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="700" y="532" text-anchor="middle" font-size="8" fill="#333">Add to Block</text>
  </g>
  
  <g id="step7" class="step" data-narration="Remember these key points for exams: five hash properties, signature signing process, Merkle tree verification, and ECDSA advantages.">
    <rect x="100" y="558" width="600" height="32" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="576" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Exam Tip: Know hash properties, signature flow, Merkle proofs, and why ECDSA is preferred</text>
  </g>
</svg>