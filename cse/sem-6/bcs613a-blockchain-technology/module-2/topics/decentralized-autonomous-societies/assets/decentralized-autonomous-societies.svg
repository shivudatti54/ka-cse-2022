<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Decentralized Autonomous Societies are self-governing systems built on blockchain technology that eliminate intermediaries, central authorities, and traditional hierarchical structures in organizations.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" rx="0"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Decentralized Autonomous Societies (DAS)</text>
  </g>
  
  <g class="step" id="step1" data-narration="A DAS operates entirely on blockchain networks, enabling direct peer-to-peer interactions and collective decision-making among participants without requiring any central controlling authority or intermediary.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="80" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">What is DAS?</text>
    <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">A DAS is a self-governing organization that operates on a blockchain network,</text>
    <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">allowing individuals to interact and make decisions without intermediaries.</text>
    <rect x="600" y="70" width="140" height="50" fill="#c8e6c9" rx="5"/>
    <text x="670" y="100" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Blockchain</text>
  </g>
  
  <g class="step" id="step2" data-narration="Four key characteristics: decentralized governance distributes decisions, autonomous operation needs no external control, self-sustaining systems maintain themselves, and open-source allows community contributions.">
    <rect x="20" y="146" width="760" height="80" fill="#fff3e0" rx="8"/>
    <text x="40" y="168" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Key Characteristics</text>
    <rect x="40" y="180" width="165" height="38" fill="#ffe0b2" rx="4"/>
    <text x="122" y="195" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Decentralized</text>
    <text x="122" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Governance</text>
    <rect x="215" y="180" width="165" height="38" fill="#ffe0b2" rx="4"/>
    <text x="297" y="195" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Autonomous</text>
    <text x="297" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">No External Control</text>
    <rect x="390" y="180" width="165" height="38" fill="#ffe0b2" rx="4"/>
    <text x="472" y="195" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Self-Sustaining</text>
    <text x="472" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">No External Funding</text>
    <rect x="565" y="180" width="165" height="38" fill="#ffe0b2" rx="4"/>
    <text x="647" y="195" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ef6c00">Open-Source</text>
    <text x="647" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Community Driven</text>
  </g>
  
  <g class="step" id="step3" data-narration="DAS applications include community governance for democratic decisions, decentralized social networks without intermediaries, cooperatives for pooled resources, and non-profits with transparent operations.">
    <rect x="20" y="234" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <text x="40" y="256" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">Applications of DAS</text>
    <rect x="40" y="270" width="175" height="38" fill="#e1bee7" rx="4"/>
    <text x="127" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Community</text>
    <text x="127" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Governance</text>
    <rect x="225" y="270" width="175" height="38" fill="#e1bee7" rx="4"/>
    <text x="312" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Decentralized</text>
    <text x="312" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Social Networks</text>
    <rect x="410" y="270" width="175" height="38" fill="#e1bee7" rx="4"/>
    <text x="497" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Cooperatives</text>
    <text x="497" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Pooled Resources</text>
    <rect x="595" y="270" width="175" height="38" fill="#e1bee7" rx="4"/>
    <text x="682" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Non-Profit</text>
    <text x="682" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Organizations</text>
  </g>
  
  <g class="step" id="step4" data-narration="Case studies: The DAO was a 2016 decentralized investment fund where members voted on investments. Aragon provides a platform for creating and managing decentralized organizations with voting and proposal features.">
    <rect x="20" y="322" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <text x="40" y="344" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Case Studies</text>
    <rect x="40" y="360" width="340" height="35" fill="#bbdefb" rx="5"/>
    <text x="210" y="378" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#0d47a1">The DAO (2016)</text>
    <text x="210" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Decentralized Investment Fund</text>
    <rect x="400" y="360" width="340" height="35" fill="#bbdefb" rx="5"/>
    <text x="570" y="378" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#0d47a1">Aragon</text>
    <text x="570" y="390" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Platform for Decentralized Organizations</text>
  </g>
  
  <g class="step" id="step5" data-narration="Advantages include transparency where all members see decision-making, accountability as members hold each other responsible, and efficiency through quick decisions without intermediaries.">
    <rect x="20" y="410" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <text x="40" y="432" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">Advantages of DAS</text>
    <rect x="40" y="448" width="230" height="35" fill="#c8e6c9" rx="5"/>
    <text x="155" y="468" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1b5e20">Transparency</text>
    <text x="155" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Visible Decision-Making</text>
    <rect x="285" y="448" width="230" height="35" fill="#c8e6c9" rx="5"/>
    <text x="400" y="468" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1b5e20">Accountability</text>
    <text x="400" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Members Hold Each Other Responsible</text>
    <rect x="530" y="448" width="230" height="35" fill="#c8e6c9" rx="5"/>
    <text x="645" y="468" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1b5e20">Efficiency</text>
    <text x="645" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Quick Decisions Without Intermediaries</text>
  </g>
  
  <g class="step" id="step6" data-narration="Challenges include scalability where more members complicate decisions, security risks like hacking and 51% attacks, and regulatory issues as governments struggle to understand decentralized systems.">
    <rect x="20" y="498" width="760" height="90" fill="#ffebee" rx="8"/>
    <text x="40" y="520" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Challenges of DAS</text>
    <rect x="40" y="535" width="230" height="45" fill="#ffcdd2" rx="5"/>
    <text x="155" y="555" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#b71c1c">Scalability</text>
    <text x="155" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Complex decisions with</text>
    <text x="155" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">more members</text>
    <rect x="285" y="535" width="230" height="45" fill="#ffcdd2" rx="5"/>
    <text x="400" y="555" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#b71c1c">Security</text>
    <text x="400" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Hacking and 51%</text>
    <text x="400" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">attacks</text>
    <rect x="530" y="535" width="230" height="45" fill="#ffcdd2" rx="5"/>
    <text x="645" y="555" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#b71c1c">Regulation</text>
    <text x="645" y="568" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Government struggle to</text>
    <text x="645" y="578" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">understand and regulate</text>
  </g>
</svg>