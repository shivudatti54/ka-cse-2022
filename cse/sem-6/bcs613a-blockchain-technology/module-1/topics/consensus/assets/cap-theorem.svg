<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Understanding Consensus in Distributed Systems</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step1" class="step" data-narration="Consensus is how distributed nodes agree on a single truth without a central authority. All honest nodes must reach the same decision.">
    <rect x="150" y="50" width="500" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">What is Consensus?</text>
    <text x="400" y="90" text-anchor="middle" font-size="11" fill="#333">Process by which nodes agree on data value or state</text>
  </g>
  <g id="step2" class="step" data-narration="In decentralized networks, nodes may receive transactions in different orders, go offline, or behave maliciously. All must still agree.">
    <rect x="80" y="115" width="640" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="132" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">The Core Problem</text>
    <text x="120" y="152" text-anchor="start" font-size="11" fill="#333">• Multiple nodes have copies of data</text>
    <text x="320" y="152" text-anchor="start" font-size="11" fill="#333">• Transactions arrive in different orders</text>
    <text x="520" y="152" text-anchor="start" font-size="11" fill="#333">• Some nodes may fail or lie</text>
  </g>
  <g id="step3" class="step" data-narration="Four properties define good consensus: Agreement, Validity, Termination, and Integrity. All must hold for a valid system.">
    <text x="400" y="185" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Four Key Properties of Consensus</text>
    <rect x="80" y="200" width="160" height="50" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="160" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Agreement</text>
    <text x="160" y="235" text-anchor="middle" font-size="9" fill="#333">All honest nodes</text>
    <text x="160" y="245" text-anchor="middle" font-size="9" fill="#333">decide same value</text>
    <rect x="250" y="200" width="160" height="50" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="330" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Validity</text>
    <text x="330" y="235" text-anchor="middle" font-size="9" fill="#333">Output must match</text>
    <text x="330" y="245" text-anchor="middle" font-size="9" fill="#333">proposed values</text>
    <rect x="420" y="200" width="160" height="50" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="500" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Termination</text>
    <text x="500" y="235" text-anchor="middle" font-size="9" fill="#333">All nodes eventually</text>
    <text x="500" y="245" text-anchor="middle" font-size="9" fill="#333">reach a decision</text>
    <rect x="590" y="200" width="130" height="50" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="655" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Integrity</text>
    <text x="655" y="235" text-anchor="middle" font-size="9" fill="#333">Only decide on</text>
    <text x="655" y="245" text-anchor="middle" font-size="9" fill="#333">actually proposed values</text>
  </g>
  <g id="step4" class="step" data-narration="Traditional databases rely on a central authority with ACID properties. Blockchain uses decentralized trustless consensus instead.">
    <text x="400" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Consensus vs Traditional Databases</text>
    <rect x="50" y="285" width="330" height="70" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="215" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Traditional Database</text>
    <text x="215" y="320" text-anchor="middle" font-size="10" fill="#333">Central authority | Strong ACID</text>
    <text x="215" y="335" text-anchor="middle" font-size="10" fill="#333">Fast writes | Single point of failure</text>
    <rect x="420" y="285" width="330" height="70" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="585" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Blockchain Consensus</text>
    <text x="585" y="320" text-anchor="middle" font-size="10" fill="#333">Decentralized | No central authority</text>
    <text x="585" y="335" text-anchor="middle" font-size="10" fill="#333">Tolerates faults | Slower coordination</text>
  </g>
  <g id="step5" class="step" data-narration="Crash faults occur when nodes stop working without sending malicious data. Byzantine faults involve nodes sending wrong or conflicting information.">
    <text x="400" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Types of Failures Consensus Must Handle</text>
    <rect x="50" y="385" width="340" height="55" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="220" y="402" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Crash Faults</text>
    <text x="220" y="420" text-anchor="middle" font-size="10" fill="#333">Nodes stop working (power failure, disconnect)</text>
    <text x="220" y="434" text-anchor="middle" font-size="10" fill="#333">No malicious messages sent</text>
    <rect x="410" y="385" width="340" height="55" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="580" y="402" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Byzantine Faults</text>
    <text x="580" y="420" text-anchor="middle" font-size="10" fill="#333">Arbitrary behavior - lying, wrong data</text>
    <text x="580" y="434" text-anchor="middle" font-size="10" fill="#333">Named after Byzantine Generals Problem</text>
  </g>
  <g id="step6" class="step" data-narration="The CAP theorem states a distributed system can only guarantee two of three: Consistency, Availability, and Partition Tolerance.">
    <polygon points="400,455 260,540 540,540" fill="none" stroke="#1976d2" stroke-width="2"/>
    <circle cx="400" cy="465" r="28" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="461" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">C</text>
    <circle cx="280" cy="535" r="28" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="280" y="531" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">A</text>
    <circle cx="520" cy="535" r="28" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="520" y="531" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">P</text>
    <text x="335" y="515" text-anchor="middle" font-size="8" fill="#666">CP</text>
    <text x="465" y="515" text-anchor="middle" font-size="8" fill="#666">AP</text>
  </g>
  <g id="step7" class="step" data-narration="Most blockchains choose AP: they stay available during network partitions and achieve eventual consistency through the longest chain rule.">
    <rect x="50" y="555" width="700" height="40" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="571" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Blockchain Choice: AP (Availability + Partition Tolerance)</text>
    <text x="400" y="586" text-anchor="middle" font-size="10" fill="#333">Network partitions are inevitable | Temporary forks resolve via longest chain | Trade-off: Speed vs finality</text>
  </g>
</svg>