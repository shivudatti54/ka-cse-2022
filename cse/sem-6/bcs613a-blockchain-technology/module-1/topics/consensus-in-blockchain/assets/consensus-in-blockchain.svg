<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Consensus in Blockchain</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Consensus is the core protocol that lets all nodes in a blockchain network agree on a single valid state of the ledger.">
    <text x="400" y="55" text-anchor="middle" font-size="12" fill="#616161">How decentralized nodes agree without a central authority</text>
  </g>
  <g id="step1" class="step" data-narration="In centralized systems like banks, one authority validates transactions. Blockchain replaces this with distributed consensus where the network collectively validates.">
    <rect x="50" y="70" width="300" height="55" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="200" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Centralized: Bank Validates</text>
    <text x="200" y="110" text-anchor="middle" font-size="10" fill="#333">Single authority decides transaction validity</text>
    <rect x="450" y="70" width="300" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="600" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Decentralized: Consensus</text>
    <text x="600" y="110" text-anchor="middle" font-size="10" fill="#333">Network nodes collectively validate transactions</text>
  </g>
  <g id="step2" class="step" data-narration="Proof of Work miners compete to solve complex cryptographic puzzles. The first miner to find a valid hash wins the right to propose the next block.">
    <text x="400" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Proof of Work (PoW)</text>
    <rect x="50" y="165" width="150" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="125" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Miners Compete</text>
    <text x="125" y="202" text-anchor="middle" font-size="9" fill="#333">Solve puzzle: find nonce</text>
    <text x="125" y="215" text-anchor="middle" font-size="9" fill="#333">where hash &lt; target</text>
    <line x1="200" y1="195" x2="230" y2="195" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="230" y="165" width="150" height="60" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="305" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Winner Found!</text>
    <text x="305" y="202" text-anchor="middle" font-size="9" fill="#333">Broadcasts new block</text>
    <text x="305" y="215" text-anchor="middle" font-size="9" fill="#333">to the entire network</text>
    <line x1="380" y1="195" x2="410" y2="195" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="410" y="165" width="150" height="60" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="485" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Peers Verify</text>
    <text x="485" y="202" text-anchor="middle" font-size="9" fill="#333">Check hash, signatures,</text>
    <text x="485" y="215" text-anchor="middle" font-size="9" fill="#333">and previous hash link</text>
    <line x1="560" y1="195" x2="590" y2="195" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="590" y="165" width="150" height="60" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="665" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Block Added</text>
    <text x="665" y="202" text-anchor="middle" font-size="9" fill="#333">Chain grows by one</text>
    <text x="665" y="215" text-anchor="middle" font-size="9" fill="#333">verified block</text>
  </g>
  <g id="step3" class="step" data-narration="Proof of Stake requires validators to lock cryptocurrency as collateral. If they behave maliciously, a portion of their staked funds gets slashed.">
    <text x="400" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Proof of Stake (PoS)</text>
    <rect x="60" y="270" width="200" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="160" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Stake 32 ETH</text>
    <text x="160" y="307" text-anchor="middle" font-size="9" fill="#333">Lock crypto as collateral</text>
    <text x="160" y="318" text-anchor="middle" font-size="9" fill="#333">to become a validator</text>
    <line x1="260" y1="298" x2="295" y2="298" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="295" y="270" width="200" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="395" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Selected to Propose</text>
    <text x="395" y="307" text-anchor="middle" font-size="9" fill="#333">Random selection weighted</text>
    <text x="395" y="318" text-anchor="middle" font-size="9" fill="#333">by stake amount</text>
    <line x1="495" y1="298" x2="530" y2="298" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="530" y="270" width="200" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="630" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Attestation</text>
    <text x="630" y="307" text-anchor="middle" font-size="9" fill="#333">Other validators vote</text>
    <text x="630" y="318" text-anchor="middle" font-size="9" fill="#333">Malicious = slashed funds</text>
  </g>
  <g id="step4" class="step" data-narration="PBFT uses multi-round voting among known nodes. It achieves instant finality but only works well in permissioned networks with vetted participants.">
    <text x="400" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">PBFT (Permissioned Networks)</text>
    <rect x="80" y="370" width="150" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="155" y="388" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Leader Proposes</text>
    <text x="155" y="404" text-anchor="middle" font-size="9" fill="#333">Pre-prepare phase</text>
    <line x1="230" y1="393" x2="260" y2="393" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="260" y="370" width="150" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="335" y="388" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Nodes Vote</text>
    <text x="335" y="404" text-anchor="middle" font-size="9" fill="#333">Prepare + Commit</text>
    <line x1="410" y1="393" x2="440" y2="393" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="440" y="370" width="150" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="515" y="388" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">2/3 Majority</text>
    <text x="515" y="404" text-anchor="middle" font-size="9" fill="#333">Block finalized</text>
  </g>
  <g id="step5" class="step" data-narration="Each mechanism has trade-offs: PoW is secure but slow with high energy use, PoS is fast and energy-efficient, PBFT offers instant finality but only for permissioned networks.">
    <rect x="40" y="435" width="720" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="453" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Consensus Comparison</text>
    <text x="400" y="470" text-anchor="middle" font-size="10" fill="#333">PoW: Secure but slow, high energy | PoS: Fast, low energy | PBFT: Instant finality, permissioned only</text>
  </g>
  <g id="step6" class="step" data-narration="Consensus is the heart of blockchain technology, solving the double-spending problem and enabling trustless decentralized digital value transfer.">
    <rect x="80" y="500" width="640" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="522" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Consensus solves double-spending and enables trustless decentralized digital value transfer</text>
  </g>
</svg>