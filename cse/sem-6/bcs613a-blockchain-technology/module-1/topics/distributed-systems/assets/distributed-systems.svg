<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" fill="#64748b">
<polygon points="0 0, 10 3.5, 0 7"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g id="step1" data-narration="A distributed system is a network of independent computers that work together to appear as one system. Key traits include no central authority, message passing, coordination, and fault tolerance.">
<text x="50" y="30" font-size="22" fill="#1e293b" font-weight="bold">What is a Distributed System?</text>
<rect x="50" y="50" width="700" height="90" fill="#e3f2fd" rx="10" stroke="#1976d2" stroke-width="2"/>
<text x="70" y="75" font-size="14" fill="#334155">A collection of independent computers that communicate and coordinate</text>
<text x="70" y="95" font-size="14" fill="#334155">through message passing to achieve common goals.</text>
<rect x="60" y="115" width="140" height="25" fill="#ff9800" rx="5"/>
<text x="70" y="132" font-size="12" fill="#ffffff" font-weight="bold">No Central Authority</text>
<rect x="210" y="115" width="140" height="25" fill="#ff9800" rx="5"/>
<text x="220" y="132" font-size="12" fill="#ffffff" font-weight="bold">Message Passing</text>
<rect x="360" y="115" width="140" height="25" fill="#ff9800" rx="5"/>
<text x="370" y="132" font-size="12" fill="#ffffff" font-weight="bold">Coordination</text>
<rect x="510" y="115" width="140" height="25" fill="#ff9800" rx="5"/>
<text x="520" y="132" font-size="12" fill="#ffffff" font-weight="bold">Fault Tolerance</text>
</g>
<g id="step2" data-narration="Blockchain embodies distributed system principles: decentralization replaces central servers, peer-to-peer networks enable direct node communication, and replication ensures every node holds a complete copy of the data.">
<text x="50" y="160" font-size="20" fill="#1e293b" font-weight="bold">Why Blockchain is a Distributed System</text>
<rect x="50" y="185" width="320" height="130" fill="#f3e5f5" rx="10" stroke="#9c27b0" stroke-width="2"/>
<text x="60" y="210" font-size="16" fill="#7c3aed" font-weight="bold">Decentralization</text>
<text x="60" y="235" font-size="13" fill="#334155">No central server. Data replicated</text>
<text x="60" y="255" font-size="13" fill="#334155">across thousands of nodes worldwide.</text>
<circle cx="160" cy="275" r="8" fill="#9c27b0"/>
<circle cx="200" cy="275" r="8" fill="#9c27b0"/>
<circle cx="240" cy="275" r="8" fill="#9c27b0"/>
<circle cx="280" cy="275" r="8" fill="#9c27b0"/>
<line x1="160" y1="275" x2="280" y2="275" stroke="#9c27b0" stroke-width="1"/>
<line x1="190" y1="275" x2="200" y2="295" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrowhead)"/>
<line x1="230" y1="275" x2="220" y2="295" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrowhead)"/>
<rect x="430" y="185" width="320" height="130" fill="#e8f5e9" rx="10" stroke="#388e3c" stroke-width="2"/>
<text x="440" y="210" font-size="16" fill="#166534" font-weight="bold">P2P Architecture</text>
<text x="440" y="235" font-size="13" fill="#334155">Equal-status nodes communicate directly.</text>
<text x="440" y="255" font-size="13" fill="#334155">No hierarchy, all nodes are equal.</text>
<text x="440" y="275" font-size="13" fill="#334155">Self-organizing network.</text>
<circle cx="520" cy="285" r="15" fill="#388e3c"/>
<circle cx="580" cy="260" r="15" fill="#388e3c"/>
<circle cx="640" cy="285" r="15" fill="#388e3c"/>
<circle cx="550" cy="310" r="15" fill="#388e3c"/>
<circle cx="610" cy="310" r="15" fill="#388e3c"/>
<line x1="520" y1="285" x2="580" y2="260" stroke="#388e3c" stroke-width="1.5"/>
<line x1="580" y1="260" x2="640" y2="285" stroke="#388e3c" stroke-width="1.5"/>
<line x1="640" y1="285" x2="610" y2="310" stroke="#388e3c" stroke-width="1.5"/>
<line x1="610" y1="310" x2="550" y2="310" stroke="#388e3c" stroke-width="1.5"/>
<line x1="550" y1="310" x2="520" y2="285" stroke="#388e3c" stroke-width="1.5"/>
<line x1="550" y1="310" x2="580" y2="260" stroke="#388e3c" stroke-width="1.5"/>
</g>
<g id="step3" data-narration="Three main consensus mechanisms exist: Proof of Work uses cryptographic puzzles with high energy but strong security, Proof of Stake selects validators by their staked cryptocurrency, and PBFT tolerates up to one-third faulty nodes.">
<text x="50" y="340" font-size="20" fill="#1e293b" font-weight="bold">Consensus Mechanisms</text>
<rect x="50" y="365" width="230" height="100" fill="#ffebee" rx="10" stroke="#f44336" stroke-width="2"/>
<text x="60" y="390" font-size="14" fill="#c62828" font-weight="bold">Proof of Work (PoW)</text>
<text x="60" y="410" font-size="12" fill="#334155">Miners compete to solve puzzles.</text>
<text x="60" y="428" font-size="12" fill="#334155">High energy, slow but secure.</text>
<text x="60" y="446" font-size="12" fill="#334155">Examples: Bitcoin, Ethereum.</text>
<rect x="290" y="365" width="230" height="100" fill="#e3f2fd" rx="10" stroke="#1976d2" stroke-width="2"/>
<text x="300" y="390" font-size="14" fill="#1565c0" font-weight="bold">Proof of Stake (PoS)</text>
<text x="300" y="410" font-size="12" fill="#334155">Validators stake cryptocurrency.</text>
<text x="300" y="428" font-size="12" fill="#334155">Low energy, fast, medium decentralization.</text>
<text x="300" y="446" font-size="12" fill="#334155">Examples: Ethereum 2.0, Cardano.</text>
<rect x="530" y="365" width="220" height="100" fill="#fff3e0" rx="10" stroke="#ff9800" stroke-width="2"/>
<text x="540" y="390" font-size="14" fill="#e65100" font-weight="bold">PBFT</text>
<text x="540" y="410" font-size="12" fill="#334155">Nodes exchange messages in rounds.</text>
<text x="540" y="428" font-size="12" fill="#334155">Tolerates up to 1/3 faulty nodes.</text>
<text x="540" y="446" font-size="12" fill="#334155">Examples: Hyperledger Fabric.</text>
</g>
<g id="step4" data-narration="The CAP theorem states distributed systems can only guarantee two of three: Consistency, Availability, or Partition Tolerance. Blockchains choose Availability and Partition Tolerance, accepting eventual consistency with temporary forks.">
<text x="50" y="485" font-size="20" fill="#1e293b" font-weight="bold">CAP Theorem in Blockchain</text>
<rect x="50" y="510" width="200" height="80" fill="#f8f9fa" rx="10" stroke="#64748b" stroke-width="2"/>
<text x="60" y="535" font-size="14" fill="#334155" font-weight="bold">Consistency</text>
<text x="60" y="555" font-size="12" fill="#64748b">All nodes see same data</text>
<rect x="260" y="510" width="200" height="80" fill="#f8f9fa" rx="10" stroke="#64748b" stroke-width="2"/>
<text x="270" y="535" font-size="14" fill="#334155" font-weight="bold">Availability</text>
<text x="270" y="555" font-size="12" fill="#64748b">System always responds</text>
<rect x="470" y="510" width="200" height="80" fill="#f8f9fa" rx="10" stroke="#64748b" stroke-width="2"/>
<text x="480" y="535" font-size="14" fill="#334155" font-weight="bold">Partition Tolerance</text>
<text x="480" y="555" font-size="12" fill="#64748b">Works despite network splits</text>
<path d="M 150 540 L 260 540" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
<path d="M 360 540 L 470 540" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
<path d="M 150 570 L 360 570" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
<circle cx="580" cy="550" r="30" fill="#22c55e" rx="5"/>
<text x="555" y="545" font-size="12" fill="#ffffff" font-weight="bold">BLOCKCHAIN</text>
<text x="555" y="560" font-size="10" fill="#ffffff">Picks A + P</text>
<line x1="470" y1="550" x2="550" y2="550" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead)"/>
</g>
</svg>