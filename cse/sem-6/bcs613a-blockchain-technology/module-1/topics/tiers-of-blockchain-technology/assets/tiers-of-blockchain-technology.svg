<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Tiers and Types of Blockchain Technology</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Blockchains are classified by access tiers (who can participate) and by architecture (Layer 1 vs Layer 2).">
    <text x="400" y="48" text-anchor="middle" font-size="12" fill="#616161">Access Tiers: Public, Private, Consortium | Architecture: L1 Base, L2 Scaling</text>
  </g>
  <g id="step1" class="step" data-narration="Public blockchains are permissionless networks where anyone can join, read, write, and validate transactions.">
    <rect x="30" y="60" width="740" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">PUBLIC BLOCKCHAIN (Permissionless)</text>
    <text x="180" y="105" text-anchor="middle" font-size="11" fill="#333">Anyone can participate</text>
    <text x="400" y="105" text-anchor="middle" font-size="11" fill="#333">PoW/PoS Consensus</text>
    <text x="620" y="105" text-anchor="middle" font-size="11" fill="#333">Examples: Bitcoin, Ethereum</text>
    <text x="400" y="122" text-anchor="middle" font-size="10" fill="#666">High decentralization, censorship-resistant, trustless</text>
  </g>
  <g id="step2" class="step" data-narration="Private blockchains are permissioned networks controlled by one organization with restricted access and fast transactions.">
    <rect x="30" y="145" width="740" height="75" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="167" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">PRIVATE BLOCKCHAIN (Permissioned)</text>
    <text x="180" y="190" text-anchor="middle" font-size="11" fill="#333">Single organization controls</text>
    <text x="400" y="190" text-anchor="middle" font-size="11" fill="#333">Voting-based Consensus</text>
    <text x="620" y="190" text-anchor="middle" font-size="11" fill="#333">Examples: Hyperledger Fabric</text>
    <text x="400" y="207" text-anchor="middle" font-size="10" fill="#666">High throughput, centralized, enterprise use</text>
  </g>
  <g id="step3" class="step" data-narration="Consortium blockchains are federated networks governed by multiple organizations, balancing decentralization and performance.">
    <rect x="30" y="230" width="740" height="75" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="252" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">CONSORTIUM BLOCKCHAIN (Federated)</text>
    <text x="180" y="275" text-anchor="middle" font-size="11" fill="#333">Pre-selected validators</text>
    <text x="400" y="275" text-anchor="middle" font-size="11" fill="#333">PBFT/Raft Consensus</text>
    <text x="620" y="275" text-anchor="middle" font-size="11" fill="#333">Examples: R3 Corda, Hyperledger</text>
    <text x="400" y="292" text-anchor="middle" font-size="10" fill="#666">Partial decentralization, faster than public, B2B use</text>
  </g>
  <g id="step4" class="step" data-narration="Layer 1 is the base blockchain protocol like Bitcoin or Ethereum that handles security and final settlement of all transactions.">
    <rect x="30" y="315" width="360" height="80" rx="8" fill="#e1f5fe" stroke="#0277bd" stroke-width="2"/>
    <text x="210" y="337" text-anchor="middle" font-size="13" font-weight="bold" fill="#0277bd">LAYER 1 (Base Protocol)</text>
    <text x="210" y="358" text-anchor="middle" font-size="11" fill="#333">Foundation blockchain</text>
    <text x="210" y="375" text-anchor="font-size:10" fill="#333">Provides security, decentralization</text>
    <text x="210" y="388" text-anchor="middle" font-size="10" fill="#666">Examples: Bitcoin, Ethereum</text>
  </g>
  <g id="step5" class="step" data-narration="Layer 2 solutions are built on top of Layer 1 to handle transactions off-chain, improving speed while using L1 security.">
    <rect x="410" y="315" width="360" height="80" rx="8" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
    <text x="590" y="337" text-anchor="middle" font-size="13" font-weight="bold" fill="#c2185b">LAYER 2 (Scaling Solution)</text>
    <text x="590" y="358" text-anchor="middle" font-size="11" fill="#333">Built on top of L1</text>
    <text x="590" y="375" text-anchor="middle" font-size="10" fill="#333">Off-chain processing</text>
    <text x="590" y="388" text-anchor="middle" font-size="10" fill="#666">Examples: Lightning, Rollups</text>
  </g>
  <g id="step6" class="step" data-narration="L2 solutions include state channels, sidechains, and rollups. Rollups post transaction data to L1 with proofs.">
    <rect x="30" y="405" width="740" height="55" rx="8" fill="#fffde7" stroke="#f9a825" stroke-width="1.5"/>
    <text x="400" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="#f57f17">L2 Scaling Techniques</text>
    <text x="130" y="447" text-anchor="middle" font-size="10" fill="#333">State Channels</text>
    <text x="130" y="458" text-anchor="middle" font-size="9" fill="#666">Lightning Network</text>
    <text x="400" y="447" text-anchor="middle" font-size="10" fill="#333">Sidechains</text>
    <text x="400" y="458" text-anchor="middle" font-size="9" fill="#666">Polygon PoS</text>
    <text x="670" y="447" text-anchor="middle" font-size="10" fill="#333">Rollups</text>
    <text x="670" y="458" text-anchor="middle" font-size="9" fill="#666">Optimism, zkSync</text>
  </g>
  <g id="step7" class="step" data-narration="The Blockchain Trilemma states its hard to achieve perfect decentralization, security, and scalability simultaneously.">
    <rect x="30" y="470" width="740" height="45" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
    <text x="400" y="490" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">Blockchain Trilemma</text>
    <text x="400" y="508" text-anchor="middle" font-size="11" fill="#333">Decentralization + Security + Scalability: Pick two. L2 solutions address the scalability gap.</text>
  </g>
  <g id="step8" class="step" data-narration="Remember the key differences: Public is open and slow, Private is fast but controlled, Consortium balances both for business.">
    <rect x="80" y="525" width="640" height="45" rx="8" fill="#e0e0e0" stroke="#616161" stroke-width="1.5"/>
    <text x="400" y="548" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Exam Tip: Compare tiers by access, consensus, decentralization, throughput, and real examples</text>
    <text x="400" y="565" text-anchor="middle" font-size="10" fill="#555">Public: Open, PoW/PoS | Private: Restricted, voting | Consortium: Multi-org, PBFT</text>
  </g>
</svg>