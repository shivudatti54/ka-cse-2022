<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Generic Elements of a Blockchain</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <g id="step0" class="step" data-narration="A blockchain combines several key elements working together: a distributed ledger, blocks, cryptography, consensus, peer-to-peer networking, and digital signatures.">
    <text x="400" y="55" text-anchor="middle" font-size="12" fill="#616161">The six fundamental building blocks that create a secure, decentralized system</text>
  </g>
  
  <g id="step1" class="step" data-narration="The distributed ledger is a shared database replicated across all participating nodes. Everyone maintains an identical copy of all transactions recorded on the network.">
    <rect x="40" y="75" width="720" height="65" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="80" y="95" text-anchor="start" font-size="12" font-weight="bold" fill="#1976d2">1. Distributed Ledger</text>
    <text x="80" y="115" text-anchor="start" font-size="10" fill="#333">Shared record replicated across all nodes in the network; no central authority</text>
    <text x="580" y="95" text-anchor="start" font-size="10" fill="#666">Ensures transparency</text>
    <text x="580" y="110" text-anchor="start" font-size="10" fill="#666">and immutability</text>
  </g>
  
  <g id="step2" class="step" data-narration="Blocks contain grouped transactions with timestamps, a nonce, and the cryptographic hash of the previous block, creating the chain structure.">
    <rect x="40" y="150" width="340" height="65" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="80" y="170" text-anchor="start" font-size="12" font-weight="bold" fill="#388e3c">2. Blocks</text>
    <text x="80" y="190" text-anchor="start" font-size="10" fill="#333">Data containers with transactions,</text>
    <text x="80" y="205" text-anchor="start" font-size="10" fill="#333">timestamp, nonce, prev hash</text>
    
    <rect x="420" y="150" width="340" height="65" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="460" y="170" text-anchor="start" font-size="12" font-weight="bold" fill="#e65100">3. Cryptography</text>
    <text x="460" y="190" text-anchor="start" font-size="10" fill="#333">SHA-256 hashing ensures data integrity</text>
    <text x="460" y="205" text-anchor="start" font-size="10" fill="#333">Public-key for digital signatures</text>
  </g>
  
  <g id="step3" class="step" data-narration="Consensus mechanisms like Proof of Work and Proof of Stake enable all nodes to agree on which transactions are valid without a central authority.">
    <rect x="40" y="225" width="340" height="65" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="80" y="245" text-anchor="start" font-size="12" font-weight="bold" fill="#9c27b0">4. Consensus Mechanism</text>
    <text x="80" y="265" text-anchor="start" font-size="10" fill="#333">PoW: miners solve puzzles to add blocks</text>
    <text x="80" y="280" text-anchor="start" font-size="10" fill="#333">PoS: validators stake coins for block creation</text>
    
    <rect x="420" y="225" width="340" height="65" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="460" y="245" text-anchor="start" font-size="12" font-weight="bold" fill="#f44336">5. P2P Network</text>
    <text x="460" y="265" text-anchor="start" font-size="10" fill="#333">Nodes communicate directly without servers</text>
    <text x="460" y="280" text-anchor="start" font-size="10" fill="#333">Ensures decentralization and robustness</text>
  </g>
  
  <g id="step4" class="step" data-narration="Digital signatures use public and private key pairs. The private key authorizes transactions while the public key verifies ownership on the blockchain.">
    <rect x="40" y="300" width="720" height="65" rx="6" fill="#e1f5fe" stroke="#0277bd" stroke-width="1.5"/>
    <text x="80" y="320" text-anchor="start" font-size="12" font-weight="bold" fill="#0277bd">6. Digital Signatures</text>
    <text x="80" y="340" text-anchor="start" font-size="10" fill="#333">Private key: secret, used to sign transactions</text>
    <text x="80" y="355" text-anchor="start" font-size="10" fill="#333">Public key: shared, verifies signature authenticity</text>
    <text x="580" y="320" text-anchor="start" font-size="10" fill="#666">Provides authentication</text>
    <text x="580" y="335" text-anchor="start" font-size="10" fill="#666">and non-repudiation</text>
  </g>
  
  <g id="step5" class="step" data-narration="Full nodes store the complete blockchain while light nodes store only block headers. Miners and validators are special nodes that create new blocks.">
    <rect x="200" y="380" width="400" height="55" rx="6" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1.5"/>
    <text x="400" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f51b5">Node Types in the Network</text>
    <text x="400" y="420" text-anchor="middle" font-size="10" fill="#333">Full nodes store complete chain | Light nodes store headers | Miners/Validators create blocks</text>
  </g>
  
  <g id="step6" class="step" data-narration="These six elements work together as an integrated system. Each block links via hash, transactions get signed, consensus validates, and the P2P network distributes everything.">
    <text x="400" y="460" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">How Elements Connect Together</text>
    <rect x="60" y="475" width="100" height="45" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="110" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">Distributed</text>
    <text x="110" y="510" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">Ledger</text>
    
    <line x1="160" y1="497" x2="185" y2="497" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="185" y="475" width="90" height="45" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="230" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#388e3c">Blocks</text>
    <text x="230" y="510" text-anchor="middle" font-size="9" font-weight="bold" fill="#388e3c">(chained)</text>
    
    <line x1="275" y1="497" x2="300" y2="497" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="300" y="475" width="90" height="45" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="345" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Cryptography</text>
    <text x="345" y="510" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">(hashing)</text>
    
    <line x1="390" y1="497" x2="415" y2="497" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="415" y="475" width="90" height="45" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="460" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">Consensus</text>
    <text x="460" y="510" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">(validation)</text>
    
    <line x1="505" y1="497" x2="530" y2="497" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="530" y="475" width="90" height="45" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="575" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#f44336">P2P</text>
    <text x="575" y="510" text-anchor="middle" font-size="9" font-weight="bold" fill="#f44336">Network</text>
    
    <line x1="620" y1="497" x2="645" y2="497" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="645" y="475" width="90" height="45" rx="5" fill="#e1f5fe" stroke="#0277bd" stroke-width="1.5"/>
    <text x="690" y="495" text-anchor="middle" font-size="9" font-weight="bold" fill="#0277bd">Digital</text>
    <text x="690" y="510" text-anchor="middle" font-size="9" font-weight="bold" fill="#0277bd">Signatures</text>
  </g>
  
  <g id="step7" class="step" data-narration="This combination creates a tamper-evident system where altering any past transaction would break the cryptographic chain across all distributed copies.">
    <rect x="180" y="540" width="440" height="40" rx="5" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5"/>
    <text x="400" y="560" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2185b">Result: A Secure, Transparent, Decentralized Ledger</text>
    <text x="400" y="575" text-anchor="middle" font-size="9" fill="#333">Immutability through cryptographic chaining | No single point of failure | Trustless consensus</text>
  </g>
</svg>