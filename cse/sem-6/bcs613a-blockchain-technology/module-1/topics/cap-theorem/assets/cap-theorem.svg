<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step1" data-narration="The CAP Theorem, formulated by Eric Brewer, states that a distributed system can only provide two of three guarantees: Consistency, Availability, and Partition Tolerance. This fundamental principle shapes how we design distributed databases and systems.">
<text x="400" y="40" font-size="28" font-weight="bold" fill="#1e293b" text-anchor="middle">CAP Theorem</text>
<text x="400" y="70" font-size="16" fill="#64748b" text-anchor="middle">Choose only 2 of 3 properties</text>
<circle cx="150" cy="120" r="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
<text x="150" y="115" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">C</text>
<text x="150" y="135" font-size="12" fill="#1976d2" text-anchor="middle">Consistency</text>
<circle cx="400" cy="120" r="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
<text x="400" y="115" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">A</text>
<text x="400" y="135" font-size="12" fill="#388e3c" text-anchor="middle">Availability</text>
<circle cx="650" cy="120" r="50" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
<text x="650" y="115" font-size="16" font-weight="bold" fill="#ff9800" text-anchor="middle">P</text>
<text x="650" y="135" font-size="12" fill="#ff9800" text-anchor="middle">Partition Tolerance</text>
</g>
<g class="step" id="step2" data-narration="Consistency means all nodes see the same data at the same time. Every read gets the most recent write or an error. Availability means every request receives a response without error, though it might be stale data. Partition tolerance means the system continues working even when network failures occur.">
<rect x="30" y="190" width="220" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="140" y="215" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">Consistency (C)</text>
<text x="140" y="240" font-size="12" fill="#1565c0" text-anchor="middle">All nodes see same data</text>
<text x="140" y="258" font-size="12" fill="#1565c0" text-anchor="middle">Read gets latest write</text>
<rect x="290" y="190" width="220" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="400" y="215" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">Availability (A)</text>
<text x="400" y="240" font-size="12" fill="#2e7d32" text-anchor="middle">Every request gets response</text>
<text x="400" y="258" font-size="12" fill="#2e7d32" text-anchor="middle">No errors or timeouts</text>
<rect x="550" y="190" width="220" height="100" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="660" y="215" font-size="16" font-weight="bold" fill="#ff9800" text-anchor="middle">Partition Tolerance (P)</text>
<text x="660" y="240" font-size="12" fill="#ef6c00" text-anchor="middle">Works despite failures</text>
<text x="660" y="258" font-size="12" fill="#ef6c00" text-anchor="middle">Handles network partitions</text>
</g>
<g class="step" id="step3" data-narration="During a network partition, you must choose between consistency or availability. CP systems sacrifice availability and return errors during partitions. AP systems sacrifice consistency and return potentially stale data. CA systems are impossible in distributed systems because partitions will happen.">
<polygon points="400,320 280,430 520,430" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
<text x="400" y="350" font-size="14" font-weight="bold" fill="#1976d2" text-anchor="middle">CP</text>
<text x="400" y="368" font-size="11" fill="#64748b" text-anchor="middle">Consistency +</text>
<text x="400" y="382" font-size="11" fill="#64748b" text-anchor="middle">Partition Tolerance</text>
<text x="295" y="400" font-size="11" fill="#f44336" text-anchor="middle">Sacrifice</text>
<text x="295" y="415" font-size="11" fill="#f44336" text-anchor="middle">Availability</text>
<text x="505" y="400" font-size="11" fill="#f44336" text-anchor="middle">Sacrifice</text>
<text x="505" y="415" font-size="11" fill="#f44336" text-anchor="middle">Consistency</text>
<line x1="310" y1="350" x2="220" y2="330" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>
<line x1="490" y1="350" x2="580" y2="330" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>
<text x="150" y="330" font-size="12" fill="#64748b" text-anchor="middle">During Partition:</text>
<text x="150" y="348" font-size="11" fill="#64748b" text-anchor="middle">Must Choose C or A</text>
<text x="650" y="330" font-size="12" fill="#f44336" text-anchor="middle">CA Not Possible!</text>
<text x="650" y="348" font-size="11" fill="#f44336" text-anchor="middle">Partitions will occur</text>
</g>
<g class="step" id="step4" data-narration="CP systems like MongoDB, HBase, and Zookeeper prioritize correctness and are used for financial transactions. AP systems like Cassandra, DynamoDB, and DNS prioritize availability and are used for shopping carts and social feeds where stale data is acceptable.">
<rect x="30" y="460" width="340" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="200" y="485" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">CP Systems</text>
<text x="200" y="510" font-size="12" fill="#1565c0" text-anchor="middle">MongoDB, HBase, Zookeeper</text>
<text x="200" y="528" font-size="11" fill="#1565c0" text-anchor="middle">Use: Financial, Inventory</text>
<rect x="430" y="460" width="340" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="600" y="485" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">AP Systems</text>
<text x="600" y="510" font-size="12" fill="#2e7d32" text-anchor="middle">Cassandra, DynamoDB, DNS</text>
<text x="600" y="528" font-size="11" fill="#2e7d32" text-anchor="middle">Use: Social feeds, Caching</text>
</g>
<g class="step" id="step5" data-narration="The PACELC theorem extends CAP by adding latency trade-offs. When there is no partition, systems must choose between low latency or consistency. For example, DynamoDB chooses low latency during normal operation, while BigTable chooses consistency.">
<rect x="30" y="340" width="740" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="400" y="365" font-size="16" font-weight="bold" fill="#9c27b0" text-anchor="middle">PACELC Extension: During Partition choose A or C, Else choose Latency or Consistency</text>
<rect x="30" y="410" width="350" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="205" y="432" font-size="12" fill="#2e7d32" text-anchor="middle">DynamoDB: AP during partition, Low Latency normally</text>
<rect x="390" y="410" width="380" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="580" y="432" font-size="12" fill="#1565c0" text-anchor="middle">BigTable / Spanner: CP during partition, Consistent normally</text>
</g>
<g class="step" id="step6" data-narration="Remember these key takeaways: network partitions are inevitable, so you must choose between CP and AP. Different parts of your system can make different choices. Modern databases often offer tunable consistency to balance these trade-offs based on your specific needs.">
<rect x="30" y="540" width="740" height="50" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="400" y="560" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">Key: Partitions are inevitable → Choose CP or AP. Different components can differ. Use tunable consistency.</text>
<text x="400" y="585" font-size="11" fill="#64748b" text-anchor="middle">CA does not exist in distributed systems</text>
</g>
</svg>