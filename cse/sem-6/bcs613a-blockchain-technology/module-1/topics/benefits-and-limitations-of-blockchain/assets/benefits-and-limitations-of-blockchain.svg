<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g id="step0" data-narration="Blockchain technology offers powerful benefits through decentralization, but also faces real-world limitations that developers and organizations must carefully consider when choosing this technology.">
    <text x="400" y="40" font-size="22" fill="#1976d2" text-anchor="middle" font-weight="bold">Benefits and Limitations of Blockchain</text>
    <line x1="200" y1="55" x2="600" y2="55" stroke="#1976d2" stroke-width="2"/>
  </g>
  
  <!-- Step 1: Enhanced Trust -->
  <g id="step1" data-narration="Decentralization creates enhanced trust by removing the need for a single central authority. Multiple participants validate transactions collectively across a peer-to-peer network.">
    <circle cx="150" cy="130" r="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="150" y="125" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">TRUST</text>
    <text x="150" y="140" font-size="10" fill="#1976d2" text-anchor="middle">via Decentralization</text>
    
    <path d="M 185 130 Q 250 100, 300 130" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    
    <rect x="300" y="100" width="140" height="60" rx="8" fill="#1976d2"/>
    <text x="370" y="130" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">No Single Point</text>
    <text x="370" y="148" font-size="11" fill="#ffffff" text-anchor="middle">of Failure</text>
    
    <text x="370" y="175" font-size="10" fill="#388e3c" text-anchor="middle">Benefit 1 of 4</text>
  </g>
  
  <!-- Step 2: Security -->
  <g id="step2" data-narration="Blockchain provides increased security through cryptographic hashing and distributed storage. Each block contains a unique digital fingerprint that makes tampering extremely difficult.">
    <circle cx="150" cy="230" r="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
    <text x="150" y="225" font-size="12" fill="#388e3c" text-anchor="middle" font-weight="bold">SECURITY</text>
    <text x="150" y="240" font-size="10" fill="#388e3c" text-anchor="middle">via Cryptography</text>
    
    <path d="M 185 230 Q 250 200, 300 230" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    
    <rect x="300" y="200" width="140" height="60" rx="8" fill="#388e3c"/>
    <text x="370" y="225" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Hash Links</text>
    <text x="370" y="245" font-size="11" fill="#ffffff" text-anchor="middle">Protect Data</text>
    
    <text x="370" y="275" font-size="10" fill="#388e3c" text-anchor="middle">Benefit 2 of 4</text>
    
    <!-- Visual: Chain blocks representation -->
    <rect x="460" y="215" width="30" height="20" rx="3" fill="#388e3c"/>
    <rect x="495" y="215" width="30" height="20" rx="3" fill="#388e3c" stroke-dasharray="4"/>
    <line x1="490" y1="225" x2="495" y2="225" stroke="#388e3c" stroke-width="2"/>
  </g>
  
  <!-- Step 3: Transparency & Traceability -->
  <g id="step3" data-narration="Greater transparency creates a public audit trail where all transactions are visible. This improves traceability for supply chains and enables anyone to verify transaction history.">
    <circle cx="150" cy="330" r="35" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="150" y="325" font-size="12" fill="#ff9800" text-anchor="middle" font-weight="bold">TRANSPARENCY</text>
    <text x="150" y="340" font-size="10" fill="#ff9800" text-anchor="middle">Public Ledger</text>
    
    <path d="M 185 330 Q 250 300, 300 330" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    
    <rect x="300" y="300" width="180" height="60" rx="8" fill="#ff9800"/>
    <text x="390" y="325" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Verifiable History</text>
    <text x="390" y="345" font-size="11" fill="#ffffff" text-anchor="middle">for All Participants</text>
    
    <text x="390" y="375" font-size="10" fill="#388e3c" text-anchor="middle">Benefit 3 of 4</text>
    
    <!-- Visual: Ledger stack -->
    <rect x="500" y="310" width="40" height="5" fill="#ff9800" rx="1"/>
    <rect x="500" y="318" width="40" height="5" fill="#ff9800" rx="1"/>
    <rect x="500" y="326" width="40" height="5" fill="#ff9800" rx="1"/>
  </g>
  
  <!-- Step 4: Reduced Costs -->
  <g id="step4" data-narration="Smart contracts automate processes and eliminate intermediaries like banks and lawyers. This reduction in middlemen significantly lowers transaction costs and processing time.">
    <circle cx="150" cy="430" r="35" fill="#f3e5f5" stroke="#9c27b0" stroke-width="3"/>
    <text x="150" y="425" font-size="12" fill="#9c27b0" text-anchor="middle" font-weight="bold">LOWER COSTS</text>
    <text x="150" y="440" font-size="10" fill="#9c27b0" text-anchor="middle">via Automation</text>
    
    <path d="M 185 430 Q 250 400, 300 430" stroke="#9c27b0" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    
    <rect x="300" y="400" width="180" height="60" rx="8" fill="#9c27b0"/>
    <text x="390" y="425" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Fewer Intermediaries</text>
    <text x="390" y="445" font-size="11" fill="#ffffff" text-anchor="middle">Faster Settlement</text>
    
    <text x="390" y="475" font-size="10" fill="#388e3c" text-anchor="middle">Benefit 4 of 4</text>
    
    <!-- Visual: Cost comparison -->
    <text x="510" y="420" font-size="10" fill="#9c27b0" text-anchor="middle">Traditional</text>
    <text x="510" y="435" font-size="11" fill="#9c27b0" text-anchor="middle" font-weight="bold">$$$</text>
    <text x="550" y="427" font-size="12" fill="#9c27b0">→</text>
    <text x="580" y="420" font-size="10" fill="#9c27b0" text-anchor="middle">Blockchain</text>
    <text x="580" y="435" font-size="11" fill="#9c27b0" text-anchor="middle" font-weight="bold">$</text>
  </g>
  
  <!-- Step 5: Scalability Limitation -->
  <g id="step5" data-narration="The first major limitation is scalability. Blockchain processes far fewer transactions per second compared to centralized systems like Visa, which can handle thousands of transactions.">
    <circle cx="150" cy="530" r="35" fill="#ffebee" stroke="#f44336" stroke-width="3"/>
    <text x="150" y="525" font-size="12" fill="#f44336" text-anchor="middle" font-weight="bold">SCALABILITY</text>
    <text x="150" y="540" font-size="10" fill="#f44336" text-anchor="middle">Performance Issue</text>
    
    <path d="M 185 530 Q 250 500, 300 530" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    
    <rect x="300" y="500" width="140" height="60" rx="8" fill="#f44336"/>
    <text x="370" y="525" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Limited TPS</text>
    <text x="370" y="545" font-size="11" fill="#ffffff" text-anchor="middle">vs Centralized</text>
    
    <text x="370" y="575" font-size="10" fill="#f44336" text-anchor="middle">Limitation 1 of 4</text>
    
    <!-- Visual: Performance comparison bars -->
    <rect x="460" y="510" width="60" height="8" fill="#f44336" rx="2"/>
    <rect x="460" y="522" width="15" height="8" fill="#f44336" rx="2"/>
  </g>
  
  <!-- Step 6: Energy Consumption -->
  <g id="step6" data-narration="Proof of Work consensus requires enormous amounts of electricity. Mining operations consume energy comparable to some small countries, raising serious environmental concerns.">
    <circle cx="580" cy="130" r="35" fill="#ffebee" stroke="#f44336" stroke-width="3"/>
    <text x="580" y="125" font-size="12" fill="#f44336" text-anchor="middle" font-weight="bold">ENERGY</text>
    <text x="580" y="140" font-size="10" fill="#f44336" text-anchor="middle">High Consumption</text>
    
    <path d="M 615 130 Q 670 100, 720 130" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    
    <rect x="430" y="100" width="140" height="60" rx="8" fill="#f44336"/>
    <text x="500" y="125" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">PoW Mining</text>
    <text x="500" y="145" font-size="11" fill="#ffffff" text-anchor="middle">Uses Huge Power</text>
    
    <text x="500" y="175" font-size="10" fill="#f44336" text-anchor="middle">Limitation 2 of 4</text>
    
    <!-- Visual: Lightning bolt for energy -->
    <text x="585" y="175" font-size="24" fill="#f44336" text-anchor="middle">⚡</text>
  </g>
  
  <!-- Step 7: Irreversible Errors -->
  <g id="step7" data-narration="Immutability, while a security benefit, creates irreversible errors. Lost private keys or buggy smart contracts cannot be reversed, potentially causing permanent financial loss.">
    <circle cx="580" cy="230" r="35" fill="#ffebee" stroke="#f44336" stroke-width="3"/>
    <text x="580" y="225" font-size="12" fill="#f44336" text-anchor="middle" font-weight="bold">IRREVERSIBLE</text>
    <text x="580" y="240" font-size="10" fill="#f44336" text-anchor="middle">No Undo Button</text>
    
    <path d="M 615 230 Q 670 200, 720 230" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    
    <rect x="430" y="200" width="140" height="60" rx="8" fill="#f44336"/>
    <text x="500" y="225" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Permanent Mistakes</text>
    <text x="500" y="245" font-size="11" fill="#ffffff" text-anchor="middle">Cannot Reverse</text>
    
    <text x="500" y="275" font-size="10" fill="#f44336" text-anchor="middle">Limitation 3 of 4</text>
    
    <!-- Visual: X mark -->
    <text x="580" y="275" font-size="20" fill="#f44336" text-anchor="middle">✗</text>
  </g>
  
  <!-- Step 8: Regulatory Uncertainty -->
  <g id="step8" data-narration="Finally, regulatory uncertainty remains a major challenge. Governments worldwide are still developing laws for blockchain, creating legal risks for businesses and users alike.">
    <circle cx="580" cy="330" r="35" fill="#ffebee" stroke="#f44336" stroke-width="3"/>
    <text x="580" y="325" font-size="12" fill="#f44336" text-anchor="middle" font-weight="bold">REGULATORY</text>
    <text x="580" y="340" font-size="10" fill="#f44336" text-anchor="middle">Unclear Rules</text>
    
    <path d="M 615 330 Q 670 300, 720 330" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    
    <rect x="430" y="300" width="140" height="60" rx="8" fill="#f44336"/>
    <text x="500" y="325" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Legal Risks</text>
    <text x="500" y="345" font-size="11" fill="#ffffff" text-anchor="middle">Changing Laws</text>
    
    <text x="500" y="375" font-size="10" fill="#f44336" text-anchor="middle">Limitation 4 of 4</text>
    
    <!-- Visual: Question mark -->
    <text x="580" y="375" font-size="20" fill="#f44336" text-anchor="middle">?</text>
  </g>
</svg>