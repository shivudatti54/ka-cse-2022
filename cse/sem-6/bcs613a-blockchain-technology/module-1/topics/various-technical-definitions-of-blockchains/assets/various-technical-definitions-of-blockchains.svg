<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g id="step0" data-narration="Welcome to learning about blockchain fundamentals. We will explore five key technical definitions that together describe what a blockchain really is from an engineering perspective.">
    <text x="50" y="40" font-size="22" fill="#2563eb" font-weight="bold">Blockchain Fundamentals</text>
    <text x="50" y="65" font-size="16" fill="#8b5cf6">Various Technical Definitions</text>
  </g>
  
  <!-- Step 1: Distributed Digital Ledger -->
  <g id="step1" data-narration="First, blockchain is a distributed digital ledger. It records transactions digitally and shares identical copies across many computers, making it immutable and impossible to alter.">
    <rect x="50" y="85" width="180" height="60" fill="#10b981" rx="8" />
    <text x="60" y="115" font-size="14" fill="#ffffff" font-weight="bold">Distributed Ledger</text>
    <text x="60" y="132" font-size="11" fill="#e8f5e9">Immutable, Digital, Shared</text>
    <!-- Four components -->
    <rect x="250" y="85" width="90" height="35" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="260" y="107" font-size="10" fill="#1976d2">Digital</text>
    <rect x="350" y="85" width="90" height="35" fill="#ffebee" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="365" y="107" font-size="10" fill="#f44336">Immutable</text>
    <rect x="450" y="85" width="90" height="35" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="465" y="107" font-size="10" fill="#388e3c">Distributed</text>
    <rect x="550" y="85" width="90" height="35" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="565" y="107" font-size="10" fill="#9c27b0">Shared</text>
    <!-- Arrow showing flow -->
    <line x1="230" y1="115" x2="245" y2="115" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Step 2: P2P Network -->
  <g id="step2" data-narration="Second, blockchain works as a peer-to-peer network. All computers called nodes connect directly without any central server, ensuring no single point of failure or control.">
    <!-- Central label -->
    <rect x="300" y="155" width="200" height="40" fill="#9c27b0" rx="8" />
    <text x="350" y="180" font-size="14" fill="#ffffff" font-weight="bold">P2P Network</text>
    <!-- Nodes in circular arrangement -->
    <circle cx="180" cy="200" r="30" fill="#10b981" />
    <text x="165" y="205" font-size="11" fill="#ffffff">Node 1</text>
    <circle cx="420" cy="200" r="30" fill="#10b981" />
    <text x="405" y="205" font-size="11" fill="#ffffff">Node 2</text>
    <circle cx="300" cy="260" r="30" fill="#10b981" />
    <text x="280" y="265" font-size="11" fill="#ffffff">Node 3</text>
    <!-- Connecting lines between nodes -->
    <line x1="205" y1="210" x2="260" y2="230" stroke="#f59e0b" stroke-width="1.5" />
    <line x1="390" y1="210" x2="340" y2="230" stroke="#f59e0b" stroke-width="1.5" />
    <line x1="210" y1="215" x2="280" y2="245" stroke="#f59e0b" stroke-width="1.5" />
    <line x1="390" y1="215" x2="320" y2="245" stroke="#f59e0b" stroke-width="1.5" />
    <!-- Decentralization label -->
    <rect x="550" y="175" width="120" height="35" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="560" y="195" font-size="11" fill="#e65100">No Central Server</text>
    <line x1="450" y1="195" x2="545" y2="195" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Step 3: Cryptographic Chain -->
  <g id="step3" data-narration="Third, blockchain is a chain of blocks linked by cryptography. Each block contains a hash of the previous block, making it tamper-evident and creating immutability.">
    <!-- Block 1 -->
    <rect x="80" y="300" width="120" height="50" fill="#1976d2" rx="6" />
    <text x="90" y="320" font-size="11" fill="#ffffff">Block N</text>
    <text x="90" y="338" font-size="9" fill="#bbdefb">Hash: ABC123...</text>
    <!-- Arrow with hash label -->
    <line x1="200" y1="325" x2="240" y2="325" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="205" y="318" font-size="8" fill="#ff9800">Prev Hash</text>
    <!-- Block 2 -->
    <rect x="250" y="300" width="120" height="50" fill="#1976d2" rx="6" />
    <text x="260" y="320" font-size="11" fill="#ffffff">Block N+1</text>
    <text x="260" y="338" font-size="9" fill="#bbdefb">Hash: DEF456...</text>
    <!-- Arrow with hash label -->
    <line x1="370" y1="325" x2="410" y2="325" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="375" y="318" font-size="8" fill="#ff9800">Prev Hash</text>
    <!-- Block 3 -->
    <rect x="420" y="300" width="120" height="50" fill="#1976d2" rx="6" />
    <text x="430" y="320" font-size="11" fill="#ffffff">Block N+2</text>
    <text x="430" y="338" font-size="9" fill="#bbdefb">Hash: GHI789...</text>
    <!-- Immutability explanation -->
    <rect x="560" y="290" width="180" height="70" fill="#ffebee" rx="6" stroke="#f44336" stroke-width="1"/>
    <text x="570" y="312" font-size="11" fill="#c62828" font-weight="bold">Immutability</text>
    <text x="570" y="330" font-size="10" fill="#c62828">Changing one block</text>
    <text x="570" y="345" font-size="10" fill="#c62828">breaks all following</text>
    <text x="570" y="360" font-size="10" fill="#c62828">hash links!</text>
  </g>
  
  <!-- Step 4: State Machine -->
  <g id="step4" data-narration="Fourth, blockchain acts as a replicated state machine. All nodes start from the same initial state and apply identical transactions in the same order to reach consensus.">
    <!-- State Machine Label -->
    <rect x="50" y="390" width="180" height="40" fill="#f59e0b" rx="6" />
    <text x="60" y="415" font-size="14" fill="#ffffff" font-weight="bold">State Machine</text>
    <!-- Process flow -->
    <rect x="250" y="385" width="100" height="35" fill="#e3f2fd" rx="5" stroke="#1976d2"/>
    <text x="270" y="405" font-size="10" fill="#1976d2">Transaction</text>
    <text x="275" y="418" font-size="8" fill="#1976d2">Input</text>
    <!-- Arrow -->
    <line x1="350" y1="402" x2="390" y2="402" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- State Transition -->
    <rect x="400" y="385" width="100" height="35" fill="#fff3e0" rx="5" stroke="#ff9800"/>
    <text x="420" y="405" font-size="10" fill="#e65100">State Change</text>
    <text x="425" y="418" font-size="8" fill="#e65100">Process</text>
    <!-- Arrow -->
    <line x1="500" y1="402" x2="540" y2="402" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Replicated State -->
    <rect x="550" y="380" width="80" height="45" fill="#e8f5e9" rx="5" stroke="#388e3c"/>
    <text x="560" y="400" font-size="9" fill="#388e3c">Replicated</text>
    <text x="560" y="415" font-size="9" fill="#388e3c">State</text>
    <!-- Nodes showing replication -->
    <circle cx="600" cy="450" r="15" fill="#10b981"/>
    <text x="593" y="454" font-size="8" fill="#ffffff">N1</text>
    <circle cx="640" cy="450" r="15" fill="#10b981"/>
    <text x="633" y="454" font-size="8" fill="#ffffff">N2</text>
    <circle cx="680" cy="450" r="15" fill="#10b981"/>
    <text x="673" y="454" font-size="8" fill="#ffffff">N3</text>
  </g>
  
  <!-- Step 5: DApp Platform -->
  <g id="step5" data-narration="Finally, blockchain serves as a decentralized computing platform for smart contracts. These self-executing programs run identically on every node in the network.">
    <!-- Platform Label -->
    <rect x="50" y="490" width="200" height="40" fill="#8b5cf6" rx="6" />
    <text x="60" y="515" font-size="14" fill="#ffffff" font-weight="bold">DApp Platform</text>
    <text x="60" y="530" font-size="10" fill="#ede7f6">Smart Contracts</text>
    <!-- Smart Contract Box -->
    <rect x="270" y="490" width="130" height="45" fill="#f3e5f5" rx="6" stroke="#9c27b0" stroke-width="1"/>
    <text x="290" y="510" font-size="11" fill="#9c27b0" font-weight="bold">Smart Contract</text>
    <text x="290" y="526" font-size="9" fill="#7b1fa2">Self-executing code</text>
    <!-- Arrow -->
    <line x1="400" y1="512" x2="450" y2="512" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- DApps -->
    <rect x="460" y="485" width="70" height="55" fill="#e3f2fd" rx="5"/>
    <text x="470" y="505" font-size="9" fill="#1565c0">DeFi</text>
    <rect x="540" y="485" width="70" height="55" fill="#e8f5e9" rx="5"/>
    <text x="550" y="505" font-size="9" fill="#2e7d32">Gaming</text>
    <rect x="620" y="485" width="70" height="55" fill="#fff3e0" rx="5"/>
    <text x="630" y="505" font-size="9" fill="#e65100">Identity</text>
    <text x="470" y="525" font-size="8" fill="#666">DApps built on</text>
    <text x="485" y="538" font-size="8" fill="#666">blockchain</text>
  </g>
</svg>