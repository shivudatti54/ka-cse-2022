<svg viewBox="0 0 800 1300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .draw-line {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: drawLine 1s ease-out forwards;
    }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="1300" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to this lecture on Gas in Ethereum - a fundamental concept for understanding blockchain execution.">
    <rect x="50" y="10" width="700" height="45" rx="10" fill="#1976d2" filter="url(#shadow)"/>
    <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">GAS IN ETHEREUM</text>
    <text x="400" y="65" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Understanding Computational Units in Blockchain</text>
  </g>

  <!-- Step 1: What is Gas? -->
  <g class="step" id="step1" data-narration="Gas is the unit measuring computational effort required to execute transactions or smart contracts on Ethereum.">
    <rect x="50" y="65" width="700" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">1. WHAT IS GAS?</text>
    <rect x="70" y="100" width="20" height="20" rx="4" fill="#1976d2"/>
    <text x="100" y="115" font-family="Arial, sans-serif" font-size="11" fill="#333">
      <tspan x="100" dy="0">Gas = Unit of measurement for</tspan>
      <tspan x="100" dy="16">computational effort in Ethereum</tspan>
    </text>
    <g transform="translate(520, 80)">
      <circle cx="30" cy="30" r="25" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <text x="30" y="36" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1976d2" text-anchor="middle">G</text>
    </g>
  </g>

  <!-- Step 2: Why Gas is Needed -->
  <g class="step" id="step2" data-narration="Gas prevents DoS attacks by requiring computational payment, protecting the network from malicious overuse.">
    <rect x="50" y="160" width="700" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="70" y="183" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f44336">2. WHY GAS IS NEEDED</text>
    <rect x="70" y="195" width="20" height="20" rx="4" fill="#f44336"/>
    <text x="100" y="210" font-family="Arial, sans-serif" font-size="11" fill="#333">
      <tspan x="100" dy="0">Prevents DoS attacks by requiring payment</tspan>
      <tspan x="100" dy="16">for every computation - stops network abuse</tspan>
    </text>
    <g transform="translate(520, 175)">
      <rect x="0" y="0" width="60" height="50" rx="5" fill="#ffcdd2" stroke="#f44336" stroke-width="2"/>
      <text x="30" y="32" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">S</text>
    </g>
  </g>

  <!-- Step 3: How Gas Works -->
  <g class="step" id="step3" data-narration="Users specify gas amount when sending transactions; unused gas is refunded after execution completes.">
    <rect x="50" y="255" width="700" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="278" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#388e3c">3. HOW GAS WORKS</text>
    <g transform="translate(100, 295)">
      <rect x="0" y="0" width="80" height="40" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
      <text x="40" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">User Sets</text>
      <text x="40" y="38" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">Gas Amount</text>
    </g>
    <path d="M190,315 L230,315" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)" class="draw-line"/>
    <g transform="translate(240, 295)">
      <rect x="0" y="0" width="80" height="40" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
      <text x="40" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">Execute</text>
      <text x="40" y="38" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">Transaction</text>
    </g>
    <path d="M330,315 L370,315" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)" class="draw-line"/>
    <g transform="translate(380, 295)">
      <rect x="0" y="0" width="80" height="40" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
      <text x="40" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">Refund</text>
      <text x="40" y="38" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">Unused Gas</text>
    </g>
  </g>

  <!-- Step 4: Gas Price -->
  <g class="step" id="step4" data-narration="Gas price is the ETH amount per unit of gas - higher prices mean faster transaction processing.">
    <rect x="50" y="360" width="700" height="100" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="383" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff9800">4. GAS PRICE</text>
    <text x="70" y="408" font-family="Arial, sans-serif" font-size="11" fill="#333">
      <tspan x="70" dy="0">Gas Price = Amount of ETH paid per unit of gas</tspan>
      <tspan x="70" dy="18">Determines transaction priority in the network</tspan>
    </text>
    <g transform="translate(70, 425)">
      <rect x="0" y="0" width="180" height="25" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
      <text x="90" y="17" font-family="Arial, sans-serif" font-size="10" fill="#e65100" text-anchor="middle">Low Price = Slow</text>
    </g>
    <g transform="translate(270, 425)">
      <rect x="0" y="0" width="180" height="25" rx="4" fill="#ffcc80" stroke="#ff9800" stroke-width="1"/>
      <text x="90" y="17" font-family="Arial, sans-serif" font-size="10" fill="#e65100" text-anchor="middle">Medium Price = Normal</text>
    </g>
    <g transform="translate(470, 425)">
      <rect x="0" y="0" width="180" height="25" rx="4" fill="#ffb74d" stroke="#ff9800" stroke-width="1"/>
      <text x="90" y="17" font-family="Arial, sans-serif" font-size="10" fill="#e65100" text-anchor="middle">High Price = Fast</text>
    </g>
  </g>

  <!-- Step 5: Gas Limit -->
  <g class="step" id="step5" data-narration="Gas limit is the maximum gas users will spend - if exceeded, transaction fails and unused gas refunds.">
    <rect x="50" y="470" width="700" height="100" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="493" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9c27b0">5. GAS LIMIT</text>
    <text x="70" y="518" font-family="Arial, sans-serif" font-size="11" fill="#333">
      <tspan x="70" dy="0">Gas Limit = Maximum amount of gas for a transaction</tspan>
      <tspan x="70" dy="18">If execution exceeds limit, transaction REVERTS and refunds</tspan>
    </text>
    <g transform="translate(400, 510)">
      <rect x="0" y="0" width="120" height="50" rx="5" fill="#e1bee7" stroke="#9c27b0" stroke-width="2"/>
      <text x="60" y="20" font-family="Arial, sans-serif" font-size="9" fill="#7b1fa2" text-anchor="middle">Gas Limit</text>
      <text x="60" y="38" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9c27b0" text-anchor="middle">21K - 30M</text>
    </g>
    <g transform="translate(530, 520)">
      <path d="M0,30 L20,10 L20,25 L50,25 L50,35 L20,35 L20,50 Z" fill="#f44336"/>
      <text x="55" y="32" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Exceeds = FAIL</text>
    </g>
  </g>

  <!-- Step 6: Gas in Smart Contracts -->
  <g class="step" id="step6" data-narration="Smart contracts use gas for code execution - authors set limits, excess gas refunds on completion.">
    <rect x="50" y="580" width="700" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="603" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">6. GAS IN SMART CONTRACTS</text>
    <g transform="translate(70, 625)">
      <rect x="0" y="0" width="100" height="45" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
      <text x="50" y="18" font-family="Arial, sans-serif" font-size="9" fill="#0d47a1" text-anchor="middle">Smart Contract</text>
      <text x="50" y="35" font-family="Arial, sans-serif" font-size="10" fill="#1976d2" text-anchor="middle">Code Execution</text>
    </g>
    <path d="M180,647 L210,647" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
    <g transform="translate(220, 625)">
      <rect x="0" y="0" width="100" height="45" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
      <text x="50" y="18" font-family="Arial, sans-serif" font-size="9" fill="#0d47a1" text-anchor="middle">Gas Limit</text>
      <text x="50" y="35" font-family="Arial, sans-serif" font-size="10" fill="#1976d2" text-anchor="middle">Set by Author</text>
    </g>
    <path d="M330,647 L360,647" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
    <g transform="translate(370, 625)">
      <rect x="0" y="0" width="100" height="45" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
      <text x="50" y="18" font-family="Arial, sans-serif" font-size="9" fill="#0d47a1" text-anchor="middle">Refund</text>
      <text x="50" y="35" font-family="Arial, sans-serif" font-size="10" fill="#1976d2" text-anchor="middle">If Unused</text>
    </g>
  </g>

  <!-- Step 7: Example Calculation -->
  <g class="step" id="step7" data-narration="Example: 1000 gas limit minus 50 used equals 950 refunded. Total cost equals 50 times price in ETH.">
    <rect x="50" y="690" width="700" height="110" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="713" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#388e3c">7. EXAMPLE CALCULATION</text>
    <g transform="translate(80, 730)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">Contract requires: 100 units gas</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">User sets Gas Limit: 1000 units</text>
      <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">User sets Gas Price: 20 Gwei</text>
    </g>
    <g transform="translate(350, 730)">
      <rect x="0" y="0" width="280" height="60" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
      <text x="140" y="20" font-family="Arial, sans-serif" font-size="11" fill="#1b5e20" text-anchor="middle">Used: 100 gas x 20 Gwei = 2000 Gwei</text>
      <text x="140" y="40" font-family="Arial, sans-serif" font-size="11" fill="#1b5e20" text-anchor="middle">Refund: 900 gas x 20 Gwei = 18000 Gwei</text>
    </g>
    <text x="70" y="795" font-family="Arial, sans-serif" font-size="10" fill="#666">User only pays for gas actually used!</text>
  </g>

  <!-- Step 8: Gwei Unit -->
  <g class="step" id="step8" data-narration="Gwei is a smaller ETH denomination - 1 ETH equals 1 billion Gwei - commonly used for gas pricing.">
    <rect x="50" y="810" width="700" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="833" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff9800">8. GWEI - UNIT OF MEASUREMENT</text>
    <g transform="translate(80, 855)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#e65100">1 ETH = 1,000,000,000 Gwei (10 to the power of 9)</text>
    </g>
    <g transform="translate(400, 850)">
      <rect x="0" y="0" width="200" height="35" rx="5" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5"/>
      <text x="100" y="22" font-family="Arial, sans-serif" font-size="12" fill="#e65100" text-anchor="middle">1 Gwei = 0.000000001 ETH</text>
    </g>
  </g>

  <!-- Step 9: Gas Refunds -->
  <g class="step" id="step9" data-narration="Unspent gas is always refunded to users after transaction execution completes successfully.">
    <rect x="50" y="905" width="700" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="928" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#388e3c">9. GAS REFUNDS</text>
    <g transform="translate(100, 950)">
      <rect x="0" y="0" width="100" height="30" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
      <text x="50" y="20" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">Gas Limit - Used</text>
    </g>
    <text x="220" y="965" font-family="Arial, sans-serif" font-size="14" fill="#388e3c">-</text>
    <g transform="translate(250, 950)">
      <rect x="0" y="0" width="100" height="30" rx="4" fill="#a5d6a7" stroke="#388e3c" stroke-width="2"/>
      <text x="50" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1b5e20" text-anchor="middle">REFUNDED</text>
    </g>
    <text x="380" y="965" font-family="Arial, sans-serif" font-size="10" fill="#666">to users wallet</text>
  </g>

  <!-- Step 10: Key Formulas -->
  <g class="step" id="step10" data-narration="Key formulas: Total Cost equals gas used times gas price. Gas equals computational units, price equals ETH per unit.">
    <rect x="50" y="1000" width="700" height="95" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="1023" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">10. KEY FORMULAS</text>
    <g transform="translate(80, 1040)">
      <rect x="0" y="0" width="200" height="45" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
      <text x="100" y="18" font-family="Arial, sans-serif" font-size="11" fill="#0d47a1" text-anchor="middle">Total Cost</text>
      <text x="100" y="36" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Gas Used x Gas Price</text>
    </g>
    <g transform="translate(300, 1040)">
      <rect x="0" y="0" width="200" height="45" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
      <text x="100" y="18" font-family="Arial, sans-serif" font-size="11" fill="#0d47a1" text-anchor="middle">Refund</text>
      <text x="100" y="36" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Gas Limit - Gas Used</text>
    </g>
    <g transform="translate(520, 1040)">
      <rect x="0" y="0" width="180" height="45" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
      <text x="90" y="18" font-family="Arial, sans-serif" font-size="11" fill="#0d47a1" text-anchor="middle">1 ETH</text>
      <text x="90" y="36" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">= 10 to the 9 Gwei</text>
    </g>
  </g>

  <!-- Step 11: Summary -->
  <g class="step" id="step11" data-narration="Remember: Gas prevents DoS, has price and limit, refunds unused portion, and uses Gwei for small amounts.">
    <rect x="50" y="1105" width="700" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="1128" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9c27b0">11. SUMMARY</text>
    <g transform="translate(80, 1145)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#4a148c">Gas = computational effort unit</text>
      <text x="0" y="18" font-family="Arial, sans-serif" font-size="10" fill="#4a148c">Prevents DoS attacks on network</text>
      <text x="0" y="36" font-family="Arial, sans-serif" font-size="10" fill="#4a148c">Gas Price determines priority</text>
      <text x="280" y="0" font-family="Arial, sans-serif" font-size="10" fill="#4a148c">Gas Limit prevents excess usage</text>
      <text x="280" y="18" font-family="Arial, sans-serif" font-size="10" fill="#4a148c">Unused gas is refunded</text>
      <text x="280" y="36" font-family="Arial, sans-serif" font-size="10" fill="#4a148c">1 ETH = 1 billion Gwei</text>
    </g>
  </g>
</svg>