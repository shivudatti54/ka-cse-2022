<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1260">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffebee"/>
      <stop offset="100%" stop-color="#ffcdd2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fillIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; font-size: 22px; fill: #1565c0; }
    .subtitle-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; font-size: 14px; fill: #333; }
    .body-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #777; }
    .formula-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #d32f2f; font-weight: 600; }
    .animated-line {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: drawLine 1s ease-out forwards;
    }
  </style>

  <rect x="0" y="0" width="800" height="1260" fill="#f8f9fa"/>

  <!-- STEP 0: Title -->
  <g class="step" id="step0" data-narration="Ethereum is the world's leading programmable blockchain that powers DeFi, NFTs, and dApps.">
    <rect x="40" y="15" width="720" height="50" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="43" text-anchor="middle" class="title-text">Ethereum: The World Computer</text>
    <text x="400" y="58" text-anchor="middle" class="label-text">Module 4 - Elements of the Blockchain</text>
  </g>

  <!-- STEP 1: Why Ethereum Matters -->
  <g class="step" id="step1" data-narration="Ethereum enables decentralized finance, NFTs, and applications with programmable smart contracts.">
    <rect x="40" y="75" width="720" height="85" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="95" class="subtitle-text">Why Does Ethereum Matter?</text>
    <text x="60" y="115" class="body-text">Ethereum is the world's leading programmable blockchain, powering</text>
    <text x="60" y="130" class="body-text">DeFi protocols, NFTs, DAOs, and decentralized applications (dApps).</text>
    <text x="60" y="145" class="body-text">Unlike Bitcoin (digital money), Ethereum is a general-purpose platform.</text>
    <rect x="550" y="88" width="180" height="55" rx="8" fill="#388e3c" opacity="0.15"/>
    <text x="640" y="108" text-anchor="middle" class="subtitle-text" fill="#2e7d32">"World Computer"</text>
    <text x="640" y="125" text-anchor="middle" class="label-text" fill="#2e7d32">Programmable Blockchain</text>
  </g>

  <!-- STEP 2: Core Elements Overview -->
  <g class="step" id="step2" data-narration="Ethereum has four core pillars: Ether and Gas, Accounts, the EVM, and Smart Contracts.">
    <rect x="40" y="170" width="720" height="85" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="190" class="subtitle-text">Four Pillars of Ethereum</text>
    <!-- Pillar boxes -->
    <rect x="60" y="205" width="155" height="38" rx="6" fill="#ff9800" opacity="0.2"/>
    <text x="137" y="220" text-anchor="middle" class="body-text" font-weight="600">Ether and Gas</text>
    <text x="137" y="235" text-anchor="middle" class="label-text">Native currency</text>
    
    <rect x="225" y="205" width="155" height="38" rx="6" fill="#9c27b0" opacity="0.2"/>
    <text x="302" y="220" text-anchor="middle" class="body-text" font-weight="600">Accounts</text>
    <text x="302" y="235" text-anchor="middle" class="label-text">EOAs and Contracts</text>
    
    <rect x="390" y="205" width="155" height="38" rx="6" fill="#1976d2" opacity="0.2"/>
    <text x="467" y="220" text-anchor="middle" class="body-text" font-weight="600">EVM</text>
    <text x="467" y="235" text-anchor="middle" class="label-text">Virtual Machine</text>
    
    <rect x="555" y="205" width="155" height="38" rx="6" fill="#388e3c" opacity="0.2"/>
    <text x="632" y="220" text-anchor="middle" class="body-text" font-weight="600">Smart Contracts</text>
    <text x="632" y="235" text-anchor="middle" class="label-text">Self-executing code</text>
  </g>

  <!-- STEP 3: Ether and Gas -->
  <g class="step" id="step3" data-narration="ETH is the native cryptocurrency, while Gas measures computation costs on the EVM.">
    <rect x="40" y="265" width="720" height="95" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="285" class="subtitle-text">Ether (ETH) and Gas: The Fuel of Ethereum</text>
    <text x="60" y="305" class="body-text">- ETH is the native cryptocurrency used to pay fees and incentivize validators</text>
    <text x="60" y="320" class="body-text">- Gas is the cost of computation on the EVM (1 operation = 1+ gas units)</text>
    <text x="60" y="335" class="body-text">- Gas Price is your bid per unit (in Gwei = 10 to the power of -9 ETH), higher equals faster inclusion</text>
    <text x="60" y="350" class="body-text">- Gas Limit is the max gas you will spend (prevents runaway contracts)</text>
    <!-- Formula box -->
    <rect x="480" y="278" width="260" height="70" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="610" y="298" text-anchor="middle" class="formula-text">Transaction Fee</text>
    <line x1="490" y1="308" x2="730" y2="308" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
    <text x="610" y="328" text-anchor="middle" class="formula-text">21,000 gas times 50 Gwei</text>
    <text x="610" y="343" text-anchor="middle" class="formula-text">equals 1,050,000 Gwei equals 0.00105 ETH</text>
  </g>

  <!-- STEP 4: Account Model -->
  <g class="step" id="step4" data-narration="Ethereum uses an account-based model similar to bank accounts, unlike Bitcoin's UTXO system.">
    <rect x="40" y="370" width="720" height="95" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="390" class="subtitle-text">Account-Based Model vs UTXO</text>
    <!-- Bitcoin UTXO comparison -->
    <rect x="60" y="408" width="280" height="45" rx="6" fill="#f44336" opacity="0.15"/>
    <text x="70" y="424" class="body-text" font-weight="600" fill="#c62828">Bitcoin (UTXO)</text>
    <text x="70" y="440" class="label-text">Unspent Transaction Outputs</text>
    <text x="250" y="440" class="label-text">Multiple balances possible</text>
    <!-- Arrow -->
    <path d="M350 430 L380 430" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <!-- Ethereum Account -->
    <rect x="390" y="408" width="320" height="45" rx="6" fill="#9c27b0" opacity="0.2"/>
    <text x="400" y="424" class="body-text" font-weight="600" fill="#6a1b9a">Ethereum (Account Model)</text>
    <text x="400" y="440" class="label-text">Single balance per address, like a bank account</text>
  </g>

  <!-- STEP 5: Two Types of Accounts -->
  <g class="step" id="step5" data-narration="There are two account types: Externally Owned Accounts controlled by private keys, and Contract Accounts with code.">
    <rect x="40" y="475" width="720" height="95" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="495" class="subtitle-text">Two Types of Accounts</text>
    <!-- EOA -->
    <rect x="60" y="515" width="315" height="45" rx="8" fill="#388e3c" opacity="0.2"/>
    <text x="75" y="535" class="body-text" font-weight="700" fill="#2e7d32">Externally Owned Account (EOA)</text>
    <text x="75" y="552" class="label-text">Controlled by private key - Can send transactions - Holds ETH - Has no code</text>
    <!-- Contract Account -->
    <rect x="385" y="515" width="315" height="45" rx="8" fill="#1976d2" opacity="0.2"/>
    <text x="400" y="535" class="body-text" font-weight="700" fill="#1565c0">Contract Account (CA)</text>
    <text x="400" y="552" class="label-text">Controlled by code - Executes when triggered - Holds ETH - Has code and storage</text>
    <!-- Key insight -->
    <rect x="220" y="565" width="300" height="30" rx="6" fill="#ff9800" opacity="0.25"/>
    <text x="370" y="585" text-anchor="middle" class="label-text" font-weight="600">CAs cannot initiate transactions -- they only react!</text>
  </g>

  <!-- STEP 6: Account State -->
  <g class="step" id="step6" data-narration="Every Ethereum account maintains persistent state including balance, nonce, code hash, and storage root.">
    <rect x="40" y="580" width="720" height="95" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="60" y="600" class="subtitle-text">Every Account Has Persistent State</text>
    <!-- State components -->
    <rect x="60" y="620" width="160" height="45" rx="6" fill="#ff9800" opacity="0.2"/>
    <text x="140" y="638" text-anchor="middle" class="body-text" font-weight="600">Balance</text>
    <text x="140" y="656" text-anchor="middle" class="label-text">ETH owned</text>
    
    <rect x="230" y="620" width="160" height="45" rx="6" fill="#9c27b0" opacity="0.2"/>
    <text x="310" y="638" text-anchor="middle" class="body-text" font-weight="600">Nonce</text>
    <text x="310" y="656" text-anchor="middle" class="label-text">Transaction count</text>
    
    <rect x="400" y="620" width="160" height="45" rx="6" fill="#1976d2" opacity="0.2"/>
    <text x="480" y="638" text-anchor="middle" class="body-text" font-weight="600">Code Hash</text>
    <text x="480" y="656" text-anchor="middle" class="label-text">CAs only</text>
    
    <rect x="570" y="620" width="160" height="45" rx="6" fill="#388e3c" opacity="0.2"/>
    <text x="650" y="638" text-anchor="middle" class="body-text" font-weight="600">Storage Root</text>
    <text x="650" y="656" text-anchor="middle" class="label-text">CAs only</text>
  </g>

  <!-- STEP 7: The Ethereum Virtual Machine -->
  <g class="step" id="step7" data-narration="The EVM is a decentralized Turing-complete virtual machine that executes smart contract bytecode on every node.">
    <rect x="40" y="685" width="720" height="95" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="705" class="subtitle-text">The EVM: Heart of Ethereum</text>
    <text x="60" y="725" class="body-text">The Ethereum Virtual Machine is a decentralized, Turing-complete</text>
    <text x="60" y="740" class="body-text">virtual machine running on every node. It executes smart contract bytecode.</text>
    <!-- Three properties -->
    <rect x="60" y="755" width="210" height="30" rx="6" fill="#1976d2" opacity="0.2"/>
    <text x="165" y="773" text-anchor="middle" class="body-text" font-weight="600">Isolated Sandbox</text>
    
    <rect x="280" y="755" width="210" height="30" rx="6" fill="#388e3c" opacity="0.2"/>
    <text x="385" y="773" text-anchor="middle" class="body-text" font-weight="600">Deterministic</text>
    
    <rect x="500" y="755" width="210" height="30" rx="6" fill="#ff9800" opacity="0.2"/>
    <text x="605" y="773" text-anchor="middle" class="body-text" font-weight="600">Stack-based 256-bit</text>
  </g>

  <!-- STEP 8: Smart Contracts -->
  <g class="step" id="step8" data-narration="Smart contracts are self-executing programs written in Solidity, compiled to bytecode, and deployed to the blockchain.">
    <rect x="40" y="790" width="720" height="95" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="60" y="810" class="subtitle-text">Smart Contracts: Self-Executing Programs</text>
    <text x="60" y="830" class="body-text">Written in Solidity or Vyper, compiled to EVM bytecode,</text>
    <text x="60" y="845" class="body-text">then deployed to the blockchain. They run exactly as programmed -- no censorship,</text>
    <text x="60" y="860" class="body-text">no downtime, no third-party interference.</text>
    <!-- Flow diagram -->
    <rect x="400" y="815" width="340" height="60" rx="8" fill="#ffffff" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="570" y="835" text-anchor="middle" class="body-text">Solidity Code - Compiler - Bytecode - EVM - Deployed</text>
    <text x="570" y="855" text-anchor="middle" class="label-text">Development Pipeline</text>
  </g>

  <!-- STEP 9: Block Structure -->
  <g class="step" id="step9" data-narration="Ethereum blocks contain a header with Merkle roots and a body with transactions and ommers.">
    <rect x="40" y="895" width="720" height="95" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="60" y="915" class="subtitle-text">Ethereum Block Structure</text>
    <!-- Header -->
    <rect x="60" y="935" width="680" height="45" rx="8" fill="#f44336" opacity="0.15"/>
    <text x="400" y="950" text-anchor="middle" class="body-text" font-weight="600">Block Header Fields</text>
    <text x="400" y="968" text-anchor="middle" class="label-text">Parent Hash - State Root - Tx Root - Receipts Root - Beneficiary - Difficulty - Number - Gas Limit - Timestamp - Nonce</text>
    <!-- Body -->
    <rect x="60" y="985" width="340" height="30" rx="6" fill="#1976d2" opacity="0.2"/>
    <text x="230" y="1005" text-anchor="middle" class="body-text">Block Body: Transactions and Ommers</text>
    
    <rect x="420" y="985" width="320" height="30" rx="6" fill="#388e3c" opacity="0.2"/>
    <text x="580" y="1005" text-anchor="middle" class="body-text">Three Merkle Tries in Header</text>
  </g>

  <!-- STEP 10: The Three Tries -->
  <g class="step" id="step10" data-narration="Ethereum uses three Merkle tries: State for account balances, Transactions for block data, and Receipts for execution logs.">
    <rect x="40" y="1000" width="720" height="95" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="60" y="1020" class="subtitle-text">The Three Tries: State, Transactions, Receipts</text>
    <!-- Three tries visualization -->
    <rect x="60" y="1040" width="200" height="45" rx="8" fill="#388e3c" opacity="0.25"/>
    <text x="160" y="1058" text-anchor="middle" class="body-text" font-weight="600">State Trie</text>
    <text x="160" y="1076" text-anchor="middle" class="label-text">All account balances</text>
    
    <rect x="270" y="1040" width="200" height="45" rx="8" fill="#1976d2" opacity="0.25"/>
    <text x="370" y="1058" text-anchor="middle" class="body-text" font-weight="600">Transactions Trie</text>
    <text x="370" y="1076" text-anchor="middle" class="label-text">Block transactions</text>
    
    <rect x="480" y="1040" width="200" height="45" rx="8" fill="#ff9800" opacity="0.25"/>
    <text x="580" y="1058" text-anchor="middle" class="body-text" font-weight="600">Receipts Trie</text>
    <text x="580" y="1076" text-anchor="middle" class="label-text">Execution results and logs</text>
    <!-- Connecting to header -->
    <line x1="400" y1="1035" x2="400" y2="1040" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="400" y="1030" text-anchor="middle" class="label-text">Stored as Merkle roots in block header</text>
  </g>

  <!-- STEP 11: Consensus -->
  <g class="step" id="step11" data-narration="Ethereum uses Proof of Stake consensus where validators stake 32 ETH to propose and attest blocks securely.">
    <rect x="40" y="1105" width="720" height="70" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="60" y="1125" class="subtitle-text">Consensus: Proof of Stake The Merge Upgrade</text>
    <text x="60" y="1145" class="body-text">Validators stake 32 ETH to propose and attest blocks. Casper FFG provides</text>
    <text x="60" y="1160" class="body-text">finality -- blocks become final after 2 epochs about 12 min with strong economic guarantees.</text>
    <rect x="550" y="1125" width="190" height="40" rx="8" fill="#1976d2" opacity="0.2"/>
    <text x="645" y="1145" text-anchor="middle" class="body-text" font-weight="600">No more PoW!</text>
    <text x="645" y="1160" text-anchor="middle" class="label-text">Energy efficient</text>
  </g>

  <!-- STEP 12: Summary -->
  <g class="step" id="step12" data-narration="Key takeaways: ETH powers the network, Gas fees meter computation, the Account model tracks state, the EVM executes bytecode.">
    <rect x="40" y="1185" width="720" height="65" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="400" y="1210" text-anchor="middle" class="subtitle-text">Key Takeaways</text>
    <text x="400" y="1230" text-anchor="middle" class="body-text">ETH powers the network - Gas fees meter computation - Account model tracks state - EVM executes bytecode - Smart contracts are immutable programs - Merkle tries enable verification</text>
  </g>
</svg>