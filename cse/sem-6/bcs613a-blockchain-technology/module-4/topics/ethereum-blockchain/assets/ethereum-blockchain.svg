<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <text x="400" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">The Ethereum Blockchain</text>
  
  <g id="step0" class="step" data-narration="Ethereum is a programmable blockchain that extends Bitcoin by supporting smart contracts and decentralized applications, using an account-based model instead of UTXOs.">
    <text x="400" y="52" text-anchor="middle" font-size="11" fill="#616161">Programmable blockchain with smart contracts | Account-based model</text>
  </g>
  
  <g id="step1" class="step" data-narration="Each Ethereum block has a header containing three Merkle roots: state root for account balances, transaction root for tx data, and receipt root for execution results.">
    <rect x="80" y="65" width="640" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Ethereum Block Header - Three Merkle Roots</text>
    <rect x="100" y="98" width="180" height="45" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="190" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">State Root</text>
    <text x="190" y="132" text-anchor="middle" font-size="8" fill="#555">Account balances</text>
    <rect x="310" y="98" width="180" height="45" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Transaction Root</text>
    <text x="400" y="132" text-anchor="middle" font-size="8" fill="#555">List of transactions</text>
    <rect x="520" y="98" width="180" height="45" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="610" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#7b1fa2">Receipt Root</text>
    <text x="610" y="132" text-anchor="middle" font-size="8" fill="#555">Execution receipts</text>
  </g>
  
  <g id="step2" class="step" data-narration="Bitcoin uses UTXO (unspent transaction outputs) - stateless model where coins pass through transactions. Ethereum uses accounts like bank accounts - stateful with balance tracking.">
    <text x="400" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Account Model vs UTXO Model</text>
    <rect x="60" y="185" width="320" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="220" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Bitcoin: UTXO Model</text>
    <text x="220" y="228" text-anchor="middle" font-size="9" fill="#555">Stateless | Unspent outputs | Complex signing</text>
    <rect x="420" y="185" width="320" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="630" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Ethereum: Account Model</text>
    <text x="630" y="228" text-anchor="middle" font-size="9" fill="#555">Stateful | Balance tracking | Simple signing</text>
  </g>
  
  <g id="step3" class="step" data-narration="When a transaction executes, it triggers a state transition in the EVM (Ethereum Virtual Machine). Gas measures computational work - complex operations cost more gas than simple transfers.">
    <text x="400" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">State Transition: Transaction Execution on EVM</text>
    <rect x="80" y="288" width="160" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="160" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Transaction</text>
    <text x="160" y="328" text-anchor="middle" font-size="8" fill="#555">sender, receiver, data</text>
    <line x1="240" y1="315" x2="280" y2="315" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="280" y="285" width="240" height="60" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="307" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Ethereum Virtual Machine</text>
    <text x="400" y="325" text-anchor="middle" font-size="8" fill="#555">Executes smart contract code</text>
    <text x="400" y="338" text-anchor="middle" font-size="7" fill="#555">Gas: computational effort unit</text>
    <line x1="520" y1="315" x2="560" y2="315" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="560" y="288" width="160" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="640" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">New State</text>
    <text x="640" y="328" text-anchor="middle" font-size="8" fill="#555">Updated balances</text>
  </g>
  
  <g id="step4" class="step" data-narration="Smart contracts are self-executing programs stored on blockchain. They automatically execute when conditions are met, enabling trustless agreements without intermediaries like banks or lawyers.">
    <text x="400" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Smart Contracts: Self-Executing Code</text>
    <rect x="100" y="380" width="600" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="#7b1fa2">IF conditions met THEN execute automatically - no intermediary needed</text>
    <text x="400" y="418" text-anchor="middle" font-size="8" fill="#555">Example: Escrow holds funds until seller delivers proof, then releases payment automatically</text>
  </g>
  
  <g id="step5" class="step" data-narration="Ethereum transitioned from Proof-of-Work (miners solving puzzles) to Proof-of-Stake in 2022. Validators stake 32 ETH and are chosen to propose blocks based on stake amount.">
    <text x="400" y="448" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Consensus: Proof-of-Stake (The Merge - Sept 2022)</text>
    <rect x="100" y="463" width="280" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="240" y="482" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Proof-of-Work (Old)</text>
    <text x="240" y="500" text-anchor="middle" font-size="8" fill="#555">Miners compete | High energy | 5 ETH reward</text>
    <rect x="420" y="463" width="280" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="560" y="482" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Proof-of-Stake (New)</text>
    <text x="560" y="500" text-anchor="middle" font-size="8" fill="#555">Validators stake 32 ETH | Energy efficient</text>
  </g>
  
  <g id="step6" class="step" data-narration="Ethereum blocks also contain uncle (ommer) blocks - valid blocks that didn't make the main chain. They receive partial rewards (7/8) to compensate for network delays and reduce centralization.">
    <rect x="80" y="535" width="640" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="555" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Uncle Blocks: Valid blocks not on main chain receive 7/8 reward - reduces centralization pressure</text>
  </g>
</svg>