<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#627eea" />
      <stop offset="100%" stop-color="#3c3c3d" />
    </linearGradient>
    <linearGradient id="etcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3c3c3d" />
      <stop offset="100%" stop-color="#628eae" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step1" data-narration="In this lesson, we explore Ether (ETH) as the fuel of Ethereum, and Ethereum Classic (ETC), the original chain that preserved the unaltered blockchain after the famous DAO hack of 2016.">
    <text x="400" y="40" font-size="22" font-weight="bold" fill="#1976d2" text-anchor="middle">Ether (ETH) and Ethereum Classic (ETC)</text>
    <text x="400" y="65" font-size="14" fill="#666" text-anchor="middle">Understanding the two currencies in the Ethereum ecosystem</text>
    <line x1="50" y1="80" x2="750" y2="80" stroke="#e0e0e0" stroke-width="1"/>
  </g>
  
  <g id="step2" data-narration="Ether (ETH) is the native cryptocurrency of Ethereum. ETH has denominations like wei (smallest), gwei (for gas prices), and finney. One ETH equals 10^18 wei, enabling precise transaction pricing.">
    <rect x="50" y="100" width="180" height="70" fill="url(#ethGrad)" rx="8"/>
    <text x="140" y="130" font-size="20" font-weight="bold" fill="white" text-anchor="middle">ETHER (ETH)</text>
    <text x="140" y="150" font-size="12" fill="#e0e0e0" text-anchor="middle">Native Token</text>
    <rect x="250" y="110" width="150" height="50" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="325" y="130" font-size="14" fill="#1976d2" text-anchor="middle">1 ETH = 10^18 wei</text>
    <text x="325" y="148" font-size="11" fill="#666" text-anchor="middle">Base denomination</text>
    <rect x="420" y="110" width="150" height="50" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="495" y="130" font-size="14" fill="#1976d2" text-anchor="middle">1 gwei = 10^9 wei</text>
    <text x="495" y="148" font-size="11" fill="#666" text-anchor="middle">For gas prices</text>
    <rect x="590" y="110" width="150" height="50" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="665" y="130" font-size="14" fill="#1976d2" text-anchor="middle">1 finney = 10^15 wei</text>
    <text x="665" y="148" font-size="11" fill="#666" text-anchor="middle">Larger unit</text>
  </g>
  
  <g id="step3" data-narration="ETH serves as gas to power the network. Every operation like transactions and smart contracts costs gas. Total fee equals gas used multiplied by gas price, preventing spam and allocating resources fairly.">
    <rect x="50" y="185" width="180" height="70" fill="#ff9800" rx="8"/>
    <text x="140" y="215" font-size="18" font-weight="bold" fill="white" text-anchor="middle">GAS</text>
    <text x="140" y="235" font-size="12" fill="#fff3e0" text-anchor="middle">Network Fuel</text>
    <text x="260" y="205" font-size="14" fill="#333">Transaction Fee =</text>
    <text x="260" y="225" font-size="14" fill="#333">Gas Used × Gas Price</text>
    <rect x="400" y="195" width="100" height="50" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="450" y="220" font-size="14" fill="#ff9800" text-anchor="middle">Prevents Spam</text>
    <rect x="520" y="195" width="100" height="50" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="570" y="220" font-size="14" fill="#ff9800" text-anchor="middle">Fair Resource Allocation</text>
    <rect x="640" y="195" width="120" height="50" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="700" y="220" font-size="14" fill="#ff9800" text-anchor="middle">Prices in Gwei</text>
  </g>
  
  <g id="step4" data-narration="In 2016, The DAO was hacked due to a smart contract vulnerability, stealing about 3.6 million ETH. The community voted to hard fork and reverse the theft, creating a major philosophical divide in the blockchain world.">
    <rect x="50" y="270" width="120" height="70" fill="#f44336" rx="8"/>
    <text x="110" y="300" font-size="16" font-weight="bold" fill="white" text-anchor="middle">THE DAO</text>
    <text x="110" y="320" font-size="11" fill="#ffcdd2" text-anchor="middle">HACK (2016)</text>
    <text x="200" y="295" font-size="14" fill="#333">~3.6 million ETH</text>
    <text x="200" y="315" font-size="12" fill="#666">stolen via vulnerability</text>
    <path d="M 300 305 L 360 305" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="370" y="275" width="180" height="60" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="460" y="300" font-size="14" fill="#1976d2" text-anchor="middle">Community Vote</text>
    <text x="460" y="318" font-size="12" fill="#666" text-anchor="middle">Hard Fork Decision</text>
    <rect x="570" y="270" width="180" height="70" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="660" y="300" font-size="14" fill="#388e3c" text-anchor="middle">ETH</text>
    <text x="660" y="318" font-size="11" fill="#666" text-anchor="middle">Forked (Hack Reversed)</text>
    <rect x="570" y="345" width="180" height="70" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="660" y="375" font-size="14" fill="#9c27b0" text-anchor="middle">ETC</text>
    <text x="660" y="393" font-size="11" fill="#666" text-anchor="middle">Original Chain Preserved</text>
  </g>
  
  <g id="step5" data-narration="ETH took the forked path and adopted Proof-of-Stake, while ETC kept the original chain with Proof-of-Work. ETC supporters believed in code is law, saying blockchain should never be changed, even after a hack.">
    <text x="400" y="435" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">THE DIVIDE: Philosophy and Technology</text>
    <rect x="50" y="455" width="330" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="215" y="480" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">ETHEREUM (ETH)</text>
    <text x="215" y="500" font-size="12" fill="#333" text-anchor="middle">Pragmatic • Adaptable Governance</text>
    <text x="215" y="515" font-size="12" fill="#666" text-anchor="middle">Proof-of-Stake (PoS) Consensus</text>
    <rect x="420" y="455" width="330" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="585" y="480" font-size="16" font-weight="bold" fill="#9c27b0" text-anchor="middle">ETHEREUM CLASSIC (ETC)</text>
    <text x="585" y="500" font-size="12" fill="#333" text-anchor="middle">Code is Law • Immutability First</text>
    <text x="585" y="515" font-size="12" fill="#666" text-anchor="middle">Proof-of-Work (PoW) Consensus</text>
  </g>
  
  <g id="step6" data-narration="Staking lets ETH holders become validators and secure the network. By locking ETH, validators propose and attest to blocks, earning rewards in return. This replaced energy-heavy mining with a more efficient system.">
    <rect x="50" y="550" width="340" height="40" fill="#1976d2" rx="5"/>
    <text x="220" y="572" font-size="14" fill="white" text-anchor="middle">ETH STAKING → Network Security + New ETH Issuance</text>
    <rect x="420" y="550" width="340" height="40" fill="#9c27b0" rx="5"/>
    <text x="590" y="572" font-size="14" fill="white" text-anchor="middle">ETC MINING → PoW Continues (Smaller Ecosystem)</text>
  </g>
</svg>