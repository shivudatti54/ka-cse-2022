<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Ethereum Clients and Releases</text>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  
  <g id="step0" class="step" data-narration="Ethereum clients are software that implements the Ethereum protocol, allowing devices to join the network as nodes and participate in transaction validation and block creation.">
    <text x="400" y="55" text-anchor="middle" font-size="12" fill="#616161">An Ethereum client is your gateway to the Ethereum network</text>
  </g>

  <g id="step1" class="step" data-narration="Execution Clients (formerly Eth1) handle transaction execution, smart contracts, and state management. They are essential for anyone running a full node on the network.">
    <text x="400" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Execution Layer Clients (Transaction Execution)</text>
    <rect x="35" y="100" width="175" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="122" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Geth (Go-Ethereum)</text>
    <text x="122" y="140" text-anchor="middle" font-size="9" fill="#333">Most popular</text>
    <rect x="225" y="100" width="175" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="312" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Nethermind</text>
    <text x="312" y="140" text-anchor="middle" font-size="9" fill="#333">High performance (.NET)</text>
    <rect x="415" y="100" width="175" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="502" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Besu</text>
    <text x="502" y="140" text-anchor="middle" font-size="9" fill="#333">Enterprise friendly (Java)</text>
    <rect x="605" y="100" width="160" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="685" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Erigon</text>
    <text x="685" y="140" text-anchor="middle" font-size="9" fill="#333">Fast sync (Go)</text>
  </g>

  <g id="step2" class="step" data-narration="Consensus Clients (formerly Eth2) manage Proof-of-Stake consensus after The Merge. They handle the beacon chain, validator attestations, and block proposals for the network.">
    <text x="400" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Consensus Layer Clients (Proof-of-Stake)</text>
    <rect x="35" y="195" width="175" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="122" y="217" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">Prysm</text>
    <text x="122" y="235" text-anchor="middle" font-size="9" fill="#333">Most used validator client</text>
    <rect x="225" y="195" width="175" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="312" y="217" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Lighthouse</text>
    <text x="312" y="235" text-anchor="middle" font-size="9" fill="#333">Rust, high performance</text>
    <rect x="415" y="195" width="175" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="502" y="217" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Teku</text>
    <text x="502" y="235" text-anchor="middle" font-size="9" fill="#333">Enterprise staking (Java)</text>
    <rect x="605" y="195" width="160" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="685" y="217" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Nimbus</text>
    <text x="685" y="235" text-anchor="middle" font-size="9" fill="#333">Lightweight (Nim)</text>
  </g>

  <g id="step3" class="step" data-narration="To run a validator node after The Merge, you must run BOTH an execution client AND a consensus client together in parallel for the network to function properly.">
    <text x="400" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Post-Merge: Client Pairing Required</text>
    <rect x="80" y="295" width="310" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="235" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Execution Client</text>
    <text x="235" y="340" text-anchor="middle" font-size="10" fill="#333">Handles transactions &amp; EVM</text>
    <path d="M395 325 L435 325" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="450" y="295" width="310" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="605" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Consensus Client</text>
    <text x="605" y="340" text-anchor="middle" font-size="10" fill="#333">Handles PoS &amp; beacon chain</text>
    <text x="400" y="375" text-anchor="middle" font-size="10" fill="#616161">Validator Node = Execution + Consensus working together</text>
  </g>

  <g id="step4" class="step" data-narration="The Merge in September 2022 was the most significant upgrade, switching Ethereum from Proof-of-Work mining to Proof-of-Stake, reducing energy by ninety-nine percent.">
    <text x="400" y="400" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">The Merge (September 2022)</text>
    <rect x="100" y="420" width="600" height="45" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Proof-of-Work → Proof-of-Stake</text>
    <text x="400" y="462" text-anchor="middle" font-size="10" fill="#333">Energy reduced by ~99.95% | Original Mainnet merged with Beacon Chain</text>
  </g>

  <g id="step5" class="step" data-narration="Ethereum releases evolved from Frontier in 2015 through Homestead and Metropolis, reaching The Merge in 2022, with Shanghai enabling staked ETH withdrawals in 2023.">
    <text x="400" y="490" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Historical Releases Timeline</text>
    <rect x="35" y="508" width="140" height="38" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="105" y="530" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Frontier</text>
    <text x="105" y="542" text-anchor="middle" font-size="8" fill="#333">2015 - Initial launch</text>
    <rect x="190" y="508" width="140" height="38" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="260" y="530" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Homestead</text>
    <text x="260" y="542" text-anchor="middle" font-size="8" fill="#333">2016 - First production</text>
    <rect x="345" y="508" width="140" height="38" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="415" y="530" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Metropolis</text>
    <text x="415" y="542" text-anchor="middle" font-size="8" fill="#333">2017-19 - Precompiles</text>
    <rect x="500" y="508" width="140" height="38" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="570" y="530" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">The Merge</text>
    <text x="570" y="542" text-anchor="middle" font-size="8" fill="#333">2022 - PoS switch</text>
    <rect x="655" y="508" width="115" height="38" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="712" y="530" text-anchor="middle" font-size="10" font-weight="bold" fill="#f44336">Shanghai</text>
    <text x="712" y="542" text-anchor="middle" font-size="8" fill="#333">2023 - Withdrawals</text>
  </g>

  <g id="step6" class="step" data-narration="Multiple independent client implementations in different programming languages prevent single bugs from crashing the network, ensuring Ethereum stays resilient and decentralized.">
    <rect x="35" y="560" width="730" height="30" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="581" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Key Insight: Client Diversity = Network Security. One buggy client cannot take down Ethereum.</text>
  </g>
</svg>