<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#627eea" />
      <stop offset="100%" stop-color="#8c6cf6" />
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a237e">Ethereum 101</text>
  
  <g id="step0" class="step" data-narration="Ethereum is a decentralized, programmable blockchain platform that executes smart contracts. It serves as a world computer for building decentralized applications.">
    <text x="400" y="55" text-anchor="middle" font-size="14" fill="#5f6368">A Decentralized Application Platform</text>
    <rect x="250" y="65" width="300" height="8" rx="4" fill="url(#ethGrad)"/>
  </g>

  <g id="step1" class="step" data-narration="Ethereum has two account types: Externally Owned Accounts controlled by private keys, and Contract Accounts controlled by code with their own storage.">
    <text x="80" y="90" text-anchor="start" font-size="13" font-weight="bold" fill="#1976d2">ACCOUNTS</text>
    <rect x="50" y="105" width="340" height="70" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Externally Owned Account (EOA)</text>
    <text x="220" y="145" text-anchor="middle" font-size="10" fill="#455a64">Controlled by private key</text>
    <text x="220" y="160" text-anchor="middle" font-size="10" fill="#455a64">Can initiate transactions</text>
    <text x="220" y="172" text-anchor="middle" font-size="10" fill="#455a64">No code, no storage</text>
    
    <rect x="410" y="105" width="340" height="70" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="580" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Contract Account</text>
    <text x="580" y="145" text-anchor="middle" font-size="10" fill="#455a64">Controlled by contract code</text>
    <text x="580" y="160" text-anchor="middle" font-size="10" fill="#455a64">No private key</text>
    <text x="580" y="172" text-anchor="middle" font-size="10" fill="#455a64">Has bytecode and storage</text>
  </g>

  <g id="step2" class="step" data-narration="Every EVM operation costs gas, which prevents infinite loops and DoS attacks. Gas fee equals Gas Used multiplied by Gas Price in gwei.">
    <text x="80" y="195" text-anchor="start" font-size="13" font-weight="bold" fill="#388e3c">GAS SYSTEM</text>
    <rect x="50" y="210" width="220" height="65" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="160" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Gas Units (Limit)</text>
    <text x="160" y="250" text-anchor="middle" font-size="10" fill="#455a64">21,000 for simple transfer</text>
    <text x="160" y="262" text-anchor="middle" font-size="10" fill="#455a64">Higher for contract interactions</text>
    
    <rect x="290" y="210" width="220" height="65" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Gas Price</text>
    <text x="400" y="250" text-anchor="middle" font-size="10" fill="#455a64">Price per unit in gwei</text>
    <text x="400" y="262" text-anchor="middle" font-size="10" fill="#455a64">1 gwei = 10⁻⁹ ETH</text>
    
    <rect x="530" y="210" width="220" height="65" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="640" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Total Fee</text>
    <text x="640" y="250" text-anchor="middle" font-size="10" fill="#455a64">Gas Used × Gas Price</text>
    <text x="640" y="262" text-anchor="middle" font-size="10" fill="#455a64">Base fee + Priority fee</text>
  </g>

  <g id="step3" class="step" data-narration="The Ethereum Virtual Machine is a stack-based, sandboxed machine that executes smart contract bytecode deterministically on every node.">
    <text x="80" y="295" text-anchor="start" font-size="13" font-weight="bold" fill="#e65100">EVM EXECUTION</text>
    <rect x="50" y="310" width="160" height="50" fill="#fff3e0" rx="8"/>
    <text x="130" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Solidity Code</text>
    <text x="130" y="350" text-anchor="middle" font-size="9" fill="#5d4037">Smart contract</text>
    
    <line x1="210" y1="335" x2="240" y2="335" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowHead)"/>
    
    <rect x="250" y="310" width="160" height="50" fill="#ffebee" rx="8"/>
    <text x="330" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Bytecode</text>
    <text x="330" y="350" text-anchor="middle" font-size="9" fill="#5d4037">Compiled EVM opcodes</text>
    
    <line x1="410" y1="335" x2="440" y2="335" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowHead)"/>
    
    <rect x="450" y="310" width="160" height="50" fill="#e3f2fd" rx="8"/>
    <text x="530" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">EVM</text>
    <text x="530" y="350" text-anchor="middle" font-size="9" fill="#5d4037">Stack machine, sandboxed</text>
    
    <line x1="610" y1="335" x2="640" y2="335" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowHead)"/>
    
    <rect x="650" y="310" width="100" height="50" fill="#e8f5e9" rx="8"/>
    <text x="700" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">World State</text>
    <text x="700" y="350" text-anchor="middle" font-size="9" fill="#5d4037">Updated</text>
  </g>

  <g id="step4" class="step" data-narration="Ethereum uses Proof-of-Stake consensus. Validators stake 32 ETH to propose blocks and attest to validity. An epoch is 32 slots, each slot 12 seconds.">
    <text x="80" y="380" text-anchor="start" font-size="13" font-weight="bold" fill="#7b1fa2">PROOF-OF-STAKE</text>
    <rect x="50" y="395" width="240" height="55" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="170" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">Validators</text>
    <text x="170" y="432" text-anchor="middle" font-size="10" fill="#455a64">Stake 32 ETH to participate</text>
    <text x="170" y="444" text-anchor="middle" font-size="10" fill="#455a64">Propose and attest blocks</text>
    
    <rect x="310" y="395" width="200" height="55" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="410" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Slots &amp; Epochs</text>
    <text x="410" y="432" text-anchor="middle" font-size="10" fill="#455a64">Slot = 12 seconds</text>
    <text x="410" y="444" text-anchor="middle" font-size="10" fill="#455a64">Epoch = 32 slots (6.4 min)</text>
    
    <rect x="530" y="395" width="220" height="55" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="640" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Finality</text>
    <text x="640" y="432" text-anchor="middle" font-size="10" fill="#455a64">2/3 validators agree</text>
    <text x="640" y="444" text-anchor="middle" font-size="10" fill="#455a64">Cannot revert without slashing</text>
  </g>

  <g id="step5" class="step" data-narration="Ethereum transactions include nonce, gas limit, recipient, value, data, and ECDSA signature. Three types exist: value transfer, contract deployment, and contract interaction.">
    <text x="80" y="470" text-anchor="start" font-size="13" font-weight="bold" fill="#00838f">TRANSACTIONS</text>
    <rect x="50" y="485" width="155" height="50" fill="#e0f7fa" rx="8" stroke="#00838f" stroke-width="2"/>
    <text x="127" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">Value Transfer</text>
    <text x="127" y="522" text-anchor="middle" font-size="9" fill="#455a64">ETH from EOA to EOA</text>
    
    <rect x="220" y="485" width="155" height="50" fill="#e8eaf6" rx="8" stroke="#3f51b5" stroke-width="2"/>
    <text x="297" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a237e">Contract Deployment</text>
    <text x="297" y="522" text-anchor="middle" font-size="9" fill="#455a64">Send to zero-address</text>
    
    <rect x="390" y="485" width="155" height="50" fill="#fce4ec" rx="8" stroke="#c2185b" stroke-width="2"/>
    <text x="467" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#880e4f">Contract Call</text>
    <text x="467" y="522" text-anchor="middle" font-size="9" fill="#455a64">Execute contract function</text>
    
    <rect x="560" y="485" width="190" height="50" fill="#fff8e1" rx="8" stroke="#ffa000" stroke-width="2"/>
    <text x="655" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff6f00">Transaction Fields</text>
    <text x="655" y="522" text-anchor="middle" font-size="9" fill="#455a64">nonce, gasLimit, to, value, data, v/r/s</text>
  </g>

  <g id="step6" class="step" data-narration="Ethereum has multiple networks: Mainnet for real value, Testnets like Sepolia for testing, and local devnets for development.">
    <text x="80" y="555" text-anchor="start" font-size="13" font-weight="bold" fill="#37474f">ETHEREUM NETWORKS</text>
    <rect x="50" y="570" width="200" height="25" fill="#c8e6c9" rx="5"/>
    <text x="150" y="587" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">Mainnet</text>
    <text x="150" y="595" text-anchor="middle" font-size="9" fill="#2e7d32">Production blockchain</text>
    
    <rect x="270" y="570" width="200" height="25" fill="#bbdefb" rx="5"/>
    <text x="370" y="587" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d47a1">Testnets (Sepolia)</text>
    <text x="370" y="595" text-anchor="middle" font-size="9" fill="#1565c0">Testing without real value</text>
    
    <rect x="490" y="570" width="200" height="25" fill="#ffe0b2" rx="5"/>
    <text x="590" y="587" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Devnets / Local</text>
    <text x="590" y="595" text-anchor="middle" font-size="9" fill="#ef6c00">Local development</text>
  </g>
</svg>