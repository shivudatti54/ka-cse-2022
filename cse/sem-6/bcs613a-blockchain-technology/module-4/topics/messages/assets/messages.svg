<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
</marker>
<filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
<feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.2"/>
</filter>
</defs>

<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Welcome to this lesson on Messages in Ethereum. We'll explore how smart contracts communicate and exchange data on the blockchain securely.">
<rect x="200" y="10" width="400" height="40" rx="5" fill="#1976d2" filter="url(#shadow)"/>
<text x="400" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Messages in Ethereum</text>
</g>

<g class="step" id="step1" data-narration="Messages are data packets enabling communication between smart contracts and external entities on the Ethereum blockchain network for secure value transfer.">
<rect x="50" y="58" width="700" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
<text x="70" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">What are Messages?</text>
<text x="70" y="95" font-family="Arial" font-size="10" fill="#2e7d32">A message is a data packet sent from one entity to another on the blockchain.</text>
<text x="70" y="110" font-family="Arial" font-size="10" fill="#2e7d32">Messages allow smart contracts to exchange data, invoke functions, and transfer value.</text>
<text x="70" y="125" font-family="Arial" font-size="10" fill="#2e7d32">They are the foundation of communication in the Ethereum ecosystem.</text>
</g>

<g class="step" id="step2" data-narration="A message has five components: sender, recipient, value, data, and gas. Each field plays a specific role in blockchain communication.">
<rect x="50" y="146" width="700" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
<text x="70" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Structure of a Message</text>
<rect x="70" y="178" width="120" height="45" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
<text x="130" y="193" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">SENDER</text>
<text x="130" y="208" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Origin account</text>

<rect x="200" y="178" width="120" height="45" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
<text x="260" y="193" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">RECIPIENT</text>
<text x="260" y="208" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Destination</text>

<rect x="330" y="178" width="120" height="45" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
<text x="390" y="193" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">VALUE</text>
<text x="390" y="208" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">ETH transferred</text>

<rect x="460" y="178" width="120" height="45" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
<text x="520" y="193" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">DATA</text>
<text x="520" y="208" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Payload</text>

<rect x="590" y="178" width="120" height="45" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
<text x="650" y="193" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">GAS</text>
<text x="650" y="208" font-family="Arial" font-size="8" fill="#e65100" text-anchor="middle">Execution cost</text>
</g>

<g class="step" id="step3" data-narration="Ethereum has two message types: transaction messages for transferring Ether between accounts, and call messages for invoking smart contract functions.">
<rect x="50" y="239" width="700" height="90" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<text x="70" y="259" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2">Types of Messages</text>

<rect x="70" y="272" width="320" height="50" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
<text x="230" y="288" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Transaction Message</text>
<text x="230" y="305" font-family="Arial" font-size="9" fill="#6a1b9a" text-anchor="middle">Sends ETH from one account to another</text>
<text x="230" y="318" font-family="Arial" font-size="8" fill="#6a1b9a" text-anchor="middle">Fields: sender, recipient, value, gas</text>

<rect x="410" y="272" width="320" height="50" rx="3" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
<text x="570" y="288" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Call Message</text>
<text x="570" y="305" font-family="Arial" font-size="9" fill="#6a1b9a" text-anchor="middle">Invokes function on a smart contract</text>
<text x="570" y="318" font-family="Arial" font-size="8" fill="#6a1b9a" text-anchor="middle">Fields: sender, recipient, data, gas</text>
</g>

<g class="step" id="step4" data-narration="Message call transactions trigger the EVM to execute contract code. Gas must be sufficient or the message fails and gas is lost.">
<rect x="50" y="337" width="700" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
<text x="70" y="357" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Message Call Transaction &amp; Gas</text>

<rect x="70" y="370" width="300" height="45" rx="3" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
<text x="220" y="385" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1" text-anchor="middle">Message Call Transaction</text>
<text x="220" y="400" font-family="Arial" font-size="9" fill="#0d47a1" text-anchor="middle">EVM executes recipient contract code</text>
<text x="220" y="412" font-family="Arial" font-size="8" fill="#0d47a1" text-anchor="middle">Message data passed as input</text>

<rect x="390" y="370" width="340" height="45" rx="3" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
<text x="560" y="385" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1" text-anchor="middle">Gas and Messages</text>
<text x="560" y="400" font-family="Arial" font-size="9" fill="#0d47a1" text-anchor="middle">Sender must allocate sufficient gas for execution</text>
<text x="560" y="412" font-family="Arial" font-size="8" fill="#0d47a1" text-anchor="middle">Insufficient gas = message failure &amp; lost gas</text>
</g>

<g class="step" id="step5" data-narration="Use eth_sendTransaction with recipient address, data payload, and gas to send messages. Remember the five-message structure fields for your exams.">
<rect x="50" y="430" width="700" height="85" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
<text x="70" y="450" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Example &amp; Exam Tips</text>

<rect x="70" y="463" width="340" height="45" rx="3" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
<text x="240" y="478" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c" text-anchor="middle">Sending a Message</text>
<text x="240" y="492" font-family="Arial" font-size="9" fill="#b71c1c" text-anchor="middle">eth_sendTransaction with: recipient, data, gas</text>
<text x="240" y="504" font-family="Arial" font-size="8" fill="#b71c1c" text-anchor="middle">Example: contract with string payload</text>

<rect x="430" y="463" width="300" height="45" rx="3" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
<text x="580" y="478" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c" text-anchor="middle">Key Exam Points</text>
<text x="580" y="492" font-family="Arial" font-size="9" fill="#b71c1c" text-anchor="middle">1. Know message structure fields</text>
<text x="580" y="504" font-family="Arial" font-size="8" fill="#b71c1c" text-anchor="middle">2. Distinguish transaction vs call messages</text>
</g>
</svg>