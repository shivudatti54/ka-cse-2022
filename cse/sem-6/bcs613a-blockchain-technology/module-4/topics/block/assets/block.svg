<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>
<g class="step" id="step0" data-narration="A block in Ethereum is a collection of transactions that are verified and validated by the network, forming a fundamental component of the blockchain.">
<rect x="200" y="10" width="400" height="40" rx="5" fill="#1976d2"/>
<text x="400" y="37" text-anchor="middle" fill="white" font-family="Arial" font-size="16" font-weight="bold">What is a Block in Ethereum?</text>
</g>
<g class="step" id="step1" data-narration="A block contains multiple transactions that are verified and validated by the network, serving as a fundamental building block of the entire Ethereum blockchain.">
<rect x="40" y="58" width="720" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="60" y="78" fill="#1976d2" font-family="Arial" font-size="12" font-weight="bold">Block Definition</text>
<rect x="60" y="88" width="680" height="40" rx="3" fill="#ffffff" stroke="#bbdefb"/>
<text x="70" y="105" fill="#333" font-family="Arial" font-size="10">A block is a collection of</text>
<text x="70" y="120" fill="#333" font-family="Arial" font-size="10">transactions verified and validated</text>
<text x="220" y="120" fill="#1976d2" font-family="Arial" font-size="10" font-weight="bold">by the network</text>
</g>
<g class="step" id="step2" data-narration="The block header contains critical metadata such as block number, parent hash, timestamp, gas limit, gas used, difficulty, and the block hash.">
<rect x="40" y="146" width="720" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="60" y="166" fill="#388e3c" font-family="Arial" font-size="12" font-weight="bold">Block Header (Metadata)</text>
<rect x="60" y="176" width="130" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
<text x="70" y="190" fill="#333" font-family="Arial" font-size="9">Block Number</text>
<rect x="200" y="176" width="130" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
<text x="210" y="190" fill="#333" font-family="Arial" font-size="9">Parent Hash</text>
<rect x="340" y="176" width="130" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
<text x="350" y="190" fill="#333" font-family="Arial" font-size="9">Timestamp</text>
<rect x="480" y="176" width="130" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
<text x="490" y="190" fill="#333" font-family="Arial" font-size="9">Gas Limit</text>
<rect x="620" y="176" width="130" height="40" rx="3" fill="#ffffff" stroke="#c8e6c9"/>
<text x="630" y="190" fill="#333" font-family="Arial" font-size="9">Block Hash</text>
</g>
<g class="step" id="step3" data-narration="The transaction list contains transaction hashes while the block body holds actual transaction data including sender, recipient, value, and input data fields.">
<rect x="40" y="234" width="720" height="80" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="60" y="254" fill="#ff9800" font-family="Arial" font-size="12" font-weight="bold">Transaction List &amp; Block Body</text>
<rect x="60" y="264" width="330" height="40" rx="3" fill="#ffffff" stroke="#ffe0b2"/>
<text x="70" y="278" fill="#333" font-family="Arial" font-size="9">Transaction List:</text>
<text x="70" y="293" fill="#666" font-family="Arial" font-size="9">List of transaction hashes included</text>
<rect x="400" y="264" width="340" height="40" rx="3" fill="#ffffff" stroke="#ffe0b2"/>
<text x="410" y="278" fill="#333" font-family="Arial" font-size="9">Block Body:</text>
<text x="410" y="293" fill="#666" font-family="Arial" font-size="9">Sender, Recipient, Value, Data</text>
</g>
<g class="step" id="step4" data-narration="Miners create blocks by collecting unconfirmed transactions, verifying them, creating the new block, calculating the hash, and then broadcasting it to the network.">
<rect x="40" y="322" width="720" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="60" y="342" fill="#9c27b0" font-family="Arial" font-size="12" font-weight="bold">Block Creation Process</text>
<rect x="60" y="352" width="110" height="40" rx="3" fill="#ffffff" stroke="#e1bee7"/>
<text x="70" y="367" fill="#333" font-family="Arial" font-size="9">1. Collect</text>
<text x="70" y="382" fill="#666" font-family="Arial" font-size="8">Unconfirmed TX</text>
<line x1="170" y1="372" x2="185" y2="372" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="190" y="352" width="110" height="40" rx="3" fill="#ffffff" stroke="#e1bee7"/>
<text x="200" y="367" fill="#333" font-family="Arial" font-size="9">2. Verify</text>
<text x="200" y="382" fill="#666" font-family="Arial" font-size="8">Validate TX</text>
<line x1="300" y1="372" x2="315" y2="372" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="320" y="352" width="110" height="40" rx="3" fill="#ffffff" stroke="#e1bee7"/>
<text x="330" y="367" fill="#333" font-family="Arial" font-size="9">3. Create</text>
<text x="330" y="382" fill="#666" font-family="Arial" font-size="8">New Block</text>
<line x1="430" y1="372" x2="445" y2="372" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="450" y="352" width="110" height="40" rx="3" fill="#ffffff" stroke="#e1bee7"/>
<text x="460" y="367" fill="#333" font-family="Arial" font-size="9">4. Hash</text>
<text x="460" y="382" fill="#666" font-family="Arial" font-size="8">Calculate Header</text>
<line x1="560" y1="372" x2="575" y2="372" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="580" y="352" width="110" height="40" rx="3" fill="#ffffff" stroke="#e1bee7"/>
<text x="590" y="367" fill="#333" font-family="Arial" font-size="9">5. Broadcast</text>
<text x="590" y="382" fill="#666" font-family="Arial" font-size="8">to Network</text>
</g>
<g class="step" id="step5" data-narration="When a block is broadcast, other nodes validate it by checking the header format, verifying transaction validity, and confirming the block hash matches the header.">
<rect x="40" y="410" width="720" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="60" y="430" fill="#f44336" font-family="Arial" font-size="12" font-weight="bold">Block Validation</text>
<rect x="60" y="440" width="210" height="40" rx="3" fill="#ffffff" stroke="#ffcdd2"/>
<text x="70" y="455" fill="#333" font-family="Arial" font-size="9">Validate Block Header</text>
<text x="70" y="470" fill="#666" font-family="Arial" font-size="8">Correct format and metadata</text>
<rect x="280" y="440" width="210" height="40" rx="3" fill="#ffffff" stroke="#ffcdd2"/>
<text x="290" y="455" fill="#333" font-family="Arial" font-size="9">Validate Transactions</text>
<text x="290" y="470" fill="#666" font-family="Arial" font-size="8">Follow network rules</text>
<rect x="500" y="440" width="210" height="40" rx="3" fill="#ffffff" stroke="#ffcdd2"/>
<text x="510" y="455" fill="#333" font-family="Arial" font-size="9">Verify Block Hash</text>
<text x="510" y="470" fill="#666" font-family="Arial" font-size="8">Matches header hash</text>
</g>
<g class="step" id="step6" data-narration="Blocks form a chain linked by parent hashes, creating an immutable and unalterable record of all transactions. Miners create and validate blocks, forming the complete blockchain.">
<rect x="40" y="498" width="720" height="90" rx="5" fill="#e1bee7" stroke="#7b1fa2" stroke-width="2"/>
<text x="60" y="518" fill="#7b1fa2" font-family="Arial" font-size="12" font-weight="bold">Blockchain Connection &amp; Key Takeaways</text>
<rect x="60" y="528" width="130" height="50" rx="3" fill="#ffffff" stroke="#ce93d8"/>
<text x="70" y="543" fill="#333" font-family="Arial" font-size="9">Block N</text>
<line x1="125" y1="553" x2="145" y2="553" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="150" y="528" width="130" height="50" rx="3" fill="#ffffff" stroke="#ce93d8"/>
<text x="160" y="543" fill="#333" font-family="Arial" font-size="9">Block N+1</text>
<line x1="215" y1="553" x2="235" y2="553" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="240" y="528" width="130" height="50" rx="3" fill="#ffffff" stroke="#ce93d8"/>
<text x="250" y="543" fill="#333" font-family="Arial" font-size="9">Block N+2</text>
<text x="385" y="545" fill="#666" font-family="Arial" font-size="9">Linked by Parent Hash →</text>
<rect x="500" y="528" width="240" height="50" rx="3" fill="#fff8e1" stroke="#ffd54f"/>
<text x="510" y="545" fill="#333" font-family="Arial" font-size="9" font-weight="bold">Exam Tips:</text>
<text x="510" y="560" fill="#666" font-family="Arial" font-size="8">• Block = verified transactions</text>
<text x="510" y="573" fill="#666" font-family="Arial" font-size="8">• Header contains metadata</text>
</g>
</svg>