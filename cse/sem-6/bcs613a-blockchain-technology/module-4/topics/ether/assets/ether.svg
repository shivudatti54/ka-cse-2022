<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
<marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
</marker>
<marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
</marker>
<marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
</marker>
<marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa"/>

<g class="step" id="step0" data-narration="Ether is the native cryptocurrency of Ethereum, used for transaction fees, smart contracts, and network operations, and securing decentralized applications across the platform.">
<rect x="200" y="10" width="400" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="400" y="38" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2" text-anchor="middle">Ether (ETH)</text>
</g>

<g class="step" id="step1" data-narration="Ether is a decentralized digital currency not controlled by governments. It is created through mining and powers the Ethereum network as fuel.">
<rect x="20" y="58" width="760" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">What is Ether?</text>
<rect x="40" y="88" width="340" height="42" rx="3" fill="white" stroke="#1976d2" stroke-width="1"/>
<text x="50" y="102" font-family="Arial" font-size="10" fill="#333">Decentralized digital currency</text>
<text x="50" y="116" font-family="Arial" font-size="10" fill="#333">Created through mining</text>
<text x="50" y="128" font-family="Arial" font-size="10" fill="#333">Powers Ethereum network</text>
<line x1="400" y1="95" x2="500" y2="95" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
<circle cx="620" cy="98" r="25" fill="#1976d2"/>
<text x="620" y="94" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">ETH</text>
<text x="620" y="108" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Native</text>
<text x="620" y="120" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Token</text>
</g>

<g class="step" id="step2" data-narration="Ether has four key characteristics: decentralized (no central authority), digital form, limited supply of 100 million, and divisible into Wei units.">
<rect x="20" y="146" width="760" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
<text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Characteristics of Ether</text>
<rect x="40" y="176" width="170" height="44" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
<text x="50" y="190" font-family="Arial" font-size="9" fill="#333">Decentralized</text>
<text x="50" y="204" font-family="Arial" font-size="8" fill="#666">No central authority</text>
<text x="50" y="216" font-family="Arial" font-size="8" fill="#666">Censorship resistant</text>
<rect x="220" y="176" width="170" height="44" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
<text x="230" y="190" font-family="Arial" font-size="9" fill="#333">Digital</text>
<text x="230" y="204" font-family="Arial" font-size="8" fill="#666">Exists only digitally</text>
<text x="230" y="216" font-family="Arial" font-size="8" fill="#666">Easy transfer/storage</text>
<rect x="400" y="176" width="170" height="44" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
<text x="410" y="190" font-family="Arial" font-size="9" fill="#333">Limited Supply</text>
<text x="410" y="204" font-family="Arial" font-size="8" fill="#666">Capped at 100 million</text>
<text x="410" y="216" font-family="Arial" font-size="8" fill="#666">Scarce resource</text>
<rect x="580" y="176" width="190" height="44" rx="3" fill="white" stroke="#388e3c" stroke-width="1"/>
<text x="590" y="190" font-family="Arial" font-size="9" fill="#333">Divisible</text>
<text x="590" y="204" font-family="Arial" font-size="8" fill="#666">Smallest unit: Wei</text>
<text x="590" y="216" font-family="Arial" font-size="8" fill="#666">1 ETH = 10^18 Wei</text>
</g>

<g class="step" id="step3" data-narration="Ether has three main uses: paying transaction fees, purchasing computational services for smart contracts, and paying for data storage on the network.">
<rect x="20" y="234" width="760" height="89" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
<text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Uses of Ether</text>
<rect x="40" y="264" width="230" height="52" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
<text x="50" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Transaction Fees</text>
<text x="50" y="292" font-family="Arial" font-size="8" fill="#666">Pay for sending ETH</text>
<text x="50" y="304" font-family="Arial" font-size="8" fill="#666">Incentivizes miners</text>
<text x="50" y="316" font-family="Arial" font-size="8" fill="#666">Secures the network</text>
<rect x="285" y="264" width="230" height="52" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
<text x="295" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Computational Services</text>
<text x="295" y="292" font-family="Arial" font-size="8" fill="#666">Execute smart contracts</text>
<text x="295" y="304" font-family="Arial" font-size="8" fill="#666">Access dApps</text>
<text x="295" y="316" font-family="Arial" font-size="8" fill="#666">Run decentralized apps</text>
<rect x="530" y="264" width="240" height="52" rx="3" fill="white" stroke="#ff9800" stroke-width="1"/>
<text x="540" y="278" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Storage</text>
<text x="540" y="292" font-family="Arial" font-size="8" fill="#666">Store data on network</text>
<text x="540" y="304" font-family="Arial" font-size="8" fill="#666">State storage</text>
<text x="540" y="316" font-family="Arial" font-size="8" fill="#666">Persistent data</text>
</g>

<g class="step" id="step4" data-narration="In 2016, Ethereum hard-forked creating Ethereum Classic. ETH is the main chain with larger community, while ETC uses original rules with smaller support.">
<rect x="20" y="332" width="760" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
<text x="40" y="352" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Ether vs Ethereum Classic</text>
<rect x="40" y="362" width="340" height="44" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
<text x="50" y="376" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Ether (ETH)</text>
<text x="50" y="390" font-family="Arial" font-size="8" fill="#333">Main Ethereum chain post-2016 fork</text>
<text x="50" y="402" font-family="Arial" font-size="8" fill="#333">Larger community and support</text>
<rect x="400" y="362" width="340" height="44" rx="3" fill="white" stroke="#9c27b0" stroke-width="1"/>
<text x="410" y="376" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Ethereum Classic (ETC)</text>
<text x="410" y="390" font-family="Arial" font-size="8" fill="#333">Original chain, kept original rules</text>
<text x="410" y="402" font-family="Arial" font-size="8" fill="#333">Smaller community</text>
</g>

<g class="step" id="step5" data-narration="Gas measures computational effort for transactions on Ethereum. Ether pays for gas, with users setting gas price to prioritize their transactions.">
<rect x="20" y="420" width="760" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
<text x="40" y="440" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Gas and Ether</text>
<rect x="40" y="450" width="230" height="44" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
<text x="50" y="464" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Gas</text>
<text x="50" y="478" font-family="Arial" font-size="8" fill="#333">Unit of computational effort</text>
<text x="50" y="490" font-family="Arial" font-size="8" fill="#333">Needed for transactions</text>
<path d="M290,472 L330,472" stroke="#f44336" stroke-width="2" marker-end="url(#arrowRed)"/>
<circle cx="370" cy="472" r="30" fill="#f44336"/>
<text x="370" y="468" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Ether</text>
<text x="370" y="480" font-family="Arial" font-size="7" fill="white" text-anchor="middle">pays for</text>
<text x="370" y="492" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Gas</text>
<rect x="420" y="450" width="340" height="44" rx="3" fill="white" stroke="#f44336" stroke-width="1"/>
<text x="430" y="464" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">Gas Price</text>
<text x="430" y="478" font-family="Arial" font-size="8" fill="#333">Set by transaction sender</text>
<text x="430" y="490" font-family="Arial" font-size="8" fill="#333">Determines transaction priority</text>
</g>

<g class="step" id="step6" data-narration="Smart contracts are self-executing code programs stored on the Ethereum blockchain that automatically enforce rules and execute when predefined conditions are met.">
<rect x="20" y="508" width="760" height="85" rx="5" fill="#e0f7fa" stroke="#00838f" stroke-width="2"/>
<text x="40" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#00838f">Smart Contracts and Ether</text>
<rect x="40" y="538" width="220" height="50" rx="3" fill="white" stroke="#00838f" stroke-width="1"/>
<text x="50" y="552" font-family="Arial" font-size="9" font-weight="bold" fill="#00838f">Smart Contracts</text>
<text x="50" y="566" font-family="Arial" font-size="8" fill="#333">Self-executing code</text>
<text x="50" y="578" font-family="Arial" font-size="8" fill="#333">Automatic execution</text>
<path d="M280,563 L330,563" stroke="#00838f" stroke-width="2" marker-end="url(#arrowBlue)"/>
<circle cx="370" cy="563" r="25" fill="#00838f"/>
<text x="370" y="558" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">ETH</text>
<text x="370" y="570" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Fuel</text>
<rect x="420" y="538" width="340" height="50" rx="3" fill="white" stroke="#00838f" stroke-width="1"/>
<text x="430" y="552" font-family="Arial" font-size="9" font-weight="bold" fill="#00838f">Key Points</text>
<text x="430" y="566" font-family="Arial" font-size="8" fill="#333">Ether executes contracts</text>
<text x="430" y="578" font-family="Arial" font-size="8" fill="#333">Powers Ethereum ecosystem</text>
</g>
</svg>