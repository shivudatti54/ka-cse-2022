<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="ethGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#627eea" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8c6cf6" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step1" data-narration="Ethereum is a decentralized blockchain platform that enables smart contracts and decentralized applications. Founded by Vitalik Buterin in 2015, it extends blockchain beyond simple digital currency to a programmable world computer.">
    <text x="30" y="40" font-size="28" fill="#627eea" font-weight="bold">Introduction to Ethereum</text>
    <rect x="30" y="60" width="740" height="80" fill="#e3f2fd" rx="10" stroke="#1976d2" stroke-width="2"/>
    <text x="50" y="90" font-size="18" fill="#1565c0" font-weight="bold">What is Ethereum?</text>
    <text x="50" y="115" font-size="14" fill="#333">A decentralized blockchain platform for</text>
    <text x="50" y="132" font-size="14" fill="#333"><b>smart contracts</b> and <b>dApps</b></text>
    <circle cx="700" cy="100" r="25" fill="url(#ethGrad)"/>
    <text x="700" y="108" font-size="24" fill="white" font-weight="bold">E</text>
  </g>
  
  <g id="step2" data-narration="Ethereum differs from Bitcoin in key ways: Ethereum uses an account-based model with Turing-complete smart contracts, while Bitcoin uses UTXO with limited scripting. Ethereum's block time is 12 seconds versus Bitcoin's 10 minutes.">
    <text x="30" y="170" font-size="20" fill="#e65100" font-weight="bold">Ethereum vs Bitcoin</text>
    <rect x="30" y="185" width="340" height="120" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="45" y="210" font-size="16" fill="#e65100" font-weight="bold">Bitcoin</text>
    <text x="45" y="230" font-size="13" fill="#333">• Digital currency / store of value</text>
    <text x="45" y="248" font-size="13" fill="#333">• UTXO model</text>
    <text x="45" y="266" font-size="13" fill="#333">• Limited scripting</text>
    <text x="45" y="284" font-size="13" fill="#333">• ~10 min block time</text>
    
    <rect x="390" y="185" width="340" height="120" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="1"/>
    <text x="405" y="210" font-size="16" fill="#2e7d32" font-weight="bold">Ethereum</text>
    <text x="405" y="230" font-size="13" fill="#333">• Programmable blockchain</text>
    <text x="405" y="248" font-size="13" fill="#333">• Account-based model</text>
    <text x="405" y="266" font-size="13" fill="#333">• Turing-complete (Solidity)</text>
    <text x="405" y="284" font-size="13" fill="#333">• ~12 sec block time</text>
  </g>
  
  <g id="step3" data-narration="Ethereum has two account types: Externally Owned Accounts (EOAs) controlled by private keys, and Contract Accounts controlled by code. EOAs can send transactions while contracts execute when triggered.">
    <text x="30" y="330" font-size="20" fill="#7b1fa2" font-weight="bold">Ethereum Accounts</text>
    <rect x="30" y="345" width="240" height="110" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <text x="45" y="370" font-size="15" fill="#6a1b9a" font-weight="bold">EOA (Externally Owned)</text>
    <text x="45" y="392" font-size="12" fill="#333">• Controlled by private keys</text>
    <text x="45" y="408" font-size="12" fill="#333">• Initiates transactions</text>
    <text x="45" y="424" font-size="12" fill="#333">• Has address, balance, nonce</text>
    <rect x="45" y="435" width="30" height="10" fill="#9c27b0"/>
    
    <rect x="290" y="345" width="240" height="110" fill="#e1f5fe" rx="8" stroke="#0288d1" stroke-width="1"/>
    <text x="305" y="370" font-size="15" fill="#01579b" font-weight="bold">Contract Account</text>
    <text x="305" y="392" font-size="12" fill="#333">• Controlled by smart contract code</text>
    <text x="305" y="408" font-size="12" fill="#333">• Executes when triggered</text>
    <text x="305" y="424" font-size="12" fill="#333">• Has code and storage</text>
    <text x="305" y="440" font-size="12" fill="#333">• Address, balance, nonce, code</text>
    
    <line x1="270" y1="400" x2="290" y2="400" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="280" y="390" font-size="11" fill="#1976d2">sends tx</text>
  </g>
  
  <g id="step4" data-narration="The Ethereum Virtual Machine (EVM) is the runtime environment executing smart contracts. It is deterministic, sandboxed for security, stack-based, and uses gas to prevent infinite loops and measure computation costs.">
    <text x="520" y="330" font-size="20" fill="#c62828" font-weight="bold">Ethereum Virtual Machine</text>
    <rect x="520" y="345" width="250" height="110" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="1"/>
    <text x="535" y="370" font-size="15" fill="#c62828" font-weight="bold">EVM Properties</text>
    <text x="535" y="392" font-size="12" fill="#333">• Deterministic: same input = same output</text>
    <text x="535" y="408" font-size="12" fill="#333">• Sandboxed: isolated execution</text>
    <text x="535" y="424" font-size="12" fill="#333">• Stack-based architecture</text>
    <text x="535" y="440" font-size="12" fill="#333">• Gas-metered: prevents infinite loops</text>
    <rect x="535" y="445" width="30" height="10" fill="#f44336"/>
  </g>
  
  <g id="step5" data-narration="Gas is the unit of computational work on Ethereum. Every operation costs gas, preventing abuse. Users pay gas fees in ETH. 1 ETH equals 1 billion Gwei, and 1 Gwei equals 1 billion Wei.">
    <text x="30" y="480" font-size="20" fill="#00838f" font-weight="bold">Gas and Ether Denominations</text>
    <rect x="30" y="495" width="500" height="80" fill="#e0f7fa" rx="8" stroke="#00acc1" stroke-width="1"/>
    <text x="45" y="520" font-size="14" fill="#006064" font-weight="bold">Gas: computational unit that prevents infinite loops</text>
    <text x="45" y="542" font-size="12" fill="#333">• Gas limit = max computational work</text>
    <text x="45" y="560" font-size="12" fill="#333">• Gas price = fee per unit of gas</text>
    <text x="250" y="560" font-size="12" fill="#333">• Unused gas refunded</text>
    
    <rect x="550" y="495" width="220" height="80" fill="#fff8e1" rx="8" stroke="#ffa000" stroke-width="1"/>
    <text x="565" y="520" font-size="14" fill="#ff6f00" font-weight="bold">Ether Denominations</text>
    <text x="565" y="540" font-size="11" fill="#333">1 ETH = 1,000,000,000 Gwei</text>
    <text x="565" y="555" font-size="11" fill="#333">1 Gwei = 1,000,000,000 Wei</text>
  </g>
  
  <g id="step6" data-narration="Ethereum's key milestones: launched in 2015, The DAO hack in 2016, Proof of Stake Beacon Chain in 2020, The Merge in 2022 transitioning from PoW to PoS, and Shanghai upgrade in 2023 enabling staked ETH withdrawals.">
    <text x="30" y="595" font-size="18" fill="#1565c0" font-weight="bold">Key Milestones</text>
    <rect x="30" y="605" width="730" height="50" fill="#e8eaf6" rx="8" stroke="#3f51b5" stroke-width="1"/>
    <text x="50" y="630" font-size="11" fill="#333">2015: Frontier launch</text>
    <text x="170" y="630" font-size="11" fill="#333">2016: The DAO hack</text>
    <text x="310" y="630" font-size="11" fill="#333">2020: Beacon Chain</text>
    <text x="440" y="630" font-size="11" fill="#333">2022: The Merge (PoW→PoS)</text>
    <text x="610" y="630" font-size="11" fill="#333">2023: Shanghai upgrade</text>
  </g>
</svg>