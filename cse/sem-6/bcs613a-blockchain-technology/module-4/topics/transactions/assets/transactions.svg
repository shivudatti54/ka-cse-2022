<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#ffb74d"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Ethereum Transactions</text>

  <g id="step1" class="step" data-narration="Ethereum uses an account-based model where each account holds a balance directly, unlike Bitcoin's UTXO model that tracks unspent transaction outputs.">
    <text x="400" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Ethereum Account Model</text>
    <rect x="40" y="85" width="340" height="70" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="210" y="105" text-anchor="middle" font-size="12" fill="#2e7d32">Single Account Balance</text>
    <text x="210" y="122" text-anchor="middle" font-size="11" fill="#388e3c">Stateful with storage</text>
    <text x="210" y="139" text-anchor="middle" font-size="11" fill="#388e3c">Supports smart contracts</text>
    <text x="400" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57c00">Bitcoin UTXO Model</text>
    <rect x="420" y="85" width="340" height="70" fill="#fff3e0" rx="8" stroke="#f57c00" stroke-width="2"/>
    <text x="590" y="105" text-anchor="middle" font-size="12" fill="#e65100">Unspent Outputs Sum</text>
    <text x="590" y="122" text-anchor="middle" font-size="11" fill="#f57c00">Stateless UTXOs only</text>
    <text x="590" y="139" text-anchor="middle" font-size="11" fill="#f57c00">Simple value transfers</text>
  </g>

  <g id="step2" class="step" data-narration="Two types of accounts exist: Externally Owned Accounts controlled by private keys that can send transactions, and Contract Accounts controlled by smart contract code.">
    <text x="400" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">Types of Ethereum Accounts</text>
    <rect x="40" y="190" width="340" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="210" y="212" text-anchor="middle" font-size="13" fill="#6a1b9a">Externally Owned Account (EOA)</text>
    <text x="210" y="230" text-anchor="middle" font-size="11" fill="#7b1fa2">Controlled by private key</text>
    <text x="210" y="246" text-anchor="middle" font-size="11" fill="#7b1fa2">Has balance, can send transactions</text>
    <rect x="420" y="190" width="340" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="590" y="212" text-anchor="middle" font-size="13" fill="#1565c0">Contract Account</text>
    <text x="590" y="230" text-anchor="middle" font-size="11" fill="#1976d2">Controlled by smart contract code</text>
    <text x="590" y="246" text-anchor="middle" font-size="11" fill="#1976d2">Has balance, code, and storage</text>
  </g>

  <g id="step3" class="step" data-narration="An Ethereum transaction contains these fields: nonce for ordering, gas price and limit for fees, recipient address, value in ETH, optional data for contracts, and v r s signature.">
    <text x="400" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Transaction Structure</text>
    <rect x="50" y="310" width="130" height="55" fill="url(#blueGrad)" rx="6"/>
    <text x="115" y="332" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Nonce</text>
    <text x="115" y="350" text-anchor="middle" font-size="10" fill="white">Transaction count</text>
    <rect x="190" y="310" width="130" height="55" fill="url(#orangeGrad)" rx="6"/>
    <text x="255" y="332" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Gas Price</text>
    <text x="255" y="350" text-anchor="middle" font-size="10" fill="white">Wei per gas unit</text>
    <rect x="330" y="310" width="130" height="55" fill="url(#greenGrad)" rx="6"/>
    <text x="395" y="332" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Gas Limit</text>
    <text x="395" y="350" text-anchor="middle" font-size="10" fill="white">Max gas allowed</text>
    <rect x="470" y="310" width="130" height="55" fill="url(#blueGrad)" rx="6"/>
    <text x="535" y="332" text-anchor="middle" font-size="11" fill="white" font-weight="bold">To Address</text>
    <text x="535" y="350" text-anchor="middle" font-size="10" fill="white">Recipient (20 bytes)</text>
    <rect x="610" y="310" width="130" height="55" fill="url(#orangeGrad)" rx="6"/>
    <text x="675" y="332" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Value</text>
    <text x="675" y="350" text-anchor="middle" font-size="10" fill="white">ETH amount</text>
    <rect x="200" y="375" width="180" height="55" fill="url(#greenGrad)" rx="6"/>
    <text x="290" y="397" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Data (Input)</text>
    <text x="290" y="415" text-anchor="middle" font-size="10" fill="white">Contract call or bytecode</text>
    <rect x="400" y="375" width="180" height="55" fill="url(#blueGrad)" rx="6"/>
    <text x="490" y="397" text-anchor="middle" font-size="11" fill="white" font-weight="bold">v, r, s Signature</text>
    <text x="490" y="415" text-anchor="middle" font-size="10" fill="white">Cryptographic proof</text>
  </g>

  <g id="step4" class="step" data-narration="Three transaction types exist on Ethereum: simple ETH transfer to another account, contract deployment creating new smart contracts, and contract interaction calling functions.">
    <text x="400" y="455" text-anchor="middle" font-size="13" font-weight="bold" fill="#00796b">Transaction Types</text>
    <rect x="60" y="470" width="210" height="70" fill="#e0f2f1" rx="8" stroke="#00796b" stroke-width="2"/>
    <text x="165" y="492" text-anchor="middle" font-size="12" fill="#004d40" font-weight="bold">ETH Transfer</text>
    <text x="165" y="510" text-anchor="middle" font-size="10" fill="#00796b">Send ETH between accounts</text>
    <text x="165" y="525" text-anchor="middle" font-size="10" fill="#00796b">Gas: 21,000 units</text>
    <rect x="295" y="470" width="210" height="70" fill="#e8eaf6" rx="8" stroke="#303f9f" stroke-width="2"/>
    <text x="400" y="492" text-anchor="middle" font-size="12" fill="#1a237e" font-weight="bold">Contract Deployment</text>
    <text x="400" y="510" text-anchor="middle" font-size="10" fill="#303f9f">Deploy new smart contract</text>
    <text x="400" y="525" text-anchor="middle" font-size="10" fill="#303f9f">Gas: 100,000+ units</text>
    <rect x="530" y="470" width="210" height="70" fill="#fce4ec" rx="8" stroke="#c2185b" stroke-width="2"/>
    <text x="635" y="492" text-anchor="middle" font-size="12" fill="#880e4f" font-weight="bold">Contract Interaction</text>
    <text x="635" y="510" text-anchor="middle" font-size="10" fill="#c2185b">Call smart contract function</text>
    <text x="635" y="525" text-anchor="middle" font-size="10" fill="#c2185b">Data contains function call</text>
  </g>

  <g id="step5" class="step" data-narration="Gas is the computational unit on Ethereum preventing infinite loops. Legacy transactions use gas price while EIP-1559 separates base fee (burned) from priority fee to validators.">
    <text x="400" y="565" text-anchor="middle" font-size="13" font-weight="bold" fill="#ef6c00">Gas Mechanics and Fee Calculation</text>
    <rect x="50" y="545" width="345" height="45" fill="#fff8e1" rx="6" stroke="#ffa000" stroke-width="2"/>
    <text x="222" y="562" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">Legacy (Pre-EIP-1559)</text>
    <text x="222" y="578" text-anchor="middle" font-size="10" fill="#f57c00">Fee = Gas Used × Gas Price</text>
    <rect x="405" y="545" width="345" height="45" fill="#e8f5e9" rx="6" stroke="#43a047" stroke-width="2"/>
    <text x="577" y="562" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">EIP-1559 (Post-London)</text>
    <text x="577" y="578" text-anchor="middle" font-size="10" fill="#388e3c">Fee = Gas × (Base Fee + Priority Fee)</text>
  </g>
</svg>