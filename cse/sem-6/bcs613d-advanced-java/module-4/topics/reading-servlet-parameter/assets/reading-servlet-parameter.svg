<svg viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes codeReveal {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .draw-line { stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawLine 1s ease-out forwards; }
    .code-line { opacity: 0; animation: codeReveal 0.3s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1200" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome! In this lecture, we'll learn how to read servlet parameters from URLs to build dynamic web applications.">
    <rect x="0" y="0" width="800" height="55" fill="url(#titleGrad)"/>
    <text x="400" y="38" font-family="Segoe UI, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Reading Servlet Parameters</text>
    <circle cx="80" cy="28" r="18" fill="white" opacity="0.2">
      <animate attributeName="r" values="18;22;18" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="80" y="34" font-family="Segoe UI" font-size="20" fill="white" text-anchor="middle">📋</text>
  </g>

  <!-- Step 1: What are Servlet Parameters -->
  <g class="step" id="step1" data-narration="Servlet parameters are data passed from client to server through URLs. They're key-value pairs that enable dynamic content generation.">
    <rect x="30" y="65" width="740" height="90" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="90" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#1976d2">What are Servlet Parameters?</text>
    <text x="50" y="115" font-family="Segoe UI" font-size="11" fill="#424242">• Data passed from client to server via URL</text>
    <text x="50" y="132" font-family="Segoe UI" font-size="11" fill="#424242">• Key-value pairs in query string (?name=value)</text>
    <text x="300" y="132" font-family="Segoe UI" font-size="11" fill="#424242">• Also called query/URL parameters</text>
    <rect x="620" y="82" width="130" height="55" rx="8" fill="#1976d2" opacity="0.1"/>
    <text x="685" y="105" font-family="Segoe UI" font-size="11" fill="#1976d2" text-anchor="middle">Request</text>
    <text x="685" y="125" font-family="Segoe UI" font-size="11" fill="#1976d2" text-anchor="middle">Data Flow</text>
  </g>

  <!-- Step 2: URL with Parameters Visual -->
  <g class="step" id="step2" data-narration="Here's a real URL example. After the question mark, we see 'name=John' and 'age=25' - these are our servlet parameters.">
    <rect x="30" y="170" width="740" height="90" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="50" y="195" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#e65100">URL Structure with Parameters</text>
    
    <!-- URL visualization -->
    <rect x="50" y="210" width="700" height="35" rx="5" fill="#263238" filter="url(#shadow)"/>
    <text x="65" y="233" font-family="Consolas, monospace" font-size="12" fill="#81d4fa">http://example.com/</text>
    <text x="230" y="233" font-family="Consolas, monospace" font-size="12" fill="#a5d6a7">servlet</text>
    <text x="310" y="233" font-family="Consolas, monospace" font-size="12" fill="#ffcc80">?</text>
    <text x="325" y="233" font-family="Consolas, monospace" font-size="12" fill="#ffab91">name</text>
    <text x="370" y="233" font-family="Consolas, monospace" font-size="12" fill="#fff">=</text>
    <text x="385" y="233" font-family="Consolas, monospace" font-size="12" fill="#80deea">John</text>
    <text x="435" y="233" font-family="Consolas, monospace" font-size="12" fill="#ffcc80">&amp;</text>
    <text x="455" y="233" font-family="Consolas" font-size="12" fill="#ffab91">age</text>
    <text x="485" y="233" font-family="Consolas, monospace" font-size="12" fill="#fff">=</text>
    <text x="500" y="233" font-family="Consolas, monospace" font-size="12" fill="#80deea">25</text>
    
    <!-- Labels -->
    <rect x="80" y="252" width="80" height="20" rx="3" fill="#ffcc80" opacity="0.8"/>
    <text x="120" y="266" font-family="Segoe UI" font-size="9" fill="#e65100" text-anchor="middle">Query String</text>
  </g>

  <!-- Step 3: HttpServletRequest Core -->
  <g class="step" id="step3" data-narration="The HttpServletRequest object contains all parameter data. Use getParameter() method to extract values by their name.">
    <rect x="30" y="275" width="740" height="95" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="50" y="300" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#7b1fa2">HttpServletRequest &amp; getParameter()</text>
    
    <!-- Flow diagram -->
    <rect x="50" y="315" width="180" height="40" rx="6" fill="#7b1fa2" opacity="0.2"/>
    <text x="140" y="335" font-family="Segoe UI" font-size="11" fill="#7b1fa2" text-anchor="middle">HttpServletRequest</text>
    <text x="140" y="350" font-family="Segoe UI" font-size="10" fill="#7b1fa2" text-anchor="middle">req</text>
    
    <!-- Arrow -->
    <path d="M240 335 L290 335" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowBlue)" class="draw-line"/>
    
    <!-- Method box -->
    <rect x="300" y="310" width="200" height="50" rx="8" fill="#1976d2" filter="url(#shadow)"/>
    <text x="400" y="332" font-family="Consolas, monospace" font-size="12" fill="white" text-anchor="middle">getParameter("name")</text>
    <text x="400" y="350" font-family="Segoe UI" font-size="10" fill="#e3f2fd" text-anchor="middle">→ returns "John"</text>
    
    <!-- Arrow -->
    <path d="M510 335 L560 335" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowGreen)"/>
    
    <!-- Result -->
    <rect x="570" y="315" width="180" height="40" rx="6" fill="#388e3c" opacity="0.2"/>
    <text x="660" y="335" font-family="Segoe UI" font-size="11" fill="#388e3c" text-anchor="middle">Parameter Value</text>
    <text x="660" y="350" font-family="Consolas, monospace" font-size="10" fill="#388e3c" text-anchor="middle">"John"</text>
  </g>

  <!-- Step 4: Basic Code Example -->
  <g class="step" id="step4" data-narration="Here's the complete code pattern. Import HttpServletRequest, then call req.getParameter with the parameter name as argument.">
    <rect x="30" y="385" width="740" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="410" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#2e7d32">Basic Code Example</text>
    
    <!-- Code block -->
    <rect x="50" y="425" width="700" height="50" rx="5" fill="#263238"/>
    <text x="65" y="445" font-family="Consolas, monospace" font-size="11" fill="#a5d6a7">@Override</text>
    <text x="150" y="445" font-family="Consolas, monospace" font-size="11" fill="#ffcc80">protected void doGet</text>
    <text x="290" y="445" font-family="Consolas, monospace" font-size="11" fill="#fff">(HttpServletRequest req,</text>
    <text x="65" y="463" font-family="Consolas, monospace" font-size="11" fill="#fff">&nbsp;&nbsp;&nbsp;&nbsp;HttpServletResponse resp)</text>
    <text x="250" y="463" font-family="Consolas, monospace" font-size="11" fill="#80deea">{</text>
    
    <rect x="50" y="475" width="700" height="25" rx="5" fill="#263238"/>
    <text x="65" y="490" font-family="Consolas, monospace" font-size="11" fill="#fff">&nbsp;&nbsp;&nbsp;&nbsp;String name = </text>
    <text x="210" y="490" font-family="Consolas, monospace" font-size="11" fill="#ffab91">req.getParameter</text>
    <text x="340" y="490" font-family="Consolas, monospace" font-size="11" fill="#80deea">("name");</text>
    <text x="440" y="490" font-family="Consolas, monospace" font-size="10" fill="#78909c">// Gets "John"</text>
  </g>

  <!-- Step 5: Multiple Parameters -->
  <g class="step" id="step5" data-narration="Need multiple parameters? Just call getParameter() multiple times with different names to extract each value from the request.">
    <rect x="30" y="500" width="740" height="95" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="525" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#1976d2">Handling Multiple Parameters</text>
    
    <!-- Two parameter cards -->
    <rect x="50" y="545" width="220" height="35" rx="6" fill="#1976d2" opacity="0.15"/>
    <text x="160" y="565" font-family="Consolas, monospace" font-size="12" fill="#1976d2" text-anchor="middle">req.getParameter("name")</text>
    <text x="160" y="578" font-family="Segoe UI" font-size="10" fill="#1976d2" text-anchor="middle">→ "John"</text>
    
    <rect x="290" y="545" width="220" height="35" rx="6" fill="#1976d2" opacity="0.15"/>
    <text x="400" y="565" font-family="Consolas, monospace" font-size="12" fill="#1976d2" text-anchor="middle">req.getParameter("age")</text>
    <text x="400" y="578" font-family="Segoe UI" font-size="10" fill="#1976d2" text-anchor="middle">→ "25"</text>
    
    <!-- Code display -->
    <rect x="530" y="545" width="220" height="35" rx="6" fill="#388e3c" opacity="0.2"/>
    <text x="640" y="567" font-family="Consolas, monospace" font-size="10" fill="#2e7d32" text-anchor="middle">String name = req.getParameter("name");</text>
    <text x="640" y="580" font-family="Consolas, monospace" font-size="10" fill="#2e7d32" text-anchor="middle">String age = req.getParameter("age");</text>
  </g>

  <!-- Step 6: Data Type Conversion -->
  <g class="step" id="step6" data-narration="getParameter() always returns String. Use Integer.parseInt() for numbers, Boolean.equals() for booleans, and other parsing methods.">
    <rect x="30" y="610" width="740" height="110" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="50" y="635" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#e65100">Handling Different Data Types</text>
    <text x="50" y="655" font-family="Segoe UI" font-size="11" fill="#424242">⚠️ getParameter() always returns String - convert as needed!</text>
    
    <!-- Conversion examples -->
    <rect x="50" y="670" width="230" height="40" rx="6" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="165" y="688" font-family="Consolas, monospace" font-size="10" fill="#e65100" text-anchor="middle">String → int</text>
    <text x="165" y="703" font-family="Consolas, monospace" font-size="10" fill="#1976d2" text-anchor="middle">Integer.parseInt(str)</text>
    
    <rect x="290" y="670" width="230" height="40" rx="6" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="405" y="688" font-family="Consolas, monospace" font-size="10" fill="#e65100" text-anchor="middle">String → boolean</text>
    <text x="405" y="703" font-family="Consolas, monospace" font-size="10" fill="#1976d2" text-anchor="middle">str.equals("true")</text>
    
    <rect x="530" y="670" width="230" height="40" rx="6" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="645" y="688" font-family="Consolas, monospace" font-size="10" fill="#e65100" text-anchor="middle">String → double</text>
    <text x="645" y="703" font-family="Consolas, monospace" font-size="10" fill="#1976d2" text-anchor="middle">Double.parseDouble(str)</text>
  </g>

  <!-- Step 7: More Methods -->
  <g class="step" id="step7" data-narration="Beyond getParameter(), use getParameterMap() for all parameters as a map, or getParameterNames() to iterate through all parameter names.">
    <rect x="30" y="735" width="740" height="95" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="50" y="760" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#7b1fa2">Other Useful Methods</text>
    
    <!-- Method cards -->
    <rect x="50" y="780" width="240" height="40" rx="8" fill="#9c27b0" opacity="0.2"/>
    <text x="170" y="798" font-family="Consolas, monospace" font-size="11" fill="#7b1fa2" text-anchor="middle">getParameterMap()</text>
    <text x="170" y="815" font-family="Segoe UI" font-size="10" fill="#7b1fa2" text-anchor="middle">Returns all params as Map</text>
    
    <rect x="310" y="780" width="240" height="40" rx="8" fill="#9c27b0" opacity="0.2"/>
    <text x="430" y="798" font-family="Consolas, monospace" font-size="11" fill="#7b1fa2" text-anchor="middle">getParameterNames()</text>
    <text x="430" y="815" font-family="Segoe UI" font-size="10" fill="#7b1fa2" text-anchor="middle">Returns Enumeration of names</text>
    
    <rect x="570" y="780" width="190" height="40" rx="8" fill="#9c27b0" opacity="0.2"/>
    <text x="665" y="798" font-family="Consolas, monospace" font-size="11" fill="#7b1fa2" text-anchor="middle">getParameterValues()</text>
    <text x="665" y="815" font-family="Segoe UI" font-size="10" fill="#7b1fa2" text-anchor="middle">For multi-value params</text>
  </g>

  <!-- Step 8: Null Handling -->
  <g class="step" id="step8" data-narration="Always check for null! If a parameter doesn't exist in the URL, getParameter() returns null, which can cause NullPointerExceptions.">
    <rect x="30" y="845" width="740" height="85" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="50" y="870" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#e65100">Important: Handle Null Values</text>
    
    <!-- Warning and code -->
    <circle cx="75" cy="905" r="18" fill="#f44336" opacity="0.2"/>
    <text x="75" y="910" font-family="Segoe UI" font-size="16" fill="#f44336" text-anchor="middle">!</text>
    
    <rect x="110" y="885" width="340" height="35" rx="5" fill="#263238"/>
    <text x="125" y="903" font-family="Consolas, monospace" font-size="11" fill="#fff">if (name != null) { </text>
    <text x="280" y="903" font-family="Consolas, monospace" font-size="11" fill="#ffab91">// Safe to use</text>
    <text x="125" y="918" font-family="Consolas, monospace" font-size="11" fill="#fff">&nbsp;&nbsp;&nbsp;&nbsp;// process name</text>
    <text x="355" y="918" font-family="Consolas, monospace" font-size="11" fill="#fff">}</text>
    
    <rect x="470" y="885" width="290" height="35" rx="5" fill="#c8e6c9"/>
    <text x="485" y="903" font-family="Segoe UI" font-size="10" fill="#2e7d32">Or use Optional or default value:</text>
    <text x="485" y="917" font-family="Consolas, monospace" font-size="10" fill="#2e7d32">String name = req.getParameter("name");</text>
    <text x="650" y="917" font-family="Consolas, monospace" font-size="10" fill="#2e7d32">== null ? "Guest" : ...</text>
  </g>

  <!-- Step 9: Real World Applications -->
  <g class="step" id="step9" data-narration="Servlet parameters are everywhere: login forms, search boxes, filters, pagination - anywhere users send data to your server.">
    <rect x="30" y="945" width="740" height="95" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="970" font-family="Segoe UI" font-size="14" font-weight="bold" fill="#1976d2">Real-World Applications</text>
    
    <!-- Application examples -->
    <rect x="50" y="985" width="170" height="45" rx="8" fill="#1976d2" opacity="0.15"/>
    <text x="135" y="1005" font-family="Segoe UI" font-size="11" fill="#1976d2" text-anchor="middle">🔐 Login Forms</text>
    <text x="135" y="1020" font-family="Segoe UI" font-size="10" fill="#1976d2" text-anchor="middle">user, password</text>
    
    <rect x="235" y="985" width="170" height="45" rx="8" fill="#388e3c" opacity="0.15"/>
    <text x="320" y="1005" font-family="Segoe UI" font-size="11" fill="#388e3c" text-anchor="middle">🔍 Search</text>
    <text x="320" y="1020" font-family="Segoe UI" font-size="10" fill="#388e3c" text-anchor="middle">query, filters</text>
    
    <rect x="420" y="985" width="170" height="45" rx="8" fill="#ff9800" opacity="0.15"/>
    <text x="505" y="1005" font-family="Segoe UI" font-size="11" fill="#e65100" text-anchor="middle">📄 Pagination</text>
    <text x="505" y="1020" font-family="Segoe UI" font-size="10" fill="#e65100" text-anchor="middle">page, limit</text>
    
    <rect x="605" y="985" width="155" height="45" rx="8" fill="#9c27b0" opacity="0.15"/>
    <text x="682" y="1005" font-family="Segoe UI" font-size="11" fill="#7b1fa2" text-anchor="middle">⚙️ Filters</text>
    <text x="682" y="1020" font-family="Segoe UI" font-size="10" fill="#7b1fa2" text-anchor="middle">category, sort</text>
  </g>

  <!-- Step 10: Summary -->
  <g class="step" id="step10" data-narration="To summarize: use HttpServletRequest.getParameter() to read URL parameters, always handle null values, and convert string values to needed data types.">
    <rect x="30" y="1055" width="740" height="90" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="1080" font-family="Segoe UI" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Key Takeaways</text>
    
    <text x="400" y="1105" font-family="Segoe UI" font-size="12" fill="#e3f2fd" text-anchor="middle">✓ HttpServletRequest.getParameter("name") reads parameters from URL</text>
    <text x="400" y="1125" font-family="Segoe UI" font-size="12" fill="#e3f2fd" text-anchor="middle">✓ Returns String - convert to needed types (int, boolean, etc.)</text>
    <text x="400" y="1145" font-family="Segoe UI" font-size="12" fill="#e3f2fd" text-anchor="middle">✓ Always check for null to avoid NullPointerException</text>
  </g>

  <!-- Navigation hint -->
  <g class="step" id="step11" opacity="0.6">
    <rect x="350" y="1160" width="100" height="25" rx="12" fill="#e0e0e0"/>
    <text x="400" y="1177" font-family="Segoe UI" font-size="10" fill="#757575" text-anchor="middle">10 Steps ▼</text>
  </g>
</svg>