<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Servlets">
    <text x="50" y="50" font-size="24" fill="#2563eb">Servlets</text>
    <text x="50" y="80" font-size="18" fill="#666">Java programs that run on a web server</text>
    <rect x="50" y="120" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="160" font-size="18" fill="#fff">Server-side technology</text>
  </g>
  <g id="step1" data-narration="Servlet Lifecycle">
    <use x="50" y="220" href="#step0" />
    <text x="50" y="200" font-size="24" fill="#2563eb">Servlet Lifecycle</text>
    <circle cx="150" cy="280" r="20" fill="#f59e0b" />
    <text x="120" y="290" font-size="18" fill="#666">init()</text>
    <circle cx="250" cy="280" r="20" fill="#f59e0b" />
    <text x="220" y="290" font-size="18" fill="#666">service()</text>
    <circle cx="350" cy="280" r="20" fill="#f59e0b" />
    <text x="320" y="290" font-size="18" fill="#666">destroy()</text>
    <path d="M 150 300 L 250 300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <path d="M 250 300 L 350 300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="init() Method">
    <use x="50" y="340" href="#step1" />
    <text x="50" y="320" font-size="24" fill="#2563eb">init() Method</text>
    <rect x="50" y="360" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="400" font-size="18" fill="#fff">Called once when the servlet is first loaded</text>
  </g>
  <g id="step3" data-narration="service() Method">
    <use x="50" y="460" href="#step2" />
    <text x="50" y="440" font-size="24" fill="#2563eb">service() Method</text>
    <rect x="50" y="480" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="520" font-size="18" fill="#fff">Called for each client request</text>
  </g>
  <g id="step4" data-narration="destroy() Method">
    <use x="50" y="580" href="#step3" />
    <text x="50" y="560" font-size="24" fill="#2563eb">destroy() Method</text>
    <rect x="50" y="600" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="640" font-size="18" fill="#fff">Called once when the servlet is being taken out of service</text>
  </g>
  <g id="step5" data-narration="Setting Up Tomcat Server">
    <use x="300" y="50" href="#step0" />
    <text x="300" y="30" font-size="24" fill="#2563eb">Setting Up Tomcat Server</text>
    <rect x="300" y="80" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="120" font-size="18" fill="#fff">Download Tomcat from Apache website</text>
    <rect x="300" y="160" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="200" font-size="18" fill="#fff">Set JAVA_HOME environment variable</text>
  </g>
  <g id="step6" data-narration="Tomcat Directory Structure">
    <use x="300" y="260" href="#step5" />
    <text x="300" y="240" font-size="24" fill="#2563eb">Tomcat Directory Structure</text>
    <rect x="300" y="280" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="320" font-size="18" fill="#fff">Extract Tomcat to desired directory</text>
    <rect x="300" y="360" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="400" font-size="18" fill="#fff">Configure CATALINA_HOME environment variable</text>
  </g>
  <g id="step7" data-narration="Starting Tomcat Server">
    <use x="300" y="440" href="#step6" />
    <text x="300" y="420" font-size="24" fill="#2563eb">Starting Tomcat Server</text>
    <rect x="300" y="460" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="500" font-size="18" fill="#fff">Start Tomcat using startup.bat (Windows) or startup.sh (Linux)</text>
  </g>
  <g id="step8" data-narration="Servlet Container">
    <use x="550" y="50" href="#step0" />
    <text x="550" y="30" font-size="24" fill="#2563eb">Servlet Container</text>
    <rect x="550" y="80" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="120" font-size="18" fill="#fff">Manages the lifecycle of servlets</text>
    <rect x="550" y="160" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="200" font-size="18" fill="#fff">Provides a platform-independent environment</text>
  </g>
  <g id="step9" data-narration="Servlet Request-Response Cycle">
    <use x="550" y="260" href="#step8" />
    <text x="550" y="240" font-size="24" fill="#2563eb">Servlet Request-Response Cycle</text>
    <rect x="550" y="280" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="320" font-size="18" fill="#fff">Client sends an HTTP request to the servlet container</text>
    <rect x="550" y="360" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="400" font-size="18" fill="#fff">Servlet container invokes the servlet's service() method</text>
  </g>
  <g id="step10" data-narration="Servlet Benefits">
    <use x="550" y="440" href="#step9" />
    <text x="550" y="420" font-size="24" fill="#2563eb">Servlet Benefits</text>
    <rect x="550" y="460" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="500" font-size="18" fill="#fff">Platform-independent</text>
    <rect x="550" y="540" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="580" font-size="18" fill="#fff">Efficient and scalable</text>
  </g>
  <animateTransform attributeName="transform" type="translate" from="0 0" to="0 600" dur="10s" repeatCount="indefinite" />
</svg>