<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g id="step0" class="step" data-narration="Java Servlets are server-side Java programs that handle HTTP requests and generate dynamic responses. They run inside a servlet container and provide a platform-independent way to build web applications.">
    <rect x="30" y="15" width="740" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="44" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Introducing Servlets - Features Overview</text>
  </g>

  <g id="step1" class="step" data-narration="At the center, a Java Servlet is a class extending HttpServlet. It sits between the web browser client and the backend database, processing requests and generating dynamic responses for each user.">
    <ellipse cx="400" cy="270" rx="100" ry="55" fill="#1976d2"/>
    <text x="400" y="260" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="white">Java</text>
    <text x="400" y="280" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="white">Servlet</text>
    <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#e3f2fd">extends HttpServlet</text>
  </g>

  <g id="step2" class="step" data-narration="Servlets are platform-independent because they run on the Java Virtual Machine. Write once and deploy on any operating system with a JVM. This eliminates CGI platform dependency issues.">
    <line x1="350" y1="220" x2="220" y2="130" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="100" y="80" width="165" height="65" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="182" y="100" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Platform Independent</text>
    <text x="182" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Runs on any JVM</text>
    <text x="182" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Write once, deploy anywhere</text>
  </g>

  <g id="step3" class="step" data-narration="Servlets are efficient and scalable because they use threads instead of processes. Multiple requests are handled concurrently with lightweight threads sharing the same JVM memory space.">
    <line x1="450" y1="220" x2="580" y2="130" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="530" y="80" width="165" height="65" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="612" y="100" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">High Performance</text>
    <text x="612" y="118" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Thread-based, not process</text>
    <text x="612" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Shared JVM memory</text>
  </g>

  <g id="step4" class="step" data-narration="The servlet lifecycle is managed by the container. The init method runs once at startup, service handles each request by delegating to doGet or doPost, and destroy cleans up on shutdown.">
    <line x1="310" y1="280" x2="170" y2="300" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="30" y="270" width="145" height="75" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="102" y="292" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Lifecycle Managed</text>
    <text x="102" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#9c27b0">init() - once</text>
    <text x="102" y="325" text-anchor="middle" font-family="monospace" font-size="9" fill="#9c27b0">service() - per req</text>
    <text x="102" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#9c27b0">destroy() - cleanup</text>
  </g>

  <g id="step5" class="step" data-narration="Servlets provide built-in session tracking through HttpSession, cookies, URL rewriting, and hidden form fields. This overcomes the stateless nature of HTTP for user authentication and shopping carts.">
    <line x1="490" y1="280" x2="630" y2="300" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="625" y="270" width="150" height="75" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="700" y="292" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Session Tracking</text>
    <text x="700" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">HttpSession API</text>
    <text x="700" y="325" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">Cookies, URL rewriting</text>
    <text x="700" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Overcomes HTTP stateless</text>
  </g>

  <g id="step6" class="step" data-narration="The Servlet API provides rich interfaces including ServletRequest, ServletResponse, HttpServlet, GenericServlet, and RequestDispatcher. Packages migrated from javax dot servlet to jakarta dot servlet.">
    <line x1="360" y1="320" x2="240" y2="400" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="100" y="380" width="185" height="75" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="192" y="400" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Rich API</text>
    <text x="192" y="418" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Servlet, GenericServlet</text>
    <text x="192" y="433" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">HttpServlet, Request</text>
    <text x="192" y="448" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">jakarta.servlet package</text>
  </g>

  <g id="step7" class="step" data-narration="Servlets support robust security with authentication, authorization, and encrypted communication. The web dot xml deployment descriptor configures URL mappings, session timeouts, and security constraints.">
    <line x1="440" y1="320" x2="560" y2="400" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="510" y="380" width="185" height="75" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="602" y="400" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Security and Config</text>
    <text x="602" y="418" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">web.xml deployment</text>
    <text x="602" y="433" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">@WebServlet annotation</text>
    <text x="602" y="448" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Authentication, HTTPS</text>
  </g>

  <g id="step8" class="step" data-narration="Compared to CGI, servlets are faster with threads instead of processes, use shared memory, are platform-independent, and provide built-in session management. Popular containers include Tomcat and Jetty.">
    <rect x="30" y="480" width="745" height="100" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="505" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Servlet vs CGI Comparison</text>
    <rect x="50" y="515" width="110" height="25" rx="4" fill="#388e3c"/>
    <text x="105" y="532" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Thread/request</text>
    <rect x="170" y="515" width="120" height="25" rx="4" fill="#388e3c"/>
    <text x="230" y="532" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Shared memory</text>
    <rect x="300" y="515" width="130" height="25" rx="4" fill="#388e3c"/>
    <text x="365" y="532" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Platform-independent</text>
    <rect x="440" y="515" width="130" height="25" rx="4" fill="#388e3c"/>
    <text x="505" y="532" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Session support</text>
    <rect x="580" y="515" width="110" height="25" rx="4" fill="#388e3c"/>
    <text x="635" y="532" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Highly scalable</text>
    <text x="400" y="562" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9800">Containers: Apache Tomcat | Jetty | GlassFish | WildFly</text>
  </g>
</svg>