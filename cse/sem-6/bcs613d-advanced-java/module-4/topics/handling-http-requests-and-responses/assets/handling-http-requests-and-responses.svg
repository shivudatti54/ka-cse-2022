<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g id="step0" class="step" data-narration="Handling HTTP requests and responses is central to servlet programming. The client sends requests with methods like GET and POST, and the servlet generates responses with status codes and HTML content.">
    <rect x="30" y="15" width="740" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="44" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">HTTP Request and Response Handling</text>
  </g>

  <g id="step1" class="step" data-narration="The client browser sends an HTTP request containing a method such as GET or POST, a URL, headers like Content-Type and Accept, and optionally a body for POST and PUT requests.">
    <rect x="30" y="75" width="220" height="200" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <rect x="70" y="85" width="140" height="25" rx="4" fill="#1976d2"/>
    <text x="140" y="102" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">HTTP Request</text>
    <rect x="50" y="120" width="180" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="134" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Method: GET / POST</text>
    <rect x="50" y="145" width="180" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="159" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">URL: /myservlet</text>
    <rect x="50" y="170" width="180" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="184" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Headers: Content-Type</text>
    <rect x="50" y="195" width="180" height="20" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="140" y="209" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Body: form data (POST)</text>
    <rect x="50" y="230" width="85" height="30" rx="5" fill="#1976d2"/>
    <text x="92" y="249" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Browser</text>
    <circle cx="160" y="245" r="16" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" cy="245"/>
    <text x="160" y="249" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Client</text>
  </g>

  <g id="step2" class="step" data-narration="The servlet container creates HttpServletRequest and HttpServletResponse objects. It examines the request method and calls doGet for GET requests or doPost for POST requests on the servlet.">
    <line x1="250" y1="130" x2="290" y2="130" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="250" y1="195" x2="290" y2="195" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="270" y="122" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">GET</text>
    <text x="270" y="190" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">POST</text>
    <rect x="295" y="75" width="210" height="200" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <rect x="335" y="85" width="130" height="25" rx="4" fill="#388e3c"/>
    <text x="400" y="102" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">Servlet Container</text>
    <rect x="315" y="120" width="170" height="22" rx="4" fill="#388e3c"/>
    <text x="400" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="white">HttpServletRequest req</text>
    <rect x="315" y="148" width="170" height="22" rx="4" fill="#388e3c"/>
    <text x="400" y="163" text-anchor="middle" font-family="Arial" font-size="10" fill="white">HttpServletResponse resp</text>
    <rect x="315" y="180" width="80" height="22" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="355" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#388e3c">doGet()</text>
    <rect x="405" y="180" width="80" height="22" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="445" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#388e3c">doPost()</text>
    <text x="400" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Routes by HTTP method</text>
    <text x="400" y="244" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">Creates req/resp objects</text>
    <text x="400" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">RequestDispatcher for forward/include</text>
  </g>

  <g id="step3" class="step" data-narration="The servlet processes the request by reading parameters with getParameter, validating input, performing business logic, and then setting the response status code, content type, and writing the body.">
    <line x1="505" y1="170" x2="543" y2="170" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="550" y="75" width="225" height="200" rx="12" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <rect x="598" y="85" width="130" height="25" rx="4" fill="#ff9800"/>
    <text x="663" y="102" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">Servlet Processing</text>
    <text x="663" y="125" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Read Request:</text>
    <text x="663" y="142" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff9800">req.getParameter("name")</text>
    <text x="663" y="157" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff9800">req.getMethod()</text>
    <text x="663" y="177" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Write Response:</text>
    <text x="663" y="194" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff9800">resp.setStatus(200)</text>
    <text x="663" y="209" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff9800">resp.setContentType()</text>
    <text x="663" y="224" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff9800">resp.getWriter().println()</text>
    <text x="663" y="245" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9800">Validates data, runs logic</text>
    <text x="663" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Generates dynamic HTML</text>
  </g>

  <g id="step4" class="step" data-narration="The HTTP response is sent back to the client containing a status code like 200 OK or 404 Not Found, response headers, and the body with HTML or JSON content for the browser to render.">
    <path d="M 663 280 L 663 310 L 140 310 L 140 330" fill="none" stroke="#f44336" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
    <rect x="30" y="335" width="745" height="80" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="358" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">HTTP Response Sent Back to Client</text>
    <rect x="50" y="370" width="120" height="30" rx="5" fill="#f44336"/>
    <text x="110" y="389" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Status: 200 OK</text>
    <rect x="180" y="370" width="140" height="30" rx="5" fill="#f44336"/>
    <text x="250" y="389" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Content-Type: text/html</text>
    <rect x="330" y="370" width="160" height="30" rx="5" fill="#f44336"/>
    <text x="410" y="389" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Body: Hello, World!</text>
    <rect x="500" y="370" width="120" height="30" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="560" y="389" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">404 Not Found</text>
    <rect x="630" y="370" width="120" height="30" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="690" y="389" text-anchor="middle" font-family="Arial" font-size="10" fill="#f44336">500 Server Error</text>
  </g>

  <g id="step5" class="step" data-narration="HTTP methods map to specific servlet methods. GET maps to doGet for retrieving data. POST maps to doPost for submitting data. PUT maps to doPut, DELETE to doDelete, and HEAD to doHead.">
    <rect x="30" y="430" width="370" height="150" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="215" y="455" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">HTTP Method to Servlet Mapping</text>
    <rect x="50" y="468" width="70" height="26" rx="4" fill="#9c27b0"/>
    <text x="85" y="485" text-anchor="middle" font-family="Arial" font-size="10" fill="white">GET</text>
    <line x1="120" y1="481" x2="155" y2="481" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="210" y="485" text-anchor="middle" font-family="monospace" font-size="10" fill="#9c27b0">doGet()</text>
    <text x="330" y="485" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Retrieve</text>
    <rect x="50" y="498" width="70" height="26" rx="4" fill="#9c27b0"/>
    <text x="85" y="515" text-anchor="middle" font-family="Arial" font-size="10" fill="white">POST</text>
    <line x1="120" y1="511" x2="155" y2="511" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="210" y="515" text-anchor="middle" font-family="monospace" font-size="10" fill="#9c27b0">doPost()</text>
    <text x="330" y="515" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Submit</text>
    <rect x="50" y="528" width="70" height="26" rx="4" fill="#9c27b0"/>
    <text x="85" y="545" text-anchor="middle" font-family="Arial" font-size="10" fill="white">PUT</text>
    <line x1="120" y1="541" x2="155" y2="541" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="210" y="545" text-anchor="middle" font-family="monospace" font-size="10" fill="#9c27b0">doPut()</text>
    <text x="330" y="545" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Update</text>
    <rect x="50" y="558" width="70" height="20" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="85" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">DELETE</text>
    <text x="210" y="572" text-anchor="middle" font-family="monospace" font-size="9" fill="#9c27b0">doDelete()</text>
    <text x="330" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Remove</text>
  </g>

  <g id="step6" class="step" data-narration="Best practices include always setting the response status code, using meaningful headers, handling exceptions properly, and using RequestDispatcher to forward or include content from other servlets or JSPs.">
    <rect x="420" y="430" width="355" height="150" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="597" y="455" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Best Practices</text>
    <circle cx="445" cy="480" r="8" fill="#388e3c"/>
    <text x="455" y="484" font-family="Arial" font-size="5" fill="white" text-anchor="middle">1</text>
    <text x="470" y="484" font-family="Arial" font-size="10" fill="#388e3c">Always set response status code</text>
    <circle cx="445" cy="505" r="8" fill="#388e3c"/>
    <text x="455" y="509" font-family="Arial" font-size="5" fill="white" text-anchor="middle">2</text>
    <text x="470" y="509" font-family="Arial" font-size="10" fill="#388e3c">Use meaningful response headers</text>
    <circle cx="445" cy="530" r="8" fill="#388e3c"/>
    <text x="455" y="534" font-family="Arial" font-size="5" fill="white" text-anchor="middle">3</text>
    <text x="470" y="534" font-family="Arial" font-size="10" fill="#388e3c">Handle exceptions properly</text>
    <circle cx="445" cy="555" r="8" fill="#388e3c"/>
    <text x="455" y="559" font-family="Arial" font-size="5" fill="white" text-anchor="middle">4</text>
    <text x="470" y="559" font-family="Arial" font-size="10" fill="#388e3c">Use RequestDispatcher for forwarding</text>
    <text x="597" y="578" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">forward() and include() methods</text>
  </g>
</svg>