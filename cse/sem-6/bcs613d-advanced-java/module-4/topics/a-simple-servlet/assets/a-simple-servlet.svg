<svg viewBox="0 0 800 1300" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
<stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
</linearGradient>
<linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#388e3c;stop-opacity:1" />
<stop offset="100%" style="stop-color:#66bb6a;stop-opacity:1" />
</linearGradient>
<linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
<stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1" />
</linearGradient>
<linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#7b1fa2;stop-opacity:1" />
<stop offset="100%" style="stop-color:#ba68c8;stop-opacity:1" />
</linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
</filter>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
<marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
</marker>
</defs>

<rect x="0" y="0" width="800" height="1300" fill="#f8f9fa"/>

<style>
@keyframes fadeInSlide {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
from { opacity: 0; transform: scale(0.85); }
to { opacity: 1; transform: scale(1); }
}
@keyframes textReveal {
from { opacity: 0; transform: translateX(-10px); }
to { opacity: 1; transform: translateX(0); }
}
@keyframes pulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.03); }
}
@keyframes drawLine {
from { stroke-dashoffset: 500; }
to { stroke-dashoffset: 0; }
}
@keyframes codeReveal {
from { opacity: 0; }
to { opacity: 1; }
}
.step { animation: fadeInSlide 0.6s ease-out; }
.step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
.step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
.code-line { opacity: 0; animation: codeReveal 0.3s ease-out forwards; }
</style>

<g class="step" id="step0" data-narration="Welcome to Java Servlets! Today we'll explore the foundation of Java web development.">
<rect x="50" y="10" width="700" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
<text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Understanding Java Servlets</text>
</g>

<g class="step" id="step1" data-narration="Servlets are Java classes that handle web requests dynamically, generating responses like HTML pages.">
<rect x="50" y="65" width="700" height="90" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="65" width="8" height="90" rx="4" fill="#1976d2"/>
<text x="70" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976d2">What are Servlets?</text>
<text x="70" y="110" font-family="Arial, sans-serif" font-size="11" fill="#333">Java classes that handle web requests and generate</text>
<text x="70" y="125" font-family="Arial, sans-serif" font-size="11" fill="#333">dynamic responses (HTML, JSON, etc.)</text>
<rect x="550" y="80" width="180" height="60" rx="8" fill="#e3f2fd"/>
<text x="640" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1976d2">Server-Side</text>
<text x="640" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1976d2">Java Component</text>
</g>

<g class="step" id="step2" data-narration="Servlets are the foundation of Java EE web apps, enabling frameworks like Spring MVC and RESTful APIs.">
<rect x="50" y="165" width="700" height="90" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="165" width="8" height="90" rx="4" fill="#ff9800"/>
<text x="70" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9800">Why Servlets Matter</text>
<text x="70" y="210" font-family="Arial, sans-serif" font-size="11" fill="#333">Foundation for Spring MVC, REST APIs, enterprise apps</text>
<text x="70" y="230" font-family="Arial, sans-serif" font-size="11" fill="#333">Handle request/response cycle - core to all web apps</text>
<g transform="translate(400, 185)">
<rect x="0" y="0" width="330" height="55" rx="6" fill="#fff3e0"/>
<text x="20" y="18" font-family="Arial, sans-serif" font-size="9" fill="#e65100">Spring MVC</text>
<line x1="90" y1="12" x2="110" y2="12" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
<text x="115" y="18" font-family="Arial, sans-serif" font-size="9" fill="#7b1fa2">JSP</text>
<line x1="155" y1="12" x2="175" y2="12" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
<text x="180" y="18" font-family="Arial, sans-serif" font-size="9" fill="#388e3c">REST APIs</text>
<line x1="230" y1="12" x2="250" y2="12" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
<text x="255" y="18" font-family="Arial, sans-serif" font-size="9" fill="#1976d2">E-commerce</text>
<text x="20" y="40" font-family="Arial, sans-serif" font-size="9" fill="#666">All built on Servlet API</text>
</g>
</g>

<g class="step" id="step3" data-narration="Every servlet extends HttpServlet class, which provides HTTP-specific functionality over the generic Servlet interface.">
<rect x="50" y="265" width="700" height="95" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="265" width="8" height="95" rx="4" fill="#388e3c"/>
<text x="70" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#388e3c">Basic Servlet Structure</text>
<rect x="70" y="300" width="660" height="45" rx="6" fill="#263238"/>
<text x="85" y="320" font-family="Consolas, monospace" font-size="10" fill="#4fc3f7">public class HelloWorldServlet extends HttpServlet {</text>
<text x="100" y="337" font-family="Consolas, monospace" font-size="10" fill="#aed581">// Servlet code here</text>
<text x="580" y="320" font-family="Arial, sans-serif" font-size="9" fill="#81c784">extends HttpServlet</text>
</g>

<g class="step" id="step4" data-narration="The doGet() method handles GET requests - typical for displaying pages. It's called when users visit a URL.">
<rect x="50" y="370" width="700" height="95" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="370" width="8" height="95" rx="4" fill="#7b1fa2"/>
<text x="70" y="390" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7b1fa2">The doGet() Method</text>
<rect x="70" y="405" width="660" height="45" rx="6" fill="#263238"/>
<text x="85" y="422" font-family="Consolas, monospace" font-size="10" fill="#4fc3f7">public void doGet(HttpServletRequest request,</text>
<text x="85" y="437" font-family="Consolas, monospace" font-size="10" fill="#4fc3f7">HttpServletResponse response) throws ServletException, IO</text>
<text x="580" y="390" font-family="Arial, sans-serif" font-size="9" fill="#ba68c8">Handles GET requests</text>
<text x="580" y="408" font-family="Arial, sans-serif" font-size="9" fill="#ba68c8">User visits URL</text>
</g>

<g class="step" id="step5" data-narration="HttpServletRequest contains client data like parameters and headers. HttpServletResponse is used to send data back to the client.">
<rect x="50" y="475" width="700" height="95" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="475" width="8" height="95" rx="4" fill="#1976d2"/>
<text x="70" y="495" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976d2">Request and Response Objects</text>
<rect x="70" y="515" width="310" height="40" rx="8" fill="#e3f2fd"/>
<text x="225" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1976d2" font-weight="bold">HttpServletRequest</text>
<text x="225" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1565c0">Client data, parameters, headers</text>
<line x1="390" y1="535" x2="420" y2="535" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="430" y="515" width="310" height="40" rx="8" fill="#e8f5e9"/>
<text x="585" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#388e3c" font-weight="bold">HttpServletResponse</text>
<text x="585" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32">Send response to client</text>
</g>

<g class="step" id="step6" data-narration="Always set content type BEFORE writing response. Common types: text/html, application/json, text/plain.">
<rect x="50" y="580" width="700" height="95" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="580" width="8" height="95" rx="4" fill="#f44336"/>
<text x="70" y="600" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f44336">Step 1: Set Content Type</text>
<rect x="70" y="615" width="660" height="45" rx="6" fill="#263238"/>
<text x="85" y="632" font-family="Consolas, monospace" font-size="10" fill="#4fc3f7">response.setContentType("text/html");</text>
<text x="85" y="650" font-family="Consolas, monospace" font-size="10" fill="#aed581">// Must set BEFORE getting Writer</text>
<rect x="520" y="620" width="190" height="35" rx="6" fill="#ffebee"/>
<text x="615" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Important: Order matters!</text>
</g>

<g class="step" id="step7" data-narration="Get PrintWriter using response.getWriter() to write the response body. This is your output stream to the client.">
<rect x="50" y="685" width="700" height="95" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="685" width="8" height="95" rx="4" fill="#ff9800"/>
<text x="70" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9800">Step 2: Get PrintWriter</text>
<rect x="70" y="720" width="660" height="45" rx="6" fill="#263238"/>
<text x="85" y="737" font-family="Consolas, monospace" font-size="10" fill="#4fc3f7">PrintWriter out = response.getWriter();</text>
<text x="85" y="755" font-family="Consolas, monospace" font-size="10" fill="#aed581">// Now out can write to client</text>
<rect x="520" y="725" width="190" height="35" rx="6" fill="#fff3e0"/>
<text x="615" y="745" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e65100">Returns PrintWriter object</text>
</g>

<g class="step" id="step8" data-narration="Use out.println() to write HTML. Each line becomes part of the response sent back to the browser.">
<rect x="50" y="790" width="700" height="110" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="790" width="8" height="110" rx="4" fill="#388e3c"/>
<text x="70" y="810" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#388e3c">Step 3: Write HTML Response</text>
<rect x="70" y="825" width="660" height="60" rx="6" fill="#263238"/>
<text x="85" y="842" font-family="Consolas, monospace" font-size="9" fill="#4fc3f7">out.println("&lt;html&gt;");</text>
<text x="85" y="857" font-family="Consolas, monospace" font-size="9" fill="#4fc3f7">out.println("&lt;body&gt;");</text>
<text x="85" y="872" font-family="Consolas, monospace" font-size="9" fill="#4fc3f7">out.println("&lt;h1&gt;Hello World!&lt;/h1&gt;");</text>
<text x="85" y="887" font-family="Consolas, monospace" font-size="9" fill="#4fc3f7">out.println("&lt;/body&gt;&lt;/html&gt;");</text>
</g>

<g class="step" id="step9" data-narration="Here's the complete HelloWorldServlet - a fully functional servlet that displays Hello World in the browser.">
<rect x="50" y="910" width="700" height="120" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="910" width="8" height="120" rx="4" fill="#7b1fa2"/>
<text x="70" y="930" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7b1fa2">Complete HelloWorldServlet</text>
<rect x="70" y="945" width="660" height="70" rx="6" fill="#263238"/>
<text x="80" y="962" font-family="Consolas, monospace" font-size="8" fill="#4fc3f7">import java.io.*; import javax.servlet.*;</text>
<text x="80" y="975" font-family="Consolas, monospace" font-size="8" fill="#4fc3f7">import javax.servlet.http.*;</text>
<text x="80" y="988" font-family="Consolas, monospace" font-size="8" fill="#ff8a65">public class HelloWorldServlet extends HttpServlet {</text>
<text x="95" y="1001" font-family="Consolas, monospace" font-size="8" fill="#aed581">public void doGet(HttpServletRequest req,</text>
<text x="95" y="1014" font-family="Consolas, monospace" font-size="8" fill="#aed581">HttpServletResponse res) throws Exception {</text>
</g>

<g class="step" id="step10" data-narration="Visualizing the flow: Browser sends request to Server, finds servlet, doGet executes, response sent back.">
<rect x="50" y="1040" width="700" height="95" rx="10" fill="white" filter="url(#shadow)"/>
<rect x="50" y="1040" width="8" height="95" rx="4" fill="#1976d2"/>
<text x="70" y="1060" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976d2">Request-Response Flow</text>
<rect x="70" y="1075" width="120" height="45" rx="8" fill="#e3f2fd"/>
<text x="130" y="1093" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">Browser</text>
<text x="130" y="1108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">GET /hello</text>
<line x1="190" y1="1097" x2="230" y2="1097" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowBlue)"/>
<rect x="240" y="1075" width="120" height="45" rx="8" fill="#e8f5e9"/>
<text x="300" y="1093" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">Servlet Container</text>
<text x="300" y="1108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Tomcat/Jetty</text>
<line x1="360" y1="1097" x2="400" y2="1097" stroke="#388e3c" stroke-width="3" marker-end="url(#arrowGreen)"/>
<rect x="410" y="1075" width="120" height="45" rx="8" fill="#fff3e0"/>
<text x="470" y="1093" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e65100">doGet Method</text>
<text x="470" y="1108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Executes</text>
<line x1="530" y1="1097" x2="570" y2="1097" stroke="#ff9800" stroke-width="3" marker-end="url(#arrowBlue)"/>
<rect x="580" y="1075" width="120" height="45" rx="8" fill="#f3e5f5"/>
<text x="640" y="1093" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6a1b9a">Response</text>
<text x="640" y="1108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">HTML Page</text>
</g>

<g class="step" id="step11" data-narration="Key takeaways: Extend HttpServlet, override doGet, set content type, use PrintWriter to write HTML response.">
<rect x="50" y="1145" width="700" height="95" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
<text x="70" y="1165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Key Takeaways</text>
<rect x="70" y="1175" width="150" height="50" rx="6" fill="white" fill-opacity="0.9"/>
<text x="145" y="1190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7b1fa2" font-weight="bold">Extend HttpServlet</text>
<text x="145" y="1207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Base class</text>
<rect x="235" y="1175" width="150" height="50" rx="6" fill="white" fill-opacity="0.9"/>
<text x="310" y="1190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7b1fa2" font-weight="bold">Override doGet</text>
<text x="310" y="1207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Handle requests</text>
<rect x="400" y="1175" width="150" height="50" rx="6" fill="white" fill-opacity="0.9"/>
<text x="475" y="1190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7b1fa2" font-weight="bold">setContentType</text>
<text x="475" y="1207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Set MIME type</text>
<rect x="565" y="1175" width="150" height="50" rx="6" fill="white" fill-opacity="0.9"/>
<text x="640" y="1190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7b1fa2" font-weight="bold">getWriter</text>
<text x="640" y="1207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Write response</text>
</g>

</svg>