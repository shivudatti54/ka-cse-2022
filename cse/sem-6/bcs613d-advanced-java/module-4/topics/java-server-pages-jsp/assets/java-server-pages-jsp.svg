<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Java Server Pages (JSP)">
    <text x="50" y="50" font-size="24" fill="#2563eb">Java Server Pages (JSP)</text>
    <text x="50" y="100" font-size="18" fill="#8b5cf6">A technology for creating dynamic web pages using Java code.</text>
    <rect x="50" y="150" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="185" font-size="18" fill="#ffffff">JSP</text>
  </g>
  <g id="step1" data-narration="Step 1: Request">
    <use href="#step0" x="0" y="0"/>
    <text x="300" y="50" font-size="24" fill="#2563eb">Step 1: Request</text>
    <text x="300" y="100" font-size="18" fill="#8b5cf6">A user sends an HTTP request to the server.</text>
    <rect x="300" y="150" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="310" y="185" font-size="18" fill="#ffffff">HTTP Request</text>
    <line x1="250" y1="175" x2="300" y2="175" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step2" data-narration="Step 2: Parsing">
    <use href="#step1" x="0" y="0"/>
    <text x="500" y="50" font-size="24" fill="#2563eb">Step 2: Parsing</text>
    <text x="500" y="100" font-size="18" fill="#8b5cf6">The server receives the request and parses the URL.</text>
    <rect x="500" y="150" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="510" y="185" font-size="18" fill="#ffffff">Parsing</text>
    <line x1="450" y1="175" x2="500" y2="175" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step3" data-narration="Step 3: Compilation">
    <use href="#step2" x="0" y="0"/>
    <text x="50" y="300" font-size="24" fill="#2563eb">Step 3: Compilation</text>
    <text x="50" y="350" font-size="18" fill="#8b5cf6">The server compiles the JSP file into a servlet class.</text>
    <rect x="50" y="400" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="60" y="435" font-size="18" fill="#ffffff">Compilation</text>
    <line x1="0" y1="250" x2="50" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step4" data-narration="Step 4: Instantiation">
    <use href="#step3" x="0" y="0"/>
    <text x="300" y="300" font-size="24" fill="#2563eb">Step 4: Instantiation</text>
    <text x="300" y="350" font-size="18" fill="#8b5cf6">The server instantiates the servlet class and calls the init() method.</text>
    <rect x="300" y="400" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="310" y="435" font-size="18" fill="#ffffff">Instantiation</text>
    <line x1="250" y1="250" x2="300" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step5" data-narration="Step 5: Execution">
    <use href="#step4" x="0" y="0"/>
    <text x="500" y="300" font-size="24" fill="#2563eb">Step 5: Execution</text>
    <text x="500" y="350" font-size="18" fill="#8b5cf6">The servlet executes and sends the response back to the client.</text>
    <rect x="500" y="400" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="510" y="435" font-size="18" fill="#ffffff">Execution</text>
    <line x1="450" y1="250" x2="500" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step6" data-narration="Step 6: Rendering">
    <use href="#step5" x="0" y="0"/>
    <text x="50" y="500" font-size="24" fill="#2563eb">Step 6: Rendering</text>
    <text x="50" y="550" font-size="18" fill="#8b5cf6">The servlet renders the HTML page using the jspWriter object.</text>
    <rect x="50" y="500" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="535" font-size="18" fill="#ffffff">Rendering</text>
    <line x1="0" y1="450" x2="50" y2="500" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step7" data-narration="Step 7: Response">
    <use href="#step6" x="0" y="0"/>
    <text x="300" y="500" font-size="24" fill="#2563eb">Step 7: Response</text>
    <text x="300" y="550" font-size="18" fill="#8b5cf6">The server sends the rendered HTML page back to the client.</text>
    <rect x="300" y="500" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="310" y="535" font-size="18" fill="#ffffff">Response</text>
    <line x1="250" y1="450" x2="300" y2="500" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>