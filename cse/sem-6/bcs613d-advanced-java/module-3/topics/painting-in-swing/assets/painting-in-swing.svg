<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Swing uses a painting pipeline to render components on screen. The process flows from a paint request through the RepaintManager to the actual screen rendering via Graphics2D.">
    <text x="400" y="30" font-size="18" font-family="Arial" font-weight="bold" fill="#1976d2" text-anchor="middle">Swing Painting Pipeline</text>
    <text x="400" y="50" font-size="12" font-family="Arial" fill="#666" text-anchor="middle">From paint request to screen rendering</text>
  </g>

  <g class="step" id="step1" data-narration="A paint request triggers the pipeline. This can originate from repaint() being called, the window being resized, or the component becoming visible for the first time.">
    <!-- Stage 1: Paint Request -->
    <rect x="30" y="80" width="140" height="100" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="100" y="108" font-size="12" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">Paint</text>
    <text x="100" y="124" font-size="12" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">Request</text>
    <text x="100" y="145" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">repaint()</text>
    <text x="100" y="158" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">resize / show</text>
    <!-- Arrow -->
    <line x1="170" y1="130" x2="195" y2="130" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g class="step" id="step2" data-narration="The RepaintManager queues and coalesces multiple paint requests into a single update. It determines the dirty region, the area that actually needs repainting for efficiency.">
    <!-- Stage 2: RepaintManager -->
    <rect x="210" y="80" width="140" height="100" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
    <text x="280" y="108" font-size="12" font-family="Arial" fill="#388e3c" text-anchor="middle" font-weight="bold">Repaint</text>
    <text x="280" y="124" font-size="12" font-family="Arial" fill="#388e3c" text-anchor="middle" font-weight="bold">Manager</text>
    <text x="280" y="145" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">Coalesces requests</text>
    <text x="280" y="158" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">Dirty regions</text>
    <!-- Arrow -->
    <line x1="350" y1="130" x2="375" y2="130" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g class="step" id="step3" data-narration="The paint method is called automatically by the system. In Swing, it calls three methods in order: paintComponent for the content, paintBorder, then paintChildren for child components.">
    <!-- Stage 3: paint() method -->
    <rect x="390" y="80" width="140" height="100" rx="12" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="460" y="105" font-size="12" font-family="Arial" fill="#ff9800" text-anchor="middle" font-weight="bold">paint()</text>
    <text x="460" y="125" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">1. paintComponent()</text>
    <text x="460" y="140" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">2. paintBorder()</text>
    <text x="460" y="155" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">3. paintChildren()</text>
    <text x="460" y="172" font-size="8" font-family="Arial" fill="#888" text-anchor="middle">Never override paint()</text>
    <!-- Arrow -->
    <line x1="530" y1="130" x2="555" y2="130" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g class="step" id="step4" data-narration="Override paintComponent to draw custom content. Always call super.paintComponent first to clear the background. The Graphics2D object provides drawing methods for shapes and text.">
    <!-- Stage 4: paintComponent + Graphics2D -->
    <rect x="570" y="80" width="200" height="100" rx="12" fill="#ffebee" stroke="#f44336" stroke-width="3"/>
    <text x="670" y="105" font-size="12" font-family="Arial" fill="#f44336" text-anchor="middle" font-weight="bold">paintComponent()</text>
    <text x="670" y="125" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">super.paintComponent(g)</text>
    <text x="670" y="140" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">Graphics2D g2d =</text>
    <text x="670" y="155" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">  (Graphics2D) g</text>
    <text x="670" y="172" font-size="8" font-family="Arial" fill="#888" text-anchor="middle">Override THIS method</text>
  </g>

  <g class="step" id="step5" data-narration="Graphics2D provides drawing operations. Methods like drawRect, fillOval, drawString, and drawImage render visual elements. You set color, stroke, and font before drawing.">
    <!-- Graphics2D operations - large center box -->
    <rect x="100" y="215" width="600" height="155" rx="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="240" font-size="14" font-family="Arial" fill="#9c27b0" text-anchor="middle" font-weight="bold">Graphics2D Drawing Operations</text>
    <line x1="115" y1="250" x2="685" y2="250" stroke="#9c27b0" stroke-width="1"/>
    <!-- Drawing methods grid -->
    <rect x="120" y="262" width="130" height="40" rx="6" fill="#e3f2fd"/>
    <text x="185" y="278" font-size="10" font-family="monospace" fill="#1976d2" text-anchor="middle">drawRect()</text>
    <text x="185" y="294" font-size="9" font-family="Arial" fill="#888" text-anchor="middle">Rectangle outline</text>
    <rect x="265" y="262" width="130" height="40" rx="6" fill="#e8f5e9"/>
    <text x="330" y="278" font-size="10" font-family="monospace" fill="#388e3c" text-anchor="middle">fillOval()</text>
    <text x="330" y="294" font-size="9" font-family="Arial" fill="#888" text-anchor="middle">Filled ellipse</text>
    <rect x="410" y="262" width="130" height="40" rx="6" fill="#fff3e0"/>
    <text x="475" y="278" font-size="10" font-family="monospace" fill="#ff9800" text-anchor="middle">drawString()</text>
    <text x="475" y="294" font-size="9" font-family="Arial" fill="#888" text-anchor="middle">Render text</text>
    <rect x="555" y="262" width="130" height="40" rx="6" fill="#ffebee"/>
    <text x="620" y="278" font-size="10" font-family="monospace" fill="#f44336" text-anchor="middle">drawImage()</text>
    <text x="620" y="294" font-size="9" font-family="Arial" fill="#888" text-anchor="middle">Render image</text>
    <!-- Setup methods -->
    <rect x="120" y="315" width="180" height="40" rx="6" fill="#e3f2fd"/>
    <text x="210" y="331" font-size="10" font-family="monospace" fill="#1976d2" text-anchor="middle">setColor(Color)</text>
    <text x="210" y="347" font-size="9" font-family="Arial" fill="#888" text-anchor="middle">Set draw color</text>
    <rect x="315" y="315" width="180" height="40" rx="6" fill="#e8f5e9"/>
    <text x="405" y="331" font-size="10" font-family="monospace" fill="#388e3c" text-anchor="middle">setStroke(Stroke)</text>
    <text x="405" y="347" font-size="9" font-family="Arial" fill="#888" text-anchor="middle">Line width/style</text>
    <rect x="510" y="315" width="175" height="40" rx="6" fill="#fff3e0"/>
    <text x="598" y="331" font-size="10" font-family="monospace" fill="#ff9800" text-anchor="middle">setFont(Font)</text>
    <text x="598" y="347" font-size="9" font-family="Arial" fill="#888" text-anchor="middle">Text rendering font</text>
  </g>

  <g class="step" id="step6" data-narration="Double buffering is automatic in Swing. Components render to an off-screen buffer first, then the buffer is copied to screen in one operation, eliminating flicker.">
    <!-- Double Buffering -->
    <rect x="50" y="400" width="320" height="90" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="425" font-size="13" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">Double Buffering (Automatic)</text>
    <rect x="70" y="440" width="110" height="35" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1.5"/>
    <text x="125" y="462" font-size="10" font-family="Arial" fill="#1976d2" text-anchor="middle">Off-screen</text>
    <line x1="180" y1="457" x2="210" y2="457" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="225" y="440" width="110" height="35" rx="6" fill="#1976d2"/>
    <text x="280" y="462" font-size="10" font-family="Arial" fill="#fff" text-anchor="middle">Screen</text>
    <text x="210" y="485" font-size="9" font-family="Arial" fill="#888" text-anchor="middle">Eliminates flicker</text>
  </g>

  <g class="step" id="step7" data-narration="The rendered output appears on screen. Swing repaints only dirty regions for performance. The EDT ensures thread-safe painting since all paint calls run on the Event Dispatch Thread.">
    <!-- Final stage: Screen Output -->
    <rect x="430" y="400" width="330" height="90" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="595" y="425" font-size="13" font-family="Arial" fill="#388e3c" text-anchor="middle" font-weight="bold">Screen Rendering</text>
    <!-- Screen icon -->
    <rect x="450" y="438" width="80" height="42" rx="4" fill="#fff" stroke="#388e3c" stroke-width="2"/>
    <rect x="475" y="480" width="30" height="5" rx="2" fill="#388e3c"/>
    <text x="560" y="455" font-size="10" font-family="Arial" fill="#555">Only dirty regions</text>
    <text x="560" y="470" font-size="10" font-family="Arial" fill="#555">are repainted</text>
    <text x="560" y="485" font-size="10" font-family="Arial" fill="#888">EDT thread-safe</text>
    <!-- Pipeline flow arrow at bottom -->
    <line x1="100" y1="530" x2="700" y2="530" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="400" y="555" font-size="11" font-family="Arial" fill="#1976d2" text-anchor="middle">Pipeline Flow: Request -&gt; Manager -&gt; paint() -&gt; paintComponent() -&gt; Graphics2D -&gt; Buffer -&gt; Screen</text>
  </g>
</svg>