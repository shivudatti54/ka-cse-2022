<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="JTextField is a single-line text input component in Swing. It extends JTextComponent and inherits text editing capabilities like selection, copy, paste, and caret management.">
    <text x="400" y="30" font-size="18" font-family="Arial" font-weight="bold" fill="#1976d2" text-anchor="middle">JTextField Component Diagram</text>
    <!-- Main JTextField component box -->
    <rect x="230" y="55" width="340" height="70" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="400" y="82" font-size="16" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">JTextField</text>
    <text x="400" y="100" font-size="11" font-family="Arial" fill="#555" text-anchor="middle">extends JTextComponent</text>
    <text x="400" y="115" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">javax.swing.JTextField</text>
  </g>

  <g class="step" id="step1" data-narration="JTextField provides four constructors. You can create an empty field, set initial text, define column width, or combine text with width for flexible initialization.">
    <!-- Constructors section - left -->
    <rect x="30" y="155" width="230" height="160" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="145" y="178" font-size="13" font-family="Arial" fill="#388e3c" text-anchor="middle" font-weight="bold">Constructors</text>
    <line x1="45" y1="186" x2="245" y2="186" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="206" font-size="10" font-family="monospace" fill="#333">JTextField()</text>
    <text x="50" y="224" font-size="10" font-family="monospace" fill="#333">JTextField(int cols)</text>
    <text x="50" y="242" font-size="10" font-family="monospace" fill="#333">JTextField(String text)</text>
    <text x="50" y="260" font-size="10" font-family="monospace" fill="#333">JTextField(String, int)</text>
    <text x="50" y="280" font-size="9" font-family="Arial" fill="#888">cols = visible width in columns</text>
    <text x="50" y="296" font-size="9" font-family="Arial" fill="#888">text = initial display text</text>
    <!-- Connector -->
    <line x1="260" y1="230" x2="295" y2="125" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <g class="step" id="step2" data-narration="Key methods include getText and setText for content access, setColumns for width, setEditable to toggle read-only mode, and setFont or setHorizontalAlignment for appearance.">
    <!-- Methods section - right -->
    <rect x="540" y="155" width="230" height="175" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="655" y="178" font-size="13" font-family="Arial" fill="#ff9800" text-anchor="middle" font-weight="bold">Key Methods</text>
    <line x1="555" y1="186" x2="755" y2="186" stroke="#ff9800" stroke-width="1"/>
    <text x="555" y="206" font-size="10" font-family="monospace" fill="#333">getText()</text>
    <text x="555" y="224" font-size="10" font-family="monospace" fill="#333">setText(String)</text>
    <text x="555" y="242" font-size="10" font-family="monospace" fill="#333">setColumns(int)</text>
    <text x="555" y="260" font-size="10" font-family="monospace" fill="#333">setEditable(boolean)</text>
    <text x="555" y="278" font-size="10" font-family="monospace" fill="#333">setFont(Font)</text>
    <text x="555" y="296" font-size="10" font-family="monospace" fill="#333">setHorizontalAlignment()</text>
    <text x="555" y="314" font-size="10" font-family="monospace" fill="#333">getSelectedText()</text>
    <!-- Connector -->
    <line x1="540" y1="240" x2="505" y2="125" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <g class="step" id="step3" data-narration="JTextField fires ActionEvent when the user presses Enter. Register an ActionListener to respond. It also supports DocumentListener for real-time text change monitoring.">
    <!-- Events section - bottom center -->
    <rect x="230" y="350" width="340" height="100" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="375" font-size="13" font-family="Arial" fill="#f44336" text-anchor="middle" font-weight="bold">Events</text>
    <line x1="245" y1="383" x2="555" y2="383" stroke="#f44336" stroke-width="1"/>
    <text x="260" y="403" font-size="10" font-family="monospace" fill="#333">ActionEvent (on Enter key press)</text>
    <text x="260" y="421" font-size="10" font-family="monospace" fill="#333">addActionListener(ActionListener)</text>
    <text x="260" y="439" font-size="10" font-family="monospace" fill="#333">DocumentListener (text changes)</text>
    <!-- Connector up -->
    <line x1="400" y1="350" x2="400" y2="125" stroke="#f44336" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <g class="step" id="step4" data-narration="Visual representation of a JTextField showing the text input area with caret cursor. The columns property determines width, while text content is rendered inside the field.">
    <!-- Visual representation of JTextField -->
    <rect x="100" y="480" width="280" height="90" rx="8" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <text x="240" y="502" font-size="11" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">Visual Representation</text>
    <!-- Simulated text field -->
    <rect x="120" y="515" width="240" height="30" rx="4" fill="#fff" stroke="#999" stroke-width="1.5"/>
    <text x="130" y="535" font-size="12" font-family="monospace" fill="#333">Enter name here</text>
    <line x1="230" y1="518" x2="230" y2="542" stroke="#1976d2" stroke-width="1.5"/>
    <text x="240" y="560" font-size="9" font-family="Arial" fill="#888">caret position  |  20 columns wide</text>
  </g>

  <g class="step" id="step5" data-narration="JTextField inherits from a class hierarchy: Component to Container to JComponent to JTextComponent to JTextField. JPasswordField extends JTextField for secure password input.">
    <!-- Class hierarchy -->
    <rect x="430" y="475" width="340" height="100" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="600" y="498" font-size="11" font-family="Arial" fill="#9c27b0" text-anchor="middle" font-weight="bold">Inheritance Chain</text>
    <text x="450" y="520" font-size="10" font-family="monospace" fill="#333">Component</text>
    <text x="505" y="520" font-size="10" font-family="Arial" fill="#9c27b0">-&gt;</text>
    <text x="520" y="520" font-size="10" font-family="monospace" fill="#333">Container</text>
    <text x="582" y="520" font-size="10" font-family="Arial" fill="#9c27b0">-&gt;</text>
    <text x="600" y="520" font-size="10" font-family="monospace" fill="#333">JComponent</text>
    <text x="450" y="542" font-size="10" font-family="monospace" fill="#333">JTextComponent</text>
    <text x="558" y="542" font-size="10" font-family="Arial" fill="#9c27b0">-&gt;</text>
    <text x="572" y="542" font-size="10" font-family="monospace" fill="#1976d2" font-weight="bold">JTextField</text>
    <text x="450" y="564" font-size="10" font-family="Arial" fill="#888">Subclass: JPasswordField</text>
  </g>

  <g class="step" id="step6" data-narration="Properties like alignment, font, and editability are set through methods. LEFT, CENTER, and RIGHT alignment constants control text positioning within the field.">
    <!-- Properties section -->
    <rect x="30" y="340" width="175" height="130" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="118" y="363" font-size="12" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">Properties</text>
    <line x1="45" y1="371" x2="190" y2="371" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="391" font-size="10" font-family="Arial" fill="#333">text: String</text>
    <text x="50" y="409" font-size="10" font-family="Arial" fill="#333">columns: int</text>
    <text x="50" y="427" font-size="10" font-family="Arial" fill="#333">editable: boolean</text>
    <text x="50" y="445" font-size="10" font-family="Arial" fill="#333">alignment: LEFT</text>
    <text x="50" y="460" font-size="10" font-family="Arial" fill="#333">  | CENTER | RIGHT</text>
    <!-- Connector -->
    <line x1="205" y1="380" x2="320" y2="125" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
</svg>