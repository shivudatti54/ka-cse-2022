<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="JToggleButton is a two-state button in Swing that maintains a selected or deselected state. It is the parent class for JCheckBox and JRadioButton components.">
    <text x="400" y="30" font-size="18" font-family="Arial" font-weight="bold" fill="#1976d2" text-anchor="middle">JToggleButton State Machine</text>
    <text x="400" y="50" font-size="12" font-family="Arial" fill="#666" text-anchor="middle">Two-state toggle: parent of JCheckBox and JRadioButton</text>
  </g>

  <g class="step" id="step1" data-narration="The Deselected state is the default initial state with isSelected returning false. The button appears unpressed and the associated panel background stays at its default color.">
    <!-- Deselected State (left) -->
    <circle cx="220" cy="200" r="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="4"/>
    <text x="220" y="180" font-size="15" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">DESELECTED</text>
    <text x="220" y="200" font-size="11" font-family="Arial" fill="#555" text-anchor="middle">isSelected() = false</text>
    <text x="220" y="218" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">Button appears</text>
    <text x="220" y="232" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">unpressed</text>
    <!-- Initial state arrow -->
    <line x1="80" y1="120" x2="155" y2="155" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="90" y="115" font-size="10" font-family="Arial" fill="#1976d2">Initial</text>
    <text x="90" y="128" font-size="10" font-family="Arial" fill="#1976d2">State</text>
  </g>

  <g class="step" id="step2" data-narration="The Selected state activates when the user clicks or calls setSelected with true. The isSelected method returns true and the button appears visually pressed or highlighted.">
    <!-- Selected State (right) -->
    <circle cx="580" cy="200" r="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="4"/>
    <text x="580" y="180" font-size="15" font-family="Arial" fill="#388e3c" text-anchor="middle" font-weight="bold">SELECTED</text>
    <text x="580" y="200" font-size="11" font-family="Arial" fill="#555" text-anchor="middle">isSelected() = true</text>
    <text x="580" y="218" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">Button appears</text>
    <text x="580" y="232" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">pressed/highlighted</text>
  </g>

  <g class="step" id="step3" data-narration="Clicking the toggle button or calling setSelected true transitions from deselected to selected. This fires an ItemEvent with state change value of ItemEvent.SELECTED.">
    <!-- Transition: Deselected -> Selected (top arrow) -->
    <path d="M 310 155 C 380 80, 480 80, 490 155" fill="none" stroke="#388e3c" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="340" y="80" width="120" height="48" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="98" font-size="10" font-family="Arial" fill="#388e3c" text-anchor="middle" font-weight="bold">User Click /</text>
    <text x="400" y="114" font-size="10" font-family="Arial" fill="#388e3c" text-anchor="middle" font-weight="bold">setSelected(true)</text>
  </g>

  <g class="step" id="step4" data-narration="Clicking again or calling setSelected false transitions back to deselected. This fires ItemEvent with DESELECTED state. The ItemListener interface handles both transitions.">
    <!-- Transition: Selected -> Deselected (bottom arrow) -->
    <path d="M 490 245 C 480 320, 380 320, 310 245" fill="none" stroke="#f44336" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="340" y="272" width="120" height="48" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="400" y="290" font-size="10" font-family="Arial" fill="#f44336" text-anchor="middle" font-weight="bold">User Click /</text>
    <text x="400" y="306" font-size="10" font-family="Arial" fill="#f44336" text-anchor="middle" font-weight="bold">setSelected(false)</text>
  </g>

  <g class="step" id="step5" data-narration="The ItemListener interface receives state changes. In itemStateChanged, check e.getStateChange against ItemEvent.SELECTED or DESELECTED to determine the new state.">
    <!-- ItemListener box (center bottom) -->
    <rect x="200" y="370" width="400" height="100" rx="12" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="400" y="395" font-size="14" font-family="Arial" fill="#ff9800" text-anchor="middle" font-weight="bold">ItemListener Interface</text>
    <line x1="215" y1="403" x2="585" y2="403" stroke="#ff9800" stroke-width="1"/>
    <text x="220" y="425" font-size="10" font-family="monospace" fill="#333">void itemStateChanged(ItemEvent e) {</text>
    <text x="235" y="443" font-size="10" font-family="monospace" fill="#333">if (e.getStateChange() == ItemEvent.SELECTED)</text>
    <text x="235" y="461" font-size="10" font-family="monospace" fill="#333">if (e.getStateChange() == ItemEvent.DESELECTED)</text>
    <!-- Arrows from states to listener -->
    <line x1="220" y1="290" x2="300" y2="365" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="580" y1="290" x2="500" y2="365" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3"/>
  </g>

  <g class="step" id="step6" data-narration="JToggleButton serves as the parent class for JCheckBox and JRadioButton. JCheckBox allows independent selection while JRadioButton uses ButtonGroup for mutual exclusion.">
    <!-- Subclass hierarchy -->
    <rect x="100" y="500" width="180" height="70" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="190" y="525" font-size="13" font-family="Arial" fill="#9c27b0" text-anchor="middle" font-weight="bold">JCheckBox</text>
    <text x="190" y="545" font-size="10" font-family="Arial" fill="#555" text-anchor="middle">Independent selection</text>
    <text x="190" y="560" font-size="10" font-family="Arial" fill="#555" text-anchor="middle">Multiple allowed</text>
    <rect x="520" y="500" width="180" height="70" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="610" y="525" font-size="13" font-family="Arial" fill="#9c27b0" text-anchor="middle" font-weight="bold">JRadioButton</text>
    <text x="610" y="545" font-size="10" font-family="Arial" fill="#555" text-anchor="middle">Mutual exclusion</text>
    <text x="610" y="560" font-size="10" font-family="Arial" fill="#555" text-anchor="middle">via ButtonGroup</text>
    <!-- Inheritance arrows -->
    <rect x="310" y="492" width="180" height="28" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="511" font-size="11" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">JToggleButton (parent)</text>
    <line x1="310" y1="510" x2="282" y2="530" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="490" y1="510" x2="518" y2="530" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <g class="step" id="step7" data-narration="Constructors accept text and optional initial state. JToggleButton with text OFF and false creates an initially deselected button that displays OFF as its label.">
    <!-- Constructor reference -->
    <rect x="310" y="545" width="180" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="564" font-size="10" font-family="monospace" fill="#333" text-anchor="middle">new JToggleButton(</text>
    <text x="400" y="580" font-size="10" font-family="monospace" fill="#333" text-anchor="middle">"Label", false)</text>
  </g>
</svg>