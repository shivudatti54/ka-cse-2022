<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Swing is built as a layered architecture on top of AWT. The pyramid shows the foundation layer at the base with higher-level Swing APIs built progressively on top.">
    <text x="400" y="30" font-size="18" font-family="Arial" font-weight="bold" fill="#1976d2" text-anchor="middle">Swing Built on AWT - Layered Architecture</text>
    <text x="400" y="50" font-size="12" font-family="Arial" fill="#666" text-anchor="middle">Pyramid of Java GUI technology layers</text>
  </g>

  <g class="step" id="step1" data-narration="The Operating System sits at the base providing native windowing, graphics, and input handling. AWT relies on OS native peers to render heavyweight components like Frame and Button.">
    <!-- Layer 1 (base): Operating System / Native -->
    <polygon points="40,540 760,540 660,460 140,460" fill="#ffebee" stroke="#f44336" stroke-width="3"/>
    <text x="400" y="495" font-size="16" font-family="Arial" fill="#f44336" text-anchor="middle" font-weight="bold">Operating System / Native Peers</text>
    <text x="400" y="515" font-size="11" font-family="Arial" fill="#555" text-anchor="middle">Windows API, GTK+, Cocoa - Native windowing, graphics, input</text>
    <text x="400" y="532" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">Heavyweight components depend on OS peer objects</text>
  </g>

  <g class="step" id="step2" data-narration="AWT forms the second layer, providing java.awt.Component, Container, and the event model. AWT classes like Frame, Panel, and Button are heavyweight, each mapped to a native OS widget.">
    <!-- Layer 2: AWT -->
    <polygon points="140,455 660,455 580,375 220,375" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="400" y="405" font-size="16" font-family="Arial" fill="#ff9800" text-anchor="middle" font-weight="bold">AWT (java.awt)</text>
    <text x="400" y="425" font-size="11" font-family="Arial" fill="#555" text-anchor="middle">Component, Container, Frame, Button, Panel</text>
    <text x="400" y="442" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">Event model + Layout managers + Graphics</text>
  </g>

  <g class="step" id="step3" data-narration="JComponent extends java.awt.Container, bridging AWT and Swing. It adds double buffering, tool tips, borders, accessibility, and pluggable look-and-feel support to all Swing widgets.">
    <!-- Layer 3: JComponent bridge -->
    <polygon points="220,370 580,370 520,300 280,300" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
    <text x="400" y="325" font-size="15" font-family="Arial" fill="#388e3c" text-anchor="middle" font-weight="bold">JComponent (javax.swing)</text>
    <text x="400" y="345" font-size="10" font-family="Arial" fill="#555" text-anchor="middle">extends Container - adds double buffering, tooltips, borders</text>
    <text x="400" y="360" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">Pluggable L&amp;F + Accessibility + Key bindings</text>
  </g>

  <g class="step" id="step4" data-narration="Swing components form the next layer. JButton, JLabel, JTextField, JPanel are lightweight, painted by Java code without native peers. This ensures consistent cross-platform appearance.">
    <!-- Layer 4: Swing Components -->
    <polygon points="280,295 520,295 470,230 330,230" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="400" y="255" font-size="14" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">Swing Components</text>
    <text x="400" y="275" font-size="10" font-family="Arial" fill="#555" text-anchor="middle">JButton, JLabel, JTextField, JTable, JTree</text>
    <text x="400" y="290" font-size="10" font-family="Arial" fill="#888" text-anchor="middle">Lightweight - painted by Java</text>
  </g>

  <g class="step" id="step5" data-narration="At the top sits the Pluggable Look and Feel system. UIManager.setLookAndFeel switches between Metal, Nimbus, Windows, or GTK themes at runtime without changing code.">
    <!-- Layer 5 (top): Look and Feel -->
    <polygon points="330,225 470,225 430,170 370,170" fill="#f3e5f5" stroke="#9c27b0" stroke-width="3"/>
    <text x="400" y="195" font-size="13" font-family="Arial" fill="#9c27b0" text-anchor="middle" font-weight="bold">Look &amp; Feel</text>
    <text x="400" y="212" font-size="9" font-family="Arial" fill="#555" text-anchor="middle">Metal, Nimbus, System</text>
  </g>

  <g class="step" id="step6" data-narration="The class hierarchy flows: java.awt.Component is extended by java.awt.Container, which is extended by javax.swing.JComponent, the base for all lightweight Swing components.">
    <!-- Class hierarchy on the right side -->
    <rect x="600" y="70" width="180" height="190" rx="10" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <text x="690" y="92" font-size="12" font-family="Arial" fill="#1976d2" text-anchor="middle" font-weight="bold">Class Hierarchy</text>
    <line x1="615" y1="100" x2="765" y2="100" stroke="#1976d2" stroke-width="1"/>
    <rect x="625" y="112" width="130" height="22" rx="4" fill="#ffebee"/>
    <text x="690" y="128" font-size="10" font-family="monospace" fill="#f44336" text-anchor="middle">Component</text>
    <line x1="690" y1="134" x2="690" y2="146" stroke="#888" stroke-width="1"/>
    <rect x="625" y="146" width="130" height="22" rx="4" fill="#fff3e0"/>
    <text x="690" y="162" font-size="10" font-family="monospace" fill="#ff9800" text-anchor="middle">Container</text>
    <line x1="690" y1="168" x2="690" y2="180" stroke="#888" stroke-width="1"/>
    <rect x="625" y="180" width="130" height="22" rx="4" fill="#e8f5e9"/>
    <text x="690" y="196" font-size="10" font-family="monospace" fill="#388e3c" text-anchor="middle">JComponent</text>
    <line x1="690" y1="202" x2="690" y2="214" stroke="#888" stroke-width="1"/>
    <rect x="625" y="214" width="130" height="22" rx="4" fill="#e3f2fd"/>
    <text x="690" y="230" font-size="10" font-family="monospace" fill="#1976d2" text-anchor="middle">JButton, JLabel...</text>
  </g>

  <g class="step" id="step7" data-narration="Swing reuses the AWT event model and layout managers. ActionListener, MouseListener, BorderLayout, and FlowLayout all come from AWT and work seamlessly with Swing components.">
    <!-- AWT reuse callout on left -->
    <rect x="20" y="70" width="190" height="200" rx="10" fill="#fff" stroke="#ff9800" stroke-width="2"/>
    <text x="115" y="92" font-size="12" font-family="Arial" fill="#ff9800" text-anchor="middle" font-weight="bold">AWT Reused By</text>
    <text x="115" y="108" font-size="12" font-family="Arial" fill="#ff9800" text-anchor="middle" font-weight="bold">Swing</text>
    <line x1="35" y1="115" x2="195" y2="115" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="135" font-size="10" font-family="Arial" fill="#555">Event Model</text>
    <text x="40" y="150" font-size="9" font-family="Arial" fill="#888">  ActionListener</text>
    <text x="40" y="165" font-size="9" font-family="Arial" fill="#888">  MouseListener</text>
    <text x="40" y="185" font-size="10" font-family="Arial" fill="#555">Layout Managers</text>
    <text x="40" y="200" font-size="9" font-family="Arial" fill="#888">  BorderLayout</text>
    <text x="40" y="215" font-size="9" font-family="Arial" fill="#888">  FlowLayout</text>
    <text x="40" y="235" font-size="10" font-family="Arial" fill="#555">Graphics/Graphics2D</text>
    <text x="40" y="252" font-size="10" font-family="Arial" fill="#555">Color, Font, Cursor</text>
  </g>
</svg>