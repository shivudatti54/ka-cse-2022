<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Import packages -->
  <g id="step0" class="step" data-narration="First, we import the necessary Swing packages. javax.swing provides GUI components, java.awt provides layouts, and java.awt.event handles user interactions like button clicks.">
    <rect x="50" y="50" width="700" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="85" font-size="18" font-weight="bold" text-anchor="middle" fill="#1976d2">Import Required Packages</text>
    <text x="80" y="115" font-size="14" fill="#333">import javax.swing.*;</text>
    <text x="80" y="135" font-size="14" fill="#333">import java.awt.*; import java.awt.event.*;</text>
  </g>

  <!-- Step 1: Create JFrame -->
  <g id="step1" class="step" data-narration="Create a JFrame which is the main window. Set its title, size to 300x150 pixels, and configure it to exit the program when closed.">
    <rect x="50" y="170" width="340" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="220" y="200" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff9800">1. Create JFrame</text>
    <text x="70" y="225" font-size="13" fill="#333">JFrame frame = new JFrame();</text>
    <text x="70" y="245" font-size="13" fill="#333">frame.setTitle("My First Swing App");</text>
    <text x="70" y="265" font-size="13" fill="#333">frame.setSize(300, 150);</text>
    <text x="220" y="170" font-size="24" fill="#ff9800">🪟</text>
  </g>

  <!-- Step 2: Create components -->
  <g id="step2" class="step" data-narration="Create a JPanel container and a JButton component. The panel will hold the button and can contain multiple components organized with layouts.">
    <rect x="410" y="170" width="340" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="580" y="200" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">2. Create Components</text>
    <text x="430" y="225" font-size="13" fill="#333">JPanel panel = new JPanel();</text>
    <text x="430" y="245" font-size="13" fill="#333">JButton button = </text>
    <text x="430" y="265" font-size="13" fill="#333">    new JButton("Click Me!");</text>
    <rect x="480" y="235" width="80" height="30" fill="#1976d2" stroke="#0d47a1" stroke-width="1" rx="3"/>
    <text x="520" y="255" font-size="12" fill="white" text-anchor="middle">Click Me!</text>
  </g>

  <!-- Step 3: Add event listener -->
  <g id="step3" class="step" data-narration="Add an ActionListener to the button using an anonymous inner class. When clicked, it displays a dialog showing Hello Swing World message to the user.">
    <rect x="50" y="310" width="700" height="90" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="400" y="340" font-size="16" font-weight="bold" text-anchor="middle" fill="#9c27b0">3. Add Event Listener</text>
    <text x="70" y="365" font-size="13" fill="#333">button.addActionListener(new ActionListener() {</text>
    <text x="100" y="385" font-size="13" fill="#333">public void actionPerformed(ActionEvent e) { ... }</text>
    <text x="360" y="340" font-size="24" fill="#9c27b0">🖱️</text>
  </g>

  <!-- Step 4: Assemble UI -->
  <g id="step4" class="step" data-narration="Assemble the user interface by adding the button to the panel, then adding the panel to the frame. This builds the component hierarchy.">
    <rect x="50" y="420" width="340" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="220" y="450" font-size="16" font-weight="bold" text-anchor="middle" fill="#1976d2">4. Assemble UI</text>
    <text x="70" y="475" font-size="13" fill="#333">panel.add(button);</text>
    <text x="70" y="495" font-size="13" fill="#333">frame.add(panel);</text>
    <circle cx="220" cy="420" r="8" fill="#1976d2"/>
    <line x1="220" y1="428" x2="220" y2="450" stroke="#1976d2" stroke-width="2"/>
  </g>

  <!-- Step 5: Display window -->
  <g id="step5" class="step" data-narration="Finally, make the frame visible by calling setVisible true. This displays the complete window on screen with all components ready for user interaction.">
    <rect x="410" y="420" width="340" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="580" y="450" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">5. Display Window</text>
    <text x="430" y="475" font-size="13" fill="#333">frame.setVisible(true);</text>
    <rect x="480" y="445" width="180" height="60" fill="white" stroke="#388e3c" stroke-width="2" rx="3"/>
    <text x="570" y="465" font-size="11" fill="#666" text-anchor="middle">My First Swing App</text>
    <rect x="495" y="475" width="150" height="25" fill="#1976d2" stroke="#0d47a1" stroke-width="1" rx="3"/>
    <text x="570" y="492" font-size="10" fill="white" text-anchor="middle">Click Me!</text>
  </g>
</svg>