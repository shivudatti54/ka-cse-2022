<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g id="step0" class="step" data-narration="JLabel is a Swing component used to display text or images. It's non-editable and commonly used for labels, icons, and informational messages in GUI applications.">
    <rect x="100" y="40" width="600" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="75" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976d2">JLabel and ImageIcon</text>
    <text x="400" y="105" font-size="14" text-anchor="middle" fill="#333">Display Text and Images in Swing</text>
  </g>

  <g id="step1" class="step" data-narration="Create a simple text label using JLabel constructor. You can set text, alignment like center, left, or right, making it versatile for different display needs.">
    <rect x="50" y="145" width="340" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="220" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff9800">Creating JLabel</text>
    <text x="70" y="205" font-size="13" fill="#333">JLabel label = new JLabel(</text>
    <text x="90" y="225" font-size="13" fill="#333">"Welcome to Advanced Java!");</text>
    <rect x="110" y="235" width="200" height="15" fill="#ffe0b2" rx="2"/>
    <text x="210" y="246" font-size="11" text-anchor="middle" fill="#333">Welcome to Advanced Java!</text>
  </g>

  <g id="step2" class="step" data-narration="ImageIcon class loads and displays images. Supported formats include PNG, JPEG, and GIF. You create ImageIcon by providing the image file path.">
    <rect x="410" y="145" width="340" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="580" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">Using ImageIcon</text>
    <text x="430" y="205" font-size="13" fill="#333">ImageIcon icon = new ImageIcon(</text>
    <text x="450" y="225" font-size="13" fill="#333">"path/to/image.png");</text>
    <rect x="520" y="232" width="40" height="18" fill="#c8e6c9" stroke="#388e3c" rx="2"/>
    <text x="540" y="244" font-size="16" text-anchor="middle" fill="#388e3c">🖼️</text>
  </g>

  <g id="step3" class="step" data-narration="Combine text and icons in a single JLabel. The label can display both text and image simultaneously with customizable positioning and alignment.">
    <rect x="50" y="280" width="700" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="400" y="310" font-size="16" font-weight="bold" text-anchor="middle" fill="#9c27b0">JLabel with Text and Icon</text>
    <text x="70" y="340" font-size="13" fill="#333">JLabel label = new JLabel("Download", icon);</text>
    <rect x="280" y="350" width="240" height="20" fill="#e1bee7" stroke="#9c27b0" rx="3"/>
    <text x="300" y="364" font-size="14" fill="#333">📥 Download</text>
  </g>

  <g id="step4" class="step" data-narration="Set alignment using SwingConstants. Options include CENTER, LEFT, RIGHT for horizontal alignment and TOP, CENTER, BOTTOM for vertical alignment of text and icons.">
    <rect x="50" y="405" width="340" height="165" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="220" y="435" font-size="16" font-weight="bold" text-anchor="middle" fill="#1976d2">Text Alignment</text>
    <text x="70" y="465" font-size="13" fill="#333">label.setHorizontalAlignment(</text>
    <text x="90" y="485" font-size="13" fill="#333">SwingConstants.CENTER);</text>
    <rect x="90" y="500" width="120" height="25" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="150" y="517" font-size="12" text-anchor="middle" fill="#333">CENTER</text>
    <rect x="90" y="535" width="120" height="25" fill="#bbdefb" stroke="#1976d2" rx="3"/>
    <text x="150" y="552" font-size="12" text-anchor="middle" fill="#333">LEFT / RIGHT</text>
  </g>

  <g id="step5" class="step" data-narration="JLabel supports HTML formatting allowing bold, italic, colors, and multi-line text. This provides rich text display capabilities within simple label components.">
    <rect x="410" y="405" width="340" height="165" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="580" y="435" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">HTML in JLabel</text>
    <text x="430" y="465" font-size="12" fill="#333">JLabel htmlLabel = new JLabel(</text>
    <text x="450" y="485" font-size="11" fill="#333">"&lt;html&gt;&lt;b&gt;Bold&lt;/b&gt; and </text>
    <text x="450" y="502" font-size="11" fill="#333">&lt;i&gt;Italic&lt;/i&gt;&lt;/html&gt;");</text>
    <rect x="450" y="515" width="260" height="45" fill="#c8e6c9" stroke="#388e3c" rx="3"/>
    <text x="460" y="533" font-size="12" fill="#333"><tspan font-weight="bold">Bold</tspan> and <tspan font-style="italic">Italic</tspan></text>
    <text x="460" y="550" font-size="11" fill="#666">HTML formatting support</text>
  </g>
</svg>