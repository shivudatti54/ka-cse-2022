<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Swing Overview -->
  <g id="step0" class="step" data-narration="Swing is Java's powerful GUI toolkit for building desktop applications. It provides rich, lightweight components written entirely in Java, making them platform-independent and highly customizable.">
    <rect x="50" y="30" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="60" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976d2">Exploring Swing</text>
    <text x="400" y="90" font-size="14" text-anchor="middle" fill="#333">Java's Rich GUI Toolkit for Desktop Applications</text>
  </g>

  <!-- Step 1: Component Hierarchy -->
  <g id="step1" class="step" data-narration="Swing follows a component hierarchy starting with JComponent as the base. Top-level containers like JFrame hold intermediate containers like JPanel, which contain atomic components like buttons and labels.">
    <rect x="50" y="130" width="220" height="180" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="160" y="155" font-size="15" font-weight="bold" text-anchor="middle" fill="#ff9800">Component Hierarchy</text>
    <rect x="80" y="170" width="160" height="30" fill="#ffccbc" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="160" y="190" font-size="12" text-anchor="middle" fill="#333">JFrame (Window)</text>
    <line x1="160" y1="200" x2="160" y2="215" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="80" y="215" width="160" height="30" fill="#ffe0b2" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="160" y="235" font-size="12" text-anchor="middle" fill="#333">JPanel (Container)</text>
    <line x1="160" y1="245" x2="160" y2="260" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="80" y="260" width="160" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="160" y="280" font-size="12" text-anchor="middle" fill="#333">JButton, JLabel...</text>
  </g>

  <!-- Step 2: Key Features -->
  <g id="step2" class="step" data-narration="Swing offers pluggable look and feel to match different platforms, lightweight components that don't rely on native OS widgets, and rich controls like tables, trees, and advanced text components.">
    <rect x="290" y="130" width="220" height="180" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="400" y="155" font-size="15" font-weight="bold" text-anchor="middle" fill="#388e3c">Key Features</text>
    <circle cx="320" cy="180" r="5" fill="#388e3c"/>
    <text x="335" y="185" font-size="13" fill="#333">Pluggable Look & Feel</text>
    <circle cx="320" cy="210" r="5" fill="#388e3c"/>
    <text x="335" y="215" font-size="13" fill="#333">Lightweight Components</text>
    <circle cx="320" cy="240" r="5" fill="#388e3c"/>
    <text x="335" y="245" font-size="13" fill="#333">Rich Component Set</text>
    <circle cx="320" cy="270" r="5" fill="#388e3c"/>
    <text x="335" y="275" font-size="13" fill="#333">Platform Independent</text>
    <text x="400" y="300" font-size="24" fill="#388e3c" text-anchor="middle">💎</text>
  </g>

  <!-- Step 3: Common Components -->
  <g id="step3" class="step" data-narration="Swing provides a wide range of components including JButton for actions, JLabel for text and images, JTextField for input, JCheckBox for selections, and many more specialized controls.">
    <rect x="530" y="130" width="220" height="180" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="640" y="155" font-size="15" font-weight="bold" text-anchor="middle" fill="#9c27b0">Common Components</text>
    <rect x="550" y="170" width="80" height="25" fill="#9c27b0" stroke="#7b1fa2" stroke-width="1" rx="3"/>
    <text x="590" y="187" font-size="11" fill="white" text-anchor="middle">JButton</text>
    <rect x="650" y="170" width="80" height="25" fill="#ab47bc" stroke="#7b1fa2" stroke-width="1" rx="3"/>
    <text x="690" y="187" font-size="11" fill="white" text-anchor="middle">JLabel</text>
    <rect x="550" y="205" width="80" height="25" fill="#ba68c8" stroke="#7b1fa2" stroke-width="1" rx="3"/>
    <text x="590" y="222" font-size="11" fill="white" text-anchor="middle">JTextField</text>
    <rect x="650" y="205" width="80" height="25" fill="#ce93d8" stroke="#7b1fa2" stroke-width="1" rx="3"/>
    <text x="690" y="222" font-size="11" fill="white" text-anchor="middle">JCheckBox</text>
    <rect x="550" y="240" width="80" height="25" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1" rx="3"/>
    <text x="590" y="257" font-size="11" fill="#333" text-anchor="middle">JTable</text>
    <rect x="650" y="240" width="80" height="25" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" rx="3"/>
    <text x="690" y="257" font-size="11" fill="#333" text-anchor="middle">JComboBox</text>
    <text x="640" y="290" font-size="13" text-anchor="middle" fill="#666">...and many more!</text>
  </g>

  <!-- Step 4: Layout Managers -->
  <g id="step4" class="step" data-narration="Layout managers control component positioning and sizing. FlowLayout arranges components left to right, BorderLayout uses five regions, and GridLayout creates an equal-sized grid.">
    <rect x="50" y="330" width="340" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="220" y="355" font-size="15" font-weight="bold" text-anchor="middle" fill="#1976d2">Layout Managers</text>
    <rect x="70" y="370" width="90" height="60" fill="#bbdefb" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="115" y="387" font-size="11" text-anchor="middle" fill="#333">FlowLayout</text>
    <rect x="80" y="395" width="20" height="15" fill="#1976d2"/>
    <rect x="105" y="395" width="20" height="15" fill="#1976d2"/>
    <rect x="80" y="415" width="20" height="15" fill="#1976d2"/>

    <rect x="175" y="370" width="90" height="60" fill="#bbdefb" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="220" y="387" font-size="11" text-anchor="middle" fill="#333">BorderLayout</text>
    <rect x="185" y="395" width="70" height="10" fill="#1976d2"/>
    <rect x="185" y="408" width="70" height="20" fill="#64b5f6"/>

    <rect x="280" y="370" width="90" height="60" fill="#bbdefb" stroke="#1976d2" stroke-width="1" rx="3"/>
    <text x="325" y="387" font-size="11" text-anchor="middle" fill="#333">GridLayout</text>
    <rect x="290" y="395" width="20" height="15" fill="#1976d2"/>
    <rect x="315" y="395" width="20" height="15" fill="#1976d2"/>
    <rect x="340" y="395" width="20" height="15" fill="#1976d2"/>
    <rect x="290" y="413" width="20" height="15" fill="#1976d2"/>
    <rect x="315" y="413" width="20" height="15" fill="#1976d2"/>
    <rect x="340" y="413" width="20" height="15" fill="#1976d2"/>
  </g>

  <!-- Step 5: Event Handling -->
  <g id="step5" class="step" data-narration="Swing uses event listeners to respond to user actions. You register listeners like ActionListener for button clicks, MouseListener for mouse events, making applications interactive and responsive.">
    <rect x="410" y="330" width="340" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="580" y="355" font-size="15" font-weight="bold" text-anchor="middle" fill="#388e3c">Event Handling</text>
    <rect x="440" y="375" width="120" height="35" fill="#81c784" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="500" y="397" font-size="12" fill="white" text-anchor="middle">Button Click</text>
    <line x1="560" y1="392" x2="590" y2="392" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="590" y="370" width="140" height="50" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3"/>
    <text x="660" y="390" font-size="11" text-anchor="middle" fill="#333">ActionListener</text>
    <text x="660" y="408" font-size="10" text-anchor="middle" fill="#555">actionPerformed()</text>
  </g>

  <!-- Step 6: MVC Architecture -->
  <g id="step6" class="step" data-narration="Swing follows the Model View Controller architecture. The Model holds data, View displays the interface, and Controller handles user interactions, promoting clean separation of concerns.">
    <rect x="50" y="470" width="700" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="400" y="495" font-size="15" font-weight="bold" text-anchor="middle" fill="#ff9800">MVC Architecture</text>
    <circle cx="200" cy="535" r="25" fill="#ffccbc" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="542" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Model</text>
    <circle cx="400" cy="535" r="25" fill="#ffe0b2" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="542" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">View</text>
    <circle cx="600" cy="535" r="25" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="600" y="542" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Controller</text>
    <line x1="225" y1="535" x2="375" y2="535" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="425" y1="535" x2="575" y2="535" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
</svg>