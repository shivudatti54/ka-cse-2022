<svg viewBox="0 0 800 1400" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#e3f2fd"/>
<stop offset="100%" style="stop-color:#bbdefb"/>
</linearGradient>
<linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#e8f5e9"/>
<stop offset="100%" style="stop-color:#c8e6c9"/>
</linearGradient>
<linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#fff3e0"/>
<stop offset="100%" style="stop-color:#ffe0b2"/>
</linearGradient>
<linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#f3e5f5"/>
<stop offset="100%" style="stop-color:#e1bee7"/>
</linearGradient>
<linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#ffebee"/>
<stop offset="100%" style="stop-color:#ffcdd2"/>
</linearGradient>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
</marker>
<marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
</marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
</filter>
<style>
@keyframes fadeInSlide {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
from { opacity: 0; transform: scale(0.85); }
to { opacity: 1; transform: scale(1); }
}
@keyframes textReveal {
from { opacity: 0; transform: translateX(-10px); }
to { opacity: 1; transform: translateX(0); }
}
@keyframes pulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.03); }
}
@keyframes drawLine {
from { stroke-dashoffset: 200; }
to { stroke-dashoffset: 0; }
}
@keyframes growHeight {
from { height: 0; }
}
@keyframes highlightPulse {
0%, 100% { fill: #1976d2; }
50% { fill: #42a5f5; }
}
.step { animation: fadeInSlide 0.6s ease-out; }
.step rect {
animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
transform-origin: center;
}
.step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
.highlight-text { animation: highlightPulse 1.5s ease-in-out infinite; }
</style>
</defs>
<rect width="800" height="1400" fill="#f8f9fa"/>

<!-- STEP 0: Title -->
<g class="step" id="step0" data-narration="Welcome to ResultSet - the key interface for retrieving database query results in JDBC">
<rect x="40" y="10" width="720" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
<text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565c0">ResultSet - JDBC Data Retrieval</text>
</g>

<!-- STEP 1: Definition -->
<g class="step" id="step1" data-narration="A ResultSet is a table of data representing the result of a database query, with a cursor to track position">
<rect x="40" y="65" width="720" height="85" rx="8" fill="white" filter="url(#shadow)"/>
<text x="60" y="85" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">What is a ResultSet?</text>
<text x="60" y="105" font-family="Arial, sans-serif" font-size="10" fill="#424242">A ResultSet is a <tspan font-weight="bold">table of data</tspan> returned by a SQL query through JDBC.</text>
<text x="60" y="120" font-family="Arial, sans-serif" font-size="10" fill="#424242">It acts as a <tspan font-weight="bold">cursor</tspan> that points to one row at a time in the result.</text>
<text x="60" y="135" font-family="Arial, sans-serif" font-size="10" fill="#424242">Enables iteration and data extraction from database tables.</text>
<rect x="620" y="75" width="120" height="60" rx="6" fill="url(#greenGrad)"/>
<text x="680" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e7d32">SELECT * FROM</text>
<text x="680" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e7d32">users</text>
</g>

<!-- STEP 2: ResultSet Types -->
<g class="step" id="step2" data-narration="There are two main types: Forward Only for simple iteration, and Scrollable for bidirectional navigation">
<rect x="40" y="160" width="350" height="90" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
<text x="60" y="182" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100">Forward Only ResultSet</text>
<text x="60" y="200" font-family="Arial, sans-serif" font-size="9" fill="#424242">• Default type in JDBC</text>
<text x="60" y="214" font-family="Arial, sans-serif" font-size="9" fill="#424242">• Moves only forward (next())</text>
<text x="60" y="228" font-family="Arial, sans-serif" font-size="9" fill="#424242">• Most performant option</text>

<rect x="410" y="160" width="350" height="90" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
<text x="430" y="182" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7b1fa2">Scrollable ResultSet</text>
<text x="430" y="200" font-family="Arial, sans-serif" font-size="9" fill="#424242">• Bidirectional navigation</text>
<text x="430" y="214" font-family="Arial, sans-serif" font-size="9" fill="#424242">• Supports previous(), absolute()</text>
<text x="430" y="228" font-family="Arial, sans-serif" font-size="9" fill="#424242">• Use: createStatement(type, concurrency)</text>
</g>

<!-- STEP 3: Navigation Methods - Part 1 -->
<g class="step" id="step3" data-narration="Core navigation methods include next() to move forward and previous() to move backward through rows">
<rect x="40" y="260" width="720" height="100" rx="8" fill="white" filter="url(#shadow)"/>
<text x="60" y="285" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">Navigation Methods (Cursor Movement)</text>
<rect x="60" y="300" width="140" height="50" rx="6" fill="url(#greenGrad)"/>
<text x="130" y="322" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#2e7d32">next()</text>
<text x="130" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#388e3c">Move to next row</text>

<rect x="210" y="300" width="140" height="50" rx="6" fill="url(#greenGrad)"/>
<text x="280" y="322" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#2e7d32">previous()</text>
<text x="280" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#388e3c">Move to previous row</text>

<rect x="360" y="300" width="140" height="50" rx="6" fill="url(#greenGrad)"/>
<text x="430" y="322" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#2e7d32">last()</text>
<text x="430" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#388e3c">Jump to last row</text>

<rect x="510" y="300" width="140" height="50" rx="6" fill="url(#greenGrad)"/>
<text x="580" y="322" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#2e7d32">first()</text>
<text x="580" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#388e3c">Jump to first row</text>
</g>

<!-- STEP 4: Navigation Methods - Part 2 -->
<g class="step" id="step4" data-narration="Advanced navigation includes absolute() to jump to a specific row and relative() to move by offset">
<rect x="40" y="370" width="720" height="100" rx="8" fill="white" filter="url(#shadow)"/>
<text x="60" y="395" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">Advanced Navigation Methods</text>
<rect x="60" y="410" width="160" height="50" rx="6" fill="url(#orangeGrad)"/>
<text x="140" y="432" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e65100">absolute(int row)</text>
<text x="140" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f57c00">Jump to specific row</text>

<rect x="230" y="410" width="160" height="50" rx="6" fill="url(#orangeGrad)"/>
<text x="310" y="432" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e65100">relative(int offset)</text>
<text x="310" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f57c00">Move by offset rows</text>

<rect x="400" y="410" width="160" height="50" rx="6" fill="url(#orangeGrad)"/>
<text x="480" y="432" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e65100">beforeFirst()</text>
<text x="480" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f57c00">Before first row</text>

<rect x="570" y="410" width="160" height="50" rx="6" fill="url(#orangeGrad)"/>
<text x="650" y="432" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#e65100">afterLast()</text>
<text x="650" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f57c00">After last row</text>
</g>

<!-- STEP 5: Cursor Position Diagram -->
<g class="step" id="step5" data-narration="The ResultSet cursor starts before the first row, moves through data, and ends after the last row">
<rect x="40" y="480" width="720" height="95" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
<text x="400" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">ResultSet Cursor Positions</text>
<rect x="80" y="520" width="100" height="40" rx="4" fill="#e0e0e0"/>
<text x="130" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#616161">beforeFirst()</text>
<path d="M185 540 L215 540" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="220" y="515" width="80" height="50" rx="4" fill="#4caf50"/>
<text x="260" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Row 1</text>
<text x="260" y="548" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">current</text>
<path d="M305 540 L335 540" stroke="#1976d2" stroke-width="2"/>
<rect x="340" y="515" width="80" height="50" rx="4" fill="#81c784"/>
<text x="380" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1b5e20">Row 2...</text>
<path d="M425 540 L455 540" stroke="#1976d2" stroke-width="2"/>
<rect x="460" y="515" width="80" height="50" rx="4" fill="#e0e0e0"/>
<text x="500" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#616161">afterLast()</text>
</g>

<!-- STEP 6: Data Retrieval Methods -->
<g class="step" id="step6" data-narration="Use getter methods like getString(), getInt(), getDouble() to retrieve column values from the current row">
<rect x="40" y="585" width="720" height="95" rx="8" fill="white" filter="url(#shadow)"/>
<text x="60" y="610" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">Data Retrieval (Getter Methods)</text>
<text x="60" y="630" font-family="Arial, sans-serif" font-size="10" fill="#424242">Retrieve data using column index or name:</text>
<rect x="60" y="640" width="160" height="30" rx="4" fill="url(#greenGrad)"/>
<text x="140" y="658" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e7d32">rs.getString(1)</text>
<rect x="230" y="640" width="160" height="30" rx="4" fill="url(#greenGrad)"/>
<text x="310" y="658" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e7d32">rs.getInt("age")</text>
<rect x="400" y="640" width="160" height="30" rx="4" fill="url(#greenGrad)"/>
<text x="480" y="658" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e7d32">rs.getDouble("salary")</text>
<rect x="570" y="640" width="160" height="30" rx="4" fill="url(#greenGrad)"/>
<text x="650" y="658" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e7d32">rs.getDate("join_date")</text>
</g>

<!-- STEP 7: ResultSet Metadata -->
<g class="step" id="step7" data-narration="ResultSetMetaData provides information about the number, types, and properties of columns in the result set">
<rect x="40" y="690" width="720" height="100" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
<text x="60" y="715" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7b1fa2">ResultSetMetaData</text>
<text x="60" y="735" font-family="Arial, sans-serif" font-size="10" fill="#424242">Get metadata using: <tspan font-family="monospace">rs.getMetaData()</tspan></text>
<rect x="60" y="750" width="165" height="30" rx="4" fill="white"/>
<text x="142" y="768" text-anchor="middle" font-family="monospace" font-size="9" fill="#7b1fa2">getColumnCount()</text>
<rect x="235" y="750" width="165" height="30" rx="4" fill="white"/>
<text x="317" y="768" text-anchor="middle" font-family="monospace" font-size="9" fill="#7b1fa2">getColumnLabel(index)</text>
<rect x="410" y="750" width="165" height="30" rx="4" fill="white"/>
<text x="492" y="768" text-anchor="middle" font-family="monospace" font-size="9" fill="#7b1fa2">getColumnTypeName()</text>
<rect x="585" y="750" width="165" height="30" rx="4" fill="white"/>
<text x="667" y="768" text-anchor="middle" font-family="monospace" font-size="9" fill="#7b1fa2">getColumnSize(index)</text>
</g>

<!-- STEP 8: Metadata Example -->
<g class="step" id="step8" data-narration="Use metadata to dynamically discover query result structure at runtime without hardcoding column information">
<rect x="40" y="800" width="720" height="90" rx="8" fill="white" filter="url(#shadow)"/>
<text x="60" y="825" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">Metadata Usage Example</text>
<rect x="60" y="840" width="680" height="40" rx="4" fill="#263238"/>
<text x="70" y="858" font-family="monospace" font-size="9" fill="#80cbc4">ResultSetMetaData meta = rs.getMetaData();</text>
<text x="70" y="873" font-family="monospace" font-size="9" fill="#80cbc4">int cols = meta.getColumnCount();</text>
<text x="400" y="873" font-family="monospace" font-size="9" fill="#80cbc4">// Dynamic column discovery</text>
</g>

<!-- STEP 9: Iteration Pattern -->
<g class="step" id="step9" data-narration="The standard iteration pattern uses a while loop with next() to traverse all rows in the result set">
<rect x="40" y="900" width="720" height="90" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
<text x="60" y="925" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Standard Iteration Pattern</text>
<rect x="60" y="940" width="680" height="40" rx="4" fill="#1b5e20"/>
<text x="70" y="958" font-family="monospace" font-size="9" fill="#a5d6a7">while (rs.next()) {</text>
<text x="90" y="973" font-family="monospace" font-size="9" fill="#a5d6a7">String name = rs.getString("name");</text>
<text x="90" y="988" font-family="monospace" font-size="9" fill="#a5d6a7">System.out.println(name);</text>
<text x="70" y="1003" font-family="monospace" font-size="9" fill="#a5d6a7">}</text>
</g>

<!-- STEP 10: Complete Flow -->
<g class="step" id="step10" data-narration="The complete JDBC flow involves creating a connection, statement, executing query, processing results, then closing resources">
<rect x="40" y="1000" width="720" height="100" rx="8" fill="white" filter="url(#shadow)"/>
<text x="60" y="1025" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1976d2">Complete JDBC ResultSet Flow</text>
<rect x="60" y="1040" width="120" height="50" rx="6" fill="url(#blueGrad)"/>
<text x="120" y="1060" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1565c0">1. Connection</text>
<text x="120" y="1075" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1565c0">DriverManager</text>
<path d="M185 1065 L215 1065" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="220" y="1040" width="120" height="50" rx="6" fill="url(#orangeGrad)"/>
<text x="280" y="1060" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#e65100">2. Statement</text>
<text x="280" y="1075" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e65100">createStatement()</text>
<path d="M345 1065 L375 1065" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="380" y="1040" width="120" height="50" rx="6" fill="url(#greenGrad)"/>
<text x="440" y="1060" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2e7d32">3. Execute</text>
<text x="440" y="1075" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2e7d32">executeQuery()</text>
<path d="M505 1065 L535 1065" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="540" y="1040" width="120" height="50" rx="6" fill="url(#purpleGrad)"/>
<text x="600" y="1060" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7b1fa2">4. Process</text>
<text x="600" y="1075" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7b1fa2">while(next)</text>
<path d="M665 1065 L695 1065" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
<rect x="700" y="1040" width="50" height="50" rx="25" fill="url(#redGrad)"/>
<text x="725" y="1067" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#c62828">Close</text>
</g>

<!-- STEP 11: Key Takeaways -->
<g class="step" id="step11" data-narration="Key points: ResultSet is the primary data structure for JDBC query results with cursor-based navigation">
<rect x="40" y="1110" width="720" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
<text x="60" y="1135" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Key Takeaways</text>
<text x="60" y="1155" font-family="Arial, sans-serif" font-size="10" fill="#424242">• ResultSet provides <tspan font-weight="bold">cursor-based access</tspan> to query results</text>
<text x="60" y="1172" font-family="Arial, sans-serif" font-size="10" fill="#424242">• Use <tspan font-family="monospace">next()</tspan> to iterate; close resources after use</text>
<text x="60" y="1189" font-family="Arial, sans-serif" font-size="10" fill="#424242">• ResultSetMetaData enables <tspan font-weight="bold">dynamic schema discovery</tspan></text>
</g>

<!-- STEP 12: Summary -->
<g class="step" id="step12" data-narration="This diagram covered ResultSet definition, types, navigation methods, data retrieval, metadata, and complete JDBC workflow">
<rect x="40" y="1205" width="720" height="70" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
<text x="400" y="1235" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">Summary: ResultSet Essentials</text>
<text x="400" y="1258" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#424242">Definition → Types → Navigation → Retrieval → Metadata → Workflow</text>
</g>
</svg>