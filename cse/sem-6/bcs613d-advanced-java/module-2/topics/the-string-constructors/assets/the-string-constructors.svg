<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="The String class in Java provides multiple constructors for creating strings from different sources. Each constructor serves a specific purpose for string initialization and conversion.">
    <rect x="150" y="50" width="500" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="85" font-size="22" font-weight="bold" text-anchor="middle" fill="#1976d2">String Constructors</text>
    <text x="400" y="115" font-size="16" text-anchor="middle" fill="#333">Multiple ways to create String objects</text>
  </g>

  <!-- Step 1: Default and string parameter constructor -->
  <g id="step1" class="step" data-narration="The default constructor creates an empty string, while the string parameter constructor creates a copy of an existing string. These are the simplest constructors for basic string creation.">
    <rect x="80" y="160" width="320" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="240" y="190" font-size="15" font-weight="bold" text-anchor="middle" fill="#388e3c">Basic Constructors</text>
    <text x="240" y="220" font-size="13" font-family="monospace" text-anchor="middle" fill="#333">new String()</text>
    <text x="240" y="238" font-size="11" text-anchor="middle" fill="#666">Empty string</text>
    <text x="240" y="252" font-size="13" font-family="monospace" text-anchor="middle" fill="#333">new String("Hello")</text>
  </g>

  <!-- Step 2: Character array constructor -->
  <g id="step2" class="step" data-narration="The character array constructor creates a string from an array of characters. You can convert the entire array or specify a starting offset and length for partial conversion.">
    <rect x="440" y="160" width="280" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="580" y="190" font-size="15" font-weight="bold" text-anchor="middle" fill="#ff9800">From char array</text>
    <text x="580" y="218" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">char[] chars = {'H','i'};</text>
    <text x="580" y="238" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">new String(chars)</text>
    <text x="580" y="253" font-size="10" text-anchor="middle" fill="#666">Creates "Hi"</text>
  </g>

  <!-- Step 3: Byte array constructor -->
  <g id="step3" class="step" data-narration="The byte array constructor creates a string from an array of bytes. This is useful when reading binary data or working with different character encodings like UTF-8 or ASCII.">
    <rect x="80" y="290" width="320" height="120" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="240" y="320" font-size="15" font-weight="bold" text-anchor="middle" fill="#9c27b0">From byte array</text>
    <text x="240" y="348" font-size="11" font-family="monospace" text-anchor="middle" fill="#333">byte[] bytes = {72,101,108,108,111};</text>
    <text x="240" y="368" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">new String(bytes)</text>
    <text x="240" y="388" font-size="11" font-family="monospace" text-anchor="middle" fill="#333">new String(bytes, "UTF-8")</text>
    <text x="240" y="403" font-size="10" text-anchor="middle" fill="#666">With charset encoding</text>
  </g>

  <!-- Step 4: StringBuffer and StringBuilder constructor -->
  <g id="step4" class="step" data-narration="You can create strings from StringBuffer or StringBuilder objects. This converts the mutable sequence back to an immutable string, often used after building content dynamically.">
    <rect x="440" y="290" width="280" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="580" y="320" font-size="15" font-weight="bold" text-anchor="middle" fill="#1976d2">From StringBuilder</text>
    <text x="580" y="348" font-size="11" font-family="monospace" text-anchor="middle" fill="#333">StringBuilder sb =</text>
    <text x="580" y="365" font-size="11" font-family="monospace" text-anchor="middle" fill="#333">  new StringBuilder("Hi");</text>
    <text x="580" y="385" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">new String(sb)</text>
    <text x="580" y="403" font-size="10" text-anchor="middle" fill="#666">Convert mutable to immutable</text>
  </g>

  <!-- Step 5: Constructor usage -->
  <g id="step5" class="step" data-narration="Each constructor has specific use cases. Character arrays are common for text manipulation, byte arrays for file I/O and network data, and StringBuilder conversion for efficient string building operations.">
    <rect x="100" y="440" width="600" height="140" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="400" y="470" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">When to Use Each Constructor</text>

    <circle cx="150" cy="500" r="6" fill="#388e3c"/>
    <text x="170" y="505" font-size="13" text-anchor="start" fill="#333">char[] - Text processing and manipulation</text>

    <circle cx="150" cy="525" r="6" fill="#ff9800"/>
    <text x="170" y="530" font-size="13" text-anchor="start" fill="#333">byte[] - File I/O, network data, encoding conversion</text>

    <circle cx="150" cy="550" r="6" fill="#1976d2"/>
    <text x="170" y="555" font-size="13" text-anchor="start" fill="#333">StringBuilder/Buffer - After dynamic string building</text>
  </g>
</svg>
