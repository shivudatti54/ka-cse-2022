<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="Java provides built-in methods to change the case of characters in strings. The toLowerCase() and toUpperCase() methods create new strings with all characters converted to the specified case.">
    <rect x="150" y="80" width="500" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="115" font-size="22" font-weight="bold" text-anchor="middle" fill="#1976d2">Case Conversion in Java</text>
    <text x="400" y="145" font-size="16" text-anchor="middle" fill="#333">toLowerCase() and toUpperCase() Methods</text>
  </g>

  <!-- Step 1: Original String -->
  <g id="step1" class="step" data-narration="Let's start with an original string containing mixed case characters. This string will be our input for demonstrating both case conversion methods.">
    <rect x="250" y="200" width="300" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="400" y="225" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff9800">Original String</text>
    <text x="400" y="250" font-size="18" font-family="monospace" text-anchor="middle" fill="#333">"Hello, World!"</text>
  </g>

  <!-- Step 2: toLowerCase() transformation -->
  <g id="step2" class="step" data-narration="The toLowerCase() method converts all uppercase letters to lowercase. It returns a new string with characters like H becoming h and W becoming w.">
    <path d="M 300 260 L 200 320" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="50" y="320" width="300" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="200" y="350" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">toLowerCase()</text>
    <text x="200" y="375" font-size="18" font-family="monospace" text-anchor="middle" fill="#333">"hello, world!"</text>
    <text x="200" y="405" font-size="13" text-anchor="middle" fill="#666">All characters converted to lowercase</text>
  </g>

  <!-- Step 3: toUpperCase() transformation -->
  <g id="step3" class="step" data-narration="The toUpperCase() method converts all lowercase letters to uppercase. Characters like e become E and o becomes O, while punctuation remains unchanged.">
    <path d="M 500 260 L 600 320" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="450" y="320" width="300" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="600" y="350" font-size="16" font-weight="bold" text-anchor="middle" fill="#9c27b0">toUpperCase()</text>
    <text x="600" y="375" font-size="18" font-family="monospace" text-anchor="middle" fill="#333">"HELLO, WORLD!"</text>
    <text x="600" y="405" font-size="13" text-anchor="middle" fill="#666">All characters converted to uppercase</text>
  </g>

  <!-- Step 4: Immutability note -->
  <g id="step4" class="step" data-narration="Remember that strings in Java are immutable. These methods don't modify the original string but create and return new string objects with the converted case.">
    <rect x="200" y="450" width="400" height="70" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="400" y="475" font-size="16" font-weight="bold" text-anchor="middle" fill="#f44336">Important: String Immutability</text>
    <text x="400" y="500" font-size="13" text-anchor="middle" fill="#333">Original string remains unchanged</text>
    <text x="400" y="518" font-size="13" text-anchor="middle" fill="#333">Methods return NEW string objects</text>
  </g>

  <!-- Step 5: Common use cases -->
  <g id="step5" class="step" data-narration="Case conversion is essential for case-insensitive comparisons, data normalization, and formatting output. It's commonly used in search functionality and user input processing.">
    <rect x="150" y="540" width="500" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="567" font-size="14" text-anchor="middle" fill="#333">Use Cases: Searching • Validation • Normalization • Display</text>
  </g>
</svg>
