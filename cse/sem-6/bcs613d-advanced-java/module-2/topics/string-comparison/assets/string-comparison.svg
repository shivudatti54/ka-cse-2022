<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="String comparison in Java uses several methods to compare string content and order. The equals() method checks for exact content match, while compareTo() determines lexicographic ordering.">
    <rect x="150" y="50" width="500" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="85" font-size="22" font-weight="bold" text-anchor="middle" fill="#1976d2">String Comparison</text>
    <text x="400" y="115" font-size="16" text-anchor="middle" fill="#333">equals(), equalsIgnoreCase(), and compareTo()</text>
  </g>

  <!-- Step 1: equals() method -->
  <g id="step1" class="step" data-narration="The equals() method performs case-sensitive content comparison. It returns true only when both strings have exactly the same characters in the same order with matching case.">
    <rect x="80" y="160" width="300" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="230" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">equals()</text>
    <text x="230" y="220" font-size="13" font-family="monospace" text-anchor="middle" fill="#333">"Java".equals("Java")</text>
    <text x="230" y="245" font-size="18" text-anchor="middle" fill="#388e3c">true</text>
    <text x="230" y="268" font-size="13" font-family="monospace" text-anchor="middle" fill="#333">"Java".equals("java")</text>
    <text x="230" y="273" font-size="18" text-anchor="middle" fill="#f44336">false</text>
  </g>

  <!-- Step 2: equalsIgnoreCase() method -->
  <g id="step2" class="step" data-narration="The equalsIgnoreCase() method compares content while ignoring case differences. This is useful for user input validation where case shouldn't matter.">
    <rect x="420" y="160" width="300" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="570" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff9800">equalsIgnoreCase()</text>
    <text x="570" y="218" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">"Java".equalsIgnoreCase</text>
    <text x="570" y="235" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">("java")</text>
    <text x="570" y="263" font-size="18" text-anchor="middle" fill="#388e3c">true</text>
  </g>

  <!-- Step 3: compareTo() method -->
  <g id="step3" class="step" data-narration="The compareTo() method determines lexicographic order. It returns zero if strings are equal, a negative number if the first string comes before the second, and positive if it comes after.">
    <rect x="80" y="310" width="640" height="120" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="400" y="340" font-size="16" font-weight="bold" text-anchor="middle" fill="#9c27b0">compareTo() - Lexicographic Ordering</text>

    <circle cx="150" cy="370" r="6" fill="#388e3c"/>
    <text x="170" y="375" font-size="13" font-family="monospace" text-anchor="start" fill="#333">"apple".compareTo("banana") → negative</text>

    <circle cx="150" cy="395" r="6" fill="#1976d2"/>
    <text x="170" y="400" font-size="13" font-family="monospace" text-anchor="start" fill="#333">"apple".compareTo("apple") → 0</text>

    <circle cx="150" cy="420" r="6" fill="#ff9800"/>
    <text x="170" y="425" font-size="13" font-family="monospace" text-anchor="start" fill="#333">"banana".compareTo("apple") → positive</text>
  </g>

  <!-- Step 4: Comparison methods table -->
  <g id="step4" class="step" data-narration="Each comparison method serves a specific purpose. Use equals for exact matching, equalsIgnoreCase for flexible matching, and compareTo for sorting and ordering operations.">
    <rect x="100" y="460" width="600" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="490" font-size="16" font-weight="bold" text-anchor="middle" fill="#1976d2">When to Use Each Method</text>
    <text x="400" y="515" font-size="13" text-anchor="middle" fill="#333">• equals(): Exact match • equalsIgnoreCase(): Case-insensitive match</text>
    <text x="400" y="540" font-size="13" text-anchor="middle" fill="#333">• compareTo(): Sorting and ordering • regionMatches(): Partial comparison</text>
  </g>

  <!-- Step 5: Important notes -->
  <g id="step5" class="step" data-narration="Never use double equals for string comparison as it checks reference equality, not content. Always use equals() or compareTo() methods for proper string comparison in Java applications.">
    <rect x="200" y="575" width="400" height="15" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="3"/>
    <text x="400" y="586" font-size="11" text-anchor="middle" fill="#f44336">Never use == for string comparison • Use equals() for content</text>
  </g>
</svg>
