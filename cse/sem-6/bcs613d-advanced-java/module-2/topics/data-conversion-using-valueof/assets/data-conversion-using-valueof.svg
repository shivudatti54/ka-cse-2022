<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="The valueOf() method in Java is used for data conversion between strings and other data types. It's a static method that creates wrapper objects from strings.">
    <rect x="150" y="60" width="500" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="95" font-size="22" font-weight="bold" text-anchor="middle" fill="#1976d2">valueOf() Method</text>
    <text x="400" y="125" font-size="16" text-anchor="middle" fill="#333">Converting Strings to Wrapper Objects</text>
  </g>

  <!-- Step 1: String to Integer conversion -->
  <g id="step1" class="step" data-narration="Integer dot valueOf converts a string representation of a number into an Integer object. For example, the string four five six becomes the Integer object with value 456.">
    <rect x="80" y="180" width="300" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="230" y="210" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">String to Integer</text>
    <text x="230" y="240" font-size="14" font-family="monospace" text-anchor="middle" fill="#333">String numberStr = "456"</text>
    <path d="M 230 250 L 230 265" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="230" y="280" font-size="14" font-family="monospace" text-anchor="middle" fill="#333">Integer.valueOf(numberStr)</text>
  </g>

  <!-- Step 2: Binary conversion with radix -->
  <g id="step2" class="step" data-narration="The valueOf() method supports a radix parameter for parsing numbers in different bases. When parsing binary string one one one one with radix 2, it converts to decimal value 15.">
    <rect x="420" y="180" width="300" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="570" y="210" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff9800">Binary to Integer</text>
    <text x="570" y="240" font-size="14" font-family="monospace" text-anchor="middle" fill="#333">String binary = "1111"</text>
    <path d="M 570 250 L 570 265" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="570" y="280" font-size="13" font-family="monospace" text-anchor="middle" fill="#333">Integer.valueOf(binary, 2)</text>
  </g>

  <!-- Step 3: Conversion flow -->
  <g id="step3" class="step" data-narration="The conversion process involves parsing the string characters, validating the format, and creating the corresponding wrapper object. This ensures type safety and proper error handling.">
    <rect x="150" y="320" width="220" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="260" y="350" font-size="15" font-weight="bold" text-anchor="middle" fill="#9c27b0">Conversion Process</text>
    <text x="260" y="375" font-size="12" text-anchor="middle" fill="#333">1. Parse string</text>
    <text x="260" y="392" font-size="12" text-anchor="middle" fill="#333">2. Create wrapper object</text>
  </g>

  <!-- Step 4: Result objects -->
  <g id="step4" class="step" data-narration="The result is a wrapper object, not a primitive. Integer objects can be used where objects are required and provide additional utility methods for number manipulation.">
    <rect x="430" y="320" width="220" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="540" y="350" font-size="15" font-weight="bold" text-anchor="middle" fill="#1976d2">Results</text>
    <circle cx="490" cy="375" r="5" fill="#388e3c"/>
    <text x="505" y="380" font-size="13" text-anchor="start" fill="#333">Integer: 456</text>
    <circle cx="490" cy="392" r="5" fill="#388e3c"/>
    <text x="505" y="397" font-size="13" text-anchor="start" fill="#333">Binary 1111 → 15</text>
  </g>

  <!-- Step 5: Common uses -->
  <g id="step5" class="step" data-narration="The valueOf() method is essential for parsing user input, reading configuration files, and converting data from external sources. It handles various numeric formats and bases efficiently.">
    <rect x="100" y="430" width="600" height="130" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="400" y="460" font-size="18" font-weight="bold" text-anchor="middle" fill="#388e3c">Common Use Cases</text>
    <text x="400" y="490" font-size="14" text-anchor="middle" fill="#333">• User input parsing (forms, console)</text>
    <text x="400" y="515" font-size="14" text-anchor="middle" fill="#333">• Configuration file reading</text>
    <text x="400" y="540" font-size="14" text-anchor="middle" fill="#333">• Different base conversions (binary, hex, octal)</text>
  </g>
</svg>
