<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="String handling in Java involves working with immutable character sequences. The String class is one of the most fundamental and commonly used classes in Java programming.">
    <rect x="150" y="50" width="500" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="85" font-size="22" font-weight="bold" text-anchor="middle" fill="#1976d2">String Handling in Java</text>
    <text x="400" y="115" font-size="16" text-anchor="middle" fill="#333">Working with Immutable Character Sequences</text>
  </g>

  <!-- Step 1: String immutability -->
  <g id="step1" class="step" data-narration="Strings in Java are immutable, meaning their content cannot change after creation. This immutability provides thread safety and allows string pooling for memory efficiency.">
    <rect x="100" y="160" width="280" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="240" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">Immutability</text>
    <text x="240" y="220" font-size="13" text-anchor="middle" fill="#333">Once created,</text>
    <text x="240" y="240" font-size="13" text-anchor="middle" fill="#333">content cannot change</text>
    <text x="240" y="260" font-size="11" text-anchor="middle" fill="#666">✓ Thread-safe</text>
  </g>

  <!-- Step 2: String pool -->
  <g id="step2" class="step" data-narration="String literals are stored in the string pool, a special memory area in the heap. This allows Java to reuse identical string literals, reducing memory consumption significantly.">
    <rect x="420" y="160" width="280" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="560" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff9800">String Pool</text>
    <text x="560" y="220" font-size="13" text-anchor="middle" fill="#333">Literals stored in</text>
    <text x="560" y="240" font-size="13" text-anchor="middle" fill="#333">special memory area</text>
    <text x="560" y="260" font-size="11" text-anchor="middle" fill="#666">Memory optimization</text>
  </g>

  <!-- Step 3: String creation methods -->
  <g id="step3" class="step" data-narration="Strings can be created using literals with double quotes or using the new keyword with constructors. String literals automatically go to the pool, while new creates objects in the heap.">
    <rect x="100" y="300" width="600" height="120" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="400" y="330" font-size="16" font-weight="bold" text-anchor="middle" fill="#9c27b0">String Creation Methods</text>

    <circle cx="150" cy="360" r="6" fill="#388e3c"/>
    <text x="170" y="365" font-size="13" font-family="monospace" text-anchor="start" fill="#333">String str1 = "Hello";  // String literal (pool)</text>

    <circle cx="150" cy="385" r="6" fill="#ff9800"/>
    <text x="170" y="390" font-size="13" font-family="monospace" text-anchor="start" fill="#333">String str2 = new String("Hello");  // Heap object</text>

    <circle cx="150" cy="410" r="6" fill="#1976d2"/>
    <text x="170" y="415" font-size="13" font-family="monospace" text-anchor="start" fill="#333">char[] chars = {'H', 'i'}; String str3 = new String(chars);</text>
  </g>

  <!-- Step 4: Common string operations -->
  <g id="step4" class="step" data-narration="The String class provides numerous methods for manipulation including length, charAt, substring, concat, replace, and case conversion. All operations return new strings due to immutability.">
    <rect x="100" y="450" width="280" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="240" y="480" font-size="15" font-weight="bold" text-anchor="middle" fill="#1976d2">Common Operations</text>
    <text x="240" y="505" font-size="12" text-anchor="middle" fill="#333">• length() • charAt()</text>
    <text x="240" y="525" font-size="12" text-anchor="middle" fill="#333">• substring() • concat()</text>
    <text x="240" y="545" font-size="12" text-anchor="middle" fill="#333">• replace() • trim()</text>
    <text x="240" y="565" font-size="12" text-anchor="middle" fill="#333">• toUpperCase() • toLowerCase()</text>
  </g>

  <!-- Step 5: Performance considerations -->
  <g id="step5" class="step" data-narration="For frequent modifications, use StringBuilder or StringBuffer instead of String. These mutable classes avoid creating multiple objects, providing better performance for string manipulation operations.">
    <rect x="420" y="450" width="280" height="120" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="560" y="480" font-size="15" font-weight="bold" text-anchor="middle" fill="#f44336">For Modifications</text>
    <text x="560" y="510" font-size="13" text-anchor="middle" fill="#333">Use StringBuilder</text>
    <text x="560" y="530" font-size="13" text-anchor="middle" fill="#333">or StringBuffer</text>
    <text x="560" y="555" font-size="11" text-anchor="middle" fill="#666">Mutable alternatives for</text>
    <text x="560" y="568" font-size="11" text-anchor="middle" fill="#666">better performance</text>
  </g>
</svg>
