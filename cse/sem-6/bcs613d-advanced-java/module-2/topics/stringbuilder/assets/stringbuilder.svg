<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="StringBuilder is a mutable sequence of characters in Java. Unlike String, StringBuilder can be modified after creation, making it ideal for building strings efficiently through multiple operations.">
    <rect x="150" y="50" width="500" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="85" font-size="22" font-weight="bold" text-anchor="middle" fill="#1976d2">StringBuilder</text>
    <text x="400" y="115" font-size="16" text-anchor="middle" fill="#333">Mutable String Alternative for Performance</text>
  </g>

  <!-- Step 1: Mutable vs Immutable -->
  <g id="step1" class="step" data-narration="While String objects are immutable and create new objects for each modification, StringBuilder modifies the same object. This dramatically improves performance when performing many string operations.">
    <rect x="80" y="160" width="300" height="110" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="230" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#f44336">String (Immutable)</text>
    <text x="230" y="220" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">s = s + "a";  // Creates</text>
    <text x="230" y="240" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">s = s + "b";  // new objects</text>
    <text x="230" y="262" font-size="11" text-anchor="middle" fill="#666">Inefficient for loops</text>

    <rect x="420" y="160" width="300" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="570" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">StringBuilder (Mutable)</text>
    <text x="570" y="220" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">sb.append("a");  // Modifies</text>
    <text x="570" y="240" font-size="12" font-family="monospace" text-anchor="middle" fill="#333">sb.append("b");  // same object</text>
    <text x="570" y="262" font-size="11" text-anchor="middle" fill="#666">Efficient performance</text>
  </g>

  <!-- Step 2: Common operations -->
  <g id="step2" class="step" data-narration="StringBuilder provides methods like append to add content, insert to add at specific positions, delete to remove characters, and reverse to reverse the string. All operations modify the object in place.">
    <rect x="100" y="300" width="600" height="140" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="400" y="330" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff9800">Common StringBuilder Methods</text>

    <circle cx="150" cy="360" r="6" fill="#ff9800"/>
    <text x="170" y="365" font-size="13" font-family="monospace" text-anchor="start" fill="#333">append(String) - Add to end</text>

    <circle cx="150" cy="385" r="6" fill="#ff9800"/>
    <text x="170" y="390" font-size="13" font-family="monospace" text-anchor="start" fill="#333">insert(int, String) - Add at position</text>

    <circle cx="150" cy="410" r="6" fill="#ff9800"/>
    <text x="170" y="415" font-size="13" font-family="monospace" text-anchor="start" fill="#333">delete(int, int) - Remove range</text>

    <circle cx="150" cy="435" r="6" fill="#ff9800"/>
    <text x="170" y="440" font-size="13" font-family="monospace" text-anchor="start" fill="#333">reverse() - Reverse the string</text>
  </g>

  <!-- Step 3: StringBuilder vs StringBuffer -->
  <g id="step3" class="step" data-narration="StringBuilder is not thread-safe but faster, while StringBuffer is thread-safe with synchronized methods but slower. Use StringBuilder for single-threaded applications and StringBuffer when thread safety is required.">
    <rect x="80" y="470" width="300" height="110" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="230" y="500" font-size="15" font-weight="bold" text-anchor="middle" fill="#9c27b0">StringBuilder</text>
    <text x="230" y="525" font-size="12" text-anchor="middle" fill="#333">✗ Not thread-safe</text>
    <text x="230" y="545" font-size="12" text-anchor="middle" fill="#388e3c">✓ Faster performance</text>
    <text x="230" y="567" font-size="11" text-anchor="middle" fill="#666">Single-threaded use</text>

    <rect x="420" y="470" width="300" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="570" y="500" font-size="15" font-weight="bold" text-anchor="middle" fill="#1976d2">StringBuffer</text>
    <text x="570" y="525" font-size="12" text-anchor="middle" fill="#388e3c">✓ Thread-safe</text>
    <text x="570" y="545" font-size="12" text-anchor="middle" fill="#333">Synchronized methods</text>
    <text x="570" y="567" font-size="11" text-anchor="middle" fill="#666">Multi-threaded use</text>
  </g>

  <!-- Step 4: Performance tip -->
  <g id="step4" class="step" data-narration="For string concatenation in loops or multiple modifications, always use StringBuilder instead of String. This avoids creating numerous intermediate objects and significantly improves both speed and memory usage.">
    <rect x="200" y="595" width="400" height="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="0"/>
  </g>
</svg>
