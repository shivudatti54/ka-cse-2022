<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Introduction -->
  <g id="step0" class="step" data-narration="The length() method in Java returns the number of characters in a string. It's one of the most commonly used string methods for validation and iteration.">
    <rect x="150" y="80" width="500" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="400" y="115" font-size="22" font-weight="bold" text-anchor="middle" fill="#1976d2">String Length</text>
    <text x="400" y="145" font-size="16" text-anchor="middle" fill="#333">Counting characters with length() method</text>
  </g>

  <!-- Step 1: Basic usage -->
  <g id="step1" class="step" data-narration="The length() method is called on a string object and returns an integer representing the character count. It includes all characters including spaces and special characters.">
    <rect x="200" y="200" width="400" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="400" y="230" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">Method Signature</text>
    <text x="400" y="260" font-size="18" font-family="monospace" text-anchor="middle" fill="#333">public int length()</text>
    <text x="400" y="287" font-size="13" text-anchor="middle" fill="#666">Returns number of characters</text>
  </g>

  <!-- Step 2: Example with string -->
  <g id="step2" class="step" data-narration="Let's see a practical example. The string Java Programming has 16 characters including the space between the two words. The length method accurately counts them all.">
    <rect x="150" y="330" width="500" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="400" y="365" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff9800">Example</text>
    <text x="400" y="395" font-size="15" font-family="monospace" text-anchor="middle" fill="#333">String text = "Java Programming";</text>
    <text x="400" y="420" font-size="15" font-family="monospace" text-anchor="middle" fill="#333">int length = text.length();</text>
    <text x="400" y="442" font-size="13" text-anchor="middle" fill="#666">Result: length = 16</text>
  </g>

  <!-- Step 3: Important notes -->
  <g id="step3" class="step" data-narration="Remember that length is a method for strings requiring parentheses, but a field for arrays without parentheses. Empty strings have length zero, and length counting starts from one, not zero.">
    <rect x="100" y="480" width="600" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="400" y="510" font-size="16" font-weight="bold" text-anchor="middle" fill="#9c27b0">Key Points</text>
    <circle cx="200" cy="540" r="5" fill="#9c27b0"/>
    <text x="215" y="545" font-size="13" text-anchor="start" fill="#333">String: length() with parentheses (method)</text>
    <circle cx="200" cy="560" r="5" fill="#9c27b0"/>
    <text x="215" y="565" font-size="13" text-anchor="start" fill="#333">Array: length without parentheses (field)</text>
  </g>

  <!-- Step 4: Common uses -->
  <g id="step4" class="step" data-narration="The length method is essential for validation, loop bounds, and string manipulation. It's commonly used to check if a string is empty or to iterate through characters.">
    <rect x="200" y="595" width="400" height="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="0"/>
  </g>
</svg>
