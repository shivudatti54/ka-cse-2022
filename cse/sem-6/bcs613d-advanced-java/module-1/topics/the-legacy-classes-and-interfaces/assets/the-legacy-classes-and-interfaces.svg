<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1976d2">Legacy Classes and Interfaces</text>

  <g id="step0" class="step" data-narration="Legacy classes existed before the Collections Framework in Java one point zero. They include Vector, Stack, Hashtable, Properties, Dictionary abstract class, and Enumeration interface.">
    <rect x="50" y="60" width="700" height="80" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="70" y="90" font-size="16" font-weight="bold" fill="#f44336">Pre-Collections Framework (Java 1.0)</text>
    <text x="70" y="115" font-size="13" fill="#333">Vector, Stack, Hashtable, Properties, Dictionary, Enumeration</text>
    <text x="70" y="133" font-size="12" fill="#666">Still supported for backward compatibility but largely superseded</text>
  </g>

  <g id="step1" class="step" data-narration="Vector is a synchronized dynamic array similar to ArrayList but thread-safe. It doubles in size when capacity is exceeded compared to ArrayList's fifty percent growth.">
    <rect x="50" y="160" width="340" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="70" y="190" font-size="16" font-weight="bold" fill="#1976d2">Vector</text>
    <text x="70" y="215" font-size="13" fill="#333">✓ Synchronized (thread-safe)</text>
    <text x="70" y="235" font-size="13" fill="#333">✓ Doubles size when full</text>
    <text x="70" y="255" font-size="13" fill="#333">✗ Slower than ArrayList</text>

    <line x1="390" y1="215" x2="410" y2="215" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="410" y="160" width="340" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="430" y="190" font-size="16" font-weight="bold" fill="#388e3c">Modern: ArrayList</text>
    <text x="430" y="215" font-size="13" fill="#333">✓ Not synchronized (faster)</text>
    <text x="430" y="235" font-size="13" fill="#333">✓ Grows by 50%</text>
    <text x="430" y="255" font-size="13" fill="#333">✓ Preferred for new code</text>
  </g>

  <g id="step2" class="step" data-narration="Hashtable is a synchronized map implementation that doesn't allow null keys or values. HashMap is the modern unsynchronized alternative that allows one null key and multiple null values.">
    <rect x="50" y="290" width="340" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="70" y="320" font-size="16" font-weight="bold" fill="#1976d2">Hashtable</text>
    <text x="70" y="345" font-size="13" fill="#333">✓ Synchronized (thread-safe)</text>
    <text x="70" y="365" font-size="13" fill="#333">✗ No null keys or values</text>
    <text x="70" y="385" font-size="13" fill="#333">✗ Slower performance</text>

    <line x1="390" y1="345" x2="410" y2="345" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="410" y="290" width="340" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="430" y="320" font-size="16" font-weight="bold" fill="#388e3c">Modern: HashMap</text>
    <text x="430" y="345" font-size="13" fill="#333">✓ Not synchronized (faster)</text>
    <text x="430" y="365" font-size="13" fill="#333">✓ Allows one null key</text>
    <text x="430" y="385" font-size="13" fill="#333">✓ Better performance</text>
  </g>

  <g id="step3" class="step" data-narration="Stack extends Vector for LIFO stack operations with push, pop, and peek methods. The modern alternative is using ArrayDeque as a stack which is faster and more consistent.">
    <rect x="50" y="420" width="340" height="90" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="70" y="450" font-size="16" font-weight="bold" fill="#ff9800">Stack (extends Vector)</text>
    <text x="70" y="475" font-size="13" fill="#333">push(), pop(), peek()</text>
    <text x="70" y="495" font-size="12" fill="#666">Inherits Vector overhead</text>

    <line x1="390" y1="465" x2="410" y2="465" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="410" y="420" width="340" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="430" y="450" font-size="16" font-weight="bold" fill="#388e3c">Modern: ArrayDeque</text>
    <text x="430" y="475" font-size="13" fill="#333">push(), pop(), peek()</text>
    <text x="430" y="495" font-size="12" fill="#666">Faster stack implementation</text>
  </g>

  <g id="step4" class="step" data-narration="Enumeration is the legacy iteration interface replaced by Iterator. Iterator adds remove capability and uses more consistent method names hasNext and next instead of hasMoreElements and nextElement.">
    <rect x="100" y="530" width="600" height="60" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="120" y="560" font-size="14" font-weight="bold" fill="#9c27b0">Enumeration → Iterator: hasMoreElements() → hasNext(), nextElement() → next()</text>
    <text x="120" y="578" font-size="12" fill="#666">Iterator adds remove() method and fail-fast behavior</text>
  </g>
</svg>