<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1976d2">Iterator Pattern for Collections</text>

  <g id="step0" class="step" data-narration="An Iterator provides a standard way to traverse through collection elements sequentially without exposing the underlying structure. It implements a uniform access pattern across different collection types.">
    <rect x="50" y="60" width="700" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="70" y="90" font-size="16" font-weight="bold" fill="#1976d2">Iterator Interface Methods</text>
    <text x="70" y="115" font-size="13" fill="#333">boolean hasNext() - Checks if more elements exist</text>
    <text x="70" y="135" font-size="13" fill="#333">E next() - Returns next element and advances cursor</text>
  </g>

  <g id="step1" class="step" data-narration="Obtaining an iterator from any collection is done through the iterator method. The enhanced for-each loop uses iterators internally for clean syntax.">
    <rect x="50" y="170" width="700" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="70" y="200" font-size="16" font-weight="bold" fill="#388e3c">Obtaining and Using Iterator</text>
    <text x="70" y="230" font-size="12" fill="#333" font-family="monospace">Iterator&lt;String&gt; itr = list.iterator();</text>
    <text x="70" y="250" font-size="12" fill="#333" font-family="monospace">while (itr.hasNext()) {</text>
    <text x="90" y="265" font-size="12" fill="#333" font-family="monospace">String element = itr.next();</text>
    <text x="70" y="280" font-size="12" fill="#333" font-family="monospace">}</text>
  </g>

  <g id="step2" class="step" data-narration="Iterators provide a safe way to remove elements during traversal using the remove method. This avoids ConcurrentModificationException that occurs when modifying collections directly during iteration.">
    <rect x="50" y="290" width="340" height="110" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="70" y="320" font-size="14" font-weight="bold" fill="#f44336">Unsafe - Direct Removal</text>
    <text x="70" y="345" font-size="11" fill="#333" font-family="monospace">for (String s : list) {</text>
    <text x="80" y="363" font-size="11" fill="#333" font-family="monospace">list.remove(s);</text>
    <text x="70" y="381" font-size="11" fill="#333" font-family="monospace">} // Exception!</text>

    <rect x="410" y="290" width="340" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="430" y="320" font-size="14" font-weight="bold" fill="#388e3c">Safe - Iterator Remove</text>
    <text x="430" y="345" font-size="11" fill="#333" font-family="monospace">while (itr.hasNext()) {</text>
    <text x="440" y="363" font-size="11" fill="#333" font-family="monospace">itr.next();</text>
    <text x="440" y="381" font-size="11" fill="#333" font-family="monospace">itr.remove(); // OK</text>
    <text x="430" y="395" font-size="11" fill="#333" font-family="monospace">}</text>
  </g>

  <g id="step3" class="step" data-narration="ListIterator extends Iterator with bidirectional traversal capabilities. It adds methods for moving backward, checking for previous elements, and adding or setting elements during iteration.">
    <rect x="50" y="420" width="700" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="70" y="450" font-size="16" font-weight="bold" fill="#9c27b0">ListIterator - Bidirectional Traversal</text>
    <text x="70" y="475" font-size="13" fill="#333">boolean hasPrevious() &amp; E previous() - Backward navigation</text>
    <text x="70" y="495" font-size="13" fill="#333">void add(E e) &amp; void set(E e) - Modification during iteration</text>
    <text x="70" y="512" font-size="12" fill="#666">ListIterator&lt;E&gt; listItr = list.listIterator();</text>
  </g>

  <g id="step4" class="step" data-narration="Fail-fast iterators detect concurrent modifications and throw exceptions immediately. This behavior helps identify threading issues and incorrect modification patterns during development.">
    <rect x="100" y="540" width="600" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="120" y="570" font-size="13" font-weight="bold" fill="#ff9800">Fail-Fast: Detects concurrent modifications &amp; throws ConcurrentModificationException</text>
  </g>
</svg>