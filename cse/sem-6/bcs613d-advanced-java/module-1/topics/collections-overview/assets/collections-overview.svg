<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1976d2">Collections Framework Overview</text>

  <g id="step0" class="step" data-narration="The Java Collections Framework provides a unified architecture for representing and manipulating collections. It includes interfaces, implementations, and algorithms that work together for efficient data management.">
    <rect x="50" y="60" width="700" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="70" y="90" font-size="16" font-weight="bold" fill="#1976d2">Three Main Components</text>
    <text x="70" y="115" font-size="13" fill="#333">• Interfaces: Abstract data types (List, Set, Map, Queue)</text>
    <text x="70" y="133" font-size="13" fill="#333">• Implementations: Concrete classes (ArrayList, HashSet, HashMap)</text>
  </g>

  <g id="step1" class="step" data-narration="Collection interfaces form a hierarchy starting with Collection as the root. List, Set, and Queue extend Collection while Map stands separate for key-value pairs.">
    <rect x="200" y="160" width="400" height="200" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="400" y="185" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">Interface Hierarchy</text>
    
    <rect x="340" y="200" width="120" height="35" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="400" y="222" font-size="13" text-anchor="middle" fill="#333">Collection</text>
    
    <line x1="400" y1="235" x2="280" y2="260" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="400" y1="235" x2="400" y2="260" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="400" y1="235" x2="520" y2="260" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="230" y="260" width="100" height="30" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="280" y="280" font-size="12" text-anchor="middle" fill="#333">List</text>
    
    <rect x="350" y="260" width="100" height="30" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="400" y="280" font-size="12" text-anchor="middle" fill="#333">Set</text>
    
    <rect x="470" y="260" width="100" height="30" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="520" y="280" font-size="12" text-anchor="middle" fill="#333">Queue</text>

    <rect x="340" y="310" width="120" height="35" fill="#fff" stroke="#ff9800" rx="3"/>
    <text x="400" y="332" font-size="13" text-anchor="middle" fill="#ff9800">Map</text>
    <text x="400" y="350" font-size="10" text-anchor="middle" fill="#666">(separate hierarchy)</text>
  </g>

  <g id="step2" class="step" data-narration="The framework provides benefits including reduced programming effort through reusable components, increased performance with optimized implementations, and interoperability between unrelated APIs.">
    <rect x="50" y="380" width="340" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="70" y="410" font-size="14" font-weight="bold" fill="#ff9800">Framework Benefits</text>
    <text x="70" y="435" font-size="12" fill="#333">✓ Reduced programming effort</text>
    <text x="70" y="455" font-size="12" fill="#333">✓ Increased performance</text>
    <text x="70" y="475" font-size="12" fill="#333">✓ Interoperability</text>

    <rect x="410" y="380" width="340" height="100" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="430" y="410" font-size="14" font-weight="bold" fill="#9c27b0">Key Features</text>
    <text x="430" y="435" font-size="12" fill="#333">✓ Generics for type safety</text>
    <text x="430" y="455" font-size="12" fill="#333">✓ Fail-fast iterators</text>
    <text x="430" y="475" font-size="12" fill="#333">✓ Polymorphic algorithms</text>
  </g>

  <g id="step3" class="step" data-narration="Understanding the Collections Framework is fundamental to Java programming. It enables efficient data storage, retrieval, and manipulation essential for building robust applications.">
    <rect x="100" y="500" width="600" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="120" y="530" font-size="14" font-weight="bold" fill="#1976d2">Core Principles</text>
    <text x="120" y="555" font-size="12" fill="#333">• Program to interfaces, not implementations</text>
    <text x="120" y="572" font-size="12" fill="#333">• Choose implementation based on access patterns and performance needs</text>
  </g>
</svg>