<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1976d2">Collection Classes</text>

  <g id="step0" class="step" data-narration="ArrayList is a resizable array implementation providing fast random access with O(1) get and set operations. It grows by fifty percent when capacity is exceeded and implements RandomAccess interface.">
    <rect x="50" y="60" width="340" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="70" y="90" font-size="18" font-weight="bold" fill="#1976d2">ArrayList</text>
    <text x="70" y="115" font-size="13" fill="#333">✓ Fast random access: O(1)</text>
    <text x="70" y="135" font-size="13" fill="#333">✓ Dynamic resizing (50%)</text>
    <text x="70" y="155" font-size="13" fill="#333">✓ Not synchronized</text>
  </g>

  <g id="step1" class="step" data-narration="LinkedList is a doubly-linked list implementation efficient for insertions and deletions at both ends with O(1) time. It implements both List and Deque interfaces for versatile usage.">
    <rect x="410" y="60" width="340" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="430" y="90" font-size="18" font-weight="bold" fill="#388e3c">LinkedList</text>
    <text x="430" y="115" font-size="13" fill="#333">✓ Efficient insert/delete: O(1)</text>
    <text x="430" y="135" font-size="13" fill="#333">✓ Poor random access: O(n)</text>
    <text x="430" y="155" font-size="13" fill="#333">✓ Implements List &amp; Deque</text>
  </g>

  <g id="step2" class="step" data-narration="HashSet uses a hash table for storage providing constant time performance for basic operations. It offers no ordering guarantees but ensures uniqueness of elements.">
    <rect x="50" y="190" width="340" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="70" y="220" font-size="18" font-weight="bold" fill="#ff9800">HashSet</text>
    <text x="70" y="245" font-size="13" fill="#333">✓ O(1) add, remove, contains</text>
    <text x="70" y="265" font-size="13" fill="#333">✓ No duplicates allowed</text>
    <text x="70" y="285" font-size="13" fill="#333">✓ No ordering guarantees</text>
  </g>

  <g id="step3" class="step" data-narration="TreeSet maintains elements in sorted order using a Red-Black tree structure. Operations take logarithmic time and elements must implement Comparable or use a Comparator.">
    <rect x="410" y="190" width="340" height="110" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="430" y="220" font-size="18" font-weight="bold" fill="#9c27b0">TreeSet</text>
    <text x="430" y="245" font-size="13" fill="#333">✓ Sorted elements (natural/custom)</text>
    <text x="430" y="265" font-size="13" fill="#333">✓ O(log n) operations</text>
    <text x="430" y="285" font-size="13" fill="#333">✓ NavigableSet interface</text>
  </g>

  <g id="step4" class="step" data-narration="HashMap and TreeMap store key-value pairs with different performance characteristics. HashMap offers constant time operations while TreeMap maintains sorted keys with logarithmic time complexity.">
    <rect x="50" y="320" width="340" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="70" y="350" font-size="18" font-weight="bold" fill="#1976d2">HashMap</text>
    <text x="70" y="375" font-size="13" fill="#333">✓ O(1) get, put operations</text>
    <text x="70" y="395" font-size="13" fill="#333">✓ Allows one null key</text>
    <text x="70" y="415" font-size="13" fill="#333">✓ No ordering</text>

    <rect x="410" y="320" width="340" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="430" y="350" font-size="18" font-weight="bold" fill="#388e3c">TreeMap</text>
    <text x="430" y="375" font-size="13" fill="#333">✓ O(log n) operations</text>
    <text x="430" y="395" font-size="13" fill="#333">✓ Sorted keys</text>
    <text x="430" y="415" font-size="13" fill="#333">✓ NavigableMap interface</text>
  </g>

  <g id="step5" class="step" data-narration="Choosing the right collection class depends on your access patterns and requirements. Consider whether you need ordering, uniqueness, fast random access, or efficient insertions and deletions.">
    <rect x="100" y="450" width="600" height="130" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="120" y="480" font-size="16" font-weight="bold" fill="#ff9800">Selection Criteria</text>
    <text x="120" y="510" font-size="13" fill="#333">• Fast random access → ArrayList</text>
    <text x="120" y="532" font-size="13" fill="#333">• Frequent insertions/deletions → LinkedList</text>
    <text x="120" y="554" font-size="13" fill="#333">• Fast lookups, no order → HashSet / HashMap</text>
    <text x="120" y="576" font-size="13" fill="#333">• Sorted elements → TreeSet / TreeMap</text>
  </g>
</svg>