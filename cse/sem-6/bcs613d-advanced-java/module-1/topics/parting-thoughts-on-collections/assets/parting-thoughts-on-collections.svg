<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1976d2">Best Practices and Key Insights</text>

  <g id="step0" class="step" data-narration="Choose the right collection based on your access patterns and requirements. ArrayList for random access, LinkedList for frequent insertions, HashSet for fast lookups, TreeSet for sorted data.">
    <rect x="50" y="60" width="700" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="70" y="90" font-size="16" font-weight="bold" fill="#1976d2">Collection Selection Guide</text>
    <text x="70" y="120" font-size="13" fill="#333">• Fast random access → ArrayList</text>
    <text x="70" y="140" font-size="13" fill="#333">• Frequent insertions/deletions → LinkedList</text>
    <text x="70" y="160" font-size="13" fill="#333">• Fast lookups, unique elements → HashSet / HashMap</text>
    <text x="70" y="176" font-size="13" fill="#333">• Sorted elements → TreeSet / TreeMap</text>
  </g>

  <g id="step1" class="step" data-narration="Always use generics for type safety to avoid ClassCastException at runtime. Program to interfaces not implementations for flexibility and declare variables using interface types like List, Set, Map.">
    <rect x="50" y="200" width="340" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="70" y="230" font-size="14" font-weight="bold" fill="#388e3c">Use Generics</text>
    <text x="70" y="255" font-size="12" fill="#333">List&lt;String&gt; list = new ArrayList&lt;&gt;();</text>
    <text x="70" y="275" font-size="11" fill="#666">✓ Compile-time type safety</text>
    <text x="70" y="292" font-size="11" fill="#666">✓ No casting needed</text>

    <rect x="410" y="200" width="340" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="430" y="230" font-size="14" font-weight="bold" fill="#ff9800">Program to Interfaces</text>
    <text x="430" y="255" font-size="12" fill="#333">List&lt;E&gt; (not ArrayList)</text>
    <text x="430" y="275" font-size="11" fill="#666">✓ Flexibility to change impl</text>
    <text x="430" y="292" font-size="11" fill="#666">✓ Works with any List type</text>
  </g>

  <g id="step2" class="step" data-narration="Be aware of thread safety requirements. Most collections are not thread-safe by default. Use synchronized wrappers, concurrent collections, or copy-on-write variants for multi-threaded access.">
    <rect x="50" y="330" width="700" height="100" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="70" y="360" font-size="16" font-weight="bold" fill="#f44336">Thread Safety Considerations</text>
    <text x="70" y="385" font-size="13" fill="#333">Collections.synchronizedList() - Legacy wrapper approach</text>
    <text x="70" y="405" font-size="13" fill="#333">ConcurrentHashMap, CopyOnWriteArrayList - Modern concurrent collections</text>
    <text x="70" y="422" font-size="12" fill="#666">Most collections are NOT thread-safe by default!</text>
  </g>

  <g id="step3" class="step" data-narration="Avoid common pitfalls like modifying collections during iteration which causes ConcurrentModificationException. Use iterator.remove for safe removal or collect items to remove in separate list.">
    <rect x="50" y="450" width="340" height="90" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="70" y="480" font-size="14" font-weight="bold" fill="#9c27b0">Common Pitfalls</text>
    <text x="70" y="505" font-size="12" fill="#333">✗ Modify during iteration</text>
    <text x="70" y="525" font-size="12" fill="#333">✗ Mutable keys in maps</text>

    <rect x="410" y="450" width="340" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="430" y="480" font-size="14" font-weight="bold" fill="#388e3c">Best Practices</text>
    <text x="430" y="505" font-size="12" fill="#333">✓ Use iterator.remove()</text>
    <text x="430" y="525" font-size="12" fill="#333">✓ Immutable keys</text>
  </g>

  <g id="step4" class="step" data-narration="Understanding performance characteristics is crucial. Know the Big O time complexity for operations and choose collections based on your most frequent operations for optimal application performance.">
    <rect x="100" y="560" width="600" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="120" y="583" font-size="13" font-weight="bold" fill="#1976d2">Master performance characteristics: O(1) vs O(n) vs O(log n) for informed decisions</text>
  </g>
</svg>