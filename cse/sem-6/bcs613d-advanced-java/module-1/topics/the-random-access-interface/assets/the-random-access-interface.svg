<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1976d2">RandomAccess Interface</text>

  <g id="step0" class="step" data-narration="RandomAccess is a marker interface with no methods that indicates a List implementation supports fast constant-time random access. It helps algorithms optimize based on access characteristics.">
    <rect x="50" y="60" width="700" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="70" y="90" font-size="16" font-weight="bold" fill="#1976d2">Marker Interface - No Methods</text>
    <text x="70" y="115" font-size="13" fill="#333">public interface RandomAccess { }</text>
    <text x="70" y="135" font-size="12" fill="#666">Signals fast O(1) random access capability</text>
  </g>

  <g id="step1" class="step" data-narration="ArrayList, Vector, and CopyOnWriteArrayList implement RandomAccess because they are backed by arrays. LinkedList does not implement it because accessing elements requires traversing nodes.">
    <rect x="50" y="170" width="340" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="70" y="200" font-size="16" font-weight="bold" fill="#388e3c">Implements RandomAccess</text>
    <text x="70" y="230" font-size="14" fill="#333">• ArrayList</text>
    <text x="70" y="252" font-size="14" fill="#333">• Vector</text>
    <text x="70" y="274" font-size="14" fill="#333">• CopyOnWriteArrayList</text>
    <circle cx="340" cy="230" r="25" fill="#388e3c" opacity="0.2"/>
    <text x="330" y="237" font-size="12" fill="#388e3c">O(1)</text>

    <rect x="410" y="170" width="340" height="120" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="430" y="200" font-size="16" font-weight="bold" fill="#f44336">No RandomAccess</text>
    <text x="430" y="230" font-size="14" fill="#333">• LinkedList</text>
    <text x="430" y="252" font-size="14" fill="#333">• AbstractSequentialList</text>
    <text x="430" y="274" font-size="12" fill="#666">Sequential access required</text>
    <circle cx="700" cy="230" r="25" fill="#f44336" opacity="0.2"/>
    <text x="690" y="237" font-size="12" fill="#f44336">O(n)</text>
  </g>

  <g id="step2" class="step" data-narration="Algorithms check for RandomAccess to optimize performance. If present, they use index-based iteration with fast get calls. Otherwise, they use iterator-based approaches for efficiency.">
    <rect x="50" y="310" width="700" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="70" y="340" font-size="16" font-weight="bold" fill="#ff9800">Algorithm Optimization</text>
    <text x="70" y="365" font-size="12" fill="#333" font-family="monospace">if (list instanceof RandomAccess) {</text>
    <text x="90" y="385" font-size="12" fill="#333" font-family="monospace">for (int i = 0; i &lt; list.size(); i++) { list.get(i); } // Fast</text>
    <text x="70" y="400" font-size="12" fill="#333" font-family="monospace">} else { for (E e : list) { ... } } // Iterator-based</text>
  </g>

  <g id="step3" class="step" data-narration="Using index-based iteration on LinkedList results in O(n squared) performance because each get call traverses from the beginning. Iterator-based traversal is O(n) for all lists.">
    <rect x="50" y="430" width="340" height="90" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="70" y="460" font-size="14" font-weight="bold" fill="#f44336">Index on LinkedList</text>
    <text x="70" y="485" font-size="13" fill="#333">for (i...) list.get(i)</text>
    <text x="70" y="505" font-size="12" fill="#f44336">O(n²) - Very Slow!</text>

    <rect x="410" y="430" width="340" height="90" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="430" y="460" font-size="14" font-weight="bold" fill="#388e3c">Iterator on Any List</text>
    <text x="430" y="485" font-size="13" fill="#333">for (E e : list)</text>
    <text x="430" y="505" font-size="12" fill="#388e3c">O(n) - Optimal</text>
  </g>

  <g id="step4" class="step" data-narration="The RandomAccess interface enables writing generic algorithms that automatically adapt to different list implementations, providing optimal performance whether working with array-based or linked structures.">
    <rect x="100" y="540" width="600" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="120" y="570" font-size="13" font-weight="bold" fill="#1976d2">Best Practice: Use enhanced for-loop (for-each) - it auto-optimizes!</text>
  </g>
</svg>