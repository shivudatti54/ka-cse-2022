<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" data-topic-id="modelling-in-machine-learning">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2" />
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="A model is a mathematical function that maps inputs to predictions. We train it to find the best mapping that minimizes error on new data.">
    <rect x="40" y="25" width="720" height="95" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="50" font-size="20" font-weight="bold" fill="#1a202c" text-anchor="middle">Modelling in Machine Learning</text>
    
    <rect x="80" y="65" width="180" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="170" y="85" font-size="12" fill="#1565c0" text-anchor="middle" font-weight="bold">Input Features x</text>
    <text x="170" y="100" font-size="10" fill="#1976d2" text-anchor="middle">age, income...</text>
    
    <polygon points="260,90 280,90" stroke="#1976d2" stroke-width="2"/>
    <polygon points="270,80 280,90 270,100" fill="#1976d2"/>
    
    <rect x="300" y="65" width="180" height="50" rx="6" fill="url(#blueGrad)"/>
    <text x="390" y="85" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Model f(x)</text>
    <text x="390" y="100" font-size="10" fill="#e3f2fd" text-anchor="middle">y = w^T x + b</text>
    
    <polygon points="500,90 520,90" stroke="#1976d2" stroke-width="2"/>
    <polygon points="510,80 520,90 510,100" fill="#1976d2"/>
    
    <rect x="540" y="65" width="180" height="50" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="630" y="85" font-size="12" fill="#2e7d32" text-anchor="middle" font-weight="bold">Prediction y</text>
    <text x="630" y="100" font-size="10" fill="#388e3c" text-anchor="middle">approved/rejected</text>
  </g>

  <g class="step" id="step1" data-narration="Parametric models have fixed parameters regardless of data size. Examples include linear regression and logistic regression. They train quickly with less data but may underfit complex patterns.">
    <rect x="50" y="135" width="700" height="60" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="80" y="158" font-size="14" font-weight="bold" fill="#2e7d32">Parametric Models</text>
    <text x="80" y="175" font-size="10" fill="#4a5568">Fixed params (weights + bias) | Examples: Linear Regression, Logistic Regression, Naive Bayes</text>
    <text x="650" y="185" font-size="10" fill="#2e7d32" text-anchor="end" font-style="italic">Fast, simple, may underfit</text>
  </g>

  <g class="step" id="step2" data-narration="Non-parametric models grow in complexity with more data. Examples include KNN, decision trees, and SVMs. They capture complex patterns but require more data and risk overfitting.">
    <rect x="50" y="205" width="700" height="60" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="80" y="228" font-size="14" font-weight="bold" fill="#e65100">Non-Parametric Models</text>
    <text x="80" y="245" font-size="10" fill="#4a5568">Params grow with data | Examples: KNN, Decision Trees, SVM</text>
    <text x="650" y="255" font-size="10" fill="#e65100" text-anchor="end" font-style="italic">Flexible, needs more data</text>
  </g>

  <g class="step" id="step3" data-narration="The bias-variance tradeoff shows model complexity effects. Simple models underfit with high bias, complex models overfit with high variance. The optimal point balances both for best generalization.">
    <rect x="50" y="275" width="700" height="90" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="70" y="295" font-size="12" font-weight="bold" fill="#c62828">Underfitting</text>
    <text x="70" y="310" font-size="9" fill="#4a5568">High bias, low variance</text>
    <text x="70" y="323" font-size="9" fill="#4a5568">Too simple for data</text>
    
    <rect x="270" y="285" width="230" height="70" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="385" y="315" font-size="11" font-weight="bold" fill="#388e3c" text-anchor="middle">Optimal Complexity</text>
    <text x="385" y="330" font-size="9" fill="#4a5568" text-anchor="middle">Balanced bias & variance</text>
    <text x="385" y="343" font-size="8" fill="#2e7d32" text-anchor="middle">Best generalization</text>
    
    <rect x="520" y="285" width="210" height="70" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="625" y="295" font-size="12" font-weight="bold" fill="#e65100">Overfitting</text>
    <text x="625" y="310" font-size="9" fill="#4a5568">Low bias, high variance</text>
    <text x="625" y="323" font-size="9" fill="#4a5568">Memorizes noise</text>
  </g>

  <g class="step" id="step4" data-narration="Loss functions quantify prediction error. Mean Squared Error squares differences for regression. Cross-entropy measures probability divergence for classification tasks like logistic regression.">
    <rect x="50" y="380" width="700" height="65" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="70" y="402" font-size="12" font-weight="bold" fill="#1565c0">Regression Loss: MSE = (1/n) Σ(y - ŷ)²</text>
    <text x="70" y="420" font-size="10" fill="#4a5568">Penalizes large errors heavily</text>
    <text x="70" y="435" font-size="10" fill="#7b1fa2">Classification Loss: Cross-Entropy = -Σ y log(ŷ) | Used in logistic & neural nets</text>
  </g>

  <g class="step" id="step5" data-narration="Gradient descent minimizes loss by updating parameters. We subtract learning rate times gradient from parameters. The learning rate controls step size for convergence.">
    <rect x="50" y="460" width="700" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="70" y="485" font-size="13" font-weight="bold" fill="#2e7d32">Gradient Descent</text>
    <text x="70" y="503" font-size="10" fill="#4a5568">θ = θ - α × ∇L(θ) | α = learning rate</text>
    <text x="650" y="503" font-size="9" fill="#2e7d32" text-anchor="end" font-style="italic">Repeat until convergence</text>
  </g>

  <g class="step" id="step6" data-narration="Model selection criteria include AIC and BIC which penalize complexity. K-fold cross-validation trains on k-1 folds and tests on one fold to estimate generalization error.">
    <rect x="50" y="530" width="220" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="70" y="550" font-size="11" font-weight="bold" fill="#7b1fa2">AIC & BIC</text>
    <text x="70" y="568" font-size="9" fill="#4a5568">Penalize #parameters</text>
    
    <rect x="290" y="530" width="220" height="50" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="310" y="550" font-size="11" font-weight="bold" fill="#1565c0">K-Fold Cross-Validation</text>
    <text x="310" y="568" font-size="9" fill="#4a5568">Train on k-1 folds, test on 1</text>
    
    <rect x="530" y="530" width="220" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="550" y="550" font-size="11" font-weight="bold" fill="#e65100">Decision Boundaries</text>
    <text x="550" y="568" font-size="9" fill="#4a5568">Linear (hyperplane) vs curved</text>
  </g>
</svg>