<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2" />
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa" />

  <g id="step0" class="step" data-narration="Machine learning uses three mathematical pillars: linear algebra for data representation, calculus for optimization, and probability for handling uncertainty in predictions.">
    <rect x="0" y="0" width="800" height="135" fill="#e3f2fd" />
    <text x="400" y="25" font-size="20" font-weight="bold" fill="#1a202c" text-anchor="middle">Essential Mathematics for Multivariate Data</text>
    <text x="400" y="45" font-size="11" fill="#4a5568" text-anchor="middle">The Three Pillars of ML Mathematics</text>
    
    <rect x="100" y="58" width="180" height="70" rx="8" fill="#1976d2" />
    <text x="190" y="83" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Linear Algebra</text>
    <text x="115" y="103" font-size="10" fill="#e3f2fd">Vectors &amp; Matrices</text>
    <text x="115" y="116" font-size="10" fill="#e3f2fd">Data representation</text>

    <rect x="310" y="58" width="180" height="70" rx="8" fill="#1976d2" />
    <text x="400" y="83" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Calculus</text>
    <text x="325" y="103" font-size="10" fill="#e3f2fd">Gradients &amp; Derivatives</text>
    <text x="325" y="116" font-size="10" fill="#e3f2fd">Optimization</text>

    <rect x="520" y="58" width="180" height="70" rx="8" fill="#1976d2" />
    <text x="610" y="83" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Probability</text>
    <text x="535" y="103" font-size="10" fill="#e3f2fd">Bayes' Theorem</text>
    <text x="535" y="116" font-size="10" fill="#e3f2fd">Uncertainty reasoning</text>
  </g>

  <g id="step1" class="step" data-narration="Vectors store data points as ordered lists. The dot product measures similarity between vectors, used in linear regression, SVMs, and cosine similarity.">
    <rect x="50" y="143" width="700" height="82" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1" />
    <text x="70" y="165" font-size="13" font-weight="bold" fill="#1976d2">Vectors: Data Points</text>
    
    <rect x="70" y="180" width="180" height="38" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" />
    <text x="160" y="203" font-size="10" fill="#1e293b" text-anchor="middle" font-family="monospace">x = [5.1, 3.5, 1.4, 0.2]</text>
    
    <rect x="270" y="180" width="180" height="38" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" />
    <text x="360" y="203" font-size="10" fill="#1e293b" text-anchor="middle" font-family="monospace">x · y = Σ xᵢyᵢ</text>
    
    <text x="470" y="170" font-size="10" fill="#9c27b0" font-weight="bold">ML Uses:</text>
    <text x="470" y="187" font-size="9" fill="#4a5568">• Linear regression: ŷ = w·x</text>
    <text x="470" y="201" font-size="9" fill="#4a5568">• SVM decision function</text>
    <text x="470" y="215" font-size="9" fill="#4a5568">• Cosine similarity</text>
  </g>

  <g id="step2" class="step" data-narration="Matrices hold datasets with rows as observations and columns as features. Key matrix operations are transpose, multiplication, inverse, and determinant for solving linear systems.">
    <rect x="50" y="233" width="700" height="80" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1" />
    <text x="70" y="255" font-size="13" font-weight="bold" fill="#1976d2">Matrices: Full Datasets</text>
    
    <rect x="70" y="270" width="200" height="35" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" />
    <text x="170" y="291" font-size="9" fill="#1e293b" text-anchor="middle" font-family="monospace">X = [[5.1,3.5,1.4,0.2], [4.9,3.0,1.4,0.2]]</text>
    
    <text x="290" y="261" font-size="9" fill="#4a5568">Transpose Xᵀ swaps rows/cols</text>
    <text x="290" y="276" font-size="9" fill="#4a5568">Σ = (1/(n-1))XᵀX for covariance</text>
    <text x="290" y="291" font-size="9" fill="#4a5568">w = (XᵀX)⁻¹Xᵀy normal equation</text>
    
    <rect x="450" y="270" width="180" height="35" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" />
    <text x="540" y="285" font-size="10" fill="#9c27b0" text-anchor="middle" font-weight="bold">Key: Inverse &amp; Determinant</text>
    <text x="540" y="299" font-size="9" fill="#4a5568" text-anchor="middle">det(A)≠0 for invertibility</text>
  </g>

  <g id="step3" class="step" data-narration="Eigenvectors are directions unchanged by transformation. Eigenvalues are scaling factors. PCA uses covariance eigenvectors as principal components for dimension reduction.">
    <rect x="50" y="321" width="700" height="80" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1" />
    <text x="70" y="343" font-size="13" font-weight="bold" fill="#1976d2">Eigenvalues &amp; Eigenvectors</text>
    
    <rect x="70" y="357" width="140" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" />
    <text x="140" y="379" font-size="11" fill="#1e293b" text-anchor="middle" font-family="monospace">A · v = λ · v</text>
    <text x="140" y="391" font-size="8" fill="#64748b" text-anchor="middle">det(A-λI)=0</text>
    
    <text x="230" y="351" font-size="9" fill="#4a5568">v = eigenvector (direction preserved)</text>
    <text x="230" y="366" font-size="9" fill="#4a5568">λ = eigenvalue (scaling factor)</text>
    <text x="230" y="381" font-size="9" fill="#4a5568">All eigenvalues positive = positive definite</text>
    
    <rect x="380" y="357" width="200" height="36" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" />
    <text x="480" y="371" font-size="10" fill="#9c27b0" text-anchor="middle" font-weight="bold">PCA Application</text>
    <text x="480" y="385" font-size="9" fill="#4a5568" text-anchor="middle">Covariance eigenvectors = principal components</text>
  </g>

  <g id="step4" class="step" data-narration="The gradient points uphill. Gradient descent moves opposite to minimize loss: w equals w minus alpha times gradient of loss.">
    <rect x="50" y="409" width="700" height="80" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1" />
    <text x="70" y="431" font-size="13" font-weight="bold" fill="#1976d2">Gradient Descent: How Models Learn</text>
    
    <rect x="70" y="445" width="120" height="36" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" />
    <text x="130" y="467" font-size="10" fill="#1e293b" text-anchor="middle" font-family="monospace">w = w - α∇L(w)</text>
    
    <text x="210" y="449" font-size="9" fill="#4a5568">α = learning rate (step size)</text>
    <text x="210" y="464" font-size="9" fill="#4a5568">∇L = gradient of loss function</text>
    <text x="210" y="479" font-size="9" fill="#4a5568">Too large α: overshoots | Too small: slow</text>
    
    <rect x="400" y="445" width="160" height="36" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" />
    <text x="480" y="460" font-size="10" fill="#9c27b0" text-anchor="middle" font-weight="bold">Neural Networks</text>
    <text x="480" y="474" font-size="9" fill="#4a5568" text-anchor="middle">Backpropagation computes gradients</text>
  </g>

  <g id="step5" class="step" data-narration="SVD decomposes any matrix into U, Σ, Vᵀ. Truncated SVD reduces dimensions. Bayes theorem computes posterior: P(A|B) equals likelihood times prior divided by evidence.">
    <rect x="50" y="497" width="700" height="85" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1" />
    <text x="70" y="519" font-size="13" font-weight="bold" fill="#1976d2">SVD &amp; Bayes Theorem</text>
    
    <rect x="70" y="533" width="100" height="42" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" />
    <text x="120" y="549" font-size="10" fill="#1e293b" text-anchor="middle" font-family="monospace">A = UΣVᵀ</text>
    <text x="120" y="563" font-size="8" fill="#64748b" text-anchor="middle">SVD decomposition</text>
    
    <text x="190" y="545" font-size="9" fill="#4a5568">U = left singular vectors</text>
    <text x="190" y="559" font-size="9" fill="#4a5568">Σ = singular values (diagonal)</text>
    <text x="190" y="573" font-size="9" fill="#4a5568">Truncated SVD: dim reduction</text>
    
    <rect x="350" y="533" width="120" height="42" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" />
    <text x="410" y="549" font-size="10" fill="#9c27b0" text-anchor="middle" font-weight="bold">Bayes' Theorem</text>
    <text x="410" y="563" font-size="8" fill="#4a5568" text-anchor="middle">P(A|B) = P(B|A)P(A)/P(B)</text>
    <text x="410" y="575" font-size="8" fill="#4a5568" text-anchor="middle">Naive Bayes, spam filter</text>
    
    <rect x="490" y="533" width="180" height="42" rx="4" fill="#fff" stroke="#9c27b0" stroke-width="1" />
    <text x="580" y="549" font-size="9" fill="#9c27b0" font-weight="bold" text-anchor="middle">ML Applications</text>
    <text x="580" y="563" font-size="8" fill="#4a5568" text-anchor="middle">Recommender systems</text>
    <text x="580" y="575" font-size="8" fill="#4a5568" text-anchor="middle">Classification models</text>
  </g>
</svg>