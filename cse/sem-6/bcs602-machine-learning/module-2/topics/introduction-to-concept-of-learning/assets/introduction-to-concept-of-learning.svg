<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title and Tom Mitchell Definition -->
  <g id="step0" class="step" data-narration="Learning in ML means improving task performance through experience. A program learns from experience E to perform task T better, measured by performance P.">
    <rect x="40" y="10" width="720" height="85" fill="#e3f2fd" rx="8"/>
    <text x="50" y="35" font-size="24" font-weight="bold" fill="#1976d2">Introduction to Learning in Machine Learning</text>
    <text x="50" y="60" font-size="14" fill="#1976d2" font-weight="bold">Tom Mitchell's Definition:</text>
    <text x="50" y="78" font-size="13" fill="#333">"A computer learns from experience E to perform task T, if its</text>
    <text x="50" y="93" font-size="13" fill="#333">performance at T improves with experience E."</text>
  </g>
  
  <!-- Step 1: Traditional Programming vs Machine Learning -->
  <g id="step1" class="step" data-narration="Traditional programming uses input plus explicit rules to produce output. Machine learning reverses this: input plus output examples produces a learned model.">
    <rect x="40" y="105" width="720" height="95" fill="#fff" rx="8" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="125" font-size="18" font-weight="bold" fill="#333">Traditional Programming vs Machine Learning</text>
    <rect x="50" y="140" width="280" height="55" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="2"/>
    <text x="60" y="158" font-size="14" font-weight="bold" fill="#388e3c">Traditional Programming</text>
    <text x="60" y="175" font-size="12" fill="#333">Input + Rules → Output</text>
    <text x="330" y="175" font-size="14" fill="#1976d2" font-weight="bold">vs</text>
    <rect x="370" y="140" width="280" height="55" fill="#fff3e0" rx="6" stroke="#ff9800" stroke-width="2"/>
    <text x="380" y="158" font-size="14" font-weight="bold" fill="#ff9800">Machine Learning</text>
    <text x="380" y="175" font-size="12" fill="#333">Input + Output Examples → Model</text>
  </g>
  
  <!-- Step 2: Why Machine Learning -->
  <g id="step2" class="step" data-narration="ML is needed for problems too complex to program explicitly, rules that change over time, personalization needs, and discovering hidden patterns in large datasets.">
    <rect x="40" y="210" width="720" height="90" fill="#fff" rx="8" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="230" font-size="18" font-weight="bold" fill="#333">Why Do We Need Machine Learning?</text>
    <rect x="50" y="245" width="165" height="50" fill="#f3e5f5" rx="6" stroke="#9c27b0" stroke-width="2"/>
    <text x="58" y="262" font-size="13" font-weight="bold" fill="#9c27b0">Complex Problems</text>
    <text x="58" y="280" font-size="11" fill="#333">Language, vision</text>
    <rect x="225" y="245" width="165" height="50" fill="#e3f2fd" rx="6" stroke="#1976d2" stroke-width="2"/>
    <text x="233" y="262" font-size="13" font-weight="bold" fill="#1976d2">Changing Rules</text>
    <text x="233" y="280" font-size="11" fill="#333">Spam, fraud adapt</text>
    <rect x="400" y="245" width="165" height="50" fill="#ffebee" rx="6" stroke="#f44336" stroke-width="2"/>
    <text x="408" y="262" font-size="13" font-weight="bold" fill="#f44336">Personalization</text>
    <text x="408" y="280" font-size="11" fill="#333">Recommendations</text>
    <rect x="575" y="245" width="165" height="50" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="2"/>
    <text x="583" y="262" font-size="13" font-weight="bold" fill="#388e3c">Pattern Discovery</text>
    <text x="583" y="280" font-size="11" fill="#333">Big data insights</text>
  </g>
  
  <!-- Step 3: Four Learning Paradigms -->
  <g id="step3" class="step" data-narration="Four paradigms exist: Supervised learns from labeled data, Unsupervised finds patterns in unlabeled data, Reinforcement learns via rewards, and Semi-supervised uses both.">
    <rect x="40" y="310" width="720" height="95" fill="#fff" rx="8" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="330" font-size="18" font-weight="bold" fill="#333">Four Learning Paradigms</text>
    <rect x="50" y="345" width="170" height="55" fill="#fff3e0" rx="6" stroke="#ff9800" stroke-width="2"/>
    <text x="58" y="362" font-size="13" font-weight="bold" fill="#ff9800">Supervised</text>
    <text x="58" y="380" font-size="11" fill="#333">Labeled data, predictions</text>
    <rect x="230" y="345" width="170" height="55" fill="#e3f2fd" rx="6" stroke="#1976d2" stroke-width="2"/>
    <text x="238" y="362" font-size="13" font-weight="bold" fill="#1976d2">Unsupervised</text>
    <text x="238" y="380" font-size="11" fill="#333">Find hidden patterns</text>
    <rect x="410" y="345" width="170" height="55" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="2"/>
    <text x="418" y="362" font-size="13" font-weight="bold" fill="#388e3c">Reinforcement</text>
    <text x="418" y="380" font-size="11" fill="#333">Rewards and penalties</text>
    <rect x="590" y="345" width="170" height="55" fill="#f3e5f5" rx="6" stroke="#9c27b0" stroke-width="2"/>
    <text x="598" y="362" font-size="13" font-weight="bold" fill="#9c27b0">Semi-Supervised</text>
    <text x="598" y="380" font-size="11" fill="#333">Few labels, much data</text>
  </g>
  
  <!-- Step 4: Classification vs Regression -->
  <g id="step4" class="step" data-narration="Supervised learning has two types: Classification predicts discrete categories like spam or not spam, while Regression predicts continuous values like house prices or temperature.">
    <rect x="40" y="415" width="720" height="85" fill="#fff" rx="8" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="435" font-size="18" font-weight="bold" fill="#333">Types of Supervised Learning</text>
    <rect x="50" y="450" width="320" height="45" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="2"/>
    <text x="60" y="468" font-size="14" font-weight="bold" fill="#388e3c">Classification: Spam/Not Spam, Cat/Dog/Bird</text>
    <text x="60" y="484" font-size="11" fill="#333">Predicts discrete categories (labels)</text>
    <rect x="380" y="450" width="320" height="45" fill="#ffebee" rx="6" stroke="#f44336" stroke-width="2"/>
    <text x="390" y="468" font-size="14" font-weight="bold" fill="#f44336">Regression: House Prices, Temperature</text>
    <text x="390" y="484" font-size="11" fill="#333">Predicts continuous numerical values</text>
  </g>
  
  <!-- Step 5: Overfitting vs Underfitting -->
  <g id="step5" class="step" data-narration="Overfitting means memorizing training noise (high variance), while underfitting means failing to capture patterns (high bias). Good fit balances complexity and generalization.">
    <rect x="40" y="510" width="720" height="75" fill="#fff" rx="8" stroke="#ddd" stroke-width="1"/>
    <text x="50" y="530" font-size="18" font-weight="bold" fill="#333">Overfitting vs Underfitting</text>
    <rect x="50" y="545" width="200" height="35" fill="#ffebee" rx="6" stroke="#f44336" stroke-width="2"/>
    <text x="58" y="562" font-size="12" fill="#f44336">Overfitting: memorizes noise</text>
    <rect x="260" y="545" width="200" height="35" fill="#fff3e0" rx="6" stroke="#ff9800" stroke-width="2"/>
    <text x="268" y="562" font-size="12" fill="#ff9800">Underfitting: too simple</text>
    <rect x="470" y="545" width="250" height="35" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="2"/>
    <text x="478" y="562" font-size="12" fill="#388e3c">Good Fit: balanced complexity</text>
  </g>
</svg>