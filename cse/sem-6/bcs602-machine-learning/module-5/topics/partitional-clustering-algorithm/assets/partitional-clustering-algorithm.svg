<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Partitional Clustering: K-Means Algorithm</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  
  <g id="step1" class="step" data-narration="Partitional clustering divides data into non-overlapping subsets. Each data point belongs to exactly one cluster, unlike hierarchical methods that create a tree structure.">
    <rect x="50" y="50" width="700" height="55" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">What is Partitional Clustering?</text>
    <text x="400" y="92" text-anchor="middle" font-size="11" fill="#424242">Divides data into k distinct, non-overlapping clusters | Each point belongs to exactly one cluster</text>
  </g>
  
  <g id="step2" class="step" data-narration="K-Means is the most popular partitional algorithm. It uses centroids (cluster centers) and iteratively minimizes Within-Cluster Sum of Squares (WCSS) to find optimal groupings.">
    <rect x="50" y="115" width="700" height="60" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">K-Means Algorithm Overview</text>
    <text x="180" y="160" text-anchor="middle" font-size="10" fill="#424242">1. Initialize k centroids</text>
    <text x="340" y="160" text-anchor="middle" font-size="10" fill="#424242">2. Assign points to nearest centroid</text>
    <text x="520" y="160" text-anchor="middle" font-size="10" fill="#424242">3. Recalculate centroids</text>
    <text x="680" y="160" text-anchor="middle" font-size="10" fill="#424242">4. Repeat until convergence</text>
  </g>
  
  <g id="step3" class="step" data-narration="In the initialization step, we randomly select k data points as initial centroids. The assignment step then calculates the Euclidean distance from each point to every centroid.">
    <text x="80" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">Step 1: Initialization</text>
    <rect x="30" y="205" width="220" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <circle cx="80" cy="235" r="6" fill="#9c27b0"/>
    <circle cx="140" cy="245" r="6" fill="#9c27b0"/>
    <circle cx="100" cy="260" r="6" fill="#9c27b0"/>
    <circle cx="180" cy="225" r="6" fill="#9c27b0"/>
    <circle cx="200" cy="255" r="6" fill="#9c27b0"/>
    <rect x="190" y="220" width="12" height="12" rx="2" fill="#e65100" stroke="#e65100"/>
    <text x="200" y="268" text-anchor="middle" font-size="9" fill="#424242">Random k points</text>
    
    <text x="400" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Step 2: Assignment</text>
    <rect x="290" y="205" width="220" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <line x1="330" y1="240" x2="380" y2="225" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/>
    <line x1="360" y1="250" x2="380" y2="225" stroke="#f44336" stroke-width="1" stroke-dasharray="4"/>
    <line x1="400" y1="235" x2="450" y2="240" stroke="#1976d2" stroke-width="1" stroke-dasharray="4"/>
    <circle cx="330" cy="240" r="4" fill="#424242"/>
    <circle cx="360" cy="250" r="4" fill="#424242"/>
    <circle cx="400" cy="235" r="4" fill="#424242"/>
    <circle cx="380" cy="225" r="5" fill="#e65100"/>
    <circle cx="450" cy="240" r="5" fill="#388e3c"/>
    <text x="400" y="268" text-anchor="middle" font-size="9" fill="#424242">Assign to nearest centroid</text>
    
    <text x="680" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Step 3: Update</text>
    <rect x="590" y="205" width="180" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <circle cx="620" cy="230" r="4" fill="#424242"/>
    <circle cx="630" cy="245" r="4" fill="#424242"/>
    <circle cx="610" cy="260" r="4" fill="#424242"/>
    <circle cx="640" cy="235" r="4" fill="#424242"/>
    <circle cx="660" cy="255" r="4" fill="#424242"/>
    <path d="M615 235 L645 240 L625 250" stroke="#e65100" stroke-width="2" fill="none"/>
    <circle cx="635" cy="242" r="6" fill="#e65100"/>
    <text x="680" y="268" text-anchor="middle" font-size="9" fill="#424242">New centroid = mean of cluster</text>
  </g>
  
  <g id="step4" class="step" data-narration="The algorithm repeats assignment and update steps until centroids stop changing. This convergence guarantees a local minimum of the WCSS objective function.">
    <rect x="50" y="290" width="700" height="55" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Iteration and Convergence</text>
    <text x="400" y="332" text-anchor="middle" font-size="11" fill="#424242">Repeat Assignment → Update until centroids stabilize | Minimizes WCSS = Σ(distance² from point to centroid)</text>
  </g>
  
  <g id="step5" class="step" data-narration="The Elbow Method helps choose the optimal number of clusters. We plot WCSS against k values and look for the elbow point where adding more clusters gives diminishing returns.">
    <text x="150" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Elbow Method for Choosing k</text>
    <rect x="30" y="375" width="260" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="50" y1="435" x2="270" y2="435" stroke="#424242" stroke-width="1"/>
    <line x1="50" y1="395" x2="50" y2="435" stroke="#424242" stroke-width="1"/>
    <polyline points="60,400 100,420 140,438 180,445 220,448 260,450" fill="none" stroke="#1976d2" stroke-width="2"/>
    <circle cx="140" cy="438" r="4" fill="#e65100"/>
    <text x="50" y="450" text-anchor="start" font-size="8" fill="#616161">k=1</text>
    <text x="140" y="450" text-anchor="middle" font-size="8" fill="#616161">k=3</text>
    <text x="270" y="450" text-anchor="end" font-size="8" fill="#616161">k=8</text>
    <text x="50" y="392" text-anchor="start" font-size="8" fill="#616161">WCSS</text>
    <text x="145" y="420" text-anchor="middle" font-size="9" fill="#e65100">Elbow Point</text>
    
    <text x="550" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">K-Means++ Initialization</text>
    <rect x="320" y="375" width="430" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <circle cx="380" cy="415" r="5" fill="#9c27b0"/>
    <line x1="385" y1="415" x2="480" y2="415" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3"/>
    <circle cx="480" cy="415" r="6" fill="#e65100"/>
    <text x="430" y="432" text-anchor="middle" font-size="9" fill="#424242">Probability proportional to D(x)²</text>
    <circle cx="580" cy="430" r="6" fill="#e65100"/>
    <line x1="540" y1="420" x2="575" y2="428" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3"/>
    <circle cx="700" cy="405" r="6" fill="#e65100"/>
    <line x1="620" y1="425" x2="695" y2="408" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3"/>
    <text x="535" y="445" text-anchor="start" font-size="9" fill="#616161">1. Choose first centroid randomly</text>
    <text x="535" y="458" text-anchor="start" font-size="9" fill="#616161">2. Select remaining with probability ∝ distance²</text>
  </g>
  
  <g id="step6" class="step" data-narration="Different distance measures suit different data types. Euclidean works for continuous data, Manhattan for grids, Cosine for text, and Jaccard for binary or set data.">
    <text x="400" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Distance Measures</text>
    <rect x="30" y="485" width="180" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="120" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Euclidean</text>
    <text x="120" y="522" text-anchor="middle" font-size="9" fill="#424242">√Σ(a-b)² | Continuous data</text>
    
    <rect x="220" y="485" width="180" height="50" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="310" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Manhattan</text>
    <text x="310" y="522" text-anchor="middle" font-size="9" fill="#424242">Σ|a-b| | Grid-like paths</text>
    
    <rect x="410" y="485" width="180" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="500" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">Cosine</text>
    <text x="500" y="522" text-anchor="middle" font-size="9" fill="#424242">a·b/(|a||b|) | Text similarity</text>
    
    <rect x="600" y="485" width="170" height="50" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="685" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Jaccard</text>
    <text x="685" y="522" text-anchor="middle" font-size="9" fill="#424242">|A∩B|/|A∪B| | Binary/Set data</text>
  </g>
  
  <g id="step7" class="step" data-narration="K-Means is simple, fast, and scalable but struggles with outliers, requires pre-specifying k, and assumes spherical cluster shapes due to Euclidean distance.">
    <text x="400" y="555" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Advantages and Limitations</text>
    <rect x="30" y="565" width="370" height="30" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="65" y="578" text-anchor="start" font-size="9" fill="#2e7d32">✓ Simple and Fast O(n·k·i·d)</text>
    <text x="220" y="578" text-anchor="start" font-size="9" fill="#2e7d32">✓ Scalable for large datasets</text>
    <text x="340" y="578" text-anchor="start" font-size="9" fill="#2e7d32">✓ Guaranteed convergence</text>
    
    <rect x="410" y="565" width="360" height="30" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="445" y="578" text-anchor="start" font-size="9" fill="#c62828">✗ Must specify k beforehand</text>
    <text x="560" y="578" text-anchor="start" font-size="9" fill="#c62828">✗ Sensitive to outliers</text>
    <text x="680" y="578" text-anchor="start" font-size="9" fill="#c62828">✗ Assumes spherical clusters</text>
  </g>
</svg>