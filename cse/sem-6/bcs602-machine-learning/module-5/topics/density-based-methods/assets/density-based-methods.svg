<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Density-Based Methods</text>
  
  <!-- Step 1: Introduction -->
  <g id="step1" class="step" data-narration="Density-based clustering finds groups of data points that are closely packed together, separating them from sparse outlier regions.">
    <rect x="50" y="50" width="700" height="60" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">What is Density-Based Clustering?</text>
    <text x="400" y="95" text-anchor="middle" font-size="12" fill="#424242">Clusters are dense regions separated by regions of low density (noise)</text>
  </g>
  
  <!-- Step 2: DBSCAN Parameters -->
  <g id="step2" class="step" data-narration="DBSCAN uses two key parameters: Epsilon is the neighborhood radius, and MinPts is the minimum number of points needed to form a dense region.">
    <text x="130" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">DBSCAN Parameters</text>
    <rect x="30" y="145" width="180" height="65" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="120" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Epsilon (ε)</text>
    <text x="120" y="190" text-anchor="middle" font-size="11" fill="#424242">Neighborhood radius</text>
    <rect x="230" y="145" width="180" height="65" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="320" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">MinPts</text>
    <text x="320" y="190" text-anchor="middle" font-size="11" fill="#424242">Minimum points threshold</text>
    <line x1="210" y1="177" x2="230" y2="177" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Step 3: Point Types -->
  <g id="step3" class="step" data-narration="DBSCAN classifies each point as either a core point with enough neighbors, a border point near a core point, or noise as an outlier.">
    <text x="400" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Three Types of Points</text>
    <rect x="30" y="250" width="240" height="85" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <circle cx="90" cy="285" r="18" fill="#388e3c"/>
    <circle cx="90" cy="285" r="6" fill="#fff"/>
    <text x="175" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Core Point</text>
    <text x="175" y="292" text-anchor="middle" font-size="10" fill="#424242">≥ MinPts within ε radius</text>
    <text x="175" y="307" text-anchor="middle" font-size="10" fill="#616161">Cluster centers</text>
    
    <rect x="280" y="250" width="240" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <circle cx="340" cy="285" r="18" fill="#ff9800"/>
    <circle cx="340" cy="285" r="6" fill="#fff"/>
    <text x="425" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Border Point</text>
    <text x="425" y="292" text-anchor="middle" font-size="10" fill="#424242">&lt; MinPts but near core point</text>
    <text x="425" y="307" text-anchor="middle" font-size="10" fill="#616161">Cluster edges</text>
    
    <rect x="530" y="250" width="240" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <circle cx="590" cy="285" r="12" fill="#f44336"/>
    <text x="675" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Noise Point</text>
    <text x="675" y="292" text-anchor="middle" font-size="10" fill="#424242">Not core or border</text>
    <text x="675" y="307" text-anchor="middle" font-size="10" fill="#616161">Outliers identified</text>
  </g>
  
  <!-- Step 4: Algorithm Steps -->
  <g id="step4" class="step" data-narration="The algorithm starts at a random point, checks if it is a core point, and then expands the cluster by finding all density-reachable points.">
    <text x="130" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">How DBSCAN Works</text>
    <rect x="30" y="375" width="700" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="50" y="395" text-anchor="start" font-size="11" fill="#424242">1. Pick random unvisited point</text>
    <text x="250" y="395" text-anchor="start" font-size="11" fill="#424242">2. If core point (≥MinPts neighbors), start cluster</text>
    <text x="500" y="395" text-anchor="start" font-size="11" fill="#424242">3. Expand by adding all density-reachable points</text>
    <rect x="30" y="430" width="700" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="50" y="450" text-anchor="start" font-size="11" fill="#424242">4. Reclassify noise points found reachable as border points</text>
    <text x="380" y="450" text-anchor="start" font-size="11" fill="#424242">5. Repeat until all points visited</text>
  </g>
  
  <!-- Step 5: Advantages -->
  <g id="step5" class="step" data-narration="DBSCAN offers major advantages: it finds arbitrarily shaped clusters, works without knowing cluster count, and automatically detects outliers.">
    <text x="400" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Key Advantages</text>
    <rect x="30" y="515" width="230" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="145" y="535" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">No Need for K</text>
    <text x="145" y="555" text-anchor="middle" font-size="10" fill="#424242">Auto discovers cluster count</text>
    <rect x="285" y="515" width="230" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="535" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Arbitrary Shapes</text>
    <text x="400" y="555" text-anchor="middle" font-size="10" fill="#424242">Finds non-spherical clusters</text>
    <rect x="540" y="515" width="230" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="655" y="535" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Robust to Noise</text>
    <text x="655" y="555" text-anchor="middle" font-size="10" fill="#424242">Identifies outliers automatically</text>
  </g>
  
  <!-- Step 6: Summary -->
  <g id="step6" class="step" data-narration="In summary, DBSCAN defines clusters as connected dense regions using epsilon and MinPts, classifying points as core, border, or noise.">
    <rect x="30" y="25" width="740" height="30" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" opacity="0.9"/>
    <text x="400" y="45" text-anchor="middle" font-size="11" fill="#1565c0">Summary: Core Point (≥MinPts neighbors) → Border Point (reachable from core) → Noise Point (neither)</text>
  </g>
</svg>