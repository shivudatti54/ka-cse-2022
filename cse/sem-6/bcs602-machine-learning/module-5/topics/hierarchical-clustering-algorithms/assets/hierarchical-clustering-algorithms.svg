<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Hierarchical Clustering Algorithms</text>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  
  <g id="step1" class="step" data-narration="Hierarchical clustering builds a tree-like structure called a dendrogram that shows nested groupings of data at multiple scales without requiring the number of clusters to be specified beforehand.">
    <rect x="80" y="55" width="640" height="85" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">What is Hierarchical Clustering?</text>
    <text x="400" y="105" text-anchor="middle" font-size="13" fill="#424242">A method that builds a hierarchy of clusters represented as a tree diagram</text>
    <text x="400" y="125" text-anchor="middle" font-size="12" fill="#616161">Key advantage: No need to specify number of clusters upfront</text>
  </g>
  
  <g id="step2" class="step" data-narration="There are two main approaches: agglomerative starts with each point as a separate cluster and merges upward, while divisive starts with all points together and splits downward.">
    <text x="150" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Agglomerative (Bottom-Up)</text>
    <rect x="30" y="175" width="230" height="90" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="145" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Start: Each point</text>
    <text x="145" y="222" text-anchor="middle" font-size="11" fill="#424242">is its own cluster</text>
    <line x1="145" y1="240" x2="145" y2="255" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="145" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Merge closest pairs</text>
    
    <text x="650" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Divisive (Top-Down)</text>
    <rect x="540" y="175" width="230" height="90" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="655" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Start: All points</text>
    <text x="655" y="222" text-anchor="middle" font-size="11" fill="#424242">in one cluster</text>
    <line x1="655" y1="240" x2="655" y2="255" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="655" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Split most heterogeneous</text>
  </g>
  
  <g id="step3" class="step" data-narration="Linkage methods define how distance between clusters is calculated: single uses minimum distance, complete uses maximum, average uses mean, and Ward minimizes variance increase.">
    <text x="400" y="295" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a237e">Cluster Linkage Methods</text>
    <rect x="30" y="315" width="180" height="75" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="120" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Single Linkage</text>
    <text x="120" y="360" text-anchor="middle" font-size="10" fill="#424242">Min distance</text>
    <text x="120" y="375" text-anchor="middle" font-size="9" fill="#616161">(nearest neighbor)</text>
    
    <rect x="225" y="315" width="180" height="75" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="315" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b1fa2">Complete Linkage</text>
    <text x="315" y="360" text-anchor="middle" font-size="10" fill="#424242">Max distance</text>
    <text x="315" y="375" text-anchor="middle" font-size="9" fill="#616161">(farthest neighbor)</text>
    
    <rect x="420" y="315" width="180" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="510" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Average Linkage</text>
    <text x="510" y="360" text-anchor="middle" font-size="10" fill="#424242">Mean distance</text>
    <text x="510" y="375" text-anchor="middle" font-size="9" fill="#616161">(weighted average)</text>
    
    <rect x="615" y="315" width="180" height="75" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="705" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Ward's Method</text>
    <text x="705" y="360" text-anchor="middle" font-size="10" fill="#424242">Minimize variance</text>
    <text x="705" y="375" text-anchor="middle" font-size="9" fill="#616161">(within-cluster SS)</text>
  </g>
  
  <g id="step4" class="step" data-narration="A dendrogram is a tree diagram where the vertical axis shows distance and the horizontal axis shows data points, with merges occurring at different heights representing cluster formation.">
    <text x="400" y="415" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a237e">Dendrogram Visualization</text>
    <rect x="80" y="430" width="640" height="100" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="150" y="455" text-anchor="middle" font-size="11" fill="#424242">Height/Distance</text>
    <line x1="140" y1="465" x2="140" y2="515" stroke="#388e3c" stroke-width="1" stroke-dasharray="4"/>
    <line x1="140" y1="515" x2="700" y2="515" stroke="#388e3c" stroke-width="1"/>
    <text x="180" y="530" text-anchor="middle" font-size="10" fill="#616161">Points</text>
    
    <!-- Simple dendrogram lines -->
    <line x1="200" y1="515" x2="200" y2="475" stroke="#2e7d32" stroke-width="2"/>
    <line x1="260" y1="515" x2="260" y2="475" stroke="#2e7d32" stroke-width="2"/>
    <line x1="200" y1="475" x2="260" y2="475" stroke="#2e7d32" stroke-width="2"/>
    <line x1="230" y1="475" x2="230" y2="455" stroke="#2e7d32" stroke-width="2"/>
    
    <line x1="340" y1="515" x2="340" y2="485" stroke="#2e7d32" stroke-width="2"/>
    <line x1="400" y1="515" x2="400" y2="485" stroke="#2e7d32" stroke-width="2"/>
    <line x1="340" y1="485" x2="400" y2="485" stroke="#2e7d32" stroke-width="2"/>
    <line x1="370" y1="485" x2="370" y2="465" stroke="#2e7d32" stroke-width="2"/>
    
    <line x1="500" y1="515" x2="500" y2="495" stroke="#2e7d32" stroke-width="2"/>
    <line x1="560" y1="515" x2="560" y2="495" stroke="#2e7d32" stroke-width="2"/>
    <line x1="500" y1="495" x2="560" y2="495" stroke="#2e7d32" stroke-width="2"/>
    <line x1="530" y1="495" x2="530" y2="470" stroke="#2e7d32" stroke-width="2"/>
    
    <line x1="230" y1="455" x2="370" y2="455" stroke="#2e7d32" stroke-width="2"/>
    <line x1="300" y1="455" x2="300" y2="440" stroke="#2e7d32" stroke-width="2"/>
    <line x1="530" y1="470" x2="530" y2="445" stroke="#2e7d32" stroke-width="2"/>
    <line x1="300" y1="440" x2="530" y2="440" stroke="#2e7d32" stroke-width="2"/>
    
    <text x="620" y="475" text-anchor="middle" font-size="10" fill="#424242">Cut here for</text>
    <text x="620" y="488" text-anchor="middle" font-size="10" fill="#424242">k clusters</text>
    <line x1="590" y1="465" x2="650" y2="465" stroke="#f44336" stroke-width="2" stroke-dasharray="3"/>
  </g>
  
  <g id="step5" class="step" data-narration="Common distance metrics include Euclidean for continuous data, Manhattan for less outlier sensitivity, and Cosine for text or magnitude-varying data.">
    <text x="400" y="555" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a237e">Distance Metrics</text>
    <rect x="30" y="570" width="150" height="22" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="105" y="585" text-anchor="middle" font-size="10" fill="#1565c0">Euclidean: √(Σ(x-y)²)</text>
    <rect x="190" y="570" width="150" height="22" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="265" y="585" text-anchor="middle" font-size="10" fill="#7b1fa2">Manhattan: Σ|x-y|</text>
    <rect x="350" y="570" width="150" height="22" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="425" y="585" text-anchor="middle" font-size="10" fill="#e65100">Cosine: (x·y)/(|x||y|)</text>
    <rect x="510" y="570" width="150" height="22" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="585" y="585" text-anchor="middle" font-size="10" fill="#c62828">Mahalanobis</text>
    <text x="670" y="585" text-anchor="middle" font-size="9" fill="#616161">With covariance</text>
  </g>
</svg>