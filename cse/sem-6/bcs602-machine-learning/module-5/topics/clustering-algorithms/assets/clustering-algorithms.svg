<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" font-size="22" fill="#1976d2" text-anchor="middle" font-weight="bold">Clustering Algorithms</text>

  <g id="step1" class="step" data-narration="Clustering is an unsupervised learning technique that groups similar data points together without predefined labels.">
    <rect x="40" y="50" width="200" height="80" fill="#e3f2fd" rx="8"/>
    <text x="50" y="75" font-size="14" fill="#1976d2" font-weight="bold">What is Clustering?</text>
    <text x="50" y="95" font-size="11" fill="#1565c0">Unsupervised learning</text>
    <text x="50" y="112" font-size="11" fill="#1565c0">Groups similar points</text>
    <text x="50" y="122" font-size="10" fill="#1565c0">No predefined labels</text>
    
    <rect x="260" y="50" width="180" height="80" fill="#e8f5e9" rx="8"/>
    <text x="270" y="70" font-size="13" fill="#388e3c" font-weight="bold">Goal</text>
    <text x="270" y="88" font-size="10" fill="#2e7d32">High intra-cluster</text>
    <text x="270" y="102" font-size="10" fill="#2e7d32">similarity</text>
    <text x="270" y="116" font-size="10" fill="#2e7d32">Low inter-cluster</text>
    <text x="270" y="125" font-size="10" fill="#2e7d32">similarity</text>
    
    <rect x="460" y="50" width="300" height="80" fill="#fff3e0" rx="8"/>
    <text x="470" y="72" font-size="13" fill="#ff9800" font-weight="bold">Major Categories</text>
    <text x="470" y="90" font-size="11" fill="#e65100">1. Partitional (K-Means)</text>
    <text x="470" y="106" font-size="11" fill="#e65100">2. Hierarchical</text>
    <text x="470" y="118" font-size="11" fill="#e65100">3. Density-Based (DBSCAN)</text>
    <text x="590" y="106" font-size="11" fill="#e65100">4. Grid-Based</text>
  </g>

  <g id="step2" class="step" data-narration="K-Means is a partitional algorithm that divides data into K clusters by iteratively updating centroids to minimize within-cluster variance.">
    <rect x="40" y="145" width="720" height="85" fill="#e3f2fd" rx="8"/>
    <text x="50" y="165" font-size="14" fill="#1976d2" font-weight="bold">Partitional: K-Means Algorithm</text>
    
    <rect x="50" y="180" width="130" height="40" fill="#1976d2" rx="5"/>
    <text x="115" y="205" font-size="11" fill="white" text-anchor="middle">1. Initialize K centroids</text>
    
    <path d="M190 200 L230 200" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="240" y="180" width="130" height="40" fill="#1976d2" rx="5"/>
    <text x="305" y="205" font-size="11" fill="white" text-anchor="middle">2. Assign points to nearest</text>
    
    <path d="M380 200 L420 200" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="430" y="180" width="130" height="40" fill="#1976d2" rx="5"/>
    <text x="495" y="205" font-size="11" fill="white" text-anchor="middle">3. Recalculate centroids</text>
    
    <path d="M570 200 L610 200" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="620" y="180" width="130" height="40" fill="#1976d2" rx="5"/>
    <text x="685" y="205" font-size="11" fill="white" text-anchor="middle">4. Repeat until convergence</text>
    
    <text x="50" y="235" font-size="10" fill="#1565c0">Requires K specified | Assumes spherical clusters | Sensitive to outliers</text>
  </g>

  <g id="step3" class="step" data-narration="Hierarchical clustering builds a tree of clusters using either bottom-up agglomerative merging or top-down divisive splitting methods.">
    <rect x="40" y="245" width="720" height="85" fill="#e8f5e9" rx="8"/>
    <text x="50" y="262" font-size="14" fill="#388e3c" font-weight="bold">Hierarchical Clustering</text>
    
    <rect x="50" y="275" width="150" height="45" fill="#388e3c" rx="5"/>
    <text x="125" y="295" font-size="11" fill="white" text-anchor="middle">Agglomerative</text>
    <text x="125" y="310" font-size="10" fill="white" text-anchor="middle">(Bottom-Up)</text>
    
    <rect x="220" y="275" width="150" height="45" fill="#388e3c" rx="5"/>
    <text x="295" y="295" font-size="11" fill="white" text-anchor="middle">Divisive</text>
    <text x="295" y="310" font-size="10" fill="white" text-anchor="middle">(Top-Down)</text>
    
    <rect x="400" y="275" width="350" height="45" fill="#c8e6c9" rx="5"/>
    <text x="575" y="290" font-size="11" fill="#2e7d32" text-anchor="middle">Linkage Methods</text>
    <text x="575" y="308" font-size="10" fill="#2e7d32" text-anchor="middle">Single | Complete | Average | Ward's</text>
    
    <path d="M100 335 L100 365 L180 365 L180 335" stroke="#388e3c" stroke-width="2" fill="none"/>
    <text x="140" y="358" font-size="9" fill="#388e3c" text-anchor="middle">Dendrogram</text>
    <line x1="100" y1="335" x2="180" y2="335" stroke="#388e3c" stroke-width="1"/>
    <line x1="110" y1="365" x2="170" y2="365" stroke="#388e3c" stroke-width="1"/>
  </g>

  <g id="step4" class="step" data-narration="DBSCAN groups points in high-density regions, marking outliers as noise. It uses epsilon for neighborhood radius and MinPts for density threshold.">
    <rect x="40" y="345" width="720" height="85" fill="#fff3e0" rx="8"/>
    <text x="50" y="362" font-size="14" fill="#ff9800" font-weight="bold">Density-Based: DBSCAN</text>
    
    <circle cx="100" cy="400" r="20" fill="#ff9800"/>
    <text x="100" y="395" font-size="9" fill="white" text-anchor="middle">Core</text>
    <text x="100" y="407" font-size="8" fill="white" text-anchor="middle">Point</text>
    
    <circle cx="180" cy="420" r="20" fill="#ffe0b2"/>
    <circle cx="180" cy="420" r="8" fill="#ff9800" opacity="0.5"/>
    <text x="180" y="415" font-size="8" fill="#e65100" text-anchor="middle">Border</text>
    <text x="180" y="427" font-size="8" fill="#e65100" text-anchor="middle">Point</text>
    
    <circle cx="260" cy="410" r="15" fill="#ffcdd2"/>
    <text x="260" y="414" font-size="8" fill="#c62828" text-anchor="middle">Noise</text>
    
    <rect x="320" y="375" width="200" height="45" fill="#ffe0b2" rx="5"/>
    <text x="420" y="390" font-size="11" fill="#e65100" text-anchor="middle" font-weight="bold">Parameters</text>
    <text x="420" y="410" font-size="10" fill="#e65100" text-anchor="middle">ε (epsilon): neighborhood radius</text>
    <text x="420" y="422" font-size="10" fill="#e65100" text-anchor="middle">MinPts: minimum points for core</text>
    
    <rect x="540" y="375" width="210" height="45" fill="#ffcc80" rx="5"/>
    <text x="645" y="390" font-size="11" fill="#e65100" text-anchor="middle" font-weight="bold">Advantages</text>
    <text x="645" y="408" font-size="10" fill="#e65100" text-anchor="middle">Finds arbitrary shapes</text>
    <text x="645" y="420" font-size="10" fill="#e65100" text-anchor="middle">Detects outliers as noise</text>
  </g>

  <g id="step5" class="step" data-narration="Different algorithms suit different needs: K-Means for spherical clusters, Hierarchical for dendrograms, DBSCAN for arbitrary shapes with outliers.">
    <rect x="40" y="445" width="720" height="85" fill="#f3e5f5" rx="8"/>
    <text x="50" y="462" font-size="14" fill="#9c27b0" font-weight="bold">Comparison & Selection Guide</text>
    
    <rect x="50" y="475" width="170" height="50" fill="#e1bee7" rx="5"/>
    <text x="135" y="490" font-size="10" fill="#7b1fa2" text-anchor="middle" font-weight="bold">K-Means</text>
    <text x="135" y="505" font-size="9" fill="#7b1fa2" text-anchor="middle">Spherical, K needed</text>
    <text x="135" y="517" font-size="9" fill="#7b1fa2" text-anchor="middle">Fast, scalable</text>
    
    <rect x="235" y="475" width="170" height="50" fill="#e1bee7" rx="5"/>
    <text x="320" y="490" font-size="10" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Hierarchical</text>
    <text x="320" y="505" font-size="9" fill="#7b1fa2" text-anchor="middle">No K needed</text>
    <text x="320" y="517" font-size="9" fill="#7b1fa2" text-anchor="middle">Dendrogram output</text>
    
    <rect x="420" y="475" width="170" height="50" fill="#e1bee7" rx="5"/>
    <text x="505" y="490" font-size="10" fill="#7b1fa2" text-anchor="middle" font-weight="bold">DBSCAN</text>
    <text x="505" y="505" font-size="9" fill="#7b1fa2" text-anchor="middle">Arbitrary shapes</text>
    <text x="505" y="517" font-size="9" fill="#7b1fa2" text-anchor="middle">Finds outliers</text>
    
    <rect x="605" y="475" width="145" height="50" fill="#e1bee7" rx="5"/>
    <text x="677" y="490" font-size="10" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Grid-Based</text>
    <text x="677" y="505" font-size="9" fill="#7b1fa2" text-anchor="middle">Very fast</text>
    <text x="677" y="517" font-size="9" fill="#7b1fa2" text-anchor="middle">Spatial data</text>
    
    <rect x="50" y="535" width="350" height="35" fill="#e3f2fd" rx="5"/>
    <text x="225" y="552" font-size="11" fill="#1976d2" text-anchor="middle">Evaluation: Silhouette Score | Davies-Bouldin | Dunn Index</text>
    
    <rect x="415" y="535" width="345" height="35" fill="#e8f5e9" rx="5"/>
    <text x="587" y="552" font-size="11" fill="#388e3c" text-anchor="middle">Applications: Marketing | Biology | Astronomy | Image Processing</text>
  </g>

  <g id="step6" class="step" data-narration="The Elbow Method helps choose K by plotting within-cluster sum of squares against K and finding where the curve bends like an elbow.">
    <rect x="40" y="540" width="720" height="50" fill="#ffebee" rx="8"/>
    <text x="50" y="560" font-size="13" fill="#f44336" font-weight="bold">Elbow Method</text>
    <text x="150" y="560" font-size="11" fill="#c62828">Plot WCSS vs K | Find the "elbow" point | That K is optimal</text>
    <path d="M450 575 Q500 555 550 575 Q600 595 650 575" stroke="#f44336" stroke-width="2" fill="none"/>
    <circle cx="550" cy="565" r="4" fill="#f44336"/>
    <text x="550" y="585" font-size="9" fill="#f44336" text-anchor="middle">Elbow</text>
  </g>
</svg>