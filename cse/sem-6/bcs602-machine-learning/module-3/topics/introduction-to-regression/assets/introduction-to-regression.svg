<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g id="step0" class="step" data-narration="Regression predicts continuous numerical values by modeling the relationship between input features and target variables, fundamental for forecasting and prediction tasks.">
    <rect x="200" y="10" width="400" height="40" fill="#1976d2" rx="8"/>
    <text x="400" y="34" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Introduction to Regression</text>
  </g>

  <g id="step1" class="step" data-narration="Regression is a supervised learning method that predicts continuous outcomes like house prices, temperatures, and sales by modeling relationships between variables.">
    <rect x="40" y="58" width="720" height="75" fill="#e3f2fd" rx="8"/>
    <text x="400" y="80" font-size="14" fill="#1976d2" text-anchor="middle" font-weight="bold">What is Regression?</text>
    <text x="400" y="100" font-size="11" fill="#1565c0" text-anchor="middle">A supervised learning technique to predict continuous numerical outcomes</text>
    <text x="400" y="118" font-size="10" fill="#1565c0" text-anchor="middle">Examples: House prices, temperature, sales forecasting</text>
  </g>

  <g id="step2" class="step" data-narration="Regression outputs continuous numbers while classification outputs categories. Regression uses MSE and R² metrics; classification uses accuracy and F1 scores.">
    <rect x="40" y="142" width="345" height="82" fill="#e8f5e9" rx="8"/>
    <text x="212" y="162" font-size="13" fill="#388e3c" text-anchor="middle" font-weight="bold">Regression</text>
    <text x="212" y="180" font-size="10" fill="#2e7d32" text-anchor="middle">Output: Continuous values</text>
    <text x="212" y="194" font-size="10" fill="#2e7d32" text-anchor="middle">Examples: Price, Temperature</text>
    <text x="212" y="208" font-size="10" fill="#2e7d32" text-anchor="middle">Metrics: MSE, R², RMSE</text>
    <rect x="415" y="142" width="345" height="82" fill="#fff3e0" rx="8"/>
    <text x="587" y="162" font-size="13" fill="#ff9800" text-anchor="middle" font-weight="bold">Classification</text>
    <text x="587" y="180" font-size="10" fill="#ef6c00" text-anchor="middle">Output: Discrete categories</text>
    <text x="587" y="194" font-size="10" fill="#ef6c00" text-anchor="middle">Examples: Spam/Ham, Cat/Dog</text>
    <text x="587" y="208" font-size="10" fill="#ef6c00" text-anchor="middle">Metrics: Accuracy, F1, AUC</text>
  </g>

  <g id="step3" class="step" data-narration="Independent variables (X) are input features. The dependent variable (Y) is the target to predict. A residual measures the prediction error.">
    <rect x="40" y="234" width="230" height="75" fill="#f3e5f5" rx="8"/>
    <text x="155" y="255" font-size="12" fill="#9c27b0" text-anchor="middle" font-weight="bold">Independent (X)</text>
    <text x="155" y="275" font-size="10" fill="#7b1fa2" text-anchor="middle">Input Features</text>
    <text x="155" y="290" font-size="10" fill="#7b1fa2" text-anchor="middle">Predictors</text>
    <path d="M270 271 L330 271" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <rect x="340" y="234" width="230" height="75" fill="#e3f2fd" rx="8"/>
    <text x="455" y="255" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Dependent (Y)</text>
    <text x="455" y="275" font-size="10" fill="#1565c0" text-anchor="middle">Target Variable</text>
    <text x="455" y="290" font-size="10" fill="#1565c0" text-anchor="middle">What we predict</text>
    <rect x="580" y="234" width="180" height="75" fill="#ffebee" rx="8"/>
    <text x="670" y="255" font-size="12" fill="#f44336" text-anchor="middle" font-weight="bold">Residual</text>
    <text x="670" y="275" font-size="10" fill="#c62828" text-anchor="middle">Error term</text>
    <text x="670" y="290" font-size="10" fill="#c62828" text-anchor="middle">y_actual - y_predicted</text>
  </g>

  <g id="step4" class="step" data-narration="Linear regression fits straight lines, polynomial captures curves, logistic predicts probabilities for classification, and Ridge/Lasso add penalties to prevent overfitting.">
    <rect x="40" y="318" width="170" height="80" fill="#e3f2fd" rx="8"/>
    <text x="125" y="338" font-size="11" fill="#1976d2" text-anchor="middle" font-weight="bold">Linear</text>
    <text x="125" y="355" font-size="9" fill="#1565c0" text-anchor="middle">y = b₀ + b₁X</text>
    <text x="125" y="370" font-size="9" fill="#1565c0" text-anchor="middle">Straight line</text>
    <text x="125" y="385" font-size="9" fill="#1565c0" text-anchor="middle">relationship</text>
    <rect x="220" y="318" width="170" height="80" fill="#e8f5e9" rx="8"/>
    <text x="305" y="338" font-size="11" fill="#388e3c" text-anchor="middle" font-weight="bold">Polynomial</text>
    <text x="305" y="355" font-size="9" fill="#2e7d32" text-anchor="middle">y = b₀ + b₁X + b₂X²</text>
    <text x="305" y="370" font-size="9" fill="#2e7d32" text-anchor="middle">Curved</text>
    <text x="305" y="385" font-size="9" fill="#2e7d32" text-anchor="middle">relationship</text>
    <rect x="400" y="318" width="170" height="80" fill="#fff3e0" rx="8"/>
    <text x="485" y="338" font-size="11" fill="#ff9800" text-anchor="middle" font-weight="bold">Logistic</text>
    <text x="485" y="355" font-size="9" fill="#ef6c00" text-anchor="middle">P(Y=1) = sigmoid()</text>
    <text x="485" y="370" font-size="9" fill="#ef6c00" text-anchor="middle">For classification</text>
    <text x="485" y="385" font-size="9" fill="#ef6c00" text-anchor="middle">tasks</text>
    <rect x="580" y="318" width="180" height="80" fill="#f3e5f5" rx="8"/>
    <text x="670" y="338" font-size="11" fill="#9c27b0" text-anchor="middle" font-weight="bold">Ridge &amp; Lasso</text>
    <text x="670" y="355" font-size="9" fill="#7b1fa2" text-anchor="middle">Add penalty term</text>
    <text x="670" y="370" font-size="9" fill="#7b1fa2" text-anchor="middle">Prevent</text>
    <text x="670" y="385" font-size="9" fill="#7b1fa2" text-anchor="middle">overfitting</text>
  </g>

  <g id="step5" class="step" data-narration="Linear regression assumes linearity between variables, independence of observations, homoscedasticity, normally distributed residuals, and no multicollinearity among predictor variables in the dataset.">
    <rect x="40" y="408" width="720" height="60" fill="#fff3e0" rx="8"/>
    <text x="400" y="426" font-size="12" fill="#ff9800" text-anchor="middle" font-weight="bold">Assumptions of Linear Regression</text>
    <rect x="50" y="436" width="130" height="25" fill="#ffe0b2" rx="4"/>
    <text x="115" y="452" font-size="9" fill="#e65100" text-anchor="middle">1. Linearity</text>
    <rect x="190" y="436" width="130" height="25" fill="#ffe0b2" rx="4"/>
    <text x="255" y="452" font-size="9" fill="#e65100" text-anchor="middle">2. Independence</text>
    <rect x="330" y="436" width="130" height="25" fill="#ffe0b2" rx="4"/>
    <text x="395" y="452" font-size="9" fill="#e65100" text-anchor="middle">3. Homoscedasticity</text>
    <rect x="470" y="436" width="130" height="25" fill="#ffe0b2" rx="4"/>
    <text x="535" y="452" font-size="9" fill="#e65100" text-anchor="middle">4. Normality</text>
    <rect x="610" y="436" width="140" height="25" fill="#ffe0b2" rx="4"/>
    <text x="680" y="452" font-size="9" fill="#e65100" text-anchor="middle">5. No Multicollinearity</text>
  </g>

  <g id="step6" class="step" data-narration="We evaluate models using R² for explained variance, MSE for penalizing large errors, RMSE for interpretable errors, and MAE which is robust to outliers.">
    <rect x="40" y="478" width="345" height="70" fill="#e3f2fd" rx="8"/>
    <text x="212" y="498" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Ordinary Least Squares (OLS)</text>
    <text x="212" y="518" font-size="10" fill="#1565c0" text-anchor="middle">Minimizes: Σ(yᵢ - ŷᵢ)²</text>
    <text x="212" y="533" font-size="10" fill="#1565c0" text-anchor="middle">Solution: w = (XᵀX)⁻¹Xᵀy</text>
    <rect x="415" y="478" width="345" height="70" fill="#e8f5e9" rx="8"/>
    <text x="587" y="498" font-size="12" fill="#388e3c" text-anchor="middle" font-weight="bold">Evaluation Metrics</text>
    <text x="587" y="518" font-size="10" fill="#2e7d32" text-anchor="middle">R², MSE, RMSE, MAE</text>
    <text x="587" y="533" font-size="10" fill="#2e7d32" text-anchor="middle">Measure prediction accuracy</text>
  </g>
</svg>