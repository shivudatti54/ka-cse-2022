<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Multiple linear regression extends simple regression by using two or more independent predictor variables to estimate a continuous dependent variable Y.">
    <rect x="50" y="10" width="700" height="40" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" font-size="20" fill="#1976d2" text-anchor="middle" font-weight="bold">Multiple Linear Regression</text>
  </g>
  
  <!-- Step 1: Model Equation + Matrix Form -->
  <g id="step1" class="step" data-narration="The regression equation predicts Y as b-zero plus b-one X-one plus b-two X-two and more predictors, represented in matrix form as Y equals Xb plus epsilon.">
    <rect x="50" y="58" width="700" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="80" font-size="14" fill="#1976d2" font-weight="bold">Model Equation</text>
    <text x="70" y="105" font-size="16" fill="#333">Y = b₀ + b₁X₁ + b₂X₂ + ... + bₙXₙ + ε</text>
    <text x="70" y="128" font-size="11" fill="#666">Y: Dependent | X: Independent | b: Coefficients | ε: Error | Matrix: Y = Xb + ε</text>
  </g>
  
  <!-- Step 2: OLS + Coefficient Interpretation -->
  <g id="step2" class="step" data-narration="The OLS solution finds coefficients by minimizing squared errors: b equals X-transpose X-inverse times X-transpose Y. Each coefficient shows the change in Y for a one-unit increase.">
    <rect x="50" y="146" width="700" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="168" font-size="14" fill="#388e3c" font-weight="bold">OLS Solution + Interpretation</text>
    <text x="70" y="192" font-size="15" fill="#333">b = (XᵀX)⁻¹ XᵀY  |  Salary = 30000 + 5000(Exp) + 2000(Edu)</text>
    <text x="70" y="212" font-size="11" fill="#666">+$5000/year Experience (holding Education constant) | +$2000/year Education</text>
  </g>
  
  <!-- Step 3: Assumptions -->
  <g id="step3" class="step" data-narration="Six key assumptions: linearity, independence, homoscedasticity, normality of residuals, no multicollinearity, and no autocorrelation. Each must be checked for valid regression results.">
    <rect x="50" y="234" width="700" height="80" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="70" y="256" font-size="14" fill="#f44336" font-weight="bold">Six Assumptions of MLR</text>
    <g transform="translate(70, 273)">
      <rect x="0" y="2" width="105" height="22" fill="#e3f2fd" rx="4"/>
      <text x="52" y="17" font-size="10" fill="#1976d2" text-anchor="middle">1. Linearity</text>
      <rect x="115" y="2" width="110" height="22" fill="#e8f5e9" rx="4"/>
      <text x="170" y="17" font-size="10" fill="#388e3c" text-anchor="middle">2. Independence</text>
      <rect x="235" y="2" width="145" height="22" fill="#fff3e0" rx="4"/>
      <text x="307" y="17" font-size="10" fill="#ff9800" text-anchor="middle">3. Homoscedasticity</text>
      <rect x="390" y="2" width="95" height="22" fill="#f3e5f5" rx="4"/>
      <text x="437" y="17" font-size="10" fill="#9c27b0" text-anchor="middle">4. Normality</text>
      <rect x="495" y="2" width="140" height="22" fill="#ffebee" rx="4"/>
      <text x="565" y="17" font-size="10" fill="#f44336" text-anchor="middle">5. No Multicollinearity</text>
    </g>
  </g>
  
  <!-- Step 4: Multicollinearity -->
  <g id="step4" class="step" data-narration="Multicollinearity occurs when predictors are highly correlated, causing unstable coefficient estimates. The Variance Inflation Factor VIF detects this serious problem in regression models.">
    <rect x="50" y="322" width="700" height="75" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="344" font-size="14" fill="#ff9800" font-weight="bold">Multicollinearity Detection (VIF)</text>
    <text x="70" y="370" font-size="15" fill="#333">VIF(Xᵢ) = 1 / (1 - R²ᵢ)  where R²ᵢ is from regressing Xᵢ on all other predictors</text>
    <g transform="translate(450, 360)">
      <rect x="0" y="0" width="90" height="24" fill="#e8f5e9" rx="4"/>
      <text x="45" y="16" font-size="10" fill="#388e3c" text-anchor="middle">VIF 1-5: Moderate</text>
      <rect x="100" y="0" width="90" height="24" fill="#ffebee" rx="4"/>
      <text x="145" y="16" font-size="10" fill="#f44336" text-anchor="middle">VIF > 10: Severe</text>
    </g>
  </g>
  
  <!-- Step 5: Model Evaluation -->
  <g id="step5" class="step" data-narration="R-squared measures variance explained but increases with more variables. Adjusted R-squared penalizes unnecessary predictors. The F-test evaluates overall model significance.">
    <rect x="50" y="405" width="700" height="75" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="427" font-size="14" fill="#1976d2" font-weight="bold">Model Evaluation Metrics</text>
    <g transform="translate(70, 445)">
      <rect x="0" y="2" width="170" height="22" fill="#e3f2fd" rx="4" stroke="#1976d2"/>
      <text x="85" y="17" font-size="11" fill="#1976d2" text-anchor="middle">R²: Variance Explained</text>
      <rect x="180" y="2" width="180" height="22" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
      <text x="270" y="17" font-size="11" fill="#388e3c" text-anchor="middle">Adjusted R²: Penalizes extra predictors</text>
      <rect x="370" y="2" width="150" height="22" fill="#f3e5f5" rx="4" stroke="#9c27b0"/>
      <text x="445" y="17" font-size="11" fill="#9c27b0" text-anchor="middle">F-test: Model significance</text>
    </g>
  </g>
  
  <!-- Step 6: Feature Selection -->
  <g id="step6" class="step" data-narration="Feature selection methods: forward adds predictors iteratively, backward removes the least useful, and stepwise combines both directions for optimal model building.">
    <rect x="50" y="488" width="700" height="75" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="510" font-size="14" fill="#9c27b0" font-weight="bold">Feature Selection Methods</text>
    <g transform="translate(70, 528)">
      <rect x="0" y="2" width="160" height="22" fill="#e3f2fd" rx="4"/>
      <text x="80" y="17" font-size="11" fill="#1976d2" text-anchor="middle">Forward: Add best predictor</text>
      <rect x="170" y="2" width="160" height="22" fill="#e8f5e9" rx="4"/>
      <text x="250" y="17" font-size="11" fill="#388e3c" text-anchor="middle">Backward: Remove worst predictor</text>
      <rect x="340" y="2" width="160" height="22" fill="#fff3e0" rx="4"/>
      <text x="420" y="17" font-size="11" fill="#ff9800" text-anchor="middle">Stepwise: Combine both</text>
    </g>
  </g>
</svg>