<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <g id="step0" class="step" data-narration="KNN is a simple supervised learning algorithm for classification and regression. It is a lazy learner that stores training data and computes only at prediction time.">
    <rect x="35" y="10" width="730" height="55" fill="none"/>
    <text x="40" y="35" font-size="22" font-weight="bold" fill="#1976d2">K-Nearest Neighbor Learning</text>
    <text x="40" y="55" font-size="14" fill="#666">Instance-based (lazy) learning for classification and regression</text>
  </g>
  
  <g id="step1" class="step" data-narration="Step one stores training data in memory. Step two calculates distance from query to all points. Step three finds K nearest neighbors and predicts via vote or average.">
    <rect x="35" y="75" width="730" height="80" fill="none"/>
    <rect x="40" y="82" width="160" height="65" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="50" y="107" font-size="14" font-weight="bold" fill="#1976d2">Step 1: Store</text>
    <text x="50" y="125" font-size="12" fill="#333">Training Data</text>
    <text x="50" y="139" font-size="11" fill="#666">in Memory</text>
    <line x1="200" y1="114" x2="240" y2="114" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="260" y="82" width="160" height="65" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="270" y="107" font-size="14" font-weight="bold" fill="#1976d2">Step 2: Calculate</text>
    <text x="270" y="125" font-size="12" fill="#333">Distance to Query</text>
    <text x="270" y="139" font-size="11" fill="#666">Point</text>
    <line x1="420" y1="114" x2="460" y2="114" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="480" y="82" width="160" height="65" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="490" y="107" font-size="14" font-weight="bold" fill="#1976d2">Step 3: Predict</text>
    <text x="490" y="125" font-size="12" fill="#333">Find K Neighbors</text>
    <text x="490" y="139" font-size="11" fill="#666">Vote or Average</text>
  </g>
  
  <g id="step2" class="step" data-narration="Distance metrics measure point similarity. Euclidean is straight-line distance. Manhattan sums absolute differences. Minkowski generalizes both. Choice affects decision boundaries.">
    <rect x="35" y="163" width="730" height="80" fill="none"/>
    <text x="40" y="185" font-size="16" font-weight="bold" fill="#333">Distance Metrics</text>
    <rect x="40" y="195" width="220" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="6"/>
    <text x="50" y="215" font-size="12" fill="#333">Euclidean: d = √Σ(xᵢ-yᵢ)²</text>
    <text x="50" y="231" font-size="10" fill="#666">Straight-line distance</text>
    
    <rect x="270" y="195" width="220" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="6"/>
    <text x="280" y="215" font-size="12" fill="#333">Manhattan: d = Σ|xᵢ-yᵢ|</text>
    <text x="280" y="231" font-size="10" fill="#666">Absolute differences</text>
    
    <rect x="500" y="195" width="200" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="6"/>
    <text x="510" y="215" font-size="12" fill="#333">Minkowski: (Σ|xᵢ-yᵢ|^p)^(1/p)</text>
    <text x="510" y="231" font-size="10" fill="#666">p=1: Manhattan, p=2: Euclidean</text>
  </g>
  
  <g id="step3" class="step" data-narration="K controls model complexity. Small K equals low bias, high variance, and noisy boundaries. Large K equals higher bias, low variance, and smoother boundaries. Use cross-validation to find optimal K.">
    <rect x="35" y="251" width="730" height="80" fill="none"/>
    <text x="40" y="273" font-size="16" font-weight="bold" fill="#333">Effect of K on Decision Boundary</text>
    <rect x="40" y="283" width="150" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="50" y="303" font-size="13" font-weight="bold" fill="#388e3c">Small K (K=1)</text>
    <text x="50" y="319" font-size="11" fill="#333">Low bias, high variance</text>
    
    <rect x="210" y="283" width="150" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="220" y="303" font-size="13" font-weight="bold" fill="#388e3c">Medium K (K=5)</text>
    <text x="220" y="319" font-size="11" fill="#333">Balanced boundary</text>
    
    <rect x="380" y="283" width="150" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="390" y="303" font-size="13" font-weight="bold" fill="#388e3c">Large K (K=15)</text>
    <text x="390" y="319" font-size="11" fill="#333">Higher bias, low variance</text>
  </g>
  
  <g id="step4" class="step" data-narration="Weighted KNN gives closer neighbors more influence. Weight equals inverse of distance. This helps when neighbors have uneven densities and improves prediction accuracy.">
    <rect x="35" y="339" width="730" height="80" fill="none"/>
    <text x="40" y="361" font-size="16" font-weight="bold" fill="#333">Weighted KNN</text>
    <rect x="40" y="371" width="340" height="45" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="6"/>
    <text x="50" y="389" font-size="12" fill="#333">Standard KNN: All K neighbors contribute equally</text>
    <text x="50" y="405" font-size="11" fill="#666">wᵢ = 1 (equal weights)</text>
    
    <rect x="400" y="371" width="340" height="45" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="6"/>
    <text x="410" y="389" font-size="12" fill="#333">Weighted KNN: Closer neighbors have more influence</text>
    <text x="410" y="405" font-size="11" fill="#666">wᵢ = 1/d(p, query)</text>
  </g>
  
  <g id="step5" class="step" data-narration="Nearest Centroid Classifier calculates the mean of each class. It assigns the query to the nearest centroid. Faster than KNN but less accurate for complex shapes.">
    <rect x="35" y="427" width="730" height="80" fill="none"/>
    <text x="40" y="449" font-size="16" font-weight="bold" fill="#333">Nearest Centroid Classifier</text>
    <rect x="40" y="459" width="220" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="6"/>
    <text x="50" y="477" font-size="12" fill="#333">Calculate centroid for each class</text>
    <text x="50" y="493" font-size="11" fill="#666">Mean of all training points</text>
    
    <rect x="280" y="459" width="220" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="6"/>
    <text x="290" y="477" font-size="12" fill="#333">Assign query to nearest centroid</text>
    <text x="290" y="493" font-size="11" fill="#666">Compare distance to centroids</text>
    
    <rect x="520" y="459" width="200" height="45" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="6"/>
    <text x="530" y="477" font-size="12" fill="#333">Pros: Fast prediction</text>
    <text x="530" y="493" font-size="11" fill="#666">Cons: Assumes spherical clusters</text>
  </g>
  
  <g id="step6" class="step" data-narration="KNN limitations include expensive prediction and curse of dimensionality. Feature scaling is essential to prevent large-range features from dominating distances.">
    <rect x="35" y="515" width="730" height="80" fill="none"/>
    <text x="40" y="537" font-size="16" font-weight="bold" fill="#333">Key Considerations</text>
    <rect x="40" y="547" width="165" height="45" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="6"/>
    <text x="50" y="565" font-size="11" fill="#f44336">Limitations</text>
    <text x="50" y="582" font-size="10" fill="#333">Expensive prediction (O(n))</text>
    <text x="50" y="593" font-size="10" fill="#666">Curse of dimensionality</text>
    
    <rect x="215" y="547" width="165" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="6"/>
    <text x="225" y="565" font-size="11" fill="#388e3c">Feature Scaling</text>
    <text x="225" y="582" font-size="10" fill="#333">Standardize or normalize</text>
    <text x="225" y="593" font-size="10" fill="#666">Prevents feature dominance</text>
    
    <rect x="390" y="547" width="165" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="6"/>
    <text x="400" y="565" font-size="11" fill="#ff9800">Efficiency</text>
    <text x="400" y="582" font-size="10" fill="#333">KD-Trees, Ball Trees</text>
    <text x="400" y="593" font-size="10" fill="#666">Faster neighbor search</text>
    
    <rect x="565" y="547" width="165" height="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="6"/>
    <text x="575" y="565" font-size="11" fill="#1976d2">Odd K</text>
    <text x="575" y="582" font-size="10" fill="#333">Prevents ties in</text>
    <text x="575" y="593" font-size="10" fill="#666">binary classification</text>
  </g>
</svg>