<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step0" class="step" data-narration="Univariate analysis studies one variable at a time to find patterns, understand distributions, and identify anomalies before building ML models.">
    <text x="400" y="35" font-size="20" font-weight="bold" fill="#1976d2" text-anchor="middle">Univariate Data Analysis and Visualization</text>
  </g>
  
  <g id="step1" class="step" data-narration="Three measures find the data center: Mean is the average, Median is the sorted middle value, Mode is most frequent.">
    <rect x="30" y="60" width="740" height="75" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="50" y="85" font-size="15" font-weight="bold" fill="#1976d2">Measures of Central Tendency</text>
    <circle cx="120" cy="110" r="22" fill="#ff9800"/>
    <text x="120" y="106" font-size="11" fill="white" text-anchor="middle">Mean</text>
    <text x="120" y="120" font-size="9" fill="white" text-anchor="middle">(Average)</text>
    <path d="M145,110 L175,110" stroke="#1976d2" stroke-width="2"/>
    <circle cx="200" cy="110" r="22" fill="#388e3c"/>
    <text x="200" y="106" font-size="11" fill="white" text-anchor="middle">Median</text>
    <text x="200" y="120" font-size="9" fill="white" text-anchor="middle">(Middle)</text>
    <path d="M225,110 L255,110" stroke="#1976d2" stroke-width="2"/>
    <circle cx="280" cy="110" r="22" fill="#9c27b0"/>
    <text x="280" y="106" font-size="11" fill="white" text-anchor="middle">Mode</text>
    <text x="280" y="120" font-size="9" fill="white" text-anchor="middle">(Frequent)</text>
    <text x="400" y="105" font-size="11" fill="#666">Use median for skewed data,</text>
    <text x="400" y="120" font-size="11" fill="#666">mean for normal distributions</text>
  </g>
  
  <g id="step2" class="step" data-narration="Dispersion shows data spread: Range is max minus min, Variance is average squared difference from mean, Standard Deviation is the square root.">
    <rect x="30" y="148" width="740" height="75" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="50" y="173" font-size="15" font-weight="bold" fill="#388e3c">Measures of Dispersion</text>
    <rect x="50" y="190" width="140" height="28" fill="#c8e6c9" rx="4"/>
    <text x="120" y="208" font-size="11" fill="#2e7d32" text-anchor="middle">Range = Max - Min</text>
    <rect x="200" y="190" width="140" height="28" fill="#c8e6c9" rx="4"/>
    <text x="270" y="208" font-size="11" fill="#2e7d32" text-anchor="middle">Variance = Avg(x-μ)²</text>
    <rect x="350" y="190" width="140" height="28" fill="#c8e6c9" rx="4"/>
    <text x="420" y="208" font-size="11" fill="#2e7d32" text-anchor="middle">Std Dev = √Variance</text>
    <rect x="500" y="190" width="140" height="28" fill="#ffe0b2" rx="4"/>
    <text x="570" y="208" font-size="11" fill="#e65100" text-anchor="middle">IQR = Q3 - Q1</text>
    <text x="660" y="208" font-size="10" fill="#666">Middle 50% spread</text>
  </g>
  
  <g id="step3" class="step" data-narration="Distribution shape: Skewness measures asymmetry where positive means right tail and negative means left tail, while Kurtosis measures how heavy the distribution tails are.">
    <rect x="30" y="236" width="740" height="75" fill="#f3e5f5" rx="8" stroke="#9c27b2" stroke-width="2"/>
    <text x="50" y="261" font-size="15" font-weight="bold" fill="#9c27b2">Distribution Shape: Skewness and Kurtosis</text>
    <rect x="50" y="278" width="220" height="28" fill="#e1bee7" rx="4"/>
    <text x="160" y="296" font-size="10" fill="#7b1fa2" text-anchor="middle">Positive Skew: Right-tailed (Mean > Median)</text>
    <rect x="280" y="278" width="220" height="28" fill="#e1bee7" rx="4"/>
    <text x="390" y="296" font-size="10" fill="#7b1fa2" text-anchor="middle">Negative Skew: Left-tailed (Mean &lt; Median)</text>
    <rect x="510" y="278" width="260" height="28" fill="#ce93d8" rx="4"/>
    <text x="640" y="296" font-size="10" fill="#7b1fa2" text-anchor="middle">Leptokurtic: Heavy tails, sharp peak</text>
  </g>
  
  <g id="step4" class="step" data-narration="Histograms group numerical data into bins to visually show how values are distributed across ranges, while box plots display the five-number summary including minimum, Q1, median, Q3, and maximum.">
    <rect x="30" y="324" width="740" height="75" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="50" y="349" font-size="15" font-weight="bold" fill="#1976d2">Numerical Data Visualizations</text>
    <rect x="50" y="365" width="330" height="28" fill="#bbdefb" rx="4"/>
    <text x="215" y="383" font-size="12" fill="#0d47a1" text-anchor="middle">Histogram: Groups values into bins to show distribution</text>
    <rect x="390" y="365" width="370" height="28" fill="#bbdefb" rx="4"/>
    <text x="575" y="383" font-size="12" fill="#0d47a1" text-anchor="middle">Box Plot: Shows five-number summary (Min, Q1, Median, Q3, Max)</text>
  </g>
  
  <g id="step5" class="step" data-narration="Categorical data is best visualized using bar charts to display frequency counts across categories and pie charts to show the proportion each category represents in the dataset.">
    <rect x="30" y="412" width="740" height="75" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="50" y="437" font-size="15" font-weight="bold" fill="#f44336">Categorical Data Visualizations</text>
    <rect x="50" y="453" width="330" height="28" fill="#ffcdd2" rx="4"/>
    <text x="215" y="471" font-size="12" fill="#b71c1c" text-anchor="middle">Bar Chart: Shows frequency counts for each category</text>
    <rect x="390" y="453" width="370" height="28" fill="#ffcdd2" rx="4"/>
    <text x="575" y="471" font-size="12" fill="#b71c1c" text-anchor="middle">Pie Chart: Shows proportion of each category in the data</text>
  </g>
  
  <g id="step6" class="step" data-narration="Outliers detected by Z-score beyond 3 SD or IQR method (below Q1-1.5×IQR or above Q3+1.5×IQR). Handle missing values by deletion, imputation, or prediction.">
    <rect x="30" y="500" width="740" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="50" y="525" font-size="15" font-weight="bold" fill="#ff9800">Outlier Detection and Missing Value Treatment</text>
    <rect x="50" y="540" width="220" height="32" fill="#ffe0b2" rx="4"/>
    <text x="160" y="560" font-size="10" fill="#e65100" text-anchor="middle">Z-Score: Values beyond ±3 SD</text>
    <rect x="280" y="540" width="230" height="32" fill="#ffe0b2" rx="4"/>
    <text x="395" y="560" font-size="10" fill="#e65100" text-anchor="middle">IQR Method: Below Q1-1.5×IQR or Above Q3+1.5×IQR</text>
    <rect x="520" y="540" width="240" height="32" fill="#ffe0b2" rx="4"/>
    <text x="640" y="560" font-size="10" fill="#e65100" text-anchor="middle">Missing Values: Delete, Impute, or Predict</text>
  </g>
</svg>