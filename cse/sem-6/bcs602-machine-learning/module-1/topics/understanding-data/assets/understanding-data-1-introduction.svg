<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Understanding Data: Introduction</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Data is the fundamental foundation of machine learning. Quality data determines model success, following the Garbage In, Garbage Out principle.">
    <rect x="0" y="40" width="800" height="50" fill="transparent"/>
    <text x="400" y="65" text-anchor="middle" font-size="14" fill="#616161">Data Types, Structure, and Organization for ML</text>
  </g>

  <g id="step1" class="step" data-narration="A dataset is a structured table where rows represent instances (observations) and columns represent features (attributes or variables) for analysis.">
    <rect x="50" y="95" width="700" height="120" rx="8" fill="white" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Dataset Structure: Instances (Rows) and Features (Columns)</text>
    <rect x="150" y="130" width="500" height="75" rx="4" fill="#e3f2fd"/>
    <text x="220" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">ID</text>
    <text x="340" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Size (sqft)</text>
    <text x="460" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Bedrooms</text>
    <text x="580" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Price ($)</text>
    <line x1="150" y1="158" x2="650" y2="158" stroke="#1976d2" stroke-width="1"/>
    <text x="220" y="178" text-anchor="middle" font-size="9" fill="#424242">1</text>
    <text x="340" y="178" text-anchor="middle" font-size="9" fill="#424242">1500</text>
    <text x="460" y="178" text-anchor="middle" font-size="9" fill="#424242">3</text>
    <text x="580" y="178" text-anchor="middle" font-size="9" fill="#424242">250,000</text>
    <text x="220" y="194" text-anchor="middle" font-size="9" fill="#424242">2</text>
    <text x="340" y="194" text-anchor="middle" font-size="9" fill="#424242">2200</text>
    <text x="460" y="194" text-anchor="middle" font-size="9" fill="#424242">4</text>
    <text x="580" y="194" text-anchor="middle" font-size="9" fill="#424242">380,000</text>
    <text x="90" y="165" text-anchor="middle" font-size="9" fill="#1565c0">Instances</text>
    <text x="710" y="165" text-anchor="middle" font-size="9" fill="#1565c0">Features</text>
  </g>

  <g id="step2" class="step" data-narration="Numerical (quantitative) data represents measurable values like height, weight, or temperature, or discrete counts like number of students in a class.">
    <rect x="50" y="225" width="340" height="105" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">Numerical Data</text>
    <text x="220" y="262" text-anchor="middle" font-size="10" fill="#0d47a1">(Quantitative)</text>
    <rect x="65" y="272" width="145" height="45" rx="4" fill="#bbdefb"/>
    <text x="137" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Continuous</text>
    <text x="137" y="305" text-anchor="middle" font-size="8" fill="#616161">Height, Weight</text>
    <rect x="220" y="272" width="145" height="45" rx="4" fill="#bbdefb"/>
    <text x="292" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Discrete</text>
    <text x="292" y="305" text-anchor="middle" font-size="8" fill="#616161">Student Count</text>
  </g>

  <g id="step3" class="step" data-narration="Categorical (qualitative) data includes nominal categories without order like gender or color, and ordinal data with ranking like education level.">
    <rect x="50" y="340" width="340" height="105" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Categorical Data</text>
    <text x="220" y="377" text-anchor="middle" font-size="10" fill="#1b5e20">(Qualitative)</text>
    <rect x="65" y="387" width="145" height="45" rx="4" fill="#c8e6c9"/>
    <text x="137" y="405" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Nominal</text>
    <text x="137" y="420" text-anchor="middle" font-size="8" fill="#616161">Gender, Color</text>
    <rect x="220" y="387" width="145" height="45" rx="4" fill="#c8e6c9"/>
    <text x="292" y="405" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">Ordinal</text>
    <text x="292" y="420" text-anchor="middle" font-size="8" fill="#616161">Education Level</text>
  </g>

  <g id="step4" class="step" data-narration="Structured data is organized in tables, CSV, or SQL databases. Unstructured data like text, images, audio, and video requires specialized processing.">
    <rect x="410" y="340" width="340" height="105" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="580" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Data Structure</text>
    <rect x="425" y="375" width="145" height="40" rx="4" fill="#ffe0b2"/>
    <text x="497" y="392" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Structured</text>
    <text x="497" y="407" text-anchor="middle" font-size="8" fill="#616161">Tables, CSV, SQL</text>
    <rect x="580" y="375" width="145" height="40" rx="4" fill="#e1bee7"/>
    <text x="652" y="392" text-anchor="middle" font-size="10" font-weight="bold" fill="#7b1fa2">Unstructured</text>
    <text x="652" y="407" text-anchor="middle" font-size="8" fill="#616161">Text, Images, Audio</text>
  </g>

  <g id="step5" class="step" data-narration="Supervised learning uses labeled data with features X and target label y. Unsupervised learning uses only features to discover hidden patterns.">
    <rect x="50" y="455" width="700" height="80" rx="8" fill="white"/>
    <text x="400" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Features (X) vs Labels (y) in ML</text>
    <rect x="80" y="490" width="290" height="35" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="225" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Labeled: Features (X) + Target (y)</text>
    <rect x="390" y="490" width="290" height="35" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="535" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Unlabeled: Features (X) only</text>
  </g>
</svg>