<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Types of Machine Learning</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Machine learning types are classified by the kind of feedback signal the model receives during training: labels, structure discovery, or reward signals.">
    <rect x="20" y="10" width="760" height="38" rx="6" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-size="14" fill="#616161">Classification by Feedback: Labels, Structure, or Rewards</text>
  </g>

  <g id="step1" class="step" data-narration="Supervised learning uses labeled data with input-output pairs to learn mapping functions for predictions like spam detection and price forecasting.">
    <rect x="30" y="58" width="740" height="75" rx="10" fill="#fafafa" stroke="#9e9e9e" stroke-width="1"/>
    <rect x="40" y="68" width="220" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="150" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Supervised</text>
    <text x="150" y="108" text-anchor="middle" font-size="9" fill="#424242">Labeled Data</text>
    <text x="150" y="120" text-anchor="middle" font-size="8" fill="#757575">Classification, Regression</text>
    <rect x="290" y="68" width="220" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Unsupervised</text>
    <text x="400" y="108" text-anchor="middle" font-size="9" fill="#424242">Unlabeled Data</text>
    <text x="400" y="120" text-anchor="middle" font-size="8" fill="#757575">Clustering, PCA</text>
    <rect x="540" y="68" width="220" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="650" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Reinforcement</text>
    <text x="650" y="108" text-anchor="middle" font-size="9" fill="#424242">Reward Signals</text>
    <text x="650" y="120" text-anchor="middle" font-size="8" fill="#757575">Q-Learning, Policy</text>
  </g>

  <g id="step2" class="step" data-narration="Unsupervised learning discovers hidden structures and patterns within unlabeled data using clustering and dimensionality reduction for segmentation and anomaly detection.">
    <rect x="30" y="143" width="740" height="75" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1"/>
    <text x="400" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Algorithm Examples by Type</text>
    <rect x="40" y="178" width="230" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="155" y="198" text-anchor="middle" font-size="9" fill="#1565c0">Linear/Logistic Regression, SVM</text>
    <rect x="285" y="178" width="230" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="400" y="198" text-anchor="middle" font-size="9" fill="#2e7d32">K-Means, DBSCAN, PCA</text>
    <rect x="530" y="178" width="230" height="35" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="645" y="198" text-anchor="middle" font-size="9" fill="#e65100">Q-Learning, SARSA, DQN</text>
  </g>

  <g id="step3" class="step" data-narration="Reinforcement learning trains an agent through environment interaction to maximize cumulative rewards by learning optimal actions through trial, error, and feedback.">
    <rect x="30" y="228" width="740" height="70" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1"/>
    <text x="400" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Evaluation Metrics</text>
    <rect x="50" y="263" width="200" height="30" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="150" y="283" text-anchor="middle" font-size="10" fill="#1565c0">Accuracy, MSE, F1 Score</text>
    <rect x="300" y="263" width="200" height="30" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="400" y="283" text-anchor="middle" font-size="10" fill="#2e7d32">Silhouette Score, Inertia</text>
    <rect x="550" y="263" width="200" height="30" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="650" y="283" text-anchor="middle" font-size="10" fill="#e65100">Average Reward</text>
  </g>

  <g id="step4" class="step" data-narration="Supervised learning algorithms include linear regression for continuous values, logistic regression for classification, and decision trees for structured decision-making.">
    <rect x="35" y="308" width="730" height="85" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1"/>
    <text x="400" y="333" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">ML Workflow Process</text>
    <rect x="50" y="345" width="140" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="120" y="365" text-anchor="middle" font-size="10" fill="#7b1fa2">1. Identify Data</text>
    <line x1="195" y1="358" x2="210" y2="358" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="215" y="345" width="140" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="285" y="365" text-anchor="middle" font-size="10" fill="#7b1fa2">2. Choose Type</text>
    <line x1="360" y1="358" x2="375" y2="358" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="380" y="345" width="140" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="450" y="365" text-anchor="middle" font-size="10" fill="#7b1fa2">3. Train Model</text>
    <line x1="525" y1="358" x2="540" y2="358" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="545" y="345" width="140" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="615" y="365" text-anchor="middle" font-size="10" fill="#7b1fa2">4. Evaluate</text>
  </g>

  <g id="step5" class="step" data-narration="Real-world applications span all types: face recognition uses supervised learning, market analysis applies unsupervised techniques, and game AI employs reinforcement strategies.">
    <rect x="35" y="403" width="730" height="65" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1"/>
    <text x="400" y="428" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Real-World Applications</text>
    <rect x="50" y="438" width="210" height="25" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="155" y="455" text-anchor="middle" font-size="10" fill="#1565c0">Face Recognition, NLP</text>
    <rect x="295" y="438" width="210" height="25" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="400" y="455" text-anchor="middle" font-size="10" fill="#2e7d32">Market Basket Analysis</text>
    <rect x="540" y="438" width="210" height="25" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="645" y="455" text-anchor="middle" font-size="10" fill="#e65100">Game AI, Robotics</text>
  </g>

  <g id="step6" class="step" data-narration="Choose the right type based on your data: supervised for labeled data, unsupervised for hidden patterns, and reinforcement for sequential decision-making problems.">
    <rect x="35" y="478" width="730" height="100" rx="8" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
    <text x="400" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Summary: Choosing the Right Type</text>
    <text x="400" y="540" text-anchor="middle" font-size="12" fill="#424242">Supervised: Labeled data with known outputs</text>
    <text x="400" y="560" text-anchor="middle" font-size="12" fill="#424242">Unsupervised: Hidden patterns in unlabeled data</text>
    <text x="400" y="580" text-anchor="middle" font-size="12" fill="#424242">Reinforcement: Sequential decisions through reward feedback</text>
  </g>
</svg>