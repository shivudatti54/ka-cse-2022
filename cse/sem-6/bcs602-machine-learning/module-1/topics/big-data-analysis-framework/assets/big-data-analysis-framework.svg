<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g id="step0" class="step" data-narration="Big Data Analysis Framework provides the infrastructure to handle massive datasets essential for machine learning. It manages scale, speed, and complexity of data.">
    <rect x="40" y="10" width="720" height="40" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" font-size="18" fill="#1976d2" text-anchor="middle" font-weight="bold">Big Data Analysis Framework</text>
  </g>

  <g id="step1" class="step" data-narration="Big Data frameworks provide infrastructure to handle massive datasets. They are essential for machine learning because they manage data scale, speed, and complexity before algorithms can learn.">
    <rect x="40" y="58" width="720" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="60" y="80" font-size="14" fill="#1976d2" font-weight="bold">The Foundation for Machine Learning</text>
    <text x="60" y="100" font-size="11" fill="#333">Big Data frameworks provide infrastructure to handle massive datasets essential for</text>
    <text x="60" y="115" font-size="11" fill="#333">machine learning. They manage data scale, speed, and complexity.</text>
    <text x="60" y="132" font-size="10" fill="#666">Data preparation (up to 80% of ML effort) is automated and scaled.</text>
  </g>

  <g id="step2" class="step" data-narration="Big Data is defined by five characteristics called the 5 V's. Volume is scale, Velocity is speed, Variety is different forms, Veracity is quality, and Value is insights derived.">
    <rect x="40" y="146" width="720" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="60" y="168" font-size="14" fill="#388e3c" font-weight="bold">The 5 V's of Big Data</text>
    
    <rect x="60" y="185" width="125" height="35" fill="#1976d2" rx="5"/>
    <text x="75" y="203" font-size="11" fill="white" font-weight="bold">Volume</text>
    <text x="150" y="203" font-size="9" fill="#333">Scale (Petabytes)</text>
    
    <rect x="195" y="185" width="125" height="35" fill="#9c27b0" rx="5"/>
    <text x="210" y="203" font-size="11" fill="white" font-weight="bold">Velocity</text>
    <text x="285" y="203" font-size="9" fill="#333">Speed (Realtime)</text>
    
    <rect x="330" y="185" width="125" height="35" fill="#388e3c" rx="5"/>
    <text x="345" y="203" font-size="11" fill="white" font-weight="bold">Variety</text>
    <text x="420" y="203" font-size="9" fill="#333">Forms (Text, JSON)</text>
    
    <rect x="465" y="185" width="125" height="35" fill="#ff9800" rx="5"/>
    <text x="480" y="203" font-size="11" fill="white" font-weight="bold">Veracity</text>
    <text x="555" y="203" font-size="9" fill="#333">Quality/Trust</text>
    
    <rect x="600" y="185" width="125" height="35" fill="#f44336" rx="5"/>
    <text x="615" y="203" font-size="11" fill="white" font-weight="bold">Value</text>
    <text x="690" y="203" font-size="9" fill="#333">Insights</text>
  </g>

  <g id="step3" class="step" data-narration="The framework has three core components: Data Ingestion collects using Kafka, Flume, Sqoop. Data Storage uses HDFS and NoSQL. Data Processing transforms and analyzes data.">
    <rect x="40" y="234" width="720" height="90" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="60" y="256" font-size="14" fill="#ff9800" font-weight="bold">Core Components of Big Data Framework</text>
    
    <rect x="60" y="275" width="200" height="42" fill="#1976d2" rx="6"/>
    <text x="75" y="295" font-size="12" fill="white" font-weight="bold">Data Ingestion</text>
    <text x="75" y="310" font-size="10" fill="white">Kafka, Flume, Sqoop</text>
    
    <path d="M270 296 L290 296" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    
    <rect x="295" y="275" width="200" height="42" fill="#9c27b0" rx="6"/>
    <text x="310" y="295" font-size="12" fill="white" font-weight="bold">Data Storage</text>
    <text x="310" y="310" font-size="10" fill="white">HDFS, NoSQL DBs</text>
    
    <path d="M505 296 L525 296" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    
    <rect x="530" y="275" width="200" height="42" fill="#388e3c" rx="6"/>
    <text x="545" y="295" font-size="12" fill="white" font-weight="bold">Data Processing</text>
    <text x="545" y="310" font-size="10" fill="white">MapReduce, Spark</text>
  </g>

  <g id="step4" class="step" data-narration="Two processing models exist: Batch Processing handles large volumes at once using MapReduce for historical analysis. Stream Processing handles data in real-time for immediate insights.">
    <rect x="40" y="332" width="720" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="60" y="354" font-size="14" fill="#9c27b0" font-weight="bold">Processing Models: Batch vs Stream</text>
    
    <rect x="60" y="372" width="290" height="35" fill="#1976d2" rx="5"/>
    <text x="75" y="390" font-size="11" fill="white" font-weight="bold">Batch Processing</text>
    <text x="180" y="390" font-size="10" fill="white">Map → Shuffle → Reduce (Historical analysis)</text>
    
    <rect x="365" y="372" width="290" height="35" fill="#388e3c" rx="5"/>
    <text x="380" y="390" font-size="11" fill="white" font-weight="bold">Stream Processing</text>
    <text x="500" y="390" font-size="10" fill="white">Real-time (Storm, Flink, Spark Streaming)</text>
  </g>

  <g id="step5" class="step" data-narration="The Hadoop ecosystem includes HDFS for storage, YARN for resource management, and tools like Spark and Hive. These provide the infrastructure for distributed ML model training.">
    <rect x="40" y="420" width="720" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="60" y="442" font-size="14" fill="#1976d2" font-weight="bold">Hadoop Ecosystem</text>
    
    <rect x="60" y="460" width="140" height="35" fill="#ff9800" rx="5"/>
    <text x="75" y="478" font-size="11" fill="white" font-weight="bold">HDFS</text>
    <text x="130" y="478" font-size="9" fill="#333">Storage</text>
    
    <rect x="210" y="460" width="140" height="35" fill="#9c27b0" rx="5"/>
    <text x="225" y="478" font-size="11" fill="white" font-weight="bold">YARN</text>
    <text x="275" y="478" font-size="9" fill="#333">Resource Mgmt</text>
    
    <rect x="360" y="460" width="140" height="35" fill="#388e3c" rx="5"/>
    <text x="375" y="478" font-size="11" fill="white" font-weight="bold">Spark</text>
    <text x="430" y="478" font-size="9" fill="#333">Processing</text>
    
    <rect x="510" y="460" width="140" height="35" fill="#f44336" rx="5"/>
    <text x="525" y="478" font-size="11" fill="white" font-weight="bold">Hive/Pig</text>
    <text x="580" y="478" font-size="9" fill="#333">Query Layer</text>
  </g>

  <g id="step6" class="step" data-narration="Big Data is critical for ML: it handles data preparation taking 80 percent of effort, enables distributed model training on clusters, and manages high-dimensional feature sets efficiently.">
    <rect x="40" y="508" width="720" height="75" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="60" y="530" font-size="14" fill="#388e3c" font-weight="bold">Big Data to Machine Learning Connection</text>
    
    <rect x="60" y="548" width="200" height="30" fill="#1976d2" rx="5"/>
    <text x="75" y="565" font-size="10" fill="white" font-weight="bold">Data Preparation</text>
    <text x="180" y="565" font-size="9" fill="#333">80% of ML effort</text>
    
    <rect x="270" y="548" width="200" height="30" fill="#9c27b0" rx="5"/>
    <text x="285" y="565" font-size="10" fill="white" font-weight="bold">Model Training</text>
    <text x="390" y="565" font-size="9" fill="#333">Distributed clusters</text>
    
    <rect x="480" y="548" width="200" height="30" fill="#ff9800" rx="5"/>
    <text x="495" y="565" font-size="10" fill="white" font-weight="bold">Feature Engineering</text>
    <text x="610" y="565" font-size="9" fill="#333">High-dimensional data</text>
  </g>
</svg>