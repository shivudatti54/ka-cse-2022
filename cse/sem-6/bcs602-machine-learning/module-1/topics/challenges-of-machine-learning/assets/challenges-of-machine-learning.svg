<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>

  <g id="step0" class="step" data-narration="Machine learning faces key challenges including data issues like insufficient quantity and poor quality, plus model problems like overfitting and underfitting.">
    <rect x="0" y="5" width="800" height="45" fill="#1976d2"/>
    <text x="400" y="32" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Challenges of Machine Learning</text>
  </g>

  <g id="step1" class="step" data-narration="Insufficient training data is critical. Simple problems need thousands of examples, complex tasks like image recognition require millions of data points.">
    <rect x="50" y="60" width="700" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="82" font-size="14" font-weight="bold" fill="#1976d2">1. Insufficient Data</text>
    <rect x="70" y="98" width="320" height="40" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="230" y="118" font-size="11" fill="#c62828" text-anchor="middle">Problem: Small datasets → unreliable, cannot generalize</text>
    <rect x="410" y="98" width="310" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="565" y="118" font-size="11" fill="#2e7d32" text-anchor="middle">Solutions: Augmentation, transfer learning</text>
  </g>

  <g id="step2" class="step" data-narration="Overfitting: model memorizes training data including noise. Shows low training error but high test error. Regularization and dropout prevent this.">
    <rect x="50" y="155" width="700" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="177" font-size="14" font-weight="bold" fill="#e65100">2. Overfitting</text>
    <rect x="70" y="193" width="320" height="40" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="230" y="213" font-size="11" fill="#e65100" text-anchor="middle">Train Error: LOW | Test Error: HIGH</text>
    <text x="230" y="227" font-size="10" fill="#e65100" text-anchor="middle">Causes: complex model, too many features</text>
    <rect x="410" y="193" width="310" height="40" rx="5" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="565" y="213" font-size="11" fill="#f57f17" text-anchor="middle">Solutions: Regularization, dropout</text>
  </g>

  <g id="step3" class="step" data-narration="Underfitting: model too simple to capture patterns. Both training and test errors are high. Use more complex models or better features.">
    <rect x="50" y="250" width="700" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="272" font-size="14" font-weight="bold" fill="#e65100">3. Underfitting</text>
    <rect x="70" y="288" width="320" height="40" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="230" y="308" font-size="11" fill="#e65100" text-anchor="middle">Train Error: HIGH | Test Error: HIGH</text>
    <text x="230" y="322" font-size="10" fill="#e65100" text-anchor="middle">Causes: too simple model, few features</text>
    <rect x="410" y="288" width="310" height="40" rx="5" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
    <text x="565" y="308" font-size="11" fill="#f57f17" text-anchor="middle">Solutions: Powerful model, better features</text>
  </g>

  <g id="step4" class="step" data-narration="Poor quality data with noise, missing values in datasets, and outliers corrupts machine learning. Clean data by imputing values and detecting outliers.">
    <rect x="50" y="345" width="700" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="70" y="367" font-size="14" font-weight="bold" fill="#1976d2">4. Poor Quality Data</text>
    <rect x="70" y="383" width="320" height="40" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="230" y="403" font-size="11" fill="#c62828" text-anchor="middle">Issues: Missing values, outliers, noise</text>
    <rect x="410" y="383" width="310" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="565" y="403" font-size="11" fill="#2e7d32" text-anchor="middle">Solutions: Impute values, outlier detection</text>
  </g>

  <g id="step5" class="step" data-narration="Curse of dimensionality: data becomes sparse in high-dimensional spaces as features increase. Distances lose meaning. PCA and feature selection or engineering help.">
    <rect x="50" y="440" width="700" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="462" font-size="14" font-weight="bold" fill="#9c27b0">5. Curse of Dimensionality</text>
    <rect x="70" y="478" width="320" height="40" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="230" y="498" font-size="11" fill="#6a1b9a" text-anchor="middle">Problem: High dimensions → sparse space</text>
    <rect x="410" y="478" width="310" height="40" rx="5" fill="#ede7f6" stroke="#7b1fa2" stroke-width="1.5"/>
    <text x="565" y="498" font-size="11" fill="#6a1b9a" text-anchor="middle">Solutions: PCA, feature selection</text>
  </g>

  <g id="step6" class="step" data-narration="Ethical bias in AI systems: training data reflects historical prejudices, models amplify inequalities. Use fairness audits and diverse data for explainability.">
    <rect x="50" y="535" width="700" height="55" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="70" y="557" font-size="14" font-weight="bold" fill="#e91e63">6. Ethics & Bias</text>
    <rect x="230" y="552" width="490" height="30" rx="5" fill="#f8bbd9" stroke="#c2185b" stroke-width="1.5"/>
    <text x="475" y="569" font-size="11" fill="#880e4f" text-anchor="middle">Solutions: Fairness audits, diverse data, LIME, SHAP</text>
  </g>
</svg>