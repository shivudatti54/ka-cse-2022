<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Need for and Fundamentals of Machine Learning</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="ML flips traditional programming: instead of manually coding rules, computers now learn patterns directly from data to solve complex real-world problems automatically.">
    <rect x="20" y="50" width="760" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">The Paradigm Shift: From Explicit Rules to Learned Patterns</text>
  </g>

  <g id="step1" class="step" data-narration="Traditional programming needs humans to write rules. We input rules and data to get answers. ML reverses this: we provide answers and data, and the computer learns the rules.">
    <rect x="30" y="100" width="350" height="130" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="205" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">Traditional Programming</text>
    <rect x="60" y="145" width="80" height="28" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="100" y="165" text-anchor="middle" font-size="10" fill="#e65100">RULES</text>
    <rect x="230" y="145" width="80" height="28" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="270" y="165" text-anchor="middle" font-size="10" fill="#1565c0">DATA</text>
    <line x1="100" y1="175" x2="150" y2="200" stroke="#616161" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="270" y1="175" x2="220" y2="200" stroke="#616161" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="140" y="195" width="90" height="24" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="185" y="212" text-anchor="middle" font-size="10" fill="#2e7d32">Answers</text>
    
    <rect x="420" y="100" width="350" height="130" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="595" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e7d32">Machine Learning</text>
    <rect x="450" y="145" width="80" height="28" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="490" y="165" text-anchor="middle" font-size="10" fill="#1565c0">DATA</text>
    <rect x="620" y="145" width="80" height="28" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="660" y="165" text-anchor="middle" font-size="10" fill="#2e7d32">ANSWERS</text>
    <line x1="490" y1="175" x2="540" y2="200" stroke="#616161" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="660" y1="175" x2="610" y2="200" stroke="#616161" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="530" y="195" width="100" height="24" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="580" y="212" text-anchor="middle" font-size="10" fill="#e65100">Rules (Learned)</text>
  </g>

  <g id="step2" class="step" data-narration="Traditional programming fails when problems are too complex for human rules, when rules constantly change, or when the problem space is too massive to code manually.">
    <rect x="30" y="240" width="740" height="75" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Why Traditional Programming Fails</text>
    <rect x="60" y="280" width="200" height="28" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="160" y="300" text-anchor="middle" font-size="11" fill="#c62828">Too Complex - Image/Speech</text>
    <rect x="280" y="280" width="200" height="28" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="380" y="300" text-anchor="middle" font-size="11" fill="#c62828">Rules Change - Stocks, Preferences</text>
    <rect x="500" y="280" width="200" height="28" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="600" y="300" text-anchor="middle" font-size="11" fill="#c62828">Too Large - Web Search</text>
  </g>

  <g id="step3" class="step" data-narration="ML solves these problems by automating decisions, continuously adapting to new data, scaling to massive datasets, and personalizing experiences for each user.">
    <rect x="30" y="325" width="740" height="70" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="350" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">How Machine Learning Solves These Challenges</text>
    <rect x="60" y="365" width="160" height="25" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="140" y="382" text-anchor="middle" font-size="10" fill="#2e7d32">Automates Decisions</text>
    <rect x="235" y="365" width="160" height="25" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="315" y="382" text-anchor="middle" font-size="10" fill="#2e7d32">Adapts Continuously</text>
    <rect x="410" y="365" width="160" height="25" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="490" y="382" text-anchor="middle" font-size="10" fill="#e65100">Scales Massive</text>
    <rect x="585" y="365" width="160" height="25" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="665" y="382" text-anchor="middle" font-size="10" fill="#7b1fa2">Personalizes</text>
  </g>

  <g id="step4" class="step" data-narration="Arthur Samuel defined ML in 1959 as computers learning without explicit programming. Tom Mitchell later defined it as improving at tasks through experience.">
    <rect x="30" y="405" width="350" height="55" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="205" y="428" text-anchor="middle" font-size="11" font-style="italic" fill="#6a1b9a">"Ability to learn without being</text>
    <text x="205" y="443" text-anchor="middle" font-size="11" font-style="italic" fill="#6a1b9a">explicitly programmed."</text>
    <text x="300" y="450" text-anchor="middle" font-size="9" fill="#7b1fa2">- Samuel, 1959</text>
    
    <rect x="420" y="405" width="350" height="55" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="595" y="428" text-anchor="middle" font-size="11" font-style="italic" fill="#1565c0">"Learns from experience E for</text>
    <text x="595" y="443" text-anchor="middle" font-size="11" font-style="italic" fill="#1565c0">task T with measure P."</text>
    <text x="670" y="450" text-anchor="middle" font-size="9" fill="#1976d2">- Mitchell, 1997</text>
  </g>

  <g id="step5" class="step" data-narration="ML drives real-world applications: disease diagnosis in healthcare, fraud detection in finance, recommendations in retail, and self-driving cars in transportation.">
    <rect x="30" y="470" width="740" height="70" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="495" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Real-World Applications Driving ML Adoption</text>
    <rect x="60" y="508" width="120" height="26" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="120" y="526" text-anchor="middle" font-size="10" fill="#1565c0">Healthcare - Diagnosis</text>
    <rect x="200" y="508" width="120" height="26" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="260" y="526" text-anchor="middle" font-size="10" fill="#1565c0">Finance - Fraud Detection</text>
    <rect x="340" y="508" width="120" height="26" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="526" text-anchor="middle" font-size="10" fill="#e65100">Retail - Recommendations</text>
    <rect x="480" y="508" width="120" height="26" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="540" y="526" text-anchor="middle" font-size="10" fill="#7b1fa2">Transport - Self-Driving</text>
    <rect x="620" y="508" width="120" height="26" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="680" y="526" text-anchor="middle" font-size="10" fill="#c62828">Media - Streaming</text>
  </g>
</svg>