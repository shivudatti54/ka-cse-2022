<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2" />
      <stop offset="100%" stop-color="#42a5f5" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#388e3c" />
      <stop offset="100%" stop-color="#66bb6a" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f57c00" />
      <stop offset="100%" stop-color="#ffb74d" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b1fa2" />
      <stop offset="100%" stop-color="#ba68c8" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f57c00" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step0" class="step" data-narration="Machine Learning is a subfield of AI that enables computers to learn from data and improve performance through experience without explicit programming.">
    <rect x="0" y="0" width="800" height="55" fill="transparent"/>
    <text x="400" y="32" font-size="26" font-weight="bold" fill="#1976d2" text-anchor="middle">Machine Learning Explained</text>
    <text x="400" y="50" font-size="13" fill="#666" text-anchor="middle">Learning from data to make predictions and decisions</text>
  </g>
  
  <g id="step1" class="step" data-narration="Arthur Samuel defined ML in 1959 as the ability to learn without explicit programming. Tom Mitchell formalized it with experience E, task T, and performance measure P.">
    <rect x="20" y="63" width="760" height="85" fill="white" rx="8"/>
    <rect x="20" y="63" width="370" height="85" fill="#e3f2fd" rx="8"/>
    <rect x="410" y="63" width="370" height="85" fill="#e8f5e9" rx="8"/>
    <text x="40" y="88" font-size="15" font-weight="bold" fill="#1976d2">Arthur Samuel (1959)</text>
    <text x="40" y="110" font-size="11" fill="#333" font-style="italic">"Field that gives computers the</text>
    <text x="40" y="125" font-size="11" fill="#333" font-style="italic">ability to learn without being</text>
    <text x="40" y="140" font-size="11" fill="#333" font-style="italic">explicitly programmed."</text>
    
    <text x="430" y="88" font-size="15" font-weight="bold" fill="#388e3c">Tom Mitchell (1997)</text>
    <text x="430" y="110" font-size="11" fill="#333">Experience (E) → Task (T) → Performance (P)</text>
    <text x="430" y="128" font-size="11" fill="#333">Learns if performance improves with</text>
    <text x="430" y="146" font-size="11" fill="#333">experience on task T</text>
  </g>
  
  <g id="step2" class="step" data-narration="Three main ML types: Supervised learns from labeled data for predictions, Unsupervised finds patterns in unlabeled data, Reinforcement learns via action and reward.">
    <rect x="20" y="156" width="760" height="85" fill="white" rx="8"/>
    <text x="40" y="180" font-size="17" font-weight="bold" fill="#333">Three Types of Machine Learning</text>
    
    <rect x="40" y="195" width="210" height="40" fill="url(#blueGrad)" rx="6"/>
    <text x="145" y="217" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Supervised</text>
    
    <rect x="260" y="195" width="210" height="40" fill="url(#greenGrad)" rx="6"/>
    <text x="365" y="217" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Unsupervised</text>
    
    <rect x="480" y="195" width="190" height="40" fill="url(#orangeGrad)" rx="6"/>
    <text x="575" y="217" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Reinforcement</text>
    
    <text x="40" y="240" font-size="10" fill="#666">Labeled data → predictions</text>
    <text x="260" y="240" font-size="10" fill="#666">Unlabeled → patterns</text>
    <text x="480" y="240" font-size="10" fill="#666">Action → reward</text>
  </g>
  
  <g id="step3" class="step" data-narration="Supervised learning uses labeled data with input-output pairs. Classification predicts categories, regression predicts continuous numerical values like prices and scores.">
    <rect x="20" y="249" width="760" height="115" fill="white" rx="8"/>
    <rect x="20" y="249" width="350" height="115" fill="#e3f2fd" rx="8"/>
    <text x="40" y="272" font-size="15" font-weight="bold" fill="#1976d2">Supervised Learning</text>
    <text x="40" y="292" font-size="11" fill="#333">Labeled training data with</text>
    <text x="40" y="307" font-size="11" fill="#333">input-output pairs</text>
    
    <rect x="50" y="320" width="120" height="35" fill="#42a5f5" rx="6"/>
    <text x="110" y="342" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Classification</text>
    
    <rect x="180" y="320" width="120" height="35" fill="#1976d2" rx="6"/>
    <text x="240" y="342" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Regression</text>
    
    <rect x="380" y="249" width="390" height="115" fill="#e8f5e9" rx="8"/>
    <text x="400" y="272" font-size="15" font-weight="bold" fill="#388e3c">Unsupervised Learning</text>
    <text x="400" y="292" font-size="11" fill="#333">Finds hidden patterns in</text>
    <text x="400" y="307" font-size="11" fill="#333">unlabeled data</text>
    
    <rect x="410" y="320" width="150" height="35" fill="#66bb6a" rx="6"/>
    <text x="485" y="342" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Clustering</text>
    
    <rect x="570" y="320" width="170" height="35" fill="#388e3c" rx="6"/>
    <text x="655" y="342" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Dim. Reduction</text>
  </g>
  
  <g id="step4" class="step" data-narration="Unsupervised learning discovers hidden patterns without labels. Clustering groups similar items; dimensionality reduction like PCA simplifies data while preserving key information.">
    <rect x="20" y="372" width="760" height="128" fill="white" rx="8"/>
    <rect x="20" y="372" width="350" height="128" fill="#fff3e0" rx="8"/>
    <text x="40" y="395" font-size="15" font-weight="bold" fill="#f57c00">Reinforcement Learning</text>
    <text x="40" y="415" font-size="11" fill="#333">Agent learns from actions</text>
    <text x="40" y="430" font-size="11" fill="#333">and rewards to maximize</text>
    <text x="40" y="445" font-size="11" fill="#333">cumulative reward</text>
    
    <rect x="50" y="455" width="65" height="40" fill="#ffb74d" rx="6"/>
    <text x="82" y="475" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Agent</text>
    
    <line x1="115" y1="475" x2="135" y2="475" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowOrange)"/>
    
    <rect x="140" y="455" width="65" height="40" fill="#ff9800" rx="6"/>
    <text x="172" y="475" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Action</text>
    
    <line x1="205" y1="475" x2="225" y2="475" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowOrange)"/>
    
    <rect x="230" y="455" width="65" height="40" fill="#f57c00" rx="6"/>
    <text x="262" y="475" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Reward</text>
    
    <text x="390" y="395" font-size="12" fill="#666">Examples:</text>
    <text x="390" y="415" font-size="11" fill="#333">Game playing (Chess, Go),</text>
    <text x="390" y="433" font-size="11" fill="#333">Robotics, Self-driving cars</text>
    <text x="390" y="455" font-size="11" fill="#333">Autonomous navigation</text>
  </g>
  
  <g id="step5" class="step" data-narration="The ML workflow: define problem, collect data, prepare, train model, evaluate, deploy and monitor. Key concepts include features, labels, bias-variance tradeoff.">
    <rect x="20" y="508" width="760" height="92" fill="white" rx="8"/>
    <text x="40" y="533" font-size="14" font-weight="bold" fill="#333">ML Workflow:</text>
    <text x="150" y="533" font-size="11" fill="#1976d2">Problem → Data → Prepare → Train → Evaluate → Deploy → Monitor</text>
    
    <rect x="40" y="548" width="120" height="45" fill="#e3f2fd" rx="6"/>
    <text x="100" y="568" font-size="10" font-weight="bold" fill="#1976d2" text-anchor="middle">Key Concepts</text>
    <text x="100" y="582" font-size="9" fill="#333" text-anchor="middle">Features, Labels</text>
    
    <rect x="170" y="548" width="120" height="45" fill="#ffebee" rx="6"/>
    <text x="230" y="568" font-size="10" font-weight="bold" fill="#f44336" text-anchor="middle">Overfitting</text>
    <text x="230" y="582" font-size="9" fill="#333" text-anchor="middle">High variance</text>
    
    <rect x="300" y="548" width="120" height="45" fill="#fff3e0" rx="6"/>
    <text x="360" y="568" font-size="10" font-weight="bold" fill="#f57c00" text-anchor="middle">Underfitting</text>
    <text x="360" y="582" font-size="9" fill="#333" text-anchor="middle">High bias</text>
    
    <rect x="430" y="548" width="120" height="45" fill="#e8f5e9" rx="6"/>
    <text x="490" y="568" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Bias-Variance</text>
    <text x="490" y="582" font-size="9" fill="#333" text-anchor="middle">Tradeoff</text>
    
    <rect x="560" y="548" width="120" height="45" fill="#f3e5f5" rx="6"/>
    <text x="620" y="568" font-size="10" font-weight="bold" fill="#9c27b0" text-anchor="middle">Evaluation</text>
    <text x="620" y="582" font-size="9" fill="#333" text-anchor="middle">Accuracy, F1</text>
  </g>
</svg>