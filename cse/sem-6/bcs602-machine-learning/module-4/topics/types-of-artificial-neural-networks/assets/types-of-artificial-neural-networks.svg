<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- step0: Title -->
  <g id="step0" class="step" data-narration="Artificial Neural Networks come in various architectures designed for specific problems. From basic feedforward networks to advanced GANs, each type suits different data types and tasks.">
    <rect x="0" y="0" width="800" height="50" fill="#f8f9fa"/>
    <text x="400" y="30" font-size="22" font-weight="bold" fill="#1976d2" text-anchor="middle">Types of Artificial Neural Networks</text>
    <line x1="50" y1="40" x2="750" y2="40" stroke="#e3f2fd" stroke-width="2"/>
  </g>
  
  <!-- step1: Feedforward Neural Networks -->
  <g id="step1" class="step" data-narration="Feedforward Neural Networks pass information in one direction from input to output without loops. MLPs have hidden layers between input and output for solving complex non-linear problems.">
    <rect x="50" y="58" width="700" height="84" fill="#e3f2fd" rx="8"/>
    <text x="60" y="78" font-size="13" font-weight="bold" fill="#1976d2">1. Feedforward Neural Networks (FNN) / MLP</text>
    <text x="60" y="95" font-size="10" fill="#555">Information flows one direction (input → hidden → output). Fully connected layers.</text>
    <!-- MLP Diagram -->
    <rect x="100" y="100" width="35" height="20" fill="#388e3c" rx="3"/>
    <text x="105" y="114" font-size="7" fill="white">In</text>
    <rect x="180" y="105" width="30" height="30" fill="#ff9800" rx="3"/>
    <text x="188" y="122" font-size="7" fill="#333">Hidden</text>
    <rect x="260" y="105" width="30" height="30" fill="#ff9800" rx="3"/>
    <text x="268" y="122" font-size="7" fill="#333">Hidden</text>
    <rect x="340" y="108" width="35" height="20" fill="#f44336" rx="3"/>
    <text x="348" y="122" font-size="7" fill="white">Out</text>
    <!-- Connections -->
    <line x1="135" y1="110" x2="180" y2="115" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="210" y1="120" x2="260" y2="120" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="290" y1="120" x2="340" y2="120" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <!-- Use cases -->
    <rect x="400" y="105" width="130" height="22" fill="#e8f5e9" rx="4"/>
    <text x="465" y="120" font-size="9" fill="#388e3c" text-anchor="middle">Tabular Data, Classification</text>
  </g>
  
  <!-- step2: Convolutional Neural Networks -->
  <g id="step2" class="step" data-narration="Convolutional Neural Networks use filters to detect spatial patterns in images. Pooling reduces size while retaining important features, making CNNs powerful for image recognition tasks.">
    <rect x="50" y="150" width="700" height="82" fill="#fff3e0" rx="8"/>
    <text x="60" y="170" font-size="13" font-weight="bold" fill="#ff9800">2. Convolutional Neural Networks (CNN)</text>
    <text x="60" y="187" font-size="10" fill="#555">Uses convolution layers with filters to detect spatial features in images.</text>
    <!-- CNN Diagram -->
    <rect x="100" y="195" width="50" height="25" fill="#388e3c" rx="3"/>
    <text x="112" y="212" font-size="8" fill="white">Input</text>
    <rect x="180" y="195" width="45" height="25" fill="#9c27b0" rx="3"/>
    <text x="190" y="212" font-size="8" fill="white">Conv</text>
    <rect x="255" y="198" width="30" height="20" fill="#ff9800" rx="3"/>
    <text x="262" y="212" font-size="7" fill="white">Pool</text>
    <rect x="315" y="198" width="30" height="20" fill="#ff9800" rx="3"/>
    <text x="322" y="212" font-size="7" fill="white">Pool</text>
    <rect x="375" y="195" width="40" height="25" fill="#f44336" rx="3"/>
    <text x="382" y="212" font-size="8" fill="white">FC</text>
    <rect x="445" y="200" width="35" height="18" fill="#1976d2" rx="3"/>
    <text x="450" y="213" font-size="7" fill="white">Output</text>
    <!-- Arrows -->
    <line x1="150" y1="207" x2="180" y2="207" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <line x1="225" y1="207" x2="255" y2="207" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <line x1="285" y1="207" x2="315" y2="207" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <line x1="345" y1="207" x2="375" y2="207" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <line x1="415" y1="207" x2="445" y2="207" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
  </g>
  
  <!-- step3: Recurrent Neural Networks -->
  <g id="step3" class="step" data-narration="Recurrent Neural Networks have feedback connections allowing them to remember previous inputs. They process sequences step by step, maintaining a hidden state that acts as memory for the network.">
    <rect x="50" y="240" width="700" height="80" fill="#e1f5fe" rx="8"/>
    <text x="60" y="260" font-size="13" font-weight="bold" fill="#0288d1">3. Recurrent Neural Networks (RNN)</text>
    <text x="60" y="277" font-size="10" fill="#555">Feedback loops create memory of previous inputs for sequence processing.</text>
    <!-- RNN Diagram -->
    <rect x="100" y="285" width="40" height="22" fill="#388e3c" rx="3"/>
    <text x="105" y="300" font-size="8" fill="white">x(t)</text>
    <rect x="160" y="285" width="40" height="22" fill="#388e3c" rx="3"/>
    <text x="165" y="300" font-size="8" fill="white">x(t+1)</text>
    <rect x="160" y="265" width="50" height="25" fill="#f44336" rx="3"/>
    <text x="172" y="280" font-size="8" fill="white">Hidden</text>
    <rect x="260" y="290" width="35" height="18" fill="#1976d2" rx="3"/>
    <text x="268" y="303" font-size="7" fill="white">Output</text>
    <!-- RNN Loop -->
    <circle cx="185" cy="275" r="15" fill="#ff9800"/>
    <text x="185" y="278" font-size="6" fill="white" text-anchor="middle">Recur</text>
    <!-- Arrows -->
    <line x1="140" y1="296" x2="160" y2="296" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="200" y1="275" x2="200" y2="290" stroke="#ff9800" stroke-width="1"/>
    <line x1="210" y1="285" x2="260" y2="298" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <!-- Use cases -->
    <rect x="320" y="285" width="140" height="22" fill="#e1f5fe" rx="4"/>
    <text x="390" y="300" font-size="9" fill="#0288d1" text-anchor="middle">NLP, Time Series, Speech</text>
  </g>
  
  <!-- step4: LSTM -->
  <g id="step4" class="step" data-narration="Long Short-Term Memory networks use gating mechanisms to solve the vanishing gradient problem. The forget, input, and output gates control what information to keep, add, or reveal at each step.">
    <rect x="50" y="328" width="700" height="78" fill="#f3e5f5" rx="8"/>
    <text x="60" y="348" font-size="13" font-weight="bold" fill="#9c27b0">4. Long Short-Term Memory (LSTM)</text>
    <text x="60" y="365" font-size="10" fill="#555">RNN variant with gating mechanisms that solve vanishing gradient and learn long-term dependencies.</text>
    <!-- LSTM Diagram -->
    <rect x="100" y="372" width="45" height="20" fill="#388e3c" rx="3"/>
    <text x="108" y="386" font-size="8" fill="white">Input</text>
    <rect x="180" y="358" width="55" height="28" fill="#ff9800" rx="5"/>
    <text x="193" y="370" font-size="7" fill="#333" font-weight="bold">Forget</text>
    <text x="200" y="382" font-size="6" fill="#555">Gate</text>
    <rect x="265" y="358" width="55" height="28" fill="#9c27b0" rx="5"/>
    <text x="278" y="370" font-size="7" fill="white" font-weight="bold">Input</text>
    <text x="285" y="382" font-size="6" fill="white">Gate</text>
    <rect x="350" y="358" width="55" height="28" fill="#388e3c" rx="5"/>
    <text x="363" y="370" font-size="7" fill="white" font-weight="bold">Output</text>
    <text x="370" y="382" font-size="6" fill="white">Gate</text>
    <!-- Arrows -->
    <line x1="145" y1="382" x2="180" y2="372" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <line x1="200" y1="372" x2="265" y2="368" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <line x1="290" y1="372" x2="350" y2="368" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <!-- Labels -->
    <text x="265" y="355" font-size="8" fill="#9c27b0">Machine Translation</text>
  </g>
  
  <!-- step5: Autoencoders -->
  <g id="step5" class="step" data-narration="Autoencoders learn to compress data into a bottleneck representation and reconstruct it. The encoder reduces dimensions while the decoder rebuilds the original input from this compressed form.">
    <rect x="50" y="414" width="700" height="78" fill="#e8f5e9" rx="8"/>
    <text x="60" y="434" font-size="13" font-weight="bold" fill="#388e3c">5. Autoencoders</text>
    <text x="60" y="451" font-size="10" fill="#555">Unsupervised networks that compress input into latent representation and reconstruct it.</text>
    <!-- Autoencoder Diagram -->
    <rect x="100" y="460" width="40" height="22" fill="#388e3c" rx="3"/>
    <text x="108" y="475" font-size="8" fill="white">Input</text>
    <rect x="170" y="455" width="50" height="30" fill="#1976d2" rx="3"/>
    <text x="182" y="468" font-size="8" fill="white">Encoder</text>
    <text x="185" y="480" font-size="6" fill="white">(Compress)</text>
    <rect x="250" y="462" width="28" height="16" fill="#f44336" rx="10"/>
    <text x="256" y="474" font-size="6" fill="white">Latent</text>
    <rect x="305" y="455" width="50" height="30" fill="#ff9800" rx="3"/>
    <text x="317" y="468" font-size="8" fill="#333">Decoder</text>
    <text x="320" y="480" font-size="6" fill="#555">(Reconstruct)</text>
    <rect x="385" y="460" width="40" height="22" fill="#9c27b0" rx="3"/>
    <text x="393" y="475" font-size="8" fill="white">Output</text>
    <!-- Arrows -->
    <line x1="140" y1="471" x2="170" y2="471" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="220" y1="471" x2="250" y2="471" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowBlue)"/>
    <line x1="278" y1="471" x2="305" y2="471" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <line x1="355" y1="471" x2="385" y2="471" stroke="#ff9800" stroke-width="1" marker-end="url(#arrowOrange)"/>
    <!-- Variants -->
    <rect x="450" y="462" width="110" height="18" fill="#e8f5e9" rx="4"/>
    <text x="505" y="475" font-size="8" fill="#388e3c" text-anchor="middle">Denoising, VAE</text>
  </g>
  
  <!-- step6: GAN -->
  <g id="step6" class="step" data-narration="Generative Adversarial Networks have two competing networks: a generator that creates fake samples and a discriminator that judges authenticity. They train together through adversarial competition.">
    <rect x="50" y="500" width="700" height="90" fill="#ffebee" rx="8"/>
    <text x="60" y="520" font-size="13" font-weight="bold" fill="#f44336">6. Generative Adversarial Networks (GAN)</text>
    <text x="60" y="537" font-size="10" fill="#555">Two networks compete: Generator creates fake data, Discriminator judges real vs fake.</text>
    <!-- GAN Diagram -->
    <rect x="100" y="548" width="70" height="30" fill="#388e3c" rx="3"/>
    <text x="120" y="568" font-size="9" fill="white">Generator</text>
    <text x="125" y="578" font-size="6" fill="white">(Creates)</text>
    <rect x="250" y="548" width="70" height="30" fill="#f44336" rx="3"/>
    <text x="268" y="568" font-size="9" fill="white">Discriminator</text>
    <text x="275" y="578" font-size="6" fill="white">(Judges)</text>
    <rect x="400" y="550" width="50" height="24" fill="#9c27b0" rx="3"/>
    <text x="410" y="567" font-size="8" fill="white">Real/Fake</text>
    <!-- Arrows -->
    <line x1="170" y1="563" x2="250" y2="563" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <line x1="320" y1="563" x2="400" y2="563" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
    <!-- Feedback loop -->
    <path d="M 320 578 Q 320 590 185 590 Q 100 590 100 571" stroke="#f44336" stroke-width="1" fill="none" stroke-dasharray="3"/>
    <text x="200" y="588" font-size="7" fill="#f44336">Adversarial Feedback</text>
    <!-- Applications -->
    <rect x="480" y="555" width="80" height="18" fill="#ffebee" rx="4"/>
    <text x="520" y="568" font-size="8" fill="#f44336" text-anchor="middle">Image Gen</text>
  </g>
</svg>