<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2" />
      <stop offset="100%" stop-color="#388e3c" />
    </linearGradient>
    <linearGradient id="orangePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9800" />
      <stop offset="100%" stop-color="#9c27b0" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step0" class="step" data-narration="Bayes classification uses probability theory to assign data points to categories based on observed evidence and prior knowledge of the dataset.">
    <rect x="40" y="15" width="720" height="40" fill="none"/>
    <text x="50" y="38" font-size="22" fill="#1976d2" font-weight="bold">Classification Using Bayes Model</text>
    <text x="50" y="55" font-size="14" fill="#388e3c">Learning how probability helps predict categories like dog or cat</text>
  </g>
  
  <g id="step1" class="step" data-narration="Bayes' Theorem calculates the probability of a hypothesis given evidence using posterior equals likelihood times prior divided by evidence probability.">
    <rect x="40" y="63" width="720" height="102" fill="none"/>
    <text x="50" y="85" font-size="18" fill="#1976d2" font-weight="bold">Bayes' Theorem Formula</text>
    <text x="50" y="108" font-size="16" fill="#1976d2">P(H|E) = P(E|H) × P(H) / P(E)</text>
    <rect x="50" y="120" width="150" height="40" fill="#e3f2fd" stroke="#1976d2" rx="6"/>
    <text x="60" y="138" font-size="11" fill="#1976d2" font-weight="bold">P(H): Prior</text>
    <text x="60" y="150" font-size="9" fill="#666">belief before evidence</text>
    <rect x="210" y="120" width="150" height="40" fill="#e8f5e9" stroke="#388e3c" rx="6"/>
    <text x="220" y="138" font-size="11" fill="#388e3c" font-weight="bold">P(E|H): Likelihood</text>
    <text x="220" y="150" font-size="9" fill="#666">evidence given hypothesis</text>
    <rect x="370" y="120" width="150" height="40" fill="#fff3e0" stroke="#ff9800" rx="6"/>
    <text x="380" y="138" font-size="11" fill="#ff9800" font-weight="bold">P(H|E): Posterior</text>
    <text x="380" y="150" font-size="9" fill="#666">belief after evidence</text>
  </g>
  
  <g id="step2" class="step" data-narration="The classification process defines prior probabilities, calculates likelihood from features, computes posterior probabilities, then assigns the class with highest probability.">
    <rect x="40" y="173" width="720" height="89" fill="none"/>
    <text x="50" y="195" font-size="18" fill="#1976d2" font-weight="bold">Four Steps of Bayes Classification</text>
    <rect x="50" y="212" width="120" height="45" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="60" y="230" font-size="11" fill="#1976d2" font-weight="bold">Step 1</text>
    <text x="60" y="244" font-size="10" fill="#333">Define Priors</text>
    <line x1="170" y1="234" x2="185" y2="234" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="195" y="212" width="120" height="45" fill="#e8f5e9" stroke="#388e3c" rx="8"/>
    <text x="205" y="230" font-size="11" fill="#388e3c" font-weight="bold">Step 2</text>
    <text x="205" y="244" font-size="10" fill="#333">Calculate Likelihood</text>
    <line x1="315" y1="234" x2="330" y2="234" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="340" y="212" width="120" height="45" fill="#fff3e0" stroke="#ff9800" rx="8"/>
    <text x="350" y="230" font-size="11" fill="#ff9800" font-weight="bold">Step 3</text>
    <text x="350" y="244" font-size="10" fill="#333">Find Posterior</text>
    <line x1="460" y1="234" x2="475" y2="234" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="485" y="212" width="120" height="45" fill="#f3e5f5" stroke="#9c27b0" rx="8"/>
    <text x="495" y="230" font-size="11" fill="#9c27b0" font-weight="bold">Step 4</text>
    <text x="495" y="244" font-size="10" fill="#333">Assign Class</text>
  </g>
  
  <g id="step3" class="step" data-narration="A decision boundary separates classes where probabilities equal. Points on one side belong to one class, while points on the other side belong to the alternative class.">
    <rect x="40" y="270" width="720" height="135" fill="none"/>
    <text x="50" y="292" font-size="18" fill="#1976d2" font-weight="bold">Decision Boundary</text>
    <text x="50" y="310" font-size="11" fill="#666">The dividing line where class probabilities are equal</text>
    <circle cx="180" cy="345" r="12" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="175" y="349" font-size="10" fill="#f44336">A</text>
    <circle cx="240" cy="330" r="12" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="235" y="334" font-size="10" fill="#f44336">B</text>
    <circle cx="300" cy="350" r="12" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="295" y="354" font-size="10" fill="#f44336">C</text>
    <circle cx="480" cy="335" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="475" y="339" font-size="10" fill="#1976d2">X</text>
    <circle cx="540" cy="345" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="535" y="349" font-size="10" fill="#1976d2">Y</text>
    <circle cx="600" cy="330" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="595" y="334" font-size="10" fill="#1976d2">Z</text>
    <line x1="390" y1="305" x2="390" y2="380" stroke="#1976d2" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="355" y="398" font-size="10" fill="#f44336">Class 1 (Red)</text>
    <text x="515" y="398" font-size="10" fill="#1976d2">Class 2 (Blue)</text>
  </g>
  
  <g id="step4" class="step" data-narration="In this dog versus cat example, prior probabilities of 0.7 for dog and 0.3 for cat lead to a posterior of 0.93 for dog classification.">
    <rect x="40" y="413" width="720" height="176" fill="none"/>
    <text x="50" y="435" font-size="18" fill="#1976d2" font-weight="bold">Example: Dog vs Cat Classification</text>
    <rect x="50" y="451" width="150" height="40" fill="#e3f2fd" stroke="#1976d2" rx="6"/>
    <text x="60" y="469" font-size="12" fill="#1976d2" font-weight="bold">Prior Probabilities</text>
    <text x="60" y="485" font-size="10" fill="#333">P(Dog) = 0.7, P(Cat) = 0.3</text>
    <rect x="210" y="451" width="150" height="40" fill="#e8f5e9" stroke="#388e3c" rx="6"/>
    <text x="220" y="469" font-size="12" fill="#388e3c" font-weight="bold">Likelihood</text>
    <text x="220" y="485" font-size="10" fill="#333">P(Image|Dog) = 0.8</text>
    <rect x="370" y="451" width="150" height="40" fill="#fff3e0" stroke="#ff9800" rx="6"/>
    <text x="380" y="469" font-size="12" fill="#ff9800" font-weight="bold">Posterior</text>
    <text x="380" y="485" font-size="10" fill="#333">P(Dog|Image) = 0.93</text>
    <rect x="530" y="451" width="150" height="40" fill="#4caf50" rx="6"/>
    <text x="560" y="469" font-size="12" fill="white" font-weight="bold">CLASSIFIED</text>
    <text x="560" y="485" font-size="10" fill="white">as Dog (0.93)</text>
    <rect x="50" y="501" width="300" height="60" fill="#e3f2fd" stroke="#1976d2" rx="8"/>
    <text x="60" y="524" font-size="13" fill="#1976d2" font-weight="bold">Naive Bayes Simplification</text>
    <text x="60" y="544" font-size="11" fill="#333">Features conditionally independent given class</text>
    <text x="60" y="557" font-size="10" fill="#666">P(X₁...Xₙ|Class) = ∏ P(Xᵢ|Class)</text>
  </g>
</svg>