<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <g id="step0" class="step" data-narration="Biological neurons are specialized cells that process information through electrochemical signals. They form the inspiration for artificial neural networks in machine learning.">
    <rect x="0" y="0" width="800" height="45" fill="none"/>
    <text x="400" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Biological Neurons</text>
  </g>
  
  <g id="step1" class="step" data-narration="A neuron has four main parts: dendrites receive signals, the soma processes them, the axon transmits output, and synapses connect to other neurons.">
    <rect x="50" y="53" width="700" height="78" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Neuron Structure Overview</text>
    <ellipse cx="140" cy="108" rx="35" ry="18" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="140" y="111" text-anchor="middle" font-size="9" fill="#0d47a1">Dendrites</text>
    <ellipse cx="280" cy="108" rx="30" ry="22" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="280" y="111" text-anchor="middle" font-size="9" fill="#1b5e20">Soma</text>
    <rect x="330" y="95" width="220" height="26" rx="13" fill="#ffe0b2" stroke="#ff9800" stroke-width="1.5"/>
    <text x="440" y="114" text-anchor="middle" font-size="10" fill="#e65100">Axon</text>
    <rect x="570" y="95" width="70" height="26" rx="5" fill="#ce93d8" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="605" y="114" text-anchor="middle" font-size="9" fill="#6a1b9a">Synapse</text>
    <line x1="175" y1="108" x2="250" y2="108" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="310" y1="108" x2="330" y2="108" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="550" y1="108" x2="570" y2="108" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <g id="step2" class="step" data-narration="Dendrites receive signals from other neurons. The Soma integrates these signals through summation. If total exceeds threshold, an action potential fires.">
    <rect x="50" y="138" width="700" height="77" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="250" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Dendrites: Input Receivers</text>
    <text x="550" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Soma: Processing Center</text>
    <path d="M180 200 Q200 190, 220 200 Q240 210, 260 200" stroke="#1976d2" stroke-width="2" fill="none"/>
    <line x1="220" y1="200" x2="200" y2="185" stroke="#1976d2" stroke-width="1.5"/>
    <circle cx="200" cy="185" r="3" fill="#1976d2"/>
    <text x="220" y="215" text-anchor="middle" font-size="8" fill="#1565c0">Synaptic inputs</text>
    <ellipse cx="550" cy="200" rx="40" ry="28" fill="#a5d6a7" stroke="#388e3c" stroke-width="1.5"/>
    <text x="550" y="197" text-anchor="middle" font-size="8" fill="#1b5e20">+</text>
    <text x="550" y="207" text-anchor="middle" font-size="8" fill="#1b5e20">−</text>
    <text x="610" y="203" text-anchor="middle" font-size="8" fill="#424242">Σ</text>
  </g>
  
  <g id="step3" class="step" data-narration="The Axon transmits the action potential down its length. Synapses release neurotransmitters to pass signals to the next neuron, determining connection strength.">
    <rect x="50" y="223" width="700" height="77" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="220" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Axon: Signal Transmission</text>
    <text x="580" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">Synapse: Signal Relay</text>
    <rect x="100" y="268" width="200" height="16" rx="8" fill="#ffcc80" stroke="#ff9800" stroke-width="1.5"/>
    <path d="M115 276 L290 276" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
    <circle cx="115" cy="276" r="3" fill="#ff5722"/>
    <text x="200" y="295" text-anchor="middle" font-size="8" fill="#e65100">Action potential</text>
    <rect x="500" y="265" width="45" height="18" rx="3" fill="#ce93d8" stroke="#9c27b0"/>
    <text x="522" y="278" text-anchor="middle" font-size="8" fill="#4a148c">Axon</text>
    <rect x="570" y="265" width="45" height="18" rx="3" fill="#ce93d8" stroke="#9c27b0"/>
    <text x="592" y="278" text-anchor="middle" font-size="8" fill="#4a148c">Dendrite</text>
    <line x1="545" y1="274" x2="565" y2="274" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <circle cx="555" cy="274" r="2" fill="#ab47bc"/>
  </g>
  
  <g id="step4" class="step" data-narration="Biological neurons map to artificial neurons: dendrites become inputs, soma becomes weighted sum, synaptic weights become network weights, and threshold becomes bias.">
    <rect x="50" y="308" width="700" height="87" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Biological to Artificial Neuron Mapping</text>
    <g>
      <rect x="70" y="345" width="110" height="42" rx="5" fill="#bbdefb" stroke="#1976d2"/>
      <text x="125" y="362" text-anchor="middle" font-size="9" fill="#1565c0">Dendrites</text>
      <text x="125" y="377" text-anchor="middle" font-size="8" fill="#424242">→ Input</text>
    </g>
    <g>
      <rect x="200" y="345" width="110" height="42" rx="5" fill="#c8e6c9" stroke="#388e3c"/>
      <text x="255" y="362" text-anchor="middle" font-size="9" fill="#2e7d32">Soma</text>
      <text x="255" y="377" text-anchor="middle" font-size="8" fill="#424242">→ Sum</text>
    </g>
    <g>
      <rect x="330" y="345" width="110" height="42" rx="5" fill="#ffe0b2" stroke="#ff9800"/>
      <text x="385" y="362" text-anchor="middle" font-size="9" fill="#e65100">Synaptic</text>
      <text x="385" y="377" text-anchor="middle" font-size="8" fill="#424242">→ Weights</text>
    </g>
    <g>
      <rect x="460" y="345" width="110" height="42" rx="5" fill="#ffcc80" stroke="#ff9800"/>
      <text x="515" y="362" text-anchor="middle" font-size="9" fill="#e65100">Threshold</text>
      <text x="515" y="377" text-anchor="middle" font-size="8" fill="#424242">→ Bias</text>
    </g>
    <g>
      <rect x="590" y="345" width="80" height="42" rx="5" fill="#ce93d8" stroke="#9c27b0"/>
      <text x="630" y="362" text-anchor="middle" font-size="9" fill="#7b1fa2">Axon</text>
      <text x="630" y="377" text-anchor="middle" font-size="8" fill="#424242">→ Output</text>
    </g>
  </g>
  
  <g id="step5" class="step" data-narration="Synaptic plasticity allows connections to strengthen or weaken with experience. This biological principle directly inspires weight updates in neural network training.">
    <rect x="50" y="403" width="700" height="87" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Learning: Synaptic Plasticity</text>
    <text x="400" y="445" text-anchor="middle" font-size="9" fill="#424242">"Neurons that fire together wire together"</text>
    <circle cx="220" cy="470" r="14" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
    <text x="220" y="473" text-anchor="middle" font-size="8" fill="#1b5e20">Weak</text>
    <line x1="238" y1="470" x2="275" y2="470" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <circle cx="350" cy="470" r="18" fill="#66bb6a" stroke="#388e3c" stroke-width="1.5"/>
    <text x="350" y="473" text-anchor="middle" font-size="9" fill="#fff">Stronger</text>
    <line x1="372" y1="470" x2="420" y2="470" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <circle cx="490" cy="470" r="22" fill="#2e7d32" stroke="#388e3c" stroke-width="2"/>
    <text x="490" y="473" text-anchor="middle" font-size="9" fill="#fff">Strongest</text>
    <text x="580" y="473" text-anchor="middle" font-size="9" fill="#1b5e20">→ Weight update</text>
  </g>
  
  <g id="step6" class="step" data-narration="The brain contains 86 billion neurons, each connected to thousands of others. This massive parallel processing inspires deep learning and neuromorphic computing.">
    <rect x="50" y="498" width="700" height="90" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="525" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b1fa2">Brain Scale and Network Effect</text>
    <text x="400" y="548" text-anchor="middle" font-size="10" fill="#424242">~86 billion neurons × thousands of connections each</text>
    <text x="400" y="568" text-anchor="middle" font-size="10" fill="#424242">= Massive parallel processing</text>
    <text x="400" y="582" text-anchor="middle" font-size="9" fill="#7b1fa2">Inspires Deep Learning and Neuromorphic Computing</text>
  </g>
</svg>