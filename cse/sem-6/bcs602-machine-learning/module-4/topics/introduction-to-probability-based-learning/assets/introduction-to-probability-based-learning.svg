<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Introduction to Probability-Based Learning</text>
  
  <g id="step1" class="step" data-narration="Probability-based learning uses probability theory to handle uncertainty. Instead of giving a single answer, it calculates how likely each outcome is, giving us confidence in predictions.">
    <rect x="100" y="50" width="600" height="60" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">What is Probability-Based Learning?</text>
    <text x="400" y="95" text-anchor="middle" font-size="11" fill="#424242">Learning by calculating probabilities to handle uncertainty and measure confidence</text>
  </g>
  
  <g id="step2" class="step" data-narration="Bayes' Theorem is the foundation. It calculates the probability of a hypothesis given evidence: P(Hypothesis|Evidence) equals the likelihood times prior, divided by evidence.">
    <rect x="50" y="125" width="350" height="90" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="225" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Bayes' Theorem</text>
    <text x="225" y="172" text-anchor="middle" font-size="12" fill="#424242">P(A|B) = P(B|A) × P(A) / P(B)</text>
    <text x="225" y="190" text-anchor="middle" font-size="10" fill="#616161">Prior × Likelihood / Evidence</text>
    <rect x="420" y="125" width="330" height="90" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="585" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Key Terms</text>
    <text x="585" y="170" text-anchor="middle" font-size="10" fill="#424242">Posterior: Updated belief after evidence</text>
    <text x="585" y="185" text-anchor="middle" font-size="10" fill="#424242">Likelihood: Evidence given hypothesis</text>
    <text x="585" y="200" text-anchor="middle" font-size="10" fill="#424242">Prior: Initial belief before evidence</text>
  </g>
  
  <g id="step3" class="step" data-narration="Naive Bayes assumes all features are independent given the class. This simplifies complex probability calculations into simple multiplications of individual feature probabilities.">
    <rect x="50" y="230" width="700" height="70" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b1fa2">The Naive Assumption: Conditional Independence</text>
    <text x="400" y="278" text-anchor="middle" font-size="12" fill="#424242">Assume features do not affect each other when the class is known</text>
    <text x="400" y="293" text-anchor="middle" font-size="11" fill="#616161">P(X1,X2...|y) = P(X1|y) × P(X2|y) × ... makes calculation simple!</text>
  </g>
  
  <g id="step4" class="step" data-narration="During training, Naive Bayes calculates the prior probability of each class and the likelihood of each feature given that class. Then it predicts by multiplying these values.">
    <rect x="50" y="315" width="340" height="85" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Training Phase</text>
    <text x="220" y="362" text-anchor="middle" font-size="11" fill="#424242">Calculate prior P(y) for each class</text>
    <text x="220" y="380" text-anchor="middle" font-size="11" fill="#424242">Calculate likelihood P(feature|class)</text>
    <rect x="410" y="315" width="340" height="85" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="580" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Prediction Phase</text>
    <text x="580" y="362" text-anchor="middle" font-size="11" fill="#424242">Score(y) = P(y) × P(X1|y) × P(X2|y)...</text>
    <text x="580" y="380" text-anchor="middle" font-size="11" fill="#424242">Choose class with highest score</text>
  </g>
  
  <g id="step5" class="step" data-narration="In spam filtering, we calculate scores for spam and ham. For an email with words 'win' and 'prize', spam gets score 0.25 while ham gets 0, so we classify it as spam.">
    <rect x="50" y="415" width="700" height="90" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="440" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Example: Spam vs Ham Classification</text>
    <text x="200" y="462" text-anchor="middle" font-size="11" fill="#424242">Training: 2 spam, 2 ham emails</text>
    <text x="200" y="480" text-anchor="middle" font-size="11" fill="#424242">P(spam)=0.5, P(ham)=0.5</text>
    <text x="580" y="462" text-anchor="middle" font-size="11" fill="#424242">Test email: words "win" and "prize"</text>
    <text x="580" y="480" text-anchor="middle" font-size="11" fill="#424242">Spam score: 0.5×1×0.5=0.25</text>
    <text x="580" y="495" text-anchor="middle" font-size="11" fill="#424242">Ham score: 0.5×0×0.5=0 → Spam!</text>
  </g>
  
  <g id="step6" class="step" data-narration="Key advantages include simplicity, speed, and handling missing data. Applications include spam filtering, medical diagnosis, and sentiment analysis in natural language processing.">
    <text x="400" y="525" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Advantages &amp; Applications</text>
    <rect x="50" y="535" width="220" height="45" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="160" y="555" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Advantages</text>
    <text x="160" y="570" text-anchor="middle" font-size="9" fill="#424242">Fast, simple, handles missing data</text>
    <rect x="290" y="535" width="220" height="45" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="400" y="555" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Applications</text>
    <text x="400" y="570" text-anchor="middle" font-size="9" fill="#424242">Spam filtering, medical diagnosis</text>
    <rect x="530" y="535" width="220" height="45" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="640" y="555" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b1fa2">Used In</text>
    <text x="640" y="570" text-anchor="middle" font-size="9" fill="#424242">NLP, sentiment analysis</text>
  </g>
</svg>