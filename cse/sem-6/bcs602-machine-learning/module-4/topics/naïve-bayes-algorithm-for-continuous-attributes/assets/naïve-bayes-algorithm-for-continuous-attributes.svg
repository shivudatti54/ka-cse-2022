<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Naïve Bayes Algorithm for Continuous Attributes</text>
  
  <g id="step1" class="step" data-narration="Naïve Bayes is a probabilistic classifier based on Bayes theorem. It calculates the probability of a class given continuous features by assuming feature independence.">
    <rect x="100" y="50" width="600" height="60" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">What is Naïve Bayes?</text>
    <text x="400" y="95" text-anchor="middle" font-size="11" fill="#424242">Probabilistic classifier using Bayes theorem with feature independence assumption</text>
  </g>
  
  <g id="step2" class="step" data-narration="Bayes theorem calculates the probability of an event based on prior knowledge. The formula shows how prior probability gets updated with new evidence from data.">
    <rect x="80" y="130" width="300" height="70" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="230" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Bayes Theorem</text>
    <text x="230" y="180" text-anchor="middle" font-size="13" fill="#1b5e20">P(A|B) = P(B|A) × P(A) / P(B)</text>
    <text x="400" y="165" text-anchor="middle" font-size="11" fill="#616161">Updates belief with evidence</text>
    <line x1="330" y1="165" x2="370" y2="165" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <g id="step3" class="step" data-narration="For continuous attributes, we use Probability Density Function (PDF) instead of discrete probability. This estimates how likely a feature value occurs within a class.">
    <rect x="420" y="130" width="300" height="70" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="570" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Continuous Attributes</text>
    <text x="570" y="180" text-anchor="middle" font-size="12" fill="#bf360c">Use Probability Density Function (PDF)</text>
    <text x="570" y="195" text-anchor="middle" font-size="10" fill="#616161">Gaussian/Normal distribution assumed</text>
  </g>
  
  <g id="step4" class="step" data-narration="The conditional probability P(X|Y) measures the likelihood of a feature value given a specific class. This is computed using training data statistics.">
    <rect x="80" y="220" width="640" height="60" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b1fa2">Conditional Probability</text>
    <text x="400" y="268" text-anchor="middle" font-size="12" fill="#4a148c">P(X=x|Y=y) = P(X=x, Y=y) / P(Y=y)</text>
  </g>
  
  <g id="step5" class="step" data-narration="This example dataset shows students and employees with Age and Income features. We will predict class based on these continuous attributes.">
    <text x="400" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Example Dataset</text>
    <rect x="150" y="315" width="500" height="80" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="150" y1="340" x2="650" y2="340" stroke="#1976d2" stroke-width="1"/>
    <line x1="250" y1="315" x2="250" y2="395" stroke="#1976d2" stroke-width="1"/>
    <line x1="350" y1="315" x2="350" y2="395" stroke="#1976d2" stroke-width="1"/>
    <line x1="450" y1="315" x2="450" y2="395" stroke="#1976d2" stroke-width="1"/>
    <text x="200" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Age</text>
    <text x="300" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Income</text>
    <text x="400" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Class</text>
    <text x="550" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Count</text>
    <text x="200" y="355" text-anchor="middle" font-size="10" fill="#424242">20, 25, 30</text>
    <text x="300" y="355" text-anchor="middle" font-size="10" fill="#424242">40K-80K</text>
    <text x="400" y="355" text-anchor="middle" font-size="10" fill="#424242">Student</text>
    <text x="550" y="355" text-anchor="middle" font-size="10" fill="#424242">3</text>
    <text x="200" y="380" text-anchor="middle" font-size="10" fill="#424242">30</text>
    <text x="300" y="380" text-anchor="middle" font-size="10" fill="#424242">70K, 80K</text>
    <text x="400" y="380" text-anchor="middle" font-size="10" fill="#424242">Employee</text>
    <text x="550" y="380" text-anchor="middle" font-size="10" fill="#424242">2</text>
  </g>
  
  <g id="step6" class="step" data-narration="To classify a new instance, we calculate posterior probability for each class using the likelihood of features given that class and the prior class probability.">
    <text x="400" y="415" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Posterior Probability Calculation</text>
    <rect x="80" y="425" width="640" height="65" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="450" text-anchor="middle" font-size="12" fill="#c62828">P(Y=y|X=x) = P(X=x|Y=y) × P(Y=y) / P(X=x)</text>
    <text x="400" y="475" text-anchor="middle" font-size="11" fill="#616161">Select class with highest posterior probability</text>
  </g>
  
  <g id="step7" class="step" data-narration="Advantages include fast computation and handling high-dimensional data. Disadvantages include the unrealistic independence assumption and Gaussian distribution requirement.">
    <rect x="80" y="505" width="280" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="220" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Advantages</text>
    <text x="220" y="545" text-anchor="middle" font-size="10" fill="#424242">Fast, handles high dimensions</text>
    <rect x="380" y="505" width="280" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="520" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Disadvantages</text>
    <text x="520" y="545" text-anchor="middle" font-size="10" fill="#424242">Assumes independence & Gaussian</text>
  </g>
</svg>