<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e3f2fd" />
      <stop offset="100%" stop-color="#1976d2" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f5e9" />
      <stop offset="100%" stop-color="#388e3c" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0" />
      <stop offset="100%" stop-color="#ff9800" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f3e5f5" />
      <stop offset="100%" stop-color="#9c27b0" />
    </linearGradient>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffebee" />
      <stop offset="100%" stop-color="#f44336" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step0" class="step" data-narration="An artificial neuron is the fundamental unit of neural networks, inspired by biological neurons. It processes inputs and produces outputs through weighted summation.">
    <rect x="0" y="0" width="800" height="50" fill="#f8f9fa"/>
    <text x="400" y="35" font-size="22" fill="#1976d2" text-anchor="middle" font-weight="bold">Artificial Neurons</text>
  </g>
  
  <g id="step1" class="step" data-narration="Biological neurons have dendrites to receive signals, a soma to process them, and an axon to transmit output to other neurons via synapses.">
    <rect x="40" y="58" width="720" height="80" fill="none"/>
    <text x="50" y="75" font-size="14" fill="#1976d2" font-weight="bold">Biological Neuron Structure</text>
    <circle cx="120" cy="105" r="25" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="120" y="100" font-size="9" fill="#ff9800" text-anchor="middle">Dendrites</text>
    <text x="120" y="112" font-size="8" fill="#ff9800" text-anchor="middle">Receive</text>
    <ellipse cx="200" cy="105" rx="30" ry="22" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="200" y="100" font-size="9" fill="#388e3c" text-anchor="middle">Soma</text>
    <text x="200" y="112" font-size="8" fill="#388e3c" text-anchor="middle">Process</text>
    <path d="M 230 105 L 290 105" stroke="#1976d2" stroke-width="2"/>
    <polygon points="290,105 278,98 278,112" fill="#1976d2"/>
    <text x="265" y="96" font-size="8" fill="#1976d2">Axon</text>
    <circle cx="315" cy="105" r="4" fill="#9c27b0"/>
    <circle cx="325" cy="100" r="3" fill="#9c27b0"/>
    <circle cx="330" cy="110" r="3" fill="#9c27b0"/>
    <text x="330" y="125" font-size="8" fill="#9c27b0">Synapses</text>
    <text x="480" y="75" font-size="14" fill="#388e3c" font-weight="bold">Biological to Artificial Mapping</text>
    <rect x="480" y="90" width="90" height="28" fill="#fff3e0" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="525" y="105" font-size="9" fill="#ff9800" text-anchor="middle" font-weight="bold">Dendrites</text>
    <text x="525" y="116" font-size="7" fill="#ff9800" text-anchor="middle">→ Inputs</text>
    <rect x="575" y="90" width="90" height="28" fill="#e3f2fd" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="620" y="105" font-size="9" fill="#1976d2" text-anchor="middle" font-weight="bold">Synapses</text>
    <text x="620" y="116" font-size="7" fill="#1976d2" text-anchor="middle">→ Weights</text>
    <rect x="670" y="90" width="90" height="28" fill="#e8f5e9" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="715" y="105" font-size="9" fill="#388e3c" text-anchor="middle" font-weight="bold">Soma</text>
    <text x="715" y="116" font-size="7" fill="#388e3c" text-anchor="middle">→ Σ + bias</text>
  </g>
  
  <g id="step2" class="step" data-narration="The artificial neuron receives inputs, multiplies each by learnable weights, sums them with a bias, and applies an activation function to produce output.">
    <rect x="40" y="146" width="720" height="145" fill="none"/>
    <text x="50" y="165" font-size="14" fill="#1976d2" font-weight="bold">Artificial Neuron Structure</text>
    <rect x="50" y="178" width="55" height="24" fill="#e3f2fd" rx="4" stroke="#1976d2"/>
    <text x="77" y="194" font-size="10" fill="#1976d2" text-anchor="middle">x₁</text>
    <rect x="50" y="208" width="55" height="24" fill="#e3f2fd" rx="4" stroke="#1976d2"/>
    <text x="77" y="224" font-size="10" fill="#1976d2" text-anchor="middle">x₂</text>
    <text x="77" y="252" font-size="10" fill="#1976d2" text-anchor="middle">⋮</text>
    <rect x="50" y="262" width="55" height="24" fill="#e3f2fd" rx="4" stroke="#1976d2"/>
    <text x="77" y="278" font-size="10" fill="#1976d2" text-anchor="middle">xₙ</text>
    <line x1="105" y1="190" x2="135" y2="210" stroke="#ff9800" stroke-width="1"/>
    <line x1="105" y1="220" x2="135" y2="210" stroke="#ff9800" stroke-width="1"/>
    <line x1="105" y1="274" x2="135" y2="230" stroke="#ff9800" stroke-width="1"/>
    <text x="135" y="225" font-size="8" fill="#ff9800">weights</text>
    <rect x="145" y="190" width="70" height="40" fill="#fff3e0" rx="6" stroke="#ff9800" stroke-width="2"/>
    <text x="180" y="205" font-size="11" fill="#ff9800" text-anchor="middle" font-weight="bold">Σ</text>
    <text x="180" y="220" font-size="8" fill="#ff9800" text-anchor="middle">z = Σwᵢxᵢ + b</text>
    <path d="M 215 210 L 255 210" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="265" y="190" width="80" height="40" fill="#f3e5f5" rx="6" stroke="#9c27b0" stroke-width="2"/>
    <text x="305" y="205" font-size="11" fill="#9c27b0" text-anchor="middle" font-weight="bold">f(z)</text>
    <text x="305" y="220" font-size="8" fill="#9c27b0" text-anchor="middle">Activation</text>
    <path d="M 345 210 L 385 210" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="395" y="190" width="60" height="40" fill="#e8f5e9" rx="6" stroke="#388e3c" stroke-width="2"/>
    <text x="425" y="215" font-size="12" fill="#388e3c" text-anchor="middle" font-weight="bold">y</text>
    <text x="425" y="228" font-size="8" fill="#388e3c" text-anchor="middle">Output</text>
  </g>
  
  <g id="step3" class="step" data-narration="The mathematical model is y equals f of weighted sum plus bias. The weights vector, input vector, bias term, and activation function are the key components.">
    <rect x="40" y="299" width="720" height="80" fill="none"/>
    <text x="50" y="318" font-size="14" fill="#ff9800" font-weight="bold">Mathematical Model</text>
    <rect x="50" y="330" width="280" height="42" fill="#f8f9fa" rx="5" stroke="#ff9800" stroke-width="2"/>
    <text x="190" y="355" font-size="16" fill="#ff9800" text-anchor="middle" font-weight="bold">y = f(Σwᵢxᵢ + b)</text>
    <text x="190" y="370" font-size="12" fill="#ff9800" text-anchor="middle">= f(w · x + b)</text>
    <rect x="350" y="330" width="150" height="42" fill="#e3f2fd" rx="5" stroke="#1976d2"/>
    <text x="425" y="348" font-size="10" fill="#1976d2" text-anchor="middle">w = weights vector</text>
    <text x="425" y="362" font-size="10" fill="#1976d2" text-anchor="middle">x = input vector</text>
    <rect x="510" y="330" width="100" height="42" fill="#e8f5e9" rx="5" stroke="#388e3c"/>
    <text x="560" y="348" font-size="10" fill="#388e3c" text-anchor="middle">b = bias</text>
    <text x="560" y="362" font-size="10" fill="#388e3c" text-anchor="middle">term</text>
    <rect x="620" y="330" width="100" height="42" fill="#f3e5f5" rx="5" stroke="#9c27b0"/>
    <text x="670" y="348" font-size="10" fill="#9c27b0" text-anchor="middle">f = activation</text>
    <text x="670" y="362" font-size="10" fill="#9c27b0" text-anchor="middle">function</text>
  </g>
  
  <g id="step4" class="step" data-narration="Common activation functions include step, sigmoid, tanh, ReLU, and Leaky ReLU. Each has different properties: range, zero-centering, and gradient behavior.">
    <rect x="40" y="387" width="720" height="80" fill="none"/>
    <text x="50" y="405" font-size="14" fill="#9c27b0" font-weight="bold">Activation Functions</text>
    <rect x="50" y="415" width="120" height="40" fill="#ffebee" rx="4" stroke="#f44336"/>
    <text x="110" y="430" font-size="9" fill="#f44336" text-anchor="middle" font-weight="bold">Step</text>
    <text x="110" y="445" font-size="7" fill="#f44336" text-anchor="middle">f(z)=1 if z≥0</text>
    <rect x="180" y="415" width="120" height="40" fill="#e3f2fd" rx="4" stroke="#1976d2"/>
    <text x="240" y="430" font-size="9" fill="#1976d2" text-anchor="middle" font-weight="bold">Sigmoid</text>
    <text x="240" y="445" font-size="7" fill="#1976d2" text-anchor="middle">1/(1+e⁻ᶻ), range(0,1)</text>
    <rect x="310" y="415" width="120" height="40" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="370" y="430" font-size="9" fill="#388e3c" text-anchor="middle" font-weight="bold">Tanh</text>
    <text x="370" y="445" font-size="7" fill="#388e3c" text-anchor="middle">(eᶻ-e⁻ᶻ)/(eᶻ+e⁻ᶻ)</text>
    <rect x="440" y="415" width="120" height="40" fill="#fff3e0" rx="4" stroke="#ff9800"/>
    <text x="500" y="430" font-size="9" fill="#ff9800" text-anchor="middle" font-weight="bold">ReLU</text>
    <text x="500" y="445" font-size="7" fill="#ff9800" text-anchor="middle">max(0,z), range[0,∞)</text>
    <rect x="570" y="415" width="120" height="40" fill="#f3e5f5" rx="4" stroke="#9c27b0"/>
    <text x="630" y="430" font-size="9" fill="#9c27b0" text-anchor="middle" font-weight="bold">Leaky ReLU</text>
    <text x="630" y="445" font-size="7" fill="#9c27b0" text-anchor="middle">z if z>0, else αz</text>
  </g>
  
  <g id="step5" class="step" data-narration="Weights control input influence, bias shifts the activation, and activation introduces non-linearity. Single neurons can only solve linearly separable problems like AND and OR.">
    <rect x="40" y="475" width="720" height="80" fill="none"/>
    <text x="50" y="493" font-size="14" fill="#388e3c" font-weight="bold">Key Concepts</text>
    <rect x="50" y="505" width="220" height="42" fill="#e3f2fd" rx="4" stroke="#1976d2"/>
    <text x="160" y="520" font-size="10" fill="#1976d2" text-anchor="middle" font-weight="bold">Weights Role</text>
    <text x="160" y="535" font-size="8" fill="#1976d2" text-anchor="middle">Control input importance</text>
    <text x="160" y="545" font-size="7" fill="#1976d2" text-anchor="middle">+w = positive influence</text>
    <rect x="280" y="505" width="220" height="42" fill="#e8f5e9" rx="4" stroke="#388e3c"/>
    <text x="390" y="520" font-size="10" fill="#388e3c" text-anchor="middle" font-weight="bold">Bias Role</text>
    <text x="390" y="535" font-size="8" fill="#388e3c" text-anchor="middle">Shifts decision boundary</text>
    <text x="390" y="545" font-size="7" fill="#388e3c" text-anchor="middle">Allows activation at zero</text>
    <rect x="510" y="505" width="240" height="42" fill="#fff3e0" rx="4" stroke="#ff9800"/>
    <text x="630" y="520" font-size="10" fill="#ff9800" text-anchor="middle" font-weight="bold">Limitation</text>
    <text x="630" y="535" font-size="8" fill="#ff9800" text-anchor="middle">Single neuron solves only</text>
    <text x="630" y="545" font-size="7" fill="#ff9800" text-anchor="middle">linearly separable problems</text>
  </g>
</svg>