<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Linked List Operations</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Core operations on linked lists include creation, insertion, deletion, traversal, and searching.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Fundamental operations: create, insert, delete, traverse, search</text>
  </g>
  <g id="step1" class="step" data-narration="Create node: allocate memory with malloc, set data value, initialize next pointer to NULL.">
    <rect x="50" y="80" width="700" height="65" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Create Node</text>
    <text x="70" y="125" font-size="11" fill="#424242">Node* createNode(int val) { Node *n = malloc(sizeof(Node)); n->data = val; n->next = NULL; return n; }</text>
  </g>
  <g id="step2" class="step" data-narration="Insertion at beginning is O of 1. At end or middle requires traversal making it O of n.">
    <rect x="50" y="160" width="340" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Insertion</text>
    <text x="70" y="200" font-size="11" fill="#388e3c">At beginning: O(1) - fastest</text>
    <text x="70" y="217" font-size="11" fill="#ff9800">At end: O(n) - traverse first</text>
    <text x="70" y="234" font-size="11" fill="#424242">At position k: O(k) - traverse to k</text>
  </g>
  <g id="step3" class="step" data-narration="Deletion requires finding the node, updating the previous node pointer, then freeing the memory.">
    <rect x="420" y="160" width="340" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Deletion</text>
    <text x="440" y="200" font-size="11" fill="#388e3c">From beginning: O(1)</text>
    <text x="440" y="217" font-size="11" fill="#ff9800">From end: O(n)</text>
    <text x="440" y="234" font-size="11" fill="#f44336">Always free() deleted node memory!</text>
  </g>
  <g id="step4" class="step" data-narration="Traversal visits every node from head to NULL. Used for display, counting, and searching.">
    <rect x="50" y="260" width="340" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="220" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Traversal - O(n)</text>
    <text x="70" y="302" font-size="11" fill="#424242">while(temp != NULL) { process; temp=temp->next; }</text>
    <text x="70" y="319" font-size="11" fill="#ff9800">Visit each node exactly once</text>
  </g>
  <g id="step5" class="step" data-narration="Search compares each node data with the target key. Returns node pointer if found, NULL otherwise.">
    <rect x="420" y="260" width="340" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Search - O(n)</text>
    <text x="440" y="302" font-size="11" fill="#424242">Linear search through nodes</text>
    <text x="440" y="319" font-size="11" fill="#9c27b0">Best: O(1) first node, Worst: O(n) last</text>
  </g>
  <g id="step6" class="step" data-narration="Count nodes: traverse entire list incrementing a counter. Length of list equals the final count value.">
    <rect x="50" y="350" width="700" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Count Nodes - O(n)</text>
    <text x="70" y="392" font-size="11" fill="#424242">int count=0; while(temp) { count++; temp=temp->next; } return count;</text>
  </g>
  <g id="step7" class="step" data-narration="All operations except head insertion require traversal. Maintaining a tail pointer can optimize end operations.">
    <rect x="50" y="420" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="445" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Tip: Maintain a tail pointer to make end insertion O(1)</text>
  </g>
</svg>