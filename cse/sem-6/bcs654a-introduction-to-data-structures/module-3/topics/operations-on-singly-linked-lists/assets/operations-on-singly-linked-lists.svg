<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Operations on Singly Linked Lists</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Key operations include insertion, deletion, traversal, searching, and counting nodes in the list.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Insert, delete, traverse, search, and count operations</text>
  </g>
  <g id="step1" class="step" data-narration="Insert at beginning: create node, point it to current head, update head. Fastest insertion at O of 1.">
    <rect x="50" y="80" width="340" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Insert at Beginning - O(1)</text>
    <text x="70" y="120" font-size="11" fill="#424242">Node *new = createNode(val);</text>
    <text x="70" y="137" font-size="11" fill="#424242">new->next = head;</text>
    <text x="70" y="154" font-size="11" fill="#388e3c">head = new;</text>
  </g>
  <g id="step2" class="step" data-narration="Insert at end: traverse to last node, link last to new node. Requires full traversal O of n.">
    <rect x="420" y="80" width="340" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Insert at End - O(n)</text>
    <text x="440" y="120" font-size="11" fill="#424242">temp = head;</text>
    <text x="440" y="137" font-size="11" fill="#424242">while(temp->next != NULL) temp=temp->next;</text>
    <text x="440" y="154" font-size="11" fill="#ff9800">temp->next = new;</text>
  </g>
  <g id="step3" class="step" data-narration="Insert at position: traverse to node before target position, adjust pointers to include new node.">
    <rect x="50" y="175" width="340" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Insert at Position - O(n)</text>
    <text x="70" y="215" font-size="11" fill="#424242">Traverse to (pos-1)th node</text>
    <text x="70" y="232" font-size="11" fill="#424242">new->next = prev->next; prev->next = new;</text>
  </g>
  <g id="step4" class="step" data-narration="Delete from beginning: save head, move head to next, free old head. O of 1 time complexity.">
    <rect x="420" y="175" width="340" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Delete from Beginning - O(1)</text>
    <text x="440" y="215" font-size="11" fill="#424242">temp = head; head = head->next;</text>
    <text x="440" y="232" font-size="11" fill="#f44336">free(temp);</text>
  </g>
  <g id="step5" class="step" data-narration="Delete from end: traverse to second-last node, set its next to NULL, free the last node.">
    <rect x="50" y="260" width="340" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="220" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Delete from End - O(n)</text>
    <text x="70" y="300" font-size="11" fill="#424242">Find second-last node (prev)</text>
    <text x="70" y="317" font-size="11" fill="#424242">free(prev->next); prev->next = NULL;</text>
  </g>
  <g id="step6" class="step" data-narration="Search: traverse from head comparing each node data with target. Return position or not found.">
    <rect x="420" y="260" width="340" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Search - O(n)</text>
    <text x="440" y="300" font-size="11" fill="#424242">temp = head;</text>
    <text x="440" y="317" font-size="11" fill="#424242">while(temp) if(temp->data==key) found!</text>
  </g>
  <g id="step7" class="step" data-narration="All operations summary: beginning operations are O of 1, end and position operations require O of n traversal.">
    <rect x="50" y="350" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Beginning: O(1) | End/Position: O(n) | Search: O(n) | Count: O(n)</text>
  </g>
</svg>