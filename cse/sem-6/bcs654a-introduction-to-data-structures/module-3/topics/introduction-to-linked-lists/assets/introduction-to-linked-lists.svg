<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Introduction to Linked Lists</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Linked lists are dynamic data structures where elements are connected through pointers, not stored contiguously.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Dynamic linear data structure using pointer-based connections between nodes</text>
  </g>
  <g id="step1" class="step" data-narration="Unlike arrays, linked lists allocate memory dynamically. Each node is created at runtime using malloc.">
    <rect x="50" y="80" width="340" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Array (Static)</text>
    <rect x="70" y="115" width="50" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="95" y="135" text-anchor="middle" font-size="10">10</text>
    <rect x="120" y="115" width="50" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="145" y="135" text-anchor="middle" font-size="10">20</text>
    <rect x="170" y="115" width="50" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="195" y="135" text-anchor="middle" font-size="10">30</text>
    <rect x="220" y="115" width="50" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="245" y="135" text-anchor="middle" font-size="10">40</text>
    <text x="320" y="135" font-size="10" fill="#1976d2">Contiguous</text>
  </g>
  <g id="step2" class="step" data-narration="A linked list consists of nodes. Each node has data and a pointer to the next node in the sequence.">
    <rect x="420" y="80" width="340" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Linked List (Dynamic)</text>
    <rect x="440" y="115" width="60" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="470" y="132" text-anchor="middle" font-size="9">10|*</text>
    <line x1="500" y1="127" x2="520" y2="127" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="530" y="115" width="60" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="560" y="132" text-anchor="middle" font-size="9">20|*</text>
    <line x1="590" y1="127" x2="610" y2="127" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="620" y="115" width="60" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="650" y="132" text-anchor="middle" font-size="9">30|N</text>
    <text x="730" y="132" font-size="10" fill="#388e3c">Scattered</text>
  </g>
  <g id="step3" class="step" data-narration="Node structure contains two fields: data stores the value, and next is a pointer to the following node.">
    <rect x="50" y="185" width="700" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Node Structure</text>
    <text x="70" y="230" font-size="12" fill="#424242">struct Node { int data; struct Node *next; };</text>
    <rect x="500" y="215" width="80" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="540" y="235" text-anchor="middle" font-size="11" fill="#ff9800">data | next</text>
  </g>
  <g id="step4" class="step" data-narration="Advantages: dynamic size, efficient insertions and deletions. No need to specify size at compile time.">
    <rect x="50" y="275" width="340" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Advantages</text>
    <text x="70" y="315" font-size="11" fill="#424242">Dynamic size - grows/shrinks at runtime</text>
    <text x="70" y="332" font-size="11" fill="#424242">O(1) insertion/deletion at known position</text>
    <text x="70" y="349" font-size="11" fill="#424242">No memory waste from unused slots</text>
  </g>
  <g id="step5" class="step" data-narration="Disadvantages: no random access, extra memory for pointers, and sequential access only from head.">
    <rect x="420" y="275" width="340" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Disadvantages</text>
    <text x="440" y="315" font-size="11" fill="#424242">No random access - must traverse O(n)</text>
    <text x="440" y="332" font-size="11" fill="#424242">Extra memory for pointer in each node</text>
    <text x="440" y="349" font-size="11" fill="#424242">Not cache-friendly (scattered memory)</text>
  </g>
  <g id="step6" class="step" data-narration="Types: singly linked, doubly linked, circular singly, and circular doubly linked lists.">
    <rect x="50" y="375" width="700" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Types of Linked Lists</text>
    <text x="400" y="415" text-anchor="middle" font-size="11" fill="#424242">Singly Linked | Doubly Linked | Circular Singly | Circular Doubly</text>
  </g>
  <g id="step7" class="step" data-narration="Linked lists are the foundation of stacks, queues, graphs, and hash tables in advanced data structures.">
    <rect x="50" y="445" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Foundation for stacks, queues, graphs, hash tables, and dynamic memory</text>
  </g>
</svg>