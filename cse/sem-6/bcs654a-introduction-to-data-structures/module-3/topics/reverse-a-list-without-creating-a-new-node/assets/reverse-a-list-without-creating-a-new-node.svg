<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
<defs>
<linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
<stop offset="100%" stop-color="#10b981" stop-opacity="1" />
</linearGradient>
<marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
</marker>
</defs>
<rect width="800" height="600" fill="#f8fafc"/>
<text x="400" y="30" font-size="18" fill="#2563eb" text-anchor="middle" font-weight="bold">Reversing a Linked List Without Creating New Nodes</text>

<g id="step0" class="step" data-narration="Introduction to the concept of reversing a linked list">
<rect x="40" y="60" width="720" height="75" fill="#2563eb" rx="8"/>
<text x="400" y="85" font-size="15" fill="#ffffff" text-anchor="middle">Initial Linked List</text>
<rect x="150" y="100" width="80" height="30" fill="#10b981" rx="5" />
<text x="190" y="120" font-size="13" fill="#ffffff" text-anchor="middle">Head</text>
<line x1="230" y1="115" x2="280" y2="115" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
<rect x="280" y="100" width="80" height="30" fill="#10b981" rx="5" />
<text x="320" y="120" font-size="13" fill="#ffffff" text-anchor="middle">Node 1</text>
<line x1="360" y1="115" x2="410" y2="115" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
<rect x="410" y="100" width="80" height="30" fill="#10b981" rx="5" />
<text x="450" y="120" font-size="13" fill="#ffffff" text-anchor="middle">Node 2</text>
</g>

<g id="step1" class="step" data-narration="Initialize three pointers: previous, current, and next_node">
<rect x="40" y="145" width="720" height="75" fill="#10b981" rx="8"/>
<text x="400" y="168" font-size="14" fill="#ffffff" text-anchor="middle">Step 1: Initialize Three Pointers</text>
<text x="80" y="190" font-size="12" fill="#ffffff">previous = NULL</text>
<text x="80" y="206" font-size="12" fill="#ffffff">current = Head</text>
<text x="80" y="222" font-size="12" fill="#ffffff">next_node = NULL</text>
<rect x="400" y="185" width="70" height="25" fill="#ffffff" rx="4" />
<text x="435" y="202" font-size="11" fill="#10b981" text-anchor="middle">Head→1→2</text>
</g>

<g id="step2" class="step" data-narration="Store the next node in next_node">
<rect x="40" y="230" width="720" height="75" fill="#f59e0b" rx="8"/>
<text x="400" y="253" font-size="14" fill="#ffffff" text-anchor="middle">Step 2: Store Next Node</text>
<text x="80" y="275" font-size="12" fill="#ffffff">next_node = current→next</text>
<text x="80" y="291" font-size="11" fill="#ffffff">Saves reference to Node 1 before changing pointers</text>
<rect x="450" y="270" width="260" height="25" fill="#ffffff" rx="4" />
<text x="580" y="287" font-size="10" fill="#f59e0b" text-anchor="middle">previous=NULL, current=Head, next_node=Node1</text>
</g>

<g id="step3" class="step" data-narration="Reverse current node's pointer">
<rect x="40" y="315" width="720" height="75" fill="#8b5cf6" rx="8"/>
<text x="400" y="338" font-size="14" fill="#ffffff" text-anchor="middle">Step 3: Reverse Current Node's Pointer</text>
<text x="80" y="360" font-size="12" fill="#ffffff">current→next = previous</text>
<text x="80" y="376" font-size="11" fill="#ffffff">Head now points to NULL (reversed)</text>
<rect x="450" y="355" width="200" height="25" fill="#ffffff" rx="4" />
<text x="550" y="372" font-size="10" fill="#8b5cf6" text-anchor="middle">Head←NULL</text>
</g>

<g id="step4" class="step" data-narration="Move pointers one position ahead">
<rect x="40" y="400" width="720" height="75" fill="#2563eb" rx="8"/>
<text x="400" y="423" font-size="14" fill="#ffffff" text-anchor="middle">Step 4: Move Pointers Forward</text>
<text x="80" y="445" font-size="12" fill="#ffffff">previous = current</text>
<text x="80" y="461" font-size="12" fill="#ffffff">current = next_node</text>
<rect x="450" y="440" width="260" height="25" fill="#ffffff" rx="4" />
<text x="580" y="457" font-size="10" fill="#2563eb" text-anchor="middle">previous=Head, current=Node1, next_node=Node2</text>
</g>

<g id="step5" class="step" data-narration="Repeat steps 2-4 until current is NULL">
<rect x="40" y="485" width="345" height="55" fill="#10b981" rx="8"/>
<text x="212" y="505" font-size="13" fill="#ffffff" text-anchor="middle">Step 5: Repeat Process</text>
<text x="212" y="523" font-size="10" fill="#ffffff" text-anchor="middle">Continue until current is NULL</text>
<text x="212" y="535" font-size="10" fill="#ffffff" text-anchor="middle">List becomes: 2→1→Head</text>
</g>

<g id="step6" class="step" data-narration="Update the head to point to the new front">
<rect x="415" y="485" width="345" height="55" fill="#f59e0b" rx="8"/>
<text x="587" y="505" font-size="13" fill="#ffffff" text-anchor="middle">Step 6: Update Head</text>
<text x="587" y="523" font-size="10" fill="#ffffff" text-anchor="middle">Head = previous</text>
<text x="587" y="535" font-size="10" fill="#ffffff" text-anchor="middle">Final: Node2→Node1→Head→NULL</text>
</g>

<g id="step7" class="step" data-narration="Conclusion">
<rect x="40" y="550" width="720" height="42" fill="#8b5cf6" rx="8"/>
<text x="400" y="572" font-size="13" fill="#ffffff" text-anchor="middle">In-Place Reversal: O(n) time complexity, O(1) space complexity</text>
<text x="400" y="586" font-size="11" fill="#ffffff" text-anchor="middle">No new nodes created, only pointer directions changed</text>
</g>
</svg>
