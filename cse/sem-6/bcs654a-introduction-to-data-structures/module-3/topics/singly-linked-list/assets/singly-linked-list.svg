<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="purple-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.5" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to the concept of Singly Linked List">
    <rect x="50" y="50" width="700" height="100" fill="#2563eb" rx="10" />
    <text x="100" y="120" font-size="24" font-family="Arial" fill="#ffffff">Singly Linked List</text>
  </g>
  <g id="step1" data-narration="Node structure with data and next pointer">
    <rect x="50" y="200" width="100" height="50" fill="#10b981" rx="10" />
    <text x="60" y="220" font-size="18" font-family="Arial" fill="#ffffff">Data</text>
    <rect x="200" y="200" width="100" height="50" fill="#10b981" rx="10" />
    <text x="210" y="220" font-size="18" font-family="Arial" fill="#ffffff">Next</text>
    <line x1="150" y1="225" x2="200" y2="225" stroke="#10b981" stroke-width="2" />
  </g>
  <g id="step2" data-narration="Insertion at the beginning of the list">
    <rect x="50" y="300" width="100" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="320" font-size="18" font-family="Arial" fill="#ffffff">New Node</text>
    <rect x="200" y="300" width="100" height="50" fill="#10b981" rx="10" />
    <text x="210" y="320" font-size="18" font-family="Arial" fill="#ffffff">Existing List</text>
    <line x1="150" y1="325" x2="200" y2="325" stroke="#f59e0b" stroke-width="2" />
  </g>
  <g id="step3" data-narration="Insertion at the end of the list">
    <rect x="50" y="400" width="100" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="420" font-size="18" font-family="Arial" fill="#ffffff">New Node</text>
    <rect x="200" y="400" width="100" height="50" fill="#10b981" rx="10" />
    <text x="210" y="420" font-size="18" font-family="Arial" fill="#ffffff">Existing List</text>
    <line x1="250" y1="425" x2="300" y2="425" stroke="#f59e0b" stroke-width="2" />
    <rect x="350" y="400" width="100" height="50" fill="#10b981" rx="10" />
    <text x="360" y="420" font-size="18" font-family="Arial" fill="#ffffff">Last Node</text>
  </g>
  <g id="step4" data-narration="Deletion from the beginning of the list">
    <rect x="50" y="500" width="100" height="50" fill="#8b5cf6" rx="10" />
    <text x="60" y="520" font-size="18" font-family="Arial" fill="#ffffff">Node to Delete</text>
    <rect x="200" y="500" width="100" height="50" fill="#10b981" rx="10" />
    <text x="210" y="520" font-size="18" font-family="Arial" fill="#ffffff">Existing List</text>
    <line x1="150" y1="525" x2="200" y2="525" stroke="#8b5cf6" stroke-width="2" />
  </g>
  <g id="step5" data-narration="Deletion from the end of the list">
    <rect x="50" y="550" width="100" height="50" fill="#8b5cf6" rx="10" />
    <text x="60" y="570" font-size="18" font-family="Arial" fill="#ffffff">Node to Delete</text>
    <rect x="200" y="550" width="100" height="50" fill="#10b981" rx="10" />
    <text x="210" y="570" font-size="18" font-family="Arial" fill="#ffffff">Existing List</text>
    <line x1="250" y1="575" x2="300" y2="575" stroke="#8b5cf6" stroke-width="2" />
    <rect x="350" y="550" width="100" height="50" fill="#10b981" rx="10" />
    <text x="360" y="570" font-size="18" font-family="Arial" fill="#ffffff">Last Node</text>
  </g>
</svg>