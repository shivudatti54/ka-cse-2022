<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
<defs>
<linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
<stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
</linearGradient>
<marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8fafc"/>
<g id="step0" data-narration="Introduction to the concept of concatenating two linked lists">
<text x="50" y="50" font-size="24" fill="#2563eb">Concatenating Two Linked Lists</text>
</g>
<g id="step1" data-narration="List 1: 10 → 20 → 30 → NULL">
<rect x="50" y="100" width="100" height="50" fill="#10b981" rx="10"/>
<text x="75" y="125" font-size="18" fill="#ffffff">10</text>
<line x1="150" y1="125" x2="250" y2="125" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="250" y="100" width="100" height="50" fill="#10b981" rx="10"/>
<text x="275" y="125" font-size="18" fill="#ffffff">20</text>
<line x1="350" y1="125" x2="450" y2="125" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="450" y="100" width="100" height="50" fill="#10b981" rx="10"/>
<text x="475" y="125" font-size="18" fill="#ffffff">30</text>
<line x1="550" y1="125" x2="600" y2="125" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="600" y="100" width="50" height="50" fill="#ffffff" rx="10"/>
<text x="610" y="125" font-size="18" fill="#000000">NULL</text>
</g>
<g id="step2" data-narration="List 2: 40 → 50 → 60 → NULL">
<rect x="50" y="200" width="100" height="50" fill="#10b981" rx="10"/>
<text x="75" y="225" font-size="18" fill="#ffffff">40</text>
<line x1="150" y1="225" x2="250" y2="225" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="250" y="200" width="100" height="50" fill="#10b981" rx="10"/>
<text x="275" y="225" font-size="18" fill="#ffffff">50</text>
<line x1="350" y1="225" x2="450" y2="225" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="450" y="200" width="100" height="50" fill="#10b981" rx="10"/>
<text x="475" y="225" font-size="18" fill="#ffffff">60</text>
<line x1="550" y1="225" x2="600" y2="225" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="600" y="200" width="50" height="50" fill="#ffffff" rx="10"/>
<text x="610" y="225" font-size="18" fill="#000000">NULL</text>
</g>
<g id="step3" data-narration="Check if List 1 is empty">
<text x="50" y="300" font-size="18" fill="#8b5cf6">If List 1 is empty, return List 2</text>
</g>
<g id="step4" data-narration="Traverse to the last node of List 1">
<text x="50" y="350" font-size="18" fill="#8b5cf6">Traverse to the last node of List 1</text>
</g>
<g id="step5" data-narration="Link the last node of List 1 to the first node of List 2">
<text x="50" y="400" font-size="18" fill="#8b5cf6">Link the last node of List 1 to the first node of List 2</text>
</g>
<g id="step6" data-narration="Return the head of the concatenated list">
<text x="50" y="450" font-size="18" fill="#8b5cf6">Return the head of the concatenated list</text>
</g>
<g id="step7" data-narration="The resulting concatenated list: 10 → 20 → 30 → 40 → 50 → 60 → NULL">
<rect x="50" y="500" width="100" height="50" fill="#10b981" rx="10"/>
<text x="75" y="525" font-size="18" fill="#ffffff">10</text>
<line x1="150" y1="525" x2="250" y2="525" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="250" y="500" width="100" height="50" fill="#10b981" rx="10"/>
<text x="275" y="525" font-size="18" fill="#ffffff">20</text>
<line x1="350" y1="525" x2="450" y2="525" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="450" y="500" width="100" height="50" fill="#10b981" rx="10"/>
<text x="475" y="525" font-size="18" fill="#ffffff">30</text>
<line x1="550" y1="525" x2="650" y2="525" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="650" y="500" width="100" height="50" fill="#10b981" rx="10"/>
<text x="675" y="525" font-size="18" fill="#ffffff">40</text>
<line x1="750" y1="525" x2="850" y2="525" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="50" y="550" width="100" height="50" fill="#10b981" rx="10"/>
<text x="75" y="575" font-size="18" fill="#ffffff">50</text>
<line x1="150" y1="575" x2="250" y2="575" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="250" y="550" width="100" height="50" fill="#10b981" rx="10"/>
<text x="275" y="575" font-size="18" fill="#ffffff">60</text>
<line x1="350" y1="575" x2="400" y2="575" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="400" y="550" width="50" height="50" fill="#ffffff" rx="10"/>
<text x="410" y="575" font-size="18" fill="#000000">NULL</text>
</g>
</svg>