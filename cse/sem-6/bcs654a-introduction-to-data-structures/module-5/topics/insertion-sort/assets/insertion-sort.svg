<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Insertion Sort</text>
  <g id="step0" class="step" data-narration="Insertion sort builds the sorted array one element at a time by inserting each element into its correct position, like sorting cards in hand.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Build sorted portion by inserting each element at the right position</text>
  </g>
  <g id="step1" class="step" data-narration="Starting array: 12, 11, 13, 5, 6. First element 12 is trivially sorted. We start inserting from index 1.">
    <text x="400" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Initial: key starts at index 1</text>
    <rect x="200" y="98" width="60" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="230" y="123" text-anchor="middle" font-size="14">12</text>
    <text x="230" y="150" font-size="9" fill="#388e3c">sorted</text>
    <rect x="270" y="98" width="60" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="300" y="123" text-anchor="middle" font-size="14">11</text>
    <text x="300" y="150" font-size="9" fill="#ff9800">key</text>
    <rect x="340" y="98" width="60" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="370" y="123" text-anchor="middle" font-size="14">13</text>
    <rect x="410" y="98" width="60" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="440" y="123" text-anchor="middle" font-size="14">5</text>
    <rect x="480" y="98" width="60" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="510" y="123" text-anchor="middle" font-size="14">6</text>
  </g>
  <g id="step2" class="step" data-narration="Pass one: key is 11. Compare with 12. 11 less than 12, shift 12 right, insert 11 at position 0. Array: 11, 12, 13, 5, 6.">
    <rect x="50" y="165" width="700" height="45" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Pass 1: key=11, 11&lt;12 shift right, insert at [0]</text>
    <text x="70" y="203" font-size="11" fill="#424242">Result: [<tspan font-weight="bold" fill="#388e3c">11, 12</tspan>, 13, 5, 6]</text>
  </g>
  <g id="step3" class="step" data-narration="Pass two: key is 13. Compare with 12. 13 greater than 12, no shift needed. 13 stays in place. Array unchanged.">
    <rect x="50" y="225" width="340" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Pass 2: key=13, 13&gt;12, no shift</text>
    <text x="70" y="263" font-size="11" fill="#424242">[<tspan font-weight="bold" fill="#388e3c">11, 12, 13</tspan>, 5, 6]</text>
  </g>
  <g id="step4" class="step" data-narration="Pass three: key is 5. Shift 13, 12, 11 all right. Insert 5 at position 0. Array: 5, 11, 12, 13, 6.">
    <rect x="420" y="225" width="340" height="45" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Pass 3: key=5, shift 13,12,11</text>
    <text x="440" y="263" font-size="11" fill="#424242">[<tspan font-weight="bold" fill="#388e3c">5, 11, 12, 13</tspan>, 6]</text>
  </g>
  <g id="step5" class="step" data-narration="Pass four: key is 6. Shift 13, 12, 11 right. Insert 6 after 5. Final sorted array: 5, 6, 11, 12, 13.">
    <rect x="50" y="285" width="700" height="45" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Pass 4: key=6, shift 13,12,11, insert after 5</text>
    <text x="70" y="323" font-size="11" fill="#424242">Final: [<tspan font-weight="bold" fill="#388e3c">5, 6, 11, 12, 13</tspan>] - SORTED!</text>
  </g>
  <g id="step6" class="step" data-narration="Algorithm: for each element, store as key. Shift all larger elements one position right. Insert key at the gap. Like sorting playing cards.">
    <rect x="50" y="345" width="340" height="110" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Algorithm (C Code)</text>
    <text x="70" y="385" font-size="11" fill="#424242">for(i=1; i&lt;n; i++) {</text>
    <text x="80" y="402" font-size="11" fill="#424242">key = arr[i]; j = i-1;</text>
    <text x="80" y="419" font-size="11" fill="#424242">while(j>=0 &amp;&amp; arr[j]>key)</text>
    <text x="90" y="436" font-size="11" fill="#9c27b0">arr[j+1]=arr[j]; j--;</text>
    <text x="80" y="448" font-size="11" fill="#424242">arr[j+1] = key; }</text>
    <rect x="420" y="345" width="340" height="110" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Properties</text>
    <text x="440" y="387" font-size="11" fill="#424242">Best: O(n) - already sorted</text>
    <text x="440" y="404" font-size="11" fill="#424242">Average/Worst: O(n^2)</text>
    <text x="440" y="421" font-size="11" fill="#388e3c">Stable sort (preserves order)</text>
    <text x="440" y="438" font-size="11" fill="#388e3c">Adaptive: fast on nearly sorted</text>
    <text x="440" y="450" font-size="11" fill="#424242">Online: can sort as data arrives</text>
  </g>
  <g id="step7" class="step" data-narration="Insertion sort is best for small or nearly sorted data. Online algorithm: can sort data as it is received. Most practical simple sort.">
    <rect x="50" y="470" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="495" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Insertion Sort: O(n) best, O(n^2) avg | Stable | Adaptive | Online</text>
  </g>
</svg>