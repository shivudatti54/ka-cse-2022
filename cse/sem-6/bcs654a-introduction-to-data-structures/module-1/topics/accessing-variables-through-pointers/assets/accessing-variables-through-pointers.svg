<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Accessing Variables Through Pointers</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Pointers provide indirect access to variables using their memory addresses instead of variable names.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Using the dereference operator * to read and modify values indirectly</text>
  </g>
  <g id="step1" class="step" data-narration="Step one: declare an integer variable x with value 42 and a pointer p initialized to the address of x.">
    <text x="80" y="95" font-size="12" fill="#424242">int x = 42;   int *p = &amp;x;</text>
    <rect x="100" y="110" width="160" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="180" y="135" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">x = 42</text>
    <text x="180" y="158" text-anchor="middle" font-size="11" fill="#616161">Address: 0x1000</text>
    <rect x="350" y="110" width="200" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="450" y="135" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">p = 0x1000</text>
    <text x="450" y="158" text-anchor="middle" font-size="11" fill="#616161">Address: 0x2000</text>
    <line x1="350" y1="140" x2="260" y2="140" stroke="#ff9800" stroke-width="3" marker-end="url(#arrowhead)"/>
  </g>
  <g id="step2" class="step" data-narration="Reading through pointer: *p dereferences p and returns the value 42 stored at address 0x1000.">
    <rect x="60" y="190" width="320" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="220" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Reading: *p returns 42</text>
    <text x="220" y="232" text-anchor="middle" font-size="12" fill="#e65100">printf("%d", *p);  // Output: 42</text>
  </g>
  <g id="step3" class="step" data-narration="Writing through pointer: assigning *p equals 100 changes the value of x to 100 through p.">
    <rect x="420" y="190" width="320" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="580" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Writing: *p = 100</text>
    <text x="580" y="232" text-anchor="middle" font-size="12" fill="#f44336">Now x is also 100 (same location)</text>
  </g>
  <g id="step4" class="step" data-narration="After writing through pointer, both x and *p reflect the new value 100 since they refer to the same memory.">
    <text x="400" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">After *p = 100:</text>
    <rect x="100" y="285" width="160" height="55" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="180" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">x = 100</text>
    <text x="180" y="330" text-anchor="middle" font-size="11" fill="#616161">Value changed!</text>
    <rect x="350" y="285" width="200" height="55" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="450" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">*p = 100</text>
    <text x="450" y="330" text-anchor="middle" font-size="11" fill="#616161">Same memory location</text>
    <line x1="350" y1="310" x2="260" y2="310" stroke="#9c27b0" stroke-width="3" marker-end="url(#arrowhead)"/>
  </g>
  <g id="step5" class="step" data-narration="Pointer access with arrays: array name acts as pointer. arr[2] is the same as *(arr + 2).">
    <text x="80" y="370" font-size="13" font-weight="bold" fill="#1976d2">Array Access via Pointer:</text>
    <rect x="80" y="380" width="80" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="120" y="405" text-anchor="middle" font-size="13" fill="#1976d2">10</text>
    <rect x="160" y="380" width="80" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="200" y="405" text-anchor="middle" font-size="13" fill="#1976d2">20</text>
    <rect x="240" y="380" width="80" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
    <text x="280" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">30</text>
    <rect x="320" y="380" width="80" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="360" y="405" text-anchor="middle" font-size="13" fill="#1976d2">40</text>
    <text x="280" y="438" text-anchor="middle" font-size="12" fill="#388e3c">*(arr+2) = arr[2] = 30</text>
  </g>
  <g id="step6" class="step" data-narration="Swap function example: pointers enable call by reference, allowing functions to modify the caller's variables.">
    <rect x="430" y="370" width="330" height="100" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="595" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Call by Reference (Swap)</text>
    <text x="450" y="412" font-size="11" fill="#424242">void swap(int *a, int *b) {</text>
    <text x="460" y="427" font-size="11" fill="#424242">  int temp = *a;</text>
    <text x="460" y="442" font-size="11" fill="#424242">  *a = *b;  *b = temp;</text>
    <text x="450" y="457" font-size="11" fill="#424242">}</text>
  </g>
  <g id="step7" class="step" data-narration="Indirect access via pointers is the foundation for all dynamic data structures in C programming.">
    <rect x="60" y="490" width="680" height="45" rx="8" fill="#1976d2"/>
    <text x="400" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Pointer access enables: Dynamic structures, Function arguments, Efficient data manipulation</text>
  </g>
</svg>