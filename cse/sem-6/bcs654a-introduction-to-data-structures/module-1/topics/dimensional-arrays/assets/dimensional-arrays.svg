<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Dimensional Arrays Comparison</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Arrays can be one, two, or three dimensional. Each dimension adds a new way to organize data.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Comparing 1D, 2D, and 3D array structures side by side</text>
  </g>
  <g id="step1" class="step" data-narration="One-dimensional arrays are simple linear sequences accessed with a single index from zero to n minus one.">
    <rect x="40" y="80" width="220" height="130" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="150" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">1D Array</text>
    <text x="150" y="118" text-anchor="middle" font-size="11" fill="#616161">int arr[5];</text>
    <rect x="55" y="128" width="40" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="75" y="148" text-anchor="middle" font-size="11" fill="#1976d2">10</text>
    <rect x="95" y="128" width="40" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="115" y="148" text-anchor="middle" font-size="11" fill="#1976d2">20</text>
    <rect x="135" y="128" width="40" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="155" y="148" text-anchor="middle" font-size="11" fill="#1976d2">30</text>
    <rect x="175" y="128" width="40" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="195" y="148" text-anchor="middle" font-size="11" fill="#1976d2">40</text>
    <text x="150" y="180" text-anchor="middle" font-size="11" fill="#424242">Access: arr[i]</text>
    <text x="150" y="195" text-anchor="middle" font-size="11" fill="#424242">1 loop to traverse</text>
  </g>
  <g id="step2" class="step" data-narration="Two-dimensional arrays form tables with rows and columns, accessed using two indices.">
    <rect x="290" y="80" width="220" height="130" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">2D Array</text>
    <text x="400" y="118" text-anchor="middle" font-size="11" fill="#616161">int arr[2][3];</text>
    <rect x="310" y="128" width="50" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <rect x="360" y="128" width="50" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <rect x="410" y="128" width="50" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <rect x="310" y="153" width="50" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <rect x="360" y="153" width="50" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <rect x="410" y="153" width="50" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="198" text-anchor="middle" font-size="11" fill="#424242">Access: arr[i][j]</text>
  </g>
  <g id="step3" class="step" data-narration="Three-dimensional arrays add depth with layers, forming a cube-like structure with three indices.">
    <rect x="540" y="80" width="220" height="130" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="650" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">3D Array</text>
    <text x="650" y="118" text-anchor="middle" font-size="11" fill="#616161">int arr[2][2][3];</text>
    <rect x="570" y="135" width="35" height="20" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <rect x="605" y="135" width="35" height="20" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <rect x="640" y="135" width="35" height="20" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <rect x="570" y="155" width="35" height="20" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <rect x="605" y="155" width="35" height="20" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <rect x="640" y="155" width="35" height="20" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <rect x="580" y="128" width="35" height="20" fill="#ce93d8" stroke="#7b1fa2" stroke-width="1"/>
    <rect x="615" y="128" width="35" height="20" fill="#ce93d8" stroke="#7b1fa2" stroke-width="1"/>
    <rect x="650" y="128" width="35" height="20" fill="#ce93d8" stroke="#7b1fa2" stroke-width="1"/>
    <text x="650" y="198" text-anchor="middle" font-size="11" fill="#424242">Access: arr[i][j][k]</text>
  </g>
  <g id="step4" class="step" data-narration="Address formulas become more complex with each dimension, adding multiplications for each axis.">
    <text x="400" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Address Formulas (Row-Major):</text>
    <rect x="40" y="252" width="720" height="28" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="400" y="271" text-anchor="middle" font-size="12" fill="#1976d2">1D: Base + i * sizeof(element)</text>
    <rect x="40" y="284" width="720" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="303" text-anchor="middle" font-size="12" fill="#388e3c">2D: Base + (i * cols + j) * sizeof(element)</text>
    <rect x="40" y="316" width="720" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="400" y="335" text-anchor="middle" font-size="12" fill="#9c27b0">3D: Base + (i * rows * cols + j * cols + k) * sizeof(element)</text>
  </g>
  <g id="step5" class="step" data-narration="Memory usage grows multiplicatively. Each added dimension multiplies the total element count.">
    <text x="400" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Memory Usage (int = 4 bytes):</text>
    <rect x="80" y="385" width="200" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="180" y="403" text-anchor="middle" font-size="12" fill="#1976d2">int[10]: 10 elem</text>
    <text x="180" y="421" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">40 bytes</text>
    <rect x="300" y="385" width="200" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="403" text-anchor="middle" font-size="12" fill="#388e3c">int[10][10]: 100 elem</text>
    <text x="400" y="421" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">400 bytes</text>
    <rect x="520" y="385" width="200" height="45" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="620" y="403" text-anchor="middle" font-size="12" fill="#9c27b0">int[10][10][10]: 1000</text>
    <text x="620" y="421" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">4000 bytes</text>
  </g>
  <g id="step6" class="step" data-narration="Each dimension requires one additional nested loop. Traversal complexity is the product of all dimension sizes.">
    <rect x="80" y="445" width="200" height="35" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="180" y="468" text-anchor="middle" font-size="12" fill="#1976d2">1D: 1 loop O(n)</text>
    <rect x="300" y="445" width="200" height="35" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="468" text-anchor="middle" font-size="12" fill="#388e3c">2D: 2 loops O(r*c)</text>
    <rect x="520" y="445" width="200" height="35" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="620" y="468" text-anchor="middle" font-size="12" fill="#9c27b0">3D: 3 loops O(l*r*c)</text>
  </g>
  <g id="step7" class="step" data-narration="Choose array dimensions based on data: lists need 1D, tables need 2D, and volumetric data needs 3D.">
    <rect x="80" y="500" width="640" height="50" rx="8" fill="#1976d2"/>
    <text x="400" y="522" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Match Dimension to Data Structure</text>
    <text x="400" y="542" text-anchor="middle" font-size="12" fill="#bbdefb">Lists (1D) | Tables/Matrices (2D) | Spatial/Video (3D)</text>
  </g>
</svg>