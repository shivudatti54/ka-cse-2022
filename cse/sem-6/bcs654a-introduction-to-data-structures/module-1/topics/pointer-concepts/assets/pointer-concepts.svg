<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Pointer Concepts</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Pointer concepts include declaration, initialization, dereferencing, null pointers, and pointer to pointer.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Core concepts for working with pointers in C programming</text>
  </g>
  <g id="step1" class="step" data-narration="Pointer declaration uses asterisk with a data type. The pointer must match the type of variable it points to.">
    <rect x="50" y="80" width="340" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Declaration</text>
    <text x="70" y="122" font-size="12" fill="#424242">int *p;     // pointer to int</text>
    <text x="70" y="142" font-size="12" fill="#424242">float *fp;  // pointer to float</text>
  </g>
  <g id="step2" class="step" data-narration="Initialization assigns an address to the pointer using the ampersand operator or malloc for dynamic memory.">
    <rect x="420" y="80" width="340" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Initialization</text>
    <text x="440" y="122" font-size="12" fill="#424242">int x = 5;</text>
    <text x="440" y="142" font-size="12" fill="#424242">int *p = &amp;x;  // p holds address of x</text>
  </g>
  <g id="step3" class="step" data-narration="Dereferencing with asterisk accesses the value at the stored address. Changing *p also changes x.">
    <rect x="50" y="175" width="700" height="75" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Dereferencing (*p)</text>
    <rect x="80" y="210" width="120" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="140" y="230" text-anchor="middle" font-size="12" fill="#1976d2">x = 5</text>
    <line x1="200" y1="225" x2="270" y2="225" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="280" y="210" width="140" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="350" y="230" text-anchor="middle" font-size="12" fill="#388e3c">*p yields 5</text>
    <line x1="420" y1="225" x2="480" y2="225" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="490" y="210" width="200" height="30" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="590" y="230" text-anchor="middle" font-size="12" fill="#f44336">*p = 10 changes x to 10</text>
  </g>
  <g id="step4" class="step" data-narration="A NULL pointer points to nothing. Always initialize pointers to NULL if not assigned an address immediately.">
    <rect x="50" y="265" width="340" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="220" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">NULL Pointer</text>
    <text x="70" y="307" font-size="12" fill="#424242">int *p = NULL;  // safe initialization</text>
    <text x="70" y="325" font-size="12" fill="#f44336">Dereferencing NULL causes crash!</text>
  </g>
  <g id="step5" class="step" data-narration="Pointer to pointer stores the address of another pointer. Double asterisk declares a pointer to pointer.">
    <rect x="420" y="265" width="340" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">Pointer to Pointer</text>
    <text x="440" y="307" font-size="12" fill="#424242">int **pp = &amp;p;</text>
    <text x="440" y="325" font-size="12" fill="#424242">**pp gives value of x</text>
  </g>
  <g id="step6" class="step" data-narration="Pointer to pointer chain: pp stores address of p, p stores address of x, x stores the value.">
    <text x="400" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Pointer Chain Visualization:</text>
    <rect x="80" y="380" width="130" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="145" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">pp</text>
    <text x="145" y="420" text-anchor="middle" font-size="11" fill="#616161">addr: 3000</text>
    <line x1="210" y1="405" x2="280" y2="405" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="290" y="380" width="130" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="355" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">p</text>
    <text x="355" y="420" text-anchor="middle" font-size="11" fill="#616161">addr: 2000</text>
    <line x1="420" y1="405" x2="490" y2="405" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="500" y="380" width="130" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="565" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">x = 5</text>
    <text x="565" y="420" text-anchor="middle" font-size="11" fill="#616161">addr: 1000</text>
  </g>
  <g id="step7" class="step" data-narration="Pointers and arrays are closely related. An array name acts as a pointer to its first element.">
    <rect x="60" y="450" width="680" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="468" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Arrays and Pointers Relationship</text>
    <text x="400" y="488" text-anchor="middle" font-size="12" fill="#424242">arr[i] is equivalent to *(arr + i) -- array name is a constant pointer</text>
  </g>
</svg>