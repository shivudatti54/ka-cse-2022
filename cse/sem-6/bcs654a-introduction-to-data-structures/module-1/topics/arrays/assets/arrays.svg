<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Arrays - Fundamentals</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="An array is a collection of elements of the same type stored in contiguous memory locations.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Contiguous Memory Storage of Homogeneous Elements</text>
  </g>
  <g id="step1" class="step" data-narration="Arrays store elements sequentially. Each element is accessed by its index, starting from zero.">
    <text x="100" y="95" font-size="14" font-weight="bold" fill="#1976d2">int arr[5] = {10, 20, 30, 40, 50};</text>
    <rect x="120" y="110" width="110" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="175" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">10</text>
    <rect x="230" y="110" width="110" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="285" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">20</text>
    <rect x="340" y="110" width="110" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="395" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">30</text>
    <rect x="450" y="110" width="110" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="505" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">40</text>
    <rect x="560" y="110" width="110" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="615" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">50</text>
    <text x="175" y="178" text-anchor="middle" font-size="12" fill="#616161">Index 0</text>
    <text x="285" y="178" text-anchor="middle" font-size="12" fill="#616161">Index 1</text>
    <text x="395" y="178" text-anchor="middle" font-size="12" fill="#616161">Index 2</text>
    <text x="505" y="178" text-anchor="middle" font-size="12" fill="#616161">Index 3</text>
    <text x="615" y="178" text-anchor="middle" font-size="12" fill="#616161">Index 4</text>
  </g>
  <g id="step2" class="step" data-narration="Memory addresses are calculated using base address plus index times element size in bytes.">
    <text x="100" y="210" font-size="13" font-weight="bold" fill="#388e3c">Memory Layout (Base = 1000, int = 4 bytes):</text>
    <text x="175" y="228" text-anchor="middle" font-size="11" fill="#388e3c">1000</text>
    <text x="285" y="228" text-anchor="middle" font-size="11" fill="#388e3c">1004</text>
    <text x="395" y="228" text-anchor="middle" font-size="11" fill="#388e3c">1008</text>
    <text x="505" y="228" text-anchor="middle" font-size="11" fill="#388e3c">1012</text>
    <text x="615" y="228" text-anchor="middle" font-size="11" fill="#388e3c">1016</text>
    <rect x="120" y="240" width="560" height="35" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="263" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Address(arr[i]) = Base_Address + (i x Size_of_Element)</text>
  </g>
  <g id="step3" class="step" data-narration="Key properties include fixed size, homogeneous elements, contiguous memory, and random access in constant time.">
    <rect x="50" y="295" width="160" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="130" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Fixed Size</text>
    <text x="130" y="340" text-anchor="middle" font-size="11" fill="#e65100">Set at creation</text>
    <text x="130" y="355" text-anchor="middle" font-size="11" fill="#e65100">Cannot resize</text>
    <rect x="230" y="295" width="160" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="310" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Homogeneous</text>
    <text x="310" y="340" text-anchor="middle" font-size="11" fill="#e65100">Same data type</text>
    <text x="310" y="355" text-anchor="middle" font-size="11" fill="#e65100">for all elements</text>
    <rect x="410" y="295" width="160" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="490" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Contiguous</text>
    <text x="490" y="340" text-anchor="middle" font-size="11" fill="#e65100">Adjacent memory</text>
    <text x="490" y="355" text-anchor="middle" font-size="11" fill="#e65100">locations</text>
    <rect x="590" y="295" width="160" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="670" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Random Access</text>
    <text x="670" y="340" text-anchor="middle" font-size="11" fill="#e65100">O(1) access</text>
    <text x="670" y="355" text-anchor="middle" font-size="11" fill="#e65100">using index</text>
  </g>
  <g id="step4" class="step" data-narration="Array operations have different time complexities. Access is constant time but insert and delete are linear.">
    <text x="100" y="400" font-size="14" font-weight="bold" fill="#9c27b0">Time Complexity of Operations:</text>
    <rect x="100" y="410" width="150" height="35" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="175" y="433" text-anchor="middle" font-size="12" fill="#388e3c">Access: O(1)</text>
    <rect x="270" y="410" width="150" height="35" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="345" y="433" text-anchor="middle" font-size="12" fill="#ff9800">Search: O(n)</text>
    <rect x="440" y="410" width="150" height="35" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="515" y="433" text-anchor="middle" font-size="12" fill="#f44336">Insert: O(n)</text>
    <rect x="610" y="410" width="150" height="35" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="685" y="433" text-anchor="middle" font-size="12" fill="#f44336">Delete: O(n)</text>
  </g>
  <g id="step5" class="step" data-narration="Arrays come in one-dimensional for lists, two-dimensional for matrices, and multidimensional for complex data.">
    <text x="100" y="480" font-size="14" font-weight="bold" fill="#1976d2">Types of Arrays:</text>
    <rect x="100" y="490" width="180" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="190" y="515" text-anchor="middle" font-size="13" fill="#1976d2">1D: Linear List</text>
    <rect x="300" y="490" width="200" height="40" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="515" text-anchor="middle" font-size="13" fill="#9c27b0">2D: Matrix/Table</text>
    <rect x="520" y="490" width="220" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="630" y="515" text-anchor="middle" font-size="13" fill="#388e3c">nD: Multi-dimensional</text>
  </g>
  <g id="step6" class="step" data-narration="Arrays are foundational building blocks used to implement stacks, queues, heaps, and hash tables.">
    <rect x="100" y="545" width="600" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="570" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Arrays: The foundation for stacks, queues, heaps, and hash tables</text>
  </g>
</svg>