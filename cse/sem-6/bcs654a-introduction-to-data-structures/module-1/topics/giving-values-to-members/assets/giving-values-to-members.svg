<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Giving Values to Structure Members</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Structure members are accessed and assigned values using the dot operator for variables or arrow for pointers.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Assigning values to individual members of a structure variable</text>
  </g>
  <g id="step1" class="step" data-narration="The dot operator is used with structure variables to access and assign values to individual members.">
    <rect x="50" y="80" width="340" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Dot Operator (.)</text>
    <text x="70" y="122" font-size="11" fill="#424242">struct Student s1;</text>
    <text x="70" y="140" font-size="11" fill="#424242">s1.roll_no = 101;</text>
    <text x="70" y="158" font-size="11" fill="#424242">strcpy(s1.name, "Alice");</text>
    <text x="70" y="176" font-size="11" fill="#424242">s1.marks = 95.5;</text>
  </g>
  <g id="step2" class="step" data-narration="The arrow operator is used with pointers to structures to access members without dereferencing explicitly.">
    <rect x="420" y="80" width="340" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Arrow Operator (-&gt;)</text>
    <text x="440" y="122" font-size="11" fill="#424242">struct Student *ptr = &amp;s1;</text>
    <text x="440" y="140" font-size="11" fill="#424242">ptr-&gt;roll_no = 101;</text>
    <text x="440" y="158" font-size="11" fill="#424242">strcpy(ptr-&gt;name, "Alice");</text>
    <text x="440" y="176" font-size="11" fill="#424242">ptr-&gt;marks = 95.5;</text>
  </g>
  <g id="step3" class="step" data-narration="After assignment, the structure variable s1 holds all its member values in contiguous memory locations.">
    <text x="400" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Result in Memory:</text>
    <rect x="100" y="220" width="150" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="175" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">roll_no</text>
    <text x="175" y="260" text-anchor="middle" font-size="14" fill="#e65100">101</text>
    <rect x="260" y="220" width="230" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="375" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">name</text>
    <text x="375" y="260" text-anchor="middle" font-size="14" fill="#e65100">"Alice"</text>
    <rect x="500" y="220" width="150" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="575" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">marks</text>
    <text x="575" y="260" text-anchor="middle" font-size="14" fill="#e65100">95.5</text>
  </g>
  <g id="step4" class="step" data-narration="User input can be taken using scanf with the address of each member using the ampersand operator.">
    <rect x="50" y="290" width="700" height="60" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Runtime Input</text>
    <text x="70" y="335" font-size="11" fill="#424242">scanf("%d", &amp;s1.roll_no);  scanf("%s", s1.name);  scanf("%f", &amp;s1.marks);</text>
  </g>
  <g id="step5" class="step" data-narration="Structure assignment copies all members. s2 equals s1 copies every member value from s1 to s2.">
    <rect x="50" y="370" width="340" height="65" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Structure Copy</text>
    <text x="70" y="415" font-size="11" fill="#424242">struct Student s2 = s1;  // copies all members</text>
    <text x="70" y="430" font-size="11" fill="#616161">s2 is independent copy of s1</text>
  </g>
  <g id="step6" class="step" data-narration="Printing structure members requires accessing each one individually. There is no single print for all.">
    <rect x="420" y="370" width="340" height="65" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Printing Members</text>
    <text x="440" y="415" font-size="11" fill="#424242">printf("%d %s %.1f",</text>
    <text x="450" y="430" font-size="11" fill="#424242">s1.roll_no, s1.name, s1.marks);</text>
  </g>
  <g id="step7" class="step" data-narration="The dot and arrow operators are used throughout data structures for accessing node data and pointer fields.">
    <rect x="50" y="455" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="480" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Key: Use dot (.) for variables, arrow (-&gt;) for pointers to structures</text>
  </g>
</svg>