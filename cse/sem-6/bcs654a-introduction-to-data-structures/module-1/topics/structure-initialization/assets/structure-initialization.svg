<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a56db" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="1"/>
      <stop offset="100%" stop-color="#14b875" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="orange-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f2a902" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="purple-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7a4bf7" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Structure Initialization in C">
    <rect x="50" y="50" width="700" height="100" fill="url(#blue-gradient)" rx="10"/>
    <text x="100" y="120" font-size="30" font-family="Arial" fill="#2563eb">Structure Initialization in C</text>
  </g>
  <g id="step1" data-narration="Declaring a Structure">
    <rect x="50" y="200" width="200" height="50" fill="url(#green-gradient)" rx="10"/>
    <text x="60" y="230" font-size="20" font-family="Arial" fill="#10b981">struct Student</text>
    <text x="60" y="260" font-size="20" font-family="Arial" fill="#10b981">{</text>
    <text x="60" y="290" font-size="20" font-family="Arial" fill="#10b981">int roll_no;</text>
    <text x="60" y="320" font-size="20" font-family="Arial" fill="#10b981">char name[50];</text>
    <text x="60" y="350" font-size="20" font-family="Arial" fill="#10b981">float marks;</text>
    <text x="60" y="380" font-size="20" font-family="Arial" fill="#10b981">};</text>
    <line x1="250" y1="300" x2="300" y2="300" stroke="#10b981" stroke-width="2"/>
    <text x="310" y="320" font-size="20" font-family="Arial" fill="#10b981">Declaration</text>
  </g>
  <g id="step2" data-narration="Method 1: Declaration and Initialization Separately">
    <rect x="350" y="200" width="200" height="50" fill="url(#orange-gradient)" rx="10"/>
    <text x="360" y="230" font-size="20" font-family="Arial" fill="#f59e0b">struct Student s1;</text>
    <text x="360" y="260" font-size="20" font-family="Arial" fill="#f59e0b">s1.roll_no = 101;</text>
    <text x="360" y="290" font-size="20" font-family="Arial" fill="#f59e0b">strcpy(s1.name, "John Doe");</text>
    <text x="360" y="320" font-size="20" font-family="Arial" fill="#f59e0b">s1.marks = 85.5;</text>
    <line x1="550" y1="300" x2="600" y2="300" stroke="#f59e0b" stroke-width="2"/>
    <text x="610" y="320" font-size="20" font-family="Arial" fill="#f59e0b">Initialization</text>
  </g>
  <g id="step3" data-narration="Method 2: Initialization at Declaration">
    <rect x="50" y="400" width="200" height="50" fill="url(#purple-gradient)" rx="10"/>
    <text x="60" y="430" font-size="20" font-family="Arial" fill="#8b5cf6">struct Student s1 = {101, "John Doe", 85.5};</text>
    <line x1="250" y1="450" x2="300" y2="450" stroke="#8b5cf6" stroke-width="2"/>
    <text x="310" y="470" font-size="20" font-family="Arial" fill="#8b5cf6">Combined Declaration and Initialization</text>
  </g>
  <g id="step4" data-narration="Method 3: Designated Initializers (C99 onwards)">
    <rect x="350" y="400" width="200" height="50" fill="url(#blue-gradient)" rx="10"/>
    <text x="360" y="430" font-size="20" font-family="Arial" fill="#2563eb">struct Student s1 = {.roll_no = 101, .name = "John Doe", .marks = 85.5};</text>
    <line x1="550" y1="450" x2="600" y2="450" stroke="#2563eb" stroke-width="2"/>
    <text x="610" y="470" font-size="20" font-family="Arial" fill="#2563eb">Designated Initialization</text>
  </g>
  <g id="step5" data-narration="Method 4: Partial Initialization">
    <rect x="50" y="500" width="200" height="50" fill="url(#green-gradient)" rx="10"/>
    <text x="60" y="530" font-size="20" font-family="Arial" fill="#10b981">struct Student s1 = {101};</text>
    <text x="60" y="560" font-size="20" font-family="Arial" fill="#10b981">// Only roll_no is initialized, others are set to 0</text>
    <line x1="250" y1="570" x2="300" y2="570" stroke="#10b981" stroke-width="2"/>
    <text x="310" y="590" font-size="20" font-family="Arial" fill="#10b981">Partial Initialization</text>
  </g>
  <g id="step6" data-narration="Method 5: Using typedef">
    <rect x="350" y="500" width="200" height="50" fill="url(#orange-gradient)" rx="10"/>
    <text x="360" y="530" font-size="20" font-family="Arial" fill="#f59e0b">typedef struct {int roll_no; char name[50]; float marks;} Student;</text>
    <text x="360" y="560" font-size="20" font-family="Arial" fill="#f59e0b">Student s1 = {101, "John Doe", 85.5};</text>
    <line x1="550" y1="570" x2="600" y2="570" stroke="#f59e0b" stroke-width="2"/>
    <text x="610" y="590" font-size="20" font-family="Arial" fill="#f59e0b">Using typedef for Simplification</text>
  </g>
</svg>