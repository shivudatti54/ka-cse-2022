<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Structures and Unions</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Structures group different data types together. Unions share memory among members, using the size of the largest.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">User-defined types that combine multiple data items</text>
  </g>
  <g id="step1" class="step" data-narration="A structure groups related variables of different types under one name. Each member has its own memory space.">
    <rect x="50" y="80" width="340" height="120" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Structure</text>
    <text x="70" y="120" font-size="11" fill="#424242">struct Student {</text>
    <text x="90" y="137" font-size="11" fill="#424242">int roll;      // 4 bytes</text>
    <text x="90" y="154" font-size="11" fill="#424242">char name[20]; // 20 bytes</text>
    <text x="90" y="171" font-size="11" fill="#424242">float marks;   // 4 bytes</text>
    <text x="70" y="188" font-size="11" fill="#424242">}; // Total: 28 bytes</text>
  </g>
  <g id="step2" class="step" data-narration="A union allows different members to share the same memory location. Only one member can hold a value at a time.">
    <rect x="420" y="80" width="340" height="120" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Union</text>
    <text x="440" y="120" font-size="11" fill="#424242">union Data {</text>
    <text x="460" y="137" font-size="11" fill="#424242">int i;     // 4 bytes</text>
    <text x="460" y="154" font-size="11" fill="#424242">float f;   // 4 bytes</text>
    <text x="460" y="171" font-size="11" fill="#424242">char c;    // 1 byte</text>
    <text x="440" y="188" font-size="11" fill="#424242">}; // Total: 4 bytes (max)</text>
  </g>
  <g id="step3" class="step" data-narration="Structure memory: all members stored separately in sequence. Each member has its own dedicated space.">
    <text x="220" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Structure Memory Layout:</text>
    <rect x="60" y="235" width="100" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="110" y="260" text-anchor="middle" font-size="11" fill="#1976d2">roll (4B)</text>
    <rect x="160" y="235" width="160" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="240" y="260" text-anchor="middle" font-size="11" fill="#1976d2">name (20B)</text>
    <rect x="320" y="235" width="100" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="370" y="260" text-anchor="middle" font-size="11" fill="#1976d2">marks (4B)</text>
  </g>
  <g id="step4" class="step" data-narration="Union memory: all members overlap at the same starting address. Size equals the largest member.">
    <text x="620" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Union Memory Layout:</text>
    <rect x="500" y="235" width="240" height="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="620" y="253" text-anchor="middle" font-size="11" fill="#388e3c">i (4B) / f (4B) / c (1B)</text>
    <text x="620" y="268" text-anchor="middle" font-size="10" fill="#616161">All share same 4 bytes</text>
  </g>
  <g id="step5" class="step" data-narration="Accessing structure members uses the dot operator. For pointer to structure, use the arrow operator.">
    <rect x="50" y="295" width="340" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="220" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Accessing Members</text>
    <text x="70" y="338" font-size="11" fill="#424242">s1.roll = 101;     // dot operator</text>
    <text x="70" y="358" font-size="11" fill="#424242">ptr-&gt;roll = 101;  // arrow operator</text>
  </g>
  <g id="step6" class="step" data-narration="Key difference: structures allocate memory for ALL members, while unions allocate only for the LARGEST member.">
    <rect x="420" y="295" width="340" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Key Difference</text>
    <text x="440" y="338" font-size="11" fill="#424242">struct: sizeof = sum of all members</text>
    <text x="440" y="358" font-size="11" fill="#424242">union:  sizeof = max member size</text>
  </g>
  <g id="step7" class="step" data-narration="Structures are essential for creating nodes in linked lists, trees, and graphs in data structures.">
    <rect x="50" y="395" width="700" height="45" rx="8" fill="#1976d2"/>
    <text x="400" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">In Data Structures: Structures define nodes</text>
    <text x="400" y="433" text-anchor="middle" font-size="12" fill="#bbdefb">struct Node { int data; struct Node *next; }; -- foundation of linked structures</text>
  </g>
</svg>