<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="20" fill="#2563eb" font-family="Arial" text-anchor="middle" font-weight="bold">Multidimensional Arrays</text>

  <g id="step0" class="step" data-narration="Introduction to Multidimensional Arrays">
    <rect x="40" y="60" width="720" height="45" fill="#2563eb" rx="8"/>
    <text x="400" y="88" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Multidimensional Arrays: Arrays with Multiple Dimensions</text>
  </g>

  <g id="step1" class="step" data-narration="Two-Dimensional Arrays">
    <rect x="40" y="115" width="720" height="45" fill="#10b981" rx="8"/>
    <text x="400" y="143" font-size="15" fill="#ffffff" font-family="Arial" text-anchor="middle">2D Array: Table with Rows and Columns (e.g., matrix[row][col])</text>
  </g>

  <g id="step2" class="step" data-narration="Memory Representation">
    <rect x="40" y="170" width="720" height="45" fill="#f59e0b" rx="8"/>
    <text x="400" y="193" font-size="14" fill="#ffffff" font-family="Arial" text-anchor="middle">Row-Major Order: Elements stored row by row in contiguous memory</text>
    <text x="400" y="209" font-size="11" fill="#ffffff" font-family="Arial" text-anchor="middle">[0][0] [0][1] [0][2] [1][0] [1][1] [1][2]</text>
  </g>

  <g id="step3" class="step" data-narration="Accessing Elements">
    <rect x="40" y="225" width="720" height="45" fill="#8b5cf6" rx="8"/>
    <text x="400" y="253" font-size="15" fill="#ffffff" font-family="Arial" text-anchor="middle">Accessing Elements: matrix[row][column]</text>
  </g>

  <g id="step4" class="step" data-narration="Initializing Two-Dimensional Arrays">
    <rect x="40" y="280" width="720" height="45" fill="#10b981" rx="8"/>
    <text x="400" y="298" font-size="13" fill="#ffffff" font-family="Arial" text-anchor="middle">Initializing 2D Arrays: int matrix[2][3] = {{1,2,3}, {4,5,6}};</text>
    <text x="400" y="314" font-size="11" fill="#ffffff" font-family="Arial" text-anchor="middle">Full, Partial, Flattened, or Omitting Row Size</text>
  </g>

  <g id="step5" class="step" data-narration="Three-Dimensional Arrays">
    <rect x="40" y="335" width="720" height="45" fill="#f59e0b" rx="8"/>
    <text x="400" y="358" font-size="14" fill="#ffffff" font-family="Arial" text-anchor="middle">3D Array: Cube or Collection of Tables - int cube[2][3][4];</text>
  </g>

  <g id="step6" class="step" data-narration="Real-World Applications">
    <rect x="40" y="390" width="720" height="45" fill="#8b5cf6" rx="8"/>
    <text x="400" y="408" font-size="13" fill="#ffffff" font-family="Arial" text-anchor="middle">Applications: Matrices, Game Boards, Image Pixels,</text>
    <text x="400" y="424" font-size="13" fill="#ffffff" font-family="Arial" text-anchor="middle">Scientific Data, Database Tables</text>
  </g>

  <g id="step7" class="step" data-narration="Conclusion">
    <rect x="40" y="445" width="720" height="45" fill="#2563eb" rx="8"/>
    <text x="400" y="473" font-size="14" fill="#ffffff" font-family="Arial" text-anchor="middle">Powerful Data Structure for Complex Data Organization</text>
  </g>

  <g id="step8" class="step" data-narration="Practice and Review">
    <rect x="40" y="500" width="345" height="40" fill="#10b981" rx="8"/>
    <text x="212" y="524" font-size="13" fill="#ffffff" font-family="Arial" text-anchor="middle">Practice and Review</text>
  </g>

  <g id="step9" class="step" data-narration="Additional Resources">
    <rect x="415" y="500" width="345" height="40" fill="#f59e0b" rx="8"/>
    <text x="587" y="524" font-size="13" fill="#ffffff" font-family="Arial" text-anchor="middle">Additional Resources</text>
  </g>

  <g id="step10" class="step" data-narration="Final Thoughts">
    <rect x="40" y="550" width="345" height="40" fill="#8b5cf6" rx="8"/>
    <text x="212" y="574" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Fundamental Concept</text>
  </g>

  <g id="step11" class="step" data-narration="Future Applications">
    <rect x="415" y="550" width="345" height="40" fill="#2563eb" rx="8"/>
    <text x="587" y="574" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Emerging Trends</text>
  </g>
</svg>
