<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Two-Dimensional Arrays</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="A 2D array stores elements in a grid of rows and columns, like a spreadsheet or matrix.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">int matrix[3][4] -- 3 rows and 4 columns of integers</text>
  </g>
  <g id="step1" class="step" data-narration="Each element is accessed using two indices: the row number and column number, both starting from zero.">
    <text x="80" y="90" font-size="13" font-weight="bold" fill="#1976d2">Matrix Visualization (3x4):</text>
    <text x="195" y="115" text-anchor="middle" font-size="12" fill="#616161">Col 0</text>
    <text x="295" y="115" text-anchor="middle" font-size="12" fill="#616161">Col 1</text>
    <text x="395" y="115" text-anchor="middle" font-size="12" fill="#616161">Col 2</text>
    <text x="495" y="115" text-anchor="middle" font-size="12" fill="#616161">Col 3</text>
    <text x="90" y="148" font-size="12" fill="#616161">Row 0</text>
    <rect x="145" y="125" width="100" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="195" y="150" text-anchor="middle" font-size="14" fill="#1976d2">1</text>
    <rect x="245" y="125" width="100" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="295" y="150" text-anchor="middle" font-size="14" fill="#1976d2">2</text>
    <rect x="345" y="125" width="100" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="395" y="150" text-anchor="middle" font-size="14" fill="#1976d2">3</text>
    <rect x="445" y="125" width="100" height="38" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="495" y="150" text-anchor="middle" font-size="14" fill="#1976d2">4</text>
    <text x="90" y="186" font-size="12" fill="#616161">Row 1</text>
    <rect x="145" y="163" width="100" height="38" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="195" y="188" text-anchor="middle" font-size="14" fill="#388e3c">5</text>
    <rect x="245" y="163" width="100" height="38" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="295" y="188" text-anchor="middle" font-size="14" fill="#388e3c">6</text>
    <rect x="345" y="163" width="100" height="38" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="395" y="188" text-anchor="middle" font-size="14" fill="#388e3c">7</text>
    <rect x="445" y="163" width="100" height="38" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="495" y="188" text-anchor="middle" font-size="14" fill="#388e3c">8</text>
    <text x="90" y="224" font-size="12" fill="#616161">Row 2</text>
    <rect x="145" y="201" width="100" height="38" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="195" y="226" text-anchor="middle" font-size="14" fill="#ff9800">9</text>
    <rect x="245" y="201" width="100" height="38" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="295" y="226" text-anchor="middle" font-size="14" fill="#ff9800">10</text>
    <rect x="345" y="201" width="100" height="38" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="395" y="226" text-anchor="middle" font-size="14" fill="#ff9800">11</text>
    <rect x="445" y="201" width="100" height="38" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="495" y="226" text-anchor="middle" font-size="14" fill="#ff9800">12</text>
  </g>
  <g id="step2" class="step" data-narration="In memory, 2D arrays use row-major order: all of row zero is stored first, then row one, then row two.">
    <text x="80" y="265" font-size="13" font-weight="bold" fill="#9c27b0">Row-Major Memory Layout:</text>
    <rect x="60" y="275" width="55" height="32" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="87" y="296" text-anchor="middle" font-size="11" fill="#1976d2">1</text>
    <rect x="115" y="275" width="55" height="32" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="142" y="296" text-anchor="middle" font-size="11" fill="#1976d2">2</text>
    <rect x="170" y="275" width="55" height="32" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="197" y="296" text-anchor="middle" font-size="11" fill="#1976d2">3</text>
    <rect x="225" y="275" width="55" height="32" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="252" y="296" text-anchor="middle" font-size="11" fill="#1976d2">4</text>
    <rect x="280" y="275" width="55" height="32" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="307" y="296" text-anchor="middle" font-size="11" fill="#388e3c">5</text>
    <rect x="335" y="275" width="55" height="32" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="362" y="296" text-anchor="middle" font-size="11" fill="#388e3c">6</text>
    <rect x="390" y="275" width="55" height="32" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="417" y="296" text-anchor="middle" font-size="11" fill="#388e3c">7</text>
    <rect x="445" y="275" width="55" height="32" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="472" y="296" text-anchor="middle" font-size="11" fill="#388e3c">8</text>
    <rect x="500" y="275" width="55" height="32" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="527" y="296" text-anchor="middle" font-size="11" fill="#ff9800">9</text>
    <rect x="555" y="275" width="55" height="32" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="582" y="296" text-anchor="middle" font-size="11" fill="#ff9800">10</text>
    <rect x="610" y="275" width="55" height="32" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="637" y="296" text-anchor="middle" font-size="11" fill="#ff9800">11</text>
    <rect x="665" y="275" width="55" height="32" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="692" y="296" text-anchor="middle" font-size="11" fill="#ff9800">12</text>
  </g>
  <g id="step3" class="step" data-narration="Address formula for row-major order: base plus row times columns plus column, all times element size.">
    <rect x="80" y="325" width="640" height="38" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Address(a[i][j]) = Base + (i * cols + j) * sizeof(element)</text>
  </g>
  <g id="step4" class="step" data-narration="Example: accessing a[1][2] with base 1000, 4 columns, 4-byte int gives address 1024.">
    <rect x="80" y="375" width="640" height="48" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Example: a[1][2] with base=1000, cols=4, sizeof(int)=4</text>
    <text x="400" y="415" text-anchor="middle" font-size="12" fill="#388e3c">= 1000 + (1*4 + 2) * 4 = 1000 + 24 = 1024</text>
  </g>
  <g id="step5" class="step" data-narration="Total memory equals rows times columns times element size. A 3 by 4 integer array uses 48 bytes.">
    <rect x="80" y="435" width="300" height="38" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="230" y="459" text-anchor="middle" font-size="13" fill="#e65100">Total Memory = 3 x 4 x 4 = 48 bytes</text>
  </g>
  <g id="step6" class="step" data-narration="Nested for loops traverse 2D arrays. The outer loop iterates rows and the inner loop iterates columns.">
    <rect x="400" y="435" width="320" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="560" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Traversal Pattern</text>
    <text x="560" y="475" text-anchor="middle" font-size="11" fill="#e65100">for(i=0; i&lt;3; i++)</text>
    <text x="560" y="490" text-anchor="middle" font-size="11" fill="#e65100">  for(j=0; j&lt;4; j++) use a[i][j];</text>
  </g>
  <g id="step7" class="step" data-narration="2D arrays are used for matrix operations, game boards, image pixels, spreadsheets, and adjacency matrices.">
    <rect x="80" y="510" width="640" height="45" rx="8" fill="#1976d2"/>
    <text x="400" y="530" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Applications: Matrix math, Game boards, Image pixels</text>
    <text x="400" y="548" text-anchor="middle" font-size="12" fill="#bbdefb">Tic-tac-toe (3x3), Chess (8x8), Adjacency matrices</text>
  </g>
</svg>