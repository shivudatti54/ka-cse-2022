<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Introduction to Pointers</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="A pointer is a variable that stores the memory address of another variable, not the data itself.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Pointers store memory addresses, enabling indirect access to data</text>
  </g>
  <g id="step1" class="step" data-narration="When we declare int x equals 10, the value 10 is stored at a specific memory address like 1000.">
    <text x="120" y="95" font-size="13" font-weight="bold" fill="#1976d2">Variable in Memory:</text>
    <rect x="100" y="105" width="180" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="190" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">x = 10</text>
    <text x="190" y="150" text-anchor="middle" font-size="12" fill="#616161">Address: 1000</text>
  </g>
  <g id="step2" class="step" data-narration="A pointer variable ptr stores the address 1000, pointing to where x lives in memory.">
    <text x="450" y="95" font-size="13" font-weight="bold" fill="#388e3c">Pointer Variable:</text>
    <rect x="400" y="105" width="200" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="500" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">ptr = 1000</text>
    <text x="500" y="150" text-anchor="middle" font-size="12" fill="#616161">Address: 2000</text>
    <line x1="400" y1="135" x2="280" y2="135" stroke="#ff9800" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="340" y="125" text-anchor="middle" font-size="11" fill="#ff9800">points to</text>
  </g>
  <g id="step3" class="step" data-narration="Declaration uses asterisk: int *ptr declares a pointer to integer. The ampersand gets the address of a variable.">
    <rect x="60" y="185" width="320" height="90" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="220" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Declaration and Operators</text>
    <text x="80" y="228" font-size="12" fill="#424242">int *ptr;      // pointer declaration</text>
    <text x="80" y="248" font-size="12" fill="#424242">ptr = &amp;x;      // &amp; gets address of x</text>
    <text x="80" y="268" font-size="12" fill="#424242">printf(*ptr);  // * dereferences (gets 10)</text>
  </g>
  <g id="step4" class="step" data-narration="The address-of operator ampersand returns the memory location. The dereference operator asterisk accesses the value.">
    <rect x="420" y="185" width="340" height="90" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Two Key Operators</text>
    <rect x="440" y="215" width="130" height="25" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="505" y="233" text-anchor="middle" font-size="12" fill="#1976d2">&amp; (address-of)</text>
    <rect x="440" y="245" width="130" height="25" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="505" y="263" text-anchor="middle" font-size="12" fill="#388e3c">* (dereference)</text>
    <text x="620" y="233" font-size="11" fill="#424242">Get address</text>
    <text x="620" y="263" font-size="11" fill="#424242">Get value at</text>
  </g>
  <g id="step5" class="step" data-narration="Pointer types must match variable types. An int pointer can only point to an integer variable.">
    <text x="80" y="305" font-size="13" font-weight="bold" fill="#1976d2">Pointer Types:</text>
    <rect x="60" y="315" width="160" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="140" y="340" text-anchor="middle" font-size="12" fill="#1976d2">int *iptr;</text>
    <rect x="240" y="315" width="160" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="320" y="340" text-anchor="middle" font-size="12" fill="#388e3c">float *fptr;</text>
    <rect x="420" y="315" width="160" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="500" y="340" text-anchor="middle" font-size="12" fill="#ff9800">char *cptr;</text>
    <rect x="600" y="315" width="160" height="40" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="680" y="340" text-anchor="middle" font-size="12" fill="#9c27b0">void *vptr;</text>
  </g>
  <g id="step6" class="step" data-narration="Pointer arithmetic: incrementing a pointer moves it by the size of the data type it points to.">
    <text x="80" y="385" font-size="13" font-weight="bold" fill="#ff9800">Pointer Arithmetic:</text>
    <rect x="60" y="395" width="680" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="80" y="418" font-size="12" fill="#424242">int *p = &amp;arr[0];  // p points to arr[0] at address 1000</text>
    <text x="80" y="438" font-size="12" fill="#424242">p++;               // p now points to arr[1] at address 1004 (+4 bytes)</text>
    <text x="80" y="458" font-size="12" fill="#424242">p += 2;            // p now points to arr[3] at address 1012 (+8 bytes)</text>
  </g>
  <g id="step7" class="step" data-narration="Pointers are essential for dynamic memory, linked lists, trees, passing by reference, and array manipulation.">
    <rect x="60" y="480" width="680" height="50" rx="8" fill="#1976d2"/>
    <text x="400" y="502" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Why Pointers Matter in Data Structures</text>
    <text x="400" y="522" text-anchor="middle" font-size="12" fill="#bbdefb">Dynamic memory | Linked lists | Trees | Graphs | Pass by reference</text>
  </g>
</svg>