<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Stack Implementation Using Arrays</text>
  <g id="step0" class="step" data-narration="Arrays provide a simple and efficient way to implement stacks with constant time operations.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Using a fixed-size array with a top index variable</text>
  </g>
  <g id="step1" class="step" data-narration="Define the stack structure with an array of fixed size MAX and an integer top initialized to negative one.">
    <rect x="50" y="80" width="700" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Stack Structure</text>
    <text x="70" y="125" font-size="12" fill="#424242">#define MAX 5</text>
    <text x="250" y="125" font-size="12" fill="#424242">struct Stack { int arr[MAX]; int top; };</text>
    <text x="600" y="125" font-size="12" fill="#1976d2">top = -1</text>
  </g>
  <g id="step2" class="step" data-narration="Push function: check for overflow first. If not full, increment top and store the value at that index.">
    <rect x="50" y="170" width="340" height="110" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">push(stack, value)</text>
    <text x="70" y="212" font-size="11" fill="#424242">void push(Stack *s, int val) {</text>
    <text x="90" y="229" font-size="11" fill="#424242">if (s->top == MAX-1)</text>
    <text x="110" y="246" font-size="11" fill="#f44336">printf("Overflow!");</text>
    <text x="90" y="263" font-size="11" fill="#424242">else s->arr[++(s->top)] = val;</text>
    <text x="70" y="275" font-size="11" fill="#424242">}</text>
  </g>
  <g id="step3" class="step" data-narration="Pop function: check for underflow first. If not empty, return the top element and decrement top.">
    <rect x="420" y="170" width="340" height="110" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">pop(stack)</text>
    <text x="440" y="212" font-size="11" fill="#424242">int pop(Stack *s) {</text>
    <text x="460" y="229" font-size="11" fill="#424242">if (s->top == -1)</text>
    <text x="480" y="246" font-size="11" fill="#f44336">printf("Underflow!");</text>
    <text x="460" y="263" font-size="11" fill="#424242">else return s->arr[(s->top)--];</text>
    <text x="440" y="275" font-size="11" fill="#424242">}</text>
  </g>
  <g id="step4" class="step" data-narration="Memory layout: array indices 0 through 4 map directly to stack positions. Top tracks the current position.">
    <text x="400" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Array Memory Layout (MAX=5):</text>
    <rect x="130" y="320" width="100" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="180" y="340" text-anchor="middle" font-size="12" fill="#388e3c">10</text>
    <text x="180" y="380" text-anchor="middle" font-size="10" fill="#616161">[0]</text>
    <rect x="230" y="320" width="100" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="280" y="340" text-anchor="middle" font-size="12" fill="#388e3c">20</text>
    <text x="280" y="380" text-anchor="middle" font-size="10" fill="#616161">[1]</text>
    <rect x="330" y="320" width="100" height="45" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="380" y="340" text-anchor="middle" font-size="12" fill="#388e3c">30</text>
    <text x="380" y="380" text-anchor="middle" font-size="10" fill="#616161">[2]</text>
    <rect x="430" y="320" width="100" height="45" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="480" y="380" text-anchor="middle" font-size="10" fill="#616161">[3]</text>
    <rect x="530" y="320" width="100" height="45" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="580" y="380" text-anchor="middle" font-size="10" fill="#616161">[4]</text>
    <text x="380" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#f44336">top=2</text>
  </g>
  <g id="step5" class="step" data-narration="Peek and isEmpty helper functions complete the stack interface without modifying the stack state.">
    <rect x="50" y="400" width="340" height="55" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Helper Functions</text>
    <text x="70" y="442" font-size="11" fill="#424242">peek(): return arr[top];  isEmpty(): return top==-1;</text>
  </g>
  <g id="step6" class="step" data-narration="Advantages: simple implementation with O of 1 operations. Limitation: fixed size may cause overflow.">
    <rect x="420" y="400" width="340" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Trade-offs</text>
    <text x="440" y="442" font-size="11" fill="#424242">Fast O(1) ops but fixed size (overflow risk)</text>
  </g>
  <g id="step7" class="step" data-narration="Array-based stacks are preferred when maximum size is known and memory efficiency is important.">
    <rect x="50" y="475" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Simple, fast O(1) - ideal when maximum stack size is predictable</text>
  </g>
</svg>