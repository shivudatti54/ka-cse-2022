<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Stacks and Queues">
    <text x="50" y="50" font-size="24" fill="#2563eb">Introduction to Stacks and Queues</text>
    <text x="50" y="80" font-size="18" fill="#10b981">Linear data structures that follow specific principles</text>
  </g>
  <g id="step1" data-narration="Stack Data Structure">
    <rect x="50" y="120" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="60" y="150" font-size="18" fill="#8b5cf6">Stack</text>
    <text x="60" y="180" font-size="14" fill="#2563eb">Last-In-First-Out (LIFO) principle</text>
    <text x="60" y="200" font-size="14" fill="#10b981">Real-world analogy: A stack of plates</text>
  </g>
  <g id="step2" data-narration="Basic Operations of Stack">
    <rect x="50" y="250" width="200" height="150" fill="#f59e0b" rx="10" />
    <text x="60" y="280" font-size="18" fill="#8b5cf6">Basic Operations</text>
    <text x="60" y="310" font-size="14" fill="#2563eb">1. Push: Add an element to the top</text>
    <text x="60" y="330" font-size="14" fill="#10b981">2. Pop: Remove and return the top element</text>
    <text x="60" y="350" font-size="14" fill="#2563eb">3. Peek/Top: Return the top element without removing it</text>
  </g>
  <g id="step3" data-narration="Queue Data Structure">
    <rect x="300" y="120" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="310" y="150" font-size="18" fill="#8b5cf6">Queue</text>
    <text x="310" y="180" font-size="14" fill="#2563eb">First-In-First-Out (FIFO) principle</text>
    <text x="310" y="200" font-size="14" fill="#10b981">Real-world analogy: A line of people waiting</text>
  </g>
  <g id="step4" data-narration="Basic Operations of Queue">
    <rect x="300" y="250" width="200" height="150" fill="#f59e0b" rx="10" />
    <text x="310" y="280" font-size="18" fill="#8b5cf6">Basic Operations</text>
    <text x="310" y="310" font-size="14" fill="#2563eb">1. Enqueue: Add an element to the rear</text>
    <text x="310" y="330" font-size="14" fill="#10b981">2. Dequeue: Remove and return the front element</text>
    <text x="310" y="350" font-size="14" fill="#2563eb">3. Front: Return the front element without removing it</text>
  </g>
  <g id="step5" data-narration="Comparison of Stack and Queue">
    <rect x="550" y="120" width="200" height="200" fill="#f59e0b" rx="10" />
    <text x="560" y="150" font-size="18" fill="#8b5cf6">Comparison</text>
    <text x="560" y="180" font-size="14" fill="#2563eb">Stack: LIFO, Last-In-First-Out</text>
    <text x="560" y="200" font-size="14" fill="#10b981">Queue: FIFO, First-In-First-Out</text>
    <text x="560" y="220" font-size="14" fill="#2563eb">Different insertion and deletion principles</text>
  </g>
  <g id="step6" data-narration="Importance of Stacks and Queues">
    <rect x="50" y="420" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="60" y="450" font-size="18" fill="#8b5cf6">Importance</text>
    <text x="60" y="470" font-size="14" fill="#2563eb">Fundamental building blocks for complex data structures</text>
    <text x="60" y="490" font-size="14" fill="#10b981">Essential for algorithm implementation and system programming</text>
  </g>
  <g id="step7" data-narration="Applications of Stacks and Queues">
    <rect x="300" y="420" width="200" height="150" fill="#f59e0b" rx="10" />
    <text x="310" y="450" font-size="18" fill="#8b5cf6">Applications</text>
    <text x="310" y="480" font-size="14" fill="#2563eb">Stacks: Function call management, expression evaluation</text>
    <text x="310" y="500" font-size="14" fill="#10b981">Queues: CPU scheduling, disk scheduling, print job scheduling</text>
  </g>
  <g id="step8" data-narration="Conclusion">
    <rect x="550" y="420" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="560" y="450" font-size="18" fill="#8b5cf6">Conclusion</text>
    <text x="560" y="470" font-size="14" fill="#2563eb">Stacks and queues are essential linear data structures</text>
    <text x="560" y="490" font-size="14" fill="#10b981">Understanding these structures is crucial for solving many programming problems</text>
  </g>
  <animate id="anim1" attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" />
  <animate id="anim2" attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="0.5s" />
  <animate id="anim3" attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1s" />
  <animate id="anim4" attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1.5s" />
  <animate id="anim5" attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="2s" />
  <animate id="anim6" attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="2.5s" />
  <animate id="anim7" attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3s" />
  <animate id="anim8" attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="3.5s" />
</svg>