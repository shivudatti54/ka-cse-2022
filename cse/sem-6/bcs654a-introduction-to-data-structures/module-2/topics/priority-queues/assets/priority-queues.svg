<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Priority Queues">
    <text x="50" y="50" font-size="24" fill="#2563eb">Priority Queues</text>
    <text x="50" y="80" font-size="18" fill="#8b5cf6">Abstract data type where each element has a priority</text>
  </g>
  <g id="step1" data-narration="Elements are served based on priority, not arrival order">
    <rect x="50" y="120" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="160" font-size="18" fill="#ffffff">High Priority</text>
    <rect x="300" y="120" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="160" font-size="18" fill="#ffffff">Low Priority</text>
    <line x1="250" y1="145" x2="280" y2="145" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="Operations: insert, extractMax/extractMin, peek, changePriority">
    <rect x="50" y="220" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="60" y="260" font-size="18" fill="#ffffff">Insert</text>
    <rect x="300" y="220" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="260" font-size="18" fill="#ffffff">Extract</text>
    <rect x="550" y="220" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="560" y="260" font-size="18" fill="#ffffff">Peek</text>
  </g>
  <g id="step3" data-narration="Implementation Options: Unsorted Array, Sorted Array, Binary Heap, Fibonacci Heap">
    <rect x="50" y="320" width="150" height="50" fill="#8b5cf6" rx="10" />
    <text x="60" y="360" font-size="18" fill="#ffffff">Unsorted Array</text>
    <rect x="250" y="320" width="150" height="50" fill="#2563eb" rx="10" />
    <text x="260" y="360" font-size="18" fill="#ffffff">Sorted Array</text>
    <rect x="450" y="320" width="150" height="50" fill="#10b981" rx="10" />
    <text x="460" y="360" font-size="18" fill="#ffffff">Binary Heap</text>
  </g>
  <g id="step4" data-narration="Applications: Dijkstra's Algorithm, Prim's MST, Huffman Coding, Job Scheduling, Event Simulation, A* Search">
    <rect x="50" y="420" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="460" font-size="18" fill="#ffffff">Dijkstra's Algorithm</text>
    <rect x="300" y="420" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="310" y="460" font-size="18" fill="#ffffff">Prim's MST</text>
    <rect x="550" y="420" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="460" font-size="18" fill="#ffffff">Huffman Coding</text>
  </g>
  <g id="step5" data-narration="Common Problems: Top K Elements, Merge K Sorted Lists, Running Median">
    <rect x="50" y="520" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="60" y="560" font-size="18" fill="#ffffff">Top K Elements</text>
    <rect x="300" y="520" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="310" y="560" font-size="18" fill="#ffffff">Merge K Sorted Lists</text>
    <rect x="550" y="520" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="560" y="560" font-size="18" fill="#ffffff">Running Median</text>
  </g>
  <g id="step6" data-narration="Exam Tip: Priority queue = heap in most cases. Know when to use min-heap vs max-heap">
    <text x="50" y="580" font-size="24" fill="#2563eb">Exam Tip</text>
    <text x="50" y="610" font-size="18" fill="#8b5cf6">Priority queue = heap in most cases</text>
  </g>
</svg>