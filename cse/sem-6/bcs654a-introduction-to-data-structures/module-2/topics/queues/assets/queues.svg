<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Queue Data Structure</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="A queue is a linear data structure following First In First Out principle. Elements enter at rear and leave from front.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">First In First Out (FIFO) - Two-ended access structure</text>
  </g>
  <g id="step1" class="step" data-narration="A queue uses two pointers: front for deletion and rear for insertion. Both start at negative one.">
    <rect x="50" y="80" width="340" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="220" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Queue Definition</text>
    <text x="70" y="122" font-size="11" fill="#424242">struct Queue {</text>
    <text x="90" y="139" font-size="11" fill="#424242">int arr[MAX]; int front, rear;</text>
    <text x="70" y="156" font-size="11" fill="#424242">}; // front = rear = -1</text>
  </g>
  <g id="step2" class="step" data-narration="Real world analogy: people in a ticket line. First person joins, first person gets served.">
    <rect x="420" y="80" width="340" height="90" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Real-World Analogy</text>
    <text x="440" y="122" font-size="11" fill="#424242">Ticket counter queue:</text>
    <text x="440" y="139" font-size="11" fill="#424242">Join at back, serve from front</text>
    <text x="440" y="156" font-size="11" fill="#ff9800">Fairness: first come, first served</text>
  </g>
  <g id="step3" class="step" data-narration="Enqueue adds an element at the rear. Rear is incremented and the value is stored at that position.">
    <text x="400" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Queue with elements: enqueue(10), enqueue(20), enqueue(30), enqueue(40)</text>
    <rect x="150" y="215" width="80" height="50" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="190" y="245" text-anchor="middle" font-size="14" fill="#388e3c">10</text>
    <rect x="230" y="215" width="80" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="270" y="245" text-anchor="middle" font-size="14" fill="#424242">20</text>
    <rect x="310" y="215" width="80" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="350" y="245" text-anchor="middle" font-size="14" fill="#424242">30</text>
    <rect x="390" y="215" width="80" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="430" y="245" text-anchor="middle" font-size="14" fill="#424242">40</text>
    <rect x="470" y="215" width="80" height="50" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="190" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">FRONT=0</text>
    <text x="430" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#f44336">REAR=3</text>
  </g>
  <g id="step4" class="step" data-narration="Dequeue removes the element at front and increments the front pointer. Element 10 is removed.">
    <rect x="50" y="310" width="340" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Enqueue (Insert at Rear)</text>
    <text x="70" y="352" font-size="11" fill="#424242">if (rear == MAX-1) overflow;</text>
    <text x="70" y="369" font-size="11" fill="#424242">else arr[++rear] = value; // O(1)</text>
  </g>
  <g id="step5" class="step" data-narration="Dequeue removes from front. If front exceeds rear, the queue is reset to empty state.">
    <rect x="420" y="310" width="340" height="75" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Dequeue (Remove from Front)</text>
    <text x="440" y="352" font-size="11" fill="#424242">if (front == -1 || front > rear) underflow;</text>
    <text x="440" y="369" font-size="11" fill="#424242">else return arr[front++]; // O(1)</text>
  </g>
  <g id="step6" class="step" data-narration="Linear queue limitation: space before front cannot be reused even after dequeue operations.">
    <rect x="50" y="405" width="700" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Linear Queue Limitation</text>
    <text x="400" y="448" text-anchor="middle" font-size="11" fill="#424242">After several dequeues, front moves forward. Space at beginning is wasted and cannot be reused.</text>
  </g>
  <g id="step7" class="step" data-narration="Queues are used in CPU scheduling, print spooling, breadth-first search, and buffering operations.">
    <rect x="50" y="475" width="700" height="40" rx="8" fill="#388e3c"/>
    <text x="400" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Applications: CPU scheduling, BFS, Print queue, IO buffering</text>
  </g>
</svg>