<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="20" fill="#2563eb" font-family="Arial" text-anchor="middle" font-weight="bold">Stack Operations</text>

  <g id="step0" class="step" data-narration="Introduction to Stack Operations">
    <rect x="40" y="60" width="720" height="45" fill="#2563eb" rx="8"/>
    <text x="400" y="83" font-size="14" font-family="Arial" fill="#ffffff" text-anchor="middle">A stack is a linear data structure that follows the Last-In-First-Out (LIFO) principle</text>
  </g>

  <g id="step1" class="step" data-narration="Push Operation">
    <rect x="40" y="115" width="235" height="45" fill="#10b981" rx="8"/>
    <text x="157" y="143" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">Push: Add to Top</text>
  </g>

  <g id="step2" class="step" data-narration="Pop Operation">
    <rect x="282" y="115" width="235" height="45" fill="#f59e0b" rx="8"/>
    <text x="400" y="143" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">Pop: Remove from Top</text>
  </g>

  <g id="step3" class="step" data-narration="Peek Operation">
    <rect x="525" y="115" width="235" height="45" fill="#8b5cf6" rx="8"/>
    <text x="642" y="143" font-size="16" font-family="Arial" fill="#ffffff" text-anchor="middle">Peek: View Top</text>
  </g>

  <g id="step4" class="step" data-narration="isEmpty Operation">
    <rect x="40" y="170" width="345" height="45" fill="#10b981" rx="8"/>
    <text x="212" y="198" font-size="15" font-family="Arial" fill="#ffffff" text-anchor="middle">isEmpty: Check if Stack is Empty</text>
  </g>

  <g id="step5" class="step" data-narration="isFull Operation">
    <rect x="415" y="170" width="345" height="45" fill="#f59e0b" rx="8"/>
    <text x="587" y="198" font-size="15" font-family="Arial" fill="#ffffff" text-anchor="middle">isFull: Check if Stack is Full</text>
  </g>

  <g id="step6" class="step" data-narration="Stack Implementation Using Arrays">
    <rect x="40" y="225" width="720" height="60" fill="#8b5cf6" rx="8"/>
    <text x="400" y="248" font-size="14" font-family="Arial" fill="#ffffff" text-anchor="middle">Array Implementation</text>
    <text x="400" y="270" font-size="12" font-family="Arial" fill="#ffffff" text-anchor="middle">Use an array to store stack elements and a variable to track the top element position</text>
  </g>

  <g id="step7" class="step" data-narration="C Implementation">
    <rect x="40" y="295" width="720" height="60" fill="#10b981" rx="8"/>
    <text x="400" y="318" font-size="14" font-family="Arial" fill="#ffffff" text-anchor="middle">C Programming Implementation</text>
    <text x="400" y="340" font-size="12" font-family="Arial" fill="#ffffff" text-anchor="middle">Use C language to implement stack operations using arrays</text>
  </g>

  <g id="step8" class="step" data-narration="Example Use Cases">
    <rect x="40" y="365" width="720" height="75" fill="#f59e0b" rx="8"/>
    <text x="400" y="390" font-size="14" font-family="Arial" fill="#ffffff" text-anchor="middle">Example Use Cases</text>
    <text x="400" y="410" font-size="11" font-family="Arial" fill="#ffffff" text-anchor="middle">Function Call Management: Tracks function calls in recursion</text>
    <text x="400" y="425" font-size="11" font-family="Arial" fill="#ffffff" text-anchor="middle">Expression Evaluation: Converts and evaluates expressions</text>
    <text x="400" y="440" font-size="11" font-family="Arial" fill="#ffffff" text-anchor="middle">Undo Mechanisms: Stores history of actions</text>
  </g>

  <g id="step9" class="step" data-narration="Conclusion">
    <rect x="40" y="450" width="720" height="60" fill="#8b5cf6" rx="8"/>
    <text x="400" y="473" font-size="14" font-family="Arial" fill="#ffffff" text-anchor="middle">Conclusion</text>
    <text x="400" y="495" font-size="12" font-family="Arial" fill="#ffffff" text-anchor="middle">Stacks are a fundamental data structure in computer science</text>
  </g>

  <g id="step10" class="step" data-narration="Final Thoughts">
    <rect x="40" y="520" width="345" height="35" fill="#2563eb" rx="8"/>
    <text x="212" y="542" font-size="12" font-family="Arial" fill="#ffffff" text-anchor="middle">Stack Operations: Essential Concept</text>
  </g>

  <g id="step11" class="step" data-narration="References">
    <rect x="415" y="520" width="345" height="35" fill="#10b981" rx="8"/>
    <text x="587" y="542" font-size="12" font-family="Arial" fill="#ffffff" text-anchor="middle">Stack Operations and Implementation</text>
  </g>

  <g id="step12" class="step" data-narration="Practice exercises">
    <rect x="40" y="565" width="720" height="28" fill="#f59e0b" rx="8"/>
    <text x="400" y="583" font-size="11" font-family="Arial" fill="#ffffff" text-anchor="middle">Practice: Implement push, pop, peek operations in your preferred language</text>
  </g>
</svg>
