<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Queue Applications">
    <text x="50" y="50" font-size="24" fill="#2563eb">Queue Applications</text>
    <text x="50" y="100" font-size="18" fill="#8b5cf6">First-In-First-Out (FIFO) principle</text>
    <rect x="50" y="150" width="100" height="50" fill="#10b981" rx="10" />
    <text x="60" y="180" font-size="18" fill="#ffffff">Queue</text>
  </g>
  <g id="step1" data-narration="Key Characteristics of Queues">
    <use href="#step0" x="0" y="0" />
    <text x="250" y="50" font-size="24" fill="#2563eb">Key Characteristics</text>
    <text x="250" y="100" font-size="18" fill="#8b5cf6">Order Preservation</text>
    <text x="250" y="150" font-size="18" fill="#8b5cf6">Temporal Fairness</text>
    <text x="250" y="200" font-size="18" fill="#8b5cf6">Buffering Capability</text>
    <text x="250" y="250" font-size="18" fill="#8b5cf6">Synchronization</text>
    <text x="250" y="300" font-size="18" fill="#8b5cf6">Temporary Storage</text>
  </g>
  <g id="step2" data-narration="Operating System Scheduling">
    <use href="#step1" x="0" y="0" />
    <text x="450" y="50" font-size="24" fill="#2563eb">Operating System Scheduling</text>
    <rect x="450" y="150" width="100" height="50" fill="#10b981" rx="10" />
    <text x="460" y="180" font-size="18" fill="#ffffff">Ready Queue</text>
    <line x1="550" y1="175" x2="650" y2="175" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="650" y="150" width="100" height="50" fill="#10b981" rx="10" />
    <text x="660" y="180" font-size="18" fill="#ffffff">CPU Scheduling</text>
  </g>
  <g id="step3" data-narration="CPU Scheduling Example">
    <use href="#step2" x="0" y="0" />
    <rect x="50" y="350" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="380" font-size="18" fill="#ffffff">New Processes</text>
    <line x1="250" y1="375" x2="350" y2="375" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
    <use href="#step2" x="0" y="0" />
  </g>
  <g id="step4" data-narration="Printer Spooling">
    <use href="#step3" x="0" y="0" />
    <text x="450" y="300" font-size="24" fill="#2563eb">Printer Spooling</text>
    <rect x="450" y="350" width="100" height="50" fill="#10b981" rx="10" />
    <text x="460" y="380" font-size="18" fill="#ffffff">Print Spooler</text>
    <line x1="550" y1="375" x2="650" y2="375" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="650" y="350" width="100" height="50" fill="#10b981" rx="10" />
    <text x="660" y="380" font-size="18" fill="#ffffff">Printer</text>
  </g>
  <g id="step5" data-narration="Network Traffic Management">
    <use href="#step4" x="0" y="0" />
    <text x="50" y="450" font-size="24" fill="#2563eb">Network Traffic Management</text>
    <rect x="50" y="500" width="100" height="50" fill="#10b981" rx="10" />
    <text x="60" y="530" font-size="18" fill="#ffffff">Network Packets</text>
    <line x1="150" y1="525" x2="250" y2="525" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="250" y="500" width="100" height="50" fill="#10b981" rx="10" />
    <text x="260" y="530" font-size="18" fill="#ffffff">Queue Buffer</text>
    <line x1="350" y1="525" x2="450" y2="525" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="450" y="500" width="100" height="50" fill="#10b981" rx="10" />
    <text x="460" y="530" font-size="18" fill="#ffffff">Transmission</text>
  </g>
  <g id="step6" data-narration="Router Packet Buffering">
    <use href="#step5" x="0" y="0" />
    <text x="550" y="450" font-size="24" fill="#2563eb">Router Packet Buffering</text>
    <rect x="550" y="500" width="100" height="50" fill="#10b981" rx="10" />
    <text x="560" y="530" font-size="18" fill="#ffffff">Router Input</text>
    <line x1="650" y1="525" x2="750" y2="525" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="750" y="500" width="100" height="50" fill="#10b981" rx="10" />
    <text x="760" y="530" font-size="18" fill="#ffffff">Queue Buffer</text>
  </g>
</svg>