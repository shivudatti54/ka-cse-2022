<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Double-Ended Queue (Deque)</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="A deque allows insertion and deletion at both front and rear ends, combining stack and queue behavior.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Insertion and deletion permitted at both ends of the structure</text>
  </g>
  <g id="step1" class="step" data-narration="Deque supports four operations: insertFront, insertRear, deleteFront, and deleteRear.">
    <rect x="50" y="80" width="700" height="70" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Four Operations of Deque</text>
    <text x="130" y="128" text-anchor="middle" font-size="11" fill="#424242">insertFront()</text>
    <text x="310" y="128" text-anchor="middle" font-size="11" fill="#424242">insertRear()</text>
    <text x="490" y="128" text-anchor="middle" font-size="11" fill="#424242">deleteFront()</text>
    <text x="670" y="128" text-anchor="middle" font-size="11" fill="#424242">deleteRear()</text>
  </g>
  <g id="step2" class="step" data-narration="Visualizing a deque: arrows show that elements can enter and exit from both the front and rear.">
    <text x="400" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Deque Visualization:</text>
    <text x="80" y="215" text-anchor="middle" font-size="11" fill="#388e3c">insert</text>
    <text x="80" y="235" text-anchor="middle" font-size="11" fill="#f44336">delete</text>
    <rect x="140" y="200" width="70" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="175" y="228" text-anchor="middle" font-size="13">10</text>
    <rect x="210" y="200" width="70" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="245" y="228" text-anchor="middle" font-size="13">20</text>
    <rect x="280" y="200" width="70" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="315" y="228" text-anchor="middle" font-size="13">30</text>
    <rect x="350" y="200" width="70" height="45" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="385" y="228" text-anchor="middle" font-size="13">40</text>
    <text x="480" y="215" text-anchor="middle" font-size="11" fill="#388e3c">insert</text>
    <text x="480" y="235" text-anchor="middle" font-size="11" fill="#f44336">delete</text>
    <text x="175" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">FRONT</text>
    <text x="385" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#f44336">REAR</text>
  </g>
  <g id="step3" class="step" data-narration="Input-restricted deque: insertion only at rear, but deletion allowed from both front and rear ends.">
    <rect x="50" y="285" width="340" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Input-Restricted Deque</text>
    <text x="70" y="327" font-size="11" fill="#424242">Insert: rear only</text>
    <text x="70" y="344" font-size="11" fill="#424242">Delete: both front and rear</text>
    <text x="70" y="358" font-size="11" fill="#1976d2">Acts like a queue with rear delete</text>
  </g>
  <g id="step4" class="step" data-narration="Output-restricted deque: deletion only from front, but insertion allowed at both front and rear.">
    <rect x="420" y="285" width="340" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Output-Restricted Deque</text>
    <text x="440" y="327" font-size="11" fill="#424242">Insert: both front and rear</text>
    <text x="440" y="344" font-size="11" fill="#424242">Delete: front only</text>
    <text x="440" y="358" font-size="11" fill="#388e3c">Acts like a queue with front insert</text>
  </g>
  <g id="step5" class="step" data-narration="A deque can function as both a stack and a queue by restricting which end is used for operations.">
    <rect x="50" y="385" width="700" height="55" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Deque Versatility</text>
    <text x="70" y="427" font-size="11" fill="#424242">As Stack: use only one end (front or rear)</text>
    <text x="420" y="427" font-size="11" fill="#424242">As Queue: insert rear, delete front</text>
  </g>
  <g id="step6" class="step" data-narration="Implementation uses circular array with modular arithmetic for both front decrement and rear increment.">
    <rect x="50" y="455" width="340" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="475" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Implementation</text>
    <text x="70" y="497" font-size="11" fill="#424242">Circular array with front and rear modulo</text>
  </g>
  <g id="step7" class="step" data-narration="Deques are used in job scheduling, browser history, and undo operations where both-end access is needed.">
    <rect x="50" y="525" width="700" height="40" rx="8" fill="#ff9800"/>
    <text x="400" y="550" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Deque: Most flexible queue - used in scheduling, palindrome checking, sliding window</text>
  </g>
</svg>