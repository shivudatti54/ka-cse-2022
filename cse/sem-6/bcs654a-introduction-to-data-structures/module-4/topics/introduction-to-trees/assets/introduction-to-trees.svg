<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e3f2fd"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ab47bc"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .tree-edge {
      stroke-dasharray: 1000;
      animation: drawLine 1.5s ease-out forwards;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bgGrad)"/>

  <!-- Step 0: Title Card -->
  <g class="step" id="step0" data-narration="Welcome to Trees! Today we'll explore this hierarchical data structure that enables efficient searching and represents relationships naturally.">
    <rect x="50" y="10" width="700" height="45" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Introduction to Trees</text>
  </g>

  <!-- Step 1: What is a Tree -->
  <g class="step" id="step1" data-narration="A tree is a hierarchical, non-linear data structure with nodes connected by edges. One node is the root, and every node has exactly one path from root.">
    <rect x="50" y="65" width="340" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="65" width="340" height="22" rx="8" fill="url(#greenGrad)"/>
    <text x="70" y="80" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">What is a Tree?</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-size="9" fill="#333">• Hierarchical, non-linear structure</text>
    <text x="70" y="120" font-family="Arial, sans-serif" font-size="9" fill="#333">• Nodes connected by edges</text>
    <text x="70" y="135" font-family="Arial, sans-serif" font-size="9" fill="#333">• One root, unique path to any node</text>
  </g>

  <!-- Step 2: Why Trees -->
  <g class="step" id="step2" data-narration="Linear structures like arrays have O(n) search time. Trees provide O(log n) operations when balanced, plus natural hierarchical representation.">
    <rect x="410" y="65" width="340" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="410" y="65" width="340" height="22" rx="8" fill="url(#orangeGrad)"/>
    <text x="430" y="80" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Why Trees?</text>
    <text x="430" y="105" font-family="Arial, sans-serif" font-size="9" fill="#333">• Efficient O(log n) search</text>
    <text x="430" y="120" font-family="Arial, sans-serif" font-size="9" fill="#333">• Natural hierarchical representation</text>
    <text x="430" y="135" font-family="Arial, sans-serif" font-size="9" fill="#333">• Maintains sorted data (BST)</text>
  </g>

  <!-- Step 3: Tree Structure Diagram with All Terminology -->
  <g class="step" id="step3" data-narration="Here's our example tree with root A. B and C are children of A. D, E are children of B. F is child of C. D, E, F are leaves.">
    <rect x="50" y="160" width="700" height="180" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="160" width="700" height="22" rx="8" fill="url(#purpleGrad)"/>
    <text x="70" y="175" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Binary Tree Structure &amp; Terminology</text>
    
    <!-- Tree Edges -->
    <path class="tree-edge" d="M400,220 L280,270" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <path class="tree-edge" d="M400,220 L520,270" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <path class="tree-edge" d="M280,270 L180,320" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <path class="tree-edge" d="M280,270 L380,320" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <path class="tree-edge" d="M520,270 L620,320" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <!-- Tree Nodes -->
    <circle cx="400" cy="210" r="25" fill="#388e3c" filter="url(#shadow)"/>
    <text x="400" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">A</text>
    
    <circle cx="280" cy="260" r="25" fill="#1976d2" filter="url(#shadow)"/>
    <text x="280" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">B</text>
    
    <circle cx="520" cy="260" r="25" fill="#1976d2" filter="url(#shadow)"/>
    <text x="520" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">C</text>
    
    <circle cx="180" cy="310" r="25" fill="#f57c00" filter="url(#shadow)"/>
    <text x="180" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">D</text>
    
    <circle cx="380" cy="310" r="25" fill="#f57c00" filter="url(#shadow)"/>
    <text x="380" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">E</text>
    
    <circle cx="620" cy="310" r="25" fill="#f57c00" filter="url(#shadow)"/>
    <text x="620" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">F</text>
    
    <!-- Labels -->
    <rect x="560" y="190" width="170" height="130" rx="5" fill="#f8f9fa" stroke="#ddd"/>
    <text x="570" y="210" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1976d2">Terminology</text>
    <text x="570" y="228" font-family="Arial, sans-serif" font-size="8" fill="#333">Root: A (no parent)</text>
    <text x="570" y="243" font-family="Arial, sans-serif" font-size="8" fill="#333">Parent: B, C (have children)</text>
    <text x="570" y="258" font-family="Arial, sans-serif" font-size="8" fill="#333">Children: B, C of A</text>
    <text x="570" y="273" font-family="Arial, sans-serif" font-size="8" fill="#333">Siblings: B and C</text>
    <text x="570" y="288" font-family="Arial, sans-serif" font-size="8" fill="#333">Leaves: D, E, F</text>
    <text x="570" y="303" font-family="Arial, sans-serif" font-size="8" fill="#333">Internal: A, B, C</text>
  </g>

  <!-- Step 4: Level, Depth, Height -->
  <g class="step" id="step4" data-narration="Level measures distance from root (root at level 0). Depth is edges from root to node. Height is longest path from node to leaf.">
    <rect x="50" y="350" width="700" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="350" width="700" height="22" rx="8" fill="url(#blueGrad)"/>
    <text x="70" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Level, Depth &amp; Height</text>
    
    <!-- Level indicators -->
    <text x="100" y="395" font-family="Arial, sans-serif" font-size="10" fill="#388e3c" font-weight="bold">Level 0:</text>
    <text x="160" y="395" font-family="Arial, sans-serif" font-size="10" fill="#333">A</text>
    
    <text x="100" y="415" font-family="Arial, sans-serif" font-size="10" fill="#1976d2" font-weight="bold">Level 1:</text>
    <text x="160" y="415" font-family="Arial, sans-serif" font-size="10" fill="#333">B, C</text>
    
    <text x="100" y="435" font-family="Arial, sans-serif" font-size="10" fill="#f57c00" font-weight="bold">Level 2:</text>
    <text x="160" y="435" font-family="Arial, sans-serif" font-size="10" fill="#333">D, E, F</text>
    
    <!-- Path, Depth, Height explanation -->
    <rect x="280" y="380" width="200" height="50" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="380" y="400" font-family="Arial, sans-serif" font-size="9" fill="#388e3c" font-weight="bold" text-anchor="middle">Path A→B→E</text>
    <text x="380" y="418" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">A to E has 2 edges</text>
    
    <rect x="500" y="380" width="230" height="50" rx="5" fill="#fff3e0" stroke="#f57c00"/>
    <text x="615" y="400" font-family="Arial, sans-serif" font-size="9" fill="#f57c00" font-weight="bold" text-anchor="middle">Height of Tree = 2</text>
    <text x="615" y="418" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Longest path: A→B→D (2 edges)</text>
  </g>

  <!-- Step 5: Types of Binary Trees -->
  <g class="step" id="step5" data-narration="Key types: Binary (max 2 children), Full (0 or 2 children), Complete (filled left-to-right), Perfect (all leaves same level).">
    <rect x="50" y="450" width="700" height="120" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="450" width="700" height="22" rx="8" fill="url(#greenGrad)"/>
    <text x="70" y="465" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Types of Binary Trees</text>
    
    <!-- Binary Tree -->
    <rect x="60" y="480" width="165" height="80" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="142" y="500" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1976d2" text-anchor="middle">Binary Tree</text>
    <text x="142" y="520" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Max 2 children</text>
    <text x="142" y="535" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Left &amp; Right</text>
    <text x="142" y="550" font-family="Arial, sans-serif" font-size="7" fill="#666" text-anchor="middle">(Most common)</text>
    
    <!-- Full Binary Tree -->
    <rect x="235" y="480" width="165" height="80" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="317" y="500" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#388e3c" text-anchor="middle">Full Binary Tree</text>
    <text x="317" y="520" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Each node has</text>
    <text x="317" y="535" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">0 or 2 children</text>
    
    <!-- Complete Binary Tree -->
    <rect x="410" y="480" width="165" height="80" rx="5" fill="#fff3e0" stroke="#f57c00"/>
    <text x="492" y="500" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f57c00" text-anchor="middle">Complete BT</text>
    <text x="492" y="520" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">All levels filled</text>
    <text x="492" y="535" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">except last (left)</text>
    
    <!-- Perfect Binary Tree -->
    <rect x="585" y="480" width="165" height="80" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="667" y="500" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#9c27b0" text-anchor="middle">Perfect BT</text>
    <text x="667" y="520" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">All internal nodes</text>
    <text x="667" y="535" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">have 2 children</text>
  </g>

  <!-- Step 6: Tree Properties & Formulas -->
  <g class="step" id="step6" data-narration="Important formulas: Max nodes at level L is 2^L. Max nodes in tree height h is 2^(h+1) - 1. Tree with n nodes has n-1 edges.">
    <rect x="50" y="580" width="700" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="580" width="700" height="22" rx="8" fill="url(#orangeGrad)"/>
    <text x="70" y="595" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Properties &amp; Formulas</text>
    
    <!-- Formula boxes -->
    <rect x="60" y="610" width="210" height="50" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="165" y="630" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1976d2" text-anchor="middle">Max Nodes at Level L</text>
    <text x="165" y="650" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">2<tspan baseline-shift="super" font-size="8">L</tspan></text>
    
    <rect x="280" y="610" width="210" height="50" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="385" y="630" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#388e3c" text-anchor="middle">Max Nodes (Height h)</text>
    <text x="385" y="650" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">2<tspan baseline-shift="super" font-size="8">h+1</tspan> - 1</text>
    
    <rect x="500" y="610" width="240" height="50" rx="5" fill="#fff3e0" stroke="#f57c00"/>
    <text x="620" y="630" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f57c00" text-anchor="middle">Number of Edges</text>
    <text x="620" y="650" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">n - 1 (where n = nodes)</text>
  </g>

  <!-- Step 7: Node Structure (Code) -->
  <g class="step" id="step7" data-narration="A binary tree node contains data, left pointer, and right pointer. We create nodes dynamically using malloc in C.">
    <rect x="50" y="680" width="700" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="680" width="700" height="22" rx="8" fill="url(#purpleGrad)"/>
    <text x="70" y="695" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Binary Tree Node Structure</text>
    
    <!-- Code representation -->
    <rect x="60" y="710" width="320" height="45" rx="5" fill="#263238"/>
    <text x="70" y="728" font-family="Courier New, monospace" font-size="9" fill="#ffeb3b">struct Node {</text>
    <text x="80" y="743" font-family="Courier New, monospace" font-size="9" fill="#ce93d8">  int data;</text>
    <text x="80" y="758" font-family="Courier New, monospace" font-size="9" fill="#4fc3f7">  struct Node* left;</text>
    <text x="80" y="773" font-family="Courier New, monospace" font-size="9" fill="#4fc3f7">  struct Node* right;</text>
    <text x="70" y="788" font-family="Courier New, monospace" font-size="9" fill="#ffeb3b">};</text>
    
    <!-- Visual node representation -->
    <rect x="420" y="715" width="100" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="470" y="735" font-family="Arial, sans-serif" font-size="9" fill="#1976d2" text-anchor="middle">Node Structure</text>
    <text x="470" y="750" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">data | left | right</text>
    
    <!-- Arrow from code to structure -->
    <path d="M385,735 L415,735" stroke="#666" stroke-width="1" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Step 8: Applications -->
  <g class="step" id="step8" data-narration="Trees power many applications: file systems, database indexing with B-trees, compilers use syntax trees, AI uses decision trees, DOM for web pages.">
    <rect x="50" y="775" width="700" height="70" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="775" width="700" height="22" rx="8" fill="url(#redGrad)"/>
    <text x="70" y="790" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Applications of Trees</text>
    
    <text x="80" y="820" font-family="Arial, sans-serif" font-size="9" fill="#333">📁 File Systems</text>
    <text x="170" y="820" font-family="Arial, sans-serif" font-size="9" fill="#333">🗄️ Databases (B-Trees)</text>
    <text x="310" y="820" font-family="Arial, sans-serif" font-size="9" fill="#333">⚙️ Compilers (Syntax)</text>
    <text x="430" y="820" font-family="Arial, sans-serif" font-size="9" fill="#333">🤖 AI (Decision Trees)</text>
    <text x="560" y="820" font-family="Arial, sans-serif" font-size="9" fill="#333">🌐 Web (DOM)</text>
    <text x="660" y="820" font-family="Arial, sans-serif" font-size="9" fill="#333">📡 Routing</text>
  </g>

  <!-- Step 9: Summary -->
  <g class="step" id="step9" data-narration="In summary: Trees are hierarchical structures with root, leaves, internal nodes. Types include binary, full, complete, perfect. Use formulas to calculate nodes and height.">
    <rect x="50" y="855" width="700" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="880" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Key Takeaways</text>
    
    <text x="100" y="910" font-family="Arial, sans-serif" font-size="10" fill="white">✓ Hierarchical, non-linear structure</text>
    <text x="100" y="930" font-family="Arial, sans-serif" font-size="10" fill="white">✓ Root, parent, child, leaf, sibling terms</text>
    <text x="350" y="910" font-family="Arial, sans-serif" font-size="10" fill="white">✓ Binary tree: max 2 children</text>
    <text x="350" y="930" font-family="Arial, sans-serif" font-size="10" fill="white">✓ Full, Complete, Perfect types</text>
    <text x="600" y="910" font-family="Arial, sans-serif" font-size="10" fill="white">✓ Properties: 2^L nodes/level</text>
    <text x="600" y="930" font-family="Arial, sans-serif" font-size="10" fill="white">✓ Applications: Files, DBs, AI</text>
  </g>
</svg>