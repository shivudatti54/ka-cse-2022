<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="20" fill="#2563eb" text-anchor="middle" font-weight="bold">Tree Data Structure - Basic Concepts</text>

  <g id="step0" class="step" data-narration="Introduction to the concept of a tree in data structures">
    <rect x="40" y="60" width="720" height="50" fill="#2563eb" rx="8"/>
    <text x="400" y="83" font-size="15" fill="#ffffff" text-anchor="middle">Tree Data Structure</text>
    <text x="400" y="100" font-size="12" fill="#ffffff" text-anchor="middle">A hierarchical, non-linear data structure consisting of nodes connected by edges</text>
  </g>

  <g id="step1" class="step" data-narration="Definition of a tree, including the root node and subtrees">
    <rect x="40" y="120" width="345" height="85" fill="#10b981" rx="8"/>
    <text x="212" y="140" font-size="13" fill="#ffffff" text-anchor="middle">Tree Definition</text>
    <circle cx="212" cy="165" r="12" fill="#ffffff"/>
    <text x="212" y="170" font-size="10" fill="#10b981" text-anchor="middle">Root</text>
    <line x1="212" y1="177" x2="180" y2="195" stroke="#ffffff" stroke-width="2"/>
    <line x1="212" y1="177" x2="244" y2="195" stroke="#ffffff" stroke-width="2"/>
    <circle cx="180" cy="195" r="10" fill="#ffffff"/>
    <circle cx="244" cy="195" r="10" fill="#ffffff"/>
    <text x="212" y="218" font-size="9" fill="#ffffff" text-anchor="middle">Subtree 1 | Subtree 2</text>
  </g>

  <g id="step2" class="step" data-narration="Tree terminology, including nodes, edges, and parent-child relationships">
    <rect x="415" y="120" width="345" height="85" fill="#f59e0b" rx="8"/>
    <text x="587" y="140" font-size="13" fill="#ffffff" text-anchor="middle">Parent-Child Relationships</text>
    <circle cx="587" cy="162" r="12" fill="#ffffff"/>
    <text x="587" y="167" font-size="9" fill="#f59e0b" text-anchor="middle">A</text>
    <line x1="587" y1="174" x2="560" y2="192" stroke="#ffffff" stroke-width="2"/>
    <line x1="587" y1="174" x2="614" y2="192" stroke="#ffffff" stroke-width="2"/>
    <circle cx="560" cy="192" r="10" fill="#ffffff"/>
    <text x="560" y="197" font-size="9" fill="#f59e0b" text-anchor="middle">B</text>
    <circle cx="614" cy="192" r="10" fill="#ffffff"/>
    <text x="614" y="197" font-size="9" fill="#f59e0b" text-anchor="middle">C</text>
    <text x="587" y="218" font-size="9" fill="#ffffff" text-anchor="middle">Parent A → Children B, C</text>
  </g>

  <g id="step3" class="step" data-narration="Tree terminology, including siblings, leaf nodes, and internal nodes">
    <rect x="40" y="215" width="720" height="70" fill="#8b5cf6" rx="8"/>
    <text x="400" y="235" font-size="13" fill="#ffffff" text-anchor="middle">Node Types</text>
    <text x="150" y="255" font-size="11" fill="#ffffff">Siblings: Nodes with same parent</text>
    <text x="150" y="270" font-size="11" fill="#ffffff">Leaf Node: No children (terminal)</text>
    <text x="450" y="255" font-size="11" fill="#ffffff">Internal Node: Has children</text>
    <text x="450" y="270" font-size="11" fill="#ffffff">Root: Top node, no parent</text>
  </g>

  <g id="step4" class="step" data-narration="Tree levels and depth, including the root node and subsequent levels">
    <rect x="40" y="295" width="345" height="90" fill="#10b981" rx="8"/>
    <text x="212" y="315" font-size="13" fill="#ffffff" text-anchor="middle">Tree Levels and Depth</text>
    <circle cx="212" cy="338" r="10" fill="#ffffff"/>
    <text x="212" y="343" font-size="8" fill="#10b981" text-anchor="middle">L0</text>
    <line x1="212" y1="348" x2="185" y2="365" stroke="#ffffff" stroke-width="1"/>
    <line x1="212" y1="348" x2="239" y2="365" stroke="#ffffff" stroke-width="1"/>
    <circle cx="185" cy="365" r="8" fill="#ffffff"/>
    <text x="185" y="369" font-size="8" fill="#10b981" text-anchor="middle">L1</text>
    <circle cx="239" cy="365" r="8" fill="#ffffff"/>
    <text x="239" y="369" font-size="8" fill="#10b981" text-anchor="middle">L1</text>
    <text x="212" y="382" font-size="9" fill="#ffffff" text-anchor="middle">Level 0 (root), Level 1, Level 2...</text>
  </g>

  <g id="step5" class="step" data-narration="Tree depth, including the number of edges from the root node to a given node">
    <rect x="415" y="295" width="345" height="90" fill="#f59e0b" rx="8"/>
    <text x="587" y="315" font-size="13" fill="#ffffff" text-anchor="middle">Depth and Height</text>
    <text x="587" y="335" font-size="11" fill="#ffffff" text-anchor="middle">Depth: Edges from root to node</text>
    <text x="587" y="351" font-size="11" fill="#ffffff" text-anchor="middle">Height: Max depth of tree</text>
    <text x="587" y="367" font-size="10" fill="#ffffff" text-anchor="middle">Root depth = 0</text>
    <text x="587" y="380" font-size="10" fill="#ffffff" text-anchor="middle">Leaf height = 0</text>
  </g>

  <g id="step6" class="step" data-narration="Tree ancestors and descendants, including the path from the root node to a given node">
    <rect x="40" y="395" width="345" height="70" fill="#2563eb" rx="8"/>
    <text x="212" y="415" font-size="13" fill="#ffffff" text-anchor="middle">Ancestors and Descendants</text>
    <text x="212" y="435" font-size="11" fill="#ffffff" text-anchor="middle">Ancestors: All nodes on path to root</text>
    <text x="212" y="451" font-size="11" fill="#ffffff" text-anchor="middle">Descendants: All nodes in subtree</text>
  </g>

  <g id="step7" class="step" data-narration="Tree paths, including the sequence of nodes and edges connecting two nodes">
    <rect x="415" y="395" width="345" height="70" fill="#10b981" rx="8"/>
    <text x="587" y="415" font-size="13" fill="#ffffff" text-anchor="middle">Tree Paths</text>
    <text x="587" y="435" font-size="11" fill="#ffffff" text-anchor="middle">Path: Sequence of nodes and edges</text>
    <text x="587" y="451" font-size="11" fill="#ffffff" text-anchor="middle">connecting two nodes</text>
  </g>

  <g id="step8" class="step" data-narration="Why trees are useful in computer science, including hierarchical representation and efficient operations">
    <rect x="40" y="475" width="345" height="55" fill="#f59e0b" rx="8"/>
    <text x="212" y="493" font-size="12" fill="#ffffff" text-anchor="middle">Why Trees are Useful</text>
    <text x="212" y="508" font-size="9" fill="#ffffff" text-anchor="middle">Hierarchical data, Efficient search,</text>
    <text x="212" y="520" font-size="9" fill="#ffffff" text-anchor="middle">Sorted data, Flexible structure</text>
  </g>

  <g id="step9" class="step" data-narration="Real-world applications of trees, including file systems, databases, and compilers">
    <rect x="415" y="475" width="345" height="55" fill="#8b5cf6" rx="8"/>
    <text x="587" y="493" font-size="12" fill="#ffffff" text-anchor="middle">Real-World Applications</text>
    <text x="587" y="508" font-size="9" fill="#ffffff" text-anchor="middle">File Systems, Databases, Compilers,</text>
    <text x="587" y="520" font-size="9" fill="#ffffff" text-anchor="middle">XML/HTML, Decision Trees</text>
  </g>

  <g id="step10" class="step" data-narration="Conclusion, including a summary of key concepts and the importance of trees in computer science">
    <rect x="40" y="540" width="345" height="50" fill="#10b981" rx="8"/>
    <text x="212" y="560" font-size="11" fill="#ffffff" text-anchor="middle">Trees: Fundamental Data Structure</text>
    <text x="212" y="578" font-size="9" fill="#ffffff" text-anchor="middle">Essential for hierarchical data</text>
  </g>

  <g id="step11" class="step" data-narration="Final thoughts, including the versatility and power of trees in solving complex problems">
    <rect x="415" y="540" width="345" height="50" fill="#2563eb" rx="8"/>
    <text x="587" y="560" font-size="11" fill="#ffffff" text-anchor="middle">Versatile and Powerful</text>
    <text x="587" y="578" font-size="9" fill="#ffffff" text-anchor="middle">Solving complex problems efficiently</text>
  </g>
</svg>
