<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Insertion, Traversals, Searching &amp; Copying</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Building a BST step by step with insertion, then exploring it with traversals, searching for keys, and making a copy.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Complete walkthrough of core BST operations</text>
  </g>
  <g id="step1" class="step" data-narration="Insert sequence 50, 30, 70, 20, 40. Start with 50 as root. 30 less than 50 goes left. 70 greater goes right.">
    <rect x="50" y="75" width="700" height="35" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Insertion Order: 50, 30, 70, 20, 40 (each compared from root down)</text>
  </g>
  <g id="step2" class="step" data-narration="Building step by step: 50 becomes root. 30 goes left of 50. 70 goes right. 20 goes left of 30. 40 goes right of 30.">
    <text x="100" y="130" font-size="11" fill="#424242">Step 1:</text>
    <circle cx="100" cy="150" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="100" y="155" text-anchor="middle" font-size="9">50</text>
    <text x="200" y="130" font-size="11" fill="#424242">Step 2:</text>
    <circle cx="210" cy="150" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="210" y="155" text-anchor="middle" font-size="9">50</text>
    <line x1="201" y1="161" x2="185" y2="176" stroke="#424242" stroke-width="1"/>
    <circle cx="180" cy="185" r="12" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="180" y="190" text-anchor="middle" font-size="9">30</text>
    <text x="330" y="130" font-size="11" fill="#424242">Step 3:</text>
    <circle cx="345" cy="150" r="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="345" y="155" text-anchor="middle" font-size="9">50</text>
    <line x1="336" y1="161" x2="318" y2="176" stroke="#424242" stroke-width="1"/>
    <line x1="354" y1="161" x2="372" y2="176" stroke="#424242" stroke-width="1"/>
    <circle cx="315" cy="185" r="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="315" y="190" text-anchor="middle" font-size="9">30</text>
    <circle cx="375" cy="185" r="12" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="375" y="190" text-anchor="middle" font-size="9">70</text>
    <text x="480" y="130" font-size="11" fill="#424242">Final tree:</text>
    <circle cx="530" cy="150" r="14" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="530" y="155" text-anchor="middle" font-size="10">50</text>
    <line x1="519" y1="162" x2="490" y2="182" stroke="#424242" stroke-width="1.5"/>
    <line x1="541" y1="162" x2="570" y2="182" stroke="#424242" stroke-width="1.5"/>
    <circle cx="490" cy="195" r="14" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="490" y="200" text-anchor="middle" font-size="10">30</text>
    <circle cx="570" cy="195" r="14" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="570" y="200" text-anchor="middle" font-size="10">70</text>
    <line x1="480" y1="208" x2="460" y2="225" stroke="#424242" stroke-width="1"/>
    <line x1="500" y1="208" x2="520" y2="225" stroke="#424242" stroke-width="1"/>
    <circle cx="460" cy="238" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="460" y="243" text-anchor="middle" font-size="10">20</text>
    <circle cx="520" cy="238" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="520" y="243" text-anchor="middle" font-size="10">40</text>
  </g>
  <g id="step3" class="step" data-narration="Three traversals of this tree. Inorder: 20 30 40 50 70. Preorder: 50 30 20 40 70. Postorder: 20 40 30 70 50.">
    <rect x="50" y="265" width="220" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="160" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Inorder (L-N-R)</text>
    <text x="70" y="305" font-size="12" fill="#424242" font-weight="bold">20, 30, 40, 50, 70</text>
    <rect x="290" y="265" width="220" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Preorder (N-L-R)</text>
    <text x="310" y="305" font-size="12" fill="#424242" font-weight="bold">50, 30, 20, 40, 70</text>
    <rect x="530" y="265" width="220" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="640" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Postorder (L-R-N)</text>
    <text x="550" y="305" font-size="12" fill="#424242" font-weight="bold">20, 40, 30, 70, 50</text>
  </g>
  <g id="step4" class="step" data-narration="Search for 40: compare with 50 go left, compare with 30 go right, found 40. Three comparisons needed.">
    <rect x="50" y="335" width="340" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Search(40): Path Traced</text>
    <text x="70" y="377" font-size="11" fill="#424242">50(go L) -> 30(go R) -> 40 FOUND</text>
    <text x="70" y="397" font-size="11" fill="#9c27b0">3 comparisons = O(log 5) = O(h)</text>
  </g>
  <g id="step5" class="step" data-narration="Search for 25: compare with 50 go left, compare with 30 go left, compare with 20 go right, NULL reached, not found.">
    <rect x="420" y="335" width="340" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Search(25): Not Found</text>
    <text x="440" y="377" font-size="11" fill="#424242">50(L) -> 30(L) -> 20(R) -> NULL</text>
    <text x="440" y="397" font-size="11" fill="#f44336">Reached NULL = key not in tree</text>
  </g>
  <g id="step6" class="step" data-narration="Copy tree: create new root with same data, recursively copy left subtree, recursively copy right subtree. Deep copy in O of n.">
    <rect x="50" y="420" width="700" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="440" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Copy Tree (Deep Clone)</text>
    <text x="70" y="462" font-size="11" fill="#424242">Node* copy(Node* t) { if(!t) return NULL; Node* n = new Node(t->data);</text>
    <text x="70" y="476" font-size="11" fill="#424242">n->left = copy(t->left); n->right = copy(t->right); return n; } // O(n)</text>
  </g>
  <g id="step7" class="step" data-narration="Insertion always adds at leaf position. Traversals visit all nodes. Search follows one path. Copy creates independent duplicate.">
    <rect x="50" y="495" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="520" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Insert: O(h) | Traverse: O(n) | Search: O(h) | Copy: O(n)</text>
  </g>
</svg>