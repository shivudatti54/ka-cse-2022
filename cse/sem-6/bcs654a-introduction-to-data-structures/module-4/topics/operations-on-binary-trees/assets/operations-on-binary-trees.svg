<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Operations on Binary Trees</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Key binary tree operations include three traversals, counting nodes, finding height, and copying a tree.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Traversal, counting, height computation, and tree copying</text>
  </g>
  <g id="step1" class="step" data-narration="Inorder traversal visits left subtree, then root, then right subtree. For this tree the result is 20, 30, 40, 50, 60, 70.">
    <rect x="50" y="80" width="220" height="110" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="160" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Inorder (L-N-R)</text>
    <text x="70" y="120" font-size="11" fill="#424242">void inorder(Node *t) {</text>
    <text x="80" y="137" font-size="11" fill="#424242">if(t) {</text>
    <text x="90" y="154" font-size="11" fill="#1976d2">inorder(t->left);</text>
    <text x="90" y="168" font-size="11" fill="#f44336">print(t->data);</text>
    <text x="90" y="182" font-size="11" fill="#1976d2">inorder(t->right);</text>
    <text x="80" y="186" font-size="11" fill="#424242">}}</text>
  </g>
  <g id="step2" class="step" data-narration="Preorder traversal visits root first, then left subtree, then right subtree. Result: 50, 30, 20, 40, 70, 60.">
    <rect x="290" y="80" width="220" height="110" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Preorder (N-L-R)</text>
    <text x="310" y="120" font-size="11" fill="#424242">void preorder(Node *t) {</text>
    <text x="320" y="137" font-size="11" fill="#424242">if(t) {</text>
    <text x="330" y="154" font-size="11" fill="#f44336">print(t->data);</text>
    <text x="330" y="168" font-size="11" fill="#388e3c">preorder(t->left);</text>
    <text x="330" y="182" font-size="11" fill="#388e3c">preorder(t->right);</text>
    <text x="320" y="186" font-size="11" fill="#424242">}}</text>
  </g>
  <g id="step3" class="step" data-narration="Postorder traversal visits left subtree, then right subtree, then root last. Result: 20, 40, 30, 60, 70, 50.">
    <rect x="530" y="80" width="220" height="110" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="640" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Postorder (L-R-N)</text>
    <text x="550" y="120" font-size="11" fill="#424242">void postorder(Node *t) {</text>
    <text x="560" y="137" font-size="11" fill="#424242">if(t) {</text>
    <text x="570" y="154" font-size="11" fill="#ff9800">postorder(t->left);</text>
    <text x="570" y="168" font-size="11" fill="#ff9800">postorder(t->right);</text>
    <text x="570" y="182" font-size="11" fill="#f44336">print(t->data);</text>
    <text x="560" y="186" font-size="11" fill="#424242">}}</text>
  </g>
  <g id="step4" class="step" data-narration="Example tree for traversal: root 50, left child 30 with children 20 and 40, right child 70 with child 60.">
    <circle cx="400" cy="230" r="20" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="236" text-anchor="middle" font-size="12" font-weight="bold">50</text>
    <line x1="384" y1="247" x2="310" y2="278" stroke="#424242" stroke-width="2"/>
    <line x1="416" y1="247" x2="490" y2="278" stroke="#424242" stroke-width="2"/>
    <circle cx="310" cy="295" r="20" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="310" y="301" text-anchor="middle" font-size="12">30</text>
    <circle cx="490" cy="295" r="20" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="490" y="301" text-anchor="middle" font-size="12">70</text>
    <line x1="295" y1="312" x2="255" y2="340" stroke="#424242" stroke-width="1.5"/>
    <line x1="325" y1="312" x2="365" y2="340" stroke="#424242" stroke-width="1.5"/>
    <line x1="477" y1="312" x2="445" y2="340" stroke="#424242" stroke-width="1.5"/>
    <circle cx="255" cy="355" r="18" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="255" y="361" text-anchor="middle" font-size="11">20</text>
    <circle cx="365" cy="355" r="18" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="365" y="361" text-anchor="middle" font-size="11">40</text>
    <circle cx="445" cy="355" r="18" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="445" y="361" text-anchor="middle" font-size="11">60</text>
    <text x="550" y="310" font-size="11" fill="#1976d2">In: 20,30,40,50,60,70</text>
    <text x="550" y="330" font-size="11" fill="#388e3c">Pre: 50,30,20,40,70,60</text>
    <text x="550" y="350" font-size="11" fill="#ff9800">Post: 20,40,30,60,70,50</text>
  </g>
  <g id="step5" class="step" data-narration="Count nodes: recursively count left, right, and add 1 for current. Height: max of left height and right height plus 1.">
    <rect x="50" y="390" width="340" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Count Nodes</text>
    <text x="70" y="430" font-size="11" fill="#424242">count(t) = count(left) +</text>
    <text x="70" y="447" font-size="11" fill="#424242">  count(right) + 1</text>
    <text x="70" y="455" font-size="11" fill="#9c27b0">Base: if(t==NULL) return 0;</text>
  </g>
  <g id="step6" class="step" data-narration="Copy tree: create a new node, recursively copy left subtree and right subtree. Returns a deep copy of the entire tree.">
    <rect x="420" y="390" width="340" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Height &amp; Copy</text>
    <text x="440" y="430" font-size="11" fill="#424242">height = 1 + max(h_left, h_right)</text>
    <text x="440" y="447" font-size="11" fill="#424242">copy: newNode(t->data)</text>
    <text x="440" y="455" font-size="11" fill="#f44336">new->left = copy(t->left)</text>
  </g>
  <g id="step7" class="step" data-narration="All tree operations use recursion. Traversals are O of n. Height and count are also O of n visiting each node once.">
    <rect x="50" y="475" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="500" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">All operations O(n) using recursion - visit each node exactly once</text>
  </g>
</svg>