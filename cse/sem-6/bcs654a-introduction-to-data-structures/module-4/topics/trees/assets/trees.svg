<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Types of Trees</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Trees come in many varieties. We explore general trees, binary trees, full binary trees, complete binary trees, and skewed trees.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Exploring different tree classifications and their properties</text>
  </g>
  <g id="step1" class="step" data-narration="General tree: each node can have any number of children. No restriction on degree. Used for file systems and organizational charts.">
    <rect x="50" y="75" width="330" height="110" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">General Tree</text>
    <circle cx="215" cy="115" r="14" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="120" text-anchor="middle" font-size="10">A</text>
    <line x1="205" y1="128" x2="150" y2="148" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="215" y1="128" x2="215" y2="148" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="225" y1="128" x2="280" y2="148" stroke="#1976d2" stroke-width="1.5"/>
    <circle cx="150" cy="162" r="14" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="150" y="167" text-anchor="middle" font-size="10">B</text>
    <circle cx="215" cy="162" r="14" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="215" y="167" text-anchor="middle" font-size="10">C</text>
    <circle cx="280" cy="162" r="14" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="280" y="167" text-anchor="middle" font-size="10">D</text>
    <text x="320" y="167" font-size="10" fill="#616161">Any # children</text>
  </g>
  <g id="step2" class="step" data-narration="Binary tree: each node has at most two children called left child and right child. Most commonly used tree in data structures.">
    <rect x="420" y="75" width="330" height="110" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="585" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Binary Tree</text>
    <circle cx="585" cy="115" r="14" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="585" y="120" text-anchor="middle" font-size="10">10</text>
    <line x1="575" y1="128" x2="535" y2="148" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="595" y1="128" x2="635" y2="148" stroke="#388e3c" stroke-width="1.5"/>
    <circle cx="535" cy="162" r="14" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="535" y="167" text-anchor="middle" font-size="10">5</text>
    <circle cx="635" cy="162" r="14" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="635" y="167" text-anchor="middle" font-size="10">15</text>
    <text x="670" y="167" font-size="10" fill="#616161">Max 2 children</text>
  </g>
  <g id="step3" class="step" data-narration="Full binary tree: every node has exactly 0 or 2 children. No node has only one child. Also called proper or strict binary tree.">
    <rect x="50" y="200" width="330" height="120" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="215" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Full Binary Tree</text>
    <circle cx="215" cy="245" r="14" fill="#ffe0b2" stroke="#ff9800" stroke-width="2"/>
    <text x="215" y="250" text-anchor="middle" font-size="10">1</text>
    <line x1="205" y1="258" x2="170" y2="278" stroke="#ff9800" stroke-width="1.5"/>
    <line x1="225" y1="258" x2="260" y2="278" stroke="#ff9800" stroke-width="1.5"/>
    <circle cx="170" cy="292" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="170" y="297" text-anchor="middle" font-size="10">2</text>
    <circle cx="260" cy="292" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="260" y="297" text-anchor="middle" font-size="10">3</text>
    <text x="300" y="300" font-size="10" fill="#ff9800">0 or 2 children</text>
  </g>
  <g id="step4" class="step" data-narration="Complete binary tree: all levels completely filled except the last. The last level fills from left to right without gaps.">
    <rect x="420" y="200" width="330" height="120" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="585" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Complete Binary Tree</text>
    <circle cx="585" cy="245" r="14" fill="#e1bee7" stroke="#9c27b0" stroke-width="2"/>
    <text x="585" y="250" text-anchor="middle" font-size="10">1</text>
    <line x1="575" y1="258" x2="545" y2="278" stroke="#9c27b0" stroke-width="1.5"/>
    <line x1="595" y1="258" x2="625" y2="278" stroke="#9c27b0" stroke-width="1.5"/>
    <circle cx="545" cy="292" r="14" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="545" y="297" text-anchor="middle" font-size="10">2</text>
    <circle cx="625" cy="292" r="14" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="625" y="297" text-anchor="middle" font-size="10">3</text>
    <text x="665" y="300" font-size="10" fill="#9c27b0">Left-filled last level</text>
  </g>
  <g id="step5" class="step" data-narration="Skewed trees: all nodes have only one child. Left-skewed goes all left, right-skewed goes all right. Worst case O of n search.">
    <rect x="50" y="335" width="330" height="110" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="215" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Skewed Trees (Degenerate)</text>
    <circle cx="120" cy="380" r="12" fill="#ffcdd2" stroke="#f44336" stroke-width="1.5"/>
    <text x="120" y="384" text-anchor="middle" font-size="9">1</text>
    <line x1="112" y1="391" x2="100" y2="406" stroke="#f44336" stroke-width="1.5"/>
    <circle cx="100" cy="418" r="12" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="100" y="422" text-anchor="middle" font-size="9">2</text>
    <line x1="92" y1="429" x2="80" y2="431" stroke="#f44336" stroke-width="1.5"/>
    <text x="140" y="430" font-size="10" fill="#f44336">Left Skewed</text>
    <circle cx="260" cy="380" r="12" fill="#ffcdd2" stroke="#f44336" stroke-width="1.5"/>
    <text x="260" y="384" text-anchor="middle" font-size="9">1</text>
    <line x1="268" y1="391" x2="280" y2="406" stroke="#f44336" stroke-width="1.5"/>
    <circle cx="280" cy="418" r="12" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="280" y="422" text-anchor="middle" font-size="9">2</text>
    <line x1="288" y1="429" x2="300" y2="431" stroke="#f44336" stroke-width="1.5"/>
    <text x="310" y="430" font-size="10" fill="#f44336">Right Skewed</text>
  </g>
  <g id="step6" class="step" data-narration="Perfect binary tree: all internal nodes have two children and all leaves are at the same level. Nodes equal 2 to the power h plus 1 minus 1.">
    <rect x="420" y="335" width="330" height="110" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="585" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Perfect Binary Tree</text>
    <circle cx="585" cy="380" r="12" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="585" y="384" text-anchor="middle" font-size="9">1</text>
    <line x1="577" y1="391" x2="555" y2="406" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="593" y1="391" x2="615" y2="406" stroke="#388e3c" stroke-width="1.5"/>
    <circle cx="555" cy="418" r="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="555" y="422" text-anchor="middle" font-size="9">2</text>
    <circle cx="615" cy="418" r="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="615" y="422" text-anchor="middle" font-size="9">3</text>
    <text x="650" y="430" font-size="10" fill="#388e3c">All leaves same level</text>
  </g>
  <g id="step7" class="step" data-narration="Choosing the right tree type impacts performance. Balanced trees give O log n operations while skewed trees degrade to O of n.">
    <rect x="50" y="460" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="485" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Balanced trees: O(log n) | Skewed trees: O(n) - structure determines performance</text>
  </g>
</svg>