<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#ffb74d"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#ba68c8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" font-size="20" fill="#1976d2" text-anchor="middle" font-weight="bold">What is Computer Vision - A Brief History</text>

  <g id="step1" class="step" data-narration="Computer Vision is a field of AI that enables computers to interpret and understand visual information from the world, replicating human visual system capabilities to perceive and process images and videos.">
    <rect x="200" y="40" width="400" height="55" fill="url(#gradBlue)" rx="8"/>
    <text x="400" y="70" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">Field of AI enabling computers to</text>
    <text x="400" y="88" font-size="16" fill="#ffffff" text-anchor="middle">interpret visual information from the world</text>
  </g>

  <g id="step2" class="step" data-narration="The four core objectives of computer vision are image understanding to extract meaningful information, scene interpretation for context, visual recognition of objects and patterns, and 3D reconstruction from 2D images.">
    <text x="40" y="115" font-size="15" fill="#388e3c" font-weight="bold">Core Objectives:</text>
    <rect x="40" y="125" width="175" height="55" fill="url(#gradGreen)" rx="6"/>
    <text x="127" y="148" font-size="12" fill="#ffffff" text-anchor="middle">Image</text>
    <text x="127" y="163" font-size="12" fill="#ffffff" text-anchor="middle">Understanding</text>
    <rect x="225" y="125" width="175" height="55" fill="url(#gradGreen)" rx="6"/>
    <text x="312" y="148" font-size="12" fill="#ffffff" text-anchor="middle">Scene</text>
    <text x="312" y="163" font-size="12" fill="#ffffff" text-anchor="middle">Interpretation</text>
    <rect x="410" y="125" width="175" height="55" fill="url(#gradGreen)" rx="6"/>
    <text x="497" y="148" font-size="12" fill="#ffffff" text-anchor="middle">Visual</text>
    <text x="497" y="163" font-size="12" fill="#ffffff" text-anchor="middle">Recognition</text>
    <rect x="595" y="125" width="165" height="55" fill="url(#gradGreen)" rx="6"/>
    <text x="677" y="148" font-size="12" fill="#ffffff" text-anchor="middle">3D</text>
    <text x="677" y="163" font-size="12" fill="#ffffff" text-anchor="middle">Reconstruction</text>
  </g>

  <g id="step3" class="step" data-narration="The computer vision pipeline works through five stages: first acquiring images via cameras, then preprocessing to clean and enhance them, extracting features for pattern identification, analyzing to understand content, and finally making decisions.">
    <text x="40" y="200" font-size="15" fill="#f57c00" font-weight="bold">How CV Works (Pipeline):</text>
    <rect x="40" y="210" width="140" height="45" fill="url(#gradOrange)" rx="6"/>
    <text x="110" y="232" font-size="11" fill="#ffffff" text-anchor="middle">1. Image</text>
    <text x="110" y="246" font-size="11" fill="#ffffff" text-anchor="middle">Acquisition</text>
    <rect x="190" y="210" width="140" height="45" fill="url(#gradOrange)" rx="6"/>
    <text x="260" y="232" font-size="11" fill="#ffffff" text-anchor="middle">2. Pre-</text>
    <text x="260" y="246" font-size="11" fill="#ffffff" text-anchor="middle">processing</text>
    <rect x="340" y="210" width="140" height="45" fill="url(#gradOrange)" rx="6"/>
    <text x="410" y="232" font-size="11" fill="#ffffff" text-anchor="middle">3. Feature</text>
    <text x="410" y="246" font-size="11" fill="#ffffff" text-anchor="middle">Extraction</text>
    <rect x="490" y="210" width="140" height="45" fill="url(#gradOrange)" rx="6"/>
    <text x="560" y="232" font-size="11" fill="#ffffff" text-anchor="middle">4. Analysis &amp;</text>
    <text x="560" y="246" font-size="11" fill="#ffffff" text-anchor="middle">Recognition</text>
    <rect x="640" y="210" width="120" height="45" fill="url(#gradOrange)" rx="6"/>
    <text x="700" y="232" font-size="11" fill="#ffffff" text-anchor="middle">5. Decision</text>
    <text x="700" y="246" font-size="11" fill="#ffffff" text-anchor="middle">Making</text>
    <polygon points="180,232 190,227 190,237" fill="#e65100"/>
    <polygon points="330,232 340,227 340,237" fill="#e65100"/>
    <polygon points="480,232 490,227 490,237" fill="#e65100"/>
    <polygon points="630,232 640,227 640,237" fill="#e65100"/>
  </g>

  <g id="step4" class="step" data-narration="Key computer vision tasks include classification to categorize images, detection to locate objects, segmentation for pixel-level classification, tracking objects across frames, and recognition to identify specific instances like faces.">
    <text x="40" y="275" font-size="15" fill="#1976d2" font-weight="bold">Key Tasks:</text>
    <rect x="40" y="285" width="145" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="112" y="307" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Classification</text>
    <text x="112" y="322" font-size="10" fill="#1976d2" text-anchor="middle">Categorize image</text>
    <rect x="195" y="285" width="145" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="267" y="307" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Detection</text>
    <text x="267" y="322" font-size="10" fill="#1976d2" text-anchor="middle">Locate objects</text>
    <rect x="350" y="285" width="145" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="422" y="307" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Segmentation</text>
    <text x="422" y="322" font-size="10" fill="#1976d2" text-anchor="middle">Pixel-level class</text>
    <rect x="505" y="285" width="145" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="577" y="307" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Tracking</text>
    <text x="577" y="322" font-size="10" fill="#1976d2" text-anchor="middle">Follow objects</text>
    <rect x="660" y="285" width="100" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
    <text x="710" y="307" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Recognition</text>
    <text x="710" y="322" font-size="10" fill="#1976d2" text-anchor="middle">Identify faces</text>
  </g>

  <g id="step5" class="step" data-narration="Computer vision relates to image processing for low-level operations, machine learning for pattern recognition algorithms, deep learning using CNNs, robotics for environmental perception, and augmented reality for object tracking overlays.">
    <text x="40" y="355" font-size="15" fill="#7b1fa2" font-weight="bold">Related Fields:</text>
    <rect x="40" y="365" width="145" height="45" fill="url(#gradPurple)" rx="6"/>
    <text x="112" y="385" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Image Processing</text>
    <text x="112" y="400" font-size="9" fill="#ffffff" text-anchor="middle">Filtering, enhancement</text>
    <rect x="195" y="365" width="145" height="45" fill="url(#gradPurple)" rx="6"/>
    <text x="267" y="385" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Machine Learning</text>
    <text x="267" y="400" font-size="9" fill="#ffffff" text-anchor="middle">Pattern recognition</text>
    <rect x="350" y="365" width="145" height="45" fill="url(#gradPurple)" rx="6"/>
    <text x="422" y="385" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Deep Learning</text>
    <text x="422" y="400" font-size="9" fill="#ffffff" text-anchor="middle">CNNs, Transformers</text>
    <rect x="505" y="365" width="130" height="45" fill="url(#gradPurple)" rx="6"/>
    <text x="570" y="385" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Robotics</text>
    <text x="570" y="400" font-size="9" fill="#ffffff" text-anchor="middle">Environment感知</text>
    <rect x="645" y="365" width="115" height="45" fill="url(#gradPurple)" rx="6"/>
    <text x="702" y="385" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">AR/VR</text>
    <text x="702" y="400" font-size="9" fill="#ffffff" text-anchor="middle">Object tracking</text>
  </g>

  <g id="step6" class="step" data-narration="The history of computer vision evolved from rule-based approaches in the 1960s-1980s with edge detection, through feature-based methods in the 1990s-2000s using SIFT and HOG, to the deep learning revolution starting with AlexNet in 2012.">
    <text x="40" y="430" font-size="15" fill="#e65100" font-weight="bold">Historical Evolution:</text>
    <rect x="40" y="440" width="230" height="50" fill="#ffcc80" stroke="#e65100" stroke-width="2" rx="6"/>
    <text x="155" y="460" font-size="13" fill="#e65100" text-anchor="middle" font-weight="bold">1960s-1980s</text>
    <text x="155" y="478" font-size="10" fill="#e65100" text-anchor="middle">Rule-based: Edge detection,</text>
    <text x="155" y="488" font-size="10" fill="#e65100" text-anchor="middle">template matching</text>
    <rect x="280" y="440" width="230" height="50" fill="#ffcc80" stroke="#e65100" stroke-width="2" rx="6"/>
    <text x="395" y="460" font-size="13" fill="#e65100" text-anchor="middle" font-weight="bold">1990s-2000s</text>
    <text x="395" y="478" font-size="10" fill="#e65100" text-anchor="middle">Feature-based: SIFT, HOG,</text>
    <text x="395" y="488" font-size="10" fill="#e65100" text-anchor="middle">handcrafted features</text>
    <rect x="520" y="440" width="240" height="50" fill="#ffcc80" stroke="#e65100" stroke-width="2" rx="6"/>
    <text x="640" y="460" font-size="13" fill="#e65100" text-anchor="middle" font-weight="bold">2012-Present</text>
    <text x="640" y="478" font-size="10" fill="#e65100" text-anchor="middle">Deep Learning: CNNs,</text>
    <text x="640" y="488" font-size="10" fill="#e65100" text-anchor="middle">R-CNN, YOLO, Transformers</text>
  </g>

  <g id="step7" class="step" data-narration="Real-world CV applications include autonomous vehicles for object detection, medical imaging for tumor detection, surveillance for face recognition, manufacturing for quality inspection, and retail for inventory management and customer analytics.">
    <text x="40" y="510" font-size="15" fill="#388e3c" font-weight="bold">Applications:</text>
    <rect x="40" y="520" width="145" height="50" fill="url(#gradGreen)" rx="6"/>
    <text x="112" y="538" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Autonomous</text>
    <text x="112" y="553" font-size="11" fill="#ffffff" text-anchor="middle">Vehicles</text>
    <rect x="195" y="520" width="145" height="50" fill="url(#gradGreen)" rx="6"/>
    <text x="267" y="538" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Medical</text>
    <text x="267" y="553" font-size="11" fill="#ffffff" text-anchor="middle">Imaging</text>
    <rect x="350" y="520" width="145" height="50" fill="url(#gradGreen)" rx="6"/>
    <text x="422" y="538" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Surveillance</text>
    <text x="422" y="553" font-size="11" fill="#ffffff" text-anchor="middle">&amp; Security</text>
    <rect x="505" y="520" width="130" height="50" fill="url(#gradGreen)" rx="6"/>
    <text x="570" y="538" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Manufacturing</text>
    <text x="570" y="553" font-size="11" fill="#ffffff" text-anchor="middle">Quality Check</text>
    <rect x="645" y="520" width="115" height="50" fill="url(#gradGreen)" rx="6"/>
    <text x="702" y="538" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Retail</text>
    <text x="702" y="553" font-size="11" fill="#ffffff" text-anchor="middle">&amp; Analytics</text>
  </g>
</svg>