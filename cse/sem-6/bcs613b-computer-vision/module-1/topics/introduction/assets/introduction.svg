<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2">Introduction to Computer Vision</text>

  <g id="step1" class="step" data-narration="Computer vision enables computers to understand digital images and videos. It automates tasks like recognizing objects, understanding scenes, and detecting motion that humans do effortlessly.">
    <circle cx="400" cy="80" r="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="400" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Computer</text>
    <text x="400" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Vision</text>
    <rect x="80" y="150" width="140" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="150" y="175" text-anchor="middle" font-size="12" fill="#ff9800">Image Input</text>
    <text x="150" y="192" text-anchor="middle" font-size="10" fill="#666">Digital Data</text>
    <rect x="330" y="150" width="140" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="175" text-anchor="middle" font-size="12" fill="#388e3c">Processing</text>
    <text x="400" y="192" text-anchor="middle" font-size="10" fill="#666">Algorithms</text>
    <rect x="580" y="150" width="140" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="650" y="175" text-anchor="middle" font-size="12" fill="#1976d2">Understanding</text>
    <text x="650" y="192" text-anchor="middle" font-size="10" fill="#666">Semantic Info</text>
    <line x1="220" y1="180" x2="320" y2="180" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="470" y1="180" x2="570" y2="180" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step2" class="step" data-narration="Computer vision faces major challenges. Going from 2D images to 3D is an ill-posed problem. Variability in lighting and viewpoints, occlusions, and feature ambiguity all make vision difficult for machines.">
    <text x="400" y="235" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Key Challenges</text>
    <rect x="70" y="255" width="140" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="140" y="278" text-anchor="middle" font-size="12" fill="#1976d2">Inverse Problem</text>
    <text x="140" y="295" text-anchor="middle" font-size="10" fill="#666">2D → 3D</text>
    <rect x="230" y="255" width="140" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="300" y="278" text-anchor="middle" font-size="12" fill="#ff9800">Variability</text>
    <text x="300" y="295" text-anchor="middle" font-size="10" fill="#666">Lighting, Views</text>
    <rect x="390" y="255" width="140" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="460" y="278" text-anchor="middle" font-size="12" fill="#388e3c">Occlusion</text>
    <text x="460" y="295" text-anchor="middle" font-size="10" fill="#666">Hidden Parts</text>
    <rect x="550" y="255" width="140" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="620" y="278" text-anchor="middle" font-size="12" fill="#1976d2">Ambiguity</text>
    <text x="620" y="295" text-anchor="middle" font-size="10" fill="#666">Multiple Meanings</text>
  </g>

  <g id="step3" class="step" data-narration="Computer vision differs from related fields. Image processing transforms image to image. Computer graphics creates images from 3D models. Pattern recognition provides classification techniques used throughout computer vision systems.">
    <text x="400" y="335" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">CV vs Related Fields</text>
    <circle cx="180" cy="385" r="40" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="180" y="380" text-anchor="middle" font-size="11" fill="#ff9800">Image</text>
    <text x="180" y="395" text-anchor="middle" font-size="11" fill="#ff9800">Processing</text>
    <circle cx="400" cy="385" r="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="400" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Computer</text>
    <text x="400" y="393" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Vision</text>
    <circle cx="620" cy="385" r="40" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="620" y="380" text-anchor="middle" font-size="11" fill="#388e3c">Computer</text>
    <text x="620" y="395" text-anchor="middle" font-size="11" fill="#388e3c">Graphics</text>
    <text x="180" y="440" text-anchor="middle" font-size="9" fill="#666">Image → Image</text>
    <text x="400" y="440" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">Image → Meaning</text>
    <text x="620" y="440" text-anchor="middle" font-size="9" fill="#666">3D → Image</text>
  </g>

  <g id="step4" class="step" data-narration="A typical vision pipeline starts with image acquisition, then preprocessing for noise removal. Next comes feature extraction, recognition, and finally decision-making for real-world applications.">
    <text x="400" y="470" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Vision Pipeline</text>
    <rect x="40" y="490" width="100" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="90" y="515" text-anchor="middle" font-size="11" fill="#1976d2">Acquisition</text>
    <rect x="160" y="490" width="100" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="210" y="515" text-anchor="middle" font-size="11" fill="#ff9800">Preprocess</text>
    <rect x="280" y="490" width="100" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="330" y="515" text-anchor="middle" font-size="11" fill="#388e3c">Features</text>
    <rect x="400" y="490" width="100" height="40" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="450" y="515" text-anchor="middle" font-size="11" fill="#1976d2">Recognition</text>
    <rect x="520" y="490" width="100" height="40" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="570" y="515" text-anchor="middle" font-size="11" fill="#ff9800">Decision</text>
    <rect x="640" y="490" width="100" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="690" y="515" text-anchor="middle" font-size="11" fill="#388e3c">Action</text>
    <line x1="140" y1="510" x2="155" y2="510" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="260" y1="510" x2="275" y2="510" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="380" y1="510" x2="395" y2="510" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="500" y1="510" x2="515" y2="510" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="620" y1="510" x2="635" y2="510" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step5" class="step" data-narration="Vision tasks are organized in a hierarchy. Low-level tasks include edge detection and feature extraction. Mid-level handles segmentation and optical flow. High-level performs object detection and scene understanding.">
    <text x="400" y="550" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Task Levels</text>
    <rect x="50" y="565" width="180" height="25" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="140" y="582" text-anchor="middle" font-size="10" fill="#1976d2">Low: Edge Detection</text>
    <rect x="250" y="565" width="180" height="25" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="340" y="582" text-anchor="middle" font-size="10" fill="#ff9800">Mid: Segmentation</text>
    <rect x="450" y="565" width="180" height="25" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="540" y="582" text-anchor="middle" font-size="10" fill="#388e3c">High: Object Detection</text>
    <rect x="650" y="565" width="120" height="25" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="710" y="582" text-anchor="middle" font-size="10" fill="#9c27b0">Scene Understand</text>
  </g>

  <g id="step6" class="step" data-narration="Computer vision powers many real-world applications. Autonomous vehicles use it for lane detection. Medical imaging aids diagnosis. Surveillance enables face recognition. Industrial automation performs quality inspection.">
    <text x="400" y="610" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Applications</text>
  </g>
</svg>