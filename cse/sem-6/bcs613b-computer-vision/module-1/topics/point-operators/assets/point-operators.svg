<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e3f2fd" />
      <stop offset="100%" stop-color="#1976d2" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f5e9" />
      <stop offset="100%" stop-color="#388e3c" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0" />
      <stop offset="100%" stop-color="#ff9800" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f3e5f5" />
      <stop offset="100%" stop-color="#9c27b0" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#388e3c" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Point Operators transform each pixel based only on its own value, not neighbors. The core formula is g(x,y) equals T applied to f(x,y).">
    <text x="30" y="35" font-size="22" fill="#1976d2" font-weight="bold">Point Operators in Image Processing</text>
    <text x="30" y="55" font-size="11" fill="#666">Transform each pixel based only on its original intensity value</text>
    <line x1="30" y1="65" x2="770" y2="65" stroke="#1976d2" stroke-width="2"/>
  </g>
  
  <!-- Step 1: Core Concept -->
  <g id="step1" class="step" data-narration="A point operator maps input intensity r to output s using transformation T. The output at any pixel depends only on input at that same pixel location.">
    <rect x="30" y="80" width="220" height="60" fill="url(#blueGrad)" rx="4"/>
    <text x="40" y="100" font-size="12" fill="#1976d2" font-weight="bold">Core Formula</text>
    <text x="40" y="120" font-size="11" fill="#333">g(x,y) = T[f(x,y)]</text>
    <text x="40" y="135" font-size="10" fill="#666">Output depends only on input at same pixel</text>
    
    <rect x="270" y="80" width="180" height="60" fill="url(#greenGrad)" rx="4"/>
    <text x="280" y="100" font-size="12" fill="#388e3c" font-weight="bold">Key Property</text>
    <text x="280" y="118" font-size="10" fill="#333">No neighbor information used</text>
    <text x="280" y="132" font-size="10" fill="#333">O(n) efficiency for n pixels</text>
  </g>
  
  <!-- Step 2: Basic Operations - Negation -->
  <g id="step2" class="step" data-narration="Image negation reverses intensity: s equals L minus 1 minus r. White becomes black, black becomes white. Useful for enhancing detail in dark regions.">
    <rect x="30" y="155" width="160" height="70" fill="url(#orangeGrad)" rx="4"/>
    <text x="40" y="172" font-size="11" fill="#e65100" font-weight="bold">Image Negation</text>
    <text x="40" y="188" font-size="10" fill="#333">s = L - 1 - r</text>
    <text x="40" y="202" font-size="9" fill="#666">L = max intensity (255)</text>
    <text x="40" y="215" font-size="9" fill="#666">r=0 → s=255, r=255 → s=0</text>
    
    <rect x="200" y="155" width="160" height="70" fill="url(#purpleGrad)" rx="4"/>
    <text x="210" y="172" font-size="11" fill="#7b1fa2" font-weight="bold">Brightness</text>
    <text x="210" y="188" font-size="10" fill="#333">s = r + c</text>
    <text x="210" y="202" font-size="9" fill="#666">c = constant adjustment</text>
    <text x="210" y="215" font-size="9" fill="#666">Requires clamping to 0-255</text>
    
    <rect x="370" y="155" width="160" height="70" fill="url(#blueGrad)" rx="4"/>
    <text x="380" y="172" font-size="11" fill="#1565c0" font-weight="bold">Contrast</text>
    <text x="380" y="188" font-size="10" fill="#333">s = α × r</text>
    <text x="380" y="202" font-size="9" fill="#666">α greater than 1 increases</text>
    <text x="380" y="215" font-size="9" fill="#666">α less than 1 decreases</text>
  </g>
  
  <!-- Step 3: Histogram -->
  <g id="step3" class="step" data-narration="An image histogram shows frequency of each intensity value. Histogram equalization redistributes values evenly using the cumulative distribution function for better contrast.">
    <rect x="30" y="240" width="240" height="90" fill="url(#greenGrad)" rx="4"/>
    <text x="40" y="258" font-size="12" fill="#388e3c" font-weight="bold">Image Histogram</text>
    <text x="40" y="275" font-size="10" fill="#333">Graph showing frequency of each</text>
    <text x="40" y="288" font-size="10" fill="#333">intensity value from 0 to 255</text>
    <!-- Simple histogram bars -->
    <rect x="40" y="295" width="8" height="25" fill="#388e3c"/>
    <rect x="52" y="290" width="8" height="30" fill="#388e3c"/>
    <rect x="64" y="280" width="8" height="40" fill="#388e3c"/>
    <rect x="76" y="285" width="8" height="35" fill="#388e3c"/>
    <rect x="88" y="270" width="8" height="50" fill="#388e3c"/>
    <rect x="100" y="265" width="8" height="55" fill="#388e3c"/>
    <rect x="112" y="275" width="8" height="45" fill="#388e3c"/>
    <rect x="124" y="282" width="8" height="38" fill="#388e3c"/>
    <rect x="136" y="288" width="8" height="32" fill="#388e3c"/>
    <rect x="148" y="295" width="8" height="25" fill="#388e3c"/>
    <line x1="40" y1="325" x2="160" y2="325" stroke="#388e3c" stroke-width="1"/>
    <text x="165" y="328" font-size="8" fill="#666">0 ─────────── 255</text>
    
    <rect x="290" y="240" width="240" height="90" fill="url(#orangeGrad)" rx="4"/>
    <text x="300" y="258" font-size="12" fill="#e65100" font-weight="bold">Histogram Equalization</text>
    <text x="300" y="275" font-size="10" fill="#333">s = (L-1) × Σ p(j)</text>
    <text x="300" y="290" font-size="9" fill="#666">Uses cumulative distribution</text>
    <text x="300" y="303" font-size="9" fill="#666">Redistributes intensity evenly</text>
    <text x="300" y="316" font-size="9" fill="#666">Enhances overall contrast</text>
    <!-- Flat histogram after equalization -->
    <rect x="300" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="315" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="330" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="345" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="360" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="375" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="390" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="405" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="420" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="435" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="450" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="465" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="480" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="495" y="328" width="8" height="20" fill="#ff9800"/>
    <rect x="510" y="328" width="8" height="20" fill="#ff9800"/>
  </g>
  
  <!-- Step 4: Thresholding and Gamma -->
  <g id="step4" class="step" data-narration="Thresholding converts grayscale to binary using a threshold T. Gamma correction uses power law s equals c times r to the gamma power for display correction.">
    <rect x="30" y="345" width="200" height="80" fill="url(#purpleGrad)" rx="4"/>
    <text x="40" y="365" font-size="12" fill="#7b1fa2" font-weight="bold">Thresholding</text>
    <text x="40" y="382" font-size="10" fill="#333">Output is 255 if input greater than T</text>
    <text x="40" y="396" font-size="10" fill="#333">Otherwise output is 0</text>
    <text x="40" y="410" font-size="9" fill="#666">Creates binary image for segmentation</text>
    <!-- Simple threshold visual -->
    <rect x="130" y="365" width="50" height="50" fill="#fff" stroke="#7b1fa2" stroke-width="2"/>
    <rect x="130" y="365" width="25" height="50" fill="#7b1fa2"/>
    <text x="130" y="425" font-size="8" fill="#666">0    T   255</text>
    
    <rect x="250" y="345" width="200" height="80" fill="url(#blueGrad)" rx="4"/>
    <text x="260" y="365" font-size="12" fill="#1565c0" font-weight="bold">Gamma Correction</text>
    <text x="260" y="382" font-size="10" fill="#333">s = c × r^γ</text>
    <text x="260" y="396" font-size="9" fill="#666">γ less than 1 expands dark values</text>
    <text x="260" y="410" font-size="9" fill="#666">γ greater than 1 expands bright values</text>
    <!-- Gamma curve visual -->
    <path d="M320 410 Q380 365 440 365" stroke="#1976d2" stroke-width="2" fill="none"/>
    <text x="420" y="420" font-size="8" fill="#666">γ=0.5 curve</text>
    
    <rect x="470" y="345" width="160" height="80" fill="url(#greenGrad)" rx="4"/>
    <text x="480" y="365" font-size="12" fill="#388e3c" font-weight="bold">Otsu's Method</text>
    <text x="480" y="382" font-size="10" fill="#333">Automatically finds optimal</text>
    <text x="480" y="396" font-size="10" fill="#333">threshold by maximizing</text>
    <text x="480" y="410" font-size="9" fill="#666">between-class variance</text>
  </g>
  
  <!-- Step 5: Bit Plane and LUT -->
  <g id="step5" class="step" data-narration="Bit plane slicing extracts individual bit levels from pixels. Higher bits contain most visual information while lower bits hold noise and fine details.">
    <rect x="30" y="440" width="280" height="65" fill="url(#orangeGrad)" rx="4"/>
    <text x="40" y="458" font-size="12" fill="#e65100" font-weight="bold">Bit-Plane Slicing</text>
    <text x="40" y="475" font-size="10" fill="#333">8-bit image decomposed into 8 planes (bits 0-7)</text>
    <text x="40" y="490" font-size="9" fill="#666">Bits 7,6,5: most visual info | Bits 0,1,2: noise and fine details</text>
    <!-- Bit representation -->
    <rect x="220" y="455" width="70" height="40" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="225" y="468" font-size="7" fill="#333">7 6 5 4 3 2 1 0</text>
    <text x="225" y="480" font-size="7" fill="#333">1 0 1 1 0 0 1 0</text>
    
    <rect x="330" y="440" width="200" height="65" fill="url(#purpleGrad)" rx="4"/>
    <text x="340" y="458" font-size="12" fill="#7b1fa2" font-weight="bold">Lookup Tables (LUTs)</text>
    <text x="340" y="475" font-size="10" fill="#333">Precompute transformation for each</text>
    <text x="340" y="490" font-size="9" fill="#666">possible input value for efficiency</text>
    <!-- LUT visual -->
    <rect x="450" y="450" width="60" height="45" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <line x1="460" y1="455" x2="460" y2="490" stroke="#9c27b0" stroke-width="1"/>
    <line x1="460" y1="490" x2="500" y2="490" stroke="#9c27b0" stroke-width="1"/>
    <text x="465" y="475" font-size="7" fill="#9c27b0">LUT</text>
  </g>
  
  <!-- Step 6: Summary Table -->
  <g id="step6" class="step" data-narration="Key operations summary: negation creates negative, brightness shifts values, contrast stretches range, equalization flattens histogram, thresholding creates binary output.">
    <rect x="30" y="520" width="740" height="60" fill="url(#blueGrad)" rx="4"/>
    <text x="40" y="540" font-size="11" fill="#1565c0" font-weight="bold">Summary: Point Operations</text>
    <text x="40" y="555" font-size="9" fill="#333">Negation: s=L-1-r</text>
    <text x="130" y="555" font-size="9" fill="#333">| Brightness: s=r+c</text>
    <text x="230" y="555" font-size="9" fill="#333">| Contrast: s=α×r</text>
    <text x="330" y="555" font-size="9" fill="#333">| Equalization: s=(L-1)×Σp(j)</text>
    <text x="480" y="555" font-size="9" fill="#333">| Threshold: binary</text>
    <text x="570" y="555" font-size="9" fill="#333">| Gamma: s=c×r^γ</text>
    <text x="40" y="570" font-size="9" fill="#666">All operations are O(n) efficient - single operation per pixel</text>
  </g>
</svg>