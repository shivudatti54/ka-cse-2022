<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#ffb74d"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#ba68c8"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 1: Title & Introduction -->
  <g id="step1" class="step" data-narration="Point operations transform each pixel independently based only on its own intensity value, without considering neighboring pixels.">
    <text x="400" y="40" font-size="22" fill="#1976d2" text-anchor="middle" font-weight="bold">Point Operations in Computer Vision</text>
    <text x="400" y="65" font-size="13" fill="#5c6bc0" text-anchor="middle">Transform each pixel independently based on its intensity value</text>
    <rect x="50" y="85" width="100" height="40" fill="url(#blueGrad)" rx="4"/>
    <text x="100" y="112" font-size="12" fill="white" text-anchor="middle">Input I(x,y)</text>
    <text x="250" y="108" font-size="18" fill="#455a64">→</text>
    <text x="380" y="108" font-size="14" fill="#455a64">T[ ]</text>
    <text x="550" y="108" font-size="18" fill="#455a64">→</text>
    <rect x="600" y="85" width="100" height="40" fill="url(#greenGrad)" rx="4"/>
    <text x="650" y="112" font-size="12" fill="white" text-anchor="middle">Output O(x,y)</text>
  </g>
  
  <!-- Step 2: Mathematical Definition -->
  <g id="step2" class="step" data-narration="The output pixel value equals the transformation function applied to the input pixel. This is written as O(x,y) equals T of I(x,y).">
    <rect x="50" y="145" width="700" height="55" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="60" y="168" font-size="14" fill="#1565c0" font-weight="bold">Mathematical Definition:</text>
    <text x="60" y="190" font-size="13" fill="#455a64">O(x,y) = T[I(x,y)] — Output depends only on input pixel at same location</text>
    <circle cx="720" cy="172" r="12" fill="#4caf50"/>
    <text x="720" y="177" font-size="14" fill="white" text-anchor="middle">✓</text>
  </g>
  
  <!-- Step 3: Brightness Adjustment -->
  <g id="step3" class="step" data-narration="Brightness adjustment adds a constant b to every pixel. Positive b makes the image brighter, negative b makes it darker.">
    <rect x="50" y="220" width="220" height="70" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="60" y="245" font-size="14" fill="#e65100" font-weight="bold">Brightness Adjustment</text>
    <text x="60" y="265" font-size="12" fill="#455a64">O(x,y) = I(x,y) + b</text>
    <text x="60" y="280" font-size="11" fill="#78909c">b &gt; 0 brightens, b &lt; 0 darkens</text>
    <rect x="290" y="235" width="140" height="40" fill="#e0e0e0" rx="3"/>
    <text x="310" y="255" font-size="11" fill="#455a64">Input: [50,100,150,200]</text>
    <text x="360" y="268" font-size="12" fill="#455a64">+30</text>
    <rect x="450" y="235" width="140" height="40" fill="#c8e6c9" rx="3"/>
    <text x="470" y="255" font-size="11" fill="#2e7d32">Output: [80,130,180,230]</text>
    <text x="470" y="268" font-size="10" fill="#78909c">(clamped to 255)</text>
  </g>
  
  <!-- Step 4: Contrast Adjustment -->
  <g id="step4" class="step" data-narration="Contrast adjustment multiplies each pixel by a factor alpha. Alpha greater than one increases contrast, less than one decreases it.">
    <rect x="50" y="305" width="220" height="70" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="60" y="330" font-size="14" fill="#e65100" font-weight="bold">Contrast Adjustment</text>
    <text x="60" y="350" font-size="12" fill="#455a64">O(x,y) = α × I(x,y)</text>
    <text x="60" y="365" font-size="11" fill="#78909c">α &gt; 1 increases, α &lt; 1 decreases</text>
    <rect x="290" y="320" width="140" height="40" fill="#e0e0e0" rx="3"/>
    <text x="310" y="340" font-size="11" fill="#455a64">Input: [50,100,150,200]</text>
    <text x="360" y="353" font-size="12" fill="#455a64">×1.5</text>
    <rect x="450" y="320" width="140" height="40" fill="#c8e6c9" rx="3"/>
    <text x="470" y="340" font-size="11" fill="#2e7d32">Output: [75,150,225,255]</text>
    <text x="470" y="353" font-size="10" fill="#78909c">(clamped)</text>
  </g>
  
  <!-- Step 5: Image Negative -->
  <g id="step5" class="step" data-narration="Image negative inverts pixel values: bright becomes dark and dark becomes bright using formula 255 minus input value.">
    <rect x="50" y="390" width="180" height="55" fill="#fce4ec" rx="5" stroke="#e91e63" stroke-width="1"/>
    <text x="60" y="415" font-size="14" fill="#c2185b" font-weight="bold">Image Negative</text>
    <text x="60" y="435" font-size="12" fill="#455a64">O(x,y) = 255 - I(x,y)</text>
    <rect x="250" y="400" width="60" height="35" fill="#424242" rx="3"/>
    <text x="280" y="422" font-size="10" fill="white" text-anchor="middle">Input</text>
    <text x="320" y="420" font-size="12" fill="#455a64">→ 255 -</text>
    <rect x="370" y="400" width="60" height="35" fill="#e0e0e0" rx="3"/>
    <text x="400" y="422" font-size="10" fill="#424242" text-anchor="middle">Output</text>
    <text x="480" y="415" font-size="11" fill="#78909c">0→255, 128→127, 255→0</text>
    <text x="480" y="435" font-size="11" fill="#e91e63">Used in medical X-rays</text>
  </g>
  
  <!-- Step 6: Thresholding -->
  <g id="step6" class="step" data-narration="Thresholding converts grayscale to binary. Pixels above threshold become white, below become black. Creates binary segmentation mask.">
    <rect x="50" y="460" width="180" height="55" fill="#e8eaf6" rx="5" stroke="#5c6bc0" stroke-width="1"/>
    <text x="60" y="485" font-size="14" fill="#303f9f" font-weight="bold">Thresholding</text>
    <text x="60" y="505" font-size="12" fill="#455a64">O = 255 if I &gt; T else 0</text>
    <rect x="250" y="470" width="80" height="35" fill="#78909c" rx="3"/>
    <text x="290" y="492" font-size="11" fill="white" text-anchor="middle">Input</text>
    <text x="340" y="490" font-size="12" fill="#455a64">T=100</text>
    <rect x="380" y="470" width="80" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="420" y="485" font-size="9" fill="#424242" text-anchor="middle">Output</text>
    <text x="420" y="500" font-size="8" fill="#424242" text-anchor="middle">(binary)</text>
    <text x="500" y="480" font-size="10" fill="#5c6bc0">Types: Binary, Inverse,</text>
    <text x="500" y="495" font-size="10" fill="#5c6bc0">Truncate, To-Zero</text>
  </g>
  
  <!-- Step 7: Gamma Correction & Log Transform -->
  <g id="step7" class="step" data-narration="Gamma correction raises pixel values to gamma power. Gamma less than one brightens shadows, greater than one darkens shadows. Log transform compresses wide dynamic range.">
    <rect x="50" y="530" width="700" height="50" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="60" y="555" font-size="13" fill="#7b1fa2" font-weight="bold">Gamma Correction:</text>
    <text x="160" y="555" font-size="12" fill="#455a64">O = I<sup>γ</sup></text>
    <text x="240" y="555" font-size="11" fill="#78909c">(γ&lt;1 brightens, γ&gt;1 darkens)</text>
    <line x1="370" y1="540" x2="370" y2="570" stroke="#9c27b0" stroke-width="1"/>
    <text x="390" y="555" font-size="13" fill="#7b1fa2" font-weight="bold">Log Transform:</text>
    <text x="490" y="555" font-size="12" fill="#455a64">O = c × log(1 + I)</text>
    <text x="640" y="555" font-size="11" fill="#78909c">(compreses dynamic range)</text>
  </g>
</svg>