<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff9800"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9c27b0"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f44336"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 1: Introduction -->
  <g id="step1" class="step" data-narration="Image segmentation partitions images into regions. Point detection finds isolated spots. Line detection finds thin elongated structures. Edge detection finds boundaries between regions with different intensity.">
    <text x="30" y="30" font-size="16" fill="#1976d2" font-weight="bold">Point, Line and Edge Detection</text>
    <rect x="30" y="45" width="740" height="70" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="65" font-size="11" fill="#333">Image Segmentation: Partitioning an image into meaningful regions</text>
    <text x="40" y="82" font-size="11" fill="#333">• Point Detection: Finds isolated points where intensity differs from neighbors</text>
    <text x="40" y="99" font-size="11" fill="#333">• Line Detection: Finds thin elongated structures in specific directions</text>
    <text x="40" y="116" font-size="11" fill="#333">• Edge Detection: Finds boundaries where intensity changes significantly</text>
  </g>

  <!-- Step 2: Gradient Operator -->
  <g id="step2" class="step" data-narration="The gradient operator computes partial derivatives in x and y directions. The gradient vector points in the direction of maximum intensity change. Its magnitude tells us how strong the change is.">
    <text x="30" y="135" font-size="14" fill="#388e3c" font-weight="bold">Gradient Operator (First Derivative)</text>
    <rect x="30" y="150" width="740" height="60" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-size="11" fill="#333">∇f = [∂f/∂x, ∂f/∂y]ᵀ  |  Magnitude: |∇f| = √((∂f/∂x)² + (∂f/∂y)²)  |  Direction: θ = tan⁻¹(∂f/∂y ÷ ∂f/∂x)</text>
    <text x="40" y="188" font-size="11" fill="#333">Digital images use discrete differences to approximate these derivatives for finding edges.</text>
    <line x1="400" y1="220" x2="400" y2="240" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
  </g>

  <!-- Step 3: Point Detection -->
  <g id="step3" class="step" data-narration="Point detection uses the Laplacian operator, a second-order derivative. It detects zero-crossings where the second derivative is zero. The Laplacian kernel highlights isolated points.">
    <text x="30" y="250" font-size="14" fill="#ff9800" font-weight="bold">Point Detection (Laplacian)</text>
    <rect x="30" y="265" width="740" height="85" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="283" font-size="11" fill="#333">The Laplacian: ∇²f = ∂²f/∂x² + ∂²f/∂y² detects intensity changes by finding zero-crossings.</text>
    <text x="40" y="300" font-size="10" fill="#333">Standard kernel:        Enhanced kernel:</text>
    <rect x="40" y="310" width="60" height="35" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="45" y="325" font-size="9" fill="#333">0  1  0</text>
    <text x="45" y="337" font-size="9" fill="#333">1 -4  1</text>
    <text x="45" y="349" font-size="9" fill="#333">0  1  0</text>
    <rect x="150" y="310" width="60" height="35" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="155" y="325" font-size="9" fill="#333">1  1  1</text>
    <text x="155" y="337" font-size="9" fill="#333">1 -8  1</text>
    <text x="155" y="349" font-size="9" fill="#333">1  1  1</text>
    <text x="230" y="330" font-size="10" fill="#333">Apply filter → Threshold → Detect Points</text>
    <line x1="400" y1="360" x2="400" y2="380" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
  </g>

  <!-- Step 4: Line Detection -->
  <g id="step4" class="step" data-narration="Line detection uses directional masks that respond strongly to lines in specific orientations: horizontal, vertical, +45°, and -45° directions. Each mask has high values along its direction.">
    <text x="30" y="390" font-size="14" fill="#9c27b0" font-weight="bold">Line Detection (Directional Masks)</text>
    <rect x="30" y="405" width="740" height="80" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="423" font-size="11" fill="#333">Apply four directional kernels to the image. Select maximum response for each pixel.</text>
    <text x="40" y="440" font-size="9" fill="#333">Horizontal:        Vertical:            +45°:              -45°:</text>
    <rect x="40" y="448" width="50" height="30" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="42" y="460" font-size="7" fill="#333">-1 -1 -1</text>
    <text x="42" y="472" font-size="7" fill="#333"> 2  2  2</text>
    <text x="42" y="484" font-size="7" fill="#333">-1 -1 -1</text>
    <rect x="100" y="448" width="50" height="30" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="102" y="460" font-size="7" fill="#333">-1  2 -1</text>
    <text x="102" y="472" font-size="7" fill="#333">-1  2 -1</text>
    <text x="102" y="484" font-size="7" fill="#333">-1  2 -1</text>
    <rect x="160" y="448" width="50" height="30" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="162" y="460" font-size="7" fill="#333">-1 -1  2</text>
    <text x="162" y="472" font-size="7" fill="#333">-1  2 -1</text>
    <text x="162" y="484" font-size="7" fill="#333"> 2 -1 -1</text>
    <rect x="220" y="448" width="50" height="30" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="222" y="460" font-size="7" fill="#333"> 2 -1 -1</text>
    <text x="222" y="472" font-size="7" fill="#333">-1  2 -1</text>
    <text x="222" y="484" font-size="7" fill="#333">-1 -1  2</text>
    <line x1="400" y1="495" x2="400" y2="515" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  </g>

  <!-- Step 5: Edge Detection Operators -->
  <g id="step5" class="step" data-narration="First-order edge detectors include Roberts (2x2, simple but noisy), Prewitt (3x3, better), and Sobel (3x3, weights center for better noise immunity). All compute Gx and Gy.">
    <text x="30" y="525" font-size="14" fill="#f44336" font-weight="bold">First-Order Edge Detectors</text>
    <rect x="30" y="540" width="740" height="55" fill="#ffebee" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="558" font-size="10" fill="#333">Roberts (2×2):     Gx=[+1 0; 0 -1]    Gy=[0 +1; -1 0]  |  Prewitt: Gx=[-1 0 +1; -1 0 +1; -1 0 +1]  Gy columns [-1 -1 -1; 0 0 0; +1 +1 +1]</text>
    <text x="40" y="575" font-size="10" fill="#333">Sobel: Gx=[-1 0 +1; -2 0 +2; -1 0 +1]  Gy=[-1 -2 -1; 0 0 0; +1 +2 +1]  |  Sobel weights center more than Prewitt for better noise suppression</text>
  </g>
</svg>