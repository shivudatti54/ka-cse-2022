<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" font-size="20" fill="#1976d2" text-anchor="middle" font-weight="bold">Digital Images Fundamentals</text>

  <g id="step1" class="step" data-narration="A digital image is a 2D function f(x,y) where x and y are spatial coordinates, and the value represents intensity or color at each location.">
    <text x="40" y="60" font-size="14" fill="#1976d2" font-weight="bold">1. Digital Image Definition</text>
    <text x="40" y="80" font-size="10" fill="#555">A 2D function f(x,y) representing a visual scene</text>
    <rect x="40" y="90" width="100" height="60" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="90" y="115" font-size="11" fill="#1976d2" text-anchor="middle" font-style="italic">f(x,y)</text>
    <text x="160" y="115" font-size="11" fill="#555" text-anchor="middle">→ intensity/color value</text>
    <text x="40" y="170" font-size="9" fill="#666">Origin (0,0) at top-left, x→right, y↓</text>
  </g>

  <g id="step2" class="step" data-narration="Digitization converts continuous images to digital form through two steps: sampling discretizes spatial coordinates, and quantization discretizes intensity values.">
    <text x="300" y="60" font-size="14" fill="#1976d2" font-weight="bold">2. Digitization Process</text>
    <text x="300" y="80" font-size="10" fill="#555">Converting continuous images to digital form</text>
    <rect x="300" y="90" width="70" height="50" fill="#ddd" rx="5"/>
    <text x="335" y="112" font-size="10" fill="#555" text-anchor="middle">Analog</text>
    <path d="M380 115 L410 115" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="395" y="105" font-size="8" fill="#1976d2" text-anchor="middle">Sampling</text>
    <rect x="420" y="90" width="70" height="50" fill="#bbb" rx="5"/>
    <text x="455" y="112" font-size="10" fill="#555" text-anchor="middle">Digital</text>
    <path d="M500 115 L530 115" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="515" y="105" font-size="8" fill="#1976d2" text-anchor="middle">Quantization</text>
    <rect x="540" y="90" width="60" height="50" fill="#999" rx="5"/>
    <text x="570" y="112" font-size="10" fill="#fff" text-anchor="middle">Levels</text>
    <text x="300" y="160" font-size="9" fill="#666">Sampling: discretize x,y | Quantization: discretize intensity</text>
  </g>

  <g id="step3" class="step" data-narration="A pixel is the smallest addressable unit in a digital image with location (x,y), a value representing intensity or color, and physical size.">
    <text x="40" y="190" font-size="14" fill="#388e3c" font-weight="bold">3. Pixels: Building Blocks</text>
    <text x="40" y="210" font-size="10" fill="#555">Smallest addressable unit in an image</text>
    <rect x="40" y="220" width="16" height="16" fill="#ccc"/>
    <rect x="56" y="220" width="16" height="16" fill="#aaa"/>
    <rect x="72" y="220" width="16" height="16" fill="#888"/>
    <rect x="56" y="236" width="16" height="16" fill="#666"/>
    <rect x="72" y="236" width="16" height="16" fill="#444"/>
    <text x="120" y="230" font-size="9" fill="#555">Pixel grid example</text>
    <rect x="40" y="255" width="130" height="45" fill="#e8f5e9" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="270" font-size="9" fill="#388e3c">Location: (x,y) coordinates</text>
    <text x="50" y="285" font-size="9" fill="#388e3c">Value: intensity or RGB color</text>
    <text x="50" y="295" font-size="8" fill="#666">Each pixel stores one intensity or color value</text>
  </g>

  <g id="step4" class="step" data-narration="Image resolution has two types: spatial resolution is width times height in pixels, while intensity resolution is bit depth determining distinct levels.">
    <text x="300" y="190" font-size="14" fill="#388e3c" font-weight="bold">4. Image Resolution</text>
    <text x="300" y="210" font-size="10" fill="#555">Pixel count and bit depth</text>
    <rect x="300" y="220" width="80" height="55" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="340" y="240" font-size="10" fill="#388e3c" text-anchor="middle">Spatial</text>
    <text x="340" y="255" font-size="9" fill="#555" text-anchor="middle">1920×1080</text>
    <rect x="400" y="220" width="80" height="55" fill="#c8e6c9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="440" y="240" font-size="10" fill="#388e3c" text-anchor="middle">Intensity</text>
    <text x="440" y="255" font-size="9" fill="#555" text-anchor="middle">8-bit = 256 levels</text>
    <text x="300" y="295" font-size="9" fill="#666">Common: VGA 640×480, HD 1280×720, Full HD 1920×1080, 4K 3840×2160</text>
  </g>

  <g id="step5" class="step" data-narration="Binary images use 1 bit per pixel (0 black, 1 white), grayscale uses 8 bits for 256 intensity levels, and color RGB uses 24 bits for 16.7 million colors.">
    <text x="40" y="325" font-size="14" fill="#ff9800" font-weight="bold">5. Image Types</text>
    <text x="40" y="345" font-size="10" fill="#555">Binary, Grayscale, and Color images</text>
    
    <rect x="40" y="355" width="50" height="40" fill="#fff3e0" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="65" y="375" font-size="9" fill="#ff9800" text-anchor="middle">Binary</text>
    <text x="65" y="388" font-size="7" fill="#666" text-anchor="middle">1-bit</text>
    <text x="95" y="375" font-size="8" fill="#666">0 or 1</text>
    
    <rect x="130" y="355" width="50" height="40" fill="#ffe0b2" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="155" y="375" font-size="9" fill="#ff9800" text-anchor="middle">Grayscale</text>
    <text x="155" y="388" font-size="7" fill="#666" text-anchor="middle">8-bit</text>
    <text x="185" y="375" font-size="8" fill="#666">0-255 levels</text>
    
    <rect x="220" y="355" width="50" height="40" fill="#ffcc80" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="245" y="370" font-size="9" fill="#ff9800" text-anchor="middle">RGB Color</text>
    <text x="245" y="382" font-size="7" fill="#666" text-anchor="middle">24-bit</text>
    <text x="275" y="370" font-size="8" fill="#666">R,G,B channels</text>
    <text x="275" y="382" font-size="8" fill="#666">16.7M colors</text>
    
    <rect x="320" y="355" width="18" height="18" fill="#333"/>
    <rect x="344" y="355" width="18" height="18" fill="#666"/>
    <rect x="368" y="355" width="18" height="18" fill="#999"/>
    <text x="355" y="388" font-size="7" fill="#666" text-anchor="middle">Grayscale gradient</text>
  </g>

  <g id="step6" class="step" data-narration="RGB represents color using Red, Green, and Blue channels from 0-255. Common examples are red as (255,0,0), white as (255,255,255), and black as (0,0,0).">
    <text x="40" y="415" font-size="14" fill="#9c27b0" font-weight="bold">6. RGB Color Model</text>
    <text x="40" y="435" font-size="10" fill="#555">Red, Green, Blue channels (0-255 each)</text>
    
    <rect x="40" y="445" width="20" height="20" fill="#f44336"/>
    <text x="70" y="458" font-size="9" fill="#555">Red (255,0,0)</text>
    
    <rect x="160" y="445" width="20" height="20" fill="#4caf50"/>
    <text x="190" y="458" font-size="9" fill="#555">Green (0,255,0)</text>
    
    <rect x="280" y="445" width="20" height="20" fill="#2196f3"/>
    <text x="310" y="458" font-size="9" fill="#555">Blue (0,0,255)</text>
    
    <rect x="400" y="445" width="20" height="20" fill="#fff" stroke="#999"/>
    <text x="430" y="458" font-size="9" fill="#555">White (255,255,255)</text>
    
    <rect x="500" y="445" width="20" height="20" fill="#000"/>
    <text x="530" y="458" font-size="9" fill="#555">Black (0,0,0)</text>
    
    <text x="40" y="485" font-size="9" fill="#666">RGB to Grayscale: Gray = 0.299×R + 0.587×G + 0.114×B (human eye is most sensitive to green)</text>
  </g>

  <g id="step7" class="step" data-narration="HSV separates hue, saturation, and value for intuitive color manipulation. YCbCr separates luminance from chrominance for better compression. LAB is perceptually uniform.">
    <text x="300" y="415" font-size="14" fill="#9c27b0" font-weight="bold">7. Color Spaces</text>
    <text x="300" y="435" font-size="10" fill="#555">Different ways to represent color</text>
    
    <rect x="300" y="445" width="70" height="50" fill="#f3e5f5" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="335" y="462" font-size="9" fill="#9c27b0" text-anchor="middle">HSV</text>
    <text x="335" y="477" font-size="7" fill="#666" text-anchor="middle">Hue, Saturation,</text>
    <text x="335" y="487" font-size="7" fill="#666" text-anchor="middle">Value</text>
    
    <rect x="380" y="445" width="70" height="50" fill="#e1bee7" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="415" y="462" font-size="9" fill="#9c27b0" text-anchor="middle">YCbCr</text>
    <text x="415" y="477" font-size="7" fill="#666" text-anchor="middle">Luminance +</text>
    <text x="415" y="487" font-size="7" fill="#666" text-anchor="middle">Chrominance</text>
    
    <rect x="460" y="445" width="70" height="50" fill="#d1c4e9" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="495" y="462" font-size="9" fill="#9c27b0" text-anchor="middle">LAB</text>
    <text x="495" y="477" font-size="7" fill="#666" text-anchor="middle">Lightness, A, B</text>
    <text x="495" y="487" font-size="7" fill="#666" text-anchor="middle">(perceptually uniform)</text>
    
    <text x="300" y="510" font-size="8" fill="#666">HSV: color segmentation | YCbCr: JPEG/video compression | LAB: color matching</text>
  </g>

  <g id="step8" class="step" data-narration="File size equals width times height times bits per pixel divided by eight. A 1920x1080 RGB image is about six megabytes uncompressed. PNG is lossless, JPEG is lossy.">
    <text x="550" y="60" font-size="14" fill="#f44336" font-weight="bold">8. File Size & Formats</text>
    <text x="550" y="80" font-size="10" fill="#555">Calculating image file sizes</text>
    
    <rect x="550" y="90" width="220" height="55" fill="#ffebee" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="660" y="108" font-size="10" fill="#f44336" text-anchor="middle">File Size Formula</text>
    <text x="660" y="125" font-size="11" fill="#555" text-anchor="middle">W × H × bits_per_pixel ÷ 8</text>
    <text x="660" y="138" font-size="8" fill="#666" text-anchor="middle">Example: 1920×1080×24÷8 = ~6MB</text>
    
    <rect x="550" y="155" width="100" height="40" fill="#ffcdd2" rx="4"/>
    <text x="600" y="175" font-size="9" fill="#f44336" text-anchor="middle">PNG</text>
    <text x="600" y="188" font-size="7" fill="#666" text-anchor="middle">Lossless</text>
    
    <rect x="660" y="155" width="100" height="40" fill="#ffcdd2" rx="4"/>
    <text x="710" y="175" font-size="9" fill="#f44336" text-anchor="middle">JPEG</text>
    <text x="710" y="188" font-size="7" fill="#666" text-anchor="middle">Lossy</text>
    
    <rect x="550" y="205" width="100" height="40" fill="#ef9a9a" rx="4"/>
    <text x="600" y="225" font-size="9" fill="#f44336" text-anchor="middle">BMP</text>
    <text x="600" y="238" font-size="7" fill="#666" text-anchor="middle">Uncompressed</text>
    
    <rect x="660" y="205" width="100" height="40" fill="#ef9a9a" rx="4"/>
    <text x="710" y="225" font-size="9" fill="#f44336" text-anchor="middle">TIFF</text>
    <text x="710" y="238" font-size="7" fill="#666" text-anchor="middle">Both</text>
  </g>
</svg>