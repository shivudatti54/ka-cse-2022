<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" font-size="20" fill="#1976d2" text-anchor="middle" font-weight="bold">Image Segmentation: Point, Line &amp; Edge Detection</text>

  <g class="step" id="step1" data-narration="Image segmentation divides an image into meaningful regions based on similar features like color, texture, or intensity, enabling computers to identify distinct objects.">
    <text x="40" y="55" font-size="14" fill="#1976d2" font-weight="bold">1. Image Segmentation Fundamentals</text>
    <text x="40" y="72" font-size="11" fill="#555">Partitioning image into regions with similar characteristics</text>
    <rect x="40" y="82" width="100" height="70" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="90" y="118" font-size="9" fill="#1976d2" text-anchor="middle">Original</text>
    <path d="M150 95 L170 95 L170 135 L150 135 Z" fill="#90caf9"/>
    <path d="M180 95 L220 95 L220 135 L180 135 Z" fill="#42a5f5"/>
    <path d="M150 145 L190 145 L190 165 L150 165 Z" fill="#1976d2"/>
    <path d="M200 145 L240 145 L240 165 L200 165 Z" fill="#0d47a1"/>
    <text x="195" y="175" font-size="9" fill="#1976d2" text-anchor="middle">Segmented</text>
    <path d="M145 120 L148 117" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g class="step" id="step2" data-narration="Global thresholding applies one threshold value to the entire image. Pixels above the threshold become white, below become black, creating a binary result.">
    <text x="330" y="55" font-size="14" fill="#388e3c" font-weight="bold">2. Global Thresholding</text>
    <text x="330" y="72" font-size="11" fill="#555">Single threshold for whole image</text>
    <rect x="330" y="82" width="80" height="60" fill="#e8f5e9" rx="5"/>
    <text x="370" y="112" font-size="9" fill="#388e3c" text-anchor="middle">Input</text>
    <rect x="420" y="82" width="80" height="60" fill="#fff" rx="5" stroke="#388e3c" stroke-width="1"/>
    <circle cx="440" cy="95" r="3" fill="#000"/>
    <circle cx="455" cy="105" r="3" fill="#000"/>
    <circle cx="435" cy="120" r="3" fill="#000"/>
    <circle cx="470" cy="125" r="3" fill="#000"/>
    <circle cx="450" cy="135" r="3" fill="#000"/>
    <text x="460" y="152" font-size="9" fill="#388e3c" text-anchor="middle">Binary</text>
    <text x="500" y="112" font-size="8" fill="#666">T=127</text>
  </g>

  <g class="step" id="step3" data-narration="Local thresholding adapts the threshold for each pixel based on its local neighborhood, handling varying lighting conditions across different image regions.">
    <text x="600" y="55" font-size="14" fill="#ff9800" font-weight="bold">3. Local Thresholding</text>
    <text x="600" y="72" font-size="11" fill="#555">Adaptive threshold per pixel region</text>
    <rect x="600" y="82" width="80" height="60" fill="#fff3e0" rx="5"/>
    <text x="640" y="112" font-size="9" fill="#ff9800" text-anchor="middle">Variable</text>
    <rect x="690" y="82" width="80" height="60" fill="#fff" rx="5" stroke="#ff9800" stroke-width="1"/>
    <rect x="695" y="87" width="35" height="25" fill="#000"/>
    <rect x="735" y="87" width="30" height="25" fill="#fff"/>
    <rect x="695" y="117" width="30" height="20" fill="#fff"/>
    <rect x="730" y="117" width="35" height="20" fill="#000"/>
    <text x="730" y="152" font-size="9" fill="#ff9800" text-anchor="middle">Adaptive</text>
  </g>

  <g class="step" id="step4" data-narration="Point detection identifies individual points like corners or vertices using algorithms such as the Harris corner detector or Laplacian of Gaussian.">
    <text x="40" y="195" font-size="14" fill="#f44336" font-weight="bold">4. Point Detection</text>
    <text x="40" y="212" font-size="11" fill="#555">Finding corners and distinctive points</text>
    <rect x="40" y="222" width="120" height="80" fill="#ffebee" rx="5"/>
    <rect x="50" y="232" width="100" height="60" fill="#fff" rx="3"/>
    <line x1="55" y1="280" x2="145" y2="280" stroke="#ccc" stroke-width="1"/>
    <line x1="55" y1="240" x2="55" y2="290" stroke="#ccc" stroke-width="1"/>
    <line x1="145" y1="240" x2="145" y2="290" stroke="#ccc" stroke-width="1"/>
    <line x1="55" y1="240" x2="145" y2="290" stroke="#ccc" stroke-width="1"/>
    <line x1="145" y1="240" x2="55" y2="290" stroke="#ccc" stroke-width="1"/>
    <circle cx="100" cy="262" r="5" fill="#f44336"/>
    <text x="100" y="315" font-size="9" fill="#f44336" text-anchor="middle">Corners Detected</text>
  </g>

  <g class="step" id="step5" data-narration="Line detection finds straight edges and boundaries in images using the Hough Transform or Sobel operator, identifying horizontal and vertical lines.">
    <text x="250" y="195" font-size="14" fill="#9c27b0" font-weight="bold">5. Line Detection</text>
    <text x="250" y="212" font-size="11" fill="#555">Detecting straight edges via Hough Transform</text>
    <rect x="250" y="222" width="120" height="80" fill="#f3e5f5" rx="5"/>
    <rect x="260" y="232" width="100" height="60" fill="#fff" rx="3"/>
    <line x1="270" y1="262" x2="350" y2="262" stroke="#9c27b0" stroke-width="3"/>
    <line x1="280" y1="240" x2="280" y2="290" stroke="#9c27b0" stroke-width="3"/>
    <line x1="265" y1="285" x2="345" y2="245" stroke="#9c27b0" stroke-width="3"/>
    <text x="310" y="315" font-size="9" fill="#9c27b0" text-anchor="middle">Lines Found</text>
  </g>

  <g class="step" id="step6" data-narration="Edge detection identifies boundaries between regions using gradient-based methods like Sobel or Canny, which detect intensity changes in the image.">
    <text x="460" y="195" font-size="14" fill="#1976d2" font-weight="bold">6. Edge Detection</text>
    <text x="460" y="212" font-size="11" fill="#555">Finding region boundaries via gradient</text>
    <rect x="460" y="222" width="120" height="80" fill="#e3f2fd" rx="5"/>
    <rect x="470" y="232" width="100" height="60" fill="#fff" rx="3"/>
    <path d="M475 250 Q520 245 565 255" fill="none" stroke="#1976d2" stroke-width="2"/>
    <path d="M480 270 Q520 275 560 265" fill="none" stroke="#1976d2" stroke-width="2"/>
    <path d="M485 290 Q520 285 555 295" fill="none" stroke="#1976d2" stroke-width="2"/>
    <text x="520" y="315" font-size="9" fill="#1976d2" text-anchor="middle">Edges Mapped</text>
  </g>

  <g class="step" id="step7" data-narration="Region growing starts with a seed pixel and iteratively adds nearby pixels that share similar characteristics until a stopping criterion is reached.">
    <text x="660" y="195" font-size="14" fill="#388e3c" font-weight="bold">7. Region Growing</text>
    <text x="660" y="212" font-size="11" fill="#555">Seed pixel expands to similar neighbors</text>
    <rect x="660" y="222" width="120" height="80" fill="#e8f5e9" rx="5"/>
    <circle cx="720" cy="262" r="8" fill="#388e3c"/>
    <text x="720" y="265" font-size="8" fill="#fff" text-anchor="middle">Seed</text>
    <circle cx="695" cy="250" r="8" fill="#81c784"/>
    <circle cx="745" cy="250" r="8" fill="#81c784"/>
    <circle cx="695" cy="275" r="8" fill="#81c784"/>
    <circle cx="745" cy="275" r="8" fill="#81c784"/>
    <circle cx="720" cy="240" r="6" fill="#a5d6a7"/>
    <circle cx="670" cy="262" r="6" fill="#a5d6a7"/>
    <circle cx="770" cy="262" r="6" fill="#a5d6a7"/>
    <text x="720" y="315" font-size="9" fill="#388e3c" text-anchor="middle">Region Formed</text>
  </g>

  <g class="step" id="step8" data-narration="The gradient magnitude formula calculates edge strength by combining horizontal and vertical gradients: magnitude equals square root of gradient X squared plus gradient Y squared.">
    <text x="40" y="345" font-size="14" fill="#e91e63" font-weight="bold">8. Key Formulas</text>
    <text x="40" y="365" font-size="11" fill="#555">Gradient Magnitude &amp; Laplacian</text>
    <rect x="40" y="375" width="200" height="55" fill="#fce4ec" rx="5" stroke="#e91e63" stroke-width="1"/>
    <text x="50" y="392" font-size="10" fill="#c2185b">Gradient Magnitude:</text>
    <text x="50" y="408" font-size="11" fill="#e91e63" font-weight="bold">√(I_x² + I_y²)</text>
    <text x="160" y="392" font-size="10" fill="#c2185b">Laplacian:</text>
    <text x="160" y="408" font-size="11" fill="#e91e63" font-weight="bold">∂²f/∂x² + ∂²f/∂y²</text>
  </g>

  <g class="step" id="step9" data-narration="Canny edge detection uses five steps: Gaussian smoothing to reduce noise, gradient calculation, non-maximum suppression, and double thresholding.">
    <text x="300" y="345" font-size="14" fill="#00796b" font-weight="bold">9. Canny Edge Detector</text>
    <text x="300" y="365" font-size="11" fill="#555">Multi-stage edge detection process</text>
    <rect x="300" y="375" width="220" height="55" fill="#e0f2f1" rx="5" stroke="#00796b" stroke-width="1"/>
    <rect x="310" y="385" width="38" height="35" fill="#b2dfdb" rx="3"/>
    <text x="329" y="405" font-size="7" fill="#00796b" text-anchor="middle">Gaussian</text>
    <rect x="353" y="385" width="38" height="35" fill="#80cbc4" rx="3"/>
    <text x="372" y="405" font-size="7" fill="#00796b" text-anchor="middle">Gradient</text>
    <rect x="396" y="385" width="38" height="35" fill="#4db6ac" rx="3"/>
    <text x="415" y="405" font-size="7" fill="#00796b" text-anchor="middle">Non-Max</text>
    <rect x="439" y="385" width="38" height="35" fill="#26a69a" rx="3"/>
    <text x="458" y="405" font-size="7" fill="#fff" text-anchor="middle">Threshold</text>
  </g>

  <g class="step" id="step10" data-narration="Otsu's method automatically finds the optimal threshold by minimizing the variance between foreground and background pixels in the image histogram.">
    <text x="580" y="345" font-size="14" fill="#5d4037" font-weight="bold">10. Otsu's Thresholding</text>
    <text x="580" y="365" font-size="11" fill="#555">Automatic optimal threshold selection</text>
    <rect x="580" y="375" width="180" height="55" fill="#efebe9" rx="5" stroke="#5d4037" stroke-width="1"/>
    <text x="670" y="395" font-size="9" fill="#5d4037" text-anchor="middle">Histogram</text>
    <path d="M595 415 L610 400 L625 412 L640 395 L655 408 L670 388 L685 405 L700 402 L745 415" fill="none" stroke="#5d4037" stroke-width="2"/>
    <line x1="670" y1="415" x2="670" y2="400" stroke="#ff5722" stroke-width="2" stroke-dasharray="3"/>
  </g>

  <g class="step" id="step11" data-narration="Connected component labeling assigns unique labels to each separate region in a binary image, enabling individual object identification and counting.">
    <text x="40" y="455" font-size="14" fill="#1565c0" font-weight="bold">11. Connected Components</text>
    <text x="40" y="475" font-size="11" fill="#555">Labeling separate object regions</text>
    <rect x="40" y="485" width="180" height="60" fill="#e3f2fd" rx="5" stroke="#1565c0" stroke-width="1"/>
    <rect x="50" y="495" width="30" height="30" fill="#1565c0"/>
    <rect x="85" y="495" width="30" height="30" fill="#1565c0"/>
    <rect x="120" y="495" width="30" height="30" fill="#fff" stroke="#1565c0"/>
    <rect x="155" y="495" width="30" height="30" fill="#1565c0"/>
    <text x="65" y="518" font-size="8" fill="#fff" text-anchor="middle">1</text>
    <text x="100" y="518" font-size="8" fill="#fff" text-anchor="middle">1</text>
    <text x="135" y="518" font-size="8" fill="#1565c0" text-anchor="middle">2</text>
    <text x="170" y="518" font-size="8" fill="#fff" text-anchor="middle">3</text>
  </g>

  <g class="step" id="step12" data-narration="Image segmentation enables real-world applications like medical tumor detection, autonomous vehicle road recognition, and satellite land cover classification.">
    <text x="280" y="455" font-size="14" fill="#00838f" font-weight="bold">12. Applications</text>
    <text x="280" y="475" font-size="11" fill="#555">Real-world uses of segmentation</text>
    <rect x="280" y="485" width="150" height="60" fill="#e0f7fa" rx="5" stroke="#00838f" stroke-width="1"/>
    <text x="355" y="502" font-size="9" fill="#006064" text-anchor="middle">Medical Imaging</text>
    <text x="355" y="517" font-size="9" fill="#006064" text-anchor="middle">Autonomous Vehicles</text>
    <text x="355" y="532" font-size="9" fill="#006064" text-anchor="middle">Satellite Analysis</text>
  </g>

  <g class="step" id="step13" data-narration="This diagram covered fundamental segmentation techniques including thresholding methods, point and line detection algorithms, and region growing approaches.">
    <text x="490" y="455" font-size="14" fill="#455a64" font-weight="bold">Summary</text>
    <text x="490" y="475" font-size="11" fill="#555">What we learned today</text>
    <rect x="490" y="485" width="270" height="60" fill="#eceff1" rx="5" stroke="#455a64" stroke-width="1"/>
    <text x="500" y="502" font-size="9" fill="#37474f">• Thresholding (Global, Local, Otsu)</text>
    <text x="500" y="517" font-size="9" fill="#37474f">• Point, Line &amp; Edge Detection</text>
    <text x="500" y="532" font-size="9" fill="#37474f">• Region Growing &amp; Connected Components</text>
  </g>
</svg>