<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2" />
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <g id="step1" class="step" data-narration="Patterns are repeated pixel arrangements with specific spatial relationships, found as shapes, textures, and color distributions in morphological image processing.">
    <text x="400" y="35" font-size="24" fill="#1976d2" text-anchor="middle" font-weight="bold">Patterns and Classes</text>
    <text x="400" y="55" font-size="14" fill="#388e3c" text-anchor="middle">Morphological Image Processing Concepts</text>
  </g>

  <g id="step2" class="step" data-narration="Line patterns consist of connected pixels forming linear structures, used for detecting edges and contours in binary images.">
    <rect x="30" y="75" width="150" height="110" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="105" y="95" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Line Patterns</text>
    <g transform="translate(55, 105)">
      <rect x="0" y="0" width="12" height="12" fill="#bbdefb" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="14" y="0" width="12" height="12" fill="#1976d2" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="28" y="0" width="12" height="12" fill="#1976d2" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="42" y="0" width="12" height="12" fill="#1976d2" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="56" y="0" width="12" height="12" fill="#bbdefb" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="0" y="14" width="12" height="12" fill="#bbdefb" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="14" y="14" width="12" height="12" fill="#bbdefb" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="28" y="14" width="12" height="12" fill="#1976d2" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="42" y="14" width="12" height="12" fill="#bbdefb" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="56" y="14" width="12" height="12" fill="#bbdefb" stroke="#90caf9" stroke-width="0.5"/>
    </g>
    <text x="105" y="175" font-size="9" fill="#1565c0" text-anchor="middle">Connected pixels</text>
  </g>

  <g id="step3" class="step" data-narration="Shape patterns represent specific geometric forms like circles or squares, identified and analyzed using morphological operations and feature descriptors.">
    <rect x="195" y="75" width="150" height="110" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="270" y="95" font-size="12" fill="#388e3c" text-anchor="middle" font-weight="bold">Shape Patterns</text>
    <rect x="245" y="110" width="25" height="25" fill="none" stroke="#2e7d32" stroke-width="2"/>
    <text x="257.5" y="155" font-size="8" fill="#2e7d32" text-anchor="middle">Square</text>
    <circle cx="300" cy="122" r="12" fill="none" stroke="#388e3c" stroke-width="2"/>
    <text x="300" y="155" font-size="8" fill="#388e3c" text-anchor="middle">Circle</text>
    <text x="270" y="175" font-size="9" fill="#2e7d32" text-anchor="middle">Geometric forms</text>
  </g>

  <g id="step4" class="step" data-narration="Texture patterns show repetitive microstructures with specific statistical properties, characterized by frequency and spatial distribution of intensity variations.">
    <rect x="360" y="75" width="150" height="110" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="435" y="95" font-size="12" fill="#ff9800" text-anchor="middle" font-weight="bold">Texture Patterns</text>
    <g transform="translate(380, 108)">
      <rect x="0" y="0" width="10" height="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="11" y="0" width="10" height="10" fill="#ffe0b2" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="22" y="0" width="10" height="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="33" y="0" width="10" height="10" fill="#ffe0b2" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="44" y="0" width="10" height="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="0" y="11" width="10" height="10" fill="#ffe0b2" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="11" y="11" width="10" height="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="22" y="11" width="10" height="10" fill="#ffe0b2" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="33" y="11" width="10" height="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="44" y="11" width="10" height="10" fill="#ffe0b2" stroke="#ffcc80" stroke-width="0.5"/>
    </g>
    <text x="435" y="175" font-size="9" fill="#ef6c00" text-anchor="middle">Repetitive structure</text>
  </g>

  <g id="step5" class="step" data-narration="Connected component class groups pixels sharing connectivity, forming continuous regions representing individual objects in binary images.">
    <rect x="525" y="75" width="245" height="110" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="647" y="95" font-size="12" fill="#9c27b0" text-anchor="middle" font-weight="bold">Classes Overview</text>
    <text x="647" y="115" font-size="10" fill="#7b1fa2" text-anchor="middle">Connected Component: Group of connected pixels</text>
    <text x="647" y="132" font-size="10" fill="#7b1fa2" text-anchor="middle">Filled Object: Completely filled regions</text>
    <text x="647" y="149" font-size="10" fill="#7b1fa2" text-anchor="middle">Boundary: Edge pixels of objects</text>
    <text x="647" y="172" font-size="9" fill="#6a1b9a" text-anchor="middle">Used for object classification</text>
  </g>

  <g id="step6" class="step" data-narration="Connected components use 4 or 8-connectivity to group adjacent pixels into continuous regions representing individual objects in binary images.">
    <rect x="30" y="205" width="240" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <text x="150" y="225" font-size="12" fill="#1976d2" text-anchor="middle" font-weight="bold">Connected Components</text>
    <g transform="translate(70, 240)">
      <rect x="0" y="0" width="14" height="14" fill="#1976d2" stroke="#1565c0" stroke-width="1"/>
      <rect x="16" y="0" width="14" height="14" fill="#1976d2" stroke="#1565c0" stroke-width="1"/>
      <rect x="32" y="0" width="14" height="14" fill="#e3f2fd" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="48" y="0" width="14" height="14" fill="#388e3c" stroke="#2e7d32" stroke-width="1"/>
      <rect x="0" y="16" width="14" height="14" fill="#1976d2" stroke="#1565c0" stroke-width="1"/>
      <rect x="16" y="16" width="14" height="14" fill="#e3f2fd" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="32" y="16" width="14" height="14" fill="#e3f2fd" stroke="#90caf9" stroke-width="0.5"/>
      <rect x="48" y="16" width="14" height="14" fill="#388e3c" stroke="#2e7d32" stroke-width="1"/>
      <rect x="64" y="16" width="14" height="14" fill="#388e3c" stroke="#2e7d32" stroke-width="1"/>
    </g>
    <text x="100" y="300" font-size="9" fill="#1565c0" text-anchor="middle">Component 1</text>
    <text x="180" y="300" font-size="9" fill="#2e7d32" text-anchor="middle">Component 2</text>
    <text x="150" y="316" font-size="9" fill="#1976d2" text-anchor="middle">4 or 8-connectivity</text>
  </g>

  <g id="step7" class="step" data-narration="Filled objects are regions completely filled with uniform color or intensity, contrasting with hollow structures containing internal holes or voids.">
    <rect x="290" y="205" width="240" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="410" y="225" font-size="12" fill="#388e3c" text-anchor="middle" font-weight="bold">Filled Objects</text>
    <g transform="translate(365, 245)">
      <rect x="0" y="0" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
      <rect x="16" y="0" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
      <rect x="32" y="0" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
      <rect x="0" y="16" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
      <rect x="16" y="16" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
      <rect x="32" y="16" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
      <rect x="0" y="32" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
      <rect x="16" y="32" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
      <rect x="32" y="32" width="14" height="14" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
    </g>
    <text x="410" y="310" font-size="10" fill="#2e7d32" text-anchor="middle">No internal holes</text>
    <text x="410" y="325" font-size="9" fill="#388e3c" text-anchor="middle">Uniform interior</text>
  </g>

  <g id="step8" class="step" data-narration="Boundary class defines edge pixels forming object contours, extracted via erosion to identify pixels separating different regions in images.">
    <rect x="550" y="205" width="220" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="660" y="225" font-size="12" fill="#ff9800" text-anchor="middle" font-weight="bold">Boundary Class</text>
    <g transform="translate(615, 245)">
      <rect x="0" y="0" width="14" height="14" fill="#ff9800" stroke="#ef6c00" stroke-width="1"/>
      <rect x="16" y="0" width="14" height="14" fill="#ff9800" stroke="#ef6c00" stroke-width="1"/>
      <rect x="32" y="0" width="14" height="14" fill="#ff9800" stroke="#ef6c00" stroke-width="1"/>
      <rect x="0" y="16" width="14" height="14" fill="#ff9800" stroke="#ef6c00" stroke-width="1"/>
      <rect x="16" y="16" width="14" height="14" fill="#fff3e0" stroke="#ffcc80" stroke-width="0.5"/>
      <rect x="32" y="16" width="14" height="14" fill="#ff9800" stroke="#ef6c00" stroke-width="1"/>
      <rect x="0" y="32" width="14" height="14" fill="#ff9800" stroke="#ef6c00" stroke-width="1"/>
      <rect x="16" y="32" width="14" height="14" fill="#ff9800" stroke="#ef6c00" stroke-width="1"/>
      <rect x="32" y="32" width="14" height="14" fill="#ff9800" stroke="#ef6c00" stroke-width="1"/>
    </g>
    <text x="660" y="310" font-size="10" fill="#ef6c00" text-anchor="middle">Edge highlighted</text>
    <text x="660" y="325" font-size="9" fill="#ff9800" text-anchor="middle">Contour extraction</text>
  </g>

  <g id="step9" class="step" data-narration="Key morphological operations include hit-or-miss testing, opening removes small details, and closing fills small holes while preserving larger features.">
    <rect x="30" y="345" width="740" height="100" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
    <text x="400" y="365" font-size="13" fill="#f44336" text-anchor="middle" font-weight="bold">Key Concepts</text>
    <text x="100" y="390" font-size="10" fill="#d32f2f" text-anchor="start" font-weight="bold">Hit-or-Miss:</text>
    <text x="105" y="405" font-size="9" fill="#c62828" text-anchor="start">Tests if pattern exists in image</text>
    <text x="100" y="420" font-size="10" fill="#d32f2f" text-anchor="start" font-weight="bold">Opening:</text>
    <text x="105" y="435" font-size="9" fill="#c62828" text-anchor="start">Erosion then dilation, preserves large features</text>
    <text x="280" y="390" font-size="10" fill="#d32f2f" text-anchor="start" font-weight="bold">Closing:</text>
    <text x="285" y="405" font-size="9" fill="#c62828" text-anchor="start">Dilation then erosion, fills small holes</text>
    <text x="280" y="420" font-size="10" fill="#d32f2f" text-anchor="start" font-weight="bold">Structural Element:</text>
    <text x="285" y="435" font-size="9" fill="#c62828" text-anchor="start">Small kernel for morphological operations</text>
    <text x="520" y="390" font-size="10" fill="#d32f2f" text-anchor="start" font-weight="bold">Connectedness:</text>
    <text x="525" y="405" font-size="9" fill="#c62828" text-anchor="start">Pixel relationship in patterns</text>
    <text x="520" y="420" font-size="10" fill="#d32f2f" text-anchor="start" font-weight="bold">Applications:</text>
    <text x="525" y="435" font-size="9" fill="#c62828" text-anchor="start">Medical imaging, autonomous vehicles, recognition</text>
  </g>

  <g id="step10" class="step" data-narration="Connected component algorithm iterates through pixels, checking intensity against threshold to identify and group connected regions in binary images.">
    <rect x="30" y="465" width="740" height="115" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
    <text x="400" y="485" font-size="13" fill="#9c27b0" text-anchor="middle" font-weight="bold">Connected Component Algorithm</text>
    <text x="60" y="510" font-size="9" fill="#7b1fa2" text-anchor="start" font-family="monospace">image = [[0, 0, 0], [0, 255, 0], [0, 0, 0]]</text>
    <text x="60" y="528" font-size="9" fill="#7b1fa2" text-anchor="start" font-family="monospace">for each pixel: if intensity > threshold, set mask = 1</text>
    <text x="60" y="546" font-size="9" fill="#7b1fa2" text-anchor="start" font-family="monospace">return mask representing connected region</text>
    <text x="400" y="568" font-size="10" fill="#6a1b9a" text-anchor="middle">Creates binary mask identifying pixels above threshold value</text>
  </g>
</svg>