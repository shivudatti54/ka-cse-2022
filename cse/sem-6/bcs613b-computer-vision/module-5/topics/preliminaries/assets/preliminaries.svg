<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1450">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowheadOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { font-family: 'Segoe UI', sans-serif; font-weight: 700; font-size: 22px; fill: white; }
    .subtitle-text { font-family: 'Segoe UI', sans-serif; font-weight: 600; font-size: 13px; }
    .body-text { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #333; }
    .label-text { font-family: 'Segoe UI', sans-serif; font-size: 9px; fill: #666; }
    .formula-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #1565c0; font-weight: 600; }
    .highlight { fill: #1976d2; }
    .network-line { stroke: #1976d2; stroke-width: 2; stroke-linecap: round; }
    .network-node { fill: #1976d2; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1450" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Network Basics! Today we'll explore Social Network Analysis fundamentals.">
    <rect x="0" y="0" width="800" height="55" fill="url(#titleGrad)" rx="0"/>
    <text x="400" y="35" text-anchor="middle" class="title-text">Network Basics and Social Network Analysis</text>
  </g>
  
  <!-- Step 1: What is SNA? -->
  <g class="step" id="step1" data-narration="Social Network Analysis examines relationships between social entities using visual and mathematical methods.">
    <rect x="40" y="65" width="720" height="85" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="60" y="85" class="subtitle-text" fill="#1976d2">What is Social Network Analysis?</text>
    <text x="60" y="105" class="body-text">SNA is the methodical study of relationships between social entities.</text>
    <text x="60" y="120" class="body-text">Entities: individuals, groups, organizations, computers, URLs.</text>
    <text x="60" y="135" class="body-text">Core Principle: <tspan class="highlight">Pattern of connections</tspan> matters - position influences outcomes.</text>
    <!-- Icon representation -->
    <circle cx="680" cy="108" r="25" fill="#fff" stroke="#1976d2" stroke-width="2"/>
    <circle cx="672" cy="102" r="6" fill="#1976d2"/>
    <circle cx="695" cy="100" r="5" fill="#1976d2"/>
    <circle cx="688" cy="118" r="6" fill="#1976d2"/>
    <line x1="678" y1="106" x2="690" y2="102" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="676" y1="110" x2="686" y2="116" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="690" y1="104" x2="688" y2="114" stroke="#1976d2" stroke-width="1.5"/>
  </g>
  
  <!-- Step 2: Three Levels -->
  <g class="step" id="step2" data-narration="SNA operates at three levels: Micro (individual nodes), Meso (groups/communities), and Macro (entire network).">
    <rect x="40" y="160" width="720" height="95" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="60" y="180" class="subtitle-text" fill="#388e3c">Three Levels of SNA</text>
    <!-- Three columns -->
    <rect x="60" y="195" width="200" height="50" fill="#fff" rx="5"/>
    <text x="160" y="210" text-anchor="middle" class="body-text" font-weight="600">MICRO (Ego)</text>
    <text x="160" y="228" text-anchor="middle" class="label-text">Individual nodes &amp; centrality</text>
    
    <rect x="300" y="195" width="200" height="50" fill="#fff" rx="5"/>
    <text x="400" y="210" text-anchor="middle" class="body-text" font-weight="600">MESO (Group)</text>
    <text x="400" y="228" text-anchor="middle" class="label-text">Communities &amp; clusters</text>
    
    <rect x="540" y="195" width="200" height="50" fill="#fff" rx="5"/>
    <text x="640" y="210" text-anchor="middle" class="body-text" font-weight="600">MACRO (Network)</text>
    <text x="640" y="228" text-anchor="middle" class="label-text">Density, diameter, size</text>
  </g>
  
  <!-- Step 3: Network Definition -->
  <g class="step" id="step3" data-narration="A network is a collection of nodes (V) connected by edges (E), forming a graph G=(V,E).">
    <rect x="40" y="265" width="720" height="90" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="60" y="285" class="subtitle-text" fill="#f57c00">Network Definition: G = (V, E)</text>
    
    <!-- Visual representation -->
    <circle cx="150" cy="330" r="20" fill="#ff9800" stroke="#fff" stroke-width="2"/>
    <text x="150" y="335" text-anchor="middle" fill="white" font-size="12" font-weight="bold">A</text>
    <circle cx="220" cy="330" r="20" fill="#ff9800" stroke="#fff" stroke-width="2"/>
    <text x="220" y="335" text-anchor="middle" fill="white" font-size="12" font-weight="bold">B</text>
    <circle cx="185" cy="280" r="20" fill="#ff9800" stroke="#fff" stroke-width="2"/>
    <text x="185" y="285" text-anchor="middle" fill="white" font-size="12" font-weight="bold">C</text>
    
    <line x1="170" y1="320" x2="175" y2="300" stroke="#e65100" stroke-width="3"/>
    <line x1="200" y1="320" x2="195" y2="300" stroke="#e65100" stroke-width="3"/>
    <line x1="170" y1="330" x2="205" y2="330" stroke="#e65100" stroke-width="3"/>
    
    <text x="280" y="295" class="formula-text">V = {A, B, C}</text>
    <text x="280" y="312" class="formula-text">E = {AB, AC, BC}</text>
    <text x="280" y="330" class="formula-text">G = (V, E)</text>
  </g>
  
  <!-- Step 4: Directed vs Undirected -->
  <g class="step" id="step4" data-narration="Undirected networks use symmetric lines (friendship), while directed networks use arrows showing relationship direction.">
    <rect x="40" y="365" width="720" height="100" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
    <text x="60" y="385" class="subtitle-text" fill="#7b1fa2">Directed vs Undirected Networks</text>
    
    <!-- Undirected side -->
    <rect x="60" y="400" width="280" height="55" fill="#fff" rx="5"/>
    <text x="200" y="418" text-anchor="middle" class="subtitle-text" fill="#7b1fa2">Undirected</text>
    <circle cx="140" cy="440" r="10" fill="#9c27b0"/>
    <text x="140" y="444" text-anchor="middle" fill="white" font-size="8">A</text>
    <circle cx="260" cy="440" r="10" fill="#9c27b0"/>
    <text x="260" y="444" text-anchor="middle" fill="white" font-size="8">B</text>
    <line x1="150" y1="440" x2="250" y2="440" stroke="#7b1fa2" stroke-width="2"/>
    <text x="200" y="460" text-anchor="middle" class="label-text">Symmetric: eAB = eBA</text>
    <text x="200" y="472" text-anchor="middle" class="label-text">Example: Facebook friendship</text>
    
    <!-- Directed side -->
    <rect x="380" y="400" width="280" height="55" fill="#fff" rx="5"/>
    <text x="520" y="418" text-anchor="middle" class="subtitle-text" fill="#7b1fa2">Directed (Digraph)</text>
    <circle cx="450" cy="440" r="10" fill="#9c27b0"/>
    <text x="450" y="444" text-anchor="middle" fill="white" font-size="8">A</text>
    <circle cx="590" cy="440" r="10" fill="#9c27b0"/>
    <text x="590" y="444" text-anchor="middle" fill="white" font-size="8">B</text>
    <path d="M 460 435 L 575 435" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="520" y="460" text-anchor="middle" class="label-text">Asymmetric: eAB ≠ eBA</text>
    <text x="520" y="472" text-anchor="middle" class="label-text">Example: Twitter follow</text>
  </g>
  
  <!-- Step 5: Weighted vs Unweighted -->
  <g class="step" id="step5" data-narration="Unweighted networks show presence/absence (1 or 0), while weighted networks show strength of connection with numerical values.">
    <rect x="40" y="475" width="720" height="100" fill="url(#redGrad)" rx="10" filter="url(#shadow)"/>
    <text x="60" y="495" class="subtitle-text" fill="#c62828">Weighted vs Unweighted Networks</text>
    
    <!-- Unweighted side -->
    <rect x="60" y="510" width="280" height="55" fill="#fff" rx="5"/>
    <text x="200" y="528" text-anchor="middle" class="subtitle-text" fill="#c62828">Unweighted</text>
    <circle cx="140" cy="550" r="12" fill="#f44336"/>
    <text x="140" y="554" text-anchor="middle" fill="white" font-size="9">A</text>
    <circle cx="260" cy="550" r="12" fill="#f44336"/>
    <text x="260" y="554" text-anchor="middle" fill="white" font-size="9">B</text>
    <line x1="152" y1="550" x2="248" y2="550" stroke="#c62828" stroke-width="3"/>
    <text x="200" y="575" text-anchor="middle" class="label-text">Binary: 1 (connected) or 0 (not)</text>
    
    <!-- Weighted side -->
    <rect x="380" y="510" width="280" height="55" fill="#fff" rx="5"/>
    <text x="520" y="528" text-anchor="middle" class="subtitle-text" fill="#c62828">Weighted</text>
    <circle cx="450" cy="550" r="12" fill="#f44336"/>
    <text x="450" y="554" text-anchor="middle" fill="white" font-size="9">A</text>
    <circle cx="590" cy="550" r="12" fill="#f44336"/>
    <text x="590" y="554" text-anchor="middle" fill="white" font-size="9">B</text>
    <line x1="462" y1="550" x2="578" y2="550" stroke="#c62828" stroke-width="3"/>
    <text x="520" y="550" text-anchor="middle" class="body-text" font-weight="bold" fill="#c62828">5</text>
    <text x="520" y="575" text-anchor="middle" class="label-text">Numerical value: strength/capacity</text>
  </g>
  
  <!-- Step 6: Degree - Undirected -->
  <g class="step" id="step6" data-narration="In undirected networks, degree is simply the count of edges connected to a node - how many friends you have.">
    <rect x="40" y="585" width="720" height="90" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
    <text x="60" y="605" class="subtitle-text" fill="#1976d2">Degree in Undirected Networks</text>
    
    <!-- Network diagram -->
    <circle cx="180" cy="650" r="18" fill="#1976d2"/>
    <text x="180" y="654" text-anchor="middle" fill="white" font-size="10" font-weight="bold">B</text>
    <circle cx="100" cy="650" r="18" fill="#42a5f5"/>
    <text x="100" y="654" text-anchor="middle" fill="white" font-size="10" font-weight="bold">A</text>
    <circle cx="260" cy="650" r="18" fill="#42a5f5"/>
    <text x="260" y="654" text-anchor="middle" fill="white" font-size="10" font-weight="bold">C</text>
    <circle cx="180" cy="560" r="18" fill="#42a5f5"/>
    <text x="180" y="564" text-anchor="middle" fill="white" font-size="10" font-weight="bold">D</text>
    
    <line x1="118" y1="650" x2="162" y2="650" stroke="#1976d2" stroke-width="2"/>
    <line x1="198" y1="650" x2="242" y2="650" stroke="#1976d2" stroke-width="2"/>
    <line x1="180" y1="632" x2="180" y2="578" stroke="#1976d2" stroke-width="2"/>
    
    <!-- Degree labels -->
    <rect x="300" y="615" width="180" height="50" fill="#fff" rx="5"/>
    <text x="390" y="635" text-anchor="middle" class="body-text" font-weight="bold">Node B has degree k=3</text>
    <text x="390" y="652" text-anchor="middle" class="label-text">Connected to A, C, and D</text>
    <text x="500" y="635" class="formula-text">kB = 3</text>
  </g>
  
  <!-- Step 7: Degree - Directed -->
  <g class="step" id="step7" data-narration="Directed networks have in-degree (incoming edges, like followers) and out-degree (outgoing edges, like following).">
    <rect x="40" y="685" width="720" height="95" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
    <text x="60" y="705" class="subtitle-text" fill="#388e3c">In-Degree and Out-Degree (Directed)</text>
    
    <!-- Directed network -->
    <circle cx="150" cy="755" r="20" fill="#4caf50"/>
    <text x="150" y="760" text-anchor="middle" fill="white" font-weight="bold">A</text>
    <circle cx="300" cy="755" r="20" fill="#4caf50"/>
    <text x="300" y="760" text-anchor="middle" fill="white" font-weight="bold">B</text>
    <circle cx="450" cy="755" r="20" fill="#4caf50"/>
    <text x="450" y="760" text-anchor="middle" fill="white" font-weight="bold">C</text>
    
    <path d="M 170 750 L 280 750" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 170 760 L 270 755" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 320 755 L 430 755" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Stats -->
    <rect x="500" y="720" width="240" height="50" fill="#fff" rx="5"/>
    <text x="520" y="738" class="body-text" font-weight="bold">Node A:</text>
    <text x="580" y="738" class="formula-text">kin = 0</text>
    <text x="640" y="738" class="formula-text">kout = 2</text>
    <text x="520" y="756" class="label-text">(no followers, follows 2 people)</text>
    
    <rect x="500" y="775" width="240" height="50" fill="#fff" rx="5"/>
    <text x="520" y="793" class="body-text" font-weight="bold">Node B:</text>
    <text x="580" y="793" class="formula-text">kin = 2</text>
    <text x="640" y="793" class="formula-text">kout = 1</text>
    <text x="520" y="811" class="label-text">(2 followers, follows 1 person)</text>
  </g>
  
  <!-- Step 8: Network Properties -->
  <g class="step" id="step8" data-narration="Network size is total nodes N, edges is M, and density measures how connected the network is - actual over possible edges.">
    <rect x="40" y="790" width="720" height="100" fill="url(#orangeGrad)" rx="10" filter="url(#shadow)"/>
    <text x="60" y="810" class="subtitle-text" fill="#f57c00">Network Properties: Size, Edges, Density</text>
    
    <!-- Small example network -->
    <circle cx="120" cy="860" r="15" fill="#ff9800"/>
    <text x="120" y="864" text-anchor="middle" fill="white" font-size="8">1</text>
    <circle cx="180" cy="860" r="15" fill="#ff9800"/>
    <text x="180" y="864" text-anchor="middle" fill="white" font-size="8">2</text>
    <circle cx="150" cy="810" r="15" fill="#ff9800"/>
    <text x="150" y="814" text-anchor="middle" fill="white" font-size="8">3</text>
    <circle cx="150" cy="910" r="15" fill="#ff9800"/>
    <text x="150" y="914" text-anchor="middle" fill="white" font-size="8">4</text>
    
    <line x1="133" y1="852" x2="147" y2="822" stroke="#e65100" stroke-width="2"/>
    <line x1="135" y1="858" x2="165" y2="858" stroke="#e65100" stroke-width="2"/>
    <line x1="147" y1="868" x2="150" y2="895" stroke="#e65100" stroke-width="2"/>
    <line x1="165" y1="868" x2="150" y2="895" stroke="#e65100" stroke-width="2"/>
    
    <!-- Formulas -->
    <rect x="200" y="800" width="200" height="80" fill="#fff" rx="5"/>
    <text x="300" y="820" text-anchor="middle" class="subtitle-text" fill="#f57c00">Given</text>
    <text x="220" y="842" class="formula-text">N = 4 nodes</text>
    <text x="220" y="860" class="formula-text">M = 4 edges</text>
    <text x="220" y="878" class="formula-text">Max edges = 4×3/2 = 6</text>
    
    <rect x="420" y="800" width="280" height="80" fill="#fff" rx="5"/>
    <text x="560" y="820" text-anchor="middle" class="subtitle-text" fill="#f57c00">Density Formula</text>
    <text x="440" y="850" class="formula-text">Density = (2×M) / (N×(N-1))</text>
    <text x="440" y="875" class="formula-text">= (2×4) / (4×3) = 8/12 = <tspan font-weight="bold" fill="#c62828">0.667</tspan></text>
  </g>
</svg>