<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565c0" />
      <stop offset="100%" stop-color="#42a5f5" />
    </linearGradient>
    <linearGradient id="thermalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d47a1" />
      <stop offset="25%" stop-color="#00bcd4" />
      <stop offset="50%" stop-color="#4caf50" />
      <stop offset="75%" stop-color="#ff9800" />
      <stop offset="100%" stop-color="#f44336" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step1" class="step" data-narration="Pseudocolor image processing assigns colors to grayscale intensity values. It helps reveal details invisible in black and white, using color to expose hidden patterns and information.">
    <text x="40" y="40" font-size="22" fill="#1565c0" font-weight="bold">Pseudocolor Image Processing</text>
    <text x="40" y="65" font-size="12" fill="#546e7a">Converts single-channel grayscale images into color for enhanced interpretation</text>
    <line x1="40" y1="75" x2="760" y2="75" stroke="#1976d2" stroke-width="2"/>
  </g>
  
  <g id="step2" class="step" data-narration="True color uses RGB channels from sensors to show natural hues. Pseudocolor arbitrarily maps colors to intensity values, transforming grayscale data into meaningful visualizations.">
    <rect x="50" y="100" width="280" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="190" y="125" font-size="14" fill="#1976d2" text-anchor="middle" font-weight="bold">TRUE COLOR</text>
    <text x="190" y="150" font-size="11" fill="#0d47a1" text-anchor="middle">RGB from sensors</text>
    <text x="190" y="163" font-size="11" fill="#0d47a1" text-anchor="middle">Real-world hues</text>
    
    <path d="M350 135 L390 135" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="370" y="125" font-size="10" fill="#ff9800" text-anchor="middle">Transformation</text>
    
    <rect x="410" y="100" width="280" height="70" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="550" y="125" font-size="14" fill="#e65100" text-anchor="middle" font-weight="bold">PSEUDOCOLOR</text>
    <text x="550" y="150" font-size="11" fill="#e65100" text-anchor="middle">Color assigned to intensity</text>
    <text x="550" y="163" font-size="11" fill="#e65100" text-anchor="middle">Enhances interpretation</text>
  </g>
  
  <g id="step3" class="step" data-narration="Intensity slicing divides the grayscale range into intervals. Each intensity band gets a specific color, creating a contour-like effect that makes subtle variations visible.">
    <text x="50" y="200" font-size="13" fill="#1565c0" font-weight="bold">Intensity Slicing Method</text>
    <rect x="50" y="215" width="650" height="40" fill="url(#thermalGrad)" rx="5"/>
    <rect x="50" y="215" width="130" height="40" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="180" y="215" width="130" height="40" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="310" y="215" width="130" height="40" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="440" y="215" width="130" height="40" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="570" y="215" width="130" height="40" fill="none" stroke="#fff" stroke-width="2"/>
    
    <text x="70" y="270" font-size="10" fill="#0d47a1">0-50</text>
    <text x="70" y="282" font-size="9" fill="#1565c0">Blue</text>
    <text x="200" y="270" font-size="10" fill="#00695c">51-100</text>
    <text x="200" y="282" font-size="9" fill="#2e7d32">Cyan-Green</text>
    <text x="330" y="270" font-size="10" fill="#f57f17">101-150</text>
    <text x="330" y="282" font-size="9" fill="#f9a825">Yellow</text>
    <text x="460" y="270" font-size="10" fill="#e65100">151-200</text>
    <text x="460" y="282" font-size="9" fill="#ef6c00">Orange</text>
    <text x="590" y="270" font-size="10" fill="#b71c1c">201-255</text>
    <text x="590" y="282" font-size="9" fill="#c62828">Red</text>
  </g>
  
  <g id="step4" class="step" data-narration="Transformation functions map each gray level to RGB components. Separate functions for red, green, and blue create smooth color transitions across the intensity range.">
    <text x="50" y="320" font-size="13" fill="#1565c0" font-weight="bold">Gray Level to Color Transformation</text>
    
    <rect x="50" y="340" width="100" height="50" fill="#616161" rx="5"/>
    <text x="100" y="370" font-size="11" fill="#fff" text-anchor="middle">Gray Input</text>
    
    <line x1="150" y1="365" x2="180" y2="365" stroke="#1976d2" stroke-width="2"/>
    
    <rect x="180" y="330" width="80" height="30" fill="#f44336" rx="4"/>
    <text x="220" y="350" font-size="9" fill="#fff" text-anchor="middle">R = T_R(f)</text>
    <rect x="180" y="365" width="80" height="30" fill="#4caf50" rx="4"/>
    <text x="220" y="385" font-size="9" fill="#fff" text-anchor="middle">G = T_G(f)</text>
    <rect x="180" y="400" width="80" height="30" fill="#2196f3" rx="4"/>
    <text x="220" y="420" font-size="9" fill="#fff" text-anchor="middle">B = T_B(f)</text>
    
    <line x1="260" y1="365" x2="290" y2="365" stroke="#1976d2" stroke-width="2"/>
    
    <rect x="290" y="340" width="100" height="70" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <text x="340" y="370" font-size="11" fill="#2e7d32" text-anchor="middle">Color Output</text>
    <text x="340" y="385" font-size="9" fill="#1b5e20" text-anchor="middle">RGB Image</text>
    
    <text x="450" y="350" font-size="10" fill="#546e7a">Example transforms:</text>
    <text x="450" y="365" font-size="9" fill="#78909c">R = |sin(πr/255)|</text>
    <text x="450" y="378" font-size="9" fill="#78909c">G = (r/255)²</text>
    <text x="450" y="391" font-size="9" fill="#78909c">B = √(r/255)</text>
  </g>
  
  <g id="step5" class="step" data-narration="Key applications include medical imaging to highlight tissues, satellite remote sensing for vegetation indices, thermal imaging for temperature maps, and scientific data visualization.">
    <text x="50" y="445" font-size="13" fill="#1565c0" font-weight="bold">Applications</text>
    
    <rect x="50" y="460" width="170" height="55" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="135" y="480" font-size="11" fill="#2e7d32" text-anchor="middle" font-weight="bold">Medical Imaging</text>
    <text x="135" y="498" font-size="9" fill="#1b5e20" text-anchor="middle">X-rays, MRI, tissue types</text>
    
    <rect x="235" y="460" width="170" height="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="320" y="480" font-size="11" fill="#1565c0" text-anchor="middle" font-weight="bold">Remote Sensing</text>
    <text x="320" y="498" font-size="9" fill="#0d47a1" text-anchor="middle">Satellite imagery, NDVI</text>
    
    <rect x="420" y="460" width="170" height="55" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="505" y="480" font-size="11" fill="#e65100" text-anchor="middle" font-weight="bold">Thermal Imaging</text>
    <text x="505" y="498" font-size="9" fill="#bf360c" text-anchor="middle">Temperature distribution</text>
    
    <rect x="605" y="460" width="170" height="55" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="690" y="480" font-size="11" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Scientific View</text>
    <text x="690" y="498" font-size="9" fill="#4a148c" text-anchor="middle">Microscopy, astronomy</text>
  </g>
  
  <g id="step6" class="step" data-narration="Three color schemes help visualization: sequential for ordered data like temperature, diverging for data with critical midpoints, and qualitative for categorical information.">
    <text x="50" y="535" font-size="13" fill="#1565c0" font-weight="bold">Color Mapping Schemes</text>
    
    <rect x="50" y="555" width="220" height="30" fill="url(#blueGrad)" rx="4"/>
    <text x="160" y="575" font-size="10" fill="#fff" text-anchor="middle">Sequential: Low → High</text>
    
    <rect x="285" y="555" width="220" height="30" fill="url(#thermalGrad)" rx="4"/>
    <text x="395" y="575" font-size="10" fill="#fff" text-anchor="middle">Diverging: Cold → Hot</text>
    
    <rect x="520" y="555" width="100" height="30" fill="#e8f5e9" rx="4"/>
    <rect x="523" y="558" width="28" height="24" fill="#4caf50" rx="2"/>
    <rect x="554" y="558" width="28" height="24" fill="#2196f3" rx="2"/>
    <text x="600" y="575" font-size="10" fill="#1565c0" text-anchor="middle">Qualitative</text>
  </g>
</svg>