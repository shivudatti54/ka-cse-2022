<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd" />
      <stop offset="100%" stop-color="#1976d2" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9" />
      <stop offset="100%" stop-color="#388e3c" />
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0" />
      <stop offset="100%" stop-color="#ff9800" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5f5" />
      <stop offset="100%" stop-color="#9c27b0" />
    </linearGradient>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffebee" />
      <stop offset="100%" stop-color="#f44336" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step0" class="step" data-narration="Color models are mathematical systems that represent colors as numbers, enabling consistent color creation and reproduction across different devices and applications in digital imaging.">
    <text x="400" y="35" font-size="22" fill="#1976d2" text-anchor="middle" font-weight="bold">Color Models in Digital Image Processing</text>
    <line x1="100" y1="48" x2="700" y2="48" stroke="#1976d2" stroke-width="2"/>
  </g>
  
  <g id="step1" class="step" data-narration="Color perception happens when light enters our eyes and our brain interprets the wavelengths. The visible spectrum ranges from 380nm (violet) to 750nm (red).">
    <rect x="50" y="65" width="340" height="55" fill="url(#gradOrange)" rx="5"/>
    <text x="60" y="85" font-size="11" fill="#e65100"><b>Nature of Color:</b> Light interacts with human visual system</text>
    <text x="60" y="108" font-size="11" fill="#e65100"><b>Visible Spectrum:</b> Violet (380nm) → Red (750nm)</text>
    <rect x="400" y="65" width="180" height="55" rx="5">
      <animate attributeName="fill" values="#fff3e0;#ffe0b2;#fff3e0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="410" y="85" font-size="10" fill="#bf360c">VIOLET</text>
    <rect x="405" y="92" width="20" height="8" fill="#8b00ff"/>
    <text x="435" y="100" font-size="10" fill="#bf360c">BLUE</text>
    <rect x="430" y="107" width="20" height="8" fill="#0000ff"/>
    <text x="460" y="100" font-size="10" fill="#bf360c">GREEN</text>
    <rect x="455" y="107" width="20" height="8" fill="#00ff00"/>
    <text x="485" y="100" font-size="10" fill="#bf360c">YELLOW</text>
    <rect x="480" y="107" width="20" height="8" fill="#ffff00"/>
    <text x="510" y="100" font-size="10" fill="#bf360c">RED</text>
    <rect x="505" y="107" width="20" height="8" fill="#ff0000"/>
  </g>
  
  <g id="step2" class="step" data-narration="Primary colors have two types: additive primaries (RGB) use light combination for screens, while subtractive primaries (CMY) use ink absorption for printing.">
    <text x="50" y="140" font-size="12" fill="#1976d2" font-weight="bold">Additive Primaries (RGB)</text>
    <rect x="50" y="148" width="130" height="45" fill="#ff0000" rx="3"/>
    <rect x="90" y="148" width="130" height="45" fill="#00ff00" rx="3"/>
    <rect x="130" y="148" width="130" height="45" fill="#0000ff" rx="3"/>
    <text x="100" y="172" font-size="10" fill="white" font-weight="bold">RED</text>
    <text x="145" y="172" font-size="10" fill="white" font-weight="bold">GREEN</text>
    <text x="185" y="172" font-size="10" fill="white" font-weight="bold">BLUE</text>
    <text x="50" y="210" font-size="10" fill="#388e3c">Used in: Monitors, TVs, Cameras</text>
    <line x1="185" y1="220" x2="250" y2="220" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    
    <text x="280" y="140" font-size="12" fill="#9c27b0" font-weight="bold">Subtractive Primaries (CMY)</text>
    <rect x="280" y="148" width="130" height="45" fill="#00ffff" rx="3"/>
    <rect x="320" y="148" width="130" height="45" fill="#ff00ff" rx="3"/>
    <rect x="360" y="148" width="130" height="45" fill="#ffff00" rx="3"/>
    <text x="315" y="172" font-size="10" fill="black" font-weight="bold">CYAN</text>
    <text x="360" y="172" font-size="10" fill="black" font-weight="bold">MAGENTA</text>
    <text x="400" y="172" font-size="10" fill="black" font-weight="bold">YELLOW</text>
    <text x="280" y="210" font-size="10" fill="#388e3c">Used in: Printers, Color presses</text>
  </g>
  
  <g id="step3" class="step" data-narration="The RGB model combines red, green, and blue light at different intensities (0-255) to create colors. Black is (0,0,0) and white is (255,255,255).">
    <rect x="50" y="235" width="340" height="60" fill="url(#gradBlue)" rx="5"/>
    <text x="60" y="255" font-size="12" fill="#0d47a1" font-weight="bold">RGB Color Model (Additive)</text>
    <text x="60" y="272" font-size="11" fill="#1565c0">Red, Green, Blue: 0-255 intensity range each</text>
    <text x="60" y="287" font-size="10" fill="#1976d2">(0,0,0) = Black | (255,255,255) = White</text>
    <rect x="400" y="235" width="180" height="60" fill="url(#gradGreen)" rx="5"/>
    <text x="410" y="255" font-size="11" fill="#1b5e20" font-weight="bold">RGB Cube Corner Points</text>
    <text x="410" y="272" font-size="9" fill="#2e7d32">Cyan (0,255,255) | Magenta (255,0,255)</text>
    <text x="410" y="285" font-size="9" fill="#2e7d32">Yellow (255,255,0) | White (255,255,255)</text>
    <text x="410" y="298" font-size="9" fill="#2e7d32">Black (0,0,0)</text>
  </g>
  
  <g id="step4" class="step" data-narration="CMY (Cyan, Magenta, Yellow) is for printing. Black (K) is added for better shadows and text. CMY conversion: C=1-R, M=1-G, Y=1-B.">
    <rect x="50" y="310" width="340" height="65" fill="url(#gradPurple)" rx="5"/>
    <text x="60" y="330" font-size="12" fill="#4a148c" font-weight="bold">CMY/K Color Model (Subtractive)</text>
    <text x="60" y="348" font-size="11" fill="#6a1b9a">Cyan, Magenta, Yellow + Black (K) for printing</text>
    <text x="60" y="366" font-size="10" fill="#7b1fa2">C = 1-(R/255) | M = 1-(G/255) | Y = 1-(B/255)</text>
    <rect x="400" y="310" width="180" height="65" fill="url(#gradRed)" rx="5"/>
    <text x="410" y="330" font-size="11" fill="#b71c1c" font-weight="bold">Why Add Black?</text>
    <text x="410" y="348" font-size="10" fill="#c62828">• Better shadow details</text>
    <text x="410" y="362" font-size="10" fill="#c62828">• Reduced ink consumption</text>
    <text x="410" y="376" font-size="10" fill="#c62828">• Improved text printing</text>
  </g>
  
  <g id="step5" class="step" data-narration="HSI separates color from brightness: Hue (0-360° color type), Saturation (0-100% purity), Intensity (0-100% brightness). Great for image processing.">
    <rect x="50" y="390" width="230" height="65" fill="url(#gradOrange)" rx="5"/>
    <text x="60" y="410" font-size="12" fill="#e65100" font-weight="bold">HSI Color Model (Perceptual)</text>
    <text x="60" y="428" font-size="11" fill="#ef6c00">Hue (0-360°), Saturation (0-1), Intensity (0-1)</text>
    <text x="60" y="446" font-size="10" fill="#f57c00">I = (R+G+B)/3</text>
    <circle cx="380" cy="422" r="30" fill="none" stroke="#ff9800" stroke-width="15"/>
    <text x="350" y="405" font-size="9" fill="#e65100">Hue</text>
    <text x="350" y="450" font-size="9" fill="#e65100">Saturation</text>
    <text x="400" y="458" font-size="9" fill="#e65100">Intensity</text>
    <rect x="420" y="390" width="160" height="65" fill="url(#gradBlue)" rx="5"/>
    <text x="430" y="410" font-size="11" fill="#0d47a1" font-weight="bold">Advantages for Processing</text>
    <text x="430" y="428" font-size="10" fill="#1565c0">• Separates color from brightness</text>
    <text x="430" y="442" font-size="10" fill="#1565c0">• Intuitive human perception</text>
    <text x="430" y="456" font-size="10" fill="#1565c0">• Good for color segmentation</text>
  </g>
  
  <g id="step6" class="step" data-narration="YCbCr separates luminance (Y brightness) from chrominance (Cb blue-difference, Cr red-difference). Essential for JPEG compression and video standards.">
    <rect x="50" y="470" width="280" height="60" fill="url(#gradGreen)" rx="5"/>
    <text x="60" y="490" font-size="12" fill="#1b5e20" font-weight="bold">YCbCr Color Model</text>
    <text x="60" y="508" font-size="11" fill="#2e7d32">Y = Luminance (brightness) | Cb, Cr = Chrominance</text>
    <text x="60" y="526" font-size="10" fill="#388e3c">Y = 0.299R + 0.587G + 0.114B</text>
    <rect x="340" y="470" width="240" height="60" fill="url(#gradRed)" rx="5"/>
    <text x="350" y="490" font-size="11" fill="#b71c1c" font-weight="bold">Applications</text>
    <text x="350" y="508" font-size="10" fill="#c62828">• JPEG/MPEG compression</text>
    <text x="350" y="522" font-size="10" fill="#c62828">• Digital TV standards</text>
    <text x="460" y="508" font-size="10" fill="#c62828">• Video transmission</text>
    <text x="460" y="522" font-size="10" fill="#c62828">• Chroma subsampling</text>
  </g>
  
  <g id="step7" class="step" data-narration="Choose RGB for displays, CMYK for printing, HSI for segmentation, YCbCr for compression, LAB for color matching. Model selection depends on your application.">
    <rect x="50" y="545" width="700" height="40" fill="url(#gradBlue)" rx="5"/>
    <text x="60" y="562" font-size="11" fill="#0d47a1" font-weight="bold">Model Selection Guide:</text>
    <text x="180" y="562" font-size="10" fill="#1565c0">RGB → Display devices</text>
    <text x="300" y="562" font-size="10" fill="#1565c0">CMYK → Printing</text>
    <text x="400" y="562" font-size="10" fill="#1565c0">HSI → Image segmentation</text>
    <text x="520" y="562" font-size="10" fill="#1565c0">YCbCr → Compression</text>
    <text x="640" y="562" font-size="10" fill="#1565c0">LAB → Color matching</text>
  </g>
</svg>