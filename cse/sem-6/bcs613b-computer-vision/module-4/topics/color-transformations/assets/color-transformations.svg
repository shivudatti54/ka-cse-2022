<svg viewBox="0 0 800 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <rect width="800" height="1350" fill="#f8f9fa"/>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; font-size: 11px; }
    .title { font-family: Arial, sans-serif; font-weight: bold; font-size: 14px; }
    .subtitle { font-family: Arial, sans-serif; font-size: 11px; }
    .body { font-family: Arial, sans-serif; font-size: 10px; }
    .label { font-family: Arial, sans-serif; font-size: 9px; }
  </style>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Color transformations in image processing modify color vectors using mathematical operations to achieve specific visual goals.">
    <rect x="50" y="10" width="700" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" class="title">Color Transformations in Image Processing</text>
    <text x="400" y="58" text-anchor="middle" fill="#555" class="subtitle">Comprehensive Visual Guide for CSE</text>
  </g>
  
  <!-- Step 1: Definition -->
  <g class="step" id="step1" data-narration="Color transformations are mathematical operations applied to color vectors that modify color components to achieve specific visual goals.">
    <rect x="30" y="70" width="740" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="70" width="5" height="85" rx="2" fill="url(#greenGrad)"/>
    <text x="50" y="92" fill="#1976d2" class="title">What are Color Transformations?</text>
    <text x="50" y="110" fill="#333" class="body">Mathematical operations applied to color vectors that modify color components to achieve</text>
    <text x="50" y="125" fill="#333" class="body">specific visual or analytical goals. Formula: <tspan class="formula" fill="#1976d2">s = T(r)</tspan></text>
    <text x="50" y="143" fill="#666" class="label">r = original color vector [R,G,B] | T = transformation function | s = transformed vector</text>
  </g>
  
  <!-- Step 2: Color Fundamentals -->
  <g class="step" id="step2" data-narration="The HSB model represents colors using Hue, Saturation, and Brightness for intuitive color manipulation.">
    <rect x="30" y="165" width="740" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="165" width="5" height="85" rx="2" fill="url(#orangeGrad)"/>
    <text x="50" y="187" fill="#1976d2" class="title">Color Fundamentals: HSB Model</text>
    
    <!-- Hue -->
    <circle cx="120" cy="225" r="18" fill="url(#redGrad)"/>
    <text x="120" y="200" text-anchor="middle" class="label" fill="#f44336" font-weight="bold">HUE</text>
    <text x="120" y="229" text-anchor="middle" fill="white" font-size="8">H</text>
    <text x="155" y="229" fill="#333" class="body">Dominant wavelength</text>
    
    <!-- Saturation -->
    <circle cx="320" cy="225" r="18" fill="url(#purpleGrad)"/>
    <text x="320" y="200" text-anchor="middle" class="label" fill="#9c27b0" font-weight="bold">SATURATION</text>
    <text x="320" y="229" text-anchor="middle" fill="white" font-size="8">S</text>
    <text x="355" y="229" fill="#333" class="body">Color purity</text>
    
    <!-- Brightness -->
    <circle cx="520" cy="225" r="18" fill="url(#blueGrad)"/>
    <text x="520" y="200" text-anchor="middle" class="label" fill="#1976d2" font-weight="bold">BRIGHTNESS</text>
    <text x="520" y="229" text-anchor="middle" fill="white" font-size="8">B</text>
    <text x="555" y="229" fill="#333" class="body">Light intensity</text>
  </g>
  
  <!-- Step 3: RGB Color Model -->
  <g class="step" id="step3" data-narration="RGB is the primary color model for display devices where each pixel is defined by Red, Green, and Blue values from 0 to 255.">
    <rect x="30" y="260" width="740" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="260" width="5" height="90" rx="2" fill="url(#redGrad)"/>
    <text x="50" y="282" fill="#1976d2" class="title">RGB Color Model</text>
    <text x="50" y="300" fill="#333" class="body">Primary model for display devices. Each pixel defined by Red, Green, Blue values [0-255]</text>
    
    <!-- RGB Cubes Visualization -->
    <rect x="80" y="310" width="50" height="50" fill="#ff0000" opacity="0.8"/>
    <rect x="135" y="310" width="50" height="50" fill="#00ff00" opacity="0.8"/>
    <rect x="190" y="310" width="50" height="50" fill="#0000ff" opacity="0.8"/>
    <rect x="100" y="365" width="50" height="50" fill="#ffff00" opacity="0.8"/>
    <rect x="155" y="365" width="50" height="50" fill="#00ffff" opacity="0.8"/>
    <rect x="210" y="365" width="50" height="50" fill="#ff00ff" opacity="0.8"/>
    
    <text x="290" y="320" fill="#333" class="body">Primary:</text>
    <text x="290" y="335" class="formula" fill="#d32f2f">R G B</text>
    <text x="290" y="350" fill="#333" class="body">Secondary:</text>
    <text x="290" y="365" class="formula" fill="#f57c00">C M Y</text>
  </g>
  
  <!-- Step 4: CMY/K Model -->
  <g class="step" id="step4" data-narration="CMY/K is used for color printing where Cyan, Magenta, Yellow, and Black are derived from RGB by subtracting from 1.">
    <rect x="30" y="360" width="740" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="360" width="5" height="85" rx="2" fill="url(#purpleGrad)"/>
    <text x="50" y="382" fill="#1976d2" class="title">CMY/K Color Model (Printing)</text>
    <text x="50" y="402" fill="#333" class="body">Used for color printing. Linear transformation from RGB:</text>
    
    <!-- CMY Formulas -->
    <text x="80" y="425" class="formula" fill="#7b1fa2">C = 1 - R</text>
    <text x="180" y="425" class="formula" fill="#7b1fa2">M = 1 - G</text>
    <text x="280" y="425" class="formula" fill="#7b1fa2">Y = 1 - B</text>
    
    <!-- K addition -->
    <rect x="400" y="375" width="350" height="60" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="410" y="395" class="formula" fill="#7b1fa2">K = min(C, M, Y)</text>
    <text x="410" y="415" class="body" fill="#333">K (Black) added for darker text and efficient printing</text>
  </g>
  
  <!-- Step 5: HSI Model -->
  <g class="step" id="step5" data-narration="HSI model separates color information (Hue, Saturation) from intensity, enabling independent processing of brightness and color.">
    <rect x="30" y="455" width="740" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="455" width="5" height="90" rx="2" fill="url(#greenGrad)"/>
    <text x="50" y="477" fill="#1976d2" class="title">HSI Model (Hue, Saturation, Intensity)</text>
    <text x="50" y="497" fill="#333" class="body">Separates color info (H,S) from intensity (I) for independent processing</text>
    
    <!-- HSI Formulas -->
    <rect x="50" y="510" width="220" height="25" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="60" y="527" class="formula" fill="#2e7d32">I = (R + G + B) / 3</text>
    
    <rect x="280" y="510" width="220" height="25" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="290" y="527" class="formula" fill="#f57c00">S = 1 - min(R,G,B)/I</text>
    
    <rect x="510" y="510" width="220" height="25" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="520" y="527" class="formula" fill="#1565c0">H = f(R, G, B)</text>
  </g>
  
  <!-- Step 6: Linear Transformations -->
  <g class="step" id="step6" data-narration="Linear transformations use matrix operations on color vectors, enabling effects like grayscale conversion and white balance adjustments.">
    <rect x="30" y="555" width="740" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="555" width="5" height="95" rx="2" fill="url(#blueGrad)"/>
    <text x="50" y="577" fill="#1976d2" class="title">Linear Transformations (Matrix Form)</text>
    <text x="50" y="597" fill="#333" class="body">Apply matrix operations to color vectors:</text>
    
    <!-- Matrix equation -->
    <text x="80" y="620" class="formula" fill="#1976d2" font-size="12">[ R' ]   [ a11 a12 a13 ]   [ R ]</text>
    <text x="80" y="637" class="formula" fill="#1976d2" font-size="12">[ G' ] = [ a21 a22 a23 ] x [ G ]</text>
    <text x="80" y="654" class="formula" fill="#1976d2" font-size="12">[ B' ]   [ a31 a32 a33 ]   [ B ]</text>
    
    <!-- Examples -->
    <rect x="350" y="575" width="400" height="65" rx="5" fill="#e3f2fd"/>
    <text x="360" y="592" class="body" fill="#333"><tspan font-weight="bold">Examples:</tspan></text>
    <text x="360" y="608" class="formula" fill="#1976d2">Grayscale: I = 0.299R + 0.587G + 0.114B</text>
    <text x="360" y="625" class="formula" fill="#1976d2">White Balance: diagonal matrix</text>
  </g>
  
  <!-- Step 7: Nonlinear Transformations -->
  <g class="step" id="step7" data-narration="Nonlinear transformations like gamma correction and logarithmic functions modify color relationships non-uniformly.">
    <rect x="30" y="660" width="740" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="660" width="5" height="95" rx="2" fill="url(#orangeGrad)"/>
    <text x="50" y="682" fill="#1976d2" class="title">Nonlinear Transformations</text>
    <text x="50" y="702" fill="#333" class="body">Functions that do not preserve linear relationships:</text>
    
    <!-- Gamma Correction -->
    <rect x="50" y="715" width="230" height="30" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="60" y="732" class="formula" fill="#f57c00">Gamma: s = c x r^y</text>
    
    <!-- Log -->
    <rect x="290" y="715" width="230" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="300" y="732" class="formula" fill="#2e7d32">Logarithmic: s = c log(1+r)</text>
    
    <!-- Power Law -->
    <rect x="530" y="715" width="220" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="540" y="732" class="formula" fill="#1565c0">Power-law: s = c r^y</text>
    
    <!-- Gamma explanation -->
    <text x="50" y="765" class="label" fill="#333">y less than 1: Brightens</text>
    <text x="180" y="765" class="label" fill="#333">y greater than 1: Darkens</text>
  </g>
  
  <!-- Step 8: Component-wise vs Inter-channel -->
  <g class="step" id="step8" data-narration="Component-wise applies same function to each channel separately, while inter-channel transformations use all channels together.">
    <rect x="30" y="765" width="740" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="765" width="5" height="95" rx="2" fill="url(#redGrad)"/>
    <text x="50" y="787" fill="#1976d2" class="title">Component-wise vs Inter-channel Transformations</text>
    
    <!-- Component-wise -->
    <rect x="50" y="800" width="340" height="50" rx="5" fill="#ffebee" stroke="#f44336"/>
    <text x="60" y="820" class="body" fill="#333"><tspan font-weight="bold">Component-wise:</tspan> Same function to each channel</text>
    <text x="60" y="838" class="formula" fill="#d32f2f">R' = T(R), G' = T(G), B' = T(B)</text>
    
    <!-- Arrow -->
    <path d="M410 815 L450 815" stroke="#333" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="430" y="805" text-anchor="middle" class="label" fill="#333">same T</text>
    
    <!-- Inter-channel -->
    <rect x="470" y="800" width="290" height="50" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="480" y="820" class="body" fill="#333"><tspan font-weight="bold">Inter-channel:</tspan> Channels depend on each other</text>
    <text x="480" y="838" class="formula" fill="#7b1fa2">R' = T1(R,G,B), G' = T2(R,G,B)...</text>
  </g>
  
  <!-- Step 9: Color Space Conversions -->
  <g class="step" id="step9" data-narration="Color space conversion pipeline transforms images between different color representations like RGB, HSI, YCbCr, and LAB.">
    <rect x="30" y="870" width="740" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="30" y="870" width="5" height="90" rx="2" fill="url(#greenGrad)"/>
    <text x="50" y="892" fill="#1976d2" class="title">Color Space Conversions Pipeline</text>
    
    <!-- Pipeline -->
    <rect x="60" y="910" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="110" y="932" text-anchor="middle" class="body" fill="#1976d2">Input Image</text>
    
    <path d="M165 927 L190 927" stroke="#333" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <rect x="195" y="910" width="100" height="35" rx="5" fill="#fff3e0" stroke="#ff9800"/>
    <text x="245" y="932" text-anchor="middle" class="body" fill="#f57c00">Color Space</text>
    <text x="245" y="942" text-anchor="middle" class="body" fill="#f57c00">Conversion</text>
    
    <path d="M300 927 L325 927" stroke="#333" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <rect x="330" y="910" width="100" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="380" y="932" text-anchor="middle" class="body" fill="#2e7d32">Apply</text>
    <text x="380" y="942" text-anchor="middle" class="body" fill="#2e7d32">Transform</text>
    
    <path d="M435 927 L460 927" stroke="#333" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <rect x="465" y="910" width="100" height="35" rx="5" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="515" y="932" text-anchor="middle" class="body" fill="#7b1fa2">Inverse</text>
    <text x="515" y="942" text-anchor="middle" class="body" fill="#7b1fa2">Conversion</text>
    
    <path d="M570 927 L595 927" stroke="#333" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <rect x="600" y="910" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="650" y="932" text-anchor="middle" class="body" fill="#1976d2">Output Image</text>
    
    <!-- RGB to HSI note -->
    <text x="50" y="965" class="body" fill="#333">Common conversions: RGB-HSI, RGB-YCbCr, RGB-LAB</text>
  </g>
</svg>