<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Multimedia Playback">
    <text x="50" y="50" font-size="24" fill="#2563eb">Multimedia Playback in Android</text>
    <text x="50" y="80" font-size="18" fill="#8b5cf6">Enabling users to consume audio and video content</text>
    <rect x="50" y="120" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="60" y="180" font-size="18" fill="#ffffff">Android</text>
  </g>
  <g id="step1" data-narration="MediaPlayer Class for Audio and Video Playback">
    <use href="#step0" x="0" y="0"/>
    <rect x="300" y="120" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="310" y="180" font-size="18" fill="#ffffff">MediaPlayer</text>
    <line x1="250" y1="170" x2="300" y2="170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step2" data-narration="Key Methods of MediaPlayer">
    <use href="#step1" x="0" y="0"/>
    <rect x="500" y="120" width="200" height="200" fill="#8b5cf6" rx="10"/>
    <text x="510" y="150" font-size="14" fill="#ffffff">setDataSource()</text>
    <text x="510" y="170" font-size="14" fill="#ffffff">prepare()</text>
    <text x="510" y="190" font-size="14" fill="#ffffff">start()</text>
    <text x="510" y="210" font-size="14" fill="#ffffff">pause()</text>
    <line x1="450" y1="170" x2="500" y2="170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step3" data-narration="State Diagram of MediaPlayer">
    <use href="#step2" x="0" y="0"/>
    <rect x="50" y="300" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="330" font-size="18" fill="#ffffff">Idle</text>
    <line x1="250" y1="330" x2="300" y2="330" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="300" y="300" width="200" height="50" fill="#2563eb" rx="10"/>
    <text x="310" y="330" font-size="18" fill="#ffffff">Initialized</text>
  </g>
  <g id="step4" data-narration="VideoView Class for Video Playback">
    <use href="#step3" x="0" y="0"/>
    <rect x="500" y="300" width="200" height="100" fill="#8b5cf6" rx="10"/>
    <text x="510" y="330" font-size="18" fill="#ffffff">VideoView</text>
    <line x1="450" y1="330" x2="500" y2="330" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step5" data-narration="Implementing Audio Playback using MediaPlayer">
    <use href="#step4" x="0" y="0"/>
    <rect x="50" y="400" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="60" y="430" font-size="18" fill="#ffffff">Audio Playback</text>
    <line x1="250" y1="430" x2="300" y2="430" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="300" y="400" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="310" y="430" font-size="18" fill="#ffffff">MediaPlayer</text>
  </g>
</svg>