<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">VM Lifecycle States</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Virtual machines transition through several states from creation to deletion, managed by the hypervisor.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">State diagram showing VM transitions</text>
  </g>

  <g id="step1" class="step" data-narration="A VM begins in the Created state after being configured with CPU, memory, disk, and network resources.">
    <rect x="50" y="120" width="140" height="60" rx="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="2.5"/>
    <text x="120" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Created</text>
  </g>

  <g id="step2" class="step" data-narration="Powering on transitions the VM to Running state where it actively uses CPU, memory, and I/O resources.">
    <line x1="190" y1="150" x2="280" y2="150" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="235" y="140" text-anchor="middle" font-size="10" fill="#1976d2">Power On</text>
    <rect x="290" y="120" width="140" height="60" rx="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="2.5"/>
    <text x="360" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Running</text>
  </g>

  <g id="step3" class="step" data-narration="A running VM can be suspended to save its memory state to disk, pausing all processing.">
    <line x1="430" y1="150" x2="520" y2="150" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="475" y="140" text-anchor="middle" font-size="10" fill="#ff9800">Suspend</text>
    <rect x="530" y="120" width="140" height="60" rx="30" fill="#fff3e0" stroke="#ff9800" stroke-width="2.5"/>
    <text x="600" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Suspended</text>
  </g>

  <g id="step4" class="step" data-narration="Resuming restores from saved state. Power off stops the VM cleanly, returning to stopped state.">
    <line x1="530" y1="170" x2="430" y2="170" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="480" y="190" text-anchor="middle" font-size="10" fill="#388e3c">Resume</text>
    <line x1="360" y1="180" x2="360" y2="280" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="390" y="235" font-size="10" fill="#f44336">Power Off</text>
    <rect x="290" y="290" width="140" height="60" rx="30" fill="#ffebee" stroke="#f44336" stroke-width="2.5"/>
    <text x="360" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Stopped</text>
  </g>

  <g id="step5" class="step" data-narration="A stopped VM can be restarted or permanently deleted to free all resources.">
    <line x1="290" y1="310" x2="195" y2="250" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="220" y="268" font-size="10" fill="#1976d2">Restart</text>
    <line x1="290" y1="330" x2="190" y2="420" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="220" y="385" font-size="10" fill="#9c27b0">Delete</text>
    <rect x="50" y="400" width="140" height="60" rx="30" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2.5"/>
    <text x="120" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="#7b1fa2">Deleted</text>
    <line x1="195" y1="250" x2="300" y2="180" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step6" class="step" data-narration="Snapshots can be taken at any running state to capture a point-in-time copy for backup or testing.">
    <rect x="530" y="270" width="200" height="100" rx="8" fill="#fffde7" stroke="#ffc107" stroke-width="2"/>
    <text x="630" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">Snapshots</text>
    <text x="630" y="315" text-anchor="middle" font-size="11" fill="#333">Point-in-time copy</text>
    <text x="630" y="335" text-anchor="middle" font-size="11" fill="#333">Memory + Disk state</text>
    <text x="630" y="355" text-anchor="middle" font-size="11" fill="#333">Revert to any snapshot</text>
    <line x1="430" y1="150" x2="530" y2="300" stroke="#ffc107" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <g id="step7" class="step" data-narration="The complete lifecycle enables flexible management of VMs from creation through operation to retirement.">
    <rect x="100" y="510" width="600" height="50" rx="8" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="400" y="540" text-anchor="middle" font-size="13" fill="#37474f" font-weight="bold">Created - Running - Suspended - Stopped - Deleted</text>
  </g>
</svg>
