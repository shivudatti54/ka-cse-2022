<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Virtual Machine Components</text>

  <g id="step0" class="step" data-narration="A virtual machine emulates a physical computer using software-defined components managed by a hypervisor.">
    <rect x="40" y="50" width="720" height="70" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">Overview</text>
    <text x="400" y="98" text-anchor="middle" font-size="13" fill="#616161">VM emulates physical computer using software-defined components</text>
    <text x="400" y="113" text-anchor="middle" font-size="12" fill="#616161">Key components: vCPU, vMemory, vDisk, vNetwork</text>
  </g>

  <g id="step1" class="step" data-narration="The hypervisor sits on physical hardware and manages all virtual machines and their resource allocation.">
    <rect x="40" y="130" width="720" height="75" fill="#bbdefb" rx="8" stroke="#1976d2" stroke-width="2.5"/>
    <text x="400" y="157" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">Hypervisor (VMM)</text>
    <text x="400" y="177" text-anchor="middle" font-size="12" fill="#1565c0">Manages all virtual machines and resource allocation</text>
    <rect x="80" y="185" width="640" height="12" fill="#1976d2" rx="4" opacity="0.3"/>
    <text x="400" y="195" text-anchor="middle" font-size="11" fill="#1565c0">Physical Hardware Layer</text>
  </g>

  <g id="step2" class="step" data-narration="Virtual CPUs are allocated from physical cores. Multiple vCPUs can share physical cores through scheduling.">
    <rect x="40" y="215" width="340" height="85" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="210" y="240" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">vCPU (Virtual CPU)</text>
    <text x="210" y="260" text-anchor="middle" font-size="11" fill="#e65100">Allocated from physical cores</text>
    <rect x="70" y="270" width="130" height="20" fill="#ffe0b2" rx="4"/>
    <text x="135" y="284" text-anchor="middle" font-size="10" fill="#e65100">CPU Scheduling</text>
    <rect x="220" y="270" width="130" height="20" fill="#ffe0b2" rx="4"/>
    <text x="285" y="284" text-anchor="middle" font-size="10" fill="#e65100">CPU Affinity</text>
  </g>

  <g id="step3" class="step" data-narration="Virtual memory is allocated from physical RAM with techniques like ballooning and overcommitment.">
    <rect x="420" y="215" width="340" height="85" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="240" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">vMemory (Virtual Memory)</text>
    <text x="590" y="260" text-anchor="middle" font-size="11" fill="#2e7d32">Allocated from physical RAM</text>
    <rect x="450" y="270" width="130" height="20" fill="#c8e6c9" rx="4"/>
    <text x="515" y="284" text-anchor="middle" font-size="10" fill="#2e7d32">Ballooning</text>
    <rect x="600" y="270" width="130" height="20" fill="#c8e6c9" rx="4"/>
    <text x="665" y="284" text-anchor="middle" font-size="10" fill="#2e7d32">Overcommit</text>
  </g>

  <g id="step4" class="step" data-narration="Virtual disks store the VM operating system and data, using thick or thin provisioning strategies.">
    <rect x="40" y="310" width="340" height="85" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="210" y="335" text-anchor="middle" font-size="16" font-weight="bold" fill="#7b1fa2">vDisk (Virtual Disk)</text>
    <text x="210" y="355" text-anchor="middle" font-size="11" fill="#7b1fa2">Stores OS and data</text>
    <rect x="70" y="365" width="130" height="20" fill="#e1bee7" rx="4"/>
    <text x="135" y="379" text-anchor="middle" font-size="10" fill="#7b1fa2">Thick Provision</text>
    <rect x="220" y="365" width="130" height="20" fill="#e1bee7" rx="4"/>
    <text x="285" y="379" text-anchor="middle" font-size="10" fill="#7b1fa2">Thin Provision</text>
  </g>

  <g id="step5" class="step" data-narration="Virtual network adapters connect VMs to virtual switches and then to physical networks for communication.">
    <rect x="420" y="310" width="340" height="85" fill="#fce4ec" rx="8" stroke="#e91e63" stroke-width="2"/>
    <text x="590" y="335" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">vNetwork (Virtual Network)</text>
    <text x="590" y="355" text-anchor="middle" font-size="11" fill="#c62828">Connects VMs to networks</text>
    <rect x="490" y="365" width="200" height="20" fill="#f8bbd0" rx="4"/>
    <text x="590" y="379" text-anchor="middle" font-size="10" fill="#c62828">Virtual Switch (vSwitch)</text>
  </g>

  <g id="step6" class="step" data-narration="All virtual components connect through the hypervisor which maps them to actual physical resources below.">
    <rect x="40" y="405" width="720" height="75" fill="#fffde7" rx="8" stroke="#ffc107" stroke-width="2"/>
    <text x="400" y="430" text-anchor="middle" font-size="16" font-weight="bold" fill="#f57f17">Resource Mapping Layer</text>
    <text x="400" y="450" text-anchor="middle" font-size="12" fill="#f57f17">Hypervisor maps virtual components to physical resources</text>
    <line x1="210" y1="300" x2="210" y2="405" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="590" y1="300" x2="590" y2="405" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="210" y1="395" x2="210" y2="405" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="590" y1="395" x2="590" y2="405" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
</svg>
