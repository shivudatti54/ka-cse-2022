<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Disk Provisioning Types</text>

  <g id="step0" class="step" data-narration="Disk provisioning determines how virtual disk space is allocated from the physical storage pool.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">Thick vs Thin provisioning comparison</text>
  </g>

  <g id="step1" class="step" data-narration="Thick Eager provisioning allocates all disk space immediately and zeroes it out for maximum performance.">
    <rect x="50" y="90" width="320" height="180" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">Thick Eager Zeroed</text>
    <rect x="70" y="130" width="280" height="30" rx="4" fill="#1976d2"/>
    <text x="210" y="150" text-anchor="middle" font-size="12" fill="white">100GB Allocated + Zeroed</text>
    <text x="210" y="185" text-anchor="middle" font-size="12" fill="#333">All space reserved upfront</text>
    <text x="210" y="205" text-anchor="middle" font-size="12" fill="#388e3c">Best performance</text>
    <text x="210" y="225" text-anchor="middle" font-size="12" fill="#f44336">Most storage waste</text>
    <rect x="70" y="235" width="280" height="20" rx="4" fill="#bbdefb"/>
    <text x="210" y="250" text-anchor="middle" font-size="10" fill="#1565c0">Use case: Production databases</text>
  </g>

  <g id="step2" class="step" data-narration="Thick Lazy provisioning reserves space but does not zero it until first write, saving initialization time.">
    <rect x="50" y="290" width="320" height="160" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="210" y="315" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">Thick Lazy Zeroed</text>
    <rect x="70" y="330" width="280" height="30" rx="4" fill="#ff9800"/>
    <text x="210" y="350" text-anchor="middle" font-size="12" fill="white">100GB Reserved (not zeroed)</text>
    <text x="210" y="385" text-anchor="middle" font-size="12" fill="#333">Space reserved, zeroed on first write</text>
    <text x="210" y="405" text-anchor="middle" font-size="12" fill="#ff9800">Good performance</text>
    <rect x="70" y="420" width="280" height="20" rx="4" fill="#ffe0b2"/>
    <text x="210" y="435" text-anchor="middle" font-size="10" fill="#e65100">Use case: General workloads</text>
  </g>

  <g id="step3" class="step" data-narration="Thin provisioning only uses storage as data is written, allowing overcommitment of physical storage.">
    <rect x="430" y="90" width="320" height="180" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">Thin Provisioned</text>
    <rect x="450" y="130" width="100" height="30" rx="4" fill="#388e3c"/>
    <rect x="550" y="130" width="180" height="30" rx="4" fill="#e8e8e8" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="500" y="150" text-anchor="middle" font-size="11" fill="white">20GB Used</text>
    <text x="640" y="150" text-anchor="middle" font-size="11" fill="#999">80GB Available</text>
    <text x="590" y="185" text-anchor="middle" font-size="12" fill="#333">Grows on demand</text>
    <text x="590" y="205" text-anchor="middle" font-size="12" fill="#388e3c">Most storage efficient</text>
    <text x="590" y="225" text-anchor="middle" font-size="12" fill="#f44336">Slight I/O overhead</text>
    <rect x="450" y="235" width="280" height="20" rx="4" fill="#c8e6c9"/>
    <text x="590" y="250" text-anchor="middle" font-size="10" fill="#2e7d32">Use case: Dev/test environments</text>
  </g>

  <g id="step4" class="step" data-narration="Storage overcommitment allows thin provisioned VMs to promise more space than physically available.">
    <rect x="430" y="310" width="320" height="90" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
    <text x="590" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Overcommitment Risk</text>
    <text x="590" y="360" text-anchor="middle" font-size="12" fill="#333">Physical: 500GB | Promised: 2TB</text>
    <text x="590" y="380" text-anchor="middle" font-size="11" fill="#c62828">Monitor usage to avoid out-of-space!</text>
  </g>

  <g id="step5" class="step" data-narration="Summary: thick eager for performance, thick lazy for balance, thin for storage efficiency.">
    <rect x="100" y="490" width="600" height="55" rx="8" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="220" y="515" text-anchor="middle" font-size="12" fill="#1976d2" font-weight="bold">Thick Eager</text>
    <text x="220" y="532" text-anchor="middle" font-size="10" fill="#666">Performance first</text>
    <text x="400" y="515" text-anchor="middle" font-size="12" fill="#ff9800" font-weight="bold">Thick Lazy</text>
    <text x="400" y="532" text-anchor="middle" font-size="10" fill="#666">Balanced</text>
    <text x="580" y="515" text-anchor="middle" font-size="12" fill="#388e3c" font-weight="bold">Thin</text>
    <text x="580" y="532" text-anchor="middle" font-size="10" fill="#666">Storage efficient</text>
  </g>
</svg>
