<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to SQLite Database in Android">
    <rect x="50" y="50" width="200" height="100" fill="#2563eb" rx="10"/>
    <text x="60" y="120" font-size="24" fill="#ffffff" font-family="Arial">SQLite Database</text>
    <text x="60" y="150" font-size="18" fill="#ffffff" font-family="Arial">in Android</text>
  </g>
  <g id="step1" data-narration="Key Features of SQLite">
    <rect x="300" y="50" width="200" height="200" fill="#10b981" rx="10"/>
    <text x="310" y="70" font-size="18" fill="#ffffff" font-family="Arial">Serverless</text>
    <text x="310" y="100" font-size="18" fill="#ffffff" font-family="Arial">Zero-configuration</text>
    <text x="310" y="130" font-size="18" fill="#ffffff" font-family="Arial">Cross-platform</text>
    <text x="310" y="160" font-size="18" fill="#ffffff" font-family="Arial">ACID compliant</text>
    <text x="310" y="190" font-size="18" fill="#ffffff" font-family="Arial">Lightweight</text>
    <line x1="250" y1="125" x2="300" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step2" data-narration="When to Use SQLite">
    <rect x="50" y="250" width="200" height="150" fill="#f59e0b" rx="10"/>
    <text x="60" y="270" font-size="18" fill="#ffffff" font-family="Arial">Storing structured data</text>
    <text x="60" y="300" font-size="18" fill="#ffffff" font-family="Arial">Complex queries with relationships</text>
    <text x="60" y="330" font-size="18" fill="#ffffff" font-family="Arial">Large amounts of data</text>
    <text x="60" y="360" font-size="18" fill="#ffffff" font-family="Arial">Offline data persistence</text>
    <line x1="250" y1="300" x2="300" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step3" data-narration="SQLite Database Architecture in Android">
    <rect x="300" y="250" width="200" height="200" fill="#8b5cf6" rx="10"/>
    <text x="310" y="270" font-size="18" fill="#ffffff" font-family="Arial">Application Layer</text>
    <text x="310" y="300" font-size="18" fill="#ffffff" font-family="Arial">SQLiteOpenHelper</text>
    <text x="310" y="330" font-size="18" fill="#ffffff" font-family="Arial">SQLiteDatabase</text>
    <text x="310" y="360" font-size="18" fill="#ffffff" font-family="Arial">SQL Queries</text>
    <text x="310" y="390" font-size="18" fill="#ffffff" font-family="Arial">SQLite Engine</text>
    <line x1="250" y1="325" x2="300" y2="325" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step4" data-narration="Creating Database Contract">
    <rect x="550" y="50" width="200" height="150" fill="#2563eb" rx="10"/>
    <text x="560" y="70" font-size="18" fill="#ffffff" font-family="Arial">Contract Class</text>
    <text x="560" y="100" font-size="18" fill="#ffffff" font-family="Arial">Defines schema of database</text>
    <text x="560" y="130" font-size="18" fill="#ffffff" font-family="Arial">Structured way</text>
    <line x1="450" y1="100" x2="550" y2="100" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step5" data-narration="Creating SQLiteOpenHelper Class">
    <rect x="550" y="250" width="200" height="150" fill="#10b981" rx="10"/>
    <text x="560" y="270" font-size="18" fill="#ffffff" font-family="Arial">Manages database creation</text>
    <text x="560" y="300" font-size="18" fill="#ffffff" font-family="Arial">Version management</text>
    <line x1="450" y1="300" x2="550" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>