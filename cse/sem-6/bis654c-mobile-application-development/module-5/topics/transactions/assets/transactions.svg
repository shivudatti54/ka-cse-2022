<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Database Transactions</text>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  <g id="step0" class="step" data-narration="Transactions group multiple database operations into a single atomic unit that either fully succeeds or fully fails.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Atomic operations ensuring data consistency and integrity</text>
  </g>
  <g id="step1" class="step" data-narration="Begin a transaction with beginTransaction. All subsequent operations are held in a pending state.">
    <rect x="200" y="80" width="400" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">db.beginTransaction()</text>
    <line x1="400" y1="125" x2="400" y2="145" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g id="step2" class="step" data-narration="Perform your database operations inside the transaction: inserts, updates, deletes as needed.">
    <rect x="200" y="150" width="400" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="173" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Execute Operations</text>
    <text x="400" y="195" text-anchor="middle" font-size="11" fill="#333">db.insert() | db.update() | db.delete()</text>
    <line x1="400" y1="205" x2="400" y2="225" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g id="step3" class="step" data-narration="Mark as successful with setTransactionSuccessful. Without this call, endTransaction will rollback.">
    <rect x="200" y="230" width="400" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">db.setTransactionSuccessful()</text>
    <line x1="400" y1="275" x2="400" y2="295" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g id="step4" class="step" data-narration="EndTransaction commits if successful was called, or automatically rolls back all changes otherwise.">
    <rect x="100" y="300" width="260" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="230" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Commit</text>
    <text x="230" y="340" text-anchor="middle" font-size="10" fill="#333">If setSuccessful() called</text>
    <rect x="440" y="300" width="260" height="50" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="570" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Rollback</text>
    <text x="570" y="340" text-anchor="middle" font-size="10" fill="#333">If exception or not set</text>
    <text x="400" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">db.endTransaction()</text>
  </g>
  <g id="step5" class="step" data-narration="Always use try-finally pattern to ensure endTransaction runs even when an exception occurs.">
    <rect x="60" y="395" width="680" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="418" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Best Practice: try-finally Pattern</text>
    <text x="400" y="438" text-anchor="middle" font-size="11" fill="#333">try { begin; ops; setSuccessful } finally { endTransaction } - guarantees cleanup</text>
  </g>
  <g id="step6" class="step" data-narration="Transactions also improve performance by batching multiple writes into a single disk operation.">
    <rect x="100" y="470" width="600" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Benefit: 100 inserts in a transaction = 10x faster than 100 individual inserts</text>
  </g>
</svg>