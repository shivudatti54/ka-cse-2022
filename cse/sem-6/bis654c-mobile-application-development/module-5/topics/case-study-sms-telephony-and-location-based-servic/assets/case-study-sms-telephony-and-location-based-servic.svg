<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">SMS, Telephony and Location</text>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  <g id="step0" class="step" data-narration="Android provides APIs for sending SMS, accessing telephony information, and location-based services.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Communicate via SMS, access phone state, and track location</text>
  </g>
  <g id="step1" class="step" data-narration="SmsManager sends text messages programmatically. Use sendTextMessage with destination number and message.">
    <rect x="40" y="85" width="340" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">SmsManager</text>
    <text x="210" y="132" text-anchor="middle" font-size="11" fill="#333">sendTextMessage(phone, null, msg,</text>
    <text x="210" y="150" text-anchor="middle" font-size="11" fill="#333">  sentIntent, deliveredIntent)</text>
    <text x="210" y="168" text-anchor="middle" font-size="9" fill="#666">Requires SEND_SMS permission</text>
  </g>
  <g id="step2" class="step" data-narration="TelephonyManager provides phone state info including carrier name, signal strength, and call state.">
    <rect x="420" y="85" width="340" height="90" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">TelephonyManager</text>
    <text x="590" y="132" text-anchor="middle" font-size="11" fill="#333">getNetworkOperatorName()</text>
    <text x="590" y="150" text-anchor="middle" font-size="11" fill="#333">getCallState() | getPhoneType()</text>
    <text x="590" y="168" text-anchor="middle" font-size="9" fill="#666">Requires READ_PHONE_STATE permission</text>
  </g>
  <g id="step3" class="step" data-narration="LocationManager provides GPS coordinates using requestLocationUpdates with a listener callback.">
    <text x="400" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Location Services</text>
    <rect x="40" y="225" width="350" height="65" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="215" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">LocationManager</text>
    <text x="215" y="268" text-anchor="middle" font-size="11" fill="#333">requestLocationUpdates(GPS,</text>
    <text x="215" y="283" text-anchor="middle" font-size="10" fill="#333">  minTime, minDist, listener)</text>
    <rect x="420" y="225" width="340" height="65" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">FusedLocationProvider</text>
    <text x="590" y="268" text-anchor="middle" font-size="11" fill="#333">Google Play Services API</text>
    <text x="590" y="283" text-anchor="middle" font-size="10" fill="#333">Battery-efficient, auto-switching</text>
  </g>
  <g id="step4" class="step" data-narration="Runtime permissions must be requested at runtime for dangerous permissions like SMS, phone, and location.">
    <rect x="60" y="310" width="680" height="55" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="333" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Runtime Permissions (Android 6+)</text>
    <text x="400" y="353" text-anchor="middle" font-size="11" fill="#333">checkSelfPermission() + requestPermissions() + onRequestPermissionsResult()</text>
  </g>
  <g id="step5" class="step" data-narration="Geofencing creates virtual boundaries that trigger events when the device enters or exits an area.">
    <rect x="60" y="385" width="680" height="45" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="413" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Geofencing: virtual boundaries that trigger enter/exit/dwell events automatically</text>
  </g>
  <g id="step6" class="step" data-narration="These APIs enable powerful features like location tracking, messaging, and phone-aware applications.">
    <rect x="100" y="450" width="600" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">SMS + Telephony + Location = powerful context-aware Android applications</text>
  </g>
</svg>