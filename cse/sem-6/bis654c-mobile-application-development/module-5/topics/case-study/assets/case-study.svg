<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to IoT Platform Design Methodology">
    <text x="50" y="50" font-size="24" fill="#2563eb">IoT Platform Design Methodology</text>
    <text x="50" y="80" font-size="18" fill="#8b5cf6">A structured approach to designing IoT systems</text>
    <rect x="50" y="120" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="60" y="170" font-size="18" fill="#ffffff">Requirements Analysis</text>
  </g>
  <g id="step1" data-narration="Requirements Analysis for Weather Monitoring">
    <use href="#step0" x="0" y="0"/>
    <rect x="300" y="120" width="200" height="100" fill="#f59e0b" rx="10"/>
    <text x="310" y="170" font-size="18" fill="#ffffff">Process Specification</text>
    <line x1="250" y1="150" x2="300" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step2" data-narration="Process Specification for Weather Monitoring">
    <use href="#step1" x="0" y="0"/>
    <rect x="550" y="120" width="200" height="100" fill="#8b5cf6" rx="10"/>
    <text x="560" y="170" font-size="18" fill="#ffffff">Domain Model Specification</text>
    <line x1="500" y1="150" x2="550" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step3" data-narration="Domain Model Specification for Weather Monitoring">
    <use href="#step2" x="0" y="0"/>
    <rect x="50" y="250" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="60" y="300" font-size="18" fill="#ffffff">Key Entities: Weather Stations, Sensors</text>
    <line x1="250" y1="280" x2="50" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step4" data-narration="Data Flow Process for Weather Monitoring">
    <use href="#step3" x="0" y="0"/>
    <rect x="300" y="250" width="200" height="100" fill="#f59e0b" rx="10"/>
    <text x="310" y="300" font-size="18" fill="#ffffff">Data Flow: Sensors → Data Acquisition → Local Processing → Data Transmission</text>
    <line x1="250" y1="280" x2="300" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step5" data-narration="Data Processing and Visualization for Weather Monitoring">
    <use href="#step4" x="0" y="0"/>
    <rect x="550" y="250" width="200" height="100" fill="#8b5cf6" rx="10"/>
    <text x="560" y="300" font-size="18" fill="#ffffff">Data Processing: Cloud Storage, Analytics, Visualization</text>
    <line x1="500" y1="280" x2="550" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step6" data-narration="IoT System for Weather Monitoring: Final Architecture">
    <use href="#step5" x="0" y="0"/>
    <rect x="375" y="380" width="200" height="100" fill="#10b981" rx="10"/>
    <text x="385" y="430" font-size="18" fill="#ffffff">IoT System for Weather Monitoring: Integrated Architecture</text>
    <line x1="375" y1="360" x2="375" y2="380" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>