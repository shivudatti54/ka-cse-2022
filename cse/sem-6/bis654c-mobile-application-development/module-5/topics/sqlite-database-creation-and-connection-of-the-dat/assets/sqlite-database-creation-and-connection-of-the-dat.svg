<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="20" fill="#2563eb" font-family="Arial" text-anchor="middle" font-weight="bold">SQLite Database Creation and Connection</text>

  <g id="step0" class="step" data-narration="Introduction to SQLite Database Creation">
    <rect x="40" y="50" width="720" height="60" fill="#2563eb" rx="10"/>
    <text x="400" y="85" font-size="24" fill="#ffffff" font-family="Arial" text-anchor="middle" font-weight="bold">SQLite Database Creation</text>
  </g>

  <g id="step1" class="step" data-narration="Extending SQLiteOpenHelper class">
    <rect x="40" y="120" width="340" height="60" fill="#10b981" rx="10"/>
    <text x="210" y="145" font-size="18" fill="#ffffff" font-family="Arial" text-anchor="middle" font-weight="bold">DatabaseHelper</text>
    <text x="210" y="165" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">extends SQLiteOpenHelper</text>
  </g>

  <g id="step2" class="step" data-narration="Defining Database Info">
    <rect x="420" y="120" width="340" height="60" fill="#f59e0b" rx="10"/>
    <text x="590" y="140" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Database Information</text>
    <text x="590" y="158" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">DATABASE_NAME</text>
    <text x="590" y="173" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">DATABASE_VERSION</text>
  </g>

  <g id="step3" class="step" data-narration="Creating Table">
    <rect x="40" y="190" width="340" height="60" fill="#8b5cf6" rx="10"/>
    <text x="210" y="220" font-size="18" fill="#ffffff" font-family="Arial" text-anchor="middle" font-weight="bold">CREATE TABLE</text>
    <text x="210" y="238" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Define table structure</text>
  </g>

  <g id="step4" class="step" data-narration="Defining Table Columns">
    <rect x="420" y="190" width="340" height="60" fill="#10b981" rx="10"/>
    <text x="590" y="212" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Table Columns</text>
    <text x="590" y="230" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">KEY_ID (Primary Key)</text>
    <text x="590" y="245" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">KEY_NOTE (Text Field)</text>
  </g>

  <g id="step5" class="step" data-narration="Upgrading Database">
    <rect x="40" y="260" width="340" height="60" fill="#f59e0b" rx="10"/>
    <text x="210" y="290" font-size="18" fill="#ffffff" font-family="Arial" text-anchor="middle" font-weight="bold">onUpgrade()</text>
    <text x="210" y="308" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Handle database version changes</text>
  </g>

  <g id="step6" class="step" data-narration="Dropping and Recreating Table">
    <rect x="420" y="260" width="340" height="60" fill="#8b5cf6" rx="10"/>
    <text x="590" y="290" font-size="18" fill="#ffffff" font-family="Arial" text-anchor="middle" font-weight="bold">DROP TABLE</text>
    <text x="590" y="308" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Remove existing table structure</text>
  </g>

  <g id="step7" class="step" data-narration="Connection to the Database">
    <rect x="40" y="330" width="720" height="70" fill="#10b981" rx="10"/>
    <text x="400" y="360" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle" font-weight="bold">Database Connection</text>
    <text x="400" y="380" font-size="13" fill="#ffffff" font-family="Arial" text-anchor="middle">getWritableDatabase() - For read/write operations</text>
    <text x="400" y="395" font-size="13" fill="#ffffff" font-family="Arial" text-anchor="middle">getReadableDatabase() - For read-only operations</text>
  </g>
</svg>
