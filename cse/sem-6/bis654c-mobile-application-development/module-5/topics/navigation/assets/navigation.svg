<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Android Navigation</text>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  <g id="step0" class="step" data-narration="Intents are messaging objects that navigate between activities and pass data in Android applications.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Moving between screens using Intents and the Navigation component</text>
  </g>
  <g id="step1" class="step" data-narration="Explicit intents specify the exact target activity class to launch a known component directly.">
    <rect x="40" y="85" width="350" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Explicit Intent</text>
    <text x="215" y="132" text-anchor="middle" font-size="11" fill="#333">Intent(this, TargetActivity::class.java)</text>
    <text x="215" y="150" text-anchor="middle" font-size="10" fill="#666">Exact target known | Within same app</text>
    <text x="215" y="168" text-anchor="middle" font-size="9" fill="#666">putExtra("key", value) to pass data</text>
  </g>
  <g id="step2" class="step" data-narration="Implicit intents declare an action and let the system find a matching component from any app.">
    <rect x="420" y="85" width="340" height="90" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="590" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Implicit Intent</text>
    <text x="590" y="132" text-anchor="middle" font-size="11" fill="#333">Intent(ACTION_VIEW, uri)</text>
    <text x="590" y="150" text-anchor="middle" font-size="10" fill="#666">System resolves handler | Cross-app</text>
    <text x="590" y="168" text-anchor="middle" font-size="9" fill="#666">Open browser, share, dial phone</text>
  </g>
  <g id="step3" class="step" data-narration="The back stack maintains a history of visited activities. Pressing back pops the top activity.">
    <text x="400" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Activity Back Stack</text>
    <rect x="250" y="225" width="120" height="35" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="310" y="247" text-anchor="middle" font-size="10" fill="#1976d2">Activity A</text>
    <rect x="300" y="265" width="120" height="35" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="360" y="287" text-anchor="middle" font-size="10" fill="#388e3c">Activity B</text>
    <rect x="350" y="305" width="120" height="35" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="410" y="327" text-anchor="middle" font-size="10" fill="#e65100">Activity C (top)</text>
    <text x="550" y="275" font-size="11" fill="#666">Back button pops C</text>
    <text x="550" y="295" font-size="11" fill="#666">Returns to B</text>
  </g>
  <g id="step4" class="step" data-narration="The Navigation component uses a navigation graph XML to define destinations and transitions visually.">
    <rect x="60" y="360" width="680" height="55" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="383" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Navigation Component (Jetpack)</text>
    <text x="400" y="403" text-anchor="middle" font-size="11" fill="#333">NavHost + NavGraph + NavController = type-safe navigation with visual editor</text>
  </g>
  <g id="step5" class="step" data-narration="Deep links enable direct navigation to specific app screens from URLs, notifications, or widgets.">
    <rect x="100" y="435" width="600" height="40" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Deep Links: myapp://screen/123 navigates directly to a specific screen</text>
  </g>
</svg>