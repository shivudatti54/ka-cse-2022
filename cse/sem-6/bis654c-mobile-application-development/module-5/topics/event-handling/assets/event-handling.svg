<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Event Handling in Android</text>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  <g id="step0" class="step" data-narration="Events are user interactions like clicks, touches, and gestures that trigger callback methods in your code.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">User interactions trigger callbacks that your app responds to</text>
  </g>
  <g id="step1" class="step" data-narration="The event flow starts from user action to the view, then to the registered listener callback method.">
    <text x="400" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Event Flow</text>
    <rect x="40" y="105" width="160" height="45" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="120" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">User Action</text>
    <line x1="200" y1="128" x2="240" y2="128" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="240" y="105" width="160" height="45" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="320" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#1976d2">View (Button)</text>
    <line x1="400" y1="128" x2="440" y2="128" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="440" y="105" width="160" height="45" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="520" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Listener</text>
    <line x1="600" y1="128" x2="640" y2="128" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="640" y="105" width="130" height="45" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="705" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Callback</text>
  </g>
  <g id="step2" class="step" data-narration="OnClickListener handles tap events on buttons and views. It is the most commonly used event listener.">
    <text x="400" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a237e">Common Event Listeners</text>
    <rect x="40" y="200" width="230" height="65" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="155" y="223" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">OnClickListener</text>
    <text x="155" y="243" text-anchor="middle" font-size="10" fill="#333">Single tap on a view</text>
    <text x="155" y="258" text-anchor="middle" font-size="9" fill="#666">onClick(View v)</text>
    <rect x="290" y="200" width="230" height="65" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="405" y="223" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">OnTouchListener</text>
    <text x="405" y="243" text-anchor="middle" font-size="10" fill="#333">Touch gestures (press/move)</text>
    <text x="405" y="258" text-anchor="middle" font-size="9" fill="#666">onTouch(View, MotionEvent)</text>
    <rect x="540" y="200" width="220" height="65" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="650" y="223" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">OnLongClickListener</text>
    <text x="650" y="243" text-anchor="middle" font-size="10" fill="#333">Press and hold action</text>
    <text x="650" y="258" text-anchor="middle" font-size="9" fill="#666">onLongClick(View v)</text>
  </g>
  <g id="step3" class="step" data-narration="Event handlers can be registered in XML using onClick attribute or in Java code using setOnClickListener.">
    <rect x="40" y="290" width="350" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="215" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">XML: android:onClick="handleClick"</text>
    <text x="215" y="333" text-anchor="middle" font-size="10" fill="#333">Declarative, simple, less flexible</text>
    <rect x="420" y="290" width="340" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="590" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Java: btn.setOnClickListener(...)</text>
    <text x="590" y="333" text-anchor="middle" font-size="10" fill="#333">Programmatic, flexible, reusable</text>
  </g>
  <g id="step4" class="step" data-narration="Additional listeners include TextWatcher for text changes, OnItemClickListener for lists, and key listeners.">
    <rect x="60" y="365" width="680" height="50" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">More Listeners</text>
    <text x="400" y="405" text-anchor="middle" font-size="11" fill="#333">TextWatcher (text changes) | OnItemClickListener (list items) | OnKeyListener (keyboard)</text>
  </g>
  <g id="step5" class="step" data-narration="Kotlin lambda syntax makes event handling concise: button dot setOnClickListener curly brace code.">
    <rect x="100" y="435" width="600" height="40" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Kotlin: button.setOnClickListener { doSomething() } - concise lambda syntax</text>
  </g>
</svg>