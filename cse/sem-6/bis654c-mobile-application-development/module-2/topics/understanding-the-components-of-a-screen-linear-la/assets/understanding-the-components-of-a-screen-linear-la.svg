<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Linear Layout Components</text>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker></defs>
  <g id="step0" class="step" data-narration="LinearLayout arranges child views in a single direction, either horizontal or vertical.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">The simplest layout manager for arranging views in a row or column</text>
  </g>
  <g id="step1" class="step" data-narration="Vertical orientation stacks views top to bottom. Horizontal orientation arranges them left to right.">
    <rect x="40" y="85" width="300" height="150" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="190" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Vertical</text>
    <rect x="60" y="118" width="260" height="28" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="190" y="137" text-anchor="middle" font-size="10" fill="#e65100">View 1</text>
    <rect x="60" y="152" width="260" height="28" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="190" y="171" text-anchor="middle" font-size="10" fill="#388e3c">View 2</text>
    <rect x="60" y="186" width="260" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="190" y="205" text-anchor="middle" font-size="10" fill="#9c27b0">View 3</text>
    <rect x="420" y="85" width="340" height="150" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="590" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Horizontal</text>
    <rect x="440" y="125" width="95" height="90" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="487" y="175" text-anchor="middle" font-size="10" fill="#e65100">V1</text>
    <rect x="545" y="125" width="95" height="90" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="592" y="175" text-anchor="middle" font-size="10" fill="#388e3c">V2</text>
    <rect x="650" y="125" width="90" height="90" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="695" y="175" text-anchor="middle" font-size="10" fill="#9c27b0">V3</text>
  </g>
  <g id="step2" class="step" data-narration="Layout weight distributes remaining space proportionally among views, enabling flexible sizing.">
    <rect x="60" y="255" width="680" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">layout_weight = proportional space distribution</text>
    <text x="400" y="298" text-anchor="middle" font-size="11" fill="#333">weight=1, weight=2, weight=1 gives 25%, 50%, 25% of remaining space</text>
  </g>
  <g id="step3" class="step" data-narration="Gravity aligns content within a view, while layout_gravity positions the view within its parent.">
    <rect x="40" y="330" width="340" height="50" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="210" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">gravity</text>
    <text x="210" y="370" text-anchor="middle" font-size="10" fill="#333">Aligns content within view</text>
    <rect x="420" y="330" width="340" height="50" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="590" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">layout_gravity</text>
    <text x="590" y="370" text-anchor="middle" font-size="10" fill="#333">Positions view in parent</text>
  </g>
  <g id="step4" class="step" data-narration="Avoid deeply nested LinearLayouts as they cause performance issues. Use ConstraintLayout instead.">
    <rect x="100" y="400" width="600" height="40" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Avoid deep nesting! Use ConstraintLayout for complex UIs for better performance</text>
  </g>
</svg>