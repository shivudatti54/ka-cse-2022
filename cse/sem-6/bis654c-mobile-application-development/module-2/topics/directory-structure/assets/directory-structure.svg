<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Project Root -->
  <g id="step0" class="step" data-narration="An Android project follows a well-organized directory structure based on best practices. At the root level, you find build configuration files like build.gradle for project-level settings, settings.gradle defining included modules, and the gradle directory containing wrapper files for consistent Gradle versions.">
    <rect x="300" y="30" width="200" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="400" y="55" text-anchor="middle" font-size="18" font-weight="bold" fill="#1976d2">MyApplication/</text>
    <text x="400" y="75" text-anchor="middle" font-size="13" fill="#555">Project Root</text>
  </g>

  <!-- Step 1: Build Configuration Files -->
  <g id="step1" class="step" data-narration="The root-level build.gradle file contains top-level build configuration, defining repositories and dependencies common to all modules. The settings.gradle specifies which modules are included in the build, while the gradle directory ensures consistent Gradle versions across development machines.">
    <rect x="50" y="120" width="140" height="45" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="120" y="140" text-anchor="middle" font-size="14" fill="#388e3c">build.gradle</text>
    <text x="120" y="155" text-anchor="middle" font-size="10" fill="#666">(Project)</text>

    <rect x="220" y="120" width="140" height="45" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="290" y="140" text-anchor="middle" font-size="14" fill="#388e3c">settings.gradle</text>
    <text x="290" y="155" text-anchor="middle" font-size="10" fill="#666">Module list</text>

    <rect x="390" y="120" width="140" height="45" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="460" y="145" text-anchor="middle" font-size="14" fill="#ff9800">gradle/</text>

    <line x1="400" y1="90" x2="120" y2="118" stroke="#1976d2" stroke-width="2"/>
    <line x1="400" y1="90" x2="290" y2="118" stroke="#1976d2" stroke-width="2"/>
    <line x1="400" y1="90" x2="460" y2="118" stroke="#1976d2" stroke-width="2"/>
  </g>

  <!-- Step 2: App Module Structure -->
  <g id="step2" class="step" data-narration="The app module is the main module containing your application code. It has its own directory structure with manifests for AndroidManifest.xml, java for source code organized by package, res for resources, and a module-level build.gradle for app-specific build configuration.">
    <rect x="580" y="120" width="180" height="60" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="670" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">app/</text>
    <text x="670" y="165" text-anchor="middle" font-size="11" fill="#555">Application Module</text>

    <line x1="500" y1="75" x2="580" y2="145" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Step 3: Manifests Directory -->
  <g id="step3" class="step" data-narration="The manifests directory contains AndroidManifest.xml, which describes essential information about your app including the package name, required permissions, application components like activities and services, app icon and theme, and intent filters that define how components are launched.">
    <rect x="50" y="220" width="160" height="80" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="130" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">manifests/</text>
    <rect x="60" y="255" width="140" height="35" rx="4" fill="#ff9800" opacity="0.1"/>
    <text x="130" y="277" text-anchor="middle" font-size="12" fill="#333">AndroidManifest</text>
  </g>

  <!-- Step 4: Java Source Directory -->
  <g id="step4" class="step" data-narration="The java directory contains all source code files organized by package name. It has three sub-directories: the main source directory for your application code, androidTest for instrumented tests that run on devices, and test for unit tests that run on the JVM without Android dependencies.">
    <rect x="240" y="220" width="160" height="95" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="320" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">java/</text>
    <rect x="250" y="255" width="140" height="20" rx="3" fill="#388e3c" opacity="0.1"/>
    <text x="320" y="270" text-anchor="middle" font-size="10" fill="#333">com.example.app</text>
    <rect x="250" y="280" width="65" height="20" rx="3" fill="#388e3c" opacity="0.15"/>
    <text x="282" y="295" text-anchor="middle" font-size="9" fill="#555">(test)</text>
    <rect x="325" y="280" width="65" height="20" rx="3" fill="#388e3c" opacity="0.15"/>
    <text x="357" y="295" text-anchor="middle" font-size="9" fill="#555">(androidTest)</text>
  </g>

  <!-- Step 5: Resources Directory -->
  <g id="step5" class="step" data-narration="The res directory stores all resource files including drawable for images and graphics with density-specific variants, layout for XML layout files, mipmap for launcher icons, values for strings colors and styles, menu for menu resources, and anim for animation definitions. Resources use qualifiers for different configurations.">
    <rect x="430" y="220" width="160" height="140" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="510" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">res/</text>
    <circle cx="460" cy="265" r="3" fill="#1976d2"/>
    <text x="470" y="270" font-size="11" fill="#333">drawable/</text>
    <circle cx="460" cy="285" r="3" fill="#1976d2"/>
    <text x="470" y="290" font-size="11" fill="#333">layout/</text>
    <circle cx="460" cy="305" r="3" fill="#1976d2"/>
    <text x="470" y="310" font-size="11" fill="#333">mipmap/</text>
    <circle cx="460" cy="325" r="3" fill="#1976d2"/>
    <text x="470" y="330" font-size="11" fill="#333">values/</text>
    <circle cx="460" cy="345" r="3" fill="#1976d2"/>
    <text x="470" y="350" font-size="11" fill="#333">menu/, anim/</text>
  </g>

  <!-- Step 6: Module Build File -->
  <g id="step6" class="step" data-narration="The module-level build.gradle file contains app-specific configuration including compileSdk version for compilation, minSdk as the minimum Android version supported, targetSdk as the version your app is designed for, applicationId as the unique app identifier, and dependencies listing all external libraries your app uses.">
    <rect x="620" y="220" width="150" height="80" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="695" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">build.gradle</text>
    <text x="695" y="265" text-anchor="middle" font-size="11" fill="#555">Module Level</text>
    <text x="695" y="280" text-anchor="middle" font-size="9" fill="#666">compileSdk</text>
    <text x="695" y="292" text-anchor="middle" font-size="9" fill="#666">minSdk / targetSdk</text>
  </g>

  <!-- Step 7: Resource Values -->
  <g id="step7" class="step" data-narration="The values directory contains XML files for different resource types. The strings.xml file stores all text strings for localization support, colors.xml defines color values used throughout the app, styles.xml contains theme and style definitions, and dimens.xml stores dimension values for consistent spacing and sizing across different screen densities.">
    <rect x="50" y="390" width="720" height="80" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="410" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">res/values/ Resource Files</text>
    <rect x="70" y="430" width="150" height="30" rx="4" fill="#388e3c" opacity="0.15"/>
    <text x="145" y="450" text-anchor="middle" font-size="11" fill="#333">strings.xml</text>
    <rect x="240" y="430" width="150" height="30" rx="4" fill="#388e3c" opacity="0.15"/>
    <text x="315" y="450" text-anchor="middle" font-size="11" fill="#333">colors.xml</text>
    <rect x="410" y="430" width="150" height="30" rx="4" fill="#388e3c" opacity="0.15"/>
    <text x="485" y="450" text-anchor="middle" font-size="11" fill="#333">styles.xml</text>
    <rect x="580" y="430" width="150" height="30" rx="4" fill="#388e3c" opacity="0.15"/>
    <text x="655" y="450" text-anchor="middle" font-size="11" fill="#333">dimens.xml</text>
  </g>

  <!-- Step 8: Build Output -->
  <g id="step8" class="step" data-narration="The build directory is automatically generated during compilation and contains intermediate and output files. It includes generated code like R.java for resource IDs, intermediate compilation files, and the final APK outputs in both debug and release variants. This directory should be excluded from version control as it's rebuilt each time.">
    <rect x="250" y="500" width="300" height="70" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="525" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">build/ (Auto-generated)</text>
    <text x="400" y="545" text-anchor="middle" font-size="11" fill="#555">outputs/apk/debug/app-debug.apk</text>
    <text x="400" y="560" text-anchor="middle" font-size="11" fill="#555">outputs/apk/release/app-release.apk</text>
  </g>
</svg>