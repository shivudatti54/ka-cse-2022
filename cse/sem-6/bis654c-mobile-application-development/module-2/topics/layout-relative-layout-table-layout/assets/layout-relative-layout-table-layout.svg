<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/></marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1976d2" font-family="Arial" font-size="18" font-weight="bold">RelativeLayout vs TableLayout Comparison</text>

  <!-- Step 0: RelativeLayout Concept -->
  <g id="step0" class="step" data-narration="RelativeLayout positions child views relative to each other or to the parent container. You use attributes like alignParentTop, below, and toRightOf to define spatial relationships between views. This allows flexible, overlapping layouts.">
    <rect x="30" y="48" width="360" height="65" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="70" text-anchor="middle" fill="#1976d2" font-family="Arial" font-size="15" font-weight="bold">RelativeLayout</text>
    <text x="210" y="88" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Position views relative to siblings or parent</text>
    <text x="210" y="104" text-anchor="middle" fill="#999" font-family="Arial" font-size="9">Attributes: alignParentTop, below, toRightOf, centerInParent</text>
  </g>

  <!-- Step 1: RelativeLayout Visual Example -->
  <g id="step1" class="step" data-narration="In this RelativeLayout example, a title is aligned to the parent top. A profile image sits below the title aligned left. A name field is positioned to the right of the image. The save button is centered horizontally below all views.">
    <rect x="30" y="122" width="360" height="200" rx="10" fill="white" stroke="#1976d2" stroke-width="2"/>
    <text x="210" y="142" text-anchor="middle" fill="#1976d2" font-family="Arial" font-size="11" font-weight="bold">RelativeLayout Example (Phone Screen)</text>

    <!-- Simulated phone screen -->
    <rect x="100" y="152" width="220" height="155" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>

    <!-- Title - alignParentTop, centerHorizontal -->
    <rect x="140" y="160" width="140" height="24" rx="4" fill="#1976d2"/>
    <text x="210" y="176" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Profile Title</text>

    <!-- Image - below title, alignParentLeft -->
    <rect x="112" y="192" width="55" height="55" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <circle cx="139" cy="212" r="15" fill="#1976d2"/>
    <circle cx="139" cy="207" r="6" fill="#bbdefb"/>
    <path d="M126 225 Q139 214 152 225" fill="#bbdefb"/>

    <!-- Name - toRightOf image, below title -->
    <rect x="175" y="192" width="130" height="24" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
    <text x="240" y="208" text-anchor="middle" fill="#aaa" font-family="Arial" font-size="9">Enter Name</text>

    <!-- Email - below name, toRightOf image -->
    <rect x="175" y="222" width="130" height="24" rx="4" fill="white" stroke="#aaa" stroke-width="1"/>
    <text x="240" y="238" text-anchor="middle" fill="#aaa" font-family="Arial" font-size="9">Enter Email</text>

    <!-- Button - below all, centerHorizontal -->
    <rect x="160" y="262" width="100" height="30" rx="6" fill="#388e3c"/>
    <text x="210" y="282" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Save</text>

    <!-- Position labels -->
    <text x="55" y="175" fill="#1976d2" font-family="Arial" font-size="7">alignParent</text>
    <text x="55" y="184" fill="#1976d2" font-family="Arial" font-size="7">Top</text>
    <line x1="85" y1="172" x2="100" y2="172" stroke="#1976d2" stroke-width="1" marker-end="url(#arrowhead)"/>

    <text x="322" y="205" fill="#9c27b0" font-family="Arial" font-size="7">toRightOf</text>
    <text x="322" y="214" fill="#9c27b0" font-family="Arial" font-size="7">image</text>
    <line x1="320" y1="207" x2="307" y2="207" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Step 2: TableLayout Concept -->
  <g id="step2" class="step" data-narration="TableLayout arranges child views in rows and columns like an HTML table. Each TableRow element defines a row, and views inside a TableRow become cells. The layout_weight attribute controls how columns share available space.">
    <rect x="410" y="48" width="360" height="65" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="70" text-anchor="middle" fill="#388e3c" font-family="Arial" font-size="15" font-weight="bold">TableLayout</text>
    <text x="590" y="88" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Arrange views in rows and columns grid</text>
    <text x="590" y="104" text-anchor="middle" fill="#999" font-family="Arial" font-size="9">Elements: TableRow, layout_weight, stretchColumns</text>
  </g>

  <!-- Step 3: TableLayout Visual Example -->
  <g id="step3" class="step" data-narration="In this TableLayout example, a form uses three rows. The first TableRow has header TextViews for Name and Age columns. The next rows have EditText fields for user input. Layout weight controls column width ratios.">
    <rect x="410" y="122" width="360" height="200" rx="10" fill="white" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="142" text-anchor="middle" fill="#388e3c" font-family="Arial" font-size="11" font-weight="bold">TableLayout Example (Form Grid)</text>

    <!-- Simulated table -->
    <rect x="440" y="152" width="300" height="155" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>

    <!-- Header Row -->
    <rect x="450" y="160" width="135" height="28" rx="3" fill="#388e3c"/>
    <text x="517" y="178" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Name</text>
    <rect x="595" y="160" width="135" height="28" rx="3" fill="#388e3c"/>
    <text x="662" y="178" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Age</text>

    <!-- Row 1 -->
    <rect x="450" y="194" width="135" height="28" rx="3" fill="white" stroke="#aaa" stroke-width="1"/>
    <text x="517" y="212" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">John Doe</text>
    <rect x="595" y="194" width="135" height="28" rx="3" fill="white" stroke="#aaa" stroke-width="1"/>
    <text x="662" y="212" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">25</text>

    <!-- Row 2 -->
    <rect x="450" y="228" width="135" height="28" rx="3" fill="white" stroke="#aaa" stroke-width="1"/>
    <text x="517" y="246" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Jane Smith</text>
    <rect x="595" y="228" width="135" height="28" rx="3" fill="white" stroke="#aaa" stroke-width="1"/>
    <text x="662" y="246" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">30</text>

    <!-- Row labels -->
    <text x="447" y="183" text-anchor="end" fill="#388e3c" font-family="Arial" font-size="8">Row 1</text>
    <text x="447" y="212" text-anchor="end" fill="#388e3c" font-family="Arial" font-size="8">Row 2</text>
    <text x="447" y="246" text-anchor="end" fill="#388e3c" font-family="Arial" font-size="8">Row 3</text>

    <!-- Weight labels -->
    <text x="517" y="275" text-anchor="middle" fill="#ff9800" font-family="Arial" font-size="9">weight=1</text>
    <text x="662" y="275" text-anchor="middle" fill="#ff9800" font-family="Arial" font-size="9">weight=1</text>

    <!-- Grid divider -->
    <line x1="590" y1="160" x2="590" y2="256" stroke="#388e3c" stroke-width="1" stroke-dasharray="4,2"/>
  </g>

  <!-- Step 4: RelativeLayout XML Attributes -->
  <g id="step4" class="step" data-narration="RelativeLayout uses position attributes like layout_below and layout_toRightOf to define view relationships. Each view references another by its ID. The alignParentTop and centerInParent attributes position views relative to the parent.">
    <rect x="30" y="338" width="360" height="115" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="210" y="358" text-anchor="middle" fill="#ff9800" font-family="Arial" font-size="12" font-weight="bold">RelativeLayout Key Attributes</text>
    <rect x="45" y="368" width="330" height="74" rx="5" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="55" y="385" fill="#9c27b0" font-family="monospace" font-size="9">android:layout_below="@id/title"</text>
    <text x="55" y="400" fill="#9c27b0" font-family="monospace" font-size="9">android:layout_toRightOf="@id/img"</text>
    <text x="55" y="415" fill="#9c27b0" font-family="monospace" font-size="9">android:layout_alignParentTop="true"</text>
    <text x="55" y="430" fill="#9c27b0" font-family="monospace" font-size="9">android:layout_centerInParent="true"</text>
  </g>

  <!-- Step 5: TableLayout XML -->
  <g id="step5" class="step" data-narration="TableLayout XML structure wraps views inside TableRow elements. Each view in a TableRow becomes a column cell. The stretchColumns attribute with asterisk makes all columns expand to fill remaining space in the table.">
    <rect x="410" y="338" width="360" height="115" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="358" text-anchor="middle" fill="#9c27b0" font-family="Arial" font-size="12" font-weight="bold">TableLayout Key Attributes</text>
    <rect x="425" y="368" width="330" height="74" rx="5" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="435" y="385" fill="#388e3c" font-family="monospace" font-size="9">&lt;TableLayout stretchColumns="*"&gt;</text>
    <text x="445" y="400" fill="#1976d2" font-family="monospace" font-size="9">&lt;TableRow&gt;</text>
    <text x="455" y="415" fill="#ff9800" font-family="monospace" font-size="9">&lt;TextView layout_weight="1"/&gt;</text>
    <text x="455" y="430" fill="#ff9800" font-family="monospace" font-size="9">&lt;EditText layout_weight="2"/&gt;</text>
  </g>

  <!-- Step 6: When to Use Each -->
  <g id="step6" class="step" data-narration="Use RelativeLayout for free-form screens like profile pages where views need flexible positioning relative to each other. Use TableLayout for structured data entry forms, settings screens, or any grid-like content requiring aligned rows.">
    <rect x="30" y="468" width="740" height="50" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="488" text-anchor="middle" fill="#1976d2" font-family="Arial" font-size="13" font-weight="bold">When to Use Each Layout</text>
    <text x="400" y="507" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">RelativeLayout: Profile screens, free-form UIs | TableLayout: Data forms, settings, grid content</text>
  </g>

  <!-- Step 7: Comparison Summary -->
  <g id="step7" class="step" data-narration="In summary, RelativeLayout offers flexible view positioning using relationship attributes and supports overlapping. TableLayout provides structured grid arrangements using rows and columns with weight-based column sizing.">
    <rect x="30" y="528" width="740" height="55" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="210" y="550" text-anchor="middle" fill="#1976d2" font-family="Arial" font-size="11" font-weight="bold">Relative: Flexible positioning</text>
    <line x1="395" y1="538" x2="395" y2="575" stroke="#ddd" stroke-width="1"/>
    <text x="580" y="550" text-anchor="middle" fill="#388e3c" font-family="Arial" font-size="11" font-weight="bold">Table: Structured grid rows</text>
    <text x="210" y="570" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Overlapping views allowed</text>
    <text x="580" y="570" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Aligned columns with weight</text>
  </g>
</svg>