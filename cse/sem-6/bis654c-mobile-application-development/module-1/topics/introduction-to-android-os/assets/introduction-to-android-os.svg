<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Android SDK Overview -->
  <g id="step0" class="step" data-narration="The Android SDK is the foundational toolkit for building Android applications. It provides libraries, APIs, debugging tools, emulators, and documentation needed for development. The SDK is composed of multiple packages managed through the SDK Manager.">
    <rect x="250" y="80" width="300" height="120" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="400" y="120" text-anchor="middle" font-size="24" font-weight="bold" fill="#1976d2">Android SDK</text>
    <text x="400" y="145" text-anchor="middle" font-size="16" fill="#555">Software Development Kit</text>
    <circle cx="310" cy="170" r="3" fill="#1976d2"/>
    <text x="320" y="175" font-size="14" fill="#333">Platforms &amp; System Images</text>
    <circle cx="310" cy="190" r="3" fill="#1976d2"/>
    <text x="320" y="195" font-size="14" fill="#333">Build Tools &amp; SDK Tools</text>
  </g>

  <!-- Step 1: Android Studio IDE -->
  <g id="step1" class="step" data-narration="Android Studio is the official Integrated Development Environment for Android development, built on IntelliJ IDEA. It streamlines development by integrating all SDK tools, providing intelligent code editing, flexible Gradle-based builds, and templates for common app designs.">
    <rect x="80" y="240" width="250" height="140" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
    <text x="205" y="270" text-anchor="middle" font-size="20" font-weight="bold" fill="#388e3c">Android Studio</text>
    <rect x="100" y="285" width="90" height="30" rx="5" fill="#388e3c" opacity="0.2"/>
    <text x="145" y="305" text-anchor="middle" font-size="13" fill="#333">Code Editor</text>
    <rect x="100" y="325" width="90" height="30" rx="5" fill="#388e3c" opacity="0.2"/>
    <text x="145" y="345" text-anchor="middle" font-size="13" fill="#333">Gradle Build</text>
    <rect x="200" y="285" width="100" height="30" rx="5" fill="#388e3c" opacity="0.2"/>
    <text x="250" y="305" text-anchor="middle" font-size="13" fill="#333">SDK Manager</text>
    <rect x="200" y="325" width="100" height="30" rx="5" fill="#388e3c" opacity="0.2"/>
    <text x="250" y="345" text-anchor="middle" font-size="13" fill="#333">AVD Manager</text>
  </g>

  <!-- Step 2: Core SDK Tools -->
  <g id="step2" class="step" data-narration="The SDK provides essential command-line tools including ADB for device communication, the Android Emulator for testing, and AAPT for resource packaging. ADB is particularly crucial, allowing you to install apps, view logs, and execute shell commands on devices.">
    <rect x="470" y="240" width="250" height="140" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="595" y="270" text-anchor="middle" font-size="20" font-weight="bold" fill="#ff9800">Core SDK Tools</text>
    <circle cx="500" cy="315" r="28" fill="#ff9800" opacity="0.2"/>
    <text x="500" y="323" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">ADB</text>
    <circle cx="595" cy="315" r="28" fill="#ff9800" opacity="0.2"/>
    <text x="595" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Emulator</text>
    <circle cx="690" cy="315" r="28" fill="#ff9800" opacity="0.2"/>
    <text x="690" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">AAPT2</text>
    <text x="595" y="355" text-anchor="middle" font-size="13" fill="#555">Device Communication</text>
  </g>

  <!-- Step 3: Build Process Flow -->
  <g id="step3" class="step" data-narration="The Android build process transforms your source code into an APK file. Java or Kotlin code is compiled to bytecode, then converted to DEX format by the d8 compiler. Resources are compiled by AAPT2, and everything is packaged into a signed APK ready for installation.">
    <line x1="150" y1="420" x2="650" y1="420" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="130" y="435" width="100" height="50" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="180" y="458" text-anchor="middle" font-size="13" fill="#333">Source Code</text>
    <text x="180" y="475" text-anchor="middle" font-size="11" fill="#666">.java / .kt</text>

    <rect x="270" y="435" width="100" height="50" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="320" y="458" text-anchor="middle" font-size="13" fill="#333">d8 Compiler</text>
    <text x="320" y="475" text-anchor="middle" font-size="11" fill="#666">.dex files</text>

    <rect x="410" y="435" width="100" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="460" y="458" text-anchor="middle" font-size="13" fill="#333">AAPT2</text>
    <text x="460" y="475" text-anchor="middle" font-size="11" fill="#666">Resources</text>

    <rect x="550" y="435" width="100" height="50" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="600" y="458" text-anchor="middle" font-size="13" fill="#333">Final APK</text>
    <text x="600" y="475" text-anchor="middle" font-size="11" fill="#666">Signed</text>
  </g>

  <!-- Step 4: AVD Configuration -->
  <g id="step4" class="step" data-narration="Android Virtual Devices provide emulated Android environments for testing your apps without physical hardware. An AVD contains a hardware profile defining screen size and RAM, a system image for a specific Android version, and dedicated storage for user data and SD card simulation.">
    <ellipse cx="200" cy="540" rx="140" ry="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="200" y="535" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">AVD Configuration</text>
    <text x="200" y="555" text-anchor="middle" font-size="12" fill="#555">Hardware Profile + System Image</text>
  </g>

  <!-- Step 5: JDK Requirement -->
  <g id="step5" class="step" data-narration="The Java Development Kit is essential for Android development as it provides the compiler and runtime environment. While Kotlin is now preferred, Android apps still compile to Java bytecode. Android Studio typically bundles OpenJDK, eliminating the need for separate installation.">
    <rect x="400" y="510" width="180" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="490" y="535" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">JDK Prerequisite</text>
    <text x="490" y="555" text-anchor="middle" font-size="13" fill="#555">Java Development Kit</text>
  </g>

  <!-- Step 6: Environment Setup Steps -->
  <g id="step6" class="step" data-narration="Setting up the Android environment involves installing Android Studio, launching SDK Manager to install platform versions, installing SDK Tools including build tools and emulator, creating an AVD with desired hardware profile and system image, and finally verifying installation using ADB commands.">
    <rect x="50" y="20" width="160" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="130" y="42" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Setup Steps</text>
    <text x="130" y="60" text-anchor="middle" font-size="11" fill="#555">Install • Configure • Verify</text>
  </g>

  <!-- Step 7: Development Workflow -->
  <g id="step7" class="step" data-narration="The complete Android development workflow starts with installing and configuring Android Studio. Then create projects using templates, write code in Java or Kotlin, build and test using the emulator or physical devices, and finally debug using ADB logcat and Android Studio's debugging tools. This cycle repeats iteratively during development.">
    <rect x="590" y="20" width="180" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="680" y="37" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Development Cycle</text>
    <text x="680" y="55" text-anchor="middle" font-size="11" fill="#555">Code → Build → Test → Debug</text>
  </g>
</svg>