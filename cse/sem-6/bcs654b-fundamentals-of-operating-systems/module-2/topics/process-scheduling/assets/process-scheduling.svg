<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Process Scheduling</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Process scheduling selects which process runs on the CPU. The goal is to maximize CPU utilization and keep the system responsive through efficient switching.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Selecting processes for CPU execution to maximize utilization</text>
  </g>
  <g id="step1" class="step" data-narration="Scheduling queues: ready queue is a linked list of PCBs of processes in memory. Device queues hold processes waiting for each IO device. Processes migrate between queues.">
    <rect x="50" y="80" width="700" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Scheduling Queues</text>
    <rect x="70" y="110" width="90" height="28" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="115" y="128" text-anchor="middle" font-size="10">Ready Queue</text>
    <line x1="160" y1="124" x2="185" y2="124" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="185" y="110" width="60" height="28" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="215" y="128" text-anchor="middle" font-size="10" font-weight="bold">CPU</text>
    <line x1="245" y1="118" x2="290" y2="118" stroke="#1976d2" stroke-width="1.5"/>
    <rect x="290" y="110" width="100" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="340" y="128" text-anchor="middle" font-size="10">I/O Queue</text>
    <rect x="420" y="110" width="100" height="28" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="470" y="128" text-anchor="middle" font-size="10">Disk Queue</text>
    <rect x="550" y="110" width="100" height="28" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="600" y="128" text-anchor="middle" font-size="10">Time Expire</text>
  </g>
  <g id="step2" class="step" data-narration="Long-term scheduler controls degree of multiprogramming. It selects processes from job pool to load into memory. Executes infrequently, seconds or minutes apart.">
    <rect x="50" y="165" width="220" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="160" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Long-Term Scheduler</text>
    <text x="70" y="205" font-size="11" fill="#424242">Job pool -> memory</text>
    <text x="70" y="222" font-size="11" fill="#424242">Controls multiprogramming</text>
    <text x="70" y="239" font-size="11" fill="#388e3c">Runs infrequently</text>
  </g>
  <g id="step3" class="step" data-narration="Short-term scheduler or CPU scheduler selects from ready queue processes and allocates CPU. Must be very fast as it runs frequently, every few milliseconds.">
    <rect x="290" y="165" width="220" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800">Short-Term Scheduler</text>
    <text x="310" y="205" font-size="11" fill="#424242">Ready queue -> CPU</text>
    <text x="310" y="222" font-size="11" fill="#424242">Selects next process to run</text>
    <text x="310" y="239" font-size="11" fill="#ff9800">Runs very frequently (ms)</text>
  </g>
  <g id="step4" class="step" data-narration="Medium-term scheduler adds swapping. It removes processes from memory to reduce multiprogramming degree, later swaps them back in. Helps manage memory pressure.">
    <rect x="530" y="165" width="220" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="640" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0">Medium-Term Scheduler</text>
    <text x="550" y="205" font-size="11" fill="#424242">Swapping: memory <-> disk</text>
    <text x="550" y="222" font-size="11" fill="#424242">Reduces memory pressure</text>
    <text x="550" y="239" font-size="11" fill="#9c27b0">Improves process mix</text>
  </g>
  <g id="step5" class="step" data-narration="Context switch details: save state into PCB of current process, pick next process, restore state from its PCB. Time depends on hardware: more registers means slower switch.">
    <rect x="50" y="260" width="340" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="220" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Context Switch Overhead</text>
    <text x="70" y="300" font-size="11" fill="#424242">Save current PCB -> Pick next -> Restore PCB</text>
    <text x="70" y="317" font-size="11" fill="#f44336">Time depends on register count and HW support</text>
  </g>
  <g id="step6" class="step" data-narration="Preemptive vs non-preemptive: non-preemptive lets process keep CPU until it voluntarily releases. Preemptive can force a running process off CPU using timer interrupt.">
    <rect x="420" y="260" width="340" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="590" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Preemptive vs Non-Preemptive</text>
    <text x="440" y="300" font-size="11" fill="#424242">Non-preemptive: process keeps CPU willingly</text>
    <text x="440" y="317" font-size="11" fill="#1976d2">Preemptive: OS forces via timer interrupt</text>
  </g>
  <g id="step7" class="step" data-narration="Process scheduling uses three scheduler types and queues to efficiently manage CPU allocation. Context switching enables multitasking with some overhead cost.">
    <rect x="50" y="345" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Long-term + Short-term + Medium-term schedulers = Efficient CPU utilization</text>
  </g>
</svg>
