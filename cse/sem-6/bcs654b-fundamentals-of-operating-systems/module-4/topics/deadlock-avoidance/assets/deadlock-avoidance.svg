<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Deadlock Avoidance using Banker's Algorithm">
    <text x="20" y="30" font-size="24" fill="#2563eb">Deadlock Avoidance using Banker's Algorithm</text>
  </g>
  <g id="step1" data-narration="Banker's Algorithm uses four matrices: Available, Max, Allocation, and Need">
    <rect x="50" y="100" width="150" height="30" fill="#10b981" rx="5" />
    <text x="55" y="120" font-size="18" fill="#fff">Available</text>
    <rect x="250" y="100" width="150" height="30" fill="#10b981" rx="5" />
    <text x="255" y="120" font-size="18" fill="#fff">Max</text>
    <rect x="450" y="100" width="150" height="30" fill="#10b981" rx="5" />
    <text x="455" y="120" font-size="18" fill="#fff">Allocation</text>
    <rect x="650" y="100" width="150" height="30" fill="#10b981" rx="5" />
    <text x="655" y="120" font-size="18" fill="#fff">Need</text>
  </g>
  <g id="step2" data-narration="The Safety Algorithm checks if a state is safe by finding a sequence of processes that can complete">
    <rect x="50" y="200" width="200" height="50" fill="#f59e0b" rx="5" />
    <text x="55" y="230" font-size="18" fill="#fff">Work = Available</text>
    <text x="55" y="255" font-size="18" fill="#fff">Finish[i] = false for all i</text>
    <line x1="250" y1="225" x2="300" y2="225" stroke="#2563eb" marker-end="url(#arrowhead)" />
  </g>
  <g id="step3" data-narration="The algorithm iterates through the processes to find one that can complete">
    <rect x="350" y="200" width="200" height="50" fill="#f59e0b" rx="5" />
    <text x="355" y="230" font-size="18" fill="#fff">Find i such that:</text>
    <text x="355" y="255" font-size="18" fill="#fff">Finish[i] = false and Need[i] ≤ Work</text>
    <line x1="550" y1="225" x2="600" y2="225" stroke="#2563eb" marker-end="url(#arrowhead)" />
  </g>
  <g id="step4" data-narration="If a process can complete, update the Work and Finish arrays">
    <rect x="650" y="200" width="200" height="50" fill="#f59e0b" rx="5" />
    <text x="655" y="230" font-size="18" fill="#fff">Work = Work + Allocation[i]</text>
    <text x="655" y="255" font-size="18" fill="#fff">Finish[i] = true</text>
  </g>
  <g id="step5" data-narration="Repeat the process until all processes have completed or no process can complete">
    <line x1="850" y1="225" x2="800" y2="225" stroke="#2563eb" marker-end="url(#arrowhead)" transform="rotate(180 825 225)" />
  </g>
  <g id="step6" data-narration="If all processes have completed, the system is in a safe state">
    <rect x="50" y="350" width="200" height="50" fill="#8b5cf6" rx="5" />
    <text x="55" y="380" font-size="18" fill="#fff">System is in SAFE state</text>
  </g>
  <g id="step7" data-narration="Example: Processes P0, P1, P2, P3, P4 with resources A, B, C">
    <rect x="350" y="350" width="200" height="50" fill="#8b5cf6" rx="5" />
    <text x="355" y="380" font-size="18" fill="#fff">Processes: P0, P1, P2, P3, P4</text>
    <text x="355" y="405" font-size="18" fill="#fff">Resources: A(10), B(5), C(7)</text>
  </g>
  <g id="step8" data-narration="Allocation and Max matrices for the example">
    <rect x="50" y="450" width="150" height="30" fill="#10b981" rx="5" />
    <text x="55" y="470" font-size="18" fill="#fff">Allocation</text>
    <rect x="250" y="450" width="150" height="30" fill="#10b981" rx="5" />
    <text x="255" y="470" font-size="18" fill="#fff">Max</text>
  </g>
  <g id="step9" data-narration="Need matrix for the example">
    <rect x="450" y="450" width="150" height="30" fill="#10b981" rx="5" />
    <text x="455" y="470" font-size="18" fill="#fff">Need</text>
  </g>
  <g id="step10" data-narration="Available resources for the example">
    <rect x="650" y="450" width="150" height="30" fill="#10b981" rx="5" />
    <text x="655" y="470" font-size="18" fill="#fff">Available</text>
  </g>
  <g id="step11" data-narration="Safe sequence for the example: P1 → P3 → P4 → P2 → P0">
    <rect x="50" y="550" width="200" height="50" fill="#8b5cf6" rx="5" />
    <text x="55" y="580" font-size="18" fill="#fff">Safe sequence: P1 → P3 → P4 → P2 → P0</text>
  </g>
</svg>