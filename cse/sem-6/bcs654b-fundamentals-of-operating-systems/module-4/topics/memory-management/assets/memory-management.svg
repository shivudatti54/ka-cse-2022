<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Memory Management">
    <text x="50" y="50" font-size="24" fill="#2563eb">Memory Management</text>
    <text x="50" y="80" font-size="18" fill="#10b981">Understanding how memory is allocated and managed</text>
  </g>
  <g id="step1" data-narration="Memory Hierarchy">
    <rect x="50" y="120" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="155" font-size="18" fill="#ffffff">Registers</text>
    <line x1="250" y1="137.5" x2="300" y2="137.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="300" y="120" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="155" font-size="18" fill="#ffffff">Cache</text>
    <line x1="500" y1="137.5" x2="550" y2="137.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="550" y="120" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="560" y="155" font-size="18" fill="#ffffff">Main Memory</text>
    <line x1="750" y1="137.5" x2="800" y2="137.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="750" y="170" width="50" height="50" fill="#f59e0b" rx="10" />
    <text x="755" y="205" font-size="18" fill="#ffffff">Disk</text>
  </g>
  <g id="step2" data-narration="Address Binding">
    <rect x="50" y="240" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="60" y="275" font-size="18" fill="#ffffff">Compile Time</text>
    <line x1="250" y1="257.5" x2="300" y2="257.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="300" y="240" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="310" y="275" font-size="18" fill="#ffffff">Load Time</text>
    <line x1="500" y1="257.5" x2="550" y2="257.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="550" y="240" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="560" y="275" font-size="18" fill="#ffffff">Execution Time</text>
  </g>
  <g id="step3" data-narration="Logical vs Physical Address">
    <rect x="50" y="320" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="355" font-size="18" fill="#ffffff">Logical Address</text>
    <line x1="250" y1="337.5" x2="300" y2="337.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="300" y="320" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="355" font-size="18" fill="#ffffff">MMU (Memory Management Unit)</text>
    <line x1="500" y1="337.5" x2="550" y2="337.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="550" y="320" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="355" font-size="18" fill="#ffffff">Physical Address</text>
  </g>
  <g id="step4" data-narration="Contiguous Allocation">
    <rect x="50" y="400" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="435" font-size="18" fill="#ffffff">Fixed Partitions</text>
    <line x1="250" y1="417.5" x2="300" y2="417.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="300" y="400" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="435" font-size="18" fill="#ffffff">Variable Partitions</text>
  </g>
  <g id="step5" data-narration="Fragmentation">
    <rect x="50" y="470" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="60" y="505" font-size="18" fill="#ffffff">Internal Fragmentation</text>
    <line x1="250" y1="487.5" x2="300" y2="487.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="300" y="470" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="310" y="505" font-size="18" fill="#ffffff">External Fragmentation</text>
  </g>
  <g id="step6" data-narration="Solutions to Fragmentation">
    <rect x="50" y="540" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="575" font-size="18" fill="#ffffff">Compaction</text>
    <line x1="250" y1="557.5" x2="300" y2="557.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="300" y="540" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="575" font-size="18" fill="#ffffff">Paging</text>
    <line x1="500" y1="557.5" x2="550" y2="557.5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="550" y="540" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="575" font-size="18" fill="#ffffff">Segmentation</text>
  </g>
</svg>