<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
<defs>
<linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
<stop offset="100%" stop-color="#10b981" stop-opacity="1" />
</linearGradient>
<marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
</marker>
</defs>
<rect width="800" height="600" fill="#f8fafc"/>
<g id="step0" data-narration="Introduction to the concept of Paging">
<text x="50" y="50" font-size="24" fill="#2563eb">Paging Concept</text>
<text x="50" y="80" font-size="18" fill="#8b5cf6">Physical memory divided into fixed-size blocks called frames</text>
<text x="50" y="110" font-size="18" fill="#8b5cf6">Logical memory divided into same-size blocks called pages</text>
</g>
<g id="step1" data-narration="Logical Address Structure">
<use href="#step0" x="0" y="0"/>
<rect x="50" y="140" width="200" height="50" fill="#f59e0b" rx="5"/>
<text x="60" y="170" font-size="18" fill="#ffffff">Logical Address</text>
<line x1="250" y1="165" x2="350" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="140" width="100" height="50" fill="#10b981" rx="5"/>
<text x="360" y="170" font-size="18" fill="#ffffff">Page Number (p)</text>
<rect x="470" y="140" width="100" height="50" fill="#10b981" rx="5"/>
<text x="480" y="170" font-size="18" fill="#ffffff">Page Offset (d)</text>
</g>
<g id="step2" data-narration="Address Translation Process">
<use href="#step1" x="0" y="0"/>
<rect x="50" y="220" width="200" height="50" fill="#f59e0b" rx="5"/>
<text x="60" y="250" font-size="18" fill="#ffffff">Translation Process</text>
<line x1="250" y1="245" x2="350" y2="245" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="220" width="100" height="50" fill="#10b981" rx="5"/>
<text x="360" y="250" font-size="18" fill="#ffffff">Extract Page Number (p)</text>
<rect x="470" y="220" width="100" height="50" fill="#10b981" rx="5"/>
<text x="480" y="250" font-size="18" fill="#ffffff">Look up Frame Number (f)</text>
</g>
<g id="step3" data-narration="Physical Address Calculation">
<use href="#step2" x="0" y="0"/>
<rect x="50" y="300" width="200" height="50" fill="#f59e0b" rx="5"/>
<text x="60" y="330" font-size="18" fill="#ffffff">Physical Address Calculation</text>
<line x1="250" y1="325" x2="350" y2="325" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="300" width="200" height="50" fill="#10b981" rx="5"/>
<text x="360" y="330" font-size="18" fill="#ffffff">Physical Address = (Page Table[p]) × Page Size + Offset</text>
</g>
<g id="step4" data-narration="Page Table Structure">
<use href="#step3" x="0" y="0"/>
<rect x="50" y="380" width="200" height="50" fill="#f59e0b" rx="5"/>
<text x="60" y="410" font-size="18" fill="#ffffff">Page Table Structure</text>
<line x1="250" y1="405" x2="350" y2="405" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="380" width="100" height="50" fill="#10b981" rx="5"/>
<text x="360" y="410" font-size="18" fill="#ffffff">Frame Number</text>
<rect x="470" y="380" width="100" height="50" fill="#10b981" rx="5"/>
<text x="480" y="410" font-size="18" fill="#ffffff">Valid/Invalid Bit</text>
</g>
<g id="step5" data-narration="Page Table Entry (PTE) Contents">
<use href="#step4" x="0" y="0"/>
<rect x="50" y="460" width="200" height="50" fill="#f59e0b" rx="5"/>
<text x="60" y="490" font-size="18" fill="#ffffff">Page Table Entry (PTE) Contents</text>
<line x1="250" y1="485" x2="350" y2="485" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="460" width="200" height="50" fill="#10b981" rx="5"/>
<text x="360" y="490" font-size="18" fill="#ffffff">Frame Number, Valid/Invalid Bit, Protection Bits, Dirty Bit, Reference Bit</text>
</g>
<g id="step6" data-narration="Page Table Implementation">
<use href="#step5" x="0" y="0"/>
<rect x="50" y="520" width="200" height="50" fill="#f59e0b" rx="5"/>
<text x="60" y="550" font-size="18" fill="#ffffff">Page Table Implementation</text>
<line x1="250" y1="545" x2="350" y2="545" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="520" width="200" height="50" fill="#10b981" rx="5"/>
<text x="360" y="550" font-size="18" fill="#ffffff">Page Table Base Register (PTBR) and Translation Lookaside Buffer (TLB)</text>
</g>
<g id="step7" data-narration="Multi-Level Paging">
<use href="#step6" x="0" y="0"/>
<rect x="50" y="580" width="200" height="50" fill="#f59e0b" rx="5"/>
<text x="60" y="610" font-size="18" fill="#ffffff">Multi-Level Paging</text>
<line x1="250" y1="605" x2="350" y2="605" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="350" y="580" width="200" height="50" fill="#10b981" rx="5"/>
<text x="360" y="610" font-size="18" fill="#ffffff">Hierarchical Paging to reduce page table size</text>
</g>
</svg>