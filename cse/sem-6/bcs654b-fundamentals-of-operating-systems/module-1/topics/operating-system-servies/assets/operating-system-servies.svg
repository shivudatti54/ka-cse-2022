<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Operating System Services</text>
  <g id="step0" class="step" data-narration="The OS provides services that make programming easier. These services help users, programs, and the system run efficiently and securely.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Services for users, programs, and efficient system operation</text>
  </g>
  <g id="step1" class="step" data-narration="User interface: CLI lets users type commands. GUI uses windows and icons. Batch interface runs commands from files without interaction.">
    <rect x="50" y="80" width="220" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="160" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">User Interface</text>
    <text x="70" y="120" font-size="11" fill="#424242">CLI: command-line text input</text>
    <text x="70" y="137" font-size="11" fill="#424242">GUI: windows, icons, menus</text>
    <text x="70" y="154" font-size="11" fill="#1976d2">Batch: scripted commands</text>
  </g>
  <g id="step2" class="step" data-narration="Program execution: OS loads programs into memory, runs them, and terminates them normally or abnormally. Essential for any computing task.">
    <rect x="290" y="80" width="220" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Program Execution</text>
    <text x="310" y="120" font-size="11" fill="#424242">Load program into memory</text>
    <text x="310" y="137" font-size="11" fill="#424242">Run and manage execution</text>
    <text x="310" y="154" font-size="11" fill="#388e3c">Handle normal/abnormal end</text>
  </g>
  <g id="step3" class="step" data-narration="IO operations: programs cannot access IO directly. OS provides IO services for files and devices. This ensures safe and controlled hardware access.">
    <rect x="530" y="80" width="220" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="640" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">I/O Operations</text>
    <text x="550" y="120" font-size="11" fill="#424242">Programs request I/O via OS</text>
    <text x="550" y="137" font-size="11" fill="#424242">File and device operations</text>
    <text x="550" y="154" font-size="11" fill="#ff9800">Safe, controlled HW access</text>
  </g>
  <g id="step4" class="step" data-narration="File system manipulation: OS creates, deletes, reads, writes files and directories. It also manages permissions and access control.">
    <rect x="50" y="175" width="220" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="160" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">File System</text>
    <text x="70" y="215" font-size="11" fill="#424242">Create, delete, read, write files</text>
    <text x="70" y="232" font-size="11" fill="#424242">Directory management</text>
    <text x="70" y="249" font-size="11" fill="#9c27b0">Permissions and access control</text>
  </g>
  <g id="step5" class="step" data-narration="Communication services: processes exchange information via shared memory or message passing. This works between processes on same computer or across a network.">
    <rect x="290" y="175" width="220" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Communications</text>
    <text x="310" y="215" font-size="11" fill="#424242">Shared memory model</text>
    <text x="310" y="232" font-size="11" fill="#424242">Message passing model</text>
    <text x="310" y="249" font-size="11" fill="#f44336">Local or networked processes</text>
  </g>
  <g id="step6" class="step" data-narration="Error detection and resource allocation: OS monitors for errors in CPU, memory, IO. It allocates CPU, memory, and files fairly among concurrent users.">
    <rect x="530" y="175" width="220" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="640" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Error &amp; Resources</text>
    <text x="550" y="215" font-size="11" fill="#424242">Detect CPU, memory, IO errors</text>
    <text x="550" y="232" font-size="11" fill="#424242">Allocate resources fairly</text>
    <text x="550" y="249" font-size="11" fill="#1976d2">Logging, accounting, protection</text>
  </g>
  <g id="step7" class="step" data-narration="OS services ensure convenience for users and efficient operation for the system. They form the foundation every application relies upon.">
    <rect x="50" y="270" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="295" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">OS Services = User convenience + System efficiency + Security protection</text>
  </g>
</svg>
