<svg viewBox="0 0 800 1150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffebee"/>
      <stop offset="100%" stop-color="#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    
    <!-- Arrow Marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawPath {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 3px #1976d2); }
      50% { filter: drop-shadow(0 0 8px #1976d2); }
    }
    
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .animate-path { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawPath 2s ease-out forwards; }
    .highlight { animation: pulse 2s infinite; }
    .glow { animation: glow 3s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1150" fill="#f8f9fa"/>
  
  <!-- STEP 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to this lesson on System Calls and API. We'll explore how applications interact with the operating system kernel.">
    <rect x="50" y="10" width="700" height="50" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">System Calls and API</text>
  </g>
  
  <!-- STEP 1: Dual-Mode Operation -->
  <g class="step" id="step1" data-narration="Modern operating systems use Dual-Mode Operation: User Mode for applications and Kernel Mode for the OS kernel to protect the system.">
    <rect x="50" y="70" width="340" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2">USER MODE</text>
    <text x="70" y="108" font-family="Arial, sans-serif" font-size="9" fill="#555">Applications run here</text>
    <text x="70" y="122" font-family="Arial, sans-serif" font-size="9" fill="#555">Cannot execute privileged</text>
    <text x="70" y="136" font-family="Arial, sans-serif" font-size="9" fill="#555">instructions directly</text>
    <rect x="410" y="70" width="340" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="430" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100">KERNEL MODE</text>
    <text x="430" y="108" font-family="Arial, sans-serif" font-size="9" fill="#555">OS Kernel runs here</text>
    <text x="430" y="122" font-family="Arial, sans-serif" font-size="9" fill="#555">Full hardware access</text>
    <text x="430" y="136" font-family="Arial, sans-serif" font-size="9" fill="#555">Can execute all CPU instructions</text>
  </g>
  
  <!-- STEP 2: What is a System Call? -->
  <g class="step" id="step2" data-narration="A system call is a programmed request to the OS kernel to perform a privileged task. It's the only entry point into the kernel.">
    <rect x="50" y="165" width="700" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#388e3c">What is a System Call?</text>
    <text x="70" y="205" font-family="Arial, sans-serif" font-size="10" fill="#555">A system call is the fundamental interface between a user application and</text>
    <text x="70" y="220" font-family="Arial, sans-serif" font-size="10" fill="#555">the operating system kernel. It's implemented as a software interrupt (trap).</text>
    <text x="70" y="238" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#666">"Like requesting a document from a secure archive through an archivist"</text>
  </g>
  
  <!-- STEP 3: System Call Mechanism Overview -->
  <g class="step" id="step3" data-narration="Let's trace the journey of a system call from user application to kernel and back. This is the mechanism that ensures secure system access.">
    <rect x="50" y="260" width="700" height="90" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="280" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7b1fa2">System Call Mechanism: Overview</text>
    
    <!-- Flow diagram -->
    <rect x="80" y="295" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="130" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1976d2">User App</text>
    
    <path d="M180 312 L210 312" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)" class="animate-path"/>
    
    <rect x="220" y="295" width="100" height="35" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="270" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e65100">API Library</text>
    
    <path d="M320 312 L350 312" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)" class="animate-path"/>
    
    <rect x="360" y="295" width="100" height="35" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="410" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Trap (int 0x80)</text>
    
    <path d="M460 312 L490 312" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)" class="animate-path"/>
    
    <rect x="500" y="295" width="100" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="550" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32">Kernel</text>
    
    <path d="M600 312 L630 312" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)" class="animate-path"/>
    
    <rect x="640" y="295" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="690" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1976d2">Return Result</text>
  </g>
  
  <!-- STEP 4: Steps 1-2: Invocation and Preparation -->
  <g class="step" id="step4" data-narration="Step 1: The application calls a library function like read(). Step 2: The library prepares arguments and loads the system call number.">
    <rect x="50" y="360" width="340" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="380" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1976d2">Step 1: Invocation</text>
    <text x="70" y="398" font-family="Arial, sans-serif" font-size="9" fill="#555">Application calls API function</text>
    <text x="70" y="412" font-family="Arial, sans-serif" font-size="9" fill="#555">e.g., read(fd, buffer, n)</text>
    <text x="70" y="430" font-family="Arial, sans-serif" font-size="9" fill="#666">from standard C library</text>
    
    <rect x="410" y="360" width="340" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="430" y="380" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100">Step 2: Preparation</text>
    <text x="430" y="398" font-family="Arial, sans-serif" font-size="9" fill="#555">Library prepares arguments</text>
    <text x="430" y="412" font-family="Arial, sans-serif" font-size="9" fill="#555">according to calling convention</text>
    <text x="430" y="430" font-family="Arial, sans-serif" font-size="9" fill="#666">Stores call number in eax</text>
  </g>
  
  <!-- STEP 5: Step 3-4: Trap and Mode Switch -->
  <g class="step" id="step5" data-narration="Step 3: The library executes a special instruction like int 0x80 that triggers a trap. Step 4: CPU saves state and switches to kernel mode.">
    <rect x="50" y="455" width="340" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="70" y="475" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c62828">Step 3: Trap</text>
    <text x="70" y="493" font-family="Arial, sans-serif" font-size="9" fill="#555">Executes 'int 0x80' or</text>
    <text x="70" y="507" font-family="Arial, sans-serif" font-size="9" fill="#555">'syscall' instruction</text>
    <text x="70" y="525" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Software interrupt triggers</text>
    
    <rect x="410" y="455" width="340" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="430" y="475" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Step 4: Mode Switch</text>
    <text x="430" y="493" font-family="Arial, sans-serif" font-size="9" fill="#555">CPU detects trap, saves state</text>
    <text x="430" y="507" font-family="Arial, sans-serif" font-size="9" fill="#555">Switches from User Mode</text>
    <text x="430" y="525" font-family="Arial, sans-serif" font-size="9" fill="#2e7d32">to Kernel Mode (privileged)</text>
  </g>
  
  <!-- STEP 6: Step 5: Execution in Kernel -->
  <g class="step" id="step6" data-narration="Step 5: The trap handler identifies the system call using the number in eax register, then calls the appropriate handler like sys_read().">
    <rect x="50" y="550" width="700" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="570" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7b1fa2">Step 5: Execution in Kernel</text>
    <text x="70" y="588" font-family="Arial, sans-serif" font-size="9" fill="#555">Trap handler examines request, reads system call number from register</text>
    <text x="70" y="602" font-family="Arial, sans-serif" font-size="9" fill="#555">Calls corresponding handler (e.g., sys_read, sys_write)</text>
    <text x="70" y="620" font-family="Arial, sans-serif" font-size="9" fill="#666">Kernel performs the privileged task (file I/O, memory allocation, etc.)</text>
  </g>
  
  <!-- STEP 7: Step 6: Return -->
  <g class="step" id="step7" data-narration="Step 6: OS returns result via register, then switches back to user mode. The application resumes just after the trap instruction.">
    <rect x="50" y="645" width="700" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="665" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100">Step 6: Return to User Mode</text>
    <text x="70" y="683" font-family="Arial, sans-serif" font-size="9" fill="#555">Kernel returns result (success/failure) via registers</text>
    <text x="70" y="697" font-family="Arial, sans-serif" font-size="9" fill="#555">Arranges return from trap - CPU switches back to User Mode</text>
    <text x="70" y="715" font-family="Arial, sans-serif" font-size="9" fill="#666">Application resumes execution after the trap instruction</text>
  </g>
  
  <!-- STEP 8: Categories of System Calls -->
  <g class="step" id="step8" data-narration="System calls are categorized: Process Control (fork, exec), File Management (open, read, write), Device Management, Information, Communication, and Protection.">
    <rect x="50" y="740" width="700" height="90" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="760" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2">Categories of System Calls</text>
    
    <!-- Category boxes -->
    <rect x="70" y="775" width="155" height="40" rx="5" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="80" y="788" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#388e3c">Process Control</text>
    <text x="80" y="802" font-family="Arial, sans-serif" font-size="8" fill="#555">fork(), exec(), exit()</text>
    
    <rect x="235" y="775" width="155" height="40" rx="5" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="245" y="788" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1976d2">File Management</text>
    <text x="245" y="802" font-family="Arial, sans-serif" font-size="8" fill="#555">open(), read(), write()</text>
    
    <rect x="400" y="775" width="155" height="40" rx="5" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="410" y="788" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#e65100">Device Mgmt</text>
    <text x="410" y="802" font-family="Arial, sans-serif" font-size="8" fill="#555">ioctl(), read(), write()</text>
    
    <rect x="565" y="775" width="155" height="40" rx="5" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="575" y="788" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#7b1fa2">Communication</text>
    <text x="575" y="802" font-family="Arial, sans-serif" font-size="8" fill="#555">pipe(), shmget(), msgget()</text>
  </g>
  
  <!-- STEP 9: API vs System Call -->
  <g class="step" id="step9" data-narration="API defines interface (what), System Call implements it (how). API function may wrap one or more system calls, or none at all.">
    <rect x="50" y="840" width="340" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="860" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#388e3c">API (Application Programming Interface)</text>
    <text x="70" y="878" font-family="Arial, sans-serif" font-size="9" fill="#555">A set of function definitions</text>
    <text x="70" y="892" font-family="Arial, sans-serif" font-size="9" fill="#555">and protocols for building</text>
    <text x="70" y="906" font-family="Arial, sans-serif" font-size="9" fill="#555">software - the "what"</text>
    
    <rect x="410" y="840" width="340" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="430" y="860" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c62828">System Call</text>
    <text x="430" y="878" font-family="Arial, sans-serif" font-size="9" fill="#555">Low-level implementation</text>
    <text x="430" y="892" font-family="Arial, sans-serif" font-size="9" fill="#555">that crosses user-kernel</text>
    <text x="430" y="906" font-family="Arial, sans-serif" font-size="9" fill="#555">boundary - the "how"</text>
    
    <!-- Arrow between -->
    <path d="M350 882 L400 882" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- STEP 10: Examples -->
  <g class="step" id="step10" data-narration="Example: printf() API wraps write() system call. Python's os.getpid() wraps getpid system call. The API is the wrapper, system call does the work.">
    <rect x="50" y="935" width="700" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="955" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7b1fa2">Common Examples</text>
    
    <!-- Code examples -->
    <rect x="70" y="970" width="310" height="40" rx="5" fill="#263238" stroke="#455a64"/>
    <text x="80" y="982" font-family="Courier New, monospace" font-size="9" fill="#80cbc4">printf("Hello"); // API</text>
    <text x="80" y="996" font-family="Courier New, monospace" font-size="8" fill="#78909c">→ uses write() system call</text>
    
    <rect x="400" y="970" width="310" height="40" rx="5" fill="#263238" stroke="#455a64"/>
    <text x="410" y="982" font-family="Courier New, monospace" font-size="9" fill="#80cbc4">os.getpid() // Python API</text>
    <text x="410" y="996" font-family="Courier New, monospace" font-size="8" fill="#78909c">→ uses getpid system call</text>
  </g>
  
  <!-- STEP 11: Why Important + Exam Tips -->
  <g class="step" id="step11" data-narration="System calls provide security, abstraction, and portability. Remember: API is the contract, system call is the implementation. Know the step-by-step process!">
    <rect x="50" y="1030" width="700" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="1050" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1976d2">Why System Calls Matter &amp; Exam Tips</text>
    <text x="70" y="1068" font-family="Arial, sans-serif" font-size="9" fill="#555">• Security: Prevent direct hardware access | Abstraction: Uniform interface | Portability: Works across hardware</text>
    <text x="70" y="1082" font-family="Arial, sans-serif" font-size="9" fill="#555">• Remember: API = contract (what), System Call = implementation (how)</text>
    <text x="70" y="1096" font-family="Arial, sans-serif" font-size="9" font-style="italic" fill="#666">• Know 6 categories with 2 examples each | Trace flow: App → Library → Trap → Kernel → Return</text>
  </g>
</svg>