<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Threat Intelligence Sharing">
    <text x="50" y="50" font-size="24" fill="#2563eb">Threat Intelligence Sharing</text>
    <text x="50" y="100" font-size="18" fill="#10b981">Collaborative practice of exchanging information about cyber threats</text>
    <rect x="50" y="150" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="185" font-size="18" fill="#ffffff">Threat Intelligence</text>
  </g>
  <g id="step1" data-narration="The Critical Need for Sharing">
    <use x="300" y="50" href="#step0" />
    <text x="300" y="100" font-size="18" fill="#8b5cf6">Cyber adversaries are highly organized, often targeting multiple victims</text>
    <rect x="300" y="150" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="185" font-size="18" fill="#ffffff">Speed and Scale</text>
    <line x1="400" y1="175" x2="500" y2="175" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="Key Concepts and Terminology">
    <use x="500" y="50" href="#step1" />
    <text x="500" y="100" font-size="18" fill="#f59e0b">Threat intelligence is shared through various models</text>
    <rect x="500" y="150" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="510" y="185" font-size="18" fill="#ffffff">Sharing Models and Communities</text>
    <line x1="600" y1="175" x2="700" y2="175" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" data-narration="Benefits of Threat Intelligence Sharing">
    <use x="50" y="250" href="#step0" />
    <text x="50" y="300" font-size="18" fill="#2563eb">Enables proactive defense across countless networks</text>
    <rect x="50" y="350" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="385" font-size="18" fill="#ffffff">Context is King</text>
    <line x1="150" y1="375" x2="250" y2="375" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="Cost Efficiency">
    <use x="300" y="250" href="#step3" />
    <text x="300" y="300" font-size="18" fill="#10b981">Leverage intelligence discovered by others</text>
    <rect x="300" y="350" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="310" y="385" font-size="18" fill="#ffffff">Cost Efficiency</text>
    <line x1="400" y1="375" x2="500" y2="375" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step5" data-narration="Conclusion">
    <use x="500" y="250" href="#step4" />
    <text x="500" y="300" font-size="18" fill="#8b5cf6">Threat intelligence sharing raises the collective security posture</text>
    <rect x="500" y="350" width="200" height="50" fill="#10b981" rx="10" />
    <text x="510" y="385" font-size="18" fill="#ffffff">Collective Defense</text>
  </g>
</svg>