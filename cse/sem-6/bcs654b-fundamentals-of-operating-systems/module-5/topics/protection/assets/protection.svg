<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Protection</text>
  <g id="step0" class="step" data-narration="Protection controls access to files and resources. It defines what operations each user can perform. Ensures data integrity, confidentiality, and system security.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">Controlling who can access what and how in the file system</text>
  </g>
  <g id="step1" class="step" data-narration="Types of access: read, write, execute, append, delete, and list. Each file needs controlled access. Owner defines which users get which permissions on the file.">
    <rect x="50" y="80" width="340" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Types of Access</text>
    <rect x="70" y="112" width="60" height="22" rx="4" fill="#bbdefb"/>
    <text x="100" y="127" text-anchor="middle" font-size="10" fill="#1976d2">Read</text>
    <rect x="140" y="112" width="60" height="22" rx="4" fill="#bbdefb"/>
    <text x="170" y="127" text-anchor="middle" font-size="10" fill="#1976d2">Write</text>
    <rect x="210" y="112" width="60" height="22" rx="4" fill="#bbdefb"/>
    <text x="240" y="127" text-anchor="middle" font-size="10" fill="#1976d2">Execute</text>
    <rect x="280" y="112" width="60" height="22" rx="4" fill="#bbdefb"/>
    <text x="310" y="127" text-anchor="middle" font-size="10" fill="#1976d2">Append</text>
    <rect x="70" y="140" width="60" height="22" rx="4" fill="#bbdefb"/>
    <text x="100" y="155" text-anchor="middle" font-size="10" fill="#1976d2">Delete</text>
    <rect x="140" y="140" width="60" height="22" rx="4" fill="#bbdefb"/>
    <text x="170" y="155" text-anchor="middle" font-size="10" fill="#1976d2">List</text>
  </g>
  <g id="step2" class="step" data-narration="Access control list or ACL associates each file with a list of users and their permitted operations. Flexible but can be lengthy. Used in Windows NTFS.">
    <rect x="420" y="80" width="340" height="90" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="590" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Access Control List (ACL)</text>
    <text x="440" y="120" font-size="10" fill="#424242">File: report.doc</text>
    <text x="440" y="137" font-size="10" fill="#424242">Alice: read, write, execute</text>
    <text x="440" y="154" font-size="10" fill="#424242">Bob:   read only</text>
    <text x="440" y="166" font-size="10" fill="#388e3c">Carol: read, write</text>
  </g>
  <g id="step3" class="step" data-narration="Unix permission model: three classes - owner, group, other. Three bits each for read write execute. Total nine bits. Example: rwxr-xr-- means owner has all, group read-execute, others read.">
    <rect x="50" y="185" width="700" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Unix Permission Bits (rwx)</text>
    <rect x="80" y="218" width="180" height="35" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="170" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Owner</text>
    <text x="170" y="247" text-anchor="middle" font-size="12" font-family="monospace" fill="#424242">r w x</text>
    <rect x="280" y="218" width="180" height="35" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="370" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Group</text>
    <text x="370" y="247" text-anchor="middle" font-size="12" font-family="monospace" fill="#424242">r - x</text>
    <rect x="480" y="218" width="180" height="35" rx="4" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="570" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#ff9800">Other</text>
    <text x="570" y="247" text-anchor="middle" font-size="12" font-family="monospace" fill="#424242">r - -</text>
  </g>
  <g id="step4" class="step" data-narration="Condensed ACL: combine ACL with owner-group-other model. Owner, group, and universe categories. Most systems use this hybrid approach for practical file protection.">
    <rect x="50" y="280" width="340" height="70" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Condensed ACL</text>
    <text x="70" y="320" font-size="11" fill="#424242">Owner + Group + Universe = 3 categories</text>
    <text x="70" y="337" font-size="11" fill="#9c27b0">Practical hybrid: simple yet effective</text>
  </g>
  <g id="step5" class="step" data-narration="Access matrix: rows are domains or users. Columns are objects or files. Each cell contains allowed operations. Implemented as ACL per column or capability list per row.">
    <rect x="420" y="280" width="340" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="590" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Access Matrix</text>
    <text x="440" y="320" font-size="11" fill="#424242">Rows = users, Columns = files</text>
    <text x="440" y="337" font-size="11" fill="#f44336">Cell = {read, write, execute, ...}</text>
  </g>
  <g id="step6" class="step" data-narration="Other protection mechanisms: passwords per file, encryption, and capability-based systems. Multi-factor authentication adds extra security layer beyond simple permission bits.">
    <rect x="50" y="365" width="700" height="55" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Additional Protection Mechanisms</text>
    <text x="70" y="405" font-size="11" fill="#424242">Passwords, encryption, capabilities, multi-factor authentication</text>
  </g>
  <g id="step7" class="step" data-narration="Protection ensures controlled file access through permission bits, access control lists, and access matrices. Unix model with owner-group-other is most widely adopted.">
    <rect x="50" y="435" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">ACL + Permission Bits + Access Matrix = Comprehensive File Protection</text>
  </g>
</svg>
