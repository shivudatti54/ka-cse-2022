<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Access Methods</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <g id="step0" class="step" data-narration="Access methods define how data stored in a file is accessed. The method depends on file structure and intended use pattern.">
    <text x="400" y="60" text-anchor="middle" font-size="14" fill="#616161">How data in files is read and written by programs</text>
  </g>
  <g id="step1" class="step" data-narration="Sequential access reads data one record after another in order. Read next advances file pointer. Write appends to end. Most common access method used by editors and compilers.">
    <rect x="50" y="80" width="700" height="75" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Sequential Access</text>
    <rect x="80" y="115" width="60" height="25" rx="4" fill="#1976d2"/>
    <text x="110" y="132" text-anchor="middle" font-size="10" fill="#ffffff">Rec 1</text>
    <rect x="145" y="115" width="60" height="25" rx="4" fill="#1976d2"/>
    <text x="175" y="132" text-anchor="middle" font-size="10" fill="#ffffff">Rec 2</text>
    <rect x="210" y="115" width="60" height="25" rx="4" fill="#1976d2"/>
    <text x="240" y="132" text-anchor="middle" font-size="10" fill="#ffffff">Rec 3</text>
    <rect x="275" y="115" width="60" height="25" rx="4" fill="#ffeb3b"/>
    <text x="305" y="132" text-anchor="middle" font-size="10" fill="#424242">Rec 4</text>
    <rect x="340" y="115" width="60" height="25" rx="4" fill="#e0e0e0"/>
    <text x="370" y="132" text-anchor="middle" font-size="10" fill="#424242">Rec 5</text>
    <line x1="305" y1="145" x2="305" y2="150" stroke="#f44336" stroke-width="2"/>
    <text x="305" y="148" text-anchor="middle" font-size="9" fill="#f44336">ptr</text>
    <text x="500" y="120" font-size="11" fill="#424242">read_next() / write_next()</text>
    <text x="500" y="137" font-size="11" fill="#1976d2">reset() returns to beginning</text>
  </g>
  <g id="step2" class="step" data-narration="Direct access or random access allows reading and writing records in any order. Uses block number as parameter. Based on fixed-length logical records. Used by databases.">
    <rect x="50" y="170" width="700" height="75" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Direct (Random) Access</text>
    <rect x="80" y="205" width="50" height="25" rx="4" fill="#e0e0e0"/>
    <text x="105" y="222" text-anchor="middle" font-size="9" fill="#424242">Blk 0</text>
    <rect x="135" y="205" width="50" height="25" rx="4" fill="#e0e0e0"/>
    <text x="160" y="222" text-anchor="middle" font-size="9" fill="#424242">Blk 1</text>
    <rect x="190" y="205" width="50" height="25" rx="4" fill="#c8e6c9"/>
    <text x="215" y="222" text-anchor="middle" font-size="9" fill="#388e3c">Blk 2</text>
    <rect x="245" y="205" width="50" height="25" rx="4" fill="#e0e0e0"/>
    <text x="270" y="222" text-anchor="middle" font-size="9" fill="#424242">Blk 3</text>
    <rect x="300" y="205" width="50" height="25" rx="4" fill="#c8e6c9"/>
    <text x="325" y="222" text-anchor="middle" font-size="9" fill="#388e3c">Blk 4</text>
    <text x="500" y="212" font-size="11" fill="#424242">read(block_n) / write(block_n)</text>
    <text x="500" y="229" font-size="11" fill="#388e3c">Jump to any block instantly</text>
  </g>
  <g id="step3" class="step" data-narration="Indexed sequential access builds an index over sequential file. Index contains pointers to blocks. Search index first then follow pointer. Combines benefits of both methods.">
    <rect x="50" y="260" width="340" height="85" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="220" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Indexed Sequential Access</text>
    <rect x="70" y="295" width="80" height="40" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="110" y="312" text-anchor="middle" font-size="10" fill="#ff9800">Index</text>
    <text x="110" y="328" text-anchor="middle" font-size="9" fill="#424242">Key -> Ptr</text>
    <line x1="150" y1="315" x2="175" y2="315" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="180" y="295" width="190" height="40" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="275" y="312" text-anchor="middle" font-size="10" fill="#424242">Sequential Data File</text>
    <text x="275" y="328" text-anchor="middle" font-size="9" fill="#ff9800">Sorted records on disk</text>
  </g>
  <g id="step4" class="step" data-narration="Sequential access is simplest but slow for random lookups. Direct access is fast but wastes space if file is sparse. Indexed access balances speed and space efficiency.">
    <rect x="420" y="260" width="340" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="590" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Trade-offs</text>
    <text x="440" y="300" font-size="11" fill="#424242">Sequential: simple, slow random</text>
    <text x="440" y="317" font-size="11" fill="#424242">Direct: fast random, may waste space</text>
    <text x="440" y="334" font-size="11" fill="#9c27b0">Indexed: balanced, needs index overhead</text>
  </g>
  <g id="step5" class="step" data-narration="Sequential access uses current file position pointer. Operations are read next and write next. Can rewind to beginning. Cannot easily skip to arbitrary position.">
    <rect x="50" y="360" width="340" height="70" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="220" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#f44336">Sequential Operations</text>
    <text x="70" y="400" font-size="11" fill="#424242">read_next(), write_next(), reset()</text>
    <text x="70" y="417" font-size="11" fill="#f44336">File pointer auto-advances after each op</text>
  </g>
  <g id="step6" class="step" data-narration="Direct access operations use block number n. Read n and write n for specific blocks. Position to n then read next simulates sequential on direct files. n is relative block number.">
    <rect x="420" y="360" width="340" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="590" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Direct Access Operations</text>
    <text x="440" y="400" font-size="11" fill="#424242">read(n), write(n), position(n)</text>
    <text x="440" y="417" font-size="11" fill="#1976d2">n = relative block number within file</text>
  </g>
  <g id="step7" class="step" data-narration="Access methods determine file usage patterns. Sequential for linear processing, direct for databases, and indexed for key-based lookups. Choice affects performance significantly.">
    <rect x="50" y="445" width="700" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Sequential (linear) | Direct (random) | Indexed (key-based) Access</text>
  </g>
</svg>
