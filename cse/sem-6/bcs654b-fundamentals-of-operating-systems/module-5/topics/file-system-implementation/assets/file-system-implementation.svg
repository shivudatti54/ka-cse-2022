<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="22" fill="#2563eb" text-anchor="middle" font-weight="bold">File System Implementation</text>
  <g id="step0" class="step" data-narration="Introduction to File System Implementation">
    <rect x="150" y="80" width="500" height="100" fill="#2563eb" rx="10" />
    <text x="400" y="125" font-size="24" fill="#ffffff" font-family="Arial" text-anchor="middle">File System Implementation</text>
    <text x="400" y="155" font-size="16" fill="#ffffff" text-anchor="middle">How files are stored and managed on disk</text>
  </g>
  <g id="step1" class="step" data-narration="File System Structure">
    <rect x="50" y="60" width="700" height="180" fill="#10b981" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">File System Structure - Layered Approach</text>
    <text x="60" y="125" font-size="14" fill="#ffffff" font-family="Arial">• Logical File System - File naming, protection, directory structure</text>
    <text x="60" y="150" font-size="14" fill="#ffffff" font-family="Arial">• File Organization Module - Maps logical to physical blocks</text>
    <text x="60" y="175" font-size="14" fill="#ffffff" font-family="Arial">• Basic File System - Issues generic commands to device driver</text>
    <text x="60" y="200" font-size="14" fill="#ffffff" font-family="Arial">• I/O Control - Device drivers and interrupt handlers</text>
    <text x="60" y="225" font-size="14" fill="#ffffff" font-family="Arial">• Physical Devices - Actual hardware</text>
  </g>
  <g id="step2" class="step" data-narration="File System Layers">
    <rect x="50" y="60" width="700" height="200" fill="#f59e0b" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Disk Layout</text>
    <rect x="100" y="120" width="80" height="50" fill="#10b981" rx="5" />
    <text x="140" y="150" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">Boot</text>
    <rect x="190" y="120" width="80" height="50" fill="#2563eb" rx="5" />
    <text x="230" y="145" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">Super</text>
    <text x="230" y="160" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">block</text>
    <rect x="280" y="120" width="80" height="50" fill="#8b5cf6" rx="5" />
    <text x="320" y="145" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">Free</text>
    <text x="320" y="160" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">space</text>
    <rect x="370" y="120" width="80" height="50" fill="#f59e0b" rx="5" />
    <text x="410" y="150" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">i-nodes</text>
    <rect x="460" y="120" width="80" height="50" fill="#10b981" rx="5" />
    <text x="500" y="145" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">Root</text>
    <text x="500" y="160" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">dir</text>
    <rect x="550" y="120" width="130" height="50" fill="#2563eb" rx="5" />
    <text x="615" y="150" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">Data blocks</text>
    <text x="60" y="200" font-size="12" fill="#ffffff">Boot block: OS boot info | Superblock: File system metadata</text>
  </g>
  <g id="step3" class="step" data-narration="Disk Layout">
    <rect x="50" y="60" width="700" height="180" fill="#8b5cf6" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">File Allocation Methods</text>
    <rect x="100" y="120" width="180" height="60" fill="#2563eb" rx="5" />
    <text x="190" y="155" font-size="14" fill="#ffffff" font-family="Arial" text-anchor="middle">Contiguous</text>
    <rect x="310" y="120" width="180" height="60" fill="#10b981" rx="5" />
    <text x="400" y="155" font-size="14" fill="#ffffff" font-family="Arial" text-anchor="middle">Linked</text>
    <rect x="520" y="120" width="180" height="60" fill="#f59e0b" rx="5" />
    <text x="610" y="155" font-size="14" fill="#ffffff" font-family="Arial" text-anchor="middle">Indexed</text>
    <text x="60" y="210" font-size="12" fill="#ffffff">Three main methods for allocating disk space to files</text>
  </g>
  <g id="step4" class="step" data-narration="File Allocation Methods">
    <rect x="50" y="60" width="700" height="200" fill="#2563eb" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Contiguous Allocation</text>
    <text x="400" y="125" font-size="16" fill="#ffffff" text-anchor="middle">Each file occupies set of contiguous blocks</text>
    <rect x="100" y="150" width="100" height="40" fill="#10b981" rx="5" />
    <text x="150" y="175" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">File A: 0-4</text>
    <rect x="210" y="150" width="100" height="40" fill="#f59e0b" rx="5" />
    <text x="260" y="175" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">File B: 5-9</text>
    <rect x="320" y="150" width="100" height="40" fill="#8b5cf6" rx="5" />
    <text x="370" y="175" font-size="10" fill="#ffffff" font-family="Arial" text-anchor="middle">File C: 10-14</text>
    <text x="60" y="220" font-size="12" fill="#ffffff">Advantage: Fast sequential access</text>
    <text x="60" y="240" font-size="12" fill="#ffffff">Disadvantage: External fragmentation, hard to grow files</text>
  </g>
  <g id="step5" class="step" data-narration="Contiguous Allocation">
    <rect x="50" y="60" width="700" height="200" fill="#10b981" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Linked Allocation</text>
    <text x="400" y="125" font-size="16" fill="#ffffff" text-anchor="middle">Each file is a linked list of disk blocks</text>
    <rect x="100" y="150" width="80" height="40" fill="#2563eb" rx="5" />
    <text x="140" y="175" font-size="10" fill="#ffffff" text-anchor="middle">Block 0→5</text>
    <rect x="190" y="150" width="80" height="40" fill="#f59e0b" rx="5" />
    <text x="230" y="175" font-size="10" fill="#ffffff" text-anchor="middle">Block 5→9</text>
    <rect x="280" y="150" width="80" height="40" fill="#8b5cf6" rx="5" />
    <text x="320" y="175" font-size="10" fill="#ffffff" text-anchor="middle">Block 9→-1</text>
    <text x="60" y="220" font-size="12" fill="#ffffff">Advantage: No external fragmentation, easy to grow</text>
    <text x="60" y="240" font-size="12" fill="#ffffff">Disadvantage: Slow random access, pointer overhead</text>
  </g>
  <g id="step6" class="step" data-narration="Advantages and Disadvantages of Contiguous Allocation">
    <rect x="50" y="60" width="700" height="200" fill="#f59e0b" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Indexed Allocation</text>
    <text x="400" y="125" font-size="16" fill="#ffffff" text-anchor="middle">All pointers to blocks in one index block</text>
    <rect x="100" y="150" width="120" height="80" fill="#2563eb" rx="5" />
    <text x="160" y="175" font-size="12" fill="#ffffff" text-anchor="middle">Index Block</text>
    <text x="110" y="195" font-size="10" fill="#ffffff">Ptr to block 5</text>
    <text x="110" y="210" font-size="10" fill="#ffffff">Ptr to block 9</text>
    <text x="110" y="225" font-size="10" fill="#ffffff">Ptr to block 12</text>
    <rect x="250" y="150" width="80" height="40" fill="#10b981" rx="5" />
    <text x="290" y="175" font-size="10" fill="#ffffff" text-anchor="middle">Data 5</text>
    <rect x="340" y="150" width="80" height="40" fill="#8b5cf6" rx="5" />
    <text x="380" y="175" font-size="10" fill="#ffffff" text-anchor="middle">Data 9</text>
    <text x="60" y="250" font-size="12" fill="#ffffff">Advantage: Fast random access, no external fragmentation</text>
  </g>
  <g id="step7" class="step" data-narration="Free Space Management">
    <rect x="50" y="60" width="700" height="180" fill="#8b5cf6" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Free Space Management</text>
    <rect x="100" y="120" width="180" height="60" fill="#2563eb" rx="5" />
    <text x="190" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Bit Vector</text>
    <text x="190" y="165" font-size="10" fill="#ffffff" text-anchor="middle">0=allocated, 1=free</text>
    <rect x="310" y="120" width="180" height="60" fill="#10b981" rx="5" />
    <text x="400" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Linked List</text>
    <text x="400" y="165" font-size="10" fill="#ffffff" text-anchor="middle">Free blocks linked</text>
    <rect x="520" y="120" width="180" height="60" fill="#f59e0b" rx="5" />
    <text x="610" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Grouping</text>
    <text x="610" y="165" font-size="10" fill="#ffffff" text-anchor="middle">Store in blocks</text>
    <text x="60" y="210" font-size="12" fill="#ffffff">Track available disk blocks for allocation</text>
  </g>
  <g id="step8" class="step" data-narration="Directory Implementation">
    <rect x="50" y="60" width="700" height="180" fill="#2563eb" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Directory Implementation</text>
    <rect x="100" y="120" width="180" height="60" fill="#10b981" rx="5" />
    <text x="190" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Linear Search</text>
    <text x="190" y="165" font-size="10" fill="#ffffff" text-anchor="middle">Simple, slow O(n)</text>
    <rect x="310" y="120" width="180" height="60" fill="#f59e0b" rx="5" />
    <text x="400" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Hash Table</text>
    <text x="400" y="165" font-size="10" fill="#ffffff" text-anchor="middle">Fast, O(1) average</text>
    <rect x="520" y="120" width="180" height="60" fill="#8b5cf6" rx="5" />
    <text x="610" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Tree-based (B-tree)</text>
    <text x="610" y="165" font-size="10" fill="#ffffff" text-anchor="middle">Sorted, O(log n)</text>
    <text x="60" y="210" font-size="12" fill="#ffffff">Organize file information in directories</text>
  </g>
  <g id="step9" class="step" data-narration="Efficiency and Performance">
    <rect x="50" y="60" width="700" height="180" fill="#10b981" rx="10" />
    <text x="400" y="90" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Efficiency and Performance</text>
    <rect x="100" y="120" width="180" height="60" fill="#2563eb" rx="5" />
    <text x="190" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Caching</text>
    <text x="190" y="165" font-size="10" fill="#ffffff" text-anchor="middle">Keep data in memory</text>
    <rect x="310" y="120" width="180" height="60" fill="#f59e0b" rx="5" />
    <text x="400" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Buffering</text>
    <text x="400" y="165" font-size="10" fill="#ffffff" text-anchor="middle">Write buffer</text>
    <rect x="520" y="120" width="180" height="60" fill="#8b5cf6" rx="5" />
    <text x="610" y="145" font-size="14" fill="#ffffff" text-anchor="middle">Prefetching</text>
    <text x="610" y="165" font-size="10" fill="#ffffff" text-anchor="middle">Read ahead</text>
    <text x="60" y="210" font-size="12" fill="#ffffff">Optimize file system operations for better performance</text>
  </g>
  <g id="step10" class="step" data-narration="Conclusion">
    <rect x="50" y="60" width="700" height="140" fill="#f59e0b" rx="10" />
    <text x="400" y="95" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Conclusion</text>
    <text x="400" y="130" font-size="16" fill="#ffffff" text-anchor="middle">File system implementation is crucial for efficient file operations</text>
    <text x="400" y="160" font-size="14" fill="#ffffff" text-anchor="middle">Understanding allocation, free space management, and directory structure</text>
    <text x="400" y="185" font-size="14" fill="#ffffff" text-anchor="middle">is essential for system administrators and developers</text>
  </g>
  <g id="step11" class="step" data-narration="Final Thoughts">
    <rect x="50" y="60" width="700" height="140" fill="#8b5cf6" rx="10" />
    <text x="400" y="95" font-size="20" fill="#ffffff" font-family="Arial" text-anchor="middle">Final Thoughts</text>
    <text x="400" y="130" font-size="16" fill="#ffffff" text-anchor="middle">Modern file systems use combinations of these techniques</text>
    <text x="400" y="160" font-size="14" fill="#ffffff" text-anchor="middle">Practice and experience are key to mastering file system concepts</text>
  </g>
</svg>
