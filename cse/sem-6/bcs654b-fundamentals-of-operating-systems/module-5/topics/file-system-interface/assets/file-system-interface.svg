<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to File System Interface">
    <text x="50" y="50" font-size="24" fill="#2563eb">File System Interface</text>
    <rect x="50" y="100" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="135" font-size="18" fill="#ffffff">File System Structure</text>
  </g>
  <g id="step1" data-narration="File System Layers">
    <use x="50" y="100" width="200" height="50" href="#step0" />
    <rect x="50" y="200" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="235" font-size="18" fill="#ffffff">Logical File System</text>
    <rect x="50" y="300" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="60" y="335" font-size="18" fill="#ffffff">File Organization</text>
    <line x1="150" y1="220" x2="150" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="File System Components">
    <use x="50" y="100" width="200" height="200" href="#step1" />
    <rect x="300" y="100" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="135" font-size="18" fill="#ffffff">Basic File System</text>
    <rect x="300" y="200" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="235" font-size="18" fill="#ffffff">I/O Control</text>
    <rect x="300" y="300" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="310" y="335" font-size="18" fill="#ffffff">Physical Devices</text>
    <line x1="350" y1="220" x2="350" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" data-narration="Block Allocation">
    <use x="50" y="100" width="400" height="300" href="#step2" />
    <rect x="550" y="100" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="135" font-size="18" fill="#ffffff">Boot Block</text>
    <rect x="550" y="200" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="560" y="235" font-size="18" fill="#ffffff">Superblock</text>
    <rect x="550" y="300" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="560" y="335" font-size="18" fill="#ffffff">Data Blocks</text>
    <line x1="600" y1="220" x2="600" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="File Allocation Methods">
    <use x="50" y="100" width="600" height="300" href="#step3" />
    <rect x="50" y="400" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="435" font-size="18" fill="#ffffff">Contiguous Allocation</text>
    <rect x="300" y="400" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="435" font-size="18" fill="#ffffff">Linked Allocation</text>
    <rect x="550" y="400" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="560" y="435" font-size="18" fill="#ffffff">Indexed Allocation</text>
  </g>
  <g id="step5" data-narration="File System Efficiency">
    <use x="50" y="100" width="800" height="400" href="#step4" />
    <rect x="50" y="500" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="535" font-size="18" fill="#ffffff">Caching</text>
    <rect x="300" y="500" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="535" font-size="18" fill="#ffffff">Buffering</text>
    <rect x="550" y="500" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="560" y="535" font-size="18" fill="#ffffff">Disk Scheduling</text>
  </g>
  <g id="step6" data-narration="File System Security">
    <use x="50" y="100" width="800" height="500" href="#step5" />
    <rect x="50" y="550" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="585" font-size="18" fill="#ffffff">Access Control</text>
    <rect x="300" y="550" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="585" font-size="18" fill="#ffffff">Encryption</text>
    <rect x="550" y="550" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="560" y="585" font-size="18" fill="#ffffff">Backup and Recovery</text>
  </g>
</svg>