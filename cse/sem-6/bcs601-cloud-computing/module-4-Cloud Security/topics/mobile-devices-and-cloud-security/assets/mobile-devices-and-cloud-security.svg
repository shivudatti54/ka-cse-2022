<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6z" fill="#546E7A"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 1: Title and Intro -->
  <g class="step" data-narration="Mobile devices have become the primary endpoint for cloud access, creating an expanded attack surface that demands specific security strategies.">
    <rect x="50" y="15" width="700" height="50" rx="8" fill="url(#headerGrad)"/>
    <text x="400" y="47" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">Mobile Devices and Cloud Security</text>
  </g>

  <!-- Step 2: Threat Landscape - cumulative at y=70 -->
  <g class="step" data-narration="Six major mobile threats target cloud access: device theft exposing credentials, insecure Wi-Fi with MitM attacks, malicious apps, OS vulnerabilities, mobile phishing, and jailbreaking.">
    <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">Mobile-Cloud Threat Landscape</text>
    
    <rect x="30" y="92" width="155" height="58" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
    <text x="107" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Device Theft</text>
    <text x="107" y="124" text-anchor="middle" font-size="9" fill="#555">Cached credentials</text>
    <text x="107" y="138" text-anchor="middle" font-size="9" fill="#555">Direct cloud access</text>

    <rect x="195" y="92" width="155" height="58" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
    <text x="272" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Insecure Wi-Fi</text>
    <text x="272" y="124" text-anchor="middle" font-size="9" fill="#555">MitM, Evil Twin</text>
    <text x="272" y="138" text-anchor="middle" font-size="9" fill="#555">Packet sniffing</text>

    <rect x="360" y="92" width="155" height="58" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
    <text x="437" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Malicious Apps</text>
    <text x="437" y="124" text-anchor="middle" font-size="9" fill="#555">Keyloggers, theft</text>
    <text x="437" y="138" text-anchor="middle" font-size="9" fill="#555">Data exfiltration</text>

    <rect x="525" y="92" width="155" height="58" rx="6" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5"/>
    <text x="602" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">OS Vulnerabilities</text>
    <text x="602" y="124" text-anchor="middle" font-size="9" fill="#555">Unpatched systems</text>
    <text x="602" y="138" text-anchor="middle" font-size="9" fill="#555">Android fragmentation</text>

    <rect x="690" y="92" width="80" height="58" rx="6" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5"/>
    <text x="730" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">Phishing</text>
    <text x="730" y="122" text-anchor="middle" font-size="8" fill="#555">Smishing</text>
    <text x="730" y="134" text-anchor="middle" font-size="8" fill="#555">Vishing</text>

    <rect x="30" y="158" width="155" height="58" rx="6" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5"/>
    <text x="107" y="174" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Jailbreak/Root</text>
    <text x="107" y="190" text-anchor="middle" font-size="9" fill="#555">Removes security</text>
    <text x="107" y="204" text-anchor="middle" font-size="9" fill="#555">Open to malware</text>
  </g>

  <!-- Step 3: BYOD Challenges - cumulative at y=225 -->
  <g class="step" data-narration="BYOD creates five security challenges: data leakage through personal apps, inconsistent device security, employee privacy concerns, managing device diversity, and offboarding data risks.">
    <text x="400" y="233" text-anchor="middle" font-size="14" font-weight="bold" fill="#7B1FA2">BYOD Security Challenges</text>
    
    <rect x="30" y="245" width="370" height="35" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
    <text x="45" y="263" font-size="11" font-weight="bold" fill="#6A1B9A">Data Leakage</text>
    <text x="150" y="263" font-size="10" fill="#555">Corporate data shared via personal apps or cloud</text>

    <rect x="410" y="245" width="360" height="35" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
    <text x="425" y="263" font-size="11" font-weight="bold" fill="#6A1B9A">Inconsistent Security</text>
    <text x="560" y="263" font-size="10" fill="#555">No encryption, weak passwords, outdated patches</text>

    <rect x="30" y="288" width="370" height="35" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
    <text x="45" y="306" font-size="11" font-weight="bold" fill="#6A1B9A">Privacy Concerns</text>
    <text x="160" y="306" font-size="10" fill="#555">Employees resist monitoring on personal devices</text>

    <rect x="410" y="288" width="170" height="35" rx="5" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
    <text x="425" y="306" font-size="11" font-weight="bold" fill="#4527A0">Device Diversity</text>
    <text x="530" y="306" font-size="10" fill="#555">Multiple OS versions</text>

    <rect x="590" y="288" width="180" height="35" rx="5" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
    <text x="605" y="306" font-size="11" font-weight="bold" fill="#4527A0">Offboarding Risk</text>
    <text x="710" y="306" font-size="10" fill="#555">Wiping corp data on exit</text>
  </g>

  <!-- Step 4: MDM vs MAM - cumulative at y=335 -->
  <g class="step" data-narration="MDM manages the whole device for company phones. MAM manages only corporate apps using containers, keeping personal data separate. Use MDM for company devices, MAM for BYOD.">
    <text x="400" y="348" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">MDM vs MAM Approaches</text>
    
    <rect x="40" y="360" width="340" height="130" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
    <text x="210" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">MDM - Device Management</text>
    <text x="210" y="395" text-anchor="middle" font-size="10" fill="#555">Manages ENTIRE device</text>
    <line x1="60" y1="405" x2="360" y2="405" stroke="#90CAF9" stroke-width="1"/>
    <text x="55" y="420" font-size="9" fill="#555">• Device enrollment &amp; registration</text>
    <text x="55" y="434" font-size="9" fill="#555">• Remote wipe (full device)</text>
    <text x="55" y="448" font-size="9" fill="#555">• Policy: encryption, PIN, min OS</text>
    <text x="55" y="462" font-size="9" fill="#555">• Best for: Company-owned devices</text>

    <rect x="420" y="360" width="340" height="130" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
    <text x="590" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">MAM - App Management</text>
    <text x="590" y="395" text-anchor="middle" font-size="10" fill="#555">Manages CORPORATE APPS only</text>
    <line x1="440" y1="405" x2="740" y2="405" stroke="#A5D6A7" stroke-width="1"/>
    <text x="435" y="420" font-size="9" fill="#555">• Containerization (encrypted sandbox)</text>
    <text x="435" y="434" font-size="9" fill="#555">• App wrapping (add security policies)</text>
    <text x="435" y="448" font-size="9" fill="#555">• Selective wipe (corp data only)</text>
    <text x="435" y="462" font-size="9" fill="#555">• Best for: BYOD scenarios</text>
  </g>

  <!-- Step 5: Zero Trust - cumulative at y=500 -->
  <g class="step" data-narration="Zero Trust assumes no device is trusted. Verify every access request, grant least privilege permissions, continuously monitor device health, and use micro-segmentation.">
    <text x="400" y="513" text-anchor="middle" font-size="14" font-weight="bold" fill="#00695C">Zero Trust Security Model</text>
    
    <circle cx="400" cy="560" r="50" fill="#E0F2F1" stroke="#00897B" stroke-width="2"/>
    <text x="400" y="555" text-anchor="middle" font-size="12" font-weight="bold" fill="#004D40">ZERO</text>
    <text x="400" y="572" text-anchor="middle" font-size="12" font-weight="bold" fill="#004D40">TRUST</text>

    <rect x="70" y="528" width="150" height="40" rx="6" fill="#B2DFDB" stroke="#00897B" stroke-width="1"/>
    <text x="145" y="545" text-anchor="middle" font-size="10" font-weight="bold" fill="#004D40">Verify Every Request</text>
    <line x1="220" y1="548" x2="340" y2="548" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="580" y="528" width="150" height="40" rx="6" fill="#B2DFDB" stroke="#00897B" stroke-width="1"/>
    <text x="655" y="545" text-anchor="middle" font-size="10" font-weight="bold" fill="#004D40">Least Privilege</text>
    <line x1="580" y1="548" x2="460" y2="548" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="70" y="578" width="150" height="40" rx="6" fill="#B2DFDB" stroke="#00897B" stroke-width="1"/>
    <text x="145" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="#004D40">Continuous Monitoring</text>
    <line x1="220" y1="598" x2="340" y2="598" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="580" y="578" width="150" height="40" rx="6" fill="#B2DFDB" stroke="#00897B" stroke-width="1"/>
    <text x="655" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="#004D40">Micro-Segmentation</text>
    <line x1="580" y1="598" x2="460" y2="598" stroke="#546E7A" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Step 6: CASB - cumulative at y=640 (exceeds, need to reposition) -->
  <!-- Actually I need to fit everything better. Let me reorganize. -->
</svg>