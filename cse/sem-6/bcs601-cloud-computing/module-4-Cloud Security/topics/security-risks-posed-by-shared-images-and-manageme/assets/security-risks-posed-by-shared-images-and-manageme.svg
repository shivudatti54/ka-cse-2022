<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Shared images and management OS create major security risks in cloud computing. Using untrusted community images or compromising Dom0 can expose your entire cloud environment to attackers.">
    <rect x="50" y="10" width="700" height="40" rx="8" fill="url(#headerGrad)"/>
    <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Security Risks: Shared Images and Management OS</text>
  </g>

  <!-- Step 1: What Are Shared Images -->
  <g class="step" id="step1" data-narration="Machine images are pre-configured templates in cloud marketplaces containing OS and applications. Community images from unknown publishers pose significant security risks.">
    <rect x="50" y="58" width="700" height="80" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <text x="400" y="75" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">What Are Shared Images?</text>
    <text x="400" y="95" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">Pre-configured templates (AMIs, Azure Images) for rapid VM deployment</text>
    
    <rect x="80" y="108" width="180" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="170" y="123" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">Official Images - SAFE</text>

    <rect x="280" y="108" width="180" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <text x="370" y="123" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">Vendor Images - VERIFY</text>

    <rect x="480" y="108" width="180" height="22" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <text x="570" y="123" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Community - HIGH RISK</text>
  </g>

  <!-- Step 2: Shared Image Risks -->
  <g class="step" id="step2" data-narration="Four main risks: malware embedded in images, outdated software with known CVEs, hardcoded API keys and secrets, and lack of publisher accountability.">
    <rect x="50" y="146" width="700" height="80" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <text x="400" y="163" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C62828">Shared Image Security Risks</text>
    
    <rect x="65" y="172" width="155" height="45" rx="4" fill="#fff" stroke="#C62828"/>
    <text x="142" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#C62828">Malware/Backdoors</text>
    <text x="142" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#333">Crypto miners, SSH backdoors</text>

    <rect x="230" y="172" width="155" height="45" rx="4" fill="#fff" stroke="#E65100"/>
    <text x="307" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#E65100">Outdated Software</text>
    <text x="307" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#333">Unpatched OS, known CVEs</text>

    <rect x="395" y="172" width="155" height="45" rx="4" fill="#fff" stroke="#6A1B9A"/>
    <text x="472" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#6A1B9A">Hardcoded Secrets</text>
    <text x="472" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#333">API keys, passwords, certs</text>

    <rect x="560" y="172" width="155" height="45" rx="4" fill="#fff" stroke="#00838F"/>
    <text x="637" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#00838F">No Accountability</text>
    <text x="637" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#333">Anonymous publishers</text>
  </g>

  <!-- Step 3: Management OS -->
  <g class="step" id="step3" data-narration="The Management OS (Dom0) is the privileged control domain managing all guest VMs. It has full hardware access and controls every VM on the physical host.">
    <rect x="50" y="234" width="700" height="93" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <text x="400" y="251" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">Management OS (Dom0) - Critical Component</text>
    
    <rect x="70" y="262" width="120" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0"/>
    <text x="130" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#1565C0">DomU: Guest VMs</text>
    <rect x="200" y="262" width="120" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0"/>
    <text x="260" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#1565C0">DomU: Guest VMs</text>
    <rect x="330" y="262" width="120" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0"/>
    <text x="390" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#1565C0">DomU: Guest VMs</text>
    
    <rect x="70" y="298" width="380" height="10" rx="2" fill="#E65100"/>
    <text x="260" y="306" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="bold" fill="#fff">Hypervisor</text>
    
    <rect x="70" y="312" width="380" height="10" rx="2" fill="#C62828"/>
    <text x="260" y="320" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="bold" fill="#fff">Dom0: Management OS</text>
  </g>

  <!-- Step 4: VM Escape -->
  <g class="step" id="step4" data-narration="VM escape occurs when attackers break out of a guest VM to compromise Dom0. This breaks tenant isolation and gives control over ALL VMs on the host.">
    <rect x="50" y="335" width="700" height="80" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <text x="400" y="352" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C62828">VM Escape - The Ultimate Threat</text>
    
    <rect x="70" y="365" width="160" height="40" rx="4" fill="#FFF3E0" stroke="#E65100"/>
    <text x="150" y="383" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100">1. Compromise Guest VM</text>
    <text x="150" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#333">Web app flaw exploit</text>
    <line x1="230" y1="385" x2="260" y2="385" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="265" y="365" width="160" height="40" rx="4" fill="#FFEBEE" stroke="#C62828"/>
    <text x="345" y="383" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">2. VM Escape Attack</text>
    <text x="345" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#333">Exploit hypervisor bug</text>
    <line x1="425" y1="385" x2="455" y2="385" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="460" y="365" width="160" height="40" rx="4" fill="#FFCDD2" stroke="#B71C1C"/>
    <text x="540" y="383" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#B71C1C">3. Dom0 Compromised</text>
    <text x="540" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#333">Control all VMs on host</text>
    
    <rect x="630" y="365" width="100" height="40" rx="4" fill="#FFCDD2" stroke="#B71C1C"/>
    <text x="680" y="383" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="bold" fill="#B71C1C">Holy Grail</text>
    <text x="680" y="397" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#333">of cloud attacks</text>
  </g>

  <!-- Step 5: Mitigation -->
  <g class="step" id="step5" data-narration="For images: use official sources, scan for vulnerabilities, rotate credentials. For management OS: rely on provider security but secure your guest VMs to prevent initial compromise.">
    <rect x="50" y="423" width="700" height="80" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
    <text x="400" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#388E3C">Mitigation Strategies</text>
    
    <rect x="70" y="453" width="320" height="42" rx="4" fill="#fff" stroke="#388E3C"/>
    <text x="230" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#388E3C">For Shared Images</text>
    <text x="80" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">• Use official provider images only</text>
    <text x="240" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">• Scan images before deployment</text>
    <text x="340" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">• Rotate all credentials</text>

    <rect x="400" y="453" width="320" height="42" rx="4" fill="#fff" stroke="#1565C0"/>
    <text x="560" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1565C0">For Management OS</text>
    <text x="410" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">• Provider secures hypervisor</text>
    <text x="560" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">• Secure guest VMs to prevent escape</text>
  </g>

  <!-- Step 6: Summary -->
  <g class="step" id="step6" data-narration="Shared images risk malware and secrets; Dom0 compromise causes VM escape. Under shared responsibility, providers secure infrastructure while customers must secure their VM workloads.">
    <rect x="50" y="511" width="700" height="87" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
    <text x="400" y="531" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="#9C27B0">Key Takeaways</text>
    
    <rect x="70" y="543" width="220" height="47" rx="4" fill="#fff" stroke="#C62828"/>
    <text x="180" y="561" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Shared Images</text>
    <text x="180" y="576" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">Malware, backdoors, hardcoded</text>
    <text x="180" y="588" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">secrets, outdated software</text>

    <rect x="300" y="543" width="220" height="47" rx="4" fill="#fff" stroke="#C62828"/>
    <text x="410" y="561" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828">Management OS (Dom0)</text>
    <text x="410" y="576" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">VM escape = control all VMs</text>
    <text x="410" y="588" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">on physical host</text>

    <rect x="530" y="543" width="200" height="47" rx="4" fill="#fff" stroke="#388E3C"/>
    <text x="630" y="561" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Shared Responsibility</text>
    <text x="630" y="576" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">Provider: hypervisor security</text>
    <text x="630" y="588" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">Customer: guest OS and apps</text>
  </g>
</svg>