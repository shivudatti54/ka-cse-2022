<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" data-narration="This module covers data and software protection techniques in cloud computing, including encryption, key management, access control, and application security.">
    <rect x="80" y="20" width="640" height="80" rx="12" fill="url(#headerGrad)"/>
    <text x="400" y="55" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">Data and Software Protection</text>
    <text x="400" y="80" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#B3D4FC">Techniques in Cloud Computing</text>
  </g>

  <!-- Step 1: Defense-in-Depth -->
  <g class="step" data-narration="Defense-in-depth creates multiple security layers. If one layer fails, others still protect your data. Think of it like castle walls with guards at each checkpoint.">
    <rect x="20" y="120" width="760" height="55" rx="6" fill="url(#headerGrad)"/>
    <text x="400" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Defense-in-Depth: Multiple Security Layers</text>

    <!-- Layer boxes - horizontal layout -->
    <rect x="40" y="190" width="140" height="50" rx="6" fill="#FFEBEE" stroke="#C62828"/>
    <text x="110" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#C62828">Physical</text>
    <text x="110" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Guards, locks</text>

    <rect x="190" y="190" width="140" height="50" rx="6" fill="#FFF3E0" stroke="#E65100"/>
    <text x="260" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Network</text>
    <text x="260" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Firewalls, VPN</text>

    <rect x="340" y="190" width="140" height="50" rx="6" fill="#E3F2FD" stroke="#1565C0"/>
    <text x="410" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565C0">Host</text>
    <text x="410" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">OS, patching</text>

    <rect x="490" y="190" width="140" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32"/>
    <text x="560" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">Application</text>
    <text x="560" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">WAF, coding</text>

    <rect x="640" y="190" width="140" height="50" rx="6" fill="#F3E5F5" stroke="#6A1B9A"/>
    <text x="710" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#6A1B9A">Data</text>
    <text x="710" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Encryption</text>
  </g>

  <!-- Step 2: Cryptography -->
  <g class="step" data-narration="Cryptography secures data by converting it to unreadable format. Symmetric encryption uses one key for speed, while asymmetric uses key pairs for secure sharing.">
    <rect x="20" y="260" width="760" height="55" rx="6" fill="url(#headerGrad)"/>
    <text x="400" y="292" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Cryptography: Encrypting Data</text>

    <!-- Three types side by side -->
    <rect x="40" y="330" width="230" height="100" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <rect x="40" y="330" width="230" height="30" rx="8" fill="#1565C0"/>
    <text x="155" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Symmetric (AES)</text>
    <text x="55" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">Same key encrypts</text>
    <text x="55" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">and decrypts. Fast!</text>
    <text x="55" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Bulk data, AES-256</text>

    <rect x="285" y="330" width="230" height="100" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
    <rect x="285" y="330" width="230" height="30" rx="8" fill="#2E7D32"/>
    <text x="400" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Asymmetric (RSA)</text>
    <text x="300" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">Public key encrypts,</text>
    <text x="300" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">private key decrypts</text>
    <text x="300" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Key exchange, RSA-2048</text>

    <rect x="530" y="330" width="230" height="100" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2"/>
    <rect x="530" y="330" width="230" height="30" rx="8" fill="#6A1B9A"/>
    <text x="645" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Hashing (SHA)</text>
    <text x="545" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">One-way function,</text>
    <text x="545" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">creates fixed digest</text>
    <text x="545" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Integrity, SHA-256</text>
  </g>

  <!-- Step 3: Key Management -->
  <g class="step" data-narration="Key management protects your encryption keys. Cloud KMS is convenient, customer keys give you control, and HSMs provide the highest security for sensitive data.">
    <rect x="20" y="450" width="760" height="55" rx="6" fill="url(#headerGrad)"/>
    <text x="400" y="482" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Key Management: Protecting the Keys</text>

    <!-- Three approaches -->
    <rect x="40" y="520" width="230" height="70" rx="6" fill="#E3F2FD" stroke="#1565C0"/>
    <text x="155" y="542" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565C0">Cloud KMS</text>
    <text x="155" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#333">AWS KMS, Azure Vault</text>
    <text x="155" y="575" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Provider manages</text>

    <rect x="285" y="520" width="230" height="70" rx="6" fill="#E8F5E9" stroke="#2E7D32"/>
    <text x="400" y="542" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">Customer Keys</text>
    <text x="400" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#333">You own and control</text>
    <text x="400" y="575" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">External management</text>

    <rect x="530" y="520" width="230" height="70" rx="6" fill="#F3E5F5" stroke="#6A1B9A"/>
    <text x="645" y="542" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#6A1B9A">HSM</text>
    <text x="645" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#333">Hardware Security</text>
    <text x="645" y="575" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Tamper-proof, FIPS</text>
  </g>

  <!-- Step 4: IAM -->
  <g class="step" data-narration="Identity and Access Management verifies who you are through authentication, then decides what you can do through authorization using least privilege rules.">
    <rect x="20" y="120" width="760" height="55" rx="6" fill="url(#headerGrad)"/>
    <text x="400" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">IAM: Authentication and Authorization</text>

    <!-- AuthN side -->
    <rect x="40" y="190" width="350" height="80" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <rect x="40" y="190" width="350" height="28" rx="8" fill="#1565C0"/>
    <text x="215" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Authentication (Who?)</text>
    <text x="60" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">Password, MFA, Biometrics</text>
    <text x="60" y="255" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Verifies identity</text>

    <!-- Arrow -->
    <line x1="395" y1="230" x2="425" y2="230" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- AuthZ side -->
    <rect x="430" y="190" width="330" height="80" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
    <rect x="430" y="190" width="330" height="28" rx="8" fill="#2E7D32"/>
    <text x="595" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Authorization (What?)</text>
    <text x="450" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#333">RBAC, ABAC, Least Privilege</text>
    <text x="450" y="255" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#555">Controls access</text>

    <!-- Example box -->
    <rect x="40" y="290" width="720" height="40" rx="6" fill="#FFF8E1" stroke="#E65100"/>
    <text x="400" y="315" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#E65100">Example: Dev can deploy VMs but cannot delete databases</text>
  </g>

  <!-- Step 5: Application Security -->
  <g class="step" data-narration="Application security uses WAFs to block web attacks, API gateways for rate limiting, and scanning tools to find bugs before attackers exploit them.">
    <rect x="20" y="350" width="760" height="55" rx="6" fill="url(#headerGrad)"/>
    <text x="400" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Application Security: Protecting Software</text>

    <!-- Flow diagram -->
    <rect x="40" y="420" width="100" height="50" rx="6" fill="#FFEBEE" stroke="#C62828"/>
    <text x="90" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#C62828">Internet</text>
    <text x="90" y="456" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#555">Users</text>
    <line x1="140" y1="445" x2="175" y2="445" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="180" y="420" width="100" height="50" rx="6" fill="#E3F2FD" stroke="#1565C0"/>
    <text x="230" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565C0">WAF</text>
    <text x="230" y="456" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#555">Blocks SQLi, XSS</text>
    <line x1="280" y1="445" x2="315" y2="445" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="320" y="420" width="100" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32"/>
    <text x="370" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">API Gateway</text>
    <text x="370" y="456" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#555">Rate limiting</text>
    <line x1="420" y1="445" x2="455" y2="445" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="460" y="420" width="100" height="50" rx="6" fill="#F3E5F5" stroke="#6A1B9A"/>
    <text x="510" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#6A1B9A">App</text>
    <text x="510" y="456" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#555">Secure code</text>

    <!-- Scanning tools -->
    <rect x="580" y="420" width="180" height="50" rx="6" fill="#E0F7FA" stroke="#00838F"/>
    <text x="670" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#00838F">SAST + DAST</text>
    <text x="670" y="456" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#555">Find vulnerabilities</text>
  </g>

  <!-- Step 6: Data Protection -->
  <g class="step" data-narration="Beyond encryption, data protection includes tokenization replacing sensitive data with tokens, masking hiding partial data, and DLP preventing data leaks.">
    <rect x="20" y="520" width="760" height="55" rx="6" fill="url(#headerGrad)"/>
    <text x="400" y="552" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Data Protection: Beyond Encryption</text>

    <!-- Four techniques -->
    <rect x="40" y="590" width="170" height="1" fill="transparent"/>

    <rect x="40" y="600" width="170" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0"/>
    <text x="125" y="618" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565C0">Tokenization</text>
    <text x="125" y="635" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">1234 --> TKN-7a9b</text>
    <text x="125" y="648" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">Not reversible</text>

    <rect x="225" y="600" width="170" height="60" rx="6" fill="#E8F5E9" stroke="#2E7D32"/>
    <text x="310" y="618" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">Masking</text>
    <text x="310" y="635" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">john@e.com</text>
    <text x="310" y="648" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">j***@e***.com</text>

    <rect x="410" y="600" width="170" height="60" rx="6" fill="#F3E5F5" stroke="#6A1B9A"/>
    <text x="495" y="618" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#6A1B9A">DLP</text>
    <text x="495" y="635" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">Blocks data exfiltration</text>
    <text x="495" y="648" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">Monitors PII</text>

    <rect x="595" y="600" width="185" height="60" rx="6" fill="#FFF3E0" stroke="#E65100"/>
    <text x="687" y="618" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Rights Management</text>
    <text x="687" y="635" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#333">Control print, copy</text>
    <text x="687" y="648" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#555">Persistent protection</text>
  </g>

  <!-- Step 7: Summary -->
  <g class="step" data-narration="Remember these key points: encrypt data at rest and in transit, manage keys carefully with HSMs, use IAM for least privilege, and layer multiple protection techniques.">
    <rect x="20" y="120" width="760" height="55" rx="6" fill="url(#headerGrad)"/>
    <text x="400" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Key Takeaways</text>

    <!-- Summary items -->
    <rect x="40" y="190" width="720" height="35" rx="6" fill="#E3F2FD"/>
    <text x="60" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565C0">Encryption:</text>
    <text x="140" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#333">Protect data at rest (AES) and in transit (TLS)</text>

    <rect x="40" y="235" width="720" height="35" rx="6" fill="#fff"/>
    <text x="60" y="257" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#2E7D32">Key Management:</text>
    <text x="160" y="257" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#333">Use HSMs or KMS; never store keys with data</text>

    <rect x="40" y="280" width="720" height="35" rx="6" fill="#E3F2FD"/>
    <text x="60" y="302" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100">IAM:</text>
    <text x="100" y="302" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#333">Enforce least privilege with MFA and role-based access</text>

    <rect x="40" y="325" width="720" height="35" rx="6" fill="#fff"/>
    <text x="60" y="347" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#6A1B9A">Defense in Depth:</text>
    <text x="170" y="347" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#333">Layer encryption, IAM, WAF, and monitoring</text>

    <rect x="40" y="370" width="720" height="35" rx="6" fill="#F3E5F5"/>
    <text x="60" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#00838F">Shared Responsibility:</text>
    <text x="180" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#333">Provider secures infrastructure, you secure data</text>

    <!-- Final note -->
    <rect x="40" y="420" width="720" height="40" rx="6" fill="#E8F5E9" stroke="#2E7D32"/>
    <text x="400" y="445" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">Cloud security requires combining all these techniques for effective protection</text>
  </g>
</svg>