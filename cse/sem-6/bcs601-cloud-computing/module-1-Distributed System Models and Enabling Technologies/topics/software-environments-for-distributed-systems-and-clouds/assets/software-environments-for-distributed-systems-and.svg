<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Software Environments for Distributed Systems</text>
  <text x="400" y="45" text-anchor="middle" font-size="12" fill="#616161">Cloud Software Environment Models and Tools</text>

  <g id="step1" class="step" data-narration="Cloud environments have five layers: physical infrastructure, virtualization, execution containers or VMs, orchestration, and the application layer on top.">
    <rect x="30" y="60" width="340" height="130" rx="8" fill="white" stroke="#1976d2" stroke-width="2"/>
    <text x="200" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">5-Layer Cloud Architecture</text>
    <rect x="50" y="90" width="300" height="18" rx="3" fill="#1976d2"/>
    <text x="200" y="103" text-anchor="middle" font-size="9" fill="white">Application Layer (Microservices, APIs)</text>
    <rect x="50" y="111" width="300" height="18" rx="3" fill="#1565c0"/>
    <text x="200" y="124" text-anchor="middle" font-size="9" fill="white">Orchestration (Kubernetes, CI/CD)</text>
    <rect x="50" y="132" width="300" height="18" rx="3" fill="#0d47a1"/>
    <text x="200" y="145" text-anchor="middle" font-size="9" fill="white">Execution (Containers, Serverless, VMs)</text>
    <rect x="50" y="153" width="300" height="18" rx="3" fill="#0a3470"/>
    <text x="200" y="166" text-anchor="middle" font-size="9" fill="white">Virtualization (Hypervisor, Cloud APIs)</text>
    <rect x="50" y="174" width="300" height="18" rx="3" fill="#072550"/>
    <text x="200" y="187" text-anchor="middle" font-size="9" fill="white">Physical Infrastructure (Servers, Storage)</text>
  </g>

  <g id="step2" class="step" data-narration="IaaS provides virtual machines where you manage the operating system and applications while the cloud provider handles the physical servers and hypervisor.">
    <rect x="390" y="60" width="380" height="130" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="580" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">IaaS - Infrastructure as a Service</text>
    <rect x="410" y="90" width="160" height="16" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="490" y="101" text-anchor="middle" font-size="9" fill="#e65100">Your App + Data</text>
    <rect x="410" y="109" width="160" height="16" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="490" y="120" text-anchor="middle" font-size="9" fill="#e65100">Runtime (Node.js, Python)</text>
    <rect x="410" y="128" width="160" height="16" rx="3" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="490" y="139" text-anchor="middle" font-size="9" fill="#e65100">Operating System</text>
    <rect x="410" y="147" width="160" height="16" rx="3" fill="#ffcc80"/>
    <text x="490" y="158" text-anchor="middle" font-size="9" fill="#e65100">Virtual Machine</text>
    <rect x="580" y="90" width="160" height="73" rx="3" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
    <text x="660" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Provider Manages:</text>
    <text x="660" y="132" text-anchor="middle" font-size="9" fill="#e65100">Physical Hardware</text>
    <text x="660" y="147" text-anchor="middle" font-size="9" fill="#e65100">Hypervisor</text>
    <text x="660" y="162" text-anchor="middle" font-size="9" fill="#616161">EC2, Azure VM, GCE</text>
  </g>

  <g id="step3" class="step" data-narration="CaaS uses Docker containers to package applications with dependencies. Kubernetes orchestrates deployment, scaling, and networking across clusters of machines.">
    <rect x="30" y="205" width="350" height="130" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="205" y="223" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">CaaS - Container as a Service</text>
    <rect x="50" y="238" width="45" height="40" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="72" y="253" text-anchor="middle" font-size="8" fill="#388e3c">Auth</text>
    <text x="72" y="268" text-anchor="middle" font-size="7" fill="#388e3c">Container</text>
    <rect x="100" y="238" width="45" height="40" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="122" y="253" text-anchor="middle" font-size="8" fill="#388e3c">API</text>
    <text x="122" y="268" text-anchor="middle" font-size="7" fill="#388e3c">Container</text>
    <rect x="150" y="238" width="45" height="40" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="172" y="253" text-anchor="middle" font-size="8" fill="#388e3c">Cart</text>
    <text x="172" y="268" text-anchor="middle" font-size="7" fill="#388e3c">Container</text>
    <rect x="250" y="238" width="110" height="40" rx="4" fill="#81c784" stroke="#388e3c" stroke-width="1"/>
    <text x="305" y="253" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">Kubernetes</text>
    <text x="305" y="268" text-anchor="middle" font-size="8" fill="#1b5e20">Cluster Orchestration</text>
    <rect x="50" y="290" width="310" height="30" rx="4" fill="#388e3c"/>
    <text x="205" y="310" text-anchor="middle" font-size="10" fill="white">Deploy, Scale, Load Balance, Self-Heal</text>
    <text x="205" y="332" text-anchor="middle" font-size="9" fill="#616161">EKS, GKE, AKS, Docker Swarm</text>
  </g>

  <g id="step4" class="step" data-narration="PaaS provides a managed platform where you upload your code and the platform handles runtime, operating system, scaling, and databases automatically.">
    <rect x="395" y="205" width="375" height="130" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="582" y="223" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">PaaS - Platform as a Service</text>
    <rect x="420" y="240" width="140" height="24" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="490" y="256" text-anchor="middle" font-size="10" fill="#1565c0">Your Application Code</text>
    <rect x="420" y="272" width="140" height="45" rx="4" fill="#1976d2"/>
    <text x="490" y="288" text-anchor="middle" font-size="9" fill="white">Platform Manages:</text>
    <text x="490" y="302" text-anchor="middle" font-size="8" fill="#bbdefb">Runtime, OS, Scaling,</text>
    <text x="490" y="314" text-anchor="middle" font-size="8" fill="#bbdefb">Database, Load Balancer</text>
    <rect x="575" y="240" width="170" height="77" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="660" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Developer Experience</text>
    <text x="660" y="282" text-anchor="middle" font-size="9" fill="#1565c0">git push to deploy</text>
    <text x="660" y="297" text-anchor="middle" font-size="9" fill="#1565c0">Auto-scaling built-in</text>
    <text x="660" y="315" text-anchor="middle" font-size="9" fill="#616161">Heroku, GAE, Beanstalk</text>
  </g>

  <g id="step5" class="step" data-narration="FaaS or serverless runs individual functions in response to events. You only write code, pay per invocation, and scale automatically to zero when idle.">
    <rect x="30" y="350" width="740" height="85" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">FaaS - Function as a Service (Serverless)</text>
    <rect x="60" y="385" width="60" height="35" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="90" y="405" text-anchor="middle" font-size="9" fill="#9c27b0">HTTP</text>
    <text x="90" y="418" text-anchor="middle" font-size="8" fill="#7b1fa2">Request</text>
    <line x1="120" y1="402" x2="145" y2="402" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="145" y="385" width="90" height="35" rx="4" fill="#9c27b0"/>
    <text x="190" y="405" text-anchor="middle" font-size="10" fill="white">function()</text>
    <text x="190" y="418" text-anchor="middle" font-size="8" fill="#e1bee7">AWS Lambda</text>
    <rect x="270" y="385" width="70" height="35" rx="4" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="305" y="400" text-anchor="middle" font-size="9" fill="#9c27b0">Image</text>
    <text x="305" y="414" text-anchor="middle" font-size="8" fill="#7b1fa2">Upload</text>
    <line x1="340" y1="402" x2="365" y2="402" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="365" y="385" width="90" height="35" rx="4" fill="#9c27b0"/>
    <text x="410" y="405" text-anchor="middle" font-size="10" fill="white">function()</text>
    <text x="410" y="418" text-anchor="middle" font-size="8" fill="#e1bee7">Azure Funcs</text>
    <rect x="500" y="385" width="250" height="35" rx="4" fill="#ce93d8" stroke="#9c27b0" stroke-width="1"/>
    <text x="625" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a148c">Key Benefits</text>
    <text x="625" y="415" text-anchor="middle" font-size="9" fill="#7b1fa2">Zero server management | Pay per invocation | Millisecond startup</text>
  </g>

  <g id="step6" class="step" data-narration="Cloud environments use essential tools: Terraform for infrastructure as code, Jenkins or GitHub Actions for CI/CD pipelines, and Ansible for configuration management.">
    <rect x="30" y="450" width="740" height="65" rx="8" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
    <text x="400" y="468" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Essential DevOps Tools</text>
    <rect x="50" y="480" width="110" height="25" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="105" y="496" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">IaC: Terraform</text>
    <rect x="175" y="480" width="110" height="25" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="230" y="496" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">CI/CD: Jenkins</text>
    <rect x="300" y="480" width="110" height="25" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="355" y="496" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">Config: Ansible</text>
    <rect x="425" y="480" width="110" height="25" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="480" y="496" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">Container: Docker</text>
    <rect x="550" y="480" width="110" height="25" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="605" y="496" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">Orchestrate: K8s</text>
    <rect x="675" y="480" width="75" height="25" rx="4" fill="#c5cae9" stroke="#3f51b5" stroke-width="1"/>
    <text x="712" y="496" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a237e">Istio</text>
  </g>

  <g id="step7" class="step" data-narration="Comparing service models shows decreasing management responsibility from IaaS to FaaS, with faster startup times and more granular pay-per-use billing at higher abstraction.">
    <rect x="30" y="525" width="740" height="70" rx="8" fill="white" stroke="#455a64" stroke-width="1.5"/>
    <text x="400" y="543" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Quick Comparison: IaaS vs CaaS vs PaaS vs FaaS</text>
    <line x1="30" y1="550" x2="770" y2="550" stroke="#eee" stroke-width="1"/>
    <text x="85" y="568" text-anchor="middle" font-size="9" font-weight="bold" fill="#455a64">Service</text>
    <text x="175" y="568" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">IaaS</text>
    <text x="295" y="568" text-anchor="middle" font-size="9" font-weight="bold" fill="#388e3c">CaaS</text>
    <text x="415" y="568" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">PaaS</text>
    <text x="535" y="568" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">FaaS</text>
    <text x="640" y="568" text-anchor="middle" font-size="9" font-weight="bold" fill="#455a64">Use Case</text>
    <text x="175" y="582" text-anchor="middle" font-size="8" fill="#e65100">VM</text>
    <text x="295" y="582" text-anchor="middle" font-size="8" fill="#388e3c">Container</text>
    <text x="415" y="582" text-anchor="middle" font-size="8" fill="#1976d2">App Code</text>
    <text x="535" y="582" text-anchor="middle" font-size="8" fill="#9c27b0">Function</text>
    <text x="640" y="582" text-anchor="middle" font-size="8" fill="#455a64">Legacy apps</text>
    <text x="175" y="592" text-anchor="middle" font-size="8" fill="#e65100">Minutes</text>
    <text x="295" y="592" text-anchor="middle" font-size="8" fill="#388e3c">Seconds</text>
    <text x="415" y="592" text-anchor="middle" font-size="8" fill="#1976d2">Seconds</text>
    <text x="535" y="592" text-anchor="middle" font-size="8" fill="#9c27b0">Milliseconds</text>
    <text x="640" y="592" text-anchor="middle" font-size="8" fill="#455a64">Microservices</text>
  </g>
</svg>