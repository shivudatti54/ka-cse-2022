<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a237e">Technologies for Network-Based Systems</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Network technologies form the foundation for distributed computing and cloud services, enabling communication and resource sharing across connected systems.">
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#616161">TCP/IP Stack, SDN, NFV, CDN, RPC, REST, Security, and Edge Computing</text>
  </g>

  <g id="step1" class="step" data-narration="The TCP IP protocol stack has four layers: Network Interface for physical transmission, Internet for routing, Transport for delivery control, and Application for user services.">
    <rect x="25" y="75" width="240" height="220" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="145" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">TCP/IP Protocol Stack</text>
    <rect x="43" y="110" width="204" height="38" rx="5" fill="#1976d2"/>
    <text x="145" y="132" text-anchor="middle" font-size="11" fill="white">Application Layer</text>
    <text x="145" y="148" text-anchor="middle" font-size="8" fill="#bbdefb">HTTP, FTP, DNS, SMTP</text>
    <rect x="43" y="155" width="204" height="38" rx="5" fill="#1565c0"/>
    <text x="145" y="177" text-anchor="middle" font-size="11" fill="white">Transport Layer</text>
    <text x="145" y="193" text-anchor="middle" font-size="8" fill="#bbdefb">TCP (reliable), UDP (fast)</text>
    <rect x="43" y="200" width="204" height="38" rx="5" fill="#0d47a1"/>
    <text x="145" y="222" text-anchor="middle" font-size="11" fill="white">Internet Layer</text>
    <text x="145" y="238" text-anchor="middle" font-size="8" fill="#bbdefb">IP, ICMP, ARP</text>
    <rect x="43" y="245" width="204" height="38" rx="5" fill="#0a3470"/>
    <text x="145" y="267" text-anchor="middle" font-size="11" fill="white">Network Interface</text>
    <text x="145" y="283" text-anchor="middle" font-size="8" fill="#bbdefb">Ethernet, WiFi, Fiber Optics</text>
  </g>

  <g id="step2" class="step" data-narration="Software Defined Networking separates control and data planes, allowing centralized programmable network management through controllers with northbound and southbound APIs.">
    <rect x="280" y="75" width="240" height="220" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Software-Defined Networking</text>
    <rect x="310" y="112" width="180" height="36" rx="5" fill="#388e3c"/>
    <text x="400" y="134" text-anchor="middle" font-size="11" fill="white">Application Layer</text>
    <text x="400" y="155" text-anchor="middle" font-size="9" fill="#2e7d32">&#x2195; Northbound API</text>
    <rect x="310" y="162" width="180" height="36" rx="5" fill="#2e7d32"/>
    <text x="400" y="184" text-anchor="middle" font-size="11" fill="white">SDN Controller</text>
    <text x="400" y="205" text-anchor="middle" font-size="9" fill="#1b5e20">&#x2195; Southbound (OpenFlow)</text>
    <rect x="310" y="212" width="180" height="36" rx="5" fill="#1b5e20"/>
    <text x="400" y="234" text-anchor="middle" font-size="11" fill="white">Infrastructure Layer</text>
    <text x="400" y="260" text-anchor="middle" font-size="9" fill="#616161">Programmable switches and routers</text>
  </g>

  <g id="step3" class="step" data-narration="Network Function Virtualization replaces dedicated hardware appliances like routers and firewalls with software running on standard servers, reducing costs and increasing flexibility.">
    <rect x="535" y="75" width="240" height="220" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="655" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0">NFV Architecture</text>
    <rect x="555" y="112" width="200" height="32" rx="5" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="655" y="132" text-anchor="middle" font-size="10" fill="#7b1fa2">Hardware Appliances</text>
    <text x="655" y="145" text-anchor="middle" font-size="8" fill="#8e24aa">(Traditional Router, Firewall, Load Balancer)</text>
    <line x1="655" y1="152" x2="655" y2="172" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <text x="655" y="168" text-anchor="middle" font-size="9" fill="#9c27b0">Virtualization Layer</text>
    <rect x="555" y="180" width="200" height="32" rx="5" fill="#ce93d8" stroke="#9c27b0" stroke-width="1"/>
    <text x="655" y="200" text-anchor="middle" font-size="10" fill="#4a148c">Virtual Functions</text>
    <text x="655" y="220" text-anchor="middle" font-size="8" fill="#7b1fa2">vRouter, vFirewall, vLB on commodity hardware</text>
    <rect x="555" y="230" width="200" height="32" rx="5" fill="#ab47bc" stroke="#9c27b0" stroke-width="1"/>
    <text x="655" y="250" text-anchor="middle" font-size="10" fill="white">Commercial Off-the-Shelf Servers</text>
    <text x="655" y="272" text-anchor="middle" font-size="9" fill="#616161">Cost savings and flexibility</text>
  </g>

  <g id="step4" class="step" data-narration="Content Delivery Networks cache website content at geographically distributed edge servers, serving users from nearby locations to reduce latency and improve performance.">
    <rect x="25" y="310" width="350" height="130" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="332" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Content Delivery Network (CDN)</text>
    <circle cx="200" cy="365" r="28" fill="#ff9800" opacity="0.3" stroke="#ff9800" stroke-width="1.5"/>
    <text x="200" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Origin Server</text>
    <circle cx="100" cy="400" r="18" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="100" y="404" text-anchor="middle" font-size="8" fill="#e65100">Edge</text>
    <circle cx="200" cy="415" r="18" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="200" y="419" text-anchor="middle" font-size="8" fill="#e65100">Edge</text>
    <circle cx="300" cy="400" r="18" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="300" y="404" text-anchor="middle" font-size="8" fill="#e65100">Edge</text>
    <line x1="182" y1="380" x2="115" y2="388" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="3"/>
    <line x1="200" y1="385" x2="200" y2="397" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="3"/>
    <line x1="218" y1="380" x2="285" y2="388" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="3"/>
    <text x="200" y="438" text-anchor="middle" font-size="10" fill="#616161">Akamai, Cloudflare, CloudFront - Low latency delivery worldwide</text>
  </g>

  <g id="step5" class="step" data-narration="RPC enables programs to call procedures on remote computers as if they were local, while REST uses HTTP methods for stateless web service communication.">
    <rect x="390" y="310" width="385" height="130" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="582" y="332" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c">Distributed Communication Patterns</text>
    <rect x="410" y="352" width="160" height="40" rx="5" fill="#ce93d8"/>
    <text x="490" y="375" text-anchor="middle" font-size="11" fill="white">RPC / gRPC</text>
    <text x="490" y="390" text-anchor="middle" font-size="8" fill="#7b1fa2">Remote Procedure Call</text>
    <line x1="575" y1="375" x2="605" y2="375" stroke="#388e3c" stroke-width="1.5"/>
    <rect x="610" y="352" width="145" height="40" rx="5" fill="#81c784"/>
    <text x="682" y="375" text-anchor="middle" font-size="11" fill="white">REST API</text>
    <text x="682" y="390" text-anchor="middle" font-size="8" fill="#2e7d32">GET, POST, PUT, DELETE</text>
    <rect x="410" y="402" width="345" height="28" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="582" y="420" text-anchor="middle" font-size="10" fill="#1b5e20">Message Queues: RabbitMQ, Kafka - Async point-to-point and publish-subscribe</text>
  </g>

  <g id="step6" class="step" data-narration="Network security uses multiple layers including VPN encrypted tunnels, firewalls for traffic filtering, and intrusion detection systems to protect data.">
    <rect x="25" y="455" width="370" height="130" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="210" y="477" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Network Security Technologies</text>
    <rect x="45" y="495" width="105" height="35" rx="5" fill="#ffcdd2" stroke="#f44336" stroke-width="1"/>
    <text x="97" y="515" text-anchor="middle" font-size="10" fill="#b71c1c">VPN Tunnel</text>
    <text x="97" y="528" text-anchor="middle" font-size="7" fill="#c62828">Encrypted tunnel</text>
    <rect x="165" y="495" width="105" height="35" rx="5" fill="#ef9a9a" stroke="#f44336" stroke-width="1"/>
    <text x="217" y="515" text-anchor="middle" font-size="10" fill="#b71c1c">Firewall</text>
    <text x="217" y="528" text-anchor="middle" font-size="7" fill="#c62828">Traffic filter</text>
    <rect x="285" y="495" width="95" height="35" rx="5" fill="#e57373" stroke="#f44336" stroke-width="1"/>
    <text x="332" y="515" text-anchor="middle" font-size="10" fill="#b71c1c">IDS / IPS</text>
    <text x="332" y="528" text-anchor="middle" font-size="7" fill="#c62828">Threat detection</text>
    <rect x="45" y="540" width="335" height="35" rx="5" fill="#ef5350" stroke="#f44336" stroke-width="1"/>
    <text x="210" y="562" text-anchor="middle" font-size="10" fill="white">TLS/SSL Encryption - Secure data transmission over networks</text>
  </g>

  <g id="step7" class="step" data-narration="Edge computing brings computation and data storage closer to users through regional and local edge nodes, complementing central cloud data centers for low-latency applications.">
    <rect x="410" y="455" width="365" height="130" rx="8" fill="#fff8e1" stroke="#ffa000" stroke-width="2"/>
    <text x="592" y="477" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Edge Computing Architecture</text>
    <rect x="430" y="495" width="90" height="28" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="475" y="513" text-anchor="middle" font-size="10" fill="#e65100">Cloud DC</text>
    <line x1="520" y1="509" x2="540" y2="509" stroke="#ffa000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="540" y="495" width="80" height="28" rx="5" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="580" y="513" text-anchor="middle" font-size="10" fill="#e65100">Regional Edge</text>
    <line x1="620" y1="509" x2="640" y2="509" stroke="#ffa000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="640" y="495" width="80" height="28" rx="5" fill="#ffcc80" stroke="#ff9800" stroke-width="1"/>
    <text x="680" y="513" text-anchor="middle" font-size="10" fill="#e65100">Local Edge</text>
    <line x1="720" y1="509" x2="735" y2="509" stroke="#ffa000" stroke-width="1" stroke-dasharray="3"/>
    <circle cx="755" cy="509" r="16" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="755" y="513" text-anchor="middle" font-size="9" fill="#e65100">IoT</text>
    <rect x="430" y="535" width="325" height="40" rx="5" fill="#fff8e1" stroke="#ffa000" stroke-width="1"/>
    <text x="592" y="555" text-anchor="middle" font-size="10" fill="#e65100">5G enables high-speed, low-latency connectivity for distributed systems and real-time applications</text>
  </g>
</svg>