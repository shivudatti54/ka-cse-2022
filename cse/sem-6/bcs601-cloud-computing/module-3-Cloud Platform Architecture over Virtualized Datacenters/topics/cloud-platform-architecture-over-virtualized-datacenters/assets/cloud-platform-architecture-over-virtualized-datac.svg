<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Cloud Platform Architecture over Virtualized Datacenters</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Cloud computing uses virtualization to transform physical datacenters into flexible, on-demand computing environments delivering utility-like services.">
    <text x="400" y="48" text-anchor="middle" font-size="12" fill="#616161">Four-layer architecture: Physical → Virtualization → Resource Pooling → Service Delivery</text>
  </g>

  <g id="step1" class="step" data-narration="The foundation is the physical layer with actual hardware: server racks, storage arrays SAN and NAS, networking switches, plus power and cooling systems.">
    <rect x="50" y="60" width="700" height="60" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Layer 1: Physical Infrastructure</text>
    <rect x="70" y="92" width="100" height="22" rx="4" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="120" y="107" text-anchor="middle" font-size="8" fill="#e65100">Server Racks</text>
    <rect x="180" y="92" width="100" height="22" rx="4" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="230" y="107" text-anchor="middle" font-size="8" fill="#e65100">Storage SAN/NAS</text>
    <rect x="290" y="92" width="110" height="22" rx="4" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="345" y="107" text-anchor="middle" font-size="8" fill="#e65100">Network Switches</text>
    <rect x="410" y="92" width="160" height="22" rx="4" fill="#ff9800"/>
    <text x="490" y="107" text-anchor="middle" font-size="8" fill="white">Power &amp; Cooling</text>
    <rect x="580" y="92" width="155" height="22" rx="4" fill="#ff9800"/>
    <text x="657" y="107" text-anchor="middle" font-size="8" fill="white">Raw tangible resources</text>
  </g>

  <g id="step2" class="step" data-narration="The virtualization layer has a hypervisor or VMM like VMware vSphere, Hyper-V, or KVM that creates isolated virtual machines with virtual CPU, RAM, disk, and network resources.">
    <rect x="50" y="130" width="700" height="65" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Layer 2: Virtualization / Abstraction</text>
    <rect x="70" y="162" width="160" height="28" rx="4" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="150" y="176" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">Hypervisor (VMM)</text>
    <text x="150" y="186" text-anchor="middle" font-size="7" fill="#2e7d32">VMware, Hyper-V, KVM</text>
    <rect x="240" y="162" width="160" height="28" rx="4" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="320" y="176" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">Virtual Machines</text>
    <text x="320" y="186" text-anchor="middle" font-size="7" fill="#2e7d32">Isolated guest OS + apps</text>
    <rect x="410" y="162" width="65" height="24" rx="4" fill="#388e3c"/>
    <text x="442" y="178" text-anchor="middle" font-size="7" fill="white">vCPUs</text>
    <rect x="483" y="162" width="65" height="24" rx="4" fill="#388e3c"/>
    <text x="515" y="178" text-anchor="middle" font-size="7" fill="white">vRAM</text>
    <rect x="556" y="162" width="65" height="24" rx="4" fill="#388e3c"/>
    <text x="588" y="178" text-anchor="middle" font-size="7" fill="white">vDisks</text>
    <rect x="629" y="162" width="65" height="24" rx="4" fill="#388e3c"/>
    <text x="661" y="178" text-anchor="middle" font-size="7" fill="white">vNICs</text>
    <rect x="700" y="165" width="40" height="18" rx="9" fill="#2e7d32"/>
    <text x="720" y="177" text-anchor="middle" font-size="6" fill="white">VMs</text>
  </g>

  <g id="step3" class="step" data-narration="The resource pooling layer combines CPU, storage, and bandwidth into shared pools for dynamic assignment. Orchestration tools like Kubernetes and OpenStack automate everything.">
    <rect x="50" y="205" width="700" height="60" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">Layer 3: Resource Pooling and Automation</text>
    <rect x="70" y="237" width="200" height="22" rx="4" fill="#bbdefb" stroke="#1976d2"/>
    <text x="170" y="252" text-anchor="middle" font-size="9" font-weight="bold" fill="#0d47a1">Resource Pooling</text>
    <text x="200" y="252" text-anchor="middle" font-size="7" fill="#0d47a1">CPU, storage, bandwidth shared</text>
    <rect x="280" y="237" width="200" height="22" rx="4" fill="#bbdefb" stroke="#1976d2"/>
    <text x="380" y="252" text-anchor="middle" font-size="9" font-weight="bold" fill="#0d47a1">Orchestration</text>
    <text x="410" y="252" text-anchor="middle" font-size="7" fill="#0d47a1">Kubernetes, OpenStack</text>
    <rect x="490" y="237" width="245" height="22" rx="4" fill="#1976d2"/>
    <text x="612" y="252" text-anchor="middle" font-size="8" fill="white">Multi-tenant: dynamic on-demand assignment</text>
  </g>

  <g id="step4" class="step" data-narration="The service delivery layer provides IaaS like EC2 for raw compute, PaaS like Google App Engine for platforms, and SaaS like Gmail for complete applications delivered via web APIs.">
    <rect x="50" y="275" width="700" height="60" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">Layer 4: Service Delivery</text>
    <rect x="70" y="307" width="210" height="22" rx="4" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="110" y="321" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">IaaS</text>
    <text x="175" y="321" text-anchor="middle" font-size="8" fill="#7b1fa2">Raw compute/storage (EC2, Azure VMs)</text>
    <rect x="290" y="307" width="210" height="22" rx="4" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="330" y="321" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">PaaS</text>
    <text x="420" y="321" text-anchor="middle" font-size="8" fill="#7b1fa2">Managed platform (GAE, Heroku)</text>
    <rect x="510" y="307" width="225" height="22" rx="4" fill="#e1bee7" stroke="#9c27b0"/>
    <text x="555" y="321" text-anchor="middle" font-size="9" font-weight="bold" fill="#7b1fa2">SaaS</text>
    <text x="660" y="321" text-anchor="middle" font-size="8" fill="#7b1fa2">Complete apps (Gmail, Salesforce)</text>
  </g>

  <g id="step5" class="step" data-narration="The complete architecture flows from physical hardware through hypervisor abstraction into resource pools, finally delivering cloud services to end users via portals and APIs.">
    <rect x="50" y="345" width="700" height="55" rx="8" fill="white" stroke="#455a64" stroke-width="1.5"/>
    <text x="400" y="363" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a237e">Architecture Flow: Hardware → Virtualization → Pooling → Services → Users</text>
    <rect x="70" y="375" width="120" height="20" rx="4" fill="#fff3e0" stroke="#ff9800"/>
    <text x="130" y="389" text-anchor="middle" font-size="8" fill="#e65100">Physical Hardware</text>
    <line x1="195" y1="385" x2="215" y2="385" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="220" y="375" width="100" height="20" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="270" y="389" text-anchor="middle" font-size="8" fill="#2e7d32">Hypervisor</text>
    <line x1="325" y1="385" x2="345" y2="385" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="350" y="375" width="100" height="20" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="400" y="389" text-anchor="middle" font-size="8" fill="#0d47a1">Resource Pool</text>
    <line x1="455" y1="385" x2="475" y2="385" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="480" y="375" width="100" height="20" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="530" y="389" text-anchor="middle" font-size="8" fill="#7b1fa2">Cloud Services</text>
    <line x1="585" y1="385" x2="605" y2="385" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="610" y="375" width="80" height="20" rx="10" fill="#1976d2"/>
    <text x="650" y="389" text-anchor="middle" font-size="8" fill="white">Users</text>
  </g>

  <g id="step6" class="step" data-narration="Automated provisioning shows a user requesting a VM, the orchestrator checking resources, the hypervisor creating the VM, network configuration, and delivery within minutes.">
    <rect x="50" y="410" width="700" height="60" rx="8" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
    <text x="400" y="430" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f51b5">Example: Provisioning a Web Server (Automated)</text>
    <rect x="70" y="442" width="100" height="22" rx="4" fill="#c5cae9" stroke="#3f51b5"/>
    <text x="120" y="455" text-anchor="middle" font-size="8" font-weight="bold" fill="#3f51b5">1. User</text>
    <text x="120" y="467" text-anchor="middle" font-size="6" fill="#3f51b5">Requests VM</text>
    <line x1="175" y1="453" x2="195" y2="453" stroke="#3f51b5" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="200" y="442" width="100" height="22" rx="4" fill="#c5cae9" stroke="#3f51b5"/>
    <text x="250" y="455" text-anchor="middle" font-size="8" font-weight="bold" fill="#3f51b5">2. Orchestrator</text>
    <text x="250" y="467" text-anchor="middle" font-size="6" fill="#3f51b5">Checks pool</text>
    <line x1="305" y1="453" x2="325" y2="453" stroke="#3f51b5" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="330" y="442" width="100" height="22" rx="4" fill="#c5cae9" stroke="#3f51b5"/>
    <text x="380" y="455" text-anchor="middle" font-size="8" font-weight="bold" fill="#3f51b5">3. Hypervisor</text>
    <text x="380" y="467" text-anchor="middle" font-size="6" fill="#3f51b5">Creates VM</text>
    <line x1="435" y1="453" x2="455" y2="453" stroke="#3f51b5" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="460" y="442" width="100" height="22" rx="4" fill="#c5cae9" stroke="#3f51b5"/>
    <text x="510" y="455" text-anchor="middle" font-size="8" font-weight="bold" fill="#3f51b5">4. Network</text>
    <text x="510" y="467" text-anchor="middle" font-size="6" fill="#3f51b5">Config + IP</text>
    <line x1="565" y1="453" x2="585" y2="453" stroke="#3f51b5" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="590" y="442" width="100" height="22" rx="11" fill="#3f51b5"/>
    <text x="640" y="455" text-anchor="middle" font-size="8" font-weight="bold" fill="white">5. Ready!</text>
    <text x="640" y="467" text-anchor="middle" font-size="6" fill="#c5cae9">Delivered</text>
  </g>

  <g id="step7" class="step" data-narration="Key points: hypervisors enable abstraction, orchestration automates management, multi-tenancy maximizes resource utilization, and the architecture supports IaaS PaaS and SaaS service models.">
    <rect x="50" y="480" width="700" height="50" rx="8" fill="white" stroke="#455a64" stroke-width="1.5"/>
    <text x="400" y="498" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a237e">Key Takeaways</text>
    <rect x="70" y="508" width="155" height="18" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="147" y="521" text-anchor="middle" font-size="8" fill="#2e7d32">Hypervisor = Abstraction</text>
    <rect x="235" y="508" width="155" height="18" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="312" y="521" text-anchor="middle" font-size="8" fill="#0d47a1">Orchestration = Automation</text>
    <rect x="400" y="508" width="155" height="18" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="477" y="521" text-anchor="middle" font-size="8" fill="#7b1fa2">Multi-tenancy = Efficiency</text>
    <rect x="565" y="508" width="170" height="18" rx="4" fill="#e8eaf6" stroke="#3f51b5"/>
    <text x="650" y="521" text-anchor="middle" font-size="8" fill="#3f51b5">Supports IaaS, PaaS, SaaS</text>
  </g>
</svg>