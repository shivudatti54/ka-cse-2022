<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Virtual Clusters &amp; Resource Management</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="Virtual clusters are collections of interconnected VMs deployed as a unified resource pool on shared physical infrastructure for cloud computing.">
    <text x="400" y="48" text-anchor="middle" font-size="11" fill="#616161">Architecture • Provisioning • Resource Management • Live Migration • HA/FT</text>
  </g>

  <g id="step1" class="step" data-narration="A virtual cluster contains virtual machines connected via virtual network and storage, managed by a cluster manager like Kubernetes or vSphere.">
    <rect x="30" y="58" width="740" height="95" rx="8" fill="white" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Virtual Cluster Architecture</text>

    <rect x="50" y="88" width="90" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="95" y="109" text-anchor="middle" font-size="9" fill="#1976d2">VM 1</text>
    <rect x="150" y="88" width="90" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="195" y="109" text-anchor="middle" font-size="9" fill="#1976d2">VM 2</text>
    <rect x="250" y="88" width="90" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="295" y="109" text-anchor="middle" font-size="9" fill="#1976d2">VM 3</text>
    <rect x="350" y="88" width="90" height="35" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="395" y="109" text-anchor="middle" font-size="9" fill="#1976d2">VM N</text>

    <rect x="50" y="128" width="350" height="18" rx="3" fill="#1976d2"/>
    <text x="225" y="141" text-anchor="middle" font-size="9" fill="white">Virtual Network (SDN / vSwitch)</text>
    <rect x="410" y="128" width="180" height="18" rx="3" fill="#1565c0"/>
    <text x="500" y="141" text-anchor="middle" font-size="9" fill="white">Virtual Storage</text>

    <rect x="50" y="133" width="740" height="1" fill="#e0e0e0"/>

    <rect x="50" y="138" width="180" height="10" rx="2" fill="#0d47a1"/>
    <text x="140" y="146" text-anchor="middle" font-size="8" fill="white">Physical Infrastructure</text>
    <rect x="240" y="138" width="180" height="10" rx="2" fill="#455a64"/>
    <text x="330" y="146" text-anchor="middle" font-size="8" fill="white">Physical Network &amp; Storage</text>
    <rect x="430" y="138" width="160" height="10" rx="2" fill="#7b1fa2"/>
    <text x="510" y="146" text-anchor="middle" font-size="8" fill="white">Cluster Manager</text>
  </g>

  <g id="step2" class="step" data-narration="Dynamic provisioning creates clusters in minutes through five steps: request, scheduling, deployment, configuration, and integration using templates and automation tools.">
    <rect x="30" y="162" width="740" height="105" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Dynamic Provisioning Process</text>

    <rect x="50" y="194" width="120" height="28" rx="14" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="110" y="212" text-anchor="middle" font-size="9" fill="#2e7d32">1. Request specs</text>
    <line x1="175" y1="208" x2="195" y2="208" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="195" y="194" width="120" height="28" rx="14" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="255" y="212" text-anchor="middle" font-size="9" fill="#2e7d32">2. Schedule place</text>
    <line x1="320" y1="208" x2="340" y2="208" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="340" y="194" width="120" height="28" rx="14" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="212" text-anchor="middle" font-size="9" fill="#2e7d32">3. Deploy boot VMs</text>
    <line x1="465" y1="208" x2="485" y2="208" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="485" y="194" width="120" height="28" rx="14" fill="#a5d6a7" stroke="#388e3c" stroke-width="1"/>
    <text x="545" y="212" text-anchor="middle" font-size="9" fill="#2e7d32">4. Configure</text>
    <line x1="610" y1="208" x2="630" y2="208" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="630" y="194" width="120" height="28" rx="14" fill="#388e3c"/>
    <text x="690" y="212" text-anchor="middle" font-size="9" fill="white">5. Integrate</text>

    <text x="400" y="245" text-anchor="middle" font-size="9" fill="#616161">Minutes vs. weeks for physical • Uses templates + Ansible/cloud-init • Kubernetes, Mesos, vSphere</text>
  </g>

  <g id="step3" class="step" data-narration="Resource management handles allocation, load balancing, server consolidation, and live migration to meet SLAs and optimize physical infrastructure usage effectively.">
    <rect x="30" y="277" width="740" height="100" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Resource Management Tasks</text>

    <rect x="50" y="310" width="160" height="55" rx="5" fill="white" stroke="#ff9800" stroke-width="1.5"/>
    <text x="130" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Allocation</text>
    <text x="130" y="342" text-anchor="middle" font-size="8" fill="#455a64">Static vs dynamic</text>
    <text x="130" y="354" text-anchor="middle" font-size="8" fill="#455a64">shares, limits, reservations</text>

    <rect x="220" y="310" width="160" height="55" rx="5" fill="white" stroke="#ff9800" stroke-width="1.5"/>
    <text x="300" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Load Balancing</text>
    <text x="300" y="342" text-anchor="middle" font-size="8" fill="#455a64">Distribute evenly across</text>
    <text x="300" y="354" text-anchor="middle" font-size="8" fill="#455a64">hosts, prevent hotspots</text>

    <rect x="390" y="310" width="160" height="55" rx="5" fill="white" stroke="#ff9800" stroke-width="1.5"/>
    <text x="470" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Consolidation</text>
    <text x="470" y="342" text-anchor="middle" font-size="8" fill="#455a64">Pack VMs onto fewer</text>
    <text x="470" y="354" text-anchor="middle" font-size="8" fill="#455a64">hosts, power down idle</text>

    <rect x="560" y="310" width="190" height="55" rx="5" fill="#ff9800"/>
    <text x="655" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Live Migration</text>
    <text x="655" y="342" text-anchor="middle" font-size="8" fill="white">Move running VMs across</text>
    <text x="655" y="354" text-anchor="middle" font-size="8" fill="white">hosts with near-zero downtime</text>
  </g>

  <g id="step4" class="step" data-narration="Live migration has three phases: pre-copy transfers memory iteratively while the VM runs, then stop and copy sends final state, and switchover resumes the VM on the destination.">
    <rect x="30" y="387" width="740" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Live Migration Process</text>

    <rect x="50" y="420" width="150" height="55" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
    <text x="125" y="438" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">1. Pre-Copy</text>
    <text x="125" y="452" text-anchor="middle" font-size="8" fill="#1976d2">Iterative memory copy</text>
    <text x="125" y="464" text-anchor="middle" font-size="8" fill="#1976d2">while VM keeps running</text>

    <rect x="210" y="420" width="150" height="55" rx="5" fill="#ce93d8" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="285" y="438" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">2. Stop &amp; Copy</text>
    <text x="285" y="452" text-anchor="middle" font-size="8" fill="#7b1fa2">Pause VM briefly</text>
    <text x="285" y="464" text-anchor="middle" font-size="8" fill="#7b1fa2">copy final dirty pages</text>

    <rect x="370" y="420" width="150" height="55" rx="5" fill="#a5d6a7" stroke="#388e3c" stroke-width="1.5"/>
    <text x="445" y="438" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">3. Switchover</text>
    <text x="445" y="452" text-anchor="middle" font-size="8" fill="#388e3c">Resume VM on new host</text>
    <text x="445" y="464" text-anchor="middle" font-size="8" fill="#388e3c">redirect network traffic</text>

    <rect x="530" y="420" width="220" height="55" rx="5" fill="white" stroke="#455a64" stroke-width="1"/>
    <text x="640" y="438" text-anchor="middle" font-size="10" font-weight="bold" fill="#37474f">Benefits</text>
    <text x="640" y="452" text-anchor="middle" font-size="8" fill="#455a64">Proactive maintenance</text>
    <text x="640" y="464" text-anchor="middle" font-size="8" fill="#455a64">Load balancing • Energy saving</text>

    <text x="400" y="484" text-anchor="middle" font-size="9" fill="#616161">Downtime: milliseconds (nearly seamless) • Essential for SLA compliance</text>
  </g>

  <g id="step5" class="step" data-narration="High availability restarts failed VMs on healthy hosts with brief interruption while fault tolerance maintains a live shadow VM for instant zero downtime failover.">
    <rect x="30" y="497" width="360" height="88" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="210" y="515" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">High Availability (HA)</text>

    <rect x="50" y="528" width="150" height="45" rx="5" fill="white" stroke="#f44336" stroke-width="1.5"/>
    <text x="125" y="546" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">Auto-Restart</text>
    <text x="125" y="560" text-anchor="middle" font-size="8" fill="#455a64">Reboot on healthy host</text>
    <text x="125" y="570" text-anchor="middle" font-size="8" fill="#455a64">Brief interruption</text>

    <rect x="210" y="528" width="165" height="45" rx="5" fill="#ffcdd2" stroke="#e57373" stroke-width="1"/>
    <text x="292" y="546" text-anchor="middle" font-size="9" font-weight="bold" fill="#b71c1c">Lower resource overhead</text>
    <text x="292" y="560" text-anchor="middle" font-size="8" fill="#455a64">Cost-effective</text>
    <text x="292" y="570" text-anchor="middle" font-size="8" fill="#455a64">Suitable for most apps</text>
  </g>

  <g id="step6" class="step" data-narration="Fault tolerance keeps a continuously synchronized shadow VM on another host for instant takeover with zero downtime but requires double the resources.">
    <rect x="400" y="497" width="370" height="88" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="585" y="515" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">Fault Tolerance (FT)</text>

    <rect x="420" y="528" width="150" height="45" rx="5" fill="#9c27b0"/>
    <text x="495" y="546" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Shadow VM</text>
    <text x="495" y="560" text-anchor="middle" font-size="8" fill="#e1bee7">Continuously synced</text>
    <text x="495" y="570" text-anchor="middle" font-size="8" fill="#e1bee7">Zero downtime failover</text>

    <rect x="580" y="528" width="175" height="45" rx="5" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1"/>
    <text x="667" y="546" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a148c">Higher resource cost</text>
    <text x="667" y="560" text-anchor="middle" font-size="8" fill="#455a64">Requires 2x resources</text>
    <text x="667" y="570" text-anchor="middle" font-size="8" fill="#455a64">For critical applications</text>
  </g>
</svg>