<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Virtualization Structure, Tools &amp; Mechanisms</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <g id="step1" class="step" data-narration="The core architecture places a hypervisor between physical hardware and guest operating systems, managing CPU, memory, and I/O resources for multiple isolated VMs.">
    <rect x="30" y="48" width="740" height="130" rx="8" fill="white" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Virtualization Architecture Layers</text>
    
    <rect x="50" y="85" width="160" height="40" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="130" y="102" text-anchor="middle" font-size="10" fill="#1976d2">Guest OS 1</text>
    <text x="130" y="116" text-anchor="middle" font-size="8" fill="#1976d2">App A</text>
    
    <rect x="220" y="85" width="160" height="40" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="300" y="102" text-anchor="middle" font-size="10" fill="#1976d2">Guest OS 2</text>
    <text x="300" y="116" text-anchor="middle" font-size="8" fill="#1976d2">App B</text>
    
    <rect x="390" y="85" width="160" height="40" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
    <text x="470" y="102" text-anchor="middle" font-size="10" fill="#1976d2">Guest OS 3</text>
    <text x="470" y="116" text-anchor="middle" font-size="8" fill="#1976d2">App C</text>
    
    <rect x="560" y="85" width="80" height="40" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="1" stroke-dasharray="4"/>
    <text x="600" y="102" text-anchor="middle" font-size="9" fill="#1976d2">...</text>
    <text x="600" y="116" text-anchor="middle" font-size="8" fill="#1976d2">More VMs</text>
    
    <rect x="50" y="135" width="700" height="30" rx="4" fill="#1976d2"/>
    <text x="400" y="155" text-anchor="middle" font-size="11" fill="white">Hypervisor (VMM) - Creates and manages virtual machines</text>
  </g>

  <g id="step2" class="step" data-narration="Type 1 hypervisors run bare-metal on hardware for production use, while Type 2 hypervisors run on host operating systems for testing and development.">
    <rect x="30" y="188" width="365" height="150" rx="8" fill="#e3f2fd" stroke="#388e3c" stroke-width="2"/>
    <text x="212" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c">Type 1: Bare-Metal</text>
    
    <rect x="45" y="220" width="335" height="22" rx="3" fill="#c8e6c9"/>
    <text x="212" y="236" text-anchor="middle" font-size="9" fill="#2e7d32">Guest OS 1 | Guest OS 2 | Guest OS n</text>
    <rect x="45" y="246" width="335" height="22" rx="3" fill="#388e3c"/>
    <text x="212" y="262" text-anchor="middle" font-size="9" fill="white">Hypervisor</text>
    <rect x="45" y="272" width="335" height="22" rx="3" fill="#1b5e20"/>
    <text x="212" y="288" text-anchor="middle" font-size="9" fill="white">Physical Hardware</text>
    <text x="212" y="325" text-anchor="middle" font-size="8" fill="#455a64">Examples: VMware ESXi, Hyper-V, Xen, KVM</text>
    <text x="212" y="337" text-anchor="middle" font-size="8" fill="#388e3c">Best: Production, Data Centers</text>
    
    <rect x="405" y="188" width="365" height="150" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="587" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Type 2: Hosted</text>
    
    <rect x="420" y="220" width="335" height="22" rx="3" fill="#ffe0b2"/>
    <text x="587" y="236" text-anchor="middle" font-size="9" fill="#e65100">Guest OS 1 | Guest OS 2 | Guest OS n</text>
    <rect x="420" y="246" width="335" height="22" rx="3" fill="#ff9800"/>
    <text x="587" y="262" text-anchor="middle" font-size="9" fill="white">Hypervisor</text>
    <rect x="420" y="272" width="335" height="22" rx="3" fill="#ffe0b2"/>
    <text x="587" y="288" text-anchor="middle" font-size="9" fill="#e65100">Host Operating System</text>
    <rect x="420" y="298" width="335" height="22" rx="3" fill="#e65100"/>
    <text x="587" y="314" text-anchor="middle" font-size="9" fill="white">Physical Hardware</text>
    <text x="587" y="337" text-anchor="middle" font-size="8" fill="#455a64">Examples: VirtualBox, VMware Workstation</text>
  </g>

  <g id="step3" class="step" data-narration="Three mechanisms enable virtualization: full emulation via binary translation, paravirtualization using modified guest OS with hypercalls, and hardware-assisted using CPU extensions.">
    <rect x="30" y="348" width="740" height="95" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0">Virtualization Mechanisms</text>
    
    <rect x="50" y="383" width="220" height="48" rx="6" fill="white" stroke="#1976d2" stroke-width="1.5"/>
    <text x="160" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Full Virtualization</text>
    <text x="160" y="413" text-anchor="middle" font-size="8" fill="#455a64">Binary translation</text>
    <text x="160" y="424" text-anchor="middle" font-size="8" fill="#455a64">Unmodified guest OS</text>
    
    <rect x="290" y="383" width="220" height="48" rx="6" fill="white" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Paravirtualization</text>
    <text x="400" y="413" text-anchor="middle" font-size="8" fill="#455a64">Modified guest + hypercalls</text>
    <text x="400" y="424" text-anchor="middle" font-size="8" fill="#455a64">Better performance</text>
    
    <rect x="530" y="383" width="220" height="48" rx="6" fill="white" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="640" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">Hardware-Assisted</text>
    <text x="640" y="413" text-anchor="middle" font-size="8" fill="#455a64">Intel VT-x / AMD-V</text>
    <text x="640" y="424" text-anchor="middle" font-size="8" fill="#455a64">Fast + compatible</text>
  </g>

  <g id="step4" class="step" data-narration="Key tools include VMware vSphere for enterprises, KVM for Linux clouds, Xen powering Amazon EC2, Hyper-V for Windows, and Docker for container-based isolation.">
    <rect x="30" y="453" width="740" height="85" rx="8" fill="#e8f5e9" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="473" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">Major Virtualization Tools &amp; Platforms</text>
    
    <rect x="50" y="488" width="120" height="40" rx="5" fill="white" stroke="#1976d2" stroke-width="1.5"/>
    <text x="110" y="503" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">VMware vSphere</text>
    <text x="110" y="517" text-anchor="middle" font-size="7" fill="#455a64">Enterprise</text>
    
    <rect x="180" y="488" width="120" height="40" rx="5" fill="white" stroke="#388e3c" stroke-width="1.5"/>
    <text x="240" y="503" text-anchor="middle" font-size="9" font-weight="bold" fill="#388e3c">KVM</text>
    <text x="240" y="517" text-anchor="middle" font-size="7" fill="#455a64">Linux Cloud</text>
    
    <rect x="310" y="488" width="120" height="40" rx="5" fill="white" stroke="#e65100" stroke-width="1.5"/>
    <text x="370" y="503" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Xen</text>
    <text x="370" y="517" text-anchor="middle" font-size="7" fill="#455a64">Amazon EC2</text>
    
    <rect x="440" y="488" width="120" height="40" rx="5" fill="white" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="500" y="503" text-anchor="middle" font-size="9" font-weight="bold" fill="#9c27b0">Hyper-V</text>
    <text x="500" y="517" text-anchor="middle" font-size="7" fill="#455a64">Windows</text>
    
    <rect x="570" y="488" width="120" height="40" rx="5" fill="white" stroke="#455a64" stroke-width="1.5"/>
    <text x="630" y="503" text-anchor="middle" font-size="9" font-weight="bold" fill="#455a64">Docker</text>
    <text x="630" y="517" text-anchor="middle" font-size="7" fill="#455a64">Containers</text>
    
    <rect x="700" y="488" width="60" height="40" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="730" y="503" text-anchor="middle" font-size="7" fill="#9e9e9e">+ more</text>
    <text x="730" y="517" text-anchor="middle" font-size="7" fill="#9e9e9e">...</text>
  </g>

  <g id="step5" class="step" data-narration="VMware dominates enterprise with proprietary tools, KVM offers open-source Linux integration, Xen powers public clouds, and Hyper-V integrates with Windows Server environments.">
    <rect x="30" y="548" width="740" height="40" rx="6" fill="white" stroke="#455a64" stroke-width="1"/>
    <text x="400" y="568" text-anchor="middle" font-size="10" fill="#455a64">VMware: Enterprise | KVM: Open Linux | Xen: Public Cloud | Hyper-V: Windows | Docker: App Isolation</text>
  </g>
</svg>