<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2" />
      <stop offset="100%" stop-color="#42a5f5" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#388e3c" />
      <stop offset="100%" stop-color="#66bb6a" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9800" />
      <stop offset="100%" stop-color="#ffb74d" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9c27b0" />
      <stop offset="100%" stop-color="#ba68c8" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <text x="400" y="35" font-size="22" fill="#1976d2" text-anchor="middle" font-weight="bold">Rule-Based Knowledge Representation</text>
  
  <g class="step" id="step0" data-narration="A rule in expert systems is an IF-THEN statement where the IF part contains conditions (antecedent) and the THEN part contains conclusions or actions (consequent).">
    <rect x="50" y="55" width="700" height="75" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="1"/>
    <text x="60" y="80" font-size="16" fill="#1976d2" font-weight="bold">Step 1: What is a Rule?</text>
    <rect x="60" y="95" width="180" height="25" fill="#ff9800" rx="4"/>
    <text x="150" y="112" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">IF (Antecedent)</text>
    <polygon points="250,95 260,107 250,119" fill="#1976d2"/>
    <rect x="270" y="95" width="180" height="25" fill="#388e3c" rx="4"/>
    <text x="360" y="112" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">THEN (Consequent)</text>
    <text x="470" y="110" font-size="11" fill="#666">Condition/Pattern</text>
    <text x="600" y="110" font-size="11" fill="#666">Action/Conclusion</text>
  </g>
  
  <g class="step" id="step1" data-narration="A Rule-Based System has three parts: Rule Base stores rules, Working Memory holds facts, and Inference Engine matches and fires rules.">
    <rect x="50" y="138" width="700" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="1"/>
    <text x="60" y="163" font-size="16" fill="#388e3c" font-weight="bold">Step 2: Components of Rule-Based System</text>
    <rect x="60" y="175" width="200" height="35" fill="#9c27b0" rx="6"/>
    <text x="160" y="197" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Rule Base</text>
    <rect x="270" y="185" width="150" height="15" fill="none" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="345" y="197" font-size="10" fill="#666" text-anchor="middle">Stores all IF-THEN rules</text>
    <rect x="350" y="175" width="200" height="35" fill="#1976d2" rx="6"/>
    <text x="450" y="197" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Working Memory</text>
    <rect x="560" y="185" width="140" height="15" fill="none" stroke="#1976d2" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="630" y="197" font-size="10" fill="#666" text-anchor="middle">Holds current facts</text>
    <rect x="570" y="175" width="180" height="35" fill="#ff9800" rx="6"/>
    <text x="660" y="197" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Inference Engine</text>
    <rect x="660" y="185" width="90" height="15" fill="none" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="705" y="197" font-size="10" fill="#666" text-anchor="middle">Matches &amp; fires</text>
  </g>
  
  <g class="step" id="step2" data-narration="The inference engine uses a recognize-act cycle: match rules to facts, resolve conflicts when multiple match, then act by executing the rule.">
    <rect x="50" y="226" width="700" height="75" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="1"/>
    <text x="60" y="251" font-size="16" fill="#ff9800" font-weight="bold">Step 3: The Inference Process (Recognize-Act Cycle)</text>
    <rect x="60" y="265" width="150" height="28" fill="#1976d2" rx="4"/>
    <text x="135" y="284" font-size="12" fill="#ffffff" text-anchor="middle">1. Match</text>
    <rect x="220" y="265" width="180" height="28" fill="#9c27b0" rx="4"/>
    <text x="310" y="284" font-size="12" fill="#ffffff" text-anchor="middle">2. Conflict Resolution</text>
    <rect x="410" y="265" width="120" height="28" fill="#388e3c" rx="4"/>
    <text x="470" y="284" font-size="12" fill="#ffffff" text-anchor="middle">3. Act (Fire)</text>
    <polygon points="540,267 550,267 545,252" fill="#666"/>
    <text x="555" y="280" font-size="10" fill="#666">Check conditions</text>
    <polygon points="640,267 650,267 645,252" fill="#666"/>
    <text x="655" y="280" font-size="10" fill="#666">Select one rule</text>
  </g>
  
  <g class="step" id="step3" data-narration="Forward chaining starts with facts and derives conclusions. Backward chaining starts with a goal and works backwards to find supporting facts.">
    <rect x="50" y="309" width="340" height="85" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="1"/>
    <text x="60" y="334" font-size="16" fill="#1976d2" font-weight="bold">Forward Chaining</text>
    <text x="60" y="352" font-size="11" fill="#666">Data-Driven: Facts → Conclusions</text>
    <rect x="60" y="362" width="90" height="22" fill="#e3f2fd" rx="4" stroke="#1976d2"/>
    <text x="105" y="378" font-size="10" fill="#1976d2" text-anchor="middle">Symptoms</text>
    <line x1="155" y1="373" x2="175" y2="373" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="180" y="362" width="80" height="22" fill="#e3f2fd" rx="4" stroke="#1976d2"/>
    <text x="220" y="378" font-size="10" fill="#1976d2" text-anchor="middle">Rules Fire</text>
    <line x1="265" y1="373" x2="285" y2="373" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="290" y="362" width="80" height="22" fill="#1976d2" rx="4"/>
    <text x="330" y="378" font-size="10" fill="#ffffff" text-anchor="middle">Diagnosis</text>
    
    <rect x="410" y="309" width="340" height="85" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <text x="420" y="334" font-size="16" fill="#9c27b0" font-weight="bold">Backward Chaining</text>
    <text x="420" y="352" font-size="11" fill="#666">Goal-Driven: Goal → Supporting Facts</text>
    <rect x="420" y="362" width="70" height="22" fill="#9c27b0" rx="4"/>
    <text x="455" y="378" font-size="10" fill="#ffffff" text-anchor="middle">Theorem</text>
    <line x1="495" y1="373" x2="515" y2="373" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="520" y="362" width="90" height="22" fill="#f3e5f5" rx="4" stroke="#9c27b0"/>
    <text x="565" y="378" font-size="10" fill="#9c27b0" text-anchor="middle">Find Rules</text>
    <line x1="615" y1="373" x2="635" y2="373" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="640" y="362" width="90" height="22" fill="#f3e5f5" rx="4" stroke="#9c27b0"/>
    <text x="685" y="378" font-size="10" fill="#9c27b0" text-anchor="middle">Check Axioms</text>
  </g>
  
  <g class="step" id="step4" data-narration="Using forward chaining on animal facts: has fur + eats meat + tawny + spots leads to mammal, then carnivore, then cheetah conclusion.">
    <rect x="50" y="402" width="700" height="88" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="1"/>
    <text x="60" y="427" font-size="16" fill="#f44336" font-weight="bold">Step 5: Example - Animal Identification (Forward Chaining)</text>
    <text x="60" y="452" font-size="11" fill="#666">Initial Facts:</text>
    <rect x="130" y="442" width="75" height="18" fill="#e3f2fd" rx="3" stroke="#1976d2"/>
    <text x="167" y="455" font-size="9" fill="#1976d2" text-anchor="middle">has fur</text>
    <rect x="215" y="442" width="75" height="18" fill="#e3f2fd" rx="3" stroke="#1976d2"/>
    <text x="252" y="455" font-size="9" fill="#1976d2" text-anchor="middle">eats meat</text>
    <rect x="300" y="442" width="85" height="18" fill="#e3f2fd" rx="3" stroke="#1976d2"/>
    <text x="342" y="455" font-size="9" fill="#1976d2" text-anchor="middle">tawny color</text>
    <rect x="395" y="442" width="80" height="18" fill="#e3f2fd" rx="3" stroke="#1976d2"/>
    <text x="435" y="455" font-size="9" fill="#1976d2" text-anchor="middle">dark spots</text>
    <text x="60" y="477" font-size="11" fill="#666">Rules Fired:</text>
    <rect x="130" y="467" width="170" height="18" fill="#fff3e0" rx="3" stroke="#ff9800"/>
    <text x="215" y="480" font-size="9" fill="#ff9800" text-anchor="middle">has fur → mammal (R1)</text>
    <rect x="310" y="467" width="210" height="18" fill="#fff3e0" rx="3" stroke="#ff9800"/>
    <text x="415" y="480" font-size="9" fill="#ff9800" text-anchor="middle">mammal + eats meat → carnivore (R4)</text>
    <rect x="530" y="467" width="180" height="18" fill="#388e3c" rx="3"/>
    <text x="620" y="480" font-size="9" fill="#ffffff" text-anchor="middle">carnivore + spots → cheetah!</text>
  </g>
  
  <g class="step" id="step5" data-narration="Conflict resolution strategies decide which rule to fire when multiple match: priority based, most specific rule, or most recent fact first.">
    <rect x="50" y="498" width="700" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="1"/>
    <text x="60" y="523" font-size="16" fill="#9c27b0" font-weight="bold">Step 6: Conflict Resolution Strategies</text>
    <text x="60" y="545" font-size="11" fill="#666">When multiple rules match, select one using:</text>
    <rect x="60" y="555" width="190" height="18" fill="#9c27b0" rx="4"/>
    <text x="155" y="568" font-size="11" fill="#ffffff" text-anchor="middle">Priority Based</text>
    <rect x="260" y="555" width="190" height="18" fill="#9c27b0" rx="4"/>
    <text x="355" y="568" font-size="11" fill="#ffffff" text-anchor="middle">Most Specific Rule</text>
    <rect x="460" y="555" width="190" height="18" fill="#9c27b0" rx="4"/>
    <text x="555" y="568" font-size="11" fill="#ffffff" text-anchor="middle">Most Recent Fact</text>
  </g>
</svg>