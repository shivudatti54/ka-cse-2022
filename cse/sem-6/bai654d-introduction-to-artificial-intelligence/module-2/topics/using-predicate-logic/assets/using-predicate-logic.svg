<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g id="step0" class="step" data-narration="Predicate Logic formalizes knowledge representation using objects, properties, and quantifiers. It extends propositional logic to enable AI systems to reason about the world with precision.">
    <rect x="150" y="10" width="500" height="40" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="36" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1976d2" text-anchor="middle">Predicate Logic for AI</text>
  </g>

  <!-- Step 1: Basic Components -->
  <g id="step1" class="step" data-narration="Constants name specific entities in the domain, like John or Paris. Variables are placeholders that can represent any element. Functions map objects to objects, while predicates express relationships between entities in the world.">
    <rect x="50" y="58" width="700" height="85" rx="8" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
    <text x="60" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2">Basic Components</text>
    
    <g transform="translate(70, 85)">
      <rect x="0" y="0" width="140" height="50" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
      <text x="70" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1976d2" text-anchor="middle">Constants</text>
      <text x="70" y="38" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">John, Paris, 5</text>
    </g>
    
    <g transform="translate(230, 85)">
      <rect x="0" y="0" width="140" height="50" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
      <text x="70" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#388e3c" text-anchor="middle">Variables</text>
      <text x="70" y="38" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">x, y, z</text>
    </g>
    
    <g transform="translate(390, 85)">
      <rect x="0" y="0" width="140" height="50" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="70" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ff9800" text-anchor="middle">Functions</text>
      <text x="70" y="38" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">fatherOf(x)</text>
    </g>
    
    <g transform="translate(550, 85)">
      <rect x="0" y="0" width="140" height="50" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
      <text x="70" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9c27b0" text-anchor="middle">Predicates</text>
      <text x="70" y="38" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Likes(x, y)</text>
    </g>
  </g>

  <!-- Step 2: Quantifiers -->
  <g id="step2" class="step" data-narration="The Universal Quantifier states that a property holds for all elements in the domain. The Existential Quantifier states that a property holds for at least one element in the domain, representing partial knowledge about existence.">
    <rect x="50" y="151" width="700" height="100" rx="8" fill="#ffffff" stroke="#ce93d8" stroke-width="1"/>
    <text x="60" y="168" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9c27b0">Quantifiers</text>
    
    <g transform="translate(100, 180)">
      <circle cx="25" cy="25" r="20" fill="#f3e5f5" stroke="#9c27b0"/>
      <text x="25" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#9c27b0" text-anchor="middle">∀</text>
      <rect x="55" y="5" width="180" height="50" rx="4" fill="#f3e5f5"/>
      <text x="145" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9c27b0" text-anchor="middle">Universal (∀x)</text>
      <text x="145" y="40" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Human(x) → Mortal(x)</text>
    </g>
    
    <g transform="translate(420, 180)">
      <circle cx="25" cy="25" r="20" fill="#e8f5e9" stroke="#388e3c"/>
      <text x="25" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#388e3c" text-anchor="middle">∃</text>
      <rect x="55" y="5" width="180" height="50" rx="4" fill="#e8f5e9"/>
      <text x="145" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#388e3c" text-anchor="middle">Existential (∃x)</text>
      <text x="145" y="40" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Human(x) ∧ Wise(x)</text>
    </g>
  </g>

  <!-- Step 3: Nested Quantifiers -->
  <g id="step3" class="step" data-narration="Order matters critically in nested quantifiers. The statement 'everyone loves someone' means each person has someone they love uniquely. The statement 'someone loves everyone' means one particular person loves everybody.">
    <rect x="50" y="259" width="700" height="100" rx="8" fill="#ffffff" stroke="#ffcc80" stroke-width="1"/>
    <text x="60" y="276" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef6c00">Nested Quantifiers: Order Matters</text>
    
    <g transform="translate(80, 290)">
      <rect x="0" y="0" width="280" height="60" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="140" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">∀x ∃y Loves(x, y)</text>
      <text x="140" y="42" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Everyone loves someone</text>
      <text x="140" y="54" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">(Each x has unique y)</text>
    </g>
    
    <text x="380" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">≠</text>

    <g transform="translate(420, 290)">
      <rect x="0" y="0" width="280" height="60" rx="4" fill="#fff8e1" stroke="#fbc02d"/>
      <text x="140" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f57f17" text-anchor="middle">∃x ∀y Loves(x, y)</text>
      <text x="140" y="42" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Someone loves everyone</text>
      <text x="140" y="54" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">(Same x loves all y)</text>
    </g>
  </g>

  <!-- Step 4: Knowledge Representation -->
  <g id="step4" class="step" data-narration="Knowledge in predicate logic is structured as facts and rules working together. Facts state atomic truths like Student(John). Rules use implications to derive new facts from known information, enabling automated logical inference.">
    <rect x="50" y="367" width="700" height="100" rx="8" fill="#ffffff" stroke="#90caf9" stroke-width="1"/>
    <text x="60" y="384" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">Knowledge Representation</text>
    
    <g transform="translate(100, 400)">
      <rect x="0" y="0" width="160" height="58" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
      <text x="80" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1976d2" text-anchor="middle">Fact</text>
      <text x="80" y="38" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Student(John)</text>
      <text x="80" y="50" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Atomic statement</text>
    </g>

    <line x1="260" y1="429" x2="290" y2="429" stroke="#333" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <g transform="translate(300, 400)">
      <rect x="0" y="0" width="200" height="58" rx="4" fill="#fff3e0" stroke="#ff9800"/>
      <text x="100" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100" text-anchor="middle">Rule (Implication)</text>
      <text x="100" y="38" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Student(x) → Access(x, Lib)</text>
      <text x="100" y="50" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">IF-THEN structure</text>
    </g>

    <line x1="500" y1="429" x2="530" y2="429" stroke="#333" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <g transform="translate(540, 400)">
      <rect x="0" y="0" width="150" height="58" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
      <text x="75" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">Derived Fact</text>
      <text x="75" y="38" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Access(John, Lib)</text>
      <text x="75" y="50" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">New knowledge</text>
    </g>
  </g>

  <!-- Step 5: Summary -->
  <g id="step5" class="step" data-narration="Predicate logic offers high expressiveness and precise formal semantics for AI reasoning systems. However it is computationally semi-decidable and cannot handle uncertainty, which limits its usefulness in real-world applications with incomplete information.">
    <rect x="50" y="475" width="700" height="110" rx="8" fill="#ffffff" stroke="#bdbdbd" stroke-width="1"/>
    <text x="60" y="492" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#555">Logic Characteristics</text>
    
    <g transform="translate(70, 505)">
      <rect x="0" y="0" width="300" height="72" rx="4" fill="#e8f5e9" stroke="#388e3c"/>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Advantages</text>
      <text x="150" y="40" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">High expressiveness</text>
      <text x="150" y="54" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Precise semantics</text>
      <text x="150" y="66" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Automated reasoning</text>
    </g>
    
    <g transform="translate(390, 505)">
      <rect x="0" y="0" width="300" height="72" rx="4" fill="#ffebee" stroke="#f44336"/>
      <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c62828" text-anchor="middle">Limitations</text>
      <text x="150" y="40" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Semi-decidable</text>
      <text x="150" y="54" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">No uncertainty handling</text>
      <text x="150" y="66" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Computationally expensive</text>
    </g>
  </g>
</svg>