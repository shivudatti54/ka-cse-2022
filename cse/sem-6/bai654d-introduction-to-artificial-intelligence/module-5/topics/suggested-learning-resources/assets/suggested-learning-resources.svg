<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to Module 5 on Suggested Learning Resources. This module helps you find the best materials to master advanced AI topics like Deep Learning and Reinforcement Learning beyond your classroom notes.">
    <rect x="150" y="65" width="500" height="65" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">Why Use Multiple Learning Resources?</text>
    <text x="400" y="112" text-anchor="middle" font-size="11" fill="#1565c0">AI moves fast—lecture notes aren't enough. You need textbooks, courses, and hands-on practice.</text>
  </g>

  <g class="step" id="step1" data-narration="Textbooks provide deep theoretical knowledge. AIMA covers all AI topics comprehensively, while the Deep Learning book by Goodfellow gives rigorous math for neural networks.">
    <rect x="50" y="145" width="330" height="84" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="70" y="162" text-anchor="start" font-size="12" font-weight="bold" fill="#388e3c">Textbooks</text>
    <line x1="70" y1="170" x2="120" y2="170" stroke="#388e3c" stroke-width="2"/>
    <text x="215" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Artificial Intelligence: A Modern Approach</text>
    <text x="215" y="208" text-anchor="middle" font-size="10" fill="#1b5e20">By Russell &amp; Norvig - The complete AI textbook</text>
    <text x="215" y="222" text-anchor="middle" font-size="9" fill="#388e3c">Covers search, ML, NLP, robotics</text>
    
    <rect x="400" y="145" width="330" height="84" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="565" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Deep Learning</text>
    <text x="565" y="208" text-anchor="middle" font-size="10" fill="#1b5e20">By Goodfellow, Bengio &amp; Courville</text>
    <text x="565" y="222" text-anchor="middle" font-size="9" fill="#388e3c">Essential for neural networks and CNNs</text>
  </g>

  <g class="step" id="step2" data-narration="Online courses offer structured visual learning. Andrew Ng's Coursera builds intuition for ML algorithms, while fast.ai teaches practical deep learning through hands-on coding first.">
    <rect x="50" y="237" width="330" height="84" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="70" y="254" text-anchor="start" font-size="12" font-weight="bold" fill="#ff9800">Online Courses</text>
    <line x1="70" y1="262" x2="135" y2="262" stroke="#ff9800" stroke-width="2"/>
    <text x="215" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Coursera: Machine Learning</text>
    <text x="215" y="300" text-anchor="middle" font-size="10" fill="#bf360c">By Andrew Ng - Legendary introductory course</text>
    <text x="215" y="314" text-anchor="middle" font-size="9" fill="#ff9800">Builds intuition with visual explanations</text>
    
    <rect x="400" y="237" width="330" height="84" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="565" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">fast.ai: Practical Deep Learning</text>
    <text x="565" y="300" text-anchor="middle" font-size="10" fill="#bf360c">Code-first approach for engineers</text>
    <text x="565" y="314" text-anchor="middle" font-size="9" fill="#ff9800">Learn to build models, then theory</text>
  </g>

  <g class="step" id="step3" data-narration="Practical tools bring theory to life. Use Python with NumPy and Scikit-learn for ML, TensorFlow or PyTorch for deep learning, and Google Colab for free GPU access.">
    <rect x="50" y="329" width="240" height="84" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="70" y="346" text-anchor="start" font-size="12" font-weight="bold" fill="#9c27b0">Practical Tools</text>
    <line x1="70" y1="354" x2="130" y2="354" stroke="#9c27b0" stroke-width="2"/>
    <text x="170" y="376" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Python Libraries</text>
    <text x="170" y="392" text-anchor="middle" font-size="10" fill="#4a148c">NumPy, Pandas, Scikit-learn</text>
    <text x="170" y="406" text-anchor="middle" font-size="9" fill="#9c27b0">Data handling &amp; traditional ML</text>
    
    <rect x="305" y="329" width="220" height="84" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="415" y="376" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Deep Learning Frameworks</text>
    <text x="415" y="392" text-anchor="middle" font-size="10" fill="#4a148c">TensorFlow &amp; PyTorch</text>
    <text x="415" y="406" text-anchor="middle" font-size="9" fill="#9c27b0">Build and train neural networks</text>
    
    <rect x="540" y="329" width="190" height="84" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="635" y="376" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">Google Colab</text>
    <text x="635" y="392" text-anchor="middle" font-size="10" fill="#4a148c">Free Jupyter notebook</text>
    <text x="635" y="406" text-anchor="middle" font-size="9" fill="#9c27b0">GPU access, no setup needed</text>
  </g>

  <g class="step" id="step4" data-narration="Blend theory with practice. Use textbooks for deep understanding, code in Python daily, and leverage community resources like Towards Data Science and Stack Overflow when stuck.">
    <rect x="50" y="421" width="175" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="137" y="443" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Blend Theory</text>
    <text x="137" y="461" text-anchor="middle" font-size="9" fill="#b71c1c">Textbooks + Courses</text>
    <text x="137" y="476" text-anchor="middle" font-size="8" fill="#f44336">Build strong foundation</text>
    
    <rect x="240" y="421" width="175" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="327" y="443" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Learn by Doing</text>
    <text x="327" y="461" text-anchor="middle" font-size="9" fill="#b71c1c">Code every algorithm</text>
    <text x="327" y="476" text-anchor="middle" font-size="8" fill="#f44336">Use Colab for practice</text>
    
    <rect x="430" y="421" width="175" height="85" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="517" y="443" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Use Community</text>
    <text x="517" y="461" text-anchor="middle" font-size="9" fill="#b71c1c">Stack Overflow</text>
    <text x="517" y="476" text-anchor="middle" font-size="8" fill="#f44336">Towards Data Science</text>
    
    <rect x="620" y="421" width="130" height="85" rx="8" fill="#c62828"/>
    <text x="685" y="453" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Stay Updated</text>
    <text x="685" y="473" text-anchor="middle" font-size="9" fill="white">Follow researchers</text>
  </g>

  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Suggested Learning Resources</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#616161">Module 5: Introduction to Artificial Intelligence</text>
</svg>