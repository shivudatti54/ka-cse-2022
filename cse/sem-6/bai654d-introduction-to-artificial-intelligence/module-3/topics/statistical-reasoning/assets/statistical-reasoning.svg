<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3f51b5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Module 3: Statistical Reasoning in AI</text>

  <g id="step0" class="step" data-narration="Statistical reasoning provides AI with powerful mathematical tools to handle uncertainty, make accurate predictions, and learn meaningful patterns from raw data using probability theory.">
    <rect x="50" y="10" width="700" height="40" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="400" y="35" text-anchor="middle" font-size="11" fill="#2e7d32">Framework for AI to reason probabilistically under uncertainty</text>
  </g>

  <g id="step1" class="step" data-narration="Probability theory is the mathematical foundation with Sum Rule and Product Rule for calculating joint, marginal, and conditional probabilities in AI systems.">
    <rect x="50" y="58" width="330" height="78" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="215" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1976d2">Probability Theory Basics</text>
    <text x="215" y="96" text-anchor="middle" font-size="10" fill="#1565c0">Sum Rule: P(A) = Σ P(A, B_i)</text>
    <text x="215" y="110" text-anchor="middle" font-size="10" fill="#1565c0">Product Rule: P(A,B) = P(A|B) × P(B)</text>
    <text x="215" y="126" text-anchor="middle" font-size="9" fill="#616161">Foundation for all statistical reasoning</text>

    <rect x="390" y="58" width="360" height="78" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="570" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c">Why It Matters for AI</text>
    <text x="570" y="96" text-anchor="middle" font-size="10" fill="#2e7d32">Handles sensor noise, incomplete data,</text>
    <text x="570" y="110" text-anchor="middle" font-size="10" fill="#2e7d32">and unpredictable environments</text>
    <text x="570" y="126" text-anchor="middle" font-size="9" fill="#616161">Enables probabilistic decision-making</text>
  </g>

  <g id="step2" class="step" data-narration="Bayes' Theorem mathematically updates beliefs by incorporating new evidence, calculating the posterior as likelihood multiplied by prior divided by evidence probability.">
    <rect x="50" y="146" width="700" height="78" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800">Bayes' Theorem</text>
    <text x="400" y="188" text-anchor="middle" font-size="12" fill="#e65100">P(H|E) = [P(E|H) × P(H)] / P(E)</text>
    <text x="400" y="204" text-anchor="middle" font-size="10" fill="#616161">Posterior = (Likelihood × Prior) / Evidence</text>
    <text x="400" y="218" text-anchor="middle" font-size="9" fill="#7b1fa2">Core engine for updating beliefs with new data</text>
  </g>

  <g id="step3" class="step" data-narration="In medical diagnosis, a 99% accurate test on a rare 1% disease yields only 50% probability after a positive result due to prior prevalence.">
    <rect x="50" y="234" width="700" height="78" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336">Medical Diagnosis Example</text>
    <text x="180" y="278" text-anchor="middle" font-size="10" fill="#c62828">Disease: 1% of population</text>
    <text x="400" y="278" text-anchor="middle" font-size="10" fill="#c62828">Test: 99% accurate</text>
    <text x="620" y="278" text-anchor="middle" font-size="10" fill="#c62828">Result: P(Disease|+) ≈ 50%</text>
    <text x="400" y="298" text-anchor="middle" font-size="9" fill="#616161">Counter-intuitive! Prior probability (1%) significantly impacts posterior despite high test accuracy.</text>
  </g>

  <g id="step4" class="step" data-narration="Bayesian Networks are powerful graphical models that represent complex probabilistic relationships using directed acyclic graphs with nodes as random variables and edges as conditional dependencies.">
    <rect x="50" y="322" width="240" height="78" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="170" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="#9c27b0">Bayesian Networks</text>
    <text x="170" y="362" text-anchor="middle" font-size="9" fill="#7b1fa2">Nodes: Random Variables</text>
    <text x="170" y="376" text-anchor="middle" font-size="9" fill="#7b1fa2">Edges: Conditional Dependencies</text>
    <text x="170" y="390" text-anchor="middle" font-size="9" fill="#7b1fa2">CPTs: Probability Tables</text>

    <rect x="300" y="322" width="220" height="78" rx="8" fill="#e1f5fe" stroke="#0288d1" stroke-width="2"/>
    <text x="410" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="#0288d1">Example: Wet Grass</text>
    <text x="410" y="362" text-anchor="middle" font-size="9" fill="#01579b">Rain ───────┐</text>
    <text x="410" y="376" text-anchor="middle" font-size="9" fill="#01579b">Sprinkler ──┼──→ Wet Grass</text>
    <text x="410" y="390" text-anchor="middle" font-size="9" fill="#01579b">CPT: P(Wet|Rain,Sprinkler)</text>

    <rect x="530" y="322" width="220" height="78" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="640" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="#388e3c">Key Terms</text>
    <text x="640" y="362" text-anchor="middle" font-size="9" fill="#2e7d32">Posterior: Updated belief</text>
    <text x="640" y="376" text-anchor="middle" font-size="9" fill="#2e7d32">Likelihood: P(Evidence|Hypothesis)</text>
    <text x="640" y="390" text-anchor="middle" font-size="9" fill="#2e7d32">Prior: Initial belief</text>
  </g>

  <g id="step5" class="step" data-narration="The Expectation-Maximization Algorithm finds maximum likelihood estimates for models with incomplete data by iteratively alternating between E-step and M-step to optimize parameters.">
    <rect x="50" y="410" width="700" height="78" rx="8" fill="#e0f2f1" stroke="#00695c" stroke-width="2"/>
    <text x="400" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695c">Expectation-Maximization (EM) Algorithm</text>
    <rect x="90" y="448" width="260" height="32" rx="5" fill="#b2dfdb" stroke="#00695c" stroke-width="1"/>
    <text x="220" y="466" text-anchor="middle" font-size="10" fill="#004d40">E-step: Estimate missing data given current parameters</text>
    <rect x="360" y="448" width="260" height="32" rx="5" fill="#b2dfdb" stroke="#00695c" stroke-width="1"/>
    <text x="490" y="466" text-anchor="middle" font-size="10" fill="#004d40">M-step: Re-estimate parameters to maximize likelihood</text>
    <text x="400" y="482" text-anchor="middle" font-size="9" fill="#616161">Used in Gaussian Mixture Models and unsupervised learning</text>
  </g>

  <g id="step6" class="step" data-narration="Statistical reasoning powers real-world AI applications including spam filtering, medical diagnosis, recommendation systems, and autonomous vehicles, forming the essential foundation for machine learning.">
    <rect x="50" y="498" width="330" height="82" rx="8" fill="#fffde7" stroke="#fbc02d" stroke-width="2"/>
    <text x="215" y="520" text-anchor="middle" font-size="11" font-weight="bold" fill="#f57f17">Real-World Applications</text>
    <text x="215" y="540" text-anchor="middle" font-size="9" fill="#f57f17">Spam Filtering, Medical Diagnosis,</text>
    <text x="215" y="554" text-anchor="middle" font-size="9" fill="#f57f17">Recommendation Systems,</text>
    <text x="215" y="568" text-anchor="middle" font-size="9" fill="#f57f17">Autonomous Vehicles</text>

    <rect x="390" y="498" width="360" height="82" rx="8" fill="#eceff1" stroke="#546e7a" stroke-width="2"/>
    <text x="570" y="520" text-anchor="middle" font-size="11" font-weight="bold" fill="#546e7a">Connection to Machine Learning</text>
    <text x="570" y="540" text-anchor="middle" font-size="9" fill="#546e7a">Foundation for Naive Bayes classifiers,</text>
    <text x="570" y="554" text-anchor="middle" font-size="9" fill="#546e7a">probabilistic models, and sensor fusion</text>
    <text x="570" y="570" text-anchor="middle" font-size="9" fill="#1a237e">Key for handling uncertainty in AI systems</text>
  </g>
</svg>