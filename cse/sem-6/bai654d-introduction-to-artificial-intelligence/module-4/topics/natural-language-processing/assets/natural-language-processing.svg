<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a237e">Natural Language Processing (NLP) Basics</text>

  <g class="step" id="step0" data-narration="NLP enables computers to understand, interpret, and generate human language by processing text through various techniques like tokenization, parsing, and machine learning algorithms.">
    <rect x="0" y="0" width="800" height="45" fill="transparent"/>
  </g>

  <g class="step" id="step1" data-narration="NLP helps computers understand human language despite its ambiguity, like the word 'bank' meaning a financial institution or the side of a river, depending on context usage.">
    <rect x="200" y="55" width="400" height="85" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2">What is NLP?</text>
    <text x="400" y="92" text-anchor="middle" font-size="10" fill="#1976d2">Enabling computers to understand human language</text>
    <rect x="50" y="105" width="700" height="30" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="400" y="123" text-anchor="middle" font-size="10" fill="#f44336">Challenge: Language ambiguity - "bank" means financial or river side</text>
  </g>

  <g class="step" id="step2" data-narration="The NLP pipeline transforms raw text through tokenization, stop word removal, stemming or lemmatization, and POS tagging to prepare data for analysis.">
    <text x="50" y="150" text-anchor="start" font-size="12" font-weight="bold" fill="#455a64">The NLP Pipeline</text>
    <rect x="50" y="162" width="700" height="50" rx="6" fill="#ffffff" stroke="#455a64" stroke-width="1"/>
    <rect x="60" y="168" width="90" height="35" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="105" y="186" text-anchor="middle" font-size="9" fill="#ff9800">Raw Text</text>
    <line x1="150" y1="185" x2="170" y2="185" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="175" y="168" width="90" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="220" y="186" text-anchor="middle" font-size="9" fill="#388e3c">Tokenization</text>
    <line x1="265" y1="185" x2="285" y2="185" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="290" y="168" width="90" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="335" y="186" text-anchor="middle" font-size="9" fill="#1976d2">Stop Words</text>
    <line x1="380" y1="185" x2="400" y2="185" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="405" y="168" width="90" height="35" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="450" y="186" text-anchor="middle" font-size="9" fill="#9c27b0">Stem/Lemmat</text>
    <line x1="495" y1="185" x2="515" y2="185" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="520" y="168" width="90" height="35" rx="5" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1.5"/>
    <text x="565" y="186" text-anchor="middle" font-size="9" fill="#3f51b5">POS Tagging</text>
    <line x1="610" y1="185" x2="630" y2="185" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <rect x="635" y="168" width="60" height="35" rx="5" fill="#eceff1" stroke="#455a64" stroke-width="1.5"/>
    <text x="665" y="186" text-anchor="middle" font-size="8" fill="#455a64">Output</text>
  </g>

  <g class="step" id="step3" data-narration="Tokenization splits text into words and punctuation. Stop word removal deletes common words like 'the' and 'is' to focus on meaningful content.">
    <text x="50" y="222" text-anchor="start" font-size="11" font-weight="bold" fill="#388e3c">Tokenization</text>
    <rect x="50" y="232" width="340" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="65" y="250" text-anchor="start" font-size="10" fill="#388e3c">Input: "I don't like NLP."</text>
    <text x="65" y="266" text-anchor="start" font-size="9" fill="#616161">Output: ['I','do',"n't",'like','NLP','.']</text>
    <text x="65" y="280" text-anchor="start" font-size="8" fill="#388e3c">Challenge: Handling contractions</text>
    
    <text x="410" y="222" text-anchor="start" font-size="11" font-weight="bold" fill="#1976d2">Stop Word Removal</text>
    <rect x="410" y="232" width="340" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="425" y="250" text-anchor="start" font-size="10" fill="#1976d2">Input: "The quick brown fox"</text>
    <text x="425" y="266" text-anchor="start" font-size="9" fill="#616161">Output: "quick brown fox"</text>
    <text x="425" y="280" text-anchor="start" font-size="8" fill="#1976d2">Removed: "The"</text>
  </g>

  <g class="step" id="step4" data-narration="Stemming chops word endings crudely using heuristics like jumps→jump, while lemmatization finds proper dictionary forms using vocabulary analysis like was→be and better→good.">
    <text x="50" y="300" text-anchor="start" font-size="12" font-weight="bold" fill="#9c27b0">Stemming vs Lemmatization</text>
    <rect x="50" y="312" width="345" height="65" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="65" y="330" text-anchor="start" font-size="10" font-weight="bold" fill="#9c27b0">Stemming (Fast, Heuristic)</text>
    <text x="65" y="345" text-anchor="start" font-size="9" fill="#616161">"jumps","jumping" → jump</text>
    <text x="65" y="359" text-anchor="start" font-size="9" fill="#616161">"running","ran" → run</text>
    <text x="65" y="371" text-anchor="start" font-size="8" fill="#9c27b0">May produce non-real words</text>
    
    <rect x="405" y="312" width="345" height="65" rx="6" fill="#e1bee7" stroke="#7b1fa2" stroke-width="2"/>
    <text x="420" y="330" text-anchor="start" font-size="10" font-weight="bold" fill="#7b1fa2">Lemmatization (Slower, Dictionary)</text>
    <text x="420" y="345" text-anchor="start" font-size="9" fill="#616161">"was" → be | "better" → good</text>
    <text x="420" y="359" text-anchor="start" font-size="9" fill="#616161">"children" → child</text>
    <text x="420" y="371" text-anchor="start" font-size="8" fill="#7b1fa2">Always produces real words</text>
  </g>

  <g class="step" id="step5" data-narration="POS tagging assigns grammatical categories like noun, verb, adjective to each word. Parsing then creates a tree structure showing grammatical relationships between words.">
    <text x="50" y="392" text-anchor="start" font-size="11" font-weight="bold" fill="#3f51b5">POS Tagging</text>
    <rect x="50" y="402" width="345" height="50" rx="6" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
    <text x="65" y="420" text-anchor="start" font-size="10" fill="#3f51b5">"The/DT quick/JJ brown/NN fox/NN jumps/VBZ"</text>
    <text x="65" y="436" text-anchor="start" font-size="9" fill="#616161">DT=Det, JJ=Adj, NN=Noun, VBZ=Verb</text>
    
    <text x="410" y="392" text-anchor="start" font-size="11" font-weight="bold" fill="#ff9800">Syntactic Analysis</text>
    <rect x="410" y="402" width="345" height="50" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="425" y="420" text-anchor="start" font-size="10" fill="#ff9800">Creates parse tree showing word relationships</text>
    <text x="425" y="436" text-anchor="start" font-size="9" fill="#616161">S → NP VP | NP → DT NN | VP → V PP</text>
  </g>

  <g class="step" id="step6" data-narration="Semantic analysis extracts meaning through word sense disambiguation for ambiguous words like 'bank', and named entity recognition identifies persons, places, and organizations in text.">
    <text x="50" y="467" text-anchor="start" font-size="11" font-weight="bold" fill="#f44336">Semantic Analysis</text>
    <rect x="50" y="477" width="220" height="55" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="65" y="495" text-anchor="start" font-size="9" font-weight="bold" fill="#f44336">Word Sense Disambiguation</text>
    <text x="65" y="510" text-anchor="start" font-size="8" fill="#616161">"bank" = financial or river?</text>
    <text x="65" y="524" text-anchor="start" font-size="8" fill="#616161">Depends on context</text>
    
    <rect x="280" y="477" width="220" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="295" y="495" text-anchor="start" font-size="9" font-weight="bold" fill="#388e3c">Named Entity Recognition</text>
    <text x="295" y="510" text-anchor="start" font-size="8" fill="#616161">"Barack Obama" = PERSON</text>
    <text x="295" y="524" text-anchor="start" font-size="8" fill="#616161">"Hawaii" = LOCATION</text>
    
    <rect x="510" y="477" width="240" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="525" y="495" text-anchor="start" font-size="9" font-weight="bold" fill="#ff9800">NLP Applications</text>
    <text x="525" y="510" text-anchor="start" font-size="8" fill="#616161">Sentiment Analysis, Translation,</text>
    <text x="525" y="524" text-anchor="start" font-size="8" fill="#616161">Chatbots, Text Summarization</text>
  </g>
</svg>