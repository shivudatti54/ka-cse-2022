<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g id="step0" class="step" data-narration="Game Playing in AI uses algorithms to make optimal decisions in games like chess and Go, representing game states as trees and finding the best moves.">
    <rect x="30" y="10" width="740" height="40" fill="#1976d2" rx="6"/>
    <text x="400" y="36" font-size="20" fill="white" font-weight="bold" text-anchor="middle">Game Playing in Artificial Intelligence</text>
  </g>
  
  <g id="step1" class="step" data-narration="A game tree represents all possible game states as nodes and legal moves as edges connecting them, starting from the root node at the initial position.">
    <rect x="40" y="58" width="720" height="93" fill="#e3f2fd" rx="8"/>
    <text x="60" y="80" font-size="14" fill="#1976d2" font-weight="bold">Game Tree Structure</text>
    <circle cx="130" cy="108" r="22" fill="#1976d2"/>
    <text x="122" y="113" font-size="12" fill="white">Start</text>
    <line x1="152" y1="108" x2="240" y2="88" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="152" y1="108" x2="240" y2="108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="152" y1="108" x2="240" y2="128" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <circle cx="260" cy="88" r="18" fill="#388e3c"/>
    <circle cx="260" cy="108" r="18" fill="#388e3c"/>
    <circle cx="260" cy="128" r="18" fill="#388e3c"/>
    <text x="285" y="92" font-size="10" fill="#388e3c">A</text>
    <text x="285" y="112" font-size="10" fill="#388e3c">B</text>
    <text x="285" y="132" font-size="10" fill="#388e3c">C</text>
    <text x="420" y="88" font-size="11" fill="#666">Terminal States</text>
    <text x="420" y="102" font-size="11" fill="#666">(Win/Lose/Draw)</text>
    <text x="420" y="116" font-size="11" fill="#666">Values: +1, 0, -1</text>
    <text x="620" y="108" font-size="11" fill="#1976d2">All possible moves</text>
    <text x="620" y="122" font-size="11" fill="#1976d2">from initial state</text>
  </g>
  
  <g id="step2" class="step" data-narration="Games are classified by information (perfect like chess versus imperfect like poker), by chance (deterministic versus stochastic), and by outcomes (zero-sum versus non-zero-sum).">
    <rect x="40" y="160" width="720" height="77" fill="#e8f5e9" rx="8"/>
    <text x="60" y="182" font-size="14" fill="#388e3c" font-weight="bold">Game Classifications</text>
    <rect x="60" y="196" width="220" height="32" fill="#c8e6c9" rx="4"/>
    <text x="70" y="212" font-size="11" fill="#2e7d32">Information:</text>
    <text x="145" y="212" font-size="10" fill="#666">Perfect vs Imperfect</text>
    <rect x="290" y="196" width="220" height="32" fill="#c8e6c9" rx="4"/>
    <text x="300" y="212" font-size="11" fill="#2e7d32">Chance:</text>
    <text x="360" y="212" font-size="10" fill="#666">Deterministic vs Stochastic</text>
    <rect x="520" y="196" width="220" height="32" fill="#c8e6c9" rx="4"/>
    <text x="530" y="212" font-size="11" fill="#2e7d32">Outcomes:</text>
    <text x="600" y="212" font-size="10" fill="#666">Zero-sum vs Non-zero</text>
  </g>
  
  <g id="step3" class="step" data-narration="The minimax algorithm explores the game tree by alternating between maximizing and minimizing player turns, propagating values from terminal nodes up to the root.">
    <rect x="40" y="248" width="720" height="93" fill="#f3e5f5" rx="8"/>
    <text x="60" y="270" font-size="14" fill="#9c27b0" font-weight="bold">Minimax Algorithm</text>
    <circle cx="120" cy="294" r="26" fill="#9c27b0"/>
    <text x="108" y="299" font-size="12" fill="white">MAX</text>
    <line x1="146" y1="294" x2="220" y2="274" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="146" y1="294" x2="220" y2="314" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <circle cx="240" cy="274" r="22" fill="#388e3c"/>
    <circle cx="240" cy="314" r="22" fill="#388e3c"/>
    <text x="225" y="259" font-size="10" fill="#388e3c">MIN</text>
    <text x="225" y="329" font-size="10" fill="#388e3c">MIN</text>
    <line x1="262" y1="274" x2="320" y2="264" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="262" y1="274" x2="320" y2="284" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <circle cx="340" cy="264" r="14" fill="#ff9800"/>
    <circle cx="340" cy="284" r="14" fill="#ff9800"/>
    <text x="332" y="244" font-size="9" fill="#ff9800">+1</text>
    <text x="332" y="264" font-size="9" fill="#ff9800">-1</text>
    <text x="430" y="282" font-size="10" fill="#666">min(1,-1) = -1</text>
    <text x="580" y="282" font-size="11" fill="#9c27b0" font-weight="bold">max(-1) = -1</text>
  </g>
  
  <g id="step4" class="step" data-narration="Alpha-beta pruning optimizes minimax by tracking alpha and beta bounds to prune branches where no better outcome is possible for the maximizing player.">
    <rect x="40" y="350" width="720" height="74" fill="#ffebee" rx="8"/>
    <text x="60" y="372" font-size="14" fill="#f44336" font-weight="bold">Alpha-Beta Pruning</text>
    <circle cx="120" cy="398" r="24" fill="#f44336"/>
    <text x="106" y="403" font-size="11" fill="white">MAX</text>
    <line x1="144" y1="398" x2="200" y2="380" stroke="#f44336" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <circle cx="220" cy="380" r="20" fill="#388e3c"/>
    <text x="212" y="385" font-size="10" fill="white">MIN</text>
    <line x1="240" y1="380" x2="280" y2="370" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <circle cx="295" cy="370" r="14" fill="#ff9800"/>
    <text x="290" y="375" font-size="10" fill="white">5</text>
    <line x1="309" y1="370" x2="340" y2="370" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <line x1="340" y1="370" x2="370" y2="370" stroke="#f44336" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="380" y="375" font-size="10" fill="#f44336" font-weight="bold">PRUNED</text>
    <text x="450" y="388" font-size="10" fill="#666">Prune when α ≥ β</text>
    <text x="600" y="388" font-size="11" fill="#f44336" font-weight="bold">Reduces nodes evaluated</text>
  </g>
  
  <g id="step5" class="step" data-narration="Monte Carlo Tree Search builds a search tree iteratively using random simulations to estimate node values and select optimal moves for the AI.">
    <rect x="40" y="434" width="720" height="70" fill="#e3f2fd" rx="8"/>
    <text x="60" y="456" font-size="14" fill="#1976d2" font-weight="bold">Monte Carlo Tree Search (MCTS)</text>
    <rect x="80" y="472" width="100" height="24" fill="#1976d2" rx="4"/>
    <text x="130" y="489" font-size="11" fill="white" text-anchor="middle">Selection</text>
    <line x1="180" y1="484" x2="210" y2="484" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="220" y="472" width="100" height="24" fill="#388e3c" rx="4"/>
    <text x="270" y="489" font-size="11" fill="white" text-anchor="middle">Expansion</text>
    <line x1="320" y1="484" x2="350" y2="484" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="360" y="472" width="100" height="24" fill="#ff9800" rx="4"/>
    <text x="410" y="489" font-size="11" fill="white" text-anchor="middle">Simulation</text>
    <line x1="460" y1="484" x2="490" y2="484" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <rect x="500" y="472" width="120" height="24" fill="#9c27b0" rx="4"/>
    <text x="560" y="489" font-size="11" fill="white" text-anchor="middle">Backpropagation</text>
  </g>
  
  <g id="step6" class="step" data-narration="Major milestones include Deep Blue (1997) for chess, AlphaGo (2016) for Go, AlphaGo Zero (2017), and OpenAI Five (2019) representing breakthrough advances in game-playing AI.">
    <rect x="40" y="514" width="720" height="74" fill="#fff3e0" rx="8"/>
    <text x="60" y="536" font-size="14" fill="#ff9800" font-weight="bold">Historical Milestones</text>
    <rect x="60" y="552" width="160" height="28" fill="#ffe0b2" rx="4"/>
    <text x="70" y="569" font-size="11" fill="#e65100">1997: Deep Blue</text>
    <text x="160" y="569" font-size="10" fill="#666">Chess</text>
    <rect x="230" y="552" width="160" height="28" fill="#ffe0b2" rx="4"/>
    <text x="240" y="569" font-size="11" fill="#e65100">2016: AlphaGo</text>
    <text x="330" y="569" font-size="10" fill="#666">Go</text>
    <rect x="400" y="552" width="160" height="28" fill="#ffe0b2" rx="4"/>
    <text x="410" y="569" font-size="11" fill="#e65100">2017: AlphaGo Zero</text>
    <text x="510" y="569" font-size="10" fill="#666">Self-play</text>
    <rect x="570" y="552" width="130" height="28" fill="#ffe0b2" rx="4"/>
    <text x="580" y="569" font-size="11" fill="#e65100">2019: OpenAI Five</text>
  </g>
</svg>