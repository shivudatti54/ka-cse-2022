<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" data-topic-id="and-search">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <defs>
    <linearGradient id="orGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA3F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="andGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E24A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F55B5B;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <g id="step0" class="step" data-narration="AND-OR search solves problems by decomposing them into subproblems. Unlike standard search finding one path, AND-OR requires all subparts to be solved.">
    <rect x="0" y="0" width="800" height="50" fill="none"/>
    <text x="400" y="32" font-size="20" font-weight="bold" text-anchor="middle" fill="#2C3E50">AND-OR Search and AND-OR Graphs</text>
  </g>

  <g id="step1" class="step" data-narration="OR nodes represent choices where only one path needs solving. AND nodes decompose problems requiring all subproblems to be solved together.">
    <rect x="50" y="58" width="700" height="80" rx="8" fill="white" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="78" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">OR Node (Choice) vs AND Node (Decomposition)</text>
    <rect x="80" y="92" width="120" height="35" rx="5" fill="url(#orGrad)" stroke="#2874A6" stroke-width="2"/>
    <text x="140" y="114" font-size="11" text-anchor="middle" fill="white" font-weight="bold">OR: Pick ONE</text>
    <rect x="340" y="92" width="120" height="35" rx="5" fill="url(#andGrad)" stroke="#C0392B" stroke-width="2"/>
    <text x="400" y="114" font-size="11" text-anchor="middle" fill="white" font-weight="bold">AND: Solve ALL</text>
    <text x="580" y="100" font-size="10" fill="#555">OR: h(n) = MIN child cost</text>
    <text x="580" y="118" font-size="10" fill="#555">AND: h(n) = SUM child costs</text>
  </g>

  <g id="step2" class="step" data-narration="Tower of Hanoi illustrates AND decomposition. Moving three disks requires three substeps that must all succeed: move two disks, move largest, move two disks again.">
    <rect x="50" y="146" width="700" height="80" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="166" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C3E50">Example: Tower of Hanoi (3 disks from A to C)</text>
    <circle cx="100" cy="200" r="20" fill="url(#orGrad)" stroke="#2874A6" stroke-width="2"/>
    <text x="100" y="204" font-size="9" text-anchor="middle" fill="white" font-weight="bold">Start</text>
    <rect x="180" y="188" width="50" height="24" rx="4" fill="url(#andGrad)" stroke="#C0392B" stroke-width="2"/>
    <text x="205" y="204" font-size="9" text-anchor="middle" fill="white">Move2</text>
    <rect x="240" y="188" width="50" height="24" rx="4" fill="#ffcdd2" stroke="#E74C3C" stroke-width="2"/>
    <text x="265" y="204" font-size="8" text-anchor="middle" fill="#922B21">Disk3</text>
    <rect x="300" y="188" width="50" height="24" rx="4" fill="url(#andGrad)" stroke="#C0392B" stroke-width="2"/>
    <text x="325" y="204" font-size="9" text-anchor="middle" fill="white">Move2</text>
    <line x1="120" y1="200" x2="180" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="230" y1="200" x2="240" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="290" y1="200" x2="300" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="450" y="200" font-size="10" fill="#555">All three subproblems</text>
    <text x="450" y="215" font-size="10" fill="#555">must succeed (AND node)</text>
    <text x="620" y="200" font-size="9" fill="#27AE60" font-weight="bold">Solved when ALL</text>
    <text x="620" y="213" font-size="9" fill="#27AE60" font-weight="bold">children solved</text>
  </g>

  <g id="step3" class="step" data-narration="A solution graph in AND-OR search is not a single path. It contains the start node, selects one option per OR node, and includes all branches from each AND node.">
    <rect x="50" y="234" width="700" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="254" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C3E50">Solution Graph Properties</text>
    <text x="120" y="278" font-size="10" fill="#333">1. Contains start node</text>
    <text x="120" y="295" font-size="10" fill="#333">2. OR: include ONE successor</text>
    <text x="300" y="278" font-size="10" fill="#333">3. AND: include ALL successors</text>
    <text x="300" y="295" font-size="10" fill="#333">4. Leaves are solved primitives</text>
    <rect x="480" y="268" width="250" height="35" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
    <text x="605" y="290" font-size="10" text-anchor="middle" fill="#2e7d32" font-weight="bold">Complete solution = solution tree</text>
  </g>

  <g id="step4" class="step" data-narration="The AO* algorithm computes costs differently: OR nodes take the minimum cost path, while AND nodes sum all costs since all subproblems must be solved.">
    <rect x="50" y="322" width="700" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="342" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C3E50">AO* Cost Computation</text>
    <rect x="80" y="358" width="280" height="35" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
    <text x="220" y="376" font-size="11" font-weight="bold" text-anchor="middle" fill="#0d47a1">OR Node: h(n) = MIN(cost + h(successor))</text>
    <rect x="380" y="358" width="280" height="35" rx="5" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
    <text x="520" y="376" font-size="11" font-weight="bold" text-anchor="middle" fill="#b71c1c">AND Node: h(n) = SUM(cost + h(successor))</text>
  </g>

  <g id="step5" class="step" data-narration="The AO* algorithm loops: initialize the graph, select the best non-terminal leaf, expand it, propagate costs backward, mark solved nodes, then repeat until solved.">
    <rect x="50" y="410" width="700" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="430" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C3E50">AO* Algorithm Steps</text>
    <text x="100" y="455" font-size="10" fill="#333">1. Initialize G with start node</text>
    <text x="100" y="475" font-size="10" fill="#333">2. Select best leaf node</text>
    <text x="280" y="455" font-size="10" fill="#333">3. Expand node, set h-values</text>
    <text x="280" y="475" font-size="10" fill="#333">4. Propagate costs backward</text>
    <text x="480" y="455" font-size="10" fill="#333">5. Mark SOLVED: OR when ANY</text>
    <text x="480" y="475" font-size="10" fill="#333">child solved, AND when ALL solved</text>
    <text x="680" y="465" font-size="10" fill="#7b1fa2" font-weight="bold">Repeat until start solved</text>
  </g>

  <g id="step6" class="step" data-narration="AND-OR search applies to theorem proving, game playing, and planning. Each domain requires all parts solved: every lemma, every opponent move, every subgoal.">
    <rect x="50" y="498" width="700" height="90" rx="8" fill="#e1f5fe" stroke="#0288d1" stroke-width="2"/>
    <text x="400" y="518" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C3E50">Applications of AND-OR Search</text>
    <rect x="80" y="532" width="200" height="45" rx="5" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="180" y="550" font-size="11" font-weight="bold" text-anchor="middle" fill="#155724">Theorem Proving</text>
    <text x="180" y="566" font-size="9" text-anchor="middle" fill="#155724">Lemmas (AND) + Methods (OR)</text>
    <rect x="300" y="532" width="200" height="45" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="400" y="550" font-size="11" font-weight="bold" text-anchor="middle" fill="#856404">Game Playing</text>
    <text x="400" y="566" font-size="9" text-anchor="middle" fill="#856404">MAX (OR) + MIN (AND) nodes</text>
    <rect x="520" y="532" width="200" height="45" rx="5" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
    <text x="620" y="550" font-size="11" font-weight="bold" text-anchor="middle" fill="#721c24">Planning</text>
    <text x="620" y="566" font-size="9" text-anchor="middle" fill="#721c24">Subgoals (AND) + Plans (OR)</text>
  </g>
</svg>