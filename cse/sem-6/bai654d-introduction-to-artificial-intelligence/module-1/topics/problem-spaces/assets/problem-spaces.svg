<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <g class="step" id="step0" data-narration="Problems and Problem Spaces form the fundamental foundation of AI problem-solving, defining how AI systems systematically approach and solve complex challenges.">
    <rect x="0" y="0" width="800" height="50" fill="white"/>
    <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Problems and Problem Spaces in AI</text>
  </g>

  <g class="step" id="step1" data-narration="Every AI problem needs four parts: where you start, where you want to go, what moves you can make, and how much each path costs.">
    <rect x="50" y="58" width="700" height="80" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <text x="400" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#424242">Four Components of Problem Formulation</text>
    <rect x="90" y="88" width="140" height="42" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="160" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">Initial State</text>
    <text x="160" y="118" text-anchor="middle" font-size="8" fill="#666">Starting point</text>
    
    <rect x="250" y="88" width="140" height="42" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="320" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c">Goal State</text>
    <text x="320" y="118" text-anchor="middle" font-size="8" fill="#666">Desired outcome</text>
    
    <rect x="410" y="88" width="150" height="42" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="485" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#ff9800">Actions/Operators</text>
    <text x="485" y="118" text-anchor="middle" font-size="8" fill="#666">Legal moves</text>
    
    <rect x="580" y="88" width="140" height="42" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="650" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0">Path Cost</text>
    <text x="650" y="118" text-anchor="middle" font-size="8" fill="#666">Cost of solution</text>
  </g>

  <g class="step" id="step2" data-narration="A problem space contains all states reachable from the start. Nodes are states, edges are actions. Finding a solution means navigating from start to goal.">
    <rect x="50" y="148" width="700" height="180" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <text x="400" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#424242">Problem Space (State Space Graph)</text>
    <circle cx="400" cy="195" r="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="199" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">S₀</text>
    <text x="400" y="180" text-anchor="middle" font-size="7" fill="#666">Initial</text>
    
    <line x1="390" y1="210" x2="320" y2="245" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="410" y1="210" x2="480" y2="245" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="315" y1="250" x2="260" y2="280" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="325" y1="250" x2="370" y2="280" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="475" y1="250" x2="430" y2="280" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <line x1="485" y1="250" x2="540" y2="280" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    
    <circle cx="260" cy="290" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="260" y="294" text-anchor="middle" font-size="7" fill="#ff9800">S₁</text>
    <circle cx="370" cy="290" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="370" y="294" text-anchor="middle" font-size="7" fill="#ff9800">S₂</text>
    <circle cx="430" cy="290" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="430" y="294" text-anchor="middle" font-size="7" fill="#ff9800">S₃</text>
    <circle cx="540" cy="290" r="14" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="540" y="294" text-anchor="middle" font-size="7" fill="#ff9800">S₄</text>
    
    <line x1="370" y1="290" x2="430" y2="290" stroke="#1976d2" stroke-width="1"/>
    <circle cx="400" cy="290" r="4" fill="#1976d2"/>
    
    <line x1="365" y1="303" x2="395" y2="295" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    <line x1="435" y1="303" x2="405" y2="295" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
    
    <circle cx="400" cy="305" r="18" fill="#e8f5e9" stroke="#388e3c" stroke-width="2.5"/>
    <text x="400" y="309" text-anchor="middle" font-size="8" font-weight="bold" fill="#388e3c">Goal</text>
  </g>

  <g class="step" id="step3" data-narration="In the Water Jug problem, states are pairs like (0,0) for empty jugs. Actions include fill, empty, and pour between jugs to reach the goal.">
    <rect x="50" y="336" width="700" height="115" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <text x="400" y="353" text-anchor="middle" font-size="11" font-weight="bold" fill="#424242">Example: Water Jug Problem</text>
    <text x="400" y="371" text-anchor="middle" font-size="9" fill="#333">Two jugs: 4L and 3L | Goal: Get exactly 2L in 4L jug</text>
    <text x="400" y="385" text-anchor="middle" font-size="8" fill="#666">Actions: Fill jug, Empty jug, Pour one jug to another</text>
    
    <circle cx="130" cy="413" r="18" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="130" y="409" text-anchor="middle" font-size="7" fill="#666">State</text>
    <text x="130" y="420" text-anchor="middle" font-size="8" font-weight="bold" fill="#1976d2">(0,0)</text>
    
    <line x1="150" y1="413" x2="190" y2="413" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="170" y="405" text-anchor="middle" font-size="6" fill="#666">Fill 4L</text>
    
    <circle cx="220" cy="413" r="18" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="220" y="409" text-anchor="middle" font-size="7" fill="#666">State</text>
    <text x="220" y="420" text-anchor="middle" font-size="8" font-weight="bold" fill="#ff9800">(4,0)</text>
    
    <line x1="240" y1="413" x2="280" y2="413" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="260" y="405" text-anchor="middle" font-size="6" fill="#666">Pour→3L</text>
    
    <circle cx="310" cy="413" r="18" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="310" y="409" text-anchor="middle" font-size="7" fill="#666">State</text>
    <text x="310" y="420" text-anchor="middle" font-size="8" font-weight="bold" fill="#ff9800">(1,3)</text>
    
    <line x1="330" y1="413" x2="370" y2="413" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="350" y="405" text-anchor="middle" font-size="6" fill="#666">Empty 3L</text>
    
    <circle cx="400" cy="413" r="18" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="400" y="409" text-anchor="middle" font-size="7" fill="#666">State</text>
    <text x="400" y="420" text-anchor="middle" font-size="8" font-weight="bold" fill="#ff9800">(1,0)</text>
    
    <line x1="420" y1="413" x2="460" y2="413" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="440" y="405" text-anchor="middle" font-size="6" fill="#666">Fill 3L</text>
    
    <circle cx="490" cy="413" r="18" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="490" y="409" text-anchor="middle" font-size="7" fill="#666">State</text>
    <text x="490" y="420" text-anchor="middle" font-size="8" font-weight="bold" fill="#ff9800">(1,3)</text>
    
    <line x1="510" y1="413" x2="550" y2="413" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="530" y="405" text-anchor="middle" font-size="6" fill="#666">Pour→4L</text>
    
    <circle cx="580" cy="413" r="18" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="580" y="409" text-anchor="middle" font-size="7" fill="#666">State</text>
    <text x="580" y="420" text-anchor="middle" font-size="8" font-weight="bold" fill="#388e3c">(2,3)</text>
    <text x="580" y="431" text-anchor="middle" font-size="6" fill="#388e3c">Goal!</text>
  </g>

  <g class="step" id="step4" data-narration="Toy problems like 8-Puzzle are simple with small state spaces for learning. Real-world problems like route planning have large spaces and complex constraints.">
    <rect x="50" y="459" width="700" height="75" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <text x="400" y="476" text-anchor="middle" font-size="11" font-weight="bold" fill="#424242">Toy Problems vs Real-World Problems</text>
    <rect x="80" y="489" width="300" height="38" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="230" y="504" text-anchor="middle" font-size="9" font-weight="bold" fill="#1976d2">Toy Problems</text>
    <text x="230" y="518" text-anchor="middle" font-size="7" fill="#666">8-Puzzle, Missionaries | Simple, small state space</text>
    
    <rect x="420" y="489" width="300" height="38" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="570" y="504" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff9800">Real-World Problems</text>
    <text x="570" y="518" text-anchor="middle" font-size="7" fill="#666">Route planning, Diagnosis | Complex, large state space</text>
  </g>

  <g class="step" id="step5" data-narration="Key problem characteristics include branching factor (successor states), solution depth (path length), and whether any solution or optimal solution is needed.">
    <rect x="50" y="542" width="700" height="50" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <text x="400" y="561" text-anchor="middle" font-size="10" font-weight="bold" fill="#424242">Problem Characteristics</text>
    <text x="150" y="579" text-anchor="middle" font-size="8" fill="#666">Branching Factor</text>
    <text x="310" y="579" text-anchor="middle" font-size="8" fill="#666">Solution Depth</text>
    <text x="490" y="579" text-anchor="middle" font-size="8" fill="#666">Path Cost</text>
    <text x="670" y="579" text-anchor="middle" font-size="8" fill="#666">Well-defined?</text>
  </g>

</svg>