<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="30" font-size="20" fill="#2563eb" font-family="Arial" text-anchor="middle" font-weight="bold">Language Processors</text>

  <g class="step" id="step0" data-narration="Introduction to Language Processors">
    <rect x="40" y="50" width="720" height="65" fill="#2563eb" rx="10" />
    <text x="400" y="75" font-size="18" fill="#ffffff" font-family="Arial" text-anchor="middle">Language Processors</text>
    <text x="400" y="100" font-size="14" fill="#ffffff" font-family="Arial" text-anchor="middle">Translation systems for programming languages</text>
  </g>

  <g class="step" id="step1" data-narration="High-Level Languages and Low-Level Languages">
    <rect x="40" y="125" width="345" height="65" fill="#10b981" rx="10" />
    <text x="212" y="150" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">High-Level Languages</text>
    <text x="212" y="175" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Human-readable code</text>
    <rect x="415" y="125" width="345" height="65" fill="#f59e0b" rx="10" />
    <text x="587" y="150" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Low-Level Languages</text>
    <text x="587" y="175" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Machine-readable code</text>
  </g>

  <g class="step" id="step2" data-narration="Role of Language Processors">
    <rect x="40" y="200" width="720" height="65" fill="#8b5cf6" rx="10" />
    <text x="400" y="225" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Role of Language Processors</text>
    <text x="400" y="250" font-size="13" fill="#ffffff" font-family="Arial" text-anchor="middle">Translate HLL code into machine code</text>
  </g>

  <g class="step" id="step3" data-narration="Types of Language Processors - Compilers">
    <rect x="40" y="275" width="345" height="65" fill="#10b981" rx="10" />
    <text x="212" y="300" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Compiler</text>
    <text x="212" y="325" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Translates entire program at once</text>
    <rect x="415" y="275" width="345" height="65" fill="#f59e0b" rx="10" />
    <text x="587" y="300" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Interpreter</text>
    <text x="587" y="325" font-size="12" fill="#ffffff" font-family="Arial" text-anchor="middle">Executes line by line</text>
  </g>

  <g class="step" id="step4" data-narration="Compiler Process">
    <rect x="40" y="350" width="720" height="65" fill="#2563eb" rx="10" />
    <text x="100" y="375" font-size="14" fill="#ffffff" font-family="Arial">Source Code</text>
    <line x1="190" y1="382" x2="260" y2="382" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
    <text x="320" y="375" font-size="14" fill="#ffffff" font-family="Arial">Compiler</text>
    <line x1="390" y1="382" x2="460" y2="382" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
    <text x="520" y="375" font-size="14" fill="#ffffff" font-family="Arial">Object Code</text>
    <text x="100" y="400" font-size="11" fill="#ffffff" font-family="Arial">High-level</text>
    <text x="530" y="400" font-size="11" fill="#ffffff" font-family="Arial">Executable</text>
  </g>

  <g class="step" id="step5" data-narration="Interpreter Process">
    <rect x="40" y="425" width="720" height="65" fill="#10b981" rx="10" />
    <text x="150" y="450" font-size="14" fill="#ffffff" font-family="Arial">Source Code</text>
    <line x1="250" y1="457" x2="340" y2="457" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
    <text x="400" y="450" font-size="14" fill="#ffffff" font-family="Arial">Interpreter</text>
    <line x1="490" y1="457" x2="580" y2="457" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
    <text x="640" y="450" font-size="14" fill="#ffffff" font-family="Arial">Output</text>
    <text x="150" y="475" font-size="11" fill="#ffffff" font-family="Arial">Direct execution</text>
  </g>

  <g class="step" id="step6" data-narration="Comparison of Compilers and Interpreters">
    <rect x="40" y="500" width="345" height="85" fill="#8b5cf6" rx="10" />
    <text x="212" y="525" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Compiler</text>
    <text x="212" y="545" font-size="11" fill="#ffffff" font-family="Arial" text-anchor="middle">+ Faster Execution</text>
    <text x="212" y="565" font-size="11" fill="#ffffff" font-family="Arial" text-anchor="middle">- Longer compile time</text>
    <rect x="415" y="500" width="345" height="85" fill="#f59e0b" rx="10" />
    <text x="587" y="525" font-size="16" fill="#ffffff" font-family="Arial" text-anchor="middle">Interpreter</text>
    <text x="587" y="545" font-size="11" fill="#ffffff" font-family="Arial" text-anchor="middle">+ Easier Debugging</text>
    <text x="587" y="565" font-size="11" fill="#ffffff" font-family="Arial" text-anchor="middle">- Slower execution</text>
  </g>
</svg>
