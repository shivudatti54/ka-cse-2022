<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to the concept of a compiler">
    <text x="50" y="50" font-size="24" fill="#2563eb">Compiler Structure</text>
    <rect x="50" y="100" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="135" font-size="18" fill="#ffffff">Source Code</text>
  </g>
  <g id="step1" data-narration="First phase: Lexical Analysis">
    <use href="#step0" x="0" y="0" />
    <rect x="300" y="100" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="135" font-size="18" fill="#ffffff">Lexical Analyzer</text>
    <line x1="250" y1="125" x2="300" y2="125" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="Output of Lexical Analysis: Tokens">
    <use href="#step1" x="0" y="0" />
    <rect x="550" y="100" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="135" font-size="18" fill="#ffffff">Tokens</text>
    <line x1="500" y1="125" x2="550" y2="125" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" data-narration="Second phase: Syntax Analysis">
    <use href="#step2" x="0" y="0" />
    <rect x="50" y="250" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="285" font-size="18" fill="#ffffff">Syntax Analyzer</text>
    <line x1="250" y1="175" x2="50" y2="225" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="Output of Syntax Analysis: Parse Tree">
    <use href="#step3" x="0" y="0" />
    <rect x="300" y="250" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="285" font-size="18" fill="#ffffff">Parse Tree</text>
    <line x1="250" y1="275" x2="300" y2="275" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step5" data-narration="Third phase: Semantic Analysis">
    <use href="#step4" x="0" y="0" />
    <rect x="550" y="250" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="560" y="285" font-size="18" fill="#ffffff">Semantic Analyzer</text>
    <line x1="500" y1="275" x2="550" y2="275" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step6" data-narration="Output of Semantic Analysis: Intermediate Code">
    <use href="#step5" x="0" y="0" />
    <rect x="50" y="400" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="435" font-size="18" fill="#ffffff">Intermediate Code</text>
    <line x1="250" y1="325" x2="50" y2="375" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step7" data-narration="Fourth phase: Code Optimization">
    <use href="#step6" x="0" y="0" />
    <rect x="300" y="400" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="435" font-size="18" fill="#ffffff">Code Optimizer</text>
    <line x1="250" y1="425" x2="300" y2="425" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step8" data-narration="Final phase: Code Generation">
    <use href="#step7" x="0" y="0" />
    <rect x="550" y="400" width="200" height="50" fill="#10b981" rx="10" />
    <text x="560" y="435" font-size="18" fill="#ffffff">Target Code</text>
    <line x1="500" y1="425" x2="550" y2="425" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
</svg>