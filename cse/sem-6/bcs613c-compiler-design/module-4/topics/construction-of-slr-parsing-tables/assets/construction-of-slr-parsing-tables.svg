<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2" font-family="Arial">Construction of SLR Parsing Tables</text>

  <!-- Step 0: Card 1 - LR(0) Items -->
  <g id="step0" class="step" data-narration="An LR-zero item is a grammar production with a dot marking how much has been recognized. For A goes to X Y Z, four items exist showing progressive recognition. The dot position tracks parsing progress through the production.">
    <rect x="30" y="55" width="235" height="135" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="147" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2" font-family="Arial">LR(0) Items</text>
    <line x1="45" y1="88" x2="250" y2="88" stroke="#1976d2" stroke-width="1" opacity="0.3"/>
    <text x="48" y="108" font-size="10" font-family="monospace" fill="#1976d2">A -> .XYZ  (start)</text>
    <text x="48" y="125" font-size="10" font-family="monospace" fill="#1976d2">A -> X.YZ  (after X)</text>
    <text x="48" y="142" font-size="10" font-family="monospace" fill="#1976d2">A -> XY.Z  (after XY)</text>
    <text x="48" y="159" font-size="10" font-family="monospace" fill="#1976d2">A -> XYZ.  (complete)</text>
    <text x="48" y="178" font-size="9" fill="#1976d2" font-family="Arial">Dot tracks recognition progress</text>
  </g>

  <!-- Step 1: Card 2 - CLOSURE operation -->
  <g id="step1" class="step" data-narration="The CLOSURE operation expands an item set. If the dot is before a nonterminal B, add all productions of B with the dot at the start. This represents all possible ways to begin recognizing B.">
    <rect x="282" y="55" width="235" height="135" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c" font-family="Arial">CLOSURE(I)</text>
    <line x1="297" y1="88" x2="502" y2="88" stroke="#388e3c" stroke-width="1" opacity="0.3"/>
    <text x="295" y="108" font-size="10" fill="#388e3c" font-family="Arial">If [A -> a.Bb] in I:</text>
    <text x="295" y="125" font-size="10" fill="#388e3c" font-family="Arial">For each B -> g:</text>
    <text x="305" y="142" font-size="10" fill="#388e3c" font-family="Arial">Add [B -> .g] to I</text>
    <text x="295" y="165" font-size="9" font-weight="bold" fill="#388e3c" font-family="Arial">Expands set with all</text>
    <text x="295" y="178" font-size="9" font-weight="bold" fill="#388e3c" font-family="Arial">reachable start items</text>
  </g>

  <!-- Step 2: Card 3 - GOTO operation -->
  <g id="step2" class="step" data-narration="The GOTO function computes state transitions. GOTO of item set I and symbol X collects all items where the dot moves past X, then applies CLOSURE. This creates the next parser state after reading symbol X.">
    <rect x="534" y="55" width="235" height="135" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="652" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800" font-family="Arial">GOTO(I, X)</text>
    <line x1="549" y1="88" x2="754" y2="88" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
    <text x="548" y="108" font-size="10" fill="#ff9800" font-family="Arial">Collect items where</text>
    <text x="548" y="125" font-size="10" fill="#ff9800" font-family="Arial">dot moves past X:</text>
    <text x="558" y="142" font-size="10" font-family="monospace" fill="#ff9800">[A -> aX.b]</text>
    <text x="548" y="162" font-size="10" fill="#ff9800" font-family="Arial">Apply CLOSURE to result</text>
    <text x="548" y="178" font-size="9" font-weight="bold" fill="#ff9800" font-family="Arial">Creates state transitions</text>
  </g>

  <!-- Step 3: Card 4 - State I0 example -->
  <g id="step3" class="step" data-narration="State I-zero starts with augmented production S-prime goes to dot E. CLOSURE adds items for E, T, and F. This initial state contains seven items representing all possible starting configurations for parsing.">
    <rect x="30" y="210" width="235" height="155" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="147" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c27b0" font-family="Arial">State I0 (Initial)</text>
    <line x1="45" y1="243" x2="250" y2="243" stroke="#9c27b0" stroke-width="1" opacity="0.3"/>
    <text x="48" y="260" font-size="9" font-family="monospace" fill="#9c27b0">[S' -> .E]</text>
    <text x="48" y="275" font-size="9" font-family="monospace" fill="#9c27b0">[E  -> .E + T]</text>
    <text x="48" y="290" font-size="9" font-family="monospace" fill="#9c27b0">[E  -> .T]</text>
    <text x="48" y="305" font-size="9" font-family="monospace" fill="#9c27b0">[T  -> .T * F]</text>
    <text x="48" y="320" font-size="9" font-family="monospace" fill="#9c27b0">[T  -> .F]</text>
    <text x="48" y="335" font-size="9" font-family="monospace" fill="#9c27b0">[F  -> .(E)]</text>
    <text x="48" y="350" font-size="9" font-family="monospace" fill="#9c27b0">[F  -> .id]</text>
  </g>

  <!-- Step 4: Card 5 - ACTION table rules -->
  <g id="step4" class="step" data-narration="ACTION table entries are determined by item type. Items with dot before a terminal get shift actions. Complete items with dot at the end get reduce actions for each terminal in the FOLLOW set of the left-hand side.">
    <rect x="282" y="210" width="235" height="155" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#1976d2" font-family="Arial">ACTION Rules</text>
    <line x1="297" y1="243" x2="502" y2="243" stroke="#1976d2" stroke-width="1" opacity="0.3"/>
    <text x="295" y="263" font-size="9" fill="#1976d2" font-family="Arial">Shift: [A -> a.ab] in Ii</text>
    <text x="305" y="278" font-size="9" fill="#1976d2" font-family="Arial">GOTO(Ii, a) = Ij</text>
    <text x="305" y="293" font-size="9" fill="#1976d2" font-family="Arial">ACTION[i, a] = shift j</text>
    <line x1="297" y1="303" x2="502" y2="303" stroke="#1976d2" stroke-width="1" opacity="0.2"/>
    <text x="295" y="320" font-size="9" fill="#1976d2" font-family="Arial">Reduce: [A -> a.] in Ii</text>
    <text x="305" y="335" font-size="9" fill="#1976d2" font-family="Arial">For each a in FOLLOW(A)</text>
    <text x="305" y="350" font-size="9" fill="#1976d2" font-family="Arial">ACTION[i, a] = reduce</text>
  </g>

  <!-- Step 5: Card 6 - GOTO table and Accept -->
  <g id="step5" class="step" data-narration="The GOTO table maps nonterminal transitions after reductions. If GOTO of state I-i and nonterminal A is state I-j, set GOTO entry to j. The accept action is placed when S-prime goes to S-dot is in a state with dollar input.">
    <rect x="534" y="210" width="235" height="155" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="652" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#388e3c" font-family="Arial">GOTO Table + Accept</text>
    <line x1="549" y1="243" x2="754" y2="243" stroke="#388e3c" stroke-width="1" opacity="0.3"/>
    <text x="548" y="263" font-size="9" fill="#388e3c" font-family="Arial">GOTO entries:</text>
    <text x="558" y="278" font-size="9" fill="#388e3c" font-family="Arial">If GOTO(Ii, A) = Ij</text>
    <text x="558" y="293" font-size="9" fill="#388e3c" font-family="Arial">GOTO[i, A] = j</text>
    <line x1="549" y1="303" x2="754" y2="303" stroke="#388e3c" stroke-width="1" opacity="0.2"/>
    <text x="548" y="320" font-size="9" fill="#388e3c" font-family="Arial">Accept condition:</text>
    <text x="558" y="335" font-size="9" fill="#388e3c" font-family="Arial">[S' -> S.] in Ii</text>
    <text x="558" y="350" font-size="9" fill="#388e3c" font-family="Arial">ACTION[i, $] = accept</text>
  </g>

  <!-- Step 6: Sample SLR table snippet -->
  <g id="step6" class="step" data-narration="The resulting SLR table for the expression grammar has twelve states. State zero shifts id to state five and open-paren to state four. State one shifts plus to state six and accepts on dollar sign input.">
    <rect x="30" y="385" width="740" height="110" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="408" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff9800" font-family="Arial">SLR Table Excerpt (Expression Grammar)</text>
    <line x1="45" y1="416" x2="755" y2="416" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
    <text x="50" y="435" font-size="10" font-weight="bold" font-family="monospace" fill="#ff9800">State  id    +     *     (     )     $     E   T   F</text>
    <text x="50" y="452" font-size="10" font-family="monospace" fill="#ff9800">  0    s5                s4                1   2   3</text>
    <text x="50" y="469" font-size="10" font-family="monospace" fill="#ff9800">  1          s6                      acc</text>
    <text x="50" y="486" font-size="10" font-family="monospace" fill="#ff9800">  2          r2    s7          r2    r2</text>
  </g>

  <!-- Step 7: Conflicts -->
  <g id="step7" class="step" data-narration="SLR parsing can encounter shift-reduce conflicts when both actions apply for the same input, or reduce-reduce conflicts with multiple reductions. These conflicts indicate the grammar may need a more powerful parser like LALR.">
    <rect x="30" y="510" width="350" height="80" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="205" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336" font-family="Arial">Shift-Reduce Conflict</text>
    <text x="50" y="553" font-size="10" fill="#f44336" font-family="Arial">Both shift and reduce apply for same</text>
    <text x="50" y="568" font-size="10" fill="#f44336" font-family="Arial">input symbol in same state</text>
    <text x="50" y="583" font-size="9" fill="#f44336" font-family="Arial">May need LALR or CLR parser</text>

    <rect x="400" y="510" width="370" height="80" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="585" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0" font-family="Arial">SLR vs LALR vs CLR</text>
    <text x="420" y="553" font-size="10" fill="#9c27b0" font-family="Arial">SLR: Simple, uses FOLLOW sets</text>
    <text x="420" y="568" font-size="10" fill="#9c27b0" font-family="Arial">LALR: Medium, merges CLR states</text>
    <text x="420" y="583" font-size="10" fill="#9c27b0" font-family="Arial">CLR: Most powerful, largest tables</text>
  </g>
</svg>
