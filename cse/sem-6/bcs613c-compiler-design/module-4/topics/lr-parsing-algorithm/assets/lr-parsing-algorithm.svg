<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
<rect width="800" height="600" fill="#f8fafc"/>
<g id="step0" data-narration="Introduction to CYK Parsing Algorithm">
<text x="50" y="50" font-size="24" fill="#2563eb">CYK Parsing Algorithm</text>
<text x="50" y="80" font-size="18" fill="#8b5cf6">Dynamic programming parsing technique for context-free grammars (CFGs)</text>
</g>
<g id="step1" data-narration="Chomsky Normal Form (CNF) requirement">
<text x="50" y="120" font-size="24" fill="#2563eb">Chomsky Normal Form (CNF)</text>
<text x="50" y="150" font-size="18" fill="#10b981">All production rules are of one of two forms:</text>
<text x="50" y="180" font-size="14" fill="#10b981">1. Non-terminal → Terminal</text>
<text x="50" y="200" font-size="14" fill="#10b981">2. Non-terminal → Non-terminal Non-terminal</text>
</g>
<g id="step2" data-narration="Converting a CFG to CNF">
<text x="50" y="230" font-size="24" fill="#f59e0b">Converting a CFG to CNF</text>
<text x="50" y="260" font-size="18" fill="#8b5cf6">Steps:</text>
<text x="50" y="290" font-size="14" fill="#8b5cf6">1. Eliminate ε-productions</text>
<text x="50" y="310" font-size="14" fill="#8b5cf6">2. Eliminate unit productions</text>
<text x="50" y="330" font-size="14" fill="#8b5cf6">3. Eliminate useless symbols</text>
<text x="50" y="350" font-size="14" fill="#8b5cf6">4. Break up long rules</text>
</g>
<g id="step3" data-narration="Example conversion to CNF">
<text x="300" y="50" font-size="24" fill="#2563eb">Example Conversion</text>
<text x="300" y="80" font-size="18" fill="#10b981">Original CFG:</text>
<text x="300" y="110" font-size="14" fill="#10b981">S → NP VP</text>
<text x="300" y="130" font-size="14" fill="#10b981">NP → Det N | PN</text>
<text x="300" y="150" font-size="14" fill="#10b981">Converted to CNF:</text>
<text x="300" y="170" font-size="14" fill="#10b981">S → NP VP</text>
<text x="300" y="190" font-size="14" fill="#10b981">NP → Det N</text>
<text x="300" y="210" font-size="14" fill="#10b981">NP → PN</text>
</g>
<g id="step4" data-narration="CYK parsing process">
<text x="500" y="50" font-size="24" fill="#f59e0b">CYK Parsing Process</text>
<text x="500" y="80" font-size="18" fill="#8b5cf6">Fill in the parsing table using the CNF grammar</text>
</g>
<g id="step5" data-narration="Parsing table construction">
<text x="500" y="150" font-size="24" fill="#2563eb">Parsing Table Construction</text>
<text x="500" y="180" font-size="18" fill="#10b981">Use the CNF grammar to fill in the table</text>
<text x="500" y="200" font-size="14" fill="#10b981">Combine smaller parsed segments into larger ones</text>
</g>
<g id="step6" data-narration="Final parsing result">
<text x="700" y="50" font-size="24" fill="#8b5cf6">Final Parsing Result</text>
<text x="700" y="80" font-size="18" fill="#f59e0b">The input string can be generated by the given CFG</text>
</g>
</svg>