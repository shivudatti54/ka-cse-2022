<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1976d2" font-family="Arial">FIRST and FOLLOW Sets</text>

  <!-- Step 0: Grammar productions as root tree -->
  <g id="step0" class="step" data-narration="FIRST and FOLLOW sets are computed from grammar productions. Consider the expression grammar with nonterminals E, E-prime, T, T-prime, and F. These sets guide predictive parsing decisions.">
    <rect x="280" y="55" width="240" height="120" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2.5"/>
    <text x="400" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2" font-family="Arial">Grammar Productions</text>
    <line x1="295" y1="88" x2="505" y2="88" stroke="#1976d2" stroke-width="1" opacity="0.3"/>
    <text x="300" y="108" font-size="11" font-family="monospace" fill="#1976d2">E  -> T E'</text>
    <text x="300" y="123" font-size="11" font-family="monospace" fill="#1976d2">E' -> + T E' | e</text>
    <text x="300" y="138" font-size="11" font-family="monospace" fill="#1976d2">T  -> F T'</text>
    <text x="300" y="153" font-size="11" font-family="monospace" fill="#1976d2">T' -> * F T' | e</text>
    <text x="300" y="168" font-size="11" font-family="monospace" fill="#1976d2">F  -> ( E ) | id</text>
    <line x1="340" y1="175" x2="180" y2="210" stroke="#1976d2" stroke-width="2"/>
    <line x1="460" y1="175" x2="620" y2="210" stroke="#388e3c" stroke-width="2"/>
  </g>

  <!-- Step 1: FIRST set rules (left branch) -->
  <g id="step1" class="step" data-narration="The FIRST set contains terminals that can begin strings derived from a symbol. If X is a terminal, FIRST of X is just X itself. For nonterminals, examine the first symbol of each production right-hand side.">
    <rect x="40" y="210" width="280" height="110" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="180" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2" font-family="Arial">FIRST Set Rules</text>
    <line x1="55" y1="243" x2="305" y2="243" stroke="#1976d2" stroke-width="1" opacity="0.3"/>
    <text x="60" y="263" font-size="10" fill="#1976d2" font-family="Arial">1. Terminal X: FIRST(X) = {X}</text>
    <text x="60" y="280" font-size="10" fill="#1976d2" font-family="Arial">2. X -> Y1 Y2..Yk: add FIRST(Y1)</text>
    <text x="60" y="297" font-size="10" fill="#1976d2" font-family="Arial">3. If Y1 derives e, add FIRST(Y2)...</text>
    <text x="60" y="314" font-size="10" fill="#1976d2" font-family="Arial">4. If all derive e, add e to FIRST(X)</text>
  </g>

  <!-- Step 2: FIRST set computed values (left leaf nodes) -->
  <g id="step2" class="step" data-narration="Computing FIRST sets bottom-up: FIRST of F is open-paren and id. FIRST of T equals FIRST of F. FIRST of E equals FIRST of T. FIRST of E-prime is plus and epsilon. FIRST of T-prime is star and epsilon.">
    <line x1="100" y1="320" x2="100" y2="345" stroke="#1976d2" stroke-width="2"/>
    <line x1="240" y1="320" x2="240" y2="345" stroke="#1976d2" stroke-width="2"/>
    <rect x="30" y="345" width="140" height="130" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="100" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800" font-family="Arial">FIRST Sets</text>
    <line x1="42" y1="375" x2="158" y2="375" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
    <text x="45" y="393" font-size="10" font-family="monospace" fill="#ff9800">F:  { (, id }</text>
    <text x="45" y="410" font-size="10" font-family="monospace" fill="#ff9800">T:  { (, id }</text>
    <text x="45" y="427" font-size="10" font-family="monospace" fill="#ff9800">E:  { (, id }</text>
    <text x="45" y="444" font-size="10" font-family="monospace" fill="#ff9800">T': { *, e }</text>
    <text x="45" y="461" font-size="10" font-family="monospace" fill="#ff9800">E': { +, e }</text>

    <rect x="185" y="345" width="155" height="130" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="262" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c" font-family="Arial">Derivation</text>
    <line x1="197" y1="375" x2="328" y2="375" stroke="#388e3c" stroke-width="1" opacity="0.3"/>
    <text x="200" y="393" font-size="9" fill="#388e3c" font-family="Arial">F -> (E) gives (</text>
    <text x="200" y="410" font-size="9" fill="#388e3c" font-family="Arial">F -> id gives id</text>
    <text x="200" y="427" font-size="9" fill="#388e3c" font-family="Arial">T -> FT' : FIRST(F)</text>
    <text x="200" y="444" font-size="9" fill="#388e3c" font-family="Arial">E -> TE' : FIRST(T)</text>
    <text x="200" y="461" font-size="9" fill="#388e3c" font-family="Arial">Bottom-up order</text>
  </g>

  <!-- Step 3: FOLLOW set rules (right branch) -->
  <g id="step3" class="step" data-narration="The FOLLOW set contains terminals that can appear right after a nonterminal. Place dollar sign in FOLLOW of the start symbol. For production B goes to alpha A beta, add FIRST of beta minus epsilon to FOLLOW of A.">
    <rect x="480" y="210" width="280" height="110" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="620" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c" font-family="Arial">FOLLOW Set Rules</text>
    <line x1="495" y1="243" x2="745" y2="243" stroke="#388e3c" stroke-width="1" opacity="0.3"/>
    <text x="495" y="263" font-size="10" fill="#388e3c" font-family="Arial">1. FOLLOW(S) = {$}</text>
    <text x="495" y="280" font-size="10" fill="#388e3c" font-family="Arial">2. B->aAb: add FIRST(b)-{e}</text>
    <text x="495" y="297" font-size="10" fill="#388e3c" font-family="Arial">3. b derives e: add FOLLOW(B)</text>
    <text x="495" y="314" font-size="10" fill="#388e3c" font-family="Arial">4. B->aA: add FOLLOW(B)</text>
  </g>

  <!-- Step 4: FOLLOW set computed values (right leaf nodes) -->
  <g id="step4" class="step" data-narration="Computing FOLLOW: FOLLOW of E is dollar and close-paren. FOLLOW of T is plus, dollar, and close-paren. FOLLOW of F includes star, plus, dollar, and close-paren. FOLLOW never contains epsilon.">
    <line x1="540" y1="320" x2="540" y2="345" stroke="#388e3c" stroke-width="2"/>
    <line x1="700" y1="320" x2="700" y2="345" stroke="#388e3c" stroke-width="2"/>
    <rect x="460" y="345" width="150" height="130" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="535" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9800" font-family="Arial">FOLLOW Sets</text>
    <line x1="472" y1="375" x2="598" y2="375" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
    <text x="475" y="393" font-size="10" font-family="monospace" fill="#ff9800">E:  { $, ) }</text>
    <text x="475" y="410" font-size="10" font-family="monospace" fill="#ff9800">E': { $, ) }</text>
    <text x="475" y="427" font-size="10" font-family="monospace" fill="#ff9800">T:  { +, $, ) }</text>
    <text x="475" y="444" font-size="10" font-family="monospace" fill="#ff9800">T': { +, $, ) }</text>
    <text x="475" y="461" font-size="10" font-family="monospace" fill="#ff9800">F:  { *, +, $, ) }</text>

    <rect x="625" y="345" width="155" height="130" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="702" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c27b0" font-family="Arial">Key Rules</text>
    <line x1="637" y1="375" x2="768" y2="375" stroke="#9c27b0" stroke-width="1" opacity="0.3"/>
    <text x="640" y="393" font-size="9" fill="#9c27b0" font-family="Arial">E is start: add $</text>
    <text x="640" y="410" font-size="9" fill="#9c27b0" font-family="Arial">F->(E): add ) to E</text>
    <text x="640" y="427" font-size="9" fill="#9c27b0" font-family="Arial">E->TE': FIRST(E')</text>
    <text x="640" y="444" font-size="9" fill="#9c27b0" font-family="Arial">gives + to FOLLOW(T)</text>
    <text x="640" y="461" font-size="9" fill="#9c27b0" font-family="Arial">FOLLOW never has e</text>
  </g>

  <!-- Step 5: LL(1) parsing table construction -->
  <g id="step5" class="step" data-narration="FIRST and FOLLOW build the LL(1) parsing table. For each production A goes to alpha, place it in table entry M of A comma a for each terminal a in FIRST of alpha. If epsilon is in FIRST, use FOLLOW of A instead.">
    <rect x="100" y="495" width="600" height="95" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="518" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336" font-family="Arial">LL(1) Parsing Table Construction</text>
    <line x1="115" y1="525" x2="685" y2="525" stroke="#f44336" stroke-width="1" opacity="0.3"/>
    <text x="120" y="545" font-size="10" fill="#f44336" font-family="Arial">For A -> a: place in M[A, a] for each a in FIRST(a)</text>
    <text x="120" y="562" font-size="10" fill="#f44336" font-family="Arial">If e in FIRST(a): place in M[A, b] for each b in FOLLOW(A)</text>
    <text x="120" y="579" font-size="10" font-weight="bold" fill="#f44336" font-family="Arial">Grammar is LL(1) if no table entry has multiple productions (no conflicts)</text>
  </g>
</svg>
