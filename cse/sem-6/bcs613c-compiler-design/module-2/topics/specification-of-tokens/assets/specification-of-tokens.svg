<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" data-topic-id="specification-of-tokens">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c" />
    </marker>
  </defs>

  <!-- Step 1: Regular Expression Operations -->
  <g id="step1" class="step" data-narration="Regular expressions use basic operations to specify patterns. Union allows alternatives with the vertical bar, concatenation combines patterns, and Kleene star matches zero or more repetitions of a pattern.">
    <rect x="150" y="80" width="500" height="160" rx="10" fill="url(#blueGrad)" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="110" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Basic Regular Expression Operations</text>

    <rect x="180" y="130" width="130" height="90" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="245" y="155" font-size="13" font-weight="bold" fill="#1976d2" text-anchor="middle">Union (|)</text>
    <text x="245" y="180" font-size="11" fill="#0d47a1" text-anchor="middle">a | b</text>
    <text x="245" y="200" font-size="10" fill="#0d47a1" text-anchor="middle">matches a or b</text>

    <rect x="335" y="130" width="130" height="90" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="155" font-size="13" font-weight="bold" fill="#1976d2" text-anchor="middle">Concatenation</text>
    <text x="400" y="180" font-size="11" fill="#0d47a1" text-anchor="middle">ab</text>
    <text x="400" y="200" font-size="10" fill="#0d47a1" text-anchor="middle">matches a then b</text>

    <rect x="490" y="130" width="130" height="90" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="555" y="155" font-size="13" font-weight="bold" fill="#1976d2" text-anchor="middle">Kleene Star (*)</text>
    <text x="555" y="180" font-size="11" fill="#0d47a1" text-anchor="middle">a*</text>
    <text x="555" y="200" font-size="10" fill="#0d47a1" text-anchor="middle">0 or more a's</text>
  </g>

  <!-- Step 2: Extended Operations -->
  <g id="step2" class="step" data-narration="Extended operations include positive closure for one or more repetitions, optional operator for zero or one occurrence, and character classes using square brackets for matching any character in a set.">
    <rect x="100" y="80" width="600" height="140" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="110" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">Extended Regular Expression Operations</text>

    <rect x="130" y="130" width="150" height="70" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="205" y="155" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Positive Closure (+)</text>
    <text x="205" y="178" font-size="11" fill="#2e7d32" text-anchor="middle">a+ = aa*</text>

    <rect x="325" y="130" width="150" height="70" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="155" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Optional (?)</text>
    <text x="400" y="178" font-size="11" fill="#2e7d32" text-anchor="middle">a? = (a | ε)</text>

    <rect x="520" y="130" width="150" height="70" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="595" y="155" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Character Class</text>
    <text x="595" y="178" font-size="11" fill="#2e7d32" text-anchor="middle">[a-z] = (a|b|...|z)</text>
  </g>

  <!-- Step 3: Identifier Pattern -->
  <g id="step3" class="step" data-narration="An identifier specification uses regular expressions hierarchically. Letter is defined as any uppercase or lowercase letter. Digit is zero through nine. Identifier combines these as letter followed by letters or digits.">
    <rect x="200" y="100" width="400" height="140" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="130" font-size="16" font-weight="bold" fill="#ff9800" text-anchor="middle">Identifier Specification</text>

    <rect x="230" y="150" width="340" height="70" rx="6" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="250" y="175" font-size="12" font-family="monospace" fill="#e65100">letter = [a-zA-Z]</text>
    <text x="250" y="200" font-size="12" font-family="monospace" fill="#e65100">digit = [0-9]</text>
    <text x="250" y="225" font-size="12" font-family="monospace" fill="#e65100">identifier = letter(letter|digit)*</text>
  </g>

  <!-- Step 4: Number Patterns -->
  <g id="step4" class="step" data-narration="Numeric tokens have precise specifications. Integers are one or more digits. Floating-point numbers include mandatory decimal point and optional exponent notation with optional sign.">
    <rect x="150" y="90" width="500" height="150" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="120" font-size="16" font-weight="bold" fill="#9c27b0" text-anchor="middle">Number Token Specifications</text>

    <rect x="180" y="140" width="440" height="80" rx="6" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="200" y="165" font-size="12" font-family="monospace" fill="#6a1b9a">integer = digit+</text>
    <text x="200" y="190" font-size="12" font-family="monospace" fill="#6a1b9a">float = digit+ '.' digit+</text>
    <text x="200" y="215" font-size="12" font-family="monospace" fill="#6a1b9a">scientific = digit+ '.' digit+ [eE] [+-]? digit+</text>
  </g>

  <!-- Step 5: String Pattern -->
  <g id="step5" class="step" data-narration="String literals are enclosed in double quotes and can contain any character except newline, or escape sequences. Escape sequences start with backslash followed by special characters like n, t, or quote.">
    <rect x="180" y="100" width="440" height="130" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="130" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">String Specification</text>

    <rect x="210" y="150" width="380" height="60" rx="6" fill="#fff" stroke="#1976d2" stroke-width="1"/>
    <text x="230" y="175" font-size="12" font-family="monospace" fill="#0d47a1">string = '"' (char)* '"'</text>
    <text x="230" y="200" font-size="12" font-family="monospace" fill="#0d47a1">char = [^"\n] | escape_seq</text>
  </g>

  <!-- Step 6: Comment Patterns -->
  <g id="step6" class="step" data-narration="Comments have two forms specified by regular expressions. Single-line comments start with double slash followed by any characters except newline. Multi-line comments use slash-star and star-slash delimiters.">
    <rect x="150" y="90" width="500" height="150" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="120" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">Comment Specifications</text>

    <rect x="180" y="140" width="440" height="80" rx="6" fill="#fff" stroke="#388e3c" stroke-width="1"/>
    <text x="200" y="165" font-size="12" font-family="monospace" fill="#2e7d32">single_line = '//' [^\n]*</text>
    <text x="200" y="190" font-size="12" font-family="monospace" fill="#2e7d32">multi_line = '/*' (any_char)* '*/'</text>
    <text x="200" y="215" font-size="12" font-family="monospace" fill="#2e7d32">any_char = [^*] | '*' [^/]</text>
  </g>

  <!-- Step 7: Operator Patterns -->
  <g id="step7" class="step" data-narration="Relational and arithmetic operators are specified using alternation. Relational operators include less-than, greater-than, equals, not-equals, and their combinations. Arithmetic operators are plus, minus, multiply, divide.">
    <rect x="180" y="100" width="440" height="130" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="130" font-size="16" font-weight="bold" fill="#ff9800" text-anchor="middle">Operator Specifications</text>

    <rect x="210" y="150" width="380" height="60" rx="6" fill="#fff" stroke="#ff9800" stroke-width="1"/>
    <text x="230" y="175" font-size="12" font-family="monospace" fill="#e65100">relational = '&lt;' | '&gt;' | '&lt;=' | '&gt;=' | '==' | '!='</text>
    <text x="230" y="200" font-size="12" font-family="monospace" fill="#e65100">arithmetic = '+' | '-' | '*' | '/'</text>
  </g>

  <!-- Step 8: Ambiguity Resolution -->
  <g id="step8" class="step" data-narration="When multiple patterns match, the lexer uses two resolution rules. The longest match principle selects the pattern matching the most characters. Rule priority gives earlier-defined patterns higher precedence.">
    <rect x="150" y="80" width="500" height="180" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="110" font-size="16" font-weight="bold" fill="#9c27b0" text-anchor="middle">Ambiguity Resolution Rules</text>

    <rect x="180" y="130" width="220" height="110" rx="6" fill="#fce4ec" stroke="#9c27b0" stroke-width="1"/>
    <text x="290" y="155" font-size="13" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Longest Match</text>
    <text x="200" y="180" font-size="11" fill="#6a1b9a">"intvalue"</text>
    <text x="200" y="200" font-size="10" fill="#6a1b9a">✓ identifier "intvalue"</text>
    <text x="200" y="220" font-size="10" fill="#6a1b9a">✗ keyword "int" + id "value"</text>

    <rect x="420" y="130" width="210" height="110" rx="6" fill="#fce4ec" stroke="#9c27b0" stroke-width="1"/>
    <text x="525" y="155" font-size="13" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Rule Priority</text>
    <text x="440" y="180" font-size="11" fill="#6a1b9a">First matching rule</text>
    <text x="440" y="200" font-size="11" fill="#6a1b9a">wins if lengths</text>
    <text x="440" y="220" font-size="11" fill="#6a1b9a">are equal</text>
  </g>
</svg>
