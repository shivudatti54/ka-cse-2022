<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" data-topic-id="lexical-analysis">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Step 1: Role of Lexical Analyzer -->
  <g id="step1" class="step" data-narration="The lexical analyzer, also called scanner, is the first phase of compilation. It reads the source program character stream and groups characters into meaningful sequences called tokens.">
    <rect x="150" y="100" width="200" height="80" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
    <text x="250" y="135" font-size="14" font-weight="bold" fill="#ff9800" text-anchor="middle">Source Code</text>
    <text x="250" y="160" font-size="11" font-family="monospace" fill="#e65100">int x = 5;</text>

    <line x1="350" y1="140" x2="400" y2="140" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowBlue)"/>

    <rect x="400" y="90" width="180" height="100" rx="10" fill="url(#blueGrad)" stroke="#1976d2" stroke-width="3"/>
    <text x="490" y="120" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Lexical</text>
    <text x="490" y="140" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Analyzer</text>
    <text x="490" y="165" font-size="11" fill="#e3f2fd">(Scanner)</text>

    <line x1="580" y1="140" x2="630" y2="140" stroke="#388e3c" stroke-width="3" marker-end="url(#arrowBlue)"/>

    <rect x="630" y="100" width="120" height="80" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
    <text x="690" y="130" font-size="13" font-weight="bold" fill="#388e3c" text-anchor="middle">Tokens</text>
    <text x="690" y="155" font-size="10" fill="#2e7d32">int, x, =, 5, ;</text>
  </g>

  <!-- Step 2: Token Pattern Lexeme -->
  <g id="step2" class="step" data-narration="Understanding three key concepts: a token is the abstract symbol, pattern describes the form that lexemes can take, and lexeme is the actual character sequence matching the pattern.">
    <rect x="100" y="70" width="180" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="190" y="95" font-size="14" font-weight="bold" fill="#1976d2" text-anchor="middle">Token</text>
    <text x="190" y="120" font-size="11" fill="#0d47a1">Abstract symbol</text>
    <text x="190" y="140" font-size="11" fill="#0d47a1">Example: identifier</text>

    <rect x="310" y="70" width="180" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="95" font-size="14" font-weight="bold" fill="#388e3c" text-anchor="middle">Pattern</text>
    <text x="400" y="120" font-size="11" fill="#2e7d32">Rule for lexemes</text>
    <text x="400" y="140" font-size="11" fill="#2e7d32">[a-z][a-z0-9]*</text>

    <rect x="520" y="70" width="180" height="100" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="610" y="95" font-size="14" font-weight="bold" fill="#ff9800" text-anchor="middle">Lexeme</text>
    <text x="610" y="120" font-size="11" fill="#e65100">Actual sequence</text>
    <text x="610" y="140" font-size="11" fill="#e65100">"count", "sum"</text>
  </g>

  <!-- Step 3: Tokenization Example -->
  <g id="step3" class="step" data-narration="For the statement 'int result equals x plus ten semicolon', the lexer produces seven tokens: keyword int, identifier result, operator equals, identifier x, operator plus, number ten, semicolon.">
    <rect x="120" y="80" width="560" height="180" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="110" font-size="15" font-weight="bold" fill="#9c27b0" text-anchor="middle">Tokenization Process</text>

    <text x="140" y="140" font-size="13" font-family="monospace" fill="#6a1b9a">int result = x + 10;</text>

    <rect x="140" y="160" width="520" height="80" rx="5" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
    <text x="160" y="185" font-size="11" fill="#6a1b9a">int → &lt;keyword, int&gt;</text>
    <text x="160" y="205" font-size="11" fill="#6a1b9a">result → &lt;id, ptr to symbol table&gt;</text>
    <text x="160" y="225" font-size="11" fill="#6a1b9a">= → &lt;assign_op&gt;   + → &lt;add_op&gt;   10 → &lt;number, 10&gt;</text>
  </g>

  <!-- Step 4: Finite Automata -->
  <g id="step4" class="step" data-narration="Token recognition uses finite automata. An identifier automaton starts at state zero, transitions on a letter to state one, and loops on letters or digits until a non-matching character terminates.">
    <circle cx="200" cy="150" r="35" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="200" y="145" font-size="12" font-weight="bold" fill="#ff9800" text-anchor="middle">Start</text>
    <text x="200" y="162" font-size="11" fill="#e65100">State 0</text>

    <line x1="235" y1="150" x2="315" y2="150" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="275" y="140" font-size="10" fill="#ff9800">letter</text>

    <circle cx="350" cy="150" r="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
    <text x="350" y="145" font-size="12" font-weight="bold" fill="#388e3c" text-anchor="middle">Accept</text>
    <text x="350" y="162" font-size="11" fill="#2e7d32">State 1</text>

    <path d="M 370 120 Q 400 90 370 100" stroke="#388e3c" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <text x="405" y="95" font-size="10" fill="#388e3c">letter/digit</text>

    <text x="400" y="200" font-size="13" font-weight="bold" fill="#ff9800">DFA for Identifier</text>
  </g>

  <!-- Step 5: Regular Expressions -->
  <g id="step5" class="step" data-narration="Tokens are specified using regular expressions. An identifier is defined as a letter followed by zero or more letters or digits. An integer is one or more digits.">
    <rect x="150" y="90" width="500" height="150" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="120" font-size="15" font-weight="bold" fill="#1976d2" text-anchor="middle">Regular Expression Patterns</text>

    <text x="180" y="155" font-size="13" font-family="monospace" fill="#0d47a1">identifier = [a-zA-Z][a-zA-Z0-9]*</text>
    <text x="180" y="180" font-size="13" font-family="monospace" fill="#0d47a1">integer = [0-9]+</text>
    <text x="180" y="205" font-size="13" font-family="monospace" fill="#0d47a1">float = [0-9]+\.[0-9]+</text>
  </g>

  <!-- Step 6: Buffer Management -->
  <g id="step6" class="step" data-narration="Input buffering uses a two-buffer scheme for efficiency. Two pointers track the current lexeme: lexeme-begin marks the start and forward pointer scans ahead until a complete token is recognized.">
    <rect x="150" y="100" width="500" height="120" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="130" font-size="15" font-weight="bold" fill="#388e3c" text-anchor="middle">Two-Buffer Input Scheme</text>

    <rect x="180" y="150" width="200" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="280" y="175" font-size="12" fill="#2e7d32" text-anchor="middle">Buffer 1</text>

    <rect x="420" y="150" width="200" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
    <text x="520" y="175" font-size="12" fill="#2e7d32" text-anchor="middle">Buffer 2</text>

    <polygon points="200,145 210,140 210,150" fill="#f44336"/>
    <text x="180" y="135" font-size="10" fill="#f44336">lexemeBegin</text>

    <polygon points="350,145 360,140 360,150" fill="#1976d2"/>
    <text x="340" y="135" font-size="10" fill="#1976d2">forward</text>
  </g>

  <!-- Step 7: Lex Tool -->
  <g id="step7" class="step" data-narration="Lex is a lexical analyzer generator tool that automatically creates scanners from regular expression specifications. It has three sections: definitions, translation rules, and auxiliary C code.">
    <rect x="180" y="80" width="440" height="180" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="400" y="110" font-size="15" font-weight="bold" fill="#9c27b0" text-anchor="middle">Lex Specification Structure</text>

    <rect x="200" y="130" width="400" height="40" fill="#fce4ec" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="155" font-size="12" fill="#6a1b9a" text-anchor="middle">%{ Definitions %}</text>

    <rect x="200" y="175" width="400" height="40" fill="#fce4ec" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="200" font-size="12" fill="#6a1b9a" text-anchor="middle">%% Rules: pattern { action } %%</text>

    <rect x="200" y="220" width="400" height="40" fill="#fce4ec" stroke="#9c27b0" stroke-width="1"/>
    <text x="400" y="245" font-size="12" fill="#6a1b9a" text-anchor="middle">Auxiliary C Code</text>
  </g>

  <!-- Step 8: Error Handling -->
  <g id="step8" class="step" data-narration="The lexical analyzer detects errors like illegal characters, malformed tokens, and unclosed strings. Error recovery strategies include panic mode which skips characters until a valid token is found.">
    <rect x="150" y="100" width="500" height="140" rx="10" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="130" font-size="15" font-weight="bold" fill="#f44336" text-anchor="middle">Lexical Error Handling</text>

    <circle cx="250" cy="175" r="30" fill="#ffcdd2" stroke="#f44336" stroke-width="2"/>
    <text x="250" y="183" font-size="11" fill="#c62828" text-anchor="middle">Illegal</text>
    <text x="250" y="195" font-size="11" fill="#c62828" text-anchor="middle">chars</text>

    <circle cx="400" cy="175" r="30" fill="#ffcdd2" stroke="#f44336" stroke-width="2"/>
    <text x="400" y="183" font-size="11" fill="#c62828" text-anchor="middle">Malformed</text>
    <text x="400" y="195" font-size="11" fill="#c62828" text-anchor="middle">tokens</text>

    <circle cx="550" cy="175" r="30" fill="#ffcdd2" stroke="#f44336" stroke-width="2"/>
    <text x="550" y="183" font-size="11" fill="#c62828" text-anchor="middle">Unclosed</text>
    <text x="550" y="195" font-size="11" fill="#c62828" text-anchor="middle">strings</text>
  </g>
</svg>
