<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>
  <text x="400" y="35" text-anchor="middle" font-size="21" font-weight="bold" fill="#1976d2" font-family="Arial">The Role of the Lexical Analyzer</text>

  <!-- Step 0: Source code input (left side) -->
  <g id="step0" class="step" data-narration="The lexical analyzer is the first phase of a compiler. It receives a stream of characters representing the source code. Its primary job is to identify meaningful units called tokens from this raw character input.">
    <rect x="30" y="80" width="180" height="220" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2.5"/>
    <text x="120" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#9c27b0" font-family="Arial">Source Code</text>
    <line x1="50" y1="115" x2="190" y2="115" stroke="#9c27b0" stroke-width="1" opacity="0.3"/>
    <text x="50" y="140" font-size="11" font-family="monospace" fill="#9c27b0">int x = 42;</text>
    <text x="50" y="160" font-size="11" font-family="monospace" fill="#9c27b0">if (x > 10)</text>
    <text x="50" y="180" font-size="11" font-family="monospace" fill="#9c27b0">  y = x + 1;</text>
    <text x="50" y="210" font-size="10" fill="#9c27b0" font-family="Arial">Character stream:</text>
    <text x="50" y="230" font-size="9" font-family="monospace" fill="#9c27b0">i,n,t, ,x, ,=, ,4,2,;</text>
    <text x="50" y="250" font-size="9" font-family="monospace" fill="#9c27b0">i,f, ,(,x, ,&gt;, ,1,0,)</text>
    <text x="50" y="275" font-size="10" fill="#9c27b0" font-family="Arial">Includes whitespace</text>
    <text x="50" y="290" font-size="10" fill="#9c27b0" font-family="Arial">and comments</text>
  </g>

  <!-- Step 1: Lexical Analyzer box (center) -->
  <g id="step1" class="step" data-narration="The lexical analyzer, also called the scanner, strips whitespace and comments. It groups characters into lexemes and classifies each as a token with a name and optional attribute value.">
    <rect x="270" y="80" width="260" height="220" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
    <text x="400" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2" font-family="Arial">Lexical Analyzer</text>
    <text x="400" y="126" text-anchor="middle" font-size="12" fill="#1976d2" font-family="Arial">(Scanner)</text>
    <line x1="285" y1="135" x2="515" y2="135" stroke="#1976d2" stroke-width="1" opacity="0.3"/>
    <text x="290" y="158" font-size="11" fill="#1976d2" font-family="Arial">1. Read characters</text>
    <text x="290" y="178" font-size="11" fill="#1976d2" font-family="Arial">2. Strip whitespace</text>
    <text x="290" y="198" font-size="11" fill="#1976d2" font-family="Arial">3. Remove comments</text>
    <text x="290" y="218" font-size="11" fill="#1976d2" font-family="Arial">4. Group into lexemes</text>
    <text x="290" y="238" font-size="11" fill="#1976d2" font-family="Arial">5. Classify as tokens</text>
    <text x="290" y="258" font-size="11" fill="#1976d2" font-family="Arial">6. Return to parser</text>
    <line x1="210" y1="190" x2="265" y2="190" stroke="#9c27b0" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <text x="237" y="183" text-anchor="middle" font-size="9" fill="#9c27b0" font-family="Arial">chars</text>
  </g>

  <!-- Step 2: Parser box (right side) with getNextToken interaction -->
  <g id="step2" class="step" data-narration="The parser calls getNextToken to request the next token from the scanner. The scanner reads just enough characters to form one token and returns it. This on-demand model is memory efficient and fast.">
    <rect x="590" y="80" width="180" height="220" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2.5"/>
    <text x="680" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#388e3c" font-family="Arial">Syntax Analyzer</text>
    <text x="680" y="126" text-anchor="middle" font-size="12" fill="#388e3c" font-family="Arial">(Parser)</text>
    <line x1="605" y1="135" x2="755" y2="135" stroke="#388e3c" stroke-width="1" opacity="0.3"/>
    <text x="610" y="160" font-size="11" fill="#388e3c" font-family="Arial">Checks grammar</text>
    <text x="610" y="180" font-size="11" fill="#388e3c" font-family="Arial">Builds parse tree</text>
    <text x="610" y="200" font-size="11" fill="#388e3c" font-family="Arial">Detects syntax</text>
    <text x="610" y="218" font-size="11" fill="#388e3c" font-family="Arial">errors</text>
    <!-- Token arrow: scanner to parser -->
    <line x1="530" y1="165" x2="585" y2="165" stroke="#388e3c" stroke-width="2.5" marker-end="url(#arrowgreen)"/>
    <text x="558" y="157" text-anchor="middle" font-size="9" fill="#388e3c" font-family="Arial">token</text>
    <!-- getNextToken arrow: parser to scanner -->
    <line x1="585" y1="210" x2="535" y2="210" stroke="#ff9800" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arroworange)"/>
    <text x="558" y="230" text-anchor="middle" font-size="9" fill="#ff9800" font-family="Arial">getNextToken()</text>
  </g>

  <!-- Step 3: Symbol Table interaction -->
  <g id="step3" class="step" data-narration="The scanner interacts with the symbol table. When an identifier is found, it checks if the name already exists. New identifiers are inserted into the table. The token attribute points to its symbol table entry.">
    <rect x="310" y="330" width="180" height="100" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2.5"/>
    <text x="400" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800" font-family="Arial">Symbol Table</text>
    <line x1="325" y1="368" x2="475" y2="368" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
    <text x="330" y="390" font-size="10" font-family="monospace" fill="#ff9800">x  -> int, addr:04</text>
    <text x="330" y="408" font-size="10" font-family="monospace" fill="#ff9800">y  -> int, addr:08</text>
    <line x1="400" y1="300" x2="400" y2="325" stroke="#ff9800" stroke-width="2" marker-end="url(#arroworange)"/>
    <text x="415" y="318" font-size="9" fill="#ff9800" font-family="Arial">lookup/insert</text>
  </g>

  <!-- Step 4: Token output stream example -->
  <g id="step4" class="step" data-narration="The output is a stream of tokens. For example, the statement int x equals 42 semicolon produces tokens: keyword int, identifier x, operator assign, integer 42, and punctuation semicolon.">
    <text x="400" y="465" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2" font-family="Arial">Token Stream Output Example</text>
    <rect x="55" y="478" width="110" height="42" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="110" y="495" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2" font-family="Arial">keyword</text>
    <text x="110" y="512" text-anchor="middle" font-size="11" font-family="monospace" fill="#1976d2">int</text>
    <line x1="165" y1="499" x2="190" y2="499" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="195" y="478" width="110" height="42" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="250" y="495" text-anchor="middle" font-size="10" font-weight="bold" fill="#388e3c" font-family="Arial">id</text>
    <text x="250" y="512" text-anchor="middle" font-size="11" font-family="monospace" fill="#388e3c">x, ptr:04</text>
    <line x1="305" y1="499" x2="330" y2="499" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="335" y="478" width="110" height="42" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
    <text x="390" y="495" text-anchor="middle" font-size="10" font-weight="bold" fill="#ff9800" font-family="Arial">assign_op</text>
    <text x="390" y="512" text-anchor="middle" font-size="11" font-family="monospace" fill="#ff9800">=</text>
    <line x1="445" y1="499" x2="470" y2="499" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="475" y="478" width="110" height="42" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="530" y="495" text-anchor="middle" font-size="10" font-weight="bold" fill="#9c27b0" font-family="Arial">integer</text>
    <text x="530" y="512" text-anchor="middle" font-size="11" font-family="monospace" fill="#9c27b0">42</text>
    <line x1="585" y1="499" x2="610" y2="499" stroke="#1976d2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="615" y="478" width="110" height="42" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
    <text x="670" y="495" text-anchor="middle" font-size="10" font-weight="bold" fill="#f44336" font-family="Arial">semicolon</text>
    <text x="670" y="512" text-anchor="middle" font-size="11" font-family="monospace" fill="#f44336">;</text>
  </g>

  <!-- Step 5: Error handling -->
  <g id="step5" class="step" data-narration="The lexical analyzer detects errors like malformed numbers or unclosed strings. It uses panic mode recovery, skipping characters until a valid token is found, allowing compilation to continue and find more errors.">
    <rect x="60" y="540" width="320" height="50" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="220" y="562" text-anchor="middle" font-size="12" font-weight="bold" fill="#f44336" font-family="Arial">Error Detection: 12.3.4 or "Hello</text>
    <text x="220" y="580" text-anchor="middle" font-size="10" fill="#f44336" font-family="Arial">Panic mode: skip until valid token found</text>
    <rect x="420" y="540" width="350" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="595" y="562" text-anchor="middle" font-size="12" font-weight="bold" fill="#388e3c" font-family="Arial">Why separate from parser?</text>
    <text x="595" y="580" text-anchor="middle" font-size="10" fill="#388e3c" font-family="Arial">Simplicity, efficiency (DFA), portability</text>
  </g>
</svg>
