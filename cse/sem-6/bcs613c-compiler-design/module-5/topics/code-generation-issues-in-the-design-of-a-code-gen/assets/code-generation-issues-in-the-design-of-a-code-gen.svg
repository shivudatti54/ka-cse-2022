<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Code Generation">
    <rect x="50" y="50" width="700" height="100" fill="#2563eb" rx="10" />
    <text x="100" y="120" font-size="24" fill="#ffffff" font-family="Arial">Code Generation</text>
    <text x="100" y="160" font-size="18" fill="#ffffff" font-family="Arial">Translating source code into machine code</text>
  </g>
  <g id="step1" data-narration="Syntax Analysis">
    <rect x="50" y="200" width="200" height="100" fill="#10b981" rx="10" />
    <text x="60" y="270" font-size="18" fill="#ffffff" font-family="Arial">Syntax Analysis</text>
    <line x1="250" y1="250" x2="350" y2="250" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="350" y="200" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="360" y="270" font-size="18" fill="#ffffff" font-family="Arial">Semantic Analysis</text>
  </g>
  <g id="step2" data-narration="Intermediate Code Generation">
    <rect x="50" y="350" width="200" height="100" fill="#8b5cf6" rx="10" />
    <text x="60" y="420" font-size="18" fill="#ffffff" font-family="Arial">Intermediate Code</text>
    <line x1="250" y1="400" x2="350" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="350" y="350" width="200" height="100" fill="#10b981" rx="10" />
    <text x="360" y="420" font-size="18" fill="#ffffff" font-family="Arial">Optimization</text>
  </g>
  <g id="step3" data-narration="Optimization Techniques">
    <rect x="50" y="500" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="530" font-size="18" fill="#ffffff" font-family="Arial">Dead Code Elimination</text>
    <line x1="250" y1="525" x2="350" y2="525" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="350" y="500" width="200" height="50" fill="#8b5cf6" rx="10" />
    <text x="360" y="530" font-size="18" fill="#ffffff" font-family="Arial">Constant Folding</text>
  </g>
  <g id="step4" data-narration="Code Layout">
    <rect x="550" y="200" width="200" height="100" fill="#2563eb" rx="10" />
    <text x="560" y="270" font-size="18" fill="#ffffff" font-family="Arial">Load-Store Architecture</text>
    <line x1="750" y1="250" x2="650" y2="250" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="650" y="200" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="660" y="270" font-size="18" fill="#ffffff" font-family="Arial">Register Allocation</text>
  </g>
  <g id="step5" data-narration="Code Generation Techniques">
    <rect x="550" y="350" width="200" height="100" fill="#8b5cf6" rx="10" />
    <text x="560" y="420" font-size="18" fill="#ffffff" font-family="Arial">Subject-Expression Code Generation</text>
    <line x1="750" y1="400" x2="650" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="650" y="350" width="200" height="100" fill="#10b981" rx="10" />
    <text x="660" y="420" font-size="18" fill="#ffffff" font-family="Arial">Procedure Call Graph Code Generation</text>
  </g>
  <g id="step6" data-narration="Machine Code Generation">
    <rect x="350" y="550" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="360" y="580" font-size="18" fill="#ffffff" font-family="Arial">Machine Code</text>
  </g>
</svg>