<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="test-of-significance-small-samples">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Section 1: Two-Sample t-Test (Top-left) -->
  <g data-narration="The two-sample t test compares means of two independent groups when sample sizes are small less than 30. It uses the t distribution which has heavier tails than the normal to account for extra uncertainty in estimating population variance from small samples.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="38" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Two-Sample t-Test</text>
    <text x="110" y="58" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="9">Compares two group means</text>
    <text x="110" y="73" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="9">For small samples (n &lt; 30)</text>
    <text x="110" y="88" text-anchor="middle" fill="white" font-family="Arial" font-size="9">H0: mu1 = mu2</text>
  </g>

  <!-- Section 2: Assumptions (Top-right) -->
  <g data-narration="The test requires three key assumptions. Both populations must be normally distributed. The two samples must be independent of each other. The population variances must be equal which is called homoscedasticity. Violating these can lead to incorrect conclusions.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="310" y="38" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Assumptions</text>
    <text x="310" y="58" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="9">1. Normal populations</text>
    <text x="310" y="73" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="9">2. Independent samples</text>
    <text x="310" y="88" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="9">3. Equal variances (sigma1=sigma2)</text>
  </g>

  <!-- Section 3: Pooled Variance (Bottom-left) -->
  <g data-narration="The pooled variance combines both sample variances into a single weighted estimate. The formula is Sp squared equals n1 minus 1 times S1 squared plus n2 minus 1 times S2 squared all divided by n1 plus n2 minus 2. This gives a better estimate than either sample variance alone.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" stroke="#880e4f" stroke-width="1.5"/>
    <text x="110" y="138" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Pooled Variance</text>
    <text x="110" y="158" text-anchor="middle" fill="white" font-family="Arial" font-size="8">Sp2=((n1-1)S12+(n2-1)S22)</text>
    <text x="110" y="173" text-anchor="middle" fill="white" font-family="Arial" font-size="8">/ (n1 + n2 - 2)</text>
    <text x="110" y="192" text-anchor="middle" fill="#ffcdd2" font-family="Arial" font-size="9">Weighted average of variances</text>
  </g>

  <!-- Section 4: Test Statistic and Decision (Bottom-right) -->
  <g data-narration="The test statistic t equals x bar 1 minus x bar 2 divided by Sp times root of 1 over n1 plus 1 over n2. Compare with the t critical value at n1 plus n2 minus 2 degrees of freedom. Reject H zero if the absolute value of t exceeds t critical.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" stroke="#bf360c" stroke-width="1.5"/>
    <text x="310" y="138" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Test Statistic</text>
    <text x="310" y="158" text-anchor="middle" fill="white" font-family="Arial" font-size="8">t=(x1-x2)/(Sp*sqrt(1/n1+1/n2))</text>
    <text x="310" y="175" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">df = n1 + n2 - 2</text>
    <text x="310" y="192" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">Reject H0 if |t| &gt; t-critical</text>
  </g>

  <!-- Center Title -->
  <text x="210" y="225" text-anchor="middle" fill="#333" font-family="Arial" font-size="13" font-weight="bold">Test of Significance</text>
  <text x="210" y="242" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Means of Two Small Samples</text>

  <!-- Section 5: Worked Example -->
  <g data-narration="Example: Algorithm A has n1 equals 10 mean 22.5 variance 15.2 and Algorithm B has n2 equals 10 mean 19.5 variance 12.8. Pooled variance is 14 giving Sp 3.74. The t statistic is 1.80 with 18 degrees of freedom. Since 1.80 exceeds t critical 1.734 we reject H zero and conclude Algorithm B is faster.">
    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="210" y="282" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Example: Algorithm Comparison</text>
    <text x="210" y="302" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">Algo A: n=10, x-bar=22.5, S2=15.2 | Algo B: n=10, x-bar=19.5, S2=12.8</text>
    <text x="210" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Sp2 = (9x15.2 + 9x12.8)/18 = 14.0 | Sp = 3.74</text>
    <text x="210" y="340" text-anchor="middle" fill="white" font-family="Arial" font-size="9">t = (22.5-19.5)/(3.74 x sqrt(0.2)) = 3.0/1.67 = 1.80</text>
    <line x1="40" y1="350" x2="380" y2="350" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <text x="120" y="368" text-anchor="middle" fill="white" font-family="Arial" font-size="9">df=18, t-crit(0.05)=1.734</text>
    <text x="310" y="368" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">1.80 &gt; 1.734: Reject H0</text>
    <text x="210" y="380" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">Algorithm B is significantly faster</text>
  </g>
</svg>
