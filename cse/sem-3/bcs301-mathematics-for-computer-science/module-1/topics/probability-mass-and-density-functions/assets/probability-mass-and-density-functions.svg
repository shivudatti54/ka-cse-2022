<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#303f9f"/>
    </linearGradient>
    <linearGradient id="pmfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="pdfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="compareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="summaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:0.1"/>
    </linearGradient>
    
    <!-- Arrow Marker -->
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#455a64"/>
    </marker>
    
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    
    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes growBar {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .body { font-family: 'Segoe UI', Arial, sans-serif; }
    .formula { font-family: 'Times New Roman', serif; font-style: italic; }
    .anim-line { stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawLine 1.5s ease-out forwards; }
    .anim-fade { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .anim-grow { transform-origin: left center; animation: growBar 0.6s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1400" fill="#f8f9fa"/>
  
  <!-- ==================== STEP 0: TITLE ==================== -->
  <g class="step" id="step0" data-narration="Welcome! Today we'll explore probability mass and density functions - essential tools for understanding randomness in computer science.">
    <rect x="0" y="0" width="800" height="55" fill="url(#titleGrad)"/>
    <text x="400" y="35" text-anchor="middle" fill="white" font-size="24" class="title">Probability Mass and Density Functions</text>
    <text x="400" y="48" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">2022 Scheme - CSE Branch</text>
  </g>
  
  <!-- ==================== STEP 1: OVERVIEW ==================== -->
  <g class="step" id="step1" data-narration="Probability distributions describe how likely different outcomes are in random experiments, from coin flips to program execution times.">
    <rect x="40" y="65" width="720" height="85" rx="10" fill="white" filter="url(#shadow)"/>
    <rect x="40" y="65" width="720" height="20" rx="10" fill="#e8eaf6"/>
    <text x="60" y="82" fill="#303f9f" font-size="13" class="title">📊 What are Probability Distributions?</text>
    <text x="60" y="108" fill="#455a64" font-size="11" class="body">Probability distributions describe the likelihood of occurrence of different</text>
    <text x="60" y="122" fill="#455a64" font-size="11" class="body">outcomes from random experiments. In CS, we use them to model errors in</text>
    <text x="60" y="136" fill="#455a64" font-size="11" class="body">algorithms, execution times, and various system behaviors.</text>
  </g>
  
  <!-- ==================== STEP 2: MOTIVATION ==================== -->
  <g class="step" id="step2" data-narration="Understanding PMF and PDF is crucial for machine learning, data analysis, error modeling, and making predictions in software systems.">
    <rect x="40" y="160" width="350" height="85" rx="10" fill="#e3f2fd" filter="url(#shadow)"/>
    <text x="60" y="185" fill="#1565c0" font-size="12" class="title">🎯 Learning Objectives</text>
    <text x="60" y="205" fill="#455a64" font-size="10" class="body">• Model random phenomena in software</text>
    <text x="60" y="220" fill="#455a64" font-size="10" class="body">• Analyze algorithm performance</text>
    <text x="60" y="235" fill="#455a64" font-size="10" class="body">• Build statistical ML models</text>
    
    <rect x="410" y="160" width="350" height="85" rx="10" fill="#fce4ec" filter="url(#shadow)"/>
    <text x="430" y="185" fill="#c62828" font-size="12" class="title">🔑 Two Types We'll Cover</text>
    <text x="430" y="205" fill="#455a64" font-size="10" class="body">• <tspan fill="#1976d2" font-weight="bold">PMF</tspan> - for discrete outcomes</text>
    <text x="430" y="220" fill="#455a64" font-size="10" class="body">• <tspan fill="#388e3c" font-weight="bold">PDF</tspan> - for continuous outcomes</text>
    <text x="430" y="235" fill="#455a64" font-size="10" class="body">Understanding when to use each is key!</text>
  </g>
  
  <!-- ==================== STEP 3: PMF DEFINITION ==================== -->
  <g class="step" id="step3" data-narration="A Probability Mass Function gives the exact probability for each outcome of a discrete random variable - think coin flips or dice rolls.">
    <rect x="40" y="255" width="720" height="100" rx="10" fill="url(#pmfGrad)" filter="url(#shadow)"/>
    <rect x="40" y="255" width="720" height="25" rx="10" fill="#1976d2"/>
    <text x="60" y="272" fill="white" font-size="13" class="title">📦 Probability Mass Function (PMF)</text>
    <text x="60" y="305" fill="#0d47a1" font-size="11" class="body">Definition: For a discrete random variable X, the PMF p_X(x) gives the</text>
    <text x="60" y="320" fill="#0d47a1" font-size="11" class="body">probability that X equals a specific value x:</text>
    
    <rect x="280" y="330" width="240" height="18" rx="5" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="343" text-anchor="middle" fill="#0d47a1" font-size="14" class="formula">p_X(x) = P(X = x)</text>
    
    <text x="60" y="365" fill="#546e7a" font-size="10" class="body">• Discrete variables: countable values (1, 2, 3...)</text>
    <text x="60" y="380" fill="#546e7a" font-size="10" class="body">• Example: number of heads in 3 coin tosses</text>
  </g>
  
  <!-- ==================== STEP 4: PMF PROPERTIES ==================== -->
  <g class="step" id="step4" data-narration="PMFs have two key properties: non-negativity means all probabilities are positive, and normalization ensures all probabilities sum to exactly one.">
    <rect x="40" y="365" width="720" height="100" rx="10" fill="white" filter="url(#shadow)"/>
    <rect x="40" y="365" width="720" height="25" rx="10" fill="#42a5f5"/>
    <text x="60" y="382" fill="white" font-size="13" class="title">✅ PMF Properties</text>
    
    <!-- Property 1 -->
    <rect x="60" y="405" width="280" height="50" rx="8" fill="#e3f2fd"/>
    <text x="75" y="422" fill="#1565c0" font-size="11" class="title">Property 1: Non-negativity</text>
    <text x="75" y="440" fill="#0d47a1" font-size="12" class="formula">P(X = x) ≥ 0 for all x</text>
    <text x="75" y="452" fill="#546e7a" font-size="9" class="body">All probabilities are positive</text>
    
    <!-- Property 2 -->
    <rect x="360" y="405" width="280" height="50" rx="8" fill="#e8f5e9"/>
    <text x="375" y="422" fill="#2e7d32" font-size="11" class="title">Property 2: Normalization</text>
    <text x="375" y="440" fill="#1b5e20" font-size="12" class="formula">Σ P(X = x_i) = 1</text>
    <text x="375" y="452" fill="#546e7a" font-size="9" class="body">Sum of all probabilities equals 1</text>
  </g>
  
  <!-- ==================== STEP 5: PMF EXAMPLE ==================== -->
  <g class="step" id="step5" data-narration="Here's a coin toss example: with two outcomes - heads or tails - each has probability 0.5, and they sum to 1 as required.">
    <rect x="40" y="475" width="720" height="100" rx="10" fill="#e3f2fd" filter="url(#shadow)"/>
    <rect x="40" y="475" width="720" height="25" rx="10" fill="#1976d2"/>
    <text x="60" y="492" fill="white" font-size="13" class="title">🪙 PMF Example: Coin Toss</text>
    
    <!-- Visual coin representation -->
    <circle cx="100" cy="540" r="25" fill="#ffc107" stroke="#ff8f00" stroke-width="2"/>
    <text x="100" y="545" text-anchor="middle" fill="#5d4037" font-size="16" font-weight="bold">H</text>
    
    <circle cx="180" cy="540" r="25" fill="#bdbdbd" stroke="#757575" stroke-width="2"/>
    <text x="180" y="545" text-anchor="middle" fill="#5d4037" font-size="16" font-weight="bold">T</text>
    
    <!-- PMF Table -->
    <rect x="240" y="510" width="200" height="55" rx="5" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="290" y="525" fill="#0d47a1" font-size="10" class="body">P(X = H) = 0.5</text>
    <text x="290" y="545" fill="#0d47a1" font-size="10" class="body">P(X = T) = 0.5</text>
    <line x1="340" y1="530" x2="340" y2="570" stroke="#e0e0e0" stroke-width="1"/>
    <text x="350" y="545" fill="#1b5e20" font-size="11" font-weight="bold" class="body">Sum = 1.0 ✓</text>
    
    <!-- Formula -->
    <text x="470" y="530" fill="#0d47a1" font-size="11" class="body">For a fair coin:</text>
    <text x="470" y="550" fill="#0d47a1" font-size="13" class="formula">P(H) = P(T) = ½</text>
    <text x="470" y="570" fill="#546e7a" font-size="10" class="body">Each outcome equally likely</text>
  </g>
  
  <!-- ==================== STEP 6: PDF DEFINITION ==================== -->
  <g class="step" id="step6" data-narration="Unlike discrete variables, continuous random variables can take any value. The PDF gives density - probability per unit - not exact probability.">
    <rect x="40" y="585" width="720" height="100" rx="10" fill="url(#pdfGrad)" filter="url(#shadow)"/>
    <rect x="40" y="585" width="720" height="25" rx="10" fill="#388e3c"/>
    <text x="60" y="602" fill="white" font-size="13" class="title">📈 Probability Density Function (PDF)</text>
    <text x="60" y="635" fill="#1b5e20" font-size="11" class="body">Definition: For a continuous random variable Y, the PDF f_Y(y) gives the</text>
    <text x="60" y="650" fill="#1b5e20" font-size="11" class="body">probability density at point y (probability per unit value):</text>
    
    <rect x="280" y="660" width="240" height="18" rx="5" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="673" text-anchor="middle" fill="#1b5e20" font-size="14" class="formula">f_Y(y) = P(a &lt; Y ≤ b)</text>
    
    <text x="60" y="695" fill="#546e7a" font-size="10" class="body">• Continuous variables: any value in an interval</text>
    <text x="60" y="710" fill="#546e7a" font-size="10" class="body">• Example: height of adult humans (any value from 4 to 8 feet)</text>
  </g>
  
  <!-- ==================== STEP 7: PDF PROPERTIES ==================== -->
  <g class="step" id="step7" data-narration="PDFs also have non-negativity and normalization, but use integration instead of summation since we're dealing with continuous values.">
    <rect x="40" y="695" width="720" height="100" rx="10" fill="white" filter="url(#shadow)"/>
    <rect x="40" y="695" width="720" height="25" rx="10" fill="#66bb6a"/>
    <text x="60" y="712" fill="white" font-size="13" class="title">✅ PDF Properties</text>
    
    <!-- Property 1 -->
    <rect x="60" y="735" width="280" height="50" rx="8" fill="#e8f5e9"/>
    <text x="75" y="752" fill="#2e7d32" font-size="11" class="title">Property 1: Non-negativity</text>
    <text x="75" y="770" fill="#1b5e20" font-size="12" class="formula">f(x) ≥ 0 for all x</text>
    <text x="75" y="782" fill="#546e7a" font-size="9" class="body">Densities are always positive</text>
    
    <!-- Property 2 -->
    <rect x="360" y="735" width="280" height="50" rx="8" fill="#e3f2fd"/>
    <text x="375" y="752" fill="#1565c0" font-size="11" class="title">Property 2: Normalization (Integral)</text>
    <text x="375" y="770" fill="#0d47a1" font-size="12" class="formula">∫ f(x)dx = 1</text>
    <text x="375" y="782" fill="#546e7a" font-size="9" class="body">Area under curve equals 1</text>
  </g>
  
  <!-- ==================== STEP 8: PDF EXAMPLE ==================== -->
  <g class="step" id="step8" data-narration="The normal distribution is a classic PDF example. Its bell curve shape models many real-world phenomena from test scores to measurement errors.">
    <rect x="40" y="805" width="720" height="110" rx="10" fill="#e8f5e9" filter="url(#shadow)"/>
    <rect x="40" y="805" width="720" height="25" rx="10" fill="#388e3c"/>
    <text x="60" y="822" fill="white" font-size="13" class="title">🔔 PDF Example: Normal Distribution</text>
    
    <!-- Normal Distribution Curve -->
    <path d="M 80 880 Q 200 880 240 830 Q 280 780 400 780 Q 520 780 560 830 Q 600 880 720 880" 
          fill="url(#curveGrad)" stroke="#1976d2" stroke-width="2" stroke-dasharray="500" stroke-dashoffset="500">
      <animate attributeName="stroke-dashoffset" from="500" to="0" dur="1.5s" fill="freeze"/>
    </path>
  </g>
</svg>