<svg viewBox="0 0 800 1360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes bellCurve {
      from { stroke-dashoffset: 800; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Times New Roman', serif; font-style: italic; }
    .title { font-weight: bold; font-size: 14px; }
    .body { font-size: 10px; }
    .label { font-size: 8px; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1360" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to our exploration of two fundamental probability distributions: Poisson and Normal.">
    <rect x="0" y="0" width="800" height="55" fill="#1976d2"/>
    <text x="400" y="22" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Poisson and Normal Distributions</text>
    <text x="400" y="40" text-anchor="middle" fill="#e3f2fd" font-size="11">Derivations, Properties, and Applications</text>
  </g>
  
  <!-- Step 1: Why Study -->
  <g class="step" id="step1" data-narration="These distributions model real-world phenomena from server requests to measurement errors and are essential in computer science.">
    <rect x="20" y="65" width="760" height="80" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="85" fill="#1565c0" font-size="12" font-weight="bold">Why This Matters</text>
    <rect x="40" y="95" width="3" height="40" fill="#1976d2">
      <animate attributeName="height" from="0" to="40" dur="0.5s" fill="freeze"/>
    </rect>
    <text x="55" y="108" fill="#424242" font-size="10">
      <tspan x="55" dy="0">Poisson: Models discrete events (network packets, server requests, defects)</tspan>
      <tspan x="55" dy="14">Normal: Models continuous measurements (sensor data, noise, test scores)</tspan>
      <tspan x="55" dy="14">Appears in every exam: 10-16 marks weightage</tspan>
    </text>
  </g>
  
  <!-- Step 2: Overview -->
  <g class="step" id="step2" data-narration="We will derive the mean for both distributions and solve a practical problem using Poisson distribution.">
    <rect x="20" y="155" width="370" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="175" fill="#2e7d32" font-size="11" font-weight="bold">Poisson Distribution</text>
    <text x="40" y="190" fill="#424242" font-size="9">Type: Discrete</text>
    <text x="40" y="203" fill="#424242" font-size="9">Parameter: λ (mean rate)</text>
    <text x="40" y="216" fill="#424242" font-size="9">Mean: E[X] = λ</text>
    <text x="40" y="229" fill="#424242" font-size="9">Use: Counting events over time/space</text>
    
    <rect x="410" y="155" width="370" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="430" y="175" fill="#e65100" font-size="11" font-weight="bold">Normal Distribution</text>
    <text x="430" y="190" fill="#424242" font-size="9">Type: Continuous</text>
    <text x="430" y="203" fill="#424242" font-size="9">Parameters: μ (mean), σ (std dev)</text>
    <text x="430" y="216" fill="#424242" font-size="9">Mean: E[X] = μ</text>
    <text x="430" y="229" fill="#424242" font-size="9">Use: Measurements, natural phenomena</text>
  </g>
  
  <!-- Step 3: Poisson PMF -->
  <g class="step" id="step3" data-narration="The Poisson probability mass function calculates the probability of exactly k events occurring in a fixed interval.">
    <rect x="20" y="250" width="760" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="270" fill="#2e7d32" font-size="12" font-weight="bold">Poisson Distribution: Probability Mass Function</text>
    <text x="40" y="290" fill="#424242" font-size="10">Models the probability of k events in a fixed interval</text>
    <text x="400" y="320" text-anchor="middle" class="formula" font-size="16">
      <tspan>P(X = k) =</tspan>
      <tspan dy="-5">e<sup>-λ</sup> · λ<sup>k</sup></tspan>
      <tspan dy="5">k!</tspan>
    </text>
    <text x="400" y="345" text-anchor="middle" fill="#616161" font-size="9">where k = 0, 1, 2, 3... and λ = average rate</text>
  </g>
  
  <!-- Step 4: Poisson Mean Derivation Start -->
  <g class="step" id="step4" data-narration="To derive the mean, we start with the definition of expected value and substitute the Poisson PMF.">
    <rect x="20" y="355" width="760" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="375" fill="#2e7d32" font-size="12" font-weight="bold">Deriving Poisson Mean: Step 1</text>
    <text x="40" y="395" fill="#424242" font-size="10">Start with E[X] definition and substitute PMF</text>
    <text x="40" y="415" class="formula" font-size="11">
      E[X] = Σ k · P(X=k) = Σ<tspan baseline-shift="sub">k=0</tspan><tspan>^∞ k · </tspan>
      <tspan>e<sup>-λ</sup>λ<sup>k</sup></tspan>
      <tspan>/k!</tspan>
    </text>
    <line x1="250" y1="408" x2="320" y2="408" stroke="#1976d2" stroke-width="1" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1s" fill="freeze"/>
    </line>
    <text x="340" y="415" fill="#616161" font-size="10">k=0 term is 0, start from k=1</text>
    <path d="M 600 395 L 750 395" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="610" y="415" class="formula" font-size="10">= Σ<tspan baseline-shift="sub">k=1</tspan><tspan>^∞ </tspan><tspan>e<sup>-λ</sup>λ<sup>k</sup></tspan><tspan>/(k-1)!</tspan>
    </text>
  </g>
  
  <!-- Step 5: Poisson Mean Derivation Mid -->
  <g class="step" id="step5" data-narration="Factor out λ and e^-λ, then substitute j = k-1 to transform the series into a familiar form.">
    <rect x="20" y="460" width="760" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="480" fill="#2e7d32" font-size="12" font-weight="bold">Deriving Poisson Mean: Step 2</text>
    <text x="40" y="500" fill="#424242" font-size="10">Factor out λ and e^-λ, let j = k-1</text>
    <text x="40" y="525" class="formula" font-size="11">
      E[X] = e<sup>-λ</sup> · λ · Σ<tspan baseline-shift="sub">j=0</tspan><tspan>^∞ </tspan><tspan>λ<sup>j</sup></tspan><tspan>/j!</tspan>
    </text>
    <text x="400" y="545" text-anchor="middle" fill="#616161" font-size="10">This is the Taylor series expansion of e<sup>λ</sup></text>
    <rect x="550" y="500" width="200" height="50" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4,2">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.8s" fill="freeze"/>
    </rect>
    <text x="650" y="525" text-anchor="middle" class="formula" font-size="11" fill="#2e7d32">Σ = e<sup>λ</sup></text>
  </g>
  
  <!-- Step 6: Poisson Mean Result -->
  <g class="step" id="step6" data-narration="The infinite series sums to e^λ, which cancels with e^-λ, leaving us with the beautiful result E[X] = λ.">
    <rect x="20" y="565" width="760" height="75" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="585" fill="#c62828" font-size="12" font-weight="bold">Poisson Mean Result</text>
    <text x="40" y="610" class="formula" font-size="14">
      E[X] = e<sup>-λ</sup> · λ · e<sup>λ</sup> = λ
    </text>
    <text x="400" y="625" text-anchor="middle" fill="#616161" font-size="10">The mean equals the rate parameter λ</text>
    <circle cx="700" cy="605" r="20" fill="#4caf50">
      <animate attributeName="r" from="0" to="20" dur="0.5s" fill="freeze"/>
    </circle>
    <text x="700" y="610" text-anchor="middle" fill="white" font-size="12" font-weight="bold">✓</text>
  </g>
  
  <!-- Step 7: Normal PDF -->
  <g class="step" id="step7" data-narration="The Normal distribution describes continuous data with a bell-shaped curve centered at μ.">
    <rect x="20" y="650" width="760" height="95" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="670" fill="#e65100" font-size="12" font-weight="bold">Normal Distribution: Probability Density Function</text>
    <text x="40" y="690" fill="#424242" font-size="10">Continuous distribution symmetric about the mean</text>
    <text x="400" y="720" text-anchor="middle" class="formula" font-size="15">
      f(x) = <tspan>1</tspan><tspan>/</tspan><tspan>σ√(2π)</tspan><tspan> · e</tspan><tspan baseline-shift="super" font-size="10">-<tspan>1/2</tspan>((x-μ)/σ)²</tspan>
    </text>
    <text x="400" y="745" text-anchor="middle" fill="#616161" font-size="9">μ = mean (center), σ = standard deviation (spread)</text>
  </g>
  
  <!-- Step 8: Normal Mean Derivation Start -->
  <g class="step" id="step8" data-narration="For Normal distribution, we use the substitution z = (x-μ)/σ to standardize the integration.">
    <rect x="20" y="755" width="760" height="95" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="775" fill="#e65100" font-size="12" font-weight="bold">Deriving Normal Mean: Step 1</text>
    <text x="40" y="795" fill="#424242" font-size="10">Substitute z = (x-μ)/σ, so x = μ + σz and dx = σdz</text>
    <text x="40" y="820" class="formula" font-size="11">
      E[X] = <tspan>1</tspan><tspan>/</tspan><tspan>σ√(2π)</tspan><tspan> ∫</tspan><tspan baseline-shift="sub">-∞</tspan><tspan baseline-shift="super">∞</tspan><tspan> x · e</tspan><tspan baseline-shift="super" font-size="9">-<tspan>1/2</tspan>((x-μ)/σ)²</tspan><tspan> dx</tspan>
    </text>
    <text x="500" y="820" class="formula" font-size="11" fill="#e65100">
      = <tspan>1</tspan><tspan>/</tspan><tspan>√(2π)</tspan><tspan> ∫</tspan><tspan baseline-shift="sub">-∞</tspan><tspan baseline-shift="super">∞</tspan><tspan> (μ + σz) · e</tspan><tspan baseline-shift="super" font-size="9">-<tspan>1/2</tspan>z²</tspan><tspan> dz</tspan>
    </text>
  </g>
  
  <!-- Step 9: Normal Mean Derivation Mid -->
  <g class="step" id="step9" data-narration="We split the integral into two parts: one with μ (even function) and one with z (odd function).">
    <rect x="20" y="860" width="760" height="95" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="880" fill="#e65100" font-size="12" font-weight="bold">Deriving Normal Mean: Step 2</text>
    <text x="40" y="900" fill="#424242" font-size="10">Split into two integrals</text>
    <text x="40" y="925" class="formula" font-size="11">
      E[X] = <tspan>1</tspan><tspan>/</tspan><tspan>√(2π)</tspan><tspan> [ μ∫e</tspan><tspan baseline-shift="super" font-size="9">-<tspan>1/2</tspan>z²</tspan><tspan>dz + σ∫z·e</tspan><tspan baseline-shift="super" font-size="9">-<tspan>1/2</tspan>z²</tspan><tspan>dz ]</tspan>
    </text>
    <rect x="500" y="895" width="260" height="55" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="510" y="912" fill="#e65100" font-size="9" font-weight="bold">Key Properties:</text>
    <text x="510" y="927" fill="#424242" font-size="9">∫ e^(-z²/2) dz = √(2π)</text>
    <text x="510" y="941" fill="#424242" font-size="9">∫ z·e^(-z²/2) dz = 0 (odd function)</text>
  </g>
  
  <!-- Step 10: Normal Mean Result -->
  <g class="step" id="step10" data-narration="The first integral gives √2π, the second is zero, leaving us with E[X] = μ.">
    <rect x="20" y="965" width="760" height="75" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="985" fill="#c62828" font-size="12" font-weight="bold">Normal Mean Result</text>
    <text x="40" y="1010" class="formula" font-size="14">
      E[X] = <tspan>1</tspan><tspan>/</tspan><tspan>√(2π)</tspan><tspan> [ μ·√(2π) + σ·0 ] = μ</tspan>
    </text>
    <text x="450" y="1025" text-anchor="middle" fill="#616161" font-size="10">The mean equals the parameter μ</text>
    <circle cx="700" cy="1005" r="20" fill="#4caf50">
      <animate attributeName="r" from="0" to="20" dur="0.5s" fill="freeze"/>
    </circle>
    <text x="700" y="1010" text-anchor="middle" fill="white" font-size="12" font-weight="bold">✓</text>
  </g>
  
  <!-- Step 11: Example Problem -->
  <g class="step" id="step11" data-narration="Let's apply Poisson: with λ=4, what's the probability of exactly 6 server requests in one second?">
    <rect x="20" y="1050" width="760" height="95" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="1070" fill="#6a1b9a" font-size="12" font-weight="bold">Example Problem: Poisson Application</text>
    <text x="40" y="1090" fill="#424242" font-size="10">Web server receives λ = 4 requests/second on average. Find P(X = 6)</text>
    <text x="40" y="1115" class="formula" font-size="11">
      P(X=6) = e<sup>-4</sup> · 4<sup>6</sup> / 6! = 0.0183 × 4096 / 720
    </text>
    <text x="500" y="1115" class="formula" font-size="12" fill="#6a1b9a">
      ≈ 0.1042 (10.42%)
    </text>
    <path d="M 50 1140 L 200 1140" stroke="#9c27b0" stroke-width="2" stroke-dasharray="100,100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1s" fill="freeze"/>
    </path>
    <text x="55" y="1155" fill="#616161" font-size="9">~10.4% chance of exactly 6 requests</text>
  </g>
  
  <!-- Step 12: Visual Comparison -->
  <g class="step" id="step12" data-narration="Visual comparison: Poisson shows discrete bars, Normal shows the smooth bell curve.">
    <rect x="20" y="1155" width="760" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="1175" fill="#1565c0" font-size="12" font-weight="bold">Visual Comparison</text>
    
    <!-- Poisson discrete bars -->
    <g transform="translate(40, 1220)">
      <rect x="0" y="25" width="12" height="5" fill="#4caf50">
        <animate attributeName="height" from="0" to="5" dur="0.3s" fill="freeze"/>
        <animate attributeName="y" from="30" to="25" dur="0.3s" fill="freeze"/>
      </rect>
      <rect x="16" y="20" width="12" height="10" fill="#4caf50">
        <animate attributeName="height" from="0" to="10" dur="0.4s" fill="freeze"/>
        <animate attributeName="y" from="30" to="20" dur="0.4s" fill="freeze"/>
      </rect>
      <rect x="32" y="12" width="12" height="18" fill="#4caf50">
        <animate attributeName="height" from="0" to="18" dur="0.5s" fill="freeze"/>
        <animate attributeName="y" from="30" to="12" dur="0.5s" fill="freeze"/>
      </rect>
      <rect x="48" y="0" width="12" height="30" fill="#4caf50">
        <animate attributeName="height" from="0" to="30" dur="0.6s" fill="freeze"/>
        <animate attributeName="y" from="30" to="0" dur="0.6s" fill="freeze"/>
      </rect>
      <text x="4" y="40" font-size="7" fill="#2e7d32">0</text>
      <text x="20" y="40" font-size="7" fill="#2e7d32">1</text>
      <text x="36" y="40" font-size="7" fill="#2e7d32">2</text>
      <text x="52" y="40" font-size="7" fill="#2e7d32">3</text>
    </g>
    
    <!-- Normal bell curve -->
    <g transform="translate(250, 1200)">
  </g>
  </g>
</svg>