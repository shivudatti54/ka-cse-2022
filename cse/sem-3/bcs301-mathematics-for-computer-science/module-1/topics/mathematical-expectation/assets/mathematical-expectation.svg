<svg viewBox="0 0 800 1450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#3949ab"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { font-family: 'Segoe UI', sans-serif; font-weight: bold; }
    .formula { font-family: 'Times New Roman', serif; font-style: italic; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1450" fill="#f8f9fa"/>

  <!-- STEP 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Mathematical Expectation. This fundamental concept helps predict average outcomes in random events.">
    <rect x="0" y="0" width="800" height="50" fill="url(#titleGrad)"/>
    <text x="400" y="32" text-anchor="middle" font-size="22" fill="white" font-weight="bold">Mathematical Expectation</text>
    <text x="400" y="45" text-anchor="middle" font-size="10" fill="#c5cae9">Expected Value • Properties • Applications</text>
  </g>

  <!-- STEP 1: What is Mathematical Expectation -->
  <g class="step" id="step1" data-narration="Mathematical expectation quantifies the average outcome of an experiment over many repeated trials.">
    <rect x="20" y="60" width="760" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="82" font-size="13" fill="#1976d2" font-weight="bold">What is Mathematical Expectation?</text>
    <text x="40" y="102" font-size="10" fill="#424242">Also called "Expected Value" or "Mean" - it represents the long-run average</text>
    <text x="40" y="118" font-size="10" fill="#424242">of a random variable if an experiment is repeated infinitely many times.</text>
    <path d="M700 80 L750 80 L745 75 M750 80 L745 85" stroke="#1976d2" stroke-width="2" fill="none">
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.5s"/>
    </path>
  </g>

  <!-- STEP 2: Why It Matters -->
  <g class="step" id="step2" data-narration="This concept is crucial in finance for assessing investments, in machine learning for probabilistic models, and algorithm analysis.">
    <rect x="20" y="155" width="370" height="85" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="177" font-size="12" fill="#e65100" font-weight="bold">Why Does It Matter?</text>
    <text x="40" y="195" font-size="10" fill="#424242">• Predict average outcomes in games</text>
    <text x="40" y="210" font-size="10" fill="#424242">• Assess investment risks and returns</text>
    <rect x="400" y="155" width="380" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="420" y="177" font-size="12" fill="#7b1fa2" font-weight="bold">Applications in CS</text>
    <text x="420" y="195" font-size="10" fill="#424242">• Algorithm analysis &amp; simulations</text>
    <text x="420" y="210" font-size="10" fill="#424242">• Machine learning probabilistic models</text>
  </g>

  <!-- STEP 3: Discrete Random Variable Definition -->
  <g class="step" id="step3" data-narration="For discrete random variables, the expected value equals the sum of each value multiplied by its probability.">
    <rect x="20" y="250" width="760" height="105" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="272" font-size="13" fill="#2e7d32" font-weight="bold">Discrete Random Variable Formula</text>
    <text x="40" y="300" font-size="11" class="formula" fill="#1b5e20">E[X] = Σ xᵢ · P(X = xᵢ)</text>
    <text x="40" y="320" font-size="10" fill="#424242">where xᵢ are possible values and P(X = xᵢ) are their probabilities</text>
    <rect x="550" y="280" width="210" height="60" rx="6" fill="white" stroke="#4caf50" stroke-width="1"/>
    <text x="560" y="300" font-size="9" fill="#2e7d32" font-weight="bold">Example:</text>
    <text x="560" y="315" font-size="9" fill="#424242">Die roll: E[X] = 1·⅙ + 2·⅙ + ... + 6·⅙ = 3.5</text>
    <text x="560" y="330" font-size="9" fill="#424242">Expected value = 3.5</text>
    <!-- Draw summation symbol -->
    <path d="M80 290 L80 295" stroke="#2e7d32" stroke-width="2">
      <animate attributeName="stroke-dasharray" from="0,20" to="20,0" dur="0.5s" begin="0.3s"/>
    </path>
  </g>

  <!-- STEP 4: Continuous Random Variable Definition -->
  <g class="step" id="step4" data-narration="For continuous random variables, expectation is calculated by integrating x times the probability density function.">
    <rect x="20" y="365" width="760" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="387" font-size="13" fill="#1565c0" font-weight="bold">Continuous Random Variable Formula</text>
    <text x="40" y="415" font-size="11" class="formula" fill="#0d47a1">E[X] = ∫ x · f(x) dx</text>
    <text x="40" y="435" font-size="10" fill="#424242">where f(x) is the probability density function (pdf)</text>
    <!-- Visual representation -->
    <rect x="300" y="395" width="200" height="55" rx="6" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="310" y="412" font-size="9" fill="#1565c0" font-weight="bold">Uniform Distribution on [0,4]:</text>
    <text x="310" y="427" font-size="9" class="formula" fill="#424242">E[X] = ∫₀⁴ x·(¼)dx = 2</text>
    <!-- Integration symbol -->
    <path d="M65 405 Q70 400 75 405" stroke="#1565c0" stroke-width="2" fill="none">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s"/>
    </path>
  </g>

  <!-- STEP 5: Property - Linearity -->
  <g class="step" id="step5" data-narration="Linearity of expectation states that the expected value of aX plus bY equals a times E[X] plus b times E[Y].">
    <rect x="20" y="475" width="760" height="90" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="497" font-size="13" fill="#e65100" font-weight="bold">Property 1: Linearity of Expectation</text>
    <text x="40" y="525" font-size="11" class="formula" fill="#bf360c">E[aX + bY] = a·E[X] + b·E[Y]</text>
    <text x="40" y="548" font-size="10" fill="#424242">This holds for ANY random variables X and Y, regardless of independence!</text>
    <!-- Visual proof -->
    <rect x="350" y="505" width="410" height="50" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="360" y="522" font-size="9" fill="#e65100">Constants "pull out": E[3X + 5] = 3E[X] + 5</text>
    <text x="360" y="540" font-size="9" fill="#424242">This property makes complex calculations much simpler!</text>
  </g>

  <!-- STEP 6: Property - Expected Value of Sum -->
  <g class="step" id="step6" data-narration="The expected value of a sum equals the sum of expected values, regardless of whether the variables are independent.">
    <rect x="20" y="575" width="760" height="90" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="597" font-size="13" fill="#2e7d32" font-weight="bold">Property 2: Expected Value of Sum</text>
    <text x="40" y="625" font-size="11" class="formula" fill="#1b5e20">E[X + Y] = E[X] + E[Y]</text>
    <text x="40" y="648" font-size="10" fill="#424242">Note: Independence is NOT required for sums, but IS required for E[XY] = E[X]·E[Y]</text>
    <!-- Visual -->
    <rect x="400" y="595" width="360" height="60" rx="6" fill="white" stroke="#4caf50" stroke-width="1"/>
    <text x="410" y="612" font-size="9" fill="#2e7d32">Example: Two dice</text>
    <text x="410" y="627" font-size="9" fill="#424242">E[Sum] = E[Die₁] + E[Die₂] = 3.5 + 3.5 = 7</text>
    <text x="410" y="642" font-size="9" fill="#424242">This matches our dice example exactly!</text>
  </g>

  <!-- STEP 7: Property - Non-negativity -->
  <g class="step" id="step7" data-narration="A random variable that is always non-negative has an expected value that is also non-negative.">
    <rect x="20" y="675" width="760" height="75" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="697" font-size="13" fill="#c62828" font-weight="bold">Property 3: Non-Negativity</text>
    <text x="40" y="725" font-size="11" class="formula" fill="#b71c1c">If P(X ≥ 0) = 1, then E[X] ≥ 0</text>
    <text x="500" y="725" font-size="10" fill="#424242">Intuitively: average of non-negative values cannot be negative</text>
  </g>

  <!-- STEP 8: Example 1 - Dice -->
  <g class="step" id="step8" data-narration="Let's calculate the expected sum when rolling two dice. Each sum has different probabilities based on number of ways to achieve it.">
    <rect x="20" y="760" width="760" height="125" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="782" font-size="13" fill="#7b1fa2" font-weight="bold">Example: Rolling Two Dice (Sum)</text>
    <!-- Distribution table -->
    <rect x="40" y="795" width="300" height="80" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="810" font-size="9" fill="#7b1fa2" font-weight="bold">Sum | Ways | Probability</text>
    <text x="50" y="825" font-size="8" fill="#424242">2   | 1    | 1/36</text>
    <text x="50" y="838" font-size="8" fill="#424242">3   | 2    | 2/36</text>
    <text x="50" y="851" font-size="8" fill="#424242">4   | 3    | 3/36</text>
    <text x="120" y="825" font-size="8" fill="#424242">5   | 4    | 4/36</text>
    <text x="120" y="838" font-size="8" fill="#424242">6   | 5    | 5/36</text>
    <text x="120" y="851" font-size="8" fill="#424242">7   | 6    | 6/36 ← Max probability!</text>
    <text x="190" y="825" font-size="8" fill="#424242">8   | 5    | 5/36</text>
    <text x="190" y="838" font-size="8" fill="#424242">9   | 4    | 4/36</text>
    <text x="190" y="851" font-size="8" fill="#424242">10  | 3    | 3/36</text>
    <text x="260" y="825" font-size="8" fill="#424242">11  | 2    | 2/36</text>
    <text x="260" y="851" font-size="8" fill="#424242">12  | 1    | 1/36</text>
    <!-- Calculation -->
    <rect x="350" y="795" width="420" height="80" rx="6" fill="white" stroke="#7b1fa2" stroke-width="1"/>
    <text x="360" y="812" font-size="10" fill="#7b1fa2" font-weight="bold">Calculation:</text>
    <text x="360" y="830" font-size="9" class="formula" fill="#424242">E[X] = Σ (sum × probability)</text>
    <text x="360" y="845" font-size="9" class="formula" fill="#424242">= 2·⅟₃₆ + 3·₂₋₃₆ + 4·₃₋₃₆ + ... + 12·⅟₃₆</text>
    <text x="360" y="860" font-size="10" fill="#7b1fa2" font-weight="bold">= 252/36 = 7</text>
  </g>

  <!-- STEP 9: Example 2 - Continuous -->
  <g class="step" id="step9" data-narration="For continuous distributions, we integrate. This uniform distribution on [0,4] has expected value of 2, the midpoint.">
    <rect x="20" y="895" width="760" height="110" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="917" font-size="13" fill="#1565c0" font-weight="bold">Example: Continuous Random Variable</text>
    <!-- PDF visualization -->
    <rect x="40" y="932" width="200" height="60" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="947" font-size="9" fill="#1565c0" font-weight="bold">Uniform Distribution on [0,4]</text>
    <text x="50" y="962" font-size="9" class="formula" fill="#424242">f(x) = ¼ for 0 ≤ x ≤ 4</text>
    <text x="50" y="977" font-size="9" fill="#424242">f(x) = 0 otherwise</text>
    <!-- Graph -->
    <path d="M260 982 L260 942 L460 942 L460 982" stroke="#1976d2" stroke-width="2" fill="url(#blueGrad)"/>
    <line x1="260" y1="982" x2="460" y2="982" stroke="#424242" stroke-width="1"/>
    <line x1="260" y1="942" x2="260" y2="982" stroke="#424242" stroke-width="1"/>
    <text x="260" y="998" font-size="8" fill="#424242">0</text>
    <text x="460" y="998" font-size="8" fill="#424242">4</text>
    <text x="340" y="935" font-size="8" fill="#1976d2">f(x)</text>
    <!-- Calculation -->
    <rect x="480" y="930" width="280" height="65" rx="6" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="490" y="947" font-size="9" fill="#1565c0" font-weight="bold">Solution:</text>
    <text x="490" y="962" font-size="9" class="formula" fill="#424242">E[X] = ∫₀⁴ x·¼ dx = ¼[x²/2]₀⁴</text>
    <text x="490" y="977" font-size="10" fill="#1565c0" font-weight="bold">= 16/8 = 2</text>
  </g>

  <!-- STEP 10: Conditional Expectation -->
  <g class="step" id="step10" data-narration="Conditional expectation calculates the expected value of one variable given that another variable takes a specific value.">
    <rect x="20" y="1015" width="760" height="90" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="1037" font-size="13" fill="#e65100" font-weight="bold">Conditional Mathematical Expectation</text>
    <text x="40" y="1065" font-size="11" class="formula" fill="#bf360c">E[X | Y = y] = Σ xᵢ · P(X = xᵢ | Y = y)</text>
    <text x="40" y="1088" font-size="10" fill="#424242">The expected value of X given that Y equals a specific value y</text>
    <!-- Visual -->
    <rect x="480" y="1045" width="280" height="50" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="490" y="1062" font-size="9" fill="#e65100">Used in: Law of Total Expectation</text>
    <text x="490" y="1078" font-size="9" fill="#424242">E[X] = E[E[X|Y]]</text>
  </g>

  <!-- STEP 11: Variance Connection -->
  <g class="step" id="step11" data-narration="Variance measures spread around the mean. It's defined as the expected value of squared deviation from the mean.">
    <rect x="20" y="1115" width="760" height="85" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="1137" font-size="13" fill="#c62828" font-weight="bold">Variance: Measuring Spread Around the Mean</text>
    <text x="40" y="1165" font-size="11" class="formula" fill="#b71c1c">Var(X) = E[(X - E[X])²] = E[X²] - (E[X])²</text>
    <text x="40" y="1185" font-size="10" fill="#424242">Standard Deviation = √Var(X) - tells us how spread out values are from the expected value</text>
    <!-- Visual -->
    <rect x="520" y="1155" width="240" height="35" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="530" y="1172" font-size="9" fill="#c62828">For dice: Var = 35/12 ≈ 2.92</text>
    <text x="640" y="1172" font-size="9" fill="#424242">σ ≈ 1.71</text>
  </g>

  <!-- STEP 12: Key Properties Summary -->
  <g class="step" id="step12" data-narration="Let's recap the essential properties: linearity, sum rule, and non-negativity form the foundation for expectation calculations.">
    <rect x="20" y="1210" width="760" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="1232" font-size="14" fill="#2e7d32" font-weight="bold">Key Properties Summary</text>
    <!-- Summary boxes -->
    <rect x="40" y="1245" width="230" height="50" rx="6" fill="white" stroke="#4caf50" stroke-width="1"/>
    <text x="50" y="1260" font-size="10" fill="#2e7d32" font-weight="bold">Linearity</text>
    <text x="50" y="1277" font-size="9" class="formula" fill="#424242">E[aX + bY] = aE[X] + bE[Y]</text>
    <rect x="280" y="1245" width="230" height="50" rx="6" fill="white" stroke="#4caf50" stroke-width="1"/>
    <text x="290" y="1260" font-size="10" fill="#2e7d32" font-weight="bold">Sum Rule</text>
    <text x="290" y="1277" font-size="9" class="formula" fill="#424242">E[X + Y] = E[X] + E[Y]</text>
    <rect x="520" y="1245" width="250" height="50" rx="6" fill="white" stroke="#4caf50" stroke-width="1"/>
    <text x="530" y="1260" font-size="10" fill="#2e7d32" font-weight="bold">Non-Negativity</text>
    <text x="530" y="1277" font-size="9" class="formula" fill="#424242">X ≥ 0 ⇒ E[X] ≥ 0</text>
  </g>

  <!-- STEP 13: Applications & Conclusion -->
  <g class="step" id="step13" data-narration="Mathematical expectation is foundational in probability theory with applications spanning finance, algorithms, machine learning, and beyond.">
    <rect x="20" y="1315" width="760" height="80" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="40" y="1337" font-size="14" fill="white" font-weight="bold">Applications &amp; Conclusion</text>
    <text x="40" y="1360" font-size="10" fill="#c5cae9">• Finance: Risk assessment &amp; pricing | • CS: Algorithm analysis, ML, simulations</text>
    <text x="40" y="1378" font-size="10" fill="#c5cae9">• Games: Fair value calculations | • Statistics: Making predictions from data</text>
    <circle cx="720" cy="1355" r="25" fill="white" opacity="0.2">
      <animate attributeName="r" values="25;27;25" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="720" y="1360" text-anchor="middle" font-size="20" fill="white">✓</text>
  </g>
</svg>