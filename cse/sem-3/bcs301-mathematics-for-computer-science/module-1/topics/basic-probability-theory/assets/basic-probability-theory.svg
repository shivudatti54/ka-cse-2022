<svg viewBox="0 0 800 1400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffebee"/>
      <stop offset="100%" stop-color="#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes growBar {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; }
    .bar { transform-origin: bottom; animation: growBar 0.6s ease-out backwards; }
    .connector { stroke-dasharray: 500; animation: drawLine 1s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1400" fill="#f8f9fa"/>

  <!-- STEP 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Probability Theory. This module covers sample space, events, probability rules, and random variables essential for computer science.">
    <rect x="100" y="10" width="600" height="45" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Module 1: Probability Distributions</text>
    <text x="400" y="62" text-anchor="middle" font-size="14" fill="#546e7a">A Review of Basic Probability Theory and Random Variables</text>
  </g>

  <!-- STEP 1: Why Probability Matters -->
  <g class="step" id="step1" data-narration="Probability is fundamental to machine learning, algorithms, network routing, and simulations in computer science.">
    <rect x="20" y="70" width="760" height="80" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="95" font-size="14" font-weight="bold" fill="#1976d2">Why Probability Matters in CS</text>
    <rect x="40" y="110" width="150" height="30" rx="5" fill="#e3f2fd">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    </rect>
    <text x="115" y="130" text-anchor="middle" font-size="11" fill="#1565c0">Machine Learning</text>
    <rect x="210" y="110" width="150" height="30" rx="5" fill="#e8f5e9">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
    </rect>
    <text x="285" y="130" text-anchor="middle" font-size="11" fill="#388e3c">Algorithms</text>
    <rect x="380" y="110" width="150" height="30" rx="5" fill="#fff3e0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
    </rect>
    <text x="455" y="130" text-anchor="middle" font-size="11" fill="#f57c00">Network Analysis</text>
    <rect x="550" y="110" width="150" height="30" rx="5" fill="#f3e5f5">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.9s" fill="freeze"/>
    </rect>
    <text x="625" y="130" text-anchor="middle" font-size="11" fill="#7b1fa2">Simulations</text>
  </g>

  <!-- STEP 2: Core Concepts Overview -->
  <g class="step" id="step2" data-narration="We will explore sample space, events, probability axioms, random variables, PMF, and CDF using a fair die example.">
    <rect x="20" y="165" width="760" height="80" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="190" font-size="14" font-weight="bold" fill="#7b1fa2">What You Will Learn</text>
    <circle cx="70" cy="220" r="15" fill="#9c27b0"/>
    <text x="70" y="225" text-anchor="middle" font-size="10" fill="white">1</text>
    <text x="95" y="225" font-size="11" fill="#4a148c">Sample Space &amp; Events</text>
    <circle cx="220" cy="220" r="15" fill="#9c27b0"/>
    <text x="220" y="225" text-anchor="middle" font-size="10" fill="white">2</text>
    <text x="245" y="225" font-size="11" fill="#4a1488">Probability Rules</text>
    <circle cx="380" cy="220" r="15" fill="#9c27b0"/>
    <text x="380" y="225" text-anchor="middle" font-size="10" fill="white">3</text>
    <text x="405" y="225" font-size="11" fill="#4a148c">Random Variables</text>
    <circle cx="540" cy="220" r="15" fill="#9c27b0"/>
    <text x="540" y="225" text-anchor="middle" font-size="10" fill="white">4</text>
    <text x="565" y="225" font-size="11" fill="#4a148c">PMF &amp; CDF</text>
    <circle cx="700" cy="220" r="15" fill="#9c27b0"/>
    <text x="700" y="225" text-anchor="middle" font-size="10" fill="white">5</text>
    <text x="725" y="225" font-size="11" fill="#4a148c">Expected Value</text>
  </g>

  <!-- STEP 3: Sample Space & Events -->
  <g class="step" id="step3" data-narration="Sample Space S contains all possible outcomes. An Event E is a subset, like rolling an even number from a die.">
    <rect x="20" y="260" width="760" height="90" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="285" font-size="14" font-weight="bold" fill="#2e7d32">Sample Space and Events</text>
    <rect x="40" y="300" width="200" height="40" rx="8" fill="#a5d6a7" stroke="#388e3c" stroke-width="2"/>
    <text x="140" y="320" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">Sample Space S</text>
    <text x="140" y="335" text-anchor="middle" font-size="11" fill="#2e7d32">{1, 2, 3, 4, 5, 6}</text>
    <line x1="260" y1="320" x2="310" y2="320" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="320" y="295" width="180" height="50" rx="8" fill="#81c784" stroke="#2e7d32" stroke-width="2"/>
    <text x="410" y="315" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Event E (Even)</text>
    <text x="410" y="335" text-anchor="middle" font-size="11" fill="#2e7d32">{2, 4, 6}</text>
    <text x="540" y="305" font-size="11" fill="#388e3c">P(E) = 3/6 = 1/2</text>
    <text x="540" y="325" font-size="10" fill="#546e7a">Favorable: 3 outcomes</text>
    <text x="540" y="340" font-size="10" fill="#546e7a">Total: 6 possible</text>
  </g>

  <!-- STEP 4: Probability Rules -->
  <g class="step" id="step4" data-narration="Two fundamental rules govern probability: Addition for mutually exclusive events and Multiplication for independent events.">
    <rect x="20" y="365" width="760" height="90" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="390" font-size="14" font-weight="bold" fill="#e65100">Probability Rules</text>
    <!-- Addition Rule Box -->
    <rect x="40" y="405" width="340" height="40" rx="8" fill="#ffe0b2" stroke="#f57c00" stroke-width="2"/>
    <text x="55" y="422" font-size="11" font-weight="bold" fill="#e65100">Addition Rule (Mutually Exclusive)</text>
    <text x="55" y="438" font-size="10" fill="#f57c00">P(A ∪ B) = P(A) + P(B)</text>
    <!-- Multiplication Rule Box -->
    <rect x="400" y="405" width="340" height="40" rx="8" fill="#ffcc80" stroke="#f57c00" stroke-width="2"/>
    <text x="415" y="422" font-size="11" font-weight="bold" fill="#e65100">Multiplication Rule (Independent)</text>
    <text x="415" y="438" font-size="10" fill="#f57c00">P(A ∩ B) = P(A) × P(B)</text>
    <!-- Example -->
    <text x="210" y="458" text-anchor="middle" font-size="10" fill="#5d4037">Example: Rolling 1 OR 2 → P = 1/6 + 1/6 = 1/3</text>
    <text x="570" y="458" text-anchor="middle" font-size="10" fill="#5d4037">Example: Flip coin AND roll die → P = 1/2 × 1/6 = 1/12</text>
  </g>

  <!-- STEP 5: Random Variables -->
  <g class="step" id="step5" data-narration="A Random Variable X maps outcomes to numerical values, enabling mathematical analysis of random processes.">
    <rect x="20" y="470" width="760" height="90" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="495" font-size="14" font-weight="bold" fill="#1565c0">Random Variables</text>
    <rect x="40" y="510" width="300" height="40" rx="8" fill="#90caf9" stroke="#1976d2" stroke-width="2"/>
    <text x="190" y="530" text-anchor="middle" font-size="11" fill="#0d47a1">X: Number of heads in 3 coin tosses</text>
    <text x="190" y="543" text-anchor="middle" font-size="10" fill="#1565c0">Values: {0, 1, 2, 3}</text>
    <!-- Arrow and Types -->
    <line x1="360" y1="530" x2="420" y2="530" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="470" y="520" font-size="11" font-weight="bold" fill="#2e7d32">DISCRETE</text>
    <text x="470" y="535" font-size="10" fill="#388e3c">Finite/Countable</text>
    <text x="470" y="547" font-size="9" fill="#4caf50">(0,1,2,... values)</text>
    <text x="600" y="520" font-size="11" font-weight="bold" fill="#c62828">CONTINUOUS</text>
    <text x="600" y="535" font-size="10" fill="#d32f2f">Uncountable</text>
    <text x="600" y="547" font-size="9" fill="#ef5350">(any real value)</text>
  </g>

  <!-- STEP 6: Discrete RV Explanation -->
  <g class="step" id="step6" data-narration="Discrete random variables take countable values like integers. Examples include coin tosses, dice rolls, and bug counts.">
    <rect x="20" y="575" width="760" height="90" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="600" font-size="14" font-weight="bold" fill="#c62828">Discrete Random Variables</text>
    <!-- Three examples -->
    <rect x="40" y="615" width="220" height="40" rx="8" fill="#ffcdd2" stroke="#e57373"/>
    <text x="150" y="633" text-anchor="middle" font-size="10" fill="#b71c1c">X = Heads in 10 tosses</text>
    <text x="150" y="648" text-anchor="middle" font-size="10" fill="#d32f2f">{0,1,2,...,10}</text>
    <rect x="280" y="615" width="220" height="40" rx="8" fill="#ef9a9a" stroke="#e57373"/>
    <text x="390" y="633" text-anchor="middle" font-size="10" fill="#b71c1c">Y = Bugs in software</text>
    <text x="390" y="648" text-anchor="middle" font-size="10" fill="#d32f2f">{0,1,2,3,...}</text>
    <rect x="520" y="615" width="220" height="40" rx="8" fill="#e57373" stroke="#ef5350"/>
    <text x="630" y="633" text-anchor="middle" font-size="10" fill="#b71c1c">Z = Die roll result</text>
    <text x="630" y="648" text-anchor="middle" font-size="10" fill="#d32f2f">{1,2,3,4,5,6}</text>
    <text x="400" y="672" text-anchor="middle" font-size="11" fill="#5d4037" font-style="italic">Discrete RVs are described by Probability Mass Function (PMF)</text>
  </g>

  <!-- STEP 7: PMF Definition -->
  <g class="step" id="step7" data-narration="The Probability Mass Function p(x) gives P(X=x), the exact probability of each value for discrete random variables.">
    <rect x="20" y="680" width="760" height="90" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="705" font-size="14" font-weight="bold" fill="#1b5e20">Probability Mass Function (PMF)</text>
    <text x="40" y="730" font-size="12" fill="#2e7d32" class="formula">p(x) = P(X = x)</text>
    <text x="40" y="750" font-size="10" fill="#388e3c">For each possible value x, the PMF gives the probability that X equals x.</text>
    <!-- Properties box -->
    <rect x="280" y="720" width="200" height="40" rx="8" fill="#c8e6c9" stroke="#4caf50"/>
    <text x="380" y="738" text-anchor="middle" font-size="10" fill="#1b5e20">Property 1: p(x) ≥ 0</text>
    <text x="380" y="753" text-anchor="middle" font-size="10" fill="#1b5e20">Property 2: Σp(x) = 1</text>
    <text x="550" y="730" font-size="11" fill="#2e7d32">Domain: All possible x values</text>
    <text x="550" y="750" font-size="11" fill="#2e7d32">Range: [0, 1]</text>
  </g>

  <!-- STEP 8: PMF Example - Fair Die -->
  <g class="step" id="step8" data-narration="For a fair die, each outcome has probability 1/6. The PMF shows equal distribution across values 1 through 6.">
    <rect x="20" y="785" width="760" height="90" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="810" font-size="14" font-weight="bold" fill="#1565c0">PMF Example: Fair Die Roll</text>
    <text x="40" y="835" font-size="11" fill="#1976d2" class="formula">p(x) = 1/6 for x ∈ {1,2,3,4,5,6}, else p(x) = 0</text>
    <!-- Bar chart -->
    <g transform="translate(40, 855)">
      <g class="bar" style="animation-delay: 0.1s">
        <rect x="0" y="0" width="25" height="30" fill="#42a5f5" rx="3"/>
        <text x="12.5" y="45" text-anchor="middle" font-size="9" fill="#1565c0">1</text>
      </g>
      <g class="bar" style="animation-delay: 0.2s">
        <rect x="30" y="0" width="25" height="30" fill="#42a5f5" rx="3"/>
        <text x="42.5" y="45" text-anchor="middle" font-size="9" fill="#1565c0">2</text>
      </g>
      <g class="bar" style="animation-delay: 0.3s">
        <rect x="60" y="0" width="25" height="30" fill="#42a5f5" rx="3"/>
        <text x="72.5" y="45" text-anchor="middle" font-size="9" fill="#1565c0">3</text>
      </g>
      <g class="bar" style="animation-delay: 0.4s">
        <rect x="90" y="0" width="25" height="30" fill="#42a5f5" rx="3"/>
        <text x="102.5" y="45" text-anchor="middle" font-size="9" fill="#1565c0">4</text>
      </g>
      <g class="bar" style="animation-delay: 0.5s">
        <rect x="120" y="0" width="25" height="30" fill="#42a5f5" rx="3"/>
        <text x="132.5" y="45" text-anchor="middle" font-size="9" fill="#1565c0">5</text>
      </g>
      <g class="bar" style="animation-delay: 0.6s">
        <rect x="150" y="0" width="25" height="30" fill="#42a5f5" rx="3"/>
        <text x="162.5" y="45" text-anchor="middle" font-size="9" fill="#1565c0">6</text>
      </g>
    </g>
    <text x="280" y="880" font-size="10" fill="#1565c0">Uniform Distribution: All outcomes equally likely</text>
    <text x="280" y="895" font-size="10" fill="#546e7a">P(X≤3) = P(1)+P(2)+P(3) = 1/6+1/6+1/6 = 1/2</text>
    <!-- CDF preview -->
    <rect x="480" y="845" width="280" height="30" rx="8" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="620" y="865" text-anchor="middle" font-size="10" fill="#0d47a1">F(3) = P(X ≤ 3) = 1/2</text>
  </g>

  <!-- STEP 9: CDF Definition -->
  <g class="step" id="step9" data-narration="The Cumulative Distribution Function F(x) gives the probability that X is less than or equal to x: P(X ≤ x).">
    <rect x="20" y="890" width="760" height="90" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="915" font-size="14" font-weight="bold" fill="#6a1b9a">Cumulative Distribution Function (CDF)</text>
    <text x="40" y="940" font-size="12" fill="#7b1fa2" class="formula">F(x) = P(X ≤ x)</text>
    <text x="40" y="960" font-size="10" fill="#8e24aa">The probability that the random variable takes a value less than or equal to x.</text>
    <!-- Properties -->
    <rect x="280" y="925" width="180" height="40" rx="8" fill="#ce93d8" stroke="#9c27b0"/>
    <text x="370" y="943" text-anchor="middle" font-size="10" fill="#4a148c">Property: 0 ≤ F(x) ≤ 1</text>
    <text x="370" y="958" text-anchor="middle" font-size="10" fill="#4a148c">Monotonically increasing</text>
    <text x="530" y="935" font-size="11" fill="#6a1b9a">F(-∞) = 0, F(∞) = 1</text>
    <text x="530" y="955" font-size="11" fill="#6a1b9a">P(a &lt; X ≤ b) = F(b) - F(a)</text>
  </g>

  <!-- STEP 10: CDF Example -->
  <g class="step" id="step10" data-narration="For the die example, F(3) equals 1/2 because three outcomes (1,2,3) share half the probability mass.">
    <rect x="20" y="995" width="760" height="90" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="1020" font-size="14" font-weight="bold" fill="#e65100">CDF Example: Fair Die Roll</text>
    <!-- CDF Table -->
    <g transform="translate(40, 1035)">
      <rect x="0" y="0" width="50" height="25" fill="#ffe0b2" stroke="#f57c00"/>
      <text x="25" y="17" text-anchor="middle" font-size="10" fill="#e65100">x</text>
      <rect x="50" y="0" width="70" height="25" fill="#ffe0b2" stroke="#f57c00"/>
      <text x="85" y="17" text-anchor="middle" font-size="10" fill="#e65100">F(x)</text>
      <!-- Row 1 -->
      <rect x="0" y="25" width="50" height="20" fill="#fff3e0"/>
      <text x="25" y="40" text-anchor="middle" font-size="9" fill="#5d4037">0</text>
      <rect x="50" y="25" width="70" height="20" fill="#fff3e0"/>
      <text x="85" y="40" text-anchor="middle" font-size="9" fill="#5d4037">0</text>
      <!-- Row 2 -->
      <rect x="0" y="45" width="50" height="20" fill="#fff3e0"/>
      <text x="25" y="60" text-anchor="middle" font-size="9" fill="#5d4037">1</text>
      <rect x="50" y="45" width="70" height="20" fill="#fff3e0"/>
      <text x="85" y="60" text-anchor="middle" font-size="9" fill="#5d4037">1/6</text>
      <!-- Row 3 -->
      <rect x="0" y="65" width="50" height="20" fill="#fff3e0"/>
      <text x="25" y="80" text-anchor="middle" font-size="9" fill="#5d4037">2</text>
      <rect x="50" y="65" width="70" height="20" fill="#fff3e0"/>
      <text x="85" y="80" text-anchor="middle" font-size="9" fill="#5d4037">2/6</text>
      <!-- Row 4 (highlighted) -->
      <rect x="0" y="85" width="50" height="20" fill="#ffcc80"/>
      <text x="25" y="100" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">3</text>
      <rect x="50" y="85" width="70" height="20" fill="#ffcc80"/>
      <text x="85" y="100" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">3/6 = 1/2</text>
      <!-- Row 5 -->
      <rect x="0" y="105" width="50" height="20" fill="#fff3e0"/>
      <text x="25" y="120" text-anchor="middle" font-size="9" fill="#5d4037">6</text>
      <rect x="50" y="105" width="70" height="20" fill="#fff3e0"/>
      <text x="85" y="120" text-anchor="middle" font-size="9" fill="#5d4037">6/6 = 1</text>
    </g>
    <!-- Visual CDF -->
    <g transform="translate(250, 1055)">
      <line x1="0" y1="100" x2="250" y1="100" stroke="#546e7a" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="100" stroke="#546e7a" stroke-width="1"/>
      <text x="-10" y="105" font-size="8" fill="#546e7a">0</text>
      <text x="-10" y="5" font-size="8" fill="#546e7a">1</text>
      <!-- Step function -->
  </g>
  </g>
</svg>