<svg viewBox="0 0 800 1150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Times New Roman', serif; font-style: italic; }
    .title-text { font-weight: bold; }
  </style>

  <rect width="800" height="1150" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to our exploration of joint probability distributions for two discrete random variables.">
    <rect x="50" y="10" width="700" height="40" rx="20" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="37" text-anchor="middle" font-size="20" fill="white" font-weight="bold">Joint Probability Distribution</text>
    <text x="400" y="52" text-anchor="middle" font-size="12" fill="#546e7a">For Two Discrete Random Variables</text>
  </g>

  <!-- Step 1: Introduction/Motivation -->
  <g class="step" id="step1" data-narration="Why do we need joint distributions? Because real systems involve multiple interacting random variables.">
    <rect x="50" y="60" width="700" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="82" font-size="13" fill="#1976d2" font-weight="bold">Why Joint Distributions?</text>
    <text x="70" y="102" font-size="10" fill="#37474f">Real-world systems involve multiple random variables that interact.</text>
    <text x="70" y="118" font-size="10" fill="#37474f">Example: CPU cycles (X) and memory usage (Y) are correlated.</text>
    <circle cx="680" cy="102" r="25" fill="#1976d2" opacity="0.2">
      <animate attributeName="r" values="20;28;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="680" y="108" text-anchor="middle" font-size="24" fill="#1976d2">⟷</text>
  </g>

  <!-- Step 2: Core Concepts Preview -->
  <g class="step" id="step2" data-narration="We will learn four key concepts: Joint PMF, Marginal PMF, Conditional PMF, and Independence.">
    <rect x="50" y="155" width="700" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="177" font-size="13" fill="#388e3c" font-weight="bold">What We Will Learn</text>
    <rect x="70" y="192" width="150" height="35" rx="5" fill="#388e3c" opacity="0.15"/>
    <text x="145" y="213" text-anchor="middle" font-size="10" fill="#2e7d32">Joint PMF</text>
    <rect x="235" y="192" width="150" height="35" rx="5" fill="#388e3c" opacity="0.15"/>
    <text x="310" y="213" text-anchor="middle" font-size="10" fill="#2e7d32">Marginal PMF</text>
    <rect x="400" y="192" width="160" height="35" rx="5" fill="#388e3c" opacity="0.15"/>
    <text x="480" y="213" text-anchor="middle" font-size="10" fill="#2e7d32">Conditional PMF</text>
    <rect x="575" y="192" width="160" height="35" rx="5" fill="#388e3c" opacity="0.15"/>
    <text x="655" y="213" text-anchor="middle" font-size="10" fill="#2e7d32">Independence</text>
  </g>

  <!-- Step 3: Joint PMF Definition -->
  <g class="step" id="step3" data-narration="The Joint Probability Mass Function gives the probability that X equals x AND Y equals y simultaneously.">
    <rect x="50" y="250" width="700" height="90" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="272" font-size="13" fill="#e65100" font-weight="bold">Joint Probability Mass Function (JPMF)</text>
    <text x="70" y="295" font-size="11" fill="#37474f">Definition: For discrete random variables X and Y,</text>
    <text x="70" y="318" font-size="14" fill="#1565c0" class="formula">
      p<tspan baseline-shift="sub" font-size="10">X,Y</tspan>(x,y) = P(X = x, Y = y)
    </text>
    <path d="M350,300 L380,300 L370,290 M380,300 L370,310" stroke="#e65100" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
    <text x="395" y="305" font-size="10" fill="#e65100">Probability of BOTH events</text>
  </g>

  <!-- Step 4: JPMF Properties -->
  <g class="step" id="step4" data-narration="Two key properties: JPMF values are always non-negative, and all values sum to exactly 1.">
    <rect x="50" y="350" width="700" height="85" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="372" font-size="13" fill="#7b1fa2" font-weight="bold">Properties of JPMF</text>
    <rect x="70" y="390" width="300" height="35" rx="5" fill="#9c27b0" opacity="0.1"/>
    <text x="220" y="410" text-anchor="middle" font-size="11" fill="#6a1b9a">
      <tspan class="formula">p<tspan baseline-shift="sub" font-size="9">X,Y</tspan>(x,y) ≥ 0</tspan>
      <tspan dx="30">for all x, y</tspan>
    </text>
    <rect x="385" y="390" width="350" height="35" rx="5" fill="#9c27b0" opacity="0.1"/>
    <text x="560" y="410" text-anchor="middle" font-size="11" fill="#6a1b9a">
      <tspan>Σ</tspan><tspan baseline-shift="sub" font-size="9">x</tspan><tspan>Σ</tspan><tspan baseline-shift="sub" font-size="9">y</tspan><tspan class="formula">p<tspan baseline-shift="sub" font-size="9">X,Y</tspan>(x,y)</tspan><tspan dx="5">= 1</tspan>
    </text>
    <text x="70" y="430" font-size="9" fill="#7b1fa2">Non-negativity</text>
    <text x="385" y="430" font-size="9" fill="#7b1fa2">Sum to 1 (total probability)</text>
  </g>

  <!-- Step 5: Marginal PMFs -->
  <g class="step" id="step5" data-narration="Marginal PMF of X is found by summing joint probabilities over all values of Y - projecting onto X axis.">
    <rect x="50" y="445" width="700" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="467" font-size="13" fill="#1976d2" font-weight="bold">Marginal Probability Mass Functions</text>
    <text x="70" y="492" font-size="10" fill="#37474f">The marginal PMF of X is obtained by summing over all Y values:</text>
    <text x="70" y="515" font-size="13" fill="#1565c0" class="formula">
      p<tspan baseline-shift="sub" font-size="9">X</tspan>(x) = Σ<tspan baseline-shift="sub" font-size="9">y</tspan> p<tspan baseline-shift="sub" font-size="9">X,Y</tspan>(x, y)
    </text>
    <text x="380" y="492" font-size="10" fill="#37474f">Similarly for Y:</text>
    <text x="380" y="515" font-size="13" fill="#1565c0" class="formula">
      p<tspan baseline-shift="sub" font-size="9">Y</tspan>(y) = Σ<tspan baseline-shift="sub" font-size="9">x</tspan> p<tspan baseline-shift="sub" font-size="9">X,Y</tspan>(x, y)
    </text>
    <path d="M260,510 L340,510" stroke="#1976d2" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="300" y="535" text-anchor="middle" font-size="9" fill="#1976d2">Sum across rows/columns</text>
  </g>

  <!-- Step 6: Conditional PMFs -->
  <g class="step" id="step6" data-narration="Conditional PMF gives probability of X given Y has taken a specific value - using the division formula.">
    <rect x="50" y="555" width="700" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="70" y="577" font-size="13" fill="#2e7d32" font-weight="bold">Conditional Probability Mass Function</text>
    <text x="70" y="602" font-size="10" fill="#37474f">Probability of X given Y = y:</text>
    <text x="70" y="625" font-size="13" fill="#1565c0" class="formula">
      p<tspan baseline-shift="sub" font-size="9">X|Y</tspan>(x|y) = P(X=x | Y=y) = 
      <tspan fill="#c62828" font-weight="bold">p<tspan baseline-shift="sub" font-size="9">X,Y</tspan>(x,y)</tspan>
      <tspan>/</tspan>
      <tspan fill="#2e7d32" font-weight="bold">p<tspan baseline-shift="sub" font-size="9">Y</tspan>(y)</tspan>
    </text>
    <rect x="70" y="640" width="320" height="8" fill="#c62828" opacity="0.3" rx="4">
      <animate attributeName="width" from="0" to="320" dur="1s" fill="freeze"/>
    </rect>
    <text x="405" y="645" font-size="8" fill="#c62828">Joint</text>
    <text x="600" y="625" font-size="10" fill="#37474f">provided p<tspan baseline-shift="sub" font-size="8">Y</tspan>(y) > 0</text>
  </g>

  <!-- Step 7: Independence -->
  <g class="step" id="step7" data-narration="X and Y are independent if knowing one provides no information about the other - joint equals product.">
    <rect x="50" y="665" width="700" height="100" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="70" y="687" font-size="13" fill="#e65100" font-weight="bold">Independence of Random Variables</text>
    <text x="70" y="712" font-size="11" fill="#37474f">X and Y are independent if and only if:</text>
    <text x="70" y="738" font-size="14" fill="#1565c0" class="formula">
      p<tspan baseline-shift="sub" font-size="10">X,Y</tspan>(x,y) = p<tspan baseline-shift="sub" font-size="10">X</tspan>(x) × p<tspan baseline-shift="sub" font-size="10">Y</tspan>(y)  <tspan fill="#e65100" font-size="11" font-style="normal">for all x,y</tspan>
    </text>
    <rect x="400" y="698" width="335" height="55" rx="5" fill="#e65100" opacity="0.08"/>
    <text x="567" y="720" text-anchor="middle" font-size="10" fill="#bf360c">Knowing Y tells</text>
    <text x="567" y="735" text-anchor="middle" font-size="10" fill="#bf360c">you nothing about X</text>
    <path d="M680,710 L720,690" stroke="#e65100" stroke-width="2" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Step 8: The Example Table -->
  <g class="step" id="step8" data-narration="Let's examine a concrete example: server access count X and response status Y with their joint probabilities.">
    <rect x="50" y="775" width="700" height="115" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="70" y="797" font-size="13" fill="#7b1fa2" font-weight="bold">Example: Server System</text>
    <text x="70" y="815" font-size="9" fill="#37474f">X = accesses/min (0,1,2) | Y = status (0=OK, 1=Slow, 2=Error)</text>
    
    <!-- Table -->
    <rect x="70" y="828" width="90" height="50" rx="3" fill="#7b1fa2" opacity="0.2" stroke="#7b1fa2"/>
    <text x="115" y="852" text-anchor="middle" font-size="8" fill="#4a148c">Y=0</text>
    <text x="160" y="852" text-anchor="middle" font-size="8" fill="#4a148c">Y=1</text>
    <text x="205" y="852" text-anchor="middle" font-size="8" fill="#4a148c">Y=2</text>
    <text x="255" y="852" text-anchor="middle" font-size="8" fill="#4a148c">p_X(x)</text>
    
    <text x="90" y="878" font-size="8" fill="#4a148c">X=0</text>
    <text x="115" y="878" text-anchor="middle" font-size="9" fill="#1565c0">0.1</text>
    <text x="160" y="878" text-anchor="middle" font-size="9" fill="#1565c0">0.05</text>
    <text x="205" y="878" text-anchor="middle" font-size="9" fill="#1565c0">0.0</text>
    <text x="255" y="878" text-anchor="middle" font-size="9" fill="#4a148c" font-weight="bold">0.15</text>
    
    <text x="90" y="898" font-size="8" fill="#4a148c">X=1</text>
    <text x="115" y="898" text-anchor="middle" font-size="9" fill="#1565c0">0.2</text>
    <text x="160" y="898" text-anchor="middle" font-size="9" fill="#1565c0">0.1</text>
    <text x="205" y="898" text-anchor="middle" font-size="9" fill="#1565c0">0.1</text>
    <text x="255" y="898" text-anchor="middle" font-size="9" fill="#4a148c" font-weight="bold">0.40</text>
    
    <text x="90" y="918" font-size="8" fill="#4a148c">X=2</text>
    <text x="115" y="918" text-anchor="middle" font-size="9" fill="#1565c0">0.2</text>
    <text x="160" y="918" text-anchor="middle" font-size="9" fill="#1565c0">0.15</text>
    <text x="205" y="918" text-anchor="middle" font-size="9" fill="#1565c0">0.1</text>
    <text x="255" y="918" text-anchor="middle" font-size="9" fill="#4a148c" font-weight="bold">0.45</text>
    
    <text x="115" y="938" text-anchor="middle" font-size="8" fill="#4a148c" font-weight="bold">0.5</text>
    <text x="160" y="938" text-anchor="middle" font-size="8" fill="#4a148c" font-weight="bold">0.3</text>
    <text x="205" y="938" text-anchor="middle" font-size="8" fill="#4a148c" font-weight="bold">0.2</text>
    <text x="255" y="938" text-anchor="middle" font-size="8" fill="#4a148c">1.0</text>
  </g>

  <!-- Step 9: Calculations -->
  <g class="step" id="step9" data-narration="We calculate marginal, conditional probabilities and check independence using the table values.">
    <rect x="50" y="900" width="700" height="110" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="70" y="922" font-size="13" fill="#1976d2" font-weight="bold">Calculations Using The Table</text>
    
    <!-- Calc 1: Marginal -->
    <rect x="70" y="935" width="220" height="65" rx="5" fill="#1976d2" opacity="0.1"/>
    <text x="80" y="952" font-size="10" fill="#1565c0">Marginal P(X=2):</text>
    <text x="80" y="970" font-size="11" fill="#37474f" class="formula">p_X(2) = 0.2 + 0.15 + 0.1 = <tspan font-weight="bold">0.45</tspan></text>
    <text x="80" y="988" font-size="10" fill="#37474f">Marginal P(Y=1): p_Y(1) = 0.05 + 0.1 + 0.15 = <tspan font-weight="bold">0.3</tspan></text>
    
    <!-- Calc 2: Conditional -->
    <rect x="305" y="935" width="220" height="65" rx="5" fill="#388e3c" opacity="0.1"/>
    <text x="315" y="952" font-size="10" fill="#2e7d32">Conditional P(Y=1 | X=2):</text>
    <text x="315" y="970" font-size="11" fill="#37474f" class="formula">= p_XY(2,1) / p_X(2) = 0.15/0.45 = <tspan font-weight="bold">1/3</tspan></text>
    <text x="315" y="988" font-size="10" fill="#37474f">Given 2 accesses, 33% chance of slow response</text>
    
    <!-- Calc 3: Independence check -->
    <rect x="540" y="935" width="200" height="65" rx="5" fill="#f44336" opacity="0.1"/>
    <text x="550" y="952" font-size="10" fill="#c62828">Independence Check:</text>
    <text x="550" y="970" font-size="10" fill="#37474f">p_XY(0,0) = 0.1</text>
    <text x="550" y="988" font-size="10" fill="#37474f">p_X(0)·p_Y(0) = 0.15×0.5 = 0.075</text>
    <text x="620" y="1000" font-size="9" fill="#c62828" font-weight="bold">NOT EQUAL → NOT INDEPENDENT</text>
  </g>

  <!-- Step 10: Summary -->
  <g class="step" id="step10" data-narration="In summary: JPMF models both variables together, marginals give individual distributions, conditionals show dependency, and this connects to Markov Chains.">
    <rect x="50" y="1020" width="700" height="80" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="1042" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Key Takeaways</text>
    <text x="100" y="1065" font-size="10" fill="#e3f2fd">• JPMF: p_XY(x,y) = P(X=x, Y=y)</text>
    <text x="100" y="1080" font-size="10" fill="#e3f2fd">• Marginal: Sum over other variable</text>
    <text x="320" y="1065" font-size="10" fill="#e3f2fd">• Conditional: p_XY(x,y) / p_Y(y)</text>
    <text x="320" y="1080" font-size="10" fill="#e3f2fd">• Independence: p_XY = p_X × p_Y</text>
    <text x="550" y="1075" text-anchor="middle" font-size="11" fill="#ffeb3b" font-weight="bold">Foundation for Markov Chains!</text>
  </g>

  <!-- Animated elements for richness -->
  <g>
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.5s" fill="freeze"/>
  </g>
</svg>