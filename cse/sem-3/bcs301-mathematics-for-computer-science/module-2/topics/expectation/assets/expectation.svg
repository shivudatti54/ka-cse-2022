<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1550">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <!-- Animation styles -->
    <style>
      @keyframes fadeInSlide {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes textReveal {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 500; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      .step { animation: fadeInSlide 0.6s ease-out; }
      .step rect {
        animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center;
      }
      .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
      .formula-text { font-family: "Times New Roman", serif; font-style: italic; }
      .title-text { font-family: Arial, sans-serif; font-weight: bold; }
      .drawn-line {
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: drawLine 1.5s ease-out forwards;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1550" fill="#f8f9fa"/>

  <!-- STEP 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to our exploration of Expectation in Probability Distributions, a crucial concept for computer science analysis.">
    <rect x="20" y="20" width="760" height="50" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="52" text-anchor="middle" font-size="24" fill="white" class="title-text">Expectation in Probability Distributions</text>
    <text x="400" y="75" text-anchor="middle" font-size="12" fill="#c5cae9">BCS301 - Mathematics for Computer Science</text>
  </g>

  <!-- STEP 1: Why Expectation Matters -->
  <g class="step" id="step1" data-narration="Understanding expectation helps analyze algorithms, model networks, and build machine learning systems efficiently.">
    <rect x="20" y="85" width="760" height="90" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="110" font-size="14" fill="#1565c0" class="title-text">Why Does Expectation Matter?</text>
    <text x="40" y="130" font-size="11" fill="#333">
      <tspan x="40" dy="0">• Analyze average-case algorithm performance</tspan>
      <tspan x="40" dy="16">• Model network traffic and server loads</tspan>
      <tspan x="40" dy="16">• Compute loss functions in machine learning</tspan>
    </text>
    <rect x="520" y="100" width="230" height="60" rx="6" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
    <text x="635" y="125" text-anchor="middle" font-size="12" fill="#0277bd" class="title-text">Exam Weight: 8-10 marks</text>
    <text x="635" y="145" text-anchor="middle" font-size="10" fill="#01579b">Frequent numerical problems</text>
  </g>

  <!-- STEP 2: Definition Preview -->
  <g class="step" id="step2" data-narration="Expectation is the probability-weighted average of all possible values of a random variable, representing long-term average.">
    <rect x="20" y="190" width="760" height="90" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="215" font-size="14" fill="#2e7d32" class="title-text">What is Expectation?</text>
    <text x="40" y="240" font-size="12" fill="#333">The expected value E[X] represents the "center" or long-run average</text>
    <text x="40" y="260" font-size="11" fill="#555">of a random variable if an experiment is repeated many times.</text>
    <text x="400" y="245" text-anchor="middle" font-size="16" fill="#1b5e20" class="formula-text">E[X] = Σ x · P(X = x)</text>
    <animate attributeName="opacity" from="0" to="1" begin="1s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- STEP 3: Discrete Expectation Formula -->
  <g class="step" id="step3" data-narration="For discrete random variables, we sum each value multiplied by its probability to find the expected value.">
    <rect x="20" y="295" width="760" height="95" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="320" font-size="14" fill="#e65100" class="title-text">Discrete Random Variable Expectation</text>
    <text x="40" y="350" font-size="12" fill="#333">For a discrete random variable X with possible values {x₁, x₂, ...}:</text>
    <rect x="40" y="365" width="720" height="35" rx="5" fill="#fff8e1" stroke="#ff8f00" stroke-width="1"/>
    <text x="400" y="385" text-anchor="middle" font-size="18" fill="#e65100" class="formula-text">
      <tspan>E[X] = Σ</tspan><tspan font-size="14" fill="#666">all x</tspan><tspan> x · P(X = x)</tspan>
    </text>
  </g>

  <!-- STEP 4: Continuous Expectation Formula -->
  <g class="step" id="step4" data-narration="For continuous random variables, we integrate the value multiplied by its probability density function.">
    <rect x="20" y="405" width="760" height="95" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="430" font-size="14" fill="#6a1b9a" class="title-text">Continuous Random Variable Expectation</text>
    <text x="40" y="460" font-size="12" fill="#333">For a continuous random variable X with probability density function f(x):</text>
    <rect x="40" y="475" width="720" height="35" rx="5" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
    <text x="400" y="495" text-anchor="middle" font-size="18" fill="#6a1b9a" class="formula-text">
      <tspan>E[X] = ∫</tspan><tspan font-size="14" fill="#666">-∞</tspan><tspan></tspan><tspan font-size="14" fill="#666">∞</tspan><tspan> x · f(x) dx</tspan>
    </text>
  </g>

  <!-- STEP 5: Joint Distribution Expectation -->
  <g class="step" id="step5" data-narration="For joint distributions, expectation of a function g(X,Y) sums over all possible pairs weighted by joint probability.">
    <rect x="20" y="515" width="760" height="100" rx="8" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="40" y="540" font-size="14" fill="#00695c" class="title-text">Expectation for Joint Distributions</text>
    <text x="40" y="565" font-size="11" fill="#333">For two random variables X and Y with joint PMF P(X=x, Y=y):</text>
    <rect x="40" y="580" width="350" height="45" rx="5" fill="#e0f2f1" stroke="#00796b" stroke-width="1"/>
    <text x="215" y="605" text-anchor="middle" font-size="15" fill="#004d40" class="formula-text">
      <tspan>E[g(X,Y)] = Σ</tspan><tspan font-size="11" fill="#666">x</tspan><tspan> Σ</tspan><tspan font-size="11" fill="#666">y</tspan><tspan> g(x,y) · P(X=x,Y=y)</tspan>
    </text>
    <rect x="410" y="580" width="350" height="45" rx="5" fill="#e0f2f1" stroke="#00796b" stroke-width="1"/>
    <text x="585" y="605" text-anchor="middle" font-size="14" fill="#004d40" class="formula-text">
      <tspan>Continuous: ∫∫ g(x,y) f(x,y) dx dy</tspan>
    </text>
  </g>

  <!-- STEP 6: Important Case g(X,Y) = X + Y -->
  <g class="step" id="step6" data-narration="A key property: expectation of a sum equals sum of expectations, regardless of whether variables are independent.">
    <rect x="20" y="630" width="760" height="90" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="655" font-size="14" fill="#c62828" class="title-text">Key Property: Linearity of Expectation</text>
    <text x="40" y="680" font-size="12" fill="#333">For g(X,Y) = X + Y, we use the linearity property:</text>
    <rect x="40" y="695" width="720" height="35" rx="5" fill="#ffebee" stroke="#d32f2f" stroke-width="1"/>
    <text x="400" y="715" text-anchor="middle" font-size="18" fill="#b71c1c" class="formula-text">
      <tspan>E[X + Y] = E[X] + E[Y]  </tspan><tspan font-size="12" fill="#c62828">(Always true!)</tspan>
    </text>
  </g>

  <!-- STEP 7: Conditional Expectation Definition -->
  <g class="step" id="step7" data-narration="Conditional expectation E[X|Y=y] is the expected value of X given that Y has a specific value y.">
    <rect x="20" y="735" width="760" height="95" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="760" font-size="14" fill="#1565c0" class="title-text">Conditional Expectation</text>
    <text x="40" y="785" font-size="11" fill="#333">The expected value of X given that Y = y (using conditional distribution):</text>
    <rect x="40" y="800" width="720" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="823" text-anchor="middle" font-size="16" fill="#0d47a1" class="formula-text">
      <tspan>E[X | Y = y] = Σ</tspan><tspan font-size="12" fill="#666">x</tspan><tspan> x · P(X = x | Y = y)</tspan>
    </text>
    <text x="580" y="758" font-size="10" fill="#666">Creates a random variable E[X|Y]</text>
  </g>

  <!-- STEP 8: Law of Total Expectation -->
  <g class="step" id="step8" data-narration="The Law of Total Expectation states E[X] equals the expected value of conditional expectation E[E[X|Y]].">
    <rect x="20" y="845" width="760" height="95" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="870" font-size="14" fill="#2e7d32" class="title-text">Law of Total Expectation (Tower Property)</text>
    <text x="40" y="895" font-size="11" fill="#333">We can find marginal expectation by first conditioning on Y, then averaging:</text>
    <rect x="40" y="910" width="720" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="400" y="933" text-anchor="middle" font-size="20" fill="#1b5e20" class="formula-text">
      E[X] = E[ E[X | Y] ]
    </text>
    <text x="580" y="870" font-size="10" fill="#666">Powerful tool for multi-stage problems</text>
  </g>

  <!-- STEP 9: Example - Joint PMF Table -->
  <g class="step" id="step9" data-narration="Let us work through an example with a joint probability mass function table for variables X and Y.">
    <rect x="20" y="955" width="760" height="100" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="980" font-size="14" fill="#e65100" class="title-text">Example: Joint PMF Table</text>
    <text x="40" y="1005" font-size="11" fill="#333">Given the joint PMF P(X=x, Y=y):</text>
    <!-- Table header -->
    <rect x="200" y="1015" width="400" height="50" rx="5" fill="#fff8e1" stroke="#ff8f00" stroke-width="1"/>
    <text x="400" y="1033" text-anchor="middle" font-size="10" fill="#333">Y=0</text>
    <text x="450" y="1033" text-anchor="middle" font-size="10" fill="#333">Y=1</text>
    <text x="500" y="1033" text-anchor="middle" font-size="10" fill="#333">Y=2</text>
    <text x="380" y="1055" text-anchor="middle" font-size="11" fill="#e65100" class="title-text">X=0</text>
    <text x="400" y="1055" text-anchor="middle" font-size="10" fill="#333">0.1</text>
    <text x="450" y="1055" text-anchor="middle" font-size="10" fill="#333">0.2</text>
    <text x="500" y="1055" text-anchor="middle" font-size="10" fill="#333">0.0</text>
    <text x="380" y="1068" text-anchor="middle" font-size="11" fill="#e65100" class="title-text">X=1</text>
    <text x="400" y="1068" text-anchor="middle" font-size="10" fill="#333">0.1</text>
    <text x="450" y="1068" text-anchor="middle" font-size="10" fill="#333">0.3</text>
    <text x="500" y="1068" text-anchor="middle" font-size="10" fill="#333">0.1</text>
    <text x="380" y="1081" text-anchor="middle" font-size="11" fill="#e65100" class="title-text">X=2</text>
    <text x="400" y="1081" text-anchor="middle" font-size="10" fill="#333">0.0</text>
    <text x="450" y="1081" text-anchor="middle" font-size="10" fill="#333">0.1</text>
    <text x="500" y="1081" text-anchor="middle" font-size="10" fill="#333">0.1</text>
  </g>

  <!-- STEP 10: Finding Marginal P(X) -->
  <g class="step" id="step10" data-narration="First, we find marginal probabilities of X by summing each row of the joint table across all Y values.">
    <rect x="20" y="1070" width="760" height="90" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="1095" font-size="14" fill="#6a1b9a" class="title-text">Step 1: Find Marginal PMF of X</text>
    <text x="40" y="1120" font-size="11" fill="#333">Sum each row to get P(X = x):</text>
    <rect x="40" y="1135" width="720" height="35" rx="5" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1"/>
    <text x="100" y="1155" text-anchor="middle" font-size="12" fill="#6a1b9a">
      P(X=0) = 0.1+0.2+0.0 = <tspan font-weight="bold">0.3</tspan>
    </text>
    <text x="400" y="1155" text-anchor="middle" font-size="12" fill="#6a1b9a">
      P(X=1) = 0.1+0.3+0.1 = <tspan font-weight="bold">0.5</tspan>
    </text>
    <text x="660" y="1155" text-anchor="middle" font-size="12" fill="#6a1b9a">
      P(X=2) = 0.0+0.1+0.1 = <tspan font-weight="bold">0.2</tspan>
    </text>
  </g>

  <!-- STEP 11: Computing E[X] -->
  <g class="step" id="step11" data-narration="Now compute E[X] by summing each value of X multiplied by its marginal probability P(X=x).">
    <rect x="20" y="1175" width="760" height="90" rx="8" fill="url(#tealGrad)" filter="url(#shadow)"/>
    <text x="40" y="1200" font-size="14" fill="#00695c" class="title-text">Step 2: Compute E[X]</text>
    <text x="40" y="1225" font-size="11" fill="#333">Apply the expectation formula:</text>
    <rect x="40" y="1240" width="720" height="35" rx="5" fill="#e0f2f1" stroke="#00796b" stroke-width="1"/>
    <text x="400" y="1260" text-anchor="middle" font-size="14" fill="#004d40" class="formula-text">
      E[X] = (0)(0.3) + (1)(0.5) + (2)(0.2) = 0 + 0.5 + 0.4 = <tspan font-weight="bold" font-size="16" fill="#00695c">0.9</tspan>
    </text>
  </g>

  <!-- STEP 12: Computing E[XY] -->
  <g class="step" id="step12" data-narration="For E[XY], we multiply X and Y values together for each cell, then sum weighted by joint probability.">
    <rect x="20" y="1280" width="760" height="100" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="1305" font-size="14" fill="#c62828" class="title-text">Bonus: Compute E[XY]</text>
    <text x="40" y="1330" font-size="11" fill="#333">Here g(X,Y) = X × Y. Only non-zero terms where x≠0 and y≠0:</text>
    <rect x="40" y="1345" width="720" height="45" rx="5" fill="#ffebee" stroke="#d32f2f" stroke-width="1"/>
    <text x="400" y="1365" text-anchor="middle" font-size="12" fill="#b71c1c" class="formula-text">
      E[XY] = (1×1)(0.3) + (1×2)(0.1) + (2×1)(0.1) + (2×2)(0.1)
    </text>
    <text x="400" y="1380" text-anchor="middle" font-size="14" fill="#b71c1c" class="formula-text">
      = 0.3 + 0.2 + 0.2 + 0.4 = <tspan font-weight="bold">1.1</tspan>
    </text>
  </g>

  <!-- STEP 13: Summary - Key Formulas -->
  <g class="step" id="step13" data-narration="Let us summarize the key formulas for expectation: definition, linearity, conditional expectation, and total expectation.">
    <rect x="20" y="1395" width="760" height="100" rx="8" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="40" y="1420" font-size="14" fill="white" class="title-text">Key Formulas Summary</text>
    <g transform="translate(40, 1440)">
      <rect x="0" y="0" width="350" height="35" rx="4" fill="rgba(255,255,255,0.15)"/>
      <text x="175" y="22" text-anchor="middle" font-size="11" fill="#c5cae9">E[X] = Σ x · P(X=x)</text>
      
      <rect x="360" y="0" width="350" height="35" rx="4" fill="rgba(255,255,255,0.15)"/>
      <text x="535" y="22" text-anchor="middle" font-size="11" fill="#c5cae9">E[X+Y] = E[X] + E[Y]</text>
      
      <rect x="0" y="40" width="350" height="35" rx="4" fill="rgba(255,255,255,0.15)"/>
      <text x="175" y="62" text-anchor="middle" font-size="11" fill="#c5cae9">E[X|Y=y] = Σ x · P(X=x|Y=y)</text>
      
      <rect x="360" y="40" width="350" height="35" rx="4" fill="rgba(255,255,255,0.15)"/>
      <text x="535" y="62" text-anchor="middle" font-size="11" fill="#c5cae9">E[X] = E[E[X|Y]]</text>
    </g>
  </g>

  <!-- STEP 14: Applications & Tips -->
  <g class="step" id="step14" data-narration="Apply these concepts to analyze algorithms, compute covariance, and solve exam problems on joint distributions.">
    <rect x="20" y="1510" width="760" height="40" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="400" y="1535" text-anchor="middle" font-size="12" fill="#1b5e20" class="title-text">
      Applications: Algorithm Analysis • Covariance • Markov Chains • Machine Learning Loss Functions
    </text>
  </g>
</svg>