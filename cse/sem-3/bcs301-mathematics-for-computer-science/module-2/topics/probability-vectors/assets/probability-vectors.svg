<svg viewBox="0 0 800 1450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcdd2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2dfdb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Times New Roman', serif; font-style: italic; }
  </style>
  
  <rect width="800" height="1450" fill="#f8f9fa"/>

  <g class="step" id="step0" data-narration="Welcome to Probability Vectors. This fundamental concept helps us represent uncertainty in computer systems.">
    <rect x="0" y="0" width="800" height="55" rx="0" fill="url(#titleGradient)"/>
    <text x="400" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="white">Probability Vectors</text>
    <text x="400" y="48" text-anchor="middle" font-size="11" fill="#e3f2fd">Mathematics for Computer Science | Markov Chains Foundation</text>
  </g>

  <g class="step" id="step1" data-narration="Probability vectors model uncertainty in real systems: search engines, weather prediction, and AI behavior models.">
    <rect x="30" y="65" width="740" height="85" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="85" font-size="14" font-weight="bold" fill="#1565c0">Why Do We Need Probability Vectors?</text>
    <g transform="translate(50, 100)">
      <circle cx="10" cy="8" r="5" fill="#4caf50"><animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/></circle>
      <text x="22" y="12" font-size="11" fill="#333">Google PageRank: Modeling web surfer behavior</text>
    </g>
    <g transform="translate(280, 100)">
      <circle cx="10" cy="8" r="5" fill="#ff9800"><animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite" begin="0.3s"/></circle>
      <text x="22" y="12" font-size="11" fill="#333">Weather Forecasting: Predicting outcomes</text>
    </g>
    <g transform="translate(520, 100)">
      <circle cx="10" cy="8" r="5" fill="#9c27b0"><animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite" begin="0.6s"/></circle>
      <text x="22" y="12" font-size="11" fill="#333">AI and Games: NPC behavior modeling</text>
    </g>
    <line x1="50" y1="135" x2="750" y2="135" stroke="#e0e0e0" stroke-width="1"/>
    <text x="760" y="138" font-size="9" fill="#666" text-anchor="end">Stochastic Systems</text>
  </g>

  <g class="step" id="step2" data-narration="A probability vector is a row vector where all values are non-negative and sum to exactly one.">
    <rect x="30" y="160" width="740" height="85" rx="10" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="50" y="185" font-size="14" font-weight="bold" fill="#1565c0">What is a Probability Vector?</text>
    <text x="50" y="210" font-size="12" fill="#333">A row vector representing probability distribution across states:</text>
    <g transform="translate(280, 195)">
      <text font-size="18" font-family="Times New Roman" fill="#0d47a1" class="formula">v = [0.7, 0.2, 0.1]</text>
    </g>
    <rect x="490" y="182" width="100" height="30" rx="5" fill="#388e3c"/>
    <text x="540" y="202" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Sum = 1</text>
  </g>

  <g class="step" id="step3" data-narration="Formally, a probability vector has two rules: each element is between 0 and 1, and all elements sum to one.">
    <rect x="30" y="255" width="740" height="105" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="280" font-size="14" font-weight="bold" fill="#1565c0">Definition: Two Essential Rules</text>
    <rect x="50" y="295" width="340" height="50" rx="8" fill="url(#greenGradient)"/>
    <text x="65" y="315" font-size="12" font-weight="bold" fill="#2e7d32">Rule 1: Non-Negativity</text>
    <text x="65" y="332" font-size="11" fill="#333">0 ≤ v_i ≤ 1 for all elements</text>
    <text x="200" y="332" font-size="14" font-family="Times New Roman" fill="#0d47a1" class="formula">v = [0.5, 0.3, 0.2]</text>
    <rect x="410" y="295" width="340" height="50" rx="8" fill="url(#orangeGradient)"/>
    <text x="425" y="315" font-size="12" font-weight="bold" fill="#ef6c00">Rule 2: Total Probability = 1</text>
    <text x="425" y="332" font-size="11" fill="#333">Σ v_i = v_1 + v_2 + ... + v_n = 1</text>
    <text x="600" y="332" font-size="14" font-family="Times New Roman" fill="#0d47a1" class="formula">0.5+0.3+0.2 = 1</text>
    <g transform="translate(50, 350)">
      <circle cx="10" cy="10" r="6" fill="#4caf50"/>
      <text x="25" y="14" font-size="10" fill="#333">Valid: [0.5, 0.4, 0.1]</text>
    </g>
    <g transform="translate(250, 350)">
      <circle cx="10" cy="10" r="6" fill="#f44336"/>
      <text x="25" y="14" font-size="10" fill="#333">Invalid: [0.5, 0.6, 0.1] (sum=1.2)</text>
    </g>
    <g transform="translate(500, 350)">
      <circle cx="10" cy="10" r="6" fill="#f44336"/>
      <text x="25" y="14" font-size="10" fill="#333">Invalid: [-0.2, 0.8, 0.4] (negative)</text>
    </g>
  </g>

  <g class="step" id="step4" data-narration="Each component represents the probability of being in a specific state, like Working, Idle, or Failed.">
    <rect x="30" y="370" width="740" height="95" rx="10" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="50" y="395" font-size="14" font-weight="bold" fill="#7b1fa2">Visual Interpretation</text>
    <text x="50" y="415" font-size="11" fill="#333">Example: A server with three states</text>
    <g transform="translate(50, 425)">
      <rect x="0" y="0" width="120" height="30" rx="5" fill="#1976d2"/>
      <text x="60" y="20" font-size="12" fill="white" text-anchor="middle" font-weight="bold">State 1: Working</text>
      <text x="125" y="20" font-size="14" fill="#1976d2" font-weight="bold">0.7</text>
    </g>
    <g transform="translate(280, 425)">
      <rect x="0" y="0" width="120" height="30" rx="5" fill="#ff9800"/>
      <text x="60" y="20" font-size="12" fill="white" text-anchor="middle" font-weight="bold">State 2: Idle</text>
      <text x="125" y="20" font-size="14" fill="#ff9800" font-weight="bold">0.2</text>
    </g>
    <g transform="translate(510, 425)">
      <rect x="0" y="0" width="120" height="30" rx="5" fill="#f44336"/>
      <text x="60" y="20" font-size="12" fill="white" text-anchor="middle" font-weight="bold">State 3: Failed</text>
      <text x="125" y="20" font-size="14" fill="#f44336" font-weight="bold">0.1</text>
    </g>
    <text x="640" y="445" font-size="14" font-family="Times New Roman" fill="#0d47a1" class="formula">v = [0.7, 0.2, 0.1]</text>
  </g>

  <g class="step" id="step5" data-narration="We denote a probability vector with an arrow, written as v with subscript i representing each component.">
    <rect x="30" y="475" width="740" height="85" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="500" font-size="14" font-weight="bold" fill="#1565c0">Mathematical Notation</text>
    <text x="50" y="530" font-size="13" fill="#333">A probability vector with n states is written as:</text>
    <text x="320" y="530" font-size="20" font-family="Times New Roman" fill="#0d47a1" class="formula">v = [v_1, v_2, ..., v_n]</text>
    <text x="600" y="530" font-size="13" fill="#666">where 0 ≤ v_i ≤ 1</text>
  </g>

  <g class="step" id="step6" data-narration="The initial state vector represents the starting probability distribution before any transitions occur in the system.">
    <rect x="30" y="570" width="740" height="90" rx="10" fill="url(#tealGradient)" filter="url(#shadow)"/>
    <text x="50" y="595" font-size="14" font-weight="bold" fill="#00695c">Initial State Vector</text>
    <text x="50" y="615" font-size="11" fill="#333">The initial probability distribution at time t=0:</text>
    <g transform="translate(280, 605)">
      <rect x="0" y="0" width="60" height="35" rx="5" fill="#00897b"/>
      <text x="30" y="23" font-size="12" fill="white" text-anchor="middle" font-weight="bold">State 1</text>
      <text x="70" y="23" font-size="14" fill="#00897b" font-weight="bold">0.5</text>
    </g>
    <g transform="translate(420, 605)">
      <rect x="0" y="0" width="60" height="35" rx="5" fill="#00897b"/>
      <text x="30" y="23" font-size="12" fill="white" text-anchor="middle" font-weight="bold">State 2</text>
      <text x="70" y="23" font-size="14" fill="#00897b" font-weight="bold">0.3</text>
    </g>
    <g transform="translate(560, 605)">
      <rect x="0" y="0" width="60" height="35" rx="5" fill="#00897b"/>
      <text x="30" y="23" font-size="12" fill="white" text-anchor="middle" font-weight="bold">State 3</text>
      <text x="70" y="23" font-size="14" fill="#00897b" font-weight="bold">0.2</text>
    </g>
    <text x="650" y="625" font-size="13" font-family="Times New Roman" fill="#0d47a1" class="formula">v(0)</text>
  </g>

  <g class="step" id="step7" data-narration="Probability vectors can be added together when they represent the same state space to combine distributions.">
    <rect x="30" y="670" width="740" height="90" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="695" font-size="14" font-weight="bold" fill="#1565c0">Vector Addition</text>
    <text x="50" y="715" font-size="11" fill="#333">Combining two probability distributions:</text>
    <g transform="translate(50, 725)">
      <text font-size="14" fill="#333">v = [0.3, 0.4, 0.3]</text>
      <text x="150" y="0" font-size="14" fill="#333">+</text>
      <text x="170" y="0" font-size="14" fill="#333">w = [0.2, 0.5, 0.3]</text>
      <text x="350" y="0" font-size="14" fill="#333">=</text>
      <text x="375" y="0" font-size="14" font-family="Times New Roman" fill="#0d47a1" class="formula">[0.5, 0.9, 0.6]</text>
    </g>
    <rect x="600" y="720" width="150" height="28" rx="5" fill="#f44336"/>
    <text x="675" y="738" font-size="10" fill="white" text-anchor="middle" font-weight="bold">NOT a probability vector! (sum=2.0)</text>
  </g>

  <g class="step" id="step8" data-narration="Scalar multiplication scales each element by a constant value, and normalization divides by the sum to maintain validity.">
    <rect x="30" y="770" width="740" height="90" rx="10" fill="url(#pinkGradient)" filter="url(#shadow)"/>
    <text x="50" y="795" font-size="14" font-weight="bold" fill="#c2185b">Scalar Multiplication</text>
    <text x="50" y="815" font-size="11" fill="#333">Multiplying a vector by a scalar k:</text>
    <g transform="translate(50, 825)">
      <text font-size="14" fill="#333">k × v = k × [v_1, v_2, ..., v_n] = [k×v_1, k×v_2, ..., k×v_n]</text>
    </g>
    <g transform="translate(50, 840)">
      <text font-size="13" fill="#333">Example: 2 × [0.3, 0.2, 0.1] = [0.6, 0.4, 0.2]</text>
    </g>
    <text x="500" y="835" font-size="11" fill="#c2185b" font-weight="bold">Must normalize: divide by sum to get valid probability vector</text>
  </g>

  <g class="step" id="step9" data-narration="The uniform distribution is a special probability vector where all states have equal probability of occurrence.">
    <rect x="30" y="870" width="740" height="85" rx="10" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="50" y="895" font-size="14" font-weight="bold" fill="#1565c0">Special Case: Uniform Distribution</text>
    <text x="50" y="915" font-size="11" fill="#333">When all states have equal probability:</text>
    <g transform="translate(50, 925)">
      <text font-size="14" fill="#333">For n states, uniform distribution:</text>
      <text x="250" y="0" font-size="16" font-family="Times New Roman" fill="#0d47a1" class="formula">v = [1/n, 1/n, ..., 1/n]</text>
    </g>
    <g transform="translate(450, 925)">
      <rect x="0" y="-12" width="60" height="25" rx="4" fill="#1976d2"/>
      <text x="30" y="4" font-size="11" fill="white" text-anchor="middle">n=2</text>
      <text x="70" y="-4" font-size="13" font-family="Times New Roman" fill="#0d47a1">[0.5, 0.5]</text>
    </g>
    <g transform="translate(580, 925)">
      <rect x="0" y="-12" width="60" height="25" rx="4" fill="#1976d2"/>
      <text x="30" y="4" font-size="11" fill="white" text-anchor="middle">n=4</text>
      <text x="70" y="-4" font-size="13" font-family="Times New Roman" fill="#0d47a1">[0.25, 0.25, 0.25, 0.25]</text>
    </g>
  </g>

  <g class="step" id="step10" data-narration="In Markov chains, probability vectors evolve over time by multiplying with a transition matrix to get the next state.">
    <rect x="30" y="965" width="740" height="95" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="50" y="990" font-size="14" font-weight="bold" fill="#1565c0">Connection to Markov Chains</text>
    <text x="50" y="1010" font-size="11" fill="#333">Probability vectors evolve through matrix multiplication:</text>
    <g transform="translate(50, 1025)">
      <rect x="0" y="0" width="80" height="30" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
      <text x="40" y="20" font-size="12" fill="#0d47a1" text-anchor="middle" font-family="Times New Roman" class="formula">v(t)</text>
    </g>
    <polygon points="140,15 150,15 150,5 160,15 150,25 150,15" fill="#1976d2"/>
    <g transform="translate(170, 1025)">
      <rect x="0" y="0" width="80" height="30" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
      <text x="40" y="20" font-size="12" fill="#2e7d32" text-anchor="middle" font-family="Times New Roman" class="formula">P</text>
    </g>
    <polygon points="260,15 270,15 270,5 280,15 270,25 270,15" fill="#1976d2"/>
    <g transform="translate(290, 1025)">
      <rect x="0" y="0" width="80" height="30" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
      <text x="40" y="20" font-size="12" fill="#ef6c00" text-anchor="middle" font-family="Times New Roman" class="formula">v(t+1)</text>
    </g>
    <text x="450" y="1045" font-size="14" font-family="Times New Roman" fill="#0d47a1" class="formula">v(t+1) = v(t) × P</text>
    <text x="450" y="1060" font-size="10" fill="#666">Row vector multiplied by transition matrix</text>
  </g>

  <g class="step" id="step11" data-narration="Key applications include ranking web pages, predicting weather, speech recognition, and financial risk modeling.">
    <rect x="30" y="1070" width="740" height="85" rx="10" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="50" y="1095" font-size="14" font-weight="bold" fill="#ef6c00">Real-World Applications</text>
    <g transform="translate(50, 1110)">
      <circle cx="10" cy="8" r="5" fill="#1976d2"/>
      <text x="22" y="12" font-size="10" fill="#333">Google PageRank algorithm</text>
    </g>
    <g transform="translate(220, 1110)">
      <circle cx="10" cy="8" r="5" fill="#388e3c"/>
      <text x="22" y="12" font-size="10" fill="#333">Speech recognition systems</text>
    </g>
    <g transform="translate(410, 1110)">
      <circle cx="10" cy="8" r="5" fill="#f44336"/>
      <text x="22" y="12" font-size="10" fill="#333">Weather prediction models</text>
    </g>
    <g transform="translate(600, 1110)">
      <circle cx="10" cy="8" r="5" fill="#9c27b0"/>
      <text x="22" y="12" font-size="10" fill="#333">Financial risk assessment</text>
    </g>
    <line x1="50" y1="1140" x2="750" y2="1140" stroke="#ffcc80" stroke-width="2"/>
    <text x="400" y="1155" font-size="12" fill="#e65100" text-anchor="middle" font-weight="bold">Probability vectors enable intelligent decision-making under uncertainty</text>
  </g>

  <g class="step" id="step12" data-narration="In summary, probability vectors are essential tools that represent uncertain states, vital for modern computing and AI.">
    <rect x="30" y="1165" width="740" height="75" rx="10" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="1190" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Summary</text>
    <text x="400" y="1210" font-size="12" fill="#e3f2fd" text-anchor="middle">Probability Vectors: Row vectors with non-negative elements summing to 1</text>
    <text x="400" y="1225" font-size="11" fill="#bbdefb" text-anchor="middle">Used in Markov Chains, AI, Search Engines, and Stochastic Systems</text>
  </g>
</svg>