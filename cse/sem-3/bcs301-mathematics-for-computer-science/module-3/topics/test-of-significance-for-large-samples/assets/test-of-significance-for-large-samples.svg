<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes growBar {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .step { animation: fadeInSlide 0.6s ease-out forwards; opacity: 0; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .formula { font-family: 'Courier New', monospace; font-weight: bold; }
    .title-text { font-size: 22px; font-weight: bold; fill: white; }
    .subtitle { font-size: 14px; fill: #555; }
    .step-title { font-size: 13px; font-weight: bold; fill: #1565c0; }
    .step-body { font-size: 11px; fill: #333; }
    .step-label { font-size: 10px; fill: #666; }
    .highlight { fill: #ff9800; font-weight: bold; }
    .draw-line {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawLine 1.5s ease-out forwards;
    }
  </style>

  <rect width="800" height="1450" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to Test of Significance for Large Samples. This topic teaches us how to make data-driven decisions using statistical hypothesis testing.">
    <rect x="0" y="0" width="800" height="55" rx="0" fill="url(#titleGrad)"/>
    <text x="400" y="35" text-anchor="middle" class="title-text">Test of Significance for Large Samples</text>
    <text x="400" y="48" text-anchor="middle" font-size="11" fill="#e3f2fd">Hypothesis Testing with Z-Statistic | n &gt; 30</text>
  </g>

  <!-- Step 1: What is Test of Significance -->
  <g class="step" id="step1" data-narration="A test of significance is a formal procedure to determine whether sample data supports a claim about a population parameter.">
    <rect x="20" y="65" width="760" height="85" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="85" class="step-title">What is Test of Significance?</text>
    <text x="40" y="105" class="step-body">A formal procedure to determine whether evidence from sample data supports</text>
    <text x="40" y="120" class="step-body">a claim about a population parameter (mean, proportion, etc.)</text>
    <text x="40" y="138" class="step-label" fill="#1565c0">Key Idea: Use sample data to make objective decisions about population claims</text>
    <rect x="600" y="75" width="150" height="55" rx="8" fill="#1976d2"/>
    <text x="675" y="95" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Decision</text>
    <text x="675" y="115" text-anchor="middle" fill="white" font-size="10">Based on Evidence</text>
  </g>

  <!-- Step 2: Why Large Samples Matter -->
  <g class="step" id="step2" data-narration="For large samples (n greater than 30), the Central Limit Theorem ensures sampling distributions follow a normal distribution.">
    <rect x="20" y="160" width="760" height="85" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="180" class="step-title">Why Large Samples Matter</text>
    <text x="40" y="200" class="step-body">For large samples (n &gt; 30), the <tspan class="highlight">Central Limit Theorem</tspan> ensures</text>
    <text x="40" y="215" class="step-body">sampling distributions follow a Normal distribution N(μ, σ²/n)</text>
    <!-- Bell curve visualization -->
    <g transform="translate(450, 175)">
      <path d="M0,50 Q75,-30 150,50" fill="none" stroke="#388e3c" stroke-width="2" class="draw-line"/>
      <line x1="75" y1="50" x2="75" y2="65" stroke="#388e3c" stroke-width="1" stroke-dasharray="3"/>
      <text x="75" y="78" text-anchor="middle" font-size="9" fill="#388e3c">Normal Distribution</text>
    </g>
    <text x="250" y="225" font-size="10" fill="#388e3c">→ Allows us to use Z-statistic for testing</text>
  </g>

  <!-- Step 3: Null and Alternative Hypotheses -->
  <g class="step" id="step3" data-narration="Every test begins with two hypotheses: the null hypothesis (no effect) and the alternative hypothesis (what we aim to prove).">
    <rect x="20" y="255" width="760" height="90" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="275" class="step-title">Null and Alternative Hypotheses</text>
    <!-- H0 Box -->
    <rect x="40" y="290" width="330" height="45" rx="8" fill="#fff"/>
    <text x="55" y="308" font-size="12" font-weight="bold" fill="#f44336">H₀: Null Hypothesis</text>
    <text x="55" y="325" font-size="10" fill="#555">Hypothesis of no effect / status quo</text>
    <text x="55" y="338" font-size="10" fill="#f44336" font-family="monospace">Example: H₀: μ = 70</text>
    <!-- H1 Box -->
    <rect x="390" y="290" width="330" height="45" rx="8" fill="#fff"/>
    <text x="405" y="308" font-size="12" font-weight="bold" fill="#388e3c">H₁: Alternative Hypothesis</text>
    <text x="405" y="325" font-size="10" fill="#555">What we aim to establish / prove</text>
    <text x="405" y="338" font-size="10" fill="#388e3c" font-family="monospace">Example: H₁: μ ≠ 70 (two-tailed)</text>
  </g>

  <!-- Step 4: Level of Significance -->
  <g class="step" id="step4" data-narration="The significance level alpha represents the probability of rejecting a true null hypothesis, known as Type I error.">
    <rect x="20" y="355" width="760" height="90" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="375" class="step-title">Level of Significance (α)</text>
    <text x="40" y="395" class="step-body">Probability of rejecting H₀ when it is actually true</text>
    <text x="40" y="410" class="step-body">This is called <tspan class="highlight">Type I Error</tspan> (α)</text>
    <!-- Alpha values -->
    <g transform="translate(300, 380)">
      <rect x="0" y="0" width="80" height="30" rx="5" fill="#fff" stroke="#f44336"/>
      <text x="40" y="20" text-anchor="middle" font-size="11" fill="#f44336">α = 0.05</text>
    </g>
    <g transform="translate(390, 380)">
      <rect x="0" y="0" width="80" height="30" rx="5" fill="#fff" stroke="#f44336"/>
      <text x="40" y="20" text-anchor="middle" font-size="11" fill="#f44336">α = 0.01</text>
    </g>
    <g transform="translate(480, 380)">
      <rect x="0" y="0" width="80" height="30" rx="5" fill="#fff" stroke="#f44336"/>
      <text x="40" y="20" text-anchor="middle" font-size="11" fill="#f44336">α = 0.10</text>
    </g>
    <text x="580" y="395" font-size="10" fill="#666">Common choice: 5%</text>
    <text x="580" y="410" font-size="10" fill="#666">Type II Error (β): Failing to</text>
    <text x="580" y="422" font-size="10" fill="#666">reject false H₀</text>
  </g>

  <!-- Step 5: Z-Test for Single Mean -->
  <g class="step" id="step5" data-narration="For testing a single population mean, we use the Z-formula: Z equals sample mean minus hypothesized mean divided by standard error.">
    <rect x="20" y="455" width="760" height="105" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="475" class="step-title">Z-Test: Test for Single Mean (H₀: μ = μ₀)</text>
    <!-- Formula box -->
    <rect x="40" y="495" width="450" height="50" rx="8" fill="#fff"/>
    <text x="55" y="520" font-family="'Courier New', monospace" font-size="16" fill="#1565c0" font-weight="bold">Z = (x̄ - μ₀) / (σ / √n)</text>
    <!-- Variable definitions -->
    <g transform="translate(500, 495)">
      <text x="0" y="15" font-size="10" fill="#333"><tspan font-weight="bold">x̄</tspan> = Sample Mean</text>
      <text x="0" y="28" font-size="10" fill="#333"><tspan font-weight="bold">μ₀</tspan> = Hypothesized Mean</text>
      <text x="0" y="41" font-size="10" fill="#333"><tspan font-weight="bold">σ</tspan> = Population SD</text>
      <text x="150" y="15" font-size="10" fill="#333"><tspan font-weight="bold">n</tspan> = Sample Size</text>
    </g>
    <text x="40" y="568" font-size="10" fill="#7b1fa2">Note: For large samples, sample SD (s) can be used when σ is unknown</text>
  </g>

  <!-- Step 6: Z-Test for Difference of Means -->
  <g class="step" id="step6" data-narration="To compare two population means, we calculate Z using the difference of sample means divided by the combined standard error.">
    <rect x="20" y="570" width="760" height="100" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="590" class="step-title">Z-Test: Test for Difference of Means (H₀: μ₁ = μ₂)</text>
    <!-- Formula box -->
    <rect x="40" y="610" width="480" height="45" rx="8" fill="#fff"/>
    <text x="55" y="635" font-family="'Courier New', monospace" font-size="14" fill="#1976d2" font-weight="bold">Z = (x̄₁ - x̄₂) / √[(σ₁²/n₁) + (σ₂²/n₂)]</text>
    <!-- Variable definitions -->
    <g transform="translate(530, 610)">
      <text x="0" y="15" font-size="10" fill="#333"><tspan font-weight="bold">x̄₁, x̄₂</tspan> = Sample Means</text>
      <text x="0" y="28" font-size="10" fill="#333"><tspan font-weight="bold">σ₁, σ₂</tspan> = Population SDs</text>
      <text x="0" y="41" font-size="10" fill="#333"><tspan font-weight="bold">n₁, n₂</tspan> = Sample Sizes</text>
    </g>
    <text x="40" y="680" font-size="10" fill="#1565c0">Used when comparing two independent populations</text>
  </g>

  <!-- Step 7: Z-Test for Single Proportion -->
  <g class="step" id="step7" data-narration="For testing population proportion, we use the Z-formula with expected proportion p-zero and its complement q-zero.">
    <rect x="20" y="680" width="760" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="700" class="step-title">Z-Test: Test for Single Proportion (H₀: p = p₀)</text>
    <!-- Formula box -->
    <rect x="40" y="720" width="450" height="45" rx="8" fill="#fff"/>
    <text x="55" y="745" font-family="'Courier New', monospace" font-size="15" fill="#388e3c" font-weight="bold">Z = (p̂ - p₀) / √[(p₀ × q₀) / n]</text>
    <!-- Variable definitions -->
    <g transform="translate(500, 720)">
      <text x="0" y="15" font-size="10" fill="#333"><tspan font-weight="bold">p̂</tspan> = Sample Proportion</text>
      <text x="0" y="28" font-size="10" fill="#333"><tspan font-weight="bold">p₀</tspan> = Hypothesized Proportion</text>
      <text x="0" y="41" font-size="10" fill="#333"><tspan font-weight="bold">q₀</tspan> = 1 - p₀</text>
    </g>
    <text x="40" y="788" font-size="10" fill="#2e7d32">Example: Testing if 60% of users prefer a product</text>
  </g>

  <!-- Step 8: Procedure Steps -->
  <g class="step" id="step8" data-narration="The hypothesis testing procedure has five key steps: formulate hypotheses, choose alpha, compute statistic, determine critical region, and make decision.">
    <rect x="20" y="790" width="760" height="110" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="810" class="step-title">Five Steps in Hypothesis Testing</text>
    <!-- Step boxes -->
    <g transform="translate(40, 830)">
      <rect x="0" y="0" width="135" height="55" rx="6" fill="#fff"/>
      <text x="10" y="15" font-size="10" font-weight="bold" fill="#ff9800">Step 1</text>
      <text x="10" y="30" font-size="9" fill="#333">Formulate H₀ and H₁</text>
      <text x="10" y="45" font-size="8" fill="#777">Clearly state claims</text>
    </g>
    <g transform="translate(185, 830)">
      <rect x="0" y="0" width="135" height="55" rx="6" fill="#fff"/>
      <text x="10" y="15" font-size="10" font-weight="bold" fill="#ff9800">Step 2</text>
      <text x="10" y="30" font-size="9" fill="#333">Choose α</text>
      <text x="10" y="45" font-size="8" fill="#777">Typically 0.05</text>
    </g>
    <g transform="translate(330, 830)">
      <rect x="0" y="0" width="135" height="55" rx="6" fill="#fff"/>
      <text x="10" y="15" font-size="10" font-weight="bold" fill="#ff9800">Step 3</text>
      <text x="10" y="30" font-size="9" fill="#333">Compute Z</text>
      <text x="10" y="45" font-size="8" fill="#777">Use formula</text>
    </g>
    <g transform="translate(475, 830)">
      <rect x="0" y="0" width="135" height="55" rx="6" fill="#fff"/>
      <text x="10" y="15" font-size="10" font-weight="bold" fill="#ff9800">Step 4</text>
      <text x="10" y="30" font-size="9" fill="#333">Critical Region</text>
      <text x="10" y="45" font-size="8" fill="#777">Find Z-critical</text>
    </g>
    <g transform="translate(620, 830)">
      <rect x="0" y="0" width="135" height="55" rx="6" fill="#fff"/>
      <text x="10" y="15" font-size="10" font-weight="bold" fill="#ff9800">Step 5</text>
      <text x="10" y="30" font-size="9" fill="#333">Make Decision</text>
      <text x="10" y="45" font-size="8" fill="#777">Reject or Not?</text>
    </g>
  </g>

  <!-- Step 9: Decision Making -->
  <g class="step" id="step9" data-narration="To make a decision, compare the calculated Z-value with the critical Z-value from the standard normal table.">
    <rect x="20" y="910" width="760" height="95" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="930" class="step-title">Decision Making Rule</text>
    <!-- Decision boxes -->
    <rect x="40" y="950" width="240" height="40" rx="8" fill="#c8e6c9"/>
    <text x="160" y="970" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">REJECT H₀</text>
    <text x="160" y="985" text-anchor="middle" font-size="9" fill="#2e7d32">if |Z-cal| > |Z-crit|</text>
    
    <rect x="300" y="950" width="240" height="40" rx="8" fill="#ffcdd2"/>
    <text x="420" y="970" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">FAIL TO REJECT H₀</text>
    <text x="420" y="985" text-anchor="middle" font-size="9" fill="#c62828">if |Z-cal| ≤ |Z-crit|</text>
    
    <!-- Critical values reference -->
    <rect x="560" y="950" width="200" height="40" rx="8" fill="#fff"/>
    <text x="660" y="968" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">Common Critical Values</text>
    <text x="660" y="982" text-anchor="middle" font-size="9" fill="#666">α=0.05: Z=±1.96 (two-tailed)</text>
    
    <text x="40" y="1010" font-size="10" fill="#c62828">One-tailed test: Z = -1.645 (left) or +1.645 (right) at α=0.05</text>
  </g>

  <!-- Step 10: Example Problem -->
  <g class="step" id="step10" data-narration="Let's work through an example: Testing if battery company's claim of 100-hour average life is valid using a sample of 64 batteries.">
    <rect x="20" y="1015" width="760" height="110" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="1035" class="step-title">Example: Battery Life Test</text>
    <text x="40" y="1055" class="step-body">A company claims batteries last <tspan class="highlight">100 hours</tspan> on average.</text>
    <text x="40" y="1070" class="step-body">Sample: n=64, x̄=98 hours, s=12 hours. Test at α=0.05</text>
    
    <!-- Given values box -->
    <rect x="40" y="1085" width="720" height="25" rx="5" fill="#fff" stroke="#1976d2"/>
    <text x="50" y="1103" font-size="10" fill="#333">Given: n=64, x̄=98, s=12, μ₀=100, α=0.05</text>
    
    <!-- Hypotheses -->
    <rect x="40" y="1115" width="300" height="25" rx="5" fill="#ffebee"/>
    <text x="50" y="1132" font-size="10" fill="#f44336">H₀: μ = 100 | H₁: μ ≠ 100 (two-tailed)</text>
  </g>

  <!-- Step 11: Example Solution -->
  <g class="step" id="step11" data-narration="Calculating: Z equals negative 2 divided by 1.5, giving Z equals negative 1.333. Since 1.333 is less than 1.96, we fail to reject.">
    <rect x="20" y="1135" width="760" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="1155" class="step-title">Solution</text>
    
    <!-- Calculation -->
    <rect x="40" y="1175" width="450" height="45" rx="8" fill="#fff"/>
    <text x="55" y="1200" font-family="'Courier New', monospace" font-size="14" fill="#388e3c" font-weight="bold">Z = (98 - 100) / (12/√64) = -2 / 1.5 = -1.333</text>
    
    <!-- Decision -->
    <rect x="500" y="1175" width="260" height="45" rx="8" fill="#fff"/>
    <text x="515" y="1195" font-size="10" fill="#333">Critical Value (α=0.05, two-tailed):</text>
    <text x="515" y="1212" font-size="12" fill="#c62828" font-weight="bold">Z-critical = ±1.96</text>
    
    <text x="40" y="1240" font-size="11" fill="#2e7d32" font-weight="bold">Conclusion: |Z| = 1.333 &lt; 1.96 → FAIL TO REJECT H₀</text>
    <text x="40" y="1255" font-size="10" fill="#555">There is insufficient evidence to reject the company's claim.</text>
  </g>

  <!-- Step 12: Key Points Summary -->
  <g class="step" id="step12" data-narration="Key takeaways: Large sample Z-tests rely on the Central Limit Theorem. We test null against alternative hypotheses at a chosen significance level.">
    <rect x="20" y="1345" width="760" height="85" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="1365" class="step-title">Key Points Summary</text>
    
    <g transform="translate(40, 1380)">
      <text x="0" y="0" font-size="10" fill="#333">• Z-test applies to large samples (n &gt; 30) due to Central Limit Theorem</text>
      <text x="0" y="15" font-size="10" fill="#333">• Three main tests: Single Mean, Difference of Means, Single Proportion</text>
      <text x="0" y="30" font-size="10" fill="#333">• Decision based on comparing calculated |Z| to critical Z-value</text>
    </g>
  </g>
</svg>