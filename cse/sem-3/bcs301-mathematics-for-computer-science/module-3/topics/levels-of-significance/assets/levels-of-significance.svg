<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="levels-of-significance">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Section 1: What is Alpha (Top-left) -->
  <g data-narration="The level of significance alpha is the maximum probability of rejecting a true null hypothesis that the researcher will accept. It is chosen before collecting data and represents the tolerance for a Type I error or false positive.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="40" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Significance Level</text>
    <text x="110" y="62" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">alpha (a)</text>
    <text x="110" y="80" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="9">P(Reject H0 | H0 true)</text>
    <text x="110" y="95" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="9">Chosen before experiment</text>
  </g>

  <!-- Section 2: Common Values (Top-right) -->
  <g data-narration="The most common significance levels are 0.05 meaning a five percent chance of false rejection, 0.01 for stricter one percent control, and 0.10 for more relaxed exploratory studies. Lower alpha means stricter evidence is required to reject the null hypothesis.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="310" y="40" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Common Values</text>
    <rect x="235" y="52" width="45" height="18" rx="4" fill="white" opacity="0.3"/>
    <text x="257" y="65" text-anchor="middle" fill="white" font-family="Arial" font-size="9">a = 0.05</text>
    <rect x="285" y="52" width="45" height="18" rx="4" fill="white" opacity="0.25"/>
    <text x="307" y="65" text-anchor="middle" fill="white" font-family="Arial" font-size="9">a = 0.01</text>
    <rect x="335" y="52" width="45" height="18" rx="4" fill="white" opacity="0.2"/>
    <text x="357" y="65" text-anchor="middle" fill="white" font-family="Arial" font-size="9">a = 0.10</text>
    <text x="310" y="85" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="9">Lower alpha = stricter test</text>
    <text x="310" y="97" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="9">Higher alpha = more lenient</text>
  </g>

  <!-- Section 3: Type I and II Errors (Bottom-left) -->
  <g data-narration="A Type I error rejects a true null hypothesis with probability alpha. A Type II error fails to reject a false null hypothesis with probability beta. Decreasing alpha increases beta creating a tradeoff between the two error types that researchers must balance.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" stroke="#880e4f" stroke-width="1.5"/>
    <text x="110" y="140" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Error Types</text>
    <text x="110" y="160" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Type I: Reject true H0 (alpha)</text>
    <text x="110" y="176" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Type II: Accept false H0 (beta)</text>
    <text x="110" y="195" text-anchor="middle" fill="#ffcdd2" font-family="Arial" font-size="9">Tradeoff: lower alpha = higher beta</text>
  </g>

  <!-- Section 4: Critical Region (Bottom-right) -->
  <g data-narration="The critical region is the set of test statistic values that lead to rejecting H zero. For a two-tailed test at alpha 0.05 the critical values are plus and minus 1.96. For a one-tailed test the entire alpha area is on one side giving z critical of 1.645.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" stroke="#bf360c" stroke-width="1.5"/>
    <text x="310" y="140" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Critical Region</text>
    <text x="310" y="160" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Two-tailed: z = +/-1.96</text>
    <text x="310" y="176" text-anchor="middle" fill="white" font-family="Arial" font-size="9">One-tailed: z = 1.645</text>
    <text x="310" y="195" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">Reject H0 if Z falls in region</text>
  </g>

  <!-- Center Title -->
  <text x="210" y="225" text-anchor="middle" fill="#333" font-family="Arial" font-size="14" font-weight="bold">Levels of Significance</text>
  <text x="210" y="242" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Controlling Decision Errors</text>

  <!-- Section 5: Critical Values Table -->
  <g data-narration="At alpha 0.10 the two-tailed critical z values are plus minus 1.645. At alpha 0.05 they are plus minus 1.96. At alpha 0.01 they are plus minus 2.576. Choosing the right alpha depends on the cost of errors in the specific application.">
    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="210" y="282" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Critical Z-Values Table</text>
    <line x1="40" y1="290" x2="380" y2="290" stroke="white" stroke-width="0.5"/>
    <text x="80" y="306" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">Alpha</text>
    <text x="210" y="306" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">Two-tailed z</text>
    <text x="340" y="306" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">One-tailed z</text>
    <line x1="40" y1="312" x2="380" y2="312" stroke="white" stroke-width="0.5"/>
    <text x="80" y="330" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">0.10</text>
    <text x="210" y="330" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">+/- 1.645</text>
    <text x="340" y="330" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">1.282</text>
    <text x="80" y="348" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">0.05</text>
    <text x="210" y="348" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">+/- 1.960</text>
    <text x="340" y="348" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">1.645</text>
    <text x="80" y="366" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">0.01</text>
    <text x="210" y="366" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">+/- 2.576</text>
    <text x="340" y="366" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">2.326</text>
  </g>
</svg>
