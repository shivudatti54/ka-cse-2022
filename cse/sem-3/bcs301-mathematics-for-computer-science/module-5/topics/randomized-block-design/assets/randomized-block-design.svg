<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1120">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .body-text { font-family: 'Segoe UI', Arial, sans-serif; }
    .formula-text { font-family: 'Times New Roman', serif; font-style: italic; }
  </style>

  <!-- Background -->
  <rect width="800" height="1120" fill="#f8f9fa"/>
  
  <!-- Title -->
  <g class="step" id="step0" data-narration="Welcome to Randomized Block Design. This powerful technique controls variability by grouping similar experimental units into blocks.">
    <rect x="10" y="10" width="780" height="45" rx="10" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" font-size="22" font-weight="bold" class="title-text">Randomized Block Design</text>
  </g>

  <!-- Step 1: What is RBD -->
  <g class="step" id="step1" data-narration="RBD is an experimental design that groups similar subjects into blocks and randomly assigns treatments within each block to minimize variability.">
    <rect x="20" y="65" width="760" height="85" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="40" y="85" fill="#1565c0" font-size="14" font-weight="bold" class="title-text">What is Randomized Block Design?</text>
    <text x="40" y="108" fill="#333" font-size="11" class="body-text">A statistical design that accounts for known sources of variability by</text>
    <text x="40" y="122" fill="#333" font-size="11" class="body-text">grouping similar elements into blocks, then randomizing treatments</text>
    <text x="40" y="136" fill="#333" font-size="11" class="body-text">within each block to ensure unbiased comparisons.</text>
    <!-- Icon representation -->
    <rect x="650" y="80" width="100" height="55" rx="5" fill="#1976d2" opacity="0.8"/>
    <rect x="660" y="90" width="25" height="15" rx="2" fill="white" opacity="0.9"/>
    <rect x="695" y="90" width="25" height="15" rx="2" fill="white" opacity="0.9"/>
    <rect x="660" y="110" width="25" height="15" rx="2" fill="white" opacity="0.9"/>
    <rect x="695" y="110" width="25" height="15" rx="2" fill="white" opacity="0.9"/>
  </g>

  <!-- Step 2: Key Concepts -->
  <g class="step" id="step2" data-narration="Three key concepts: Blocks are homogeneous groups, Treatment Levels are what we apply, and Randomization ensures valid comparisons.">
    <rect x="20" y="160" width="760" height="90" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="40" y="182" fill="#2e7d32" font-size="14" font-weight="bold" class="title-text">Key Concepts</text>
    
    <!-- Block concept -->
    <rect x="40" y="195" width="220" height="45" rx="6" fill="#388e3c" opacity="0.9"/>
    <text x="150" y="212" text-anchor="middle" fill="white" font-size="12" font-weight="bold">BLOCKS</text>
    <text x="150" y="228" text-anchor="middle" fill="white" font-size="9">Homogeneous groups</text>
    
    <!-- Treatment concept -->
    <rect x="290" y="195" width="220" height="45" rx="6" fill="#f57c00" opacity="0.9"/>
    <text x="400" y="212" text-anchor="middle" fill="white" font-size="12" font-weight="bold">TREATMENTS</text>
    <text x="400" y="228" text-anchor="middle" fill="white" font-size="9">Levels applied within blocks</text>
    
    <!-- Randomization concept -->
    <rect x="540" y="195" width="220" height="45" rx="6" fill="#7b1fa2" opacity="0.9"/>
    <text x="650" y="212" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RANDOMIZATION</text>
    <text x="650" y="228" text-anchor="middle" fill="white" font-size="9">Assign treatments randomly</text>
  </g>

  <!-- Step 3: Why Use RBD -->
  <g class="step" id="step3" data-narration="RBD controls for variability between blocks, providing more accurate treatment effect estimates than completely randomized designs.">
    <rect x="20" y="260" width="760" height="90" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="40" y="282" fill="#e65100" font-size="14" font-weight="bold" class="title-text">Why Use Randomized Block Design?</text>
    
    <!-- Comparison diagram -->
    <rect x="50" y="295" width="330" height="45" rx="5" fill="#ff9800" opacity="0.7"/>
    <text x="215" y="315" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Without RBD (CRD)</text>
    <text x="215" y="330" text-anchor="middle" fill="white" font-size="9">High variability, less precision</text>
    
    <path d="M400,317 L450,317" stroke="#e65100" stroke-width="2" marker-end="url(#arrowhead)">
      <animate attributeName="stroke-dasharray" from="0,50" to="50,0" dur="0.5s" fill="freeze"/>
    </path>
    
    <rect x="470" y="295" width="290" height="45" rx="5" fill="#388e3c" opacity="0.8"/>
    <text x="615" y="315" text-anchor="middle" fill="white" font-size="11" font-weight="bold">With RBD</text>
    <text x="615" y="330" text-anchor="middle" fill="white" font-size="9">Controls block variability</text>
  </g>

  <!-- Step 4: Example Setup -->
  <g class="step" id="step4" data-narration="Consider testing fertilizers on plant growth across three soil types. Soil types form blocks, and fertilizers are treatments assigned randomly within each block.">
    <rect x="20" y="360" width="760" height="105" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="40" y="382" fill="#1565c0" font-size="14" font-weight="bold" class="title-text">Example: Plant Growth Study</text>
    <text x="40" y="402" fill="#333" font-size="11" class="body-text">Testing fertilizer effect (Treatments A, B) on plant growth in different soil types (Blocks)</text>
    
    <!-- Block representation -->
    <rect x="40" y="412" width="210" height="43" rx="5" fill="#795548" opacity="0.8"/>
    <text x="145" y="432" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CLAY SOIL</text>
    <text x="145" y="447" text-anchor="middle" fill="white" font-size="9">Block 1</text>
    
    <rect x="260" y="412" width="210" height="43" rx="5" fill="#8d6e63" opacity="0.8"/>
    <text x="365" y="432" text-anchor="middle" fill="white" font-size="11" font-weight="bold">LOAM SOIL</text>
    <text x="365" y="447" text-anchor="middle" fill="white" font-size="9">Block 2</text>
    
    <rect x="480" y="412" width="210" height="43" rx="5" fill="#a1887f" opacity="0.8"/>
    <text x="585" y="432" text-anchor="middle" fill="white" font-size="11" font-weight="bold">SAND SOIL</text>
    <text x="585" y="447" text-anchor="middle" fill="white" font-size="9">Block 3</text>
  </g>

  <!-- Step 5: Randomization Within Blocks -->
  <g class="step" id="step5" data-narration="Within each soil block, plants are randomly assigned to fertilizer A or B. This ensures each treatment appears in each block exactly once.">
    <rect x="20" y="475" width="760" height="90" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="40" y="497" fill="#6a1b9a" font-size="14" font-weight="bold" class="title-text">Randomization Within Blocks</text>
    
    <!-- Random assignment visualization -->
    <rect x="40" y="512" width="230" height="43" rx="5" fill="#9c27b0" opacity="0.8"/>
    <text x="155" y="532" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CLAY: A, B (random)</text>
    <text x="155" y="547" text-anchor="middle" fill="white" font-size="9">Block 1</text>
    
    <rect x="285" y="512" width="230" height="43" rx="5" fill="#ab47bc" opacity="0.8"/>
    <text x="400" y="532" text-anchor="middle" fill="white" font-size="11" font-weight="bold">LOAM: B, A (random)</text>
    <text x="400" y="547" text-anchor="middle" fill="white" font-size="9">Block 2</text>
    
    <rect x="530" y="512" width="230" height="43" rx="5" fill="#ba68c8" opacity="0.8"/>
    <text x="645" y="532" text-anchor="middle" fill="white" font-size="11" font-weight="bold">SAND: A, B (random)</text>
    <text x="645" y="547" text-anchor="middle" fill="white" font-size="9">Block 3</text>
  </g>

  <!-- Step 6: ANOVA Foundation -->
  <g class="step" id="step6" data-narration="ANOVA analyzes RBD by partitioning total variability into treatment, block, and error components, enabling hypothesis testing.">
    <rect x="20" y="575" width="760" height="110" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="40" y="597" fill="#e65100" font-size="14" font-weight="bold" class="title-text">ANOVA for Randomized Block Design</text>
    <text x="40" y="617" fill="#333" font-size="11" class="body-text">Total variation is partitioned into three components:</text>
    
    <!-- ANOVA Components -->
    <rect x="40" y="625" width="230" height="50" rx="5" fill="#ff9800" opacity="0.8"/>
    <text x="155" y="645" text-anchor="middle" fill="white" font-size="11" font-weight="bold">SST (Treatment)</text>
    <text x="155" y="662" text-anchor="middle" fill="white" font-size="9">Variation between treatments</text>
    
    <rect x="285" y="625" width="230" height="50" rx="5" fill="#ffb74d" opacity="0.8"/>
    <text x="400" y="645" text-anchor="middle" fill="white" font-size="11" font-weight="bold">SSB (Block)</text>
    <text x="400" y="662" text-anchor="middle" fill="white" font-size="9">Variation between blocks</text>
    
    <rect x="530" y="625" width="230" height="50" rx="5" fill="#ffcc80" opacity="0.8"/>
    <text x="645" y="645" text-anchor="middle" fill="#e65100" font-size="11" font-weight="bold">SSE (Error)</text>
    <text x="645" y="662" text-anchor="middle" fill="#e65100" font-size="9">Random variation within blocks</text>
  </g>

  <!-- Step 7: Formulas -->
  <g class="step" id="step7" data-narration="The Total Sum of Squares equals Treatment SS plus Block SS plus Error SS. Each measures variation from different sources in the experiment.">
    <rect x="20" y="695" width="760" height="100" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="40" y="717" fill="#2e7d32" font-size="14" font-weight="bold" class="title-text">Key Formulas</text>
    
    <!-- SST Formula -->
    <text x="40" y="742" fill="#1b5e20" font-size="10" class="formula-text">SSTotal = Σ(Ỹij - Ÿ)²</text>
    <text x="40" y="755" fill="#333" font-size="9" class="body-text">Total Sum of Squares</text>
    
    <!-- SS Treatment -->
    <text x="250" y="742" fill="#1b5e20" font-size="10" class="formula-text">SSTreat = Σn·(Ỹj· - Ÿ)²</text>
    <text x="250" y="755" fill="#333" font-size="9" class="body-text">Treatment Sum of Squares</text>
    
    <!-- SS Block -->
    <text x="460" y="742" fill="#1b5e20" font-size="10" class="formula-text">SSBlock = Σn·(Ỹi· - Ÿ)²</text>
    <text x="460" y="755" fill="#333" font-size="9" class="body-text">Block Sum of Squares</text>
    
    <!-- SS Error -->
    <text x="650" y="742" fill="#1b5e20" font-size="10" class="formula-text">SSE = SSTotal - SSTreat - SSBlock</text>
    <text x="650" y="755" fill="#333" font-size="9" class="body-text">Error Sum of Squares</text>
    
    <!-- Decomposition equation -->
    <rect x="200" y="765" width="400" height="22" rx="4" fill="#4caf50" opacity="0.3"/>
    <text x="400" y="780" text-anchor="middle" fill="#1b5e20" font-size="10" font-style="italic" class="formula-text">SSTotal = SSTreat + SSBlock + SSE</text>
  </g>

  <!-- Step 8: F-Test -->
  <g class="step" id="step8" data-narration="The F-test compares treatment mean square to error mean square. If F exceeds the critical value, we reject the null hypothesis of equal treatments.">
    <rect x="20" y="805" width="760" height="90" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="40" y="827" fill="#1565c0" font-size="14" font-weight="bold" class="title-text">Hypothesis Testing: F-Test</text>
    
    <!-- Hypothesis -->
    <text x="40" y="852" fill="#333" font-size="10" class="body-text">H₀: All treatment effects are equal (μ₁ = μ₂ = ... = μₜ)</text>
    <text x="40" y="868" fill="#333" font-size="10" class="body-text">Hₐ: At least one treatment effect differs</text>
    
    <!-- F-statistic -->
    <rect x="350" y="840" width="200" height="45" rx="5" fill="#1976d2" opacity="0.9"/>
    <text x="450" y="860" text-anchor="middle" fill="white" font-size="12" font-weight="bold">F = MSTMSE</text>
    <text x="450" y="877" text-anchor="middle" fill="white" font-size="9">Treatment MS ÷ Error MS</text>
  </g>

  <!-- Step 9: ANOVA Table -->
  <g class="step" id="step9" data-narration="The ANOVA table shows sources of variation, degrees of freedom, sum of squares, mean squares, and the F-statistic for decision making.">
    <rect x="20" y="905" width="760" height="95" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="40" y="927" fill="#6a1b9a" font-size="14" font-weight="bold" class="title-text">ANOVA Table Structure</text>
    
    <!-- Table header -->
    <rect x="40" y="940" width="720" height="18" rx="3" fill="#7b1fa2" opacity="0.8"/>
    <text x="80" y="953" fill="white" font-size="9" font-weight="bold">Source</text>
    <text x="200" y="953" fill="white" font-size="9" font-weight="bold">df</text>
    <text x="320" y="953" fill="white" font-size="9" font-weight="bold">SS</text>
    <text x="440" y="953" fill="white" font-size="9" font-weight="bold">MS</text>
    <text x="600" y="953" fill="white" font-size="9" font-weight="bold">F</text>
    
    <!-- Table rows -->
    <rect x="40" y="960" width="720" height="16" rx="2" fill="white" stroke="#e1bee7"/>
    <text x="80" y="971" fill="#333" font-size="9">Treatment</text>
    <text x="200" y="971" fill="#333" font-size="9">t-1</text>
    <text x="320" y="971" fill="#333" font-size="9">SSTreat</text>
    <text x="440" y="971" fill="#333" font-size="9">MST = SS/(t-1)</text>
    <text x="600" y="971" fill="#333" font-size="9">MST/MSE</text>
    
    <rect x="40" y="978" width="720" height="16" rx="2" fill="white" stroke="#e1bee7"/>
    <text x="80" y="989" fill="#333" font-size="9">Blocks</text>
    <text x="200" y="989" fill="#333" font-size="9">b-1</text>
    <text x="320" y="989" fill="#333" font-size="9">SSBlock</text>
    <text x="440" y="989" fill="#333" font-size="9">MSB = SS/(b-1)</text>
    <text x="600" y="989" fill="#333" font-size="9">—</text>
  </g>

  <!-- Step 10: Summary -->
  <g class="step" id="step10" data-narration="RBD controls variability by grouping similar units into blocks, enabling more precise treatment comparisons through randomization within blocks.">
    <rect x="20" y="1010" width="760" height="75" rx="8" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="1035" text-anchor="middle" fill="white" font-size="16" font-weight="bold" class="title-text">Summary</text>
    <text x="400" y="1055" text-anchor="middle" fill="white" font-size="11" class="body-text">Randomized Block Design controls known sources of variability by blocking, then randomizes treatments within</text>
    <text x="400" y="1070" text-anchor="middle" fill="white" font-size="11" class="body-text">blocks. ANOVA partitions variation to test treatment effects while accounting for block differences.</text>
  </g>
</svg>