<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="two-way-anova">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Section 1: Two-Way ANOVA (Top-left) -->
  <g data-narration="Two-way ANOVA examines the effect of two independent factors on a dependent variable. It tests three hypotheses: the main effect of Factor A the main effect of Factor B and their interaction effect. This extends one-way ANOVA to two factors.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="38" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Two-Way ANOVA</text>
    <text x="110" y="58" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="9">Two factors: A and B</text>
    <text x="110" y="73" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="9">Tests main effects</text>
    <text x="110" y="88" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Tests interaction (AxB)</text>
  </g>

  <!-- Section 2: Without vs With Replication (Top-right) -->
  <g data-narration="Without replication each cell has one observation and interaction cannot be tested. SST equals SSA plus SSB plus SSE. With replication each cell has multiple observations allowing interaction testing. SST equals SSA plus SSB plus SSAB plus SSE.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="310" y="38" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Replication Types</text>
    <text x="310" y="58" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="8">No rep: SST=SSA+SSB+SSE</text>
    <text x="310" y="73" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="8">With rep: SST=SSA+SSB+SSAB+SSE</text>
    <text x="310" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Interaction needs replication</text>
  </g>

  <!-- Section 3: F-Tests (Bottom-left) -->
  <g data-narration="Three separate F tests are performed. F for Factor A equals MSA over MSE. F for Factor B equals MSB over MSE. F for interaction equals MSAB over MSE. Each is compared to its own F critical value at the chosen significance level.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" stroke="#880e4f" stroke-width="1.5"/>
    <text x="110" y="138" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Three F-Tests</text>
    <text x="110" y="158" text-anchor="middle" fill="white" font-family="Arial" font-size="9">FA = MSA / MSE</text>
    <text x="110" y="173" text-anchor="middle" fill="#ffcdd2" font-family="Arial" font-size="9">FB = MSB / MSE</text>
    <text x="110" y="188" text-anchor="middle" fill="#ffcdd2" font-family="Arial" font-size="9">FAB = MSAB / MSE</text>
  </g>

  <!-- Section 4: Degrees of Freedom (Bottom-right) -->
  <g data-narration="Degrees of freedom for Factor A are a minus 1 and for Factor B are b minus 1. Interaction df equals a minus 1 times b minus 1. Error df equals a times b times n minus 1 with replication or a minus 1 times b minus 1 without.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" stroke="#bf360c" stroke-width="1.5"/>
    <text x="310" y="138" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Degrees of Freedom</text>
    <text x="310" y="158" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">Factor A: a-1</text>
    <text x="310" y="173" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">Factor B: b-1</text>
    <text x="310" y="188" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="9">AxB: (a-1)(b-1)</text>
  </g>

  <!-- Center Title -->
  <text x="210" y="225" text-anchor="middle" fill="#333" font-family="Arial" font-size="14" font-weight="bold">Two-Way ANOVA</text>
  <text x="210" y="242" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Two Factors and Interaction</text>

  <!-- Section 5: Worked Example -->
  <g data-narration="Example without replication: 3 algorithms on 4 datasets. SSA equals 158 SSB equals 24 SSE equals 6. F for algorithms is 79 exceeding F critical 5.14 so algorithms differ. F for datasets is 8 exceeding 4.76 so datasets also differ significantly.">
    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="210" y="282" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Example: Algorithms x Datasets</text>
    <text x="210" y="302" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">3 algorithms (A), 4 datasets (B), no replication</text>
    <text x="210" y="320" text-anchor="middle" fill="white" font-family="Arial" font-size="9">SSA=158, SSB=24, SSE=6 | MSA=79, MSB=8, MSE=1</text>
    <text x="210" y="340" text-anchor="middle" fill="white" font-family="Arial" font-size="9">FA=79.0 vs 5.14 | FB=8.0 vs 4.76</text>
    <line x1="40" y1="350" x2="380" y2="350" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <text x="120" y="368" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">Algorithms: Reject H0</text>
    <text x="310" y="368" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">Datasets: Reject H0</text>
    <text x="210" y="380" text-anchor="middle" fill="#e0f7fa" font-family="Arial" font-size="9">Both factors have significant effects</text>
  </g>
</svg>
