<svg viewBox="0 0 800 1700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    
    .formula { font-family: 'Courier New', monospace; }
    .title-text { font-weight: bold; }
    
    .draw-anim {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawLine 1.5s ease-out forwards;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="1700" fill="#f8f9fa"/>

  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to ANOVA Basics. Today we explore how analyzing variance helps compare group means statistically.">
    <rect x="20" y="20" width="760" height="50" rx="10" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="52" text-anchor="middle" font-size="22" fill="white" font-weight="bold">ANOVA: Analysis of Variance</text>
    <text x="400" y="72" text-anchor="middle" font-size="12" fill="#e3f2fd">Basic Principles &amp; Variance Partitioning</text>
  </g>

  <!-- Step 1: What is ANOVA -->
  <g class="step" id="step1" data-narration="ANOVA is a statistical method comparing means across three or more groups to find significant differences.">
    <rect x="30" y="85" width="740" height="80" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="50" y="108" font-size="14" fill="#1565c0" font-weight="bold">What is ANOVA?</text>
    <text x="50" y="130" font-size="11" fill="#333">Analysis of Variance (ANOVA) compares</text>
    <text x="50" y="145" font-size="11" fill="#333">means across THREE or MORE groups to</text>
    <text x="50" y="160" font-size="11" fill="#333">determine if differences are statistically</text>
    <text x="260" y="160" font-size="11" fill="#d32f2f" font-weight="bold">significant</text>
    <text x="50" y="175" font-size="11" fill="#333">or due to random chance.</text>
    <!-- Animated arrow -->
    <path d="M500 115 Q 550 115, 570 125" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrowBlue)">
      <animate attributeName="d" dur="1s" from="M500 115 Q 520 115, 520 115" to="M500 115 Q 550 115, 570 125"/>
    </path>
    <circle cx="590" cy="125" r="25" fill="#4caf50">
      <animate attributeName="r" dur="0.5s" from="0" to="25"/>
    </circle>
    <text x="590" y="131" text-anchor="middle" font-size="11" fill="white" font-weight="bold">F</text>
  </g>

  <!-- Step 2: Why ANOVA matters -->
  <g class="step" id="step2" data-narration="Instead of multiple pairwise t-tests that increase error rates, ANOVA provides a unified single test.">
    <rect x="30" y="180" width="350" height="75" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="50" y="203" font-size="13" fill="#e65100" font-weight="bold">Problem with t-tests</text>
    <text x="50" y="222" font-size="10" fill="#333">Multiple pairwise t-tests</text>
    <text x="50" y="237" font-size="10" fill="#333">INFLATE Type I error rate!</text>
    <text x="50" y="252" font-size="10" fill="#333">(False positives)</text>
    
    <rect x="395" y="180" width="375" height="75" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="415" y="203" font-size="13" fill="#2e7d32" font-weight="bold">ANOVA Solution</text>
    <text x="415" y="222" font-size="10" fill="#333">Single unified test compares</text>
    <text x="415" y="237" font-size="10" fill="#333">all groups simultaneously</text>
    <text x="415" y="252" font-size="10" fill="#333">→ Controls error rate</text>
    
    <!-- Arrow from problem to solution -->
    <path d="M380 217 L 395 217" stroke="#666" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowBlue)">
      <animate attributeName="stroke-dashoffset" dur="1s" from="20" to="0"/>
    </path>
  </g>

  <!-- Step 3: Key Insight -->
  <g class="step" id="step3" data-narration="Despite its name, ANOVA compares means by analyzing variability in data. This is the key insight.">
    <rect x="30" y="270" width="740" height="70" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="50" y="295" font-size="14" fill="#6a1b9a" font-weight="bold">🔑 Key Insight</text>
    <text x="50" y="315" font-size="11" fill="#333">Despite its name, ANOVA is fundamentally about comparing</text>
    <text x="50" y="330" font-size="12" fill="#333">→ But we analyze</text>
    <text x="140" y="330" font-size="12" fill="#d32f2f" font-weight="bold">VARIABILITY</text>
    <text x="250" y="330" font-size="12" fill="#333">to draw conclusions about</text>
    <text x="400" y="330" font-size="12" fill="#1976d2" font-weight="bold">MEANS</text>
  </g>

  <!-- Step 4: Total Variation - SST -->
  <g class="step" id="step4" data-narration="Total Sum of Squares measures variation of all observations from the grand mean across all data.">
    <rect x="30" y="355" width="740" height="85" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="50" y="378" font-size="13" fill="#1565c0" font-weight="bold">Total Sum of Squares (SST)</text>
    <text x="50" y="400" font-size="10" fill="#333">Measures total variation of ALL observations from the GRAND MEAN</text>
    
    <!-- Visual representation -->
    <line x1="100" y1="420" x2="180" y2="420" stroke="#1976d2" stroke-width="2" class="draw-anim"/>
    <circle cx="100" cy="420" r="4" fill="#1976d2"/>
    <circle cx="120" cy="415" r="4" fill="#1976d2"/>
    <circle cx="140" cy="425" r="4" fill="#1976d2"/>
    <circle cx="160" cy="418" r="4" fill="#1976d2"/>
    <circle cx="180" cy="422" r="4" fill="#1976d2"/>
    <line x1="140" y1="420" x2="140" y2="420" stroke="#f44336" stroke-width="2" marker-end="url(#arrowBlue)">
      <animate attributeName="x2" dur="1s" from="140" to="160"/>
    </line>
    <text x="145" y="435" font-size="9" fill="#f44336">Grand Mean (X̄)</text>
    
    <!-- Formula -->
    <text x="350" y="395" font-size="11" fill="#333" class="formula">SST = Σ(Xᵢⱼ − X̄)²</text>
    <text x="350" y="410" font-size="9" fill="#666">Sum of squared deviations</text>
    <text x="350" y="422" font-size="9" fill="#666">from grand mean</text>
  </g>

  <!-- Step 5: Between-Group Variation -->
  <g class="step" id="step5" data-narration="Between-group sum of squares measures variation of group means from the grand mean due to treatments.">
    <rect x="30" y="455" width="740" height="90" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="50" y="478" font-size="13" fill="#2e7d32" font-weight="bold">Between-Group Sum of Squares (SSB)</text>
    <text x="50" y="498" font-size="10" fill="#333">Measures variation of GROUP MEANS from the grand mean (due to treatments)</text>
    
    <!-- Visual: Three group means -->
    <rect x="80" y="510" width="60" height="25" rx="4" fill="#ef5350" opacity="0.7"/>
    <text x="110" y="527" text-anchor="middle" font-size="10" fill="white">Group 1</text>
    
    <rect x="160" y="510" width="60" height="25" rx="4" fill="#66bb6a" opacity="0.7"/>
    <text x="190" y="527" text-anchor="middle" font-size="10" fill="white">Group 2</text>
    
    <rect x="240" y="510" width="60" height="25" rx="4" fill="#42a5f5" opacity="0.7"/>
    <text x="270" y="527" text-anchor="middle" font-size="10" fill="white">Group 3</text>
    
    <!-- Grand mean line -->
    <line x1="75" y1="545" x2="290" y2="545" stroke="#f44336" stroke-width="2" stroke-dasharray="5"/>
    <text x="300" y="549" font-size="9" fill="#f44336">Grand Mean</text>
    
    <!-- Arrows showing deviation -->
    <line x1="110" y1="535" x2="185" y2="545" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrowBlue)" class="draw-anim"/>
    <line x1="190" y1="535" x2="185" y2="545" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrowBlue)" class="draw-anim"/>
    <line x1="270" y1="535" x2="185" y2="545" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrowBlue)" class="draw-anim"/>
    
    <!-- Formula -->
    <text x="380" y="478" font-size="11" fill="#333" class="formula">SSB = Σ nⱼ (X̄ⱼ − X̄)²</text>
    <text x="380" y="493" font-size="9" fill="#666">nⱼ = sample size in jth group</text>
    <text x="380" y="506" font-size="9" fill="#666">X̄ⱼ = jth group mean</text>
    <text x="380" y="519" font-size="9" fill="#666">X̄ = grand mean</text>
  </g>

  <!-- Step 6: Within-Group Variation -->
  <g class="step" id="step6" data-narration="Within-group sum of squares measures variation of observations from their group mean, representing random error.">
    <rect x="30" y="560" width="740" height="95" rx="8" fill="url(#redGradient)" filter="url(#shadow)"/>
    <text x="50" y="583" font-size="13" fill="#c62828" font-weight="bold">Within-Group Sum of Squares (SSW)</text>
    <text x="50" y="603" font-size="10" fill="#333">Measures variation of observations from THEIR GROUP MEAN (random error)</text>
    
    <!-- Visual: Points within groups -->
    <circle cx="100" cy="630" r="5" fill="#ef5350" opacity="0.8">
      <animate attributeName="r" dur="0.3s" from="0" to="5"/>
    </circle>
    <circle cx="115" cy="625" r="5" fill="#ef5350" opacity="0.8">
      <animate attributeName="r" dur="0.4s" from="0" to="5"/>
    </circle>
    <circle cx="130" cy="635" r="5" fill="#ef5350" opacity="0.8">
      <animate attributeName="r" dur="0.5s" from="0" to="5"/>
    </circle>
    <line x1="115" y1="630" x2="115" y2="630" stroke="#c62828" stroke-width="2" marker-end="url(#arrowBlue)">
      <animate attributeName="x2" dur="0.8s" from="115" to="140"/>
    </line>
    <text x="145" y="633" font-size="8" fill="#c62828">X̄₁</text>
    
    <circle cx="180" cy="628" r="5" fill="#66bb6a" opacity="0.8">
      <animate attributeName="r" dur="0.3s" from="0" to="5"/>
    </circle>
    <circle cx="195" cy="632" r="5" fill="#66bb6a" opacity="0.8">
      <animate attributeName="r" dur="0.4s" from="0" to="5"/>
    </circle>
    <circle cx="210" cy="625" r="5" fill="#66bb6a" opacity="0.8">
      <animate attributeName="r" dur="0.5s" from="0" to="5"/>
    </circle>
    <line x1="195" y1="628" x2="195" y2="628" stroke="#c62828" stroke-width="2" marker-end="url(#arrowBlue)">
      <animate attributeName="x2" dur="0.8s" from="195" to="220"/>
    </line>
    <text x="225" y="633" font-size="8" fill="#c62828">X̄₂</text>
    
    <circle cx="260" cy="633" r="5" fill="#42a5f5" opacity="0.8">
      <animate attributeName="r" dur="0.3s" from="0" to="5"/>
    </circle>
    <circle cx="275" cy="627" r="5" fill="#42a5f5" opacity="0.8">
      <animate attributeName="r" dur="0.4s" from="0" to="5"/>
    </circle>
    <circle cx="290" cy="638" r="5" fill="#42a5f5" opacity="0.8">
      <animate attributeName="r" dur="0.5s" from="0" to="5"/>
    </circle>
    <line x1="275" y1="633" x2="275" y2="633" stroke="#c62828" stroke-width="2" marker-end="url(#arrowBlue)">
      <animate attributeName="x2" dur="0.8s" from="275" to="300"/>
    </line>
    <text x="305" y="633" font-size="8" fill="#c62828">X̄₃</text>
    
    <!-- Formula -->
    <text x="400" y="583" font-size="11" fill="#333" class="formula">SSW = Σ(Xᵢⱼ − X̄ⱼ)²</text>
    <text x="400" y="598" font-size="9" fill="#666">Deviation from own</text>
    <text x="400" y="610" font-size="9" fill="#666">group mean</text>
    <text x="400" y="625" font-size="9" fill="#666">→ Random error/noise</text>
  </g>

  <!-- Step 7: Partitioning Equation -->
  <g class="step" id="step7" data-narration="The fundamental principle: total variance equals between-group variance plus within-group variance.">
    <rect x="30" y="670" width="740" height="70" rx="8" fill="url(#titleGradient)" filter="url(#shadow)"/>
    <text x="400" y="698" text-anchor="middle" font-size="16" fill="white" font-weight="bold">Fundamental Principle of ANOVA</text>
    <text x="400" y="720" text-anchor="middle" font-size="20" fill="#ffeb3b" class="formula">
      <animate attributeName="opacity" dur="1s" from="0" to="1"/>SST = SSB + SSW
    </text>
    <text x="400" y="738" text-anchor="middle" font-size="10" fill="#bbdefb">Total = Between + Within</text>
  </g>

  <!-- Step 8: Mean Squares -->
  <g class="step" id="step8" data-narration="Mean squares divide sum of squares by degrees of freedom to get comparable variance estimates.">
    <rect x="30" y="755" width="355" height="90" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="50" y="778" font-size="13" fill="#2e7d32" font-weight="bold">MSB: Mean Square Between</text>
    <text x="50" y="798" font-size="11" fill="#333" class="formula">MSB = SSB / (k − 1)</text>
    <text x="50" y="815" font-size="9" fill="#666">k = number of groups</text>
    <text x="50" y="830" font-size="9" fill="#666">df = k − 1</text>
    <circle cx="340" cy="800" r="25" fill="#4caf50" opacity="0.3">
      <animate attributeName="r" dur="0.5s" from="0" to="25"/>
    </circle>
    <text x="340" y="806" text-anchor="middle" font-size="10" fill="#2e7d32">Between</text>
    
    <rect x="400" y="755" width="370" height="90" rx="8" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="420" y="778" font-size="13" fill="#e65100" font-weight="bold">MSW: Mean Square Within</text>
    <text x="420" y="798" font-size="11" fill="#333" class="formula">MSW = SSW / (N − k)</text>
    <text x="420" y="815" font-size="9" fill="#666">N = total observations</text>
    <text x="420" y="830" font-size="9" fill="#666">df = N − k</text>
    <circle cx="740" cy="800" r="25" fill="#ff9800" opacity="0.3">
      <animate attributeName="r" dur="0.5s" from="0" to="25"/>
    </circle>
    <text x="740" y="806" text-anchor="middle" font-size="10" fill="#e65100">Within</text>
  </g>

  <!-- Step 9: F-Statistic -->
  <g class="step" id="step9" data-narration="The F-statistic is the ratio of between-group to within-group variance. Large F suggests significant differences.">
    <rect x="30" y="860" width="740" height="85" rx="8" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="50" y="883" font-size="14" fill="#6a1b9a" font-weight="bold">The F-Statistic</text>
    <text x="50" y="905" font-size="11" fill="#333">The test statistic compares variance BETWEEN groups to variance WITHIN groups:</text>
    
    <!-- F Formula -->
    <rect x="50" y="915" width="300" height="25" rx="4" fill="white" stroke="#6a1b9a" stroke-width="1"/>
    <text x="200" y="932" text-anchor="middle" font-size="14" fill="#6a1b9a" class="formula">
  </g>
</svg>