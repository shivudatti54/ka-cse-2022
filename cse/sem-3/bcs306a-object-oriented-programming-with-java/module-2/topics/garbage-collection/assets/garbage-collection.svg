<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Garbage Collection in Java">
    <text x="50" y="50" font-size="24" fill="#2563eb">Garbage Collection</text>
    <text x="50" y="80" font-size="18" fill="#8b5cf6">Automatic memory management in Java</text>
    <rect x="50" y="120" width="100" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="155" font-size="18" fill="#ffffff">Object</text>
  </g>
  <g id="step1" data-narration="Object Creation and Memory Allocation">
    <use href="#step0"/>
    <rect x="200" y="120" width="100" height="50" fill="#10b981" rx="10"/>
    <text x="210" y="155" font-size="18" fill="#ffffff">New Object</text>
    <line x1="150" y1="135" x2="200" y2="135" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step2" data-narration="Object becomes Eligible for Garbage Collection">
    <use href="#step1"/>
    <rect x="350" y="120" width="100" height="50" fill="#10b981" rx="10" opacity="0.5"/>
    <text x="360" y="155" font-size="18" fill="#ffffff">Eligible Object</text>
    <line x1="250" y1="135" x2="350" y2="135" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step3" data-narration="finalize() Method is Called">
    <use href="#step2"/>
    <rect x="500" y="120" width="100" height="50" fill="#10b981" rx="10" opacity="0.5"/>
    <text x="510" y="155" font-size="18" fill="#ffffff">finalize()</text>
    <line x1="400" y1="135" x2="500" y2="135" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="500" y="200" font-size="18" fill="#8b5cf6">System.out.println("This object is being garbage collected.");</text>
  </g>
  <g id="step4" data-narration="Garbage Collector Reclaims Memory">
    <use href="#step3"/>
    <rect x="500" y="120" width="100" height="50" fill="#10b981" rx="10" opacity="0"/>
    <text x="510" y="155" font-size="18" fill="#ffffff">Memory Freed</text>
    <line x1="450" y1="135" x2="500" y2="135" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g id="step5" data-narration="Heap Memory is Updated">
    <use href="#step4"/>
    <rect x="50" y="250" width="700" height="50" fill="#2563eb" rx="10"/>
    <text x="100" y="285" font-size="24" fill="#ffffff">Updated Heap Memory</text>
  </g>
</svg>