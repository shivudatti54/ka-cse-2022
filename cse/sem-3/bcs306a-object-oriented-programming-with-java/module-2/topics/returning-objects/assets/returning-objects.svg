<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1060">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes typeIn {
      from { width: 0; }
      to { width: 100%; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .draw-anim { stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1060" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to this lesson on Returning Objects in Java. We'll explore how methods can return object references.">
    <rect x="0" y="0" width="800" height="50" fill="url(#titleGrad)" rx="0"/>
    <text x="400" y="32" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Returning Objects in Java</text>
  </g>
  
  <!-- Step 1: Introduction -->
  <g class="step" id="step1" data-narration="Returning objects allows methods to pass complex data between classes. Instead of primitives, we return object references.">
    <rect x="20" y="60" width="760" height="85" fill="url(#blueGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="60" width="5" height="85" fill="#1976d2" rx="2"/>
    <text x="40" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">What is Returning Objects?</text>
    <text x="40" y="108" font-family="Arial, sans-serif" font-size="11" fill="#424242">Methods can return object references, enabling complex data to be passed between</text>
    <text x="40" y="124" font-family="Arial, sans-serif" font-size="11" fill="#424242">methods and classes. This is fundamental to object-oriented programming.</text>
  </g>
  
  <!-- Step 2: Basic Syntax -->
  <g class="step" id="step2" data-narration="Here's the basic syntax. The return type must match the object type being returned. We return the reference, not a copy.">
    <rect x="20" y="155" width="760" height="95" fill="url(#greenGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="155" width="5" height="95" fill="#388e3c" rx="2"/>
    <text x="40" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">Basic Syntax</text>
    <rect x="40" y="195" width="300" height="45" fill="#263238" rx="4"/>
    <text x="55" y="215" font-family="Consolas, monospace" font-size="11" fill="#a5d6a7">public MyClass getMyObject() {</text>
    <text x="65" y="232" font-family="Consolas, monospace" font-size="11" fill="#a5d6a7">    MyClass obj = new MyClass();</text>
    <text x="55" y="249" font-family="Consolas, monospace" font-size="11" fill="#ffcc80">    return obj; // Returns reference</text>
    <text x="55" y="266" font-family="Consolas, monospace" font-size="11" fill="#a5d6a7">}</text>
    <!-- Visual: Reference arrow -->
    <path d="M360 220 L430 220" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)" class="draw-anim"/>
    <text x="440" y="225" font-family="Arial, sans-serif" font-size="11" fill="#388e3c">Return type must match</text>
  </g>
  
  <!-- Step 3: Primitive vs Object Comparison -->
  <g class="step" id="step3" data-narration="Key difference: primitives are passed by value (copy), while objects are passed by reference. Changes to objects affect the original.">
    <rect x="20" y="260" width="760" height="95" fill="url(#orangeGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="260" width="5" height="95" fill="#ff9800" rx="2"/>
    <text x="40" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">Primitive vs Object: Passing Mechanism</text>
    
    <!-- Left: Primitive -->
    <rect x="40" y="300" width="170" height="45" fill="#fff" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="125" y="320" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100" text-anchor="middle">Primitive Types</text>
    <text x="125" y="338" font-family="Arial, sans-serif" font-size="10" fill="#424242" text-anchor="middle">Passed by VALUE</text>
    
    <!-- Arrow -->
    <path d="M220 322 L280 322" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- Right: Object -->
    <rect x="290" y="300" width="170" height="45" fill="#fff" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="375" y="320" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">Objects</text>
    <text x="375" y="338" font-family="Arial, sans-serif" font-size="10" fill="#424242" text-anchor="middle">Passed by REFERENCE</text>
    
    <!-- Effect explanation -->
    <text x="480" y="318" font-family="Arial, sans-serif" font-size="10" fill="#424242">Original unchanged</text>
    <text x="480" y="333" font-family="Arial, sans-serif" font-size="10" fill="#388e3c">Original AFFECTED</text>
  </g>
  
  <!-- Step 4: Visual: Pass by Value vs Reference -->
  <g class="step" id="step4" data-narration="This diagram shows memory behavior. Primitive creates a copy; object shares the same memory address.">
    <rect x="20" y="365" width="760" height="95" fill="url(#purpleGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="365" width="5" height="95" fill="#9c27b0" rx="2"/>
    <text x="40" y="390" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">Memory: Pass by Value vs Reference</text>
    
    <!-- Stack diagrams -->
    <!-- Stack -->
    <rect x="50" y="405" width="120" height="45" fill="#fff" rx="3" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="110" y="425" font-family="Arial, sans-serif" font-size="10" fill="#6a1b9a" text-anchor="middle">Stack Memory</text>
    
    <!-- Heap -->
    <rect x="190" y="405" width="120" height="45" fill="#fff" rx="3" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4"/>
    <text x="250" y="425" font-family="Arial, sans-serif" font-size="10" fill="#6a1b9a" text-anchor="middle">Heap Memory</text>
    
    <!-- Primitive copy -->
    <text x="110" y="445" font-family="Consolas, monospace" font-size="9" fill="#e65100" text-anchor="middle">int x = 5</text>
    <text x="250" y="445" font-family="Consolas, monospace" font-size="9" fill="#9e9e9e" text-anchor="middle">(no heap data)</text>
    <path d="M170 425 L190 425" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3"/>
    <text x="90" y="462" font-family="Arial, sans-serif" font-size="9" fill="#e65100">Copy created</text>
    
    <!-- Object reference -->
    <rect x="350" y="405" width="120" height="45" fill="#fff" rx="3" stroke="#388e3c" stroke-width="1" stroke-dasharray="4"/>
    <text x="410" y="425" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">Stack Memory</text>
    <rect x="490" y="405" width="120" height="45" fill="#e8f5e9" rx="3" stroke="#388e3c" stroke-width="2"/>
    <text x="550" y="425" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">Heap: Object</text>
    <path d="M470 425 L490 425" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="400" y="462" font-family="Arial, sans-serif" font-size="9" fill="#388e3c">Reference points to heap</text>
  </g>
  
  <!-- Step 5: Scenarios -->
  <g class="step" id="step5" data-narration="Returning objects is useful for creating new objects, retrieving database records, factory patterns, and fluent interfaces.">
    <rect x="20" y="470" width="760" height="95" fill="url(#blueGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="470" width="5" height="95" fill="#1976d2" rx="2"/>
    <text x="40" y="495" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">When to Return Objects</text>
    
    <!-- Four scenarios -->
    <rect x="40" y="510" width="170" height="45" fill="#fff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="125" y="530" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" text-anchor="middle">1. Creating new objects</text>
    
    <rect x="220" y="510" width="170" height="45" fill="#fff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="305" y="530" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" text-anchor="middle">2. DB retrieval</text>
    
    <rect x="400" y="510" width="170" height="45" fill="#fff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="485" y="530" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" text-anchor="middle">3. Factory Pattern</text>
    
    <rect x="580" y="510" width="170" height="45" fill="#fff" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="665" y="530" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" text-anchor="middle">4. Method Chaining</text>
  </g>
  
  <!-- Step 6: Implementation Examples -->
  <g class="step" id="step6" data-narration="Two implementation patterns: returning a new object, or returning an existing object passed as parameter.">
    <rect x="20" y="575" width="760" height="95" fill="url(#greenGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="575" width="5" height="95" fill="#388e3c" rx="2"/>
    <text x="40" y="600" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">Implementation Patterns</text>
    
    <!-- Pattern 1 -->
    <rect x="40" y="615" width="340" height="45" fill="#263238" rx="4"/>
    <text x="55" y="635" font-family="Consolas, monospace" font-size="10" fill="#a5d6a7">public MyClass getNewObject() {</text>
    <text x="65" y="652" font-family="Consolas, monospace" font-size="10" fill="#ffcc80">    return new MyClass();</text>
    <text x="55" y="669" font-family="Consolas, monospace" font-size="10" fill="#a5d6a7">}</text>
    
    <!-- Pattern 2 -->
    <rect x="400" y="615" width="340" height="45" fill="#263238" rx="4"/>
    <text x="415" y="635" font-family="Consolas, monospace" font-size="10" fill="#a5d6a7">public MyClass getExistingObject(</text>
    <text x="425" y="652" font-family="Consolas, monospace" font-size="10" fill="#a5d6a7">    MyClass obj) {</text>
    <text x="435" y="669" font-family="Consolas, monospace" font-size="10" fill="#ffcc80">    return obj;</text>
    <text x="415" y="686" font-family="Consolas, monospace" font-size="10" fill="#a5d6a7">}</text>
    
    <!-- Labels -->
    <text x="210" y="678" font-family="Arial, sans-serif" font-size="9" fill="#388e3c" text-anchor="middle">Return NEW object</text>
    <text x="570" y="678" font-family="Arial, sans-serif" font-size="9" fill="#388e3c" text-anchor="middle">Return EXISTING object</text>
  </g>
  
  <!-- Step 7: Returning vs Passing -->
  <g class="step" id="step7" data-narration="Important distinction: passing an object lets methods modify it; returning creates a new object without affecting original.">
    <rect x="20" y="680" width="760" height="95" fill="url(#redGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="680" width="5" height="95" fill="#f44336" rx="2"/>
    <text x="40" y="705" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c62828">Returning vs Passing Objects</text>
    
    <!-- Pass as parameter -->
    <rect x="40" y="720" width="340" height="45" fill="#fff" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="210" y="738" font-family="Arial, sans-serif" font-size="11" fill="#c62828" text-anchor="middle">Pass as Parameter: CAN modify original</text>
    <text x="210" y="755" font-family="Consolas, monospace" font-size="9" fill="#424242" text-anchor="middle">obj.setValue("New");</text>
    
    <!-- Return from method -->
    <rect x="400" y="720" width="340" height="45" fill="#fff" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="570" y="738" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32" text-anchor="middle">Return from Method: Creates NEW object</text>
    <text x="570" y="755" font-family="Consolas, monospace" font-size="9" fill="#424242" text-anchor="middle">return new MyClass();</text>
  </g>
  
  <!-- Step 8: Factory Method Pattern -->
  <g class="step" id="step8" data-narration="Factory Method pattern provides an interface for creating objects without specifying exact classes. Creates objects dynamically.">
    <rect x="20" y="785" width="760" height="95" fill="url(#purpleGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="785" width="5" height="95" fill="#9c27b0" rx="2"/>
    <text x="40" y="810" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">Factory Method Pattern</text>
    
    <!-- Abstract class -->
    <rect x="40" y="825" width="200" height="45" fill="#fff" rx="4" stroke="#9c27b0"/>
    <text x="140" y="845" font-family="Consolas, monospace" font-size="10" fill="#6a1b9a" text-anchor="middle">abstract class Animal</text>
    <text x="140" y="862" font-family="Consolas, monospace" font-size="9" fill="#424242" text-anchor="middle">createAnimal()</text>
    
    <!-- Arrows -->
    <path d="M250 847 L310 847" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
    <path d="M250 867 L310 867" stroke="#9c27b0" stroke-width="1" marker-end="url(#arrow)"/>
    
    <!-- Concrete classes -->
    <rect x="320" y="825" width="150" height="45" fill="#f3e5f5" rx="4" stroke="#9c27b0"/>
    <text x="395" y="845" font-family="Consolas, monospace" font-size="10" fill="#6a1b9a" text-anchor="middle">class Dog</text>
    <text x="395" y="862" font-family="Consolas, monospace" font-size="9" fill="#424242" text-anchor="middle">return new Dog()</text>
    
    <rect x="320" y="875" width="150" height="45" fill="#f3e5f5" rx="4" stroke="#9c27b0"/>
    <text x="395" y="895" font-family="Consolas, monospace" font-size="10" fill="#6a1b9a" text-anchor="middle">class Cat</text>
    <text x="395" y="912" font-family="Consolas, monospace" font-size="9" fill="#424242" text-anchor="middle">return new Cat()</text>
    
    <text x="490" y="847" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">Returns Animal type</text>
    <text x="490" y="867" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">without revealing class</text>
  </g>
  
  <!-- Step 9: Method Chaining / Fluent Interface -->
  <g class="step" id="step9" data-narration="Method chaining returns 'this' enabling fluent interfaces. Makes code readable by chaining multiple operations in one statement.">
    <rect x="20" y="890" width="760" height="85" fill="url(#orangeGrad)" rx="8" filter="url(#shadow)"/>
    <rect x="20" y="890" width="5" height="85" fill="#ff9800" rx="2"/>
    <text x="40" y="915" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">Method Chaining (Fluent Interface)</text>
    
    <rect x="40" y="928" width="500" height="38" fill="#263238" rx="4"/>
    <text x="55" y="948" font-family="Consolas, monospace" font-size="11" fill="#a5d6a7">public MyClass setValue(String v) {</text>
    <text x="65" y="966" font-family="Consolas, monospace" font-size="11" fill="#ffcc80">    this.value = v;</text>
    <text x="65" y="984" font-family="Consolas, monospace" font-size="11" fill="#ffcc80">    return this; // Enable chaining</text>
    <text x="55" y="1002" font-family="Consolas, monospace" font-size="11" fill="#a5d6a7">}</text>
    
    <!-- Usage -->
    <rect x="550" y="928" width="200" height="38" fill="#fff" rx="4" stroke="#ff9800"/>
    <text x="650" y="952" font-family="Consolas, monospace" font-size="10" fill="#e65100" text-anchor="middle">obj.setValue("A")</text>
    <text x="650" y="969" font-family="Consolas, monospace" font-size="10" fill="#424242" text-anchor="middle">.printValue();</text>
  </g>
  
  <!-- Step 10: Key Takeaways -->
  <g class="step" id="step10" data-narration="Remember: methods return references, not objects. Return type must match. Objects allow data encapsulation and reuse.">
    <rect x="20" y="985" width="760" height="65" fill="url(#titleGrad)" rx="8" filter="url(#shadow)"/>
    <text x="400" y="1010" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Key Takeaways</text>
    <text x="400" y="1030" font-family="Arial, sans-serif" font-size="11" fill="#e3f2fd" text-anchor="middle">✓ Methods return object REFERENCES | ✓ Return type must match | ✓ Objects passed by reference | ✓ Enables encapsulation &amp; reuse</text>
  </g>
</svg>