<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Media Access Control Protocols">
    <text x="50" y="50" font-size="24" fill="#2563eb">Media Access Control (MAC) Protocols</text>
    <text x="50" y="80" font-size="18" fill="#10b981">Manage access to a shared communication medium in a network</text>
  </g>
  <g id="step1" data-narration="Types of MAC Protocols">
    <rect x="50" y="120" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="60" y="150" font-size="18" fill="#ffffff">Random Access Protocols</text>
    <text x="60" y="180" font-size="14" fill="#ffffff">ALOHA, CSMA, CSMA/CD</text>
    <rect x="300" y="120" width="200" height="100" fill="#8b5cf6" rx="10" />
    <text x="310" y="150" font-size="18" fill="#ffffff">Controlled Access Protocols</text>
    <text x="310" y="180" font-size="14" fill="#ffffff">Token Ring, Token Bus</text>
    <line x1="250" y1="170" x2="280" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="MAC Protocol Functions">
    <rect x="50" y="250" width="200" height="100" fill="#10b981" rx="10" />
    <text x="60" y="280" font-size="18" fill="#ffffff">Framing</text>
    <text x="60" y="310" font-size="14" fill="#ffffff">Frame data into packets</text>
    <rect x="300" y="250" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="310" y="280" font-size="18" fill="#ffffff">Addressing</text>
    <text x="310" y="310" font-size="14" fill="#ffffff">Use MAC addresses</text>
    <rect x="50" y="370" width="200" height="100" fill="#8b5cf6" rx="10" />
    <text x="60" y="400" font-size="18" fill="#ffffff">Error Detection and Correction</text>
    <text x="60" y="430" font-size="14" fill="#ffffff">Ensure reliable data transfer</text>
    <rect x="300" y="370" width="200" height="100" fill="#2563eb" rx="10" />
    <text x="310" y="400" font-size="18" fill="#ffffff">Flow Control</text>
    <text x="310" y="430" font-size="14" fill="#ffffff">Regulate data transmission</text>
  </g>
  <g id="step3" data-narration="CSMA/CD Protocol">
    <rect x="50" y="120" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="60" y="150" font-size="18" fill="#ffffff">CSMA/CD</text>
    <text x="60" y="180" font-size="14" fill="#ffffff">Carrier Sense Multiple Access with Collision Detection</text>
    <line x1="250" y1="170" x2="280" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="300" y="120" width="200" height="100" fill="#8b5cf6" rx="10" />
    <text x="310" y="150" font-size="18" fill="#ffffff">Device Listens</text>
    <text x="310" y="180" font-size="14" fill="#ffffff">Before transmitting data</text>
  </g>
  <g id="step4" data-narration="Token Ring Protocol">
    <rect x="50" y="250" width="200" height="100" fill="#10b981" rx="10" />
    <text x="60" y="280" font-size="18" fill="#ffffff">Token Ring</text>
    <text x="60" y="310" font-size="14" fill="#ffffff">Controlled access protocol</text>
    <line x1="250" y1="290" x2="280" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="300" y="250" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="310" y="280" font-size="18" fill="#ffffff">Token Passed</text>
    <text x="310" y="310" font-size="14" fill="#ffffff">Between devices</text>
  </g>
  <g id="step5" data-narration="Advantages of MAC Protocols">
    <rect x="50" y="370" width="200" height="100" fill="#8b5cf6" rx="10" />
    <text x="60" y="400" font-size="18" fill="#ffffff">Reliable Data Transfer</text>
    <text x="60" y="430" font-size="14" fill="#ffffff">Prevent collisions</text>
    <rect x="300" y="370" width="200" height="100" fill="#2563eb" rx="10" />
    <text x="310" y="400" font-size="18" fill="#ffffff">Efficient Network Use</text>
    <text x="310" y="430" font-size="14" fill="#ffffff">Manage network resources</text>
  </g>
  <g id="step6" data-narration="Disadvantages of MAC Protocols">
    <rect x="50" y="470" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="60" y="500" font-size="18" fill="#ffffff">Complexity</text>
    <text x="60" y="530" font-size="14" fill="#ffffff">Difficult to implement</text>
    <rect x="300" y="470" width="200" height="100" fill="#10b981" rx="10" />
    <text x="310" y="500" font-size="18" fill="#ffffff">Latency and Overhead</text>
    <text x="310" y="530" font-size="14" fill="#ffffff">Introduce delays</text>
  </g>
</svg>