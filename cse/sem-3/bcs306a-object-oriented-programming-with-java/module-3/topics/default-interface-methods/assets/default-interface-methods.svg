<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Default Interface Methods in Java">
    <text x="50" y="50" font-size="24" fill="#2563eb">Default Interface Methods</text>
    <rect x="50" y="100" width="200" height="50" fill="#10b981" rx="10" />
    <text x="60" y="135" font-size="18" fill="#ffffff">Interface</text>
  </g>
  <g id="step1" data-narration="Declaring an interface with a default method">
    <use href="#step0" x="0" y="0" />
    <rect x="300" y="100" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="135" font-size="18" fill="#ffffff">Default Method</text>
    <line x1="250" y1="125" x2="300" y2="125" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step2" data-narration="Understanding the default method implementation">
    <use href="#step1" x="0" y="0" />
    <rect x="550" y="100" width="200" height="100" fill="#2563eb" rx="10" />
    <text x="560" y="135" font-size="18" fill="#ffffff">Implementation</text>
    <text x="560" y="165" font-size="18" fill="#ffffff">System.out.println("Beep Beep!");</text>
    <line x1="500" y1="125" x2="550" y2="125" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" data-narration="Adding abstract methods to the interface">
    <use href="#step2" x="0" y="0" />
    <rect x="50" y="250" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="285" font-size="18" fill="#ffffff">Abstract Method</text>
    <text x="60" y="315" font-size="18" fill="#ffffff">start();</text>
    <line x1="250" y1="275" x2="50" y2="275" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="Combining default and abstract methods in the interface">
    <use href="#step3" x="0" y="0" />
    <rect x="300" y="250" width="200" height="50" fill="#10b981" rx="10" />
    <text x="310" y="285" font-size="18" fill="#ffffff">Another Abstract Method</text>
    <text x="310" y="315" font-size="18" fill="#ffffff">stop();</text>
    <line x1="500" y1="275" x2="300" y2="275" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step5" data-narration="Final interface with default and abstract methods">
    <use href="#step4" x="0" y="0" />
    <rect x="550" y="250" width="200" height="100" fill="#f59e0b" rx="10" />
    <text x="560" y="285" font-size="18" fill="#ffffff">Vehicle Interface</text>
    <text x="560" y="315" font-size="18" fill="#ffffff">public interface Vehicle { ... }</text>
    <line x1="750" y1="275" x2="550" y2="275" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step6" data-narration="Implementing the interface with default methods">
    <use href="#step5" x="0" y="0" />
    <rect x="50" y="400" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="60" y="435" font-size="18" fill="#ffffff">Class Implementation</text>
    <line x1="250" y1="425" x2="50" y2="425" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step7" data-narration="Using the default method in the implemented class">
    <use href="#step6" x="0" y="0" />
    <rect x="300" y="400" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="310" y="435" font-size="18" fill="#ffffff">Default Method Usage</text>
    <line x1="500" y1="425" x2="300" y2="425" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step8" data-narration="Benefits of using default interface methods">
    <use href="#step7" x="0" y="0" />
    <rect x="550" y="400" width="200" height="100" fill="#10b981" rx="10" />
    <text x="560" y="435" font-size="18" fill="#ffffff">Backward Compatibility</text>
    <text x="560" y="465" font-size="18" fill="#ffffff">Easier Maintenance</text>
    <line x1="750" y1="425" x2="550" y2="425" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step9" data-narration="Best practices for using default interface methods">
    <use href="#step8" x="0" y="0" />
    <rect x="50" y="550" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="60" y="585" font-size="18" fill="#ffffff">Use Default Methods Judiciously</text>
    <line x1="250" y1="575" x2="50" y2="575" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step10" data-narration="Conclusion on default interface methods in Java">
    <use href="#step9" x="0" y="0" />
    <rect x="300" y="550" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="310" y="585" font-size="18" fill="#ffffff">Default Interface Methods in Java</text>
    <line x1="500" y1="575" x2="300" y2="575" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step11" data-narration="Final thoughts on using default methods effectively">
    <use href="#step10" x="0" y="0" />
    <rect x="550" y="550" width="200" height="50" fill="#f59e0b" rx="10" />
    <text x="560" y="585" font-size="18" fill="#ffffff">Effective Use of Default Methods</text>
    <line x1="750" y1="575" x2="550" y2="575" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
</svg>