<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="exception-handling-options">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <text x="210" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Exception Handling Options</text>

  <g data-narration="The catch-all handler uses ellipsis (...) to catch any exception type regardless of what was thrown. It should always be the last catch block in a sequence.">
    <rect x="20" y="40" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">catch(...)</text>
    <text x="110" y="80" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Catches any exception</text>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Must be last handler</text>
  </g>

  <g data-narration="Rethrowing an exception uses throw with no operand. This passes the current exception to a higher-level handler after performing partial handling like logging.">
    <rect x="220" y="40" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="310" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Rethrow</text>
    <text x="310" y="80" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9" text-anchor="middle">throw; (no operand)</text>
    <text x="310" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9" text-anchor="middle">Passes exception up</text>
  </g>

  <g data-narration="The terminate function is called when no matching handler is found or when a noexcept function throws. By default it calls abort to end the program.">
    <rect x="20" y="130" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#b71c1c" stroke-width="2"/>
    <text x="110" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">terminate()</text>
    <text x="110" y="170" font-family="Arial, sans-serif" font-size="9" fill="#ffebee" text-anchor="middle">Unhandled exception</text>
    <text x="110" y="185" font-family="Arial, sans-serif" font-size="9" fill="#ffebee" text-anchor="middle">Calls abort()</text>
  </g>

  <g data-narration="The noexcept specifier marks functions that promise not to throw exceptions. If a noexcept function does throw, terminate is called immediately.">
    <rect x="220" y="130" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#4a148c" stroke-width="2"/>
    <text x="310" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">noexcept</text>
    <text x="310" y="170" font-family="Arial, sans-serif" font-size="9" fill="#f3e5f5" text-anchor="middle">void f() noexcept</text>
    <text x="310" y="185" font-family="Arial, sans-serif" font-size="9" fill="#f3e5f5" text-anchor="middle">Promises no throw</text>
  </g>

  <g data-narration="By default, the new operator throws std::bad_alloc if memory allocation fails. This allows detection and handling of memory allocation failures.">
    <rect x="20" y="220" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#e65100" stroke-width="2"/>
    <text x="110" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">new Throws</text>
    <text x="110" y="260" font-family="Arial, sans-serif" font-size="9" fill="#fff3e0" text-anchor="middle">throw bad_alloc</text>
    <text x="110" y="275" font-family="Arial, sans-serif" font-size="9" fill="#fff3e0" text-anchor="middle">on allocation failure</text>
  </g>

  <g data-narration="Using new(nothrow) returns nullptr instead of throwing when allocation fails. This provides an alternative error-checking mechanism without exceptions.">
    <rect x="220" y="220" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">new(nothrow)</text>
    <text x="310" y="260" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Returns nullptr</text>
    <text x="310" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">No exception thrown</text>
  </g>

  <path d="M 200 165 L 220 165" stroke="#b71c1c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#b71c1c"/>
    </marker>
  </defs>

  <text x="210" y="320" font-family="Arial, sans-serif" font-size="11" fill="#424242" text-anchor="middle">catch(...) must be last | throw; rethrows</text>
  <text x="210" y="340" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">noexcept replaced throw() in C++11</text>
  <text x="210" y="360" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">set_terminate() installs custom handler</text>
</svg>