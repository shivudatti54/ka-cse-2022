<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="opening-and-closing-a-file">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>
  <text x="210" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Opening and Closing Files</text>
  <g data-narration="Files can be opened via constructor or open() method. The constructor approach: ifstream file(filename) opens immediately upon creation.">
    <rect x="20" y="40" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Constructor</text>
    <text x="110" y="80" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">ifstream file(name)</text>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Opens on creation</text>
  </g>
  <g data-narration="The open() method allows deferred opening. Create stream object first, then call open(filename, mode) later when filename is determined.">
    <rect x="220" y="40" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="310" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">open() Method</text>
    <text x="310" y="80" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9" text-anchor="middle">file.open(name)</text>
    <text x="310" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e8f5e9" text-anchor="middle">Deferred opening</text>
  </g>
  <g data-narration="File modes: ios::in for reading, ios::out for writing, ios::app for append, ios::trunc to truncate, ios::binary for binary mode. Combine with OR.">
    <rect x="20" y="130" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#4a148c" stroke-width="2"/>
    <text x="110" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">File Modes</text>
    <text x="110" y="170" font-family="Arial, sans-serif" font-size="9" fill="#f3e5f5" text-anchor="middle">in, out, app</text>
    <text x="110" y="185" font-family="Arial, sans-serif" font-size="9" fill="#f3e5f5" text-anchor="middle">trunc, binary, ate</text>
  </g>
  <g data-narration="Always check if file opened successfully using is_open() or testing the stream object directly. Failed opens leave stream in error state.">
    <rect x="220" y="130" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#e65100" stroke-width="2"/>
    <text x="310" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Check Success</text>
    <text x="310" y="170" font-family="Arial, sans-serif" font-size="9" fill="#fff3e0" text-anchor="middle">if (!file.is_open())</text>
    <text x="310" y="185" font-family="Arial, sans-serif" font-size="9" fill="#fff3e0" text-anchor="middle">Handle error</text>
  </g>
  <g data-narration="Call close() to explicitly close files. This flushes buffers and releases system resources. Important before program exits or when reusing stream.">
    <rect x="20" y="220" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#b71c1c" stroke-width="2"/>
    <text x="110" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">close() Method</text>
    <text x="110" y="260" font-family="Arial, sans-serif" font-size="9" fill="#ffebee" text-anchor="middle">file.close()</text>
    <text x="110" y="275" font-family="Arial, sans-serif" font-size="9" fill="#ffebee" text-anchor="middle">Flushes and releases</text>
  </g>
  <g data-narration="RAII automatic closing: File streams automatically close when they go out of scope. Destructor calls close() ensuring proper cleanup even with exceptions.">
    <rect x="220" y="220" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">RAII Closing</text>
    <text x="310" y="260" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Auto close on</text>
    <text x="310" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">scope exit</text>
  </g>
  <text x="210" y="320" font-family="Arial, sans-serif" font-size="11" fill="#424242" text-anchor="middle">ios::out alone truncates, use ios::app to append</text>
  <text x="210" y="340" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">Call clear() before reopening to reset flags</text>
  <text x="210" y="360" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">File streams support RAII for safety</text>
</svg>
