<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="the-power-of-templates">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <text x="210" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">The Power of Templates</text>

  <g data-narration="Templates provide type safety with generic flexibility. Unlike void pointers or macros, templates give compile-time type checking without sacrificing generality.">
    <rect x="20" y="35" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Type Safety</text>
    <text x="110" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Compile-time checking</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Generic flexibility</text>
    <text x="110" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Best of both worlds</text>
  </g>

  <g data-narration="Zero runtime overhead is a key benefit. Template code is generated at compile time, running as fast as hand-written type-specific code.">
    <rect x="220" y="35" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Zero Overhead</text>
    <text x="310" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">Compile-time generation</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">Fast as handwritten code</text>
    <text x="310" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">No runtime cost</text>
  </g>

  <g data-narration="Non-type template parameters allow compile-time values like array sizes. This enables stack-allocated arrays with sizes known at compile time.">
    <rect x="20" y="125" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Non-Type Params</text>
    <text x="110" y="158" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">template &lt;T, int N&gt;</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">Array&lt;int, 10&gt;</text>
    <text x="110" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Compile-time values</text>
  </g>

  <g data-narration="Template specialization allows custom implementation for specific types. General template works for most types, specialization handles exceptions.">
    <rect x="220" y="125" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Specialization</text>
    <text x="310" y="158" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">template &lt;&gt;</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">char* max(char*, char*)</text>
    <text x="310" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Custom for types</text>
  </g>

  <g data-narration="The entire Standard Template Library is built on templates. Vector, list, map, algorithms all use templates to provide type-safe generic containers and functions.">
    <rect x="20" y="215" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Powers STL</text>
    <text x="110" y="248" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">vector, list, map</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">sort, find, copy</text>
    <text x="110" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Entire library</text>
  </g>

  <g data-narration="Templates replace unsafe alternatives. Macros have no type checking, void pointers lose type information. Templates provide safety and performance.">
    <rect x="220" y="215" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">vs Alternatives</text>
    <text x="310" y="248" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Macros: No type safety</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">void*: Loses types</text>
    <text x="310" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Templates: Best choice</text>
  </g>

  <g data-narration="Generic programming enables writing algorithms once that work with any type. One sort function works for all comparable types without code duplication.">
    <rect x="120" y="305" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="210" y="322" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Generic Programming</text>
    <text x="210" y="338" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">Write once</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">Works with all types</text>
    <text x="210" y="366" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Maximum reusability</text>
  </g>
</svg>