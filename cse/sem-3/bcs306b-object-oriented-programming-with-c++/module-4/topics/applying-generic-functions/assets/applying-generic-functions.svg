<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1350">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f57c00"/>
      <stop offset="100%" stop-color="#ffb74d"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#ba68c8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .code-text { font-family: Consolas, monospace; font-size: 10px; }
    .title-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .body-text { font-family: Arial, sans-serif; font-size: 10px; }
  </style>
  
  <rect width="800" height="1350" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="This lesson covers applying generic functions in C++ using function templates.">
    <rect x="50" y="10" width="700" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" class="title-text">Applying Generic Functions in C++</text>
  </g>
  
  <!-- Step 1: Why Generic Programming -->
  <g class="step" id="step1" data-narration="Generic programming lets you write code once and use it with multiple data types, making code reusable and type-safe.">
    <rect x="50" y="65" width="320" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="65" width="320" height="18" rx="8" fill="url(#blueGrad)"/>
    <text x="210" y="77" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Why Generic Programming?</text>
    <text x="60" y="100" fill="#333" class="body-text">Write once, use for multiple types</text>
    <text x="60" y="118" fill="#333" class="body-text">Type-safe and reusable code</text>
    <text x="60" y="136" fill="#333" class="body-text">Reduces code duplication</text>
    
    <rect x="380" y="65" width="370" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="380" y="65" width="370" height="18" rx="8" fill="url(#greenGrad)"/>
    <text x="565" y="77" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Traditional Approach</text>
    <text x="390" y="100" fill="#333" class="body-text code-text">int max(int a, int b) { return a&gt;b?a:b; }</text>
    <text x="390" y="118" fill="#333" class="body-text code-text">double max(double a, double b) { ... }</text>
    <text x="390" y="136" fill="#333" class="body-text code-text">char max(char a, char b) { ... }</text>
  </g>
  
  <!-- Step 2: What are Function Templates -->
  <g class="step" id="step2" data-narration="A function template is a blueprint. The compiler generates actual functions when you call them with specific types.">
    <rect x="50" y="160" width="700" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="160" width="700" height="18" rx="8" fill="url(#purpleGrad)"/>
    <text x="400" y="172" text-anchor="middle" fill="white" class="body-text" font-weight="bold">What are Function Templates?</text>
    <text x="60" y="200" fill="#333" class="body-text">A function template is a <tspan fill="#7b1fa2" font-weight="bold">blueprint</tspan> for creating functions that operate with different data types.</text>
    <text x="60" y="220" fill="#333" class="body-text">The compiler generates actual function instances when called with specific types.</text>
    <text x="60" y="240" fill="#555" class="body-text" font-style="italic">"One definition works for int, double, char, custom classes..."</text>
  </g>
  
  <!-- Step 3: Template Syntax -->
  <g class="step" id="step3" data-narration="Use template keyword with typename or class to define generic type parameters. Both are equivalent in C++.">
    <rect x="50" y="260" width="700" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="260" width="700" height="18" rx="8" fill="url(#blueGrad)"/>
    <text x="400" y="272" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Template Syntax</text>
    
    <rect x="60" y="288" width="200" height="57" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="160" y="305" text-anchor="middle" fill="#1976d2" class="body-text" font-weight="bold">Basic Syntax</text>
    <text x="70" y="325" fill="#333" class="body-text code-text">template&lt;typename T&gt;</text>
    <text x="70" y="340" fill="#333" class="body-text code-text">T functionName(T param) { }</text>
    
    <rect x="270" y="288" width="200" height="57" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="370" y="305" text-anchor="middle" fill="#388e3c" class="body-text" font-weight="bold">Using class</text>
    <text x="280" y="325" fill="#333" class="body-text code-text">template&lt;class T&gt;</text>
    <text x="280" y="340" fill="#333" class="body-text code-text">T functionName(T param) { }</text>
    
    <rect x="480" y="288" width="260" height="57" rx="5" fill="#fff3e0" stroke="#f57c00"/>
    <text x="610" y="305" text-anchor="middle" fill="#f57c00" class="body-text" font-weight="bold">Default Arguments</text>
    <text x="490" y="325" fill="#333" class="body-text code-text">template&lt;typename T = int&gt;</text>
    <text x="490" y="340" fill="#333" class="body-text code-text">T getValue() { return T(); }</text>
  </g>
  
  <!-- Step 4: Template Instantiation -->
  <g class="step" id="step4" data-narration="When you call a template function, the compiler deduces the type and generates a specific function instance automatically.">
    <rect x="50" y="365" width="700" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="365" width="700" height="18" rx="8" fill="url(#orangeGrad)"/>
    <text x="400" y="377" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Template Instantiation Process</text>
    
    <text x="60" y="405" fill="#333" class="body-text"><tspan fill="#f57c00" font-weight="bold">Step 1:</tspan> You write the template (blueprint)</text>
    <text x="60" y="423" fill="#333" class="body-text"><tspan fill="#f57c00" font-weight="bold">Step 2:</tspan> Compiler sees a function call: max(5, 10)</text>
    <text x="60" y="441" fill="#333" class="body-text"><tspan fill="#f57c00" font-weight="bold">Step 3:</tspan> Compiler deduces T = int</text>
    <text x="60" y="459" fill="#333" class="body-text"><tspan fill="#f57c00" font-weight="bold">Step 4:</tspan> Generates: int max(int a, int b) { ... }</text>
    
    <path d="M400,410 L400,450" stroke="#ccc" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="5,5"/>
    <circle cx="400" cy="430" r="15" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
    <text x="400" y="435" text-anchor="middle" fill="#388e3c" class="body-text" font-weight="bold">T to int</text>
  </g>
  
  <!-- Step 5: Template Argument Deduction -->
  <g class="step" id="step5" data-narration="The compiler automatically determines template arguments from the types of arguments passed in the function call.">
    <rect x="50" y="475" width="700" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="475" width="700" height="18" rx="8" fill="url(#greenGrad)"/>
    <text x="400" y="487" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Template Argument Deduction</text>
    
    <text x="60" y="515" fill="#333" class="body-text">The compiler automatically determines template arguments from function call arguments:</text>
    <text x="60" y="535" fill="#333" class="body-text code-text">template&lt;typename T&gt; void swap(T and a, T and b) { ... }</text>
    <text x="60" y="555" fill="#333" class="body-text">swap(x, y) - Compiler deduces T from the type of x and y</text>
  </g>
  
  <!-- Step 6: Multiple Template Parameters -->
  <g class="step" id="step6" data-narration="Templates can have multiple type parameters and also non-type parameters like integers for compile-time constants.">
    <rect x="50" y="580" width="700" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="580" width="700" height="18" rx="8" fill="url(#blueGrad)"/>
    <text x="400" y="592" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Multiple Template Parameters</text>
    
    <rect x="60" y="608" width="320" height="57" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="220" y="625" text-anchor="middle" fill="#1976d2" class="body-text" font-weight="bold">Multiple Types</text>
    <text x="70" y="645" fill="#333" class="body-text code-text">template&lt;typename T1, typename T2&gt;</text>
    <text x="70" y="660" fill="#333" class="body-text code-text">void display(T1 a, T2 b) { ... }</text>
    
    <rect x="390" y="608" width="350" height="57" rx="5" fill="#fff3e0" stroke="#f57c00"/>
    <text x="565" y="625" text-anchor="middle" fill="#f57c00" class="body-text" font-weight="bold">Non-Type Parameters</text>
    <text x="400" y="645" fill="#333" class="body-text code-text">template&lt;typename T, int size&gt;</text>
    <text x="400" y="660" fill="#333" class="body-text code-text">class Array { T arr[size]; }</text>
  </g>
  
  <!-- Step 7: Function Template Overloading -->
  <g class="step" id="step7" data-narration="Regular functions and templates can coexist. Regular functions have higher precedence when both match the call.">
    <rect x="50" y="685" width="700" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="685" width="700" height="18" rx="8" fill="url(#purpleGrad)"/>
    <text x="400" y="697" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Function Template Overloading</text>
    
    <text x="60" y="725" fill="#333" class="body-text">Regular functions and templates can coexist. <tspan fill="#7b1fa2" font-weight="bold">Regular functions have higher precedence!</tspan></text>
    <text x="60" y="745" fill="#333" class="body-text code-text">template&lt;typename T&gt; T square(T x) { return x * x; }</text>
    <text x="60" y="765" fill="#333" class="body-text code-text">double square(double x) { return x * x * 3.14159; }</text>
    <text x="60" y="785" fill="#555" class="body-text">square(5) - template | square(3.14) - regular function</text>
  </g>
  
  <!-- Step 8: Example - Maximum Function -->
  <g class="step" id="step8" data-narration="This example shows a generic maximum function that works with int, double, and char types automatically.">
    <rect x="50" y="795" width="700" height="110" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="795" width="700" height="18" rx="8" fill="url(#greenGrad)"/>
    <text x="400" y="807" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Example 1: Generic Maximum Function</text>
    
    <rect x="60" y="823" width="330" height="72" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="225" y="840" text-anchor="middle" fill="#388e3c" class="body-text" font-weight="bold">Template Definition</text>
    <text x="70" y="858" fill="#333" class="body-text code-text">template&lt;typename T&gt;</text>
    <text x="70" y="873" fill="#333" class="body-text code-text">T findMaximum(T a, T b) {</text>
    <text x="85" y="888" fill="#333" class="body-text code-text">return (a gt b) ? a : b;</text>
    <text x="70" y="900" fill="#333" class="body-text code-text">}</text>
    
    <rect x="400" y="823" width="340" height="72" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="570" y="840" text-anchor="middle" fill="#1976d2" class="body-text" font-weight="bold">Usage and Output</text>
    <text x="410" y="858" fill="#333" class="body-text code-text">findMaximum(5, 10)      - 10 (int)</text>
    <text x="410" y="873" fill="#333" class="body-text code-text">findMaximum(3.14, 2.71) - 3.14 (double)</text>
    <text x="410" y="888" fill="#333" class="body-text code-text">findMaximum('A', 'Z')   - 'Z' (char)</text>
  </g>
  
  <!-- Step 9: Example - Bubble Sort -->
  <g class="step" id="step9" data-narration="A generic bubble sort template works with any data type that supports the greater-than comparison operator.">
    <rect x="50" y="915" width="700" height="110" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="915" width="700" height="18" rx="8" fill="url(#orangeGrad)"/>
    <text x="400" y="927" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Example 2: Generic Bubble Sort</text>
    
    <rect x="60" y="943" width="330" height="72" rx="5" fill="#fff3e0" stroke="#f57c00"/>
    <text x="225" y="960" text-anchor="middle" fill="#f57c00" class="body-text" font-weight="bold">Template Function</text>
    <text x="70" y="978" fill="#333" class="body-text code-text">template&lt;typename T&gt;</text>
    <text x="70" y="993" fill="#333" class="body-text code-text">void bubbleSort(T arr[], int n) {</text>
    <text x="85" y="1008" fill="#333" class="body-text code-text">// sorting logic with greater than</text>
    <text x="70" y="1023" fill="#333" class="body-text code-text">}</text>
    
    <rect x="400" y="943" width="340" height="72" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="570" y="960" text-anchor="middle" fill="#1976d2" class="body-text" font-weight="bold">Works With</text>
    <text x="410" y="978" fill="#333" class="body-text code-text">int arr[] = {64,34,25,12,22}</text>
    <text x="410" y="993" fill="#333" class="body-text code-text">double arr[] = {3.5,1.2,5.8,2.1}</text>
    <text x="410" y="1008" fill="#333" class="body-text code-text">string arr[] = {"cat","bat","at"}</text>
  </g>
  
  <!-- Step 10: Example - Multiple Types -->
  <g class="step" id="step10" data-narration="Templates can accept multiple different types, enabling functions like compare that work with two distinct type parameters.">
    <rect x="50" y="1035" width="700" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="1035" width="700" height="18" rx="8" fill="url(#purpleGrad)"/>
    <text x="400" y="1047" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Example 3: Compare Function with Multiple Types</text>
    
    <rect x="60" y="1063" width="280" height="62" rx="5" fill="#f3e5f5" stroke="#7b1fa2"/>
    <text x="200" y="1080" text-anchor="middle" fill="#7b1fa2" class="body-text" font-weight="bold">Template Declaration</text>
    <text x="70" y="1098" fill="#333" class="body-text code-text">template&lt;typename T1, typename T2&gt;</text>
    <text x="70" y="1113" fill="#333" class="body-text code-text">Result less T1,T2 greater compare(T1 a, T2 b)</text>
    
    <rect x="350" y="1063" width="390" height="62" rx="5" fill="#e3f2fd" stroke="#1976d2"/>
    <text x="545" y="1080" text-anchor="middle" fill="#1976d2" class="body-text" font-weight="bold">Result Examples</text>
    <text x="360" y="1098" fill="#333" class="body-text code-text">compare(10, 20)    - "Second is greater"</text>
    <text x="360" y="1113" fill="#333" class="body-text code-text">compare(5.5, 3.3)  - "First is greater"</text>
  </g>
  
  <!-- Step 11: Key Points Summary -->
  <g class="step" id="step11" data-narration="Key points: typename and class are equivalent, templates instantiate on call, compiler deduces types automatically, and regular functions take precedence.">
    <rect x="50" y="1145" width="700" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="1145" width="700" height="18" rx="8" fill="url(#blueGrad)"/>
    <text x="400" y="1157" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Key Points Summary</text>
    
    <g transform="translate(60, 1173)">
      <circle cx="10" cy="8" r="6" fill="#388e3c"/>
      <text x="22" y="12" fill="#333" class="body-text">template less typename T greater or template less class T greater - both equivalent</text>
    </g>
    <g transform="translate(60, 1193)">
      <circle cx="10" cy="8" r="6" fill="#388e3c"/>
      <text x="22" y="12" fill="#333" class="body-text">Templates are instantiated only when called with specific types</text>
    </g>
    <g transform="translate(60, 1213)">
      <circle cx="10" cy="8" r="6" fill="#388e3c"/>
      <text x="22" y="12" fill="#333" class="body-text">Compiler automatically deduces template arguments in most cases</text>
    </g>
    <g transform="translate(60, 1233)">
      <circle cx="10" cy="8" r="6" fill="#388e3c"/>
      <text x="22" y="12" fill="#333" class="body-text">Regular functions take precedence over template functions</text>
    </g>
  </g>
  
  <!-- Step 12: Common Mistakes and Tips -->
  <g class="step" id="step12" data-narration="Common mistakes include using unsupported operations and placing templates in cpp files. Practice swap, max, and bubbleSort templates.">
    <rect x="50" y="1255" width="700" height="85" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="50" y="1255" width="700" height="18" rx="8" fill="url(#orangeGrad)"/>
    <text x="400" y="1267" text-anchor="middle" fill="white" class="body-text" font-weight="bold">Common Mistakes and Revision Tips</text>
    
    <rect x="60" y="1283" width="330" height="47" rx="5" fill="#ffebee" stroke="#f44336"/>
    <text x="225" y="1300" text-anchor="middle" fill="#f44336" class="body-text" font-weight="bold">Common Mistakes</text>
    <text x="70" y="1318" fill="#333" class="body-text">- Using unsupported operations like less than on non-comparable types</text>
    <text x="70" y="1332" fill="#333" class="body-text">- Placing template definitions in cpp files causes linker errors</text>
    
    <rect x="400" y="1283" width="340" height="47" rx="5" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="570" y="1300" text-anchor="middle" fill="#388e3c" class="body-text" font-weight="bold">Revision Tips</text>
    <text x="410" y="1318" fill="#333" class="body-text">- Practice: swap, max, min, bubbleSort templates</text>
    <text x="410" y="1332" fill="#333" class="body-text">- Remember: "Write once, use for multiple types"</text>
  </g>
  
  <!-- Animated decorative elements -->
  <g>
    <circle cx="50" cy="30" r="8" fill="#e3f2fd" stroke="#1976d2" opacity="0.5">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="1320" r="8" fill="#e8f5e9" stroke="#388e3c" opacity="0.5">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
</svg>