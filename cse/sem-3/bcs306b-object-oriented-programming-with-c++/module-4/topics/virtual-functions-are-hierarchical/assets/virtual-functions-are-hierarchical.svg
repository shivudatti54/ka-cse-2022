<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="virtual-functions-are-hierarchical">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <text x="210" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Hierarchical Virtual Functions</text>

  <g data-narration="In a multi-level inheritance hierarchy, each class can provide its own implementation of a virtual function. The Animal base class declares virtual void speak().">
    <rect x="20" y="35" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Animal (Base)</text>
    <text x="110" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">virtual void speak()</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">cout &lt;&lt; "Animal sound";</text>
    <text x="110" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Top of hierarchy</text>
  </g>

  <g data-narration="Mammal inherits from Animal and overrides speak. At this level in the hierarchy, Mammal provides its own implementation that replaces Animal's version.">
    <rect x="220" y="35" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Mammal (Level 2)</text>
    <text x="310" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">void speak() override</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">cout &lt;&lt; "Mammal sound";</text>
    <text x="310" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Overrides Animal</text>
  </g>

  <g data-narration="Dog inherits from Mammal and provides its own override of speak. When an Animal pointer points to a Dog object, Dog speak is called at runtime.">
    <rect x="20" y="125" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Dog (Level 3)</text>
    <text x="110" y="158" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">void speak() override</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">cout &lt;&lt; "Woof!";</text>
    <text x="110" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Most derived version</text>
  </g>

  <g data-narration="Sedan does not override describe, so it inherits the most recent override from its parent class Car. This shows that not every level must override every virtual function.">
    <rect x="220" y="125" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Sedan (No Override)</text>
    <text x="310" y="158" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">// No speak() override</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">Inherits Mammal::speak()</text>
    <text x="310" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Uses parent's version</text>
  </g>

  <g data-narration="Resolution depends on the actual object type. When a base class pointer calls a virtual function, the program searches upward from the actual object's class until an override is found.">
    <rect x="20" y="215" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Runtime Resolution</text>
    <text x="110" y="248" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">Animal* ptr = &amp;dog;</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">ptr-&gt;speak();</text>
    <text x="110" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Calls Dog::speak()</text>
  </g>

  <g data-narration="Mixed resolution occurs when different virtual functions resolve to different levels. One object can use overrides from multiple levels for different functions.">
    <rect x="220" y="215" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Mixed Resolution</text>
    <text x="310" y="248" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Animal* ptr = &amp;sedan;</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">ptr-&gt;speak();</text>
    <text x="310" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Calls Mammal::speak()</text>
  </g>

  <g data-narration="Calling parent versions explicitly is possible using the scope resolution operator. This allows you to chain virtual function calls or access specific ancestor implementations.">
    <rect x="120" y="305" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="210" y="322" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Explicit Parent Call</text>
    <text x="210" y="338" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">Dog::speak() {</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">  Mammal::speak();</text>
    <text x="210" y="366" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Static call to parent</text>
  </g>
</svg>