<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="generic-classes">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <text x="210" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Generic Classes (Templates)</text>

  <g data-narration="Class templates allow defining type-independent classes. Use template keyword with type parameter before class declaration. The type is specified when creating objects.">
    <rect x="20" y="35" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Class Template</text>
    <text x="110" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">template &lt;class T&gt;</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">class Stack { T arr[]; };</text>
    <text x="110" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Type-independent</text>
  </g>

  <g data-narration="Template instantiation creates a specific class for each type used. Stack int and Stack string are two completely different classes generated by the compiler.">
    <rect x="220" y="35" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Instantiation</text>
    <text x="310" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">Stack&lt;int&gt; intStack;</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">Stack&lt;string&gt; strStack;</text>
    <text x="310" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Separate classes</text>
  </g>

  <g data-narration="Member functions defined outside the class must include the template prefix and use the class name with template parameter in scope resolution.">
    <rect x="20" y="125" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Outside Definition</text>
    <text x="110" y="158" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">template &lt;class T&gt;</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">void Stack&lt;T&gt;::push(T)</text>
    <text x="110" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Requires template prefix</text>
  </g>

  <g data-narration="Non-type template parameters allow passing compile-time constants like array sizes. The value must be known at compile time.">
    <rect x="220" y="125" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Non-Type Params</text>
    <text x="310" y="158" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">template &lt;T, int SIZE&gt;</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">class Array { T arr[SIZE]; };</text>
    <text x="310" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Compile-time constant</text>
  </g>

  <g data-narration="Multiple type parameters enable classes with different types. KeyValue pair can have int key with string value, or any other combination.">
    <rect x="20" y="215" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Multiple Types</text>
    <text x="110" y="248" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">template &lt;T1, T2&gt;</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">class Pair { T1 a; T2 b; };</text>
    <text x="110" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Different types</text>
  </g>

  <g data-narration="Default template arguments provide default types or values. If not specified, the defaults are used when instantiating the template.">
    <rect x="220" y="215" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Default Arguments</text>
    <text x="310" y="248" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">template &lt;T=int, N=10&gt;</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Buffer&lt;&gt; buf; // int, 10</text>
    <text x="310" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Optional specification</text>
  </g>

  <g data-narration="Class templates power the C++ STL. Vector, list, map, stack all use class templates to work with any type while maintaining type safety and performance.">
    <rect x="120" y="305" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="210" y="322" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">STL Foundation</text>
    <text x="210" y="338" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">vector&lt;int&gt;, list&lt;string&gt;</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">map&lt;string, int&gt;</text>
    <text x="210" y="366" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Entire STL uses templates</text>
  </g>
</svg>
