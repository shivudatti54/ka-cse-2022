<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="the-virtual-attribute-is-inherited">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <text x="210" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Virtual Attribute Inheritance</text>

  <g data-narration="Once a function is declared virtual in the base class, it remains virtual throughout the entire inheritance hierarchy. This is automatic - you do not need to repeat the virtual keyword in derived classes.">
    <rect x="20" y="35" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Base Class</text>
    <text x="110" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">virtual void show()</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">{ ... }</text>
    <text x="110" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Declared as virtual</text>
  </g>

  <g data-narration="The Middle class overrides show without the virtual keyword. It is still virtual because it was virtual in Base. The virtual attribute flows down automatically through the hierarchy.">
    <rect x="220" y="35" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Middle Class</text>
    <text x="310" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">void show() // No 'virtual'</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">{ ... }</text>
    <text x="310" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Still virtual!</text>
  </g>

  <g data-narration="The Derived class also overrides show. Even though neither Middle nor Derived used the virtual keyword, show remains virtual. The rule is: once virtual, always virtual.">
    <rect x="20" y="125" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Derived Class</text>
    <text x="110" y="158" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">void show() // No 'virtual'</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">{ ... }</text>
    <text x="110" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Also still virtual!</text>
  </g>

  <g data-narration="The override keyword in C++11 makes your intent explicit and helps catch errors. If the signature does not match a virtual function in the base class, the compiler will report an error.">
    <rect x="220" y="125" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">override Keyword</text>
    <text x="310" y="158" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">void show() override</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">{ ... }</text>
    <text x="310" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Best practice (C++11)</text>
  </g>

  <g data-narration="Runtime polymorphism works across the entire hierarchy. A Base pointer pointing to a Derived object will call Derived show, even though it is four levels deep in the hierarchy.">
    <rect x="20" y="215" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Polymorphism</text>
    <text x="110" y="248" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">Base* ptr = &amp;derivedObj;</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">ptr-&gt;show();</text>
    <text x="110" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Calls Derived::show()</text>
  </g>

  <g data-narration="Virtual destructors also inherit the virtual attribute. If the base destructor is virtual, all derived destructors are automatically virtual, ensuring proper cleanup through base pointers.">
    <rect x="220" y="215" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Virtual Destructors</text>
    <text x="310" y="248" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">virtual ~Base()</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">~Derived() // Auto virtual</text>
    <text x="310" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Inherited attribute</text>
  </g>

  <g data-narration="Deep inheritance hierarchies work correctly. If a class in the middle does not override the function, it inherits the most recent override above it, and the virtual dispatch still works.">
    <rect x="120" y="305" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="210" y="322" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Deep Hierarchies</text>
    <text x="210" y="338" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">Base→Middle→Derived→D</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">All levels work</text>
    <text x="210" y="366" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Automatic inheritance</text>
  </g>
</svg>