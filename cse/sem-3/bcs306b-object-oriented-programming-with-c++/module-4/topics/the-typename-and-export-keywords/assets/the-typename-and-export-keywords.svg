<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1250">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#90caf9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ef9a9a"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect {
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center;
    }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .code-text { font-family: 'Courier New', monospace; font-size: 11px; }
    .body-text { font-family: 'Segoe UI', Arial, sans-serif; }
    
    .keyword-typename { fill: #9c27b0; font-weight: bold; }
    .keyword-export { fill: #f44336; font-weight: bold; }
    .keyword-template { fill: #1565c0; font-weight: bold; }
    .comment { fill: #757575; font-style: italic; }
    .code-bg { fill: #263238; }
    .code-text-white { fill: #eceff1; font-family: 'Courier New', monospace; font-size: 10px; }
  </style>

  <!-- Background -->
  <rect width="800" height="1250" fill="#f8f9fa"/>

  <!-- STEP 0: Title -->
  <g class="step" id="step0" data-narration="This lecture covers two essential C++ template keywords: typename for type disambiguation and export for template separation.">
    <rect x="20" y="10" width="760" height="50" rx="12" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" fill="white" font-size="22" font-weight="bold" class="title-text">The typename and export Keywords in C++</text>
    <text x="400" y="58" text-anchor="middle" fill="#e3f2fd" font-size="11">2022 Scheme - CSE Branch</text>
  </g>

  <!-- STEP 1: Introduction Overview -->
  <g class="step" id="step1" data-narration="Templates enable generic programming in C++, but require special keywords to handle type dependencies correctly.">
    <rect x="30" y="70" width="740" height="85" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="95" fill="#1565c0" font-size="14" font-weight="bold" class="title-text">Why Templates Need Special Keywords</text>
    <text x="50" y="118" fill="#424242" font-size="11" class="body-text">Templates in C++ create code at compile-time based on type parameters.</text>
    <text x="50" y="135" fill="#424242" font-size="11" class="body-text">The compiler cannot always determine if a name refers to a type or a value.</text>
    <rect x="520" y="85" width="230" height="55" rx="8" fill="#1565c0" opacity="0.1"/>
    <text x="540" y="105" fill="#1565c0" font-size="12" font-weight="bold">typename</text>
    <text x="540" y="122" fill="#424242" font-size="10">Clarifies nested types</text>
    <text x="665" y="105" fill="#f44336" font-size="12" font-weight="bold">export</text>
    <text x="665" y="122" fill="#424242" font-size="10">Separates definitions</text>
  </g>

  <!-- STEP 2: What is typename -->
  <g class="step" id="step2" data-narration="The typename keyword tells the compiler that a qualified name inside a template refers to a type, not a static member.">
    <rect x="30" y="165" width="740" height="85" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="50" y="190" fill="#7b1fa2" font-size="14" font-weight="bold" class="title-text">The typename Keyword</text>
    <text x="50" y="215" fill="#424242" font-size="11" class="body-text">Purpose: Tells compiler that a qualified name inside a template refers to a TYPE,</text>
    <text x="50" y="232" fill="#424242" font-size="11" class="body-text">not a static member, enum value, or data member.</text>
    <rect x="550" y="185" width="200" height="50" rx="8" fill="#263238"/>
    <text x="570" y="210" fill="#a5d6a7" font-size="11" class="code-text">template&lt;typename T&gt;</text>
    <text x="570" y="227" fill="#ce93d8" font-size="11" class="code-text">typename T::value_type x;</text>
  </g>

  <!-- STEP 3: Dependent Names Explained -->
  <g class="step" id="step3" data-narration="Dependent names are names that depend on template parameters. The compiler cannot resolve them until instantiation time.">
    <rect x="30" y="260" width="740" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="285" fill="#2e7d32" font-size="14" font-weight="bold" class="title-text">Dependent Names in Templates</text>
    <text x="50" y="310" fill="#424242" font-size="11" class="body-text">Dependent names are names that depend on template parameters. The compiler cannot</text>
    <text x="50" y="327" fill="#424242" font-size="11" class="body-text">determine whether they refer to types or values until the template is instantiated.</text>
    
    <rect x="50" y="340" width="340" height="10" rx="5" fill="#c62828"/>
    <animate attributeName="width" from="0" to="340" dur="1s" begin="0.5s" fill="freeze"/>
    
    <text x="60" y="350" fill="white" font-size="9" font-weight="bold">Container::iterator it; // ERROR - is iterator a type or member?</text>
    
    <rect x="410" y="340" width="340" height="10" rx="5" fill="#388e3c"/>
    <animate attributeName="width" from="0" to="340" dur="1s" begin="1.5s" fill="freeze"/>
    
    <text x="420" y="350" fill="white" font-size="9" font-weight="bold">typename Container::iterator it; // CORRECT - declares it as a type</text>
  </g>

  <!-- STEP 4: Basic Syntax -->
  <g class="step" id="step4" data-narration="The syntax requires typename before the qualified type name when accessing nested types through template parameters.">
    <rect x="30" y="370" width="740" height="95" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="395" fill="#1565c0" font-size="14" font-weight="bold" class="title-text">Basic Syntax of typename</text>
    
    <rect x="50" y="410" width="300" height="45" rx="8" fill="#263238"/>
    <text x="65" y="430" fill="#ffcc80" font-size="10" class="code-text">template&lt;typename T&gt;</text>
    <text x="65" y="447" fill="#ce93d8" font-size="10" class="code-text">class MyClass {</text>
    
    <rect x="360" y="410" width="390" height="45" rx="8" fill="#263238"/>
    <text x="375" y="430" fill="#ce93d8" font-size="10" class="code-text">    typename T::NestedType member;</text>
    <text x="375" y="447" fill="#a5d6a7" font-size="10" class="code-text">    // T::NestedType is treated as a TYPE</text>
    
    <path d="M320 432 L360 432" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="330" y="425" fill="#1565c0" font-size="9" font-weight="bold">typename</text>
  </g>

  <!-- STEP 5: Real Example with Containers -->
  <g class="step" id="step5" data-narration="In this practical example, typename is essential when accessing iterator and value_type from container templates.">
    <rect x="30" y="475" width="740" height="105" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="50" y="500" fill="#e65100" font-size="14" font-weight="bold" class="title-text">Practical Example: Accessing Container Types</text>
    
    <rect x="50" y="515" width="700" height="55" rx="8" fill="#263238"/>
    <text x="65" y="535" fill="#ffcc80" font-size="10" class="code-text">template&lt;typename Container&gt;</text>
    <text x="65" y="552" fill="#ce93d8" font-size="10" class="code-text">void printFirst(Container&amp; c) {</text>
    <text x="85" y="535" fill="#a5d6a7" font-size="10" class="code-text">typename Container::iterator it = c.begin();</text>
    <text x="85" y="552" fill="#a5d6a7" font-size="10" class="code-text">std::cout &lt;&lt; *it &lt;&lt; std::endl;</text>
    
    <circle cx="700" cy="540" r="18" fill="#4caf50">
      <animate attributeName="r" values="0;18" dur="0.5s" begin="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.3s" fill="freeze"/>
    </circle>
    <text x="700" y="544" text-anchor="middle" fill="white" font-size="20" font-weight="bold">✓</text>
  </g>

  <!-- STEP 6: Where typename is Required -->
  <g class="step" id="step6" data-narration="typename is required for nested types, return types, template arguments, and base class member access through template parameters.">
    <rect x="30" y="590" width="740" height="110" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="615" fill="#2e7d32" font-size="14" font-weight="bold" class="title-text">Where typename is REQUIRED</text>
    
    <!-- Four contexts -->
    <rect x="50" y="630" width="165" height="60" rx="6" fill="#1565c0" opacity="0.15"/>
    <text x="60" y="648" fill="#1565c0" font-size="10" font-weight="bold">1. Nested Type Names</text>
    <text x="60" y="663" fill="#424242" font-size="9">T::value_type x;</text>
    <text x="60" y="678" fill="#757575" font-size="8">typename T::value_type x;</text>
    
    <rect x="225" y="630" width="165" height="60" rx="6" fill="#1565c0" opacity="0.15"/>
    <text x="235" y="648" fill="#1565c0" font-size="10" font-weight="bold">2. Return Types</text>
    <text x="235" y="663" fill="#424242" font-size="9">typename T::type f();</text>
    <text x="235" y="678" fill="#757575" font-size="8">Return type needs typename</text>
    
    <rect x="400" y="630" width="165" height="60" rx="6" fill="#1565c0" opacity="0.15"/>
    <text x="410" y="648" fill="#1565c0" font-size="10" font-weight="bold">3. Template Args</text>
    <text x="410" y="663" fill="#424242" font-size="9">std::vector&lt;T::value_type&gt;</text>
    <text x="410" y="678" fill="#757575" font-size="8">typename T::value_type</text>
    
    <rect x="575" y="630" width="180" height="60" rx="6" fill="#1565c0" opacity="0.15"/>
    <text x="585" y="648" fill="#1565c0" font-size="10" font-weight="bold">4. Base Class Types</text>
    <text x="585" y="663" fill="#424242" font-size="9">typename Base&lt;T&gt;::member</text>
    <text x="585" y="678" fill="#757575" font-size="8">In derived class templates</text>
  </g>

  <!-- STEP 7: Where typename is NOT Required -->
  <g class="step" id="step7" data-narration="typename is NOT required in base class lists or member initialization lists where the context clearly indicates type usage.">
    <rect x="30" y="710" width="740" height="80" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="50" y="735" fill="#c62828" font-size="14" font-weight="bold" class="title-text">Where typename is NOT Required</text>
    
    <rect x="50" y="750" width="340" height="30" rx="6" fill="#c62828" opacity="0.15"/>
    <text x="60" y="768" fill="#424242" font-size="10">Base Class Lists: class Derived : public T::BaseClass { }</text>
    
    <rect x="400" y="750" width="340" height="30" rx="6" fill="#c62828" opacity="0.15"/>
    <text x="410" y="768" fill="#424242" font-size="10">Member Initialization: Derived() : T::BaseClass() { }</text>
  </g>

  <!-- STEP 8: The export Keyword - Introduction -->
  <g class="step" id="step8" data-narration="The export keyword was designed to separate template declarations from definitions for faster compilation in C++03.">
    <rect x="30" y="800" width="740" height="95" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="50" y="825" fill="#c62828" font-size="14" font-weight="bold" class="title-text">The export Keyword - Historical Context</text>
    <text x="50" y="850" fill="#424242" font-size="11" class="body-text">Introduced in C++03 to separate template declarations from definitions for faster compilation.</text>
    <text x="50" y="867" fill="#424242" font-size="11" class="body-text">Allow definition in separate translation unit - linked at link time.</text>
    
    <rect x="500" y="835" width="250" height="50" rx="8" fill="#263238"/>
    <text x="515" y="855" fill="#ef9a9a" font-size="10" class="code-text">export template&lt;typename T&gt;</text>
    <text x="515" y="872" fill="#ef9a9a" font-size="10" class="code-text">class MyTemplate { };</text>
  </g>

  <!-- STEP 9: Why export was Removed -->
  <g class="step" id="step9" data-narration="export was deprecated in C++11 and removed in C++17 due to poor compiler support and implementation complexity.">
    <rect x="30" y="905" width="740" height="100" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="50" y="930" fill="#c62828" font-size="14" font-weight="bold" class="title-text">Why export was Removed</text>
    
    <rect x="50" y="945" width="160" height="50" rx="6" fill="#ff9800" opacity="0.2"/>
    <text x="60" y="962" fill="#e65100" font-size="10" font-weight="bold">Poor Compiler Support</text>
    <text x="60" y="980" fill="#424242" font-size="9">Only Comeau, Intel</text>
    
    <rect x="220" y="945" width="160" height="50" rx="6" fill="#ff9800" opacity="0.2"/>
    <text x="230" y="962" fill="#e65100" font-size="10" font-weight="bold">Implementation Complexity</text>
    <text x="230" y="980" fill="#424242" font-size="9">Sophisticated management</text>
    
    <rect x="390" y="945" width="160" height="50" rx="6" fill="#ff9800" opacity="0.2"/>
    <text x="400" y="962" fill="#e65100" font-size="10" font-weight="bold">Linkage Issues</text>
    <text x="400" y="980" fill="#424242" font-size="9">Subtle bugs</text>
    
    <rect x="560" y="945" width="190" height="50" rx="6" fill="#c62828" opacity="0.3"/>
    <text x="570" y="962" fill="#c62828" font-size="10" font-weight="bold">C++11: Deprecated</text>
    <text x="570" y="980" fill="#424242" font-size="9">C++17: Completely Removed</text>
  </g>

  <!-- STEP 10: Modern Alternative -->
  <g class="step" id="step10" data-narration="Modern C++ uses header inclusion for templates - the traditional approach that works universally across all compilers.">
    <rect x="30" y="1015" width="740" height="85" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="50" y="1040" fill="#2e7d32" font-size="14" font-weight="bold" class="title-text">Modern Alternative: Header Inclusion</text>
    <text x="50" y="1065" fill="#424242" font-size="11" class="body-text">Since export is removed, use traditional header inclusion - template definitions in .hpp files.</text>
    
    <rect x="520" y="1030" width="230" height="60" rx="8" fill="#263238"/>
    <text x="535" y="1052" fill="#a5d6a7" font-size="9" class="code-text">// mytemplate.hpp</text>
    <text x="535" y="1067" fill="#a5d6a7" font-size="9" class="code-text">template&lt;typename T&gt;</text>
    <text x="535" y="1082" fill="#a5d6a7" font-size="9" class="code-text">class MyTemplate { };</text>
  </g>

  <!-- STEP 11: Exam Tips -->
  <g class="step" id="step11" data-narration="Key exam points: use typename for nested types through T::, remember export was removed in C++17, and know where typename is not required.">
    <rect x="30" y="1110" width="740" height="90" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="50" y="1135" fill="#1565c0" font-size="14" font-weight="bold" class="title-text">Exam Tips &amp; Key Takeaways</text>
    
    <rect x="50" y="1150" width="220" height="40" rx="6" fill="#388e3c" opacity="0.2"/>
    <text x="60" y="1165" fill="#2e7d32" font-size="10" font-weight="bold">✓ USE typename</text>
    <text x="60" y="1182" fill="#424242" font-size="9">When accessing T::NestedType</text>
    
    <rect x="280" y="1150" width="220" height="40" rx="6" fill="#f44336" opacity="0.2"/>
    <text x="290" y="1165" fill="#c62828" font-size="10" font-weight="bold">✗ DON'T use export</text>
    <text x="290" y="1182" fill="#424242" font-size="9">Removed in C++17</text>
    
    <rect x="510" y="1150" width="240" height="40" rx="6" fill="#ff9800" opacity="0.2"/>
    <text x="520" y="1165" fill="#e65100" font-size="10" font-weight="bold">REMEMBER</text>
    <text x="520" y="1182" fill="#424242" font-size="9">class/typename interchangeable in template params only</text>
  </g>

  <!-- STEP 12: Summary Card -->
  <g class="step" id="step12" data-narration="In summary: typename is essential for accessing nested types in templates. Export is obsolete - use header inclusion instead.">
    <rect x="30" y="1210" width="740" height="35" rx="10" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="400" y="1233" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SUMMARY: typename → Nested Types | export → Obsolete (C++17) | Use Header Inclusion</text>
  </g>
</svg>