<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="virtual-functions">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <text x="210" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Virtual Functions in C++</text>

  <g data-narration="Virtual functions enable runtime polymorphism in C++. When a base class pointer points to a derived object, the virtual keyword ensures the derived class's function is called at runtime, not the base class version.">
    <rect x="20" y="35" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Base Class</text>
    <text x="110" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">virtual void show()</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">{ cout &lt;&lt; "Base"; }</text>
    <text x="110" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Marked with 'virtual'</text>
  </g>

  <g data-narration="The vtable and vptr mechanism is the heart of virtual functions. Each class with virtual functions has a vtable containing function pointers. Each object has a hidden vptr pointing to its class's vtable.">
    <rect x="220" y="35" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">vtable Mechanism</text>
    <text x="310" y="68" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">vptr → vtable</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">vtable[&amp;Base::show]</text>
    <text x="310" y="96" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Hidden implementation</text>
  </g>

  <g data-narration="Derived classes override virtual functions without needing the virtual keyword again. The override keyword in C++11 helps catch errors by ensuring the function signature matches the base class virtual function.">
    <rect x="20" y="125" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Derived Class</text>
    <text x="110" y="158" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">void show() override</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#fff8e0" text-anchor="middle">{ cout &lt;&lt; "Derived"; }</text>
    <text x="110" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">override keyword (C++11)</text>
  </g>

  <g data-narration="Runtime binding is the process where the actual function to call is determined at runtime based on the object type, not the pointer type. Base pointer can point to Derived object and call Derived's function.">
    <rect x="220" y="125" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="142" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Runtime Binding</text>
    <text x="310" y="158" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">Base* ptr = new Derived();</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#f0e0ff" text-anchor="middle">ptr-&gt;show();</text>
    <text x="310" y="186" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Calls Derived::show()</text>
  </g>

  <g data-narration="Virtual destructors are essential for polymorphism with dynamic allocation. Without a virtual destructor, deleting a derived object through a base pointer only calls the base destructor, causing memory leaks.">
    <rect x="20" y="215" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Virtual Destructor</text>
    <text x="110" y="248" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">virtual ~Base() {}</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#ffe0e0" text-anchor="middle">delete basePtr;</text>
    <text x="110" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Calls both destructors</text>
  </g>

  <g data-narration="Pure virtual functions are declared with equals zero and have no implementation in the base class. They create abstract classes that cannot be instantiated and force derived classes to implement the function.">
    <rect x="220" y="215" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Pure Virtual</text>
    <text x="310" y="248" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">virtual void func() = 0;</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Makes class abstract</text>
    <text x="310" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Must be overridden</text>
  </g>

  <g data-narration="The final keyword prevents further overriding of virtual functions or prevents classes from being derived. This provides control over inheritance and enables compiler optimizations.">
    <rect x="120" y="305" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="210" y="322" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">final Keyword</text>
    <text x="210" y="338" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">void func() final;</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0" text-anchor="middle">class Final final : Base;</text>
    <text x="210" y="366" font-family="Arial, sans-serif" font-size="8" fill="#ffeb3b" text-anchor="middle">Prevents override/derivation</text>
  </g>
</svg>