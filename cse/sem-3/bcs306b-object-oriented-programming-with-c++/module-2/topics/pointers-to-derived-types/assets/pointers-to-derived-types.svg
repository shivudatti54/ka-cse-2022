<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="pointers-to-derived-types">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Pointers to Derived Types</text>

  <!-- Section 1: Upcasting -->
  <g data-narration="A base class pointer can point to a derived class object. This is called upcasting and is always safe because a derived class object contains all the members of the base class.">
    <rect x="20" y="45" width="180" height="110" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Upcasting (Safe)</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Base pointer to derived object</text>
    <rect x="30" y="95" width="160" height="50" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="110" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">class Base { ... };</text>
    <text x="110" y="123" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">class Derived : public Base {...};</text>
    <text x="110" y="136" font-family="Courier New, monospace" font-size="8" fill="#90ee90" text-anchor="middle">Base* ptr = &amp;derivedObj; // OK!</text>
  </g>

  <!-- Section 2: Accessible Members -->
  <g data-narration="Through a base class pointer, only base class members are accessible. The derived class's own members cannot be accessed through the base pointer, even though it points to a derived object.">
    <rect x="220" y="45" width="180" height="110" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Accessible Members</text>
    <text x="310" y="85" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Only base class members visible</text>
    <rect x="230" y="95" width="160" height="50" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="110" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Base* ptr = &amp;derivedObj;</text>
    <text x="310" y="123" font-family="Courier New, monospace" font-size="8" fill="#90ee90" text-anchor="middle">ptr->baseMember();  // OK</text>
    <text x="310" y="136" font-family="Courier New, monospace" font-size="8" fill="#ff9999" text-anchor="middle">ptr->derivedMember(); // ERROR!</text>
  </g>

  <!-- Section 3: Static Binding -->
  <g data-narration="Without virtual functions, function calls are resolved based on the pointer type, not the object type. This is called static or early binding. The base version of the function is always called.">
    <rect x="20" y="170" width="180" height="100" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Static Binding</text>
    <text x="110" y="210" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Non-virtual functions</text>
    <rect x="30" y="220" width="160" height="40" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="235" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Base* ptr = &amp;derivedObj;</text>
    <text x="110" y="248" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">ptr->show();  // Calls Base::show</text>
    <text x="110" y="263" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Based on pointer type!</text>
  </g>

  <!-- Section 4: Virtual Functions -->
  <g data-narration="With virtual functions, the function call is resolved at runtime based on the actual object type, not the pointer type. This is dynamic or late binding, enabling runtime polymorphism.">
    <rect x="220" y="170" width="180" height="100" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Virtual Functions</text>
    <text x="310" y="210" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Dynamic binding (polymorphism)</text>
    <rect x="230" y="220" width="160" height="40" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="235" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">virtual void show() {...}</text>
    <text x="310" y="248" font-family="Courier New, monospace" font-size="8" fill="#90ee90" text-anchor="middle">ptr->show(); // Calls Derived::show</text>
    <text x="310" y="263" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Based on object type!</text>
  </g>

  <!-- Section 5: Downcasting Warning -->
  <g data-narration="A derived class pointer cannot directly point to a base class object without an explicit cast. This is dangerous because the derived pointer may try to access members that do not exist in the base object.">
    <rect x="20" y="285" width="180" height="100" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Downcasting (Dangerous)</text>
    <text x="110" y="325" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Derived pointer to base object</text>
    <rect x="30" y="335" width="160" height="40" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="350" font-family="Courier New, monospace" font-size="8" fill="#ff9999" text-anchor="middle">Derived* dptr = &amp;baseObj;</text>
    <text x="110" y="363" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">ERROR: Cannot convert!</text>
    <text x="110" y="378" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Use dynamic_cast for safety</text>
  </g>

  <!-- Section 6: Polymorphism Use Case -->
  <g data-narration="Pointers to derived types enable polymorphism. An array of base class pointers can point to different derived class objects, allowing uniform handling of diverse object types through a common interface.">
    <rect x="220" y="285" width="180" height="100" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Polymorphism Use Case</text>
    <rect x="230" y="315" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="330" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Shape* shapes[3];</text>
    <text x="310" y="343" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">shapes[0] = &amp;circle;</text>
    <text x="310" y="356" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">shapes[1] = &amp;square;</text>
    <text x="310" y="369" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Call virtual functions on all!</text>
  </g>
</svg>
