<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="function-overloading">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Function Overloading in C++</text>

  <!-- Section 1: Definition -->
  <g data-narration="Function overloading allows multiple functions to share the same name within the same scope but differ in their parameter lists. This enables compile-time polymorphism and improves code readability.">
    <rect x="20" y="45" width="180" height="110" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">What is Overloading?</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Same function name</text>
    <text x="110" y="100" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Different parameters</text>
    <rect x="30" y="110" width="160" height="35" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="125" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">int add(int, int);</text>
    <text x="110" y="138" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">double add(double, double);</text>
  </g>

  <!-- Section 2: By Parameter Count -->
  <g data-narration="Functions can be overloaded by having different numbers of parameters. The compiler selects the version that matches the number of arguments provided in the function call.">
    <rect x="220" y="45" width="180" height="110" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Overloading by Count</text>
    <rect x="230" y="75" width="160" height="70" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">void display(int num);</text>
    <text x="310" y="103" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">void display(int num1, int num2);</text>
    <text x="310" y="118" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Call: display(10);</text>
    <text x="310" y="131" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Call: display(20, 30);</text>
  </g>

  <!-- Section 3: By Parameter Type -->
  <g data-narration="Functions can be overloaded by having parameters of different types. The compiler uses the argument types to determine which function version to call.">
    <rect x="20" y="170" width="180" height="100" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Overloading by Type</text>
    <rect x="30" y="200" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="215" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">void show(int value);</text>
    <text x="110" y="228" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">void show(double value);</text>
    <text x="110" y="241" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">void show(string text);</text>
    <text x="110" y="256" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Compiler picks based on type</text>
  </g>

  <!-- Section 4: Name Mangling -->
  <g data-narration="The compiler implements function overloading using name mangling, which creates unique internal names for each overloaded function by encoding parameter type information into the function name.">
    <rect x="220" y="170" width="180" height="100" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Name Mangling</text>
    <text x="310" y="210" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Compiler generates unique names:</text>
    <rect x="230" y="220" width="160" height="40" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="235" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">print(int) → _print_i</text>
    <text x="310" y="248" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">print(double) → _print_d</text>
    <text x="310" y="261" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">print(char*) → _print_pc</text>
  </g>

  <!-- Section 5: Resolution Process -->
  <g data-narration="When an overloaded function is called, the compiler resolves which version to invoke through exact match first, then promotions, then standard conversions, and finally user-defined conversions.">
    <rect x="20" y="285" width="180" height="100" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Resolution Process</text>
    <text x="110" y="325" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">1. Exact Match</text>
    <text x="110" y="340" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">2. Promotion (char → int)</text>
    <text x="110" y="355" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">3. Standard Conversion</text>
    <text x="110" y="370" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">4. User-defined Conversion</text>
  </g>

  <!-- Section 6: Important Rule -->
  <g data-narration="A critical rule of function overloading is that return type alone cannot differentiate overloaded functions. Functions must differ in their parameter lists, not just their return types.">
    <rect x="220" y="285" width="180" height="100" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Important Rule</text>
    <text x="310" y="325" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Return type alone is NOT enough!</text>
    <rect x="230" y="335" width="160" height="40" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="350" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">int calc(int x);</text>
    <text x="310" y="363" font-family="Courier New, monospace" font-size="8" fill="#ff9999" text-anchor="middle">double calc(int x);  // ERROR!</text>
  </g>
</svg>
