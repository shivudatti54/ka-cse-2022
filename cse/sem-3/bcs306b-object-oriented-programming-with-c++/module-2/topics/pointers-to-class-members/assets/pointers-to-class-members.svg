<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="pointers-to-class-members">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Pointers to Class Members</text>

  <!-- Section 1: What Are They -->
  <g data-narration="Pointers to class members are special pointers that point to a member of a class rather than a specific memory location. They store an offset that identifies which member to access when combined with an object.">
    <rect x="20" y="45" width="180" height="110" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">What Are They?</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Point to class members,</text>
    <text x="110" y="100" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">not specific memory addresses</text>
    <rect x="30" y="110" width="160" height="35" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="125" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Must bind to an object using</text>
    <text x="110" y="138" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">.* or ->* operators</text>
  </g>

  <!-- Section 2: Pointer to Data Member -->
  <g data-narration="A pointer to a data member is declared using the syntax: datatype ClassName::*pointer_name. It can point to any data member of the specified type within the class.">
    <rect x="220" y="45" width="180" height="110" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Pointer to Data Member</text>
    <rect x="230" y="75" width="160" height="70" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">class Point { public:</text>
    <text x="310" y="103" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">  int x, y;</text>
    <text x="310" y="116" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">};</text>
    <text x="310" y="131" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">int Point::*px = &amp;Point::x;</text>
  </g>

  <!-- Section 3: Using .* Operator -->
  <g data-narration="The .* operator is used to access a class member through a member pointer when you have an object. The syntax is: object.*memberPointer, which accesses the member of that specific object.">
    <rect x="20" y="170" width="180" height="100" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Using .* Operator</text>
    <text x="110" y="210" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Access member via object</text>
    <rect x="30" y="220" width="160" height="40" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="235" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Point p(10, 20);</text>
    <text x="110" y="248" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">int Point::*px = &amp;Point::x;</text>
    <text x="110" y="261" font-family="Courier New, monospace" font-size="8" fill="#90ee90" text-anchor="middle">cout &lt;&lt; p.*px;  // 10</text>
  </g>

  <!-- Section 4: Using ->* Operator -->
  <g data-narration="The ->* operator is used when you have a pointer to an object rather than the object itself. The syntax is: objectPtr->*memberPointer, which dereferences the object pointer and accesses the member.">
    <rect x="220" y="170" width="180" height="100" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Using ->* Operator</text>
    <text x="310" y="210" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Access member via pointer</text>
    <rect x="230" y="220" width="160" height="40" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="235" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Point* ptr = &amp;p;</text>
    <text x="310" y="248" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">int Point::*px = &amp;Point::x;</text>
    <text x="310" y="261" font-family="Courier New, monospace" font-size="8" fill="#90ee90" text-anchor="middle">cout &lt;&lt; ptr->*px;  // 10</text>
  </g>

  <!-- Section 5: Pointer to Member Function -->
  <g data-narration="A pointer to a member function stores which member function to call. The syntax is: return_type (ClassName::*pointer)(params). You must use parentheses when calling through it: (obj.*funcPtr)().">
    <rect x="20" y="285" width="180" height="100" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Pointer to Member Function</text>
    <rect x="30" y="315" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="330" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">int (Calc::*op)(int, int);</text>
    <text x="110" y="343" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">op = &amp;Calc::add;</text>
    <text x="110" y="358" font-family="Courier New, monospace" font-size="8" fill="#90ee90" text-anchor="middle">(obj.*op)(10, 5);</text>
    <text x="110" y="371" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Note: Parentheses required!</text>
  </g>

  <!-- Section 6: Use Cases -->
  <g data-narration="Pointers to class members enable runtime selection of which member to access, table-driven dispatch for menu systems, and generic algorithms that operate on different members. They are useful for callbacks and flexible object manipulation.">
    <rect x="220" y="285" width="180" height="100" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Use Cases</text>
    <text x="310" y="325" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">• Runtime member selection</text>
    <text x="310" y="340" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">• Table-driven dispatch</text>
    <text x="310" y="355" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">• Menu systems</text>
    <text x="310" y="370" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">• Generic algorithms</text>
  </g>
</svg>
