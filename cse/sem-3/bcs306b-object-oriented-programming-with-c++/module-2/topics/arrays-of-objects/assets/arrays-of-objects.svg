<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="arrays-of-objects">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Arrays of Objects in C++</text>

  <!-- Declaration Syntax -->
  <g data-narration="In C++, you can create an array of objects just like arrays of basic types. The syntax is ClassName arrayName[size], where each element is an independent object with its own data members.">
    <rect x="20" y="40" width="180" height="60" rx="8" ry="8" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Declaration Syntax</text>
    <text x="110" y="78" font-family="Courier New, monospace" font-size="10" fill="#e0e0ff" text-anchor="middle">Student students[3];</text>
    <text x="110" y="92" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Creates 3 Student objects</text>
  </g>

  <!-- Memory Layout -->
  <g data-narration="When an array of objects is declared, all objects are stored in contiguous memory. Each array element is a complete object with its own set of member variables, arranged sequentially in memory.">
    <rect x="220" y="40" width="180" height="60" rx="8" ry="8" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Memory Layout</text>
    <rect x="235" y="70" width="50" height="22" rx="3" fill="#ffffff" stroke="#2e8b57" stroke-width="1.5"/>
    <rect x="290" y="70" width="50" height="22" rx="3" fill="#ffffff" stroke="#2e8b57" stroke-width="1.5"/>
    <rect x="345" y="70" width="50" height="22" rx="3" fill="#ffffff" stroke="#2e8b57" stroke-width="1.5"/>
    <text x="260" y="85" font-family="Arial, sans-serif" font-size="9" fill="#2e8b57" text-anchor="middle">[0]</text>
    <text x="315" y="85" font-family="Arial, sans-serif" font-size="9" fill="#2e8b57" text-anchor="middle">[1]</text>
    <text x="370" y="85" font-family="Arial, sans-serif" font-size="9" fill="#2e8b57" text-anchor="middle">[2]</text>
  </g>

  <!-- Constructor Calls -->
  <g data-narration="When you create an array of objects, the default constructor is automatically called for each element. If your class has only parameterized constructors, you must provide initializers or ensure a default constructor exists.">
    <rect x="20" y="120" width="180" height="70" rx="8" ry="8" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Constructor Calls</text>
    <text x="110" y="158" font-family="Arial, sans-serif" font-size="10" fill="#fff8e1" text-anchor="middle">Default constructor called</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="10" fill="#fff8e1" text-anchor="middle">for each element</text>
    <text x="110" y="185" font-family="Courier New, monospace" font-size="9" fill="#fff8e1" text-anchor="middle">Student() { ... }</text>
  </g>

  <!-- Array Initialization -->
  <g data-narration="You can initialize array elements using an initializer list with parameterized constructors. Each element can be initialized with different values by providing constructor arguments in braces.">
    <rect x="220" y="120" width="180" height="70" rx="8" ry="8" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Array Initialization</text>
    <text x="310" y="158" font-family="Courier New, monospace" font-size="9" fill="#e1bee7" text-anchor="middle">Student arr[3] = {</text>
    <text x="310" y="171" font-family="Courier New, monospace" font-size="9" fill="#e1bee7" text-anchor="middle">  Student(1, "Alice"),</text>
    <text x="310" y="184" font-family="Courier New, monospace" font-size="9" fill="#e1bee7" text-anchor="middle">  Student(2, "Bob")</text>
  </g>

  <!-- Individual Object Access -->
  <g data-narration="Each element in the array can be accessed using the subscript operator with an index. You can call member functions on individual objects using the dot operator, just like regular objects.">
    <rect x="20" y="210" width="180" height="75" rx="8" ry="8" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Element Access</text>
    <text x="110" y="248" font-family="Courier New, monospace" font-size="10" fill="#ffcdd2" text-anchor="middle">students[0].setData();</text>
    <text x="110" y="262" font-family="Courier New, monospace" font-size="10" fill="#ffcdd2" text-anchor="middle">students[1].display();</text>
    <text x="110" y="276" font-family="Arial, sans-serif" font-size="9" fill="#ffcdd2" text-anchor="middle">Use subscript + dot operator</text>
  </g>

  <!-- Array Example -->
  <g data-narration="A complete example shows three Student objects in an array. Each object has independent data members like rollNo and name. You can iterate through the array using a loop to process all objects.">
    <rect x="220" y="210" width="180" height="75" rx="8" ry="8" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Complete Example</text>
    <rect x="235" y="242" width="55" height="35" rx="4" fill="#bbdefb" stroke="#1a237e" stroke-width="1"/>
    <text x="262" y="254" font-family="Arial, sans-serif" font-size="8" fill="#1a237e" text-anchor="middle">Student[0]</text>
    <text x="262" y="264" font-family="Arial, sans-serif" font-size="7" fill="#1a237e" text-anchor="middle">roll: 1</text>
    <text x="262" y="272" font-family="Arial, sans-serif" font-size="7" fill="#1a237e" text-anchor="middle">name: Alice</text>

    <rect x="295" y="242" width="55" height="35" rx="4" fill="#bbdefb" stroke="#1a237e" stroke-width="1"/>
    <text x="322" y="254" font-family="Arial, sans-serif" font-size="8" fill="#1a237e" text-anchor="middle">Student[1]</text>
    <text x="322" y="264" font-family="Arial, sans-serif" font-size="7" fill="#1a237e" text-anchor="middle">roll: 2</text>
    <text x="322" y="272" font-family="Arial, sans-serif" font-size="7" fill="#1a237e" text-anchor="middle">name: Bob</text>

    <rect x="355" y="242" width="35" height="35" rx="4" fill="#e3f2fd" stroke="#1a237e" stroke-width="1"/>
    <text x="372" y="254" font-family="Arial, sans-serif" font-size="7" fill="#1a237e" text-anchor="middle">[2]</text>
    <text x="372" y="264" font-family="Arial, sans-serif" font-size="7" fill="#1a237e" text-anchor="middle">default</text>
  </g>

  <!-- Dynamic Arrays -->
  <g data-narration="You can create dynamic arrays of objects using the new operator. Dynamic arrays are allocated on the heap and must be freed using delete[] to prevent memory leaks. The default constructor is called for each element.">
    <rect x="20" y="305" width="180" height="75" rx="8" ry="8" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="325" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Dynamic Arrays</text>
    <text x="110" y="343" font-family="Courier New, monospace" font-size="10" fill="#c8e6c9" text-anchor="middle">Student* arr;</text>
    <text x="110" y="357" font-family="Courier New, monospace" font-size="10" fill="#c8e6c9" text-anchor="middle">arr = new Student[5];</text>
    <text x="110" y="371" font-family="Courier New, monospace" font-size="10" fill="#c8e6c9" text-anchor="middle">delete[] arr;</text>
  </g>

  <!-- Key Points -->
  <g data-narration="Key points to remember: Arrays of objects require a default constructor unless all elements are explicitly initialized. Each element is a complete, independent object. Use delete[] for dynamic arrays, not just delete.">
    <rect x="220" y="305" width="180" height="75" rx="8" ry="8" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="325" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Key Points</text>
    <text x="310" y="343" font-family="Arial, sans-serif" font-size="9" fill="#fff8e1" text-anchor="middle">✓ Default constructor needed</text>
    <text x="310" y="357" font-family="Arial, sans-serif" font-size="9" fill="#fff8e1" text-anchor="middle">✓ Contiguous memory storage</text>
    <text x="310" y="371" font-family="Arial, sans-serif" font-size="9" fill="#fff8e1" text-anchor="middle">✓ Each element independent</text>
  </g>
</svg>