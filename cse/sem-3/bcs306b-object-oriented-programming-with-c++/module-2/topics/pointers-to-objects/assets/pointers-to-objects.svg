<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="pointers-to-objects">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1a237e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Pointers to Objects in C++</text>

  <!-- Declaration -->
  <g data-narration="In C++, a pointer to an object holds the memory address of that object. You declare it using ClassName asterisk pointer name, similar to basic type pointers but for class objects.">
    <rect x="20" y="40" width="180" height="60" rx="8" ry="8" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Pointer Declaration</text>
    <text x="110" y="78" font-family="Courier New, monospace" font-size="10" fill="#e0e0ff" text-anchor="middle">Box* ptr;</text>
    <text x="110" y="92" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Declares pointer to Box object</text>
  </g>

  <!-- Arrow Operator -->
  <g data-narration="The arrow operator, dash greater than, is used to access members through a pointer. It combines dereferencing and member access in one step. ptr arrow member is equivalent to star ptr dot member.">
    <rect x="220" y="40" width="180" height="60" rx="8" ry="8" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Arrow Operator (->)</text>
    <text x="310" y="78" font-family="Courier New, monospace" font-size="10" fill="#c8e6c9" text-anchor="middle">ptr->volume()</text>
    <text x="310" y="92" font-family="Arial, sans-serif" font-size="9" fill="#c8e6c9" text-anchor="middle">Access member via pointer</text>
  </g>

  <!-- Memory Diagram -->
  <g data-narration="When you create a pointer to an existing object, the pointer stores the memory address of that object. The ampersand operator gets the address, and the pointer then points to that location in memory.">
    <rect x="20" y="120" width="180" height="80" rx="8" ry="8" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Pointing to Object</text>
    <rect x="35" y="152" width="60" height="38" rx="4" fill="#e1bee7" stroke="#6a1b9a" stroke-width="1.5"/>
    <text x="65" y="167" font-family="Arial, sans-serif" font-size="9" fill="#4a148c" text-anchor="middle">Box b</text>
    <text x="65" y="179" font-family="Courier New, monospace" font-size="8" fill="#4a148c" text-anchor="middle">length:5</text>
    <text x="65" y="188" font-family="Courier New, monospace" font-size="8" fill="#4a148c" text-anchor="middle">width:3</text>

    <rect x="120" y="160" width="65" height="22" rx="4" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.5"/>
    <text x="152" y="174" font-family="Courier New, monospace" font-size="9" fill="#6a1b9a" text-anchor="middle">ptr = &b</text>

    <line x1="95" y1="171" x2="115" y2="171" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- Dynamic Allocation -->
  <g data-narration="The most common use of object pointers is dynamic allocation with new. This allocates memory on the heap and returns a pointer. The object must later be freed using delete to prevent memory leaks.">
    <rect x="220" y="120" width="180" height="80" rx="8" ry="8" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Dynamic Allocation</text>
    <text x="310" y="160" font-family="Courier New, monospace" font-size="10" fill="#fff8e1" text-anchor="middle">Box* p = new Box();</text>
    <text x="310" y="176" font-family="Arial, sans-serif" font-size="9" fill="#fff8e1" text-anchor="middle">Allocates on heap</text>
    <text x="310" y="190" font-family="Courier New, monospace" font-size="10" fill="#fff8e1" text-anchor="middle">delete p;</text>
  </g>

  <!-- Comparison -->
  <g data-narration="You can access object members using either the dot operator with the object directly, or the arrow operator with a pointer. Both achieve the same result but arrow is cleaner for pointers.">
    <rect x="20" y="220" width="180" height="75" rx="8" ry="8" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Access Comparison</text>
    <text x="110" y="260" font-family="Courier New, monospace" font-size="9" fill="#ffcdd2" text-anchor="middle">b.volume()</text>
    <text x="110" y="273" font-family="Arial, sans-serif" font-size="9" fill="#ffcdd2" text-anchor="middle">vs</text>
    <text x="110" y="286" font-family="Courier New, monospace" font-size="9" fill="#ffcdd2" text-anchor="middle">ptr->volume()</text>
  </g>

  <!-- Array of Pointers -->
  <g data-narration="You can create arrays of pointers to objects. Each element stores a pointer that can point to different objects. This is useful for collections of polymorphic objects or managing dynamic objects.">
    <rect x="220" y="220" width="180" height="75" rx="8" ry="8" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Array of Pointers</text>
    <text x="310" y="260" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff" text-anchor="middle">Shape* arr[3];</text>
    <text x="310" y="273" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff" text-anchor="middle">arr[0] = new Circle();</text>
    <text x="310" y="286" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff" text-anchor="middle">arr[1] = new Square();</text>
  </g>

  <!-- Equivalence -->
  <g data-narration="The arrow operator is syntactic sugar. ptr arrow member is exactly equivalent to parentheses star ptr closing parentheses dot member. Both dereference the pointer and access the member.">
    <rect x="20" y="315" width="180" height="65" rx="8" ry="8" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Equivalence</text>
    <text x="110" y="353" font-family="Courier New, monospace" font-size="10" fill="#c8e6c9" text-anchor="middle">ptr->func()</text>
    <text x="110" y="368" font-family="Arial, sans-serif" font-size="10" fill="#c8e6c9" text-anchor="middle">=</text>
    <text x="110" y="375" font-family="Courier New, monospace" font-size="9" fill="#c8e6c9" text-anchor="middle">(*ptr).func()</text>
  </g>

  <!-- Key Points -->
  <g data-narration="Key points: Use arrow operator for member access through pointers. Objects created with new must be deleted. Pointers enable dynamic memory management and polymorphism in C plus plus.">
    <rect x="220" y="315" width="180" height="65" rx="8" ry="8" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Key Points</text>
    <text x="310" y="353" font-family="Arial, sans-serif" font-size="9" fill="#e1bee7" text-anchor="middle">✓ Use -> for pointer access</text>
    <text x="310" y="367" font-family="Arial, sans-serif" font-size="9" fill="#e1bee7" text-anchor="middle">✓ new requires delete</text>
  </g>
</svg>