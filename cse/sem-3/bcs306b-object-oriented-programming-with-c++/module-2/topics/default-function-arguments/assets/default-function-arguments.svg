<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="default-function-arguments">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Default Function Arguments in C++</text>

  <!-- Section 1: Basic Syntax -->
  <g data-narration="C++ allows functions to have default arguments, which are values automatically used when the caller does not provide a corresponding argument. This feature reduces the need for multiple overloaded functions.">
    <rect x="20" y="45" width="180" height="110" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Default Argument Syntax</text>
    <rect x="30" y="75" width="160" height="70" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">void greet(string name,</text>
    <text x="110" y="103" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">  string greeting = "Hello") {</text>
    <text x="110" y="116" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">  cout &lt;&lt; greeting &lt;&lt; ", "</text>
    <text x="110" y="129" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">       &lt;&lt; name &lt;&lt; "!" &lt;&lt; endl;</text>
    <text x="110" y="142" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">}</text>
  </g>

  <!-- Section 2: Function Calls -->
  <g data-narration="When a function has default arguments, it can be called with or without providing those arguments. Missing arguments are automatically filled with their default values at compile time.">
    <rect x="220" y="45" width="180" height="110" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Calling with Defaults</text>
    <rect x="230" y="75" width="160" height="70" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">greet("Alice");</text>
    <text x="310" y="103" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">Output: Hello, Alice!</text>
    <text x="310" y="120" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">greet("Bob", "Good morning");</text>
    <text x="310" y="133" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">Output: Good morning, Bob!</text>
  </g>

  <!-- Section 3: Rightmost Rule -->
  <g data-narration="Default arguments must be rightmost in the parameter list. You cannot have a default parameter followed by a non-default parameter. This rule ensures unambiguous function calls.">
    <rect x="20" y="170" width="180" height="100" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Rightmost Rule</text>
    <rect x="30" y="200" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="215" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">// OK:</text>
    <text x="110" y="228" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">void f(int a, int b=10, int c=20);</text>
    <text x="110" y="243" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">// ERROR:</text>
    <text x="110" y="256" font-family="Courier New, monospace" font-size="8" fill="#ff9999" text-anchor="middle">void f(int a=5, int b, int c=20);</text>
  </g>

  <!-- Section 4: Declaration vs Definition -->
  <g data-narration="When a function is declared and defined separately, default values should appear in the declaration, not the definition. The compiler uses the declaration to resolve function calls.">
    <rect x="220" y="170" width="180" height="100" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Declaration vs Definition</text>
    <rect x="230" y="200" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="215" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">// Declaration (with defaults)</text>
    <text x="310" y="228" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">void display(int x, int y = 0);</text>
    <text x="310" y="243" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">// Definition (no defaults)</text>
    <text x="310" y="256" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">void display(int x, int y) {...}</text>
  </g>

  <!-- Section 5: Multiple Defaults -->
  <g data-narration="Functions can have multiple default arguments. Callers can specify as many or as few arguments as needed, and the compiler fills in the remaining defaults from right to left.">
    <rect x="20" y="285" width="180" height="100" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Multiple Defaults</text>
    <rect x="30" y="315" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="330" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">void box(int w=10, int h=5,</text>
    <text x="110" y="343" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">         char fill='*');</text>
    <text x="110" y="358" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">box();      // 10, 5, '*'</text>
    <text x="110" y="371" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">box(4, 3);  // 4, 3, '*'</text>
  </g>

  <!-- Section 6: Ambiguity Warning -->
  <g data-narration="Default arguments can cause ambiguity with function overloading. If two overloaded functions can match the same call due to default arguments, the compiler will report an error.">
    <rect x="220" y="285" width="180" height="100" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Ambiguity with Overloading</text>
    <rect x="230" y="315" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="330" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">void func(int a) {...}</text>
    <text x="310" y="343" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">void func(int a, int b=10) {...}</text>
    <text x="310" y="358" font-family="Courier New, monospace" font-size="8" fill="#ff9999" text-anchor="middle">func(5);  // ERROR: ambiguous!</text>
    <text x="310" y="371" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Matches both versions</text>
  </g>
</svg>
