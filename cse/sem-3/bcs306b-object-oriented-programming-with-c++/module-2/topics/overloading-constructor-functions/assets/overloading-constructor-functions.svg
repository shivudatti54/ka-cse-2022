<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="overloading-constructor-functions">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Overloading Constructor Functions</text>

  <!-- Section 1: What is Constructor Overloading -->
  <g data-narration="Constructor overloading allows a class to have multiple constructors with different parameter lists. This enables objects to be created and initialized in different ways depending on the arguments provided.">
    <rect x="20" y="45" width="180" height="110" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Constructor Overloading</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Multiple ways to initialize objects</text>
    <rect x="30" y="95" width="160" height="50" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="110" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Rectangle();</text>
    <text x="110" y="123" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">Rectangle(int side);</text>
    <text x="110" y="136" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">Rectangle(int l, int w);</text>
  </g>

  <!-- Section 2: Default Constructor -->
  <g data-narration="The default constructor takes no parameters and initializes objects with default values. It is called when an object is created without arguments.">
    <rect x="220" y="45" width="180" height="110" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Default Constructor</text>
    <rect x="230" y="75" width="160" height="70" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Rectangle() {</text>
    <text x="310" y="103" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">  length = 0;</text>
    <text x="310" y="116" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">  width = 0;</text>
    <text x="310" y="129" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">}</text>
    <text x="310" y="145" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Usage: Rectangle r1;</text>
  </g>

  <!-- Section 3: Parameterized Constructor -->
  <g data-narration="Parameterized constructors accept arguments to initialize objects with specific values. A single-parameter constructor can create a square, while a two-parameter version creates a custom rectangle.">
    <rect x="20" y="170" width="180" height="100" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Parameterized Constructor</text>
    <rect x="30" y="200" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="215" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Rectangle(int side) {</text>
    <text x="110" y="228" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">  length = width = side;</text>
    <text x="110" y="241" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">}</text>
    <text x="110" y="257" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Usage: Rectangle r2(5);</text>
  </g>

  <!-- Section 4: Constructor Resolution -->
  <g data-narration="The compiler selects the appropriate constructor based on the number and types of arguments provided during object creation. This is determined at compile time through function overloading resolution.">
    <rect x="220" y="170" width="180" height="100" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="190" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Constructor Resolution</text>
    <text x="310" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Compiler matches based on arguments:</text>
    <rect x="230" y="220" width="160" height="40" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="310" y="235" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">Rectangle r1;     // Default</text>
    <text x="310" y="248" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">Rectangle r2(5);  // One param</text>
    <text x="310" y="261" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">Rectangle r3(4,6); // Two params</text>
  </g>

  <!-- Section 5: Copy Constructor -->
  <g data-narration="The copy constructor is a special overloaded constructor that creates a new object as a copy of an existing object. It takes a const reference to another object of the same class.">
    <rect x="20" y="285" width="180" height="100" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Copy Constructor</text>
    <rect x="30" y="315" width="160" height="60" rx="5" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
    <text x="110" y="330" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Rectangle(const Rectangle&amp; r) {</text>
    <text x="110" y="343" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">  length = r.length;</text>
    <text x="110" y="356" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">  width = r.width;</text>
    <text x="110" y="369" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">}</text>
  </g>

  <!-- Section 6: Important Rule -->
  <g data-narration="When you define any constructor, the compiler no longer provides a default constructor automatically. Constructor overloading follows the same rules as function overloading, with parameters differing in number, type, or order.">
    <rect x="220" y="285" width="180" height="100" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Important Rule</text>
    <text x="310" y="325" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">If you define ANY constructor,</text>
    <text x="310" y="340" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">compiler won't provide default!</text>
    <rect x="230" y="350" width="160" height="25" rx="5" fill="#ffffff" fill-opacity="0.2"/>
    <text x="310" y="365" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Define default explicitly if needed</text>
  </g>
</svg>
