<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="the-general-form-of-a-cpp-program">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">C++ Program Structure</text>

  <!-- Header Section -->
  <g data-narration="The header section includes preprocessor directives like include statements for libraries, using namespace declarations, and function prototypes that define the interface of your program.">
    <rect x="20" y="45" width="380" height="55" rx="8" ry="8" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="30" y="63" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Header Section</text>
    <text x="30" y="78" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff">#include &lt;iostream&gt;</text>
    <text x="30" y="90" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff">using namespace std;</text>
    <text x="240" y="78" font-family="Courier New, monospace" font-size="9" fill="#ffffff">// Include libraries</text>
    <text x="240" y="90" font-family="Courier New, monospace" font-size="9" fill="#ffffff">// Namespace</text>
  </g>

  <!-- Arrow down -->
  <polygon points="210,105 215,115 205,115" fill="#1a237e"/>
  <line x1="210" y1="102" x2="210" y2="115" stroke="#1a237e" stroke-width="2"/>

  <!-- Global Declarations -->
  <g data-narration="Global declarations include global variables and function prototypes. Global variables are accessible throughout the program, while function prototypes declare functions that will be defined later.">
    <rect x="20" y="120" width="380" height="50" rx="8" ry="8" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="30" y="138" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Global Declarations</text>
    <text x="30" y="153" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff">int count = 0;</text>
    <text x="30" y="165" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff">void display();</text>
    <text x="200" y="153" font-family="Courier New, monospace" font-size="9" fill="#ffffff">// Global variables</text>
    <text x="200" y="165" font-family="Courier New, monospace" font-size="9" fill="#ffffff">// Function prototypes</text>
  </g>

  <!-- Arrow down -->
  <polygon points="210,175 215,185 205,185" fill="#1a237e"/>
  <line x1="210" y1="172" x2="210" y2="185" stroke="#1a237e" stroke-width="2"/>

  <!-- Main Function -->
  <g data-narration="The main function is the entry point of every C++ program. Execution begins here. It can take command-line arguments, contains the program logic, and returns an integer value to the operating system.">
    <rect x="20" y="190" width="380" height="75" rx="8" ry="8" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="30" y="208" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Main Function (Entry Point)</text>
    <text x="30" y="223" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff">int main() {</text>
    <text x="40" y="237" font-family="Courier New, monospace" font-size="9" fill="#ffffff">  // Variable declarations</text>
    <text x="40" y="249" font-family="Courier New, monospace" font-size="9" fill="#ffffff">  // Program logic</text>
    <text x="40" y="261" font-family="Courier New, monospace" font-size="9" fill="#ffffff">  return 0;</text>
    <text x="30" y="273" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff">}</text>
  </g>

  <!-- Arrow down -->
  <polygon points="210,270 215,280 205,280" fill="#1a237e"/>
  <line x1="210" y1="267" x2="210" y2="280" stroke="#1a237e" stroke-width="2"/>

  <!-- Function Definitions -->
  <g data-narration="Function definitions contain the actual implementation of functions declared earlier. They include the function body with statements that define what the function does when called.">
    <rect x="20" y="285" width="380" height="65" rx="8" ry="8" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="30" y="303" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Function Definitions</text>
    <text x="30" y="318" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff">void display() {</text>
    <text x="40" y="332" font-family="Courier New, monospace" font-size="9" fill="#ffffff">  cout &lt;&lt; "Hello" &lt;&lt; endl;</text>
    <text x="30" y="345" font-family="Courier New, monospace" font-size="9" fill="#e0e0ff">}</text>
  </g>

  <!-- Execution Flow -->
  <g data-narration="The execution flow of a C++ program starts from the main function, which can call other functions as needed. The program terminates when main returns, typically with a status code of 0 for success.">
    <rect x="20" y="360" width="180" height="30" rx="5" ry="5" fill="url(#redGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="378" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Execution: main() first</text>

    <rect x="220" y="360" width="180" height="30" rx="5" ry="5" fill="url(#redGrad)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="310" y="378" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Return: 0 = Success</text>
  </g>
</svg>
