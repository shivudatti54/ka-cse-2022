<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="friend-classes">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Friend Classes in C++</text>

  <!-- Friend Class Declaration -->
  <g data-narration="A friend class is a class that has been granted permission to access the private and protected members of another class. When Class A declares Class B as friend, all member functions of Class B can access private members of Class A.">
    <rect x="20" y="45" width="180" height="100" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Class A</text>

    <rect x="35" y="75" width="150" height="60" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="110" y="90" font-family="Courier New, monospace" font-size="9" fill="#ffffff" text-anchor="middle">class ClassA {</text>
    <text x="110" y="102" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">private:</text>
    <text x="110" y="114" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">  int data;</text>
    <text x="110" y="126" font-family="Courier New, monospace" font-size="8" fill="#ffa726" text-anchor="middle">  friend class ClassB;</text>
    <text x="110" y="138" font-family="Courier New, monospace" font-size="9" fill="#ffffff" text-anchor="middle">};</text>
  </g>

  <!-- Friend Class B -->
  <g data-narration="The friend class can access all private and protected members of the granting class. All member functions of the friend class have access rights, not just specific ones.">
    <rect x="220" y="45" width="180" height="100" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Class B (Friend)</text>

    <rect x="235" y="75" width="150" height="60" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="310" y="90" font-family="Courier New, monospace" font-size="9" fill="#ffffff" text-anchor="middle">class ClassB {</text>
    <text x="310" y="102" font-family="Courier New, monospace" font-size="8" fill="#e0e0ff" text-anchor="middle">public:</text>
    <text x="310" y="114" font-family="Courier New, monospace" font-size="8" fill="#ffa726" text-anchor="middle">  void access(ClassA&amp; a)</text>
    <text x="310" y="126" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">  { a.data = 10; }</text>
    <text x="310" y="138" font-family="Courier New, monospace" font-size="9" fill="#ffffff" text-anchor="middle">};</text>
  </g>

  <!-- Access Arrow -->
  <line x1="200" y1="95" x2="220" y2="95" stroke="#ffa726" stroke-width="3"/>
  <polygon points="220,92 230,95 220,98" fill="#ffa726"/>

  <!-- Friendship is Not Mutual -->
  <g data-narration="Friendship is not mutual. If Class A declares Class B as friend, B can access A's private members. However, A cannot access B's private members unless B also declares A as friend.">
    <rect x="20" y="160" width="120" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="80" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Not Mutual</text>
    <text x="80" y="198" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">A → B friend</text>
    <text x="80" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">A ← B not friend</text>
    <text x="80" y="222" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">(unless declared)</text>
  </g>

  <!-- Friendship is Not Inherited -->
  <g data-narration="Friendship is not inherited. If Class A declares Class B as friend, classes derived from Class B do not automatically become friends of Class A. Each class must be explicitly declared as friend.">
    <rect x="150" y="160" width="120" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Not Inherited</text>
    <text x="210" y="198" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">B is friend of A</text>
    <text x="210" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Derived(B) ≠ friend</text>
    <text x="210" y="222" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">Must declare again</text>
  </g>

  <!-- Friendship is Not Transitive -->
  <g data-narration="Friendship is not transitive. If Class A is friend of Class B, and Class B is friend of Class C, it does not mean Class A is friend of Class C. Friendship must be explicitly declared.">
    <rect x="280" y="160" width="120" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="340" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Not Transitive</text>
    <text x="340" y="198" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">A friend of B</text>
    <text x="340" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">B friend of C</text>
    <text x="340" y="222" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">A ≠ friend of C</text>
  </g>

  <!-- Use Cases -->
  <g data-narration="Friend classes are useful when two classes are tightly coupled and need to share implementation details, such as container and iterator classes, factory patterns, or manager classes that need access to internal state.">
    <rect x="20" y="245" width="380" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Common Use Cases</text>

    <text x="30" y="285" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Tightly coupled classes</text>
    <text x="30" y="299" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Factory pattern</text>
    <text x="30" y="313" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Iterator classes</text>

    <text x="230" y="285" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Manager/helper classes</text>
    <text x="230" y="299" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Testing classes</text>
    <text x="230" y="313" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Private constructor access</text>
  </g>

  <!-- Example -->
  <g data-narration="Here is a practical example: A LinkedList class declares ListPrinter as friend. The ListPrinter can access the private head pointer and size of LinkedList to print all elements without breaking encapsulation.">
    <rect x="20" y="330" width="380" height="60" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Example: LinkedList &amp; ListPrinter</text>

    <text x="30" y="368" font-family="Courier New, monospace" font-size="8" fill="#ffffff">friend class ListPrinter;</text>
    <text x="30" y="380" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff">ListPrinter can access private head and size</text>
  </g>
</svg>
