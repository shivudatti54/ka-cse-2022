<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="parameterized-constructors">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Parameterized Constructors</text>

  <g data-narration="A parameterized constructor is a constructor that takes one or more arguments. It allows you to initialize an object with specific values at the time of creation, rather than using default values.">
    <rect x="20" y="45" width="180" height="85" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Parameterized</text>
    <rect x="35" y="75" width="150" height="45" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="110" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Rectangle(int l, int b)</text>
    <text x="110" y="102" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">{</text>
    <text x="110" y="114" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">  length = l;</text>
    <text x="110" y="125" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">}</text>
  </g>

  <g data-narration="Objects can be created using parameterized constructors in two ways: implicit call using parentheses, or explicit call using the class name and parentheses with arguments.">
    <rect x="220" y="45" width="180" height="85" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Object Creation</text>
    <rect x="235" y="75" width="150" height="45" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="310" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Rectangle r1(10, 5);</text>
    <text x="310" y="102" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">or</text>
    <text x="310" y="114" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Rectangle r2 =</text>
    <text x="310" y="125" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">  Rectangle(7, 3);</text>
  </g>

  <g data-narration="Constructor overloading allows you to define multiple constructors with different parameter lists. The compiler selects the appropriate constructor based on the arguments provided during object creation.">
    <rect x="20" y="145" width="380" height="85" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="165" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Constructor Overloading</text>
    <rect x="35" y="175" width="350" height="45" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="210" y="190" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Box() { ... }                    // Default</text>
    <text x="210" y="202" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Box(double s) { ... }            // Cube</text>
    <text x="210" y="214" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Box(double l, double b, double h) { ... } // Cuboid</text>
  </g>

  <g data-narration="Default arguments in constructors allow you to specify default values for parameters. If an argument is not provided when creating an object, the default value is used automatically.">
    <rect x="20" y="245" width="180" height="80" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Default Arguments</text>
    <rect x="35" y="275" width="150" height="40" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="110" y="290" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Student(string n,</text>
    <text x="110" y="302" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">  int a = 18,</text>
    <text x="110" y="313" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">  string b = "CSE")</text>
  </g>

  <g data-narration="The initializer list provides an efficient way to initialize data members. It is placed after a colon following the constructor parameter list and directly initializes members before the constructor body executes.">
    <rect x="220" y="245" width="180" height="80" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Initializer List</text>
    <rect x="235" y="275" width="150" height="40" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="310" y="290" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">Point(int xVal,</text>
    <text x="310" y="302" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">      int yVal)</text>
    <text x="310" y="313" font-family="Courier New, monospace" font-size="8" fill="#ffa726" text-anchor="middle">  : x(xVal), y(yVal) {}</text>
  </g>

  <g data-narration="Key points: Parameterized constructors enable object initialization with specific values, support overloading for flexibility, can have default arguments from right to left, and use initializer lists for efficiency.">
    <rect x="20" y="340" width="380" height="50" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="358" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Key Points</text>
    <text x="30" y="373" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">• Initialize with specific values</text>
    <text x="30" y="385" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">• Support overloading</text>
    <text x="230" y="373" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">• Default args: right to left</text>
    <text x="230" y="385" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">• Use initializer list</text>
  </g>
</svg>
