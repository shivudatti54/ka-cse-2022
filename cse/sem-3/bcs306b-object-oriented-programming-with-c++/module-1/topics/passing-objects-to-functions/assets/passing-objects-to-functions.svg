<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="passing-objects-to-functions">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#2c5aa0"/></linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#50c878"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/></linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#6a1b9a"/></linearGradient>
  </defs>
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Passing Objects to Functions</text>
  <g data-narration="Pass by value creates a copy of the entire object. Changes made inside the function do not affect the original object. This is safe but inefficient for large objects.">
    <rect x="20" y="45" width="120" height="90" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">By Value</text>
    <rect x="30" y="75" width="100" height="50" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="80" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">func(obj)</text>
    <text x="80" y="103" font-family="Arial, sans-serif" font-size="7" fill="#e0e0ff" text-anchor="middle">Copy created</text>
    <text x="80" y="114" font-family="Arial, sans-serif" font-size="7" fill="#e0e0ff" text-anchor="middle">Original safe</text>
    <text x="80" y="125" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">Inefficient</text>
  </g>
  <g data-narration="Pass by reference provides access to the original object without copying. Changes made inside the function affect the original. This is efficient but less safe.">
    <rect x="150" y="45" width="120" height="90" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">By Reference</text>
    <rect x="160" y="75" width="100" height="50" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="210" y="90" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">func(obj&amp;)</text>
    <text x="210" y="103" font-family="Arial, sans-serif" font-size="7" fill="#e0e0ff" text-anchor="middle">No copy</text>
    <text x="210" y="114" font-family="Arial, sans-serif" font-size="7" fill="#ffa726" text-anchor="middle">Can modify</text>
    <text x="210" y="125" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">Efficient</text>
  </g>
  <g data-narration="Pass by const reference combines efficiency with safety. No copy is made, but the object cannot be modified. This is the preferred method for large read-only objects.">
    <rect x="280" y="45" width="120" height="90" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="340" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">By Const Ref</text>
    <rect x="290" y="70" width="100" height="55" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="340" y="83" font-family="Courier New, monospace" font-size="7" fill="#ffffff" text-anchor="middle">func(const obj&amp;)</text>
    <text x="340" y="94" font-family="Arial, sans-serif" font-size="7" fill="#e0e0ff" text-anchor="middle">No copy</text>
    <text x="340" y="105" font-family="Arial, sans-serif" font-size="7" fill="#e0e0ff" text-anchor="middle">Cannot modify</text>
    <text x="340" y="116" font-family="Arial, sans-serif" font-size="7" fill="#50c878" text-anchor="middle">Best for large</text>
    <text x="340" y="125" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">read-only</text>
  </g>
  <g data-narration="Comparison table shows key differences: by value copies the object and is safe but slow for large objects, by reference is fast and can modify original, and const reference is fast and safe for read-only access.">
    <rect x="20" y="150" width="380" height="100" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="170" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Comparison</text>
    <rect x="35" y="180" width="350" height="60" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="40" y="195" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a237e">Method</text>
    <text x="145" y="195" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a237e">Copy?</text>
    <text x="220" y="195" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a237e">Modify?</text>
    <text x="310" y="195" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a237e">Speed</text>
    <text x="40" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">By Value</text>
    <text x="145" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Yes</text>
    <text x="220" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">No</text>
    <text x="310" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Slow</text>
    <text x="40" y="223" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">By Ref</text>
    <text x="145" y="223" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">No</text>
    <text x="220" y="223" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Yes</text>
    <text x="310" y="223" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Fast</text>
    <text x="40" y="236" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Const Ref</text>
    <text x="145" y="236" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">No</text>
    <text x="220" y="236" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">No</text>
    <text x="310" y="236" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">Fast</text>
  </g>
  <g data-narration="Best practices: use pass by value for small objects under 16 bytes, pass by const reference for large read-only objects, pass by reference for large objects you need to modify, and avoid pass by pointer in modern C++.">
    <rect x="20" y="265" width="380" height="120" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="285" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Best Practices</text>
    <rect x="35" y="295" width="350" height="80" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="210" y="310" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Small objects: Pass by value</text>
    <text x="210" y="325" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Large read-only: Pass by const reference</text>
    <text x="210" y="340" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Large modifiable: Pass by reference</text>
    <text x="210" y="355" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Optional objects: Pass by pointer</text>
    <text x="210" y="370" font-family="Arial, sans-serif" font-size="9" fill="#ffa726" text-anchor="middle">Modern C++: Prefer references</text>
  </g>
</svg>
