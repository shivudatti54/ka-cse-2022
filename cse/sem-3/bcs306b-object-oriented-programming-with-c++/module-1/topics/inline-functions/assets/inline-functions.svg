<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="inline-functions">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">Inline Functions in C++</text>

  <!-- Normal Function Call -->
  <g data-narration="A normal function call involves overhead: saving state, pushing arguments onto the stack, jumping to the function, executing it, and returning. This overhead can be significant for small functions called frequently.">
    <rect x="20" y="45" width="180" height="95" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Normal Function</text>

    <rect x="35" y="75" width="150" height="55" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="110" y="88" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">result = add(5, 3);</text>
    <text x="110" y="103" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">1. Push arguments</text>
    <text x="110" y="115" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">2. Jump to function</text>
    <text x="110" y="127" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">3. Return value</text>
  </g>

  <!-- Inline Function Call -->
  <g data-narration="An inline function replaces the function call with the actual function body at compile time. The compiler inserts the code directly where the function is called, eliminating the call overhead.">
    <rect x="220" y="45" width="180" height="95" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Inline Function</text>

    <rect x="235" y="75" width="150" height="55" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <text x="310" y="88" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">inline int add(int a,</text>
    <text x="310" y="98" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">  int b) { return a+b; }</text>
    <text x="310" y="113" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">Compiler expands to:</text>
    <text x="310" y="125" font-family="Courier New, monospace" font-size="8" fill="#ffa726" text-anchor="middle">result = 5 + 3;</text>
  </g>

  <!-- Advantages -->
  <g data-narration="Inline functions offer several advantages: no function call overhead, faster execution for small functions, full type checking unlike macros, and debugging support. They are ideal for simple, frequently called functions.">
    <rect x="20" y="155" width="180" height="90" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="175" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Advantages</text>

    <text x="30" y="193" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• No call overhead</text>
    <text x="30" y="207" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Faster execution</text>
    <text x="30" y="221" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Type safe (vs macros)</text>
    <text x="30" y="235" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Debuggable</text>
  </g>

  <!-- Disadvantages -->
  <g data-narration="Inline functions have disadvantages: code bloat if large functions are inlined at many call sites, increased compilation time, and potential cache performance issues. The inline keyword is only a suggestion to the compiler.">
    <rect x="220" y="155" width="180" height="90" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="175" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Disadvantages</text>

    <text x="230" y="193" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Code bloat</text>
    <text x="230" y="207" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Larger executable</text>
    <text x="230" y="221" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• More compile time</text>
    <text x="230" y="235" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Only a suggestion</text>
  </g>

  <!-- When to Use -->
  <g data-narration="Use inline functions for small functions with one to three lines of code, frequently called functions in performance-critical sections, simple accessor and mutator functions in classes, and functions without loops or complex logic.">
    <rect x="20" y="260" width="380" height="60" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="280" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">When to Use Inline</text>

    <text x="30" y="298" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Small functions (1-3 lines)</text>
    <text x="30" y="312" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Frequently called</text>

    <text x="230" y="298" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Getters/Setters</text>
    <text x="230" y="312" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">• Simple calculations</text>
  </g>

  <!-- Implicit Inline -->
  <g data-narration="Member functions defined inside the class body are implicitly inline. You can also explicitly declare functions as inline when defining them outside the class using the inline keyword and scope resolution operator.">
    <rect x="20" y="335" width="180" height="55" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="353" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Implicit Inline</text>

    <text x="110" y="368" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">class C { int f() {...} };</text>
    <text x="110" y="381" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">Auto inline</text>
  </g>

  <!-- Explicit Inline -->
  <g data-narration="For explicit inline declaration outside the class, use the inline keyword before the return type and the scope resolution operator to specify the class name. This tells the compiler to attempt inlining this function.">
    <rect x="220" y="335" width="180" height="55" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="353" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Explicit Inline</text>

    <text x="310" y="368" font-family="Courier New, monospace" font-size="8" fill="#ffffff" text-anchor="middle">inline int C::f() {...}</text>
    <text x="310" y="381" font-family="Arial, sans-serif" font-size="8" fill="#e0e0ff" text-anchor="middle">Outside class</text>
  </g>
</svg>
