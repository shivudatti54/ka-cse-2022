<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="inheritance-and-protected-members">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a237e" text-anchor="middle">Protected Members</text>

  <!-- Protected Definition -->
  <g data-narration="Protected members are accessible within the class and all derived classes, but not from outside the class hierarchy">
    <rect x="20" y="45" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Protected Access</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Accessible in class</text>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Accessible in derived</text>
    <text x="110" y="108" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Not accessible outside</text>
  </g>

  <!-- vs Private -->
  <g data-narration="Protected versus private: private is hidden from everyone, protected is visible to derived classes but hidden from outside">
    <rect x="220" y="45" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Protected vs Private</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Private: hidden from all</text>
    <text x="310" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Protected: visible to</text>
    <text x="310" y="108" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">derived classes only</text>
  </g>

  <!-- Hierarchy Propagation -->
  <g data-narration="Protected members propagate through entire inheritance chain with public or protected inheritance, accessible at all levels">
    <rect x="20" y="135" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Multi-Level Access</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">GrandParent → Parent</text>
    <text x="110" y="185" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Parent → Child</text>
    <text x="110" y="198" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">All access protected data</text>
  </g>

  <!-- Protected Inheritance -->
  <g data-narration="Protected inheritance makes public base members protected in derived class, preventing external access while allowing derived access">
    <rect x="220" y="135" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Protected Inheritance</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">public → protected</text>
    <text x="310" y="185" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">protected → protected</text>
    <text x="310" y="198" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Restricts external access</text>
  </g>

  <!-- When to Use -->
  <g data-narration="Use protected members when derived classes need direct access to base data, for helper functions, or template method pattern">
    <rect x="20" y="225" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">When to Use</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Data needed by derived</text>
    <text x="110" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Helper functions</text>
    <text x="110" y="288" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Template method pattern</text>
  </g>

  <!-- Protected Constructors -->
  <g data-narration="Protected constructors prevent direct instantiation but allow inheritance, useful for abstract base classes">
    <rect x="220" y="225" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Protected Constructor</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Prevents direct creation</text>
    <text x="310" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Allows inheritance</text>
    <text x="310" y="288" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Abstract base pattern</text>
  </g>

  <!-- Example -->
  <g data-narration="Example: Base class Animal with protected age member accessible in derived Dog class but not from outside objects">
    <rect x="70" y="315" width="280" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Example: Animal Hierarchy</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">class Animal { protected: int age; };</text>
    <text x="210" y="365" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">class Dog : public Animal {</text>
    <text x="210" y="378" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">  void show() { cout &lt;&lt; age; } //OK</text>
  </g>
</svg>
