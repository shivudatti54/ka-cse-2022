<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="overloading-new-and-delete">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a237e" text-anchor="middle">Overloading new and delete in C++</text>

  <!-- Section 1: operator new Signature -->
  <g data-narration="Operator new must return void pointer and take size_t as first parameter. It's implicitly static because it's called before the object exists. Must throw bad_alloc if allocation fails.">
    <rect x="10" y="35" width="195" height="85" rx="8" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2" opacity="0.9"/>
    <text x="107" y="52" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">operator new Signature</text>
    <text x="107" y="70" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">static void* operator new(</text>
    <text x="107" y="82" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">  size_t size</text>
    <text x="107" y="94" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">);</text>
    <text x="107" y="110" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Returns: void* | Throws: bad_alloc</text>
  </g>

  <!-- Section 2: operator delete Signature -->
  <g data-narration="Operator delete must return void and take void pointer as first parameter. Also implicitly static because it's called after object destruction. Should be noexcept for safety.">
    <rect x="215" y="35" width="195" height="85" rx="8" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2" opacity="0.9"/>
    <text x="312" y="52" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">operator delete Signature</text>
    <text x="312" y="70" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">static void operator delete(</text>
    <text x="312" y="82" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">  void* ptr</text>
    <text x="312" y="94" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">) noexcept;</text>
    <text x="312" y="110" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Returns: void | Should not throw</text>
  </g>

  <!-- Section 3: Class-Specific Overloading -->
  <g data-narration="When overloaded inside a class, new and delete operators apply only to that specific class type. These become member functions but are implicitly static, so they can't access instance members.">
    <rect x="10" y="130" width="195" height="90" rx="8" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2" opacity="0.9"/>
    <text x="107" y="147" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Class-Specific Overload</text>
    <text x="107" y="165" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">class MyClass {</text>
    <text x="107" y="177" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">  void* operator new(size_t);</text>
    <text x="107" y="189" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">  void operator delete(void*);</text>
    <text x="107" y="201" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">};</text>
    <text x="107" y="214" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Applies only to MyClass objects</text>
  </g>

  <!-- Section 4: Global Overloading -->
  <g data-narration="Global overloading affects all dynamic memory allocations in the entire program. Declared outside any class scope. Useful for program-wide memory tracking or custom allocators.">
    <rect x="215" y="130" width="195" height="90" rx="8" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2" opacity="0.9"/>
    <text x="312" y="147" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Global Overload</text>
    <text x="312" y="165" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">void* operator new(size_t sz) {</text>
    <text x="312" y="177" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">  return malloc(sz);</text>
    <text x="312" y="189" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">}</text>
    <text x="312" y="203" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Affects ALL allocations</text>
    <text x="312" y="214" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Class-specific takes precedence</text>
  </g>

  <!-- Section 5: Memory Tracking Example -->
  <g data-narration="Practical example showing memory tracking with static allocation counter. Operator new increments counter when allocating, operator delete decrements when freeing. Uses malloc and free internally.">
    <rect x="10" y="230" width="400" height="85" rx="8" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2" opacity="0.9"/>
    <text x="210" y="247" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Memory Tracking Example</text>
    <text x="210" y="263" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">void* operator new(size_t sz) {</text>
    <text x="210" y="275" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">  allocCount++; cout &lt;&lt; "Allocation #" &lt;&lt; allocCount;</text>
    <text x="210" y="287" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">  return malloc(sz);</text>
    <text x="210" y="299" font-family="Courier New, monospace" font-size="8.5" fill="#e8f4f8" text-anchor="middle">}</text>
    <text x="210" y="311" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">Track allocations with static counter</text>
  </g>

  <!-- Section 6: Key Points -->
  <g data-narration="Important points: new allocates memory then constructor runs. Delete calls destructor then frees memory. Both are implicitly static. Array versions new bracket and delete bracket are overloaded separately from single object versions.">
    <rect x="10" y="325" width="400" height="65" rx="8" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2" opacity="0.9"/>
    <text x="210" y="342" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Key Points</text>
    <text x="210" y="357" font-family="Arial, sans-serif" font-size="9" fill="#e8f4f8" text-anchor="middle">• Order: new→Constructor | Destructor→delete</text>
    <text x="210" y="370" font-family="Arial, sans-serif" font-size="9" fill="#e8f4f8" text-anchor="middle">• Both are implicitly static member functions</text>
    <text x="210" y="383" font-family="Arial, sans-serif" font-size="9" fill="#e8f4f8" text-anchor="middle">• Array versions (new[], delete[]) overloaded separately</text>
  </g>
</svg>
