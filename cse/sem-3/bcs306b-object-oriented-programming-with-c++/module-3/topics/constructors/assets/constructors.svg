<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="constructors">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a237e" text-anchor="middle">Constructors in Inheritance</text>

  <!-- Default Constructor -->
  <g data-narration="Default constructor takes no parameters, automatically provided by compiler if no constructor is defined">
    <rect x="20" y="45" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Default Constructor</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">No parameters</text>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Student() { }</text>
    <text x="110" y="108" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Initializes to default values</text>
  </g>

  <!-- Parameterized Constructor -->
  <g data-narration="Parameterized constructor takes arguments to initialize object with specific values">
    <rect x="220" y="45" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Parameterized</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Takes parameters</text>
    <text x="310" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Student(string n, int a)</text>
    <text x="310" y="108" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Custom initialization</text>
  </g>

  <!-- Copy Constructor -->
  <g data-narration="Copy constructor creates new object as copy of existing object, takes const reference parameter">
    <rect x="20" y="135" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Copy Constructor</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Copy existing object</text>
    <text x="110" y="185" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Student(const Student&amp;)</text>
    <text x="110" y="198" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Deep vs shallow copy</text>
  </g>

  <!-- Initializer List -->
  <g data-narration="Initializer list efficiently initializes members before constructor body executes, required for const members and references">
    <rect x="220" y="135" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Initializer List</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Constructor() : x(val) { }</text>
    <text x="310" y="185" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Required for const/ref</text>
    <text x="310" y="198" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">More efficient</text>
  </g>

  <!-- Constructor in Inheritance -->
  <g data-narration="In inheritance, base constructor is called first, then derived constructor, use initializer list to pass arguments to base">
    <rect x="20" y="225" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Inheritance Order</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Base constructor first</text>
    <text x="110" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Then derived constructor</text>
    <text x="110" y="288" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Top-down construction</text>
  </g>

  <!-- Base Initialization -->
  <g data-narration="Derived class must explicitly initialize base class using initializer list with base class constructor">
    <rect x="220" y="225" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Base Initialization</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Derived(args) :</text>
    <text x="310" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">  Base(base_args) { }</text>
    <text x="310" y="288" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Pass args to base</text>
  </g>

  <!-- Example -->
  <g data-narration="Example: Student derived from Person, passes name and age to Person constructor in initializer list">
    <rect x="70" y="315" width="280" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Example: Student from Person</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Student(string n, int a, int id) :</text>
    <text x="210" y="365" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">  Person(n, a), studentId(id) {</text>
    <text x="210" y="378" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">  cout &lt;&lt; "Student created"; }</text>
  </g>
</svg>
