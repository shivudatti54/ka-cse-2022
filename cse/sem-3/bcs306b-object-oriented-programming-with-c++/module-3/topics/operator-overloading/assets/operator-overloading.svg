<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="operator-overloading">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a237e" text-anchor="middle">Operator Overloading in C++</text>

  <!-- Operator Overloading Concept -->
  <g data-narration="Operator overloading allows you to redefine operators for user-defined types, making objects behave like built-in types">
    <rect x="20" y="45" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Concept</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Redefine operator behavior</text>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">for custom classes</text>
    <text x="110" y="108" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Complex c3 = c1 + c2;</text>
  </g>

  <!-- Member Function -->
  <g data-narration="Member function overloading: the left operand becomes the invoking object using this pointer">
    <rect x="220" y="45" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Member Function</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Left operand = this</text>
    <text x="310" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Right operand = parameter</text>
    <text x="310" y="108" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">operator+(const T&amp;)</text>
  </g>

  <!-- Friend Function -->
  <g data-narration="Friend function overloading: both operands are passed as parameters, useful when left operand is not a class object">
    <rect x="20" y="135" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Friend Function</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Both operands as params</text>
    <text x="110" y="185" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Required for &lt;&lt; and &gt;&gt;</text>
    <text x="110" y="198" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">friend T operator+(T, T)</text>
  </g>

  <!-- Overloadable Operators -->
  <g data-narration="Most C++ operators can be overloaded including arithmetic, relational, logical, and assignment operators">
    <rect x="220" y="135" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Overloadable Operators</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">+ - * / % == != &lt; &gt;</text>
    <text x="310" y="185" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">++ -- [] () -&gt; new delete</text>
    <text x="310" y="198" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">&lt;&lt; &gt;&gt; += -= *= /=</text>
  </g>

  <!-- Cannot Overload -->
  <g data-narration="Some operators cannot be overloaded: scope resolution, member access, ternary, sizeof, and typeid">
    <rect x="20" y="225" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Cannot Overload</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">:: (scope resolution)</text>
    <text x="110" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">. (member access)</text>
    <text x="110" y="288" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">.* ?: sizeof typeid</text>
  </g>

  <!-- Best Practices -->
  <g data-narration="Follow best practices: preserve original semantics, return by value for arithmetic, return reference for assignment, and handle self-assignment">
    <rect x="220" y="225" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Best Practices</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Preserve original semantics</text>
    <text x="310" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Return *this for =, +=, etc</text>
    <text x="310" y="288" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Handle self-assignment</text>
  </g>

  <!-- Example Flow -->
  <g data-narration="Example: Complex c3 = c1 + c2 calls c1.operator+(c2) for member function or operator+(c1, c2) for friend function">
    <rect x="70" y="315" width="280" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Example: Complex Addition</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Complex c3 = c1 + c2;</text>
    <text x="210" y="365" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Member: c1.operator+(c2)</text>
    <text x="210" y="378" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Friend: operator+(c1, c2)</text>
  </g>
</svg>