<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="virtual-base-classes">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d32f2f"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="210" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a237e" text-anchor="middle">Virtual Base Classes</text>

  <!-- Diamond Problem -->
  <g data-narration="Diamond problem occurs when derived class inherits same base through two paths, causing ambiguity and duplicate data">
    <rect x="20" y="45" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Diamond Problem</text>
    <text x="110" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Two paths to base</text>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Duplicate base copies</text>
    <text x="110" y="108" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Ambiguous access</text>
  </g>

  <!-- Virtual Inheritance -->
  <g data-narration="Virtual inheritance solution: use virtual keyword when inheriting, ensures only one shared copy of base class">
    <rect x="220" y="45" width="180" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Virtual Inheritance</text>
    <text x="310" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">class D : virtual public B</text>
    <text x="310" y="95" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Single shared base copy</text>
    <text x="310" y="108" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">No ambiguity</text>
  </g>

  <!-- Syntax -->
  <g data-narration="Syntax: place virtual keyword in intermediate classes, not in final derived class, ensures shared base">
    <rect x="20" y="135" width="180" height="70" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Syntax</text>
    <text x="110" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Student : virtual public Person</text>
    <text x="110" y="185" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Employee : virtual public Person</text>
    <text x="110" y="198" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">TA : Student, Employee</text>
  </g>

  <!-- Constructor Rule -->
  <g data-narration="Most derived class must initialize virtual base directly in its constructor initializer list, intermediate constructors bypassed">
    <rect x="220" y="135" width="180" height="70" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Constructor Rule</text>
    <text x="310" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Most derived initializes</text>
    <text x="310" y="185" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">virtual base directly</text>
    <text x="310" y="198" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">TA() : Person(...) { }</text>
  </g>

  <!-- Benefits -->
  <g data-narration="Benefits: eliminates ambiguity, saves memory with single base copy, allows direct member access without scope resolution">
    <rect x="20" y="225" width="180" height="70" rx="10" ry="10" fill="url(#redGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Benefits</text>
    <text x="110" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">No ambiguity</text>
    <text x="110" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Memory efficient</text>
    <text x="110" y="288" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Single base instance</text>
  </g>

  <!-- When to Use -->
  <g data-narration="Use virtual inheritance only when diamond structure exists, introduces overhead so avoid unless necessary">
    <rect x="220" y="225" width="180" height="70" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="310" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">When to Use</text>
    <text x="310" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Only for diamond</text>
    <text x="310" y="275" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Avoid if not needed</text>
    <text x="310" y="288" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Has overhead</text>
  </g>

  <!-- Example -->
  <g data-narration="Example: TA class inherits from Student and Employee, both virtually inherit from Person, resulting in single Person instance">
    <rect x="70" y="315" width="280" height="70" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="210" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Example: TA Hierarchy</text>
    <text x="210" y="352" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Person (name, age) ← virtual base</text>
    <text x="210" y="365" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">Student, Employee inherit virtual</text>
    <text x="210" y="378" font-family="Arial, sans-serif" font-size="9" fill="#e0e0ff" text-anchor="middle">TA has one Person instance</text>
  </g>
</svg>
