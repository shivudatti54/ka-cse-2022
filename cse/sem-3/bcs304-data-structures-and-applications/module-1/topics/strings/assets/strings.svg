<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      @keyframes slidePattern {
        0% { transform: translateX(0); }
        15% { transform: translateX(0); }
        25% { transform: translateX(60px); }
        40% { transform: translateX(60px); }
        50% { transform: translateX(120px); }
        65% { transform: translateX(120px); }
        75% { transform: translateX(180px); }
        90% { transform: translateX(180px); }
        100% { transform: translateX(240px); }
      }

      @keyframes match {
        0%, 100% { fill: #4ecdc4; }
        50% { fill: #00ff00; }
      }

      @keyframes mismatch {
        0%, 100% { fill: #ff6b6b; }
        50% { fill: #ff0000; }
      }

      @keyframes highlight {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }

      .title {
        font-family: Arial, sans-serif;
        font-size: 28px;
        font-weight: bold;
        fill: #e0e0e0;
        animation: fadeIn 1s ease-in;
      }

      .label {
        font-family: Arial, sans-serif;
        font-size: 16px;
        fill: #e0e0e0;
      }

      .char {
        font-family: 'Courier New', monospace;
        font-size: 20px;
        font-weight: bold;
        fill: #e0e0e0;
      }

      .pattern-char {
        font-family: 'Courier New', monospace;
        font-size: 20px;
        font-weight: bold;
        fill: #ffe66d;
      }

      .table-text {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #e0e0e0;
      }

      .pattern-group {
        animation: slidePattern 12s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">KMP Pattern Matching Algorithm</text>

  <!-- Text String -->
  <text x="100" y="100" class="label" fill="#00d4ff">Text:</text>
  <g id="text-string">
    <rect x="100" y="110" width="540" height="50" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <text x="120" y="143" class="char">A</text>
    <text x="180" y="143" class="char">B</text>
    <text x="240" y="143" class="char">A</text>
    <text x="300" y="143" class="char">B</text>
    <text x="360" y="143" class="char">A</text>
    <text x="420" y="143" class="char">B</text>
    <text x="480" y="143" class="char">A</text>
    <text x="540" y="143" class="char">B</text>
    <text x="600" y="143" class="char">C</text>
  </g>

  <!-- Pattern String (animated) -->
  <text x="100" y="200" class="label" fill="#ffe66d">Pattern:</text>
  <g class="pattern-group">
    <rect x="100" y="210" width="300" height="50" fill="none" stroke="#ffe66d" stroke-width="2"/>
    <text x="120" y="243" class="pattern-char">A</text>
    <text x="180" y="243" class="pattern-char">B</text>
    <text x="240" y="243" class="pattern-char">A</text>
    <text x="300" y="243" class="pattern-char">B</text>
    <text x="360" y="243" class="pattern-char">C</text>

    <!-- Comparison indicators -->
    <g>
      <!-- Position 0 comparisons -->
      <circle cx="130" cy="190" r="8" fill="#4ecdc4" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite" begin="0s;0.5s"/>
      </circle>
      <circle cx="130" cy="190" r="8" fill="#ff6b6b" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite" begin="1s"/>
      </circle>

      <!-- Position 1 comparisons -->
      <circle cx="190" cy="190" r="8" fill="#4ecdc4" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite" begin="2.5s"/>
      </circle>

      <!-- Position 2 comparisons -->
      <circle cx="250" cy="190" r="8" fill="#4ecdc4" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite" begin="4.5s"/>
      </circle>

      <!-- Position 3 comparisons -->
      <circle cx="310" cy="190" r="8" fill="#4ecdc4" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite" begin="6.5s"/>
      </circle>

      <!-- Position 4 comparisons -->
      <circle cx="370" cy="190" r="8" fill="#4ecdc4" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite" begin="8.5s"/>
      </circle>
    </g>
  </g>

  <!-- Failure Function Table -->
  <g transform="translate(100, 320)">
    <text x="0" y="0" class="label" font-weight="bold" fill="#ff6b6b">Failure Function (LPS Array):</text>

    <!-- Table header -->
    <rect x="0" y="15" width="500" height="35" fill="#2a2a4e" stroke="#4ecdc4" stroke-width="2"/>
    <text x="50" y="38" text-anchor="middle" class="table-text" fill="#ffe66d">Index</text>
    <text x="150" y="38" text-anchor="middle" class="table-text" fill="#ffe66d">Pattern</text>
    <text x="250" y="38" text-anchor="middle" class="table-text" fill="#ffe66d">Character</text>
    <text x="400" y="38" text-anchor="middle" class="table-text" fill="#ffe66d">LPS Value</text>

    <!-- Table rows -->
    <g id="row0">
      <rect x="0" y="50" width="500" height="30" fill="none" stroke="#4ecdc4" stroke-width="1"/>
      <text x="50" y="71" text-anchor="middle" class="table-text">0</text>
      <text x="150" y="71" text-anchor="middle" class="table-text">A</text>
      <text x="250" y="71" text-anchor="middle" class="table-text">A</text>
      <text x="400" y="71" text-anchor="middle" class="table-text" fill="#00d4ff">0</text>
    </g>

    <g id="row1">
      <rect x="0" y="80" width="500" height="30" fill="none" stroke="#4ecdc4" stroke-width="1"/>
      <text x="50" y="101" text-anchor="middle" class="table-text">1</text>
      <text x="150" y="101" text-anchor="middle" class="table-text">AB</text>
      <text x="250" y="101" text-anchor="middle" class="table-text">B</text>
      <text x="400" y="101" text-anchor="middle" class="table-text" fill="#00d4ff">0</text>
    </g>

    <g id="row2">
      <rect x="0" y="110" width="500" height="30" fill="none" stroke="#4ecdc4" stroke-width="1"/>
      <text x="50" y="131" text-anchor="middle" class="table-text">2</text>
      <text x="150" y="131" text-anchor="middle" class="table-text">ABA</text>
      <text x="250" y="131" text-anchor="middle" class="table-text">A</text>
      <text x="400" y="131" text-anchor="middle" class="table-text" fill="#00d4ff">1</text>
    </g>

    <g id="row3">
      <rect x="0" y="140" width="500" height="30" fill="none" stroke="#4ecdc4" stroke-width="1"/>
      <text x="50" y="161" text-anchor="middle" class="table-text">3</text>
      <text x="150" y="161" text-anchor="middle" class="table-text">ABAB</text>
      <text x="250" y="161" text-anchor="middle" class="table-text">B</text>
      <text x="400" y="161" text-anchor="middle" class="table-text" fill="#00d4ff">2</text>
    </g>

    <g id="row4">
      <rect x="0" y="170" width="500" height="30" fill="none" stroke="#4ecdc4" stroke-width="1"/>
      <text x="50" y="191" text-anchor="middle" class="table-text">4</text>
      <text x="150" y="191" text-anchor="middle" class="table-text">ABABC</text>
      <text x="250" y="191" text-anchor="middle" class="table-text">C</text>
      <text x="400" y="191" text-anchor="middle" class="table-text" fill="#00d4ff">0</text>
    </g>
  </g>

  <!-- Explanation Box -->
  <rect x="100" y="540" width="600" height="50" fill="#2a2a4e" stroke="#ffe66d" stroke-width="2" rx="5"/>
  <text x="400" y="565" text-anchor="middle" class="label" font-size="14">
    Pattern slides efficiently using LPS values instead of restarting from beginning
  </text>

  <!-- Status indicator -->
  <g transform="translate(550, 220)">
    <circle cx="0" cy="0" r="12" fill="#4ecdc4" opacity="0.6">
      <animate attributeName="fill" values="#4ecdc4;#00ff00;#4ecdc4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="5" class="label" font-size="14">Matching</text>

    <circle cx="0" cy="30" r="12" fill="#ff6b6b" opacity="0.6">
      <animate attributeName="fill" values="#ff6b6b;#ff0000;#ff6b6b" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <text x="20" y="35" class="label" font-size="14">Mismatch</text>
  </g>
</svg>