<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes keyFlow1 {
        0%, 100% { opacity: 0; transform: translateX(0); }
        10%, 40% { opacity: 1; transform: translateX(150px); }
        50%, 100% { opacity: 0; transform: translateX(150px); }
      }
      @keyframes keyFlow2 {
        0%, 15%, 100% { opacity: 0; transform: translateX(0); }
        25%, 55% { opacity: 1; transform: translateX(150px); }
        65%, 100% { opacity: 0; transform: translateX(150px); }
      }
      @keyframes keyFlow3 {
        0%, 30%, 100% { opacity: 0; transform: translateX(0); }
        40%, 70% { opacity: 1; transform: translateX(150px); }
        80%, 100% { opacity: 0; transform: translateX(150px); }
      }
      @keyframes hashGlow {
        0%, 100% { filter: drop-shadow(0 0 0px #00d4ff); }
        50% { filter: drop-shadow(0 0 10px #00d4ff); }
      }
      @keyframes insertToTable {
        0%, 45% { opacity: 0; }
        50%, 100% { opacity: 1; }
      }
      @keyframes collisionPulse {
        0%, 65%, 100% { fill: #4ecdc4; }
        75%, 85% { fill: #ff6b6b; }
      }
      @keyframes complexityFade {
        0%, 70% { opacity: 0; }
        80%, 100% { opacity: 1; }
      }
      @keyframes arrowDash {
        to { stroke-dashoffset: 0; }
      }
      @keyframes titleGlow {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; text-shadow: 0 0 20px #00d4ff; }
      }

      .key-item {
        font-family: monospace;
        font-size: 16px;
        fill: #ffe66d;
        font-weight: bold;
      }
      .hash-function {
        font-family: monospace;
        font-size: 14px;
        fill: #00d4ff;
      }
      .table-cell {
        fill: #2a2a3e;
        stroke: #4ecdc4;
        stroke-width: 2;
      }
      .table-text {
        font-family: monospace;
        font-size: 14px;
        fill: #e0e0e0;
      }
      .label-text {
        font-family: sans-serif;
        font-size: 14px;
        fill: #e0e0e0;
      }
      .title-text {
        font-family: sans-serif;
        font-size: 24px;
        fill: #00d4ff;
        font-weight: bold;
        animation: titleGlow 3s ease-in-out infinite;
      }
      .complexity-text {
        font-family: monospace;
        font-size: 16px;
        font-weight: bold;
      }
      .arrow {
        stroke: #00d4ff;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
        stroke-dasharray: 150;
        stroke-dashoffset: 150;
        animation: arrowDash 1s ease-out forwards;
      }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00d4ff" />
    </marker>

    <linearGradient id="hashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" class="title-text" text-anchor="middle">Introduction to Hashing</text>

  <!-- Keys Section -->
  <text x="50" y="100" class="label-text">Input Keys:</text>

  <g id="key1" style="animation: keyFlow1 12s ease-in-out infinite;">
    <rect x="50" y="110" width="80" height="35" rx="5" fill="#2a2a3e" stroke="#ffe66d" stroke-width="2"/>
    <text x="90" y="133" class="key-item" text-anchor="middle">"Alice"</text>
  </g>

  <g id="key2" style="animation: keyFlow2 12s ease-in-out infinite;">
    <rect x="50" y="155" width="80" height="35" rx="5" fill="#2a2a3e" stroke="#ffe66d" stroke-width="2"/>
    <text x="90" y="178" class="key-item" text-anchor="middle">"Bob"</text>
  </g>

  <g id="key3" style="animation: keyFlow3 12s ease-in-out infinite;">
    <rect x="50" y="200" width="80" height="35" rx="5" fill="#2a2a3e" stroke="#ffe66d" stroke-width="2"/>
    <text x="90" y="223" class="key-item" text-anchor="middle">"Carol"</text>
  </g>

  <!-- Hash Function -->
  <rect x="280" y="110" width="140" height="120" rx="10" fill="url(#hashGrad)" opacity="0.3" stroke="#00d4ff" stroke-width="3"/>
  <text x="350" y="140" class="hash-function" text-anchor="middle" font-size="16" font-weight="bold">Hash Function</text>
  <text x="350" y="165" class="hash-function" text-anchor="middle">h(key) = </text>
  <text x="350" y="185" class="hash-function" text-anchor="middle">Σ ASCII(char)</text>
  <text x="350" y="205" class="hash-function" text-anchor="middle">mod TableSize</text>

  <circle cx="350" cy="170" r="60" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" style="animation: hashGlow 2s ease-in-out infinite;"/>

  <!-- Arrows from keys to hash function -->
  <path d="M 130 127 L 270 165" class="arrow" style="animation-delay: 0.5s;"/>
  <path d="M 130 172 L 270 170" class="arrow" style="animation-delay: 0.7s;"/>
  <path d="M 130 217 L 270 175" class="arrow" style="animation-delay: 0.9s;"/>

  <!-- Hash Table -->
  <text x="600" y="100" class="label-text" text-anchor="middle">Hash Table</text>

  <g id="hashTable">
    <!-- Index 0 -->
    <rect x="530" y="110" width="40" height="35" class="table-cell"/>
    <text x="550" y="133" class="table-text" text-anchor="middle">0</text>
    <rect x="570" y="110" width="120" height="35" class="table-cell"/>
    <text x="630" y="133" class="table-text" text-anchor="middle" style="animation: insertToTable 12s ease-in-out infinite;">Bob</text>

    <!-- Index 1 -->
    <rect x="530" y="145" width="40" height="35" class="table-cell"/>
    <text x="550" y="168" class="table-text" text-anchor="middle">1</text>
    <rect x="570" y="145" width="120" height="35" class="table-cell"/>
    <text x="630" y="168" class="table-text" text-anchor="middle">-</text>

    <!-- Index 2 -->
    <rect x="530" y="180" width="40" height="35" class="table-cell"/>
    <text x="550" y="203" class="table-text" text-anchor="middle">2</text>
    <rect x="570" y="180" width="120" height="35" class="table-cell" style="animation: collisionPulse 12s ease-in-out infinite;"/>
    <text x="630" y="203" class="table-text" text-anchor="middle" style="animation: insertToTable 12s ease-in-out infinite; animation-delay: 0.5s;">Alice</text>

    <!-- Index 3 -->
    <rect x="530" y="215" width="40" height="35" class="table-cell"/>
    <text x="550" y="238" class="table-text" text-anchor="middle">3</text>
    <rect x="570" y="215" width="120" height="35" class="table-cell"/>
    <text x="630" y="238" class="table-text" text-anchor="middle">-</text>

    <!-- Index 4 -->
    <rect x="530" y="250" width="40" height="35" class="table-cell"/>
    <text x="550" y="273" class="table-text" text-anchor="middle">4</text>
    <rect x="570" y="250" width="120" height="35" class="table-cell" style="animation: collisionPulse 12s ease-in-out infinite; animation-delay: 1s;"/>
    <text x="630" y="273" class="table-text" text-anchor="middle" style="animation: insertToTable 12s ease-in-out infinite; animation-delay: 1s;">Carol</text>
  </g>

  <!-- Arrows from hash function to table -->
  <path d="M 420 150 L 525 127" class="arrow" style="animation-delay: 1.2s;"/>
  <path d="M 420 170 L 525 197" class="arrow" style="animation-delay: 1.4s;"/>
  <path d="M 420 190 L 525 267" class="arrow" style="animation-delay: 1.6s;"/>

  <!-- Hash Calculations -->
  <g style="animation: complexityFade 12s ease-in-out infinite;">
    <text x="50" y="320" class="hash-function">h("Alice") = (65+108+105+99+101) % 5 = 478 % 5 = 2</text>
    <text x="50" y="345" class="hash-function">h("Bob") = (66+111+98) % 5 = 275 % 5 = 0</text>
    <text x="50" y="370" class="hash-function">h("Carol") = (67+97+114+111+108) % 5 = 497 % 5 = 2</text>
  </g>

  <!-- Collision Warning -->
  <g style="animation: complexityFade 12s ease-in-out infinite; animation-delay: 1s;">
    <rect x="40" y="395" width="720" height="50" rx="8" fill="#ff6b6b" opacity="0.2" stroke="#ff6b6b" stroke-width="2"/>
    <text x="400" y="415" class="label-text" text-anchor="middle" fill="#ff6b6b" font-weight="bold">COLLISION DETECTED!</text>
    <text x="400" y="435" class="label-text" text-anchor="middle" font-size="12">Alice and Carol hash to same index (2) - requires collision resolution</text>
  </g>

  <!-- Time Complexity -->
  <g style="animation: complexityFade 12s ease-in-out infinite; animation-delay: 2s;">
    <text x="50" y="480" class="label-text" font-size="16" font-weight="bold">Time Complexity:</text>

    <rect x="50" y="495" width="340" height="80" rx="8" fill="#2a2a3e" stroke="#4ecdc4" stroke-width="2"/>
    <text x="220" y="520" class="complexity-text" text-anchor="middle" fill="#4ecdc4">Average Case: O(1)</text>
    <text x="220" y="545" class="label-text" text-anchor="middle" font-size="12">Direct access with good hash function</text>
    <text x="220" y="565" class="label-text" text-anchor="middle" font-size="12">and low load factor</text>

    <rect x="410" y="495" width="340" height="80" rx="8" fill="#2a2a3e" stroke="#ff6b6b" stroke-width="2"/>
    <text x="580" y="520" class="complexity-text" text-anchor="middle" fill="#ff6b6b">Worst Case: O(n)</text>
    <text x="580" y="545" class="label-text" text-anchor="middle" font-size="12">All keys hash to same index</text>
    <text x="580" y="565" class="label-text" text-anchor="middle" font-size="12">Linear search in chain/probe</text>
  </g>

  <!-- Key Concepts -->
  <text x="400" y="595" class="label-text" text-anchor="middle" font-size="11" opacity="0.7">
    Key: Hash function maps keys to indices • Collisions occur when multiple keys map to same index • Resolution strategies needed
  </text>
</svg>