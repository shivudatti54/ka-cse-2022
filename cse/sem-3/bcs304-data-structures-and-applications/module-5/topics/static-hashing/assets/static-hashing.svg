<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes insertChain {
        0%, 20% { opacity: 0; transform: translateY(-20px); }
        30%, 100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes probeMove {
        0%, 50% { opacity: 0; transform: translate(0, 0); }
        55% { opacity: 1; transform: translate(0, 0); }
        65% { opacity: 1; transform: translate(0, 40px); }
        75% { opacity: 1; transform: translate(0, 80px); }
        85%, 100% { opacity: 1; transform: translate(0, 80px); }
      }
      @keyframes loadFactorFill {
        0%, 70% { width: 0; }
        100% { width: 60%; }
      }
      @keyframes highlightBucket {
        0%, 100% { stroke: #4ecdc4; stroke-width: 2; }
        50% { stroke: #ffe66d; stroke-width: 4; }
      }
      @keyframes chainGrow {
        from { stroke-dashoffset: 50; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes titlePulse {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1; fill: #00d4ff; }
      }
      @keyframes methodSwitch {
        0%, 45% { opacity: 1; }
        50%, 95% { opacity: 0.3; }
        100% { opacity: 1; }
      }
      @keyframes methodSwitch2 {
        0%, 45% { opacity: 0.3; }
        50%, 95% { opacity: 1; }
        100% { opacity: 0.3; }
      }

      .title {
        font-family: sans-serif;
        font-size: 24px;
        fill: #00d4ff;
        font-weight: bold;
        animation: titlePulse 4s ease-in-out infinite;
      }
      .subtitle {
        font-family: sans-serif;
        font-size: 16px;
        fill: #e0e0e0;
        font-weight: bold;
      }
      .label {
        font-family: sans-serif;
        font-size: 12px;
        fill: #e0e0e0;
      }
      .bucket {
        fill: #2a2a3e;
        stroke: #4ecdc4;
        stroke-width: 2;
      }
      .bucket-text {
        font-family: monospace;
        font-size: 14px;
        fill: #e0e0e0;
      }
      .node {
        fill: #2a2a3e;
        stroke: #ffe66d;
        stroke-width: 2;
      }
      .node-text {
        font-family: monospace;
        font-size: 12px;
        fill: #ffe66d;
        font-weight: bold;
      }
      .key-label {
        font-family: monospace;
        font-size: 13px;
        fill: #00d4ff;
      }
    </style>

    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#4ecdc4" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="35" class="title" text-anchor="middle">Static Hashing - Collision Resolution</text>

  <!-- Separate Chaining Section -->
  <g id="chainingSection" style="animation: methodSwitch 20s ease-in-out infinite;">
    <rect x="20" y="55" width="360" height="280" rx="8" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
    <text x="200" y="80" class="subtitle" text-anchor="middle">Method 1: Separate Chaining</text>

    <!-- Hash Table with Chains -->
    <g id="chainTable">
      <!-- Bucket 0 -->
      <rect x="40" y="100" width="30" height="35" class="bucket"/>
      <text x="55" y="122" class="bucket-text" text-anchor="middle">0</text>
      <rect x="70" y="100" width="80" height="35" class="bucket" style="animation: highlightBucket 3s ease-in-out infinite;"/>
      <text x="110" y="122" class="bucket-text" text-anchor="middle">Head</text>

      <!-- Chain for bucket 0 -->
      <line x1="150" y1="117" x2="175" y2="117" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrow)"/>
      <g style="animation: insertChain 8s ease-in-out infinite;">
        <rect x="175" y="100" width="50" height="35" class="node"/>
        <text x="200" y="122" class="node-text" text-anchor="middle">15</text>
        <line x1="225" y1="117" x2="245" y2="117" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4"/>
      </g>
      <g style="animation: insertChain 8s ease-in-out infinite; animation-delay: 1s;">
        <rect x="245" y="100" width="50" height="35" class="node"/>
        <text x="270" y="122" class="node-text" text-anchor="middle">25</text>
        <line x1="295" y1="117" x2="315" y2="117" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4"/>
      </g>
      <g style="animation: insertChain 8s ease-in-out infinite; animation-delay: 2s;">
        <rect x="315" y="100" width="50" height="35" class="node"/>
        <text x="340" y="122" class="node-text" text-anchor="middle">35</text>
      </g>

      <!-- Bucket 1 -->
      <rect x="40" y="145" width="30" height="35" class="bucket"/>
      <text x="55" y="167" class="bucket-text" text-anchor="middle">1</text>
      <rect x="70" y="145" width="80" height="35" class="bucket"/>
      <text x="110" y="167" class="bucket-text" text-anchor="middle">Head</text>
      <line x1="150" y1="162" x2="175" y2="162" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="175" y="145" width="50" height="35" class="node"/>
      <text x="200" y="167" class="node-text" text-anchor="middle">11</text>

      <!-- Bucket 2 -->
      <rect x="40" y="190" width="30" height="35" class="bucket"/>
      <text x="55" y="212" class="bucket-text" text-anchor="middle">2</text>
      <rect x="70" y="190" width="80" height="35" class="bucket"/>
      <text x="110" y="212" class="bucket-text" text-anchor="middle">NULL</text>

      <!-- Bucket 3 -->
      <rect x="40" y="235" width="30" height="35" class="bucket"/>
      <text x="55" y="257" class="bucket-text" text-anchor="middle">3</text>
      <rect x="70" y="235" width="80" height="35" class="bucket"/>
      <text x="110" y="257" class="bucket-text" text-anchor="middle">Head</text>
      <line x1="150" y1="252" x2="175" y2="252" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="175" y="235" width="50" height="35" class="node"/>
      <text x="200" y="257" class="node-text" text-anchor="middle">23</text>
      <line x1="225" y1="252" x2="245" y2="252" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4"/>
      <rect x="245" y="235" width="50" height="35" class="node"/>
      <text x="270" y="257" class="node-text" text-anchor="middle">13</text>

      <!-- Bucket 4 -->
      <rect x="40" y="280" width="30" height="35" class="bucket"/>
      <text x="55" y="302" class="bucket-text" text-anchor="middle">4</text>
      <rect x="70" y="280" width="80" height="35" class="bucket"/>
      <text x="110" y="302" class="bucket-text" text-anchor="middle">NULL</text>
    </g>

    <text x="200" y="330" class="label" text-anchor="middle">Each bucket contains a linked list</text>
  </g>

  <!-- Linear Probing Section -->
  <g id="probingSection" style="animation: methodSwitch2 20s ease-in-out infinite;">
    <rect x="420" y="55" width="360" height="280" rx="8" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.3"/>
    <text x="600" y="80" class="subtitle" text-anchor="middle">Method 2: Linear Probing</text>

    <!-- Hash Table with Linear Probing -->
    <g id="probeTable">
      <!-- Bucket 0 -->
      <rect x="440" y="100" width="30" height="35" class="bucket"/>
      <text x="455" y="122" class="bucket-text" text-anchor="middle">0</text>
      <rect x="470" y="100" width="80" height="35" class="bucket" style="animation: highlightBucket 3s ease-in-out infinite; animation-delay: 0.5s;"/>
      <text x="510" y="122" class="bucket-text" text-anchor="middle">15</text>
      <text x="560" y="122" class="label">← h(15)=0</text>

      <!-- Bucket 1 -->
      <rect x="440" y="145" width="30" height="35" class="bucket"/>
      <text x="455" y="167" class="bucket-text" text-anchor="middle">1</text>
      <rect x="470" y="145" width="80" height="35" class="bucket"/>
      <text x="510" y="167" class="bucket-text" text-anchor="middle">11</text>

      <!-- Bucket 2 -->
      <rect x="440" y="190" width="30" height="35" class="bucket"/>
      <text x="455" y="212" class="bucket-text" text-anchor="middle">2</text>
      <rect x="470" y="190" width="80" height="35" class="bucket"/>
      <text x="510" y="212" class="bucket-text" text-anchor="middle">-</text>

      <!-- Bucket 3 -->
      <rect x="440" y="235" width="30" height="35" class="bucket"/>
      <text x="455" y="257" class="bucket-text" text-anchor="middle">3</text>
      <rect x="470" y="235" width="80" height="35" class="bucket"/>
      <text x="510" y="257" class="bucket-text" text-anchor="middle">23</text>

      <!-- Bucket 4 -->
      <rect x="440" y="280" width="30" height="35" class="bucket"/>
      <text x="455" y="302" class="bucket-text" text-anchor="middle">4</text>
      <rect x="470" y="280" width="80" height="35" class="bucket"/>
      <text x="510" y="302" class="bucket-text" text-anchor="middle">-</text>

      <!-- Probing animation for key 25 -->
      <g style="animation: probeMove 10s ease-in-out infinite;">
        <rect x="590" y="100" width="50" height="35" fill="#ff6b6b" opacity="0.7" stroke="#ffe66d" stroke-width="2"/>
        <text x="615" y="122" class="node-text" text-anchor="middle" fill="#fff">25</text>
        <text x="650" y="122" class="label">← Collision!</text>
      </g>

      <text x="640" y="192" class="label" fill="#ff6b6b" style="animation: probeMove 10s ease-in-out infinite;">Probe +1</text>
      <text x="640" y="237" class="label" fill="#ff6b6b" style="animation: probeMove 10s ease-in-out infinite;">Probe +2</text>
      <text x="640" y="282" class="label" fill="#4ecdc4" style="animation: probeMove 10s ease-in-out infinite;">Found empty!</text>
    </g>

    <text x="600" y="330" class="label" text-anchor="middle">Probe next slots until empty found</text>
  </g>

  <!-- Load Factor Calculation -->
  <g id="loadFactor">
    <rect x="50" y="360" width="700" height="100" rx="8" fill="#2a2a3e" stroke="#4ecdc4" stroke-width="2"/>
    <text x="400" y="385" class="subtitle" text-anchor="middle">Load Factor (α) Calculation</text>

    <text x="70" y="410" class="label">α = n / m</text>
    <text x="70" y="430" class="label">n = number of elements</text>
    <text x="70" y="450" class="label">m = table size</text>

    <text x="280" y="420" class="key-label">Example: 8 elements / 5 buckets</text>
    <text x="280" y="440" class="key-label">α = 8 / 5 = 1.6</text>

    <rect x="520" y="395" width="220" height="25" rx="4" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <rect x="520" y="395" width="0" height="25" rx="4" fill="#00d4ff" opacity="0.6">
      <animate attributeName="width" from="0" to="132" dur="3s" fill="freeze" repeatCount="indefinite"/>
    </rect>
    <text x="630" y="413" class="label" text-anchor="middle" fill="#ffe66d">60% Full</text>

    <text x="630" y="440" class="label" text-anchor="middle" font-size="11">
      Rehashing recommended when α > 0.7
    </text>
  </g>

  <!-- Comparison Table -->
  <g id="comparison">
    <text x="400" y="490" class="subtitle" text-anchor="middle">Performance Comparison</text>

    <rect x="50" y="500" width="330" height="80" rx="6" fill="#2a2a3e" stroke="#00d4ff" stroke-width="2"/>
    <text x="215" y="525" class="label" text-anchor="middle" font-weight="bold" fill="#00d4ff">Separate Chaining</text>
    <text x="215" y="545" class="label" text-anchor="middle">✓ Simple implementation</text>
    <text x="215" y="560" class="label" text-anchor="middle">✓ No clustering</text>
    <text x="215" y="575" class="label" text-anchor="middle">✗ Extra memory for pointers</text>

    <rect x="420" y="500" width="330" height="80" rx="6" fill="#2a2a3e" stroke="#ff6b6b" stroke-width="2"/>
    <text x="585" y="525" class="label" text-anchor="middle" font-weight="bold" fill="#ff6b6b">Linear Probing</text>
    <text x="585" y="545" class="label" text-anchor="middle">✓ Cache-friendly</text>
    <text x="585" y="560" class="label" text-anchor="middle">✓ No pointer overhead</text>
    <text x="585" y="575" class="label" text-anchor="middle">✗ Primary clustering</text>
  </g>

  <text x="400" y="595" class="label" text-anchor="middle" font-size="10" opacity="0.7">
    Static hashing uses fixed-size tables • Choose collision resolution based on load factor and access patterns
  </text>
</svg>