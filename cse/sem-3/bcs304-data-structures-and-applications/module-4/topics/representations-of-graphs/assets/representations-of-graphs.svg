<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fillCell {
      from { fill: #2a2a3e; }
      to { fill: #4ecdc4; }
    }

    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }

    .title {
      font-family: sans-serif;
      font-size: 24px;
      font-weight: bold;
      fill: #e0e0e0;
      animation: fadeIn 0.8s ease-out;
    }

    .section-title {
      font-family: sans-serif;
      font-size: 18px;
      font-weight: bold;
      fill: #00d4ff;
    }

    .label {
      font-family: sans-serif;
      font-size: 12px;
      fill: #e0e0e0;
    }

    .code {
      font-family: monospace;
      font-size: 10px;
      fill: #ffe66d;
    }

    .vertex {
      fill: #00d4ff;
      stroke: #e0e0e0;
      stroke-width: 2;
    }

    .vertex-text {
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      fill: #1a1a2e;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .edge {
      stroke: #4ecdc4;
      stroke-width: 2.5;
      fill: none;
    }

    .graph-group {
      animation: fadeIn 1s ease-out 0.5s backwards;
    }

    .matrix-group {
      animation: slideInLeft 1s ease-out 2.5s backwards;
    }

    .list-group {
      animation: slideInRight 1s ease-out 4.5s backwards;
    }

    .cell {
      stroke: #4ecdc4;
      stroke-width: 1;
      fill: #2a2a3e;
    }

    .cell-1 { animation: fillCell 0.3s ease-out 3s forwards; }
    .cell-2 { animation: fillCell 0.3s ease-out 3.1s forwards; }
    .cell-3 { animation: fillCell 0.3s ease-out 3.2s forwards; }
    .cell-4 { animation: fillCell 0.3s ease-out 3.3s forwards; }
    .cell-5 { animation: fillCell 0.3s ease-out 3.4s forwards; }
    .cell-6 { animation: fillCell 0.3s ease-out 3.5s forwards; }
    .cell-7 { animation: fillCell 0.3s ease-out 3.6s forwards; }
    .cell-8 { animation: fillCell 0.3s ease-out 3.7s forwards; }
    .cell-9 { animation: fillCell 0.3s ease-out 3.8s forwards; }
    .cell-10 { animation: fillCell 0.3s ease-out 3.9s forwards; }

    .list-node {
      fill: #ff6b6b;
      stroke: #e0e0e0;
      stroke-width: 1.5;
    }

    .list-text {
      font-family: sans-serif;
      font-size: 11px;
      font-weight: bold;
      fill: #1a1a2e;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .pointer {
      stroke: #ffe66d;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrow);
    }

    .comparison {
      animation: fadeIn 1s ease-out 6s backwards;
    }
  </style>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#ffe66d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Main Title -->
  <text x="400" y="30" class="title" text-anchor="middle">Graph Representations</text>

  <!-- Sample Graph -->
  <g class="graph-group">
    <text x="400" y="65" class="section-title" text-anchor="middle">Sample Graph</text>

    <!-- Vertices -->
    <circle cx="350" cy="100" r="15" class="vertex"/>
    <text x="350" y="100" class="vertex-text">0</text>

    <circle cx="430" cy="100" r="15" class="vertex"/>
    <text x="430" y="100" class="vertex-text">1</text>

    <circle cx="470" cy="160" r="15" class="vertex"/>
    <text x="470" y="160" class="vertex-text">2</text>

    <circle cx="430" cy="220" r="15" class="vertex"/>
    <text x="430" y="220" class="vertex-text">3</text>

    <circle cx="350" cy="220" r="15" class="vertex"/>
    <text x="350" y="220" class="vertex-text">4</text>

    <circle cx="310" cy="160" r="15" class="vertex"/>
    <text x="310" y="160" class="vertex-text">5</text>

    <!-- Edges -->
    <line x1="362" y1="107" x2="418" y2="107" class="edge"/>
    <line x1="441" y1="112" x2="459" y2="148" class="edge"/>
    <line x1="459" y1="172" x2="441" y2="208" class="edge"/>
    <line x1="418" y1="213" x2="362" y2="213" class="edge"/>
    <line x1="339" y1="208" x2="321" y2="172" class="edge"/>
    <line x1="321" y1="148" x2="339" y2="112" class="edge"/>
    <line x1="350" y1="115" x2="350" y2="205" class="edge"/>
    <line x1="430" y1="115" x2="430" y2="205" class="edge"/>
  </g>

  <!-- Adjacency Matrix Representation -->
  <g class="matrix-group">
    <text x="140" y="275" class="section-title">Adjacency Matrix</text>
    <text x="140" y="295" class="label">Space: O(V²)</text>

    <!-- Matrix Header -->
    <text x="65" y="325" class="code">  </text>
    <text x="90" y="325" class="code">0</text>
    <text x="115" y="325" class="code">1</text>
    <text x="140" y="325" class="code">2</text>
    <text x="165" y="325" class="code">3</text>
    <text x="190" y="325" class="code">4</text>
    <text x="215" y="325" class="code">5</text>

    <!-- Row labels and cells -->
    <!-- Row 0 -->
    <text x="65" y="345" class="code">0</text>
    <rect x="80" y="332" width="20" height="20" class="cell"/>
    <text x="90" y="342" class="code">0</text>
    <rect x="105" y="332" width="20" height="20" class="cell cell-1"/>
    <text x="115" y="342" class="code">1</text>
    <rect x="130" y="332" width="20" height="20" class="cell"/>
    <text x="140" y="342" class="code">0</text>
    <rect x="155" y="332" width="20" height="20" class="cell"/>
    <text x="165" y="342" class="code">0</text>
    <rect x="180" y="332" width="20" height="20" class="cell cell-2"/>
    <text x="190" y="342" class="code">1</text>
    <rect x="205" y="332" width="20" height="20" class="cell cell-3"/>
    <text x="215" y="342" class="code">1</text>

    <!-- Row 1 -->
    <text x="65" y="370" class="code">1</text>
    <rect x="80" y="357" width="20" height="20" class="cell cell-4"/>
    <text x="90" y="367" class="code">1</text>
    <rect x="105" y="357" width="20" height="20" class="cell"/>
    <text x="115" y="367" class="code">0</text>
    <rect x="130" y="357" width="20" height="20" class="cell cell-5"/>
    <text x="140" y="367" class="code">1</text>
    <rect x="155" y="357" width="20" height="20" class="cell cell-6"/>
    <text x="165" y="367" class="code">1</text>
    <rect x="180" y="357" width="20" height="20" class="cell"/>
    <text x="190" y="367" class="code">0</text>
    <rect x="205" y="357" width="20" height="20" class="cell"/>
    <text x="215" y="367" class="code">0</text>

    <!-- Row 2 -->
    <text x="65" y="395" class="code">2</text>
    <rect x="80" y="382" width="20" height="20" class="cell"/>
    <text x="90" y="392" class="code">0</text>
    <rect x="105" y="382" width="20" height="20" class="cell cell-7"/>
    <text x="115" y="392" class="code">1</text>
    <rect x="130" y="382" width="20" height="20" class="cell"/>
    <text x="140" y="392" class="code">0</text>
    <rect x="155" y="382" width="20" height="20" class="cell cell-8"/>
    <text x="165" y="392" class="code">1</text>
    <rect x="180" y="382" width="20" height="20" class="cell"/>
    <text x="190" y="392" class="code">0</text>
    <rect x="205" y="382" width="20" height="20" class="cell"/>
    <text x="215" y="392" class="code">0</text>

    <!-- Row 3 -->
    <text x="65" y="420" class="code">3</text>
    <rect x="80" y="407" width="20" height="20" class="cell"/>
    <text x="90" y="417" class="code">0</text>
    <rect x="105" y="407" width="20" height="20" class="cell cell-9"/>
    <text x="115" y="417" class="code">1</text>
    <rect x="130" y="407" width="20" height="20" class="cell cell-10"/>
    <text x="140" y="417" class="code">1</text>
    <rect x="155" y="407" width="20" height="20" class="cell"/>
    <text x="165" y="417" class="code">0</text>
    <rect x="180" y="407" width="20" height="20" class="cell cell-1"/>
    <text x="190" y="417" class="code">1</text>
    <rect x="205" y="407" width="20" height="20" class="cell"/>
    <text x="215" y="417" class="code">0</text>

    <!-- Row 4 -->
    <text x="65" y="445" class="code">4</text>
    <rect x="80" y="432" width="20" height="20" class="cell cell-2"/>
    <text x="90" y="442" class="code">1</text>
    <rect x="105" y="432" width="20" height="20" class="cell"/>
    <text x="115" y="442" class="code">0</text>
    <rect x="130" y="432" width="20" height="20" class="cell"/>
    <text x="140" y="442" class="code">0</text>
    <rect x="155" y="432" width="20" height="20" class="cell cell-3"/>
    <text x="165" y="442" class="code">1</text>
    <rect x="180" y="432" width="20" height="20" class="cell"/>
    <text x="190" y="442" class="code">0</text>
    <rect x="205" y="432" width="20" height="20" class="cell cell-4"/>
    <text x="215" y="442" class="code">1</text>

    <!-- Row 5 -->
    <text x="65" y="470" class="code">5</text>
    <rect x="80" y="457" width="20" height="20" class="cell cell-5"/>
    <text x="90" y="467" class="code">1</text>
    <rect x="105" y="457" width="20" height="20" class="cell"/>
    <text x="115" y="467" class="code">0</text>
    <rect x="130" y="457" width="20" height="20" class="cell"/>
    <text x="140" y="467" class="code">0</text>
    <rect x="155" y="457" width="20" height="20" class="cell"/>
    <text x="165" y="467" class="code">0</text>
    <rect x="205" y="457" width="20" height="20" class="cell"/>
    <text x="215" y="467" class="code">0</text>
    <rect x="180" y="457" width="20" height="20" class="cell cell-6"/>
    <text x="190" y="467" class="code">1</text>
  </g>

  <!-- Adjacency List Representation -->
  <g class="list-group">
    <text x="520" y="275" class="section-title">Adjacency List</text>
    <text x="520" y="295" class="label">Space: O(V + E)</text>

    <!-- Vertex 0 -->
    <text x="460" y="325" class="code">0:</text>
    <rect x="480" y="312" width="30" height="20" class="list-node"/>
    <text x="495" y="322" class="list-text">1</text>
    <line x1="510" y1="322" x2="530" y2="322" class="pointer"/>
    <rect x="530" y="312" width="30" height="20" class="list-node"/>
    <text x="545" y="322" class="list-text">4</text>
    <line x1="560" y1="322" x2="580" y2="322" class="pointer"/>
    <rect x="580" y="312" width="30" height="20" class="list-node"/>
    <text x="595" y="322" class="list-text">5</text>

    <!-- Vertex 1 -->
    <text x="460" y="355" class="code">1:</text>
    <rect x="480" y="342" width="30" height="20" class="list-node"/>
    <text x="495" y="352" class="list-text">0</text>
    <line x1="510" y1="352" x2="530" y2="352" class="pointer"/>
    <rect x="530" y="342" width="30" height="20" class="list-node"/>
    <text x="545" y="352" class="list-text">2</text>
    <line x1="560" y1="352" x2="580" y2="352" class="pointer"/>
    <rect x="580" y="342" width="30" height="20" class="list-node"/>
    <text x="595" y="352" class="list-text">3</text>

    <!-- Vertex 2 -->
    <text x="460" y="385" class="code">2:</text>
    <rect x="480" y="372" width="30" height="20" class="list-node"/>
    <text x="495" y="382" class="list-text">1</text>
    <line x1="510" y1="382" x2="530" y2="382" class="pointer"/>
    <rect x="530" y="372" width="30" height="20" class="list-node"/>
    <text x="545" y="382" class="list-text">3</text>

    <!-- Vertex 3 -->
    <text x="460" y="415" class="code">3:</text>
    <rect x="480" y="402" width="30" height="20" class="list-node"/>
    <text x="495" y="412" class="list-text">1</text>
    <line x1="510" y1="412" x2="530" y2="412" class="pointer"/>
    <rect x="530" y="402" width="30" height="20" class="list-node"/>
    <text x="545" y="412" class="list-text">2</text>
    <line x1="560" y1="412" x2="580" y2="412" class="pointer"/>
    <rect x="580" y="402" width="30" height="20" class="list-node"/>
    <text x="595" y="412" class="list-text">4</text>

    <!-- Vertex 4 -->
    <text x="460" y="445" class="code">4:</text>
    <rect x="480" y="432" width="30" height="20" class="list-node"/>
    <text x="495" y="442" class="list-text">0</text>
    <line x1="510" y1="442" x2="530" y2="442" class="pointer"/>
    <rect x="530" y="432" width="30" height="20" class="list-node"/>
    <text x="545" y="442" class="list-text">3</text>
    <line x1="560" y1="442" x2="580" y2="442" class="pointer"/>
    <rect x="580" y="432" width="30" height="20" class="list-node"/>
    <text x="595" y="442" class="list-text">5</text>

    <!-- Vertex 5 -->
    <text x="460" y="475" class="code">5:</text>
    <rect x="480" y="462" width="30" height="20" class="list-node"/>
    <text x="495" y="472" class="list-text">0</text>
    <line x1="510" y1="472" x2="530" y2="472" class="pointer"/>
    <rect x="530" y="462" width="30" height="20" class="list-node"/>
    <text x="545" y="472" class="list-text">4</text>
  </g>

  <!-- Comparison Box -->
  <g class="comparison">
    <rect x="40" y="500" width="720" height="90" fill="#2a2a3e" stroke="#00d4ff" stroke-width="2" rx="5"/>
    <text x="400" y="525" class="section-title" text-anchor="middle">Comparison</text>

    <text x="60" y="545" class="label">Adjacency Matrix:</text>
    <text x="60" y="562" class="code">✓ O(1) edge lookup   ✓ Dense graphs   ✗ O(V²) space</text>
    <text x="60" y="577" class="code">Check edge (u,v): matrix[u][v] == 1</text>

    <text x="430" y="545" class="label">Adjacency List:</text>
    <text x="430" y="562" class="code">✓ O(V+E) space   ✓ Sparse graphs   ✗ O(degree) lookup</text>
    <text x="430" y="577" class="code">Check edge (u,v): traverse list[u]</text>
  </g>
</svg>
