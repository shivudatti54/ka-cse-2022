<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes highlight {
        0%, 100% { opacity: 0; }
        50% { opacity: 0.4; }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes formulaAppear {
        0%, 50% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .bg { fill: #1a1a2e; }
      .node-circle {
        fill: #00d4ff;
        stroke: #e0e0e0;
        stroke-width: 2;
      }
      .node-text {
        fill: #1a1a2e;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .edge {
        stroke: #4ecdc4;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 100;
      }
      .title-text {
        fill: #e0e0e0;
        font-family: sans-serif;
        font-size: 24px;
        font-weight: bold;
        text-anchor: middle;
      }
      .label-text {
        fill: #ffe66d;
        font-family: sans-serif;
        font-size: 12px;
      }
      .formula-box {
        fill: #2a2a4e;
        stroke: #00d4ff;
        stroke-width: 2;
        rx: 8;
      }
      .formula-text {
        fill: #e0e0e0;
        font-family: monospace;
        font-size: 13px;
      }
      .array-box {
        fill: none;
        stroke: #4ecdc4;
        stroke-width: 1.5;
      }
      .array-text {
        fill: #e0e0e0;
        font-family: monospace;
        font-size: 11px;
        text-anchor: middle;
      }
      .level-highlight {
        fill: #ff6b6b;
        opacity: 0;
      }

      /* Tree animations */
      .node-1 { animation: fadeIn 0.5s ease-out 0.5s both; }
      .edge-1-2 { animation: drawLine 0.3s ease-out 1.0s both; }
      .edge-1-3 { animation: drawLine 0.3s ease-out 1.0s both; }
      .node-2 { animation: fadeIn 0.5s ease-out 1.3s both; }
      .node-3 { animation: fadeIn 0.5s ease-out 1.3s both; }
      .edge-2-4 { animation: drawLine 0.3s ease-out 1.8s both; }
      .edge-2-5 { animation: drawLine 0.3s ease-out 1.8s both; }
      .edge-3-6 { animation: drawLine 0.3s ease-out 1.8s both; }
      .edge-3-7 { animation: drawLine 0.3s ease-out 1.8s both; }
      .node-4, .node-5, .node-6, .node-7 { animation: fadeIn 0.5s ease-out 2.1s both; }

      /* Level highlights */
      .highlight-0 { animation: highlight 1s ease-in-out 2.8s 2; }
      .highlight-1 { animation: highlight 1s ease-in-out 4.8s 2; }
      .highlight-2 { animation: highlight 1s ease-in-out 6.8s 2; }

      /* Formula animations */
      .formula-1 { animation: formulaAppear 1s ease-out 3.5s both; }
      .formula-2 { animation: formulaAppear 1s ease-out 5.5s both; }
      .formula-3 { animation: formulaAppear 1s ease-out 7.5s both; }

      /* Array animation */
      .array-group { animation: slideIn 1s ease-out 9s both; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="600"/>

  <!-- Title -->
  <text class="title-text" x="400" y="30">Complete Binary Tree Properties</text>

  <!-- Tree Structure -->
  <g transform="translate(50, 70)">
    <!-- Level highlights (background) -->
    <rect class="level-highlight highlight-0" x="180" y="0" width="60" height="50" rx="5"/>
    <rect class="level-highlight highlight-1" x="80" y="80" width="260" height="50" rx="5"/>
    <rect class="level-highlight highlight-2" x="0" y="160" width="420" height="50" rx="5"/>

    <!-- Edges -->
    <line class="edge edge-1-2" x1="210" y1="25" x2="140" y2="105"/>
    <line class="edge edge-1-3" x1="210" y1="25" x2="280" y2="105"/>
    <line class="edge edge-2-4" x1="140" y1="105" x2="70" y2="185"/>
    <line class="edge edge-2-5" x1="140" y1="105" x2="210" y2="185"/>
    <line class="edge edge-3-6" x1="280" y1="105" x2="280" y2="185"/>
    <line class="edge edge-3-7" x1="280" y1="105" x2="350" y2="185"/>

    <!-- Nodes with indices -->
    <g class="node-1">
      <circle class="node-circle" cx="210" cy="25" r="22"/>
      <text class="node-text" x="210" y="25">1</text>
      <text class="label-text" x="210" y="55" text-anchor="middle" fill="#4ecdc4">i=1</text>
    </g>

    <g class="node-2">
      <circle class="node-circle" cx="140" cy="105" r="22"/>
      <text class="node-text" x="140" y="105">2</text>
      <text class="label-text" x="140" y="135" text-anchor="middle" fill="#4ecdc4">i=2</text>
    </g>

    <g class="node-3">
      <circle class="node-circle" cx="280" cy="105" r="22"/>
      <text class="node-text" x="280" y="105">3</text>
      <text class="label-text" x="280" y="135" text-anchor="middle" fill="#4ecdc4">i=3</text>
    </g>

    <g class="node-4">
      <circle class="node-circle" cx="70" cy="185" r="22"/>
      <text class="node-text" x="70" y="185">4</text>
      <text class="label-text" x="70" y="215" text-anchor="middle" fill="#4ecdc4">i=4</text>
    </g>

    <g class="node-5">
      <circle class="node-circle" cx="210" cy="185" r="22"/>
      <text class="node-text" x="210" y="185">5</text>
      <text class="label-text" x="210" y="215" text-anchor="middle" fill="#4ecdc4">i=5</text>
    </g>

    <g class="node-6">
      <circle class="node-circle" cx="280" cy="185" r="22"/>
      <text class="node-text" x="280" y="185">6</text>
      <text class="label-text" x="280" y="215" text-anchor="middle" fill="#4ecdc4">i=6</text>
    </g>

    <g class="node-7">
      <circle class="node-circle" cx="350" cy="185" r="22"/>
      <text class="node-text" x="350" y="185">7</text>
      <text class="label-text" x="350" y="215" text-anchor="middle" fill="#4ecdc4">i=7</text>
    </g>

    <!-- Level labels -->
    <text class="label-text" x="-30" y="30" fill="#ffe66d" font-size="13">Level 0</text>
    <text class="label-text" x="-30" y="110" fill="#ffe66d" font-size="13">Level 1</text>
    <text class="label-text" x="-30" y="190" fill="#ffe66d" font-size="13">Level 2</text>
  </g>

  <!-- Formulas Section -->
  <g transform="translate(450, 80)">
    <text class="label-text" x="0" y="0" font-size="16" font-weight="bold" fill="#00d4ff">Binary Tree Properties:</text>

    <!-- Formula 1: Nodes at level -->
    <g class="formula-1">
      <rect class="formula-box" x="0" y="15" width="320" height="60"/>
      <text class="formula-text" x="10" y="35" fill="#ffe66d">Max nodes at level i:</text>
      <text class="formula-text" x="20" y="55" font-size="16" fill="#4ecdc4">nodes(i) = 2^i</text>
      <text class="label-text" x="10" y="70" font-size="10">Level 0: 2^0 = 1 node</text>
      <text class="label-text" x="170" y="70" font-size="10">Level 1: 2^1 = 2 nodes</text>
    </g>

    <!-- Formula 2: Total nodes -->
    <g class="formula-2">
      <rect class="formula-box" x="0" y="90" width="320" height="65"/>
      <text class="formula-text" x="10" y="110" fill="#ffe66d">Total nodes (height h):</text>
      <text class="formula-text" x="20" y="130" font-size="16" fill="#4ecdc4">total = 2^(h+1) - 1</text>
      <text class="label-text" x="10" y="148" font-size="10">For h=2: 2^(2+1) - 1 = 7 nodes</text>
    </g>

    <!-- Formula 3: Array representation -->
    <g class="formula-3">
      <rect class="formula-box" x="0" y="170" width="320" height="75"/>
      <text class="formula-text" x="10" y="190" fill="#ffe66d">Array Index Relations:</text>
      <text class="formula-text" x="20" y="210" font-size="13" fill="#4ecdc4">Parent(i) = i / 2</text>
      <text class="formula-text" x="20" y="228" font-size="13" fill="#4ecdc4">LeftChild(i) = 2 * i</text>
      <text class="formula-text" x="20" y="246" font-size="13" fill="#4ecdc4">RightChild(i) = 2 * i + 1</text>
    </g>
  </g>

  <!-- Array Representation -->
  <g class="array-group" transform="translate(50, 380)">
    <text class="label-text" x="0" y="0" font-size="16" font-weight="bold" fill="#00d4ff">Array Representation:</text>

    <!-- Array indices -->
    <text class="label-text" x="45" y="25" fill="#ffe66d">Index:</text>
    <g id="array-indices">
      <rect class="array-box" x="130" y="10" width="50" height="25"/>
      <text class="array-text" x="155" y="27">0</text>

      <rect class="array-box" x="180" y="10" width="50" height="25"/>
      <text class="array-text" x="205" y="27">1</text>

      <rect class="array-box" x="230" y="10" width="50" height="25"/>
      <text class="array-text" x="255" y="27">2</text>

      <rect class="array-box" x="280" y="10" width="50" height="25"/>
      <text class="array-text" x="305" y="27">3</text>

      <rect class="array-box" x="330" y="10" width="50" height="25"/>
      <text class="array-text" x="355" y="27">4</text>

      <rect class="array-box" x="380" y="10" width="50" height="25"/>
      <text class="array-text" x="405" y="27">5</text>

      <rect class="array-box" x="430" y="10" width="50" height="25"/>
      <text class="array-text" x="455" y="27">6</text>

      <rect class="array-box" x="480" y="10" width="50" height="25"/>
      <text class="array-text" x="505" y="27">7</text>
    </g>

    <!-- Array values -->
    <text class="label-text" x="45" y="65" fill="#ffe66d">Value:</text>
    <g id="array-values">
      <rect class="array-box" x="130" y="50" width="50" height="25" fill="#2a2a4e"/>
      <text class="array-text" x="155" y="67" fill="#ffe66d">-</text>

      <rect class="array-box" x="180" y="50" width="50" height="25" fill="#00d4ff" opacity="0.3"/>
      <text class="array-text" x="205" y="67" font-weight="bold">1</text>

      <rect class="array-box" x="230" y="50" width="50" height="25" fill="#00d4ff" opacity="0.3"/>
      <text class="array-text" x="255" y="67" font-weight="bold">2</text>

      <rect class="array-box" x="280" y="50" width="50" height="25" fill="#00d4ff" opacity="0.3"/>
      <text class="array-text" x="305" y="67" font-weight="bold">3</text>

      <rect class="array-box" x="330" y="50" width="50" height="25" fill="#00d4ff" opacity="0.3"/>
      <text class="array-text" x="355" y="67" font-weight="bold">4</text>

      <rect class="array-box" x="380" y="50" width="50" height="25" fill="#00d4ff" opacity="0.3"/>
      <text class="array-text" x="405" y="67" font-weight="bold">5</text>

      <rect class="array-box" x="430" y="50" width="50" height="25" fill="#00d4ff" opacity="0.3"/>
      <text class="array-text" x="455" y="67" font-weight="bold">6</text>

      <rect class="array-box" x="480" y="50" width="50" height="25" fill="#00d4ff" opacity="0.3"/>
      <text class="array-text" x="505" y="67" font-weight="bold">7</text>
    </g>

    <text class="label-text" x="130" y="100" font-size="11" fill="#4ecdc4">Note: Index 0 is unused (1-based indexing)</text>

    <!-- Example arrows -->
    <g transform="translate(0, 110)">
      <text class="label-text" x="130" y="15" font-size="11" fill="#ffe66d">Example: Node 2</text>
      <text class="label-text" x="130" y="30" font-size="10" fill="#e0e0e0">• Parent: 2/2 = 1</text>
      <text class="label-text" x="130" y="45" font-size="10" fill="#e0e0e0">• Left child: 2*2 = 4</text>
      <text class="label-text" x="130" y="60" font-size="10" fill="#e0e0e0">• Right child: 2*2+1 = 5</text>

      <text class="label-text" x="350" y="15" font-size="11" fill="#ffe66d">Example: Node 6</text>
      <text class="label-text" x="350" y="30" font-size="10" fill="#e0e0e0">• Parent: 6/2 = 3</text>
      <text class="label-text" x="350" y="45" font-size="10" fill="#e0e0e0">• Left child: 2*6 = 12 ✗</text>
      <text class="label-text" x="350" y="60" font-size="10" fill="#e0e0e0">• Right child: 2*6+1 = 13 ✗</text>
    </g>
  </g>
</svg>