<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="file-system-mounting">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#2c5aa0"/></linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#50c878"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/></linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#6a1b9a"/></linearGradient>
  </defs>
  <g data-narration="Mounting makes a file system accessible at a specific directory called the mount point. The OS verifies the file system format on the device, then attaches it to the existing directory tree.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Mount Point</text>
    <text x="110" y="65" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">Empty dir where FS attaches</text>
    <text x="110" y="80" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">OS verifies format first</text>
  </g>
  <g data-narration="The mount table records all mounted file systems with their device name, type, mount point, and options. The OS consults this table during path resolution to route I/O requests correctly.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="310" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Mount Table</text>
    <text x="310" y="65" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Records device, type, path</text>
    <text x="310" y="80" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Used for path resolution</text>
  </g>
  <g data-narration="The mount process has four steps: verify file system integrity, check the mount point directory exists, update the mount table entries, and link the new file system root to that directory.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" stroke="#880e4f" stroke-width="1.5"/>
    <text x="110" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Mount Process Steps</text>
    <text x="110" y="165" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">1. Verify FS  2. Check dir</text>
    <text x="110" y="180" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">3. Update table  4. Link root</text>
  </g>
  <g data-narration="Unmounting detaches the file system from the directory tree. All writes must be flushed first. It fails if files are still open or processes are using that directory.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" stroke="#bf360c" stroke-width="1.5"/>
    <text x="310" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Unmounting</text>
    <text x="310" y="165" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Flush writes, close files</text>
    <text x="310" y="180" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Fails if target is busy</text>
  </g>
  <text x="210" y="230" text-anchor="middle" fill="#333" font-family="Arial" font-size="16" font-weight="bold">File System Mounting</text>
  <g data-narration="In summary, mounting attaches external file systems to the directory tree. Unix uses mount points while Windows uses drive letters. The root file system is mounted first during boot.">
    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="210" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Key Summary</text>
    <circle cx="50" cy="310" r="4" fill="#ce93d8"/><text x="60" y="314" fill="#f3e5f5" font-family="Arial" font-size="10">Mount point is an empty directory for FS attachment</text>
    <circle cx="50" cy="330" r="4" fill="#ce93d8"/><text x="60" y="334" fill="#f3e5f5" font-family="Arial" font-size="10">OS verifies format, updates mount table, links root</text>
    <circle cx="50" cy="350" r="4" fill="#ce93d8"/><text x="60" y="354" fill="#f3e5f5" font-family="Arial" font-size="10">Unix: single tree with mount points; Windows: drive letters</text>
    <circle cx="50" cy="370" r="4" fill="#ce93d8"/><text x="60" y="374" fill="#f3e5f5" font-family="Arial" font-size="10">Root file system mounted first at boot from /etc/fstab</text>
  </g>
</svg>