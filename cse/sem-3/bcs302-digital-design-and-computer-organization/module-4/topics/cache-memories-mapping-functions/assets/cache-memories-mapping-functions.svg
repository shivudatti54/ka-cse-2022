<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" width="100%" height="100%" data-topic-id="cache-memories-mapping-functions">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c878"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26c6da"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Section 1: Direct Mapping -->
  <g data-narration="In direct mapped cache, each memory block maps to exactly one specific cache line determined by the index bits. This approach is simple and fast to look up, but it suffers from conflict misses when multiple blocks compete for the same cache line.">
    <rect x="20" y="20" width="180" height="80" rx="10" ry="10" fill="url(#blueGrad)" stroke="#1a237e" stroke-width="2"/>
    <text x="110" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff" font-family="Arial">Direct Mapping</text>
    <text x="110" y="54" text-anchor="middle" font-size="8" fill="#e3f2fd" font-family="Arial">One block per cache line</text>
    <text x="110" y="65" text-anchor="middle" font-size="8" fill="#e3f2fd" font-family="Arial">Simple but conflict-prone</text>
    <!-- Memory blocks to cache lines -->
    <rect x="30" y="72" width="14" height="10" rx="2" ry="2" fill="#ffffff" opacity="0.3"/>
    <rect x="30" y="84" width="14" height="10" rx="2" ry="2" fill="#ffffff" opacity="0.3"/>
    <rect x="30" y="72" width="14" height="10" rx="2" ry="2" fill="#ffffff" opacity="0.3"/>
    <text x="37" y="80" text-anchor="middle" font-size="5" fill="#ffffff" font-family="Arial">M0</text>
    <text x="37" y="92" text-anchor="middle" font-size="5" fill="#ffffff" font-family="Arial">M4</text>
    <line x1="44" y1="77" x2="70" y2="77" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="44" y1="89" x2="70" y2="77" stroke="#ffffff" stroke-width="0.8" stroke-dasharray="2,1"/>
    <polygon points="69,74 74,77 69,80" fill="#ffffff"/>
    <rect x="74" y="72" width="14" height="10" rx="2" ry="2" fill="#ffffff" opacity="0.4"/>
    <text x="81" y="80" text-anchor="middle" font-size="5" fill="#ffffff" font-family="Arial">L0</text>
    <rect x="74" y="84" width="14" height="10" rx="2" ry="2" fill="#ffffff" opacity="0.4"/>
    <text x="81" y="92" text-anchor="middle" font-size="5" fill="#ffffff" font-family="Arial">L1</text>
    <text x="150" y="80" text-anchor="middle" font-size="6" fill="#bbdefb" font-family="Arial">line = block mod N</text>
    <text x="150" y="92" text-anchor="middle" font-size="6" fill="#bbdefb" font-family="Arial">Conflict misses</text>
  </g>

  <!-- Section 2: Fully Associative -->
  <g data-narration="A fully associative cache allows any memory block to be placed in any available cache line. This provides maximum flexibility and eliminates conflict misses, but requires expensive comparison hardware to check every tag simultaneously.">
    <rect x="220" y="20" width="180" height="80" rx="10" ry="10" fill="url(#greenGrad)" stroke="#1b5e20" stroke-width="2"/>
    <text x="310" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff" font-family="Arial">Fully Associative</text>
    <text x="310" y="54" text-anchor="middle" font-size="8" fill="#e8f5e9" font-family="Arial">Block goes in any line</text>
    <text x="310" y="65" text-anchor="middle" font-size="8" fill="#e8f5e9" font-family="Arial">Flexible but costly comparators</text>
    <!-- Memory block to any cache line -->
    <rect x="232" y="74" width="14" height="10" rx="2" ry="2" fill="#ffffff" opacity="0.3"/>
    <text x="239" y="82" text-anchor="middle" font-size="5" fill="#ffffff" font-family="Arial">Blk</text>
    <line x1="246" y1="79" x2="270" y2="74" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="246" y1="79" x2="270" y2="80" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="246" y1="79" x2="270" y2="86" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="246" y1="79" x2="270" y2="92" stroke="#ffffff" stroke-width="0.8"/>
    <rect x="270" y="70" width="12" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.4"/>
    <rect x="270" y="78" width="12" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.4"/>
    <rect x="270" y="86" width="12" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.4"/>
    <rect x="270" y="94" width="12" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.4"/>
    <text x="276" y="76" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L0</text>
    <text x="276" y="84" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L1</text>
    <text x="276" y="92" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L2</text>
    <text x="276" y="100" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L3</text>
    <text x="345" y="80" text-anchor="middle" font-size="6" fill="#c8e6c9" font-family="Arial">All tags checked</text>
    <text x="345" y="92" text-anchor="middle" font-size="6" fill="#c8e6c9" font-family="Arial">No conflicts</text>
  </g>

  <!-- Section 3: Set-Associative -->
  <g data-narration="Set associative mapping divides the cache into sets with multiple lines each, known as N-way set associative. A memory block maps to a specific set but can occupy any line within that set, offering a practical compromise between direct and fully associative.">
    <rect x="20" y="120" width="180" height="80" rx="10" ry="10" fill="url(#orangeGrad)" stroke="#bf360c" stroke-width="2"/>
    <text x="110" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff" font-family="Arial">Set-Associative</text>
    <text x="110" y="154" text-anchor="middle" font-size="8" fill="#fff3e0" font-family="Arial">N-way sets, best compromise</text>
    <text x="110" y="165" text-anchor="middle" font-size="8" fill="#fff3e0" font-family="Arial">Block maps to set, any line in set</text>
    <!-- Set visual: 2-way -->
    <rect x="35" y="172" width="65" height="22" rx="3" ry="3" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="0.5"/>
    <text x="67" y="180" text-anchor="middle" font-size="6" fill="#ffffff" font-family="Arial">Set 0</text>
    <rect x="38" y="182" width="28" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
    <rect x="69" y="182" width="28" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
    <text x="52" y="189" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">Way0</text>
    <text x="83" y="189" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">Way1</text>
    <rect x="110" y="172" width="65" height="22" rx="3" ry="3" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="0.5"/>
    <text x="142" y="180" text-anchor="middle" font-size="6" fill="#ffffff" font-family="Arial">Set 1</text>
    <rect x="113" y="182" width="28" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
    <rect x="144" y="182" width="28" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
    <text x="127" y="189" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">Way0</text>
    <text x="158" y="189" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">Way1</text>
  </g>

  <!-- Section 4: Address Field Breakdown -->
  <g data-narration="The memory address is divided into three fields for cache lookup. The tag bits identify the specific block, the index or set bits select which cache line or set to check, and the offset bits locate the exact byte within the block.">
    <rect x="220" y="120" width="180" height="80" rx="10" ry="10" fill="url(#tealGrad)" stroke="#006064" stroke-width="2"/>
    <text x="310" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff" font-family="Arial">Address Fields</text>
    <text x="310" y="154" text-anchor="middle" font-size="8" fill="#e0f7fa" font-family="Arial">Tag, Index, Offset breakdown</text>
    <!-- Address field visual -->
    <rect x="235" y="162" width="50" height="16" rx="3" ry="3" fill="#ff6b6b" opacity="0.7" stroke="#ffffff" stroke-width="0.5"/>
    <text x="260" y="173" text-anchor="middle" font-size="7" font-weight="bold" fill="#ffffff" font-family="Arial">Tag</text>
    <rect x="285" y="162" width="50" height="16" rx="3" ry="3" fill="#4a90e2" opacity="0.7" stroke="#ffffff" stroke-width="0.5"/>
    <text x="310" y="173" text-anchor="middle" font-size="7" font-weight="bold" fill="#ffffff" font-family="Arial">Index</text>
    <rect x="335" y="162" width="50" height="16" rx="3" ry="3" fill="#50c878" opacity="0.7" stroke="#ffffff" stroke-width="0.5"/>
    <text x="360" y="173" text-anchor="middle" font-size="7" font-weight="bold" fill="#ffffff" font-family="Arial">Offset</text>
    <text x="260" y="190" text-anchor="middle" font-size="6" fill="#e0f7fa" font-family="Arial">Identifies</text>
    <text x="310" y="190" text-anchor="middle" font-size="6" fill="#e0f7fa" font-family="Arial">Selects</text>
    <text x="360" y="190" text-anchor="middle" font-size="6" fill="#e0f7fa" font-family="Arial">Byte in</text>
    <text x="260" y="197" text-anchor="middle" font-size="6" fill="#e0f7fa" font-family="Arial">block</text>
    <text x="310" y="197" text-anchor="middle" font-size="6" fill="#e0f7fa" font-family="Arial">line/set</text>
    <text x="360" y="197" text-anchor="middle" font-size="6" fill="#e0f7fa" font-family="Arial">block</text>
  </g>

  <!-- Center Title -->
  <text x="210" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e" font-family="Arial">Cache Mapping Functions</text>
  <text x="210" y="236" text-anchor="middle" font-size="9" fill="#4a4a4a" font-family="Arial">How memory blocks are placed in cache</text>

  <!-- Section 5: Visual Comparison of All Three Schemes -->
  <g data-narration="Comparing all three mapping schemes side by side, direct mapping is simplest with one choice, fully associative is most flexible with any choice, and set associative provides a balanced middle ground with limited choices per set.">
    <rect x="20" y="260" width="380" height="120" rx="10" ry="10" fill="url(#purpleGrad)" stroke="#4a148c" stroke-width="2"/>
    <text x="210" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff" font-family="Arial">Mapping Schemes Comparison</text>

    <!-- Direct Mapping Column -->
    <rect x="30" y="286" width="110" height="84" rx="6" ry="6" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-width="0.5"/>
    <text x="85" y="298" text-anchor="middle" font-size="8" font-weight="bold" fill="#ffffff" font-family="Arial">Direct Mapped</text>
    <!-- Memory blocks -->
    <rect x="38" y="304" width="16" height="8" rx="1" ry="1" fill="#4a90e2" opacity="0.7"/>
    <text x="46" y="311" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">B0</text>
    <rect x="38" y="314" width="16" height="8" rx="1" ry="1" fill="#ff6b6b" opacity="0.7"/>
    <text x="46" y="321" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">B1</text>
    <rect x="38" y="324" width="16" height="8" rx="1" ry="1" fill="#50c878" opacity="0.7"/>
    <text x="46" y="331" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">B2</text>
    <rect x="38" y="334" width="16" height="8" rx="1" ry="1" fill="#ffa726" opacity="0.7"/>
    <text x="46" y="341" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">B3</text>
    <!-- Arrows one-to-one -->
    <line x1="54" y1="308" x2="82" y2="308" stroke="#ffffff" stroke-width="0.7"/>
    <polygon points="81,306 85,308 81,310" fill="#ffffff"/>
    <line x1="54" y1="318" x2="82" y2="318" stroke="#ffffff" stroke-width="0.7"/>
    <polygon points="81,316 85,318 81,320" fill="#ffffff"/>
    <line x1="54" y1="328" x2="82" y2="328" stroke="#ffffff" stroke-width="0.7"/>
    <polygon points="81,326 85,328 81,330" fill="#ffffff"/>
    <line x1="54" y1="338" x2="82" y2="338" stroke="#ffffff" stroke-width="0.7"/>
    <polygon points="81,336 85,338 81,340" fill="#ffffff"/>
    <!-- Cache lines -->
    <rect x="85" y="304" width="16" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.35"/>
    <text x="93" y="311" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L0</text>
    <rect x="85" y="314" width="16" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.35"/>
    <text x="93" y="321" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L1</text>
    <rect x="85" y="324" width="16" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.35"/>
    <text x="93" y="331" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L2</text>
    <rect x="85" y="334" width="16" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.35"/>
    <text x="93" y="341" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L3</text>
    <text x="85" y="356" text-anchor="middle" font-size="6" fill="#e1bee7" font-family="Arial">One choice only</text>

    <!-- Fully Associative Column -->
    <rect x="150" y="286" width="110" height="84" rx="6" ry="6" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-width="0.5"/>
    <text x="205" y="298" text-anchor="middle" font-size="8" font-weight="bold" fill="#ffffff" font-family="Arial">Fully Associative</text>
    <!-- Memory block -->
    <rect x="158" y="314" width="16" height="10" rx="1" ry="1" fill="#4a90e2" opacity="0.7"/>
    <text x="166" y="322" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">Blk</text>
    <!-- Arrows to all lines -->
    <line x1="174" y1="316" x2="198" y2="308" stroke="#ffffff" stroke-width="0.7"/>
    <line x1="174" y1="318" x2="198" y2="318" stroke="#ffffff" stroke-width="0.7"/>
    <line x1="174" y1="320" x2="198" y2="328" stroke="#ffffff" stroke-width="0.7"/>
    <line x1="174" y1="322" x2="198" y2="338" stroke="#ffffff" stroke-width="0.7"/>
    <!-- Cache lines -->
    <rect x="198" y="304" width="16" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.35"/>
    <text x="206" y="311" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L0</text>
    <rect x="198" y="314" width="16" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.35"/>
    <text x="206" y="321" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L1</text>
    <rect x="198" y="324" width="16" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.35"/>
    <text x="206" y="331" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L2</text>
    <rect x="198" y="334" width="16" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.35"/>
    <text x="206" y="341" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">L3</text>
    <text x="205" y="356" text-anchor="middle" font-size="6" fill="#e1bee7" font-family="Arial">Any line choice</text>

    <!-- Set-Associative Column -->
    <rect x="270" y="286" width="120" height="84" rx="6" ry="6" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-width="0.5"/>
    <text x="330" y="298" text-anchor="middle" font-size="8" font-weight="bold" fill="#ffffff" font-family="Arial">2-Way Set Assoc.</text>
    <!-- Memory block -->
    <rect x="278" y="314" width="16" height="10" rx="1" ry="1" fill="#4a90e2" opacity="0.7"/>
    <text x="286" y="322" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">Blk</text>
    <!-- Arrows to set -->
    <line x1="294" y1="317" x2="318" y2="308" stroke="#ffffff" stroke-width="0.7"/>
    <line x1="294" y1="321" x2="318" y2="318" stroke="#ffffff" stroke-width="0.7"/>
    <!-- Set 0 -->
    <rect x="318" y="303" width="30" height="18" rx="2" ry="2" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="0.5"/>
    <text x="333" y="310" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">Set 0</text>
    <rect x="320" y="312" width="12" height="6" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
    <rect x="334" y="312" width="12" height="6" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
    <!-- Set 1 -->
    <rect x="318" y="325" width="30" height="18" rx="2" ry="2" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="0.5"/>
    <text x="333" y="332" text-anchor="middle" font-size="4" fill="#ffffff" font-family="Arial">Set 1</text>
    <rect x="320" y="334" width="12" height="6" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
    <rect x="334" y="334" width="12" height="6" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
    <text x="330" y="356" text-anchor="middle" font-size="6" fill="#e1bee7" font-family="Arial">Limited set choice</text>

    <!-- Labels -->
    <text x="85" y="368" text-anchor="middle" font-size="5" fill="#ce93d8" font-family="Arial">Memory</text>
    <text x="120" y="368" text-anchor="middle" font-size="5" fill="#ce93d8" font-family="Arial">Cache</text>
  </g>
</svg>