<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="file-concept">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#2c5aa0"/></linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#50c878"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/></linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#6a1b9a"/></linearGradient>
  </defs>
  <g data-narration="A file is a named collection of related information stored on secondary storage. It is the smallest logical unit of storage, persisting even when no process is using it.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">What is a File?</text>
    <text x="110" y="65" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">Named data on secondary storage</text>
    <text x="110" y="80" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">Logical unit of storage</text>
  </g>
  <g data-narration="Every file has attributes including name, unique identifier, type, location on disk, size in bytes, protection permissions, and timestamps for creation and modification.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="310" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">File Attributes</text>
    <text x="310" y="65" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Name, ID, Type, Location</text>
    <text x="310" y="80" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Size, Protection, Timestamps</text>
  </g>
  <g data-narration="The OS provides seven core file operations through system calls: create, open, read, write, seek, close, and delete. These form the complete interface for file manipulation.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" stroke="#880e4f" stroke-width="1.5"/>
    <text x="110" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">File Operations</text>
    <text x="110" y="165" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">Create, Open, Read, Write</text>
    <text x="110" y="180" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">Seek, Close, Delete</text>
  </g>
  <g data-narration="Sequential access reads records one after another, ideal for tapes and logs. Direct access allows jumping to any record position, suitable for databases and disk-based files.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" stroke="#bf360c" stroke-width="1.5"/>
    <text x="310" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Access Methods</text>
    <text x="310" y="165" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Sequential: read_next, reset</text>
    <text x="310" y="180" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Direct: jump to any record</text>
  </g>
  <text x="210" y="230" text-anchor="middle" fill="#333" font-family="Arial" font-size="16" font-weight="bold">File Concept</text>
  <g data-narration="In summary, files provide persistent named storage. They carry metadata as attributes, support standard operations via system calls, and offer sequential or direct access patterns.">
    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="210" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Key Summary</text>
    <circle cx="50" cy="310" r="4" fill="#ce93d8"/><text x="60" y="314" fill="#f3e5f5" font-family="Arial" font-size="10">Files are the basic logical storage unit on disk</text>
    <circle cx="50" cy="330" r="4" fill="#ce93d8"/><text x="60" y="334" fill="#f3e5f5" font-family="Arial" font-size="10">Seven attributes: name, ID, type, location, size, protection, time</text>
    <circle cx="50" cy="350" r="4" fill="#ce93d8"/><text x="60" y="354" fill="#f3e5f5" font-family="Arial" font-size="10">Seven operations: create, open, read, write, seek, close, delete</text>
    <circle cx="50" cy="370" r="4" fill="#ce93d8"/><text x="60" y="374" fill="#f3e5f5" font-family="Arial" font-size="10">Sequential access for tapes; direct access for disks</text>
  </g>
</svg>