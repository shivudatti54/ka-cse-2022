<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="disk-scheduling">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#2c5aa0"/></linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#50c878"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/></linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#6a1b9a"/></linearGradient>
  </defs>
  <g data-narration="FCFS services requests in arrival order. It is simple and fair but causes large random head movements. SSTF picks the nearest request, reducing seek time but risking starvation of distant requests.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">FCFS and SSTF</text>
    <text x="110" y="65" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">FCFS: arrival order, fair</text>
    <text x="110" y="80" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">SSTF: nearest first, starvation</text>
  </g>
  <g data-narration="SCAN moves the head from one end of the disk to the other like an elevator, servicing all requests in its path. When it reaches the end, it reverses direction, preventing starvation.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="310" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">SCAN (Elevator)</text>
    <text x="310" y="65" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Sweeps end to end</text>
    <text x="310" y="80" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Reverses at disk boundary</text>
  </g>
  <g data-narration="C-SCAN only services requests in one direction. At the end it jumps back to the start without servicing, providing uniform wait times. LOOK and C-LOOK reverse at the last request, not the disk edge.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" stroke="#880e4f" stroke-width="1.5"/>
    <text x="110" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">C-SCAN and LOOK</text>
    <text x="110" y="165" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">C-SCAN: one direction only</text>
    <text x="110" y="180" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">LOOK: reverse at last request</text>
  </g>
  <g data-narration="Disk access time equals seek time plus rotational latency plus transfer time. Since seek time dominates, scheduling algorithms focus on minimizing total head movement across all pending requests.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" stroke="#bf360c" stroke-width="1.5"/>
    <text x="310" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Access Time</text>
    <text x="310" y="165" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Seek + rotation + transfer</text>
    <text x="310" y="180" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Seek time dominates cost</text>
  </g>
  <text x="210" y="230" text-anchor="middle" fill="#333" font-family="Arial" font-size="16" font-weight="bold">Disk Scheduling</text>
  <g data-narration="In summary, FCFS is fair but slow. SSTF is fast but causes starvation. SCAN and C-SCAN prevent starvation with uniform service. LOOK variants optimize by not going to disk edges unnecessarily.">
    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="210" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Key Summary</text>
    <circle cx="50" cy="310" r="4" fill="#ce93d8"/><text x="60" y="314" fill="#f3e5f5" font-family="Arial" font-size="10">FCFS: simple, fair, but high total head movement</text>
    <circle cx="50" cy="330" r="4" fill="#ce93d8"/><text x="60" y="334" fill="#f3e5f5" font-family="Arial" font-size="10">SSTF: shortest seek first, fast but may starve</text>
    <circle cx="50" cy="350" r="4" fill="#ce93d8"/><text x="60" y="354" fill="#f3e5f5" font-family="Arial" font-size="10">SCAN/C-SCAN: elevator sweep, prevents starvation</text>
    <circle cx="50" cy="370" r="4" fill="#ce93d8"/><text x="60" y="374" fill="#f3e5f5" font-family="Arial" font-size="10">LOOK/C-LOOK: reverse at last request, not disk edge</text>
  </g>
</svg>