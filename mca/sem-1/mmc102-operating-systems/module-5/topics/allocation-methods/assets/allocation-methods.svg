<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 400" data-topic-id="allocation-methods">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4a90e2"/><stop offset="100%" stop-color="#2c5aa0"/></linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#50c878"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ffa726"/><stop offset="100%" stop-color="#f57c00"/></linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9c27b0"/><stop offset="100%" stop-color="#6a1b9a"/></linearGradient>
  </defs>
  <g data-narration="Contiguous allocation stores each file in consecutive disk blocks. It offers excellent sequential read performance and direct access, but suffers from external fragmentation and fixed file sizes.">
    <rect x="20" y="20" width="180" height="80" rx="8" fill="url(#grad1)" stroke="#1a237e" stroke-width="1.5"/>
    <text x="110" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Contiguous Allocation</text>
    <text x="110" y="65" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">Consecutive blocks on disk</text>
    <text x="110" y="80" text-anchor="middle" fill="#e3f2fd" font-family="Arial" font-size="10">Fast but external fragmentation</text>
  </g>
  <g data-narration="Linked allocation chains disk blocks using pointers. Each block points to the next one. There is no external fragmentation and files grow easily, but no direct access is possible.">
    <rect x="220" y="20" width="180" height="80" rx="8" fill="url(#grad2)" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="310" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Linked Allocation</text>
    <text x="310" y="65" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">Blocks chained by pointers</text>
    <text x="310" y="80" text-anchor="middle" fill="#e8f5e9" font-family="Arial" font-size="10">No fragmentation, no direct</text>
  </g>
  <g data-narration="Indexed allocation uses a dedicated index block that stores pointers to all data blocks of a file. This supports direct access without fragmentation. Unix inodes use this approach.">
    <rect x="20" y="120" width="180" height="80" rx="8" fill="url(#grad3)" stroke="#880e4f" stroke-width="1.5"/>
    <text x="110" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Indexed Allocation</text>
    <text x="110" y="165" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">Index block holds all pointers</text>
    <text x="110" y="180" text-anchor="middle" fill="#ffebee" font-family="Arial" font-size="10">Direct access, no fragmentation</text>
  </g>
  <g data-narration="The FAT file allocation table is a variation of linked allocation. It moves block pointers into a separate table cached in memory, providing faster access than basic linked allocation.">
    <rect x="220" y="120" width="180" height="80" rx="8" fill="url(#grad4)" stroke="#bf360c" stroke-width="1.5"/>
    <text x="310" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">FAT Variation</text>
    <text x="310" y="165" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Pointers in separate table</text>
    <text x="310" y="180" text-anchor="middle" fill="#fff3e0" font-family="Arial" font-size="10">Cached in memory for speed</text>
  </g>
  <text x="210" y="230" text-anchor="middle" fill="#333" font-family="Arial" font-size="16" font-weight="bold">Allocation Methods</text>
  <g data-narration="In summary, contiguous is fastest but fragments. Linked eliminates fragmentation but loses direct access. Indexed combines both benefits. Unix inodes use multi-level indexed allocation.">
    <rect x="20" y="260" width="380" height="120" rx="8" fill="url(#grad5)" stroke="#4a148c" stroke-width="1.5"/>
    <text x="210" y="285" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">Key Summary</text>
    <circle cx="50" cy="310" r="4" fill="#ce93d8"/><text x="60" y="314" fill="#f3e5f5" font-family="Arial" font-size="10">Contiguous: fast sequential, external fragmentation</text>
    <circle cx="50" cy="330" r="4" fill="#ce93d8"/><text x="60" y="334" fill="#f3e5f5" font-family="Arial" font-size="10">Linked: no fragmentation, no direct access, pointer overhead</text>
    <circle cx="50" cy="350" r="4" fill="#ce93d8"/><text x="60" y="354" fill="#f3e5f5" font-family="Arial" font-size="10">Indexed: direct access, index block overhead per file</text>
    <circle cx="50" cy="370" r="4" fill="#ce93d8"/><text x="60" y="374" fill="#f3e5f5" font-family="Arial" font-size="10">Unix inodes: multi-level index for large file support</text>
  </g>
</svg>