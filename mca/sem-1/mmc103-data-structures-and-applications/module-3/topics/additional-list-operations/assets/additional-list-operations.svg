<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes slideIn {
        from { transform: translateX(-50px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      @keyframes pointerFlip {
        0% { d: path("M 0,0 L 10,-5 L 10,5 Z"); }
        50% { d: path("M 0,0 L 5,-8 L 5,8 Z"); }
        100% { d: path("M 0,0 L -10,-5 L -10,5 Z"); }
      }

      @keyframes highlight {
        0%, 100% { fill: #00d4ff; }
        50% { fill: #ffe66d; }
      }

      @keyframes pathGrow {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      @keyframes movePointer {
        0% { transform: translateX(0); }
        100% { transform: translateX(60px); }
      }

      @keyframes concatenate {
        0% { transform: translateY(0); }
        100% { transform: translateY(-80px); }
      }

      .node {
        fill: #1a1a2e;
        stroke: #00d4ff;
        stroke-width: 2;
      }

      .node-text {
        fill: #e0e0e0;
        font-family: monospace;
        font-size: 18px;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .arrow {
        stroke: #00d4ff;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
      }

      .arrow-reverse {
        stroke: #ff6b6b;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead-reverse);
      }

      .label {
        fill: #e0e0e0;
        font-family: sans-serif;
        font-size: 14px;
      }

      .title {
        fill: #00d4ff;
        font-family: sans-serif;
        font-size: 20px;
        font-weight: bold;
      }

      .subtitle {
        fill: #4ecdc4;
        font-family: sans-serif;
        font-size: 16px;
      }

      .pointer-label {
        fill: #ffe66d;
        font-family: monospace;
        font-size: 12px;
      }

      .null-text {
        fill: #ff6b6b;
        font-family: monospace;
        font-size: 14px;
      }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00d4ff" />
    </marker>

    <marker id="arrowhead-reverse" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="25" class="title" text-anchor="middle">Advanced Linked List Operations</text>

  <!-- ============ CONCATENATION SECTION ============ -->
  <g id="concatenation-section">
    <text x="50" y="60" class="subtitle">1. List Concatenation</text>

    <!-- List 1 -->
    <g id="list1">
      <rect x="50" y="75" width="50" height="35" class="node" style="animation: fadeIn 0.5s ease-in-out;"/>
      <text x="75" y="92.5" class="node-text" style="animation: fadeIn 0.5s ease-in-out;">A</text>
      <line x1="100" y1="92.5" x2="130" y2="92.5" class="arrow" style="animation: fadeIn 0.5s ease-in-out 0.5s; opacity: 0; animation-fill-mode: forwards;"/>

      <rect x="130" y="75" width="50" height="35" class="node" style="animation: fadeIn 0.5s ease-in-out 0.5s; opacity: 0; animation-fill-mode: forwards;"/>
      <text x="155" y="92.5" class="node-text" style="animation: fadeIn 0.5s ease-in-out 0.5s; opacity: 0; animation-fill-mode: forwards;">B</text>
      <line x1="180" y1="92.5" x2="210" y2="92.5" class="arrow" style="animation: fadeIn 0.5s ease-in-out 1s; opacity: 0; animation-fill-mode: forwards;"/>

      <text x="225" y="92.5" class="null-text" style="animation: fadeIn 0.5s ease-in-out 1s; opacity: 0; animation-fill-mode: forwards;">NULL</text>
      <text x="50" y="125" class="label" style="animation: fadeIn 0.5s ease-in-out;">List 1</text>
    </g>

    <!-- List 2 -->
    <g id="list2">
      <rect x="350" y="75" width="50" height="35" class="node" style="animation: fadeIn 0.5s ease-in-out 1.5s; opacity: 0; animation-fill-mode: forwards;"/>
      <text x="375" y="92.5" class="node-text" style="animation: fadeIn 0.5s ease-in-out 1.5s; opacity: 0; animation-fill-mode: forwards;">X</text>
      <line x1="400" y1="92.5" x2="430" y2="92.5" class="arrow" style="animation: fadeIn 0.5s ease-in-out 2s; opacity: 0; animation-fill-mode: forwards;"/>

      <rect x="430" y="75" width="50" height="35" class="node" style="animation: fadeIn 0.5s ease-in-out 2s; opacity: 0; animation-fill-mode: forwards;"/>
      <text x="455" y="92.5" class="node-text" style="animation: fadeIn 0.5s ease-in-out 2s; opacity: 0; animation-fill-mode: forwards;">Y</text>
      <line x1="480" y1="92.5" x2="510" y2="92.5" class="arrow" style="animation: fadeIn 0.5s ease-in-out 2.5s; opacity: 0; animation-fill-mode: forwards;"/>

      <text x="525" y="92.5" class="null-text" style="animation: fadeIn 0.5s ease-in-out 2.5s; opacity: 0; animation-fill-mode: forwards;">NULL</text>
      <text x="350" y="125" class="label" style="animation: fadeIn 0.5s ease-in-out 1.5s; opacity: 0; animation-fill-mode: forwards;">List 2</text>
    </g>

    <!-- New pointer from B to X -->
    <line x1="180" y1="92.5" x2="350" y2="92.5" class="arrow" style="stroke: #ffe66d; stroke-width: 3; animation: fadeIn 0.8s ease-in-out 3s; opacity: 0; animation-fill-mode: forwards; stroke-dasharray: 5,5;"/>

    <!-- Result label -->
    <text x="50" y="150" class="label" style="fill: #4ecdc4; animation: fadeIn 0.5s ease-in-out 3.5s; opacity: 0; animation-fill-mode: forwards;">Result: A → B → X → Y → NULL</text>
  </g>

  <!-- ============ REVERSAL SECTION ============ -->
  <g id="reversal-section">
    <text x="50" y="200" class="subtitle">2. In-Place Reversal (3-Pointer Technique)</text>

    <!-- Step 1: Original -->
    <g id="step1" style="animation: fadeIn 0.5s ease-in-out 4s; opacity: 0; animation-fill-mode: forwards;">
      <text x="50" y="225" class="label">Step 1: Original List</text>

      <rect x="50" y="235" width="50" height="35" class="node"/>
      <text x="75" y="252.5" class="node-text">1</text>
      <line x1="100" y1="252.5" x2="130" y2="252.5" class="arrow"/>

      <rect x="130" y="235" width="50" height="35" class="node"/>
      <text x="155" y="252.5" class="node-text">2</text>
      <line x1="180" y1="252.5" x2="210" y2="252.5" class="arrow"/>

      <rect x="210" y="235" width="50" height="35" class="node"/>
      <text x="235" y="252.5" class="node-text">3</text>
      <line x1="260" y1="252.5" x2="290" y2="252.5" class="arrow"/>

      <text x="305" y="252.5" class="null-text">NULL</text>

      <!-- Pointers -->
      <text x="60" y="285" class="pointer-label">prev</text>
      <line x1="70" y1="280" x2="70" y2="270" stroke="#ffe66d" stroke-width="2" marker-end="url(#arrowhead)"/>
      <circle cx="45" cy="285" r="3" fill="#ffe66d"/>
      <text x="30" y="290" class="null-text" font-size="10">NULL</text>

      <text x="140" y="285" class="pointer-label">curr</text>
      <line x1="150" y1="280" x2="150" y2="270" stroke="#ffe66d" stroke-width="2" marker-end="url(#arrowhead)"/>

      <text x="220" y="285" class="pointer-label">next</text>
      <line x1="230" y1="280" x2="230" y2="270" stroke="#ffe66d" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>

    <!-- Step 2: After first reversal -->
    <g id="step2" style="animation: fadeIn 0.5s ease-in-out 5.5s; opacity: 0; animation-fill-mode: forwards;">
      <text x="50" y="315" class="label">Step 2: Reverse first pointer</text>

      <rect x="50" y="325" width="50" height="35" class="node"/>
      <text x="75" y="342.5" class="node-text">1</text>
      <line x1="100" y1="342.5" x2="130" y2="342.5" class="arrow-reverse"/>

      <rect x="130" y="325" width="50" height="35" class="node" style="fill: #2a2a3e;"/>
      <text x="155" y="342.5" class="node-text">2</text>
      <line x1="180" y1="342.5" x2="210" y2="342.5" class="arrow"/>

      <rect x="210" y="325" width="50" height="35" class="node"/>
      <text x="235" y="342.5" class="node-text">3</text>
      <line x1="260" y1="342.5" x2="290" y2="342.5" class="arrow"/>

      <text x="305" y="342.5" class="null-text">NULL</text>

      <!-- Updated pointers -->
      <text x="140" y="375" class="pointer-label">prev</text>
      <line x1="150" y1="370" x2="150" y2="360" stroke="#ffe66d" stroke-width="2" marker-end="url(#arrowhead)"/>

      <text x="220" y="375" class="pointer-label">curr</text>
      <line x1="230" y1="370" x2="230" y2="360" stroke="#ffe66d" stroke-width="2" marker-end="url(#arrowhead)"/>

      <text x="255" y="375" class="pointer-label">next</text>
    </g>

    <!-- Step 3: Final result -->
    <g id="step3" style="animation: fadeIn 0.5s ease-in-out 7s; opacity: 0; animation-fill-mode: forwards;">
      <text x="50" y="405" class="label">Step 3: Fully Reversed</text>

      <rect x="50" y="415" width="50" height="35" class="node"/>
      <text x="75" y="432.5" class="node-text">1</text>
      <line x1="100" y1="432.5" x2="130" y2="432.5" class="arrow-reverse"/>

      <rect x="130" y="415" width="50" height="35" class="node"/>
      <text x="155" y="432.5" class="node-text">2</text>
      <line x1="180" y1="432.5" x2="210" y2="432.5" class="arrow-reverse"/>

      <rect x="210" y="415" width="50" height="35" class="node" style="fill: #2a2a3e;"/>
      <text x="235" y="432.5" class="node-text">3</text>

      <text x="30" y="432.5" class="null-text">NULL</text>
      <line x1="45" y1="432.5" x2="50" y2="432.5" stroke="#ff6b6b" stroke-width="2"/>

      <text x="220" y="465" class="pointer-label">new head</text>
      <line x1="235" y1="460" x2="235" y2="450" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
  </g>

  <!-- ============ CYCLE DETECTION SECTION ============ -->
  <g id="cycle-section">
    <text x="420" y="200" class="subtitle">3. Floyd's Cycle Detection</text>

    <g style="animation: fadeIn 0.5s ease-in-out 8.5s; opacity: 0; animation-fill-mode: forwards;">
      <text x="420" y="225" class="label">Tortoise and Hare Algorithm</text>

      <!-- List with cycle -->
      <rect x="420" y="240" width="40" height="35" class="node"/>
      <text x="440" y="257.5" class="node-text">1</text>
      <line x1="460" y1="257.5" x2="485" y2="257.5" class="arrow"/>

      <rect x="485" y="240" width="40" height="35" class="node"/>
      <text x="505" y="257.5" class="node-text">2</text>
      <line x1="525" y1="257.5" x2="550" y2="257.5" class="arrow"/>

      <rect x="550" y="240" width="40" height="35" class="node"/>
      <text x="570" y="257.5" class="node-text">3</text>
      <line x1="590" y1="257.5" x2="615" y2="257.5" class="arrow"/>

      <rect x="615" y="240" width="40" height="35" class="node"/>
      <text x="635" y="257.5" class="node-text">4</text>
      <line x1="655" y1="257.5" x2="680" y2="257.5" class="arrow"/>

      <rect x="680" y="240" width="40" height="35" class="node"/>
      <text x="700" y="257.5" class="node-text">5</text>

      <!-- Cycle back arrow -->
      <path d="M 700 275 Q 700 310, 570 310 Q 570 300, 570 275" class="arrow" style="stroke: #ff6b6b; stroke-width: 2; fill: none;"/>
      <text x="620" y="325" class="label" style="fill: #ff6b6b; font-size: 12px;">Cycle detected!</text>

      <!-- Slow pointer (tortoise) -->
      <g style="animation: movePointer 6s ease-in-out 9s infinite;">
        <circle cx="440" cy="230" r="6" fill="#4ecdc4" opacity="0.8"/>
        <text x="425" y="220" class="pointer-label" font-size="10">slow</text>
      </g>

      <!-- Fast pointer (hare) -->
      <g style="animation: movePointer 3s ease-in-out 9s infinite;">
        <circle cx="440" cy="235" r="6" fill="#ffe66d" opacity="0.8"/>
        <text x="455" y="220" class="pointer-label" font-size="10">fast</text>
      </g>
    </g>
  </g>

  <!-- ============ CODE SNIPPET ============ -->
  <g id="code-section" style="animation: fadeIn 1s ease-in-out 10s; opacity: 0; animation-fill-mode: forwards;">
    <text x="420" y="370" class="subtitle">Reversal Code:</text>
    <rect x="420" y="380" width="350" height="180" fill="#0a0a1a" stroke="#00d4ff" stroke-width="1" rx="5"/>

    <text x="430" y="400" class="label" font-family="monospace" font-size="11">
      <tspan x="430" dy="0">Node* reverse(Node* head) {</tspan>
      <tspan x="440" dy="15">  Node *prev = NULL;</tspan>
      <tspan x="440" dy="15">  Node *curr = head;</tspan>
      <tspan x="440" dy="15">  Node *next = NULL;</tspan>
      <tspan x="440" dy="15">  while (curr != NULL) {</tspan>
      <tspan x="450" dy="15">    next = curr-&gt;next;</tspan>
      <tspan x="450" dy="15" fill="#ffe66d">    curr-&gt;next = prev;</tspan>
      <tspan x="450" dy="15">    prev = curr;</tspan>
      <tspan x="450" dy="15">    curr = next;</tspan>
      <tspan x="440" dy="15">  }</tspan>
      <tspan x="440" dy="15">  return prev;</tspan>
      <tspan x="430" dy="15">}</tspan>
    </text>
  </g>

  <!-- Legend -->
  <g id="legend" style="animation: fadeIn 1s ease-in-out 11s; opacity: 0; animation-fill-mode: forwards;">
    <text x="50" y="530" class="label" font-size="12">Legend:</text>
    <line x1="50" y1="545" x2="90" y2="545" class="arrow"/>
    <text x="95" y="548" class="label" font-size="11">Forward pointer</text>

    <line x1="180" y1="545" x2="220" y2="545" class="arrow-reverse"/>
    <text x="225" y="548" class="label" font-size="11">Reversed pointer</text>

    <circle cx="330" cy="543" r="5" fill="#ffe66d"/>
    <text x="340" y="548" class="label" font-size="11">Active pointer</text>

    <rect x="440" y="537" width="15" height="15" fill="#2a2a3e" stroke="#00d4ff" stroke-width="1"/>
    <text x="460" y="548" class="label" font-size="11">Current processing node</text>
  </g>
</svg>