<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fillSlot1 {
        0%, 15% { opacity: 0; }
        20%, 100% { opacity: 1; }
      }

      @keyframes fillSlot2 {
        0%, 30% { opacity: 0; }
        35%, 100% { opacity: 1; }
      }

      @keyframes fillSlot3 {
        0%, 45% { opacity: 0; }
        50%, 100% { opacity: 1; }
      }

      @keyframes fillSlot4 {
        0%, 60% { opacity: 0; }
        65%, 74% { opacity: 1; }
        75%, 100% { opacity: 0.3; }
      }

      @keyframes sizeCounter {
        0% { opacity: 1; }
        20% { opacity: 1; }
        21% { opacity: 0; }
        22%, 35% { opacity: 1; }
        36% { opacity: 0; }
        37%, 50% { opacity: 1; }
        51% { opacity: 0; }
        52%, 65% { opacity: 1; }
        66%, 100% { opacity: 1; }
      }

      @keyframes reallocIndicator {
        0%, 65% { opacity: 0; }
        70%, 90% { opacity: 1; }
        100% { opacity: 0; }
      }

      @keyframes oldArrayFade {
        0%, 75% { opacity: 1; }
        90%, 100% { opacity: 0.2; }
      }

      @keyframes newArrayAppear {
        0%, 75% { opacity: 0; }
        90%, 100% { opacity: 1; }
      }

      @keyframes capacityUpdate {
        0%, 75% { opacity: 1; }
        80%, 100% { opacity: 0; }
      }

      @keyframes newCapacity {
        0%, 80% { opacity: 0; }
        85%, 100% { opacity: 1; }
      }

      .title { font: bold 32px sans-serif; fill: #00d4ff; text-anchor: middle; }
      .element { fill: #00d4ff; stroke: #e0e0e0; stroke-width: 2; }
      .empty { fill: none; stroke: #e0e0e0; stroke-width: 2; stroke-dasharray: 5,5; }
      .element-text { font: bold 18px sans-serif; fill: #1a1a2e; text-anchor: middle; }
      .label { font: bold 20px sans-serif; fill: #ffe66d; }
      .counter { font: bold 24px sans-serif; fill: #4ecdc4; }
      .info { font: 16px sans-serif; fill: #e0e0e0; text-anchor: middle; }

      .fill-1 { animation: fillSlot1 12s infinite; }
      .fill-2 { animation: fillSlot2 12s infinite; }
      .fill-3 { animation: fillSlot3 12s infinite; }
      .fill-4 { animation: fillSlot4 12s infinite; }
      .realloc { animation: reallocIndicator 12s infinite; }
      .old-array { animation: oldArrayFade 12s infinite; }
      .new-array { animation: newArrayAppear 12s infinite; }
      .cap-old { animation: capacityUpdate 12s infinite; }
      .cap-new { animation: newCapacity 12s infinite; }
    </style>
  </defs>

  <rect width="800" height="600" fill="#1a1a2e"/>

  <text x="400" y="50" class="title">Dynamic Allocated Arrays</text>

  <!-- Initial state -->
  <g class="old-array">
    <text class="label" x="50" y="130">Initial Array:</text>
    <text class="label cap-old" x="600" y="130">Capacity: 4</text>

    <!-- Array slots -->
    <g transform="translate(100, 150)">
      <rect class="empty" width="70" height="70" rx="3"/>
      <text class="element-text" x="35" y="95" style="fill: #e0e0e0;">0</text>
    </g>
    <g transform="translate(180, 150)" class="fill-1">
      <rect class="element" width="70" height="70" rx="3"/>
      <text class="element-text" x="35" y="45">A</text>
      <text class="element-text" x="35" y="95" style="fill: #e0e0e0;">1</text>
    </g>
    <g transform="translate(260, 150)" class="fill-2">
      <rect class="element" width="70" height="70" rx="3"/>
      <text class="element-text" x="35" y="45">B</text>
      <text class="element-text" x="35" y="95" style="fill: #e0e0e0;">2</text>
    </g>
    <g transform="translate(340, 150)" class="fill-3">
      <rect class="element" width="70" height="70" rx="3"/>
      <text class="element-text" x="35" y="45">C</text>
      <text class="element-text" x="35" y="95" style="fill: #e0e0e0;">3</text>
    </g>
    <g transform="translate(420, 150)" class="fill-4">
      <rect class="element" width="70" height="70" rx="3"/>
      <text class="element-text" x="35" y="45">D</text>
      <text class="element-text" x="35" y="95" style="fill: #e0e0e0;">4</text>
    </g>

    <!-- Size indicator -->
    <text class="label" x="50" y="270">Size:</text>
    <text class="counter" x="120" y="270">
      <tspan>0</tspan>
      <tspan class="fill-1">→1</tspan>
      <tspan class="fill-2">→2</tspan>
      <tspan class="fill-3">→3</tspan>
      <tspan class="fill-4">→4</tspan>
    </text>
  </g>

  <!-- Realloc indicator -->
  <g class="realloc">
    <rect x="150" y="310" width="300" height="50" rx="5" fill="#ff6b6b" opacity="0.3"/>
    <text x="300" y="340" style="font: bold 22px sans-serif; fill: #ff6b6b; text-anchor: middle;">
      ARRAY FULL! REALLOC...
    </text>
  </g>

  <!-- New doubled array -->
  <g class="new-array">
    <text class="label" x="50" y="410">After Realloc:</text>
    <text class="label cap-new" x="600" y="410">Capacity: 8</text>

    <!-- Copied elements -->
    <g transform="translate(60, 430)">
      <rect class="empty" width="60" height="60" rx="3"/>
      <text class="element-text" x="30" y="80" style="fill: #e0e0e0; font-size: 14px;">0</text>
    </g>
    <g transform="translate(125, 430)">
      <rect class="element" width="60" height="60" rx="3"/>
      <text class="element-text" x="30" y="40">A</text>
      <text class="element-text" x="30" y="80" style="fill: #e0e0e0; font-size: 14px;">1</text>
    </g>
    <g transform="translate(190, 430)">
      <rect class="element" width="60" height="60" rx="3"/>
      <text class="element-text" x="30" y="40">B</text>
      <text class="element-text" x="30" y="80" style="fill: #e0e0e0; font-size: 14px;">2</text>
    </g>
    <g transform="translate(255, 430)">
      <rect class="element" width="60" height="60" rx="3"/>
      <text class="element-text" x="30" y="40">C</text>
      <text class="element-text" x="30" y="80" style="fill: #e0e0e0; font-size: 14px;">3</text>
    </g>
    <g transform="translate(320, 430)">
      <rect class="element" width="60" height="60" rx="3"/>
      <text class="element-text" x="30" y="40">D</text>
      <text class="element-text" x="30" y="80" style="fill: #e0e0e0; font-size: 14px;">4</text>
    </g>

    <!-- Empty slots in new array -->
    <g transform="translate(385, 430)">
      <rect class="empty" width="60" height="60" rx="3"/>
      <text class="element-text" x="30" y="80" style="fill: #e0e0e0; font-size: 14px;">5</text>
    </g>
    <g transform="translate(450, 430)">
      <rect class="empty" width="60" height="60" rx="3"/>
      <text class="element-text" x="30" y="80" style="fill: #e0e0e0; font-size: 14px;">6</text>
    </g>
    <g transform="translate(515, 430)">
      <rect class="empty" width="60" height="60" rx="3"/>
      <text class="element-text" x="30" y="80" style="fill: #e0e0e0; font-size: 14px;">7</text>
    </g>

    <text class="counter" x="120" y="535">Size: 4</text>
  </g>

  <!-- Explanation -->
  <text class="info" x="400" y="575">When capacity is reached, allocate new array with double the capacity</text>
</svg>
