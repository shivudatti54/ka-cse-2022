<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1976d2" text-anchor="middle">Evaluation and Conversion of Expressions</text>

  <!-- Step 1: Three Notations Overview -->
  <g class="step" id="step1" data-narration="Expressions can be written in three notations. Infix places operator between operands like A plus B. Prefix places operator before operands. Postfix places operator after operands.">
    <rect x="20" y="45" width="760" height="75" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="68" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">Three Expression Notations</text>
    
    <!-- Infix box -->
    <g transform="translate(60, 85)">
      <rect x="0" y="0" width="200" height="28" fill="#ffffff" stroke="#1976d2" rx="4"/>
      <text x="100" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1976d2" text-anchor="middle">INFIX: A + B</text>
    </g>
    
    <!-- Prefix box -->
    <g transform="translate(300, 85)">
      <rect x="0" y="0" width="200" height="28" fill="#e8f5e9" stroke="#388e3c" rx="4"/>
      <text x="100" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#388e3c" text-anchor="middle">PREFIX: + A B</text>
    </g>
    
    <!-- Postfix box -->
    <g transform="translate(540, 85)">
      <rect x="0" y="0" width="200" height="28" fill="#fff3e0" stroke="#ff9800" rx="4"/>
      <text x="100" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ff9800" text-anchor="middle">POSTFIX: A B +</text>
    </g>
  </g>

  <!-- Step 2: Why Postfix Matters -->
  <g class="step" id="step2" data-narration="Computers prefer postfix notation because it needs no parentheses or precedence rules. A simple left-to-right scan with a stack evaluates it easily.">
    <rect x="20" y="130" width="760" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="400" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">Why Computers Prefer Postfix</text>
    <text x="400" y="178" font-family="Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">No parentheses needed • No precedence rules needed • Easy stack evaluation • Efficient for compilers</text>
  </g>

  <!-- Step 3: Operator Precedence Table -->
  <g class="step" id="step3" data-narration="Operator precedence determines evaluation order. Exponentiation has highest precedence. Multiplication and division come next. Addition and subtraction have lowest precedence.">
    <rect x="20" y="200" width="760" height="60" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="8"/>
    <text x="400" y="223" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9c27b0" text-anchor="middle">Operator Precedence Table</text>
    
    <!-- Precedence boxes -->
    <g transform="translate(120, 235)">
      <rect x="0" y="0" width="140" height="22" fill="#f8bbd9" stroke="#9c27b0" rx="4"/>
      <text x="70" y="16" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9c27b0" text-anchor="middle">^ (Highest)</text>
    </g>
    <g transform="translate(330, 235)">
      <rect x="0" y="0" width="140" height="22" fill="#ffcdd2" stroke="#f44336" rx="4"/>
      <text x="70" y="16" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f44336" text-anchor="middle">*, /, %</text>
    </g>
    <g transform="translate(540, 235)">
      <rect x="0" y="0" width="140" height="22" fill="#c8e6c9" stroke="#388e3c" rx="4"/>
      <text x="70" y="16" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#388e3c" text-anchor="middle">+, - (Lowest)</text>
    </g>
  </g>

  <!-- Step 4: Infix to Postfix Conversion Algorithm -->
  <g class="step" id="step4" data-narration="The conversion algorithm scans left to right. Operands go directly to output. Operators push to stack, popping when higher precedence is found. Parentheses create barriers.">
    <rect x="20" y="270" width="760" height="70" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="8"/>
    <text x="400" y="293" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff9800" text-anchor="middle">Infix to Postfix Conversion Rules</text>
    <text x="400" y="315" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">Operand → Output | ( → Push | ) → Pop until ( | Operator → Pop higher precedence, then push</text>
    <text x="400" y="332" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">After scanning: Pop all remaining operators</text>
  </g>

  <!-- Step 5: Conversion Example with Parentheses -->
  <g class="step" id="step5" data-narration="Let's convert open parenthesis A plus B close parenthesis times open parenthesis C minus D close parenthesis. This shows how parentheses override normal precedence rules.">
    <rect x="20" y="350" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
    <text x="400" y="373" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1976d2" text-anchor="middle">Example: (A + B) * (C - D)</text>
    
    <!-- Input -->
    <g transform="translate(60, 390)">
      <text x="40" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2" text-anchor="middle">Input</text>
      <rect x="0" y="5" width="80" height="30" fill="#1976d2" rx="4"/>
      <text x="40" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">( A + B</text>
    </g>
    
    <!-- Stack -->
    <g transform="translate(200, 390)">
      <text x="40" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2" text-anchor="middle">Stack</text>
      <rect x="0" y="5" width="80" height="30" fill="none" stroke="#1976d2" stroke-width="2" stroke-dasharray="4,2" rx="4"/>
      <text x="40" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976d2" text-anchor="middle">(</text>
    </g>
    
    <!-- Arrow -->
    <path d="M 300 405 L 350 405" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Output -->
    <g transform="translate(370, 390)">
      <text x="60" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2" text-anchor="middle">Output</text>
      <rect x="0" y="5" width="120" height="30" fill="#ffffff" stroke="#1976d2" stroke-width="2" rx="4"/>
      <text x="60" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976d2" text-anchor="middle">A B +</text>
    </g>
  </g>

  <!-- Step 6: Postfix Evaluation Algorithm -->
  <g class="step" id="step6" data-narration="To evaluate postfix, scan left to right pushing operands. When an operator appears, pop two operands apply the operator and push the result back.">
    <rect x="20" y="440" width="760" height="70" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="8"/>
    <text x="400" y="463" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">Postfix Evaluation Algorithm</text>
    <text x="400" y="488" font-family="Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">Create empty operand stack. Scan left to right. Operand → Push. Operator → Pop two, apply (first pop is RIGHT operand), push result.</text>
  </g>

  <!-- Step 7: Evaluation Example -->
  <g class="step" id="step7" data-narration="For postfix five three two asterisk plus four hyphen, we push five three two, then multiply to get six, then add to get eleven, then subtract four to get seven.">
    <rect x="20" y="520" width="760" height="70" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="8"/>
    <text x="400" y="543" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f44336" text-anchor="middle">Evaluation: 5 3 2 * + 4 - = 7</text>
    
    <!-- Stack progression -->
    <g transform="translate(60, 560)">
      <rect x="0" y="0" width="60" height="25" fill="#ffcdd2" stroke="#f44336" rx="3"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f44336" text-anchor="middle">5</text>
    </g>
    <g transform="translate(130, 560)">
      <rect x="0" y="0" width="60" height="25" fill="#ffcdd2" stroke="#f44336" rx="3"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f44336" text-anchor="middle">5,3</text>
    </g>
    <g transform="translate(200, 560)">
      <rect x="0" y="0" width="60" height="25" fill="#ffcdd2" stroke="#f44336" rx="3"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f44336" text-anchor="middle">5,3,2</text>
    </g>
    <g transform="translate(270, 560)">
      <rect x="0" y="0" width="60" height="25" fill="#ef9a9a" stroke="#f44336" rx="3"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f44336" text-anchor="middle">5,6</text>
    </g>
    <g transform="translate(340, 560)">
      <rect x="0" y="0" width="60" height="25" fill="#ef9a9a" stroke="#f44336" rx="3"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f44336" text-anchor="middle">11</text>
    </g>
    <g transform="translate(410, 560)">
      <rect x="0" y="0" width="60" height="25" fill="#ef9a9a" stroke="#f44336" rx="3"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f44336" text-anchor="middle">11,4</text>
    </g>
    <g transform="translate(480, 560)">
      <rect x="0" y="0" width="60" height="25" fill="#e57373" stroke="#f44336" rx="3"/>
      <text x="30" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f44336" text-anchor="middle">7</text>
    </g>
    
    <text x="660" y="578" font-family="Arial, sans-serif" font-size="13" font-style="italic" fill="#f44336" text-anchor="middle">Result!</text>
  </g>
</svg>