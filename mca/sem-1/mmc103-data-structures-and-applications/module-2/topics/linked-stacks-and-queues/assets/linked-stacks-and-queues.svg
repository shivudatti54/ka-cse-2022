<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      @keyframes pushStack {
        0%, 15% { opacity: 0; transform: translateY(-30px); }
        20%, 35% { opacity: 1; transform: translateY(0); }
        40%, 100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes enqueueQueue {
        0%, 40% { opacity: 0; transform: translateX(30px); }
        45%, 60% { opacity: 1; transform: translateX(0); }
        65%, 100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes highlight {
        0%, 100% { fill: #4ecdc4; }
        50% { fill: #ff6b6b; }
      }
      @keyframes pointerPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .node-box { fill: #2a2a3e; stroke: #00d4ff; stroke-width: 2; }
      .node-text { fill: #e0e0e0; font-family: monospace; font-size: 16px; }
      .label { fill: #ffe66d; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .title { fill: #e0e0e0; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; }
      .pointer { fill: #ff6b6b; font-family: monospace; font-size: 12px; }
      .arrow-line { stroke: #4ecdc4; stroke-width: 2; fill: none; }
      .arrow-head { fill: #4ecdc4; }
      .new-node { animation: pushStack 8s infinite; }
      .new-queue-node { animation: enqueueQueue 8s infinite; }
      .highlight-box { animation: highlight 4s infinite; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="arrow-head"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">Linked Stacks and Queues</text>

  <!-- Dividing line -->
  <line x1="400" y1="70" x2="400" y2="580" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- STACK Section (Left) -->
  <text x="200" y="90" text-anchor="middle" class="label">LINKED STACK (LIFO)</text>

  <!-- TOP pointer for stack -->
  <text x="80" y="130" class="pointer" style="animation: pointerPulse 2s infinite;">TOP →</text>

  <!-- Stack Node 1 (New - being pushed) -->
  <g class="new-node">
    <rect x="140" y="110" width="120" height="50" class="node-box"/>
    <text x="160" y="135" class="node-text">data: 30</text>
    <text x="160" y="150" class="node-text">next →</text>
    <line x1="230" y1="148" x2="180" y2="178" class="arrow-line" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Stack Node 2 -->
  <rect x="140" y="180" width="120" height="50" class="node-box"/>
  <text x="160" y="205" class="node-text">data: 20</text>
  <text x="160" y="220" class="node-text">next →</text>
  <line x1="200" y1="230" x2="200" y2="248" class="arrow-line" marker-end="url(#arrowhead)"/>

  <!-- Stack Node 3 -->
  <rect x="140" y="250" width="120" height="50" class="node-box"/>
  <text x="160" y="275" class="node-text">data: 10</text>
  <text x="160" y="290" class="node-text">next →</text>
  <line x1="200" y1="300" x2="200" y2="318" class="arrow-line" marker-end="url(#arrowhead)"/>

  <!-- Stack Node 4 (Bottom) -->
  <rect x="140" y="320" width="120" height="50" class="node-box"/>
  <text x="160" y="345" class="node-text">data: 5</text>
  <text x="160" y="360" class="node-text">next: NULL</text>

  <!-- Stack Operations -->
  <text x="200" y="410" text-anchor="middle" class="label" style="font-size: 12px;">Operations:</text>
  <text x="200" y="430" text-anchor="middle" class="node-text" style="font-size: 12px;">• push() - Insert at TOP</text>
  <text x="200" y="450" text-anchor="middle" class="node-text" style="font-size: 12px;">• pop() - Remove from TOP</text>
  <text x="200" y="470" text-anchor="middle" class="node-text" style="font-size: 12px;">• peek() - View TOP element</text>

  <!-- QUEUE Section (Right) -->
  <text x="600" y="90" text-anchor="middle" class="label">LINKED QUEUE (FIFO)</text>

  <!-- FRONT pointer for queue -->
  <text x="440" y="160" class="pointer">FRONT</text>
  <line x1="480" y1="155" x2="508" y2="155" class="arrow-line" marker-end="url(#arrowhead)"/>

  <!-- Queue Node 1 -->
  <rect x="510" y="130" width="70" height="50" class="node-box"/>
  <text x="520" y="152" class="node-text">10</text>
  <text x="520" y="170" class="node-text">→</text>
  <line x1="580" y1="155" x2="608" y2="155" class="arrow-line" marker-end="url(#arrowhead)"/>

  <!-- Queue Node 2 -->
  <rect x="610" y="130" width="70" height="50" class="node-box"/>
  <text x="620" y="152" class="node-text">20</text>
  <text x="620" y="170" class="node-text">→</text>
  <line x1="680" y1="155" x2="708" y2="155" class="arrow-line" marker-end="url(#arrowhead)"/>

  <!-- Queue Node 3 -->
  <rect x="710" y="130" width="70" height="50" class="node-box"/>
  <text x="720" y="152" class="node-text">30</text>
  <text x="720" y="170" class="node-text">NULL</text>

  <!-- REAR pointer for queue -->
  <text x="710" y="210" class="pointer">REAR</text>
  <line x1="740" y1="205" x2="740" y2="182" class="arrow-line" marker-end="url(#arrowhead)"/>

  <!-- New Node being enqueued -->
  <g class="new-queue-node">
    <rect x="710" y="250" width="70" height="50" class="node-box highlight-box"/>
    <text x="720" y="272" class="node-text">40</text>
    <text x="720" y="290" class="node-text">NULL</text>
    <text x="680" y="275" class="label" style="font-size: 10px;">NEW</text>
  </g>

  <!-- Queue Operations -->
  <text x="600" y="350" text-anchor="middle" class="label" style="font-size: 12px;">Operations:</text>
  <text x="600" y="370" text-anchor="middle" class="node-text" style="font-size: 12px;">• enqueue() - Insert at REAR</text>
  <text x="600" y="390" text-anchor="middle" class="node-text" style="font-size: 12px;">• dequeue() - Remove from FRONT</text>
  <text x="600" y="410" text-anchor="middle" class="node-text" style="font-size: 12px;">• peek() - View FRONT element</text>

  <!-- Comparison Box -->
  <rect x="50" y="500" width="700" height="80" fill="#2a2a3e" stroke="#00d4ff" stroke-width="2" rx="10"/>
  <text x="400" y="525" text-anchor="middle" class="label">Key Differences:</text>
  <text x="400" y="545" text-anchor="middle" class="node-text" style="font-size: 12px;">Stack: LIFO (Last In First Out) - One end (TOP) for all operations</text>
  <text x="400" y="565" text-anchor="middle" class="node-text" style="font-size: 12px;">Queue: FIFO (First In First Out) - Two ends (FRONT for removal, REAR for insertion)</text>
</svg>