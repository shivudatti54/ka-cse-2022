<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    @keyframes highlightNode1 {
      0%, 10% { stroke: #ffe66d; stroke-width: 4; fill: #3a3a5a; }
      15%, 100% { stroke: #4ecdc4; stroke-width: 2; fill: #2d2d44; }
    }
    @keyframes highlightNode2 {
      0%, 30% { stroke: #4ecdc4; stroke-width: 2; fill: #2d2d44; }
      35%, 45% { stroke: #ffe66d; stroke-width: 4; fill: #3a3a5a; }
      50%, 100% { stroke: #4ecdc4; stroke-width: 2; fill: #2d2d44; }
    }
    @keyframes highlightNode3 {
      0%, 65% { stroke: #4ecdc4; stroke-width: 2; fill: #2d2d44; }
      70%, 80% { stroke: #ffe66d; stroke-width: 4; fill: #3a3a5a; }
      85%, 100% { stroke: #4ecdc4; stroke-width: 2; fill: #2d2d44; }
    }
    @keyframes traverseArrow1 {
      0%, 10% { opacity: 1; stroke: #ffe66d; stroke-width: 4; }
      15%, 100% { opacity: 0.6; stroke: #ff6b6b; stroke-width: 3; }
    }
    @keyframes traverseArrow2 {
      0%, 30% { opacity: 0.6; stroke: #ff6b6b; stroke-width: 3; }
      35%, 45% { opacity: 1; stroke: #ffe66d; stroke-width: 4; }
      50%, 100% { opacity: 0.6; stroke: #ff6b6b; stroke-width: 3; }
    }
    @keyframes traverseArrow3 {
      0%, 65% { opacity: 0.6; stroke: #ff6b6b; stroke-width: 3; }
      70%, 80% { opacity: 1; stroke: #ffe66d; stroke-width: 4; }
      85%, 100% { opacity: 0.6; stroke: #ff6b6b; stroke-width: 3; }
    }
    @keyframes headHighlight {
      0%, 5% { fill: #ffe66d; }
      10%, 100% { fill: #00d4ff; }
    }
    .memory-box { stroke: #4ecdc4; stroke-width: 2; }
    .addr-text { fill: #ff6b6b; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; text-anchor: middle; }
    .data-text { fill: #00d4ff; font-family: 'Courier New', monospace; font-size: 22px; font-weight: bold; text-anchor: middle; }
    .next-text { fill: #4ecdc4; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; text-anchor: middle; }
    .label-text { fill: #e0e0e0; font-family: Arial, sans-serif; font-size: 13px; }
    .title-text { fill: #00d4ff; font-family: Arial, sans-serif; font-size: 32px; font-weight: bold; }
    .subtitle-text { fill: #e0e0e0; font-family: Arial, sans-serif; font-size: 18px; }
    .null-text { fill: #ff6b6b; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
  </style>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" class="title-text">Memory Representation of Linked List in C</text>
  <text x="400" y="80" text-anchor="middle" class="subtitle-text">Non-Contiguous Memory with Pointer-Based Traversal</text>

  <!-- HEAD pointer variable -->
  <g>
    <rect x="50" y="120" width="100" height="50" rx="5" fill="#2d2d44" stroke="#ffe66d" stroke-width="3"/>
    <text x="100" y="145" class="label-text" fill="#ffe66d" font-weight="bold" text-anchor="middle">HEAD</text>
    <text x="100" y="165" class="next-text" style="animation: headHighlight 10s infinite;">0x1000</text>
    <line x1="150" y1="145" x2="200" y2="190" stroke="#ffe66d" stroke-width="3" marker-end="url(#arrowHead)" style="animation: traverseArrow1 10s infinite;"/>
  </g>

  <!-- Node 1 at address 0x1000 -->
  <g>
    <!-- Memory address label -->
    <rect x="210" y="180" width="140" height="25" rx="3" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
    <text x="280" y="198" class="addr-text">Address: 0x1000</text>

    <!-- Node box -->
    <rect x="210" y="210" width="140" height="90" rx="5" class="memory-box" style="animation: highlightNode1 10s infinite;"/>

    <!-- Data field -->
    <rect x="215" y="215" width="65" height="35" rx="3" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="247" y="235" class="data-text">10</text>
    <text x="247" y="260" class="label-text" text-anchor="middle">data</text>

    <!-- Next field -->
    <rect x="215" y="260" width="130" height="35" rx="3" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="280" y="280" class="next-text">0x2048</text>
    <text x="280" y="290" class="label-text" text-anchor="middle" font-size="11">next</text>

    <!-- Arrow to next node -->
    <line x1="350" y1="275" x2="430" y2="245" class="memory-box" marker-end="url(#arrowRed)" style="animation: traverseArrow1 10s infinite;"/>
  </g>

  <!-- Node 2 at address 0x2048 (non-contiguous) -->
  <g>
    <!-- Memory address label -->
    <rect x="440" y="140" width="140" height="25" rx="3" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
    <text x="510" y="158" class="addr-text">Address: 0x2048</text>

    <!-- Node box -->
    <rect x="440" y="170" width="140" height="90" rx="5" class="memory-box" style="animation: highlightNode2 10s infinite;"/>

    <!-- Data field -->
    <rect x="445" y="175" width="65" height="35" rx="3" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="477" y="195" class="data-text">20</text>
    <text x="477" y="220" class="label-text" text-anchor="middle">data</text>

    <!-- Next field -->
    <rect x="445" y="220" width="130" height="35" rx="3" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="510" y="240" class="next-text">0x1500</text>
    <text x="510" y="250" class="label-text" text-anchor="middle" font-size="11">next</text>

    <!-- Arrow to next node -->
    <path d="M 580 235 Q 640 280 620 330" class="memory-box" marker-end="url(#arrowRed)" style="animation: traverseArrow2 10s infinite;"/>
  </g>

  <!-- Node 3 at address 0x1500 (non-contiguous) -->
  <g>
    <!-- Memory address label -->
    <rect x="490" y="340" width="140" height="25" rx="3" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="1"/>
    <text x="560" y="358" class="addr-text">Address: 0x1500</text>

    <!-- Node box -->
    <rect x="490" y="370" width="140" height="90" rx="5" class="memory-box" style="animation: highlightNode3 10s infinite;"/>

    <!-- Data field -->
    <rect x="495" y="375" width="65" height="35" rx="3" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="527" y="395" class="data-text">30</text>
    <text x="527" y="420" class="label-text" text-anchor="middle">data</text>

    <!-- Next field -->
    <rect x="495" y="420" width="130" height="35" rx="3" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="560" y="440" class="null-text">NULL</text>
    <text x="560" y="450" class="label-text" text-anchor="middle" font-size="11">next</text>
  </g>

  <!-- Annotations -->
  <g transform="translate(50, 350)">
    <text x="0" y="0" class="subtitle-text" fill="#4ecdc4">Key Concepts:</text>
    <text x="0" y="30" class="label-text">• Nodes stored at non-contiguous memory addresses</text>
    <text x="0" y="55" class="label-text">• Each node contains data and a pointer (address) to next node</text>
    <text x="0" y="80" class="label-text">• HEAD pointer stores the address of the first node (0x1000)</text>
    <text x="0" y="105" class="label-text">• Traversal follows pointers: 0x1000 → 0x2048 → 0x1500 → NULL</text>
    <text x="0" y="130" class="label-text" fill="#ffe66d">• Animation shows sequential traversal (highlighted in yellow)</text>
  </g>

  <!-- C struct definition -->
  <g transform="translate(50, 520)">
    <rect x="0" y="-20" width="280" height="70" rx="5" fill="#2d2d44" stroke="#4ecdc4" stroke-width="2"/>
    <text x="10" y="0" class="label-text" fill="#ff6b6b" font-family="'Courier New', monospace">struct Node {</text>
    <text x="20" y="20" class="label-text" fill="#00d4ff" font-family="'Courier New', monospace">  int data;</text>
    <text x="20" y="40" class="label-text" fill="#4ecdc4" font-family="'Courier New', monospace">  struct Node *next;</text>
    <text x="10" y="60" class="label-text" fill="#ff6b6b" font-family="'Courier New', monospace">};</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#ffe66d"/>
    </marker>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#ffe66d"/>
    </marker>
  </defs>
</svg>
