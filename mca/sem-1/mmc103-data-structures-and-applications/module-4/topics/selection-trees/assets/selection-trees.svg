<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2" />
</marker>
</defs>
<rect width="800" height="600" fill="#f8f9fa" />
<text x="400" y="25" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Selection Trees - Binary Tree for Efficient Selection</text>

<g class="step" id="step1" data-narration="A selection tree is a binary tree where each internal node represents a comparison between two elements, and leaf nodes store actual data values for selection.">
<rect x="50" y="45" width="700" height="70" fill="#e3f2fd" stroke="#1976d2" rx="10"/>
<text x="400" y="70" text-anchor="middle" font-size="16" fill="#1976d2">What is a Selection Tree?</text>
<text x="400" y="95" text-anchor="middle" font-size="14" fill="#333">A binary tree for selecting min/max elements; internal nodes store comparison results,</text>
<text x="400" y="112" text-anchor="middle" font-size="14" fill="#333">leaf nodes represent data items. Used for sorting large datasets efficiently.</text>
</g>

<g class="step" id="step2" data-narration="Each internal node compares its two children and stores the winner. Leaf nodes hold actual data values like numbers or records from a dataset.">
<circle cx="400" cy="170" r="35" fill="#e8f5e9" stroke="#388e3c" stroke-width="3"/>
<text x="400" y="165" text-anchor="middle" font-size="18" font-weight="bold" fill="#388e3c">8</text>
<text x="400" y="180" text-anchor="middle" font-size="10" fill="#388e3c">(winner)</text>
<line x1="400" y1="205" x2="280" y2="260" stroke="#1976d2" marker-end="url(#arrow)"/>
<circle cx="280" cy="270" r="30" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
<text x="280" y="275" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">5</text>
<line x1="400" y1="205" x2="520" y2="260" stroke="#1976d2" marker-end="url(#arrow)"/>
<circle cx="520" cy="270" r="30" fill="#fff3e0" stroke="#ff9800" stroke-width="3"/>
<text x="520" y="275" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff9800">8</text>
<line x1="280" y1="300" x2="230" y2="340" stroke="#1976d2" marker-end="url(#arrow)"/>
<circle cx="230" cy="350" r="25" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="230" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">2</text>
<line x1="280" y1="300" x2="330" y2="340" stroke="#1976d2" marker-end="url(#arrow)"/>
<circle cx="330" cy="350" r="25" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="330" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">5</text>
<line x1="520" y1="300" x2="470" y2="340" stroke="#1976d2" marker-end="url(#arrow)"/>
<circle cx="470" cy="350" r="25" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="470" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">1</text>
<line x1="520" y1="300" x2="570" y2="340" stroke="#1976d2" marker-end="url(#arrow)"/>
<circle cx="570" cy="350" r="25" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
<text x="570" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#1976d2">9</text>
</g>

<g class="step" id="step3" data-narration="To build a selection tree: choose a pivot element, partition data into less-than and greater-than subsets, then recursively build subtrees.">
<rect x="50" y="375" width="700" height="55" fill="#f3e5f5" stroke="#9c27b0" rx="10"/>
<text x="400" y="395" text-anchor="middle" font-size="15" font-weight="bold" fill="#9c27b0">Construction Algorithm</text>
<text x="400" y="418" text-anchor="middle" font-size="13" fill="#333">1. Choose pivot → 2. Partition (less/greater) → 3. Recursively build subtrees → 4. Combine at root</text>
</g>

<g class="step" id="step4" data-narration="Selection trees support three main operations: search takes O(log n) time by traversing from root to leaf, insert adds and rebalances in O(log n), and delete removes a node maintaining tree properties in O(log n).">
<rect x="50" y="440" width="340" height="60" fill="#ffebee" stroke="#f44336" rx="10"/>
<text x="220" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#f44336">Operations</text>
<text x="220" y="478" text-anchor="middle" font-size="12" fill="#333">Search: O(log n) | Insert: O(log n) | Delete: O(log n)</text>
<rect x="410" y="440" width="340" height="60" fill="#e1f5fe" stroke="#0288d1" rx="10"/>
<text x="580" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#0288d1">Key Applications</text>
<text x="580" y="478" text-anchor="middle" font-size="12" fill="#333">External Sorting | Priority Queues | K-Selection Problems</text>
</g>

<g class="step" id="step5" data-narration="Selection trees excel in external sorting by merging sorted runs efficiently. They also implement priority queues where the highest-priority element is always at the root for quick access.">
<rect x="50" y="510" width="700" height="55" fill="#fff3e0" stroke="#ff9800" rx="10"/>
<text x="400" y="530" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9800">Real-World Use Cases</text>
<text x="400" y="552" text-anchor="middle" font-size="13" fill="#333">Database query optimization, tournament rankings, merging sorted files in external memory, selecting top-K elements from massive datasets.</text>
</g>
</svg>