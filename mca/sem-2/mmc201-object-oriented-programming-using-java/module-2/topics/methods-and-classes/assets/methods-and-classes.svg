<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
<rect width="800" height="600" fill="#f8fafc"/>
<g id="step0" data-narration="Introduction to Computational Complexity">
<text x="50" y="50" font-size="24" fill="#2563eb">Computational Complexity</text>
<text x="50" y="80" font-size="18" fill="#10b981">Study of computational resources required to solve problems</text>
</g>
<g id="step1" data-narration="Definition of P Class">
<text x="50" y="120" font-size="24" fill="#2563eb">P (Polynomial Time)</text>
<text x="50" y="150" font-size="18" fill="#10b981">Problems solvable in polynomial time</text>
</g>
<g id="step2" data-narration="Examples of P Problems">
<rect x="50" y="200" width="200" height="50" fill="#2563eb" rx="10"/>
<text x="60" y="230" font-size="18" fill="#ffffff">Examples:</text>
<text x="60" y="260" font-size="14" fill="#ffffff">Sorting, Shortest Path, Minimum Spanning Tree</text>
</g>
<g id="step3" data-narration="Definition of NP Class">
<rect x="300" y="200" width="200" height="50" fill="#f59e0b" rx="10"/>
<text x="310" y="230" font-size="18" fill="#ffffff">NP (Nondeterministic Polynomial Time)</text>
<text x="310" y="260" font-size="14" fill="#ffffff">Problems with solutions verifiable in polynomial time</text>
</g>
<g id="step4" data-narration="Examples of NP Problems">
<rect x="50" y="300" width="200" height="50" fill="#8b5cf6" rx="10"/>
<text x="60" y="330" font-size="18" fill="#ffffff">Examples:</text>
<text x="60" y="360" font-size="14" fill="#ffffff">Boolean Satisfiability, Hamiltonian Path, Subset Sum</text>
</g>
<g id="step5" data-narration="Relationship between P and NP Classes">
<line x1="150" y1="400" x2="650" y2="400" stroke="#2563eb" stroke-width="2"/>
<text x="350" y="390" font-size="18" fill="#2563eb">P ⊆ NP</text>
</g>
<g id="step6" data-narration="Importance of P and NP Classes">
<rect x="50" y="450" width="200" height="50" fill="#10b981" rx="10"/>
<text x="60" y="480" font-size="18" fill="#ffffff">Understanding computational complexity</text>
<text x="60" y="510" font-size="14" fill="#ffffff">Helps in solving problems efficiently</text>
</g>
<g id="step7" data-narration="Conclusion">
<rect x="300" y="450" width="200" height="50" fill="#2563eb" rx="10"/>
<text x="310" y="480" font-size="18" fill="#ffffff">Conclusion</text>
<text x="310" y="510" font-size="14" fill="#ffffff">P and NP classes are fundamental in computational complexity theory</text>
</g>
<g id="step8" data-narration="Future Directions">
<line x1="400" y1="550" x2="400" y2="580" stroke="#f59e0b" stroke-width="2"/>
<text x="420" y="570" font-size="18" fill="#f59e0b">Future Research</text>
</g>
<g id="step9" data-narration="Final Thoughts">
<rect x="50" y="550" width="200" height="50" fill="#8b5cf6" rx="10"/>
<text x="60" y="580" font-size="18" fill="#ffffff">Final Thoughts</text>
<text x="60" y="610" font-size="14" fill="#ffffff">Understanding P and NP classes is crucial in computer science</text>
</g>
<g id="step10" data-narration="References">
<rect x="300" y="550" width="200" height="50" fill="#10b981" rx="10"/>
<text x="310" y="580" font-size="18" fill="#ffffff">References</text>
<text x="310" y="610" font-size="14" fill="#ffffff">For further reading and study</text>
</g>
</svg>