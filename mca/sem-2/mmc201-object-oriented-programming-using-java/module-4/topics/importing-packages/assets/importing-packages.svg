<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1500">
  <!-- Background - placed first for proper layering -->
  <rect width="800" height="1500" fill="#f8f9fa"/>
  
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <style>
      @keyframes fadeInSlide {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes textReveal {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .step { animation: fadeInSlide 0.6s ease-out; }
      .step rect {
        animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: center;
      }
      .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
      .code-text { font-family: 'Consolas', monospace; font-size: 10px; }
      .title-text { font-family: 'Arial', sans-serif; font-size: 14px; font-weight: bold; }
      .body-text { font-family: 'Arial', sans-serif; font-size: 10px; }
      .label-text { font-family: 'Arial', sans-serif; font-size: 8px; }
    </style>
  </defs>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="Welcome to learning about Importing Packages in Java">
    <rect x="20" y="15" width="760" height="45" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="400" y="42" text-anchor="middle" class="title-text" fill="#1565c0">Importing Packages in Java</text>
    <text x="400" y="55" text-anchor="middle" class="label-text" fill="#1976d2">Learn how to use classes from other packages efficiently</text>
  </g>
  
  <!-- Step 1: What are Packages? -->
  <g class="step" id="step1" data-narration="Packages organize Java classes. Import statements let you use classes from other packages without typing their full name each time.">
    <rect x="20" y="70" width="760" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="70" width="6" height="90" rx="3" fill="#1976d2"/>
    <text x="40" y="92" class="title-text" fill="#1565c0">Why Import Packages?</text>
    <text x="40" y="108" class="body-text" fill="#424242">Packages organize Java classes. Import statements let you use</text>
    <text x="40" y="122" class="body-text" fill="#424242">classes from other packages without typing their full name each time.</text>
    <text x="40" y="140" class="body-text" fill="#1976d2">✓ Improves code readability</text>
    <text x="200" y="140" class="body-text" fill="#388e3c">✓ Makes code maintainable</text>
    <text x="380" y="140" class="body-text" fill="#ff9800">✓ Avoids naming conflicts</text>
  </g>
  
  <!-- Step 2: The Problem Without Imports -->
  <g class="step" id="step2" data-narration="Without imports, you must use the Fully Qualified Name like java.util.ArrayList which is tedious and hard to read.">
    <rect x="20" y="170" width="760" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="170" width="6" height="90" rx="3" fill="#ff9800"/>
    <text x="40" y="192" class="title-text" fill="#e65100">Without Import - Using FQN</text>
    <text x="40" y="210" class="code-text" fill="#d32f2f">java.util.ArrayList&lt;String&gt; list = new java.util.ArrayList&lt;&gt;();</text>
    <text x="40" y="230" class="body-text" fill="#424242">Every time you need ArrayList, you must write its</text>
    <text x="40" y="244" class="body-text" fill="#424242">Fully Qualified Name (FQN) - tedious and hard to read!</text>
  </g>
  
  <!-- Step 3: Solution with Import -->
  <g class="step" id="step3" data-narration="With import statement, you can simply use the class name directly - much cleaner and more readable code.">
    <rect x="20" y="270" width="760" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="270" width="6" height="90" rx="3" fill="#388e3c"/>
    <text x="40" y="292" class="title-text" fill="#2e7d32">With Import Statement</text>
    <text x="40" y="310" class="code-text" fill="#1976d2">import java.util.ArrayList;</text>
    <text x="40" y="330" class="code-text" fill="#388e3c">ArrayList&lt;String&gt; list = new ArrayList&lt;&gt;();  // Clean!</text>
    <text x="40" y="350" class="body-text" fill="#424242">Now just use the class name directly - much cleaner!</text>
  </g>
  
  <!-- Step 4: Type 1 - Specific Class Import -->
  <g class="step" id="step4" data-narration="Type 1 is Specific Class Import - imports only one particular class from a package. This is recommended for clarity.">
    <rect x="20" y="370" width="370" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="395" class="title-text" fill="#1565c0">Type 1: Specific Class Import</text>
    <text x="40" y="415" class="code-text" fill="#1976d2">import java.util.ArrayList;</text>
    <text x="40" y="435" class="body-text" fill="#424242">Imports only ArrayList from</text>
    <text x="40" y="448" class="body-text" fill="#424242">java.util package</text>
    <text x="40" y="462" class="label-text" fill="#1976d2">✓ Recommended - Clear and explicit</text>
    
    <rect x="400" y="370" width="380" height="100" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="420" y="395" class="title-text" fill="#2e7d32">More Examples</text>
    <text x="420" y="415" class="code-text" fill="#388e3c">import java.util.Scanner;</text>
    <text x="420" y="430" class="code-text" fill="#388e3c">import java.io.FileReader;</text>
    <text x="420" y="445" class="code-text" fill="#388e3c">import java.time.LocalDate;</text>
    <text x="420" y="462" class="label-text" fill="#388e3c">One class per import statement</text>
  </g>
  
  <!-- Step 5: Type 2 - Wildcard Import -->
  <g class="step" id="step5" data-narration="Type 2 uses wildcard asterisk to import all classes from a package. Use carefully as it reduces code clarity.">
    <rect x="20" y="480" width="370" height="100" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="505" class="title-text" fill="#e65100">Type 2: Wildcard Import (*)</text>
    <text x="40" y="525" class="code-text" fill="#ff9800">import java.util.*;</text>
    <text x="40" y="545" class="body-text" fill="#424242">Imports ALL classes from</text>
    <text x="40" y="558" class="body-text" fill="#424242">java.util package at once</text>
    <text x="40" y="572" class="label-text" fill="#ff9800">⚠ Use carefully - less explicit</text>
    
    <rect x="400" y="480" width="380" height="100" rx="8" fill="#fff3e0" filter="url(#shadow)"/>
    <text x="420" y="505" class="title-text" fill="#e65100">Comparison</text>
    <text x="420" y="525" class="body-text" fill="#424242">import java.util.List;</text>
    <text x="420" y="540" class="body-text" fill="#424242">import java.util.ArrayList;</text>
    <text x="420" y="555" class="body-text" fill="#424242">vs</text>
    <text x="460" y="555" class="body-text" fill="#e65100">import java.util.*;</text>
    <text x="420" y="572" class="label-text" fill="#e65100">Specific imports preferred for clarity</text>
  </g>
  
  <!-- Step 6: Type 3 - Static Import -->
  <g class="step" id="step6" data-narration="Type 3 is Static Import - imports static members directly so you can use them without the class name prefix.">
    <rect x="20" y="590" width="760" height="100" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <rect x="20" y="590" width="6" height="100" rx="3" fill="#9c27b0"/>
    <text x="40" y="615" class="title-text" fill="#6a1b9a">Type 3: Static Import</text>
    <text x="40" y="635" class="code-text" fill="#7b1fa2">import static java.lang.Math.PI;</text>
    <text x="40" y="655" class="body-text" fill="#424242">Imports static members directly:</text>
    <text x="40" y="675" class="code-text" fill="#7b1fa2">double radius = 5;</text>
    <text x="160" y="675" class="code-text" fill="#7b1fa2">double area = PI * radius * radius;</text>
    <text x="420" y="675" class="body-text" fill="#9c27b0">// No need for Math.PI</text>
  </g>
  
  <!-- Step 7: Static Import Examples -->
  <g class="step" id="step7" data-narration="Static imports are great for frequently used utility methods like Math.max, Math.sqrt, and constants like PI.">
    <rect x="20" y="700" width="370" height="95" rx="8" fill="#f3e5f5" filter="url(#shadow)"/>
    <text x="40" y="725" class="title-text" fill="#6a1b9a">Static Import - Methods</text>
    <text x="40" y="745" class="code-text" fill="#7b1fa2">import static java.lang.Math.max;</text>
    <text x="40" y="760" class="code-text" fill="#7b1fa2">import static java.lang.Math.sqrt;</text>
    <text x="40" y="780" class="body-text" fill="#424242">max(10, 20)  // Instead of Math.max()</text>
    <text x="40" y="792" class="body-text" fill="#424242">sqrt(144)   // Instead of Math.sqrt()</text>
    
    <rect x="400" y="700" width="380" height="95" rx="8" fill="#f3e5f5" filter="url(#shadow)"/>
    <text x="420" y="725" class="title-text" fill="#6a1b9a">When to Use Static?</text>
    <text x="420" y="745" class="body-text" fill="#424242">• Frequently used utility methods</text>
    <text x="420" y="760" class="body-text" fill="#424242">• Mathematical constants (PI, E)</text>
    <text x="420" y="775" class="body-text" fill="#424242">• Enum values and flags</text>
    <text x="420" y="790" class="body-text" fill="#424242">• Avoid: when it reduces clarity</text>
  </g>
  
  <!-- Step 8: Classpath Resolution -->
  <g class="step" id="step8" data-narration="Java searches for classes in order: current package first, then imported packages, then classpath JARs.">
    <rect x="20" y="805" width="760" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="805" width="6" height="95" rx="3" fill="#1976d2"/>
    <text x="40" y="830" class="title-text" fill="#1565c0">How Classpath Resolves Classes</text>
    <text x="40" y="850" class="body-text" fill="#424242">When Java encounters a class name, it searches in this order:</text>
    
    <g transform="translate(40, 865)">
      <rect x="0" y="0" width="200" height="22" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
      <text x="10" y="15" class="label-text" fill="#1565c0">1. Current Package</text>
      <rect x="210" y="0" width="200" height="22" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
      <text x="220" y="15" class="label-text" fill="#2e7d32">2. Imported Packages</text>
      <rect x="420" y="0" width="200" height="22" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
      <text x="430" y="15" class="label-text" fill="#e65100">3. Classpath (JARs)</text>
    </g>
  </g>
  
  <!-- Step 9: Implicit vs Explicit Imports -->
  <g class="step" id="step9" data-narration="java.lang package is automatically imported implicitly. You must explicitly import from other packages.">
    <rect x="20" y="910" width="760" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="910" width="6" height="95" rx="3" fill="#388e3c"/>
    <text x="40" y="935" class="title-text" fill="#2e7d32">Implicit vs Explicit Imports</text>
    
    <rect x="40" y="950" width="330" height="45" rx="6" fill="#e8f5e9"/>
    <text x="55" y="970" class="title-text" fill="#2e7d32">Implicit Import</text>
    <text x="55" y="985" class="body-text" fill="#424242">java.lang.* is auto-imported (String, System, etc.)</text>
    
    <rect x="380" y="950" width="380" height="45" rx="6" fill="#e3f2fd"/>
    <text x="395" y="970" class="title-text" fill="#1565c0">Explicit Import</text>
    <text x="395" y="985" class="body-text" fill="#424242">import java.util.ArrayList;  // You write this</text>
  </g>
  
  <!-- Step 10: FQN vs Import Comparison -->
  <g class="step" id="step10" data-narration="Fully Qualified Names are verbose and hard to read. Import statements make code clean and maintainable.">
    <rect x="20" y="1015" width="760" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="1015" width="6" height="90" rx="3" fill="#ff9800"/>
    <text x="40" y="1040" class="title-text" fill="#e65100">FQN vs Import Statement</text>
    
    <rect x="40" y="1055" width="340" height="40" rx="6" fill="#ffebee"/>
    <text x="55" y="1073" class="body-text" fill="#c62828">FQN (Not Recommended):</text>
    <text x="55" y="1088" class="code-text" fill="#d32f2f">java.util.HashMap&lt;K,V&gt; map = new java.util.HashMap&lt;&gt;();</text>
    
    <rect x="400" y="1055" width="360" height="40" rx="6" fill="#e8f5e9"/>
    <text x="415" y="1073" class="body-text" fill="#2e7d32">Import (Recommended):</text>
    <text x="415" y="1088" class="code-text" fill="#388e3c">import java.util.HashMap; HashMap&lt;K,V&gt; map = new HashMap&lt;&gt;();</text>
  </g>
  
  <!-- Step 11: Complete Example -->
  <g class="step" id="step11" data-narration="This complete example shows combining specific class imports with a static import for cleaner code.">
    <rect x="20" y="1115" width="760" height="90" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="1140" class="title-text" fill="#1565c0">Complete Example Program</text>
    <text x="40" y="1160" class="code-text" fill="#1976d2">import java.util.ArrayList;    // Specific class</text>
    <text x="40" y="1175" class="code-text" fill="#1976d2">import java.util.List;          // Specific class</text>
    <text x="40" y="1190" class="code-text" fill="#9c27b0">import static java.lang.Math.PI; // Static import</text>
    <text x="40" y="1205" class="code-text" fill="#388e3c">// Now use ArrayList, List, and PI directly!</text>
  </g>
  
  <!-- Step 12: Program in Action -->
  <g class="step" id="step12" data-narration="With imports in place, we can use clean class names like List and ArrayList directly without any prefixes.">
    <rect x="20" y="1215" width="760" height="90" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="1215" width="6" height="90" rx="3" fill="#388e3c"/>
    <text x="40" y="1240" class="title-text" fill="#2e7d32">Program Using the Imports</text>
    <text x="40" y="1260" class="code-text" fill="#424242">public class MyClass {</text>
    <text x="60" y="1275" class="code-text" fill="#424242">public static void main(String[] args) {</text>
    <text x="80" y="1290" class="code-text" fill="#424242">List&lt;String&gt; names = new ArrayList&lt;&gt;();</text>
    <text x="80" y="1305" class="code-text" fill="#424242">names.add("Java"); names.add("Python");</text>
    <text x="60" y="1320" class="code-text" fill="#424242">}</text>
    <text x="40" y="1335" class="code-text" fill="#424242">}</text>
    <text x="420" y="1260" class="body-text" fill="#2e7d32">Clean, readable code!</text>
    <text x="420" y="1280" class="body-text" fill="#424242">• List, ArrayList from java.util</text>
    <text x="420" y="1295" class="body-text" fill="#424242">• No FQN needed</text>
    <text x="420" y="1310" class="body-text" fill="#424242">• Works seamlessly</text>
  </g>
  
  <!-- Step 13: Best Practices -->
  <g class="step" id="step13" data-narration="Use specific imports for clarity, remember java.lang is implicit, and use static imports wisely for constants.">
    <rect x="20" y="1390" width="760" height="95" rx="8" fill="white" filter="url(#shadow)"/>
    <rect x="20" y="1390" width="6" height="95" rx="3" fill="#9c27b0"/>
    <text x="40" y="1415" class="title-text" fill="#6a1b9a">Best Practices and Exam Tips</text>
    
    <g transform="translate(40, 1435)">
      <text x="0" y="0" class="body-text" fill="#2e7d32">✓</text>
      <text x="15" y="0" class="body-text" fill="#424242">Use specific class imports over wildcards for clarity</text>
      <text x="0" y="18" class="body-text" fill="#2e7d32">✓</text>
      <text x="15" y="18" class="body-text" fill="#424242">java.lang.* is imported implicitly (String, System)</text>
      <text x="0" y="36" class="body-text" fill="#2e7d32">✓</text>
      <text x="15" y="36" class="body-text" fill="#424242">Static imports useful for constants and utility methods</text>
    </g>
    
    <rect x="400" y="1435" width="360" height="40" rx="6" fill="#fff3e0"/>
    <text x="415" y="1453" class="body-text" fill="#e65100">⚠ Don't import same class twice!</text>
    <text x="415" y="1468" class="body-text" fill="#424242">Name conflicts? Use FQN to disambiguate</text>
  </g>
  
  <!-- Step 14: Key Takeaways -->
  <g class="step" id="step14" data-narration="Key takeaways: imports improve readability, three import types exist, classpath resolves in order, java.lang is implicit.">
    <rect x="20" y="1495" width="760" height="95" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <rect x="20" y="1495" width="760" height="6" rx="3" fill="#1565c0"/>
    <text x="400" y="1520" text-anchor="middle" class="title-text" fill="#1565c0">Key Takeaways</text>
    <text x="40" y="1545" class="body-text" fill="#424242">1. Import statements make code readable and maintainable</text>
    <text x="40" y="1560" class="body-text" fill="#424242">2. Three types: Specific, Wildcard (*), and Static imports</text>
    <text x="40" y="1575" class="body-text" fill="#424242">3. Classpath resolves classes: Current, then Imported, then JARs</text>
    <text x="40" y="1590" class="body-text" fill="#424242">4. java.lang.* is implicitly imported</text>
  </g>
</svg>