<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to Uncaught Exceptions">
    <text x="50" y="50" font-size="24" fill="#2563eb">Uncaught Exceptions</text>
    <text x="50" y="100" font-size="18" fill="#8b5cf6">An exception that is not handled by any try-catch block.</text>
  </g>
  <g id="step1" data-narration="Exception is thrown">
    <text x="50" y="150" font-size="18" fill="#10b981">Exception is thrown</text>
    <circle cx="200" cy="200" r="20" fill="#f59e0b" />
    <text x="200" y="220" font-size="14" fill="#2563eb">ArithmeticException</text>
  </g>
  <g id="step2" data-narration="Java runtime searches for exception handler">
    <text x="50" y="250" font-size="18" fill="#8b5cf6">Java runtime searches for exception handler</text>
    <rect x="200" y="200" width="100" height="50" fill="#2563eb" rx="10" />
    <text x="210" y="230" font-size="14" fill="#f8fafc">Try-Catch Block</text>
    <line x1="300" y1="225" x2="400" y2="225" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step3" data-narration="If no handler found, exception propagates to caller">
    <text x="50" y="350" font-size="18" fill="#10b981">If no handler found, exception propagates to caller</text>
    <circle cx="400" cy="200" r="20" fill="#f59e0b" />
    <text x="400" y="220" font-size="14" fill="#2563eb">Propagate</text>
    <line x1="420" y1="200" x2="420" y2="300" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step4" data-narration="Process continues until main() method">
    <text x="50" y="400" font-size="18" fill="#8b5cf6">Process continues until main() method</text>
    <rect x="400" y="300" width="100" height="50" fill="#2563eb" rx="10" />
    <text x="410" y="330" font-size="14" fill="#f8fafc">Main Method</text>
    <line x1="500" y1="325" x2="600" y2="325" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step5" data-narration="JVM terminates program and prints stack trace">
    <text x="50" y="450" font-size="18" fill="#10b981">JVM terminates program and prints stack trace</text>
    <circle cx="600" cy="300" r="20" fill="#f59e0b" />
    <text x="600" y="320" font-size="14" fill="#2563eb">Stack Trace</text>
    <line x1="620" y1="300" x2="620" y2="400" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <g id="step6" data-narration="Handling Uncaught Exceptions using Try-Catch Block">
    <text x="50" y="500" font-size="18" fill="#8b5cf6">Handling Uncaught Exceptions using Try-Catch Block</text>
    <rect x="200" y="400" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="210" y="430" font-size="14" fill="#f8fafc">Try { divide(10, 0); } Catch (ArithmeticException e)</text>
  </g>
  <g id="step7" data-narration="Handling Uncaught Exceptions using throws keyword">
    <text x="50" y="550" font-size="18" fill="#10b981">Handling Uncaught Exceptions using throws keyword</text>
    <rect x="400" y="450" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="410" y="480" font-size="14" fill="#f8fafc">public static void divide(int a, int b) throws ArithmeticException</text>
  </g>
  <g id="step8" data-narration="Handling Uncaught Exceptions using UncaughtExceptionHandler">
    <text x="50" y="580" font-size="18" fill="#8b5cf6">Handling Uncaught Exceptions using UncaughtExceptionHandler</text>
    <rect x="600" y="500" width="200" height="50" fill="#2563eb" rx="10" />
    <text x="610" y="530" font-size="14" fill="#f8fafc">Thread.setDefaultUncaughtExceptionHandler</text>
  </g>
</svg>