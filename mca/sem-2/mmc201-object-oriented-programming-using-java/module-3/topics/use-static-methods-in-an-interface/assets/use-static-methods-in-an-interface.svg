<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <g id="step0" data-narration="Introduction to the concept of using static methods in an interface">
    <text x="50" y="50" font-size="24" fill="#2563eb">Using Static Methods in an Interface</text>
    <rect x="50" y="100" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="60" y="135" font-size="18" fill="#ffffff">MyInterface</text>
  </g>
  <g id="step1" data-narration="Defining the interface with an abstract method and a static method">
    <use href="#step0" x="0" y="0"/>
    <rect x="300" y="100" width="200" height="50" fill="#8b5cf6" rx="10"/>
    <text x="310" y="135" font-size="18" fill="#ffffff">regularMethod()</text>
    <rect x="300" y="200" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="310" y="235" font-size="18" fill="#ffffff">staticUtilityMethod()</text>
    <line x1="250" y1="125" x2="300" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g id="step2" data-narration="Understanding the purpose of the static method in the interface">
    <use href="#step1" x="0" y="0"/>
    <rect x="550" y="100" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="560" y="135" font-size="18" fill="#ffffff">Utility Logic</text>
    <line x1="500" y1="125" x2="550" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="520" y="170" font-size="18" fill="#8b5cf6">Shared among implementing classes</text>
  </g>
  <g id="step3" data-narration="Implementing the static method in the interface">
    <use href="#step2" x="0" y="0"/>
    <rect x="300" y="300" width="200" height="100" fill="#f59e0b" rx="10"/>
    <text x="310" y="335" font-size="18" fill="#ffffff">static void staticUtilityMethod()</text>
    <text x="310" y="370" font-size="18" fill="#ffffff">System.out.println(...)</text>
  </g>
  <g id="step4" data-narration="Accessing the static method from the interface">
    <use href="#step3" x="0" y="0"/>
    <rect x="550" y="300" width="200" height="50" fill="#10b981" rx="10"/>
    <text x="560" y="335" font-size="18" fill="#ffffff">MyInterface.staticUtilityMethod()</text>
    <line x1="500" y1="325" x2="550" y2="325" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g id="step5" data-narration="Benefits of using static methods in an interface">
    <use href="#step4" x="0" y="0"/>
    <rect x="50" y="400" width="200" height="50" fill="#8b5cf6" rx="10"/>
    <text x="60" y="435" font-size="18" fill="#ffffff">Code Reusability</text>
    <rect x="300" y="400" width="200" height="50" fill="#f59e0b" rx="10"/>
    <text x="310" y="435" font-size="18" fill="#ffffff">Readability and Maintainability</text>
  </g>
</svg>