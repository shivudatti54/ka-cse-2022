<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Flow Control in C Programming covers decision-making statements like if and switch, looping constructs including while and for, plus jump statements that transfer program execution flow.">
    <rect x="200" y="10" width="400" height="40" rx="8" fill="#1976d2"/>
    <text x="400" y="36" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Flow Control in C Programming</text>
  </g>
  
  <g class="step" id="step1" data-narration="Decision-making statements evaluate conditions and execute code blocks. If executes when true, if-else provides two paths, switch handles multiple constant cases.">
    <rect x="20" y="58" width="760" height="100" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1976d2">Decision Making: if, if-else, switch</text>
    <rect x="40" y="90" width="220" height="55" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="105" font-family="monospace" font-size="9" fill="#333">if (condition) &#123;...&#125;</text>
    <text x="50" y="120" font-family="Arial" font-size="8" fill="#666">Executes only if true</text>
    <rect x="270" y="90" width="220" height="55" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="280" y="105" font-family="monospace" font-size="9" fill="#333">if (...) &#123;...&#125; else &#123;...&#125;</text>
    <text x="280" y="120" font-family="Arial" font-size="8" fill="#666">Two-way branch</text>
    <rect x="500" y="90" width="260" height="55" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="510" y="105" font-family="monospace" font-size="9" fill="#333">switch(expr) &#123;case: ... break&#125;</text>
    <text x="510" y="120" font-family="Arial" font-size="8" fill="#666">Multi-way branch, needs integer</text>
  </g>
  
  <g class="step" id="step2" data-narration="Loops repeat code execution. While checks condition first (may skip), do-while checks after (runs once), for is counter-controlled with init-condition-update.">
    <rect x="20" y="167" width="760" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="187" font-family="Arial" font-size="13" font-weight="bold" fill="#388e3c">Looping Statements: while, do-while, for</text>
    <rect x="40" y="199" width="230" height="55" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="214" font-family="monospace" font-size="9" fill="#333">while (condition) &#123;...&#125;</text>
    <text x="50" y="229" font-family="Arial" font-size="8" fill="#666">Pre-test: may not execute</text>
    <rect x="280" y="199" width="230" height="55" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="290" y="214" font-family="monospace" font-size="9" fill="#333">do &#123;...&#125; while (cond);</text>
    <text x="290" y="229" font-family="Arial" font-size="8" fill="#666">Post-test: always runs once</text>
    <rect x="520" y="199" width="240" height="55" rx="4" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="530" y="214" font-family="monospace" font-size="9" fill="#333">for (init; cond; update) &#123;...&#125;</text>
    <text x="530" y="229" font-family="Arial" font-size="8" fill="#666">Counter-controlled loop</text>
  </g>
  
  <g class="step" id="step3" data-narration="Jump statements control flow transfer. Break exits loops/switch immediately. Continue skips current iteration. Goto jumps to labels (avoid in modern code).">
    <rect x="20" y="276" width="760" height="100" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="296" font-family="Arial" font-size="13" font-weight="bold" fill="#ff9800">Jump Statements: break, continue, goto</text>
    <rect x="40" y="308" width="220" height="55" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="50" y="323" font-family="monospace" font-size="9" fill="#333">break;</text>
    <text x="50" y="338" font-family="Arial" font-size="8" fill="#666">Exits loop or switch entirely</text>
    <rect x="270" y="308" width="220" height="55" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="280" y="323" font-family="monospace" font-size="9" fill="#333">continue;</text>
    <text x="280" y="338" font-family="Arial" font-size="8" fill="#666">Skips to next iteration</text>
    <rect x="500" y="308" width="260" height="55" rx="4" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="510" y="323" font-family="monospace" font-size="9" fill="#333">goto label; ... label:</text>
    <text x="510" y="338" font-family="Arial" font-size="8" fill="#666">Transfers control (generally avoided)</text>
  </g>
  
  <g class="step" id="step4" data-narration="Example programs demonstrate practical use: else-if ladder for grade classification, while loop for digit sum, switch for menu-driven calculator operations.">
    <rect x="20" y="385" width="760" height="100" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="405" font-family="Arial" font-size="13" font-weight="bold" fill="#9c27b0">Practical Examples</text>
    <rect x="40" y="417" width="230" height="55" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="432" font-family="monospace" font-size="8" fill="#333">Grade: if-else ladder</text>
    <text x="50" y="447" font-family="Arial" font-size="8" fill="#666">marks >= 90: S, >= 80: A, ...</text>
    <rect x="280" y="417" width="230" height="55" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="290" y="432" font-family="monospace" font-size="8" fill="#333">Digit Sum: while loop</text>
    <text x="290" y="447" font-family="Arial" font-size="8" fill="#666">num % 10 extracts digit, /10 removes</text>
    <rect x="520" y="417" width="240" height="55" rx="4" fill="white" stroke="#9c27b0" stroke-width="1"/>
    <text x="530" y="432" font-family="monospace" font-size="8" fill="#333">Calculator: switch</text>
    <text x="530" y="447" font-family="Arial" font-size="8" fill="#666">Menu-driven with +, -, *, / cases</text>
  </g>
  
  <g class="step" id="step5" data-narration="Common mistakes include using assignment (=) instead of (==), forgetting break in switch causing fall-through, and creating infinite loops without proper updates.">
    <rect x="20" y="494" width="760" height="95" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="514" font-family="Arial" font-size="13" font-weight="bold" fill="#f44336">Common Mistakes to Avoid</text>
    <rect x="40" y="526" width="345" height="50" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="50" y="540" font-family="monospace" font-size="9" fill="#333">if (x = 5)  // Wrong: assigns 5</text>
    <text x="50" y="555" font-family="Arial" font-size="8" fill="#666">Use == for comparison</text>
    <rect x="395" y="526" width="365" height="50" rx="4" fill="white" stroke="#f44336" stroke-width="1"/>
    <text x="405" y="540" font-family="monospace" font-size="9" fill="#333">Missing break in switch</text>
    <text x="405" y="555" font-family="Arial" font-size="8" fill="#666">Causes fall-through to next case</text>
  </g>
</svg>