<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This topic explains two fundamental network communication paradigms in computer networking: connectionless communication like UDP versus connection-oriented protocols like TCP.">
    <rect x="200" y="10" width="400" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1976d2">Connectionless vs Connection-Oriented</text>
  </g>
  
  <g class="step" id="step1" data-narration="Connectionless communication sends packets immediately without any setup phase - essentially fire and forget. Connection-oriented protocols require a three-way handshake before actual data transfer begins between sender and receiver.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">CONNECTIONLESS (UDP)</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">• No handshake required - packets sent immediately</text>
    <text x="40" y="110" font-family="Arial" font-size="10" fill="#333">• Each datagram is independent with complete addressing</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#333">• Best-effort delivery - no guarantee of arrival</text>
    <rect x="400" y="68" width="360" height="65" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="420" y="85" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">CONNECTION-ORIENTED (TCP)</text>
    <text x="420" y="105" font-family="Arial" font-size="10" fill="#333">• Requires three-way handshake before transfer</text>
    <text x="420" y="120" font-family="Arial" font-size="10" fill="#333">• Provides reliable, ordered delivery</text>
  </g>
  
  <g class="step" id="step2" data-narration="UDP uses a compact 8-byte header containing source port, destination port, length, and optional checksum fields. It operates statelessly with minimal protocol overhead for maximum efficiency in transmission.">
    <rect x="20" y="151" width="370" height="90" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">UDP Header (8 bytes)</text>
    <rect x="40" y="180" width="80" height="40" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="80" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Source Port</text>
    <text x="80" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">16 bits</text>
    <rect x="125" y="180" width="80" height="40" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="165" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Dest Port</text>
    <text x="165" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">16 bits</text>
    <rect x="210" y="180" width="80" height="40" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="250" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Length</text>
    <text x="250" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">16 bits</text>
    <rect x="295" y="180" width="80" height="40" fill="#ffe0b2" stroke="#ff9800" stroke-width="1"/>
    <text x="335" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Checksum</text>
    <text x="335" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">16 bits</text>
    <text x="40" y="235" font-family="Arial" font-size="9" fill="#333">Use Cases: DNS, VoIP, Video Streaming</text>
    
    <rect x="410" y="151" width="370" height="90" rx="5" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="430" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">TCP Header (20+ bytes)</text>
    <text x="430" y="185" font-family="Arial" font-size="9" fill="#333">Src Port (16) | Dst Port (16) | Seq Num (32)</text>
    <text x="430" y="200" font-family="Arial" font-size="9" fill="#333">Ack Num (32) | Flags | Window (16)</text>
    <text x="430" y="215" font-family="Arial" font-size="9" fill="#333">Checksum (16) | Urgent Ptr (16) | Options</text>
    <text x="430" y="233" font-family="Arial" font-size="9" fill="#333">Use Cases: HTTP, HTTPS, FTP, Email</text>
  </g>
  
  <g class="step" id="step3" data-narration="TCP establishes connections through a three-way handshake that synchronizes sequence numbers between client and server. The client sends SYN, the server replies with SYN-ACK, and the client confirms with ACK.">
    <rect x="20" y="249" width="760" height="90" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="266" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">TCP Three-Way Handshake</text>
    <rect x="40" y="280" width="100" height="40" rx="3" fill="#81c784" stroke="#2e7d32" stroke-width="1"/>
    <text x="90" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Client</text>
    <text x="90" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">SYN, ISN=x</text>
    <line x1="140" y1="300" x2="180" y2="300" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="200" y="280" width="100" height="40" rx="3" fill="#81c784" stroke="#2e7d32" stroke-width="1"/>
    <text x="250" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Server</text>
    <text x="250" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">SYN, ISN=y</text>
    <line x1="300" y1="300" x2="340" y2="300" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="360" y="280" width="100" height="40" rx="3" fill="#81c784" stroke="#2e7d32" stroke-width="1"/>
    <text x="410" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Client</text>
    <text x="410" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">ACK</text>
    <line x1="460" y1="300" x2="500" y2="300" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="520" y="280" width="100" height="40" rx="3" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1"/>
    <text x="570" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20">Server</text>
    <text x="570" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#1b5e20">ACK</text>
    <text x="40" y="335" font-family="Arial" font-size="9" fill="#333">Step 1: SYN | Step 2: SYN-ACK | Step 3: ACK → Connection Established</text>
  </g>
  
  <g class="step" id="step4" data-narration="TCP ensures reliable data delivery through acknowledgment messages and automatic retransmission of lost packets. It maintains data ordering using sequence numbers and controls flow through a sliding window mechanism.">
    <rect x="20" y="347" width="370" height="80" rx="5" fill="#e1bee7" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="364" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">TCP Reliability Mechanisms</text>
    <text x="40" y="383" font-family="Arial" font-size="10" fill="#333">✓ <tspan font-weight="bold">Reliable Delivery</tspan>: ACKs + Retransmissions</text>
    <text x="40" y="400" font-family="Arial" font-size="10" fill="#333">✓ <tspan font-weight="bold">Ordered Data</tspan>: Sequence numbers ensure order</text>
    <text x="40" y="417" font-family="Arial" font-size="10" fill="#333">✓ <tspan font-weight="bold">Flow Control</tspan>: Sliding window prevents overflow</text>
    
    <rect x="410" y="347" width="370" height="80" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="430" y="364" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">TCP Congestion Control</text>
    <text x="430" y="383" font-family="Arial" font-size="10" fill="#333">1. <tspan font-weight="bold">Slow Start</tspan>: Begin with small cwnd, grow exponentially</text>
    <text x="430" y="400" font-family="Arial" font-size="10" fill="#333">2. <tspan font-weight="bold">Congestion Avoidance</tspan>: Additive increase</text>
    <text x="430" y="417" font-family="Arial" font-size="10" fill="#333">3. <tspan font-weight="bold">Fast Retransmit</tspan>: Retransmit on triple duplicate ACK</text>
  </g>
  
  <g class="step" id="step5" data-narration="UDP offers faster transmission with lower latency but provides unreliable delivery without guarantees. TCP is slightly slower due to overhead but ensures complete delivery, proper ordering, and automatic error recovery for all data.">
    <rect x="20" y="435" width="760" height="115" rx="5" fill="#ffffff" stroke="#e3f2fd" stroke-width="1"/>
    <text x="40" y="452" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Comparison: UDP vs TCP</text>
    
    <rect x="40" y="470" width="150" height="35" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="115" y="483" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">UDP</text>
    <text x="115" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Unreliable</text>
    
    <rect x="200" y="470" width="150" height="35" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="275" y="483" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">UDP</text>
    <text x="275" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">No Ordering</text>
    
    <rect x="360" y="470" width="150" height="35" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="435" y="483" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">UDP</text>
    <text x="435" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">8-byte header</text>
    
    <rect x="520" y="470" width="150" height="35" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="595" y="483" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">UDP</text>
    <text x="595" y="497" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Stateless</text>
    
    <rect x="40" y="515" width="150" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="115" y="528" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">TCP</text>
    <text x="115" y="540" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Reliable</text>
    
    <rect x="200" y="515" width="150" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="275" y="528" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">TCP</text>
    <text x="275" y="540" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Ordered</text>
    
    <rect x="360" y="515" width="150" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="435" y="528" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">TCP</text>
    <text x="435" y="540" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">20-byte header</text>
    
    <rect x="520" y="515" width="150" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="595" y="528" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">TCP</text>
    <text x="595" y="540" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Stateful</text>
  </g>
  
  <g class="step" id="step6" data-narration="Real-world applications choose protocols based on priorities: UDP for DNS queries, VoIP, and video streaming where speed matters most. TCP for HTTP, FTP, email, and SSH where reliability is essential for correct operation.">
    <rect x="20" y="558" width="760" height="42" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="575" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Real-World: UDP = DNS/VoIP | TCP = HTTP/FTP/Email</text>
  </g>
</svg>