<svg viewBox="0 0 800 1750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes flowAnimation {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .step { animation: fadeInSlide 0.6s ease-out; }
    .step rect { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; }
    .step text { animation: textReveal 0.4s ease-out 0.2s backwards; }
    .animated-line {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawLine 1.5s ease-out forwards;
    }
    .flow-line {
      stroke-dasharray: 20, 10;
      animation: flowAnimation 1s linear infinite;
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; font-size: 22px; fill: white; }
    .step-title { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; font-size: 13px; fill: #1565c0; }
    .body-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #333; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #666; }
    .formula-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #0d47a1; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1750" fill="#f8f9fa"/>
  
  <!-- STEP 0: Title -->
  <g class="step" id="step0">
    <rect x="0" y="0" width="800" height="50" fill="url(#titleGrad)"/>
    <text x="400" y="32" text-anchor="middle" class="title-text">Data Communications</text>
    <text x="400" y="44" text-anchor="middle" font-family="Segoe UI" font-size="10" fill="#bbdefb">Foundation of Modern Networking</text>
  </g>
  
  <!-- STEP 1: Why Data Communications Matters -->
  <g class="step" id="step1" data-narration="Data communications enables emails, video streaming, and all digital interactions that define modern life.">
    <rect x="20" y="60" width="760" height="85" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="82" class="step-title">Why Data Communications Matters</text>
    <text x="40" y="100" class="body-text">The backbone of modern computing enabling:</text>
    <!-- Icons row -->
    <g transform="translate(40, 112)">
      <rect x="0" y="0" width="22" height="22" rx="4" fill="#1976d2"/>
      <text x="11" y="15" text-anchor="middle" fill="white" font-size="10">✉</text>
      <text x="60" y="13" class="label-text">Emails</text>
      
      <rect x="120" y="0" width="22" height="22" rx="4" fill="#388e3c"/>
      <text x="131" y="15" text-anchor="middle" fill="white" font-size="10">▶</text>
      <text x="180" y="13" class="label-text">Video Streaming</text>
      
      <rect x="240" y="0" width="22" height="22" rx="4" fill="#ff9800"/>
      <text x="251" y="15" text-anchor="middle" fill="white" font-size="10">☎</text>
      <text x="300" y="13" class="label-text">Video Calls</text>
      
      <rect x="360" y="0" width="22" height="22" rx="4" fill="#9c27b0"/>
      <text x="371" y="15" text-anchor="middle" fill="white" font-size="10">🌐</text>
      <text x="420" y="13" class="label-text">Internet Browsing</text>
    </g>
  </g>
  
  <!-- STEP 2: Definition -->
  <g class="step" id="step2" data-narration="Data communication is the exchange of data between devices through a channel using standardized protocols.">
    <rect x="20" y="160" width="760" height="85" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
    <text x="40" y="182" class="step-title">What is Data Communication?</text>
    <rect x="40" y="195" width="700" height="40" rx="6" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="50" y="212" class="body-text" font-style="italic">"The process of exchanging data between two or more devices through a"</text>
    <text x="50" y="228" class="body-text" font-style="italic">"communication channel using standardized protocols."</text>
    <!-- Animated arrows showing bidirectional -->
    <path d="M620,215 L700,215" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)">
      <animate attributeName="d" values="M620,215 L640,215;M620,215 L700,215" dur="1s" fill="freeze"/>
    </path>
    <path d="M700,225 L620,225" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)">
      <animate attributeName="d" values="M700,225 L680,225;M700,225 L620,225" dur="1s" fill="freeze"/>
    </path>
  </g>
  
  <!-- STEP 3: Five Components -->
  <g class="step" id="step3" data-narration="A data communication system has five essential components: message, sender, receiver, medium, and protocol.">
    <rect x="20" y="260" width="760" height="105" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
    <text x="40" y="282" class="step-title">Five Components of Data Communication System</text>
    <!-- Component boxes -->
    <g transform="translate(50, 295)">
      <!-- Message -->
      <rect x="0" y="0" width="130" height="60" rx="6" fill="#ff9800" filter="url(#shadow)"/>
      <text x="65" y="20" text-anchor="middle" fill="white" font-weight="bold" font-size="11">Message</text>
      <text x="65" y="38" text-anchor="middle" fill="white" font-size="8">Data to communicate</text>
      <text x="65" y="50" text-anchor="middle" fill="white" font-size="8">(text, audio, video)</text>
      
      <!-- Sender -->
      <rect x="145" y="0" width="130" height="60" rx="6" fill="#1976d2" filter="url(#shadow)"/>
      <text x="210" y="20" text-anchor="middle" fill="white" font-weight="bold" font-size="11">Sender</text>
      <text x="210" y="38" text-anchor="middle" fill="white" font-size="8">Device that transmits</text>
      <text x="210" y="50" text-anchor="middle" fill="white" font-size="8">(computer, phone)</text>
      
      <!-- Receiver -->
      <rect x="290" y="0" width="130" height="60" rx="6" fill="#388e3c" filter="url(#shadow)"/>
      <text x="355" y="20" text-anchor="middle" fill="white" font-weight="bold" font-size="11">Receiver</text>
      <text x="355" y="38" text-anchor="middle" fill="white" font-size="8">Destination device</text>
      <text x="355" y="50" text-anchor="middle" fill="white" font-size="8">(server, display)</text>
      
      <!-- Medium -->
      <rect x="435" y="0" width="130" height="60" rx="6" fill="#9c27b0" filter="url(#shadow)"/>
      <text x="500" y="20" text-anchor="middle" fill="white" font-weight="bold" font-size="11">Medium</text>
      <text x="500" y="38" text-anchor="middle" fill="white" font-size="8">Physical path</text>
      <text x="500" y="50" text-anchor="middle" fill="white" font-size="8">(cable, wireless)</text>
      
      <!-- Protocol -->
      <rect x="580" y="0" width="130" height="60" rx="6" fill="#f44336" filter="url(#shadow)"/>
      <text x="645" y="20" text-anchor="middle" fill="white" font-weight="bold" font-size="11">Protocol</text>
      <text x="645" y="38" text-anchor="middle" fill="white" font-size="8">Rules for exchange</text>
      <text x="645" y="50" text-anchor="middle" fill="white" font-size="8">(TCP/IP, HTTP)</text>
    </g>
    <!-- Connecting arrows -->
    <path d="M90,295 L90,290 L115,290 L115,295" stroke="#666" stroke-width="1.5" fill="none" class="animated-line"/>
  </g>
  
  <!-- STEP 4: Transmission Modes -->
  <g class="step" id="step4" data-narration="Transmission modes: simplex is one-way, half-duplex is two-way alternately, full-duplex allows simultaneous communication.">
    <rect x="20" y="380" width="760" height="105" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="40" y="402" class="step-title">Data Transmission Modes</text>
    
    <!-- Simplex -->
    <g transform="translate(50, 420)">
      <rect x="0" y="0" width="220" height="55" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
      <text x="110" y="18" text-anchor="middle" font-weight="bold" fill="#1565c0">Simplex</text>
      <text x="110" y="32" text-anchor="middle" font-size="9">One-direction only</text>
      <!-- Arrow -->
      <path d="M30,45 L190,45" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)" class="animated-line"/>
      <text x="110" y="52" text-anchor="middle" font-size="8" fill="#666">TV, Radio</text>
    </g>
    
    <!-- Half-Duplex -->
    <g transform="translate(285, 420)">
      <rect x="0" y="0" width="220" height="55" rx="6" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
      <text x="110" y="18" text-anchor="middle" font-weight="bold" fill="#2e7d32">Half-Duplex</text>
      <text x="110" y="32" text-anchor="middle" font-size="9">Two-way, not simultaneous</text>
      <!-- Arrows -->
      <path d="M30,45 L80,45" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)" class="animated-line"/>
      <path d="M190,45 L140,45" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)">
        <animate attributeName="d" values="M190,45 L170,45;M190,45 L140,45" dur="1s" fill="freeze" begin="0.5s"/>
      </path>
      <text x="110" y="52" text-anchor="middle" font-size="8" fill="#666">Walkie-talkie</text>
    </g>
    
    <!-- Full-Duplex -->
    <g transform="translate(520, 420)">
      <rect x="0" y="0" width="220" height="55" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
      <text x="110" y="18" text-anchor="middle" font-weight="bold" fill="#e65100">Full-Duplex</text>
      <text x="110" y="32" text-anchor="middle" font-size="9">Simultaneous two-way</text>
      <!-- Two-way arrows -->
      <path d="M30,45 L80,45" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowBlue)" class="animated-line"/>
      <path d="M190,45 L140,45" stroke="#f44336" stroke-width="2" marker-end="url(#arrowGreen)">
        <animate attributeName="d" values="M190,45 L170,45;M190,45 L140,45" dur="1s" fill="freeze" begin="0.3s"/>
      </path>
      <text x="110" y="52" text-anchor="middle" font-size="8" fill="#666">Phone, Video call</text>
    </g>
  </g>
  
  <!-- STEP 5: Serial vs Parallel -->
  <g class="step" id="step5" data-narration="Serial transmits one bit at a time for long distances; parallel transmits multiple bits simultaneously for short distances.">
    <rect x="20" y="500" width="760" height="95" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
    <text x="40" y="522" class="step-title">Serial vs Parallel Transmission</text>
    
    <!-- Serial -->
    <g transform="translate(50, 540)">
      <rect x="0" y="0" width="320" height="45" rx="6" fill="white" stroke="#f44336" stroke-width="1"/>
      <text x="160" y="14" text-anchor="middle" font-weight="bold" fill="#c62828">Serial Transmission</text>
      <text x="160" y="28" text-anchor="middle" font-size="9">One bit at a time sequentially</text>
      <!-- Bits animation -->
      <g>
        <circle cx="40" cy="38" r="5" fill="#1976d2"/>
        <circle cx="60" cy="38" r="5" fill="#388e3c"/>
        <circle cx="80" cy="38" r="5" fill="#ff9800"/>
        <circle cx="100" cy="38" r="5" fill="#9c27b0"/>
        <circle cx="120" cy="38" r="5" fill="#f44336"/>
        <text x="140" y="40" font-size="8" fill="#666">→</text>
        <circle cx="160" cy="38" r="5" fill="#1976d2"/>
        <circle cx="180" cy="38" r="5" fill="#388e3c"/>
        <circle cx="200" cy="38" r="5" fill="#ff9800"/>
        <circle cx="220" cy="38" r="5" fill="#9c27b0"/>
        <circle cx="240" cy="38" r="5" fill="#f44336"/>
      </g>
      <text x="160" y="58" text-anchor="middle" font-size="8" fill="#666">Long distance • USB • Slow but reliable</text>
    </g>
    
    <!-- Parallel -->
    <g transform="translate(390, 540)">
      <rect x="0" y="0" width="320" height="45" rx="6" fill="white" stroke="#1976d2" stroke-width="1"/>
      <text x="160" y="14" text-anchor="middle" font-weight="bold" fill="#1565c0">Parallel Transmission</text>
      <text x="160" y="28" text-anchor="middle" font-size="9">Multiple bits simultaneously</text>
      <!-- Parallel bits -->
      <g>
        <rect x="30" y="32" width="25" height="4" fill="#1976d2"/>
        <rect x="30" y="38" width="25" height="4" fill="#388e3c"/>
        <rect x="30" y="44" width="25" height="4" fill="#ff9800"/>
        <rect x="30" y="50" width="25" height="4" fill="#9c27b0"/>
        <text x="75" y="44" font-size="8" fill="#666">→</text>
        <rect x="90" y="32" width="25" height="4" fill="#1976d2"/>
        <rect x="90" y="38" width="25" height="4" fill="#388e3c"/>
        <rect x="90" y="44" width="25" height="4" fill="#ff9800"/>
        <rect x="90" y="50" width="25" height="4" fill="#9c27b0"/>
        <rect x="130" y="32" width="25" height="4" fill="#1976d2"/>
        <rect x="130" y="38" width="25" height="4" fill="#388e3c"/>
        <rect x="130" y="44" width="25" height="4" fill="#ff9800"/>
        <rect x="130" y="50" width="25" height="4" fill="#9c27b0"/>
      </g>
      <text x="160" y="58" text-anchor="middle" font-size="8" fill="#666">Short distance • Printers • Fast but costly</text>
    </g>
  </g>
  
  <!-- STEP 6: Analog vs Digital -->
  <g class="step" id="step6" data-narration="Analog signals are continuous waves; digital signals are discrete binary pulses. Digital is more noise-resistant.">
    <rect x="20" y="610" width="760" height="100" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
    <text x="40" y="632" class="step-title">Analog vs Digital Data Transmission</text>
    
    <!-- Analog -->
    <g transform="translate(50, 650)">
      <rect x="0" y="0" width="340" height="50" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
      <text x="170" y="14" text-anchor="middle" font-weight="bold" fill="#e65100">Analog Signal</text>
      <!-- Wave -->
      <path d="M30,35 Q50,15 70,35 Q90,55 110,35 Q130,15 150,35 Q170,55 190,35 Q210,15 230,35 Q250,55 270,35 Q290,15 310,35" 
            stroke="#ff9800" stroke-width="2" fill="none" class="animated-line"/>
      <text x="170" y="46" text-anchor="middle" font-size="8" fill="#666">Continuous wave • Phone lines • Susceptible to noise</text>
    </g>
    
    <!-- Digital -->
    <g transform="translate(410, 650)">
      <rect x="0" y="0" width="340" height="50" rx="6" fill="white" stroke="#388e3c" stroke-width="1"/>
      <text x="170" y="14" text-anchor="middle" font-weight="bold" fill="#2e7d32">Digital Signal</text>
      <!-- Square wave -->
      <path d="M30,25 L30,40 L70,40 L70,20 L110,20 L110,40 L150,40 L150,20 L190,20 L190,40 L230,40 L230,20 L270,20 L270,40 L310,40" 
            stroke="#388e3c" stroke-width="2" fill="none" class="animated-line"/>
      <text x="170" y="46" text-anchor="middle" font-size="8" fill="#666">Discrete binary (0/1) • Computers • Noise-resistant</text>
    </g>
</svg>