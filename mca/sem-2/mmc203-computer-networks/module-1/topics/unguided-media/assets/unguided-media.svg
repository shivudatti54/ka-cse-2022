<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>

  <!-- step0: Title -->
  <g class="step" id="step0" data-narration="This topic covers unguided media, also known as wireless transmission media, which transmits data without physical cables using electromagnetic waves.">
    <rect x="50" y="10" width="700" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="38" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Unguided Media (Wireless Transmission Media)</text>
  </g>

  <!-- step1: Introduction + Electromagnetic Spectrum -->
  <g class="step" id="step1" data-narration="Unguided media transmits data without physical cables using electromagnetic waves through air, vacuum, or water. The electromagnetic spectrum ranges from radio waves to gamma rays.">
    <rect x="20" y="58" width="760" height="85" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Introduction &amp; Electromagnetic Spectrum</text>
    <rect x="40" y="85" width="220" height="50" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="50" y="100" font-family="Arial" font-size="9" fill="#333">• Transmits without physical cables</text>
    <text x="50" y="115" font-family="Arial" font-size="9" fill="#333">• Uses electromagnetic waves</text>
    <text x="50" y="128" font-family="Arial" font-size="9" fill="#333">• Through air, vacuum, or water</text>
    <rect x="270" y="85" width="250" height="50" rx="4" fill="white" stroke="#1976d2" stroke-width="1"/>
    <text x="280" y="100" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Electromagnetic Spectrum</text>
    <line x1="280" y1="108" x2="510" y2="108" stroke="#1976d2" stroke-width="2"/>
    <text x="280" y="122" font-family="Arial" font-size="8" fill="#333">Radio: 3kHz-300GHz</text>
    <text x="380" y="122" font-family="Arial" font-size="8" fill="#333">Microwave: 1-300GHz</text>
    <text x="480" y="122" font-family="Arial" font-size="8" fill="#333">Infrared: 300GHz-400THz</text>
    <rect x="530" y="85" width="240" height="50" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="540" y="100" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Key Advantages</text>
    <text x="540" y="115" font-family="Arial" font-size="9" fill="#333">✓ Mobility &amp; Flexibility</text>
    <text x="640" y="115" font-family="Arial" font-size="9" fill="#333">✓ Lower installation cost</text>
    <text x="540" y="128" font-family="Arial" font-size="9" fill="#333">✓ Connects remote locations</text>
  </g>

  <!-- step2: Radio Waves -->
  <g class="step" id="step2" data-narration="Radio waves are the most widely used wireless communication, ranging from 3 kHz to 300 GHz. They can penetrate obstacles and travel long distances omnidirectionally or directionally.">
    <rect x="20" y="151" width="380" height="85" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Radio Waves (3 kHz - 300 GHz)</text>
    <text x="40" y="183" font-family="Arial" font-size="9" fill="#333">• Can propagate through obstacles</text>
    <text x="40" y="196" font-family="Arial" font-size="9" fill="#333">• Long distance communication</text>
    <text x="40" y="209" font-family="Arial" font-size="9" fill="#333">• Omnidirectional or directional</text>
    <text x="40" y="222" font-family="Arial" font-size="9" fill="#333">• Used in: Wi-Fi, Bluetooth, Cellular, FM/AM</text>
    <!-- Wave visualization -->
    <path d="M280 175 Q290 165 300 175 Q310 185 320 175 Q330 165 340 175" stroke="#388e3c" stroke-width="1.5" fill="none"/>
    <path d="M280 190 Q290 180 300 190 Q310 200 320 190 Q330 180 340 190" stroke="#388e3c" stroke-width="1.5" fill="none"/>
    <path d="M280 205 Q290 195 300 205 Q310 215 320 205 Q330 195 340 205" stroke="#388e3c" stroke-width="1.5" fill="none"/>
    <text x="350" y="220" font-family="Arial" font-size="8" fill="#388e3c">RF Signal</text>

    <!-- Frequency Bands -->
    <rect x="410" y="151" width="370" height="85" rx="5" fill="white" stroke="#388e3c" stroke-width="1"/>
    <text x="420" y="168" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Radio Frequency Bands</text>
    <rect x="420" y="175" width="60" height="55" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="450" y="188" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">ELF-VLF</text>
    <text x="450" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">&lt;30 kHz</text>
    <rect x="485" y="175" width="60" height="55" rx="3" fill="#bbdefb" stroke="#1976d2"/>
    <text x="515" y="188" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">LF-MF</text>
    <text x="515" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">30kHz-3MHz</text>
    <rect x="550" y="175" width="60" height="55" rx="3" fill="#90caf9" stroke="#1976d2"/>
    <text x="580" y="188" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">HF-VHF</text>
    <text x="580" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">3-300 MHz</text>
    <rect x="615" y="175" width="60" height="55" rx="3" fill="#64b5f6" stroke="#1976d2"/>
    <text x="645" y="188" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">UHF-SHF</text>
    <text x="645" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">300MHz-30GHz</text>
    <rect x="680" y="175" width="60" height="55" rx="3" fill="#42a5f5" stroke="#1976d2"/>
    <text x="710" y="188" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">EHF</text>
    <text x="710" y="200" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">30-300GHz</text>
  </g>

  <!-- step3: Microwaves -->
  <g class="step" id="step3" data-narration="Microwaves are high-frequency waves from 1 GHz to 300 GHz requiring line-of-sight propagation. They offer higher bandwidth than radio waves for point-to-point communication.">
    <rect x="20" y="244" width="380" height="85" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="261" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">Microwaves (1 GHz - 300 GHz)</text>
    <text x="40" y="276" font-family="Arial" font-size="9" fill="#333">• Requires line-of-sight propagation</text>
    <text x="40" y="289" font-family="Arial" font-size="9" fill="#333">• Higher bandwidth than radio waves</text>
    <text x="40" y="302" font-family="Arial" font-size="9" fill="#333">• Point-to-point communication</text>
    <text x="40" y="315" font-family="Arial" font-size="9" fill="#333">• Used in: Telephone, TV, Satellite links</text>
    <!-- Dish antenna visualization -->
    <ellipse cx="320" cy="285" rx="30" ry="10" fill="none" stroke="#ff9800" stroke-width="2"/>
    <ellipse cx="320" cy="280" rx="10" ry="3" fill="#ff9800"/>
    <line x1="320" y1="280" x2="320" y2="310" stroke="#ff9800" stroke-width="2"/>
    <line x1="300" y1="310" x2="340" y2="310" stroke="#ff9800" stroke-width="2"/>
    <text x="325" y="325" font-family="Arial" font-size="8" fill="#ff9800">Parabolic Dish</text>

    <!-- Applications comparison -->
    <rect x="410" y="244" width="370" height="85" rx="5" fill="white" stroke="#ff9800" stroke-width="1"/>
    <text x="420" y="261" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Microwave Applications</text>
    <rect x="420" y="270" width="110" height="53" rx="3" fill="#ffe0b2" stroke="#ff9800"/>
    <text x="475" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Terrestrial</text>
    <text x="475" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Point-to-point</text>
    <text x="475" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">20-30 miles</text>
    <rect x="540" y="270" width="110" height="53" rx="3" fill="#ffcc80" stroke="#ff9800"/>
    <text x="595" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Satellite</text>
    <text x="595" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Earth-station</text>
    <text x="595" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">to satellite</text>
    <rect x="660" y="270" width="110" height="53" rx="3" fill="#ffb74d" stroke="#ff9800"/>
    <text x="715" y="285" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Wavelength</text>
    <text x="715" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">30cm to 1mm</text>
    <text x="715" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">High data rates</text>
  </g>

  <!-- step4: Infrared (FIXED: increased height to 93) -->
  <g class="step" id="step4" data-narration="Infrared waves range from 300 GHz to 400 THz and cannot penetrate solid objects like walls. This provides security advantages for short-range line-of-sight communication.">
    <rect x="20" y="337" width="240" height="93" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="354" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Infrared (300 GHz - 400 THz)</text>
    <text x="40" y="369" font-family="Arial" font-size="9" fill="#333">• Cannot penetrate solid objects</text>
    <text x="40" y="382" font-family="Arial" font-size="9" fill="#333">• Short-range line-of-sight</text>
    <text x="40" y="395" font-family="Arial" font-size="9" fill="#333">• Security advantage (no interception)</text>
    <text x="40" y="408" font-family="Arial" font-size="9" fill="#333">• Used in: TV remotes, IrDA</text>
    <!-- IR icon -->
    <circle cx="210" cy="375" r="20" fill="none" stroke="#f44336" stroke-width="2"/>
    <path d="M195 375 L225 375" stroke="#f44336" stroke-width="2"/>
    <path d="M198 370 L222 380" stroke="#f44336" stroke-width="1"/>
    <path d="M198 380 L222 370" stroke="#f44336" stroke-width="1"/>
    <text x="185" y="418" font-family="Arial" font-size="7" fill="#f44336">IR Signal</text>

    <!-- Satellite Communications -->
    <rect x="270" y="337" width="510" height="93" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="290" y="354" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Satellite Communications</text>
    <!-- Orbit diagram -->
    <ellipse cx="500" cy="380" rx="80" ry="25" fill="none" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="500" cy="355" r="8" fill="#9c27b0"/>
    <text x="496" y="358" text-anchor="middle" font-family="Arial" font-size="6" fill="white">GEO</text>
    <circle cx="530" cy="375" r="5" fill="#7b1fa2"/>
    <text x="545" y="378" font-family="Arial" font-size="8" fill="#9c27b0">MEO</text>
    <circle cx="460" cy="375" r="5" fill="#7b1fa2"/>
    <text x="420" y="378" font-family="Arial" font-size="8" fill="#9c27b0">LEO</text>
    <circle cx="420" cy="390" r="4" fill="#9c27b0"/>
    <text x="500" y="410" font-family="Arial" font-size="8" fill="#333">LEO: 500-2000km | MEO: 5000-20000km | GEO: ~36000km</text>
    <text x="500" y="423" font-family="Arial" font-size="8" fill="#333">Applications: GPS, TV broadcasting, Mobile communications, Weather monitoring</text>
  </g>

  <!-- step5: Propagation Modes -->
  <g class="step" id="step5" data-narration="Wireless signals propagate through ground waves, sky waves, or line-of-sight. Ground waves follow Earth's surface at low frequencies, sky waves reflect off the ionosphere.">
    <rect x="20" y="438" width="760" height="85" rx="5" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
    <text x="40" y="455" font-family="Arial" font-size="12" font-weight="bold" fill="#0288d1">Propagation Modes</text>
    <!-- Ground Wave -->
    <rect x="40" y="466" width="230" height="52" rx="4" fill="#fff9c4" stroke="#fbc02d"/>
    <text x="50" y="481" font-family="Arial" font-size="9" font-weight="bold" fill="#f57f17">Ground Wave Propagation</text>
    <text x="50" y="496" font-family="Arial" font-size="8" fill="#333">• Follows Earth's surface</text>
    <text x="50" y="508" font-family="Arial" font-size="8" fill="#333">• Low frequencies (&lt;2 MHz)</text>
    <text x="50" y="520" font-family="Arial" font-size="8" fill="#333">• Used: AM radio, maritime</text>
    <!-- Wave path -->
    <path d="M220 473 Q235 463 250 473 Q265 483 280 473" stroke="#f57f17" stroke-width="1.5" fill="none"/>

    <!-- Sky Wave -->
    <rect x="280" y="466" width="230" height="52" rx="4" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="290" y="481" font-family="Arial" font-size="9" font-weight="bold" fill="#2e7d32">Sky Wave Propagation</text>
    <text x="290" y="496" font-family="Arial" font-size="8" fill="#333">• Reflects off ionosphere</text>
    <text x="290" y="508" font-family="Arial" font-size="8" fill="#333">• HF radio frequencies</text>
    <text x="290" y="520" font-family="Arial" font-size="8" fill="#333">• Long distance communication</text>
    <!-- Reflection path -->
    <path d="M440 473 Q455 438 470 473" stroke="#2e7d32" stroke-width="1.5" fill="none"/>

    <!-- Line of Sight -->
    <rect x="520" y="466" width="250" height="52" rx="4" fill="#ffccbc" stroke="#e64a19"/>
    <text x="530" y="481" font-family="Arial" font-size="9" font-weight="bold" fill="#d84315">Line-of-Sight (LOS) Propagation</text>
    <text x="530" y="496" font-family="Arial" font-size="8" fill="#333">• Straight-line path required</text>
    <text x="530" y="508" font-family="Arial" font-size="8" fill="#333">• High freq: Microwave, Infrared</text>
    <text x="530" y="520" font-family="Arial" font-size="8" fill="#333">• Point-to-point high bandwidth</text>
    <!-- LOS path -->
    <line x1="680" y1="478" x2="720" y2="478" stroke="#d84315" stroke-width="1.5"/>
    <polygon points="715,473 725,478 715,483" fill="#d84315"/>
  </g>

  <!-- step6: Exam Tips + Summary -->
  <g class="step" id="step6" data-narration="Remember: Radio waves penetrate obstacles, microwaves need line-of-sight, infrared cannot penetrate walls. GEO satellites have high latency, LEO satellites offer lower latency.">
    <rect x="20" y="531" width="760" height="60" rx="5" fill="#e0e0e0" stroke="#616161" stroke-width="1"/>
    <text x="40" y="548" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Exam Tips &amp; Key Differences</text>
    <rect x="40" y="556" width="180" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c"/>
    <text x="130" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Radio: Penetrates obstacles</text>
    <rect x="230" y="556" width="180" height="30" rx="3" fill="#fff3e0" stroke="#ff9800"/>
    <text x="320" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Microwave: Line-of-sight</text>
    <rect x="420" y="556" width="180" height="30" rx="3" fill="#ffebee" stroke="#f44336"/>
    <text x="510" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Infrared: Cannot penetrate walls</text>
    <rect x="610" y="556" width="160" height="30" rx="3" fill="#f3e5f5" stroke="#9c27b0"/>
    <text x="690" y="573" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Satellite: GEO=high latency</text>
  </g>
</svg>