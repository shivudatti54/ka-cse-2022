<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="This lesson covers computer network types classified by geographical coverage area including PAN, LAN, CAN, MAN, and WAN for  students.">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Network Types - Classification by Geographical Coverage</text>
  </g>
  
  <!-- Step 1: Overview -->
  <g class="step" id="step1" data-narration="Networks are classified by coverage area: PAN up to 10m, LAN up to 1km, CAN 1-10km, MAN 10-100km, WAN is global.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Network Classification by Coverage</text>
    <rect x="40" y="88" width="120" height="42" fill="#f3e5f5" rx="4" stroke="#9c27b0" stroke-width="1"/>
    <text x="100" y="103" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">PAN</text>
    <text x="100" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">10m</text>
    <rect x="170" y="88" width="120" height="42" fill="#e8f5e9" rx="4" stroke="#388e3c" stroke-width="1"/>
    <text x="230" y="103" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">LAN</text>
    <text x="230" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">1km</text>
    <rect x="300" y="88" width="120" height="42" fill="#fff3e0" rx="4" stroke="#ff9800" stroke-width="1"/>
    <text x="360" y="103" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">CAN</text>
    <text x="360" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">1-10km</text>
    <rect x="430" y="88" width="120" height="42" fill="#ffebee" rx="4" stroke="#f44336" stroke-width="1"/>
    <text x="490" y="103" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">MAN</text>
    <text x="490" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#f44336">10-100km</text>
    <rect x="560" y="88" width="120" height="42" fill="#e3f2fd" rx="4" stroke="#1976d2" stroke-width="1"/>
    <text x="620" y="103" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">WAN</text>
    <text x="620" y="118" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">Global</text>
  </g>
  
  <!-- Step 2: PAN and LAN -->
  <g class="step" id="step2" data-narration="PAN connects personal devices within 10 meters using Bluetooth or NFC. LAN covers up to 1km with Ethernet and Wi-Fi technologies.">
    <rect x="20" y="146" width="370" height="80" fill="#f3e5f5" rx="8" stroke="#9c27b0" stroke-width="2"/>
    <text x="35" y="166" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">PAN - Personal Area Network</text>
    <text x="35" y="182" font-family="Arial" font-size="9" fill="#333">Coverage: Up to 10 meters</text>
    <text x="35" y="196" font-family="Arial" font-size="9" fill="#333">Speed: Up to 50 Mbps (Bluetooth 5.0)</text>
    <text x="35" y="210" font-family="Arial" font-size="9" fill="#333">Tech: Bluetooth, NFC, Infrared</text>
    <text x="35" y="224" font-family="Arial" font-size="8" fill="#666">Example: Smartphone to wireless earphone</text>
    
    <rect x="400" y="146" width="380" height="80" fill="#e8f5e9" rx="8" stroke="#388e3c" stroke-width="2"/>
    <text x="415" y="166" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">LAN - Local Area Network</text>
    <text x="415" y="182" font-family="Arial" font-size="9" fill="#333">Coverage: Up to 1 kilometer</text>
    <text x="415" y="196" font-family="Arial" font-size="9" fill="#333">Speed: 100 Mbps - 10 Gbps</text>
    <text x="415" y="210" font-family="Arial" font-size="9" fill="#333">Tech: Ethernet (802.3), Wi-Fi (802.11)</text>
    <text x="415" y="224" font-family="Arial" font-size="8" fill="#666">Example: Office network, home Wi-Fi</text>
  </g>
  
  <!-- Step 3: CAN and MAN -->
  <g class="step" id="step3" data-narration="CAN links multiple LANs across university or corporate campuses spanning 1-10km using fiber optic cables. MAN connects multiple buildings across a city covering 10-100km.">
    <rect x="20" y="234" width="370" height="80" fill="#fff3e0" rx="8" stroke="#ff9800" stroke-width="2"/>
    <text x="35" y="254" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">CAN - Campus Area Network</text>
    <text x="35" y="270" font-family="Arial" font-size="9" fill="#333">Coverage: 1 to 10 kilometers</text>
    <text x="35" y="284" font-family="Arial" font-size="9" fill="#333">Speed: 1 Gbps - 10 Gbps</text>
    <text x="35" y="298" font-family="Arial" font-size="9" fill="#333">Tech: Ethernet, Fiber Optics</text>
    <text x="35" y="312" font-family="Arial" font-size="8" fill="#666">Example: University campus network</text>
    
    <rect x="400" y="234" width="380" height="80" fill="#ffebee" rx="8" stroke="#f44336" stroke-width="2"/>
    <text x="415" y="254" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">MAN - Metropolitan Area Network</text>
    <text x="415" y="270" font-family="Arial" font-size="9" fill="#333">Coverage: 10 to 100 kilometers</text>
    <text x="415" y="284" font-family="Arial" font-size="9" fill="#333">Speed: 100 Mbps - 10 Gbps</text>
    <text x="415" y="298" font-family="Arial" font-size="9" fill="#333">Tech: Fiber Optics, Metro Ethernet</text>
    <text x="415" y="312" font-family="Arial" font-size="8" fill="#666">Example: City cable TV network</text>
  </g>
  
  <!-- Step 4: WAN -->
  <g class="step" id="step4" data-narration="WAN spans global distances using public infrastructure. The Internet is the largest WAN example with variable speeds and higher latency.">
    <rect x="20" y="322" width="760" height="80" fill="#e3f2fd" rx="8" stroke="#1976d2" stroke-width="2"/>
    <text x="35" y="342" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">WAN - Wide Area Network</text>
    <text x="35" y="360" font-family="Arial" font-size="9" fill="#333">Coverage: Global (countries, continents)</text>
    <text x="35" y="376" font-family="Arial" font-size="9" fill="#333">Speed: 56 Kbps - 10 Gbps (varies widely)</text>
    <text x="35" y="392" font-family="Arial" font-size="9" fill="#333">Tech: MPLS, Satellite, Leased Lines, Frame Relay</text>
    <text x="350" y="360" font-family="Arial" font-size="9" fill="#333">Example: Internet, Enterprise VPN</text>
    <text x="350" y="380" font-family="Arial" font-size="9" fill="#333">Higher latency, lower speed than LAN</text>
    <text x="350" y="400" font-family="Arial" font-size="9" fill="#333">Uses public/service provider infrastructure</text>
  </g>
  
  <!-- Step 5: Speed and Technology Comparison -->
  <g class="step" id="step5" data-narration="LAN has highest speed (10 Gbps), followed by CAN and MAN. Speed decreases as coverage increases. Technology standards differ for each type.">
    <rect x="20" y="410" width="760" height="80" fill="#f8f9fa" rx="8" stroke="#666" stroke-width="1"/>
    <text x="35" y="430" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Speed &amp; Technology Comparison</text>
    
    <rect x="35" y="442" width="100" height="40" fill="#f3e5f5" rx="4"/>
    <text x="85" y="456" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">PAN</text>
    <text x="85" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Lowest Speed</text>
    <text x="85" y="480" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Bluetooth</text>
    
    <rect x="145" y="442" width="100" height="40" fill="#e8f5e9" rx="4"/>
    <text x="195" y="456" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">LAN</text>
    <text x="195" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Highest Speed</text>
    <text x="195" y="480" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Ethernet/Wi-Fi</text>
    
    <rect x="255" y="442" width="100" height="40" fill="#fff3e0" rx="4"/>
    <text x="305" y="456" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">CAN</text>
    <text x="305" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">High Speed</text>
    <text x="305" y="480" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Fiber/Ethernet</text>
    
    <rect x="365" y="442" width="100" height="40" fill="#ffebee" rx="4"/>
    <text x="415" y="456" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f44336">MAN</text>
    <text x="415" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">High Speed</text>
    <text x="415" y="480" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Fiber Optic</text>
    
    <rect x="475" y="442" width="100" height="40" fill="#e3f2fd" rx="4"/>
    <text x="525" y="456" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">WAN</text>
    <text x="525" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Variable</text>
    <text x="525" y="480" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">MPLS/Satellite</text>
    
    <text x="590" y="460" font-family="Arial" font-size="9" fill="#333">IEEE Standards:</text>
    <text x="590" y="476" font-family="Arial" font-size="8" fill="#666">802.15 (PAN) | 802.3/11 (LAN)</text>
    <text x="590" y="488" font-family="Arial" font-size="8" fill="#666">Speed: LAN &gt; CAN &gt; MAN &gt; WAN &gt; PAN</text>
  </g>
  
  <!-- Step 6: Exam Tips and Summary -->
  <g class="step" id="step6" data-narration="Remember coverage order from smallest to largest: PAN-LAN-CAN-MAN-WAN. Know IEEE standards: 802.3 Ethernet, 802.11 Wi-Fi, and 802.15 Bluetooth for your  exam preparation.">
    <rect x="20" y="498" width="760" height="90" fill="#fff8e1" rx="8" stroke="#ffa000" stroke-width="2"/>
    <text x="35" y="520" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100"> Exam Tips</text>
    <text x="35" y="538" font-family="Arial" font-size="9" fill="#333">1. Coverage Order (Ascending): PAN (10m) → LAN (1km) → CAN (10km) → MAN (100km) → WAN (Global)</text>
    <text x="35" y="554" font-family="Arial" font-size="9" fill="#333">2. IEEE Standards: 802.3 (Ethernet), 802.11 (Wi-Fi), 802.15 (Bluetooth) - memorize these numbers</text>
    <text x="35" y="570" font-family="Arial" font-size="9" fill="#333">3. Key Distinction: LAN/CAN are privately owned; WAN uses public infrastructure (Internet)</text>
    <text x="35" y="586" font-family="Arial" font-size="9" fill="#333">4. Real Examples: PAN-Bluetooth earpiece, LAN-Office, CAN-University campus, MAN-Cable TV, WAN-Internet</text>
  </g>
</svg>