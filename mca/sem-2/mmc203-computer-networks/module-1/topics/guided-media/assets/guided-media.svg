<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Welcome to guided media in computer networks. We'll explore twisted pair, coaxial, and fiber optic cables used for data transmission.">
    <rect x="0" y="0" width="800" height="50" fill="#e3f2fd"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Guided Media in Computer Networks</text>
  </g>
  
  <g class="step" id="step1" data-narration="Twisted Pair cables consist of two copper wires twisted together to reduce electromagnetic interference and crosstalk. It's the most common LAN cable.">
    <rect x="20" y="58" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Twisted Pair Cable</text>
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333">Two copper wires twisted in helical pattern to reduce EMI and crosstalk</text>
    <text x="40" y="112" font-family="Arial" font-size="10" fill="#333">UTP: No shielding, cost-effective | STP: Added foil/braid shield, better EMI protection</text>
    <text x="40" y="129" font-family="Arial" font-size="10" fill="#666">Connectors: RJ-45 | Max Distance: 100m for Ethernet</text>
  </g>
  
  <g class="step" id="step2" data-narration="Twisted pair categories include Cat5e (1Gbps), Cat6 (10Gbps limited), Cat6a (10Gbps), and Cat8 (25-40Gbps). Higher categories support significantly more bandwidth and speed.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">Twisted Pair Categories</text>
    <rect x="40" y="175" width="100" height="40" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="90" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cat5e</text>
    <text x="90" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">100MHz</text>
    <text x="90" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">1 Gbps</text>
    <rect x="150" y="175" width="100" height="40" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="200" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cat6</text>
    <text x="200" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">250MHz</text>
    <text x="200" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">10 Gbps</text>
    <rect x="260" y="175" width="100" height="40" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="310" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cat6a</text>
    <text x="310" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">500MHz</text>
    <text x="310" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">10 Gbps</text>
    <rect x="370" y="175" width="100" height="40" fill="#fff" stroke="#388e3c" rx="3"/>
    <text x="420" y="188" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cat8</text>
    <text x="420" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2000MHz</text>
    <text x="420" y="212" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">40 Gbps</text>
  </g>
  
  <g class="step" id="step3" data-narration="Coaxial cable has a central copper conductor, insulation, braided metal shield, and outer jacket. It offers excellent EMI shielding and longer distances.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="14" font-weight="bold" fill="#ff9800">Coaxial Cable</text>
    <text x="40" y="271" font-family="Arial" font-size="10" fill="#333">Central conductor → Insulation → Braided metal shield → Outer jacket</text>
    <text x="40" y="288" font-family="Arial" font-size="10" fill="#333">Excellent shielding against EMI, higher bandwidth than twisted pair</text>
    <rect x="350" y="250" width="120" height="50" fill="#fff" stroke="#ff9800" rx="3"/>
    <text x="410" y="268" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">RG-58 (Thin)</text>
    <text x="410" y="283" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">10Base2</text>
    <text x="410" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">185m max</text>
    <rect x="480" y="250" width="120" height="50" fill="#fff" stroke="#ff9800" rx="3"/>
    <text x="540" y="268" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">RG-8 (Thick)</text>
    <text x="540" y="283" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">10Base5</text>
    <text x="540" y="296" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">500m max</text>
  </g>
  
  <g class="step" id="step4" data-narration="Fiber optic cables transmit data as light pulses through glass or plastic fibers. They offer the highest bandwidth and longest transmission distances.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Fiber Optic Cable</text>
    <text x="40" y="359" font-family="Arial" font-size="10" fill="#333">Transmits data as light pulses through thin glass/plastic fibers</text>
    <text x="40" y="376" font-family="Arial" font-size="10" fill="#333">Very high bandwidth, low attenuation, immune to EMI, better security</text>
    <rect x="40" y="385" width="220" height="10" fill="#e0e0e0" rx="2"/>
    <rect x="40" y="385" width="220" height="10" fill="#9c27b0" rx="2"/>
    <text x="50" y="394" font-family="Arial" font-size="8" fill="#fff">Core</text>
  </g>
  
  <g class="step" id="step5" data-narration="Single-mode fiber has a small 8-10 micrometer core for long distances up to 100km. Multi-mode fiber has 50-62.5 micrometer core for shorter distances up to 2km.">
    <rect x="20" y="410" width="760" height="80" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0">Single-Mode vs Multi-Mode Fiber</text>
    <rect x="40" y="445" width="340" height="35" fill="#fff" stroke="#9c27b0" rx="3"/>
    <text x="210" y="458" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Single-Mode (SMF)</text>
    <text x="210" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Core: 8-10 μm | Distance: 100+ km</text>
    <text x="210" y="483" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Uses laser source | Higher bandwidth</text>
    <rect x="400" y="445" width="340" height="35" fill="#fff" stroke="#9c27b0" rx="3"/>
    <text x="570" y="458" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Multi-Mode (MMF)</text>
    <text x="570" y="472" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Core: 50-62.5 μm | Distance: 2 km</text>
    <text x="570" y="483" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Uses LED/laser | Lower cost</text>
  </g>
  
  <g class="step" id="step6" data-narration="For LAN installations, Cat6 UTP is recommended for 1Gbps up to 100m. Choose fiber for long distances and high bandwidth backbone networks.">
    <rect x="20" y="498" width="760" height="85" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="518" font-family="Arial" font-size="14" font-weight="bold" fill="#f44336">Summary &amp; Selection Guide</text>
    <rect x="40" y="530" width="150" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="115" y="545" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Twisted Pair</text>
    <text x="115" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">LAN, 100m, cost-effective</text>
    <text x="115" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Cat5e/Cat6/Cat6a</text>
    <rect x="200" y="530" width="150" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="275" y="545" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Coaxial</text>
    <text x="275" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cable TV, 185-500m</text>
    <text x="275" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Legacy networks</text>
    <rect x="360" y="530" width="150" height="45" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="435" y="545" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Fiber Optic</text>
    <text x="435" y="558" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Backbone, 100+ km</text>
    <text x="435" y="570" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">High-speed networks</text>
    <text x="530" y="555" font-family="Arial" font-size="9" fill="#333">Exam tip: Remember max distances:</text>
    <text x="530" y="570" font-family="Arial" font-size="8" fill="#666">TP: 100m | 10Base2: 185m</text>
    <text x="530" y="582" font-family="Arial" font-size="8" fill="#666">10Base5: 500m | MMF: 2km | SMF: 100+km</text>
  </g>
</svg>