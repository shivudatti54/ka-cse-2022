<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Transmission media is the physical pathway for data communication. It is classified into guided media like cables and unguided media like wireless signals.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">Transmission Media</text>
  </g>
  
  <g class="step" id="step1" data-narration="Guided media physically guide signals through solid conductors like cables. Unguided media transmit signals freely through air without physical connectors.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="400" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Classification of Transmission Media</text>
    <rect x="50" y="90" width="330" height="40" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="215" y="112" text-anchor="middle" font-family="Arial" font-size="12" fill="#1976d2">Guided Media (Bounded)</text>
    <text x="215" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Twisted Pair, Coaxial, Optical Fiber</text>
    <rect x="420" y="90" width="330" height="40" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="585" y="112" text-anchor="middle" font-family="Arial" font-size="12" fill="#388e3c">Unguided Media (Unbounded)</text>
    <text x="585" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Radio Waves, Microwaves, Infrared</text>
  </g>
  
  <g class="step" id="step2" data-narration="Twisted pair cables consist of copper wires twisted to reduce EMI. UTP is common in LANs with Cat5e to Cat8 categories. Coaxial cable has better shielding for TV and networks.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="400" y="163" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Guided Media: Twisted Pair and Coaxial</text>
    <rect x="50" y="175" width="230" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="165" y="190" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Twisted Pair Cable</text>
    <text x="165" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">UTP: Cat5e-1G, Cat6-10G</text>
    <text x="165" y="217" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Max length: 100m | RJ-45</text>
    <rect x="290" y="175" width="230" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="405" y="190" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Shielded Twisted Pair</text>
    <text x="405" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Better EMI protection</text>
    <text x="405" y="217" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">More expensive than UTP</text>
    <rect x="530" y="175" width="230" height="45" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="645" y="190" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Coaxial Cable</text>
    <text x="645" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">10Base2: 185m, 10Base5: 500m</text>
    <text x="645" y="217" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Cable TV, early Ethernet</text>
  </g>
  
  <g class="step" id="step3" data-narration="Optical fiber transmits light pulses through glass strands. Single-mode fiber has 8-10μm core for 100km distances. Multi-mode has 50-62.5μm core for 2km runs.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="400" y="251" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Guided Media: Optical Fiber</text>
    <rect x="50" y="263" width="340" height="45" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="220" y="280" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Single-Mode Fiber (SMF)</text>
    <text x="220" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Core: 8-10μm | Distance: up to 100km</text>
    <text x="220" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Long-haul telecom, high bandwidth</text>
    <rect x="410" y="263" width="340" height="45" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="580" y="280" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">Multi-Mode Fiber (MMF)</text>
    <text x="580" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Core: 50-62.5μm | Distance: up to 2km</text>
    <text x="580" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Campus backbone, cost-effective</text>
  </g>
  
  <g class="step" id="step4" data-narration="Radio waves operate from 3kHz to 300GHz and are omnidirectional, penetrating walls easily. Used in Wi-Fi, Bluetooth, and cellular networks for wireless communication.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="400" y="339" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Unguided Media: Radio Waves and Microwaves</text>
    <rect x="50" y="352" width="340" height="45" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="220" y="370" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2">Radio Waves</text>
    <text x="220" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Frequency: 3 kHz - 300 GHz</text>
    <text x="220" y="395" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Omnidirectional | Wi-Fi, Bluetooth, Cellular</text>
    <rect x="410" y="352" width="340" height="45" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="580" y="370" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#388e3c">Microwaves</text>
    <text x="580" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Frequency: 1 - 300 GHz</text>
    <text x="580" y="395" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Line-of-sight | Satellite links, backhaul</text>
  </g>
  
  <g class="step" id="step5" data-narration="Infrared operates at 300GHz to 400THz, requiring line-of-sight without passing through solid objects. Used in TV remotes and short-range device communication applications.">
    <rect x="20" y="410" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="400" y="427" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Unguided Media: Infrared and Satellite</text>
    <rect x="50" y="440" width="340" height="45" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="220" y="458" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff9800">Infrared</text>
    <text x="220" y="473" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Frequency: 300 GHz - 400 THz</text>
    <text x="220" y="483" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Line-of-sight only | TV remote, short-range</text>
    <rect x="410" y="440" width="340" height="45" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="580" y="458" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#f44336">Satellite Communication</text>
    <text x="580" y="473" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">GEO: 35,786 km | LEO: 500-2000 km</text>
    <text x="580" y="483" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">TV broadcasting, remote internet</text>
  </g>
  
  <g class="step" id="step6" data-narration="Key characteristics like attenuation, crosstalk, and noise affect signal quality. Transmission modes include simplex, half-duplex, and full-duplex enabling different communication patterns.">
    <rect x="20" y="498" width="760" height="90" fill="#ffffff" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="400" y="515" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Key Characteristics and Transmission Types</text>
    <rect x="50" y="525" width="150" height="55" fill="#e3f2fd" stroke="#1976d2" rx="3"/>
    <text x="125" y="542" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976d2">Attenuation</text>
    <text x="125" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Signal loss over</text>
    <text x="125" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">distance (dB)</text>
    <rect x="210" y="525" width="150" height="55" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="285" y="542" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Crosstalk</text>
    <text x="285" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Signal coupling</text>
    <text x="285" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">between wires</text>
    <rect x="370" y="525" width="150" height="55" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="445" y="542" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Noise</text>
    <text x="445" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Unwanted signals</text>
    <text x="445" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">interfering with data</text>
    <rect x="530" y="525" width="230" height="55" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="645" y="542" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c27b0">Transmission Types</text>
    <text x="645" y="556" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Simplex (TV) | Half-Duplex (Walkie-talkie)</text>
    <text x="645" y="566" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Full-Duplex (Telephone)</text>
  </g>
</svg>