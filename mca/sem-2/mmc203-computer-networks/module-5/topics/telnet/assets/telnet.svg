<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This diagram explains Telnet, a fundamental network protocol designed for remote terminal access using TCP port 23 in computer networks.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="37" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1565c0">Telnet Protocol - Terminal Network</text>
  </g>
  
  <g class="step" id="step1" data-narration="Telnet provides full bidirectional text-based communication through a Network Virtual Terminal (NVT), allowing diverse terminal types to communicate seamlessly over networks.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="40" y="78" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Network Virtual Terminal (NVT)</text>
    <rect x="40" y="88" width="180" height="40" fill="#bbdefb" rx="3"/>
    <text x="130" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Client Terminal</text>
    <text x="130" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">(Local Format)</text>
    <path d="M220 108 L280 108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="280" y="88" width="200" height="40" fill="#90caf9" rx="3"/>
    <text x="380" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">NVT Format</text>
    <text x="380" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">(Standard ASCII)</text>
    <path d="M480 108 L540 108" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="540" y="88" width="180" height="40" fill="#bbdefb" rx="3"/>
    <text x="630" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d47a1">Server Terminal</text>
    <text x="630" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">(Remote Format)</text>
  </g>
  
  <g class="step" id="step2" data-narration="Telnet operates in three distinct phases: establishing a TCP connection on port 23, negotiating options via IAC commands, and then transferring plain text data.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="5"/>
    <text x="40" y="166" font-family="Arial" font-size="13" font-weight="bold" fill="#2e7d32">Connection Phases</text>
    <rect x="40" y="178" width="220" height="40" fill="#c8e6c9" rx="3"/>
    <text x="150" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">1. Connection Establishment</text>
    <text x="150" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">TCP Port 23, Login Prompt</text>
    <path d="M260 198 L300 198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowgreen)"/>
    <rect x="300" y="178" width="220" height="40" fill="#a5d6a7" rx="3"/>
    <text x="410" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">2. Option Negotiation</text>
    <text x="410" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">IAC + WILL/DO Commands</text>
    <path d="M520 198 L560 198" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowgreen)"/>
    <rect x="560" y="178" width="200" height="40" fill="#81c784" rx="3"/>
    <text x="660" y="193" text-anchor="middle" font-family="Arial" font-size="10" fill="#1b5e20">3. Data Transfer</text>
    <text x="660" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Plain Text Communication</text>
  </g>
  
  <g class="step" id="step3" data-narration="Telnet commands include IAC (255) as the prefix, followed by WILL (251), DO (252), WON'T (253), DON'T (254), and SB (250) for option negotiation.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
    <text x="40" y="254" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Telnet Commands</text>
    <rect x="40" y="268" width="100" height="38" fill="#ffe0b2" rx="3"/>
    <text x="90" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">IAC</text>
    <text x="90" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">255</text>
    <rect x="150" y="268" width="100" height="38" fill="#ffcc80" rx="3"/>
    <text x="200" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">WILL</text>
    <text x="200" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">251</text>
    <rect x="260" y="268" width="100" height="38" fill="#ffcc80" rx="3"/>
    <text x="310" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">DO</text>
    <text x="310" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">252</text>
    <rect x="370" y="268" width="100" height="38" fill="#ffb74d" rx="3"/>
    <text x="420" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">WON'T</text>
    <text x="420" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">253</text>
    <rect x="480" y="268" width="100" height="38" fill="#ffb74d" rx="3"/>
    <text x="530" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">DON'T</text>
    <text x="530" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">254</text>
    <rect x="590" y="268" width="100" height="38" fill="#ffa726" rx="3"/>
    <text x="640" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#bf360c">SB</text>
    <text x="640" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff9800">250</text>
    <rect x="700" y="268" width="60" height="38" fill="#ff9800" rx="3"/>
    <text x="730" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="white">SE=240</text>
  </g>
  
  <g class="step" id="step4" data-narration="Telnet transmits all data including passwords in clear text without any encryption, making it highly vulnerable to packet sniffing, interception, and various cyber attacks.">
    <rect x="20" y="322" width="760" height="95" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="5"/>
    <text x="40" y="342" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">Security Vulnerabilities</text>
    <rect x="40" y="356" width="230" height="38" fill="#ffcdd2" rx="3"/>
    <text x="155" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Clear Text Transmission</text>
    <text x="155" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">No Encryption</text>
    <rect x="285" y="356" width="230" height="38" fill="#ef9a9a" rx="3"/>
    <text x="400" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">No Strong Authentication</text>
    <text x="400" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Weak Password</text>
    <rect x="530" y="356" width="230" height="38" fill="#e57373" rx="3"/>
    <text x="645" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#b71c1c">Man-in-the-Middle</text>
    <text x="645" y="386" text-anchor="middle" font-family="Arial" font-size="9" fill="#f44336">Easy to Intercept</text>
    <text x="400" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic" fill="#c62828">Never use Telnet over untrusted networks!</text>
  </g>
  
  <g class="step" id="step5" data-narration="Telnet remains valuable for network troubleshooting to test TCP port connectivity, checking services like SMTP, HTTP, FTP, and managing legacy embedded systems.">
    <rect x="20" y="425" width="760" height="84" fill="#e1bee7" stroke="#9c27b0" stroke-width="1" rx="5"/>
    <text x="40" y="445" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Practical Applications</text>
    <rect x="40" y="459" width="220" height="38" fill="#e1bee7" stroke="#ba68c8" stroke-width="1" rx="3"/>
    <text x="150" y="475" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Network Troubleshooting</text>
    <text x="150" y="489" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">Test TCP Port Connectivity</text>
    <rect x="275" y="459" width="220" height="38" fill="#ce93d8" stroke="#ba68c8" stroke-width="1" rx="3"/>
    <text x="385" y="475" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Testing Services</text>
    <text x="385" y="489" text-anchor="middle" font-family="Arial" font-size="9" fill="#9c27b0">SMTP, HTTP, FTP</text>
    <rect x="510" y="459" width="220" height="38" fill="#ab47bc" rx="3"/>
    <text x="620" y="475" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Legacy Systems</text>
    <text x="620" y="489" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Older Devices Access</text>
  </g>
  
  <g class="step" id="step6" data-narration="SSH has largely replaced Telnet in production environments due to its encryption, strong authentication, and completely secure encrypted communication channels.">
    <rect x="20" y="517" width="760" height="70" fill="#e0f2f1" stroke="#00796b" stroke-width="1" rx="5"/>
    <text x="40" y="537" font-family="Arial" font-size="13" font-weight="bold" fill="#004d40">Telnet vs SSH Comparison</text>
    <rect x="40" y="549" width="330" height="30" fill="#ffcdd2" stroke="#ef5350" stroke-width="1" rx="3"/>
    <text x="205" y="564" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Telnet: Port 23, Plain Text</text>
    <rect x="430" y="549" width="330" height="30" fill="#c8e6c9" stroke="#66bb6a" stroke-width="1" rx="3"/>
    <text x="595" y="564" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">SSH: Port 22, Encrypted</text>
  </g>
</svg>