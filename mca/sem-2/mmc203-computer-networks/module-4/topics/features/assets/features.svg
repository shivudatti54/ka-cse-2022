<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This educational diagram explains the ten key features that make Python a popular programming language for both beginners and professionals alike.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Features of Python Programming Language</text>
  </g>
  
  <g class="step" id="step1" data-narration="Python has simple, English-like syntax with no complex declarations needed—just indentation defines code blocks for clean, readable programs that are easy to understand.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="58" width="760" height="25" fill="#1976d2" rx="8"/>
    <text x="40" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="white">1. Simple and Easy to Learn</text>
    <rect x="40" y="95" width="120" height="30" fill="white" stroke="#1976d2" stroke-width="1.5" rx="4"/>
    <text x="100" y="112" text-anchor="middle" font-family="Courier" font-size="9" fill="#1976d2">a = 10</text>
    <text x="100" y="122" text-anchor="middle" font-family="Courier" font-size="8" fill="#666"># No type needed</text>
    <rect x="180" y="95" width="180" height="30" fill="white" stroke="#1976d2" stroke-width="1.5" rx="4"/>
    <text x="270" y="110" text-anchor="middle" font-family="Courier" font-size="9" fill="#1976d2">if a > 5:</text>
    <text x="270" y="122" text-anchor="middle" font-family="Courier" font-size="8" fill="#1976d2">print("Hi")  # Indentation</text>
  </g>
  
  <g class="step" id="step2" data-narration="Python executes code line by line through an interpreter. This gives immediate feedback, easier debugging, and makes Python work on any platform.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="8"/>
    <rect x="20" y="146" width="760" height="25" fill="#388e3c" rx="8"/>
    <text x="40" y="163" font-family="Arial" font-size="12" font-weight="bold" fill="white">2. Interpreted Language</text>
    <line x1="60" y1="200" x2="200" y2="200" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="220" y="185" width="100" height="30" fill="white" stroke="#388e3c" stroke-width="1.5" rx="4"/>
    <text x="270" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Source Code</text>
    <line x1="340" y1="200" x2="440" y2="200" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="460" y="185" width="100" height="30" fill="#388e3c" stroke="#388e3c" stroke-width="1.5" rx="4"/>
    <text x="510" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Interpreter</text>
    <line x1="580" y1="200" x2="680" y2="200" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="700" y="185" width="60" height="30" fill="white" stroke="#388e3c" stroke-width="1.5" rx="4"/>
    <text x="730" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#388e3c">Output</text>
  </g>
  
  <g class="step" id="step3" data-narration="Python uses dynamic typing where variable types are decided at runtime. The same variable can hold different types during program execution for flexibility.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="8"/>
    <rect x="20" y="234" width="760" height="25" fill="#ff9800" rx="8"/>
    <text x="40" y="251" font-family="Arial" font-size="12" font-weight="bold" fill="white">3. Dynamically Typed</text>
    <rect x="50" y="270" width="150" height="35" fill="white" stroke="#ff9800" stroke-width="1.5" rx="4"/>
    <text x="125" y="288" text-anchor="middle" font-family="Courier" font-size="10" fill="#ff9800">x = 10</text>
    <text x="125" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Integer at runtime</text>
    <line x1="210" y1="287" x2="250" y2="287" stroke="#ff9800" stroke-width="2"/>
    <text x="230" y="280" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff9800">→</text>
    <rect x="260" y="270" width="150" height="35" fill="white" stroke="#ff9800" stroke-width="1.5" rx="4"/>
    <text x="335" y="288" text-anchor="middle" font-family="Courier" font-size="10" fill="#ff9800">x = "Hello"</text>
    <text x="335" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">String at runtime</text>
    <line x1="420" y1="287" x2="460" y2="287" stroke="#ff9800" stroke-width="2"/>
    <rect x="470" y="270" width="150" height="35" fill="white" stroke="#ff9800" stroke-width="1.5" rx="4"/>
    <text x="545" y="288" text-anchor="middle" font-family="Courier" font-size="10" fill="#ff9800">x = [1, 2, 3]</text>
    <text x="545" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">List at runtime</text>
  </g>
  
  <g class="step" id="step4" data-narration="Python fully supports object-oriented programming with classes, inheritance, polymorphism, and encapsulation principles. Everything in Python is fundamentally an object that can be manipulated.">
    <rect x="20" y="322" width="760" height="80" fill="#f3e5f5" rx="8"/>
    <rect x="20" y="322" width="760" height="25" fill="#9c27b0" rx="8"/>
    <text x="40" y="339" font-family="Arial" font-size="12" font-weight="bold" fill="white">4. Object-Oriented Programming Support</text>
    <rect x="50" y="358" width="200" height="35" fill="white" stroke="#9c27b0" stroke-width="1.5" rx="4"/>
    <text x="150" y="375" text-anchor="middle" font-family="Courier" font-size="9" fill="#9c27b0">class Dog:</text>
    <text x="150" y="387" text-anchor="middle" font-family="Courier" font-size="8" fill="#9c27b0">def __init__(self, name):</text>
    <rect x="270" y="358" width="200" height="35" fill="white" stroke="#9c27b0" stroke-width="1.5" rx="4"/>
    <text x="370" y="375" text-anchor="middle" font-family="Courier" font-size="9" fill="#9c27b0">Inheritance</text>
    <text x="370" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Parent → Child</text>
    <rect x="490" y="358" width="130" height="35" fill="white" stroke="#9c27b0" stroke-width="1.5" rx="4"/>
    <text x="555" y="375" text-anchor="middle" font-family="Courier" font-size="9" fill="#9c27b0">Polymorphism</text>
    <text x="555" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Many forms</text>
    <rect x="640" y="358" width="120" height="35" fill="white" stroke="#9c27b0" stroke-width="1.5" rx="4"/>
    <text x="700" y="375" text-anchor="middle" font-family="Courier" font-size="9" fill="#9c27b0">Encapsulation</text>
    <text x="700" y="387" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Data hiding</text>
  </g>
  
  <g class="step" id="step5" data-narration="Python comes with an extensive standard library—the 'batteries included' philosophy. Modules for math, files, networking, databases, and more are built-in.">
    <rect x="20" y="410" width="760" height="100" fill="#ffebee" rx="8"/>
    <rect x="20" y="410" width="760" height="25" fill="#f44336" rx="8"/>
    <text x="40" y="427" font-family="Arial" font-size="12" font-weight="bold" fill="white">5. Extensive Standard Library</text>
    <rect x="50" y="448" width="100" height="35" fill="#f44336" rx="4"/>
    <text x="100" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="white">math</text>
    <rect x="170" y="448" width="100" height="35" fill="#f44336" rx="4"/>
    <text x="220" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="white">random</text>
    <rect x="290" y="448" width="100" height="35" fill="#f44336" rx="4"/>
    <text x="340" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="white">datetime</text>
    <rect x="410" y="448" width="100" height="35" fill="#f44336" rx="4"/>
    <text x="460" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="white">os</text>
    <rect x="530" y="448" width="100" height="35" fill="#f44336" rx="4"/>
    <text x="580" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="white">re</text>
    <rect x="650" y="448" width="110" height="35" fill="#f44336" rx="4"/>
    <text x="705" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="white">json</text>
    <text x="400" y="498" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">...and many more modules for file I/O, threading, networking, HTTP, and XML</text>
  </g>
  
  <g class="step" id="step6" data-narration="Python runs on Windows, Linux, and macOS without code changes. The rich ecosystem includes Django, Flask, NumPy, and TensorFlow for web and data science.">
    <rect x="20" y="518" width="760" height="75" fill="#e3f2fd" rx="8"/>
    <rect x="20" y="518" width="760" height="25" fill="#1976d2" rx="8"/>
    <text x="40" y="535" font-family="Arial" font-size="12" font-weight="bold" fill="white">6. Cross-Platform &amp; Rich Ecosystem</text>
    <rect x="50" y="555" width="120" height="30" fill="white" stroke="#1976d2" stroke-width="1.5" rx="4"/>
    <text x="110" y="572" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Windows</text>
    <text x="110" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">✓ Supported</text>
    <rect x="190" y="555" width="120" height="30" fill="white" stroke="#1976d2" stroke-width="1.5" rx="4"/>
    <text x="250" y="572" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Linux</text>
    <text x="250" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">✓ Supported</text>
    <rect x="330" y="555" width="120" height="30" fill="white" stroke="#1976d2" stroke-width="1.5" rx="4"/>
    <text x="390" y="572" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">macOS</text>
    <text x="390" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">✓ Supported</text>
    <rect x="470" y="555" width="290" height="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="4"/>
    <text x="615" y="572" text-anchor="middle" font-family="Arial" font-size="9" fill="#1976d2">Django, Flask | NumPy, Pandas | TensorFlow</text>
  </g>
</svg>