<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="This presentation covers Label Switched Router LSR fundamentals in MPLS networks including architecture label operations types and penultimate hop popping concepts">
    <rect x="0" y="10" width="800" height="40" fill="#1976d2" rx="5"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">Label Switched Router (LSR) in MPLS</text>
  </g>
  
  <g class="step" id="step1" data-narration="LSR is a core MPLS device operating at layer 2.5 that performs label-based forwarding instead of IP routing, enabling faster packet processing in networks.">
    <rect x="20" y="58" width="760" height="80" fill="#e3f2fd" rx="5" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">What is an LSR?</text>
    <text x="40" y="100" font-family="Arial" font-size="11" fill="#333">Label Switched Router (LSR) is a fundamental component in MPLS networks.</text>
    <text x="40" y="116" font-family="Arial" font-size="11" fill="#333">Operates at Layer 2.5 (between Data Link and Network layers).</text>
    <text x="40" y="132" font-family="Arial" font-size="11" fill="#333">Uses label-based forwarding for faster packet processing vs traditional IP routing.</text>
  </g>
  
  <g class="step" id="step2" data-narration="LSR has three planes: Control plane runs routing protocols and LDP for label distribution; Forwarding plane uses LIB to switch packets; Management plane handles configuration.">
    <rect x="20" y="146" width="760" height="80" fill="#e8f5e9" rx="5" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="168" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">LSR Architecture: Three Functional Planes</text>
    <rect x="40" y="180" width="220" height="40" fill="#c8e6c9" rx="3"/>
    <text x="50" y="194" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Control Plane</text>
    <text x="50" y="208" font-family="Arial" font-size="9" fill="#2e7d32">Routing protocols, LDP/RSVP-TE</text>
    <rect x="270" y="180" width="220" height="40" fill="#c8e6c9" rx="3"/>
    <text x="280" y="194" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Forwarding Plane</text>
    <text x="280" y="208" font-family="Arial" font-size="9" fill="#2e7d32">Packet switching using LIB</text>
    <rect x="500" y="180" width="220" height="40" fill="#c8e6c9" rx="3"/>
    <text x="510" y="194" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">Management Plane</text>
    <text x="510" y="208" font-family="Arial" font-size="9" fill="#2e7d32">Configuration &amp; monitoring</text>
  </g>
  
  <g class="step" id="step3" data-narration="Three label operations: Push adds label at ingress; Swap replaces label at intermediate LSRs; Pop removes label at egress for IP forwarding.">
    <rect x="20" y="234" width="760" height="80" fill="#fff3e0" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="40" y="256" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">Label Operations: Push, Swap, Pop</text>
    <rect x="40" y="270" width="230" height="40" fill="#ffe0b2" rx="3"/>
    <text x="155" y="286" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">PUSH</text>
    <text x="155" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Add label at Ingress</text>
    <line x1="270" y1="290" x2="290" y2="290" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="300" y="270" width="230" height="40" fill="#ffe0b2" rx="3"/>
    <text x="415" y="286" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">SWAP</text>
    <text x="415" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Replace at Intermediate</text>
    <line x1="530" y1="290" x2="550" y2="290" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="560" y="270" width="180" height="40" fill="#ffe0b2" rx="3"/>
    <text x="650" y="286" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">POP</text>
    <text x="650" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Remove at Egress</text>
  </g>
  
  <g class="step" id="step4" data-narration="LIB stores label mappings (incoming label, outgoing label, next-hop). LDP exchanges bindings between adjacent LSRs through session establishment and mapping messages.">
    <rect x="20" y="322" width="760" height="95" fill="#f3e5f5" rx="5" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="344" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2">Label Information Base (LIB) &amp; LDP</text>
    <rect x="40" y="360" width="340" height="38" fill="#e1bee7" rx="3"/>
    <text x="50" y="376" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">LIB Structure:</text>
    <text x="50" y="390" font-family="Arial" font-size="9" fill="#6a1b9a">Incoming Label | Outgoing Label | Next Hop</text>
    <rect x="400" y="360" width="340" height="38" fill="#e1bee7" rx="3"/>
    <text x="410" y="376" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">LDP Functions:</text>
    <text x="410" y="390" font-family="Arial" font-size="9" fill="#6a1b9a">Establish sessions, exchange label bindings</text>
    <text x="40" y="410" font-family="Arial" font-size="9" fill="#666">LIB is populated by LDP; contains all label mappings learned from neighbors</text>
  </g>
  
  <g class="step" id="step5" data-narration="Three LSR types: Ingress LSR (LER) adds initial label; Intermediate LSRs swap labels along the path; Egress LSR removes label at network exit.">
    <rect x="20" y="425" width="760" height="80" fill="#ffebee" rx="5" stroke="#f44336" stroke-width="1"/>
    <text x="40" y="447" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">Types of LSR in MPLS Network</text>
    <rect x="40" y="463" width="230" height="38" fill="#ffcdd2" rx="3"/>
    <text x="155" y="479" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Ingress LSR (LER)</text>
    <text x="155" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Classifies packets, pushes label</text>
    <rect x="285" y="463" width="230" height="38" fill="#ffcdd2" rx="3"/>
    <text x="400" y="479" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Intermediate LSR</text>
    <text x="400" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Swaps labels along LSP</text>
    <rect x="530" y="463" width="230" height="38" fill="#ffcdd2" rx="3"/>
    <text x="645" y="479" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Egress LSR (LER)</text>
    <text x="645" y="493" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Pops label, forwards by IP</text>
  </g>
  
  <g class="step" id="step6" data-narration="Penultimate Hop Popping removes label at second-to-last LSR rather than egress, reducing processing burden. Egress signals implicit null label to enable PHP.">
    <rect x="20" y="513" width="760" height="85" fill="#e1f5fe" rx="5" stroke="#0288d1" stroke-width="1"/>
    <text x="40" y="535" font-family="Arial" font-size="14" font-weight="bold" fill="#01579b">Penultimate Hop Popping (PHP)</text>
    <rect x="40" y="551" width="700" height="40" fill="#b3e5fc" rx="3"/>
    <text x="390" y="570" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#01579b">Traditional: Egress removes label</text>
    <line x1="300" y1="575" x2="480" y2="575" stroke="#0288d1" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="580" y="570" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#01579b">With PHP: Penultimate removes</text>
  </g>
</svg>