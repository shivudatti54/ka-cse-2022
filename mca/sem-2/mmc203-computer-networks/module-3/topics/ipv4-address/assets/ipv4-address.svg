<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Step 0: Title -->
  <g class="step" id="step0" data-narration="IPv4 Address is a 32-bit logical address that uniquely identifies devices on a network using dotted decimal notation for computer communication.">
    <rect x="0" y="10" width="800" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1976d2">IPv4 Address</text>
  </g>
  
  <!-- Step 1: Structure -->
  <g class="step" id="step1" data-narration="An IPv4 address is 32 bits divided into Network ID and Host ID. Represented as four octets in dotted decimal like 192.168.1.1.">
    <rect x="20" y="58" width="760" height="80" fill="#ffffff" stroke="#1976d2" stroke-width="1"/>
    <text x="40" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">32-Bit Structure</text>
    <rect x="40" y="88" width="180" height="40" fill="#e3f2fd" stroke="#1976d2" rx="4"/>
    <text x="130" y="105" text-anchor="middle" font-family="Courier" font-size="11" fill="#1976d2">Network ID</text>
    <text x="130" y="120" text-anchor="middle" font-family="Courier" font-size="9" fill="#666">First Octet(s)</text>
    <rect x="240" y="88" width="180" height="40" fill="#e3f2fd" stroke="#1976d2" rx="4"/>
    <text x="330" y="105" text-anchor="middle" font-family="Courier" font-size="11" fill="#1976d2">Host ID</text>
    <text x="330" y="120" text-anchor="middle" font-family="Courier" font-size="9" fill="#666">Remaining Octet(s)</text>
    <text x="500" y="95" font-family="Arial" font-size="10" fill="#333">Example: 192.168.1.1</text>
    <text x="500" y="115" font-family="Courier" font-size="10" fill="#666">11000000.10101000.00000001.00000001</text>
  </g>
  
  <!-- Step 2: Classes -->
  <g class="step" id="step2" data-narration="IPv4 has five address classes: Class A (1-126), Class B (128-191), Class C (192-223) for unicast; Class D (224-239) for multicast; Class E (240-255) reserved.">
    <rect x="20" y="146" width="760" height="80" fill="#ffffff" stroke="#388e3c" stroke-width="1"/>
    <text x="40" y="166" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">IPv4 Classes</text>
    <rect x="40" y="180" width="145" height="36" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="112" y="196" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Class A</text>
    <text x="112" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1-126 (/8)</text>
    <rect x="195" y="180" width="145" height="36" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="267" y="196" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Class B</text>
    <text x="267" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">128-191 (/16)</text>
    <rect x="350" y="180" width="145" height="36" fill="#e8f5e9" stroke="#388e3c" rx="3"/>
    <text x="422" y="196" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388e3c">Class C</text>
    <text x="422" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">192-223 (/24)</text>
    <rect x="505" y="180" width="130" height="36" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="570" y="196" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff9800">Class D</text>
    <text x="570" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">224-239 (Multicast)</text>
    <rect x="645" y="180" width="130" height="36" fill="#ffebee" stroke="#f44336" rx="3"/>
    <text x="710" y="196" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Class E</text>
    <text x="710" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">240-255 (Reserved)</text>
  </g>
  
  <!-- Step 3: Special Addresses -->
  <g class="step" id="step3" data-narration="Special IPv4 addresses include the loopback address 127.0.0.1, private ranges like 10.x.x.x, 172.16-31.x.x, and 192.168.x.x, plus the broadcast address for network communication.">
    <rect x="20" y="234" width="760" height="80" fill="#ffffff" stroke="#9c27b0" stroke-width="1"/>
    <text x="40" y="254" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Special IPv4 Addresses</text>
    <rect x="40" y="268" width="160" height="36" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="120" y="283" text-anchor="middle" font-family="Courier" font-size="10" fill="#9c27b0">127.0.0.1</text>
    <text x="120" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Loopback</text>
    <rect x="210" y="268" width="220" height="36" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="320" y="283" text-anchor="middle" font-family="Courier" font-size="10" fill="#9c27b0">10.0.0.0 - 10.255.255.255</text>
    <text x="320" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Private Class A</text>
    <rect x="440" y="268" width="200" height="36" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="540" y="283" text-anchor="middle" font-family="Courier" font-size="9" fill="#9c27b0">172.16.0.0 - 172.31.255.255</text>
    <text x="540" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Private Class B</text>
    <rect x="650" y="268" width="125" height="36" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
    <text x="712" y="283" text-anchor="middle" font-family="Courier" font-size="10" fill="#9c27b0">192.168.x.x</text>
    <text x="712" y="298" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Private Class C</text>
  </g>
  
  <!-- Step 4: Subnet Mask -->
  <g class="step" id="step4" data-narration="A subnet mask is a 32-bit number dividing IP into network and host portions. Common masks: /8, /16, /24, /25, /26 and more.">
    <rect x="20" y="322" width="760" height="80" fill="#ffffff" stroke="#e64a19" stroke-width="1"/>
    <text x="40" y="342" font-family="Arial" font-size="12" font-weight="bold" fill="#e64a19">Subnet Mask</text>
    <text x="40" y="362" font-family="Arial" font-size="10" fill="#333">Separates Network and Host bits using 1s for network and 0s for host</text>
    <rect x="40" y="372" width="130" height="24" fill="#ffccbc" stroke="#e64a19" rx="3"/>
    <text x="105" y="388" text-anchor="middle" font-family="Courier" font-size="10" fill="#e64a19">255.0.0.0 (/8)</text>
    <rect x="180" y="372" width="150" height="24" fill="#ffccbc" stroke="#e64a19" rx="3"/>
    <text x="255" y="388" text-anchor="middle" font-family="Courier" font-size="10" fill="#e64a19">255.255.0.0 (/16)</text>
    <rect x="340" y="372" width="160" height="24" fill="#ffccbc" stroke="#e64a19" rx="3"/>
    <text x="420" y="388" text-anchor="middle" font-family="Courier" font-size="10" fill="#e64a19">255.255.255.0 (/24)</text>
    <rect x="510" y="372" width="140" height="24" fill="#ffccbc" stroke="#e64a19" rx="3"/>
    <text x="580" y="388" text-anchor="middle" font-family="Courier" font-size="10" fill="#e64a19">255.255.255.128</text>
    <rect x="660" y="372" width="115" height="24" fill="#ffccbc" stroke="#e64a19" rx="3"/>
    <text x="717" y="388" text-anchor="middle" font-family="Courier" font-size="10" fill="#e64a19">255.255.255.192</text>
  </g>
  
  <!-- Step 5: CIDR Notation -->
  <g class="step" id="step5" data-narration="CIDR notation uses IP/n where n is network bits. For example, 192.168.1.0/24 means 24 bits for network, 8 bits for hosts.">
    <rect x="20" y="410" width="760" height="90" fill="#ffffff" stroke="#00796b" stroke-width="1"/>
    <text x="40" y="430" font-family="Arial" font-size="12" font-weight="bold" fill="#00796b">CIDR Notation</text>
    <text x="40" y="450" font-family="Arial" font-size="10" fill="#333">Format: A.B.C.D/n where n = number of network bits</text>
    <rect x="40" y="462" width="200" height="22" fill="#b2dfdb" stroke="#00796b" rx="3"/>
    <text x="140" y="477" text-anchor="middle" font-family="Courier" font-size="11" fill="#00796b">192.168.1.0/24</text>
    <text x="250" y="477" font-family="Arial" font-size="10" fill="#666">→ 24 network bits, 8 host bits</text>
    <rect x="430" y="462" width="200" height="22" fill="#b2dfdb" stroke="#00796b" rx="3"/>
    <text x="530" y="477" text-anchor="middle" font-family="Courier" font-size="11" fill="#00796b">10.0.0.0/16</text>
    <text x="640" y="477" font-family="Arial" font-size="10" fill="#666">→ 16 network bits, 16 host bits</text>
    <text x="40" y="498" font-family="Arial" font-size="9" fill="#333">Block Size = 256 - Last Non-Zero Octet</text>
    <text x="250" y="498" font-family="Courier" font-size="9" fill="#666">Example: /26 → 256-192=64 (subnet block)</text>
  </g>
  
  <!-- Step 6: Formulas & Example -->
  <g class="step" id="step6" data-narration="Key formulas: Usable hosts equals 2 to the power of host bits minus 2. Number of subnets equals 2 to the power of borrowed bits.">
    <rect x="20" y="508" width="760" height="85" fill="#ffffff" stroke="#c2185b" stroke-width="1"/>
    <text x="40" y="528" font-family="Arial" font-size="12" font-weight="bold" fill="#c2185b">Important Formulas</text>
    <rect x="40" y="540" width="220" height="45" fill="#fce4ec" stroke="#c2185b" rx="4"/>
    <text x="150" y="556" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c2185b">Usable Hosts</text>
    <text x="150" y="572" text-anchor="middle" font-family="Courier" font-size="11" fill="#333">2^n - 2</text>
    <text x="150" y="582" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">(subtract network + broadcast)</text>
    <rect x="270" y="540" width="190" height="45" fill="#fce4ec" stroke="#c2185b" rx="4"/>
    <text x="365" y="556" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c2185b">Number of Subnets</text>
    <text x="365" y="572" text-anchor="middle" font-family="Courier" font-size="11" fill="#333">2^n</text>
    <text x="365" y="582" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">(n = bits borrowed)</text>
    <rect x="470" y="540" width="150" height="45" fill="#fce4ec" stroke="#c2185b" rx="4"/>
    <text x="545" y="556" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c2185b">Block Size</text>
    <text x="545" y="572" text-anchor="middle" font-family="Courier" font-size="11" fill="#333">256 - X</text>
    <text x="545" y="582" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">(X = last non-zero octet)</text>
    <rect x="630" y="540" width="145" height="45" fill="#fff8e1" stroke="#f9a825" rx="4"/>
    <text x="702" y="562" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f9a825">Example</text>
    <text x="702" y="577" text-anchor="middle" font-family="Courier" font-size="9" fill="#333">/24 → 254 hosts</text>
    <text x="702" y="588" text-anchor="middle" font-family="Courier" font-size="7" fill="#666">2^8 - 2 = 254</text>
  </g>
</svg>