<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1976d2"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <g class="step" id="step0" data-narration="Distance Vector Routing is a fundamental network routing algorithm where routers maintain tables with best-known distances to destinations and next-hop information.">
    <rect x="0" y="0" width="800" height="50" fill="#1976d2" rx="0"/>
    <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">Distance Vector Routing (DVR)</text>
  </g>
  
  <g class="step" id="step1" data-narration="Each router maintains a routing table with destination network, cost, and next-hop. Routers exchange their complete distance vectors with neighbors periodically.">
    <rect x="10" y="58" width="780" height="85" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="25" y="78" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">How DVR Works</text>
    <rect x="25" y="88" width="160" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="35" y="103" font-family="Arial" font-size="9" fill="#333">Router A</text>
    <text x="35" y="118" font-family="Arial" font-size="8" fill="#666">→ exchanges</text>
    <rect x="195" y="88" width="160" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="205" y="103" font-family="Arial" font-size="9" fill="#333">Router B</text>
    <text x="205" y="118" font-family="Arial" font-size="8" fill="#666">→ exchanges</text>
    <rect x="365" y="88" width="160" height="45" fill="white" stroke="#1976d2" rx="3"/>
    <text x="375" y="103" font-family="Arial" font-size="9" fill="#333">Router C</text>
    <text x="375" y="118" font-family="Arial" font-size="8" fill="#666">→ exchanges</text>
    <line x1="185" y1="110" x2="195" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="355" y1="110" x2="365" y2="110" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="540" y="88" font-family="Arial" font-size="9" fill="#333">Routing Table Fields:</text>
    <text x="540" y="102" font-family="Arial" font-size="8" fill="#666">• Destination Network</text>
    <text x="540" y="116" font-family="Arial" font-size="8" fill="#666">• Cost (Metric)</text>
    <text x="540" y="130" font-family="Arial" font-size="8" fill="#666">• Next Hop Router</text>
  </g>
  
  <g class="step" id="step2" data-narration="The Bellman-Ford equation is the core of DVR: D(x,y) equals the minimum cost from node x to destination y through neighbor v.">
    <rect x="10" y="151" width="780" height="85" fill="#e8f5e9" stroke="#388e3c" rx="5"/>
    <text x="25" y="171" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c">Bellman-Ford Algorithm</text>
    <rect x="25" y="185" width="300" height="40" fill="white" stroke="#388e3c" rx="3"/>
    <text x="175" y="205" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#388e3c">D(x,y) = min{ c(x,v) + D(v,y) }</text>
    <text x="340" y="185" font-family="Arial" font-size="9" fill="#333">Where:</text>
    <text x="340" y="199" font-family="Arial" font-size="8" fill="#666">D(x,y) = cost from x to destination y</text>
    <text x="340" y="213" font-family="Arial" font-size="8" fill="#666">c(x,v) = cost from x to neighbor v</text>
    <text x="340" y="227" font-family="Arial" font-size="8" fill="#666">D(v,y) = cost from neighbor v to y</text>
    <rect x="540" y="185" width="240" height="40" fill="#fff3e0" stroke="#ff9800" rx="3"/>
    <text x="550" y="200" font-family="Arial" font-size="8" fill="#333">Example: X receives update from Z</text>
    <text x="550" y="214" font-family="Arial" font-size="8" fill="#666">Cost(X-Z)=2, Cost(Z-D)=3</text>
    <text x="550" y="226" font-family="Arial" font-size="8" font-weight="bold" fill="#ff9800">New cost = 2 + 3 = 5</text>
  </g>
  
  <g class="step" id="step3" data-narration="Routing tables store destination networks, costs, and next-hop addresses initially. Initial tables contain only directly connected networks with cost 1.">
    <rect x="10" y="244" width="780" height="85" fill="#f3e5f5" stroke="#9c27b0" rx="5"/>
    <text x="25" y="264" font-family="Arial" font-size="12" font-weight="bold" fill="#9c27b0">Routing Table Structure</text>
    <rect x="25" y="278" width="360" height="45" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="35" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">Router A Initial Table</text>
    <text x="35" y="308" font-family="Arial" font-size="8" fill="#333">Net A: cost 0, direct</text>
    <text x="35" y="320" font-family="Arial" font-size="8" fill="#333">Net B: cost 1, via B</text>
    <rect x="400" y="278" width="380" height="45" fill="white" stroke="#9c27b0" rx="3"/>
    <text x="410" y="293" font-family="Arial" font-size="9" font-weight="bold" fill="#9c27b0">After First Exchange with B</text>
    <text x="410" y="308" font-family="Arial" font-size="8" fill="#333">Net A: cost 0, direct</text>
    <text x="410" y="320" font-family="Arial" font-size="8" fill="#333">Net B: cost 1, via B</text>
    <text x="530" y="320" font-family="Arial" font-size="8" fill="#333">Net C: cost 2, via B (learned)</text>
    <line x1="390" y1="300" x2="400" y2="300" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  
  <g class="step" id="step4" data-narration="Count-to-infinity occurs when a link fails and routers incorrectly believe alternate paths exist, continuously incrementing costs until reaching infinity eventually.">
    <rect x="10" y="337" width="780" height="85" fill="#ffebee" stroke="#f44336" rx="5"/>
    <text x="25" y="357" font-family="Arial" font-size="12" font-weight="bold" fill="#f44336">Count-to-Infinity Problem</text>
    <rect x="25" y="370" width="120" height="45" fill="white" stroke="#f44336" rx="3"/>
    <text x="85" y="388" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Router A</text>
    <text x="85" y="403" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">cost to D: 2</text>
    <rect x="160" y="370" width="120" height="45" fill="white" stroke="#f44336" rx="3"/>
    <text x="220" y="388" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Router B</text>
    <text x="220" y="403" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">cost to D: 1</text>
    <rect x="295" y="370" width="120" height="45" fill="white" stroke="#f44336" rx="3"/>
    <text x="355" y="388" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#f44336">Router C</text>
    <text x="355" y="403" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">cost to D: 0</text>
    <line x1="145" y1="392" x2="160" y2="392" stroke="#f44336" stroke-width="2"/>
    <line x1="280" y1="392" x2="295" y2="392" stroke="#f44336" stroke-width="2"/>
    <text x="430" y="380" font-family="Arial" font-size="8" fill="#333">Link B-C fails!</text>
    <text x="430" y="395" font-family="Arial" font-size="8" fill="#f44336">B sets cost=∞</text>
    <text x="430" y="410" font-family="Arial" font-size="8" fill="#666">But A sends update (cost=2)</text>
    <text x="580" y="380" font-family="Arial" font-size="8" fill="#333">B: 2+1=3, A: 3+1=4...</text>
    <text x="580" y="395" font-family="Arial" font-size="8" fill="#f44336">Both count to infinity!</text>
  </g>
  
  <g class="step" id="step5" data-narration="Solutions include split horizon (never advertise routes back to source), poison reverse (advertise infinite cost), and triggered updates (immediate notification).">
    <rect x="10" y="430" width="780" height="94" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="25" y="450" font-family="Arial" font-size="12" font-weight="bold" fill="#1976d2">Solutions to Count-to-Infinity</text>
    <rect x="25" y="462" width="240" height="48" fill="white" stroke="#1976d2" rx="3"/>
    <text x="35" y="478" font-family="Arial" font-size="9" font-weight="bold" fill="#1976d2">Split Horizon</text>
    <text x="35" y="493" font-family="Arial" font-size="8" fill="#666">Never advertise routes back</text>
    <text x="35" y="506" font-family="Arial" font-size="8" fill="#666">to the router from which</text>
    <text x="35" y="517" font-family="Arial" font-size="8" fill="#666">they were learned.</text>
    <rect x="280" y="462" width="240" height="48" fill="white" stroke="#388e3c" rx="3"/>
    <text x="290" y="478" font-family="Arial" font-size="9" font-weight="bold" fill="#388e3c">Poison Reverse</text>
    <text x="290" y="493" font-family="Arial" font-size="8" fill="#666">Set cost to infinity (16)</text>
    <text x="290" y="506" font-family="Arial" font-size="8" fill="#666">when advertising routes</text>
    <text x="290" y="517" font-family="Arial" font-size="8" fill="#666">learned from neighbors.</text>
    <rect x="535" y="462" width="240" height="48" fill="white" stroke="#ff9800" rx="3"/>
    <text x="545" y="478" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">Triggered Updates</text>
    <text x="545" y="493" font-family="Arial" font-size="8" fill="#666">Send immediate updates</text>
    <text x="545" y="506" font-family="Arial" font-size="8" fill="#666">when routes change,</text>
    <text x="545" y="517" font-family="Arial" font-size="8" fill="#666">without waiting for timer.</text>
  </g>
  
  <g class="step" id="step6" data-narration="RIP is the common DVR implementation using hop count metric, max 15 hops (16=infinity). RIPv1 is classful, RIPv2 supports VLSM and CIDR.">
    <rect x="10" y="532" width="780" height="55" fill="#fff3e0" stroke="#ff9800" rx="5"/>
    <text x="25" y="552" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800">RIP Protocol Summary</text>
    <text x="25" y="568" font-family="Arial" font-size="9" fill="#333">Metric: Hop Count | Max Hops: 15 (16 = infinity/unreachable)</text>
    <text x="430" y="568" font-family="Arial" font-size="9" fill="#333">RIPv1: Classful | RIPv2: Classless (VLSM, CIDR)</text>
    <text x="650" y="568" font-family="Arial" font-size="9" font-weight="bold" fill="#ff9800">AD: 120 | Updates: 30 sec</text>
  </g>
</svg>