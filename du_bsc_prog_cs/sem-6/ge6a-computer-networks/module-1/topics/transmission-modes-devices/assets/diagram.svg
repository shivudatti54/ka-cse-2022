<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="transmission-modes-devices" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5e6"/>
    </linearGradient>
    <linearGradient id="simplexGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="halfDuplexGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d0b4e8"/>
      <stop offset="100%" style="stop-color:#b8a9c9"/>
    </linearGradient>
    <linearGradient id="fullDuplexGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fad2a8"/>
      <stop offset="100%" style="stop-color:#f4b183"/>
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowMove {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box { rx: 8; ry: 8; }
    .device-box { rx: 5; ry: 5; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .panel-anim { animation: slideIn 0.6s ease-out forwards; }
    .device-anim { animation: slideInRight 0.5s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: arrowMove 1.5s ease-in-out infinite; }
    .device-icon { font-size: 18px; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim" data-narration="Title section introducing Transmission Modes and Devices">Transmission Modes &amp; Devices</text>
  
  <!-- Simplex Panel -->
  <g transform="translate(20, 50)" class="panel-anim">
    <rect class="box" x="0" y="0" width="120" height="100" fill="url(#simplexGrad)" stroke="#7f8c8d" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" class="label" data-narration="Simplex mode - unidirectional communication">Simplex</text>
    <line x1="20" y1="50" x2="100" y2="50" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="60" y="70" text-anchor="middle" class="detail" data-narration="Data flows in one direction only">One-way</text>
    <text x="60" y="85" text-anchor="middle" class="detail" data-narration="Example: keyboard to computer">Keyboard, TV</text>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
      </marker>
    </defs>
  </g>
  
  <!-- Half-Duplex Panel -->
  <g transform="translate(150, 50)" class="panel-anim" style="animation-delay: 0.2s;">
    <rect class="box" x="0" y="0" width="120" height="100" fill="url(#halfDuplexGrad)" stroke="#7f8c8d" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" class="label" data-narration="Half-Duplex mode - bidirectional but not simultaneous">Half-Duplex</text>
    <line x1="20" y1="50" x2="90" y2="50" stroke="#8e44ad" stroke-width="3" marker-end="url(#arrowhead2)" class="arrow-anim" style="animation-delay: 0s;"/>
    <line x1="90" y1="60" x2="20" y2="60" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead3)" class="arrow-anim" style="animation-delay: 0.75s;"/>
    <text x="60" y="85" text-anchor="middle" class="detail" data-narration="Example: walkie-talkie communication">Walkie-Talkie</text>
    <defs>
      <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
      </marker>
      <marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
      </marker>
    </defs>
  </g>
  
  <!-- Full-Duplex Panel -->
  <g transform="translate(280, 50)" class="panel-anim" style="animation-delay: 0.4s;">
    <rect class="box" x="0" y="0" width="120" height="100" fill="url(#fullDuplexGrad)" stroke="#7f8c8d" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" class="label" data-narration="Full-Duplex mode - simultaneous bidirectional communication">Full-Duplex</text>
    <line x1="20" y1="45" x2="100" y2="45" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead4)"/>
    <line x1="100" y1="65" x2="20" y2="65" stroke="#d35400" stroke-width="3" marker-end="url(#arrowhead5)"/>
    <text x="60" y="85" text-anchor="middle" class="detail" data-narration="Example: telephone conversation">Phone, Internet</text>
    <defs>
      <marker id="arrowhead4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
      </marker>
      <marker id="arrowhead5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#d35400"/>
      </marker>
    </defs>
  </g>
  
  <!-- Network Devices Section -->
  <g transform="translate(20, 165)" class="device-anim" style="animation-delay: 0.6s;">
    <text x="190" y="15" text-anchor="middle" class="label" data-narration="Network devices that enable communication">Network Devices</text>
    
    <!-- Repeater -->
    <g transform="translate(10, 30)">
      <rect class="device-box" x="0" y="0" width="55" height="35" fill="url(#deviceGrad)" stroke="#3498db" stroke-width="1"/>
      <text x="27.5" y="15" text-anchor="middle" class="device-icon" fill="#2c3e50">↺</text>
      <text x="27.5" y="28" text-anchor="middle" class="detail" font-size="9">Repeater</text>
    </g>
    
    <!-- Hub -->
    <g transform="translate(75, 30)">
      <rect class="device-box" x="0" y="0" width="55" height="35" fill="url(#deviceGrad)" stroke="#3498db" stroke-width="1"/>
      <circle cx="27.5" cy="15" r="8" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
      <circle cx="27.5" cy="15" r="3" fill="#2c3e50"/>
      <line x1="27.5" y1="6" x2="27.5" y2="0" stroke="#2c3e50" stroke-width="1"/>
      <line x1="27.5" y1="24" x2="27.5" y2="30" stroke="#2c3e50" stroke-width="1"/>
      <line x1="18" y1="15" x2="10" y2="15" stroke="#2c3e50" stroke-width="1"/>
      <line x1="37" y1="15" x2="45" y2="15" stroke="#2c3e50" stroke-width="1"/>
      <text x="27.5" y="28" text-anchor="middle" class="detail" font-size="9">Hub</text>
    </g>
    
    <!-- Bridge -->
    <g transform="translate(140, 30)">
      <rect class="device-box" x="0" y="0" width="55" height="35" fill="url(#deviceGrad)" stroke="#3498db" stroke-width="1"/>
      <rect x="22" y="5" width="11" height="20" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
      <line x1="27.5" y1="5" x2="27.5" y2="0" stroke="#2c3e50" stroke-width="1"/>
      <line x1="27.5" y1="25" x2="27.5" y2="30" stroke="#2c3e50" stroke-width="1"/>
      <text x="27.5" y="28" text-anchor="middle" class="detail" font-size="9">Bridge</text>
    </g>
    
    <!-- Switch -->
    <g transform="translate(205, 30)">
      <rect class="device-box" x="0" y="0" width="55" height="35" fill="url(#deviceGrad)" stroke="#3498db" stroke-width="1"/>
      <rect x="15" y="8" width="25" height="14" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
      <circle cx="20" cy="15" r="2" fill="#2c3e50"/>
      <circle cx="27" cy="15" r="2" fill="#2c3e50"/>
      <circle cx="34" cy="15" r="2" fill="#2c3e50"/>
      <line x1="20" y1="22" x2="20" y2="28" stroke="#2c3e50" stroke-width="1"/>
      <line x1="27" y1="22" x2="27" y2="28" stroke="#2c3e50" stroke-width="1"/>
      <line x1="34" y1="22" x2="34" y2="28" stroke="#2c3e50" stroke-width="1"/>
      <text x="27.5" y="32" text-anchor="middle" class="detail" font-size="9">Switch</text>
    </g>
    
    <!-- Router -->
    <g transform="translate(270, 30)">
      <rect class="device-box" x="0" y="0" width="55" height="35" fill="url(#deviceGrad)" stroke="#3498db" stroke-width="1"/>
      <circle cx="27.5" cy="15" r="10" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
      <path d="M20 15 L27.5 20 L35 15" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
      <circle cx="27.5" cy="10" r="2" fill="#2c3e50"/>
      <text x="27.5" y="28" text-anchor="middle" class="detail" font-size="9">Router</text>
    </g>
    
    <!-- Gateway -->
    <g transform="translate(335, 30)">
      <rect class="device-box" x="0" y="0" width="55" height="35" fill="url(#deviceGrad)" stroke="#3498db" stroke-width="1"/>
      <rect x="18" y="5" width="19" height="20" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
      <path d="M27.5 10 L35 15 L27.5 20" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
      <line x1="20" y1="15" x2="10" y2="15" stroke="#2c3e50" stroke-width="1"/>
      <line x1="35" y1="15" x2="45" y2="15" stroke="#2c3e50" stroke-width="1"/>
      <text x="27.5" y="32" text-anchor="middle" class="detail" font-size="9">Gateway</text>
    </g>
  </g>
  
  <!-- Connection Arrow -->
  <g transform="translate(180, 260)" class="pulse-anim">
    <path d="M0 0 L30 0" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="25,-5 35,0 25,5" fill="#e74c3c"/>
  </g>
  
  <!-- Comparison Table -->
  <g transform="translate(30, 280)" class="device-anim" style="animation-delay: 0.8s;">
    <text x="180" y="15" text-anchor="middle" class="label" data-narration="Comparison of transmission modes by direction and examples">Mode Comparison</text>
    
    <!-- Table Header -->
    <rect x="0" y="25" width="360" height="18" fill="#34495e"/>
    <text x="60" y="38" text-anchor="middle" class="detail" fill="white" font-weight="bold">Mode</text>
    <text x="180" y="38" text-anchor="middle" class="detail" fill="white" font-weight="bold">Direction</text>
    <text x="300" y="38" text-anchor="middle" class="detail" fill="white" font-weight="bold">Examples</text>
    
    <!-- Simplex Row -->
    <rect x="0" y="43" width="360" height="22" fill="#e8f8f5"/>
    <text x="60" y="58" text-anchor="middle" class="detail" fill="#27ae60" font-weight="bold">Simplex</text>
    <text x="180" y="58" text-anchor="middle" class="detail">One-way</text>
    <text x="300" y="58" text-anchor="middle" class="detail">Keyboard, TV</text>
    
    <!-- Half-Duplex Row -->
    <rect x="0" y="65" width="360" height="22" fill="#f5eef8"/>
    <text x="60" y="80" text-anchor="middle" class="detail" fill="#8e44ad" font-weight="bold">Half-Duplex</text>
    <text x="180" y="80" text-anchor="middle" class="detail">Alternating</text>
    <text x="300" y="80" text-anchor="middle" class="detail">Walkie-Talkie</text>
    
    <!-- Full-Duplex Row -->
    <rect x="0" y="87" width="360" height="22" fill="#fef9e7"/>
    <text x="60" y="102" text-anchor="middle" class="detail" fill="#e67e22" font-weight="bold">Full-Duplex</text>
    <text x="180" y="102" text-anchor="middle" class="detail">Simultaneous</text>
    <text x="300" y="102" text-anchor="middle" class="detail">Phone, Internet</text>
  </g>
  
  <!-- Bottom Note -->
  <g transform="translate(210, 390)" class="title-anim" style="animation-delay: 1s;">
    <text x="0" y="0" text-anchor="middle" class="detail" data-narration="Understanding transmission modes helps in network design and troubleshooting">Choose the right mode for your network requirements</text>
  </g>
</svg>