<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="network-types-topologies-osi-tcpip">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="osiGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcfd2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tcpGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4f5db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4ebff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#666" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateX(-20px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .osi-box { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .tcp-box { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .topo-section { animation: slideUp 0.6s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .network-types { animation: slideUp 0.6s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .arrow { animation: pulse 2s infinite; }
    .layer-text { font-size: 11px; }
    .title-text { font-size: 18px; font-weight: bold; }
    .section-label { font-size: 13px; font-weight: bold; }
    .detail-text { font-size: 10px; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" fill="#2c3e50">Network Types, Topologies &amp; Models</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#3498db" stroke-width="2"/>
  
  <!-- OSI Model Section -->
  <g class="osi-box" data-narration="OSI Model: 7-layer reference model for network communication">
    <rect x="30" y="50" width="130" height="180" fill="url(#osiGradient)" rx="5" filter="url(#shadow)"/>
    <text x="95" y="68" text-anchor="middle" class="section-label" fill="#c0392b">OSI Model</text>
    
    <rect x="35" y="75" width="120" height="20" fill="#ff9aa2" rx="3"/>
    <text x="95" y="89" text-anchor="middle" class="layer-text" fill="#333">7. Application</text>
    
    <rect x="35" y="97" width="120" height="20" fill="#ffb5a7" rx="3"/>
    <text x="95" y="111" text-anchor="middle" class="layer-text" fill="#333">6. Presentation</text>
    
    <rect x="35" y="119" width="120" height="20" fill="#fcd5ce" rx="3"/>
    <text x="95" y="133" text-anchor="middle" class="layer-text" fill="#333">5. Session</text>
    
    <rect x="35" y="141" width="120" height="20" fill="#f8edeb" rx="3"/>
    <text x="95" y="155" text-anchor="middle" class="layer-text" fill="#333">4. Transport</text>
    
    <rect x="35" y="163" width="120" height="20" fill="#fce1e4" rx="3"/>
    <text x="95" y="177" text-anchor="middle" class="layer-text" fill="#333">3. Network</text>
    
    <rect x="35" y="185" width="120" height="20" fill="#fcf6bd" rx="3"/>
    <text x="95" y="199" text-anchor="middle" class="layer-text" fill="#333">2. Data Link</text>
    
    <rect x="35" y="207" width="120" height="20" fill="#e2f0cb" rx="3"/>
    <text x="95" y="221" text-anchor="middle" class="layer-text" fill="#333">1. Physical</text>
  </g>
  
  <!-- TCP/IP Model Section -->
  <g class="tcp-box" data-narration="TCP/IP Model: 4-layer practical model used on the Internet">
    <rect x="260" y="50" width="130" height="180" fill="url(#tcpGradient)" rx="5" filter="url(#shadow)"/>
    <text x="325" y="68" text-anchor="middle" class="section-label" fill="#27ae60">TCP/IP Model</text>
    
    <rect x="265" y="75" width="120" height="42" fill="#90e0ef" rx="3"/>
    <text x="325" y="90" text-anchor="middle" class="layer-text" fill="#333">4. Application</text>
    <text x="325" y="105" text-anchor="middle" class="detail-text" fill="#555">(App+Pres+Session)</text>
    
    <rect x="265" y="119" width="120" height="42" fill="#90e0ef" rx="3"/>
    <text x="325" y="134" text-anchor="middle" class="layer-text" fill="#333">3. Transport</text>
    <text x="325" y="149" text-anchor="middle" class="detail-text" fill="#555">(Transport)</text>
    
    <rect x="265" y="163" width="120" height="42" fill="#90e0ef" rx="3"/>
    <text x="325" y="178" text-anchor="middle" class="layer-text" fill="#333">2. Internet</text>
    <text x="325" y="193" text-anchor="middle" class="detail-text" fill="#555">(Network)</text>
    
    <rect x="265" y="207" width="120" height="20" fill="#90e0ef" rx="3"/>
    <text x="325" y="221" text-anchor="middle" class="layer-text" fill="#333">1. Network Access</text>
  </g>
  
  <!-- Mapping Arrows -->
  <g class="arrow" data-narration="Arrow showing how OSI layers map to TCP/IP layers">
    <path d="M160 85 L255 85" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M160 155 L255 155" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M160 175 L255 175" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <path d="M160 195 L255 205" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <text x="210" y="82" text-anchor="middle" class="detail-text" fill="#7f8c8d">Maps to</text>
  </g>
  
  <!-- Network Types Section -->
  <g class="network-types" data-narration="Network types classified by geographical scope: PAN, LAN">
    <rect x="30" y="245" width="175" height="140" fill="#f8f9fa" rx="5" stroke="#bdc3c7" stroke-width="1"/>
    <text x="117" y="262" text-anchor="middle" class="section-label" fill="#2980b9">Network Types</text>
    
    <circle cx="55" cy="285" r="8" fill="#e74c3c" opacity="0.7"/>
    <text x="75" y="288" class="detail-text" fill="#333">PAN</text>
    <text x="75" y="300" class="detail-text" fill="#7f8c8d">Personal Area</text>
    <text x="75" y="310" class="detail-text" fill="#7f8c8d">~10m, Bluetooth</text>
    
    <circle cx="55" cy="335" r="8" fill="#3498db" opacity="0.7"/>
    <text x="75" y="338" class="detail-text" fill="#333">LAN</text>
    <text x="75" y="350" class="detail-text" fill="#7f8c8d">Local Area</text>
    <text x="75" y="360" class="detail-text" fill="#7f8c8d">Home/Office</text>
    
    <circle cx="140" cy="285" r="8" fill="#27ae60" opacity="0.7"/>
    <text x="160" y="288" class="detail-text" fill="#333">WAN</text>
    <text x="160" y="300" class="detail-text" fill="#7f8c8d">Wide Area</text>
    <text x="160" y="310" class="detail-text" fill="#7f8c8d">City/Country</text>
    
    <circle cx="140" cy="335" r="8" fill="#9b59b6" opacity="0.7"/>
    <text x="160" y="338" class="detail-text" fill="#333">Internet</text>
    <text x="160" y="350" class="detail-text" fill="#7f8c8d">Global Network</text>
    <text x="160" y="360" class="detail-text" fill="#7f8c8d">Worldwide</text>
  </g>
  
  <!-- Network Topologies Section -->
  <g class="topo-section" data-narration="Network topologies: physical arrangement of devices">
    <rect x="215" y="245" width="175" height="140" fill="url(#topoGradient)" rx="5" filter="url(#shadow)"/>
    <text x="302" y="262" text-anchor="middle" class="section-label" fill="#8e44ad">Topologies</text>
    
    <!-- Bus Topology -->
    <line x1="235" y1="290" x2="290" y2="290" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="235" cy="290" r="3" fill="#e74c3c"/>
    <circle cx="262" cy="290" r="3" fill="#e74c3c"/>
    <circle cx="290" cy="290" r="3" fill="#e74c3c"/>
    <text x="262" y="280" text-anchor="middle" class="detail-text" fill="#c0392b">Bus</text>
    
    <!-- Star Topology -->
    <circle cx="350" cy="290" r="20" stroke="#3498db" stroke-width="2" fill="none"/>
    <circle cx="350" cy="290" r="3" fill="#3498db"/>
    <line x1="350" y1="265" x2="350" y2="250" stroke="#3498db" stroke-width="1.5"/>
    <line x1="375" y1="290" x2="390" y2="290" stroke="#3498db" stroke-width="1.5"/>
    <line x1="350" y1="315" x2="350" y2="330" stroke="#3498db" stroke-width="1.5"/>
    <line x1="325" y1="290" x2="310" y2="290" stroke="#3498db" stroke-width="1.5"/>
    <text x="350" y="280" text-anchor="middle" class="detail-text" fill="#2980b9">Star</text>
    
    <!-- Ring Topology -->
    <circle cx="262" cy="340" r="18" stroke="#27ae60" stroke-width="2" fill="none"/>
    <circle cx="250" cy="332" r="3" fill="#27ae60"/>
    <circle cx="274" cy="332" r="3" fill="#27ae60"/>
    <circle cx="274" cy="348" r="3" fill="#27ae60"/>
    <circle cx="250" cy="348" r="3" fill="#27ae60"/>
    <text x="262" y="330" text-anchor="middle" class="detail-text" fill="#27ae60">Ring</text>
    
    <!-- Mesh Topology -->
    <circle cx="330" cy="355" r="5" fill="#9b59b6"/>
    <circle cx="360" cy="355" r="5" fill="#9b59b6"/>
    <circle cx="345" cy="335" r="5" fill="#9b59b6"/>
    <line x1="333" y1="353" x2="345" y2="338" stroke="#9b59b6" stroke-width="1"/>
    <line x1="357" y1="353" x2="345" y2="338" stroke="#9b59b6" stroke-width="1"/>
    <line x1="330" y1="355" x2="360" y2="355" stroke="#9b59b6" stroke-width="1"/>
    <text x="345" y="378" text-anchor="middle" class="detail-text" fill="#8e44ad">Mesh</text>
  </g>
  
  <!-- Key Concept Box -->
  <g data-narration="Key takeaway: OSI provides conceptual framework, TCP/IP is the practical implementation">
    <rect x="30" y="340" width="130" height="50" fill="#fff3cd" rx="4" stroke="#ffc107" stroke-width="1"/>
    <text x="95" y="355" text-anchor="middle" class="detail-text" fill="#856404" font-weight="bold">Key Concept</text>
    <text x="95" y="368" text-anchor="middle" class="detail-text" fill="#856404">OSI = Framework</text>
    <text x="95" y="380" text-anchor="middle" class="detail-text" fill="#856404">TCP/IP = Implementation</text>
  </g>
</svg>