<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="mac-protocols-ethernet">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#d4e9f7"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#a8d4ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Arial', sans-serif; font-weight: bold; fill: #1a3a5c; }
    .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #2c5282; }
    .detail { font-family: 'Arial', sans-serif; font-size: 12px; fill: #4a5568; }
    .box { rx: 6; ry: 6; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1a3a5c" class="anim-fade">MAC Protocols &amp; Ethernet</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4a90d9" stroke-width="2" class="anim-fade" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: OSI Layer Context -->
  <g class="anim-slide" style="animation-delay: 0.2s" data-narration="The Data Link Layer sits between Network and Physical layers, handling node-to-node communication">
    <rect x="15" y="55" width="120" height="45" fill="url(#highlightGradient)" filter="url(#shadow)" class="box"/>
    <text x="75" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a5c">Data Link Layer</text>
    <text x="75" y="88" text-anchor="middle" font-size="10" fill="#2c5282">LLC + MAC Sublayer</text>
  </g>
  
  <!-- Arrow -->
  <path d="M140 77 L165 77" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a90d9"/>
    </marker>
  </defs>
  
  <!-- Section 2: Multiple Access Problem -->
  <g class="anim-slide" style="animation-delay: 0.4s" data-narration="When multiple devices share a medium, they must coordinate access to prevent collisions">
    <rect x="170" y="55" width="140" height="45" fill="#f9d5a7" filter="url(#shadow)" class="box"/>
    <text x="240" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c4712">Multiple Access</text>
    <text x="240" y="85" text-anchor="middle" font-size="10" fill="#9a5b1a">Shared Medium Problem</text>
  </g>
  
  <!-- Arrow -->
  <path d="M315 77 L340 77" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Section 3: Solution -->
  <g class="anim-slide" style="animation-delay: 0.6s" data-narration="Ethernet uses CSMA/CD to detect and handle collisions">
    <rect x="345" y="55" width="60" height="45" fill="#b8e0b8" filter="url(#shadow)" class="box"/>
    <text x="375" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d5a2d">Ethernet</text>
    <text x="375" y="85" text-anchor="middle" font-size="9" fill="#3d7a3d">CSMA/CD</text>
  </g>
  
  <!-- Ethernet Frame Structure - Key Diagram -->
  <g class="anim-fade" style="animation-delay: 0.8s" data-narration="Ethernet Frame: Preamble(7B) + SFD(1B) + Dest(6B) + Src(6B) + Type(2B) + Data(46-1500B)">
    <text x="20" y="120" font-size="14" font-weight="bold" fill="#1a3a5c">Ethernet II Frame Structure</text>
    
    <!-- Frame boxes -->
    <g transform="translate(20, 130)">
      <!-- Preamble -->
      <rect x="0" y="0" width="50" height="30" fill="#e8b4b4" stroke="#c46a6a" stroke-width="1" class="box"/>
      <text x="25" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#7c2a2a">Preamble</text>
      <text x="25" y="25" text-anchor="middle" font-size="8" fill="#8b4040">7 bytes</text>
      
      <!-- SFD -->
      <rect x="50" y="0" width="30" height="30" fill="#e8b4b4" stroke="#c46a6a" stroke-width="1" class="box"/>
      <text x="65" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#7c2a2a">SFD</text>
      <text x="65" y="25" text-anchor="middle" font-size="8" fill="#8b4040">1B</text>
      
      <!-- Destination MAC -->
      <rect x="80" y="0" width="70" height="30" fill="#c4e8c4" stroke="#5a9a5a" stroke-width="1" class="box"/>
      <text x="115" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d5a2d">Dest MAC</text>
      <text x="115" y="25" text-anchor="middle" font-size="8" fill="#3d7a3d">6 bytes</text>
      
      <!-- Source MAC -->
      <rect x="150" y="0" width="70" height="30" fill="#c4e8c4" stroke="#5a9a5a" stroke-width="1" class="box"/>
      <text x="185" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d5a2d">Source MAC</text>
      <text x="185" y="25" text-anchor="middle" font-size="8" fill="#3d7a3d">6 bytes</text>
      
      <!-- Type/Length -->
      <rect x="220" y="0" width="55" height="30" fill="#d4c4e8" stroke="#7a5a9a" stroke-width="1" class="box"/>
      <text x="247" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a2d7a">Type/</text>
      <text x="247" y="25" text-anchor="middle" font-size="9" font-weight="bold" fill="#4a2d7a">Length</text>
      <text x="247" y="32" text-anchor="middle" font-size="7" fill="#6a4a9a">2B</text>
      
      <!-- Data -->
      <rect x="275" y="0" width="125" height="30" fill="#e8d4b4" stroke="#a67c52" stroke-width="1" class="box"/>
      <text x="337" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#7c4a1a">Data (Payload)</text>
      <text x="337" y="25" text-anchor="middle" font-size="8" fill="#9a6a3a">46-1500 bytes</text>
    </g>
    
    <!-- Pattern visualization for Preamble -->
    <g transform="translate(25, 168)">
      <text x="0" y="0" font-size="9" fill="#4a5568">Pattern:</text>
      <rect x="50" y="-8" width="8" height="12" fill="#e8b4b4"/>
      <text x="54" y="2" font-size="7" text-anchor="middle">10101010</text>
    </g>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="anim-fade" style="animation-delay: 1s" data-narration="ALOHA: Simple protocol where devices transmit whenever they have data">
    <rect x="15" y="200" width="190" height="55" fill="#fff9e6" stroke="#d4a84b" stroke-width="1.5" rx="5" ry="5"/>
    <text x="25" y="218" font-size="12" font-weight="bold" fill="#7c5a1a">ALOHA Protocol</text>
    <text x="25" y="235" font-size="10" fill="#9a7a3a">Pure: transmit anytime → collision</text>
    <text x="25" y="248" font-size="10" fill="#9a7a3a">Slotted: synchronized time slots</text>
  </g>
  
  <!-- CSMA/CD Box -->
  <g class="anim-fade" style="animation-delay: 1.1s" data-narration="Carrier Sense Multiple Access with Collision Detection">
    <rect x="215" y="200" width="190" height="55" fill="#e6f3ff" stroke="#4a90d9" stroke-width="1.5" rx="5" ry="5"/>
    <text x="225" y="218" font-size="12" font-weight="bold" fill="#1a4a6c">CSMA/CD</text>
    <text x="225" y="235" font-size="10" fill="#3a6a8c">Carrier Sense: listen before talk</text>
    <text x="225" y="248" font-size="10" fill="#3a6a8c">Collision Detection: detect &amp; retry</text>
  </g>
  
  <!-- MAC Address Concept -->
  <g class="anim-fade" style="animation-delay: 1.2s" data-narration="MAC addresses are 48-bit unique identifiers assigned to network hardware">
    <rect x="15" y="265" width="190" height="45" fill="#f0e6ff" stroke="#8b6bbf" stroke-width="1.5" rx="5" ry="5"/>
    <text x="25" y="282" font-size="12" font-weight="bold" fill="#5a3a7c">MAC Address</text>
    <text x="25" y="298" font-size="10" fill="#7a5a9a">48-bit unique hardware address</text>
    <text x="25" y="310" font-size="10" fill="#7a5a9a">Format: AA:BB:CC:DD:EE:FF</text>
  </g>
  
  <!-- Evolution Box -->
  <g class="anim-fade" style="animation-delay: 1.3s" data-narration="Ethernet evolved from shared bus topology to switched full-duplex networks">
    <rect x="215" y="265" width="190" height="45" fill="#e6ffe6" stroke="#5ab85a" stroke-width="1.5" rx="5" ry="5"/>
    <text x="225" y="282" font-size="12" font-weight="bold" fill="#2a6a2a">Ethernet Evolution</text>
    <text x="225" y="298" font-size="10" fill="#4a8a4a">Shared Bus → Switched Ethernet</text>
    <text x="225" y="310" font-size="10" fill="#4a8a4a">10Mbps → 10Gbps+ speeds</text>
  </g>
  
  <!-- Frame Fields Detail -->
  <g class="anim-fade" style="animation-delay: 1.4s" data-narration="Type field indicates protocol: 0x0800=IPv4, 0x0806=ARP, 0x86DD=IPv6">
    <rect x="15" y="320" width="390" height="70" fill="url(#bgGradient)" stroke="#4a90d9" stroke-width="1" rx="5" ry="5"/>
    <text x="25" y="340" font-size="11" font-weight="bold" fill="#1a3a5c">Common Type Values:</text>
    <text x="25" y="358" font-size="10" fill="#2c5282">0x0800 → IPv4</text>
    <text x="100" y="358" font-size="10" fill="#2c5282">0x0806 → ARP</text>
    <text x="175" y="358" font-size="10" fill="#2c5282">0x86DD → IPv6</text>
    <text x="25" y="376" font-size="10" fill="#2c5282">Min frame: 64 bytes | Max frame: 1518 bytes</text>
    <text x="200" y="376" font-size="10" fill="#2c5282">Preamble: clock sync pattern</text>
    <text x="340" y="376" font-size="10" fill="#2c5282">SFD: 10101011</text>
  </g>
  
  <!-- Bottom note -->
  <g class="anim-fade" style="animation-delay: 1.5s">
    <text x="210" y="395" text-anchor="middle" font-size="9" fill="#6a8aa8" font-style="italic">Data Link Layer • Media Access Control • Ethernet Standards</text>
  </g>
  
  <!-- Animated highlight pulse on frame -->
  <rect x="20" y="130" width="380" height="30" fill="none" stroke="#4a90d9" stroke-width="2" rx="6" ry="6" class="anim-pulse" style="animation-delay: 1.5s; opacity: 0.5"/>
</svg>