<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="error-detection-correction-protocols">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="sectionBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe0cc"/>
    </linearGradient>
    <linearGradient id="sectionBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cceecc"/>
    </linearGradient>
    <linearGradient id="sectionBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6f5"/>
      <stop offset="100%" style="stop-color:#ccccdd"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bitFlip {
      0%, 100% { fill: #2c5282; }
      50% { fill: #e53e3e; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #1a365d; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2d3748; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #718096; }
    .bit { font-family: monospace; font-size: 12px; font-weight: bold; }
    .section-box { stroke: #a0aec0; stroke-width: 1; rx: 5; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-delay-1 { animation-delay: 0.2s; opacity: 0; }
    .anim-delay-2 { animation-delay: 0.4s; opacity: 0; }
    .anim-delay-3 { animation-delay: 0.6s; opacity: 0; }
    .anim-delay-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="25" text-anchor="middle" class="title fade-in">Error Detection &amp; Correction</text>
  <text x="210" y="42" text-anchor="middle" class="label fade-in anim-delay-1">Protocols in Data Link Layer</text>
  
  <!-- Section 1: Error Types -->
  <g class="fade-in anim-delay-1">
    <rect x="10" y="55" width="125" height="75" fill="url(#sectionBg1)" class="section-box" rx="5"/>
    <text x="20" y="70" class="section-title">Error Types</text>
    
    <!-- Single Bit Error -->
    <text x="20" y="88" class="label" data-narration="Single-bit error: only one bit corrupted">Single-Bit:</text>
    <text x="20" y="102" class="detail">10110<tspan class="bit" fill="#2c5282">0</tspan>10 → 10110<tspan class="bit" fill="#e53e3e">1</tspan>10</text>
    <text x="20" y="118" class="detail" fill="#718096">(1 bit flipped)</text>
    
    <!-- Burst Error -->
    <text x="20" y="88" class="label" data-narration="Burst error: multiple bits corrupted in sequence">Burst:</text>
    <rect x="15" y="95" width="105" height="30" fill="none"/>
    <text x="20" y="108" class="detail">101<tspan class="bit" fill="#e53e3e">000</tspan>11 → corrupted</text>
    <text x="20" y="122" class="detail" fill="#718096">(3-bit burst)</text>
  </g>
  
  <!-- Section 2: Parity Checking (VRC) -->
  <g class="fade-in anim-delay-2">
    <rect x="145" y="55" width="130" height="75" fill="url(#sectionBg2)" class="section-box" rx="5"/>
    <text x="155" y="70" class="section-title" data-narration="Parity checking adds redundant bit for error detection">Parity Check (VRC)</text>
    
    <!-- Even Parity Example -->
    <text x="155" y="90" class="label">Even Parity:</text>
    <text x="155" y="106" class="detail" data-narration="Data 1011001 has 4 ones, parity bit=0">Data: 1 0 1 1 0 0 1</text>
    <text x="155" y="120" class="detail">Parity: 0 (even count)</text>
    <circle cx="260" cy="108" r="12" fill="#48bb78" class="pulse"/>
    <text x="260" y="112" text-anchor="middle" class="bit" fill="white">✓</text>
  </g>
  
  <!-- Section 3: CRC Process -->
  <g class="fade-in anim-delay-3">
    <rect x="285" y="55" width="125" height="75" fill="url(#sectionBg3)" class="section-box" rx="5"/>
    <text x="295" y="70" class="section-title" data-narration="CRC uses polynomial division for robust error detection">CRC Method</text>
    
    <!-- CRC Visual -->
    <text x="295" y="90" class="label">Polynomial Div:</text>
    <text x="295" y="106" class="detail">M(x) ÷ G(x)</text>
    <text x="295" y="120" class="detail">CRC bits appended</text>
    <rect x="295" y="90" width="30" height="25" fill="none" stroke="#667eea" stroke-dasharray="3,2" rx="2"/>
  </g>
  
  <!-- Relationship Arrows -->
  <g class="slide-in anim-delay-3">
    <path d="M135 92 L145 92" stroke="#a0aec0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 L1,3 Z" fill="#a0aec0"/>
      </marker>
    </defs>
  </g>
  
  <g class="slide-in anim-delay-4">
    <path d="M275 92 L285 92" stroke="#a0aec0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fade-in anim-delay-3">
    <rect x="10" y="140" width="400" height="50" fill="white" stroke="#e2e8f0" stroke-width="1" rx="3"/>
    <text x="20" y="157" class="section-title" data-narration="Key point: Detection vs Correction capabilities">Key Concepts:</text>
    <text x="20" y="175" class="detail" fill="#718096">• <tspan class="label" fill="#2d3748">VRC/LRC:</tspan> Detect single errors</text>
    <text x="150" y="175" class="detail" fill="#718096">• <tspan class="label" fill="#2d3748">Checksum:</tspan> Detect transmission errors</text>
    <text x="280" y="175" class="detail" fill="#718096">• <tspan class="label" fill="#2d3748">CRC:</tspan> Most powerful detector</text>
  </g>
  
  <!-- Hamming Code Section -->
  <g class="fade-in anim-delay-4">
    <rect x="10" y="200" width="400" height="85" fill="url(#sectionBg1)" class="section-box" rx="5"/>
    <text x="20" y="218" class="section-title" data-narration="Hamming code can both detect and correct single-bit errors">Hamming Code (Correcting)</text>
    
    <!-- Hamming Code Visualization -->
    <text x="20" y="238" class="label">Position: 1  2  3  4  5  6  7</text>
    <text x="20" y="254" class="detail">Data:   <tspan class="bit" fill="#2c5282">p1</tspan> <tspan class="bit" fill="#2c5282">p2</tspan> <tspan fill="#2c5282">d1</tspan> <tspan class="bit" fill="#2c5282">p3</tspan> <tspan fill="#2c5282">d2</tspan> <tspan fill="#2c5282">d3</tspan> <tspan fill="#2c5282">d4</tspan></text>
    <text x="20" y="270" class="detail" fill="#718096">Parity bits at positions 1,2,4 (powers of 2)</text>
    <text x="20" y="284" class="detail" fill="#718096" data-narration="Syndrome calculation identifies exact error position">Syndrome → Error Position → Correct</text>
    
    <!-- Correction Arrow -->
    <g transform="translate(320, 230)">
      <circle cx="20" cy="20" r="18" fill="#ed8936" class="pulse"/>
      <text x="20" y="25" text-anchor="middle" class="bit" fill="white" font-size="10">CORRECT</text>
    </g>
  </g>
  
  <!-- Summary Flow -->
  <g class="slide-in anim-delay-4">
    <rect x="10" y="295" width="400" height="50" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1" rx="3"/>
    <text x="20" y="315" class="section-title">Process Flow:</text>
    
    <!-- Flow Steps -->
    <g transform="translate(90, 305)">
      <rect x="0" y="0" width="55" height="22" fill="#c53030" rx="3"/>
      <text x="27" y="15" text-anchor="middle" class="bit" fill="white" font-size="10">Encode</text>
    </g>
    <path d="M150 316 L170 316" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <g transform="translate(175, 305)">
      <rect x="0" y="0" width="65" height="22" fill="#2b6cb0" rx="3"/>
      <text x="32" y="15" text-anchor="middle" class="bit" fill="white" font-size="10">Transmit</text>
    </g>
    <path d="M245 316 L265 316" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <g transform="translate(270, 305)">
      <rect x="0" y="0" width="55" height="22" fill="#38a169" rx="3"/>
      <text x="27" y="15" text-anchor="middle" class="bit" fill="white" font-size="10">Decode</text>
    </g>
    <path d="M330 316 L350 316" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <g transform="translate(355, 305)">
      <rect x="0" y="0" width="45" height="22" fill="#805ad5" rx="3"/>
      <text x="22" y="15" text-anchor="middle" class="bit" fill="white" font-size="9">Error?</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g class="fade-in anim-delay-4">
    <text x="350" y="390" class="detail" fill="#a0aec0">DU CS Syllabus</text>
  </g>
</svg>