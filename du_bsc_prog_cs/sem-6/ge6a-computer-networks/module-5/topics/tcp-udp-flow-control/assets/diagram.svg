<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="tcp-udp-flow-control">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="tcpGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a8a"/>
    </linearGradient>
    <linearGradient id="udpGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb87c"/>
      <stop offset="100%" style="stop-color:#4a8a4a"/>
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6a7b8c"/>
      <stop offset="100%" style="stop-color:#4a5b6c"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideDown {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes windowSlide {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(15px); }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; }
    .tcp-box { animation: slideIn 0.6s ease-out 0.2s both; }
    .udp-box { animation: slideIn 0.6s ease-out 0.4s both; }
    .header-box { animation: fadeIn 0.8s ease-out 0.5s both; }
    .arrow { animation: pulse 2s infinite; }
    .window-anim { animation: windowSlide 3s infinite ease-in-out; }
    .concept-box { animation: slideDown 0.5s ease-out 0.6s both; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">TCP vs UDP Flow Control</text>
  
  <!-- TCP Section -->
  <g class="tcp-box" data-narration="TCP provides reliable, connection-oriented communication with flow control mechanisms">
    <rect x="20" y="50" width="180" height="150" rx="8" fill="url(#tcpGradient)" stroke="#1e3d5c" stroke-width="2"/>
    <text x="110" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="white">TCP Flow Control</text>
    <text x="30" y="95" font-size="12" fill="#e8f4f8">• Sliding Window Protocol</text>
    <text x="30" y="115" font-size="12" fill="#e8f4f8">• Window Size Advertisement</text>
    <text x="30" y="135" font-size="12" fill="#e8f4f8">• Sequence &amp; Ack Numbers</text>
    <text x="30" y="155" font-size="12" fill="#e8f4f8">• Receiver Buffer Control</text>
    <text x="30" y="175" font-size="11" fill="#c4dce8">Reliable, Ordered Delivery</text>
  </g>
  
  <!-- UDP Section -->
  <g class="udp-box" data-narration="UDP is connectionless with minimal flow control, leaving responsibility to the application layer">
    <rect x="220" y="50" width="180" height="150" rx="8" fill="url(#udpGradient)" stroke="#2d5a2d" stroke-width="2"/>
    <text x="310" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="white">UDP Flow Control</text>
    <text x="230" y="95" font-size="12" fill="#e8f4e8">• No Connection Setup</text>
    <text x="230" y="115" font-size="12" fill="#e8f4e8">• No Window Mechanism</text>
    <text x="230" y="135" font-size="12" fill="#e8f4e8">• No Acknowledgments</text>
    <text x="230" y="155" font-size="12" fill="#e8f4e8">• App-layer Responsibility</text>
    <text x="230" y="175" font-size="11" fill="#c8e8c8">Fast, Low Overhead</text>
  </g>
  
  <!-- Arrow between TCP and UDP -->
  <g class="arrow">
    <path d="M 205 125 L 215 125" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- TCP Header Structure -->
  <g class="header-box" data-narration="The TCP header includes the 16-bit Window Size field used for flow control">
    <rect x="20" y="215" width="380" height="80" rx="6" fill="url(#headerGradient)" stroke="#3a4a5a" stroke-width="2"/>
    <text x="210" y="232" text-anchor="middle" font-size="14" font-weight="bold" fill="white">TCP Header Structure (20 bytes)</text>
    
    <!-- Header fields -->
    <rect x="30" y="245" width="55" height="20" fill="#8899aa" stroke="#667788"/>
    <text x="57" y="259" text-anchor="middle" font-size="9" fill="white">Src Port</text>
    <text x="57" y="271" text-anchor="middle" font-size="7" fill="#c4d4e4">16 bits</text>
    
    <rect x="87" y="245" width="55" height="20" fill="#8899aa" stroke="#667788"/>
    <text x="114" y="259" text-anchor="middle" font-size="9" fill="white">Dst Port</text>
    <text x="114" y="271" text-anchor="middle" font-size="7" fill="#c4d4e4">16 bits</text>
    
    <rect x="144" y="245" width="70" height="20" fill="#99aabb" stroke="#667788"/>
    <text x="179" y="259" text-anchor="middle" font-size="9" fill="white">Sequence Number</text>
    <text x="179" y="271" text-anchor="middle" font-size="7" fill="#c4d4e4">32 bits</text>
    
    <rect x="216" y="245" width="70" height="20" fill="#99aabb" stroke="#667788"/>
    <text x="251" y="259" text-anchor="middle" font-size="9" fill="white">Ack Number</text>
    <text x="251" y="271" text-anchor="middle" font-size="7" fill="#c4d4e4">32 bits</text>
    
    <rect x="288" y="245" width="55" height="20" fill="#aabbcc" stroke="#667788"/>
    <text x="315" y="257" text-anchor="middle" font-size="8" fill="white">Offset+Flags</text>
    <text x="315" y="268" text-anchor="middle" font-size="7" fill="#c4d4e4">12 bits</text>
    
    <rect x="345" y="245" width="45" height="20" fill="#bbee88" stroke="#667788"/>
    <text x="367" y="257" text-anchor="middle" font-size="9" fill="#2a4a2a">Window</text>
    <text x="367" y="268" text-anchor="middle" font-size="7" fill="#2a4a2a">16 bits</text>
  </g>
  
  <!-- Sliding Window Visualization -->
  <g class="concept-box" data-narration="The sliding window allows multiple packets to be in flight before requiring acknowledgment">
    <rect x="20" y="305" width="380" height="85" rx="6" fill="#f8f4e8" stroke="#c4b898" stroke-width="2"/>
    <text x="210" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a4a4a">Sliding Window Flow Control</text>
    
    <!-- Window visualization -->
    <rect x="40" y="340" width="120" height="25" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
    <text x="100" y="356" text-anchor="middle" font-size="9" fill="#666">Sent &amp; Acked</text>
    
    <!-- Sliding window -->
    <rect x="165" y="340" width="90" height="25" fill="#4a90d9" stroke="#2d5a8a" stroke-width="2" rx="3" class="window-anim"/>
    <text x="210" y="356" text-anchor="middle" font-size="9" fill="white">Send Window</text>
    
    <!-- Future packets -->
    <rect x="260" y="340" width="130" height="25" fill="#ddd" stroke="#999" stroke-width="1" rx="3"/>
    <text x="325" y="356" text-anchor="middle" font-size="9" fill="#666">Not Yet Sent</text>
    
    <!-- Labels -->
    <text x="100" y="380" text-anchor="middle" font-size="10" fill="#666">Receiver advertises:</text>
    <text x="100" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a90d9">Window Size (rwnd)</text>
  </g>
  
  <!-- Key takeaway box -->
  <g>
    <rect x="140" y="46" width="140" height="22" fill="#fff9e6" stroke="#e6c200" stroke-width="1" rx="4"/>
    <text x="210" y="62" text-anchor="middle" font-size="10" fill="#664400">Flow Control Comparison</text>
  </g>
</svg>