<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="application-protocols-dns-http">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90b8"/>
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#98d4bb"/>
      <stop offset="100%" style="stop-color:#5cb890"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #fff; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #eee; }
    .box-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2d3748; }
    .box-text { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .server-box { animation: fadeIn 0.5s ease-out forwards; }
    .client-box { animation: slideInLeft 0.6s ease-out forwards; }
    .arrow-line { animation: fadeIn 0.8s ease-out forwards; }
    .pulse-anim { animation: pulse 2s infinite; }
    .bounce-anim { animation: bounce 1.5s infinite; }
    .section-1 { animation: fadeIn 0.3s ease-out forwards; }
    .section-2 { animation: slideInRight 0.5s ease-out forwards; }
    .section-3 { animation: fadeIn 0.7s ease-out forwards; }
    .section-4 { animation: slideInLeft 0.9s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title">Application Protocols: DNS &amp; HTTP</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#4a90b8" stroke-width="2"/>
  
  <!-- DNS Resolution Flow Diagram -->
  <g data-narration="The DNS resolution flow shows how a domain name is translated to an IP address through multiple servers.">
    <!-- Client Browser -->
    <g class="client-box" transform="translate(30, 60)">
      <rect width="70" height="50" rx="8" fill="url(#clientGradient)" stroke="#3d8b6e" stroke-width="2"/>
      <text x="35" y="22" text-anchor="middle" class="label" font-size="11">Client</text>
      <text x="35" y="38" text-anchor="middle" class="label" font-size="10">Browser</text>
      <text x="35" y="48" text-anchor="middle" class="detail" font-size="9">www.example.com</text>
    </g>
    
    <!-- Arrow to Local DNS -->
    <path class="arrow-line" d="M105 85 L145 85" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="125" y="78" text-anchor="middle" class="detail" font-size="9">Query</text>
    
    <!-- Local DNS Resolver -->
    <g class="server-box" transform="translate(150, 60)">
      <rect width="75" height="50" rx="8" fill="url(#serverGradient)" stroke="#2c5282" stroke-width="2"/>
      <text x="37.5" y="20" text-anchor="middle" class="label" font-size="11">Local DNS</text>
      <text x="37.5" y="35" text-anchor="middle" class="label" font-size="10">Resolver</text>
      <text x="37.5" y="46" text-anchor="middle" class="detail" font-size="8">ISP Server</text>
    </g>
    
    <!-- Arrow to Root -->
    <path class="arrow-line" d="M230 85 L260 85" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Root Server -->
    <g class="section-1" transform="translate(265, 55)">
      <rect width="60" height="40" rx="6" fill="#e9d8fd" stroke="#805ad5" stroke-width="2" class="pulse-anim"/>
      <text x="30" y="18" text-anchor="middle" class="box-title" font-size="10">Root</text>
      <text x="30" y="32" text-anchor="middle" class="box-text" font-size="9">Server (.)</text>
    </g>
    
    <!-- Arrow to TLD -->
    <path class="arrow-line" d="M295 75 L295 110 L230 110" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="300" y="100" text-anchor="middle" class="detail" font-size="9">.com NS</text>
    
    <!-- TLD Server -->
    <g class="section-2" transform="translate(170, 115)">
      <rect width="60" height="40" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="2" class="pulse-anim"/>
      <text x="30" y="18" text-anchor="middle" class="box-title" font-size="10">TLD</text>
      <text x="30" y="32" text-anchor="middle" class="box-text" font-size="9">Server (.com)</text>
    </g>
    
    <!-- Arrow to Authoritative -->
    <path class="arrow-line" d="M170 160 L170 190" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="180" y="180" text-anchor="middle" class="detail" font-size="9">example.com</text>
    
    <!-- Authoritative Server -->
    <g class="section-3" transform="translate(140, 195)">
      <rect width="65" height="40" rx="6" fill="#fed7d7" stroke="#e53e3e" stroke-width="2" class="pulse-anim"/>
      <text x="32.5" y="18" text-anchor="middle" class="box-title" font-size="10">Authoritative</text>
      <text x="32.5" y="32" text-anchor="middle" class="box-text" font-size="9">example.com</text>
    </g>
    
    <!-- Response Arrow -->
    <path class="arrow-line" d="M140 235 L100 235 L100 110 L110 110" stroke="#38a169" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="125" y="225" text-anchor="middle" class="detail" fill="#38a169" font-size="9">IP: 93.184.216.34</text>
    
    <!-- Response to Client -->
    <path class="arrow-line" d="M150 110 L110 110" stroke="#38a169" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key Concepts Box - DNS -->
  <g class="section-4" data-narration="DNS acts as the internet's phonebook, translating human-readable domain names into IP addresses." transform="translate(10, 260)">
    <rect width="130" height="65" rx="5" fill="#fff" stroke="#4a90b8" stroke-width="1.5" opacity="0.9"/>
    <text x="65" y="18" text-anchor="middle" class="box-title" fill="#2c5282">DNS Protocol</text>
    <text x="10" y="35" class="box-text">• Translates domain names</text>
    <text x="10" y="48" class="box-text">• Hierarchical database</text>
    <text x="10" y="58" class="box-text">• Uses UDP/TCP port 53</text>
  </g>
  
  <!-- Key Concepts Box - HTTP -->
  <g class="section-1" data-narration="HTTP governs the transfer of web pages between servers and clients using request-response model." transform="translate(150, 260)">
    <rect width="130" height="65" rx="5" fill="#fff" stroke="#e53e3e" stroke-width="1.5" opacity="0.9"/>
    <text x="65" y="18" text-anchor="middle" class="box-title" fill="#c53030">HTTP Protocol</text>
    <text x="10" y="35" class="box-text">• Web page transfer</text>
    <text x="10" y="48" class="box-text">• Request-Response model</text>
    <text x="10" y="58" class="box-text">• Uses TCP port 80/443</text>
  </g>
  
  <!-- HTTP Request Flow -->
  <g data-narration="Once DNS resolves the IP, HTTP requests are made to fetch web content." transform="translate(290, 260)">
    <rect width="115" height="65" rx="5" fill="#e8f4f8" stroke="#805ad5" stroke-width="1.5" opacity="0.9"/>
    <text x="57" y="18" text-anchor="middle" class="box-title" fill="#553c9a">HTTP Flow</text>
    <text x="8" y="35" class="box-text" font-size="10">1. Client sends</text>
    <text x="8" y="47" class="box-text" font-size="10">   GET request</text>
    <text x="8" y="58" class="box-text" font-size="10">2. Server responds</text>
  </g>
  
  <!-- Bottom Info -->
  <g transform="translate(10, 335)">
    <rect width="400" height="30" rx="5" fill="#2d3748" opacity="0.85"/>
    <text x="200" y="20" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">
      Application Layer: Interface between users and networks
    </text>
  </g>
  
  <!-- Legend dots -->
  <circle cx="30" cy="375" r="4" fill="#4a90b8"/>
  <text x="40" y="378" class="detail" fill="#555">DNS</text>
  <circle cx="80" cy="375" r="4" fill="#e53e3e"/>
  <text x="90" y="378" class="detail" fill="#555">HTTP</text>
  <circle cx="140" cy="375" r="4" fill="#38a169"/>
  <text x="150" y="378" class="detail" fill="#555">Response</text>
</svg>