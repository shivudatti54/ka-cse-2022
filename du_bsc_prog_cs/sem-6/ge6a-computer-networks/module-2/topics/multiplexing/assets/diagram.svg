<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="multiplexing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="channelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5276;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="muxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e8449;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="demuxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .input-section { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .mux-section { animation: fadeIn 0.6s ease-out 0.4s both; }
    .channel-section { animation: fadeIn 0.6s ease-out 0.6s both; }
    .demux-section { animation: fadeIn 0.6s ease-out 0.8s both; }
    .output-section { animation: slideInRight 0.6s ease-out 1s both; }
    .box-label { animation: pulse 2s ease-in-out infinite; }
    .flow-arrow { animation: flow 1s linear infinite; }
    .signal-wave { animation: wave 1.5s ease-in-out infinite; }
    .text-label { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title text-label">Multiplexing in Computer Networks</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Input Signals Section -->
  <g class="input-section" data-narration="Multiple input signals from different sources enter the multiplexing system">
    <text x="35" y="60" font-size="12" fill="#34495e" font-weight="bold" class="text-label">Input Signals</text>
    
    <!-- Signal 1 -->
    <g transform="translate(30, 75)" class="signal-wave">
      <path d="M0,10 Q5,0 10,10 Q15,20 20,10 Q25,0 30,10 Q35,20 40,10 Q45,0 50,10 Q55,20 60,10" 
            stroke="#e74c3c" stroke-width="2" fill="none"/>
      <text x="65" y="15" font-size="10" fill="#e74c3c" class="text-label">Signal 1</text>
    </g>
    
    <!-- Signal 2 -->
    <g transform="translate(30, 105)" class="signal-wave">
      <path d="M0,10 Q7,0 14,10 Q21,20 28,10 Q35,0 42,10 Q49,20 56,10 Q63,0 70,10" 
            stroke="#9b59b6" stroke-width="2" fill="none"/>
      <text x="75" y="15" font-size="10" fill="#9b59b6" class="text-label">Signal 2</text>
    </g>
    
    <!-- Signal 3 -->
    <g transform="translate(30, 135)" class="signal-wave">
      <path d="M0,10 Q6,0 12,10 Q18,20 24,10 Q30,0 36,10 Q42,20 48,10 Q54,0 60,10 Q66,20 72,10" 
            stroke="#f39c12" stroke-width="2" fill="none"/>
      <text x="77" y="15" font-size="10" fill="#f39c12" class="text-label">Signal 3</text>
    </g>
    
    <!-- Signal 4 -->
    <g transform="translate(30, 165)" class="signal-wave">
      <path d="M0,10 Q8,0 16,10 Q24,20 32,10 Q40,0 48,10 Q56,20 64,10 Q72,0 80,10" 
            stroke="#1abc9c" stroke-width="2" fill="none"/>
      <text x="85" y="15" font-size="10" fill="#1abc9c" class="text-label">Signal 4</text>
    </g>
  </g>
  
  <!-- Arrows to MUX -->
  <g class="mux-section" data-narration="Signals are combined by the Multiplexer (MUX) device">
    <path d="M120,100 L145,100" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
    <path d="M120,130 L145,130" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
    <path d="M120,160 L145,160" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
    <path d="M120,190 L145,190" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
  </g>
  
  <!-- Multiplexer -->
  <g class="mux-section" data-narration="The Multiplexer (MUX) combines multiple signals into one">
    <rect x="145" y="80" width="55" height="140" rx="5" fill="url(#muxGradient)" filter="url(#shadow)"/>
    <text x="172" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="white" class="text-label">MUX</text>
    <text x="172" y="135" text-anchor="middle" font-size="9" fill="white" class="text-label">Multiplexer</text>
    <text x="172" y="150" text-anchor="middle" font-size="8" fill="#d5f4e6" class="text-label">(Combiner)</text>
  </g>
  
  <!-- Arrow to Channel -->
  <g class="channel-section" data-narration="The combined signal travels through the shared transmission channel">
    <path d="M200,150 L225,150" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
  </g>
  
  <!-- Shared Transmission Channel -->
  <g class="channel-section" data-narration="Shared transmission channel carries the multiplexed signal">
    <rect x="225" y="130" width="80" height="40" rx="5" fill="url(#channelGradient)" filter="url(#shadow)"/>
    <text x="265" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="white" class="text-label">Shared Channel</text>
    <text x="265" y="166" text-anchor="middle" font-size="9" fill="#d6eaf8" class="text-label">(Transmission Path)</text>
  </g>
  
  <!-- Arrow to DEMUX -->
  <g class="demux-section" data-narration="At the receiver, the demultiplexer separates the combined signal">
    <path d="M305,150 L330,150" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="flow-arrow"/>
  </g>
  
  <!-- Demultiplexer -->
  <g class="demux-section" data-narration="The Demultiplexer (DEMUX) separates the combined signal back to individual signals">
    <rect x="330" y="80" width="55" height="140" rx="5" fill="url(#demuxGradient)" filter="url(#shadow)"/>
    <text x="357" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="white" class="text-label">DEMUX</text>
    <text x="357" y="135" text-anchor="middle" font-size="9" fill="white" class="text-label">Demultiplexer</text>
    <text x="357" y="150" text-anchor="middle" font-size="8" fill="#fadbd8" class="text-label">(Separator)</text>
  </g>
  
  <!-- Arrows to Output -->
  <g class="output-section" data-narration="Individual output signals are delivered to respective destinations">
    <path d="M385,100 L400,100" stroke="#7f8c8d" stroke-width="2" class="flow-arrow"/>
    <path d="M385,130 L400,130" stroke="#7f8c8d" stroke-width="2" class="flow-arrow"/>
    <path d="M385,160 L400,160" stroke="#7f8c8d" stroke-width="2" class="flow-arrow"/>
    <path d="M385,190 L400,190" stroke="#7f8c8d" stroke-width="2" class="flow-arrow"/>
  </g>
  
  <!-- Output Signals Section -->
  <g class="output-section" data-narration="Output signals are recovered and sent to their respective destinations">
    <text x="355" y="60" font-size="12" fill="#34495e" font-weight="bold" class="text-label">Output Signals</text>
    
    <!-- Output 1 -->
    <g transform="translate(355, 75)" class="signal-wave">
      <path d="M0,10 Q5,0 10,10 Q15,20 20,10 Q25,0 30,10 Q35,20 40,10 Q45,0 50,10 Q55,20 60,10" 
            stroke="#e74c3c" stroke-width="2" fill="none"/>
    </g>
    
    <!-- Output 2 -->
    <g transform="translate(355, 105)" class="signal-wave">
      <path d="M0,10 Q7,0 14,10 Q21,20 28,10 Q35,0 42,10 Q49,20 56,10 Q63,0 70,10" 
            stroke="#9b59b6" stroke-width="2" fill="none"/>
    </g>
    
    <!-- Output 3 -->
    <g transform="translate(355, 135)" class="signal-wave">
      <path d="M0,10 Q6,0 12,10 Q18,20 24,10 Q30,0 36,10 Q42,20 48,10 Q54,0 60,10 Q66,20 72,10" 
            stroke="#f39c12" stroke-width="2" fill="none"/>
    </g>
    
    <!-- Output 4 -->
    <g transform="translate(355, 165)" class="signal-wave">
      <path d="M0,10 Q8,0 16,10 Q24,20 32,10 Q40,0 48,10 Q56,20 64,10 Q72,0 80,10" 
            stroke="#1abc9c" stroke-width="2" fill="none"/>
    </g>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="mux-section" data-narration="Four main types of multiplexing techniques used in computer networks">
    <rect x="30" y="230" width="360" height="150" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50" class="text-label">Key Multiplexing Techniques</text>
    
    <!-- FDM -->
    <g transform="translate(45, 262)">
      <rect x="0" y="0" width="80" height="32" rx="4" fill="#3498db" opacity="0.15"/>
      <text x="40" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9" class="text-label">FDM</text>
      <text x="40" y="27" text-anchor="middle" font-size="8" fill="#2c3e50" class="text-label">Frequency</text>
    </g>
    
    <!-- TDM -->
    <g transform="translate(135, 262)">
      <rect x="0" y="0" width="80" height="32" rx="4" fill="#27ae60" opacity="0.15"/>
      <text x="40" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e8449" class="text-label">TDM</text>
      <text x="40" y="27" text-anchor="middle" font-size="8" fill="#2c3e50" class="text-label">Time</text>
    </g>
    
    <!-- WDM -->
    <g transform="translate(225, 262)">
      <rect x="0" y="0" width="80" height="32" rx="4" fill="#9b59b6" opacity="0.15"/>
      <text x="40" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d3c98" class="text-label">WDM</text>
      <text x="40" y="27" text-anchor="middle" font-size="8" fill="#2c3e50" class="text-label">Wavelength</text>
    </g>
    
    <!-- CDM -->
    <g transform="translate(315, 262)">
      <rect x="0" y="0" width="80" height="32" rx="4" fill="#e67e22" opacity="0.15"/>
      <text x="40" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#d35400" class="text-label">CDM</text>
      <text x="40" y="27" text-anchor="middle" font-size="8" fill="#2c3e50" class="text-label">Code</text>
    </g>
    
    <!-- Descriptions -->
    <text x="45" y="310" font-size="9" fill="#5d6d7e" class="text-label">• FDM: Signals separated by frequency</text>
    <text x="45" y="325" font-size="9" fill="#5d6d7e" class="text-label">• TDM: Signals separated by time slots</text>
    <text x="210" y="310" font-size="9" fill="#5d6d7e" class="text-label">• WDM: Optical signals by wavelength</text>
    <text x="210" y="325" font-size="9" fill="#5d6d7e" class="text-label">• CDM: Signals by unique codes</text>
    
    <!-- MUX/DEMUX Labels -->
    <g transform="translate(45, 340)">
      <rect x="0" y="0" width="45" height="22" rx="3" fill="#27ae60"/>
      <text x="22" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="white" class="text-label">MUX</text>
    </g>
    <g transform="translate(95, 340)">
      <rect x="0" y="0" width="45" height="22" rx="3" fill="#e74c3c"/>
      <text x="22" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="white" class="text-label">DEMUX</text>
    </g>
    <text x="155" y="354" font-size="9" fill="#34495e" class="text-label">Combines signals → Separates signals</text>
  </g>
  
  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>