<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="signals-transmission-media" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#f0e6f5"/>
    </linearGradient>
    <linearGradient id="analogGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#64B5F6"/>
    </linearGradient>
    <linearGradient id="digitalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E91E63"/>
      <stop offset="100%" style="stop-color:#F48FB1"/>
    </linearGradient>
    <linearGradient id="copperGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8D6E63"/>
      <stop offset="50%" style="stop-color:#D7CCC8"/>
      <stop offset="100%" style="stop-color:#8D6E63"/>
    </linearGradient>
    <linearGradient id="fiberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4"/>
      <stop offset="50%" style="stop-color:#B2EBF2"/>
      <stop offset="100%" style="stop-color:#00BCD4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes waveAnim {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 2px currentColor); }
      50% { filter: drop-shadow(0 0 6px currentColor); }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1565C0; }
    .subtitle-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #546E7A; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #37474F; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #607D8B; }
    .box-anim { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .box-1 { animation-delay: 0.1s; }
    .box-2 { animation-delay: 0.2s; }
    .box-3 { animation-delay: 0.3s; }
    .box-4 { animation-delay: 0.4s; }
    .wave-anim { animation: waveAnim 1.5s ease-out forwards; stroke-dasharray: 200; stroke-dashoffset: 200; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .wireless-wave { animation: pulseGlow 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <g data-narration="Signals and Transmission Media - the foundation of network communication">
    <text x="210" y="28" text-anchor="middle" class="title-text">Signals &amp; Transmission Media</text>
    <text x="210" y="44" text-anchor="middle" class="subtitle-text">Foundation of Network Communication</text>
  </g>
  
  <!-- Analog Signal Box -->
  <g class="box-anim box-1" data-narration="Analog signals are continuous waves that vary smoothly over time, representing information through continuous variations in amplitude">
    <rect x="15" y="60" width="185" height="140" rx="10" fill="white" stroke="#BBDEFB" stroke-width="2" filter="url(#shadow)"/>
    <text x="107" y="78" text-anchor="middle" class="section-title" fill="#1976D2">ANALOG SIGNAL</text>
    
    <!-- Analog Wave (Sine) -->
    <g transform="translate(35, 115)">
      <path d="M0,15 Q12.5,-15 25,15 T50,15 T75,15 T100,15 T125,15" fill="none" stroke="url(#analogGrad)" stroke-width="2.5" class="wave-animal"/>
      <path d="M0,15 Q12.5,45 25,15 T50,15 T75,15 T100,15 T125,15" fill="none" stroke="#BBDEFB" stroke-width="1.5" opacity="0.6"/>
    </g>
    <text x="107" y="160" text-anchor="middle" class="detail-text">Continuous waveform</text>
    <text x="107" y="174" text-anchor="middle" class="detail-text">Smooth amplitude variation</text>
    <text x="107" y="188" text-anchor="middle" class="detail-text">Any value in range</text>
  </g>
  
  <!-- Digital Signal Box -->
  <g class="box-anim box-2" data-narration="Digital signals are discrete with two voltage levels representing binary 1 (high) and 0 (low)">
    <rect x="220" y="60" width="185" height="140" rx="10" fill="white" stroke="#F8BBD9" stroke-width="2" filter="url(#shadow)"/>
    <text x="312" y="78" text-anchor="middle" class="section-title" fill="#C2185B">DIGITAL SIGNAL</text>
    
    <!-- Digital Wave (Square) -->
    <g transform="translate(235, 115)">
      <polyline points="0,25 0,5 30,5 30,45 60,45 60,5 90,5 90,45 120,45 120,25" fill="none" stroke="url(#digitalGrad)" stroke-width="2.5" class="wave-animal"/>
    </g>
    <text x="312" y="160" text-anchor="middle" class="detail-text">Discrete levels</text>
    <text x="312" y="174" text-anchor="middle" class="detail-text">Binary: High=1, Low=0</text>
    <text x="312" y="188" text-anchor="middle" class="detail-text">Square waveform</text>
  </g>
  
  <!-- Guided Media Box -->
  <g class="box-anim box-3" data-narration="Guided transmission media includes copper wires (twisted pair, coaxial) and fiber optic cables that physically guide signals">
    <rect x="15" y="215" width="185" height="170" rx="10" fill="white" stroke="#C8E6C9" stroke-width="2" filter="url(#shadow)"/>
    <text x="107" y="233" text-anchor="middle" class="section-title" fill="#388E3C">GUIDED MEDIA</text>
    
    <!-- Copper Wire -->
    <g transform="translate(30, 255)">
      <rect x="0" y="0" width="150" height="8" rx="2" fill="url(#copperGrad)"/>
      <rect x="0" y="10" width="150" height="8" rx="2" fill="#A1887F"/>
      <text x="75" y="35" text-anchor="middle" class="label-text" fill="#5D4037">Copper Wire</text>
    </g>
    
    <!-- Fiber Optic -->
    <g transform="translate(30, 300)">
      <rect x="0" y="0" width="150" height="10" rx="3" fill="#263238" stroke="#455A64" stroke-width="1"/>
      <rect x="5" y="2" width="140" height="6" rx="2" fill="url(#fiberGrad)" class="pulse-anim"/>
      <circle cx="5" cy="5" r="3" fill="#E0F7FA"/>
      <circle cx="145" cy="5" r="3" fill="#E0F7FA"/>
      <text x="75" y="30" text-anchor="middle" class="label-text" fill="#006064">Fiber Optic</text>
    </g>
  </g>
  
  <!-- Unguided Media Box -->
  <g class="box-anim box-4" data-narration="Unguided media transmits signals wirelessly through air using radio waves, microwaves, or infrared">
    <rect x="220" y="215" width="185" height="170" rx="10" fill="white" stroke="#E1BEE7" stroke-width="2" filter="url(#shadow)"/>
    <text x="312" y="233" text-anchor="middle" class="section-title" fill="#7B1FA2">UNGUIDED MEDIA</text>
    
    <!-- Wireless Waves -->
    <g transform="translate(250, 265)" class="wireless-wave">
      <path d="M0,20 Q30,-5 60,20" fill="none" stroke="#9C27B0" stroke-width="2"/>
      <path d="M10,30 Q30,10 50,30" fill="none" stroke="#9C27B0" stroke-width="2"/>
      <path d="M20,40 Q30,25 40,40" fill="none" stroke="#9C27B0" stroke-width="2"/>
    </g>
    <text x="312" y="305" text-anchor="middle" class="label-text" fill="#4A148C">Wireless Transmission</text>
    <text x="312" y="322" text-anchor="middle" class="detail-text">Radio waves</text>
    <text x="312" y="336" text-anchor="middle" class="detail-text">Microwaves</text>
    <text x="312" y="350" text-anchor="middle" class="detail-text">Infrared</text>
    <text x="312" y="370" text-anchor="middle" class="detail-text" fill="#7B1FA2">No physical path needed</text>
  </g>
  
  <!-- Arrow connecting signals -->
  <defs>
    <marker id="arrowBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#42A5F5"/>
    </marker>
    <marker id="arrowPink" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#EC407A"/>
    </marker>
  </defs>
  
  <line x1="200" y1="130" x2="218" y2="130" stroke="#90CAF9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="107" y1="200" x2="107" y2="213" stroke="#81C784" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="312" y1="200" x2="312" y2="213" stroke="#BA68C8" stroke-width="1.5" stroke-dasharray="3,2"/>
</svg>