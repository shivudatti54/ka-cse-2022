<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="ipv4-ipv6-protocols" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e8e8f5"/>
      <stop offset="100%" style="stop-color:#f5e8f0"/>
    </linearGradient>
    <linearGradient id="ipv4Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fbcd4"/>
    </linearGradient>
    <linearGradient id="ipv6Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8b8d4"/>
      <stop offset="100%" style="stop-color:#a88fbd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes highlight {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .bits { font-family: Arial, sans-serif; font-size: 9px; fill: #777; }
    .ipv4-box { animation: slideInLeft 0.8s ease-out forwards; opacity: 0; }
    .ipv6-box { animation: slideInRight 0.8s ease-out 0.3s forwards; opacity: 0; }
    .title-anim { animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0; }
    .arrow-anim { animation: pulse 2s ease-in-out infinite; }
    .section-box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .highlight-field { animation: highlight 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">IPv4 vs IPv6 Header Comparison</text>
  
  <!-- IPv4 Section -->
  <g class="ipv4-box" data-narration="IPv4 Header: 32-bit addressing with 20-60 byte variable length header">
    <rect x="20" y="50" width="180" height="320" rx="8" fill="url(#ipv4Gradient)" filter="url(#shadow)"/>
    <text x="110" y="72" text-anchor="middle" class="label" fill="#1a5276">IPv4 Header</text>
    <text x="110" y="86" text-anchor="middle" class="bits" fill="#1a5276">(20-60 bytes)</text>
    
    <!-- IPv4 Fields -->
    <rect x="30" y="95" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="108" class="detail" fill="#2c3e50">Version</text>
    <text x="175" y="108" text-anchor="end" class="bits">4 bits</text>
    
    <rect x="30" y="113" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="126" class="detail" fill="#2c3e50">IHL</text>
    <text x="175" y="126" text-anchor="end" class="bits">4 bits</text>
    
    <rect x="30" y="131" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="144" class="detail" fill="#2c3e50">TOS / DSCP</text>
    <text x="175" y="144" text-anchor="end" class="bits">8 bits</text>
    
    <rect x="30" y="149" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="162" class="detail" fill="#2c3e50">Total Length</text>
    <text x="175" y="162" text-anchor="end" class="bits">16 bits</text>
    
    <rect x="30" y="167" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="180" class="detail" fill="#2c3e50">Identification</text>
    <text x="175" y="180" text-anchor="end" class="bits">16 bits</text>
    
    <rect x="30" y="185" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="198" class="detail" fill="#2c3e50">Flags + Fragment</text>
    <text x="175" y="198" text-anchor="end" class="bits">16 bits</text>
    
    <rect x="30" y="203" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="216" class="detail" fill="#2c3e50">TTL</text>
    <text x="175" y="216" text-anchor="end" class="bits">8 bits</text>
    
    <rect x="30" y="221" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="234" class="detail" fill="#2c3e50">Protocol</text>
    <text x="175" y="234" text-anchor="end" class="bits">8 bits</text>
    
    <rect x="30" y="239" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="252" class="detail" fill="#2c3e50">Header Checksum</text>
    <text x="175" y="252" text-anchor="end" class="bits">16 bits</text>
    
    <rect x="30" y="257" width="160" height="22" fill="#a9cce3" stroke="#2980b9" stroke-width="1.5"/>
    <text x="35" y="271" class="detail" fill="#1a5276" font-weight="bold">Source IP</text>
    <text x="175" y="271" text-anchor="end" class="bits">32 bits</text>
    
    <rect x="30" y="279" width="160" height="22" fill="#a9cce3" stroke="#2980b9" stroke-width="1.5"/>
    <text x="35" y="293" class="detail" fill="#1a5276" font-weight="bold">Destination IP</text>
    <text x="175" y="293" text-anchor="end" class="bits">32 bits</text>
    
    <rect x="30" y="301" width="160" height="18" fill="#d4e6f1" stroke="#3498db" stroke-width="1"/>
    <text x="35" y="314" class="detail" fill="#2c3e50">Options (opt.)</text>
    <text x="175" y="314" text-anchor="end" class="bits">variable</text>
  </g>
  
  <!-- IPv6 Section -->
  <g class="ipv6-box" data-narration="IPv6 Header: 128-bit addressing with fixed 40 byte header, simplified structure">
    <rect x="220" y="50" width="180" height="320" rx="8" fill="url(#ipv6Gradient)" filter="url(#shadow)"/>
    <text x="310" y="72" text-anchor="middle" class="label" fill="#6c3483">IPv6 Header</text>
    <text x="310" y="86" text-anchor="middle" class="bits" fill="#6c3483">(40 bytes fixed)</text>
    
    <!-- IPv6 Fields -->
    <rect x="230" y="95" width="160" height="18" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
    <text x="235" y="108" class="detail" fill="#4a235a">Version</text>
    <text x="375" y="108" text-anchor="end" class="bits">4 bits</text>
    
    <rect x="230" y="113" width="160" height="18" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
    <text x="235" y="126" class="detail" fill="#4a235a">Traffic Class</text>
    <text x="375" y="126" text-anchor="end" class="bits">8 bits</text>
    
    <rect x="230" y="131" width="160" height="18" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
    <text x="235" y="144" class="detail" fill="#4a235a">Flow Label</text>
    <text x="375" y="144" text-anchor="end" class="bits">20 bits</text>
    
    <rect x="230" y="149" width="160" height="18" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
    <text x="235" y="162" class="detail" fill="#4a235a">Payload Length</text>
    <text x="375" y="162" text-anchor="end" class="bits">16 bits</text>
    
    <rect x="230" y="167" width="160" height="18" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
    <text x="235" y="180" class="detail" fill="#4a235a">Next Header</text>
    <text x="375" y="180" text-anchor="end" class="bits">8 bits</text>
    
    <rect x="230" y="185" width="160" height="18" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
    <text x="235" y="198" class="detail" fill="#4a235a">Hop Limit</text>
    <text x="375" y="198" text-anchor="end" class="bits">8 bits</text>
    
    <rect x="230" y="203" width="160" height="30" fill="#d2b4de" stroke="#7d3c98" stroke-width="1.5"/>
    <text x="235" y="218" class="detail" fill="#4a235a" font-weight="bold">Source Address</text>
    <text x="375" y="218" text-anchor="end" class="bits">128 bits</text>
    
    <rect x="230" y="233" width="160" height="30" fill="#d2b4de" stroke="#7d3c98" stroke-width="1.5"/>
    <text x="235" y="248" class="detail" fill="#4a235a" font-weight="bold">Destination Address</text>
    <text x="375" y="248" text-anchor="end" class="bits">128 bits</text>
    
    <rect x="230" y="263" width="160" height="18" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
    <text x="235" y="276" class="detail" fill="#4a235a">Extension Headers</text>
    <text x="375" y="276" text-anchor="end" class="bits">optional</text>
    
    <!-- No checksum in IPv6 -->
    <rect x="230" y="281" width="160" height="50" rx="4" fill="#f9e79f" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="235" y="300" class="detail" fill="#7d6608" font-weight="bold">NO HEADER CHECKSUM</text>
    <text x="235" y="315" class="bits" fill="#7d6608">Faster processing</text>
    <text x="235" y="325" class="bits" fill="#7d6608">Security at layers</text>
  </g>
  
  <!-- Comparison Arrows -->
  <g class="arrow-anim">
    <path d="M 200 160 L 218 160" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key Differences Box -->
  <g class="section-box" data-narration="Key differences: IPv6 has 128-bit addresses vs 32-bit in IPv4">
    <rect x="100" y="375" width="220" height="20" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
    <text x="210" y="389" text-anchor="middle" class="detail" fill="#922b21">IPv6: 340 undecillion addresses | IPv4: ~4.3 billion</text>
  </g>
  
  <!-- Connection indicator -->
  <g class="section-box" style="animation-delay: 0.8s" data-narration="IPv6 simplified header improves routing efficiency">
    <circle cx="210" cy="355" r="6" fill="#27ae60"/>
    <text x="210" y="370" text-anchor="middle" class="bits" fill="#1e8449">Simplified</text>
  </g>
</svg>