<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="addressing-routing-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="classAGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="classBGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#3dbdb5"/>
    </linearGradient>
    <linearGradient id="classCGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#45b7d1"/>
      <stop offset="100%" style="stop-color:#35a7c1"/>
    </linearGradient>
    <linearGradient id="classDGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#96ceb4"/>
      <stop offset="100%" style="stop-color:#86bea4"/>
    </linearGradient>
    <linearGradient id="classEGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#928bee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box-a-anim { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-b-anim { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-c-anim { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-d-anim { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box-e-anim { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .loopback-anim { animation: slideInUp 0.6s ease-out 0.7s forwards; opacity: 0; }
    .legend-anim { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .pulse:hover { animation: pulse 1s infinite; cursor: pointer; }
    .connector { stroke-dasharray: 5,5; animation: drawLine 1s linear 1s forwards; stroke-dashoffset: 100; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title-anim">IP Address Classes</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2" class="title-anim"/>
  
  <!-- Class A Box -->
  <g class="box-a-anim pulse" data-narration="Class A addresses range from 1.0.0.0 to 126.255.255.255, supporting over 16 million hosts per network.">
    <rect x="20" y="60" width="160" height="55" rx="8" fill="url(#classAGradient)" filter="url(#shadow)"/>
    <text x="100" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Class A</text>
    <text x="100" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">1.0.0.0 - 126.255.255.255</text>
  </g>
  
  <!-- Class B Box -->
  <g class="box-b-anim pulse" data-narration="Class B addresses range from 128.0.0.0 to 191.255.255.255, supporting approximately 65,000 hosts per network.">
    <rect x="20" y="125" width="160" height="55" rx="8" fill="url(#classBGradient)" filter="url(#shadow)"/>
    <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Class B</text>
    <text x="100" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">128.0.0.0 - 191.255.255.255</text>
  </g>
  
  <!-- Class C Box -->
  <g class="box-c-anim pulse" data-narration="Class C addresses range from 192.0.0.0 to 223.255.255.255, supporting 254 hosts per network.">
    <rect x="20" y="190" width="160" height="55" rx="8" fill="url(#classCGradient)" filter="url(#shadow)"/>
    <text x="100" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Class C</text>
    <text x="100" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">192.0.0.0 - 223.255.255.255</text>
  </g>
  
  <!-- Arrow connector for left side -->
  <path d="M180 87 L195 87" stroke="#7f8c8d" stroke-width="2" class="connector"/>
  <polygon points="195,87 190,83 190,91" fill="#7f8c8d"/>
  
  <path d="M180 152 L195 152" stroke="#7f8c8d" stroke-width="2" class="connector"/>
  <polygon points="195,152 190,148 190,156" fill="#7f8c8d"/>
  
  <path d="M180 217 L195 217" stroke="#7f8c8d" stroke-width="2" class="connector"/>
  <polygon points="195,217 190,213 190,221" fill="#7f8c8d"/>
  
  <!-- Unicast label -->
  <g class="legend-anim">
    <rect x="200" y="70" width="80" height="30" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="240" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Unicast</text>
    <text x="240" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">(A, B, C)</text>
  </g>
  
  <!-- Class D Box -->
  <g class="box-d-anim pulse" data-narration="Class D addresses (224.0.0.0 - 239.255.255.255) are reserved for multicast groups.">
    <rect x="240" y="125" width="160" height="55" rx="8" fill="url(#classDGradient)" filter="url(#shadow)"/>
    <text x="320" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Class D</text>
    <text x="320" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">224.0.0.0 - 239.255.255.255</text>
  </g>
  
  <!-- Class E Box -->
  <g class="box-e-anim pulse" data-narration="Class E addresses (240.0.0.0 - 255.255.255.255) are reserved for experimental and future use.">
    <rect x="240" y="190" width="160" height="55" rx="8" fill="url(#classEGradient)" filter="url(#shadow)"/>
    <text x="320" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Class E</text>
    <text x="320" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">240.0.0.0 - 255.255.255.255</text>
  </g>
  
  <!-- Multicast/Reserved labels -->
  <g class="legend-anim">
    <rect x="200" y="135" width="35" height="35" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="217" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Multicast</text>
    <text x="217" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">(Class D)</text>
  </g>
  
  <g class="legend-anim">
    <rect x="200" y="200" width="35" height="35" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="217" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Reserved</text>
    <text x="217" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">(Class E)</text>
  </g>
  
  <!-- Loopback Box -->
  <g class="loopback-anim pulse" data-narration="The 127.x.x.x range is reserved for loopback testing - communications within the local host.">
    <rect x="240" y="255" width="160" height="45" rx="8" fill="#f39c12" filter="url(#shadow)"/>
    <text x="320" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Loopback</text>
    <text x="320" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">127.x.x.x (Self-test)</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="legend-anim">
    <rect x="20" y="255" width="160" height="45" rx="6" fill="#fff9e6" stroke="#f1c40f" stroke-width="1.5"/>
    <text x="100" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d35400">Default Subnet Mask</text>
    <text x="100" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">A:255.0.0.0 | B:255.255.0.0 | C:255.255.255.0</text>
  </g>
  
  <!-- Arrow from legend to boxes -->
  <path d="M100 255 L100 245 L180 245 L180 230" stroke="#95a5a6" stroke-width="1.5" fill="none" class="connector"/>
  <polygon points="180,230 176,238 184,238" fill="#95a5a6"/>
  
  <!-- Bottom info -->
  <g class="legend-anim">
    <text x="210" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">32-bit IPv4 Address Space | Addressing &amp; Routing Algorithms</text>
  </g>
  
  <!-- Visual bit representation -->
  <g class="legend-anim">
    <rect x="20" y="310" width="50" height="25" rx="4" fill="#34495e"/>
    <text x="45" y="327" text-anchor="middle" font-family="Courier, monospace" font-size="10" fill="#ecf0f1">Network</text>
    <rect x="75" y="310" width="105" height="25" rx="4" fill="#95a5a6"/>
    <text x="127" y="327" text-anchor="middle" font-family="Courier, monospace" font-size="10" fill="#ecf0f1">Host</text>
  </g>
</svg>