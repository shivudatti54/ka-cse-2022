<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="aggregation-views">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dced;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#41719c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#548235;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c79000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c94c4c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#76448a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #ffffff; }
    .line { stroke: #7f8c8d; stroke-width: 2; stroke-dasharray: 5,5; }
    .box { filter: url(#shadow); }
    .title-anim { animation: slideIn 0.8s ease-out forwards; }
    .box1-anim { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2-anim { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3-anim { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4-anim { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5-anim { animation: fadeIn 0.6s ease-out 1.0s forwards; opacity: 0; }
    .box6-anim { animation: fadeIn 0.6s ease-out 1.2s forwards; opacity: 0; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 0.8s ease-out 1.4s forwards; }
    .highlight { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { text-anchor: middle; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" class="title title-anim">View Classification Hierarchy</text>
  <text x="210" y="50" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" text-anchor="middle">Aggregation Views in DBMS</text>
  
  <!-- Connecting Lines -->
  <g class="line-anim">
    <line x1="210" y1="80" x2="210" y2="110" class="line"/>
    <line x1="210" y1="110" x2="140" y2="110" class="line"/>
    <line x1="210" y1="110" x2="280" y2="110" class="line"/>
    <line x1="140" y1="110" x2="140" y2="150" class="line"/>
    <line x1="140" y1="150" x2="90" y2="150" class="line"/>
    <line x1="140" y1="150" x2="190" y2="150" class="line"/>
    <line x1="90" y1="150" x2="90" y2="190" class="line"/>
    <line x1="190" y1="150" x2="190" y2="190" class="line"/>
    <line x1="280" y1="110" x2="280" y2="150" class="line"/>
    <line x1="280" y1="150" x2="280" y2="190" class="line"/>
  </g>
  
  <!-- Box 1: Views (Root) -->
  <g class="box1-anim" data-narration="Root category: Views are virtual tables based on SQL queries">
    <rect x="160" y="65" width="100" height="30" rx="5" ry="5" fill="url(#boxGradient1)" class="box"/>
    <text x="210" y="85" class="label">VIEWS</text>
  </g>
  
  <!-- Box 2: Virtual Views -->
  <g class="box2-anim" data-narration="Virtual Views: Do not store data, execute query at runtime">
    <rect x="80" y="120" width="120" height="35" rx="5" ry="5" fill="url(#boxGradient2)" class="box"/>
    <text x="140" y="138" class="label">Virtual Views</text>
    <text x="140" y="152" class="detail">Non-materialized</text>
  </g>
  
  <!-- Box 3: Materialized Views -->
  <g class="box3-anim" data-narration="Materialized Views: Physically store pre-computed results">
    <rect x="220" y="120" width="120" height="35" rx="5" ry="5" fill="url(#boxGradient3)" class="box highlight"/>
    <text x="280" y="138" class="label">Materialized Views</text>
    <text x="280" y="152" class="detail">Stores data physically</text>
  </g>
  
  <!-- Box 4: Simple Views -->
  <g class="box4-anim" data-narration="Simple Views: Single table, no aggregate functions">
    <rect x="30" y="195" width="110" height="35" rx="5" ry="5" fill="url(#boxGradient4)" class="box"/>
    <text x="85" y="213" class="label">Simple Views</text>
    <text x="85" y="227" class="detail">Single table</text>
  </g>
  
  <!-- Box 5: Complex Views -->
  <g class="box5-anim" data-narration="Complex Views: Multiple tables, with aggregates">
    <rect x="145" y="195" width="110" height="35" rx="5" ry="5" fill="url(#boxGradient5)" class="box"/>
    <text x="200" y="213" class="label">Complex Views</text>
    <text x="200" y="227" class="detail">Joins/Aggregates</text>
  </g>
  
  <!-- Box 6: Aggregation Views (Highlighted) -->
  <g class="box6-anim" data-narration="Aggregation Views: Pre-computed summaries for efficient querying - Key for data warehousing">
    <rect x="220" y="195" width="120" height="50" rx="5" ry="5" fill="url(#boxGradient6)" class="box highlight"/>
    <text x="280" y="218" class="label">Aggregation</text>
    <text x="280" y="235" class="label">Views</text>
    <text x="280" y="252" class="detail" font-size="10">SUM, COUNT, AVG...</text>
  </g>
  
  <!-- Legend / Key Concepts -->
  <g transform="translate(10, 310)">
    <text x="5" y="0" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="start">Key Concepts:</text>
    <rect x="5" y="10" width="15" height="15" rx="3" fill="#1abc9c"/>
    <text x="25" y="22" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="start">Pre-computed summaries</text>
    <rect x="5" y="32" width="15" height="15" rx="3" fill="#70ad47"/>
    <text x="25" y="44" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="start">No data storage (virtual)</text>
    <rect x="150" y="10" width="15" height="15" rx="3" fill="#ffc000"/>
    <text x="170" y="22" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="start">Physical storage</text>
    <rect x="150" y="32" width="15" height="15" rx="3" fill="#5b9bd5"/>
    <text x="170" y="44" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="start">Dynamic query execution</text>
  </g>
  
  <!-- Bottom note -->
  <g transform="translate(210, 380)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">Used in Data Warehousing &amp; Business Intelligence</text>
  </g>
</svg>