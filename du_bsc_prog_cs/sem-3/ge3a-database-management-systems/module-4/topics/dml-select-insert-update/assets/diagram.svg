<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="dml-select-insert-update" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dcec"/>
    </linearGradient>
    <linearGradient id="selectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a8a"/>
    </linearGradient>
    <linearGradient id="insertGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <linearGradient id="updateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#d98c1a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title-text { animation: slideIn 0.8s ease-out forwards; }
    .section-1 { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .flow-box { animation: pulse 3s ease-in-out infinite; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .sql-code { animation: slideInLeft 0.5s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title-text">DML Operations</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5d6d7e">SELECT, INSERT, UPDATE</text>
  
  <!-- SELECT Section with Query Flow -->
  <g class="section-1" data-narration="SELECT retrieves data from tables with filtering, grouping, and sorting capabilities">
    <rect x="20" y="75" width="180" height="145" fill="url(#selectGrad)" rx="8" filter="url(#shadow)"/>
    <text x="110" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">SELECT</text>
    <text x="110" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e8f4f8">Query Execution Flow</text>
    
    <!-- Flow boxes -->
    <g class="flow-box">
      <rect x="30" y="125" width="50" height="18" fill="white" rx="3" opacity="0.9"/>
      <text x="55" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">FROM</text>
    </g>
    <g class="flow-box" style="animation-delay: 0.3s">
      <rect x="85" y="125" width="50" height="18" fill="white" rx="3" opacity="0.9"/>
      <text x="110" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">WHERE</text>
    </g>
    <g class="flow-box" style="animation-delay: 0.6s">
      <rect x="140" y="125" width="50" height="18" fill="white" rx="3" opacity="0.9"/>
      <text x="165" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">GROUP</text>
    </g>
    <g class="flow-box" style="animation-delay: 0.9s">
      <rect x="30" y="148" width="50" height="18" fill="white" rx="3" opacity="0.9"/>
      <text x="55" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">HAVING</text>
    </g>
    <g class="flow-box" style="animation-delay: 1.2s">
      <rect x="85" y="148" width="50" height="18" fill="white" rx="3" opacity="0.9"/>
      <text x="110" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">SELECT</text>
    </g>
    <g class="flow-box" style="animation-delay: 1.5s">
      <rect x="140" y="148" width="50" height="18" fill="white" rx="3" opacity="0.9"/>
      <text x="165" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">ORDER</text>
    </g>
    
    <text x="110" y="182" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#e8f4f8">SELECT * FROM table</text>
  </g>
  
  <!-- INSERT Section -->
  <g class="section-2" data-narration="INSERT adds new records into database tables">
    <rect x="220" y="75" width="180" height="75" fill="url(#insertGrad)" rx="8" filter="url(#shadow)"/>
    <text x="310" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">INSERT</text>
    <text x="310" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e8f4f8">Adds New Records</text>
    <rect x="235" y="135" width="150" height="8" fill="rgba(255,255,255,0.3)" rx="2"/>
    <text x="310" y="142" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="white">INSERT INTO table</text>
  </g>
  
  <!-- UPDATE Section -->
  <g class="section-3" data-narration="UPDATE modifies existing data in database tables">
    <rect x="220" y="165" width="180" height="55" fill="url(#updateGrad)" rx="8" filter="url(#shadow)"/>
    <text x="310" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">UPDATE</text>
    <text x="310" y="208" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="white">UPDATE table SET col=val</text>
  </g>
  
  <!-- Key Clauses Box -->
  <g class="section-3" data-narration="Key SELECT clauses include DISTINCT, WHERE, ORDER BY, and GROUP BY">
    <rect x="20" y="235" width="180" height="80" fill="white" rx="8" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Key SELECT Clauses</text>
    <text x="30" y="275" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" class="sql-code">• DISTINCT - Remove Duplicates</text>
    <text x="30" y="292" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" class="sql-code" style="animation-delay: 0.2s">• WHERE - Filter Rows</text>
    <text x="30" y="309" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" class="sql-code" style="animation-delay: 0.4s">• ORDER BY - Sort Results</text>
  </g>
  
  <!-- Examples Box -->
  <g class="section-3" data-narration="Practical SQL examples showing syntax for each DML operation">
    <rect x="220" y="235" width="180" height="130" fill="white" rx="8" stroke="#5cb85c" stroke-width="2" filter="url(#shadow)"/>
    <text x="310" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">SQL Examples</text>
    
    <rect x="230" y="265" width="160" height="22" fill="#f8f9fa" rx="3"/>
    <text x="235" y="278" font-family="Courier, monospace" font-size="9" fill="#2c3e50">SELECT * FROM students</text>
    <text x="235" y="283" font-family="Courier, monospace" font-size="9" fill="#2c3e50">WHERE marks > 75;</text>
    
    <rect x="230" y="292" width="160" height="22" fill="#f8f9fa" rx="3"/>
    <text x="235" y="305" font-family="Courier, monospace" font-size="9" fill="#2c3e50">INSERT INTO students</text>
    <text x="235" y="310" font-family="Courier, monospace" font-size="9" fill="#2c3e50">VALUES ('John', 85);</text>
    
    <rect x="230" y="319" width="160" height="22" fill="#f8f9fa" rx="3"/>
    <text x="235" y="332" font-family="Courier, monospace" font-size="9" fill="#2c3e50">UPDATE students SET</text>
    <text x="235" y="337" font-family="Courier, monospace" font-size="9" fill="#2c3e50">marks = 90 WHERE id = 1;</text>
  </g>
  
  <!-- Arrow from SELECT to INSERT -->
  <g class="arrow">
    <path d="M 200 120 L 220 110" stroke="#4a90d9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow from INSERT to UPDATE -->
  <g class="arrow">
    <path d="M 310 150 L 310 165" stroke="#5cb85c" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Bottom info -->
  <g class="section-3">
    <text x="210" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">DML forms 60-70% of real-world SQL usage</text>
  </g>
</svg>