<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ddl-create-tables">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f0ff"/>
      <stop offset="100%" style="stop-color:#e8fcf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideRight {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5 { animation: slideIn 0.6s ease-out 1.0s forwards; opacity: 0; }
    .arrow { animation: slideRight 0.5s ease-out 1.2s forwards; opacity: 0; }
    .keyword { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .syntax-box { animation: fadeIn 0.5s ease-out 1.4s forwards; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">DDL: CREATE TABLE</text>
  
  <!-- Syntax Structure Box -->
  <g class="syntax-box">
    <rect x="20" y="45" width="380" height="50" fill="#fff" stroke="#3498db" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="210" y="75" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#2c3e50">
      <tspan class="keyword">CREATE TABLE</tspan> table_name (col1 type, col2 type, ...);
    </text>
  </g>
  
  <!-- CREATE TABLE Keyword Box -->
  <g class="box1" data-narration="The CREATE TABLE statement initiates table creation in SQL">
    <rect x="30" y="110" width="100" height="45" fill="#3498db" rx="6" filter="url(#shadow)"/>
    <text x="80" y="132" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">CREATE</text>
    <text x="80" y="148" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">TABLE</text>
    <circle cx="130" y="132" r="4" fill="#2c3e50" class="arrow"/>
  </g>
  
  <!-- Table Name Box -->
  <g class="box2" data-narration="Table name identifies the table in the database">
    <rect x="145" y="110" width="85" height="45" fill="#27ae60" rx="6" filter="url(#shadow)"/>
    <text x="187" y="132" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Table</text>
    <text x="187" y="148" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Name</text>
    <text x="235" y="132" text-anchor="middle" font-family="Consolas" font-size="14" fill="#2c3e50">students</text>
  </g>
  
  <!-- Column Definition Box -->
  <g class="box3" data-narration="Column definitions include column name, data type, and column-level constraints">
    <rect x="30" y="170" width="170" height="60" fill="#9b59b6" rx="6" filter="url(#shadow)"/>
    <text x="115" y="188" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Column Definitions</text>
    <text x="115" y="208" text-anchor="middle" font-family="Consolas" font-size="10" fill="#f0f0f0">column_name datatype</text>
    <text x="115" y="222" text-anchor="middle" font-family="Consolas" font-size="10" fill="#f0f0f0">[constraints]</text>
  </g>
  
  <!-- Data Types Box -->
  <g class="box4" data-narration="SQL data types define what kind of data each column can store">
    <rect x="220" y="170" width="170" height="60" fill="#e67e22" rx="6" filter="url(#shadow)"/>
    <text x="305" y="188" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Data Types</text>
    <text x="305" y="208" text-anchor="middle" font-family="Consolas" font-size="10" fill="#fff">INT, VARCHAR, DATE</text>
    <text x="305" y="222" text-anchor="middle" font-family="Consolas" font-size="10" fill="#fff">DECIMAL, BOOLEAN</text>
  </g>
  
  <!-- Constraints Box -->
  <g class="box5" data-narration="Constraints enforce data integrity rules at table or column level">
    <rect x="30" y="245" width="360" height="55" fill="#e74c3c" rx="6" filter="url(#shadow)"/>
    <text x="210" y="263" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Constraints</text>
    <text x="80" y="285" text-anchor="middle" font-family="Consolas" font-size="10" fill="#ffebee">PRIMARY KEY</text>
    <text x="160" y="285" text-anchor="middle" font-family="Consolas" font-size="10" fill="#ffebee">FOREIGN KEY</text>
    <text x="250" y="285" text-anchor="middle" font-family="Consolas" font-size="10" fill="#ffebee">NOT NULL</text>
    <text x="330" y="285" text-anchor="middle" font-family="Consolas" font-size="10" fill="#ffebee">UNIQUE</text>
  </g>
  
  <!-- Closing Syntax -->
  <g class="syntax-box">
    <rect x="30" y="315" width="360" height="35" fill="#fff" stroke="#3498db" stroke-width="1.5" rx="4"/>
    <text x="50" y="338" font-family="Consolas" font-size="12" fill="#2c3e50">);</text>
    <text x="280" y="338" font-family="Arial" font-size="11" fill="#7f8c8d">← closes definition</text>
    <rect x="340" y="320" width="35" height="25" fill="#f1c40f" rx="3"/>
    <text x="357" y="337" text-anchor="middle" font-family="Consolas" font-size="12" font-weight="bold" fill="#2c3e50">;</text>
  </g>
  
  <!-- Arrows/Connectors -->
  <g class="arrow">
    <path d="M 80 155 Q 80 165 80 170" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#3498db"/>
      </marker>
    </defs>
  </g>
  
  <!-- Example Code Box -->
  <g class="syntax-box">
    <rect x="30" y="355" width="360" height="35" fill="#2c3e50" rx="4"/>
    <text x="40" y="372" font-family="Consolas" font-size="9" fill="#2ecc71">CREATE TABLE students (id INT PRIMARY KEY, name VARCHAR(50) NOT NULL);</text>
  </g>
</svg>