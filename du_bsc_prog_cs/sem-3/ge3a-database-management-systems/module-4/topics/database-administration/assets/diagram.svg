<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="database-administration">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="activeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558b2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="partialGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="committedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43a047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="abortedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-box { animation: fadeIn 0.8s ease-out; }
    .state-active { animation: slideInLeft 0.8s ease-out, pulse 3s infinite; transform-origin: center; }
    .state-partial { animation: fadeIn 1s ease-out 0.3s both; }
    .state-committed { animation: slideInRight 0.8s ease-out 0.5s both; }
    .state-aborted { animation: slideInRight 0.8s ease-out 0.5s both; }
    .arrow { stroke-dasharray: 100; animation: drawArrow 1.5s ease-out forwards; }
    .arrow-return { stroke-dasharray: 100; animation: drawArrow 1.5s ease-out 0.8s forwards; }
    .label { animation: fadeIn 1.2s ease-out; }
    .narration { animation: fadeIn 1s ease-out 0.5s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <g class="title">
    <rect x="10" y="10" width="400" height="45" fill="url(#stateGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="42" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Database Administration</text>
  </g>
  
  <!-- Subtitle -->
  <g class="title">
    <text x="210" y="70" text-anchor="middle" fill="#2d5a8a" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Transaction State Diagram</text>
  </g>

  <!-- Diagram Container -->
  <g transform="translate(30, 90)">
    
    <!-- Active State -->
    <g class="state-active" data-narration="Transaction starts in Active state when BEGIN is executed. The transaction is actively executing SQL statements.">
      <ellipse cx="80" cy="80" rx="55" ry="35" fill="url(#activeGradient)" filter="url(#shadow)"/>
      <text x="80" y="75" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">ACTIVE</text>
      <text x="80" y="92" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">Executing</text>
    </g>
    
    <!-- Arrow: Active to Partially Committed -->
    <g class="arrow">
      <line x1="135" y1="80" y2="180" y2="80" stroke="#4a90d9" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
      <polygon points="175,80 185,75 185,85" fill="#4a90d9"/>
    </g>
    <text x="155" y="70" text-anchor="middle" fill="#4a90d9" font-family="Arial, sans-serif" font-size="10">Last stmt</text>
    <text x="155" y="82" text-anchor="middle" fill="#4a90d9" font-family="Arial, sans-serif" font-size="10">executed</text>
    
    <!-- Partially Committed State -->
    <g class="state-partial" data-narration="After the final statement executes, transaction enters Partially Committed state. It waits for final verification before commitment.">
      <ellipse cx="230" cy="80" rx="65" ry="35" fill="url(#partialGradient)" filter="url(#shadow)"/>
      <text x="230" y="75" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">PARTIALLY</text>
      <text x="230" y="92" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">COMMITTED</text>
    </g>
    
    <!-- Arrow: Partially Committed to Committed -->
    <g class="arrow">
      <line x1="295" y1="80" y2="345" y2="80" stroke="#4a90d9" stroke-width="2" fill="none"/>
      <polygon points="340,80 350,75 350,85" fill="#4a90d9"/>
    </g>
    <text x="320" y="70" text-anchor="middle" fill="#4a90d9" font-family="Arial, sans-serif" font-size="10">Commit</text>
    
    <!-- Committed State -->
    <g class="state-committed" data-narration="Committed is a terminal state where the transaction successfully completes. All changes are permanently saved to the database.">
      <ellipse cx="80" cy="220" rx="60" ry="35" fill="url(#committedGradient)" filter="url(#shadow)"/>
      <text x="80" y="215" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">COMMITTED</text>
      <text x="80" y="232" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">Permanent</text>
    </g>
    
    <!-- Arrow: Partially Committed to Aborted -->
    <g class="arrow">
      <line x1="230" y1="115" y2="230" y2="170" stroke="#e53935" stroke-width="2" fill="none"/>
      <polygon points="230,165 225,175 235,175" fill="#e53935"/>
    </g>
    <text x="250" y="145" text-anchor="middle" fill="#e53935" font-family="Arial, sans-serif" font-size="10">Failure</text>
    
    <!-- Aborted State -->
    <g class="state-aborted" data-narration="Aborted is a terminal state when transaction fails. Database is rolled back to its original state before the transaction started.">
      <ellipse cx="230" cy="220" rx="60" ry="35" fill="url(#abortedGradient)" filter="url(#shadow)"/>
      <text x="230" y="215" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">ABORTED</text>
      <text x="230" y="232" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">Rolled Back</text>
    </g>
    
    <!-- Arrow: Active to Aborted (direct failure) -->
    <g class="arrow">
      <line x1="80" y1="115" y2="180" y2="185" stroke="#e53935" stroke-width="2" fill="none"/>
      <polygon points="177,182 185,195 170,190" fill="#e53935"/>
    </g>
    <text x="110" y="155" text-anchor="middle" fill="#e53935" font-family="Arial, sans-serif" font-size="10">Early failure</text>
    
    <!-- Arrow: Committed to Aborted (not possible - shown for clarity) -->
    <text x="80" y="280" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10" font-style="italic">Terminal state</text>
    <text x="230" y="280" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10" font-style="italic">Terminal state</text>
    
    <!-- Key points box -->
    <g class="section-box" data-narration="Key states: Active (executing), Partially Committed (waiting for completion), Committed (success), Aborted (failure/rollback)">
      <rect x="300" y="160" width="105" height="100" fill="white" rx="6" stroke="#4a90d9" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="352" y="178" text-anchor="middle" fill="#2d5a8a" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Key Points</text>
      <line x1="305" y1="185" x2="400" y2="185" stroke="#4a90d9" stroke-width="0.5"/>
      <text x="310" y="200" fill="#444" font-family="Arial, sans-serif" font-size="9">• Active: Running SQL</text>
      <text x="310" y="215" fill="#444" font-family="Arial, sans-serif" font-size="9">• Partial: Final check</text>
      <text x="310" y="230" fill="#444" font-family="Arial, sans-serif" font-size="9">• Committed: Success</text>
      <text x="310" y="245" fill="#444" font-family="Arial, sans-serif" font-size="9">• Aborted: Rollback</text>
    </g>
    
    <!-- Start indicator -->
    <g class="label">
      <circle cx="25" cy="80" r="8" fill="#7cb342"/>
      <text x="25" y="83" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">S</text>
      <line x1="33" y1="80" x2="45" y2="80" stroke="#7cb342" stroke-width="2" stroke-dasharray="3,2"/>
    </g>
    
    <!-- End indicators -->
    <g class="label">
      <circle cx="20" cy="220" r="6" fill="#43a047"/>
      <text x="20" y="223" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">E</text>
      <text x="25" y="224" fill="#43a047" font-family="Arial, sans-serif" font-size="9">Success</text>
    </g>
    <g class="label">
      <circle cx="170" cy="220" r="6" fill="#e53935"/>
      <text x="170" y="223" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">E</text>
      <text x="175" y="224" fill="#e53935" font-family="Arial, sans-serif" font-size="9">Failure</text>
    </g>
    
  </g>
  
  <!-- Legend for DBA Role -->
  <g class="narration" data-narration="The DBA ensures transactions follow ACID properties: Atomicity (all-or-nothing), Consistency, Isolation, Durability">
    <rect x="10" y="340" width="400" height="45" fill="white" rx="5" stroke="#ddd" stroke-width="1"/>
    <text x="210" y="355" text-anchor="middle" fill="#2d5a8a" font-family="Arial, sans-serif" font-size="11" font-weight="bold">DBA Responsibility: Ensure ACID Properties</text>
    <text x="210" y="372" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="10">Atomicity • Consistency • Isolation • Durability</text>
  </g>
</svg>