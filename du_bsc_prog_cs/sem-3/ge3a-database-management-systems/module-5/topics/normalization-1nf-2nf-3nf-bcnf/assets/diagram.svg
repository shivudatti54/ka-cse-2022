<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="normalization-1nf-2nf-3nf-bcnf">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e9f0"/>
    </linearGradient>
    <linearGradient id="nf1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="nf2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="nf3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
    <linearGradient id="bcnfGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fddb92"/>
      <stop offset="100%" style="stop-color:#d1fdff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #666; font-style: italic; }
    .nf-box { opacity: 0; animation: fadeIn 0.6s ease-out forwards; }
    .nf-box-1 { animation-delay: 0.2s; }
    .nf-box-2 { animation-delay: 0.4s; }
    .nf-box-3 { animation-delay: 0.6s; }
    .nf-box-4 { animation-delay: 0.8s; }
    .arrow { stroke: #888; stroke-width: 2; fill: none; marker-end: url(#arrowhead); opacity: 0; animation: fadeIn 0.5s ease-out forwards; animation-delay: 1s; }
    .title-group { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .concept-box { opacity: 0; animation: slideInLeft 0.5s ease-out forwards; }
    .concept-box-2 { animation: slideInRight 0.5s ease-out forwards; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; cursor: pointer; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out forwards; animation-delay: 0.9s; }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <title>Normalization: 1NF, 2NF, 3NF, BCNF</title>
  
  <g class="title-group">
    <text x="210" y="28" text-anchor="middle" class="title">Database Normalization</text>
    <text x="210" y="45" text-anchor="middle" class="subtitle">1NF → 2NF → 3NF → BCNF</text>
  </g>
  
  <g data-narration="First Normal Form - Atomic Values">
    <rect class="nf-box nf-box-1 pulse" x="30" y="70" width="170" height="70" rx="10" ry="10" fill="url(#nf1Gradient)" filter="url(#shadow)"/>
    <text x="115" y="92" text-anchor="middle" class="label">1NF</text>
    <text x="115" y="108" text-anchor="middle" class="subtitle">First Normal Form</text>
    <text x="115" y="125" text-anchor="middle" class="detail">Atomic Values Only</text>
  </g>
  
  <g data-narration="Second Normal Form - No Partial Dependencies">
    <rect class="nf-box nf-box-2 pulse" x="220" y="70" width="170" height="70" rx="10" ry="10" fill="url(#nf2Gradient)" filter="url(#shadow)"/>
    <text x="305" y="92" text-anchor="middle" class="label">2NF</text>
    <text x="305" y="108" text-anchor="middle" class="subtitle">Second Normal Form</text>
    <text x="305" y="125" text-anchor="middle" class="detail">No Partial Dependency</text>
  </g>
  
  <g data-narration="Third Normal Form - No Transitive Dependencies">
    <rect class="nf-box nf-box-3 pulse" x="30" y="175" width="170" height="70" rx="10" ry="10" fill="url(#nf3Gradient)" filter="url(#shadow)"/>
    <text x="115" y="197" text-anchor="middle" class="label">3NF</text>
    <text x="115" y="213" text-anchor="middle" class="subtitle">Third Normal Form</text>
    <text x="115" y="230" text-anchor="middle" class="detail">No Transitive Dependency</text>
  </g>
  
  <g data-narration="Boyce-Codd Normal Form - Superkey Determinants">
    <rect class="nf-box nf-box-4 pulse" x="220" y="175" width="170" height="70" rx="10" ry="10" fill="url(#bcnfGradient)" filter="url(#shadow)"/>
    <text x="305" y="197" text-anchor="middle" class="label">BCNF</text>
    <text x="305" y="213" text-anchor="middle" class="subtitle">Boyce-Codd NF</text>
    <text x="305" y="230" text-anchor="middle" class="detail">Superkey Determinants</text>
  </g>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
  
  <path class="arrow-line" d="M200 105 L215 105" marker-end="url(#arrowhead)"/>
  <path class="arrow-line" d="M115 140 L115 170" marker-end="url(#arrowhead)"/>
  <path class="arrow-line" d="M200 210 L215 210" marker-end="url(#arrowhead)"/>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key anomalies addressed by normalization">
    <rect class="concept-box" x="15" y="270" width="390" height="55" rx="8" ry="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="25" y="290" class="label" style="font-size:12px;">Anomalies Solved:</text>
    <text x="25" y="308" class="detail">• Insertion • Deletion • Update</text>
    <text x="150" y="308" class="detail" fill="#777">|</text>
    <text x="165" y="308" class="detail">Minimizes Redundancy</text>
    <text x="165" y="320" class="detail">Eliminates Data Anomalies</text>
  </g>
  
  <!-- Bottom Info Box -->
  <g data-narration="Functional dependency concept explanation">
    <rect class="concept-box-2" x="15" y="335" width="390" height="50" rx="8" ry="8" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
    <text x="25" y="355" class="label" style="font-size:12px;">Functional Dependency:</text>
    <text x="25" y="372" class="detail" fill="#555">If A → B, then for every A there is exactly one B</text>
    <text x="280" y="372" class="detail" fill="#666">|</text>
    <text x="300" y="372" class="detail">Edgar F. Codd (1970s)</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="380" r="4" fill="#a8edea" opacity="0.6"/>
  <circle cx="70" cy="375" r="3" fill="#d299c2" opacity="0.6"/>
  <circle cx="380" cy="55" r="5" fill="#89f7fe" opacity="0.5"/>
  <circle cx="395" cy="45" r="3" fill="#fddb92" opacity="0.5"/>
  
  <!-- Arrow labels -->
  <text x="207" y="100" class="detail" fill="#777" style="font-size:9px;">+No prime</text>
  <text x="110" y="158" class="detail" fill="#777" style="font-size:9px;">+1NF</text>
  <text x="207" y="205" class="detail" fill="#777" style="font-size:9px;">+3NF</text>
</svg>