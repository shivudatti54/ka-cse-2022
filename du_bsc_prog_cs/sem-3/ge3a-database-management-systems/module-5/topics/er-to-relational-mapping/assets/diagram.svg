<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="er-to-relational-mapping">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="erGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#9ec5db"/>
    </linearGradient>
    <linearGradient id="relGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7986cb"/>
      <stop offset="100%" style="stop-color:#5c6bc0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: 'Arial', sans-serif; font-size: 20px; font-weight: bold; fill: #37474f; }
    .label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #455a64; }
    .small-text { font-family: 'Arial', sans-serif; font-size: 10px; fill: #546e7a; }
    .er-box { fill: url(#erGradient); stroke: #5d9bc0; stroke-width: 1.5; rx: 5; }
    .rel-box { fill: url(#relGradient); stroke: #66bb6a; stroke-width: 1.5; rx: 5; }
    .concept-box { fill: #fff9c4; stroke: #fbc02d; stroke-width: 1; rx: 4; }
    .arrow-line { stroke: url(#arrowGradient); stroke-width: 3; fill: none; }
    .section { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.3s; }
    .section-3 { animation-delay: 0.5s; }
    .section-4 { animation-delay: 0.7s; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .slide-anim { animation: slideIn 0.6s ease-out forwards; }
    .slide-up-anim { animation: slideUp 0.6s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">ER-to-Relational Mapping</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#7986cb" stroke-width="2"/>
  
  <!-- ER Diagram Section -->
  <g class="section section-1" data-narration="The ER Diagram shows entities, attributes, and relationships at a conceptual level">
    <text x="80" y="65" text-anchor="middle" class="label" style="font-weight:bold;">ER Model</text>
    <rect x="25" y="75" width="110" height="90" class="er-box" filter="url(#shadow)"/>
    <text x="80" y="95" text-anchor="middle" class="label" style="font-weight:bold;fill:#1565c0;">STUDENT</text>
    <line x1="35" y1="102" x2="125" y2="102" stroke="#5d9bc0" stroke-width="1"/>
    <text x="35" y="118" class="small-text">StudentID (PK)</text>
    <text x="35" y="132" class="small-text">Name</text>
    <text x="35" y="146" class="small-text">Age</text>
    <text x="35" y="160" class="small-text">Address</text>
  </g>
  
  <!-- Arrow and Process -->
  <g class="section section-2" data-narration="The mapping process transforms conceptual entities into relational tables">
    <path d="M145 120 L175 120" class="arrow-line slide-anim"/>
    <polygon points="175,120 168,115 168,125" fill="#5c6bc0"/>
    <rect x="148" y="145" width="34" height="20" class="concept-box" style="fill:#e1bee7;stroke:#8e24aa"/>
    <text x="165" y="158" text-anchor="middle" class="small-text" style="fill:#4a148c;font-weight:bold;">Mapping</text>
  </g>
  
  <!-- Relational Schema Section -->
  <g class="section section-3" data-narration="The Relational Schema shows tables with primary keys and foreign keys">
    <text x="300" y="65" text-anchor="middle" class="label" style="font-weight:bold;">Relational Schema</text>
    <rect x="240" y="75" width="150" height="90" class="rel-box" filter="url(#shadow)"/>
    <text x="315" y="95" text-anchor="middle" class="label" style="font-weight:bold;fill:#2e7d32;">STUDENT</text>
    <line x1="245" y1="102" x2="385" y2="102" stroke="#66bb6a" stroke-width="1"/>
    <text x="250" y="118" class="small-text" style="fill:#1b5e20;">StudentID PK</text>
    <text x="250" y="132" class="small-text">Name</text>
    <text x="250" y="146" class="small-text">Age</text>
    <text x="250" y="160" class="small-text">HouseNo</text>
    <text x="310" y="160" class="small-text">Street</text>
    <text x="360" y="160" class="small-text">City</text>
  </g>
  
  <!-- Key Steps Box -->
  <g class="section section-4 slide-up-anim" data-narration="Key mapping rules: Entities become tables, attributes become columns, primary keys are preserved">
    <rect x="25" y="185" width="370" height="55" class="concept-box" filter="url(#shadow)"/>
    <text x="35" y="203" class="label" style="font-weight:bold;fill:#f57f17;">Mapping Steps:</text>
    <text x="35" y="220" class="small-text">1. Regular entities → Relations (tables)</text>
    <text x="35" y="234" class="small-text">2. Simple attributes → Columns</text>
    <text x="200" y="220" class="small-text">3. Composite → Only components</text>
    <text x="200" y="234" class="small-text">4. PK becomes Primary Key</text>
  </g>
  
  <!-- Relationship Mapping Example -->
  <g class="section section-1" style="animation-delay:0.9s" data-narration="Relationships are mapped through foreign keys or junction tables">
    <rect x="25" y="250" width="175" height="60" class="er-box" style="fill:#fff3e0;stroke:#ff9800"/>
    <text x="112" y="270" text-anchor="middle" class="label" style="font-weight:bold;fill:#e65100;">Relationship</text>
    <text x="35" y="288" class="small-text">1:N → FK in relation</text>
    <text x="35" y="302" class="small-text">N:M → Junction table</text>
    <text x="130" y="288" class="small-text">1:1 → FK anywhere</text>
  </g>
  
  <!-- Constraints Box -->
  <g class="section section-2" style="animation-delay:1.1s" data-narration="Constraints like primary key, foreign key, and domain constraints are preserved">
    <rect x="210" y="250" width="185" height="60" class="concept-box" style="fill:#ffcdd2;stroke:#e53935"/>
    <text x="302" y="270" text-anchor="middle" class="label" style="font-weight:bold;fill:#b71c1c;">Constraints Preserved</text>
    <text x="220" y="288" class="small-text">• Primary Key (PK)</text>
    <text x="220" y="302" class="small-text">• Foreign Key (FK)</text>
    <text x="290" y="288" class="small-text">• Domain/Type</text>
    <text x="290" y="302" class="small-text">• NOT NULL</text>
  </g>
  
  <!-- Bottom Arrow Flow -->
  <g class="section section-3" style="animation-delay:1.3s" data-narration="The complete mapping process converts the entire ER diagram into an implementable SQL schema">
    <path d="M60 325 L180 325" class="arrow-line" stroke="#7986cb" stroke-dasharray="5,3"/>
    <path d="M240 325 L360 325" class="arrow-line" stroke="#66bb6a" stroke-dasharray="5,3"/>
    <text x="210" y="330" text-anchor="middle" class="small-text" style="fill:#546e7a;font-style:italic;">Conceptual → Logical → Physical</text>
  </g>
  
  <!-- Result Box -->
  <g class="section section-4" style="animation-delay:1.5s" data-narration="The final output is a relational database schema ready for SQL implementation">
    <rect x="95" y="340" width="230" height="40" class="rel-box" style="fill:#e8f5e9;stroke:#43a047" filter="url(#shadow)"/>
    <text x="210" y="358" text-anchor="middle" class="label" style="font-weight:bold;fill:#1b5e20;">Ready for SQL Implementation</text>
    <text x="210" y="372" text-anchor="middle" class="small-text" style="fill:#388e3c;">CREATE TABLE STUDENT (...)</text>
  </g>
</svg>