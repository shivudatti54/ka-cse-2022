<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="relations-keys-integrity-constraints">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5e6"/>
    </linearGradient>
    <linearGradient id="superKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff8080"/>
    </linearGradient>
    <linearGradient id="candidateKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#80ed99"/>
    </linearGradient>
    <linearGradient id="primaryKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#57a0d3"/>
    </linearGradient>
    <linearGradient id="foreignKeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="integrityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc"/>
      <stop offset="100%" style="stop-color:#8ec5fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .super-key-box { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .candidate-key-box { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .primary-key-box { animation: slideInLeft 0.6s ease-out 0.6s forwards; opacity: 0; }
    .foreign-key-box { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .integrity-box { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .relation-box { animation: slideInUp 0.6s ease-out 0.7s forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 0.8s ease-out 1s forwards; stroke-dashoffset: 100; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .table-row { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .table-row:nth-child(1) { animation-delay: 0.8s; }
    .table-row:nth-child(2) { animation-delay: 0.9s; }
    .table-row:nth-child(3) { animation-delay: 1.0s; }
    .table-row:nth-child(4) { animation-delay: 1.1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Relations, Keys &amp; Integrity</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Key Hierarchy Section - Left Side -->
  <g data-narration="The key hierarchy shows how Super Key contains all unique identifiers, Candidate Keys are minimal super keys, and Primary Key is the selected main key">
    <text x="30" y="58" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">KEY HIERARCHY</text>
    
    <!-- Super Key - Outer Circle -->
    <ellipse cx="100" cy="110" rx="70" ry="45" fill="url(#superKeyGrad)" filter="url(#shadow)" class="super-key-box"/>
    <text x="100" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c0392b">Super Key</text>
    <text x="100" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c0392b">Uniquely identifies</text>
    <text x="100" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c0392b">rows (may have extras)</text>
    
    <!-- Candidate Key - Middle Circle -->
    <ellipse cx="100" cy="110" rx="48" ry="30" fill="url(#candidateKeyGrad)" filter="url(#shadow)" class="candidate-key-box"/>
    <text x="100" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e8449">Candidate</text>
    <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e8449">Minimal Super Key</text>
    
    <!-- Primary Key - Inner Circle -->
    <ellipse cx="100" cy="110" rx="28" ry="18" fill="url(#primaryKeyGrad)" filter="url(#shadow)" class="primary-key-box pulse-element"/>
    <text x="100" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Primary Key</text>
  </g>
  
  <!-- Arrow from PK to FK -->
  <path d="M145 110 L195 110" stroke="#f39c12" stroke-width="2" fill="none" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Foreign Key - Right Side -->
  <g data-narration="Foreign Key establishes relationships between tables by referencing another table's Primary Key">
    <rect x="195" y="75" width="90" height="50" rx="8" fill="url(#foreignKeyGrad)" filter="url(#shadow)" class="foreign-key-box"/>
    <text x="240" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#b8860b">Foreign Key</text>
    <text x="240" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b8860b">References PK</text>
    <text x="240" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b8860b">of another table</text>
  </g>
  
  <!-- Integrity Constraints Section -->
  <g data-narration="Integrity Constraints ensure data accuracy and consistency: Domain, Key, Entity, and Referential Integrity">
    <text x="30" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">INTEGRITY CONSTRAINTS</text>
    
    <rect x="30" y="185" width="85" height="32" rx="5" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1.5" class="integrity-box"/>
    <text x="72" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a085">Entity</text>
    <text x="72" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#16a085">PK ≠ NULL</text>
    
    <rect x="125" y="185" width="85" height="32" rx="5" fill="#fef9e7" stroke="#f1c40f" stroke-width="1.5" class="integrity-box"/>
    <text x="167" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#b7950b">Domain</text>
    <text x="167" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b7950b">Valid values</text>
    
    <rect x="220" y="185" width="85" height="32" rx="5" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5" class="integrity-box"/>
    <text x="262" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2980b9">Referential</text>
    <text x="262" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2980b9">FK → PK link</text>
    
    <rect x="315" y="185" width="80" height="32" rx="5" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5" class="integrity-box"/>
    <text x="355" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c0392b">Key</text>
    <text x="355" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">Unique values</text>
  </g>
  
  <!-- Relation/Table Visualization - Bottom -->
  <g data-narration="A relation is a table with atomic values, unique column names, and unique rows identified by keys">
    <text x="30" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">RELATION (TABLE)</text>
    
    <!-- Table Structure -->
    <rect x="30" y="250" width="365" height="130" rx="5" fill="white" stroke="#34495e" stroke-width="2" class="relation-box"/>
    
    <!-- Table Header -->
    <rect x="30" y="250" width="365" height="22" rx="3" fill="#2c3e50"/>
    <text x="70" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">StudentID (PK)</text>
    <text x="160" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Name</text>
    <text x="250" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">CourseID (FK)</text>
    <text x="340" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Age</text>
    
    <!-- Table Rows -->
    <g class="table-row">
      <rect x="30" y="272" width="365" height="26" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5"/>
      <text x="70" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CS001</text>
      <text x="160" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Alice</text>
      <text x="250" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CS101</text>
      <text x="340" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">20</text>
    </g>
    <g class="table-row">
      <rect x="30" y="298" width="365" height="26" fill="white" stroke="#bdc3c7" stroke-width="0.5"/>
      <text x="70" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CS002</text>
      <text x="160" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Bob</text>
      <text x="250" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CS102</text>
      <text x="340" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">21</text>
    </g>
    <g class="table-row">
      <rect x="30" y="324" width="365" height="26" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5"/>
      <text x="70" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CS003</text>
      <text x="160" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Carol</text>
      <text x="250" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CS101</text>
      <text x="340" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">19</text>
    </g>
    <g class="table-row">
      <rect x="30" y="350" width="365" height="26" fill="white" stroke="#bdc3c7" stroke-width="0.5"/>
      <text x="70" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CS004</text>
      <text x="160" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">David</text>
      <text x="250" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">CS103</text>
      <text x="340" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">22</text>
    </g>
  </g>
  
  <!-- Legend/Notes -->
  <g data-narration="The diagram shows: Key types with hierarchy, integrity constraint types, and an example relation table">
    <text x="210" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">1NF: Atomic values • Schema defines structure • Instance is current data</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
  </defs>
</svg>