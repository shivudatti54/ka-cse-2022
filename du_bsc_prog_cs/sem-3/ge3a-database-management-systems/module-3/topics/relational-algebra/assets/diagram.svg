<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="relational-algebra">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="basicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="derivedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dda0dd"/>
      <stop offset="100%" style="stop-color:#da70d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box-basic { animation: slideInLeft 0.6s ease-out forwards; }
    .box-derived { animation: slideInRight 0.6s ease-out forwards; }
    .operator { animation: fadeIn 0.5s ease-out forwards; }
    .arrow { animation: fadeIn 0.8s ease-out forwards; }
    .subtitle { animation: slideInDown 0.5s ease-out forwards; }
    .operator:hover { animation: pulse 0.3s ease-in-out; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Relational Algebra</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="subtitle">Operators Classification</text>
  
  <!-- Main Classification Boxes -->
  <g data-narration="Basic operators are the fundamental set operations that form the foundation of relational algebra">
    <rect x="20" y="80" width="170" height="280" fill="url(#basicGrad)" rx="8" filter="url(#shadow)" class="box-basic"/>
    <text x="105" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e5c3d">Basic Operators</text>
  </g>
  
  <g data-narration="Derived operators are combinations of basic operators, providing shorthand for common operations">
    <rect x="230" y="80" width="170" height="280" fill="url(#derivedGrad)" rx="8" filter="url(#shadow)" class="box-derived"/>
    <text x="315" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#6b2c6b">Derived Operators</text>
  </g>
  
  <!-- Basic Operators List -->
  <g data-narration="Selection filters rows based on conditions, Projection selects specific columns" class="operator">
    <text x="105" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a3a2a">Unary</text>
    <rect x="35" y="150" width="140" height="50" fill="#ffffff" rx="5" opacity="0.9"/>
    <text x="105" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">σ Selection</text>
    <text x="105" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">Filter rows</text>
  </g>
  
  <g class="operator">
    <rect x="35" y="205" width="140" height="50" fill="#ffffff" rx="5" opacity="0.9"/>
    <text x="105" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">π Projection</text>
    <text x="105" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">Select columns</text>
  </g>
  
  <g class="operator">
    <rect x="35" y="260" width="140" height="50" fill="#ffffff" rx="5" opacity="0.9"/>
    <text x="105" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">ρ Rename</text>
    <text x="105" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e">Alias relation</text>
  </g>
  
  <g data-narration="Set operations include Union, Difference, and Cartesian Product" class="operator">
    <text x="105" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a3a2a">Set Operations</text>
    <rect x="35" y="335" width="140" height="20" fill="#ffffff" rx="3" opacity="0.7"/>
    <text x="105" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">∪ − ×</text>
  </g>
  
  <!-- Derived Operators List -->
  <g data-narration="Intersection finds common tuples between relations" class="operator">
    <rect x="245" y="130" width="140" height="40" fill="#ffffff" rx="5" opacity="0.9"/>
    <text x="315" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">∩ Intersection</text>
  </g>
  
  <g data-narration="Natural Join combines relations on matching attributes" class="operator">
    <rect x="245" y="180" width="140" height="40" fill="#ffffff" rx="5" opacity="0.9"/>
    <text x="315" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">⋈ Natural Join</text>
  </g>
  
  <g data-narration="Theta Join combines with condition using θ" class="operator">
    <rect x="245" y="230" width="140" height="40" fill="#ffffff" rx="5" opacity="0.9"/>
    <text x="315" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">⋈θ Theta Join</text>
  </g>
  
  <g data-narration="Division finds tuples that relate to all tuples in another relation" class="operator">
    <rect x="245" y="280" width="140" height="40" fill="#ffffff" rx="5" opacity="0.9"/>
    <text x="315" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">÷ Division</text>
  </g>
  
  <!-- Connection Arrow -->
  <g class="arrow" data-narration="Derived operators are defined in terms of basic operators">
    <path d="M190 220 L230 220" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
      </marker>
    </defs>
  </g>
  
  <!-- Note at bottom -->
  <rect x="20" y="370" width="380" height="25" fill="#f5f5f5" rx="4"/>
  <text x="210" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Developed by E.F. Codd (1970) • Foundation of SQL</text>
</svg>