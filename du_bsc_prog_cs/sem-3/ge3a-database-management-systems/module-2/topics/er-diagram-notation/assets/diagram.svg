<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="er-diagram-notation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e3f0f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e5ed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-15px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; fill: #ffffff; font-weight: bold; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
    .narration { font-family: Arial, sans-serif; font-size: 9px; fill: #5d6d7e; font-style: italic; }
    .entity-box { fill: #ffffff; stroke: #1abc9c; stroke-width: 2.5; rx: 4; }
    .weak-box { fill: #ffffff; stroke: #1abc9c; stroke-width: 2.5; rx: 4; stroke-dasharray: none; }
    .weak-box-inner { fill: none; stroke: #1abc9c; stroke-width: 1.5; rx: 3; }
    .attr-ellipse { fill: #fef9e7; stroke: #f39c12; stroke-width: 2; }
    .attr-key { fill: #fef9e7; stroke: #f39c12; stroke-width: 2; }
    .rel-diamond { fill: #e8daef; stroke: #8e44ad; stroke-width: 2; }
    .line-arrow { stroke: #34495e; stroke-width: 1.5; fill: none; }
    .header-rect { fill: url(#headerGradient); rx: 6; }
    .content-box { fill: #ffffff; stroke: #bdc3c7; stroke-width: 1; rx: 4; }
    .legend-dot { r: 4; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Header Box -->
  <g style="animation: fadeIn 0.8s ease-out;">
    <rect x="10" y="10" width="400" height="36" class="header-rect" filter="url(#shadow)"/>
    <text x="210" y="33" text-anchor="middle" class="title">ER Diagram Notation</text>
  </g>
  
  <!-- Section 1: Entity -->
  <g data-narration="Entities are real-world objects represented as rectangles with single border" style="animation: slideInUp 0.6s ease-out 0.2s both;">
    <rect x="20" y="60" width="70" height="35" class="entity-box" filter="url(#shadow)"/>
    <text x="55" y="83" text-anchor="middle" class="section-title">ENTITY</text>
    <rect x="20" y="100" width="70" height="22" class="content-box"/>
    <text x="55" y="112" text-anchor="middle" class="detail">Rectangle</text>
    <text x="55" y="125" text-anchor="middle" class="narration">Real-world object</text>
  </g>
  
  <!-- Section 2: Weak Entity -->
  <g data-narration="Weak entities depend on another entity, shown with double rectangle border" style="animation: slideInUp 0.6s ease-out 0.35s both;">
    <rect x="100" y="60" width="70" height="35" class="weak-box" filter="url(#shadow)"/>
    <rect x="104" y="64" width="62" height="27" class="weak-box-inner"/>
    <text x="135" y="83" text-anchor="middle" class="section-title">Weak</text>
    <rect x="100" y="100" width="70" height="22" class="content-box"/>
    <text x="135" y="112" text-anchor="middle" class="detail">Double Border</text>
    <text x="135" y="125" text-anchor="middle" class="narration">No primary key</text>
  </g>
  
  <!-- Section 3: Attribute -->
  <g data-narration="Attributes describe entity properties, shown as ellipses/ovals" style="animation: slideInUp 0.6s ease-out 0.5s both;">
    <ellipse cx="210" cy="77" rx="32" ry="18" class="attr-ellipse" filter="url(#shadow)"/>
    <text x="210" y="82" text-anchor="middle" class="label" style="font-weight:bold;">attribute</text>
    <rect x="180" y="100" width="60" height="22" class="content-box"/>
    <text x="210" y="112" text-anchor="middle" class="detail">Ellipse</text>
    <text x="210" y="125" text-anchor="middle" class="narration">Entity property</text>
  </g>
  
  <!-- Section 4: Key Attribute -->
  <g data-narration="Key attributes uniquely identify entities, shown with underlined text" style="animation: slideInUp 0.6s ease-out 0.65s both;">
    <ellipse cx="290" cy="77" rx="32" ry="18" class="attr-key" filter="url(#shadow)"/>
    <text x="290" y="82" text-anchor="middle" class="label" style="font-weight:bold; text-decoration:underline;">key</text>
    <rect x="260" y="100" width="60" height="22" class="content-box"/>
    <text x="290" y="112" text-anchor="middle" class="detail">Underlined</text>
    <text x="290" y="125" text-anchor="middle" class="narration">Primary identifier</text>
  </g>
  
  <!-- Section 5: Relationship -->
  <g data-narration="Relationships show how entities connect, represented as diamonds" style="animation: slideInUp 0.6s ease-out 0.8s both;">
    <polygon points="345,62 370,77 345,92 320,77" class="rel-diamond" filter="url(#shadow)"/>
    <text x="345" y="81" text-anchor="middle" class="label" style="font-size:10px; font-weight:bold;">R</text>
    <rect x="320" y="100" width="50" height="22" class="content-box"/>
    <text x="345" y="112" text-anchor="middle" class="detail">Diamond</text>
    <text x="345" y="125" text-anchor="middle" class="narration">Entity link</text>
  </g>
  
  <!-- Arrow connecting sections -->
  <g style="animation: drawLine 0.5s ease-out 1s both;">
    <path d="M 95 115 L 98 115" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  <g style="animation: drawLine 0.5s ease-out 1.1s both;">
    <path d="M 175 115 L 178 115" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  <g style="animation: drawLine 0.5s ease-out 1.2s both;">
    <path d="M 245 115 L 248 115" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  <g style="animation: drawLine 0.5s ease-out 1.3s both;">
    <path d="M 325 115 L 328 115" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Bottom Section: Cardinality Notation -->
  <g data-narration="Cardinality notations show relationship types: 1:1, 1:N, M:N" style="animation: slideInLeft 0.7s ease-out 1s both;">
    <rect x="15" y="155" width="390" height="100" class="content-box" filter="url(#shadow)"/>
    <text x="210" y="172" text-anchor="middle" class="section-title" style="font-size:12px;">CARDINALITY NOTATION</text>
    
    <!-- 1:1 Relationship -->
    <g transform="translate(45, 190)">
      <line x1="0" y1="0" x2="35" y2="0" class="line-arrow"/>
      <polygon points="32,-4 37,0 32,4" fill="#34495e"/>
      <text x="17" y="-8" text-anchor="middle" class="detail" style="font-weight:bold;">1</text>
      <text x="17" y="18" text-anchor="middle" class="detail" style="font-weight:bold;">1</text>
      <text x="17" y="32" text-anchor="middle" class="label">One-to-One</text>
    </g>
    
    <!-- 1:N Relationship -->
    <g transform="translate(150, 190)">
      <line x1="0" y1="0" x2="35" y2="0" class="line-arrow"/>
      <polygon points="32,-4 37,0 32,4" fill="#34495e"/>
      <text x="17" y="-8" text-anchor="middle" class="detail" style="font-weight:bold;">1</text>
      <text x="17" y="18" text-anchor="middle" class="detail" style="font-weight:bold;">N</text>
      <text x="17" y="32" text-anchor="middle" class="label">One-to-Many</text>
    </g>
    
    <!-- M:N Relationship -->
    <g transform="translate(270, 190)">
      <line x1="0" y1="0" x2="35" y2="0" class="line-arrow"/>
      <polygon points="32,-4 37,0 32,4" fill="#34495e"/>
      <text x="17" y="-8" text-anchor="middle" class="detail" style="font-weight:bold;">M</text>
      <text x="17" y="18" text-anchor="middle" class="detail" style="font-weight:bold;">N</text>
      <text x="17" y="32" text-anchor="middle" class="label">Many-to-Many</text>
    </g>
  </g>
  
  <!-- Key Concept Box -->
  <g data-narration="Key concepts: Entity Sets are collections of similar entities, represented by the entity name in the rectangle" style="animation: slideInLeft 0.7s ease-out 1.2s both;">
    <rect x="15" y="265" width="390" height="60" class="content-box" style="fill:#f8f9fa; stroke:#2ecc71; stroke-width:1.5;"/>
    <text x="30" y="282" class="section-title" style="fill:#27ae60;">KEY CONCEPT</text>
    <text x="30" y="300" class="detail">Entity Set: Collection of entities of the same type (e.g., all STUDENTS)</text>
    <text x="30" y="315" class="detail">Entity: Single real-world object (e.g., one specific STUDENT)</text>
  </g>
  
  <!-- Footer / Legend -->
  <g data-narration="Peter Chen introduced ER diagrams in 1976 as a visual database design tool" style="animation: fadeIn 0.8s ease-out 1.4s both;">
    <rect x="15" y="335" width="390" height="50" class="header-rect" style="opacity:0.85;"/>
    <text x="210" y="355" text-anchor="middle" class="label" style="fill:#ffffff; font-size:11px;">ER Model: Developed by Peter Chen (1976) | Database Design Standard</text>
    <text x="210" y="372" text-anchor="middle" class="detail" style="fill:#ecf0f1; font-size:10px;">Used to visualize logical database structure before implementation</text>
  </g>
  
  <!-- Animated highlight circles -->
  <circle cx="55" cy="77" r="8" fill="none" stroke="#1abc9c" stroke-width="1.5" opacity="0" style="animation: pulse 2s ease-in-out infinite 1.5s;"/>
  <circle cx="135" cy="77" r="8" fill="none" stroke="#1abc9c" stroke-width="1.5" opacity="0" style="animation: pulse 2s ease-in-out infinite 1.8s;"/>
  <circle cx="345" cy="77" r="8" fill="none" stroke="#8e44ad" stroke-width="1.5" opacity="0" style="animation: pulse 2s ease-in-out infinite 2.1s;"/>
</svg>