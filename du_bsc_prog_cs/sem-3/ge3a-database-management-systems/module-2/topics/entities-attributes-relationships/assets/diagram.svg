<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="entities-attributes-relationships" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="entityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#87ceeb"/>
    </linearGradient>
    <linearGradient id="attrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5"/>
      <stop offset="100%" style="stop-color:#f0c0c0"/>
    </linearGradient>
    <linearGradient id="relGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0b8"/>
      <stop offset="100%" style="stop-color:#90d090"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box-entity { animation: slideIn 0.6s ease-out forwards; }
    .box-attr { animation: slideIn 0.7s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .box-rel { animation: slideIn 0.8s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .title-anim { animation: fadeIn 0.8s ease-out; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .connector { stroke: #7f8c8d; stroke-width: 2; stroke-dasharray: 5,3; animation: drawLine 1s ease-out forwards; }
    .symbol-rect { fill: url(#entityGrad); stroke: #2980b9; stroke-width: 2; }
    .symbol-oval { fill: url(#attrGrad); stroke: #c0392b; stroke-width: 2; }
    .symbol-rel { fill: url(#relGrad); stroke: #27ae60; stroke-width: 2; }
    .dashed-oval { fill: url(#attrGrad); stroke: #c0392b; stroke-width: 2; stroke-dasharray: 4,3; }
    .double-rect { fill: url(#entityGrad); stroke: #2980b9; stroke-width: 3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title-anim">Entity-Relationship Model</text>
  
  <!-- ENTITY Section -->
  <g data-narration="Entities are real-world objects that can be uniquely identified, like a student or course">
    <rect x="20" y="50" width="110" height="90" rx="8" class="box-entity symbol-rect" filter="url(#shadow)"/>
    <text x="75" y="75" text-anchor="middle" class="label-text">ENTITY</text>
    <text x="75" y="95" text-anchor="middle" class="detail-text">Real-world</text>
    <text x="75" y="108" text-anchor="middle" class="detail-text">object</text>
    <text x="75" y="125" text-anchor="middle" class="detail-text" style="font-size:10px">e.g., Student</text>
  </g>
  
  <!-- Weak Entity -->
  <g data-narration="Weak entities depend on strong entities and have no key attribute of their own">
    <rect x="20" y="155" width="110" height="75" rx="8" class="box-entity double-rect" filter="url(#shadow)"/>
    <text x="75" y="180" text-anchor="middle" class="label-text">Weak Entity</text>
    <text x="75" y="200" text-anchor="middle" class="detail-text">Depends on</text>
    <text x="75" y="215" text-anchor="middle" class="detail-text">strong entity</text>
  </g>
  
  <!-- ATTRIBUTE Section -->
  <g data-narration="Attributes describe properties of entities, including key, multivalued, and derived types">
    <rect x="155" y="50" width="110" height="90" rx="8" class="box-attr symbol-oval" filter="url(#shadow)"/>
    <text x="210" y="75" text-anchor="middle" class="label-text">ATTRIBUTE</text>
    <text x="210" y="95" text-anchor="middle" class="detail-text">Property of</text>
    <text x="210" y="108" text-anchor="middle" class="detail-text">an entity</text>
    <text x="210" y="125" text-anchor="middle" class="detail-text" style="font-size:10px">e.g., Name, Age</text>
  </g>
  
  <!-- Key Attribute -->
  <g data-narration="Key attributes uniquely identify an entity, shown with underlined oval">
    <ellipse cx="210" cy="175" rx="35" ry="22" class="symbol-oval"/>
    <line x1="178" y1="185" x2="242" y2="185" stroke="#c0392b" stroke-width="2"/>
    <text x="210" y="180" text-anchor="middle" class="label-text" style="font-size:12px">Key Attr</text>
    <text x="210" y="195" text-anchor="middle" class="detail-text" style="font-size:9px">Student_ID</text>
  </g>
  
  <!-- Derived Attribute -->
  <g data-narration="Derived attributes are computed from other attributes, shown with dashed border">
    <ellipse cx="210" cy="245" rx="35" ry="20" class="dashed-oval"/>
    <text x="210" y="250" text-anchor="middle" class="label-text" style="font-size:12px">Derived</text>
    <text x="210" y="262" text-anchor="middle" class="detail-text" style="font-size:9px">Age (from DOB)</text>
  </g>
  
  <!-- RELATIONSHIP Section -->
  <g data-narration="Relationships describe how entities are related to each other">
    <rect x="290" y="50" width="110" height="90" rx="8" class="box-rel symbol-rel" filter="url(#shadow)"/>
    <text x="345" y="80" text-anchor="middle" class="label-text">RELATIONSHIP</text>
    <text x="345" y="100" text-anchor="middle" class="detail-text">Association</text>
    <text x="345" y="113" text-anchor="middle" class="detail-text">between</text>
    <text x="345" y="126" text-anchor="middle" class="detail-text">entities</text>
  </g>
  
  <!-- Relationship Types -->
  <g data-narration="Relationships can be one-to-one, one-to-many, or many-to-many">
    <rect x="290" y="155" width="110" height="60" rx="8" class="box-rel" filter="url(#shadow)"/>
    <text x="345" y="178" text-anchor="middle" class="label-text" style="font-size:12px">Cardinality</text>
    <text x="345" y="195" text-anchor="middle" class="detail-text">1:1, 1:N, M:N</text>
  </g>
  
  <!-- Connecting Lines -->
  <g class="connector">
    <line x1="130" y1="95" x2="155" y2="95"/>
    <line x1="265" y1="95" x2="290" y2="95"/>
    <line x1="75" y1="140" x2="75" y2="155"/>
    <line x1="210" y1="140" x2="210" y2="155"/>
    <line x1="345" y1="140" x2="345" y2="155"/>
    <path d="M 130 200 Q 180 200 175 175" fill="none" class="connector"/>
    <path d="M 245 200 Q 280 200 290 175" fill="none" class="connector"/>
  </g>
  
  <!-- Key Symbols Legend -->
  <g data-narration="Standard E-R diagram symbols legend showing rectangles, ovals, and their variations">
    <text x="210" y="305" text-anchor="middle" class="label-text" style="font-size:12px">Standard Symbols</text>
    
    <!-- Legend items -->
    <rect x="30" y="318" width="25" height="16" class="symbol-rect" rx="2"/>
    <text x="60" y="330" class="detail-text">Entity</text>
    
    <rect x="100" y="318" width="25" height="16" class="symbol-rect" rx="2" stroke-width="3"/>
    <text x="130" y="330" class="detail-text">Weak</text>
    
    <ellipse cx="195" cy="326" rx="12" ry="8" class="symbol-oval"/>
    <text x="215" y="330" class="detail-text">Attribute</text>
    
    <ellipse cx="270" cy="326" rx="12" ry="8" class="dashed-oval"/>
    <text x="290" y="330" class="detail-text">Derived</text>
    
    <ellipse cx="355" cy="326" rx="12" ry="8" fill="#e8daef" stroke="#8e44ad" stroke-width="2"/>
    <text x="375" y="330" class="detail-text" style="font-size:9px">Multi</text>
  </g>
  
  <!-- Bottom note -->
  <g data-narration="Peter Chen proposed the E-R model in 1976 as a foundation for database design">
    <rect x="80" y="350" width="260" height="35" rx="5" fill="#fff9e6" stroke="#f39c12" stroke-width="1"/>
    <text x="210" y="367" text-anchor="middle" class="detail-text" style="fill:#d35400">Peter Chen (1976) - Conceptual database design</text>
    <text x="210" y="380" text-anchor="middle" class="detail-text" style="fill:#7f8c8d">Used to convert to relational schema</text>
  </g>
</svg>