<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="transactions-acid-properties">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f0f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fc79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#96e6a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a1c4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2e9fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbc2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6c1ee;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .box { filter: url(#shadow); }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title slide-up">Transactions &amp; ACID Properties</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#888" stroke-width="1" class="line-anim" style="animation-delay: 0.3s"/>
  
  <!-- ACID Boxes -->
  <g data-narration="Atomicity: Ensures all operations in a transaction complete successfully or none at all">
    <rect x="20" y="55" width="85" height="70" rx="8" fill="url(#boxGradient1)" class="box fade-in" style="animation-delay: 0.5s"/>
    <text x="62" y="75" text-anchor="middle" class="label">Atomicity</text>
    <text x="62" y="92" text-anchor="middle" class="detail">"All or Nothing"</text>
    <text x="62" y="108" text-anchor="middle" class="detail">Complete success or</text>
    <text x="62" y="120" text-anchor="middle" class="detail">full rollback</text>
  </g>
  
  <g data-narration="Consistency: Ensures the database transforms from one valid state to another">
    <rect x="115" y="55" width="85" height="70" rx="8" fill="url(#boxGradient2)" class="box fade-in" style="animation-delay: 0.7s"/>
    <text x="157" y="75" text-anchor="middle" class="label">Consistency</text>
    <text x="157" y="92" text-anchor="middle" class="detail">"Valid State"</text>
    <text x="157" y="108" text-anchor="middle" class="detail">DB stays valid</text>
    <text x="157" y="120" text-anchor="middle" class="detail">after transaction</text>
  </g>
  
  <g data-narration="Isolation: Ensures concurrent transactions don't interfere with each other">
    <rect x="210" y="55" width="85" height="70" rx="8" fill="url(#boxGradient3)" class="box fade-in" style="animation-delay: 0.9s"/>
    <text x="252" y="75" text-anchor="middle" class="label">Isolation</text>
    <text x="252" y="92" text-anchor="middle" class="detail">"Concurrent Safe"</text>
    <text x="252" y="108" text-anchor="middle" class="detail">Transactions run</text>
    <text x="252" y="120" text-anchor="middle" class="detail">independently</text>
  </g>
  
  <g data-narration="Durability: Ensures committed changes are permanently saved">
    <rect x="305" y="55" width="85" height="70" rx="8" fill="url(#boxGradient4)" class="box fade-in" style="animation-delay: 1.1s"/>
    <text x="347" y="75" text-anchor="middle" class="label">Durability</text>
    <text x="347" y="92" text-anchor="middle" class="detail">"Permanent"</text>
    <text x="347" y="108" text-anchor="middle" class="detail">Committed data</text>
    <text x="347" y="120" text-anchor="middle" class="detail">survives crashes</text>
  </g>
  
  <!-- Transaction States Diagram -->
  <g data-narration="Transaction Lifecycle: Shows states from Active to Committed or Aborted">
    <text x="210" y="150" text-anchor="middle" class="label" style="font-size: 13px;">Transaction States</text>
    
    <!-- State circles -->
    <g class="pulse" style="animation-delay: 1.3s">
      <circle cx="80" cy="185" r="22" fill="#a8d8ea" stroke="#5c9ead" stroke-width="2"/>
      <text x="80" y="180" text-anchor="middle" class="label" style="font-size:10px">Active</text>
      <text x="80" y="193" text-anchor="middle" class="detail" style="font-size:9px">Begin</text>
    </g>
    
    <g class="pulse" style="animation-delay: 1.5s">
      <circle cx="200" cy="185" r="22" fill="#ffd3a5" stroke="#d4956a" stroke-width="2"/>
      <text x="200" y="180" text-anchor="middle" class="label" style="font-size:10px">Partially</text>
      <text x="200" y="193" text-anchor="middle" class="detail" style="font-size:9px">Committed</text>
    </g>
    
    <g class="pulse" style="animation-delay: 1.7s">
      <circle cx="320" cy="185" r="22" fill="#b5ead7" stroke="#6ab892" stroke-width="2"/>
      <text x="320" y="180" text-anchor="middle" class="label" style="font-size:10px">Committed</text>
      <text x="320" y="193" text-anchor="middle" class="detail" style="font-size:9px">Success</text>
    </g>
    
    <g class="pulse" style="animation-delay: 1.9s">
      <circle cx="200" cy="275" r="22" fill="#ffc8dd" stroke="#c489a8" stroke-width="2"/>
      <text x="200" y="270" text-anchor="middle" class="label" style="font-size:10px">Aborted</text>
      <text x="200" y="283" text-anchor="middle" class="detail" style="font-size:9px">Rollback</text>
    </g>
    
    <!-- Arrows between states -->
    <path d="M102 185 L175 185" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" class="line-anim" style="animation-delay: 1.4s"/>
    <path d="M225 195 L280 210 Q300 215 308 200" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" class="line-anim" style="animation-delay: 1.6s"/>
    <path d="M200 213 L200 250" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" class="line-anim" style="animation-delay: 1.8s"/>
    <path d="M120 200 Q140 240 180 265" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" class="line-anim" style="animation-delay: 2s"/>
    <path d="M230 275 L290 275 Q310 275 310 260" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" class="line-anim" style="animation-delay: 2.2s"/>
  </g>
  
  <!-- Example Box -->
  <g data-narration="Banking example showing money transfer as a transaction">
    <rect x="20" y="310" width="180" height="80" rx="8" fill="#fff" stroke="#ccc" stroke-width="1" class="box fade-in" style="animation-delay: 2.2s"/>
    <text x="110" y="330" text-anchor="middle" class="label" style="font-size: 12px;">Banking Example</text>
    <text x="30" y="350" class="detail">Transfer ₹10,000:</text>
    <text x="30" y="365" class="detail">• Debit Savings</text>
    <text x="30" y="378" class="detail">• Credit Checking</text>
    <text x="30" y="390" class="detail" style="fill:#2a7">Both succeed or both fail</text>
  </g>
  
  <!-- ACID Summary -->
  <g data-narration="Summary: ACID properties guarantee reliable database transactions">
    <rect x="210" y="310" width="190" height="80" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1" class="box fade-in" style="animation-delay: 2.4s"/>
    <text x="305" y="330" text-anchor="middle" class="label" style="font-size: 12px;">Why ACID Matters</text>
    <text x="220" y="348" class="detail">• Prevents data loss</text>
    <text x="220" y="362" class="detail">• Ensures data integrity</text>
    <text x="220" y="376" class="detail">• Supports concurrent users</text>
    <text x="220" y="390" class="detail">• Survives system failures</text>
  </g>
</svg>