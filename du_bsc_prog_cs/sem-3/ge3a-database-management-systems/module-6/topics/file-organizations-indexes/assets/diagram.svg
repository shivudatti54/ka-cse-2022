<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="file-organizations-indexes">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4178b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#548235;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .key-box { font-family: Arial, sans-serif; font-size: 11px; fill: #fff; }
    .node-rect { rx: 5; ry: 5; }
    .fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">B+ Tree Index Structure</text>
  <text x="210" y="50" text-anchor="middle" class="detail slide-in delay-1">File Organizations &amp; Indexes</text>
  
  <!-- Root Node -->
  <g class="slide-in delay-2" filter="url(#shadow)" data-narration="Root Node: The top-level node that routes searches to appropriate branches">
    <rect x="165" y="70" width="90" height="30" fill="url(#nodeGradient)" class="node-rect"/>
    <text x="210" y="90" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">25 | 50</text>
    <text x="210" y="115" text-anchor="middle" class="detail">Root</text>
  </g>
  
  <!-- Arrows from Root -->
  <line x1="175" y1="100" x2="130" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-3"/>
  <line x1="210" y1="100" x2="210" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-3"/>
  <line x1="245" y1="100" x2="290" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-3"/>
  
  <!-- Intermediate Nodes -->
  <g class="slide-in delay-3" filter="url(#shadow)" data-narration="Intermediate Nodes: Contain only keys for routing, guide search to leaf nodes">
    <rect x="70" y="145" width="120" height="30" fill="url(#nodeGradient)" class="node-rect"/>
    <text x="130" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">10 | 20</text>
    
    <rect x="220" y="145" width="160" height="30" fill="url(#nodeGradient)" class="node-rect"/>
    <text x="300" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">30 | 40 | 45</text>
    
    <text x="130" y="190" text-anchor="middle" class="detail">Internal</text>
    <text x="300" y="190" text-anchor="middle" class="detail">Internal</text>
  </g>
  
  <!-- Arrows from Intermediate to Leaf -->
  <line x1="100" y1="175" x2="80" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-4"/>
  <line x1="130" y1="175" x2="130" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-4"/>
  <line x1="160" y1="175" x2="180" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-4"/>
  
  <line x1="250" y1="175" x2="230" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-4"/>
  <line x1="300" y1="175" x2="300" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-4"/>
  <line x1="350" y1="175" x2="370" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="fade-in delay-4"/>
  
  <!-- Leaf Nodes -->
  <g class="slide-in delay-4" filter="url(#shadow)" data-narration="Leaf Nodes: Store actual key-value pairs with data pointers, linked for efficient range queries">
    <rect x="30" y="225" width="100" height="45" fill="url(#leafGradient)" class="node-rect"/>
    <text x="80" y="245" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">5→ptr</text>
    <text x="80" y="260" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">10→ptr</text>
    
    <rect x="140" y="225" width="100" height="45" fill="url(#leafGradient)" class="node-rect"/>
    <text x="190" y="245" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">15→ptr</text>
    <text x="190" y="260" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">20→ptr</text>
    
    <rect x="250" y="225" width="100" height="45" fill="url(#leafGradient)" class="node-rect"/>
    <text x="300" y="245" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">25→ptr</text>
    <text x="300" y="260" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">30→ptr</text>
    
    <rect x="360" y="225" width="50" height="45" fill="url(#leafGradient)" class="node-rect"/>
    <text x="385" y="245" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">40→ptr</text>
    
    <text x="80" y="285" text-anchor="middle" class="detail">Leaf</text>
    <text x="190" y="285" text-anchor="middle" class="detail">Leaf</text>
    <text x="300" y="285" text-anchor="middle" class="detail">Leaf</text>
    <text x="385" y="285" text-anchor="middle" class="detail">Leaf</text>
  </g>
  
  <!-- Linked List Arrows -->
  <path d="M 130 247 Q 135 295 140 297" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="fade-in delay-5"/>
  <path d="M 240 247 Q 245 295 250 297" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="fade-in delay-5"/>
  
  <!-- Key Concept Boxes -->
  <g class="slide-in delay-5" data-narration="Key Concepts: Sequential access vs Random access trade-offs">
    <rect x="10" y="305" width="195" height="40" fill="#6c5ce7" rx="5" ry="5" opacity="0.9"/>
    <text x="20" y="322" fill="white" font-family="Arial" font-size="12" font-weight="bold">Sequential Access</text>
    <text x="20" y="338" fill="#eee" font-family="Arial" font-size="10">Sorted order; good for range queries</text>
  </g>
  
  <g class="slide-in delay-5" data-narration="Indexing: B+ Trees provide O(log n) search complexity">
    <rect x="215" y="305" width="195" height="40" fill="#e17055" rx="5" ry="5" opacity="0.9"/>
    <text x="225" y="322" fill="white" font-family="Arial" font-size="12" font-weight="bold">Index Access</text>
    <text x="225" y="338" fill="#eee" font-family="Arial" font-size="10">O(log n) search; efficient lookups</text>
  </g>
  
  <g class="slide-in delay-5" data-narration="Linked List: Enables efficient range scans across leaf nodes">
    <rect x="10" y="350" width="400" height="35" fill="#00b894" rx="5" ry="5" opacity="0.9"/>
    <text x="20" y="368" fill="white" font-family="Arial" font-size="11" font-weight="bold">Leaf Node Linked List: </text>
    <text x="175" y="368" fill="#e8f8f5" font-family="Arial" font-size="11">Allows sequential traversal without returning to root</text>
  </g>
  
  <!-- Legend indicator -->
  <g class="pulse" style="transform-origin: 390px 45px;">
    <circle cx="390" cy="45" r="8" fill="#70ad47" opacity="0.7"/>
  </g>
  <text x="390" y="62" text-anchor="middle" class="detail" font-size="9">Balanced</text>
</svg>