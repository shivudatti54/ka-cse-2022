<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="three-schema-data-independence" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e8f4f8"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5e5"/>
      <stop offset="100%" style="stop-color:#7bc0d6"/>
    </linearGradient>
    <linearGradient id="conceptualGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0b8"/>
      <stop offset="100%" style="stop-color:#8fd48f"/>
    </linearGradient>
    <linearGradient id="internalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d5a8"/>
      <stop offset="100%" style="stop-color:#e8b878"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInTop {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInBottom {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-box { rx: 8; ry: 8; stroke-width: 2; }
    .external-box { fill: url(#externalGrad); stroke: #5ba3bf; }
    .conceptual-box { fill: url(#conceptualGrad); stroke: #5cb85c; }
    .internal-box { fill: url(#internalGrad); stroke: #d49e5d; }
    .connector { stroke: #888; stroke-width: 2; fill: none; stroke-dasharray: 5,3; }
    .mapping-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #666; font-style: italic; }
    .independence-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #c0392b; font-weight: bold; }
    
    .anim-title { animation: fadeIn 0.8s ease-out forwards; }
    .anim-external { animation: slideInTop 0.6s ease-out 0.2s forwards; opacity: 0; }
    .anim-conceptual { animation: slideInTop 0.6s ease-out 0.4s forwards; opacity: 0; }
    .anim-internal { animation: slideInTop 0.6s ease-out 0.6s forwards; opacity: 0; }
    .anim-arrows { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    
    .section { cursor: pointer; }
    .section:hover { filter: brightness(1.05); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-title">Three-Schema Architecture</text>
  <text x="210" y="50" text-anchor="middle" class="detail anim-title" style="animation-delay: 0.3s;">ANSI/SPARC Model &amp; Data Independence</text>
  
  <!-- External Schema (Top Level) -->
  <g class="section anim-external" data-narration="External Schema: User View level - represents how individual users view the data">
    <rect class="section-box external-box" x="60" y="70" width="300" height="70" filter="url(#shadow)"/>
    <text x="210" y="92" text-anchor="middle" class="label">External Schema</text>
    <text x="210" y="108" text-anchor="middle" class="detail">(User View / Application Level)</text>
    <text x="210" y="125" text-anchor="middle" class="detail" style="font-size:10px;">User-specific data representation</text>
  </g>
  
  <!-- Arrow down from External -->
  <g class="anim-arrows">
    <line x1="210" y1="140" x2="210" y2="160" class="connector" marker-end="url(#arrowhead)"/>
    <text x="280" y="155" class="mapping-text">External-Conceptual Mapping</text>
  </g>
  
  <!-- Conceptual Schema (Middle Level) -->
  <g class="section anim-conceptual" data-narration="Conceptual Schema: Logical Level - represents the entire database structure for all users">
    <rect class="section-box conceptual-box" x="50" y="165" width="320" height="85" filter="url(#shadow)"/>
    <text x="210" y="190" text-anchor="middle" class="label">Conceptual Schema</text>
    <text x="210" y="208" text-anchor="middle" class="detail">(Logical Level / Community View)</text>
    <text x="210" y="225" text-anchor="middle" class="detail" style="font-size:10px;">Integrated view of all external schemas</text>
    <text x="210" y="240" text-anchor="middle" class="detail" style="font-size:10px;">Logical data model (entities, relationships)</text>
  </g>
  
  <!-- Arrow down from Conceptual -->
  <g class="anim-arrows">
    <line x1="210" y1="250" x2="210" y2="270" class="connector" marker-end="url(#arrowhead)"/>
    <text x="280" y="265" class="mapping-text">Conceptual-Internal Mapping</text>
  </g>
  
  <!-- Internal Schema (Bottom Level) -->
  <g class="section anim-internal" data-narration="Internal Schema: Physical Level - describes how data is actually stored on disk">
    <rect class="section-box internal-box" x="40" y="275" width="340" height="85" filter="url(#shadow)"/>
    <text x="210" y="300" text-anchor="middle" class="label">Internal Schema</text>
    <text x="210" y="318" text-anchor="middle" class="detail">(Physical Level / Storage View)</text>
    <text x="210" y="335" text-anchor="middle" class="detail" style="font-size:10px;">Physical storage: files, indexes, access paths</text>
    <text x="210" y="350" text-anchor="middle" class="detail" style="font-size:10px;">Storage structure details</text>
  </g>
  
  <!-- Data Independence Labels -->
  <g class="anim-pulse">
    <rect x="15" y="165" width="28" height="85" rx="4" fill="#e74c3c" opacity="0.15"/>
    <text x="29" y="180" text-anchor="middle" class="independence-label" transform="rotate(-90, 29, 208)">Logical</text>
    <text x="29" y="198" text-anchor="middle" class="independence-label" transform="rotate(-90, 29, 226)">Data</text>
    <text x="29" y="216" text-anchor="middle" class="independence-label" transform="rotate(-90, 29, 244)">Independence</text>
  </g>
  
  <g class="anim-pulse" style="animation-delay: 0.5s;">
    <rect x="377" y="275" width="28" height="85" rx="4" fill="#3498db" opacity="0.15"/>
    <text x="391" y="290" text-anchor="middle" class="independence-label" transform="rotate(90, 391, 318)" style="fill:#2980b9;">Physical</text>
    <text x="391" y="308" text-anchor="middle" class="independence-label" transform="rotate(90, 391, 336)" style="fill:#2980b9;">Data</text>
    <text x="391" y="326" text-anchor="middle" class="independence-label" transform="rotate(90, 391, 354)" style="fill:#2980b9;">Independence</text>
  </g>
  
  <!-- ANSI/SPARC Label -->
  <text x="210" y="380" text-anchor="middle" class="detail" style="font-style: italic;">ANSI/SPARC 1975</text>
</svg>