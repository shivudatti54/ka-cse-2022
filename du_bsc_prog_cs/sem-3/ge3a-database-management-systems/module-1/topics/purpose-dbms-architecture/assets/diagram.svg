<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="purpose-dbms-architecture">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0e8f8"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b3"/>
    </linearGradient>
    <linearGradient id="conceptualGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0"/>
      <stop offset="100%" style="stop-color:#b895c7"/>
    </linearGradient>
    <linearGradient id="internalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c8b8"/>
      <stop offset="100%" style="stop-color:#c7a895"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .level-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .box-label { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
    .detail-text { font-family: Arial, sans-serif; font-size: 10px; fill: #5d6d7e; }
    .section { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .section:nth-child(1) { animation-delay: 0.2s; }
    .section:nth-child(2) { animation-delay: 0.4s; }
    .section:nth-child(3) { animation-delay: 0.6s; }
    .box { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text" data-narration="Title showing the topic: Three-Level DBMS Architecture (ANSI-SPARC)">Three-Level DBMS Architecture</text>
  <text x="210" y="48" text-anchor="middle" class="detail-text" data-narration="ANSI-SPARC framework for database abstraction">ANSI-SPARC Model</text>
  
  <!-- EXTERNAL LEVEL -->
  <g class="section" data-narration="External Level - Shows user views and interactions with the database">
    <rect x="20" y="70" width="380" height="90" fill="#f8f9fa" stroke="#b8e0d2" stroke-width="2" rx="8" opacity="0.9"/>
    <text x="35" y="88" class="level-label" data-narration="External Schema Level - Represents how users view the data">External Level (User View)</text>
    
    <!-- External Schema Boxes -->
    <rect x="35" y="100" width="100" height="50" fill="url(#externalGrad)" stroke="#7fb3a3" stroke-width="1.5" rx="5" class="box" data-narration="User View 1 - First external schema representation"/>
    <text x="85" y="122" text-anchor="middle" class="box-label">User View 1</text>
    <text x="85" y="138" text-anchor="middle" class="detail-text">External Schema</text>
    
    <rect x="160" y="100" width="100" height="50" fill="url(#externalGrad)" stroke="#7fb3a3" stroke-width="1.5" rx="5" class="box" data-narration="User View 2 - Second external schema representation" style="animation-delay: 0.2s"/>
    <text x="210" y="122" text-anchor="middle" class="box-label">User View 2</text>
    <text x="210" y="138" text-anchor="middle" class="detail-text">External Schema</text>
    
    <rect x="285" y="100" width="100" height="50" fill="url(#externalGrad)" stroke="#7fb3a3" stroke-width="1.5" rx="5" class="box" data-narration="User View n - Multiple external schemas for different users" style="animation-delay: 0.4s"/>
    <text x="335" y="122" text-anchor="middle" class="box-label">User View n</text>
    <text x="335" y="138" text-anchor="middle" class="detail-text">External Schema</text>
  </g>
  
  <!-- Arrow to Conceptual -->
  <g class="section" data-narration="Mapping layer between external and conceptual levels">
    <line x1="210" y1="165" x2="210" y2="185" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
    <polygon points="205,180 215,180 210,190" fill="#7f8c8d"/>
    <text x="230" y="180" class="detail-text" data-narration="External/Conceptual Mapping transforms user queries">Ext/Concept Mapping</text>
  </g>
  
  <!-- CONCEPTUAL LEVEL -->
  <g class="section" data-narration="Conceptual Level - Logical structure of the entire database">
    <rect x="20" y="190" width="380" height="70" fill="#f8f9fa" stroke="#d4b8e0" stroke-width="2" rx="8" opacity="0.9"/>
    <text x="35" y="208" class="level-label" data-narration="Conceptual Schema - Logical structure representing all data">Conceptual Level</text>
    
    <rect x="130" y="215" width="160" height="35" fill="url(#conceptualGrad)" stroke="#9b7bb5" stroke-width="1.5" rx="5" class="box" data-narration="Conceptual Schema represents the logical structure of the entire database">
      <text x="210" y="235" text-anchor="middle" class="box-label">Conceptual Schema</text>
    </rect>
    <text x="210" y="252" text-anchor="middle" class="detail-text" data-narration="Logical structure defining entities, relationships and constraints">Logical Structure (Entities, Relationships)</text>
  </g>
  
  <!-- Arrow to Internal -->
  <g class="section" data-narration="Mapping layer between conceptual and internal levels">
    <line x1="210" y1="265" x2="210" y2="285" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
    <polygon points="205,280 215,280 210,290" fill="#7f8c8d"/>
    <text x="230" y="278" class="detail-text" data-narration="Conceptual/Internal Mapping defines how data is physically stored">Concept/Int Mapping</text>
  </g>
  
  <!-- INTERNAL LEVEL -->
  <g class="section" data-narration="Internal Level - Physical storage of data in the database">
    <rect x="20" y="290" width="380" height="80" fill="#f8f9fa" stroke="#e0c8b8" stroke-width="2" rx="8" opacity="0.9"/>
    <text x="35" y="308" class="level-label" data-narration="Internal Schema - Physical storage representation">Internal Level</text>
    
    <rect x="80" y="315" width="260" height="45" fill="url(#internalGrad)" stroke="#b89585" stroke-width="1.5" rx="5" class="box" data-narration="Internal Schema shows how data is physically stored">
      <text x="210" y="335" text-anchor="middle" class="box-label">Internal Schema</text>
    </rect>
    <text x="210" y="358" text-anchor="middle" class="detail-text" data-narration="Physical storage: files, indexes, access paths">Physical Storage (Files, Indexes, Access Paths)</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section" data-narration="Key purposes and benefits of DBMS architecture">
    <rect x="320" y="70" width="90" height="55" fill="#fff9e6" stroke="#f9e79f" stroke-width="1" rx="4" opacity="0.95"/>
    <text x="365" y="82" text-anchor="middle" class="detail-text" font-weight="bold" fill="#7d6608">Key Purposes</text>
    <text x="325" y="96" class="detail-text">• Data Abstraction</text>
    <text x="325" y="108" class="detail-text">• Data Independence</text>
    <text x="325" y="120" class="detail-text">• Multiple Views</text>
  </g>
  
  <!-- Legend/Info -->
  <g class="section" data-narration="Information about data independence in the architecture">
    <rect x="10" y="375" width="400" height="18" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5" rx="3"/>
    <text x="15" y="388" class="detail-text" data-narration="Data Independence allows changes at one level without affecting other levels">Data Independence: Changes at one level don't affect other levels | External ↔ Conceptual ↔ Internal</text>
  </g>
</svg>