<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="hash-tables-collision-resolution" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#357a8c"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6bb3a0"/>
      <stop offset="100%" style="stop-color:#4a9a85"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#333" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #2c3e50; }
    .small-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #555; }
    .array-cell { fill: url(#arrayGradient); stroke: #2c5f6e; stroke-width: 1; }
    .node { fill: url(#nodeGradient); stroke: #3a7a65; stroke-width: 1; }
    .arrow { stroke: #e74c3c; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .highlight-box { fill: #fff9e6; stroke: #f39c12; stroke-width: 2; rx: 8; }
    .section-box { fill: white; stroke: #b8d4e3; stroke-width: 1; rx: 5; }
    .fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .slide-in-up { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="slide-in">
    <text x="210" y="30" text-anchor="middle" class="title">Hash Tables: Collision Resolution</text>
    <text x="210" y="50" text-anchor="middle" class="small-label">Separate Chaining Technique</text>
  </g>
  
  <!-- Hash Function Box -->
  <g class="slide-in delay-1" data-narration="The hash function h(k) = k mod 10 maps keys to array indices">
    <rect x="10" y="60" width="180" height="45" class="section-box" filter="url(#shadow)"/>
    <text x="20" y="78" class="label" font-weight="bold">Hash Function:</text>
    <text x="20" y="96" class="small-label" fill="#2c3e50">h(k) = k mod 10</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="slide-in delay-2" data-narration="Load factor α = 0.6 indicates table is 60% full">
    <rect x="230" y="60" width="180" height="45" class="highlight-box" filter="url(#shadow)"/>
    <text x="240" y="78" class="label" font-weight="bold">Load Factor (α):</text>
    <text x="240" y="96" class="small-label" fill="#2c3e50">α = n/m = 6/10 = 0.6</text>
  </g>
  
  <!-- Array Labels -->
  <g class="slide-in delay-2" data-narration="Hash table array with 10 buckets (indices 0-9)">
    <text x="30" y="135" class="label" font-weight="bold">Hash Table Array:</text>
    <text x="30" y="155" class="small-label">Buckets (m=10)</text>
  </g>
  
  <!-- Array Cells -->
  <g class="slide-in delay-2">
    <g transform="translate(30, 165)">
      <!-- Array cells 0-9 -->
      <rect x="0" y="0" width="35" height="25" class="array-cell" rx="3"/>
      <text x="17.5" y="17" text-anchor="middle" fill="white" font-size="12">0</text>
      
      <rect x="35" y="0" width="35" height="25" class="array-cell" rx="3"/>
      <text x="52.5" y="17" text-anchor="middle" fill="white" font-size="12">1</text>
      
      <rect x="70" y="0" width="35" height="25" class="array-cell pulse" rx="3" style="transform-origin: 87.5px 12.5px;"/>
      <text x="87.5" y="17" text-anchor="middle" fill="white" font-size="12">2</text>
      
      <rect x="105" y="0" width="35" height="25" class="array-cell" rx="3"/>
      <text x="122.5" y="17" text-anchor="middle" fill="white" font-size="12">3</text>
      
      <rect x="140" y="0" width="35" height="25" class="array-cell" rx="3"/>
      <text x="157.5" y="17" text-anchor="middle" fill="white" font-size="12">4</text>
      
      <rect x="175" y="0" width="35" height="25" class="array-cell pulse" rx="3" style="transform-origin: 192.5px 12.5px;"/>
      <text x="192.5" y="17" text-anchor="middle" fill="white" font-size="12">5</text>
      
      <rect x="210" y="0" width="35" height="25" class="array-cell" rx="3"/>
      <text x="227.5" y="17" text-anchor="middle" fill="white" font-size="12">6</text>
      
      <rect x="245" y="0" width="35" height="25" class="array-cell pulse" rx="3" style="transform-origin: 262.5px 12.5px;"/>
      <text x="262.5" y="17" text-anchor="middle" fill="white" font-size="12">7</text>
      
      <rect x="280" y="0" width="35" height="25" class="array-cell" rx="3"/>
      <text x="297.5" y="17" text-anchor="middle" fill="white" font-size="12">8</text>
      
      <rect x="315" y="0" width="35" height="25" class="array-cell" rx="3"/>
      <text x="332.5" y="17" text-anchor="middle" fill="white" font-size="12">9</text>
    </g>
  </g>
  
  <!-- Collision Chains -->
  <g class="slide-in-up delay-3" data-narration="Chained linked lists at indices 2, 5, and 7 handle collisions">
    <text x="30" y="215" class="label" font-weight="bold">Collision Chains:</text>
    <text x="30" y="235" class="small-label">Linked Lists for Collisions</text>
    
    <!-- Chain at index 2: 12 -> 22 -> 32 -->
    <g transform="translate(70, 250)">
      <rect x="0" y="0" width="35" height="20" class="node" rx="3"/>
      <text x="17.5" y="14" text-anchor="middle" fill="white" font-size="10">12</text>
      <path d="M35 10 L45 10" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="45" y="0" width="35" height="20" class="node" rx="3"/>
      <text x="62.5" y="14" text-anchor="middle" fill="white" font-size="10">22</text>
      <path d="M80 10 L90 10" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="90" y="0" width="35" height="20" class="node" rx="3"/>
      <text x="107.5" y="14" text-anchor="middle" fill="white" font-size="10">32</text>
      <text x="60" y="-8" class="small-label" text-anchor="middle">h(12)=2, h(22)=2, h(32)=2</text>
    </g>
    
    <!-- Chain at index 5: 5 -> 25 -->
    <g transform="translate(175, 250)">
      <rect x="0" y="0" width="35" height="20" class="node" rx="3"/>
      <text x="17.5" y="14" text-anchor="middle" fill="white" font-size="10">5</text>
      <path d="M35 10 L45 10" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="45" y="0" width="35" height="20" class="node" rx="3"/>
      <text x="62.5" y="14" text-anchor="middle" fill="white" font-size="10">25</text>
      <text x="45" y="-8" class="small-label" text-anchor="middle">h(5)=5, h(25)=5</text>
    </g>
    
    <!-- Chain at index 7: 7 -> 17 -->
    <g transform="translate(260, 250)">
      <rect x="0" y="0" width="35" height="20" class="node" rx="3"/>
      <text x="17.5" y="14" text-anchor="middle" fill="white" font-size="10">7</text>
      <path d="M35 10 L45 10" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="45" y="0" width="35" height="20" class="node" rx="3"/>
      <text x="62.5" y="14" text-anchor="middle" fill="white" font-size="10">17</text>
      <text x="45" y="-8" class="small-label" text-anchor="middle">h(7)=7, h(17)=7</text>
    </g>
  </g>
  
  <!-- Arrow indicators showing collisions -->
  <g class="fade-in delay-4">
    <line x1="117.5" y1="190" x2="117.5" y2="250" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <line x1="202.5" y1="190" x2="202.5" y2="250" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <line x1="272.5" y1="190" x2="272.5" y2="250" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Legend -->
  <g class="slide-in-up delay-4" data-narration="Total 6 elements stored using 10 buckets with separate chaining">
    <rect x="30" y="300" width="360" height="35" class="section-box" filter="url(#shadow)"/>
    <circle cx="50" cy="317" r="6" fill="url(#arrayGradient)"/>
    <text x="65" y="321" class="small-label">Array Bucket</text>
    <circle cx="140" cy="317" r="6" fill="url(#nodeGradient)"/>
    <text x="155" y="321" class="small-label">Key/Node</text>
    <line x1="195" y1="317" x2="225" y2="317" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="225,317 220,314 220,320" fill="#e74c3c"/>
    <text x="235" y="321" class="small-label">Collision</text>
    <text x="300" y="321" class="small-label" font-weight="bold">Total Keys: 6</text>
  </g>
  
  <!-- Info Box -->
  <g class="fade-in delay-4" data-narration="Open Addressing vs Chaining: This diagram demonstrates chaining where each bucket contains a linked list">
    <rect x="30" y="345" width="360" height="45" class="highlight-box" filter="url(#shadow)"/>
    <text x="40" y="363" class="small-label" font-weight="bold">Chaining Method:</text>
    <text x="40" y="378" class="small-label">Each bucket contains linked list → Collisions stored sequentially</text>
    <text x="40" y="390" class="small-label">Search: O(1 + α) | Insert: O(1) | Delete: O(1 + α)</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>