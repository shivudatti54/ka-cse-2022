<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="greedy-algorithm-mst-shortest-path" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sectionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.08" />
    </linearGradient>
    <linearGradient id="mstGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="spGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eb3349;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f45c43;stop-opacity:0.1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-size: 20px; font-weight: 700; fill: #2d3748; }
    .label-text { font-size: 13px; font-weight: 600; fill: #4a5568; }
    .detail-text { font-size: 11px; fill: #718096; }
    .highlight { font-size: 12px; font-weight: 600; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title">
    <rect x="10" y="10" width="400" height="50" rx="8" fill="url(#sectionGradient)" filter="url(#shadow)"/>
    <text x="210" y="42" text-anchor="middle" class="title-text">Greedy Algorithms: MST &amp; Shortest Path</text>
  </g>
  
  <!-- Section 1: Greedy Strategy -->
  <g class="section-1" data-narration="The Greedy Strategy: Make locally optimal choices hoping for global optimality. Key properties: Optimal Substructure and Greedy Choice Property.">
    <rect x="15" y="70" width="120" height="95" rx="6" fill="#fff" stroke="#667eea" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="75" y="88" text-anchor="middle" class="label-text" fill="#667eea">Greedy Strategy</text>
    <line x1="25" y1="95" x2="125" y2="95" stroke="#e2e8f0" stroke-width="1"/>
    <text x="25" y="112" class="detail-text">• Optimal Substructure</text>
    <text x="25" y="127" class="detail-text">• Greedy Choice</text>
    <text x="25" y="142" class="detail-text">• Look-ahead one step</text>
    <text x="25" y="157" class="highlight" fill="#667eea">Not always optimal!</text>
  </g>
  
  <!-- Section 2: MST Graph Visualization -->
  <g class="section-2" data-narration="Minimum Spanning Tree (MST): Connects all vertices with minimum total weight. Kruskal's and Prim's algorithms are greedy approaches to find MST.">
    <rect x="145" y="70" width="130" height="95" rx="6" fill="#fff" stroke="#11998e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="88" text-anchor="middle" class="label-text" fill="#11998e">MST</text>
    <line x1="155" y1="95" x2="265" y2="95" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Mini graph for MST -->
    <circle cx="175" cy="120" r="8" fill="#11998e" opacity="0.8"/>
    <circle cx="210" cy="110" r="8" fill="#11998e" opacity="0.8"/>
    <circle cx="245" cy="120" r="8" fill="#11998e" opacity="0.8"/>
    <circle cx="210" cy="145" r="8" fill="#11998e" opacity="0.8"/>
    <line x1="183" y1="118" x2="202" y2="113" stroke="#11998e" stroke-width="2" class="draw-anim"/>
    <line x1="218" y1="113" x2="237" y2="118" stroke="#11998e" stroke-width="2" class="draw-anim"/>
    <line x1="175" y1="128" x2="210" y2="145" stroke="#11998e" stroke-width="2" class="draw-anim"/>
    <line x1="210" y1="145" x2="245" y2="128" stroke="#11998e" stroke-width="2" class="draw-anim"/>
    <text x="210" y="163" text-anchor="middle" class="detail-text">Kruskal's | Prim's</text>
  </g>
  
  <!-- Section 3: Shortest Path Graph -->
  <g class="section-3" data-narration="Shortest Path: Dijkstra's algorithm finds the shortest path from source to all vertices using greedy approach. Used in GPS navigation.">
    <rect x="285" y="70" width="120" height="95" rx="6" fill="#fff" stroke="#eb3349" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="345" y="88" text-anchor="middle" class="label-text" fill="#eb3349">Shortest Path</text>
    <line x1="295" y1="95" x2="395" y2="95" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Mini graph for Shortest Path -->
    <circle cx="315" cy="120" r="8" fill="#eb3349" opacity="0.8"/>
    <circle cx="345" cy="120" r="8" fill="#eb3349" opacity="0.8"/>
    <circle cx="375" cy="120" r="8" fill="#eb3349" opacity="0.8"/>
    <line x1="323" y1="120" x2="337" y2="120" stroke="#eb3349" stroke-width="2" class="draw-anim"/>
    <line x1="353" y1="120" x2="367" y2="120" stroke="#eb3349" stroke-width="2" class="draw-anim"/>
    <text x="345" y="145" text-anchor="middle" class="detail-text">Dijkstra's</text>
    <text x="345" y="158" text-anchor="middle" class="detail-text">Algorithm</text>
  </g>
  
  <!-- Section 4: Algorithm Comparison -->
  <g class="section-4" data-narration="Comparison: Both MST and Shortest Path use greedy approach but solve different problems. MST connects all nodes minimally; Shortest Path finds optimal routes.">
    <rect x="15" y="175" width="390" height="70" rx="6" fill="#fff" stroke="#a0aec0" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="193" text-anchor="middle" class="label-text" fill="#4a5568">Algorithm Comparison</text>
    <line x1="25" y1="200" x2="395" y2="200" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- MST Column -->
    <rect x="30" y="210" width="110" height="28" rx="4" fill="url(#mstGradient)"/>
    <text x="85" y="227" text-anchor="middle" class="detail-text" fill="#11998e" font-weight="600">MST (Kruskal/Prim)</text>
    <text x="85" y="238" text-anchor="middle" class="detail-text" fill="#718096">Connect all vertices</text>
    
    <!-- Arrow -->
    <path d="M150 224 L165 224" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Shortest Path Column -->
    <rect x="175" y="210" width="110" height="28" rx="4" fill="url(#spGradient)"/>
    <text x="230" y="227" text-anchor="middle" class="detail-text" fill="#eb3349" font-weight="600">Shortest Path</text>
    <text x="230" y="238" text-anchor="middle" class="detail-text" fill="#718096">Dijkstra's Algo</text>
    
    <!-- Arrow -->
    <path d="M295 224 L310 224" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Result -->
    <rect x="320" y="210" width="75" height="28" rx="4" fill="#edf2f7"/>
    <text x="357" y="227" text-anchor="middle" class="detail-text" fill="#4a5568" font-weight="600">Greedy</text>
    <text x="357" y="238" text-anchor="middle" class="detail-text" fill="#718096">✓ Optimal</text>
  </g>
  
  <!-- Section 5: Key Formulas/Properties -->
  <g class="section-4" data-narration="Key Properties: MST requires V-1 edges for V vertices. Shortest Path uses distance array and relaxation. Time Complexity: O(E log V) for both.">
    <rect x="15" y="255" width="390" height="60" rx="6" fill="#fff" stroke="#805ad5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="273" text-anchor="middle" class="label-text" fill="#805ad5">Key Properties</text>
    <line x1="25" y1="280" x2="395" y2="280" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Property 1 -->
    <circle cx="45" cy="298" r="10" fill="#805ad5" opacity="0.3" class="pulse"/>
    <text x="45" y="302" text-anchor="middle" class="detail-text" fill="#805ad5" font-weight="700">1</text>
    <text x="65" y="302" class="detail-text">MST: <tspan class="highlight">V-1</tspan> edges for V vertices</text>
    
    <!-- Property 2 -->
    <circle cx="230" cy="298" r="10" fill="#805ad5" opacity="0.3" class="pulse"/>
    <text x="230" y="302" text-anchor="middle" class="detail-text" fill="#805ad5" font-weight="700">2</text>
    <text x="250" y="302" class="detail-text">Time: <tspan class="highlight">O(E log V)</tspan> (with min-heap)</text>
  </g>
  
  <!-- Section 6: Applications -->
  <g class="section-4" data-narration="Real-world Applications: Network design, telephone/electrical networks, road networks, and GPS navigation systems use these algorithms.">
    <rect x="15" y="325" width="390" height="60" rx="6" fill="#fff" stroke="#38b2ac" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="343" text-anchor="middle" class="label-text" fill="#38b2ac">Applications</text>
    <line x1="25" y1="350" x2="395" y2="350" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- App icons/text -->
    <text x="35" y="368" class="detail-text" fill="#718096">📡 Network Design</text>
    <text x="145" y="368" class="detail-text" fill="#718096">🛣️ Road Networks</text>
    <text x="255" y="368" class="detail-text" fill="#718096">📞 Telephone</text>
    <text x="350" y="368" class="detail-text" fill="#718096">🧭 GPS</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="25" r="15" fill="#667eea" opacity="0.1" class="pulse"/>
  <circle cx="25" cy="395" r="20" fill="#11998e" opacity="0.1" class="pulse"/>
  <circle cx="400" cy="380" r="12" fill="#eb3349" opacity="0.1" class="pulse"/>
  
</svg>