<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="graph-traversals-topological-sort">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="queueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342"/>
      <stop offset="100%" style="stop-color:#689f38"/>
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#f57c00"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes highlightPulse {
      0%, 100% { stroke-width: 3; }
      50% { stroke-width: 5; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .node { fill: url(#nodeGradient); stroke: #2c3e50; stroke-width: 2; }
    .node-visited { fill: url(#queueGradient); stroke: #2c3e50; stroke-width: 2; }
    .node-current { fill: url(#highlightGradient); stroke: #2c3e50; stroke-width: 3; }
    .edge { stroke: #7f8c8d; stroke-width: 2; fill: none; }
    .edge-active { stroke: #ff9800; stroke-width: 3; }
    .queue-item { fill: url(#queueGradient); stroke: #2c3e50; stroke-width: 1; }
    .concept-box { fill: #fff; stroke: #bdc3c7; stroke-width: 1; rx: 5; }
    .fade-in { animation: fadeIn 1s ease-in-out; }
    .slide-in { animation: slideIn 0.8s ease-out; }
    .pulse { animation: pulse 1s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Graph Traversals &amp; Topological Sort</text>
  <line x1="30" y1="40" x2="390" y2="40" stroke="#4a90d9" stroke-width="2" class="fade-in"/>
  
  <!-- Graph Visualization Section -->
  <g class="slide-in" data-narration="Graph with directed edges showing BFS traversal levels">
    <text x="30" y="60" class="section-title">BFS Traversal Example</text>
    
    <!-- Edges -->
    <line x1="80" y1="100" x2="140" y2="140" class="edge"/>
    <line x1="80" y1="100" x2="20" y2="140" class="edge"/>
    <line x1="140" y1="140" x2="180" y2="180" class="edge"/>
    <line x1="140" y1="140" x2="100" y2="180" class="edge"/>
    <line x1="20" y1="140" x2="20" y2="180" class="edge"/>
    <line x1="20" y1="140" x2="60" y2="180" class="edge"/>
    
    <!-- Level Labels -->
    <text x="350" y="100" class="detail">Level 0:</text>
    <text x="350" y="140" class="detail">Level 1:</text>
    <text x="350" y="180" class="detail">Level 2:</text>
    
    <!-- Nodes -->
    <circle cx="80" cy="100" r="18" class="node-current pulse" data-narration="Starting vertex A at level 0"/>
    <text x="80" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">A</text>
    
    <circle cx="20" cy="140" r="15" class="node" data-narration="Level 1: Vertex B"/>
    <text x="20" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">B</text>
    
    <circle cx="140" cy="140" r="15" class="node" data-narration="Level 1: Vertex C"/>
    <text x="140" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">C</text>
    
    <circle cx="20" cy="180" r="12" class="node" data-narration="Level 2: Vertex D"/>
    <text x="20" y="184" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">D</text>
    
    <circle cx="60" cy="180" r="12" class="node" data-narration="Level 2: Vertex E"/>
    <text x="60" y="184" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">E</text>
    
    <circle cx="180" cy="180" r="12" class="node" data-narration="Level 2: Vertex F"/>
    <text x="180" y="184" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">F</text>
  </g>
  
  <!-- Queue Visualization Section -->
  <g class="slide-in" data-narration="Queue state during BFS showing order of vertex processing" style="animation-delay: 0.3s">
    <text x="30" y="230" class="section-title">BFS Queue State</text>
    
    <!-- Queue Box -->
    <rect x="30" y="240" width="200" height="70" class="concept-box"/>
    
    <!-- Queue Items -->
    <rect x="40" y="255" width="35" height="30" class="queue-item"/>
    <text x="57" y="275" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">A</text>
    
    <rect x="80" y="255" width="35" height="30" class="queue-item" style="animation-delay: 0.2s"/>
    <text x="97" y="275" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">B</text>
    
    <rect x="120" y="255" width="35" height="30" class="queue-item" style="animation-delay: 0.4s"/>
    <text x="137" y="275" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">C</text>
    
    <rect x="160" y="255" width="35" height="30" class="queue-item" style="animation-delay: 0.6s"/>
    <text x="177" y="275" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">D</text>
    
    <text x="240" y="275" class="detail">→ Dequeue</text>
    
    <!-- Queue Labels -->
    <text x="30" y="330" class="detail" data-narration="Queue follows FIFO order - First In First Out">Queue: FIFO (First In First Out)</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="fade-in" data-narration="Key concepts of graph representations and algorithms" style="animation-delay: 0.5s">
    <text x="270" y="230" class="section-title">Key Concepts</text>
    
    <rect x="265" y="240" width="145" height="45" class="concept-box"/>
    <text x="275" y="255" class="label" font-weight="bold">Adjacency List</text>
    <text x="275" y="270" class="detail">O(V+E) space</text>
    <text x="275" y="282" class="detail">Sparse graphs</text>
    
    <rect x="265" y="290" width="145" height="45" class="concept-box"/>
    <text x="275" y="305" class="label" font-weight="bold">BFS</text>
    <text x="275" y="320" class="detail">Level-by-level</text>
    <text x="275" y="332" class="detail">Uses Queue</text>
  </g>
  
  <!-- Topological Sort Section -->
  <g class="fade-in" data-narration="Topological sort applied to DAG for dependency ordering" style="animation-delay: 0.7s">
    <text x="30" y="355" class="section-title">Topological Sort (DAG)</text>
    
    <!-- Small DAG example -->
    <line x1="30" y1="370" x2="60" y2="370" class="edge" stroke-width="1.5"/>
    <line x1="90" y1="370" x2="120" y2="370" class="edge" stroke-width="1.5"/>
    <line x1="150" y1="370" x2="180" y2="370" class="edge" stroke-width="1.5"/>
    
    <circle cx="25" cy="370" r="10" class="node" style="fill: #9c27b0;"/>
    <text x="25" y="374" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">1</text>
    
    <circle cx="75" cy="370" r="10" class="node" style="fill: #9c27b0;"/>
    <text x="75" y="374" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">2</text>
    
    <circle cx="135" cy="370" r="10" class="node" style="fill: #9c27b0;"/>
    <text x="135" y="374" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">3</text>
    
    <circle cx="195" cy="370" r="10" class="node" style="fill: #9c27b0;"/>
    <text x="195" y="374" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">4</text>
    
    <text x="260" y="375" class="detail">Order: 1→2→3→4</text>
  </g>
  
  <!-- Algorithm Steps -->
  <g class="fade-in" style="animation-delay: 0.9s">
    <text x="270" y="355" class="section-title">Algorithm Steps</text>
    <text x="270" y="372" class="detail">1. Mark visited</text>
    <text x="270" y="385" class="detail">2. Enqueue neighbors</text>
  </g>
</svg>