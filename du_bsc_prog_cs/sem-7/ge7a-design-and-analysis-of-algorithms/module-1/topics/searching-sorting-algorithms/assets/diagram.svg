<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="searching-sorting-algorithms" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0e8f8"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f5f5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { fill: #ff6b6b; }
      50% { fill: #4ecdc4; }
    }
    @keyframes treePulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .highlight-box { fill: #fff; stroke: #3498db; stroke-width: 2; rx: 5; }
    .node { fill: #3498db; stroke: #2980b9; stroke-width: 2; rx: 20; }
    .node-leaf { fill: #27ae60; stroke: #1e8449; stroke-width: 2; rx: 15; }
    .array-cell { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 1; }
    .active-cell { fill: #f39c12; stroke: #e67e22; stroke-width: 2; }
    .arrow { fill: none; stroke: #95a5a6; stroke-width: 2; marker-end: url(#arrowhead); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .title-group { animation: fadeIn 0.8s ease-out forwards; }
    .linear-section { animation: slideInLeft 0.8s ease-out 0.2s forwards; opacity: 0; }
    .binary-section { animation: slideInRight 0.8s ease-out 0.4s forwards; opacity: 0; }
    .complexity-section { animation: fadeIn 1s ease-out 0.6s forwards; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <g class="title-group">
    <text x="210" y="30" text-anchor="middle" class="title">Searching Algorithms</text>
  </g>
  
  <!-- Linear Search Section -->
  <g class="linear-section" data-narration="Linear Search: O(n) - checks each element sequentially">
    <rect x="15" y="50" width="180" height="140" fill="url(#boxGradient)" filter="url(#shadow)" rx="8"/>
    <text x="105" y="70" text-anchor="middle" class="label" style="font-weight:bold;">Linear Search</text>
    
    <!-- Array representation -->
    <g transform="translate(25, 85)">
      <rect x="0" y="0" width="25" height="25" class="array-cell"/>
      <text x="12.5" y="17" text-anchor="middle" class="detail">3</text>
      
      <rect x="27" y="0" width="25" height="25" class="array-cell"/>
      <text x="39.5" y="17" text-anchor="middle" class="detail">7</text>
      
      <rect x="54" y="0" width="25" height="25" class="array-cell"/>
      <text x="66.5" y="17" text-anchor="middle" class="detail">1</text>
      
      <rect x="81" y="0" width="25" height="25" class="array-cell"/>
      <text x="93.5" y="17" text-anchor="middle" class="detail">9</text>
      
      <rect x="108" y="0" width="25" height="25" class="active-cell"/>
      <text x="120.5" y="17" text-anchor="middle" class="detail" style="fill:white;">5</text>
      
      <rect x="135" y="0" width="25" height="25" class="array-cell"/>
      <text x="147.5" y="17" text-anchor="middle" class="detail">2</text>
    </g>
    
    <text x="105" y="130" text-anchor="middle" class="detail">Check each element one by one</text>
    <text x="105" y="148" text-anchor="middle" class="detail" style="color:#e74c3c;">Time: O(n)</text>
    
    <!-- Arrow to binary -->
    <path d="M 200 120 L 230 120" class="arrow" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Binary Search Section -->
  <g class="binary-section" data-narration="Binary Search: O(log n) - divide and conquer on sorted array">
    <rect x="230" y="50" width="175" height="140" fill="url(#boxGradient)" filter="url(#shadow)" rx="8"/>
    <text x="317" y="70" text-anchor="middle" class="label" style="font-weight:bold;">Binary Search</text>
    
    <!-- Sorted Array -->
    <g transform="translate(240, 85)">
      <rect x="0" y="0" width="20" height="20" class="array-cell"/>
      <text x="10" y="14" text-anchor="middle" class="detail" style="font-size:10px;">1</text>
      
      <rect x="22" y="0" width="20" height="20" class="array-cell"/>
      <text x="32" y="14" text-anchor="middle" class="detail" style="font-size:10px;">2</text>
      
      <rect x="44" y="0" width="20" height="20" class="array-cell" style="fill:#f39c12;stroke:#e67e22;"/>
      <text x="54" y="14" text-anchor="middle" class="detail" style="font-size:10px;">3</text>
      
      <rect x="66" y="0" width="20" height="20" class="array-cell"/>
      <text x="76" y="14" text-anchor="middle" class="detail" style="font-size:10px;">4</text>
      
      <rect x="88" y="0" width="20" height="20" class="array-cell"/>
      <text x="98" y="14" text-anchor="middle" class="detail" style="font-size:10px;">5</text>
      
      <rect x="110" y="0" width="20" height="20" class="array-cell"/>
      <text x="120" y="14" text-anchor="middle" class="detail" style="font-size:10px;">6</text>
      
      <rect x="132" y="0" width="20" height="20" class="array-cell"/>
      <text x="142" y="14" text-anchor="middle" class="detail" style="font-size:10px;">7</text>
      
      <rect x="154" y="0" width="20" height="20" class="array-cell"/>
      <text x="164" y="14" text-anchor="middle" class="detail" style="font-size:10px;">8</text>
    </g>
    
    <text x="317" y="135" text-anchor="middle" class="detail">Sorted array required</text>
    <text x="317" y="153" text-anchor="middle" class="detail" style="color:#27ae60;">Time: O(log n)</text>
  </g>
  
  <!-- Binary Search Decision Tree -->
  <g data-narration="Binary Search Decision Tree showing divide and conquer path">
    <rect x="15" y="200" width="390" height="100" fill="url(#boxGradient)" filter="url(#shadow)" rx="8"/>
    <text x="210" y="220" text-anchor="middle" class="label" style="font-weight:bold;">Binary Search Decision Tree (8 elements)</text>
    
    <!-- Tree structure -->
    <g transform="translate(210, 245)">
      <!-- Root node -->
      <circle cx="0" cy="0" r="16" class="node" style="fill:#9b59b6;"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-family="Arial">4</text>
      
      <!-- Level 2 -->
      <circle cx="-55" cy="35" r="14" class="node" style="fill:#3498db;"/>
      <text x="-55" y="39" text-anchor="middle" fill="white" font-size="9" font-family="Arial">2</text>
      
      <circle cx="55" cy="35" r="14" class="node" style="fill:#3498db;"/>
      <text x="55" y="39" text-anchor="middle" fill="white" font-size="9" font-family="Arial">6</text>
      
      <!-- Arrows from root -->
      <line x1="-12" y1="12" x2="-48" y2="28" stroke="#7f8c8d" stroke-width="1.5" class="anim-pulse"/>
      <line x1="12" y1="12" x2="48" y2="28" stroke="#7f8c8d" stroke-width="1.5"/>
      
      <!-- Level 3 - Leaves -->
      <circle cx="-80" cy="65" r="11" class="node-leaf"/>
      <text x="-80" y="68" text-anchor="middle" fill="white" font-size="8" font-family="Arial">1</text>
      
      <circle cx="-30" cy="65" r="11" class="node-leaf"/>
      <text x="-30" y="68" text-anchor="middle" fill="white" font-size="8" font-family="Arial">3</text>
      
      <circle cx="30" cy="65" r="11" class="node-leaf"/>
      <text x="30" y="68" text-anchor="middle" fill="white" font-size="8" font-family="Arial">5</text>
      
      <circle cx="80" cy="65" r="11" class="node-leaf"/>
      <text x="80" y="68" text-anchor="middle" fill="white" font-size="8" font-family="Arial">7</text>
      
      <!-- Arrows to leaves -->
      <line x1="-48" y1="42" x2="-74" y2="58" stroke="#7f8c8d" stroke-width="1"/>
      <line x1="-48" y1="42" x2="-34" y2="58" stroke="#7f8c8d" stroke-width="1"/>
      <line x1="48" y1="42" x2="26" y2="58" stroke="#7f8c8d" stroke-width="1"/>
      <line x1="48" y1="42" x2="74" y2="58" stroke="#7f8c8d" stroke-width="1"/>
    </g>
    
    <!-- Labels -->
    <text x="210" y="285" text-anchor="middle" class="detail">Left: element &lt; 4</text>
    <text x="210" y="298" text-anchor="middle" class="detail">Right: element &gt; 4</text>
  </g>
  
  <!-- Complexity Comparison -->
  <g class="complexity-section" data-narration="Time complexity comparison between linear and binary search">
    <rect x="15" y="310" width="180" height="80" fill="url(#boxGradient)" filter="url(#shadow)" rx="8"/>
    <text x="105" y="330" text-anchor="middle" class="label" style="font-weight:bold; font-size:13px;">Complexity Comparison</text>
    
    <text x="25" y="350" class="detail">Linear: O(n)</text>
    <rect x="25" y="355" width="60" height="8" fill="#e74c3c" rx="4" opacity="0.7"/>
    
    <text x="25" y="375" class="detail">Binary: O(log n)</text>
    <rect x="25" y="380" width="25" height="8" fill="#27ae60" rx="4" opacity="0.7"/>
    
    <text x="105" y="370" text-anchor="middle" class="detail" style="font-style:italic; font-size:11px;">Binary is faster for</text>
    <text x="105" y="382" text-anchor="middle" class="detail" style="font-style:italic; font-size:11px;">large datasets!</text>
  </g>
  
  <!-- Key Takeaway Box -->
  <g class="complexity-section">
    <rect x="205" y="310" width="200" height="80" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="8"/>
    <text x="305" y="330" text-anchor="middle" class="label" style="font-weight:bold; font-size:13px; fill:#e67e22;">Key Takeaway</text>
    <text x="215" y="350" class="detail" style="font-size:11px;">• Binary search requires sorted data</text>
    <text x="215" y="365" class="detail" style="font-size:11px;">• O(log n) vs O(n) - huge difference!</text>
    <text x="215" y="380" class="detail" style="font-size:11px;">• For 1M elements: ~20 vs 1M checks</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="8" fill="#3498db" opacity="0.3">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="390" cy="30" r="6" fill="#9b59b6" opacity="0.3">
    <animate attributeName="r" values="6;8;6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>