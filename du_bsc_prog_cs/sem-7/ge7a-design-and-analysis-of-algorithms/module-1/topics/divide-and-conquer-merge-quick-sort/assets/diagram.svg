<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="divide-and-conquer-merge-quick-sort">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4ecf4"/>
      <stop offset="100%" style="stop-color:#c5e3f0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90a4"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideInDown 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideInRight 0.6s ease-out 0.6s both; }
    .tree-level { animation: fadeIn 0.5s ease-out both; }
    .concept-box { animation: fadeIn 0.7s ease-out 0.3s both; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out 0.8s forwards; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-size: 12px; fill: #34495e; }
    .detail-text { font-size: 11px; fill: #5d6d7e; }
    .highlight { fill: #2980b9; font-weight: bold; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title">
    <text x="210" y="28" text-anchor="middle" class="title-text">Divide and Conquer</text>
    <text x="210" y="46" text-anchor="middle" font-size="14" fill="#4a6572">Merge Sort &amp; Quick Sort</text>
    <line x1="100" y1="54" x2="320" y2="54" stroke="#4a90a4" stroke-width="2"/>
  </g>
  
  <!-- Main Flow Diagram -->
  <g transform="translate(30, 70)">
    <!-- Divide Box -->
    <g class="section-1" data-narration="The Divide step breaks the problem into smaller subproblems of the same type">
      <rect x="0" y="0" width="100" height="50" rx="8" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#82ca9d" stroke-width="2"/>
      <text x="50" y="20" text-anchor="middle" class="label-text" font-weight="bold" fill="#27ae60">DIVIDE</text>
      <text x="50" y="38" text-anchor="middle" class="detail-text">Break problem</text>
      <text x="50" y="48" text-anchor="middle" class="detail-text">into subproblems</text>
    </g>
    
    <!-- Arrow 1 -->
    <line x1="100" y1="25" x2="140" y2="25" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowhead)" class="line-anim"/>
    
    <!-- Conquer Box -->
    <g class="section-2" data-narration="The Conquer step solves the subproblems recursively">
      <rect x="140" y="0" width="100" height="50" rx="8" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#82ca9d" stroke-width="2"/>
      <text x="190" y="20" text-anchor="middle" class="label-text" font-weight="bold" fill="#27ae60">CONQUER</text>
      <text x="190" y="38" text-anchor="middle" class="detail-text">Solve recursively</text>
      <text x="190" y="48" text-anchor="middle" class="detail-text">subproblems</text>
    </g>
    
    <!-- Arrow 2 -->
    <line x1="240" y1="25" x2="280" y2="25" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowhead)" class="line-anim"/>
    
    <!-- Combine Box -->
    <g class="section-3" data-narration="The Combine step merges the solutions of subproblems">
      <rect x="280" y="0" width="100" height="50" rx="8" fill="url(#boxGradient)" filter="url(#shadow)" stroke="#82ca9d" stroke-width="2"/>
      <text x="330" y="20" text-anchor="middle" class="label-text" font-weight="bold" fill="#27ae60">COMBINE</text>
      <text x="330" y="38" text-anchor="middle" class="detail-text">Merge solutions</text>
      <text x="330" y="48" text-anchor="middle" class="detail-text">to get result</text>
    </g>
  </g>
  
  <!-- Merge Sort Recursion Tree -->
  <g transform="translate(40, 140)">
    <text x="170" y="0" class="label-text" font-weight="bold" fill="#2c3e50">Merge Sort Recursion Tree</text>
    
    <!-- Level 0: Root -->
    <g class="tree-level" style="animation-delay: 0.5s">
      <rect x="130" y="10" width="80" height="20" rx="4" fill="#3498db" class="pulse-anim"/>
      <text x="170" y="24" text-anchor="middle" fill="white" font-size="10">n elements</text>
    </g>
    
    <!-- Level 1 -->
    <g class="tree-level" style="animation-delay: 0.7s">
      <line x1="150" y1="30" x2="100" y2="55" stroke="#4a90a4" stroke-width="1.5"/>
      <line x1="190" y1="30" x2="240" y2="55" stroke="#4a90a4" stroke-width="1.5"/>
      <rect x="60" y="55" width="80" height="18" rx="3" fill="#5dade2"/>
      <text x="100" y="68" text-anchor="middle" fill="white" font-size="9">n/2</text>
      <rect x="200" y="55" width="80" height="18" rx="3" fill="#5dade2"/>
      <text x="240" y="68" text-anchor="middle" fill="white" font-size="9">n/2</text>
    </g>
    
    <!-- Level 2 -->
    <g class="tree-level" style="animation-delay: 0.9s">
      <line x1="80" y1="73" x2="60" y2="95" stroke="#4a90a4" stroke-width="1.5"/>
      <line x1="120" y1="73" x2="140" y2="95" stroke="#4a90a4" stroke-width="1.5"/>
      <line x1="220" y1="73" x2="200" y2="95" stroke="#4a90a4" stroke-width="1.5"/>
      <line x1="260" y1="73" x2="280" y2="95" stroke="#4a90a4" stroke-width="1.5"/>
      <rect x="35" y="95" width="50" height="14" rx="2" fill="#85c1e9"/>
      <text x="60" y="105" text-anchor="middle" fill="white" font-size="8">n/4</text>
      <rect x="115" y="95" width="50" height="14" rx="2" fill="#85c1e9"/>
      <text x="140" y="105" text-anchor="middle" fill="white" font-size="8">n/4</text>
      <rect x="175" y="95" width="50" height="14" rx="2" fill="#85c1e9"/>
      <text x="200" y="105" text-anchor="middle" fill="white" font-size="8">n/4</text>
      <rect x="255" y="95" width="50" height="14" rx="2" fill="#85c1e9"/>
      <text x="280" y="105" text-anchor="middle" fill="white" font-size="8">n/4</text>
    </g>
    
    <!-- Level 3 (leaves) -->
    <g class="tree-level" style="animation-delay: 1.1s">
      <line x1="45" y1="109" x2="40" y2="125" stroke="#4a90a4" stroke-width="1"/>
      <line x1="75" y1="109" x2="80" y2="125" stroke="#4a90a4" stroke-width="1"/>
      <line x1="125" y1="109" x2="120" y2="125" stroke="#4a90a4" stroke-width="1"/>
      <line x1="155" y1="109" x2="160" y2="125" stroke="#4a90a4" stroke-width="1"/>
      <line x1="185" y1="109" x2="180" y2="125" stroke="#4a90a4" stroke-width="1"/>
      <line x1="215" y1="109" x2="220" y2="125" stroke="#4a90a4" stroke-width="1"/>
      <line x1="265" y1="109" x2="260" y2="125" stroke="#4a90a4" stroke-width="1"/>
      <line x1="295" y1="109" x2="300" y2="125" stroke="#4a90a4" stroke-width="1"/>
      
      <rect x="25" y="125" width="30" height="12" rx="2" fill="#aed6f1"/>
      <text x="40" y="134" text-anchor="middle" fill="#2c3e50" font-size="7">1</text>
      <rect x="65" y="125" width="30" height="12" rx="2" fill="#aed6f1"/>
      <text x="80" y="134" text-anchor="middle" fill="#2c3e50" font-size="7">1</text>
      <rect x="105" y="125" width="30" height="12" rx="2" fill="#aed6f1"/>
      <text x="120" y="134" text-anchor="middle" fill="#2c3e50" font-size="7">1</text>
      <rect x="145" y="125" width="30" height="12" rx="2" fill="#aed6f1"/>
      <text x="160" y="134" text-anchor="middle" fill="#2c3e50" font-size="7">1</text>
      <rect x="185" y="125" width="30" height="12" rx="2" fill="#aed6f1"/>
      <text x="200" y="134" text-anchor="middle" fill="#2c3e50" font-size="7">1</text>
      <rect x="225" y="125" width="30" height="12" rx="2" fill="#aed6f1"/>
      <text x="240" y="134" text-anchor="middle" fill="#2c3e50" font-size="7">1</text>
      <rect x="265" y="125" width="30" height="12" rx="2" fill="#aed6f1"/>
      <text x="280" y="134" text-anchor="middle" fill="#2c3e50" font-size="7">1</text>
      <rect x="305" y="125" width="30" height="12" rx="2" fill="#aed6f1"/>
      <text x="320" y="134" text-anchor="middle" fill="#2c3e50" font-size="7">1</text>
    </g>
    
    <!-- Merge operations label -->
    <g class="tree-level" style="animation-delay: 1.3s">
      <text x="170" y="155" text-anchor="middle" class="detail-text" fill="#e74c3c">Merge operations: O(n) at each level</text>
      <text x="170" y="168" text-anchor="middle" class="detail-text" fill="#e74c3c">Total: O(n log n)</text>
    </g>
  </g>
  
  <!-- Comparison Box -->
  <g transform="translate(20, 310)" class="concept-box" data-narration="Comparison between Merge Sort and Quick Sort algorithms">
    <rect x="0" y="0" width="180" height="80" rx="6" fill="white" filter="url(#shadow)" stroke="#4a90a4" stroke-width="1.5"/>
    <text x="90" y="18" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Merge Sort</text>
    <text x="90" y="34" text-anchor="middle" class="detail-text" fill="#27ae60">Time: O(n log n)</text>
    <text x="90" y="46" text-anchor="middle" class="detail-text" fill="#7f8c8d">Space: O(n)</text>
    <text x="90" y="58" text-anchor="middle" class="detail-text" fill="#2980b9">Stable, Always O(n log n)</text>
    <text x="90" y="72" text-anchor="middle" class="detail-text" fill="#34495e">von Neumann, 1945</text>
  </g>
  
  <g transform="translate(220, 310)" class="concept-box" data-narration="Quick Sort characteristics and performance">
    <rect x="0" y="0" width="180" height="80" rx="6" fill="white" filter="url(#shadow)" stroke="#f39c12" stroke-width="1.5"/>
    <text x="90" y="18" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Quick Sort</text>
    <text x="90" y="34" text-anchor="middle" class="detail-text" fill="#27ae60">Avg: O(n log n)</text>
    <text x="90" y="46" text-anchor="middle" class="detail-text" fill="#7f8c8d">Space: O(log n)</text>
    <text x="90" y="58" text-anchor="middle" class="detail-text" fill="#e74c3c">Worst: O(n²)</text>
    <text x="90" y="72" text-anchor="middle" class="detail-text" fill="#34495e">Tony Hoare, 1959</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="370" r="8" fill="#82ca9d" opacity="0.6"/>
  <circle cx="390" cy="30" r="12" fill="#3498db" opacity="0.4"/>
  <circle cx="400" cy="380" r="6" fill="#f39c12" opacity="0.5"/>
</svg>