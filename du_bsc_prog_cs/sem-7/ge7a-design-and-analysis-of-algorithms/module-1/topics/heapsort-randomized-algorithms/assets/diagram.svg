<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="heapsort-randomized-algorithms" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e8eeff"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="treeNodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="arrayCellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .tree-node { animation: pulse 3s ease-in-out infinite; animation-delay: 1s; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out 1.2s forwards; }
    .formula { animation: fadeIn 0.5s ease-out 1.5s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Heapsort &amp; Randomized Algorithms</text>
  
  <!-- Section 1: Tree Structure -->
  <g class="section-1" data-narration="Binary Max-Heap: Complete binary tree satisfying heap property where parent >= children">
    <text x="15" y="55" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5a67d8">Binary Max-Heap Tree</text>
    <!-- Tree edges -->
    <line x1="70" y1="95" x2="40" y2="130" stroke="#667eea" stroke-width="2" class="arrow-line"/>
    <line x1="70" y1="95" x2="100" y2="130" stroke="#667eea" stroke-width="2" class="arrow-line"/>
    <line x1="40" y1="145" x2="25" y2="180" stroke="#667eea" stroke-width="2" class="arrow-line"/>
    <line x1="40" y1="145" x2="55" y2="180" stroke="#667eea" stroke-width="2" class="arrow-line"/>
    <line x1="100" y1="145" x2="85" y2="180" stroke="#667eea" stroke-width="2" class="arrow-line"/>
    <line x1="100" y1="145" x2="115" y2="180" stroke="#667eea" stroke-width="2" class="arrow-line"/>
    
    <!-- Tree nodes -->
    <circle cx="70" cy="80" r="18" fill="url(#treeNodeGradient)" filter="url(#shadow)" class="tree-node"/>
    <text x="70" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">42</text>
    
    <circle cx="40" cy="130" r="16" fill="url(#treeNodeGradient)" filter="url(#shadow)" class="tree-node"/>
    <text x="40" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">29</text>
    
    <circle cx="100" cy="130" r="16" fill="url(#treeNodeGradient)" filter="url(#shadow)" class="tree-node"/>
    <text x="100" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">18</text>
    
    <circle cx="25" cy="190" r="14" fill="url(#treeNodeGradient)" filter="url(#shadow)" class="tree-node"/>
    <text x="25" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">15</text>
    
    <circle cx="55" cy="190" r="14" fill="url(#treeNodeGradient)" filter="url(#shadow)" class="tree-node"/>
    <text x="55" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">12</text>
    
    <circle cx="85" cy="190" r="14" fill="url(#treeNodeGradient)" filter="url(#shadow)" class="tree-node"/>
    <text x="85" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">8</text>
    
    <circle cx="115" cy="190" r="14" fill="url(#treeNodeGradient)" filter="url(#shadow)" class="tree-node"/>
    <text x="115" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">5</text>
  </g>
  
  <!-- Section 2: Array Representation -->
  <g class="section-2" data-narration="Array representation: Sequential memory storage with indices 0-9 showing parent-child relationships">
    <text x="220" y="55" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d8a5e">Array Representation</text>
    <rect x="220" y="65" width="180" height="130" fill="white" stroke="#43e97b" stroke-width="2" rx="5" filter="url(#shadow)"/>
    
    <!-- Array cells -->
    <g font-family="Arial, sans-serif" font-size="11">
      <rect x="225" y="70" width="30" height="20" fill="#e8eeff" stroke="#667eea"/>
      <text x="228" y="84" fill="#333">idx</text>
      <rect x="255" y="70" width="30" height="20" fill="#e8f5e9" stroke="#43e97b"/>
      <text x="258" y="84" fill="#333">val</text>
      
      <!-- Row 1 -->
      <rect x="225" y="90" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="240" y="103" text-anchor="middle" fill="white" font-weight="bold">0</text>
      <rect x="255" y="90" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="270" y="103" text-anchor="middle" fill="white" font-weight="bold">42</text>
      
      <!-- Row 2 -->
      <rect x="225" y="108" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="240" y="121" text-anchor="middle" fill="white" font-weight="bold">1</text>
      <rect x="255" y="108" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="270" y="121" text-anchor="middle" fill="white" font-weight="bold">29</text>
      
      <!-- Row 3 -->
      <rect x="225" y="126" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="240" y="139" text-anchor="middle" fill="white" font-weight="bold">2</text>
      <rect x="255" y="126" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="270" y="139" text-anchor="middle" fill="white" font-weight="bold">18</text>
      
      <!-- Row 4 -->
      <rect x="225" y="144" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="240" y="157" text-anchor="middle" fill="white" font-weight="bold">3</text>
      <rect x="255" y="144" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="270" y="157" text-anchor="middle" fill="white" font-weight="bold">15</text>
      
      <!-- Row 5 -->
      <rect x="225" y="162" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="240" y="175" text-anchor="middle" fill="white" font-weight="bold">4</text>
      <rect x="255" y="162" width="30" height="18" fill="url(#arrayCellGradient)"/>
      <text x="270" y="175" text-anchor="middle" fill="white" font-weight="bold">12</text>
      
      <!-- Continue array values -->
      <text x="300" y="103" fill="#666" font-size="10">5:8</text>
      <text x="300" y="121" fill="#666" font-size="10">6:5</text>
    </g>
  </g>
  
  <!-- Section 3: Index Formulas -->
  <g class="section-3" data-narration="Index formulas: Parent(i) = floor((i-1)/2), Left(i) = 2i+1, Right(i) = 2i+2">
    <text x="15" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5a67d8">Index Relationships</text>
    <g class="formula">
      <rect x="10" y="235" width="195" height="55" fill="white" stroke="#e53e3e" stroke-width="1" rx="5" filter="url(#shadow)"/>
      <text x="20" y="255" font-family="Arial, sans-serif" font-size="12" fill="#c0392b" font-weight="bold">PARENT(i) = floor((i-1)/2)</text>
      <text x="20" y="275" font-family="Arial, sans-serif" font-size="12" fill="#27ae60" font-weight="bold">LEFT(i) = 2i + 1</text>
      <text x="20" y="285" font-family="Arial, sans-serif" font-size="12" fill="#2980b9" font-weight="bold">RIGHT(i) = 2i + 2</text>
    </g>
  </g>
  
  <!-- Section 4: Complexity Box -->
  <g class="section-4" data-narration="Time complexity: O(n log n) guaranteed, Space: O(1) in-place sorting">
    <rect x="220" y="205" width="180" height="80" fill="white" stroke="#9f7aea" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="310" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#553c9a">Heapsort Complexity</text>
    <text x="310" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2d3748">Time: <tspan fill="#e53e3e" font-weight="bold">O(n log n)</tspan></text>
    <text x="310" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2d3748">Space: <tspan fill="#38a169" font-weight="bold">O(1)</tspan></text>
  </g>
  
  <!-- Section 5: Randomized Algorithms -->
  <g class="section-1" data-narration="Randomized algorithms use random choices for better average-case performance">
    <text x="15" y="305" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#805ad5">Randomized Algorithms</text>
    <rect x="10" y="315" width="195" height="70" fill="white" stroke="#805ad5" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="20" y="335" font-family="Arial, sans-serif" font-size="11" fill="#553c9a">• Randomized Quicksort: Expected O(n log n)</text>
    <text x="20" y="352" font-family="Arial, sans-serif" font-size="11" fill="#553c9a">• Random Select: Expected O(n) time</text>
    <text x="20" y="369" font-family="Arial, sans-serif" font-size="11" fill="#553c9a">• Monte Carlo vs Las Vegas paradigms</text>
  </g>
  
  <!-- Section 6: Key Points -->
  <g class="section-2" data-narration="Key advantages: in-place sorting, guaranteed performance, simple implementation">
    <rect x="220" y="295" width="180" height="90" fill="#faf5ff" stroke="#9f7aea" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="310" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6b46c1">Key Advantages</text>
    <text x="230" y="335" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">✓ In-place sorting (O(1) extra space)</text>
    <text x="230" y="350" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">✓ Guaranteed O(n log n) worst case</text>
    <text x="230" y="365" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">✓ Optimal for memory-constrained systems</text>
    <text x="230" y="380" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">✓ Heap property enables efficient max-extract</text>
  </g>
  
  <!-- Connection arrow between tree and array -->
  <g class="section-3">
    <path d="M140 135 Q180 135 220 100" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e"/>
      </marker>
    </defs>
  </g>
</svg>