<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="dp-approach-knapsack-subset-sum" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#e8f8f4"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b9aa0"/>
      <stop offset="100%" style="stop-color:#7eb8b8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes drawArrow {
        from { stroke-dashoffset: 50; }
        to { stroke-dashoffset: 0; }
      }
      .section-box { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
      .section-1 { animation-delay: 0.2s; }
      .section-2 { animation-delay: 0.5s; }
      .section-3 { animation-delay: 0.8s; }
      .section-4 { animation-delay: 1.1s; }
      .title-anim { animation: slideInUp 0.6s ease-out forwards; }
      .table-cell { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
      .arrow-line { stroke-dasharray: 5, 3; animation: drawArrow 1s linear forwards; }
      .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
      .title { font-family: Georgia, serif; font-weight: bold; }
      .label { font-family: Arial, sans-serif; }
      .formula { font-family: 'Courier New', monospace; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <rect x="0" y="0" width="420" height="50" fill="url(#headerGrad)" rx="0"/>
  <text x="210" y="32" text-anchor="middle" class="title title-anim" fill="white" font-size="18">DP Approach: Knapsack &amp; Subset Sum</text>
  
  <!-- Section 1: DP Properties -->
  <g class="section-box section-1" data-narration="Dynamic Programming relies on optimal substructure and overlapping subproblems">
    <rect x="10" y="60" width="120" height="85" fill="white" stroke="#7eb8b8" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="70" y="78" text-anchor="middle" class="label" fill="#2d6a6a" font-size="12" font-weight="bold">DP Properties</text>
    <circle cx="25" cy="95" r="4" fill="#e07474"/>
    <text x="35" y="99" class="label" fill="#444" font-size="10">Optimal</text>
    <text x="35" y="111" class="label" fill="#444" font-size="10">Substructure</text>
    <circle cx="25" cy="120" r="4" fill="#74b8e0"/>
    <text x="35" y="124" class="label" fill="#444" font-size="10">Overlapping</text>
    <text x="35" y="136" class="label" fill="#444" font-size="10">Subproblems</text>
  </g>
  
  <!-- Section 2: 0/1 Knapsack Table -->
  <g class="section-box section-2" data-narration="The 0/1 Knapsack DP table shows maximum value for each item-capacity combination">
    <rect x="140" y="60" width="145" height="140" fill="white" stroke="#9b7eb8" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="212" y="78" text-anchor="middle" class="label" fill="#6a4a8a" font-size="12" font-weight="bold">0/1 Knapsack DP</text>
    <!-- DP Table Header -->
    <rect x="155" y="85" width="25" height="18" fill="#f0e8f8" stroke="#ccc" stroke-width="1"/>
    <text x="167" y="97" text-anchor="middle" class="label" fill="#444" font-size="9">w\i</text>
    <rect x="180" y="85" width="25" height="18" fill="#e8d8f0" stroke="#ccc" stroke-width="1"/>
    <text x="192" y="97" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <rect x="205" y="85" width="25" height="18" fill="#e8d8f0" stroke="#ccc" stroke-width="1"/>
    <text x="217" y="97" text-anchor="middle" class="label" fill="#444" font-size="9">1</text>
    <rect x="230" y="85" width="25" height="18" fill="#e8d8f0" stroke="#ccc" stroke-width="1"/>
    <text x="242" y="97" text-anchor="middle" class="label" fill="#444" font-size="9">2</text>
    <rect x="255" y="85" width="20" height="18" fill="#e8d8f0" stroke="#ccc" stroke-width="1"/>
    <text x="265" y="97" text-anchor="middle" class="label" fill="#444" font-size="9">3</text>
    <!-- Row 0 -->
    <rect x="155" y="103" width="25" height="18" fill="#f0e8f8" stroke="#ccc" stroke-width="1"/>
    <text x="167" y="115" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <rect x="180" y="103" width="25" height="18" fill="#fff5e6" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 1.2s"/>
    <text x="192" y="115" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <rect x="205" y="103" width="25" height="18" fill="#fff5e6" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 1.3s"/>
    <text x="217" y="115" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <rect x="230" y="103" width="25" height="18" fill="#fff5e6" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 1.4s"/>
    <text x="242" y="115" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <rect x="255" y="103" width="20" height="18" fill="#fff5e6" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 1.5s"/>
    <text x="265" y="115" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <!-- Row 1 -->
    <rect x="155" y="121" width="25" height="18" fill="#f0e8f8" stroke="#ccc" stroke-width="1"/>
    <text x="167" y="133" text-anchor="middle" class="label" fill="#444" font-size="9">1</text>
    <rect x="180" y="121" width="25" height="18" fill="#fff" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 1.6s"/>
    <text x="192" y="133" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <rect x="205" y="121" width="25" height="18" fill="#ffe0b2" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 1.7s"/>
    <text x="217" y="133" text-anchor="middle" class="label formula" fill="#444" font-size="9">6</text>
    <rect x="230" y="121" width="25" height="18" fill="#ffe0b2" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 1.8s"/>
    <text x="242" y="133" text-anchor="middle" class="label formula" fill="#444" font-size="9">6</text>
    <rect x="255" y="121" width="20" height="18" fill="#ffe0b2" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 1.9s"/>
    <text x="265" y="133" text-anchor="middle" class="label formula" fill="#444" font-size="9">6</text>
    <!-- Row 2 -->
    <rect x="155" y="139" width="25" height="18" fill="#f0e8f8" stroke="#ccc" stroke-width="1"/>
    <text x="167" y="151" text-anchor="middle" class="label" fill="#444" font-size="9">2</text>
    <rect x="180" y="139" width="25" height="18" fill="#fff" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 2.0s"/>
    <text x="192" y="151" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <rect x="205" y="139" width="25" height="18" fill="#fff" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 2.1s"/>
    <text x="217" y="151" text-anchor="middle" class="label" fill="#444" font-size="9">6</text>
    <rect x="230" y="139" width="25" height="18" fill="#ffcc80" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 2.2s"/>
    <text x="242" y="151" text-anchor="middle" class="label formula" fill="#444" font-size="9">10</text>
    <rect x="255" y="139" width="20" height="18" fill="#ffcc80" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 2.3s"/>
    <text x="265" y="151" text-anchor="middle" class="label formula" fill="#444" font-size="9">10</text>
    <!-- Row 3 -->
    <rect x="155" y="157" width="25" height="18" fill="#f0e8f8" stroke="#ccc" stroke-width="1"/>
    <text x="167" y="169" text-anchor="middle" class="label" fill="#444" font-size="9">3</text>
    <rect x="180" y="157" width="25" height="18" fill="#fff" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 2.4s"/>
    <text x="192" y="169" text-anchor="middle" class="label" fill="#444" font-size="9">0</text>
    <rect x="205" y="157" width="25" height="18" fill="#fff" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 2.5s"/>
    <text x="217" y="169" text-anchor="middle" class="label" fill="#444" font-size="9">6</text>
    <rect x="230" y="157" width="25" height="18" fill="#fff" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 2.6s"/>
    <text x="242" y="169" text-anchor="middle" class="label" fill="#444" font-size="9">10</text>
    <rect x="255" y="157" width="20" height="18" fill="#ffa726" stroke="#ccc" stroke-width="1" class="table-cell" style="animation-delay: 2.7s"/>
    <text x="265" y="169" text-anchor="middle" class="label formula" fill="#444" font-size="9">15</text>
    <!-- Highlight -->
    <rect x="252" y="154" width="26" height="24" fill="none" stroke="#e07474" stroke-width="2" stroke-dasharray="4,2" rx="2" class="pulse-element"/>
  </g>
  
  <!-- Section 3: Recurrence Formula -->
  <g class="section-box section-3" data-narration="The recurrence relation determines whether to include or exclude each item">
    <rect x="10" y="155" width="120" height="70" fill="white" stroke="#b8907e" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="70" y="172" text-anchor="middle" class="label" fill="#8a6a5a" font-size="11" font-weight="bold">Recurrence</text>
    <text x="70" y="190" text-anchor="middle" class="label formula" fill="#333" font-size="9">if w_i ≤ w:</text>
    <text x="70" y="204" text-anchor="middle" class="label formula" fill="#444" font-size="8">max(DP[i-1][w],</text>
    <text x="70" y="216" text-anchor="middle" class="label formula" fill="#444" font-size="8">v_i + DP[i-1][w-w_i])</text>
    <text x="70" y="228" text-anchor="middle" class="label formula" fill="#333" font-size="9">else: DP[i-1][w]</text>
  </g>
  
  <!-- Section 4: Subset Sum -->
  <g class="section-box section-4" data-narration="Subset Sum determines if any subset can reach a target sum">
    <rect x="295" y="60" width="115" height="95" fill="white" stroke="#90b87e" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="352" y="78" text-anchor="middle" class="label" fill="#5a8a4a" font-size="12" font-weight="bold">Subset Sum</text>
    <text x="305" y="95" class="label" fill="#444" font-size="10">Find if subset sums</text>
    <text x="305" y="107" class="label" fill="#444" font-size="10">to target value T</text>
    <text x="305" y="125" class="label" fill="#666" font-size="10">nums = [3, 34, 4, 12, 5, 2]</text>
    <text x="305" y="140" class="label" fill="#444" font-size="10">target = 9</text>
    <circle cx="395" cy="140" r="8" fill="#90b87e" class="pulse-element"/>
    <text x="395" y="144" text-anchor="middle" fill="white" font-size="10" font-weight="bold">✓</text>
  </g>
  
  <!-- Arrow from DP to Subset Sum -->
  <path d="M 270 90 Q 285 90 290 90" stroke="#888" stroke-width="2" fill="none" class="arrow-line"/>
  <polygon points="290,87 290,93 296,90" fill="#888"/>
  
  <!-- Section 5: Comparison/Connection -->
  <g class="section-box section-3" data-narration="Both problems use similar DP table structures but with different interpretations">
    <rect x="295" y="165" width="115" height="60" fill="white" stroke="#8e90b8" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="352" y="182" text-anchor="middle" class="label" fill="#5a5a8a" font-size="11" font-weight="bold">Key Similarity</text>
    <text x="305" y="198" class="label" fill="#444" font-size="10">Both build 2D table:</text>
    <text x="305" y="212" class="label formula" fill="#555" font-size="9">items × target/capacity</text>
    <text x="305" y="224" class="label" fill="#666" font-size="9">O(n×W) time</text>
  </g>
  
  <!-- Bottom Section: Time/Space Complexity -->
  <g class="section-box section-4" data-narration="Time and space complexity analysis for both problems">
    <rect x="10" y="235" width="200" height="50" fill="white" stroke="#b8a87e" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="110" y="253" text-anchor="middle" class="label" fill="#7a6a4a" font-size="11" font-weight="bold">Complexity Analysis</text>
    <text x="25" y="270" class="label" fill="#555" font-size="10">Time: O(n × W)</text>
    <text x="130" y="270" class="label" fill="#555" font-size="10">Space: O(n × W)</text>
  </g>
  
  <!-- Decision arrows visualization -->
  <g class="section-box section-2">
    <rect x="220" y="205" width="60" height="25" fill="#e8f8e8" stroke="#7eb87e" stroke-width="1" rx="4"/>
    <text x="250" y="220" text-anchor="middle" class="label" fill="#4a6a4a" font-size="9">Include?</text>
    <text x="250" y="232" text-anchor="middle" class="label" fill="#555" font-size="8">Exclude</text>
    <path d="M 238 218 L 225 218" stroke="#e07474" stroke-width="2" fill="none" marker-end="url(#arrowhead1)"/>
    <path d="M 262 218 L 275 218" stroke="#74b874" stroke-width="2" fill="none"/>
  </g>
  
  <defs>
    <marker id="arrowhead1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#e07474"/>
    </marker>
  </defs>
  
  <!-- Final Answer indicator -->
  <g class="section-box section-4" data-narration="The final answer is found at DP[n][W] - the bottom-right cell">
    <rect x="220" y="235" width="80" height="50" fill="#fff5e6" stroke="#e0a874" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="260" y="252" text-anchor="middle" class="label" fill="#8a6a4a" font-size="10" font-weight="bold">Answer</text>
    <text x="260" y="268" text-anchor="middle" class="label formula" fill="#444" font-size="11">DP[n][W]</text>
    <text x="260" y="280" text-anchor="middle" class="label" fill="#666" font-size="8">= 15</text>
  </g>
  
  <!-- Bottom border decorative -->
  <rect x="0" y="390" width="420" height="10" fill="url(#headerGrad)" opacity="0.3"/>
  
</svg>