<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="security-design-principles">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="perimeterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="networkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd9b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb366;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="endpointGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9f7be;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95de64;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="applicationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66b3ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d6d6f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9999ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title-text { animation: fadeIn 1s ease-out; }
    .layer-1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .layer-2 { animation: slideInLeft 0.8s ease-out 0.4s both; }
    .layer-3 { animation: slideInLeft 0.8s ease-out 0.6s both; }
    .layer-4 { animation: slideInLeft 0.8s ease-out 0.8s both; }
    .layer-5 { animation: slideInLeft 0.8s ease-out 1.0s both; }
    .icon-pulse { animation: pulse 2s ease-in-out infinite; }
    .shield-icon { animation: fadeIn 1.5s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title-text">Defense in Depth</text>
  <text x="210" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e">Multi-Layered Security Approach</text>
  
  <!-- Layer 1: Perimeter Security -->
  <g class="layer-1" data-narration="Perimeter Security - The outermost layer with Firewall and IDS/IPS protecting the network boundary">
    <rect x="15" y="60" width="390" height="58" rx="6" fill="url(#perimeterGrad)" filter="url(#shadow)"/>
    <text x="30" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b0000">Perimeter Security</text>
    <text x="30" y="95" font-family="Arial, sans-serif" font-size="11" fill="#8b0000">Firewall • IDS/IPS • DMZ</text>
    <circle cx="370" cy="89" r="18" fill="#ff6b6b" class="icon-pulse"/>
    <path d="M360 89 L370 79 L385 95 L375 95 L370 90 L378 89" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Layer 2: Network Security -->
  <g class="layer-2" data-narration="Network Security - Segmented networks and VLANs isolate critical systems">
    <rect x="15" y="125" width="390" height="58" rx="6" fill="url(#networkGrad)" filter="url(#shadow)"/>
    <text x="30" y="143" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b4513">Network Security</text>
    <text x="30" y="160" font-family="Arial, sans-serif" font-size="11" fill="#8b4513">Segmented Networks • VLANs</text>
    <circle cx="370" cy="154" r="18" fill="#ffa64d" class="icon-pulse"/>
    <rect x="360" y="142" width="20" height="24" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <line x1="365" y1="148" x2="385" y2="148" stroke="white" stroke-width="2"/>
    <line x1="365" y1="154" x2="385" y2="154" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Layer 3: Endpoint Security -->
  <g class="layer-3" data-narration="Endpoint Security - Antivirus and endpoint detection protect individual devices">
    <rect x="15" y="190" width="390" height="58" rx="6" fill="url(#endpointGrad)" filter="url(#shadow)"/>
    <text x="30" y="208" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#006400">Endpoint Security</text>
    <text x="30" y="225" font-family="Arial, sans-serif" font-size="11" fill="#006400">Antivirus • EDR • Device Control</text>
    <circle cx="370" cy="219" r="18" fill="#52be80" class="icon-pulse"/>
    <rect x="362" y="205" width="16" height="22" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="370" cy="232" r="3" fill="white"/>
    <rect x="368" y="212" width="4" height="12" fill="white"/>
  </g>
  
  <!-- Layer 4: Application Security -->
  <g class="layer-4" data-narration="Application Security - Input validation and secure coding prevent software vulnerabilities">
    <rect x="15" y="255" width="390" height="58" rx="6" fill="url(#applicationGrad)" filter="url(#shadow)"/>
    <text x="30" y="273" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a5276">Application Security</text>
    <text x="30" y="290" font-family="Arial, sans-serif" font-size="11" fill="#1a5276">Input Validation • Secure Coding</text>
    <circle cx="370" cy="284" r="18" fill="#4da6ff" class="icon-pulse"/>
    <text x="362" y="290" font-family="monospace" font-size="16" fill="white" font-weight="bold">&lt;/&gt;</text>
  </g>
  
  <!-- Layer 5: Data Security -->
  <g class="layer-5" data-narration="Data Security - Encryption and access control protect the most valuable assets">
    <rect x="15" y="320" width="390" height="58" rx="6" fill="url(#dataGrad)" filter="url(#shadow)"/>
    <text x="30" y="338" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4b0082">Data Security</text>
    <text x="30" y="355" font-family="Arial, sans-serif" font-size="11" fill="#4b0082">Encryption • Access Control • Backup</text>
    <circle cx="370" cy="349" r="18" fill="#8080ff" class="icon-pulse"/>
    <rect x="362" y="337" width="16" height="16" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="370" cy="345" r="4" fill="white"/>
    <line x1="366" y1="355" x2="374" y2="355" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Shield Icon in center -->
  <g class="shield-icon">
    <path d="M210 360 L200 370 L200 385 L220 390 L230 385 L230 370 Z" fill="#2c3e50" opacity="0.15"/>
  </g>
  
  <!-- Arrow indicators showing flow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d6d7e"/>
    </marker>
  </defs>
  
  <!-- Inner arrows showing protection going inward -->
  <line x1="390" y1="180" x2="390" y2="160" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.6"/>
  <line x1="390" y1="245" x2="390" y2="225" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.6"/>
  <line x1="390" y1="310" x2="390" y2="290" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.6"/>
  <line x1="390" y1="375" x2="390" y2="355" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.6"/>
  
  <!-- Key principle box -->
  <rect x="15" y="370" width="130" height="22" rx="4" fill="#2c3e50" opacity="0.9"/>
  <text x="80" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">DEFENSE IN DEPTH</text>
</svg>