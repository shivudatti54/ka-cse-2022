<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="security-concepts-threats-attacks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="confidentialityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="integrityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3dbdb5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="availabilityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe66d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd93d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .pillar { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .pillar-1 { animation-delay: 0.2s; }
    .pillar-2 { animation-delay: 0.4s; }
    .pillar-3 { animation-delay: 0.6s; }
    .box { animation: slideInLeft 0.7s ease-out forwards; opacity: 0; }
    .box-1 { animation-delay: 0.8s; }
    .box-2 { animation-delay: 1s; }
    .box-3 { animation-delay: 1.2s; }
    .box-4 { animation-delay: 1.4s; }
    .connector { animation: fadeIn 1.5s ease-out; }
    .threat { animation: pulse 2s infinite; }
    .threat-icon { animation: pulse 1.5s infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Security Concepts, Threats &amp; Attacks</text>
  <text x="210" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d6d7e" class="title">The CIA Triad Foundation</text>
  
  <g class="connector">
    <path d="M145 120 Q210 90 275 120" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M275 120 Q310 160 275 200" stroke="#95a5a6" stroke-width="2" fill="none"/>
    <path d="M275 200 Q210 230 145 200" stroke="#95a5a6" stroke-width="2" fill="none"/>
    <path d="M145 200 Q110 160 145 120" stroke="#95a5a6" stroke-width="2" fill="none"/>
  </g>
  
  <g class="pillar pillar-1" filter="url(#shadow)">
    <circle cx="145" cy="120" r="38" fill="url(#confidentialityGrad)"/>
    <text x="145" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">C</text>
    <text x="145" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Confidentiality</text>
  </g>
  
  <g class="pillar pillar-2" filter="url(#shadow)">
    <circle cx="275" cy="120" r="38" fill="url(#integrityGrad)"/>
    <text x="275" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">I</text>
    <text x="275" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Integrity</text>
  </g>
  
  <g class="pillar pillar-3" filter="url(#shadow)">
    <circle cx="210" cy="200" r="38" fill="url(#availabilityGrad)"/>
    <text x="210" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#5d6d7e">A</text>
    <text x="210" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#5d6d7e">Availability</text>
  </g>
  
  <g data-narration="Confidentiality prevents unauthorized access to sensitive information through encryption and access controls">
    <rect x="30" y="250" width="115" height="40" rx="5" fill="#ffebee" stroke="#ff6b6b" stroke-width="1.5" class="box box-1"/>
    <text x="87" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c0392b">CONFIDENTIALITY</text>
    <text x="87" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">Prevents unauthorized</text>
    <text x="87" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">access &amp; disclosure</text>
  </g>
  
  <g data-narration="Integrity ensures data accuracy and prevents unauthorized modification">
    <rect x="155" y="250" width="110" height="40" rx="5" fill="#e8f8f5" stroke="#4ecdc4" stroke-width="1.5" class="box box-2"/>
    <text x="210" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a085">INTEGRITY</text>
    <text x="210" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">Maintains data</text>
    <text x="210" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">accuracy &amp; consistency</text>
  </g>
  
  <g data-narration="Availability ensures reliable and timely access to information for authorized users">
    <rect x="275" y="250" width="115" height="40" rx="5" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" class="box box-3"/>
    <text x="332" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d68910">AVAILABILITY</text>
    <text x="332" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">Ensures reliable</text>
    <text x="332" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">access when needed</text>
  </g>
  
  <g data-narration="Common attack vectors include malware, phishing, man-in-the-middle, and denial of service attacks">
    <rect x="120" y="310" width="180" height="35" rx="5" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5" class="box box-4"/>
    <text x="210" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d35400">COMMON ATTACK VECTORS</text>
    <text x="210" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">Malware • Phishing • MITM • DoS</text>
  </g>
  
  <g class="threat" transform="translate(365, 80)">
    <circle cx="0" cy="0" r="18" fill="#e74c3c"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">!</text>
  </g>
  
  <g class="threat-icon" transform="translate(55, 160)">
    <path d="M0,-10 L10,10 L-10,10 Z" fill="#9b59b6"/>
  </g>
  
  <g class="threat-icon" transform="translate(365, 180)">
    <circle cx="0" cy="0" r="12" fill="#3498db"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">?</text>
  </g>
  
  <line x1="55" y1="150" x2="115" y2="135" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,2" class="connector"/>
  <line x1="355" y1="170" x2="305" y2="160" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,2" class="connector"/>
  
  <text x="55" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#9b59b6">Threats</text>
  <text x="360" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#3498db">Vulnerabilities</text>
  
  <g data-narration="The CIA Triad forms the foundation of information security, guiding policy and technology decisions">
    <rect x="140" y="355" width="140" height="20" rx="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="210" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Core Security Principles</text>
  </g>
</svg>