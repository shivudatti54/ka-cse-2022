<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="access-control-models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="dacGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="macGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="rbacGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
    <linearGradient id="abacGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365"/>
      <stop offset="100%" style="stop-color:#fda085"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { animation: fadeIn 0.8s ease-out forwards; }
    .box-dac { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-mac { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-rbac { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-abac { animation: slideIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 100; animation: drawArrow 1s ease-out 0.8s forwards; stroke-dashoffset: 100; }
    .concept-box { animation: fadeIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .pulse-group:hover { animation: pulse 1s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title-text">Access Control Models</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#3498db" stroke-width="2" class="title-text"/>
  
  <!-- DAC Box -->
  <g class="box-dac pulse-group" data-narration="Discretionary Access Control (DAC) - Owner-controlled resource permissions">
    <rect x="20" y="60" width="85" height="70" rx="8" fill="url(#dacGradient)" filter="url(#shadow)"/>
    <text x="62" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">DAC</text>
    <text x="62" y="96" text-anchor="middle" font-size="9" fill="#34495e">Discretionary</text>
    <rect x="28" y="106" width="69" height="18" rx="3" fill="#fff" stroke="#e74c3c" stroke-width="1"/>
    <text x="62" y="118" text-anchor="middle" font-size="8" fill="#e74c3c">Owner</text>
    <text x="62" y="128" text-anchor="middle" font-size="8" fill="#e74c3c">Controlled</text>
  </g>
  
  <!-- MAC Box -->
  <g class="box-mac pulse-group" data-narration="Mandatory Access Control (MAC) - System-enforced security labels">
    <rect x="315" y="60" width="85" height="70" rx="8" fill="url(#macGradient)" filter="url(#shadow)"/>
    <text x="357" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">MAC</text>
    <text x="357" y="96" text-anchor="middle" font-size="9" fill="#34495e">Mandatory</text>
    <rect x="323" y="106" width="69" height="18" rx="3" fill="#fff" stroke="#9b59b6" stroke-width="1"/>
    <text x="357" y="118" text-anchor="middle" font-size="8" fill="#9b59b6">System</text>
    <text x="357" y="128" text-anchor="middle" font-size="8" fill="#9b59b6">Enforced</text>
  </g>
  
  <!-- RBAC Box -->
  <g class="box-rbac pulse-group" data-narration="Role-Based Access Control (RBAC) - Permissions based on organizational roles">
    <rect x="115" y="165" width="95" height="75" rx="8" fill="url(#rbacGradient)" filter="url(#shadow)"/>
    <text x="162" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">RBAC</text>
    <text x="162" y="208" text-anchor="middle" font-size="9" fill="#34495e">Role-Based</text>
    <rect x="125" y="218" width="75" height="16" rx="3" fill="#fff" stroke="#2980b9" stroke-width="1"/>
    <text x="162" y="230" text-anchor="middle" font-size="8" fill="#2980b9">Admin/User</text>
  </g>
  
  <!-- ABAC Box -->
  <g class="box-abac pulse-group" data-narration="Attribute-Based Access Control (ABAC) - Dynamic policies using user/resource attributes">
    <rect x="210" y="270" width="100" height="80" rx="8" fill="url(#abacGradient)" filter="url(#shadow)"/>
    <text x="260" y="298" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">ABAC</text>
    <text x="260" y="316" text-anchor="middle" font-size="9" fill="#34495e">Attribute-Based</text>
    <rect x="220" y="326" width="80" height="18" rx="3" fill="#fff" stroke="#e67e22" stroke-width="1"/>
    <text x="260" y="339" text-anchor="middle" font-size="8" fill="#e67e22">Dynamic Policies</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g class="arrow-line">
    <line x1="105" y1="95" x2="115" y2="165" stroke="#7f8c8d" stroke-width="2"/>
    <polygon points="115,165 108,158 108,172" fill="#7f8c8d"/>
  </g>
  <g class="arrow-line">
    <line x1="210" y1="200" x2="210" y2="270" stroke="#7f8c8d" stroke-width="2"/>
    <polygon points="210,270 203,263 217,263" fill="#7f8c8d"/>
  </g>
  <g class="arrow-line">
    <line x1="260" y1="165" x2="260" y2="270" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Complexity Arrow -->
  <g class="concept-box">
    <line x1="62" y1="145" x2="62" y2="160" stroke="#95a5a6" stroke-width="1"/>
    <line x1="62" y1="160" x2="357" y2="160" stroke="#95a5a6" stroke-width="1"/>
    <line x1="357" y1="160" x2="357" y2="145" stroke="#95a5a6" stroke-width="1"/>
    <text x="210" y="155" text-anchor="middle" font-size="8" fill="#7f8c8d" transform="rotate(180, 210, 155)">Complexity →</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key concept: Least Privilege - granting minimum permissions necessary">
    <rect x="15" y="360" width="130" height="32" rx="4" fill="#fff" stroke="#2ecc71" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="374" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">Least Privilege</text>
    <text x="80" y="386" text-anchor="middle" font-size="7" fill="#7f8c8d">Min. permissions</text>
  </g>
  
  <g class="concept-box" data-narration="Key concept: Authorization determines what authenticated users can do">
    <rect x="155" y="360" width="130" height="32" rx="4" fill="#fff" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="220" y="374" text-anchor="middle" font-size="9" font-weight="bold" fill="#2980b9">Authorization</text>
    <text x="220" y="386" text-anchor="middle" font-size="7" fill="#7f8c8d">What you can do</text>
  </g>
  
  <g class="concept-box" data-narration="Evolution: DAC → RBAC → ABAC shows increasing flexibility and granularity">
    <rect x="295" y="360" width="110" height="32" rx="4" fill="#fff" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="350" y="374" text-anchor="middle" font-size="9" font-weight="bold" fill="#8e44ad">Flexibility</text>
    <text x="350" y="386" text-anchor="middle" font-size="7" fill="#7f8c8d">Increases →</text>
  </g>
</svg>