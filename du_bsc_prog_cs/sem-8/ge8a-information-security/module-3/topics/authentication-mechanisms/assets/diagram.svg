<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="authentication-mechanisms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="factor1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="factor2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="factor3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2bec3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes iconPulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .factor-box { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .factor-box-2 { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .factor-box-3 { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .concept-box { animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0; }
    .icon-group { animation: iconPulse 2s ease-in-out infinite; }
    .connector { animation: fadeIn 0.8s ease-out 0.8s forwards; opacity: 0; }
    .center-auth { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2d3436" class="title">Authentication Mechanisms</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#636e72">Three-Factor Authentication Model</text>
  
  <!-- Factor 1: Something You Know -->
  <g class="factor-box" style="animation-delay: 0.2s;">
    <rect x="15" y="80" width="120" height="95" rx="8" fill="url(#factor1Grad)" filter="url(#shadow)" data-narration="Knowledge Factor: Something You Know - Includes passwords, PINs, and security questions that only the user should know"/>
    <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Something You</text>
    <text x="75" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Know</text>
    <text x="75" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• Password</text>
    <text x="75" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• PIN</text>
    <text x="75" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• Security Questions</text>
  </g>
  
  <!-- Factor 2: Something You Have -->
  <g class="factor-box-2" style="animation-delay: 0.4s;">
    <rect x="150" y="80" width="120" height="95" rx="8" fill="url(#factor2Grad)" filter="url(#shadow)" data-narration="Possession Factor: Something You Have - Physical tokens, smart cards, or mobile devices that the user possesses"/>
    <text x="210" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Something You</text>
    <text x="210" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Have</text>
    <text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• Smart Card</text>
    <text x="210" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• Token</text>
    <text x="210" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• Mobile Phone</text>
  </g>
  
  <!-- Factor 3: Something You Are -->
  <g class="factor-box-3" style="animation-delay: 0.6s;">
    <rect x="285" y="80" width="120" height="95" rx="8" fill="url(#factor3Grad)" filter="url(#shadow)" data-narration="Inherence Factor: Something You Are - Biometric characteristics unique to the individual user"/>
    <text x="345" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Something You</text>
    <text x="345" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2d3436">Are</text>
    <text x="345" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• Fingerprint</text>
    <text x="345" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• Face</text>
    <text x="345" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">• Iris</text>
  </g>
  
  <!-- Center Authentication Circle -->
  <g class="center-auth" style="transform-origin: 210px 230px;">
    <circle cx="210" cy="230" r="45" fill="#6c5ce7" filter="url(#shadow)" data-narration="Multi-Factor Authentication combines two or more factors for enhanced security"/>
    <text x="210" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Multi-Factor</text>
    <text x="210" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Authentication</text>
  </g>
  
  <!-- Connectors -->
  <g class="connector">
    <line x1="135" y1="127" x2="165" y2="200" stroke="#a29bfe" stroke-width="2" stroke-dasharray="4"/>
    <line x1="255" y1="127" x2="225" y2="200" stroke="#a29bfe" stroke-width="2" stroke-dasharray="4"/>
    <line x1="75" y1="175" x2="160" y2="230" stroke="#a29bfe" stroke-width="2" stroke-dasharray="4"/>
    <line x1="345" y1="175" x2="260" y2="230" stroke="#a29bfe" stroke-width="2" stroke-dasharray="4"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="concept-box">
    <rect x="15" y="290" width="390" height="50" rx="6" fill="white" stroke="#dfe6e9" stroke-width="1" filter="url(#shadow)" data-narration="The AAA Framework: Authentication verifies identity, Authorization determines access rights, and Accounting tracks user activities"/>
    <text x="210" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3436">AAA Framework</text>
    <text x="210" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#636e72">Authentication → Authorization → Accounting</text>
  </g>
  
  <!-- Bottom Legend -->
  <g class="concept-box" style="animation-delay: 0.8s;">
    <rect x="15" y="350" width="390" height="40" rx="6" fill="#f8f9fa" stroke="#e9ecef" data-narration="Strong authentication requires combining multiple factors for maximum security"/>
    <circle cx="55" cy="370" r="8" fill="#00b894"/>
    <text x="70" y="374" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">Single Factor</text>
    <circle cx="160" cy="370" r="8" fill="#fdcb6e"/>
    <text x="175" y="374" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">Two Factor</text>
    <circle cx="280" cy="370" r="8" fill="#6c5ce7"/>
    <text x="295" y="374" font-family="Arial, sans-serif" font-size="11" fill="#2d3436">Multi-Factor</text>
    <text x="370" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#636e72">MFA</text>
  </g>
</svg>