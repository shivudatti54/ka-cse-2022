<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-attacks-firewalls">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8e4f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cceeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ffe6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ddffcc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6ccff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; opacity: 0.7; }
      50% { stroke-width: 3; opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s infinite; }
    .pulse-icon { animation: pulse 2s infinite; transform-origin: center; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Network Attacks &amp; Firewalls</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5d6d7e" class="subtitle">Firewall Types Comparison</text>
  
  <!-- Box 1: Packet Filter -->
  <g class="box1" data-narration="Packet Filter Firewall operates at Layer 3 (Network layer), performing basic header inspection to filter traffic based on IP addresses, ports, and protocols.">
    <rect x="15" y="70" width="90" height="130" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="60" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d35400">Packet Filter</text>
    <rect x="25" y="100" width="70" height="25" rx="4" fill="#f39c12" opacity="0.3"/>
    <text x="60" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d35400">Layer 3</text>
    <text x="60" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Header</text>
    <text x="60" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Inspection</text>
    <circle cx="60" cy="178" r="12" fill="#e74c3c" class="pulse-icon"/>
    <text x="60" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">IP</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="110" y1="135" x2="140" y2="135" stroke="#3498db" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Box 2: Stateful Inspection -->
  <g class="box2" data-narration="Stateful Inspection Firewall operates at Layers 3-4, tracking connection state and maintaining a state table to make smarter filtering decisions.">
    <rect x="145" y="70" width="90" height="130" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="190" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">Stateful</text>
    <text x="190" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">Inspection</text>
    <rect x="155" y="112" width="70" height="25" rx="4" fill="#3498db" opacity="0.3"/>
    <text x="190" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">Layer 3-4</text>
    <text x="190" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Connection</text>
    <text x="190" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Tracking</text>
    <rect x="170" y="172" width="40" height="20" rx="3" fill="#27ae60" class="pulse-icon"/>
    <text x="190" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">STATE</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="240" y1="135" x2="270" y2="135" stroke="#3498db" stroke-width="2" class="arrow"/>
  
  <!-- Box 3: Application Proxy -->
  <g class="box3" data-narration="Application Proxy Firewall operates at Layer 7 (Application layer), performing full content inspection and acting as an intermediary for application traffic.">
    <rect x="275" y="70" width="90" height="130" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="320" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">Application</text>
    <text x="320" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">Proxy</text>
    <rect x="285" y="112" width="70" height="25" rx="4" fill="#2ecc71" opacity="0.3"/>
    <text x="320" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">Layer 7</text>
    <text x="320" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Full Content</text>
    <text x="320" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Inspection</text>
    <rect x="300" y="172" width="40" height="20" rx="3" fill="#9b59b6" class="pulse-icon"/>
    <text x="320" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">APP</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="370" y1="135" x2="400" y2="135" stroke="#3498db" stroke-width="2" class="arrow"/>
  
  <!-- Box 4: Next-Gen Firewall -->
  <g class="box4" data-narration="Next-Generation Firewall combines all previous technologies with integrated threat prevention, intrusion detection, and application-level control.">
    <rect x="15" y="220" width="375" height="70" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="202" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#8e44ad">Next-Generation Firewall (NGFW)</text>
    <text x="202" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Integrated Threat Prevention • IDS/IPS • Application Control • Deep Packet Inspection</text>
    <rect x="340" y="235" width="40" height="40" rx="20" fill="#e74c3c" class="pulse-icon"/>
    <text x="360" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">NGFW</text>
  </g>
  
  <!-- Attack Visualization Section -->
  <g class="box4" data-narration="Network attacks include Passive attacks (monitoring) and Active attacks (DoS, DDoS) that firewalls help mitigate.">
    <rect x="15" y="305" width="180" height="80" rx="8" fill="#ffefef" filter="url(#shadow)"/>
    <text x="105" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c0392b">Network Attacks</text>
    <text x="105" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Passive: Monitoring</text>
    <text x="105" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Active: DoS/DDoS</text>
    <text x="105" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c" font-weight="bold">14+ lakh incidents (2022)</text>
  </g>
  
  <!-- Firewall Protection Section -->
  <g class="box4" data-narration="Firewalls serve as the first line of defense, creating a barrier between trusted internal networks and untrusted external networks.">
    <rect x="210" y="305" width="180" height="80" rx="8" fill="#e8f8f5" filter="url(#shadow)"/>
    <text x="300" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#16a085">Firewall Protection</text>
    <text x="300" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">First Line of Defense</text>
    <text x="300" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Trusted vs Untrusted</text>
    <text x="300" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#16a085" font-weight="bold">Security Barrier</text>
  </g>
  
  <!-- Evolution Arrow -->
  <defs>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8e44ad"/>
    </marker>
  </defs>
  <path d="M 90 210 L 330 210" stroke="#8e44ad" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowRight)"/>
  <text x="210" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8e44ad" font-style="italic">Evolution →</text>
</svg>