<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="cloud-security-approaches">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="providerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="customerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6fb890;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInTop {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInBottom {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .provider-box { animation: slideInTop 0.8s ease-out; }
    .customer-box { animation: slideInBottom 0.8s ease-out; }
    .section { animation: fadeIn 1.2s ease-out; }
    .pulse-element { animation: pulse 2s infinite; }
    .arrow-line { animation: arrowPulse 1.5s infinite; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; fill: #2c5f7c; }
    .label-text { font-size: 14px; font-weight: bold; fill: #fff; }
    .detail-text { font-size: 11px; fill: #fff; }
    .iaas-label { font-size: 13px; font-weight: bold; fill: #2c5f7c; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title">Cloud Security: Shared Responsibility Model</text>
  
  <!-- Column Headers - IaaS, PaaS, SaaS -->
  <g class="section">
    <rect x="10" y="45" width="125" height="22" fill="#4a90b8" rx="4" filter="url(#shadow)"/>
    <text x="72" y="60" text-anchor="middle" class="iaas-label" fill="white">IaaS</text>
    
    <rect x="145" y="45" width="125" height="22" fill="#5aa0c2" rx="4" filter="url(#shadow)"/>
    <text x="207" y="60" text-anchor="middle" class="iaas-label" fill="white">PaaS</text>
    
    <rect x="280" y="45" width="130" height="22" fill="#6ab0cc" rx="4" filter="url(#shadow)"/>
    <text x="345" y="60" text-anchor="middle" class="iaas-label" fill="white">SaaS</text>
  </g>
  
  <!-- Provider Responsibility Section -->
  <g class="provider-box" data-narration="Cloud Service Provider handles physical infrastructure, network security, and hypervisor security - these form the foundation of cloud security">
    <rect x="10" y="75" width="400" height="115" fill="url(#providerGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="92" text-anchor="middle" class="label-text" font-size="15">PROVIDER RESPONSIBILITY (Security "in" the Cloud)</text>
    
    <!-- IaaS Provider -->
    <g data-narration="In IaaS, provider secures physical data centers, network infrastructure, and hypervisor">
      <rect x="15" y="100" width="115" height="80" fill="#4a7fa8" rx="5"/>
      <text x="72" y="118" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Physical Security</text>
      <text x="72" y="132" text-anchor="middle" class="detail-text" font-size="9">Data Centers</text>
      <text x="72" y="146" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Network Security</text>
      <text x="72" y="160" text-anchor="middle" class="detail-text" font-size="9">Infrastructure</text>
      <text x="72" y="174" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Hypervisor</text>
    </g>
    
    <!-- PaaS Provider -->
    <g data-narration="In PaaS, provider additionally handles runtime and OS security">
      <rect x="140" y="100" width="115" height="80" fill="#5a8fb8" rx="5"/>
      <text x="207" y="118" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Physical Security</text>
      <text x="207" y="132" text-anchor="middle" class="detail-text" font-size="9">Data Centers</text>
      <text x="207" y="146" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Network Security</text>
      <text x="207" y="160" text-anchor="middle" class="detail-text" font-size="9">+ Runtime</text>
    </g>
    
    <!-- SaaS Provider -->
    <g data-narration="In SaaS, provider handles most backend security including applications">
      <rect x="265" y="100" width="135" height="80" fill="#6a9fc8" rx="5"/>
      <text x="332" y="118" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Physical Security</text>
      <text x="332" y="132" text-anchor="middle" class="detail-text" font-size="9">Data Centers</text>
      <text x="332" y="146" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Network + Runtime</text>
      <text x="332" y="160" text-anchor="middle" class="detail-text" font-size="9">+ Applications</text>
    </g>
  </g>
  
  <!-- Arrow indicators -->
  <g class="arrow-line">
    <polygon points="210,195 205,205 215,205" fill="#2c5f7c"/>
    <line x1="210" y1="195" x2="210" y2="205" stroke="#2c5f7c" stroke-width="2"/>
  </g>
  
  <!-- Customer Responsibility Section -->
  <g class="customer-box" data-narration="Customer is responsible for data classification, access management, application security, and configuration - critical for preventing breaches">
    <rect x="10" y="210" width="400" height="115" fill="url(#customerGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="227" text-anchor="middle" class="label-text" font-size="15" fill="#1a4a32">CUSTOMER RESPONSIBILITY (Security "of" the Cloud)</text>
    
    <!-- IaaS Customer -->
    <g data-narration="In IaaS, customer manages OS, applications, data, and network configuration">
      <rect x="15" y="240" width="115" height="75" fill="#4a9068" rx="5"/>
      <text x="72" y="258" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Guest OS Security</text>
      <text x="72" y="272" text-anchor="middle" class="detail-text" font-size="9">Middleware</text>
      <text x="72" y="286" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Applications</text>
      <text x="72" y="300" text-anchor="middle" class="detail-text" font-size="9">Data</text>
    </g>
    
    <!-- PaaS Customer -->
    <g data-narration="In PaaS, customer focuses on application code, data, and access management">
      <rect x="140" y="240" width="115" height="75" fill="#5aa078" rx="5"/>
      <text x="207" y="258" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Applications</text>
      <text x="207" y="272" text-anchor="middle" class="detail-text" font-size="9">Data</text>
      <text x="207" y="286" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Access Management</text>
      <text x="207" y="300" text-anchor="middle" class="detail-text" font-size="9">Configuration</text>
    </g>
    
    <!-- SaaS Customer -->
    <g data-narration="In SaaS, customer primarily manages data access and user permissions">
      <rect x="265" y="240" width="135" height="75" fill="#6ab088" rx="5"/>
      <text x="332" y="258" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Data Management</text>
      <text x="332" y="272" text-anchor="middle" class="detail-text" font-size="9">User Access</text>
      <text x="332" y="286" text-anchor="middle" class="detail-text" font-size="10" font-weight="bold">Identity (IAM)</text>
      <text x="332" y="300" text-anchor="middle" class="detail-text" font-size="9">Compliance</text>
    </g>
  </g>
  
  <!-- Key Insight Box -->
  <g class="pulse-element" data-narration="According to CSA, misconfiguration causes 70% of cloud breaches - making customer security responsibilities critical">
    <rect x="10" y="335" width="400" height="50" fill="#fff5e6" rx="8" stroke="#e6a23c" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="355" text-anchor="middle" class="detail-text" font-size="12" fill="#8a5a1a" font-weight="bold">Key Insight: CSA Reports ~70% of Cloud Breaches Due to Misconfiguration</text>
    <text x="210" y="372" text-anchor="middle" class="detail-text" font-size="10" fill="#8a5a1a">Shared responsibility requires vigilance from both provider AND customer</text>
  </g>
  
  <!-- Decorative cloud elements -->
  <g opacity="0.3">
    <ellipse cx="50" cy="380" rx="25" ry="12" fill="#87ceeb"/>
    <ellipse cx="380" cy="380" rx="20" ry="10" fill="#87ceeb"/>
  </g>
</svg>