<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="iot-wireless-security">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e9f7"/>
      <stop offset="100%" style="stop-color:#c2e0ec"/>
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4fc79"/>
      <stop offset="100%" style="stop-color:#96e6a1"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="layer4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#c3cfe2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes wifiPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .layer-box { animation: slideInLeft 0.8s ease-out forwards; opacity: 0; }
    .layer-box-1 { animation-delay: 0.2s; }
    .layer-box-2 { animation-delay: 0.4s; }
    .layer-box-3 { animation-delay: 0.6s; }
    .layer-box-4 { animation-delay: 0.8s; }
    .icon { animation: float 3s ease-in-out infinite; }
    .wifi-signal { animation: wifiPulse 2s ease-in-out infinite; }
    .arrow { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
    .security-badge { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">IoT Wireless Security</text>
  <text x="210" y="50" text-anchor="middle" font-size="11" fill="#5d6d7e" class="title">Architecture Layers &amp; Security</text>
  
  <!-- Layer 1: Perception Layer -->
  <g class="layer-box layer-box-1" data-narration="Perception Layer: Contains sensors and actuators that interact with the physical world. Security concerns include physical security and device authentication.">
    <rect x="20" y="65" width="380" height="70" rx="8" fill="url(#layer1Grad)" filter="url(#shadow)"/>
    <text x="35" y="82" font-size="14" font-weight="bold" fill="#c0392b">Perception Layer</text>
    <g class="icon">
      <circle cx="60" cy="110" r="12" fill="#e74c3c" opacity="0.8"/>
      <circle cx="60" cy="110" r="6" fill="#fff"/>
      <path d="M50 118 L60 108 L70 118" stroke="#c0392b" stroke-width="2" fill="none"/>
    </g>
    <text x="85" y="105" font-size="11" fill="#7f2c1e">Sensors</text>
    <text x="85" y="118" font-size="11" fill="#7f2c1e">Actuators</text>
    <rect x="180" y="85" width="90" height="35" rx="4" fill="#fff" opacity="0.7"/>
    <text x="190" y="100" font-size="10" fill="#c0392b" font-weight="bold">Security:</text>
    <text x="190" y="113" font-size="9" fill="#7f2c1e">Physical, Auth</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow" style="animation-delay: 0.3s">
    <path d="M210 135 L210 150" stroke="#3498db" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="205,145 210,155 215,145" fill="#3498db"/>
  </g>
  
  <!-- Layer 2: Network Layer -->
  <g class="layer-box layer-box-2" data-narration="Network Layer: Handles data transmission using wireless protocols like Wi-Fi, Zigbee, and BLE. Security focuses on encryption and protocol security.">
    <rect x="20" y="155" width="380" height="70" rx="8" fill="url(#layer2Grad)" filter="url(#shadow)"/>
    <text x="35" y="172" font-size="14" font-weight="bold" fill="#1e8449">Network Layer</text>
    <g class="wifi-signal">
      <path d="M45 195 Q60 180 75 195" stroke="#27ae60" stroke-width="2" fill="none"/>
      <path d="M50 190 Q60 180 70 190" stroke="#27ae60" stroke-width="2" fill="none"/>
      <circle cx="60" cy="195" r="3" fill="#27ae60"/>
    </g>
    <text x="85" y="190" font-size="11" fill="#145a32">Wi-Fi</text>
    <text x="85" y="203" font-size="11" fill="#145a32">Zigbee, BLE</text>
    <rect x="180" y="175" width="90" height="35" rx="4" fill="#fff" opacity="0.7"/>
    <text x="190" y="190" font-size="10" fill="#1e8449" font-weight="bold">Security:</text>
    <text x="190" y="203" font-size="9" fill="#145a32">Encryption</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow" style="animation-delay: 0.5s">
    <path d="M210 225 L210 240" stroke="#3498db" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="205,235 210,245 215,235" fill="#3498db"/>
  </g>
  
  <!-- Layer 3: Processing Layer -->
  <g class="layer-box layer-box-3" data-narration="Processing Layer: Handles data analytics, storage, and edge computing. Security concerns include data security and access control mechanisms.">
    <rect x="20" y="245" width="380" height="70" rx="8" fill="url(#layer3Grad)" filter="url(#shadow)"/>
    <text x="35" y="262" font-size="14" font-weight="bold" fill="#8e44ad">Processing Layer</text>
    <g class="icon" style="animation-delay: 0.5s">
      <rect x="45" y="280" width="30" height="20" rx="2" fill="#9b59b6"/>
      <rect x="50" y="275" width="20" height="5" fill="#9b59b6"/>
      <rect x="55" y="285" width="10" height="10" fill="#8e44ad"/>
    </g>
    <text x="85" y="278" font-size="11" fill="#5b2c6f">Edge Computing</text>
    <text x="85" y="291" font-size="11" fill="#5b2c6f">Cloud Storage</text>
    <rect x="180" y="265" width="90" height="35" rx="4" fill="#fff" opacity="0.7"/>
    <text x="190" y="280" font-size="10" fill="#8e44ad" font-weight="bold">Security:</text>
    <text x="190" y="293" font-size="9" fill="#5b2c6f">Data, Access Ctrl</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="arrow" style="animation-delay: 0.7s">
    <path d="M210 315 L210 330" stroke="#3498db" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="205,325 210,335 215,325" fill="#3498db"/>
  </g>
  
  <!-- Layer 4: Application Layer -->
  <g class="layer-box layer-box-4" data-narration="Application Layer: User interfaces and services. Security focuses on authentication and data privacy protection.">
    <rect x="20" y="335" width="380" height="55" rx="8" fill="url(#layer4Grad)" filter="url(#shadow)"/>
    <text x="35" y="352" font-size="14" font-weight="bold" fill="#2c3e50">Application Layer</text>
    <g class="icon" style="animation-delay: 1s">
      <rect x="48" y="365" width="24" height="18" rx="3" fill="#34495e"/>
      <circle cx="60" cy="374" r="4" fill="#ecf0f1"/>
    </g>
    <text x="85" y="365" font-size="11" fill="#1a252f">User Interfaces</text>
    <text x="85" y="378" font-size="11" fill="#1a252f">APIs</text>
    <rect x="180" y="345" width="90" height="35" rx="4" fill="#fff" opacity="0.7"/>
    <text x="190" y="360" font-size="10" fill="#2c3e50" font-weight="bold">Security:</text>
    <text x="190" y="373" font-size="9" fill="#1a252f">Auth, Privacy</text>
  </g>
  
  <!-- Security Shield Icons -->
  <g class="security-badge" style="animation-delay: 1.2s">
    <path d="M380 80 L390 75 L390 90 L380 85 Z" fill="#e74c3c"/>
    <path d="M380 170 L390 165 L390 180 L380 175 Z" fill="#27ae60"/>
    <path d="M380 260 L390 255 L390 270 L380 265 Z" fill="#9b59b6"/>
    <path d="M380 345 L390 340 L390 355 L380 350 Z" fill="#3498db"/>
  </g>
  
  <!-- Legend -->
  <g class="title" style="animation-delay: 1s">
    <rect x="300" y="55" width="90" height="25" rx="4" fill="#fff" opacity="0.8"/>
    <circle cx="310" cy="67" r="5" fill="#e74c3c"/>
    <text x="320" y="71" font-size="9" fill="#2c3e50">Security</text>
  </g>
  
  <!-- Key Points Box -->
  <g class="title" style="animation-delay: 1.3s">
    <rect x="300" y="90" width="90" height="45" rx="4" fill="#fff" opacity="0.6"/>
    <text x="305" y="103" font-size="8" fill="#2c3e50" font-weight="bold">Key Challenges:</text>
    <text x="305" y="115" font-size="7" fill="#5d6d7e">• Limited resources</text>
    <text x="305" y="125" font-size="7" fill="#5d6d7e">• Distributed nature</text>
  </g>
</svg>