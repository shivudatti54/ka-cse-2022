<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="symmetric-encryption">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="senderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c9b4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="receiverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8a5d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideInLeft {
      0% { transform: translateX(-30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      0% { transform: translateX(30px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; opacity: 0.8; }
      50% { stroke-width: 3; opacity: 1; }
    }
    @keyframes keyPulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(5deg); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .sender-box { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .receiver-box { animation: slideInRight 0.8s ease-out 0.3s both; }
    .key-box { animation: pulse 2s ease-in-out infinite 0.5s; }
    .process-box { animation: fadeIn 1s ease-out 0.6s both; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .label { animation: fadeIn 1s ease-out; }
    .info-text { animation: fadeIn 1.2s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Symmetric Encryption</text>
  <line x1="80" y1="42" x2="340" y2="42" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- Sender Box -->
  <g class="sender-box" data-narration="Sender: The message creator who encrypts plaintext using the shared secret key">
    <rect x="20" y="70" width="100" height="140" fill="url(#senderGradient)" rx="8" filter="url(#shadow)"/>
    <text x="70" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a5f4a">SENDER</text>
    <rect x="30" y="110" width="80" height="25" fill="#fff" rx="4" stroke="#2c7a5f"/>
    <text x="70" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Plaintext</text>
    <rect x="30" y="145" width="80" height="25" fill="#fff" rx="4" stroke="#2c7a5f"/>
    <text x="70" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Message</text>
    <circle cx="70" cy="195" r="8" fill="#2c7a5f"/>
    <text x="70" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">➤</text>
  </g>
  
  <!-- Key Box (Shared Secret) -->
  <g class="key-box" data-narration="Secret Key: The same key is used for both encryption and decryption">
    <rect x="155" y="150" width="110" height="60" fill="url(#keyGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6d4c41">SECRET KEY</text>
    <text x="210" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d4037">(Same Key)</text>
    <!-- Key Icon -->
    <g transform="translate(195, 180)">
      <circle cx="5" cy="5" r="4" fill="#6d4c41"/>
      <line x1="9" y1="5" x2="22" y2="5" stroke="#6d4c41" stroke-width="2"/>
      <line x1="18" y1="5" x2="18" y2="9" stroke="#6d4c41" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Encryption Process Box -->
  <g class="process-box" data-narration="Encryption: Algorithm transforms plaintext into ciphertext using the key">
    <rect x="280" y="70" width="120" height="100" fill="url(#processGradient)" rx="8" filter="url(#shadow)"/>
    <text x="340" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e5945">ENCRYPTION</text>
    <text x="340" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#145a32">Algorithm</text>
    <rect x="290" y="125" width="100" height="30" fill="#fff" rx="4" stroke="#1e8449"/>
    <text x="340" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Plaintext → Cipher</text>
  </g>
  
  <!-- Ciphertext Arrow and Box -->
  <g data-narration="Ciphertext: The encrypted message that can be safely transmitted">
    <path d="M 340 175 L 340 210" stroke="#e74c3c" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
    <polygon points="335,205 340,215 345,205" fill="#e74c3c"/>
    <rect x="280" y="215" width="120" height="45" fill="#fadbd8" rx="6" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="340" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c0392b">CIPHERTEXT</text>
    <text x="340" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#922b21">Encrypted Message</text>
  </g>
  
  <!-- Decryption Arrow -->
  <g data-narration="Decryption: The receiver uses the same key to decrypt the ciphertext back to plaintext">
    <path d="M 340 265 L 340 300" stroke="#9b59b6" stroke-width="2" class="arrow"/>
    <polygon points="335,295 340,305 345,295" fill="#9b59b6"/>
    <text x="355" y="288" font-family="Arial, sans-serif" font-size="9" fill="#7d3c98">Decryption</text>
  </g>
  
  <!-- Receiver Box -->
  <g class="receiver-box" data-narration="Receiver: Decrypts the ciphertext using the same secret key to recover plaintext">
    <rect x="280" y="305" width="120" height="80" fill="url(#receiverGradient)" rx="8" filter="url(#shadow)"/>
    <text x="340" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a235a">RECEIVER</text>
    <rect x="290" y="345" width="100" height="30" fill="#fff" rx="4" stroke="#6c3483"/>
    <text x="340" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Cipher → Plaintext</text>
  </g>
  
  <!-- Key Distribution Arrow -->
  <g data-narration="Key Distribution: The challenge in symmetric encryption is securely sharing the secret key">
    <path d="M 210 215 L 210 255" stroke="#f39c12" stroke-width="2" class="arrow" stroke-dasharray="4,2"/>
    <polygon points="205,250 210,260 215,250" fill="#f39c12"/>
    <text x="175" y="240" font-family="Arial, sans-serif" font-size="9" fill="#d68910" transform="rotate(-90 175,240)">Secure Key</text>
    <text x="185" y="250" font-family="Arial, sans-serif" font-size="9" fill="#d68910" transform="rotate(-90 185,250)">Exchange</text>
  </g>
  
  <!-- Info Box -->
  <g data-narration="Key Point: The same secret key is used for both encryption and decryption">
    <rect x="20" y="320" width="130" height="70" fill="#fff9e6" rx="6" stroke="#f39c12" stroke-width="1.5"/>
    <text x="85" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d68910">KEY CONCEPT</text>
    <text x="85" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7d6008">Same key for</text>
    <text x="85" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7d6008">Encrypt & Decrypt</text>
    <text x="85" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#b7950b">(e.g., AES, DES)</text>
  </g>
  
  <!-- Security Note -->
  <g data-narration="Security: The secret key must be kept confidential - if discovered, all communications are compromised">
    <rect x="160" y="305" width="110" height="70" fill="#e8f6f3" rx="6" stroke="#1abc9c" stroke-width="1.5"/>
    <text x="215" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a085">SECURITY</text>
    <text x="215" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0e6655">Key must remain</text>
    <text x="215" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0e6655">SECRET between</text>
    <text x="215" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0e6655">sender & receiver</text>
  </g>
</svg>