<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="hash-functions-mac">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hashGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="macGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8d5ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7cb890;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .hash-box { fill: url(#hashGradient); rx: 8; }
    .mac-box { fill: url(#macGradient); rx: 8; }
    .section-box { fill: #ffffff; stroke: #b8c9d4; stroke-width: 1.5; rx: 6; }
    .arrow { fill: none; stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 5,3; }
    .arrow-head { fill: #e74c3c; }
    .pulse-element { transform-origin: center; animation: pulse 2s ease-in-out infinite; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Hash Functions &amp; MAC</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#b8c9d4" stroke-width="1" class="fade-in"/>
  
  <!-- Left Section: Hash Function -->
  <g class="slide-left" data-narration="The hash function takes an input message of arbitrary length and produces a fixed-length hash digest through compression functions.">
    <rect x="15" y="55" width="185" height="145" class="section-box" filter="url(#shadow)"/>
    <text x="108" y="72" text-anchor="middle" class="label">Hash Function</text>
    
    <!-- Input Message -->
    <rect x="25" y="82" width="60" height="35" class="hash-box" filter="url(#shadow)"/>
    <text x="55" y="98" text-anchor="middle" class="detail" fill="white">Input</text>
    <text x="55" y="110" text-anchor="middle" class="detail" fill="white" font-size="9">Message M</text>
    
    <!-- Arrow 1 -->
    <line x1="85" y1="100" x2="105" y2="100" class="arrow"/>
    <polygon points="105,95 115,100 105,105" class="arrow-head"/>
    
    <!-- Processing -->
    <rect x="110" y="82" width="80" height="35" fill="#f5e6d3" stroke="#d4a574" rx="4"/>
    <text x="150" y="98" text-anchor="middle" class="detail" fill="#8b4513">Padding &amp;</text>
    <text x="150" y="110" text-anchor="middle" class="detail" fill="#8b4513">Processing</text>
    
    <!-- Arrow 2 -->
    <line x1="150" y1="117" x2="150" y2="137" class="arrow"/>
    <polygon points="145,137 150,147 155,137" class="arrow-head"/>
    
    <!-- Compression -->
    <rect x="110" y="145" width="80" height="35" fill="#e8d5e8" stroke="#c490c4" rx="4"/>
    <text x="150" y="161" text-anchor="middle" class="detail" fill="#6b2d6b">Compression</text>
    <text x="150" y="173" text-anchor="middle" class="detail" fill="#6b2d6b">Function</text>
    
    <!-- Arrow 3 -->
    <line x1="150" y1="180" x2="150" y2="195" class="arrow"/>
    <polygon points="145,195 150,205 155,195" class="arrow-head"/>
    
    <!-- Output -->
    <rect x="115" y="200" width="70" height="30" fill="#27ae60" rx="4"/>
    <text x="150" y="218" text-anchor="middle" class="detail" fill="white" font-size="11">Hash H(M)</text>
    <text x="150" y="230" text-anchor="middle" class="detail" fill="white" font-size="9">160-512 bits</text>
  </g>
  
  <!-- Right Section: MAC -->
  <g class="slide-right" data-narration="A MAC adds a secret key to the hash function, providing both integrity and authentication.">
    <rect x="220" y="55" width="185" height="145" class="section-box" filter="url(#shadow)"/>
    <text x="312" y="72" text-anchor="middle" class="label">Message Auth. Code</text>
    
    <!-- Message Input -->
    <rect x="230" y="85" width="55" height="30" class="hash-box" filter="url(#shadow)"/>
    <text x="257" y="102" text-anchor="middle" class="detail" fill="white" font-size="10">Message</text>
    
    <!-- Key Input -->
    <rect x="295" y="85" width="55" height="30" fill="#f9c74f" stroke="#e9b428" rx="4"/>
    <text x="322" y="102" text-anchor="middle" class="detail" fill="#7d5a00" font-size="10">Key</text>
    
    <!-- Combined Arrow -->
    <line x1="285" y1="100" x2="305" y2="100" stroke="#b8c9d4" stroke-width="2" stroke-dasharray="3,2"/>
    
    <!-- Hash Function Box -->
    <rect x="255" y="130" width="80" height="35" fill="#9b8dc4" stroke="#7b6ca4" rx="4"/>
    <text x="295" y="150" text-anchor="middle" class="detail" fill="white">Hash + Key</text>
    <text x="295" y="162" text-anchor="middle" class="detail" fill="white" font-size="10">Function</text>
    
    <!-- Arrow to Output -->
    <line x1="295" y1="165" x2="295" y2="185" class="arrow"/>
    <polygon points="290,185 295,195 300,185" class="arrow-head"/>
    
    <!-- MAC Output -->
    <rect x="260" y="195" width="70" height="28" fill="#e74c3c" rx="4"/>
    <text x="295" y="212" text-anchor="middle" class="detail" fill="white" font-size="11">MAC</text>
    <text x="295" y="224" text-anchor="middle" class="detail" fill="white" font-size="9">Authenticator</text>
  </g>
  
  <!-- Properties Section -->
  <g class="fade-in" data-narration="Key properties of cryptographic hash functions: deterministic, quick computation, pre-image resistance, second pre-image resistance, and collision resistance.">
    <rect x="15" y="210" width="185" height="90" class="section-box" filter="url(#shadow)"/>
    <text x="108" y="228" text-anchor="middle" class="label" font-size="12">Hash Properties</text>
    
    <g transform="translate(25, 242)">
      <circle cx="5" cy="5" r="3" fill="#27ae60"/>
      <text x="15" y="9" class="detail">Deterministic</text>
    </g>
    <g transform="translate(25, 258)">
      <circle cx="5" cy="5" r="3" fill="#27ae60"/>
      <text x="15" y="9" class="detail">Fixed Output Size</text>
    </g>
    <g transform="translate(25, 274)">
      <circle cx="5" cy="5" r="3" fill="#27ae60"/>
      <text x="15" y="9" class="detail">Pre-image Resistant</text>
    </g>
    <g transform="translate(100, 258)">
      <circle cx="5" cy="5" r="3" fill="#27ae60"/>
      <text x="15" y="9" class="detail">Collision Free</text>
    </g>
  </g>
  
  <!-- MAC Properties -->
  <g class="fade-in" data-narration="MAC provides message integrity and authentication using a shared secret key between sender and receiver.">
    <rect x="220" y="210" width="185" height="90" class="section-box" filter="url(#shadow)"/>
    <text x="312" y="228" text-anchor="middle" class="label" font-size="12">MAC Benefits</text>
    
    <g transform="translate(230, 242)">
      <circle cx="5" cy="5" r="3" fill="#e74c3c"/>
      <text x="15" y="9" class="detail">Integrity Check</text>
    </g>
    <g transform="translate(230, 258)">
      <circle cx="5" cy="5" r="3" fill="#e74c3c"/>
      <text x="15" y="9" class="detail">Origin Auth.</text>
    </g>
    <g transform="translate(230, 274)">
      <circle cx="5" cy="5" r="3" fill="#e74c3c"/>
      <text x="15" y="9" class="detail">Shared Secret</text>
    </g>
    <g transform="translate(305, 258)">
      <circle cx="5" cy="5" r="3" fill="#e74c3c"/>
      <text x="15" y="9" class="detail">Tamper Proof</text>
    </g>
  </g>
  
  <!-- Bottom Section: Applications -->
  <g class="fade-in" data-narration="Hash functions and MACs are used in TLS/SSL, digital signatures, password storage, and blockchain technology.">
    <rect x="15" y="310" width="390" height="55" class="section-box" filter="url(#shadow)"/>
    <text x="210" y="330" text-anchor="middle" class="label" font-size="12">Real-World Applications</text>
    
    <g transform="translate(35, 350)">
      <rect x="0" y="-8" width="50" height="18" fill="#3498db" rx="3"/>
      <text x="25" y="5" text-anchor="middle" class="detail" fill="white" font-size="9">TLS/SSL</text>
    </g>
    <g transform="translate(95, 350)">
      <rect x="0" y="-8" width="55" height="18" fill="#3498db" rx="3"/>
      <text x="27" y="5" text-anchor="middle" class="detail" fill="white" font-size="9">Digital Signs</text>
    </g>
    <g transform="translate(160, 350)">
      <rect x="0" y="-8" width="55" height="18" fill="#3498db" rx="3"/>
      <text x="27" y="5" text-anchor="middle" class="detail" fill="white" font-size="9">Passwords</text>
    </g>
    <g transform="translate(225, 350)">
      <rect x="0" y="-8" width="55" height="18" fill="#3498db" rx="3"/>
      <text x="27" y="5" text-anchor="middle" class="detail" fill="white" font-size="9">IPSec</text>
    </g>
    <g transform="translate(290, 350)">
      <rect x="0" y="-8" width="55" height="18" fill="#3498db" rx="3"/>
      <text x="27" y="5" text-anchor="middle" class="detail" fill="white" font-size="9">Blockchain</text>
    </g>
    <g transform="translate(355, 350)">
      <rect x="0" y="-8" width="40" height="18" fill="#3498db" rx="3"/>
      <text x="20" y="5" text-anchor="middle" class="detail" fill="white" font-size="9">VPN</text>
    </g>
  </g>
  
  <!-- Animated pulse on key boxes -->
  <g class="pulse-element" transform-origin="322 100">
    <rect x="295" y="85" width="55" height="30" fill="#f9c74f" stroke="#e9b428" rx="4" opacity="0"/>
  </g>
</svg>