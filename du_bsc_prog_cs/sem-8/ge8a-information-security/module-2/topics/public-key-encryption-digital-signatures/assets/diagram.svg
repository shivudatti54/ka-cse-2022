<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="public-key-encryption-digital-signatures">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e8e8f5"/>
      <stop offset="100%" style="stop-color:#f0e8f5"/>
    </linearGradient>
    <linearGradient id="keyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#6ba3d6"/>
    </linearGradient>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342"/>
      <stop offset="100%" style="stop-color:#9ccc65"/>
    </linearGradient>
    <linearGradient id="encryptGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#ffb74d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(60px); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section-2 { animation: fadeIn 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideInRight 0.8s ease-out 0.6s both; }
    .section-4 { animation: fadeIn 0.8s ease-out 0.8s both; }
    .pulse-anim { animation: pulse 2s infinite; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .encrypted-msg { animation: moveRight 3s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Public Key Encryption</text>
  <text x="210" y="48" text-anchor="middle" font-size="12" fill="#555" class="title">Digital Signatures Process</text>
  
  <!-- SENDER SECTION -->
  <g class="section-1" data-narration="Sender prepares plaintext message to send to recipient">
    <rect x="20" y="70" width="100" height="80" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="70" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">SENDER</text>
    <rect x="30" y="100" width="80" height="40" fill="#e3f2fd" rx="4" stroke="#4a90d9" stroke-width="1"/>
    <text x="70" y="118" text-anchor="middle" font-size="11" fill="#1565c0">Plaintext</text>
    <text x="70" y="132" text-anchor="middle" font-size="10" fill="#1565c0">Message</text>
  </g>
  
  <!-- PUBLIC KEY -->
  <g class="section-1" data-narration="Recipient's public key is obtained and used for encryption">
    <rect x="20" y="165" width="100" height="50" fill="url(#keyGradient)" rx="6" filter="url(#shadow)"/>
    <text x="70" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Public Key</text>
    <text x="70" y="202" text-anchor="middle" font-size="9" fill="#e8f4fc">🔓 For Encryption</text>
  </g>
  
  <!-- ARROW 1 -->
  <g class="section-2" data-narration="Message and public key enter encryption algorithm">
    <path d="M130 110 L170 110" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- ENCRYPTION BOX -->
  <g class="section-2" data-narration="Encryption algorithm combines plaintext with public key to create ciphertext">
    <rect x="170" y="85" width="80" height="60" fill="url(#encryptGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="white">ENCRYPTION</text>
    <text x="210" y="128" text-anchor="middle" font-size="10" fill="#fff3e0">Algorithm</text>
    <text x="210" y="142" text-anchor="middle" font-size="9" fill="#ffe0b2">+ Public Key</text>
  </g>
  
  <!-- ARROW 2 -->
  <g class="section-2" data-narration="Encrypted ciphertext is generated">
    <path d="M260 110 L300 110" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- CIPHERTEXT -->
  <g class="section-3" data-narration="Ciphertext is the encrypted message that can only be decrypted with private key">
    <rect x="300" y="90" width="80" height="50" fill="#fce4ec" rx="6" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
    <text x="340" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2185b">Ciphertext</text>
    <text x="340" y="127" text-anchor="middle" font-size="9" fill="#e91e63">🔒 Encrypted</text>
  </g>
  
  <!-- INTERNET -->
  <g class="section-2" data-narration="Ciphertext travels through the internet">
    <rect x="150" y="220" width="120" height="30" fill="#f5f5f5" rx="15" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="210" y="240" text-anchor="middle" font-size="11" fill="#616161" class="float-anim">🌐 Internet</text>
  </g>
  
  <!-- ARROW DOWN -->
  <g class="section-3" data-narration="Ciphertext arrives at recipient">
    <path d="M340 150 L340 190 L260 190" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- RECIPIENT SECTION -->
  <g class="section-3" data-narration="Recipient uses private key to decrypt the ciphertext">
    <rect x="180" y="270" width="100" height="80" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="230" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">RECIPIENT</text>
    
    <!-- Private Key -->
    <rect x="195" y="305" width="70" height="35" fill="url(#lockGradient)" rx="5" filter="url(#shadow)"/>
    <text x="230" y="325" text-anchor="middle" font-size="10" font-weight="bold" fill="white">🔑 Private Key</text>
    <text x="230" y="340" text-anchor="middle" font-size="8" fill="#c5e1a5">For Decryption</text>
  </g>
  
  <!-- ARROW to decrypted -->
  <g class="section-4" data-narration="Decryption produces original plaintext message">
    <path d="M300 300 L340 300 L340 250" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- DECRYPTED MESSAGE -->
  <g class="section-4" data-narration="Original plaintext message is recovered">
    <rect x="300" y="200" width="80" height="45" fill="#e8f5e9" rx="6" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
    <text x="340" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Decrypted</text>
    <text x="340" y="236" text-anchor="middle" font-size="9" fill="#4caf50">Plaintext</text>
  </g>
  
  <!-- Process Flow Arrows -->
  <g class="pulse-anim">
    <circle cx="70" cy="230" r="8" fill="#4a90d9" opacity="0.7"/>
    <path d="M70 245 L70 265" stroke="#4a90d9" stroke-width="2" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="section-4" data-narration="Key concept: Public key encrypts, private key decrypts">
    <rect x="20" y="330" width="140" height="55" fill="#fffde7" rx="6" stroke="#fbc02d" stroke-width="1" filter="url(#shadow)"/>
    <text x="90" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57f17">KEY CONCEPT</text>
    <text x="90" y="363" text-anchor="middle" font-size="9" fill="#5d4037">Public Key: Encrypt</text>
    <text x="90" y="378" text-anchor="middle" font-size="9" fill="#5d4037">Private Key: Decrypt</text>
  </g>
  
  <!-- Digital Signature Note -->
  <g class="section-4" data-narration="Digital signatures use the opposite: private key to sign, public key to verify">
    <rect x="180" y="360" width="220" height="30" fill="#f3e5f5" rx="5" stroke="#ab47bc" stroke-width="1"/>
    <text x="290" y="378" text-anchor="middle" font-size="9" fill="#7b1fa2">Digital Signatures: Private Key signs, Public Key verifies ✓</text>
  </g>
  
  <!-- Legend -->
  <g class="title">
    <circle cx="30" cy="220" r="4" fill="#4a90d9"/>
    <text x="40" y="223" font-size="8" fill="#555">Key</text>
  </g>
</svg>