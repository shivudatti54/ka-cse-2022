<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="os-structure-types" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="hardwareGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#6db892"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c5b8e8"/>
      <stop offset="100%" style="stop-color:#9d8acc"/>
    </linearGradient>
    <linearGradient id="utilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d89a"/>
      <stop offset="100%" style="stop-color:#e8c46a"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7b5a3"/>
      <stop offset="100%" style="stop-color:#e88f7a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .layer-1 { animation: slideInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .layer-2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .layer-3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .layer-4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .layer-5 { animation: slideInUp 0.6s ease-out 1.0s forwards; opacity: 0; }
    .arrow-anim { animation: arrowPulse 2s ease-in-out infinite; }
    .box-anim:hover { animation: pulse 0.5s ease-in-out; cursor: pointer; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text" fill="#2c5282" font-size="20">OS Structure Types</text>
  <text x="210" y="50" text-anchor="middle" class="detail-text" fill="#4a5568" font-size="11">Operating System Architecture Layers</text>
  
  <!-- Layer 1: Hardware -->
  <g class="layer-1" data-narration="Hardware Layer: The lowest layer containing CPU, Memory, and I/O Devices - physical components of the computer system">
    <rect x="40" y="280" width="340" height="45" rx="8" fill="url(#hardwareGrad)" filter="url(#shadow)"/>
    <text x="60" y="300" class="label-text" fill="#fff" font-size="14">HARDWARE</text>
    <g transform="translate(180, 295)">
      <rect x="0" y="0" width="20" height="18" rx="2" fill="#fff" opacity="0.8"/>
      <text x="10" y="13" text-anchor="middle" fill="#5a9bc4" font-size="8" font-weight="bold">CPU</text>
      <rect x="25" y="0" width="25" height="18" rx="2" fill="#fff" opacity="0.8"/>
      <text x="37" y="13" text-anchor="middle" fill="#5a9bc4" font-size="8" font-weight="bold">MEM</text>
      <rect x="55" y="0" width="22" height="18" rx="2" fill="#fff" opacity="0.8"/>
      <text x="66" y="13" text-anchor="middle" fill="#5a9bc4" font-size="8" font-weight="bold">I/O</text>
    </g>
  </g>
  
  <!-- Arrow 1 -->
  <path class="arrow-anim" d="M210,275 L210,265" stroke="#5a9bc4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="205,265 210,255 215,265" fill="#5a9bc4" class="layer-1"/>
  
  <!-- Layer 2: Kernel -->
  <g class="layer-2" data-narration="Kernel: The core of the OS managing Process, Memory, File Systems, and Device Drivers - central control component">
    <rect x="50" y="195" width="320" height="65" rx="8" fill="url(#kernelGrad)" filter="url(#shadow)"/>
    <text x="70" y="215" class="label-text" fill="#fff" font-size="14">KERNEL</text>
    <g transform="translate(140, 205)">
      <rect x="0" y="0" width="55" height="22" rx="3" fill="#fff" opacity="0.85"/>
      <text x="27" y="15" text-anchor="middle" fill="#4a8a64" font-size="9" font-weight="bold">Process</text>
      <rect x="60" y="0" width="50" height="22" rx="3" fill="#fff" opacity="0.85"/>
      <text x="85" y="15" text-anchor="middle" fill="#4a8a64" font-size="9" font-weight="bold">Memory</text>
      <rect x="115" y="0" width="40" height="22" rx="3" fill="#fff" opacity="0.85"/>
      <text x="135" y="15" text-anchor="middle" fill="#4a8a64" font-size="9" font-weight="bold">File</text>
      <rect x="0" y="27" width="50" height="22" rx="3" fill="#fff" opacity="0.85"/>
      <text x="25" y="42" text-anchor="middle" fill="#4a8a64" font-size="9" font-weight="bold">Device</text>
      <rect x="55" y="27" width="55" height="22" rx="3" fill="#fff" opacity="0.85"/>
      <text x="82" y="42" text-anchor="middle" fill="#4a8a64" font-size="9" font-weight="bold">Security</text>
    </g>
  </g>
  
  <!-- Arrow 2 -->
  <polygon points="205,190 210,180 215,190" fill="#6db892" class="layer-2"/>
  
  <!-- Layer 3: System Calls API -->
  <g class="layer-3" data-narration="System Calls API: Interface between kernel and user programs providing programmatic access to OS services">
    <rect x="70" y="135" width="280" height="40" rx="8" fill="url(#apiGrad)" filter="url(#shadow)"/>
    <text x="90" y="155" class="label-text" fill="#fff" font-size="13">SYSTEM CALLS API</text>
    <g transform="translate(200, 145)">
      <rect x="0" y="0" width="40" height="20" rx="3" fill="#fff" opacity="0.85"/>
      <text x="20" y="14" text-anchor="middle" fill="#7a64a8" font-size="8" font-weight="bold">open()</text>
      <rect x="45" y="0" width="45" height="20" rx="3" fill="#fff" opacity="0.85"/>
      <text x="67" y="14" text-anchor="middle" fill="#7a64a8" font-size="8" font-weight="bold">read()</text>
      <rect x="95" y="0" width="50" height="20" rx="3" fill="#fff" opacity="0.85"/>
      <text x="120" y="14" text-anchor="middle" fill="#7a64a8" font-size="8" font-weight="bold">fork()</text>
    </g>
  </g>
  
  <!-- Arrow 3 -->
  <polygon points="205,130 210,120 215,130" fill="#9d8acc" class="layer-3"/>
  
  <!-- Layer 4: System Utilities -->
  <g class="layer-4" data-narration="System Utilities: Built-in programs like compilers, editors, and file managers that help users interact with the system">
    <rect x="90" y="80" width="240" height="35" rx="8" fill="url(#utilGrad)" filter="url(#shadow)"/>
    <text x="110" y="98" class="label-text" fill="#fff" font-size="12">SYSTEM UTILITIES</text>
    <g transform="translate(200, 85)">
      <rect x="0" y="0" width="35" height="18" rx="3" fill="#fff" opacity="0.85"/>
      <text x="17" y="13" text-anchor="middle" fill="#b8942e" font-size="7" font-weight="bold">Compiler</text>
      <rect x="40" y="0" width="30" height="18" rx="3" fill="#fff" opacity="0.85"/>
      <text x="55" y="13" text-anchor="middle" fill="#b8942e" font-size="7" font-weight="bold">Editor</text>
      <rect x="75" y="0" width="35" height="18" rx="3" fill="#fff" opacity="0.85"/>
      <text x="92" y="13" text-anchor="middle" fill="#b8942e" font-size="7" font-weight="bold">Shell</text>
    </g>
  </g>
  
  <!-- Arrow 4 -->
  <polygon points="205,75 210,65 215,75" fill="#e8c46a" class="layer-4"/>
  
  <!-- Layer 5: User Applications / UI -->
  <g class="layer-5" data-narration="User Applications and Interface: Top layer with GUI/Shell enabling user interaction with applications and OS services">
    <rect x="110" y="30" width="200" height="35" rx="8" fill="url(#uiGrad)" filter="url(#shadow)"/>
    <text x="130" y="48" class="label-text" fill="#fff" font-size="12">USER APPLICATIONS / UI</text>
    <g transform="translate(200, 35)">
      <rect x="0" y="0" width="35" height="18" rx="3" fill="#fff" opacity="0.85"/>
      <text x="17" y="13" text-anchor="middle" fill="#c46a4e" font-size="7" font-weight="bold">Browser</text>
      <rect x="40" y="0" width="30" height="18" rx="3" fill="#fff" opacity="0.85"/>
      <text x="55" y="13" text-anchor="middle" fill="#c46a4e" font-size="7" font-weight="bold">GUI</text>
      <rect x="75" y="0" width="30" height="18" rx="3" fill="#fff" opacity="0.85"/>
      <text x="90" y="13" text-anchor="middle" fill="#c46a4e" font-size="7" font-weight="bold">Apps</text>
    </g>
  </g>
  
  <!-- Decorative side labels -->
  <g class="title-anim">
    <text x="15" y="300" fill="#5a9bc4" font-size="8" font-weight="bold" transform="rotate(-90, 15, 300)">HARDWARE</text>
    <text x="15" y="225" fill="#4a8a64" font-size="8" font-weight="bold" transform="rotate(-90, 15, 225)">KERNEL</text>
    <text x="15" y="158" fill="#7a64a8" font-size="8" font-weight="bold" transform="rotate(-90, 15, 158)">SYSTEM CALLS</text>
    <text x="15" y="100" fill="#b8942e" font-size="8" font-weight="bold" transform="rotate(-90, 15, 100)">UTILITIES</text>
    <text x="15" y="50" fill="#c46a4e" font-size="8" font-weight="bold" transform="rotate(-90, 15, 50)">USER LAYER</text>
  </g>
</svg>