<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="os-services-system-calls">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userModeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c9b4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kernelModeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c08585;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcc5e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4a5d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="interfaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d6a7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c088;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7a9a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { animation: slideInDown 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideInRight 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5 { animation: slideInLeft 0.6s ease-out 1.0s forwards; opacity: 0; }
    .box6 { animation: slideInDown 0.6s ease-out 1.2s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out 1.4s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c4a6e" class="title">OS Services &amp; System Calls</text>
  <text x="210" y="48" text-anchor="middle" font-size="12" fill="#5a7a9a">System Call Execution Flow</text>
  
  <!-- User Mode Box -->
  <rect x="20" y="70" width="140" height="50" rx="8" fill="url(#userModeGrad)" filter="url(#shadow)" data-narration="User Mode: The environment where application programs execute with limited privileges"/>
  <text x="90" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d5a45">USER MODE</text>
  <text x="90" y="108" text-anchor="middle" font-size="11" fill="#2d5a45">User Program</text>
  
  <!-- Arrow 1 -->
  <line x1="160" y1="95" x2="185" y2="95" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- API Library Box -->
  <rect x="190" y="70" width="140" height="50" rx="8" fill="url(#apiGrad)" filter="url(#shadow)" data-narration="API Library: Provides standard functions (like read, write, open) that wrap system calls for developer convenience"/>
  <text x="260" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a3470">API Library</text>
  <text x="260" y="108" text-anchor="middle" font-size="11" fill="#4a3470">System Call Interface</text>
  
  <!-- Arrow 2 - Going down to Interface -->
  <line x1="260" y1="120" x2="260" y2="145" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- System Call Interface Box -->
  <rect x="190" y="150" width="140" height="45" rx="8" fill="url(#interfaceGrad)" filter="url(#shadow)" data-narration="System Call Interface: The gateway between user space and kernel space that validates and passes requests"/>
  <text x="260" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b4c20">System Call</text>
  <text x="260" y="185" text-anchor="middle" font-size="11" fill="#6b4c20">Interface / Trap</text>
  
  <!-- Arrow 3 - Going to Kernel Mode -->
  <line x1="260" y1="195" x2="260" y2="225" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Kernel Mode Box -->
  <rect x="160" y="230" width="200" height="55" rx="8" fill="url(#kernelModeGrad)" filter="url(#shadow)" data-narration="Kernel Mode: Privileged mode where OS kernel executes system services with full hardware access"/>
  <text x="260" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a2020">KERNEL MODE</text>
  <text x="260" y="268" text-anchor="middle" font-size="11" fill="#5a2020">OS Kernel Services</text>
  <text x="260" y="280" text-anchor="middle" font-size="10" fill="#5a2020">(Process, Memory, File, Device Mgmt)</text>
  
  <!-- Arrow 4 - Return path -->
  <line x1="330" y1="257" x2="360" y2="257" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Return Value Box -->
  <rect x="365" y="232" width="50" height="50" rx="25" fill="#b8d4e8" filter="url(#shadow)" class="pulse-anim" data-narration="Return Value: The result passed back to the user program after system call completion"/>
  <text x="390" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c4a6e">Return</text>
  <text x="390" y="267" text-anchor="middle" font-size="10" fill="#2c4a6e">Value</text>
  
  <!-- Arrow 5 - Back to user -->
  <line x1="90" y1="120" x2="90" y2="145" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- User Mode Resume -->
  <rect x="20" y="150" width="140" height="40" rx="8" fill="url(#userModeGrad)" filter="url(#shadow)" data-narration="User Mode Resume: Program continues execution with the returned data from system call"/>
  <text x="90" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d5a45">User Mode</text>
  <text x="90" y="182" text-anchor="middle" font-size="11" fill="#2d5a45">Resume</text>
  
  <!-- Key Concepts Box -->
  <rect x="15" y="300" width="390" height="90" rx="8" fill="#f8f5f0" stroke="#c9bda8" stroke-width="1.5" data-narration="Key Concepts: System calls provide programming interface between user applications and OS kernel; They act as bridges from user mode to privileged kernel mode"/>
  <text x="210" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a4a4a">Key Concepts</text>
  <text x="25" y="340" font-size="11" fill="#5a5a5a">• System Call: Programming interface to OS kernel services</text>
  <text x="25" y="356" font-size="11" fill="#5a5a5a">• User Mode: Limited privileges, cannot access hardware directly</text>
  <text x="25" y="372" font-size="11" fill="#5a5a5a">• Kernel Mode: Full privileges, executes critical OS functions</text>
  <text x="25" y="388" font-size="11" fill="#5a5a5a">• API Library: Wrapper functions simplifying system call usage</text>
  
  <!-- Mode Indicator Labels -->
  <rect x="350" y="70" width="55" height="20" rx="4" fill="#b8e0d2"/>
  <text x="377" y="84" text-anchor="middle" font-size="10" fill="#2d5a45" font-weight="bold">User</text>
  
  <rect x="350" y="230" width="55" height="20" rx="4" fill="#d4a5a5"/>
  <text x="377" y="244" text-anchor="middle" font-size="10" fill="#5a2020" font-weight="bold">Kernel</text>
</svg>