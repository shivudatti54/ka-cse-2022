<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="disk-scheduling-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="diskGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="50%" style="stop-color:#e8e8e8"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <radialGradient id="trackGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </radialGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes headMove {
      0%, 100% { transform: rotate(-25deg); }
      50% { transform: rotate(25deg); }
    }
    @keyframes seek {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(30px); }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .head-anim { animation: headMove 4s ease-in-out infinite; transform-origin: 280px 200px; }
    .seek-anim { animation: seek 3s ease-in-out infinite; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="fade-in">Disk Scheduling Algorithms</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" class="fade-in">Disk Structure and Head Movement</text>
  
  <!-- Main Disk Visualization -->
  <g data-narration="The disk platter contains concentric tracks numbered from center (track 0) to outer edge" class="slide-in section-1">
    <!-- Disk platter base -->
    <circle cx="130" cy="200" r="90" fill="url(#diskGradient)" stroke="#888" stroke-width="2"/>
    
    <!-- Concentric tracks -->
    <circle cx="130" cy="200" r="80" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="130" cy="200" r="70" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="130" cy="200" r="60" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="130" cy="200" r="50" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="130" cy="200" r="40" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="130" cy="200" r="30" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="130" cy="200" r="20" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="130" cy="200" r="10" fill="none" stroke="#999" stroke-width="1"/>
    
    <!-- Center spindle -->
    <circle cx="130" cy="200" r="8" fill="#666"/>
    <circle cx="130" cy="200" r="4" fill="#444"/>
    
    <!-- Track numbers -->
    <text x="130" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">0</text>
    <text x="130" y="185" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">1</text>
    <text x="130" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">2</text>
    <text x="130" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">3</text>
    <text x="130" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">4</text>
    
    <!-- Sectors (showing one) -->
    <line x1="130" y1="200" x2="210" y2="200" stroke="#bbb" stroke-width="1"/>
    <line x1="130" y1="200" x2="167" y2="130" stroke="#bbb" stroke-width="1"/>
  </g>
  
  <!-- Head Arm Assembly -->
  <g data-narration="The read/write head is mounted on an arm that pivots to access different tracks" class="slide-in section-2">
    <!-- Head arm -->
    <g class="head-anim">
      <line x1="280" y1="200" x2="200" y2="200" stroke="#e53e3e" stroke-width="4" stroke-linecap="round"/>
      <polygon points="195,195 195,205 205,200" fill="#e53e3e"/>
    </g>
    
    <!-- Pivot point -->
    <circle cx="280" cy="200" r="8" fill="#666" stroke="#444" stroke-width="2"/>
    
    <!-- Head label -->
    <text x="295" y="195" font-family="Arial" font-size="10" fill="#e53e3e" class="pulse">R/W Head</text>
  </g>
  
  <!-- Current Position Indicator -->
  <g data-narration="Current head position shown at track 2" class="slide-in section-3">
    <circle cx="130" cy="200" r="3" fill="#e53e3e" class="pulse"/>
    <text x="95" y="205" font-family="Arial" font-size="9" fill="#e53e3e">Head @ Track 2</text>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g data-narration="Seek Time: Time taken for head to move to correct track" class="slide-in section-4">
    <rect x="250" y="80" width="150" height="55" rx="5" fill="#fff" stroke="#4299e1" stroke-width="2" opacity="0.9"/>
    <text x="260" y="100" font-family="Arial" font-size="12" font-weight="bold" fill="#2b6cb0">Seek Time</text>
    <text x="260" y="118" font-family="Arial" font-size="10" fill="#4a5568">Time for head to move</text>
    <text x="260" y="130" font-family="Arial" font-size="10" fill="#4a5568">to desired track</text>
  </g>
  
  <g data-narration="Rotational Latency: Time waiting for sector to rotate under head" class="slide-in section-4">
    <rect x="250" y="145" width="150" height="55" rx="5" fill="#fff" stroke="#48bb78" stroke-width="2" opacity="0.9"/>
    <text x="260" y="165" font-family="Arial" font-size="12" font-weight="bold" fill="#276749">Rotational Latency</text>
    <text x="260" y="183" font-family="Arial" font-size="10" fill="#4a5568">Time for sector to rotate</text>
    <text x="260" y="195" font-family="Arial" font-size="10" fill="#4a5568">under the head</text>
  </g>
  
  <g data-narration="Disk I/O is typically the slowest operation in a computer system" class="slide-in section-4">
    <rect x="250" y="210" width="150" height="55" rx="5" fill="#fff" stroke="#ed8936" stroke-width="2" opacity="0.9"/>
    <text x="260" y="230" font-family="Arial" font-size="12" font-weight="bold" fill="#c05621">Transfer Time</text>
    <text x="260" y="248" font-family="Arial" font-size="10" fill="#4a5568">Time to actually read/write</text>
    <text x="260" y="260" font-family="Arial" font-size="10" fill="#4a5568">data on the disk</text>
  </g>
  
  <g data-narration="Cylinder: All tracks with same radius across multiple platters" class="slide-in section-4">
    <rect x="250" y="275" width="150" height="50" rx="5" fill="#fff" stroke="#9f7aea" stroke-width="2" opacity="0.9"/>
    <text x="260" y="295" font-family="Arial" font-size="12" font-weight="bold" fill="#6b46c1">Cylinder</text>
    <text x="260" y="313" font-family="Arial" font-size="10" fill="#4a5568">Same radius tracks on</text>
    <text x="260" y="325" font-family="Arial" font-size="10" fill="#4a5568">all platter surfaces</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g class="fade-in" style="animation-delay: 1s;">
    <!-- Arrow from disk to head -->
    <path d="M 220 200 Q 240 200 250 200" stroke="#e53e3e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e"/>
      </marker>
    </defs>
  </g>
  
  <!-- Platter label -->
  <text x="130" y="305" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a5568" class="fade-in" style="animation-delay: 0.5s;">Platter Surface</text>
  
  <!-- Legend -->
  <g transform="translate(10, 340)" class="fade-in" style="animation-delay: 1.2s;">
    <rect x="0" y="0" width="180" height="45" rx="3" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
    <text x="10" y="18" font-family="Arial" font-size="10" font-weight="bold" fill="#2d3748">Legend:</text>
    <circle cx="25" cy="35" r="4" fill="#e53e3e"/>
    <text x="35" y="38" font-family="Arial" font-size="9" fill="#4a5568">R/W Head</text>
    <line x1="80" y1="31" x2="100" y2="31" stroke="#999" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="105" y="38" font-family="Arial" font-size="9" fill="#4a5568">Tracks</text>
  </g>
</svg>