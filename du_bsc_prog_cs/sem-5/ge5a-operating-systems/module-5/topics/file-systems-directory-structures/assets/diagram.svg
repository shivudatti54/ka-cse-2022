<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="file-systems-directory-structures">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8f0f4"/>
    </linearGradient>
    <linearGradient id="dirGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="fileGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5b4"/>
      <stop offset="100%" style="stop-color:#ffd180"/>
    </linearGradient>
    <linearGradient id="indexGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4fb"/>
      <stop offset="100%" style="stop-color:#b8a9e8"/>
    </linearGradient>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8c8c8"/>
      <stop offset="100%" style="stop-color:#f0a8a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideRight {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .section-4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .arrow { animation: slideRight 0.5s ease-out 1s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">File Systems Directory Structures</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#b8a9e8" stroke-width="2" class="title"/>
  
  <!-- Section 1: Directory Tree Structure -->
  <g class="section-1" data-narration="The hierarchical directory structure organizes files in a tree-like format, starting from the root directory">
    <rect x="15" y="55" width="120" height="75" fill="url(#dirGradient)" rx="6" filter="url(#shadow)"/>
    <text x="75" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">ROOT</text>
    <text x="75" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a6c7d">Directory</text>
    <text x="75" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">/</text>
    
    <!-- Subdirectories -->
    <rect x="15" y="145" width="55" height="40" fill="url(#dirGradient)" rx="4" filter="url(#shadow)"/>
    <text x="42" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">docs</text>
    <text x="42" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a6c7d">/</text>
    
    <rect x="80" y="145" width="55" height="40" fill="url(#dirGradient)" rx="4" filter="url(#shadow)"/>
    <text x="107" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">images</text>
    <text x="107" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a6c7d">/</text>
    
    <!-- Files under root -->
    <rect x="15" y="195" width="55" height="35" fill="url(#fileGradient)" rx="4" filter="url(#shadow)"/>
    <text x="42" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">readme</text>
    <text x="42" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7d5a3d">.txt</text>
    
    <!-- Connecting lines -->
    <line x1="75" y1="95" x2="75" y2="145" stroke="#7d9aaa" stroke-width="1.5"/>
    <line x1="75" y1="130" x2="42" y2="145" stroke="#7d9aaa" stroke-width="1.5"/>
    <line x1="75" y1="130" x2="107" y2="145" stroke="#7d9aaa" stroke-width="1.5"/>
    <line x1="75" y1="130" x2="42" y2="195" stroke="#7d9aaa" stroke-width="1.5"/>
    
    <text x="20" y="50" font-family="Arial, sans-serif" font-size="9" fill="#7d9aaa" font-style="italic">1. Hierarchy</text>
  </g>
  
  <!-- Section 2: Index Block -->
  <g class="section-2" data-narration="The index block contains pointers to all data blocks, enabling direct access to any part of the file">
    <rect x="160" y="55" width="80" height="95" fill="url(#indexGradient)" rx="6" filter="url(#shadow)"/>
    <text x="200" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">INDEX</text>
    <text x="200" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5a6c7d">BLOCK</text>
    
    <!-- Index entries -->
    <line x1="170" y1="95" x2="230" y2="95" stroke="#8b7bc4" stroke-width="1"/>
    <rect x="168" y="100" width="64" height="8" fill="#f0e8ff" rx="2"/>
    <text x="200" y="107" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a3f75">ptr → B1</text>
    <rect x="168" y="112" width="64" height="8" fill="#f0e8ff" rx="2"/>
    <text x="200" y="119" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a3f75">ptr → B2</text>
    <rect x="168" y="124" width="64" height="8" fill="#f0e8ff" rx="2"/>
    <text x="200" y="131" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a3f75">ptr → B3</text>
    <rect x="168" y="136" width="64" height="8" fill="#f0e8ff" rx="2"/>
    <text x="200" y="143" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a3f75">ptr → B4</text>
    
    <text x="165" y="50" font-family="Arial, sans-serif" font-size="9" fill="#7d9aaa" font-style="italic">2. Index Block</text>
  </g>
  
  <!-- Section 3: Data Blocks -->
  <g class="section-3" data-narration="Data blocks store the actual file content, with each block holding a portion of the file's data">
    <rect x="255" y="55" width="40" height="28" fill="url(#blockGradient)" rx="4" filter="url(#shadow)"/>
    <text x="275" y="70" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a3d3d">B1</text>
    <text x="275" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#7d5a5a">Data</text>
    
    <rect x="305" y="55" width="40" height="28" fill="url(#blockGradient)" rx="4" filter="url(#shadow)"/>
    <text x="325" y="70" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a3d3d">B2</text>
    <text x="325" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#7d5a5a">Data</text>
    
    <rect x="255" y="90" width="40" height="28" fill="url(#blockGradient)" rx="4" filter="url(#shadow)"/>
    <text x="275" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a3d3d">B3</text>
    <text x="275" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#7d5a5a">Data</text>
    
    <rect x="305" y="90" width="40" height="28" fill="url(#blockGradient)" rx="4" filter="url(#shadow)"/>
    <text x="325" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a3d3d">B4</text>
    <text x="325" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#7d5a5a">Data</text>
    
    <text x="260" y="50" font-family="Arial, sans-serif" font-size="9" fill="#7d9aaa" font-style="italic">3. Data Blocks</text>
  </g>
  
  <!-- Arrow from index to data blocks -->
  <g class="arrow">
    <path d="M 200 150 L 200 170 L 275 168" fill="none" stroke="#b8a9e8" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="275,163 282,168 275,173" fill="#b8a9e8" class="pulse"/>
    <path d="M 210 150 L 210 170 L 325 168" fill="none" stroke="#b8a9e8" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="325,163 332,168 325,173" fill="#b8a9e8" class="pulse"/>
  </g>
  
  <!-- Section 4: File Header/Meta -->
  <g class="section-4" data-narration="File metadata includes information like name, size, permissions, and creation date">
    <rect x="160" y="190" width="130" height="50" fill="url(#fileGradient)" rx="6" filter="url(#shadow)"/>
    <text x="225" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">FILE HEADER</text>
    <text x="225" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5a4a2d">Meta Information</text>
    <text x="225" y="236" text-anchor="middle" font-family="monospace" font-size="8" fill="#7d5a3d">name, size, date, attr</text>
    
    <!-- File path example -->
    <rect x="160" y="250" width="130" height="35" fill="#fff9f0" rx="4" stroke="#e8d8c0" stroke-width="1"/>
    <text x="225" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a3f2f">/docs/report.txt</text>
    <text x="225" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7d6a5a">Full Path Example</text>
    
    <text x="165" y="185" font-family="Arial, sans-serif" font-size="9" fill="#7d9aaa" font-style="italic">4. File Metadata</text>
  </g>
  
  <!-- Section 5: Key Concepts Box -->
  <g class="section-4" data-narration="Understanding directory structures is essential for efficient file management and system performance">
    <rect x="15" y="305" width="390" height="85" fill="#ffffff" rx="6" stroke="#d0e0e8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="25" y="325" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Key Concepts:</text>
    
    <g transform="translate(25, 340)">
      <circle cx="5" cy="0" r="3" fill="#b8e0d2"/>
      <text x="15" y="4" font-family="Arial, sans-serif" font-size="10" fill="#3d4f5f">Hierarchical structure enables organized file storage</text>
    </g>
    <g transform="translate(25, 355)">
      <circle cx="5" cy="0" r="3" fill="#d4c4fb"/>
      <text x="15" y="4" font-family="Arial, sans-serif" font-size="10" fill="#3d4f5f">Index blocks provide direct access to file data</text>
    </g>
    <g transform="translate(25, 370)">
      <circle cx="5" cy="0" r="3" fill="#ffe5b4"/>
      <text x="15" y="4" font-family="Arial, sans-serif" font-size="10" fill="#3d4f5f">File metadata manages properties and permissions</text>
    </g>
    <g transform="translate(25, 385)">
      <circle cx="5" cy="0" r="3" fill="#f8c8c8"/>
      <text x="15" y="4" font-family="Arial, sans-serif" font-size="10" fill="#3d4f5f">Data blocks store actual file content on disk</text>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="20" r="8" fill="#b8e0d2" opacity="0.6"/>
  <circle cx="405" cy="35" r="5" fill="#d4c4fb" opacity="0.5"/>
  <circle cx="388" cy="38" r="4" fill="#ffe5b4" opacity="0.6"/>
</svg>