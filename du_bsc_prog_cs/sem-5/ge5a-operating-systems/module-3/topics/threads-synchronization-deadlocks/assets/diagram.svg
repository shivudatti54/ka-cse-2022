<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="threads-synchronization-deadlocks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="resourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b041"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateArrow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
    .condition-title { font-family: Arial, sans-serif; font-size: 10px; font-weight: bold; fill: #2c3e50; }
    .condition-text { font-family: Arial, sans-serif; font-size: 9px; fill: #555; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .rotate-anim { animation: rotateArrow 8s linear infinite; transform-origin: 210px 160px; }
    .box { rx: 8; ry: 8; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Threads Synchronization</text>
  <text x="210" y="50" text-anchor="middle" class="title" style="font-size:16px; fill:#c0392b;" data-narration="Main topic: Deadlock cycle and its four necessary conditions">Deadlocks</text>
  
  <!-- Deadlock Cycle Visualization -->
  <g class="slide-in" style="animation-delay: 0.3s;">
    <!-- Process P1 -->
    <rect x="60" y="120" width="80" height="50" rx="8" class="box" fill="url(#processGrad)" stroke="#4a7a9e" stroke-width="2"/>
    <text x="100" y="145" text-anchor="middle" class="label">P1</text>
    <text x="100" y="160" text-anchor="middle" class="detail" style="fill:#fff;font-size:9px;">Process 1</text>
    
    <!-- Process P2 -->
    <rect x="280" y="120" width="80" height="50" rx="8" class="box" fill="url(#processGrad)" stroke="#4a7a9e" stroke-width="2"/>
    <text x="320" y="145" text-anchor="middle" class="label">P2</text>
    <text x="320" y="160" text-anchor="middle" class="detail" style="fill:#fff;font-size:9px;">Process 2</text>
    
    <!-- Resource R1 -->
    <rect x="60" y="220" width="70" height="40" rx="6" class="box" fill="url(#resourceGrad)" stroke="#d35400" stroke-width="2"/>
    <text x="95" y="242" text-anchor="middle" class="label" style="font-size:12px;">R1</text>
    
    <!-- Resource R2 -->
    <rect x="290" y="220" width="70" height="40" rx="6" class="box" fill="url(#resourceGrad)" stroke="#d35400" stroke-width="2"/>
    <text x="325" y="242" text-anchor="middle" class="label" style="font-size:12px;">R2</text>
    
    <!-- Arrows showing deadlock -->
    <!-- P1 holds R1, wants R2 -->
    <path d="M 140 145 Q 180 145 200 145 L 280 145" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="pulse"/>
    <text x="210" y="138" text-anchor="middle" class="detail" style="fill:#27ae60;font-size:10px;">wants</text>
    
    <!-- P2 holds R2, wants R1 -->
    <path d="M 280 145 Q 240 145 220 145 L 140 145" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" style="animation: pulse 2s ease-in-out infinite; animation-delay: 1s;"/>
    <text x="210" y="165" text-anchor="middle" class="detail" style="fill:#e74c3c;font-size:10px;">wants</text>
    
    <!-- P1 holds R1 -->
    <line x1="100" y1="170" x2="95" y2="220" stroke="#e67e22" stroke-width="2"/>
    <text x="80" y="200" class="detail" style="fill:#e67e22;font-size:9px;">holds</text>
    
    <!-- P2 holds R2 -->
    <line x1="320" y1="170" x2="325" y2="220" stroke="#e67e22" stroke-width="2"/>
    <text x="340" y="200" class="detail" style="fill:#e67e22;font-size:9px;">holds</text>
    
    <!-- Circular wait indicator -->
    <path d="M 200 100 A 120 60 0 1 1 210 100" stroke="#9b59b6" stroke-width="3" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowhead)" class="rotate-anim"/>
    <text x="210" y="85" text-anchor="middle" class="condition-title" style="fill:#9b59b6;font-size:11px;">Circular Wait</text>
  </g>
  
  <!-- Four Conditions Boxes -->
  <g class="fade-in" style="animation-delay: 0.6s;">
    <!-- Mutual Exclusion -->
    <rect x="10" y="285" width="95" height="50" rx="5" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" data-narration="Condition 1: Mutual Exclusion - Resources cannot be shared"/>
    <text x="57" y="300" text-anchor="middle" class="condition-title">Mutual Exclusion</text>
    <text x="57" y="315" text-anchor="middle" class="condition-text">Resources are</text>
    <text x="57" y="326" text-anchor="middle" class="condition-text">not shareable</text>
    
    <!-- Hold and Wait -->
    <rect x="115" y="285" width="95" height="50" rx="5" fill="#fdebd0" stroke="#f39c12" stroke-width="1.5" data-narration="Condition 2: Hold and Wait - Processes hold resources while waiting for others"/>
    <text x="162" y="300" text-anchor="middle" class="condition-title">Hold &amp; Wait</text>
    <text x="162" y="315" text-anchor="middle" class="condition-text">Holds resource</text>
    <text x="162" y="326" text-anchor="middle" class="condition-text">while waiting</text>
    
    <!-- No Preemption -->
    <rect x="220" y="285" width="95" height="50" rx="5" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" data-narration="Condition 3: No Preemption - Resources cannot be forcibly taken"/>
    <text x="267" y="300" text-anchor="middle" class="condition-title">No Preemption</text>
    <text x="267" y="315" text-anchor="middle" class="condition-text">Cannot forcibly</text>
    <text x="267" y="326" text-anchor="middle" class="condition-text">take resources</text>
    
    <!-- Circular Wait -->
    <rect x="325" y="285" width="85" height="50" rx="5" fill="#e8daef" stroke="#8e44ad" stroke-width="1.5" data-narration="Condition 4: Circular Wait - P1 waits for P2, P2 waits for P1"/>
    <text x="367" y="300" text-anchor="middle" class="condition-title">Circular Wait</text>
    <text x="367" y="315" text-anchor="middle" class="condition-text">P1→P2→P1</text>
    <text x="367" y="326" text-anchor="middle" class="condition-text">cycle forms</text>
  </g>
  
  <!-- Bottom legend -->
  <g class="fade-in" style="animation-delay: 0.9s;">
    <rect x="10" y="345" width="18" height="18" rx="3" fill="url(#processGrad)"/>
    <text x="35" y="360" class="detail">Process</text>
    <rect x="100" y="345" width="18" height="18" rx="3" fill="url(#resourceGrad)"/>
    <text x="125" y="360" class="detail">Resource</text>
    <circle cx="200" cy="354" r="6" fill="none" stroke="#27ae60" stroke-width="2"/>
    <text x="215" y="360" class="detail" style="fill:#27ae60;">Wants</text>
    <circle cx="280" cy="354" r="6" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <text x="295" y="360" class="detail" style="fill:#e74c3c;">Held</text>
  </g>
</svg>