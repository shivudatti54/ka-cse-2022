<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="process-concept-scheduling-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#ffeef5"/>
    </linearGradient>
    <linearGradient id="stateNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="stateReady" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="stateRunning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="stateWaiting" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
    <linearGradient id="stateTerminated" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: slideIn 0.8s ease-out; }
    .state-box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .state-new { animation-delay: 0.2s; }
    .state-ready { animation-delay: 0.4s; }
    .state-running { animation-delay: 0.5s; }
    .state-waiting { animation-delay: 0.6s; }
    .state-terminated { animation-delay: 0.7s; }
    .arrow { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; animation-delay: 0.8s; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .concept-1 { animation-delay: 0.3s; }
    .concept-2 { animation-delay: 0.5s; }
    .concept-3 { animation-delay: 0.7s; }
    .running-pulse { animation: pulse 2s infinite; }
    .label { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    .state-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
    .arrow-label { font-family: Arial, sans-serif; font-size: 9px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title" fill="#37474f">Process Concept &amp;</text>
  <text x="210" y="46" text-anchor="middle" class="title-text title" fill="#37474f">Scheduling Algorithms</text>
  
  <!-- Process State Diagram -->
  <!-- State: New -->
  <g class="state-box state-new" data-narration="The New state represents a process that has just been created but not yet admitted to the ready queue by the OS">
    <rect x="20" y="80" width="70" height="40" rx="8" fill="url(#stateNew)" filter="url(#shadow)"/>
    <text x="55" y="105" text-anchor="middle" class="state-label" fill="#e65100">NEW</text>
  </g>
  
  <!-- State: Ready -->
  <g class="state-box state-ready" data-narration="The Ready state contains processes waiting in the ready queue for CPU allocation">
    <rect x="100" y="150" width="70" height="40" rx="8" fill="url(#stateReady)" filter="url(#shadow)"/>
    <text x="135" y="175" text-anchor="middle" class="state-label" fill="#2e7d32">READY</text>
  </g>
  
  <!-- State: Running -->
  <g class="state-box state-running" data-narration="The Running state shows the process currently executing on the CPU">
    <rect x="210" y="150" width="80" height="45" rx="8" fill="url(#stateRunning)" filter="url(#shadow)" class="running-pulse"/>
    <text x="250" y="177" text-anchor="middle" class="state-label" fill="#1565c0">RUNNING</text>
  </g>
  
  <!-- State: Waiting -->
  <g class="state-box state-waiting" data-narration="The Waiting/Blocked state shows processes waiting for I/O or events">
    <rect x="320" y="150" width="80" height="40" rx="8" fill="url(#stateWaiting)" filter="url(#shadow)"/>
    <text x="360" y="175" text-anchor="middle" class="state-label" fill="#c2185b">WAITING</text>
  </g>
  
  <!-- State: Terminated -->
  <g class="state-box state-terminated" data-narration="The Terminated state indicates a process that has finished execution">
    <rect x="155" y="260" width="90" height="40" rx="8" fill="url(#stateTerminated)" filter="url(#shadow)"/>
    <text x="200" y="285" text-anchor="middle" class="state-label" fill="#616161">TERMINATED</text>
  </g>
  
  <!-- Arrows/Transitions -->
  <!-- New to Ready -->
  <path d="M 55 120 L 55 140 L 135 145" fill="none" stroke="#78909c" stroke-width="2" class="arrow"/>
  <polygon points="135,140 135,150 145,145" fill="#78909c"/>
  <text x="80" y="135" class="arrow-label" fill="#546e7a">admit</text>
  
  <!-- Ready to Running -->
  <path d="M 170 170 L 205 172" fill="none" stroke="#78909c" stroke-width="2" class="arrow"/>
  <polygon points="200,167 210,172 200,177" fill="#78909c"/>
  
  <!-- Running to Ready (preempt) -->
  <path d="M 250 195 L 250 210 L 135 215 L 135 190" fill="none" stroke="#78909c" stroke-width="2" class="arrow"/>
  <polygon points="140,190 130,190 135,180" fill="#78909c"/>
  <text x="150" y="230" class="arrow-label" fill="#546e7a">preempt</text>
  
  <!-- Running to Waiting -->
  <path d="M 290 172 L 315 172" fill="none" stroke="#78909c" stroke-width="2" class="arrow"/>
  <polygon points="310,167 320,172 310,177" fill="#78909c"/>
  <text x="300" y="165" class="arrow-label" fill="#546e7a">wait</text>
  
  <!-- Waiting to Ready -->
  <path d="M 360 190 L 360 210 L 200 230 L 200 230" fill="none" stroke="#78909c" stroke-width="2" class="arrow"/>
  <polygon points="205,230 195,225 195,235" fill="#78909c"/>
  <text x="310" y="220" class="arrow-label" fill="#546e7a">wakeup</text>
  
  <!-- Running to Terminated -->
  <path d="M 250 195 L 250 220 L 200 245" fill="none" stroke="#78909c" stroke-width="2" class="arrow"/>
  <polygon points="205,240 200,250 210,245" fill="#78909c"/>
  <text x="225" y="235" class="arrow-label" fill="#546e7a">exit</text>
  
  <!-- Key Concepts Boxes -->
  <!-- Concept 1: Scheduling Algorithms -->
  <g class="concept-box concept-1" data-narration="Common scheduling algorithms include FCFS, SJF, Round Robin, and Priority Scheduling">
    <rect x="15" y="310" width="120" height="40" rx="5" fill="#fff" stroke="#90caf9" stroke-width="1" filter="url(#shadow)"/>
    <text x="75" y="325" text-anchor="middle" class="state-label" fill="#1565c0">Scheduling</text>
    <text x="75" y="340" text-anchor="middle" class="arrow-label" fill="#546e7a">FCFS | SJF | RR</text>
  </g>
  
  <!-- Concept 2: Process Components -->
  <g class="concept-box concept-2" data-narration="A process includes Program Counter, CPU registers, Stack, Heap, and Data section">
    <rect x="145" y="310" width="130" height="40" rx="5" fill="#fff" stroke="#a5d6a7" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="325" text-anchor="middle" class="state-label" fill="#2e7d32">Process</text>
    <text x="210" y="340" text-anchor="middle" class="arrow-label" fill="#546e7a">PC | Registers | Stack</text>
  </g>
  
  <!-- Concept 3: Performance Metrics -->
  <g class="concept-box concept-3" data-narration="Key performance metrics: Throughput, Turnaround time, Waiting time, CPU utilization">
    <rect x="285" y="310" width="115" height="40" rx="5" fill="#fff" stroke="#ce93d8" stroke-width="1" filter="url(#shadow)"/>
    <text x="342" y="325" text-anchor="middle" class="state-label" fill="#7b1fa2">Metrics</text>
    <text x="342" y="340" text-anchor="middle" class="arrow-label" fill="#546e7a">Throughput | TAT</text>
  </g>
  
  <!-- CPU Icon representation -->
  <g class="state-box" data-narration="The CPU executes instructions from the running process">
    <rect x="370" y="75" width="35" height="30" rx="3" fill="#37474f"/>
    <rect x="375" y="80" width="25" height="20" rx="2" fill="#546e7a"/>
    <text x="387" y="93" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial">CPU</text>
    <line x1="355" y1="90" x2="370" y2="90" stroke="#78909c" stroke-width="2"/>
  </g>
  
  <!-- Ready Queue representation -->
  <g class="state-box" data-narration="The ready queue holds all processes waiting for CPU time">
    <rect x="80" y="70" width="40" height="60" rx="3" fill="none" stroke="#4caf50" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="100" y="90" text-anchor="middle" class="arrow-label" fill="#2e7d32">Ready</text>
    <text x="100" y="102" text-anchor="middle" class="arrow-label" fill="#2e7d32">Queue</text>
  </g>
  
</svg>