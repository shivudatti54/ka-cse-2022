<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="paging-segmentation-virtual-memory">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="virtualGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fbcd4"/>
    </linearGradient>
    <linearGradient id="pageTableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8b8"/>
      <stop offset="100%" style="stop-color:#b8d488"/>
    </linearGradient>
    <linearGradient id="physicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#d4b888"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7cb3d4"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; opacity: 0.7; }
      50% { stroke-width: 3; opacity: 1; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .highlight { font-family: Arial, sans-serif; font-size: 11px; fill: #c0392b; font-weight: bold; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #5a9bc4; stroke-width: 2; fill: none; animation: arrowPulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Virtual Address Translation</text>
  <text x="210" y="45" text-anchor="middle" class="label slide-left">Paging in Virtual Memory</text>
  
  <!-- Virtual Address Box -->
  <g class="slide-left" data-narration="The virtual address contains a page number (VPN) and offset">
    <rect x="20" y="70" width="100" height="130" rx="8" fill="url(#virtualGradient)" filter="url(#shadow)"/>
    <text x="70" y="88" text-anchor="middle" class="box-title">Virtual Address</text>
    <rect x="30" y="100" width="80" height="30" rx="4" fill="#fff" stroke="#8fbcd4" stroke-width="1"/>
    <text x="70" y="118" text-anchor="middle" class="label" style="font-weight:bold;">Page #</text>
    <text x="70" y="132" text-anchor="middle" class="sublabel">(VPN)</text>
    <rect x="30" y="140" width="80" height="30" rx="4" fill="#fff" stroke="#8fbcd4" stroke-width="1"/>
    <text x="70" y="158" text-anchor="middle" class="label" style="font-weight:bold;">Offset</text>
    <text x="70" y="172" text-anchor="middle" class="sublabel">(offset bits)</text>
  </g>
  
  <!-- Page Table Box -->
  <g class="fade-in" data-narration="The page table maps virtual page numbers to physical frame numbers" style="animation-delay: 0.3s">
    <rect x="150" y="70" width="130" height="130" rx="8" fill="url(#pageTableGradient)" filter="url(#shadow)"/>
    <text x="215" y="88" text-anchor="middle" class="box-title">Page Table</text>
    <!-- Table header -->
    <rect x="160" y="98" width="55" height="18" rx="3" fill="#9bc468" stroke="#7a9c48"/>
    <text x="187" y="111" text-anchor="middle" class="sublabel" style="fill:#fff;font-weight:bold;">VPN</text>
    <rect x="215" y="98" width="55" height="18" rx="3" fill="#9bc468" stroke="#7a9c48"/>
    <text x="242" y="111" text-anchor="middle" class="sublabel" style="fill:#fff;font-weight:bold;">Frame</text>
    <!-- Table row 1 -->
    <rect x="160" y="118" width="55" height="18" rx="3" fill="#fff" stroke="#b8d488"/>
    <text x="187" y="131" text-anchor="middle" class="label">0</text>
    <rect x="215" y="118" width="55" height="18" rx="3" fill="#fff" stroke="#b8d488"/>
    <text x="242" y="131" text-anchor="middle" class="label">3</text>
    <!-- Table row 2 - highlighted -->
    <rect x="160" y="138" width="55" height="18" rx="3" fill="#ffeaa7" stroke="#f9ca24"/>
    <text x="187" y="151" text-anchor="middle" class="label" style="font-weight:bold;">1</text>
    <rect x="215" y="138" width="55" height="18" rx="3" fill="#ffeaa7" stroke="#f9ca24"/>
    <text x="242" y="151" text-anchor="middle" class="label" style="font-weight:bold;">7</text>
    <!-- Table row 3 -->
    <rect x="160" y="158" width="55" height="18" rx="3" fill="#fff" stroke="#b8d488"/>
    <text x="187" y="171" text-anchor="middle" class="label">2</text>
    <rect x="215" y="158" width="55" height="18" rx="3" fill="#fff" stroke="#b8d488"/>
    <text x="242" y="171" text-anchor="middle" class="label">1</text>
    <rect x="160" y="178" width="110" height="14" rx="3" fill="#f0f0f0"/>
    <text x="215" y="188" text-anchor="middle" class="sublabel">... more entries</text>
  </g>
  
  <!-- Physical Address Box -->
  <g class="slide-right" data-narration="The physical address is constructed from the frame number and offset">
    <rect x="310" y="70" width="100" height="130" rx="8" fill="url(#physicalGradient)" filter="url(#shadow)"/>
    <text x="360" y="88" text-anchor="middle" class="box-title">Physical Address</text>
    <rect x="320" y="100" width="80" height="30" rx="4" fill="#fff" stroke="#d4b888" stroke-width="2"/>
    <text x="360" y="118" text-anchor="middle" class="label" style="font-weight:bold;">Frame #</text>
    <text x="360" y="132" text-anchor="middle" class="sublabel">(PFN)</text>
    <rect x="320" y="140" width="80" height="30" rx="4" fill="#fff" stroke="#d4b888" stroke-width="1"/>
    <text x="360" y="158" text-anchor="middle" class="label" style="font-weight:bold;">Offset</text>
    <text x="360" y="172" text-anchor="middle" class="sublabel">(same offset)</text>
  </g>
  
  <!-- Arrows -->
  <g class="fade-in" data-narration="Virtual page number is used to look up the page table" style="animation-delay: 0.5s">
    <path d="M 125 115 L 145 115" class="arrow-line"/>
    <polygon points="145,110 155,115 145,120" fill="#5a9bc4"/>
  </g>
  
  <g class="fade-in" data-narration="Page table returns the frame number" style="animation-delay: 0.7s">
    <path d="M 285 145 L 305 145" class="arrow-line"/>
    <polygon points="305,140 315,145 305,150" fill="#5a9bc4"/>
  </g>
  
  <!-- Physical Memory Frames -->
  <g class="fade-in" data-narration="Physical memory is divided into fixed-size frames" style="animation-delay: 0.9s">
    <rect x="310" y="220" width="100" height="80" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="360" y="238" text-anchor="middle" class="box-title" style="font-size:12px;">Physical Memory</text>
    <line x1="320" y1="250" x2="400" y2="250" stroke="#ddd" stroke-width="1"/>
    <line x1="320" y1="270" x2="400" y2="270" stroke="#ddd" stroke-width="1"/>
    <line x1="320" y1="290" x2="400" y2="290" stroke="#ddd" stroke-width="1"/>
    <!-- Frame numbers -->
    <text x="325" y="263" class="sublabel">Frame 0</text>
    <text x="325" y="283" class="sublabel">Frame 1</text>
    <text x="325" y="303" class="sublabel">Frame 3</text>
    <!-- Highlight frame 3 -->
    <rect x="318" y="275" width="84" height="20" rx="2" fill="#ffeaa7" stroke="#f9ca24" class="pulse"/>
    <text x="370" y="289" class="highlight" style="font-size:10px;">Mapped!</text>
  </g>
  
  <!-- Translation Example Box -->
  <g class="fade-in" data-narration="Example: Virtual address (1, offset) maps to Physical address (7, offset)" style="animation-delay: 1.1s">
    <rect x="20" y="230" width="270" height="70" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
    <text x="155" y="250" text-anchor="middle" class="box-title" style="fill:#27ae60;">Translation Example</text>
    <text x="40" y="272" class="label">VPN=1, Offset=0123h</text>
    <text x="175" y="272" class="sublabel" style="fill:#7f8c8d;">&#x2192;</text>
    <text x="200" y="272" class="label">PFN=7, Offset=0123h</text>
    <text x="155" y="290" text-anchor="middle" class="sublabel" style="fill:#c0392b;">Page fault if frame not in memory</text>
  </g>
  
  <!-- TLB (Translation Lookaside Buffer) -->
  <g class="fade-in" data-narration="TLB is a hardware cache for fast page table lookups" style="animation-delay: 1.3s">
    <rect x="20" y="315" width="180" height="50" rx="6" fill="#e8e8f0" stroke="#c0c0d0" stroke-width="1"/>
    <text x="110" y="335" text-anchor="middle" class="box-title" style="font-size:11px;">TLB (Cache)</text>
    <text x="30" y="352" class="sublabel">VPN&#x2192;PFN fast lookup</text>
    <text x="140" y="352" class="sublabel" style="color:#27ae60;">Hit!</text>
  </g>
  
  <!-- Legend / Key -->
  <g class="fade-in" data-narration="Understanding the complete virtual memory address translation process" style="animation-delay: 1.5s">
    <rect x="210" y="315" width="200" height="50" rx="6" fill="#fef9e7" stroke="#f9e79f" stroke-width="1"/>
    <text x="310" y="335" text-anchor="middle" class="box-title" style="font-size:11px;">Key Points</text>
    <text x="220" y="352" class="sublabel" style="font-size:10px;">&#x2022; Page size = Frame size</text>
    <text x="220" y="364" class="sublabel" style="font-size:10px;">&#x2022; Offset preserved in translation</text>
  </g>
  
  <!-- Bottom label -->
  <text x="210" y="390" text-anchor="middle" class="sublabel" style="fill:#95a5a6;">Virtual Memory Management - OS Fundamentals</text>
</svg>