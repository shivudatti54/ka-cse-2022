<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="page-replacement-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes movePointer {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(50px); }
        50% { transform: translateX(100px); }
        75% { transform: translateX(50px); }
      }
      @keyframes pageEnter {
        from { transform: scale(0.5); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes highlightPulse {
        0%, 100% { stroke-width: 2; }
        50% { stroke-width: 4; }
      }
      .fade-in { animation: fadeIn 1s ease-out forwards; }
      .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
      .slide-right { animation: slideInRight 0.8s ease-out forwards; }
      .slide-up { animation: slideInUp 0.8s ease-out forwards; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .page-enter { animation: pageEnter 0.5s ease-out forwards; }
      .highlight { animation: highlightPulse 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="slide-up">
    <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282">Page Replacement Algorithms</text>
    <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568">FIFO (First In First Out) Example</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fade-in" data-narration="The page replacement problem occurs when a process needs a page not in memory. The OS must decide which existing page to evict.">
    <rect x="10" y="60" width="130" height="55" rx="5" fill="#fff" stroke="#cbd5e0" stroke-width="1" filter="url(#shadow)"/>
    <text x="20" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3748">Key Concept:</text>
    <text x="20" y="92" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">When frames are full,</text>
    <text x="20" y="104" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">choose victim page to</text>
    <text x="20" y="116" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">replace with new page.</text>
  </g>
  
  <!-- Reference String Box -->
  <g class="slide-right" data-narration="Reference String: The sequence of page accesses - 1,2,3,4,1,2. We process each number in sequence.">
    <rect x="280" y="60" width="130" height="55" rx="5" fill="#fff" stroke="#cbd5e0" stroke-width="1" filter="url(#shadow)"/>
    <text x="290" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3748">Reference String:</text>
    <text x="290" y="98" font-family="Arial, sans-serif" font-size="14" fill="#2b6cb0" font-weight="bold">1, 2, 3, 4, 1, 2</text>
  </g>
  
  <!-- Main Frames Area -->
  <g class="fade-in">
    <text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" font-weight="bold">Physical Memory (3 Frames)</text>
  </g>
  
  <!-- Frame Labels -->
  <g class="slide-left">
    <text x="85" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#718096">Oldest</text>
    <text x="85" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#718096">Middle</text>
    <text x="85" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#718096">Newest</text>
  </g>
  
  <!-- Frame 1 -->
  <g class="fade-in" data-narration="Frame 1: Initially empty, then receives page 1 as the oldest entry.">
    <rect x="100" y="150" width="80" height="40" rx="5" fill="url(#frameGradient)" stroke="#a0aec0" stroke-width="2" class="highlight"/>
    <text x="140" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3748" class="page-enter">1</text>
    <text x="140" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">Frame 1</text>
  </g>
  
  <!-- Frame 2 -->
  <g class="fade-in" data-narration="Frame 2: Gets page 2. Together with Frame 1, forms the initial memory state.">
    <rect x="100" y="210" width="80" height="40" rx="5" fill="url(#frameGradient)" stroke="#a0aec0" stroke-width="2"/>
    <text x="140" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3748" class="page-enter">2</text>
    <text x="140" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">Frame 2</text>
  </g>
  
  <!-- Frame 3 -->
  <g class="fade-in" data-narration="Frame 3: Gets page 3. Now all 3 frames are filled. Next page request will trigger replacement.">
    <rect x="100" y="270" width="80" height="40" rx="5" fill="url(#frameGradient)" stroke="#a0aec0" stroke-width="2"/>
    <text x="140" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3748" class="page-enter">3</text>
    <text x="140" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">Frame 3</text>
  </g>
  
  <!-- FIFO Queue/Arrow -->
  <g class="pulse" data-narration="FIFO Queue: The queue pointer indicates which frame holds the oldest page (the victim for replacement).">
    <path d="M 195 170 L 230 170 L 225 165 M 230 170 L 225 175" stroke="#e53e3e" stroke-width="2" fill="none"/>
    <rect x="195" y="155" width="40" height="15" rx="3" fill="#fed7d7"/>
    <text x="215" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c53030" font-weight="bold">FIFO</text>
    <path d="M 200 190 Q 215 200 200 210" stroke="#e53e3e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="205" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53e3e">oldest</text>
    <path d="M 200 230 Q 215 240 200 250" stroke="#e53e3e" stroke-width="1.5" fill="none"/>
    <text x="205" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53e3e">newest</text>
  </g>
  
  <!-- Current Reference -->
  <g class="slide-up" data-narration="Current Access: Page 4 is being requested. Since all frames are full, FIFO will replace the oldest page (page 1).">
    <rect x="200" y="335" width="80" height="30" rx="5" fill="#bee3f8" stroke="#4299e1" stroke-width="1"/>
    <text x="240" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2b6cb0" font-weight="bold">Page: 4</text>
    <text x="240" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">(Replace 1)</text>
  </g>
  
  <!-- Algorithm Explanation Box -->
  <g class="slide-left" data-narration="FIFO Algorithm: The first page loaded is the first to be replaced. Simple but not always optimal.">
    <rect x="10" y="330" width="180" height="60" rx="5" fill="#f0fff4" stroke="#68d391" stroke-width="1" filter="url(#shadow)"/>
    <text x="20" y="348" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#276749">How FIFO Works:</text>
    <text x="20" y="362" font-family="Arial, sans-serif" font-size="9" fill="#2f855a">1. Pages loaded in order</text>
    <text x="20" y="374" font-family="Arial, sans-serif" font-size="9" fill="#2f855a">2. Oldest page = victim</text>
    <text x="20" y="386" font-family="Arial, sans-serif" font-size="9" fill="#2f855a">3. Simple queue structure</text>
  </g>
  
  <!-- Page Fault Counter -->
  <g class="slide-right" data-narration="Page Faults: Each time a requested page is not in memory, a page fault occurs. FIFO had 3 faults for pages 1,2,3, and page 4.">
    <rect x="300" y="330" width="110" height="60" rx="5" fill="#fff5f5" stroke="#fc8181" stroke-width="1" filter="url(#shadow)"/>
    <text x="355" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c53030">Page Faults</text>
    <text x="355" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e53e3e">4</text>
    <text x="355" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b2c2c">(1,2,3,4)</text>
  </g>
  
  <!-- Arrow showing replacement -->
  <g class="pulse">
    <path d="M 280 175 L 250 175" stroke="#ed8936" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="250,170 260,175 250,180" fill="#ed8936"/>
    <text x="265" y="172" font-family="Arial, sans-serif" font-size="8" fill="#c05621">replace</text>
  </g>
</svg>