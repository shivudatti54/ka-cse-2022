<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="os-definition-structure-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9dd6b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7bc49a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a5c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b885ab;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5c896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a86a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer5Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8c5e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8aadcc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .layer { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .layer1 { animation-delay: 0.2s; }
    .layer2 { animation-delay: 0.4s; }
    .layer3 { animation-delay: 0.6s; }
    .layer4 { animation-delay: 0.8s; }
    .layer5 { animation-delay: 1s; }
    .arrow { animation: fadeIn 1.5s ease-out forwards; opacity: 0; }
    .arrow1 { animation-delay: 0.6s; }
    .arrow2 { animation-delay: 0.8s; }
    .arrow3 { animation-delay: 1s; }
    .arrow4 { animation-delay: 1.2s; }
    .pulse { animation: pulse 3s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c5282" class="title">OS: Definition, Structure &amp; Operations</text>
  
  <!-- Layer 1: Hardware -->
  <g class="layer layer1" data-narration="Hardware layer contains CPU, Memory, and I/O devices - the physical foundation">
    <rect x="30" y="330" width="360" height="35" rx="5" fill="url(#layer1Grad)" filter="url(#shadow)"/>
    <text x="210" y="352" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Hardware: CPU | Memory | I/O Devices</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow arrow1">
    <path d="M210 325 L210 305" stroke="#5a9bc4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Layer 2: Device Drivers -->
  <g class="layer layer2" data-narration="Device Drivers provide interface between OS and hardware components">
    <rect x="50" y="280" width="320" height="30" rx="5" fill="url(#layer2Grad)" filter="url(#shadow)"/>
    <text x="210" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Device Drivers</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow arrow2">
    <path d="M210 275 L210 255" stroke="#7bc49a" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Layer 3: Core OS Services -->
  <g class="layer layer3" data-narration="Process Management, Memory Management, and File System - the resource managers">
    <rect x="70" y="195" width="280" height="65" rx="5" fill="url(#layer3Grad)" filter="url(#shadow)"/>
    <text x="210" y="212" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Core OS Services</text>
    <text x="210" y="230" text-anchor="middle" font-size="11" fill="white">Process Mgmt | Memory Mgmt | File System</text>
    <text x="210" y="246" text-anchor="middle" font-size="11" fill="white">Security | Networking | Device Mgmt</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="arrow arrow3">
    <path d="M210 190 L210 170" stroke="#b885ab" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Layer 4: System Call Interface -->
  <g class="layer layer4" data-narration="System Call Interface provides API for programs to request OS services">
    <rect x="90" y="145" width="240" height="30" rx="5" fill="url(#layer4Grad)" filter="url(#shadow)"/>
    <text x="210" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="white">System Call Interface (API)</text>
  </g>
  
  <!-- Arrow 4 -->
  <g class="arrow arrow4">
    <path d="M210 140 L210 120" stroke="#e8a86a" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Layer 5: User Interface -->
  <g class="layer layer5" data-narration="User Interface (CLI/GUI) allows users to interact with the system">
    <rect x="110" y="90" width="200" height="35" rx="5" fill="url(#layer5Grad)" filter="url(#shadow)" class="pulse"/>
    <text x="210" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="white">User Interface (GUI/CLI)</text>
  </g>
  
  <!-- Key Concept Box 1 -->
  <g class="layer layer2">
    <rect x="300" y="280" width="110" height="28" rx="4" fill="#f0f7fb" stroke="#7eb8da" stroke-width="1"/>
    <text x="305" y="294" font-size="9" fill="#2c5282" font-weight="bold">Resource Manager</text>
    <text x="305" y="304" font-size="8" fill="#4a5568">Controls &amp; allocates</text>
  </g>
  
  <!-- Key Concept Box 2 -->
  <g class="layer layer3">
    <rect x="300" y="200" width="110" height="28" rx="4" fill="#fdf5f9" stroke="#d4a5c9" stroke-width="1"/>
    <text x="305" y="214" font-size="9" fill="#2c5282" font-weight="bold">Extended Machine</text>
    <text x="305" y="224" font-size="8" fill="#4a5568">Abstraction layer</text>
  </g>
  
  <!-- Direction indicator -->
  <g class="arrow arrow4">
    <text x="395" y="220" font-size="9" fill="#718096" font-style="italic">Dependency</text>
    <text x="395" y="232" font-size="9" fill="#718096" font-style="italic">Direction ↑</text>
  </g>
</svg>