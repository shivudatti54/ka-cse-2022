<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="tree-definitions-traversals">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e5f5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideIn {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .title { animation: fadeIn 0.8s ease-out forwards; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a237e; }
      .section-box { animation: fadeIn 0.6s ease-out forwards; }
      .tree-node { animation: bounce 2s ease-in-out infinite; transform-origin: center; }
      .node-root { animation: pulse 2s ease-in-out infinite; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #37474f; }
      .concept-label { font-family: Arial, sans-serif; font-size: 11px; fill: #5d4037; font-weight: bold; }
      .traversal-type { font-family: Arial, sans-serif; font-size: 10px; fill: #00695c; }
      .arrow-line { stroke: #78909c; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Tree Definitions &amp; Traversals</text>
  
  <!-- Section 1: Tree Diagram -->
  <g data-narration="Binary Tree: A hierarchical structure with root node 15, two branches extending to child nodes 10 and 20">
    <!-- Tree edges -->
    <line x1="210" y1="80" x2="130" y2="140" class="arrow-line" style="animation: slideIn 0.5s ease-out 0.2s both;" />
    <line x1="210" y1="80" x2="290" y2="140" class="arrow-line" style="animation: slideIn 0.5s ease-out 0.3s both;" />
    <line x1="130" y1="140" x2="90" y2="200" class="arrow-line" style="animation: slideIn 0.5s ease-out 0.4s both;" />
    <line x1="130" y1="140" x2="170" y2="200" class="arrow-line" style="animation: slideIn 0.5s ease-out 0.5s both;" />
    <line x1="290" y1="140" x2="250" y2="200" class="arrow-line" style="animation: slideIn 0.5s ease-out 0.6s both;" />
    <line x1="290" y1="140" x2="330" y2="200" class="arrow-line" style="animation: slideIn 0.5s ease-out 0.7s both;" />
    
    <!-- Root Node -->
    <circle cx="210" cy="80" r="22" fill="#7986cb" stroke="#3f51b5" stroke-width="2" filter="url(#shadow)" class="node-root" style="animation-delay: 0.3s;" />
    <text x="210" y="85" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">15</text>
    
    <!-- Level 2 Nodes -->
    <circle cx="130" cy="140" r="20" fill="#81c784" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.5s;" />
    <text x="130" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">10</text>
    
    <circle cx="290" cy="140" r="20" fill="#81c784" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.6s;" />
    <text x="290" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">20</text>
    
    <!-- Leaf Nodes -->
    <circle cx="90" cy="200" r="18" fill="#ffb74d" stroke="#ff9800" stroke-width="2" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.7s;" />
    <text x="90" y="205" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">5</text>
    
    <circle cx="170" cy="200" r="18" fill="#ffb74d" stroke="#ff9800" stroke-width="2" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.8s;" />
    <text x="170" y="205" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">12</text>
    
    <circle cx="250" cy="200" r="18" fill="#ffb74d" stroke="#ff9800" stroke-width="2" filter="url(#shadow)" class="tree-node" style="animation-delay: 0.9s;" />
    <text x="250" y="205" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">17</text>
    
    <circle cx="330" cy="200" r="18" fill="#ffb74d" stroke="#ff9800" stroke-width="2" filter="url(#shadow)" class="tree-node" style="animation-delay: 1s;" />
    <text x="330" y="205" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">25</text>
  </g>
  
  <!-- Node Labels -->
  <g data-narration="Root: The topmost node with no parent. Internal nodes have at least one child. Leaves have no children.">
    <rect x="5" y="230" width="125" height="55" rx="5" fill="white" stroke="#b0bec5" stroke-width="1" opacity="0.9" style="animation: fadeIn 0.5s ease-out 1.2s both;" />
    <text x="10" y="248" class="concept-label">Node Types:</text>
    <text x="10" y="263" class="label">● Root (15): No parent</text>
    <text x="10" y="278" class="label">● Internal: 10, 20</text>
  </g>
  
  <g data-narration="Leaves: Nodes with no children - 5, 12, 17, 25 are leaf nodes">
    <rect x="140" y="230" width="125" height="55" rx="5" fill="white" stroke="#b0bec5" stroke-width="1" opacity="0.9" style="animation: fadeIn 0.5s ease-out 1.3s both;" />
    <text x="145" y="248" class="concept-label">Leaves:</text>
    <text x="145" y="263" class="label">Nodes with no children</text>
    <text x="145" y="278" class="label">5, 12, 17, 25</text>
  </g>
  
  <g data-narration="Parent-Child Relationships: 15 is parent of 10 and 20; 10 is parent of 5 and 12; 20 is parent of 17 and 25">
    <rect x="275" y="230" width="140" height="55" rx="5" fill="white" stroke="#b0bec5" stroke-width="1" opacity="0.9" style="animation: fadeIn 0.5s ease-out 1.4s both;" />
    <text x="280" y="248" class="concept-label">Parent-Child:</text>
    <text x="280" y="263" class="label">15 → 10, 20</text>
    <text x="280" y="278" class="label">10 → 5, 12 | 20 → 17, 25</text>
  </g>
  
  <!-- Traversal Section -->
  <g data-narration="Tree Traversals: Pre-order (Root-Left-Right), In-order (Left-Root-Right), Post-order (Left-Right-Root), Level-order (Breadth-first)">
    <rect x="5" y="295" width="405" height="95" rx="8" fill="white" stroke="#ce93d8" stroke-width="2" opacity="0.95" style="animation: fadeIn 0.5s ease-out 1.5s both;" />
    <text x="15" y="318" class="concept-label" fill="#6a1b9a">Tree Traversals:</text>
    
    <g style="animation: slideIn 0.5s ease-out 1.7s both;">
      <circle cx="30" cy="340" r="4" fill="#ab47bc" />
      <text x="42" y="344" class="traversal-type">Pre-order: 15 → 10 → 5 → 12 → 20 → 17 → 25</text>
    </g>
    <g style="animation: slideIn 0.5s ease-out 1.8s both;">
      <circle cx="30" cy="358" r="4" fill="#ab47bc" />
      <text x="42" y="362" class="traversal-type">In-order: 5 → 10 → 12 → 15 → 17 → 20 → 25</text>
    </g>
    <g style="animation: slideIn 0.5s ease-out 1.9s both;">
      <circle cx="30" cy="376" r="4" fill="#ab47bc" />
      <text x="42" y="380" class="traversal-type">Post-order: 5 → 12 → 10 → 17 → 25 → 20 → 15</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g data-narration="Visual Legend: Blue=Root, Green=Internal Nodes, Orange=Leaf Nodes">
    <rect x="335" y="95" width="75" height="45" rx="4" fill="white" stroke="#90a4ae" stroke-width="1" opacity="0.8" style="animation: fadeIn 0.5s ease-out 1.1s both;" />
    <circle cx="350" cy="110" r="6" fill="#7986cb" />
    <text x="362" y="114" class="label">Root</text>
    <circle cx="350" cy="126" r="6" fill="#81c784" />
    <text x="362" y="130" class="label">Internal</text>
    <circle cx="350" cy="142" r="6" fill="#ffb74d" />
    <text x="362" y="146" class="label">Leaf</text>
  </g>
</svg>