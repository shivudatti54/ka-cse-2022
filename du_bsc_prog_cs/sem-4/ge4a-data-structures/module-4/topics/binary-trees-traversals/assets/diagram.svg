<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="binary-trees-traversals">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb3d0"/>
      <stop offset="100%" style="stop-color:#5a9bb8"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8fd4"/>
      <stop offset="100%" style="stop-color:#7a6bb8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlightPulse {
      0%, 100% { fill: #ff9f43; }
      50% { fill: #ffbe76; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #5d6d7e; }
    .traversal-text { font-family: 'Consolas', monospace; font-size: 11px; fill: #2c3e50; }
    .tree-node { fill: url(#nodeGradient); stroke: #4a8aa8; stroke-width: 1.5; }
    .tree-node-highlight { fill: #ff9f43; stroke: #e67e22; stroke-width: 2; }
    .connector { stroke: #95a5a6; stroke-width: 1.5; fill: none; }
    .section-box { fill: #ffffff; stroke: #bdc3c7; stroke-width: 1; rx: 8; }
    .section-box-accent { fill: #f8f5ff; stroke: #9b8fd4; stroke-width: 1.5; rx: 8; }
    
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1.0s; }
    .delay-6 { animation-delay: 1.2s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="anim-fade">
    <text x="210" y="28" text-anchor="middle" class="title">Binary Tree Traversals</text>
    <line x1="60" y1="38" x2="360" y2="38" stroke="#7a6bb8" stroke-width="2"/>
  </g>
  
  <!-- Binary Tree Diagram Section -->
  <g class="anim-fade delay-1" data-narration="The sample binary tree used for demonstrating traversals. Root is A, with left child B and right child C.">
    <text x="60" y="58" class="section-title">Sample Tree</text>
    
    <!-- Tree edges -->
    <line x1="140" y1="110" x2="100" y2="150" class="connector"/>
    <line x1="140" y1="110" x2="180" y2="150" class="connector"/>
    <line x1="100" y1="150" x2="80" y2="190" class="connector"/>
    <line x1="100" y1="150" x2="120" y2="190" class="connector"/>
    <line x1="180" y1="150" x2="160" y2="190" class="connector"/>
    <line x1="180" y1="150" x2="200" y2="190" class="connector"/>
    
    <!-- Tree nodes -->
    <circle cx="140" cy="100" r="16" class="tree-node" filter="url(#shadow)"/>
    <text x="140" y="105" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">A</text>
    
    <circle cx="100" cy="150" r="16" class="tree-node" filter="url(#shadow)"/>
    <text x="100" y="155" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">B</text>
    
    <circle cx="180" cy="150" r="16" class="tree-node" filter="url(#shadow)"/>
    <text x="180" y="155" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">C</text>
    
    <circle cx="80" cy="190" r="16" class="tree-node" filter="url(#shadow)"/>
    <text x="80" y="195" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">D</text>
    
    <circle cx="120" cy="190" r="16" class="tree-node" filter="url(#shadow)"/>
    <text x="120" y="195" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">E</text>
    
    <circle cx="160" cy="190" r="16" class="tree-node" filter="url(#shadow)"/>
    <text x="160" y="195" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">F</text>
    
    <circle cx="200" cy="190" r="16" class="tree-node" filter="url(#shadow)"/>
    <text x="200" y="195" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="14" font-weight="bold">G</text>
  </g>
  
  <!-- Preorder Traversal Box -->
  <g class="anim-slide delay-2" data-narration="Preorder: Visit root first, then left subtree, then right subtree. Used for copying trees.">
    <rect x="250" y="55" width="155" height="55" class="section-box" filter="url(#shadow)"/>
    <text x="260" y="70" class="section-title">Preorder</text>
    <text x="260" y="86" class="label">Root → Left → Right</text>
    <text x="260" y="100" class="traversal-text">A B D E C F G</text>
  </g>
  
  <!-- Inorder Traversal Box -->
  <g class="anim-slide delay-3" data-narration="Inorder: Visit left subtree, then root, then right subtree. Produces sorted order in BST.">
    <rect x="250" y="115" width="155" height="55" class="section-box" filter="url(#shadow)"/>
    <text x="260" y="130" class="section-title">Inorder</text>
    <text x="260" y="146" class="label">Left → Root → Right</text>
    <text x="260" y="160" class="traversal-text">D B E A F C G</text>
  </g>
  
  <!-- Postorder Traversal Box -->
  <g class="anim-slide delay-4" data-narration="Postorder: Visit left subtree, then right subtree, then root. Used for deleting trees.">
    <rect x="250" y="175" width="155" height="55" class="section-box" filter="url(#shadow)"/>
    <text x="260" y="190" class="section-title">Postorder</text>
    <text x="260" y="206" class="label">Left → Right → Root</text>
    <text x="260" y="220" class="traversal-text">D E B F G C A</text>
  </g>
  
  <!-- Level-order Traversal Box -->
  <g class="anim-slide delay-5" data-narration="Level-order: Visit nodes level by level from left to right. Uses queue data structure.">
    <rect x="250" y="235" width="155" height="55" class="section-box" filter="url(#shadow)"/>
    <text x="260" y="250" class="section-title">Level-order</text>
    <text x="260" y="266" class="label">Level by Level (BFS)</text>
    <text x="260" y="280" class="traversal-text">A B C D E F G</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="anim-fade delay-6" data-narration="Key terminology: Root is top node, leaf nodes have no children, depth is distance from root.">
    <rect x="10" y="225" width="230" height="160" class="section-box-accent" filter="url(#shadow)"/>
    <text x="20" y="245" class="section-title">Key Terminology</text>
    
    <circle cx="30" cy="265" r="5" fill="#7cb3d0"/>
    <text x="42" y="269" class="detail">Root: Topmost node (A)</text>
    
    <circle cx="30" cy="285" r="5" fill="#9b8fd4"/>
    <text x="42" y="289" class="detail">Leaf: No children (D,E,F,G)</text>
    
    <circle cx="30" cy="305" r="5" fill="#7cb3d0"/>
    <text x="42" y="309" class="detail">Parent/Child: B is child of A</text>
    
    <circle cx="30" cy="325" r="5" fill="#9b8fd4"/>
    <text x="42" y="329" class="detail">Depth: Levels from root (A=0)</text>
    
    <circle cx="30" cy="345" r="5" fill="#7cb3d0"/>
    <text x="42" y="349" class="detail">Height: Longest path to leaf</text>
    
    <circle cx="30" cy="365" r="5" fill="#9b8fd4"/>
    <text x="42" y="369" class="detail">Subtree: Children and descendants</text>
  </g>
  
  <!-- Complexity Info -->
  <g class="anim-fade delay-6" data-narration="All traversals have O(n) time complexity as each node is visited once. Space complexity is O(h) where h is height.">
    <rect x="10" y="320" width="100" height="65" fill="#fff9e6" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="18" y="338" class="label" fill="#d35400">Time: O(n) each</text>
    <text x="18" y="354" class="label" fill="#d35400">Space: O(h)</text>
    <text x="18" y="378" class="detail" fill="#7f8c8d">h = tree height</text>
  </g>
  
  <!-- Arrows/Visual Connectors -->
  <g class="anim-fade delay-4">
    <path d="M 220 80 L 245 80" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="#95a5a6"/>
    </marker>
  </defs>
</svg>