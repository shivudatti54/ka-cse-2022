<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="bst-operations-complexity">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="bestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="100%" style="stop-color:#c3e6cb"/>
    </linearGradient>
    <linearGradient id="avgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd"/>
      <stop offset="100%" style="stop-color:#ffeeba"/>
    </linearGradient>
    <linearGradient id="worstGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d7da"/>
      <stop offset="100%" style="stop-color:#f5c6cb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideIn 0.6s ease-out forwards; }
    .section { animation: fadeIn 0.8s ease-out forwards; }
    .card { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .card-1 { animation-delay: 0.2s; }
    .card-2 { animation-delay: 0.4s; }
    .card-3 { animation-delay: 0.6s; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .node { animation: fadeIn 0.3s ease-out forwards; }
    .arrow-line { stroke-dasharray: 50; animation: drawLine 1s ease-out forwards; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c3e50">BST Operations Complexity</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#3498db" stroke-width="2" class="arrow-line"/>
  
  <!-- Best Case Card -->
  <g class="card card-1" filter="url(#shadow)">
    <rect x="15" y="55" width="120" height="95" rx="8" fill="url(#bestGrad)"/>
    <text x="75" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#155724">Best Case</text>
    <text x="75" y="92" text-anchor="middle" font-size="18" font-weight="bold" fill="#155724">O(1)</text>
    <text x="75" y="108" text-anchor="middle" font-size="10" fill="#155724">Element at root</text>
    <!-- Mini balanced tree -->
    <circle cx="75" cy="132" r="8" fill="#28a745" class="pulse"/>
    <line x1="75" y1="132" x2="55" y2="148" stroke="#28a745" stroke-width="2"/>
    <line x1="75" y1="132" x2="95" y2="148" stroke="#28a745" stroke-width="2"/>
    <circle cx="55" cy="148" r="5" fill="#28a745"/>
    <circle cx="95" cy="148" r="5" fill="#28a745"/>
  </g>
  
  <!-- Average Case Card -->
  <g class="card card-2" filter="url(#shadow)">
    <rect x="150" y="55" width="120" height="95" rx="8" fill="url(#avgGrad)"/>
    <text x="210" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#856404">Average Case</text>
    <text x="210" y="92" text-anchor="middle" font-size="18" font-weight="bold" fill="#856404">O(log n)</text>
    <text x="210" y="108" text-anchor="middle" font-size="10" fill="#856404">Balanced tree</text>
    <!-- Mini balanced tree -->
    <circle cx="210" cy="132" r="8" fill="#ffc107" class="pulse"/>
    <line x1="210" y1="132" x2="190" y2="148" stroke="#ffc107" stroke-width="2"/>
    <line x1="210" y1="132" x2="230" y2="148" stroke="#ffc107" stroke-width="2"/>
    <circle cx="190" cy="148" r="5" fill="#ffc107"/>
    <circle cx="230" cy="148" r="5" fill="#ffc107"/>
    <line x1="190" y1="148" x2="180" y2="158" stroke="#ffc107" stroke-width="1.5"/>
    <line x1="230" y1="148" x2="240" y2="158" stroke="#ffc107" stroke-width="1.5"/>
    <circle cx="180" cy="158" r="4" fill="#ffc107"/>
    <circle cx="240" cy="158" r="4" fill="#ffc107"/>
  </g>
  
  <!-- Worst Case Card -->
  <g class="card card-3" filter="url(#shadow)">
    <rect x="285" y="55" width="120" height="95" rx="8" fill="url(#worstGrad)"/>
    <text x="345" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#721c24">Worst Case</text>
    <text x="345" y="92" text-anchor="middle" font-size="18" font-weight="bold" fill="#721c24">O(n)</text>
    <text x="345" y="108" text-anchor="middle" font-size="10" fill="#721c24">Skewed tree</text>
    <!-- Mini skewed tree -->
    <circle cx="345" cy="130" r="7" fill="#dc3545" class="pulse"/>
    <line x1="345" y1="137" x2="345" y2="152" stroke="#dc3545" stroke-width="2"/>
    <circle cx="345" cy="155" r="6" fill="#dc3545"/>
    <line x1="345" y1="161" x2="345" y2="176" stroke="#dc3545" stroke-width="2"/>
    <circle cx="345" cy="179" r="5" fill="#dc3545"/>
  </g>
  
  <!-- Operations Table -->
  <g class="section" data-narration="Operations complexity table showing Search, Insert, and Delete operations">
    <text x="210" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Operations Complexity</text>
    <rect x="20" y="182" width="380" height="85" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Table Header -->
    <rect x="20" y="182" width="380" height="22" rx="6" fill="#e9ecef"/>
    <rect x="20" y="204" width="380" height="22" fill="#e9ecef"/>
    <text x="35" y="197" font-size="12" font-weight="bold" fill="#495057">Operation</text>
    <text x="130" y="197" font-size="12" font-weight="bold" fill="#495057">Best</text>
    <text x="210" y="197" font-size="12" font-weight="bold" fill="#495057">Average</text>
    <text x="300" y="197" font-size="12" font-weight="bold" fill="#495057">Worst</text>
    
    <!-- Search Row -->
    <text x="35" y="220" font-size="12" font-weight="bold" fill="#2c3e50">Search</text>
    <text x="130" y="220" font-size="12" fill="#155724">O(1)</text>
    <text x="210" y="220" font-size="12" fill="#856404">O(log n)</text>
    <text x="300" y="220" font-size="12" fill="#721c24">O(n)</text>
    <line x1="20" y1="226" x2="400" y2="226" stroke="#dee2e6"/>
    
    <!-- Insert Row -->
    <text x="35" y="244" font-size="12" font-weight="bold" fill="#2c3e50">Insert</text>
    <text x="130" y="244" font-size="12" fill="#155724">O(1)</text>
    <text x="210" y="244" font-size="12" fill="#856404">O(log n)</text>
    <text x="300" y="244" font-size="12" fill="#721c24">O(n)</text>
    <line x1="20" y1="250" x2="400" y2="250" stroke="#dee2e6"/>
    
    <!-- Delete Row -->
    <text x="35" y="268" font-size="12" font-weight="bold" fill="#2c3e50">Delete</text>
    <text x="130" y="268" font-size="12" fill="#155724">O(1)</text>
    <text x="210" y="268" font-size="12" fill="#856404">O(log n)</text>
    <text x="300" y="268" font-size="12" fill="#721c24">O(n)</text>
  </g>
  
  <!-- Key Insight Box -->
  <g class="section" data-narration="Key insight about BST efficiency">
    <rect x="20" y="280" width="380" height="50" rx="6" fill="#e7f3ff" stroke="#b6d4fe" stroke-width="1"/>
    <text x="35" y="298" font-size="13" font-weight="bold" fill="#084298">Key Insight:</text>
    <text x="35" y="316" font-size="11" fill="#084298">BST becomes inefficient (O(n)) when unbalanced. Use self-balancing trees</text>
    <text x="35" y="328" font-size="11" fill="#084298">(AVL, Red-Black) for guaranteed O(log n) performance.</text>
  </g>
  
  <!-- Footer -->
  <g class="section">
    <text x="210" y="375" text-anchor="middle" font-size="10" fill="#6c757d">Binary Search Tree Operations • Data Structures</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="370" r="4" fill="#3498db" opacity="0.5"/>
  <circle cx="370" cy="370" r="4" fill="#3498db" opacity="0.5"/>
  <circle cx="30" cy="50" r="3" fill="#9b59b6" opacity="0.4"/>
  <circle cx="390" cy="350" r="3" fill="#9b59b6" opacity="0.4"/>
</svg>