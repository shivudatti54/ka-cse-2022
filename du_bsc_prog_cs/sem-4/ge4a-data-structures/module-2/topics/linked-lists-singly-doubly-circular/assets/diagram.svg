<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="linked-lists-singly-doubly-circular">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#ffeef5"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="nodeGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
    <linearGradient id="nodeGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00bfa5"/>
      <stop offset="100%" style="stop-color:#004d40"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    @keyframes nodeAppear {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a237e; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-anim { animation: arrowPulse 1.5s ease-in-out infinite; }
    .node-appear { animation: nodeAppear 0.5s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in" data-narration="Introduction to Linked Lists - dynamic linear data structures with nodes containing data and pointers">
    <text x="210" y="25" text-anchor="middle" class="title">Linked Lists: Singly, Doubly &amp; Circular</text>
    <rect x="60" y="38" width="300" height="2" fill="#4a90d9" opacity="0.5"/>
  </g>
  
  <!-- Singly Linked List Section -->
  <g transform="translate(10, 55)" data-narration="Singly Linked List - each node contains data and a pointer to the next node">
    <rect x="0" y="0" width="400" height="95" rx="8" fill="#e3f2fd" stroke="#4a90d9" stroke-width="1" opacity="0.9"/>
    <text x="10" y="18" class="section-title" fill="#1565c0">Singly Linked List</text>
    
    <!-- Head pointer -->
    <g class="slide-in">
      <path d="M 30 50 L 60 50" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowhead)"/>
      <text x="8" y="54" class="detail" fill="#c62828">HEAD</text>
    </g>
    
    <!-- Nodes -->
    <g class="node-appear" style="animation-delay: 0.2s">
      <rect x="60" y="35" width="55" height="30" rx="3" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="87.5" y="54" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">10</text>
      <path d="M 115 50 L 140 50" stroke="#333" stroke-width="2" class="arrow-anim"/>
      <text x="125" y="42" class="detail" font-size="9">next</text>
    </g>
    
    <g class="node-appear" style="animation-delay: 0.4s">
      <rect x="140" y="35" width="55" height="30" rx="3" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="167.5" y="54" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">20</text>
      <path d="M 195 50 L 220 50" stroke="#333" stroke-width="2" class="arrow-anim"/>
    </g>
    
    <g class="node-appear" style="animation-delay: 0.6s">
      <rect x="220" y="35" width="55" height="30" rx="3" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="247.5" y="54" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">30</text>
      <path d="M 275 50 L 300 50" stroke="#333" stroke-width="2" class="arrow-anim"/>
    </g>
    
    <g class="node-appear" style="animation-delay: 0.8s">
      <rect x="300" y="35" width="55" height="30" rx="3" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <text x="327.5" y="54" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">40</text>
      <path d="M 355 50 L 370 50" stroke="#333" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="355" y="45" class="detail" font-size="9" fill="#666">NULL</text>
    </g>
  </g>
  
  <!-- Doubly Linked List Section -->
  <g transform="translate(10, 155)" data-narration="Doubly Linked List - each node has pointers to both previous and next nodes, enabling bidirectional traversal">
    <rect x="0" y="0" width="400" height="100" rx="8" fill="#f3e5f5" stroke="#7c4dff" stroke-width="1" opacity="0.9"/>
    <text x="10" y="18" class="section-title" fill="#6a1b9a">Doubly Linked List</text>
    
    <!-- Head pointer -->
    <g class="slide-in" style="animation-delay: 0.3s">
      <path d="M 25 50 L 50 50" stroke="#d32f2f" stroke-width="2"/>
      <text x="5" y="54" class="detail" fill="#c62828">HEAD</text>
    </g>
    
    <!-- Node 1 -->
    <g class="node-appear" style="animation-delay: 0.3s">
      <rect x="50" y="25" width="40" height="50" rx="3" fill="url(#nodeGradient2)" filter="url(#shadow)"/>
      <text x="70" y="42" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">prev</text>
      <text x="70" y="55" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">10</text>
      <text x="70" y="68" text-anchor="middle" fill="#fff" font-size="10">next</text>
      <path d="M 90 50 L 115 50" stroke="#333" stroke-width="2" class="arrow-anim"/>
      <path d="M 115 50 L 90 50" stroke="#333" stroke-width="2" class="arrow-anim" style="animation-delay: 0.2s"/>
    </g>
    
    <!-- Node 2 -->
    <g class="node-appear" style="animation-delay: 0.5s">
      <rect x="115" y="25" width="40" height="50" rx="3" fill="url(#nodeGradient2)" filter="url(#shadow)"/>
      <text x="135" y="42" text-anchor="middle" fill="#fff" font-size="10">prev</text>
      <text x="135" y="55" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">20</text>
      <text x="135" y="68" text-anchor="middle" fill="#fff" font-size="10">next</text>
      <path d="M 155 50 L 180 50" stroke="#333" stroke-width="2" class="arrow-anim"/>
      <path d="M 180 50 L 155 50" stroke="#333" stroke-width="2" class="arrow-anim" style="animation-delay: 0.2s"/>
    </g>
    
    <!-- Node 3 -->
    <g class="node-appear" style="animation-delay: 0.7s">
      <rect x="180" y="25" width="40" height="50" rx="3" fill="url(#nodeGradient2)" filter="url(#shadow)"/>
      <text x="200" y="42" text-anchor="middle" fill="#fff" font-size="10">prev</text>
      <text x="200" y="55" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">30</text>
      <text x="200" y="68" text-anchor="middle" fill="#fff" font-size="10">next</text>
      <path d="M 220 50 L 245 50" stroke="#333" stroke-width="2" class="arrow-anim"/>
      <path d="M 245 50 L 220 50" stroke="#333" stroke-width="2" class="arrow-anim" style="animation-delay: 0.2s"/>
    </g>
    
    <!-- NULL indicators -->
    <g class="node-appear" style="animation-delay: 0.9s">
      <path d="M 220 30 L 235 30" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="230" y="22" class="detail" font-size="8" fill="#666">NULL</text>
      <path d="M 220 70 L 235 70" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="230" y="85" class="detail" font-size="8" fill="#666">NULL</text>
    </g>
    
    <text x="280" y="55" class="label" fill="#4a148c" font-size="11">Bidirectional</text>
    <text x="280" y="70" class="detail" fill="#6a1b9a">traversal possible</text>
  </g>
  
  <!-- Circular Linked List Section -->
  <g transform="translate(10, 260)" data-narration="Circular Linked List - the last node points back to the first node, forming a circle">
    <rect x="0" y="0" width="400" height="130" rx="8" fill="#e0f2f1" stroke="#00bfa5" stroke-width="1" opacity="0.9"/>
    <text x="10" y="18" class="section-title" fill="#004d40">Circular Linked List</text>
    
    <!-- Circular representation -->
    <g class="pulse">
      <circle cx="80" cy="75" r="25" fill="url(#nodeGradient3)" filter="url(#shadow)" opacity="0.9"/>
      <text x="80" y="70" text-anchor="middle" fill="#fff" font-size="10">DATA</text>
      <text x="80" y="85" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">A</text>
      <path d="M 100 65 Q 130 65 145 75 Q 160 85 145 95 Q 130 105 100 95" stroke="#004d40" stroke-width="2" fill="none" class="arrow-anim"/>
    </g>
    
    <g class="node-appear" style="animation-delay: 0.2s">
      <circle cx="150" cy="50" r="20" fill="url(#nodeGradient3)" filter="url(#shadow)"/>
      <text x="150" y="55" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">B</text>
    </g>
    
    <g class="node-appear" style="animation-delay: 0.4s">
      <circle cx="180" cy="90" r="20" fill="url(#nodeGradient3)" filter="url(#shadow)"/>
      <text x="180" y="95" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">C</text>
    </g>
    
    <g class="node-appear" style="animation-delay: 0.6s">
      <circle cx="150" cy="115" r="20" fill="url(#nodeGradient3)" filter="url(#shadow)"/>
      <text x="150" y="120" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">D</text>
    </g>
    
    <!-- Arrows showing circular nature -->
    <g class="arrow-anim">
      <path d="M 168 55 Q 190 55 195 75 Q 200 95 185 103" stroke="#004d40" stroke-width="2" fill="none"/>
      <polygon points="185,103 190,98 192,105" fill="#004d40"/>
    </g>
    
    <g class="arrow-anim" style="animation-delay: 0.3s">
      <path d="M 195 95 Q 200 110 180 120 Q 160 130 150 120" stroke="#004d40" stroke-width="2" fill="none"/>
      <polygon points="150,120 155,115 150,110" fill="#004d40"/>
    </g>
    
    <g class="arrow-anim" style="animation-delay: 0.5s">
      <path d="M 135 120 Q 100 130 85 110 Q 70 90 80 75" stroke="#004d40" stroke-width="2" fill="none"/>
      <polygon points="80,75 85,80 75,80" fill="#004d40"/>
    </g>
    
    <!-- Head indicator -->
    <g class="slide-in" style="animation-delay: 0.8s">
      <path d="M 30 75 L 55 75" stroke="#d32f2f" stroke-width="2"/>
      <text x="15" y="70" class="detail" fill="#c62828" font-size="10">HEAD</text>
    </g>
    
    <!-- Key points -->
    <g class="fade-in" style="animation-delay: 1s">
      <text x="230" y="45" class="label" fill="#004d40" font-weight="bold">Singly Circular:</text>
      <text x="230" y="60" class="detail" fill="#00695c">Last node → First node</text>
      <text x="230" y="75" class="label" fill="#004d40" font-weight="bold">Doubly Circular:</text>
      <text x="230" y="90" class="detail" fill="#00695c">Both directions form loop</text>
      <text x="230" y="110" class="detail" fill="#00897b" font-style="italic">No NULL termination</text>
    </g>
  </g>
  
  <!-- Key Concepts Box -->
  <g transform="translate(10, 365)" data-narration="Key advantages of linked lists: dynamic size, efficient insertions/deletions, no memory waste">
    <rect x="0" y="0" width="400" height="30" rx="5" fill="#fff8e1" stroke="#ffa000" stroke-width="1"/>
    <text x="10" y="20" class="label" fill="#e65100">Key: Nodes store data + pointer(s) | Dynamic memory | O(1) insert/delete at ends</text>
  </g>
</svg>