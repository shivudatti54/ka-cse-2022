<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="queues-implementations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#357a8c"/>
    </linearGradient>
    <linearGradient id="queueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(30px); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c5f6e; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c5f6e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5a7a8a; }
    .operation { font-family: Arial, sans-serif; font-size: 13px; fill: #ffffff; font-weight: bold; }
    .box { rx: 8; ry: 8; }
    .animated-fade { animation: fadeIn 1s ease-out forwards; }
    .animated-slide { animation: slideIn 0.8s ease-out forwards; }
    .animated-pulse { animation: pulse 2s ease-in-out infinite; }
    .array-cell { fill: url(#arrayGradient); stroke: #2c5f6e; stroke-width: 1; }
    .queue-item { fill: url(#queueGradient); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animated-fade">Queues: Implementations</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4a90a4" stroke-width="2" stroke-linecap="round" class="animated-fade"/>
  
  <!-- Section 1: Queue Definition Box -->
  <g class="animated-slide" style="animation-delay: 0.2s" data-narration="Queue is a FIFO (First-In-First-Out) linear data structure">
    <rect x="20" y="55" width="180" height="55" class="box" fill="#f0f8ff" stroke="#7eb8da" stroke-width="2" filter="url(#shadow)"/>
    <text x="30" y="72" class="label" style="font-weight:bold;">Queue: FIFO Principle</text>
    <text x="30" y="90" class="detail">First In → First Out</text>
    <text x="30" y="103" class="detail">enqueue←front | rear→dequeue</text>
  </g>
  
  <!-- Section 2: Array Implementation -->
  <g class="animated-fade" style="animation-delay: 0.4s" data-narration="Array-based linear queue with front and rear pointers">
    <rect x="210" y="55" width="190" height="55" class="box" fill="#e8f4f8" stroke="#7eb8da" stroke-width="2" filter="url(#shadow)"/>
    <text x="220" y="72" class="label" style="font-weight:bold;">Array Implementation</text>
    <text x="220" y="90" class="detail">Sequential memory storage</text>
    <text x="220" y="103" class="detail">Fixed size limitation</text>
  </g>
  
  <!-- Section 3: Array Visualization -->
  <g class="animated-fade" style="animation-delay: 0.6s" data-narration="Visual representation of queue array with indices and pointers">
    <text x="30" y="135" class="label" style="font-weight:bold;">Array Representation:</text>
    
    <!-- Array cells -->
    <g transform="translate(30, 150)">
      <rect x="0" y="0" width="45" height="35" class="array-cell" rx="3"/>
      <text x="22.5" y="22" text-anchor="middle" class="operation" font-size="11">A[0]</text>
      
      <rect x="48" y="0" width="45" height="35" class="array-cell" rx="3"/>
      <text x="70.5" y="22" text-anchor="middle" class="operation" font-size="11">A[1]</text>
      
      <rect x="96" y="0" width="45" height="35" class="array-cell" rx="3"/>
      <text x="118.5" y="22" text-anchor="middle" class="operation" font-size="11">A[2]</text>
      
      <rect x="144" y="0" width="45" height="35" class="array-cell" rx="3" fill="#c8e0ec" stroke="#4a90a4"/>
      <text x="166.5" y="22" text-anchor="middle" class="detail" font-size="11">A[3]</text>
      
      <rect x="192" y="0" width="45" height="35" class="array-cell" rx="3" fill="#c8e0ec" stroke="#4a90a4"/>
      <text x="214.5" y="22" text-anchor="middle" class="detail" font-size="11">A[4]</text>
    </g>
    
    <!-- Front pointer -->
    <g transform="translate(52, 195)">
      <line x1="0" y1="0" x2="0" y2="15" stroke="#e74c3c" stroke-width="2" class="animated-pulse"/>
      <polygon points="-5,15 5,15 0,22" fill="#e74c3c"/>
      <text x="0" y="32" text-anchor="middle" class="detail" fill="#e74c3c" font-weight="bold">Front</text>
    </g>
    
    <!-- Rear pointer -->
    <g transform="translate(100, 195)">
      <line x1="0" y1="0" x2="0" y2="15" stroke="#27ae60" stroke-width="2" class="animated-pulse" style="animation-delay: 0.5s"/>
      <polygon points="-5,15 5,15 0,22" fill="#27ae60"/>
      <text x="0" y="32" text-anchor="middle" class="detail" fill="#27ae60" font-weight="bold">Rear</text>
    </g>
  </g>
  
  <!-- Section 4: Queue Operations -->
  <g class="animated-slide" style="animation-delay: 0.8s" data-narration="Main queue operations: enqueue and dequeue">
    <text x="30" y="250" class="label" style="font-weight:bold;">Queue Operations:</text>
    
    <!-- Enqueue box -->
    <rect x="30" y="265" width="120" height="50" rx="6" fill="#27ae60" filter="url(#shadow)"/>
    <text x="90" y="285" text-anchor="middle" class="operation">enqueue(item)</text>
    <text x="90" y="303" text-anchor="middle" class="operation" font-size="11" fill="#e8f4f8">Add at rear →</text>
    
    <!-- Arrow -->
    <path d="M155 290 L180 290" stroke="#2c5f6e" stroke-width="2" marker-end="url(#arrowhead)" class="animated-pulse"/>
    
    <!-- Dequeue box -->
    <rect x="185" y="265" width="120" height="50" rx="6" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="245" y="285" text-anchor="middle" class="operation">dequeue()</text>
    <text x="245" y="303" text-anchor="middle" class="operation" font-size="11" fill="#fff5f5">← Remove from front</text>
  </g>
  
  <!-- Section 5: Additional Operations -->
  <g class="animated-fade" style="animation-delay: 1s" data-narration="Helper operations for queue access">
    <rect x="30" y="330" width="85" height="40" rx="5" fill="#3498db" opacity="0.8"/>
    <text x="72" y="350" text-anchor="middle" class="operation" font-size="11">front()</text>
    <text x="72" y="363" text-anchor="middle" class="operation" font-size="9" fill="#e8f4f8">Peek front</text>
    
    <rect x="125" y="330" width="85" height="40" rx="5" fill="#3498db" opacity="0.8"/>
    <text x="167" y="350" text-anchor="middle" class="operation" font-size="11">rear()</text>
    <text x="167" y="363" text-anchor="middle" class="operation" font-size="9" fill="#e8f4f8">Peek rear</text>
    
    <rect x="220" y="330" width="85" height="40" rx="5" fill="#9b59b6" opacity="0.8"/>
    <text x="262" y="350" text-anchor="middle" class="operation" font-size="11">isEmpty()</text>
    <text x="262" y="363" text-anchor="middle" class="operation" font-size="9" fill="#f5eef8">Check empty</text>
    
    <rect x="315" y="330" width="75" height="40" rx="5" fill="#e67e22" opacity="0.8"/>
    <text x="352" y="350" text-anchor="middle" class="operation" font-size="11">size</text>
    <text x="352" y="363" text-anchor="middle" class="operation" font-size="9" fill="#fef5e7">Get count</text>
  </g>
  
  <!-- Section 6: Time Complexities -->
  <g class="animated-slide" style="animation-delay: 1.2s" data-narration="Time complexity analysis for queue operations">
    <text x="310" y="135" class="label" style="font-weight:bold;">Time Complexity:</text>
    <rect x="295" y="148" width="110" height="60" rx="5" fill="#fff9e6" stroke="#f39c12" stroke-width="1"/>
    <text x="305" y="168" class="detail" fill="#2c5f6e">enqueue: O(1)</text>
    <text x="305" y="185" class="detail" fill="#2c5f6e">dequeue: O(1)</text>
    <text x="305" y="202" class="detail" fill="#2c5f6e">front/rear: O(1)</text>
  </g>
  
  <!-- Visual Queue Elements (showing sample queue) -->
  <g class="animated-fade" style="animation-delay: 1.4s" data-narration="Example queue contents visualization">
    <text x="310" y="230" class="label" style="font-weight:bold;">Example Queue:</text>
    <g transform="translate(295, 245)">
      <rect x="0" y="0" width="28" height="28" rx="4" class="queue-item" stroke="#4a90a4"/>
      <text x="14" y="18" text-anchor="middle" class="operation" font-size="10">10</text>
      
      <rect x="32" y="0" width="28" height="28" rx="4" class="queue-item" stroke="#4a90a4"/>
      <text x="46" y="18" text-anchor="middle" class="operation" font-size="10">20</text>
      
      <rect x="64" y="0" width="28" height="28" rx="4" class="queue-item" stroke="#4a90a4"/>
      <text x="78" y="18" text-anchor="middle" class="operation" font-size="10">30</text>
      
      <!-- Arrow showing flow -->
      <path d="M100 14 L115 14" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
    </g>
    <text x="350" y="285" class="detail" fill="#27ae60" font-size="10">FIFO</text>
  </g>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c5f6e"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
</svg>