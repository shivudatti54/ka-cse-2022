<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="arrays-operations" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fcf5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrayCellGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a87;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="operationBoxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb3ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7fc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeBlockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e272e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1a365d; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .code { font-family: 'Courier New', monospace; font-size: 11px; fill: #e2e8f0; }
    .highlight { font-family: Arial, sans-serif; font-size: 12px; fill: #c53030; font-weight: bold; }
    .section-box { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .array-cell { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .array-cell:nth-child(1) { animation-delay: 0.3s; }
    .array-cell:nth-child(2) { animation-delay: 0.4s; }
    .array-cell:nth-child(3) { animation-delay: 0.5s; }
    .array-cell:nth-child(4) { animation-delay: 0.6s; }
    .array-cell:nth-child(5) { animation-delay: 0.7s; }
    .array-cell:nth-child(6) { animation-delay: 0.8s; }
    .operation-box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .operation-box:nth-child(1) { animation-delay: 0.5s; }
    .operation-box:nth-child(2) { animation-delay: 0.7s; }
    .operation-box:nth-child(3) { animation-delay: 0.9s; }
    .operation-box:nth-child(4) { animation-delay: 1.1s; }
    .arrow-line { animation: arrowPulse 2s ease-in-out infinite; }
    .memory-label { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    .index-label { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>

  <!-- Title Section -->
  <g data-narration="Title section introducing the Arrays Operations topic">
    <text x="210" y="30" text-anchor="middle" class="title">Arrays Operations</text>
    <line x1="80" y1="42" x2="340" y2="42" stroke="#4a90d9" stroke-width="2"/>
  </g>

  <!-- Array Memory Layout Visualization -->
  <g data-narration="Shows contiguous memory layout for array with 6 elements" transform="translate(30, 60)">
    <!-- Memory Address Labels -->
    <g class="memory-label" style="animation-delay: 0.3s;">
      <text x="0" y="20" class="detail" fill="#718096">Memory:</text>
      <text x="60" y="20" class="detail">1000</text>
      <text x="108" y="20" class="detail">1004</text>
      <text x="156" y="20" class="detail">1008</text>
      <text x="204" y="20" class="detail">1012</text>
      <text x="252" y="20" class="detail">1016</text>
      <text x="300" y="20" class="detail">1020</text>
    </g>
    
    <!-- Index Labels -->
    <g class="index-label" style="animation-delay: 0.4s;">
      <text x="0" y="50" class="label">Index:</text>
      <text x="70" y="50" class="label" fill="#c53030">0</text>
      <text x="118" y="50" class="label" fill="#c53030">1</text>
      <text x="166" y="50" class="label" fill="#c53030">2</text>
      <text x="214" y="50" class="label" fill="#c53030">3</text>
      <text x="262" y="50" class="label" fill="#c53030">4</text>
      <text x="310" y="50" class="label" fill="#c53030">5</text>
    </g>

    <!-- Array Cells -->
    <g>
      <rect x="55" y="60" width="40" height="35" rx="4" fill="url(#arrayCellGradient)" class="array-cell" filter="url(#shadow)"/>
      <text x="75" y="82" text-anchor="middle" class="label" fill="white">10</text>
      
      <rect x="103" y="60" width="40" height="35" rx="4" fill="url(#arrayCellGradient)" class="array-cell" filter="url(#shadow)"/>
      <text x="123" y="82" text-anchor="middle" class="label" fill="white">25</text>
      
      <rect x="151" y="60" width="40" height="35" rx="4" fill="url(#arrayCellGradient)" class="array-cell" filter="url(#shadow)"/>
      <text x="171" y="82" text-anchor="middle" class="label" fill="white">37</text>
      
      <rect x="199" y="60" width="40" height="35" rx="4" fill="url(#arrayCellGradient)" class="array-cell" filter="url(#shadow)"/>
      <text x="219" y="82" text-anchor="middle" class="label" fill="white">42</text>
      
      <rect x="247" y="60" width="40" height="35" rx="4" fill="url(#arrayCellGradient)" class="array-cell" filter="url(#shadow)"/>
      <text x="267" y="82" text-anchor="middle" class="label" fill="white">58</text>
      
      <rect x="295" y="60" width="40" height="35" rx="4" fill="url(#arrayCellGradient)" class="array-cell" filter="url(#shadow)"/>
      <text x="315" y="82" text-anchor="middle" class="label" fill="white">73</text>
    </g>
    
    <!-- Contiguous Memory Arrow -->
    <path d="M 55 110 L 340 110" stroke="#48bb78" stroke-width="2" stroke-dasharray="5,3" class="arrow-line"/>
    <polygon points="340,105 340,115 348,110" fill="#48bb78"/>
    <text x="190" y="125" class="detail" fill="#276749">Contiguous Memory Allocation</text>
  </g>

  <!-- Operations Boxes -->
  <g data-narration="Four main array operations: Traversal, Insertion, Deletion, Search" transform="translate(20, 165)">
    <rect x="0" y="0" width="85" height="45" rx="6" fill="url(#operationBoxGradient)" filter="url(#shadow)" class="operation-box"/>
    <text x="42.5" y="18" text-anchor="middle" class="label" fill="white" font-weight="bold">Traversal</text>
    <text x="42.5" y="34" text-anchor="middle" class="detail" fill="#e2e8f0">Visit all elements</text>
    
    <rect x="95" y="0" width="85" height="45" rx="6" fill="url(#operationBoxGradient)" filter="url(#shadow)" class="operation-box"/>
    <text x="137.5" y="18" text-anchor="middle" class="label" fill="white" font-weight="bold">Insertion</text>
    <text x="137.5" y="34" text-anchor="middle" class="detail" fill="#e2e8f0">Add element</text>
    
    <rect x="190" y="0" width="85" height="45" rx="6" fill="url(#operationBoxGradient)" filter="url(#shadow)" class="operation-box"/>
    <text x="232.5" y="18" text-anchor="middle" class="label" fill="white" font-weight="bold">Deletion</text>
    <text x="232.5" y="34" text-anchor="middle" class="detail" fill="#e2e8f0">Remove element</text>
    
    <rect x="285" y="0" width="85" height="45" rx="6" fill="url(#operationBoxGradient)" filter="url(#shadow)" class="operation-box"/>
    <text x="327.5" y="18" text-anchor="middle" class="label" fill="white" font-weight="bold">Search</text>
    <text x="327.5" y="34" text-anchor="middle" class="detail" fill="#e2e8f0">Find element</text>
  </g>

  <!-- Code Example Section -->
  <g data-narration="Code examples showing array declaration and initialization in C" transform="translate(20, 225)">
    <rect x="0" y="0" width="380" height="90" rx="8" fill="url(#codeBlockGradient)" filter="url(#shadow)"/>
    <text x="15" y="22" class="label" fill="#68d391" font-weight="bold">Code Examples:</text>
    
    <text x="15" y="42" class="code">int marks[10];</text>
    <text x="140" y="42" class="code" fill="#81e6d9">// Declaration</text>
    
    <text x="15" y="60" class="code">float prices[5] = {100.5, 200.0, 150.75, 300.0, 50.25};</text>
    <text x="15" y="78" class="code">char name[20] = "Delhi University";</text>
  </g>

  <!-- Complexity Box -->
  <g data-narration="Shows time complexity for array operations" transform="translate(20, 325)">
    <rect x="0" y="0" width="180" height="60" rx="6" fill="#faf5ff" stroke="#9f7aea" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="90" y="18" text-anchor="middle" class="label" fill="#553c9a" font-weight="bold">Time Complexity</text>
    <text x="10" y="38" class="detail">Access: O(1) | Search: O(n)</text>
    <text x="10" y="52" class="detail">Insert: O(n) | Delete: O(n)</text>
  </g>

  <!-- Key Feature Box -->
  <g data-narration="Highlights the key advantage of arrays - O(1) random access" transform="translate(220, 325)">
    <rect x="0" y="0" width="180" height="60" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="90" y="18" text-anchor="middle" class="label" fill="#276749" font-weight="bold">Key Feature</text>
    <text x="10" y="38" class="detail">O(1) Random Access</text>
    <text x="10" y="52" class="detail">by index (contiguous memory)</text>
  </g>

  <!-- Decorative Elements -->
  <circle cx="395" cy="385" r="15" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="25" cy="385" r="12" fill="#e2e8f0" opacity="0.5"/>
  <rect x="15" y="375" width="8" height="20" rx="2" fill="#4a90d9" opacity="0.4"/>
  <rect x="390" y="370" width="8" height="20" rx="2" fill="#9f7aea" opacity="0.4"/>

</svg>