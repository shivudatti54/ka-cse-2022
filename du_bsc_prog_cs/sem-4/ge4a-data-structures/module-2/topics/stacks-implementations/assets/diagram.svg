<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="stacks-implementations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <linearGradient id="elementGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="pushGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8fd4a8"/>
      <stop offset="100%" style="stop-color:#6bb885"/>
    </linearGradient>
    <linearGradient id="popGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b5b5"/>
      <stop offset="100%" style="stop-color:#e89090"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveDown {
      from { transform: translateY(0); }
      to { transform: translateY(30px); }
    }
    @keyframes moveUp {
      from { transform: translateY(30px); }
      to { transform: translateY(0); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .element { animation: fadeIn 0.4s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Stacks: Array Implementation</text>
  
  <!-- Main Stack Visualization -->
  <g transform="translate(30, 60)">
    <!-- Stack Container -->
    <rect x="0" y="0" width="120" height="180" fill="url(#stackGradient)" stroke="#bdc3c7" stroke-width="2" rx="5" filter="url(#shadow)"/>
    
    <!-- Stack Label -->
    <text x="60" y="-10" text-anchor="middle" class="label" font-weight="bold">Array Stack</text>
    
    <!-- Index labels -->
    <text x="-15" y="25" class="detail" text-anchor="end">[2]</text>
    <text x="-15" y="70" class="detail" text-anchor="end">[1]</text>
    <text x="-15" y="115" class="detail" text-anchor="end">[0]</text>
    
    <!-- Stack elements will be drawn here -->
    <!-- Empty slots -->
    <rect x="10" y="130" width="100" height="40" fill="none" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="4"/>
    <rect x="10" y="85" width="100" height="40" fill="none" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="4"/>
    <rect x="10" y="40" width="100" height="40" fill="none" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="4"/>
  </g>
  
  <!-- Operation Panel -->
  <g transform="translate(180, 60)">
    <!-- Push Operation Box -->
    <rect x="0" y="0" width="100" height="50" fill="url(#pushGradient)" stroke="#5a9bc4" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="50" y="20" text-anchor="middle" class="box-title">PUSH</text>
    <text x="50" y="38" text-anchor="middle" class="detail">Add to top</text>
    
    <!-- Pop Operation Box -->
    <rect x="0" y="60" width="100" height="50" fill="url(#popGradient)" stroke="#c46a6a" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="50" y="80" text-anchor="middle" class="box-title">POP</text>
    <text x="50" y="98" text-anchor="middle" class="detail">Remove top</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g transform="translate(290, 60)" data-narration="LIFO Principle: Last In, First Out">
    <rect x="0" y="0" width="115" height="115" fill="white" stroke="#bdc3c7" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="10" y="20" class="box-title">Key Concepts</text>
    <text x="10" y="40" class="detail">• LIFO: Last In,</text>
    <text x="10" y="55" class="detail">  First Out</text>
    <text x="10" y="75" class="detail">• top: index of</text>
    <text x="10" y="90" class="detail">  top element</text>
    <text x="10" y="105" class="detail">• O(1) operations</text>
  </g>
  
  <!-- State Progression -->
  <g transform="translate(30, 260)">
    <!-- Step 1: Empty -->
    <g transform="translate(0, 0)" class="fade-in" style="animation-delay: 0.2s">
      <rect x="0" y="0" width="55" height="100" fill="white" stroke="#95a5a6" stroke-width="1" rx="3"/>
      <text x="27" y="20" text-anchor="middle" class="detail" font-size="10">Empty</text>
      <text x="27" y="50" text-anchor="middle" class="label" font-size="11">top = -1</text>
      <text x="27" y="85" text-anchor="middle" class="detail" font-size="9" fill="#e74c3c">Start</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M 60 50 L 85 50" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
    
    <!-- Step 2: After push(10) -->
    <g transform="translate(90, 0)" class="fade-in" style="animation-delay: 0.4s">
      <rect x="0" y="0" width="55" height="100" fill="white" stroke="#95a5a6" stroke-width="1" rx="3"/>
      <rect x="5" y="55" width="45" height="35" fill="url(#elementGradient)" rx="2"/>
      <text x="27" y="77" text-anchor="middle" class="label" fill="white" font-size="12">10</text>
      <text x="27" y="30" text-anchor="middle" class="detail" font-size="10">push(10)</text>
      <text x="27" y="90" text-anchor="middle" class="detail" font-size="10">top=0</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M 150 50 L 175 50" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    
    <!-- Step 3: After push(20) -->
    <g transform="translate(180, 0)" class="fade-in" style="animation-delay: 0.6s">
      <rect x="0" y="0" width="55" height="100" fill="white" stroke="#95a5a6" stroke-width="1" rx="3"/>
      <rect x="5" y="20" width="45" height="35" fill="url(#elementGradient)" rx="2"/>
      <text x="27" y="42" text-anchor="middle" class="label" fill="white" font-size="12">20</text>
      <rect x="5" y="55" width="45" height="35" fill="url(#elementGradient)" rx="2"/>
      <text x="27" y="77" text-anchor="middle" class="label" fill="white" font-size="12">10</text>
      <text x="27" y="-5" text-anchor="middle" class="detail" font-size="10">push(20)</text>
      <text x="27" y="90" text-anchor="middle" class="detail" font-size="10">top=1</text>
    </g>
    
    <!-- Arrow 3 -->
    <path d="M 240 50 L 265 50" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    
    <!-- Step 4: After push(30) -->
    <g transform="translate(270, 0)" class="fade-in" style="animation-delay: 0.8s">
      <rect x="0" y="0" width="55" height="100" fill="white" stroke="#95a5a6" stroke-width="1" rx="3"/>
      <rect x="5" y="-15" width="45" height="35" fill="url(#elementGradient)" rx="2" class="pulse"/>
      <text x="27" y="7" text-anchor="middle" class="label" fill="white" font-size="12">30</text>
      <rect x="5" y="20" width="45" height="35" fill="url(#elementGradient)" rx="2"/>
      <text x="27" y="42" text-anchor="middle" class="label" fill="white" font-size="12">20</text>
      <rect x="5" y="55" width="45" height="35" fill="url(#elementGradient)" rx="2"/>
      <text x="27" y="77" text-anchor="middle" class="label" fill="white" font-size="12">10</text>
      <text x="27" y="-30" text-anchor="middle" class="detail" font-size="10">push(30)</text>
      <text x="27" y="90" text-anchor="middle" class="detail" font-size="10">top=2</text>
    </g>
  </g>
  
  <!-- Top Pointer Visualization -->
  <g transform="translate(80, 100)" class="fade-in" style="animation-delay: 1s" data-narration="Top pointer tracks the last element pushed">
    <path d="M 0 0 L 0 30 L -5 25 M 0 30 L 5 25" stroke="#e74c3c" stroke-width="2" fill="none"/>
    <text x="-10" y="15" class="detail" fill="#e74c3c" font-size="10" text-anchor="end">top</text>
    <circle cx="0" cy="0" r="4" fill="#e74c3c"/>
  </g>
  
  <!-- Bottom Info -->
  <g transform="translate(210, 375)" data-narration="Time Complexity: Push O(1), Pop O(1), Peek O(1)">
    <text x="0" y="0" text-anchor="middle" class="detail" font-size="11">Time Complexity: Push O(1) | Pop O(1) | Peek O(1)</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(300, 190)" data-narration="Visual legend for stack operations">
    <rect x="0" y="0" width="105" height="60" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <rect x="10" y="10" width="20" height="15" fill="url(#pushGradient)" rx="2"/>
    <text x="40" y="21" class="detail" font-size="10">Push</text>
    <rect x="10" y="35" width="20" height="15" fill="url(#popGradient)" rx="2"/>
    <text x="40" y="46" class="detail" font-size="10">Pop</text>
  </g>
</svg>