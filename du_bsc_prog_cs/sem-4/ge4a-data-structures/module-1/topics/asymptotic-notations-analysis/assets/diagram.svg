<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="asymptotic-notations-analysis" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4eef5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="curveGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .axis { animation: slideInLeft 0.6s ease-out 0.2s forwards; }
    .curve-box { animation: fadeIn 0.6s ease-out forwards; }
    .legend-item { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
    .concept-box { animation: fadeIn 0.7s ease-out 0.4s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw-anim { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 2s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8" />
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" class="title" font-family="Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#2d3748">Asymptotic Notations Analysis</text>
  <text x="210" y="50" text-anchor="middle" class="subtitle" font-family="Segoe UI, sans-serif" font-size="12" fill="#718096">Time Complexity Growth Chart</text>
  
  <!-- Graph Area -->
  <g data-narration="The chart displays how execution time grows with input size n for different complexity classes">
    <!-- Grid lines -->
    <line x1="50" y1="350" x2="380" y2="350" stroke="#cbd5e0" stroke-width="1" class="axis" />
    <line x1="50" y1="50" x2="50" y2="350" stroke="#cbd5e0" stroke-width="1" class="axis" />
    
    <!-- Y-axis labels -->
    <text x="45" y="355" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">0</text>
    <text x="45" y="275" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">10</text>
    <text x="45" y="195" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">20</text>
    <text x="45" y="115" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">30</text>
    <text x="45" y="55" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">40</text>
    
    <!-- X-axis labels -->
    <text x="50" y="370" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">0</text>
    <text x="132" y="370" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">2</text>
    <text x="214" y="370" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">4</text>
    <text x="297" y="370" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">6</text>
    <text x="380" y="370" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#718096">8</text>
    
    <!-- Axis titles -->
    <text x="215" y="390" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#4a5568" font-weight="600">Input Size (n)</text>
    <text x="15" y="200" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#4a5568" font-weight="600" transform="rotate(-90, 15, 200)">Operations</text>
  </g>
  
  <!-- Curves -->
  <g data-narration="O(1) constant time - horizontal line, O(log n) logarithmic - very slow growth, O(n) linear - straight diagonal, O(n log n) linearithmic - curved growth, O(n²) quadratic - parabolic, O(2^n) exponential - explosive growth">
    <!-- O(1) - constant - horizontal line at y=1 -->
    <line x1="50" y1="345" x2="380" y2="345" stroke="#48bb78" stroke-width="3" fill="none" class="draw-anim" />
    
    <!-- O(log n) - logarithmic curve -->
    <path d="M50,345 Q100,335 150,328 Q200,322 250,318 Q300,315 330,313 380,310" stroke="#ed8936" stroke-width="2.5" fill="none" class="draw-anim" />
    
    <!-- O(n) - linear -->
    <line x1="50" y1="345" x2="380" y2="55" stroke="#4299e1" stroke-width="2.5" class="draw-anim" />
    
    <!-- O(n log n) - linearithmic -->
    <path d="M50,345 Q100,300 150,265 Q200,235 250,208 Q300,185 330,170 380,145" stroke="#9f7aea" stroke-width="2.5" fill="none" class="draw-anim" />
    
    <!-- O(n²) - quadratic -->
    <path d="M50,345 Q100,300 130,265 Q160,220 190,165 Q220,100 250,55" stroke="#e53e3e" stroke-width="2.5" fill="none" class="draw-anim" />
    
    <!-- O(2^n) - exponential (just shows initial part) -->
    <path d="M50,345 Q60,340 70,330 Q80,310 90,280 Q100,240 105,200" stroke="#d53f8c" stroke-width="2.5" fill="none" class="draw-anim" />
  </g>
  
  <!-- Legend -->
  <g data-narration="Legend showing color-coded complexity classes from best to worst performance">
    <rect x="260" y="60" width="150" height="130" fill="white" rx="6" filter="url(#shadow)" />
    <text x="270" y="78" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2d3748">Complexity Classes</text>
    
    <g class="legend-item" style="animation-delay: 0.5s">
      <circle cx="275" cy="95" r="4" fill="#48bb78" />
      <text x="285" y="99" font-family="Segoe UI, sans-serif" font-size="10" fill="#2d3748">O(1) - Constant</text>
    </g>
    <g class="legend-item" style="animation-delay: 0.6s">
      <circle cx="275" cy="112" r="4" fill="#ed8936" />
      <text x="285" y="116" font-family="Segoe UI, sans-serif" font-size="10" fill="#2d3748">O(log n) - Logarithmic</text>
    </g>
    <g class="legend-item" style="animation-delay: 0.7s">
      <circle cx="275" cy="129" r="4" fill="#4299e1" />
      <text x="285" y="133" font-family="Segoe UI, sans-serif" font-size="10" fill="#2d3748">O(n) - Linear</text>
    </g>
    <g class="legend-item" style="animation-delay: 0.8s">
      <circle cx="275" cy="146" r="4" fill="#9f7aea" />
      <text x="285" y="150" font-family="Segoe UI, sans-serif" font-size="10" fill="#2d3748">O(n log n) - Linearithmic</text>
    </g>
    <g class="legend-item" style="animation-delay: 0.9s">
      <circle cx="275" cy="163" r="4" fill="#e53e3e" />
      <text x="285" y="167" font-family="Segoe UI, sans-serif" font-size="10" fill="#2d3748">O(n²) - Quadratic</text>
    </g>
    <g class="legend-item" style="animation-delay: 1.0s">
      <circle cx="275" cy="180" r="4" fill="#d53f8c" />
      <text x="285" y="184" font-family="Segoe UI, sans-serif" font-size="10" fill="#2d3748">O(2ⁿ) - Exponential</text>
    </g>
  </g>
  
  <!-- Key Concept Boxes -->
  <g data-narration="Key concept explaining why we use asymptotic notations - to understand how algorithms scale with input size">
    <rect x="55" y="200" width="140" height="55" fill="#fff" rx="5" filter="url(#shadow)" class="concept-box" />
    <text x="65" y="218" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#2d3748">Why Asymptotic?</text>
    <text x="65" y="232" font-family="Segoe UI, sans-serif" font-size="9" fill="#718096">Focus on growth rate</text>
    <text x="65" y="244" font-family="Segoe UI, sans-serif" font-size="9" fill="#718096">as n → ∞</text>
  </g>
  
  <g data-narration="Algorithm A with O(n) complexity beats Algorithm B with O(n²) for large inputs">
    <rect x="55" y="265" width="140" height="55" fill="#fff" rx="5" filter="url(#shadow)" class="concept-box" />
    <text x="65" y="283" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#2d3748">Example</text>
    <text x="65" y="297" font-family="Segoe UI, sans-serif" font-size="9" fill="#718096">Algorithm A: 1000n + 500</text>
    <text x="65" y="309" font-family="Segoe UI, sans-serif" font-size="9" fill="#718096">Algorithm B: n² + n + 1</text>
  </g>
  
  <!-- Arrows showing relationship -->
  <g data-narration="Arrows indicate that lower complexity classes are more efficient">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#a0aec0" />
      </marker>
    </defs>
    <line x1="245" y1="95" x2="255" y2="95" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrowhead)" />
    <line x1="245" y1="112" x2="255" y2="129" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrowhead)" />
    <line x1="245" y1="129" x2="255" y2="146" stroke="#a0aec0" stroke-width="1" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Efficiency Label -->
  <g class="pulse" style="transform-origin: 385px 70px;">
    <text x="385" y="70" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#48bb78">BEST</text>
    <text x="385" y="185" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#e53e3e">WORST</text>
    <line x1="385" y1="75" x2="385" y2="180" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="4" />
  </g>
  
  <!-- University context note -->
  <rect x="55" y="330" width="310" height="25" fill="#ebf8ff" rx="4" />
  <text x="60" y="347" font-family="Segoe UI, sans-serif" font-size="9" fill="#2b6cb0">📚 Essential for CUET &amp; University Exams</text>
  <text x="280" y="347" font-family="Segoe UI, sans-serif" font-size="9" fill="#2b6cb0">DU Study Material</text</svg>