<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="recurrence-master-theorem" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="case1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="case2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#fff59d"/>
    </linearGradient>
    <linearGradient id="case3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcdd2"/>
      <stop offset="100%" style="stop-color:#ef9a9a"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .sublabel { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
    .formula { font-family: Times New Roman, serif; font-size: 16px; font-style: italic; fill: #1a237e; }
    .case-box { rx: 8; ry: 8; stroke: #666; stroke-width: 1; }
    .animated { animation: fadeIn 1s ease-out forwards; }
    .slide-anim { animation: slideIn 0.8s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title slide-anim">Master Theorem</text>
  <text x="210" y="46" text-anchor="middle" class="sublabel slide-anim">Recurrence Relation Solver</text>
  
  <!-- Recurrence Formula Box -->
  <g class="slide-anim" style="animation-delay: 0.2s">
    <rect x="60" y="58" width="300" height="36" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
    <text x="210" y="78" text-anchor="middle" class="formula">T(n) = aT(n/b) + f(n)</text>
  </g>
  
  <!-- Parameter Explanation -->
  <g class="animated" style="animation-delay: 0.3s" data-narration="Parameters: a = recursive calls, b = division factor, f(n) = combination cost">
    <rect x="70" y="102" width="280" height="28" rx="4" fill="#f5f5f5" stroke="#ddd"/>
    <text x="90" y="118" class="label" style="font-size:12px">a=</text>
    <text x="108" y="118" class="sublabel" style="font-size:12px"># calls</text>
    <text x="155" y="118" class="label" style="font-size:12px">b=</text>
    <text x="170" y="118" class="sublabel" style="font-size:12px">division</text>
    <text x="215" y="118" class="label" style="font-size:12px">f(n)=</text>
    <text x="245" y="118" class="sublabel" style="font-size:12px">combine cost</text>
    <text x="295" y="118" class="label" style="font-size:12px">n^log<tspan dy="-4" style="font-size:10px">b</tspan><tspan dy="4" style="font-size:10px">a</tspan>=</text>
    <text x="340" y="118" class="sublabel" style="font-size:12px">subproblem</text>
  </g>
  
  <!-- Decision Tree Flowchart -->
  <g class="animated" style="animation-delay: 0.5s" data-narration="Compare f(n) with n^log_b(a) to determine the case">
    <!-- Start node -->
    <rect x="145" y="138" width="130" height="26" rx="13" fill="#ce93d8" stroke="#8e24aa" stroke-width="1"/>
    <text x="210" y="156" text-anchor="middle" class="label" style="fill:#fff;font-size:12px">Compare f(n) vs n<tspan baseline-shift="super" style="font-size:9px">logb a</tspan></text>
    
    <!-- Arrow down -->
    <line x1="210" y1="164" x2="210" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Three branches -->
  <g class="animated" style="animation-delay: 0.7s" data-narration="Case 1: f(n) is polynomially smaller than n^log_b(a)">
    <!-- Case 1 - Left -->
    <line x1="175" y1="185" x2="100" y2="220" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="30" y="225" width="115" height="70" rx="8" class="case-box" fill="url(#case1Grad)"/>
    <text x="87" y="245" text-anchor="middle" class="label" style="font-weight:bold">Case 1</text>
    <text x="87" y="262" text-anchor="middle" class="sublabel" style="font-size:11px">f(n) = O(n<tspan baseline-shift="super" style="font-size:8px">logb a - ε</tspan>)</text>
    <text x="87" y="280" text-anchor="middle" class="sublabel" style="font-size:10px">T(n) = Θ(n<tspan baseline-shift="super" style="font-size:8px">logb a</tspan>)</text>
  </g>
  
  <g class="animated" style="animation-delay: 0.8s" data-narration="Case 2: f(n) equals n^log_b(a) polynomially">
    <!-- Case 2 - Middle -->
    <line x1="210" y1="185" x2="210" y2="220" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="152" y="225" width="116" height="70" rx="8" class="case-box" fill="url(#case2Grad)"/>
    <text x="210" y="245" text-anchor="middle" class="label" style="font-weight:bold">Case 2</text>
    <text x="210" y="262" text-anchor="middle" class="sublabel" style="font-size:11px">f(n) = Θ(n<tspan baseline-shift="super" style="font-size:8px">logb a</tspan>)</text>
    <text x="210" y="280" text-anchor="middle" class="sublabel" style="font-size:10px">T(n) = Θ(n<tspan baseline-shift="super" style="font-size:8px">logb a</tspan> log n)</text>
  </g>
  
  <g class="animated" style="animation-delay: 0.9s" data-narration="Case 3: f(n) is polynomially larger than n^log_b(a) with regularity condition">
    <!-- Case 3 - Right -->
    <line x1="245" y1="185" x2="320" y2="220" stroke="#e53935" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <rect x="275" y="225" width="115" height="70" rx="8" class="case-box" fill="url(#case3Grad)"/>
    <text x="332" y="245" text-anchor="middle" class="label" style="font-weight:bold">Case 3</text>
    <text x="332" y="262" text-anchor="middle" class="sublabel" style="font-size:11px">f(n) = Ω(n<tspan baseline-shift="super" style="font-size:8px">logb a + ε</tspan>)</text>
    <text x="332" y="280" text-anchor="middle" class="sublabel" style="font-size:10px">T(n) = Θ(f(n))</text>
  </g>
  
  <!-- Regularity Condition Box -->
  <g class="animated pulse-anim" style="animation-delay: 1.1s" data-narration="Regularity condition for Case 3: af(n/b) <= cf(n) for c lt 1">
    <rect x="275" y="305" width="115" height="30" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
    <text x="332" y="320" text-anchor="middle" class="sublabel" style="font-size:10px">Regularity:</text>
    <text x="332" y="332" text-anchor="middle" class="sublabel" style="font-size:9px">af(n/b) ≤ cf(n)</text>
  </g>
  
  <!-- Arrow from Case 3 to regularity -->
  <line x1="332" y1="295" x2="332" y2="305" stroke="#e53935" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- Example Annotations -->
  <g class="animated" style="animation-delay: 1.2s" data-narration="Examples: Merge Sort (Case 2), Binary Search (Case 1), Strassen (Case 3)">
    <rect x="30" y="305" width="130" height="30" rx="4" fill="#e1f5fe" stroke="#81d4fa" stroke-width="1"/>
    <text x="95" y="318" text-anchor="middle" class="sublabel" style="font-size:10px">Examples:</text>
    <text x="95" y="330" text-anchor="middle" class="sublabel" style="font-size:9px">MergeSort, FFT</text>
  </g>
  
  <!-- Legend/Key -->
  <g class="animated" style="animation-delay: 1.3s" data-narration="Understanding the comparison determines algorithm complexity">
    <rect x="165" y="345" width="90" height="22" rx="4" fill="#fafafa" stroke="#ccc"/>
    <text x="210" y="360" text-anchor="middle" class="sublabel" style="font-size:10px">ε > 0</text>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="20" cy="20" r="6" fill="#b39ddb" opacity="0.5"/>
  <circle cx="400" cy="380" r="8" fill="#b39ddb" opacity="0.5"/>
  <circle cx="400" cy="20" r="5" fill="#81c784" opacity="0.5"/>
  <circle cx="20" cy="380" r="5" fill="#81c784" opacity="0.5"/>
</svg>