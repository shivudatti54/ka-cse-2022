<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="binary-heaps-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5def5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558b2f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 50; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a3a5c; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .small-label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .array-cell { font-family: Arial, sans-serif; font-size: 13px; fill: #ffffff; font-weight: bold; }
    .array-index { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .node { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .node:nth-child(1) { animation-delay: 0.1s; }
    .node:nth-child(2) { animation-delay: 0.2s; }
    .node:nth-child(3) { animation-delay: 0.3s; }
    .node:nth-child(4) { animation-delay: 0.4s; }
    .node:nth-child(5) { animation-delay: 0.5s; }
    .node:nth-child(6) { animation-delay: 0.6s; }
    .node:nth-child(7) { animation-delay: 0.7s; }
    .arrow-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 5,3; animation: drawLine 0.5s ease-out forwards; }
    .concept-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    text { dominant-baseline: middle; text-anchor: middle; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" class="title">Binary Heaps: Max-Heap Structure</text>
  
  <!-- Tree Section -->
  <g data-narration="Complete binary tree showing max-heap property: parent nodes are greater than or equal to children">
    <text x="110" y="55" class="small-label" style="font-weight:bold;">Tree Representation</text>
    <!-- Connections -->
    <line x1="110" y1="95" x2="60" y2="145" class="arrow-line" style="animation-delay: 0.3s;" />
    <line x1="110" y1="95" x2="160" y2="145" class="arrow-line" style="animation-delay: 0.4s;" />
    <line x1="60" y1="145" x2="35" y2="195" class="arrow-line" style="animation-delay: 0.5s;" />
    <line x1="60" y1="145" x2="85" y2="195" class="arrow-line" style="animation-delay: 0.6s;" />
    <line x1="160" y1="145" x2="135" y2="195" class="arrow-line" style="animation-delay: 0.7s;" />
    <line x1="160" y1="145" x2="185" y2="195" class="arrow-line" style="animation-delay: 0.8s;" />
    
    <!-- Nodes -->
    <g class="node">
      <circle cx="110" cy="80" r="22" fill="url(#nodeGradient)" filter="url(#shadow)" />
      <text x="110" y="82" class="label">50</text>
    </g>
    <g class="node">
      <circle cx="60" cy="140" r="22" fill="url(#nodeGradient)" filter="url(#shadow)" />
      <text x="60" y="142" class="label">30</text>
    </g>
    <g class="node">
      <circle cx="160" cy="140" r="22" fill="url(#nodeGradient)" filter="url(#shadow)" />
      <text x="160" y="142" class="label">40</text>
    </g>
    <g class="node">
      <circle cx="35" cy="195" r="20" fill="url(#nodeGradient)" filter="url(#shadow)" />
      <text x="35" y="197" class="label">20</text>
    </g>
    <g class="node">
      <circle cx="85" cy="195" r="20" fill="url(#nodeGradient)" filter="url(#shadow)" />
      <text x="85" y="197" class="label">25</text>
    </g>
    <g class="node">
      <circle cx="135" cy="195" r="20" fill="url(#nodeGradient)" filter="url(#shadow)" />
      <text x="135" y="197" class="label">35</text>
    </g>
    <g class="node">
      <circle cx="185" cy="195" r="20" fill="url(#nodeGradient)" filter="url(#shadow)" />
      <text x="185" y="197" class="label">10</text>
    </g>
  </g>
  
  <!-- Array Section -->
  <g data-narration="Array representation showing how heap elements map to contiguous memory indices">
    <text x="330" y="55" class="small-label" style="font-weight:bold;">Array Representation</text>
    <!-- Array cells -->
    <rect x="260" y="70" width="130" height="25" rx="3" fill="#f5f5f5" stroke="#ddd" />
    <rect x="260" y="95" width="130" height="25" rx="3" fill="#f5f5f5" stroke="#ddd" />
    <rect x="260" y="120" width="130" height="25" rx="3" fill="#f5f5f5" stroke="#ddd" />
    <rect x="260" y="145" width="130" height="25" rx="3" fill="#f5f5f5" stroke="#ddd" />
    <rect x="260" y="170" width="130" height="25" rx="3" fill="#f5f5f5" stroke="#ddd" />
    <rect x="260" y="195" width="130" height="25" rx="3" fill="#f5f5f5" stroke="#ddd" />
    <rect x="260" y="220" width="130" height="25" rx="3" fill="#f5f5f5" stroke="#ddd" />
    
    <!-- Indices -->
    <text x="268" y="82" class="array-index">0</text>
    <text x="268" y="107" class="array-index">1</text>
    <text x="268" y="132" class="array-index">2</text>
    <text x="268" y="157" class="array-index">3</text>
    <text x="268" y="182" class="array-index">4</text>
    <text x="268" y="207" class="array-index">5</text>
    <text x="268" y="232" class="array-index">6</text>
    
    <!-- Values -->
    <rect x="290" y="70" width="95" height="25" rx="3" fill="url(#arrayGradient)" />
    <rect x="290" y="95" width="95" height="25" rx="3" fill="url(#arrayGradient)" />
    <rect x="290" y="120" width="95" height="25" rx="3" fill="url(#arrayGradient)" />
    <rect x="290" y="145" width="95" height="25" rx="3" fill="url(#arrayGradient)" />
    <rect x="290" y="170" width="95" height="25" rx="3" fill="url(#arrayGradient)" />
    <rect x="290" y="195" width="95" height="25" rx="3" fill="url(#arrayGradient)" />
    <rect x="290" y="220" width="95" height="25" rx="3" fill="url(#arrayGradient)" />
    
    <text x="337" y="82" class="array-cell">50</text>
    <text x="337" y="107" class="array-cell">30</text>
    <text x="337" y="132" class="array-cell">40</text>
    <text x="337" y="157" class="array-cell">20</text>
    <text x="337" y="182" class="array-cell">25</text>
    <text x="337" y="207" class="array-cell">35</text>
    <text x="337" y="232" class="array-cell">10</text>
  </g>
  
  <!-- Key Formulas Box -->
  <g data-narration="Index formulas for navigating parent-child relationships in array representation">
    <rect x="10" y="260" width="200" height="120" rx="8" fill="white" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)" />
    <text x="110" y="280" class="small-label" style="font-weight:bold; fill:#1a3a5c;">Index Calculations</text>
    <text x="20" y="305" class="small-label" style="text-anchor:start;">Parent: (i-1) / 2</text>
    <text x="20" y="330" class="small-label" style="text-anchor:start;">Left Child: 2i + 1</text>
    <text x="20" y="355" class="small-label" style="text-anchor:start;">Right Child: 2i + 2</text>
    
    <!-- Example -->
    <text x="20" y="375" class="small-label" style="text-anchor:start; font-size:11px; fill:#666;">Ex: Node at i=1 → Parent=0, Left=3</text>
  </g>
  
  <!-- Heap Property Box -->
  <g data-narration="Max-heap property ensures efficient priority-based access">
    <rect x="220" y="260" width="190" height="120" rx="8" fill="white" stroke="#7cb342" stroke-width="2" filter="url(#shadow)" />
    <text x="315" y="280" class="small-label" style="font-weight:bold; fill:#1a3a5c;">Heap Property</text>
    <text x="230" y="305" class="small-label" style="text-anchor:start; fill:#2d5a8a;"><tspan font-weight="bold">Max-Heap:</tspan> Parent ≥ Children</text>
    <text x="230" y="330" class="small-label" style="text-anchor:start;">Root (index 0) = Maximum</text>
    <text x="230" y="355" class="small-label" style="text-anchor:start;">O(1) access to max element</text>
    <text x="230" y="375" class="small-label" style="text-anchor:start; fill:#666;">Complete tree → Array optimal</text>
  </g>
  
  <!-- Operation indicators -->
  <g data-narration="Common heap operations: Insert, Extract-Max, Heapify">
    <text x="210" y="395" class="small-label" style="font-size:11px; fill:#666;">Operations: Insert | Extract-Max | Heapify | Build-Heap</text>
  </g>
  
  <!-- Highlight arrow showing tree to array mapping -->
  <g class="pulse" style="transform-origin: 200px 150px;">
    <path d="M 200 140 Q 230 140 255 150" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.7"/>
  </g>
</svg>