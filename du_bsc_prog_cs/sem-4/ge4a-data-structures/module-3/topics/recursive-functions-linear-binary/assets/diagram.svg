<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="recursive-functions-linear-binary">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb"/>
      <stop offset="100%" style="stop-color:#90caf9"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <linearGradient id="treeNodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="100%" style="stop-color:#fff59d"/>
    </linearGradient>
    <linearGradient id="foundNodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 50; }
        to { stroke-dashoffset: 0; }
      }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #1565c0; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #424242; }
      .sublabel { font-family: Arial, sans-serif; font-size: 10px; fill: #616161; }
      .box-title { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #37474f; }
      .concept-text { font-family: Arial, sans-serif; font-size: 10px; fill: #455a64; }
      .node-text { font-family: Arial, sans-serif; font-size: 9px; font-weight: bold; fill: #37474f; }
      .fade-in { animation: fadeIn 1s ease-out forwards; }
      .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
      .slide-right { animation: slideInRight 0.8s ease-out forwards; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .tree-line { stroke: #78909c; stroke-width: 1.5; stroke-dasharray: 5,3; }
      .delay-1 { animation-delay: 0.2s; opacity: 0; }
      .delay-2 { animation-delay: 0.4s; opacity: 0; }
      .delay-3 { animation-delay: 0.6s; opacity: 0; }
      .delay-4 { animation-delay: 0.8s; opacity: 0; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in">
    <text x="210" y="22" text-anchor="middle" class="title">Recursive Functions</text>
    <text x="210" y="38" text-anchor="middle" class="label" style="font-size: 12px; fill: #546e7a;">Linear &amp; Binary Search</text>
  </g>
  
  <!-- Divider line -->
  <line x1="10" y1="48" x2="410" y2="48" stroke="#b0bec5" stroke-width="1" class="fade-in"/>
  
  <!-- Section 1: Recursion Basics Box -->
  <g class="slide-left delay-1" data-narration="The two essential components of recursion: Base Case (stopping condition) and Recursive Case (self-call with modified parameters)">
    <rect x="12" y="56" width="120" height="72" rx="6" fill="url(#boxGradient1)" stroke="#81c784" stroke-width="1"/>
    <text x="72" y="70" text-anchor="middle" class="box-title">Recursion Basics</text>
    <text x="20" y="86" class="concept-text">• Base Case:</text>
    <text x="20" y="98" class="concept-text" style="font-size:9px;">  Stops recursion</text>
    <text x="20" y="110" class="concept-text">• Recursive Case:</text>
    <text x="20" y="122" class="concept-text" style="font-size:9px;">  Calls itself</text>
  </g>
  
  <!-- Section 2: Array Representation -->
  <g class="slide-right delay-2" data-narration="The sorted array [1,3,5,7,9,11,13,15,17] used for binary search demonstration">
    <rect x="138" y="56" width="140" height="36" rx="4" fill="#fff" stroke="#90caf9" stroke-width="1"/>
    <text x="208" y="68" text-anchor="middle" class="box-title">Array: [1,3,5,7,9,11,13,15,17]</text>
    <g transform="translate(143, 74)">
      <rect x="0" y="0" width="14" height="14" fill="#e3f2fd" stroke="#64b5f6" stroke-width="0.5"/>
      <text x="7" y="10" text-anchor="middle" class="sublabel">1</text>
      <rect x="15" y="0" width="14" height="14" fill="#e3f2fd" stroke="#64b5f6" stroke-width="0.5"/>
      <text x="22" y="10" text-anchor="middle" class="sublabel">3</text>
      <rect x="30" y="0" width="14" height="14" fill="#e3f2fd" stroke="#64b5f6" stroke-width="0.5"/>
      <text x="37" y="10" text-anchor="middle" class="sublabel">5</text>
      <rect x="45" y="0" width="14" height="14" fill="#e3f2fd" stroke="#64b5f6" stroke-width="0.5"/>
      <text x="52" y="10" text-anchor="middle" class="sublabel">7</text>
      <rect x="60" y="0" width="14" height="14" fill="#fff59d" stroke="#fbc02d" stroke-width="1"/>
      <text x="67" y="10" text-anchor="middle" class="sublabel" style="font-weight:bold;">9</text>
      <rect x="75" y="0" width="14" height="14" fill="#e3f2fd" stroke="#64b5f6" stroke-width="0.5"/>
      <text x="82" y="10" text-anchor="middle" class="sublabel">11</text>
      <rect x="90" y="0" width="14" height="14" fill="#e3f2fd" stroke="#64b5f6" stroke-width="0.5"/>
      <text x="97" y="10" text-anchor="middle" class="sublabel">13</text>
      <rect x="105" y="0" width="14" height="14" fill="#e3f2fd" stroke="#64b5f6" stroke-width="0.5"/>
      <text x="112" y="10" text-anchor="middle" class="sublabel">15</text>
      <rect x="120" y="0" width="14" height="14" fill="#e3f2fd" stroke="#64b5f6" stroke-width="0.5"/>
      <text x="127" y="10" text-anchor="middle" class="sublabel">17</text>
    </g>
  </g>
  
  <!-- Section 3: Binary Search Decision Tree -->
  <g class="fade-in delay-2" data-narration="Binary search decision tree showing the search path for target 11: compare with 9 (mid), then 13 (right), then 11 (left) - Found at index 5">
    <rect x="264" y="56" width="144" height="72" rx="6" fill="url(#boxGradient3)" stroke="#ba68c8" stroke-width="1"/>
    <text x="336" y="70" text-anchor="middle" class="box-title">Binary Search: Find 11</text>
    
    <!-- Tree structure -->
    <g transform="translate(336, 90)">
      <!-- Level 1: Root node -->
      <circle cx="0" cy="0" r="14" fill="url(#treeNodeGradient)" stroke="#f9a825" stroke-width="1" class="pulse"/>
      <text x="0" y="3" text-anchor="middle" class="node-text">9</text>
      <text x="0" y="-20" text-anchor="middle" class="sublabel">idx:4</text>
      
      <!-- Level 2: Right child -->
      <line x1="14" y1="0" x2="35" y2="30" class="tree-line"/>
      <circle cx="35" cy="30" r="12" fill="url(#treeNodeGradient)" stroke="#f9a825" stroke-width="1"/>
      <text x="35" y="33" text-anchor="middle" class="node-text">13</text>
      <text x="35" y="48" text-anchor="middle" class="sublabel">idx:6</text>
      
      <!-- Level 3: Left child -->
      <line x1="35" y1="30" x2="22" y2="55" class="tree-line"/>
      <circle cx="22" cy="55" r="11" fill="url(#foundNodeGradient)" stroke="#4caf50" stroke-width="1.5" class="pulse"/>
      <text x="22" y="58" text-anchor="middle" class="node-text">✓</text>
      <text x="22" y="72" text-anchor="middle" class="sublabel" style="fill:#2e7d32;">Found idx:5</text>
      
      <!-- Branch labels -->
      <text x="28" y="12" class="sublabel" style="fill:#1565c0;">&gt;9</text>
      <text x="32" y="42" class="sublabel" style="fill:#c62828;">&lt;13</text>
    </g>
  </g>
  
  <!-- Divider -->
  <line x1="10" y1="135" x2="410" y2="135" stroke="#b0bec5" stroke-width="1" class="fade-in delay-2"/>
  
  <!-- Section 4: Linear Search visualization -->
  <g class="slide-left delay-3" data-narration="Linear search iterates through each element sequentially until the target is found or array ends">
    <rect x="12" y="145" width="130" height="70" rx="6" fill="url(#boxGradient2)" stroke="#64b5f6" stroke-width="1"/>
    <text x="77" y="160" text-anchor="middle" class="box-title">Linear Search</text>
    <text x="20" y="178" class="concept-text">Target: 11</text>
    
    <!-- Linear search steps -->
    <g transform="translate(20, 185)">
      <rect x="0" y="0" width="10" height="10" fill="#ef5350" stroke="#c62828" stroke-width="1"/>
      <text x="5" y="8" text-anchor="middle" class="sublabel" style="fill:#fff;font-size:7px;">1</text>
      <rect x="12" y="0" width="10" height="10" fill="#ef5350" stroke="#c62828" stroke-width="1"/>
      <text x="17" y="8" text-anchor="middle" class="sublabel" style="fill:#fff;font-size:7px;">3</text>
      <rect x="24" y="0" width="10" height="10" fill="#ef5350" stroke="#c62828" stroke-width="1"/>
      <text x="29" y="8" text-anchor="middle" class="sublabel" style="fill:#fff;font-size:7px;">5</text>
      <rect x="36" y="0" width="10" height="10" fill="#ef5350" stroke="#c62828" stroke-width="1"/>
      <text x="41" y="8" text-anchor="middle" class="sublabel" style="fill:#fff;font-size:7px;">7</text>
      <rect x="48" y="0" width="10" height="10" fill="#ef5350" stroke="#c62828" stroke-width="1"/>
      <text x="53" y="8" text-anchor="middle" class="sublabel" style="fill:#fff;font-size:7px;">9</text>
      <rect x="60" y="0" width="10" height="10" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5" class="pulse"/>
      <text x="65" y="8" text-anchor="middle" class="sublabel" style="fill:#fff;font-weight:bold;font-size:7px;">11</text>
      <text x="75" y="6" class="sublabel" style="fill:#2e7d32;font-weight:bold;">✓ Found!</text>
    </g>
  </g>
  
  <!-- Section 5: Binary Search visualization -->
  <g class="slide-right delay-3" data-narration="Binary search divides the search space in half each iteration, greatly reducing comparisons needed">
    <rect x="148" y="145" width="130" height="70" rx="6" fill="url(#boxGradient3)" stroke="#ba68c8" stroke-width="1"/>
    <text x="213" y="160" text-anchor="middle" class="box-title">Binary Search</text>
    <text x="156" y="178" class="concept-text">Target: 11</text>
    
    <!-- Binary search steps -->
    <g transform="translate(156, 185)">
      <text x="0" y="0" class="sublabel">Step 1: mid=9 (idx4)</text>
      <text x="0" y="12" class="sublabel" style="fill:#1565c0;">11 &gt; 9 → right half</text>
      <text x="0" y="24" class="sublabel">Step 2: mid=13 (idx6)</text>
      <text x="0" y="36" class="sublabel" style="fill:#c62828;">11 &lt; 13 → left half</text>
      <text x="0" y="48" class="sublabel" style="fill:#2e7d32;font-weight:bold;">Step 3: Found 11!</text>
    </g>
  </g>
  
  <!-- Section 6: Complexity Comparison -->
  <g class="fade-in delay-3" data-narration="Time complexity comparison: Linear O(n) vs Binary O(log n), demonstrating binary search efficiency">
    <rect x="284" y="145" width="124" height="70" rx="6" fill="#fff" stroke="#90a4ae" stroke-width="1"/>
    <text x="346" y="160" text-anchor="middle" class="box-title">Complexity</text>
    <g transform="translate(292, 172)">
      <text x="0" y="0" class="concept-text" style="font-weight:bold;">Time:</text>
      <text x="35" y="0" class="concept-text">Linear: O(n)</text>
      <text x="35" y="12" class="concept-text" style="fill:#2e7d32;font-weight:bold;">Binary: O(log n)</text>
      <text x="0" y="28" class="concept-text" style="font-weight:bold;">Space:</text>
      <text x="35" y="28" class="concept-text">Both: O(log n)</text>
      <text x="0" y="44" class="concept-text" style="font-weight:bold;">Tree Height:</text>
      <text x="35" y="44" class="concept-text">log₂(9) ≈ 3</text>
    </g>
  </g>
  
  <!-- Bottom section: Recursive structure -->
  <g class="fade-in delay-4" data-narration="The recursive structure showing how binary search calls itself with updated low and high bounds">
    <rect x="12" y="225" width="190" height="55" rx="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
    <text x="107" y="240" text-anchor="middle" class="box-title">Binary Search Recursive Call</text>
    <text x="20" y="258" class="concept-text" style="font-family:monospace;font-size:9px;">binarySearch(arr, target, low, high):</text>
    <text x="20" y="270" class="concept-text" style="font-size:9px;">  if low &gt; high: return -1</text>
    <text x="20" y="282" class="concept-text" style="font-size:9px;">  mid = (low+high)//2</text>
    <text x="20" y="294" class="concept-text" style="font-size:9px;">  return mid or search halves</text>
  </g>
  
  <!-- Comparison arrow and benefits -->
  <g class="fade-in delay-4" data-narration="Key insight: Binary search is much faster for large arrays due to logarithmic time complexity">
    <rect x="210" y="225" width="198" height="55" rx="6" fill="url(#boxGradient2)" stroke="#64b5f6" stroke-width="1"/>
    <text x="309" y="240" text-anchor="middle" class="box-title">Why Binary Search?</text>
    <text x="220" y="258" class="concept-text">• For n=1000 elements:</text>
    <text x="220" y="272" class="concept-text">  Linear: ~1000 comparisons</text>
    <text x="220" y="286" class="concept-text" style="color:#2e7d32;font-weight:bold;">  Binary: ~10 comparisons!</text>
  </g>
  
  <!-- Bottom line -->
  <line x1="10" y1="290" x2="410" y2="290" stroke="#b0bec5" stroke-width="1" class="fade-in delay-4"/>
  
  <!-- Recursion Stack visualization -->
  <g class="fade-in delay-4" data-narration="Visual representation of the recursion call stack during binary search execution">
    <rect x="12" y="298" width="396" height="95" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1"/>
    <text x="210" y="314" text-anchor="middle" class="box-title">Recursion Call Stack</text>
    
    <!-- Stack frames -->
    <g transform="translate(25, 325)">
      <!-- Stack frame 1 -->
      <rect x="0" y="0" width="115" height="20" rx="3" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
      <text x="10" y="13" class="sublabel" style="font-weight:bold;">Call 1: search(0,8)</text>
      <text x="90" y="13" class="sublabel">mid=4→9</text>
      
      <!-- Stack frame 2 -->
      <rect x="0" y="23" width="115" height="20" rx="3" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1"/>
      <text x="10" y="36" class="sublabel" style="font-weight:bold;">Call 2: search(5,8)</text>
      <text x="90" y="36" class="sublabel">mid=6→13</text>
      
      <!-- Stack frame 3 -->
      <rect x="0" y="46" width="115" height="20" rx="3" fill="#fff9c4" stroke="#fbc02d" stroke-width="1"/>
      <text x="10" y="59" class="sublabel" style="font-weight:bold;">Call 3: search(5,5)</text>
      <text x="90" y="59" class="sublabel">mid=5→11 ✓</text>
    </g>
    
    <!-- Arrow showing stack growth -->
    <path d="M155 350 L155 380 L175 365" stroke="#78909c" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="165" y="390" class="sublabel" text-anchor="middle">Stack grows↓</text>
    
    <!-- Notes section -->
    <g transform="translate(190, 325)">
      <text x="0" y="0" class="concept-text" style="font-weight:bold;">Key Points:</text>
      <text x="0" y="14" class="sublabel">• Each recursive call narrows</text>
      <text x="0" y="26" class="sublabel">  the search range</text>
      <text x="0" y="40" class="sublabel">• Base case: low &gt; high</text>
      <text x="0" y="52" class="sublabel">• Returns index when found</text>
      <text x="0" y="64" class="sublabel">• Tree depth = O(log n)</text>
    </g>
  </g>
  
  <!-- Footer -->
  <g class="fade-in delay-4">
    <line x1="10" y1="393" x2="410" y2="393" stroke="#b0bec5" stroke-width="1"/>
    <text x="210" y="408" text-anchor="middle" class="sublabel" style="fill:#78909c;">University of Delhi - Computer Science</text>
  </g>
</svg>