<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="file-io-operations" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f7fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iosGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fbdd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="istreamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9e4ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d4a5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ostreamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c9ae;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iostreamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e4d6e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4b8d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fileStreamGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e4d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4c9a8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { animation: slideInDown 0.8s ease-out forwards; }
    .box-ios { animation: fadeIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-iostream { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-istream { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box-ostream { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box-ifstream { animation: slideInUp 0.6s ease-out 0.7s forwards; opacity: 0; }
    .box-ofstream { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box-fstream { animation: slideInUp 0.6s ease-out 0.9s forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 0.8s ease-out 1s forwards; }
    .concept-box { animation: fadeIn 0.5s ease-out 1.1s forwards; opacity: 0; }
    .arrow-head { animation: fadeIn 0.3s ease-out 1.3s forwards; opacity: 0; }
    .pulse:hover { animation: pulse 1s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title-text">File I/O Operations in C++</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" class="title-text">Stream Class Hierarchy</text>
  
  <!-- Base Class: ios -->
  <g class="box-ios" data-narration="The ios class is the common base for all stream classes, providing common functionality like error handling and formatting">
    <rect x="165" y="65" width="90" height="28" rx="4" fill="url(#boxGradient)" stroke="#8fbdd9" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5282">ios</text>
  </g>
  
  <!-- iostream (base for both) -->
  <g class="box-iostream" data-narration="iostream inherits from both istream and ostream, providing bidirectional input/output capability">
    <rect x="155" y="100" width="110" height="30" rx="4" fill="url(#iostreamGradient)" stroke="#a388b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#553c5e">iostream</text>
  </g>
  
  <!-- Arrow from ios to iostream -->
  <line x1="210" y1="93" x2="210" y2="100" stroke="#718096" stroke-width="2" class="arrow-line"/>
  
  <!-- istream -->
  <g class="box-istream" data-narration="istream handles input operations, providing extraction operators and functions like get(), getline(), and read()">
    <rect x="55" y="145" width="85" height="30" rx="4" fill="url(#istreamGradient)" stroke="#6b9b6f" stroke-width="2" filter="url(#shadow)"/>
    <text x="97" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d5016">istream</text>
  </g>
  
  <!-- ostream -->
  <g class="box-ostream" data-narration="ostream handles output operations, providing insertion operators and functions like put(), write(), and flush()">
    <rect x="280" y="145" width="85" height="30" rx="4" fill="url(#ostreamGradient)" stroke="#c98460" stroke-width="2" filter="url(#shadow)"/>
    <text x="322" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6b3a1f">ostream</text>
  </g>
  
  <!-- Arrows from iostream -->
  <line x1="175" y1="130" x2="120" y2="145" stroke="#718096" stroke-width="2" class="arrow-line"/>
  <line x1="245" y1="130" x2="300" y2="145" stroke="#718096" stroke-width="2" class="arrow-line"/>
  
  <!-- File Stream Classes -->
  <g class="box-ifstream" data-narration="ifstream (Input File Stream) - Used for reading data from files. Opens files in input mode for extraction operations" filter="url(#shadow)">
    <rect x="20" y="195" width="100" height="35" rx="4" fill="url(#istreamGradient)" stroke="#6b9b6f" stroke-width="2"/>
    <text x="70" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d5016">ifstream</text>
    <text x="70" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3d6b2d">(Input)</text>
  </g>
  
  <g class="box-ofstream" data-narration="ofstream (Output File Stream) - Used for writing data to files. Opens files in output mode for insertion operations" filter="url(#shadow)">
    <rect x="300" y="195" width="100" height="35" rx="4" fill="url(#ostreamGradient)" stroke="#c98460" stroke-width="2"/>
    <text x="350" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6b3a1f">ofstream</text>
    <text x="350" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b4a2f">(Output)</text>
  </g>
  
  <g class="box-fstream" data-narration="fstream provides bidirectional file I/O. Can both read from and write to files using the same stream object" filter="url(#shadow)">
    <rect x="160" y="195" width="100" height="35" rx="4" fill="url(#fileStreamGradient)" stroke="#a08b60" stroke-width="2"/>
    <text x="210" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#5c4a2f">fstream</text>
    <text x="210" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b5a3d">(Input/Output)</text>
  </g>
  
  <!-- Arrows from istream/ostream to file streams -->
  <line x1="97" y1="175" x2="70" y2="195" stroke="#718096" stroke-width="2" class="arrow-line"/>
  <line x1="322" y1="175" x2="350" y2="195" stroke="#718096" stroke-width="2" class="arrow-line"/>
  <line x1="155" y1="160" x2="180" y2="195" stroke="#718096" stroke-width="2" class="arrow-line"/>
  <line x1="265" y1="160" x2="240" y2="195" stroke="#718096" stroke-width="2" class="arrow-line"/>
  
  <!-- Key Concepts Boxes -->
  <g class="concept-box" data-narration="Key methods: open(), close(), read(), write(), seekg(), tellg(), seekp(), tellp() for file positioning">
    <rect x="10" y="245" width="125" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="72" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c5282">Key Methods</text>
    <text x="72" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">open, close, read,</text>
    <text x="72" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">write, seek, tell</text>
  </g>
  
  <g class="concept-box" data-narration="File opening modes: ios::in, ios::out, ios::app, ios::ate, ios::trunc, ios::binary">
    <rect x="145" y="245" width="130" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c5282">Opening Modes</text>
    <text x="210" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">in, out, app, ate,</text>
    <text x="210" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">trunc, binary</text>
  </g>
  
  <g class="concept-box" data-narration="Text vs Binary mode: Text mode interprets characters, binary mode reads raw bytes without interpretation">
    <rect x="285" y="245" width="125" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="347" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c5282">File Modes</text>
    <text x="347" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Text (default) &amp;</text>
    <text x="347" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Binary modes</text>
  </g>
  
  <g class="concept-box" data-narration="Error handling: Use good(), fail(), bad(), eof() functions to check stream state and handle file errors">
    <rect x="80" y="305" width="260" height="40" rx="4" fill="url(#boxGradient)" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c5282">Error Handling: good() | fail() | bad() | eof()</text>
    <text x="210" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Always check file open status before operations</text>
  </g>
  
  <g class="concept-box" data-narration="Common operations: Creating files, reading/writing data, updating existing files, and proper resource cleanup">
    <rect x="80" y="355" width="260" height="35" rx="4" fill="url(#boxGradient)" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Typical: Create → Open → Read/Write → Close</text>
  </g>
  
  <!-- Arrow indicators for inheritance -->
  <polygon points="210,155 205,165 215,165" fill="#718096" class="arrow-head" data-narration="Arrow indicates inheritance direction"/>
  <polygon points="70,190 60,195 70,200" fill="#718096" class="arrow-head"/>
  <polygon points="350,190 340,195 350,200" fill="#718096" class="arrow-head"/>
  <polygon points="180,190 170,195 180,200" fill="#718096" class="arrow-head"/>
  <polygon points="240,190 230,195 240,200" fill="#718096" class="arrow-head"/>
  
  <!-- Inheritance label -->
  <text x="380" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096" transform="rotate(90, 380, 110)">inherits from</text>
</svg>