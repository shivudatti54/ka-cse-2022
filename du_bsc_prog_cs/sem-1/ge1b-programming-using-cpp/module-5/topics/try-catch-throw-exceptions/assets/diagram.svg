<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="try-catch-throw-exceptions" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3e6cb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="throwGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeeba;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="catchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1ecf1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bee5eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes throwPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .try-block { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .throw-block { animation: slideInUp 0.6s ease-out 0.4s both; }
    .catch-block { animation: slideInRight 0.6s ease-out 0.6s both; }
    .terminate-box { animation: fadeIn 0.6s ease-out 0.8s both; }
    .arrow { animation: fadeIn 0.4s ease-out 1s both; }
    .concept-box { animation: slideInUp 0.5s ease-out both; }
    .throw-icon { animation: throwPulse 2s ease-in-out infinite; transform-origin: center; }
    .try-block:hover, .catch-block:hover { animation: pulse 0.3s ease-out; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8" ry="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Exception Handling in C++</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="title">try - catch - throw</text>
  
  <!-- Try Block -->
  <g class="try-block" data-narration="The try block contains code that might throw an exception">
    <rect x="20" y="70" width="100" height="80" rx="8" ry="8" fill="url(#tryGradient)" filter="url(#shadow)" stroke="#28a745" stroke-width="2"/>
    <text x="70" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#155724">try</text>
    <text x="70" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#155724">{ code that</text>
    <text x="70" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#155724">may throw }</text>
  </g>
  
  <!-- Arrow from try to throw -->
  <g class="arrow">
    <line x1="120" y1="110" x2="155" y2="110" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="155,105 165,110 155,115" fill="#e74c3c"/>
  </g>
  
  <!-- Throw Block -->
  <g class="throw-block" data-narration="The throw keyword creates and throws an exception object">
    <rect x="165" y="85" width="90" height="50" rx="8" ry="8" fill="url(#throwGradient)" filter="url(#shadow)" stroke="#ffc107" stroke-width="2"/>
    <text x="210" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#856404">throw</text>
    <text x="210" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#856404">(exception)</text>
  </g>
  
  <!-- Exception Object Box -->
  <g class="concept-box" data-narration="The exception object carries error information" style="animation-delay: 0.3s">
    <rect x="165" y="145" width="90" height="35" rx="5" ry="5" fill="#fff" stroke="#ffc107" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="210" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#856404">Exception Object</text>
    <text x="210" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#856404">error data</text>
  </g>
  
  <!-- Arrow from throw to catch -->
  <g class="arrow" style="animation-delay: 0.3s">
    <line x1="255" y1="110" x2="290" y2="110" stroke="#17a2b8" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="290,105 300,110 290,115" fill="#17a2b8"/>
  </g>
  
  <!-- Catch Block -->
  <g class="catch-block" data-narration="The catch block handles the thrown exception">
    <rect x="300" y="70" width="100" height="80" rx="8" ry="8" fill="url(#catchGradient)" filter="url(#shadow)" stroke="#17a2b8" stroke-width="2"/>
    <text x="350" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0c5460">catch</text>
    <text x="350" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0c5460">(exception</text>
    <text x="350" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0c5460">handler)</text>
  </g>
  
  <!-- Terminate Box -->
  <g class="terminate-box" data-narration="If no catch block matches, std::terminate is called">
    <rect x="300" y="160" width="100" height="45" rx="5" ry="5" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
    <text x="350" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#721c24">No match?</text>
    <text x="350" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#721c24">std::terminate()</text>
  </g>
  
  <!-- Arrow from catch to normal flow -->
  <g class="arrow" style="animation-delay: 0.5s">
    <line x1="350" y1="150" x2="350" y2="180" stroke="#28a745" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="345,180 350,190 355,180" fill="#28a745"/>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="concept-box" data-narration="Key concepts summary" style="animation-delay: 0.7s">
    <rect x="15" y="220" width="390" height="100" rx="6" ry="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="210" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#495057">Key Concepts</text>
    
    <g>
      <circle cx="35" cy="258" r="4" fill="#28a745"/>
      <text x="48" y="262" font-family="Arial, sans-serif" font-size="10" fill="#495057">try: Monitor code for exceptions</text>
    </g>
    <g>
      <circle cx="35" cy="276" r="4" fill="#ffc107"/>
      <text x="48" y="280" font-family="Arial, sans-serif" font-size="10" fill="#495057">throw: Signal an error condition</text>
    </g>
    <g>
      <circle cx="35" cy="294" r="4" fill="#17a2b8"/>
      <text x="48" y="298" font-family="Arial, sans-serif" font-size="10" fill="#495057">catch: Handle the specific exception</text>
    </g>
    <g>
      <circle cx="200" cy="258" r="4" fill="#dc3545"/>
      <text x="213" y="262" font-family="Arial, sans-serif" font-size="10" fill="#495057">Multiple catch blocks allowed</text>
    </g>
    <g>
      <circle cx="200" cy="276" r="4" fill="#6c757d"/>
      <text x="213" y="280" font-family="Arial, sans-serif" font-size="10" fill="#495057">Catch by reference (&amp;) recommended</text>
    </g>
    <g>
      <circle cx="200" cy="294" r="4" fill="#007bff"/>
      <text x="213" y="298" font-family="Arial, sans-serif" font-size="10" fill="#495057">catch(...) catches all exceptions</text>
    </g>
  </g>
  
  <!-- Code Example Box -->
  <g class="concept-box" data-narration="Code example showing syntax" style="animation-delay: 0.9s">
    <rect x="15" y="325" width="390" height="65" rx="6" ry="6" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
    <text x="25" y="345" font-family="Consolas, monospace" font-size="10" fill="#68d391">try</text>
    <text x="55" y="345" font-family="Consolas, monospace" font-size="10" fill="#e2e8f0">{ /* code */ }</text>
    <text x="25" y="362" font-family="Consolas, monospace" font-size="10" fill="#f6ad55">catch</text>
    <text x="55" y="362" font-family="Consolas, monospace" font-size="10" fill="#e2e8f0">(const std::exception&amp; e)</text>
    <text x="95" y="362" font-family="Consolas, monospace" font-size="10" fill="#fc8181">{ /* handle */ }</text>
    <text x="25" y="379" font-family="Consolas, monospace" font-size="10" fill="#cbd5e0">// Exception handling flow</text>
  </g>
</svg>