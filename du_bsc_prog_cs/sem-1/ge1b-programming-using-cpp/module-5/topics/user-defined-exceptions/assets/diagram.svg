<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="user-defined-exceptions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stdExGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B9BD5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#417BB5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="runtimeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#70AD47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#548735;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D9A000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userDefGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C55A11;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0450D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userRunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7030A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#582080;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: white; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: white; }
    .concept-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .concept-text { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .box { filter: url(#shadow); }
    .line { stroke: #666; stroke-width: 2; stroke-dasharray: 5,3; }
    .animated { animation-fill-mode: both; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animated fade-in">User-Defined Exceptions in C++</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#5B9BD5" stroke-width="2" class="animated fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Exception Hierarchy -->
  <!-- std::exception (base) -->
  <g class="animated slide-in" style="animation-delay: 0.2s">
    <rect x="150" y="55" width="120" height="40" rx="6" fill="url(#stdExGradient)" class="box"/>
    <text x="210" y="75" text-anchor="middle" class="label">std::exception</text>
    <text x="210" y="88" text-anchor="middle" class="detail">Base class</text>
  </g>
  
  <!-- Arrows from std::exception -->
  <line x1="180" y1="95" x2="140" y2="135" class="line line-anim" style="animation-delay: 0.4s"/>
  <line x1="240" y1="95" x2="280" y2="135" class="line line-anim" style="animation-delay: 0.5s"/>
  
  <!-- std::runtime_error -->
  <g class="animated slide-in" style="animation-delay: 0.3s">
    <rect x="80" y="135" width="120" height="40" rx="6" fill="url(#runtimeGradient)" class="box"/>
    <text x="140" y="155" text-anchor="middle" class="label">std::runtime_error</text>
    <text x="140" y="168" text-anchor="middle" class="detail">Runtime errors</text>
  </g>
  
  <!-- std::logic_error -->
  <g class="animated slide-in" style="animation-delay: 0.4s">
    <rect x="220" y="135" width="120" height="40" rx="6" fill="url(#logicGradient)" class="box"/>
    <text x="280" y="155" text-anchor="middle" class="label">std::logic_error</text>
    <text x="280" y="168" text-anchor="middle" class="detail">Logic errors</text>
  </g>
  
  <!-- Arrows from runtime_error and logic_error -->
  <line x1="140" y1="175" x2="110" y2="215" class="line line-anim" style="animation-delay: 0.6s"/>
  <line x1="280" y1="175" x2="310" y2="215" class="line line-anim" style="animation-delay: 0.7s"/>
  
  <!-- UserDefinedException -->
  <g class="animated slide-in" style="animation-delay: 0.5s">
    <rect x="50" y="215" width="120" height="40" rx="6" fill="url(#userDefGradient)" class="box pulse"/>
    <text x="110" y="235" text-anchor="middle" class="label">UserDefinedException</text>
    <text x="110" y="248" text-anchor="middle" class="detail">: public std::exception</text>
  </g>
  
  <!-- UserRuntimeError -->
  <g class="animated slide-in" style="animation-delay: 0.6s">
    <rect x="250" y="215" width="120" height="40" rx="6" fill="url(#userRunGradient)" class="box pulse"/>
    <text x="310" y="235" text-anchor="middle" class="label">UserRuntimeError</text>
    <text x="310" y="248" text-anchor="middle" class="detail">: public std::runtime_error</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="animated fade-in" style="animation-delay: 0.8s" data-narration="Key concepts of user-defined exceptions">
    <rect x="15" y="275" width="390" height="115" rx="8" fill="white" stroke="#ddd" stroke-width="1" class="box"/>
    <text x="25" y="292" class="concept-title">Key Concepts</text>
    
    <circle cx="35" cy="310" r="4" fill="#5B9BD5"/>
    <text x="45" y="313" class="concept-text">Custom exception classes inherit from std::exception hierarchy</text>
    
    <circle cx="35" cy="328" r="4" fill="#70AD47"/>
    <text x="45" y="331" class="concept-text">Override what() method to provide meaningful error messages</text>
    
    <circle cx="35" cy="346" r="4" fill="#C55A11"/>
    <text x="45" y="349" class="concept-text">Enables domain-specific error handling in applications</text>
    
    <circle cx="35" cy="364" r="4" fill="#7030A0"/>
    <text x="45" y="367" class="concept-text">Can use try-catch to handle specific custom exceptions</text>
  </g>
  
  <!-- Syntax Example Box -->
  <g class="animated fade-in" style="animation-delay: 1s" data-narration="Example syntax for defining custom exception">
    <rect x="270" y="55" width="135" height="55" rx="5" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
    <text x="280" y="70" class="concept-title" fill="#333">Syntax Example</text>
    <text x="280" y="85" class="concept-text" fill="#555">class MyException :</text>
    <text x="290" y="98" class="concept-text" fill="#555">  public std::exception {</text>
    <text x="290" y="111" fill="#C55A11" class="concept-text">  // override what()</text>
  </g>
  
  <!-- Inheritance indicator -->
  <g class="animated fade-in" style="animation-delay: 1.1s" data-narration="Inheritance relationship visualization">
    <text x="380" y="385" class="concept-text" fill="#777">▲ Inheritance</text>
  </g>
</svg>