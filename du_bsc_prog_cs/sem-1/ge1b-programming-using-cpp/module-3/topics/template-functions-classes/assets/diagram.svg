<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="template-functions-classes" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="funcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="100%" style="stop-color:#c3e6cb"/>
    </linearGradient>
    <linearGradient id="classGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff"/>
      <stop offset="100%" style="stop-color:#b8daff"/>
    </linearGradient>
    <linearGradient id="instGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd"/>
      <stop offset="100%" style="stop-color:#ffeeba"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #495057; }
    .keyword { font-family: monospace; font-size: 11px; fill: #d63384; font-weight: bold; }
    .type { font-family: monospace; font-size: 11px; fill: #0d6efd; font-weight: bold; }
    .code { font-family: monospace; font-size: 10px; fill: #333; }
    .box-func { opacity: 0; animation: fadeIn 0.6s ease forwards, slideIn 0.6s ease forwards; }
    .box-class { opacity: 0; animation: fadeIn 0.6s ease forwards 0.2s, slideIn 0.6s ease forwards 0.2s; }
    .box-inst { opacity: 0; animation: fadeIn 0.6s ease forwards 0.4s, slideIn 0.6s ease forwards 0.4s; }
    .box-stl { opacity: 0; animation: fadeIn 0.6s ease forwards 0.6s, pulse 2s ease-in-out infinite 1s; }
    text { animation: fadeIn 0.8s ease forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Templates in C++</text>
  <text x="210" y="48" text-anchor="middle" class="detail" fill="#6c757d">Generic Programming</text>
  
  <!-- Template Function Box -->
  <g class="box-func" data-narration="Function Template: A blueprint for functions that work with any data type">
    <rect x="15" y="60" width="185" height="130" rx="8" fill="url(#funcGrad)" stroke="#28a745" stroke-width="2"/>
    <text x="107" y="80" text-anchor="middle" class="label" font-weight="bold">Function Template</text>
    <text x="25" y="105" class="code"><tspan class="keyword">template</tspan> &lt;<tspan class="type">typename T</tspan>&gt;</text>
    <text x="25" y="122" class="code"><tspan class="type">T</tspan> maximum(<tspan class="type">T</tspan> a, <tspan class="type">T</tspan> b) {</text>
    <text x="35" y="139" class="code">  <tspan class="keyword">return</tspan> (a > b) ? a : b;</text>
    <text x="25" y="156" class="code">}</text>
    <text x="107" y="178" text-anchor="middle" class="detail" fill="#155724">T is replaced by actual type</text>
  </g>
  
  <!-- Template Class Box -->
  <g class="box-class" data-narration="Class Template: A blueprint for classes that can work with any data type">
    <rect x="220" y="60" width="185" height="130" rx="8" fill="url(#classGrad)" stroke="#0d6efd" stroke-width="2"/>
    <text x="312" y="80" text-anchor="middle" class="label" font-weight="bold">Class Template</text>
    <text x="230" y="105" class="code"><tspan class="keyword">template</tspan> &lt;<tspan class="type">typename T</tspan>&gt;</text>
    <text x="230" y="122" class="code"><tspan class="keyword">class</tspan> Stack {</text>
    <text x="240" y="139" class="code">  <tspan class="type">T</tspan> arr[100];</text>
    <text x="240" y="156" class="code">  <tspan class="keyword">public</tspan>:</text>
    <text x="240" y="173" class="code">  <tspan class="type">void</tspan> push(<tspan class="type">T</tspan> val);</text>
  </g>
  
  <!-- Instantiation Process -->
  <g class="box-inst" data-narration="Template Instantiation: Compiler generates type-specific code at compile time">
    <rect x="15" y="205" width="390" height="130" rx="8" fill="url(#instGrad)" stroke="#ffc107" stroke-width="2"/>
    <text x="210" y="225" text-anchor="middle" class="label" font-weight="bold">Template Instantiation Process</text>
    
    <!-- Step boxes -->
    <rect x="30" y="240" width="70" height="35" rx="4" fill="#f8f9fa" stroke="#6c757d" stroke-width="1"/>
    <text x="65" y="253" text-anchor="middle" class="detail" font-weight="bold">Template</text>
    <text x="65" y="267" text-anchor="middle" class="detail">Source</text>
    
    <path d="M105 257 L125 257" stroke="#495057" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    
    <rect x="130" y="240" width="70" height="35" rx="4" fill="#f8f9fa" stroke="#6c757d" stroke-width="1"/>
    <text x="165" y="253" text-anchor="middle" class="detail" font-weight="bold">Compiler</text>
    <text x="165" y="267" text-anchor="middle" class="detail">Deduces T</text>
    
    <path d="M205 257 L225 257" stroke="#495057" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    
    <rect x="230" y="240" width="70" height="35" rx="4" fill="#cce5ff" stroke="#0d6efd" stroke-width="1"/>
    <text x="265" y="253" text-anchor="middle" class="detail" font-weight="bold">Generates</text>
    <text x="265" y="267" text-anchor="middle" class="detail">Code</text>
    
    <path d="M305 257 L325 257" stroke="#495057" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    
    <rect x="330" y="240" width="70" height="35" rx="4" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
    <text x="365" y="253" text-anchor="middle" class="detail" font-weight="bold">Object</text>
    <text x="365" y="267" text-anchor="middle" class="detail">Code</text>
    
    <!-- Usage Examples -->
    <text x="30" y="300" class="detail" font-weight="bold" fill="#495057">Usage:</text>
    <text x="30" y="318" class="code"><tspan class="type">Stack</tspan>&lt;<tspan class="type">int</tspan>&gt; s;</text>
    <text x="30" y="333" class="code"><tspan class="type">maximum</tspan>(5, 10);</text>
  </g>
  
  <!-- STL Reference Box -->
  <g class="box-stl" data-narration="STL: Standard Template Library uses templates for containers like vector, list and algorithms like sort">
    <rect x="220" y="305" width="185" height="60" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="312" y="325" text-anchor="middle" class="label" font-weight="bold">Used in STL</text>
    <text x="312" y="345" text-anchor="middle" class="detail">vector&lt;T&gt;, list&lt;T&gt;, sort()</text>
    <text x="312" y="358" text-anchor="middle" class="detail" fill="#7b1fa2">Essential for Modern C++</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="40" cy="380" r="5" fill="#28a745" opacity="0.5"/>
  <circle cx="60" cy="380" r="5" fill="#0d6efd" opacity="0.5"/>
  <circle cx="80" cy="380" r="5" fill="#ffc107" opacity="0.5"/>
  <circle cx="100" cy="380" r="5" fill="#9c27b0" opacity="0.5"/>
</svg>