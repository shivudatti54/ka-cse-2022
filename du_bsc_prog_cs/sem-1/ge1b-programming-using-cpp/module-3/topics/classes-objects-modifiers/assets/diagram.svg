<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="classes-objects-modifiers" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="privateGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e57373;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef5350;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="protectedGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa726;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="publicGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="objectGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ba68c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ab47bc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.2s forwards; opacity: 0; }
    .class-box { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .object-box { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section { animation: slideInUp 0.5s ease-out forwards; opacity: 0; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out 0.8s forwards; stroke-dashoffset: 100; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .private-section { animation-delay: 0.4s; }
    .protected-section { animation-delay: 0.5s; }
    .public-section { animation-delay: 0.6s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Classes, Objects &amp; Modifiers</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="subtitle">C++ OOP Fundamentals</text>
  
  <!-- Class Box Structure -->
  <g class="class-box" data-narration="The class serves as a blueprint defining the structure and behavior">
    <rect x="20" y="70" width="180" height="280" rx="8" fill="white" stroke="#4a90d9" stroke-width="2"/>
    <rect x="20" y="70" width="180" height="30" rx="8" fill="url(#classGradient)"/>
    <rect x="20" y="88" width="180" height="12" fill="url(#classGradient)"/>
    <text x="110" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">class ClassName</text>
    
    <!-- Private Section -->
    <g class="section private-section" data-narration="Private members are only accessible within the class">
      <rect x="30" y="110" width="160" height="60" rx="4" fill="url(#privateGradient)"/>
      <text x="40" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">- private:</text>
      <text x="40" y="142" font-family="Arial, sans-serif" font-size="11" fill="white">int data1;</text>
      <text x="40" y="156" font-family="Arial, sans-serif" font-size="11" fill="white">double data2;</text>
    </g>
    
    <!-- Protected Section -->
    <g class="section protected-section" data-narration="Protected members are accessible in derived classes">
      <rect x="30" y="175" width="160" height="50" rx="4" fill="url(#protectedGradient)"/>
      <text x="40" y="190" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white"># protected:</text>
      <text x="40" y="207" font-family="Arial, sans-serif" font-size="11" fill="white">int protectedVar;</text>
    </g>
    
    <!-- Public Section -->
    <g class="section public-section" data-narration="Public members form the interface to interact with objects">
      <rect x="30" y="230" width="160" height="105" rx="4" fill="url(#publicGradient)"/>
      <text x="40" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">+ public:</text>
      <text x="40" y="262" font-family="Arial, sans-serif" font-size="11" fill="white">ClassName(); // constructor</text>
      <text x="40" y="277" font-family="Arial, sans-serif" font-size="11" fill="white">void method1();</text>
      <text x="40" y="292" font-family="Arial, sans-serif" font-size="11" fill="white">int getData();</text>
      <text x="40" y="307" font-family="Arial, sans-serif" font-size="11" fill="white">void display();</text>
    </g>
  </g>
  
  <!-- Object Box -->
  <g class="object-box" data-narration="Objects are instances created from the class blueprint">
    <rect x="260" y="180" width="140" height="80" rx="8" fill="url(#objectGradient)" class="pulse-element"/>
    <text x="330" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Object</text>
    <text x="330" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">ClassName obj;</text>
    <text x="330" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Memory allocation</text>
  </g>
  
  <!-- Arrow from Class to Object -->
  <path d="M 200 210 Q 230 210 260 220" fill="none" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5,3" class="arrow-line"/>
  <polygon points="258,216 265,222 258,228" fill="#7f8c8d" class="arrow-line"/>
  
  <!-- Key Concepts Boxes -->
  <g class="section" data-narration="Encapsulation bundles data and methods while controlling access">
    <rect x="260" y="75" width="140" height="45" rx="4" fill="white" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="330" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">Encapsulation</text>
    <text x="330" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Data + Methods</text>
    <text x="330" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Access Control</text>
  </g>
  
  <g class="section" data-narration="Inheritance allows classes to derive properties from parent classes">
    <rect x="260" y="125" width="140" height="45" rx="4" fill="white" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="330" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">Inheritance</text>
    <text x="330" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Derived classes</text>
    <text x="330" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">reuse properties</text>
  </g>
  
  <!-- Legend -->
  <g class="section" data-narration="Access modifiers control visibility of class members">
    <rect x="20" y="360" width="380" height="30" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
    <circle cx="45" cy="375" r="5" fill="#ef5350"/>
    <text x="55" y="379" font-family="Arial, sans-serif" font-size="10" fill="#555">Private</text>
    <circle cx="115" cy="375" r="5" fill="#ffa726"/>
    <text x="125" y="379" font-family="Arial, sans-serif" font-size="10" fill="#555">Protected</text>
    <circle cx="190" cy="375" r="5" fill="#4caf50"/>
    <text x="200" y="379" font-family="Arial, sans-serif" font-size="10" fill="#555">Public</text>
    <text x="260" y="379" font-family="Arial, sans-serif" font-size="10" fill="#777">Blueprint → Instance</text>
  </g>
</svg>