<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="inheritance-polymorphism">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseClassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="derivedClassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7bc9a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="polyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffab8a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .box-base { animation: fadeIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-derived { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box-poly { animation: fadeIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s infinite; }
    .code-box { animation: slideIn 0.5s ease-out 0.9s forwards; opacity: 0; }
    .label { animation: fadeIn 0.4s ease-out; }
    .concept { animation: pulse 3s infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title">Inheritance &amp; Polymorphism</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" class="title">C++ OOP Concepts</text>
  
  <!-- Inheritance Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718096"/>
    </marker>
  </defs>
  <line x1="80" y1="115" x2="80" y2="175" class="arrow" stroke="#718096" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="210" y1="115" x2="210" y2="175" class="arrow" stroke="#718096" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="115" x2="340" y2="175" class="arrow" stroke="#718096" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Base Class Box -->
  <g class="box-base" data-narration="Base Class: The parent class that contains common attributes and methods inherited by derived classes">
    <rect x="50" y="70" width="60" height="45" rx="5" fill="url(#baseClassGrad)" filter="url(#shadow)"/>
    <text x="80" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a365d">Base</text>
    <text x="80" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">Animal</text>
  </g>
  
  <!-- Derived Classes -->
  <g class="box-derived" data-narration="Derived Classes: Dog, Cat, and Bird inherit from Animal class, gaining all its public and protected members">
    <rect x="50" y="175" width="60" height="40" rx="5" fill="url(#derivedClassGrad)" filter="url(#shadow)"/>
    <text x="80" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a365d">Dog</text>
    
    <rect x="180" y="175" width="60" height="40" rx="5" fill="url(#derivedClassGrad)" filter="url(#shadow)"/>
    <text x="210" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a365d">Cat</text>
    
    <rect x="310" y="175" width="60" height="40" rx="5" fill="url(#derivedClassGrad)" filter="url(#shadow)"/>
    <text x="340" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a365d">Bird</text>
  </g>
  
  <!-- Polymorphism Section -->
  <g class="box-poly" data-narration="Polymorphism: Virtual function allows runtime binding - same method call produces different behavior based on object type">
    <rect x="120" y="240" width="180" height="70" rx="8" fill="url(#polyGrad)" filter="url(#shadow)"/>
    <text x="210" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9c4221">Polymorphism</text>
    <text x="210" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c05621">virtual void speak() = 0;</text>
    <text x="210" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c05621">// Pure virtual function</text>
  </g>
  
  <!-- Concept Labels -->
  <g class="concept" data-narration="Single Inheritance: One base class, one derived class relationship">
    <rect x="20" y="330" width="90" height="30" rx="4" fill="#faf5ff" stroke="#9f7aea" stroke-width="1"/>
    <text x="65" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">Single</text>
  </g>
  
  <g class="concept" data-narration="Inheritance types: Single, Multiple, Multilevel, Hierarchical, Hybrid">
    <rect x="120" y="330" width="90" height="30" rx="4" fill="#faf5ff" stroke="#9f7aea" stroke-width="1"/>
    <text x="165" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">Multilevel</text>
  </g>
  
  <g class="concept" data-narration="Runtime Polymorphism achieved through virtual functions and function overriding">
    <rect x="220" y="330" width="90" height="30" rx="4" fill="#faf5ff" stroke="#9f7aea" stroke-width="1"/>
    <text x="265" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">Hierarchical</text>
  </g>
  
  <g class="concept" data-narration="Key benefit: Code reusability and extensibility in object-oriented design">
    <rect x="320" y="330" width="85" height="30" rx="4" fill="#faf5ff" stroke="#9f7aea" stroke-width="1"/>
    <text x="362" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#553c9a">Hybrid</text>
  </g>
  
  <!-- Code Example Box -->
  <g class="code-box" data-narration="C++ Syntax: Using public inheritance to create is-a relationship between classes">
    <rect x="280" y="70" width="130" height="55" rx="4" fill="#2d3748" filter="url(#shadow)"/>
    <text x="290" y="85" font-family="Courier, monospace" font-size="8" fill="#68d391">class Dog : public Animal</text>
    <text x="290" y="97" font-family="Courier, monospace" font-size="8" fill="#68d391">{</text>
    <text x="300" y="109" font-family="Courier, monospace" font-size="8" fill="#90cdf4">// inherits Animal</text>
    <text x="300" y="121" font-family="Courier, monospace" font-size="8" fill="#68d391">};</text>
  </g>
  
  <!-- Inheritance Label -->
  <text x="20" y="150" font-family="Arial, sans-serif" font-size="9" fill="#4a5568" class="label" data-narration="Arrow indicates inheritance relationship: Dog IS-A Animal">extends</text>
  
  <!-- Arrow Labels -->
  <text x="95" y="155" font-family="Arial, sans-serif" font-size="8" fill="#718096" class="label">inherit</text>
  <text x="225" y="155" font-family="Arial, sans-serif" font-size="8" fill="#718096" class="label">inherit</text>
  <text x="355" y="155" font-family="Arial, sans-serif" font-size="8" fill="#718096" class="label">inherit</text>
  
  <!-- Legend -->
  <rect x="20" y="368" width="12" height="12" rx="2" fill="url(#baseClassGrad)"/>
  <text x="36" y="378" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Base Class</text>
  <rect x="100" y="368" width="12" height="12" rx="2" fill="url(#derivedClassGrad)"/>
  <text x="116" y="378" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Derived</text>
  <rect x="170" y="368" width="12" height="12" rx="2" fill="url(#polyGrad)"/>
  <text x="186" y="378" font-family="Arial, sans-serif" font-size="9" fill="#4a5568">Polymorphism</text>
</svg>