<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="constructors-destructors">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2e9"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d94a4a"/>
      <stop offset="100%" style="stop-color:#872d2d"/>
    </linearGradient>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="50%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#d9534f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { font-family: Arial Black, sans-serif; font-size: 20px; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #f0f0f0; }
    .concept-title { font-family: Arial, sans-serif; font-size: 13px; fill: #2c3e50; font-weight: bold; }
    .concept-text { font-family: Arial, sans-serif; font-size: 10px; fill: #555555; }
    .timeline-label { font-family: Arial, sans-serif; font-size: 10px; fill: #333; }
    .box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Constructors &amp; Destructors</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#666" class="anim-fade delay-1">Object Lifecycle in C++</text>
  
  <!-- Lifecycle Timeline Diagram -->
  <g transform="translate(30, 80)">
    <!-- Timeline bar -->
    <rect x="0" y="80" width="360" height="8" rx="4" fill="url(#timelineGrad)" class="anim-fade delay-2"/>
    
    <!-- Stage 1: Creation -->
    <g class="anim-slide-left delay-2">
      <circle cx="30" cy="84" r="12" fill="#5cb85c"/>
      <text x="30" y="88" text-anchor="middle" fill="white" font-size="16" font-weight="bold">+</text>
      <text x="30" y="60" text-anchor="middle" class="timeline-label" font-weight="bold">Creation</text>
      <text x="30" y="115" text-anchor="middle" class="timeline-label">Constructor</text>
      <text x="30" y="128" text-anchor="middle" class="timeline-label" fill="#5cb85c" font-size="9">called</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M 55 84 L 85 84" stroke="#5cb85c" stroke-width="3" stroke-dasharray="5,3" class="anim-fade delay-3">
      <animate attributeName="stroke-dashoffset" values="0;10;0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Stage 2: In Use -->
    <g class="anim-fade delay-3">
      <circle cx="150" cy="84" r="12" fill="#f0ad4e"/>
      <text x="150" y="88" text-anchor="middle" fill="white" font-size="14">▶</text>
      <text x="150" y="60" text-anchor="middle" class="timeline-label" font-weight="bold">In Use</text>
      <rect x="125" y="110" width="50" height="18" rx="3" fill="#f0ad4e" opacity="0.3"/>
      <text x="150" y="123" text-anchor="middle" class="timeline-label">Object</text>
      <text x="150" y="135" text-anchor="middle" class="timeline-label">active</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M 175 84 L 205 84" stroke="#f0ad4e" stroke-width="3" stroke-dasharray="5,3" class="anim-fade delay-4">
      <animate attributeName="stroke-dashoffset" values="0;10;0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Stage 3: Destruction -->
    <g class="anim-slide-right delay-4">
      <circle cx="270" cy="84" r="12" fill="#d9534f"/>
      <text x="270" y="88" text-anchor="middle" fill="white" font-size="16" font-weight="bold">×</text>
      <text x="270" y="60" text-anchor="middle" class="timeline-label" font-weight="bold">Destruction</text>
      <text x="270" y="115" text-anchor="middle" class="timeline-label">Destructor</text>
      <text x="270" y="128" text-anchor="middle" class="timeline-label" fill="#d9534f" font-size="9">called</text>
    </g>
    
    <!-- Arrow to end -->
    <path d="M 295 84 L 325 84" stroke="#d9534f" stroke-width="3" stroke-dasharray="5,3" class="anim-fade delay-5">
      <animate attributeName="stroke-dashoffset" values="0;10;0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- End marker -->
    <circle cx="345" cy="84" r="8" fill="#999" class="anim-fade delay-5"/>
    <text x="345" y="88" text-anchor="middle" fill="white" font-size="10">∅</text>
  </g>
  
  <!-- Constructor Box -->
  <g transform="translate(20, 170)" class="anim-slide-up delay-2" data-narration="Constructors initialize objects when they are created. They have the same name as the class and no return type.">
    <rect width="180" height="95" rx="8" fill="url(#boxGradient1)" class="box"/>
    <text x="90" y="22" text-anchor="middle" class="label">CONSTRUCTOR</text>
    <rect x="10" y="35" width="160" height="1" fill="rgba(255,255,255,0.3)"/>
    <text x="15" y="52" class="detail">• Same name as class</text>
    <text x="15" y="67" class="detail">• No return type</text>
    <text x="15" y="82" class="detail">• Auto-called on creation</text>
  </g>
  
  <!-- Destructor Box -->
  <g transform="translate(220, 170)" class="anim-slide-up delay-3" data-narration="Destructors clean up resources when objects are destroyed. They have a tilde (~) prefix and are automatically called when objects go out of scope.">
    <rect width="180" height="95" rx="8" fill="url(#boxGradient2)" class="box"/>
    <text x="90" y="22" text-anchor="middle" class="label">DESTRUCTOR</text>
    <rect x="10" y="35" width="160" height="1" fill="rgba(255,255,255,0.3)"/>
    <text x="15" y="52" class="detail">• Prefix: ~classname</text>
    <text x="15" y="67" class="detail">• No parameters</text>
    <text x="15" y="82" class="detail">• Auto-called on scope exit</text>
  </g>
  
  <!-- Code Example Box -->
  <g transform="translate(20, 280)" class="anim-slide-up delay-4" data-narration="Example code showing a Student class with default constructor and destructor implementation.">
    <rect width="250" height="105" rx="8" fill="white" stroke="#ddd" stroke-width="2" class="box"/>
    <text x="125" y="18" text-anchor="middle" class="concept-title" fill="#2c3e50">Code Example</text>
    <rect x="10" y="28" width="230" height="1" fill="#eee"/>
    <text x="15" y="45" font-family="Consolas, monospace" font-size="10" fill="#2c3e50">class Student {</text>
    <text x="25" y="58" font-family="Consolas, monospace" font-size="10" fill="#5cb85c">public:</text>
    <text x="30" y="71" font-family="Consolas, monospace" font-size="10" fill="#2c3e50">  Student() { } // Constructor</text>
    <text x="30" y="84" font-family="Consolas, monospace" font-size="10" fill="#d9534f">  ~Student() { } // Destructor</text>
    <text x="15" y="97" font-family="Consolas, monospace" font-size="10" fill="#2c3e50">};</text>
  </g>
  
  <!-- Key Points Box -->
  <g transform="translate(280, 280)" class="anim-slide-up delay-5" data-narration="Key points: RAII principle ensures resource management, destructors are essential for resource cleanup, and they cannot be overloaded.">
    <rect width="120" height="105" rx="8" fill="#fff9e6" stroke="#f0ad4e" stroke-width="2" class="box"/>
    <text x="60" y="18" text-anchor="middle" class="concept-title" fill="#8a6d3b">Key Points</text>
    <rect x="10" y="28" width="100" height="1" fill="#f0ad4e" opacity="0.5"/>
    <text x="15" y="45" class="concept-text">• RAII: Resource</text>
    <text x="15" y="56" class="concept-text">  Acquisition Is</text>
    <text x="15" y="67" class="concept-text">  Initialization</text>
    <text x="15" y="82" class="concept-text">• Destructors cannot</text>
    <text x="15" y="93" class="concept-text">  be overloaded</text>
  </g>
  
  <!-- Animated highlight on timeline -->
  <g class="anim-pulse delay-3">
    <circle cx="30" cy="164" r="15" fill="none" stroke="#5cb85c" stroke-width="2" opacity="0.5"/>
  </g>
  <g class="anim-pulse delay-4" style="animation-delay: 0.5s;">
    <circle cx="270" cy="164" r="15" fill="none" stroke="#d9534f" stroke-width="2" opacity="0.5"/>
  </g>
</svg>