<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pointer-reference-variables">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="pointerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90b8"/>
    </linearGradient>
    <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98d4a0"/>
      <stop offset="100%" style="stop-color:#5cb878"/>
    </linearGradient>
    <linearGradient id="refGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5d4"/>
      <stop offset="100%" style="stop-color:#a06ba0"/>
    </linearGradient>
    <linearGradient id="operatorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d9a0"/>
      <stop offset="100%" style="stop-color:#d4a050"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 3; }
      50% { stroke-width: 5; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section2 { animation: slideInRight 0.6s ease-out 0.3s both; }
    .section3 { animation: slideInUp 0.6s ease-out 0.4s both; }
    .section4 { animation: fadeIn 0.6s ease-out 0.5s both; }
    .pointer-box { animation: pulse 3s ease-in-out infinite; }
    .arrow-line { animation: arrowPulse 2s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 14px; fill: #34495e; }
    .value-text { font-size: 16px; font-weight: bold; fill: #fff; }
    .detail { font-size: 12px; fill: #555; }
    .operator-text { font-size: 18px; font-weight: bold; fill: #5a4a00; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title">Pointer &amp; Reference Variables</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#7eb8da" stroke-width="2" class="title"/>
  
  <!-- Section 1: Pointer Variable -->
  <g class="section1" data-narration="The pointer variable stores a memory address, not the actual value">
    <rect x="30" y="60" width="120" height="90" rx="8" fill="url(#pointerGrad)" filter="url(#shadow)"/>
    <text x="90" y="80" text-anchor="middle" class="value-text">ptr</text>
    <rect x="40" y="88" width="100" height="2" fill="rgba(255,255,255,0.3)"/>
    <text x="90" y="110" text-anchor="middle" class="value-text" font-size="14">0x7ffc</text>
    <text x="90" y="138" text-anchor="middle" class="detail" fill="#fff">(address)</text>
  </g>
  
  <!-- Section 2: Target Variable -->
  <g class="section2" data-narration="The target variable contains the actual value stored in memory">
    <rect x="270" y="60" width="120" height="90" rx="8" fill="url(#targetGrad)" filter="url(#shadow)"/>
    <text x="330" y="80" text-anchor="middle" class="value-text">num</text>
    <rect x="280" y="88" width="100" height="2" fill="rgba(255,255,255,0.3)"/>
    <text x="330" y="115" text-anchor="middle" class="value-text" font-size="20">42</text>
    <text x="330" y="138" text-anchor="middle" class="detail" fill="#fff">(value)</text>
  </g>
  
  <!-- Arrow from pointer to target -->
  <g class="section1" data-narration="The pointer stores the address of the target variable">
    <line x1="150" y1="105" x2="270" y2="105" stroke="#e74c3c" stroke-width="3" class="arrow-line"/>
    <polygon points="265,100 275,105 265,110" fill="#e74c3c"/>
    <text x="210" y="95" text-anchor="middle" class="detail" fill="#e74c3c">stores address of</text>
  </g>
  
  <!-- Section 3: Operators -->
  <g class="section3" data-narration="&amp; gets address, * dereferences to get value">
    <rect x="30" y="170" width="175" height="55" rx="6" fill="url(#operatorGrad)" filter="url(#shadow)"/>
    <text x="55" y="195" class="operator-text">&amp;num</text>
    <text x="55" y="215" class="detail">Address-of operator</text>
    <text x="140" y="205" text-anchor="middle" class="value-text" fill="#5a4a00">→ 0x7ffc</text>
    
    <rect x="215" y="170" width="175" height="55" rx="6" fill="url(#operatorGrad)" filter="url(#shadow)"/>
    <text x="240" y="195" class="operator-text">*ptr</text>
    <text x="240" y="215" class="detail">Dereference operator</text>
    <text x="325" y="205" text-anchor="middle" class="value-text" fill="#5a4a00">→ 42</text>
  </g>
  
  <!-- Section 4: Reference Variable -->
  <g class="section4" data-narration="Reference variables are aliases for existing variables">
    <rect x="100" y="245" width="220" height="70" rx="8" fill="url(#refGrad)" filter="url(#shadow)"/>
    <text x="210" y="270" text-anchor="middle" class="value-text" fill="#fff">Reference Variable</text>
    <text x="210" y="290" text-anchor="middle" class="detail" fill="#fff">int&amp; ref = num;</text>
    <text x="210" y="305" text-anchor="middle" class="detail" fill="#f0e0f0">ref is alias for num, no copy made</text>
  </g>
  
  <!-- Key Points -->
  <g class="section4" data-narration="Key differences: pointers can be null, references must be initialized">
    <rect x="30" y="330" width="360" height="55" rx="6" fill="rgba(255,255,255,0.7)" stroke="#ddd" stroke-width="1"/>
    <text x="45" y="350" class="label" font-weight="bold">Key Points:</text>
    <text x="45" y="368" class="detail">• Pointers: &amp; gets address, * accesses value</text>
    <text x="220" y="368" class="detail">• References: alias, must init, no * needed</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="210" cy="55" r="4" fill="#7eb8da"/>
  <circle cx="160" cy="55" r="3" fill="#98d4a0"/>
  <circle cx="260" cy="55" r="3" fill="#d4a5d4"/>
</svg>