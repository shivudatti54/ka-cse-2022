<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="runtime-polymorphism-pointers">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4176b3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558635;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vtableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e09a00;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes vptrPulse {
      0%, 100% { fill: #ff6b6b; }
      50% { fill: #ff8787; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s infinite; }
    .vptr-anim { animation: vptrPulse 1.5s infinite; }
    .delay-1 { animation-delay: 0.3s; opacity: 0; }
    .delay-2 { animation-delay: 0.6s; opacity: 0; }
    .delay-3 { animation-delay: 0.9s; opacity: 0; }
    .delay-4 { animation-delay: 1.2s; opacity: 0; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Runtime Polymorphism</text>
  <text x="210" y="45" text-anchor="middle" font-size="14" fill="#5b6d7a">Using Pointers in C++</text>
  
  <!-- Section 1: Base Class -->
  <g class="slide-in delay-1" data-narration="Base class with virtual function - defines interface">
    <rect x="20" y="60" width="110" height="90" rx="5" fill="url(#boxGrad1)" stroke="#3a5a80" stroke-width="1"/>
    <text x="75" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Base Class</text>
    <text x="75" y="95" text-anchor="middle" font-size="11" fill="#e8f4f8">Animal</text>
    <line x1="30" y1="105" x2="120" y2="105" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="75" y="120" text-anchor="middle" font-size="10" fill="#e8f4f8">virtual void speak()</text>
    <text x="75" y="135" text-anchor="middle" font-size="10" fill="#e8f4f8">{ std::cout... }</text>
  </g>
  
  <!-- Section 2: Derived Class -->
  <g class="slide-in delay-2" data-narration="Derived class overrides virtual function">
    <rect x="20" y="165" width="110" height="90" rx="5" fill="url(#boxGrad2)" stroke="#4a6b2f" stroke-width="1"/>
    <text x="75" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Derived Class</text>
    <text x="75" y="200" text-anchor="middle" font-size="11" fill="#e8f4f8">Dog</text>
    <line x1="30" y1="210" x2="120" y2="210" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="75" y="225" text-anchor="middle" font-size="10" fill="#e8f4f8">void speak() override</text>
    <text x="75" y="240" text-anchor="middle" font-size="10" fill="#e8f4f8">{ std::cout "Woof!" }</text>
  </g>
  
  <!-- Arrow from Base to Derived -->
  <path d="M75 155 L75 160" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  <text x="85" y="162" font-size="9" fill="#666">inherits</text>
  
  <!-- Section 3: Memory Objects -->
  <g class="fade-in delay-2" data-narration="Objects in memory contain vptr pointing to vtable">
    <rect x="160" y="60" width="130" height="60" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="225" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Animal* ptr</text>
    <text x="225" y="95" text-anchor="middle" font-size="10" fill="#6c757d">points to Dog object</text>
    
    <rect x="160" y="130" width="130" height="55" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
    <text x="225" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#856404">Dog Object</text>
    <circle cx="175" cy="170" r="6" class="vptr-anim"/>
    <text x="185" y="174" font-size="9" fill="#856404">vptr</text>
    <text x="225" y="174" text-anchor="middle" font-size="9" fill="#856404">other data...</text>
  </g>
  
  <!-- Section 4: vtable -->
  <g class="slide-in delay-3" data-narration="vtable stores function pointers for runtime lookup">
    <rect x="310" y="60" width="100" height="125" rx="4" fill="url(#vtableGrad)" stroke="#cc7a00" stroke-width="1"/>
    <text x="360" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#5a4000">vtable</text>
    <line x1="315" y1="88" x2="405" y2="88" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <text x="320" y="102" font-size="9" fill="#5a4000">speak() →</text>
    <rect x="375" y="93" width="30" height="14" rx="2" fill="#fff" stroke="#cc7a00"/>
    <text x="390" y="103" text-anchor="middle" font-size="8" fill="#cc7a00">Dog::</text>
    <text x="390" y="111" text-anchor="middle" font-size="7" fill="#cc7a00">speak</text>
    <text x="320" y="130" font-size="9" fill="#5a4000">~Animal() →</text>
    <rect x="375" y="121" width="30" height="14" rx="2" fill="#fff" stroke="#cc7a00"/>
    <text x="390" y="131" text-anchor="middle" font-size="7" fill="#cc7a00">Base</text>
    <text x="390" y="139" text-anchor="middle" font-size="7" fill="#cc7a00">dtor</text>
  </g>
  
  <!-- Arrow: Object to vtable -->
  <path d="M295 157 L305 157" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  <text x="298" y="150" font-size="8" fill="#666">vptr</text>
  
  <!-- Section 5: Runtime Lookup Process -->
  <g class="fade-in delay-4" data-narration="Runtime: follow vptr to vtable, lookup function address, call derived function">
    <rect x="160" y="200" width="250" height="70" rx="5" fill="#e8f4f8" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="4"/>
    <text x="285" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c5aa0">Runtime Resolution</text>
    <text x="285" y="235" text-anchor="middle" font-size="9" fill="#4a6b8a">1. ptr→vptr finds vtable</text>
    <text x="285" y="250" text-anchor="middle" font-size="9" fill="#4a6b8a">2. Lookup speak() in vtable</text>
    <text x="285" y="265" text-anchor="middle" font-size="9" fill="#4a6b8a">3. Call Dog::speak() ← polymorphism!</text>
  </g>
  
  <!-- Section 6: Code Example -->
  <g class="fade-in delay-4" data-narration="Code example showing base pointer holding derived object">
    <rect x="20" y="270" width="380" height="55" rx="4" fill="#2c3e50" stroke="#1a252f" stroke-width="1"/>
    <text x="35" y="290" font-size="10" fill="#a8e6cf">Animal* ptr = new Dog();</text>
    <text x="35" y="308" font-size="10" fill="#ffd3b6">ptr-&gt;speak(); // Calls Dog::speak() at runtime!</text>
    <text x="320" y="315" font-size="8" fill="#aaa">// Output: Woof!</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="pulse" data-narration="Key concept: vptr and vtable enable dynamic dispatch">
    <rect x="20" y="335" width="380" height="30" rx="4" fill="rgba(255,193,7,0.2)" stroke="#ffc107" stroke-width="1"/>
    <text x="210" y="352" text-anchor="middle" font-size="11" fill="#5a4000">🔑 Key: vptr in each object → vtable → correct function called at runtime</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="30" y="30" r="3" fill="#5b9bd5"/>
  <circle cx="390" y="30" r="3" fill="#70ad47"/>
  <circle cx="30" y="370" r="3" fill="#ffc000"/>
  <circle cx="390" y="370" r="3" fill="#ff6b6b"/>
</svg>