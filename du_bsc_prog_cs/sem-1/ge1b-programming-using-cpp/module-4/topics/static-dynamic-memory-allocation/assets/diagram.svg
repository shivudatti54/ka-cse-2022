<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="static-dynamic-memory-allocation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fcda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#96e6a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heapGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8ec5fc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes growUp {
      from { transform: scaleY(0); transform-origin: bottom; }
      to { transform: scaleY(1); transform-origin: bottom; }
    }
    @keyframes growDown {
      from { transform: scaleY(0); transform-origin: top; }
      to { transform: scaleY(1); transform-origin: top; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
    .section-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #fff; }
    .segment { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .segment-1 { animation-delay: 0.2s; }
    .segment-2 { animation-delay: 0.4s; }
    .segment-3 { animation-delay: 0.6s; }
    .segment-4 { animation-delay: 0.8s; }
    .arrow { animation: pulse 2s infinite; }
    .box { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .box-1 { animation-delay: 1s; }
    .box-2 { animation-delay: 1.2s; }
    .box-3 { animation-delay: 1.4s; }
    .highlight { animation: pulse 3s infinite; }
  </style>
  
  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <text x="210" y="30" text-anchor="middle" class="title">Static vs Dynamic Memory</text>
  <text x="210" y="50" text-anchor="middle" class="detail">Memory Layout in C++</text>
  
  <!-- Memory Segments -->
  <g transform="translate(30, 70)">
    <!-- Code Segment -->
    <rect class="segment segment-1" x="0" y="0" width="180" height="60" rx="5" fill="url(#codeGrad)" filter="url(#shadow)" data-narration="Code Segment (Text): Stores compiled machine code, read-only"/>
    <text x="90" y="22" text-anchor="middle" class="section-title">CODE SEGMENT</text>
    <text x="90" y="40" text-anchor="middle" class="detail">Machine Code (Read-Only)</text>
    <text x="90" y="52" text-anchor="middle" class="detail">Functions &amp; Methods</text>
    
    <!-- Data Segment -->
    <rect class="segment segment-2" x="0" y="65" width="180" height="50" rx="5" fill="url(#dataGrad)" filter="url(#shadow)" data-narration="Data Segment: Stores global and static variables - allocated at compile time"/>
    <text x="90" y="82" text-anchor="middle" class="section-title">DATA SEGMENT</text>
    <text x="90" y="100" text-anchor="middle" class="detail">Global &amp; Static Variables</text>
    
    <!-- Heap (grows upward) -->
    <rect class="segment segment-3" x="0" y="120" width="180" height="80" rx="5" fill="url(#heapGrad)" filter="url(#shadow)" data-narration="Heap: Dynamic memory allocated at runtime using new/delete - grows upward"/>
    <text x="90" y="138" text-anchor="middle" class="section-title">HEAP (Dynamic)</text>
    <text x="90" y="155" text-anchor="middle" class="detail">new / delete</text>
    <text x="90" y="170" text-anchor="middle" class="detail">malloc / free</text>
    <path class="arrow" d="M 90 195 L 90 205 L 95 200 M 90 205 L 85 200" stroke="#e74c3c" stroke-width="2" fill="none" data-narration="Heap grows upward toward Stack"/>
    <text x="100" y="205" class="detail" fill="#e74c3c">↑ grows up</text>
    
    <!-- Stack (grows downward) -->
    <rect class="segment segment-4" x="0" y="205" width="180" height="80" rx="5" fill="url(#stackGrad)" filter="url(#shadow)" data-narration="Stack: Automatic memory for function calls and local variables - grows downward"/>
    <text x="90" y="223" text-anchor="middle" class="section-title">STACK (Automatic)</text>
    <text x="90" y="240" text-anchor="middle" class="detail">Local Variables</text>
    <text x="90" y="255" text-anchor="middle" class="detail">Function Calls</text>
    <path class="arrow" d="M 90 280 L 90 270 L 85 275 M 90 270 L 95 275" stroke="#e74c3c" stroke-width="2" fill="none" data-narration="Stack grows downward toward Heap"/>
    <text x="100" y="285" class="detail" fill="#e74c3c">↓ grows down</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g transform="translate(220, 80)">
    <rect class="box box-1" x="0" y="0" width="170" height="55" rx="5" fill="#fff" stroke="#27ae60" stroke-width="2" filter="url(#shadow)" data-narration="Static Allocation: Compile-time memory allocation for fixed-size data"/>
    <text x="10" y="18" class="label" fill="#27ae60">STATIC Allocation</text>
    <text x="10" y="35" class="detail">• Compile-time decision</text>
    <text x="10" y="48" class="detail">• Fixed size variables</text>
    
    <rect class="box box-2" x="0" y="65" width="170" height="55" rx="5" fill="#fff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)" data-narration="Dynamic Allocation: Runtime memory allocation using heap - flexible but manual management"/>
    <text x="10" y="83" class="label" fill="#e74c3c">DYNAMIC Allocation</text>
    <text x="10" y="100" class="detail">• Runtime decision</text>
    <text x="10" y="113" class="detail">• Variable size arrays</text>
    
    <rect class="box box-3" x="0" y="130" width="170" height="45" rx="5" fill="#fff" stroke="#3498db" stroke-width="2" filter="url(#shadow)" data-narration="Key difference: Stack is automatic (LIFO), Heap requires manual new/delete"/>
    <text x="10" y="148" class="label" fill="#3498db">KEY DIFFERENCE</text>
    <text x="10" y="165" class="detail">Stack: Auto (LIFO)</text>
    <text x="10" y="178" class="detail">Heap: Manual (new/delete)</text>
  </g>
  
  <!-- Relationship Arrows -->
  <g transform="translate(30, 300)">
    <line x1="90" y1="0" x2="260" y2="0" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="5,3" data-narration="Static allocation spans Code and Data segments"/>
    <line x1="90" y1="15" x2="260" y2="15" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="5,3" data-narration="Dynamic allocation uses Heap segment at runtime"/>
    
    <text x="175" y="-5" class="detail" fill="#7f8c8d" text-anchor="middle">STATIC (Compile-Time)</text>
    <text x="175" y="20" class="detail" fill="#7f8c8d" text-anchor="middle">DYNAMIC (Run-Time)</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="210" cy="360" r="15" fill="#f39c12" opacity="0.8" class="highlight" data-narration="Memory efficiency: Choose static for fixed data, dynamic for flexible sizing"/>
  <text x="210" y="365" text-anchor="middle" class="detail" fill="#fff" font-weight="bold">C++</text>
</svg>