<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="arrays-decision-iteration">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="arrayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fbcd4"/>
    </linearGradient>
    <linearGradient id="decisionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8b8"/>
      <stop offset="100%" style="stop-color:#b4d48c"/>
    </linearGradient>
    <linearGradient id="iterationGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c8e8"/>
      <stop offset="100%" style="stop-color:#b4a4d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlightPulse {
      0%, 100% { fill: #4a90c2; }
      50% { fill: #6bb3e0; }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title-text { animation: slideInUp 0.8s ease-out forwards; }
    .array-box { animation: slideInLeft 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .decision-box { animation: fadeIn 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .iteration-box { animation: slideInRight 0.6s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .array-element { animation: pulse 2s ease-in-out infinite; animation-delay: 1s; }
    .highlighted { animation: highlightPulse 1.5s ease-in-out infinite; }
    .arrow-anim { animation: arrowPulse 2s ease-in-out infinite; }
    .code-text { font-family: 'Courier New', monospace; font-size: 11px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c5282" class="title-text">Arrays, Decision &amp; Iteration</text>
  <text x="210" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">C++ Programming Fundamentals</text>
  
  <!-- Arrays Section -->
  <g class="array-box" data-narration="Arrays store multiple values in contiguous memory locations with indices starting from 0">
    <rect x="15" y="60" width="120" height="145" fill="url(#arrayGradient)" rx="8" filter="url(#shadow)"/>
    <text x="75" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c5282">ARRAYS</text>
    
    <!-- Array Memory Visualization -->
    <g transform="translate(25, 90)">
      <rect x="0" y="0" width="20" height="18" fill="#fff" stroke="#4a90c2" stroke-width="1.5" rx="2"/>
      <text x="10" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">0</text>
      <rect x="22" y="0" width="20" height="18" fill="#fff" stroke="#4a90c2" stroke-width="1.5" rx="2"/>
      <text x="32" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">1</text>
      <rect x="44" y="0" width="20" height="18" fill="#fff" stroke="#4a90c2" stroke-width="1.5" rx="2"/>
      <text x="54" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">2</text>
      <rect x="66" y="0" width="20" height="18" fill="#fff" stroke="#4a90c2" stroke-width="1.5" rx="2"/>
      <text x="76" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">3</text>
      
      <!-- Values below -->
      <rect x="0" y="22" width="20" height="18" fill="#e8f4fc" stroke="#4a90c2" stroke-width="1.5" rx="2"/>
      <text x="10" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">10</text>
      <rect x="22" y="22" width="20" height="18" fill="#e8f4fc" stroke="#4a90c2" stroke-width="1.5" rx="2"/>
      <text x="32" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">20</text>
      <rect x="44" y="22" width="20" height="18" fill="#e8f4fc" stroke="#4a90c2" stroke-width="1.5" rx="2" class="array-element"/>
      <text x="54" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">30</text>
      <rect x="66" y="22" width="20" height="18" fill="#e8f4fc" stroke="#4a90c2" stroke-width="1.5" rx="2"/>
      <text x="76" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">40</text>
      
      <text x="43" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a5568">int arr[4]</text>
    </g>
    
    <!-- Code snippet -->
    <text x="75" y="180" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#1a365d">int arr[4] =</text>
    <text x="75" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#1a365d">{10,20,30,40};</text>
  </g>
  
  <!-- Decision Making Section -->
  <g class="decision-box" data-narration="Decision statements like if-else allow conditional execution based on boolean conditions">
    <rect x="150" y="60" width="120" height="145" fill="url(#decisionGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#276749">DECISION</text>
    
    <!-- Flowchart style -->
    <g transform="translate(165, 90)">
      <!-- Diamond shape for condition -->
      <polygon points="45,0 90,25 45,50 0,25" fill="#fff" stroke="#2f855a" stroke-width="2"/>
      <text x="45" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">condition?</text>
      
      <!-- Arrows -->
      <line x1="45" y1="50" x2="45" y2="70" stroke="#2f855a" stroke-width="1.5" class="arrow-anim"/>
      <text x="48" y="64" font-family="Arial, sans-serif" font-size="8" fill="#276749">T</text>
      
      <!-- True box -->
      <rect x="25" y="72" width="40" height="20" fill="#fff" stroke="#2f855a" stroke-width="1.5" rx="3"/>
      <text x="45" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">TRUE</text>
      
      <!-- False box -->
      <rect x="70" y="72" width="40" height="20" fill="#fff" stroke="#c53030" stroke-width="1.5" rx="3"/>
      <text x="90" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c53030">FALSE</text>
    </g>
    
    <!-- Code snippet -->
    <text x="210" y="180" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#1a365d">if (x &gt; 0)</text>
    <text x="210" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#1a365d">&nbsp;&nbsp;pos++;</text>
    <text x="210" y="202" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#1a365d">else</text>
    <text x="210" y="212" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#1a365d">&nbsp;&nbsp;neg++;</text>
  </g>
  
  <!-- Iteration Section -->
  <g class="iteration-box" data-narration="Iteration loops like for, while, and do-while enable repetitive execution of code blocks">
    <rect x="285" y="60" width="120" height="145" fill="url(#iterationGradient)" rx="8" filter="url(#shadow)"/>
    <text x="345" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#553c9a">ITERATION</text>
    
    <!-- Loop visualization -->
    <g transform="translate(300, 95)">
      <!-- Circular loop representation -->
      <ellipse cx="45" cy="30" rx="35" ry="25" fill="none" stroke="#6b46c1" stroke-width="2" stroke-dasharray="5,3" class="arrow-anim"/>
      <polygon points="80,30 72,24 72,36" fill="#6b46c1"/>
      
      <!-- Loop counter -->
      <rect x="15" y="0" width="25" height="15" fill="#fff" stroke="#6b46c1" stroke-width="1.5" rx="2"/>
      <text x="27" y="11" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b46c1">i=0</text>
      
      <!-- Loop body -->
      <rect x="10" y="60" width="70" height="25" fill="#f5f3ff" stroke="#6b46c1" stroke-width="1.5" rx="3"/>
      <text x="45" y="75" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#553c9a">// loop body</text>
      
      <!-- Counter update arrow -->
      <path d="M 75 50 Q 90 50 85 65" fill="none" stroke="#6b46c1" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Code snippet -->
    <text x="345" y="180" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#1a365d">for(int i=0;</text>
    <text x="345" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#1a365d">i&lt;n; i++)</text>
    <text x="345" y="202" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#1a365d">&nbsp;&nbsp;// statements</text>
  </g>
  
  <!-- Relationship Arrows -->
  <g class="arrow-anim" data-narration="These three constructs work together in algorithms - arrays hold data, decisions control flow, iterations process data">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#4a5568"/>
      </marker>
    </defs>
    <!-- Arrow from Arrays to Decision -->
    <path d="M 138 130 Q 145 130 148 130" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- Arrow from Decision to Iteration -->
    <path d="M 272 130 Q 278 130 283 130" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom Summary Section -->
  <g data-narration="Together these constructs form the foundation of algorithmic problem solving in C++">
    <rect x="15" y="215" width="390" height="70" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1" rx="6"/>
    <text x="210" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3748">Key Relationships</text>
    
    <!-- Relationship boxes -->
    <g transform="translate(35, 245)">
      <rect x="0" y="0" width="110" height="30" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1" rx="4"/>
      <text x="55" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b6cb0">Arrays + Decision</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a5568">Filter elements</text>
    </g>
    
    <g transform="translate(155, 245)">
      <rect x="0" y="0" width="110" height="30" fill="#f0fff4" fill-opacity="0.7" stroke="#9ae6b4" stroke-width="1" rx="4"/>
      <text x="55" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#276749">Decision + Loop</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a5568">Conditional loops</text>
    </g>
    
    <g transform="translate(275, 245)">
      <rect x="0" y="0" width="110" height="30" fill="#faf5ff" stroke="#d6bcfa" stroke-width="1" rx="4"/>
      <text x="55" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#553c9a">Arrays + Loop</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a5568">Process all elements</text>
    </g>
  </g>
  
  <!-- Footer -->
  <g data-narration="C++ provides rich set of control structures for building efficient algorithms">
    <rect x="15" y="295" width="390" height="50" fill="#2d3748" rx="6"/>
    <text x="210" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">Applications in Real-World Problems</text>
    <text x="210" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Data processing • Search algorithms • Numerical computation • User input handling</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="40" cy="370" r="5" fill="#4a90c2" opacity="0.5"/>
  <circle cx="380" cy="370" r="5" fill="#6b46c1" opacity="0.5"/>
  <circle cx="210" cy="375" r="3" fill="#276749" opacity="0.5"/>
</svg>