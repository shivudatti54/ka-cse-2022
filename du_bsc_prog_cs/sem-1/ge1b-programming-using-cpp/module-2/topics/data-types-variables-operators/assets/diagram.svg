<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="data-types-variables-operators">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f0f6"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8bb8d8"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8b8"/>
      <stop offset="100%" style="stop-color:#b8d888"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#d8b888"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .operator { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #c0392b; }
    .type { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #2980b9; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Data Types, Variables &amp; Operators</text>
  <text x="210" y="50" text-anchor="middle" class="label fade-in delay-1">C++ Programming Fundamentals</text>
  
  <!-- Data Types Section (Left) -->
  <g class="slide-left delay-2" data-narration="The three main categories of C++ data types: Fundamental (int, float, double, char, bool, void), Derived (array, pointer, reference, function), and User-Defined (class, struct, union, enum)">
    <rect x="15" y="65" width="125" height="150" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="77" y="82" text-anchor="middle" class="section-title">Data Types</text>
    
    <!-- Hierarchy Tree -->
    <line x1="77" y1="95" x2="77" y2="110" stroke="#5dade2" stroke-width="2"/>
    <line x1="40" y1="110" x2="115" y2="110" stroke="#5dade2" stroke-width="2"/>
    
    <!-- Fundamental -->
    <rect x="25" y="112" width="48" height="38" rx="4" fill="#ecf0f1" stroke="#3498db" stroke-width="1.5"/>
    <text x="49" y="125" text-anchor="middle" class="type">Fundamental</text>
    <text x="49" y="140" text-anchor="middle" class="detail">int, float,</text>
    <text x="49" y="152" text-anchor="middle" class="detail">char, bool</text>
    
    <!-- Derived -->
    <rect x="80" y="112" width="48" height="38" rx="4" fill="#ecf0f1" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="104" y="125" text-anchor="middle" class="type">Derived</text>
    <text x="104" y="140" text-anchor="middle" class="detail">array,</text>
    <text x="104" y="152" text-anchor="middle" class="detail">pointer</text>
    
    <!-- User-Defined -->
    <rect x="52" y="155" width="52" height="40" rx="4" fill="#ecf0f1" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="78" y="168" text-anchor="middle" class="type">User-Defined</text>
    <text x="78" y="182" text-anchor="middle" class="detail">class, struct,</text>
    <text x="78" y="194" text-anchor="middle" class="detail">enum</text>
  </g>
  
  <!-- Variables Section (Center) -->
  <g class="slide-up delay-2" data-narration="Variables store data with a name, type, and value. Four types: Local (inside functions), Global (outside functions), Static (retains value), Constant (cannot change)">
    <rect x="150" y="65" width="115" height="150" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="207" y="82" text-anchor="middle" class="section-title">Variables</text>
    
    <!-- Variable Example -->
    <rect x="165" y="92" width="85" height="30" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
    <text x="175" y="108" class="type">int</text>
    <text x="195" y="108" class="label">x = 10;</text>
    
    <!-- Variable Types -->
    <text x="165" y="135" class="label" font-weight="bold">Types:</text>
    <text x="165" y="150" class="detail">• Local</text>
    <text x="165" y="163" class="detail">• Global</text>
    <text x="165" y="176" class="detail">• Static</text>
    <text x="215" y="150" class="detail">• Constant</text>
    
    <!-- Properties -->
    <rect x="165" y="190" width="85" height="18" rx="3" fill="#fff" stroke="#27ae60" stroke-width="1"/>
    <text x="207" y="203" text-anchor="middle" class="detail">name, type, value</text>
  </g>
  
  <!-- Operators Section (Right) -->
  <g class="slide-right delay-2" data-narration="Operators perform operations: Arithmetic (+, -, *, /, %), Comparison (==, !=, <, >), Assignment (=, +=), Logical (&&, ||, !), Bitwise (&, |, ^)">
    <rect x="275" y="65" width="130" height="150" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="340" y="82" text-anchor="middle" class="section-title">Operators</text>
    
    <!-- Arithmetic -->
    <text x="285" y="100" class="label" font-weight="bold">Arithmetic:</text>
    <text x="285" y="115" class="operator">+ - * / %</text>
    
    <!-- Comparison -->
    <text x="340" y="100" class="label" font-weight="bold">Compare:</text>
    <text x="340" y="115" class="operator">== != &lt; &gt;</text>
    
    <!-- Assignment -->
    <text x="285" y="135" class="label" font-weight="bold">Assignment:</text>
    <text x="285" y="150" class="operator">= += -= *=</text>
    
    <!-- Logical -->
    <text x="340" y="135" class="label" font-weight="bold">Logical:</text>
    <text x="340" y="150" class="operator">&amp;&amp; || !</text>
    
    <!-- Bitwise -->
    <text x="285" y="170" class="label" font-weight="bold">Bitwise:</text>
    <text x="285" y="185" class="operator">&amp; | ^ ~</text>
    
    <!-- Arrow indicator -->
    <path d="M 207 225 L 340 225" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Code Example Box (Bottom) -->
  <g class="fade-in delay-3" data-narration="Example code showing variable declaration with different data types in C++">
    <rect x="15" y="230" width="390" height="70" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
    <text x="30" y="252" class="label" fill="#ecf0f1" font-weight="bold">Example:</text>
    <text x="30" y="270" class="detail" fill="#3498db">int</text>
    <text x="55" y="270" class="detail" fill="#ecf0f1">age = 25;</text>
    <text x="130" y="270" class="detail" fill="#e74c3c">double</text>
    <text x="175" y="270" class="detail" fill="#ecf0f1">price = 19.99;</text>
    <text x="260" y="270" class="detail" fill="#f39c12">char</text>
    <text x="290" y="270" class="detail" fill="#ecf0f1">grade = 'A';</text>
    <text x="30" y="290" class="detail" fill="#9b59b6">bool</text>
    <text x="60" y="290" class="detail" fill="#ecf0f1">isActive = true;</text>
    <text x="150" y="290" class="detail" fill="#1abc9c">// Variables store data</text>
  </g>
  
  <!-- Key Concepts Bottom Section -->
  <g class="fade-in delay-4" data-narration="Key takeaway: Understanding data types, variables, and operators is essential for writing effective C++ programs">
    <rect x="15" y="310" width="390" height="75" rx="8" fill="#fff" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="210" y="330" text-anchor="middle" class="section-title" fill="#2c3e50">Key Concepts</text>
    
    <g transform="translate(30, 345)">
      <circle cx="8" cy="5" r="4" fill="#3498db" class="pulse"/>
      <text x="20" y="9" class="detail">Data types define what values variables can hold</text>
    </g>
    <g transform="translate(30, 360)">
      <circle cx="8" cy="5" r="4" fill="#27ae60" class="pulse"/>
      <text x="20" y="9" class="detail">Variables have name, type, and stored value</text>
    </g>
    <g transform="translate(30, 375)">
      <circle cx="8" cy="5" r="4" fill="#e74c3c" class="pulse"/>
      <text x="20" y="9" class="detail">Operators perform computations on variables</text>
    </g>
  </g>
  
  <!-- Animated decorative elements -->
  <circle cx="50" cy="380" r="8" fill="#3498db" opacity="0.3" class="pulse"/>
  <circle cx="370" cy="380" r="8" fill="#e74c3c" opacity="0.3" class="pulse" style="animation-delay: 0.5s"/>
  <circle cx="210" cy="385" r="6" fill="#27ae60" opacity="0.3" class="pulse" style="animation-delay: 1s"/>
</svg>