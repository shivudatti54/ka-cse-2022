<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="functions-type-casting">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5e6"/>
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#1a202c"/>
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78"/>
      <stop offset="100%" style="stop-color:#2f855a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3748; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #4a5568; font-weight: 600; }
    .code-text { font-family: 'Consolas', 'Monaco', monospace; font-size: 11px; fill: #e2e8f0; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #718096; }
    .section-box { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 8; }
    .arrow { fill: none; stroke: #805ad5; stroke-width: 2; marker-end: url(#arrowhead); }
    .code-block { fill: url(#codeGradient); rx: 6; }
    .stack-frame { fill: url(#stackGradient); rx: 4; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Function Call Flow</text>
  <text x="210" y="46" text-anchor="middle" class="detail-text anim-fade delay-1">C++ Functions - Declaration to Execution</text>
  
  <!-- Main Function Section -->
  <g class="anim-slide-left delay-1" data-narration="The main function serves as the program entry point where function calls are initiated">
    <rect x="20" y="70" width="130" height="90" class="section-box" filter="url(#shadow)"/>
    <text x="85" y="88" text-anchor="middle" class="label">main()</text>
    <rect x="28" y="100" width="114" height="52" class="code-block"/>
    <text x="35" y="118" class="code-text">int main() {</text>
    <text x="40" y="133" class="code-text">  int a = 5, b = 3;</text>
    <text x="40" y="148" class="code-text">  int result = add(a,b);</text>
    <text x="35" y="163" class="code-text">  return 0;</text>
    <text x="35" y="178" class="code-text">}</text>
  </g>
  
  <!-- Function Call Arrow -->
  <g class="anim-fade delay-2">
    <path d="M155 115 L185 115" class="arrow anim-arrow"/>
    <polygon points="185,115 175,110 175,120" fill="#805ad5"/>
  </g>
  
  <!-- Function Declaration Section -->
  <g class="anim-slide-right delay-2" data-narration="Function prototype declares the function signature before it's used, informing the compiler about return type and parameters">
    <rect x="190" y="70" width="130" height="50" class="section-box" filter="url(#shadow)"/>
    <text x="255" y="88" text-anchor="middle" class="label">Declaration</text>
    <rect x="198" y="100" width="114" height="14" class="code-block"/>
    <text x="205" y="111" class="code-text">int add(int, int);</text>
  </g>
  
  <!-- Call Arrow -->
  <g class="anim-fade delay-3">
    <path d="M255 125 L255 155" class="arrow anim-arrow"/>
    <polygon points="255,165 250,155 260,155" fill="#805ad5"/>
  </g>
  
  <!-- Stack Frame Section -->
  <g class="anim-slide-up delay-3" data-narration="Stack frame creation allocates memory for parameters, local variables, and return address on the call stack">
    <rect x="190" y="160" width="130" height="80" class="section-box" filter="url(#shadow)"/>
    <text x="255" y="178" text-anchor="middle" class="label">Stack Frame</text>
    <rect x="200" y="188" width="110" height="45" class="stack-frame"/>
    <text x="210" y="203" class="code-text" fill="white">a: 5</text>
    <text x="210" y="218" class="code-text" fill="white">b: 3</text>
    <text x="210" y="233" class="code-text" fill="white">ret: 8</text>
  </g>
  
  <!-- Parameter Passing Arrow -->
  <g class="anim-fade delay-4">
    <path d="M85 170 L185 205" class="arrow anim-arrow"/>
    <polygon points="185,205 175,198 180,212" fill="#805ad5"/>
  </g>
  <text x="120" y="195" class="detail-text anim-fade delay-4">Pass by Value</text>
  
  <!-- Function Definition Section -->
  <g class="anim-slide-left delay-3" data-narration="Function definition contains the actual implementation that performs the computation">
    <rect x="20" y="255" width="130" height="75" class="section-box" filter="url(#shadow)"/>
    <text x="85" y="273" text-anchor="middle" class="label">Definition</text>
    <rect x="28" y="285" width="114" height="38" class="code-block"/>
    <text x="35" y="300" class="code-text">int add(int x, int y) {</text>
    <text x="40" y="315" class="code-text">  return x + y;</text>
    <text x="35" y="330" class="code-text">}</text>
  </g>
  
  <!-- Execution Arrow -->
  <g class="anim-fade delay-4">
    <path d="M150 295 L185 295" class="arrow anim-arrow"/>
    <polygon points="185,295 175,290 175,300" fill="#805ad5"/>
  </g>
  
  <!-- Return Arrow -->
  <g class="anim-fade delay-5">
    <path d="M255 240 L255 295" class="arrow anim-arrow" style="stroke: #48bb78;"/>
    <polygon points="255,295 250,285 260,285" fill="#48bb78"/>
  </g>
  
  <!-- Return Value -->
  <g class="anim-slide-right delay-5" data-narration="Return value is passed back to the caller and assigned to the result variable">
    <rect x="190" y="255" width="130" height="50" class="section-box" filter="url(#shadow)"/>
    <text x="255" y="275" text-anchor="middle" class="label">Return Value</text>
    <rect x="200" y="283" width="110" height="18" class="stack-frame"/>
    <text x="255" y="296" text-anchor="middle" class="code-text" fill="white">result = 8</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="anim-fade delay-5" data-narration="Key concepts: Pass-by-value copies parameters, stack manages function memory, function overloading allows multiple definitions">
    <rect x="320" y="70" width="90" height="120" class="section-box" filter="url(#shadow)" style="fill: #fef3c7;"/>
    <text x="365" y="88" text-anchor="middle" class="label" style="font-size: 12px;">Key Concepts</text>
    <circle cx="330" cy="108" r="4" fill="#f6ad55"/>
    <text x="340" y="112" class="detail-text" style="font-size: 10px;">Pass-by-Value</text>
    <circle cx="330" cy="128" r="4" fill="#f6ad55"/>
    <text x="340" y="132" class="detail-text" style="font-size: 10px;">Stack Memory</text>
    <circle cx="330" cy="148" r="4" fill="#f6ad55"/>
    <text x="340" y="152" class="detail-text" style="font-size: 10px;">Return Value</text>
    <circle cx="330" cy="168" r="4" fill="#f6ad55"/>
    <text x="340" y="172" class="detail-text" style="font-size: 10px;">Scope Rules</text>
  </g>
  
  <!-- Type Casting Info Box -->
  <g class="anim-fade delay-5" data-narration="Type casting converts between data types: implicit conversions by compiler and explicit casts using static_cast, dynamic_cast, const_cast, reinterpret_cast">
    <rect x="320" y="200" width="90" height="90" class="section-box" filter="url(#shadow)" style="fill: #e0f2fe;"/>
    <text x="365" y="218" text-anchor="middle" class="label" style="font-size: 12px;">Type Casting</text>
    <text x="365" y="235" text-anchor="middle" class="code-text" style="font-size: 9px;">int x = 5;</text>
    <text x="365" y="248" text-anchor="middle" class="code-text" style="font-size: 9px;">double d = x;</text>
    <text x="365" y="261" text-anchor="middle" class="code-text" style="font-size: 9px;">// implicit</text>
    <text x="365" y="277" text-anchor="middle" class="code-text" style="font-size: 9px;">double d = (double)x;</text>
    <text x="365" y="290" text-anchor="middle" class="code-text" style="font-size: 9px;">// explicit</text>
  </g>
  
  <!-- Flow indicator arrows -->
  <g class="anim-pulse delay-5">
    <text x="365" y="350" text-anchor="middle" class="label" style="font-size: 11px;">Execution Flow</text>
    <path d="M355 355 L365 345 L375 355" fill="none" stroke="#805ad5" stroke-width="2"/>
  </g>
</svg>