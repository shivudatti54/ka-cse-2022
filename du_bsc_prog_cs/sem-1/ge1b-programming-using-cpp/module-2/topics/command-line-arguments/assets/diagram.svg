<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="command-line-arguments">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="memGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab04c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9a3c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Monaco', monospace; font-size: 12px; fill: #555; }
    .code { font-family: 'Monaco', monospace; font-size: 13px; fill: #2c3e50; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-up { animation: slideUp 0.7s ease-out forwards; }
    .section-box { rx: 8; ry: 8; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="anim-fade">
    <rect x="10" y="10" width="400" height="45" fill="url(#boxGradient)" rx="10" filter="url(#shadow)"/>
    <text x="210" y="42" text-anchor="middle" class="title" fill="white">Command Line Arguments</text>
  </g>
  
  <!-- Function Signature Box -->
  <g class="anim-slide" style="animation-delay: 0.2s" data-narration="The main function accepts two parameters: argc (argument count) and argv (argument vector)">
    <rect x="20" y="70" width="380" height="55" fill="#fff5e6" stroke="#f39c12" stroke-width="2" rx="8" class="section-box"/>
    <text x="210" y="88" text-anchor="middle" class="label" fill="#e67e22" font-weight="bold">Function Signature</text>
    <text x="210" y="112" text-anchor="middle" class="code">int main(int argc, char* argv[])</text>
  </g>
  
  <!-- Command Line Example -->
  <g class="anim-up" style="animation-delay: 0.4s" data-narration="Example command showing program name followed by three arguments">
    <rect x="20" y="135" width="380" height="35" fill="#2c3e50" rx="6"/>
    <text x="30" y="157" class="detail" fill="#ecf0f1" font-family="Monaco, monospace">$ ./program hello world 123</text>
  </g>
  
  <!-- Memory Layout Section -->
  <g class="anim-fade" style="animation-delay: 0.6s" data-narration="Memory layout showing argc value and argv array with null terminator">
    <rect x="15" y="180" width="390" height="205" fill="white" stroke="#ddd" stroke-width="1" rx="8"/>
    <text x="210" y="200" text-anchor="middle" class="label" fill="#27ae60" font-weight="bold">Memory Layout</text>
    
    <!-- Column Headers -->
    <text x="45" y="220" class="detail" fill="#7f8c8d">Address</text>
    <text x="120" y="220" class="detail" fill="#7f8c8d">Name</text>
    <text x="200" y="220" class="detail" fill="#7f8c8d">Value</text>
    <text x="330" y="220" class="detail" fill="#7f8c8d">Description</text>
    
    <!-- Separator Line -->
    <line x1="20" y1="228" x2="400" y2="228" stroke="#eee" stroke-width="1"/>
    
    <!-- Memory Rows -->
    <g class="anim-pulse" style="animation-delay: 0.8s">
      <!-- argc = 4 -->
      <rect x="25" y="235" width="370" height="28" fill="#d5f5e3" rx="4"/>
      <text x="45" y="253" class="detail" fill="#27ae60" font-weight="bold">0x1000</text>
      <text x="120" y="253" class="detail" fill="#27ae60" font-weight="bold">argc</text>
      <text x="200" y="253" class="detail" fill="#27ae60" font-weight="bold">4</text>
      <text x="330" y="253" class="detail" fill="#555">Total arguments</text>
    </g>
    
    <g class="anim-pulse" style="animation-delay: 1s">
      <!-- argv[0] -->
      <rect x="25" y="268" width="370" height="28" fill="#ebf5fb" rx="4"/>
      <text x="45" y="286" class="detail" fill="#3498db" font-weight="bold">0x1004</text>
      <text x="120" y="286" class="detail" fill="#3498db" font-weight="bold">argv[0]</text>
      <text x="200" y="286" class="detail" fill="#3498db" font-family="Monaco">"./program"</text>
      <text x="330" y="286" class="detail" fill="#555">Program name</text>
    </g>
    
    <g class="anim-pulse" style="animation-delay: 1.2s">
      <!-- argv[1] -->
      <rect x="25" y="301" width="370" height="28" fill="#fdebd0" rx="4"/>
      <text x="45" y="319" class="detail" fill="#e67e22" font-weight="bold">0x1008</text>
      <text x="120" y="319" class="detail" fill="#e67e22" font-weight="bold">argv[1]</text>
      <text x="200" y="319" class="detail" fill="#e67e22" font-family="Monaco">"hello"</text>
      <text x="330" y="319" class="detail" fill="#555">Arg #1</text>
    </g>
    
    <g class="anim-pulse" style="animation-delay: 1.4s">
      <!-- argv[2] -->
      <rect x="25" y="334" width="370" height="28" fill="#fdebd0" rx="4"/>
      <text x="45" y="352" class="detail" fill="#e67e22" font-weight="bold">0x100C</text>
      <text x="120" y="352" class="detail" fill="#e67e22" font-weight="bold">argv[2]</text>
      <text x="200" y="352" class="detail" fill="#e67e22" font-family="Monaco">"world"</text>
      <text x="330" y="352" class="detail" fill="#555">Arg #2</text>
    </g>
    
    <g class="anim-pulse" style="animation-delay: 1.6s">
      <!-- argv[3] -->
      <rect x="25" y="367" width="370" height="28" fill="#fdebd0" rx="4"/>
      <text x="45" y="385" class="detail" fill="#e67e22" font-weight="bold">0x1010</text>
      <text x="120" y="385" class="detail" fill="#e67e22" font-weight="bold">argv[3]</text>
      <text x="200" y="385" class="detail" fill="#e67e22" font-family="Monaco">"123"</text>
      <text x="330" y="385" class="detail" fill="#555">Arg #3</text>
    </g>
  </g>
  
  <!-- Key Points Box -->
  <g class="anim-up" style="animation-delay: 1.8s" data-narration="Key points: argc is always at least 1, argv[0] is program name, argv ends with NULL">
    <rect x="270" y="70" width="130" height="55" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2" rx="8"/>
    <text x="335" y="88" text-anchor="middle" class="label" fill="#16a085" font-weight="bold" font-size="12">Key Points</text>
    <text x="335" y="104" text-anchor="middle" class="detail" fill="#555" font-size="10">• argc ≥ 1</text>
    <text x="335" y="116" text-anchor="middle" class="detail" fill="#555" font-size="10">• argv[argc] = NULL</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g stroke="#9b59b6" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 100 180 Q 100 160 160 160 Q 220 160 210 135" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9b59b6"/>
    </marker>
  </defs>
</svg>