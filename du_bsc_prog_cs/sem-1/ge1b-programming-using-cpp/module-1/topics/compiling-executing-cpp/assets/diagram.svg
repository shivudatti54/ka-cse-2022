<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="compiling-executing-cpp">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb"/>
      <stop offset="100%" style="stop-color:#90caf9"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b2dfdb"/>
      <stop offset="100%" style="stop-color:#80cbc4"/>
    </linearGradient>
    <linearGradient id="boxGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcdd2"/>
      <stop offset="100%" style="stop-color:#ef9a9a"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { transform: translateX(0); }
      to { transform: translateX(10px); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1565c0; }
    .box-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #37474f; }
    .box-detail { font-family: 'Consolas', monospace; font-size: 11px; fill: #546e7a; }
    .arrow-line { stroke: #546e7a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .box { filter: url(#shadow); cursor: pointer; }
    .box:hover { transform: scale(1.02); }
    .title-group { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .box2 { animation: slideInRight 0.6s ease-out 0.4s both; }
    .box3 { animation: slideInLeft 0.6s ease-out 0.6s both; }
    .box4 { animation: slideInRight 0.6s ease-out 0.8s both; }
    .box5 { animation: slideInLeft 0.6s ease-out 1.0s both; }
    .box6 { animation: pulse 2s ease-in-out 1.5s infinite; }
    .info-box { animation: fadeIn 0.8s ease-out 1.2s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <g class="title-group">
    <text x="210" y="30" text-anchor="middle" class="title">Compiling &amp; Executing C++</text>
    <line x1="60" y1="42" x2="360" y2="42" stroke="#90caf9" stroke-width="2"/>
  </g>
  
  <!-- Flowchart Boxes -->
  <!-- Box 1: Source Code -->
  <g class="box box1" data-narration="The source code is written in a text editor and saved as a .cpp file containing C++ instructions">
    <rect x="20" y="60" width="70" height="55" rx="8" fill="url(#boxGradient1)"/>
    <text x="55" y="78" text-anchor="middle" class="box-label">Source</text>
    <text x="55" y="93" text-anchor="middle" class="box-detail">program.cpp</text>
    <text x="55" y="106" text-anchor="middle" class="box-detail" font-size="9px">Text Editor</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M95 87 L120 87" class="arrow-line"/>
  
  <!-- Box 2: Preprocessor -->
  <g class="box box2" data-narration="The preprocessor handles directives like #include and #define, producing modified source code">
    <rect x="125" y="60" width="70" height="55" rx="8" fill="url(#boxGradient2)"/>
    <text x="160" y="78" text-anchor="middle" class="box-label">Preprocessor</text>
    <text x="160" y="93" text-anchor="middle" class="box-detail">processes</text>
    <text x="160" y="106" text-anchor="middle" class="box-detail" font-size="9px">#include, #define</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M200 87 L225 87" class="arrow-line"/>
  
  <!-- Box 3: Compiler -->
  <g class="box box3" data-narration="The compiler translates preprocessed code into assembly language, checking for syntax errors">
    <rect x="230" y="60" width="70" height="55" rx="8" fill="url(#boxGradient3)"/>
    <text x="265" y="78" text-anchor="middle" class="box-label">Compiler</text>
    <text x="265" y="93" text-anchor="middle" class="box-detail">translates to</text>
    <text x="265" y="106" text-anchor="middle" class="box-detail" font-size="9px">Assembly</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M305 87 L330 87" class="arrow-line"/>
  
  <!-- Box 4: Assembler -->
  <g class="box box4" data-narration="The assembler converts assembly code into machine code object files">
    <rect x="335" y="60" width="70" height="55" rx="8" fill="url(#boxGradient4)"/>
    <text x="370" y="78" text-anchor="middle" class="box-label">Assembler</text>
    <text x="370" y="93" text-anchor="middle" class="box-detail">creates</text>
    <text x="370" y="106" text-anchor="middle" class="box-detail" font-size="9px">object.o</text>
  </g>
  
  <!-- Down arrow from Assembler -->
  <path d="M370 120 L370 155" class="arrow-line"/>
  
  <!-- Box 5: Linker -->
  <g class="box box5" data-narration="The linker combines object files and libraries to create the final executable">
    <rect x="300" y="160" width="70" height="55" rx="8" fill="url(#boxGradient5)"/>
    <text x="335" y="178" text-anchor="middle" class="box-label">Linker</text>
    <text x="335" y="193" text-anchor="middle" class="box-detail">combines</text>
    <text x="335" y="206" text-anchor="middle" class="box-detail" font-size="9px">libraries</text>
  </g>
  
  <!-- Left arrow from Linker to earlier -->
  <path d="M300 187 L250 187" class="arrow-line" stroke-dasharray="4"/>
  <text x="270" y="183" text-anchor="middle" font-size="9" fill="#78909c">multiple .o</text>
  
  <!-- Arrow to Executable -->
  <path d="M335 220 L335 255" class="arrow-line"/>
  
  <!-- Box 6: Executable -->
  <g class="box box6" data-narration="The final executable can be run to produce program output">
    <rect x="295" y="260" width="80" height="50" rx="8" fill="url(#boxGradient6)"/>
    <text x="335" y="280" text-anchor="middle" class="box-label">Executable</text>
    <text x="335" y="298" text-anchor="middle" class="box-detail">program.exe</text>
  </g>
  
  <!-- Execution arrow -->
  <path d="M375 285 L405 285" class="arrow-line"/>
  <text x="390" y="280" text-anchor="middle" font-size="10" fill="#e57373" font-weight="bold">RUN</text>
  
  <!-- Info Box at bottom -->
  <g class="info-box">
    <rect x="20" y="320" width="180" height="70" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1" opacity="0.9"/>
    <text x="30" y="340" font-family="Segoe UI" font-size="12" font-weight="bold" fill="#f57f17">Key Concepts:</text>
    <text x="30" y="358" font-family="Segoe UI" font-size="10" fill="#5d4037">• g++ compiler command</text>
    <text x="30" y="372" font-family="Segoe UI" font-size="10" fill="#5d4037">• Syntax vs Logic errors</text>
    <text x="30" y="386" font-family="Segoe UI" font-size="10" fill="#5d4037">• IDEs abstract this process</text>
  </g>
  
  <!-- Process Summary Box -->
  <g class="info-box">
    <rect x="210" y="320" width="195" height="70" rx="6" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" opacity="0.9"/>
    <text x="220" y="340" font-family="Segoe UI" font-size="12" font-weight="bold" fill="#0d47a1">Compilation Steps:</text>
    <text x="220" y="358" font-family="Consolas" font-size="10" fill="#1565c0">1. g++ -E file.cpp</text>
    <text x="220" y="372" font-family="Consolas" font-size="10" fill="#1565c0">2. g++ -S file.cpp</text>
    <text x="220" y="386" font-family="Consolas" font-size="10" fill="#1565c0">3. g++ -c file.cpp</text>
  </g>
</svg>