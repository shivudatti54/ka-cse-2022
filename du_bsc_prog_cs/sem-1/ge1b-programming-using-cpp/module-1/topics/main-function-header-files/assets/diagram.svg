<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="main-function-header-files" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5" />
      <stop offset="100%" style="stop-color:#ffe0e0" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fff4" />
      <stop offset="100%" style="stop-color:#d4edda" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1" />
      <stop offset="100%" style="stop-color:#ffecb3" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6" />
      <stop offset="100%" style="stop-color:#c5cae9" />
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInDown {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .title { animation: slideInDown 0.6s ease-out forwards; }
      .box1 { animation: slideInLeft 0.5s ease-out 0.2s forwards; opacity: 0; }
      .box2 { animation: slideInRight 0.5s ease-out 0.4s forwards; opacity: 0; }
      .box3 { animation: slideInLeft 0.5s ease-out 0.6s forwards; opacity: 0; }
      .box4 { animation: slideInRight 0.5s ease-out 0.8s forwards; opacity: 0; }
      .code-block { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
      .arrow { animation: pulse 2s infinite; }
      .label { animation: fadeIn 0.5s ease-out forwards; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Main Function &amp; Header Files</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e" class="title">C++ Program Structure</text>
  
  <!-- Code Example Box -->
  <g class="code-block" data-narration="This shows the typical structure of a C++ program with preprocessor directives, header files, and main function">
    <rect x="60" y="65" width="300" height="100" fill="#282c34" rx="6" />
    <text x="75" y="85" font-family="Consolas, monospace" font-size="11" fill="#98c379">#include &lt;iostream&gt;</text>
    <text x="75" y="100" font-family="Consolas, monospace" font-size="11" fill="#c678dd">using namespace</text>
    <text x="168" y="100" font-family="Consolas, monospace" font-size="11" fill="#98c379">std;</text>
    <text x="75" y="120" font-family="Consolas, monospace" font-size="11" fill="#61afef">int</text>
    <text x="95" y="120" font-family="Consolas, monospace" font-size="11" fill="#e06c75">main</text>
    <text x="130" y="120" font-family="Consolas, monospace" font-size="11" fill="#abb2bf">() {</text>
    <text x="85" y="140" font-family="Consolas, monospace" font-size="11" fill="#c678dd">return</text>
    <text x="125" y="140" font-family="Consolas, monospace" font-size="11" fill="#d19a66">0</text>
    <text x="140" y="140" font-family="Consolas, monospace" font-size="11" fill="#abb2bf">;</text>
    <text x="155" y="140" font-family="Consolas, monospace" font-size="11" fill="#abb2bf">}</text>
  </g>
  
  <!-- Section 1: Preprocessor Directives -->
  <g class="box1" data-narration="Preprocessor directives like #include tell the compiler to include library files before compilation">
    <rect x="20" y="180" width="90" height="55" fill="url(#boxGradient1)" rx="5" stroke="#ffcdd2" stroke-width="1" />
    <text x="65" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c62828">Preprocessor</text>
    <text x="65" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Directives</text>
    <text x="65" y="228" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#b71c1c">#include</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M115 207 L145 207" stroke="#3498db" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)" />
  
  <!-- Section 2: Header Files -->
  <g class="box2" data-narration="Header files such as iostream provide declarations for input/output operations and the Standard Template Library">
    <rect x="150" y="180" width="100" height="55" fill="url(#boxGradient2)" rx="5" stroke="#c8e6c9" stroke-width="1" />
    <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">Header Files</text>
    <text x="200" y="215" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1b5e20">&lt;iostream&gt;</text>
    <text x="200" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4caf50">declarations</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M255 207 L285 207" stroke="#3498db" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)" />
  
  <!-- Section 3: Main Function -->
  <g class="box3" data-narration="The main function is the entry point where program execution begins">
    <rect x="290" y="180" width="110" height="55" fill="url(#boxGradient3)" rx="5" stroke="#ffe0b2" stroke-width="1" />
    <text x="345" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100">main() Function</text>
    <text x="345" y="215" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#ef6c00">int main()</text>
    <text x="345" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ff9800">entry point</text>
  </g>
  
  <!-- Vertical Arrow down from main -->
  <path d="M345 240 L345 260" stroke="#9c27b0" stroke-width="2" fill="none" class="arrow" />
  
  <!-- Section 4: Return Statement -->
  <g class="box4" data-narration="The return 0 statement indicates successful program completion">
    <rect x="290" y="265" width="110" height="50" fill="url(#boxGradient4)" rx="5" stroke="#9fa8da" stroke-width="1" />
    <text x="345" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#283593">Return Statement</text>
    <text x="345" y="302" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#3949ab">return 0;</text>
    <text x="345" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5c6bc0">success</text>
  </g>
  
  <!-- Connection lines from code to sections -->
  <path d="M160 115 L65 165" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2" fill="none" opacity="0.7" />
  <path d="M180 115 L200 165" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2" fill="none" opacity="0.7" />
  <path d="M200 115 L345 165" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2" fill="none" opacity="0.7" />
  
  <!-- Key Concepts Box -->
  <rect x="20" y="330" width="180" height="55" fill="white" rx="5" stroke="#bdc3c7" stroke-width="1" opacity="0.9" />
  <text x="30" y="348" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Key Concepts:</text>
  <text x="30" y="362" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Entry point of execution</text>
  <text x="30" y="376" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Bridge to libraries</text>
  
  <!-- Info Box -->
  <rect x="210" y="330" width="190" height="55" fill="white" rx="5" stroke="#bdc3c7" stroke-width="1" opacity="0.9" />
  <text x="220" y="348" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">DU GE1B Note:</text>
  <text x="220" y="362" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Essential for internal assessments</text>
  <text x="220" y="376" font-family="Arial, sans-serif" font-size="10" fill="#34495e">&amp; end-semester exams</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db" />
    </marker>
  </defs>
</svg>