<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="procedural-vs-oop-overview">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="procGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="oopGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="classGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes flowArrow { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -20; } }
    
    .title { font-size: 22px; font-weight: bold; fill: #2c3e50; font-family: Arial, sans-serif; }
    .subtitle { font-size: 12px; fill: #5a6c7d; font-family: Arial, sans-serif; }
    .label { font-size: 14px; font-weight: bold; fill: #2c3e50; font-family: Arial, sans-serif; }
    .detail { font-size: 11px; fill: #555; font-family: Arial, sans-serif; }
    .small { font-size: 10px; fill: #666; font-family: Arial, sans-serif; }
    
    .box-proc { fill: url(#procGradient); stroke: #42a5f5; stroke-width: 2; rx: 10; filter: url(#shadow); }
    .box-oop { fill: url(#oopGradient); stroke: #66bb6a; stroke-width: 2; rx: 10; filter: url(#shadow); }
    .box-class { fill: url(#classGradient); stroke: #ab47bc; stroke-width: 2; rx: 6; }
    
    .title-anim { animation: slideInUp 0.6s ease-out forwards; }
    .proc-anim { animation: slideInLeft 0.7s ease-out forwards; opacity: 0; }
    .oop-anim { animation: slideInRight 0.7s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s infinite; transform-origin: center; }
    
    .arrow-line { stroke: #78909c; stroke-width: 2; stroke-dasharray: 5,3; animation: flowArrow 1s linear infinite; }
    .solid-arrow { stroke: #546e7a; stroke-width: 2; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="title-anim">
    <text x="210" y="28" text-anchor="middle" class="title">Procedural vs OOP</text>
    <text x="210" y="44" text-anchor="middle" class="subtitle">Programming Paradigms Overview</text>
  </g>
  
  <!-- Procedural Side -->
  <g class="proc-anim">
    <rect x="15" y="55" width="190" height="330" class="box-proc" data-narration="Procedural Programming section showing top-down approach"/>
    <text x="110" y="78" text-anchor="middle" class="label" fill="#1565c0">PROCEDURAL</text>
    
    <!-- Data to Function Flow -->
    <g data-narration="Procedural: Data flows into separate functions">
      <rect x="35" y="95" width="55" height="28" fill="#ffcdd2" stroke="#ef5350" rx="4"/>
      <text x="62" y="113" text-anchor="middle" font-size="10" fill="#b71c1c" font-weight="bold">DATA</text>
      
      <path d="M95 109 L115 109" class="arrow-line"/>
      <polygon points="112,104 120,109 112,114" fill="#546e7a"/>
      
      <rect x="120" y="95" width="60" height="28" fill="#fff9c4" stroke="#ffca28" rx="4"/>
      <text x="150" y="113" text-anchor="middle" font-size="9" fill="#f57f17" font-weight="bold">Function</text>
    </g>
    
    <!-- Design Approach -->
    <g data-narration="Top-down design approach">
      <rect x="35" y="140" width="150" height="24" fill="#e3f2fd" rx="4"/>
      <text x="110" y="157" text-anchor="middle" font-size="10" fill="#0d47a1">Top-Down Design</text>
      <text x="110" y="170" text-anchor="middle" class="small">Break into functions</text>
    </g>
    
    <!-- Characteristics -->
    <g data-narration="Procedural characteristics: global data, sequential execution, no data hiding">
      <text x="110" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Key Traits</text>
      
      <rect x="25" y="208" width="170" height="20" fill="#ffecb3" rx="4"/>
      <text x="110" y="222" text-anchor="middle" font-size="9" fill="#e65100">Global Data</text>
      
      <rect x="25" y="232" width="170" height="20" fill="#ffecb3" rx="4"/>
      <text x="110" y="246" text-anchor="middle" font-size="9" fill="#e65100">Sequential Execution</text>
      
      <rect x="25" y="256" width="170" height="20" fill="#ffecb3" rx="4"/>
      <text x="110" y="270" text-anchor="middle" font-size="9" fill="#e65100">No Data Hiding</text>
      
      <rect x="25" y="280" width="170" height="20" fill="#ffecb3" rx="4"/>
      <text x="110" y="294" text-anchor="middle" font-size="9" fill="#e65100">Function-Focused</text>
      
      <rect x="25" y="304" width="170" height="20" fill="#ffecb3" rx="4"/>
      <text x="110" y="318" text-anchor="middle" font-size="9" fill="#e65100">Step-by-Step Logic</text>
      
      <rect x="25" y="328" width="170" height="20" fill="#ffecb3" rx="4"/>
      <text x="110" y="342" text-anchor="middle" font-size="9" fill="#e65100">Reusable Procedures</text>
    </g>
  </g>
  
  <!-- OOP Side -->
  <g class="oop-anim">
    <rect x="215" y="55" width="190" height="330" class="box-oop" data-narration="Object-Oriented Programming section showing bottom-up approach"/>
    <text x="310" y="78" text-anchor="middle" class="label" fill="#2e7d32">OOP</text>
    
    <!-- Class to Object -->
    <g data-narration="OOP: Class blueprint creates objects with bundled data and methods">
      <rect x="260" y="95" width="100" height="26" class="box-class" data-narration="Class as blueprint"/>
      <text x="310" y="113" text-anchor="middle" font-size="10" fill="#6a1b9a" font-weight="bold">CLASS</text>
      
      <path d="M310 126 L310 145" class="solid-arrow"/>
      <polygon points="306,140 310,150 314,140" fill="#546e7a"/>
      
      <circle cx="310" cy="162" r="22" fill="#a5d6a7" stroke="#4caf50" stroke-width="2" class="pulse"/>
      <text x="310" y="166" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Object</text>
    </g>
    
    <!-- Encapsulation -->
    <g data-narration="Encapsulation combines data and methods">
      <rect x="250" y="195" width="120" height="22" fill="#c8e6c9" rx="4"/>
      <text x="310" y="210" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">Data + Methods</text>
    </g>
    
    <!-- Design Approach -->
    <g data-narration="Bottom-up design approach">
      <rect x="235" y="230" width="150" height="24" fill="#e8f5e9" rx="4"/>
      <text x="310" y="247" text-anchor="middle" font-size="10" fill="#1b5e20">Bottom-Up Design</text>
      <text x="310" y="260" text-anchor="middle" class="small">Build from objects</text>
    </g>
    
    <!-- Characteristics -->
    <g data-narration="OOP characteristics: encapsulation, inheritance, polymorphism, message passing">
      <text x="310" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Key Traits</text>
      
      <rect x="225" y="298" width="170" height="20" fill="#b2dfdb" rx="4"/>
      <text x="310" y="312" text-anchor="middle" font-size="9" fill="#004d40">Encapsulation</text>
      
      <rect x="225" y="322" width="170" height="20" fill="#b2dfdb" rx="4"/>
      <text x="310" y="336" text-anchor="middle" font-size="9" fill="#004d40">Inheritance</text>
      
      <rect x="225" y="346" width="170" height="20" fill="#b2dfdb" rx="4"/>
      <text x="310" y="360" text-anchor="middle" font-size="9" fill="#004d40">Message Passing</text>
    </g>
  </g>
  
  <!-- Center Comparison -->
  <g data-narration="Comparison: Procedural separates data and functions while OOP combines them into objects">
    <line x1="205" y1="130" x2="215" y2="130" class="solid-arrow"/>
    <line x1="205" y1="350" x2="215" y2="350" class="solid-arrow"/>
    
    <text x="210" y="250" text-anchor="middle" font-size="10" fill="#78909c" transform="rotate(90, 210, 250)">VS</text>
  </g>
</svg>