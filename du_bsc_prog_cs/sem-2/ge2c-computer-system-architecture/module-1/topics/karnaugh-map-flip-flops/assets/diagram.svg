<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="karnaugh-map-flip-flops">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="kmapGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f7fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#888" flood-opacity="0.3"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlightPulse {
      0%, 100% { stroke-width: 2; opacity: 1; }
      50% { stroke-width: 4; opacity: 0.8; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title-text { font-family: Georgia, serif; font-size: 20px; fill: #2c5282; font-weight: bold; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .kmap-cell { fill: #fff; stroke: #4299e1; stroke-width: 1; }
    .kmap-cell-group { fill: #c6f6d5; stroke: #48bb78; stroke-width: 2; }
    .group-rect { fill: none; stroke: #e53e3e; stroke-width: 2; stroke-dasharray: 5,3; }
    .arrow-line { stroke: #ed8936; stroke-width: 2; marker-end: url(#arrowhead); }
    .concept-box { fill: #fff; stroke: #cbd5e0; stroke-width: 1; rx: 5; }
    .highlight-box { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
  </style>
  
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="slide-in" data-narration="Title section introducing Karnaugh Maps and Flip-Flops">
    <text x="210" y="30" text-anchor="middle" class="title-text">Karnaugh Maps &amp; Flip-Flops</text>
    <text x="210" y="50" text-anchor="middle" class="detail-text">Digital Circuit Design Fundamentals</text>
  </g>
  
  <!-- 3-Variable K-Map Section -->
  <g class="fade-in" data-narration="3-Variable Karnaugh Map showing 8 cells with Gray code labeling" style="animation-delay: 0.3s">
    <rect x="30" y="70" width="200" height="160" fill="url(#kmapGradient)" stroke="#4299e1" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="130" y="88" text-anchor="middle" class="label-text" style="font-weight:bold">3-Variable K-Map</text>
    
    <!-- Column labels -->
    <text x="70" y="118" text-anchor="middle" class="label-text" style="font-weight:bold">C'=0</text>
    <text x="150" y="118" text-anchor="middle" class="label-text" style="font-weight:bold">C=1</text>
    <text x="30" y="115" text-anchor="middle" class="label-text" style="font-weight:bold">AB\</text>
    
    <!-- Row labels -->
    <text x="45" y="150" text-anchor="start" class="label-text">A'B'</text>
    <text x="45" y="180" text-anchor="start" class="label-text">A'B</text>
    <text x="45" y="210" text-anchor="start" class="label-text">AB</text>
    <text x="45" y="240" text-anchor="start" class="label-text">AB'</text>
    
    <!-- K-map cells with minterms -->
    <rect x="70" y="130" width="75" height="30" class="kmap-cell"/>
    <text x="107.5" y="150" text-anchor="middle" class="detail-text">m0</text>
    <text x="107.5" y="163" text-anchor="middle" class="detail-text" style="font-size:10px">000</text>
    
    <rect x="150" y="130" width="75" height="30" class="kmap-cell"/>
    <text x="187.5" y="150" text-anchor="middle" class="detail-text">m1</text>
    <text x="187.5" y="163" text-anchor="middle" class="detail-text" style="font-size:10px">001</text>
    
    <rect x="70" y="165" width="75" height="30" class="kmap-cell"/>
    <text x="107.5" y="185" text-anchor="middle" class="detail-text">m2</text>
    <text x="107.5" y="198" text-anchor="middle" class="detail-text" style="font-size:10px">010</text>
    
    <rect x="150" y="165" width="75" height="30" class="kmap-cell"/>
    <text x="187.5" y="185" text-anchor="middle" class="detail-text">m3</text>
    <text x="187.5" y="198" text-anchor="middle" class="detail-text" style="font-size:10px">011</text>
    
    <rect x="70" y="200" width="75" height="30" class="kmap-cell"/>
    <text x="107.5" y="220" text-anchor="middle" class="detail-text">m6</text>
    <text x="107.5" y="233" text-anchor="middle" class="detail-text" style="font-size:10px">110</text>
    
    <rect x="150" y="200" width="75" height="30" class="kmap-cell"/>
    <text x="187.5" y="220" text-anchor="middle" class="detail-text">m7</text>
    <text x="187.5" y="233" text-anchor="middle" class="detail-text" style="font-size:10px">111</text>
    
    <!-- Highlighted group -->
    <g class="pulse" data-narration="Example grouping of adjacent cells m4 and m5">
      <rect x="70" y="135" width="155" height="25" class="highlight-box" style="opacity:0.6"/>
      <text x="80" y="152" text-anchor="middle" class="detail-text" style="font-weight:bold;fill:#2c5282">Group: m4,m5</text>
    </g>
    
    <!-- Wrap-around indicator -->
    <path d="M 70 228 Q 30 250 70 235" fill="none" stroke="#805ad5" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="50" y="260" text-anchor="middle" class="detail-text" style="fill:#805ad5;font-size:10px">Wrap</text>
  </g>
  
  <!-- Key Concept: Grouping Rules -->
  <g class="fade-in" data-narration="K-Map grouping rules explaining adjacency and simplification" style="animation-delay: 0.6s">
    <rect x="250" y="70" width="160" height="75" class="concept-box" filter="url(#shadow)"/>
    <text x="260" y="88" class="label-text" style="font-weight:bold;fill:#2c5282">K-Map Grouping</text>
    <text x="260" y="108" class="detail-text">• Groups of 2, 4, 8 cells</text>
    <text x="260" y="122" class="detail-text">• Adjacent = 1-bit difference</text>
    <text x="260" y="136" class="detail-text">• Wrap-around allowed</text>
  </g>
  
  <!-- Arrow from K-Map to Flip-Flop -->
  <g class="fade-in" data-narration="Arrow showing the relationship between K-map minimization and flip-flop design" style="animation-delay: 0.9s">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ed8936"/>
      </marker>
    </defs>
    <line x1="130" y1="245" x2="130" y2="280" class="arrow-line"/>
    <polygon points="125,270 130,280 135,270" fill="#ed8936"/>
    <text x="160" y="268" class="detail-text" style="fill:#ed8936">Simplify →</text>
  </g>
  
  <!-- Flip-Flop Section -->
  <g class="fade-in" data-narration="Flip-flop section showing the sequential logic element" style="animation-delay: 1.2s">
    <rect x="30" y="285" width="200" height="100" fill="#faf5ff" stroke="#805ad5" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="130" y="305" text-anchor="middle" class="label-text" style="font-weight:bold;fill:#553c9a">Flip-Flop (Bistable)</text>
    
    <!-- Simple FF diagram -->
    <rect x="55" y="315" width="40" height="50" fill="#e9d8fd" stroke="#805ad5" stroke-width="2" rx="3"/>
    <text x="75" y="345" text-anchor="middle" class="detail-text" style="font-weight:bold">Q</text>
    <rect x="125" y="315" width="40" height="50" fill="#e9d8fd" stroke="#805ad5" stroke-width="2" rx="3"/>
    <text x="145" y="345" text-anchor="middle" class="detail-text" style="font-weight:bold">Q'</text>
    <line x1="95" y1="340" x2="125" y2="340" stroke="#805ad5" stroke-width="2"/>
    
    <!-- Inputs -->
    <line x1="55" y1="325" x2="40" y2="325" stroke="#e53e3e" stroke-width="1.5"/>
    <text x="38" y="322" class="detail-text" style="fill:#e53e3e;font-size:10">J</text>
    <line x1="55" y1="355" x2="40" y2="355" stroke="#e53e3e" stroke-width="1.5"/>
    <text x="38" y="352" class="detail-text" style="fill:#e53e3e;font-size:10">K</text>
    <line x1="75" y1="365" x2="75" y2="375" stroke="#805ad5" stroke-width="1.5"/>
    <text x="75" y="388" text-anchor="middle" class="detail-text" style="font-size:10">CLK</text>
    
    <!-- Output states -->
    <text x="75" y="378" text-anchor="middle" class="detail-text" style="fill:#4a5568">Stores 1 bit</text>
  </g>
  
  <!-- Application Box -->
  <g class="fade-in" data-narration="Applications of K-maps and flip-flops in digital systems" style="animation-delay: 1.5s">
    <rect x="250" y="290" width="160" height="95" class="concept-box" filter="url(#shadow)"/>
    <text x="260" y="308" class="label-text" style="font-weight:bold;fill:#2c5282">Applications</text>
    <text x="260" y="328" class="detail-text">• Registers &amp; Memory</text>
    <text x="260" y="342" class="detail-text">• Counters</text>
    <text x="260" y="356" class="detail-text">• State Machines</text>
    <text x="260" y="370" class="detail-text">• Sequential Logic</text>
  </g>
  
  <!-- Bottom relationship indicator -->
  <g class="fade-in" data-narration="Summary showing how K-maps optimize flip-flop input logic" style="animation-delay: 1.8s">
    <rect x="100" y="375" width="220" height="18" fill="#c6f6d5" stroke="#38a169" stroke-width="1" rx="3"/>
    <text x="210" y="388" text-anchor="middle" class="detail-text" style="fill:#22543d;font-weight:bold">K-Map Simplification → Optimal FF Design</text>
  </g>
</svg>