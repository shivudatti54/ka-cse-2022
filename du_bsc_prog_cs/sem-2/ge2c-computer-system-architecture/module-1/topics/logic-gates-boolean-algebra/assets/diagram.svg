<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="logic-gates-boolean-algebra">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gateGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9bd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7cb8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="notGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e07b7b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c45c5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7bc47b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52a652;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .gate-box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .gate-1 { animation-delay: 0.2s; }
    .gate-2 { animation-delay: 0.4s; }
    .gate-3 { animation-delay: 0.6s; }
    .gate-4 { animation-delay: 0.8s; }
    .gate-5 { animation-delay: 1.0s; }
    .gate-6 { animation-delay: 1.2s; }
    .pulse { animation: pulse 2s infinite; transform-origin: center; }
    .connector { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; animation-delay: 1.5s; }
    .label { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; fill: #2c5282; }
    .gate-label { font-family: Arial, sans-serif; font-weight: bold; fill: #ffffff; font-size: 14px; }
    .expr-label { font-family: monospace; fill: #ffffff; font-size: 12px; }
    .info-text { font-family: Arial, sans-serif; fill: #2c5282; font-size: 11px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text title" font-size="20">Logic Gates &amp; Boolean Algebra</text>
  <line x1="50" y1="40" x2="370" y2="40" stroke="#5a9bd4" stroke-width="2" class="title"/>
  
  <!-- Row 1: NOT, AND, OR -->
  <!-- NOT Gate -->
  <g class="gate-box gate-1" filter="url(#shadow)">
    <rect x="20" y="60" width="110" height="70" rx="8" fill="url(#notGradient)"/>
    <polygon points="70,90 100,75 100,105" fill="#e07b7b"/>
    <circle cx="105" cy="90" r="5" fill="#e07b7b"/>
    <line x1="25" y1="80" x2="70" y2="80" stroke="#fff" stroke-width="2"/>
    <line x1="110" y1="90" x2="130" y2="90" stroke="#fff" stroke-width="2"/>
    <text x="75" y="72" text-anchor="middle" class="gate-label">NOT</text>
    <text x="75" y="130" text-anchor="middle" class="info-text" fill="#2c5282">Y = Ā</text>
    <text x="75" y="145" text-anchor="middle" class="info-text" fill="#666" font-size="10">Inverter</text>
  </g>
  
  <!-- AND Gate -->
  <g class="gate-box gate-2" filter="url(#shadow)">
    <rect x="155" y="60" width="110" height="70" rx="8" fill="url(#gateGradient)"/>
    <polygon points="185,95 215,75 215,105" fill="#5a9bd4"/>
    <line x1="160" y1="80" x2="185" y2="80" stroke="#fff" stroke-width="2"/>
    <line x1="160" y1="100" x2="185" y2="100" stroke="#fff" stroke-width="2"/>
    <line x1="230" y1="95" x2="260" y2="95" stroke="#fff" stroke-width="2"/>
    <text x="210" y="72" text-anchor="middle" class="gate-label">AND</text>
    <text x="210" y="130" text-anchor="middle" class="info-text" fill="#2c5282">Y = A · B</text>
    <text x="210" y="145" text-anchor="middle" class="info-text" fill="#666" font-size="10">All inputs 1</text>
  </g>
  
  <!-- OR Gate -->
  <g class="gate-box gate-3" filter="url(#shadow)">
    <rect x="290" y="60" width="110" height="70" rx="8" fill="url(#orGradient)"/>
    <path d="M310,75 Q330,95 310,105" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="300" y1="80" x2="315" y2="80" stroke="#fff" stroke-width="2"/>
    <line x1="300" y1="100" x2="315" y2="100" stroke="#fff" stroke-width="2"/>
    <line x1="345" y1="90" x2="395" y2="90" stroke="#fff" stroke-width="2"/>
    <text x="345" y="72" text-anchor="middle" class="gate-label" fill="#333">OR</text>
    <text x="345" y="130" text-anchor="middle" class="info-text" fill="#2c5282">Y = A + B</text>
    <text x="345" y="145" text-anchor="middle" class="info-text" fill="#666" font-size="10">Any input 1</text>
  </g>
  
  <!-- Row 2: NAND, NOR, XOR -->
  <!-- NAND Gate -->
  <g class="gate-box gate-4" filter="url(#shadow)">
    <rect x="20" y="170" width="110" height="70" rx="8" fill="url(#gateGradient)"/>
    <polygon points="70,195 100,175 100,205" fill="#5a9bd4"/>
    <circle cx="105" cy="195" r="5" fill="#5a9bd4"/>
    <line x1="25" y1="190" x2="70" y2="190" stroke="#fff" stroke-width="2"/>
    <line x1="110" y1="195" x2="130" y2="195" stroke="#fff" stroke-width="2"/>
    <text x="75" y="182" text-anchor="middle" class="gate-label">NAND</text>
    <text x="75" y="245" text-anchor="middle" class="info-text" fill="#2c5282">Y = ĀB̄</text>
    <text x="75" y="258" text-anchor="middle" class="info-text" fill="#666" font-size="10">AND + NOT</text>
  </g>
  
  <!-- NOR Gate -->
  <g class="gate-box gate-5" filter="url(#shadow)">
    <rect x="155" y="170" width="110" height="70" rx="8" fill="url(#orGradient)"/>
    <path d="M175,185 Q195,205 175,215" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="200" cy="195" r="5" fill="#7bc47b"/>
    <line x1="165" y1="190" x2="175" y2="190" stroke="#fff" stroke-width="2"/>
    <line x1="165" y1="200" x2="175" y2="200" stroke="#fff" stroke-width="2"/>
    <line x1="205" y1="195" x2="265" y2="195" stroke="#fff" stroke-width="2"/>
    <text x="210" y="182" text-anchor="middle" class="gate-label" fill="#333">NOR</text>
    <text x="210" y="245" text-anchor="middle" class="info-text" fill="#2c5282">Y = A + B</text>
    <text x="210" y="258" text-anchor="middle" class="info-text" fill="#666" font-size="10">OR + NOT</text>
  </g>
  
  <!-- XOR Gate -->
  <g class="gate-box gate-6" filter="url(#shadow)">
    <rect x="290" y="170" width="110" height="70" rx="8" fill="#9b7bc4"/>
    <path d="M305,185 Q325,205 305,215" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M315,185 Q335,205 315,215" fill="none" stroke="#fff" stroke-width="2"/>
    <line x1="295" y1="190" x2="305" y2="190" stroke="#fff" stroke-width="2"/>
    <line x1="295" y1="200" x2="305" y2="200" stroke="#fff" stroke-width="2"/>
    <line x1="345" y1="195" x2="395" y2="195" stroke="#fff" stroke-width="2"/>
    <text x="345" y="182" text-anchor="middle" class="gate-label">XOR</text>
    <text x="345" y="245" text-anchor="middle" class="info-text" fill="#2c5282">Y = A ⊕ B</text>
    <text x="345" y="258" text-anchor="middle" class="info-text" fill="#666" font-size="10">Unequal inputs</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="pulse" style="animation-delay: 1.5s;">
    <rect x="20" y="285" width="380" height="100" rx="8" fill="#fff" stroke="#5a9bd4" stroke-width="2" opacity="0.9"/>
    <text x="210" y="305" text-anchor="middle" class="title-text" font-size="14" fill="#2c5282">Key Boolean Algebra Laws</text>
    <line x1="40" y1="315" x2="380" y2="315" stroke="#ddd" stroke-width="1"/>
    
    <!-- Laws -->
    <text x="45" y="335" class="info-text" font-size="11">
      <tspan font-weight="bold">Commutative:</tspan> A·B = B·A, A+B = B+A
    </text>
    <text x="45" y="352" class="info-text" font-size="11">
      <tspan font-weight="bold">Associative:</tspan> (A·B)·C = A·(B·C), (A+B)+C = A+(B+C)
    </text>
    <text x="45" y="369" class="info-text" font-size="11">
      <tspan font-weight="bold">Distributive:</tspan> A·(B+C) = A·B + A·C
    </text>
    <text x="230" y="335" class="info-text" font-size="11">
      <tspan font-weight="bold">De Morgan:</tspan> Ā·B̄ = A+B, Ā+B̄ = A·B
    </text>
    <text x="230" y="352" class="info-text" font-size="11">
      <tspan font-weight="bold">Identity:</tspan> A·1 = A, A+0 = A
    </text>
    <text x="230" y="369" class="info-text" font-size="11">
      <tspan font-weight="bold">Null:</tspan> A·0 = 0, A+1 = 1
    </text>
  </g>
  
  <!-- Data narration sections (invisible but available for accessibility) -->
  <rect x="0" y="0" width="1" height="1" fill="transparent" data-narration="Introduction to Logic Gates and Boolean Algebra - the foundation of digital circuits"/>
  <rect x="0" y="0" width="1" height="1" fill="transparent" data-narration="NOT Gate - inverts input signal, Y equals A complement"/>
  <rect x="0" y="0" width="1" height="1" fill="transparent" data-narration="AND Gate - output is 1 only when all inputs are 1"/>
  <rect x="0" y="0" width="1" height="1" fill="transparent" data-narration="OR Gate - output is 1 when any input is 1"/>
  <rect x="0" y="0" width="1" height="1" fill="transparent" data-narration="NAND and NOR gates - universal gates combining basic operations with inversion"/>
  <rect x="0" y="0" width="1" height="1" fill="transparent" data-narration="XOR Gate - output is 1 when inputs are different"/>
</svg>