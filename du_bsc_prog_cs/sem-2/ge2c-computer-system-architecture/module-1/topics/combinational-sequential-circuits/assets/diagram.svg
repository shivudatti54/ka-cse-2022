<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="combinational-sequential-circuits" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5e6f0"/>
      <stop offset="100%" style="stop-color:#e6f0f5"/>
    </linearGradient>
    <linearGradient id="comboGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="seqGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0b8e0"/>
      <stop offset="100%" style="stop-color:#b8a0d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .combo-box { animation: slideInLeft 0.8s ease-out 0.3s both; }
    .seq-box { animation: slideInRight 0.8s ease-out 0.5s both; }
    .key-concepts { animation: slideInUp 0.8s ease-out 0.7s both; }
    .gate { animation: pulse 2s ease-in-out infinite; }
    .memory { animation: pulse 2.5s ease-in-out infinite; }
    .connection { animation: flowDash 1s linear infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Combinational vs Sequential</text>
  <text x="210" y="50" text-anchor="middle" font-size="14" fill="#5d6d7e" class="title">Digital Logic Circuits</text>
  
  <!-- Combinational Circuit Section -->
  <g class="combo-box" data-narration="Combinational circuits output depends only on current inputs - no memory element">
    <rect x="20" y="70" width="170" height="150" rx="10" fill="url(#comboGradient)" filter="url(#shadow)"/>
    <text x="105" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a5a3a">Combinational</text>
    <text x="105" y="105" text-anchor="middle" font-size="12" fill="#1a5a3a">Circuit</text>
    
    <!-- AND Gate Symbol -->
    <g transform="translate(60, 130)" class="gate">
      <path d="M0,-15 L20,-15 L30,0 L20,15 L0,15 Z" fill="none" stroke="#1a5a3a" stroke-width="2"/>
      <line x1="-15" y1="-8" x2="0" y2="-8" stroke="#1a5a3a" stroke-width="1.5"/>
      <line x1="-15" y1="8" x2="0" y2="8" stroke="#1a5a3a" stroke-width="1.5"/>
      <line x1="30" y1="0" x2="45" y2="0" stroke="#1a5a3a" stroke-width="1.5"/>
    </g>
    
    <!-- OR Gate Symbol -->
    <g transform="translate(110, 130)" class="gate">
      <path d="M-10,-15 Q10,-15 20,0 Q10,15 -10,15 Q0,0 -10,-15" fill="none" stroke="#1a5a3a" stroke-width="2"/>
      <line x1="-25" y1="-8" x2="-10" y2="-8" stroke="#1a5a3a" stroke-width="1.5"/>
      <line x1="-25" y1="8" x2="-10" y2="8" stroke="#1a5a3a" stroke-width="1.5"/>
      <line x1="20" y1="0" x2="35" y2="0" stroke="#1a5a3a" stroke-width="1.5"/>
    </g>
    
    <text x="105" y="205" text-anchor="middle" font-size="10" fill="#1a5a3a">No Memory</text>
    <text x="105" y="218" text-anchor="middle" font-size="10" fill="#1a5a3a">Output = f(Inputs)</text>
  </g>
  
  <!-- Arrow between sections -->
  <g class="connection">
    <path d="M195,145 L225,145" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="220,140 230,145 220,150" fill="#e74c3c"/>
  </g>
  
  <!-- Sequential Circuit Section -->
  <g class="seq-box" data-narration="Sequential circuits include memory elements - output depends on inputs and history">
    <rect x="230" y="70" width="170" height="150" rx="10" fill="url(#seqGradient)" filter="url(#shadow)"/>
    <text x="315" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a2c6a">Sequential</text>
    <text x="315" y="105" text-anchor="middle" font-size="12" fill="#4a2c6a">Circuit</text>
    
    <!-- Memory Element -->
    <g transform="translate(280, 130)" class="memory">
      <rect x="0" y="-15" width="40" height="30" rx="3" fill="none" stroke="#4a2c6a" stroke-width="2"/>
      <text x="20" y="5" text-anchor="middle" font-size="12" fill="#4a2c6a">MEM</text>
      <line x1="-20" y1="0" x2="0" y2="0" stroke="#4a2c6a" stroke-width="1.5"/>
      <line x1="40" y1="0" x2="60" y2="0" stroke="#4a2c6a" stroke-width="1.5"/>
    </g>
    
    <!-- Feedback loop arrow -->
    <path d="M330,160 Q330,180 300,180 Q250,180 260,160" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,2" class="connection"/>
    <polygon points="260,155 265,165 255,165" fill="#e74c3c"/>
    
    <text x="315" y="205" text-anchor="middle" font-size="10" fill="#4a2c6a">Has Memory</text>
    <text x="315" y="218" text-anchor="middle" font-size="10" fill="#4a2c6a">Output = f(Inputs, State)</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="key-concepts" data-narration="Key differences: combinational has no feedback, sequential has feedback loop for memory">
    <rect x="20" y="235" width="180" height="70" rx="8" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5"/>
    <text x="110" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d6608">Combinational</text>
    <text x="110" y="272" text-anchor="middle" font-size="10" fill="#7d6608">• No memory elements</text>
    <text x="110" y="285" text-anchor="middle" font-size="10" fill="#7d6608">• Instant output</text>
    <text x="110" y="298" text-anchor="middle" font-size="10" fill="#7d6608">• Examples: Adder, MUX</text>
  </g>
  
  <g class="key-concepts" data-narration="Sequential circuits use feedback to store state information">
    <rect x="220" y="235" width="180" height="70" rx="8" fill="#e6f4ea" stroke="#27ae60" stroke-width="1.5"/>
    <text x="310" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e5631">Sequential</text>
    <text x="310" y="272" text-anchor="middle" font-size="10" fill="#1e5631">• Has memory elements</text>
    <text x="310" y="285" text-anchor="middle" font-size="10" fill="#1e5631">• Output depends on history</text>
    <text x="310" y="298" text-anchor="middle" font-size="10" fill="#1e5631">• Examples: Flip-Flop, Counter</text>
  </g>
  
  <!-- Bottom comparison bar -->
  <g class="key-concepts" data-narration="Understanding this distinction is fundamental to computer architecture and processor design">
    <rect x="20" y="315" width="380" height="35" rx="8" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <text x="210" y="335" text-anchor="middle" font-size="12" fill="#2c3e50" font-weight="bold">Foundation for: ALUs, Processors, Memory Systems</text>
    <text x="210" y="350" text-anchor="middle" font-size="10" fill="#7f8c8d">Key in CS @ University of Delhi</text>
  </g>
  
  <!-- Decorative circuit lines -->
  <g opacity="0.3">
    <circle cx="50" cy="380" r="3" fill="#3498db"/>
    <circle cx="370" cy="380" r="3" fill="#9b59b6"/>
    <line x1="50" y1="380" x2="80" y2="380" stroke="#3498db" stroke-width="1"/>
    <line x1="340" y1="380" x2="370" y2="380" stroke="#9b59b6" stroke-width="1"/>
  </g>
</svg>