<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="number-systems-complements">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bb3f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateArrow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c5282; font-weight: bold; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; font-weight: bold; }
    .label { font-family: 'Courier New', monospace; font-size: 13px; fill: #1a365d; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .highlight { font-family: Arial, sans-serif; font-size: 12px; fill: #c53030; font-weight: bold; }
    .box-title { font-family: Arial, sans-serif; font-size: 12px; fill: #fff; font-weight: bold; }
    .box-text { font-family: Arial, sans-serif; font-size: 10px; fill: #fff; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title Section -->
  <g class="anim-fade">
    <text x="210" y="30" text-anchor="middle" class="title">Number Systems: Complements</text>
    <line x1="60" y1="40" x2="360" y2="40" stroke="#4a90d9" stroke-width="2" />
  </g>
  
  <!-- Main Circle Diagram -->
  <g transform="translate(140, 180)" class="anim-fade delay-1">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#4a90d9" stroke-width="3" stroke-dasharray="5,3" />
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="70" fill="#fff" stroke="#6bb3f0" stroke-width="2" filter="url(#shadow)" />
    
    <!-- 0 at top -->
    <g class="anim-pulse">
      <circle cx="0" cy="-70" r="22" fill="#48bb78" />
      <text x="0" y="-66" text-anchor="middle" class="box-title">0</text>
      <text x="0" y="-54" text-anchor="middle" class="detail">00000000</text>
    </g>
    
    <!-- -1 at bottom -->
    <g class="anim-pulse delay-2">
      <circle cx="0" cy="70" r="22" fill="#e53e3e" />
      <text x="0" y="66" text-anchor="middle" class="box-title">-1</text>
      <text x="0" y="78" text-anchor="middle" class="detail">11111111</text>
    </g>
    
    <!-- 127 at right -->
    <g class="anim-pulse delay-3">
      <circle cx="70" cy="0" r="22" fill="#48bb78" />
      <text x="70" y="-4" text-anchor="middle" class="box-title">127</text>
      <text x="70" y="12" text-anchor="middle" class="detail">01111111</text>
    </g>
    
    <!-- -128 at left -->
    <g class="anim-pulse delay-4">
      <circle cx="-70" cy="0" r="22" fill="#e53e3e" />
      <text x="-70" y="-4" text-anchor="middle" class="box-title">-128</text>
      <text x="-70" y="12" text-anchor="middle" class="detail">10000000</text>
    </g>
    
    <!-- Center label -->
    <text x="0" y="5" text-anchor="middle" class="section-title">2's Complement</text>
    <text x="0" y="20" text-anchor="middle" class="detail">8-bit Range</text>
  </g>
  
  <!-- Wrap-around arrows -->
  <g class="anim-fade delay-3">
    <path d="M 280 160 Q 330 180 280 200" fill="none" stroke="#9f7aea" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="310" y="185" class="detail" fill="#6b46c1">wrap</text>
    <path d="M 50 160 Q 10 180 50 200" fill="none" stroke="#9f7aea" stroke-width="2" />
    <text x="20" y="185" class="detail" fill="#6b46c1">around</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9f7aea" />
    </marker>
  </defs>
  
  <!-- Key Concepts Box 1 -->
  <g transform="translate(10, 270)" class="anim-slide-up">
    <rect x="0" y="0" width="125" height="55" rx="5" fill="#4a90d9" filter="url(#shadow)" />
    <text x="62" y="18" text-anchor="middle" class="box-title">1's Complement</text>
    <text x="62" y="35" text-anchor="middle" class="box-text">Invert each bit</text>
    <text x="62" y="48" text-anchor="middle" class="box-text" font-size="9">0→1, 1→0</text>
    <rect x="0" y="0" width="125" height="55" rx="5" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />
  </g>
  
  <!-- Key Concepts Box 2 -->
  <g transform="translate(145, 270)" class="anim-slide-up delay-1">
    <rect x="0" y="0" width="125" height="55" rx="5" fill="#48bb78" filter="url(#shadow)" />
    <text x="62" y="18" text-anchor="middle" class="box-title">2's Complement</text>
    <text x="62" y="35" text-anchor="middle" class="box-text">Add 1 to 1's complement</text>
    <text x="62" y="48" text-anchor="middle" class="box-text">Used for negatives</text>
    <rect x="0" y="0" width="125" height="55" rx="5" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />
  </g>
  
  <!-- Key Concepts Box 3 -->
  <g transform="translate(280, 270)" class="anim-slide-up delay-2">
    <rect x="0" y="0" width="125" height="55" rx="5" fill="#9f7aea" filter="url(#shadow)" />
    <text x="62" y="18" text-anchor="middle" class="box-title">Subtraction Trick</text>
    <text x="62" y="35" text-anchor="middle" class="box-text">A - B = A + (~B + 1)</text>
    <text x="62" y="48" text-anchor="middle" class="box-text">Hardware simplifies!</text>
    <rect x="0" y="0" width="125" height="55" rx="5" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />
  </g>
  
  <!-- Arrow showing subtraction method -->
  <g class="anim-fade delay-4">
    <path d="M 155 330 L 230 330" fill="none" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrowRed)" />
    <text x="192" y="325" class="detail" fill="#c53030" font-size="10">addition</text>
  </g>
  
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e" />
    </marker>
  </defs>
  
  <!-- Range indicator -->
  <g class="anim-slide">
    <rect x="295" y="55" width="110" height="30" rx="4" fill="#fff" stroke="#4a90d9" stroke-width="1" />
    <text x="350" y="70" text-anchor="middle" class="label">8-bit Range:</text>
    <text x="350" y="82" text-anchor="middle" class="highlight">-128 to +127</text>
  </g>
  
  <!-- Data narration elements (hidden from view but present for accessibility) -->
  <title data-narration="title">Number Systems Complements Diagram</title>
  <desc data-narration="description">This diagram illustrates 2's complement representation in 8-bit binary, showing how positive and negative numbers wrap around a circle. Key concepts include 1's complement, 2's complement, and the subtraction trick using addition.</desc>
</svg>