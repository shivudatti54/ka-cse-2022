<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="data-representation-arithmetic-ops">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2dce8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:0.7" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-180deg) scale(0); opacity: 0; }
      to { transform: rotate(0deg) scale(1); opacity: 1; }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c5282; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail { font-family: 'Consolas', monospace; font-size: 11px; fill: #4a5568; }
    .concept-box { rx: 8; ry: 8; }
    .positive { fill: #c6f6d5; stroke: #48bb78; }
    .negative { fill: #fed7d7; stroke: #f56565; }
    .zero { fill: #fefcbf; stroke: #ecc94b; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c5282; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-rotate { animation: rotateIn 1s ease-out forwards; transform-origin: center; }
    .arrow-line { stroke: #4299e1; stroke-width: 2; stroke-dasharray: 5,5; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Data Representation &amp; Arithmetic Ops</text>
  <text x="210" y="50" text-anchor="middle" class="label anim-fade" style="animation-delay: 0.2s">2's Complement Number Circle</text>
  
  <!-- Main Circle -->
  <g class="anim-rotate" style="transform-origin: 210px 220px;">
    <circle cx="210" cy="220" r="100" fill="url(#circleGradient)" stroke="#4299e1" stroke-width="2" filter="url(#shadow)"/>
  </g>
  
  <!-- Center value: 0 -->
  <g class="anim-fade" style="animation-delay: 0.5s;">
    <circle cx="210" cy="220" r="22" class="zero" stroke-width="2"/>
    <text x="210" y="224" text-anchor="middle" class="detail" font-weight="bold">00000000</text>
  </g>
  
  <!-- Key values around the circle - Positive numbers (clockwise from top) -->
  <g data-narration="Positive numbers range from 0 to +127 in 8-bit 2's complement">
    <!-- +1 -->
    <g class="anim-fade" style="animation-delay: 0.6s;">
      <circle cx="210" cy="145" r="12" class="positive" stroke-width="1.5"/>
      <text x="210" y="149" text-anchor="middle" class="detail">+1</text>
    </g>
    <!-- +64 -->
    <g class="anim-fade" style="animation-delay: 0.7s;">
      <circle cx="295" cy="220" r="12" class="positive" stroke-width="1.5"/>
      <text x="295" y="224" text-anchor="middle" class="detail">+64</text>
    </g>
    <!-- +127 -->
    <g class="anim-fade" style="animation-delay: 0.8s;">
      <circle cx="260" cy="295" r="12" class="positive" stroke-width="1.5"/>
      <text x="260" y="299" text-anchor="middle" class="detail">+127</text>
    </g>
  </g>
  
  <!-- Negative numbers (continuing clockwise) -->
  <g data-narration="Negative numbers range from -1 to -128, with -1 as 11111111">
    <!-- -1 -->
    <g class="anim-fade" style="animation-delay: 0.9s;">
      <circle cx="210" cy="325" r="12" class="negative" stroke-width="1.5"/>
      <text x="210" y="329" text-anchor="middle" class="detail">-1</text>
    </g>
    <!-- -128 -->
    <g class="anim-fade" style="animation-delay: 1s;">
      <circle cx="125" cy="295" r="12" class="negative" stroke-width="1.5"/>
      <text x="125" y="299" text-anchor="middle" class="detail">-128</text>
    </g>
  </g>
  
  <!-- Wrap-around arrow -->
  <g class="anim-fade" style="animation-delay: 1.2s;">
    <path d="M 330 230 Q 360 220 360 180 Q 360 120 300 120 Q 250 120 230 140" fill="none" stroke="#e53e3e" stroke-width="2.5" stroke-linecap="round" class="anim-pulse" style="transform-origin: center;"/>
    <polygon points="230,140 240,132 238,148" fill="#e53e3e"/>
    <text x="340" y="155" class="detail" fill="#c53030" font-size="10">+1 wraps to -128</text>
  </g>
  
  <!-- Concept boxes -->
  <!-- Left box: Number Systems -->
  <g class="anim-slide-left" data-narration="Four fundamental number systems: Decimal (base-10), Binary (base-2), Octal (base-8), Hexadecimal (base-16)">
    <rect x="10" y="340" width="100" height="50" class="concept-box" fill="#ebf8ff" stroke="#4299e1" stroke-width="1.5"/>
    <text x="60" y="355" text-anchor="middle" class="section-title">Number Systems</text>
    <text x="60" y="370" text-anchor="middle" class="detail">Dec, Bin, Oct, Hex</text>
    <text x="60" y="382" text-anchor="middle" class="detail">Base 10,2,8,16</text>
  </g>
  
  <!-- Center box: 2's Complement -->
  <g class="anim-fade" data-narration="2's complement allows representation of negative numbers, with -128 to +127 range in 8 bits">
    <rect x="120" y="340" width="140" height="50" class="concept-box" fill="#faf5ff" stroke="#805ad5" stroke-width="1.5"/>
    <text x="190" y="355" text-anchor="middle" class="section-title">2's Complement</text>
    <text x="190" y="370" text-anchor="middle" class="detail">Range: -128 to +127</text>
    <text x="190" y="382" text-anchor="middle" class="detail">8-bit signed integer</text>
  </g>
  
  <!-- Right box: Binary Arithmetic -->
  <g class="anim-slide-right" data-narration="Binary arithmetic operations include addition, subtraction, multiplication performed bit-by-bit">
    <rect x="270" y="340" width="130" height="50" class="concept-box" fill="#f0fff4" stroke="#38a169" stroke-width="1.5"/>
    <text x="335" y="355" text-anchor="middle" class="section-title">Binary Arithmetic</text>
    <text x="335" y="370" text-anchor="middle" class="detail">Add, Subtract, Multiply</text>
    <text x="335" y="382" text-anchor="middle" class="detail">Bit-by-bit operations</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g data-narration="Arrows indicate the cyclic nature of 2's complement arithmetic">
    <line x1="60" y1="335" x2="60" y2="310" class="arrow-line" style="stroke-dasharray: 3,3;"/>
    <polygon points="60,305 55,315 65,315" fill="#4299e1"/>
    <line x1="335" y1="335" x2="335" y2="310" class="arrow-line" style="stroke-dasharray: 3,3;"/>
    <polygon points="335,305 330,315 340,315" fill="#4299e1"/>
  </g>
  
  <!-- Additional labels -->
  <g class="anim-fade" style="animation-delay: 1.3s;">
    <text x="355" y="220" class="label" fill="#2d3748" font-size="11">01111111</text>
    <text x="355" y="235" class="detail">(+127)</text>
    <text x="50" y="220" class="label" fill="#2d3748" font-size="11">10000000</text>
    <text x="50" y="235" class="detail">(-128)</text>
    <text x="155" y="125" class="label" fill="#2d3748" font-size="11">00000001</text>
    <text x="155" y="140" class="detail">(+1)</text>
  </g>
  
  <!-- Formula explanation -->
  <g class="anim-fade" style="animation-delay: 1.4s;">
    <text x="210" y="75" text-anchor="middle" class="detail" fill="#4a5568">Formula: -n = ~n + 1 (invert bits, add 1)</text>
  </g>
</svg>