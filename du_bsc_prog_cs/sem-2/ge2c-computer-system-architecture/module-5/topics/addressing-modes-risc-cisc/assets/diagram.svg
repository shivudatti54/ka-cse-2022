<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="addressing-modes-risc-cisc">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bb3c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe8cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce5ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes treeExpand {
      from { opacity: 0; transform: scaleY(0); }
      to { opacity: 1; transform: scaleY(1); }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: white; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .box { rx: 6; ry: 6; stroke: #888; stroke-width: 1; }
    .tree-line { stroke: #666; stroke-width: 1.5; fill: none; }
    .arrow { marker-end: url(#arrowhead); stroke: #666; stroke-width: 1.5; fill: none; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-tree { animation: treeExpand 0.5s ease-out forwards; transform-origin: center top; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title Bar -->
  <rect x="0" y="0" width="420" height="45" fill="url(#titleGradient)" />
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Addressing Modes &amp; RISC vs CISC</text>
  
  <!-- Left Panel: Addressing Modes -->
  <rect x="10" y="55" width="200" height="330" fill="url(#leftGradient)" class="box" style="animation: slideInLeft 0.6s ease-out forwards;" />
  <text x="110" y="75" text-anchor="middle" class="label anim-fade" style="animation-delay: 0.2s;">Addressing Modes</text>
  
  <!-- Tree Structure -->
  <g class="anim-tree" style="animation-delay: 0.3s;">
    <rect x="30" y="90" width="160" height="22" fill="#ffcc80" rx="4" data-narration="Immediate Addressing: Operand value is directly in the instruction. Fastest mode, no memory access needed." />
    <text x="110" y="106" text-anchor="middle" class="detail" font-weight="bold">Immediate</text>
    
    <rect x="30" y="120" width="160" height="22" fill="#ffcc80" rx="4" data-narration="Register Addressing: Operand is in a CPU register. Very fast as no memory access required." />
    <text x="110" y="136" text-anchor="middle" class="detail" font-weight="bold">Register</text>
    
    <line x1="110" y1="142" x2="110" y2="160" class="tree-line" />
    <line x1="70" y1="160" x2="150" y2="160" class="tree-line" />
    <line x1="70" y1="160" x2="70" y2="175" class="tree-line" />
    <line x1="150" y1="160" x2="150" y2="175" class="tree-line" />
    
    <text x="110" y="158" text-anchor="middle" class="detail" font-size="10" fill="#444">Memory Addressing</text>
    
    <!-- Memory Addressing Types -->
    <rect x="15" y="180" width="110" height="18" fill="#ffab91" rx="3" data-narration="Direct Addressing: Address of operand is given directly in instruction. Single memory access." />
    <text x="70" y="193" text-anchor="middle" class="detail" font-size="10">Direct</text>
    
    <rect x="135" y="180" width="110" height="18" fill="#ffab91" rx="3" data-narration="Indirect Addressing: Address field points to a memory location that contains the effective address." />
    <text x="190" y="193" text-anchor="middle" class="detail" font-size="10">Indirect</text>
    
    <rect x="15" y="205" width="110" height="18" fill="#ffab91" rx="3" data-narration="Indexed Addressing: Effective address = base + index register. Common in array operations." />
    <text x="70" y="218" text-anchor="middle" class="detail" font-size="10">Indexed</text>
    
    <rect x="135" y="205" width="110" height="18" fill="#ffab91" rx="3" data-narration="Base-Register Addressing: Effective address = base register + displacement. Used in function calls." />
    <text x="190" y="218" text-anchor="middle" class="detail" font-size="10">Base-Register</text>
    
    <rect x="15" y="230" width="110" height="18" fill="#ffab91" rx="3" data-narration="Relative Addressing: PC-relative addressing used in branches. Address = PC + offset." />
    <text x="70" y="243" text-anchor="middle" class="detail" font-size="10">Relative</text>
    
    <rect x="135" y="230" width="110" height="18" fill="#ffab91" rx="3" data-narration="Stack Addressing: Operand is implicitly at top of stack. Used by PUSH/POP instructions." />
    <text x="190" y="243" text-anchor="middle" class="detail" font-size="10">Stack</text>
  </g>
  
  <!-- Right Panel: RISC vs CISC -->
  <rect x="220" y="55" width="190" height="330" fill="url(#rightGradient)" class="box" style="animation: slideInRight 0.6s ease-out forwards;" />
  <text x="315" y="75" text-anchor="middle" class="label anim-fade" style="animation-delay: 0.2s;">RISC vs CISC</text>
  
  <!-- RISC Box -->
  <g class="anim-pulse" style="animation-delay: 0.4s;">
    <rect x="230" y="90" width="170" height="120" fill="#b3e5fc" rx="6" data-narration="RISC (Reduced Instruction Set Computer): Few simple instructions, fixed length, register-based. Examples: ARM, MIPS, RISC-V" />
    <text x="315" y="108" text-anchor="middle" class="label" fill="#0277bd">RISC</text>
    <text x="315" y="125" text-anchor="middle" class="detail">• Load/Store architecture</text>
    <text x="315" y="140" text-anchor="middle" class="detail">• Fixed instruction size</text>
    <text x="315" y="155" text-anchor="middle" class="detail">• Single cycle execution</text>
    <text x="315" y="170" text-anchor="middle" class="detail">• Many registers</text>
    <text x="315" y="185" text-anchor="middle" class="detail">• Examples: ARM, MIPS</text>
  </g>
  
  <!-- VS -->
  <text x="315" y="225" text-anchor="middle" class="label" fill="#d32f2f">VS</text>
  
  <!-- CISC Box -->
  <g class="anim-pulse" style="animation-delay: 0.6s;">
    <rect x="230" y="235" width="170" height="130" fill="#d1c4e9" rx="6" data-narration="CISC (Complex Instruction Set Computer): Many complex instructions, variable length, memory-to-memory operations. Examples: x86, x64" />
    <text x="315" y="253" text-anchor="middle" class="label" fill="#4527a0">CISC</text>
    <text x="315" y="270" text-anchor="middle" class="detail">• Complex instructions</text>
    <text x="315" y="285" text-anchor="middle" class="detail">• Variable instruction size</text>
    <text x="315" y="300" text-anchor="middle" class="detail">• Multi-cycle execution</text>
    <text x="315" y="315" text-anchor="middle" class="detail">• Memory-to-memory</text>
    <text x="315" y="330" text-anchor="middle" class="detail">• Examples: x86, x64</text>
  </g>
  
  <!-- Modern Note -->
  <rect x="230" y="305" width="170" height="70" fill="#fff9c4" rx="4" data-narration="Modern processors use hybrid approaches. x86 translates to RISC-like micro-ops internally. ARM powers most mobiles, Apple M-series." />
  <text x="315" y="345" text-anchor="middle" class="detail" font-size="10" font-weight="bold">Modern Reality:</text>
  <text x="315" y="360" text-anchor="middle" class="detail" font-size="9">Hybrid designs dominate</text>
  
  <!-- Decorative Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#666" />
    </marker>
  </defs>
  
  <!-- Connection arrow from addressing modes to RISC -->
  <path d="M 200 160 Q 210 160 220 150" class="arrow" />
  <text x="205" y="145" class="detail" font-size="9">Uses</text>
  
  <!-- Legend/Key -->
  <g transform="translate(15, 365)">
    <circle cx="5" cy="5" r="4" fill="#ffcc80" />
    <text x="15" y="9" class="detail" font-size="9">Fast</text>
    <circle cx="50" cy="5" r="4" fill="#ffab91" />
    <text x="60" y="9" class="detail" font-size="9">Memory</text>
    <circle cx="100" cy="5" r="4" fill="#b3e5fc" />
    <text x="110" y="9" class="detail" font-size="9">RISC</text>
    <circle cx="150" cy="5" r="4" fill="#d1c4e9" />
    <text x="160" y="9" class="detail" font-size="9">CISC</text>
  </g>
</svg>