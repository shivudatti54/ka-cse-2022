<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="register-stack-organization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#41719c"/>
    </linearGradient>
    <linearGradient id="frameGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47"/>
      <stop offset="100%" style="stop-color:#558b2f"/>
    </linearGradient>
    <linearGradient id="frameGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc000"/>
      <stop offset="100%" style="stop-color:#e6a800"/>
    </linearGradient>
    <linearGradient id="frameGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed7d31"/>
      <stop offset="100%" style="stop-color:#d4651f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #ffffff; }
    .highlight { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-slide-up { animation: slideUp 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
    .stack-frame { filter: url(#shadow); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Register Stack Organization</text>
  <line x1="80" y1="42" x2="340" y2="42" stroke="#5b9bd5" stroke-width="2" class="anim-fade"/>
  
  <!-- Stack Growth Arrow -->
  <g class="anim-fade" style="animation-delay: 0.2s">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
      </marker>
    </defs>
    <line x1="380" y1="100" x2="380" y2="280" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="395" y="190" class="detail" fill="#e74c3c" transform="rotate(90, 395, 190)">Stack Growth</text>
  </g>
  
  <!-- Main Stack Visualization -->
  <g transform="translate(40, 60)" class="anim-slide" style="animation-delay: 0.3s">
    <!-- Stack Frame 3 (Top - Most Recent) -->
    <g class="stack-frame">
      <rect x="0" y="0" width="180" height="55" rx="4" fill="url(#frameGradient3)" data-narration="Topmost stack frame representing the most recently called function"/>
      <text x="90" y="18" text-anchor="middle" class="section-title">Function C (Active)</text>
      <rect x="5" y="25" width="170" height="3" fill="rgba(255,255,255,0.3)"/>
      <text x="10" y="38" class="detail" fill="#fff">Local Vars</text>
      <text x="100" y="38" class="detail" fill="#fff">Params</text>
      <text x="10" y="50" class="detail" fill="#fff">Return Addr</text>
    </g>
    
    <!-- Stack Frame 2 -->
    <g class="stack-frame" style="animation-delay: 0.1s">
      <rect x="0" y="55" width="180" height="55" rx="4" fill="url(#frameGradient2)" data-narration="Intermediate stack frame from the calling function"/>
      <text x="90" y="73" text-anchor="middle" class="section-title">Function B</text>
      <rect x="5" y="80" width="170" height="3" fill="rgba(255,255,255,0.3)"/>
      <text x="10" y="93" class="detail" fill="#fff">Local Vars</text>
      <text x="100" y="93" class="detail" fill="#fff">Params</text>
      <text x="10" y="105" class="detail" fill="#fff">Return Addr</text>
    </g>
    
    <!-- Stack Frame 1 (Bottom) -->
    <g class="stack-frame" style="animation-delay: 0.2s">
      <rect x="0" y="110" width="180" height="55" rx="4" fill="url(#frameGradient1)" data-narration="Bottom stack frame representing the main function or caller"/>
      <text x="90" y="128" text-anchor="middle" class="section-title">Function A (Main)</text>
      <rect x="5" y="135" width="170" height="3" fill="rgba(255,255,255,0.3)"/>
      <text x="10" y="148" class="detail" fill="#fff">Local Vars</text>
      <text x="100" y="148" class="detail" fill="#fff">Params</text>
      <text x="10" y="160" class="detail" fill="#fff">Return Addr</text>
    </g>
  </g>
  
  <!-- Stack Frame Components Breakdown -->
  <g transform="translate(240, 60)" class="anim-slide-up" style="animation-delay: 0.4s">
    <rect x="0" y="0" width="160" height="165" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
    <text x="80" y="20" text-anchor="middle" class="highlight">Stack Frame Layout</text>
    <line x1="10" y1="30" x2="150" y2="30" stroke="#ecf0f1" stroke-width="1"/>
    
    <!-- Components -->
    <rect x="10" y="40" width="140" height="22" rx="3" fill="#ed7d31" data-narration="Return Address - stores the address to return to after function completes"/>
    <text x="80" y="55" text-anchor="middle" class="detail" fill="#fff">Return Address</text>
    
    <rect x="10" y="65" width="140" height="22" rx="3" fill="#ffc000" data-narration="Saved Frame Pointer - maintains the stack frame reference"/>
    <text x="80" y="80" text-anchor="middle" class="detail" fill="#fff">Saved FP</text>
    
    <rect x="10" y="90" width="140" height="22" rx="3" fill="#70ad47" data-narration="Callee-Saved Registers - registers that the called function must preserve"/>
    <text x="80" y="105" text-anchor="middle" class="detail" fill="#fff">Saved Registers</text>
    
    <rect x="10" y="115" width="140" height="22" rx="3" fill="#5b9bd5" data-narration="Local Variables - space allocated for function's local data"/>
    <text x="80" y="130" text-anchor="middle" class="detail" fill="#fff">Local Variables</text>
    
    <rect x="10" y="140" width="140" height="18" rx="3" fill="#9b59b6" data-narration="Function Parameters - arguments passed to the function"/>
    <text x="80" y="154" text-anchor="middle" class="detail" fill="#fff">Parameters</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g transform="translate(240, 235)" class="anim-slide-up" style="animation-delay: 0.5s">
    <rect x="0" y="0" width="160" height="130" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
    <text x="80" y="18" text-anchor="middle" class="highlight">Key Concepts</text>
    <line x1="10" y1="28" x2="150" y2="28" stroke="#ecf0f1" stroke-width="1"/>
    
    <circle cx="20" cy="45" r="5" fill="#e74c3c"/>
    <text x="32" y="49" class="detail">LIFO: Last In First Out</text>
    
    <circle cx="20" cy="65" r="5" fill="#3498db"/>
    <text x="32" y="69" class="detail">PUSH: Add to top</text>
    
    <circle cx="20" cy="85" r="5" fill="#9b59b6"/>
    <text x="32" y="89" class="detail">POP: Remove from top</text>
    
    <circle cx="20" cy="105" r="5" fill="#27ae60"/>
    <text x="32" y="109" class="detail">SP: Stack Pointer</text>
    
    <circle cx="20" cy="120" r="5" fill="#e67e22"/>
    <text x="32" y="124" class="detail">FP: Frame Pointer</text>
  </g>
  
  <!-- Operations Arrow -->
  <g transform="translate(10, 290)" class="anim-arrow">
    <rect x="0" y="0" width="220" height="40" rx="5" fill="rgba(255,255,255,0.8)" stroke="#3498db" stroke-width="1"/>
    <text x="110" y="16" text-anchor="middle" class="label" fill="#2c3e50">Function Call Sequence:</text>
    <text x="110" y="32" text-anchor="middle" class="detail" fill="#34495e">PUSH ReturnAddr → PUSH Params → CALL → PUSH LocalVars</text>
  </g>
  
  <!-- Bottom annotation -->
  <g transform="translate(10, 340)" class="anim-fade" style="animation-delay: 0.6s">
    <rect x="0" y="0" width="400" height="50" rx="5" fill="rgba(91, 155, 213, 0.15)" stroke="#5b9bd5" stroke-width="1"/>
    <text x="200" y="18" text-anchor="middle" class="detail" fill="#2c3e50">Register Stack provides fast, hardware-managed function call overhead</text>
    <text x="200" y="35" text-anchor="middle" class="detail" fill="#34495e">reduction in RISC architectures through dedicated CPU registers</text>
  </g>
  
  <!-- Register Representation -->
  <g transform="translate(10, 235)" class="anim-fade" style="animation-delay: 0.7s">
    <rect x="0" y="0" width="80" height="95" rx="5" fill="#fff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="40" y="15" text-anchor="middle" class="highlight" fill="#9b59b6">Registers</text>
    <line x1="10" y1="22" x2="70" y2="22" stroke="#ecf0f1" stroke-width="1"/>
    
    <rect x="10" y="28" width="60" height="12" rx="2" fill="#9b59b6" data-narration="SP - Stack Pointer register pointing to top of stack"/>
    <text x="40" y="37" text-anchor="middle" class="detail" fill="#fff">SP</text>
    
    <rect x="10" y="43" width="60" height="12" rx="2" fill="#9b59b6" data-narration="FP - Frame Pointer register for accessing stack frames"/>
    <text x="40" y="52" text-anchor="middle" class="detail" fill="#fff">FP</text>
    
    <rect x="10" y="58" width="60" height="12" rx="2" fill="#9b59b6" data-narration="RA - Return Address register for jump back"/>
    <text x="40" y="67" text-anchor="middle" class="detail" fill="#fff">RA</text>
    
    <rect x="10" y="73" width="60" height="12" rx="2" fill="#9b59b6" data-narration="GP - Global Pointer for global data access"/>
    <text x="40" y="82" text-anchor="middle" class="detail" fill="#fff">GP</text>
  </g>

</svg>