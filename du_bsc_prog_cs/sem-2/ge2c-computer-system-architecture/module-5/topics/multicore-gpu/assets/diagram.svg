<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="multicore-gpu">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a148c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cacheGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81d4fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes coreFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    
    .section { opacity: 0; animation: fadeIn 0.6s ease-out forwards; }
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.3s; }
    .section-3 { animation-delay: 0.5s; }
    .section-4 { animation-delay: 0.7s; }
    .section-5 { animation-delay: 0.9s; }
    
    .title-anim { opacity: 0; animation: slideInUp 0.5s ease-out forwards; }
    .cpu-anim { opacity: 0; animation: slideInLeft 0.5s ease-out forwards; }
    .gpu-anim { opacity: 0; animation: slideInRight 0.5s ease-out forwards; }
    
    .core-group { animation: pulse 3s infinite ease-in-out; transform-origin: center; }
    .core-group-alt { animation: pulse 3s infinite ease-in-out; transform-origin: center; animation-delay: 0.5s; }
    .gpu-core { animation: coreFloat 2s infinite ease-in-out; }
    .gpu-core:nth-child(2) { animation-delay: 0.2s; }
    .gpu-core:nth-child(3) { animation-delay: 0.4s; }
    .gpu-core:nth-child(4) { animation-delay: 0.6s; }
    .glow { animation: pulseGlow 2s infinite; }
    
    text { font-family: Arial, Helvetica, sans-serif; }
    .title-text { font-size: 20px; font-weight: bold; fill: #1a237e; }
    .label-text { font-size: 14px; font-weight: bold; fill: #fff; }
    .detail-text { font-size: 11px; fill: #333; }
    .concept-text { font-size: 12px; fill: #424242; }
    .arrow { fill: none; stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <g class="title-anim">
    <text x="210" y="28" text-anchor="middle" class="title-text">CPU vs GPU Architecture</text>
  </g>
  
  <!-- CPU Section -->
  <g class="cpu-anim" transform="translate(20, 55)">
    <!-- CPU Chip Outline -->
    <rect x="0" y="0" width="170" height="320" rx="10" fill="#f5f5f5" stroke="#4a90d9" stroke-width="3" filter="url(#shadow)"/>
    <text x="85" y="22" text-anchor="middle" class="label-text" fill="#2c5aa0" font-size="15" font-weight="bold">CPU</text>
    
    <!-- CPU Cores - Complex but Few -->
    <g class="section section-1" data-narration="CPU features few complex cores designed for sequential processing">
      <rect x="20" y="35" width="55" height="55" rx="5" fill="url(#cpuGradient)"/>
      <text x="47" y="58" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Core 1</text>
      <text x="47" y="72" text-anchor="middle" fill="#e3f2fd" font-size="8">Complex</text>
      
      <rect x="95" y="35" width="55" height="55" rx="5" fill="url(#cpuGradient)"/>
      <text x="122" y="58" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Core 2</text>
      <text x="122" y="72" text-anchor="middle" fill="#e3f2fd" font-size="8">Complex</text>
      
      <rect x="20" y="100" width="55" height="55" rx="5" fill="url(#cpuGradient)"/>
      <text x="47" y="123" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Core 3</text>
      <text x="47" y="137" text-anchor="middle" fill="#e3f2fd" font-size="8">Complex</text>
      
      <rect x="95" y="100" width="55" height="55" rx="5" fill="url(#cpuGradient)"/>
      <text x="122" y="123" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Core 4</text>
      <text x="122" y="137" text-anchor="middle" fill="#e3f2fd" font-size="8">Complex</text>
    </g>
    
    <!-- Control Unit - Complex -->
    <g class="section section-2" data-narration="CPU has complex control units for branch prediction and out-of-order execution">
      <rect x="20" y="165" width="130" height="40" rx="5" fill="#ff7043"/>
      <text x="85" y="182" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Control Unit</text>
      <text x="85" y="197" text-anchor="middle" fill="#fff" font-size="9">Complex / Large</text>
    </g>
    
    <!-- Large L3 Cache -->
    <g class="section section-3" data-narration="CPU features large unified L3 cache for fast data access">
      <rect x="20" y="215" width="130" height="35" rx="5" fill="url(#cacheGradient)"/>
      <text x="85" y="232" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">L3 Cache (Large)</text>
      <text x="85" y="246" text-anchor="middle" fill="#e1f5fe" font-size="9">Shared / Unified</text>
    </g>
    
    <!-- Memory -->
    <g class="section section-4" data-narration="CPU uses uniform memory access with less bandwidth but lower latency">
      <rect x="20" y="260" width="130" height="35" rx="5" fill="#26a69a"/>
      <text x="85" y="277" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Memory</text>
      <text x="85" y="291" text-anchor="middle" fill="#e0f2f1" font-size="9">Uniform Access</text>
    </g>
  </g>
  
  <!-- GPU Section -->
  <g class="gpu-anim" transform="translate(230, 55)">
    <!-- GPU Chip Outline -->
    <rect x="0" y="0" width="170" height="320" rx="10" fill="#f5f5f5" stroke="#7c4dff" stroke-width="3" filter="url(#shadow)"/>
    <text x="85" y="22" text-anchor="middle" class="label-text" fill="#4a148c" font-size="15" font-weight="bold">GPU</text>
    
    <!-- GPU Cores - Simple but Many -->
    <g class="section section-1" data-narration="GPU has thousands of simple cores optimized for parallel data processing">
      <text x="85" y="38" text-anchor="middle" fill="#7c4dff" font-size="9" font-weight="bold">Thousands of Simple Cores</text>
      
      <!-- Grid of small cores -->
      <g class="core-group">
        <rect class="gpu-core" x="10" y="48" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="36" y="48" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="62" y="48" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="88" y="48" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="114" y="48" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="140" y="48" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        
        <rect class="gpu-core" x="10" y="70" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="36" y="70" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="62" y="70" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="88" y="70" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="114" y="70" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="140" y="70" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        
        <rect class="gpu-core" x="10" y="92" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="36" y="92" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="62" y="92" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="88" y="92" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="114" y="92" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="140" y="92" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        
        <rect class="gpu-core" x="10" y="114" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="36" y="114" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="62" y="114" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="88" y="114" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="114" y="114" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
        <rect class="gpu-core" x="140" y="114" width="22" height="18" rx="3" fill="url(#gpuGradient)"/>
      </g>
      
      <text x="85" y="142" text-anchor="middle" fill="#7c4dff" font-size="9">... many more</text>
    </g>
    
    <!-- Simple Control Unit -->
    <g class="section section-2" data-narration="GPU has simple control units, relying on massive parallelism">
      <rect x="20" y="152" width="130" height="35" rx="5" fill="#ff7043" opacity="0.8"/>
      <text x="85" y="169" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Control Unit</text>
      <text x="85" y="182" text-anchor="middle" fill="#fbe9e7" font-size="9">Simple / Minimal</text>
    </g>
    
    <!-- Small Distributed Caches -->
    <g class="section section-3" data-narration="GPU has small distributed caches, prioritizing memory bandwidth">
      <rect x="20" y="197" width="130" height="30" rx="5" fill="url(#cacheGradient)" opacity="0.7"/>
      <text x="85" y="212" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Small Caches</text>
      <text x="85" y="224" text-anchor="middle" fill="#e1f5fe" font-size="9">Distributed</text>
    </g>
    
    <!-- Layered Memory -->
    <g class="section section-4" data-narration="GPU uses layered memory hierarchy with high bandwidth">
      <rect x="20" y="237" width="130" height="35" rx="5" fill="#26a69a" opacity="0.8"/>
      <text x="85" y="254" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Layered Memory</text>
      <text x="85" y="268" text-anchor="middle" fill="#e0f2f1" font-size="9">High Bandwidth</text>
    </g>
  </g>
  
  <!-- Comparison Arrows -->
  <g class="section section-5" data-narration="Both architectures excel at different workload types">
    <path d="M 195 180 Q 210 180 225 180" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1s" repeatCount="indefinite"/>
    </path>
    <polygon points="225,175 230,180 225,185" fill="#666"/>
    
    <text x="210" y="172" text-anchor="middle" fill="#666" font-size="9">Comparison</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section section-5" transform="translate(10, 360)">
    <rect x="0" y="0" width="400" height="35" rx="5" fill="#fff" stroke="#ccc" stroke-width="1" opacity="0.9"/>
    <text x="15" y="15" fill="#333" font-size="10" font-weight="bold">Key:</text>
    <text x="50" y="15" class="concept-text">Sequential → CPU</text>
    <text x="145" y="15" class="concept-text">| Parallel → GPU</text>
    <text x="220" y="15" class="concept-text">| Heterogeneous = Best of Both</text>
  </g>
</svg>