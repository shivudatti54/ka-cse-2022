<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="arithmetic-microoperations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dced;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gateGradientXOR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8b3d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gateGradientAND" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d58512;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; fill: #2c3e50; font-weight: bold; }
    .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #5a7a8a; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #444; }
    .detail-label { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .gate-label { font-family: Arial, sans-serif; font-size: 14px; fill: white; font-weight: bold; }
    .value { font-family: Arial, sans-serif; font-size: 12px; fill: #333; font-weight: bold; }
    .wire { stroke: #555; stroke-width: 2.5; fill: none; }
  </style>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- Title Section -->
  <g style="animation: fadeIn 1s ease-out;">
    <text x="210" y="28" text-anchor="middle" class="title">Arithmetic Microoperations</text>
    <text x="210" y="46" text-anchor="middle" class="subtitle">Half Adder Circuit</text>
    <line x1="80" y1="55" x2="340" y2="55" stroke="#4a90d9" stroke-width="2" />
  </g>
  
  <!-- Input Section -->
  <g style="animation: slideInLeft 0.8s ease-out 0.2s both;" data-narration="Binary inputs A and B representing single bits (0 or 1)">
    <circle cx="55" cy="110" r="18" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="55" y="115" text-anchor="middle" fill="white" font-size="16" font-weight="bold">A</text>
    <text x="30" y="115" text-anchor="middle" class="detail-label">Input</text>
    
    <circle cx="55" cy="175" r="18" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="55" y="180" text-anchor="middle" fill="white" font-size="16" font-weight="bold">B</text>
    <text x="30" y="180" text-anchor="middle" class="detail-label">Input</text>
  </g>
  
  <!-- Circuit Wires - Inputs to Gates -->
  <g style="animation: fadeIn 1s ease-out 0.4s both;" data-narration="Wires carrying input signals to the logic gates">
    <line x1="73" y1="110" x2="115" y2="110" class="wire"/>
    <line x1="73" y1="110" x2="115" y2="125" class="wire"/>
    <line x1="73" y1="175" x2="115" y2="175" class="wire"/>
    <line x1="73" y1="175" x2="115" y2="160" class="wire"/>
  </g>
  
  <!-- XOR Gate (Sum) -->
  <g style="animation: slideInUp 0.8s ease-out 0.5s both;" data-narration="XOR gate produces the Sum output (A XOR B)">
    <path d="M120,85 Q145,85 170,100 L170,135 Q145,150 120,150 L120,85 Z" fill="url(#gateGradientXOR)" stroke="#2d6b2d" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="122" text-anchor="middle" class="gate-label">XOR</text>
    <text x="145" y="168" text-anchor="middle" class="value" fill="#2d6b2d">Sum</text>
  </g>
  
  <!-- AND Gate (Carry) -->
  <g style="animation: slideInUp 0.8s ease-out 0.6s both;" data-narration="AND gate produces the Carry output (A AND B)">
    <rect x="120" y="165" width="50" height="40" rx="3" fill="url(#gateGradientAND)" stroke="#b8720d" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="190" text-anchor="middle" class="gate-label">AND</text>
    <text x="145" y="218" text-anchor="middle" class="value" fill="#b8720d">Carry</text>
  </g>
  
  <!-- Output Wires -->
  <g style="animation: slideInRight 0.8s ease-out 0.7s both;" data-narration="Output lines showing Sum and Carry results">
    <line x1="170" y1="110" x2="195" y2="110" class="wire"/>
    <line x1="195" y1="110" x2="320" y2="110" class="wire"/>
    <line x1="170" y1="185" x2="195" y2="185" class="wire"/>
    <line x1="195" y1="185" x2="320" y2="185" class="wire"/>
  </g>
  
  <!-- Output Indicators -->
  <g style="animation: fadeIn 1s ease-out 0.8s both;" data-narration="Final output values: Sum and Carry">
    <rect x="320" y="90" width="80" height="40" rx="5" fill="white" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="360" y="105" text-anchor="middle" class="label">Sum</text>
    <text x="360" y="122" text-anchor="middle" class="value" fill="#2d6b2d">S = A ⊕ B</text>
    
    <rect x="320" y="165" width="80" height="40" rx="5" fill="white" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="360" y="180" text-anchor="middle" class="label">Carry</text>
    <text x="360" y="197" text-anchor="middle" class="value" fill="#b8720d">C = A · B</text>
  </g>
  
  <!-- Truth Table -->
  <g style="animation: slideInUp 0.8s ease-out 0.9s both;" data-narration="Truth table showing all possible input combinations and outputs">
    <rect x="30" y="240" width="180" height="130" rx="5" fill="white" stroke="#ddd" stroke-width="2" filter="url(#shadow)"/>
    <text x="120" y="260" text-anchor="middle" class="section-title">Truth Table</text>
    <line x1="40" y1="268" x2="200" y2="268" stroke="#eee" stroke-width="1"/>
    
    <text x="50" y="290" class="detail-label" font-weight="bold">A</text>
    <text x="75" y="290" class="detail-label" font-weight="bold">B</text>
    <text x="105" y="290" class="detail-label" font-weight="bold">Sum</text>
    <text x="145" y="290" class="detail-label" font-weight="bold">Carry</text>
    
    <text x="50" y="310" class="detail-label">0</text>
    <text x="75" y="310" class="detail-label">0</text>
    <text x="105" y="310" class="detail-label">0</text>
    <text x="145" y="310" class="detail-label">0</text>
    
    <text x="50" y="332" class="detail-label">0</text>
    <text x="75" y="332" class="detail-label">1</text>
    <text x="105" y="332" class="detail-label">1</text>
    <text x="145" y="332" class="detail-label">0</text>
    
    <text x="50" y="354" class="detail-label">1</text>
    <text x="75" y="354" class="detail-label">0</text>
    <text x="105" y="354" class="detail-label">1</text>
    <text x="145" y="354" class="detail-label">0</text>
    
    <text x="50" y="376" class="detail-label">1</text>
    <text x="75" y="376" class="detail-label">1</text>
    <text x="105" y="376" class="detail-label">0</text>
    <text x="145" y="376" class="detail-label">1</text>
  </g>
  
  <!-- Key Concept Box -->
  <g style="animation: slideInRight 0.8s ease-out 1s both;" data-narration="Key concept explaining the Half Adder's role in digital computers">
    <rect x="230" y="240" width="175" height="130" rx="5" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
    <text x="317" y="258" text-anchor="middle" class="section-title" fill="#c27b0a">Key Concept</text>
    <line x1="240" y1="265" x2="395" y2="265" stroke="#f39c12" stroke-width="1"/>
    
    <text x="245" y="285" class="detail-label">The Half Adder is the</text>
    <text x="245" y="300"