<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="registers-memory-ram-rom">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="regGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa94d"/>
      <stop offset="100%" style="stop-color:#ff922b"/>
    </linearGradient>
    <linearGradient id="ramGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c"/>
      <stop offset="100%" style="stop-color:#40c057"/>
    </linearGradient>
    <linearGradient id="romGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#748ffc"/>
      <stop offset="100%" style="stop-color:#5c7cfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .cpu-box { animation: slideIn 0.6s ease-out; animation-delay: 0.2s; animation-fill-mode: both; }
    .reg-box { animation: slideUp 0.6s ease-out; animation-delay: 0.4s; animation-fill-mode: both; }
    .ram-box { animation: slideUp 0.6s ease-out; animation-delay: 0.6s; animation-fill-mode: both; }
    .rom-box { animation: slideUp 0.6s ease-out; animation-delay: 0.8s; animation-fill-mode: both; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .concept-box { animation: fadeIn 1s ease-out; animation-delay: 1s; animation-fill-mode: both; }
    text { font-family: Arial, sans-serif; }
    .label { font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-size="18" font-weight="bold" fill="#2c3e50">Registers, RAM &amp; ROM</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- CPU Section -->
  <g class="cpu-box">
    <rect x="20" y="50" width="60" height="55" rx="5" fill="url(#cpuGrad)" filter="url(#shadow)"/>
    <text x="50" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CPU</text>
    <text x="50" y="86" text-anchor="middle" font-size="9" fill="white">Core</text>
  </g>
  
  <!-- Registers Box -->
  <g class="reg-box" data-narration="Registers are the fastest memory units inside the CPU, holding data during arithmetic and logical operations.">
    <rect x="95" y="55" width="130" height="45" rx="6" fill="url(#regGrad)" filter="url(#shadow)"/>
    <text x="160" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="white">REGISTERS</text>
    <text x="160" y="87" text-anchor="middle" font-size="10" fill="#fff5e6">32/64-bit • Fastest • Few Bytes</text>
  </g>
  
  <!-- Arrow from CPU to Registers -->
  <path d="M80 77 L95 77" stroke="#e74c3c" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- RAM Box -->
  <g class="ram-box" data-narration="RAM (Random Access Memory) provides volatile, fast read-write storage for programs and data currently in use.">
    <rect x="95" y="115" width="130" height="50" rx="6" fill="url(#ramGrad)" filter="url(#shadow)"/>
    <text x="160" y="137" text-anchor="middle" font-size="13" font-weight="bold" fill="white">RAM</text>
    <text x="160" y="152" text-anchor="middle" font-size="10" fill="#e8f5e9">Random Access • Volatile • GB</text>
  </g>
  
  <!-- ROM Box -->
  <g class="rom-box" data-narration="ROM (Read-Only Memory) contains permanent instructions for booting the computer and hardware initialization.">
    <rect x="95" y="180" width="130" height="50" rx="6" fill="url(#romGrad)" filter="url(#shadow)"/>
    <text x="160" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="white">ROM</text>
    <text x="160" y="217" text-anchor="middle" font-size="10" fill="#e8eaf6">Permanent • Non-Volatile • MB</text>
  </g>
  
  <!-- Arrow showing data flow -->
  <path d="M160 105 L160 115" stroke="#27ae60" stroke-width="2" class="arrow"/>
  <path d="M160 165 L160 180" stroke="#3d5afe" stroke-width="2" class="arrow"/>
  
  <!-- Memory Hierarchy Pyramid -->
  <g class="concept-box" data-narration="Memory Hierarchy: Shows the trade-off between speed and size from registers to secondary storage.">
    <text x="280" y="65" font-size="11" font-weight="bold" fill="#2c3e50">Memory Hierarchy</text>
    <polygon points="280,75 360,75 340,105 300,105" fill="#ff6b6b" opacity="0.8"/>
    <text x="320" y="94" text-anchor="middle" font-size="8" fill="white">Registers</text>
    <polygon points="285,108 355,108 345,130 295,130" fill="#ffa94d" opacity="0.8"/>
    <text x="320" y="123" text-anchor="middle" font-size="8" fill="white">Cache L1/L2</text>
    <polygon points="290,133 350,133 340,155 300,155" fill="#69db7c" opacity="0.8"/>
    <text x="320" y="148" text-anchor="middle" font-size="8" fill="white">RAM</text>
    <polygon points="295,158 345,158 335,175 305,175" fill="#748ffc" opacity="0.8"/>
    <text x="320" y="170" text-anchor="middle" font-size="7" fill="white">ROM</text>
  </g>
  
  <!-- Speed Comparison -->
  <g class="concept-box">
    <text x="280" y="200" font-size="10" font-weight="bold" fill="#2c3e50">Access Time</text>
    <rect x="260" y="208" width="120" height="18" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <rect x="262" y="210" width="30" height="14" rx="2" fill="#ff6b6b"/>
    <text x="277" y="221" text-anchor="middle" font-size="7" fill="white">ns</text>
    <text x="310" y="221" font-size="8" fill="#555">Registers</text>
    
    <rect x="260" y="230" width="120" height="18" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <rect x="262" y="232" width="50" height="14" rx="2" fill="#69db7c"/>
    <text x="287" y="243" text-anchor="middle" font-size="7" fill="white">ns</text>
    <text x="320" y="243" font-size="8" fill="#555">RAM</text>
    
    <rect x="260" y="252" width="120" height="18" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <rect x="262" y="254" width="90" height="14" rx="2" fill="#748ffc"/>
    <text x="307" y="265" text-anchor="middle" font-size="7" fill="white">ms</text>
    <text x="320" y="265" font-size="8" fill="#555">ROM</text>
  </g>
  
  <!-- Key Differences Box -->
  <g class="concept-box" data-narration="Key differences: Registers are internal CPU storage, RAM is volatile working memory, ROM is non-volatile boot storage.">
    <rect x="20" y="250" width="180" height="130" rx="8" fill="white" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Key Differences</text>
    
    <circle cx="35" cy="290" r="4" fill="#ff6b6b"/>
    <text x="45" y="293" font-size="9" fill="#333">Registers: Inside CPU</text>
    
    <circle cx="35" cy="310" r="4" fill="#69db7c"/>
    <text x="45" y="313" font-size="9" fill="#333">RAM: Volatile (lost on power off)</text>
    
    <circle cx="35" cy="330" r="4" fill="#748ffc"/>
    <text x="45" y="333" font-size="9" fill="#333">ROM: Non-volatile (permanent)</text>
    
    <circle cx="35" cy="350" r="4" fill="#ffa94d"/>
    <text x="45" y="353" font-size="9" fill="#333">Speed: Regs &gt; RAM &gt; ROM</text>
    
    <circle cx="35" cy="370" r="4" fill="#f06595"/>
    <text x="45" y="373" font-size="9" fill="#333">Size: ROM &gt; RAM &gt; Regs</text>
  </g>
  
  <!-- Bottom indicator arrow -->
  <g class="arrow">
    <text x="320" y="295" font-size="8" fill="#888" font-style="italic">← Faster</text>
    <text x="320" y="350" font-size="8" fill="#888" font-style="italic">← Larger</text>
  </g>
</svg>