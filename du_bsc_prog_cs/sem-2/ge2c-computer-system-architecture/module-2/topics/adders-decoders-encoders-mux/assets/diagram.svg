<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="adders-decoders-encoders-mux">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6f4"/>
      <stop offset="100%" style="stop-color:#e6f4f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes drawLine { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
    
    .title { animation: fadeIn 0.8s ease-out; font-family: 'Arial', sans-serif; }
    .section { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .section:nth-child(1) { animation-delay: 0.1s; }
    .section:nth-child(2) { animation-delay: 0.2s; }
    .section:nth-child(3) { animation-delay: 0.3s; }
    .section:nth-child(4) { animation-delay: 0.4s; }
    .section:nth-child(5) { animation-delay: 0.5s; }
    
    .box { fill: white; stroke: #4a6fa5; stroke-width: 1.5; filter: url(#shadow); }
    .gate { fill: #fff8e1; stroke: #f57f17; stroke-width: 1.5; }
    .input-label { font-size: 12px; fill: #333; font-family: 'Arial', sans-serif; }
    .output-label { font-size: 12px; fill: #333; font-family: 'Arial', sans-serif; font-weight: bold; }
    .section-title { font-size: 13px; fill: #2c3e50; font-family: 'Arial', sans-serif; font-weight: bold; }
    .detail-text { font-size: 11px; fill: #555; font-family: 'Arial', sans-serif; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .connection-dot { fill: #333; }
    
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" style="font-size: 20px; font-weight: bold; fill: #2c3e50; font-family: Arial, sans-serif;">
    Adders, Decoders, Encoders &amp; Mux
  </text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Section 1: Half Adder -->
  <g class="section" data-narration="Half Adder adds 2 bits using XOR for Sum and AND for Carry" transform="translate(10, 50)">
    <rect class="box" x="0" y="0" width="125" height="90" rx="5"/>
    <text x="62" y="18" text-anchor="middle" class="section-title">HALF ADDER</text>
    
    <!-- XOR Gate -->
    <path class="gate" d="M15,30 L25,30 Q35,30 35,35 L35,45 Q35,50 25,50 L15,50 Q10,50 10,40 L10,40 Q10,30 15,30 Z"/>
    <text x="22" y="42" style="font-size:9px;fill:#f57f17;font-family:Arial;font-weight:bold;">≥1</text>
    <text x="12" y="25" class="input-label">A</text>
    <text x="12" y="58" class="input-label">B</text>
    <line class="wire" x1="18" y1="32" x2="18" y2="40"/>
    <line class="wire" x1="18" y1="48" x2="18" y2="40"/>
    
    <!-- AND Gate -->
    <rect class="gate" x="45" y="30" width="20" height="20" rx="2"/>
    <text x="53" y="42" style="font-size:9px;fill:#f57f17;font-family:Arial;font-weight:bold;">&amp;</text>
    <line class="wire" x1="35" y1="40" x2="45" y2="40"/>
    
    <!-- Outputs -->
    <line class="wire" x1="65" y1="40" x2="80" y2="40"/>
    <line class="wire" x1="55" y1="50" x2="55" y2="60"/>
    <line class="wire" x1="55" y1="60" x2="80" y2="60"/>
    <circle class="connection-dot" cx="80" cy="40" r="2"/>
    <circle class="connection-dot" cx="80" cy="60" r="2"/>
    <text x="85" y="44" class="output-label">S (Sum)</text>
    <text x="85" y="64" class="output-label">C (Carry)</text>
    <text x="62" y="82" class="detail-text" text-anchor="middle">S=A⊕B, C=A·B</text>
  </g>
  
  <!-- Section 2: Full Adder -->
  <g class="section" data-narration="Full Adder adds 3 bits including carry-in, built from two half adders" transform="translate(145, 50)">
    <rect class="box" x="0" y="0" width="130" height="90" rx="5"/>
    <text x="65" y="18" text-anchor="middle" class="section-title">FULL ADDER</text>
    
    <!-- First XOR -->
    <path class="gate" d="M10,25 L18,25 Q25,25 25,30 L25,38 Q25,43 18,43 L10,43 Q7,43 7,34 Q7,25 10,25 Z" style="fill:#fff8e1;stroke:#f57f17;stroke-width:1.5;"/>
    <text x="14" y="36" style="font-size:8px;fill:#f57f17;font-family:Arial;font-weight:bold;">≥1</text>
    
    <!-- Second XOR -->
    <path class="gate" d="M45,25 L53,25 Q60,25 60,30 L60,38 Q60,43 53,43 L45,43 Q42,43 42,34 Q42,25 45,25 Z" style="fill:#fff8e1;stroke:#f57f17;stroke-width:1.5;"/>
    <text x="50" y="36" style="font-size:8px;fill:#f57f17;font-family:Arial;font-weight:bold;">≥1</text>
    
    <!-- AND gates -->
    <rect class="gate" x="70" y="22" width="15" height="15" rx="2"/>
    <rect class="gate" x="70" y="40" width="15" height="15" rx="2"/>
    <text x="76" y="32" style="font-size:8px;fill:#f57f17;font-family:Arial;font-weight:bold;">&amp;</text>
    <text x="76" y="50" style="font-size:8px;fill:#f57f17;font-family:Arial;font-weight:bold;">&amp;</text>
    
    <!-- OR Gate -->
    <path class="gate" d="M100,25 L108,25 Q115,25 115,30 L115,38 Q115,43 108,43 L100,43 Q97,43 97,34 Q97,25 100,25 Z" style="fill:#fff8e1;stroke:#f57f17;stroke-width:1.5;"/>
    <text x="104" y="36" style="font-size:8px;fill:#f57f17;font-family:Arial;font-weight:bold;">≥1</text>
    
    <!-- Wires -->
    <line class="wire" x1="5" y1="28" x2="10" y2="28"/>
    <line class="wire" x1="5" y1="40" x2="10" y2="40"/>
    <line class="wire" x1="25" y1="34" x2="45" y2="34"/>
    <line class="wire" x1="35" y1="28" x2="45" y2="28"/>
    <line class="wire" x1="60" y1="34" x2="70" y2="34"/>
    <line class="wire" x1="60" y1="47" x2="70" y2="47"/>
    <line class="wire" x1="85" y1="30" x2="100" y2="30"/>
    <line class="wire" x1="85" y1="47" x2="100" y2="47"/>
    
    <!-- Labels -->
    <text x="0" y="23" class="input-label">A</text>
    <text x="0" y="44" class="input-label">B</text>
    <text x="28" y="20" class="input-label">Cin</text>
    <text x="118" y="28" class="output-label">S</text>
    <text x="118" y="48" class="output-label">Cout</text>
    <text x="65" y="82" class="detail-text" text-anchor="middle">S=A⊕B⊕Cin</text>
  </g>
  
  <!-- Section 3: Decoder -->
  <g class="section" data-narration="Decoder converts binary input to one-hot output, enabling address selection" transform="translate(10, 155)">
    <rect class="box" x="0" y="0" width="95" height="100" rx="5"/>
    <text x="47" y="18" text-anchor="middle" class="section-title">2:4 DECODER</text>
    
    <!-- NAND/AND gates -->
    <rect class="gate" x="25" y="25" width="18" height="14" rx="2"/>
    <rect class="gate" x="25" y="43" width="18" height="14" rx="2"/>
    <rect class="gate" x="25" y="61" width="18" height="14" rx="2"/>
    <rect class="gate" x="25" y="79" width="18" height="14" rx="2"/>
    
    <!-- Not gates for inputs -->
    <path class="gate" d="M8,30 L14,30 Q18,30 18,34 L18,38 Q18,42 14,42 L8,42 Q6,36 8,30 Z" style="fill:#fff8e1;stroke:#f57f17;stroke-width:1.5;"/>
    <path class="gate" d="M8,50 L14,50 Q18,50 18,54 L18,58 Q18,62 14,62 L8,62 Q6,56 8,50 Z" style="fill:#fff8e1;stroke:#f57f17;stroke-width:1.5;"/>
    
    <!-- Input lines -->
    <line class="wire" x1="0" y1="36" x2="18" y2="36"/>
    <line class="wire" x1="0" y1="56" x2="18" y2="56"/>
    <circle cx="13" cy="36" r="1.5" fill="#333"/>
    <circle cx="13" cy="56" r="1.5" fill="#333"/>
    
    <!-- Output lines -->
    <line class="wire" x1="43" y1="32" x2="60" y2="32"/>
    <line class="wire" x1="43" y1="50" x2="60" y2="50"/>
    <line class="wire" x1="43" y1="68" x2="60" y2="68"/>
    <line class="wire" x1="43" y1="86" x2="60" y2="86"/>
    
    <!-- Labels -->
    <text x="0" y="24" class="input-label">A</text>
    <text x="0" y="44" class="input-label">B</text>
    <text x="63" y="24" class="output-label" style="font-size:10px;">D0</text>
    <text x="63" y="42" class="output-label" style="font-size:10px;">D1</text>
    <text x="63" y="60" class="output-label" style="font-size:10px;">D2</text>
    <text x="63" y="78" class="output-label" style="font-size:10px;">D3</text>
    <text x="47" y="98" class="detail-text" text-anchor="middle">n→2ⁿ outputs</text>
  </g>
  
  <!-- Section 4: Encoder -->
  <g class="section" data-narration="Encoder performs reverse of decoder, converting one-hot input to binary output" transform="translate(115, 155)">
    <rect class="box" x="0" y="0" width="95" height="100" rx="5"/>
    <text x="47" y="18" text-anchor="middle" class="section-title">4:2 ENCODER</text>
    
    <!-- OR gates -->
    <path class="gate" d="M60,28 L68,28 Q78,28 78,36 L78,44 Q78,52 68,52 L60,52 Q55,40 60,28 Z" style="fill:#fff8e1;stroke:#f57f17;stroke-width:1.5;"/>
    <path class="gate" d="M60,58 L68,58 Q78,58 78,66 L78,74 Q78,82 68,82 L60,82 Q55,70 60,58 Z" style="fill:#fff8e1;stroke:#f57f17;stroke-width:1.5;"/>
    
    <!-- Input lines -->
    <line class="wire" x1="0" y1="30" x2="60" y2="30"/>
    <line class="wire" x1="0" y1="40" x2="60" y2="40"/>
    <line class="wire" x1="0" y1="60" x2="60" y2="60"/>
    <line class="wire" x1="0" y1="70" x2="60" y2="70"/>
    
    <!-- Output lines -->
    <line class="wire" x1="78" y1="40" x2="90" y2="40"/>
    <line class="wire" x1="78" y1="70" x2="90" y2="70"/>
    
    <!-- Labels -->
    <text x="0" y="24" class="input-label" style="font-size:10px;">D0</text>
    <text x="0" y="34" class="input-label" style="font-size:10px;">D1</text>
    <text x="0" y="54" class="input-label" style="font-size:10px;">D2</text>
    <text x="0" y="74" class="input-label" style="font-size:10px;">D3</text>
    <text x="93" y="44" class="output-label">A</text>
    <text x="93" y="74" class="output-label">B</text>
    <text x="47" y="98" class="detail-text" text-anchor="middle">Priority: D3→D0</text>
  </g>
  
  <!-- Section 5: Multiplexer -->
  <g class="section" data-narration="Mux selects one input from multiple sources based on select lines" transform="translate(220, 155)">
    <rect class="box" x="0" y="0" width="110" height="100" rx="5"/>
    <text x="55" y="18" text-anchor="middle" class="section-title">4:1 MULTIPLEXER</text>
    
    <!-- MUX symbol -->
    <path d="M20,30 L55,30 L70,55 L55,80 L20,80 Z" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
    <text x="35" y="58" text-anchor="middle" style="font-size:11px;fill:#43a047;font-family:Arial;font-weight:bold;">MUX</text>
    
    <!-- Input lines -->
    <line class="wire" x1="0" y1="35" x2="20" y2="35"/>
    <line class="wire" x1="0" y1="50" x2="20" y2="50"/>
    <line class="wire" x1="0" y1="65" x2="20" y2="65"/>
    <line class="wire" x1="0" y1="80" x2="20" y2="80"/>
    
    <!-- Select lines -->
    <line class="wire" x1="50" y1="20" x2="50" y2="30"/>
    <line class="wire" x1="60" y1="20" x2="60" y2="30"/>
    
    <!-- Output line -->
    <line class="wire" x1="70" y1="55" x2="90" y2="55"/>
    
    <!-- Labels -->
    <text x="0" y="28" class="input-label" style="font-size:10px;">I0</text>
    <text x="0" y="44" class="input-label" style="font-size:10px;">I1</text>
    <text x="0" y="59" class="input-label" style="font-size:10px;">I2</text>
    <text x="0" y="74" class="input-label" style="font-size:10px;">I3</text>
    <text x="42" y="16" class="input-label" style="font-size:10px;">S0</text>
    <text x="62" y="16" class="input-label" style="font-size:10px;">S1</text>
    <text x="93" y="59" class="output-label">Y</text>
    <text x="55" y="98" class="detail-text" text-anchor="middle">Y=S1'?S0'?I0:I1</text>
  </g>
  
  <!-- Section 6: Key Formulas -->
  <g class="section" data-narration="Key Boolean expressions and relationships between circuits" transform="translate(285, 50)">
    <rect class="box" x="0" y="0" width="120" height="95" rx="5" style="fill:#fffde7;stroke:#f9a825;"/>
    <text x="60" y="18" text-anchor="middle" class="section-title" style="fill:#f57f17;">KEY FORMULAS</text>
    
    <text x="10" y="38" class="detail-text" style="font-size:10px;">
      <tspan x="10" dy="0">Half Adder:</tspan>
      <tspan x="10" dy="14" font-weight="bold">S = A ⊕ B</tspan>
      <tspan x="10" dy="12" font-weight="bold">C = A · B</tspan>
      <tspan x="10" dy="16">Full Adder:</tspan>
      <tspan x="10" dy="12" font-weight="bold">S = A ⊕ B ⊕ Cin</tspan>
      <tspan x="10" dy="12" font-weight="bold">Cout = AB + BCin + ACin</tspan>
    </text>
  </g>
  
  <!-- Relationship Arrows -->
  <g class="pulse-element" style="transform-origin: 340px 175px;">
    <path d="M200,145 Q250,140 280,155" fill="none" stroke="#78909c" stroke-width="1" stroke-dasharray="3"/>
    <polygon points="280,155 275,150 275,160" fill="#78909c"/>
  </g>
  
  <g class="pulse-element" style="transform-origin: 335px 280px; animation-delay: 0.5s;">
    <path d="M115,200 Q180,220 215,200" fill="none" stroke="#78909c" stroke-width="1" stroke-dasharray="3"/>
    <polygon points="215,200 210,195 210,205" fill="#78909c"/>
  </g>
  
  <!-- Footer -->
  <text x="210" y="385" text-anchor="middle" style="font-size:10px;fill:#666;font-family:Arial;">
    Combinational Logic Circuits | Digital Electronics
  </text>
</svg>