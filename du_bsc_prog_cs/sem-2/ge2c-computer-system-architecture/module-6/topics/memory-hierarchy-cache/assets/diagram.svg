<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="memory-hierarchy-cache">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="regGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="l1Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="l2Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe"/>
      <stop offset="100%" style="stop-color:#66a6ff"/>
    </linearGradient>
    <linearGradient id="l3Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c3cfe2"/>
      <stop offset="100%" style="stop-color:#a8c0ff"/>
    </linearGradient>
    <linearGradient id="ramGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="storageGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc"/>
      <stop offset="100%" style="stop-color:#8ec5fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .level-1 { animation: slideUp 0.5s ease-out 0.2s forwards; opacity: 0; }
    .level-2 { animation: slideUp 0.5s ease-out 0.35s forwards; opacity: 0; }
    .level-3 { animation: slideUp 0.5s ease-out 0.5s forwards; opacity: 0; }
    .level-4 { animation: slideUp 0.5s ease-out 0.65s forwards; opacity: 0; }
    .level-5 { animation: slideUp 0.5s ease-out 0.8s forwards; opacity: 0; }
    .level-6 { animation: slideUp 0.5s ease-out 0.95s forwards; opacity: 0; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .box { animation: fadeIn 0.6s ease-out 1.2s forwards; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Memory Hierarchy Cache</text>
  
  <!-- Registers -->
  <g class="level-1" filter="url(#shadow)">
    <polygon points="210,55 250,80 170,80" fill="url(#regGradient)" stroke="#e57373" stroke-width="2"/>
    <text x="210" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828">Registers</text>
    <text x="210" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d4037">&lt;1ns</text>
    <text x="210" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#5d4037">few bytes</text>
    <rect x="185" y="108" width="50" height="18" rx="3" fill="#ffcdd2" stroke="#e57373" stroke-width="1" data-narration="Registers: Fastest memory inside CPU, 0-1 cycle access time, stores immediate values for processing"/>
  </g>
  
  <!-- Arrow -->
  <g class="arrow">
    <path d="M210,115 L210,128" stroke="#78909c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#78909c"/>
    </marker>
  </defs>
  
  <!-- L1 Cache -->
  <g class="level-2" filter="url(#shadow)">
    <polygon points="210,130 270,165 150,165" fill="url(#l1Gradient)" stroke="#4db6ac" stroke-width="2"/>
    <text x="210" y="152" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#00695c">L1 Cache</text>
    <text x="210" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d4037">1-2ns</text>
    <text x="210" y="182" text-anchor="middle" font-family="Arial" font-size="9" fill="#5d4037">16-64KB</text>
    <rect x="155" y="188" width="110" height="18" rx="3" fill="#b2dfdb" stroke="#4db6ac" stroke-width="1" data-narration="L1 Cache: On-chip, fastest cache level, typically 16-64KB, 1-2 cycle access"/>
  </g>
  
  <!-- L2 Cache -->
  <g class="level-3" filter="url(#shadow)">
    <polygon points="210,208 295,255 125,255" fill="url(#l2Gradient)" stroke="#42a5f5" stroke-width="2"/>
    <text x="210" y="235" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">L2 Cache</text>
    <text x="210" y="255" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d4037">3-10ns</text>
    <text x="210" y="267" text-anchor="middle" font-family="Arial" font-size="9" fill="#5d4037">256KB-1MB</text>
    <rect x="145" y="275" width="130" height="18" rx="3" fill="#bbdefb" stroke="#42a5f5" stroke-width="1" data-narration="L2 Cache: Larger but slower than L1, typically 256KB-1MB, 10-20 cycles access"/>
  </g>
  
  <!-- L3 Cache -->
  <g class="level-4" filter="url(#shadow)">
    <polygon points="210,295 320,345 100,345" fill="url(#l3Gradient)" stroke="#7986cb" stroke-width="2"/>
    <text x="210" y="322" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#303f9f">L3 Cache</text>
    <text x="210" y="342" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d4037">10-20ns</text>
    <text x="210" y="354" text-anchor="middle" font-family="Arial" font-size="9" fill="#5d4037">4-32MB</text>
    <rect x="125" y="362" width="170" height="18" rx="3" fill="#c5cae9" stroke="#7986cb" stroke-width="1" data-narration="L3 Cache: Shared across cores, largest cache level, typically 4-32MB, 20-50 cycles"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="box">
    <rect x="320" y="50" width="90" height="130" rx="8" fill="#fff9c4" stroke="#ffd54f" stroke-width="2" filter="url(#shadow)"/>
    <text x="365" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#f57f17">Key Concepts</text>
    <line x1="328" y1="75" x2="402" y2="75" stroke="#ffd54f" stroke-width="1"/>
    <text x="330" y="92" font-family="Arial" font-size="9" fill="#5d4037">• Temporal</text>
    <text x="330" y="102" font-family="Arial" font-size="8" fill="#5d4037">  Locality</text>
    <text x="330" y="115" font-family="Arial" font-size="9" fill="#5d4037">• Spatial</text>
    <text x="330" y="125" font-family="Arial" font-size="8" fill="#5d4037">  Locality</text>
    <text x="330" y="138" font-family="Arial" font-size="9" fill="#5d4037">• Memory</text>
    <text x="330" y="148" font-family="Arial" font-size="8" fill="#5d4037">  Wall</text>
    <text x="330" y="161" font-family="Arial" font-size="9" fill="#5d4037">• Cache</text>
    <text x="330" y="171" font-family="Arial" font-size="8" fill="#5d4037">  Hits/Misses</text>
  </g>
  
  <!-- Speed arrow indicator -->
  <g class="box">
    <rect x="15" y="280" width="70" height="100" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
    <text x="50" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">SPEED</text>
    <line x1="50" y1="300" x2="50" y2="370" stroke="#81c784" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="45,365 50,375 55,365" fill="#81c784"/>
    <text x="50" y="320" text-anchor="middle" font-family="Arial" font-size="8" fill="#5d4037">Fast</text>
    <text x="50" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#5d4037">Slow</text>
  </g>
  
  <!-- Arrows showing hierarchy flow -->
  <g class="arrow">
    <path d="M130,330 Q80,330 80,380 Q80,395 95,395" stroke="#90a4ae" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
    <polygon points="90,390 95,398 102,393" fill="#90a4ae"/>
  </g>
  <g class="arrow">
    <path d="M290,340 Q340,340 340,380 Q340,395 325,395" stroke="#90a4ae" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
    <polygon points="330,390 325,398 318,393" fill="#90a4ae"/>
  </g>
  
  <!-- Main Memory label -->
  <g class="level-5" filter="url(#shadow)">
    <polygon points="60,395 150,395 150,385 60,385" fill="url(#ramGradient)" stroke="#ba68c8" stroke-width="1.5" rx="3"/>
    <text x="105" y="393" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">RAM</text>
  </g>
  
  <!-- Secondary Storage label -->
  <g class="level-6" filter="url(#shadow)">
    <polygon points="270,395 360,395 360,385 270,385" fill="url(#storageGradient)" stroke="#9575cd" stroke-width="1.5" rx="3"/>
    <text x="315" y="393" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#4527a0">Storage</text>
  </g>
</svg>