<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="instruction-codes-format-cycle" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="fetchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="decodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e0b8"/>
      <stop offset="100%" style="stop-color:#b8c995"/>
    </linearGradient>
    <linearGradient id="executeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0d4b8"/>
      <stop offset="100%" style="stop-color:#c9b895"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8d4"/>
      <stop offset="100%" style="stop-color:#b895c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: Arial, sans-serif; font-weight: bold; fill: #2c3e50; }
    .box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; filter: url(#shadow); }
    .box-1 { animation-delay: 0.2s; }
    .box-2 { animation-delay: 0.4s; }
    .box-3 { animation-delay: 0.6s; }
    .box-4 { animation-delay: 0.8s; }
    .arrow { animation: slideIn 0.5s ease-out forwards, flowPulse 2s infinite; stroke: #5d6d7e; stroke-width: 2; fill: none; }
    .arrow-1 { animation-delay: 0.5s; opacity: 0; }
    .arrow-2 { animation-delay: 0.7s; opacity: 0; }
    .arrow-3 { animation-delay: 0.9s; opacity: 0; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
    .highlight { animation: pulse 2s infinite; transform-origin: center; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="28" text-anchor="middle" font-size="20" class="title">Instruction Cycle</text>
  <text x="210" y="45" text-anchor="middle" font-size="11" class="subtitle">CPU Execution Flow</text>
  
  <g class="box box-1" data-narration="Fetch Phase: The CPU retrieves the instruction from memory using the Program Counter (PC) as address, stores it in the Memory Buffer Register (MBR), then transfers it to the Instruction Register (IR), and increments PC">
    <rect x="20" y="60" width="90" height="130" rx="8" fill="url(#fetchGrad)" stroke="#7faa8f" stroke-width="2"/>
    <text x="65" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c5a3f">FETCH</text>
    <line x1="30" y1="90" x2="80" y2="90" stroke="#7faa8f" stroke-width="1"/>
    <text x="65" y="105" text-anchor="middle" class="detail">PC → MAR</text>
    <text x="65" y="118" text-anchor="middle" class="detail">Memory</text>
    <text x="65" y="131" text-anchor="middle" class="detail">→ MBR</text>
    <text x="65" y="144" text-anchor="middle" class="detail">→ IR</text>
    <text x="65" y="157" text-anchor="middle" class="detail">PC + 1</text>
  </g>
  
  <g class="box box-2" data-narration="Decode Phase: The instruction in IR is analyzed by the Control Unit to determine the operation type and generate appropriate control signals">
    <rect x="140" y="60" width="90" height="130" rx="8" fill="url(#decodeGrad)" stroke="#a3aF7f" stroke-width="2"/>
    <text x="185" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a5a2f">DECODE</text>
    <line x1="150" y1="90" x2="200" y2="90" stroke="#a3aF7f" stroke-width="1"/>
    <text x="185" y="105" text-anchor="middle" class="detail">IR → CU</text>
    <text x="185" y="118" text-anchor="middle" class="detail">Analyze</text>
    <text x="185" y="131" text-anchor="middle" class="detail">Opcode</text>
    <text x="185" y="144" text-anchor="middle" class="detail">Generate</text>
    <text x="185" y="157" text-anchor="middle" class="detail">Signals</text>
  </g>
  
  <g class="box box-3" data-narration="Execute Phase: The ALU performs the operation using registers or memory operands based on the decoded instruction">
    <rect x="260" y="60" width="90" height="130" rx="8" fill="url(#executeGrad)" stroke="#b8a67f" stroke-width="2"/>
    <text x="305" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a4a2f">EXECUTE</text>
    <line x1="270" y1="90" x2="320" y2="90" stroke="#b8a67f" stroke-width="1"/>
    <text x="305" y="105" text-anchor="middle" class="detail">ALU</text>
    <text x="305" y="118" text-anchor="middle" class="detail">Registers</text>
    <text x="305" y="131" text-anchor="middle" class="detail">Memory</text>
    <text x="305" y="144" text-anchor="middle" class="detail">Operands</text>
    <text x="305" y="157" text-anchor="middle" class="detail">Process</text>
  </g>
  
  <g class="box box-4" data-narration="Store Phase: The result of execution is stored back to memory or a register, completing the instruction cycle">
    <rect x="140" y="220" width="90" height="130" rx="8" fill="url(#storeGrad)" stroke="#a87fb8" stroke-width="2"/>
    <text x="185" y="242" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a2a5a">STORE</text>
    <line x1="150" y1="250" x2="200" y2="250" stroke="#a87fb8" stroke-width="1"/>
    <text x="185" y="265" text-anchor="middle" class="detail">Result</text>
    <text x="185" y="278" text-anchor="middle" class="detail">→ Memory</text>
    <text x="185" y="291" text-anchor="middle" class="detail">or</text>
    <text x="185" y="304" text-anchor="middle" class="detail">→ Register</text>
    <text x="185" y="317" text-anchor="middle" class="detail">Update</text>
  </g>
  
  <g class="arrow arrow-1">
    <path d="M110 125 L135 125" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow arrow-2">
    <path d="M230 125 L255 125" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow arrow-3">
    <path d="M305 190 L305 215" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d6d7e"/>
    </marker>
  </defs>
  
  <g data-narration="Instruction Code: Binary pattern representing a specific operation. Contains opcode (operation) and operand (data address)">
    <rect x="10" y="355" width="130" height="38" rx="5" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <text x="75" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Instruction Code</text>
    <text x="75" y="384" text-anchor="middle" font-size="9" fill="#7f8c8d">Opcode + Operand</text>
  </g>
  
  <g data-narration="Instruction Format: Structure of the instruction binary - defines bit allocation for opcode and operands">
    <rect x="150" y="355" width="130" height="38" rx="5" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <text x="215" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Format</text>
    <text x="215" y="384" text-anchor="middle" font-size="9" fill="#7f8c8d">Structure of bits</text>
  </g>
  
  <g data-narration="The cycle repeats continuously: Fetch → Decode → Execute → Store → Fetch...">
    <rect x="290" y="355" width="120" height="38" rx="5" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
    <text x="350" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Continuous</text>
    <text x="350" y="384" text-anchor="middle" font-size="9" fill="#7f8c8d">Cycle repeats</text>
  </g>
  
  <g class="highlight">
    <circle cx="65" cy="60" r="6" fill="#27ae60"/>
    <text x="65" y="64" text-anchor="middle" font-size="8" fill="white" font-weight="bold">1</text>
  </g>
  <g class="highlight" style="animation-delay: 0.3s">
    <circle cx="185" cy="60" r="6" fill="#f39c12"/>
    <text x="185" y="64" text-anchor="middle" font-size="8" fill="white" font-weight="bold">2</text>
  </g>
  <g class="highlight" style="animation-delay: 0.6s">
    <circle cx="305" cy="60" r="6" fill="#e74c3c"/>
    <text x="305" y="64" text-anchor="middle" font-size="8" fill="white" font-weight="bold">3</text>
  </g>
  <g class="highlight" style="animation-delay: 0.9s">
    <circle cx="185" cy="220" r="6" fill="#9b59b6"/>
    <text x="185" y="224" text-anchor="middle" font-size="8" fill="white" font-weight="bold">4</text>
  </g>
</svg>