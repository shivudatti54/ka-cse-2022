<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="bus-organization-control-unit" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="ioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <linearGradient id="busGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes busFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .component { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .component-cpu { animation-delay: 0.2s; }
    .component-memory { animation-delay: 0.4s; }
    .component-io { animation-delay: 0.6s; }
    .bus-label { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .bus-data { animation-delay: 0.8s; }
    .bus-addr { animation-delay: 0.9s; }
    .bus-ctrl { animation-delay: 1.0s; }
    .concept-box { animation: fadeIn 1.2s ease-out forwards; opacity: 0; }
    .concept-1 { animation-delay: 0.3s; }
    .concept-2 { animation-delay: 0.5s; }
    .concept-3 { animation-delay: 0.7s; }
    .arrow-line { stroke-dasharray: 5,5; animation: busFlow 1s linear infinite; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-size: 12px; fill: #34495e; }
    .detail-text { font-size: 10px; fill: #7f8c8d; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title-text title">Bus Organization &amp; Control Unit</text>
  
  <!-- CPU Component -->
  <g class="component component-cpu" transform="translate(30, 60)">
    <rect width="90" height="80" rx="8" fill="url(#cpuGradient)" stroke="#e74c3c" stroke-width="2"/>
    <text x="45" y="30" text-anchor="middle" class="label-text" font-weight="bold">CPU</text>
    <text x="45" y="45" text-anchor="middle" class="detail-text">Control Unit</text>
    <text x="45" y="58" text-anchor="middle" class="detail-text">ALU</text>
    <text x="45" y="71" text-anchor="middle" class="detail-text">Registers</text>
    <circle cx="75" cy="40" r="6" fill="#e74c3c" class="pulse-element"/>
  </g>
  
  <!-- Memory Component -->
  <g class="component component-memory" transform="translate(280, 60)">
    <rect width="100" height="80" rx="8" fill="url(#memoryGradient)" stroke="#27ae60" stroke-width="2"/>
    <text x="50" y="30" text-anchor="middle" class="label-text" font-weight="bold">Memory</text>
    <text x="50" y="45" text-anchor="middle" class="detail-text">RAM/ROM</text>
    <text x="50" y="58" text-anchor="middle" class="detail-text">Storage</text>
    <text x="50" y="71" text-anchor="middle" class="detail-text">Addresses</text>
    <circle cx="75" cy="40" r="6" fill="#27ae60" class="pulse-element"/>
  </g>
  
  <!-- I/O Devices Component -->
  <g class="component component-io" transform="translate(280, 230)">
    <rect width="100" height="70" rx="8" fill="url(#ioGradient)" stroke="#9b59b6" stroke-width="2"/>
    <text x="50" y="25" text-anchor="middle" class="label-text" font-weight="bold">I/O Devices</text>
    <text x="50" y="42" text-anchor="middle" class="detail-text">Keyboard</text>
    <text x="50" y="55" text-anchor="middle" class="detail-text">Display</text>
  </g>
  
  <!-- Bus Lines - Data Bus -->
  <g class="bus-label bus-data">
    <line x1="120" y1="100" x2="280" y2="100" stroke="#3498db" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.7"/>
    <text x="170" y="93" class="label-text" fill="#3498db" font-size="10">Data Bus (bidirectional)</text>
  </g>
  
  <!-- Bus Lines - Address Bus -->
  <g class="bus-label bus-addr">
    <line x1="120" y1="115" x2="280" y2="115" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.7"/>
    <text x="165" y="108" class="label-text" fill="#e67e22" font-size="10">Address Bus</text>
  </g>
  
  <!-- Bus Lines - Control Bus -->
  <g class="bus-label bus-ctrl">
    <line x1="120" y1="130" x2="280" y2="130" stroke="#9b59b6" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.7"/>
    <text x="160" y="123" class="label-text" fill="#9b59b6" font-size="10">Control Bus</text>
  </g>
  
  <!-- Connection to I/O -->
  <line x1="330" y1="140" x2="330" y2="230" stroke="#34495e" stroke-width="2" stroke-dasharray="4,2" opacity="0.6"/>
  <text x="345" y="190" class="detail-text" fill="#34495e" font-size="9">I/O Bus</text>
  
  <!-- Bus Organization Box -->
  <g class="concept-box concept-1" data-narration="Bus Organization: The system bus comprises Data Bus (bidirectional data transfer), Address Bus (memory location selection), and Control Bus (timing and control signals)">
    <rect x="10" y="160" width="130" height="55" rx="5" fill="#fff" stroke="#3498db" stroke-width="1.5" opacity="0.9"/>
    <text x="75" y="178" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Bus Organization</text>
    <text x="75" y="192" text-anchor="middle" class="detail-text" fill="#7f8c8d">Data • Address • Control</text>
    <text x="75" y="206" text-anchor="middle" class="detail-text" fill="#7f8c8d">3 bus types working together</text>
  </g>
  
  <!-- Control Unit Box -->
  <g class="concept-box concept-2" data-narration="Control Unit: Directs operation of the processor, manages instruction fetch-decode-execute cycle, generates control signals for bus operations">
    <rect x="150" y="160" width="130" height="55" rx="5" fill="#fff" stroke="#e74c3c" stroke-width="1.5" opacity="0.9"/>
    <text x="215" y="178" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Control Unit</text>
    <text x="215" y="192" text-anchor="middle" class="detail-text" fill="#7f8c8d">Fetch • Decode • Execute</text>
    <text x="215" y="206" text-anchor="middle" class="detail-text" fill="#7f8c8d">Hardwired / Microprog.</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="concept-box concept-3" data-narration="Bus Arbitration: Prevents multiple devices from controlling the bus simultaneously, ensures orderly data transfer">
    <rect x="290" y="310" width="115" height="50" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1.5" opacity="0.9"/>
    <text x="347" y="328" text-anchor="middle" class="label-text" font-weight="bold" fill="#2c3e50">Key Concept</text>
    <text x="347" y="343" text-anchor="middle" class="detail-text" fill="#7f8c8d">Bus Arbitration</text>
    <text x="347" y="356" text-anchor="middle" class="detail-text" fill="#7f8c8d">prevents conflicts</text>
  </g>
  
  <!-- Flow indicator -->
  <g transform="translate(10, 320)">
    <text x="0" y="0" class="detail-text" fill="#34495e">Data Flow:</text>
    <circle cx="60" cy="-4" r="4" fill="#3498db">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="-4" r="4" fill="#3498db">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="-4" r="4" fill="#3498db">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Bottom label -->
  <rect x="10" y="360" width="400" height="25" rx="3" fill="#ecf0f1" opacity="0.8"/>
  <text x="210" y="377" text-anchor="middle" class="detail-text" fill="#2c3e50">CPU communicates with Memory and I/O via system bus architecture</text>
</svg>