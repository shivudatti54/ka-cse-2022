<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pipelining-interrupts">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .stage-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #ffffff; }
    .inst-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #ffffff; font-weight: bold; }
    .phase-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-style: italic; fill: #718096; }
    .title-box { animation: fadeIn 0.8s ease-out forwards; }
    .pipeline-box { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .key-box { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .cycle-label { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    .inst-box { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title Section -->
  <g class="title-box" data-narration="Title section showing the topic name: 5-Stage RISC Pipeline Timing Diagram">
    <rect x="10" y="10" width="400" height="40" fill="url(#boxGradient)" rx="6" filter="url(#shadow)"/>
    <text x="210" y="35" text-anchor="middle" class="title-text">Pipelining &amp; Interrupts</text>
    <text x="210" y="48" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" fill="#718096">5-Stage RISC Pipeline Timing</text>
  </g>
  
  <!-- Pipeline Diagram -->
  <g class="pipeline-box" transform="translate(60, 70)" data-narration="Main pipeline timing diagram showing 6 instructions flowing through 5 stages over 10 clock cycles">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="320" y2="0" stroke="#cbd5e0" stroke-width="1"/>
    <line x1="0" y1="40" x2="320" y2="40" stroke="#cbd5e0" stroke-width="1"/>
    <line x1="0" y1="80" x2="320" y2="80" stroke="#cbd5e0" stroke-width="1"/>
    <line x1="0" y1="120" x2="320" y2="120" stroke="#cbd5e0" stroke-width="1"/>
    <line x1="0" y1="160" x2="320" y2="160" stroke="#cbd5e0" stroke-width="1"/>
    <line x1="0" y1="200" x2="320" y2="200" stroke="#cbd5e0" stroke-width="1"/>
    
    <!-- Vertical cycle lines -->
    <line x1="32" y1="0" x2="32" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="64" y1="0" x2="64" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="96" y1="0" x2="96" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="128" y1="0" x2="128" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="192" y1="0" x2="192" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="224" y1="0" x2="224" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="256" y1="0" x2="256" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="288" y1="0" x2="288" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="320" y1="0" x2="320" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
    
    <!-- Stage labels -->
    <text x="-5" y="22" text-anchor="end" class="stage-label" fill="#2d3748">IF</text>
    <text x="-5" y="62" text-anchor="end" class="stage-label" fill="#2d3748">ID</text>
    <text x="-5" y="102" text-anchor="end" class="stage-label" fill="#2d3748">EX</text>
    <text x="-5" y="142" text-anchor="end" class="stage-label" fill="#2d3748">MEM</text>
    <text x="-5" y="182" text-anchor="end" class="stage-label" fill="#2d3748">WB</text>
    
    <!-- Cycle numbers -->
    <g class="cycle-label" style="animation-delay: 0.1s">
      <text x="16" y="-5" text-anchor="middle" class="label-text">1</text>
      <text x="48" y="-5" text-anchor="middle" class="label-text">2</text>
      <text x="80" y="-5" text-anchor="middle" class="label-text">3</text>
      <text x="112" y="-5" text-anchor="middle" class="label-text">4</text>
      <text x="144" y="-5" text-anchor="middle" class="label-text">5</text>
      <text x="176" y="-5" text-anchor="middle" class="label-text">6</text>
      <text x="208" y="-5" text-anchor="middle" class="label-text">7</text>
      <text x="240" y="-5" text-anchor="middle" class="label-text">8</text>
      <text x="272" y="-5" text-anchor="middle" class="label-text">9</text>
      <text x="304" y="-5" text-anchor="middle" class="label-text">10</text>
    </g>
    
    <!-- Instruction boxes - showing the diagonal pipeline flow -->
    <!-- I1: IF-1, ID-2, EX-3, MEM-4, WB-5 -->
    <rect x="0" y="2" width="30" height="36" fill="#4299e1" rx="3" class="inst-box"/>
    <rect x="32" y="42" width="30" height="36" fill="#48bb78" rx="3" class="inst-box" style="animation-delay: 0.2s"/>
    <rect x="64" y="82" width="30" height="36" fill="#ed8936" rx="3" class="inst-box" style="animation-delay: 0.4s"/>
    <rect x="96" y="122" width="30" height="36" fill="#9f7aea" rx="3" class="inst-box" style="animation-delay: 0.6s"/>
    <rect x="128" y="162" width="30" height="36" fill="#f56565" rx="3" class="inst-box" style="animation-delay: 0.8s"/>
    
    <!-- I2: IF-2, ID-3, EX-4, MEM-5, WB-6 -->
    <rect x="32" y="2" width="30" height="36" fill="#4299e1" rx="3" class="inst-box" style="animation-delay: 0.1s"/>
    <rect x="64" y="42" width="30" height="36" fill="#48bb78" rx="3" class="inst-box" style="animation-delay: 0.3s"/>
    <rect x="96" y="82" width="30" height="36" fill="#ed8936" rx="3" class="inst-box" style="animation-delay: 0.5s"/>
    <rect x="128" y="122" width="30" height="36" fill="#9f7aea" rx="3" class="inst-box" style="animation-delay: 0.7s"/>
    <rect x="160" y="162" width="30" height="36" fill="#f56565" rx="3" class="inst-box" style="animation-delay: 0.9s"/>
    
    <!-- I3: IF-3, ID-4, EX-5, MEM-6, WB-7 -->
    <rect x="64" y="2" width="30" height="36" fill="#4299e1" rx="3" class="inst-box" style="animation-delay: 0.2s"/>
    <rect x="96" y="42" width="30" height="36" fill="#48bb78" rx="3" class="inst-box" style="animation-delay: 0.4s"/>
    <rect x="128" y="82" width="30" height="36" fill="#ed8936" rx="3" class="inst-box" style="animation-delay: 0.6s"/>
    <rect x="160" y="122" width="30" height="36" fill="#9f7aea" rx="3" class="inst-box" style="animation-delay: 0.8s"/>
    <rect x="192" y="162" width="30" height="36" fill="#f56565" rx="3" class="inst-box" style="animation-delay: 1s"/>
    
    <!-- I4: IF-4, ID-5, EX-6, MEM-7, WB-8 -->
    <rect x="96" y="2" width="30" height="36" fill="#4299e1" rx="3" class="inst-box" style="animation-delay: 0.3s"/>
    <rect x="128" y="42" width="30" height="36" fill="#48bb78" rx="3" class="inst-box" style="animation-delay: 0.5s"/>
    <rect x="160" y="82" width="30" height="36" fill="#ed8936" rx="3" class="inst-box" style="animation-delay: 0.7s"/>
    <rect x="192" y="122" width="30" height="36" fill="#9f7aea" rx="3" class="inst-box" style="animation-delay: 0.9s"/>
    <rect x="224" y="162" width="30" height="36" fill="#f56565" rx="3" class="inst-box" style="animation-delay: 1.1s"/>
    
    <!-- I5: IF-5, ID-6, EX-7, MEM-8, WB-9 -->
    <rect x="128" y="2" width="30" height="36" fill="#4299e1" rx="3" class="inst-box" style="animation-delay: 0.4s"/>
    <rect x="160" y="42" width="30" height="36" fill="#48bb78" rx="3" class="inst-box" style="animation-delay: 0.6s"/>
    <rect x="192" y="82" width="30" height="36" fill="#ed8936" rx="3" class="inst-box" style="animation-delay: 0.8s"/>
    <rect x="224" y="122" width="30" height="36" fill="#9f7aea" rx="3" class="inst-box" style="animation-delay: 1s"/>
    <rect x="256" y="162" width="30" height="36" fill="#f56565" rx="3" class="inst-box" style="animation-delay: 1.2s"/>
    
    <!-- I6: IF-6, ID-7, EX-8, MEM-9, WB-10 -->
    <rect x="160" y="2" width="30" height="36" fill="#4299e1" rx="3" class="inst-box" style="animation-delay: 0.5s"/>
    <rect x="192" y="42" width="30" height="36" fill="#48bb78" rx="3" class="inst-box" style="animation-delay: 0.7s"/>
    <rect x="224" y="82" width="30" height="36" fill="#ed8936" rx="3" class="inst-box" style="animation-delay: 0.9s"/>
    <rect x="256" y="122" width="30" height="36" fill="#9f7aea" rx="3" class="inst-box" style="animation-delay: 1.1s"/>
    <rect x="288" y="162" width="30" height="36" fill="#f56565" rx="3" class="inst-box" style="animation-delay: 1.3s"/>
    
    <!-- Instruction labels -->
    <text x="15" y="24" text-anchor="middle" class="inst-label">I1</text>
    <text x="47" y="24" text-anchor="middle" class="inst-label">I2</text>
    <text x="79" y="24" text-anchor="middle" class="inst-label">I3</text>
    <text x="111" y="24" text-anchor="middle" class="inst-label">I4</text>
    <text x="143" y="24" text-anchor="middle" class="inst-label">I5</text>
    <text x="175" y="24" text-anchor="middle" class="inst-label">I6</text>
    
    <!-- Phase labels -->
    <text x="80" y="230" text-anchor="middle" class="phase-label">Fill Phase</text>
    <text x="176" y="230" text-anchor="middle" class="phase-label">Steady State</text>
    <text x="288" y="230" text-anchor="middle" class="phase-label">Drain</text>
    
    <!-- Phase arrows/brackets -->
    <path d="M 10 215 Q 10 220, 15 220 L 145 220 Q 150 220, 150 215" fill="none" stroke="#718096" stroke-width="1"/>
    <path d="M 155 215 Q 155 220, 160 220 L 240 220 Q 245 220, 245 215" fill="none" stroke="#718096" stroke-width="1"/>
    <path d="M 255 215 Q 255 220, 260 220 L 305 220 Q 310 220, 310 215" fill="none" stroke="#718096" stroke-width="1"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="key-box" data-narration="Key concepts box explaining pipeline stages and their functions" transform="translate(10, 290)">
    <rect x="0" y="0" width="400" height="100" fill="url(#boxGradient)" rx="6" filter="url(#shadow)"/>
    <text x="15" y="20" font-family="Segoe UI, Arial" font-size="13" font-weight="bold" fill="#2c5282">Pipeline Stages:</text>
    
    <!-- Stage explanations -->
    <g transform="translate(10, 35)">
      <rect x="0" y="0" width="18" height="18" fill="#4299e1" rx="2"/>
      <text x="24" y="13" font-family="Segoe UI, Arial" font-size="10" fill="#4a5568">IF - Fetch instruction from memory</text>
      
      <rect x="140" y="0" width="18" height="18" fill="#48bb78" rx="2"/>
      <text x="164" y="13" font-family="Segoe UI, Arial" font-size="10" fill="#4a5568">ID - Decode &amp; read registers</text>
    </g>
    
    <g transform="translate(10, 58)">
      <rect x="0" y="0" width="18" height="18" fill="#ed8936" rx="2"/>
      <text x="24" y="13" font-family="Segoe UI, Arial" font-size="10" fill="#4a5568">EX - Execute ALU operation</text>
      
      <rect x="165" y="0" width="18" height="18" fill="#9f7aea" rx="2"/>
      <text x="189" y="13" font-family="Segoe UI, Arial" font-size="10" fill="#4a5568">MEM - Memory access</text>
    </g>
    
    <g transform="translate(200, 58)">
      <rect x="0" y="0" width="18" height="18" fill="#f56565" rx="2"/>
      <text x="24" y="13" font-family="Segoe UI, Arial" font-size="10" fill="#4a5568">WB - Write back result</text>
    </g>
  </g>
  
  <!-- Interrupts Concept Section -->
  <g data-narration="Interrupt handling concept showing how interrupts interact with pipelined execution" transform="translate(280, 75)">
    <rect x="0" y="0" width="120" height="55" fill="#fff5f5" rx="4" stroke="#fc8181" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="60" y="18" text-anchor="middle" font-family="Segoe UI, Arial" font-size="11" font-weight="bold" fill="#c53030">Interrupt</text>
    <text x="60" y="32" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#718096">Stalls pipeline</text>
    <text x="60" y="44" text-anchor="middle" font-family="Segoe UI, Arial" font-size="9" fill="#718096">for priority handling</text>
    
    <!-- Arrow showing interrupt effect -->
    <path d="M 60 55 L 60 65" stroke="#c53030" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c53030"/>
    </marker>
  </defs>
</svg>