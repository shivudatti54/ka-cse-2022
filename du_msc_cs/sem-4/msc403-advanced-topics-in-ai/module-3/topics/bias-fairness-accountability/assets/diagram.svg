<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="bias-fairness-accountability">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pipelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="biasGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fairnessGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accountGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideDown {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .box-anim { animation: slideIn 0.8s ease-out forwards; }
    .pulse-anim { animation: pulse 2s infinite; }
    .stage-anim { animation: slideDown 0.6s ease-out forwards; }
    .connector-anim { animation: fadeIn 1.2s ease-out forwards; }
    text { font-family: Arial, sans-serif; }
    .title { font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-size: 13px; fill: #34495e; }
    .detail { font-size: 10px; fill: #5d6d7e; }
    .stage-text { font-size: 11px; font-weight: bold; fill: #fff; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Bias, Fairness &amp; Accountability</text>
  <text x="210" y="45" text-anchor="middle" class="detail title-anim" style="animation-delay: 0.2s">AI Systems Pipeline</text>
  
  <!-- Pipeline Section -->
  <g data-narration="Four-stage bias mitigation pipeline showing Data collection, Pre-processing, In-processing, and Post-processing">
    <!-- Pipeline Background -->
    <rect x="20" y="60" width="380" height="70" rx="8" fill="url(#pipelineGrad)" opacity="0.9" class="stage-anim" style="animation-delay: 0.3s"/>
    
    <!-- Stage Labels -->
    <g class="stage-anim" style="animation-delay: 0.4s">
      <circle cx="65" cy="95" r="18" fill="#fff" opacity="0.3"/>
      <text x="65" y="99" text-anchor="middle" class="stage-text">Data</text>
    </g>
    <g class="stage-anim" style="animation-delay: 0.5s">
      <circle cx="145" cy="95" r="18" fill="#fff" opacity="0.3"/>
      <text x="145" y="99" text-anchor="middle" class="stage-text">Pre</text>
    </g>
    <g class="stage-anim" style="animation-delay: 0.6s">
      <circle cx="225" cy="95" r="18" fill="#fff" opacity="0.3"/>
      <text x="225" y="99" text-anchor="middle" class="stage-text">In</text>
    </g>
    <g class="stage-anim" style="animation-delay: 0.7s">
      <circle cx="305" cy="95" r="18" fill="#fff" opacity="0.3"/>
      <text x="305" y="99" text-anchor="middle" class="stage-text">Post</text>
    </g>
    <g class="stage-anim" style="animation-delay: 0.8s">
      <circle cx="380" cy="95" r="12" fill="#2ecc71"/>
      <text x="380" y="99" text-anchor="middle" class="stage-text" font-size="10">✓</text>
    </g>
    
    <!-- Arrows -->
    <g class="connector-anim" style="animation-delay: 0.9s">
      <path d="M83 95 L107 95" stroke="#fff" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M163 95 L187 95" stroke="#fff" stroke-width="2"/>
      <path d="M243 95 L267 95" stroke="#fff" stroke-width="2"/>
      <path d="M323 95 L350 95" stroke="#fff" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Bias Types Box -->
  <g data-narration="Three types of algorithmic bias: Historical, Representation, and Measurement bias" class="box-anim" style="animation-delay: 0.5s">
    <rect x="20" y="145" width="120" height="115" rx="8" fill="url(#biasGrad)" stroke="#ff6b6b" stroke-width="1"/>
    <text x="80" y="162" text-anchor="middle" class="label" font-weight="bold" fill="#c0392b">Algorithmic Bias</text>
    <text x="30" y="182" class="detail">• Historical Bias</text>
    <text x="30" y="197" class="detail">• Representation Bias</text>
    <text x="30" y="212" class="detail">• Measurement Bias</text>
    <text x="30" y="230" class="detail" fill="#7f8c8d">e.g., zip code as</text>
    <text x="30" y="243" class="detail" fill="#7f8c8d">poverty indicator</text>
  </g>
  
  <!-- Fairness Metrics Box -->
  <g data-narration="Three fairness metrics: Demographic Parity, Equalized Odds, and Counterfactual Fairness" class="box-anim" style="animation-delay: 0.7s">
    <rect x="150" y="145" width="120" height="115" rx="8" fill="url(#fairnessGrad)" stroke="#1abc9c" stroke-width="1"/>
    <text x="210" y="162" text-anchor="middle" class="label" font-weight="bold" fill="#16a085">Fairness Metrics</text>
    <text x="160" y="182" class="detail">Demographic Parity</text>
    <text x="160" y="197" class="detail">Equalized Odds</text>
    <text x="160" y="212" class="detail">Counterfactual</text>
    <text x="160" y="230" class="detail" fill="#7f8c8d">P(Ŷ=1|A=0) =</text>
    <text x="160" y="243" class="detail" fill="#7f8c8d">P(Ŷ=1|A=1)</text>
  </g>
  
  <!-- Accountability Box -->
  <g data-narration="Three accountability mechanisms: Model Cards, GDPR Article 22, and RBI guidelines" class="box-anim" style="animation-delay: 0.9s">
    <rect x="280" y="145" width="120" height="115" rx="8" fill="url(#accountGrad)" stroke="#9b59b6" stroke-width="1"/>
    <text x="340" y="162" text-anchor="middle" class="label" font-weight="bold" fill="#8e44ad">Accountability</text>
    <text x="290" y="182" class="detail">• Model Cards</text>
    <text x="290" y="197" class="detail">• GDPR Art.22</text>
    <text x="290" y="212" class="detail">• RBI Guidelines</text>
    <text x="290" y="230" class="detail" fill="#7f8c8d">Right to Explanation</text>
    <text x="290" y="243" class="detail" fill="#7f8c8d">DPDP Act 2023</text>
  </g>
  
  <!-- Mitigation Techniques -->
  <g data-narration="Bias mitigation techniques: Reweighting module, Adversarial network, and Threshold adjustment" class="pulse-anim">
    <rect x="150" y="275" width="250" height="50" rx="8" fill="#fff" stroke="#3498db" stroke-width="2" opacity="0.9"/>
    <text x="275" y="295" text-anchor="middle" class="label" fill="#2980b9">Mitigation Techniques</text>
    <text x="275" y="312" text-anchor="middle" class="detail" fill="#5d6d7e">Reweighting → Adversarial Debiasing → Threshold Adjustment</text>
  </g>
  
  <!-- Key Formula -->
  <g data-narration="Fairness constraint formula used in in-processing bias mitigation" class="box-anim" style="animation-delay: 1.1s">
    <rect x="20" y="275" width="120" height="50" rx="8" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1"/>
    <text x="80" y="292" text-anchor="middle" class="detail" font-weight="bold" fill="#2c3e50">Fairness Constraint</text>
    <text x="80" y="310" text-anchor="middle" class="detail" fill="#7f8c8d">E[Ŷ|A=0] ≥ 0.95×E[Ŷ|A=1]</text>
  </g>
  
  <!-- Bottom Legend -->
  <g data-narration="Color legend explaining the three main components" class="box-anim" style="animation-delay: 1.3s">
    <circle cx="40" cy="360" r="6" fill="#ff9a9e"/>
    <text x="52" y="364" class="detail">Bias Detection</text>
    <circle cx="140" cy="360" r="6" fill="#a8edea"/>
    <text x="152" y="364" class="detail">Fairness Metrics</text>
    <circle cx="250" cy="360" r="6" fill="#d299c2"/>
    <text x="262" y="364" class="detail">Transparency</text>
    <circle cx="360" cy="360" r="6" fill="#2ecc71"/>
    <text x="372" y="364" class="detail">Output</text>
  </g>
</svg>