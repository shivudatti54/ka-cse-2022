<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ai-regulation-governance">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ec5db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b39ddb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInTop {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInBottom {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .layer-anim { animation: slideInTop 0.6s ease-out forwards; }
    .box-anim { animation: slideInTop 0.5s ease-out forwards; }
    .arrow-anim { animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .audit-anim { animation: slideInBottom 0.6s ease-out forwards; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; }
    .policy-box { animation: slideInTop 0.7s ease-out forwards; }
    .impl-box { animation: slideInTop 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title-anim">AI Governance Framework</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#7f8c8d" stroke-width="1" class="title-anim"/>
  
  <!-- Policy Layer -->
  <rect x="25" y="55" width="170" height="85" rx="6" fill="url(#layerGradient1)" filter="url(#shadow)" class="policy-box"/>
  <text x="110" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">POLICY LAYER</text>
  <text x="110" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Ethical AI Principles</text>
  <text x="110" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">• Transparency</text>
  <text x="110" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">• Accountability</text>
  <text x="110" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">• Fairness Metrics</text>
  
  <rect x="225" y="55" width="170" height="85" rx="6" fill="url(#layerGradient3)" filter="url(#shadow)" class="policy-box"/>
  <text x="310" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6a1b9a">REGULATORY</text>
  <text x="310" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a148c">Frameworks</text>
  <text x="310" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">EU AI Act 2024</text>
  <text x="310" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Risk Classification</text>
  <text x="310" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Conformity Assessment</text>
  
  <!-- Arrows from policy -->
  <path d="M 110 140 L 110 165" stroke="#3498db" stroke-width="2" fill="none" class="arrow-anim"/>
  <path d="M 310 140 L 310 165" stroke="#9c27b0" stroke-width="2" fill="none" class="arrow-anim"/>
  <path d="M 110 152 L 210 172 L 310 152" stroke="#7f8c8d" stroke-width="1.5" fill="none" class="arrow-anim"/>
  
  <!-- Implementation Layer -->
  <rect x="60" y="170" width="300" height="80" rx="6" fill="url(#layerGradient2)" filter="url(#shadow)" class="impl-box"/>
  <text x="210" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">IMPLEMENTATION LAYER</text>
  
  <rect x="75" y="200" width="130" height="42" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="140" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Technical Controls</text>
  <text x="140" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4caf50">XAI • Fairness Metrics</text>
  <text x="140" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4caf50">Model Versioning</text>
  
  <rect x="215" y="200" width="130" height="42" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="280" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Human Oversight</text>
  <text x="280" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4caf50">Institutional Review</text>
  <text x="280" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4caf50">Decision Review</text>
  
  <!-- Arrows from implementation -->
  <path d="M 110 250 L 110 280" stroke="#27ae60" stroke-width="2" fill="none" class="arrow-anim"/>
  <path d="M 310 250 L 310 280" stroke="#27ae60" stroke-width="2" fill="none" class="arrow-anim"/>
  
  <!-- Audit Layer -->
  <rect x="25" y="285" width="170" height="75" rx="6" fill="url(#layerGradient1)" filter="url(#shadow)" class="audit-anim"/>
  <text x="110" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">AUDIT LAYER</text>
  <text x="110" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Compliance Audits</text>
  <text x="110" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Documentation Reviews</text>
  <text x="110" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Bias Detection Reports</text>
  
  <rect x="225" y="285" width="170" height="75" rx="6" fill="url(#layerGradient3)" filter="url(#shadow)" class="audit-anim"/>
  <text x="310" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6a1b9a">MONITORING</text>
  <text x="310" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4a148c">ISO/IEC 23894:2023</text>
  <text x="310" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Continuous Monitoring</text>
  <text x="310" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5d6d7e">Performance Metrics</text>
  
  <!-- Bottom connection line -->
  <line x1="40" y1="375" x2="380" y2="375" stroke="#7f8c8d" stroke-width="1" class="title-anim"/>
  
  <!-- Data narration attributes on key elements -->
  <rect x="25" y="55" width="170" height="85" fill="transparent" data-narration="Policy Layer establishes ethical AI principles including transparency, accountability, and fairness metrics guided by OECD AI Principles and EU Ethics Guidelines"/>
  <rect x="225" y="55" width="170" height="85" fill="transparent" data-narration="Regulatory frameworks include EU AI Act 2024 with risk-based classification and conformity assessment procedures for high-risk AI systems"/>
  <rect x="60" y="170" width="300" height="80" fill="transparent" data-narration="Implementation Layer combines technical controls like Explainable AI and fairness metrics with human oversight through institutional review boards"/>
  <rect x="25" y="285" width="170" height="75" fill="transparent" data-narration="Audit Layer ensures compliance through regular audits, documentation reviews, and bias detection reports"/>
  <rect x="225" y="285" width="170" height="75" fill="transparent" data-narration="Continuous monitoring follows ISO/IEC 23894:2023 standards for ongoing AI system performance and risk assessment"/>
</svg>