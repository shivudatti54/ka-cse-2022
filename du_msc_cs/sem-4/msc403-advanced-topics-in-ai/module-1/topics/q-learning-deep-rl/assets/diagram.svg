<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="q-learning-deep-rl">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c8dbf0"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#7b68ee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title-text { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula-text { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c3e50; font-weight: bold; }
    .section-box { fill: url(#boxGrad); stroke: #b8d4e8; stroke-width: 1; filter: url(#shadow); }
    .highlight-box { fill: #fff3e0; stroke: #ffb74d; stroke-width: 1; }
    .accent-bar { fill: url(#accentGrad); }
    .arrow-line { stroke: #5b9bd5; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animate-slide { animation: slideIn 0.6s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title Section -->
  <g data-narration="Title section showing the topic Q-Learning and Deep Reinforcement Learning">
    <rect x="0" y="0" width="420" height="45" fill="url(#accentGrad)"/>
    <text x="210" y="30" text-anchor="middle" class="title-text" fill="white">Q-Learning &amp; Deep RL</text>
  </g>
  
  <!-- Section 1: Agent-Environment Loop -->
  <g data-narration="The RL loop showing State, Action, Reward, and Next State transition">
    <rect x="15" y="55" width="185" height="100" rx="8" class="section-box"/>
    <text x="25" y="72" class="label-text" font-weight="bold">RL Agent-Environment Loop</text>
    
    <!-- State box -->
    <rect x="25" y="82" width="50" height="35" rx="4" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1"/>
    <text x="50" y="105" text-anchor="middle" class="detail-text" fill="#1565c0">State s</text>
    
    <!-- Arrow s->a -->
    <path d="M80 100 L105 100" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <!-- Action box -->
    <rect x="110" y="82" width="50" height="35" rx="4" fill="#fce4ec" stroke="#f48fb1" stroke-width="1"/>
    <text x="135" y="105" text-anchor="middle" class="detail-text" fill="#c2185b">Action a</text>
    
    <!-- Arrow a->r -->
    <path d="M165 100 L190 100" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <!-- Reward box -->
    <rect x="25" y="125" width="50" height="25" rx="4" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
    <text x="50" y="142" text-anchor="middle" class="detail-text" fill="#2e7d32">Reward r</text>
    
    <!-- Arrow r->s' -->
    <path d="M80 138 L105 138" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <!-- Next State box -->
    <rect x="110" y="125" width="80" height="25" rx="4" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
    <text x="150" y="142" text-anchor="middle" class="detail-text" fill="#e65100">Next State s'</text>
  </g>
  
  <!-- Section 2: Bellman Equation -->
  <g data-narration="The Bellman Equation showing Q-value calculation with reward and future values">
    <rect x="210" y="55" width="195" height="100" rx="8" class="section-box"/>
    <text x="220" y="72" class="label-text" font-weight="bold">Bellman Equation</text>
    
    <text x="220" y="95" class="formula-text">Q(s,a) = E[r + γmaxQ(s',a')]</text>
    <text x="220" y="115" class="detail-text" fill="#7f8c8d">Where:</text>
    <text x="220" y="130" class="detail-text">• Q(s,a): Q-value for state s, action a</text>
    <text x="220" y="145" class="detail-text">• r: Immediate reward</text>
    <text x="310" y="130" class="detail-text">• γ: Discount factor (0-1)</text>
  </g>
  
  <!-- Section 3: Q-Learning Update -->
  <g data-narration="The TD Learning update rule showing how Q-values are improved">
    <rect x="15" y="165" width="185" height="95" rx="8" class="section-box"/>
    <text x="25" y="182" class="label-text" font-weight="bold">TD Learning Update</text>
    
    <text x="25" y="205" class="formula-text">Q(s,a) ← Q(s,a) + α[δ]</text>
    <text x="25" y="225" class="detail-text">where δ = r + γmaxQ(s',a') - Q(s,a)</text>
    
    <!-- TD Error visualization -->
    <rect x="25" y="240" width="80" height="15" rx="3" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
    <text x="65" y="251" text-anchor="middle" class="detail-text" fill="#c62828" font-weight="bold">TD Error δ</text>
  </g>
  
  <!-- Section 4: DQN Components -->
  <g data-narration="Deep Q-Network architecture showing Experience Replay and Target Network">
    <rect x="210" y="165" width="195" height="95" rx="8" class="section-box"/>
    <text x="220" y="182" class="label-text" font-weight="bold">DQN Key Components</text>
    
    <!-- Experience Replay -->
    <rect x="220" y="195" width="85" height="35" rx="4" fill="#e8eaf6" stroke="#7986cb" stroke-width="1"/>
    <text x="262" y="208" text-anchor="middle" class="detail-text" fill="#303f9f" font-weight="bold">Experience Replay</text>
    <text x="262" y="222" text-anchor="middle" class="detail-text" fill="#5c6bc0">Random sampling</text>
    
    <!-- Arrow -->
    <path d="M310 212 L335 212" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arrowBlue)"/>
    
    <!-- Target Network -->
    <rect x="340" y="195" width="55" height="35" rx="4" fill="#f3e5f5" stroke="#ba68c8" stroke-width="1"/>
    <text x="367" y="208" text-anchor="middle" class="detail-text" fill="#6a1b9a" font-weight="bold">Target</text>
    <text x="367" y="222" text-anchor="middle" class="detail-text" fill="#8e24aa">Network</text>
    
    <text x="220" y="248" class="detail-text" fill="#5d6d7e">• Breaks temporal correlations</text>
    <text x="220" y="263" class="detail-text" fill="#5d6d7e">• Stabilizes training</text>
  </g>
  
  <!-- Section 5: Q-Value Update Arrow Visualization -->
  <g data-narration="Visual representation of Q-value being updated showing old value and new value">
    <rect x="15" y="270" width="185" height="60" rx="8" class="highlight-box"/>
    <text x="25" y="290" class="label-text" font-weight="bold">Q-Value Update Process</text>
    
    <!-- Old Q -->
    <text x="25" y="312" class="detail-text" fill="#7f8c8d">Old Q(s,a):</text>
    <text x="80" y="312" class="formula-text" fill="#c0392b">150</text>
    
    <!-- Arrow showing update -->
    <path d="M110 312 L150 312" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowGreen)" class="animate-pulse"/>
    
    <!-- New Q -->
    <text x="155" y="312" class="detail-text" fill="#7f8c8d">New Q(s,a):</text>
    <text x="205" y="312" class="formula-text" fill="#27ae60">165</text>
  </g>
  
  <!-- Section 6: Advanced Variants -->
  <g data-narration="Advanced DQN variants including Double DQN, Dueling DQN, and Prioritized Experience Replay">
    <rect x="210" y="270" width="195" height="60" rx="8" class="section-box"/>
    <text x="220" y="290" class="label-text" font-weight="bold">Advanced Variants</text>
    
    <rect x="220" y="298" width="60" height="25" rx="4" fill="#e0f2f1" stroke="#4db6ac" stroke-width="1"/>
    <text x="250" y="314" text-anchor="middle" class="detail-text" fill="#00695c">Double DQN</text>
    
    <rect x="285" y="298" width="60" height="25" rx="4" fill="#e1f5fe" stroke="#4fc3f7" stroke-width="1"/>
    <text x="315" y="314" text-anchor="middle" class="detail-text" fill="#0277bd">Dueling</text>
    
    <rect x="350" y="298" width="45" height="25" rx="4" fill="#fce4ec" stroke="#f06292" stroke-width="1"/>
    <text x="372" y="314" text-anchor="middle" class="detail-text" fill="#ad1457">PER</text>
  </g>
  
  <!-- Section 7: Key Insight -->
  <g data-narration="The exploration-exploitation dilemma concept">
    <rect x="15" y="340" width="390" height="50" rx="8" fill="linear-gradient(#667eea, #764ba2)" style="fill: url(#accentGrad);"/>
    <text x="210" y="362" text-anchor="middle" class="label-text" fill="white" font-weight="bold">Key Insight: Exploration vs Exploitation (ε-greedy Strategy)</text>
    <text x="210" y="378" text-anchor="middle" class="detail-text" fill="white" opacity="0.9">Balance between trying new actions (ε) and using best-known actions</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" fill="#5b9bd5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L1,3 Z" fill="#27ae60"/>
    </marker>
  </defs>
</svg>