<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="interpretability-methods">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#7eb8e0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 30; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #fff; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-arrow {
      stroke: #5b9bd5;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 5, 5;
      animation: flowRight 1s linear infinite;
    }
    .main-box { fill: #fff; stroke: #5b9bd5; stroke-width: 2; filter: url(#shadow); }
    .accent-box { fill: url(#accentGradient); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Interpretability Methods in AI</text>
  
  <!-- Section 1: Input Instance -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="Input instance being explained">
    <rect x="20" y="50" width="80" height="60" rx="8" class="main-box"/>
    <text x="60" y="72" text-anchor="middle" class="box-title">Input</text>
    <text x="60" y="88" text-anchor="middle" class="detail">Instance x</text>
    <rect x="30" y="95" width="60" height="8" rx="2" fill="#e2e8f0"/>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 105 80 L 140 80" class="flow-arrow"/>
  
  <!-- Section 2: Perturbation -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="LIME generates perturbed samples around the input">
    <rect x="145" y="50" width="90" height="60" rx="8" class="main-box"/>
    <text x="190" y="72" text-anchor="middle" class="box-title">Perturbation</text>
    <text x="190" y="88" text-anchor="middle" class="detail">Generate samples</text>
    <circle cx="165" cy="95" r="3" fill="#5b9bd5" class="pulse"/>
    <circle cx="180" cy="92" r="3" fill="#7eb8e0" class="pulse" style="animation-delay: 0.3s"/>
    <circle cx="200" cy="96" r="3" fill="#5b9bd5" class="pulse" style="animation-delay: 0.6s"/>
    <circle cx="215" cy="93" r="3" fill="#7eb8e0" class="pulse" style="animation-delay: 0.9s"/>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 240 80 L 275 80" class="flow-arrow"/>
  
  <!-- Section 3: Black Box Model -->
  <g class="slide-in" style="animation-delay: 0.6s" data-narration="Original model makes predictions on perturbed samples">
    <rect x="280" y="50" width="120" height="60" rx="8" class="main-box"/>
    <text x="340" y="72" text-anchor="middle" class="box-title">Black-Box Model</text>
    <text x="340" y="88" text-anchor="middle" class="detail">f(x) - Complex model</text>
    <rect x="295" y="95" width="90" height="6" rx="2" fill="#e2e8f0"/>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 340 115 L 340 150" class="flow-arrow"/>
  
  <!-- Section 4: Local Interpretable Model -->
  <g class="slide-in" style="animation-delay: 0.8s" data-narration="LIME fits a simple interpretable model locally">
    <rect x="260" y="160" width="160" height="70" rx="8" class="main-box" style="stroke: #48bb78;"/>
    <text x="340" y="182" text-anchor="middle" class="box-title" style="fill:#2d3748;">Local Surrogate Model</text>
    <text x="340" y="198" text-anchor="middle" class="detail">g(x) = Linear model</text>
    <text x="340" y="212" text-anchor="middle" class="detail" fill="#48bb78">Minimize Loss + Complexity</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 340 235 L 340 260" class="flow-arrow" style="animation-direction: reverse;"/>
  
  <!-- Section 5: Output Explanation -->
  <g class="slide-in" style="animation-delay: 1s" data-narration="Explanation generated showing feature contributions">
    <rect x="280" y="265" width="120" height="50" rx="8" class="main-box" style="stroke: #ed8936;"/>
    <text x="340" y="287" text-anchor="middle" class="box-title" style="fill:#2d3748;">Explanation</text>
    <text x="340" y="302" text-anchor="middle" class="detail">Feature weights</text>
    <rect x="295" y="295" width="25" height="4" rx="1" fill="#ed8936"/>
    <rect x="325" y="295" width="35" height="4" rx="1" fill="#ed8936"/>
    <rect x="365" y="295" width="20" height="4" rx="1" fill="#ed8936"/>
  </g>
  
  <!-- Side Concepts Box 1: SHAP -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="SHAP values provide game-theoretic feature attributions">
    <rect x="15" y="130" width="100" height="55" rx="6" fill="#667eea" filter="url(#shadow)"/>
    <text x="65" y="150" text-anchor="middle" class="box-title">SHAP Values</text>
    <text x="65" y="165" text-anchor="middle" class="detail" fill="#fff" font-size="10">Game-theoretic</text>
    <text x="65" y="177" text-anchor="middle" class="detail" fill="#fff" font-size="10">Attribution</text>
  </g>
  
  <!-- Side Concepts Box 2: Saliency -->
  <g class="fade-in" style="animation-delay: 1.4s" data-narration="Saliency maps highlight important input regions">
    <rect x="15" y="195" width="100" height="55" rx="6" fill="#48bb78" filter="url(#shadow)"/>
    <text x="65" y="215" text-anchor="middle" class="box-title">Saliency Maps</text>
    <text x="65" y="230" text-anchor="middle" class="detail" fill="#fff" font-size="10">Gradient-based</text>
    <text x="65" y="242" text-anchor="middle" class="detail" fill="#fff" font-size="10">Visualization</text>
  </g>
  
  <!-- Side Concepts Box 3: Counterfactual -->
  <g class="fade-in" style="animation-delay: 1.6s" data-narration="Counterfactual explanations show what changes would alter the prediction">
    <rect x="15" y="260" width="100" height="55" rx="6" fill="#ed8936" filter="url(#shadow)"/>
    <text x="65" y="280" text-anchor="middle" class="box-title">Counterfactual</text>
    <text x="65" y="295" text-anchor="middle" class="detail" fill="#fff" font-size="10">"What-if"</text>
    <text x="65" y="307" text-anchor="middle" class="detail" fill="#fff" font-size="10">Scenarios</text>
  </g>
  
  <!-- Side Concepts Box 4: Attention -->
  <g class="fade-in" style="animation-delay: 1.8s" data-narration="Attention mechanisms in transformers provide interpretable weights">
    <rect x="305" y="130" width="100" height="55" rx="6" fill="#f56565" filter="url(#shadow)"/>
    <text x="355" y="150" text-anchor="middle" class="box-title">Attention</text>
    <text x="355" y="165" text-anchor="middle" class="detail" fill="#fff" font-size="10">Transformer</text>
    <text x="355" y="177" text-anchor="middle" class="detail" fill="#fff" font-size="10">Weight Maps</text>
  </g>
  
  <!-- Bottom Legend -->
  <g class="fade-in" style="animation-delay: 2s" data-narration="Two main approaches: intrinsic interpretability and post-hoc explanations">
    <rect x="20" y="340" width="180" height="45" rx="6" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
    <text x="110" y="358" text-anchor="middle" class="label" font-size="12">Intrinsic Interpretability</text>
    <text x="110" y="373" text-anchor="middle" class="detail">Transparent model design</text>
    
    <rect x="220" y="340" width="180" height="45" rx="6" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
    <text x="310" y="358" text-anchor="middle" class="label" font-size="12">Post-Hoc Explanations</text>
    <text x="310" y="373" text-anchor="middle" class="detail">Explaining black-box models</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="395" cy="30" r="8" fill="#5b9bd5" opacity="0.3" class="pulse"/>
  <circle cx="25" cy="370" r="6" fill="#667eea" opacity="0.3" class="pulse" style="animation-delay: 0.5s"/>
</svg>