<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="lime-shap-attribution" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff"/>
      <stop offset="50%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#fff3e0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb"/>
      <stop offset="100%" style="stop-color:#90caf9"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7"/>
      <stop offset="100%" style="stop-color:#ce93d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .arrow { animation: fadeIn 0.5s ease-out 1s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .float-element { animation: float 3s ease-in-out infinite; }
    .feature-bar { transition: width 0.8s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#37474f" class="title">LIME &amp; SHAP Attribution</text>
  <text x="210" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#607d8b">Explainable AI Methods</text>
  
  <!-- Box 1: Original Instance -->
  <g class="box1" data-narration="The original input instance - a data point requiring explanation">
    <rect x="20" y="60" width="85" height="90" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="62" y="78" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Input</text>
    <text x="62" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="#1976d2">Instance</text>
    <rect x="30" y="105" width="65" height="35" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="1"/>
    <text x="62" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#0d47a1">x = [2, 5, 1]</text>
    <text x="62" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">f(x) = 0.87</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow">
    <path d="M110 105 L145 105" stroke="#78909c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="145,105 138,102 138,108" fill="#78909c"/>
  </g>
  
  <!-- Box 2: Perturbation -->
  <g class="box2" data-narration="LIME perturbs the instance by sampling nearby data points with slight variations">
    <rect x="150" y="60" width="85" height="90" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="192" y="78" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Perturb</text>
    <text x="192" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="#388e3c">&amp; Sample</text>
    <circle cx="175" cy="118" r="6" fill="#81c784" class="pulse-element"/>
    <circle cx="192" cy="125" r="6" fill="#66bb6a" class="pulse-element"/>
    <circle cx="209" cy="118" r="6" fill="#4caf50" class="pulse-element"/>
    <circle cx="175" cy="135" r="6" fill="#a5d6a7" class="pulse-element"/>
    <circle cx="209" cy="135" r="6" fill="#81c784" class="pulse-element"/>
    <text x="192" y="148" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">n samples</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow">
    <path d="M240 105 L275 105" stroke="#78909c" stroke-width="2" fill="none"/>
    <polygon points="275,105 268,102 268,108" fill="#78909c"/>
  </g>
  
  <!-- Box 3: Surrogate Model -->
  <g class="box3" data-narration="A weighted interpretable model is trained on perturbed samples to approximate the complex model locally">
    <rect x="280" y="60" width="85" height="90" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="322" y="78" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Surrogate</text>
    <text x="322" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="#ef6c00">Model</text>
    <text x="322" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">g(x) =</text>
    <text x="322" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57c00">w₀ + w₁x₁</text>
    <text x="322" y="142" text-anchor="middle" font-family="Arial" font-size="8" fill="#fb8c00">+ w₂x₂ + ...</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="arrow">
    <path d="M322 155 L322 185" stroke="#78909c" stroke-width="2" fill="none"/>
    <polygon points="322,195 319,188 325,188" fill="#78909c"/>
  </g>
  
  <!-- Box 4: Explanation / Attribution -->
  <g class="box4" data-narration="Feature weights are extracted as explanations - LIME provides local weights, SHAP provides game-theoretic Shapley values">
    <rect x="260" y="200" width="145" height="85" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="332" y="218" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Attribution</text>
    <text x="332" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">Feature Importance</text>
    
    <!-- Feature bars -->
    <text x="270" y="252" font-family="Arial" font-size="8" fill="#6a1b9a">F1</text>
    <rect x="285" y="245" width="50" height="8" rx="2" fill="#e1bee7"/>
    <rect x="285" y="245" width="42" height="8" rx="2" fill="#ab47bc" class="feature-bar float-element"/>
    
    <text x="270" y="267" font-family="Arial" font-size="8" fill="#6a1b9a">F2</text>
    <rect x="285" y="260" width="50" height="8" rx="2" fill="#e1bee7"/>
    <rect x="285" y="260" width="28" height="8" rx="2" fill="#ba68c8" class="feature-bar float-element"/>
    
    <text x="270" y="282" font-family="Arial" font-size="8" fill="#6a1b9a">F3</text>
    <rect x="285" y="275" width="50" height="8" rx="2" fill="#e1bee7"/>
    <rect x="285" y="275" width="15" height="8" rx="2" fill="#ce93d8" class="feature-bar float-element"/>
    
    <text x="350" y="252" font-family="Arial" font-size="7" fill="#4a148c">0.84</text>
    <text x="350" y="267" font-family="Arial" font-size="7" fill="#4a148c">0.56</text>
    <text x="350" y="282" font-family="Arial" font-size="7" fill="#4a148c">0.30</text>
  </g>
  
  <!-- Side concepts box -->
  <g class="box1" data-narration="Key theoretical properties: LIME ensures local fidelity while SHAP satisfies game-theoretic axioms including efficiency, symmetry, and dummy">
    <rect x="20" y="200" width="95" height="85" rx="8" fill="#fff" stroke="#b0bec5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="67" y="218" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#37474f">Key Concepts</text>
    <text x="27" y="235" font-family="Arial" font-size="8" fill="#546e7a">• Local Fidelity</text>
    <text x="27" y="248" font-family="Arial" font-size="8" fill="#546e7a">• Shapley Values</text>
    <text x="27" y="261" font-family="Arial" font-size="8" fill="#546e7a">• Additive Attr.</text>
    <text x="27" y="274" font-family="Arial" font-size="8" fill="#546e7a">• KernelSHAP</text>
  </g>
  
  <!-- Arrow to explanation -->
  <g class="arrow">
    <path d="M120 200 L255 200" stroke="#78909c" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <polygon points="255,200 248,197 248,203" fill="#78909c"/>
  </g>
  
  <!-- LIME vs SHAP comparison -->
  <g class="box2" data-narration="Comparison: LIME uses perturbation and local linear approximation while SHAP computes exact Shapley values with theoretical guarantees">
    <rect x="20" y="295" width="180" height="50" rx="6" fill="#fff" stroke="#90a4ae" stroke-width="1" filter="url(#shadow)"/>
    <text x="110" y="312" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#37474f">LIME vs SHAP</text>
    <text x="35" y="328" font-family="Arial" font-size="8" fill="#1976d2">LIME: Local approx.</text>
    <text x="130" y="328" font-family="Arial" font-size="8" fill="#1976d2">SHAP: Game theory</text>
    <text x="35" y="340" font-family="Arial" font-size="8" fill="#7f8c8d">No consistency g'tee</text>
    <text x="130" y="340" font-family="Arial" font-size="8" fill="#7f8c8d">Efficiency + Symmetry</text>
  </g>
  
  <!-- Formula box -->
  <g class="box3" data-narration="The SHAP efficiency property ensures feature attributions sum to the difference between prediction and baseline">
    <rect x="210" y="295" width="195" height="50" rx="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="1" filter="url(#shadow)"/>
    <text x="307" y="312" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100">SHAP Efficiency</text>
    <text x="307" y="332" text-anchor="middle" font-family="Arial" font-size="11" fill="#bf360c">Σφᵢ = f(x) - E[f(X)]</text>
  </g>
</svg>