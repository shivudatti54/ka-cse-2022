<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="fairness-in-ml" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f0e8f8"/>
    </linearGradient>
    <linearGradient id="circleGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ff8080"/>
    </linearGradient>
    <linearGradient id="circleGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#80ff80"/>
    </linearGradient>
    <linearGradient id="circleGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#8080ff"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .venn-circle { animation: fadeIn 1.5s ease-out; }
    .label-box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .label-box:nth-child(1) { animation-delay: 0.3s; }
    .label-box:nth-child(2) { animation-delay: 0.5s; }
    .label-box:nth-child(3) { animation-delay: 0.7s; }
    .label-box:nth-child(4) { animation-delay: 0.9s; }
    .center-text { animation: pulse 2s ease-in-out infinite; }
    .section-label { animation: slideUp 0.6s ease-out forwards; opacity: 0; }
    .section-label:nth-child(1) { animation-delay: 0.2s; }
    .section-label:nth-child(2) { animation-delay: 0.4s; }
    .section-label:nth-child(3) { animation-delay: 0.6s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#4a4a6a" class="title">Fairness in Machine Learning</text>
  <text x="210" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6a6a8a">Fairness Metrics Comparison</text>
  
  <!-- Venn Diagram -->
  <g transform="translate(210, 200)">
    <!-- Circle 1: Demographic Parity (left) -->
    <circle cx="-60" cy="0" r="70" fill="url(#circleGradient1)" fill-opacity="0.6" stroke="#ff8080" stroke-width="2" class="venn-circle"/>
    
    <!-- Circle 2: Equalized Odds (top right) -->
    <circle cx="30" cy="-50" r="70" fill="url(#circleGradient2)" fill-opacity="0.6" stroke="#80ff80" stroke-width="2" class="venn-circle"/>
    
    <!-- Circle 3: Predictive Parity (bottom right) -->
    <circle cx="30" cy="50" r="70" fill="url(#circleGradient3)" fill-opacity="0.6" stroke="#8080ff" stroke-width="2" class="venn-circle"/>
    
    <!-- Center overlap label -->
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333" font-weight="bold" class="center-text">Impossible</text>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333" class="center-text">Theorem</text>
  </g>
  
  <!-- Labels for each circle -->
  <g data-narration="Demographic Parity: Ensures equal positive prediction rates across groups">
    <text x="85" y="115" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#cc4040">Demographic</text>
    <text x="85" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#cc4040">Parity</text>
    <text x="85" y="148" font-family="Arial, sans-serif" font-size="10" fill="#994040">P(Ŷ=1|A=a)</text>
    <text x="85" y="162" font-family="Arial, sans-serif" font-size="10" fill="#994040">= P(Ŷ=1|A=b)</text>
  </g>
  
  <g data-narration="Equalized Odds: Equal TPR and FPR across groups">
    <text x="290" y="95" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#309030">Equalized</text>
    <text x="290" y="110" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#309030">Odds</text>
    <text x="290" y="128" font-family="Arial, sans-serif" font-size="10" fill="#206020">TPR_A = TPR_B</text>
    <text x="290" y="142" font-family="Arial, sans-serif" font-size="10" fill="#206020">FPR_A = FPR_B</text>
  </g>
  
  <g data-narration="Predictive Parity: Equal PPV across groups">
    <text x="290" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4040cc">Predictive</text>
    <text x="290" y="255" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4040cc">Parity</text>
    <text x="290" y="273" font-family="Arial, sans-serif" font-size="10" fill="#303090">PPV_A = PPV_B</text>
    <text x="290" y="287" font-family="Arial, sans-serif" font-size="10" fill="#303090">Same accuracy</text>
  </g>
  
  <!-- Key concept boxes -->
  <g data-narration="Three main fairness definitions: Demographic Parity, Equalized Odds, and Predictive Parity cannot all be satisfied simultaneously">
    <rect x="10" y="300" width="120" height="85" rx="8" fill="#fff" stroke="#ccc" stroke-width="1" opacity="0.9" class="label-box"/>
    <text x="70" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a4a6a">Key Insight</text>
    <text x="20" y="335" font-family="Arial, sans-serif" font-size="10" fill="#666">Impossibility Theorem:</text>
    <text x="20" y="350" font-family="Arial, sans-serif" font-size="10" fill="#666">Cannot satisfy all 3</text>
    <text x="20" y="365" font-family="Arial, sans-serif" font-size="10" fill="#666">when base rates differ</text>
    <text x="20" y="378" font-family="Arial, sans-serif" font-size="9" fill="#888">(Chouldechova 2017)</text>
  </g>
  
  <g data-narration="Mitigation strategies include pre-processing, in-processing, and post-processing techniques">
    <rect x="140" y="300" width="130" height="85" rx="8" fill="#fff" stroke="#ccc" stroke-width="1" opacity="0.9" class="label-box"/>
    <text x="205" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a4a6a">Mitigation</text>
    <text x="150" y="335" font-family="Arial, sans-serif" font-size="10" fill="#666">• Pre-processing:</text>
    <text x="155" y="348" font-family="Arial, sans-serif" font-size="9" fill="#888">Reweighting</text>
    <text x="150" y="358" font-family="Arial, sans-serif" font-size="10" fill="#666">• In-processing:</text>
    <text x="155" y="371" font-family="Arial, sans-serif" font-size="9" fill="#888">Constrained Opt.</text>
    <text x="150" y="381" font-family="Arial, sans-serif" font-size="10" fill="#666">• Post-processing:</text>
    <text x="155" y="394" font-family="Arial, sans-serif" font-size="9" fill="#888">Threshold Adj.</text>
  </g>
  
  <g data-narration="Bias sources include historical bias, representation bias, and measurement bias">
    <rect x="280" y="300" width="130" height="85" rx="8" fill="#fff" stroke="#ccc" stroke-width="1" opacity="0.9" class="label-box"/>
    <text x="345" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a4a6a">Bias Sources</text>
    <text x="290" y="335" font-family="Arial, sans-serif" font-size="10" fill="#666">• Historical bias</text>
    <text x="290" y="350" font-family="Arial, sans-serif" font-size="10" fill="#666">• Representation bias</text>
    <text x="290" y="365" font-family="Arial, sans-serif" font-size="10" fill="#666">• Measurement bias</text>
    <text x="290" y="380" font-family="Arial, sans-serif" font-size="9" fill="#888">e.g. zip code proxy</text>
  </g>
  
  <!-- Section labels with animation -->
  <g class="section-label">
    <text x="20" y="390" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Group Fairness: Demographic Parity</text>
  </g>
  <g class="section-label">
    <text x="200" y="390" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Individual Fairness: Similar treatment</text>
  </g>
  <g class="section-label">
    <text x="370" y="390" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Trade-off: Utility vs Fairness</text>
  </g>
  
  <!-- Decorative arrow -->
  <g data-narration="Shows the relationship between fairness metrics - they overlap but cannot be fully satisfied together">
    <path d="M 150 220 Q 210 180 270 220" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>
</svg>