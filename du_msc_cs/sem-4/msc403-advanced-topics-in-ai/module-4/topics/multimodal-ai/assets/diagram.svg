<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="multimodal-ai">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="imageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#6c3483"/>
    </linearGradient>
    <linearGradient id="audioGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#1a5c38"/>
    </linearGradient>
    <linearGradient id="fusionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="50%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#922b21"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#d68910"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .text-section { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .image-section { animation: slideInLeft 0.6s ease-out 0.35s both; }
    .audio-section { animation: slideInLeft 0.6s ease-out 0.5s both; }
    .encoder-section { animation: slideInLeft 0.6s ease-out 0.4s both; }
    .fusion-section { animation: slideInUp 0.6s ease-out 0.7s both; }
    .output-section { animation: slideInRight 0.6s ease-out 0.9s both; }
    .arrow-line { animation: fadeIn 0.4s ease-out 1s both; }
    .fusion-arrow { animation: flowDash 1s linear infinite; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="url(#textGrad)" class="title">Multimodal AI Architecture</text>
  
  <!-- Input Modalities Section -->
  <g class="text-section" data-narration="Three input modalities: text, image, and audio/sensor data">
    <!-- Text Input -->
    <rect x="20" y="70" width="70" height="45" rx="6" fill="url(#textGrad)" filter="url(#shadow)"/>
    <text x="55" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">TEXT</text>
    <text x="55" y="105" text-anchor="middle" font-size="9" fill="white">"Analyze this"</text>
    
    <!-- Image Input -->
    <rect x="20" y="130" width="70" height="45" rx="6" fill="url(#imageGrad)" filter="url(#shadow)"/>
    <text x="55" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="white">IMAGE</text>
    <rect x="45" y="158" width="20" height="12" rx="2" fill="white" opacity="0.3"/>
    <circle cx="50" cy="164" r="3" fill="white" opacity="0.5"/>
    
    <!-- Audio Input -->
    <rect x="20" y="190" width="70" height="45" rx="6" fill="url(#audioGrad)" filter="url(#shadow)"/>
    <text x="55" y="208" text-anchor="middle" font-size="12" font-weight="bold" fill="white">AUDIO</text>
    <path d="M42 223 Q47 218 52 223 Q57 228 62 223" stroke="white" stroke-width="2" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Arrows to encoders -->
  <line x1="90" y1="92" x2="115" y2="92" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
  <line x1="90" y1="152" x2="115" y2="152" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
  <line x1="90" y1="212" x2="115" y2="212" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
  
  <!-- Encoders Section -->
  <g class="encoder-section" data-narration="Each modality is processed by a specialized encoder to extract features">
    <rect x="115" y="70" width="85" height="45" rx="6" fill="#5dade2" filter="url(#shadow)" class="pulse-element"/>
    <text x="157" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Text</text>
    <text x="157" y="102" text-anchor="middle" font-size="9" fill="white">Encoder</text>
    
    <rect x="115" y="130" width="85" height="45" rx="6" fill="#a569bd" filter="url(#shadow)" class="pulse-element"/>
    <text x="157" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Image</text>
    <text x="157" y="162" text-anchor="middle" font-size="9" fill="white">Encoder</text>
    
    <rect x="115" y="190" width="85" height="45" rx="6" fill="#58d68d" filter="url(#shadow)" class="pulse-element"/>
    <text x="157" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Audio</text>
    <text x="157" y="222" text-anchor="middle" font-size="9" fill="white">Encoder</text>
  </g>
  
  <!-- Feature Vectors -->
  <g class="arrow-line" data-narration="Encoders produce feature embeddings that represent each modality">
    <text x="205" y="95" font-size="8" fill="#555">[v₁,v₂,...vₙ]</text>
    <text x="205" y="155" font-size="8" fill="#555">[i₁,i₂,...iₙ]</text>
    <text x="205" y="215" font-size="8" fill="#555">[a₁,a₂,...aₙ]</text>
  </g>
  
  <!-- Arrows to fusion -->
  <line x1="200" y1="92" x2="230" y2="150" stroke="#555" stroke-width="2" stroke-dasharray="4,2" class="arrow-line"/>
  <line x1="200" y1="152" x2="230" y2="150" stroke="#555" stroke-width="2" stroke-dasharray="4,2" class="arrow-line"/>
  <line x1="200" y1="212" x2="230" y2="150" stroke="#555" stroke-width="2" stroke-dasharray="4,2" class="arrow-line"/>
  
  <!-- Fusion Layer -->
  <g class="fusion-section" data-narration="Fusion strategies: Early (raw concat), Late (decision-level), Hybrid (cross-attention)">
    <rect x="230" y="120" width="100" height="70" rx="8" fill="url(#fusionGrad)" filter="url(#shadow)" class="pulse-element"/>
    <text x="280" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="white">FUSION</text>
    <text x="280" y="160" text-anchor="middle" font-size="9" fill="white">LAYER</text>
    <text x="280" y="178" text-anchor="middle" font-size="8" fill="white" font-style="italic">Hybrid</text>
  </g>
  
  <!-- Cross-modal arrows -->
  <path d="M255 135 Q270 125 285 135" stroke="#ff9999" stroke-width="1.5" fill="none" class="arrow-line"/>
  <path d="M255 175 Q270 185 285 175" stroke="#ff9999" stroke-width="1.5" fill="none" class="arrow-line"/>
  
  <!-- Arrow to output -->
  <line x1="330" y1="155" x2="355" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
  
  <!-- Output Section -->
  <g class="output-section" data-narration="Fused representations enable multimodal reasoning and task output">
    <rect x="355" y="125" width="55" height="60" rx="6" fill="url(#outputGrad)" filter="url(#shadow)"/>
    <text x="382" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="white">OUTPUT</text>
    <text x="382" y="168" text-anchor="middle" font-size="9" fill="white">Prediction</text>
    <text x="382" y="180" text-anchor="middle" font-size="8" fill="white">&amp; Reasoning</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fusion-section" data-narration="Key fusion strategies explained: early, late, and hybrid approaches">
    <rect x="15" y="255" width="390" height="130" rx="8" fill="white" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Key Fusion Strategies</text>
    
    <!-- Early Fusion -->
    <rect x="30" y="290" width="115" height="30" rx="4" fill="#e8f4fc" stroke="#4a90d9" stroke-width="1"/>
    <text x="87" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d5a87">Early Fusion</text>
    <text x="87" y="316" text-anchor="middle" font-size="8" fill="#555">Raw data concat</text>
    
    <!-- Late Fusion -->
    <rect x="155" y="290" width="115" height="30" rx="4" fill="#f0f8ff" stroke="#9b59b6" stroke-width="1"/>
    <text x="212" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#6c3483">Late Fusion</text>
    <text x="212" y="316" text-anchor="middle" font-size="8" fill="#555">Decision-level</text>
    
    <!-- Hybrid Fusion -->
    <rect x="280" y="290" width="115" height="30" rx="4" fill="#e8f8f0" stroke="#27ae60" stroke-width="1"/>
    <text x="337" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5c38">Hybrid Fusion</text>
    <text x="337" y="316" text-anchor="middle" font-size="8" fill="#555">Cross-attention</text>
    
    <!-- Attention Mechanisms -->
    <rect x="30" y="335" width="185" height="40" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
    <text x="122" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#d68910">Attention Mechanisms</text>
    <text x="122" y="366" text-anchor="middle" font-size="8" fill="#555">Cross-attention, GMU, Transformers</text>
    
    <!-- Cross-Modal Learning -->
    <rect x="225" y="335" width="170" height="40" rx="4" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
    <text x="310" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#922b21">Cross-Modal Learning</text>
    <text x="310" y="366" text-anchor="middle" font-size="8" fill="#555">Contrastive loss, MAE, Retrieval</text>
  </g>
</svg>