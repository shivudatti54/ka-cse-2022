<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="large-language-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="encoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5e5"/>
      <stop offset="100%" style="stop-color:#7cb8cc"/>
    </linearGradient>
    <linearGradient id="decoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c5b8e8"/>
      <stop offset="100%" style="stop-color:#9d8acc"/>
    </linearGradient>
    <linearGradient id="attentionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="ffnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e6b8"/>
      <stop offset="100%" style="stop-color:#81c995"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .input-section { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .encoder-section { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .decoder-section { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .output-section { animation: slideInRight 0.6s ease-out 0.8s forwards; opacity: 0; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .attention-box { animation: slideInUp 0.5s ease-out 0.5s forwards; opacity: 0; }
    .ffn-box { animation: slideInUp 0.5s ease-out 0.7s forwards; opacity: 0; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Large Language Models</text>
  <text x="210" y="45" text-anchor="middle" font-size="12" fill="#5d6d7e" class="title">Transformer Architecture</text>
  
  <!-- Input Section -->
  <g class="input-section" data-narration="Input text is converted to embeddings and positional encoding is added to preserve sequence order">
    <rect x="20" y="60" width="60" height="50" rx="5" fill="#f8d7da" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="50" y="80" text-anchor="middle" font-size="11" fill="#721c24" font-weight="bold">Input</text>
    <text x="50" y="95" text-anchor="middle" font-size="9" fill="#721c24">Text</text>
    
    <rect x="90" y="60" width="65" height="50" rx="5" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="122" y="80" text-anchor="middle" font-size="10" fill="#0c5460" font-weight="bold">Embeddings</text>
    <text x="122" y="95" text-anchor="middle" font-size="9" fill="#0c5460">+ Positional</text>
  </g>
  
  <!-- Arrow to Encoder -->
  <path d="M165 85 L185 85" stroke="#3498db" stroke-width="2" fill="none" class="arrow"/>
  
  <!-- Encoder Stack -->
  <g class="encoder-section" data-narration="Encoder processes input through multi-head self-attention and feed-forward layers with residual connections">
    <rect x="185" y="55" width="95" height="75" rx="8" fill="url(#encoderGrad)" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="232" y="70" text-anchor="middle" font-size="12" fill="#1a5276" font-weight="bold">ENCODER</text>
    
    <!-- Multi-Head Attention in Encoder -->
    <rect x="190" y="78" width="85" height="22" rx="4" fill="url(#attentionGrad)" stroke="#f39c12" stroke-width="1"/>
    <text x="232" y="92" text-anchor="middle" font-size="9" fill="#7d6608">Multi-Head</text>
    <text x="232" y="102" text-anchor="middle" font-size="8" fill="#7d6608">Attention</text>
    
    <!-- FFN in Encoder -->
    <rect x="190" y="103" width="85" height="20" rx="4" fill="url(#ffnGrad)" stroke="#27ae60" stroke-width="1"/>
    <text x="232" y="115" text-anchor="middle" font-size="9" fill="#1e8449">Feed Forward</text>
  </g>
  
  <!-- Arrow from Encoder to Decoder -->
  <path d="M280 85 L300 85 L300 150 L280 150" stroke="#3498db" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="280,150 275,145 275,155" fill="#3498db"/>
  
  <!-- Decoder Stack -->
  <g class="decoder-section" data-narration="Decoder uses masked self-attention, cross-attention with encoder output, and feed-forward layers">
    <rect x="95" y="145" width="95" height="85" rx="8" fill="url(#decoderGrad)" stroke="#7d3c98" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="142" y="162" text-anchor="middle" font-size="12" fill="#4a235a" font-weight="bold">DECODER</text>
    
    <!-- Masked Self-Attention -->
    <rect x="100" y="172" width="85" height="18" rx="4" fill="url(#attentionGrad)" stroke="#f39c12" stroke-width="1"/>
    <text x="142" y="183" text-anchor="middle" font-size="8" fill="#7d6608">Masked Self-Attn</text>
    
    <!-- Cross-Attention -->
    <rect x="100" y="193" width="85" height="18" rx="4" fill="url(#attentionGrad)" stroke="#e67e22" stroke-width="1"/>
    <text x="142" y="204" text-anchor="middle" font-size="8" fill="#7d6608">Cross-Attention</text>
    
    <!-- FFN in Decoder -->
    <rect x="100" y="214" width="85" height="18" rx="4" fill="url(#ffnGrad)" stroke="#27ae60" stroke-width="1"/>
    <text x="142" y="225" text-anchor="middle" font-size="8" fill="#1e8449">Feed Forward</text>
  </g>
  
  <!-- Arrow to Output -->
  <path d="M190 180 L220 180 L220 195" stroke="#3498db" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="220,195 215,190 215,200" fill="#3498db"/>
  
  <!-- Output Section -->
  <g class="output-section" data-narration="Output layer generates probability distribution over vocabulary for next token prediction">
    <rect x="220" y="175" width="60" height="50" rx="5" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="250" y="195" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">Output</text>
    <text x="250" y="210" text-anchor="middle" font-size="9" fill="#1e8449">Probabilities</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key formula: Self-attention computes attention scores between all positions in parallel">
    <rect x="300" y="55" width="110" height="85" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)" style="animation-delay: 1s"/>
    <text x="355" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Key Formula</text>
    <text x="355" y="88" text-anchor="middle" font-size="8" fill="#34495e">Attention(Q,K,V)</text>
    <text x="355" y="100" text-anchor="middle" font-size="7" fill="#34495e">=</text>
    <text x="355" y="112" text-anchor="middle" font-size="7" fill="#7f8c8d">softmax(QK^T/√d_k)V</text>
  </g>
  
  <!-- Scaling Laws Box -->
  <g class="concept-box" data-narration="Scaling laws show performance improves predictably with model size, data, and compute">
    <rect x="300" y="145" width="110" height="50" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)" style="animation-delay: 1.2s"/>
    <text x="355" y="162" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Scaling Laws</text>
    <text x="355" y="178" text-anchor="middle" font-size="8" fill="#7f8c8d">L(N,D) follows</text>
    <text x="355" y="190" text-anchor="middle" font-size="8" fill="#7f8c8d">power-law scaling</text>
  </g>
  
  <!-- Prompt Engineering Box -->
  <g class="concept-box" data-narration="Prompt engineering enables zero-shot and few-shot learning without gradient updates">
    <rect x="300" y="200" width="110" height="55" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)" style="animation-delay: 1.4s"/>
    <text x="355" y="217" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Prompt Engineering</text>
    <text x="355" y="233" text-anchor="middle" font-size="8" fill="#7f8c8d">Zero-shot / Few-shot</text>
    <text x="355" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">Chain-of-Thought</text>
  </g>
  
  <!-- Connection arrows between components -->
  <g class="arrow" style="animation-delay: 1.5s">
    <path d="M50 115 L50 145" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
    <polygon points="50,145 47,140 53,140" fill="#95a5a6"/>
  </g>
  
  <!-- N labels -->
  <text x="25" y="130" font-size="8" fill="#7f8c8d" font-style="italic">Tokens</text>
  <text x="130" y="130" font-size="8" fill="#7f8c8d" font-style="italic">Vectorized</text>
  
  <!-- Flow arrows -->
  <path d="M50 115 Q50 130 122 130" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.6"/>
  <path d="M122 115 Q122 130 232 130" stroke="#17a2b8" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.6"/>
  
  <!-- Bottom annotation -->
  <text x="210" y="260" text-anchor="middle" font-size="9" fill="#5d6d7e" font-style="italic">Architecture: Encoder-Decoder with N× layers</text>
  
  <!-- Legend -->
  <g transform="translate(20, 275)">
    <rect x="0" y="0" width="18" height="12" rx="2" fill="url(#attentionGrad)" stroke="#f39c12"/>
    <text x="22" y="10" font-size="9" fill="#34495e">Self-Attention</text>
    
    <rect x="110" y="0" width="18" height="12" rx="2" fill="url(#ffnGrad)" stroke="#27ae60"/>
    <text x="132" y="10" font-size="9" fill="#34495e">Feed-Forward</text>
    
    <rect x="220" y="0" width="18" height="12" rx="2" fill="url(#encoderGrad)" stroke="#2980b9"/>
    <text x="242" y="10" font-size="9" fill="#34495e">Encoder</text>
    
    <rect x="300" y="0" width="18" height="12" rx="2" fill="url(#decoderGrad)" stroke="#7d3c98"/>
    <text x="322" y="10" font-size="9" fill="#34495e">Decoder</text>
  </g>
  
  <!-- Additional info box -->
  <rect x="20" y="295" width="380" height="40" rx="5" fill="white" stroke="#e8e8e8" stroke-width="1"/>
  <text x="30" y="312" font-size="9" fill="#2c3e50">Examples:</text>
  <text x="30" y="327" font-size="8" fill="#7f8c8d">GPT-3 (175B) • PaLM (540B) • Chinchilla • LLaMA • Claude</text>
  <text x="350" y="327" font-size="7" fill="#95a5a6">Self-supervised</text>
</svg>