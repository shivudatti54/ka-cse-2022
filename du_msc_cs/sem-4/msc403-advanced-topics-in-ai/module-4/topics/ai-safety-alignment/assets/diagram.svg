<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="ai-safety-alignment" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="rewardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342"/>
      <stop offset="100%" style="stop-color:#558b2f"/>
    </linearGradient>
    <linearGradient id="policyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c6bc0"/>
      <stop offset="100%" style="stop-color:#3949ab"/>
    </linearGradient>
    <linearGradient id="humanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a65"/>
      <stop offset="100%" style="stop-color:#e64a19"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #1a3a4a; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #ffffff; }
    .sublabel { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #e0e0e0; }
    .concept-label { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #1a3a4a; font-weight: 600; }
    .concept-detail { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #3d5a6c; }
    .box-anim { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .arrow-anim { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title box-anim">AI Safety &amp; Alignment</text>
  <text x="210" y="50" text-anchor="middle" class="concept-detail box-anim delay-1">RLHF Architecture - Human Feedback Loop</text>
  
  <!-- Central RLHF Diagram -->
  <!-- Human Rater Box -->
  <g class="box-anim delay-2" filter="url(#shadow)">
    <rect x="30" y="150" width="80" height="60" rx="8" fill="url(#humanGradient)"/>
    <text x="70" y="175" text-anchor="middle" class="label">Human</text>
    <text x="70" y="190" text-anchor="middle" class="label">Rater</text>
  </g>
  
  <!-- Feedback Arrow -->
  <g class="arrow-anim delay-3">
    <path d="M 110 180 L 150 180" stroke="#e64a19" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="130" y="170" text-anchor="middle" class="concept-detail">Feedback</text>
  </g>
  
  <!-- Reward Model Box -->
  <g class="box-anim delay-3" filter="url(#shadow)">
    <rect x="150" y="150" width="90" height="70" rx="8" fill="url(#rewardGradient)"/>
    <text x="195" y="175" text-anchor="middle" class="label">Reward</text>
    <text x="195" y="190" text-anchor="middle" class="label">Model</text>
    <text x="195" y="208" text-anchor="middle" class="sublabel">(RM)</text>
  </g>
  
  <!-- Arrow to Policy -->
  <g class="arrow-anim delay-4">
    <path d="M 240 185 L 270 185" stroke="#558b2f" stroke-width="3" fill="none"/>
    <polygon points="270,185 260,180 260,190" fill="#558b2f"/>
    <text x="255" y="175" text-anchor="middle" class="concept-detail">Reward Signal</text>
  </g>
  
  <!-- Policy Network Box -->
  <g class="box-anim delay-4" filter="url(#shadow)">
    <rect x="270" y="140" width="100" height="80" rx="8" fill="url(#policyGradient)"/>
    <text x="320" y="168" text-anchor="middle" class="label">Policy</text>
    <text x="320" y="183" text-anchor="middle" class="label">Network</text>
    <text x="320" y="203" text-anchor="middle" class="sublabel">(LLM)</text>
  </g>
  
  <!-- Output Arrow -->
  <g class="arrow-anim delay-5">
    <path d="M 370 180 L 390 180" stroke="#3949ab" stroke-width="3" fill="none"/>
    <polygon points="390,180 380,175 380,185" fill="#3949ab"/>
  </g>
  
  <!-- Output Box -->
  <g class="box-anim delay-5" filter="url(#shadow)">
    <rect x="390" y="160" width="25" height="40" rx="4" fill="#7986cb"/>
    <text x="402" y="185" text-anchor="middle" class="sublabel" style="fill:#fff">Output</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <!-- Safety Box -->
  <g class="box-anim delay-2" filter="url(#shadow)">
    <rect x="20" y="280" width="115" height="50" rx="6" fill="#ffffff" stroke="#4a90a4" stroke-width="2"/>
    <text x="77" y="300" text-anchor="middle" class="concept-label">Safety</text>
    <text x="77" y="315" text-anchor="middle" class="concept-detail">Preventing harms</text>
    <text x="77" y="327" text-anchor="middle" class="concept-detail">biased decisions</text>
  </g>
  
  <!-- Alignment Box -->
  <g class="box-anim delay-3" filter="url(#shadow)">
    <rect x="145" y="280" width="115" height="50" rx="6" fill="#ffffff" stroke="#7cb342" stroke-width="2"/>
    <text x="202" y="300" text-anchor="middle" class="concept-label">Alignment</text>
    <text x="202" y="315" text-anchor="middle" class="concept-detail">Match human</text>
    <text x="202" y="327" text-anchor="middle" class="concept-detail">values &amp; intentions</text>
  </g>
  
  <!-- Reward Hacking Box -->
  <g class="box-anim delay-4" filter="url(#shadow)">
    <rect x="270" y="280" width="130" height="50" rx="6" fill="#ffffff" stroke="#ff8a65" stroke-width="2"/>
    <text x="335" y="300" text-anchor="middle" class="concept-label">Reward Hacking</text>
    <text x="335" y="315" text-anchor="middle" class="concept-detail">Exploiting loopholes</text>
    <text x="335" y="327" text-anchor="middle" class="concept-detail">to maximize reward</text>
  </g>
  
  <!-- Corrigibility Box -->
  <g class="box-anim delay-5" filter="url(#shadow)">
    <rect x="100" y="340" width="110" height="45" rx="6" fill="#ffffff" stroke="#9575cd" stroke-width="2"/>
    <text x="155" y="360" text-anchor="middle" class="concept-label">Corrigibility</text>
    <text x="155" y="375" text-anchor="middle" class="concept-detail">Safe shutdown allowed</text>
    <text x="155" y="382" text-anchor="middle" class="concept-detail">by design</text>
  </g>
  
  <!-- Assurance Methods -->
  <g class="box-anim delay-5" filter="url(#shadow)">
    <rect x="220" y="340" width="180" height="45" rx="6" fill="#ffffff" stroke="#26a69a" stroke-width="2"/>
    <text x="310" y="360" text-anchor="middle" class="concept-label">Assurance Methods</text>
    <text x="310" y="375" text-anchor="middle" class="concept-detail">Formal Verification | Interpretability | Red Teaming</text>
  </g>
  
  <!-- Arrow from Policy back to Human (iteration loop) -->
  <g class="arrow-anim delay-5">
    <path d="M 320 220 L 320 260 Q 320 270 310 270 L 70 270 Q 50 270 50 250 L 50 200" stroke="#5c6bc0" stroke-width="2" fill="none" stroke-dasharray="5,3" opacity="0.6"/>
    <text x="185" y="265" text-anchor="middle" class="concept-detail" style="font-style:italic">Iterative Improvement Loop</text>
  </g>
  
  <!-- Data narration attributes for accessibility -->
  <title data-narration="AI Safety &amp; Alignment diagram showing the Reinforcement Learning from Human Feedback (RLHF) architecture. Human raters provide feedback to train a reward model, which guides the policy network (large language model) to produce aligned outputs."></title>
</svg>