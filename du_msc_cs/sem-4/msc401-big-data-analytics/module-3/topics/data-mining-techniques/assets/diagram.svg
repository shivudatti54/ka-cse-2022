<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="data-mining-techniques" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe0cc"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6"/>
      <stop offset="100%" style="stop-color:#cce6cc"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6f5"/>
      <stop offset="100%" style="stop-color:#ccccdd"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6e6"/>
      <stop offset="100%" style="stop-color:#e6cccc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideRight {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .section:nth-child(1) { animation-delay: 0.2s; }
    .section:nth-child(2) { animation-delay: 0.4s; }
    .section:nth-child(3) { animation-delay: 0.6s; }
    .section:nth-child(4) { animation-delay: 0.8s; }
    .fptree { animation: slideIn 1s ease-out 0.5s forwards; opacity: 0; }
    .arrow { animation: slideRight 0.6s ease-out forwards; opacity: 0; }
    .pulse-node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c5aa0" class="title">Data Mining Techniques</text>
  
  <g class="section" data-narration="Classification is a supervised learning technique for predicting categorical outcomes using algorithms like Decision Trees, SVM, and Neural Networks">
    <rect x="15" y="55" width="90" height="75" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="60" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#cc6600">Classification</text>
    <text x="60" y="95" text-anchor="middle" font-size="11" fill="#664400">Decision Trees</text>
    <text x="60" y="110" text-anchor="middle" font-size="11" fill="#664400">SVM, Neural Net</text>
    <text x="60" y="122" text-anchor="middle" font-size="10" fill="#996600">Precision/Recall</text>
  </g>
  
  <g class="section" data-narration="Clustering groups similar data points without predefined labels using methods like k-means, DBSCAN, and hierarchical clustering">
    <rect x="115" y="55" width="90" height="75" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="160" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d7d2d">Clustering</text>
    <text x="160" y="95" text-anchor="middle" font-size="11" fill="#1a4d1a">k-means</text>
    <text x="160" y="110" text-anchor="middle" font-size="11" fill="#1a4d1a">DBSCAN</text>
    <text x="160" y="122" text-anchor="middle" font-size="10" fill="#2d7d2d">Silhouette</text>
  </g>
  
  <g class="section" data-narration="Association Rule Learning discovers relationships between variables in transactional databases using Apriori and FP-Growth algorithms">
    <rect x="215" y="55" width="90" height="75" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="260" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#5c5c99">Association</text>
    <text x="260" y="95" text-anchor="middle" font-size="11" fill="#3d3d66">Apriori</text>
    <text x="260" y="110" text-anchor="middle" font-size="11" fill="#3d3d66">FP-Growth</text>
    <text x="260" y="122" text-anchor="middle" font-size="10" fill="#5c5c99">Support/Confidence</text>
  </g>
  
  <g class="section" data-narration="Regression Analysis predicts continuous numerical values using linear regression, LASSO, and regularization techniques for high-dimensional data">
    <rect x="315" y="55" width="90" height="75" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="360" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#993333">Regression</text>
    <text x="360" y="95" text-anchor="middle" font-size="11" fill="#662222">Linear</text>
    <text x="360" y="110" text-anchor="middle" font-size="11" fill="#662222">LASSO</text>
    <text x="360" y="122" text-anchor="middle" font-size="10" fill="#993333">Regularization</text>
  </g>
  
  <g class="fptree" data-narration="FP-Tree Structure shows compressed frequent pattern tree with root node, item nodes, and header table for efficient pattern mining">
    <text x="210" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c5aa0">FP-Tree Structure</text>
    
    <rect x="145" y="170" width="130" height="18" rx="3" fill="#fff" stroke="#5c5c99" stroke-width="1"/>
    <text x="210" y="183" text-anchor="middle" font-size="10" fill="#333">Header Table</text>
    
    <line x1="175" y1="188" x2="175" y2="210" stroke="#999" stroke-width="1" stroke-dasharray="3"/>
    <text x="158" y="205" font-size="9" fill="#5c5c99">I2:3</text>
    <line x1="210" y1="188" x2="210" y2="210" stroke="#999" stroke-width="1" stroke-dasharray="3"/>
    <text x="210" y="205" font-size="9" fill="#5c5c99">I1:3</text>
    <line x1="245" y1="188" x2="245" y2="210" stroke="#999" stroke-width="1" stroke-dasharray="3"/>
    <text x="252" y="205" font-size="9" fill="#5c5c99">I3:1</text>
    
    <ellipse cx="210" cy="230" rx="25" ry="15" fill="#e6e6f5" stroke="#5c5c99" stroke-width="2" class="pulse-node"/>
    <text x="210" y="234" text-anchor="middle" font-size="11" font-weight="bold" fill="#3d3d66">ROOT</text>
    
    <line x1="195" y1="243" x2="155" y2="270" stroke="#5c5c99" stroke-width="1.5"/>
    <ellipse cx="150" cy="278" rx="22" ry="14" fill="#d4e8f0" stroke="#2c5aa0" stroke-width="1.5"/>
    <text x="150" y="282" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c5aa0">I2:3</text>
    
    <line x1="225" y1="243" x2="265" y2="270" stroke="#5c5c99" stroke-width="1.5"/>
    <ellipse cx="270" cy="278" rx="22" ry="14" fill="#d4e8f0" stroke="#2c5aa0" stroke-width="1.5"/>
    <text x="270" y="282" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c5aa0">I1:3</text>
    
    <line x1="155" y1="290" x2="130" y2="315" stroke="#5c5c99" stroke-width="1"/>
    <ellipse cx="125" cy="323" rx="20" ry="12" fill="#ffe0cc" stroke="#cc6600" stroke-width="1"/>
    <text x="125" y="327" text-anchor="middle" font-size="9" fill="#cc6600">I1:2</text>
    
    <line x1="155" y1="290" x2="180" y2="315" stroke="#5c5c99" stroke-width="1"/>
    <ellipse cx="185" cy="323" rx="20" ry="12" fill="#cce6cc" stroke="#2d7d2d" stroke-width="1"/>
    <text x="185" y="327" text-anchor="middle" font-size="9" fill="#2d7d2d">I3:1</text>
    
    <line x1="270" y1="290" x2="295" y2="315" stroke="#5c5c99" stroke-width="1"/>
    <ellipse cx="300" cy="323" rx="20" ry="12" fill="#ffe0cc" stroke="#cc6600" stroke-width="1"/>
    <text x="300" y="327" text-anchor="middle" font-size="9" fill="#cc6600">I2:1</text>
  </g>
  
  <g class="arrow">
    <path d="M 60 140 L 60 165" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow" style="animation-delay: 0.3s">
    <path d="M 160 140 L 160 165" stroke="#666" stroke-width="1.5" fill="none"/>
  </g>
  <g class="arrow" style="animation-delay: 0.5s">
    <path d="M 260 140 L 260 165" stroke="#666" stroke-width="1.5" fill="none"/>
  </g>
  <g class="arrow" style="animation-delay: 0.7s">
    <path d="M 360 140 L 360 165" stroke="#666" stroke-width="1.5" fill="none"/>
  </g>
  
  <g data-narration="Key metrics used in data mining: Support measures frequency, Confidence shows rule strength, Lift indicates improvement over random chance">
    <rect x="15" y="355" width="180" height="35" rx="5" fill="#fff" stroke="#aaa" stroke-width="1" opacity="0.9"/>
    <text x="105" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Key Metrics</text>
    <text x="105" y="383" text-anchor="middle" font-size="10" fill="#555">Support | Confidence | Lift</text>
  </g>
  
  <g data-narration="Applications span healthcare for disease prediction, banking for fraud detection, and retail for market basket analysis">
    <rect x="210" y="355" width="195" height="35" rx="5" fill="#fff" stroke="#aaa" stroke-width="1" opacity="0.9"/>
    <text x="307" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Applications</text>
    <text x="307" y="383" text-anchor="middle" font-size="10" fill="#555">Healthcare • Banking • Retail</text>
  </g>
</svg>