<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="graph-analytics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .section-anim-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-anim-2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-anim-3 { animation: slideUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .node-anim { animation: pulse 2s ease-in-out infinite; }
    .queue-anim { animation: slideInLeft 0.5s ease-out 0.5s forwards; opacity: 0; }
    .stack-anim { animation: slideInRight 0.5s ease-out 0.6s forwards; opacity: 0; }
    .pulse-node { animation: pulse 1.5s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-size: 22px; font-weight: bold; fill: #2d3748; }
    .section-title { font-size: 16px; font-weight: 600; fill: #4a5568; }
    .label-text { font-size: 13px; fill: #4a5568; }
    .detail-text { font-size: 11px; fill: #718096; }
    .concept-text { font-size: 11px; fill: #553c9a; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title Section -->
  <g class="title-anim">
    <text x="210" y="28" text-anchor="middle" class="title-text">Graph Analytics</text>
    <text x="210" y="46" text-anchor="middle" class="detail-text">BFS vs DFS Traversal Comparison</text>
    <line x1="40" y1="55" x2="380" y2="55" stroke="#cbd5e0" stroke-width="1"/>
  </g>
  
  <!-- BFS Section (Left) -->
  <g class="section-anim-1" data-narration="BFS uses a Queue (FIFO) for level-by-level traversal">
    <rect x="15" y="70" width="180" height="145" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="105" y="88" text-anchor="middle" class="section-title" fill="#2b6cb0">BFS - Breadth First</text>
    <text x="105" y="103" text-anchor="middle" class="detail-text" fill="#3182ce">Level-order Traversal</text>
    
    <!-- Simple Graph for BFS -->
    <g transform="translate(55, 115)">
      <circle cx="30" cy="20" r="12" fill="#4299e1" class="pulse-node"/>
      <circle cx="10" cy="45" r="10" fill="#90cdf4"/>
      <circle cx="50" cy="45" r="10" fill="#90cdf4"/>
      <circle cx="20" cy="70" r="8" fill="#bee3f8"/>
      <circle cx="40" cy="70" r="8" fill="#bee3f8"/>
      <line x1="30" y1="20" x2="10" y2="45" stroke="#2c5282" stroke-width="1.5"/>
      <line x1="30" y1="20" x2="50" y2="45" stroke="#2c5282" stroke-width="1.5"/>
      <line x1="10" y1="45" x2="20" y2="70" stroke="#2c5282" stroke-width="1.5"/>
      <line x1="50" y1="45" x2="40" y2="70" stroke="#2c5282" stroke-width="1.5"/>
      <text x="30" y="24" text-anchor="middle" fill="white" font-size="9" font-weight="bold">A</text>
      <text x="10" y="49" text-anchor="middle" fill="white" font-size="8" font-weight="bold">B</text>
      <text x="50" y="49" text-anchor="middle" fill="white" font-size="8" font-weight="bold">C</text>
      <text x="20" y="74" text-anchor="middle" fill="#2c5282" font-size="7" font-weight="bold">D</text>
      <text x="40" y="74" text-anchor="middle" fill="#2c5282" font-size="7" font-weight="bold">E</text>
    </g>
    
    <!-- Queue Visualization -->
    <g class="queue-anim">
      <rect x="25" y="195" width="160" height="15" fill="#e2e8f0" rx="3"/>
      <text x="30" y="207" class="label-text" fill="#4a5568" font-size="10">Queue:</text>
      <rect x="70" y="196" width="20" height="13" fill="#4299e1" rx="2"/>
      <text x="80" y="206" text-anchor="middle" fill="white" font-size="8">A</text>
      <rect x="92" y="196" width="20" height="13" fill="#4299e1" rx="2"/>
      <text x="102" y="206" text-anchor="middle" fill="white" font-size="8">B</text>
      <rect x="114" y="196" width="20" height="13" fill="#4299e1" rx="2"/>
      <text x="124" y="206" text-anchor="middle" fill="white" font-size="8">C</text>
      <text x="170" y="207" class="detail-text" fill="#718096" font-size="9">← FIFO</text>
    </g>
  </g>
  
  <!-- DFS Section (Right) -->
  <g class="section-anim-2" data-narration="DFS uses a Stack (LIFO) for depth-first exploration">
    <rect x="225" y="70" width="180" height="145" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="315" y="88" text-anchor="middle" class="section-title" fill="#805ad5">DFS - Depth First</text>
    <text x="315" y="103" text-anchor="middle" class="detail-text" fill="#6b46c1">Depth-order Traversal</text>
    
    <!-- Same Graph for DFS -->
    <g transform="translate(265, 115)">
      <circle cx="30" cy="20" r="12" fill="#9f7aea" class="pulse-node"/>
      <circle cx="10" cy="45" r="10" fill="#b794f4"/>
      <circle cx="50" cy="45" r="10" fill="#b794f4"/>
      <circle cx="20" cy="70" r="8" fill="#d6bcfa"/>
      <circle cx="40" cy="70" r="8" fill="#d6bcfa"/>
      <line x1="30" y1="20" x2="10" y2="45" stroke="#553c9a" stroke-width="1.5"/>
      <line x1="30" y1="20" x2="50" y2="45" stroke="#553c9a" stroke-width="1.5"/>
      <line x1="10" y1="45" x2="20" y2="70" stroke="#553c9a" stroke-width="1.5"/>
      <line x1="50" y1="45" x2="40" y2="70" stroke="#553c9a" stroke-width="1.5"/>
      <text x="30" y="24" text-anchor="middle" fill="white" font-size="9" font-weight="bold">A</text>
      <text x="10" y="49" text-anchor="middle" fill="white" font-size="8" font-weight="bold">B</text>
      <text x="50" y="49" text-anchor="middle" fill="white" font-size="8" font-weight="bold">C</text>
      <text x="20" y="74" text-anchor="middle" fill="#553c9a" font-size="7" font-weight="bold">D</text>
      <text x="40" y="74" text-anchor="middle" fill="#553c9a" font-size="7" font-weight="bold">E</text>
    </g>
    
    <!-- Stack Visualization -->
    <g class="stack-anim">
      <rect x="235" y="195" width="160" height="15" fill="#e2e8f0" rx="3"/>
      <text x="240" y="207" class="label-text" fill="#4a5568" font-size="10">Stack:</text>
      <rect x="290" y="196" width="20" height="13" fill="#9f7aea" rx="2"/>
      <text x="300" y="206" text-anchor="middle" fill="white" font-size="8">D</text>
      <rect x="312" y="196" width="20" height="13" fill="#9f7aea" rx="2"/>
      <text x="322" y="206" text-anchor="middle" fill="white" font-size="8">B</text>
      <rect x="334" y="196" width="20" height="13" fill="#9f7aea" rx="2"/>
      <text x="344" y="206" text-anchor="middle" fill="white" font-size="8">E</text>
      <text x="370" y="207" class="detail-text" fill="#718096" font-size="9">↑ LIFO</text>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="section-anim-3" data-narration="Key graph analytics concepts include centrality measures and community detection">
    <rect x="15" y="225" width="390" height="165" fill="white" rx="6" filter="url(#shadow)"/>
    <text x="210" y="245" text-anchor="middle" class="section-title">Key Concepts in Graph Analytics</text>
    
    <!-- Concept Boxes -->
    <g transform="translate(30, 260)">
      <rect x="0" y="0" width="115" height="55" fill="#f0fff4" rx="4" stroke="#48bb78" stroke-width="1"/>
      <text x="57" y="18" text-anchor="middle" class="concept-text" font-weight="600">Centrality Measures</text>
      <text x="57" y="35" text-anchor="middle" class="detail-text">PageRank, Betweenness</text>
      <text x="57" y="48" text-anchor="middle" class="detail-text">Eigenvector Centrality</text>
    </g>
    
    <g transform="translate(152, 260)">
      <rect x="0" y="0" width="115" height="55" fill="#fff5f5" rx="4" stroke="#fc8181" stroke-width="1"/>
      <text x="57" y="18" text-anchor="middle" class="concept-text" font-weight="600">Community Detection</text>
      <text x="57" y="35" text-anchor="middle" class="detail-text">Louvain, Girvan-Newman</text>
      <text x="57" y="48" text-anchor="middle" class="detail-text">Label Propagation</text>
    </g>
    
    <g transform="translate(274, 260)">
      <rect x="0" y="0" width="115" height="55" fill="#ebf8ff" rx="4" stroke="#63b3ed" stroke-width="1"/>
      <text x="57" y="18" text-anchor="middle" class="concept-text" font-weight="600">Graph Storage</text>
      <text x="57" y="35" text-anchor="middle" class="detail-text">Adjacency List/Matrix</text>
      <text x="57" y="48" text-anchor="middle" class="detail-text">Property Graphs, RDF</text>
    </g>
    
    <!-- Comparison Arrow -->
    <g transform="translate(180, 325)">
      <text x="30" y="0" text-anchor="middle" class="label-text" fill="#4a5568" font-size="11">Time Complexity</text>
      <line x1="0" y1="15" x2="60" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      <line x1="0" y1="10" x2="8" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      <line x1="0" y1="20" x2="8" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      <text x="30" y="32" text-anchor="middle" class="detail-text">BFS: O(V+E)</text>
      <text x="30" y="44" text-anchor="middle" class="detail-text">DFS: O(V+E)</text>
    </g>
    
    <g transform="translate(260, 325)">
      <text x="30" y="0" text-anchor="middle" class="label-text" fill="#4a5568" font-size="11">Use Cases</text>
      <line x1="0" y1="15" x2="60" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      <line x1="52" y1="10" x2="60" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      <line x1="52" y1="20" x2="60" y2="15" stroke="#cbd5e0" stroke-width="2"/>
      <text x="30" y="32" text-anchor="middle" class="detail-text">BFS: Shortest Path</text>
      <text x="30" y="44" text-anchor="middle" class="detail-text">DFS: Cycle Detection</text>
    </g>
  </g>
  
  <!-- Application Tags -->
  <g class="section-anim-3" data-narration="Graph analytics applications span social networks, fraud detection, and infrastructure modeling">
    <g transform="translate(30, 375)">
      <rect x="0" y="0" width="75" height="18" fill="#805ad5" rx="9"/>
      <text x="37" y="13" text-anchor="middle" fill="white" font-size="9">Fraud Detection</text>
    </g>
    <g transform="translate(112, 375)">
      <rect x="0" y="0" width="75" height="18" fill="#3182ce" rx="9"/>
      <text x="37" y="13" text-anchor="middle" fill="white" font-size="9">Social Networks</text>
    </g>
    <g transform="translate(194, 375)">
      <rect x="0" y="0" width="75" height="18" fill="#38a169" rx="9"/>
      <text x="37" y="13" text-anchor="middle" fill="white" font-size="9">Road Networks</text>
    </g>
    <g transform="translate(276, 375)">
      <rect x="0" y="0" width="75" height="18" fill="#d69e2e" rx="9"/>
      <text x="37" y="13" text-anchor="middle" fill="white" font-size="9">Bioinformatics</text>
    </g>
  </g>
</svg>