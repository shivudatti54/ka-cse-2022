<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ml-at-scale">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#e8e8f5"/>
      <stop offset="100%" style="stop-color:#f5e8f0"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="workerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6bb3f0"/>
      <stop offset="100%" style="stop-color:#4a90d9"/>
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b6dd3"/>
      <stop offset="100%" style="stop-color:#7b4bb3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title-text { animation: fadeIn 0.8s ease-out forwards; }
    .card-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .card-2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .card-3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .worker { animation: fadeIn 0.5s ease-out 0.3s forwards; opacity: 0; }
    .server { animation: fadeIn 0.5s ease-out 0.5s forwards; opacity: 0; }
    .arrow { animation: dataFlow 1s linear infinite; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .icon-rotate { animation: rotate 8s linear infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" class="title-text">ML at Scale</text>
  <text x="210" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d6d7e">Distributed Machine Learning Architecture</text>
  
  <!-- Data Sources Section -->
  <g data-narration="Data sources: massive datasets and streaming data from various origins">
    <rect x="20" y="75" width="85" height="60" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="62" y="95" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Data</text>
    <text x="62" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d6d7e">Petabytes</text>
    <circle cx="62" cy="125" r="6" fill="#3498db" class="pulse-element"/>
  </g>
  
  <g data-narration="Streaming data from IoT, social media, real-time sources">
    <rect x="115" y="75" width="85" height="60" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="157" y="95" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Streaming</text>
    <text x="157" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#5d6d7e">Real-time</text>
    <circle cx="157" cy="125" r="6" fill="#e74c3c" class="pulse-element"/>
  </g>
  
  <!-- Arrow from data to distributed training -->
  <path d="M150 145 L150 165" stroke="#3498db" stroke-width="2" fill="none" class="arrow" stroke-dasharray="5,3"/>
  
  <!-- Distributed Training Architecture -->
  <g data-narration="Distributed training with multiple workers and parameter server">
    <!-- Worker Nodes -->
    <g class="worker">
      <rect x="60" y="175" width="70" height="50" rx="5" fill="url(#workerGradient)" filter="url(#shadow)"/>
      <text x="95" y="198" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Worker 1</text>
      <text x="95" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="white">GPU/TPU</text>
    </g>
    
    <g class="worker">
      <rect x="140" y="175" width="70" height="50" rx="5" fill="url(#workerGradient)" filter="url(#shadow)"/>
      <text x="175" y="198" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Worker 2</text>
      <text x="175" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="white">GPU/TPU</text>
    </g>
    
    <g class="worker">
      <rect x="220" y="175" width="70" height="50" rx="5" fill="url(#workerGradient)" filter="url(#shadow)"/>
      <text x="255" y="198" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Worker N</text>
      <text x="255" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="white">GPU/TPU</text>
    </g>
    
    <!-- Arrows to parameter server -->
    <path d="M95 225 L95 250 L210 250 L210 275" stroke="#9b6dd3" stroke-width="2" fill="none" class="arrow" stroke-dasharray="5,3"/>
    <path d="M175 225 L175 260 L210 260 L210 275" stroke="#9b6dd3" stroke-width="2" fill="none" class="arrow" stroke-dasharray="5,3"/>
    <path d="M255 225 L255 250 L210 250 L210 275" stroke="#9b6dd3" stroke-width="2" fill="none" class="arrow" stroke-dasharray="5,3"/>
    
    <!-- Parameter Server -->
    <g class="server">
      <rect x="170" y="285" width="80" height="45" rx="5" fill="url(#serverGradient)" filter="url(#shadow)"/>
      <text x="210" y="305" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Parameter</text>
      <text x="210" y="320" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Server</text>
    </g>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g data-narration="Data Parallelism: Split data across workers, each computes gradients locally">
    <rect x="20" y="345" width="90" height="45" rx="4" fill="#ffffff" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)" class="card-1"/>
    <text x="65" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">Data Parallelism</text>
    <text x="65" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#5d6d7e">Split data</text>
  </g>
  
  <g data-narration="Model Parallelism: Split large model across multiple devices">
    <rect x="115" y="345" width="90" height="45" rx="4" fill="#ffffff" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)" class="card-2"/>
    <text x="160" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">Model Parallelism</text>
    <text x="160" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#5d6d7e">Split model</text>
  </g>
  
  <g data-narration="AllReduce: Efficient gradient aggregation algorithm">
    <rect x="210" y="345" width="90" height="45" rx="4" fill="#ffffff" stroke="#9b6dd3" stroke-width="1.5" filter="url(#shadow)" class="card-3"/>
    <text x="255" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">AllReduce</text>
    <text x="255" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#5d6d7e">Ring sync</text>
  </g>
  
  <g data-narration="Federated Learning: Train across edge devices without sharing raw data">
    <rect x="305" y="345" width="100" height="45" rx="4" fill="#ffffff" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)" class="card-3"/>
    <text x="355" y="360" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">Federated</text>
    <text x="355" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#5d6d7e">Learning</text>
  </g>
  
  <!-- Output/Results -->
  <g data-narration="Trained models ready for inference at scale">
    <rect x="315" y="75" width="90" height="55" rx="6" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <text x="360" y="95" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c3e50">Trained</text>
    <text x="360" y="110" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2c3e50">Model</text>
    <circle cx="360" cy="122" r="5" fill="#27ae60" class="pulse-element"/>
  </g>
  
  <!-- Framework Labels -->
  <g data-narration="Distributed ML frameworks: TensorFlow, PyTorch, Horovod">
    <text x="255" y="235" text-anchor="middle" font-family="Arial" font-size="8" fill="#5d6d7e">TFX | PyTorch | Horovod</text>
  </g>
  
  <!-- Rotating gear icon representing computation -->
  <g class="icon-rotate" transform="translate(355, 230)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#6bb3f0" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="0" cy="0" r="8" fill="#6bb3f0" opacity="0.5"/>
  </g>
  
  <!-- Connecting lines for output -->
  <path d="M290 102 L315 102" stroke="#27ae60" stroke-width="1.5" fill="none" class="arrow" stroke-dasharray="4,2"/>
</svg>