<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="spark-streaming-flink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f7f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flinkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ec1e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3f83b8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 5,5; animation: flowDash 1s linear infinite; }
    .spark-box { fill: url(#sparkGradient); }
    .flink-box { fill: url(#flinkGradient); }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" class="fade-in">Spark Streaming vs Apache Flink</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666" class="fade-in">Stream Processing Architectures</text>
  
  <!-- Spark Streaming Section -->
  <g class="fade-in" data-narration="Spark Streaming uses micro-batch processing with DStreams">
    <rect x="20" y="70" width="180" height="130" rx="8" fill="#fff" stroke="#ff8c00" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff8c00">Spark Streaming</text>
    <text x="110" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Micro-Batch Processing</text>
    
    <!-- Driver -->
    <rect x="35" y="115" width="60" height="25" rx="4" fill="#ffb347"/>
    <text x="65" y="132" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Driver</text>
    
    <!-- DStreams -->
    <rect x="100" y="115" width="80" height="25" rx="4" fill="#ffcc80"/>
    <text x="140" y="132" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">DStreams</text>
    
    <!-- Receivers -->
    <rect x="35" y="150" width="55" height="20" rx="4" fill="#ffe0b2"/>
    <text x="62" y="164" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Receivers</text>
    
    <!-- Workers -->
    <rect x="100" y="150" width="80" height="20" rx="4" fill="#ffe0b2"/>
    <text x="140" y="164" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">Workers</text>
    
    <!-- Micro-batch visual -->
    <g class="pulse">
      <rect x="50" y="180" width="120" height="10" rx="3" fill="#fff3e0" stroke="#ff8c00" stroke-width="1"/>
      <text x="110" y="188" text-anchor="middle" font-family="Arial" font-size="7" fill="#ff8c00">500ms-2s batches</text>
    </g>
  </g>
  
  <!-- Flink Section -->
  <g class="fade-in" data-narration="Flink uses true streaming with record-at-a-time processing">
    <rect x="220" y="70" width="180" height="130" rx="8" fill="#fff" stroke="#3f83b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="310" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3f83b8">Apache Flink</text>
    <text x="310" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">True Streaming Model</text>
    
    <!-- JobManager -->
    <rect x="235" y="115" width="65" height="25" rx="4" fill="#6ec1e4"/>
    <text x="267" y="132" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">JobManager</text>
    
    <!-- TaskManagers -->
    <rect x="305" y="115" width="75" height="25" rx="4" fill="#9cd5f0"/>
    <text x="342" y="132" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">TaskManagers</text>
    
    <!-- Event Stream -->
    <rect x="235" y="150" width="145" height="20" rx="4" fill="#b3e5fc"/>
    <text x="307" y="164" text-anchor="middle" font-family="Arial" font-size="9" fill="#0277bd" font-weight="bold">Event Stream →</text>
    
    <!-- Millisecond latency -->
    <g class="pulse">
      <rect x="250" y="180" width="120" height="10" rx="3" fill="#e1f5fe" stroke="#3f83b8" stroke-width="1"/>
      <text x="310" y="188" text-anchor="middle" font-family="Arial" font-size="7" fill="#3f83b8">millisecond latency</text>
    </g>
  </g>
  
  <!-- Comparison Arrows -->
  <g class="slide-in">
    <path d="M 110 210 Q 110 230 110 250" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="110" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Micro-batches</text>
  </g>
  <g class="slide-in">
    <path d="M 310 210 Q 310 230 310 250" stroke="#666" stroke-width="2" fill="none"/>
    <text x="310" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Record-at-a-time</text>
  </g>
  
  <!-- Key Concepts Box 1 -->
  <g class="fade-in" data-narration="State management differs: Spark uses checkpoints, Flink uses incremental checkpoints">
    <rect x="20" y="280" width="180" height="55" rx="6" fill="#fff" stroke="#9c27b0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="298" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9c27b0">State Management</text>
    <text x="110" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Spark: RDD checkpoints</text>
    <text x="110" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Flink: Incremental checkpoints</text>
  </g>
  
  <!-- Key Concepts Box 2 -->
  <g class="fade-in" data-narration="Event-time processing: Flink has watermarks, Spark uses batch-time approximation">
    <rect x="220" y="280" width="180" height="55" rx="6" fill="#fff" stroke="#4caf50" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="310" y="298" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#4caf50">Event-Time Processing</text>
    <text x="310" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Flink: Watermarks + Windows</text>
    <text x="310" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Spark: Batch-time approx.</text>
  </g>
  
  <!-- Bottom Summary -->
  <g class="fade-in" data-narration="Choose Spark for throughput, Flink for low latency and complex event processing">
    <rect x="60" y="350" width="300" height="35" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="370" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">
      <tspan font-weight="bold">Use Case:</tspan> Spark for throughput → Flink for complex event processing
    </text>
  </g>
  
  <!-- Data Flow Animation Indicators -->
  <g class="flow-line">
    <circle cx="65" cy="175" r="3" fill="#ff8c00"/>
    <circle cx="140" cy="175" r="3" fill="#ff8c00"/>
    <circle cx="267" cy="175" r="3" fill="#3f83b8"/>
    <circle cx="342" cy="175" r="3" fill="#3f83b8"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(170, 385)">
    <circle r="4" fill="#ff8c00" class="pulse"/>
    <text x="8" y="4" font-family="Arial" font-size="8" fill="#666">Spark</text>
    <circle cx="60" r="4" fill="#3f83b8" class="pulse"/>
    <text x="68" y="4" font-family="Arial" font-size="8" fill="#666">Flink</text>
  </g>
</svg>