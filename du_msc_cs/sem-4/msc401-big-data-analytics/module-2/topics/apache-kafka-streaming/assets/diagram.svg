<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="apache-kafka-streaming">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f5ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="producerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da" />
      <stop offset="100%" style="stop-color:#4a90c2" />
    </linearGradient>
    <linearGradient id="kafkaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a9c9" />
      <stop offset="100%" style="stop-color:#8b6bae" />
    </linearGradient>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9fd5d1" />
      <stop offset="100%" style="stop-color:#5eb8b0" />
    </linearGradient>
    <linearGradient id="consumerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c6a5" />
      <stop offset="100%" style="stop-color:#e8906a" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideIn 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideIn 0.8s ease-out 0.6s both; }
    .section-4 { animation: slideIn 0.8s ease-out 0.8s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-line { stroke-dasharray: 10, 5; animation: flowRight 1s linear infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#333" class="title">Apache Kafka Streaming</text>
  <text x="210" y="50" text-anchor="middle" font-size="12" fill="#666" class="title">Real-Time Data Processing Pipeline</text>
  
  <!-- Producer Section -->
  <g class="section-1" data-narration="Producers: Data sources that publish events to Kafka topics">
    <rect x="20" y="80" width="80" height="60" rx="8" fill="url(#producerGrad)" filter="url(#shadow)" />
    <text x="60" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Producers</text>
    <text x="60" y="125" text-anchor="middle" font-size="10" fill="white">Data Sources</text>
    <circle cx="60" cy="100" r="8" fill="white" fill-opacity="0.3" class="pulse" />
  </g>
  
  <!-- Kafka Cluster Section -->
  <g class="section-2" data-narration="Kafka Cluster: Stores messages in topics with partitions for parallelism">
    <rect x="130" y="70" width="120" height="90" rx="8" fill="url(#kafkaGrad)" filter="url(#shadow)" />
    <text x="190" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Kafka Cluster</text>
    <rect x="145" y="100" width="90" height="12" rx="3" fill="white" fill-opacity="0.3" />
    <text x="190" y="109" text-anchor="middle" font-size="9" fill="white">Topic: orders</text>
    <rect x="145" y="118" width="90" height="12" rx="3" fill="white" fill-opacity="0.3" />
    <text x="190" y="127" text-anchor="middle" font-size="9" fill="white">Partitions: 3</text>
    <rect x="145" y="136" width="90" height="12" rx="3" fill="white" fill-opacity="0.3" />
    <text x="190" y="145" text-anchor="middle" font-size="9" fill="white">Replication: 3x</text>
  </g>
  
  <!-- Streams API Section -->
  <g class="section-3" data-narration="Streams API: Process-transform-filter data in real-time using KStream and KTable">
    <rect x="130" y="180" width="120" height="70" rx="8" fill="url(#streamGrad)" filter="url(#shadow)" />
    <text x="190" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Streams API</text>
    <text x="190" y="225" text-anchor="middle" font-size="10" fill="white">KStream | KTable</text>
    <text x="190" y="238" text-anchor="middle" font-size="9" fill="white">Windowed Operations</text>
  </g>
  
  <!-- Consumer/Downstream Section -->
  <g class="section-4" data-narration="Downstream Systems: Processed data consumed by analytics, ML pipelines, or apps">
    <rect x="280" y="80" width="100" height="60" rx="8" fill="url(#consumerGrad)" filter="url(#shadow)" />
    <text x="330" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Consumers</text>
    <text x="330" y="125" text-anchor="middle" font-size="10" fill="white">Downstream</text>
  </g>
  
  <!-- Second Consumer for variety -->
  <g class="section-4" data-narration="Secondary consumers: Enable multiple downstream applications">
    <rect x="280" y="160" width="100" height="50" rx="8" fill="url(#consumerGrad)" filter="url(#shadow)" opacity="0.8" />
    <text x="330" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Analytics</text>
    <text x="330" y="198" text-anchor="middle" font-size="9" fill="white">Dashboards</text>
  </g>
  
  <!-- Arrows -->
  <path d="M100 110 L130 110" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" />
  <path d="M250 115 L280 110" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" />
  <path d="M190 160 L190 180" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" />
  <path d="M250 185 L280 185" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" />
  <path d="M250 185 L310 210" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="flow-line" opacity="0.5" />
  
  <!-- Data Flow Indicator -->
  <g class="float" data-narration="Data flows continuously from producers through Kafka to consumers">
    <circle cx="115" cy="110" r="4" fill="#4a90c2" opacity="0.7" />
    <circle cx="265" cy="110" r="4" fill="#e8906a" opacity="0.7" />
    <circle cx="190" cy="175" r="4" fill="#5eb8b0" opacity="0.7" />
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key Concepts: EOS for exactly-once, fault tolerance via replication, state stores">
    <rect x="15" y="280" width="390" height="105" rx="8" fill="white" fill-opacity="0.9" stroke="#ddd" stroke-width="1" />
    <text x="25" y="300" font-size="13" font-weight="bold" fill="#444">Key Concepts</text>
    
    <g class="pulse">
      <circle cx="35" cy="325" r="4" fill="#7eb8da" />
      <text x="48" y="329" font-size="11" fill="#555">Exactly-Once Semantics (EOS)</text>
    </g>
    <g class="pulse" style="animation-delay: 0.5s">
      <circle cx="35" cy="345" r="4" fill="#9fd5d1" />
      <text x="48" y="349" font-size="11" fill="#555">Fault Tolerance &amp; Replication</text>
    </g>
    <g class="pulse" style="animation-delay: 1s">
      <circle cx="35" cy="365" r="4" fill="#b8a9c9" />
      <text x="48" y="369" font-size="11" fill="#555">State Stores &amp; Interactive Queries</text>
    </g>
    
    <!-- Concept icons -->
    <rect x="200" y="315" width="60" height="20" rx="4" fill="#e8f4fc" stroke="#7eb8da" stroke-width="1" />
    <text x="230" y="329" text-anchor="middle" font-size="9" fill="#4a90c2">KStream</text>
    
    <rect x="270" y="315" width="60" height="20" rx="4" fill="#e8f4fc" stroke="#9fd5d1" stroke-width="1" />
    <text x="300" y="329" text-anchor="middle" font-size="9" fill="#5eb8b0">KTable</text>
    
    <rect x="200" y="345" width="60" height="20" rx="4" fill="#f5e6d3" stroke="#e8906a" stroke-width="1" />
    <text x="230" y="359" text-anchor="middle" font-size="9" fill="#c4703a">Windowed</text>
    
    <rect x="270" y="345" width="60" height="20" rx="4" fill="#f0e6f5" stroke="#b8a9c9" stroke-width="1" />
    <text x="300" y="359" text-anchor="middle" font-size="9" fill="#7b5a94">EOS</text>
    
    <text x="345" y="370" font-size="10" fill="#888">DU MSc CS</text>
  </g>
</svg>