<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="real-time-analytics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d1ecf1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bee5eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kafkaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#17a2b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138496;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6f42c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a32a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28a745;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e7e34;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dataFlow {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes streamMove {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #495057; }
    .section { animation: fadeIn 0.8s ease-out forwards; }
    .slide { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .stream-line { stroke: #17a2b8; stroke-width: 3; stroke-dasharray: 5,5; animation: streamMove 1s linear infinite; }
    .data-dot { fill: #17a2b8; animation: pulse 1.5s ease-in-out infinite; }
    .box { rx: 8; ry: 8; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Title: Real-Time Analytics Pipeline">Real-Time Analytics</text>
  
  <!-- Section 1: Data Sources -->
  <g class="section" style="animation-delay: 0.2s">
    <rect x="15" y="50" width="85" height="70" rx="8" fill="#ffc107" opacity="0.9" />
    <text x="57" y="72" text-anchor="middle" class="label" fill="#212529">Data Sources</text>
    <text x="57" y="90" text-anchor="middle" class="detail">IoT, Clickstream</text>
    <text x="57" y="105" text-anchor="middle" class="detail">Transactions</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="100" y1="85" x2="130" y2="85" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Section 2: Kafka Cluster -->
  <g class="slide" style="animation-delay: 0.4s">
    <rect x="130" y="55" width="100" height="60" rx="8" fill="url(#kafkaGrad)" />
    <text x="180" y="78" text-anchor="middle" class="label">Kafka Cluster</text>
    <text x="180" y="98" text-anchor="middle" class="detail" fill="#e8f4f8">Message Queue</text>
  </g>
  
  <!-- Stream animation lines -->
  <path class="stream-line" d="M230 85 L270 85" />
  <circle class="data-dot" cx="235" cy="85" r="3" />
  <circle class="data-dot" cx="250" cy="85" r="3" style="animation-delay: 0.3s" />
  <circle class="data-dot" cx="265" cy="85" r="3" style="animation-delay: 0.6s" />
  
  <!-- Arrow 2 -->
  <line x1="270" y1="85" x2="300" y2="85" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Section 3: Stream Processing (Flink) -->
  <g class="slide" style="animation-delay: 0.6s">
    <rect x="300" y="45" width="105" height="85" rx="8" fill="url(#flinkGrad)" />
    <text x="352" y="68" text-anchor="middle" class="label">Stream Processing</text>
    <text x="352" y="88" text-anchor="middle" class="detail" fill="#e8f4f8">Apache Flink</text>
    <text x="352" y="103" text-anchor="middle" class="detail" fill="#e8f4f8">Windowing • CEP</text>
    <text x="352" y="118" text-anchor="middle" class="detail" fill="#e8f4f8">State Management</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="352" y1="130" x2="352" y2="165" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Section 4: Processing Concepts -->
  <g class="section" style="animation-delay: 0.8s">
    <rect x="250" y="165" width="155" height="80" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" />
    <text x="327" y="185" text-anchor="middle" class="detail" fill="#495057" font-weight="bold">Key Concepts</text>
    <text x="260" y="205" class="detail">• Tumbling Windows</text>
    <text x="260" y="222" class="detail">• Sliding Windows</text>
    <text x="260" y="239" class="detail">• Watermarks</text>
  </g>
  
  <!-- Section 5: ML Integration -->
  <g class="slide" style="animation-delay: 1s">
    <rect x="45" y="260" width="100" height="55" rx="8" fill="#fd7e14" opacity="0.9" />
    <text x="95" y="283" text-anchor="middle" class="label">ML Integration</text>
    <text x="95" y="303" text-anchor="middle" class="detail">Online Learning</text>
  </g>
  
  <!-- Arrow to ML -->
  <path d="M300 205 L220 205 Q150 205 145 260" stroke="#495057" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  
  <!-- Section 6: Data Sinks -->
  <g class="section" style="animation-delay: 1.2s">
    <rect x="165" y="260" width="120" height="60" rx="8" fill="url(#sinkGrad)" />
    <text x="225" y="285" text-anchor="middle" class="label">Data Sinks</text>
    <text x="225" y="305" text-anchor="middle" class="detail" fill="#e8f4f8">Dashboards</text>
    <text x="225" y="318" text-anchor="middle" class="detail" fill="#e8f4f8">Alerts • Storage</text>
  </g>
  
  <!-- Arrow from ML to Sinks -->
  <line x1="145" y1="290" x2="165" y2="290" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Processing Arrow to Sinks -->
  <line x1="352" y1="245" x2="352" y2="260" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="352" y1="260" x2="285" y2="260" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Real-time indicator -->
  <g class="pulse">
    <circle cx="395" cy="375" r="12" fill="#dc3545" opacity="0.8" />
    <circle cx="395" cy="375" r="6" fill="#fff" />
  </g>
  <text x="355" y="379" class="detail" font-size="10">LIVE</text>
  
  <!-- Description Box -->
  <rect x="15" y="330" width="390" height="60" rx="5" fill="#ffffff" stroke="#dee2e6" stroke-width="1" opacity="0.95" />
  <text x="25" y="350" class="detail" font-size="12">Real-time analytics enables instant insights from data streams</text>
  <text x="25" y="368" class="detail" font-size="11">using Kafka for ingestion, Flink for processing, and windows for analysis.</text>
  <text x="390" y="385" class="detail" font-size="9" text-anchor="end" fill="#6c757d">data-narration="Pipeline flow: Sources → Kafka → Flink → Sinks"</text>
</svg>