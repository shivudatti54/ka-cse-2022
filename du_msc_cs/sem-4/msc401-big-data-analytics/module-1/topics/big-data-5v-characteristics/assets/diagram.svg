<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="big-data-5v-characteristics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="volumeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="velocityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
    <linearGradient id="varietyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d"/>
      <stop offset="100%" style="stop-color:#f57c00"/>
    </linearGradient>
    <linearGradient id="veracityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ba68c8"/>
      <stop offset="100%" style="stop-color:#7b1fa2"/>
    </linearGradient>
    <linearGradient id="valueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd0e1"/>
      <stop offset="100%" style="stop-color:#0097a7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-180deg) scale(0); opacity: 0; }
      to { transform: rotate(0) scale(1); opacity: 1; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .v-circle { animation: fadeIn 1s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .v-label { animation: fadeIn 0.6s ease-out forwards; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .value-center { animation: rotateIn 1s ease-out forwards; transform-origin: center; }
    .box-anim { animation: slideIn 0.8s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .section { animation: fadeIn 0.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565c0" class="title">Big Data 5V Characteristics</text>
  
  <!-- 5V Circles - arranged in pentagon formation -->
  <!-- Volume - Top Left -->
  <g class="v-circle" data-narration="Volume represents massive scale data from petabytes to exabytes">
    <circle cx="120" cy="130" r="55" fill="url(#volumeGrad)" opacity="0.75" filter="url(#shadow)"/>
    <text x="120" y="125" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Volume</text>
    <text x="120" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Scale</text>
  </g>
  
  <!-- Velocity - Top Right -->
  <g class="v-circle" data-narration="Velocity is the speed of data generation and processing">
    <circle cx="300" cy="130" r="55" fill="url(#velocityGrad)" opacity="0.75" filter="url(#shadow)"/>
    <text x="300" y="125" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Velocity</text>
    <text x="300" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Speed</text>
  </g>
  
  <!-- Variety - Right Middle -->
  <g class="v-circle" data-narration="Variety includes structured, semi-structured, and unstructured data types">
    <circle cx="340" cy="230" r="55" fill="url(#varietyGrad)" opacity="0.75" filter="url(#shadow)"/>
    <text x="340" y="225" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Variety</text>
    <text x="340" y="245" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Types</text>
  </g>
  
  <!-- Veracity - Left Bottom -->
  <g class="v-circle" data-narration="Veracity addresses data quality, accuracy, and trustworthiness">
    <circle cx="80" cy="230" r="55" fill="url(#veracityGrad)" opacity="0.75" filter="url(#shadow)"/>
    <text x="80" y="225" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Veracity</text>
    <text x="80" y="245" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Quality</text>
  </g>
  
  <!-- Value - Center Bottom -->
  <g class="v-circle" data-narration="Value is the economic and strategic worth derived from data">
    <circle cx="210" cy="300" r="55" fill="url(#valueGrad)" opacity="0.85" filter="url(#shadow)"/>
    <text x="210" y="295" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Value</text>
    <text x="210" y="315" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Insight</text>
  </g>
  
  <!-- Central Intersection Area -->
  <circle cx="210" cy="200" r="45" fill="#00acc1" opacity="0.6" class="value-center"/>
  <text x="210" y="195" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">5V</text>
  <text x="210" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Intersection</text>
  
  <!-- Connection Arrows -->
  <g class="arrow" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <path d="M155 160 Q180 180 185 195"/>
    <path d="M265 160 Q240 180 235 195"/>
    <path d="M310 195 Q260 200 245 205"/>
    <path d="M90 195 Q140 200 175 205"/>
    <path d="M130 265 Q170 280 190 280"/>
    <path d="M290 265 Q250 280 230 280"/>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Key Concept Boxes -->
  <g class="box-anim" data-narration="Key technologies include Hadoop HDFS, Amazon S3 for distributed storage">
    <rect x="10" y="330" width="125" height="55" fill="#e3f2fd" rx="5" stroke="#64b5f6" stroke-width="1"/>
    <text x="72" y="345" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Volume Tech</text>
    <text x="72" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">HDFS, S3,</text>
    <text x="72" y="373" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Distributed DBs</text>
  </g>
  
  <g class="box-anim" data-narration="Stream processing tools handle high velocity data like Kafka and Flink">
    <rect x="145" y="330" width="125" height="55" fill="#e8f5e9" rx="5" stroke="#81c784" stroke-width="1"/>
    <text x="207" y="345" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32">Velocity Tools</text>
    <text x="207" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Kafka, Flink,</text>
    <text x="207" y="373" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Spark Streaming</text>
  </g>
  
  <g class="box-anim" data-narration="Multi-model databases support variety with MongoDB and Cassandra">
    <rect x="280" y="330" width="125" height="55" fill="#fff3e0" rx="5" stroke="#ffb74d" stroke-width="1"/>
    <text x="342" y="345" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Variety Types</text>
    <text x="342" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">SQL, JSON,</text>
    <text x="342" y="373" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Images, Video</text>
  </g>
  
  <!-- Info Section -->
  <g class="section" data-narration="Data quality challenges include missing values, noise, and fake data">
    <rect x="145" y="55" width="130" height="45" fill="#f3e5f5" rx="5" stroke="#ba68c8" stroke-width="1"/>
    <text x="210" y="70" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Veracity Focus</text>
    <text x="210" y="83" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cleansing,</text>
    <text x="210" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Provenance</text>
  </g>
  
  <!-- Legend -->
  <g class="section" data-narration="2.5 quintillion bytes generated daily in 2023">
    <text x="210" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#666" font-style="italic">2.5 quintillion bytes/day (2023)</text>
  </g>
</svg>