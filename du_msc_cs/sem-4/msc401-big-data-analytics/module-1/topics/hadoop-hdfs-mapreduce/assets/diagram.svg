<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="hadoop-hdfs-mapreduce">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#e8e8f4"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="datanodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <linearGradient id="mapGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#d68b2a"/>
    </linearGradient>
    <linearGradient id="reduceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d673c7"/>
      <stop offset="100%" style="stop-color:#a64d96"/>
    </linearGradient>
    <linearGradient id="yarnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5bc0de"/>
      <stop offset="100%" style="stop-color:#2a7a8c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideRight {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section1 { animation: slideIn 0.8s ease-out 0.2s both; }
    .section2 { animation: slideIn 0.8s ease-out 0.4s both; }
    .section3 { animation: slideIn 0.8s ease-out 0.6s both; }
    .section4 { animation: slideIn 0.8s ease-out 0.8s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .data-flow { animation: slideRight 1s ease-out 1s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d5a87" class="title">Hadoop HDFS &amp; MapReduce</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#4a90d9" stroke-width="2" class="title"/>
  
  <!-- HDFS Section -->
  <g class="section1" data-narration="HDFS Architecture: NameNode manages metadata, DataNodes store data blocks with 3x replication">
    <rect x="20" y="55" width="180" height="130" rx="8" fill="#f8f9fa" stroke="#4a90d9" stroke-width="2"/>
    <text x="110" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2d5a87">HDFS Architecture</text>
    
    <!-- NameNode -->
    <rect x="50" y="85" width="60" height="35" rx="5" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="80" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">NameNode</text>
    
    <!-- DataNodes -->
    <rect x="45" y="140" width="30" height="25" rx="4" fill="url(#datanodeGradient)"/>
    <text x="60" y="157" text-anchor="middle" font-family="Arial" font-size="8" fill="white">DN1</text>
    <rect x="85" y="140" width="30" height="25" rx="4" fill="url(#datanodeGradient)"/>
    <text x="100" y="157" text-anchor="middle" font-family="Arial" font-size="8" fill="white">DN2</text>
    <rect x="125" y="140" width="30" height="25" rx="4" fill="url(#datanodeGradient)"/>
    <text x="140" y="157" text-anchor="middle" font-family="Arial" font-size="8" fill="white">DN3</text>
    
    <!-- Replication arrows -->
    <line x1="80" y1="120" x2="60" y2="138" stroke="#5cb85c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="80" y1="120" x2="100" y2="138" stroke="#5cb85c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <line x1="80" y1="120" x2="140" y2="138" stroke="#5cb85c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <text x="110" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">3x Replication</text>
  </g>
  
  <!-- MapReduce Section -->
  <g class="section2" data-narration="MapReduce: Map phase processes data, Reduce phase aggregates results">
    <rect x="220" y="55" width="180" height="130" rx="8" fill="#f8f9fa" stroke="#f0ad4e" stroke-width="2"/>
    <text x="310" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#d68b2a">MapReduce</text>
    
    <!-- Input -->
    <rect x="235" y="85" width="40" height="25" rx="3" fill="#ddd"/>
    <text x="255" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Input</text>
    
    <!-- Map -->
    <rect x="245" y="115" width="50" height="28" rx="4" fill="url(#mapGradient)"/>
    <text x="270" y="134" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">MAP</text>
    
    <!-- Arrow -->
    <line x1="295" y1="129" x2="315" y2="129" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Reduce -->
    <rect x="320" y="115" width="55" height="28" rx="4" fill="url(#reduceGradient)"/>
    <text x="347" y="134" text-anchor="middle" font-family="Arial" font-size="10" fill="white" font-weight="bold">REDUCE</text>
    
    <!-- Output -->
    <rect x="335" y="148" width="40" height="25" rx="3" fill="#ddd"/>
    <text x="355" y="165" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Output</text>
    
    <!-- Shuffle -->
    <text x="270" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Shuffle</text>
    <text x="270" y="168" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">&amp; Sort</text>
  </g>
  
  <!-- YARN Section -->
  <g class="section3" data-narration="YARN: ResourceManager schedules resources, NodeManagers run containers">
    <rect x="20" y="200" width="180" height="80" rx="8" fill="#f8f9fa" stroke="#5bc0de" stroke-width="2"/>
    <text x="110" y="217" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2a7a8c">YARN</text>
    
    <!-- ResourceManager -->
    <rect x="35" y="230" width="55" height="30" rx="4" fill="url(#yarnGradient)"/>
    <text x="62" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">RM</text>
    
    <!-- NodeManager -->
    <rect x="110" y="230" width="55" height="30" rx="4" fill="url(#yarnGradient)"/>
    <text x="137" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="white" font-weight="bold">NM</text>
    
    <!-- Container -->
    <rect x="120" y="255" width="35" height="18" rx="2" fill="#e8f4fc" stroke="#5bc0de"/>
    <text x="137" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="#2a7a8c">Container</text>
  </g>
  
  <!-- Key Concepts -->
  <g class="section4" data-narration="Key Concepts: Fault tolerance through heartbeats, Data locality for performance">
    <rect x="220" y="200" width="180" height="80" rx="8" fill="#f8f9fa" stroke="#d673c7" stroke-width="2"/>
    <text x="310" y="217" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#a64d96">Key Concepts</text>
    
    <circle cx="240" cy="240" r="4" fill="#5cb85c"/>
    <text x="252" y="244" font-family="Arial" font-size="10" fill="#555">Fault Tolerance</text>
    
    <circle cx="240" cy="260" r="4" fill="#4a90d9"/>
    <text x="252" y="264" font-family="Arial" font-size="10" fill="#555">Data Locality</text>
    
    <circle cx="320" cy="240" r="4" fill="#f0ad4e"/>
    <text x="332" y="244" font-family="Arial" font-size="10" fill="#555">Speculative Exec</text>
    
    <circle cx="320" cy="260" r="4" fill="#5bc0de"/>
    <text x="332" y="264" font-family="Arial" font-size="10" fill="#555">Block: 128MB</text>
  </g>
  
  <!-- Data Flow Animation -->
  <g class="data-flow">
    <path d="M 110 190 Q 110 230 62 230" stroke="#4a90d9" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <path d="M 200 120 Q 235 120 245 120" stroke="#f0ad4e" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom Info Box -->
  <g class="section4">
    <rect x="20" y="295" width="380" height="50" rx="6" fill="#f0f7ff" stroke="#4a90d9" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="30" y="315" font-family="Arial" font-size="10" fill="#555">• Block Size: 128MB |</text>
    <text x="135" y="315" font-family="Arial" font-size="10" fill="#555"> Replication: 3x |</text>
    <text x="230" y="315" font-family="Arial" font-size="10" fill="#555">Hadoop 3.3.6 |</text>
    <text x="310" y="315" font-family="Arial" font-size="10" fill="#555">Erasure Coding</text>
    <text x="30" y="333" font-family="Arial" font-size="10" fill="#666">Use Cases: Flipkart, Aadhaar process 100+ TB daily</text>
  </g>
  
  <!-- Pulse animation on NameNode -->
  <circle cx="80" cy="102" r="22" fill="none" stroke="#4a90d9" stroke-width="2" opacity="0.5" class="pulse"/>
</svg>