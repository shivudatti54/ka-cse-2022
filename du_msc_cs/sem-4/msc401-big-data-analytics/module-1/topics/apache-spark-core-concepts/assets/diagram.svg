<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="apache-spark-core-concepts">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="driverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56"/>
      <stop offset="100%" style="stop-color:#ff7f3f"/>
    </linearGradient>
    <linearGradient id="clusterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e7cc3"/>
      <stop offset="100%" style="stop-color:#6b5b95"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7bc47f"/>
      <stop offset="100%" style="stop-color:#5a9c5d"/>
    </linearGradient>
    <linearGradient id="rddGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5bc0de"/>
      <stop offset="100%" style="stop-color:#3a9cb5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #fff; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #555; }
    .concept-title { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .concept-text { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #555; }
    .box { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.4s; }
    .box3 { animation-delay: 0.6s; }
    .box4 { animation-delay: 0.8s; }
    .flow-line { stroke-dasharray: 5,5; animation: flowDash 1s linear infinite; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Apache Spark Core Concepts</text>
  
  <!-- Driver / SparkContext -->
  <g class="box box1" data-narration="Driver program containing SparkContext - entry point for Spark applications">
    <rect x="150" y="50" width="120" height="45" rx="8" fill="url(#driverGrad)" filter="url(#shadow)"/>
    <text x="210" y="70" text-anchor="middle" class="label">Driver</text>
    <text x="210" y="85" text-anchor="middle" class="detail" fill="#fff">SparkContext</text>
  </g>
  
  <!-- Cluster Manager -->
  <g class="box box2" data-narration="Cluster Manager (YARN/Mesos/Standalone) manages resources across the cluster">
    <rect x="20" y="130" width="100" height="50" rx="8" fill="url(#clusterGrad)" filter="url(#shadow)"/>
    <text x="70" y="155" text-anchor="middle" class="label">Cluster Manager</text>
    <text x="70" y="170" text-anchor="middle" class="detail" fill="#e8e8e8">YARN/Mesos</text>
  </g>
  
  <!-- Arrow from Driver to Cluster Manager -->
  <path d="M170 95 L170 115 L120 115 L120 130" fill="none" stroke="#666" stroke-width="2" class="flow-line"/>
  
  <!-- Arrow from Cluster Manager to Driver -->
  <path d="M120 155 L140 155 L140 130 L170 130" fill="none" stroke="#666" stroke-width="2" class="flow-line"/>
  
  <!-- Worker Node 1 -->
  <g class="box box3" data-narration="Worker Node 1 with Executor running tasks on RDD partitions">
    <rect x="240" y="130" width="160" height="80" rx="8" fill="url(#workerGrad)" filter="url(#shadow)"/>
    <text x="320" y="150" text-anchor="middle" class="label">Worker Node 1</text>
    <rect x="255" y="158" width="45" height="25" rx="4" fill="url(#rddGrad)"/>
    <text x="277" y="174" text-anchor="middle" class="detail" fill="#fff" font-size="9">P0</text>
    <rect x="305" y="158" width="45" height="25" rx="4" fill="url(#rddGrad)"/>
    <text x="327" y="174" text-anchor="middle" class="detail" fill="#fff" font-size="9">P1</text>
    <text x="320" y="198" text-anchor="middle" class="detail" fill="#fff">RDD Partitions</text>
  </g>
  
  <!-- Worker Node 2 -->
  <g class="box box4" data-narration="Worker Node 2 processing distributed data partitions">
    <rect x="240" y="230" width="160" height="80" rx="8" fill="url(#workerGrad)" filter="url(#shadow)"/>
    <text x="320" y="250" text-anchor="middle" class="label">Worker Node 2</text>
    <rect x="255" y="258" width="45" height="25" rx="4" fill="url(#rddGrad)"/>
    <text x="277" y="274" text-anchor="middle" class="detail" fill="#fff" font-size="9">P2</text>
    <rect x="305" y="258" width="45" height="25" rx="4" fill="url(#rddGrad)"/>
    <text x="327" y="274" text-anchor="middle" class="detail" fill="#fff" font-size="9">P3</text>
    <text x="320" y="298" text-anchor="middle" class="detail" fill="#fff">RDD Partitions</text>
  </g>
  
  <!-- Arrow from Driver to Workers -->
  <path d="M210 95 L210 105 L320 105 L320 130" fill="none" stroke="#666" stroke-width="2" class="flow-line"/>
  
  <!-- Arrow from Cluster Manager to Workers -->
  <path d="M70 180 L70 320 L240 320 L240 230" fill="none" stroke="#666" stroke-width="2" class="flow-line"/>
  
  <!-- Key Concepts Box -->
  <g class="box" style="animation-delay: 1s;" data-narration="Key Spark concepts: RDDs, DAG Scheduler, Transformations vs Actions, Shuffle Operations">
    <rect x="10" y="320" width="190" height="70" rx="6" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="20" y="340" class="concept-title">Core Concepts</text>
    <text x="20" y="355" class="concept-text">• RDD: Immutable distributed collection</text>
    <text x="20" y="368" class="concept-text">• DAG: Logical to physical plan</text>
    <text x="20" y="381" class="concept-text">• Transformations: lazy, build lineage</text>
  </g>
  
  <!-- Actions Box -->
  <g class="box" style="animation-delay: 1.2s;" data-narration="Actions trigger job execution: count, collect, saveAsTextFile">
    <rect x="210" y="320" width="200" height="70" rx="6" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="220" y="340" class="concept-title">Transformations vs Actions</text>
    <text x="220" y="355" class="concept-text" fill="#666">Transformations: map, filter, flatMap</text>
    <text x="220" y="368" class="concept-text" fill="#e74c3c">Actions: count, collect, saveAsTextFile</text>
    <text x="220" y="381" class="concept-text" fill="#666">Shuffle: groupByKey, reduceByKey</text>
  </g>
  
  <!-- DAG Scheduler Indicator -->
  <g class="pulse-anim" style="transform-origin: 210px 72px;">
    <circle cx="210" cy="72" r="8" fill="#ff6b6b" opacity="0.6"/>
  </g>
  <text x="210" y="45" text-anchor="middle" class="detail" fill="#888" font-size="9">DAG Scheduler</text>
  
  <!-- Executor Label -->
  <text x="320" y="185" text-anchor="middle" class="detail" fill="#fff" font-size="10" font-weight="bold">Executor</text>
  
  <!-- Shuffle Arrow -->
  <path d="M277 183 L277 200 L327 200 L327 258" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="302" y="225" text-anchor="middle" class="detail" fill="#ff6b6b" font-size="9" transform="rotate(90, 302, 225)">Shuffle</text>
</svg>