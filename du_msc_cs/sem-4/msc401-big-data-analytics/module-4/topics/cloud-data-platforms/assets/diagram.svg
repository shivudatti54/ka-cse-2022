<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="cloud-data-platforms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5ddf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#88d8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ec6e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ba68c8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90caf9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64b5f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .layer-box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .layer-1 { animation-delay: 0.2s; }
    .layer-2 { animation-delay: 0.35s; }
    .layer-3 { animation-delay: 0.5s; }
    .layer-4 { animation-delay: 0.65s; }
    .layer-5 { animation-delay: 0.8s; }
    .concept-box { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    .concept-1 { animation-delay: 0.4s; }
    .concept-2 { animation-delay: 0.6s; }
    .arrow { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    .arrow-1 { animation-delay: 0.9s; }
    .arrow-2 { animation-delay: 1.0s; }
    .arrow-3 { animation-delay: 1.1s; }
    .arrow-4 { animation-delay: 1.2s; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .bounce-element { animation: bounce 1.5s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .layer-box:hover { filter: brightness(1.05); cursor: pointer; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Cloud Data Platforms</text>
  <text x="210" y="45" text-anchor="middle" font-size="11" fill="#555" class="title">Architecture Layers &amp; Data Flow</text>
  
  <!-- Layer 1: Ingestion -->
  <g class="layer-box layer-1" data-narration="Data Ingestion Layer - Captures data from multiple sources using Kinesis, Pub/Sub for real-time streaming and batch processing">
    <rect x="25" y="60" width="130" height="38" rx="6" fill="url(#layerGradient1)" filter="url(#shadow)"/>
    <text x="90" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Ingestion</text>
    <text x="90" y="92" text-anchor="middle" font-size="10" fill="#2e7d32">Kinesis • Pub/Sub</text>
    <!-- Icon -->
    <circle cx="42" cy="79" r="10" fill="#fff" opacity="0.7"/>
    <path d="M38 79 L42 75 L46 79 M42 75 L42 83" stroke="#1b5e20" stroke-width="1.5" fill="none" class="bounce-element"/>
  </g>
  
  <!-- Layer 2: Storage -->
  <g class="layer-box layer-2" data-narration="Storage Layer - Object storage (S3, Blob) and Data Lakes (Delta Lake, Iceberg) provide scalable schema-on-read architectures">
    <rect x="25" y="108" width="130" height="38" rx="6" fill="url(#layerGradient2)" filter="url(#shadow)"/>
    <text x="90" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#006064">Storage</text>
    <text x="90" y="140" text-anchor="middle" font-size="10" fill="#00838f">S3 • Blob • Data Lakes</text>
    <!-- Icon -->
    <rect x="35" y="72" width="14" height="14" fill="#fff" opacity="0.7" rx="2"/>
    <rect x="35" y="74" width="14" height="3" fill="#006064"/>
    <rect x="35" y="79" width="14" height="3" fill="#006064"/>
    <rect x="35" y="84" width="14" height="3" fill="#006064"/>
  </g>
  
  <!-- Layer 3: Processing -->
  <g class="layer-box layer-3" data-narration="Processing Layer - Serverless (Lambda) for event-driven tasks, Distributed Processing (Spark/Databricks) for batch analytics, Stream Processing for real-time">
    <rect x="25" y="156" width="130" height="38" rx="6" fill="url(#layerGradient3)" filter="url(#shadow)"/>
    <text x="90" y="174" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Processing</text>
    <text x="90" y="188" text-anchor="middle" font-size="10" fill="#f57c00">Lambda • Spark • Streams</text>
    <!-- Icon -->
    <circle cx="42" cy="175" r="10" fill="#fff" opacity="0.7"/>
    <circle cx="42" cy="175" r="4" fill="#e65100" class="pulse-element"/>
    <circle cx="48" cy="168" r="2" fill="#e65100" opacity="0.6"/>
    <circle cx="36" cy="168" r="2" fill="#e65100" opacity="0.6"/>
    <circle cx="36" cy="182" r="2" fill="#e65100" opacity="0.6"/>
    <circle cx="48" cy="182" r="2" fill="#e65100" opacity="0.6"/>
  </g>
  
  <!-- Layer 4: Analytics/ML -->
  <g class="layer-box layer-4" data-narration="Analytics &amp; ML Layer - Native AI/ML integration with SageMaker, Azure ML, Comprehend for NLP and predictive analytics">
    <rect x="25" y="204" width="130" height="38" rx="6" fill="url(#layerGradient4)" filter="url(#shadow)"/>
    <text x="90" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a1b9a">Analytics/ML</text>
    <text x="90" y="236" text-anchor="middle" font-size="10" fill="#7b1fa2">SageMaker • Comprehend</text>
    <!-- Icon -->
    <circle cx="42" cy="223" r="10" fill="#fff" opacity="0.7"/>
    <path d="M38 228 L42 218 L46 228 M42 218 L42 223" stroke="#6a1b9a" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Layer 5: Visualization -->
  <g class="layer-box layer-5" data-narration="Visualization Layer - Dashboards and business intelligence tools for actionable insights">
    <rect x="25" y="252" width="130" height="38" rx="6" fill="url(#layerGradient5)" filter="url(#shadow)"/>
    <text x="90" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Visualization</text>
    <text x="90" y="284" text-anchor="middle" font-size="10" fill="#1976d2">QuickSight • Dashboards</text>
    <!-- Icon -->
    <rect x="35" y="268" width="14" height="10" fill="#fff" opacity="0.7" rx="1"/>
    <rect x="37" y="270" width="3" height="6" fill="#1565c0"/>
    <rect x="42" y="270" width="3" height="6" fill="#1565c0"/>
    <rect x="47" y="270" width="1" height="6" fill="#1565c0"/>
  </g>
  
  <!-- Arrows connecting layers -->
  <g class="arrow arrow-1">
    <line x1="90" y1="98" x2="90" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow arrow-2">
    <line x1="90" y1="146" x2="90" y2="153" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow arrow-3">
    <line x1="90" y1="194" x2="90" y2="201" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow arrow-4">
    <line x1="90" y1="242" x2="90" y2="249" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key Concept Boxes on the right -->
  <g class="concept-box concept-1" data-narration="Key Advantage: Elastic scalability for petabyte-scale datasets with pay-as-you-go cost model">
    <rect x="170" y="60" width="225" height="55" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
    <text x="185" y="78" font-size="12" font-weight="bold" fill="#2c3e50">Key Advantages</text>
    <text x="185" y="94" font-size="10" fill="#555">• Elastic scalability (PB-scale)</text>
    <text x="185" y="108" font-size="10" fill="#555">• Pay-as-you-go cost model</text>
  </g>
  
  <g class="concept-box concept-2" data-narration="Security: Zero-Trust models with IAM, encryption at rest, compliance with GDPR, HIPAA, DPDP Act 2023">
    <rect x="170" y="125" width="225" height="55" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
    <text x="185" y="143" font-size="12" font-weight="bold" fill="#2c3e50">Security &amp; Compliance</text>
    <text x="185" y="159" font-size="10" fill="#555">• Zero-Trust: IAM, VPC, Encryption</text>
    <text x="185" y="173" font-size="10" fill="#555">• GDPR • HIPAA • DPDP Act 2023</text>
  </g>
  
  <!-- Multi-cloud Orchestration Box -->
  <g class="concept-box concept-3" style="animation-delay: 0.8s" data-narration="Multi-cloud: Anthos, Azure Arc for hybrid deployments, Terraform for Infrastructure-as-Code">
    <rect x="170" y="190" width="225" height="50" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1" filter="url(#shadow)"/>
    <text x="185" y="208" font-size="12" font-weight="bold" fill="#6a1b9a">Multi-cloud Orchestration</text>
    <text x="185" y="224" font-size="10" fill="#7b1fa2">Anthos • Azure Arc • Terraform (IaC)</text>
  </g>
  
  <!-- Data Flow Arrow from right side -->
  <g class="arrow" style="animation-delay: 1.3s">
    <path d="M155 215 Q 140 215 130 215" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <g class="arrow" style="animation-delay: 1.4s">
    <path d="M155 280 Q 140 280 130 280" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Bottom Stats Bar -->
  <rect x="25" y="305" width="370" height="80" rx="8" fill="#37474f" filter="url(#shadow)"/>
  <text x="210" y="328" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">87%</text>
  <text x="210" y="342" text-anchor="middle" font-size="10" fill="#b0bec5">of enterprises use</text>
  <text x="210" y="356" text-anchor="middle" font-size="12" font-weight="bold" fill="#81d4fa">Hybrid/Multi-cloud</text>
  <text x="210" y="370" text-anchor="middle" font-size="9" fill="#78909c">(Flexera 2023 State of Cloud Report)</text>
  
  <!-- Left side decoration -->
  <g opacity="0.15">
    <circle cx="15" cy="15" r="8" fill="#1976d2"/>
    <circle cx="400" cy="385" r="12" fill="#7b1fa2"/>
    <circle cx="10" cy="350" r="5" fill="#e65100"/>
    <circle cx="410" cy="50" r="6" fill="#2e7d32"/>
  </g>
</svg>