<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="visualization-tools">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5e6f0"/>
      <stop offset="100%" style="stop-color:#e6f4e8"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#4a90b8"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a4d4"/>
      <stop offset="100%" style="stop-color:#8b6ab8"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9ed4a4"/>
      <stop offset="100%" style="stop-color:#5cb878"/>
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c987"/>
      <stop offset="100%" style="stop-color:#e8a838"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #fff; }
    .box-rect { rx: 8; ry: 8; }
    .section-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.1s; }
    .section-box:nth-child(2) { animation-delay: 0.2s; }
    .section-box:nth-child(3) { animation-delay: 0.3s; }
    .section-box:nth-child(4) { animation-delay: 0.4s; }
    .connector { stroke: #666; stroke-width: 2; stroke-dasharray: 5,5; }
    .arrow-head { fill: #666; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text title-anim">Visualization Tools</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#4a90b8" stroke-width="2"/>
  
  <!-- Section 1: Visual Analytics Systems -->
  <g class="section-box" data-narration="Core tools for data visualization including Tableau, Kibana, and R Shiny for building interactive dashboards">
    <rect x="15" y="55" width="95" height="75" fill="url(#boxGrad1)" class="box-rect"/>
    <text x="62" y="72" text-anchor="middle" class="label-text">Visual</text>
    <text x="62" y="88" text-anchor="middle" class="label-text">Analytics</text>
    <text x="62" y="108" text-anchor="middle" class="detail-text">Tableau</text>
    <text x="62" y="120" text-anchor="middle" class="detail-text">Kibana</text>
  </g>
  
  <!-- Section 2: Web-Based Dashboards -->
  <g class="section-box" data-narration="Python-based interactive web frameworks for building real-time data dashboards with Plotly Dash and streaming data support">
    <rect x="120" y="55" width="95" height="75" fill="url(#boxGrad2)" class="box-rect"/>
    <text x="167" y="72" text-anchor="middle" class="label-text">Web</text>
    <text x="167" y="88" text-anchor="middle" class="label-text">Dashboards</text>
    <text x="167" y="108" text-anchor="middle" class="detail-text">Plotly Dash</text>
    <text x="167" y="120" text-anchor="middle" class="detail-text">Superset</text>
  </g>
  
  <!-- Section 3: High-Dimensional Viz -->
  <g class="section-box" data-narration="Dimensionality reduction techniques like t-SNE and UMAP for visualizing complex multi-dimensional datasets">
    <rect x="225" y="55" width="95" height="75" fill="url(#boxGrad3)" class="box-rect"/>
    <text x="272" y="72" text-anchor="middle" class="label-text">High-Dim</text>
    <text x="272" y="88" text-anchor="middle" class="label-text">Visualization</text>
    <text x="272" y="108" text-anchor="middle" class="detail-text">t-SNE, UMAP</text>
    <text x="272" y="120" text-anchor="middle" class="detail-text">3D VTK.js</text>
  </g>
  
  <!-- Section 4: Real-Time Monitoring -->
  <g class="section-box" data-narration="Time-series databases and alerting systems for monitoring streaming IoT data with Grafana's visualization pipeline">
    <rect x="330" y="55" width="75" height="75" fill="url(#boxGrad4)" class="box-rect"/>
    <text x="367" y="72" text-anchor="middle" class="label-text">Real-Time</text>
    <text x="367" y="88" text-anchor="middle" class="label-text">Monitoring</text>
    <text x="367" y="108" text-anchor="middle" class="detail-text">Grafana</text>
    <text x="367" y="120" text-anchor="middle" class="detail-text">Kafka</text>
  </g>
  
  <!-- Flow Arrow 1 -->
  <path d="M62 130 L62 155" class="connector" stroke="#666" stroke-width="2"/>
  <polygon points="62,160 57,152 67,152" class="arrow-head"/>
  
  <!-- Grafana Architecture Section -->
  <g class="section-box" data-narration="Grafana architecture showing data pipeline from multiple sources through time-series database to visualization panels with alerting">
    <rect x="20" y="165" width="380" height="210" fill="#fff" stroke="#ddd" stroke-width="2" rx="10"/>
    
    <!-- Architecture Title -->
    <text x="210" y="190" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Grafana Architecture</text>
    
    <!-- Data Sources -->
    <g>
      <rect x="35" y="205" width="60" height="35" fill="#7eb8da" rx="4"/>
      <text x="65" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Prometheus</text>
      <text x="65" y="233" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Data Source</text>
    </g>
    <g>
      <rect x="105" y="205" width="60" height="35" fill="#b8a4d4" rx="4"/>
      <text x="135" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">InfluxDB</text>
      <text x="135" y="233" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">TSDB</text>
    </g>
    <g>
      <rect x="175" y="205" width="60" height="35" fill="#9ed4a4" rx="4"/>
      <text x="205" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Elastic</text>
      <text x="205" y="233" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Search</text>
    </g>
    
    <!-- Arrows from sources -->
    <line x1="65" y1="240" x2="65" y2="265" stroke="#666" stroke-width="2"/>
    <polygon points="65,270 60,262 70,262" fill="#666"/>
    <line x1="135" y1="240" x2="135" y2="265" stroke="#666" stroke-width="2"/>
    <polygon points="135,270 130,262 140,262" fill="#666"/>
    <line x1="205" y1="240" x2="205" y2="265" stroke="#666" stroke-width="2"/>
    <polygon points="205,270 200,262 210,262" fill="#666"/>
    
    <!-- Core Engine -->
    <rect x="45" y="275" width="330" height="35" fill="#f5e6f0" stroke="#d4a4c4" stroke-width="1" rx="4"/>
    <text x="210" y="295" text-anchor="middle" font-family="Arial" font-size="12" fill="#8b6ab8" font-weight="bold">Core Engine: Query Processing • Rendering • Alert Manager</text>
    
    <!-- Output Arrow -->
    <line x1="210" y1="310" x2="210" y2="330" stroke="#666" stroke-width="2"/>
    <polygon points="210,335 205,327 215,327" fill="#666"/>
    
    <!-- Dashboard Panels -->
    <g>
      <rect x="35" y="340" width="70" height="30" fill="#f0c987" rx="4"/>
      <text x="70" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Graph</text>
    </g>
    <g>
      <text x="105" y="340" width="70" height="30" rx="4">
        <rect x="115" y="340" width="70" height="30" fill="#9ed4a4" rx="4"/>
        <text x="150" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Stat</text>
      </text>
    </g>
    <g>
      <rect x="195" y="340" width="70" height="30" fill="#7eb8da" rx="4"/>
      <text x="230" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Table</text>
    </g>
    <g>
      <rect x="275" y="340" width="70" height="30" fill="#b8a4d4" rx="4"/>
      <text x="310" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">Alert</text>
    </g>
    
    <!-- Key Labels -->
    <text x="210" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Data Sources → Processing → Visualization Panels</text>
  </g>
  
  <!-- Animated pulse on Grafana box -->
  <circle cx="210" cy="295" r="5" fill="#e8a838">
    <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
</svg>