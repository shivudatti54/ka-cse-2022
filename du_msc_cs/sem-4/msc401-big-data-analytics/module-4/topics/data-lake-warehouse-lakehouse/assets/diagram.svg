<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="data-lake-warehouse-lakehouse" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="warehouseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="lakeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbf7d0"/>
      <stop offset="100%" style="stop-color:#86efac"/>
    </linearGradient>
    <linearGradient id="lakehouseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ddd6fe"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes borderGlow {
      0%, 100% { stroke: #8b5cf6; stroke-width: 2; }
      50% { stroke: #a78bfa; stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .warehouse-box { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .lake-box { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .lakehouse-box { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .feature { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .lakehouse-highlight { animation: borderGlow 2s ease-in-out infinite; }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" class="title-text" font-size="20" fill="#1e293b">Data Lake, Warehouse &amp; Lakehouse</text>
  <text x="210" y="50" text-anchor="middle" class="detail-text" font-size="11" fill="#64748b">Evolution of Modern Data Architectures</text>
  
  <!-- Data Warehouse Box -->
  <g class="warehouse-box">
    <rect x="15" y="75" width="120" height="140" rx="8" fill="url(#warehouseGrad)" filter="url(#shadow)" data-narration="Data Warehouse: Structured data store optimized for SQL analytics with MPP architecture"/>
    <text x="75" y="95" text-anchor="middle" class="label-text" font-size="14" fill="#1e40af">Data Warehouse</text>
    <rect x="25" y="105" width="100" height="2" fill="#60a5fa"/>
    <text x="75" y="122" text-anchor="middle" class="detail-text" font-size="10" fill="#1e3a8a">• MPP Architecture</text>
    <text x="75" y="137" text-anchor="middle" class="detail-text" font-size="10" fill="#1e3a8a">• Star/Snowflake Schema</text>
    <text x="75" y="152" text-anchor="middle" class="detail-text" font-size="10" fill="#1e3a8a">• ETL Pipelines</text>
    <text x="75" y="167" text-anchor="middle" class="detail-text" font-size="10" fill="#1e3a8a">• Columnar Storage</text>
    <text x="75" y="182" text-anchor="middle" class="detail-text" font-size="10" fill="#1e3a8a">• Schema-on-Write</text>
    <text x="75" y="202" text-anchor="middle" class="detail-text" font-size="9" fill="#3b82f6" font-style="italic">1980s Era</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow">
    <line x1="145" y1="145" x2="170" y2="145" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="170,140 178,145 170,150" fill="#94a3b8"/>
  </g>
  
  <!-- Data Lake Box -->
  <g class="lake-box">
    <rect x="175" y="75" width="120" height="140" rx="8" fill="url(#lakeGrad)" filter="url(#shadow)" data-narration="Data Lake: Raw data storage in multiple formats (JSON, Parquet, Avro) with schema-on-read approach"/>
    <text x="235" y="95" text-anchor="middle" class="label-text" font-size="14" fill="#166534">Data Lake</text>
    <rect x="185" y="105" width="100" height="2" fill="#4ade80"/>
    <text x="235" y="122" text-anchor="middle" class="detail-text" font-size="10" fill="#14532d">• Object Storage (S3)</text>
    <text x="235" y="137" text-anchor="middle" class="detail-text" font-size="10" fill="#14532d">• Schema-on-Read</text>
    <text x="235" y="152" text-anchor="middle" class="detail-text" font-size="10" fill="#14532d">• Raw Data (JSON/Parquet)</text>
    <text x="235" y="167" text-anchor="middle" class="detail-text" font-size="10" fill="#14532d">• Spark/Hive Processing</text>
    <text x="235" y="182" text-anchor="middle" class="detail-text" font-size="10" fill="#14532d">• Low-Cost Storage</text>
    <text x="235" y="202" text-anchor="middle" class="detail-text" font-size="9" fill="#22c55e" font-style="italic">2010s Era</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow">
    <line x1="305" y1="145" x2="330" y2="145" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="330,140 338,145 330,150" fill="#94a3b8"/>
  </g>
  
  <!-- Lakehouse Box -->
  <g class="lakehouse-box">
    <rect x="335" y="75" width="80" height="140" rx="8" fill="url(#lakehouseGrad)" filter="url(#shadow)" data-narration="Lakehouse: Combines data lake flexibility with warehouse ACID guarantees using metadata layers"/>
    <text x="375" y="95" text-anchor="middle" class="label-text" font-size="13" fill="#5b21b6">Lakehouse</text>
    <rect x="345" y="105" width="60" height="2" fill="#a78bfa"/>
    <text x="375" y="120" text-anchor="middle" class="detail-text" font-size="9" fill="#4c1d95">• ACID Compliance</text>
    <text x="375" y="133" text-anchor="middle" class="detail-text" font-size="9" fill="#4c1d95">• Metadata Layer</text>
    <text x="375" y="146" text-anchor="middle" class="detail-text" font-size="9" fill="#4c1d95">• Delta Lake</text>
    <text x="375" y="159" text-anchor="middle" class="detail-text" font-size="9" fill="#4c1d95">• Apache Iceberg</text>
    <text x="375" y="172" text-anchor="middle" class="detail-text" font-size="9" fill="#4c1d95">• Open Formats</text>
    <text x="375" y="185" text-anchor="middle" class="detail-text" font-size="9" fill="#4c1d95">• BI + ML Support</text>
    <rect x="345" y="195" width="60" height="14" rx="3" fill="#7c3aed" class="lakehouse-highlight"/>
    <text x="375" y="205" text-anchor="middle" class="detail-text" font-size="8" fill="white" font-weight="bold">2020+ Era</text>
  </g>
  
  <!-- Lakehouse Architecture Detail -->
  <g class="lakehouse-box" style="animation-delay: 0.8s">
    <rect x="300" y="230" width="115" height="85" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)" data-narration="Lakehouse architecture layers: Storage layer (object storage), Metadata layer (transactional), API/Query engine, and access layer for BI/ML tools"/>
    <text x="357" y="248" text-anchor="middle" class="label-text" font-size="12" fill="#6d28d9">Lakehouse Layers</text>
    <rect x="308" y="255" width="99" height="1" fill="#c4b5fd"/>
    <rect x="310" y="262" width="94" height="14" rx="2" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="357" y="272" text-anchor="middle" class="detail-text" font-size="9" fill="#5b21b6">BI/ML Tools</text>
    <rect x="310" y="280" width="94" height="14" rx="2" fill="#ddd6fe" stroke="#a78bfa"/>
    <text x="357" y="290" text-anchor="middle" class="detail-text" font-size="9" fill="#5b21b6">Query Engine (SQL)</text>
    <rect x="310" y="298" width="94" height="14" rx="2" fill="#c4b5fd" stroke="#8b5cf6"/>
    <text x="357" y="308" text-anchor="middle" class="detail-text" font-size="9" fill="#fff">Metadata (ACID)</text>
    <rect x="310" y="298" width="94" height="14" rx="2" fill="none" stroke="#7c3aed" stroke-width="1" class="lakehouse-highlight" style="animation: none"/>
  </g>
  
  <!-- Key Comparison -->
  <g style="animation: fadeIn 1s ease-out 1s forwards; opacity: 0">
    <text x="20" y="340" class="label-text" font-size="12" fill="#475569">Key Trade-offs:</text>
    <rect x="15" y="350" width="180" height="45" rx="5" fill="white" stroke="#e2e8f0"/>
    <circle cx="30" cy="365" r="3" fill="#ef4444"/>
    <text x="38" y="368" class="detail-text" font-size="9" fill="#64748b">DWH: Structured only, expensive</text>
    <circle cx="30" cy="380" r="3" fill="#f59e0b"/>
    <text x="38" y="383" class="detail-text" font-size="9" fill="#64748b">Lake: No ACID, data swamps</text>
    <circle cx="110" cy="365" r="3" fill="#22c55e"/>
    <text x="118" y="368" class="detail-text" font-size="9" fill="#64748b">Lakehouse: Best of both</text>
    <circle cx="110" cy="380" r="3" fill="#8b5cf6"/>
    <text x="118" y="383" class="detail-text" font-size="9" fill="#64748b">UC Berkeley, 2020</text>
  </g>
  
  <!-- Evolution Arrow -->
  <g style="animation: fadeIn 1.2s ease-out 1.2s forwards; opacity: 0">
    <path d="M 30 330 Q 210 320 390 330" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
    <text x="210" y="345" text-anchor="middle" class="detail-text" font-size="10" fill="#64748b" font-style="italic">Architecture Evolution →</text>
  </g>
</svg>