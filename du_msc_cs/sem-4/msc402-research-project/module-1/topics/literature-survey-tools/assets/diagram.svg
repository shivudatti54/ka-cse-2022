<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="literature-survey-tools">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#faf0ff"/>
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6"/>
      <stop offset="100%" style="stop-color:#ffe8cc"/>
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f7ff"/>
      <stop offset="100%" style="stop-color:#bae7ff"/>
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6ffed"/>
      <stop offset="100%" style="stop-color:#d9f7be"/>
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0f6"/>
      <stop offset="100%" style="stop-color:#ffadd2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .card1-anim { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .card2-anim { animation: slideInUp 0.6s ease-out 0.35s forwards; opacity: 0; }
    .card3-anim { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .card4-anim { animation: slideInUp 0.6s ease-out 0.65s forwards; opacity: 0; }
    .arrow-anim { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .subtitle { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .card-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #333; }
    .card-detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .tool-tag { font-family: Arial, sans-serif; font-size: 9px; fill: #fff; }
    .section-label { font-family: Arial, sans-serif; font-size: 10px; fill: #777; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <g class="title-anim">
    <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Literature Survey Tools</text>
    <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">for Computer Science Research</text>
  </g>
  
  <!-- Section Labels -->
  <g class="title-anim">
    <text x="30" y="75" class="section-label">INPUT</text>
    <text x="145" y="75" class="section-label">SEARCH</text>
    <text x="260" y="75" class="section-label">MANAGE</text>
    <text x="360" y="75" class="section-label">ANALYZE</text>
  </g>
  
  <!-- Card 1: Academic Databases -->
  <g class="card1-anim" filter="url(#shadow)" data-narration="Academic databases provide access to peer-reviewed papers from IEEE Xplore, ACM Digital Library, Scopus, and ArXiv for preprints.">
    <rect x="15" y="85" width="120" height="95" rx="8" fill="url(#cardGradient1)"/>
    <rect x="15" y="85" width="120" height="20" rx="8" fill="#ffa940" opacity="0.3"/>
    <text x="75" y="102" text-anchor="middle" class="card-title">Academic Databases</text>
    <text x="75" y="122" text-anchor="middle" class="card-detail">IEEE Xplore</text>
    <text x="75" y="135" text-anchor="middle" class="card-detail">ACM DL / Scopus</text>
    <text x="75" y="148" text-anchor="middle" class="card-detail">ArXiv / SSRN</text>
    <rect x="20" y="163" width="50" height="12" rx="3" fill="#ffa940">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="45" y="171" text-anchor="middle" class="tool-tag">Domain</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow-anim">
    <line x1="140" y1="132" x2="160" y2="132" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Card 2: Semantic Search -->
  <g class="card2-anim" filter="url(#shadow)" data-narration="Semantic search engines like Semantic Scholar use AI to provide intelligent recommendations and citation analysis.">
    <rect x="165" y="85" width="120" height="95" rx="8" fill="url(#cardGradient2)"/>
    <rect x="165" y="85" width="120" height="20" rx="8" fill="#69c0ff" opacity="0.3"/>
    <text x="225" y="102" text-anchor="middle" class="card-title">Semantic Search</text>
    <text x="225" y="122" text-anchor="middle" class="card-detail">Semantic Scholar</text>
    <text x="225" y="135" text-anchor="middle" class="card-detail">AI-Powered</text>
    <text x="225" y="148" text-anchor="middle" class="card-detail">Recommendations</text>
    <rect x="210" y="163" width="30" height="12" rx="3" fill="#69c0ff">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <text x="225" y="171" text-anchor="middle" class="tool-tag">AI Search</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow-anim">
    <line x1="290" y1="132" x2="310" y2="132" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Card 3: Reference Managers -->
  <g class="card3-anim" filter="url(#shadow)" data-narration="Reference managers like Zotero and Mendeley organize PDFs, extract metadata, and generate citations automatically.">
    <rect x="315" y="85" width="95" height="95" rx="8" fill="url(#cardGradient3)"/>
    <rect x="315" y="85" width="95" height="20" rx="8" fill="#95de64" opacity="0.3"/>
    <text x="362" y="102" text-anchor="middle" class="card-title">Reference Mgrs</text>
    <text x="362" y="120" text-anchor="middle" class="card-detail">Zotero</text>
    <text x="362" y="133" text-anchor="middle" class="card-detail">Mendeley</text>
    <rect x="345" y="163" width="35" height="12" rx="3" fill="#95de64">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <text x="362" y="171" text-anchor="middle" class="tool-tag">Organize</text>
  </g>
  
  <!-- Workflow Arrow Down -->
  <g class="arrow-anim">
    <line x1="80" y1="190" x2="80" y2="230" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Card 4: Analytics & Synthesis -->
  <g class="card4-anim" filter="url(#shadow)" data-narration="Analytics tools and writing interfaces help synthesize findings through citation graphs and structured documentation.">
    <rect x="25" y="235" width="175" height="80" rx="8" fill="url(#cardGradient4)"/>
    <rect x="25" y="235" width="175" height="20" rx="8" fill="#ff85c0" opacity="0.3"/>
    <text x="112" y="252" text-anchor="middle" class="card-title">Analytics &amp; Synthesis</text>
    <text x="112" y="270" text-anchor="middle" class="card-detail">Citation Graphs • Connected Papers</text>
    <text x="112" y="283" text-anchor="middle" class="card-detail">Bibliometric Analysis • Writing Tools</text>
    <rect x="85" y="295" width="55" height="14" rx="4" fill="#ff85c0" class="pulse-anim">
    </rect>
    <text x="112" y="305" text-anchor="middle" class="tool-tag">Synthesize</text>
  </g>
  
  <!-- Arrow to Analytics -->
  <g class="arrow-anim">
    <line x1="200" y1="190" x2="180" y2="220" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="140" y1="185" x2="140" y2="220" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Key Stats Box -->
  <g class="card4-anim">
    <rect x="215" y="240" width="90" height="70" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="260" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">CS Research</text>
    <text x="260" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff6b6b">18%</text>
    <text x="260" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">of global output</text>
    <text x="260" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">(Nature Index 2023)</text>
  </g>
  
  <!-- Key Features List -->
  <g class="card4-anim">
    <rect x="215" y="320" width="190" height="70" rx="6" fill="#f9f9f9" stroke="#eee" stroke-width="1"/>
    <text x="310" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#444">Tool Selection Criteria</text>
    <circle cx="225" cy="352" r="3" fill="#4a90d9"/>
    <text x="233" y="356" font-family="Arial, sans-serif" font-size="9" fill="#555">Coverage &amp; Update frequency</text>
    <circle cx="225" cy="365" r="3" fill="#4a90d9"/>
    <text x="233" y="369" font-family="Arial, sans-serif" font-size="9" fill="#555">Search capabilities</text>
    <circle cx="225" cy="378" r="3" fill="#4a90d9"/>
    <text x="233" y="382" font-family="Arial, sans-serif" font-size="9" fill="#555">Access rights &amp; Ethics</text>
  </g>
  
  <!-- Bottom note -->
  <g class="arrow-anim">
    <rect x="25" y="365" width="175" height="25" rx="5" fill="#fffbe6" stroke="#ffe58f" stroke-width="1"/>
    <text x="112" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ad6800">Connected Papers • Citation Chaining • Collaborative Libraries</text>
  </g>
</svg>