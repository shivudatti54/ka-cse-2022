<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="research-problem-formulation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bbf7d0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#86efac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef08a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde047;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fed7aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdba74;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    .arrow { animation: drawArrow 0.5s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .arrow-delay { animation: drawArrow 0.5s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; animation-delay: 0.3s; }
    .arrow-delay2 { animation: drawArrow 0.5s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; animation-delay: 0.5s; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .step-text { font-family: Arial, sans-serif; font-size: 12px; fill: #1e293b; }
    .label-text { font-family: Arial, sans-serif; font-size: 11px; fill: #475569; }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #1e3a8a; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <text x="210" y="28" text-anchor="middle" class="title title-text">Research Problem Formulation</text>
  
  <!-- Literature Review Box -->
  <g class="box1" data-narration="Step 1: Literature Review - Examine existing research through bibliometric analysis and technology forecasting">
    <rect x="30" y="60" width="90" height="50" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="75" y="80" text-anchor="middle" class="step-text" font-weight="bold">Literature</text>
    <text x="75" y="95" text-anchor="middle" class="step-text">Review</text>
  </g>
  
  <!-- Arrow 1 -->
  <path class="arrow" d="M125 85 L165 85" stroke="url(#arrowGradient)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Gap Identification Box -->
  <g class="box2" data-narration="Step 2: Gap Identification - Analyze theoretical, methodological, and empirical gaps using PICOS framework">
    <rect x="170" y="60" width="90" height="50" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="215" y="80" text-anchor="middle" class="step-text" font-weight="bold">Gap</text>
    <text x="215" y="95" text-anchor="middle" class="step-text">Identification</text>
  </g>
  
  <!-- Arrow 2 -->
  <path class="arrow-delay" d="M265 85 L305 85" stroke="url(#arrowGradient)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Feasibility Check Box -->
  <g class="box3" data-narration="Step 3: Feasibility Check - Evaluate scope, resources, and methodology using complexity metrics">
    <rect x="310" y="60" width="90" height="50" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="355" y="80" text-anchor="middle" class="step-text" font-weight="bold">Feasibility</text>
    <text x="355" y="95" text-anchor="middle" class="step-text">Check</text>
  </g>
  
  <!-- Arrow 3 -->
  <path class="arrow-delay2" d="M355 110 L355 150" stroke="url(#arrowGradient)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Final Problem Statement Box -->
  <g class="box4" data-narration="Step 4: Final Problem Statement - Clear, focused question addressing the identified gap with justified significance">
    <rect x="310" y="155" width="90" height="50" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)" class="pulse"/>
    <text x="355" y="175" text-anchor="middle" class="step-text" font-weight="bold">Problem</text>
    <text x="355" y="190" text-anchor="middle" class="step-text">Statement</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Key Concepts Side Panel -->
  <g data-narration="Key concepts: Problem Identification, Research Gap Analysis, Hypothesis Formulation, Scope Delimitation, Significance Justification">
    <rect x="15" y="230" width="180" height="155" rx="8" fill="white" fill-opacity="0.7" stroke="#cbd5e1" stroke-width="1"/>
    <text x="105" y="250" text-anchor="middle" class="title-text" font-size="14">Key Concepts</text>
    
    <line x1="25" y1="260" x2="185" y2="260" stroke="#e2e8f0" stroke-width="1"/>
    
    <circle cx="30" cy="278" r="4" fill="#3b82f6"/>
    <text x="42" y="282" class="label-text">Problem Identification</text>
    
    <circle cx="30" cy="298" r="4" fill="#22c55e"/>
    <text x="42" y="302" class="label-text">Gap Analysis (PICOS)</text>
    
    <circle cx="30" cy="318" r="4" fill="#eab308"/>
    <text x="42" y="322" class="label-text">Hypothesis (H₀ vs H₁)</text>
    
    <circle cx="30" cy="338" r="4" fill="#f97316"/>
    <text x="42" y="342" class="label-text">Scope Delimitation</text>
    
    <circle cx="30" cy="358" r="4" fill="#ef4444"/>
    <text x="42" y="362" class="label-text">Significance Justification</text>
  </g>
  
  <!-- Hypothesis Details Box -->
  <g data-narration="Hypothesis structure showing Null (H₀) and Alternative (H₁) hypotheses with statistical validation">
    <rect x="210" y="230" width="195" height="80" rx="8" fill="white" fill-opacity="0.8" stroke="#cbd5e1" stroke-width="1"/>
    <text x="307" y="248" text-anchor="middle" class="title-text" font-size="14">Hypothesis Structure</text>
    
    <rect x="225" y="258" width="75" height="42" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="262" y="275" text-anchor="middle" class="label-text" font-weight="bold">H₀ (Null)</text>
    <text x="262" y="290" text-anchor="middle" class="label-text">No effect</text>
    
    <text x="308" y="278" class="label-text">vs</text>
    
    <rect x="325" y="258" width="70" height="42" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
    <text x="360" y="275" text-anchor="middle" class="label-text" font-weight="bold">H₁ (Alt.)</text>
    <text x="360" y="290" text-anchor="middle" class="label-text">Effect exists</text>
  </g>
  
  <!-- Methods/Tools Box -->
  <g data-narration="Tools and techniques: VOSviewer, CiteSpace, Delphi method, Bibliometric analysis, Statistical power analysis">
    <rect x="210" y="320" width="195" height="65" rx="8" fill="white" fill-opacity="0.8" stroke="#cbd5e1" stroke-width="1"/>
    <text x="307" y="338" text-anchor="middle" class="title-text" font-size="14">Tools &amp; Techniques</text>
    <text x="220" y="358" class="label-text">• VOSviewer, CiteSpace</text>
    <text x="220" y="373" class="label-text">• Delphi Method, Power Analysis</text>
  </g>
  
  <!-- Context Badge -->
  <g data-narration="NEP 2024 emphasizes interdisciplinary problem-solving for complex challenges">
    <rect x="15" y="320" width="180" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="105" y="336" text-anchor="middle" class="label-text" font-weight="bold" fill="#166534">NEP 2024 Focus</text>
    <text x="105" y="350" text-anchor="middle" class="label-text" fill="#15803d">Interdisciplinary Problem-Solving</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="40" cy="50" r="15" fill="#bfdbfe" opacity="0.5"/>
  <circle cx="380" cy="220" r="20" fill="#fed7aa" opacity="0.4"/>
  <circle cx="395" cy="50" r="12" fill="#bbf7d0" opacity="0.5"/>
</svg>