<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="experimental-design">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8fbcd4"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d1c4e9"/>
      <stop offset="100%" style="stop-color:#b39ddb"/>
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-up { animation: slideInUp 0.5s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
    .arrow-line { stroke: #7f8c8d; stroke-width: 2; stroke-dasharray: 5,3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Experimental Design</text>
  <text x="210" y="46" text-anchor="middle" class="detail anim-fade delay-1">in Computer Science Research</text>
  
  <!-- Section 1: Variables & Controls (Top Left) -->
  <g class="anim-slide-left delay-2" data-narration="Independent variables are manipulated factors like algorithm parameters; dependent variables are measured outcomes like accuracy; confounding variables must be controlled">
    <rect x="15" y="60" width="185" height="85" rx="8" fill="url(#boxGrad1)" class="section-box"/>
    <text x="25" y="78" class="label">Variables &amp; Controls</text>
    <text x="25" y="95" class="detail">• Independent: Manipulated</text>
    <text x="25" y="110" class="detail">• Dependent: Measured</text>
    <text x="25" y="125" class="detail">• Confounding: Controlled</text>
  </g>
  
  <!-- Section 2: Design Types (Top Right) -->
  <g class="anim-slide-right delay-2" data-narration="Factorial designs study multiple factors simultaneously; repeated measures test same subjects under different conditions; Latin Square controls order effects">
    <rect x="220" y="60" width="185" height="85" rx="8" fill="url(#boxGrad2)" class="section-box"/>
    <text x="230" y="78" class="label">Design Types</text>
    <text x="230" y="95" class="detail">• Factorial (2^k designs)</text>
    <text x="230" y="110" class="detail">• Repeated Measures</text>
    <text x="230" y="125" class="detail">• Latin Square</text>
  </g>
  
  <!-- Process Flow -->
  <g class="anim-fade delay-3">
    <!-- Flow boxes -->
    <rect x="30" y="160" width="70" height="35" rx="5" fill="#3498db" class="anim-slide-up"/>
    <rect x="120" y="160" width="70" height="35" rx="5" fill="#9b59b6" class="anim-slide-up delay-1"/>
    <rect x="210" y="160" width="70" height="35" rx="5" fill="#1abc9c" class="anim-slide-up delay-2"/>
    <rect x="300" y="160" width="70" height="35" rx="5" fill="#e74c3c" class="anim-slide-up delay-3"/>
    
    <text x="65" y="183" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI">Hypothesis</text>
    <text x="155" y="183" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI">Design</text>
    <text x="245" y="183" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI">Collect</text>
    <text x="335" y="183" text-anchor="middle" fill="white" font-size="11" font-family="Segoe UI">Analyze</text>
    
    <!-- Arrows -->
    <line x1="100" y1="177" x2="115" y2="177" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
    <line x1="190" y1="177" x2="205" y2="177" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
    <line x1="280" y1="177" x2="295" y2="177" stroke="#7f8c8d" stroke-width="2" class="arrow-line"/>
  </g>
  
  <!-- Section 3: Validity Threats (Bottom Left) -->
  <g class="anim-slide-left delay-4" data-narration="Internal validity threats include selection bias and history effects; external validity concerns generalizability; construct validity ensures measurements are accurate">
    <rect x="15" y="210" width="185" height="75" rx="8" fill="url(#boxGrad3)" class="section-box"/>
    <text x="25" y="228" class="label">Validity Threats</text>
    <text x="25" y="245" class="detail">• Internal: Bias, History</text>
    <text x="25" y="260" class="detail">• External: Generalizability</text>
    <text x="25" y="275" class="detail">• Construct: Measurement</text>
  </g>
  
  <!-- Section 4: Modern Techniques (Bottom Right) -->
  <g class="anim-slide-right delay-4" data-narration="Modern approaches include Bayesian experimental design for optimal information gain, multi-armed bandits for adaptive testing, and digital twins for simulation-based experimentation">
    <rect x="220" y="210" width="185" height="75" rx="8" fill="url(#boxGrad4)" class="section-box"/>
    <text x="230" y="228" class="label">Modern Techniques</text>
    <text x="230" y="245" class="detail">• Bayesian Design</text>
    <text x="230" y="260" class="detail">• Multi-Armed Bandits</text>
    <text x="230" y="275" class="detail">• Digital Twin Testing</text>
  </g>
  
  <!-- Example Box: A/B Testing -->
  <g class="anim-fade delay-5" data-narration="A/B testing example: Compare two recommendation algorithms using click-through rate with 10,000 users randomly assigned to two groups">
    <rect x="100" y="300" width="220" height="85" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2" class="section-box"/>
    <text x="210" y="322" text-anchor="middle" class="label">Example: A/B Testing</text>
    <text x="210" y="342" text-anchor="middle" class="detail">Compare algorithms (A vs B) using</text>
    <text x="210" y="356" text-anchor="middle" class="detail">Click-Through Rate (CTR)</text>
    <text x="210" y="372" text-anchor="middle" class="detail" fill="#27ae60">n=10,000 users | 50/50 split</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="6" fill="#3498db" class="anim-pulse"/>
  <circle cx="390" cy="380" r="6" fill="#e74c3c" class="anim-pulse"/>
  <text x="210" y="384" text-anchor="middle" class="detail" fill="#7f8c8d">PG Research @ DU</text>
</svg>