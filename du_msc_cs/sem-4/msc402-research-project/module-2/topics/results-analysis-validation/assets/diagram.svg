<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="results-analysis-validation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f7ff"/>
      <stop offset="100%" style="stop-color:#e6f3e9"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c8b8"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e4ed"/>
      <stop offset="100%" style="stop-color:#b5cde0"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6d3"/>
      <stop offset="100%" style="stop-color:#e8d4bc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .box1-anim { animation: slideIn 0.8s ease-out 0.2s forwards; opacity: 0; }
    .box2-anim { animation: slideIn 0.8s ease-out 0.4s forwards; opacity: 0; }
    .box3-anim { animation: slideIn 0.8s ease-out 0.6s forwards; opacity: 0; }
    .matrix-anim { animation: fadeIn 1s ease-out 0.3s forwards; opacity: 0; }
    .arrow-anim { animation: slideUp 0.6s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .legend-anim { animation: fadeIn 1s ease-out 0.8s forwards; opacity: 0; }
    
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-size: 20px; font-weight: 600; fill: #2c3e50; }
    .label-text { font-size: 14px; fill: #34495e; }
    .detail-text { font-size: 12px; fill: #5d6d7e; }
    .matrix-text { font-size: 16px; font-weight: 600; fill: #ffffff; }
    .matrix-label { font-size: 13px; fill: #2c3e50; font-weight: 500; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-anim title-text">Results Analysis &amp; Validation</text>
  
  <!-- Key Concept Box 1: Statistical Methods -->
  <g class="box1-anim" filter="url(#shadow)">
    <rect x="12" y="50" width="95" height="72" rx="8" fill="url(#boxGradient1)"/>
    <text x="60" y="68" text-anchor="middle" class="label-text" font-weight="600">Statistical</text>
    <text x="60" y="85" text-anchor="middle" class="label-text" font-weight="600">Methods</text>
    <text x="60" y="105" text-anchor="middle" class="detail-text">NHST, Effect Size</text>
    <text x="60" y="118" text-anchor="middle" class="detail-text">Bayesian</text>
  </g>
  
  <!-- Key Concept Box 2: Algorithmic Validation -->
  <g class="box2-anim" filter="url(#shadow)">
    <rect x="313" y="50" width="95" height="72" rx="8" fill="url(#boxGradient2)"/>
    <text x="360" y="68" text-anchor="middle" class="label-text" font-weight="600">Algorithmic</text>
    <text x="360" y="85" text-anchor="middle" class="label-text" font-weight="600">Validation</text>
    <text x="360" y="105" text-anchor="middle" class="detail-text">Cross-validation</text>
    <text x="360" y="118" text-anchor="middle" class="detail-text">Adversarial</text>
  </g>
  
  <!-- Key Concept Box 3: Reproducibility -->
  <g class="box3-anim" filter="url(#shadow)">
    <rect x="165" y="295" width="90" height="70" rx="8" fill="url(#boxGradient3)"/>
    <text x="210" y="315" text-anchor="middle" class="label-text" font-weight="600">Reproducibility</text>
    <text x="210" y="332" text-anchor="middle" class="detail-text">Docker, Git-LFS</text>
    <text x="210" y="349" text-anchor="middle" class="detail-text">Notebooks</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow-anim" data-narration="Arrows showing flow from methods to validation to reproducibility">
    <path d="M60 122 L60 160" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M360 122 L360 160" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <path d="M180 295 L150 235" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <path d="M240 295 L270 235" stroke="#7f8c8d" stroke-width="2" fill="none"/>
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
      </marker>
    </defs>
  </g>
  
  <!-- Confusion Matrix -->
  <g class="matrix-anim" filter="url(#shadow)" data-narration="2x2 Confusion Matrix showing TP, FP, TN, FN outcomes">
    <text x="210" y="158" text-anchor="middle" class="matrix-label">Predicted Class</text>
    <text x="140" y="190" text-anchor="middle" class="matrix-label">Positive</text>
    <text x="280" y="190" text-anchor="middle" class="matrix-label">Negative</text>
    
    <text x="172" y="145" text-anchor="middle" class="matrix-label">Actual</text>
    <text x="172" y="162" text-anchor="middle" class="matrix-label">Class</text>
    
    <!-- Positive/Positive (True Positive) -->
    <rect x="145" y="200" width="70" height="60" rx="6" fill="#27ae60" class="pulse-anim"/>
    <text x="180" y="230" text-anchor="middle" class="matrix-text">TP</text>
    <text x="180" y="248" text-anchor="middle" class="detail-text" fill="#fff" font-size="10">True Positive</text>
    
    <!-- Positive/Negative (False Negative) -->
    <rect x="220" y="200" width="70" height="60" rx="6" fill="#e74c3c"/>
    <text x="255" y="230" text-anchor="middle" class="matrix-text">FN</text>
    <text x="255" y="248" text-anchor="middle" class="detail-text" fill="#fff" font-size="10">False Negative</text>
    
    <!-- Negative/Positive (False Positive) -->
    <rect x="145" y="265" width="70" height="60" rx="6" fill="#f39c12"/>
    <text x="180" y="295" text-anchor="middle" class="matrix-text">FP</text>
    <text x="180" y="313" text-anchor="middle" class="detail-text" fill="#fff" font-size="10">False Positive</text>
    
    <!-- Negative/Negative (True Negative) -->
    <rect x="220" y="265" width="70" height="60" rx="6" fill="#3498db" class="pulse-anim"/>
    <text x="255" y="295" text-anchor="middle" class="matrix-text">TN</text>
    <text x="255" y="313" text-anchor="middle" class="detail-text" fill="#fff" font-size="10">True Negative</text>
  </g>
  
  <!-- Legend/Metrics -->
  <g class="legend-anim" data-narration="Key metrics derived from confusion matrix">
    <text x="12" y="378" class="detail-text" fill="#5d6d7e">Metrics: Precision, Recall, F1-Score, Accuracy</text>
  </g>
  
  <!-- Data narration elements -->
  <g data-narration="Confusion matrix is fundamental for model validation">
    <title>Confusion Matrix</title>
  </g>
</svg>