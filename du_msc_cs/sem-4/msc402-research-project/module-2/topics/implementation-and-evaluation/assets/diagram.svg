<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="implementation-and-evaluation" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e0f2e9"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ba3d6"/>
      <stop offset="100%" style="stop-color:#4a90c2"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7bc47f"/>
      <stop offset="100%" style="stop-color:#5ba85f"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b19cd9"/>
      <stop offset="100%" style="stop-color:#9575cd"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a460"/>
      <stop offset="100%" style="stop-color:#e07b3a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #333; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #555; }
    .box { filter: url(#shadow); cursor: pointer; }
    .box1 { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.1s; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out forwards; animation-delay: 0.7s; opacity: 0; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .arrow { stroke: #888; stroke-width: 2; fill: none; stroke-dasharray: 5,3; animation: arrowPulse 2s ease-in-out infinite; }
    .pulse-element { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Implementation &amp; Evaluation</text>
  <text x="210" y="48" text-anchor="middle" class="label" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.3s; opacity: 0;">Research Process Flow</text>
  
  <!-- Section 1: Implementation Strategies -->
  <g class="box box1" data-narration="Implementation transforms theoretical models into executable code using modular design, appropriate technology stack, and version control systems.">
    <rect x="20" y="65" width="90" height="85" rx="8" fill="url(#boxGradient1)"/>
    <text x="65" y="82" text-anchor="middle" class="section-title">IMPLEMENTATION</text>
    <text x="65" y="100" text-anchor="middle" class="label" fill="#fff">• Modular Design</text>
    <text x="65" y="115" text-anchor="middle" class="label" fill="#fff">• Tech Stack</text>
    <text x="65" y="130" text-anchor="middle" class="label" fill="#fff">• Version Control</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M115 107 L155 107" class="arrow"/>
  <polygon points="155,107 148,102 148,112" fill="#888"/>
  
  <!-- Section 2: Evaluation Methodologies -->
  <g class="box box2" data-narration="Evaluation uses quantitative metrics (F1, RMSE, BLEU), qualitative user studies, and baseline comparisons against state-of-the-art methods.">
    <rect x="160" y="65" width="90" height="85" rx="8" fill="url(#boxGradient2)"/>
    <text x="205" y="82" text-anchor="middle" class="section-title">EVALUATION</text>
    <text x="205" y="100" text-anchor="middle" class="label" fill="#fff">• Quantitative</text>
    <text x="205" y="115" text-anchor="middle" class="label" fill="#fff">• Qualitative</text>
    <text x="205" y="130" text-anchor="middle" class="label" fill="#fff">• Baselines</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M255 107 L295 107" class="arrow"/>
  <polygon points="295,107 288,102 288,112" fill="#888"/>
  
  <!-- Section 3: Reproducibility -->
  <g class="box box3" data-narration="Reproducibility ensures results can be replicated through Docker containers, artifact evaluation, and hyperparameter sensitivity analysis.">
    <rect x="300" y="65" width="100" height="85" rx="8" fill="url(#boxGradient3)"/>
    <text x="350" y="82" text-anchor="middle" class="section-title">REPRODUCIBILITY</text>
    <text x="350" y="100" text-anchor="middle" class="label" fill="#fff">• Docker Containers</text>
    <text x="350" y="115" text-anchor="middle" class="label" fill="#fff">• Artifacts</text>
    <text x="350" y="130" text-anchor="middle" class="label" fill="#fff">• Hyperparameters</text>
  </g>
  
  <!-- Section 4: Ethical Validation -->
  <g class="box box4" data-narration="Ethical validation addresses bias detection, energy efficiency, and data privacy compliance for responsible AI deployment.">
    <rect x="160" y="165" width="100" height="85" rx="8" fill="url(#boxGradient4)"/>
    <text x="210" y="182" text-anchor="middle" class="section-title">ETHICAL VALIDATION</text>
    <text x="210" y="200" text-anchor="middle" class="label" fill="#fff">• Bias Detection</text>
    <text x="210" y="215" text-anchor="middle" class="label" fill="#fff">• Energy Metrics</text>
    <text x="210" y="230" text-anchor="middle" class="label" fill="#fff">• Privacy (DPDP)</text>
  </g>
  
  <!-- Arrow from Evaluation to Ethical -->
  <path d="M205 150 L205 160" class="arrow"/>
  <polygon points="205,165 200,158 210,158" fill="#888"/>
  
  <!-- Cycle Arrow (Evaluation feeds back to Implementation) -->
  <path d="M130 130 Q80 130 80 200 Q80 270 205 270 Q330 270 330 200" class="arrow" style="stroke-dasharray: 8,4;"/>
  <text x="70" y="200" class="detail" transform="rotate(-90 70,200)" style="fill:#666;">Iteration Loop</text>
  
  <!-- Key Metrics Box -->
  <g class="pulse-element" style="animation-delay: 0.9s; opacity: 0; animation: slideIn 0.6s ease-out forwards;">
    <rect x="20" y="270" width="180" height="115" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="110" y="290" text-anchor="middle" class="section-title" fill="#333" style="font-size:12px;">Key Metrics</text>
    <text x="30" y="310" class="detail">• F1-Score, RMSE, BLEU</text>
    <text x="30" y="325" class="detail">• Statistical Significance</text>
    <text x="30" y="340" class="detail">• User Study Scores</text>
    <text x="30" y="355" class="detail">• SOTA Comparison</text>
    <text x="30" y="370" class="detail">• Reproducibility Score</text>
    <text x="30" y="385" class="detail">• Bias Fairness Metrics</text>
  </g>
  
  <!-- Process Timeline -->
  <g style="animation: fadeIn 1s ease-out forwards; animation-delay: 1s; opacity: 0;">
    <rect x="215" y="270" width="185" height="115" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="307" y="290" text-anchor="middle" class="section-title" fill="#333" style="font-size:12px;">Process Flow</text>
    <circle cx="235" cy="315" r="5" fill="#6ba3d6"/>
    <text x="245" y="318" class="detail">Prototype → Code</text>
    <circle cx="235" cy="335" r="5" fill="#7bc47f"/>
    <text x="245" y="338" class="detail">Test on Benchmarks</text>
    <circle cx="235" cy="355" r="5" fill="#b19cd9"/>
    <text x="245" y="358" class="detail">Validate Reproducibility</text>
    <circle cx="235" cy="375" r="5" fill="#f4a460"/>
    <text x="245" y="378" class="detail">Ethical Review</text>
    <path d="M235 320 L235 330" stroke="#ccc" stroke-width="1"/>
    <path d="M235 340 L235 350"/>
    <path d="M235 360 L235 370"/>
  </g>
  
  <!-- Bottom label -->
  <text x="210" y="395" text-anchor="middle" class="detail" fill="#777">DU MSc CS • NEP 2020 Applied Research</text>
</svg>