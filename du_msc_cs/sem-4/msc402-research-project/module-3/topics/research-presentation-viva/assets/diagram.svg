<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="research-presentation-viva" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="quad1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95c9b5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="quad2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b895c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="quad3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0d4b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9b895;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="quad4Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95b8c9;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      @keyframes titleGlow {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(59, 89, 152, 0.3)); }
        50% { filter: drop-shadow(0 0 8px rgba(59, 89, 152, 0.6)); }
      }
      .title-group { animation: titleGlow 3s ease-in-out infinite; }
      .section-box { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
      .section-1 { animation-delay: 0.1s; }
      .section-2 { animation-delay: 0.2s; }
      .section-3 { animation-delay: 0.3s; }
      .section-4 { animation-delay: 0.4s; }
      .quadrant { animation: fadeIn 0.6s ease-out forwards, pulse 4s ease-in-out infinite; }
      .arrow-line { animation: slideInLeft 0.5s ease-out forwards; }
      .label-text { animation: slideInUp 0.5s ease-out forwards; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="title-group" data-narration="Title: Research Presentation &amp; Viva Defense">
    <text x="210" y="30" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Research Presentation</text>
    <text x="210" y="50" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">&amp; Viva Defense</text>
    <line x1="80" y1="60" x2="340" y2="60" stroke="#5d7ea1" stroke-width="1.5"/>
  </g>
  
  <!-- Axis Labels -->
  <g class="label-text" data-narration="X-axis: Question Type from Conceptual to Methodological">
    <text x="210" y="330" font-family="Arial, sans-serif" font-size="13" fill="#4a4a4a" text-anchor="middle" font-weight="bold">Conceptual</text>
    <text x="210" y="345" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Understanding</text>
    <text x="320" y="330" font-family="Arial, sans-serif" font-size="13" fill="#4a4a4a" text-anchor="middle" font-weight="bold">Methodological</text>
    <text x="320" y="345" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Technical</text>
  </g>
  
  <g class="label-text" data-narration="Y-axis: Difficulty Level from Basic to Advanced">
    <text x="75" y="190" font-family="Arial, sans-serif" font-size="12" fill="#4a4a4a" text-anchor="middle" font-weight="bold" transform="rotate(-90, 75, 190)">Basic</text>
    <text x="110" y="190" font-family="Arial, sans-serif" font-size="12" fill="#4a4a4a" text-anchor="middle" font-weight="bold" transform="rotate(-90, 110, 190)">Advanced</text>
  </g>
  
  <!-- Quadrant Matrix -->
  <g data-narration="4-Quadrant Viva Question Matrix showing question types and difficulty levels">
    <!-- Quadrant 1: Basic Conceptual (Top Left) -->
    <rect x="80" y="80" width="120" height="100" fill="url(#quad1Gradient)" rx="6" class="quadrant" style="animation-delay: 0.3s"/>
    <text x="140" y="100" font-family="Arial, sans-serif" font-size="11" fill="#2c5530" text-anchor="middle" font-weight="bold">Basic Conceptual</text>
    <text x="140" y="118" font-family="Arial, sans-serif" font-size="9" fill="#2c5530" text-anchor="middle">• Research objectives</text>
    <text x="140" y="132" font-family="Arial, sans-serif" font-size="9" fill="#2c5530" text-anchor="middle">• Problem definition</text>
    <text x="140" y="146" font-family="Arial, sans-serif" font-size="9" fill="#2c5530" text-anchor="middle">• Literature gaps</text>
    <text x="140" y="160" font-family="Arial, sans-serif" font-size="9" fill="#2c5530" text-anchor="middle">• Key definitions</text>
    
    <!-- Quadrant 2: Advanced Conceptual (Top Right) -->
    <rect x="220" y="80" width="120" height="100" fill="url(#quad2Gradient)" rx="6" class="quadrant" style="animation-delay: 0.4s"/>
    <text x="280" y="100" font-family="Arial, sans-serif" font-size="11" fill="#4a2c55" text-anchor="middle" font-weight="bold">Advanced Conceptual</text>
    <text x="280" y="118" font-family="Arial, sans-serif" font-size="9" fill="#4a2c55" text-anchor="middle">• Theoretical framework</text>
    <text x="280" y="132" font-family="Arial, sans-serif" font-size="9" fill="#4a2c55" text-anchor="middle">• Contribution mapping</text>
    <text x="280" y="146" font-family="Arial, sans-serif" font-size="9" fill="#4a2c55" text-anchor="middle">• Novelty claims</text>
    <text x="280" y="160" font-family="Arial, sans-serif" font-size="9" fill="#4a2c55" text-anchor="middle">• Impact analysis</text>
    
    <!-- Quadrant 3: Basic Methodological (Bottom Left) -->
    <rect x="80" y="195" width="120" height="100" fill="url(#quad3Gradient)" rx="6" class="quadrant" style="animation-delay: 0.5s"/>
    <text x="140" y="215" font-family="Arial, sans-serif" font-size="11" fill="#55442c" text-anchor="middle" font-weight="bold">Basic Methodological</text>
    <text x="140" y="233" font-family="Arial, sans-serif" font-size="9" fill="#55442c" text-anchor="middle">• Data collection</text>
    <text x="140" y="247" font-family="Arial, sans-serif" font-size="9" fill="#55442c" text-anchor="middle">• Tools used</text>
    <text x="140" y="261" font-family="Arial, sans-serif" font-size="9" fill="#55442c" text-anchor="middle">• Experiment setup</text>
    <text x="140" y="275" font-family="Arial, sans-serif" font-size="9" fill="#55442c" text-anchor="middle">• Basic results</text>
    
    <!-- Quadrant 4: Advanced Methodological (Bottom Right) -->
    <rect x="220" y="195" width="120" height="100" fill="url(#quad4Gradient)" rx="6" class="quadrant" style="animation-delay: 0.6s"/>
    <text x="280" y="215" font-family="Arial, sans-serif" font-size="11" fill="#2c4455" text-anchor="middle" font-weight="bold">Advanced Methodological</text>
    <text x="280" y="233" font-family="Arial, sans-serif" font-size="9" fill="#2c4455" text-anchor="middle">• Algorithm selection</text>
    <text x="280" y="247" font-family="Arial, sans-serif" font-size="9" fill="#2c4455" text-anchor="middle">• Statistical validation</text>
    <text x="280" y="261" font-family="Arial, sans-serif" font-size="9" fill="#2c4455" text-anchor="middle">• Reproducibility</text>
    <text x="280" y="275" font-family="Arial, sans-serif" font-size="9" fill="#2c4455" text-anchor="middle">• Limitations</text>
  </g>
  
  <!-- Axis Lines -->
  <line x1="80" y1="180" x2="340" y2="180" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="200" y1="80" x2="200" y2="295" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Key Concepts Section -->
  <g class="section-box section-1" data-narration="Presentation Structure: Title Slide, Problem, Methodology, Results">
    <rect x="10" y="355" width="130" height="35" fill="#fff" stroke="#5d7ea1" stroke-width="1" rx="4"/>
    <text x="75" y="368" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">Presentation</text>
    <text x="75" y="382" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Structure: Title→Problem→Method→Results</text>
  </g>
  
  <g class="section-box section-2" data-narration="Viva Defense Strategies: Anticipatory Reasoning, Gap Analysis, Contribution Mapping">
    <rect x="150" y="355" width="150" height="35" fill="#fff" stroke="#5d7ea1" stroke-width="1" rx="4"/>
    <text x="225" y="368" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">Viva Strategies</text>
    <text x="225" y="382" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Anticipate • Gap Analysis • Contributions</text>
  </g>
  
  <g class="section-box section-3" data-narration="NEP 2024 Emphasizes Multidisciplinary Research and Industry-Academia Collaboration">
    <rect x="310" y="355" width="100" height="35" fill="#fff" stroke="#5d7ea1" stroke-width="1" rx="4"/>
    <text x="360" y="368" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">NEP 2024</text>
    <text x="360" y="382" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Multidisciplinary Focus</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g class="arrow-line" data-narration="Arrow showing the flow from Conceptual understanding to Methodological application">
    <path d="M 140 295 L 140 320 L 75 320 L 75 350" fill="none" stroke="#5d7ea1" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="180" r="5" fill="#5d7ea1" opacity="0.7"/>
  <circle cx="140" cy="140" r="3" fill="#7fa8b8" opacity="0.5"/>
  <circle cx="280" cy="140" r="3" fill="#b87fa8" opacity="0.5"/>
  <circle cx="140" cy="245" r="3" fill="#b8a87f" opacity="0.5"/>
  <circle cx="280" cy="245" r="3" fill="#7fb8a8" opacity="0.5"/>
  
  <!-- Bottom label -->
  <text x="210" y="395" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle">DU MSc Computer Science • Viva Question Matrix</text>
</svg>