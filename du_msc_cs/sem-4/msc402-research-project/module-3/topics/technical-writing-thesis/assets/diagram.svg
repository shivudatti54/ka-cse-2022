<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="technical-writing-thesis" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9e2ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="introGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="litGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="methodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="discussGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#333" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes arrowPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 9px; fill: #5d6d7e; }
    .box-rect { rx: 8; ry: 8; stroke: #78909c; stroke-width: 1; filter: url(#shadow); }
    .arrow { stroke: #546e7a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .feedback-arrow { stroke: #e74c3c; stroke-width: 1.5; fill: none; stroke-dasharray: 4,2; marker-end: url(#feedbackHead); }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .box-anim-1 { animation: slideUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-anim-2 { animation: slideUp 0.6s ease-out 0.35s forwards; opacity: 0; }
    .box-anim-3 { animation: slideUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box-anim-4 { animation: slideUp 0.6s ease-out 0.65s forwards; opacity: 0; }
    .box-anim-5 { animation: slideUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 3s infinite; transform-origin: center; }
    .arrow-anim { animation: arrowPulse 2s infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <title class="title-anim" x="210" y="25" text-anchor="middle">Technical Writing Thesis</title>
  <text class="title-anim" x="210" y="42" text-anchor="middle" font-family="Arial" font-size="11" fill="#5d6d7e">IMRaD Model with Feedback Loops</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#546e7a"/>
    </marker>
    <marker id="feedbackHead" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Introduction Box -->
  <g class="box-anim-1" data-narration="Introduction: Establishes research gap through systematic literature review, defines objectives, and provides thesis overview">
    <rect class="box-rect" x="20" y="60" width="70" height="55" fill="url(#introGrad)"/>
    <text class="label" x="55" y="78" text-anchor="middle">INTRO</text>
    <text class="detail" x="55" y="92" text-anchor="middle">Research Gap</text>
    <text class="detail" x="55" y="103" text-anchor="middle">Objectives</text>
  </g>
  
  <!-- Lit Review Box -->
  <g class="box-anim-2" data-narration="Literature Review: Surveys existing work, identifies SOTA methods, and positions research within field">
    <rect class="box-rect" x="110" y="60" width="70" height="55" fill="url(#litGrad)"/>
    <text class="label" x="145" y="78" text-anchor="middle">LIT REVIEW</text>
    <text class="detail" x="145" y="92" text-anchor="middle">SOTA Analysis</text>
    <text class="detail" x="145" y="103" text-anchor="middle">Gap ID</text>
  </g>
  
  <!-- Arrow 1 -->
  <path class="arrow-anim" d="M90 87 L110 87" />
  
  <!-- Arrow 2 -->
  <path class="arrow-anim" d="M180 87 L200 87" />
  
  <!-- Methodology Box -->
  <g class="box-anim-3" data-narration="Methodology: Details algorithms, datasets (e.g., Indian COVID-19 data), experimental protocol, and validation metrics">
    <rect class="box-rect" x="200" y="60" width="75" height="55" fill="url(#methodGrad)"/>
    <text class="label" x="237" y="78" text-anchor="middle">METHODOLOGY</text>
    <text class="detail" x="237" y="92" text-anchor="middle">Algorithms</text>
    <text class="detail" x="237" y="103" text-anchor="middle">Datasets</text>
  </g>
  
  <!-- Arrow 3 -->
  <path class="arrow-anim" d="M275 87 L295 87" />
  
  <!-- Results Box -->
  <g class="box-anim-4" data-narration="Results: Visualizations using matplotlib/Tableau, statistical significance testing, performance metrics">
    <rect class="box-rect" x="295" y="60" width="70" height="55" fill="url(#resultGrad)"/>
    <text class="label" x="330" y="78" text-anchor="middle">RESULTS</text>
    <text class="detail" x="330" y="92" text-anchor="middle">Charts/Graphs</text>
    <text class="detail" x="330" y="103" text-anchor="middle">F1/AUC</text>
  </g>
  
  <!-- Arrow 4 -->
  <path class="arrow-anim" d="M365 87 L385 87" />
  
  <!-- Discussion Box -->
  <g class="box-anim-5" data-narration="Discussion: Compares with SOTA, addresses limitations, ethical considerations, and future work">
    <rect class="box-rect" x="200" y="130" width="90" height="55" fill="url(#discussGrad)"/>
    <text class="label" x="245" y="148" text-anchor="middle">DISCUSSION</text>
    <text class="detail" x="245" y="162" text-anchor="middle">SOTA Comparison</text>
    <text class="detail" x="245" y="173" text-anchor="middle">Ethics/Future</text>
  </g>
  
  <!-- Feedback arrows showing iterative nature -->
  <path class="pulse-anim" d="M330 115 L330 130 Q330 140 300 140 L270 140 Q245 140 245 155 L245 165" style="stroke:#e74c3c;stroke-width:1.5;fill:none;stroke-dasharray:3,2;"/>
  <path class="pulse-anim" d="M237 115 L237 100 Q237 90 207 90 L120 90 Q95 90 95 75 L95 60" style="stroke:#e74c3c;stroke-width:1.5;fill:none;stroke-dasharray:3,2;"/>
  
  <!-- Key Concepts Box -->
  <g class="box-anim-2" data-narration="Key Academic Style Guidelines: IEEE/ACM formatting, LaTeX typesetting, ethical compliance (DPDP Act 2023)">
    <rect class="box-rect" x="20" y="200" width="175" height="85" fill="#e0f2f1" stroke="#26a69a" stroke-width="1.5"/>
    <text class="label" x="107" y="218" text-anchor="middle" fill="#00695c">KEY CONCEPTS</text>
    <text class="detail" x="30" y="235" fill="#00695c">• IEEE/ACM Format Standards</text>
    <text class="detail" x="30" y="248" fill="#00695c">• LaTeX Typesetting</text>
    <text class="detail" x="30" y="261" fill="#00695c">• DPDP Act 2023 Compliance</text>
    <text class="detail" x="30" y="274" fill="#00695c">• Plagiarism Detection</text>
  </g>
  
  <!-- Research Trends Box -->
  <g class="box-anim-4" data-narration="Current Research Trends: Reproducibility frameworks, Ethical AI, Open Science practices, SDG alignment">
    <rect class="box-rect" x="210" y="200" width="175" height="85" fill="#fff8e1" stroke="#ffa000" stroke-width="1.5"/>
    <text class="label" x="297" y="218" text-anchor="middle" fill="#e65100">RESEARCH TRENDS</text>
    <text class="detail" x="220" y="235" fill="#e65100">• Reproducibility Frameworks</text>
    <text class="detail" x="220" y="248" fill="#e65100">• Ethical AI Checklists</text>
    <text class="detail" x="220" y="261" fill="#e65100">• Open Science Practices</text>
    <text class="detail" x="220" y="274" fill="#e65100">• SDG Target Alignment</text>
  </g>
  
  <!-- Bottom annotation -->
  <g class="box-anim-5" data-narration="Thesis Structure: Typical 80-120 pages for MSc CS at DU, integrating ML, cybersecurity, or quantum computing research">
    <rect class="box-rect" x="20" y="300" width="365" height="55" fill="#eceff1" stroke="#607d8b" stroke-width="1.5"/>
    <text class="label" x="202" y="320" text-anchor="middle" fill="#37474f">THESIS STRUCTURE @ DU MSc CS</text>
    <text class="detail" x="202" y="336" text-anchor="middle" fill="#546e7a">80-120 pages | Original contributions in ML, Cybersecurity, Quantum Computing</text>
    <text class="detail" x="202" y="348" text-anchor="middle" fill="#546e7a">NEP 2024: Multidisciplinary research | Global + Local audience</text>
  </g>
</svg>