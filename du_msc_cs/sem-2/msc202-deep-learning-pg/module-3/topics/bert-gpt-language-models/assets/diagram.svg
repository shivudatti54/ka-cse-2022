<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="bert-gpt-language-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f6f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bertGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ba3d6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gptGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="transformerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
    .arrow { animation: fadeIn 1s ease-out 1s forwards; opacity: 0; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; }
    .box { transition: transform 0.3s; }
    .box:hover { transform: scale(1.02); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">BERT &amp; GPT Language Models</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="title" />
  
  <!-- Section 1: Transformer Architecture Overview -->
  <g class="section section-1" data-narration="The Transformer architecture uses self-attention mechanism to process input sequences in parallel">
    <rect x="20" y="50" width="120" height="55" fill="url(#transformerGradient)" rx="6" class="box" />
    <text x="80" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Transformer</text>
    <text x="80" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Architecture</text>
    
    <!-- Self-attention formula -->
    <rect x="25" y="115" width="110" height="30" fill="#ecf0f1" rx="4" stroke="#27ae60" stroke-width="1" />
    <text x="80" y="133" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Attention(Q,K,V)</text>
  </g>
  
  <!-- Arrow from Transformer to BERT -->
  <path d="M145 77 L185 77" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow" />
  
  <!-- Section 2: BERT -->
  <g class="section section-2" data-narration="BERT uses bidirectional context with Masked Language Modeling and Next Sentence Prediction for pretraining">
    <rect x="190" y="50" width="95" height="55" fill="url(#bertGradient)" rx="6" class="box" />
    <text x="237" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">BERT</text>
    <text x="237" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Bidirectional</text>
    
    <!-- BERT features -->
    <rect x="190" y="115" width="95" height="45" fill="#d5e8f7" rx="4" stroke="#4a90d9" stroke-width="1" />
    <text x="237" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">MLM: 15% mask</text>
    <text x="237" y="148" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">NSP Task</text>
  </g>
  
  <!-- Arrow from Transformer to GPT -->
  <path d="M80 110 L80 175" stroke="#9b59b6" stroke-width="2" fill="none" class="arrow" />
  
  <!-- Section 3: GPT -->
  <g class="section section-3" data-narration="GPT uses unidirectional causal masking for autoregressive text generation">
    <rect x="25" y="180" width="120" height="55" fill="url(#gptGradient)" rx="6" class="box" />
    <text x="85" y="202" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">GPT</text>
    <text x="85" y="220" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Unidirectional</text>
    
    <!-- GPT features -->
    <rect x="25" y="245" width="120" height="45" fill="#f5eef8" rx="4" stroke="#9b59b6" stroke-width="1" />
    <text x="85" y="262" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Autoregressive</text>
    <text x="85" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Causal Masking</text>
  </g>
  
  <!-- Section 4: Comparison Box -->
  <g class="section section-4" data-narration="Comparison: BERT excels at understanding tasks while GPT leads in generation tasks">
    <rect x="160" y="175" width="125" height="115" fill="#fafafa" rx="6" stroke="#34495e" stroke-width="2" />
    <text x="222" y="195" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50">Comparison</text>
    
    <!-- BERT pros -->
    <rect x="170" y="205" width="105" height="35" fill="#d5e8f7" rx="4" />
    <text x="222" y="218" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">BERT</text>
    <text x="222" y="232" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Understanding Tasks</text>
    
    <!-- GPT pros -->
    <rect x="170" y="250" width="105" height="35" fill="#f5eef8" rx="4" />
    <text x="222" y="263" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50">GPT</text>
    <text x="222" y="277" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Generation Tasks</text>
  </g>
  
  <!-- Bottom info section -->
  <g class="section section-4" data-narration="Key parameter comparison shows GPT-3 has 175B parameters versus BERT-Large's 340M">
    <rect x="20" y="305" width="180" height="80" fill="#fff" rx="6" stroke="#e74c3c" stroke-width="1" />
    <text x="110" y="325" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Parameter Scale</text>
    <text x="110" y="345" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c">GPT-3: 175 Billion</text>
    <text x="110" y="362" text-anchor="middle" font-family="Arial" font-size="10" fill="#3498db">BERT-Large: 340 Million</text>
    <text x="110" y="378" text-anchor="middle" font-family="Arial" font-size="9" fill="#7f8c8d">Pretrain-Finetune Paradigm</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section section-4" data-narration="Pretraining and fine-tuning allows these models to be adapted for various downstream tasks">
    <rect x="210" y="305" width="195" height="80" fill="#fff" rx="6" stroke="#27ae60" stroke-width="1" />
    <text x="307" y="325" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Key Applications</text>
    <text x="307" y="345" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">• Sentiment Analysis</text>
    <text x="307" y="360" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">• Question Answering</text>
    <text x="307" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">• Machine Translation</text>
  </g>
  
  <!-- Legend / Labels -->
  <g>
    <circle cx="35" cy="395" r="4" fill="#4a90d9" />
    <text x="45" y="398" font-family="Arial" font-size="9" fill="#2c3e50">Encoder</text>
    <circle cx="90" cy="395" r="4" fill="#9b59b6" />
    <text x="100" y="398" font-family="Arial" font-size="9" fill="#2c3e50">Decoder</text>
    <circle cx="150" cy="395" r="4" fill="#27ae60" />
    <text x="160" y="398" font-family="Arial" font-size="9" fill="#2c3e50">Attention</text>
  </g>
</svg>