<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="attention-mechanism-transformers">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f4e8"/>
    </linearGradient>
    <linearGradient id="encoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="decoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5"/>
      <stop offset="100%" style="stop-color:#c48888"/>
    </linearGradient>
    <linearGradient id="attentionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="ffnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c1ec"/>
      <stop offset="100%" style="stop-color:#b8a9c9"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: 0; }
    }
    
    .title { animation: fadeIn 0.8s ease-out; font-family: Arial, sans-serif; }
    .section-box { animation: slideInUp 0.6s ease-out backwards; }
    .encoder-block { animation: slideInLeft 0.7s ease-out 0.2s backwards; }
    .decoder-block { animation: slideInRight 0.7s ease-out 0.3s backwards; }
    .attention-box { animation: pulse 3s ease-in-out infinite; animation-delay: 1s; }
    .arrow-line { animation: fadeIn 0.5s ease-out 0.8s backwards; }
    .formula { animation: fadeIn 0.6s ease-out 1s backwards; font-family: 'Courier New', monospace; }
    
    .section-box:hover { filter: brightness(1.05); cursor: pointer; }
    text { fill: #333; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c3e50">
    Transformers Architecture
  </text>
  <text x="210" y="50" text-anchor="middle" class="title" font-size="12" fill="#555">
    Attention Mechanism Overview
  </text>
  
  <!-- Input Section -->
  <g class="section-box" data-narration="Input tokens are first embedded and combined with positional encoding to preserve sequence order information">
    <rect x="30" y="70" width="70" height="25" rx="4" fill="#f9c74f" stroke="#e9c46a" stroke-width="1"/>
    <text x="65" y="87" text-anchor="middle" font-size="11" fill="#333">Input</text>
  </g>
  
  <!-- Positional Encoding -->
  <g class="section-box" data-narration="Positional encoding uses sine and cosine functions to inject position information into embeddings">
    <rect x="110" y="70" width="90" height="25" rx="4" fill="#90be6d" stroke="#6a994e" stroke-width="1"/>
    <text x="155" y="87" text-anchor="middle" font-size="11" fill="#333">Positional</text>
    <text x="155" y="100" text-anchor="middle" font-size="10" fill="#333">Encoding</text>
  </g>
  
  <!-- Arrow to Encoder -->
  <path class="arrow-line" d="M200 82 L225 82" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Encoder Stack -->
  <g class="encoder-block" data-narration="The Encoder consists of multi-head self-attention and feed-forward layers with residual connections and layer normalization">
    <rect x="230" y="55" width="170" height="120" rx="8" fill="url(#encoderGrad)" stroke="#5a9ec0" stroke-width="2"/>
    <text x="315" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Encoder</text>
    
    <!-- Multi-Head Attention -->
    <rect x="240" y="80" width="150" height="40" rx="5" fill="url(#attentionGrad)" stroke="#6bb08a" stroke-width="1" class="attention-box"/>
    <text x="315" y="95" text-anchor="middle" font-size="11" fill="#2c3e50">Multi-Head</text>
    <text x="315" y="110" text-anchor="middle" font-size="11" fill="#2c3e50">Self-Attention</text>
    
    <!-- Add & Norm 1 -->
    <rect x="285" y="125" width="60" height="18" rx="3" fill="#fad4a4" stroke="#e9c46a" stroke-width="1"/>
    <text x="315" y="137" text-anchor="middle" font-size="9" fill="#333">Add &amp; Norm</text>
    
    <!-- Feed Forward -->
    <rect x="240" y="148" width="150" height="22" rx="4" fill="url(#ffnGrad)" stroke="#9b8ab8" stroke-width="1"/>
    <text x="315" y="163" text-anchor="middle" font-size="10" fill="#2c3e50">Feed Forward + Add &amp; Norm</text>
  </g>
  
  <!-- Arrow from Encoder to Decoder (Cross Attention) -->
  <path class="arrow-line" d="M315 175 L315 200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decoder Stack -->
  <g class="decoder-block" data-narration="The Decoder uses masked self-attention, cross-attention with encoder outputs, and feed-forward layers for autoregressive generation">
    <rect x="230" y="205" width="170" height="100" rx="8" fill="url(#decoderGrad)" stroke="#a87070" stroke-width="2"/>
    <text x="315" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Decoder</text>
    
    <!-- Masked Multi-Head Attention -->
    <rect x="240" y="230" width="150" height="32" rx="4" fill="url(#attentionGrad)" stroke="#6bb08a" stroke-width="1"/>
    <text x="315" y="242" text-anchor="middle" font-size="10" fill="#2c3e50">Masked Self-Attention</text>
    <text x="315" y="254" text-anchor="middle" font-size="9" fill="#555">(prev outputs)</text>
    
    <!-- Cross Attention -->
    <rect x="240" y="262" width="150" height="32" rx="4" fill="#b8e0d2" stroke="#6bb08a" stroke-width="1" class="attention-box"/>
    <text x="315" y="274" text-anchor="middle" font-size="10" fill="#2c3e50">Cross-Attention</text>
    <text x="315" y="286" text-anchor="middle" font-size="9" fill="#555">(encoder context)</text>
  </g>
  
  <!-- Arrow to Output -->
  <path class="arrow-line" d="M315 305 L315 325" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Output -->
  <g class="section-box" data-narration="The output is generated token by token through linear projection and softmax, producing probability distributions for next token prediction">
    <rect x="280" y="330" width="70" height="25" rx="4" fill="#f9c74f" stroke="#e9c46a" stroke-width="1"/>
    <text x="315" y="347" text-anchor="middle" font-size="11" fill="#333">Output</text>
  </g>
  
  <!-- Key Formula Box -->
  <g class="formula" data-narration="The scaled dot-product attention formula: softmax(QK^T / √d_k)V computes attention weights between queries and keys">
    <rect x="20" y="295" width="180" height="55" rx="6" fill="#fff" stroke="#ddd" stroke-width="1.5" opacity="0.95"/>
    <text x="110" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Attention Formula</text>
    <text x="110" y="332" text-anchor="middle" font-size="10" fill="#555">Attention(Q,K,V) =</text>
    <text x="110" y="346" text-anchor="middle" font-size="10" fill="#555">softmax(QKᵀ/√d_k)V</text>
  </g>
  
  <!-- Key Concepts Labels -->
  <g class="section-box" data-narration="Query, Key, Value vectors are learned linear transformations of input embeddings enabling the model to focus on relevant context">
    <rect x="20" y="355" width="180" height="35" rx="5" fill="#e8f4f8" stroke="#a8d8ea" stroke-width="1"/>
    <text x="110" y="368" text-anchor="middle" font-size="10" fill="#2c3e50">Q, K, V: Query, Key, Value</text>
    <text x="110" y="382" text-anchor="middle" font-size="9" fill="#555">learned projections for attention</text>
  </g>
  
  <!-- Multi-head illustration -->
  <g data-narration="Multiple attention heads operate in parallel, each learning different semantic relationships and patterns in the data">
    <circle cx="215" cy="90" r="8" fill="#ff6b6b" opacity="0.7"/>
    <circle cx="225" cy="105" r="8" fill="#4ecdc4" opacity="0.7"/>
    <circle cx="220" cy="120" r="8" fill="#ffe66d" opacity="0.7"/>
    <text x="225" y="145" text-anchor="middle" font-size="8" fill="#666">Multi-Head</text>
  </g>
  
  <!-- Cross-attention arrow from encoder -->
  <path d="M280 115 L280 275" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </path>
  <text x="265" y="200" font-size="8" fill="#ff6b6b" transform="rotate(-90 265 200)">Cross-Attention</text>
  
  <!-- Decorative elements -->
  <circle cx="400" cy="50" r="15" fill="#a8d8ea" opacity="0.3"/>
  <circle cx="20" cy="250" r="20" fill="#d4a5a5" opacity="0.2"/>
  <circle cx="400" cy="350" r="12" fill="#b8e0d2" opacity="0.3"/>
</svg>