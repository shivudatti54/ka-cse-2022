<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="lstm-gru-sequence-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dff0"/>
    </linearGradient>
    <linearGradient id="cellStateGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="gateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#F57C00"/>
    </linearGradient>
    <linearGradient id="hiddenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0"/>
      <stop offset="100%" style="stop-color:#7B1FA2"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .formula { font-family: 'Courier New', monospace; font-size: 10px; fill: #444; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .box-text { font-family: Arial, sans-serif; font-size: 10px; fill: #fff; }
    .section-box { rx: 8; ry: 8; stroke: #888; stroke-width: 1; }
    .gate { rx: 5; ry: 5; }
    .cell-line { stroke: url(#cellStateGradient); stroke-width: 4; fill: none; }
    .flow-line { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .animated-fade { animation: fadeIn 1s ease-out forwards; }
    .animated-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .animated-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .animated-slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .animated-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animated-fade">LSTM Cell Architecture</text>
  
  <!-- Main LSTM Cell Structure -->
  <g class="animated-slide-up" style="animation-delay: 0.2s;">
    <!-- Cell State Line (top horizontal) -->
    <line x1="40" y1="100" x2="380" y2="100" class="cell-line"/>
    <text x="35" y="105" class="label" style="font-size:12px;">Cₜ₋₁</text>
    <text x="375" y="105" class="label" style="font-size:12px;">Cₜ</text>
    
    <!-- Cell State Update Box -->
    <rect x="200" y="85" width="60" height="30" fill="#4CAF50" rx="5" class="animated-pulse" style="animation-delay: 1s;"/>
    <text x="230" y="105" text-anchor="middle" class="box-title">× +</text>
    
    <!-- Forget Gate -->
    <rect x="80" y="140" width="70" height="45" fill="url(#gateGradient)" class="gate" data-narration="Forget gate decides what information to discard from previous cell state"/>
    <text x="115" y="158" text-anchor="middle" class="box-title">Forget</text>
    <text x="115" y="173" text-anchor="middle" class="box-text">fₜ = σ</text>
    
    <!-- Input Gate -->
    <rect x="175" y="140" width="70" height="45" fill="url(#gateGradient)" class="gate" data-narration="Input gate decides what new information to store in cell state"/>
    <text x="210" y="158" text-anchor="middle" class="box-title">Input</text>
    <text x="210" y="173" text-anchor="middle" class="box-text">iₜ = σ</text>
    
    <!-- Candidate Cell State -->
    <rect x="270" y="140" width="80" height="45" fill="#2196F3" class="gate" data-narration="Candidate values that could be added to cell state"/>
    <text x="310" y="158" text-anchor="middle" class="box-title">Candidate</text>
    <text x="310" y="173" text-anchor="middle" class="box-text">C̃ₜ = tanh</text>
    
    <!-- Output Gate -->
    <rect x="270" y="220" width="80" height="45" fill="url(#gateGradient)" class="gate" data-narration="Output gate decides what parts of cell state to output"/>
    <text x="310" y="238" text-anchor="middle" class="box-title">Output</text>
    <text x="310" y="253" text-anchor="middle" class="box-text">oₜ = σ</text>
    
    <!-- Hidden State Line -->
    <line x1="40" y1="300" x2="380" y2="300" stroke="#9C27B0" stroke-width="4" fill="none"/>
    <text x="35" y="305" class="label" style="font-size:12px;">hₜ₋₁</text>
    <text x="375" y="305" class="label" style="font-size:12px;">hₜ</text>
    
    <!-- Input -->
    <rect x="40" y="280" width="50" height="25" fill="#607D8B" rx="4"/>
    <text x="65" y="296" text-anchor="middle" class="box-title" style="font-size:11px;">xₜ</text>
    
    <!-- Flow arrows -->
    <path d="M115 185 L115 220" class="flow-line"/>
    <path d="M210 185 L230 115" class="flow-line"/>
    <path d="M310 185 L270 115" class="flow-line"/>
    <path d="M115 300 L115 250 L230 250 L230 220" class="flow-line"/>
    <path d="M310 265 L310 300" class="flow-line"/>
    <path d="M90 300 L90 185" class="flow-line"/>
    <path d="M230 100 L310 100 L310 140" class="flow-line"/>
  </g>
  
  <!-- Key Formulas Box -->
  <g class="animated-slide-left" style="animation-delay: 0.5s;">
    <rect x="10" y="330" width="195" height="60" fill="#37474F" rx="8" class="section-box" data-narration="Core LSTM equations showing how gates and cell state interact"/>
    <text x="20" y="350" class="label" style="fill:#4CAF50;font-size:11px;">Cell State Update:</text>
    <text x="20" y="365" class="formula">Cₜ = fₜ⊙Cₜ₋₁ + iₜ⊙C̃ₜ</text>
    <text x="20" y="382" class="label" style="fill:#9C27B0;font-size:11px;">Hidden State:</text>
    <text x="20" y="395" class="formula">hₜ = oₜ⊙tanh(Cₜ)</text>
  </g>
  
  <!-- Gate Details Box -->
  <g class="animated-slide-right" style="animation-delay: 0.6s;">
    <rect x="215" y="330" width="195" height="60" fill="#37474F" rx="8" class="section-box" data-narration="All gates use sigmoid function outputting values between 0 and 1"/>
    <text x="225" y="350" class="label" style="fill:#FF9800;font-size:11px;">Gate Computation:</text>
    <text x="225" y="365" class="formula">gₜ = σ(W·[hₜ₋₁,xₜ]+b)</text>
    <text x="225" y="382" class="label" style="fill:#2196F3;font-size:11px;">Candidate:</text>
    <text x="225" y="395" class="formula">C̃ₜ = tanh(W·[hₜ₋₁,xₜ]+b)</text>
  </g>
  
  <!-- Gate Legend -->
  <g class="animated-fade" style="animation-delay: 0.8s;">
    <rect x="10" y="10" width="120" height="75" fill="rgba(255,255,255,0.8)" rx="6" stroke="#ccc"/>
    <circle cx="25" cy="28" r="6" fill="#FF9800"/>
    <text x="40" y="32" class="sublabel">Sigmoid Gate</text>
    <circle cx="25" cy="48" r="6" fill="#4CAF50"/>
    <text x="40" y="52" class="sublabel">Cell State</text>
    <circle cx="25" cy="68" r="6" fill="#9C27B0"/>
    <text x="40" y="72" class="sublabel">Hidden State</text>
  </g>
  
  <!-- GRU Reference -->
  <g class="animated-fade" style="animation-delay: 1s;">
    <rect x="290" y="10" width="120" height="50" fill="rgba(255,255,255,0.8)" rx="6" stroke="#ccc" data-narration="GRU is a simplified version with 2 gates instead of 3"/>
    <text x="350" y="30" text-anchor="middle" class="label" style="font-size:12px;">GRU: 2 Gates</text>
    <text x="350" y="48" text-anchor="middle" class="sublabel">Reset + Update</text>
  </g>
  
  <!-- Pulsing animation on key elements -->
  <circle cx="230" cy="100" r="4" fill="#4CAF50" class="animated-pulse" style="animation-delay: 1.5s;"/>
  <circle cx="115" cy="140" r="4" fill="#FF9800" class="animated-pulse" style="animation-delay: 1.7s;"/>
  <circle cx="210" cy="140" r="4" fill="#FF9800" class="animated-pulse" style="animation-delay: 1.9s;"/>
  <circle cx="310" cy="140" r="4" fill="#FF9800" class="animated-pulse" style="animation-delay: 2.1s;"/>
</svg>