<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="variational-autoencoders">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0f0"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#e0f0e8"/>
    </linearGradient>
    <linearGradient id="encoderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c9ed9"/>
      <stop offset="100%" style="stop-color:#5a7fc9"/>
    </linearGradient>
    <linearGradient id="decoderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ed98e"/>
      <stop offset="100%" style="stop-color:#7bc96f"/>
    </linearGradient>
    <linearGradient id="latentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d99e7c"/>
      <stop offset="100%" style="stop-color:#c9825a"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .input-box { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .encoder-box { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .latent-box { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .sampling-box { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .decoder-box { animation: slideInRight 0.6s ease-out 1.0s forwards; opacity: 0; }
    .output-box { animation: slideInRight 0.6s ease-out 1.2s forwards; opacity: 0; }
    .loss-box { animation: slideInUp 0.6s ease-out 1.4s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" class="title">Variational Autoencoders</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666" class="title">(VAE Architecture)</text>
  
  <!-- Input x -->
  <g class="input-box" data-narration="Input data x - the original high-dimensional data being encoded">
    <rect x="20" y="70" width="70" height="45" rx="5" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
    <text x="55" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">x</text>
    <text x="55" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">(Input)</text>
  </g>
  
  <!-- Arrow from input to encoder -->
  <line x1="90" y1="92" x2="115" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.3s"/>
  
  <!-- Encoder Network -->
  <g class="encoder-box" data-narration="Encoder neural network - compresses input into latent parameters (mean and variance)">
    <rect x="115" y="70" width="85" height="45" rx="5" fill="url(#encoderGrad)" stroke="#4466aa" stroke-width="1.5"/>
    <text x="157" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Encoder</text>
    <text x="157" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#eef">qφ(z|x)</text>
  </g>
  
  <!-- Arrow from encoder to latent params -->
  <line x1="200" y1="92" x2="225" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.5s"/>
  
  <!-- Latent Parameters μ, σ -->
  <g class="latent-box" data-narration="Latent parameters - mean (μ) and standard deviation (σ) defining the approximate posterior distribution">
    <rect x="225" y="70" width="85" height="45" rx="5" fill="url(#latentGrad)" stroke="#a65a3a" stroke-width="1.5"/>
    <text x="267" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">μ, σ²</text>
    <text x="267" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffe0d0">Latent params</text>
  </g>
  
  <!-- Arrow from latent to sampling -->
  <line x1="267" y1="130" x2="267" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.7s"/>
  
  <!-- Sampling z = g(ε,x) -->
  <g class="sampling-box" data-narration="Reparameterization trick - samples z from the latent distribution using z = μ + σ⊙ε where ε~N(0,1)">
    <rect x="220" y="155" width="95" height="55" rx="5" fill="#fff8e8" stroke="#d4a574" stroke-width="1.5" class="pulse-anim"/>
    <text x="267" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8b5a2b">z = μ + σ·ε</text>
    <text x="267" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a07040">ε ~ 𝒩(0, I)</text>
    <text x="267" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a07040">(Reparam. Trick)</text>
  </g>
  
  <!-- Arrow from sampling to decoder -->
  <line x1="267" y1="210" x2="267" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.9s"/>
  
  <!-- Arrow from latent params to decoder -->
  <line x1="310" y1="92" x2="335" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.7s"/>
  
  <!-- Decoder Network -->
  <g class="decoder-box" data-narration="Decoder neural network - reconstructs data from latent sample z">
    <rect x="335" y="70" width="85" height="45" rx="5" fill="url(#decoderGrad)" stroke="#5a9a4a" stroke-width="1.5"/>
    <text x="377" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Decoder</text>
    <text x="377" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e0ffe0">pθ(x|z)</text>
  </g>
  
  <!-- Arrow from decoder to output -->
  <line x1="420" y1="92" x2="445" y2="92" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 1.1s"/>
  
  <!-- Output x̂ -->
  <g class="output-box" data-narration="Reconstructed output x̂ - the decoder's attempt to reconstruct the original input">
    <rect x="335" y="155" width="70" height="45" rx="5" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
    <text x="370" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">x̂</text>
    <text x="370" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">(Output)</text>
  </g>
  
  <!-- Arrow from sampling to decoder (direct z) -->
  <line x1="310" y1="182" x2="335" y2="182" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 1.0s"/>
  <text x="322" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#777">z</text>
  
  <!-- Loss Functions Box -->
  <g class="loss-box" data-narration="Loss function - ELBO combines reconstruction loss and KL divergence to train the VAE">
    <rect x="115" y="250" width="190" height="130" rx="6" fill="#fff" stroke="#999" stroke-width="1.5"/>
    <text x="210" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Loss: Evidence Lower Bound (ELBO)</text>
    
    <text x="130" y="295" font-family="Arial, sans-serif" font-size="11" fill="#333">
      <tspan font-weight="bold">ELBO = 𝔼[log p(x|z)]</tspan>
    </text>
    <text x="130" y="310" font-family="Arial, sans-serif" font-size="11" fill="#333">
      <tspan>      - D</tspan><tspan baseline-shift="sub" font-size="8">KL</tspan><tspan>(q(z|x) || p(z))</tspan>
    </text>
    
    <!-- Two loss components -->
    <rect x="130" y="322" width="85" height="45" rx="4" fill="#e8f4e8" stroke="#7bc96f" stroke-width="1"/>
    <text x="172" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3a6a3a">Reconstruction</text>
    <text x="172" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3a6a3a">Loss</text>
    
    <rect x="225" y="322" width="70" height="45" rx="4" fill="#f0e8d8" stroke="#d4a574" stroke-width="1"/>
    <text x="260" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#8b5a2b">KL</text>
    <text x="260" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8b5a2b">Regularization</text>
    
    <!-- Curved arrow showing feedback -->
    <path d="M 175 295 Q 175 250 210 250 Q 245 250 245 295" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="210" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#777">Backprop</text>
  </g>
  
  <!-- Prior p(z) annotation -->
  <g class="float-anim" style="animation-delay: 1.5s">
    <text x="267" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Prior: p(z) = 𝒩(0, I)</text>
  </g>
  
  <!-- Key insight box -->
  <rect x="20" y="320" width="85" height="55" rx="4" fill="#fef3e2" stroke="#e8c080" stroke-width="1"/>
  <text x="62" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#b87020">Key Insight</text>
  <text x="62" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a06010">Bayesian inference</text>
  <text x="62" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a06010">in deep networks</text>
  
  <!-- Applications box -->
  <rect x="315" y="320" width="85" height="55" rx="4" fill="#e2e8fe" stroke="#8090d0" stroke-width="1"/>
  <text x="357" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4050a0">Applications</text>
  <text x="357" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4050a0">Image generation</text>
  <text x="357" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4050a0">Anomaly detection</text>
</svg>