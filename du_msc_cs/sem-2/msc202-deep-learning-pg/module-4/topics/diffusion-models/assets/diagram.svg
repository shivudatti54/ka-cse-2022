<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="diffusion-models">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="50%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="forwardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="reverseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7986cb"/>
      <stop offset="100%" style="stop-color:#5c6bc0"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #1a237e; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #37474f; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #546e7a; }
    .formula { font-family: 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #263238; }
    .section-title { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: bold; fill: #283593; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .animated-fade { animation: fadeIn 1s ease-out forwards; }
    .animated-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .animated-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .animated-pulse { animation: pulse 2s ease-in-out infinite; }
    .animated-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title animated-fade">Diffusion Models</text>
  
  <!-- Forward Process Section -->
  <g class="animated-slide-left" data-narration="Forward diffusion gradually adds Gaussian noise to data over T timesteps">
    <rect x="20" y="55" width="170" height="140" fill="url(#forwardGrad)" class="box" stroke="#64b5f6" data-narration="Forward process adds noise"/>
    <text x="105" y="72" text-anchor="middle" class="section-title">Forward Process</text>
    
    <!-- Clean to Noisy visualization -->
    <rect x="35" y="85" width="40" height="40" fill="#81c784" rx="3"/>
    <text x="55" y="108" text-anchor="middle" font-size="8" fill="#fff">x₀</text>
    <text x="55" y="140" text-anchor="middle" class="detail">Clean</text>
    
    <line x1="80" y1="105" x2="110" y2="105" stroke="#64b5f6" stroke-width="2" class="animated-line"/>
    <text x="95" y="98" text-anchor="middle" font-size="9" fill="#64b5f6">+noise</text>
    
    <rect x="115" y="85" width="40" height="40" fill="#a5d6a7" rx="3" opacity="0.7"/>
    <text x="135" y="108" text-anchor="middle" font-size="8" fill="#fff">x₁</text>
    
    <line x1="160" y1="105" x2="190" y2="105" stroke="#64b5f6" stroke-width="2" class="animated-line"/>
    <text x="175" y="98" text-anchor="middle" font-size="9" fill="#64b5f6">+noise</text>
    
    <rect x="125" y="130" width="40" height="40" fill="#ef9a9a" rx="3" opacity="0.5"/>
    <text x="145" y="153" text-anchor="middle" font-size="8" fill="#fff">xₜ</text>
    <text x="145" y="185" text-anchor="middle" class="detail">Noisy</text>
    
    <!-- Formula -->
    <text x="105" y="205" text-anchor="middle" class="formula">q(xₜ|xₜ₋₁) = N(√(1-βₜ)xₜ₋₁, βₜI)</text>
  </g>
  
  <!-- Reverse Process Section -->
  <g class="animated-slide-right" data-narration="Reverse process uses neural network to denoise samples iteratively">
    <rect x="230" y="55" width="170" height="140" fill="url(#reverseGrad)" class="box" stroke="#ba68c8" data-narration="Reverse process removes noise"/>
    <text x="315" y="72" text-anchor="middle" class="section-title">Reverse Process</text>
    
    <!-- Noisy to Clean visualization -->
    <rect x="245" y="85" width="40" height="40" fill="#ef9a9a" rx="3" opacity="0.5"/>
    <text x="265" y="108" text-anchor="middle" font-size="8" fill="#fff">xₜ</text>
    <text x="265" y="140" text-anchor="middle" class="detail">Noisy</text>
    
    <line x1="290" y1="105" x2="320" y2="105" stroke="#ba68c8" stroke-width="2" class="animated-line"/>
    <text x="305" y="98" text-anchor="middle" font-size="9" fill="#ba68c8">εθ</text>
    
    <rect x="325" y="85" width="40" height="40" fill="#a5d6a7" rx="3" opacity="0.7"/>
    <text x="345" y="108" text-anchor="middle" font-size="8" fill="#fff">xₜ₋₁</text>
    
    <line x1="370" y1="105" x2="400" y2="105" stroke="#ba68c8" stroke-width="2" class="animated-line"/>
    <text x="385" y="98" text-anchor="middle" font-size="9" fill="#ba68c8">εθ</text>
    
    <rect x="335" y="130" width="40" height="40" fill="#81c784" rx="3"/>
    <text x="355" y="153" text-anchor="middle" font-size="8" fill="#fff">x₀</text>
    <text x="355" y="185" text-anchor="middle" class="detail">Clean</text>
    
    <!-- Formula -->
    <text x="315" y="205" text-anchor="middle" class="formula">pθ(xₜ₋₁|xₜ) = N(μθ(xₜ,t), Σθ)</text>
  </g>
  
  <!-- Center Arrow and Cycle -->
  <g class="animated-fade" data-narration="The complete diffusion process forms a cycle between data and noise">
    <path d="M 200 125 Q 210 115 220 125" fill="none" stroke="#7986cb" stroke-width="2" class="animated-line"/>
    <path d="M 220 145 Q 210 155 200 145" fill="none" stroke="#ba68c8" stroke-width="2" class="animated-line"/>
    <text x="210" y="138" text-anchor="middle" font-size="10" fill="#5c6bc0" font-weight="bold">↻</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="animated-fade" data-narration="Key concepts include variance schedule, ELBO, and noise schedule">
    <rect x="20" y="210" width="380" height="85" fill="#fff" rx="8" stroke="#90a4ae" stroke-width="1" opacity="0.9"/>
    <text x="210" y="230" text-anchor="middle" class="section-title" fill="#37474f">Key Concepts</text>
    
    <g transform="translate(35, 245)">
      <circle cx="5" cy="5" r="4" fill="#7986cb"/>
      <text x="15" y="9" class="detail">Variance Schedule: β₁,...,β_T controls noise addition</text>
    </g>
    <g transform="translate(35, 262)">
      <circle cx="5" cy="5" r="4" fill="#ba68c8"/>
      <text x="15" y="9" class="detail">ELBO: Training objective from variational inference</text>
    </g>
    <g transform="translate(35, 279)">
      <circle cx="5" cy="5" r="4" fill="#4db6ac"/>
      <text x="15" y="9" class="detail">Noise Schedule: Cosine schedule for better quality</text>
    </g>
  </g>
  
  <!-- Applications Box -->
  <g class="animated-fade" data-narration="Applications include image synthesis, text-to-image, and drug discovery">
    <rect x="20" y="305" width="380" height="45" fill="#e8f5e9" rx="8" stroke="#81c784" stroke-width="1"/>
    <text x="210" y="325" text-anchor="middle" class="section-title" fill="#2e7d32">Applications</text>
    <text x="210" y="342" text-anchor="middle" class="detail">DALL-E 2 • Image Synthesis • Audio Generation • Drug Discovery • Molecular Design</text>
  </g>
  
  <!-- Decorative dots -->
  <g class="animated-pulse" style="transform-origin: 385px 380px;">
    <circle cx="380" cy="375" r="8" fill="#7986cb" opacity="0.6"/>
    <circle cx="395" cy="385" r="5" fill="#ba68c8" opacity="0.5"/>
    <circle cx="365" cy="388" r="4" fill="#4db6ac" opacity="0.5"/>
  </g>
</svg>