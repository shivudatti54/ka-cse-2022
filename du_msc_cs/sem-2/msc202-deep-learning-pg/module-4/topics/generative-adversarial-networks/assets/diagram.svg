<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="generative-adversarial-networks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="generatorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="discriminatorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-box { rx: 8; ry: 8; }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .gen-anim { animation: slideInLeft 0.8s ease-out 0.2s forwards; opacity: 0; }
    .disc-anim { animation: slideInRight 0.8s ease-out 0.4s forwards; opacity: 0; }
    .feedback-anim { animation: pulse 2s ease-in-out infinite; transform-origin: 280px 200px; }
    .arrow-flow { animation: flowDash 1s linear infinite; }
    .equation { font-family: 'Courier New', monospace; font-size: 10px; fill: #2c3e50; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Generative Adversarial Networks</text>
  
  <!-- Generator Section -->
  <g class="gen-anim" data-narration="The Generator creates synthetic data from random noise using a neural network">
    <rect x="30" y="70" width="120" height="130" fill="url(#generatorGrad)" class="section-box" filter="url(#shadow)"/>
    <text x="90" y="90" text-anchor="middle" class="label">GENERATOR</text>
    <rect x="45" y="105" width="90" height="20" rx="4" fill="#fff" stroke="#7f8c8d"/>
    <text x="90" y="118" text-anchor="middle" class="detail">FC Layer 1</text>
    <rect x="45" y="130" width="90" height="20" rx="4" fill="#fff" stroke="#7f8c8d"/>
    <text x="90" y="143" text-anchor="middle" class="detail">FC Layer 2</text>
    <rect x="45" y="155" width="90" height="20" rx="4" fill="#fff" stroke="#7f8c8d"/>
    <text x="90" y="168" text-anchor="middle" class="detail">FC Layer 3</text>
  </g>
  
  <!-- Noise Input -->
  <g class="gen-anim" data-narration="Latent noise vector z (typically 100 dimensions) is the random input">
    <rect x="45" y="210" width="90" height="35" rx="4" fill="#3498db" opacity="0.8"/>
    <text x="90" y="232" text-anchor="middle" class="label" fill="#fff">Noise z</text>
  </g>
  
  <!-- Generated Data -->
  <g class="gen-anim" data-narration="Generator outputs synthetic data (e.g., 784-dim for MNIST)">
    <rect x="45" y="255" width="90" height="35" rx="4" fill="#9b59b6" opacity="0.8"/>
    <text x="90" y="277" text-anchor="middle" class="label" fill="#fff">G(z)</text>
  </g>
  
  <!-- Discriminator Section -->
  <g class="disc-anim" data-narration="The Discriminator evaluates whether input is real or fake">
    <rect x="270" y="70" width="120" height="130" fill="url(#discriminatorGrad)" class="section-box" filter="url(#shadow)"/>
    <text x="330" y="90" text-anchor="middle" class="label">DISCRIMINATOR</text>
    <rect x="285" y="105" width="90" height="20" rx="4" fill="#fff" stroke="#7f8c8d"/>
    <text x="330" y="118" text-anchor="middle" class="detail">FC Layer 1</text>
    <rect x="285" y="130" width="90" height="20" rx="4" fill="#fff" stroke="#7f8c8d"/>
    <text x="330" y="143" text-anchor="middle" class="detail">FC Layer 2</text>
    <rect x="285" y="155" width="90" height="20" rx="4" fill="#fff" stroke="#7f8c8d"/>
    <text x="330" y="168" text-anchor="middle" class="detail">Output (0-1)</text>
  </g>
  
  <!-- Real Data Input -->
  <g class="disc-anim" data-narration="Real data samples from training set are fed to discriminator">
    <rect x="285" y="210" width="90" height="35" rx="4" fill="#27ae60" opacity="0.8"/>
    <text x="330" y="232" text-anchor="middle" class="label" fill="#fff">Real Data</text>
  </g>
  
  <!-- Decision Output -->
  <g class="disc-anim" data-narration="Discriminator outputs probability (real=1, fake=0)">
    <rect x="285" y="255" width="90" height="35" rx="4" fill="#e74c3c" opacity="0.8"/>
    <text x="330" y="277" text-anchor="middle" class="label" fill="#fff">D(x) ∈ [0,1]</text>
  </g>
  
  <!-- Arrows and Flow -->
  <g class="feedback-anim" data-narration="Adversarial training: Generator tries to fool D, D tries to detect fakes">
    <!-- Arrow from Generated to Discriminator -->
    <path d="M135 135 L270 135" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-flow" stroke-dasharray="5,5"/>
    <text x="200" y="128" text-anchor="middle" class="detail">G(z) → D</text>
    
    <!-- Arrow from Real Data to Discriminator -->
    <path d="M285 245 L330 200" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Feedback Arrow from Discriminator to Generator -->
    <path d="M330 200 L330 320 Q330 340 200 340 Q70 340 90 320" stroke="#9b59b6" stroke-width="2" fill="none" stroke-dasharray="5,5" class="arrow-flow"/>
    <text x="210" y="355" text-anchor="middle" class="detail" fill="#9b59b6">Loss → Generator</text>
  </g>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>
  
  <!-- Minimax Equation Box -->
  <g data-narration="Minimax objective: Generator minimizes log(1-D(G(z))), Discriminator maximizes log D(x)">
    <rect x="140" y="360" width="140" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="210" y="376" text-anchor="middle" class="equation">V(D,G) = min_G max_D</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key GAN variants include DCGAN, WGAN, CycleGAN, and StyleGAN">
    <rect x="10" y="340" width="125" height="50" rx="4" fill="#fff9c4" stroke="#f1c40f" opacity="0.9"/>
    <text x="72" y="355" text-anchor="middle" class="detail" font-weight="bold">Variants:</text>
    <text x="72" y="368" text-anchor="middle" class="detail">DCGAN, WGAN</text>
    <text x="72" y="380" text-anchor="middle" class="detail">CycleGAN, StyleGAN</text>
  </g>
  
  <g data-narration="Evaluation metrics measure quality and diversity of generated samples">
    <rect x="285" y="340" width="125" height="50" rx="4" fill="#e8f5e9" stroke="#27ae60" opacity="0.9"/>
    <text x="347" y="355" text-anchor="middle" class="detail" font-weight="bold">Metrics:</text>
    <text x="347" y="368" text-anchor="middle" class="detail">Inception Score</text>
    <text x="347" y="380" text-anchor="middle" class="detail">FID Score</text>
  </g>
</svg>