<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="transfer-learning" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f4e8"/>
    </linearGradient>
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
    <linearGradient id="adaptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8e8d0"/>
      <stop offset="100%" style="stop-color:#f5cba7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-box { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .section-box-target { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .section-box-adapt { animation: fadeIn 0.7s ease-out 0.3s forwards; opacity: 0; }
    .arrow-path { animation: arrowFlow 1.5s linear infinite; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title title-text">Transfer Learning</text>
  
  <!-- Source Model Section -->
  <g class="section-box" data-narration="Source model pre-trained on large dataset (e.g., ImageNet) containing learned features">
    <rect x="20" y="60" width="120" height="100" rx="8" fill="url(#sourceGrad)" filter="url(#shadow)"/>
    <text x="80" y="82" text-anchor="middle" class="section-title">SOURCE MODEL</text>
    <text x="80" y="105" text-anchor="middle" class="detail">Pre-trained</text>
    <text x="80" y="120" text-anchor="middle" class="detail">e.g., VGG16, ResNet</text>
    <text x="80" y="140" text-anchor="middle" class="detail" font-size="10px">ImageNet Features</text>
    <!-- Neural network icon -->
    <circle cx="60" cy="105" r="6" fill="#5a7d9a" opacity="0.7"/>
    <circle cx="80" cy="105" r="6" fill="#5a7d9a" opacity="0.7"/>
    <circle cx="100" cy="105" r="6" fill="#5a7d9a" opacity="0.7"/>
    <circle cx="60" cy="125" r="6" fill="#5a7d9a" opacity="0.7"/>
    <circle cx="80" cy="125" r="6" fill="#5a7d9a" opacity="0.7"/>
    <circle cx="100" cy="125" r="6" fill="#5a7d9a" opacity="0.7"/>
  </g>
  
  <!-- Arrow from Source -->
  <g class="arrow-path">
    <path d="M145 110 L185 110" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
    <polygon points="185,110 178,105 178,115" fill="#666"/>
  </g>
  
  <!-- Adaptation Layer -->
  <g class="section-box-adapt" data-narration="Adaptation layer performs feature extraction or fine-tuning to transfer knowledge">
    <rect x="190" y="70" width="100" height="80" rx="8" fill="url(#adaptGrad)" filter="url(#shadow)"/>
    <text x="240" y="92" text-anchor="middle" class="section-title">ADAPTATION</text>
    <text x="240" y="112" text-anchor="middle" class="detail">Feature Extraction</text>
    <text x="240" y="128" text-anchor="middle" class="detail">or Fine-Tuning</text>
    <!-- Gear icon -->
    <circle cx="240" cy="115" r="18" fill="none" stroke="#c19a6b" stroke-width="2" class="pulse-element"/>
    <circle cx="240" cy="115" r="8" fill="#c19a6b" opacity="0.5"/>
  </g>
  
  <!-- Arrow from Adaptation -->
  <g class="arrow-path">
    <path d="M295 110 L335 110" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
    <polygon points="335,110 328,105 328,115" fill="#666"/>
  </g>
  
  <!-- Target Model Section -->
  <g class="section-box-target" data-narration="Target model applies transferred knowledge to related task with limited data">
    <rect x="340" y="60" width="70" height="100" rx="8" fill="url(#targetGrad)" filter="url(#shadow)"/>
    <text x="375" y="82" text-anchor="middle" class="section-title">TARGET</text>
    <text x="375" y="105" text-anchor="middle" class="detail">Task Model</text>
    <text x="375" y="125" text-anchor="middle" class="detail" font-size="10px">New Domain</text>
    <text x="375" y="140" text-anchor="middle" class="detail" font-size="10px">(e.g., Medical)</text>
    <!-- Output icon -->
    <rect x="365" y="145" width="20" height="8" rx="2" fill="#4caf50"/>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="concept-box" data-narration="Feature extraction uses pre-trained layers as fixed feature detectors" style="animation-delay: 0.5s">
    <rect x="20" y="180" width="115" height="55" rx="6" fill="#fff" stroke="#a8d8ea" stroke-width="2"/>
    <text x="77" y="198" text-anchor="middle" class="section-title" fill="#2980b9">Feature Extraction</text>
    <text x="77" y="215" text-anchor="middle" class="detail">Fixed feature</text>
    <text x="77" y="228" text-anchor="middle" class="detail">extractors</text>
  </g>
  
  <g class="concept-box" data-narration="Fine-tuning updates pre-trained weights for target task" style="animation-delay: 0.7s">
    <rect x="150" y="180" width="115" height="55" rx="6" fill="#fff" stroke="#f5cba7" stroke-width="2"/>
    <text x="207" y="198" text-anchor="middle" class="section-title" fill="#d35400">Fine-Tuning</text>
    <text x="207" y="215" text-anchor="middle" class="detail">θ_new = θ_pre</text>
    <text x="207" y="228" text-anchor="middle" class="detail">+ Δθ (backprop)</text>
  </g>
  
  <g class="concept-box" data-narration="Domain adaptation aligns source and target distributions" style="animation-delay: 0.9s">
    <rect x="280" y="180" width="115" height="55" rx="6" fill="#fff" stroke="#c8e6c9" stroke-width="2"/>
    <text x="337" y="198" text-anchor="middle" class="section-title" fill="#27ae60">Domain Adaptation</text>
    <text x="337" y="215" text-anchor="middle" class="detail">Distribution</text>
    <text x="337" y="228" text-anchor="middle" class="detail">alignment (MMD)</text>
  </g>
  
  <!-- Benefits Box -->
  <g class="concept-box" data-narration="Transfer learning benefits: reduced training time, less data needed, better performance" style="animation-delay: 1.1s">
    <rect x="20" y="250" width="375" height="50" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
    <text x="35" y="272" class="section-title" fill="#2c3e50">Benefits:</text>
    <text x="35" y="290" class="detail">• Reduces training time &amp; computational cost</text>
    <text x="200" y="290" class="detail">• Works with limited data</text>
    <text x="320" y="290" class="detail">• Improves performance</text>
  </g>
  
  <!-- Applications -->
  <g class="concept-box" data-narration="Common applications include medical imaging, cross-modal transfer, and domain adaptation" style="animation-delay: 1.3s">
    <rect x="20" y="310" width="375" height="40" rx="8" fill="#fef9e7" stroke="#f9e79f" stroke-width="1"/>
    <text x="35" y="330" class="section-title" fill="#9a7d0a">Applications:</text>
    <text x="35" y="342" class="detail" font-size="10px">Medical Imaging</text>
    <text x="130" y="342" class="detail" font-size="10px">NLP (BERT, GPT)</text>
    <text x="230" y="342" class="detail" font-size="10px">Vision-to-Text</text>
    <text x="330" y="342" class="detail" font-size="10px">Robotics</text>
  </g>
  
  <!-- Knowledge Flow Indicator -->
  <g class="pulse-element" style="animation-delay: 1.5s">
    <text x="210" y="385" text-anchor="middle" class="label" fill="#666">
      Knowledge Transfer: Source → Adaptation → Target
    </text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="30" cy="370" r="3" fill="#aaa" opacity="0.5"/>
  <circle cx="390" cy="370" r="3" fill="#aaa" opacity="0.5"/>
</svg>