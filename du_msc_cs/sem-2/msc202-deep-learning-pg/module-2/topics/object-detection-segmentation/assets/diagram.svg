<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="object-detection-segmentation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f5"/>
      <stop offset="100%" style="stop-color:#c2dff0"/>
    </linearGradient>
    <linearGradient id="backboneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb5d6"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="rpnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#6dc49a"/>
    </linearGradient>
    <linearGradient id="roiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6b8d4"/>
      <stop offset="100%" style="stop-color:#d492b3"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5d89a"/>
      <stop offset="100%" style="stop-color:#f0c75e"/>
    </linearGradient>
    <linearGradient id="maskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#8bb8d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #5d6d7e; }
    .section-box { rx: 8; ry: 8; filter: url(#shadow); }
    .arrow { stroke: #7f8c8d; stroke-width: 2; fill: none; stroke-dasharray: 5,3; animation: flowDash 1s linear infinite; }
    .flow-line { stroke: #3498db; stroke-width: 2; fill: none; stroke-dasharray: 8,4; animation: flowDash 1.5s linear infinite; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Mask R-CNN Architecture</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="fade-in delay-1"/>

  <!-- Section 1: Input Image -->
  <g class="slide-in delay-1" data-narration="The input image is fed into the network for feature extraction">
    <rect x="30" y="55" width="60" height="60" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="4"/>
    <rect x="35" y="60" width="20" height="20" fill="#e74c3c" rx="2"/>
    <rect x="58" y="65" width="25" height="18" fill="#3498db" rx="2"/>
    <text x="60" y="130" text-anchor="middle" class="label">Input</text>
    <text x="60" y="143" text-anchor="middle" class="detail">Image</text>
  </g>

  <!-- Arrow from Input to Backbone -->
  <path d="M95 85 L130 85" class="flow-line"/>

  <!-- Section 2: Backbone Network (ResNet + FPN) -->
  <g class="slide-in delay-2" data-narration="Backbone network (ResNet with FPN) extracts multi-scale features from the input image">
    <rect x="135" y="55" width="80" height="60" fill="url(#backboneGrad)" class="section-box"/>
    <text x="175" y="80" text-anchor="middle" class="label" fill="white" font-weight="bold">Backbone</text>
    <text x="175" y="95" text-anchor="middle" class="detail" fill="white">ResNet50 +</text>
    <text x="175" y="107" text-anchor="middle" class="detail" fill="white">FPN</text>
    <!-- FPN feature maps -->
    <rect x="140" y="60" width="12" height="8" fill="white" opacity="0.3"/>
    <rect x="155" y="60" width="12" height="8" fill="white" opacity="0.4"/>
    <rect x="170" y="60" width="12" height="8" fill="white" opacity="0.5"/>
    <rect x="185" y="60" width="12" height="8" fill="white" opacity="0.6"/>
    <rect x="200" y="60" width="12" height="8" fill="white" opacity="0.7"/>
  </g>

  <!-- Arrow from Backbone to RPN -->
  <path d="M220 85 L255 85" class="flow-line"/>

  <!-- Section 3: RPN (Region Proposal Network) -->
  <g class="slide-in delay-3" data-narration="RPN proposes regions of interest using anchor boxes and predicts objectness scores">
    <rect x="260" y="55" width="70" height="60" fill="url(#rpnGrad)" class="section-box pulse"/>
    <text x="295" y="78" text-anchor="middle" class="label" fill="white" font-weight="bold">RPN</text>
    <text x="295" y="93" text-anchor="middle" class="detail" fill="white">Anchor</text>
    <text x="295" y="106" text-anchor="middle" class="detail" fill="white">Boxes</text>
  </g>

  <!-- Arrow down from RPN -->
  <path d="M295 120 L295 155" class="flow-line"/>

  <!-- Section 4: ROI Align -->
  <g class="slide-in delay-4" data-narration="ROI Align pools features from the feature maps for each proposed region without quantization error">
    <rect x="250" y="160" width="90" height="45" fill="url(#roiGrad)" class="section-box"/>
    <text x="295" y="185" text-anchor="middle" class="label" fill="white" font-weight="bold">ROI Align</text>
    <text x="295" y="200" text-anchor="middle" class="detail" fill="white">Feature Pooling</text>
  </g>

  <!-- Split arrows to two heads -->
  <path d="M295 210 L220 230" class="flow-line"/>
  <path d="M295 210 L370 230" class="flow-line"/>

  <!-- Section 5: Bounding Box Head -->
  <g class="slide-in delay-5" data-narration="Bounding box head performs classification and bounding box regression for each ROI">
    <rect x="160" y="235" width="100" height="55" fill="url(#boxGrad)" class="section-box"/>
    <text x="210" y="258" text-anchor="middle" class="label" fill="#5d4e37" font-weight="bold">Box Head</text>
    <text x="210" y="273" text-anchor="middle" class="detail" fill="#5d4e37">Class: Person, Car...</text>
    <text x="210" y="286" text-anchor="middle" class="detail" fill="#5d4e37">BBox: (x,y,w,h)</text>
  </g>

  <!-- Section 6: Mask Head -->
  <g class="slide-in delay-5" data-narration="Mask head generates segmentation masks for each object instance">
    <rect x="320" y="235" width="80" height="55" fill="url(#maskGrad)" class="section-box"/>
    <text x="360" y="258" text-anchor="middle" class="label" fill="white" font-weight="bold">Mask Head</text>
    <text x="360" y="273" text-anchor="middle" class="detail" fill="white">Pixel-level</text>
    <text x="360" y="286" text-anchor="middle" class="detail" fill="white">Masks</text>
  </g>

  <!-- Output section -->
  <g class="fade-in delay-5" data-narration="Final output combines class predictions, bounding boxes, and instance masks">
    <rect x="200" y="305" width="120" height="50" fill="#ecf0f1" stroke="#27ae60" stroke-width="2" rx="6"/>
    <text x="260" y="328" text-anchor="middle" class="label" fill="#27ae60" font-weight="bold">Final Output</text>
    <text x="260" y="345" text-anchor="middle" class="detail">Class + BBox + Mask</text>
  </g>

  <!-- Arrows to output -->
  <path d="M210 295 L210 305" class="arrow"/>
  <path d="M360 295 L360 305" class="arrow"/>

  <!-- Legend / Key Concepts -->
  <g class="fade-in delay-4">
    <rect x="30" y="360" width="360" height="30" fill="white" opacity="0.7" rx="4"/>
    <text x="210" y="378" text-anchor="middle" class="detail">
      <tspan fill="#e74c3c">●</tspan> Two-Stage 
      <tspan fill="#27ae60">●</tspan> Feature Extraction 
      <tspan fill="#3498db">●</tspan> Parallel Prediction
    </text>
  </g>

  <!-- Animated dots showing flow -->
  <circle r="4" fill="#3498db" class="pulse">
    <animateMotion dur="2s" repeatCount="indefinite" path="M95,85 L130,85 L220,85 L255,85 L295,85 L295,120 L295,155 L295,210"/>
  </circle>
</svg>