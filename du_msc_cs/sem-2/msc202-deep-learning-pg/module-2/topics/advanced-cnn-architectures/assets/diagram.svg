<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="advanced-cnn-architectures">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="skipGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#449d44"/>
    </linearGradient>
    <linearGradient id="convGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#ec971f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #5a6c7d; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #ffffff; }
    .concept-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .concept-text { font-family: Arial, sans-serif; font-size: 10px; fill: #5a6c7d; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #7f8c8d; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .anim-title { animation: fadeIn 0.8s ease-out forwards; }
    .anim-box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .anim-box2 { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .anim-box3 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .anim-box4 { animation: slideInLeft 0.6s ease-out 0.5s forwards; opacity: 0; }
    .anim-diagram { animation: fadeIn 1s ease-out 0.6s forwards; opacity: 0; }
    .anim-pulse { animation: pulse 3s ease-in-out infinite; }
    .dash-flow { stroke-dasharray: 8 4; animation: flowDash 1s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-title">Advanced CNN Architectures</text>
  <text x="210" y="45" text-anchor="middle" class="subtitle anim-title">ResNet Residual Block Diagram</text>

  <!-- Key Concepts Boxes -->
  <!-- Box 1: ResNet -->
  <g class="anim-box1" data-narration="ResNet introduces skip connections to solve vanishing gradients. The residual block computes F(x) + x where F represents the convolutional layers.">
    <rect x="10" y="60" width="95" height="55" class="box" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="10" y="60" width="95" height="16" fill="#5cb85c"/>
    <text x="57" y="73" text-anchor="middle" class="concept-title" fill="white">ResNet</text>
    <text x="57" y="88" text-anchor="middle" class="concept-text">Skip connections</text>
    <text x="57" y="100" text-anchor="middle" class="concept-text">F(x) + x output</text>
  </g>

  <!-- Box 2: Inception -->
  <g class="anim-box2" data-narration="Inception networks use parallel convolutions with different filter sizes (1x1, 3x3, 5x5) for multi-scale feature extraction.">
    <rect x="162" y="60" width="95" height="55" class="box" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="162" y="60" width="95" height="16" fill="#f0ad4e"/>
    <text x="209" y="73" text-anchor="middle" class="concept-title" fill="white">Inception</text>
    <text x="209" y="88" text-anchor="middle" class="concept-text">Multi-scale</text>
    <text x="209" y="100" text-anchor="middle" class="concept-text">parallel filters</text>
  </g>

  <!-- Box 3: DenseNet -->
  <g class="anim-box3" data-narration="DenseNet implements dense connectivity where each layer receives feature maps from all preceding layers, promoting feature reuse.">
    <rect x="315" y="60" width="95" height="55" class="box" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="315" y="60" width="95" height="16" fill="#d9534f"/>
    <text x="362" y="73" text-anchor="middle" class="concept-title" fill="white">DenseNet</text>
    <text x="362" y="88" text-anchor="middle" class="concept-text">Dense connectivity</text>
    <text x="362" y="100" text-anchor="middle" class="concept-text">Feature reuse</text>
  </g>

  <!-- Box 4: EfficientNet -->
  <g class="anim-box4" data-narration="EfficientNet uses compound scaling (depth, width, resolution) with NAS for optimal resource-performance tradeoff.">
    <rect x="110" y="125" width="95" height="55" class="box" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="110" y="125" width="95" height="16" fill="#9b59b6"/>
    <text x="157" y="138" text-anchor="middle" class="concept-title" fill="white">EfficientNet</text>
    <text x="157" y="153" text-anchor="middle" class="concept-text">Compound scaling</text>
    <text x="157" y="165" text-anchor="middle" class="concept-text">NAS optimized</text>
  </g>

  <!-- Main ResNet Residual Block Diagram -->
  <g class="anim-diagram anim-pulse" data-narration="The ResNet residual block shows the main path with 1x1 and 3x3 convolutions, plus the skip connection that adds the input to the output.">
    <!-- Diagram background -->
    <rect x="80" y="200" width="260" height="170" rx="10" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Input -->
    <rect x="95" y="265" width="50" height="40" fill="url(#blockGradient)"/>
    <text x="120" y="290" text-anchor="middle" class="label">Input</text>
    
    <!-- Arrow from input -->
    <path d="M145 285 L165 285" class="arrow"/>
    
    <!-- Split indicator -->
    <text x="180" y="280" class="detail" fill="#7f8c8d">Split</text>
    
    <!-- Skip connection path (top) -->
    <path d="M190 265 Q220 250 250 265 Q280 280 310 265" fill="none" stroke="url(#skipGradient)" stroke-width="4" class="dash-flow"/>
    <text x="320" y="260" class="detail" fill="#449d44">Skip</text>
    
    <!-- Main path -->
    <!-- 1x1 Conv -->
    <rect x="195" y="290" width="55" height="45" fill="url(#convGradient)"/>
    <text x="222" y="308" text-anchor="middle" class="label">1x1</text>
    <text x="222" y="322" text-anchor="middle" class="detail">Conv</text>
    
    <!-- Arrow -->
    <path d="M250 312 L270 312" class="arrow"/>
    
    <!-- 3x3 Conv -->
    <rect x="275" y="290" width="55" height="45" fill="url(#convGradient)"/>
    <text x="302" y="308" text-anchor="middle" class="label">3x3</text>
    <text x="302" y="322" text-anchor="middle" class="detail">Conv</text>
    
    <!-- Arrow to Add -->
    <path d="M330 312 L350 312" class="arrow"/>
    
    <!-- Add operation -->
    <circle cx="365" cy="312" r="20" fill="#5cb85c"/>
    <text x="365" y="316" text-anchor="middle" class="label" font-size="18">+</text>
    
    <!-- Output -->
    <path d="M385 312 L405 312" class="arrow"/>
    <rect x="305" y="265" width="50" height="40" fill="url(#blockGradient)"/>
    <text x="330" y="290" text-anchor="middle" class="label">Output</text>
    <text x="330" y="303" text-anchor="middle" class="detail">F(x)+x</text>
    
    <!-- Labels for paths -->
    <text x="222" y="350" text-anchor="middle" class="detail" fill="#5a6c7d">Main Path</text>
    <text x="365" y="350" text-anchor="middle" class="detail" fill="#5a6c7d">Add Operation</text>
    
    <!-- ReLU annotations -->
    <rect x="253" y="340" width="35" height="15" rx="3" fill="#e74c3c"/>
    <text x="270" y="351" text-anchor="middle" class="detail" fill="white">ReLU</text>
  </g>

  <!-- Bottom annotation -->
  <g class="anim-box2">
    <rect x="10" y="375" width="400" height="18" rx="4" fill="#f8f9fa" stroke="#dee2e6"/>
    <text x="210" y="388" text-anchor="middle" class="concept-text" fill="#5a6c7d">
      Key: Skip connections enable training of very deep networks by allowing gradient flow
    </text>
  </g>

</svg>