<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="hyperparameter-tuning">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7d9a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .card { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .card-1 { animation-delay: 0.1s; }
    .card-2 { animation-delay: 0.2s; }
    .card-3 { animation-delay: 0.3s; }
    .card-4 { animation-delay: 0.4s; }
    .card-5 { animation-delay: 0.5s; }
    .process-box { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .arrow-line { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1.5s ease forwards 0.8s; }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    .spinner { animation: rotate 8s linear infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text">Hyperparameter Tuning</text>
  <line x1="120" y1="38" x2="300" y2="38" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Main Process Flow - Tuning Loop -->
  <g data-narration="The iterative tuning loop: select hyperparameters → train model → validate performance → adjust based on results">
    <rect x="140" y="60" width="140" height="50" rx="8" fill="#3498db" filter="url(#shadow)" class="process-box"/>
    <text x="210" y="80" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="13" font-weight="bold">Select Hyperparams</text>
    <text x="210" y="96" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11">Learning Rate, Batch Size...</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="210" y1="115" x2="210" y2="135" stroke="#5a7d9a" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
  
  <!-- Train Box -->
  <g data-narration="Training phase: the model learns from the training data using selected hyperparameters">
    <rect x="30" y="140" width="110" height="55" rx="6" fill="url(#cardGradient)" filter="url(#shadow)" class="card card-1"/>
    <text x="85" y="158" text-anchor="middle" class="section-title">TRAIN</text>
    <text x="85" y="175" text-anchor="middle" class="detail-text">Forward Pass</text>
    <text x="85" y="188" text-anchor="middle" class="detail-text">Backpropagation</text>
  </g>
  
  <!-- Validate Box -->
  <g data-narration="Validation phase: evaluate model performance on held-out validation set">
    <rect x="280" y="140" width="110" height="55" rx="6" fill="url(#cardGradient)" filter="url(#shadow)" class="card card-2"/>
    <text x="335" y="158" text-anchor="middle" class="section-title">VALIDATE</text>
    <text x="335" y="175" text-anchor="middle" class="detail-text">Compute Metrics</text>
    <text x="335" y="188" text-anchor="middle" class="detail-text">Accuracy, Loss</text>
  </g>
  
  <!-- Curved arrows showing loop -->
  <path d="M 85 195 Q 85 240, 155 260 Q 210 275, 265 260" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <path d="M 335 195 Q 335 240, 265 260 Q 210 275, 155 260" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  
  <text x="210" y="275" text-anchor="middle" class="label-text" style="font-size:12px;">Iterate until convergence</text>
  
  <!-- Core Hyperparameters Section -->
  <g data-narration="Core hyperparameters: Learning Rate controls step size, Batch Size affects gradient stability, Network Architecture defines depth and width, Regularization (dropout, L2) prevents overfitting">
    <rect x="20" y="285" width="180" height="105" rx="6" fill="white" filter="url(#shadow)" opacity="0.9"/>
    <rect x="20" y="285" width="180" height="20" rx="6" fill="#9b59b6"/>
    <rect x="20" y="300" width="180" height="5" fill="#9b59b6"/>
    <text x="30" y="300" class="section-title" fill="white">Core Hyperparameters</text>
    
    <circle cx="35" cy="320" r="4" fill="#e74c3c"/>
    <text x="45" y="323" class="detail-text">Learning Rate (η): 1e-5 to 1e-2</text>
    
    <circle cx="35" cy="338" r="4" fill="#3498db"/>
    <text x="45" y="341" class="detail-text">Batch Size: gradient estimation</text>
    
    <circle cx="35" cy="356" r="4" fill="#27ae60"/>
    <text x="45" y="359" class="detail-text">Network Depth &amp; Width</text>
    
    <circle cx="35" cy="374" r="4" fill="#f39c12"/>
    <text x="45" y="377" class="detail-text">Dropout (p), L2 (λ)</text>
  </g>
  
  <!-- Optimization Strategies Section -->
  <g data-narration="Optimization strategies: Grid Search exhaustively tests combinations, Random Search is more efficient, Bayesian Optimization uses probabilistic models, Evolutionary Algorithms apply genetic principles">
    <rect x="210" y="285" width="190" height="105" rx="6" fill="white" filter="url(#shadow)" opacity="0.9"/>
    <rect x="210" y="285" width="190" height="20" rx="6" fill="#1abc9c"/>
    <rect x="210" y="300" width="190" height="5" fill="#1abc9c"/>
    <text x="220" y="300" class="section-title" fill="white">Optimization Strategies</text>
    
    <rect x="220" y="315" width="40" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="240" y="330" text-anchor="middle" class="detail-text" style="font-size:9px;">Grid</text>
    <text x="240" y="340" text-anchor="middle" class="detail-text" style="font-size:8px;">Search</text>
    
    <rect x="270" y="315" width="40" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="290" y="330" text-anchor="middle" class="detail-text" style="font-size:9px;">Random</text>
    <text x="290" y="340" text-anchor="middle" class="detail-text" style="font-size:8px;">Search</text>
    
    <rect x="320" y="315" width="40" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="340" y="330" text-anchor="middle" class="detail-text" style="font-size:9px;">Bayesian</text>
    <text x="340" y="340" text-anchor="middle" class="detail-text" style="font-size:8px;">Opt.</text>
    
    <rect x="220" y="350" width="40" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="240" y="365" text-anchor="middle" class="detail-text" style="font-size:9px;">Evolution</text>
    <text x="240" y="375" text-anchor="middle" class="detail-text" style="font-size:8px;">Algo.</text>
    
    <rect x="270" y="350" width="40" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="290" y="365" text-anchor="middle" class="detail-text" style="font-size:9px;">Neural</text>
    <text x="290" y="375" text-anchor="middle" class="detail-text" style="font-size:8px;">Search</text>
    
    <rect x="320" y="350" width="40" height="28" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="340" y="365" text-anchor="middle" class="detail-text" style="font-size:9px;">Meta</text>
    <text x="340" y="375" text-anchor="middle" class="detail-text" style="font-size:8px;">Learning</text>
  </g>
  
  <!-- Decorative spinning element -->
  <g class="spinner" style="transform-origin: 210px 90px;">
    <circle cx="210" cy="90" r="25" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="10,5" opacity="0.5"/>
    <circle cx="210" cy="90" r="18" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  </g>
  
  <!-- Small performance indicator -->
  <g data-narration="Proper hyperparameter tuning can improve model accuracy by 15-25%">
    <rect x="330" y="60" width="80" height="25" rx="4" fill="#27ae60" opacity="0.9"/>
    <text x="370" y="75" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="10" font-weight="bold">+15-25%</text>
    <text x="370" y="86" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="7">Accuracy Gain</text>
  </g>
</svg>