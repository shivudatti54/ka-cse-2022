<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="feedforward-networks-optimization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    @keyframes nodePulse {
      0%, 100% { r: 8; }
      50% { r: 10; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: bold; fill: #2d3748; }
    .section-title { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: bold; fill: #4a5568; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #718096; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #a0aec0; }
    .box { fill: url(#boxGradient); stroke: #e2e8f0; stroke-width: 1; }
    .connection { stroke: #a0aec0; stroke-width: 1; opacity: 0.6; }
    .node { fill: url(#nodeGradient); }
    .node-highlight { fill: #f687b3; }
    .node-optimizer { fill: #68d391; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-flow { animation: flowDash 1s linear infinite; }
    .anim-node { animation: nodePulse 1.5s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Feedforward Networks Optimization</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#667eea" stroke-width="2" class="anim-fade" style="animation-delay: 0.2s"/>
  
  <!-- Network Architecture Section -->
  <g transform="translate(20, 60)" data-narration="Neural network architecture showing input layer, hidden layers, and output layer with weighted connections">
    <text x="0" y="0" class="section-title">Network Architecture</text>
    <rect x="-5" y="-20" width="150" height="280" rx="8" class="box" filter="url(#shadow)" style="animation-delay: 0.3s" opacity="0"/>
    
    <!-- Input Layer -->
    <g transform="translate(30, 30)">
      <text x="0" y="-8" class="label">Input</text>
      <circle cx="0" cy="15" r="6" class="node anim-node" style="animation-delay: 0.4s"/>
      <circle cx="0" cy="35" r="6" class="node anim-node" style="animation-delay: 0.5s"/>
      <circle cx="0" cy="55" r="6" class="node anim-node" style="animation-delay: 0.6s"/>
    </g>
    
    <!-- Hidden Layer -->
    <g transform="translate(80, 30)">
      <text x="0" y="-8" class="label">Hidden</text>
      <circle cx="0" cy="10" r="8" class="node anim-node" style="animation-delay: 0.7s"/>
      <circle cx="0" cy="35" r="8" class="node anim-node" style="animation-delay: 0.8s"/>
      <circle cx="0" cy="60" r="8" class="node anim-node" style="animation-delay: 0.9s"/>
    </g>
    
    <!-- Output Layer -->
    <g transform="translate(130, 30)">
      <text x="0" y="-8" class="label">Output</text>
      <circle cx="0" cy="20" r="6" class="node anim-node" style="animation-delay: 1.0s"/>
      <circle cx="0" cy="45" r="6" class="node anim-node" style="animation-delay: 1.1s"/>
    </g>
    
    <!-- Connections -->
    <g class="connection" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.2s; opacity: 0;">
      <line x1="36" y1="45" x2="72" y2="40" class="anim-flow"/>
      <line x1="36" y1="65" x2="72" y2="55" class="anim-flow"/>
      <line x1="36" y1="85" x2="72" y2="70" class="anim-flow"/>
      <line x1="88" y1="40" x2="130" y2="50" class="anim-flow"/>
      <line x1="88" y1="65" x2="130" y2="65" class="anim-flow"/>
      <line x1="88" y1="90" x2="130" y2="80" class="anim-flow"/>
    </g>
    
    <!-- Weight notation -->
    <text x="55" y="100" class="detail">W¹, b¹</text>
    <text x="105" y="100" class="detail">W², b²</text>
  </g>
  
  <!-- Gradient Descent Panel -->
  <g transform="translate(180, 60)" data-narration="Gradient descent optimization variants: SGD uses mini-batches, Momentum accumulates velocity, Adam combines adaptive learning rates">
    <rect x="0" y="0" width="220" height="70" rx="6" class="box" filter="url(#shadow)" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.5s; opacity: 0"/>
    <text x="10" y="18" class="section-title">Gradient Descent</text>
    
    <g transform="translate(10, 30)">
      <circle cx="10" cy="5" r="6" class="node-optimizer anim-pulse"/>
      <text x="22" y="9" class="label">SGD</text>
      <text x="55" y="9" class="detail">mini-batch</text>
    </g>
    <g transform="translate(10, 48)">
      <circle cx="10" cy="5" r="6" class="node-optimizer anim-pulse" style="animation-delay: 0.3s"/>
      <text x="22" y="9" class="label">Momentum</text>
      <text x="82" y="9" class="detail">γ=0.9</text>
    </g>
  </g>
  
  <!-- Adam Optimizer Panel -->
  <g transform="translate(180, 140)" data-narration="Adam optimizer combines adaptive learning rates with momentum using beta1=0.9 and beta2=0.999 parameters">
    <rect x="0" y="0" width="220" height="55" rx="6" class="box" filter="url(#shadow)" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.7s; opacity: 0"/>
    <g transform="translate(10, 18)">
      <circle cx="10" cy="5" r="7" class="node-optimizer anim-pulse" style="animation-delay: 0.5s"/>
      <text x="22" y="9" class="label">Adam</text>
      <text x="60" y="9" class="detail">β₁=0.9</text>
      <text x="115" y="9" class="detail">β₂=0.999</text>
    </g>
    <g transform="translate(10, 38)">
      <circle cx="10" cy="5" r="6" class="node-optimizer anim-pulse" style="animation-delay: 0.7s"/>
      <text x="22" y="9" class="label">Adagrad</text>
      <text x="75" y="9" class="detail">per-param lr</text>
    </g>
  </g>
  
  <!-- Activation Functions Panel -->
  <g transform="translate(180, 205)" data-narration="Activation functions determine neuron output: ReLU is common but has dead neuron issue, Leaky ReLU and Swish provide alternatives">
    <rect x="0" y="0" width="220" height="60" rx="6" class="box" filter="url(#shadow)" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 0.9s; opacity: 0"/>
    <text x="10" y="18" class="section-title">Activations</text>
    
    <g transform="translate(10, 32)">
      <circle cx="8" cy="5" r="5" class="node-highlight anim-pulse" style="animation-delay: 0.3s"/>
      <text x="20" y="9" class="label">ReLU</text>
      <text x="50" y="9" class="detail">max(0,x)</text>
    </g>
    <g transform="translate(85, 32)">
      <circle cx="8" cy="5" r="5" class="node-highlight anim-pulse" style="animation-delay: 0.5s"/>
      <text x="20" y="9" class="label">Leaky</text>
      <text x="58" y="9" class="detail">α=0.01</text>
    </g>
    <g transform="translate(155, 32)">
      <circle cx="8" cy="5" r="5" class="node-highlight anim-pulse" style="animation-delay: 0.7s"/>
      <text x="20" y="9" class="label">Swish</text>
      <text x="50" y="9" class="detail">x·σ(βx)</text>
    </g>
  </g>
  
  <!-- Regularization Panel -->
  <g transform="translate(180, 275)" data-narration="Regularization techniques prevent overfitting: L1/L2 add weight penalties, Dropout randomly deactivates neurons during training">
    <rect x="0" y="0" width="220" height="50" rx="6" class="box" filter="url(#shadow)" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.1s; opacity: 0"/>
    <text x="10" y="18" class="section-title">Regularization</text>
    
    <g transform="translate(10, 32)">
      <circle cx="8" cy="5" r="5" class="node-highlight anim-pulse" style="animation-delay: 0.4s"/>
      <text x="20" y="9" class="label">L1/L2</text>
      <text x="50" y="9" class="detail">weight decay</text>
    </g>
    <g transform="translate(100, 32)">
      <circle cx="8" cy="5" r="5" class="node-highlight anim-pulse" style="animation-delay: 0.6s"/>
      <text x="20" y="9" class="label">Dropout</text>
      <text x="60" y="9" class="detail">p=0.5</text>
    </g>
  </g>
  
  <!-- Flow Arrows -->
  <g data-narration="Data flows forward through layers during forward pass, then gradients flow backward during backpropagation">
    <path d="M 60 360 L 180 360" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrow)" class="anim-slide" style="animation-delay: 1.3s"/>
    <text x="120" y="375" class="detail" style="animation-delay: 1.4s">Forward Pass</text>
    
    <path d="M 300 360 L 380 360" stroke="#f687b3" stroke-width="2" fill="none" marker-end="url(#arrow)" class="anim-slide" style="animation-delay: 1.5s"/>
    <text x="310" y="375" class="detail" style="animation-delay: 1.6s">Backprop</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- Loss Function Box -->
  <g transform="translate(250, 330)" data-narration="The optimization process minimizes a loss function that measures the difference between predicted and actual outputs">
    <rect x="0" y="0" width="150" height="35" rx="5" class="box" filter="url(#shadow)" style="animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.2s; opacity: 0"/>
    <text x="75" y="15" text-anchor="middle" class="label" style="font-size: 11px;">Loss: L(θ) = Σ(y - ŷ)²</text>
    <text x="75" y="28" text-anchor="middle" class="detail">minimize via ∂L/∂θ</text>
  </g>
  
  <!-- Bottom labels -->
  <text x="210" y="395" text-anchor="middle" class="detail">DU MSc CS - Deep Learning Fundamentals</text>
</svg>