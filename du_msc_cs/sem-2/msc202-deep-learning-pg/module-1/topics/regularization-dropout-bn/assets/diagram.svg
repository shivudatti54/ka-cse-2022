<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="regularization-dropout-bn">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#eef2ff"/>
      <stop offset="100%" style="stop-color:#f5e6ff"/>
    </linearGradient>
    <linearGradient id="dropoutGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="bnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dropPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes flowArrow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .drop-pulse { animation: dropPulse 1.5s ease-in-out infinite; }
    .flow { animation: flowArrow 1s linear infinite; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .formula { font-family: 'Courier New', monospace; font-size: 12px; fill: #2c3e50; }
    .section-box { rx: 8; ry: 8; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Regularization: Dropout &amp; Batch Norm</text>
  
  <!-- Dropout Section -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="Dropout randomly deactivates neurons during training with probability p, creating an implicit ensemble of subnetworks">
    <rect x="10" y="45" width="125" height="85" fill="url(#dropoutGradient)" class="section-box" filter="url(#shadow)"/>
    <text x="72" y="62" text-anchor="middle" class="label" style="font-weight:bold;">DROPOUT</text>
    
    <!-- Network with dropout -->
    <g transform="translate(25, 75)">
      <!-- Input layer -->
      <circle cx="10" cy="10" r="5" fill="#e74c3c" class="drop-pulse"/>
      <circle cx="10" cy="25" r="5" fill="#3498db"/>
      <circle cx="10" cy="40" r="5" fill="#3498db" class="drop-pulse"/>
      
      <!-- Hidden connections -->
      <line x1="15" y1="10" x2="45" y2="8" stroke="#95a5a6" stroke-width="1.5" class="flow" stroke-dasharray="5,3"/>
      <line x1="15" y1="25" x2="45" y2="17" stroke="#95a5a6" stroke-width="1.5"/>
      <line x1="15" y1="40" x2="45" y2="33" stroke="#95a5a6" stroke-width="1.5" class="flow" stroke-dasharray="5,3"/>
      
      <!-- Hidden layer -->
      <circle cx="45" cy="8" r="5" fill="#3498db"/>
      <circle cx="45" cy="17" r="5" fill="#e74c3c" class="drop-pulse"/>
      <circle cx="45" cy="26" r="5" fill="#3498db"/>
      <circle cx="45" cy="33" r="5" fill="#3498db" class="drop-pulse"/>
      
      <!-- Output connections -->
      <line x1="50" y1="8" x2="75" y2="20" stroke="#95a5a6" stroke-width="1.5"/>
      <line x1="50" y1="17" x2="75" y2="20" stroke="#95a5a6" stroke-width="1.5"/>
      <line x1="50" y1="26" x2="75" y2="20" stroke="#95a5a6" stroke-width="1.5" class="flow" stroke-dasharray="5,3"/>
      <line x1="50" y1="33" x2="75" y2="20" stroke="#95a5a6" stroke-width="1.5"/>
      
      <!-- Output -->
      <circle cx="75" cy="20" r="5" fill="#3498db"/>
    </g>
    
    <text x="72" y="118" text-anchor="middle" class="detail">p = 0.5</text>
  </g>
  
  <!-- Arrow between sections -->
  <path d="M140 87 L160 87" stroke="#9b59b6" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="flow"/>
  
  <!-- Batch Normalization Section -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="Batch Normalization standardizes inputs by subtracting mean and dividing by standard deviation, with learnable scale (γ) and shift (β) parameters">
    <rect x="165" y="45" width="125" height="85" fill="url(#bnGradient)" class="section-box" filter="url(#shadow)"/>
    <text x="227" y="62" text-anchor="middle" class="label" style="font-weight:bold;">BATCH NORM</text>
    
    <!-- BN Process -->
    <g transform="translate(175, 75)">
      <!-- Input -->
      <rect x="0" y="15" width="20" height="30" fill="#f39c12" rx="3"/>
      <text x="10" y="34" text-anchor="middle" class="detail" fill="white">x</text>
      
      <!-- Arrow 1 -->
      <line x1="22" y1="30" x2="35" y2="30" stroke="#34495e" stroke-width="2"/>
      
      <!-- Normalize box -->
      <rect x="37" y="10" width="50" height="40" fill="#27ae60" rx="4"/>
      <text x="62" y="26" text-anchor="middle" class="detail" fill="white" style="font-size:9px;">μ, σ</text>
      <text x="62" y="38" text-anchor="middle" class="detail" fill="white" style="font-size:9px;">x̂ = (x-μ)/σ</text>
      
      <!-- Arrow 2 -->
      <line x1="89" y1="30" x2="102" y2="30" stroke="#34495e" stroke-width="2"/>
      
      <!-- Scale & Shift -->
      <rect x="104" y="10" width="40" height="40" fill="#8e44ad" rx="4"/>
      <text x="124" y="26" text-anchor="middle" class="detail" fill="white" style="font-size:9px;">γ·x̂+β</text>
      <text x="124" y="38" text-anchor="middle" class="detail" fill="white" style="font-size:8px;">learnable</text>
    </g>
    
    <text x="227" y="118" text-anchor="middle" class="detail">+ ε for stability</text>
  </g>
  
  <!-- Key Formulas Box -->
  <g class="fade-in" style="animation-delay: 0.6s" data-narration="Key mathematical formulations showing dropout scaling and batch norm transformation">
    <rect x="295" y="45" width="115" height="85" fill="#fff9e6" stroke="#f39c12" stroke-width="1" class="section-box" filter="url(#shadow)"/>
    <text x="352" y="62" text-anchor="middle" class="label" style="font-weight:bold;">FORMULAS</text>
    
    <text x="305" y="82" class="formula">Dropout:</text>
    <text x="305" y="96" class="detail">y = x × mask/(1-p)</text>
    
    <text x="305" y="112" class="formula">BatchNorm:</text>
    <text x="305" y="126" class="detail">y = γx̂ + β</text>
  </g>
  
  <!-- Network Comparison Section -->
  <g class="fade-in" style="animation-delay: 0.8s" data-narration="Comparison of full network at inference versus thinned subnetworks created during training with dropout">
    <rect x="10" y="145" width="400" height="120" fill="white" stroke="#ddd" stroke-width="1" class="section-box" filter="url(#shadow)"/>
    <text x="210" y="165" text-anchor="middle" class="label" style="font-weight:bold;">Network Comparison</text>
    
    <!-- Full Network (Inference) -->
    <g transform="translate(30, 180)">
      <text x="35" y="0" text-anchor="middle" class="detail">Inference</text>
      <!-- Input -->
      <circle cx="10" cy="15" r="4" fill="#3498db"/>
      <circle cx="10" cy="30" r="4" fill="#3498db"/>
      <circle cx="10" cy="45" r="4" fill="#3498db"/>
      
      <!-- Hidden -->
      <circle cx="35" cy="15" r="4" fill="#3498db"/>
      <circle cx="35" cy="30" r="4" fill="#3498db"/>
      <circle cx="35" cy="45" r="4" fill="#3498db"/>
      
      <!-- Output -->
      <circle cx="60" cy="30" r="4" fill="#2ecc71"/>
      
      <!-- Connections (all solid) -->
      <line x1="14" y1="15" x2="31" y2="15" stroke="#95a5a6" stroke-width="1"/>
      <line x1="14" y1="15" x2="31" y2="30" stroke="#95a5a6" stroke-width="1"/>
      <line x1="14" y1="15" x2="31" y2="45" stroke="#95a5a6" stroke-width="1"/>
      <line x1="14" y1="30" x2="31" y2="15" stroke="#95a5a6" stroke-width="1"/>
      <line x1="14" y1="30" x2="31" y2="30" stroke="#95a5a6" stroke-width="1"/>
      <line x1="14" y1="30" x2="31" y2="45" stroke="#95a5a6" stroke-width="1"/>
      <line x1="14" y1="45" x2="31" y2="15" stroke="#95a5a6" stroke-width="1"/>
      <line x1="14" y1="45" x2="31" y2="30" stroke="#95a5a6" stroke-width="1"/>
      <line x1="14" y1="45" x2="31" y2="45" stroke="#95a5a6" stroke-width="1"/>
      
      <line x1="39" y1="15" x2="56" y2="30" stroke="#95a5a6" stroke-width="1"/>
      <line x1="39" y1="30" x2="56" y2="30" stroke="#95a5a6" stroke-width="1"/>
      <line x1="39" y1="45" x2="56" y2="30" stroke="#95a5a6" stroke-width="1"/>
    </g>
    
    <!-- Arrow -->
    <text x="210" y="215" text-anchor="middle" class="detail">Training (multiple subnetworks)</text>
    
    <!-- Subnetwork 1 -->
    <g transform="translate(90, 225)">
      <circle cx="10" cy="8" r="3" fill="#e74c3c" class="drop-pulse"/>
      <circle cx="10" cy="20" r="3" fill="#3498db"/>
      <circle cx="10" cy="32" r="3" fill="#3498db"/>
      
      <circle cx="28" cy="8" r="3" fill="#3498db"/>
      <circle cx="28" cy="20" r="3" fill="#e74c3c" class="drop-pulse"/>
      <circle cx="28" cy="32" r="3" fill="#3498db"/>
      
      <circle cx="46" cy="20" r="3" fill="#2ecc71"/>
      
      <line x1="13" y1="8" x2="25" y2="8" stroke="#95a5a6" stroke-width="1"/>
      <line x1="13" y1="20" x2="25" y2="20" stroke="#95a5a6" stroke-width="1"/>
      <line x1="13" y1="20" x2="25" y2="8" stroke="#95a5a6" stroke-width="1"/>
      <line x1="31" y1="8" x2="43" y2="20" stroke="#95a5a6" stroke-width="1"/>
      <line x1="31" y1="20" x2="43" y2="20" stroke="#95a5a6" stroke-width="1"/>
      <line x1="31" y1="32" x2="43" y2="20" stroke="#95a5a6" stroke-width="1"/>
    </g>
    
    <!-- Subnetwork 2 -->
    <g transform="translate(140, 225)">
      <circle cx="10" cy="8" r="3" fill="#3498db"/>
      <circle cx="10" cy="20" r="3" fill="#3498db"/>
      <circle cx="10" cy="32" r="3" fill="#e74c3c" class="drop-pulse"/>
      
      <circle cx="28" cy="8" r="3" fill="#3498db"/>
      <circle cx="28" cy="20" r="3" fill="#3498db"/>
      <circle cx="28" cy="32" r="3" fill="#e74c3c" class="drop-pulse"/>
      
      <circle cx="46" cy="20" r="3" fill="#2ecc71"/>
      
      <line x1="13" y1="8" x2="25" y2="8" stroke="#95a5a6" stroke-width="1"/>
      <line x1="13" y1="8" x2="25" y2="32" stroke="#95a5a6" stroke-width="1"/>
      <line x1="13" y1="32" x2="25" y2="32" stroke="#95a5a6" stroke-width="1"/>
      <line x1="31" y1="8" x2="43" y2="20" stroke="#95a5a6" stroke-width="1"/>
      <line x1="31" y1="20" x2="43" y2="20" stroke="#95a5a6" stroke-width="1"/>
      <line x1="31" y1="32" x2="43" y2="20" stroke="#95a5a6" stroke-width="1"/>
    </g>
    
    <!-- Subnetwork 3 -->
    <g transform="translate(190, 225)">
      <circle cx="10" cy="8" r="3" fill="#e74c3c" class="drop-pulse"/>
      <circle cx="10" cy="20" r="3" fill="#e74c3c" class="drop-pulse"/>
      <circle cx="10" cy="32" r="3" fill="#3498db"/>
      
      <circle cx="28" cy="8" r="3" fill="#e74c3c" class="drop-pulse"/>
      <circle cx="28" cy="20" r="3" fill="#3498db"/>
      <circle cx="28" cy="32" r="3" fill="#3498db"/>
      
      <circle cx="46" cy="20" r="3" fill="#2ecc71"/>
      
      <line x1="13" y1="20" x2="25" y2="20" stroke="#95a5a6" stroke-width="1"/>
      <line x1="13" y1="32" x2="25" y2="8" stroke="#95a5a6" stroke-width="1"/>
      <line x1="13" y1="32" x2="25" y2="32" stroke="#95a5a6" stroke-width="1"/>
      <line x1="31" y1="20" x2="43" y2="20" stroke="#95a5a6" stroke-width="1"/>
      <line x1="31" y1="32" x2="43" y2="20" stroke="#95a5a6" stroke-width="1"/>
    </g>
    
    <!-- Ellipsis -->
    <text x="250" y="245" class="detail">...</text>
    
    <!-- Ensemble arrow -->
    <path d="M270 235 L290 235" stroke="#9b59b6" stroke-width="2" fill="none"/>
    <text x="295" y="238" class="detail">Ensemble</text>
  </g>
  
  <!-- Benefits Section -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Benefits of combining dropout and batch normalization in deep neural networks">
    <rect x="10" y="275" width="195" height="55" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1" class="section-box"/>
    <text x="107" y="292" text-anchor="middle" class="label" style="font-weight:bold;">Dropout Benefits</text>
    <text x="20" y="310" class="detail">• Prevents co-adaptation</text>
    <text x="20" y="322" class="detail">• Implicit model averaging</text>
  </g>
  
  <g class="fade-in" style="animation-delay: 1.1s" data-narration="Batch normalization enables higher learning rates and reduces internal covariate shift">
    <rect x="215" y="275" width="195" height="55" fill="#fef9e7" stroke="#f1c40f" stroke-width="1" class="section-box"/>
    <text x="312" y="292" text-anchor="middle" class="label" style="font-weight:bold;">BatchNorm Benefits</text>
    <text x="225" y="310" class="detail">• Reduces internal covariate shift</text>
    <text x="225" y="322" class="detail">• Enables higher learning rates</text>
  </g>
  
  <!-- Legend -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Visual legend explaining color coding in the diagram">
    <rect x="10" y="340" width="400" height="50" fill="#fafafa" stroke="#eee" stroke-width="1" class="section-box"/>
    <text x="25" y="358" class="detail">● Active neuron</text>
    <text x="110" y="358" class="detail" fill="#e74c3c">● Dropped (p=0.5)</text>
    <text x="220" y="358" class="detail" fill="#2ecc71">● Output</text>
    <text x="300" y="358" class="detail">━ Inverted dropout scaling: 1/(1-p)</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9b59b6"/>
    </marker>
  </defs>
</svg>