<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="language-models-ngrams" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f0f7fa;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#7aa3c7" flood-opacity="0.3"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes highlightSlide {
        0% { transform: translateX(0); }
        25% { transform: translateX(90px); }
        50% { transform: translateX(180px); }
        75% { transform: translateX(270px); }
        100% { transform: translateX(0); }
      }
      .title-text { font-family: Georgia, serif; font-size: 20px; fill: #2c5282; font-weight: bold; }
      .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; }
      .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; }
      .formula-text { font-family: 'Courier New', monospace; font-size: 13px; fill: #1a365d; }
      .section-box { fill: url(#boxGradient); stroke: #90cdf4; stroke-width: 1.5; rx: 8; }
      .highlight-box { fill: #bee3f8; stroke: #4299e1; stroke-width: 2; rx: 4; }
      .fade-in { animation: fadeIn 1s ease-out forwards; }
      .slide-in-left { animation: slideInLeft 0.8s ease-out forwards; }
      .slide-in-up { animation: slideInUp 0.8s ease-out forwards; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .highlight-anim { animation: highlightSlide 8s ease-in-out infinite; }
      .delay-1 { animation-delay: 0.2s; opacity: 0; }
      .delay-2 { animation-delay: 0.4s; opacity: 0; }
      .delay-3 { animation-delay: 0.6s; opacity: 0; }
      .delay-4 { animation-delay: 0.8s; opacity: 0; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g data-narration="Title introducing the topic of Language Models and N-grams">
    <text x="210" y="30" text-anchor="middle" class="title-text fade-in">Language Models &amp; N-grams</text>
    <line x1="60" y1="42" x2="360" y2="42" stroke="#4299e1" stroke-width="2" stroke-linecap="round" class="fade-in delay-1"/>
  </g>
  
  <!-- Section 1: N-gram Types -->
  <g class="slide-in-left delay-1" data-narration="Three types of n-grams: Unigram (1 word), Bigram (2 words), Trigram (3 words)">
    <rect x="15" y="55" width="125" height="75" class="section-box" filter="url(#shadow)"/>
    <text x="77" y="72" text-anchor="middle" class="label-text" style="font-weight:bold;">N-gram Types</text>
    <rect x="22" y="82" width="30" height="20" rx="3" fill="#9ae6b4"/>
    <text x="37" y="96" text-anchor="middle" class="detail-text">Unigram</text>
    <rect x="57" y="82" width="35" height="20" rx="3" fill="#fbd38d"/>
    <text x="74" y="96" text-anchor="middle" class="detail-text">Bigram</text>
    <rect x="97" y="82" width="35" height="20" rx="3" fill="#fbb6ce"/>
    <text x="114" y="96" text-anchor="middle" class="detail-text">Trigram</text>
  </g>
  
  <!-- Section 2: Markov Assumption -->
  <g class="slide-in-left delay-2" data-narration="Markov assumption states probability of a word depends only on previous n-1 words">
    <rect x="150" y="55" width="255" height="75" class="section-box" filter="url(#shadow)"/>
    <text x="277" y="72" text-anchor="middle" class="label-text" style="font-weight:bold;">Markov Assumption</text>
    <text x="165" y="92" class="detail-text">P(wₙ | w₁...wₙ₋₁) ≈ P(wₙ | wₙ₋ₙ₊₁...wₙ₋₁)</text>
    <text x="165" y="110" class="detail-text">"Next word depends only on previous n-1 words"</text>
  </g>
  
  <!-- Section 3: Sliding Window Visualization -->
  <g class="slide-in-up delay-2" data-narration="Sliding window showing how trigrams move through text: The cat sat, cat sat on, sat on the">
    <rect x="15" y="140" width="390" height="90" class="section-box" filter="url(#shadow)"/>
    <text x="210" y="158" text-anchor="middle" class="label-text" style="font-weight:bold;">N-gram Sliding Window</text>
    
    <!-- Text sample -->
    <text x="35" y="185" class="detail-text" style="font-family:'Courier New',monospace;font-size:14px;">"The cat sat on the mat"</text>
    
    <!-- Sliding window boxes -->
    <g class="highlight-anim">
      <rect x="32" y="195" width="75" height="22" class="highlight-box" rx="3"/>
    </g>
    <text x="38" y="211" class="detail-text" style="font-weight:bold;fill:#1a365d;">The | cat | sat</text>
    <text x="120" y="211" class="detail-text">cat | sat | on</text>
    <text x="200" y="211" class="detail-text">sat | on | the</text>
    <text x="280" y="211" class="detail-text">on | the | mat</text>
    
    <text x="210" y="230" text-anchor="middle" class="detail-text" style="font-style:italic;">Trigram window slides one word at a time →</text>
  </g>
  
  <!-- Section 4: Probability Formula -->
  <g class="slide-in-left delay-3" data-narration="Maximum Likelihood Estimation formula for calculating n-gram probabilities">
    <rect x="15" y="240" width="190" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="110" y="258" text-anchor="middle" class="label-text" style="font-weight:bold;">MLE Formula</text>
    <text x="25" y="280" class="formula-text">P(wᵢ|wᵢ₋ₙ₊₁...wᵢ₋₁) =</text>
    <text x="25" y="298" class="formula-text">count(context wᵢ) / count(context)</text>
  </g>
  
  <!-- Section 5: Example Calculation -->
  <g class="slide-in-up delay-3" data-narration="Example: Calculating probability of 'mat' given 'the' from corpus">
    <rect x="215" y="240" width="190" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="310" y="258" text-anchor="middle" class="label-text" style="font-weight:bold;">Example: P("mat"|"the")</text>
    <text x="225" y="280" class="detail-text">Corpus: "The cat sat on the mat"</text>
    <text x="225" y="298" class="detail-text">count("the mat")=1, count("the")=2</text>
    <text x="225" y="312" class="detail-text" style="font-weight:bold;color:#2b6cb0;">P("mat"|"the") = 1/2 = 0.5</text>
  </g>
  
  <!-- Section 6: Evaluation Metrics -->
  <g class="slide-in-up delay-4" data-narration="Perplexity is the main evaluation metric - lower is better">
    <rect x="15" y="320" width="390" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="210" y="340" text-anchor="middle" class="label-text" style="font-weight:bold;">Evaluation: Perplexity</text>
    <text x="30" y="362" class="detail-text">Perplexity = 2^H where H = cross-entropy</text>
    <text x="30" y="380" class="detail-text">Lower perplexity = better model (more confident predictions)</text>
    <g class="pulse" transform="translate(340, 350)">
      <circle cx="20" cy="15" r="15" fill="#48bb78"/>
      <text x="20" y="20" text-anchor="middle" class="detail-text" style="fill:white;font-weight:bold;">PP↓</text>
    </g>
  </g>
  
  <!-- Arrows/Connections -->
  <g data-narration="Visual flow showing relationships between concepts">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#4299e1"/>
      </marker>
    </defs>
    <!-- Arrow from types to sliding window -->
    <path d="M77 130 L77 140" stroke="#4299e1" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Arrow from formula to example -->
    <path d="M205 305 L215 305" stroke="#4299e1" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
</svg>