<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="text-preprocessing-tokenization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box { filter: url(#shadow); }
    .stage1 { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .stage2 { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .stage3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .stage4 { animation: slideIn 0.6s ease-out 0.9s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s infinite; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .concept-box { animation: slideInUp 0.5s ease-out forwards; opacity: 0; }
    .concept-box:nth-child(1) { animation-delay: 1.2s; }
    .concept-box:nth-child(2) { animation-delay: 1.4s; }
    .concept-box:nth-child(3) { animation-delay: 1.6s; }
    .concept-box:nth-child(4) { animation-delay: 1.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Text Preprocessing &amp; Tokenization</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#3498db" stroke-width="2" class="title-anim" style="animation-delay: 0.3s;"/>
  
  <!-- Stage 1: Raw Text -->
  <g class="stage1" data-narration="Raw text input: The pipeline begins with unprocessed text containing noise, special characters, and inconsistencies">
    <rect x="20" y="60" width="90" height="70" rx="8" fill="url(#boxGradient1)" class="box"/>
    <text x="65" y="80" text-anchor="middle" class="label">Raw Text</text>
    <text x="65" y="95" text-anchor="middle" class="detail">"Hello, World!"</text>
    <text x="65" y="108" text-anchor="middle" class="detail">@user #NLP</text>
    <text x="65" y="121" text-anchor="middle" class="detail">http://url</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M115 95 L150 95" stroke="#e74c3c" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Stage 2: Normalization -->
  <g class="stage2" data-narration="Text normalization applies Unicode normalization, case folding, and cleaning to standardize the input">
    <rect x="155" y="60" width="95" height="70" rx="8" fill="url(#boxGradient2)" class="box"/>
    <text x="202" y="80" text-anchor="middle" class="label">Normalization</text>
    <text x="202" y="95" text-anchor="middle" class="detail">NFC Unicode</text>
    <text x="202" y="108" text-anchor="middle" class="detail">Lowercase</text>
    <text x="202" y="121" text-anchor="middle" class="detail">Remove URLs</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M255 95 L290 95" stroke="#e74c3c" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 3: Tokenization -->
  <g class="stage3" data-narration="Tokenization splits normalized text into tokens - words, subwords (BPE, WordPiece), or characters">
    <rect x="295" y="60" width="105" height="70" rx="8" fill="url(#boxGradient3)" class="box"/>
    <text x="347" y="80" text-anchor="middle" class="label">Tokenization</text>
    <text x="347" y="95" text-anchor="middle" class="detail">["hello", ","]</text>
    <text x="347" y="108" text-anchor="middle" class="detail">["world", "!"]</text>
    <text x="347" y="121" text-anchor="middle" class="detail">BPE/WordPiece</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M210 135 L210 165" stroke="#e74c3c" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 4: Filtered Tokens -->
  <g class="stage4" data-narration="Filtering removes stopwords, applies stemming/lemmatization to produce clean tokens for NLP models">
    <rect x="150" y="170" width="120" height="70" rx="8" fill="url(#boxGradient4)" class="box"/>
    <text x="210" y="190" text-anchor="middle" class="label">Filtered Tokens</text>
    <text x="210" y="208" text-anchor="middle" class="detail">[hello, world]</text>
    <text x="210" y="224" text-anchor="middle" class="detail">- stopwords</text>
    <text x="210" y="237" text-anchor="middle" class="detail">+ lemmatization</text>
  </g>
  
  <!-- Key Concepts Box -->
  <rect x="15" y="260" width="390" height="125" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1" opacity="0.9"/>
  
  <!-- Concept Items -->
  <g class="concept-box">
    <circle cx="35" cy="280" r="4" fill="#3498db"/>
    <text x="48" y="284" class="detail" font-weight="600">Normalization:</text>
    <text x="120" y="284" class="detail">NFC/NFD, case folding, emoji handling</text>
  </g>
  
  <g class="concept-box">
    <circle cx="35" cy="300" r="4" fill="#e74c3c"/>
    <text x="48" y="304" class="detail" font-weight="600">Tokenization:</text>
    <text x="125" y="304" class="detail">Word, Subword (BPE/WordPiece), Sentence</text>
  </g>
  
  <g class="concept-box">
    <circle cx="35" cy="320" r="4" fill="#27ae60"/>
    <text x="48" y="324" class="detail" font-weight="600">Subword Units:</text>
    <text x="125" y="324" class="detail">BPE (Byte-Pair Encoding), WordPiece for BERT</text>
  </g>
  
  <g class="concept-box">
    <circle cx="35" cy="340" r="4" fill="#9b59b6"/>
    <text x="48" y="344" class="detail" font-weight="600">Filtering:</text>
    <text x="115" y="344" class="detail">Stopwords, stemming (Porter/Snowball), lemmatization</text>
  </g>
  
  <g class="concept-box">
    <circle cx="35" cy="360" r="4" fill="#f39c12"/>
    <text x="48" y="364" class="detail" font-weight="600">Special Tokens:</text>
    <text x="125" y="364" class="detail">[CLS], [SEP], [PAD] for transformers</text>
  </g>
  
  <!-- Decorative element -->
  <g opacity="0.3">
    <circle cx="400" cy="380" r="15" fill="#3498db"/>
    <circle cx="20" cy="380" r="10" fill="#e74c3c"/>
    <circle cx="380" cy="55" r="8" fill="#27ae60"/>
  </g>
</svg>