<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pos-tagging-ner">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c8b8"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e0"/>
      <stop offset="100%" style="stop-color:#b898c8"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#98b8d0"/>
    </linearGradient>
    <linearGradient id="hmmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#c8b898"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .tag { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .word { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
    .section-box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-delay-1 { animation-delay: 0.2s; }
    .anim-delay-2 { animation-delay: 0.4s; }
    .anim-delay-3 { animation-delay: 0.6s; }
    .anim-delay-4 { animation-delay: 0.8s; }
    .line-anim { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">POS Tagging &amp; NER</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#7f8c8d" stroke-width="1" class="anim-fade" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: POS Tagging Explanation -->
  <g class="anim-slide anim-delay-1" data-narration="POS tagging assigns grammatical categories to each word in a sentence">
    <rect x="15" y="50" width="185" height="85" rx="8" fill="url(#boxGrad1)" class="section-box"/>
    <text x="25" y="68" class="label">POS Tagging</text>
    <text x="25" y="85" class="detail">Assigns grammatical labels:</text>
    <text x="25" y="102" class="detail">NN, VB, JJ, DT, ...</text>
    <text x="25" y="118" class="detail">Resolves ambiguity</text>
  </g>
  
  <!-- Section 2: NER Explanation -->
  <g class="anim-slide anim-delay-2" data-narration="NER identifies and classifies proper nouns into categories like person, organization, location">
    <rect x="220" y="50" width="185" height="85" rx="8" fill="url(#boxGrad2)" class="section-box"/>
    <text x="230" y="68" class="label">Named Entity Rec.</text>
    <text x="230" y="85" class="detail">Classifies proper nouns:</text>
    <text x="230" y="102" class="detail">PER, ORG, LOC, DATE</text>
    <text x="230" y="118" class="detail">Extracts structured info</text>
  </g>
  
  <!-- Section 3: HMM Architecture -->
  <g class="anim-slide anim-delay-3" data-narration="HMM uses hidden states for POS tags and observations for words with transition probabilities">
    <rect x="15" y="145" width="390" height="130" rx="8" fill="url(#hmmGrad)" class="section-box"/>
    <text x="210" y="165" text-anchor="middle" class="label">HMM POS Tagging Architecture</text>
    
    <!-- States Layer (POS Tags) -->
    <rect x="45" y="180" width="55" height="30" rx="5" fill="#c0392b" class="anim-pulse"/>
    <text x="72" y="200" text-anchor="middle" class="tag">DET</text>
    
    <rect x="115" y="180" width="55" height="30" rx="5" fill="#2980b9" class="anim-pulse" style="animation-delay: 0.5s"/>
    <text x="142" y="200" text-anchor="middle" class="tag">NOUN</text>
    
    <rect x="185" y="180" width="55" height="30" rx="5" fill="#27ae60" class="anim-pulse" style="animation-delay: 1s"/>
    <text x="212" y="200" text-anchor="middle" class="tag">VERB</text>
    
    <rect x="255" y="180" width="55" height="30" rx="5" fill="#8e44ad" class="anim-pulse" style="animation-delay: 1.5s"/>
    <text x="282" y="200" text-anchor="middle" class="tag">ADJ</text>
    
    <rect x="325" y="180" width="55" height="30" rx="5" fill="#d35400" class="anim-pulse" style="animation-delay: 2s"/>
    <text x="352" y="200" text-anchor="middle" class="tag">NOUN</text>
    
    <!-- Observations Layer (Words) -->
    <rect x="55" y="235" width="55" height="28" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="82" y="253" text-anchor="middle" class="word">The</text>
    
    <rect x="130" y="235" width="55" height="28" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="157" y="253" text-anchor="middle" class="word">cat</text>
    
    <rect x="205" y="235" width="55" height="28" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="232" y="253" text-anchor="middle" class="word">sat</text>
    
    <rect x="280" y="235" width="55" height="28" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="307" y="253" text-anchor="middle" class="word">on</text>
    
    <rect x="355" y="235" width="55" height="28" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="382" y="253" text-anchor="middle" class="word">mat</text>
    
    <!-- Transition arrows -->
    <path d="M100 195 Q140 170 170 195" fill="none" stroke="#34495e" stroke-width="2" class="line-anim" style="animation-delay: 0.3s"/>
    <path d="M170 195 Q210 170 240 195" fill="none" stroke="#34495e" stroke-width="2" class="line-anim" style="animation-delay: 0.6s"/>
    <path d="M240 195 Q280 170 310 195" fill="none" stroke="#34495e" stroke-width="2" class="line-anim" style="animation-delay: 0.9s"/>
    <path d="M310 195 Q350 170 380 195" fill="none" stroke="#34495e" stroke-width="2" class="line-anim" style="animation-delay: 1.2s"/>
    
    <!-- Emission arrows -->
    <path d="M72 210 L72 235" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2" class="line-anim" style="animation-delay: 0.5s"/>
    <path d="M142 210 L157 235" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2" class="line-anim" style="animation-delay: 0.7s"/>
    <path d="M212 210 L232 235" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2" class="line-anim" style="animation-delay: 0.9s"/>
    <path d="M282 210 L307 235" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2" class="line-anim" style="animation-delay: 1.1s"/>
    <path d="M352 210 L382 235" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2" class="line-anim" style="animation-delay: 1.3s"/>
  </g>
  
  <!-- Section 4: Approaches -->
  <g class="anim-slide anim-delay-4" data-narration="Various approaches from rule-based to deep learning transform these tasks">
    <rect x="15" y="285" width="130" height="55" rx="8" fill="url(#boxGrad3)" class="section-box"/>
    <text x="25" y="303" class="label">POS Approaches</text>
    <text x="25" y="322" class="detail">• Rule-Based</text>
    <text x="90" y="322" class="detail">• HMM</text>
    <text x="25" y="336" class="detail">• Neural (BiLSTM)</text>
  </g>
  
  <g class="anim-slide anim-delay-4" data-narration="NER uses gazetteers, machine learning, and transformers">
    <rect x="155" y="285" width="130" height="55" rx="8" fill="url(#boxGrad2)" class="section-box"/>
    <text x="165" y="303" class="label">NER Approaches</text>
    <text x="165" y="322" class="detail">• Gazetteers</text>
    <text x="230" y="322" class="detail">• CRF</text>
    <text x="165" y="336" class="detail">• BERT</text>
  </g>
  
  <!-- Section 5: Metrics -->
  <g class="anim-slide anim-delay-4" data-narration="Evaluation uses accuracy for POS tagging and F1-score for NER">
    <rect x="295" y="285" width="110" height="55" rx="8" fill="url(#boxGrad1)" class="section-box"/>
    <text x="305" y="303" class="label">Metrics</text>
    <text x="305" y="322" class="detail">POS: Accuracy</text>
    <text x="305" y="336" class="detail">NER: F1-Score</text>
  </g>
  
  <!-- Arrow showing flow -->
  <path d="M108 135 L108 145" fill="none" stroke="#7f8c8d" stroke-width="2"/>
  <polygon points="108,150 104,140 112,140" fill="#7f8c8d"/>
  
  <!-- Legend -->
  <g class="anim-fade" style="animation-delay: 1s">
    <text x="210" y="360" text-anchor="middle" class="detail">States (Tags) → Observations (Words)</text>
    <line x1="140" y1="368" x2="280" y2="368" stroke="#bdc3c7" stroke-width="1"/>
    <text x="350" y="375" class="detail" fill="#7f8c8d">States: Hidden</text>
    <text x="350" y="388" class="detail" fill="#7f8c8d">Obs: Visible</text>
  </g>
</svg>