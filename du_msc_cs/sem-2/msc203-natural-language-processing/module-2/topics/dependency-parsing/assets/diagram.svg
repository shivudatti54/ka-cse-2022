<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="dependency-parsing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rootGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e88a3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f0f8;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .dep-label { font-family: Arial, sans-serif; font-size: 11px; fill: #e74c3c; font-weight: bold; }
    .box-title { font-family: Arial, sans-serif; font-size: 13px; fill: #2c3e50; font-weight: bold; }
    .section-box { fill: url(#boxGradient); stroke: #ddd; stroke-width: 1; rx: 8; }
    .node { fill: url(#nodeGradient); stroke: #4a7a9c; stroke-width: 2; }
    .root-node { fill: url(#rootGradient); stroke: #c67a3c; stroke-width: 2; }
    .dep-line { stroke: #888; stroke-width: 1.5; fill: none; }
    .animated { animation: fadeIn 0.8s ease-out forwards; }
    .slide { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-animated { stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawLine 1s ease-out forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title animated">Dependency Parsing</text>
  
  <!-- Dependency Tree Section -->
  <g class="slide" style="animation-delay: 0.2s" data-narration="The dependency tree shows head-dependent relationships. Each word (node) has a head (governor) connected by a directed arc labeled with the syntactic relation.">
    <rect x="20" y="50" width="180" height="140" class="section-box" filter="url(#shadow)"/>
    <text x="30" y="68" class="box-title">Dependency Tree</text>
    
    <!-- Tree nodes -->
    <g transform="translate(60, 120)">
      <!-- Root (loves) -->
      <ellipse cx="60" cy="0" rx="22" ry="14" class="root-node pulse"/>
      <text x="60" y="4" text-anchor="middle" fill="white" font-size="11" font-family="Arial" font-weight="bold">loves</text>
    </g>
    
    <!-- Dependencies -->
    <line x1="95" y1="125" x2="50" y2="155" class="dep-line line-animated"/>
    <text x="65" y="145" class="dep-label">nsubj</text>
    
    <line x1="145" y1="125" x2="110" y2="155" class="dep-line line-animated"/>
    <text x="122" y="145" class="dep-label">dobj</text>
    
    <line x1="95" y1="112" x2="95" y2="85" class="dep-line line-animated"/>
    <text x="100" y="102" class="dep-label">advmod</text>
    
    <!-- Word nodes -->
    <g transform="translate(50, 170)">
      <ellipse cx="0" cy="0" rx="18" ry="12" class="node"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-family="Arial">She</text>
    </g>
    <g transform="translate(110, 170)">
      <ellipse cx="0" cy="0" rx="18" ry="12" class="node"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-family="Arial">deeply</text>
    </g>
    <g transform="translate(150, 170)">
      <ellipse cx="0" cy="0" rx="22" ry="12" class="node"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-family="Arial">chocolate</text>
    </g>
  </g>
  
  <!-- Parsing Approaches Section -->
  <g class="slide" style="animation-delay: 0.4s" data-narration="Two main parsing algorithms: Transition-Based (arc-eager) uses stack/buffer with linear time O(n), while Graph-Based finds maximum spanning tree with quadratic complexity.">
    <rect x="210" y="50" width="190" height="80" class="section-box" filter="url(#shadow)"/>
    <text x="220" y="68" class="box-title">Parsing Algorithms</text>
    
    <g transform="translate(230, 85)">
      <circle cx="15" cy="10" r="8" fill="#9b59b6"/>
      <text x="30" y="14" class="label" style="font-size:12px">Transition-Based</text>
      <text x="30" y="28" class="detail">Arc-Eager, O(n) time</text>
    </g>
    <g transform="translate(230, 110)">
      <circle cx="15" cy="10" r="8" fill="#27ae60"/>
      <text x="30" y="14" class="label" style="font-size:12px">Graph-Based</text>
      <text x="30" y="28" class="detail">MST Parser, O(n²)</text>
    </g>
  </g>
  
  <!-- Neural Parser Section -->
  <g class="slide" style="animation-delay: 0.6s" data-narration="Modern neural parsers use BiLSTMs or Transformers with biaffine attention to achieve 95%+ accuracy on benchmarks.">
    <rect x="20" y="200" width="180" height="70" class="section-box" filter="url(#shadow)"/>
    <text x="30" y="218" class="box-title">Neural Parser</text>
    
    <g transform="translate(40, 235)">
      <rect x="0" y="0" width="30" height="20" rx="3" fill="#3498db"/>
      <text x="15" y="14" text-anchor="middle" fill="white" font-size="9">BiLSTM</text>
      <path d="M30 10 L50 10" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="50" y="0" width="30" height="20" rx="3" fill="#e74c3c"/>
      <text x="65" y="14" text-anchor="middle" fill="white" font-size="9">Attention</text>
      <path d="M80 10 L100 10" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <rect x="100" y="0" width="30" height="20" rx="3" fill="#f39c12"/>
      <text x="115" y="14" text-anchor="middle" fill="white" font-size="9">Parse</text>
    </g>
  </g>
  
  <!-- Evaluation Metrics Section -->
  <g class="slide" style="animation-delay: 0.8s" data-narration="Evaluation uses UAS (Unlabeled Attachment Score) for correct heads only, and LAS (Labeled Attachment Score) which also requires correct dependency labels.">
    <rect x="210" y="140" width="190" height="130" class="section-box" filter="url(#shadow)"/>
    <text x="220" y="158" class="box-title">Evaluation Metrics</text>
    
    <g transform="translate(230, 175)">
      <rect x="0" y="0" width="160" height="35" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
      <text x="10" y="15" class="label" style="font-size:13px;font-weight:bold">UAS</text>
      <text x="10" y="28" class="detail">Unlabeled Attachment Score</text>
      <text x="120" y="20" class="label" style="font-size:16px;color:#27ae60">95%+</text>
    </g>
    
    <g transform="translate(230, 220)">
      <rect x="0" y="0" width="160" height="35" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
      <text x="10" y="15" class="label" style="font-size:13px;font-weight:bold">LAS</text>
      <text x="10" y="28" class="detail">Labeled Attachment Score</text>
      <text x="120" y="20" class="label" style="font-size:16px;color:#2980b9">90%+</text>
    </g>
  </g>
  
  <!-- Applications Section -->
  <g class="slide" style="animation-delay: 1s" data-narration="Dependency parsing enables machine translation, information extraction, and question answering by analyzing syntactic structure.">
    <rect x="20" y="280" width="380" height="50" class="section-box" filter="url(#shadow)"/>
    <text x="30" y="298" class="box-title">Applications</text>
    
    <g transform="translate(40, 315)">
      <circle cx="0" cy="0" r="6" fill="#e91e63"/>
      <text x="12" y="4" class="detail">Machine Translation</text>
      <circle cx="100" cy="0" r="6" fill="#00bcd4"/>
      <text x="112" y="4" class="detail">Info Extraction</text>
      <circle cx="200" cy="0" r="6" fill="#8bc34a"/>
      <text x="212" y="4" class="detail">Question Answering</text>
      <circle cx="310" cy="0" r="6" fill="#ff9800"/>
      <text x="322" y="4" class="detail">Sentiment Analysis</text>
    </g>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="slide" style="animation-delay: 1.2s" data-narration="Key terminology: Head (governor), Dependent (child), Root (main verb), Projective (no crossing arcs).">
    <rect x="210" y="280" width="190" height="50" rx="5" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
    <text x="220" y="298" class="box-title" style="fill:#d68910">Key Terms</text>
    <text x="220" y="318" class="detail">Head • Dependent • Root • Projective</text>
  </g>
  
  <!-- Decorative arrow -->
  <g class="animated" style="animation-delay: 1.4s">
    <path d="M395 340 L395 360 L405 350 L395 340" fill="#7f8c8d"/>
    <text x="370" y="355" class="detail" style="font-size:10px">SOTA: 95%+</text>
  </g>
</svg>