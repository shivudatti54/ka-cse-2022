<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="parsing-context-free-grammars">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#eaf2f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e4f5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideDown {
      from { transform: translateY(-15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .box { rx: 8; ry: 8; }
    .section-1 { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .section-2 { animation: fadeIn 0.7s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideDown 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .section-5 { animation: pulse 2s ease-in-out 1s infinite; }
    .arrow { stroke: #7f8c8d; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Title: Parsing Context-Free Grammars - Overview of CFG parsing theory and algorithms">Parsing Context-Free Grammars</text>
  <line x1="30" y1="42" x2="390" y2="42" stroke="#3498db" stroke-width="2"/>
  
  <!-- Section 1: Formal Definition -->
  <g class="section-1" data-narration="CFG Formal Definition: 4-tuple (N, Σ, R, S)">
    <rect x="15" y="55" width="120" height="75" class="box" fill="#ffffff" filter="url(#shadow)" stroke="#3498db" stroke-width="1.5"/>
    <text x="75" y="72" text-anchor="middle" class="label" font-weight="bold">CFG Definition</text>
    <text x="25" y="90" class="detail">N: Non-terminals</text>
    <text x="25" y="105" class="detail">Σ: Terminals</text>
    <text x="25" y="120" class="detail">R: Production Rules</text>
  </g>
  
  <!-- Section 2: Parse Tree -->
  <g class="section-2" data-narration="Parse Tree: Hierarchical representation showing syntactic structure">
    <rect x="150" y="55" width="130" height="75" class="box" fill="#ffffff" filter="url(#shadow)" stroke="#27ae60" stroke-width="1.5"/>
    <text x="215" y="72" text-anchor="middle" class="label" font-weight="bold">Parse Tree</text>
    <text x="160" y="90" class="detail">Hierarchical structure</text>
    <text x="160" y="105" class="detail">Shows derivations</text>
    <text x="160" y="120" class="detail">Reveals ambiguity</text>
  </g>
  
  <!-- Section 3: CNF -->
  <g class="section-3" data-narration="Chomsky Normal Form: Restricted form for efficient parsing">
    <rect x="295" y="55" width="110" height="75" class="box" fill="#ffffff" filter="url(#shadow)" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="350" y="72" text-anchor="middle" class="label" font-weight="bold">CNF</text>
    <text x="305" y="90" class="detail">A → BC</text>
    <text x="305" y="105" class="detail">A → a</text>
    <text x="305" y="120" class="detail">For CKY algo</text>
  </g>
  
  <!-- Arrows between sections -->
  <path d="M135 92 L145 92" class="arrow"/>
  <path d="M280 92 L290 92" class="arrow"/>
  
  <!-- Section 4: CYK Table (Key Diagram) -->
  <g class="section-4" data-narration="CYK Table: Dynamic programming table showing non-terminals generating substrings">
    <rect x="15" y="145" width="190" height="180" class="box" fill="#fef9e7" filter="url(#shadow)" stroke="#f39c12" stroke-width="1.5"/>
    <text x="110" y="162" text-anchor="middle" class="label" font-weight="bold">CYK Parsing Table</text>
    
    <!-- CYK Table Grid -->
    <g class="section-5">
      <!-- Column headers (start position) -->
      <text x="35" y="185" class="detail" font-size="10">0</text>
      <text x="65" y="185" class="detail" font-size="10">1</text>
      <text x="95" y="185" class="detail" font-size="10">2</text>
      <text x="125" y="185" class="detail" font-size="10">3</text>
      <text x="155" y="185" class="detail" font-size="10">4</text>
      
      <!-- Row headers (length) -->
      <text x="25" y="205" class="detail" font-size="10">len1</text>
      <text x="25" y="235" class="detail" font-size="10">len2</text>
      <text x="25" y="265" class="detail" font-size="10">len3</text>
      <text x="25" y="295" class="detail" font-size="10">len4</text>
      
      <!-- Table cells -->
      <rect x="32" y="190" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <text x="44" y="206" class="detail" font-size="9" fill="#e74c3c">S,NP</text>
      
      <rect x="62" y="190" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <text x="74" y="206" class="detail" font-size="9" fill="#27ae60">VP</text>
      
      <rect x="92" y="190" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <text x="104" y="206" class="detail" font-size="9" fill="#3498db">NP</text>
      
      <rect x="122" y="190" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <text x="134" y="206" class="detail" font-size="9" fill="#9b59b6">Det</text>
      
      <rect x="152" y="190" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <text x="164" y="206" class="detail" font-size="9" fill="#e67e22">N</text>
      
      <rect x="32" y="215" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <text x="44" y="231" class="detail" font-size="9" fill="#c0392b">S</text>
      
      <rect x="62" y="215" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <rect x="92" y="215" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <rect x="122" y="215" width="25" height="22" fill="#fff" stroke="#ddd"/>
      
      <rect x="32" y="240" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <text x="44" y="256" class="detail" font-size="9" fill="#16a085">S</text>
      
      <rect x="62" y="240" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <rect x="92" y="240" width="25" height="22" fill="#fff" stroke="#ddd"/>
      
      <rect x="32" y="265" width="25" height="22" fill="#fff" stroke="#ddd"/>
      <rect x="62" y="265" width="25" height="22" fill="#fff" stroke="#ddd"/>
      
      <rect x="32" y="290" width="25" height="22" fill="#fff" stroke="#ddd"/>
    </g>
    
    <text x="110" y="320" text-anchor="middle" class="detail" font-size="10">O(n³|G|) complexity</text>
  </g>
  
  <!-- Section 5: Algorithms -->
  <g class="section-4" data-narration="Parsing Algorithms: CKY, Earley, and Chart parsing approaches">
    <rect x="220" y="145" width="185" height="100" class="box" fill="#ffffff" filter="url(#shadow)" stroke="#1abc9c" stroke-width="1.5"/>
    <text x="312" y="162" text-anchor="middle" class="label" font-weight="bold">Parsing Algorithms</text>
    
    <text x="230" y="182" class="detail" fill="#e74c3c">●</text>
    <text x="240" y="182" class="detail">CKY: Bottom-up, O(n³)</text>
    
    <text x="230" y="200" class="detail" fill="#27ae60">●</text>
    <text x="240" y="200" class="detail">Earley: Top-down</text>
    
    <text x="230" y="218" class="detail" fill="#3498db">●</text>
    <text x="240" y="218" class="detail">Chart: Hybrid approach</text>
    
    <text x="230" y="236" class="detail" fill="#9b59b6">●</text>
    <text x="240" y="236" class="detail">PCFGs: Probabilistic</text>
  </g>
  
  <!-- Section 6: Applications -->
  <g class="section-4" data-narration="Applications: Machine translation, Question answering, Semantic role labeling">
    <rect x="220" y="255" width="185" height="70" class="box" fill="#f0f8ff" filter="url(#shadow)" stroke="#3498db" stroke-width="1.5"/>
    <text x="312" y="272" text-anchor="middle" class="label" font-weight="bold">Applications</text>
    <text x="230" y="292" class="detail">• Syntax-aware MT</text>
    <text x="230" y="308" class="detail">• Question Answering</text>
    <text x="340" y="292" class="detail">• Semantic Roles</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="section-4" data-narration="Key insight: CFGs model hierarchical language structure through production rules">
    <rect x="15" y="335" width="390" height="55" class="box" fill="#e8f8f5" filter="url(#shadow)" stroke="#17a589" stroke-width="1.5"/>
    <text x="210" y="352" text-anchor="middle" class="label" font-weight="bold" fill="#0e6655">Key Insight</text>
    <text x="210" y="370" text-anchor="middle" class="detail" fill="#1e8449">CFGs enable precise modeling of hierarchical language constructs</text>
    <text x="210" y="385" text-anchor="middle" class="detail" fill="#1e8449">through production rules, supporting 100+ languages in Universal Dependencies</text>
  </g>
</svg>