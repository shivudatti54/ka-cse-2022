<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="constituency-parsing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: 'Georgia', serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label-text { font-family: 'Arial', sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: 'Arial', sans-serif; font-size: 12px; fill: #5d6d7e; }
    .section-title { font-family: 'Georgia', serif; font-size: 14px; fill: #2980b9; font-weight: bold; }
    .rule-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #2c3e50; }
    .word-text { font-family: 'Arial', sans-serif; font-size: 13px; fill: #1a1a2e; font-weight: bold; }
    .node-circle { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
    .node-circle-s { fill: #9b59b6; stroke: #8e44ad; stroke-width: 2; }
    .node-circle-np { fill: #27ae60; stroke: #229954; stroke-width: 2; }
    .node-circle-vp { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
    .line-conn { stroke: #7f8c8d; stroke-width: 2; fill: none; }
    .box-highlight { fill: #ffffff; stroke: #3498db; stroke-width: 2; rx: 8; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.3s; }
    .delay-2 { animation-delay: 0.6s; }
    .delay-3 { animation-delay: 0.9s; }
    .delay-4 { animation-delay: 1.2s; }
    .delay-5 { animation-delay: 1.5s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="anim-fade">
    <text x="210" y="30" text-anchor="middle" class="title-text">Constituency Parsing</text>
    <line x1="100" y1="40" x2="320" y2="40" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Section 1: Parse Tree Visualization -->
  <g class="anim-slide-left delay-1" data-narration="Parse Tree: Hierarchical structure showing phrase constituents">
    <text x="15" y="65" class="section-title">Parse Tree</text>
    <text x="15" y="80" class="detail-text">"The dog chased the ball"</text>
    
    <!-- Tree structure -->
    <!-- S Root -->
    <line x1="210" y1="95" x2="150" y2="130" class="line-conn"/>
    <line x1="210" y1="95" x2="270" y2="130" class="line-conn"/>
    <circle cx="210" cy="90" r="16" class="node-circle-s" filter="url(#shadow)"/>
    <text x="210" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">S</text>
    
    <!-- NP Branch -->
    <line x1="150" y1="130" x2="110" y2="165" class="line-conn"/>
    <line x1="150" y1="130" x2="190" y2="165" class="line-conn"/>
    <circle cx="150" cy="125" r="14" class="node-circle-np" filter="url(#shadow)"/>
    <text x="150" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="bold">NP</text>
    
    <!-- VP Branch -->
    <circle cx="270" cy="125" r="14" class="node-circle-vp" filter="url(#shadow)"/>
    <text x="270" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="bold">VP</text>
    <line x1="270" y1="140" x2="230" y2="175" class="line-conn"/>
    <line x1="270" y1="140" x2="310" y2="175" class="line-conn"/>
    
    <!-- Terminals NP -->
    <circle cx="110" cy="170" r="12" class="node-circle" filter="url(#shadow)"/>
    <text x="110" y="174" text-anchor="middle" fill="white" font-size="9">Det</text>
    <circle cx="190" cy="170" r="12" class="node-circle" filter="url(#shadow)"/>
    <text x="190" y="174" text-anchor="middle" fill="white" font-size="9">N</text>
    
    <!-- Terminals VP -->
    <circle cx="230" cy="180" r="12" class="node-circle" filter="url(#shadow)"/>
    <text x="230" y="184" text-anchor="middle" fill="white" font-size="9">V</text>
    <circle cx="310" cy="180" r="14" class="node-circle-np" filter="url(#shadow)"/>
    <text x="310" y="184" text-anchor="middle" fill="white" font-size="10">NP</text>
    
    <!-- Words -->
    <rect x="85" y="195" width="50" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="110" y="211" text-anchor="middle" class="word-text">The</text>
    
    <rect x="165" y="195" width="50" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="190" y="211" text-anchor="middle" class="word-text">dog</text>
    
    <rect x="205" y="205" width="50" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="230" y="221" text-anchor="middle" class="word-text">chased</text>
    
    <rect x="285" y="205" width="50" height="22" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="310" y="221" text-anchor="middle" class="word-text">the ball</text>
  </g>
  
  <!-- Section 2: CFG Rules -->
  <g class="anim-slide-right delay-2" data-narration="CFG Production Rules: S → NP VP, NP → Det N">
    <text x="220" y="250" class="section-title">CFG Rules</text>
    <rect x="215" y="260" width="190" height="90" class="box-highlight" filter="url(#shadow)"/>
    <text x="230" y="282" class="rule-text">S → NP VP</text>
    <text x="230" y="300" class="rule-text">NP → Det N</text>
    <text x="230" y="318" class="rule-text">VP → V NP</text>
    <text x="230" y="336" class="rule-text">Det → 'the'</text>
    <text x="230" y="352" class="rule-text">N → 'dog' | 'ball'</text>
  </g>
  
  <!-- Section 3: Key Concepts -->
  <g class="anim-fade delay-3" data-narration="Key Concepts: Phrase Structure Grammar, CKY Algorithm, PCFGs">
    <text x="15" y="250" class="section-title">Key Concepts</text>
    
    <!-- Concept Box 1 -->
    <rect x="15" y="260" width="95" height="35" rx="5" fill="#fff9e6" stroke="#f39c12" stroke-width="1"/>
    <text x="62" y="275" text-anchor="middle" class="label-text" style="font-size:11px;font-weight:bold;">Phrase Structure</text>
    <text x="62" y="288" text-anchor="middle" class="detail-text" style="font-size:9px;">Grammar Rules</text>
    
    <!-- Concept Box 2 -->
    <rect x="115" y="260" width="90" height="35" rx="5" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1"/>
    <text x="160" y="275" text-anchor="middle" class="label-text" style="font-size:11px;font-weight:bold;">CKY</text>
    <text x="160" y="288" text-anchor="middle" class="detail-text" style="font-size:9px;">O(n³) Algorithm</text>
    
    <!-- Concept Box 3 -->
    <rect x="15" y="300" width="95" height="35" rx="5" fill="#f5eef8" stroke="#9b59b6" stroke-width="1"/>
    <text x="62" y="315" text-anchor="middle" class="label-text" style="font-size:11px;font-weight:bold;">PCFG</text>
    <text x="62" y="328" text-anchor="middle" class="detail-text" style="font-size:9px;">Probabilistic</text>
    
    <!-- Concept Box 4 -->
    <rect x="115" y="300" width="90" height="35" rx="5" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
    <text x="160" y="315" text-anchor="middle" class="label-text" style="font-size:11px;font-weight:bold;">Treebank</text>
    <text x="160" y="328" text-anchor="middle" class="detail-text" style="font-size:9px;">Penn Corpus</text>
  </g>
  
  <!-- Section 4: Evaluation -->
  <g class="anim-slide-left delay-4" data-narration="Evaluation: PARSEVAL metrics measure precision, recall, F1">
    <text x="15" y="355" class="section-title">Evaluation</text>
    <rect x="15" y="365" width="190" height="28" rx="5" fill="#ffffff" stroke="#e74c3c" stroke-width="1"/>
    <text x="30" y="380" class="detail-text">PARSEVAL: Precision, Recall, F1</text>
    <text x="160" y="380" text-anchor="middle" class="label-text" style="font-size:16px;color:#27ae60;font-weight:bold;">95%+</text>
  </g>
  
  <!-- Section 5: Applications -->
  <g class="anim-slide-right delay-5" data-narration="Applications: Machine Translation, Question Answering, Semantic Analysis">
    <text x="220" y="355" class="section-title">Applications</text>
    <rect x="220" y="365" width="185" height="28" rx="5" fill="#ffffff" stroke="#2ecc71" stroke-width="1"/>
    <text x="235" y="378" class="detail-text">MT • QA • Semantic Analysis</text>
    <text x="375" y="378" text-anchor="middle" class="label-text" style="font-size:14px;color:#9b59b6;font-weight:bold;">NLP</text>
  </g>
  
  <!-- Decorative arrow -->
  <g class="anim-pulse" style="transform-origin: 210px 235px;">
    <path d="M 200 235 L 220 235" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
    <polygon points="220,235 215,230 215,240" fill="#e74c3c"/>
  </g>
  
  <!-- Bottom label -->
  <text x="210" y="395" text-anchor="middle" class="detail-text" style="font-size:10px;fill:#7f8c8d;">Hierarchical Phrase Structure Analysis</text>
</svg>