<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="coreference-resolution">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#eef2f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ebf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8dd9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a6fa5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mentionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8a2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9178;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section-3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .entity-node { animation: pulse 2s ease-in-out infinite; }
    .mention-node { animation: fadeIn 0.5s ease-out 0.8s both; }
    .connector { animation: drawLine 1s ease-out 1s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .arrow { animation: fadeIn 0.4s ease-out 1.2s both; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>

  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#3a506b" class="title">Coreference Resolution</text>

  <!-- Main Entity Node -->
  <g class="section-1" data-narration="Central entity that all mentions refer to">
    <rect x="150" y="55" width="120" height="35" rx="8" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Dr. Sharma</text>
  </g>

  <!-- Sentence 1 Box -->
  <g class="section-2" data-narration="First sentence with named entity mention">
    <rect x="20" y="110" width="180" height="45" rx="6" fill="#fff" stroke="#b8c5d3" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="128" font-family="Arial, sans-serif" font-size="12" fill="#555">"Dr. Sharma published</text>
    <text x="30" y="145" font-family="Arial, sans-serif" font-size="12" fill="#555">the paper."</text>
  </g>

  <!-- Sentence 2 Box with coreference -->
  <g class="section-2" data-narration="Second sentence with pronominal anaphor referring back to entity">
    <rect x="220" y="110" width="180" height="45" rx="6" fill="#fff" stroke="#b8c5d3" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="230" y="128" font-family="Arial, sans-serif" font-size="12" fill="#555">"She received</text>
    <text x="230" y="145" font-family="Arial, sans-serif" font-size="12" fill="#555">awards."</text>
  </g>

  <!-- Mention Nodes -->
  <g class="mention-node" data-narration="Pronoun mention that resolves to the entity">
    <rect x="280" y="175" width="70" height="28" rx="6" fill="url(#mentionGradient)" filter="url(#shadow)"/>
    <text x="315" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">She</text>
  </g>

  <g class="mention-node" data-narration="Possessive pronoun mention">
    <rect x="60" y="175" width="70" height="28" rx="6" fill="url(#mentionGradient)" filter="url(#shadow)"/>
    <text x="95" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">her</text>
  </g>

  <g class="mention-node" data-narration="Named entity mention">
    <rect x="160" y="175" width="100" height="28" rx="6" fill="url(#mentionGradient)" filter="url(#shadow)"/>
    <text x="210" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Dr. Sharma</text>
  </g>

  <!-- Connection Lines -->
  <line x1="210" y1="90" x2="210" y2="175" stroke="#8b7ec9" stroke-width="2" class="connector" marker-end="url(#arrowhead)"/>
  <line x1="210" y1="90" x2="160" y2="175" stroke="#8b7ec9" stroke-width="2" class="connector"/>
  <line x1="210" y1="90" x2="260" y2="175" stroke="#8b7ec9" stroke-width="2" class="connector"/>

  <!-- Arrow from first sentence -->
  <path d="M 110 155 Q 110 165 150 175" stroke="#d4a574" stroke-width="2" fill="none" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="70" y="168" font-family="Arial, sans-serif" font-size="10" fill="#8b7355">anaphora</text>

  <!-- Coreference Cluster Label -->
  <g class="section-3" data-narration="Coreference cluster showing all mentions linked to entity">
    <rect x="140" y="220" width="140" height="25" rx="5" fill="#f5e6d3" stroke="#d4a574" stroke-width="1"/>
    <text x="210" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8b7355">Coreference Cluster</text>
  </g>

  <!-- Key Concepts Section -->
  <g class="section-3" data-narration="Key concepts in coreference resolution">
    <!-- Concept Box 1 -->
    <rect x="20" y="260" width="115" height="50" rx="5" fill="#fff" stroke="#9fc5c9" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="77" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a7c7c">Mention Detection</text>
    <text x="77" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Find pronouns, NPs,</text>
    <text x="77" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">named entities</text>

    <!-- Concept Box 2 -->
    <rect x="150" y="260" width="115" height="50" rx="5" fill="#fff" stroke="#9fc5c9" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="207" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a7c7c">Cluster Formation</text>
    <text x="207" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Group mentions</text>
    <text x="207" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">to same entity</text>

    <!-- Concept Box 3 -->
    <rect x="280" y="260" width="115" height="50" rx="5" fill="#fff" stroke="#9fc5c9" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="337" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a7c7c">Evaluation</text>
    <text x="337" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">MUC, B³, CEAF</text>
    <text x="337" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">metrics</text>
  </g>

  <!-- Resolution Process Arrow -->
  <g class="section-3" data-narration="The resolution process flows from detection to clustering">
    <path d="M 77 320 L 77 335 L 207 335 L 207 350" stroke="#b8c5d3" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
    <text x="142" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">Resolution Process</text>
  </g>

  <!-- Applications Box -->
  <g class="section-3" data-narration="Applications of coreference resolution">
    <rect x="20" y="355" width="180" height="35" rx="5" fill="#e8f0e8" stroke="#a3c9a3" stroke-width="1"/>
    <text x="110" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a7a5a">MT • Summarization • Dialog • IE</text>
  </g>

  <!-- Model Types -->
  <g class="section-3" data-narration="Modern approaches using transformers and neural networks">
    <rect x="215" y="355" width="180" height="35" rx="5" fill="#f0e8f8" stroke="#c9a3c9" stroke-width="1"/>
    <text x="305" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7a5a7a">BERT • SpanBERT • GNN</text>
  </g>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b7ec9"/>
    </marker>
  </defs>
</svg>