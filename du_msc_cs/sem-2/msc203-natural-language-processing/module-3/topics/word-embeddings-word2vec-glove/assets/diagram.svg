<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="word-embeddings-word2vec-glove">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfe9f3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 20; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-arrow {
      stroke-dasharray: 5, 5;
      animation: flowRight 1s linear infinite;
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d3748; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #4a5568; }
    .small-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #718096; }
    .highlight-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #11998e; }
    .section-box { rx: 8; ry: 8; }
    .node { filter: url(#shadow); }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="slide-up">
    <text x="210" y="28" text-anchor="middle" class="title">Word Embeddings: Word2Vec &amp; GloVe</text>
    <line x1="60" y1="38" x2="360" y2="38" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Section 1: Skip-Gram Architecture -->
  <g class="fade-in" data-narration="Skip-Gram: Predict context words from input word" style="animation-delay: 0.2s">
    <rect x="15" y="50" width="185" height="115" fill="#fff" stroke="#e2e8f0" stroke-width="1" class="section-box"/>
    <text x="25" y="68" class="highlight-text">Skip-Gram Architecture</text>
    
    <!-- Input Node -->
    <rect x="30" y="80" width="50" height="25" fill="url(#nodeGradient)" rx="4" class="node"/>
    <text x="55" y="97" text-anchor="middle" fill="#fff" font-size="11" font-family="Segoe UI">Input</text>
    <text x="55" y="115" text-anchor="middle" class="small-label">"bank"</text>
    
    <!-- Hidden/Projection Layer -->
    <rect x="82" y="80" width="50" height="25" fill="#ed8936" rx="4" class="node"/>
    <text x="107" y="97" text-anchor="middle" fill="#fff" font-size="11" font-family="Segoe UI">Hidden</text>
    <text x="107" y="115" text-anchor="middle" class="small-label">Vector</text>
    
    <!-- Output Nodes -->
    <rect x="140" y="72" width="45" height="18" fill="url(#highlightGradient)" rx="3"/>
    <text x="162.5" y="85" text-anchor="middle" fill="#fff" font-size="9">river</text>
    
    <rect x="140" y="95" width="45" height="18" fill="url(#highlightGradient)" rx="3"/>
    <text x="162.5" y="108" text-anchor="middle" fill="#fff" font-size="9">money</text>
    
    <rect x="140" y="118" width="45" height="18" fill="url(#highlightGradient)" rx="3"/>
    <text x="162.5" y="131" text-anchor="middle" fill="#fff" font-size="9">account</text>
    
    <!-- Arrows -->
    <path d="M80 92 L82 92" stroke="#667eea" stroke-width="2" class="flow-arrow"/>
    <path d="M132 92 L140 82" stroke="#667eea" stroke-width="1.5" class="flow-arrow"/>
    <path d="M132 92 L140 95" stroke="#667eea" stroke-width="1.5" class="flow-arrow"/>
    <path d="M132 92 L140 118" stroke="#667eea" stroke-width="1.5" class="flow-arrow"/>
    
    <text x="25" y="155" class="small-label">Predict context from target</text>
  </g>

  <!-- Section 2: CBOW -->
  <g class="fade-in" data-narration="CBOW: Predict target word from context words" style="animation-delay: 0.4s">
    <rect x="215" y="50" width="185" height="115" fill="#fff" stroke="#e2e8f0" stroke-width="1" class="section-box"/>
    <text x="225" y="68" class="highlight-text">CBOW Architecture</text>
    
    <!-- Input Nodes (Context) -->
    <rect x="225" y="72" width="40" height="16" fill="url(#nodeGradient)" rx="3"/>
    <text x="245" y="83" text-anchor="middle" fill="#fff" font-size="8">the</text>
    
    <rect x="225" y="92" width="40" height="16" fill="url(#nodeGradient)" rx="3"/>
    <text x="245" y="103" text-anchor="middle" fill="#fff" font-size="8">river</text>
    
    <rect x="225" y="112" width="40" height="16" fill="url(#nodeGradient)" rx="3"/>
    <text x="245" y="123" text-anchor="middle" fill="#fff" font-size="8">bank</text>
    
    <!-- Hidden Layer -->
    <rect x="275" y="80" width="50" height="25" fill="#ed8936" rx="4" class="node"/>
    <text x="300" y="97" text-anchor="middle" fill="#fff" font-size="11" font-family="Segoe UI">Hidden</text>
    
    <!-- Output Node -->
    <rect x="335" y="80" width="50" height="25" fill="url(#highlightGradient)" rx="4" class="node pulse"/>
    <text x="360" y="97" text-anchor="middle" fill="#fff" font-size="11">bank</text>
    
    <!-- Arrows -->
    <path d="M265 80 L275 92" stroke="#667eea" stroke-width="1.5" class="flow-arrow"/>
    <path d="M265 100 L275 92" stroke="#667eea" stroke-width="1.5" class="flow-arrow"/>
    <path d="M265 120 L275 92" stroke="#667eea" stroke-width="1.5" class="flow-arrow"/>
    <path d="M325 92 L335 92" stroke="#667eea" stroke-width="2" class="flow-arrow"/>
    
    <text x="225" y="155" class="small-label">Predict target from context</text>
  </g>

  <!-- Section 3: GloVe Co-occurrence -->
  <g class="slide-left" data-narration="GloVe learns embeddings from word co-occurrence statistics" style="animation-delay: 0.6s">
    <rect x="15" y="175" width="190" height="100" fill="#fff" stroke="#e2e8f0" stroke-width="1" class="section-box"/>
    <text x="25" y="193" class="highlight-text">GloVe: Co-occurrence Matrix</text>
    
    <!-- Matrix representation -->
    <rect x="25" y="205" width="80" height="55" fill="#f7fafc" stroke="#cbd5e0" stroke-width="0.5"/>
    <text x="35" y="218" class="small-label" fill="#718096">Words→</text>
    <text x="25" y="228" class="small-label" fill="#718096">↓Ctx</text>
    
    <!-- Matrix cells -->
    <rect x="55" y="220" width="18" height="12" fill="#e2e8f0"/>
    <text x="64" y="229" text-anchor="middle" font-size="8" fill="#4a5568">12</text>
    <rect x="75" y="220" width="18" height="12" fill="#cbd5e0"/>
    <text x="84" y="229" text-anchor="middle" font-size="8" fill="#4a5568">3</text>
    <rect x="55" y="234" width="18" height="12" fill="#cbd5e0"/>
    <text x="64" y="243" text-anchor="middle" font-size="8" fill="#4a5568">2</text>
    <rect x="75" y="234" width="18" height="12" fill="#e2e8f0"/>
    <text x="84" y="243" text-anchor="middle" font-size="8" fill="#4a5568">8</text>
    
    <!-- Arrow to vector -->
    <path d="M110 232 L140 232" stroke="#11998e" stroke-width="2" class="flow-arrow"/>
    
    <!-- Word Vectors -->
    <rect x="145" y="215" width="50" height="35" fill="url(#highlightGradient)" rx="4"/>
    <text x="170" y="228" text-anchor="middle" fill="#fff" font-size="9">Vector</text>
    <text x="170" y="242" text-anchor="middle" fill="#fff" font-size="8">[0.2, -0.1, ...]</text>
    
    <text x="25" y="265" class="small-label">X_ij = co-occurrence count</text>
  </g>

  <!-- Section 4: Word Analogies -->
  <g class="slide-right" data-narration="Word embeddings enable analogical reasoning through vector arithmetic" style="animation-delay: 0.8s">
    <rect x="215" y="175" width="190" height="100" fill="#fff" stroke="#e2e8f0" stroke-width="1" class="section-box"/>
    <text x="225" y="193" class="highlight-text">Word Analogies</text>
    
    <!-- Vector equation -->
    <text x="225" y="218" class="label" font-size="11">Paris - France + Tokyo = ?</text>
    
    <!-- Arrow -->
    <path d="M225 228 L260 228" stroke="#667eea" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Result -->
    <rect x="265" y="215" width="55" height="25" fill="url(#nodeGradient)" rx="4" class="node pulse"/>
    <text x="292.5" y="232" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Japan</text>
    
    <!-- Similarity score -->
    <text x="330" y="232" class="small-label">cos~0.82</text>
    
    <!-- Key property -->
    <text x="225" y="258" class="small-label" fill="#718096">wKing - wMan + wWoman ≈ wQueen</text>
    <rect x="225" y="263" width="120" height="1" fill="#e2e8f0"/>
    <text x="225" y="273" class="small-label" fill="#718096">Additive Compositionality</text>
  </g>

  <!-- Section 5: Key Formulas -->
  <g class="fade-in" data-narration="GloVe objective function combines global co-occurrence statistics" style="animation-delay: 1s">
    <rect x="15" y="285" width="390" height="50" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    <text x="25" y="303" class="label" font-size="11" fill="#4a5568">GloVe: J = Σ f(X</text>
    <text x="55" y="303" class="label" font-size="9" fill="#4a5568" font-style="italic">ij</text>
    <text x="70" y="303" class="label" font-size="11" fill="#4a5568">)(w</text>
    <text x="78" y="303" class="label" font-size="8" fill="#4a5568" font-style="italic">i</text>
    <text x="85" y="303" class="label" font-size="11" fill="#4a5568">ᵀw̃</text>
    <text x="98" y="303" class="label" font-size="8" fill="#4a5568" font-style="italic">j</text>
    <text x="105" y="303" class="label" font-size="11" fill="#4a5568"> + b</text>
    <text x="113" y="303" class="label" font-size="8" fill="#4a5568" font-style="italic">i</text>
    <text x="118" y="303" class="label" font-size="11" fill="#4a5568"> + b̃</text>
    <text x="128" y="303" class="label" font-size="8" fill="#4a5568" font-style="italic">j</text>
    <text x="135" y="303" class="label" font-size="11" fill="#4a5568"> - log X</text>
    <text x="158" y="303" class="label" font-size="8" fill="#4a5568" font-style="italic">ij</text>
    <text x="163" y="303" class="label" font-size="11" fill="#4a5568">)²</text>
    
    <text x="180" y="303" class="small-label" fill="#718096">|</text>
    <text x="190" y="303" class="small-label" fill="#718096">f(x) = min(1, (x/x</text>
    <text x="238" y="303" class="small-label" fill="#718096" font-style="italic">max</text>
    <text x="248" y="303" class="small-label" fill="#718096">)¾)</text>
    
    <text x="280" y="303" class="label" font-size="11" fill="#4a5568">Skip-gram P(c|w) =</text>
    <text x="355" y="303" class="label" font-size="10" fill="#4a5568">exp(u</text>
    <text x="365" y="303" class="label" font-size="8" fill="#4a5568" font-style="italic">c</text>
    <text x="370" y="303" class="label" font-size="10" fill="#4a5568">ᵀv</text>
    <text x="377" y="303" class="label" font-size="8" fill="#4a5568" font-style="italic">w</text>
    <text x="382" y="303" class="label" font-size="10" fill="#4a5568">)/Σ</text>
    <text x="395" y="300" class="label" font-size="8" fill="#4a5568">Σ</text>
  </g>

  <!-- Section 6: Key Concepts Summary -->
  <g class="fade-in" data-narration="Key learning points: distributional hypothesis, efficient training methods" style="animation-delay: 1.2s">
    <rect x="15" y="345" width="390" height="45" fill="#fff" stroke="#e2e8f0" stroke-width="1" rx="6"/>
    
    <circle cx="35" cy="368" r="8" fill="url(#nodeGradient)" class="pulse"/>
    <text x="35" y="371" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">1</text>
    <text x="50" y="371" class="small-label" fill="#4a5568">Distributional</text>
    <text x="115" y="371" class="small-label" fill="#718096">Similar context = similar meaning</text>
    
    <circle cx="175" cy="368" r="8" fill="url(#highlightGradient)" class="pulse" style="animation-delay: 0.3s"/>
    <text x="175" y="371" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">2</text>
    <text x="190" y="371" class="small-label" fill="#4a5568">Negative Sampling</text>
    <text x="265" y="371" class="small-label" fill="#718096">Efficient training</text>
    
    <circle cx="325" cy="368" r="8" fill="#ed8936" class="pulse" style="animation-delay: 0.6s"/>
    <text x="325" y="371" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">3</text>
    <text x="340" y="371" class="small-label" fill="#4a5568">Subsampling</text>
    <text x="385" y="371" class="small-label" fill="#718096">frequent</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="395" cy="385" r="15" fill="url(#nodeGradient)" opacity="0.1"/>
  <circle cx="25" cy="385" r="10" fill="url(#highlightGradient)" opacity="0.1"/>
</svg>