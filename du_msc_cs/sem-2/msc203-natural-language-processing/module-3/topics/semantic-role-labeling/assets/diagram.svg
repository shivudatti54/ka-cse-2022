<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="semantic-role-labeling">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="argGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="predGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b041"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a9dfbf"/>
      <stop offset="100%" style="stop-color:#7dcea0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section2 { animation: slideInRight 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .predicate { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: fadeIn 0.5s ease-out 1s forwards; opacity: 0; }
    .label-box { animation: slideInUp 0.5s ease-out forwards; }
    .highlight { animation: bounce 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Semantic Role Labeling</text>
  <line x1="100" y1="42" x2="320" y2="42" stroke="#3498db" stroke-width="2" class="title" style="animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0"/>
  
  <!-- Main Sentence Example -->
  <g class="section1" data-narration="The sentence 'The chef baked the cake in the oven' demonstrates SRL annotation with predicate and arguments">
    <text x="30" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">SRL Annotation Example:</text>
    
    <!-- Sentence container -->
    <rect x="25" y="85" width="370" height="70" fill="white" stroke="#bdc3c7" stroke-width="1" rx="5" filter="url(#shadow)"/>
    
    <!-- Arg0: The chef -->
    <rect x="35" y="105" width="75" height="28" fill="url(#argGradient)" rx="4"/>
    <text x="72" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">The chef</text>
    <text x="72" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5ba3c6">Arg0 (Agent)</text>
    
    <!-- Predicate: baked -->
    <rect x="118" y="105" width="60" height="28" fill="url(#predGradient)" rx="4" class="predicate"/>
    <text x="148" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">baked</text>
    <text x="148" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">Predicate</text>
    
    <!-- Arg1: the cake -->
    <rect x="186" y="105" width="75" height="28" fill="url(#argGradient)" rx="4"/>
    <text x="223" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">the cake</text>
    <text x="223" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5ba3c6">Arg1 (Patient)</text>
    
    <!-- ArgM-LOC: in the oven -->
    <rect x="270" y="105" width="105" height="28" fill="url(#argGradient)" rx="4"/>
    <text x="322" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">in the oven</text>
    <text x="322" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5ba3c6">ArgM-LOC</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="section2" data-narration="PropBank provides verb-specific argument roles while FrameNet uses event-centric frames">
    <text x="30" y="175" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Key Concepts:</text>
    
    <!-- PropBank Box -->
    <rect x="25" y="185" width="120" height="55" fill="url(#boxGradient)" rx="5" filter="url(#shadow)"/>
    <text x="85" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e8449">PropBank</text>
    <text x="85" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#145a32">Arg0 = Agent</text>
    <text x="85" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#145a32">Arg1 = Patient</text>
    
    <!-- FrameNet Box -->
    <rect x="155" y="185" width="120" height="55" fill="url(#boxGradient)" rx="5" filter="url(#shadow)"/>
    <text x="215" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e8449">FrameNet</text>
    <text x="215" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#145a32">Event-centric frames</text>
    <text x="215" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#145a32">e.g., Commercial_transaction</text>
  </g>
  
  <!-- Architecture Section -->
  <g class="section3" data-narration="Modern SRL uses Bi-LSTM-CRF or BERT-based architectures for predicate-argument extraction">
    <text x="30" y="260" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Architecture Types:</text>
    
    <!-- Bi-LSTM-CRF Box -->
    <rect x="25" y="270" width="175" height="45" fill="#fdebd0" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="112" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d35400">Bi-LSTM-CRF</text>
    <text x="112" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a04000">Context encoding + Structured prediction</text>
    
    <!-- BERT Box -->
    <rect x="210" y="270" width="175" height="45" fill="#e8daef" stroke="#9b59b6" stroke-width="1" rx="5"/>
    <text x="297" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7d3c98">BERT-based SRL</text>
    <text x="297" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6c3483">Fine-tuned with role-specific heads</text>
  </g>
  
  <!-- Applications & Transfer Section -->
  <g class="section4" data-narration="Cross-lingual transfer enables zero-shot SRL for low-resource languages using multilingual models">
    <text x="30" y="335" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Applications:</text>
    
    <!-- Applications Box -->
    <rect x="25" y="348" width="130" height="40" fill="#d6eaf8" stroke="#3498db" stroke-width="1" rx="5"/>
    <text x="90" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a5276">Machine Translation</text>
    <text x="90" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a5276">Question Answering</text>
    
    <!-- Cross-lingual Box -->
    <rect x="165" y="348" width="145" height="40" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" rx="5"/>
    <text x="237" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#922b21">Cross-lingual Transfer</text>
    <text x="237" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#922b21">Zero-shot with mBERT</text>
    
    <!-- Arrow connector -->
    <path d="M160 368 L165 368" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  </g>
  
  <!-- Legend / Note at bottom -->
  <g class="title" style="animation-delay: 1.2s">
    <rect x="25" y="390" width="370" height="3" fill="#bdc3c7" rx="1"/>
    <text x="210" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" font-style="italic">SRL bridges syntax → semantics for deep language understanding</text>
  </g>
</svg>