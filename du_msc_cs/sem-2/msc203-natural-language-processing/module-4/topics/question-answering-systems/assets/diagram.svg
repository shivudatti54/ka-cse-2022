<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="question-answering-systems" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2daf0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd6b8"/>
      <stop offset="100%" style="stop-color:#6bc496"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5c9"/>
      <stop offset="100%" style="stop-color:#b87fa8"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c987"/>
      <stop offset="100%" style="stop-color:#e0a854"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#333" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 30; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c4a6e; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #f0f0f0; }
    .box { filter: url(#shadow); }
    .arrow-line {
      stroke: #666;
      stroke-width: 2;
      stroke-dasharray: 5, 5;
      animation: flowRight 1s linear infinite;
    }
    .section { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .section1 { animation-delay: 0.1s; }
    .section2 { animation-delay: 0.2s; }
    .section3 { animation-delay: 0.3s; }
    .section4 { animation-delay: 0.4s; }
    .section5 { animation-delay: 0.5s; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .title-anim { animation: slideIn 0.6s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Question Answering Systems</text>
  
  <!-- Section 1: Question Input -->
  <g class="section section1" data-narration="User inputs a natural language question into the QA system">
    <rect x="20" y="55" width="100" height="50" rx="8" fill="url(#boxGradient1)" class="box"/>
    <text x="70" y="75" text-anchor="middle" class="label">Question</text>
    <text x="70" y="90" text-anchor="middle" class="detail">User Query</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="125" y1="80" x2="155" y2="80" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Section 2: Question Processing -->
  <g class="section section2" data-narration="Question is parsed using NER and dependency parsing to extract entities and intent">
    <rect x="160" y="55" width="110" height="50" rx="8" fill="url(#boxGradient2)" class="box"/>
    <text x="215" y="75" text-anchor="middle" class="label">Processing</text>
    <text x="215" y="90" text-anchor="middle" class="detail">NER, Dep. Parse</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="275" y1="80" x2="305" y2="80" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Section 3: Document Retrieval -->
  <g class="section section3" data-narration="Retrieval component searches document store using TF-IDF or dense vectors">
    <rect x="310" y="55" width="100" height="50" rx="8" fill="url(#boxGradient3)" class="box"/>
    <text x="360" y="75" text-anchor="middle" class="label">Retriever</text>
    <text x="360" y="90" text-anchor="middle" class="detail">BM25/DPR</text>
  </g>
  
  <!-- Arrow 3 - down -->
  <line x1="410" y1="105" x2="410" y2="150" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Section 4: Neural Ranking -->
  <g class="section section4" data-narration="Neural ranker re-ranks retrieved documents for relevance using BERT">
    <rect x="320" y="155" width="100" height="50" rx="8" fill="url(#boxGradient4)" class="box pulse-anim"/>
    <text x="370" y="175" text-anchor="middle" class="label">Neural Ranker</text>
    <text x="370" y="190" text-anchor="middle" class="detail">BERT Re-rank</text>
  </g>
  
  <!-- Arrow 4 - left and down -->
  <line x1="315" y1="180" x2="280" y2="180" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Section 5: Answer Generation -->
  <g class="section section5" data-narration="Reader/Generator extracts or synthesizes the final answer from top documents">
    <rect x="150" y="155" width="120" height="50" rx="8" fill="url(#boxGradient1)" class="box"/>
    <text x="210" y="175" text-anchor="middle" class="label">Answer Generator</text>
    <text x="210" y="190" text-anchor="middle" class="detail">BERT/T5/GPT</text>
  </g>
  
  <!-- Arrow 5 - left -->
  <line x1="145" y1="180" x2="115" y2="180" class="arrow-line" marker-end="url(#arrowhead)"/>
  
  <!-- Section 6: Final Answer Output -->
  <g class="section section1" data-narration="Final answer is presented to the user">
    <rect x="20" y="155" width="90" height="50" rx="8" fill="url(#boxGradient2)" class="box"/>
    <text x="65" y="175" text-anchor="middle" class="label">Answer</text>
    <text x="65" y="190" text-anchor="middle" class="detail">Response</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section section2">
    <rect x="20" y="230" width="180" height="80" rx="6" fill="#fff" stroke="#888" stroke-width="1" opacity="0.9"/>
    <text x="30" y="250" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Key Concepts:</text>
    <text x="30" y="265" font-family="Arial" font-size="10" fill="#555">• Open vs Closed Domain</text>
    <text x="30" y="278" font-family="Arial" font-size="10" fill="#555">• Retrieval vs Generative</text>
    <text x="30" y="291" font-family="Arial" font-size="10" fill="#555">• Transformer Architecture</text>
    <text x="30" y="304" font-family="Arial" font-size="10" fill="#555">• Pipeline: Process→Retrieve→Rank→Answer</text>
  </g>
  
  <!-- Models Box -->
  <g class="section section3">
    <rect x="210" y="230" width="190" height="80" rx="6" fill="#fff" stroke="#888" stroke-width="1" opacity="0.9"/>
    <text x="220" y="250" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Popular Models:</text>
    <text x="220" y="265" font-family="Arial" font-size="10" fill="#555">• BERT - Span extraction</text>
    <text x="220" y="278" font-family="Arial" font-size="10" fill="#555">• T5 - Sequence-to-sequence</text>
    <text x="220" y="291" font-family="Arial" font-size="10" fill="#555">• GPT-3 - Generative QA</text>
    <text x="220" y="304" font-family="Arial" font-size="10" fill="#555">• DPR - Dense passage retrieval</text>
  </g>
  
  <!-- Applications Box -->
  <g class="section section4">
    <rect x="20" y="320" width="180" height="65" rx="6" fill="#fff" stroke="#888" stroke-width="1" opacity="0.9"/>
    <text x="30" y="340" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Applications:</text>
    <text x="30" y="355" font-family="Arial" font-size="10" fill="#555">• Virtual Assistants (Siri, Alexa)</text>
    <text x="30" y="368" font-family="Arial" font-size="10" fill="#555">• Customer Support Automation</text>
    <text x="30" y="381" font-family="Arial" font-size="10" fill="#555">• Medical Diagnosis Systems</text>
  </g>
  
  <!-- Benchmarks Box -->
  <g class="section section5">
    <rect x="210" y="320" width="190" height="65" rx="6" fill="#fff" stroke="#888" stroke-width="1" opacity="0.9"/>
    <text x="220" y="340" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Benchmarks:</text>
    <text x="220" y="355" font-family="Arial" font-size="10" fill="#555">• SQuAD - Reading comprehension</text>
    <text x="220" y="368" font-family="Arial" font-size="10" fill="#555">• HotpotQA - Multi-hop reasoning</text>
    <text x="220" y="381" font-family="Arial" font-size="10" fill="#555">• Natural Questions - Open-domain</text>
  </g>
  
  <!-- Flow indicator arrow at bottom -->
  <path d="M 70 130 Q 70 140 70 145" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
</svg>