<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="sentiment-analysis">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6f5"/>
      <stop offset="100%" style="stop-color:#e6f5e8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3b6"/>
      <stop offset="100%" style="stop-color:#ffaaa5"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5ff"/>
      <stop offset="100%" style="stop-color:#b388ff"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b5ead7"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #34495e; font-weight: 600; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box-title { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .box-text { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #fff; }
    .pipeline-box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .concept-box { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .arrow { animation: arrowPulse 1.5s ease-in-out infinite; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title title-anim">Sentiment Analysis Pipeline</text>
  
  <!-- Pipeline Section -->
  <g data-narration="The pipeline shows the end-to-end workflow from raw text input to polarity output">
    <!-- Text Input -->
    <g class="pipeline-box" style="animation-delay: 0.1s;">
      <rect x="15" y="60" width="70" height="45" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
      <text x="50" y="78" text-anchor="middle" class="box-title">Text Input</text>
      <text x="50" y="92" text-anchor="middle" class="box-text">"Great product!"</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M85 82 L110 82" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
    
    <!-- Preprocessing -->
    <g class="pipeline-box" style="animation-delay: 0.3s;">
      <rect x="110" y="60" width="70" height="45" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
      <text x="145" y="78" text-anchor="middle" class="box-title">Preprocessing</text>
      <text x="145" y="92" text-anchor="middle" class="box-text">Tokenize, clean</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M180 82 L205 82" stroke="#7f8c8d" stroke-width="2" fill="none" class="arrow"/>
    
    <!-- Feature Extraction -->
    <g class="pipeline-box" style="animation-delay: 0.5s;">
      <rect x="205" y="60" width="85" height="45" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
      <text x="247" y="78" text-anchor="middle" class="box-title">Feature Extraction</text>
      <text x="247" y="92" text-anchor="middle" class="box-text">TF-IDF, Embeddings</text>
    </g>
    
    <!-- Arrow 3 -->
    <path d="M290 82 L315 82" stroke="#7f8c8d" stroke-width="2" fill="none" class="arrow"/>
    
    <!-- Classification -->
    <g class="pipeline-box" style="animation-delay: 0.7s;">
      <rect x="315" y="60" width="80" height="45" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
      <text x="355" y="78" text-anchor="middle" class="box-title">Classification</text>
      <text x="355" y="92" text-anchor="middle" class="box-text">ML/Transformer</text>
    </g>
    
    <!-- Arrow 4 -->
    <path d="M395 82 L405 82" stroke="#7f8c8d" stroke-width="2" fill="none" class="arrow"/>
    
    <!-- Polarity Output -->
    <g class="pipeline-box" style="animation-delay: 0.9s;">
      <rect x="400" y="72" width="15" height="20" rx="3" fill="#27ae60" class="pulse-anim"/>
      <text x="407" y="95" text-anchor="middle" class="detail" font-weight="bold">+</text>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Lexicon-based approaches use sentiment dictionaries with polarity scores">
    <!-- Concept Box 1: Lexicon-Based -->
    <g class="concept-box" style="animation-delay: 0.4s;">
      <rect x="20" y="130" width="115" height="55" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
      <text x="77" y="148" text-anchor="middle" class="label" font-size="12">Lexicon-Based</text>
      <text x="77" y="163" text-anchor="middle" class="detail">AFINN, SentiWordNet</text>
      <text x="77" y="176" text-anchor="middle" class="detail">Polarity scores</text>
    </g>
  </g>
  
  <g data-narration="Machine learning models like SVM and BiLSTM capture contextual patterns">
    <!-- Concept Box 2: Machine Learning -->
    <g class="concept-box" style="animation-delay: 0.6s;">
      <rect x="145" y="130" width="115" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
      <text x="202" y="148" text-anchor="middle" class="label" font-size="12">Machine Learning</text>
      <text x="202" y="163" text-anchor="middle" class="detail">SVM + TF-IDF</text>
      <text x="202" y="176" text-anchor="middle" class="detail">BiLSTM + Attention</text>
    </g>
  </g>
  
  <g data-narration="Transformer architectures like BERT capture deep contextual semantics">
    <!-- Concept Box 3: Transformers -->
    <g class="concept-box" style="animation-delay: 0.8s;">
      <rect x="270" y="130" width="115" height="55" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
      <text x="327" y="148" text-anchor="middle" class="label" font-size="12">Transformers</text>
      <text x="327" y="163" text-anchor="middle" class="detail">BERT, RoBERTa</text>
      <text x="327" y="176" text-anchor="middle" class="detail">Context semantics</text>
    </g>
  </g>
  
  <g data-narration="Aspect-based analysis targets specific entities within text">
    <!-- Concept Box 4: Aspect-Based -->
    <g class="concept-box" style="animation-delay: 1.0s;">
      <rect x="20" y="200" width="115" height="55" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)"/>
      <text x="77" y="218" text-anchor="middle" class="label" font-size="12">Aspect-Based</text>
      <text x="77" y="233" text-anchor="middle" class="detail">Entity targeting</text>
      <text x="77" y="246" text-anchor="middle" class="detail">"Battery: poor"</text>
    </g>
  </g>
  
  <g data-narration="Multilingual challenges include code-switching and low-resource languages">
    <!-- Concept Box 5: Multilingual -->
    <g class="concept-box" style="animation-delay: 1.2s;">
      <rect x="145" y="200" width="115" height="55" rx="6" fill="#fad390" filter="url(#shadow)"/>
      <text x="202" y="218" text-anchor="middle" class="label" font-size="12">Multilingual</text>
      <text x="202" y="233" text-anchor="middle" class="detail">Code-switching</text>
      <text x="202" y="246" text-anchor="middle" class="detail">mBERT, Hinglish</text>
    </g>
  </g>
  
  <!-- Example Flow -->
  <g data-narration="Example: Rule-based classification splits text into clauses and checks sentiment lexicon">
    <rect x="270" y="200" width="115" height="55" rx="6" fill="#f8b500" filter="url(#shadow)"/>
    <text x="327" y="218" text-anchor="middle" class="label" font-size="12">Example Flow</text>
    <text x="327" y="233" text-anchor="middle" class="detail">"gripping" (+2)</text>
    <text x="327" y="246" text-anchor="middle" class="detail">"dragged" (-1.5)</text>
  </g>
  
  <!-- Bottom Section: Applications -->
  <g data-narration="Real-world applications include social media monitoring, e-commerce reviews, and multimodal analysis">
    <text x="210" y="285" text-anchor="middle" class="label" font-size="14">Real-World Applications</text>
    
    <!-- Application icons/text -->
    <g class="concept-box" style="animation-delay: 1.4s;">
      <rect x="30" y="300" width="110" height="35" rx="5" fill="#85c1e9" opacity="0.9"/>
      <text x="85" y="318" text-anchor="middle" class="box-text" font-size="11">Social Media</text>
      <text x="85" y="330" text-anchor="middle" class="box-text" font-size="9">Twitter/X Crisis Detection</text>
    </g>
    
    <g class="concept-box" style="animation-delay: 1.6s;">
      <rect x="150" y="300" width="110" height="35" rx="5" fill="#f5b7b1" opacity="0.9"/>
      <text x="205" y="318" text-anchor="middle" class="box-text" font-size="11">E-Commerce</text>
      <text x="205" y="330" text-anchor="middle" class="box-text" font-size="9">Amazon Reviews</text>
    </g>
    
    <g class="concept-box" style="animation-delay: 1.8s;">
      <rect x="270" y="300" width="110" height="35" rx="5" fill="#a9dfbf" opacity="0.9"/>
      <text x="325" y="318" text-anchor="middle" class="box-text" font-size="11">Multimodal</text>
      <text x="325" y="330" text-anchor="middle" class="box-text" font-size="9">Text + Visual + Audio</text>
    </g>
  </g>
  
  <!-- Polarity indicators -->
  <g data-narration="Output polarity can be positive, negative, or neutral">
    <rect x="30" y="350" width="70" height="30" rx="5" fill="#27ae60" opacity="0.8"/>
    <text x="65" y="368" text-anchor="middle" class="box-text">Positive</text>
    
    <rect x="110" y="350" width="70" height="30" rx="5" fill="#95a5a6" opacity="0.8"/>
    <text x="145" y="368" text-anchor="middle" class="box-text">Neutral</text>
    
    <rect x="190" y="350" width="70" height="30" rx="5" fill="#e74c3c" opacity="0.8"/>
    <text x="225" y="368" text-anchor="middle" class="box-text">Negative</text>
    
    <!-- Sentiment score -->
    <rect x="270" y="350" width="110" height="30" rx="5" fill="#3498db" opacity="0.8"/>
    <text x="325" y="368" text-anchor="middle" class="box-text">Score: +3 (AFINN)</text>
  </g>
</svg>