<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="text-summarization-generation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="50%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#E0F2F1"/>
    </linearGradient>
    <linearGradient id="encoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BBDEFB"/>
      <stop offset="100%" style="stop-color:#90CAF9"/>
    </linearGradient>
    <linearGradient id="decoderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CE93D8"/>
      <stop offset="100%" style="stop-color:#AB47BC"/>
    </linearGradient>
    <linearGradient id="attentionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#81D4FA"/>
      <stop offset="100%" style="stop-color:#4FC3F7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes textGlow {
      0%, 100% { filter: drop-shadow(0 0 2px #5C6BC0); }
      50% { filter: drop-shadow(0 0 8px #7E57C2); }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: 'Segoe UI', Arial, sans-serif; }
    .encoder-box { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .decoder-box { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .arrow { animation: flow 1s linear infinite; stroke-dasharray: 5,5; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .glow-text { animation: textGlow 3s ease-in-out infinite; }
    
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.3s; }
    .section-3 { animation-delay: 0.5s; }
    .section-4 { animation-delay: 0.7s; }
    .section-5 { animation-delay: 0.9s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title glow-text" font-size="18" font-weight="bold" fill="#37474F" font-family="Segoe UI, Arial">
    Text Summarization Generation
  </text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Input Text Box -->
  <g class="encoder-box section-1">
    <rect x="20" y="60" width="80" height="50" rx="6" fill="#FFF8E1" stroke="#FFB74D" stroke-width="2" filter="url(#shadow)"/>
    <text x="60" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#5D4037" font-family="Segoe UI">INPUT</text>
    <text x="60" y="95" text-anchor="middle" font-size="8" fill="#5D4037" font-family="Segoe UI">Original Text</text>
  </g>
  
  <!-- Encoder Stack -->
  <g class="encoder-box section-2">
    <rect x="110" y="55" width="70" height="130" rx="8" fill="url(#encoderGrad)" stroke="#42A5F5" stroke-width="2" filter="url(#shadow)"/>
    <text x="145" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0" font-family="Segoe UI">ENCODER</text>
    <text x="145" y="88" text-anchor="middle" font-size="9" fill="#1565C0" font-family="Segoe UI">Multi-Head</text>
    <text x="145" y="100" text-anchor="middle" font-size="9" fill="#1565C0" font-family="Segoe UI">Attention</text>
    <rect x="118" y="110" width="54" height="12" rx="3" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
    <text x="145" y="119" text-anchor="middle" font-size="7" fill="#1976D2" font-family="Segoe UI">+ FFN</text>
    <rect x="118" y="128" width="54" height="12" rx="3" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
    <text x="145" y="137" text-anchor="middle" font-size="7" fill="#1976D2" font-family="Segoe UI">+ FFN</text>
  </g>
  
  <!-- Arrow from Input to Encoder -->
  <path d="M100 85 L110 85" stroke="#FFB74D" stroke-width="2" class="arrow"/>
  
  <!-- Cross-Attention Connections -->
  <g class="pulse-element">
    <path d="M180 100 Q 220 85, 220 120" stroke="url(#attentionGrad)" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
    <path d="M180 140 Q 220 155, 220 120" stroke="url(#attentionGrad)" stroke-width="2" fill="none" class="arrow"/>
  </g>
  
  <!-- Decoder Stack -->
  <g class="decoder-box section-3">
    <rect x="270" y="55" width="70" height="130" rx="8" fill="url(#decoderGrad)" stroke="#AB47BC" stroke-width="2" filter="url(#shadow)"/>
    <text x="305" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A148C" font-family="Segoe UI">DECODER</text>
    <text x="305" y="88" text-anchor="middle" font-size="9" fill="#4A148C" font-family="Segoe UI">Masked</text>
    <text x="305" y="100" text-anchor="middle" font-size="9" fill="#4A148C" font-family="Segoe UI">Self-Attention</text>
    <rect x="278" y="110" width="54" height="12" rx="3" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
    <text x="305" y="119" text-anchor="middle" font-size="7" fill="#6A1B9A" font-family="Segoe UI">+ Cross-Attn</text>
    <rect x="278" y="128" width="54" height="12" rx="3" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
    <text x="305" y="137" text-anchor="middle" font-size="7" fill="#6A1B9A" font-family="Segoe UI">+ FFN</text>
  </g>
  
  <!-- Output Text Box -->
  <g class="decoder-box section-4">
    <rect x="350" y="60" width="60" height="50" rx="6" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2" filter="url(#shadow)"/>
    <text x="380" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="Segoe UI">OUTPUT</text>
    <text x="380" y="95" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="Segoe UI">Summary</text>
  </g>
  
  <!-- Arrow from Decoder to Output -->
  <path d="M340 85 L350 85" stroke="#66BB6A" stroke-width="2" class="arrow"/>
  
  <!-- Encoder-Decoder Connection -->
  <path d="M180 120 L220 120 L220 140 L270 140" stroke="#7986CB" stroke-width="2" fill="none" stroke-dasharray="4,2" class="arrow"/>
  
  <!-- Key Concepts Section -->
  <g class="concept-box section-5">
    <rect x="20" y="200" width="180" height="80" rx="8" fill="white" stroke="#B0BEC5" stroke-width="1" filter="url(#shadow)"/>
    <text x="110" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#455A64" font-family="Segoe UI">Methods</text>
    <rect x="30" y="228" width="75" height="22" rx="4" fill="#E8F5E9" stroke="#81C784"/>
    <text x="67" y="242" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="Segoe UI">Extractive</text>
    <rect x="115" y="228" width="75" height="22" rx="4" fill="#E3F2FD" stroke="#64B5F6"/>
    <text x="152" y="242" text-anchor="middle" font-size="9" fill="#1565C0" font-family="Segoe UI">Abstractive</text>
    <rect x="30" y="255" width="75" height="18" rx="4" fill="#FFF8E1" stroke="#FFB74D"/>
    <text x="67" y="267" text-anchor="middle" font-size="8" fill="#5D4037" font-family="Segoe UI">TextRank</text>
    <rect x="115" y="255" width="75" height="18" rx="4" fill="#F3E5F5" stroke="#CE93D8"/>
    <text x="152" y="267" text-anchor="middle" font-size="8" fill="#6A1B9A" font-family="Segoe UI">BART/PEGASUS</text>
  </g>
  
  <!-- Evaluation Metrics -->
  <g class="concept-box section-5">
    <rect x="210" y="200" width="100" height="45" rx="8" fill="white" stroke="#B0BEC5" stroke-width="1" filter="url(#shadow)"/>
    <text x="260" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#455A64" font-family="Segoe UI">Evaluation</text>
    <text x="260" y="235" text-anchor="middle" font-size="9" fill="#546E7A" font-family="Segoe UI">ROUGE</text>
    <text x="260" y="247" text-anchor="middle" font-size="9" fill="#546E7A" font-family="Segoe UI">BERTScore</text>
  </g>
  
  <!-- Sampling Techniques -->
  <g class="concept-box section-5">
    <rect x="320" y="200" width="80" height="45" rx="8" fill="white" stroke="#B0BEC5" stroke-width="1" filter="url(#shadow)"/>
    <text x="360" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#455A64" font-family="Segoe UI">Sampling</text>
    <text x="360" y="235" text-anchor="middle" font-size="8" fill="#546E7A" font-family="Segoe UI">Top-k</text>
    <text x="360" y="247" text-anchor="middle" font-size="8" fill="#546E7A" font-family="Segoe UI">Nucleus (top-p)</text>
  </g>
  
  <!-- Bottom Labels -->
  <g class="concept-box section-5">
    <rect x="20" y="290" width="380" height="45" rx="8" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="1"/>
    <text x="210" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#37474F" font-family="Segoe UI">Sequence-to-Sequence with Attention</text>
    <text x="210" y="326" text-anchor="middle" font-size="9" fill="#546E7A" font-family="Segoe UI">Transformer: Encoder processes input → Decoder generates output</text>
  </g>
  
  <!-- Data Flow Animation Indicators -->
  <g>
    <circle cx="60" cy="140" r="5" fill="#FFB74D">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="145" cy="170" r="5" fill="#42A5F5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="305" cy="170" r="5" fill="#AB47BC">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="380" cy="140" r="5" fill="#66BB6A">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>
  
  <!-- Legend for Attention -->
  <g class="concept-box section-5">
    <rect x="20" y="345" width="180" height="30" rx="6" fill="#E1F5FE" stroke="#81D4FA" stroke-width="1"/>
    <text x="110" y="362" text-anchor="middle" font-size="9" fill="#0277BD" font-family="Segoe UI">Cross-Attention: Links Encoder to Decoder</text>
    <text x="110" y="374" text-anchor="middle" font-size="8" fill="#01579B" font-family="Segoe UI">Self-Attention: Captures dependencies within sequence</text>
  </g>
  
  <!-- Model Size Info -->
  <g class="concept-box section-5">
    <rect x="210" y="345" width="100" height="30" rx="6" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1"/>
    <text x="260" y="362" text-anchor="middle" font-size="9" fill="#AD1457" font-family="Segoe UI">Ethical AI</text>
    <text x="260" y="374" text-anchor="middle" font-size="8" fill="#C2185B" font-family="Segoe UI">Bias & Hallucination</text>
  </g>
  
  <g class="concept-box section-5">
    <rect x="320" y="345" width="80" height="30" rx="6" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1"/>
    <text x="360" y="360" text-anchor="middle" font-size="9" fill="#E65100" font-family="Segoe UI">Temperature</text>
    <text x="360" y="372" text-anchor="middle" font-size="8" fill="#EF6C00" font-family="Segoe UI">Diversity Control</text>
  </g>
  
  <!-- Data Narration Attributes -->
  <title data-narration="Input text enters the encoder stack for processing"></title>
  <title data-narration="Encoder uses multi-head self-attention to understand context"></title>
  <title data-narration="Cross-attention connects encoder states to decoder"></title>
  <title data-narration="Decoder generates summary token by token"></title>
  <title data-narration="Extractive vs abstractive methods for summarization"></title>
  <title data-narration="ROUGE and BERTScore evaluate summary quality"></title>
</svg>