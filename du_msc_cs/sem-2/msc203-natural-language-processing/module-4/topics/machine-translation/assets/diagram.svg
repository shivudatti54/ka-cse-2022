<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="machine-translation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8e4f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8bb8d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8b8d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a888c8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d8c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88b898;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#666" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { stroke-opacity: 0.4; }
      50% { stroke-opacity: 0.9; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .box3 { animation: slideUp 0.6s ease-out 0.6s both; }
    .attention-line { animation: pulse 2s ease-in-out infinite; }
    .label { animation: fadeIn 0.5s ease-out 0.8s both; }
    .arrow { animation: slideIn 0.4s ease-out 1s both; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c4a6e" class="title">Machine Translation</text>
  <line x1="100" y1="48" x2="320" y2="48" stroke="#6a9bc3" stroke-width="2" class="title"/>
  
  <!-- Box 1: SMT -->
  <g class="box1" data-narration="Statistical Machine Translation uses the noisy-channel model to translate text by finding the most likely target sentence given the source.">
    <rect x="20" y="70" width="115" height="90" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="77" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a3a5c">SMT</text>
    <text x="77" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c4a6e">Statistical MT</text>
    <text x="77" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a5a7c">Phrase-based</text>
    <text x="77" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a5a7c">P(t|s) ∝ P(s|t)P(t)</text>
    <text x="77" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a6a8c">Noisy Channel</text>
  </g>
  
  <!-- Box 2: NMT -->
  <g class="box2" data-narration="Neural Machine Translation uses sequence-to-sequence models with attention mechanisms to capture long-range dependencies and produce fluent translations.">
    <rect x="150" y="70" width="115" height="90" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="207" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3a2a5c">NMT</text>
    <text x="207" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a3a6c">Neural MT</text>
    <text x="207" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a4a7c">Seq2Seq + Attention</text>
    <text x="207" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a4a7c">Transformer</text>
    <text x="207" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a5a8c">Subword (BPE)</text>
  </g>
  
  <!-- Arrow between SMT and NMT -->
  <g class="arrow">
    <line x1="135" y1="115" x2="150" y2="115" stroke="#5a7a9a" stroke-width="2"/>
    <polygon points="147,112 147,118 153,115" fill="#5a7a9a"/>
  </g>
  
  <!-- Box 3: Evaluation Metrics -->
  <g class="box3" data-narration="Machine Translation is evaluated using metrics like BLEU (n-gram precision), TER (edit distance), and METEOR (incorporates synonyms).">
    <rect x="280" y="70" width="120" height="90" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="340" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a4a3c">Evaluation</text>
    <text x="340" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a5a4c">Metrics</text>
    <text x="340" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a6a5c">BLEU - Precision</text>
    <text x="340" y="142" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a6a5c">TER - Edit Distance</text>
    <text x="340" y="156" text-anchor="middle" font-family="Arial" font-size="9" fill="#3a6a5c">METEOR - Synonyms</text>
  </g>
  
  <!-- Attention Visualization Section -->
  <g class="box3" data-narration="The attention mechanism visualizes alignment between source and target words, showing which source words contribute to each translated word.">
    <rect x="20" y="180" width="380" height="140" rx="10" fill="#f5f5f5" stroke="#c8d8e8" stroke-width="2"/>
    <text x="210" y="200" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c4a6e">Attention Visualization</text>
    
    <!-- Source words -->
    <text x="50" y="225" font-family="Arial" font-size="11" fill="#2c4a6e">Source:</text>
    <rect x="95" y="212" width="35" height="22" rx="4" fill="#b8d4e8" stroke="#6a9bc3" stroke-width="1"/>
    <text x="112" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a5c">The</text>
    <rect x="133" y="212" width="40" height="22" rx="4" fill="#b8d4e8" stroke="#6a9bc3" stroke-width="1"/>
    <text x="153" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a5c">cat</text>
    <rect x="176" y="212" width="35" height="22" rx="4" fill="#b8d4e8" stroke="#6a9bc3" stroke-width="1"/>
    <text x="193" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a5c">sat</text>
    <rect x="214" y="212" width="35" height="22" rx="4" fill="#b8d4e8" stroke="#6a9bc3" stroke-width="1"/>
    <text x="231" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a5c">on</text>
    <rect x="252" y="212" width="45" height="22" rx="4" fill="#b8d4e8" stroke="#6a9bc3" stroke-width="1"/>
    <text x="274" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a5c">mat</text>
    <rect x="300" y="212" width="25" height="22" rx="4" fill="#b8d4e8" stroke="#6a9bc3" stroke-width="1"/>
    <text x="312" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a5c">.</text>
    
    <!-- Target words -->
    <text x="50" y="275" font-family="Arial" font-size="11" fill="#2c4a6e">Target:</text>
    <rect x="95" y="262" width="40" height="22" rx="4" fill="#c8b8d8" stroke="#a888c8" stroke-width="1"/>
    <text x="115" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a2a5c">La</text>
    <rect x="138" y="262" width="40" height="22" rx="4" fill="#c8b8d8" stroke="#a888c8" stroke-width="1"/>
    <text x="158" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a2a5c">chat</text>
    <rect x="181" y="262" width="40" height="22" rx="4" fill="#c8b8d8" stroke="#a888c8" stroke-width="1"/>
    <text x="201" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a2a5c">s'est</text>
    <rect x="224" y="262" width="35" height="22" rx="4" fill="#c8b8d8" stroke="#a888c8" stroke-width="1"/>
    <text x="241" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a2a5c">assis</text>
    <rect x="262" y="262" width="30" height="22" rx="4" fill="#c8b8d8" stroke="#a888c8" stroke-width="1"/>
    <text x="277" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a2a5c">sur</text>
    <rect x="295" y="262" width="45" height="22" rx="4" fill="#c8b8d8" stroke="#a888c8" stroke-width="1"/>
    <text x="317" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a2a5c">tapis</text>
    <rect x="343" y="262" width="25" height="22" rx="4" fill="#c8b8d8" stroke="#a888c8" stroke-width="1"/>
    <text x="355" y="278" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a2a5c">.</text>
    
    <!-- Attention lines -->
    <g class="attention-line" stroke="#a888c8" stroke-width="1.5" fill="none">
      <line x1="112" y1="238" x2="115" y2="258" opacity="0.7"/>
      <line x1="112" y1="238" x2="158" y2="258" opacity="0.3"/>
      <line x1="112" y1="238" x2="201" y2="258" opacity="0.2"/>
      <line x1="153" y1="238" x2="158" y2="258" opacity="0.8"/>
      <line x1="153" y1="238" x2="201" y2="258" opacity="0.3"/>
      <line x1="193" y1="238" x2="241" y2="258" opacity="0.7"/>
      <line x1="193" y1="238" x2="277" y2="258" opacity="0.5"/>
      <line x1="231" y1="238" x2="277" y2="258" opacity="0.8"/>
      <line x1="274" y1="238" x2="317" y2="258" opacity="0.9"/>
    </g>
    
    <!-- Attention weights labels -->
    <text x="330" y="300" font-family="Arial" font-size="8" fill="#6a5a7c">Line thickness =</text>
    <text x="330" y="312" font-family="Arial" font-size="8" fill="#6a5a7c">Attention weight</text>
  </g>
  
  <!-- Key Insights -->
  <g class="label" data-narration="Modern MT has evolved from rule-based to statistical to neural approaches, with transformers achieving near-human performance in some domains.">
    <rect x="20" y="335" width="380" height="50" rx="8" fill="#fff8e8" stroke="#e8d8a8" stroke-width="1"/>
    <text x="210" y="355" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a5a3c">Key Insight</text>
    <text x="210" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a4a2c">Transformers &amp; attention have revolutionized MT, enabling zero-shot translation</text>
    <text x="210" y="382" text-anchor="middle" font-family="Arial" font-size="9" fill="#7a6a5c">for low-resource languages like Hindi, Tamil, and Bengali</text>
  </g>
  
  <!-- Flow indicators -->
  <g class="arrow">
    <circle cx="77" cy="175" r="5" fill="#6a9bc3"/>
    <text x="77" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a6a8c">Evolution</text>
  </g>
</svg>