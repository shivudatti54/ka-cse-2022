<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="tcp-congestion-control-variants">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tahoeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7" />
      <stop offset="100%" style="stop-color:#fdcb6e" />
    </linearGradient>
    <linearGradient id="renoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec" />
      <stop offset="100%" style="stop-color:#00cec9" />
    </linearGradient>
    <linearGradient id="newrenoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe" />
      <stop offset="100%" style="stop-color:#6c5ce7" />
    </linearGradient>
    <linearGradient id="vegasGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fab1a0" />
      <stop offset="100%" style="stop-color:#e17055" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box-tahoe { animation: slideInLeft 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .box-reno { animation: slideInRight 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .box-newreno { animation: slideInLeft 0.6s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    .box-vegas { animation: slideInRight 0.6s ease-out forwards; animation-delay: 0.8s; opacity: 0; }
    .curve-section { animation: slideInUp 0.7s ease-out forwards; animation-delay: 1s; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.2s; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .curve-path { stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawLine 2s ease-out forwards; animation-delay: 1.5s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3436" class="title">TCP Congestion Control</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#636e72" class="title">Variants Overview</text>
  
  <!-- TCP Tahoe Box -->
  <g class="box-tahoe" data-narration="TCP Tahoe - Original congestion control using AIMD strategy">
    <rect x="20" y="70" width="90" height="75" rx="8" fill="url(#tahoeGrad)" filter="url(#shadow)"/>
    <text x="65" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2d3436">TCP Tahoe</text>
    <text x="65" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3436">Original AIMD</text>
    <text x="65" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#636e72">cwnd +1/RTT</text>
    <text x="65" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#636e72">half on loss</text>
  </g>
  
  <!-- Arrow from Tahoe to Reno -->
  <g class="arrow">
    <path d="M115 107 L155 107" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="155,107 148,103 148,111" fill="#636e72"/>
  </g>
  
  <!-- TCP Reno Box -->
  <g class="box-reno" data-narration="TCP Reno - Adds fast retransmit for quick loss recovery">
    <rect x="160" y="70" width="90" height="75" rx="8" fill="url(#renoGrad)" filter="url(#shadow)"/>
    <text x="205" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">TCP Reno</text>
    <text x="205" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Fast Retransmit</text>
    <text x="205" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#dfe6e9">Quick recovery</text>
    <text x="205" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#dfe6e9">+ aggressive</text>
  </g>
  
  <!-- Arrow from Reno to NewReno -->
  <g class="arrow">
    <path d="M255 107 L295 107" stroke="#636e72" stroke-width="2" fill="none"/>
    <polygon points="295,107 288,103 288,111" fill="#636e72"/>
  </g>
  
  <!-- TCP NewReno Box -->
  <g class="box-newreno" data-narration="TCP NewReno - Handles multiple packet losses in one window">
    <rect x="300" y="70" width="100" height="75" rx="8" fill="url(#newrenoGrad)" filter="url(#shadow)"/>
    <text x="350" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">TCP NewReno</text>
    <text x="350" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Multi-loss handling</text>
    <text x="350" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#dfe6e9">Partial ACK</text>
    <text x="350" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#dfe6e9">recovery</text>
  </g>
  
  <!-- TCP Vegas Box -->
  <g class="box-vegas" data-narration="TCP Vegas - Delay-based congestion detection">
    <rect x="160" y="160" width="100" height="75" rx="8" fill="url(#vegasGrad)" filter="url(#shadow)"/>
    <text x="210" y="180" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">TCP Vegas</text>
    <text x="210" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Delay-based</text>
    <text x="210" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#dfe6e9">RTT monitoring</text>
    <text x="210" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#dfe6e9">Early detection</text>
  </g>
  
  <!-- Evolution Arrow -->
  <g class="arrow">
    <path d="M210 150 L210 155" stroke="#636e72" stroke-width="2" fill="none"/>
    <polygon points="210,155 206,148 214,148" fill="#636e72"/>
    <text x="225" y="175" font-family="Arial" font-size="9" fill="#636e72">Evolution</text>
    <text x="225" y="187" font-family="Arial" font-size="9" fill="#636e72">of variants</text>
  </g>
  
  <!-- CUBIC Window Growth Curve Section -->
  <g class="curve-section" data-narration="CUBIC Window Growth - Cubic function with concave and convex phases">
    <rect x="20" y="255" width="380" height="130" rx="8" fill="#fff" stroke="#b2bec3" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="275" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2d3436">CUBIC Window Growth Curve</text>
    
    <!-- Axes -->
    <line x1="50" y1="365" x2="370" y2="365" stroke="#636e72" stroke-width="1"/>
    <line x1="50" y1="365" x2="50" y2="290" stroke="#636e72" stroke-width="1"/>
    <text x="210" y="385" text-anchor="middle" font-family="Arial" font-size="10" fill="#636e72">Time (RTT)</text>
    <text x="25" y="330" text-anchor="middle" font-family="Arial" font-size="10" fill="#636e72" transform="rotate(-90,25,330)">cwnd</text>
    
    <!-- CUBIC Curve -->
    <path d="M50,360 Q120,355 160,340 Q200,310 240,295 Q280,290 300,290 Q330,290 350,295" 
          stroke="#e84393" stroke-width="2.5" fill="none" class="curve-path"/>
    
    <!-- Phase Labels -->
    <text x="95" y="345" text-anchor="middle" font-family="Arial" font-size="9" fill="#e84393" class="pulse-anim">Concave</text>
    <text x="230" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#e84393">Convex</text>
    <text x="320" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#e84393">Plateau</text>
    
    <!-- Point markers -->
    <circle cx="160" cy="340" r="3" fill="#e84393" class="pulse-anim"/>
    <circle cx="280" cy="292" r="3" fill="#e84393"/>
    <circle cx="320" cy="290" r="3" fill="#e84393"/>
  </g>
  
  <!-- Legend/Key Concepts -->
  <g>
    <rect x="20" y="248" width="80" height="15" rx="3" fill="#ffeaa7" opacity="0.8"/>
    <text x="60" y="259" text-anchor="middle" font-family="Arial" font-size="8" fill="#2d3436">AIMD</text>
    
    <rect x="105" y="248" width="80" height="15" rx="3" fill="#81ecec" opacity="0.8"/>
    <text x="145" y="259" text-anchor="middle" font-family="Arial" font-size="8" fill="#2d3436">Fast Recovery</text>
  </g>
</svg>