<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="multipath-tcp">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718096"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes glow {
      0%, 100% { filter: url(#shadow); }
      50% { filter: url(#shadow) brightness(1.1); }
    }
    
    .title { font-size: 20px; font-weight: bold; fill: #2c5282; font-family: Arial, sans-serif; }
    .label { font-size: 14px; fill: #2d3748; font-family: Arial, sans-serif; }
    .sublabel { font-size: 11px; fill: #718096; font-family: Arial, sans-serif; }
    .endpoint { fill: #4299e1; }
    .server { fill: #48bb78; }
    .path-line { stroke: #a0aec0; stroke-width: 2; fill: none; }
    .path-wifi { stroke: #ed8936; }
    .path-cellular { stroke: #9f7aea; }
    .path-ethernet { stroke: #38b2ac; }
    .subflow-box { fill: #fff; stroke: #e2e8f0; stroke-width: 1; }
    .concept-box { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1; }
    .arrow { fill: #718096; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .mptcp-box { fill: #ebf8ff; stroke: #4299e1; stroke-width: 2; }
    .animated-path { animation: dataFlow 1s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" style="animation: fadeIn 1s ease-out;">Multipath TCP (MPTCP)</text>
  
  <!-- Client Endpoint -->
  <g style="animation: slideInLeft 0.8s ease-out;" data-narration="Host A client device with multiple network interfaces">
    <rect x="25" y="130" width="55" height="95" rx="8" class="endpoint" filter="url(#shadow)"/>
    <text x="52" y="160" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Host A</text>
    <text x="52" y="178" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="Arial, sans-serif">Client</text>
    <rect x="30" y="192" width="44" height="18" rx="3" fill="#ed8936" opacity="0.9"/>
    <text x="52" y="205" text-anchor="middle" fill="white" font-size="8" font-family="Arial, sans-serif">Wi-Fi</text>
    <rect x="30" y="212" width="44" height="18" rx="3" fill="#9f7aea" opacity="0.9"/>
    <text x="52" y="225" text-anchor="middle" fill="white" font-size="8" font-family="Arial, sans-serif">Cellular</text>
  </g>
  
  <!-- Server Endpoint -->
  <g style="animation: slideInRight 0.8s ease-out;" data-narration="Server B receives data through multiple subflows">
    <rect x="340" y="130" width="55" height="95" rx="8" class="server" filter="url(#shadow)"/>
    <text x="367" y="160" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Server B</text>
    <text x="367" y="178" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="Arial, sans-serif">Server</text>
    <text x="367" y="200" text-anchor="middle" fill="#2d3748" font-size="8" font-family="Arial, sans-serif">203.0.113.5</text>
  </g>
  
  <!-- Path Lines -->
  <g style="animation: fadeIn 1s ease-out 0.3s both;">
    <!-- Wi-Fi Path -->
    <path d="M 80 145 Q 210 100 340 145" class="path-line path-wifi" stroke-dasharray="6,3"/>
    <path d="M 80 145 Q 210 100 340 145" class="path-line path-wifi animated-path" stroke-dasharray="6,3" stroke="#ed8936" stroke-width="2" opacity="0.5"/>
    <circle cx="80" cy="145" r="4" fill="#ed8936" class="pulse"/>
    <text x="210" y="115" text-anchor="middle" fill="#ed8936" font-size="9" font-family="Arial, sans-serif" font-weight="bold">Wi-Fi Path</text>
    
    <!-- Cellular Path -->
    <path d="M 80 175 Q 210 175 340 175" class="path-line path-cellular" stroke-dasharray="6,3"/>
    <path d="M 80 175 Q 210 175 340 175" class="path-line path-cellular animated-path" stroke-dasharray="6,3" stroke="#9f7aea" stroke-width="2" opacity="0.5" style="animation-delay: 0.3s"/>
    <circle cx="80" cy="175" r="4" fill="#9f7aea" class="pulse" style="animation-delay: 0.3s"/>
    <text x="210" y="168" text-anchor="middle" fill="#9f7aea" font-size="9" font-family="Arial, sans-serif" font-weight="bold">Cellular Path</text>
    
    <!-- Ethernet Path -->
    <path d="M 80 205 Q 210 250 340 205" class="path-line path-ethernet" stroke-dasharray="6,3"/>
    <path d="M 80 205 Q 210 250 340 205" class="path-line path-ethernet animated-path" stroke-dasharray="6,3" stroke="#38b2ac" stroke-width="2" opacity="0.5" style="animation-delay: 0.6s"/>
    <circle cx="80" cy="205" r="4" fill="#38b2ac" class="pulse" style="animation-delay: 0.6s"/>
    <text x="210" y="265" text-anchor="middle" fill="#38b2ac" font-size="9" font-family="Arial, sans-serif" font-weight="bold">Ethernet Path</text>
  </g>
  
  <!-- MPTCP Connection Box -->
  <g style="animation: fadeIn 1.2s ease-out 0.5s both;" data-narration="MPTCP manages multiple subflows as a single unified connection">
    <rect x="145" y="55" width="130" height="120" rx="6" class="mptcp-box" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" fill="#2c5282" font-size="12" font-weight="bold" font-family="Arial, sans-serif">MPTCP Connection</text>
    <text x="210" y="95" text-anchor="middle" fill="#4a5568" font-size="8" font-family="Arial, sans-serif">Unified session across</text>
    <text x="210" y="108" text-anchor="middle" fill="#4a5568" font-size="8" font-family="Arial, sans-serif">multiple network paths</text>
    <line x1="160" y1="118" x2="260" y2="118" stroke="#cbd5e0" stroke-width="1"/>
    <text x="210" y="135" text-anchor="middle" fill="#2d3748" font-size="9" font-weight="bold" font-family="Arial, sans-serif">Key Functions:</text>
    <text x="160" y="152" fill="#718096" font-size="8" font-family="Arial, sans-serif">• Congestion Control</text>
    <text x="160" y="166" fill="#718096" font-size="8" font-family="Arial, sans-serif">• Packet Scheduling</text>
    <text x="160" y="180" fill="#718096" font-size="8" font-family="Arial, sans-serif">• Path Management</text>
  </g>
  
  <!-- Subflow Architecture -->
  <g style="animation: slideInLeft 1s ease-out 0.7s both;" data-narration="Subflows are independent TCP connections that form the MPTCP session">
    <rect x="20" y="275" width="115" height="55" rx="4" class="subflow-box" filter="url(#shadow)"/>
    <text x="77" y="295" text-anchor="middle" fill="#2d3748" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Subflows</text>
    <text x="77" y="310" text-anchor="middle" fill="#718096" font-size="8" font-family="Arial, sans-serif">Independent TCP</text>
    <text x="77" y="322" text-anchor="middle" fill="#718096" font-size="8" font-family="Arial, sans-serif">connections per path</text>
  </g>
  
  <!-- Congestion Control -->
  <g style="animation: fadeIn 1s ease-out 0.9s both;" data-narration="Congestion control algorithms like LIA and OLIA balance load across all subflows">
    <rect x="145" y="275" width="130" height="55" rx="4" class="subflow-box" filter="url(#shadow)"/>
    <text x="210" y="295" text-anchor="middle" fill="#2d3748" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Congestion Control</text>
    <text x="210" y="310" text-anchor="middle" fill="#718096" font-size="8" font-family="Arial, sans-serif">LIA &amp; OLIA algorithms</text>
    <text x="210" y="322" text-anchor="middle" fill="#718096" font-size="8" font-family="Arial, sans-serif">balance load across paths</text>
  </g>
  
  <!-- Packet Scheduling -->
  <g style="animation: slideInRight 1s ease-out 1.1s both;" data-narration="Packet scheduling strategies like LowRTT and ECF optimize data distribution">
    <rect x="285" y="275" width="115" height="55" rx="4" class="subflow-box" filter="url(#shadow)"/>
    <text x="342" y="295" text-anchor="middle" fill="#2d3748" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Packet Scheduling</text>
    <text x="342" y="310" text-anchor="middle" fill="#718096" font-size="8" font-family="Arial, sans-serif">LowRTT-First &amp; ECF</text>
    <text x="342" y="322" text-anchor="middle" fill="#718096" font-size="8" font-family="Arial, sans-serif">optimize throughput</text>
  </g>
  
  <!-- Arrows showing relationships -->
  <g style="animation: fadeIn 1.5s ease-out 1.2s both;">
    <path d="M 95 130 L 145 95" stroke="#718096" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>
    <path d="M 95 175 L 145 115" stroke="#718096" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>
    <path d="M 95 205 L 145 135" stroke="#718096" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.6"/>
  </g>
  
  <!-- Protocol Label -->
  <g style="animation: fadeIn 1.3s ease-out 1.4s both;">
    <text x="210" y="248" text-anchor="middle" fill="#2c5282" font-size="9" font-style="italic" font-family="Arial, sans-serif">RFC 6824 • RFC 8684</text>
  </g>
  
  <!-- iOS Badge -->
  <g style="animation: fadeIn 1.5s ease-out 1.6s both;">
    <rect x="320" y="18" width="85" height="16" rx="3" fill="#e53e3e" opacity="0.9"/>
    <text x="362" y="30" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="Arial, sans-serif">iOS since 2013</text>
  </g>
</svg>