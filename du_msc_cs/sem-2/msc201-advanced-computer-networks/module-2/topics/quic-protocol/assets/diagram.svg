<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="quic-protocol">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d4f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="quicGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b4cdb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="udpGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a186;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .stack-layer { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .stack-layer:nth-child(1) { animation-delay: 0.3s; }
    .stack-layer:nth-child(2) { animation-delay: 0.5s; }
    .stack-layer:nth-child(3) { animation-delay: 0.7s; }
    .stack-layer:nth-child(4) { animation-delay: 0.9s; }
    .concept-box { animation: slideUp 0.6s ease-out forwards; opacity: 0; }
    .concept-box:nth-child(1) { animation-delay: 1.1s; }
    .concept-box:nth-child(2) { animation-delay: 1.3s; }
    .concept-box:nth-child(3) { animation-delay: 1.5s; }
    .concept-box:nth-child(4) { animation-delay: 1.7s; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; opacity: 0; animation-delay: 2s; }
    .pulse { animation: pulse 2s infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" class="title">QUIC Protocol</text>
  <text x="210" y="50" text-anchor="middle" font-size="12" fill="#5d6d7e" class="title">Quick UDP Internet Connections</text>
  
  <!-- Protocol Stack Visualization -->
  <g transform="translate(20, 70)">
    <text x="100" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Protocol Stack</text>
    
    <!-- HTTP/3 -->
    <rect x="60" y="15" width="80" height="28" rx="5" fill="#e74c3c" class="stack-layer"/>
    <text x="100" y="35" text-anchor="middle" font-size="12" fill="white" font-weight="bold">HTTP/3</text>
    
    <!-- QUIC -->
    <rect x="50" y="48" width="100" height="32" rx="5" fill="url(#quicGradient)" class="stack-layer"/>
    <text x="100" y="70" text-anchor="middle" font-size="13" fill="white" font-weight="bold">QUIC</text>
    
    <!-- Arrow down -->
    <path d="M100 85 L100 95" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
    
    <!-- UDP -->
    <rect x="55" y="100" width="90" height="28" rx="5" fill="url(#udpGradient)" class="stack-layer"/>
    <text x="100" y="118" text-anchor="middle" font-size="12" fill="white" font-weight="bold">UDP</text>
    
    <!-- Arrow down -->
    <path d="M100 133 L100 143" stroke="#5d6d7e" stroke-width="2" class="arrow"/>
    
    <!-- IP -->
    <rect x="65" y="148" width="70" height="24" rx="5" fill="#95a5a6" class="stack-layer"/>
    <text x="100" y="165" text-anchor="middle" font-size="11" fill="white" font-weight="bold">IP</text>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g transform="translate(180, 75)">
    <rect x="0" y="0" width="220" height="290" rx="8" fill="white" fill-opacity="0.7" filter="url(#shadow)"/>
    
    <text x="110" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    
    <!-- Concept 1: UDP-Based -->
    <rect x="10" y="32" width="200" height="55" rx="5" fill="#d5f5e3" class="concept-box"/>
    <text x="20" y="48" font-size="12" font-weight="bold" fill="#1e8449">UDP-Based Transport</text>
    <text x="20" y="65" font-size="11" fill="#1e8449">Uses UDP port 443, bypasses</text>
    <text x="20" y="78" font-size="11" fill="#1e8449">middlebox interference</text>
    
    <!-- Concept 2: 0-RTT -->
    <rect x="10" y="92" width="200" height="55" rx="5" fill="#fadbd8" class="concept-box"/>
    <text x="20" y="108" font-size="12" font-weight="bold" fill="#c0392b">0-RTT Handshake</text>
    <text x="20" y="125" font-size="11" fill="#c0392b">Reduces latency with session</text>
    <text x="20" y="138" font-size="11" fill="#c0392b">resumption, faster connect</text>
    
    <!-- Concept 3: Stream Multiplexing -->
    <rect x="10" y="152" width="200" height="55" rx="5" fill="#d6eaf8" class="concept-box"/>
    <text x="20" y="168" font-size="12" font-weight="bold" fill="#2874a6">Stream Multiplexing</text>
    <text x="20" y="185" font-size="11" fill="#2874a6">Independent streams prevent</text>
    <text x="20" y="198" font-size="11" fill="#2874a6">HOL blocking issues</text>
    
    <!-- Concept 4: Integrated Security -->
    <rect x="10" y="212" width="200" height="55" rx="5" fill="#fcf3cf" class="concept-box"/>
    <text x="20" y="228" font-size="12" font-weight="bold" fill="#9a7d0a">Integrated TLS 1.3</text>
    <text x="20" y="245" font-size="11" fill="#9a7d0a">Mandatory encryption, built-in</text>
    <text x="20" y="258" font-size="11" fill="#9a7d0a">security from ground up</text>
  </g>
  
  <!-- Animated Highlight Circle on QUIC -->
  <circle cx="100" cy="160" r="55" fill="none" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="10,5" class="pulse" opacity="0.6">
    <animate attributeName="r" values="50;60;50" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Connection IDs visual -->
  <g transform="translate(20, 330)">
    <rect x="0" y="0" width="160" height="55" rx="5" fill="white" fill-opacity="0.8" filter="url(#shadow)" class="concept-box"/>
    <text x="80" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">Connection Migration</text>
    <text x="80" y="35" text-anchor="middle" font-size="10" fill="#8e44ad">Uses Connection IDs instead</text>
    <text x="80" y="47" text-anchor="middle" font-size="10" fill="#8e44ad">of IP/port (Wi-Fi ↔ Cellular)</text>
  </g>
  
  <!-- HTTP/3 Badge -->
  <g transform="translate(280, 330)">
    <rect x="0" y="0" width="120" height="55" rx="5" fill="#e74c3c" class="concept-box"/>
    <text x="60" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="white">HTTP/3</text>
    <text x="60" y="35" text-anchor="middle" font-size="10" fill="white">Adopted as standard</text>
    <text x="60" y="47" text-anchor="middle" font-size="10" fill="white">for modern web</text>
  </g>
  
  <!-- Data Narration Attributes (for accessibility) -->
  <desc data-narration="QUIC Protocol Stack showing HTTP/3 on QUIC layer over UDP transport protocol"></desc>
  <desc data-narration="UDP-Based: Uses UDP port 443 instead of TCP, bypassing middlebox issues"></desc>
  <desc data-narration="0-RTT: Enables fast session resumption reducing connection latency"></desc>
  <desc data-narration="Stream Multiplexing: Multiple independent streams prevent head-of-line blocking"></desc>
  <desc data-narration="Integrated Security: TLS 1.3 encryption built into protocol handshake"></desc>
  <desc data-narration="Connection Migration: Seamless network switching using connection IDs"></desc>
</svg>