<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ipsec-vpn">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5daf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ahGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="espGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideDown {
      from { transform: translateY(-15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: slideDown 0.8s ease-out forwards; }
    .box-anim-1 { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-anim-2 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box-anim-3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box-anim-4 { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .arrow-anim { animation: slideIn 0.5s ease-out 1s forwards; opacity: 0; }
    .pulse-anim:hover { animation: pulse 1s ease-in-out infinite; cursor: pointer; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle" class="title-anim">IPSec VPN</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#3498db" stroke-width="2" class="title-anim"/>
  
  <!-- Section 1: Overview Box -->
  <g class="box-anim-1" data-narration="IPSec VPN operates at Layer 3, providing confidentiality, integrity, and authentication">
    <rect x="10" y="48" width="130" height="55" rx="6" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="75" y="65" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">Overview</text>
    <text x="75" y="82" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Layer 3 Security</text>
    <text x="75" y="95" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Confidentiality</text>
  </g>
  
  <!-- Section 2: AH Protocol -->
  <g class="box-anim-2" data-narration="Authentication Header (AH) provides data origin authentication and integrity without encryption">
    <rect x="150" y="48" width="120" height="55" rx="6" fill="url(#ahGradient)" filter="url(#shadow)"/>
    <text x="210" y="65" font-family="Arial" font-size="13" font-weight="bold" fill="#6d4c41" text-anchor="middle">AH (Protocol 51)</text>
    <text x="210" y="82" font-family="Arial" font-size="10" fill="#5d4037" text-anchor="middle">Authentication</text>
    <text x="210" y="95" font-family="Arial" font-size="10" fill="#5d4037" text-anchor="middle">Integrity Only</text>
  </g>
  
  <!-- Section 3: ESP Protocol -->
  <g class="box-anim-3" data-narration="ESP provides both encryption and authentication, supporting Transport and Tunnel modes">
    <rect x="280" y="48" width="130" height="55" rx="6" fill="url(#espGradient)" filter="url(#shadow)"/>
    <text x="345" y="65" font-family="Arial" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">ESP (Protocol 50)</text>
    <text x="345" y="82" font-family="Arial" font-size="10" fill="#ede7f6" text-anchor="middle">Encryption</text>
    <text x="345" y="95" font-family="Arial" font-size="10" fill="#ede7f6" text-anchor="middle">+ Authentication</text>
  </g>
  
  <!-- Section 4: Modes Comparison -->
  <g class="box-anim-4" data-narration="Transport mode encrypts payload only; Tunnel mode encrypts entire IP packet">
    <rect x="10" y="115" width="195" height="85" rx="6" fill="#fff" filter="url(#shadow)"/>
    <text x="107" y="132" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">Modes of Operation</text>
    
    <!-- Transport Mode -->
    <rect x="18" y="142" width="85" height="50" rx="4" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1"/>
    <text x="60" y="158" font-family="Arial" font-size="11" font-weight="bold" fill="#16a085" text-anchor="middle">Transport</text>
    <text x="60" y="173" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Host-to-Host</text>
    <text x="60" y="186" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Encrypts Payload</text>
    
    <!-- Tunnel Mode -->
    <rect x="112" y="142" width="85" height="50" rx="4" fill="#fef9e7" stroke="#f1c40f" stroke-width="1"/>
    <text x="154" y="158" font-family="Arial" font-size="11" font-weight="bold" fill="#d4ac0d" text-anchor="middle">Tunnel</text>
    <text x="154" y="173" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Gateway-to-GW</text>
    <text x="154" y="186" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Encrypts Packet</text>
  </g>
  
  <!-- Section 5: IKE Phases -->
  <g class="box-anim-4" data-narration="IKE Phase 1 establishes secure channel; Phase 2 negotiates IPSec SAs">
    <rect x="215" y="115" width="195" height="85" rx="6" fill="#fff" filter="url(#shadow)"/>
    <text x="312" y="132" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">IKE Phases</text>
    
    <!-- Phase 1 -->
    <rect x="223" y="142" width="88" height="50" rx="4" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
    <text x="267" y="158" font-family="Arial" font-size="11" font-weight="bold" fill="#c2185b" text-anchor="middle">Phase 1</text>
    <text x="267" y="173" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Secure Channel</text>
    <text x="267" y="186" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">DH Key Exchange</text>
    
    <!-- Phase 2 -->
    <rect x="319" y="142" width="83" height="50" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="360" y="158" font-family="Arial" font-size="11" font-weight="bold" fill="#1976d2" text-anchor="middle">Phase 2</text>
    <text x="360" y="173" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">IPSec SA</text>
    <text x="360" y="186" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Quick Mode</text>
  </g>
  
  <!-- Section 6: SA Structure -->
  <g class="box-anim-4" data-narration="Security Association contains SPI, encryption algorithms (AES/ChaCha20), and integrity algorithms (SHA-2)">
    <rect x="10" y="210" width="400" height="70" rx="6" fill="#fff" filter="url(#shadow)"/>
    <text x="210" y="230" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">Security Association (SA)</text>
    
    <!-- SA Components -->
    <rect x="25" y="242" width="85" height="30" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
    <text x="67" y="258" font-family="Arial" font-size="10" font-weight="bold" fill="#721c24" text-anchor="middle">SPI</text>
    <text x="67" y="270" font-family="Arial" font-size="8" fill="#721c24" text-anchor="middle">Index</text>
    
    <rect x="120" y="242" width="95" height="30" rx="4" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
    <text x="167" y="258" font-family="Arial" font-size="10" font-weight="bold" fill="#155724" text-anchor="middle">Encryption</text>
    <text x="167" y="270" font-family="Arial" font-size="8" fill="#155724" text-anchor="middle">AES/ChaCha20</text>
    
    <rect x="225" y="242" width="95" height="30" rx="4" fill="#cce5ff" stroke="#007bff" stroke-width="1"/>
    <text x="272" y="258" font-family="Arial" font-size="10" font-weight="bold" fill="#004085" text-anchor="middle">Integrity</text>
    <text x="272" y="270" font-family="Arial" font-size="8" fill="#004085" text-anchor="middle">SHA-2</text>
    
    <rect x="330" y="242" width="70" height="30" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
    <text x="365" y="258" font-family="Arial" font-size="10" font-weight="bold" fill="#856404" text-anchor="middle">Direction</text>
    <text x="365" y="270" font-family="Arial" font-size="8" fill="#856404" text-anchor="middle">Uni</text>
  </g>
  
  <!-- Packet Structure Visualization -->
  <g class="box-anim-4" data-narration="IPSec packet structure showing original header, AH/ESP headers, and encrypted payload">
    <rect x="10" y="290" width="400" height="100" rx="6" fill="#fff" filter="url(#shadow)"/>
    <text x="210" y="310" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">Packet Structure Comparison</text>
    
    <!-- Original IP Packet -->
    <text x="45" y="332" font-family="Arial" font-size="10" font-weight="bold" fill="#2c3e50" text-anchor="middle">Original IP</text>
    <rect x="15" y="338" width="60" height="45" rx="3" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1"/>
    <text x="45" y="355" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">IP Header</text>
    <text x="45" y="368" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">+ Payload</text>
    
    <!-- Arrow 1 -->
    <path d="M 80 360 L 100 360" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M 0 0 L 6 3 L 0 6 Z" fill="#3498db"/>
      </marker>
    </defs>
    
    <!-- AH in Transport -->
    <text x="145" y="332" font-family="Arial" font-size="10" font-weight="bold" fill="#6d4c41" text-anchor="middle">AH Transport</text>
    <rect x="110" y="338" width="70" height="45" rx="3" fill="url(#ahGradient)" stroke="#f39c12" stroke-width="1"/>
    <text x="145" y="355" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">IP Header</text>
    <text x="145" y="368" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">AH | Payload</text>
    
    <!-- Arrow 2 -->
    <path d="M 185 360 L 205 360" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- ESP in Transport -->
    <text x="265" y="332" font-family="Arial" font-size="10" font-weight="bold" fill="#6c5ce7" text-anchor="middle">ESP Transport</text>
    <rect x="215" y="338" width="100" height="45" rx="3" fill="url(#espGradient)" stroke="#4834d4" stroke-width="1"/>
    <text x="265" y="355" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">IP Header</text>
    <text x="265" y="368" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">ESP | Enc | Auth</text>
    
    <!-- Arrow 3 -->
    <path d="M 320 360 L 340 360" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- ESP in Tunnel -->
    <text x="385" y="332" font-family="Arial" font-size="10" font-weight="bold" fill="#6c5ce7" text-anchor="middle">ESP Tunnel</text>
    <rect x="350" y="338" width="55" height="45" rx="3" fill="#fab1a0" stroke="#e17055" stroke-width="1"/>
    <text x="377" y="355" font-family="Arial" font-size="8" fill="#d63031" text-anchor="middle">New IP</text>
    <text x="377" y="368" font-family="Arial" font-size="8" fill="#d63031" text-anchor="middle">+ ESP</text>
  </g>
  
  <!-- Key Concepts Footer -->
  <g class="box-anim-4">
    <rect x="10" y="370" width="400" height="25" rx="4" fill="#2c3e50" opacity="0.9"/>
    <text x="210" y="386" font-family="Arial" font-size="10" fill="#ecf0f1" text-anchor="middle">Key: SPI=Security Parameters Index | DH=Diffie-Hellman | SA=Security Association</text>
  </g>
</svg>