<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="cryptographic-protocols-ssl-tls">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#dce9f4"/>
    </linearGradient>
    <linearGradient id="handshakeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b4"/>
    </linearGradient>
    <linearGradient id="recordGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8d4e8"/>
    </linearGradient>
    <linearGradient id="cipherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0d4f0"/>
      <stop offset="100%" style="stop-color:#c9b4d9"/>
    </linearGradient>
    <linearGradient id="pkiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e4d4"/>
      <stop offset="100%" style="stop-color:#e0c9b4"/>
    </linearGradient>
    <linearGradient id="sessionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d4e4"/>
      <stop offset="100%" style="stop-color:#d9b4c9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes lockPulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(5deg); }
    }
    .title { font-family: Georgia, serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #34495e; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 9px; fill: #5d6d7e; }
    .box { opacity: 0; animation: fadeIn 0.6s ease-out forwards; }
    .box-1 { animation-delay: 0.1s; }
    .box-2 { animation-delay: 0.2s; }
    .box-3 { animation-delay: 0.3s; }
    .box-4 { animation-delay: 0.4s; }
    .box-5 { animation-delay: 0.5s; }
    .handshake-box { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; animation-delay: 0.2s; }
    .record-box { animation: slideInRight 0.5s ease-out forwards; opacity: 0; animation-delay: 0.3s; }
    .cipher-box { animation: slideInUp 0.5s ease-out forwards; opacity: 0; animation-delay: 0.4s; }
    .pki-box { animation: slideInUp 0.5s ease-out forwards; opacity: 0; animation-delay: 0.5s; }
    .session-box { animation: slideInUp 0.5s ease-out forwards; opacity: 0; animation-delay: 0.6s; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .lock-icon { animation: lockPulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { stroke-dasharray: 60; stroke-dashoffset: 60; animation: drawLine 1s ease-out forwards; animation-delay: 0.8s; }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">SSL/TLS Protocol Stack</text>
  <text x="210" y="45" text-anchor="middle" class="detail" style="animation: fadeIn 1s ease-out forwards; opacity: 0; animation-delay: 0.3s;">Secure Communications Framework</text>

  <!-- Handshake Protocol Box -->
  <g class="handshake-box">
    <rect x="15" y="60" width="180" height="90" rx="8" fill="url(#handshakeGrad)" filter="url(#shadow)"/>
    <text x="105" y="78" text-anchor="middle" class="section-title">Handshake Protocol</text>
    <line x1="25" y1="86" x2="185" y2="86" stroke="#7f9c8f" stroke-width="1"/>
    <text x="25" y="102" class="label">• ClientHello / ServerHello</text>
    <text x="25" y="116" class="label">• ECDHE Key Exchange</text>
    <text x="25" y="130" class="label">• Certificate Verification</text>
    <text x="25" y="144" class="detail">TLS 1.3: 1-RTT | TLS 1.2: 2-RTT</text>
  </g>

  <!-- Record Protocol Box -->
  <g class="record-box">
    <rect x="225" y="60" width="180" height="90" rx="8" fill="url(#recordGrad)" filter="url(#shadow)"/>
    <text x="315" y="78" text-anchor="middle" class="section-title">Record Protocol</text>
    <line x1="235" y1="86" x2="395" y2="86" stroke="#8fa8b8" stroke-width="1"/>
    <text x="235" y="102" class="label">• AEAD Ciphers (GCM/Poly1305)</text>
    <text x="235" y="116" class="label">• Sequence Number Protection</text>
    <text x="235" y="130" class="label">• TLS Inner/Outer Encryption</text>
    <text x="235" y="144" class="detail">AES-GCM, ChaCha20-Poly1305</text>
  </g>

  <!-- Cipher Suite Negotiation Box -->
  <g class="cipher-box">
    <rect x="15" y="165" width="180" height="65" rx="8" fill="url(#cipherGrad)" filter="url(#shadow)"/>
    <text x="105" y="183" text-anchor="middle" class="section-title">Cipher Suite Negotiation</text>
    <line x1="25" y1="191" x2="185" y2="191" stroke="#a895b8" stroke-width="1"/>
    <text x="25" y="208" class="label">Key: ECDSA, RSA-PSS | Hash: SHA-256</text>
    <text x="25" y="222" class="detail">Bulk: AES-256-GCM, ChaCha20</text>
  </g>

  <!-- PKI Box -->
  <g class="pki-box">
    <rect x="225" y="165" width="180" height="65" rx="8" fill="url(#pkiGrad)" filter="url(#shadow)"/>
    <text x="315" y="183" text-anchor="middle" class="section-title">Public Key Infrastructure</text>
    <line x1="235" y1="191" x2="395" y2="191" stroke="#b8a088" stroke-width="1"/>
    <text x="235" y="208" class="label">X.509 Certificates, OCSP Stapling</text>
    <text x="235" y="222" class="detail">Certificate Transparency Logs</text>
  </g>

  <!-- Session Resumption Box -->
  <g class="session-box">
    <rect x="120" y="245" width="180" height="55" rx="8" fill="url(#sessionGrad)" filter="url(#shadow)"/>
    <text x="210" y="263" text-anchor="middle" class="section-title">Session Resumption</text>
    <line x1="130" y1="271" x2="290" y2="271" stroke="#b8889e" stroke-width="1"/>
    <text x="130" y="288" class="label">PSK (Pre-Shared Keys) | 0-RTT Data</text>
  </g>

  <!-- Connection Arrows -->
  <g class="arrow-line">
    <path d="M 105 150 L 105 165" stroke="#5d6d7e" stroke-width="2" fill="none"/>
    <polygon points="105,170 100,160 110,160" fill="#5d6d7e"/>
  </g>
  <g class="arrow-line" style="animation-delay: 0.9s;">
    <path d="M 315 150 L 315 165" stroke="#5d6d7e" stroke-width="2" fill="none"/>
    <polygon points="315,170 310,160 320,160" fill="#5d6d7e"/>
  </g>
  <g class="arrow-line" style="animation-delay: 1s;">
    <path d="M 210 230 L 210 245" stroke="#5d6d7e" stroke-width="2" fill="none"/>
    <polygon points="210,250 205,240 215,240" fill="#5d6d7e"/>
  </g>

  <!-- Lock Icon -->
  <g class="lock-icon" style="transform-origin: 380px 380px;">
    <rect x="370" y="365" width="24" height="20" rx="2" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
    <path d="M 377 365 L 377 358 Q 377 352 382 352 Q 387 352 387 358 L 387 365" fill="none" stroke="#27ae60" stroke-width="3"/>
  </g>

  <!-- Protocol Version Labels -->
  <text x="105" y="295" text-anchor="middle" class="detail" style="animation: fadeIn 1s ease-out forwards; opacity: 0; animation-delay: 0.7s;">TLS 1.3 (2018)</text>
  <text x="315" y="295" text-anchor="middle" class="detail" style="animation: fadeIn 1s ease-out forwards; opacity: 0; animation-delay: 0.8s;">Forward Secrecy</text>
  <text x="210" y="315" text-anchor="middle" class="detail" style="animation: fadeIn 1s ease-out forwards; opacity: 0; animation-delay: 0.9s;">Post-Quantum Ready</text>

  <!-- Data Flow Arrow -->
  <g style="animation: fadeIn 1s ease-out forwards; opacity: 0; animation-delay: 1.1s;">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
      </marker>
    </defs>
    <line x1="30" y1="330" x2="380" y2="330" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="205" y="325" text-anchor="middle" class="label" fill="#3498db">Secure Data Flow →</text>
  </g>

  <!-- Narration indicators (invisible but present for accessibility) -->
  <rect x="0" y="0" width="1" height="1" data-narration="SSL/TLS protocols provide end-to-end encryption for secure internet communication" style="display:none"/>
  <rect x="0" y="0" width="1" height="1" data-narration="Handshake Protocol: Authenticates parties and negotiates cryptographic parameters using ECDHE for forward secrecy" style="display:none"/>
  <rect x="0" y="0" width="1" height="1" data-narration="Record Protocol: Encrypts data using AEAD ciphers like AES-GCM or ChaCha20-Poly1305" style="display:none"/>
  <rect x="0" y="0" width="1" height="1" data-narration="Cipher Suite Negotiation: Selects key exchange, bulk encryption, and hash algorithms" style="display:none"/>
  <rect x="0" y="0" width="1" height="1" data-narration="PKI: X.509 certificates provide identity verification through Certificate Transparency" style="display:none"/>
  <rect x="0" y="0" width="1" height="1" data-narration="Session Resumption: PSK enables 0-RTT fast reconnection with forward secrecy" style="display:none"/>
</svg>