<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-attack-detection">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8e4f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9cc2db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8b8d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0a0c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8cc4b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c8b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8b0a0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7a9a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .box2 { animation: slideInLeft 0.8s ease-out 0.4s both; }
    .box3 { animation: slideInRight 0.8s ease-out 0.6s both; }
    .box4 { animation: slideInRight 0.8s ease-out 0.8s both; }
    .arrow { animation: fadeIn 0.5s ease-out 1s both; }
    .flow-line { animation: dataFlow 1s linear infinite; stroke-dasharray: 5,5; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .blink-anim { animation: blink 1s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c4a6e" class="title">Network Attack Detection</text>
  <text x="210" y="50" text-anchor="middle" font-size="11" fill="#5a7a9a">Architecture &amp; Data Flow</text>
  
  <!-- Sensors Box -->
  <g class="box1" data-narration="Network sensors capture raw traffic data from various points in the network infrastructure">
    <rect x="20" y="80" width="90" height="90" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="65" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c4a6e">SENSORS</text>
    <text x="65" y="118" text-anchor="middle" font-size="9" fill="#3a5a7a">Packet Capture</text>
    <text x="65" y="130" text-anchor="middle" font-size="9" fill="#3a5a7a">Flow Logs</text>
    <text x="65" y="142" text-anchor="middle" font-size="9" fill="#3a5a7a">NetFlow</text>
    <circle cx="65" cy="158" r="6" fill="#4a8ab8" class="pulse-anim"/>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow">
    <line x1="110" y1="125" x2="150" y2="125" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Data Normalizer Box -->
  <g class="box2" data-narration="Data normalizer transforms raw data into consistent format, parsing protocols and extracting features">
    <rect x="150" y="80" width="100" height="90" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="200" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a3a6e">NORMALIZER</text>
    <text x="200" y="118" text-anchor="middle" font-size="9" fill="#5a4a7a">Protocol Parsing</text>
    <text x="200" y="130" text-anchor="middle" font-size="9" fill="#5a4a7a">Feature Extract</text>
    <text x="200" y="142" text-anchor="middle" font-size="9" fill="#5a4a7a">Data Enrichment</text>
    <rect x="185" y="150" width="30" height="12" rx="3" fill="#8a7aaa" class="blink-anim"/>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow">
    <line x1="250" y1="125" x2="280" y2="125" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- ML Model Box -->
  <g class="box3" data-narration="Machine learning models analyze normalized data to detect anomalies and known attack patterns">
    <rect x="280" y="80" width="100" height="90" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="330" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c6a5a">ML ENGINE</text>
    <text x="330" y="118" text-anchor="middle" font-size="9" fill="#3a7a6a">Random Forest</text>
    <text x="330" y="130" text-anchor="middle" font-size="9" fill="#3a7a6a">Autoencoder</text>
    <text x="330" y="142" text-anchor="middle" font-size="9" fill="#3a7a6a">Transformer</text>
    <rect x="315" y="150" width="30" height="12" rx="3" fill="#5a9a7a" class="flow-line"/>
  </g>
  
  <!-- Arrow 3 -->
  <g class="arrow">
    <line x1="380" y1="125" x2="400" y2="125" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="400" y1="125" x2="400" y2="200" stroke="#5a7a9a" stroke-width="2"/>
    <line x1="400" y1="200" x2="380" y2="200" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Alert System Box -->
  <g class="box4" data-narration="Alert system generates security notifications and integrates with SIEM for incident response">
    <rect x="280" y="200" width="100" height="70" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="330" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a4a3a">ALERTS</text>
    <text x="330" y="238" text-anchor="middle" font-size="9" fill="#7a5a4a">SIEM Integration</text>
    <text x="330" y="250" text-anchor="middle" font-size="9" fill="#7a5a4a">Threat Log</text>
    <circle cx="330" cy="258" r="5" fill="#c84040" class="blink-anim"/>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="title" data-narration="Key detection approaches include signature-based and anomaly-based methods">
    <rect x="20" y="290" width="180" height="95" rx="8" fill="#f5f5f5" stroke="#c0c0c0" stroke-width="1"/>
    <text x="110" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c4a6e">Detection Methods</text>
    <text x="30" y="328" font-size="10" fill="#4a4a4a">• Signature-based (Snort)</text>
    <text x="30" y="342" font-size="10" fill="#4a4a4a">• Anomaly-based (Z-score)</text>
    <text x="30" y="356" font-size="10" fill="#4a4a4a">• ML Classification</text>
    <text x="30" y="370" font-size="10" fill="#4a4a4a">• Deep Learning (CNN-LSTM)</text>
  </g>
  
  <!-- Attack Types Section -->
  <g class="title" data-narration="Common attack categories detected by modern IDS systems">
    <rect x="210" y="290" width="180" height="95" rx="8" fill="#f5f5f5" stroke="#c0c0c0" stroke-width="1"/>
    <text x="300" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c4a6e">Attack Categories</text>
    <text x="220" y="328" font-size="10" fill="#4a4a4a">• DDoS &amp; Botnets</text>
    <text x="220" y="342" font-size="10" fill="#4a4a4a">• Malware &amp; Ransomware</text>
    <text x="220" y="356" font-size="10" fill="#4a4a4a">• APT &amp; Zero-day</text>
    <text x="220" y="370" font-size="10" fill="#4a4a4a">• Insider Threats</text>
  </g>
  
  <!-- Data flow indicators -->
  <g class="arrow">
    <circle cx="65" cy="125" r="4" fill="#4a8ab8">
      <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="125" r="4" fill="#8a6aaa">
      <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="330" cy="125" r="4" fill="#5a9a7a">
      <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
</svg>