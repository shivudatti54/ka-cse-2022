<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-function-virtualization" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vnfGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nfviGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#88b3c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a9cb5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="manoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c48bba;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .vnf-box { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .nfvi-box { animation: slideInUp 0.8s ease-out 0.4s both; }
    .mano-box { animation: slideInRight 0.8s ease-out 0.6s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .pulse-element { animation: pulse 2s infinite; transform-origin: center; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a5276; }
    .sub-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #ffffff; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title">Network Function Virtualization</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#3498db" stroke-width="2" class="title"/>
  
  <!-- VNF Layer (Left) -->
  <g class="vnf-box" data-narration="Virtualized Network Functions (VNFs) - Software-based network services like firewalls, load balancers, and IDS running on virtual machines">
    <rect x="20" y="60" width="110" height="140" fill="url(#vnfGradient)" rx="8" filter="url(#shadow)"/>
    <text x="75" y="78" text-anchor="middle" class="sub-label">VNFs</text>
    <rect x="30" y="85" width="90" height="30" fill="#ffffff" rx="4" opacity="0.9"/>
    <text x="75" y="103" text-anchor="middle" class="detail">Firewall</text>
    <rect x="30" y="120" width="90" height="30" fill="#ffffff" rx="4" opacity="0.9"/>
    <text x="75" y="138" text-anchor="middle" class="detail">Load Balancer</text>
    <rect x="30" y="155" width="90" height="30" fill="#ffffff" rx="4" opacity="0.9"/>
    <text x="75" y="173" text-anchor="middle" class="detail">IDS/IPS</text>
  </g>
  
  <!-- NFVI Layer (Center) -->
  <g class="nfvi-box" data-narration="NFV Infrastructure (NFVI) - Commercial off-the-shelf hardware including compute, storage, and hypervisor virtualization layer">
    <rect x="155" y="60" width="110" height="180" fill="url(#nfviGradient)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="78" text-anchor="middle" class="sub-label">NFVI</text>
    
    <!-- Server Icon -->
    <rect x="175" y="95" width="70" height="25" fill="#ffffff" rx="3" opacity="0.9"/>
    <circle cx="182" cy="107" r="3" fill="#27ae60" class="pulse-element"/>
    <text x="195" y="112" class="detail">Compute</text>
    
    <rect x="175" y="125" width="70" height="25" fill="#ffffff" rx="3" opacity="0.9"/>
    <rect x="180" y="135" width="8" height="5" fill="#3498db"/>
    <text x="195" y="142" class="detail">Storage</text>
    
    <rect x="175" y="155" width="70" height="25" fill="#ffffff" rx="3" opacity="0.9"/>
    <rect x="180" y="165" width="15" height="5" fill="#e74c3c" rx="1"/>
    <text x="200" y="172" class="detail">Hypervisor</text>
    
    <rect x="175" y="185" width="70" height="25" fill="#ffffff" rx="3" opacity="0.9"/>
    <rect x="180" y="195" width="15" height="5" fill="#9b59b6" rx="1"/>
    <text x="200" y="202" class="detail">COTS Hardware</text>
  </g>
  
  <!-- MANO Layer (Right) -->
  <g class="mano-box" data-narration="Management and Orchestration (MANO) - Handles VNF lifecycle management including instantiation, scaling, healing, and termination">
    <rect x="290" y="60" width="110" height="140" fill="url(#manoGradient)" rx="8" filter="url(#shadow)"/>
    <text x="345" y="78" text-anchor="middle" class="sub-label">MANO</text>
    <rect x="300" y="85" width="90" height="25" fill="#ffffff" rx="4" opacity="0.9"/>
    <text x="345" y="100" text-anchor="middle" class="detail">VIM</text>
    <rect x="300" y="115" width="90" height="25" fill="#ffffff" rx="4" opacity="0.9"/>
    <text x="345" y="130" text-anchor="middle" class="detail">VNFM</text>
    <rect x="300" y="145" width="90" height="25" fill="#ffffff" rx="4" opacity="0.9"/>
    <text x="345" y="160" text-anchor="middle" class="detail">NFVO</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow" data-narration="Arrows show the orchestration flow - MANO manages and orchestrates VNFs deployed on NFVI">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/>
      </marker>
    </defs>
    <!-- VNF to NFVI -->
    <path d="M130 130 L155 130" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
    <!-- MANO to VNF -->
    <path d="M290 130 L245 130" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
    <!-- MANO to NFVI -->
    <path d="M345 200 L345 260" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
  </g>
  
  <!-- Service Function Chaining Box -->
  <g data-narration="Service Function Chaining (SFC) - Dynamic composition of VNFs in a specific order for traffic processing">
    <rect x="20" y="220" width="380" height="55" fill="#ffffff" rx="6" filter="url(#shadow)" opacity="0.95" style="animation: fadeIn 1s ease-out 0.8s both;"/>
    <text x="210" y="238" text-anchor="middle" class="label" fill="#8e44ad">Service Function Chaining</text>
    <g transform="translate(35, 250)">
      <rect x="0" y="0" width="60" height="20" fill="#a8e6cf" rx="3"/>
      <text x="30" y="14" text-anchor="middle" class="detail">Firewall</text>
      <text x="70" y="12" class="detail" fill="#7f8c8d">→</text>
      <rect x="85" y="0" width="60" height="20" fill="#88d8b0" rx="3"/>
      <text x="115" y="14" text-anchor="middle" class="detail">IDS</text>
      <text x="155" y="12" class="detail" fill="#7f8c8d">→</text>
      <rect x="170" y="0" width="60" height="20" fill="#78e08f" rx="3"/>
      <text x="200" y="14" text-anchor="middle" class="detail">Load Bal.</text>
      <text x="240" y="12" class="detail" fill="#7f8c8d">→</text>
      <rect x="255" y="0" width="60" height="20" fill="#38ada9" rx="3"/>
      <text x="285" y="14" text-anchor="middle" class="detail" fill="white">Internet</text>
    </g>
  </g>
  
  <!-- Lifecycle Box -->
  <g data-narration="VNF Lifecycle Management - Four key phases: Instantiation, Scaling, Healing, and Termination">
    <rect x="20" y="285" width="380" height="40" fill="#fef9e7" rx="6" stroke="#f39c12" stroke-width="1" opacity="0.95" style="animation: slideInUp 0.8s ease-out 1s both;"/>
    <text x="210" y="302" text-anchor="middle" class="label" fill="#d68910">VNF Lifecycle:</text>
    <text x="60" y="318" class="detail" fill="#2c3e50">Instantiation</text>
    <text x="140" y="318" class="detail" fill="#2c3e50">→ Scaling</text>
    <text x="210" y="318" class="detail" fill="#2c3e50">→ Healing</text>
    <text x="280" y="318" class="detail" fill="#2c3e50">→ Termination</text>
    <text x="350" y="318" class="detail" fill="#7f8c8d">(Auto-scaling)</text>
  </g>
  
  <!-- Key Benefits -->
  <g data-narration="Key Benefits of NFV - Cost reduction (40% savings), service agility, and cloud-native 5G support">
    <rect x="20" y="335" width="180" height="55" fill="#ebf5fb" rx="6" stroke="#3498db" stroke-width="1" style="animation: slideInLeft 0.8s ease-out 1.2s both;"/>
    <text x="110" y="352" text-anchor="middle" class="label" fill="#1a5276">Key Benefits</text>
    <text x="30" y="368" class="detail" fill="#2c3e50">• 40% Cost Savings</text>
    <text x="30" y="382" class="detail" fill="#2c3e50">• Service Agility</text>
  </g>
  
  <!-- Performance -->
  <g data-narration="NFV Performance Considerations - SR-IOV, DPDK for high-speed packet processing, NUMA-aware placement">
    <rect x="220" y="335" width="180" height="55" fill="#f5eef8" rx="6" stroke="#9b59b6" stroke-width="1" style="animation: slideInRight 0.8s ease-out 1.2s both;"/>
    <text x="310" y="352" text-anchor="middle" class="label" fill="#6c3483">Performance</text>
    <text x="230" y="368" class="detail" fill="#2c3e50">• SR-IOV &amp; DPDK</text>
    <text x="230" y="382" class="detail" fill="#2c3e50">• NUMA-aware Placement</text>
  </g>
</svg>