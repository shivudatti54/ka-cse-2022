<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="software-defined-networking">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dde8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5bb5d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a9fc0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7cbf6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5da64a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a04c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4863a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInTop {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInBottom {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .layer-box { animation: slideInTop 0.8s ease-out forwards; opacity: 0; }
    .layer-box-delay1 { animation-delay: 0.2s; }
    .layer-box-delay2 { animation-delay: 0.4s; }
    .layer-box-delay3 { animation-delay: 0.6s; }
    .api-arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .controller-icon { animation: pulse 3s ease-in-out infinite; }
    .switch-icon { animation: pulse 3s ease-in-out infinite; animation-delay: 0.5s; }
    .app-icon { animation: pulse 3s ease-in-out infinite; animation-delay: 1s; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c5aa0" class="title">Software-Defined Networking</text>
  <text x="210" y="48" text-anchor="middle" font-size="11" fill="#5a7a9a">Architecture Overview</text>
  
  <!-- Application Layer -->
  <g class="layer-box layer-box-delay1" data-narration="Application Layer: Network applications and services that define business logic and policies">
    <rect x="30" y="65" width="360" height="70" rx="8" fill="url(#layerGradient1)" filter="url(#shadow)"/>
    <text x="45" y="85" font-size="14" font-weight="bold" fill="white">Application Layer</text>
    <rect x="45" y="100" width="85" height="25" rx="4" fill="white" fill-opacity="0.3"/>
    <text x="55" y="117" font-size="11" fill="white" font-weight="bold">Apps &amp; Services</text>
    <rect x="140" y="100" width="85" height="25" rx="4" fill="white" fill-opacity="0.3"/>
    <text x="150" y="117" font-size="11" fill="white" font-weight="bold">Orchestration</text>
    <rect x="235" y="100" width="85" height="25" rx="4" fill="white" fill-opacity="0.3"/>
    <text x="245" y="117" font-size="11" fill="white" font-weight="bold">Analytics</text>
    <circle cx="330" cy="112" r="12" fill="white" class="app-icon"/>
    <text x="330" y="116" text-anchor="middle" font-size="16" fill="#3a9fc0">⚡</text>
  </g>
  
  <!-- Northbound API -->
  <g class="api-arrow" data-narration="Northbound API: RESTful interface for applications to communicate with the SDN controller">
    <line x1="210" y1="135" x2="210" y2="155" stroke="#5bb5d6" stroke-width="3" stroke-dasharray="5,3"/>
    <polygon points="205,150 215,150 210,160" fill="#5bb5d6"/>
    <text x="230" y="150" font-size="10" fill="#3a7a9a" font-weight="bold">Northbound API</text>
    <text x="230" y="162" font-size="9" fill="#5a7a8a">(REST API)</text>
  </g>
  
  <!-- Controller Layer -->
  <g class="layer-box layer-box-delay2" data-narration="Control Plane: SDN Controller (OpenDaylight, ONOS, Ryu) that makes forwarding decisions">
    <rect x="30" y="165" width="360" height="80" rx="8" fill="url(#layerGradient2)" filter="url(#shadow)"/>
    <text x="45" y="185" font-size="14" font-weight="bold" fill="white">Control Plane</text>
    <text x="45" y="198" font-size="10" fill="white" fill-opacity="0.9">(Network OS)</text>
    <!-- Controller Box -->
    <rect x="140" y="195" width="140" height="40" rx="6" fill="white"/>
    <circle cx="175" cy="215" r="14" fill="#5da64a" class="controller-icon"/>
    <text x="175" y="220" text-anchor="middle" font-size="14" fill="white" font-weight="bold">C</text>
    <text x="200" y="212" font-size="11" fill="#3a6a3a" font-weight="bold">SDN Controller</text>
    <text x="200" y="225" font-size="9" fill="#5a7a5a">ONOS / ODL / Ryu</text>
    <!-- Network OS label -->
    <rect x="290" y="200" width="85" height="30" rx="4" fill="white" fill-opacity="0.4"/>
    <text x="300" y="215" font-size="9" fill="white" font-weight="bold">Network OS</text>
    <text x="300" y="227" font-size="8" fill="white">Centralized</text>
  </g>
  
  <!-- Southbound API -->
  <g class="api-arrow" data-narration="Southbound API: OpenFlow protocol that communicates between controller and switches">
    <line x1="210" y1="245" x2="210" y2="265" stroke="#7cbf6b" stroke-width="3" stroke-dasharray="5,3"/>
    <polygon points="205,260 215,260 210,250" fill="#7cbf6b"/>
    <text x="230" y="258" font-size="10" fill="#3a7a5a" font-weight="bold">Southbound API</text>
    <text x="230" y="270" font-size="9" fill="#5a7a6a">(OpenFlow)</text>
  </g>
  
  <!-- Infrastructure Layer -->
  <g class="layer-box layer-box-delay3" data-narration="Data Plane: OpenFlow switches that perform packet forwarding based on flow rules">
    <rect x="30" y="275" width="360" height="70" rx="8" fill="url(#layerGradient3)" filter="url(#shadow)"/>
    <text x="45" y="295" font-size="14" font-weight="bold" fill="white">Data Plane</text>
    <text x="45" y="308" font-size="10" fill="white" fill-opacity="0.9">(Forwarding)</text>
    
    <!-- Switch 1 -->
    <rect x="110" y="295" width="70" height="40" rx="5" fill="white"/>
    <circle cx="135" cy="315" r="10" fill="#e8a04c" class="switch-icon"/>
    <text x="135" y="319" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SW</text>
    <text x="160" y="312" font-size="9" fill="#8a5a2a" font-weight="bold">Switch 1</text>
    <text x="160" y="324" font-size="8" fill="#9a6a3a">OpenFlow</text>
    
    <!-- Switch 2 -->
    <rect x="200" y="295" width="70" height="40" rx="5" fill="white"/>
    <circle cx="225" cy="315" r="10" fill="#e8a04c" class="switch-icon" style="animation-delay:1s"/>
    <text x="225" y="319" text-anchor="middle" font-size="10" fill="white" font-weight="bold">SW</text>
    <text x="250" y="312" font-size="9" fill="#8a5a2a" font-weight="bold">Switch 2</text>
    <text x="250" y="324" font-size="8" fill="#9a6a3a">Flow Rules</text>
    
    <!-- Packets icon -->
    <circle cx="375" cy="315" r="12" fill="white"/>
    <text x="375" y="320" text-anchor="middle" font-size="14" fill="#d4863a">📦</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="layer-box" data-narration="Key SDN Concepts: Control/Data plane separation, programmable networks, centralized management">
    <rect x="30" y="355" width="360" height="35" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="45" y="368" font-size="9" fill="#666" font-weight="bold">Key: </text>
    <text x="70" y="368" font-size="8" fill="#555">Separation • Open APIs • Programmability</text>
    <text x="230" y="368" font-size="8" fill="#555">• Centralized Control • Automation</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="15" cy="100" r="3" fill="#5bb5d6" opacity="0.5"/>
  <circle cx="405" cy="100" r="3" fill="#5bb5d6" opacity="0.5"/>
  <circle cx="15" cy="215" r="3" fill="#7cbf6b" opacity="0.5"/>
  <circle cx="405" cy="215" r="3" fill="#7cbf6b" opacity="0.5"/>
  <circle cx="15" cy="320" r="3" fill="#e8a04c" opacity="0.5"/>
  <circle cx="405" cy="320" r="3" fill="#e8a04c" opacity="0.5"/>
</svg>