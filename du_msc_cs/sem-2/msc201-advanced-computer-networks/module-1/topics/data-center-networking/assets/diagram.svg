<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="data-center-networking">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e5f7"/>
    </linearGradient>
    <linearGradient id="spineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes trafficFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: bold; fill: #1e293b; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #fff; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 9px; fill: #64748b; }
    .concept-title { font-family: 'Segoe UI', sans-serif; font-size: 10px; font-weight: bold; fill: #1e293b; }
    .concept-text { font-family: 'Segoe UI', sans-serif; font-size: 8px; fill: #475569; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .traffic-arrow {
      stroke: #8b5cf6;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 5,5;
      animation: trafficFlow 1s linear infinite;
    }
    .spine-switch { animation: slideIn 0.5s ease-out forwards; opacity: 0; }
    .leaf-switch { animation: slideIn 0.5s ease-out 0.2s forwards; opacity: 0; }
    .server-rack { animation: slideIn 0.5s ease-out 0.4s forwards; opacity: 0; }
    .concept-box { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Data Center Networking</text>
  <text x="210" y="42" text-anchor="middle" class="detail slide-in">Spine-Leaf Topology (Clos Network)</text>
  
  <!-- Spine Switches -->
  <g class="spine-switch" data-narration="Spine switches form the backbone layer, providing high-speed interconnections between all leaf switches">
    <rect x="155" y="60" width="50" height="30" rx="5" fill="url(#spineGradient)" filter="url(#shadow)"/>
    <text x="180" y="80" text-anchor="middle" class="label">Spine 1</text>
  </g>
  <g class="spine-switch" data-narration="冗余的Spine层确保高可用性，支持多路径等价路由(ECMP)">
    <rect x="215" y="60" width="50" height="30" rx="5" fill="url(#spineGradient)" filter="url(#shadow)"/>
    <text x="240" y="80" text-anchor="middle" class="label">Spine 2</text>
  </g>
  
  <!-- Leaf Switches - Top Row -->
  <g class="leaf-switch" data-narration="Leaf switches连接Spine层和服务器，实现无阻塞的二层转发">
    <rect x="55" y="130" width="60" height="35" rx="5" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="85" y="152" text-anchor="middle" class="label">Leaf 1</text>
  </g>
  <g class="leaf-switch" data-narration="每个Leaf交换机连接到所有Spine交换机，实现Full-mesh拓扑">
    <rect x="145" y="130" width="60" height="35" rx="5" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="175" y="152" text-anchor="middle" class="label">Leaf 2</text>
  </g>
  <g class="leaf-switch" data-narration="Leaf层支持East-West流量，满足现代云原生应用的东西向通信需求">
    <rect x="215" y="130" width="60" height="35" rx="5" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="245" y="152" text-anchor="middle" class="label">Leaf 3</text>
  </g>
  <g class="leaf-switch" data-narration="Leaf交换机通常采用40G/100G端口连接服务器和存储设备">
    <rect x="305" y="130" width="60" height="35" rx="5" fill="url(#leafGradient)" filter="url(#shadow)"/>
    <text x="335" y="152" text-anchor="middle" class="label">Leaf 4</text>
  </g>
  
  <!-- Connections Spine to Leaf -->
  <line x1="180" y1="90" x2="85" y2="130" stroke="#94a3b8" stroke-width="1.5" class="fade-in"/>
  <line x1="180" y1="90" x2="175" y2="130" stroke="#94a3b8" stroke-width="1.5" class="fade-in"/>
  <line x1="180" y1="90" x2="245" y2="130" stroke="#94a3b8" stroke-width="1.5" class="fade-in"/>
  <line x1="180" y1="90" x2="335" y2="130" stroke="#94a3b8" stroke-width="1.5" class="fade-in"/>
  <line x1="240" y1="90" x2="85" y2="130" stroke="#94a3b8" stroke-width="1.5" class="fade-in"/>
  <line x1="240" y1="90" x2="175" y2="130" stroke="#94a3b8" stroke-width="1.5" class="fade-in"/>
  <line x1="240" y1="90" x2="245" y2="130" stroke="#94a3b8" stroke-width="1.5" class="fade-in"/>
  <line x1="240" y1="90" x2="335" y2="130" stroke="#94a3b8" stroke-width="1.5" class="fade-in"/>
  
  <!-- Server Racks -->
  <g class="server-rack" data-narration="服务器机架通过叶交换机接入网络，支持虚拟机和容器化工作负载">
    <rect x="30" y="200" width="45" height="60" rx="3" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <rect x="32" y="205" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="32" y="216" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="32" y="227" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="32" y="238" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <text x="52" y="273" text-anchor="middle" class="label" font-size="9">Server</text>
  </g>
  <g class="server-rack" data-narration="每台服务器配备SmartNIC，可实现RDMA和In-Network Computing">
    <rect x="85" y="200" width="45" height="60" rx="3" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <rect x="87" y="205" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="87" y="216" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="87" y="227" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="87" y="238" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <text x="107" y="273" text-anchor="middle" class="label" font-size="9">Server</text>
  </g>
  <g class="server-rack" data-narration="支持分布式训练等ML工作负载，通过RoCEv2实现低延迟RDMA">
    <rect x="140" y="200" width="45" height="60" rx="3" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <rect x="142" y="205" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="142" y="216" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="142" y="227" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="142" y="238" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <text x="162" y="273" text-anchor="middle" class="label" font-size="9">Server</text>
  </g>
  <g class="server-rack" data-narration="服务器集群支持水平扩展，满足云原生应用弹性伸缩需求">
    <rect x="195" y="200" width="45" height="60" rx="3" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <rect x="197" y="205" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="197" y="216" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="197" y="227" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="197" y="238" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <text x="217" y="273" text-anchor="middle" class="label" font-size="9">Server</text>
  </g>
  <g class="server-rack" data-narration="存储服务器通过高速网络互联，支持分布式文件系统">
    <rect x="250" y="200" width="45" height="60" rx="3" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <rect x="252" y="205" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="252" y="216" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="252" y="227" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="252" y="238" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <text x="272" y="273" text-anchor="middle" class="label" font-size="9">Server</text>
  </g>
  <g class="server-rack" data-narration="GPU服务器集群支持AI推理和训练任务，需要高带宽网络">
    <rect x="305" y="200" width="45" height="60" rx="3" fill="url(#serverGradient)" filter="url(#shadow)"/>
    <rect x="307" y="205" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="307" y="216" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="307" y="227" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <rect x="307" y="238" width="41" height="8" rx="1" fill="#fff" opacity="0.3"/>
    <text x="327" y="273" text-anchor="middle" class="label" font-size="9">Server</text>
  </g>
  
  <!-- Connections Leaf to Servers -->
  <line x1="85" y1="165" x2="52" y2="200" stroke="#94a3b8" stroke-width="1" class="fade-in"/>
  <line x1="85" y1="165" x2="107" y2="200" stroke="#94a3b8" stroke-width="1" class="fade-in"/>
  <line x1="175" y1="165" x2="162" y2="200" stroke="#94a3b8" stroke-width="1" class="fade-in"/>
  <line x1="175" y1="165" x2="217" y2="200" stroke="#94a3b8" stroke-width="1" class="fade-in"/>
  <line x1="245" y1="165" x2="272" y2="200" stroke="#94a3b8" stroke-width="1" class="fade-in"/>
  <line x1="245" y1="165" x2="327" y2="200" stroke="#94a3b8" stroke-width="1" class="fade-in"/>
  
  <!-- East-West Traffic Arrows -->
  <path d="M 140 150 Q 180 140 200 150" class="traffic-arrow pulse" data-narration="East-West流量：服务器间的横向通信，如分布式数据库和微服务间调用"/>
  <path d="M 270 150 Q 300 140 310 150" class="traffic-arrow pulse" data-narration="支持AI工作负载的跨节点通信，如分布式训练的梯度同步"/>
  
  <!-- Concept Boxes -->
  <g class="concept-box" data-narration="Clos拓扑提供Full Bisection带宽，支持无阻塞转发">
    <rect x="10" y="300" width="125" height="35" rx="5" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="315" class="concept-title">Full Bisection</text>
    <text x="15" y="327" class="concept-text">无阻塞架构</text>
  </g>
  <g class="concept-box" data-narration="SDN控制器实现网络可编程和集中化管理">
    <rect x="145" y="300" width="125" height="35" rx="5" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="150" y="315" class="concept-title">SDN Control</text>
    <text x="150" y="327" class="concept-text">集中式控制平面</text>
  </g>
  <g class="concept-box" data-narration="ECMP实现多路径负载均衡，提高网络利用率">
    <rect x="280" y="300" width="130" height="35" rx="5" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="285" y="315" class="concept-title">ECMP Routing</text>
    <text x="285" y="327" class="concept-text">等价多路径</text>
  </g>
  
  <!-- Layer Labels -->
  <text x="20" y="75" class="detail" font-size="10" font-weight="bold">Spine Layer</text>
  <text x="20" y="145" class="detail" font-size="10" font-weight="bold">Leaf Layer</text>
  <text x="20" y="215" class="detail" font-size="10" font-weight="bold">Server Tier</text>
  
  <!-- North-South / East-West Indicator -->
  <g transform="translate(380, 180)">
    <text x="0" y="0" class="detail" font-size="8" transform="rotate(-90)">East-West Traffic</text>
    <path d="M -5 20 L 5 20 L 0 30 Z" fill="#8b5cf6"/>
  </g>
</svg>