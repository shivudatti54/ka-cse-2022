<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="4g-5g-mobile-networks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e6f3ff"/>
    </linearGradient>
    <linearGradient id="4gGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3d9ff"/>
      <stop offset="100%" style="stop-color:#8cb3e6"/>
    </linearGradient>
    <linearGradient id="5gGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b3ff"/>
      <stop offset="100%" style="stop-color:#a38fe6"/>
    </linearGradient>
    <linearGradient id="archGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3ffd9"/>
      <stop offset="100%" style="stop-color:#8fe6b3"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #fff; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .box-4g { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .box-5g { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .box-arch { animation: slideInUp 0.7s ease-out forwards; opacity: 0; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title-anim">4G vs 5G Mobile Networks</text>
  <line x1="80" y1="38" x2="340" y2="38" stroke="#4a90d9" stroke-width="2" class="title-anim"/>
  
  <!-- 4G Section -->
  <g class="box-4g delay-1">
    <rect x="15" y="50" width="180" height="145" rx="8" fill="url(#4gGradient)" stroke="#6ba3d9" stroke-width="1.5"/>
    <text x="105" y="70" text-anchor="middle" class="section-title">4G (LTE-Advanced)</text>
    <text x="25" y="92" class="label" data-narration="4G peak speeds up to 1 Gbps">• Peak: 1 Gbps</text>
    <text x="25" y="110" class="label" data-narration="4G latency around 50ms">• Latency: ~50ms</text>
    <text x="25" y="128" class="label" data-narration="4G uses OFDMA modulation">• OFDMA</text>
    <text x="25" y="146" class="label" data-narration="4G has 2-8 antenna configuration">• 2-8 Antennas</text>
    <text x="25" y="164" class="label" data-narration="4G is human-centric services">• Human-centric</text>
    <text x="25" y="182" class="detail" data-narration="4G EPS-AKA security">• EPS-AKA Security</text>
  </g>
  
  <!-- 5G Section -->
  <g class="box-5g delay-1">
    <rect x="225" y="50" width="180" height="145" rx="8" fill="url(#5gGradient)" stroke="#8b6bd9" stroke-width="1.5"/>
    <text x="315" y="70" text-anchor="middle" class="section-title">5G (IMT-2020)</text>
    <text x="235" y="92" class="label" data-narration="5G peak speeds up to 20 Gbps">• Peak: 20 Gbps</text>
    <text x="235" y="110" class="label" data-narration="5G ultra-low latency under 1ms">• Latency: &lt;1ms</text>
    <text x="235" y="128" class="label" data-narration="5G uses FBMC modulation">• FBMC</text>
    <text x="235" y="146" class="label" data-narration="5G has massive MIMO with 64-256 antennas">• 64-256 Antennas</text>
    <text x="235" y="164" class="label" data-narration="5G supports IoT and mission-critical communications">• IoT/Mission-Critical</text>
    <text x="235" y="182" class="detail" data-narration="5G SUPI encryption and 5G-AKA enhanced security">• 5G-AKA Security</text>
  </g>
  
  <!-- Network Architecture -->
  <g class="box-arch delay-2">
    <rect x="15" y="205" width="390" height="140" rx="8" fill="url(#archGradient)" stroke="#6bd98f" stroke-width="1.5"/>
    <text x="210" y="225" text-anchor="middle" class="section-title" fill="#2c5f3d">5G Network Architecture</text>
    
    <!-- gNB -->
    <rect x="30" y="235" width="70" height="50" rx="5" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
    <text x="65" y="255" text-anchor="middle" class="label" font-weight="bold">gNB</text>
    <text x="65" y="270" text-anchor="middle" class="detail">Base Station</text>
    
    <!-- Arrow to AMF -->
    <line x1="100" y1="260" x2="140" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="120" y="252" text-anchor="middle" class="detail">N1/N2</text>
    
    <!-- AMF -->
    <rect x="145" y="235" width="70" height="50" rx="5" fill="#fff" stroke="#8b6bd9" stroke-width="2"/>
    <text x="180" y="255" text-anchor="middle" class="label" font-weight="bold">AMF</text>
    <text x="180" y="270" text-anchor="middle" class="detail">Control Plane</text>
    
    <!-- Arrow to UPF -->
    <line x1="215" y1="260" x2="255" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="235" y="252" text-anchor="middle" class="detail">N4</text>
    
    <!-- UPF -->
    <rect x="260" y="235" width="70" height="50" rx="5" fill="#fff" stroke="#4ad98f" stroke-width="2"/>
    <text x="295" y="255" text-anchor="middle" class="label" font-weight="bold">UPF</text>
    <text x="295" y="270" text-anchor="middle" class="detail">User Plane</text>
    
    <!-- Arrow to Internet -->
    <line x1="330" y1="260" x2="360" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="345" y="252" text-anchor="middle" class="detail">N6</text>
    
    <!-- Internet -->
    <rect x="365" y="240" width="35" height="30" rx="4" fill="#eee" stroke="#888" stroke-width="1"/>
    <text x="382" y="260" text-anchor="middle" class="detail">Internet</text>
    
    <!-- Edge Computing -->
    <rect x="260" y="295" width="70" height="40" rx="5" fill="#ffeaa7" stroke="#f39c12" stroke-width="2" class="pulse-element"/>
    <text x="295" y="315" text-anchor="middle" class="label" font-weight="bold">MEC</text>
    <text x="295" y="328" text-anchor="middle" class="detail">Edge Server</text>
    
    <!-- Arrow from UPF to Edge -->
    <line x1="295" y1="285" x2="295" y2="295" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Network Slicing -->
    <rect x="30" y="295" width="90" height="40" rx="5" fill="#dfe6e9" stroke="#636e72" stroke-width="1.5"/>
    <text x="75" y="312" text-anchor="middle" class="label" font-weight="bold">Network Slicing</text>
    <text x="75" y="327" text-anchor="middle" class="detail">eMBB/URLLC/mMTC</text>
    
    <!-- Arrow from gNB to slices -->
    <line x1="65" y1="285" x2="65" y2="295" stroke="#636e72" stroke-width="1"/>
  </g>
  
  <!-- Key Technologies Labels -->
  <g class="box-arch delay-3">
    <text x="210" y="365" text-anchor="middle" class="label" font-weight="bold" data-narration="Key technologies: Massive MIMO, mmWave, D2D, Edge Computing">Key: Massive MIMO • mmWave • D2D • Edge Computing</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="200" cy="50" r="3" fill="#4a90d9" opacity="0.5"/>
  <circle cx="220" cy="50" r="3" fill="#8b6bd9" opacity="0.5"/>
  <circle cx="210" cy="195" r="3" fill="#4ad98f" opacity="0.5"/>
</svg>