<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="mobile-ip-handoff" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="homeNetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9dc4dc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="foreignNetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveNode {
      0% { transform: translate(0, 0); }
      50% { transform: translate(100px, 0); }
      100% { transform: translate(100px, 0); }
    }
    @keyframes dashFlow {
      to { stroke-dashoffset: -20; }
    }
    .section { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.3s; }
    .section-3 { animation-delay: 0.5s; }
    .section-4 { animation-delay: 0.7s; }
    .title { animation: fadeIn 1s ease-out forwards; }
    .concept-box { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .concept-box:nth-child(odd) { animation: slideInLeft 0.6s ease-out forwards; }
    .concept-box:nth-child(even) { animation: slideInRight 0.6s ease-out forwards; }
    .arrow-line { stroke-dasharray: 5,5; animation: dashFlow 1s linear infinite; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .mn { animation: moveNode 4s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Mobile IP Handoff</text>
  
  <!-- Home Network Section -->
  <g class="section section-1" data-narration="Home Network: Contains the Home Agent (HA) which maintains the mobile node's permanent IP address">
    <rect x="20" y="60" width="160" height="140" rx="10" fill="url(#homeNetGrad)" filter="url(#shadow)"/>
    <text x="100" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5276">Home Network</text>
    <rect x="60" y="100" width="80" height="40" rx="5" fill="#3498db" class="pulse-element"/>
    <text x="100" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Home Agent</text>
    <text x="100" y="135" text-anchor="middle" font-size="10" fill="#1a5276">192.168.1.1</text>
  </g>
  
  <!-- Foreign Network Section -->
  <g class="section section-2" data-narration="Foreign Network: Where the mobile node visits; contains Foreign Agents that assign temporary Care-of Addresses">
    <rect x="240" y="60" width="160" height="140" rx="10" fill="url(#foreignNetGrad)" filter="url(#shadow)"/>
    <text x="320" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e8449">Foreign Network</text>
    
    <!-- FA1 -->
    <rect x="255" y="100" width="65" height="40" rx="5" fill="#27ae60"/>
    <text x="287" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="white">FA1</text>
    <text x="287" y="133" text-anchor="middle" font-size="9" fill="#145a32">10.0.1.1</text>
    
    <!-- FA2 -->
    <rect x="325" y="100" width="65" height="40" rx="5" fill="#27ae60" class="pulse-element"/>
    <text x="357" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="white">FA2</text>
    <text x="357" y="133" text-anchor="middle" font-size="9" fill="#145a32">10.0.2.1</text>
  </g>
  
  <!-- Mobile Node -->
  <g class="section section-3 mn" data-narration="Mobile Node: Device moving between networks, maintaining connectivity via IP address management">
    <circle cx="155" cy="280" r="30" fill="#e74c3c" filter="url(#shadow)"/>
    <text x="155" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MN</text>
    <text x="155" y="290" text-anchor="middle" font-size="9" fill="white">Home IP:</text>
    <text x="155" y="302" text-anchor="middle" font-size="8" fill="white">10.5.15.2</text>
  </g>
  
  <!-- Data Tunnel Arrows -->
  <g class="section section-4" data-narration="Tunneling: HA creates tunnel to FA for seamless packet delivery during handoff">
    <!-- Tunnel from HA to FA1 -->
    <path d="M 100 140 Q 100 200 155 220" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
    <text x="80" y="190" font-size="9" fill="#d35400">Tunnel</text>
    
    <!-- Tunnel from HA to FA2 -->
    <path d="M 120 140 Q 220 180 330 200" stroke="#9b59b6" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
    <text x="210" y="165" font-size="9" fill="#7d3c98">New Tunnel</text>
  </g>
  
  <!-- Concept Boxes -->
  <g data-narration="Care-of Address (CoA): Temporary IP address assigned to MN in foreign network">
    <rect x="20" y="320" width="120" height="35" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
    <text x="80" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#856404">Care-of Address</text>
    <text x="80" y="348" text-anchor="middle" font-size="9" fill="#856404">Temp IP in visited net</text>
  </g>
  
  <g data-narration="Handoff Types: Hard (break-before-make), Soft (make-before-break), Fast (predictive L3)">
    <rect x="150" y="320" width="130" height="35" rx="5" fill="#d1ecf1" stroke="#17a2b8" stroke-width="1"/>
    <text x="215" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#0c5460">Handoff Types</text>
    <text x="215" y="348" text-anchor="middle" font-size="8" fill="#0c5460">Hard | Soft | Fast</text>
  </g>
  
  <g data-narration="Registration: MN registers new CoA with Home Agent to maintain connectivity">
    <rect x="290" y="320" width="110" height="35" rx="5" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
    <text x="345" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="#155724">Registration</text>
    <text x="345" y="348" text-anchor="middle" font-size="8" fill="#155724">CoA → HA Update</text>
  </g>
  
  <!-- Handoff Arrow -->
  <g>
    <path d="M 255 280 L 315 280" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="285" y="270" text-anchor="middle" font-size="10" fill="#333">Handoff</text>
  </g>
  
  <!-- Legend -->
  <g>
    <rect x="20" y="360" width="180" height="30" rx="5" fill="white" stroke="#ccc" stroke-width="1"/>
    <circle cx="35" cy="375" r="5" fill="#e74c3c"/>
    <text x="50" y="378" font-size="10" fill="#333">Mobile Node</text>
    <rect x="115" y="370" width="10" height="10" fill="#3498db"/>
    <text x="130" y="378" font-size="10" fill="#333">Home Agent</text>
  </g>
  
  <g>
    <rect x="210" y="360" width="190" height="30" rx="5" fill="white" stroke="#ccc" stroke-width="1"/>
    <rect x="225" y="370" width="10" height="10" fill="#27ae60"/>
    <text x="240" y="378" font-size="10" fill="#333">Foreign Agent</text>
    <path d="M 310 375 L 340 375" stroke="#e67e22" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="305" y="368" font-size="8" fill="#d35400">Tunnel</text>
  </g>
</svg>