<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="wifi-802-11-standards" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fbdd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff59d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffccbc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffab91;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateY(-20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .card-1 { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .card-2 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .card-3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .card-4 { animation: fadeIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .card-5 { animation: fadeIn 0.6s ease-out 1.0s forwards; opacity: 0; }
    .key-box { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
    .arrow-line { animation: arrowPulse 2s linear infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-size="18" font-weight="bold" fill="#2c3e50">Wi-Fi 802.11 Standards Evolution</text>
  
  <!-- Standard Cards -->
  <!-- 802.11a/g -->
  <g class="card-1" data-narration="802.11a/g introduced OFDM modulation in 5GHz and 2.4GHz bands">
    <rect x="15" y="45" width="75" height="55" rx="5" fill="url(#cardGradient1)" stroke="#5d8aa8" stroke-width="1"/>
    <text x="52" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">802.11a/g</text>
    <text x="52" y="78" text-anchor="middle" font-size="9" fill="#34495e">OFDM</text>
    <text x="52" y="90" text-anchor="middle" font-size="9" fill="#34495e">54 Mbps</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M95 72 L120 72" stroke="#5d8aa8" stroke-width="2" fill="none" class="arrow-line" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#5d8aa8"/></marker></defs>
  
  <!-- 802.11n -->
  <g class="card-2" data-narration="802.11n added MIMO and 40MHz channels, enabling up to 600Mbps">
    <rect x="125" y="45" width="75" height="55" rx="5" fill="url(#cardGradient2)" stroke="#4caf50" stroke-width="1"/>
    <text x="162" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">802.11n</text>
    <text x="162" y="78" text-anchor="middle" font-size="9" fill="#34495e">MIMO</text>
    <text x="162" y="90" text-anchor="middle" font-size="9" fill="#34495e">600 Mbps</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M205 72 L230 72" stroke="#4caf50" stroke-width="2" fill="none" class="arrow-line" marker-end="url(#arrowhead2)"/>
  <defs><marker id="arrowhead2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#4caf50"/></marker></defs>
  
  <!-- 802.11ac -->
  <g class="card-3" data-narration="802.11ac introduced 160MHz channels, 256-QAM and MU-MIMO downlink">
    <rect x="235" y="45" width="75" height="55" rx="5" fill="url(#cardGradient3)" stroke="#f9a825" stroke-width="1"/>
    <text x="272" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">802.11ac</text>
    <text x="272" y="78" text-anchor="middle" font-size="9" fill="#34495e">160MHz</text>
    <text x="272" y="90" text-anchor="middle" font-size="9" fill="#34495e">3.5 Gbps</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M315 72 L340 72" stroke="#f9a825" stroke-width="2" fill="none" class="arrow-line" marker-end="url(#arrowhead3)"/>
  <defs><marker id="arrowhead3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#f9a825"/></marker></defs>
  
  <!-- 802.11ax -->
  <g class="card-4" data-narration="802.11ax (Wi-Fi 6) brings OFDMA, 1024-QAM for improved efficiency in dense environments">
    <rect x="345" y="45" width="65" height="55" rx="5" fill="url(#cardGradient4)" stroke="#8e44ad" stroke-width="1"/>
    <text x="377" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">802.11ax</text>
    <text x="377" y="78" text-anchor="middle" font-size="9" fill="#34495e">Wi-Fi 6</text>
    <text x="377" y="90" text-anchor="middle" font-size="9" fill="#34495e">9.6 Gbps</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M377 105 L377 125" stroke="#8e44ad" stroke-width="2" fill="none" class="arrow-line" marker-end="url(#arrowhead4)"/>
  <defs><marker id="arrowhead4" markerWidth="6" markerHeight="6" refX="3" refY="5" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#8e44ad"/></marker></defs>
  
  <!-- 802.11be -->
  <g class="card-5" data-narration="802.11be (Wi-Fi 7) features 320MHz, Multi-Link Operation and 4096-QAM">
    <rect x="345" y="130" width="65" height="55" rx="5" fill="url(#cardGradient5)" stroke="#e64a19" stroke-width="1"/>
    <text x="377" y="147" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">802.11be</text>
    <text x="377" y="163" text-anchor="middle" font-size="9" fill="#34495e">Wi-Fi 7</text>
    <text x="377" y="175" text-anchor="middle" font-size="9" fill="#34495e">30 Gbps</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="key-box" data-narration="Key MAC/PHY enhancements include CSMA/CA, OFDMA, TWT and advanced MIMO">
    <rect x="15" y="200" width="390" height="85" rx="5" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4"/>
    <text x="25" y="220" font-size="13" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    <text x="25" y="240" font-size="10" fill="#34495e">• MAC: CSMA/CA, NAV, Frame Aggregation, TWT</text>
    <text x="25" y="255" font-size="10" fill="#34495e">• PHY: OFDM → MIMO → MU-MIMO → OFDMA</text>
    <text x="25" y="270" font-size="10" fill="#34495e">• Features: Beamforming, BSS Coloring, MLO</text>
    <text x="210" y="285" font-size="9" fill="#7f8c8d" text-anchor="middle">Security: WEP → WPA2 → WPA3</text>
  </g>
  
  <!-- Protocol Stack Visual -->
  <g class="key-box" data-narration="The OSI model shows PHY and MAC layers as the lower layers of 802.11 stack">
    <rect x="15" y="295" width="180" height="90" rx="5" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1"/>
    <text x="105" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">802.11 Protocol Stack</text>
    <rect x="25" y="320" width="160" height="18" rx="3" fill="#3498db"/>
    <text x="105" y="333" text-anchor="middle" font-size="9" fill="white">MAC Layer</text>
    <rect x="25" y="342" width="160" height="18" rx="3" fill="#e74c3c"/>
    <text x="105" y="355" text-anchor="middle" font-size="9" fill="white">PHY Layer</text>
    <rect x="25" y="364" width="160" height="15" rx="3" fill="#9b59b6"/>
    <text x="105" y="375" text-anchor="middle" font-size="8" fill="white">RF/Analog</text>
  </g>
  
  <!-- Channel Access Box -->
  <g class="key-box" data-narration="Channel access evolved from basic DCF to EDCA for QoS, then OFDMA for multi-user efficiency">
    <rect x="205" y="295" width="200" height="90" rx="5" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1"/>
    <text x="305" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Channel Access</text>
    <text x="215" y="330" font-size="9" fill="#34495e">• DCF (Distributed Coordination)</text>
    <text x="215" y="345" font-size="9" fill="#34495e">• EDCA (Enhanced DCF)</text>
    <text x="215" y="360" font-size="9" fill="#34495e">• OFDMA (Multi-RU)</text>
    <text x="215" y="375" font-size="9" fill="#34495e">• MLO (Multi-Link Op.)</text>
  </g>
  
  <!-- Frequency Bands Indicator -->
  <g class="card-3">
    <rect x="235" y="130" width="100" height="25" rx="3" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="285" y="147" text-anchor="middle" font-size="9" fill="#e65100">2.4 / 5 / 6 GHz</text>
  </g>
</svg>