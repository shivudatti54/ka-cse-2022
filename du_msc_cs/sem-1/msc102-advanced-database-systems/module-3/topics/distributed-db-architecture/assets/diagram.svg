<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="distributed-db-architecture" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d1e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="coordinatorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="participantGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7bb8a0"/>
      <stop offset="100%" style="stop-color:#4a8b72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 1; }
      50% { stroke-opacity: 0.5; }
    }
    .title { animation: fadeIn 1s ease-out forwards; font-family: 'Segoe UI', Arial, sans-serif; }
    .node-coordinator { animation: fadeIn 0.8s ease-out 0.2s forwards, pulse 3s ease-in-out 2s infinite; transform-origin: center; opacity: 0; }
    .node-participant { animation: fadeIn 0.8s ease-out 0.4s forwards, pulse 3s ease-in-out 2.5s infinite; transform-origin: center; opacity: 0; }
    .arrow-prepare { animation: slideInRight 0.6s ease-out 0.8s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; opacity: 0; }
    .arrow-vote { animation: slideInLeft 0.6s ease-out 1.2s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; opacity: 0; }
    .arrow-commit { animation: slideInRight 0.6s ease-out 1.8s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; opacity: 0; }
    .arrow-ack { animation: slideInLeft 0.6s ease-out 2.4s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; opacity: 0; }
    .concept-box { animation: fadeIn 1s ease-out 0.6s forwards; opacity: 0; }
    .phase-label { animation: fadeIn 0.5s ease-out; }
    .legend-item { animation: fadeIn 0.5s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" fill="#2d5a6b" font-size="18" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Distributed DB Architecture</text>
  <text x="210" y="46" text-anchor="middle" class="title" fill="#4a6a7a" font-size="12" font-family="Segoe UI, Arial, sans-serif">Two-Phase Commit Protocol</text>
  
  <!-- Coordinator Node -->
  <g class="node-coordinator" transform="translate(210, 90)">
    <ellipse cx="0" cy="0" rx="45" ry="30" fill="url(#coordinatorGrad)" filter="url(#shadow)"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Coordinator</text>
    <text x="0" y="10" text-anchor="middle" fill="#e8f4f8" font-size="10" font-family="Segoe UI, Arial, sans-serif">Transaction Manager</text>
  </g>
  
  <!-- Participant Nodes -->
  <g class="node-participant" transform="translate(120, 200)">
    <ellipse cx="0" cy="0" rx="40" ry="28" fill="url(#participantGrad)" filter="url(#shadow)"/>
    <text x="0" y="-4" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Participant 1</text>
    <text x="0" y="10" text-anchor="middle" fill="#e8f4f8" font-size="9" font-family="Segoe UI, Arial, sans-serif">DB Node A</text>
  </g>
  
  <g class="node-participant" transform="translate(300, 200)">
    <ellipse cx="0" cy="0" rx="40" ry="28" fill="url(#participantGrad)" filter="url(#shadow)"/>
    <text x="0" y="-4" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Participant 2</text>
    <text x="0" y="10" text-anchor="middle" fill="#e8f4f8" font-size="9" font-family="Segoe UI, Arial, sans-serif">DB Node B</text>
  </g>
  
  <!-- Arrows - Phase 1: Prepare -->
  <g data-narration="Coordinator sends PREPARE to all participants">
    <path d="M 195 115 Q 160 150 135 170" stroke="#4a90a4" stroke-width="2" fill="none" class="arrow-prepare" marker-end="url(#arrowhead)"/>
    <path d="M 225 115 Q 260 150 285 170" stroke="#4a90a4" stroke-width="2" fill="none" class="arrow-prepare" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a90a4"/>
    </marker>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7bb8a0"/>
    </marker>
  </defs>
  
  <!-- Phase Labels -->
  <text x="80" y="145" class="phase-label" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">PREPARE</text>
  <text x="290" y="145" class="phase-label" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">PREPARE</text>
  
  <!-- Arrows - Phase 2: Vote -->
  <g data-narration="Participants vote YES/NO">
    <path d="M 135 230 Q 160 180 195 175" stroke="#7bb8a0" stroke-width="2" fill="none" class="arrow-vote" marker-end="url(#arrowhead2)"/>
    <path d="M 285 230 Q 260 180 225 175" stroke="#7bb8a0" stroke-width="2" fill="none" class="arrow-vote" marker-end="url(#arrowhead2)"/>
  </g>
  
  <text x="90" y="210" class="phase-label" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">VOTE</text>
  <text x="290" y="210" class="phase-label" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">VOTE</text>
  
  <!-- Arrows - Phase 3: Commit -->
  <g data-narration="Coordinator sends COMMIT if all vote YES">
    <path d="M 195 115 Q 160 150 135 170" stroke="#5a9a6a" stroke-width="2" fill="none" class="arrow-commit" marker-end="url(#arrowhead2)" stroke-dasharray="5,3"/>
    <path d="M 225 115 Q 260 150 285 170" stroke="#5a9a6a" stroke-width="2" fill="none" class="arrow-commit" marker-end="url(#arrowhead2)" stroke-dasharray="5,3"/>
  </g>
  
  <text x="80" y="155" class="phase-label" fill="#5a9a6a" font-size="9" font-family="Segoe UI, Arial, sans-serif">COMMIT</text>
  <text x="295" y="155" class="phase-label" fill="#5a9a6a" font-size="9" font-family="Segoe UI, Arial, sans-serif">COMMIT</text>
  
  <!-- Arrows - Phase 4: ACK -->
  <g data-narration="Participants acknowledge commit completion">
    <path d="M 135 230 Q 160 180 195 175" stroke="#6a8a7a" stroke-width="2" fill="none" class="arrow-ack" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>
    <path d="M 285 230 Q 260 180 225 175" stroke="#6a8a7a" stroke-width="2" fill="none" class="arrow-ack" marker-end="url(#arrowhead)" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Phase Box -->
  <g class="concept-box" data-narration="The Two-Phase Commit ensures atomicity across distributed nodes">
    <rect x="10" y="270" width="180" height="115" fill="white" stroke="#d1e8f0" stroke-width="1" rx="6" filter="url(#shadow)"/>
    <text x="20" y="290" fill="#2d5a6b" font-size="12" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Phase 1: Prepare</text>
    <text x="20" y="308" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">Coordinator requests</text>
    <text x="20" y="322" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">participants to prepare</text>
    <text x="20" y="340" fill="#2d5a6b" font-size="12" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Phase 2: Commit</text>
    <text x="20" y="358" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">If all vote YES, send</text>
    <text x="20" y="372" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">COMMIT; else ROLLBACK</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key concepts in distributed databases include fragmentation, replication, and consistency models">
    <rect x="200" y="270" width="205" height="115" fill="white" stroke="#d1e8f0" stroke-width="1" rx="6" filter="url(#shadow)"/>
    <text x="210" y="290" fill="#2d5a6b" font-size="12" font-weight="bold" font-family="Segoe UI, Arial, sans-serif">Key Concepts</text>
    <circle cx="215" cy="310" r="4" fill="#4a90a4"/>
    <text x="225" y="314" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">Data Fragmentation</text>
    <circle cx="215" cy="328" r="4" fill="#7bb8a0"/>
    <text x="225" y="332" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">Replication Strategies</text>
    <circle cx="215" cy="346" r="4" fill="#5a9a6a"/>
    <text x="225" y="350" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">Consistency Models</text>
    <circle cx="215" cy="364" r="4" fill="#8a7a6a"/>
    <text x="225" y="368" fill="#4a6a7a" font-size="10" font-family="Segoe UI, Arial, sans-serif">CAP &amp; PACELC Theorems</text>
  </g>
  
  <!-- Legend -->
  <g class="legend-item" transform="translate(10, 395)">
    <rect x="0" y="-12" width="12" height="8" fill="#4a90a4" rx="2"/>
    <text x="16" y="-5" fill="#4a6a7a" font-size="9" font-family="Segoe UI, Arial, sans-serif">Coordinator</text>
    <rect x="80" y="-12" width="12" height="8" fill="#7bb8a0" rx="2"/>
    <text x="96" y="-5" fill="#4a6a7a" font-size="9" font-family="Segoe UI, Arial, sans-serif">Participant</text>
  </g>
</svg>