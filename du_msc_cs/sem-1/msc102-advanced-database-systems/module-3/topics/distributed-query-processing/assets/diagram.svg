<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="distributed-query-processing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e5f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="siteAGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="siteBGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resultGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ba68c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b1fa2;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1565c0; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #37474f; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #546e7a; }
    .box-title { font-family: Arial, sans-serif; font-size: 12px; fill: #ffffff; font-weight: bold; }
    .box-detail { font-family: Arial, sans-serif; font-size: 10px; fill: #e8f5e9; }
    .animate-fade { animation: fadeIn 1s ease-out forwards; }
    .animate-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .animate-slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-flow { animation: dataFlow 1.5s linear infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title animate-fade">Distributed Query Processing</text>
  
  <!-- Query Input Box -->
  <g class="animate-slide-left delay-1">
    <rect x="20" y="45" width="100" height="55" rx="6" fill="#eceff1" stroke="#78909c" stroke-width="2" />
    <text x="70" y="62" text-anchor="middle" class="label" style="font-size:12px;">Input Query</text>
    <text x="70" y="78" text-anchor="middle" class="detail">SELECT * FROM</text>
    <text x="70" y="90" text-anchor="middle" class="detail">Customers, Orders</text>
  </g>
  
  <!-- Arrow from Query to Decomposition -->
  <line x1="125" y1="72" x2="150" y2="72" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Query Decomposition -->
  <g class="animate-slide-up delay-2">
    <rect x="155" y="50" width="110" height="50" rx="6" fill="url(#nodeGradient)" />
    <text x="210" y="70" text-anchor="middle" class="box-title">Query Decomposition</text>
    <text x="210" y="85" text-anchor="middle" class="box-detail">Normalize • Analyze • Simplify</text>
  </g>
  
  <!-- Arrow to Sites -->
  <line x1="270" y1="72" x2="295" y2="72" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Optimization -->
  <g class="animate-slide-up delay-3">
    <rect x="300" y="50" width="105" height="50" rx="6" fill="url(#nodeGradient)" />
    <text x="352" y="70" text-anchor="middle" class="box-title">Optimization</text>
    <text x="352" y="85" text-anchor="middle" class="box-detail">Cost Model • Join Strategy</text>
  </g>
  
  <!-- Site A - Customer Data -->
  <g class="animate-slide-left delay-2" data-narration="Site A contains Customer table with customer information">
    <rect x="30" y="140" width="120" height="80" rx="8" fill="url(#siteAGradient)" />
    <text x="90" y="160" text-anchor="middle" class="box-title">Site A: Customer</text>
    <text x="90" y="178" text-anchor="middle" class="box-detail">cust_id, name, city</text>
    <text x="90" y="193" text-anchor="middle" class="box-detail">Region: North</text>
    <rect x="45" y="205" width="90" height="8" rx="2" fill="#a5d6a7" />
    <text x="90" y="212" text-anchor="middle" class="box-detail" style="fill:#1b5e20;">Horizontal Fragment</text>
  </g>
  
  <!-- Site B - Orders Data -->
  <g class="animate-slide-right delay-2" data-narration="Site B contains Orders table with transaction data">
    <rect x="270" y="140" width="120" height="80" rx="8" fill="url(#siteBGradient)" />
    <text x="330" y="160" text-anchor="middle" class="box-title">Site B: Orders</text>
    <text x="330" y="178" text-anchor="middle" class="box-detail">order_id, cust_id, amount</text>
    <text x="330" y="193" text-anchor="middle" class="box-detail">Amount > 10000</text>
    <rect x="285" y="205" width="90" height="8" rx="2" fill="#ffcc80" />
    <text x="330" y="212" text-anchor="middle" class="box-detail" style="fill:#e65100;">Selection Filter</text>
  </g>
  
  <!-- Network Transfer Animation -->
  <g class="animate-fade delay-3" data-narration="Network transfer of projected data between sites">
    <path d="M 150 180 Q 210 120 270 180" fill="none" stroke="#90a4ae" stroke-width="3" stroke-dasharray="8,4" class="animate-flow" />
    <polygon points="265,165 275,180 265,195" fill="#90a4ae" />
    <text x="210" y="145" text-anchor="middle" class="detail" style="font-size:10px;">Semijoin Transfer</text>
    <text x="210" y="158" text-anchor="middle" class="detail" style="font-size:9px;">(Projected Order IDs)</text>
  </g>
  
  <!-- Network Lines -->
  <line x1="155" y1="180" x2="265" y2="180" stroke="#78909c" stroke-width="2" stroke-dasharray="5,3" class="animate-fade delay-3" />
  <polygon points="260,175 270,180 260,185" fill="#78909c" class="animate-fade delay-3" />
  
  <!-- Join Operation -->
  <g class="animate-slide-up delay-4" data-narration="Distributed join combines data from both sites">
    <rect x="160" y="245" width="100" height="45" rx="6" fill="#78909c" />
    <text x="210" y="263" text-anchor="middle" class="box-title" style="fill:#eceff1;">Distributed Join</text>
    <text x="210" y="278" text-anchor="middle" class="box-detail" style="fill:#cfd8dc;">Hash Join Strategy</text>
  </g>
  
  <!-- Arrow to Result -->
  <line x1="210" y1="290" x2="210" y2="315" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowhead)" class="animate-fade delay-4" />
  
  <!-- Result Node -->
  <g class="animate-pulse delay-5" data-narration="Final joined result returned to user">
    <ellipse cx="210" cy="350" rx="55" ry="28" fill="url(#resultGradient)" />
    <text x="210" y="345" text-anchor="middle" class="box-title">Result</text>
    <text x="210" y="360" text-anchor="middle" class="box-detail">Delhi customers</text>
    <text x="210" y="372" text-anchor="middle" class="box-detail">with orders &gt;₹10k</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="animate-fade delay-4" data-narration="Key concepts: Data fragmentation, replication, and cost optimization">
    <rect x="20" y="295" width="95" height="90" rx="5" fill="#ffffff" stroke="#b0bec5" stroke-width="1" opacity="0.9" />
    <text x="67" y="310" text-anchor="middle" class="label" style="font-size:11px;">Key Concepts</text>
    <line x1="25" y1="318" x2="110" y2="318" stroke="#cfd8dc" stroke-width="1" />
    <text x="28" y="332" class="detail" style="font-size:9px;">• Horizontal Fragment</text>
    <text x="28" y="345" class="detail" style="font-size:9px;">• Vertical Fragment</text>
    <text x="28" y="358" class="detail" style="font-size:9px;">• Semijoin Strategy</text>
    <text x="28" y="371" class="detail" style="font-size:9px;">• Cost = CPU+I/O+Net</text>
    <text x="28" y="384" class="detail" style="font-size:9px;">• 2PL Concurrency</text>
  </g>
  
  <!-- Cost Model Box -->
  <g class="animate-fade delay-5">
    <rect x="305" y="295" width="100" height="90" rx="5" fill="#fff3e0" stroke="#ffcc80" stroke-width="1" opacity="0.9" />
    <text x="355" y="310" text-anchor="middle" class="label" style="font-size:11px;">Cost Model</text>
    <line x1="310" y1="318" x2="400" y2="318" stroke="#ffe0b2" stroke-width="1" />
    <text x="355" y="335" text-anchor="middle" class="detail" style="font-size:10px; fill:#e65100;">Total Cost =</text>
    <text x="355" y="350" text-anchor="middle" class="detail" style="font-size:10px; fill:#e65100;">CPU + I/O +</text>
    <text x="355" y="365" text-anchor="middle" class="detail" style="font-size:10px; fill:#e65100;">Communication</text>
    <text x="355" y="380" text-anchor="middle" class="detail" style="font-size:9px; fill:#8d6e63;">Dynamic Opt.</text>
  </g>
  
  <!-- Bottom Labels -->
  <g class="animate-fade delay-5" data-narration="Example query: Retrieve Delhi customers with orders over ₹10,000">
    <rect x="125" y="375" width="170" height="20" rx="3" fill="#e1f5fe" stroke="#81d4fa" stroke-width="1" />
    <text x="210" y="389" text-anchor="middle" class="detail" style="font-size:9px; fill:#0277bd;">Example: Semijoin Optimization</text>
  </g>
</svg>