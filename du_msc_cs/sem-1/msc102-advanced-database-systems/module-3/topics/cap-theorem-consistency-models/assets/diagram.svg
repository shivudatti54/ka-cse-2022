<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="cap-theorem-consistency-models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8f0"/>
    </linearGradient>
    <linearGradient id="consistencyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="availabilityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="partitionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe5d9"/>
      <stop offset="100%" style="stop-color:#ffd7ba"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section-4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .triangle { animation: fadeIn 1s ease-out 0.3s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .vertex { animation: fadeIn 0.5s ease-out forwards; }
    .line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
    .box { transition: transform 0.3s ease; }
    .box:hover { transform: translateY(-2px); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" class="title" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50">CAP Theorem</text>
  <text x="210" y="46" class="title" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5d6d7e">Consistency Models</text>
  
  <!-- CAP Triangle -->
  <g class="triangle" transform="translate(210, 200)">
    <!-- Triangle lines -->
    <line x1="0" y1="-80" x2="70" y2="40" class="line" stroke="#cbd5e1" stroke-width="3"/>
    <line x1="70" y1="40" x2="-70" y2="40" class="line" stroke="#cbd5e1" stroke-width="3" style="animation-delay: 0.3s"/>
    <line x1="-70" y1="40" x2="0" y2="-80" class="line" stroke="#cbd5e1" stroke-width="3" style="animation-delay: 0.6s"/>
    
    <!-- Consistency Vertex -->
    <g class="vertex" transform="translate(0, -80)">
      <circle r="28" fill="url(#consistencyGrad)" filter="url(#shadow)"/>
      <text y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">C</text>
      <text y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Consistency</text>
    </g>
    
    <!-- Availability Vertex -->
    <g class="vertex" transform="translate(70, 40)">
      <circle r="28" fill="url(#availabilityGrad)" filter="url(#shadow)"/>
      <text y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">A</text>
      <text y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Availability</text>
    </g>
    
    <!-- Partition Tolerance Vertex -->
    <g class="vertex" transform="translate(-70, 40)">
      <circle r="28" fill="url(#partitionGrad)" filter="url(#shadow)"/>
      <text y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">P</text>
      <text y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34495e">Partition</text>
    </g>
  </g>
  
  <!-- Trade-off Labels -->
  <g class="section-1" data-narration="CP Systems sacrifice availability for consistency">
    <rect x="255" y="95" width="150" height="50" rx="8" fill="#e8f4f8" stroke="#a8d8ea" stroke-width="2" filter="url(#shadow)"/>
    <text x="330" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2980b9">CP Systems</text>
    <text x="330" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">Spanner, HBase</text>
    <line x1="250" y1="128" x2="255" y2="128" stroke="#7ec8e3" stroke-width="2"/>
  </g>
  
  <g class="section-2" data-narration="AP Systems sacrifice consistency for availability">
    <rect x="15" y="250" width="150" height="50" rx="8" fill="#eafaf1" stroke="#b8e0d2" stroke-width="2" filter="url(#shadow)"/>
    <text x="90" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">AP Systems</text>
    <text x="90" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">Cassandra, DynamoDB</text>
    <line x1="165" y1="263" x2="170" y2="263" stroke="#95d5b2" stroke-width="2"/>
  </g>
  
  <g class="section-3" data-narration="CA Systems are theoretical; partitions cannot occur">
    <rect x="255" y="250" width="150" height="50" rx="8" fill="#fef5e7" stroke="#ffe5d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="330" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d35400">CA Systems</text>
    <text x="330" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">Single-node RDBMS</text>
    <line x1="250" y1="263" x2="255" y2="263" stroke="#ffd7ba" stroke-width="2"/>
  </g>
  
  <!-- Consistency Models Box -->
  <g class="section-4" data-narration="Strong vs Eventual Consistency models">
    <rect x="15" y="95" width="150" height="50" rx="8" fill="#f5eef8" stroke="#d7bde2" stroke-width="2" filter="url(#shadow)"/>
    <text x="90" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad">Consistency Models</text>
    <text x="90" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">Strong: ACID</text>
    <text x="90" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5d6d7e">Eventual: BASE</text>
    <line x1="165" y1="120" x2="170" y2="120" stroke="#d7bde2" stroke-width="2"/>
  </g>
  
  <!-- PACELC Theorem -->
  <g class="section-4" data-narration="PACELC extends CAP with latency vs consistency trade-off">
    <rect x="150" y="330" width="120" height="35" rx="6" fill="#fdebd0" stroke="#f5cba7" stroke-width="2"/>
    <text x="210" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b7950b">PACELC Theorem</text>
    <text x="210" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7d6608">Else: Latency vs Consistency</text>
  </g>
  
  <!-- Key Insight -->
  <g class="section-3" data-narration="CAP Theorem states only 2 of 3 can be guaranteed">
    <rect x="80" y="365" width="260" height="25" rx="5" fill="#ebf5fb" stroke="#aed6f1" stroke-width="1"/>
    <text x="210" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2980b9">Only 2 of 3 can be guaranteed simultaneously</text>
  </g>
  
  <!-- Center label showing "Pick 2" -->
  <g class="pulse" transform="translate(210, 200)">
    <circle r="22" fill="#fff" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/>
    <text y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">Pick 2</text>
  </g>
</svg>