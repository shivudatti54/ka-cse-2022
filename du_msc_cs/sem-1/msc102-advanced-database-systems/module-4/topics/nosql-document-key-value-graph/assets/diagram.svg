<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="nosql-document-key-value-graph">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="kvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="graphGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1565c0; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; }
    .box { rx: 8; ry: 8; stroke-width: 2; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s infinite; }
    .connector { stroke: #78909c; stroke-width: 1.5; stroke-dasharray: 4,3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-slide">NoSQL Database Types</text>
  
  <!-- Document Database Section -->
  <g data-narration="Document databases store data as JSON/BSON documents with flexible schemas">
    <rect x="15" y="50" width="120" height="130" fill="url(#docGradient)" class="box" stroke="#1976d2" style="animation: fadeIn 0.5s ease-out forwards; opacity: 0;"/>
    <text x="75" y="70" text-anchor="middle" class="label" fill="#0d47a1">Document</text>
    <text x="75" y="88" text-anchor="middle" class="detail" fill="#1565c0">{ "name": "Blog",</text>
    <text x="75" y="100" text-anchor="middle" class="detail" fill="#1565c0">  "tags": ["tech"],</text>
    <text x="75" y="112" text-anchor="middle" class="detail" fill="#1565c0">  "author": {...} }</text>
    <text x="75" y="130" text-anchor="middle" class="detail" fill="#1976d2">MongoDB</text>
    <circle cx="75" cy="160" r="8" fill="#4caf50" class="anim-pulse"/>
    <text x="75" y="164" text-anchor="middle" class="detail" fill="#fff" font-size="9">+</text>
  </g>
  
  <!-- Key-Value Section -->
  <g data-narration="Key-value stores use a simple model with unique keys mapping to values">
    <rect x="150" y="50" width="120" height="130" fill="url(#kvGradient)" class="box" stroke="#f57c00" style="animation: fadeIn 0.7s ease-out forwards; opacity: 0;"/>
    <text x="210" y="70" text-anchor="middle" class="label" fill="#e65100">Key-Value</text>
    <text x="210" y="90" text-anchor="middle" class="detail" fill="#ef6c00">user:123 →</text>
    <text x="210" y="104" text-anchor="middle" class="detail" fill="#ef6c00">  {name: "John",</text>
    <text x="210" y="116" text-anchor="middle" class="detail" fill="#ef6c00">   score: 95}</text>
    <text x="210" y="134" text-anchor="middle" class="detail" fill="#f57c00">Redis</text>
    <circle cx="210" cy="160" r="8" fill="#2196f3" class="anim-pulse"/>
    <text x="210" y="164" text-anchor="middle" class="detail" fill="#fff" font-size="9">⚡</text>
  </g>
  
  <!-- Graph Database Section -->
  <g data-narration="Graph databases excel at handling complex relationships with nodes and edges">
    <rect x="285" y="50" width="120" height="130" fill="url(#graphGradient)" class="box" stroke="#7b1fa2" style="animation: fadeIn 0.9s ease-out forwards; opacity: 0;"/>
    <text x="345" y="70" text-anchor="middle" class="label" fill="#4a148c">Graph</text>
    <circle cx="330" cy="95" r="10" fill="#9c27b0"/>
    <circle cx="360" cy="95" r="10" fill="#9c27b0"/>
    <line x1="340" y1="95" x2="350" y2="95" stroke="#7b1fa2" stroke-width="2"/>
    <text x="345" y="115" text-anchor="middle" class="detail" fill="#7b1fa2">(A) →(friend)→ (B)</text>
    <text x="345" y="134" text-anchor="middle" class="detail" fill="#8e24aa">Neo4j</text>
    <circle cx="345" cy="160" r="8" fill="#e91e63" class="anim-pulse"/>
    <text x="345" y="164" text-anchor="middle" class="detail" fill="#fff" font-size="9">♥</text>
  </g>
  
  <!-- Comparison Matrix -->
  <g data-narration="Comparison matrix showing scalability, relationship handling, and use cases">
    <rect x="15" y="195" width="390" height="100" fill="#fff" rx="6" stroke="#cfd8dc" stroke-width="1" style="animation: slideIn 1s ease-out forwards; opacity: 0;"/>
    <text x="210" y="215" text-anchor="middle" class="label" fill="#455a64" font-size="12">Comparison Matrix</text>
    
    <!-- Headers -->
    <text x="75" y="235" text-anchor="middle" class="detail" fill="#78909c" font-weight="bold">Scalability</text>
    <text x="165" y="235" text-anchor="middle" class="detail" fill="#78909c" font-weight="bold">Relationships</text>
    <text x="260" y="235" text-anchor="middle" class="detail" fill="#78909c" font-weight="bold">Query Flex</text>
    <text x="350" y="235" text-anchor="middle" class="detail" fill="#78909c" font-weight="bold">Best For</text>
    
    <!-- Document row -->
    <text x="75" y="255" text-anchor="middle" class="detail" fill="#4caf50">●●● High</text>
    <text x="165" y="255" text-anchor="middle" class="detail" fill="#ff9800">●●○ Medium</text>
    <text x="260" y="255" text-anchor="middle" class="detail" fill="#4caf50">●●● High</text>
    <text x="350" y="255" text-anchor="middle" class="detail" fill="#1976d2" font-size="9">CMS, Catalogs</text>
    
    <!-- Key-Value row -->
    <text x="75" y="273" text-anchor="middle" class="detail" fill="#4caf50">●●● Highest</text>
    <text x="165" y="273" text-anchor="middle" class="detail" fill="#f44336">●○○ Low</text>
    <text x="260" y="273" text-anchor="middle" class="detail" fill="#f44336">●○○ Low</text>
    <text x="350" y="273" text-anchor="middle" class="detail" fill="#f57c00" font-size="9">Sessions, Cache</text>
    
    <!-- Graph row -->
    <text x="75" y="291" text-anchor="middle" class="detail" fill="#ff9800">●●○ Medium</text>
    <text x="165" y="291" text-anchor="middle" class="detail" fill="#4caf50">●●● Native</text>
    <text x="260" y="291" text-anchor="middle" class="detail" fill="#4caf50">●●● High</text>
    <text x="350" y="291" text-anchor="middle" class="detail" fill="#7b1fa2" font-size="9">Social, Fraud</text>
  </g>
  
  <!-- CAP Theorem Box -->
  <g data-narration="CAP theorem: databases choose between Consistency, Availability, and Partition Tolerance">
    <rect x="15" y="305" width="180" height="85" fill="#e8eaf6" rx="6" stroke="#3f51b5" stroke-width="1" style="animation: fadeIn 1.2s ease-out forwards; opacity: 0;"/>
    <text x="105" y="325" text-anchor="middle" class="label" fill="#303f9f" font-size="12">CAP Theorem</text>
    <text x="105" y="345" text-anchor="middle" class="detail" fill="#5c6bc0">C: Consistency</text>
    <text x="105" y="358" text-anchor="middle" class="detail" fill="#5c6bc0">A: Availability</text>
    <text x="105" y="371" text-anchor="middle" class="detail" fill="#5c6bc0">P: Partition Tolerance</text>
    <text x="105" y="382" text-anchor="middle" class="detail" fill="#7986cb" font-size="9">(Pick 2 of 3)</text>
  </g>
  
  <!-- Use Cases Box -->
  <g data-narration="Each database type excels in different use cases based on data model">
    <rect x="205" y="305" width="200" height="85" fill="#fce4ec" rx="6" stroke="#e91e63" stroke-width="1" style="animation: fadeIn 1.4s ease-out forwards; opacity: 0;"/>
    <text x="305" y="325" text-anchor="middle" class="label" fill="#c2185b" font-size="12">Use Cases</text>
    <text x="305" y="345" text-anchor="middle" class="detail" fill="#ec407a">• Real-time analytics</text>
    <text x="305" y="358" text-anchor="middle" class="detail" fill="#ec407a">• IoT data storage</text>
    <text x="305" y="371" text-anchor="middle" class="detail" fill="#ec407a">• User profiles</text>
    <text x="305" y="384" text-anchor="middle" class="detail" fill="#ec407a">• Recommendation engines</text>
  </g>
  
  <!-- Connecting Arrows -->
  <g class="connector" style="animation: drawLine 1.5s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100;">
    <path d="M135 115 Q180 115 150 115" fill="none"/>
  </g>
  <g class="connector" style="animation: drawLine 1.7s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100;">
    <path d="M270 115 Q300 115 285 115" fill="none"/>
  </g>
</svg>