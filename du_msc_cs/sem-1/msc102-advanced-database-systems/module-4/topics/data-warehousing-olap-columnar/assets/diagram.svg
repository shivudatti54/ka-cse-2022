<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="data-warehousing-olap-columnar">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="factGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5e62;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="olapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="colGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box { animation: fadeIn 0.8s ease-out backwards; }
    .box-1 { animation-delay: 0.2s; }
    .box-2 { animation-delay: 0.4s; }
    .box-3 { animation-delay: 0.6s; }
    .box-4 { animation-delay: 0.8s; }
    .box-5 { animation-delay: 1s; }
    .arrow-line { animation: slideIn 0.6s ease-out backwards; animation-delay: 1.2s; }
    .pulse-anim { animation: pulse 2s infinite; transform-origin: center; }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Data Warehousing, OLAP &amp; Columnar</text>
  
  <!-- Star Schema - Fact Table (Center) -->
  <g class="box box-1" data-narration="Central Fact Table containing measurable metrics and foreign keys to dimensions">
    <rect x="165" y="70" width="90" height="60" rx="8" fill="url(#factGradient)" filter="url(#shadow)" class="pulse-anim"/>
    <text x="210" y="92" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">FACT</text>
    <text x="210" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Sales</text>
    <text x="210" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="#ffeeee">PK: sale_id</text>
  </g>
  
  <!-- Dimension Tables (Star Pattern) -->
  <g class="box box-2" data-narration="Dimension tables: Product, Time, Location, Customer - denormalized for fast querying">
    <!-- Product Dimension -->
    <rect x="30" y="140" width="75" height="50" rx="6" fill="url(#dimGradient)" filter="url(#shadow)"/>
    <text x="67.5" y="158" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Product</text>
    <text x="67.5" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#e0e0ff">prod_id</text>
    
    <!-- Time Dimension -->
    <rect x="145" y="160" width="60" height="45" rx="6" fill="url(#dimGradient)" filter="url(#shadow)"/>
    <text x="175" y="177" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Time</text>
    <text x="175" y="193" text-anchor="middle" font-family="Arial" font-size="9" fill="#e0e0ff">date_id</text>
    
    <!-- Location Dimension -->
    <rect x="315" y="140" width="75" height="50" rx="6" fill="url(#dimGradient)" filter="url(#shadow)"/>
    <text x="352.5" y="158" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Location</text>
    <text x="352.5" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#e0e0ff">loc_id</text>
    
    <!-- Customer Dimension -->
    <rect x="240" y="220" width="75" height="50" rx="6" fill="url(#dimGradient)" filter="url(#shadow)"/>
    <text x="277.5" y="238" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">Customer</text>
    <text x="277.5" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#e0e0ff">cust_id</text>
  </g>
  
  <!-- Arrows from Fact to Dimensions -->
  <g class="arrow-line">
    <line x1="165" y1="100" x2="105" y2="165" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="195" y1="100" x2="175" y2="155" stroke="#888" stroke-width="2"/>
    <line x1="255" y1="100" x2="315" y2="165" stroke="#888" stroke-width="2"/>
    <line x1="210" y1="130" x2="245" y2="200" stroke="#888" stroke-width="2"/>
  </g>
  
  <!-- OLAP Operations Panel -->
  <g class="box box-3" data-narration="OLAP Operations: Drill-down, Roll-up, Slice, Dice, Pivot - multidimensional analysis tools">
    <rect x="260" y="285" width="150" height="105" rx="8" fill="url(#olapGradient)" filter="url(#shadow)"/>
    <text x="335" y="305" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">OLAP Operations</text>
    <text x="270" y="325" font-family="Arial" font-size="10" fill="white">• Drill-down / Roll-up</text>
    <text x="270" y="340" font-family="Arial" font-size="10" fill="white">• Slice &amp; Dice</text>
    <text x="270" y="355" font-family="Arial" font-size="10" fill="white">• Pivot / Rotate</text>
    <text x="270" y="370" font-family="Arial" font-size="10" fill="white">• Cube Aggregation</text>
  </g>
  
  <!-- Columnar Storage Panel -->
  <g class="box box-4" data-narration="Columnar Storage: Data organized by columns enabling compression and vectorized processing">
    <rect x="10" y="285" width="150" height="105" rx="8" fill="url(#colGradient)" filter="url(#shadow)"/>
    <text x="85" y="305" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">Columnar Storage</text>
    <text x="20" y="325" font-family="Arial" font-size="10" fill="white">Row-oriented:</text>
    <text x="20" y="338" font-family="Arial" font-size="9" fill="#ffeeee">A1 B1 C1 | A2 B2 C2</text>
    <text x="20" y="355" font-family="Arial" font-size="10" fill="white">Column-oriented:</text>
    <text x="20" y="368" font-family="Arial" font-size="9" fill="#ffeeee">A1 A2 | B1 B2 | C1 C2</text>
    <text x="150" y="382" text-anchor="end" font-family="Arial" font-size="9" font-style="italic" fill="#ffeeee">Compression + Fast Scan</text>
  </g>
  
  <!-- ETL Pipeline Indicator -->
  <g class="box box-5" data-narration="ETL Pipeline: Extract, Transform, Load - moving data from sources to warehouse">
    <rect x="165" y="220" width="90" height="35" rx="5" fill="#95a5a6" filter="url(#shadow)"/>
    <text x="210" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">ETL Pipeline</text>
  </g>
  
  <!-- Connector line ETL to Fact -->
  <line x1="210" y1="255" x2="210" y2="270" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- Key Concepts Labels -->
  <g class="float-anim">
    <circle cx="210" y="370" r="5" fill="#e74c3c"/>
  </g>
  
  <!-- Legend / Schema Type -->
  <text x="180" y="390" font-family="Arial" font-size="10" fill="#7f8c8d">Star Schema: Fact center + Dimensions</text>
</svg>