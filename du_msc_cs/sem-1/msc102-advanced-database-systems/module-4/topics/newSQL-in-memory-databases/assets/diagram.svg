<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="newSQL-in-memory-databases">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8bb8d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8b8d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a88bb8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8dcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8bc4b0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .layer1-anim { animation: slideInDown 0.8s ease-out 0.3s forwards; opacity: 0; }
    .layer2-anim { animation: slideInDown 0.8s ease-out 0.5s forwards; opacity: 0; }
    .layer3-anim { animation: slideInUp 0.8s ease-out 0.7s forwards; opacity: 0; }
    .box-anim { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .arrow-anim { animation: arrowPulse 2s ease-in-out infinite; }
    .coordinator-anim { animation: pulse 2.5s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3a3a5c" text-anchor="middle" class="title-anim">NewSQL In-Memory Databases</text>
  <text x="210" y="45" font-family="Arial, sans-serif" font-size="11" fill="#666680" text-anchor="middle" class="title-anim">Architecture Overview</text>
  
  <!-- Layer 1: Query Processing Layer -->
  <g class="layer1-anim">
    <rect x="30" y="60" width="360" height="85" rx="8" fill="url(#layer1Grad)" filter="url(#shadow)" data-narration="Top layer: Distributed Query Processor handles incoming SQL queries, optimizes execution using vectorized processing, and coordinates across nodes"/>
    <text x="210" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2a4a5c" text-anchor="middle">Query Processing Layer</text>
    <!-- Coordinator Node -->
    <rect x="50" y="90" width="70" height="40" rx="5" fill="#f5f5f5" stroke="#6a9ec0" stroke-width="2" class="coordinator-anim"/>
    <text x="85" y="107" font-family="Arial, sans-serif" font-size="10" fill="#2a4a5c" text-anchor="middle">Coordinator</text>
    <text x="85" y="120" font-family="Arial, sans-serif" font-size="8" fill="#5a7a8c" text-anchor="middle">Node</text>
    <!-- Shards -->
    <rect x="140" y="90" width="55" height="40" rx="5" fill="#f5f5f5" stroke="#6a9ec0" stroke-width="2"/>
    <text x="167" y="107" font-family="Arial, sans-serif" font-size="9" fill="#2a4a5c" text-anchor="middle">Shard 1</text>
    <rect x="205" y="90" width="55" height="40" rx="5" fill="#f5f5f5" stroke="#6a9ec0" stroke-width="2"/>
    <text x="232" y="107" font-family="Arial, sans-serif" font-size="9" fill="#2a4a5c" text-anchor="middle">Shard 2</text>
    <rect x="270" y="90" width="55" height="40" rx="5" fill="#f5f5f5" stroke="#6a9ec0" stroke-width="2"/>
    <text x="297" y="107" font-family="Arial, sans-serif" font-size="9" fill="#2a4a5c" text-anchor="middle">Shard N</text>
    <!-- HTAP Badge -->
    <rect x="335" y="95" width="45" height="20" rx="10" fill="#e8c8e8" stroke="#a88bb8" stroke-width="1"/>
    <text x="357" y="109" font-family="Arial, sans-serif" font-size="9" fill="#6a4a6c" text-anchor="middle">HTAP</text>
  </g>
  
  <!-- Arrow Down 1 -->
  <path d="M210 150 L210 170" stroke="#8888a0" stroke-width="2" class="arrow-anim" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8888a0"/>
    </marker>
  </defs>
  
  <!-- Layer 2: In-Memory Storage Engine -->
  <g class="layer2-anim">
    <rect x="30" y="175" width="360" height="95" rx="8" fill="url(#layer2Grad)" filter="url(#shadow)" data-narration="Middle layer: In-Memory Storage Engine stores data in RAM using T-Trees and hash indexes, supports MVCC for concurrent transactions"/>
    <text x="210" y="193" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a3a5c" text-anchor="middle">In-Memory Storage Engine</text>
    <!-- Memory Blocks -->
    <rect x="50" y="208" width="90" height="50" rx="5" fill="#f8f0f8" stroke="#a88bb8" stroke-width="2" class="box-anim"/>
    <text x="95" y="225" font-family="Arial, sans-serif" font-size="10" fill="#5a4a6c" text-anchor="middle">T-Tree</text>
    <text x="95" y="240" font-family="Arial, sans-serif" font-size="9" fill="#7a6a8c" text-anchor="middle">Indexes</text>
    <rect x="165" y="208" width="90" height="50" rx="5" fill="#f8f0f8" stroke="#a88bb8" stroke-width="2" class="box-anim"/>
    <text x="210" y="225" font-family="Arial, sans-serif" font-size="10" fill="#5a4a6c" text-anchor="middle">Columnar</text>
    <text x="210" y="240" font-family="Arial, sans-serif" font-size="9" fill="#7a6a8c" text-anchor="middle">Store</text>
    <rect x="280" y="208" width="90" height="50" rx="5" fill="#f8f0f8" stroke="#a88bb8" stroke-width="2" class="box-anim"/>
    <text x="325" y="225" font-family="Arial, sans-serif" font-size="10" fill="#5a4a6c" text-anchor="middle">MVCC</text>
    <text x="325" y="240" font-family="Arial, sans-serif" font-size="9" fill="#7a6a8c" text-anchor="middle">Control</text>
    <!-- Key Concepts -->
    <text x="55" y="263" font-family="Arial, sans-serif" font-size="8" fill="#6a5a7c">Lock-Free Concurrency</text>
    <text x="180" y="263" font-family="Arial, sans-serif" font-size="8" fill="#6a5a7c">Vectorized SIMD</text>
    <text x="305" y="263" font-family="Arial, sans-serif" font-size="8" fill="#6a5a7c">HTAP Ready</text>
  </g>
  
  <!-- Arrow Down 2 -->
  <path d="M210 275 L210 295" stroke="#8888a0" stroke-width="2" class="arrow-anim" marker-end="url(#arrowhead2)"/>
  <defs>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8888a0"/>
    </marker>
  </defs>
  
  <!-- Layer 3: Persistent Log Layer -->
  <g class="layer3-anim">
    <rect x="30" y="300" width="360" height="85" rx="8" fill="url(#layer3Grad)" filter="url(#shadow)" data-narration="Bottom layer: Persistent Log Layer ensures durability through Write-Ahead Logs (WAL) and periodic SSD backups"/>
    <text x="210" y="318" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2a5a4c" text-anchor="middle">Persistent Log Layer</text>
    <!-- WAL -->
    <rect x="50" y="333" width="100" height="42" rx="5" fill="#f0f8f4" stroke="#6cb898" stroke-width="2" class="box-anim"/>
    <text x="100" y="352" font-family="Arial, sans-serif" font-size="11" fill="#3a6a5c" text-anchor="middle">Write-Ahead</text>
    <text x="100" y="367" font-family="Arial, sans-serif" font-size="10" fill="#5a8a7c" text-anchor="middle">Log (WAL)</text>
    <!-- Redis/AOF -->
    <rect x="165" y="333" width="80" height="42" rx="5" fill="#f0f8f4" stroke="#6cb898" stroke-width="2" class="box-anim"/>
    <text x="205" y="352" font-family="Arial, sans-serif" font-size="10" fill="#3a6a5c" text-anchor="middle">AOF/RDB</text>
    <text x="205" y="367" font-family="Arial, sans-serif" font-size="9" fill="#5a8a7c" text-anchor="middle">Snapshots</text>
    <!-- SSD Backup -->
    <rect x="260" y="333" width="110" height="42" rx="5" fill="#e8f0ec" stroke="#4a9a78" stroke-width="2" class="box-anim"/>
    <text x="315" y="352" font-family="Arial, sans-serif" font-size="10" fill="#3a6a5c" text-anchor="middle">SSD/Intel</text>
    <text x="315" y="367" font-family="Arial, sans-serif" font-size="9" fill="#5a8a7c" text-anchor="middle">Optane Backup</text>
  </g>
  
  <!-- Data Flow Arrow (horizontal) -->
  <path d="M380 230 C400 230 400 240 380 240" stroke="#c0a0c0" stroke-width="2" fill="none" class="arrow-anim"/>
  <text x="395" y="225" font-family="Arial, sans-serif" font-size="8" fill="#8a7a9c" text-anchor="middle">Real-time</text>
  <text x="395" y="235" font-family="Arial, sans-serif" font-size="8" fill="#8a7a9c" text-anchor="middle">Analytics</text>
  
  <!-- Legend/Key -->
  <rect x="30" y="365" width="130" height="25" rx="4" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="1"/>
  <circle cx="45" cy="377" r="5" fill="#6cb898"/>
  <text x="55" y="380" font-family="Arial, sans-serif" font-size="9" fill="#444">ACID Compliant</text>
  
  <rect x="165" y="365" width="140" height="25" rx="4" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="1"/>
  <circle cx="180" cy="377" r="5" fill="#a88bb8"/>
  <text x="190" y="380" font-family="Arial, sans-serif" font-size="9" fill="#444">Horizontal Scale</text>
  
  <rect x="310" y="365" width="80" height="25" rx="4" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="1"/>
  <circle cx="325" cy="377" r="5" fill="#8bb8d4"/>
  <text x="335" y="380" font-family="Arial, sans-serif" font-size="9" fill="#444">Sub-ms</text>
</svg>