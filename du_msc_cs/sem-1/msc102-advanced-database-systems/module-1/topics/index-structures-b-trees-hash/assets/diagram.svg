<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="index-structures-b-trees-hash" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hashGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .btree-root { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .btree-internal { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .btree-leaf { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .hash-section { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .concept-box { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.4s ease-out 1s forwards; opacity: 0; }
    .pulse { animation: pulse 2s infinite; transform-origin: center; }
    .bounce { animation: bounce 1.5s infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Index Structures: B-Trees &amp; Hash</text>
  
  <!-- B-Tree Section -->
  <g data-narration="B-Tree: Balanced m-way search tree with all leaves at same depth">
    <text x="30" y="60" font-size="14" font-weight="bold" fill="#2c5aa0" class="btree-root">B-Tree Structure</text>
    
    <!-- Root Node -->
    <g class="btree-root" filter="url(#shadow)">
      <rect x="60" y="75" width="70" height="35" rx="5" fill="url(#nodeGradient)"/>
      <text x="95" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="white">25</text>
    </g>
    
    <!-- Level 1 Internal Nodes -->
    <g class="btree-internal" filter="url(#shadow)">
      <rect x="20" y="140" width="80" height="35" rx="5" fill="url(#nodeGradient)"/>
      <text x="60" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="white">10</text>
      <text x="60" y="175" text-anchor="middle" font-size="10" fill="white">18</text>
      
      <rect x="110" y="140" width="80" height="35" rx="5" fill="url(#nodeGradient)"/>
      <text x="150" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="white">30</text>
      <text x="150" y="175" text-anchor="middle" font-size="10" fill="white">40</text>
    </g>
    
    <!-- Arrows from root -->
    <g class="arrow">
      <path d="M80 110 L40 140" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
      <path d="M110 110 L150 140" stroke="#666" stroke-width="2" fill="none"/>
    </g>
    
    <!-- Level 2 - Leaves -->
    <g class="btree-leaf" filter="url(#shadow)">
      <rect x="10" y="200" width="55" height="30" rx="4" fill="url(#leafGradient)"/>
      <text x="37" y="220" text-anchor="middle" font-size="11" fill="white">5,8</text>
      
      <rect x="70" y="200" width="55" height="30" rx="4" fill="url(#leafGradient)"/>
      <text x="97" y="220" text-anchor="middle" font-size="11" fill="white">12,15</text>
      
      <rect x="130" y="200" width="55" height="30" rx="4" fill="url(#leafGradient)"/>
      <text x="157" y="220" text-anchor="middle" font-size="11" fill="white">22,28</text>
      
      <rect x="190" y="200" width="55" height="30" rx="4" fill="url(#leafGradient)"/>
      <text x="217" y="220" text-anchor="middle" font-size="11" fill="white">35,38</text>
    </g>
    
    <!-- Leaf Chain (Linked List) -->
    <g class="btree-leaf">
      <text x="10" y="250" font-size="12" fill="#27ae60" font-weight="bold">Leaf Chain →</text>
      <path d="M65 215 L70 215" stroke="#27ae60" stroke-width="2"/>
      <path d="M125 215 L130 215" stroke="#27ae60" stroke-width="2"/>
      <path d="M185 215 L190 215" stroke="#27ae60" stroke-width="2"/>
      <polygon points="70,215 65,212 65,218" fill="#27ae60"/>
      <polygon points="130,215 125,212 125,218" fill="#27ae60"/>
      <polygon points="190,215 185,212 185,218" fill="#27ae60"/>
    </g>
  </g>
  
  <!-- Hash Section -->
  <g class="hash-section" data-narration="Hash Index: O(1) average access using hash function">
    <text x="280" y="60" font-size="14" font-weight="bold" fill="#7d3c98" class="bounce">Hash Index</text>
    
    <!-- Hash Function Box -->
    <rect x="275" y="75" width="80" height="25" rx="4" fill="url(#hashGradient)" filter="url(#shadow)"/>
    <text x="315" y="92" text-anchor="middle" font-size="11" fill="white">h(key)</text>
    
    <!-- Arrow down -->
    <path d="M315 100 L315 125" stroke="#666" stroke-width="2"/>
    <polygon points="315,130 312,125 318,125" fill="#666"/>
    
    <!-- Hash Table / Directory -->
    <g filter="url(#shadow)">
      <rect x="270" y="130" width="90" height="90" rx="5" fill="#ecf0f1" stroke="#9b59b6" stroke-width="2"/>
      
      <line x1="270" y1="152" x2="360" y2="152" stroke="#9b59b6" stroke-width="1"/>
      <line x1="270" y1="174" x2="360" y2="174" stroke="#9b59b6" stroke-width="1"/>
      <line x1="270" y1="196" x2="360" y2="196" stroke="#9b59b6" stroke-width="1"/>
      <line x1="315" y1="130" x2="315" y2="220" stroke="#9b59b6" stroke-width="1"/>
      
      <text x="278" y="147" font-size="10" fill="#2c3e50">0:</text>
      <text x="335" y="147" font-size="10" fill="#27ae60">Bucket A</text>
      <text x="278" y="169" font-size="10" fill="#2c3e50">1:</text>
      <text x="335" y="169" font-size="10" fill="#e74c3c">Bucket B</text>
      <text x="278" y="191" font-size="10" fill="#2c3e50">2:</text>
      <text x="335" y="191" font-size="10" fill="#3498db">Bucket C</text>
    </g>
  </g>
  
  <!-- Key Concepts Box 1 -->
  <g class="concept-box" data-narration="B-Tree properties: balanced, high fanout, disk-optimized">
    <rect x="10" y="270" width="130" height="55" rx="5" fill="white" stroke="#4a90d9" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="75" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c5aa0">B-Tree Properties</text>
    <text x="75" y="305" text-anchor="middle" font-size="10" fill="#555">O(log n) access</text>
    <text x="75" y="318" text-anchor="middle" font-size="10" fill="#555">Height ≈ log<sub>m/2</sub>(N)</text>
  </g>
  
  <!-- Key Concepts Box 2 -->
  <g class="concept-box" data-narration="Hash Index: O(1) average case for equality searches">
    <rect x="150" y="270" width="130" height="55" rx="5" fill="white" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="215" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d3c98">Hash Index</text>
    <text x="215" y="305" text-anchor="middle" font-size="10" fill="#555">O(1) average access</text>
    <text x="215" y="318" text-anchor="middle" font-size="10" fill="#555">Perfect for = queries</text>
  </g>
  
  <!-- Key Concepts Box 3 -->
  <g class="concept-box" data-narration="B+ Tree variant: data only in leaves, linked for range queries">
    <rect x="290" y="270" width="120" height="55" rx="5" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="350" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">B+ Tree</text>
    <text x="350" y="305" text-anchor="middle" font-size="10" fill="#555">Leaves linked</text>
    <text x="350" y="318" text-anchor="middle" font-size="10" fill="#555">Range queries</text>
  </g>
  
  <!-- Bottom Info -->
  <g class="concept-box">
    <rect x="10" y="335" width="400" height="30" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="30" y="353" font-size="11" fill="#495057">
      <tspan font-weight="bold">Cost:</tspan>
      <tspan> B-Tree: O(log n) I/O</tspan>
      <tspan font-weight="bold">|</tspan>
      <tspan> Hash: O(1) probe</tspan>
    </text>
  </g>
  
  <!-- Animated Indicator Dot -->
  <circle cx="200" cy="380" r="6" fill="#e74c3c" class="pulse"/>
  <text x="200" y="395" text-anchor="middle" font-size="10" fill="#e74c3c">B-Trees for Range | Hash for Equality</text>
</svg>