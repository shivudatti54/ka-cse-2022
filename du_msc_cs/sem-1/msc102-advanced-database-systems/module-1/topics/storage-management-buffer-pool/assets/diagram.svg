<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="storage-management-buffer-pool">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f7ff"/>
      <stop offset="100%" style="stop-color:#f5f0ff"/>
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="hashGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5ce0"/>
      <stop offset="100%" style="stop-color:#5a3d9e"/>
    </linearGradient>
    <linearGradient id="freeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title-text { font-family: 'Segoe UI', sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #5d6d7e; }
    .section-title { font-family: 'Segoe UI', sans-serif; font-size: 11px; font-weight: bold; fill: #ffffff; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text anim-fade">Storage Management: Buffer Pool</text>
  
  <!-- Hash Table Section -->
  <g transform="translate(20, 45)" class="anim-slide-left">
    <rect width="100" height="130" fill="url(#hashGradient)" rx="6" filter="url(#shadow)"/>
    <text x="50" y="20" text-anchor="middle" class="section-title">Hash Table</text>
    <line x1="10" y1="28" x2="90" y2="28" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="50" y="45" text-anchor="middle" class="label" fill="white">PageID → Frame</text>
    <rect x="15" y="55" width="70" height="18" fill="rgba(255,255,255,0.15)" rx="3"/>
    <text x="50" y="67" text-anchor="middle" class="detail" fill="white">P1 → F3</text>
    <rect x="15" y="78" width="70" height="18" fill="rgba(255,255,255,0.15)" rx="3"/>
    <text x="50" y="90" text-anchor="middle" class="detail" fill="white">P2 → F1</text>
    <rect x="15" y="101" width="70" height="18" fill="rgba(255,255,255,0.15)" rx="3"/>
    <text x="50" y="113" text-anchor="middle" class="detail" fill="white">P5 → F7</text>
  </g>
  
  <!-- Buffer Pool Frames -->
  <g transform="translate(130, 45)" class="anim-fade">
    <rect width="160" height="200" fill="#f8f9fa" rx="8" stroke="#bdc3c7" stroke-width="1"/>
    <text x="80" y="18" text-anchor="middle" class="label" fill="#2c3e50" font-weight="bold">Buffer Pool Frames</text>
    
    <!-- Frame 1 -->
    <g transform="translate(10, 28)" class="anim-pulse">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F1</text>
      <circle cx="28" cy="6" r="4" fill="#e74c3c"/>
      <text x="28" y="8" text-anchor="middle" class="detail" fill="white" font-size="7">2</text>
    </g>
    
    <!-- Frame 2 -->
    <g transform="translate(50, 28)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F2</text>
    </g>
    
    <!-- Frame 3 -->
    <g transform="translate(90, 28)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F3</text>
      <circle cx="28" cy="6" r="4" fill="#f39c12"/>
      <rect x="26" y="4" width="4" height="4" fill="none" stroke="white" stroke-width="1"/>
    </g>
    
    <!-- Frame 4 -->
    <g transform="translate(10, 62)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F4</text>
    </g>
    
    <!-- Frame 5 -->
    <g transform="translate(50, 62)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F5</text>
    </g>
    
    <!-- Frame 6 -->
    <g transform="translate(90, 62)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F6</text>
    </g>
    
    <!-- Frame 7 -->
    <g transform="translate(10, 96)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F7</text>
    </g>
    
    <!-- Frame 8 -->
    <g transform="translate(50, 96)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F8</text>
    </g>
    
    <!-- Frame 9 -->
    <g transform="translate(90, 96)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F9</text>
    </g>
    
    <!-- Frame 10 -->
    <g transform="translate(10, 130)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F10</text>
    </g>
    
    <!-- Frame 11 -->
    <g transform="translate(50, 130)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F11</text>
    </g>
    
    <!-- Frame 12 -->
    <g transform="translate(90, 130)">
      <rect width="35" height="28" fill="url(#frameGradient)" rx="3"/>
      <text x="17" y="15" text-anchor="middle" class="detail" fill="white" font-size="9">F12</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(10, 165)">
      <circle cx="5" cy="5" r="4" fill="#e74c3c"/>
      <text x="15" y="8" class="detail">Pin</text>
      <rect x="45" y="1" width="8" height="8" fill="#f39c12"/>
      <text x="58" y="8" class="detail">Dirty</text>
    </g>
  </g>
  
  <!-- Free List -->
  <g transform="translate(300, 45)" class="anim-slide-right">
    <rect width="100" height="100" fill="url(#freeGradient)" rx="6" filter="url(#shadow)"/>
    <text x="50" y="20" text-anchor="middle" class="section-title">Free List</text>
    <line x1="10" y1="28" x2="90" y2="28" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="50" y="45" text-anchor="middle" class="label" fill="white">Available Frames</text>
    <rect x="15" y="55" width="70" height="35" fill="rgba(255,255,255,0.15)" rx="4"/>
    <text x="50" y="72" text-anchor="middle" class="detail" fill="white">F2, F4, F5</text>
    <text x="50" y="88" text-anchor="middle" class="detail" fill="white">F6, F8-F12</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g transform="translate(20, 260)" class="anim-fade" data-narration="Buffer pool replaces disk I/O with memory access, achieving 100x speedup">
    <rect width="180" height="125" fill="white" rx="6" stroke="#3498db" stroke-width="2"/>
    <text x="90" y="18" text-anchor="middle" class="label" fill="#2980b9" font-weight="bold">Key Concepts</text>
    <line x1="10" y1="28" x2="170" y2="28" stroke="#3498db" stroke-width="1"/>
    <text x="15" y="45" class="detail">• LRU/MRU Replacement</text>
    <text x="15" y="62" class="detail">• Pin-count (readers)</text>
    <text x="15" y="79" class="detail">• Dirty page tracking</text>
    <text x="15" y="96" class="detail">• Flush to disk</text>
    <text x="15" y="113" class="detail">• Hash lookup O(1)</text>
  </g>
  
  <!-- Performance Metrics -->
  <g transform="translate(210, 260)" class="anim-fade" data-narration="Memory access is 100x faster than SSD, 10000x faster than HDD">
    <rect width="190" height="125" fill="white" rx="6" stroke="#9b59b6" stroke-width="2"/>
    <text x="95" y="18" text-anchor="middle" class="label" fill="#8e44ad" font-weight="bold">Latency Comparison</text>
    <line x1="10" y1="28" x2="180" y2="28" stroke="#9b59b6" stroke-width="1"/>
    
    <!-- Memory bar -->
    <text x="20" y="48" class="detail">Memory</text>
    <rect x="70" y="38" width="40" height="12" fill="#4caf50" rx="2"/>
    <text x="115" y="48" class="detail">~100ns</text>
    
    <!-- SSD bar -->
    <text x="20" y="68" class="detail">SSD</text>
    <rect x="70" y="58" width="80" height="12" fill="#f39c12" rx="2"/>
    <text x="155" y="68" class="detail">~100μs</text>
    
    <!-- HDD bar -->
    <text x="20" y="88" class="detail">HDD</text>
    <rect x="70" y="78" width="110" height="12" fill="#e74c3c" rx="2"/>
    <text x="185" y="88" class="detail">~10ms</text>
    
    <text x="95" y="112" text-anchor="middle" class="detail" fill="#7f8c8d">Buffer Pool minimizes disk I/O</text>
  </g>
  
  <!-- Arrows -->
  <g class="anim-fade">
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6" fill="#34495e"/>
      </marker>
    </defs>
    <!-- Hash to Frame -->
    <path d="M120 100 L125 100" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Free to Frame -->
    <path d="M300 100 L295 100" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Algorithm Tags -->
  <g transform="translate(130, 255)" class="anim-pulse">
    <rect x="0" y="0" width="55" height="22" fill="#e74c3c" rx="4"/>
    <text x="27" y="14" text-anchor="middle" class="detail" fill="white">LRU</text>
    <rect x="60" y="0" width="55" height="22" fill="#3498db" rx="4"/>
    <text x="87" y="14" text-anchor="middle" class="detail" fill="white">2Q</text>
    <rect x="120" y="0" width="55" height="22" fill="#9b59b6" rx="4"/>
    <text x="147" y="14" text-anchor="middle" class="detail" fill="white">LIRS</text>
  </g>
  
  <!-- Data flow arrows -->
  <g transform="translate(300, 155)" class="anim-fade">
    <path d="M0 0 L-15 20" stroke="#34495e" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
    <text x="-10" y="30" class="detail" fill="#5d6d7e">alloc</text>
  </g>
</svg>