<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="query-processing-optimization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="100%" style="stop-color:#9fc5db"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1c4e9"/>
      <stop offset="100%" style="stop-color:#b39ddb"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2"/>
      <stop offset="100%" style="stop-color:#ffcc80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section3 { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .connector { stroke-dasharray: 100; animation: drawLine 1s ease-out 1s forwards; }
    .arrow { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Query Processing</text>
  <text x="210" y="50" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="normal" fill="#5d6d7e" class="title">Optimization Pipeline</text>

  <!-- Section 1: Input Query -->
  <g class="section1" data-narration="User submits SQL query to the database system">
    <rect x="20" y="70" width="90" height="45" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="65" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">SQL Query</text>
    <text x="65" y="105" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#34495e">SELECT * FROM...</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M115 92 L145 92" stroke="#5d6d7e" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="140,87 145,92 140,97" fill="#5d6d7e" class="arrow"/>

  <!-- Section 2: Parsing & Validation -->
  <g class="section2" data-narration="Parser checks syntax and validates semantic meaning">
    <rect x="150" y="70" width="120" height="45" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="210" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Parsing</text>
    <text x="210" y="105" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#34495e">Syntax + Semantic</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M275 92 L305 92" stroke="#5d6d7e" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="300,87 305,92 300,97" fill="#5d6d7e" class="arrow"/>

  <!-- Section 3: Logical Plan -->
  <g class="section3" data-narration="Query transformed to relational algebra representation">
    <rect x="310" y="70" width="95" height="45" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="357" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Logical Plan</text>
    <text x="357" y="105" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#34495e">Relational Algebra</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M210 115 L210 145" stroke="#5d6d7e" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="205,140 210,145 215,140" fill="#5d6d7e" class="arrow"/>

  <!-- Section 4: Optimization -->
  <g class="section4" data-narration="Cost-based optimizer selects best execution plan">
    <rect x="150" y="150" width="120" height="50" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="210" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Cost-Based Optimizer</text>
    <text x="210" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#34495e">Cardinality • Join Order</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M210 200 L210 230" stroke="#5d6d7e" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="205,225 210,230 215,225" fill="#5d6d7e" class="arrow"/>

  <!-- Execution Plan Tree -->
  <g class="section4" data-narration="Physical execution plan with operators">
    <rect x="100" y="235" width="220" height="140" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="210" y="255" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#2c3e50">Execution Plan</text>
    
    <!-- Root Node -->
    <rect x="175" y="262" width="70" height="24" rx="4" fill="#ffab91" class="pulse"/>
    <text x="210" y="279" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#3e2723">Root</text>
    
    <!-- Join Node -->
    <rect x="145" y="300" width="60" height="22" rx="4" fill="#ce93d8"/>
    <text x="175" y="315" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#4a148c">Join</text>
    
    <rect x="215" y="300" width="60" height="22" rx="4" fill="#ce93d8"/>
    <text x="245" y="315" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#4a148c">Join</text>
    
    <!-- Connection lines -->
    <line x1="210" y1="286" x2="175" y2="300" stroke="#78909c" stroke-width="1.5"/>
    <line x1="210" y1="286" x2="245" y2="300" stroke="#78909c" stroke-width="1.5"/>
    
    <!-- Scan Nodes -->
    <rect x="105" y="335" width="50" height="20" rx="4" fill="#90caf9"/>
    <text x="130" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#0d47a1">Scan</text>
    
    <rect x="165" y="335" width="50" height="20" rx="4" fill="#90caf9"/>
    <text x="190" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#0d47a1">Scan</text>
    
    <rect x="225" y="335" width="50" height="20" rx="4" fill="#90caf9"/>
    <text x="250" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#0d47a1">Scan</text>
    
    <rect x="285" y="335" width="50" height="20" rx="4" fill="#a5d6a7"/>
    <text x="310" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" fill="#1b5e20">Sort</text>
    
    <!-- Connection lines to scans -->
    <line x1="175" y1="322" x2="130" y2="335" stroke="#78909c" stroke-width="1.5"/>
    <line x1="175" y1="322" x2="190" y2="335" stroke="#78909c" stroke-width="1.5"/>
    <line x1="245" y1="322" x2="250" y2="335" stroke="#78909c" stroke-width="1.5"/>
    <line x1="245" y1="322" x2="310" y2="335" stroke="#78909c" stroke-width="1.5"/>
  </g>

  <!-- Key Concepts Labels -->
  <g class="section4" data-narration="Key optimization techniques shown in plan">
    <circle cx="35" cy="360" r="4" fill="#ffab91"/>
    <text x="45" y="364" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#5d6d7e">Scan: Data Access</text>
    
    <circle cx="35" cy="375" r="4" fill="#ce93d8"/>
    <text x="45" y="379" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#5d6d7e">Join: Combine Tables</text>
    
    <circle cx="35" cy="390" r="4" fill="#a5d6a7"/>
    <text x="45" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#5d6d7e">Sort: Order Results</text>
  </g>

  <!-- Flow indicator -->
  <text x="380" y="195" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#7f8c8d" class="pulse">▶ Execute</text>
</svg>