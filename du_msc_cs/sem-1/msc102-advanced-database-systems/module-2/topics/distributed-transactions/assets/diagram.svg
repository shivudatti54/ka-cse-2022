<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="distributed-transactions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a8a"/>
    </linearGradient>
    <linearGradient id="coordGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e07b53"/>
      <stop offset="100%" style="stop-color:#b85a3a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d5a8a; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #555; }
    .node { filter: url(#shadow); }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #888; stroke-width: 2; stroke-dasharray: 5,3; }
    .arrow-head { fill: #888; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Distributed Transactions</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4a90d9" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- 2PC Workflow Section -->
  <g class="slide-up" style="animation-delay: 0.4s" data-narration="Two-Phase Commit (2PC) workflow showing coordinator and participant nodes">
    <rect x="20" y="55" width="380" height="180" rx="10" fill="white" stroke="#4a90d9" stroke-width="1" opacity="0.9"/>
    <text x="30" y="75" class="label" style="font-weight: bold;">Two-Phase Commit (2PC)</text>
    
    <!-- Phase 1 Label -->
    <text x="30" y="95" class="detail" fill="#e07b53" style="font-weight: bold;">Phase 1: Prepare</text>
    <text x="30" y="110" class="detail">Coordinator sends PREPARE to all participants</text>
    
    <!-- Phase 2 Label -->
    <text x="30" y="145" class="detail" fill="#4a9d6d" style="font-weight: bold;">Phase 2: Commit/Rollback</text>
    <text x="30" y="160" class="detail">If all agree → COMMIT, else → ROLLBACK</text>
    
    <!-- Coordinator Node -->
    <g class="node pulse" transform="translate(180, 95)">
      <ellipse cx="0" cy="0" rx="35" ry="20" fill="url(#coordGradient)"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Coordinator</text>
    </g>
    
    <!-- Participant Nodes -->
    <g class="node" transform="translate(80, 170)">
      <ellipse cx="0" cy="0" rx="30" ry="18" fill="url(#nodeGradient)"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-family="Arial">P1</text>
    </g>
    <g class="node" transform="translate(180, 170)">
      <ellipse cx="0" cy="0" rx="30" ry="18" fill="url(#nodeGradient)"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-family="Arial">P2</text>
    </g>
    <g class="node" transform="translate(280, 170)">
      <ellipse cx="0" cy="0" rx="30" ry="18" fill="url(#nodeGradient)"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="10" font-family="Arial">P3</text>
    </g>
    
    <!-- Arrows from Coordinator to Participants (Prepare) -->
    <line x1="160" y1="110" x2="90" y2="152" stroke="#e07b53" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="90,152 95,145 83,145" fill="#e07b53"/>
    <text x="115" y="135" class="detail" fill="#e07b53" font-size="9">PREPARE</text>
    
    <line x1="180" y1="115" x2="180" y2="152" stroke="#e07b53" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="180,152 185,145 175,145" fill="#e07b53"/>
    
    <line x1="200" y1="110" x2="270" y2="152" stroke="#e07b53" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="270,152 275,145 265,145" fill="#e07b53"/>
    <text x="245" y="135" class="detail" fill="#e07b53" font-size="9">PREPARE</text>
    
    <!-- Arrows from Participants to Coordinator (Vote) -->
    <line x1="90" y1="170" x2="160" y2="115" stroke="#4a9d6d" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="160,115 155,122 165,122" fill="#4a9d6d"/>
    <text x="95" y="148" class="detail" fill="#4a9d6d" font-size="9">YES</text>
    
    <line x1="180" y1="170" x2="180" y2="115" stroke="#4a9d6d" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="180,115 175,122 185,122" fill="#4a9d6d"/>
    
    <line x1="270" y1="170" x2="200" y2="115" stroke="#4a9d6d" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="200,115 195,122 205,122" fill="#4a9d6d"/>
    <text x="255" y="148" class="detail" fill="#4a9d6d" font-size="9">YES</text>
  </g>
  
  <!-- CAP Theorem Triangle -->
  <g class="slide-left" style="animation-delay: 0.6s" data-narration="CAP Theorem showing the three properties: Consistency, Availability, Partition Tolerance">
    <rect x="20" y="250" width="130" height="130" rx="8" fill="white" stroke="#9b6dff" stroke-width="1" opacity="0.9"/>
    <text x="85" y="270" text-anchor="middle" class="label" style="font-weight: bold; fill: #9b6dff;">CAP Theorem</text>
    
    <!-- Triangle -->
    <polygon points="85,280 45,350 125,350" fill="none" stroke="#9b6dff" stroke-width="2"/>
    
    <!-- Labels on triangle -->
    <text x="85" y="295" text-anchor="middle" class="detail" fill="#333" font-weight="bold">C</text>
    <text x="55" y="340" text-anchor="middle" class="detail" fill="#333" font-weight="bold">A</text>
    <text x="115" y="340" text-anchor="middle" class="detail" fill="#333" font-weight="bold">P</text>
    
    <text x="85" y="305" text-anchor="middle" font-size="8" fill="#666">Consistency</text>
    <text x="50" y="355" text-anchor="middle" font-size="8" fill="#666">Availability</text>
    <text x="120" y="355" text-anchor="middle" font-size="8" fill="#666">Partition Tol.</text>
    
    <text x="85" y="370" text-anchor="middle" class="detail" fill="#555" font-size="9">Pick any 2</text>
  </g>
  
  <!-- ACID Properties -->
  <g class="slide-right" style="animation-delay: 0.7s" data-narration="ACID properties maintained in distributed transactions">
    <rect x="160" y="250" width="130" height="130" rx="8" fill="white" stroke="#4a9d6d" stroke-width="1" opacity="0.9"/>
    <text x="225" y="270" text-anchor="middle" class="label" style="font-weight: bold; fill: #4a9d6d;">ACID Properties</text>
    
    <g transform="translate(170, 285)">
      <text x="0" y="0" class="detail" fill="#333" font-weight="bold">A</text><text x="12" y="0" class="detail">tomicity</text>
      <text x="0" y="18" class="detail" fill="#333" font-weight="bold">C</text><text x="12" y="18" class="detail">onsistency</text>
      <text x="0" y="36" class="detail" fill="#333" font-weight="bold">I</text><text x="12" y="36" class="detail">solation</text>
      <text x="0" y="54" class="detail" fill="#333" font-weight="bold">D</text><text x="12" y="54" class="detail">urability</text>
    </g>
    <text x="225" y="365" text-anchor="middle" class="detail" fill="#666" font-size="9">All nodes must succeed</text>
  </g>
  
  <!-- BASE Model -->
  <g class="slide-up" style="animation-delay: 0.8s" data-narration="BASE model alternative to ACID in distributed systems">
    <rect x="300" y="250" width="105" height="130" rx="8" fill="white" stroke="#e07b53" stroke-width="1" opacity="0.9"/>
    <text x="352" y="270" text-anchor="middle" class="label" style="font-weight: bold; fill: #e07b53;">BASE Model</text>
    
    <g transform="translate(310, 285)">
      <text x="0" y="0" class="detail" fill="#333" font-weight="bold">B</text><text x="12" y="0" class="detail">asically</text>
      <text x="0" y="0" class="detail" fill="#333" font-weight="bold">A</text><text x="12" y="0" class="detail">vailable</text>
      <text x="0" y="20" class="detail" fill="#333" font-weight="bold">S</text><text x="12" y="20" class="detail">oft State</text>
      <text x="0" y="40" class="detail" fill="#333" font-weight="bold">E</text><text x="12" y="40" class="detail">ventual</text>
      <text x="0" y="54" class="detail">Consistency</text>
    </g>
    <text x="352" y="365" text-anchor="middle" class="detail" fill="#666" font-size="9">Eventual consistency</text>
  </g>
  
  <!-- Key Challenge Box -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Key challenge: blocking problem in 2PC if coordinator fails">
    <rect x="160" y="355" width="105" height="35" rx="5" fill="#fff3e0" stroke="#e07b53" stroke-width="1"/>
    <text x="212" y="370" text-anchor="middle" class="detail" fill="#b85a3a" font-weight="bold">Challenge:</text>
    <text x="212" y="382" text-anchor="middle" class="detail" fill="#b85a3a" font-size="9">Blocking if coordinator fails</text>
  </g>
</svg>