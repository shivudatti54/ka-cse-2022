<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="recovery-logging-aries" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9e6"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f7ff"/>
      <stop offset="100%" style="stop-color:#b3d9ff"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7986cb"/>
      <stop offset="100%" style="stop-color:#5c6bc0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #37474f; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #455a64; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #546e7a; }
    .phase-box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .phase-box-1 { animation: fadeIn 0.6s ease-out 0.2s forwards, pulse 3s ease-in-out 2s infinite; }
    .phase-box-2 { animation: slideInLeft 0.5s ease-out 0.4s forwards; }
    .phase-box-3 { animation: slideInRight 0.5s ease-out 0.6s forwards; }
    .data-structure { animation: slideInUp 0.5s ease-out 0.8s forwards; opacity: 0; }
    .arrow-path { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out 1s forwards; }
    .concept-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .concept-1 { animation: fadeIn 0.5s ease-out 0.3s forwards; }
    .concept-2 { animation: fadeIn 0.5s ease-out 0.5s forwards; }
    .concept-3 { animation: fadeIn 0.5s ease-out 0.7s forwards; }
    .highlight { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Title: ARIES Recovery Algorithm - Three-Phase Database Recovery">ARIES Recovery &amp; Logging</text>
  
  <!-- Key Concepts Boxes -->
  <g class="concept-box concept-1" transform="translate(10, 45)">
    <rect width="125" height="38" rx="5" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="62" y="16" text-anchor="middle" class="label" font-size="11">Write-Ahead Logging</text>
    <text x="62" y="29" text-anchor="middle" class="detail">Log before data write</text>
  </g>
  
  <g class="concept-box concept-2" transform="translate(145, 45)">
    <rect width="125" height="38" rx="5" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="62" y="16" text-anchor="middle" class="label" font-size="11">Log Sequence Number</text>
    <text x="62" y="29" text-anchor="middle" class="detail">Unique temporal ID</text>
  </g>
  
  <g class="concept-box concept-3" transform="translate(280, 45)">
    <rect width="125" height="38" rx="5" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="62" y="16" text-anchor="middle" class="label" font-size="11">CLR Records</text>
    <text x="62" y="29" text-anchor="middle" class="detail">Compensation logs</text>
  </g>
  
  <!-- ARIES Three Phases -->
  <g class="phase-box phase-box-1" data-narration="Analysis Phase: Scans log to identify dirty pages and active transactions">
    <rect x="30" y="95" width="100" height="60" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="120" text-anchor="middle" class="label" fill="#e65100">ANALYSIS</text>
    <text x="80" y="138" text-anchor="middle" class="detail">Identify dirty pages</text>
    <text x="80" y="150" text-anchor="middle" class="detail">&amp; active txns</text>
  </g>
  
  <g class="phase-box phase-box-2" data-narration="Redo Phase: Replays all updates from log to reconstruct database state">
    <rect x="160" y="95" width="100" height="60" rx="8" fill="#e3f2fd" stroke="#64b5f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="120" text-anchor="middle" class="label" fill="#1565c0">REDO</text>
    <text x="210" y="138" text-anchor="middle" class="detail">Reconstruct state</text>
    <text x="210" y="150" text-anchor="middle" class="detail">from log history</text>
  </g>
  
  <g class="phase-box phase-box-3" data-narration="Undo Phase: Rolls back uncommitted transactions using CLRs">
    <rect x="290" y="95" width="100" height="60" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="2" filter="url(#shadow)"/>
    <text x="340" y="120" text-anchor="middle" class="label" fill="#c2185b">UNDO</text>
    <text x="340" y="138" text-anchor="middle" class="detail">Rollback uncommitted</text>
    <text x="340" y="150" text-anchor="middle" class="detail">using CLRs</text>
  </g>
  
  <!-- Arrows between phases -->
  <path d="M135 125 L155 125" stroke="#7986cb" stroke-width="2" class="arrow-path" marker-end="url(#arrowhead)"/>
  <path d="M265 125 L285 125" stroke="#7986cb" stroke-width="2" class="arrow-path" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7986cb"/>
    </marker>
  </defs>
  
  <!-- Data Structures Section -->
  <g class="data-structure" data-narration="Supporting Data Structures: Transaction Table, Dirty Page Table, and Log File">
    <rect x="30" y="170" width="360" height="75" rx="5" fill="#fafafa" stroke="#bdbdbd" stroke-width="1"/>
    <text x="50" y="190" class="label" font-size="13">Data Structures:</text>
    
    <!-- Transaction Table -->
    <rect x="45" y="200" width="100" height="35" rx="3" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
    <text x="95" y="215" text-anchor="middle" class="label" font-size="10">Transaction Table</text>
    <text x="95" y="228" text-anchor="middle" class="detail">TID | Status | LSN</text>
    
    <!-- Dirty Page Table -->
    <rect x="155" y="200" width="100" height="35" rx="3" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
    <text x="205" y="215" text-anchor="middle" class="label" font-size="10">Dirty Page Table</text>
    <text x="205" y="228" text-anchor="middle" class="detail">PageID | RecLSN</text>
    
    <!-- Log File -->
    <rect x="265" y="200" width="100" height="35" rx="3" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1"/>
    <text x="315" y="215" text-anchor="middle" class="label" font-size="10">Log File</text>
    <text x="315" y="228" text-anchor="middle" class="detail">LSN | Type | Data</text>
  </g>
  
  <!-- Recovery Process Flow -->
  <g class="data-structure" data-narration="Recovery Process: Checkpoint → Crash → Analysis → Redo → Undo → Consistency">
    <rect x="30" y="255" width="360" height="55" rx="5" fill="#fafafa" stroke="#bdbdbd" stroke-width="1"/>
    <text x="50" y="272" class="label" font-size="13">Recovery Flow:</text>
    
    <!-- Flow boxes -->
    <rect x="50" y="282" width="45" height="20" rx="3" fill="#d1c4e9" stroke="#9575cd"/>
    <text x="72" y="296" text-anchor="middle" class="detail" font-size="9">Checkpoint</text>
    
    <path d="M97 292 L110 292" stroke="#9e9e9e" stroke-width="1"/>
    
    <rect x="112" y="282" width="40" height="20" rx="3" fill="#ffcdd2" stroke="#e57373"/>
    <text x="132" y="296" text-anchor="middle" class="detail" font-size="9">Crash</text>
    
    <path d="M154 292 L170 292" stroke="#9e9e9e" stroke-width="1"/>
    
    <rect x="172" y="282" width="50" height="20" rx="3" fill="#fff9c4" stroke="#ffd54f"/>
    <text x="197" y="296" text-anchor="middle" class="detail" font-size="9">Analysis</text>
    
    <path d="M224 292 L240 292" stroke="#9e9e9e" stroke-width="1"/>
    
    <rect x="242" y="282" width="40" height="20" rx="3" fill="#bbdefb" stroke="#64b5f6"/>
    <text x="262" y="296" text-anchor="middle" class="detail" font-size="9">Redo</text>
    
    <path d="M284 292 L300 292" stroke="#9e9e9e" stroke-width="1"/>
    
    <rect x="302" y="282" width="40" height="20" rx="3" fill="#f8bbd9" stroke="#f06292"/>
    <text x="322" y="296" text-anchor="middle" class="detail" font-size="9">Undo</text>
    
    <path d="M344 292 L355 292" stroke="#9e9e9e" stroke-width="1"/>
    
    <circle cx="360" cy="292" r="8" fill="#c8e6c9" stroke="#81c784"/>
    <text x="360" y="296" text-anchor="middle" class="detail" font-size="8">✓</text>
  </g>
  
  <!-- Example Box -->
  <g class="data-structure highlight" data-narration="Example: Transaction T1 fails after first update - recovery undoes both operations">
    <rect x="30" y="320" width="360" height="70" rx="5" fill="url(#boxGradient1)" stroke="#ffd54f" stroke-width="1"/>
    <text x="50" y="340" class="label" font-size="12">Example: T1 UPDATE fails before commit</text>
    <text x="50" y="358" class="detail">T1: BEGIN → UPDATE acc101 (-100) → CRASH → Recovery</text>
    <text x="50" y="375" class="detail">Result: Analysis→Redo first update→Undo both (CLRs)→Rollback</text>
  </g>
  
  <!-- Footer -->
  <text x="210" y="395" text-anchor="middle" class="detail" fill="#90a4ae">ARIES: Algorithms for Recovery and Isolation Exploiting Semantics</text>
</svg>