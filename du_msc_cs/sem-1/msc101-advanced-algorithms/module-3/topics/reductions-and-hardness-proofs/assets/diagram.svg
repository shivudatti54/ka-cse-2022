<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="reductions-and-hardness-proofs" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dced;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357a8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #ecf0f1; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .section-body { font-family: Arial, sans-serif; font-size: 10px; fill: #34495e; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-arrow { stroke-dasharray: 8,4; animation: flowRight 1s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text fade-in">Reductions and Hardness Proofs</text>
  
  <!-- Main Reduction Flow Diagram -->
  <g transform="translate(30, 60)" class="slide-in">
    <!-- Source Problem A -->
    <rect x="0" y="0" width="100" height="70" rx="8" fill="url(#boxGradient)" filter="url(#shadow)" />
    <text x="50" y="25" text-anchor="middle" class="label-text">Problem A</text>
    <text x="50" y="42" text-anchor="middle" class="detail-text">(Source)</text>
    <text x="50" y="56" text-anchor="middle" class="detail-text">NP-Complete</text>
  </g>
  
  <!-- Arrow from A to Transform -->
  <g transform="translate(140, 85)" class="fade-in" style="animation-delay: 0.3s">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#e67e22" stroke-width="3" />
    <polygon points="45,-6 55,0 45,6" fill="#e67e22" />
    <text x="25" y="-12" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="bold">≤p</text>
  </g>
  
  <!-- Transformation Box -->
  <g transform="translate(200, 60)" class="slide-in" style="animation-delay: 0.2s">
    <rect x="0" y="0" width="90" height="70" rx="8" fill="#f39c12" filter="url(#shadow)" />
    <text x="45" y="25" text-anchor="middle" class="label-text" fill="#fff">Polynomial</text>
    <text x="45" y="42" text-anchor="middle" class="label-text" fill="#fff">Time</text>
    <text x="45" y="56" text-anchor="middle" class="detail-text" fill="#fff8e1">Reduction f</text>
  </g>
  
  <!-- Arrow from Transform to B -->
  <g transform="translate(300, 85)" class="fade-in" style="animation-delay: 0.5s">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#e67e22" stroke-width="3" />
    <polygon points="45,-6 55,0 45,6" fill="#e67e22" />
  </g>
  
  <!-- Target Problem B -->
  <g transform="translate(360, 60)" class="slide-in" style="animation-delay: 0.3s">
    <rect x="0" y="0" width="100" height="70" rx="8" fill="#27ae60" filter="url(#shadow)" />
    <text x="50" y="25" text-anchor="middle" class="label-text">Problem B</text>
    <text x="50" y="42" text-anchor="middle" class="detail-text">(Target)</text>
    <text x="50" y="56" text-anchor="middle" class="detail-text">NP-Hard?</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g transform="translate(20, 150)" class="fade-in" style="animation-delay: 0.6s" data-narration="Key definitions and properties">
    <rect x="0" y="0" width="180" height="100" rx="6" fill="#ffffff" stroke="#b8d4e3" stroke-width="2" filter="url(#shadow)" />
    <text x="90" y="20" text-anchor="middle" class="section-title">Key Definitions</text>
    <line x1="10" y1="30" x2="170" y2="30" stroke="#b8d4e3" stroke-width="1" />
    <text x="15" y="48" class="section-body" font-weight="bold">NP-Complete:</text>
    <text x="15" y="62" class="section-body">∈ NP and NP-Hard</text>
    <text x="15" y="76" class="section-body" font-weight="bold">NP-Hard:</text>
    <text x="15" y="90" class="section-body">All NP problems ≤p to it</text>
  </g>
  
  <!-- Cook-Levin Theorem -->
  <g transform="translate(220, 150)" class="fade-in" style="animation-delay: 0.7s" data-narration="The foundation of NP-completeness">
    <rect x="0" y="0" width="180" height="100" rx="6" fill="#ffffff" stroke="#b8d4e3" stroke-width="2" filter="url(#shadow)" />
    <text x="90" y="20" text-anchor="middle" class="section-title">Cook-Levin Theorem</text>
    <line x1="10" y1="30" x2="170" y2="30" stroke="#b8d4e3" stroke-width="1" />
    <text x="90" y="50" text-anchor="middle" class="section-body" font-weight="bold" fill="#8e44ad">SAT is NP-Complete</text>
    <text x="90" y="66" text-anchor="middle" class="section-body">First NP-complete</text>
    <text x="90" y="80" class="section-body">problem discovered</text>
    <text x="90" y="92" class="section-body">(1971)</text>
  </g>
  
  <!-- Types of Reductions -->
  <g transform="translate(20, 265)" class="fade-in" style="animation-delay: 0.8s" data-narration="Different reduction types for various proofs">
    <rect x="0" y="0" width="180" height="85" rx="6" fill="#ffffff" stroke="#b8d4e3" stroke-width="2" filter="url(#shadow)" />
    <text x="90" y="18" text-anchor="middle" class="section-title">Types of Reductions</text>
    <line x1="10" y1="28" x2="170" y2="28" stroke="#b8d4e3" stroke-width="1" />
    <text x="15" y="46" class="section-body" font-weight="bold">• Many-one (Karp):</text>
    <text x="15" y="58" class="section-body">Function mapping</text>
    <text x="15" y="70" class="section-body" font-weight="bold">• Turing (Cook):</text>
    <text x="15" y="80" class="section-body">Oracle-based</text>
  </g>
  
  <!-- Hardness Proof Steps -->
  <g transform="translate(220, 265)" class="fade-in" style="animation-delay: 0.9s" data-narration="Standard structure for hardness proofs">
    <rect x="0" y="0" width="180" height="85" rx="6" fill="#ffffff" stroke="#b8d4e3" stroke-width="2" filter="url(#shadow)" />
    <text x="90" y="18" text-anchor="middle" class="section-title">Hardness Proof Steps</text>
    <line x1="10" y1="28" x2="170" y2="28" stroke="#b8d4e3" stroke-width="1" />
    <text x="15" y="44" class="section-body">1. Choose known hard X</text>
    <text x="15" y="56" class="section-body">2. Construct f: X → Y</text>
    <text x="15" y="68" class="section-body">3. Prove correctness</text>
    <text x="15" y="78" class="section-body">4. Show poly-time</text>
  </g>
  
  <!-- Visual indicator for A ≤p B -->
  <g transform="translate(30, 360)" class="pulse fade-in" style="animation-delay: 1s" data-narration="If A reduces to B, B is at least as hard as A">
    <rect x="0" y="0" width="360" height="30" rx="4" fill="#2c3e50" opacity="0.9" />
    <text x="180" y="20" text-anchor="middle" fill="#ecf0f1" font-size="12" font-family="Arial, sans-serif">If A ≤p B and A is hard → B is at least as hard</text>
  </g>
</svg>