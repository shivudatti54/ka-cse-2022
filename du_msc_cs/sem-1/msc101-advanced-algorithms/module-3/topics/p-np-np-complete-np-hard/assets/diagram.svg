<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="p-np-np-complete-np-hard">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="npGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b3d4fc;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#89c4f4;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="npcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#c49090;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="nphardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe0b2;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes borderPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title { animation: fadeIn 1s ease-out forwards; font-family: Georgia, serif; font-weight: bold; }
    .circle-p { animation: slideInLeft 0.8s ease-out forwards; }
    .circle-np { animation: slideInLeft 0.8s ease-out 0.2s forwards; opacity: 0; }
    .circle-npc { animation: fadeIn 0.8s ease-out 0.5s forwards; }
    .circle-nphard { animation: slideInRight 0.8s ease-out 0.3s forwards; opacity: 0; }
    .label { animation: fadeIn 1s ease-out forwards; }
    .description { animation: slideInUp 0.6s ease-out forwards; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    .box { animation: slideInUp 0.7s ease-out forwards; }
    .highlight { animation: borderPulse 2s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" class="title" fill="#2c3e50" font-family="Georgia, serif" font-weight="bold">
    Computational Complexity Classes
  </text>
  
  <!-- NP-Hard (largest region, drawn first) -->
  <ellipse cx="260" cy="230" rx="130" ry="120" fill="url(#nphardGradient)" stroke="#e65100" stroke-width="2" stroke-dasharray="8,4" class="circle-nphard" filter="url(#shadow)" data-narration="NP-Hard: Problems at least as hard as NP-complete problems. Not required to be in NP."/>
  
  <!-- NP Circle -->
  <ellipse cx="200" cy="220" rx="95" ry="85" fill="url(#npGradient)" stroke="#1565c0" stroke-width="2.5" class="circle-np" filter="url(#shadow)" data-narration="NP (Nondeterministic Polynomial): Problems verifiable in polynomial time."/>
  
  <!-- NP-Complete (boundary region within NP) -->
  <path d="M 200 155 A 85 75 0 0 1 275 220 A 85 75 0 0 1 200 285 A 85 75 0 0 1 125 220 A 85 75 0 0 1 200 155" fill="url(#npcGradient)" stroke="#7b1fa2" stroke-width="3" class="circle-npc highlight" filter="url(#shadow)" data-narration="NP-Complete: The hardest problems in NP. If one can be solved in P, all NP problems can be solved in P."/>
  
  <!-- P Circle (smallest, inside NP) -->
  <ellipse cx="170" cy="210" rx="40" ry="35" fill="url(#pGradient)" stroke="#2e7d32" stroke-width="2.5" class="circle-p" filter="url(#shadow)" data-narration="P (Polynomial): Problems solvable in polynomial time."/>
  
  <!-- Undecidable region indicator -->
  <rect x="320" y="50" width="85" height="45" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,2" class="box" data-narration="Undecidable: Problems that cannot be solved by any algorithm (e.g., Halting Problem)."/>
  <text x="362" y="70" text-anchor="middle" font-size="11" fill="#616161" font-family="Arial, sans-serif">Undecidable</text>
  <text x="362" y="84" text-anchor="middle" font-size="10" fill="#757575" font-family="Arial, sans-serif">(Halting Problem)</text>
  
  <!-- Arrows showing relationships -->
  <g class="arrow">
    <path d="M 155 175 Q 130 150 145 130" stroke="#e65100" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
  </defs>
  
  <!-- Labels -->
  <text x="170" y="210" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b5e20" class="label" font-family="Arial, sans-serif">P</text>
  <text x="170" y="228" text-anchor="middle" font-size="10" fill="#2e7d32" class="label" font-family="Arial, sans-serif">Polynomial</text>
  
  <text x="200" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#0d47a1" class="label" font-family="Arial, sans-serif">NP</text>
  <text x="200" y="238" text-anchor="middle" font-size="10" fill="#1565c0" class="label" font-family="Arial, sans-serif">Nondet. Polynomial</text>
  
  <text x="265" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a1b9a" class="label" font-family="Arial, sans-serif">NP-Complete</text>
  <text x="265" y="238" text-anchor="middle" font-size="9" fill="#7b1fa2" class="label" font-family="Arial, sans-serif">Hardest in NP</text>
  
  <text x="290" y="160" text-anchor="start" font-size="13" font-weight="bold" fill="#e65100" class="label" font-family="Arial, sans-serif">NP-Hard</text>
  <text x="290" y="175" text-anchor="start" font-size="9" fill="#ef6c00" class="label" font-family="Arial, sans-serif">As hard as NPC</text>
  
  <!-- Key Concept Boxes -->
  <g class="description" transform="translate(10, 310)">
    <rect x="0" y="0" width="195" height="80" rx="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="15" y="20" font-size="12" font-weight="bold" fill="#e65100" font-family="Arial, sans-serif">P ≠ NP Question</text>
    <text x="15" y="38" font-size="10" fill="#5d4037" font-family="Arial, sans-serif">Can every verifiable</text>
    <text x="15" y="52" font-size="10" fill="#5d4037" font-family="Arial, sans-serif">solution be found</text>
    <text x="15" y="66" font-size="10" fill="#5d4037" font-family="Arial, sans-serif">quickly? ($1M prize)</text>
  </g>
  
  <g class="description" transform="translate(215, 310)">
    <rect x="0" y="0" width="195" height="80" rx="6" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="15" y="20" font-size="12" font-weight="bold" fill="#1565c0" font-family="Arial, sans-serif">Relationships</text>
    <text x="15" y="38" font-size="10" fill="#37474f" font-family="Arial, sans-serif">P ⊂ NP ⊂ NP-Hard</text>
    <text x="15" y="52" font-size="10" fill="#37474f" font-family="Arial, sans-serif">NP-Complete ⊂ NP</text>
    <text x="15" y="66" font-size="10" fill="#37474f" font-family="Arial, sans-serif">NP-Complete ⊂ NP-Hard</text>
  </g>
  
  <!-- Examples -->
  <g class="label">
    <text x="130" y="255" text-anchor="middle" font-size="8" fill="#388e3c" font-family="Arial, sans-serif">Sorting</text>
    <text x="130" y="265" text-anchor="middle" font-size="8" fill="#388e3c" font-family="Arial, sans-serif">Shortest Path</text>
  </g>
  <g class="label">
    <text x="120" y="195" text-anchor="middle" font-size="8" fill="#1976d2" font-family="Arial, sans-serif">SAT</text>
    <text x="120" y="205" text-anchor="middle" font-size="8" fill="#1976d2" font-family="Arial, sans-serif">Hamiltonian</text>
  </g>
  <g class="label">
    <text x="315" y="210" text-anchor="start" font-size="8" fill="#e65100" font-family="Arial, sans-serif">Traveling</text>
    <text x="315" y="220" text-anchor="start" font-size="8" fill="#e65100" font-family="Arial, sans-serif">Salesman (dec.)</text>
  </g>
</svg>