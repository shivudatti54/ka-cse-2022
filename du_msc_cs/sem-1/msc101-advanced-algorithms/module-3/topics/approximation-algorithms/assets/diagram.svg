<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="approximation-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9aa2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#98fb98;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeb85;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-1 { animation: slideIn 0.8s ease-out 0.2s both; }
    .section-2 { animation: slideIn 0.8s ease-out 0.4s both; }
    .section-3 { animation: slideIn 0.8s ease-out 0.6s both; }
    .section-4 { animation: fadeIn 0.8s ease-out 0.8s both; }
    .section-5 { animation: fadeIn 0.8s ease-out 1s both; }
    .section-6 { animation: fadeIn 0.8s ease-out 1.2s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .bounce { animation: bounce 1.5s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333" class="title">Approximation Algorithms</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#888" stroke-width="1" class="title"/>
  
  <!-- Input Section -->
  <g class="section-1" data-narration="Input: NP-hard problem instance such as Bin Packing, TSP, or Vertex Cover">
    <rect x="20" y="60" width="110" height="70" fill="url(#boxGradient1)" rx="8" ry="8" stroke="#e57373" stroke-width="2"/>
    <text x="75" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">INPUT</text>
    <text x="75" y="100" text-anchor="middle" font-size="11" fill="#444">NP-hard</text>
    <text x="75" y="115" text-anchor="middle" font-size="11" fill="#444">Problem</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="130" y1="95" x2="165" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="section-1"/>
  
  <!-- Algorithm Section -->
  <g class="section-2" data-narration="Approximation Algorithm: Processes the input using heuristics like First-Fit for Bin Packing">
    <rect x="170" y="60" width="130" height="70" fill="url(#boxGradient2)" rx="8" ry="8" stroke="#81c784" stroke-width="2"/>
    <text x="235" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">APPROXIMATION</text>
    <text x="235" y="100" text-anchor="middle" font-size="11" fill="#444">Algorithm</text>
    <text x="235" y="115" text-anchor="middle" font-size="11" fill="#444">(Polynomial Time)</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="300" y1="95" x2="335" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)" class="section-2"/>
  
  <!-- Output Section -->
  <g class="section-3" data-narration="Output: Approximate solution close to optimal with known approximation ratio">
    <rect x="340" y="60" width="70" height="70" fill="url(#boxGradient3)" rx="8" ry="8" stroke="#64b5f6" stroke-width="2"/>
    <text x="375" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">OUTPUT</text>
    <text x="375" y="100" text-anchor="middle" font-size="11" fill="#444">Approx.</text>
    <text x="375" y="115" text-anchor="middle" font-size="11" fill="#444">Solution</text>
  </g>
  
  <!-- Key Concepts Box - NP-hard -->
  <g class="section-4" data-narration="NP-hard problems cannot be solved exactly in reasonable time">
    <rect x="20" y="155" width="180" height="45" fill="url(#boxGradient1)" rx="6" ry="6" stroke="#e57373" stroke-width="1"/>
    <text x="30" y="172" font-size="12" font-weight="bold" fill="#333">NP-hard Problems</text>
    <text x="30" y="188" font-size="10" fill="#444">Computationally infeasible to solve exactly</text>
  </g>
  
  <!-- Key Concepts Box - Approximation Ratio -->
  <g class="section-5" data-narration="Approximation ratio measures quality: how close approximate is to optimal">
    <rect x="220" y="155" width="180" height="45" fill="url(#boxGradient4)" rx="6" ry="6" stroke="#ffd54f" stroke-width="1"/>
    <text x="230" y="172" font-size="12" font-weight="bold" fill="#333">Approximation Ratio</text>
    <text x="230" y="188" font-size="10" fill="#444">Measure of closeness to optimal solution</text>
  </g>
  
  <!-- Key Concepts Box - PTAS -->
  <g class="section-6" data-narration="PTAS: Algorithm that can get arbitrarily close to optimal in polynomial time">
    <rect x="20" y="215" width="180" height="45" fill="url(#boxGradient2)" rx="6" ry="6" stroke="#81c784" stroke-width="1"/>
    <text x="30" y="232" font-size="12" font-weight="bold" fill="#333">PTAS</text>
    <text x="30" y="248" font-size="10" fill="#444">Polynomial-Time Approximation Scheme</text>
  </g>
  
  <!-- Key Concepts Box - FPTAS -->
  <g class="section-6" data-narration="FPTAS: PTAS with runtime polynomial in both input size and 1/epsilon">
    <rect x="220" y="215" width="180" height="45" fill="url(#boxGradient3)" rx="6" ry="6" stroke="#64b5f6" stroke-width="1"/>
    <text x="230" y="232" font-size="12" font-weight="bold" fill="#333">FPTAS</text>
    <text x="230" y="248" font-size="10" fill="#444">Fully PTAS - poly in input and 1/ε</text>
  </g>
  
  <!-- Example Box - Bin Packing -->
  <g class="section-4" data-narration="Example: First-Fit algorithm for Bin Packing problem">
    <rect x="20" y="275" width="380" height="55" fill="white" rx="6" ry="6" stroke="#888" stroke-width="1" class="pulse"/>
    <text x="30" y="292" font-size="13" font-weight="bold" fill="#333">Example: Bin Packing Problem</text>
    <text x="30" y="310" font-size="11" fill="#444">Pack items into minimum bins using </text>
    <text x="180" y="310" font-size="11" font-weight="bold" fill="#e57373">First-Fit Algorithm</text>
    <text x="268" y="310" font-size="11" fill="#444"> (greedy heuristic)</text>
  </g>
  
  <!-- Flow indicator arrow -->
  <g class="bounce">
    <polygon points="200,355 210,365 190,365" fill="#666"/>
    <text x="210" y="375" font-size="11" fill="#555">Approximation provides</text>
    <text x="210" y="388" font-size="11" fill="#555">fast, near-optimal solutions</text>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="75" cy="95" r="3" fill="#e57373" class="pulse"/>
  <circle cx="235" cy="95" r="3" fill="#81c784" class="pulse"/>
  <circle cx="375" cy="95" r="3" fill="#64b5f6" class="pulse"/>
</svg>