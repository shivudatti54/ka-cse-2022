<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="amortized-analysis-advanced">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dce9f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aggregateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9acbff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accountingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c6f6d5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ae6b4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="potentialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#feebc8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbd38d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#3b5998" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a67d8"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .box1-anim { animation: slideIn 0.8s ease-out 0.2s forwards; opacity: 0; }
    .box2-anim { animation: slideIn 0.8s ease-out 0.4s forwards; opacity: 0; }
    .box3-anim { animation: slideIn 0.8s ease-out 0.6s forwards; opacity: 0; }
    .graph-anim { animation: fadeIn 1s ease-out 0.8s forwards; opacity: 0; }
    .insight-anim { animation: slideInUp 0.8s ease-out 1s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .worst-line { stroke-dasharray: 500; animation: drawLine 2s ease-out 1s forwards; }
    .avg-line { stroke-dasharray: 500; animation: drawLine 2s ease-out 1.2s forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="title-anim">
    <text x="210" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2d3748">
      Amortized Analysis
    </text>
    <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5a67d8" font-style="italic">
      Advanced Concepts
    </text>
  </g>
  
  <!-- Concept Boxes -->
  <g class="box1-anim" data-narration="Aggregate Analysis: Calculates total cost of n operations and divides by n to get amortized cost">
    <rect x="15" y="65" width="120" height="95" rx="10" fill="url(#aggregateGrad)" stroke="#4299e1" stroke-width="2" filter="url(#shadow)"/>
    <text x="75" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c5282">Aggregate</text>
    <text x="75" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3748">Analysis</text>
    <line x1="35" y1="120" x2="115" y2="120" stroke="#4299e1" stroke-width="1" stroke-opacity="0.5"/>
    <text x="75" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Total Cost ÷ n</text>
    <text x="75" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">= Amortized Cost</text>
  </g>
  
  <g class="box2-anim" data-narration="Accounting Method: Assigns costs to operations, storing excess as 'credit' for future expensive operations">
    <rect x="150" y="65" width="120" height="95" rx="10" fill="url(#accountingGrad)" stroke="#48bb78" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#276749">Accounting</text>
    <text x="210" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3748">Method</text>
    <line x1="170" y1="120" x2="250" y2="120" stroke="#48bb78" stroke-width="1" stroke-opacity="0.5"/>
    <text x="210" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Credit System</text>
    <text x="210" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Save &amp; Spend</text>
  </g>
  
  <g class="box3-anim" data-narration="Potential Method: Uses potential energy of data structure to compute amortized cost">
    <rect x="285" y="65" width="120" height="95" rx="10" fill="url(#potentialGrad)" stroke="#ed8936" stroke-width="2" filter="url(#shadow)"/>
    <text x="345" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#744210">Potential</text>
    <text x="345" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2d3748">Method</text>
    <line x1="305" y1="120" x2="385" y2="120" stroke="#ed8936" stroke-width="1" stroke-opacity="0.5"/>
    <text x="345" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Potential</text>
    <text x="345" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Φ = Energy</text>
  </g>
  
  <!-- Graph Section -->
  <g class="graph-anim" data-narration="Graph comparing worst-case fluctuating costs to stable amortized average cost">
    <rect x="20" y="175" width="380" height="165" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    
    <!-- Graph Title -->
    <text x="210" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a5568">Average-Case vs Worst-Case Performance</text>
    
    <!-- Y-axis -->
    <line x1="50" y1="210" x2="50" y2="320" stroke="#a0aec0" stroke-width="1"/>
    <text x="38" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096" transform="rotate(-90,38,265)">Cost</text>
    
    <!-- X-axis -->
    <line x1="50" y1="320" x2="380" y2="320" stroke="#a0aec0" stroke-width="1"/>
    <text x="215" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">Operations</text>
    
    <!-- Y-axis ticks -->
    <text x="42" y="215" text-anchor="end" font-size="8" fill="#718096">high</text>
    <text x="42" y="265" text-anchor="end" font-size="8" fill="#718096">med</text>
    <text x="42" y="315" text-anchor="end" font-size="8" fill="#718096">low</text>
    
    <!-- Worst Case Line (red, erratic) -->
    <polyline class="worst-line" points="60,240 80,200 100,290 120,210 140,300 160,190 180,280 200,195 220,285 240,205 260,295 280,185 300,275 320,200 340,290 360,215" 
              fill="none" stroke="#e53e3e" stroke-width="2" stroke-opacity="0.6"/>
    
    <!-- Amortized Line (blue, stable) -->
    <polyline class="avg-line" points="60,260 100,258 140,262 180,259 220,261 260,258 300,260 340,259" 
              fill="none" stroke="#4299e1" stroke-width="3"/>
    
    <!-- Legend -->
    <rect x="270" y="220" width="110" height="50" rx="4" fill="#f7fafc" stroke="#e2e8f0"/>
    <line x1="280" y1="235" x2="300" y2="235" stroke="#e53e3e" stroke-width="2" stroke-opacity="0.6"/>
    <text x="305" y="238" font-family="Arial, sans-serif" font-size="9" fill="#e53e3e">Worst-Case</text>
    <line x1="280" y1="252" x2="300" y2="252" stroke="#4299e1" stroke-width="2"/>
    <text x="305" y="255" font-family="Arial, sans-serif" font-size="9" fill="#4299e1" font-weight="bold">Amortized Cost</text>
    <line x1="280" y1="266" x2="300" y2="266" stroke="#48bb78" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="305" y="269" font-family="Arial, sans-serif" font-size="9" fill="#48bb78">Average</text>
  </g>
  
  <!-- Insight Box -->
  <g class="insight-anim" data-narration="Key insight: Amortized cost provides realistic performance estimate by averaging over sequence of operations">
    <rect x="20" y="355" width="380" height="38" rx="6" fill="#faf5ff" stroke="#9f7aea" stroke-width="1.5"/>
    <text x="210" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#553c9a" font-weight="bold">Key Insight:</text>
    <text x="210" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b46c1">Amortized cost = Average cost per operation over sequence | Worst ≠ Average</text>
  </g>
  
  <!-- Connecting arrows between boxes -->
  <g class="pulse-anim" opacity="0.6">
    <path d="M135 112 L150 112" stroke="#5a67d8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M270 112 L285 112" stroke="#5a67d8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="340" r="25" fill="none" stroke="#ebf4ff" stroke-width="15"/>
  <circle cx="200" cy="340" r="8" fill="#4299e1" opacity="0.3"/>
</svg>