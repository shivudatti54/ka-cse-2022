<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="greedy-algorithms-advanced">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0e6f6"/>
      <stop offset="100%" style="stop-color:#e6f0f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .concept-box { fill: #fff; stroke: #b8c5d6; stroke-width: 1.5; rx: 8; }
    .concept-box:hover { stroke: #7f8c8d; }
    .node { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
    .edge { stroke: #7f8c8d; stroke-width: 1.5; fill: none; }
    .arrow { fill: #e74c3c; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .priority-q { fill: #fff9e6; stroke: #f39c12; stroke-width: 1.5; rx: 4; }
    .freq-table { fill: #e8f8f5; stroke: #1abc9c; stroke-width: 1.5; rx: 4; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title slide-up">Greedy Algorithms Advanced</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#9b59b6" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: Matroid Theory -->
  <g class="slide-up" style="animation-delay: 0.4s" data-narration="Matroid Theory provides algebraic structure for proving greedy optimality through basis axioms">
    <rect x="20" y="55" width="115" height="75" class="concept-box" filter="url(#shadow)"/>
    <text x="77" y="72" text-anchor="middle" class="label" font-weight="bold">Matroid Theory</text>
    <text x="27" y="90" class="detail">Hereditary property</text>
    <text x="27" y="105" class="detail">Augmentation</text>
    <text x="27" y="120" class="detail">|B₁| = |B₂|</text>
  </g>
  
  <!-- Section 2: Submodular Optimization -->
  <g class="slide-up" style="animation-delay: 0.5s" data-narration="Submodular functions exhibit diminishing returns property enabling greedy approximations">
    <rect x="150" y="55" width="125" height="75" class="concept-box" filter="url(#shadow)"/>
    <text x="212" y="72" text-anchor="middle" class="label" font-weight="bold">Submodular</text>
    <text x="157" y="90" class="detail">f(A∪{x}) - f(A)</text>
    <text x="157" y="105" class="detail">≥ f(B∪{x}) - f(B)</text>
    <text x="157" y="120" class="detail">(1-1/e) approx</text>
  </g>
  
  <!-- Section 3: Online Greedy -->
  <g class="slide-up" style="animation-delay: 0.6s" data-narration="Online algorithms make decisions without future knowledge, analyzed via competitive ratio">
    <rect x="290" y="55" width="110" height="75" class="concept-box" filter="url(#shadow)"/>
    <text x="345" y="72" text-anchor="middle" class="label" font-weight="bold">Online Greedy</text>
    <text x="297" y="90" class="detail">No future knowledge</text>
    <text x="297" y="105" class="detail">Competitive ratio</text>
    <text x="297" y="120" class="detail">Ski rental</text>
  </g>
  
  <!-- Section 4: Exchange Arguments -->
  <g class="slide-up" style="animation-delay: 0.7s" data-narration="Exchange arguments prove optimality by swapping elements between solutions">
    <rect x="20" y="145" width="180" height="55" class="concept-box" filter="url(#shadow)"/>
    <text x="110" y="162" text-anchor="middle" class="label" font-weight="bold">Exchange Arguments</text>
    <text x="27" y="182" class="detail">Swap elements between solutions to prove optimality</text>
  </g>
  
  <!-- Section 5: Approximation -->
  <g class="slide-up" style="animation-delay: 0.8s" data-narration="Approximation factors measure how close greedy solutions are to optimal">
    <rect x="215" y="145" width="185" height="55" class="concept-box" filter="url(#shadow)"/>
    <text x="307" y="162" text-anchor="middle" class="label" font-weight="bold">Approximation Analysis</text>
    <text x="222" y="182" class="detail">α-approximation: solution within α×OPT</text>
  </g>
  
  <!-- Huffman Tree Section -->
  <g class="slide-up" style="animation-delay: 0.9s" data-narration="Huffman tree construction demonstrates greedy merging of nodes by frequency">
    <text x="210" y="215" text-anchor="middle" class="label" font-weight="bold">Huffman Tree Construction</text>
    
    <!-- Frequency Table -->
    <rect x="25" y="225" width="80" height="70" class="freq-table" filter="url(#shadow)"/>
    <text x="65" y="242" text-anchor="middle" class="label" font-weight="bold">Frequencies</text>
    <text x="32" y="260" class="detail">A: 45</text>
    <text x="32" y="275" class="detail">B: 13</text>
    <text x="32" y="290" class="detail">C: 12</text>
    <text x="65" y="260" class="detail">D: 16</text>
    <text x="65" y="275" class="detail">E: 9</text>
    <text x="65" y="290" class="detail">F: 5</text>
    
    <!-- Priority Queue -->
    <rect x="115" y="225" width="100" height="70" class="priority-q" filter="url(#shadow)"/>
    <text x="165" y="242" text-anchor="middle" class="label" font-weight="bold">Priority Queue</text>
    <text x="122" y="260" class="detail">PQ: [F:5, E:9, C:12]</text>
    <text x="122" y="275" class="detail">PQ: [B:13, D:16, A:45]</text>
    <text x="122" y="290" class="detail">Extract min → merge</text>
    
    <!-- Binary Tree -->
    <g transform="translate(230, 220)">
      <!-- Tree edges with animation -->
      <line x1="45" y1="50" x2="20" y2="90" class="edge" stroke-dasharray="4" style="animation: drawLine 1s ease-out forwards; animation-delay: 1.2s"/>
      <line x1="45" y1="50" x2="70" y2="90" class="edge" stroke-dasharray="4" style="animation: drawLine 1s ease-out forwards; animation-delay: 1.4s"/>
      <line x1="20" y1="90" x2="10" y2="130" class="edge" stroke-dasharray="4" style="animation: drawLine 1s ease-out forwards; animation-delay: 1.6s"/>
      <line x1="20" y1="90" x2="30" y2="130" class="edge" stroke-dasharray="4" style="animation: drawLine 1s ease-out forwards; animation-delay: 1.8s"/>
      <line x1="70" y1="90" x2="60" y2="130" class="edge" stroke-dasharray="4" style="animation: drawLine 1s ease-out forwards; animation-delay: 2s"/>
      <line x1="70" y1="90" x2="80" y2="130" class="edge" stroke-dasharray="4" style="animation: drawLine 1s ease-out forwards; animation-delay: 2.2s"/>
      
      <!-- Root node -->
      <circle cx="45" cy="50" r="12" class="node pulse" fill="#9b59b6" stroke="#8e44ad"/>
      <text x="45" y="54" text-anchor="middle" fill="white" font-size="10" font-weight="bold">14</text>
      
      <!-- Level 1 nodes -->
      <circle cx="20" cy="90" r="10" class="node" fill="#3498db"/>
      <text x="20" y="94" text-anchor="middle" fill="white" font-size="9">9</text>
      <circle cx="70" cy="90" r="10" class="node" fill="#3498db"/>
      <text x="70" y="94" text-anchor="middle" fill="white" font-size="9">25</text>
      
      <!-- Leaf nodes -->
      <circle cx="10" cy="130" r="9" class="node" fill="#27ae60"/>
      <text x="10" y="134" text-anchor="middle" fill="white" font-size="8">F</text>
      <circle cx="30" cy="130" r="9" class="node" fill="#27ae60"/>
      <text x="30" y="134" text-anchor="middle" fill="white" font-size="8">E</text>
      <circle cx="60" cy="130" r="9" class="node" fill="#27ae60"/>
      <text x="60" y="134" text-anchor="middle" fill="white" font-size="8">C</text>
      <circle cx="80" cy="130" r="9" class="node" fill="#27ae60"/>
      <text x="80" y="134" text-anchor="middle" fill="white" font-size="8">B/D</text>
    </g>
  </g>
  
  <!-- Arrow connections -->
  <g class="fade-in" style="animation-delay: 1s">
    <path d="M 135 85 L 150 85" stroke="#e74c3c" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Step indicators -->
  <g class="slide-up" style="animation-delay: 1.1s" data-narration="Step-by-step visualization shows greedy choice at each stage">
    <text x="210" y="370" text-anchor="middle" class="detail" font-style="italic">Greedy Choice: Merge smallest frequencies repeatedly → optimal prefix code</text>
  </g>
  
  <!-- Key theorem box -->
  <rect x="80" y="330" width="260" height="30" fill="#fff3cd" stroke="#ffc107" stroke-width="1" rx="4" class="fade-in" style="animation-delay: 1.3s"/>
  <text x="210" y="350" text-anchor="middle" class="detail" font-weight="bold">All maximal independent sets have equal size (Matroids)</text>
</svg>