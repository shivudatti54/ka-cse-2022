<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dynamic-programming-advanced">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e4eaf0"/>
      <stop offset="100%" style="stop-color:#d4e0ed"/>
    </linearGradient>
    <linearGradient id="sectionGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="sectionGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="sectionGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="sectionGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fab1a0"/>
      <stop offset="100%" style="stop-color:#e17055"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3436; }
    .subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #636e72; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2d3436; }
    .label { font-family: 'Consolas', monospace; font-size: 11px; fill: #2d3436; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #636e72; }
    .cell { font-family: 'Consolas', monospace; font-size: 10px; fill: #2d3436; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-slide-left { animation: slideInLeft 0.7s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g data-narration="Main title showing the topic name">
    <text x="210" y="30" text-anchor="middle" class="title anim-fade">Dynamic Programming</text>
    <text x="210" y="50" text-anchor="middle" class="subtitle anim-fade delay-1">Advanced Techniques</text>
  </g>
  
  <!-- Section 1: Bitmask DP -->
  <g data-narration="Bitmask DP leverages bitwise operations to represent subsets efficiently">
    <rect x="10" y="65" width="125" height="90" rx="8" fill="url(#sectionGradient1)" filter="url(#shadow)" class="anim-slide"/>
    <text x="72" y="82" text-anchor="middle" class="section-title">Bitmask DP</text>
    <text x="20" y="100" class="label">States: 2^n subsets</text>
    <text x="20" y="115" class="detail">Use: subset problems</text>
    <text x="20" y="130" class="detail">n ≤ 20-25</text>
    <!-- Bit representation -->
    <g transform="translate(25, 142)">
      <rect x="0" y="0" width="95" height="12" rx="2" fill="#fff" stroke="#f39c12" stroke-width="0.5"/>
      <text x="48" y="9" text-anchor="middle" class="cell">10110</text>
    </g>
  </g>
  
  <!-- Section 2: Tree DP -->
  <g data-narration="Tree DP processes hierarchical tree structures bottom-up">
    <rect x="145" y="65" width="125" height="90" rx="8" fill="url(#sectionGradient2)" filter="url(#shadow)" class="anim-slide delay-1"/>
    <text x="207" y="82" text-anchor="middle" class="section-title">Tree DP</text>
    <text x="155" y="100" class="label">Root-to-leaf paths</text>
    <text x="155" y="115" class="detail">Use: hierarchical data</text>
    <text x="155" y="130" class="detail">Post-order traversal</text>
    <!-- Tree icon -->
    <g transform="translate(175, 140)" stroke="#00b894" stroke-width="1.5" fill="none">
      <circle cx="25" cy="5" r="4" fill="#00b894"/>
      <circle cx="10" cy="20" r="3" fill="#00b894"/>
      <circle cx="25" cy="20" r="3" fill="#00b894"/>
      <circle cx="40" cy="20" r="3" fill="#00b894"/>
      <line x1="25" y1="9" x2="10" y2="17"/>
      <line x1="25" y1="9" x2="25" y2="17"/>
      <line x1="25" y1="9" x2="40" y2="17"/>
    </g>
  </g>
  
  <!-- Section 3: Digit DP -->
  <g data-narration="Digit DP processes numbers digit by digit with state tracking">
    <rect x="280" y="65" width="125" height="90" rx="8" fill="url(#sectionGradient3)" filter="url(#shadow)" class="anim-slide delay-2"/>
    <text x="342" y="82" text-anchor="middle" class="section-title" style="fill:white">Digit DP</text>
    <text x="290" y="100" class="label" style="fill:white">digit[pos][tight][flag]</text>
    <text x="290" y="115" class="detail" style="fill:#dfe6e9">Use: number counting</text>
    <text x="290" y="130" class="detail" style="fill:#dfe6e9">Range queries</text>
    <!-- Number display -->
    <g transform="translate(305, 140)">
      <rect x="0" y="0" width="75" height="14" rx="2" fill="rgba(255,255,255,0.2)" stroke="#a29bfe"/>
      <text x="38" y="10" text-anchor="middle" class="cell" fill="white">1 2 4 5</text>
    </g>
  </g>
  
  <!-- Section 4: Divide & Conquer Optimization -->
  <g data-narration="Divide and conquer DP optimization reduces O(n²) to O(n log n)">
    <rect x="10" y="165" width="125" height="80" rx="8" fill="url(#sectionGradient4)" filter="url(#shadow)" class="anim-slide-left"/>
    <text x="72" y="182" text-anchor="middle" class="section-title">DP Optimization</text>
    <text x="20" y="200" class="label">Divide &amp; Conquer</text>
    <text x="20" y="215" class="detail">Monge array property</text>
    <text x="20" y="230" class="detail">O(n²) → O(n log n)</text>
  </g>
  
  <!-- Section 5: Knapsack DP Table (Key Diagram) -->
  <g data-narration="Knapsack DP table showing items vs capacity decisions with optimal values">
    <rect x="145" y="165" width="260" height="110" rx="8" fill="white" stroke="#b2bec3" stroke-width="1" filter="url(#shadow)" class="anim-slide-left delay-1"/>
    <text x="275" y="182" text-anchor="middle" class="section-title">Knapsack DP Table</text>
    
    <!-- DP Table -->
    <g transform="translate(160, 192)">
      <!-- Header row -->
      <rect x="0" y="0" width="230" height="16" fill="#dfe6e9"/>
      <text x="5" y="11" class="label" font-weight="bold">Item\Cap</text>
      <text x="45" y="11" class="cell" font-weight="bold">0</text>
      <text x="70" y="11" class="cell" font-weight="bold">1</text>
      <text x="95" y="11" class="cell" font-weight="bold">2</text>
      <text x="120" y="11" class="cell" font-weight="bold">3</text>
      <text x="145" y="11" class="cell" font-weight="bold">4</text>
      <text x="170" y="11" class="cell" font-weight="bold">5</text>
      <text x="195" y="11" class="cell" font-weight="bold">6</text>
      
      <!-- Row 1: Item 0 -->
      <rect x="0" y="16" width="230" height="14" fill="#ffeaa7"/>
      <text x="5" y="26" class="label">I₀(w:2,v:3)</text>
      <text x="48" y="26" class="cell">0</text>
      <text x="73" y="26" class="cell">0</text>
      <text x="98" y="26" class="cell">3</text>
      <text x="123" y="26" class="cell">3</text>
      <text x="148" y="26" class="cell">3</text>
      <text x="173" y="26" class="cell">3</text>
      <text x="198" y="26" class="cell">3</text>
      
      <!-- Row 2: Item 1 -->
      <rect x="0" y="30" width="230" height="14" fill="#81ecec"/>
      <text x="5" y="40" class="label">I₁(w:3,v:4)</text>
      <text x="48" y="40" class="cell">0</text>
      <text x="73" y="40" class="cell">0</text>
      <text x="98" y="40" class="cell">3</text>
      <text x="123" y="40" class="cell">4</text>
      <text x="148" y="40" class="cell">4</text>
      <text x="173" y="40" class="cell">7</text>
      <text x="198" y="40" class="cell">7</text>
      
      <!-- Row 3: Item 2 -->
      <rect x="0" y="44" width="230" height="14" fill="#a29bfe"/>
      <text x="5" y="54" class="label" style="fill:white">I₂(w:1,v:2)</text>
      <text x="48" y="54" class="cell" fill="white">0</text>
      <text x="73" y="54" class="cell" fill="white">2</text>
      <text x="98" y="54" class="cell" fill="white">3</text>
      <text x="123" y="54" class="cell" fill="white">5</text>
      <text x="148" y="54" class="cell" fill="white">6</text>
      <text x="173" y="54" class="cell" fill="white">7</text>
      <text x="198" y="54" class="cell" fill="white">9</text>
      
      <!-- Highlight optimal cell -->
      <rect x="190" y="44" width="30" height="14" fill="#00b894" class="anim-pulse"/>
      <text x="205" y="54" text-anchor="middle" class="cell" fill="white" font-weight="bold">9</text>
    </g>
    
    <!-- Arrow pointing to optimal -->
    <g transform="translate(400, 220)" stroke="#00b894" stroke-width="2" fill="none" class="anim-pulse">
      <path d="M-10,0 L-25,0 L-20,-5 M-25,0 L-20,5"/>
    </g>
    <text x="408" y="224" class="detail" fill="#00b894" font-size="9">max</text>
  </g>
  
  <!-- Section 6: Applications -->
  <g data-narration="Real-world applications of advanced DP techniques">
    <rect x="10" y="255" width="125" height="85" rx="8" fill="url(#sectionGradient1)" filter="url(#shadow)" class="anim-slide-left delay-2"/>
    <text x="72" y="272" text-anchor="middle" class="section-title">Applications</text>
    <text x="20" y="290" class="detail">• Bioinformatics</text>
    <text x="20" y="305" class="detail">• NLP/Speech Recog</text>
    <text x="20" y="320" class="detail">• Network Routing</text>
    <text x="20" y="335" class="detail">• Cryptography</text>
  </g>
  
  <!-- Section 7: Complexity Comparison -->
  <g data-narration="Complexity reduction from exponential to polynomial">
    <rect x="145" y="285" width="125" height="55" rx="8" fill="url(#sectionGradient2)" filter="url(#shadow)" class="anim-slide-left delay-3"/>
    <text x="207" y="302" text-anchor="middle" class="section-title">Time Complexity</text>
    <text x="155" y="320" class="label">Brute Force: O(2^n)</text>
    <text x="155" y="335" class="label" style="fill:#00b894">DP: O(n·2^n) / O(n²)</text>
  </g>
  
  <!-- Key Insight Box -->
  <g data-narration="Key insight: optimal substructure and overlapping subproblems remain foundational">
    <rect x="280" y="285" width="125" height="55" rx="8" fill="#00b894" filter="url(#shadow)" class="anim-slide-left delay-4"/>
    <text x="342" y="302" text-anchor="middle" class="section-title" style="fill:white">Key Insight</text>
    <text x="342" y="322" text-anchor="middle" class="detail" style="fill:white">Optimal Substructure</text>
    <text x="342" y="335" text-anchor="middle" class="detail" style="fill:white">+ Overlapping Subproblems</text>
  </g>
  
  <!-- Footer -->
  <g data-narration="Footer with university context">
    <line x1="10" y1="350" x2="410" y2="350" stroke="#b2bec3" stroke-width="1"/>
    <text x="210" y="368" text-anchor="middle" class="detail">MSc CS - University of Delhi</text>
    <text x="210" y="382" text-anchor="middle" class="detail" style="font-size:9px">Advanced Algorithms Module</text>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="50" cy="380" r="30" fill="#a29bfe"/>
    <circle cx="370" cy="55" r="20" fill="#81ecec"/>
    <circle cx="395" cy="380" r="15" fill="#ffeaa7"/>
  </g>
</svg>