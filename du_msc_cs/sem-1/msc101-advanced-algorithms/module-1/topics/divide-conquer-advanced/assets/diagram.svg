<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="divide-conquer-advanced" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f4e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a9d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b88c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9dd1a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ab88a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c77e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a85a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInTop {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .step1 { animation: slideInTop 0.6s ease-out 0.2s forwards; opacity: 0; }
    .step2 { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
    .step3 { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .step4 { animation: slideInTop 0.6s ease-out 0.8s forwards; opacity: 0; }
    .step5 { animation: fadeIn 0.6s ease-out 1s forwards; opacity: 0; }
    .pulse-box:hover { animation: pulse 0.5s ease-in-out; }
    .arrow-line { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 0.8s ease-out forwards; }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" ry="10"/>
  
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Divide and Conquer</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5d6d7e" class="title">Advanced Algorithms</text>
  
  <!-- Original Problem Box -->
  <g class="step1" data-narration="The process begins with the original problem that needs to be solved efficiently">
    <rect x="145" y="65" width="130" height="40" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="210" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Original Problem</text>
  </g>
  
  <!-- Arrow down -->
  <g class="step1">
    <line x1="210" y1="105" x2="210" y2="125" stroke="#5a9bc4" stroke-width="2" class="arrow-line" style="animation-delay: 0.3s"/>
    <polygon points="205,120 210,130 215,120" fill="#5a9bc4"/>
  </g>
  
  <!-- Divide Box -->
  <g class="step2" data-narration="DIVIDE: Break the problem into smaller subproblems of the same type">
    <rect x="145" y="125" width="130" height="40" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="210" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">DIVIDE</text>
  </g>
  
  <!-- Arrows to subproblems -->
  <g class="step2" style="animation-delay: 0.5s">
    <line x1="175" y1="165" x2="130" y2="190" stroke="#9b88c4" stroke-width="2" class="arrow-line"/>
    <polygon points="133,185 125,195 143,192" fill="#9b88c4"/>
    <line x1="245" y1="165" x2="290" y2="190" stroke="#9b88c4" stroke-width="2" class="arrow-line"/>
    <polygon points="287,185 295,195 277,192" fill="#9b88c4"/>
  </g>
  
  <!-- Subproblem 1 -->
  <g class="step3" data-narration="Two or more subproblems are created from the original problem">
    <rect x="55" y="195" width="100" height="35" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)" class="pulse-box"/>
    <text x="105" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Subproblem 1</text>
    <text x="105" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Strassen/FFT</text>
  </g>
  
  <!-- Subproblem 2 -->
  <g class="step3" data-narration="Each subproblem is solved recursively using the same approach">
    <rect x="265" y="195" width="100" height="35" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)" class="pulse-box"/>
    <text x="315" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Subproblem 2</text>
    <text x="315" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">QuickSelect</text>
  </g>
  
  <!-- Arrows down from subproblems -->
  <g class="step3" style="animation-delay: 0.7s">
    <line x1="105" y1="230" x2="105" y2="250" stroke="#7ab88a" stroke-width="2" class="arrow-line"/>
    <polygon points="100,245 105,255 110,245" fill="#7ab88a"/>
    <line x1="315" y1="230" x2="315" y2="250" stroke="#7ab88a" stroke-width="2" class="arrow-line"/>
    <polygon points="310,245 315,255 320,245" fill="#7ab88a"/>
  </g>
  
  <!-- Conquer/Recursion Box -->
  <g class="step4" data-narration="CONQUER: Solve subproblems recursively. If small enough, solve directly">
    <rect x="55" y="255" width="130" height="40" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="120" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">CONQUER</text>
    <text x="120" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Solve Recursively</text>
    
    <rect x="235" y="255" width="130" height="40" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="300" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">CONQUER</text>
    <text x="300" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Solve Recursively</text>
  </g>
  
  <!-- Arrows to combine -->
  <g class="step4" style="animation-delay: 0.9s">
    <line x1="120" y1="295" x2="175" y2="320" stroke="#5a9bc4" stroke-width="2" class="arrow-line"/>
    <line x1="300" y1="295" x2="245" y2="320" stroke="#5a9bc4" stroke-width="2" class="arrow-line"/>
  </g>
  
  <!-- Combine Box -->
  <g class="step5" data-narration="COMBINE: Merge solutions of subproblems into the original problem solution">
    <rect x="145" y="320" width="130" height="40" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)" class="pulse-box"/>
    <text x="210" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">COMBINE</text>
  </g>
  
  <!-- Arrow to result -->
  <g class="step5" style="animation-delay: 1.1s">
    <line x1="210" y1="360" x2="210" y2="375" stroke="#e8a85a" stroke-width="2" class="arrow-line"/>
    <polygon points="205,370 210,380 215,370" fill="#e8a85a"/>
  </g>
  
  <!-- Result -->
  <g class="step5" style="animation-delay: 1.2s">
    <rect x="145" y="375" width="130" height="20" rx="4" fill="#e8a85a"/>
    <text x="210" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Solution</text>
  </g>
</svg>