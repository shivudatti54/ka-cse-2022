<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="probabilistic-analysis">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f5ff"/>
      <stop offset="100%" style="stop-color:#e8f4f8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff"/>
      <stop offset="100%" style="stop-color:#b8d4f0"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d5f5e3"/>
      <stop offset="100%" style="stop-color:#abebc6"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <!-- Glow filter for probability cloud -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .section2 { animation: fadeIn 0.6s ease-out 0.4s both; }
    .section3 { animation: slideInRight 0.6s ease-out 0.6s both; }
    .section4 { animation: slideInLeft 0.6s ease-out 0.8s both; }
    .section5 { animation: slideInRight 0.6s ease-out 1s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .arrow-line {
      stroke-dasharray: 100;
      animation: drawLine 1s ease-out 1.2s forwards;
      stroke-dashoffset: 100;
    }
    .icon-pulse { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50">
    Probabilistic Analysis
  </text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="title" opacity="0.5"/>
  
  <!-- Section 1: Input Distribution (Left) -->
  <g class="section1" data-narration="The process begins with input distribution - modeling the probability space of all possible inputs">
    <rect x="15" y="50" width="115" height="75" rx="6" fill="url(#boxGradient1)" stroke="#85c1e9" stroke-width="1"/>
    <text x="72" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a5276">Input Distribution</text>
    <!-- Probability cloud / dice icons -->
    <g class="float" filter="url(#glow)">
      <circle cx="45" cy="95" r="8" fill="#e74c3c" opacity="0.7"/>
      <circle cx="65" cy="88" r="6" fill="#9b59b6" opacity="0.7"/>
      <circle cx="85" cy="95" r="7" fill="#3498db" opacity="0.7"/>
      <circle cx="100" cy="88" r="5" fill="#2ecc71" opacity="0.7"/>
    </g>
    <text x="72" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Random Input X</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M135 87 L165 87" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
  
  <!-- Section 2: Algorithm Execution (Middle) -->
  <g class="section2" data-narration="The algorithm processes the random input, creating random variables that represent runtime, comparisons, or other metrics">
    <rect x="170" y="50" width="110" height="75" rx="6" fill="url(#boxGradient2)" stroke="#82e0aa" stroke-width="1"/>
    <text x="225" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1e8449">Algorithm</text>
    <!-- Flowchart representation -->
    <rect x="185" y="78" width="30" height="18" rx="3" fill="#27ae60" class="icon-pulse"/>
    <text x="200" y="91" text-anchor="middle" font-family="Arial" font-size="8" fill="white">f(X)</text>
    <line x1="215" y1="87" x2="235" y2="87" stroke="#27ae60" stroke-width="1.5"/>
    <polygon points="232,87 237,84 237,90" fill="#27ae60"/>
    <rect x="240" y="78" width="30" height="18" rx="3" fill="#1e8449"/>
    <text x="255" y="91" text-anchor="middle" font-family="Arial" font-size="8" fill="white">T(n)</text>
    <text x="225" y="118" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Random Variable</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M285 87 L315 87" stroke="#7f8c8d" stroke-width="2" fill="none" class="arrow-line"/>
  
  <!-- Section 3: Expectation Calculation (Right) -->
  <g class="section3" data-narration="Finally, expectation calculations combine probability theory with algorithmic analysis to determine average-case performance">
    <rect x="320" y="50" width="85" height="75" rx="6" fill="url(#boxGradient3)" fill-opacity="0.9" stroke="#f1948a" stroke-width="1"/>
    <text x="362" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#922b21">E[T(n)]</text>
    <!-- Statistics dashboard -->
    <rect x="330" y="78" width="65" height="15" rx="2" fill="#ecf0f1"/>
    <rect x="330" y="78" width="45" height="15" rx="2" fill="#e91e63" class="pulse"/>
    <text x="362" y="89" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">μ = 1.39n log n</text>
    <rect x="330" y="97" width="65" height="15" rx="2" fill="#ecf0f1"/>
    <rect x="330" y="97" width="20" height="15" rx="2" fill="#3498db"/>
    <text x="362" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">σ² = O(n²)</text>
  </g>
  
  <!-- Section 4: Key Concept 1 - PA vs RA -->
  <g class="section4" data-narration="Key concept: Probabilistic Analysis analyzes deterministic algorithms on random inputs, while Randomized Algorithms make random choices during execution">
    <rect x="15" y="140" width="120" height="55" rx="5" fill="url(#boxGradient4)" stroke="#f39c12" stroke-width="1"/>
    <text x="75" y="156" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d35400">PA vs RA</text>
    <text x="75" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">PA: random inputs</text>
    <text x="75" y="182" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">RA: random choices</text>
  </g>
  
  <!-- Section 5: Key Concept 2 - Linearity -->
  <g class="section5" data-narration="Linearity of Expectation is critical - E[X+Y] = E[X] + E[Y] even for dependent variables">
    <rect x="145" y="140" width="120" height="55" rx="5" fill="url(#boxGradient1)" stroke="#3498db" stroke-width="1"/>
    <text x="205" y="156" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a5276">Linearity</text>
    <text x="205" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">E[X+Y] = E[X] + E[Y]</text>
    <text x="205" y="182" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">Even if dependent!</text>
  </g>
  
  <!-- Section 6: Key Concept 3 - Tail Inequalities -->
  <g class="section4" data-narration="Tail inequalities like Markov and Chernoff bounds help bound the probability of worst-case behavior">
    <rect x="275" y="140" width="130" height="55" rx="5" fill="url(#boxGradient2)" stroke="#27ae60" stroke-width="1"/>
    <text x="340" y="156" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1e8449">Tail Inequalities</text>
    <text x="340" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">Markov: Pr(X≥a) ≤ E[X]/a</text>
    <text x="340" y="182" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">Chernoff: exp(-δ²μ/3)</text>
  </g>
  
  <!-- Section 7: Example Box - Quicksort -->
  <g class="section5" data-narration="Example: Quicksort average-case analysis shows expected comparisons equal 2(n+1)H_n - 4n">
    <rect x="15" y="205" width="195" height="50" rx="5" fill="#fff8e1" stroke="#f9e79f" stroke-width="1"/>
    <text x="112" y="222" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9a7d0a">Example: Quicksort Average-Case</text>
    <text x="112" y="238" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">E[comparisons] = 2(n+1)Hₙ - 4n</text>
    <text x="112" y="250" text-anchor="middle" font-family="Arial" font-size="8" fill="#7f8c8d">≈ 1.39n log n</text>
  </g>
  
  <!-- Section 8: Indicator Variables -->
  <g class="section4" data-narration="Indicator Random Variables simplify expectation - X = I{A} equals 1 if event A occurs, 0 otherwise">
    <rect x="220" y="205" width="185" height="50" rx="5" fill="url(#boxGradient3)" fill-opacity="0.8" stroke="#f48fb1" stroke-width="1"/>
    <text x="312" y="222" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c2185b">Indicator Variables</text>
    <text x="312" y="238" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">X = I{A} → X = 1 if A occurs, else 0</text>
    <text x="312" y="250" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">E[X] = Pr(A)</text>
  </g>
  
  <!-- Bottom: Probabilistic Recurrence -->
  <g class="section2" data-narration="Probabilistic recurrences model randomized divide-and-conquer with expected running time derived from random split points">
    <rect x="15" y="265" width="390" height="45" rx="5" fill="#f0f8ff" stroke="#aed6f1" stroke-width="1"/>
    <text x="210" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2874a6">Probabilistic Recurrence Relations</text>
    <text x="210" y="298" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#2c3e50">T(n) = T(k) + T(n-k) + O(n),  k ~ Uniform(0,n)</text>
  </g>
  
  <!-- Flow indicator at bottom -->
  <g class="section1">
    <rect x="15" y="320" width="390" height="70" rx="6" fill="#e8f6f3" stroke="#a3e4d7" stroke-width="1" opacity="0.95"/>
    <text x="210" y="340" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#148f77">Applications in Modern CS</text>
    
    <g transform="translate(30, 355)">
      <circle cx="10" cy="10" r="6" fill="#1abc9c" class="icon-pulse"/>
      <text x="25" y="14" font-family="Arial" font-size="8" fill="#2c3e50">ML: PAC Learning</text>
    </g>
    <g transform="translate(150, 355)">
      <circle cx="10" cy="10" r="6" fill="#9b59b6" class="icon-pulse"/>
      <text x="25" y="14" font-family="Arial" font-size="8" fill="#2c3e50">Crypto: Extractors</text>
    </g>
    <g transform="translate(280, 355)">
      <circle cx="10" cy="10" r="6" fill="#e67e22" class="icon-pulse"/>
      <text x="25" y="14" font-family="Arial" font-size="8" fill="#2c3e50">Distributed: Consensus</text>
    </g>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>