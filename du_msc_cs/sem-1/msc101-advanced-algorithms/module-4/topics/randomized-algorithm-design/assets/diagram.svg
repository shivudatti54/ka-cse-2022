<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="randomized-algorithm-design">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f0e8f8"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb7b2"/>
      <stop offset="100%" style="stop-color:#ff9a8b"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b5d8f0"/>
      <stop offset="100%" style="stop-color:#8ec5fc"/>
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc"/>
      <stop offset="100%" style="stop-color:#c5a3ff"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .section4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow { stroke-dasharray: 100; animation: drawLine 1s ease-out 1s forwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <g class="title">
    <text x="210" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#2c3e50">Randomized Algorithm</text>
    <text x="210" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c3e50">Design</text>
    <line x1="100" y1="60" x2="320" y2="60" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Section 1: Las Vegas vs Monte Carlo -->
  <g class="section1" data-narration="Two main types of randomized algorithms: Las Vegas (always correct, variable runtime) vs Monte Carlo (bounded runtime, probabilistic correctness)">
    <rect x="10" y="75" width="195" height="75" rx="8" fill="url(#boxGrad1)" stroke="#2c3e50" stroke-width="1"/>
    <text x="107" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Las Vegas</text>
    <text x="107" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">✓ Always Correct</text>
    <text x="107" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">⏱ Runtime Varies</text>
    <text x="107" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">e.g., R. QuickSort</text>
  </g>
  
  <g class="section1" data-narration="Monte Carlo algorithms sacrifice certainty for guaranteed runtime bounds">
    <rect x="215" y="75" width="195" height="75" rx="8" fill="url(#boxGrad2)" stroke="#2c3e50" stroke-width="1"/>
    <text x="312" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Monte Carlo</text>
    <text x="312" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">⏱ Bounded Runtime</text>
    <text x="312" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">✓ Probabilistic Correct</text>
    <text x="312" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">e.g., Miller-Rabin</text>
  </g>
  
  <!-- Arrow between them -->
  <g class="arrow">
    <line x1="205" y1="112" x2="215" y2="112" stroke="#2c3e50" stroke-width="2"/>
    <polygon points="215,112 210,108 210,116" fill="#2c3e50"/>
  </g>
  
  <!-- Section 2: Randomization Techniques -->
  <g class="section2" data-narration="Key randomization techniques include random sampling, fingerprinting, randomized rounding, and hashing">
    <rect x="10" y="160" width="400" height="60" rx="8" fill="url(#boxGrad3)" stroke="#2c3e50" stroke-width="1"/>
    <text x="210" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Randomization Techniques</text>
    <text x="210" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">Random Sampling • Fingerprinting • Randomized Rounding • Hashing</text>
    <text x="210" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">Reservoir Sampling • Count-Min Sketch • Poly Identity Verification</text>
  </g>
  
  <!-- Section 3: Karger's Contraction Visualization -->
  <g class="section3" data-narration="Karger's algorithm uses edge contraction to find minimum cuts in graphs through random edge selection">
    <rect x="10" y="230" width="180" height="150" rx="8" fill="url(#boxGrad4)" stroke="#2c3e50" stroke-width="1"/>
    <text x="100" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a1a2e">Karger's Contraction</text>
    <!-- Graph nodes -->
    <circle cx="45" cy="280" r="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="85" cy="295" r="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="45" cy="330" r="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="85" cy="345" r="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="130" cy="312" r="14" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="165" cy="312" r="14" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Edges -->
    <line x1="45" y1="280" x2="85" y2="295" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="45" y1="280" x2="45" y2="330" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="85" y1="295" x2="85" y2="345" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="45" y1="330" x2="85" y2="345" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="85" y1="295" x2="130" y2="312" stroke="#e74c3c" stroke-width="2.5" class="pulse"/>
    <line x1="130" y1="312" x2="165" y2="312" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Labels -->
    <text x="100" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">Random edge → contract</text>
    <text x="100" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">merge nodes</text>
  </g>
  
  <!-- Section 4: Probabilistic Analysis -->
  <g class="section4" data-narration="Probabilistic analysis uses expected runtime, Chernoff bounds, and amplification techniques">
    <rect x="200" y="230" width="210" height="65" rx="8" fill="url(#boxGrad1)" stroke="#2c3e50" stroke-width="1"/>
    <text x="305" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Probabilistic Analysis</text>
    <text x="305" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">Expected Runtime (Linearity)</text>
    <text x="305" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">Chernoff Bounds • Amplification</text>
  </g>
  
  <!-- Section 5: Derandomization -->
  <g class="section4" data-narration="Derandomization converts random algorithms to deterministic ones using conditional probabilities or PRGs">
    <rect x="200" y="300" width="210" height="55" rx="8" fill="url(#boxGrad2)" stroke="#2c3e50" stroke-width="1"/>
    <text x="305" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Derandomization</text>
    <text x="305" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a2e">Conditional Prob. • Nisan-Wigderson PRG</text>
    <text x="305" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">Convert random → deterministic</text>
  </g>
  
  <!-- Flow arrow from techniques to examples -->
  <g class="arrow">
    <path d="M 210 225 L 210 230" stroke="#2c3e50" stroke-width="1.5" fill="none"/>
    <polygon points="210,235 206,228 214,228" fill="#2c3e50"/>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.6">
    <circle cx="390" cy="50" r="3" fill="#3498db"/>
    <circle cx="30" cy="100" r="2" fill="#e74c3c"/>
    <circle cx="400" cy="380" r="2" fill="#9b59b6"/>
    <circle cx="20" cy="380" r="3" fill="#2ecc71"/>
  </g>
</svg>