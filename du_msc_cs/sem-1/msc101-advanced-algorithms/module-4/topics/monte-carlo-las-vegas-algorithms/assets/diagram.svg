<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="monte-carlo-las-vegas-algorithms">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5e6f4"/>
      <stop offset="100%" style="stop-color:#e6f0f8"/>
    </linearGradient>
    <linearGradient id="mcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba"/>
      <stop offset="100%" style="stop-color:#ffcfdf"/>
    </linearGradient>
    <linearGradient id="lvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9"/>
      <stop offset="100%" style="stop-color:#d4f5e9"/>
    </linearGradient>
    <linearGradient id="hybridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae1ff"/>
      <stop offset="100%" style="stop-color:#d6eaff"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .title-text { font-family: 'Georgia', serif; font-size: 20px; fill: #2c3e50; font-weight: bold; }
    .section-title { font-family: 'Arial', sans-serif; font-size: 14px; fill: #34495e; font-weight: bold; }
    .label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #5d6d7e; }
    .detail { font-family: 'Arial', sans-serif; font-size: 11px; fill: #7f8c8d; }
    .box-mc { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .box-lv { animation: slideInRight 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-hybrid { animation: slideInUp 0.5s ease-out 0.4s forwards; opacity: 0; }
    .box-relation { animation: fadeIn 0.5s ease-out 0.6s forwards; opacity: 0; }
    .arrow { animation: fadeIn 0.3s ease-out; }
    .pulse-element { animation: pulse 2s infinite; transform-origin: center; }
    .check-icon { fill: #27ae60; }
    .time-icon { fill: #e74c3c; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text">Monte Carlo vs Las Vegas</text>
  <text x="210" y="45" text-anchor="middle" class="detail">Randomized Algorithm Paradigms</text>
  
  <!-- Monte Carlo Box -->
  <g class="box-mc" data-narration="Monte Carlo algorithms guarantee polynomial runtime but may have probability of error">
    <rect x="15" y="60" width="180" height="130" rx="8" fill="url(#mcGradient)" stroke="#ff9aa2" stroke-width="2"/>
    <text x="105" y="80" text-anchor="middle" class="section-title">MONTE CARLO</text>
    <line x1="25" y1="90" x2="185" y2="90" stroke="#ff9aa2" stroke-width="1"/>
    <text x="25" y="108" class="label">✓ Polynomial Time</text>
    <text x="25" y="125" class="label">⚠ Probabilistic Error</text>
    <text x="25" y="142" class="label">Class: BPP</text>
    <text x="25" y="159" class="detail">Error amplification:</text>
    <text x="25" y="172" class="detail" style="font-style:italic">ε → (1-ε)ᵏ</text>
    <!-- Always terminates icon -->
    <circle cx="170" cy="160" r="12" fill="#fff" stroke="#27ae60" stroke-width="2" class="pulse-element"/>
    <text x="170" y="164" text-anchor="middle" font-size="14" fill="#27ae60">✓</text>
  </g>
  
  <!-- Las Vegas Box -->
  <g class="box-lv" data-narration="Las Vegas algorithms guarantee correct output but have randomized runtime">
    <rect x="225" y="60" width="180" height="130" rx="8" fill="url(#lvGradient)" stroke="#98d8aa" stroke-width="2"/>
    <text x="315" y="80" text-anchor="middle" class="section-title">LAS VEGAS</text>
    <line x1="235" y1="90" x2="395" y2="90" stroke="#98d8aa" stroke-width="1"/>
    <text x="235" y="108" class="label">✓ Correct Output</text>
    <text x="235" y="125" class="label">⚠ Random Runtime</text>
    <text x="235" y="142" class="label">Class: ZPP</text>
    <text x="235" y="159" class="detail">Expected poly-time:</text>
    <text x="235" y="172" class="detail" style="font-style:italic">E[T] = O(nᵏ)</text>
    <!-- Correct output icon -->
    <circle cx="380" cy="160" r="12" fill="#fff" stroke="#27ae60" stroke-width="2" class="pulse-element"/>
    <text x="380" y="164" text-anchor="middle" font-size="14" fill="#27ae60">✓</text>
  </g>
  
  <!-- Arrow connecting MC to comparison -->
  <path d="M 105 195 L 105 215" stroke="#7f8c8d" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 315 195 L 315 215" stroke="#7f8c8d" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Hybrid/Comparison Box -->
  <g class="box-hybrid" data-narration="Hybrid approaches and complexity relationships between randomized classes">
    <rect x="100" y="220" width="220" height="75" rx="8" fill="url(#hybridGradient)" stroke="#85c1e9" stroke-width="2"/>
    <text x="210" y="240" text-anchor="middle" class="section-title">COMPLEXITY RELATIONSHIPS</text>
    <line x1="110" y1="250" x2="310" y2="250" stroke="#85c1e9" stroke-width="1"/>
    <text x="115" y="268" class="detail">ZPP = RP ∩ co-RP</text>
    <text x="115" y="282" class="detail">BPP ⊆ P/poly (Adleman)</text>
  </g>
  
  <!-- Decision Tree/Flowchart Bottom -->
  <g class="box-relation" data-narration="Visual decision tree showing algorithm classification based on runtime and correctness guarantees">
    <rect x="60" y="305" width="300" height="85" rx="8" fill="#fff9e6" stroke="#f9e79f" stroke-width="2"/>
    <text x="210" y="322" text-anchor="middle" class="section-title">Algorithm Decision Tree</text>
    <line x1="70" y1="332" x2="350" y2="332" stroke="#f9e79f" stroke-width="1"/>
    
    <!-- Flowchart nodes -->
    <circle cx="120" cy="355" r="8" fill="#3498db"/>
    <text x="120" y="359" text-anchor="middle" font-size="8" fill="white">S</text>
    
    <rect x="145" y="347" width="50" height="16" rx="3" fill="#e8f8f5" stroke="#1abc9c"/>
    <text x="170" y="358" text-anchor="middle" font-size="9">Correct?</text>
    
    <rect x="220" y="347" width="55" height="16" rx="3" fill="#ebf5fb" fill-opacity="0.7" stroke="#3498db"/>
    <text x="247" y="358" text-anchor="middle" font-size="9">Fast?</text>
    
    <!-- Labels for outcomes -->
    <text x="300" y="353" class="detail" fill="#27ae60">LV: ✓</text>
    <text x="300" y="368" class="detail" fill="#e74c3c">MC: ✓/✗</text>
    
    <!-- Connecting lines -->
    <line x1="128" y1="355" x2="145" y2="355" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="195" y1="355" x2="220" y2="355" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="275" y1="355" x2="290" y2="355" stroke="#7f8c8d" stroke-width="1"/>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>