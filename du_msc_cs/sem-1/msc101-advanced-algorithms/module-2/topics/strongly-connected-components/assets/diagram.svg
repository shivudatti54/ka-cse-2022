<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="strongly-connected-components">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scc1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scc2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scc3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89f7fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66a6ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #7f8c8d; }
    .concept-box { fill: white; stroke: #ddd; stroke-width: 1; rx: 8; }
    .vertex { stroke: #333; stroke-width: 2; cursor: pointer; }
    .edge { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .scc-highlight { stroke-width: 3; }
    .section1 { animation: fadeIn 0.8s ease-out forwards; }
    .section2 { animation: slideIn 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section3 { animation: fadeIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .section4 { animation: slideIn 0.6s ease-out 0.9s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="section1" data-narration="Introduction to Strongly Connected Components">
    <text x="210" y="30" text-anchor="middle" class="title">Strongly Connected Components</text>
    <line x1="60" y1="45" x2="360" y2="45" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Main Graph Visualization -->
  <g class="section2" data-narration="Example directed graph with three SCCs" transform="translate(30, 70)">
    <!-- SCC 1: A, B, C (cycle) -->
    <ellipse cx="70" cy="80" rx="55" ry="45" fill="url(#scc1Gradient)" opacity="0.4"/>
    <circle cx="50" cy="70" r="18" fill="#e74c3c" class="vertex pulse-anim"/>
    <text x="50" y="75" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">A</text>
    <circle cx="90" cy="90" r="18" fill="#e74c3c" class="vertex"/>
    <text x="90" y="95" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">B</text>
    <circle cx="70" cy="115" r="18" fill="#e74c3c" class="vertex"/>
    <text x="70" y="120" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">C</text>
    
    <!-- Edges within SCC1 -->
    <path d="M55 85 Q70 70 82 82" class="edge line-anim"/>
    <path d="M88 100 Q100 110 85 118" class="edge line-anim" style="animation-delay: 0.3s"/>
    <path d="M78 125 Q60 130 52 95" class="edge line-anim" style="animation-delay: 0.6s"/>
    
    <!-- SCC 2: D, E -->
    <ellipse cx="180" cy="100" rx="40" ry="35" fill="url(#scc2Gradient)" opacity="0.4"/>
    <circle cx="165" cy="90" r="18" fill="#9b59b6" class="vertex"/>
    <text x="165" y="95" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">D</text>
    <circle cx="195" cy="110" r="18" fill="#9b59b6" class="vertex"/>
    <text x="195" y="115" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">E</text>
    <path d="M165 108 Q175 115 183 108" class="edge"/>
    <path d="M185 102 Q175 95 167 90" class="edge"/>
    
    <!-- SCC 3: F -->
    <circle cx="270" cy="100" r="18" fill="#3498db" class="vertex"/>
    <text x="270" y="105" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">F</text>
    
    <!-- Inter-SCC edges -->
    <path d="M105 95 Q130 90 148 90" class="edge" stroke="#999"/>
    <path d="M212 100 Q240 100 252 100" class="edge" stroke="#999"/>
    <path d="M195 118 Q180 140 130 145" class="edge" stroke="#999"/>
    
    <!-- Labels -->
    <text x="70" y="45" text-anchor="middle" class="label" font-weight="bold">SCC 1</text>
    <text x="180" y="65" text-anchor="middle" class="label" font-weight="bold">SCC 2</text>
    <text x="270" y="65" text-anchor="middle" class="label" font-weight="bold">SCC 3</text>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="section3" data-narration="Key definitions: Graph, Directed Graph, SCC">
    <rect x="280" y="180" width="130" height="55" class="concept-box" filter="url(#shadow)"/>
    <text x="290" y="198" class="label" font-weight="bold" font-size="12">Key Definitions</text>
    <text x="290" y="215" class="detail">• Graph: vertices + edges</text>
    <text x="290" y="228" class="detail">• Directed: edges have direction</text>
  </g>
  
  <g class="section4" data-narration="SCC definition and algorithm explanation">
    <rect x="10" y="250" width="190" height="60" class="concept-box" filter="url(#shadow)"/>
    <text x="20" y="268" class="label" font-weight="bold" font-size="12">Strongly Connected Component</text>
    <text x="20" y="285" class="detail">A subgraph where every vertex</text>
    <text x="20" y="300" class="detail">can reach every other vertex.</text>
  </g>
  
  <!-- Algorithm Steps -->
  <g class="section4" data-narration="Kosaraju's Algorithm steps">
    <rect x="210" y="245" width="200" height="55" class="concept-box" filter="url(#shadow)"/>
    <text x="220" y="263" class="label" font-weight="bold" font-size="12">Kosaraju's Algorithm</text>
    <text x="220" y="280" class="detail">1. DFS on G → fill stack</text>
    <text x="220" y="295" class="detail">2. DFS on G</text>
  </g>
  
  <!-- Legend -->
  <g class="section3" data-narration="Color legend showing different SCCs">
    <rect x="10" y="320" width="400" height="70" fill="white" opacity="0.6" rx="8"/>
    <text x="20" y="342" class="label" font-weight="bold" font-size="13">SCC Visualization:</text>
    <circle cx="50" cy="365" r="8" fill="#e74c3c"/>
    <text x="65" y="369" class="detail">SCC 1 (A,B,C)</text>
    <circle cx="150" cy="365" r="8" fill="#9b59b6"/>
    <text x="165" y="369" class="detail">SCC 2 (D,E)</text>
    <circle cx="240" cy="365" r="8" fill="#3498db"/>
    <text x="255" y="369" class="detail">SCC 3 (F)</text>
    <text x="310" y="369" class="detail" font-style="italic">Single vertex</text>
  </g>
  
  <!-- Arrow showing SCC property -->
  <g class="section2">
    <path d="M340 140 L380 140" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="355" y="135" class="detail" fill="#27ae60" font-size="10">bidirectional</text>
  </g>
</svg>