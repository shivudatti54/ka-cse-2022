<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-flow-max-flow-min-cut">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sourceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9534f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9302c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowAnimation {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .subtitle { animation: fadeIn 1.2s ease-out; }
    .section-box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .edge { animation: flowAnimation 1s linear infinite; }
    .concept-box { animation: fadeIn 1.5s ease-out; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Network Flow</text>
  <text x="210" y="50" text-anchor="middle" font-size="16" fill="#5a6c7d" class="subtitle">Max Flow &amp; Min Cut</text>
  
  <!-- Network Diagram -->
  <g transform="translate(30, 80)" data-narration="Flow Network: Directed graph with source s, sink t, and intermediate vertices a, b, c">
    <!-- Edges with capacities -->
    <line x1="40" y1="50" x2="100" y2="20" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="55" y="30" font-size="11" fill="#666">c=10</text>
    
    <line x1="40" y1="50" x2="100" y2="80" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="55" y="75" font-size="11" fill="#666">c=5</text>
    
    <line x1="100" y1="20" x2="160" y2="50" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="125" y="30" font-size="11" fill="#666">c=8</text>
    
    <line x1="100" y1="20" x2="160" y2="10" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="125" y="10" font-size="11" fill="#666">c=4</text>
    
    <line x1="100" y1="80" x2="160" y2="50" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="125" y="70" font-size="11" fill="#666">c=6</text>
    
    <line x1="160" y1="50" x2="220" y2="50" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="185" y="45" font-size="11" fill="#666">c=12</text>
    
    <!-- Flow arrows (animated) -->
    <line x1="45" y1="50" x2="95" y2="25" stroke="#4a90d9" stroke-width="3" stroke-dasharray="5,3" class="edge" marker-end="url(#arrowhead)"/>
    <line x1="105" y1="25" x2="155" y2="48" stroke="#4a90d9" stroke-width="3" stroke-dasharray="5,3" class="edge" marker-end="url(#arrowhead)"/>
    <line x1="165" y1="50" x2="210" y2="50" stroke="#4a90d9" stroke-width="3" stroke-dasharray="5,3" class="edge" marker-end="url(#arrowhead)"/>
    
    <!-- Nodes -->
    <circle cx="40" cy="50" r="20" fill="url(#sourceGradient)" filter="url(#shadow)" class="node"/>
    <text x="40" y="55" text-anchor="middle" font-size="14" font-weight="bold" fill="white">s</text>
    
    <circle cx="220" cy="50" r="20" fill="url(#sinkGradient)" filter="url(#shadow)" class="node"/>
    <text x="220" y="55" text-anchor="middle" font-size="14" font-weight="bold" fill="white">t</text>
    
    <circle cx="100" cy="20" r="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="100" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="white">a</text>
    
    <circle cx="100" cy="80" r="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="100" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="white">b</text>
    
    <circle cx="160" cy="50" r="16" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    <text x="160" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="white">c</text>
  </g>
  
  <!-- Concept Boxes -->
  <g transform="translate(10, 220)" data-narration="Flow Network Definition: A directed graph G=(V,E) where each edge has a capacity c(u,v)">
    <rect x="0" y="0" width="190" height="55" fill="#e3f2fd" rx="5" stroke="#90caf9" stroke-width="1"/>
    <text x="10" y="18" font-size="13" font-weight="bold" fill="#1565c0">Flow Network</text>
    <text x="10" y="35" font-size="11" fill="#333">G=(V,E) with capacities</text>
    <text x="10" y="48" font-size="11" fill="#333">c(u,v) ≥ 0</text>
  </g>
  
  <g transform="translate(210, 220)" data-narration="Flow: Assigns values to edges respecting capacity and conservation constraints">
    <rect x="0" y="0" width="190" height="55" fill="#e8f5e9" rx="5" stroke="#a5d6a7" stroke-width="1"/>
    <text x="10" y="18" font-size="13" font-weight="bold" fill="#2e7d32">Flow</text>
    <text x="10" y="35" font-size="11" fill="#333">f(u,v) ≤ c(u,v)</text>
    <text x="10" y="48" font-size="11" fill="#333">Conservation at vertices</text>
  </g>
  
  <g transform="translate(10, 285)" data-narration="Max Flow: Maximum flow from source s to sink t">
    <rect x="0" y="0" width="190" height="55" fill="#fff3e0" rx="5" stroke="#ffcc80" stroke-width="1"/>
    <text x="10" y="18" font-size="13" font-weight="bold" fill="#e65100">Max Flow</text>
    <text x="10" y="35" font-size="11" fill="#333">Maximize |f| from s→t</text>
    <text x="10" y="48" font-size="11" fill="#333">Value = flow out of s</text>
  </g>
  
  <g transform="translate(210, 285)" data-narration="Min Cut: Minimum capacity edges that separate s from t">
    <rect x="0" y="0" width="190" height="55" fill="#fce4ec" rx="5" stroke="#f48fb1" stroke-width="1"/>
    <text x="10" y="18" font-size="13" font-weight="bold" fill="#ad1457">Min Cut</text>
    <text x="10" y="35" font-size="11" fill="#333">Min capacity to disconnect</text>
    <text x="10" y="48" font-size="11" fill="#333">s from t (Max Flow = Min Cut)</text>
  </g>
  
  <!-- Key Theorem Box -->
  <g transform="translate(10, 350)" data-narration="Max-Flow Min-Cut Theorem: The maximum flow value equals the minimum cut capacity">
    <rect x="0" y="0" width="390" height="40" fill="#ede7f6" rx="5" stroke="#b39ddb" stroke-width="1"/>
    <text x="200" y="17" text-anchor="middle" font-size="13" font-weight="bold" fill="#512da8">Max-Flow Min-Cut Theorem</text>
    <text x="200" y="32" text-anchor="middle" font-size="11" fill="#333">Value of maximum flow = capacity of minimum cut</text>
  </g>
  
  <!-- Legend for flow -->
  <g transform="translate(270, 95)" data-narration="Legend: Blue dashed lines show current flow">
    <line x1="0" y1="0" x2="25" y2="0" stroke="#4a90d9" stroke-width="3" stroke-dasharray="5,3"/>
    <polygon points="25,-4 25,4 32,0" fill="#4a90d9"/>
    <text x="35" y="4" font-size="10" fill="#666">Flow</text>
    <line x1="0" y1="15" x2="25" y2="15" stroke="#999" stroke-width="2"/>
    <polygon points="25,11 25,19 32,15" fill="#999"/>
    <text x="35" y="19" font-size="10" fill="#666">Capacity</text>
  </g>
</svg>