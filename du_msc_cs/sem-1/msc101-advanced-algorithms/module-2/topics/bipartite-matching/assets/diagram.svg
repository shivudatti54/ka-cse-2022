<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="bipartite-matching">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dce8"/>
    </linearGradient>
    <linearGradient id="setUGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="setVGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fc79"/>
      <stop offset="100%" style="stop-color:#96e6a1"/>
    </linearGradient>
    <linearGradient id="matchedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .draw-anim { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 1s ease-out forwards; }
    .title-text { font-family: Georgia, serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .concept-box { rx: 8; ry: 8; }
    .vertex { stroke-width: 2; }
    .edge { stroke-width: 2; fill: none; }
    .matched-edge { stroke-width: 3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="fade-in">
    <text x="210" y="30" text-anchor="middle" class="title-text">Bipartite Matching</text>
    <line x1="100" y1="40" x2="320" y2="40" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Set U Label -->
  <g class="slide-left" style="animation-delay: 0.2s;">
    <text x="60" y="80" text-anchor="middle" class="label-text" style="font-weight: bold; font-size: 16px;">Set U</text>
    <rect x="30" y="90" width="60" height="25" fill="url(#setUGrad)" rx="5" class="concept-box"/>
    <text x="60" y="107" text-anchor="middle" class="detail-text" fill="#8b4513">{u1, u2, u3}</text>
  </g>
  
  <!-- Set V Label -->
  <g class="slide-right" style="animation-delay: 0.3s;">
    <text x="360" y="80" text-anchor="middle" class="label-text" style="font-weight: bold; font-size: 16px;">Set V</text>
    <rect x="330" y="90" width="60" height="25" fill="url(#setVGrad)" rx="5" class="concept-box"/>
    <text x="360" y="107" text-anchor="middle" class="detail-text" fill="#2e7d32">{v1, v2, v3}</text>
  </g>
  
  <!-- Vertices Set U -->
  <g class="fade-in" style="animation-delay: 0.4s;" data-narration="Vertices in set U: u1, u2, u3">
    <circle cx="80" cy="150" r="18" fill="#fff3e0" stroke="#ff9800" class="vertex"/>
    <text x="80" y="155" text-anchor="middle" class="label-text" fill="#e65100">u1</text>
    
    <circle cx="80" cy="210" r="18" fill="#fff3e0" stroke="#ff9800" class="vertex"/>
    <text x="80" y="215" text-anchor="middle" class="label-text" fill="#e65100">u2</text>
    
    <circle cx="80" cy="270" r="18" fill="#fff3e0" stroke="#ff9800" class="vertex"/>
    <text x="80" y="275" text-anchor="middle" class="label-text" fill="#e65100">u3</text>
  </g>
  
  <!-- Vertices Set V -->
  <g class="fade-in" style="animation-delay: 0.5s;" data-narration="Vertices in set V: v1, v2, v3">
    <circle cx="340" cy="150" r="18" fill="#e8f5e9" stroke="#4caf50" class="vertex"/>
    <text x="340" y="155" text-anchor="middle" class="label-text" fill="#1b5e20">v1</text>
    
    <circle cx="340" cy="210" r="18" fill="#e8f5e9" stroke="#4caf50" class="vertex"/>
    <text x="340" y="215" text-anchor="middle" class="label-text" fill="#1b5e20">v2</text>
    
    <circle cx="340" cy="270" r="18" fill="#e8f5e9" stroke="#4caf50" class="vertex"/>
    <text x="340" y="275" text-anchor="middle" class="label-text" fill="#1b5e20">v3</text>
  </g>
  
  <!-- Edges (non-matched) -->
  <g class="fade-in" style="animation-delay: 0.6s;">
    <line x1="98" y1="150" x2="322" y2="150" stroke="#95a5a6" class="edge draw-anim" style="animation-delay: 0.7s;"/>
    <line x1="98" y1="150" x2="322" y2="210" stroke="#95a5a6" class="edge draw-anim" style="animation-delay: 0.8s;"/>
    <line x1="98" y1="210" x2="322" y2="210" stroke="#95a5a6" class="edge draw-anim" style="animation-delay: 0.9s;"/>
    <line x1="98" y1="270" x2="322" y2="270" stroke="#95a5a6" class="edge draw-anim" style="animation-delay: 1.0s;"/>
  </g>
  
  <!-- Matched Edges (highlighted) -->
  <g class="fade-in" style="animation-delay: 1.1s;" data-narration="Maximum matching: (u1,v1), (u2,v2), (u3,v3)">
    <line x1="98" y1="150" x2="322" y2="150" stroke="url(#matchedGrad)" class="matched-edge draw-anim"/>
    <line x1="98" y1="210" x2="322" y2="210" stroke="url(#matchedGrad)" class="matched-edge draw-anim"/>
    <line x1="98" y1="270" x2="322" y2="270" stroke="url(#matchedGrad)" class="matched-edge draw-anim"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="fade-in" style="animation-delay: 1.2s;" data-narration="Key concepts: Matching is a set of edges with no shared vertices">
    <rect x="10" y="310" width="200" height="80" fill="white" stroke="#bdc3c7" stroke-width="1" rx="8" filter="url(#shadow)"/>
    <text x="20" y="330" class="label-text" style="font-weight: bold; font-size: 13px;">Key Concepts:</text>
    <text x="20" y="350" class="detail-text">• Matching: No shared vertices</text>
    <text x="20" y="365" class="detail-text">• Max Matching: Largest size</text>
    <text x="20" y="380" class="detail-text">• Augmenting Path: Unmatched →</text>
  </g>
  
  <!-- Algorithm Box -->
  <g class="fade-in" style="animation-delay: 1.3s;" data-narration="Hopcroft-Karp algorithm finds maximum matching efficiently">
    <rect x="220" y="310" width="190" height="80" fill="white" stroke="#bdc3c7" stroke-width="1" rx="8" filter="url(#shadow)"/>
    <text x="230" y="330" class="label-text" style="font-weight: bold; font-size: 13px;">Hopcroft-Karp:</text>
    <text x="230" y="350" class="detail-text">O(√V · E) time complexity</text>
    <text x="230" y="365" class="detail-text">Finds maximum matching</text>
    <text x="230" y="380" class="detail-text">Uses BFS + DFS layers</text>
  </g>
  
  <!-- Legend -->
  <g class="fade-in" style="animation-delay: 1.4s;">
    <line x1="20" y1="295" x2="80" y2="295" stroke="#95a5a6" stroke-width="2"/>
    <text x="85" y="299" class="detail-text">Edge</text>
    <line x1="120" y1="295" x2="180" y2="295" stroke="url(#matchedGrad)" stroke-width="3"/>
    <text x="185" y="299" class="detail-text">Matched</text>
  </g>
  
  <!-- Arrow showing relationship -->
  <g class="fade-in" style="animation-delay: 1.5s;" data-narration="Each edge connects U to V, never within the same set">
    <path d="M 140 130 Q 210 100 280 130" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="210" y="95" text-anchor="middle" class="detail-text" fill="#e74c3c">Bipartite</text>
    <text x="210" y="108" text-anchor="middle" class="detail-text" fill="#e74c3c">Property</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>