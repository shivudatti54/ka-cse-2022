<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="advanced-shortest-paths" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="100%" style="stop-color:#f0e8fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-box { animation: slideInUp 0.6s ease-out forwards; }
    .node { animation: pulse 2s ease-in-out infinite; }
    .edge { stroke-dasharray: 100; animation: drawLine 1.5s ease-out forwards; }
    .label { animation: fadeIn 1s ease-out forwards; }
    .concept-box { animation: slideInLeft 0.7s ease-out forwards; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
    .highlight { animation: pulse 1.5s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="12"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Advanced Shortest Paths</text>
  
  <!-- Section 1: Original Graph -->
  <g class="section-box" data-narration="Original graph with negative weights - Johnson's algorithm first checks for negative cycles using Bellman-Ford">
    <rect x="20" y="50" width="170" height="150" rx="8" fill="#ffffff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="105" y="68" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#c0392b">Original Graph</text>
    
    <!-- Nodes -->
    <circle cx="60" cy="110" r="14" fill="#3498db" stroke="#2980b9" stroke-width="2" class="node"/>
    <text x="60" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="white" font-weight="bold">A</text>
    <circle cx="105" cy="160" r="14" fill="#3498db" stroke="#2980b9" stroke-width="2" class="node"/>
    <text x="105" y="164" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="white" font-weight="bold">B</text>
    <circle cx="150" cy="110" r="14" fill="#3498db" stroke="#2980b9" stroke-width="2" class="node"/>
    <text x="150" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="white" font-weight="bold">C</text>
    
    <!-- Edges with negative weights -->
    <line x1="60" y1="110" x2="105" y2="160" stroke="#e74c3c" stroke-width="2" class="edge"/>
    <text x="72" y="140" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" font-weight="bold">-2</text>
    <line x1="105" y1="160" x2="150" y2="110" stroke="#e74c3c" stroke-width="2" class="edge"/>
    <text x="118" y="130" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" font-weight="bold">4</text>
    <line x1="60" y1="110" x2="150" y2="110" stroke="#e74c3c" stroke-width="2" class="edge"/>
    <text x="100" y="102" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" font-weight="bold">5</text>
  </g>
  
  <!-- Section 2: Auxiliary Node -->
  <g class="section-box" data-narration="Add auxiliary node S with zero-weight edges to all vertices for reweighting">
    <rect x="195" y="50" width="70" height="150" rx="8" fill="#f39c12" stroke="#d68910" stroke-width="2" filter="url(#shadow)"/>
    <text x="230" y="68" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#9c640c">Aux Node</text>
    
    <!-- Auxiliary node -->
    <circle cx="230" cy="110" r="16" fill="#f1c40f" stroke="#d4ac0d" stroke-width="2" class="highlight"/>
    <text x="230" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#7d6608" font-weight="bold">S</text>
    
    <!-- Zero-weight edges -->
    <line x1="230" y1="110" x2="150" y2="110" stroke="#f39c12" stroke-width="2" stroke-dasharray="4"/>
    <text x="195" y="102" font-family="Segoe UI, sans-serif" font-size="9" fill="#9c640c">0</text>
    <line x1="230" y1="110" x2="105" y2="160" stroke="#f39c12" stroke-width="2" stroke-dasharray="4"/>
    <text x="175" y="140" font-family="Segoe UI, sans-serif" font-size="9" fill="#9c640c">0</text>
    <line x1="230" y1="110" x2="60" y2="110" stroke="#f39c12" stroke-width="2" stroke-dasharray="4"/>
    <text x="140" y="102" font-family="Segoe UI, sans-serif" font-size="9" fill="#9c640c">0</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 265 125 L 195 125" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Section 3: Reweighted Graph -->
  <g class="section-box" data-narration="Reweighted graph - all negative weights eliminated using potential functions h(v) = shortest distance from S">
    <rect x="275" y="50" width="130" height="150" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="340" y="68" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#1e8449">Reweighted</text>
    
    <!-- Nodes -->
    <circle cx="315" cy="110" r="14" fill="#27ae60" stroke="#1e8449" stroke-width="2" class="node"/>
    <text x="315" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="white" font-weight="bold">A</text>
    <circle cx="360" cy="160" r="14" fill="#27ae60" stroke="#1e8449" stroke-width="2" class="node"/>
    <text x="360" y="164" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="white" font-weight="bold">B</text>
    <circle cx="405" cy="110" r="14" fill="#27ae60" stroke="#1e8449" stroke-width="2" class="node"/>
    <text x="405" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="white" font-weight="bold">C</text>
    
    <!-- Reweighted edges (all positive) -->
    <line x1="315" y1="110" x2="360" y2="160" stroke="#27ae60" stroke-width="2" class="edge"/>
    <text x="327" y="140" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e8449" font-weight="bold">5</text>
    <line x1="360" y1="160" x2="405" y2="110" stroke="#27ae60" stroke-width="2" class="edge"/>
    <text x="373" y="130" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e8449" font-weight="bold">9</text>
    <line x1="315" y1="110" x2="405" y2="110" stroke="#27ae60" stroke-width="2" class="edge"/>
    <text x="355" y="102" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e8449" font-weight="bold">5</text>
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g class="concept-box" data-narration="Key algorithms: Johnson's combines Bellman-Ford with Dijkstra for efficient all-pairs shortest paths">
    <rect x="20" y="215" width="180" height="80" rx="8" fill="#ecf0f1" stroke="#34495e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="233" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2c3e50">Johnson's Algorithm</text>
    <text x="110" y="252" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5d6d7e">Reweight: w'(u,v) = w(u,v)+h(u)-h(v)</text>
    <text x="110" y="268" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5d6d7e">O(VE + V²logV) all-pairs</text>
    <text x="110" y="284" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#27ae60">Handles negative weights!</text>
  </g>
  
  <!-- Section 5: Related Algorithms -->
  <g class="concept-box" data-narration="Floyd-Warshall uses dynamic programming for all-pairs; K-Shortest finds multiple routes">
    <rect x="210" y="215" width="195" height="80" rx="8" fill="#ecf0f1" stroke="#34495e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="307" y="233" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#2c3e50">Other Algorithms</text>
    <text x="250" y="255" font-family="Segoe UI, sans-serif" font-size="10" fill="#5d6d7e">• Floyd-Warshall: O(V³) DP</text>
    <text x="250" y="270" font-family="Segoe UI, sans-serif" font-size="10" fill="#5d6d7e">• Contraction Hierarchies</text>
    <text x="250" y="285" font-family="Segoe UI, sans-serif" font-size="10" fill="#5d6d7e">• K-Shortest Paths</text>
  </g>
  
  <!-- Section 6: Applications -->
  <g class="concept-box" data-narration="Real-world applications include GPS navigation, social networks, and financial arbitrage detection">
    <rect x="20" y="305" width="385" height="40" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="212" y="325" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" fill="#1e8449">Applications: GPS Navigation • Social Networks • Genomic Alignment • Financial Arbitrage</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="5" fill="#3498db" opacity="0.3"/>
  <circle cx="390" cy="380" r="5" fill="#9b59b6" opacity="0.3"/>
  <circle cx="50" cy="375" r="3" fill="#27ae60" opacity="0.3"/>
  <circle cx="370" cy="375" r="3" fill="#e74c3c" opacity="0.3"/>
</svg>