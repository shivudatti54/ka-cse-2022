<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="pac-learning-vc-dimension" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e5f7"/>
      <stop offset="100%" style="stop-color:#a8c5e4"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e4d4f7"/>
      <stop offset="100%" style="stop-color:#c4a8e4"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4f7e4"/>
      <stop offset="100%" style="stop-color:#a8e4c4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 20px; fill: #2c3e50; font-weight: bold; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .formula { font-family: 'Courier New', monospace; font-size: 11px; fill: #2c3e50; }
    .highlight { font-family: Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.7s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .dashed-line { stroke-dasharray: 5,3; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">PAC Learning &amp; VC Dimension</text>
  <text x="210" y="45" text-anchor="middle" class="subtitle anim-fade">Theoretical Foundation of Machine Learning</text>
  
  <!-- Section 1: PAC Learnability Box -->
  <g class="anim-slide-left" style="animation-delay: 0.2s; opacity: 0;" data-narration="PAC Learnability defines when a hypothesis class can learn with high probability and low error">
    <rect x="15" y="58" width="125" height="72" rx="6" fill="url(#boxGradient1)" class="box"/>
    <text x="77" y="75" text-anchor="middle" class="label" style="font-weight: bold; font-size: 11px;">PAC Learnability</text>
    <text x="77" y="90" text-anchor="middle" class="highlight">Algorithm finds h with</text>
    <text x="77" y="103" text-anchor="middle" class="formula">error ≤ ε, prob ≥ 1-δ</text>
    <text x="77" y="118" text-anchor="middle" class="highlight">for any distribution</text>
  </g>
  
  <!-- Section 2: VC Dimension Box -->
  <g class="anim-slide-right" style="animation-delay: 0.3s; opacity: 0;" data-narration="VC Dimension measures the capacity of a hypothesis class to shatter (fit) point configurations">
    <rect x="150" y="58" width="125" height="72" rx="6" fill="url(#boxGradient2)" class="box"/>
    <text x="212" y="75" text-anchor="middle" class="label" style="font-weight: bold; font-size: 11px;">VC Dimension</text>
    <text x="212" y="92" text-anchor="middle" class="highlight">Maximum points that</text>
    <text x="212" y="106" text-anchor="middle" class="label" style="font-size: 10px;">can be shattered</text>
    <text x="212" y="120" text-anchor="middle" class="highlight">by hypothesis class H</text>
  </g>
  
  <!-- Section 3: Sample Complexity Box -->
  <g class="anim-slide-up" style="animation-delay: 0.4s; opacity: 0;" data-narration="Sample complexity formula shows relationship between VC dimension and required samples">
    <rect x="285" y="58" width="120" height="72" rx="6" fill="url(#boxGradient3)" class="box"/>
    <text x="345" y="75" text-anchor="middle" class="label" style="font-weight: bold; font-size: 11px;">Sample Complexity</text>
    <text x="345" y="92" text-anchor="middle" class="formula">m(ε,δ) = O((d + ln(1/δ))/ε²)</text>
    <text x="345" y="110" text-anchor="middle" class="highlight">d = VC-dimension</text>
  </g>
  
  <!-- Arrow connectors -->
  <g class="anim-fade" style="animation-delay: 0.6s; opacity: 0;">
    <path d="M140 94 L150 94" stroke="#888" stroke-width="1.5" class="dashed-line"/>
    <path d="M275 94 L285 94" stroke="#888" stroke-width="1.5" class="dashed-line"/>
  </g>
  
  <!-- Shattering Visualization Area -->
  <g class="anim-fade" style="animation-delay: 0.7s; opacity: 0;" data-narration="Visual demonstration of shattering: 3 non-collinear points can be classified in all 2^3=8 possible ways by a linear classifier">
    <rect x="15" y="140" width="390" height="120" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
    <text x="210" y="158" text-anchor="middle" class="label" style="font-weight: bold; font-size: 12px;">VC Dimension Illustration: Shattering 3 Points</text>
    
    <!-- Coordinate system hint -->
    <line x1="35" y1="245" x2="120" y2="245" stroke="#bbb" stroke-width="1"/>
    <line x1="35" y1="175" x2="35" y2="245" stroke="#bbb" stroke-width="1"/>
    
    <!-- Three non-collinear points -->
    <circle cx="65" cy="195" r="6" fill="#e74c3c" class="anim-pulse"/>
    <text x="65" y="212" text-anchor="middle" class="highlight" style="font-size: 9px;">P1</text>
    
    <circle cx="100" cy="220" r="6" fill="#3498db" class="anim-pulse" style="animation-delay: 0.3s;"/>
    <text x="100" y="237" text-anchor="middle" class="highlight" style="font-size: 9px;">P2</text>
    
    <circle cx="85" cy="175" r="6" fill="#27ae60" class="anim-pulse" style="animation-delay: 0.6s;"/>
    <text x="85" y="170" text-anchor="middle" class="highlight" style="font-size: 9px;">P3</text>
    
    <!-- Multiple classification lines showing different labelings -->
    <line x1="50" y1="210" x2="110" y2="200" stroke="#9b59b6" stroke-width="1.5" opacity="0.7"/>
    <line x1="55" y1="230" x2="105" y2="165" stroke="#e67e22" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="250" x2="120" y2="155" stroke="#1abc9c" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Labels showing all possible labelings -->
    <text x="145" y="180" class="label" style="font-size: 10px;">All 8 labelings possible:</text>
    <text x="145" y="195" class="highlight" style="font-size: 9px;">{+++}, {++-}, {+-+}, {+--}</text>
    <text x="145" y="208" class="highlight" style="font-size: 9px;">{-++}, {-+-}, {--+}, {---}</text>
    <text x="145" y="225" class="label" style="font-size: 10px; fill: #e74c3c;">VCdim(H) = 3</text>
    <text x="145" y="240" class="highlight" style="font-size: 9px;">for linear classifiers</text>
  </g>
  
  <!-- Key Relationship Box -->
  <g class="anim-slide-up" style="animation-delay: 0.8s; opacity: 0;" data-narration="The fundamental relationship: higher VC dimension enables more complex patterns but requires more samples">
    <rect x="15" y="270" width="390" height="55" rx="6" fill="#fff9e6" stroke="#f39c12" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="210" y="288" text-anchor="middle" class="label" style="font-weight: bold; font-size: 12px;">Key Relationship</text>
    <text x="210" y="305" text-anchor="middle" class="formula" style="font-size: 12px;">Generalization Bound: R(h) ≤ R_emp(h) + √((d·ln(2n/d) + ln(4/δ))/n)</text>
    <text x="210" y="320" text-anchor="middle" class="highlight">Trade-off: Complex models (high d) fit better but need more samples</text>
  </g>
  
  <!-- Bottom Example Box -->
  <g class="anim-fade" style="animation-delay: 0.9s; opacity: 0;" data-narration="Example calculation showing how to apply the VC dimension formula">
    <rect x="15" y="335" width="390" height="55" rx="6" fill="url(#boxGradient1)" class="box"/>
    <text x="210" y="352" text-anchor="middle" class="label" style="font-weight: bold; font-size: 11px;">Example: VC-dim = 5, ε=0.1, δ=0.05</text>
    <text x="210" y="368" text-anchor="middle" class="formula">m ≥ (5 + ln(20))/0.01 ≈ 5 + 3/0.01 ≈ 805 samples</text>
    <text x="210" y="383" text-anchor="middle" class="highlight">Need ~805 training examples for reliable learning</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="15" r="8" fill="#e74c3c" opacity="0.2"/>
  <circle cx="25" cy="385" r="6" fill="#3498db" opacity="0.2"/>
  <circle cx="400" cy="380" r="10" fill="#27ae60" opacity="0.15"/>
</svg>