<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="bias-variance-tradeoff">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="biasGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="varianceGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45b7aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="totalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes fadeInUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #34495e; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .axis-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #2c3e50; font-weight: 600; }
    .legend-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
    .concept-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .concept-body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #555; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    .line-anim { stroke-dasharray: 500; stroke-dashoffset: 500; animation: drawLine 1.5s ease-out forwards; animation-delay: 0.5s; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
    .delay-6 { animation-delay: 1.2s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text fade-in">Bias-Variance Tradeoff</text>
  
  <!-- Graph Area -->
  <g transform="translate(50, 60)">
    <!-- Grid lines -->
    <g class="fade-in delay-1">
      <line x1="0" y1="250" x2="320" y2="250" stroke="#bdc3c7" stroke-width="1" />
      <line x1="0" y1="200" x2="320" y2="200" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4" />
      <line x1="0" y1="150" x2="320" y2="150" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4" />
      <line x1="0" y1="100" x2="320" y2="100" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4" />
      <line x1="0" y1="50" x2="320" y2="50" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4" />
    </g>
    
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="250" stroke="#2c3e50" stroke-width="2" class="fade-in delay-1" />
    <line x1="0" y1="250" x2="320" y2="250" stroke="#2c3e50" stroke-width="2" class="fade-in delay-1" />
    
    <!-- Axis Labels -->
    <text x="160" y="275" text-anchor="middle" class="axis-label fade-in delay-2">Model Complexity →</text>
    <text x="-15" y="125" text-anchor="middle" class="axis-label fade-in delay-2" transform="rotate(-90, -15, 125)">Error →</text>
    
    <!-- Complexity labels -->
    <text x="30" y="268" text-anchor="middle" class="detail-text fade-in delay-3">Low</text>
    <text x="160" y="268" text-anchor="middle" class="detail-text fade-in delay-3">Medium</text>
    <text x="290" y="268" text-anchor="middle" class="detail-text fade-in delay-3">High</text>
    
    <!-- Bias² Curve (decreasing) -->
    <path d="M 10,60 Q 80,80 160,180 T 310,230" fill="none" stroke="url(#biasGradient)" stroke-width="3" class="line-anim" />
    
    <!-- Variance Curve (increasing) -->
    <path d="M 10,220 Q 100,200 180,120 T 310,50" fill="none" stroke="url(#varianceGradient)" stroke-width="3" class="line-anim" />
    
    <!-- Total Error Curve (U-shaped) -->
    <path d="M 10,180 Q 100,170 160,100 Q 200,70 220,60 Q 240,55 260,65 Q 290,90 310,150" fill="none" stroke="url(#totalGradient)" stroke-width="3.5" class="line-anim" />
    
    <!-- Optimal Point -->
    <circle cx="220" cy="55" r="8" fill="#f39c12" class="pulse-anim fade-in delay-4" />
    <text x="235" y="45" class="legend-text fade-in delay-4" style="font-size:11px;fill:#e67e22;font-weight:bold;">Optimal</text>
    
    <!-- Underfitting region arrow -->
    <g class="fade-in delay-5">
      <line x1="60" y1="30" x2="100" y2="60" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowhead)" />
      <text x="55" y="25" class="detail-text" style="fill:#e74c3c;">Underfitting</text>
    </g>
    
    <!-- Overfitting region arrow -->
    <g class="fade-in delay-5">
      <line x1="270" y1="30" x2="260" y2="80" stroke="#7f8c8d" stroke-width="1.5" />
      <text x="265" y="25" class="detail-text" style="fill:#27ae60;">Overfitting</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 330)" class="fade-in delay-4">
    <rect x="0" y="0" width="140" height="45" fill="white" rx="5" filter="url(#shadow)" />
    <line x1="15" y1="15" x2="35" y2="15" stroke="#ff6b6b" stroke-width="3" />
    <text x="45" y="19" class="legend-text">Bias²</text>
    <line x1="85" y1="15" x2="105" y2="15" stroke="#4ecdc4" stroke-width="3" />
    <text x="115" y="19" class="legend-text">Variance</text>
    <line x1="15" y1="32" x2="35" y2="32" stroke="#9b59b6" stroke-width="3" />
    <text x="45" y="36" class="legend-text">Total Error</text>
  </g>
  
  <!-- Concept Box 1: Bias -->
  <g transform="translate(200, 330)" class="fade-in delay-5 slide-in" data-narration="Bias represents systematic error from oversimplified assumptions in the model">
    <rect x="0" y="0" width="100" height="45" fill="#ffeaa7" rx="5" filter="url(#shadow)" />
    <text x="50" y="15" text-anchor="middle" class="concept-title">Bias</text>
    <text x="50" y="28" text-anchor="middle" class="concept-body">Oversimplified</text>
    <text x="50" y="40" text-anchor="middle" class="concept-body" style="fill:#e74c3c;">High → Underfit</text>
  </g>
  
  <!-- Concept Box 2: Variance -->
  <g transform="translate(305, 330)" class="fade-in delay-6 slide-in" data-narration="Variance represents model sensitivity to fluctuations in training data">
    <rect x="0" y="0" width="100" height="45" fill="#d4efdf" rx="5" filter="url(#shadow)" />
    <text x="50" y="15" text-anchor="middle" class="concept-title">Variance</text>
    <text x="50" y="28" text-anchor="middle" class="concept-body">Complex</text>
    <text x="50" y="40" text-anchor="middle" class="concept-body" style="fill:#27ae60;">High → Overfit</text>
  </g>
  
  <!-- Equation Box -->
  <g transform="translate(200, 375)" class="fade-in delay-6" data-narration="The total prediction error decomposes into bias squared plus variance plus irreducible error">
    <text x="100" y="15" text-anchor="middle" class="detail-text" style="font-size:12px;font-style:italic;">E[(y-ŷ)²] = Bias² + Var + σ²</text>
  </g>
  
  <!-- Arrow from Bias to curve -->
  <g class="fade-in delay-5">
    <path d="M 225 345 Q 180 320 130 250" stroke="#ff6b6b" stroke-width="1.5" fill="none" stroke-dasharray="4" />
    <polygon points="128,245 138,252 132,258" fill="#ff6b6b" />
  </g>
  
  <!-- Arrow from Variance to curve -->
  <g class="fade-in delay-5">
    <path d="M 355 345 Q 380 300 350 180" stroke="#4ecdc4" stroke-width="1.5" fill="none" stroke-dasharray="4" />
    <polygon points="348,175 358,182 352,188" fill="#4ecdc4" />
  </g>
</svg>