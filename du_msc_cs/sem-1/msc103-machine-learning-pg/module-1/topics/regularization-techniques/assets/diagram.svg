<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="regularization-techniques">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe6f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out forwards; font-family: Georgia, serif; }
    .box { animation: slideInUp 0.8s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.3s; }
    .box2 { animation-delay: 0.5s; }
    .box3 { animation-delay: 0.7s; }
    .box4 { animation-delay: 0.9s; }
    .curve { animation: drawLine 2s ease-out forwards, fadeIn 0.5s ease-out forwards; stroke-dasharray: 500; stroke-dashoffset: 500; }
    .label { animation: fadeIn 1s ease-out forwards; animation-delay: 1.2s; opacity: 0; }
    .arrow { animation: fadeIn 0.5s ease-out forwards; animation-delay: 1.5s; opacity: 0; }
    .highlight { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .tech-box { cursor: pointer; transition: transform 0.3s ease; }
    .tech-box:hover { transform: scale(1.02); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title" font-size="22" font-weight="bold" fill="#2c3e50" font-family="Georgia, serif">Regularization Techniques</text>
  <text x="210" y="52" text-anchor="middle" class="title" font-size="11" fill="#5d6d7e" font-style="italic" opacity="0.8">Balancing Model Complexity &amp; Generalization</text>
  
  <!-- Bias-Variance Tradeoff Curve -->
  <g transform="translate(140, 100)">
    <!-- Axis -->
    <line x1="0" y1="120" x2="140" y2="120" stroke="#7f8c8d" stroke-width="1.5"/>
    <line x1="0" y1="120" x2="0" y2="0" stroke="#7f8c8d" stroke-width="1.5"/>
    <text x="70" y="138" text-anchor="middle" font-size="10" fill="#5d6d7e">Model Complexity →</text>
    <text x="-10" y="60" text-anchor="middle" font-size="10" fill="#5d6d7e" transform="rotate(-90, -10, 60)">Error →</text>
    
    <!-- Curve -->
    <path class="curve" d="M 10 20 Q 40 100 70 45 Q 100 15 130 10" fill="none" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Zones -->
    <text x="25" y="95" class="label" font-size="9" fill="#e74c3c">Underfitting</text>
    <text x="115" y="35" class="label" font-size="9" fill="#e74c3c">Overfitting</text>
    
    <!-- Optimal Point -->
    <circle cx="70" cy="45" r="6" fill="#27ae60" class="highlight" transform="translate(0,0)"/>
    <text x="70" y="30" class="label" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">Optimal</text>
  </g>
  
  <!-- Technique Boxes -->
  <!-- L1 Lasso -->
  <g class="tech-box box box1" data-narration="L1 Regularization (Lasso) adds absolute weight values to the loss function, promoting sparsity and feature selection">
    <rect x="10" y="150" width="90" height="70" fill="#fff" rx="6" filter="url(#shadow)"/>
    <rect x="10" y="150" width="90" height="18" fill="#9b59b6" rx="6"/>
    <text x="55" y="163" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">L1 (Lasso)</text>
    <text x="55" y="182" text-anchor="middle" font-size="8" fill="#2c3e50">Loss + λΣ|w|</text>
    <text x="55" y="195" text-anchor="middle" font-size="7" fill="#7f8c8d">Sparsity</text>
    <text x="55" y="207" text-anchor="middle" font-size="7" fill="#7f8c8d">Feature Selection</text>
  </g>
  
  <!-- L2 Ridge -->
  <g class="tech-box box box2" data-narration="L2 Regularization (Ridge) adds squared weight values, smoothly shrinking weights without eliminating features">
    <rect x="110" y="150" width="90" height="70" fill="#fff" rx="6" filter="url(#shadow)"/>
    <rect x="110" y="150" width="90" height="18" fill="#3498db" rx="6"/>
    <text x="155" y="163" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">L2 (Ridge)</text>
    <text x="155" y="182" text-anchor="middle" font-size="8" fill="#2c3e50">Loss + λΣw²</text>
    <text x="155" y="195" text-anchor="middle" font-size="7" fill="#7f8c8d">Weight Shrinkage</text>
    <text x="155" y="207" text-anchor="middle" font-size="7" fill="#7f8c8d">Closed Form</text>
  </g>
  
  <!-- Elastic Net -->
  <g class="tech-box box box3" data-narration="Elastic Net combines L1 and L2 penalties, handling correlated features effectively">
    <rect x="10" y="235" width="90" height="70" fill="#fff" rx="6" filter="url(#shadow)"/>
    <rect x="10" y="235" width="90" height="18" fill="#1abc9c" rx="6"/>
    <text x="55" y="248" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Elastic Net</text>
    <text x="55" y="267" text-anchor="middle" font-size="8" fill="#2c3e50">Loss + λ₁|w| + λ₂w²</text>
    <text x="55" y="280" text-anchor="middle" font-size="7" fill="#7f8c8d">Hybrid Approach</text>
    <text x="55" y="292" text-anchor="middle" font-size="7" fill="#7f8c8d">Correlated Features</text>
  </g>
  
  <!-- Dropout & Early Stopping -->
  <g class="tech-box box box4" data-narration="Dropout randomly deactivates neurons during training; Early Stopping halts training when validation loss plateaus">
    <rect x="110" y="235" width="90" height="70" fill="#fff" rx="6" filter="url(#shadow)"/>
    <rect x="110" y="235" width="90" height="18" fill="#e67e22" rx="6"/>
    <text x="155" y="248" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Dropout / Early Stop</text>
    <text x="155" y="267" text-anchor="middle" font-size="8" fill="#2c3e50">Random Deactivation</text>
    <text x="155" y="280" text-anchor="middle" font-size="7" fill="#7f8c8d">Implicit Reg.</text>
    <text x="155" y="292" text-anchor="middle" font-size="7" fill="#7f8c8d">Val. Loss Monitor</text>
  </g>
  
  <!-- Arrows connecting boxes to curve -->
  <g class="arrow">
    <path d="M 55 150 Q 55 130 70 110" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
    <path d="M 155 150 Q 155 130 100 110" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M 55 235 Q 55 210 70 160" fill="none" stroke="#1abc9c" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M 155 235 Q 155 210 110 160" fill="none" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Legend/Info Box -->
  <g transform="translate(210, 310)">
    <rect x="0" y="0" width="200" height="80" fill="#fff" rx="6" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="16" fill="#34495e" rx="6"/>
    <text x="100" y="12" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Key Insight</text>
    <text x="10" y="32" font-size="9" fill="#2c3e50">Bias-Variance Tradeoff:</text>
    <text x="10" y="46" font-size="8" fill="#5d6d7e">Regularization increases bias but</text>
    <text x="10" y="58" font-size="8" fill="#5d6d7e">reduces variance → Better generalization</text>
    <text x="10" y="72" font-size="8" fill="#27ae60" font-weight="bold">Goal: Minimize total error at optimal complexity</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="30" cy="380" r="3" fill="#9b59b6" opacity="0.5"/>
  <circle cx="50" cy="375" r="2" fill="#3498db" opacity="0.5"/>
  <circle cx="380" cy="30" r="3" fill="#e67e22" opacity="0.5"/>
  <circle cx="390" cy="45" r="2" fill="#1abc9c" opacity="0.5"/>
</svg>