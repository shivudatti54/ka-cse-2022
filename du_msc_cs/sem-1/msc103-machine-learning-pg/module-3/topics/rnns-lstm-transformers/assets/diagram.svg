<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="rnns-lstm-transformers">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8eeff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f5e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rnnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lstmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="transformerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #444; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #666; }
    .formula-text { font-family: 'Times New Roman', serif; font-size: 11px; fill: #333; font-style: italic; }
    .rnn-box { animation: fadeIn 0.8s ease-out; }
    .lstm-box { animation: slideIn 0.8s ease-out 0.3s both; }
    .transformer-box { animation: fadeIn 0.8s ease-out 0.6s both; }
    .pulse-element { animation: pulse 2s infinite; transform-origin: center; transform-box: fill-box; }
    .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />

  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text">RNNs → LSTMs → Transformers</text>
  <line x1="20" y1="40" x2="400" y2="40" stroke="#aaa" stroke-width="1" stroke-dasharray="4" />

  <!-- RNN Section -->
  <g class="rnn-box" data-narration="Recurrent Neural Networks use hidden states to maintain temporal context across sequences">
    <rect x="20" y="55" width="115" height="90" rx="8" fill="url(#rnnGradient)" stroke="#64b5f6" stroke-width="2" />
    <text x="77" y="72" text-anchor="middle" class="section-title">RNN</text>
    <text x="77" y="90" text-anchor="middle" class="detail-text">Hidden State</text>
    <text x="77" y="105" text-anchor="middle" class="formula-text">h_t = σ(W_hh_{t-1}</text>
    <text x="77" y="118" text-anchor="middle" class="formula-text">+ W_x x_t + b)</text>
    <circle cx="55" cy="125" r="12" fill="#90caf9" class="pulse-element" />
    <text x="55" y="129" text-anchor="middle" class="detail-text" fill="#333">x_t</text>
    <path d="M67 125 L87 125" stroke="#64b5f6" stroke-width="2" />
    <circle cx="100" cy="125" r="12" fill="#64b5f6" />
    <text x="100" y="129" text-anchor="middle" class="detail-text" fill="#fff">h_t</text>
  </g>

  <!-- Arrow RNN to LSTM -->
  <path d="M145 100 L170 100" class="arrow" />

  <!-- LSTM Section -->
  <g class="lstm-box" data-narration="LSTMs solve vanishing gradients using gating mechanisms: forget, input, and output gates">
    <rect x="175" y="55" width="125" height="90" rx="8" fill="url(#lstmGradient)" stroke="#81c784" stroke-width="2" />
    <text x="237" y="72" text-anchor="middle" class="section-title">LSTM</text>
    
    <!-- Gate boxes -->
    <rect x="185" y="80" width="30" height="18" rx="3" fill="#a5d6a7" stroke="#4caf50" stroke-width="1" />
    <text x="200" y="93" text-anchor="middle" class="detail-text" font-size="9">Forget</text>
    
    <rect x="222" y="80" width="30" height="18" rx="3" fill="#a5d6a7" stroke="#4caf50" stroke-width="1" />
    <text x="237" y="93" text-anchor="middle" class="detail-text" font-size="9">Input</text>
    
    <rect x="259" y="80" width="30" height="18" rx="3" fill="#a5d6a7" stroke="#4caf50" stroke-width="1" />
    <text x="274" y="93" text-anchor="middle" class="detail-text" font-size="9">Output</text>
    
    <text x="237" y="118" text-anchor="middle" class="detail-text">Cell State (C_t)</text>
    <rect x="185" y="125" width="105" height="12" rx="3" fill="#c8e6c9" stroke="#81c784" stroke-width="1" />
    <text x="237" y="133" text-anchor="middle" class="formula-text" font-size="9">C_t = f_t*C_{t-1} + i_t*Ĉ_t</text>
  </g>

  <!-- Arrow LSTM to Transformer -->
  <path d="M310 100 L335 100" class="arrow" />

  <!-- Transformer Section -->
  <g class="transformer-box" data-narration="Transformers use self-attention to capture global dependencies with parallel processing">
    <rect x="340" y="55" width="70" height="90" rx="8" fill="url(#transformerGradient)" stroke="#ce93d8" stroke-width="2" />
    <text x="375" y="72" text-anchor="middle" class="section-title">Transformer</text>
    <rect x="348" y="80" width="54" height="20" rx="3" fill="#e1bee7" stroke="#ba68c8" stroke-width="1" />
    <text x="375" y="93" text-anchor="middle" class="detail-text" font-size="9">Multi-Head</text>
    <text x="375" y="103" text-anchor="middle" class="detail-text" font-size="9">Attention</text>
    <rect x="348" y="110" width="54" height="20" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1" />
    <text x="375" y="123" text-anchor="middle" class="detail-text" font-size="9">Feed Forward</text>
  </g>

  <!-- Architecture Comparison Section -->
  <g data-narration="Key architectural evolution: from sequential processing (RNN) to gated memory (LSTM) to attention-based parallelism (Transformer)">
    <line x1="20" y1="160" x2="400" y2="160" stroke="#aaa" stroke-width="1" stroke-dasharray="4" />
    <text x="210" y="178" text-anchor="middle" class="section-title" font-size="13">Architecture Comparison</text>
  </g>

  <!-- Comparison Boxes -->
  <!-- RNN characteristics -->
  <rect x="25" y="190" width="120" height="55" rx="6" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.5" />
  <text x="85" y="207" text-anchor="middle" class="section-title" font-size="12">RNN</text>
  <text x="85" y="222" text-anchor="middle" class="label-text" font-size="10">• Sequential processing</text>
  <text x="85" y="235" text-anchor="middle" class="label-text" font-size="10">• Vanishing gradients</text>
  <text x="85" y="248" text-anchor="middle" class="label-text" font-size="10">• Short-term memory</text>

  <!-- LSTM characteristics -->
  <rect x="150" y="190" width="120" height="55" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5" />
  <text x="210" y="207" text-anchor="middle" class="section-title" font-size="12">LSTM</text>
  <text x="210" y="222" text-anchor="middle" class="label-text" font-size="10">• Gated memory cells</text>
  <text x="210" y="235" text-anchor="middle" class="label-text" font-size="10">• Long-term dependencies</text>
  <text x="210" y="248" text-anchor="middle" class="label-text" font-size="10">• Solves vanishing grad</text>

  <!-- Transformer characteristics -->
  <rect x="275" y="190" width="120" height="55" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5" />
  <text x="335" y="207" text-anchor="middle" class="section-title" font-size="12">Transformer</text>
  <text x="335" y="222" text-anchor="middle" class="label-text" font-size="10">• Self-attention</text>
  <text x="335" y="235" text-anchor="middle" class="label-text" font-size="10">• Parallel processing</text>
  <text x="335" y="248" text-anchor="middle" class="label-text" font-size="10">• Global context</text>

  <!-- Key Formulas Section -->
  <g data-narration="Mathematical foundations: attention mechanism and LSTM gating equations">
    <line x1="20" y1="260" x2="400" y2="260" stroke="#aaa" stroke-width="1" stroke-dasharray="4" />
    <text x="210" y="278" text-anchor="middle" class="section-title" font-size="13">Key Formulas</text>
  </g>

  <!-- Self-Attention Formula -->
  <rect x="20" y="290" width="185" height="45" rx="6" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5" />
  <text x="112" y="308" text-anchor="middle" class="section-title" font-size="11">Self-Attention</text>
  <text x="112" y="325" text-anchor="middle" class="formula-text">Attention(Q,K,V) = softmax(QK^T/√d_k)V</text>

  <!-- LSTM Gates Formula -->
  <rect x="215" y="290" width="185" height="45" rx="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5" />
  <text x="307" y="308" text-anchor="middle" class="section-title" font-size="11">LSTM Gates</text>
  <text x="307" y="325" text-anchor="middle" class="formula-text">f_t, i_t, o_t = σ(W*[h_{t-1},x_t]+b)</text>

  <!-- Applications Section -->
  <g data-narration="Real-world applications from language models to time series forecasting">
    <line x1="20" y1="350" x2="400" y2="350" stroke="#aaa" stroke-width="1" stroke-dasharray="4" />
    <text x="210" y="368" text-anchor="middle" class="section-title" font-size="13">Applications</text>
    
    <!-- Application tags -->
    <rect x="30" y="375" width="70" height="18" rx="9" fill="#bbdefb" stroke="#64b5f6" stroke-width="1" />
    <text x="65" y="388" text-anchor="middle" class="detail-text" font-size="10">NLP/BERT</text>
    
    <rect x="110" y="375" width="70" height="18" rx="9" fill="#c8e6c9" stroke="#81c784" stroke-width="1" />
    <text x="145" y="388" text-anchor="middle" class="detail-text" font-size="10">GPT Models</text>
    
    <rect x="190" y="375" width="70" height="18" rx="9" fill="#ffccbc" stroke="#ff8a65" stroke-width="1" />
    <text x="225" y="388" text-anchor="middle" class="detail-text" font-size="10">Time Series</text>
    
    <rect x="270" y="375" width="70" height="18" rx="9" fill="#d1c4e9" stroke="#9575cd" stroke-width="1" />
    <text x="305" y="388" text-anchor="middle" class="detail-text" font-size="10">Speech</text>
    
    <rect x="350" y="375" width="55" height="18" rx="9" fill="#b2dfdb" stroke="#4db6ac" stroke-width="1" />
    <text x="377" y="388" text-anchor="middle" class="detail-text" font-size="10">Translation</text>
  </g>

  <!-- Evolution Arrow -->
  <path d="M77 155 L77 165 M77 155 L67 165 M77 155 L87 165" stroke="#555" stroke-width="2" fill="none" />
  <text x="77" y="178" text-anchor="middle" class="detail-text" font-size="9">Evolution</text>
  <path d="M237 155 L237 165 M237 155 L227 165 M237 155 L247 165" stroke="#555" stroke-width="2" fill="none" />
  <text x="237" y="178" text-anchor="middle" class="detail-text" font-size="9">Improvement</text>
  <path d="M375 155 L375 165 M375 155 L365 165 M375 155 L385 165" stroke="#555" stroke-width="2" fill="none" />
  <text x="375" y="178" text-anchor="middle" class="detail-text" font-size="9">Revolution</text>

</svg>