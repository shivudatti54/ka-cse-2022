<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="deep-neural-networks">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5daf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4472c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hiddenNodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#70ad47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#528238;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputNodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ed7d31;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d15218;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#333" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; font-weight: 600; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-box { fill: #fff; stroke: #b8d4e8; stroke-width: 1.5; rx: 8; }
    .connection { stroke: #8fb8de; stroke-width: 1.5; fill: none; }
    .arrow { fill: #5b9bd5; }
    .node { cursor: pointer; }
    .node:hover { filter: brightness(1.1); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-flow { animation: flowRight 2s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Deep Neural Networks</text>
  <line x1="100" y1="40" x2="320" y2="40" stroke="#5b9bd5" stroke-width="2" class="anim-fade" />
  
  <!-- Section 1: Input Layer -->
  <g data-narration="Input Layer: Raw data features enter the network (e.g., image pixels, word embeddings)">
    <rect x="20" y="60" width="100" height="50" class="section-box anim-slide-left" style="animation-delay: 0.2s" />
    <text x="70" y="78" text-anchor="middle" class="label">INPUT LAYER</text>
    <text x="70" y="95" text-anchor="middle" class="detail">(Features x₁, x₂, ... xₙ)</text>
    
    <!-- Input Nodes -->
    <circle cx="50" cy="130" r="8" fill="url(#nodeGradient)" class="node anim-pulse" style="animation-delay: 0.5s" />
    <circle cx="70" cy="150" r="8" fill="url(#nodeGradient)" class="node anim-pulse" style="animation-delay: 0.7s" />
    <circle cx="50" cy="170" r="8" fill="url(#nodeGradient)" class="node anim-pulse" style="animation-delay: 0.9s" />
    <circle cx="70" cy="190" r="8" fill="url(#nodeGradient)" class="node anim-pulse" style="animation-delay: 1.1s" />
    <circle cx="60" cy="210" r="8" fill="url(#nodeGradient)" class="node anim-pulse" style="animation-delay: 1.3s" />
    <text x="25" y="135" class="detail">x₁</text>
    <text x="25" y="155" class="detail">x₂</text>
    <text x="25" y="175" class="detail">x₃</text>
    <text x="25" y="195" class="detail">x₄</text>
    <text x="25" y="215" class="detail">xₙ</text>
  </g>
  
  <!-- Arrow from Input to Hidden 1 -->
  <path d="M95 160 L130 160" class="connection anim-flow" stroke-dasharray="5,3" />
  <polygon points="130,155 140,160 130,165" class="arrow" />
  
  <!-- Section 2: Hidden Layer 1 with ReLU -->
  <g data-narration="Hidden Layer 1: Linear transformation W¹x + b¹ followed by ReLU activation: max(0, z)">
    <rect x="145" y="60" width="80" height="50" class="section-box anim-fade" style="animation-delay: 0.4s" />
    <text x="185" y="78" text-anchor="middle" class="label">HIDDEN 1</text>
    <text x="185" y="95" text-anchor="middle" class="detail">ReLU Activation</text>
    
    <!-- Hidden Nodes Layer 1 -->
    <circle cx="165" cy="130" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 0.6s" />
    <circle cx="185" cy="150" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 0.8s" />
    <circle cx="165" cy="170" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 1.0s" />
    <circle cx="185" cy="190" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 1.2s" />
    <circle cx="175" cy="210" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 1.4s" />
    
    <!-- ReLU Formula -->
    <text x="185" y="230" text-anchor="middle" class="detail" fill="#528238">f(z)=max(0,z)</text>
  </g>
  
  <!-- Arrow from Hidden 1 to Hidden 2 -->
  <path d="M230 160 L265 160" class="connection anim-flow" stroke-dasharray="5,3" style="animation-delay: 0.5s" />
  <polygon points="265,155 275,160 265,165" class="arrow" style="animation-delay: 0.5s" />
  
  <!-- Section 3: Hidden Layer 2 -->
  <g data-narration="Hidden Layer 2: Deeper representation learning with weights W² and biases b²">
    <rect x="270" y="60" width="80" height="50" class="section-box anim-slide-right" style="animation-delay: 0.6s" />
    <text x="310" y="78" text-anchor="middle" class="label">HIDDEN 2</text>
    <text x="310" y="95" text-anchor="middle" class="detail">ReLU Activation</text>
    
    <!-- Hidden Nodes Layer 2 -->
    <circle cx="295" cy="135" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 0.9s" />
    <circle cx="310" cy="155" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 1.1s" />
    <circle cx="295" cy="175" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 1.3s" />
    <circle cx="310" cy="195" r="9" fill="url(#hiddenNodeGradient)" class="node anim-pulse" style="animation-delay: 1.5s" />
  </g>
  
  <!-- Arrow from Hidden 2 to Output -->
  <path d="M355 165 L380 165" class="connection anim-flow" stroke-dasharray="5,3" style="animation-delay: 1s" />
  <polygon points="380,160 390,165 380,170" class="arrow" style="animation-delay: 1s" />
  
  <!-- Section 4: Output Layer with Softmax -->
  <g data-narration="Output Layer: Final predictions via softmax for classification or linear for regression">
    <rect x="385" y="60" width="30" height="50" class="section-box anim-slide-right" style="animation-delay: 0.8s" />
    <text x="400" y="78" text-anchor="middle" class="label" font-size="12">OUTPUT</text>
    
    <!-- Output Nodes -->
    <circle cx="400" cy="130" r="10" fill="url(#outputNodeGradient)" class="node anim-pulse" style="animation-delay: 1.2s" />
    <circle cx="400" cy="160" r="10" fill="url(#outputNodeGradient)" class="node anim-pulse" style="animation-delay: 1.4s" />
    <circle cx="400" cy="190" r="10" fill="url(#outputNodeGradient)" class="node anim-pulse" style="animation-delay: 1.6s" />
    
    <text x="420" y="133" class="detail">Class 1</text>
    <text x="420" y="163" class="detail">Class 2</text>
    <text x="420" y="193" class="detail">Class C</text>
    
    <!-- Softmax -->
    <text x="400" y="220" text-anchor="middle" class="detail" fill="#d15218">Softmax</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key Concepts: Backpropagation uses chain rule to compute gradients; Dropout prevents overfitting">
    <rect x="15" y="250" width="390" height="135" class="section-box" fill="#f8fbfe" />
    <text x="25" y="270" class="label" font-size="13">Key Concepts</text>
    
    <!-- Concept 1: Parameters -->
    <circle cx="40" cy="295" r="5" fill="#5b9bd5" />
    <text x="55" y="299" class="detail" font-size="12">Weights (W) &amp; Biases (b): Learnable parameters</text>
    
    <!-- Concept 2: Backpropagation -->
    <circle cx="40" cy="320" r="5" fill="#ed7d31" />
    <text x="55" y="324" class="detail" font-size="12">Backpropagation: Chain rule gradient ∂L/∂W</text>
    
    <!-- Concept 3: Regularization -->
    <circle cx="40" cy="345" r="5" fill="#70ad47" />
    <text x="55" y="349" class="detail" font-size="12">Regularization: Dropout, BatchNorm, L1/L2</text>
    
    <!-- Concept 4: Initialization -->
    <circle cx="40" cy="370" r="5" fill="#9b59b6" />
    <text x="55" y="374" class="detail" font-size="12">Initialization: He/Xavier for stable training</text>
    
    <!-- Arrow showing backprop direction -->
    <path d="M200 230 L200 250" stroke="#ed7d31" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
    <text x="210" y="245" class="detail" fill="#ed7d31" font-size="10">Backprop ↓</text>
  </g>
  
  <!-- Animated connection lines showing network depth -->
  <g opacity="0.3">
    <line x1="60" y1="130" x2="165" y2="130" class="connection" />
    <line x1="60" y1="130" x2="165" y2="150" class="connection" />
    <line x1="60" y1="130" x2="165" y2="170" class="connection" />
    <line x1="70" y1="150" x2="165" y2="130" class="connection" />
    <line x1="70" y1="150" x2="165" y2="170" class="connection" />
    <line x1="70" y1="150" x2="185" y2="150" class="connection" />
    <line x1="50" y1="170" x2="185" y2="150" class="connection" />
    <line x1="70" y1="190" x2="185" y2="190" class="connection" />
    <line x1="60" y1="210" x2="175" y2="210" class="connection" />
  </g>
  
  <!-- Hidden layer connections -->
  <g opacity="0.3">
    <line x1="165" y1="130" x2="295" y2="135" class="connection" />
    <line x1="165" y1="130" x2="310" y2="155" class="connection" />
    <line x1="185" y1="150" x2="295" y2="135" class="connection" />
    <line x1="185" y1="150" x2="310" y2="155" class="connection" />
    <line x1="165" y1="170" x2="295" y2="175" class="connection" />
    <line x1="185" y1="190" x2="310" y2="195" class="connection" />
    <line x1="175" y1="210" x2="295" y2="175" class="connection" />
  </g>
  
  <!-- Output layer connections -->
  <g opacity="0.3">
    <line x1="295" y1="135" x2="400" y2="130" class="connection" />
    <line x1="310" y1="155" x2="400" y2="160" class="connection" />
    <line x1="295" y1="175" x2="400" y2="190" class="connection" />
    <line x1="310" y1="195" x2="400" y2="190" class="connection" />
  </g>
  
  <!-- Depth indicator -->
  <text x="210" y="245" text-anchor="middle" class="label" fill="#888" font-size="10">Network Depth: 3 Hidden Layers</text>
</svg>