<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="cnns-for-vision" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e0e8f8"/>
      <stop offset="100%" style="stop-color:#f0e8f8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="convGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="poolGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="fcGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9"/>
      <stop offset="100%" style="stop-color:#b2bec3"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section { animation: slideInLeft 0.6s ease-out backwards; }
    .section-right { animation: slideInRight 0.6s ease-out backwards; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse:hover { animation: pulse 0.5s ease-in-out; transform-origin: center; }
    .box { transition: all 0.3s ease; }
    .box:hover { filter: brightness(1.05); }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3436" class="title">CNNs for Vision</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#636e72">Convolutional Neural Network Architecture</text>
  
  <!-- Section 1: Input Image -->
  <g class="section" style="animation-delay: 0.1s" data-narration="Input: RGB image (e.g., 32x32x3 for CIFAR-10)">
    <rect x="20" y="80" width="60" height="60" rx="6" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <rect x="25" y="85" width="50" height="50" fill="#74b9ff" rx="3"/>
    <rect x="28" y="88" width="15" height="15" fill="#0984e3"/>
    <rect x="46" y="88" width="12" height="12" fill="#74b9ff"/>
    <rect x="61" y="101" width="10" height="10" fill="#a29bfe"/>
    <text x="50" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3436">Input</text>
    <text x="50" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#636e72">32×32×3 RGB</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M85 110 L115 110" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="112,105 120,110 112,115" fill="#636e72"/>
  
  <!-- Section 2: Conv + ReLU -->
  <g class="section" style="animation-delay: 0.2s" data-narration="Conv Layer: 3x3 kernels slide across input, extracting features like edges and textures">
    <rect x="120" y="75" width="70" height="70" rx="6" fill="url(#convGradient)" filter="url(#shadow)" class="box"/>
    <text x="155" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">Conv</text>
    <text x="155" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d3436">3×3 kernel</text>
    <rect x="135" y="118" width="40" height="4" rx="2" fill="#d63031" opacity="0.7"/>
    <rect x="135" y="125" width="40" height="4" rx="2" fill="#d63031" opacity="0.5"/>
    <rect x="135" y="132" width="40" height="4" rx="2" fill="#d63031" opacity="0.3"/>
    <text x="155" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3436">+ReLU</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M195 110 L225 110" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="222,105 230,110 222,115" fill="#636e72"/>
  
  <!-- Section 3: Pooling -->
  <g class="section" style="animation-delay: 0.3s" data-narration="Pooling: Max pooling reduces spatial dimensions while preserving important features">
    <rect x="230" y="80" width="55" height="55" rx="6" fill="url(#poolGradient)" filter="url(#shadow)" class="box"/>
    <text x="257" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3436">Pool</text>
    <text x="257" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d3436">2×2 stride</text>
    <rect x="243" y="120" width="10" height="10" fill="#00b894" opacity="0.6"/>
    <rect x="256" y="120" width="10" height="10" fill="#00b894" opacity="0.8"/>
    <rect x="243" y="133" width="10" height="10" fill="#00b894" opacity="0.9"/>
    <rect x="256" y="133" width="10" height="10" fill="#00b894" opacity="0.5"/>
    <text x="257" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00b894">max</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M290 110 L320 110" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="317,105 325,110 317,115" fill="#636e72"/>
  
  <!-- Section 4: Conv2 + ReLU -->
  <g class="section" style="animation-delay: 0.4s" data-narration="Conv Layer 2: Learns higher-level features combining edges into patterns">
    <rect x="325" y="75" width="70" height="70" rx="6" fill="url(#convGradient)" filter="url(#shadow)" class="box"/>
    <text x="360" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3436">Conv</text>
    <text x="360" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d3436">3×3 kernel</text>
    <rect x="340" y="118" width="40" height="4" rx="2" fill="#d63031" opacity="0.7"/>
    <rect x="340" y="125" width="40" height="4" rx="2" fill="#d63031" opacity="0.5"/>
    <rect x="340" y="132" width="40" height="4" rx="2" fill="#d63031" opacity="0.3"/>
    <text x="360" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3436">+ReLU</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M360 150 L360 190" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="355,187 360,195 365,187" fill="#636e72"/>
  
  <!-- Section 5: Pooling 2 -->
  <g class="section" style="animation-delay: 0.5s" data-narration="Pooling 2: Further reduces dimensions for translation invariance">
    <rect x="325" y="195" width="70" height="55" rx="6" fill="url(#poolGradient)" filter="url(#shadow)" class="box"/>
    <text x="360" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3436">Pool</text>
    <text x="360" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d3436">2×2 stride</text>
    <rect x="345" y="235" width="30" height="3" rx="1" fill="#00b894" opacity="0.7"/>
    <rect x="345" y="241" width="30" height="3" rx="1" fill="#00b894" opacity="0.5"/>
    <text x="360" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00b894">max</text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M400 220 L400 260 L300 260" stroke="#636e72" stroke-width="2" fill="none" class="arrow" stroke-dasharray="4,2"/>
  
  <!-- Section 6: Fully Connected -->
  <g class="section-right" style="animation-delay: 0.6s" data-narration="Fully Connected: Combines features for final classification (e.g., 10 classes for CIFAR-10)">
    <rect x="175" y="275" width="70" height="55" rx="6" fill="url(#fcGradient)" filter="url(#shadow)" class="box"/>
    <text x="210" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2d3436">FC Layer</text>
    <text x="210" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d3436">256 neurons</text>
    <circle cx="195" cy="302" r="3" fill="#636e72"/>
    <circle cx="225" cy="302" r="3" fill="#636e72"/>
    <line x1="195" y1="302" x2="225" y2="302" stroke="#636e72" stroke-width="1"/>
  </g>
  
  <!-- Arrow 6 -->
  <path d="M250 302 L280 302" stroke="#636e72" stroke-width="2" fill="none" class="arrow"/>
  <polygon points="277,297 285,302 277,307" fill="#636e72"/>
  
  <!-- Section 7: Output -->
  <g class="section-right" style="animation-delay: 0.7s" data-narration="Output: Probability distribution over classes (e.g., dog, cat, bird for CIFAR-10)">
    <rect x="285" y="275" width="55" height="55" rx="6" fill="url(#outputGradient)" filter="url(#shadow)" class="box"/>
    <text x="312" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Output</text>
    <text x="312" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">10 classes</text>
    <rect x="295" y="315" width="35" height="2" rx="1" fill="#ffffff" opacity="0.7"/>
    <rect x="295" y="320" width="35" height="2" rx="1" fill="#ffffff" opacity="0.5"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-right" style="animation-delay: 0.8s">
    <rect x="20" y="340" width="380" height="50" rx="6" fill="white" opacity="0.8" filter="url(#shadow)"/>
    <text x="30" y="358" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2d3436">Key:</text>
    <text x="55" y="358" font-family="Arial, sans-serif" font-size="9" fill="#636e72">Conv=Feature extraction</text>
    <text x="155" y="358" font-family="Arial, sans-serif" font-size="9" fill="#636e72">Pool=Reduce size</text>
    <text x="235" y="358" font-family="Arial, sans-serif" font-size="9" fill="#636e72">FC=Classify</text>
    <text x="295" y="358" font-family="Arial, sans-serif" font-size="9" fill="#636e72">ReLU=Non-linearity</text>
  </g>
</svg>