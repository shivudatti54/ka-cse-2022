<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="gaussian-processes">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="uncertaintyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="posteriorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kernelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 500; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2d3748; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #4a5568; }
    .formula { font-family: 'Times New Roman', serif; font-size: 12px; fill: #2d3748; font-style: italic; }
    .box-title { font-family: Arial, sans-serif; font-size: 12px; fill: #fff; font-weight: bold; }
    .data-point { animation: pulse 2s ease-in-out infinite; }
    .uncertainty-band { animation: fadeIn 1.5s ease-out forwards; }
    .posterior-line { animation: drawLine 2s ease-out forwards; stroke-dasharray: 500; }
    .prior-line { animation: drawLine 2s ease-out 0.5s forwards; stroke-dasharray: 500; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Gaussian Processes</text>
  
  <!-- Section 1: GP Definition Box -->
  <g class="slide-in" style="animation-delay: 0.2s" data-narration="GP Definition: A collection of random variables where any finite subset follows a multivariate Gaussian distribution">
    <rect x="10" y="50" width="120" height="55" rx="6" fill="#667eea" opacity="0.9"/>
    <text x="70" y="68" text-anchor="middle" class="box-title">GP Definition</text>
    <text x="70" y="85" text-anchor="middle" class="formula" fill="#fff">f(x) ~ GP(m(x), k)</text>
    <text x="70" y="100" text-anchor="middle" class="label" fill="#e0e7ff" font-size="10">mean + kernel</text>
  </g>
  
  <!-- Arrow from Definition to Main -->
  <path d="M135 77 L170 77" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- Section 2: Main Visualization - GP Regression -->
  <g data-narration="GP Regression: Shows prior distribution (dashed) and posterior after observing data points (solid) with uncertainty bands">
    <rect x="165" y="50" width="245" height="180" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="287" y="70" text-anchor="middle" class="label" font-weight="bold">GP Regression</text>
    
    <!-- Axes -->
    <line x1="185" y1="200" x2="390" y2="200" stroke="#cbd5e0" stroke-width="1"/>
    <line x1="185" y1="70" x2="185" y2="200" stroke="#cbd5e0" stroke-width="1"/>
    <text x="185" y="215" class="label" font-size="10">x</text>
    <text x="175" y="135" class="label" font-size="10" transform="rotate(-90,175,135)">f(x)</text>
    
    <!-- Uncertainty Band (Posterior) -->
    <path d="M185 140 Q250 120 287 145 Q330 165 390 130 L390 180 Q330 210 287 175 Q250 195 185 160 Z" 
          fill="url(#uncertaintyGradient)" class="uncertainty-band" opacity="0.7"/>
    
    <!-- Prior Mean Line (dashed) -->
    <path d="M185 150 Q250 130 287 155 Q330 175 390 140" 
          stroke="#a0aec0" stroke-width="2" stroke-dasharray="8,4" fill="none" class="prior-line"/>
    <text x="395" y="142" class="label" font-size="9" fill="#a0aec0">prior</text>
    
    <!-- Posterior Mean Line -->
    <path d="M185 145 Q250 110 287 140 Q330 165 390 125" 
          stroke="url(#posteriorGradient)" stroke-width="3" fill="none" class="posterior-line"/>
    <text x="395" y="127" class="label" font-size="9" fill="#11998e">posterior</text>
    
    <!-- Training Points -->
    <circle cx="220" cy="170" r="5" fill="#e53e3e" class="data-point"/>
    <circle cx="287" cy="145" r="5" fill="#e53e3e" class="data-point" style="animation-delay: 0.3s"/>
    <circle cx="340" cy="160" r="5" fill="#e53e3e" class="data-point" style="animation-delay: 0.6s"/>
  </g>
  
  <!-- Section 3: Kernel Visualization -->
  <g class="slide-in" style="animation-delay: 0.4s" data-narration="RBF Kernel: Measures similarity between points, high values for close points, low for distant points">
    <rect x="10" y="115" width="145" height="120" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="82" y="135" text-anchor="middle" class="label" font-weight="bold">RBF Kernel</text>
    
    <!-- Kernel Heatmap -->
    <rect x="20" y="145" width="60" height="60" fill="url(#kernelGradient)" opacity="0.7"/>
    <circle cx="50" cy="175" r="25" fill="#667eea" opacity="0.3"/>
    <circle cx="50" cy="175" r="18" fill="#667eea" opacity="0.5"/>
    <circle cx="50" cy="175" r="10" fill="#667eea" opacity="0.8"/>
    <circle cx="50" cy="175" r="4" fill="#fff"/>
    
    <!-- Formula -->
    <text x="95" y="160" class="formula" font-size="10">k(x,x') =</text>
    <text x="95" y="175" class="formula" font-size="10">exp(-‖x-x'‖²</text>
    <text x="95" y="188" class="formula" font-size="10">/ 2ℓ²)</text>
    
    <!-- Length scale indicator -->
    <line x1="90" y1="215" x2="125" y2="215" stroke="#764ba2" stroke-width="2"/>
    <polygon points="90,215 95,210 95,220" fill="#764ba2"/>
    <polygon points="125,215 120,210 120,220" fill="#764ba2"/>
    <text x="107" y="230" text-anchor="middle" class="label" font-size="9" fill="#764ba2">length scale ℓ</text>
  </g>
  
  <!-- Section 4: Posterior Formula -->
  <g class="slide-in" style="animation-delay: 0.6s" data-narration="Posterior Predictive: Mean = K*_XX(K_XX + σ²I)⁻¹y, Covariance = K**_** - K*_XX(K_XX + σ²I)⁻¹K*_X*">
    <rect x="165" y="240" width="245" height="70" rx="6" fill="#11998e" opacity="0.85"/>
    <text x="287" y="260" text-anchor="middle" class="box-title" fill="#fff">Posterior Predictive</text>
    <text x="287" y="280" class="formula" fill="#fff" font-size="11">μ* = K₊ᵀ (K + σ²I)⁻¹ y</text>
    <text x="287" y="298" class="formula" fill="#fff" font-size="11">Σ* = K** - K₊ᵀ (K + σ²I)⁻¹ K₊</text>
  </g>
  
  <!-- Section 5: Key Concepts -->
  <g data-narration="Key advantages of Gaussian Processes: Non-parametric flexibility, uncertainty quantification, and kernel-based feature spaces">
    <rect x="10" y="245" width="145" height="85" rx="6" fill="#f687b3" opacity="0.85"/>
    <text x="82" y="265" text-anchor="middle" class="box-title" fill="#fff">Key Advantages</text>
    <circle cx="25" cy="290" r="4" fill="#fff"/>
    <text x="35" y="294" class="label" fill="#fff" font-size="11">Non-parametric</text>
    <circle cx="25" cy="310" r="4" fill="#fff"/>
    <text x="35" y="314" class="label" fill="#fff" font-size="11">Uncertainty</text>
    <circle cx="25" cy="275" r="4" fill="#fff"/>
    <text x="35" y="279" class="label" fill="#fff" font-size="11">Flexible kernels</text>
  </g>
  
  <!-- Arrow connecting Kernel to Regression -->
  <path d="M160 175 L165 175" stroke="#667eea" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Section 6: Applications -->
  <g class="slide-in" style="animation-delay: 0.8s" data-narration="Applications: Robotics, geostatistics, Bayesian optimization, and hyperparameter tuning">
    <rect x="10" y="340" width="145" height="45" rx="6" fill="#ed8936" opacity="0.85"/>
    <text x="82" y="360" text-anchor="middle" class="box-title" fill="#fff">Applications</text>
    <text x="82" y="378" class="label" fill="#fff" font-size="10">Robotics • Bayesian Opt • ML</text>
  </g>
  
  <!-- Arrow from Regression to Applications -->
  <path d="M287 235 L287 245 L287 340 L160 340" stroke="#667eea" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4,2"/>
  
  <!-- Decorative elements -->
  <circle cx="410" cy="380" r="30" fill="#667eea" opacity="0.1"/>
  <circle cx="400" cy="370" r="20" fill="#11998e" opacity="0.1"/>
  
  <!-- Legend for data points -->
  <g transform="translate(330, 215)">
    <circle cx="0" cy="0" r="4" fill="#e53e3e"/>
    <text x="8" y="4" class="label" font-size="9">Training data</text>
  </g>
</svg>