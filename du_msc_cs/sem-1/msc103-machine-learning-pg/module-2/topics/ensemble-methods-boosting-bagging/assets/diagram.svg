<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="ensemble-methods-boosting-bagging">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4eaf5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baggingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boostingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #fff; }
    .box-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #3498db; stroke-width: 2; stroke-dasharray: 5,3; animation: drawArrow 1s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title Section -->
  <g class="fade-in">
    <text x="210" y="28" text-anchor="middle" class="title">Ensemble Methods</text>
    <text x="210" y="46" text-anchor="middle" class="detail">Boosting &amp; Bagging</text>
  </g>
  
  <!-- Bagging Section (Left) -->
  <g class="slide-left" data-narration="Bagging: Bootstrap Aggregating creates multiple subsets via bootstrap sampling and trains base learners in parallel">
    <rect x="15" y="65" width="185" height="150" rx="8" fill="url(#baggingGrad)" filter="url(#shadow)" />
    <text x="108" y="82" text-anchor="middle" class="section-title">BAGGING</text>
    <text x="108" y="100" text-anchor="middle" class="detail">Parallel Training</text>
    
    <!-- Bootstrap samples -->
    <rect x="25" y="110" width="35" height="25" rx="3" fill="#fff" stroke="#27ae60" stroke-width="1" />
    <text x="42" y="127" text-anchor="middle" class="detail" font-size="9">S₁</text>
    
    <rect x="65" y="110" width="35" height="25" rx="3" fill="#fff" stroke="#27ae60" stroke-width="1" />
    <text x="82" y="127" text-anchor="middle" class="detail" font-size="9">S₂</text>
    
    <rect x="105" y="110" width="35" height="25" rx="3" fill="#fff" stroke="#27ae60" stroke-width="1" />
    <text x="122" y="127" text-anchor="middle" class="detail" font-size="9">S₃</text>
    
    <rect x="145" y="110" width="35" height="25" rx="3" fill="#fff" stroke="#27ae60" stroke-width="1" />
    <text x="162" y="127" text-anchor="middle" class="detail" font-size="9">S₄</text>
    
    <!-- Decision trees -->
    <line x1="42" y1="135" x2="42" y2="155" stroke="#2c3e50" stroke-width="1.5" />
    <line x1="82" y1="135" x2="82" y2="155" stroke="#2c3e50" stroke-width="1.5" />
    <line x1="122" y1="135" x2="122" y2="155" stroke="#2c3e50" stroke-width="1.5" />
    <line x1="162" y1="135" x2="162" y2="155" stroke="#2c3e50" stroke-width="1.5" />
    
    <circle cx="42" cy="155" r="6" fill="#27ae60" />
    <circle cx="82" cy="155" r="6" fill="#27ae60" />
    <circle cx="122" cy="155" r="6" fill="#27ae60" />
    <circle cx="162" cy="155" r="6" fill="#27ae60" />
    
    <text x="42" y="158" text-anchor="middle" class="detail" font-size="8" fill="#fff">T₁</text>
    <text x="82" y="158" text-anchor="middle" class="detail" font-size="8" fill="#fff">T₂</text>
    <text x="122" y="158" text-anchor="middle" class="detail" font-size="8" fill="#fff">T₃</text>
    <text x="162" y="158" text-anchor="middle" class="detail" font-size="8" fill="#fff">T₄</text>
    
    <!-- Voting arrow -->
    <path d="M 107 168 L 107 185" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="108" y="180" text-anchor="middle" class="detail" font-size="9">Vote</text>
  </g>
  
  <!-- Boosting Section (Right) -->
  <g class="slide-right" data-narration="Boosting: Sequentially builds models that correct predecessors' errors with weighted training instances">
    <rect x="220" y="65" width="185" height="150" rx="8" fill="url(#boostingGrad)" filter="url(#shadow)" />
    <text x="312" y="82" text-anchor="middle" class="section-title">BOOSTING</text>
    <text x="312" y="100" text-anchor="middle" class="detail">Sequential Correction</text>
    
    <!-- Sequential training boxes -->
    <rect x="230" y="110" width="50" height="20" rx="3" fill="#fff" stroke="#e67e22" stroke-width="1" />
    <text x="255" y="124" text-anchor="middle" class="detail" font-size="9">Model 1</text>
    
    <rect x="290" y="110" width="50" height="20" rx="3" fill="#fff" stroke="#e67e22" stroke-width="1" />
    <text x="315" y="124" text-anchor="middle" class="detail" font-size="9">Model 2</text>
    
    <rect x="350" y="110" width="50" height="20" rx="3" fill="#fff" stroke="#e67e22" stroke-width="1" />
    <text x="375" y="124" text-anchor="middle" class="detail" font-size="9">Model 3</text>
    
    <!-- Arrows between models -->
    <path d="M 280 120 L 290 120" stroke="#d35400" stroke-width="1.5" />
    <path d="M 340 120 L 350 120" stroke="#d35400" stroke-width="1.5" />
    <text x="305" y="115" text-anchor="middle" class="detail" font-size="8" fill="#d35400">error</text>
    
    <!-- Weighted instances visualization -->
    <circle cx="255" cy="155" r="10" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,2" />
    <circle cx="315" cy="155" r="8" fill="none" stroke="#e74c3c" stroke-width="1.5" />
    <circle cx="375" cy="155" r="6" fill="none" stroke="#e74c3c" stroke-width="1" />
    
    <text x="255" y="175" text-anchor="middle" class="detail" font-size="9">w₁</text>
    <text x="315" y="175" text-anchor="middle" class="detail" font-size="9">w₂</text>
    <text x="375" y="175" text-anchor="middle" class="detail" font-size="9">w₃</text>
  </g>
  
  <!-- Aggregation/Output Section -->
  <g class="slide-up" data-narration="Final prediction combines outputs through majority voting for classification or averaging for regression">
    <rect x="140" y="225" width="140" height="45" rx="8" fill="url(#outputGrad)" filter="url(#shadow)" />
    <text x="210" y="245" text-anchor="middle" class="label" fill="#fff">Final Prediction</text>
    <text x="210" y="260" text-anchor="middle" class="detail" fill="#e8e8e8">Voting / Averaging</text>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g class="fade-in" data-narration="Key theoretical concepts: Bagging reduces variance while boosting reduces bias">
    <!-- Bagging Concept -->
    <rect x="15" y="285" width="90" height="50" rx="5" fill="#fff" stroke="#88d8b0" stroke-width="2" />
    <text x="60" y="300" text-anchor="middle" class="box-title">Bagging</text>
    <text x="60" y="315" text-anchor="middle" class="detail">Reduces</text>
    <text x="60" y="327" text-anchor="middle" class="detail" font-weight="bold" fill="#27ae60">Variance</text>
    
    <!-- Boosting Concept -->
    <rect x="115" y="285" width="90" height="50" rx="5" fill="#fff" stroke="#ffcc80" stroke-width="2" />
    <text x="160" y="300" text-anchor="middle" class="box-title">Boosting</text>
    <text x="160" y="315" text-anchor="middle" class="detail">Reduces</text>
    <text x="160" y="327" text-anchor="middle" class="detail" font-weight="bold" fill="#e67e22">Bias</text>
    
    <!-- Algorithms -->
    <rect x="215" y="285" width="95" height="50" rx="5" fill="#fff" stroke="#a29bfe" stroke-width="2" />
    <text x="262" y="300" text-anchor="middle" class="box-title">Algorithms</text>
    <text x="262" y="315" text-anchor="middle" class="detail">Random Forest</text>
    <text x="262" y="327" text-anchor="middle" class="detail">XGBoost, AdaBoost</text>
  </g>
  
  <!-- Bottom info -->
  <g class="fade-in" data-narration="Applications in fraud detection, recommendation systems, and competitive data science">
    <rect x="15" y="345" width="390" height="40" rx="5" fill="#f8f9fa" stroke="#dfe6e9" stroke-width="1" />
    <text x="30" y="362" class="detail" font-size="10">📊 Applications: Kaggle, Fraud Detection, Recommendations</text>
    <text x="30" y="377" class="detail" font-size="10">🎯 PAC Learning | Gradient Boosting | Stacking &amp; Blending</text>
  </g>
  
  <!-- Connecting arrows from sections to output -->
  <path d="M 107 215 L 140 238" stroke="#3498db" stroke-width="2" stroke-dasharray="4,3" fill="none" class="pulse" />
  <path d="M 312 215 L 280 238" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,3" fill="none" class="pulse" />
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="3" fill="#e74c3c" class="pulse" />
  <circle cx="390" cy="380" r="3" fill="#3498db" class="pulse" />
</svg>