<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="kernel-methods-svm">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hyperplaneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a5acd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#483d8b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      @keyframes dash {
        to { stroke-dashoffset: 0; }
      }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #34495e; }
      .label-large { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
      .formula { font-family: 'Courier New', monospace; font-size: 11px; fill: #5d6d7e; }
      .section-box { fill: #ffffff; stroke: #bdc3c7; stroke-width: 1; rx: 8; }
      .fade-in { animation: fadeIn 1s ease-out forwards; }
      .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
      .slide-right { animation: slideInRight 0.8s ease-out forwards; }
      .slide-up { animation: slideInUp 0.8s ease-out forwards; }
      .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
      .dashed-line { stroke-dasharray: 8,4; animation: dash 1.5s linear infinite; }
      .delay-1 { animation-delay: 0.2s; }
      .delay-2 { animation-delay: 0.4s; }
      .delay-3 { animation-delay: 0.6s; }
      .delay-4 { animation-delay: 0.8s; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">Kernel Methods &amp; SVM</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#6a5acd" stroke-width="2" class="fade-in delay-1"/>
  
  <!-- Main SVM Diagram Section -->
  <g data-narration="The SVM finds the optimal hyperplane that maximizes the margin between two classes of data points">
    <!-- Background for main diagram -->
    <rect x="30" y="60" width="200" height="180" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" rx="6" filter="url(#shadow)" class="slide-up"/>
    
    <!-- Coordinate grid -->
    <g opacity="0.3">
      <line x1="40" y1="100" x2="220" y2="100" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="40" y1="140" x2="220" y2="140" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="40" y1="180" x2="220" y2="180" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="80" y1="70" x2="80" y2="230" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="130" y1="70" x2="130" y2="230" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="180" y1="70" x2="180" y2="230" stroke="#bdc3c7" stroke-width="1"/>
    </g>
    
    <!-- Margin lines -->
    <line x1="40" y1="195" x2="220" y2="115" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" class="fade-in delay-2"/>
    <line x1="40" y1="105" x2="220" y2="185" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" class="fade-in delay-2"/>
    
    <!-- Hyperplane -->
    <line x1="35" y1="150" x2="225" y2="150" stroke="url(#hyperplaneGrad)" stroke-width="4" class="slide-left"/>
    
    <!-- Data points - Class A (blue circles) -->
    <circle cx="70" cy="200" r="8" fill="#3498db" stroke="#2980b9" stroke-width="2" class="pulse"/>
    <circle cx="90" cy="85" r="8" fill="#3498db" stroke="#2980b9" stroke-width="2" class="pulse"/>
    <circle cx="180" cy="90" r="8" fill="#3498db" stroke="#2980b9" stroke-width="2" class="pulse"/>
    
    <!-- Data points - Class B (red squares) -->
    <rect x="160" y="192" width="16" height="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2" class="pulse"/>
    <rect x="85" y="157" width="16" height="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2" class="pulse"/>
    <rect x="55" y="112" width="16" height="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2" class="pulse"/>
    
    <!-- Support vectors (highlighted) -->
    <circle cx="70" cy="200" r="12" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="3,2" class="pulse"/>
    <circle cx="180" cy="90" r="12" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="3,2" class="pulse"/>
    
    <!-- Labels -->
    <text x="130" y="155" text-anchor="middle" class="label-large" fill="#2c3e50">Hyperplane</text>
    <text x="130" y="225" text-anchor="middle" class="label">w·x + b = 0</text>
  </g>
  
  <!-- Margin Annotation -->
  <g data-narration="Support vectors are the critical data points that lie on the margin boundaries">
    <text x="125" y="88" text-anchor="middle" class="label" fill="#e74c3c">Margin +1</text>
    <text x="125" y="215" text-anchor="middle" class="label" fill="#e74c3c">Margin -1</text>
    <text x="240" y="150" text-anchor="start" class="label-large" fill="#f39c12">Support Vectors</text>
    <line x1="220" y1="150" x2="235" y2="150" stroke="#f39c12" stroke-width="2" class="slide-right"/>
  </g>
  
  <!-- Kernel Types Section -->
  <g data-narration="Different kernel functions map data to higher dimensions enabling non-linear classification">
    <rect x="250" y="60" width="155" height="180" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" rx="6" filter="url(#shadow)" class="slide-up delay-2"/>
    <text x="327" y="78" text-anchor="middle" class="label-large">Kernel Functions</text>
    
    <!-- RBF Kernel -->
    <g class="fade-in delay-3">
      <text x="265" y="98" class="label-large" fill="#8e44ad">RBF (Gaussian)</text>
      <text x="265" y="114" class="formula">K(x,y)=exp(-γ‖x-y‖²)</text>
    </g>
    
    <!-- Polynomial Kernel -->
    <g class="fade-in delay-3">
      <text x="265" y="144" class="label-large" fill="#16a085">Polynomial</text>
      <text x="265" y="160" class="formula">K(x,y) = (x·y + c)ᵈ</text>
    </g>
    
    <!-- Linear Kernel -->
    <g class="fade-in delay-4">
      <text x="265" y="190" class="label-large" fill="#d35400">Linear</text>
      <text x="265" y="206" class="formula">K(x,y) = x·y</text>
    </g>
    
    <!-- Sigmoid Kernel -->
    <g class="fade-in delay-4">
      <text x="265" y="230" class="label-large" fill="#2c3e50">Sigmoid</text>
      <text x="265" y="246" class="formula">K(x,y)=tanh(κx·y+θ)</text>
    </g>
  </g>
  
  <!-- Optimization Problem Section -->
  <g data-narration="The SVM optimization maximizes margin while minimizing classification errors through slack variables">
    <rect x="30" y="260" width="175" height="120" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" rx="6" filter="url(#shadow)" class="slide-up delay-3"/>
    <text x="117" y="280" text-anchor="middle" class="label-large">Optimization Problem</text>
    
    <!-- Hard Margin -->
    <g class="fade-in delay-4">
      <text x="45" y="302" class="label" fill="#27ae60">Hard-Margin:</text>
      <text x="45" y="318" class="formula">min ‖w‖²</text>
      <text x="45" y="332" class="formula">s.t. yᵢ(w·xᵢ+b)≥1</text>
    </g>
    
    <!-- Soft Margin -->
    <g class="fade-in delay-4">
      <text x="45" y="358" class="label" fill="#e67e22">Soft-Margin:</text>
      <text x="45" y="374" class="formula">min ‖w‖² + CΣξᵢ</text>
    </g>
  </g>
  
  <!-- Dual Formulation -->
  <g data-narration="The dual formulation reveals how kernel functions enable non-linear classification through feature space">
    <rect x="220" y="260" width="185" height="120" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" rx="6" filter="url(#shadow)" class="slide-up delay-3"/>
    <text x="312" y="280" text-anchor="middle" class="label-large">Dual Formulation</text>
    
    <g class="fade-in delay-4">
      <text x="235" y="305" class="formula">max Σαᵢ - ½ΣΣαᵢαⱼyᵢyⱼ</text>
      <text x="235" y="320" class="formula">K(xᵢ, xⱼ)</text>
      <text x="235" y="340" class="label" fill="#7f8c8d">Subject to: Σαᵢyᵢ = 0</text>
      <text x="235" y="358" class="label" fill="#7f8c8d">αᵢ ≥ 0</text>
    </g>
  </g>
  
  <!-- Key Insight Box -->
  <g data-narration="The kernel trick enables computing dot products in high-dimensional space without explicit transformation">
    <rect x="30" y="355" width="375" height="35" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="4" class="slide-up delay-4"/>
    <text x="217" y="372" text-anchor="middle" class="label" fill="#7d6608">
      <tspan font-weight="bold">Key Insight:</tspan> Kernel Trick — K(x,y) = φ(x)·φ(y) enables implicit high-dimensional mapping
    </text>
  </g>
  
  <!-- Arrow showing kernel trick concept -->
  <g class="fade-in delay-4">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#6a5acd"/>
      </marker>
    </defs>
    <line x1="80" y1="55" x2="80" y2="45" stroke="#6a5acd" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="80" y="38" text-anchor="middle" class="label" fill="#6a5acd">Feature Space</text>
  </g>
</svg>