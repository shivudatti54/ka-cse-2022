<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="dimensionality-reduction-manifold">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .section-2 { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.5s forwards; opacity: 0; }
    .concept-box { animation: slideInUp 0.5s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .float-anim { animation: float 3s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2d3748" class="title">Dimensionality Reduction</text>
  <text x="210" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#4a5568" class="title">&amp; Manifold Learning</text>
  
  <!-- Section 1: High-D to Low-D Transformation (Left) -->
  <g class="section-1" data-narration="High-dimensional data points in original space being projected to lower dimensions">
    <rect x="15" y="70" width="130" height="130" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="80" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3748">High-D Space</text>
    <text x="80" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#718096">(e.g., 784 dims for MNIST)</text>
    
    <!-- High-D data points -->
    <circle cx="45" cy="130" r="5" fill="#667eea" class="pulse-anim"/>
    <circle cx="65" cy="145" r="5" fill="#764ba2" class="pulse-anim"/>
    <circle cx="55" cy="160" r="5" fill="#f093fb" class="pulse-anim"/>
    <circle cx="80" cy="135" r="5" fill="#11998e" class="pulse-anim"/>
    <circle cx="95" cy="155" r="5" fill="#4facfe" class="pulse-anim"/>
    <circle cx="110" cy="140" r="5" fill="#f5576c" class="pulse-anim"/>
    <circle cx="75" cy="175" r="5" fill="#38ef7d" class="pulse-anim"/>
    <circle cx="100" cy="175" r="5" fill="#00f2fe" class="pulse-anim"/>
    
    <!-- Dimensionality indicator -->
    <text x="80" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0aec0">d = n dimensions</text>
  </g>
  
  <!-- Arrow -->
  <g class="section-2" data-narration="Transformation process reducing dimensionality while preserving structure">
    <path d="M155 135 L185 135" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="185,135 178,131 178,139" fill="#4a5568"/>
    <text x="170" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Reduce</text>
  </g>
  
  <!-- Section 2: Low-D Representation (Right) -->
  <g class="section-2" data-narration="Low-dimensional embedding where similar points cluster together">
    <rect x="195" y="70" width="130" height="130" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="260" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3748">Low-D Embedding</text>
    <text x="260" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#718096">(2D/3D visualization)</text>
    
    <!-- Low-D projected points (clusters visible) -->
    <circle cx="230" cy="140" r="6" fill="#667eea" class="float-anim"/>
    <circle cx="245" cy="155" r="6" fill="#667eea" class="float-anim"/>
    <circle cx="235" cy="165" r="6" fill="#667eea" class="float-anim"/>
    
    <circle cx="275" cy="145" r="6" fill="#f5576c" class="float-anim"/>
    <circle cx="290" cy="160" r="6" fill="#f5576c" class="float-anim"/>
    
    <circle cx="255" cy="180" r="6" fill="#38ef7d" class="float-anim"/>
    <circle cx="270" cy="185" r="6" fill="#38ef7d" class="float-anim"/>
    <circle cx="285" cy="175" r="6" fill="#38ef7d" class="float-anim"/>
    
    <text x="260" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0aec0">d = 2 or 3 dimensions</text>
  </g>
  
  <!-- Section 3: Method Comparison Boxes -->
  <g class="section-3" data-narration="Various dimensionality reduction methods from linear PCA to non-linear manifold learning techniques">
    <rect x="15" y="215" width="88" height="55" rx="5" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="59" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">PCA</text>
    <text x="59" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">Linear</text>
    <text x="59" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.8)">Max variance</text>
    
    <rect x="108" y="215" width="88" height="55" rx="5" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="152" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">t-SNE</text>
    <text x="152" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">Non-linear</text>
    <text x="152" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.8)">Local structure</text>
    
    <rect x="201" y="215" width="88" height="55" rx="5" fill="url(#orangeGradient)" filter="url(#shadow)"/>
    <text x="245" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">UMAP</text>
    <text x="245" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">Topology</text>
    <text x="245" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.8)">Riemannian</text>
    
    <rect x="294" y="215" width="88" height="55" rx="5" fill="url(#purpleGradient)" filter="url(#shadow)"/>
    <text x="338" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Autoencoder</text>
    <text x="338" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">Deep Learning</text>
    <text x="338" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.8)">Bottleneck</text>
  </g>
  
  <!-- Section 4: Manifold Hypothesis Illustration -->
  <g class="section-4" data-narration="Manifold hypothesis - high-dimensional data lies on a low-dimensional curved manifold within the ambient space">
    <rect x="15" y="285" width="180" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="105" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3748">Manifold Hypothesis</text>
    
    <!-- 3D representation of manifold -->
    <ellipse cx="70" cy="350" rx="35" ry="15" fill="none" stroke="#667eea" stroke-width="2" stroke-dasharray="4,2"/>
    <ellipse cx="140" cy="350" rx="35" ry="15" fill="none" stroke="#764ba2" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Curve representing manifold -->
    <path d="M50 355 Q80 320 105 350 Q130 380 160 345" stroke="#f093fb" stroke-width="3" fill="none" class="float-anim"/>
    
    <!-- Data points on manifold -->
    <circle cx="65" cy="345" r="4" fill="#11998e"/>
    <circle cx="85" cy="335" r="4" fill="#38ef7d"/>
    <circle cx="105" cy="350" r="4" fill="#4facfe"/>
    <circle cx="125" cy="340" r="4" fill="#f5576c"/>
    <circle cx="145" cy="355" r="4" fill="#667eea"/>
    
    <text x="105" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#718096">Data lies on low-D manifold</text>
  </g>
  
  <!-- Additional Methods Box -->
  <g class="section-4" data-narration="Additional manifold learning methods preserving different types of structure">
    <rect x="205" y="285" width="180" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <text x="295" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d3748">Other Methods</text>
    
    <text x="220" y="328" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">• <tspan font-weight="bold">Isomap</tspan>: Geodesic distances</text>
    <text x="220" y="345" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">• <tspan font-weight="bold">LLE</tspan>: Neighborhood preservation</text>
    <text x="220" y="362" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">• <tspan font-weight="bold">Kernel PCA</tspan>: Non-linear kernel</text>
    <text x="220" y="379" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">• <tspan font-weight="bold">LE</tspan>: Laplacian eigenmaps</text>
  </g>
  
  <!-- Connection arrows between sections -->
  <g class="section-3" data-narration="Shows the relationship between high-dimensional input and learned low-dimensional representation">
    <path d="M80 200 Q80 215 80 215" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M260 200 Q260 215 260 215" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Bottom annotation -->
  <g class="section-4">
    <text x="210" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a0aec0">Applications: MNIST • scRNA-seq • Generative AI • Sensor Data</text>
  </g>
</svg>