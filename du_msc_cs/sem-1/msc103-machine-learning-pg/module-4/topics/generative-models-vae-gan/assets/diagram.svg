<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="generative-models-vae-gan">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vaeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ganGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e8f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ebd1e8;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .section-box { animation: fadeIn 0.6s ease-out forwards; }
    .title { animation: fadeIn 0.5s ease-out forwards; }
    .vae-arrow { animation: slideInLeft 0.5s ease-out 0.3s forwards; opacity: 0; }
    .gan-arrow { animation: slideInRight 0.5s ease-out 0.3s forwards; opacity: 0; }
    .pulse-node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .keybox { animation: slideUp 0.5s ease-out 0.5s forwards; opacity: 0; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .label { font-size: 13px; font-weight: 600; }
    .detail { font-size: 11px; }
    .title-text { font-size: 18px; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" fill="#2c3e50">Generative Models: VAEs &amp; GANs</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#3498db" stroke-width="2" stroke-linecap="round" class="title"/>
  
  <!-- VAE Section (Left) -->
  <g class="section-box" data-narration="VAE Architecture: Encoder maps input to latent distribution parameters (μ, σ), sampling creates latent vector, decoder reconstructs data">
    <rect x="15" y="55" width="180" height="145" rx="8" fill="url(#vaeGradient)" filter="url(#shadow)"/>
    <text x="105" y="75" text-anchor="middle" class="label" fill="#2980b9">VAE Architecture</text>
    
    <!-- Encoder -->
    <rect x="25" y="85" width="60" height="30" rx="4" fill="#3498db" opacity="0.8"/>
    <text x="55" y="105" text-anchor="middle" fill="white" font-size="11">Encoder</text>
    <text x="55" y="165" text-anchor="middle" fill="#555" font-size="9">q(z|x)</text>
    
    <!-- Latent Space -->
    <rect x="95" y="95" width="30" height="30" rx="4" fill="#e74c3c" class="pulse-node"/>
    <text x="110" y="115" text-anchor="middle" fill="white" font-size="9">z</text>
    <text x="110" y="140" text-anchor="middle" fill="#555" font-size="8">μ, σ</text>
    
    <!-- Sampling -->
    <circle cx="110" cy="155" r="6" fill="#f39c12" class="pulse-node"/>
    <text x="110" y="158" text-anchor="middle" fill="white" font-size="7">⨉</text>
    
    <!-- Decoder -->
    <rect x="135" y="85" width="50" height="30" rx="4" fill="#9b59b6" opacity="0.8"/>
    <text x="160" y="105" text-anchor="middle" fill="white" font-size="11">Decoder</text>
    <text x="160" y="165" text-anchor="middle" fill="#555" font-size="9">p(x|z)</text>
    
    <!-- Output -->
    <rect x="135" y="125" width="50" height="25" rx="4" fill="#27ae60" opacity="0.8"/>
    <text x="160" y="142" text-anchor="middle" fill="white" font-size="10">Output</text>
    
    <!-- Arrows -->
    <path d="M85 100 L95 110" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="vae-arrow"/>
    <path d="M125 100 L135 110" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="vae-arrow"/>
    <path d="M160 115 L160 125" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="vae-arrow"/>
  </g>
  
  <!-- GAN Section (Right) -->
  <g class="section-box" data-narration="GAN Architecture: Generator creates samples from noise, Discriminator distinguishes real from fake in adversarial minimax game">
    <rect x="225" y="55" width="180" height="145" rx="8" fill="url(#ganGradient)" filter="url(#shadow)"/>
    <text x="315" y="75" text-anchor="middle" class="label" fill="#8e44ad">GAN Architecture</text>
    
    <!-- Noise -->
    <rect x="235" y="85" width="45" height="25" rx="4" fill="#95a5a6"/>
    <text x="257" y="102" text-anchor="middle" fill="white" font-size="10">Noise z</text>
    
    <!-- Generator -->
    <rect x="290" y="85" width="55" height="30" rx="4" fill="#e67e22" opacity="0.9"/>
    <text x="317" y="105" text-anchor="middle" fill="white" font-size="11">Generator</text>
    <text x="317" y="130" text-anchor="middle" fill="#555" font-size="9">G(z)</text>
    
    <!-- Fake Data Arrow -->
    <path d="M317 115 L317 145" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="gan-arrow"/>
    
    <!-- Generated Sample -->
    <rect x="290" y="150" width="55" height="25" rx="4" fill="#f39c12" class="pulse-node"/>
    <text x="317" y="167" text-anchor="middle" fill="white" font-size="9">Fake Data</text>
    
    <!-- Discriminator -->
    <rect x="350" y="85" width="45" height="30" rx="4" fill="#16a085" opacity="0.9"/>
    <text x="372" y="105" text-anchor="middle" fill="white" font-size="10">Discrim.</text>
    <text x="372" y="130" text-anchor="middle" fill="#555" font-size="9">D(x)</text>
    
    <!-- Real Data -->
    <rect x="350" y="150" width="45" height="25" rx="4" fill="#27ae60" opacity="0.9"/>
    <text x="372" y="167" text-anchor="middle" fill="white" font-size="9">Real</text>
    
    <!-- Arrows -->
    <path d="M280 97 L290 100" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="gan-arrow"/>
    <path d="M345 100 L350 97" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="gan-arrow"/>
    <path d="M317 175 L350 165" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" class="gan-arrow"/>
  </g>
  
  <!-- Key Concepts Boxes -->
  <g class="keybox" data-narration="Key optimization: VAE maximizes ELBO (Evidence Lower Bound) combining reconstruction quality and latent space regularization">
    <rect x="15" y="210" width="185" height="55" rx="6" fill="#fff9e6" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
    <text x="107" y="228" text-anchor="middle" class="label" fill="#d68910" font-size="11">VAE Objective (ELBO)</text>
    <text x="107" y="248" text-anchor="middle" fill="#555" font-size="9">ELBO = 𝔼[log p(x|z)] - KL(q||p)</text>
  </g>
  
  <g class="keybox" data-narration="Key optimization: GAN uses minimax game where Generator tries to fool Discriminator, Discriminator tries to distinguish real from fake">
    <rect x="220" y="210" width="185" height="55" rx="6" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1" filter="url(#shadow)"/>
    <text x="312" y="228" text-anchor="middle" class="label" fill="#16a085" font-size="11">GAN Minimax Game</text>
    <text x="312" y="248" text-anchor="middle" fill="#555" font-size="9">min_G max_D 𝔼[log D(x)] + 𝔼[log(1-D(G(z)))]</text>
  </g>
  
  <g class="keybox" data-narration="Practical challenges: VAEs suffer from posterior collapse, GANs face mode collapse where generator produces limited variety">
    <rect x="15" y="275" width="185" height="50" rx="6" fill="#fdeaea" stroke="#e74c3c" stroke-width="1" filter="url(#shadow)"/>
    <text x="107" y="293" text-anchor="middle" class="label" fill="#c0392b" font-size="11">Key Challenges</text>
    <text x="107" y="310" text-anchor="middle" fill="#555" font-size="9">VAE: Posterior collapse</text>
    <text x="107" y="322" text-anchor="middle" fill="#555" font-size="9">GAN: Mode collapse</text>
  </g>
  
  <g class="keybox" data-narration="Advanced variants: β-VAE for disentangled representations, WGAN with Wasserstein loss for stability, StyleGAN for high-quality images">
    <rect x="220" y="275" width="185" height="50" rx="6" fill="#f5eef8" stroke="#9b59b6" stroke-width="1" filter="url(#shadow)"/>
    <text x="312" y="293" text-anchor="middle" class="label" fill="#8e44ad" font-size="11">Advanced Variants</text>
    <text x="312" y="310" text-anchor="middle" fill="#555" font-size="9">β-VAE, WGAN, StyleGAN, VQ-GAN</text>
    <text x="312" y="322" text-anchor="middle" fill="#555" font-size="9">Hybrid architectures &amp; multimodal</text>
  </g>
  
  <!-- Applications Bar -->
  <rect x="15" y="335" width="390" height="50" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="210" y="352" text-anchor="middle" class="label" fill="#2c3e50" font-size="11">Applications</text>
  <text x="210" y="368" text-anchor="middle" fill="#555" font-size="9">Image Synthesis (StyleGAN) • Drug Discovery • Audio Generation • Data Augmentation</text>
</svg>