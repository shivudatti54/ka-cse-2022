<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="clustering-em-algorithm">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eStepGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95d5b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mStepGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0b8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8a4d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paramGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce38a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8d486;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a6c7d"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Georgia, serif; font-size: 22px; fill: #2c3e50; font-weight: bold; }
    .section-title { font-family: Arial, sans-serif; font-size: 16px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .formula { font-family: 'Times New Roman', serif; font-size: 12px; fill: #2c3e50; font-style: italic; }
    .box { rx: 8; ry: 8; stroke: #5a6c7d; stroke-width: 1.5; }
    .arrow { stroke: #5a6c7d; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed-arrow { stroke: #7f8c8d; stroke-width: 1.5; fill: none; stroke-dasharray: 4,3; marker-end: url(#arrowhead); }
    
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .e-step-anim { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .m-step-anim { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .param-box-anim { animation: fadeIn 0.5s ease-out 0.9s forwards; opacity: 0; }
    .arrow-anim { animation: drawLine 0.5s ease-out 1.2s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .cycle-arrow { animation: drawLine 0.4s ease-out forwards; stroke-dasharray: 60; stroke-dashoffset: 60; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    
    text { opacity: 0; }
    .title-anim text { opacity: 1; }
    .e-step-anim text { opacity: 1; }
    .m-step-anim text { opacity: 1; }
    .param-box-anim text { opacity: 1; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="0" ry="0"/>
  
  <!-- Title -->
  <g class="title-anim">
    <text x="210" y="35" text-anchor="middle" class="title">EM Algorithm for Clustering</text>
    <text x="210" y="55" text-anchor="middle" class="detail">Gaussian Mixture Models (GMM)</text>
  </g>
  
  <!-- Parameters Box (top center) -->
  <g class="param-box-anim" transform="translate(120, 70)" data-narration="GMM Parameters: mixing coefficients π_k, means μ_k, and covariances Σ_k define the model">
    <rect width="180" height="55" fill="url(#paramGradient)" class="box"/>
    <text x="90" y="20" text-anchor="middle" class="section-title">GMM Parameters</text>
    <text x="15" y="40" class="detail">π_k: mixing coeff</text>
    <text x="95" y="40" class="detail">μ_k: means</text>
    <text x="15" y="50" class="detail">Σ_k: covariance</text>
    <text x="105" y="50" class="detail">γ(z): responsibilities</text>
  </g>
  
  <!-- E-Step Box -->
  <g class="e-step-anim" transform="translate(30, 145)" data-narration="E-Step: Compute posterior probabilities of latent variables given current parameters">
    <rect width="155" height="130" fill="url(#eStepGradient)" class="box"/>
    <text x="77" y="25" text-anchor="middle" class="section-title">E-Step</text>
    <text x="77" y="45" text-anchor="middle" class="detail">Expectation</text>
    <line x1="20" y1="52" x2="134" y2="52" stroke="#5a6c7d" stroke-width="0.5"/>
    <text x="10" y="70" class="label">Compute posterior:</text>
    <text x="10" y="88" class="formula">P(Z|X, θ⁰)</text>
    <text x="10" y="105" class="label">Calculate responsibilities:</text>
    <text x="10" y="120" class="formula">γ(z_nk) =</text>
    <text x="62" y="120" class="detail">π_k N(x|μ_k,Σ_k)</text>
    <text x="10" y="133" class="detail">Σ_j π_j N(x|μ_j,Σ_j)</text>
  </g>
  
  <!-- Arrow from Parameters to E-Step -->
  <path d="M 210 125 L 210 145" class="arrow" style="animation: drawLine 0.4s ease-out 1.1s forwards; stroke-dasharray: 20; stroke-dashoffset: 20;"/>
  
  <!-- M-Step Box -->
  <g class="m-step-anim" transform="translate(235, 145)" data-narration="M-Step: Maximize expected complete-data log-likelihood to update parameters">
    <rect width="155" height="130" fill="url(#mStepGradient)" class="box"/>
    <text x="77" y="25" text-anchor="middle" class="section-title">M-Step</text>
    <text x="77" y="45" text-anchor="middle" class="detail">Maximization</text>
    <line x1="20" y1="52" x2="134" y2="52" stroke="#5a6c7d" stroke-width="0.5"/>
    <text x="10" y="70" class="label">Maximize Q-function:</text>
    <text x="10" y="88" class="formula">θ¹ = argmax_θ Q(θ,θ⁰)</text>
    <text x="10" y="108" class="label">Update parameters:</text>
    <text x="10" y="125" class="detail">π_k, μ_k, Σ_k</text>
  </g>
  
  <!-- Arrow from E-Step to M-Step -->
  <path d="M 185 210 L 235 210" class="arrow cycle-arrow" style="animation-delay: 1.4s;"/>
  
  <!-- Arrow from M-Step back to Parameters (convergence loop) -->
  <g class="param-box-anim">
    <path d="M 312 275 L 312 310 Q 312 340 260 340 L 170 340 Q 120 340 120 310 L 120 125" class="dashed-arrow" style="animation: drawLine 0.6s ease-out 1.8s forwards; stroke-dasharray: 400; stroke-dashoffset: 400;"/>
  </g>
  
  <!-- Convergence Check -->
  <g class="param-box-anim" transform="translate(255, 290)" data-narration="Convergence check: Verify likelihood has converged or reached maximum iterations">
    <rect width="120" height="50" fill="#f8e8e8" rx="5" ry="5" stroke="#d48484" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" class="label">Convergence?</text>
    <text x="30" y="38" class="detail">Likelihood</text>
    <text x="80" y="38" class="detail" style="fill:#27ae60;">↑ Monotonic</text>
  </g>
  
  <!-- Arrow from M-Step to Convergence -->
  <path d="M 312 275 L 312 290" class="arrow" style="animation: drawLine 0.3s ease-out 1.6s forwards; stroke-dasharray: 15; stroke-dashoffset: 15;"/>
  
  <!-- Iteration Counter -->
  <g class="param-box-anim" transform="translate(30, 295)" data-narration="Iterate E and M steps until convergence criteria is met">
    <rect width="155" height="45" fill="#e8eef4" rx="5" ry="5" stroke="#a0b0c0" stroke-width="1"/>
    <text x="77" y="18" text-anchor="middle" class="label">Iteration Cycle</text>
    <text x="30" y="35" class="detail">t = 0, 1, 2, ...</text>
    <text x="110" y="35" class="detail">until</text>
    <text x="77" y="45" class="detail">convergence</text>
  </g>
  
  <!-- Example Data Points -->
  <g class="param-box-anim" transform="translate(255, 355)" data-narration="Example: 1D GMM with points {1,2,6,7}, initial π₁=π₂=0.5, μ₁=1, μ₂=6">
    <text x="60" y="0" text-anchor="middle" class="label">Example: 1D Data</text>
    <circle cx="15" cy="15" r="4" fill="#3498db" class="pulse-anim"/>
    <circle cx="35" cy="15" r="4" fill="#3498db" class="pulse-anim" style="animation-delay: 0.2s;"/>
    <circle cx="90" cy="15" r="4" fill="#e74c3c" class="pulse-anim" style="animation-delay: 0.4s;"/>
    <circle cx="110" cy="15" r="4" fill="#e74c3c" class="pulse-anim" style="animation-delay: 0.6s;"/>
    <text x="60" y="32" text-anchor="middle" class="detail">Data: {1,2,6,7}</text>
  </g>
  
  <!-- Arrow showing loop back -->
  <g class="param-box-anim">
    <text x="380" y="320" class="detail" style="fill:#7f8c8d;">Loop</text>
  </g>
  
  <!-- Initial parameters indicator -->
  <g class="title-anim">
    <text x="30" y="365" class="detail">Initialize: θ⁰ = {π, μ, Σ}</text>
    <text x="350" y="365" class="detail" style="text-anchor:end;">Output: Clusters</text>
  </g>
</svg>