<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="Byzantine-fault-tolerance" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="byzantineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes messageFlow {
      0% { opacity: 0; transform: translateX(-10px); }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateX(10px); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1e293b; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #475569; }
    .node-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    .phase-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #6366f1; }
    .concept-box { rx: 8; ry: 8; }
    .message-line { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrowhead); }
    .message-line-faulty { stroke: #f87171; stroke-width: 2; stroke-dasharray: 5,3; marker-end: url(#arrowhead); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .msg1 { animation: messageFlow 2s ease-in-out infinite; animation-delay: 0s; }
    .msg2 { animation: messageFlow 2s ease-in-out infinite; animation-delay: 0.6s; }
    .msg3 { animation: messageFlow 2s ease-in-out infinite; animation-delay: 1.2s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Byzantine Fault Tolerance</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- Key Concepts Box -->
  <g class="anim-slide" style="animation-delay: 0.2s;">
    <rect x="15" y="50" width="130" height="75" fill="white" stroke="#e2e8f0" stroke-width="1" class="concept-box" filter="url(#shadow)"/>
    <text x="25" y="68" class="label" font-weight="bold">Key Concepts</text>
    <text x="25" y="84" class="label">• 3f+1 nodes tolerate f faults</text>
    <text x="25" y="100" class="label">• 3-phase commit protocol</text>
    <text x="25" y="116" class="label">• Arbitrary node failures</text>
  </g>
  
  <!-- PBFT Formula Box -->
  <g class="anim-slide" style="animation-delay: 0.3s;">
    <rect x="275" y="50" width="130" height="55" fill="white" stroke="#e2e8f0" stroke-width="1" class="concept-box" filter="url(#shadow)"/>
    <text x="285" y="68" class="label" font-weight="bold">PBFT Requirement</text>
    <text x="285" y="90" class="label" font-size="16">N ≥ 3f + 1</text>
  </g>
  
  <!-- Diagram: PBFT Message Flow -->
  <g transform="translate(30, 140)">
    <!-- Phase Labels -->
    <text x="90" y="0" text-anchor="middle" class="phase-label anim-fade" style="animation-delay: 0.4s;">PRE-PREPARE</text>
    <text x="210" y="0" text-anchor="middle" class="phase-label anim-fade" style="animation-delay: 0.6s;">PREPARE</text>
    <text x="330" y="0" text-anchor="middle" class="phase-label anim-fade" style="animation-delay: 0.8s;">COMMIT</text>
    
    <!-- Client -->
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="50" height="35" fill="#8b5cf6" rx="5" filter="url(#shadow)"/>
      <text x="25" y="22" text-anchor="middle" class="node-label">Client</text>
    </g>
    
    <!-- Primary Node -->
    <g transform="translate(60, 150)" class="anim-pulse">
      <rect x="0" y="0" width="55" height="40" fill="url(#primaryGradient)" rx="6" filter="url(#shadow)"/>
      <text x="27.5" y="25" text-anchor="middle" class="node-label">P0</text>
      <text x="27.5" y="55" text-anchor="middle" class="label" font-size="10">Primary</text>
    </g>
    
    <!-- Replica 1 -->
    <g transform="translate(150, 150)">
      <rect x="0" y="0" width="55" height="40" fill="url(#nodeGradient)" rx="6" filter="url(#shadow)"/>
      <text x="27.5" y="25" text-anchor="middle" class="node-label">R1</text>
      <text x="27.5" y="55" text-anchor="middle" class="label" font-size="10">Replica</text>
    </g>
    
    <!-- Replica 2 -->
    <g transform="translate(240, 150)">
      <rect x="0" y="0" width="55" height="40" fill="url(#nodeGradient)" rx="6" filter="url(#shadow)"/>
      <text x="27.5" y="25" text-anchor="middle" class="node-label">R2</text>
      <text x="27.5" y="55" text-anchor="middle" class="label" font-size="10">Replica</text>
    </g>
    
    <!-- Byzantine Node -->
    <g transform="translate(330, 150)" class="anim-pulse" style="animation-delay: 1s;">
      <rect x="0" y="0" width="55" height="40" fill="url(#byzantineGradient)" rx="6" filter="url(#shadow)"/>
      <text x="27.5" y="25" text-anchor="middle" class="node-label">R3</text>
      <text x="27.5" y="55" text-anchor="middle" class="label" font-size="10" fill="#ef4444">Byzantine</text>
    </g>
    
    <!-- Arrows: Client to Primary -->
    <line x1="70" y1="115" x2="87" y2="150" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Message Arrows - Pre-Prepare Phase -->
    <line x1="115" y1="170" x2="150" y2="170" class="message-line msg1"/>
    <line x1="115" y1="180" x2="240" y2="180" class="message-line msg1"/>
    <line x1="115" y1="190" x2="330" y2="190" class="message-line-faulty msg1"/>
    
    <!-- Message Arrows - Prepare Phase (2f messages needed) -->
    <line x1="205" y1="170" x2="205" y2="130" class="message-line msg2"/>
    <line x1="205" y1="170" x2="295" y2="170" class="message-line msg2"/>
    <line x1="295" y1="170" x2="295" y2="130" class="message-line msg2"/>
    
    <!-- Byzantine sending conflicting message -->
    <line x1="365" y1="150" x2="365" y2="110" class="message-line-faulty msg2"/>
    
    <!-- Message Arrows - Commit Phase -->
    <line x1="150" y1="130" x2="150" y2="110" class="message-line msg3"/>
    <line x1="240" y1="130" x2="240" y2="110" class="message-line msg3"/>
    <line x1="365" y1="110" x2="320" y2="80" class="message-line-faulty msg3"/>
    
    <!-- Commit threshold indicator -->
    <rect x="150" y="100" width="90" height="20" fill="#22c55e" rx="4" opacity="0.9"/>
    <text x="195" y="114" text-anchor="middle" class="label" fill="white" font-size="10" font-weight="bold">2f+1 COMMIT</text>
  </g>
  
  <!-- Bottom explanation -->
  <g class="anim-fade" style="animation-delay: 1s;">
    <rect x="15" y="320" width="390" height="70" fill="white" stroke="#e2e8f0" stroke-width="1" rx="8" filter="url(#shadow)"/>
    <text x="25" y="342" class="label" font-weight="bold" font-size="13">PBFT 3-Phase Protocol</text>
    <text x="25" y="360" class="label" font-size="11">1. Pre-Prepare: Primary orders the request</text>
    <text x="25" y="375" class="label" font-size="11">2. Prepare: Replicas verify order (need 2f+1)</text>
    <text x="25" y="390" class="label" font-size="11">3. Commit: Execute after prepare quorum</text>
  </g>
  
  <!-- Byzantine Failure indicator -->
  <g class="anim-fade" style="animation-delay: 1.2s;">
    <circle cx="395" cy="355" r="8" fill="#ef4444"/>
    <text x="395" y="359" text-anchor="middle" fill="white" font-size="12" font-weight="bold">!</text>
    <text x="380" y="375" class="label" font-size="10" fill="#ef4444">Sends conflicting</text>
  </g>
  
  <!-- Data narration attributes -->
  <rect x="0" y="0" width="420" height="400" fill="transparent" data-narration="Byzantine Fault Tolerance ensures distributed systems can reach consensus even when some nodes behave arbitrarily or maliciously"/>
  <rect x="15" y="50" width="130" height="75" fill="transparent" data-narration="Key concepts include the 3f+1 node requirement and three-phase commit protocol for achieving consensus despite f faulty nodes"/>
  <rect x="60" y="290" width="55" height="40" fill="transparent" data-narration="The primary node (P0) initiates the protocol by ordering client requests"/>
  <rect x="150" y="290" width="55" height="40" fill="transparent" data-narration="Replica R1 participates in prepare and commit phases to verify consensus"/>
  <rect x="330" y="290" width="55" height="40" fill="transparent" data-narration="Byzantine node R3 may send conflicting messages to different replicas, testing system integrity"/>
  <rect x="150" y="100" width="90" height="20" fill="transparent" data-narration="Commit threshold of 2f+1 ensures safety even with f Byzantine nodes"/>
</svg>