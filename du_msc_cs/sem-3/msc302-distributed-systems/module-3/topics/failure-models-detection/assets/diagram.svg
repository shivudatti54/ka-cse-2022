<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="failure-models-detection">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="consistencyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="availabilityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#3dbdb5"/>
    </linearGradient>
    <linearGradient id="partitionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe66d"/>
      <stop offset="100%" style="stop-color:#ffd93d"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf"/>
      <stop offset="100%" style="stop-color:#88d8b0"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcedc1"/>
      <stop offset="100%" style="stop-color:#c5e1a5"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3b6"/>
      <stop offset="100%" style="stop-color:#ffab91"/>
    </linearGradient>
    <linearGradient id="boxGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaaa5"/>
      <stop offset="100%" style="stop-color:#ff8b94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: slideIn 0.8s ease-out forwards; }
    .section-box { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .section-box:nth-child(4) { animation-delay: 0.8s; }
    .cap-circle { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .cap-circle:nth-of-type(1) { animation-delay: 0.3s; }
    .cap-circle:nth-of-type(2) { animation-delay: 0.5s; }
    .cap-circle:nth-of-type(3) { animation-delay: 0.7s; }
    .arrow { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Failure Models &amp; Detection</text>
  <text x="210" y="45" text-anchor="middle" font-size="11" fill="#5d6d7e">Distributed Systems</text>
  
  <!-- CAP Triangle Section -->
  <g data-narration="CAP Theorem showing trade-offs between Consistency, Availability, and Partition Tolerance">
    <text x="210" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#34495e">CAP Theorem</text>
    <circle cx="210" cy="95" r="35" fill="url(#consistencyGrad)" opacity="0.85" class="cap-circle" filter="url(#shadow)"/>
    <text x="210" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="white">C</text>
    <text x="210" y="104" text-anchor="middle" font-size="9" fill="white">Consistency</text>
    
    <circle cx="165" cy="135" r="35" fill="url(#availabilityGrad)" opacity="0.85" class="cap-circle" filter="url(#shadow)"/>
    <text x="165" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="white">A</text>
    <text x="165" y="144" text-anchor="middle" font-size="9" fill="white">Availability</text>
    
    <circle cx="255" cy="135" r="35" fill="url(#partitionGrad)" opacity="0.85" class="cap-circle" filter="url(#shadow)"/>
    <text x="255" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#5d4d00">P</text>
    <text x="255" y="144" text-anchor="middle" font-size="9" fill="#5d4d00">Partition</text>
  </g>
  
  <!-- Failure Model Boxes -->
  <g data-narration="Crash Failure: Process stops permanently or temporarily. Detected via heartbeat and timeout mechanisms.">
    <rect x="10" y="180" width="95" height="55" rx="6" fill="url(#boxGrad1)" filter="url(#shadow)" class="section-box"/>
    <text x="57" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e5d4b">Crash</text>
    <text x="57" y="212" text-anchor="middle" font-size="9" fill="#3d6b5a">Heartbeat</text>
    <text x="57" y="224" text-anchor="middle" font-size="9" fill="#3d6b5a">Timeout</text>
  </g>
  
  <g data-narration="Omission Failure: Messages lost in transit. Network partitions as special case. Detected via sequence numbers.">
    <rect x="110" y="180" width="95" height="55" rx="6" fill="url(#boxGrad2)" filter="url(#shadow)" class="section-box"/>
    <text x="157" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#5a7d4e">Omission</text>
    <text x="157" y="212" text-anchor="middle" font-size="9" fill="#6b8c5e">Sequence</text>
    <text x="157" y="224" text-anchor="middle" font-size="9" fill="#6b8c5e">NACK</text>
  </g>
  
  <g data-narration="Timing Failure: Temporal constraints violated. Synchronous vs asynchronous systems.">
    <rect x="210" y="180" width="95" height="55" rx="6" fill="url(#boxGrad3)" filter="url(#shadow)" class="section-box"/>
    <text x="257" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b5a3c">Timing</text>
    <text x="257" y="212" text-anchor="middle" font-size="9" fill="#9c6b4d">Logical</text>
    <text x="257" y="224" text-anchor="middle" font-size="9" fill="#9c6b4d">Clocks</text>
  </g>
  
  <g data-narration="Byzantine Failure: Arbitrary/malicious behavior. Requires cryptographic verification and PBFT algorithms.">
    <rect x="310" y="180" width="95" height="55" rx="6" fill="url(#boxGrad4)" filter="url(#shadow)" class="section-box"/>
    <text x="357" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b4049">Byzantine</text>
    <text x="357" y="212" text-anchor="middle" font-size="9" fill="#9c515a">PBFT</text>
    <text x="357" y="224" text-anchor="middle" font-size="9" fill="#9c515a">Crypto</text>
  </g>
  
  <!-- Connection Lines from CAP to Failure Models -->
  <g class="arrow">
    <line x1="210" y1="130" x2="57" y2="180" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="185" y1="145" x2="157" y2="180" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="235" y1="145" x2="257" y2="180" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="210" y1="130" x2="357" y2="180" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Detection Strategies Section -->
  <g data-narration="Failure Detection Strategies: Accrual detectors (Φ-accrual), Hybrid models combining heartbeat and ping-echo.">
    <rect x="10" y="250" width="185" height="50" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)" class="section-box"/>
    <text x="20" y="268" font-size="10" font-weight="bold" fill="#2c3e50">Detection Strategies</text>
    <circle cx="25" cy="282" r="4" fill="#3498db" class="pulse-anim"/>
    <text x="35" y="286" font-size="9" fill="#5d6d7e">Φ-Accrual</text>
    <circle cx="100" cy="282" r="4" fill="#9b59b6" class="pulse-anim"/>
    <text x="110" y="286" font-size="9" fill="#5d6d7e">Heartbeat</text>
    <circle cx="165" cy="282" r="4" fill="#e67e22" class="pulse-anim"/>
    <text x="175" y="286" font-size="9" fill="#5d6d7e">Ping-Echo</text>
  </g>
  
  <!-- FLP Impossibility & Key Concepts -->
  <g data-narration="FLP Impossibility: Deterministic consensus impossible in asynchronous systems with crash failures.">
    <rect x="205" y="250" width="200" height="50" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)" class="section-box"/>
    <text x="215" y="268" font-size="10" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    <text x="215" y="282" font-size="9" fill="#5d6d7e">FLP Impossibility: Async consensus</text>
    <text x="215" y="294" font-size="9" fill="#5d6d7e">PBFT: 3f+1 nodes survive f failures</text>
  </g>
  
  <!-- Bottom Relationship Arrow -->
  <g data-narration="Flow showing the relationship from failure models to detection mechanisms">
    <path d="M 57 235 L 57 250" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2" class="arrow"/>
    <path d="M 357 235 L 357 250" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,2" class="arrow"/>
    <polygon points="57,250 53,243 61,243" fill="#7f8c8d"/>
    <polygon points="357,250 353,243 361,243" fill="#7f8c8d"/>
  </g>
  
  <!-- Horizontal flow between detection and concepts -->
  <g>
    <line x1="195" y1="275" x2="205" y2="275" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="202,272 202,278 208,275" fill="#95a5a6"/>
  </g>
  
  <!-- Legend/Indicator -->
  <g transform="translate(10, 370)">
    <circle cx="8" cy="8" r="4" fill="#3498db" class="pulse-anim"/>
    <text x="20" y="12" font-size="9" fill="#7f8c8d">Animated elements</text>
  </g>
</svg>