<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="consensus-paxos-raft">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e6f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paxosGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d5e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ab8d1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="raftGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c5e8a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9fd46a;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .section-box { stroke: #ccc; stroke-width: 1; rx: 8; }
    .node { stroke: #333; stroke-width: 1.5; }
    .arrow-line { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .phase-box { rx: 4; stroke-width: 1; }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .paxos-anim { animation: slideInLeft 0.6s ease-out forwards; }
    .raft-anim { animation: slideInRight 0.6s ease-out forwards; }
    .node-anim { animation: pulse 2s ease-in-out infinite; }
    .fade-anim { animation: fadeIn 1s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Consensus: Paxos &amp; Raft</text>
  
  <!-- Paxos Section -->
  <g class="paxos-anim">
    <rect x="15" y="45" width="185" height="150" fill="url(#paxosGradient)" class="section-box" />
    <text x="25" y="62" class="title" style="font-size:14px;fill:#1a5276">Paxos Protocol</text>
    
    <!-- Proposer Node -->
    <circle cx="45" cy="90" r="18" fill="#f4d03f" class="node node-anim" />
    <text x="45" y="94" text-anchor="middle" class="label" style="font-size:10px">Proposer</text>
    
    <!-- Acceptor Nodes -->
    <circle cx="45" cy="140" r="14" fill="#85c1e9" class="node" />
    <text x="45" y="144" text-anchor="middle" class="detail">A1</text>
    <circle cx="75" cy="155" r="14" fill="#85c1e9" class="node" />
    <text x="75" y="159" text-anchor="middle" class="detail">A2</text>
    <circle cx="105" cy="145" r="14" fill="#85c1e9" class="node" />
    <text x="105" y="149" text-anchor="middle" class="detail">A3</text>
    
    <!-- Phase Boxes -->
    <rect x="130" y="75" width="60" height="22" fill="#fce4d6" class="phase-box" style="stroke:#e67e22" />
    <text x="160" y="90" text-anchor="middle" class="detail" style="font-size:9px">Prepare</text>
    
    <rect x="130" y="105" width="60" height="22" fill="#d5f5e3" class="phase-box" style="stroke:#27ae60" />
    <text x="160" y="120" text-anchor="middle" class="detail" style="font-size:9px">Promise</text>
    
    <rect x="130" y="135" width="60" height="22" fill="#e8daef" class="phase-box" style="stroke:#8e44ad" />
    <text x="160" y="150" text-anchor="middle" class="detail" style="font-size:9px">Accept</text>
    
    <!-- Arrows -->
    <line x1="55" y1="105" x2="130" y2="86" class="arrow-line" style="animation-delay:0.3s" />
    <line x1="70" y1="140" x2="130" y2="116" class="arrow-line" style="animation-delay:0.6s" />
    <line x1="100" y1="140" x2="130" y2="146" class="arrow-line" style="animation-delay:0.9s" />
    
    <!-- Quorum Line -->
    <path d="M55 165 Q107 175 130 165" stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-dasharray="4,2" />
    <text x="92" y="180" text-anchor="middle" class="detail" style="font-size:9px;fill:#c0392b">Quorum (Majority)</text>
  </g>
  
  <!-- Raft Section -->
  <g class="raft-anim">
    <rect x="220" y="45" width="185" height="150" fill="url(#raftGradient)" class="section-box" />
    <text x="230" y="62" class="title" style="font-size:14px;fill:#1e8449">Raft Protocol</text>
    
    <!-- Leader -->
    <circle cx="280" cy="85" r="20" fill="#e74c3c" class="node node-anim" />
    <text x="280" y="89" text-anchor="middle" class="label" style="font-size:10px;color:#fff">Leader</text>
    
    <!-- Followers -->
    <circle cx="250" cy="130" r="14" fill="#f5b041" class="node" />
    <text x="250" y="134" text-anchor="middle" class="detail">Follower</text>
    <circle cx="310" cy="130" r="14" fill="#f5b041" class="node" />
    <text x="310" y="134" text-anchor="middle" class="detail">Follower</text>
    
    <!-- Raft Mechanisms -->
    <rect x="240" y="155" width="60" height="18" fill="#f9e79f" class="phase-box" style="stroke:#f39c12" />
    <text x="270" y="168" text-anchor="middle" class="detail" style="font-size:9px">Election</text>
    
    <rect x="305" y="155" width="60" height="18" fill="#abebc6" class="phase-box" style="stroke:#1e8449" />
    <text x="335" y="168" text-anchor="middle" class="detail" style="font-size:9px">Replicate</text>
    
    <!-- Arrows -->
    <line x1="280" y1="105" x2="265" y2="118" class="arrow-line" style="animation-delay:0.4s" />
    <line x1="280" y1="105" x2="295" y2="118" class="arrow-line" style="animation-delay:0.5s" />
    <line x1="255" y1="144" x2="255" y2="155" class="arrow-line" style="animation-delay:0.7s" />
    <line x1="315" y1="144" x2="315" y2="155" class="arrow-line" style="animation-delay:0.7s" />
  </g>
  
  <!-- Comparison Section -->
  <g class="fade-anim" style="animation-delay:0.5s">
    <rect x="15" y="205" width="185" height="90" fill="#fef9e7" class="section-box" />
    <text x="25" y="222" class="title" style="font-size:12px;fill:#7d5a00">Key Differences</text>
    <text x="25" y="240" class="detail">• Paxos: Multi-role, complex</text>
    <text x="25" y="255" class="detail">• Raft: Leader-centric, simpler</text>
    <text x="25" y="270" class="detail">• Both: Majority quorum</text>
    <text x="25" y="285" class="detail">• Safety guaranteed</text>
  </g>
  
  <g class="fade-anim" style="animation-delay:0.7s">
    <rect x="220" y="205" width="185" height="90" fill="#e8f6f3" class="section-box" />
    <text x="230" y="222" class="title" style="font-size:12px;fill:#0e6655">Use Cases</text>
    <text x="230" y="240" class="detail">Paxos: Google Chubby, ZooKeeper</text>
    <text x="230" y="255" class="detail">Raft: etcd, CockroachDB, TiDB</text>
    <text x="230" y="270" class="detail">Distributed databases &amp; storage</text>
    <text x="230" y="285" class="detail">Cloud infrastructure</text>
  </g>
  
  <!-- Visual Flow Arrow Between Sections -->
  <g class="fade-anim" style="animation-delay:1s">
    <path d="M200 120 L220 120" stroke="#9b59b6" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
    <text x="210" y="115" text-anchor="middle" class="detail" style="font-size:9px;color:#9b59b6">Simpler</text>
  </g>
  
  <!-- Footer -->
  <g class="fade-anim" style="animation-delay:1.2s">
    <rect x="15" y="305" width="390" height="80" fill="#fafafa" class="section-box" style="stroke:#ddd" />
    <text x="210" y="325" text-anchor="middle" class="title" style="font-size:13px">Protocol Flow Summary</text>
    
    <!-- Flow Steps -->
    <circle cx="60" cy="350" r="12" fill="#3498db" class="node" />
    <text x="60" y="354" text-anchor="middle" class="detail" style="color:#fff;font-size:9px">1</text>
    <text x="60" y="368" text-anchor="middle" class="detail" style="font-size:8px">Client</text>
    
    <path d="M75 350 L105 350" stroke="#555" stroke-width="1.5" fill="none" />
    
    <circle cx="125" cy="350" r="12" fill="#e74c3c" class="node" />
    <text x="125" y="354" text-anchor="middle" class="detail" style="color:#fff;font-size:9px">2</text>
    <text x="125" y="368" text-anchor="middle" class="detail" style="font-size:8px">Leader</text>
    
    <path d="M140 350 L170 350" stroke="#555" stroke-width="1.5" fill="none" />
    
    <circle cx="190" cy="350" r="12" fill="#27ae60" class="node" />
    <text x="190" y="354" text-anchor="middle" class="detail" style="color:#fff;font-size:9px">3</text>
    <text x="190" y="368" text-anchor="middle" class="detail" style="font-size:8px">Quorum</text>
    
    <path d="M205 350 L235 350" stroke="#555" stroke-width="1.5" fill="none" />
    
    <circle cx="255" cy="350" r="12" fill="#9b59b6" class="node" />
    <text x="255" y="354" text-anchor="middle" class="detail" style="color:#fff;font-size:9px">4</text>
    <text x="255" y="368" text-anchor="middle" class="detail" style="font-size:8px">Commit</text>
    
    <path d="M270 350 L300 350" stroke="#555" stroke-width="1.5" fill="none" />
    
    <circle cx="320" cy="350" r="12" fill="#f39c12" class="node" />
    <text x="320" y="354" text-anchor="middle" class="detail" style="color:#fff;font-size:9px">5</text>
    <text x="320" y="368" text-anchor="middle" class="detail" style="font-size:8px">Reply</text>
    
    <path d="M335 350 L365 350" stroke="#555" stroke-width="1.5" fill="none" />
    
    <circle cx="385" cy="350" r="12" fill="#3498db" class="node" />
    <text x="385" y="354" text-anchor="middle" class="detail" style="color:#fff;font-size:9px">6</text>
    <text x="385" y="368" text-anchor="middle" class="detail" style="font-size:8px">Client</text>
  </g>
  
  <!-- Data Narration Elements -->
  <rect x="0" y="0" width="420" height="400" fill="transparent" data-narration="Consensus algorithms ensure agreement between distributed nodes" />
  <rect x="15" y="45" width="185" height="150" fill="transparent" data-narration="Paxos uses Proposer, Acceptors, and Learners with Prepare/Promise/Accept phases" />
  <rect x="220" y="45" width="185" height="150" fill="transparent" data-narration="Raft uses Leader-centric design with Election and Log Replication phases" />
  <rect x="15" y="205" width="185" height="90" fill="transparent" data-narration="Key differences: Paxos is more complex with multiple roles, Raft simplifies with strong leader" />
  <rect x="220" y="205" width="185" height="90" fill="transparent" data-narration="Used in Google Chubby, etcd, CockroachDB, and TiDB for distributed consistency" />
  <rect x="15" y="305" width="390" height="80" fill="transparent" data-narration="Flow: Client → Leader → Quorum → Commit → Reply → Client" />
</svg>