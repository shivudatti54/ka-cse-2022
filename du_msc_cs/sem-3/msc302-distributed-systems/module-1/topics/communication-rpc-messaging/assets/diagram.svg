<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="communication-rpc-messaging">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f9ff"/>
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#449d44"/>
    </linearGradient>
    <linearGradient id="networkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="50%" style="stop-color:#8e44ad"/>
      <stop offset="100%" style="stop-color:#9b59b6"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowAnimation {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #7f8c8d; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .slide-in-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .flow-line { stroke-dasharray: 5,5; animation: flowAnimation 1s linear infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="8"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text fade-in">Communication: RPC &amp; Messaging</text>
  <line x1="20" y1="40" x2="400" y2="40" stroke="#b8d4e8" stroke-width="1" class="fade-in" style="animation-delay: 0.2s"/>
  
  <!-- RPC Flow Section -->
  <g class="slide-in" style="animation-delay: 0.3s" data-narration="RPC Flow: Client-Server interaction showing stub, network, and skeleton components">
    <text x="30" y="58" class="section-title">RPC Flow</text>
    <rect x="20" y="65" width="180" height="130" fill="url(#panelGradient)" rx="6" filter="url(#shadow)"/>
    
    <!-- Client Box -->
    <rect x="30" y="80" width="55" height="40" fill="url(#clientGradient)" rx="4"/>
    <text x="57" y="98" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11" font-weight="bold">Client</text>
    <text x="57" y="112" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">App</text>
    
    <!-- Stub -->
    <rect x="30" y="130" width="55" height="25" fill="#6fa8dc" rx="3"/>
    <text x="57" y="147" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Stub</text>
    
    <!-- Arrow to network -->
    <path d="M85 142 L110 142" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
    <text x="97" y="135" text-anchor="middle" class="detail-text">Request</text>
    
    <!-- Network -->
    <rect x="110" y="130" width="50" height="25" fill="url(#networkGradient)" rx="3"/>
    <text x="135" y="147" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Network</text>
    
    <!-- Arrow to skeleton -->
    <path d="M160 142 L185 142" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line"/>
    <text x="172" y="135" text-anchor="middle" class="detail-text">RPC</text>
    
    <!-- Skeleton -->
    <rect x="185" y="130" width="55" height="25" fill="#b8e0b8" rx="3"/>
    <text x="212" y="147" text-anchor="middle" fill="#2c5e2c" font-family="Segoe UI" font-size="9">Skeleton</text>
    
    <!-- Server Box -->
    <rect x="185" y="165" width="55" height="40" fill="url(#serverGradient)" rx="4"/>
    <text x="212" y="183" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11" font-weight="bold">Server</text>
    <text x="212" y="197" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Service</text>
    
    <!-- Response Arrow -->
    <path d="M135 155 L135 175" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)" class="flow-line" style="animation-direction: reverse;"/>
    <text x="148" y="168" class="detail-text" fill="#e74c3c">Response</text>
  </g>
  
  <!-- Messaging Patterns Section -->
  <g class="slide-in-up" style="animation-delay: 0.5s" data-narration="Messaging Patterns showing Point-to-Point and Pub-Sub models">
    <text x="230" y="58" class="section-title">Messaging Patterns</text>
    <rect x="220" y="65" width="180" height="130" fill="url(#panelGradient)" rx="6" filter="url(#shadow)"/>
    
    <!-- P2P Pattern -->
    <rect x="230" y="78" width="75" height="50" fill="#f5b041" rx="3"/>
    <text x="267" y="95" text-anchor="middle" fill="#7d5c1a" font-family="Segoe UI" font-size="10" font-weight="bold">Point-to-Point</text>
    <text x="267" y="110" text-anchor="middle" fill="#7d5c1a" font-family="Segoe UI" font-size="8">Queue</text>
    <text x="267" y="122" text-anchor="middle" fill="#7d5c1a" font-family="Segoe UI" font-size="8">Competing Consumers</text>
    
    <!-- Pub-Sub Pattern -->
    <rect x="315" y="78" width="75" height="50" fill="#ff6b6b" rx="3"/>
    <text x="352" y="95" text-anchor="middle" fill="#8b2a2a" font-family="Segoe UI" font-size="10" font-weight="bold">Pub-Sub</text>
    <text x="352" y="110" text-anchor="middle" fill="#8b2a2a" font-family="Segoe UI" font-size="8">Topics</text>
    <text x="352" y="122" text-anchor="middle" fill="#8b2a2a" font-family="Segoe UI" font-size="8">Consumer Groups</text>
    
    <!-- Arrows from producers -->
    <path d="M267 128 L267 145" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <path d="M352 128 L352 145" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Producer Box -->
    <rect x="242" y="145" width="50" height="30" fill="#5dade2" rx="3"/>
    <text x="267" y="163" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Producer</text>
    
    <rect x="327" y="145" width="50" height="30" fill="#5dade2" rx="3"/>
    <text x="352" y="163" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Producer</text>
  </g>
  
  <!-- Protocol Boxes -->
  <g class="fade-in" style="animation-delay: 0.7s" data-narration="Advanced protocols: gRPC for streaming, MQTT for IoT, NATS for exactly-once">
    <rect x="20" y="205" width="180" height="55" fill="#ecf0f1" rx="5" filter="url(#shadow)"/>
    <text x="30" y="222" class="section-title">Advanced Protocols</text>
    <text x="30" y="240" class="label-text" font-size="11">• gRPC: HTTP/2, Streaming RPCs</text>
    <text x="30" y="252" class="label-text" font-size="11">• MQTT 5.0: IoT, Message Expiry</text>
  </g>
  
  <g class="fade-in" style="animation-delay: 0.8s" data-narration="Error semantics showing delivery guarantees">
    <rect x="220" y="205" width="180" height="55" fill="#ecf0f1" rx="5" filter="url(#shadow)"/>
    <text x="230" y="222" class="section-title">Error Semantics</text>
    <text x="230" y="240" class="label-text" font-size="11">• At-most-once: No duplicates</text>
    <text x="230" y="252" class="label-text" font-size="11">• At-least-once: With ack, no loss</text>
  </g>
  
  <!-- Tradeoffs Section -->
  <g class="slide-in-up" style="animation-delay: 1s" data-narration="Tradeoffs: RPC offers consistency, Messaging provides loose coupling">
    <text x="30" y="275" class="section-title">Tradeoffs</text>
    <rect x="20" y="282" width="180" height="108" fill="url(#panelGradient)" rx="6" filter="url(#shadow)"/>
    
    <!-- RPC Box -->
    <rect x="30" y="295" width="70" height="45" fill="#3498db" rx="4" class="pulse"/>
    <text x="65" y="315" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11" font-weight="bold">RPC</text>
    <text x="65" y="330" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Strong Consistency</text>
    <text x="65" y="342" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Sync Communication</text>
    
    <!-- VS -->
    <text x="110" y="322" text-anchor="middle" font-family="Segoe UI" font-size="12" fill="#95a5a6" font-weight="bold">vs</text>
    
    <!-- Messaging Box -->
    <rect x="130" y="295" width="70" height="45" fill="#9b59b6" rx="4" class="pulse" style="animation-delay: 0.5s"/>
    <text x="165" y="315" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11" font-weight="bold">Messaging</text>
    <text x="165" y="330" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Loose Coupling</text>
    <text x="165" y="342" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">Eventual Consistency</text>
    
    <!-- Warning about cascading -->
    <rect x="35" y="350" width="150" height="30" fill="#feeaa8" rx="3"/>
    <text x="110" y="365" text-anchor="middle" fill="#7d6608" font-family="Segoe UI" font-size="9">⚠ RPC: Cascading failures risk</text>
    <text x="110" y="375" text-anchor="middle" fill="#7d6608" font-family="Segoe UI" font-size="8">⚠ Messaging: Eventual consistency</text>
  </g>
  
  <!-- Use Cases -->
  <g class="slide-in-up" style="animation-delay: 1.2s" data-narration="Real-world use cases from industry">
    <text x="230" y="275" class="section-title">Industry Use Cases</text>
    <rect x="220" y="282" width="180" height="108" fill="url(#panelGradient)" rx="6" filter="url(#shadow)"/>
    
    <!-- gRPC Use Case -->
    <rect x="230" y="295" width="160" height="30" fill="#27ae60" rx="3" class="float"/>
    <text x="310" y="312" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="10">gRPC: Kubernetes Inter-service</text>
    
    <!-- Kafka Use Case -->
    <rect x="230" y="330" width="160" height="30" fill="#e74c3c" rx="3" class="float" style="animation-delay: 1s"/>
    <text x="310" y="347" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="10">Kafka: LinkedIn 10M+ events/sec</text>
    
    <!-- eBPF Note -->
    <text x="310" y="378" text-anchor="middle" class="detail-text">🔬 Research: eBPF-based RPC acceleration</text>
  </g>
  
  <!-- Legend -->
  <g class="fade-in" style="animation-delay: 1.4s" data-narration="Legend showing visual elements">
    <line x1="20" y1="390" x2="50" y2="390" stroke="#666" stroke-width="1.5" stroke-dasharray="5,5" class="flow-line"/>
    <text x="55" y="394" class="detail-text">Data Flow</text>
    <rect x="130" y="383" width="12" height="12" fill="#3498db" rx="2"/>
    <text x="145" y="394" class="detail-text">Sync</text>
    <rect x="175" y="383" width="12" height="12" fill="#9b59b6" rx="2"/>
    <text x="190" y="394" class="detail-text">Async</text>
    <rect x="220" y="383" width="12" height="12" fill="#f39c12" rx="2"/>
    <text x="235" y="394" class="detail-text">Warning</text>
  </g>
</svg>