<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="distributed-system-models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="triangleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box-left { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box-right { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
    .box-bottom { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .triangle { animation: fadeIn 1s ease-out 0.5s forwards; opacity: 0; }
    .arrow { animation: drawLine 1s ease-out 0.8s forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .cap-text { animation: pulse 2s ease-in-out infinite; }
    .section-title { font-size: 11px; font-weight: bold; fill: #444; }
    .section-text { font-size: 9px; fill: #666; }
    .label { font-size: 10px; font-weight: bold; }
    .detail { font-size: 8px; fill: #777; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" style="font-family: Georgia, serif; font-size: 20px; font-weight: bold; fill: #2c3e50;">Distributed System Models</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#7eb8da" stroke-width="2" class="title" style="animation-delay: 0.3s"/>
  
  <!-- Left Box - Architectural Models -->
  <g class="box-left" data-narration="Architectural models define how components interact: Client-Server for centralized coordination, Peer-to-Peer for decentralized networks, and Three-Tier for layered separation">
    <rect x="15" y="55" width="90" height="95" rx="6" fill="#fff" stroke="#9acd32" stroke-width="2" filter="url(#shadow)"/>
    <text x="60" y="70" text-anchor="middle" class="section-title" fill="#5a8f2f">ARCHITECTURE</text>
    <text x="22" y="88" class="section-text">• Client-Server</text>
    <text x="22" y="100" class="section-text">• Peer-to-Peer</text>
    <text x="22" y="112" class="section-text">• Three-Tier</text>
    <text x="22" y="124" class="section-text">• Microservices</text>
    <text x="22" y="138" class="detail">Web servers, BitTorrent,</text>
    <text x="22" y="148" class="detail">Cloud services</text>
  </g>
  
  <!-- Right Box - Failure Models -->
  <g class="box-right" data-narration="Failure models describe how systems handle errors: crash failures stop completely, omission failures lose messages, Byzantine failures cause arbitrary errors, and network partitions split the system">
    <rect x="315" y="55" width="90" height="95" rx="6" fill="#fff" stroke="#ff6b6b" stroke-width="2" filter="url(#shadow)"/>
    <text x="360" y="70" text-anchor="middle" class="section-title" fill="#c44">FAILURES</text>
    <text x="322" y="88" class="section-text">• Crash (fail-stop)</text>
    <text x="322" y="100" class="section-text">• Omission (loss)</text>
    <text x="322" y="112" class="section-text">• Byzantine</text>
    <text x="322" y="124" class="section-text">• Partition</text>
    <text x="322" y="138" class="detail">Bitcoin, Spanner</text>
    <text x="322" y="148" class="detail">consensus</text>
  </g>
  
  <!-- Bottom Box - Interaction & Consistency -->
  <g class="box-bottom" data-narration="Interaction models define timing: Synchronous has bounds, Asynchronous has no guarantees, Partially Synchronous is hybrid. Consistency models range from strong (Linearizability) to weak (Eventual consistency)">
    <rect x="115" y="310" width="190" height="75" rx="6" fill="#fff" stroke="#9370db" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="328" text-anchor="middle" class="section-title" fill="#6a5acd">INTERACTION &amp; CONSISTENCY</text>
    <text x="125" y="348" class="section-text">Sync • Async • Partial Sync</text>
    <text x="125" y="362" class="section-text">Linearizable • Eventual • Causal</text>
    <text x="125" y="376" class="detail">CAP Theorem: pick 2 of 3</text>
  </g>
  
  <!-- CAP Triangle -->
  <g class="triangle" data-narration="The CAP Theorem shows the fundamental trade-off in distributed systems: Consistency, Availability, and Partition Tolerance - you can only guarantee two of these three properties">
    <polygon points="210,170 280,270 140,270" fill="url(#triangleGradient)" stroke="#4a7a9f" stroke-width="2" opacity="0.9"/>
    <text x="210" y="155" text-anchor="middle" class="label" fill="#2c3e50" style="font-size: 12px;">CAP THEOREM</text>
    
    <!-- C - Consistency -->
    <text x="230" y="200" class="label" fill="#fff" style="font-size: 11px;">C</text>
    <text x="230" y="212" class="label" fill="#fff" style="font-size: 11px;">Consistency</text>
    <circle cx="230" cy="225" r="4" fill="#fff" opacity="0.8"/>
    
    <!-- A - Availability -->
    <text x="255" y="255" class="label" fill="#fff" style="font-size: 11px;">A</text>
    <text x="255" y="267" class="label" fill="#fff" style="font-size: 11px;">Availability</text>
    <circle cx="252" cy="278" r="4" fill="#fff" opacity="0.8"/>
    
    <!-- P - Partition Tolerance -->
    <text x="170" y="255" class="label" fill="#fff" style="font-size: 11px;">P</text>
    <text x="170" y="267" class="label" fill="#fff" style="font-size: 11px;">Partition</text>
    <text x="170" y="279" class="label" fill="#fff" style="font-size: 11px;">Tolerance</text>
    <circle cx="168" cy="290" r="4" fill="#fff" opacity="0.8"/>
    
    <!-- Center label -->
    <text x="210" y="235" text-anchor="middle" class="cap-text" style="font-size: 9px; fill: #fff; font-weight: bold;">pick 2</text>
  </g>
  
  <!-- Arrows connecting boxes to triangle -->
  <path d="M105 102 L140 200" class="arrow" fill="none" stroke="#7eb8da" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  <path d="M315 102 L280 200" class="arrow" fill="none" stroke="#7eb8da" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M210 295 L210 305" class="arrow" fill="none" stroke="#7eb8da" stroke-width="1.5" stroke-dasharray="4,2"/>
  
  <!-- Examples section -->
  <g class="box-bottom" data-narration="Real-world examples demonstrate these models: Google Spanner uses globally distributed clocks, Bitcoin uses Byzantine Fault Tolerance, DynamoDB uses eventual consistency">
    <rect x="15" y="295" width="95" height="50" rx="5" fill="#fffaf0" stroke="#ffa500" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="62" y="310" text-anchor="middle" class="section-title" fill="#cc8400">EXAMPLES</text>
    <text x="22" y="326" class="section-text" style="font-size: 8px;">Spanner: Global clocks</text>
    <text x="22" y="338" class="section-text" style="font-size: 8px;">Bitcoin: BFT</text>
  </g>
  
  <g class="box-bottom" data-narration="Modern approaches include CRDTs for conflict-free replication and Hybrid Logical Clocks for better timing in edge computing and serverless architectures">
    <rect x="310" y="295" width="95" height="50" rx="5" fill="#f0fff8" stroke="#20b2aa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="357" y="310" text-anchor="middle" class="section-title" fill="#008b8b">NEW MODELS</text>
    <text x="317" y="326" class="section-text" style="font-size: 8px;">CRDTs</text>
    <text x="317" y="338" class="section-text" style="font-size: 8px;">Hybrid Logical Clocks</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="30" y="390" r="3" fill="#7eb8da" opacity="0.5"/>
  <circle cx="50" y="385" r="2" fill="#9370db" opacity="0.4"/>
  <circle cx="70" y="392" r="2.5" fill="#ff6b6b" opacity="0.4"/>
  <circle cx="380" y="380" r="3" fill="#9acd32" opacity="0.5"/>
  <circle cx="395" y="388" r="2" fill="#ffa500" opacity="0.4"/>
</svg>