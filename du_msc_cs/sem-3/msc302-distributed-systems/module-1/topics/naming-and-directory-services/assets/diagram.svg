<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="naming-and-directory-services">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#98d4bb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5cb890;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resolverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4a6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b6bb0;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box { animation: slideInUp 0.6s ease-out backwards; }
    .box-1 { animation-delay: 0.1s; }
    .box-2 { animation-delay: 0.2s; }
    .box-3 { animation-delay: 0.3s; }
    .box-4 { animation-delay: 0.4s; }
    .box-5 { animation-delay: 0.5s; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .server { animation: fadeIn 0.5s ease-out backwards; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c5282" class="title">DNS Resolution Process</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Naming and Directory Services</text>

  <!-- Client -->
  <g class="box box-1" data-narration="Client: The user's device initiates a DNS query to resolve a domain name">
    <rect x="20" y="320" width="70" height="50" rx="6" fill="url(#clientGradient)" filter="url(#shadow)" />
    <text x="55" y="340" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Client</text>
    <text x="55" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">User PC</text>
    <text x="55" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">?</text>
  </g>

  <!-- Resolver -->
  <g class="box box-2" data-narration="Resolver: ISP or local DNS resolver receives the query and manages the resolution process">
    <rect x="130" y="310" width="80" height="55" rx="6" fill="url(#resolverGradient)" filter="url(#shadow)" />
    <text x="170" y="330" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Resolver</text>
    <text x="170" y="345" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">ISP DNS</text>
    <text x="170" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Recursive</text>
  </g>

  <!-- Root Server -->
  <g class="box box-3" data-narration="Root Server: First step - returns TLD server addresses (.com, .org, etc.)">
    <rect x="230" y="220" width="75" height="50" rx="6" fill="url(#serverGradient)" filter="url(#shadow)" />
    <text x="267" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Root Server</text>
    <text x="267" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">.</text>
    <text x="267" y="268" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Referral</text>
  </g>

  <!-- TLD Server -->
  <g class="box box-4" data-narration="TLD Server: Top-Level Domain server returns authoritative server for the specific domain">
    <rect x="310" y="130" width="80" height="50" rx="6" fill="url(#serverGradient)" filter="url(#shadow)" />
    <text x="350" y="150" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">TLD Server</text>
    <text x="350" y="165" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">.com</text>
    <text x="350" y="178" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Referral</text>
  </g>

  <!-- Authoritative Server -->
  <g class="box box-5" data-narration="Authoritative Server: Final server with the actual IP address mapping">
    <rect x="200" y="60" width="95" height="55" rx="6" fill="url(#serverGradient)" filter="url(#shadow)" />
    <text x="247" y="80" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Authoritative</text>
    <text x="247" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">example.com</text>
    <text x="247" y="110" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">IP: 93.184.216.34</text>
  </g>

  <!-- Arrows -->
  <g class="arrow" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <!-- Client to Resolver -->
    <path d="M90 345 L125 345" />
    <!-- Resolver to Root -->
    <path d="M210 337 L230 275" />
    <!-- Root to TLD -->
    <path d="M305 245 L310 185" />
    <!-- TLD to Authoritative -->
    <path d="M350 130 L330 115" />
    <!-- Authoritative back path (dashed) -->
    <path d="M280 60 L170 60 L90 300" stroke-dasharray="4,3" />
  </g>

  <!-- Step Labels -->
  <g font-family="Arial" font-size="8" fill="#666">
    <text x="95" y="335" class="pulse">1. Query</text>
    <text x="215" y="300">2. Root?</text>
    <text x="320" y="175">3. .com?</text>
    <text x="290" y="55">4. Answer!</text>
  </g>

  <!-- Key Concepts Box -->
  <g transform="translate(10, 65)" data-narration="Key concepts: Iterative resolution, caching, and hierarchical namespace structure">
    <rect width="115" height="130" rx="5" fill="#fff" stroke="#cbd5e0" stroke-width="1" opacity="0.9" />
    <text x="57" y="18" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2d3748">Key Concepts</text>
    <line x1="8" y1="25" x2="107" y2="25" stroke="#e2e8f0" />
    
    <g font-family="Arial" font-size="8" fill="#4a5568">
      <text x="12" y="40">• Iterative Query:</text>
      <text x="12" y="52" font-size="7">Server returns referrals</text>
      
      <text x="12" y="68">• Root Server (.):</text>
      <text x="12" y="80" font-size="7">Knows TLD servers</text>
      
      <text x="12" y="96">• TLD (.com):</text>
      <text x="12" y="108" font-size="7">Knows authoritative</text>
      
      <text x="12" y="120">• Caching:</text>
      <text x="12" y="132" font-size="7">Reduces latency</text>
    </g>
  </g>

  <!-- DNS Components -->
  <g transform="translate(295, 240)" data-narration="DNS stores various record types: A, AAAA, MX, CNAME">
    <rect width="110" height="90" rx="5" fill="#fff" stroke="#cbd5e0" stroke-width="1" opacity="0.9" />
    <text x="55" y="15" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2d3748">DNS Records</text>
    <line x1="8" y1="22" x2="102" y2="22" stroke="#e2e8f0" />
    
    <g font-family="Arial" font-size="8" fill="#4a5568">
      <text x="12" y="38">A → IPv4 Address</text>
      <text x="12" y="50">AAAA → IPv6 Address</text>
      <text x="12" y="62">MX → Mail Exchange</text>
      <text x="12" y="74">CNAME → Alias</text>
      <text x="12" y="86">TXT → Text Record</text>
    </g>
  </g>

  <!-- Directory Service Box -->
  <g transform="translate(295, 340)" data-narration="Directory services like LDAP extend DNS with attribute-based lookups">
    <rect width="110" height="50" rx="5" fill="#fff" stroke="#cbd5e0" stroke-width="1" opacity="0.9" />
    <text x="55" y="14" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#2d3748">Directory</text>
    <text x="55" y="26" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a5568">LDAP / X.500</text>
    <text x="55" y="40" text-anchor="middle" font-family="Arial" font-size="7" fill="#718096">Attribute-based</text>
    <text x="55" y="50" text-anchor="middle" font-family="Arial" font-size="7" fill="#718096">search &amp; discovery</text>
  </g>

  <!-- Resolution Flow Indicator -->
  <g transform="translate(15, 200)" data-narration="Resolution flows from client through hierarchical servers back with the answer">
    <rect width="75" height="80" rx="4" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1" />
    <text x="37" y="15" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#2b6cb0">Flow</text>
    <text x="37" y="30" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a5568">1. Request</text>
    <text x="37" y="42" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a5568">2. Refer</text>
    <text x="37" y="54" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a5568">3. Refer</text>
    <text x="37" y="66" text-anchor="middle" font-family="Arial" font-size="7" fill="#4a5568">4. Answer</text>
  </g>
</svg>