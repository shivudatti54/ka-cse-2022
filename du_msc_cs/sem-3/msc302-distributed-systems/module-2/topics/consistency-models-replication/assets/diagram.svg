<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="consistency-models-replication">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fcf4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="consistencyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fb3e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="availabilityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8f0c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fe08f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="partitionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d4b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a87f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-180deg) scale(0); opacity: 0; }
      to { transform: rotate(0deg) scale(1); opacity: 1; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .section-box { rx: 8; ry: 8; stroke: #bdc3c7; stroke-width: 1; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .anim-rotate { animation: rotateIn 1s ease-out forwards; transform-origin: 150px 140px; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1s; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Consistency Models &amp; Replication</text>
  <line x1="80" y1="38" x2="340" y2="38" stroke="#3498db" stroke-width="2" class="anim-fade delay-1"/>
  
  <!-- CAP Triangle -->
  <g transform="translate(30, 60)" data-narration="CAP Theorem shows trade-offs between Consistency, Availability, and Partition Tolerance. Only 2 of 3 can be guaranteed simultaneously.">
    <text x="85" y="0" text-anchor="middle" class="label anim-fade delay-1">CAP Theorem</text>
    
    <!-- Triangle circles -->
    <circle cx="85" cy="45" r="38" fill="url(#consistencyGrad)" class="anim-rotate delay-2" filter="url(#shadow)"/>
    <text x="85" y="48" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c5aa0">C</text>
    
    <circle cx="140" cy="130" r="38" fill="url(#availabilityGrad)" class="anim-rotate delay-3" filter="url(#shadow)"/>
    <text x="140" y="133" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1e8449">A</text>
    
    <circle cx="30" cy="130" r="38" fill="url(#partitionGrad)" class="anim-rotate delay-4" filter="url(#shadow)"/>
    <text x="30" y="133" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#9c4a1e">P</text>
    
    <!-- Center label -->
    <circle cx="85" cy="95" r="22" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="85" y="99" text-anchor="middle" class="detail" font-weight="600">Pick 2</text>
  </g>
  
  <!-- Consistency Models Box -->
  <g transform="translate(200, 60)" data-narration="Strong Consistency provides linearizability - all operations appear instant. Eventual Consistency allows temporary divergence but guarantees convergence.">
    <rect x="0" y="0" width="195" height="145" fill="#fff" class="section-box" filter="url(#shadow)"/>
    <text x="97" y="20" text-anchor="middle" class="label anim-fade delay-2">Consistency Models</text>
    
    <rect x="8" y="30" width="88" height="50" fill="#e8f4fc" rx="4" ry="4"/>
    <text x="52" y="45" text-anchor="middle" class="detail" font-weight="600">Strong</text>
    <text x="52" y="60" text-anchor="middle" class="detail" font-size="10">Linearizability</text>
    <text x="52" y="73" text-anchor="middle" class="detail" font-size="9">Instant visibility</text>
    
    <rect x="100" y="30" width="88" height="50" fill="#e8fcf4" rx="4" ry="4"/>
    <text x="144" y="45" text-anchor="middle" class="detail" font-weight="600">Eventual</text>
    <text x="144" y="60" text-anchor="middle" class="detail" font-size="10">Convergence</text>
    <text x="144" y="73" text-anchor="middle" class="detail" font-size="9">DNS, DynamoDB</text>
    
    <rect x="8" y="85" width="88" height="50" fill="#f5f0ff" rx="4" ry="4"/>
    <text x="52" y="100" text-anchor="middle" class="detail" font-weight="600">Causal</text>
    <text x="52" y="115" text-anchor="middle" class="detail" font-size="10">Happens-before</text>
    <text x="52" y="128" text-anchor="middle" class="detail" font-size="9">Vector clocks</text>
    
    <rect x="100" y="85" width="88" height="50" fill="#fff8e8" rx="4" ry="4"/>
    <text x="144" y="100" text-anchor="middle" class="detail" font-weight="600">Sequential</text>
    <text x="144" y="115" text-anchor="middle" class="detail" font-size="10">Program order</text>
    <text x="144" y="128" text-anchor="middle" class="detail" font-size="9">CPU memory</text>
  </g>
  
  <!-- Replication Strategies -->
  <g transform="translate(30, 240)" data-narration="Replication strategies determine how updates propagate: Active sends to all replicas, Passive uses primary-backup, Quorum requires majority agreement.">
    <rect x="0" y="0" width="365" height="80" fill="#fff" class="section-box" filter="url(#shadow)"/>
    <text x="182" y="18" text-anchor="middle" class="label anim-fade delay-3">Replication Strategies</text>
    
    <g transform="translate(15, 30)">
      <circle cx="15" cy="15" r="12" fill="#b8d4f0" class="anim-pulse"/>
      <text x="15" y="19" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2c5aa0">1</text>
      <text x="40" y="19" class="detail" font-weight="600">Active</text>
      <text x="40" y="32" class="detail" font-size="10">All replicas process ops</text>
    </g>
    
    <g transform="translate(135, 30)">
      <circle cx="15" cy="15" r="12" fill="#c8f0c8" class="anim-pulse delay-1"/>
      <text x="15" y="19" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1e8449">2</text>
      <text x="40" y="19" class="detail" font-weight="600">Passive</text>
      <text x="40" y="32" class="detail" font-size="10">Primary-backup model</text>
    </g>
    
    <g transform="translate(255, 30)">
      <circle cx="15" cy="15" r="12" fill="#f0d4b8" class="anim-pulse delay-2"/>
      <text x="15" y="19" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#9c4a1e">3</text>
      <text x="40" y="19" class="detail" font-weight="600">Quorum</text>
      <text x="40" y="32" class="detail" font-size="10">NWR, majority wins</text>
    </g>
  </g>
  
  <!-- Arrow connecting sections -->
  <path d="M 145 205 L 145 230" stroke="#3498db" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" class="anim-fade delay-4"/>
  
  <!-- Bottom notes -->
  <g transform="translate(30, 330)" data-narration="Modern systems often use hybrid approaches - Cassandra uses eventual with tunable consistency, DynamoDB provides both strong and eventual modes.">
    <rect x="0" y="0" width="365" height="55" fill="#f8f9fa" rx="6" ry="6" stroke="#e0e0e0"/>
    <text x="15" y="18" class="detail" font-weight="600" fill="#2c3e50">Modern Systems:</text>
    <text x="15" y="35" class="detail" fill="#5d6d7e">• DynamoDB, Cassandra: Hybrid AP/CP models</text>
    <text x="15" y="48" class="detail" fill="#5d6d7e">• CRDTs enable conflict-free sync in eventual consistency</text>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="400" cy="20" r="8" fill="#3498db" opacity="0.3" class="anim-pulse"/>
  <circle cx="20" cy="380" r="6" fill="#9b59b6" opacity="0.3" class="anim-pulse delay-2"/>
  <circle cx="400" cy="380" r="7" fill="#27ae60" opacity="0.3" class="anim-pulse delay-4"/>
</svg>