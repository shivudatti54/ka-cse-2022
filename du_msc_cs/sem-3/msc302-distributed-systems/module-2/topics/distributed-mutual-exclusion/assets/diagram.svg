<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="distributed-mutual-exclusion" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5ddf2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90c2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tokenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9c74f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3722c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes requestMove {
      0% { opacity: 0; transform: translate(0, 0); }
      20% { opacity: 1; }
      100% { opacity: 1; transform: translate(var(--tx), var(--ty)); }
    }
    @keyframes replyMove {
      0% { opacity: 0; transform: translate(0, 0); }
      20% { opacity: 1; }
      100% { opacity: 1; transform: translate(var(--tx), var(--ty)); }
    }
    @keyframes tokenPulse {
      0%, 100% { r: 12; opacity: 1; }
      50% { r: 16; opacity: 0.8; }
    }
    .section-1 { animation: fadeIn 0.8s ease-out forwards; }
    .section-2 { animation: slideInLeft 0.6s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInRight 0.6s ease-out 0.5s forwards; opacity: 0; }
    .section-4 { animation: slideInUp 0.6s ease-out 0.7s forwards; opacity: 0; }
    .section-5 { animation: slideInUp 0.6s ease-out 0.9s forwards; opacity: 0; }
    .section-6 { animation: fadeIn 0.6s ease-out 1.1s forwards; opacity: 0; }
    .process-node { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .request-msg { animation: requestMove 1.5s ease-out forwards; }
    .reply-msg { animation: replyMove 1.5s ease-out forwards; }
    .token { animation: tokenPulse 2s ease-in-out infinite; }
    .title { font-family: Georgia, serif; font-weight: bold; }
    .label { font-family: Arial, sans-serif; }
    .detail { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title Section -->
  <g class="section-1" data-narration="Title introducing Distributed Mutual Exclusion concept">
    <text x="210" y="30" text-anchor="middle" font-size="20" fill="#2c5282" class="title">Distributed Mutual</text>
    <text x="210" y="52" text-anchor="middle" font-size="20" fill="#2c5282" class="title">Exclusion</text>
    <line x1="100" y1="65" x2="320" y2="65" stroke="#4a90c2" stroke-width="2" />
  </g>
  
  <!-- Process Nodes -->
  <g class="section-2" data-narration="Four process nodes P1, P2, P3, P4 in the distributed system">
    <!-- P1 -->
    <circle cx="80" cy="130" r="28" fill="url(#processGradient)" filter="url(#shadow)" class="process-node" />
    <text x="80" y="125" text-anchor="middle" font-size="14" fill="white" font-weight="bold">P1</text>
    <text x="80" y="142" text-anchor="middle" font-size="10" fill="white">ts:10</text>
    
    <!-- P2 -->
    <circle cx="200" cy="100" r="28" fill="url(#processGradient)" filter="url(#shadow)" class="process-node" style="animation-delay: 0.5s" />
    <text x="200" y="95" text-anchor="middle" font-size="14" fill="white" font-weight="bold">P2</text>
    <text x="200" y="112" text-anchor="middle" font-size="10" fill="white">ts:15</text>
    
    <!-- P3 -->
    <circle cx="320" cy="130" r="28" fill="url(#processGradient)" filter="url(#shadow)" class="process-node" style="animation-delay: 1s" />
    <text x="320" y="125" text-anchor="middle" font-size="14" fill="white" font-weight="bold">P3</text>
    <text x="320" y="142" text-anchor="middle" font-size="10" fill="white">ts:12</text>
    
    <!-- P4 -->
    <circle cx="200" cy="200" r="28" fill="url(#processGradient)" filter="url(#shadow)" class="process-node" style="animation-delay: 1.5s" />
    <text x="200" y="195" text-anchor="middle" font-size="14" fill="white" font-weight="bold">P4</text>
    <text x="200" y="212" text-anchor="middle" font-size="10" fill="white">ts:18</text>
  </g>
  
  <!-- REQUEST Broadcast -->
  <g class="section-3" data-narration="P1 broadcasts REQUEST message to all other processes">
    <text x="210" y="260" text-anchor="middle" font-size="12" fill="#c53030" font-weight="bold">REQUEST (ts=10) Broadcast</text>
    
    <!-- REQUEST arrows from P1 -->
    <g style="--tx: 120px; --ty: 0px;">
      <line x1="100" y1="145" x2="180" y2="145" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3" class="request-msg" />
      <polygon points="180,140 195,145 180,150" fill="#e53e3e" class="request-msg" />
      <text x="140" y="138" font-size="9" fill="#c53030">REQ</text>
    </g>
    
    <g style="--tx: 240px; --ty: 0px;">
      <line x1="100" y1="145" x2="220" y2="145" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3" class="request-msg" style="animation-delay: 0.3s" />
      <polygon points="220,140 235,145 220,150" fill="#e53e3e" class="request-msg" style="animation-delay: 0.3s" />
    </g>
    
    <g style="--tx: 120px; --ty: 70px;">
      <line x1="100" y1="145" x2="140" y2="185" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,3" class="request-msg" style="animation-delay: 0.6s" />
      <polygon points="135,180 145,195 155,182" fill="#e53e3e" class="request-msg" style="animation-delay: 0.6s" />
    </g>
  </g>
  
  <!-- REPLY Collection -->
  <g class="section-4" data-narration="Processes send REPLY messages back to P1 after timestamp comparison">
    <text x="210" y="285" text-anchor="middle" font-size="12" fill="#276749" font-weight="bold">REPLY Collection (ts=10 &lt; others)</text>
    
    <!-- REPLY arrows to P1 -->
    <g style="--tx: -120px; --ty: 0px;">
      <line x1="220" y1="115" x2="140" y2="115" stroke="#38a169" stroke-width="2" stroke-dasharray="5,3" class="reply-msg" style="animation-delay: 0.2s" />
      <polygon points="140,110 125,115 140,120" fill="#38a169" class="reply-msg" style="animation-delay: 0.2s" />
      <text x="170" y="108" font-size="9" fill="#276749">REP</text>
    </g>
    
    <g style="--tx: -220px; --ty: 0px;">
      <line x1="340" y1="145" x2="260" y2="145" stroke="#38a169" stroke-width="2" stroke-dasharray="5,3" class="reply-msg" style="animation-delay: 0.4s" />
      <polygon points="260,140 245,145 260,150" fill="#38a169" class="reply-msg" style="animation-delay: 0.4s" />
    </g>
    
    <g style="--tx: -100px; --ty: -70px;">
      <line x1="180" y1="185" x2="140" y2="155" stroke="#38a169" stroke-width="2" stroke-dasharray="5,3" class="reply-msg" style="animation-delay: 0.6s" />
      <polygon points="145,158 135,148 152,152" fill="#38a169" class="reply-msg" style="animation-delay: 0.6s" />
    </g>
  </g>
  
  <!-- Critical Section -->
  <g class="section-5" data-narration="P1 enters Critical Section after receiving all REPLY messages">
    <rect x="280" y="300" width="120" height="40" rx="8" fill="#faf5ff" stroke="#805ad5" stroke-width="2" />
    <text x="340" y="318" text-anchor="middle" font-size="12" fill="#553c9a" font-weight="bold">Critical Section</text>
    <text x="340" y="332" text-anchor="middle" font-size="10" fill="#6b46c1">P1 Entered!</text>
    
    <!-- Token indicator -->
    <circle cx="295" cy="320" r="12" fill="url(#tokenGradient)" class="token" />
    <text x="295" y="324" text-anchor="middle" font-size="10" fill="white" font-weight="bold">T</text>
  </g>
  
  <!-- Key Algorithms Box -->
  <g class="section-6" data-narration="Key algorithms summary: Lamport, Ricart-Agrawala, Maekawa, Token-Based">
    <rect x="10" y="350" width="180" height="40" rx="5" fill="white" stroke="#4a90c2" stroke-width="1" opacity="0.9" />
    <text x="20" y="365" font-size="10" fill="#2c5282" font-weight="bold">Key Algorithms:</text>
    <text x="20" y="380" font-size="9" fill="#4a5568">• Lamport • Ricart-Agrawala</text>
    <text x="115" y="380" font-size="9" fill="#4a5568">• Maekawa • Token</text>
    
    <rect x="200" y="350" width="80" height="40" rx="5" fill="white" stroke="#38a169" stroke-width="1" opacity="0.9" />
    <text x="240" y="365" text-anchor="middle" font-size="10" fill="#276749" font-weight="bold">Message:</text>
    <text x="240" y="380" text-anchor="middle" font-size="9" fill="#38a169">2(N-1) msgs</text>
    
    <rect x="290" y="350" width="120" height="40" rx="5" fill="white" stroke="#e53e3e" stroke-width="1" opacity="0.9" />
    <text x="350" y="365" text-anchor="middle" font-size="10" fill="#c53030" font-weight="bold">Critical Section:</text>
    <text x="350" y="380" text-anchor="middle" font-size="9" fill="#e53e3e">Mutual Exclusion</text>
  </g>
</svg>