<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="clock-synchronization">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eaf2f8"/>
      <stop offset="50%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#f3e5f5"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bbdefb"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#ab47bc"/>
    </linearGradient>
    <linearGradient id="infoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#fff59d"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5c6bc0"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes moveArrow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .title { animation: fadeIn 0.8s ease-out; }
    .client-box { animation: slideInLeft 0.7s ease-out; }
    .server-box { animation: slideInRight 0.7s ease-out; }
    .info-box { animation: fadeIn 1s ease-out; }
    .arrow-req { animation: pulse 2s infinite; }
    .arrow-resp { animation: pulse 2s infinite 0.3s; }
    .time-label { animation: fadeIn 1.2s ease-out; }
    .pulse-circle { animation: pulse 1.5s infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#37474f" class="title">Clock Synchronization</text>
  <text x="210" y="46" text-anchor="middle" font-size="12" fill="#546e7a">Cristian's Algorithm Flow</text>
  
  <!-- Client Section -->
  <g class="client-box" data-narration="Client node initiates time request">
    <rect x="30" y="90" width="130" height="90" rx="10" fill="url(#clientGrad)" stroke="#1976d2" stroke-width="2"/>
    <circle cx="95" cy="130" r="20" fill="#fff" stroke="#1976d2" stroke-width="2" class="pulse-circle"/>
    <text x="95" y="136" text-anchor="middle" font-size="24" fill="#1565c0">C</text>
    <text x="95" y="165" text-anchor="middle" font-size="12" fill="#0d47a1">Client Node</text>
    <text x="95" y="200" text-anchor="middle" font-size="11" fill="#1565c0" class="time-label">T1: Send Request</text>
  </g>
  
  <!-- Server Section -->
  <g class="server-box" data-narration="Time server responds with current time">
    <rect x="260" y="90" width="130" height="90" rx="10" fill="url(#serverGrad)" stroke="#7b1fa2" stroke-width="2"/>
    <circle cx="325" cy="130" r="20" fill="#fff" stroke="#7b1fa2" stroke-width="2" class="pulse-circle"/>
    <text x="325" y="136" text-anchor="middle" font-size="24" fill="#6a1b9a">S</text>
    <text x="325" y="165" text-anchor="middle" font-size="12" fill="#4a148c">Time Server</text>
    <text x="325" y="200" text-anchor="middle" font-size="11" fill="#6a1b9a" class="time-label">T2: Server Time</text>
  </g>
  
  <!-- Arrows -->
  <g data-narration="Network request with round-trip delay">
    <line x1="160" y1="135" x2="250" y2="135" stroke="#5c6bc0" stroke-width="3" marker-end="url(#arrowHead)" class="arrow-req"/>
    <text x="205" y="125" text-anchor="middle" font-size="10" fill="#5c6bc0">Request</text>
  </g>
  
  <g data-narration="Server returns time with T2 and T3 timestamps">
    <line x1="260" y1="135" x2="160" y2="135" stroke="#5c6bc0" stroke-width="3" marker-end="url(#arrowHead)" class="arrow-resp"/>
    <text x="210" y="155" text-anchor="middle" font-size="10" fill="#5c6bc0">Response (T2, T3)</text>
  </g>
  
  <!-- Timeline visualization -->
  <g class="info-box" data-narration="Time calculation explanation">
    <rect x="30" y="210" width="360" height="70" rx="8" fill="url(#infoGrad)" stroke="#fbc02d" stroke-width="1.5"/>
    <text x="210" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#f57f17">Latency Calculation</text>
    <text x="210" y="252" text-anchor="middle" font-size="11" fill="#e65100">Round-trip delay = T3 - T1</text>
    <text x="210" y="268" text-anchor="middle" font-size="11" fill="#e65100">Estimated one-way = (T3 - T1) / 2</text>
    <text x="210" y="282" text-anchor="middle" font-size="11" fill="#e65100">Corrected Time = T2 + (T3 - T1) / 2</text>
  </g>
  
  <!-- Key Concepts -->
  <g data-narration="Key concepts summary">
    <rect x="30" y="295" width="360" height="95" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="210" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Key Concepts</text>
    <text x="45" y="335" font-size="10" fill="#1b5e20">• Cristian's Algorithm: Client-server sync</text>
    <text x="45" y="352" font-size="10" fill="#1b5e20">• NTP: Hierarchical time protocol</text>
    <text x="45" y="369" font-size="10" fill="#1b5e20">• Lamport Clocks: Logical ordering</text>
    <text x="45" y="386" font-size="10" fill="#1b5e20">• Vector Clocks: Causal history</text  ></g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="385" r="8" fill="#b39ddb" opacity="0.6"/>
  <circle cx="25" cy="25" r="6" fill="#90caf9" opacity="0.6"/>
  <circle cx="410" cy="50" r="4" fill="#f48fb1" opacity="0.5"/>
</svg>