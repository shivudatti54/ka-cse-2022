<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="container-orchestration-kubernetes" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="masterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="workerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9ed4a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7bc288;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="podGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b09bc4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #fff; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #fff; }
    .concept-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #2d3748; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .opacity-0 { opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Kubernetes Architecture</text>
  
  <!-- Master Node -->
  <g class="slide-left delay-1 opacity-0" filter="url(#shadow)">
    <rect x="20" y="55" width="160" height="140" rx="8" fill="url(#masterGradient)"/>
    <text x="100" y="75" text-anchor="middle" class="label">Master Node</text>
    <rect x="30" y="85" width="140" height="30" rx="4" fill="#4a7aa8" data-narration="API Server - The entry point for all cluster operations"/>
    <text x="100" y="105" text-anchor="middle" class="detail">API Server</text>
    <rect x="30" y="120" width="140" height="30" rx="4" fill="#4a7aa8" data-narration="etcd - Distributed key-value store for cluster state"/>
    <text x="100" y="140" text-anchor="middle" class="detail">etcd</text>
    <rect x="30" y="155" width="140" height="30" rx="4" fill="#4a7aa8" data-narration="Scheduler - Assigns Pods to worker nodes"/>
    <text x="100" y="175" text-anchor="middle" class="detail">Scheduler</text>
  </g>
  
  <!-- Worker Node -->
  <g class="slide-right delay-2 opacity-0" filter="url(#shadow)">
    <rect x="200" y="55" width="200" height="180" rx="8" fill="url(#workerGradient)"/>
    <text x="300" y="75" text-anchor="middle" class="label">Worker Node</text>
    
    <!-- Kubelet -->
    <rect x="210" y="85" width="180" height="25" rx="4" fill="#5a9e6c" data-narration="Kubelet - Agent managing pod lifecycle on the node"/>
    <text x="300" y="102" text-anchor="middle" class="detail">Kubelet</text>
    
    <!-- Pod 1 -->
    <g class="float delay-3">
      <rect x="210" y="115" width="85" height="55" rx="5" fill="url(#podGradient)" data-narration="Pod - Smallest deployable unit containing containers"/>
      <text x="252" y="135" text-anchor="middle" class="concept-label">Pod 1</text>
      <text x="252" y="150" text-anchor="middle" class="detail" fill="#fff" font-size="9">Container</text>
    </g>
    
    <!-- Pod 2 -->
    <g class="float delay-4">
      <rect x="305" y="115" width="85" height="55" rx="5" fill="url(#podGradient)" data-narration="Pods share storage and network within the node"/>
      <text x="347" y="135" text-anchor="middle" class="concept-label">Pod 2</text>
      <text x="347" y="150" text-anchor="middle" class="detail" fill="#fff" font-size="9">Container</text>
    </g>
    
    <!-- Pod 3 -->
    <g class="float">
      <rect x="210" y="175" width="180" height="50" rx="5" fill="url(#podGradient)" data-narration="Horizontal Pod Autoscaler scales pods based on metrics"/>
      <text x="300" y="195" text-anchor="middle" class="concept-label">Pod ReplicaSet</text>
      <text x="300" y="210" text-anchor="middle" class="detail" fill="#fff" font-size="9">Auto-scaling Pods</text>
    </g>
  </g>
  
  <!-- Service -->
  <g class="slide-up delay-2 opacity-0" filter="url(#shadow)">
    <rect x="20" y="210" width="160" height="60" rx="8" fill="#e8b8d4"/>
    <text x="100" y="230" text-anchor="middle" class="concept-label">Service</text>
    <text x="100" y="248" text-anchor="middle" class="detail" fill="#5a4a5a" font-size="10">Load Balancer / ClusterIP</text>
  </g>
  
  <!-- Namespace -->
  <g class="slide-up delay-3 opacity-0" filter="url(#shadow)">
    <rect x="200" y="250" width="200" height="50" rx="8" fill="#f7d9a8"/>
    <text x="300" y="270" text-anchor="middle" class="concept-label">Namespace</text>
    <text x="300" y="287" text-anchor="middle" class="detail" fill="#5a4a2a" font-size="10">Virtual cluster isolation</text>
  </g>
  
  <!-- Arrows -->
  <g class="fade-in delay-4 opacity-0">
    <!-- API Server to Kubelet -->
    <path d="M180 130 Q 190 130 200 130" stroke="#c53030" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="197,125 207,130 197,135" fill="#c53030"/>
    <text x="185" y="122" font-size="9" fill="#c53030">Control</text>
    
    <!-- Service to Pods -->
    <path d="M180 240 Q 220 200 250 200" stroke="#2d3748" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <polygon points="247,196 255,200 247,204" fill="#2d3748"/>
    
    <!-- Pods to Service -->
    <path d="M300 170 Q 300 200 250 235" stroke="#2d3748" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="slide-up delay-4 opacity-0" filter="url(#shadow)">
    <rect x="20" y="285" width="380" height="100" rx="8" fill="#fff" stroke="#cbd5e0" stroke-width="2"/>
    <text x="30" y="305" class="concept-label" fill="#2c5282">Key Concepts:</text>
    <text x="30" y="325" font-size="11" fill="#4a5568">• Pod: Smallest deployable unit with shared storage/network</text>
    <text x="30" y="342" font-size="11" fill="#4a5568">• Deployment: Declarative updates for pods with rollouts</text>
    <text x="30" y="359" font-size="11" fill="#4a5568">• Service: Abstract way to expose applications on pods</text>
    <text x="30" y="376" font-size="11" fill="#4a5568">• etcd: Cluster state storage; Scheduler: Pod assignment</text>
  </g>
  
  <!-- HPA indicator -->
  <g class="pulse">
    <circle cx="380" cy="180" r="15" fill="#ed8936" opacity="0.8"/>
    <text x="380" y="184" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">HPA</text>
  </g>
</svg>