<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="distributed-storage-systems">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dde8"/>
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9fd4"/>
      <stop offset="100%" style="stop-color:#3a7ca5"/>
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb87c"/>
      <stop offset="100%" style="stop-color:#4a9a4a"/>
    </linearGradient>
    <linearGradient id="metaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a855"/>
      <stop offset="100%" style="stop-color:#b8893a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: slideIn 0.8s ease-out; }
    .client-node { animation: fadeIn 0.6s ease-out 0.2s both; }
    .meta-node { animation: fadeIn 0.6s ease-out 0.4s both; }
    .data-node { animation: fadeIn 0.6s ease-out 0.6s both; }
    .concept-box { animation: fadeIn 0.6s ease-out 0.8s both; }
    .arrow { animation: arrowPulse 2s infinite; }
    .node-label { font-family: Arial, sans-serif; font-size: 12px; fill: white; }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c5282; }
    .concept-title { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #2d3748; }
    .concept-text { font-family: Arial, sans-serif; font-size: 9px; fill: #4a5568; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text title">Distributed Storage Systems</text>
  
  <!-- Client Node -->
  <g class="client-node" filter="url(#shadow)">
    <ellipse cx="60" cy="120" rx="35" ry="25" fill="url(#clientGradient)"/>
    <text x="60" y="115" text-anchor="middle" class="node-label" font-weight="bold">Client</text>
    <text x="60" y="130" text-anchor="middle" class="node-label" font-size="10">Application</text>
  </g>
  
  <!-- Metadata Server -->
  <g class="meta-node" filter="url(#shadow)" data-narration="Metadata Server manages partition mapping and location information">
    <rect x="160" y="95" width="70" height="50" rx="8" fill="url(#metaGradient)"/>
    <text x="195" y="118" text-anchor="middle" class="node-label" font-weight="bold">Metadata</text>
    <text x="195" y="133" text-anchor="middle" class="node-label" font-size="10">Server</text>
  </g>
  
  <!-- Data Nodes -->
  <g class="data-node" filter="url(#shadow)">
    <ellipse cx="320" cy="80" rx="35" ry="25" fill="url(#nodeGradient)"/>
    <text x="320" y="75" text-anchor="middle" class="node-label" font-weight="bold">Node 1</text>
    <text x="320" y="90" text-anchor="middle" class="node-label" font-size="10">Replica A</text>
  </g>
  <g class="data-node" filter="url(#shadow)">
    <ellipse cx="320" cy="160" rx="35" ry="25" fill="url(#nodeGradient)"/>
    <text x="320" y="155" text-anchor="middle" class="node-label" font-weight="bold">Node 2</text>
    <text x="320" y="170" text-anchor="middle" class="node-label" font-size="10">Replica B</text>
  </g>
  <g class="data-node" filter="url(#shadow)">
    <ellipse cx="320" cy="240" rx="35" ry="25" fill="url(#nodeGradient)"/>
    <text x="320" y="235" text-anchor="middle" class="node-label" font-weight="bold">Node 3</text>
    <text x="320" y="250" text-anchor="middle" class="node-label" font-size="10">Replica C</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow">
    <path d="M95 120 L155 120" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M230 120 L280 80" stroke="#4a5568" stroke-width="2" fill="none"/>
    <path d="M230 120 L280 160" stroke="#4a5568" stroke-width="2" fill="none"/>
    <path d="M230 120 L280 240" stroke="#4a5568" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Replication Arrows between data nodes -->
  <g class="arrow">
    <path d="M355 95 L355 135" stroke="#48bb78" stroke-width="1.5" fill="none" stroke-dasharray="4"/>
    <path d="M355 175 L355 215" stroke="#48bb78" stroke-width="1.5" fill="none" stroke-dasharray="4"/>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <!-- Concept Boxes -->
  <g class="concept-box" filter="url(#shadow)">
    <rect x="10" y="300" width="120" height="85" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="70" y="318" text-anchor="middle" class="concept-title">Data Partitioning</text>
    <text x="20" y="335" class="concept-text">• Consistent Hashing</text>
    <text x="20" y="350" class="concept-text">• Virtual Nodes</text>
    <text x="20" y="365" class="concept-text">• Range & Hash Sharding</text>
    <text x="20" y="380" class="concept-text">• Rebalancing</text>
  </g>
  
  <g class="concept-box" filter="url(#shadow)">
    <rect x="140" y="300" width="130" height="85" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="205" y="318" text-anchor="middle" class="concept-title">Replication</text>
    <text x="150" y="335" class="concept-text">• Leader-Follower</text>
    <text x="150" y="350" class="concept-text">• Multi-Leader</text>
    <text x="150" y="365" class="concept-text">• Chain Replication</text>
    <text x="150" y="380" class="concept-text">• Quorum: R+W>N</text>
  </g>
  
  <g class="concept-box" filter="url(#shadow)">
    <rect x="280" y="300" width="130" height="85" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="345" y="318" text-anchor="middle" class="concept-title">Consistency</text>
    <text x="290" y="335" class="concept-text">• Linearizability</text>
    <text x="290" y="350" class="concept-text">• Eventual</text>
    <text x="290" y="365" class="concept-text">• Vector Clocks</text>
    <text x="290" y="380" class="concept-text">• CRDTs</text>
  </g>
  
  <!-- Quorum indicator -->
  <g class="data-node" data-narration="Quorum system ensures strong consistency when R + W > N">
    <circle cx="195" cy="200" r="25" fill="#ebf8ff" stroke="#4299e1" stroke-width="2" stroke-dasharray="4"/>
    <text x="195" y="195" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b6cb0">Quorum</text>
    <text x="195" y="210" text-anchor="middle" font-size="9" fill="#2c5282">R+W&gt;N</text>
  </g>
  
  <!-- CAP Theorem indicator -->
  <g class="concept-box" data-narration="CAP Theorem: Systems must trade off between Consistency, Availability, and Partition Tolerance">
    <rect x="280" y="175" width="60" height="30" rx="4" fill="#fffaf0" stroke="#ed8936" stroke-width="1"/>
    <text x="310" y="185" text-anchor="middle" font-size="8" font-weight="bold" fill="#c05621">CAP</text>
    <text x="310" y="198" text-anchor="middle" font-size="7" fill="#c05621">Trade-off</text>
  </g>
  
  <!-- Replication label -->
  <text x="370" y="125" class="concept-text" font-size="8" fill="#276749">Replication</text>
  <text x="370" y="205" class="concept-text" font-size="8" fill="#276749">Replication</text>
</svg>