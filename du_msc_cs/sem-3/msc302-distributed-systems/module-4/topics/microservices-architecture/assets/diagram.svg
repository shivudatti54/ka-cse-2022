<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="microservices-architecture">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe6f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90c2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="registryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a9c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6dad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9fd5d1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5cb8b0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #2c3e50; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #555; }
    .concept-box { animation: fadeIn 0.8s ease-out forwards; }
    .service-instance { animation: slideInRight 0.6s ease-out forwards; }
    .client-box { animation: slideInLeft 0.6s ease-out forwards; }
    .registry-box { animation: slideInDown 0.6s ease-out forwards; }
    .arrow-line { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .heartbeat-anim { animation: heartbeat 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Microservices Architecture</text>
  <text x="210" y="50" text-anchor="middle" class="detail">Service Discovery Pattern</text>
  
  <!-- Service Registry -->
  <g class="registry-box" data-narration="Service Registry: The central registry that maintains a dynamic list of available service instances">
    <rect x="150" y="70" width="120" height="90" rx="8" fill="url(#registryGradient)" filter="url(#shadow)"/>
    <text x="210" y="100" text-anchor="middle" class="label" fill="white">Service Registry</text>
    <text x="210" y="120" text-anchor="middle" class="detail" fill="#f5f5f5">Eureka / Consul</text>
    <g class="heartbeat-anim">
      <circle cx="210" cy="140" r="8" fill="white" opacity="0.8"/>
      <circle cx="210" cy="140" r="4" fill="#8b6dad"/>
    </g>
  </g>
  
  <!-- Client / API Consumer -->
  <g class="client-box" data-narration="Client: The API consumer that queries the registry to discover available services">
    <rect x="30" y="200" width="100" height="70" rx="8" fill="url(#clientGradient)" filter="url(#shadow)"/>
    <text x="80" y="225" text-anchor="middle" class="label" fill="white">Client</text>
    <text x="80" y="245" text-anchor="middle" class="detail" fill="#f5f5f5">API Consumer</text>
    <rect x="70" y="255" width="20" height="10" rx="2" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Service Instance 1 -->
  <g class="service-instance" data-narration="Service Instance 1: Registers with registry and handles requests" style="animation-delay: 0.2s">
    <rect x="260" y="190" width="130" height="55" rx="6" fill="url(#serviceGradient)" filter="url(#shadow)"/>
    <text x="325" y="215" text-anchor="middle" class="label" fill="white">Order Service</text>
    <text x="325" y="232" text-anchor="middle" class="detail" fill="#f0f8ff">Instance: 192.168.1.10</text>
    <circle cx="295" cy="225" r="4" fill="white" class="pulse-anim"/>
  </g>
  
  <!-- Service Instance 2 -->
  <g class="service-instance" data-narration="Service Instance 2: Multiple instances provide scalability and resilience" style="animation-delay: 0.4s">
    <rect x="260" y="255" width="130" height="55" rx="6" fill="url(#serviceGradient)" filter="url(#shadow)"/>
    <text x="325" y="280" text-anchor="middle" class="label" fill="white">User Service</text>
    <text x="325" y="297" text-anchor="middle" class="detail" fill="#f0f8ff">Instance: 192.168.1.11</text>
    <circle cx="295" cy="290" r="4" fill="white" class="pulse-anim" style="animation-delay: 0.3s"/>
  </g>
  
  <!-- Service Instance 3 -->
  <g class="service-instance" data-narration="Service Instance 3: Additional service handling different business domains" style="animation-delay: 0.6s">
    <rect x="260" y="320" width="130" height="55" rx="6" fill="url(#serviceGradient)" filter="url(#shadow)"/>
    <text x="325" y="345" text-anchor="middle" class="label" fill="white">Payment Service</text>
    <text x="325" y="362" text-anchor="middle" class="detail" fill="#f0f8ff">Instance: 192.168.1.12</text>
    <circle cx="295" cy="355" r="4" fill="white" class="pulse-anim" style="animation-delay: 0.6s"/>
  </g>
  
  <!-- Arrows -->
  <!-- Client to Registry -->
  <path d="M130 235 L150 115" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line"/>
  <text x="125" y="180" class="detail" transform="rotate(-45 125 180)">1. Query</text>
  
  <!-- Registry to Client -->
  <path d="M150 115 L130 235" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line" style="animation-delay: 0.5s"/>
  <text x="135" y="170" class="detail" transform="rotate(-45 135 170)">2. Response</text>
  
  <!-- Registry to Services -->
  <path d="M210 160 L260 217" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line" style="animation-delay: 0.3s"/>
  <path d="M210 160 L260 282" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line" style="animation-delay: 0.5s"/>
  <path d="M210 160 L260 347" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow-line" style="animation-delay: 0.7s"/>
  <text x="225" y="175" class="detail">3. Route</text>
  
  <!-- Client to Service -->
  <path d="M130 255 L255 217" stroke="#4a90c2" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowhead)" class="arrow-line" style="animation-delay: 0.8s"/>
  <text x="170" y="250" class="detail" fill="#4a90c2">4. Direct Call</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key Concepts: Client-side discovery allows services to find each other without a central load balancer" style="animation-delay: 0.5s">
    <rect x="10" y="360" width="130" height="30" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="25" y="375" class="detail" font-weight="600">Client-Side Discovery</text>
  </g>
  
  <g class="concept-box" data-narration="Benefits: Independent scaling, fault isolation, and polyglot technology support" style="animation-delay: 0.7s">
    <rect x="150" y="360" width="130" height="30" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="165" y="375" class="detail" font-weight="600">Independent Scaling</text>
  </g>
  
  <g class="concept-box" data-narration="Challenges: Service registry management, health checks, and network latency" style="animation-delay: 0.9s">
    <rect x="290" y="360" width="120" height="30" rx="4" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="305" y="375" class="detail" font-weight="600">Registry Mgmt</text>
  </g>
  
  <!-- Flow indicator dots -->
  <circle cx="130" cy="200" r="3" fill="#5cb8b0">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="150" r="3" fill="#8b6dad">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="140" r="3" fill="#7eb8da">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="170" r="3" fill="#4a90c2">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
</svg>