<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="object-detection-rcnn-yolo">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f5e6d3"/>
    </linearGradient>
    <linearGradient id="rcnnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cce5ff"/>
      <stop offset="100%" style="stop-color:#99caff"/>
    </linearGradient>
    <linearGradient id="yoloGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="100%" style="stop-color:#b8e0b8"/>
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd"/>
      <stop offset="100%" style="stop-color:#ffeeba"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .section-rcnn { animation: slideInLeft 0.8s ease-out 0.2s forwards; opacity: 0; }
    .section-yolo { animation: slideInRight 0.8s ease-out 0.4s forwards; opacity: 0; }
    .section-key { animation: slideInUp 0.8s ease-out 0.6s forwards; opacity: 0; }
    .grid-cell { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .label-text { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" font-size="18" fill="#2c5282">Object Detection: R-CNN vs YOLO</text>
  <line x1="50" y1="38" x2="370" y2="38" stroke="#4a5568" stroke-width="1" class="title" opacity="0.5"/>
  
  <!-- R-CNN Section -->
  <g class="section-rcnn" data-narration="R-CNN uses region proposals - selective search generates ~2000 proposals, then CNN extracts features for classification">
    <rect x="20" y="55" width="180" height="140" rx="8" fill="url(#rcnnGradient)" filter="url(#shadow)"/>
    <text x="110" y="75" text-anchor="middle" class="title-text" font-size="14" fill="#1a365d">R-CNN Approach</text>
    
    <!-- Region proposals visualization -->
    <rect x="35" y="85" width="60" height="60" fill="#fff" stroke="#3182ce" stroke-width="2" rx="4"/>
    <rect x="40" y="90" width="20" height="20" fill="none" stroke="#3182ce" stroke-width="1" rx="2"/>
    <rect x="65" y="95" width="25" height="25" fill="none" stroke="#3182ce" stroke-width="1" rx="2"/>
    <rect x="38" y="115" width="30" height="22" fill="none" stroke="#3182ce" stroke-width="1" rx="2"/>
    
    <text x="110" y="160" text-anchor="middle" font-size="11" fill="#2c5282">~2000 Region Proposals</text>
    <text x="110" y="175" text-anchor="middle" font-size="10" fill="#4a5568">via Selective Search</text>
    
    <!-- Arrow -->
    <path d="M 155 130 L 185 130" stroke="#e53e3e" stroke-width="2" fill="none" class="arrow-line"/>
    <polygon points="185,125 195,130 185,135" fill="#e53e3e"/>
  </g>
  
  <!-- YOLO Section -->
  <g class="section-yolo" data-narration="YOLO divides image into S×S grid, each cell predicts bounding boxes and class probabilities simultaneously">
    <rect x="220" y="55" width="180" height="140" rx="8" fill="url(#yoloGradient)" filter="url(#shadow)"/>
    <text x="310" y="75" text-anchor="middle" class="title-text" font-size="14" fill="#22543d">YOLO Approach</text>
    
    <!-- 7x7 Grid -->
    <g transform="translate(235, 88)">
      <rect x="0" y="0" width="70" height="70" fill="#fff" stroke="#276749" stroke-width="1"/>
      <!-- Grid lines -->
      <line x1="10" y1="0" x2="10" y2="70" stroke="#276749" stroke-width="0.5"/>
      <line x1="20" y1="0" x2="20" y2="70" stroke="#276749" stroke-width="0.5"/>
      <line x1="30" y1="0" x2="30" y2="70" stroke="#276749" stroke-width="0.5"/>
      <line x1="40" y1="0" x2="40" y2="70" stroke="#276749" stroke-width="0.5"/>
      <line x1="50" y1="0" x2="50" y2="70" stroke="#276749" stroke-width="0.5"/>
      <line x1="60" y1="0" x2="60" y2="70" stroke="#276749" stroke-width="0.5"/>
      <line x1="0" y1="10" x2="70" y2="10" stroke="#276749" stroke-width="0.5"/>
      <line x1="0" y1="20" x2="70" y2="20" stroke="#276749" stroke-width="0.5"/>
      <line x1="0" y1="30" x2="70" y2="30" stroke="#276749" stroke-width="0.5"/>
      <line x1="0" y1="40" x2="70" y2="40" stroke="#276749" stroke-width="0.5"/>
      <line x1="0" y1="50" x2="70" y2="50" stroke="#276749" stroke-width="0.5"/>
      <line x1="0" y1="60" x2="70" y2="60" stroke="#276749" stroke-width="0.5"/>
      
      <!-- Highlight one cell -->
      <rect x="30" y="30" width="10" height="10" fill="#48bb78" opacity="0.6" class="pulse-anim"/>
      
      <!-- Bounding box -->
      <rect x="25" y="20" width="20" height="18" fill="none" stroke="#c53030" stroke-width="2" rx="1"/>
    </g>
    
    <text x="310" y="170" text-anchor="middle" font-size="11" fill="#22543d">7×7 Grid System</text>
    <text x="310" y="185" text-anchor="middle" font-size="10" fill="#4a5568">S×S cells predict boxes</text>
  </g>
  
  <!-- VS Symbol -->
  <g class="pulse-anim">
    <circle cx="210" cy="125" r="20" fill="#ed8936" opacity="0.9"/>
    <text x="210" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">VS</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="section-key" data-narration="Key concepts include Non-Max Suppression to remove overlapping boxes, IoU metric for box evaluation, and loss functions combining localization, confidence, and classification">
    <rect x="20" y="210" width="380" height="175" rx="8" fill="url(#highlightGradient)" filter="url(#shadow)"/>
    <text x="210" y="232" text-anchor="middle" class="title-text" font-size="14" fill="#744210">Key Concepts &amp; Metrics</text>
    
    <!-- Concept boxes -->
    <g transform="translate(35, 245)">
      <rect x="0" y="0" width="110" height="50" rx="5" fill="#fff" stroke="#d69e2e" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#744210">ROI Pooling</text>
      <text x="55" y="35" text-anchor="middle" font-size="9" fill="#5f370e">Warp regions to</text>
      <text x="55" y="44" text-anchor="middle" font-size="9" fill="#5f370e">fixed-size feature map</text>
    </g>
    
    <g transform="translate(155, 245)">
      <rect x="0" y="0" width="110" height="50" rx="5" fill="#fff" stroke="#d69e2e" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#744210">Anchor Boxes</text>
      <text x="55" y="35" text-anchor="middle" font-size="9" fill="#5f370e">Predefined aspect</text>
      <text x="55" y="44" text-anchor="middle" font-size="9" fill="#5f370e">ratios for prediction</text>
    </g>
    
    <g transform="translate(275, 245)">
      <rect x="0" y="0" width="110" height="50" rx="5" fill="#fff" stroke="#d69e2e" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#744210">NMS</text>
      <text x="55" y="35" text-anchor="middle" font-size="9" fill="#5f370e">Non-Maximum</text>
      <text x="55" y="44" text-anchor="middle" font-size="9" fill="#5f370e">Suppression</text>
    </g>
    
    <!-- Bottom row -->
    <g transform="translate(55, 305)">
      <rect x="0" y="0" width="130" height="50" rx="5" fill="#fff" stroke="#38a169" stroke-width="1"/>
      <text x="65" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#22543d">IoU Metric</text>
      <text x="65" y="35" text-anchor="middle" font-size="9" fill="#276749">Intersection over Union</text>
      <text x="65" y="44" text-anchor="middle" font-size="8" fill="#276749">Box evaluation</text>
    </g>
    
    <g transform="translate(205, 305)">
      <rect x="0" y="0" width="130" height="50" rx="5" fill="#fff" stroke="#e53e3e" stroke-width="1"/>
      <text x="65" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#742a2a">Loss Function</text>
      <text x="65" y="35" text-anchor="middle" font-size="9" fill="#9b2c2c">Localization + Confidence</text>
      <text x="65" y="44" text-anchor="middle" font-size="9" fill="#9b2c2c">+ Classification</text>
    </g>
    
    <!-- Performance label -->
    <g transform="translate(320, 310)">
      <text x="25" y="8" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c5282">mAP</text>
      <text x="25" y="22" text-anchor="middle" font-size="8" fill="#2d3748">mean Average</text>
      <text x="25" y="32" text-anchor="middle" font-size="8" fill="#2d3748">Precision</text>
    </g>
  </g>
  
  <!-- Comparison Arrows -->
  <g class="section-key" opacity="0">
    <path d="M 110 205 L 110 195 L 150 195 L 150 205" fill="none" stroke="#4a5568" stroke-width="1" stroke-dasharray="4,2"/>
    <path d="M 310 205 L 310 195 L 270 195 L 270 205" fill="none" stroke="#4a5568" stroke-width="1" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Legend -->
  <g class="section-key" transform="translate(330, 215)">
    <rect x="0" y="0" width="60" height="18" rx="3" fill="#e2e8f0"/>
    <circle cx="10" cy="9" r="4" fill="none" stroke="#c53030" stroke-width="2"/>
    <text x="20" y="12" font-size="8" fill="#2d3748">Box</text>
  </g>
</svg>