<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="cnns-for-image-classification">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f5e6fa"/>
      <stop offset="100%" style="stop-color:#ffe6f0"/>
    </linearGradient>
    <linearGradient id="convGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="poolGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd3a5"/>
      <stop offset="100%" style="stop-color:#ffb347"/>
    </linearGradient>
    <linearGradient id="fcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b1ff"/>
      <stop offset="100%" style="stop-color:#a88beb"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8f0b8"/>
      <stop offset="100%" style="stop-color:#6ecf6e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowRight {
      from { stroke-dashoffset: 20; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-in { animation: slideIn 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .flow-arrow {
      stroke-dasharray: 5, 5;
      animation: flowRight 1s linear infinite;
    }
    .layer-box {
      opacity: 0;
      animation: fadeIn 0.6s ease-out forwards;
    }
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.3s; }
    .section-3 { animation-delay: 0.5s; }
    .section-4 { animation-delay: 0.7s; }
    .section-5 { animation-delay: 0.9s; }
    .section-6 { animation-delay: 1.1s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4a4a6a" class="fade-in">CNNs for Image Classification</text>
  
  <!-- Section 1: Input Layer -->
  <g class="layer-box section-1" data-narration="Input image fed into the CNN, typically RGB with spatial dimensions (e.g., 224x224x3)">
    <rect x="20" y="60" width="60" height="60" fill="#7cb9e8" rx="4" filter="url(#shadow)"/>
    <text x="50" y="135" text-anchor="middle" font-family="Arial" font-size="12" fill="#4a4a6a">Input</text>
    <text x="50" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">32×32×3</text>
    <!-- Simple pixel representation -->
    <rect x="28" y="68" width="10" height="10" fill="#5a9fd4"/>
    <rect x="42" y="68" width="10" height="10" fill="#6aafde"/>
    <rect x="56" y="68" width="10" height="10" fill="#4a8fc4"/>
    <rect x="28" y="82" width="10" height="10" fill="#6aafde"/>
    <rect x="42" y="82" width="10" height="10" fill="#7abfe8"/>
    <rect x="56" y="82" width="10" height="10" fill="#5a9fd4"/>
    <rect x="28" y="96" width="10" height="10" fill="#4a8fc4"/>
    <rect x="42" y="96" width="10" height="10" fill="#6aafde"/>
    <rect x="56" y="96" width="10" height="10" fill="#7abfe8"/>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M85 90 L110 90" stroke="#999" stroke-width="2" class="flow-arrow"/>
  <polygon points="110,90 105,85 105,95" fill="#999"/>
  
  <!-- Section 2: Conv Layer 1 -->
  <g class="layer-box section-2" data-narration="Convolutional layer applies learned filters to extract features like edges and textures">
    <rect x="115" y="60" width="70" height="70" fill="url(#convGradient)" rx="4" filter="url(#shadow)"/>
    <text x="150" y="70" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2a5a7a">Conv</text>
    <text x="150" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">28×28</text>
    <text x="150" y="158" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">32 filters</text>
    <!-- Feature map pattern -->
    <rect x="125" y="80" width="50" height="50" fill="none" stroke="#5a9fd4" stroke-width="1" opacity="0.5"/>
    <line x1="141" y1="80" x2="141" y2="130" stroke="#5a9fd4" stroke-width="0.5" opacity="0.5"/>
    <line x1="158" y1="80" x2="158" y2="130" stroke="#5a9fd4" stroke-width="0.5" opacity="0.5"/>
    <line x1="125" y1="96" x2="175" y2="96" stroke="#5a9fd4" stroke-width="0.5" opacity="0.5"/>
    <line x1="125" y1="113" x2="175" y2="113" stroke="#5a9fd4" stroke-width="0.5" opacity="0.5"/>
    <text x="150" y="105" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff" opacity="0.9">3×3</text>
    <text x="150" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" opacity="0.8">kernel</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M190 95 L215 95" stroke="#999" stroke-width="2" class="flow-arrow"/>
  <polygon points="215,95 210,90 210,100" fill="#999"/>
  
  <!-- Section 3: Pooling Layer -->
  <g class="layer-box section-3" data-narration="Pooling layer reduces spatial dimensions while maintaining important features, providing translation invariance">
    <rect x="220" y="60" width="50" height="50" fill="url(#poolGradient)" rx="4" filter="url(#shadow)"/>
    <text x="245" y="75" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#8a5a20">Pool</text>
    <text x="245" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">14×14</text>
    <text x="245" y="138" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">max</text>
    <!-- Pooling visualization -->
    <rect x="230" y="85" width="12" height="12" fill="#fff3e0" rx="1"/>
    <rect x="248" y="85" width="12" height="12" fill="#ffe0b2" rx="1"/>
    <rect x="230" y="100" width="12" height="12" fill="#ffcc80" rx="1"/>
    <rect x="248" y="100" width="12" height="12" fill="#ffb74d" rx="1"/>
    <text x="245" y="94" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">2×2</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M275 85 L295 85" stroke="#999" stroke-width="2" class="flow-arrow"/>
  <polygon points="295,85 290,80 290,90" fill="#999"/>
  
  <!-- Section 4: Conv Layer 2 -->
  <g class="layer-box section-4" data-narration="Second conv layer learns more complex patterns by combining features from previous layer">
    <rect x="300" y="55" width="60" height="60" fill="url(#convGradient)" rx="4" filter="url(#shadow)"/>
    <text x="330" y="68" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2a5a7a">Conv</text>
    <text x="330" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">10×10</text>
    <text x="330" y="141" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">64 filters</text>
    <!-- Deeper feature representation -->
    <circle cx="320" cy="90" r="8" fill="#7abfe8" opacity="0.8"/>
    <circle cx="340" cy="90" r="8" fill="#6aafde" opacity="0.8"/>
    <circle cx="320" cy="105" r="8" fill="#5a9fd4" opacity="0.8"/>
    <circle cx="340" cy="105" r="8" fill="#4a8fc4" opacity="0.8"/>
  </g>
  
  <!-- Arrow down -->
  <path d="M330 120 L330 150" stroke="#999" stroke-width="2" class="flow-arrow"/>
  <polygon points="330,155 325,145 335,145" fill="#999"/>
  
  <!-- Section 5: Flatten & FC -->
  <g class="layer-box section-5" data-narration="Flattened features fed into fully connected layers for classification decisions">
    <rect x="270" y="160" width="120" height="40" fill="url(#fcGradient)" rx="4" filter="url(#shadow)"/>
    <text x="330" y="180" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#5a3a8a">FC Layers</text>
    <text x="330" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">128 → 10</text>
    <!-- FC connections dots -->
    <circle cx="285" cy="180" r="3" fill="#fff"/>
    <circle cx="300" cy="180" r="3" fill="#fff"/>
    <circle cx="330" cy="180" r="3" fill="#fff"/>
    <circle cx="360" cy="180" r="3" fill="#fff"/>
    <circle cx="375" cy="180" r="3" fill="#fff"/>
  </g>
  
  <!-- Arrow to output -->
  <path d="M330 205 L330 235" stroke="#999" stroke-width="2" class="flow-arrow"/>
  <polygon points="330,240 325,230 335,230" fill="#999"/>
  
  <!-- Section 6: Output/Classification -->
  <g class="layer-box section-6" data-narration="Softmax output layer produces probability scores for each class">
    <rect x="290" y="245" width="80" height="80" fill="url(#outputGradient)" rx="4" filter="url(#shadow)"/>
    <text x="330" y="265" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2a6a2a">Output</text>
    <text x="330" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a6a2a">Probabilities</text>
    
    <!-- Class predictions -->
    <text x="300" y="300" text-anchor="start" font-family="Arial" font-size="9" fill="#4a4a6a">Cat: 0.85</text>
    <text x="300" y="312" text-anchor="start" font-family="Arial" font-size="9" fill="#4a4a6a">Dog: 0.12</text>
    <text x="360" y="300" text-anchor="start" font-family="Arial" font-size="9" fill="#4a4a6a">Bird: 0.03</text>
    
    <!-- Highlight winning class -->
    <rect x="295" y="292" width="55" height="14" fill="#fff" rx="2" opacity="0.6"/>
    <text x="300" y="302" text-anchor="start" font-family="Arial" font-size="9" font-weight="bold" fill="#2a6a2a" class="pulse">Cat: 0.85</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="slide-in" style="animation-delay: 1.3s;">
    <rect x="10" y="340" width="400" height="50" fill="#fff" rx="6" filter="url(#shadow)" opacity="0.9"/>
    <text x="20" y="358" font-family="Arial" font-size="11" font-weight="bold" fill="#4a4a6a">Key:</text>
    <text x="55" y="358" font-family="Arial" font-size="10" fill="#666">Conv = Learn spatial filters</text>
    <text x="180" y="358" font-family="Arial" font-size="10" fill="#666">Pool = Reduce dimensions</text>
    <text x="300" y="358" font-family="Arial" font-size="10" fill="#666">FC = Classify</text>
    <text x="55" y="375" font-family="Arial" font-size="10" fill="#666">Stride: step size | Padding: preserve size</text    <text x="250" y="375" font-family="Arial" font-size="10" fill="#666">ReLU: max(0,x) activation</text>
  </g>
  
  <!-- Flow arrows decoration -->
  <g opacity="0.4">
    <path d="M50 170 Q 150 170 150 200" stroke="#7cb9e8" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
    <path d="M150 170 Q 250 170 250 200" stroke="#ffd3a5" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  </g>
  
  <!-- ReLU symbol -->
  <g class="pulse" style="animation-delay: 1.5s;">
    <rect x="115" y="140" width="30" height="15" fill="#e8f5e9" rx="2"/>
    <text x="130" y="151" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">ReLU</text>
  </g>
  <g class="pulse" style="animation-delay: 1.7s;">
    <rect x="300" y="120" width="30" height="15" fill="#e8f5e9" rx="2"/>
    <text x="315" y="131" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">ReLU</text>
  </g>
  
  <!-- Parameter sharing indicator -->
  <g class="fade-in" style="animation-delay: 1.8s;">
    <text x="355" y="55" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Parameter</text>
    <text x="355" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Sharing ↓</text>
  </g>
</svg>