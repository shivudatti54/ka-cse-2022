<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="semantic-instance-segmentation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .box5 { animation: fadeIn 0.6s ease-out 1s forwards; opacity: 0; }
    .arrow { animation: flowDash 1s linear infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title-text { font-size: 20px; font-weight: 600; fill: #2d3748; }
    .label { font-size: 12px; fill: #4a5568; }
    .detail { font-size: 10px; fill: #718096; }
    .highlight { font-size: 11px; fill: #667eea; font-weight: 500; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-text">Semantic Instance Segmentation</text>
  <text x="210" y="45" text-anchor="middle" class="title detail">Mask R-CNN Architecture</text>
  
  <!-- Input Image Section -->
  <g class="box1" data-narration="Input image fed into the backbone network for feature extraction">
    <rect x="20" y="60" width="70" height="70" rx="6" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="25" y="65" width="20" height="20" fill="#a0aec0"/>
    <rect x="50" y="65" width="20" height="20" fill="#718096"/>
    <rect x="25" y="90" width="20" height="20" fill="#4a5568"/>
    <rect x="50" y="90" width="20" height="20" fill="#2d3748"/>
    <text x="55" y="145" text-anchor="middle" class="label">Input</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M95 95 L125 95" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Backbone Network -->
  <g class="box2" data-narration="Backbone network (ResNet+FPN) extracts multi-scale features from input">
    <rect x="130" y="60" width="80" height="70" rx="6" fill="url(#boxGradient)" filter="url(#shadow)"/>
    <text x="170" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="600">Backbone</text>
    <text x="170" y="108" text-anchor="middle" fill="white" font-size="9">ResNet-50</text>
    <text x="170" y="120" text-anchor="middle" fill="white" font-size="8">+ FPN</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M215 95 L245 95" stroke="#667eea" stroke-width="2" fill="none" class="arrow"/>
  
  <!-- RPN Section -->
  <g class="box3" data-narration="Region Proposal Network generates candidate object locations">
    <rect x="250" y="60" width="75" height="70" rx="6" fill="url(#accentGradient)" filter="url(#shadow)"/>
    <text x="287" y="88" text-anchor="middle" fill="white" font-size="11" font-weight="600">RPN</text>
    <text x="287" y="102" text-anchor="middle" fill="white" font-size="9">Region</text>
    <text x="287" y="114" text-anchor="middle" fill="white" font-size="8">Proposal</text>
    <rect x="260" y="120" width="20" height="4" rx="2" fill="white" opacity="0.6"/>
    <rect x="285" y="120" width="20" height="4" rx="2" fill="white" opacity="0.6"/>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M287 135 L287 170" stroke="#667eea" stroke-width="2" fill="none" class="arrow"/>
  
  <!-- ROI Align -->
  <g class="box4" data-narration="ROI Align pools features from feature maps to fixed size">
    <rect x="240" y="175" width="95" height="50" rx="6" fill="#ed8936" filter="url(#shadow)"/>
    <text x="287" y="200" text-anchor="middle" fill="white" font-size="11" font-weight="600">ROI Align</text>
    <text x="287" y="215" text-anchor="middle" fill="white" font-size="9">Feature Pooling</text>
  </g>
  
  <!-- Branch arrows -->
  <path d="M200 200 L160 200" stroke="#667eea" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  <path d="M375 200 L340 200" stroke="#667eea" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  
  <!-- Classification Head -->
  <rect x="145" y="185" width="60" height="40" rx="4" fill="#48bb78" filter="url(#shadow)"/>
  <text x="175" y="205" text-anchor="middle" fill="white" font-size="9" font-weight="600">Class</text>
  <text x="175" y="217" text-anchor="middle" fill="white" font-size="8">Box Reg</text>
  
  <!-- Mask Head -->
  <rect x="345" y="185" width="60" height="40" rx="4" fill="url(#secondaryGradient)" filter="url(#shadow)"/>
  <text x="375" y="205" text-anchor="middle" fill="white" font-size="9" font-weight="600">Mask</text>
  <text x="375" y="217" text-anchor="middle" fill="white" font-size="8">Head</text>
  
  <!-- Final Output -->
  <g class="box5" data-narration="Final output provides class, bounding box, and binary mask for each instance">
    <rect x="320" y="275" width="80" height="85" rx="6" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="360" y="295" text-anchor="middle" class="label" font-weight="600">Output</text>
    <rect x="330" y="305" width="25" height="20" rx="2" fill="#667eea" opacity="0.3"/>
    <rect x="335" y="310" width="15" height="10" fill="none" stroke="#667eea" stroke-width="1"/>
    <text x="342" y="340" text-anchor="middle" class="detail">person</text>
    <rect x="365" y="305" width="25" height="20" rx="2" fill="#38ef7d" opacity="0.3"/>
    <rect x="370" y="310" width="15" height="10" fill="none" stroke="#38ef7d" stroke-width="1"/>
    <text x="377" y="340" text-anchor="middle" class="detail">car</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="box5" data-narration="Key architectural components and loss functions used in training">
    <rect x="15" y="255" width="130" height="120" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="275" text-anchor="middle" class="highlight" font-size="11">Key Concepts</text>
    <line x1="25" y1="285" x2="135" y2="285" stroke="#e2e8f0" stroke-width="1"/>
    
    <circle cx="30" cy="300" r="4" fill="#667eea"/>
    <text x="42" y="304" class="detail">Two-Stage: Mask R-CNN</text>
    
    <circle cx="30" cy="320" r="4" fill="#38ef7d"/>
    <text x="42" y="324" class="detail">Single-Stage: YOLACT</text>
    
    <circle cx="30" cy="340" r="4" fill="#f5576c"/>
    <text x="42" y="344" class="detail">Transformer: Mask2Former</text>
    
    <circle cx="30" cy="360" r="4" fill="#ed8936"/>
    <text x="42" y="364" class="detail">Loss: Dice + CrossEntropy</text>
  </g>
  
  <!-- Metrics Box -->
  <g class="box5" data-narration="Evaluation metrics for measuring segmentation performance">
    <rect x="155" y="255" width="120" height="55" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="215" y="275" text-anchor="middle" class="highlight" font-size="11">Metrics</text>
    <text x="170" y="295" class="detail">mIoU: Semantic</text>
    <text x="170" y="308" class="detail">AP: Instance Quality</text>
  </g>
  
  <!-- Data Flow Indicator -->
  <g class="pulse">
    <circle cx="210" cy="95" r="5" fill="#667eea" opacity="0.6"/>
  </g>
  
  <!-- Legend indicators -->
  <rect x="360" y="370" width="8" height="8" rx="2" fill="#667eea"/>
  <text x="372" y="377" class="detail">Feature Flow</text>
  <rect x="295" y="370" width="8" height="8" rx="2" fill="#ed8936"/>
  <text x="307" y="377" class="detail">RoI Process</text>
</svg>