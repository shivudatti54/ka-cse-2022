<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="3d-vision-point-clouds">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="pointGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="voxelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3a8"/>
      <stop offset="100%" style="stop-color:#3d9970"/>
    </linearGradient>
    <linearGradient id="centroidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #34495e; }
      .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
      .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
      .fade-in { animation: fadeIn 1s ease-out forwards; }
      .slide-left { animation: slideInLeft 0.8s ease-out forwards; }
      .slide-right { animation: slideInRight 0.8s ease-out forwards; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .float { animation: float 3s ease-in-out infinite; }
      .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1.5s ease-out forwards; }
      .point { fill: url(#pointGradient); }
      .voxel-box { fill: none; stroke: url(#voxelGradient); stroke-width: 1.5; opacity: 0.7; }
      .centroid { fill: url(#centroidGradient); }
      .arrow { fill: none; stroke: #5d6d7e; stroke-width: 2; marker-end: url(#arrowhead); }
      .concept-box { fill: white; stroke: #bdc3c7; stroke-width: 1; filter: url(#shadow); }
      .highlight-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #2980b9; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d6d7e"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">3D Vision: Point Clouds</text>
  <text x="210" y="50" text-anchor="middle" class="detail fade-in" style="animation-delay: 0.2s">Voxel Grid Downsampling</text>
  
  <!-- Section 1: Original Point Cloud -->
  <g class="slide-left" style="animation-delay: 0.3s" data-narration="Original point cloud with dense 3D coordinates from LiDAR or RGB-D sensors">
    <rect x="20" y="70" width="120" height="130" rx="8" class="concept-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 0.4s; opacity: 0"/>
    <text x="80" y="88" text-anchor="middle" class="section-title">Original Points</text>
    <!-- 3D perspective box -->
    <g transform="translate(35, 100)">
      <rect x="0" y="0" width="90" height="70" fill="none" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
      <line x1="0" y1="0" x2="10" y2="-10" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="90" y1="0" x2="100" y2="-10" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="90" y1="70" x2="100" y2="60" stroke="#bdc3c7" stroke-width="1"/>
      <line x1="0" y1="70" x2="10" y2="60" stroke="#bdc3c7" stroke-width="1"/>
      <!-- Points scattered -->
      <circle cx="15" cy="20" r="3" class="point float" style="animation-delay: 0.5s"/>
      <circle cx="30" cy="35" r="2.5" class="point float" style="animation-delay: 0.7s"/>
      <circle cx="25" cy="50" r="3" class="point float" style="animation-delay: 0.6s"/>
      <circle cx="45" cy="15" r="2.5" class="point float" style="animation-delay: 0.8s"/>
      <circle cx="50" cy="40" r="3" class="point float" style="animation-delay: 0.5s"/>
      <circle cx="55" cy="55" r="2.5" class="point float" style="animation-delay: 0.9s"/>
      <circle cx="70" cy="25" r="3" class="point float" style="animation-delay: 0.6s"/>
      <circle cx="75" cy="45" r="2.5" class="point float" style="animation-delay: 0.7s"/>
      <circle cx="80" cy="60" r="3" class="point float" style="animation-delay: 0.8s"/>
      <circle cx="20" cy="65" r="2.5" class="point float" style="animation-delay: 0.9s"/>
      <circle cx="40" cy="55" r="2.5" class="point float" style="animation-delay: 1.0s"/>
      <circle cx="65" cy="35" r="2.5" class="point float" style="animation-delay: 1.1s"/>
    </g>
    <text x="80" y="190" text-anchor="middle" class="detail">Dense Points</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M155 135 L185 135" class="arrow line-anim" style="animation-delay: 0.8s"/>
  
  <!-- Section 2: Voxel Grid -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Space divided into 3D voxels (cubes) for downsampling">
    <rect x="190" y="70" width="130" height="130" rx="8" class="concept-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.1s; opacity: 0"/>
    <text x="255" y="88" text-anchor="middle" class="section-title">Voxel Grid</text>
    <g transform="translate(205, 100)">
      <!-- Grid cells representing voxels -->
      <rect x="0" y="0" width="30" height="23" class="voxel-box"/>
      <rect x="30" y="0" width="30" height="23" class="voxel-box"/>
      <rect x="60" y="0" width="30" height="23" class="voxel-box"/>
      <rect x="0" y="23" width="30" height="23" class="voxel-box"/>
      <rect x="30" y="23" width="30" height="23" class="voxel-box"/>
      <rect x="60" y="23" width="30" height="23" class="voxel-box"/>
      <rect x="0" y="46" width="30" height="23" class="voxel-box"/>
      <rect x="30" y="46" width="30" height="23" class="voxel-box"/>
      <rect x="60" y="46" width="30" height="23" class="voxel-box"/>
      <!-- Some points in voxels -->
      <circle cx="15" cy="12" r="2" class="point" opacity="0.6"/>
      <circle cx="45" cy="12" r="2" class="point" opacity="0.6"/>
      <circle cx="75" cy="12" r="2" class="point" opacity="0.6"/>
      <circle cx="15" cy="35" r="2" class="point" opacity="0.6"/>
      <circle cx="45" cy="35" r="2" class="point" opacity="0.6"/>
      <circle cx="75" cy="35" r="2" class="point" opacity="0.6"/>
      <circle cx="15" cy="58" r="2" class="point" opacity="0.6"/>
      <circle cx="45" cy="58" r="2" class="point" opacity="0.6"/>
    </g>
    <text x="255" y="195" text-anchor="middle" class="detail">3D Grid Cells</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M335 135 L365 135" class="arrow line-anim" style="animation-delay: 1.3s"/>
  
  <!-- Section 3: Centroids -->
  <g class="slide-right" style="animation-delay: 1.5s" data-narration="Each voxel reduced to single centroid point">
    <rect x="370" y="70" width="40" height="130" rx="8" class="concept-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.6s; opacity: 0"/>
    <text x="390" y="88" text-anchor="middle" class="section-title" style="font-size: 11px;">Result</text>
    <g transform="translate(378, 100)">
      <!-- Centroids as larger circles -->
      <circle cx="12" cy="12" r="5" class="centroid pulse"/>
      <circle cx="12" cy="35" r="5" class="centroid pulse" style="animation-delay: 0.2s"/>
      <circle cx="12" cy="58" r="5" class="centroid pulse" style="animation-delay: 0.4s"/>
    </g>
    <text x="390" y="195" text-anchor="middle" class="detail">Centroids</text>
  </g>
  
  <!-- Section 4: Key Concepts -->
  <g data-narration="Key acquisition methods for point clouds">
    <rect x="20" y="220" width="180" height="75" rx="6" class="concept-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 1.8s; opacity: 0"/>
    <text x="110" y="242" text-anchor="middle" class="section-title">Acquisition Methods</text>
    <circle cx="40" cy="265" r="8" fill="#3498db" class="float"/>
    <text x="60" y="269" class="label" style="font-size: 12px;">LiDAR</text>
    <circle cx="110" cy="265" r="8" fill="#9b59b6" class="float" style="animation-delay: 0.3s"/>
    <text x="130" y="269" class="label" style="font-size: 12px;">RGB-D</text>
    <circle cx="40" cy="285" r="8" fill="#e74c3c" class="float" style="animation-delay: 0.5s"/>
    <text x="60" y="289" class="label" style="font-size: 12px;">Photogram.</text>
  </g>
  
  <!-- Section 5: Deep Learning -->
  <g data-narration="Deep learning architectures for point cloud processing">
    <rect x="210" y="220" width="190" height="75" rx="6" class="concept-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 2s; opacity: 0"/>
    <text x="305" y="242" text-anchor="middle" class="section-title">Deep Learning</text>
    <rect x="225" y="252" width="55" height="18" rx="4" fill="#2ecc71" opacity="0.8"/>
    <text x="252" y="265" text-anchor="middle" class="detail" style="fill: white; font-size: 10px;">PointNet</text>
    <rect x="285" y="252" width="55" height="18" rx="4" fill="#f39c12" opacity="0.8"/>
    <text x="312" y="265" text-anchor="middle" class="detail" style="fill: white; font-size: 10px;">PointCNN</text>
    <rect x="345" y="252" width="50" height="18" rx="4" fill="#1abc9c" opacity="0.8"/>
    <text x="370" y="265" text-anchor="middle" class="detail" style="fill: white; font-size: 10px;">DGCNN</text>
    <text x="305" y="285" text-anchor="middle" class="detail">Classification • Segmentation</text>
  </g>
  
  <!-- Section 6: Applications -->
  <g data-narration="Real-world applications of point cloud technology">
    <rect x="20" y="305" width="380" height="80" rx="6" class="concept-box" style="animation: fadeIn 0.8s ease-out forwards; animation-delay: 2.2s; opacity: 0"/>
    <text x="210" y="327" text-anchor="middle" class="section-title">Applications</text>
    <g transform="translate(35, 340)">
      <circle cx="30" cy="0" r="15" fill="#e74c3c" opacity="0.7"/>
      <text x="30" y="4" text-anchor="middle" class="detail" style="fill: white; font-size: 9px;">🚗</text>
      <text x="30" y="22" text-anchor="middle" class="detail" style="font-size: 10px;">Autonomous</text>
      <text x="30" y="34" text-anchor="middle" class="detail" style="font-size: 10px;">Vehicles</text>
    </g>
    <g transform="translate(120, 340)">
      <circle cx="30" cy="0" r="15" fill="#9b59b6" opacity="0.7"/>
      <text x="30" y="4" text-anchor="middle" class="detail" style="fill: white; font-size: 9px;">🥽</text>
      <text x="30" y="22" text-anchor="middle" class="detail" style="font-size: 10px;">AR/VR</text>
      <text x="30" y="34" text-anchor="middle" class="detail" style="font-size: 10px;">Mapping</text>
    </g>
    <g transform="translate(205, 340)">
      <circle cx="30" cy="0" r="15" fill="#3498db" opacity="0.7"/>
      <text x="30" y="4" text-anchor="middle" class="detail" style="fill: white; font-size: 9px;">🏛️</text>
      <text x="30" y="22" text-anchor="middle" class="detail" style="font-size: 10px;">Cultural</text>
      <text x="30" y="34" text-anchor="middle" class="detail" style="font-size: 10px;">Heritage</text>
    </g>
    <g transform="translate(290, 340)">
      <circle cx="30" cy="0" r="15" fill="#2ecc71" opacity="0.7"/>
      <text x="30" y="4" text-anchor="middle" class="detail" style="fill: white; font-size: 9px;">🤖</text>
      <text x="30" y="22" text-anchor="middle" class="detail" style="font-size: 10px;">Robotics</text>
      <text x="30" y="34" text-anchor="middle" class="detail" style="font-size: 10px;">SLAM</text>
    </g>
    <g transform="translate(375, 340)">
      <circle cx="30" cy="0" r="15" fill="#f39c12" opacity="0.7"/>
      <text x="30" y="4" text-anchor="middle" class="detail" style="fill: white; font-size: 9px;">📡</text>
      <text x="30" y="22" text-anchor="middle" class="detail" style="font-size: 10px;">Sensor</text>
      <text x="30" y="34" text-anchor="middle" class="detail" style="font-size: 10px;">Fusion</text>
    </g>
  </g>
  
  <!-- Legend -->
  <g transform="translate(320, 310)" class="fade-in" style="animation-delay: 2.4s">
    <circle cx="0" cy="0" r="4" class="point"/>
    <text x="10" y="4" class="detail" style="font-size: 10px;">Original</text>
    <circle cx="70" cy="0" r="4" class="centroid"/>
    <text x="80" y="4" class="detail" style="font-size: 10px;">Centroid</text>
  </g>
</svg>