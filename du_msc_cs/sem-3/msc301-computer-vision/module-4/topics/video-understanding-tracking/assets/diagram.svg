<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="video-understanding-tracking">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8d4f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90c2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8fd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b5bb8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd4a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3db872;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5ba3cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e7cd4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.35s both; }
    .box3 { animation: slideIn 0.6s ease-out 0.5s both; }
    .box4 { animation: slideIn 0.6s ease-out 0.65s both; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s both; }
    .concept-box { animation: slideInUp 0.5s ease-out; }
    .pulse-element { animation: pulse 2s infinite; }
    .moving-dot { animation: moveRight 1.5s infinite alternate; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c4a6e" class="title">Video Understanding &amp; Tracking</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#5ba3cf" stroke-width="2" class="title" />
  
  <!-- Pipeline Section Labels -->
  <text x="30" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a5568" data-narration="Tracking Pipeline Overview">TRACKING PIPELINE</text>
  
  <!-- Stage 1: Detection -->
  <g class="box1">
    <rect x="20" y="85" width="90" height="55" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)" />
    <text x="65" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">DETECTION</text>
    <text x="65" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">YOLO, SSD,</text>
    <text x="65" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Faster R-CNN</text>
    <!-- Bounding box icon -->
    <rect x="45" y="148" width="40" height="25" fill="none" stroke="white" stroke-width="2" rx="2" />
    <circle cx="50" cy="155" r="3" fill="#ff6b6b" class="pulse-element" />
    <circle cx="80" cy="165" r="3" fill="#4ecdc4" class="pulse-element" />
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow">
    <line x1="115" y1="112" x2="145" y2="112" stroke="url(#arrowGradient)" stroke-width="3" />
    <polygon points="145,107 155,112 145,117" fill="url(#arrowGradient)" />
  </g>
  
  <!-- Stage 2: Feature Extraction -->
  <g class="box2">
    <rect x="155" y="85" width="95" height="55" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" />
    <text x="202" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">FEATURES</text>
    <text x="202" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Appearance,</text>
    <text x="202" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Motion, Shape</text>
    <!-- Feature visualization -->
    <circle cx="185" cy="125" r="4" fill="#ffd93d" />
    <circle cx="202" cy="130" r="4" fill="#ffd93d" />
    <circle cx="220" cy="125" r="4" fill="#ffd93d" />
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow">
    <line x1="255" y1="112" x2="285" y2="112" stroke="url(#arrowGradient)" stroke-width="3" />
    <polygon points="285,107 295,112 285,117" fill="url(#arrowGradient)" />
  </g>
  
  <!-- Stage 3: Data Association -->
  <g class="box3">
    <rect x="290" y="85" width="100" height="55" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)" />
    <text x="340" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">ASSOCIATION</text>
    <text x="340" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Hungarian,</text>
    <text x="340" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">IOU Matching</text>
    <!-- Matrix visualization -->
    <rect x="320" y="145" width="40" height="15" fill="white" rx="2" opacity="0.9" />
    <rect x="322" y="147" width="8" height="11" fill="#6b5bb8" rx="1" />
    <rect x="333" y="147" width="8" height="11" fill="#3db872" rx="1" />
    <rect x="344" y="147" width="8" height="11" fill="#6b5bb8" rx="1" />
  </g>
  
  <!-- Stage 4: State Update -->
  <g class="box4">
    <rect x="200" y="160" width="100" height="50" rx="8" fill="#5ba3cf" filter="url(#shadow)" />
    <text x="250" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">STATE UPDATE</text>
    <text x="250" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Kalman Filter</text>
    <!-- State vector visualization -->
    <text x="250" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="white">[x, y, vx, vy]</text>
  </g>
  
  <!-- Connection lines to State Update -->
  <g class="arrow">
    <line x1="65" y1="140" x2="200" y2="185" stroke="#5ba3cf" stroke-width="2" stroke-dasharray="4" />
    <line x1="202" y1="140" x2="220" y2="170" stroke="#9b8fd4" stroke-width="2" stroke-dasharray="4" />
    <line x1="340" y1="140" x2="300" y2="170" stroke="#3db872" stroke-width="2" stroke-dasharray="4" />
  </g>
  
  <!-- Motion Vectors Visualization -->
  <g class="concept-box" style="animation-delay: 0.8s">
    <text x="30" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a5568" data-narration="Optical Flow shows pixel motion">OPTICAL FLOW</text>
    <rect x="20" y="250" width="120" height="35" rx="5" fill="white" stroke="#7eb8da" stroke-width="1.5" />
    <line x1="30" y1="275" x2="50" y2="265" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)" />
    <line x1="45" y1="278" x2="75" y2="272" stroke="#ff6b6b" stroke-width="2" />
    <line x1="60" y1="275" x2="80" y2="280" stroke="#ff6b6b" stroke-width="2" />
    <text x="90" y="272" font-family="Arial, sans-serif" font-size="9" fill="#666">Motion</text>
    <text x="90" y="282" font-family="Arial, sans-serif" font-size="9" fill="#666">Vectors</text>
  </g>
  
  <!-- Kalman Filter Box -->
  <g class="concept-box" style="animation-delay: 0.9s">
    <text x="160" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a5568" data-narration="Kalman Filter predicts and updates object state">KALMAN FILTER</text>
    <rect x="155" y="250" width="100" height="55" rx="5" fill="white" stroke="#9b8fd4" stroke-width="1.5" />
    <text x="205" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Predict → Update</text>
    <rect x="165" y="278" width="30" height="20" rx="3" fill="#e8f4fc" stroke="#9b8fd4" />
    <text x="180" y="292" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b5bb8">x̂ₜ</text>
    <line x1="198" y1="288" x2="215" y2="288" stroke="#9b8fd4" stroke-width="2" />
    <polygon points="215,283 222,288 215,293" fill="#9b8fd4" />
    <rect x="220" y="278" width="30" height="20" rx="3" fill="#f0f5ff" stroke="#7eb8da" />
    <text x="235" y="292" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a90c2">x̂ₜ₊₁</text>
  </g>
  
  <!-- Tracking Methods -->
  <g class="concept-box" style="animation-delay: 1s">
    <text x="270" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a5568" data-narration="Deep learning methods for tracking">TRACKING METHODS</text>
    <rect x="265" y="250" width="130" height="55" rx="5" fill="white" stroke="#3db872" stroke-width="1.5" />
    <text x="330" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">• Siamese Networks</text>
    <text x="330" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">• Transformer (DETR)</text>
    <text x="330" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">• DeepSORT</text>
  </g>
  
  <!-- Evaluation Metrics -->
  <g class="concept-box" style="animation-delay: 1.1s">
    <text x="30" y="320" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a5568" data-narration="Metrics to evaluate tracking performance">EVALUATION METRICS</text>
    <rect x="20" y="330" width="175" height="40" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
    <text x="45" y="350" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">
      <tspan fill="#e53e3e">MOTA</tspan> · 
      <tspan fill="#38a169">MOTP</tspan> · 
      <tspan fill="#805ad5">IDF1</tspan>
    </text>
    <text x="45" y="362" font-family="Arial, sans-serif" font-size="9" fill="#718096">Accuracy, Precision, ID</text>
  </g>
  
  <!-- Applications Box -->
  <g class="concept-box" style="animation-delay: 1.2s">
    <text x="210" y="320" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4a5568" data-narration="Real-world applications of video tracking">APPLICATIONS</text>
    <rect x="205" y="330" width="190" height="40" rx="5" fill="white" stroke="#5ba3cf" stroke-width="1.5" />
    <text x="300" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Autonomous Vehicles • Surveillance</text>
    <text x="300" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Smart Cities • Defense</text>
  </g>
  
  <!-- Bottom info -->
  <g class="concept-box" style="animation-delay: 1.3s">
    <rect x="20" y="380" width="380" height="15" rx="3" fill="#e8f4fc" />
    <text x="30" y="391" font-family="Arial, sans-serif" font-size="9" fill="#5a7a9a">India Smart Cities &amp; Defense Initiatives • DU Research</text>
    <circle cx="385" cy="387" r="4" fill="#4db872" class="pulse-element" />
  </g>
</svg>