<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="image-filtering-edge-detection">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0fa"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbdefb"/>
      <stop offset="100%" style="stop-color:#90caf9"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8"/>
      <stop offset="100%" style="stop-color:#ba68c8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes highlight {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 4; }
    }
    .title-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1a237e; }
    .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail-text { font-family: 'Consolas', monospace; font-size: 12px; fill: #444; }
    .section-box { rx: 8; ry: 8; filter: url(#shadow); }
    .matrix-cell { font-family: 'Consolas', monospace; font-size: 11px; font-weight: bold; }
    .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animate-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .animate-slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <g class="animate-fade">
    <text x="210" y="30" text-anchor="middle" class="title-text">Image Filtering &amp; Edge Detection</text>
    <line x1="60" y1="40" x2="360" y2="40" stroke="#5c6bc0" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Section 1: Convolution Concept -->
  <g class="animate-slide-left delay-1" data-narration="The convolution operation applies a kernel matrix to each pixel, computing weighted sums to detect features like edges.">
    <rect x="15" y="55" width="130" height="75" fill="url(#boxGrad1)" class="section-box"/>
    <text x="80" y="72" text-anchor="middle" class="label-text" font-weight="bold">Convolution</text>
    <text x="80" y="90" text-anchor="middle" class="detail-text">G[i,j] = Σ F·K</text>
    <text x="80" y="108" text-anchor="middle" class="detail-text" font-size="10">Kernel slides across</text>
    <text x="80" y="120" text-anchor="middle" class="detail-text" font-size="10">image pixels</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="animate-fade delay-2">
    <path d="M155 92 L180 92" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="180,92 175,87 175,97" fill="#666"/>
  </g>
  
  <!-- Section 2: Original Image -->
  <g class="animate-slide-left delay-2" data-narration="The input grayscale image contains raw pixel data with potential noise that needs filtering before edge detection.">
    <rect x="190" y="55" width="60" height="60" fill="#fff" stroke="#90caf9" stroke-width="2" rx="4"/>
    <text x="220" y="85" text-anchor="middle" class="label-text" font-size="10">Input</text>
    <rect x="200" y="95" width="8" height="8" fill="#888" opacity="0.7"/>
    <rect x="210" y="95" width="8" height="8" fill="#666" opacity="0.7"/>
    <rect x="220" y="95" width="8" height="8" fill="#aaa" opacity="0.7"/>
    <rect x="230" y="95" width="8" height="8" fill="#444" opacity="0.7"/>
    <rect x="200" y="105" width="8" height="8" fill="#666" opacity="0.7"/>
    <rect x="210" y="105" width="8" height="8" fill="#222" opacity="0.9"/>
    <rect x="220" y="105" width="8" height="8" fill="#333" opacity="0.8"/>
    <rect x="230" y="105" width="8" height="8" fill="#777" opacity="0.7"/>
  </g>
  
  <!-- Arrow 2 -->
  <g class="animate-fade delay-3">
    <path d="M260 92 L285 92" stroke="#666" stroke-width="2"/>
    <polygon points="285,92 280,87 280,97" fill="#666"/>
  </g>
  
  <!-- Section 3: Sobel Kernels -->
  <g class="animate-slide-right delay-2" data-narration="The Sobel operator uses two 3x3 kernels: Gx detects horizontal edges, Gy detects vertical edges.">
    <rect x="295" y="55" width="110" height="75" fill="url(#boxGrad3)" class="section-box"/>
    <text x="350" y="72" text-anchor="middle" class="label-text" font-weight="bold">Sobel Kernels</text>
    
    <!-- Gx Kernel -->
    <text x="320" y="90" class="detail-text" font-weight="bold">Gx:</text>
    <rect x="335" y="82" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="341" y="90" text-anchor="middle" class="matrix-cell">-1</text>
    <rect x="348" y="82" width="12" height="10" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
    <text x="354" y="90" text-anchor="middle" class="matrix-cell">0</text>
    <rect x="361" y="82" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="367" y="90" text-anchor="middle" class="matrix-cell">1</text>
    
    <rect x="335" y="93" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="341" y="101" text-anchor="middle" class="matrix-cell">-2</text>
    <rect x="348" y="93" width="12" height="10" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
    <text x="354" y="101" text-anchor="middle" class="matrix-cell">0</text>
    <rect x="361" y="93" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="367" y="101" text-anchor="middle" class="matrix-cell">2</text>
    
    <rect x="335" y="104" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="341" y="112" text-anchor="middle" class="matrix-cell">-1</text>
    <rect x="348" y="104" width="12" height="10" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
    <text x="354" y="112" text-anchor="middle" class="matrix-cell">0</text>
    <rect x="361" y="104" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="367" y="112" text-anchor="middle" class="matrix-cell">1</text>
    
    <!-- Gy Kernel -->
    <text x="320" y="128" class="detail-text" font-weight="bold">Gy:</text>
    <rect x="335" y="120" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="341" y="128" text-anchor="middle" class="matrix-cell">-1</text>
    <rect x="348" y="120" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="354" y="128" text-anchor="middle" class="matrix-cell">-2</text>
    <rect x="361" y="120" width="12" height="10" fill="#f8bbd9" stroke="#ba68c8" stroke-width="1"/>
    <text x="367" y="128" text-anchor="middle" class="matrix-cell">-1</text>
    
    <rect x="335" y="131" width="12" height="10" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
    <text x="341" y="139" text-anchor="middle" class="matrix-cell">0</text>
    <rect x="348" y="131" width="12" height="10" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
    <text x="354" y="139" text-anchor="middle" class="matrix-cell">0</text>
    <rect x="361" y="131" width="12" height="10" fill="#fff" stroke="#ba68c8" stroke-width="1"/>
    <text x="367" y="139" text-anchor="middle" class="matrix-cell">0</text>
  </g>
  
  <!-- Pipeline Section -->
  <g class="animate-slide-up delay-3" data-narration="The edge detection pipeline involves noise reduction, gradient computation, non-maximum suppression, and hysteresis thresholding.">
    <rect x="15" y="145" width="390" height="55" fill="url(#boxGrad2)" class="section-box"/>
    <text x="210" y="162" text-anchor="middle" class="label-text" font-weight="bold">Edge Detection Pipeline</text>
    
    <!-- Pipeline Steps -->
    <rect x="30" y="172" width="65" height="22" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="4"/>
    <text x="62.5" y="187" text-anchor="middle" class="detail-text" font-size="10">Gaussian</text>
    
    <polygon points="100,183 108,178 108,188" fill="#4caf50"/>
    <polygon points="100,183 95,178 95,188" fill="none" stroke="#4caf50" stroke-width="1.5"/>
    
    <rect x="113" y="172" width="65" height="22" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="4"/>
    <text x="145.5" y="187" text-anchor="middle" class="detail-text" font-size="10">Sobel Grad</text>
    
    <polygon points="183,183 191,178 191,188" fill="#4caf50"/>
    
    <rect x="196" y="172" width="65" height="22" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="4"/>
    <text x="228.5" y="187" text-anchor="middle" class="detail-text" font-size="10">Non-Max</text>
    
    <polygon x="10" y="10"/>
    <polygon points="266,183 274,178 274,188" fill="#4caf50"/>
    
    <rect x="279" y="172" width="65" height="22" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="4"/>
    <text x="311.5" y="187" text-anchor="middle" class="detail-text" font-size="10">Hysteresis</text>
    
    <polygon points="349,183 357,178 357,188" fill="#4caf50"/>
    
    <rect x="362" y="172" width="35" height="22" fill="#4caf50" rx="4"/>
    <text x="379.5" y="187" text-anchor="middle" class="detail-text" font-size="10" fill="#fff">Edges</text>
  </g>
  
  <!-- Gradient Magnitude Section -->
  <g class="animate-fade delay-4" data-narration="The gradient magnitude combines Gx and Gy using the formula: magnitude = √(Gx² + Gy²) to detect edges in all directions.">
    <rect x="15" y="215" width="185" height="60" fill="url(#boxGrad1)" class="section-box"/>
    <text x="107" y="235" text-anchor="middle" class="label-text" font-weight="bold">Gradient Magnitude</text>
    <text x="107" y="255" text-anchor="middle" class="detail-text">M = √(Gx² + Gy²)</text>
    <text x="107" y="270" text-anchor="middle" class="detail-text" font-size="11">Direction: θ = atan2(Gy, Gx)</text>
  </g>
  
  <!-- Output Edge Map -->
  <g class="animate-fade delay-4">
    <rect x="220" y="215" width="185" height="60" fill="url(#boxGrad3)" class="section-box"/>
    <text x="312" y="235" text-anchor="middle" class="label-text" font-weight="bold">Edge Map Output</text>
    
    <!-- Simple edge visualization -->
    <rect x="260" y="245" width="100" height="24" fill="#1a1a1a" rx="2"/>
    <!-- Edge lines -->
    <line x1="265" y1="257" x2="290" y2="247" stroke="#fff" stroke-width="2" class="animate-pulse"/>
    <line x1="295" y1="245" x2="310" y2="257" stroke="#fff" stroke-width="2" class="animate-pulse"/>
    <line x1="315" y1="255" x2="340" y2="245" stroke="#fff" stroke-width="2" class="animate-pulse"/>
    <line x1="345" y1="248" x2="355" y2="258" stroke="#fff" stroke-width="2" class="animate-pulse"/>
  </g>
  
  <!-- Applications Section -->
  <g class="animate-slide-up delay-4" data-narration="Edge detection is used in object recognition, medical imaging, autonomous navigation, and is a foundation for modern deep learning approaches like HED.">
    <rect x="15" y="290" width="390" height="95" fill="#fff" stroke="#ddd" stroke-width="1" rx="8"/>
    <text x="210" y="310" text-anchor="middle" class="label-text" font-weight="bold" fill="#1a237e">Applications</text>
    
    <!-- Application items -->
    <g class="animate-pulse">
      <circle cx="50" cy="335" r="5" fill="#42a5f5"/>
      <text x="65" y="339" class="detail-text">Object Recognition (YOLO)</text>
    </g>
    
    <g class="animate-pulse" style="animation-delay: 0.3s">
      <circle cx="220" cy="335" r="5" fill="#66bb6a"/>
      <text x="235" y="339" class="detail-text">Medical Imaging</text>
    </g>
    
    <g class="animate-pulse" style="animation-delay: 0.6s">
      <circle cx="50" cy="360" r="5" fill="#ab47bc"/>
      <text x="65" y="364" class="detail-text">Autonomous Navigation</text>
    </g>
    
    <g class="animate-pulse" style="animation-delay: 0.9s">
      <circle cx="220" cy="360" r="5" fill="#ef5350"/>
      <text x="235" y="364" class="detail-text">Deep Learning (HED)</text>
    </g>
  </g>
  
  <!-- Key highlight box -->
  <g class="animate-fade" style="animation-delay: 1s">
    <rect x="320" y="300" width="80" height="25" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="4"/>
    <text x="360" y="316" text-anchor="middle" class="detail-text" font-size="10" fill="#e65100">Key Concept</text>
  </g>
</svg>