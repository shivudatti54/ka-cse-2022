<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="image-formation-sensing">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="microlensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="filterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="photodiodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="substrateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2bec3;stop-opacity:1" />
    </linearGradient>

    <!-- Light rays gradient -->
    <linearGradient id="lightRayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7d1;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ffe082;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fff7d1;stop-opacity:0" />
    </linearGradient>
  </defs>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes lightMove {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .light-anim { animation: lightMove 1.5s linear infinite; }
    .title-text { font-family: Georgia, serif; font-weight: bold; }
    .label-text { font-family: Arial, sans-serif; font-size: 12px; }
    .detail-text { font-family: Arial, sans-serif; font-size: 10px; fill: #636e72; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />

  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title-text" font-size="20" fill="#2d3436" class="fade-in">CMOS Sensor Cross-Section</text>
  <text x="210" y="50" text-anchor="middle" class="label-text" font-size="12" fill="#636e72" class="fade-in">Image Formation &amp; Sensing</text>

  <!-- Incoming Light Rays -->
  <g class="slide-up">
    <line x1="80" y1="60" x2="120" y2="85" stroke="url(#lightRayGrad)" stroke-width="3" class="light-anim"/>
    <line x1="100" y1="60" x2="120" y2="85" stroke="url(#lightRayGrad)" stroke-width="3" class="light-anim"/>
    <line x1="120" y1="60" x2="120" y2="85" stroke="url(#lightRayGrad)" stroke-width="3" class="light-anim"/>
    <line x1="140" y1="60" x2="120" y2="85" stroke="url(#lightRayGrad)" stroke-width="3" class="light-anim"/>
    <line x1="160" y1="60" x2="120" y2="85" stroke="url(#lightRayGrad)" stroke-width="3" class="light-anim"/>
    <text x="200" y="75" class="label-text" font-size="11" fill="#f39c12">Incoming Light</text>
    <path d="M195 80 L185 70 M195 80 L195 70" stroke="#f39c12" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Layer 1: Microlens -->
  <g class="slide-left" style="animation-delay: 0.2s" data-narration="Microlens: Concentrates light onto the photodiode, improving light collection efficiency">
    <ellipse cx="120" cy="95" rx="22" ry="10" fill="url(#microlensGrad)" class="pulse"/>
    <ellipse cx="160" cy="95" rx="22" ry="10" fill="url(#microlensGrad)" class="pulse"/>
    <ellipse cx="200" cy="95" rx="22" ry="10" fill="url(#microlensGrad)" class="pulse"/>
    <ellipse cx="240" cy="95" rx="22" ry="10" fill="url(#microlensGrad)" class="pulse"/>
    <ellipse cx="280" cy="95" rx="22" ry="10" fill="url(#microlensGrad)" class="pulse"/>
    <rect x="100" y="85" width="200" height="20" rx="5" fill="none" stroke="#0984e3" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="210" y="118" text-anchor="middle" class="label-text" font-size="12" fill="#0984e3" font-weight="bold">Microlens Array</text>
  </g>

  <!-- Layer 2: Color Filter (Bayer) -->
  <g class="slide-right" style="animation-delay: 0.4s" data-narration="Bayer Filter: RGB color filter pattern allowing each pixel to capture specific wavelength">
    <rect x="100" y="130" width="200" height="25" fill="#2d3436" rx="2"/>
    <rect x="102" y="132" width="38" height="21" fill="#ff7675" rx="1"/> <!-- Red -->
    <rect x="142" y="132" width="38" height="21" fill="#dfe6e9" rx="1"/> <!-- Green -->
    <rect x="182" y="132" width="38" height="21" fill="#74b9ff" rx="1"/> <!-- Blue -->
    <rect x="222" y="132" width="38" height="21" fill="#dfe6e9" rx="1"/> <!-- Green -->
    <rect x="262" y="132" width="36" height="21" fill="#ff7675" rx="1"/> <!-- Red -->
    <text x="210" y="168" text-anchor="middle" class="label-text" font-size="12" fill="#e17055" font-weight="bold">Bayer Color Filter</text>
  </g>

  <!-- Layer 3: Photodiode -->
  <g class="slide-left" style="animation-delay: 0.6s" data-narration="Photodiode: Converts photons into electrical charge (photons to electrons)">
    <rect x="100" y="180" width="200" height="60" fill="#2d3436" rx="2"/>
    <rect x="110" y="190" width="35" height="40" fill="url(#photodiodeGrad)" rx="2"/>
    <rect x="150" y="190" width="35" height="40" fill="url(#photodiodeGrad)" rx="2"/>
    <rect x="190" y="190" width="35" height="40" fill="url(#photodiodeGrad)" rx="2"/>
    <rect x="230" y="190" width="35" height="40" fill="url(#photodiodeGrad)" rx="2"/>
    <rect x="270" y="190" width="20" height="40" fill="url(#photodiodeGrad)" rx="2"/>
    <!-- Depletion region indicators -->
    <text x="210" y="255" text-anchor="middle" class="label-text" font-size="12" fill="#00b894" font-weight="bold">Photodiode (Pixel)</text>
    <text x="210" y="268" text-anchor="middle" class="detail-text">Converts photons → electrons</text>
  </g>

  <!-- Layer 4: Metal Interconnects -->
  <g class="slide-right" style="animation-delay: 0.8s" data-narration="Metal Interconnects: Transistor circuitry (readout electronics) that reads and amplifies charge">
    <rect x="100" y="260" width="200" height="50" fill="#2d3436" rx="2"/>
    <rect x="110" y="270" width="180" height="10" fill="#636e72" rx="1"/>
    <rect x="120" y="285" width="30" height="2" fill="#a29bfe"/>
    <rect x="160" y="285" width="30" height="2" fill="#a29bfe"/>
    <rect x="200" y="285" width="30" height="2" fill="#a29bfe"/>
    <rect x="240" y="285" width="30" height="2" fill="#a29bfe"/>
    <rect x="120" y="295" width="30" height="2" fill="#a29bfe"/>
    <rect x="160" y="295" width="30" height="2" fill="#a29bfe"/>
    <rect x="200" y="295" width="30" height="2" fill="#a29bfe"/>
    <rect x="240" y="295" width="30" height="2" fill="#a29bfe"/>
    <rect x="110" y="302" width="180" height="4" fill="#636e72" rx="1"/>
    <text x="210" y="325" text-anchor="middle" class="label-text" font-size="12" fill="#a29bfe" font-weight="bold">Metal Interconnects (Readout)</text>
  </g>

  <!-- Layer 5: Substrate -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Silicon Substrate: Base semiconductor material housing the sensor">
    <rect x="100" y="330" width="200" height="25" fill="url(#substrateGrad)" rx="2"/>
    <text x="210" y="347" text-anchor="middle" class="label-text" font-size="11" fill="#636e72" font-weight="bold">Silicon Substrate</text>
  </g>

  <!-- Arrow annotations -->
  <g class="fade-in" style="animation-delay: 1.2s">
    <!-- Arrow from light to microlens -->
    <path d="M310 80 L340 90" stroke="#636e72" stroke-width="1" fill="none" marker-end="url(#arrowhead)"/>
    <text x="320" y="75" class="detail-text">Light</text>
    
    <!-- Arrow showing electron flow -->
    <path d="M320 230 L340 240" stroke="#00b894" stroke-width="1.5" fill="none"/>
    <path d="M335 235 L340 245" stroke="#00b894" stroke-width="1.5"/>
    <path d="M335 235 L330 245" stroke="#00b894" stroke-width="1.5"/>
    <text x="315" y="225" class="detail-text" fill="#00b894">e⁻ flow</text>
  </g>

  <!-- Key Concept Box -->
  <g class="slide-up" style="animation-delay: 1.4s" data-narration="Key Concept: The sensor captures light through multiple layers, converting photons to measurable electrical signals">
    <rect x="15" y="350" width="130" height="40" fill="#fff" stroke="#b2bec3" stroke-width="1" rx="5"/>
    <text x="22" y="365" class="label-text" font-size="10" fill="#2d3436" font-weight="bold">Key Concept:</text>
    <text x="22" y="378" class="detail-text" fill="#636e72">Photon → Electron →</text>
    <text x="22" y="388" class="detail-text" fill="#636e72">Voltage → Digital Value</text>
  </g>

  <!-- Noise Info Box -->
  <g class="slide-up" style="animation-delay: 1.6s" data-narration="Noise Sources: Understanding photon shot noise, dark current, and read noise is essential for image quality">
    <rect x="155" y="350" width="130" height="40" fill="#fff" stroke="#b2bec3" stroke-width="1" rx="5"/>
    <text x="162" y="365" class="label-text" font-size="10" fill="#2d3436" font-weight="bold">Noise Sources:</text>
    <text x="162" y="378" class="detail-text" fill="#636e72">• Photon shot noise</text>
    <text x="162" y="388" class="detail-text" fill="#636e72">• Dark current • Read noise</text>
  </g>

  <!-- Resolution Box -->
  <g class="slide-up" style="animation-delay: 1.8s" data-narration="Resolution: Determined by pixel count and follows Nyquist sampling theorem">
    <rect x="295" y="350" width="110" height="40" fill="#fff" stroke="#b2bec3" stroke-width="1" rx="5"/>
    <text x="302" y="365" class="label-text" font-size="10" fill="#2d3436" font-weight="bold">Sampling:</text>
    <text x="302" y="378" class="detail-text" fill="#636e72">Nyquist Rate</text>
    <text x="302" y="388" class="detail-text" fill="#636e72">8-12 bit depth</text>
  </g>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/>
    </marker>
  </defs>
</svg>