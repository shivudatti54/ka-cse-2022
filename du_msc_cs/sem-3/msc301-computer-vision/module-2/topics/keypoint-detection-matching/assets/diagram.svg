<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="keypoint-detection-matching">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="50%" style="stop-color:#e8eef5"/>
      <stop offset="100%" style="stop-color:#d4e0f0"/>
    </linearGradient>
    <linearGradient id="sectionGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="sectionGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81ecec"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="sectionGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="sectionGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8"/>
      <stop offset="100%" style="stop-color:#e84393"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3436; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #2d3436; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #636e72; }
    .section-box { rx: 8; ry: 8; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.7s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .connector { stroke: #b2bec3; stroke-width: 1.5; stroke-dasharray: 4,3; }
    .highlight-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #fff; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Keypoint Detection &amp; Matching</text>
  <line x1="100" y1="42" x2="320" y2="42" stroke="#00b894" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Section 1: Keypoint Detection -->
  <g class="anim-slide-left" style="animation-delay: 0.2s">
    <rect x="15" y="55" width="120" height="85" fill="url(#sectionGrad1)" filter="url(#shadow)" class="section-box" data-narration="Keypoint Detection identifies distinctive points in images using algorithms like Harris, SIFT, FAST, and ORB"/>
    <text x="75" y="72" text-anchor="middle" class="label">Keypoint Detection</text>
    <text x="25" y="90" class="detail">• Harris Corner</text>
    <text x="25" y="104" class="detail">• SIFT (DoG)</text>
    <text x="25" y="118" class="detail">• FAST</text>
    <text x="25" y="132" class="detail">• ORB</text>
  </g>
  
  <!-- Section 2: Feature Descriptors -->
  <g class="anim-slide-right" style="animation-delay: 0.4s">
    <rect x="150" y="55" width="130" height="85" fill="url(#sectionGrad2)" filter="url(#shadow)" class="section-box" data-narration="Feature Descriptors encode local image information into vectors - SIFT uses 128-dim histograms, BRIEF uses binary strings"/>
    <text x="215" y="72" text-anchor="middle" class="label">Feature Descriptors</text>
    <text x="160" y="90" class="detail">• SIFT: 128-dim</text>
    <text x="160" y="104" class="detail">• BRIEF: Binary</text>
    <text x="160" y="118" class="detail">• FREAK: Bio-inspired</text>
    <text x="160" y="132" class="detail">• ORB: Rotated BRIEF</text>
  </g>
  
  <!-- Section 3: Matching -->
  <g class="anim-slide-left" style="animation-delay: 0.6s">
    <rect x="295" y="55" width="110" height="85" fill="url(#sectionGrad3)" filter="url(#shadow)" class="section-box" data-narration="Matching strategies compare descriptors between images using distance metrics, then filter outliers with ratio tests or RANSAC"/>
    <text x="350" y="72" text-anchor="middle" class="label">Matching</text>
    <text x="305" y="90" class="detail">• Brute-Force</text>
    <text x="305" y="104" class="detail">• FLANN</text>
    <text x="305" y="118" class="detail">• Ratio Test</text>
    <text x="305" y="132" class="detail">• RANSAC</text>
  </g>
  
  <!-- SIFT Descriptor Visualization (Main Diagram) -->
  <g transform="translate(30, 155)" class="anim-slide-up" style="animation-delay: 0.8s" data-narration="SIFT Descriptor: 4x4 grid of cells, each with 8 orientation bins, totaling 128 dimensions">
    <rect x="0" y="0" width="360" height="130" fill="#fff" rx="8" ry="8" filter="url(#shadow)"/>
    <text x="180" y="18" text-anchor="middle" class="label" fill="#6c5ce7">SIFT Descriptor Structure</text>
    
    <!-- 4x4 Grid -->
    <g transform="translate(25, 30)">
      <!-- Grid lines -->
      <rect x="0" y="0" width="80" height="80" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1"/>
      <line x1="20" y1="0" x2="20" y2="80" stroke="#b2bec3" stroke-width="1"/>
      <line x1="40" y1="0" x2="40" y2="80" stroke="#b2bec3" stroke-width="1"/>
      <line x1="60" y1="0" x2="60" y2="80" stroke="#b2bec3" stroke-width="1"/>
      <line x1="0" y1="20" x2="80" y2="20" stroke="#b2bec3" stroke-width="1"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#b2bec3" stroke-width="1"/>
      <line x1="0" y1="60" x2="80" y2="60" stroke="#b2bec3" stroke-width="1"/>
      
      <!-- Subregions with histograms -->
      <g fill="#00cec9" class="anim-pulse" style="animation-delay: 1.2s">
        <rect x="1" y="1" width="18" height="18" rx="2" opacity="0.8"/>
        <rect x="21" y="1" width="18" height="18" rx="2" opacity="0.7"/>
        <rect x="41" y="1" width="18" height="18" rx="2" opacity="0.9"/>
        <rect x="61" y="1" width="18" height="18" rx="2" opacity="0.6"/>
        <rect x="1" y="21" width="18" height="18" rx="2" opacity="0.7"/>
        <rect x="21" y="21" width="18" height="18" rx="2" opacity="0.85"/>
        <rect x="41" y="21" width="18" height="18" rx="2" opacity="0.75"/>
        <rect x="61" y="21" width="18" height="18" rx="2" opacity="0.65"/>
        <rect x="1" y="41" width="18" height="18" rx="2" opacity="0.9"/>
        <rect x="21" y="41" width="18" height="18" rx="2" opacity="0.55"/>
        <rect x="41" y="41" width="18" height="18" rx="2" opacity="0.8"/>
        <rect x="61" y="41" width="18" height="18" rx="2" opacity="0.7"/>
        <rect x="1" y="61" width="18" height="18" rx="2" opacity="0.6"/>
        <rect x="21" y="61" width="18" height="18" rx="2" opacity="0.75"/>
        <rect x="41" y="61" width="18" height="18" rx="2" opacity="0.85"/>
        <rect x="61" y="61" width="18" height="18" rx="2" opacity="0.7"/>
      </g>
      
      <!-- Arrow to expanded view -->
      <path d="M 90 40 L 110 40" stroke="#e84393" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Expanded single cell -->
    <g transform="translate(140, 30)">
      <rect x="0" y="0" width="70" height="80" fill="#fff" stroke="#e84393" stroke-width="2" rx="4"/>
      <text x="35" y="16" text-anchor="middle" class="detail" fill="#e84393">8 orientation bins</text>
      
      <!-- Histogram bars -->
      <g transform="translate(5, 20)">
        <rect x="0" y="50" width="6" height="15" fill="#00cec9"/>
        <rect x="7" y="40" width="6" height="25" fill="#00cec9"/>
        <rect x="14" y="30" width="6" height="35" fill="#00cec9"/>
        <rect x="21" y="20" width="6" height="45" fill="#00cec9"/>
        <rect x="28" y="25" width="6" height="40" fill="#00cec9"/>
        <rect x="35" y="35" width="6" height="30" fill="#00cec9"/>
        <rect x="42" y="45" width="6" height="20" fill="#00cec9"/>
        <rect x="49" y="50" width="6" height="15" fill="#00cec9"/>
      </g>
      <!-- Angle labels -->
      <text x="0" y="88" class="detail" font-size="8">0°</text>
      <text x="28" y="88" text-anchor="middle" class="detail" font-size="8">180°</text>
      <text x="55" y="88" text-anchor="end" class="detail" font-size="8">360°</text>
    </g>
    
    <!-- Vector representation -->
    <g transform="translate(230, 30)">
      <rect x="0" y="0" width="120" height="80" fill="#f8f9fa" stroke="#636e72" stroke-width="1" rx="4"/>
      <text x="60" y="16" text-anchor="middle" class="detail">128-dim Feature Vector</text>
      
      <!-- Vector bars -->
      <g transform="translate(8, 22)">
        <rect x="0" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="5" y="5" width="3" height="30" fill="#a29bfe"/>
        <rect x="10" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="15" y="10" width="3" height="25" fill="#a29bfe"/>
        <rect x="20" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="25" y="8" width="3" height="27" fill="#a29bfe"/>
        <rect x="30" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="35" y="15" width="3" height="20" fill="#a29bfe"/>
        <rect x="40" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="45" y="3" width="3" height="32" fill="#a29bfe"/>
        <rect x="50" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="55" y="12" width="3" height="23" fill="#a29bfe"/>
        <rect x="60" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="65" y="6" width="3" height="29" fill="#a29bfe"/>
        <rect x="70" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="75" y="18" width="3" height="17" fill="#a29bfe"/>
        <rect x="80" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="85" y="9" width="3" height="26" fill="#a29bfe"/>
        <rect x="90" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="95" y="4" width="3" height="31" fill="#a29bfe"/>
        <rect x="100" y="0" width="3" height="35" fill="#a29bfe"/>
        <rect x="105" y="14" width="3" height="21" fill="#a29bfe"/>
      </g>
    </g>
    
    <!-- Labels -->
    <text x="180" y="125" text-anchor="middle" class="detail" fill="#636e72">4×4 subregions × 8 bins = 128 dimensions</text>
  </g>
  
  <!-- Matching Example -->
  <g transform="translate(30, 300)" class="anim-fade" style="animation-delay: 1s" data-narration="Matching process: compute distance between feature vectors, apply ratio test to filter matches">
    <rect x="0" y="0" width="360" height="85" fill="#fff" rx="8" ry="8" filter="url(#shadow)"/>
    <text x="180" y="16" text-anchor="middle" class="label" fill="#e84393">Matching Pipeline</text>
    
    <!-- Image 1 -->
    <g transform="translate(20, 25)">
      <rect x="0" y="0" width="60" height="50" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1" rx="4"/>
      <circle cx="20" cy="15" r="4" fill="#e84393" class="anim-pulse"/>
      <circle cx="45" cy="25" r="4" fill="#00cec9" class="anim-pulse" style="animation-delay: 0.2s"/>
      <circle cx="30" cy="40" r="4" fill="#a29bfe" class="anim-pulse" style="animation-delay: 0.4s"/>
      <text x="30" y="60" text-anchor="middle" class="detail">Image A</text>
    </g>
    
    <!-- Matching lines -->
    <g stroke="#e84393" stroke-width="1.5" stroke-dasharray="4,2" class="anim-fade" style="animation-delay: 1.3s">
      <line x1="85" y1="40" x2="115" y2="40"/>
      <line x1="90" y1="50" x2="110" y2="50"/>
      <line x1="85" y1="60" x2="115" y2="60"/>
    </g>
    
    <!-- Image 2 -->
    <g transform="translate(130, 25)">
      <rect x="0" y="0" width="60" height="50" fill="#dfe6e9" stroke="#b2bec3" stroke-width="1" rx="4"/>
      <circle cx="25" cy="20" r="4" fill="#e84393" class="anim-pulse" style="animation-delay: 0.1s"/>
      <circle cx="50" cy="30" r="4" fill="#00cec9" class="anim-pulse" style="animation-delay: 0.3s"/>
      <circle cx="35" cy="42" r="4" fill="#a29bfe" class="anim-pulse" style="animation-delay: 0.5s"/>
      <text x="30" y="60" text-anchor="middle" class="detail">Image B</text>
    </g>
    
    <!-- Distance calculation -->
    <g transform="translate(210, 25)">
      <rect x="0" y="0" width="140" height="50" fill="#f8f9fa" stroke="#b2bec3" stroke-width="1" rx="4"/>
      <text x="70" y="14" text-anchor="middle" class="detail">Distance Calculation</text>
      <text x="10" y="30" class="detail" font-size="10">L2: √(Σ(a-b)²)</text>
      <text x="10" y="42" class="detail" font-size="10">Hamming: XOR + popcount</text>
    </g>
    
    <!-- Filter -->
    <g transform="translate(230, 30)" class="anim-pulse">
      <polygon points="135,0 155,10 155,30 135,40 115,30 115,10" fill="#00b894"/>
      <text x="135" y="26" text-anchor="middle" class="highlight-text" font-size="9">RATIO</text>
    </g>
  </g>
  
  <!-- Bottom info bar -->
  <g class="anim-fade" style="animation-delay: 1.2s">
    <rect x="15" y="390" width="390" height="1" fill="#dfe6e9"/>
    <text x="210" y="398" text-anchor="middle" class="detail" fill="#b2bec3">DU MSc CS • Computer Vision</text>
  </g>
  
  <!-- Arrow connectors between sections -->
  <g class="anim-fade" style="animation-delay: 1.5s">
    <path d="M 135 97 L 150 97" stroke="#b2bec3" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M 280 97 L 295 97" stroke="#b2bec3" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
</svg>