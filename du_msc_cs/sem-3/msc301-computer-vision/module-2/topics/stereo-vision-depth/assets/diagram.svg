<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="stereo-vision-depth">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e8fcf4"/>
    </linearGradient>
    <linearGradient id="cameraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9fd4"/>
      <stop offset="100%" style="stop-color:#3a7fb4"/>
    </linearGradient>
    <linearGradient id="pointGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1e3a5f; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #374151; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #6b7280; }
    .formula { font-family: 'Courier New', monospace; font-size: 14px; fill: #1e40af; font-weight: bold; }
    .section-box { rx: 8; ry: 8; fill: #ffffff; stroke: #d1d5db; stroke-width: 1; }
    .camera { fill: url(#cameraGrad); }
    .point { fill: url(#pointGrad); }
    .epipolar-line { stroke: #9ca3af; stroke-width: 1.5; stroke-dasharray: 5,3; }
    .ray { stroke: #ef4444; stroke-width: 2; opacity: 0.7; }
    .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .highlight { fill: #dc2626; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Stereo Vision Depth Estimation</text>
  
  <!-- Camera Centers Section -->
  <g class="anim-slide-left delay-1" data-narration="Two cameras capture the same scene from different viewpoints, separated by a baseline distance B">
    <rect x="20" y="50" width="120" height="35" class="section-box"/>
    <text x="80" y="65" text-anchor="middle" class="label" style="font-weight:bold;">Camera Setup</text>
    <text x="80" y="80" text-anchor="middle" class="detail">Left &amp; Right Cameras</text>
  </g>
  
  <!-- Left Camera -->
  <g transform="translate(60, 120)" class="anim-fade delay-2" data-narration="Left camera positioned at origin with focal length f">
    <rect x="0" y="0" width="50" height="35" rx="5" class="camera"/>
    <circle cx="25" cy="35" r="4" fill="#2563eb"/>
    <line x1="25" y1="35" x2="25" y2="50" stroke="#3b82f6" stroke-width="2"/>
    <text x="25" y="-8" text-anchor="middle" class="label" style="font-weight:bold;">Left Camera</text>
    <text x="25" y="60" text-anchor="middle" class="detail">Image Plane</text>
    <!-- Image plane -->
    <rect x="-10" y="50" width="70" height="45" fill="none" stroke="#93c5fd" stroke-width="2" rx="2"/>
    <line x1="0" y1="60" x2="50" y2="60" class="epipolar-line"/>
  </g>
  
  <!-- Right Camera -->
  <g transform="translate(310, 120)" class="anim-fade delay-2" data-narration="Right camera displaced by baseline B, creating a different perspective">
    <rect x="0" y="0" width="50" height="35" rx="5" class="camera"/>
    <circle cx="25" cy="35" r="4" fill="#2563eb"/>
    <line x1="25" y1="35" x2="25" y2="50" stroke="#3b82f6" stroke-width="2"/>
    <text x="25" y="-8" text-anchor="middle" class="label" style="font-weight:bold;">Right Camera</text>
    <text x="25" y="60" text-anchor="middle" class="detail">Image Plane</text>
    <!-- Image plane -->
    <rect x="-10" y="50" width="70" height="45" fill="none" stroke="#93c5fd" stroke-width="2" rx="2"/>
    <line x1="0" y1="60" x2="50" y2="60" class="epipolar-line"/>
  </g>
  
  <!-- Baseline Arrow -->
  <g class="anim-fade delay-3" data-narration="The baseline B is the distance between camera centers">
    <line x1="110" y1="155" x2="310" y2="155" class="arrow" style="stroke-width:3;"/>
    <text x="210" y="148" text-anchor="middle" class="label" style="fill:#2563eb;font-weight:bold;">Baseline (B)</text>
  </g>
  
  <!-- 3D Point -->
  <g class="anim-pulse delay-3" data-narration="A 3D point in space projects to different positions on each camera's image plane">
    <circle cx="210" cy="240" r="12" class="point"/>
    <text x="210" y="244" text-anchor="middle" fill="white" font-size="10" font-weight="bold">P</text>
    <text x="210" y="265" text-anchor="middle" class="label" style="font-weight:bold;">3D Point</text>
  </g>
  
  <!-- Rays from cameras to point -->
  <line x1="85" y1="165" x2="210" y2="240" class="ray anim-fade delay-4"/>
  <line x1="335" y1="165" x2="210" y2="240" class="ray anim-fade delay-4"/>
  
  <!-- Projection lines to image planes -->
  <line x1="85" y1="165" x2="85" y2="95" class="ray" style="stroke:#3b82f6;stroke-dasharray:3,3;opacity:0.5" data-narration="The point projects to xL on left image and xR on right image"/>
  <line x1="335" y1="165" x2="335" y2="95" class="ray" style="stroke:#3b82f6;stroke-dasharray:3,3;opacity:0.5"/>
  
  <!-- Disparity on image planes -->
  <g class="anim-fade delay-4" data-narration="Disparity d is the horizontal shift between corresponding points">
    <line x1="75" y1="172" x2="95" y2="172" stroke="#ef4444" stroke-width="3"/>
    <line x1="325" y1="172" x2="345" y2="172" stroke="#ef4444" stroke-width="3"/>
    <text x="85" y="188" text-anchor="middle" class="detail" style="fill:#ef4444;">xL</text>
    <text x="335" y="188" text-anchor="middle" class="detail" style="fill:#ef4444;">xR</text>
    <text x="210" y="175" text-anchor="middle" class="label" style="fill:#ef4444;font-weight:bold;">d = |xL - xR|</text>
  </g>
  
  <!-- Depth Formula Box -->
  <g class="anim-slide-up delay-4" data-narration="Depth is calculated using the triangulation formula: Z equals focal length times baseline divided by disparity">
    <rect x="130" y="295" width="160" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="210" y="318" text-anchor="middle" class="formula">Z = (f × B) / d</text>
    <text x="210" y="336" text-anchor="middle" class="detail">Depth = (focal × baseline) / disparity</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="anim-slide-right delay-2" transform="translate(260, 50)" data-narration="Key concepts include epipolar geometry, essential matrix, fundamental matrix, and the epipolar constraint">
    <rect x="0" y="0" width="145" height="85" class="section-box" style="fill:#f0fdf4;stroke:#22c55e;"/>
    <text x="72" y="18" text-anchor="middle" class="label" style="font-weight:bold;fill:#166534;">Key Concepts</text>
    <line x1="10" y1="28" x2="135" y2="28" stroke="#86efac" stroke-width="1"/>
    <text x="10" y="42" class="detail">• Epipolar Geometry</text>
    <text x="10" y="56" class="detail">• Essential Matrix (E)</text>
    <text x="10" y="70" class="detail">• Fundamental Matrix (F)</text>
    <text x="10" y="82" class="detail">• Rectification</text>
  </g>
  
  <!-- Epipolar Lines -->
  <g class="anim-fade delay-4" data-narration="Epipolar lines connect camera centers through the 3D point to corresponding image points">
    <line x1="60" y1="120" x2="210" y2="240" class="epipolar-line" style="stroke:#8b5cf6;stroke-width:1;"/>
    <line x1="360" y1="120" x2="210" y2="240" class="epipolar-line" style="stroke:#8b5cf6;stroke-width:1;"/>
    <text x="130" y="175" class="detail" style="fill:#8b5cf6;">Epipolar Line</text>
  </g>
  
  <!-- Bottom annotations -->
  <g class="anim-fade delay-4" data-narration="Higher disparity means closer objects, zero disparity means points at infinity">
    <text x="210" y="375" text-anchor="middle" class="detail" style="font-style:italic;">"Closer objects → Larger disparity | Distant objects → Smaller disparity"</text>
  </g>
</svg>