<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="sift-surf-orb-features">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f0f7fa;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#4a90a4" flood-opacity="0.2"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideIn {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes rotateIn {
        from { transform: rotate(-10deg) scale(0.8); opacity: 0; }
        to { transform: rotate(0) scale(1); opacity: 1; }
      }
      @keyframes drawLine {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #4a5568; }
      .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #718096; }
      .highlight { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2b6cb0; }
      .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2d3748; }
      .panel { opacity: 0; animation: fadeIn 0.6s ease-out forwards; }
      .panel-1 { animation-delay: 0.1s; }
      .panel-2 { animation-delay: 0.2s; }
      .panel-3 { animation-delay: 0.3s; }
      .panel-4 { animation-delay: 0.4s; }
      .panel-5 { animation-delay: 0.5s; }
      .slide { opacity: 0; animation: slideIn 0.5s ease-out forwards; }
      .slide-delay-1 { animation-delay: 0.3s; transform-origin: center; }
      .slide-delay-2 { animation-delay: 0.5s; transform-origin: center; }
      .pulse { transform-origin: center; animation: pulse 2s ease-in-out infinite; }
      .rotate { transform-origin: center; animation: rotateIn 0.6s ease-out forwards; animation-delay: 0.4s; }
      .arrow { stroke: #4299e1; stroke-width: 2; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 0.8s ease-out forwards; animation-delay: 0.6s; }
      .grid-cell { fill: none; stroke: #a0aec0; stroke-width: 0.5; }
      .histogram-bar { fill: #4299e1; opacity: 0.7; }
      .keypoint { fill: #e53e3e; }
      .feature-arrow { stroke: #805ad5; stroke-width: 1.5; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#805ad5" />
    </marker>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title panel panel-1">SIFT, SURF &amp; ORB Features</text>
  
  <!-- SIFT Pipeline Panel -->
  <g class="panel panel-1" data-narration="SIFT uses a multi-stage pipeline: scale-space extrema detection, keypoint localization, orientation assignment, and descriptor generation">
    <rect x="10" y="45" width="125" height="85" rx="6" fill="url(#panelGradient)" filter="url(#shadow)" />
    <text x="72" y="62" text-anchor="middle" class="section-title">SIFT Pipeline</text>
    <line x1="20" y1="72" x2="125" y2="72" stroke="#cbd5e0" stroke-width="1" />
    <text x="20" y="88" class="detail">1. Scale-Space Extrema</text>
    <text x="20" y="102" class="detail">2. Keypoint Localization</text>
    <text x="20" y="116" class="detail">3. Orientation Assignment</text>
  </g>
  
  <!-- Keypoint Detection Panel -->
  <g class="panel panel-2" data-narration="DoG (Difference of Gaussian) images detect local maxima across scales using 3x3x3 neighborhood analysis">
    <rect x="145" y="45" width="130" height="85" rx="6" fill="url(#panelGradient)" filter="url(#shadow)" />
    <text x="210" y="62" text-anchor="middle" class="section-title">Scale-Space Detection</text>
    <line x1="155" y1="72" x2="265" y2="72" stroke="#cbd5e0" stroke-width="1" />
    <!-- DoG visualization -->
    <rect x="160" y="80" width="30" height="25" fill="#e2e8f0" stroke="#a0aec0" stroke-width="1" rx="2"/>
    <rect x="165" y="85" width="8" height="8" fill="#9f7aea" rx="1"/>
    <rect x="177" y="85" width="8" height="8" fill="#805ad5" rx="1"/>
    <rect x="165" y="97" width="8" height="8" fill="#6b46c1" rx="1"/>
    <text x="200" y="90" class="detail">DoG</text>
    <text x="200" y="105" class="detail" font-size="10">3×3×3</text>
    <text x="200" y="118" class="detail" font-size="10">neighborhood</text>
  </g>
  
  <!-- Orientation Histogram Panel -->
  <g class="panel panel-3" data-narration="Orientation histograms with 36 bins capture gradient directions, with the dominant orientation assigned using 80% peak threshold">
    <rect x="285" y="45" width="125" height="85" rx="6" fill="url(#panelGradient)" filter="url(#shadow)" />
    <text x="347" y="62" text-anchor="middle" class="section-title">Orientation Histogram</text>
    <line x1="295" y1="72" x2="400" y2="72" stroke="#cbd5e0" stroke-width="1" />
    <!-- 8-bin histogram representation -->
    <g transform="translate(300, 120)">
      <rect x="0" y="0" width="8" height="15" class="histogram-bar" />
      <rect x="10" y="0" width="8" height="22" class="histogram-bar" />
      <rect x="20" y="0" width="8" height="10" class="histogram-bar" />
      <rect x="30" y="0" width="8" height="18" class="histogram-bar" />
      <rect x="40" y="0" width="8" height="30" class="histogram-bar" />
      <rect x="50" y="0" width="8" height="12" class="histogram-bar" />
      <rect x="60" y="0" width="8" height="8" class="histogram-bar" />
      <rect x="70" y="0" width="8" height="20" class="histogram-bar" />
    </g>
    <text x="347" y="118" text-anchor="middle" class="detail">36 bins total</text>
  </g>
  
  <!-- MAIN SIFT Descriptor - 4x4 Grid -->
  <g class="rotate" data-narration="The SIFT descriptor creates a 128-dimensional vector by computing 8-bin orientation histograms in each of 16 subregions">
    <rect x="60" y="145" width="180" height="180" rx="8" fill="url(#panelGradient)" filter="url(#shadow)" />
    <text x="150" y="165" text-anchor="middle" class="section-title">SIFT Descriptor (128-dim)</text>
    <text x="150" y="178" text-anchor="middle" class="detail">4×4 subregions × 8 bins = 128</text>
    
    <!-- 4x4 Grid -->
    <g transform="translate(75, 190)">
      <!-- Grid lines -->
      <line x1="0" y1="30" x2="150" y2="30" class="grid-cell" stroke-width="1"/>
      <line x1="0" y1="60" x2="150" y2="60" class="grid-cell" stroke-width="1"/>
      <line x1="0" y1="90" x2="150" y2="90" class="grid-cell" stroke-width="1"/>
      <line x1="37.5" y1="0" x2="37.5" y2="120" class="grid-cell" stroke-width="1"/>
      <line x1="75" y1="0" x2="75" y2="120" class="grid-cell" stroke-width="1"/>
      <line x1="112.5" y1="0" x2="112.5" y2="120" class="grid-cell" stroke-width="1"/>
      
      <!-- Orientation arrows in each cell -->
      <!-- Row 1 -->
      <line x1="10" y1="15" x2="22" y2="15" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="47" y1="10" x2="55" y2="5" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="82" y1="20" x2="90" y2="25" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="120" y1="15" x2="132" y2="12" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <!-- Row 2 -->
      <line x1="10" y1="45" x2="18" y2="40" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="50" y1="50" x2="58" y2="55" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="85" y1="42" x2="95" y2="38" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="118" y1="48" x2="130" y2="52" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <!-- Row 3 -->
      <line x1="8" y1="75" x2="15" y2="82" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="48" y1="70" x2="55" y2="65" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="88" y1="78" x2="98" y2="82" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="122" y1="72" x2="132" y2="68" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <!-- Row 4 -->
      <line x1="12" y1="105" x2="22" y2="110" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="52" y1="100" x2="60" y2="95" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="82" y1="108" x2="92" y2="112" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="120" y1="102" x2="132" y2="98" stroke="#805ad5" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Keypoint center marker -->
    <circle cx="150" cy="250" r="6" class="keypoint pulse" />
    <text x="150" y="270" text-anchor="middle" class="detail">Keypoint</text>
  </g>
  
  <!-- SURF Panel -->
  <g class="slide slide-delay-1" data-narration="SURF optimizes SIFT using integral images for fast box filters and Haar wavelets, creating a 64-dimensional descriptor">
    <rect x="255" y="145" width="155" height="80" rx="6" fill="url(#panelGradient)" filter="url(#shadow)" />
    <text x="332" y="162" text-anchor="middle" class="section-title">SURF</text>
    <line x1="265" y1="172" x2="400" y2="172" stroke="#cbd5e0" stroke-width="1" />
    <text x="265" y="190" class="detail">• Integral Images</text>
    <text x="265" y="205" class="detail">• Box Filters (LoG)</text>
    <text x="265" y="220" class="detail">• 64-dim Descriptor</text>
  </g>
  
  <!-- ORB Panel -->
  <g class="slide slide-delay-2" data-narration="ORB combines FAST keypoint detection with BRIEF descriptors, adding rotation invariance for real-time applications">
    <rect x="255" y="235" width="155" height="80" rx="6" fill="url(#panelGradient)" filter="url(#shadow)" />
    <text x="332" y="252" text-anchor="middle" class="section-title">ORB</text>
    <line x1="265" y1="262" x2="400" y2="262" stroke="#cbd5e0" stroke-width="1" />
    <text x="265" y="280" class="detail">• FAST Keypoints</text>
    <text x="265" y="295" class="detail">• BRIEF Descriptor</text>
    <text x="265" y="310" class="detail">• Rotation Aware</text>
  </g>
  
  <!-- Comparison Box -->
  <g class="panel panel-4" data-narration="Comparison shows SIFT (128-dim, most robust), SURF (64-dim, faster), and ORB (256-bit, fastest for real-time)">
    <rect x="10" y="335" width="235" height="55" rx="6" fill="url(#panelGradient)" filter="url(#shadow)" />
    <text x="20" y="355" class="section-title">Feature Comparison</text>
    <text x="20" y="372" class="detail" font-size="10">SIFT: 128-dim | SURF: 64-dim | ORB: 256-bit</text>
    <text x="20" y="385" class="detail" font-size="10">1999 → 2006 → 2011 (computational efficiency ↑)</text>
  </g>
  
  <!-- Application Box -->
  <g class="panel panel-5" data-narration="These features enable image stitching, object recognition, 3D reconstruction, and are used in robotics, AR, and medical imaging">
    <rect x="255" y="325" width="155" height="60" rx="6" fill="url(#panelGradient)" filter="url(#shadow)" />
    <text x="332" y="345" text-anchor="middle" class="section-title">Applications</text>
    <text x="265" y="362" class="detail" font-size="10">• Image Stitching</text>
    <text x="265" y="376" class="detail" font-size="10">• Object Recognition</text>
    <text x="340" y="376" class="detail" font-size="10">• 3D Recon</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="395" cy="55" r="15" fill="#e9d8fd" opacity="0.5" class="pulse" />
  <circle cx="25" cy="375" r="10" fill="#bee3f8" opacity="0.5" />
  <circle cx="405" cy="385" r="12" fill="#c6f6d5" opacity="0.5" />
</svg>