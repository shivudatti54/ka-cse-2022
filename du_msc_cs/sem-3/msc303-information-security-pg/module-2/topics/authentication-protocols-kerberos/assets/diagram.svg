<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="authentication-protocols-kerberos">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="asGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98d8aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bc48a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tgsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9b1ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a88bdd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc9b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6a08d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveTicket1 {
      0% { transform: translate(85px, 120px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(205px, 120px); opacity: 0; }
    }
    @keyframes moveTicket2 {
      0% { transform: translate(205px, 120px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(315px, 120px); opacity: 0; }
    }
    @keyframes moveTicket3 {
      0% { transform: translate(315px, 120px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(380px, 280px); opacity: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-weight: bold; }
    .entity { animation: fadeIn 0.8s ease-out; }
    .entity-client { animation: slideInLeft 0.6s ease-out; }
    .entity-as { animation: slideInLeft 0.7s ease-out; }
    .entity-tgs { animation: slideInLeft 0.8s ease-out; }
    .entity-server { animation: slideInRight 0.7s ease-out; }
    .arrow { animation: fadeIn 1.2s ease-out; }
    .ticket { animation: fadeIn 0.5s ease-out; }
    .ticket-anim1 { animation: moveTicket1 3s ease-in-out infinite; }
    .ticket-anim2 { animation: moveTicket2 3s ease-in-out infinite 1s; }
    .ticket-anim3 { animation: moveTicket3 3s ease-in-out infinite 2s; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .concept-box { animation: fadeIn 1s ease-out 0.5s both; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .label-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #222; }
    .step-label { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title label-title" font-size="18">Kerberos Authentication Protocol</text>
  
  <!-- Entity: Client -->
  <g class="entity entity-client" data-narration="Client: The user or machine requesting authentication">
    <rect x="30" y="90" width="70" height="60" rx="8" fill="url(#clientGrad)" filter="url(#shadow)"/>
    <text x="65" y="118" text-anchor="middle" class="label-title" font-size="12">Client</text>
    <text x="65" y="138" text-anchor="middle" class="label" font-size="9">User/App</text>
  </g>
  
  <!-- Entity: AS -->
  <g class="entity entity-as" data-narration="AS: Authentication Server - verifies user identity">
    <rect x="150" y="90" width="70" height="60" rx="8" fill="url(#asGrad)" filter="url(#shadow)"/>
    <text x="185" y="115" text-anchor="middle" class="label-title" font-size="11">AS</text>
    <text x="185" y="130" text-anchor="middle" class="label" font-size="9">Auth Server</text>
  </g>
  
  <!-- Entity: TGS -->
  <g class="entity entity-tgs" data-narration="TGS: Ticket Granting Server - issues service tickets">
    <rect x="260" y="90" width="70" height="60" rx="8" fill="url(#tgsGrad)" filter="url(#shadow)"/>
    <text x="295" y="115" text-anchor="middle" class="label-title" font-size="11">TGS</text>
    <text x="295" y="130" text-anchor="middle" class="label" font-size="9">Ticket Granting</text>
  </g>
  
  <!-- Entity: App Server -->
  <g class="entity entity-server" data-narration="App Server: Provides the requested service">
    <rect x="350" y="250" width="60" height="60" rx="8" fill="url(#serverGrad)" filter="url(#shadow)"/>
    <text x="380" y="278" text-anchor="middle" class="label-title" font-size="11">App</text>
    <text x="380" y="293" text-anchor="middle" class="label" font-size="9">Server</text>
  </g>
  
  <!-- Connection Lines -->
  <g class="arrow">
    <line x1="100" y1="120" x2="145" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="220" y1="120" x2="255" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="330" y1="150" x2="345" y2="245" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Step Labels -->
  <text x="122" y="108" class="step-label" text-anchor="middle">1. AS Exchange</text>
  <text x="237" y="108" class="step-label" text-anchor="middle">2. TGS Exchange</text>
  <text x="355" y="180" class="step-label" text-anchor="middle">3. App</text>
  
  <!-- Animated Tickets -->
  <g class="ticket ticket-anim1">
    <rect x="0" y="0" width="30" height="20" rx="3" fill="#ffd966" stroke="#cc9900" stroke-width="1"/>
    <text x="15" y="14" text-anchor="middle" font-size="8" fill="#664400">TGT</text>
  </g>
  
  <g class="ticket ticket-anim2">
    <rect x="0" y="0" width="30" height="20" rx="3" fill="#b3e6b3" stroke="#66aa66" stroke-width="1"/>
    <text x="15" y="14" text-anchor="middle" font-size="8" fill="#225522">Tkt</text>
  </g>
  
  <g class="ticket ticket-anim3">
    <rect x="0" y="0" width="30" height="20" rx="3" fill="#ffb3d9" stroke="#cc6699" stroke-width="1"/>
    <text x="15" y="14" text-anchor="middle" font-size="8" fill="#662244">Auth</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="Key Components of Kerberos Protocol">
    <rect x="10" y="320" width="180" height="70" rx="6" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <text x="20" y="340" class="label-title" font-size="11">Key Concepts</text>
    <text x="20" y="356" class="label" font-size="9">• KDC: AS + TGS</text>
    <text x="20" y="368" class="label" font-size="9">• TGT: Ticket Granting Ticket</text>
    <text x="20" y="380" class="label" font-size="9">• Session Keys (AES-256)</text>
  </g>
  
  <!-- Realms Box -->
  <g class="concept-box" data-narration="Kerberos Realm - administrative domain">
    <rect x="200" y="320" width="120" height="35" rx="6" fill="#e8d4f0" stroke="#b088c8" stroke-width="1"/>
    <text x="260" y="340" text-anchor="middle" class="label-title" font-size="11">Realm</text>
    <text x="260" y="352" text-anchor="middle" class="label" font-size="9">e.g., du.ac.in</text>
  </g>
  
  <!-- Process Steps Box -->
  <g class="concept-box" data-narration="Three-step authentication process">
    <rect x="330" y="320" width="80" height="70" rx="6" fill="#d4f0e8" stroke="#88c8b0" stroke-width="1"/>
    <text x="370" y="340" text-anchor="middle" class="label-title" font-size="10">Process</text>
    <text x="370" y="354" text-anchor="middle" class="label" font-size="8">1. Client→AS</text>
    <text x="370" y="366" text-anchor="middle" class="label" font-size="8">2. Client→TGS</text>
    <text x="370" y="378" text-anchor="middle" class="label" font-size="8">3. Client→App</text>
  </g>
  
  <!-- KDC Label -->
  <g class="pulse">
    <rect x="150" y="65" width="180" height="20" rx="4" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
    <text x="240" y="79" text-anchor="middle" class="label-title" font-size="11">KDC (Key Distribution Center)</text>
  </g>
  
  <!-- Mutual Auth Indicator -->
  <g data-narration="Mutual Authentication - both client and server verify each other">
    <path d="M 380 220 Q 420 180 380 150" fill="none" stroke="#4a90a4" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
    <text x="395" y="185" class="step-label" font-size="8" fill="#4a90a4">Mutual Auth</text>
  </g>
</svg>