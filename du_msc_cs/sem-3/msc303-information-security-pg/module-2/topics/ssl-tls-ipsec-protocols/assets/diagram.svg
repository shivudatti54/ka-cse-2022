<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ssl-tls-ipsec-protocols">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="tlsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90caf9"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
    <linearGradient id="ipsecGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5d6a7"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <linearGradient id="handshakeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff59d"/>
      <stop offset="100%" style="stop-color:#ffee58"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    @keyframes slideDown {
      from { transform: translateY(-15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .tls-box { animation: slideInLeft 0.6s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .ipsec-box { animation: slideInRight 0.6s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .handshake-box { animation: fadeIn 0.7s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .crypto-box { animation: slideDown 0.5s ease-out forwards; animation-delay: 0.7s; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow-anim { animation: arrowPulse 1.5s ease-in-out infinite; }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title title-anim" font-size="18" fill="#1565c0">SSL/TLS &amp; IPsec Protocols</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#42a5f5" stroke-width="2" class="title-anim"/>
  
  <!-- TLS Box (Left) -->
  <g class="tls-box" data-narration="SSL/TLS operates at Transport Layer (Layer 4), securing web traffic via HTTPS">
    <rect x="15" y="50" width="130" height="95" rx="8" fill="url(#tlsGrad)" filter="url(#shadow)"/>
    <text x="80" y="70" text-anchor="middle" class="label" font-size="14" fill="#0d47a1">SSL/TLS</text>
    <text x="80" y="88" text-anchor="middle" class="detail" font-size="11" fill="#0d47a1">Layer 4 (Transport)</text>
    <rect x="25" y="100" width="110" height="35" rx="4" fill="#e3f2fd"/>
    <text x="80" y="112" text-anchor="middle" class="detail" font-size="10" fill="#1565c0">HTTPS, Email, VoIP</text>
    <text x="80" y="125" text-anchor="middle" class="detail" font-size="10" fill="#1565c0">TLS 1.3 (2018)</text>
  </g>
  
  <!-- IPsec Box (Right) -->
  <g class="ipsec-box" data-narration="IPsec operates at Network Layer (Layer 3), providing VPN encryption through ESP and AH protocols">
    <rect x="275" y="50" width="130" height="95" rx="8" fill="url(#ipsecGrad)" filter="url(#shadow)"/>
    <text x="340" y="70" text-anchor="middle" class="label" font-size="14" fill="#1b5e20">IPsec</text>
    <text x="340" y="88" text-anchor="middle" class="detail" font-size="11" fill="#1b5e20">Layer 3 (Network)</text>
    <rect x="285" y="100" width="110" height="35" rx="4" fill="#e8f5e9"/>
    <text x="340" y="112" text-anchor="middle" class="detail" font-size="10" fill="#2e7d32">VPN, Gateway</text>
    <text x="340" y="125" text-anchor="middle" class="detail" font-size="10" fill="#2e7d32">ESP / AH</text>
  </g>
  
  <!-- Connection Arrows -->
  <g class="arrow-anim">
    <path d="M155 75 L265 75" stroke="#78909c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M155 120 L265 120" stroke="#78909c" stroke-width="2" fill="none"/>
  </g>
  
  <!-- TLS Handshake Flow -->
  <g class="handshake-box" data-narration="TLS 1.3 uses simplified 1-RTT handshake: ClientHello → ServerHello + Certs → Finished">
    <rect x="15" y="160" width="390" height="85" rx="8" fill="url(#handshakeGrad)" filter="url(#shadow)"/>
    <text x="210" y="180" text-anchor="middle" class="label" font-size="13" fill="#f57f17">TLS 1.3 Handshake (1-RTT)</text>
    
    <!-- Flow diagram -->
    <rect x="30" y="195" width="70" height="40" rx="5" fill="#fff" stroke="#f9a825" stroke-width="1.5"/>
    <text x="65" y="212" text-anchor="middle" class="detail" font-size="10" fill="#f57f17">ClientHello</text>
    
    <line x1="100" y1="215" x2="125" y2="215" stroke="#f57f17" stroke-width="2" class="arrow-anim"/>
    <polygon points="125,210 135,215 125,220" fill="#f57f17"/>
    
    <rect x="135" y="195" width="90" height="40" rx="5" fill="#fff" stroke="#f9a825" stroke-width="1.5"/>
    <text x="180" y="212" text-anchor="middle" class="detail" font-size="10" fill="#f57f17">ServerHello</text>
    <text x="180" y="224" text-anchor="middle" class="detail" font-size="9" fill="#f57f17">+ Certs</text>
    
    <line x1="225" y1="215" x2="250" y2="215" stroke="#f57f17" stroke-width="2" class="arrow-anim"/>
    <polygon points="250,210 260,215 250,220" fill="#f57f17"/>
    
    <rect x="260" y="195" width="70" height="40" rx="5" fill="#fff" stroke="#f9a825" stroke-width="1.5"/>
    <text x="295" y="212" text-anchor="middle" class="detail" font-size="10" fill="#f57f17">Finished</text>
    
    <!-- Lock icon pulse -->
    <g class="pulse-element" transform="translate(320, 205)">
      <rect x="0" y="5" width="16" height="12" rx="2" fill="#4caf50"/>
      <path d="M3 5 L3 2 Q8 -3 13 2 L13 5" stroke="#4caf50" stroke-width="2" fill="none"/>
    </g>
  </g>
  
  <!-- IPsec Modes & Protocols -->
  <g class="crypto-box" data-narration="IPsec provides Transport mode (host-to-host) and Tunnel mode (gateway-to-gateway) with ESP for encryption and AH for authentication">
    <rect x="15" y="255" width="190" height="75" rx="8" fill="#e8eaf6" filter="url(#shadow)"/>
    <text x="110" y="275" text-anchor="middle" class="label" font-size="12" fill="#303f9f">IPsec Modes</text>
    <rect x="25" y="285" width="80" height="35" rx="4" fill="#c5cae9"/>
    <text x="65" y="298" text-anchor="middle" class="detail" font-size="10" fill="#303f9f">Transport</text>
    <text x="65" y="310" text-anchor="middle" class="detail" font-size="9" fill="#303f9f">host-to-host</text>
    <rect x="115" y="285" width="80" height="35" rx="4" fill="#c5cae9"/>
    <text x="155" y="298" text-anchor="middle" class="detail" font-size="10" fill="#303f9f">Tunnel</text>
    <text x="155" y="310" text-anchor="middle" class="detail" font-size="9" fill="#303f9f">gateway-to-gateway</text>
  </g>
  
  <!-- Security Concepts -->
  <g class="crypto-box" data-narration="Core security requirements: Confidentiality (AES, ChaCha20), Integrity (HMAC, SHA-2), Authentication (X.509, PSK)">
    <rect x="215" y="255" width="190" height="75" rx="8" fill="#fce4ec" filter="url(#shadow)"/>
    <text x="310" y="275" text-anchor="middle" class="label" font-size="12" fill="#ad1457">Security Goals</text>
    <rect x="225" y="285" width="55" height="35" rx="4" fill="#f8bbd9"/>
    <text x="252" y="298" text-anchor="middle" class="detail" font-size="9" fill="#ad1457">Confidential</text>
    <text x="252" y="310" text-anchor="middle" class="detail" font-size="8" fill="#ad1457">AES, ChaCha20</text>
    <rect x="285" y="285" width="55" height="35" rx="4" fill="#f8bbd9"/>
    <text x="312" y="298" text-anchor="middle" class="detail" font-size="9" fill="#ad1457">Integrity</text>
    <text x="312" y="310" text-anchor="middle" class="detail" font-size="8" fill="#ad1457">HMAC, SHA-2</text>
    <rect x="345" y="285" width="50" height="35" rx="4" fill="#f8bbd9"/>
    <text x="370" y="298" text-anchor="middle" class="detail" font-size="9" fill="#ad1457">Authentic</text>
    <text x="370" y="310" text-anchor="middle" class="detail" font-size="8" fill="#ad1457">X.509, PSK</text>
  </g>
  
  <!-- IKEv2 Info -->
  <g class="crypto-box" data-narration="IKEv2 provides mutual authentication, NAT traversal, and MOBIKE for mobile clients">
    <rect x="15" y="340" width="390" height="50" rx="8" fill="#e0f2f1" filter="url(#shadow)"/>
    <text x="60" y="360" text-anchor="middle" class="label" font-size="12" fill="#00695c">IKEv2</text>
    <rect x="90" y="350" width="130" height="30" rx="4" fill="#b2dfdb"/>
    <text x="155" y="365" text-anchor="middle" class="detail" font-size="10" fill="#00695c">Mutual Auth (X.509/PSK)</text>
    <rect x="230" y="350" width="80" height="30" rx="4" fill="#b2dfdb"/>
    <text x="270" y="365" text-anchor="middle" class="detail" font-size="10" fill="#00695c">NAT-T</text>
    <rect x="320" y="350" width="75" height="30" rx="4" fill="#b2dfdb"/>
    <text x="357" y="365" text-anchor="middle" class="detail" font-size="10" fill="#00695c">MOBIKE</text>
  </g>
  
  <!-- Footer -->
  <text x="210" y="395" text-anchor="middle" class="detail" font-size="9" fill="#78909c">TLS 1.3: ECDHE for Forward Secrecy | IPsec: ESP + AH SAs</text>
</svg>