<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pki-and-certificates">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#eef2fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eaf4ef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rootGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="interGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c9cd9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a6fa8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="endGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6bbd8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8a5f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInTop {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInBottom {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(74,144,217,0.5)); }
      50% { filter: drop-shadow(0 0 8px rgba(74,144,217,0.8)); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: 'Segoe UI', sans-serif; }
    .box-root { animation: slideInTop 0.6s ease-out forwards, pulseGlow 3s ease-in-out infinite; }
    .box-inter { animation: slideInTop 0.7s ease-out forwards, pulseGlow 3s ease-in-out infinite 0.2s; }
    .box-end { animation: slideInBottom 0.8s ease-out forwards, pulse 2s ease-in-out infinite; }
    .arrow { animation: fadeIn 1s ease-out forwards; }
    .label { animation: fadeIn 0.5s ease-out forwards; }
    .concept-box { animation: slideInBottom 0.9s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2d5a8a" font-family="Segoe UI, sans-serif">PKI Trust Hierarchy</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#4a90d9" stroke-width="2" stroke-linecap="round" class="title" style="animation-delay: 0.3s"/>
  
  <!-- Root CA Box -->
  <g class="box-root" transform-origin="210 75">
    <rect x="160" y="50" width="100" height="50" rx="8" fill="url(#rootGradient)" filter="url(#shadow)"/>
    <text x="210" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="Segoe UI, sans-serif">Root CA</text>
    <text x="210" y="88" text-anchor="middle" font-size="10" fill="#e8f4fc" font-family="Segoe UI, sans-serif">Self-Signed</text>
  </g>
  
  <!-- Arrow from Root to Intermediate 1 -->
  <line x1="210" y1="100" x2="130" y2="145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.4s"/>
  <!-- Arrow from Root to Intermediate 2 -->
  <line x1="210" y1="100" x2="290" y2="145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.5s"/>
  
  <!-- Intermediate CA 1 -->
  <g class="box-inter" transform-origin="130 165">
    <rect x="70" y="145" width="120" height="45" rx="8" fill="url(#interGradient)" filter="url(#shadow)"/>
    <text x="130" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Segoe UI, sans-serif">Intermediate CA 1</text>
    <text x="130" y="180" text-anchor="middle" font-size="9" fill="#e8f4fc" font-family="Segoe UI, sans-serif">Issuing CA</text>
  </g>
  
  <!-- Intermediate CA 2 -->
  <g class="box-inter" transform-origin="290 165">
    <rect x="230" y="145" width="120" height="45" rx="8" fill="url(#interGradient)" filter="url(#shadow)"/>
    <text x="290" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Segoe UI, sans-serif">Intermediate CA 2</text>
    <text x="290" y="180" text-anchor="middle" font-size="9" fill="#e8f4fc" font-family="Segoe UI, sans-serif">Issuing CA</text>
  </g>
  
  <!-- Arrows to End Entities -->
  <line x1="130" y1="190" x2="90" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.6s"/>
  <line x1="130" y1="190" x2="170" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.7s"/>
  <line x1="290" y1="190" x2="250" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow" style="animation-delay: 0.8s"/>
  
  <!-- End Entity Certificates -->
  <g class="box-end" transform-origin="90 265">
    <rect x="40" y="240" width="100" height="45" rx="8" fill="url(#endGradient)" filter="url(#shadow)"/>
    <text x="90" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="Segoe UI, sans-serif">SSL Certificate</text>
    <text x="90" y="275" text-anchor="middle" font-size="9" fill="#e8f4fc" font-family="Segoe UI, sans-serif">End Entity</text>
  </g>
  
  <g class="box-end" transform-origin="170 265">
    <rect x="120" y="240" width="100" height="45" rx="8" fill="url(#endGradient)" filter="url(#shadow)"/>
    <text x="170" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="Segoe UI, sans-serif">Client Cert</text>
    <text x="170" y="275" text-anchor="middle" font-size="9" fill="#e8f4fc" font-family="Segoe UI, sans-serif">End Entity</text>
  </g>
  
  <g class="box-end" transform-origin="250 265">
    <rect x="200" y="240" width="100" height="45" rx="8" fill="url(#endGradient)" filter="url(#shadow)"/>
    <text x="250" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="Segoe UI, sans-serif">Code Signing</text>
    <text x="250" y="275" text-anchor="middle" font-size="9" fill="#e8f4fc" font-family="Segoe UI, sans-serif">End Entity</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box">
    <rect x="310" y="295" width="100" height="95" rx="6" fill="white" stroke="#4a90d9" stroke-width="1.5" opacity="0.9"/>
    <text x="360" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d5a8a" font-family="Segoe UI, sans-serif">Key Concepts</text>
    <line x1="318" y1="318" x2="402" y2="318" stroke="#4a90d9" stroke-width="0.5"/>
    <text x="318" y="332" font-size="9" fill="#444" font-family="Segoe UI, sans-serif">• X.509 v3</text>
    <text x="318" y="346" font-size="9" fill="#444" font-family="Segoe UI, sans-serif">• OCSP/CRL</text>
    <text x="318" y="360" font-size="9" fill="#444" font-family="Segoe UI, sans-serif">• Chain Validation</text>
    <text x="318" y="374" font-size="9" fill="#444" font-family="Segoe UI, sans-serif">• Trust Anchor</text>
  </g>
  
  <!-- Trust Chain Label -->
  <g class="arrow">
    <text x="380" y="110" font-size="9" fill="#666" font-family="Segoe UI, sans-serif" transform="rotate(45 380 110)">Signs</text>
    <text x="380" y="155" font-size="9" fill="#666" font-family="Segoe UI, sans-serif" transform="rotate(-45 380 155)">Signs</text>
  </g>
  
  <!-- Narration boxes with data-narration -->
  <g data-narration="Root CA: The trust anchor, self-signed certificate at top of hierarchy" opacity="0">
    <title>Root CA: The trust anchor, self-signed certificate at top of hierarchy</title>
  </g>
  <g data-narration="Intermediate CAs: Issue certificates under root's authority, create trust chain" opacity="0">
    <title>Intermediate CAs: Issue certificates under root's authority</title>
  </g>
  <g data-narration="End-Entity Certificates: SSL/TLS, client auth, code signing certificates" opacity="0">
    <title>End-Entity Certificates: SSL/TLS, client auth, code signing</title>
  </g>
  <g data-narration="Certificate Chain: Validated through digital signatures from root to leaf" opacity="0">
    <title>Certificate Chain: Validated through digital signatures</title>
  </g>
  <g data-narration="Key Concepts: X.509 format, revocation checking, trust validation" opacity="0">
    <title>Key Concepts: X.509 format, revocation checking</title>
  </g>
</svg>