<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="intrusion-detection-systems">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="sensorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b8e23"/>
      <stop offset="100%" style="stop-color:#4a6b1a"/>
    </linearGradient>
    <linearGradient id="alertGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd5c5c"/>
      <stop offset="100%" style="stop-color:#8b3a3a"/>
    </linearGradient>
    <linearGradient id="hidsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9370db"/>
      <stop offset="100%" style="stop-color:#6a5acd"/>
    </linearGradient>
    <linearGradient id="nidsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20b2aa"/>
      <stop offset="100%" style="stop-color:#008b8b"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .section-box { animation: fadeIn 1s ease-out; animation-fill-mode: both; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .sensor { animation: pulse 2s infinite; }
    .alert-indicator { animation: blink 1s infinite; }
    .arrow-line { animation: slideIn 0.8s ease-out; }
    .flow-path { stroke-dasharray: 100; stroke-dashoffset: 100; animation: dash 2s ease-out forwards; }
    @keyframes dash { to { stroke-dashoffset: 0; } }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Intrusion Detection Systems</text>
  <line x1="60" y1="40" x2="360" y2="40" stroke="#4a90a4" stroke-width="2"/>
  
  <!-- Network Diagram Section -->
  <g data-narration="Network-based IDS monitors traffic at strategic points in the network">
    <!-- Network Cloud -->
    <ellipse cx="80" cy="90" rx="50" ry="30" fill="#b0c4de" stroke="#778899" stroke-width="2"/>
    <text x="80" y="95" text-anchor="middle" font-size="11" fill="#2f4f4f">Internet</text>
    
    <!-- Network Traffic Flow -->
    <path d="M 130 90 L 180 90" stroke="#4682b4" stroke-width="2" fill="none" class="flow-path" marker-end="url(#arrowhead)"/>
    
    <!-- Firewall -->
    <rect x="180" y="70" width="25" height="40" fill="#dda0dd" stroke="#8b008b" stroke-width="2" rx="3"/>
    <text x="192" y="95" text-anchor="middle" font-size="9" fill="#4b0082">FW</text>
    
    <!-- More traffic flow -->
    <path d="M 205 90 L 260 90" stroke="#4682b4" stroke-width="2" fill="none" class="flow-path" marker-end="url(#arrowhead)" style="animation-delay: 0.5s"/>
  </g>
  
  <!-- NIDS Sensor -->
  <g class="sensor" data-narration="Network IDS sensor analyzes packets passing through the network segment">
    <circle cx="260" cy="90" r="18" fill="url(#nidsGradient)" stroke="#006666" stroke-width="2"/>
    <text x="260" y="85" text-anchor="middle" font-size="9" fill="white" font-weight="bold">NIDS</text>
    <text x="260" y="97" text-anchor="middle" font-size="7" fill="white">Sensor</text>
  </g>
  
  <!-- Internal Network -->
  <rect x="280" y="60" width="120" height="70" fill="#f0f8ff" stroke="#4169e1" stroke-width="2" stroke-dasharray="5,3" rx="5"/>
  <text x="340" y="78" text-anchor="middle" font-size="10" fill="#4169e1">Internal Network</text>
  
  <!-- Host with HIDS -->
  <g class="sensor" data-narration="Host-based IDS monitors individual host system activities">
    <rect x="300" y="88" width="35" height="25" fill="url(#hidsGradient)" stroke="#483d8b" stroke-width="2" rx="3"/>
    <text x="317" y="103" text-anchor="middle" font-size="8" fill="white" font-weight="bold">HIDS</text>
  </g>
  
  <!-- Connection to Server -->
  <path d="M 340 130 L 340 175" stroke="#4682b4" stroke-width="2" fill="none" class="flow-path" style="animation-delay: 1s" marker-end="url(#arrowhead)"/>
  
  <!-- Central Analysis Server -->
  <g data-narration="Central analysis engine processes alerts from all sensors">
    <rect x="290" y="175" width="100" height="50" fill="url(#serverGradient)" stroke="#2e5a1c" stroke-width="2" rx="5"/>
    <text x="340" y="195" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Analysis Engine</text>
    <text x="340" y="210" text-anchor="middle" font-size="9" fill="#e0ffe0">Pattern Matching &amp; ML</text>
  </g>
  
  <!-- Alert Flow -->
  <path d="M 290 200 L 230 200" stroke="#cd5c5c" stroke-width="2" fill="none" class="flow-path" style="animation-delay: 1.5s" marker-end="url(#arrowhead)"/>
  
  <!-- Alert Console -->
  <g data-narration="Alert console displays security events to administrators">
    <rect x="120" y="175" width="80" height="50" fill="url(#alertGradient)" stroke="#8b0000" stroke-width="2" rx="5"/>
    <text x="160" y="195" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Alert Console</text>
    <circle cx="145" cy="210" r="5" fill="#ff6347" class="alert-indicator"/>
    <text x="155" y="213" text-anchor="middle" font-size="8" fill="#fffacd">Active</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Two main types: Network-based IDS monitors traffic, Host-based IDS monitors individual systems">
    <rect x="20" y="240" width="180" height="70" fill="#f0fff0" stroke="#3cb371" stroke-width="2" rx="5" class="section-box"/>
    <text x="110" y="258" text-anchor="middle" font-size="12" fill="#2e8b57" font-weight="bold">Detection Types</text>
    <text x="110" y="275" text-anchor="middle" font-size="9" fill="#006400">• Signature-based (known threats)</text>
    <text x="110" y="288" text-anchor="middle" font-size="9" fill="#006400">• Anomaly-based (novel attacks)</text>
    <text x="110" y="301" text-anchor="middle" font-size="9" fill="#006400">• Stateful Protocol Analysis</text>
  </g>
  
  <g data-narration="Comparison of HIDS and NIDS deployment and monitoring approaches">
    <rect x="210" y="240" width="190" height="70" fill="#fff0f5" stroke="#db7093" stroke-width="2" rx="5" class="section-box"/>
    <text x="305" y="258" text-anchor="middle" font-size="12" fill="#c71585" font-weight="bold">HIDS vs NIDS</text>
    <text x="305" y="275" text-anchor="middle" font-size="9" fill="#8b008b">HIDS: Host logs, system calls</text>
    <text x="305" y="288" text-anchor="middle" font-size="9" fill="#8b008b">NIDS: Network packets, traffic</text>
    <text x="305" y="301" text-anchor="middle" font-size="9" fill="#8b008b">Hybrid: Combines both approaches</text>
  </g>
  
  <!-- Modern Techniques -->
  <g data-narration="Modern IDS uses machine learning for zero-day threat detection">
    <rect x="20" y="320" width="180" height="65" fill="#e6e6fa" stroke="#7b68ee" stroke-width="2" rx="5" class="section-box"/>
    <text x="110" y="338" text-anchor="middle" font-size="12" fill="#4b0082" font-weight="bold">Modern Techniques</text>
    <text x="110" y="355" text-anchor="middle" font-size="9" fill="#483d8b">• Deep Learning for Zero-day</text>
    <text x="110" y="368" text-anchor="middle" font-size="9" fill="#483d8b">• Federated Learning (IoT)</text>
    <text x="110" y="381" text-anchor="middle" font-size="9" fill="#483d8b">• Quantum-resistant Detection</text>
  </g>
  
  <!-- Output Section -->
  <g data-narration="IDS generates alerts and logs for security team response">
    <rect x="210" y="320" width="190" height="65" fill="#ffe4e1" stroke="#cd853f" stroke-width="2" rx="5" class="section-box"/>
    <text x="305" y="338" text-anchor="middle" font-size="12" fill="#8b4513" font-weight="bold">Response Actions</text>
    <text x="305" y="355" text-anchor="middle" font-size="9" fill="#a0522d">• Alert Generation &amp; Notification</text>
    <text x="305" y="368" text-anchor="middle" font-size="9" fill="#a0522d">• Log Preservation</text>
    <text x="305" y="381" text-anchor="middle" font-size="9" fill="#a0522d">• Incident Correlation</text>
  </g>
</svg>