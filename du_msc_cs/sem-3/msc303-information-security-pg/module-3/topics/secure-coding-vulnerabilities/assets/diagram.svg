<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="secure-coding-vulnerabilities">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="50%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f0e6f6"/>
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d299c2"/>
      <stop offset="100%" style="stop-color:#fef9d7"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#764ba2"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes flowArrow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: white; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .detail { font-family: monospace; font-size: 11px; }
    .section-box { rx: 8; ry: 8; stroke-width: 2; }
    .flow-arrow { stroke: #764ba2; stroke-width: 2; fill: none; stroke-dasharray: 5,5; animation: flowArrow 1s linear infinite; }
    .title-group { animation: fadeIn 0.8s ease-out; }
    .section1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .section2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .section3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .section4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .code-text { font-family: monospace; font-size: 10px; fill: #333; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="420" height="45" fill="url(#headerGradient)" rx="0" ry="0"/>
  <text x="210" y="30" text-anchor="middle" class="title" data-narration="Title: Secure Coding Vulnerabilities - Overview of critical software flaws">Secure Coding Vulnerabilities</text>
  
  <!-- Section 1: SQL Injection Flow -->
  <g class="section1" data-narration="SQL Injection: User input flows through unsanitized query to compromise database">
    <rect x="15" y="60" width="185" height="130" fill="url(#boxGradient1)" class="section-box" stroke="#ff6b6b"/>
    <text x="25" y="80" class="label" fill="#c44569">SQL Injection Flow</text>
    <rect x="25" y="90" width="40" height="30" fill="#fff" stroke="#ff6b6b" rx="4"/>
    <text x="30" y="107" class="code-text">Input</text>
    <text x="30" y="118" class="code-text">Field</text>
    <path d="M70 105 L100 105" class="flow-arrow" marker-end="url(#arrowhead)"/>
    <rect x="105" y="90" width="80" height="30" fill="#fff" stroke="#ff6b6b" rx="4"/>
    <text x="110" y="107" class="code-text">Unsanitize</text>
    <text x="110" y="118" class="code-text">Query</text>
    <path d="M190 105 L215 105" class="flow-arrow" marker-end="url(#arrowhead)"/>
    <rect x="100" y="130" width="90" height="50" fill="#fff" stroke="#ff6b6b" rx="4"/>
    <text x="105" y="148" class="code-text" fill="#c44569">Database</text>
    <text x="105" y="162" class="code-text">Compromised!</text>
    <text x="25" y="182" class="detail" fill="#c44569">Prevention: Parameterized queries</text>
  </g>
  
  <!-- Section 2: Memory Corruption -->
  <g class="section2" data-narration="Memory Corruption: Buffer overflow and use-after-free vulnerabilities in low-level code">
    <rect x="215" y="60" width="190" height="95" fill="url(#boxGradient2)" class="section-box" stroke="#20b2aa"/>
    <text x="225" y="80" class="label" fill="#00695c">Memory Corruption</text>
    <rect x="225" y="90" width="85" height="55" fill="#fff" stroke="#20b2aa" rx="4"/>
    <text x="230" y="108" class="code-text">Buffer</text>
    <text x="230" y="120" class="code-text">Overflow:</text>
    <text x="230" y="132" class="code-text">char buf[10];</text>
    <text x="230" y="144" class="code-text">gets(buf);</text>
    <rect x="320" y="90" width="75" height="55" fill="#fff" stroke="#20b2aa" rx="4"/>
    <text x="325" y="108" class="code-text">Use-After-</text>
    <text x="325" y="120" class="code-text">Free:</text>
    <text x="325" y="132" class="code-text">Access freed</text>
    <text x="325" y="144" class="code-text">memory</text>
    <text x="225" y="150" class="detail" fill="#00695c">Mitigation: ASLR, Stack Canaries</text>
  </g>
  
  <!-- Section 3: Cryptographic Failures -->
  <g class="section3" data-narration="Cryptographic Failures: Weak algorithms and improper key management">
    <rect x="15" y="200" width="190" height="80" fill="url(#boxGradient3)" class="section-box" stroke="#ffa726"/>
    <text x="25" y="220" class="label" fill="#e65100">Cryptographic Failures</text>
    <circle cx="45" cy="245" r="15" fill="#fff" stroke="#ffa726" stroke-width="2"/>
    <text x="40" y="250" class="code-text" font-size="16">🔓</text>
    <text x="70" y="240" class="detail" fill="#e65100">Weak: MD5, SHA-1</text>
    <text x="70" y="255" class="detail" fill="#e65100">Hardcoded keys</text>
    <circle cx="160" cy="245" r="15" fill="#fff" stroke="#ffa726" stroke-width="2"/>
    <text x="155" y="250" class="code-text" font-size="16">🔐</text>
    <text x="180" y="240" class="detail" fill="#e65100">Post-Quantum:</text>
    <text x="180" y="255" class="detail" fill="#e65100">Lattice-based</text>
  </g>
  
  <!-- Section 4: Access Control -->
  <g class="section4" data-narration="Access Control: Privilege escalation and broken object-level authorization">
    <rect x="215" y="165" width="190" height="115" fill="url(#boxGradient4)" class="section-box" stroke="#9575cd"/>
    <text x="225" y="185" class="label" fill="#5e35b1">Access Control</text>
    <rect x="225" y="195" width="85" height="40" fill="#fff" stroke="#9575cd" rx="4"/>
    <text x="230" y="213" class="code-text">Horizontal</text>
    <text x="230" y="227" class="code-text">Privilege Escalation</text>
    <rect x="320" y="195" width="75" height="40" fill="#fff" stroke="#9575cd" rx="4"/>
    <text x="325" y="213" class="code-text">BOLA:</text>
    <text x="325" y="227" class="code-text">Broken Object</text>
    <rect x="225" y="245" width="170" height="25" fill="#fff" stroke="#9575cd" rx="4"/>
    <text x="230" y="262" class="detail" fill="#5e35b1">Solution: RBAC with Attribute-Based Constraints</text>
  </g>
  
  <!-- Bottom Stats Bar -->
  <g data-narration="Statistics: Ransomware increased 149% in 2023, causing $6T annual damage">
    <rect x="15" y="295" width="390" height="45" fill="white" stroke="#ddd" rx="6"/>
    <text x="30" y="318" class="label" fill="#667eea">📊 Key Statistics</text>
    <text x="150" y="318" class="detail" fill="#333">Ransomware 2023: +149%</text>
    <text x="290" y="318" class="detail" fill="#333">Global Cost: $6 Trillion</text>
    <text x="150" y="332" class="detail" fill="#333">OWASP Top: Injection, Broken Access</text>
  </g>
  
  <!-- SDL Process Arrow -->
  <g data-narration="Secure Development Lifecycle: STRIDE threat modeling, SAST, Formal verification">
    <rect x="15" y="350" width="390" height="40" fill="url(#boxGradient2)" stroke="#20b2aa" rx="6"/>
    <text x="30" y="372" class="label" fill="#00695c">SDL: STRIDE → Threat Modeling → SAST → Formal Verification</text>
    <g class="pulse-element">
      <circle cx="380" cy="370" r="12" fill="#20b2aa"/>
      <text x="380" y="375" text-anchor="middle" fill="white" font-size="14">→</text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.3">
    <circle cx="50" cy="50" r="30" fill="#667eea"/>
    <circle cx="380" cy="360" r="20" fill="#764ba2"/>
    <circle cx="400" cy="30" r="15" fill="#ff9a9e"/>
  </g>
</svg>