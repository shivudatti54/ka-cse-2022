<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="number-theory-for-cryptography">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: 'Courier New', monospace; font-size: 13px; fill: #2980b9; font-weight: bold; }
    .box { fill: url(#boxGradient); stroke: #3498db; stroke-width: 1.5; rx: 8; }
    .arrow { stroke: #7f8c8d; stroke-width: 2; fill: none; }
    .highlight-box { fill: #ecf0f1; stroke: #e74c3c; stroke-width: 1.5; rx: 6; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
    
    .anim-fade { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-delay-1 { animation-delay: 0.2s; }
    .anim-delay-2 { animation-delay: 0.4s; }
    .anim-delay-3 { animation-delay: 0.6s; }
    .anim-delay-4 { animation-delay: 0.8s; }
    .anim-delay-5 { animation-delay: 1.0s; }
    .anim-delay-6 { animation-delay: 1.2s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Number Theory for Cryptography</text>
  <text x="210" y="48" text-anchor="middle" class="detail anim-fade anim-delay-1">RSA Key Generation Process</text>
  
  <!-- Section: Prime Selection -->
  <g data-narration="Step 1: Select two large prime numbers p and q">
    <text x="15" y="70" class="section-title anim-fade anim-delay-1">Step 1</text>
    <rect x="10" y="80" width="90" height="50" class="box anim-fade anim-delay-1" filter="url(#shadow)" />
    <text x="55" y="100" text-anchor="middle" class="label">Select Primes</text>
    <text x="55" y="118" text-anchor="middle" class="detail">p, q</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M100 105 L145 105" class="arrow anim-fade anim-delay-2" stroke-dasharray="5,3" />
  <polygon points="145,105 138,100 138,110" fill="#7f8c8d" class="anim-fade anim-delay-2" />
  
  <!-- Section: Compute n -->
  <g data-narration="Step 2: Compute n = p × q (the modulus)">
    <text x="155" y="70" class="section-title anim-fade anim-delay-2">Step 2</text>
    <rect x="150" y="80" width="100" height="50" class="box anim-fade anim-delay-2" filter="url(#shadow)" />
    <text x="200" y="100" text-anchor="middle" class="label">Compute n</text>
    <text x="200" y="118" text-anchor="middle" class="formula">n = p×q</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M250 105 L295 105" class="arrow anim-fade anim-delay-3" stroke-dasharray="5,3" />
  <polygon points="295,105 288,100 288,110" fill="#7f8c8d" class="anim-fade anim-delay-3" />
  
  <!-- Section: Euler's Totient -->
  <g data-narration="Step 3: Compute φ(n) = (p-1)(q-1) using Euler's totient function">
    <text x="305" y="70" class="section-title anim-fade anim-delay-3">Step 3</text>
    <rect x="300" y="80" width="110" height="50" class="box anim-fade anim-delay-3" filter="url(#shadow)" />
    <text x="355" y="100" text-anchor="middle" class="label">Compute φ(n)</text>
    <text x="355" y="118" text-anchor="middle" class="formula">φ(n)=(p-1)(q-1)</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M200 130 L200 165" class="arrow anim-fade anim-delay-4" stroke-dasharray="5,3" />
  <polygon points="200,175 195,168 205,168" fill="#7f8c8d" class="anim-fade anim-delay-4" />
  
  <!-- Section: Choose e -->
  <g data-narration="Step 4: Choose public exponent e that is coprime to φ(n)">
    <text x="110" y="190" class="section-title anim-fade anim-delay-4">Step 4</text>
    <rect x="90" y="200" width="100" height="55" class="box anim-fade anim-delay-4" filter="url(#shadow)" />
    <text x="140" y="222" text-anchor="middle" class="label">Choose e</text>
    <text x="140" y="240" text-anchor="middle" class="detail">1 &lt; e &lt; φ(n)</text>
    <text x="140" y="252" text-anchor="middle" class="detail">gcd(e,φ(n))=1</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M190 227 L245 227" class="arrow anim-fade anim-delay-5" stroke-dasharray="5,3" />
  <polygon points="252,227 245,222 245,232" fill="#7f8c8d" class="anim-fade anim-delay-5" />
  
  <!-- Section: Compute d -->
  <g data-narration="Step 5: Compute d ≡ e⁻¹ mod φ(n) (modular multiplicative inverse)">
    <text x="280" y="190" class="section-title anim-fade anim-delay-5">Step 5</text>
    <rect x="250" y="200" width="130" height="55" class="box anim-fade anim-delay-5" filter="url(#shadow)" />
    <text x="315" y="222" text-anchor="middle" class="label">Compute d</text>
    <text x="315" y="240" text-anchor="middle" class="formula">d ≡ e⁻¹ mod φ(n)</text>
    <text x="315" y="252" text-anchor="middle" class="detail">e·d ≡ 1 (mod φ)</text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M315 255 L315 285" class="arrow anim-fade anim-delay-6" stroke-dasharray="5,3" />
  <polygon points="315,295 310,288 320,288" fill="#7f8c8d" class="anim-fade anim-delay-6" />
  
  <!-- Keys Output Section -->
  <g data-narration="Final result: Public key (n, e) and Private key (n, d)">
    <!-- Public Key Box -->
    <rect x="30" y="300" width="160" height="80" class="box anim-fade anim-delay-6" filter="url(#shadow)" stroke="#27ae60" />
    <text x="110" y="320" text-anchor="middle" class="label" fill="#27ae60">PUBLIC KEY</text>
    <text x="110" y="340" text-anchor="middle" class="detail">Shared with everyone</text>
    <text x="110" y="360" text-anchor="middle" class="formula">(n, e)</text>
    
    <!-- Private Key Box -->
    <rect x="230" y="300" width="160" height="80" class="box anim-fade anim-delay-6" filter="url(#shadow)" stroke="#e74c3c" />
    <text x="310" y="320" text-anchor="middle" class="label" fill="#e74c3c">PRIVATE KEY</text>
    <text x="310" y="340" text-anchor="middle" class="detail">Kept secret</text>
    <text x="310" y="360" text-anchor="middle" class="formula">(n, d)</text>
  </g>
  
  <!-- Decorative lock icon -->
  <g class="anim-pulse" transform="translate(190, 295)">
    <rect x="10" y="15" width="20" height="16" rx="2" fill="#3498db" />
    <path d="M12 15 L12 8 Q12 3 20 3 Q28 3 28 8 L28 15" stroke="#3498db" stroke-width="3" fill="none" />
    <circle cx="20" cy="23" r="2" fill="#2c3e50" />
  </g>
  
  <!-- Key Concepts Side Panel -->
  <g data-narration="Key concepts: Modular Arithmetic, Euler's Theorem, Chinese Remainder Theorem">
    <rect x="10" y="375" width="400" height="20" fill="#34495e" rx="3" opacity="0.1" />
    <text x="210" y="388" text-anchor="middle" class="detail" fill="#2c3e50">
      Key Concepts: Modular Arithmetic • Euler's Theorem • DLP • CRT
    </text>
  </g>
</svg>