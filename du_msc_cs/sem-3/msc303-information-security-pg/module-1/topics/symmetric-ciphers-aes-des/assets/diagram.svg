<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="symmetric-ciphers-aes-des">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e4e8ec"/>
    </linearGradient>
    <linearGradient id="desGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d1e8f0"/>
    </linearGradient>
    <linearGradient id="aesGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e8f4"/>
      <stop offset="100%" style="stop-color:#e0d1e8"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-10deg) scale(0.8); opacity: 0; }
      to { transform: rotate(0) scale(1); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .des-box { animation: slideInLeft 0.6s ease-out; }
    .aes-box { animation: slideInRight 0.6s ease-out; }
    .des-operations { animation: fadeIn 1s ease-out 0.3s both; }
    .aes-operations { animation: fadeIn 1s ease-out 0.5s both; }
    .pulse-element { animation: pulse 2s infinite; }
    .rotate-in { animation: rotateIn 0.5s ease-out; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" class="title">Symmetric Ciphers: AES &amp; DES</text>
  
  <!-- DES Section (Left) -->
  <g class="des-box" data-narration="DES: Feistel network with 16 rounds, 56-bit key, 64-bit block">
    <rect x="15" y="45" width="185" height="155" rx="8" fill="url(#desGradient)" stroke="#3498db" stroke-width="2"/>
    <text x="108" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">DES Structure</text>
    <text x="25" y="85" font-size="11" fill="#34495e">• Feistel Network</text>
    <text x="25" y="100" font-size="11" fill="#34495e">• 16 Rounds</text>
    <text x="25" y="115" font-size="11" fill="#34495e">• 64-bit block / 56-bit key</text>
    <text x="25" y="130" font-size="11" fill="#34495e">• S-Box: 6→4 bit</text>
    <text x="25" y="145" font-size="11" fill="#34495e">• Key Schedule: 48-bit round keys</text>
    
    <!-- DES Round Visualization -->
    <g class="des-operations" transform="translate(25, 155)">
      <rect x="0" y="0" width="165" height="35" rx="4" fill="#aed6f1" stroke="#2980b9" stroke-width="1"/>
      <text x="82" y="15" text-anchor="middle" font-size="9" fill="#1a5276">Expansion E</text>
      <text x="82" y="27" text-anchor="middle" font-size="8" fill="#1a5276">S-Box → P-Box</text>
      <line x1="165" y1="17" x2="180" y2="17" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    </g>
  </g>
  
  <!-- AES Section (Right) -->
  <g class="aes-box" data-narration="AES: SPN network, 128-bit block, 128/192/256-bit key">
    <rect x="220" y="45" width="185" height="155" rx="8" fill="url(#aesGradient)" stroke="#9b59b6" stroke-width="2"/>
    <text x="312" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#7d3c98">AES Structure</text>
    <text x="230" y="85" font-size="11" fill="#34495e">• SPN (Subst.-Perm.)</text>
    <text x="230" y="100" font-size="11" fill="#34495e">• 10/12/14 Rounds</text>
    <text x="230" y="115" font-size="11" fill="#34495e">• 128-bit block</text>
    <text x="230" y="130" font-size="11" fill="#34495e">• 128/192/256-bit key</text>
    <text x="230" y="145" font-size="11" fill="#34495e">• GF(2⁸) operations</text>
    
    <!-- AES Round Steps -->
    <g class="aes-operations" transform="translate(230, 155)">
      <rect x="0" y="0" width="32" height="35" rx="3" fill="#d7bde2" stroke="#7d3c98" stroke-width="1" class="pulse-element"/>
      <text x="16" y="18" text-anchor="middle" font-size="8" fill="#4a235a">Sub</text>
      <rect x="36" y="0" width="32" height="35" rx="3" fill="#d7bde2" stroke="#7d3c98" stroke-width="1"/>
      <text x="52" y="18" text-anchor="middle" font-size="8" fill="#4a235a">Shift</text>
      <rect x="72" y="0" width="32" height="35" rx="3" fill="#d7bde2" stroke="#7d3c98" stroke-width="1"/>
      <text x="88" y="18" text-anchor="middle" font-size="8" fill="#4a235a">Mix</text>
      <rect x="108" y="0" width="32" height="35" rx="3" fill="#d7bde2" stroke="#7d3c98" stroke-width="1"/>
      <text x="124" y="18" text-anchor="middle" font-size="8" fill="#4a235a">AddKey</text>
    </g>
  </g>
  
  <!-- AES Round Steps Detail -->
  <g class="rotate-in" data-narration="AES round: SubBytes (S-box), ShiftRows (row shifts), MixColumns (matrix mult), AddRoundKey (XOR)">
    <rect x="220" y="210" width="185" height="85" rx="8" fill="#f8f0f8" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="312" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d3c98">AES Round Operations</text>
    <g transform="translate(228, 238)">
      <rect x="0" y="0" width="38" height="50" rx="4" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
      <text x="19" y="18" text-anchor="middle" font-size="8" font-weight="bold" fill="#5b2c6f">SubBytes</text>
      <text x="19" y="32" text-anchor="middle" font-size="7" fill="#5b2c6f">S-box GF(2⁸)</text>
      <rect x="44" y="0" width="38" height="50" rx="4" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
      <text x="63" y="18" text-anchor="middle" font-size="8" font-weight="bold" fill="#5b2c6f">ShiftRows</text>
      <text x="63" y="32" text-anchor="middle" font-size="7" fill="#5b2c6f">Cyclical shift</text>
      <rect x="88" y="0" width="38" height="50" rx="4" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
      <text x="107" y="18" text-anchor="middle" font-size="8" font-weight="bold" fill="#5b2c6f">MixColumns</text>
      <text x="107" y="32" text-anchor="middle" font-size="7" fill="#5b2c6f">Matrix mult</text>
      <rect x="132" y="0" width="38" height="50" rx="4" fill="#e8daef" stroke="#9b59b6" stroke-width="1"/>
      <text x="151" y="18" text-anchor="middle" font-size="8" font-weight="bold" fill="#5b2c6f">AddRoundKey</text>
      <text x="151" y="32" text-anchor="middle" font-size="7" fill="#5b2c6f">XOR key</text>
    </g>
  </g>
  
  <!-- Security Comparison -->
  <g data-narration="Security: AES resistant to cryptanalysis, DES broken by brute-force in 22 hours">
    <rect x="15" y="210" width="195" height="85" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
    <text x="112" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#b7950b">Security Comparison</text>
    
    <g transform="translate(23, 238)">
      <rect x="0" y="0" width="85" height="50" rx="4" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
      <text x="42" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="#d35400">DES</text>
      <text x="42" y="28" text-anchor="middle" font-size="7" fill="#d35400">56-bit key</text>
      <text x="42" y="40" text-anchor="middle" font-size="7" fill="#d35400">Broken 2006</text>
      
      <rect x="92" y="0" width="85" height="50" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
      <text x="134" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e8449">AES</text>
      <text x="134" y="28" text-anchor="middle" font-size="7" fill="#1e8449">128/192/256-bit</text>
      <text x="134" y="40" text-anchor="middle" font-size="7" fill="#1e8449">Still secure</text>
    </g>
  </g>
  
  <!-- Bottom: Key Concepts -->
  <g data-narration="Key concepts: Feistel vs SPN structure, key sizes, rounds, security strength">
    <rect x="15" y="305" width="390" height="85" rx="8" fill="#f0f8ff" stroke="#3498db" stroke-width="1"/>
    <text x="210" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    
    <g transform="translate(23, 335)">
      <text x="0" y="0" font-size="9" fill="#34495e">• <tspan font-weight="bold">DES:</tspan> Feistel structure splits block,</text>
      <text x="15" y="13" font-size="9" fill="#34495e">16 rounds, vulnerable to brute-force</text>
      
      <text x="0" y="28" font-size="9" fill="#34495e">• <tspan font-weight="bold">AES:</tspan> SPN structure, invertible</text>
      <text x="15" y="41" font-size="9" fill="#34495e">operations, strong diffusion properties</text>
      
      <text x="200" y="0" font-size="9" fill="#34495e">• <tspan font-weight="bold">3DES:</tspan> Triple-DES, 112/168-bit</text>
      <text x="215" y="13" font-size="9" fill="#34495e">key, meet-in-the-middle attack</text>
      
      <text x="200" y="28" font-size="9" fill="#34495e">• <tspan font-weight="bold">Applications:</tspan> TLS/SSL, VPN,</text>
      <text x="215" y="41" font-size="9" fill="#34495e">disk encryption, wireless security</text>
    </g>
  </g>
  
  <!-- Decorative connection arrows -->
  <g opacity="0.6">
    <path d="M108 200 Q108 215 112 220" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
    <path d="M312 200 Q312 215 308 220" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
</svg>