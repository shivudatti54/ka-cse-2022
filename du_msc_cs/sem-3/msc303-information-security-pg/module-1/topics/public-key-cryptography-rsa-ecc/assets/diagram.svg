<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="public-key-cryptography-rsa-ecc" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5e2eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e8f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcc5e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#af7ac5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; font-family: 'Segoe UI', Arial, sans-serif; font-weight: bold; fill: #2c3e50; }
    .section-box { animation: slideInDown 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .step-box { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    .step-box:nth-child(1) { animation-delay: 0.3s; }
    .step-box:nth-child(2) { animation-delay: 0.5s; }
    .step-box:nth-child(3) { animation-delay: 0.7s; }
    .step-box:nth-child(4) { animation-delay: 0.9s; }
    .arrow-line { stroke-dasharray: 100; animation: drawLine 0.8s ease-out forwards; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #34495e; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #5d6d7e; }
    .highlight { font-weight: bold; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" font-size="20">Public Key Cryptography</text>
  <text x="210" y="46" text-anchor="middle" class="title" font-size="16" fill="#5d6d7e">RSA &amp; ECC</text>

  <!-- RSA Key Generation Flow Section -->
  <g data-narration="RSA Key Generation Flow: Shows the step-by-step process from selecting primes to computing keys">
    <rect x="10" y="60" width="400" height="170" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)" opacity="0.95"/>
    <text x="20" y="80" class="title" font-size="14" fill="#2874a6">RSA Key Generation Flow</text>
    
    <!-- Step 1: Choose Primes -->
    <g class="step-box" style="animation-delay: 0.4s;">
      <rect x="20" y="95" width="85" height="55" rx="5" fill="#fff" stroke="#5dade2" stroke-width="1.5"/>
      <text x="62.5" y="112" text-anchor="middle" class="label highlight" font-size="11">Step 1</text>
      <text x="62.5" y="127" text-anchor="middle" class="detail">Choose p, q</text>
      <text x="62.5" y="140" text-anchor="middle" class="detail" fill="#7f8c8d">Large Primes</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M110 122 L140 122" stroke="url(#arrowGradient)" stroke-width="2" fill="none" class="arrow-line"/>
    <polygon points="138,117 148,122 138,127" fill="#af7ac5"/>
    
    <!-- Step 2: Compute n and φ(n) -->
    <g class="step-box" style="animation-delay: 0.6s;">
      <rect x="145" y="95" width="85" height="55" rx="5" fill="#fff" stroke="#5dade2" stroke-width="1.5"/>
      <text x="187.5" y="112" text-anchor="middle" class="label highlight" font-size="11">Step 2</text>
      <text x="187.5" y="127" text-anchor="middle" class="detail">n = p × q</text>
      <text x="187.5" y="140" text-anchor="middle" class="detail" fill="#7f8c8d">φ(n) = (p-1)(q-1)</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M235 122 L265 122" stroke="url(#arrowGradient)" stroke-width="2" fill="none" class="arrow-line"/>
    <polygon points="263,117 273,122 263,127" fill="#af7ac5"/>
    
    <!-- Step 3: Select e -->
    <g class="step-box" style="animation-delay: 0.8s;">
      <rect x="270" y="95" width="85" height="55" rx="5" fill="#fff" stroke="#5dade2" stroke-width="1.5"/>
      <text x="312.5" y="112" text-anchor="middle" class="label highlight" font-size="11">Step 3</text>
      <text x="312.5" y="127" text-anchor="middle" class="detail">Select e</text>
      <text x="312.5" y="140" text-anchor="middle" class="detail" fill="#7f8c8d">gcd(e,φ(n))=1</text>
    </g>
    
    <!-- Arrow 3 -->
    <path d="M360 122 L390 122" stroke="url(#arrowGradient)" stroke-width="2" fill="none" class="arrow-line"/>
    <polygon points="388,117 398,122 388,127" fill="#af7ac5"/>
    
    <!-- Step 4: Compute d -->
    <g class="step-box" style="animation-delay: 1.0s;">
      <rect x="395" y="95" width="85" height="55" rx="5" fill="#fff" stroke="#5dade2" stroke-width="1.5"/>
      <text x="437.5" y="112" text-anchor="middle" class="label highlight" font-size="11">Step 4</text>
      <text x="437.5" y="127" text-anchor="middle" class="detail">d ≡ e⁻¹ mod φ(n)</text>
      <text x="437.5" y="140" text-anchor="middle" class="detail" fill="#7f8c8d">Private Key</text>
    </g>
    
    <!-- Keys Output -->
    <g class="step-box" style="animation-delay: 1.2s;">
      <rect x="145" y="160" width="130" height="60" rx="5" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5"/>
      <text x="210" y="178" text-anchor="middle" class="label highlight" font-size="11" fill="#1e8449">Public Key</text>
      <text x="210" y="194" text-anchor="middle" class="detail">(n, e)</text>
      <text x="210" y="210" text-anchor="middle" class="label highlight" font-size="11" fill="#c0392b">Private Key</text>
      <text x="210" y="222" text-anchor="middle" class="detail">d</text>
    </g>
  </g>

  <!-- ECC Section -->
  <g data-narration="Elliptic Curve Cryptography: Uses elliptic curve mathematics for smaller key sizes">
    <rect x="10" y="240" width="200" height="145" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)" opacity="0.95"/>
    <text x="20" y="260" class="title" font-size="14" fill="#7d3c98">ECC - Elliptic Curve</text>
    
    <!-- Simple ECC Curve Visualization -->
    <g class="pulse-element">
      <path d="M35 340 Q55 280 85 310 Q115 340 145 300" stroke="#9b59b6" stroke-width="2" fill="none"/>
      <path d="M35 300 Q55 340 85 310 Q115 280 145 320" stroke="#9b59b6" stroke-width="2" fill="none"/>
    </g>
    
    <!-- Points on curve -->
    <circle cx="60" cy="320" r="4" fill="#e74c3c" class="pulse-element"/>
    <circle cx="110" cy="295" r="4" fill="#e74c3c" class="pulse-element"/>
    <circle cx="130" cy="330" r="4" fill="#e74c3c" class="pulse-element"/>
    
    <text x="55" y="340" class="detail" font-size="9">P</text>
    <text x="105" y="290" class="detail" font-size="9">Q</text>
    
    <!-- ECC Details -->
    <rect x="20" y="270" width="180" height="55" rx="4" fill="#fff" opacity="0.7"/>
    <text x="30" y="286" class="detail">Equation: y² = x³ + ax + b</text>
    <text x="30" y="300" class="detail">Group: Points on curve</text>
    <text x="30" y="314" class="detail">Security: ECDLP</text>
  </g>

  <!-- Security Comparison -->
  <g data-narration="Security Comparison: Shows equivalent key sizes between RSA and ECC">
    <rect x="220" y="240" width="190" height="145" rx="8" fill="#fdf2e9" stroke="#e59866" stroke-width="1" filter="url(#shadow)" opacity="0.95"/>
    <text x="230" y="260" class="title" font-size="14" fill="#d35400">Security Comparison</text>
    
    <!-- RSA Box -->
    <rect x="230" y="275" width="80" height="55" rx="5" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
    <text x="270" y="292" text-anchor="middle" class="label" font-size="11">RSA</text>
    <text x="270" y="308" text-anchor="middle" class="detail">3072-bit</text>
    <text x="270" y="320" text-anchor="middle" class="detail" fill="#7f8c8d">≈ 128-bit</text>
    
    <!-- ECC Box -->
    <rect x="320" y="275" width="80" height="55" rx="5" fill="#d4efdf" stroke="#27ae60" stroke-width="1"/>
    <text x="360" y="292" text-anchor="middle" class="label" font-size="11">ECC</text>
    <text x="360" y="308" text-anchor="middle" class="detail">256-bit</text>
    <text x="360" y="320" text-anchor="middle" class="detail" fill="#7f8c8d">≈ 128-bit</text>
    
    <!-- Arrow between -->
    <path d="M315 302 L325 302" stroke="#f39c12" stroke-width="2" fill="none"/>
    <polygon points="323,297 333,302 323,307" fill="#f39c12"/>
    
    <!-- Security Notes -->
    <rect x="230" y="340" width="170" height="35" rx="4" fill="#fff" opacity="0.7"/>
    <text x="240" y="355" class="detail" font-size="9">⚠ Shor's algorithm (Quantum)</text>
    <text x="240" y="368" class="detail" font-size="9">breaks both RSA and ECC</text>
  </g>

  <!-- Bottom Legend -->
  <g data-narration="Key concepts summary: Factorization hardness vs Discrete Logarithm">
    <rect x="10" y="385" width="400" height="12" rx="3" fill="#ecf0f1"/>
    <text x="210" y="394" text-anchor="middle" class="detail" font-size="9">RSA: Integer Factorization | ECC: Elliptic Curve Discrete Logarithm Problem</text>
  </g>
</svg>