<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="blockchain-security">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e0e8f8"/>
      <stop offset="100%" style="stop-color:#e8e0f4"/>
    </linearGradient>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="cryptoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#1a7a43"/>
    </linearGradient>
    <linearGradient id="attackGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="consensusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#7d3c98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes chainPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .title-group { animation: fadeIn 1s ease-out; }
    .section-consensus { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section-crypto { animation: slideInUp 0.8s ease-out 0.4s both; }
    .section-contracts { animation: slideInRight 0.8s ease-out 0.6s both; }
    .section-attacks { animation: slideInUp 0.8s ease-out 0.8s both; }
    .block { animation: pulse 3s infinite; transform-origin: center; }
    .chain-link { animation: chainPulse 2s infinite; }
    .arrow { animation: fadeIn 1s ease-out 1s both; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <g class="title-group">
    <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Blockchain Security</text>
    <line x1="60" y1="38" x2="360" y2="38" stroke="#4a90d9" stroke-width="2"/>
  </g>
  
  <!-- Section 1: Consensus Security -->
  <g class="section-consensus" data-narration="Consensus mechanisms secure blockchain through PoW, PoS, and PBFT">
    <rect x="15" y="50" width="95" height="75" rx="8" fill="url(#consensusGradient)" filter="url(#shadow)"/>
    <text x="62" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Consensus</text>
    <text x="62" y="85" text-anchor="middle" font-size="9" fill="#e8e0f4">PoW • PoS • PBFT</text>
    <text x="62" y="100" text-anchor="middle" font-size="8" fill="#d4c4e8">2/3 honest nodes</text>
    <text x="62" y="115" text-anchor="middle" font-size="8" fill="#d4c4e8">required</text>
  </g>
  
  <!-- Section 2: Cryptographic Foundations -->
  <g class="section-crypto" data-narration="Cryptography secures blockchain through Merkle trees, ECDSA, and zk-SNARKs">
    <rect x="160" y="50" width="105" height="75" rx="8" fill="url(#cryptoGradient)" filter="url(#shadow)"/>
    <text x="212" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Cryptography</text>
    <text x="212" y="85" text-anchor="middle" font-size="9" fill="#e8f4ec">Merkle Tree</text>
    <text x="212" y="100" text-anchor="middle" font-size="9" fill="#e8f4ec">ECDSA • zk-SNARKs</text>
  </g>
  
  <!-- Section 3: Smart Contract Vulnerabilities -->
  <g class="section-contracts" data-narration="Smart contracts face vulnerabilities like reentrancy and overflow attacks">
    <rect x="310" y="50" width="95" height="75" rx="8" fill="url(#attackGradient)" filter="url(#shadow)"/>
    <text x="357" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Smart Contracts</text>
    <text x="357" y="85" text-anchor="middle" font-size="8" fill="#ffcdd2">Reentrancy</text>
    <text x="357" y="100" text-anchor="middle" font-size="8" fill="#ffcdd2">Overflow</text>
    <text x="357" y="115" text-anchor="middle" font-size="8" fill="#ffcdd2">Front-running</text>
  </g>
  
  <!-- Blockchain Structure Visualization -->
  <g class="block" data-narration="Blocks are linked via cryptographic hashes forming an immutable chain">
    <text x="210" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Blockchain Structure</text>
    
    <!-- Block 1 -->
    <rect x="30" y="158" width="70" height="45" rx="4" fill="url(#blockGradient)" stroke="#1e3a5f" stroke-width="1"/>
    <text x="65" y="172" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Block #1</text>
    <text x="65" y="185" text-anchor="middle" font-size="7" fill="#b8d4f0">Hash: 0A3F...</text>
    <text x="65" y="196" text-anchor="middle" font-size="7" fill="#b8d4f0">Prev: 0000</text>
    
    <!-- Arrow 1 -->
    <path d="M103 180 L118 180" stroke="#4a90d9" stroke-width="2" class="arrow"/>
    <polygon points="118,180 113,177 113,183" fill="#4a90d9"/>
    
    <!-- Block 2 -->
    <rect x="120" y="158" width="70" height="45" rx="4" fill="url(#blockGradient)" stroke="#1e3a5f" stroke-width="1"/>
    <text x="155" y="172" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Block #2</text>
    <text x="155" y="185" text-anchor="middle" font-size="7" fill="#b8d4f0">Hash: 7B2C...</text>
    <text x="155" y="196" text-anchor="middle" font-size="7" fill="#b8d4f0">Prev: 0A3F</text>
    
    <!-- Arrow 2 -->
    <path d="M193 180 L208 180" stroke="#4a90d9" stroke-width="2" class="arrow"/>
    <polygon points="208,180 203,177 203,183" fill="#4a90d9"/>
    
    <!-- Block 3 -->
    <rect x="210" y="158" width="70" height="45" rx="4" fill="url(#blockGradient)" stroke="#1e3a5f" stroke-width="1"/>
    <text x="245" y="172" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Block #3</text>
    <text x="245" y="185" text-anchor="middle" font-size="7" fill="#b8d4f0">Hash: D9E1...</text>
    <text x="245" y="196" text-anchor="middle" font-size="7" fill="#b8d4f0">Prev: 7B2C</text>
    
    <!-- Chain lock icon -->
    <circle cx="320" cy="180" r="15" fill="#27ae60" class="chain-link"/>
    <path d="M315 180 L325 180 M317 176 L317 184 M323 176 L323 184" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Merkle Tree Visualization -->
  <g data-narration="Merkle tree provides efficient data integrity verification">
    <text x="80" y="220" text-anchor="middle" font-size="10" fill="#2c3e50">Merkle Root</text>
    <circle cx="80" cy="228" r="8" fill="#9b59b6"/>
    <text x="80" y="231" text-anchor="middle" font-size="8" fill="white" font-weight="bold">R</text>
    
    <!-- Tree lines -->
    <line x1="80" y1="236" x2="50" y2="255" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="80" y1="236" x2="110" y2="255" stroke="#7f8c8d" stroke-width="1"/>
    
    <!-- Level 2 -->
    <circle cx="50" cy="258" r="6" fill="#3498db"/>
    <circle cx="110" cy="258" r="6" fill="#3498db"/>
    <text x="50" y="261" text-anchor="middle" font-size="7" fill="white" font-weight="bold">A</text>
    <text x="110" y="261" text-anchor="middle" font-size="7" fill="white" font-weight="bold">B</text>
    
    <!-- Level 3 -->
    <line x1="50" y1="264" x2="35" y2="280" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="50" y1="264" x2="65" y2="280" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="110" y1="264" x2="95" y2="280" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="110" y1="264" x2="125" y2="280" stroke="#7f8c8d" stroke-width="1"/>
    
    <rect x="28" y="282" width="14" height="10" rx="2" fill="#e74c3c"/>
    <rect x="58" y="282" width="14" height="10" rx="2" fill="#e74c3c"/>
    <rect x="88" y="282" width="14" height="10" rx="2" fill="#27ae60"/>
    <rect x="118" y="282" width="14" height="10" rx="2" fill="#27ae60"/>
    <text x="35" y="290" text-anchor="middle" font-size="6" fill="white">Tx1</text>
    <text x="65" y="290" text-anchor="middle" font-size="6" fill="white">Tx2</text>
    <text x="95" y="290" text-anchor="middle" font-size="6" fill="white">Tx3</text>
    <text x="125" y="290" text-anchor="middle" font-size="6" fill="white">Tx4</text>
  </g>
  
  <!-- Network Attacks Section -->
  <g class="section-attacks" data-narration="Network attacks include 51%, Eclipse, and Sybil attacks">
    <rect x="160" y="305" width="105" height="70" rx="8" fill="url(#attackGradient)" filter="url(#shadow)"/>
    <text x="212" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Network Attacks</text>
    <text x="212" y="340" text-anchor="middle" font-size="9" fill="#ffcdd2">• 51% Attack</text>
    <text x="212" y="355" text-anchor="middle" font-size="9" fill="#ffcdd2">• Eclipse Attack</text>
    <text x="212" y="370" text-anchor="middle" font-size="9" fill="#ffcdd2">• Sybil Attack</text>
  </g>
  
  <!-- Key Relationships/Arrows -->
  <g class="arrow">
    <path d="M62 125 L62 155" stroke="#9b59b6" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="62,155 59,150 65,150" fill="#9b59b6"/>
    <text x="45" y="145" font-size="8" fill="#7d3c98" transform="rotate(-90, 45, 145)">Immutability</text>
  </g>
  
  <g class="arrow">
    <path d="M212 125 L212 155" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="212,155 209,150 215,150" fill="#27ae60"/>
    <text x="222" y="143" font-size="8" fill="#1a7a43">Integrity</text>
  </g>
  
  <!-- Security Pillars -->
  <g>
    <text x="357" y="145" text-anchor="middle" font-size="11" fill="#2c3e50">Security Pillars</text>
    <rect x="320" y="155" width="74" height="20" rx="4" fill="#f39c12" opacity="0.9"/>
    <text x="357" y="169" text-anchor="middle" font-size="9" fill="white">Decentralization</text>
    
    <rect x="320" y="178" width="74" height="20" rx="4" fill="#f39c12" opacity="0.9"/>
    <text x="357" y="192" text-anchor="middle" font-size="9" fill="white">Consensus</text>
    
    <rect x="320" y="201" width="74" height="20" rx="4" fill="#f39c12" opacity="0.9"/>
    <text x="357" y="215" text-anchor="middle" font-size="9" fill="white">Cryptography</text>
  </g>
  
  <!-- Bottom Note -->
  <g>
    <rect x="15" y="378" width="130" height="16" rx="3" fill="#3498db" opacity="0.8"/>
    <text x="80" y="390" text-anchor="middle" font-size="8" fill="white">DAO Hack • Poly Network</text>
    
    <rect x="275" y="378" width="130" height="16" rx="3" fill="#e74c3c" opacity="0.8"/>
    <text x="340" y="390" text-anchor="middle" font-size="8" fill="white">51% ETC • $614M Exploit</text>
  </g>
</svg>