<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ai-security-adversarial-ml">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="noiseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fecfef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffecd2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="advGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fed6e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d299c2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .title { font-family: Georgia, serif; font-size: 20px; fill: #2c3e50; font-weight: bold; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #5d6d7e; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #3498db; stroke-width: 2; fill: none; stroke-dasharray: 100; animation: drawLine 1.5s ease-out forwards; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; fill: #2c3e50; font-weight: bold; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Adversarial Machine Learning</text>
  <text x="210" y="48" text-anchor="middle" class="detail fade-in" style="animation-delay: 0.3s">AI Security Attack &amp; Defense</text>
  
  <!-- Main Process: Clean Input → Perturbation → Adversarial Example -->
  <g class="slide-in" style="animation-delay: 0.5s" data-narration="The adversarial example generation process shows how small perturbations are added to clean inputs to create adversarial examples that fool ML models.">
    <!-- Clean Input -->
    <rect x="30" y="70" width="100" height="90" fill="white" stroke="#3498db" stroke-width="2" class="box" filter="url(#shadow)"/>
    <text x="80" y="85" text-anchor="middle" class="section-title">Clean Input</text>
    <!-- Simple image representation -->
    <rect x="45" y="95" width="20" height="20" fill="#3498db" rx="2"/>
    <rect x="70" y="95" width="20" height="20" fill="#2ecc71" rx="2"/>
    <rect x="95" y="95" width="20" height="20" fill="#9b59b6" rx="2"/>
    <rect x="45" y="120" width="20" height="20" fill="#e74c3c" rx="2"/>
    <rect x="70" y="120" width="20" height="20" fill="#f39c12" rx="2"/>
    <rect x="95" y="120" width="20" height="20" fill="#1abc9c" rx="2"/>
    <text x="80" y="150" text-anchor="middle" class="detail">Original Image</text>
    
    <!-- Plus sign -->
    <text x="145" y="120" text-anchor="middle" font-size="24" fill="#e74c3c" font-weight="bold">+</text>
    
    <!-- Perturbation/Noise -->
    <rect x="160" y="70" width="100" height="90" fill="url(#noiseGradient)" stroke="#e74c3c" stroke-width="2" class="box" filter="url(#shadow)"/>
    <text x="210" y="85" text-anchor="middle" class="section-title">Perturbation</text>
    <!-- Noise pattern -->
    <g opacity="0.7">
      <rect x="170" y="95" width="8" height="8" fill="#e74c3c"/>
      <rect x="185" y="100" fill="#c0392b"/>
      <rect x="200" y="95" fill="#e74c3c"/>
      <rect x="215" y="105" fill="#c0392b"/>
      <rect x="230" y="98" fill="#e74c3c"/>
      <rect x="245" y="108" fill="#c0392b"/>
      <rect x="175" y="115" fill="#c0392b"/>
      <rect x="190" y="120" fill="#e74c3c"/>
      <rect x="210" y="118" fill="#c0392b"/>
      <rect x="230" y="125" fill="#e74c3c"/>
      <rect x="180" y="135" fill="#e74c3c"/>
      <rect x="200" y="140" fill="#c0392b"/>
      <rect x="220" y="138" fill="#e74c3c"/>
      <rect x="240" y="145" fill="#c0392b"/>
    </g>
    <text x="210" y="150" text-anchor="middle" class="detail">ε·sign(∇xJ)</text>
    
    <!-- Arrow -->
    <path d="M265 115 L285 115" class="arrow"/>
    <polygon points="280,110 295,115 280,120" fill="#3498db"/>
    
    <!-- Adversarial Output -->
    <rect x="290" y="70" width="100" height="90" fill="url(#advGradient)" stroke="#9b59b6" stroke-width="2" class="box pulse" filter="url(#shadow)"/>
    <text x="340" y="85" text-anchor="middle" class="section-title">Adversarial</text>
    <!-- Modified image representation -->
    <rect x="305" y="95" width="20" height="20" fill="#3498db" rx="2" opacity="0.8"/>
    <rect x="330" y="95" width="20" height="20" fill="#e74c3c" rx="2"/>
    <rect x="355" y="95" width="20" height="20" fill="#9b59b6" rx="2"/>
    <rect x="305" y="120" width="20" height="20" fill="#c0392b" rx="2"/>
    <rect x="330" y="120" width="20" height="20" fill="#f39c12" rx="2"/>
    <rect x="355" y="120" width="20" height="20" fill="#e74c3c" rx="2"/>
    <text x="340" y="150" text-anchor="middle" class="detail">Misclassified!</text>
  </g>
  
  <!-- Attack Types Panel -->
  <g class="fade-in" style="animation-delay: 0.8s" data-narration="Three main types of adversarial attacks: Evasion attacks manipulate inputs at test time, poisoning attacks corrupt training data, and model extraction steals model functionality.">
    <rect x="20" y="180" width="180" height="100" fill="white" stroke="#34495e" stroke-width="1" rx="6" filter="url(#shadow)"/>
    <rect x="20" y="180" width="180" height="22" fill="#e74c3c" rx="6"/>
    <rect x="20" y="195" width="180" height="7" fill="#e74c3c"/>
    <text x="110" y="196" text-anchor="middle" font-size="12" fill="white" font-weight="bold">ATTACK TAXONOMY</text>
    
    <circle cx="40" cy="225" r="12" fill="#3498db"/>
    <text x="40" y="229" text-anchor="middle" fill="white" font-size="10" font-weight="bold">E</text>
    <text x="58" y="228" class="label" font-size="12">Evasion</text>
    <text x="58" y="242" class="detail">Test-time manipulation</text>
    
    <circle cx="40" cy="255" r="12" fill="#f39c12"/>
    <text x="40" y="259" text-anchor="middle" fill="white" font-size="10" font-weight="bold">P</text>
    <text x="58" y="258" class="label" font-size="12">Poisoning</text>
    <text x="58" y="272" class="detail">Training data corruption</text>
    
    <circle cx="120" cy="255" r="12" fill="#9b59b6"/>
    <text x="120" y="259" text-anchor="middle" fill="white" font-size="10" font-weight="bold">M</text>
    <text x="138" y="258" class="label" font-size="12">Extraction</text>
    <text x="138" y="272" class="detail">API query theft</text>
  </g>
  
  <!-- Threat Models Panel -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Threat models define attacker knowledge: white-box has full model access, black-box only has query access, and gray-box has partial knowledge.">
    <rect x="220" y="180" width="180" height="100" fill="white" stroke="#34495e" stroke-width="1" rx="6" filter="url(#shadow)"/>
    <rect x="220" y="180" width="180" height="22" fill="#3498db" rx="6"/>
    <rect x="220" y="195" width="180" height="7" fill="#3498db"/>
    <text x="310" y="196" text-anchor="middle" font-size="12" fill="white" font-weight="bold">THREAT MODELS</text>
    
    <rect x="235" y="215" width="50" height="20" fill="#2ecc71" rx="4"/>
    <text x="260" y="229" text-anchor="middle" fill="white" font-size="10" font-weight="bold">White</text>
    <text x="295" y="228" class="detail">Full access</text>
    
    <rect x="235" y="240" width="50" height="20" fill="#e74c3c" rx="4"/>
    <text x="260" y="254" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Black</text>
    <text x="295" y="253" class="detail">Query only</text>
    
    <rect x="235" y="265" width="50" height="20" fill="#f39c12" rx="4"/>
    <text x="260" y="279" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Gray</text>
    <text x="295" y="278" class="detail">Partial know.</text>
  </g>
  
  <!-- Defense Mechanisms -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Defense mechanisms include adversarial training, gradient masking via defensive distillation, certified robustness through randomized smoothing, and anomaly detection.">
    <rect x="20" y="295" width="380" height="90" fill="white" stroke="#34495e" stroke-width="1" rx="6" filter="url(#shadow)"/>
    <rect x="20" y="295" width="380" height="22" fill="#27ae60" rx="6"/>
    <rect x="20" y="310" width="380" height="7" fill="#27ae60"/>
    <text x="210" y="311" text-anchor="middle" font-size="12" fill="white" font-weight="bold">DEFENSE MECHANISMS</text>
    
    <!-- Defense items with icons -->
    <g>
      <rect x="35" y="325" width="85" height="50" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1" rx="4"/>
      <text x="77" y="340" text-anchor="middle" class="label" font-size="10" font-weight="bold">Adversarial</text>
      <text x="77" y="352" text-anchor="middle" class="label" font-size="10" font-weight="bold">Training</text>
      <text x="77" y="368" text-anchor="middle" class="detail" font-size="9">Madry et al.</text>
    </g>
    
    <g>
      <rect x="130" y="325" width="85" height="50" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="4"/>
      <text x="172" y="340" text-anchor="middle" class="label" font-size="10" font-weight="bold">Gradient</text>
      <text x="172" y="352" text-anchor="middle" class="label" font-size="10" font-weight="bold">Masking</text>
      <text x="172" y="368" text-anchor="middle" class="detail" font-size="9">Distillation</text>
    </g>
    
    <g>
      <rect x="225" y="325" width="85" height="50" fill="#ebf5fb" stroke="#3498db" stroke-width="1" rx="4"/>
      <text x="267" y="340" text-anchor="middle" class="label" font-size="10" font-weight="bold">Certified</text>
      <text x="267" y="352" text-anchor="middle" class="label" font-size="10" font-weight="bold">Robustness</text>
      <text x="267" y="368" text-anchor="middle" class="detail" font-size="9">Randomized Smooth</text>
    </g>
    
    <g>
      <rect x="320" y="325" width="70" height="50" fill="#f5eef8" stroke="#9b59b6" stroke-width="1" rx="4"/>
      <text x="355" y="340" text-anchor="middle" class="label" font-size="10" font-weight="bold">Anomaly</text>
      <text x="355" y="352" text-anchor="middle" class="label" font-size="10" font-weight="bold">Detection</text>
      <text x="355" y="368" text-anchor="middle" class="detail" font-size="9">Mahalanobis</text>
    </g>
  </g>
  
  <!-- Key Metrics Bar -->
  <g class="fade-in" style="animation-delay: 1.4s">
    <rect x="20" y="165" width="380" height="10" fill="#ecf0f1" rx="5"/>
    <rect x="22" y="167" width="150" height="6" fill="#e74c3c" rx="3" class="pulse" style="animation-delay: 1.5s"/>
    <text x="180" y="172" class="detail">92% vulnerable to attacks</text>
    <rect x="250" y="167" width="100" height="6" fill="#f39c12" rx="3"/>
    <text x="355" y="172" class="detail">78% defenses bypassed</text>
  </g>
</svg>