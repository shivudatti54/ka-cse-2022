<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="cloud-iot-security">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#e0e8f5"/>
      <stop offset="100%" style="stop-color:#e8e0f5"/>
    </linearGradient>
    <linearGradient id="perceptionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b6"/>
    </linearGradient>
    <linearGradient id="networkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e4f7"/>
      <stop offset="100%" style="stop-color:#a8c5e8"/>
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7e0d4"/>
      <stop offset="100%" style="stop-color:#e8c9a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dataFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .layer-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #34495e; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #718096; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #3498db; stroke-width: 2; fill: none; stroke-dasharray: 5,3; animation: dataFlow 1s linear infinite; }
    .device { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Cloud-IoT Security Architecture</text>
  
  <!-- Perception Layer -->
  <g class="slide-in" style="animation-delay: 0.1s">
    <rect x="20" y="55" width="115" height="100" fill="url(#perceptionGradient)" class="box" filter="url(#shadow)" data-narration="Perception Layer: IoT devices at the edge - sensors, actuators, smart home devices with physical security controls"/>
    <text x="77" y="72" text-anchor="middle" class="layer-title">Perception Layer</text>
    <!-- IoT Devices -->
    <g class="device" transform="translate(45, 90)">
      <circle cx="0" cy="0" r="12" fill="#5a9a7a" stroke="#2e7d5a" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#fff"/>
    </g>
    <g class="device" transform="translate(77, 90)" style="animation-delay: 0.3s">
      <rect x="-10" y="-8" width="20" height="16" fill="#5a9a7a" stroke="#2e7d5a" stroke-width="2" rx="2"/>
    </g>
    <g class="device" transform="translate(105, 90)" style="animation-delay: 0.6s">
      <polygon points="0,-10 8,6 -8,6" fill="#5a9a7a" stroke="#2e7d5a" stroke-width="2"/>
    </g>
    <text x="77" y="130" text-anchor="middle" class="label">Edge Devices</text>
    <text x="77" y="145" text-anchor="middle" class="detail">Physical Security</text>
  </g>
  
  <!-- Network Layer -->
  <g class="slide-in" style="animation-delay: 0.3s">
    <rect x="150" y="55" width="115" height="100" fill="url(#networkGradient)" class="box" filter="url(#shadow)" data-narration="Network Layer: Secure data transmission with MQTT/CoAP protocols, encrypted channels, and firewall protection"/>
    <text x="207" y="72" text-anchor="middle" class="layer-title">Network Layer</text>
    <!-- Cloud/Network icons -->
    <g transform="translate(180, 90)">
      <circle cx="0" cy="0" r="10" fill="#6b8cbe" stroke="#4a6fa5" stroke-width="2"/>
      <path d="M-7 2 Q0 8 7 2" fill="none" stroke="#fff" stroke-width="1.5"/>
    </g>
    <g transform="translate(207, 85)">
      <rect x="-12" y="-8" width="24" height="16" fill="#6b8cbe" stroke="#4a6fa5" stroke-width="2" rx="2"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#fff" stroke-width="1.5"/>
    </g>
    <g transform="translate(235, 90)">
      <circle cx="0" cy="0" r="10" fill="#6b8cbe" stroke="#4a6fa5" stroke-width="2"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fff" stroke-width="1.5"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#fff" stroke-width="1.5"/>
    </g>
    <text x="207" y="130" text-anchor="middle" class="label">Encrypted Channels</text>
    <text x="207" y="145" text-anchor="middle" class="detail">MQTT/CoAP Security</text>
  </g>
  
  <!-- Application/Cloud Layer -->
  <g class="slide-in" style="animation-delay: 0.5s">
    <rect x="280" y="55" width="115" height="100" fill="url(#cloudGradient)" class="box" filter="url(#shadow)" data-narration="Cloud Layer: AWS IoT Core, Azure IoT Hub with API security, storage protection, and AI-driven anomaly detection"/>
    <text x="337" y="72" text-anchor="middle" class="layer-title">Cloud Layer</text>
    <!-- Cloud icons -->
    <g transform="translate(310, 90)">
      <ellipse cx="0" cy="0" rx="18" ry="10" fill="#c9a87c" stroke="#a8845c" stroke-width="2"/>
      <ellipse cx="-8" cy="-3" rx="10" ry="8" fill="#c9a87c"/>
    </g>
    <g transform="translate(365, 90)">
      <rect x="-12" y="-10" width="24" height="20" fill="#c9a87c" stroke="#a8845c" stroke-width="2" rx="2"/>
      <rect x="-8" y="-5" width="16" height="2" fill="#fff"/>
      <rect x="-8" y="0" width="12" height="2" fill="#fff"/>
      <rect x="-8" y="5" width="8" height="2" fill="#fff"/>
    </g>
    <text x="337" y="130" text-anchor="middle" class="label">Cloud Platform</text>
    <text x="337" y="145" text-anchor="middle" class="detail">API Firewalls</text>
  </g>
  
  <!-- Data Flow Arrows -->
  <path d="M135 100 L150 100" class="arrow"/>
  <path d="M265 100 L280 100" class="arrow"/>
  
  <!-- Key Concepts Section -->
  <g class="fade-in" style="animation-delay: 0.8s">
    <rect x="20" y="170" width="375" height="80" fill="#fff" stroke="#ddd" stroke-width="1" rx="8" data-narration="Key Security Controls: Zero-trust architecture, ECC cryptography, Secure Elements, Homomorphic Encryption, and AI anomaly detection"/>
    
    <text x="35" y="190" class="label" font-weight="bold">Security Models:</text>
    <text x="35" y="208" class="detail">• Zero-Trust Architecture</text>
    <text x="35" y="222" class="detail">• ECC Lightweight Crypto</text>
    <text x="35" y="236" class="detail">• Intel SGX/AMD SEV</text>
    
    <text x="180" y="190" class="label" font-weight="bold">Data Protection:</text>
    <text x="180" y="208" class="detail">• Homomorphic Encryption</text>
    <text x="180" y="222" class="detail">• Differential Privacy</text>
    <text x="180" y="236" class="detail">• Blockchain Audit Trails</text>
    
    <text x="310" y="190" class="label" font-weight="bold">Emerging:</text>
    <text x="310" y="208" class="detail">• Post-Quantum Crypto</text>
    <text x="310" y="222" class="detail">• Federated Learning</text>
    <text x="310" y="236" class="detail">• MITRE ATT&CK</text>
  </g>
  
  <!-- Threat Landscape Box -->
  <g class="fade-in" style="animation-delay: 1s">
    <rect x="20" y="265" width="180" height="55" fill="#fde8e8" stroke="#e57373" stroke-width="1" rx="6" data-narration="Threat Landscape: Device attacks, network protocol exploits, API hijacking, storage breaches, and APTs targeting IoT-cloud pipelines"/>
    <text x="30" y="282" class="label" font-weight="bold" fill="#c0392b">Threat Landscape</text>
    <text x="30" y="298" class="detail">Device: Physical tampering, side-channel</text>
    <text x="30" y="310" class="detail">Network: MQTT/CoAP exploits</text>
  </g>
  
  <!-- Protection Box -->
  <g class="fade-in" style="animation-delay: 1.2s">
    <rect x="215" y="265" width="180" height="55" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1" rx="6" data-narration="Protection Mechanisms: Secure Elements, confidential computing, fog-based authentication, and real-time anomaly detection"/>
    <text x="225" y="282" class="label" font-weight="bold" fill="#2e7d32">Protection</text>
    <text x="225" y="298" class="detail">Hardware SE, Confidential Computing</text>
    <text x="225" y="310" class="detail">AI Anomaly Detection</text>
  </g>
  
  <!-- Statistics -->
  <g class="fade-in" style="animation-delay: 1.4s">
    <rect x="20" y="335" width="375" height="35" fill="#fff9e6" stroke="#ffd966" stroke-width="1" rx="6" data-narration="Market statistics: 29 billion IoT devices projected by 2030, ₹14,207 crore IoT healthcare market in India by 2026"/>
    <text x="110" y="352" class="label" fill="#f39c12">2021: Colonial Pipeline Attack</text>
    <text x="110" y="364" class="detail" fill="#d68910">IoT vulnerability cascaded through cloud → Critical infrastructure failure</text>
    <text x="300" y="358" class="label" font-weight="bold" fill="#e74c3c">29B Devices by 2030</text>
  </g>
  
  <!-- Shield Icons for each layer -->
  <g transform="translate(115, 100)" class="fade-in" style="animation-delay: 1.6s">
    <path d="M0 -6 L-5 3 L5 3 Z" fill="#e74c3c" stroke="#c0392b" stroke-width="1" transform="scale(0.6)"/>
  </g>
  <g transform="translate(245, 100)" class="fade-in" style="animation-delay: 1.8s">
    <path d="M0 -6 L-5 3 L5 3 Z" fill="#3498db" stroke="#2980b9" stroke-width="1" transform="scale(0.6)"/>
  </g>
  <g transform="translate(375, 100)" class="fade-in" style="animation-delay: 2s">
    <path d="M0 -6 L-5 3 L5 3 Z" fill="#27ae60" stroke="#1e8449" stroke-width="1" transform="scale(0.6)"/>
  </g>
</svg>