<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="supervised-unsupervised-reinforcement">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fff4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="supervisedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="unsupervisedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8ec5fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="reinforceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4fc79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#96e6a1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title-anim { animation: fadeIn 0.8s ease-out; }
    .supervised-anim { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .unsupervised-anim { animation: fadeIn 0.6s ease-out 0.4s both; }
    .reinforce-anim { animation: slideInRight 0.6s ease-out 0.6s both; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .bounce-anim { animation: bounce 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10" />
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title-anim">ML Learning Paradigms</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#3498db" stroke-width="2" class="title-anim" />
  
  <!-- Section 1: Supervised Learning -->
  <g class="supervised-anim" data-narration="Supervised Learning uses labeled training data with input-output pairs to train models for prediction and classification">
    <rect x="15" y="55" width="120" height="95" rx="8" fill="url(#supervisedGrad)" filter="url(#shadow)" />
    <text x="75" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c0392b">Supervised</text>
    <!-- Data points with labels -->
    <circle cx="40" cy="95" r="6" fill="#e74c3c" />
    <text x="52" y="99" font-family="Arial" font-size="10" fill="#c0392b">A</text>
    <circle cx="40" cy="120" r="6" fill="#3498db" />
    <text x="52" y="124" font-family="Arial" font-size="10" fill="#2980b9">B</text>
    <circle cx="75" cy="135" r="6" fill="#e74c3c" />
    <text x="87" y="139" font-family="Arial" font-size="10" fill="#c0392b">A</text>
    <!-- Arrow to model -->
    <path d="M75 150 L75 170" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="75" y="165" text-anchor="middle" font-family="Arial" font-size="9" fill="#d35400">Train</text>
  </g>
  
  <!-- Section 2: Unsupervised Learning -->
  <g class="unsupervised-anim" data-narration="Unsupervised Learning discovers hidden patterns in unlabeled data through clustering and dimensionality reduction">
    <rect x="150" y="55" width="120" height="95" rx="8" fill="url(#unsupervisedGrad)" filter="url(#shadow)" />
    <text x="210" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6c3483">Unsupervised</text>
    <!-- Clustered data points -->
    <circle cx="185" cy="95" r="5" fill="#9b59b6" />
    <circle cx="195" cy="105" r="5" fill="#9b59b6" />
    <circle cx="180" cy="115" r="5" fill="#9b59b6" />
    <circle cx="235" cy="95" r="5" fill="#3498db" />
    <circle cx="245" cy="110" r="5" fill="#3498db" />
    <circle cx="230" cy="120" r="5" fill="#3498db" />
    <!-- Cluster labels -->
    <text x="185" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#7d3c98">Group 1</text>
    <text x="238" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#2980b9">Group 2</text>
  </g>
  
  <!-- Section 3: Reinforcement Learning -->
  <g class="reinforce-anim" data-narration="Reinforcement Learning trains agents through trial-and-error with rewards, interacting with an environment in a loop">
    <rect x="285" y="55" width="120" height="95" rx="8" fill="url(#reinforceGrad)" filter="url(#shadow)" />
    <text x="345" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1e8449">Reinforcement</text>
    <!-- RL Loop visualization -->
    <circle cx="325" cy="100" r="15" fill="#27ae60" class="bounce-anim" />
    <text x="325" y="104" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">Agent</text>
    <path d="M345 100 Q365 100 365 85 Q365 70 380 70" stroke="#f39c12" stroke-width="2" fill="none" />
    <text x="372" y="78" font-family="Arial" font-size="8" fill="#d35400">Action</text>
    <path d="M380 70 L395 70" stroke="#27ae60" stroke-width="2" />
    <circle cx="380" cy="70" r="4" fill="#f1c40f" />
    <text x="390" y="74" font-family="Arial" font-size="8" fill="#b7950b">Reward</text>
    <path d="M345 115 Q365 130 380 130" stroke="#e74c3c" stroke-width="2" fill="none" />
    <text x="352" y="128" font-family="Arial" font-size="8" fill="#c0392b">State</text>
  </g>
  
  <!-- Connecting arrows between sections -->
  <g class="title-anim">
    <path d="M135 100 L150 100" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
    <path d="M270 100 L285 100" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d" />
    </marker>
  </defs>
  
  <!-- Key Concepts Box - Bottom Section -->
  <g data-narration="Key algorithms and components: Linear Regression, Decision Trees, SVM for supervised; K-Means, PCA for unsupervised; Q-Learning, MDP for reinforcement">
    <rect x="15" y="165" width="390" height="100" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)" />
    <text x="210" y="182" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    
    <!-- Column 1: Supervised -->
    <text x="40" y="200" font-family="Arial" font-size="10" font-weight="bold" fill="#c0392b">SUPERVISED</text>
    <text x="40" y="214" font-family="Arial" font-size="9" fill="#34495e">• Linear Regression</text>
    <text x="40" y="226" font-family="Arial" font-size="9" fill="#34495e">• Decision Trees</text>
    <text x="40" y="238" font-family="Arial" font-size="9" fill="#34495e">• SVM</text>
    <text x="40" y="250" font-family="Arial" font-size="9" fill="#34495e">• Labeled Data (X,y)</text>
    
    <!-- Column 2: Unsupervised -->
    <text x="155" y="200" font-family="Arial" font-size="10" font-weight="bold" fill="#6c3483">UNSUPERVISED</text>
    <text x="155" y="214" font-family="Arial" font-size="9" fill="#34495e">• K-Means Clustering</text>
    <text x="155" y="226" font-family="Arial" font-size="9" fill="#34495e">• PCA</text>
    <text x="155" y="238" font-family="Arial" font-size="9" fill="#34495e">• DBSCAN</text>
    <text x="155" y="250" font-family="Arial" font-size="9" fill="#34495e">• Unlabeled Data (X)</text>
    
    <!-- Column 3: Reinforcement -->
    <text x="280" y="200" font-family="Arial" font-size="10" font-weight="bold" fill="#1e8449">REINFORCEMENT</text>
    <text x="280" y="214" font-family="Arial" font-size="9" fill="#34495e">• Q-Learning</text>
    <text x="280" y="226" font-family="Arial" font-size="9" fill="#34495e">• MDP Framework</text>
    <text x="280" y="238" font-family="Arial" font-size="9" fill="#34495e">• Agent-Environment</text>
    <text x="280" y="250" font-family="Arial" font-size="9" fill="#34495e">• Reward Signal</text>
  </g>
  
  <!-- Use Cases Section -->
  <g data-narration="Real-world applications: Spam detection and price forecasting use supervised learning; Customer segmentation uses unsupervised; Robotics and game AI use reinforcement learning">
    <rect x="15" y="280" width="390" height="105" rx="8" fill="#fef9e7" stroke="#f9e79f" stroke-width="1" filter="url(#shadow)" />
    <text x="210" y="298" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50">Applications</text>
    
    <!-- Use case icons and text -->
    <g>
      <circle cx="55" cy="325" r="12" fill="#ff6b6b" class="pulse-anim" />
      <text x="55" y="329" text-anchor="middle" font-family="Arial" font-size="16">📧</text>
      <text x="75" y="329" font-family="Arial" font-size="10" fill="#2c3e50">Spam Detection</text>
    </g>
    <g>
      <circle cx="55" cy="355" r="12" fill="#4ecdc4" class="pulse-anim" />
      <text x="55" y="359" text-anchor="middle" font-family="Arial" font-size="16">👥</text>
      <text x="75" y="359" font-family="Arial" font-size="10" fill="#2c3e50">Customer Segments</text>
    </g>
    <g>
      <circle cx="210" cy="325" r="12" fill="#ffe66d" class="pulse-anim" />
      <text x="210" y="329" text-anchor="middle" font-family="Arial" font-size="16">🎮</text>
      <text x="230" y="329" font-family="Arial" font-size="10" fill="#2c3e50">Game AI</text>
    </g>
    <g>
      <circle cx="210" cy="355" r="12" fill="#95e1d3" class="pulse-anim" />
      <text x="210" y="359" text-anchor="middle" font-family="Arial" font-size="16">🚗</text>
      <text x="230" y="359" font-family="Arial" font-size="10" fill="#2c3e50">Autonomous Vehicles</text>
    </g>
    <g>
      <circle cx="355" cy="340" r="12" fill="#dda0dd" class="pulse-anim" />
      <text x="355" y="344" text-anchor="middle" font-family="Arial" font-size="16">📈</text>
      <text x="375" y="344" font-family="Arial" font-size="10" fill="#2c3e50">Price Forecasting</text>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="385" r="4" fill="#3498db" opacity="0.5" />
  <circle cx="390" cy="385" r="4" fill="#e74c3c" opacity="0.5" />
  <circle cx="200" cy="385" r="3" fill="#27ae60" opacity="0.5" />
</svg>