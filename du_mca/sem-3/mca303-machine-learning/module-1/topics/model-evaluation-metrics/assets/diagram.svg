<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="model-evaluation-metrics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8ed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="confusionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357a8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="classGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6bbd99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52a87d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="regGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c9fc9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a82b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="probGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a87c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b08d5b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .title-text { animation: slideIn 0.6s ease-out forwards; }
    .confusion-box { animation: fadeIn 0.5s ease-out 0.2s forwards; opacity: 0; }
    .metric-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a5276; }
    .subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #5d6d7e; }
    .formula { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; font-style: italic; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <text x="210" y="28" text-anchor="middle" class="title title-text">Model Evaluation Metrics</text>
  
  <!-- Confusion Matrix Section -->
  <g transform="translate(20, 45)" data-narration="Confusion Matrix: Shows TP, TN, FP, FN counts for classification evaluation">
    <text x="70" y="0" text-anchor="middle" class="label" style="font-weight:bold;">Confusion Matrix</text>
    <rect x="0" y="10" width="140" height="100" fill="white" stroke="#4a90a4" stroke-width="2" rx="5" filter="url(#shadow)" class="confusion-box"/>
    
    <!-- Axis Labels -->
    <text x="30" y="30" class="subtitle" style="font-weight:bold;">Actual</text>
    <text x="70" y="30" class="subtitle" style="font-weight:bold;">Predicted</text>
    
    <!-- Matrix Cells -->
    <rect x="5" y="35" width="65" height="35" fill="#27ae60" rx="3" class="confusion-box"/>
    <text x="37.5" y="52" text-anchor="middle" fill="white" font-size="12" font-weight="bold">TP</text>
    <text x="37.5" y="65" text-anchor="middle" fill="white" font-size="9">True Positive</text>
    
    <rect x="70" y="35" width="65" height="35" fill="#e74c3c" rx="3" class="confusion-box" style="animation-delay:0.3s"/>
    <text x="102.5" y="52" text-anchor="middle" fill="white" font-size="12" font-weight="bold">FN</text>
    <text x="102.5" y="65" text-anchor="middle" fill="white" font-size="9">False Negative</text>
    
    <rect x="5" y="70" width="65" height="35" fill="#e67e22" rx="3" class="confusion-box" style="animation-delay:0.4s"/>
    <text x="37.5" y="87" text-anchor="middle" fill="white" font-size="12" font-weight="bold">FP</text>
    <text x="37.5" y="100" text-anchor="middle" fill="white" font-size="9">False Positive</text>
    
    <rect x="70" y="70" width="65" height="35" fill="#3498db" rx="3" class="confusion-box" style="animation-delay:0.5s"/>
    <text x="102.5" y="87" text-anchor="middle" fill="white" font-size="12" font-weight="bold">TN</text>
    <text x="102.5" y="100" text-anchor="middle" fill="white" font-size="9">True Negative</text>
  </g>
  
  <!-- Classification Metrics -->
  <g transform="translate(170, 45)" data-narration="Classification Metrics: Accuracy, Precision, Recall, F1-Score for measuring classifier performance">
    <text x="55" y="0" text-anchor="middle" class="label" style="font-weight:bold;">Classification</text>
    <rect x="0" y="10" width="110" height="100" fill="url(#classGradient)" rx="5" filter="url(#shadow)" class="metric-box" style="animation-delay:0.3s"/>
    
    <text x="10" y="30" class="label" fill="white" font-size="11">Accuracy</text>
    <text x="10" y="43" class="formula" fill="white">TP+TN / Total</text>
    
    <text x="10" y="60" class="label" fill="white" font-size="11">Precision</text>
    <text x="10" y="73" class="formula" fill="white">TP / (TP+FP)</text>
    
    <text x="10" y="90" class="label" fill="white" font-size="11">Recall</text>
    <text x="10" y="103" class="formula" fill="white">TP / (TP+FN)</text>
  </g>
  
  <!-- Regression Metrics -->
  <g transform="translate(290, 45)" data-narration="Regression Metrics: MSE, RMSE, MAE, R² for evaluating continuous predictions">
    <text x="55" y="0" text-anchor="middle" class="label" style="font-weight:bold;">Regression</text>
    <rect x="0" y="10" width="110" height="100" fill="url(#regGradient)" rx="5" filter="url(#shadow)" class="metric-box" style="animation-delay:0.4s"/>
    
    <text x="10" y="30" class="label" fill="white" font-size="11">MSE</text>
    <text x="10" y="43" class="formula" fill="white">Mean Squared Error</text>
    
    <text x="10" y="60" class="label" fill="white" font-size="11">RMSE</text>
    <text x="10" y="73" class="formula" fill="white">√MSE</text>
    
    <text x="10" y="90" class="label" fill="white" font-size="11">R²</text>
    <text x="10" y="103" class="formula" fill="white">Explained Variance</text>
  </g>
  
  <!-- Probabilistic Metrics -->
  <g transform="translate(170, 155)" data-narration="Probabilistic Metrics: Log-Loss and Brier Score for probability calibration assessment">
    <text x="55" y="0" text-anchor="middle" class="label" style="font-weight:bold;">Probabilistic</text>
    <rect x="0" y="10" width="110" height="70" fill="url(#probGradient)" rx="5" filter="url(#shadow)" class="metric-box" style="animation-delay:0.5s"/>
    
    <text x="10" y="32" class="label" fill="white" font-size="11">Log-Loss</text>
    <text x="10" y="45" class="formula" fill="white">Cross-Entropy</text>
    
    <text x="10" y="62" class="label" fill="white" font-size="11">Brier Score</text>
    <text x="10" y="75" class="formula" fill="white">Prob. Squared Error</text>
  </g>
  
  <!-- Advanced Concepts -->
  <g transform="translate(290, 155)" data-narration="Advanced Concepts: ROC-AUC, Kappa, MCC for comprehensive model assessment">
    <text x="55" y="0" text-anchor="middle" class="label" style="font-weight:bold;">Advanced</text>
    <rect x="0" y="10" width="110" height="70" fill="#9b59b6" rx="5" filter="url(#shadow)" class="metric-box" style="animation-delay:0.6s"/>
    
    <text x="10" y="32" class="label" fill="white" font-size="11">ROC-AUC</text>
    <text x="10" y="45" class="formula" fill="white">Curve Area</text>
    
    <text x="10" y="62" class="label" fill="white" font-size="11">Cohen's Kappa</text>
    <text x="10" y="75" class="formula" fill="white">Chance-Adjusted</text>
  </g>
  
  <!-- Flow Arrows -->
  <g data-narration="Flow shows relationship between metrics and their applications">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
      </marker>
    </defs>
    <!-- Arrow from Confusion Matrix to Classification -->
    <line x1="100" y1="115" x2="145" y2="115" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="metric-box" style="animation-delay:0.7s"/>
    
    <!-- Arrow from Classification to Probabilistic -->
    <line x1="220" y1="115" x2="220" y2="155" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="metric-box" style="animation-delay:0.8s"/>
    
    <!-- Arrow from Classification to Advanced -->
    <line x1="280" y1="115" x2="280" y2="165" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" class="metric-box" style="animation-delay:0.9s"/>
  </g>
  
  <!-- Bottom Info Box -->
  <g transform="translate(20, 240)" data-narration="Key insight: Choose metrics based on problem type and business requirements">
    <rect x="0" y="0" width="380" height="70" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" class="metric-box" style="animation-delay:0.7s"/>
    
    <text x="190" y="18" text-anchor="middle" class="label" style="font-weight:bold; font-size:13;">Choose Metrics by Problem Type</text>
    
    <text x="15" y="38" class="subtitle">Classification:</text>
    <text x="85" y="38" class="formula">Accuracy, Precision, Recall, F1</text>
    
    <text x="15" y="54" class="subtitle">Regression:</text>
    <text x="85" y="54" class="formula">MSE, RMSE, MAE, R²</text>
    
    <text x="200" y="38" class="subtitle">Probabilistic:</text>
    <text x="275" y="38" class="formula">Log-Loss, Brier</text>
    
    <text x="200" y="54" class="subtitle">Advanced:</text>
    <text x="265" y="54" class="formula">ROC-AUC, MCC, Kappa</text>
  </g>
  
  <!-- Legend / Key -->
  <g transform="translate(20, 320)" data-narration="Visual legend showing metric relationships and importance">
    <rect x="0" y="0" width="380" height="60" fill="white" stroke="#e0e0e0" stroke-width="1" rx="5" class="metric-box" style="animation-delay:0.8s"/>
    
    <text x="190" y="15" text-anchor="middle" class="label" style="font-weight:bold; font-size:12;">Formula Quick Reference</text>
    
    <text x="20" y="35" class="formula" fill="#2c3e50">Accuracy = (TP+TN)/(TP+TN+FP+FN)</text>
    <text x="20" y="50" class="formula" fill="#2c3e50">F1 = 2×Precision×Recall/(Precision+Recall)</text>
    
    <text x="230" y="35" class="formula" fill="#2c3e50">R² = 1 - SSres/SStot</text>
    <text x="230" y="50" class="formula" fill="#2c3e50">MCC = (TP×TN-FP×FN)/√((TP+FP)(TP+FN)(TN+FP)(TN+FN))</text>
  </g>
  
  <!-- Interactive hint -->
  <g class="pulse-anim" data-narration="This diagram animates on load to engage learners">
    <circle cx="400" cy="30" r="8" fill="#e74c3c" opacity="0.8"/>
    <text x="400" y="34" text-anchor="middle" fill="white" font-size="10" font-weight="bold">i</text>
  </g>
</svg>