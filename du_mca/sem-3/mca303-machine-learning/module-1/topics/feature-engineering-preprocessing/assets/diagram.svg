<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="feature-engineering-preprocessing" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce6cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e6f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccccdd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6ccdd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce6f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#888" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideRight {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s both; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s both; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s both; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s both; }
    .box5 { animation: slideIn 0.6s ease-out 1.0s both; }
    .arrow { animation: slideRight 0.4s ease-out 1.2s both; }
    .subtitle { animation: fadeIn 0.8s ease-out 0.3s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title">Feature Engineering</text>
  <text x="210" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#34495e" class="subtitle">&amp; Preprocessing Pipeline</text>
  
  <!-- Raw Data -->
  <g class="box1" data-narration="Input raw data containing missing values, outliers, and inconsistent formats">
    <rect x="20" y="75" width="85" height="55" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="62" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c0392b">Raw Data</text>
    <text x="62" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Unprocessed</text>
    <text x="62" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Input</text>
  </g>
  
  <line x1="105" y1="102" x2="125" y2="102" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Data Cleaning -->
  <g class="box2" data-narration="Data cleaning handles missing values through imputation, removes outliers using Z-score and IQR methods, and eliminates duplicates">
    <rect x="125" y="75" width="85" height="55" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="167" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">Data Cleaning</text>
    <text x="167" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Imputation</text>
    <text x="167" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Outliers</text>
  </g>
  
  <line x1="210" y1="102" x2="230" y2="102" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Feature Transformation -->
  <g class="box3" data-narration="Feature transformation normalizes data using min-max scaling or standardization, applies log transforms for skewed distributions, and bins continuous variables">
    <rect x="230" y="75" width="90" height="55" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="275" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8e44ad">Feature</text>
    <text x="275" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8e44ad">Transformation</text>
    <text x="275" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Norm / Std</text>
  </g>
  
  <line x1="320" y1="102" x2="340" y2="102" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Feature Construction -->
  <g class="box4" data-narration="Feature construction creates new features including polynomial terms, domain-specific features like BMI, and embeddings for text data">
    <rect x="340" y="75" width="70" height="55" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="375" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8e44ad">Feature</text>
    <text x="375" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8e44ad">Construction</text>
    <text x="375" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">New Features</text>
  </g>
  
  <line x1="375" y1="130" x2="375" y2="150" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Feature Selection -->
  <g class="box5" data-narration="Feature selection uses filter methods like Pearson correlation, wrapper methods, and embedded techniques to choose most relevant features">
    <rect x="320" y="150" width="110" height="45" rx="6" fill="url(#boxGradient5)" filter="url(#shadow)"/>
    <text x="375" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">Feature Selection</text>
    <text x="375" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Filter / Wrapper</text>
  </g>
  
  <line x1="320" y1="172" x2="290" y2="172" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <line x1="290" y1="172" x2="290" y2="220" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <line x1="290" y1="220" x2="200" y2="220" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ML-Ready Features Output -->
  <g class="box5" data-narration="Final output produces ML-ready features with improved quality, relevance, and predictive power">
    <rect x="100" y="235" width="200" height="50" rx="8" fill="#d5f5e3" filter="url(#shadow)" class="pulse-element"/>
    <text x="200" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e8449">ML-Ready Features</text>
    <text x="200" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Optimized for Model Training</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="box2" data-narration="Key concepts include data cleaning, transformation, construction, and selection - each crucial for model success">
    <rect x="20" y="300" width="180" height="85" rx="6" fill="white" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
    <text x="110" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    <text x="30" y="340" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Missing Data: Imputation</text>
    <text x="30" y="355" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Outliers: Z-score, IQR</text>
    <text x="30" y="370" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Scaling: Min-Max, Standard</text>
    <text x="30" y="385" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Selection: Filter Methods</text>
  </g>
  
  <!-- Statistics Box -->
  <g class="box3" data-narration="Research shows 80% of model success comes from data quality and feature relevance, not algorithms">
    <rect x="210" y="300" width="190" height="85" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
    <text x="305" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d35400">Impact on Success</text>
    <text x="305" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e74c3c">80%</text>
    <text x="305" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">of model success comes from</text>
    <text x="305" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">data quality &amp; feature relevance</text>
    <text x="305" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">(vs 20% from algorithms)</text>
  </g>
</svg>