<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="hyperparameter-tuning-cross-validation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="foldGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="foldGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5"/>
      <stop offset="100%" style="stop-color:#e6b3b3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes rotateFold {
        0%, 100% { opacity: 0.3; }
        20% { opacity: 1; }
      }
      .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2d3748; }
      .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #4a5568; }
      .sublabel { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #718096; }
      .box-title { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: bold; fill: #2d3748; }
      .section-box { rx: 8; ry: 8; stroke: #cbd5e0; stroke-width: 1; }
      .fold-rect { rx: 4; ry: 4; stroke: #fff; stroke-width: 2; }
      .arrow { fill: none; stroke: #667eea; stroke-width: 2; marker-end: url(#arrowhead); }
      .train-arrow { stroke: #48bb78; }
      .valid-arrow { stroke: #ed8936; }
      
      .title-anim { animation: fadeIn 0.8s ease-out forwards; }
      .box1-anim { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
      .box2-anim { animation: slideInRight 0.6s ease-out 0.3s forwards; opacity: 0; }
      .box3-anim { animation: slideInLeft 0.6s ease-out 0.4s forwards; opacity: 0; }
      .main-anim { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
      .pulse-anim { animation: pulse 2s ease-in-out infinite; }
      .fold1 { animation: rotateFold 5s ease-in-out infinite; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Hyperparameter Tuning</text>
  <text x="210" y="50" text-anchor="middle" class="label title-anim" style="font-size:14px;color:#718096">Cross-Validation Process</text>
  
  <!-- Section 1: Parameters vs Hyperparameters -->
  <g class="box1-anim" data-narration="Key distinction between model parameters learned from data and hyperparameters set before training">
    <rect x="15" y="70" width="120" height="70" fill="#fff" class="section-box" filter="url(#shadow)"/>
    <text x="75" y="88" text-anchor="middle" class="box-title">Parameters</text>
    <text x="75" y="105" text-anchor="middle" class="sublabel">Learned from data</text>
    <text x="75" y="120" text-anchor="middle" class="sublabel" fill="#667eea">e.g., weights, biases</text>
    <text x="75" y="133" text-anchor="middle" class="sublabel">in neural networks</text>
  </g>
  
  <!-- Section 2: Hyperparameters -->
  <g class="box2-anim" data-narration="Hyperparameters are set before training and control the learning process">
    <rect x="285" y="70" width="120" height="70" fill="#fff" class="section-box" filter="url(#shadow)"/>
    <text x="345" y="88" text-anchor="middle" class="box-title">Hyperparameters</text>
    <text x="345" y="105" text-anchor="middle" class="sublabel">Set pre-training</text>
    <text x="345" y="120" text-anchor="middle" class="sublabel" fill="#ed8936">e.g., learning rate,</text>
    <text x="345" y="133" text-anchor="middle" class="sublabel" fill="#ed8936">k in k-NN, tree depth</text>
  </g>
  
  <!-- Main K-Fold Visualization -->
  <g class="main-anim" data-narration="5-Fold Cross-Validation: Data divided into 5 equal parts, each part used as validation once while others train">
    <!-- Container -->
    <rect x="60" y="155" width="300" height="180" fill="#fff" rx="10" ry="10" filter="url(#shadow)"/>
    <text x="210" y="175" text-anchor="middle" class="box-title">5-Fold Cross-Validation</text>
    
    <!-- 5 Fold Boxes -->
    <g class="pulse-anim">
      <rect x="75" y="190" width="50" height="40" fill="url(#foldGradient1)" class="fold-rect fold1"/>
      <text x="100" y="210" text-anchor="middle" class="sublabel" fill="#fff">Fold 1</text>
      <text x="100" y="222" text-anchor="middle" class="sublabel" fill="#fff" style="font-size:10px">Train</text>
    </g>
    <g>
      <rect x="135" y="190" width="50" height="40" fill="url(#foldGradient1)" class="fold-rect fold1" style="animation-delay:1s"/>
      <text x="160" y="210" text-anchor="middle" class="sublabel" fill="#fff">Fold 2</text>
      <text x="160" y="222" text-anchor="middle" class="sublabel" fill="#fff" style="font-size:10px">Train</text>
    </g>
    <g>
      <rect x="195" y="190" width="50" height="40" fill="url(#foldGradient2)" class="fold-rect"/>
      <text x="220" y="210" text-anchor="middle" class="sublabel" fill="#fff" font-weight="bold">Fold 3</text>
      <text x="220" y="222" text-anchor="middle" class="sublabel" fill="#fff" style="font-size:10px">Valid</text>
    </g>
    <g>
      <rect x="255" y="190" width="50" height="40" fill="url(#foldGradient1)" class="fold-rect fold1" style="animation-delay:2s"/>
      <text x="280" y="210" text-anchor="middle" class="sublabel" fill="#fff">Fold 4</text>
      <text x="280" y="222" text-anchor="middle" class="sublabel" fill="#fff" style="font-size:10px">Train</text>
    </g>
    <g>
      <rect x="315" y="190" width="50" height="40" fill="url(#foldGradient1)" class="fold-rect fold1" style="animation-delay:3s"/>
      <text x="340" y="210" text-anchor="middle" class="sublabel" fill="#fff">Fold 5</text>
      <text x="340" y="222" text-anchor="middle" class="sublabel" fill="#fff" style="font-size:10px">Train</text>
    </g>
    
    <!-- Arrows showing rotation -->
    <path d="M 220 240 Q 220 255, 100 255 Q 60 255, 60 270" fill="none" stroke="#667eea" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    <path d="M 100 270 L 100 275" fill="none" stroke="#667eea" stroke-width="1.5" opacity="0.6"/>
    <text x="130" y="270" class="sublabel" fill="#718096" style="font-size:10px">Rotation →</text>
    
    <!-- Iteration indicator -->
    <text x="210" y="310" text-anchor="middle" class="label">Iteration 1 of 5</text>
    <text x="210" y="326" text-anchor="middle" class="sublabel">Validation: Fold 3 | Training: Folds 1,2,4,5</text>
  </g>
  
  <!-- Section 3: Tuning Methods -->
  <g class="box3-anim" data-narration="Common hyperparameter tuning methods: Grid Search, Random Search, Bayesian Optimization">
    <rect x="15" y="350" width="95" height="40" fill="#e9d8fd" class="section-box"/>
    <text x="62" y="367" text-anchor="middle" class="sublabel" style="font-size:11px">Grid Search</text>
    <text x="62" y="381" text-anchor="middle" class="sublabel" style="font-size:10px">Exhaustive</text>
  </g>
  
  <g class="box3-anim" style="animation-delay:0.5s" data-narration="Random Search samples parameter combinations randomly, often more efficient than grid">
    <rect x="120" y="350" width="95" height="40" fill="#c6f6d5" class="section-box"/>
    <text x="167" y="367" text-anchor="middle" class="sublabel" style="font-size:11px">Random Search</text>
    <text x="167" y="381" text-anchor="middle" class="sublabel" style="font-size:10px">Efficient</text>
  </g>
  
  <g class="box3-anim" style="animation-delay:0.6s" data-narration="Bayesian Optimization uses probability models to find optimal parameters efficiently">
    <rect x="225" y="350" width="95" height="40" fill="#fed7d7" class="section-box"/>
    <text x="272" y="367" text-anchor="middle" class="sublabel" style="font-size:11px">Bayesian</text>
    <text x="272" y="381" text-anchor="middle" class="sublabel" style="font-size:10px">Smart Search</text>
  </g>
  
  <g class="box3-anim" style="animation-delay:0.7s" data-narration="Nested Cross-Validation prevents optimistic bias by using outer loop for evaluation">
    <rect x="330" y="350" width="75" height="40" fill="#bee3f8" class="section-box"/>
    <text x="367" y="367" text-anchor="middle" class="sublabel" style="font-size:11px">Nested CV</text>
    <text x="367" y="381" text-anchor="middle" class="sublabel" style="font-size:10px">Unbiased</text>
  </g>
  
  <!-- Connection arrows between sections -->
  <path d="M 145 145 Q 210 145, 275 145" fill="none" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="275,140 285,145 275,150" fill="#cbd5e0"/>
  
</svg>