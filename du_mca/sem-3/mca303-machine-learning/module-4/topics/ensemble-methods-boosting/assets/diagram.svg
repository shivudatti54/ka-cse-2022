<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="ensemble-methods-boosting">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#6bb3c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInLeft {
        from { transform: translateX(-30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes drawArrow {
        from { stroke-dashoffset: 50; }
        to { stroke-dashoffset: 0; }
      }
      .title { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #2c5282; }
      .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #2d3748; }
      .detail { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #4a5568; }
      .formula { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c5282; }
      .box-title { font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: bold; fill: #2c5282; }
      .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
      .slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
      .slide-right { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
      .slide-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
      .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
      .arrow-line { stroke: #4a90a4; stroke-width: 2; stroke-dasharray: 5,3; }
    </style>
  </defs>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Ensemble Methods: Boosting</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#4a90a4" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- Section 1: Concept Overview -->
  <g transform="translate(20, 60)" data-narration="Boosting transforms weak learners into a strong learner through sequential error correction">
    <rect x="0" y="0" width="180" height="55" rx="8" fill="#fff" filter="url(#shadow)" class="slide-left"/>
    <text x="90" y="20" text-anchor="middle" class="box-title">Core Idea</text>
    <text x="10" y="38" class="detail">Weak → Strong Learner</text>
    <text x="10" y="50" class="detail" style="fill:#4a90a4">Sequential Error Correction</text>
  </g>
  
  <!-- Section 2: Sequential Process -->
  <g transform="translate(220, 60)" data-narration="Models are built one after another, each focusing on correcting predecessor's mistakes">
    <rect x="0" y="0" width="180" height="55" rx="8" fill="#fff" filter="url(#shadow)" class="slide-right"/>
    <text x="90" y="20" text-anchor="middle" class="box-title">Sequential Learning</text>
    <text x="10" y="38" class="detail">Model t → Model t+1 → ...</text>
    <text x="10" y="50" class="detail" style="fill:#4a90a4">Focus on misclassified</text>
  </g>
  
  <!-- Visualization: AdaBoost Weight Update Example -->
  <g transform="translate(20, 130)" data-narration="AdaBoost example showing how weights increase for misclassified points across iterations">
    <rect x="0" y="0" width="380" height="120" rx="10" fill="#fff" filter="url(#shadow)" class="slide-up" style="animation-delay: 0.2s"/>
    <text x="190" y="22" text-anchor="middle" class="box-title" style="font-size:14px">AdaBoost Weight Update Process</text>
    
    <!-- Iteration 1 -->
    <g transform="translate(30, 35)">
      <text x="30" y="0" class="label" style="font-weight:bold">Iteration 1</text>
      <!-- Data points -->
      <circle cx="30" cy="40" r="18" fill="#68d391" stroke="#2f855a" stroke-width="2" class="pulse" style="animation-delay: 0.4s"/>
      <text x="30" y="44" text-anchor="middle" class="detail" fill="#fff" font-weight="bold">1</text>
      <text x="30" y="68" class="detail" text-anchor="middle">w=1/3</text>
      
      <circle cx="80" cy="40" r="18" fill="#68d391" stroke="#2f855a" stroke-width="2" class="pulse" style="animation-delay: 0.5s"/>
      <text x="80" y="44" text-anchor="middle" class="detail" fill="#fff" font-weight="bold">2</text>
      <text x="80" y="68" class="detail" text-anchor="middle">w=1/3</text>
      
      <circle cx="130" cy="40" r="18" fill="#fc8181" stroke="#c53030" stroke-width="2" class="pulse" style="animation-delay: 0.6s"/>
      <text x="130" y="44" text-anchor="middle" class="detail" fill="#fff" font-weight="bold">3</text>
      <text x="130" y="68" class="detail" text-anchor="middle">w=1/3</text>
      
      <text x="75" y="90" class="detail" style="fill:#c53030">✗ Misclassified</text>
    </g>
    
    <!-- Arrow -->
    <path d="M180 95 L210 95" class="arrow-line" style="animation: drawArrow 0.5s ease-out forwards; animation-delay: 0.8s"/>
    <polygon points="205,90 215,95 205,100" fill="#4a90a4"/>
    
    <!-- Iteration 2 -->
    <g transform="translate(230, 35)">
      <text x="30" y="0" class="label" style="font-weight:bold">Iteration 2</text>
      <!-- Data points with updated weights -->
      <circle cx="30" cy="40" r="16" fill="#68d391" stroke="#2f855a" stroke-width="2" class="pulse" style="animation-delay: 0.9s"/>
      <text x="30" y="44" text-anchor="middle" class="detail" fill="#fff" font-weight="bold">1</text>
      <text x="30" y="68" class="detail" text-anchor="middle">w=0.25</text>
      
      <circle cx="80" cy="40" r="16" fill="#68d391" stroke="#2f855a" stroke-width="2" class="pulse" style="animation-delay: 1s"/>
      <text x="80" y="44" text-anchor="middle" class="detail" fill="#fff" font-weight="bold">2</text>
      <text x="80" y="68" class="detail" text-anchor="middle">w=0.25</text>
      
      <circle cx="130" cy="40" r="22" fill="#fc8181" stroke="#c53030" stroke-width="3" class="pulse" style="animation-delay: 1.1s"/>
      <text x="130" y="44" text-anchor="middle" class="detail" fill="#fff" font-weight="bold">3</text>
      <text x="130" y="72" class="detail" text-anchor="middle" font-weight="bold">w=0.5</text>
      
      <text x="75" y="90" class="detail" style="fill:#c53030">↑ Weight increased!</text>
    </g>
  </g>
  
  <!-- Section 3: Key Formulas -->
  <g transform="translate(20, 265)" data-narration="AdaBoost uses exponential loss and updates weights based on classifier performance">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#fff" filter="url(#shadow)" class="slide-left" style="animation-delay: 0.4s"/>
    <text x="90" y="18" text-anchor="middle" class="box-title">AdaBoost Formula</text>
    <text x="10" y="38" class="formula">α = 0.5 × ln((1-ε)/ε)</text>
    <text x="10" y="52" class="detail">Classifier weight from error</text>
  </g>
  
  <!-- Section 4: Additive Model -->
  <g transform="translate(220, 265)" data-narration="Final prediction combines all weak learners with their learned weights">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#fff" filter="url(#shadow)" class="slide-right" style="animation-delay: 0.5s"/>
    <text x="90" y="18" text-anchor="middle" class="box-title">Additive Model</text>
    <text x="10" y="38" class="formula">F(x) = Σ αₜ × hₜ(x)</text>
    <text x="10" y="52" class="detail">Weighted weak learners sum</text>
  </g>
  
  <!-- Section 5: Regularization -->
  <g transform="translate(120, 340)" data-narration="Regularization prevents overfitting through learning rate, subsampling, and tree constraints">
    <rect x="0" y="0" width="180" height="45" rx="8" fill="url(#accentGradient)" filter="url(#shadow)" class="slide-up" style="animation-delay: 0.6s"/>
    <text x="90" y="18" text-anchor="middle" class="box-title" fill="#fff">Regularization Techniques</text>
    <text x="90" y="36" text-anchor="middle" class="detail" fill="#fff">Learning Rate • Subsampling • Tree Constraints</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="30" cy="380" r="4" fill="#4a90a4" opacity="0.5" class="fade-in" style="animation-delay: 0.8s"/>
  <circle cx="50" cy="380" r="3" fill="#6bb3c9" opacity="0.4" class="fade-in" style="animation-delay: 0.9s"/>
  <circle cx="70" cy="380" r="5" fill="#4a90a4" opacity="0.3" class="fade-in" style="animation-delay: 1s"/>
  <circle cx="350" cy="380" r="4" fill="#4a90a4" opacity="0.5" class="fade-in" style="animation-delay: 0.8s"/>
  <circle cx="370" cy="380" r="3" fill="#6bb3c9" opacity="0.4" class="fade-in" style="animation-delay: 0.9s"/>
  <circle cx="390" cy="380" r="5" fill="#4a90a4" opacity="0.3" class="fade-in" style="animation-delay: 1s"/>
</svg>