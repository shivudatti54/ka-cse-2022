<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="deep-learning-overview">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8d9e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hiddenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cb8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3575;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb87c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7548;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-box { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .section-box:nth-child(4) { animation-delay: 0.8s; }
    .section-box:nth-child(5) { animation-delay: 1s; }
    .nn-layer { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .input-layer { animation-delay: 0.3s; }
    .hidden-layer { animation-delay: 0.6s; }
    .output-layer { animation-delay: 0.9s; }
    .connection { stroke-dasharray: 200; animation: drawLine 1.5s ease-out forwards; }
    .pulse-node { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .label { font-family: Arial, sans-serif; }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2d5a8a; }
    .section-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #333; }
    .section-desc { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text label">Deep Learning Overview</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#4a90d9" stroke-width="2"/>
  
  <!-- Neural Network Architecture Diagram -->
  <g transform="translate(40, 100)" data-narration="Neural Network Architecture showing input layer (blue), hidden layers (purple), and output layer (green) with weighted connections">
    <!-- Input Layer -->
    <g class="nn-layer input-layer">
      <text x="0" y="-8" class="label" style="font-size:10px;fill:#333;font-weight:bold;">Input</text>
      <circle cx="0" cy="10" r="8" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <circle cx="0" cy="35" r="8" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <circle cx="0" cy="60" r="8" fill="url(#nodeGradient)" filter="url(#shadow)"/>
      <circle cx="0" cy="85" r="8" fill="url(#nodeGradient)" filter="url(#shadow)"/>
    </g>
    
    <!-- Hidden Layer 1 -->
    <g class="nn-layer hidden-layer">
      <text x="60" y="-8" class="label" style="font-size:10px;fill:#333;font-weight:bold;">Hidden 1</text>
      <circle cx="60" cy="20" r="10" fill="url(#hiddenGradient)" filter="url(#shadow)" class="pulse-node"/>
      <circle cx="60" cy="50" r="10" fill="url(#hiddenGradient)" filter="url(#shadow)" class="pulse-node"/>
      <circle cx="60" cy="80" r="10" fill="url(#hiddenGradient)" filter="url(#shadow)" class="pulse-node"/>
    </g>
    
    <!-- Hidden Layer 2 -->
    <g class="nn-layer hidden-layer">
      <text x="110" y="-8" class="label" style="font-size:10px;fill:#333;font-weight:bold;">Hidden 2</text>
      <circle cx="110" cy="30" r="10" fill="url(#hiddenGradient)" filter="url(#shadow)" class="pulse-node"/>
      <circle cx="110" cy="60" r="10" fill="url(#hiddenGradient)" filter="url(#shadow)" class="pulse-node"/>
    </g>
    
    <!-- Output Layer -->
    <g class="nn-layer output-layer">
      <text x="165" y="-8" class="label" style="font-size:10px;fill:#333;font-weight:bold;">Output</text>
      <circle cx="165" cy="35" r="10" fill="url(#outputGradient)" filter="url(#shadow)"/>
      <circle cx="165" cy="60" r="10" fill="url(#outputGradient)" filter="url(#shadow)"/>
    </g>
    
    <!-- Connections -->
    <g stroke="#999" stroke-width="1" opacity="0.6">
      <line x1="8" y1="10" x2="52" y2="20" class="connection" style="animation-delay:0.5s"/>
      <line x1="8" y1="10" x2="52" y2="50" class="connection" style="animation-delay:0.6s"/>
      <line x1="8" y1="10" x2="52" y2="80" class="connection" style="animation-delay:0.7s"/>
      <line x1="8" y1="35" x2="52" y2="20" class="connection" style="animation-delay:0.5s"/>
      <line x1="8" y1="35" x2="52" y2="50" class="connection" style="animation-delay:0.6s"/>
      <line x1="8" y1="35" x2="52" y2="80" class="connection" style="animation-delay:0.7s"/>
      <line x1="8" y1="60" x2="52" y2="20" class="connection" style="animation-delay:0.5s"/>
      <line x1="8" y1="60" x2="52" y2="50" class="connection" style="animation-delay:0.6s"/>
      <line x1="8" y1="60" x2="52" y2="80" class="connection" style="animation-delay:0.7s"/>
      <line x1="8" y1="85" x2="52" y2="20" class="connection" style="animation-delay:0.5s"/>
      <line x1="8" y1="85" x2="52" y2="50" class="connection" style="animation-delay:0.6s"/>
      <line x1="8" y1="85" x2="52" y2="80" class="connection" style="animation-delay:0.7s"/>
      
      <line x1="70" y1="20" x2="102" y2="30" class="connection" style="animation-delay:0.8s"/>
      <line x1="70" y1="20" x2="102" y2="60" class="connection" style="animation-delay:0.9s"/>
      <line x1="70" y1="50" x2="102" y2="30" class="connection" style="animation-delay:0.8s"/>
      <line x1="70" y1="50" x2="102" y2="60" class="connection" style="animation-delay:0.9s"/>
      <line x1="70" y1="80" x2="102" y2="30" class="connection" style="animation-delay:0.8s"/>
      <line x1="70" y1="80" x2="102" y2="60" class="connection" style="animation-delay:0.9s"/>
      
      <line x1="120" y1="30" x2="157" y2="35" class="connection" style="animation-delay:1s"/>
      <line x1="120" y1="30" x2="157" y2="60" class="connection" style="animation-delay:1.1s"/>
      <line x1="120" y1="60" x2="157" y2="35" class="connection" style="animation-delay:1s"/>
      <line x1="120" y1="60" x2="157" y2="60" class="connection" style="animation-delay:1.1s"/>
    </g>
  </g>
  
  <!-- Key Concept Boxes -->
  <g class="section-box" data-narration="Convolutional Neural Networks (CNNs) for spatial feature extraction in images">
    <rect x="220" y="95" width="95" height="50" rx="5" fill="#fff" stroke="#e07b53" stroke-width="2" filter="url(#shadow)"/>
    <text x="267" y="112" text-anchor="middle" class="section-title label">CNNs</text>
    <text x="267" y="126" text-anchor="middle" class="section-desc label">Spatial Features</text>
    <text x="267" y="138" text-anchor="middle" class="section-desc label">LeNet, AlexNet</text>
  </g>
  
  <g class="section-box" data-narration="Recurrent Neural Networks (RNNs) for sequential data processing with memory">
    <rect x="320" y="95" width="90" height="50" rx="5" fill="#fff" stroke="#7c5cb8" stroke-width="2" filter="url(#shadow)"/>
    <text x="365" y="112" text-anchor="middle" class="section-title label">RNNs</text>
    <text x="365" y="126" text-anchor="middle" class="section-desc label">Sequential Data</text>
    <text x="365" y="138" text-anchor="middle" class="section-desc label">LSTM, GRU</text>
  </g>
  
  <g class="section-box" data-narration="Backpropagation algorithm using gradient descent and chain rule for training">
    <rect x="220" y="155" width="95" height="50" rx="5" fill="#fff" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="267" y="172" text-anchor="middle" class="section-title label">Backprop</text>
    <text x="267" y="186" text-anchor="middle" class="section-desc label">Gradient Descent</text>
    <text x="267" y="198" text-anchor="middle" class="section-desc label">Chain Rule</text>
  </g>
  
  <g class="section-box" data-narration="Regularization techniques including Dropout and Weight Decay to prevent overfitting">
    <rect x="320" y="155" width="90" height="50" rx="5" fill="#fff" stroke="#5cb87c" stroke-width="2" filter="url(#shadow)"/>
    <text x="365" y="172" text-anchor="middle" class="section-title label">Regularization</text>
    <text x="365" y="186" text-anchor="middle" class="section-desc label">Dropout</text>
    <text x="365" y="198" text-anchor="middle" class="section-desc label">L2, BatchNorm</text>
  </g>
  
  <g class="section-box" data-narration="Activation functions: ReLU, Sigmoid, Tanh for non-linear transformations">
    <rect x="235" y="215" width="100" height="45" rx="5" fill="#fff" stroke="#e07b53" stroke-width="2" filter="url(#shadow)"/>
    <text x="285" y="232" text-anchor="middle" class="section-title label">Activation Functions</text>
    <text x="285" y="248" text-anchor="middle" class="section-desc label">ReLU, Sigmoid, Tanh</text>
  </g>
  
  <!-- Arrows showing flow -->
  <g stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)">
    <path d="M185 120 Q200 120 220 120" class="section-box"/>
    <path d="M315 120 Q330 120 340 120" class="section-box"/>
    <path d="M267 145 Q267 155 267 155" class="section-box"/>
    <path d="M365 145 Q365 155 365 155" class="section-box"/>
    <path d="M267 210 Q267 225 270 235" class="section-box"/>
    <path d="M365 205 Q365 220 360 230" class="section-box"/>
  </g>
  
  <!-- Key points bottom section -->
  <g class="section-box" data-narration="Universal Approximation Theorem states ANNs can approximate any continuous function">
    <rect x="20" y="270" width="180" height="35" rx="5" fill="#fff" stroke="#4a90d9" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="285" text-anchor="middle" class="section-title label">Universal Approximation</text>
    <text x="110" y="298" text-anchor="middle" class="section-desc label">ANNs approximate any continuous function</text>
  </g>
  
  <g class="section-box" data-narration="Applications in computer vision, NLP, speech recognition, and autonomous systems">
    <rect x="210" y="270" width="190" height="35" rx="5" fill="#fff" stroke="#5cb87c" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="305" y="285" text-anchor="middle" class="section-title label">Applications</text>
    <text x="305" y="298" text-anchor="middle" class="section-desc label">Computer Vision, NLP, Speech, Auto-driving</text>
  </g>
  
  <g class="section-box" data-narration="GPU/TPU computing power enables training of large-scale deep learning models">
    <rect x="20" y="315" width="180" height="35" rx="5" fill="#fff" stroke="#7c5cb8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="330" text-anchor="middle" class="section-title label">GPU/TPU Computing</text>
    <text x="110" y="343" text-anchor="middle" class="section-desc label">Enables large-scale model training</text>
  </g>
  
  <g class="section-box" data-narration="Transformers: State-of-the-art architecture for NLP and sequence modeling">
    <rect x="210" y="315" width="190" height="35" rx="5" fill="#fff" stroke="#e07b53" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="305" y="330" text-anchor="middle" class="section-title label">Transformers</text>
    <text x="305" y="343" text-anchor="middle" class="section-desc label">State-of-the-art NLP &amp; Sequence Models</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 360)">
    <circle cx="0" cy="0" r="4" fill="#4a90d9"/>
    <text x="8" y="4" class="label" style="font-size:9px;fill:#555;">Input</text>
    <circle cx="50" cy="0" r="4" fill="#7c5cb8"/>
    <text x="58" y="4" class="label" style="font-size:9px;fill:#555;">Hidden</text>
    <circle cx="105" cy="0" r="4" fill="#5cb87c"/>
    <text x="113" y="4" class="label" style="font-size:9px;fill:#555;">Output</text>
  </g>
</svg>