<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="k-means-hierarchical-clustering">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e6f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cluster1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cluster2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#baffc9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80ff9c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .section { animation: fadeIn 0.8s ease-out forwards; }
    .section-1 { animation-delay: 0.1s; }
    .section-2 { animation-delay: 0.3s; }
    .section-3 { animation-delay: 0.5s; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .dashed-line {
      stroke-dasharray: 5, 5;
      animation: drawLine 1s linear forwards;
    }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <g class="section" data-narration="Title section introducing K-Means and Hierarchical Clustering">
    <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">K-Means &amp; Hierarchical</text>
    <text x="210" y="52" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Clustering</text>
    <line x1="100" y1="65" x2="320" y2="65" stroke="#9b59b6" stroke-width="2"/>
  </g>
  
  <!-- K-Means Section (Left) -->
  <g class="slide-left section-1" data-narration="K-Means algorithm showing centroid initialization, assignment, and update steps">
    <rect x="10" y="80" width="190" height="145" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="105" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">K-Means Algorithm</text>
    
    <!-- K-Means Visual -->
    <g transform="translate(20, 115)">
      <!-- Cluster 1 points -->
      <circle cx="20" cy="30" r="6" fill="url(#cluster1Grad)"/>
      <circle cx="30" cy="50" r="6" fill="url(#cluster1Grad)"/>
      <circle cx="15" cy="65" r="6" fill="url(#cluster1Grad)"/>
      <circle cx="35" cy="75" r="6" fill="url(#cluster1Grad)"/>
      <!-- Cluster 2 points -->
      <circle cx="120" cy="35" r="6" fill="url(#cluster2Grad)"/>
      <circle cx="140" cy="45" r="6" fill="url(#cluster2Grad)"/>
      <circle cx="130" cy="60" r="6" fill="url(#cluster2Grad)"/>
      <circle cx="150" cy="70" r="6" fill="url(#cluster2Grad)"/>
      <!-- Initial Centroids -->
      <circle cx="25" cy="55" r="8" fill="#e74c3c" stroke="white" stroke-width="2" class="pulse"/>
      <circle cx="140" cy="50" r="8" fill="#27ae60" stroke="white" stroke-width="2" class="pulse"/>
      <!-- Assignment lines -->
      <line x1="25" y1="55" x2="20" y2="30" stroke="#e74c3c" stroke-width="1" opacity="0.5" class="dashed-line"/>
      <line x1="140" y1="50" x2="120" y2="35" stroke="#27ae60" stroke-width="1" opacity="0.5" class="dashed-line"/>
    </g>
    <text x="105" y="210" text-anchor="middle" font-size="11" fill="#555">Init → Assign → Update → Converge</text>
  </g>
  
  <!-- Hierarchical Section (Right) -->
  <g class="slide-right section-1" data-narration="Hierarchical clustering showing dendrogram structure with agglomerative approach">
    <rect x="220" y="80" width="190" height="145" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="315" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">Hierarchical Clustering</text>
    
    <!-- Dendrogram -->
    <g transform="translate(235, 115)">
      <!-- Tree structure -->
      <line x1="30" y1="80" x2="30" y2="30" stroke="#9b59b6" stroke-width="2"/>
      <line x1="30" y1="30" x2="50" y2="30" stroke="#9b59b6" stroke-width="2"/>
      <line x1="50" y1="30" x2="50" y2="10" stroke="#9b59b6" stroke-width="2"/>
      
      <line x1="70" y1="80" x2="70" y2="50" stroke="#9b59b6" stroke-width="2"/>
      <line x1="70" y1="50" x2="50" y2="50" stroke="#9b59b6" stroke-width="2"/>
      
      <line x1="100" y1="80" x2="100" y2="60" stroke="#9b59b6" stroke-width="2"/>
      <line x1="100" y1="60" x2="80" y2="60" stroke="#9b59b6" stroke-width="2"/>
      <line x1="80" y1="60" x2="80" y2="50" stroke="#9b59b6" stroke-width="2"/>
      
      <line x1="130" y1="80" x2="130" y2="45" stroke="#9b59b6" stroke-width="2"/>
      <line x1="130" y1="45" x2="110" y2="45" stroke="#9b59b6" stroke-width="2"/>
      <line x1="110" y1="45" x2="110" y2="30" stroke="#9b59b6" stroke-width="2"/>
      
      <!-- Labels -->
      <circle cx="30" cy="80" r="4" fill="#ffb3ba"/>
      <circle cx="70" cy="80" r="4" fill="#baffc9"/>
      <circle cx="100" cy="80" r="4" fill="#bae1ff"/>
      <circle cx="130" cy="80" r="4" fill="#ffffba"/>
    </g>
    <text x="315" y="210" text-anchor="middle" font-size="11" fill="#555">Agglomerative: Bottom-up</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="section section-2" data-narration="Key concepts including algorithm steps and linkage criteria">
    <rect x="10" y="235" width="195" height="75" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="20" y="255" font-size="13" font-weight="bold" fill="#2c3e50">K-Means Steps:</text>
    <text x="20" y="275" font-size="11" fill="#555">1. Initialize k centroids</text>
    <text x="20" y="290" font-size="11" fill="#555">2. Assign points to nearest</text>
    <text x="20" y="305" font-size="11" fill="#555">3. Update centroids (mean)</text>
    <circle cx="180" cy="295" r="15" fill="#f39c12" class="pulse"/>
    <text x="180" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="white">SSE</text>
  </g>
  
  <!-- Linkage Criteria -->
  <g class="section section-2" data-narration="Linkage criteria for hierarchical clustering: Single, Complete, Average, and Ward's method">
    <rect x="215" y="235" width="195" height="75" fill="white" rx="8" filter="url(#shadow)"/>
    <text x="225" y="255" font-size="13" font-weight="bold" fill="#2c3e50">Linkage Criteria:</text>
    <text x="225" y="275" font-size="10" fill="#555">• Single (min dist)</text>
    <text x="295" y="275" font-size="10" fill="#555">• Complete (max)</text>
    <text x="225" y="290" font-size="10" fill="#555">• Average (mean)</text>
    <text x="295" y="290" font-size="10" fill="#555">• Ward's (variance)</text>
    <text x="312" y="305" font-size="9" fill="#888">Cophenetic Corr.</text>
  </g>
  
  <!-- Comparison Arrow/Relationship -->
  <g class="section section-3" data-narration="Comparison showing K-Means partition approach vs Hierarchical tree structure">
    <path d="M 200 330 Q 210 320 210 340 Q 210 360 220 350" fill="none" stroke="#9b59b6" stroke-width="2" class="dashed-line"/>
    <polygon points="220,350 215,345 218,352" fill="#9b59b6"/>
    
    <!-- K-Means box -->
    <rect x="50" y="325" width="70" height="30" fill="#ffb3ba" rx="5"/>
    <text x="85" y="345" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">K-Means</text>
    <text x="85" y="358" text-anchor="middle" font-size="8" fill="#777">Partition</text>
    
    <!-- Hierarchical box -->
    <rect x="300" y="325" width="90" height="30" fill="#bae1ff" rx="5"/>
    <text x="345" y="345" text-anchor="middle" font-size="10" font-weight="bold" fill="#2980b9">Hierarchical</text>
    <text x="345" y="358" text-anchor="middle" font-size="8" fill="#777">Tree/Dendrogram</text>
  </g>
  
  <!-- Real-world Applications -->
  <g class="section section-3" data-narration="Real-world applications showing Delhi Metro and e-commerce examples">
    <rect x="130" y="360" width="160" height="30" fill="white" rx="5" filter="url(#shadow)"/>
    <text x="210" y="378" text-anchor="middle" font-size="10" fill="#555">
      <tspan fill="#e74c3c">Delhi Metro:</tspan> K-Means
      <tspan fill="#3498db"> | E-comm:</tspan> Hierarchical
    </text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="380" r="4" fill="#ffb3ba"/>
  <circle cx="45" cy="375" r="3" fill="#baffc9"/>
  <circle cx="375" cy="385" r="4" fill="#bae1ff"/>
  <circle cx="390" cy="375" r="3" fill="#ffffba"/>
</svg>