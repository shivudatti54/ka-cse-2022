<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="pca-dimensionality-reduction">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccefff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6fff5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4ffe0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a7a9a"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes slideUp {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c4a6e; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #3d5a7a; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #5a7a9a; }
    .formula { font-family: 'Courier New', monospace; font-size: 10px; fill: #4a5a6a; font-style: italic; }
    .box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-up { animation: slideUp 0.7s ease-out forwards; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">PCA Dimensionality Reduction</text>
  
  <!-- Step 1: Raw Data -->
  <g class="anim-slide" style="animation-delay: 0.2s">
    <rect x="15" y="50" width="85" height="90" rx="8" fill="url(#boxGradient1)" class="box" data-narration="Original high-dimensional data points before processing"/>
    <text x="57" y="68" text-anchor="middle" class="label">Raw Data</text>
    <line x1="25" y1="78" x2="90" y2="78" stroke="#ccb3a0" stroke-width="1"/>
    <text x="57" y="92" text-anchor="middle" class="detail">n samples</text>
    <text x="57" y="106" text-anchor="middle" class="detail">d features</text>
    <text x="57" y="125" text-anchor="middle" class="detail" fill="#8a6a5a">X ∈ ℝⁿˣᵈ</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="105" y1="95" x2="125" y2="95" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Standardization -->
  <g class="anim-slide" style="animation-delay: 0.4s">
    <rect x="130" y="50" width="85" height="90" rx="8" fill="url(#boxGradient2)" class="box" data-narration="Data standardization: subtract mean and divide by standard deviation to achieve zero mean and unit variance"/>
    <text x="172" y="68" text-anchor="middle" class="label">Standardize</text>
    <line x1="140" y1="78" x2="205" y2="78" stroke="#a3c4d9" stroke-width="1"/>
    <text x="172" y="92" text-anchor="middle" class="detail">μ = 0</text>
    <text x="172" y="108" text-anchor="middle" class="detail">σ = 1</text>
    <text x="172" y="125" text-anchor="middle" class="formula">z = (x-μ)/σ</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="220" y1="95" x2="240" y2="95" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Covariance Matrix -->
  <g class="anim-slide" style="animation-delay: 0.6s">
    <rect x="245" y="50" width="85" height="90" rx="8" fill="url(#boxGradient3)" class="box" data-narration="Covariance matrix computation: symmetric matrix capturing relationships between all pairs of features"/>
    <text x="287" y="68" text-anchor="middle" class="label">Covariance</text>
    <line x1="255" y1="78" x2="320" y2="78" stroke="#b8a8d9" stroke-width="1"/>
    <text x="287" y="95" text-anchor="middle" class="detail">Σ = cov(X)</text>
    <text x="287" y="110" text-anchor="middle" class="detail">d×d matrix</text>
    <text x="287" y="128" text-anchor="middle" class="detail" fill="#6a5a7a">symmetric</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="335" y1="95" x2="355" y2="95" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Eigen Decomposition -->
  <g class="anim-slide" style="animation-delay: 0.8s">
    <rect x="15" y="165" width="85" height="100" rx="8" fill="url(#boxGradient4)" class="box" data-narration="Eigen decomposition: finding eigenvalues and eigenvectors of covariance matrix to identify principal directions"/>
    <text x="57" y="183" text-anchor="middle" class="label">Eigen Decomp</text>
    <line x1="25" y1="193" x2="90" y2="193" stroke="#a8d9c4" stroke-width="1"/>
    <text x="57" y="210" text-anchor="middle" class="detail">Σv = λv</text>
    <text x="57" y="228" text-anchor="middle" class="detail">Eigenvectors</text>
    <text x="57" y="244" text-anchor="middle" class="detail">= directions</text>
    <text x="57" y="258" text-anchor="middle" class="detail">Eigenvalues</text>
    <text x="57" y="272" text-anchor="middle" class="detail">= variance</text>
  </g>
  
  <!-- Arrow 4 -->
  <line x1="105" y1="215" x2="125" y2="215" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: Select Top k Components -->
  <g class="anim-slide" style="animation-delay: 1s">
    <rect x="130" y="165" width="85" height="100" rx="8" fill="url(#boxGradient1)" class="box" data-narration="Component selection: choose top k eigenvectors that capture desired variance (e.g., 95%)"/>
    <text x="172" y="183" text-anchor="middle" class="label">Select Top k</text>
    <line x1="140" y1="193" x2="205" y2="193" stroke="#ccb3a0" stroke-width="1"/>
    <text x="172" y="212" text-anchor="middle" class="detail">Sort λ ↓</text>
    <text x="172" y="230" text-anchor="middle" class="detail">λ₁ ≥ λ₂ ≥ ...</text>
    <text x="172" y="250" text-anchor="middle" class="detail">Cum. variance</text>
    <text x="172" y="268" text-anchor="middle" class="detail">&gt; 95%</text>
  </g>
  
  <!-- Arrow 5 -->
  <line x1="220" y1="215" x2="240" y2="215" stroke="#5a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 6: Projected Data -->
  <g class="anim-slide" style="animation-delay: 1.2s">
    <rect x="245" y="165" width="85" height="100" rx="8" fill="url(#boxGradient2)" class="box" data-narration="Final projection: transform data onto selected principal components, reducing dimensionality from d to k"/>
    <text x="287" y="183" text-anchor="middle" class="label">Projected</text>
    <line x1="255" y1="193" x2="320" y2="193" stroke="#a3c4d9" stroke-width="1"/>
    <text x="287" y="212" text-anchor="middle" class="detail">Y = XW</text>
    <text x="287" y="232" text-anchor="middle" class="detail">n samples</text>
    <text x="287" y="250" text-anchor="middle" class="detail">k &lt;&lt; d features</text>
    <text x="287" y="270" text-anchor="middle" class="detail" fill="#4a6a8a">Y ∈ ℝⁿˣᵏ</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="anim-up" style="animation-delay: 1.4s">
    <rect x="15" y="290" width="390" height="95" rx="8" fill="#ffffff" stroke="#c4d4e4" stroke-width="1.5" class="box"/>
    <text x="210" y="310" text-anchor="middle" class="label" style="font-size:14px;">Key Concepts</text>
    <line x1="30" y1="318" x2="390" y2="318" stroke="#e0e8f0" stroke-width="1"/>
    
    <!-- Concept 1 -->
    <circle cx="45" cy="338" r="4" fill="#7ab8d9"/>
    <text x="55" y="342" class="detail" style="font-size:11px;"><tspan fill="#4a5a6a">Variance:</tspan> Var(X) = E[(X-μ)²]</text>
    
    <!-- Concept 2 -->
    <circle cx="45" cy="356" r="4" fill="#9ab8d9"/>
    <text x="55" y="360" class="detail" style="font-size:11px;"><tspan fill="#4a5a6a">Covariance:</tspan> Cov(X,Y) = E[(X-μx)(Y-μy)]</text>
    
    <!-- Concept 3 -->
    <circle cx="45" cy="374" r="4" fill="#7ab8d9"/>
    <text x="55" y="378" class="detail" style="font-size:11px;"><tspan fill="#4a5a6a">Eigenvectors:</tspan> Orthogonal directions of max variance</text>
    
    <!-- Right side concepts -->
    <rect x="210" y="330" width="180" height="40" rx="4" fill="#f0f7fa" stroke="#d0e4f0"/>
    <text x="300" y="346" text-anchor="middle" class="detail" style="font-size:10px;">Reduce dimensions,</text>
    <text x="300" y="360" text-anchor="middle" class="detail" style="font-size:10px;">retain 95%+ variance</text>
  </g>
  
  <!-- Animated highlight pulse on key elements -->
  <g class="anim-pulse" style="animation-delay: 2s">
    <circle cx="57" cy="125" r="12" fill="none" stroke="#e6a366" stroke-width="1.5" opacity="0.6"/>
  </g>
  <g class="anim-pulse" style="animation-delay: 2.2s">
    <circle cx="287" cy="270" r="12" fill="none" stroke="#7ab8d9" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>