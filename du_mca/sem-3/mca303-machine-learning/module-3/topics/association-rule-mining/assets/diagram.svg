<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="association-rule-mining">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5dde8"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98d8c8"/>
      <stop offset="100%" style="stop-color:#7bc4ad"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7d794"/>
      <stop offset="100%" style="stop-color:#f5c878"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cf9fff"/>
      <stop offset="100%" style="stop-color:#b380d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideInUp 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideInUp 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideInUp 0.6s ease-out 0.8s forwards; opacity: 0; }
    .workflow { animation: slideInLeft 0.6s ease-out 1s forwards; opacity: 0; }
    .example { animation: fadeIn 0.8s ease-out 1.2s forwards; opacity: 0; }
    .arrow { animation: arrowPulse 2s ease-in-out infinite; }
    .pulse-anim { animation: pulse 3s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c5f7c" class="title">Association Rule Mining</text>
  <text x="210" y="46" text-anchor="middle" font-size="11" fill="#5a8aa3" class="title">Key Concepts &amp; Metrics</text>
  
  <!-- Box 1: Itemset &amp; Support -->
  <g class="box1" data-narration="Itemset is a collection of items. Support measures how frequently items appear together in transactions.">
    <rect x="10" y="60" width="95" height="75" rx="8" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="57" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Itemset</text>
    <text x="57" y="95" text-anchor="middle" font-size="10" fill="#fff">{milk, bread}</text>
    <text x="57" y="110" text-anchor="middle" font-size="9" fill="#e8f4f8">Collection of items</text>
    <text x="57" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Support</text>
    <text x="57" y="136" text-anchor="middle" font-size="9" fill="#e8f4f8">P(X ∪ Y)</text>
  </g>
  
  <!-- Box 2: Confidence -->
  <g class="box2" data-narration="Confidence measures the conditional probability of Y given X - how likely Y is purchased when X is purchased.">
    <rect x="110" y="60" width="95" height="75" rx="8" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="157" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Confidence</text>
    <text x="157" y="95" text-anchor="middle" font-size="10" fill="#fff">P(Y|X) =</text>
    <text x="157" y="110" text-anchor="middle" font-size="9" fill="#e8f4f8">supp(X∪Y)/supp(X)</text>
    <text x="157" y="125" text-anchor="middle" font-size="9" fill="#4a8a6f">Conditional prob.</text>
    <text x="157" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">High = Strong rule</text>
  </g>
  
  <!-- Box 3: Lift -->
  <g class="box3" data-narration="Lift measures how much more likely items are to be purchased together compared to random chance. Lift &gt; 1 indicates positive correlation.">
    <rect x="210" y="60" width="95" height="75" rx="8" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="257" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Lift</text>
    <text x="257" y="95" text-anchor="middle" font-size="9" fill="#7a5c30">supp(X∪Y)/</text>
    <text x="257" y="107" text-anchor="middle" font-size="9" fill="#7a5c30">(supp(X)×supp(Y))</text>
    <text x="257" y="122" text-anchor="middle" font-size="10" fill="#8b6914">&gt;1: Positive correlation</text>
    <text x="257" y="135" text-anchor="middle" font-size="10" fill="#8b6914">&lt;1: Negative corr.</text>
  </g>
  
  <!-- Box 4: Apriori Principle -->
  <g class="box4" data-narration="Apriori Principle states if an itemset is frequent, all its subsets must also be frequent. This helps prune candidates.">
    <rect x="310" y="60" width="100" height="75" rx="8" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="360" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Apriori Principle</text>
    <text x="360" y="95" text-anchor="middle" font-size="9" fill="#f3e8ff">If {A,B} is frequent</text>
    <text x="360" y="108" text-anchor="middle" font-size="9" fill="#f3e8ff">then {A} and {B}</text>
    <text x="360" y="121" text-anchor="middle" font-size="9" fill="#f3e8ff">are also frequent</text>
    <text x="360" y="136" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Anti-Monotonicity</text>
  </g>
  
  <!-- Workflow Section -->
  <g class="workflow" data-narration="The Apriori algorithm workflow: scan database for frequent 1-itemsets, generate candidates, prune non-frequent itemsets, repeat until no more frequent itemsets found.">
    <text x="15" y="158" font-size="12" font-weight="bold" fill="#2c5f7c">Apriori Algorithm Workflow</text>
    
    <!-- Step boxes -->
    <rect x="10" y="168" width="55" height="30" rx="4" fill="#7ec8e3" class="pulse-anim"/>
    <text x="37" y="185" text-anchor="middle" font-size="9" fill="#fff">Scan DB</text>
    <text x="37" y="197" text-anchor="middle" font-size="8" fill="#fff">Find L₁</text>
    
    <path d="M65 183 L80 183" stroke="#5ba3c6" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
    
    <rect x="80" y="168" width="55" height="30" rx="4" fill="#98d8c8" class="pulse-anim"/>
    <text x="107" y="185" text-anchor="middle" font-size="9" fill="#fff">Generate</text>
    <text x="107" y="197" text-anchor="middle" font-size="8" fill="#fff">Candidates</text>
    
    <path d="M135 183 L150 183" stroke="#7bc4ad" stroke-width="2" class="arrow"/>
    
    <rect x="150" y="168" width="55" height="30" rx="4" fill="#f7d794" class="pulse-anim"/>
    <text x="177" y="185" text-anchor="middle" font-size="9" fill="#7a5c30">Prune</text>
    <text x="177" y="197" text-anchor="middle" font-size="8" fill="#7a5c30">L₂, L₃...</text>
    
    <path d="M205 183 L220 183" stroke="#f5c878" stroke-width="2" class="arrow"/>
    
    <rect x="220" y="168" width="55" height="30" rx="4" fill="#cf9fff" class="pulse-anim"/>
    <text x="247" y="185" text-anchor="middle" font-size="9" fill="#fff">Frequent</text>
    <text x="247" y="197" text-anchor="middle" font-size="8" fill="#fff">Itemsets</text>
    
    <path d="M247 198 L247 218 L130 218 L130 230" stroke="#b380d9" stroke-width="2" class="arrow" fill="none"/>
    <path d="M130 230 L120 220 L140 220 Z" fill="#b380d9"/>
  </g>
  
  <!-- Example Section -->
  <g class="example" data-narration="Example: From transaction data, we discover that customers who buy Bread and Milk frequently also buy Diaper, with high confidence and lift indicating a strong association rule.">
    <text x="15" y="245" font-size="12" font-weight="bold" fill="#2c5f7c">Example: Market Basket Analysis</text>
    
    <!-- Transactions -->
    <rect x="10" y="255" width="195" height="70" rx="6" fill="#fff" stroke="#a8c8dc" stroke-width="1"/>
    <text x="18" y="270" font-size="10" font-weight="bold" fill="#5a8aa3">Transactions:</text>
    <text x="18" y="285" font-size="9" fill="#2c5f7c">T1: {Bread, Milk}</text>
    <text x="18" y="298" font-size="9" fill="#2c5f7c">T2: {Bread, Diaper, Beer, Eggs}</text>
    <text x="18" y="311" font-size="9" fill="#2c5f7c">T3: {Milk, Diaper, Beer, Cola}</text>
    <text x="18" y="324" font-size="9" fill="#2c5f7c">T4: {Bread, Milk, Diaper, Beer}</text>
    
    <!-- Result -->
    <rect x="215" y="255" width="195" height="70" rx="6" fill="#e8f8f0" stroke="#7bc4ad" stroke-width="1"/>
    <text x="223" y="270" font-size="10" font-weight="bold" fill="#4a8a6f">Discovered Rule:</text>
    <text x="223" y="285" font-size="9" fill="#2c5f7c">{Bread, Milk} → {Diaper}</text>
    <text x="223" y="300" font-size="9" fill="#5a8aa3">Support: 50% (2/4)</text>
    <text x="223" y="312" font-size="9" fill="#5a8aa3">Confidence: 100%</text>
    <text x="223" y="324" font-size="9" fill="#5a8aa3">Lift: 2.0 (positive)</text>
  </g>
  
  <!-- Bottom note -->
  <g class="example">
    <rect x="10" y="335" width="400" height="30" rx="5" fill="#f0f7fa" stroke="#d4e8f0"/>
    <text x="210" y="353" text-anchor="middle" font-size="10" fill="#5a8aa3">
      Applications: E-commerce recommendations • Healthcare pattern detection • Fraud detection • Bioinformatics
    </text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="400" cy="385" r="8" fill="#7ec8e3" opacity="0.5"/>
  <circle cx="20" cy="385" r="6" fill="#98d8c8" opacity="0.5"/>
  <circle cx="380" cy="30" r="5" fill="#f7d794" opacity="0.5"/>
</svg>