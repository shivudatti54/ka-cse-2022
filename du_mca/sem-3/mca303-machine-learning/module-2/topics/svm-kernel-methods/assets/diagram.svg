<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="svm-kernel-methods">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section-original { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .section-transformed { animation: slideInRight 0.8s ease-out 0.4s both; }
    .section-kernels { animation: fadeIn 0.8s ease-out 0.6s both; }
    .arrow-anim { animation: slideInRight 0.6s ease-out 0.3s both; }
    .kernel-box { animation: fadeIn 0.6s ease-out; }
    .data-point { animation: float 3s ease-in-out infinite; }
    .data-point:nth-child(odd) { animation-delay: -1.5s; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2d3748" class="title">SVM Kernel Methods</text>
  <text x="210" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">The Kernel Trick: Implicit High-Dimensional Mapping</text>
  
  <!-- Original Space Section -->
  <g class="section-original" data-narration="Original 2D feature space showing non-linearly separable data points">
    <rect x="15" y="65" width="140" height="130" fill="white" stroke="#cbd5e0" stroke-width="1" rx="5"/>
    <text x="85" y="80" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2d3748">Original Space</text>
    <text x="85" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#718096">Non-linear data</text>
    
    <!-- Data points - Class A (red) -->
    <circle cx="50" cy="100" r="5" fill="#fc8181" class="data-point"/>
    <circle cx="65" cy="115" r="5" fill="#fc8181" class="data-point"/>
    <circle cx="45" cy="130" r="5" fill="#fc8181" class="data-point"/>
    <circle cx="70" cy="145" r="5" fill="#fc8181" class="data-point"/>
    <circle cx="55" cy="160" r="5" fill="#fc8181" class="data-point"/>
    
    <!-- Data points - Class B (blue) -->
    <circle cx="100" cy="95" r="5" fill="#63b3ed" class="data-point"/>
    <circle cx="115" cy="110" r="5" fill="#63b3ed" class="data-point"/>
    <circle cx="105" cy="130" r="5" fill="#63b3ed" class="data-point"/>
    <circle cx="120" cy="145" r="5" fill="#63b3ed" class="data-point"/>
    <circle cx="110" cy="165" r="5" fill="#63b3ed" class="data-point"/>
    
    <!-- Non-linear boundary hint -->
    <path d="M 30 170 Q 85 70 140 170" stroke="#a0aec0" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  </g>
  
  <!-- Transformation Arrow -->
  <g class="arrow-anim" data-narration="Kernel function K(x,y) maps data to higher-dimensional space">
    <text x="200" y="120" text-anchor="middle" font-family="Arial" font-size="11" fill="#667eea" font-weight="bold">K(x,y)</text>
    <text x="200" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#764ba2">Kernel Trick</text>
    <path d="M 160 145 L 225 145" stroke="url(#accentGradient)" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  </g>
  
  <!-- Transformed Space Section -->
  <g class="section-transformed" data-narration="High-dimensional feature space where data becomes linearly separable">
    <rect x="235" y="65" width="140" height="130" fill="white" stroke="#cbd5e0" stroke-width="1" rx="5"/>
    <text x="305" y="80" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2d3748">Feature Space</text>
    <text x="305" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#718096">Linear separation</text>
    
    <!-- Transformed data points -->
    <circle cx="260" cy="100" r="5" fill="#fc8181" class="data-point pulse-element"/>
    <circle cx="275" cy="115" r="5" fill="#fc8181" class="data-point pulse-element"/>
    <circle cx="265" cy="130" r="5" fill="#fc8181" class="data-point pulse-element"/>
    
    <circle cx="330" cy="100" r="5" fill="#63b3ed" class="data-point pulse-element"/>
    <circle cx="345" cy="115" r="5" fill="#63b3ed" class="data-point pulse-element"/>
    <circle cx="335" cy="130" r="5" fill="#63b3ed" class="data-point pulse-element"/>
    
    <!-- Linear hyperplane -->
    <line x1="250" y1="155" x2="360" y2="90" stroke="#38ef7d" stroke-width="3" class="pulse-element"/>
    <text x="305" y="150" text-anchor="middle" font-family="Arial" font-size="9" fill="#38ef7d" font-weight="bold">Hyperplane</text>
    
    <!-- Margin lines -->
    <line x1="255" y1="145" x2="355" y2="100" stroke="#38ef7d" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    <line x1="265" y1="165" x2="365" y2="115" stroke="#38ef7d" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  </g>
  
  <!-- Kernel Types Section -->
  <g class="section-kernels" data-narration="Common kernel functions used in SVM: Linear, Polynomial, RBF, Sigmoid">
    <rect x="15" y="205" width="360" height="90" fill="white" stroke="#e2e8f0" stroke-width="1" rx="5"/>
    <text x="195" y="222" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2d3748">Common Kernel Functions</text>
    
    <!-- Kernel boxes -->
    <g class="kernel-box" style="animation-delay: 0.7s">
      <rect x="25" y="232" width="75" height="50" fill="url(#accentGradient)" rx="4"/>
      <text x="62.5" y="250" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Linear</text>
      <text x="62.5" y="268" text-anchor="middle" font-family="Arial" font-size="8" fill="white">K = x·y</text>
    </g>
    
    <g class="kernel-box" style="animation-delay: 0.8s">
      <rect x="110" y="232" width="75" height="50" fill="url(#greenGradient)" rx="4"/>
      <text x="147.5" y="250" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Polynomial</text>
      <text x="147.5" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="white">(γxy+r)^d</text>
    </g>
    
    <g class="kernel-box" style="animation-delay: 0.9s">
      <rect x="195" y="232" width="85" height="50" fill="#ed8936" rx="4"/>
      <text x="237.5" y="250" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">RBF (Gaussian)</text>
      <text x="237.5" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="white">exp(-γ||x-y||²)</text>
    </g>
    
    <g class="kernel-box" style="animation-delay: 1.0s">
      <rect x="290" y="232" width="75" height="50" fill="#9f7aea" rx="4"/>
      <text x="327.5" y="250" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="white">Sigmoid</text>
      <text x="327.5" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="white">tanh(γxy+r)</text>
    </g>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="section-kernels" data-narration="Key mathematical concepts: Optimal margin, Dual formulation, Kernel trick conditions">
    <rect x="15" y="305" width="360" height="85" fill="white" stroke="#e2e8f0" stroke-width="1" rx="5"/>
    <text x="195" y="322" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2d3748">Key Concepts</text>
    
    <!-- Concept 1 -->
    <g class="kernel-box" style="animation-delay: 1.1s">
      <circle cx="40" cy="345" r="12" fill="#667eea"/>
      <text x="40" y="349" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">1</text>
      <text x="60" y="340" font-family="Arial" font-size="9" fill="#2d3748">Optimal Margin</text>
      <text x="60" y="352" font-family="Arial" font-size="8" fill="#718096">maximize geometric</text>
      <text x="60" y="362" font-family="Arial" font-size="8" fill="#718096">margin between classes</text>
    </g>
    
    <!-- Concept 2 -->
    <g class="kernel-box" style="animation-delay: 1.2s">
      <circle cx="165" cy="345" r="12" fill="#38ef7d"/>
      <text x="165" y="349" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">2</text>
      <text x="185" y="340" font-family="Arial" font-size="9" fill="#2d3748">Dual Formulation</text>
      <text x="185" y="352" font-family="Arial" font-size="8" fill="#718096">max Σα - ½ΣΣαᵢαⱼ</text>
      <text x="185" y="362" font-family="Arial" font-size="8" fill="#718096">yᵢyⱼxᵢ·xⱼ</text>
    </g>
    
    <!-- Concept 3 -->
    <g class="kernel-box" style="animation-delay: 1.3s">
      <circle cx="290" cy="345" r="12" fill="#ed8936"/>
      <text x="290" y="349" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">3</text>
      <text x="310" y="340" font-family="Arial" font-size="9" fill="#2d3748">Kernel Trick</text>
      <text x="310" y="352" font-family="Arial" font-size="8" fill="#718096">K(x,y) = φ(x)·φ(y)</text>
      <text x="310" y="362" font-family="Arial" font-size="8" fill="#718096"> Mercer's conditions</text>
    </g>
  </g>
  
  <!-- Support Vectors indicator -->
  <g class="pulse-element">
    <rect x="340" y="20" width="70" height="18" fill="#edf2f7" stroke="#cbd5e0" rx="3"/>
    <text x="375" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#4a5568">Support Vectors</text>
  </g>
</svg>