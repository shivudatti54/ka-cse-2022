<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="decision-trees-random-forests">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="50%" style="stop-color:#c8e6c9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#43a047"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#4caf50"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2e7d32; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #1b5e20; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #388e3c; }
    .node { filter: url(#shadow); }
    .tree-line { stroke: #558b2f; stroke-width: 2; stroke-dasharray: 100; animation: drawLine 1.5s ease forwards; }
    .fade-in { animation: fadeIn 1s ease forwards; }
    .slide-in { animation: slideIn 1s ease forwards; }
    .pulse { animation: pulse 2s ease infinite; }
    .section-1 { animation-delay: 0.2s; }
    .section-2 { animation-delay: 0.4s; }
    .section-3 { animation-delay: 0.6s; }
    .section-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <g data-narration="Title: Decision Trees and Random Forests - foundations of ensemble learning">
    <text x="210" y="30" text-anchor="middle" class="title slide-in">Decision Trees &amp; Random Forests</text>
    <line x1="60" y1="40" x2="360" y2="40" stroke="#81c784" stroke-width="2"/>
  </g>
  
  <!-- Main Decision Tree Structure -->
  <g data-narration="Decision Tree structure showing root node, internal decision nodes, and leaf nodes" transform="translate(30, 60)" class="fade-in">
    <!-- Tree Lines -->
    <path d="M100,50 L60,100" class="tree-line" style="animation-delay: 0.3s"/>
    <path d="M100,50 L140,100" class="tree-line" style="animation-delay: 0.5s"/>
    <path d="M60,100 L40,150" class="tree-line" style="animation-delay: 0.7s"/>
    <path d="M60,100 L80,150" class="tree-line" style="animation-delay: 0.9s"/>
    <path d="M140,100 L120,150" class="tree-line" style="animation-delay: 1.1s"/>
    <path d="M140,100 L160,150" class="tree-line" style="animation-delay: 1.3s"/>
    
    <!-- Root Node -->
    <rect x="60" y="20" width="80" height="30" rx="5" fill="url(#treeGradient)" class="node pulse"/>
    <text x="100" y="40" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="12" font-weight="bold">Root: Income</text>
    
    <!-- Internal Nodes -->
    <rect x="20" y="100" width="80" height="30" rx="5" fill="#7cb342" class="node"/>
    <text x="60" y="120" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11">Age &gt; 35?</text>
    
    <rect x="100" y="100" width="80" height="30" rx="5" fill="#7cb342" class="node"/>
    <text x="140" y="120" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11">Owns Car?</text>
    
    <!-- Leaf Nodes -->
    <rect x="0" y="150" width="80" height="35" rx="5" fill="url(#leafGradient)" class="node"/>
    <text x="40" y="167" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11" font-weight="bold">Approve</text>
    <text x="40" y="180" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">(High)</text>
    
    <rect x="80" y="150" width="80" height="35" rx="5" fill="#aed581" class="node"/>
    <text x="120" y="167" text-anchor="middle" fill="#33691e" font-family="Segoe UI" font-size="11" font-weight="bold">Deny</text>
    <text x="120" y="180" text-anchor="middle" fill="#33691e" font-family="Segoe UI" font-size="9">(Low)</text>
    
    <rect x="80" y="150" width="80" height="35" rx="5" fill="url(#leafGradient)" class="node" transform="translate(80,0)"/>
    <text x="200" y="167" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="11" font-weight="bold">Review</text>
    <text x="200" y="180" text-anchor="middle" fill="white" font-family="Segoe UI" font-size="9">(Medium)</text>
    
    <rect x="120" y="150" width="80" height="35" rx="5" fill="#aed581" class="node" transform="translate(80,0)"/>
    <text x="280" y="167" text-anchor="middle" fill="#33691e" font-family="Segoe UI" font-size="11" font-weight="bold">Approve</text>
    <text x="280" y="180" text-anchor="middle" fill="#33691e" font-family="Segoe UI" font-size="9">(High)</text>
  </g>
  
  <!-- Tree Labels -->
  <g data-narration="Labels showing tree components: Root, Internal Nodes, Leaf Nodes" class="fade-in section-2">
    <text x="20" y="230" class="label" font-weight="bold">Tree Components:</text>
    <circle cx="30" cy="248" r="6" fill="#43a047"/>
    <text x="45" y="252" class="detail">Root Node</text>
    <circle cx="30" cy="268" r="6" fill="#7cb342"/>
    <text x="45" y="272" class="detail">Internal Nodes</text>
    <circle cx="30" cy="288" r="6" fill="#81c784"/>
    <text x="45" y="292" class="detail">Leaf Nodes</text>
  </g>
  
  <!-- Random Forest Section -->
  <g data-narration="Random Forest: Ensemble of multiple decorrelated decision trees" transform="translate(250, 230)" class="fade-in section-3">
    <text x="70" y="10" text-anchor="middle" class="label" font-weight="bold">Random Forest</text>
    
    <!-- Small Tree 1 -->
    <g transform="translate(0, 20)">
      <line x1="30" y1="0" x2="15" y2="25" stroke="#558b2f" stroke-width="1.5"/>
      <line x1="30" y1="0" x2="45" y2="25" stroke="#558b2f" stroke-width="1.5"/>
      <rect x="10" y="-10" width="40" height="20" rx="3" fill="#66bb6a"/>
      <rect x="0" y="20" width="30" height="15" rx="3" fill="#81c784"/>
      <rect x="30" y="20" width="30" height="15" rx="3" fill="#aed581"/>
    </g>
    
    <!-- Small Tree 2 -->
    <g transform="translate(50, 20)">
      <line x1="30" y1="0" x2="15" y2="25" stroke="#558b2f" stroke-width="1.5"/>
      <line x1="30" y1="0" x2="45" y2="25" stroke="#558b2f" stroke-width="1.5"/>
      <rect x="10" y="-10" width="40" height="20" rx="3" fill="#66bb6a"/>
      <rect x="0" y="20" width="30" height="15" rx="3" fill="#aed581"/>
      <rect x="30" y="20" width="30" height="15" rx="3" fill="#81c784"/>
    </g>
    
    <!-- Small Tree 3 -->
    <g transform="translate(100, 20)">
      <line x1="30" y1="0" x2="15" y2="25" stroke="#558b2f" stroke-width="1.5"/>
      <line x1="30" y1="0" x2="45" y2="25" stroke="#558b2f" stroke-width="1.5"/>
      <rect x="10" y="-10" width="40" height="20" rx="3" fill="#66bb6a"/>
      <rect x="0" y="20" width="30" height="15" rx="3" fill="#81c784"/>
      <rect x="30" y="20" width="30" height="15" rx="3" fill="#aed581"/>
    </g>
    
    <!-- Voting Arrow -->
    <path d="M65,95 L65,110 L75,105" fill="none" stroke="#2e7d32" stroke-width="2"/>
    <text x="75" y="115" class="detail" fill="#2e7d32">Voting</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g data-narration="Key splitting criteria: Gini Impurity, Entropy, Information Gain" transform="translate(10, 310)" class="fade-in section-4">
    <rect x="0" y="0" width="195" height="80" rx="8" fill="white" stroke="#81c784" stroke-width="2" opacity="0.9"/>
    <text x="10" y="20" class="label" font-weight="bold">Splitting Criteria:</text>
    <text x="10" y="40" class="detail">• Gini: 1 - Σp²</text>
    <text x="10" y="55" class="detail">• Entropy: -Σp·log₂(p)</text>
    <text x="10" y="70" class="detail">• Info Gain = Parent - Child</text>
  </g>
  
  <!-- Random Forest Features Box -->
  <g data-narration="Random Forest features: Bagging, Feature Randomness, Out-of-Bag Error" transform="translate(215, 310)" class="fade-in section-4">
    <rect x="0" y="0" width="195" height="80" rx="8" fill="white" stroke="#81c784" stroke-width="2" opacity="0.9"/>
    <text x="10" y="20" class="label" font-weight="bold">Forest Features:</text>
    <text x="10" y="40" class="detail">• Bagging (Bootstrap)</text>
    <text x="10" y="55" class="detail">• √n features per split</text>
    <text x="10" y="70" class="detail">• OOB Error Estimation</text>
  </g>
  
  <!-- Applications Section -->
  <g data-narration="Industry applications: Banking, Healthcare, E-commerce" class="fade-in">
    <text x="210" y="385" text-anchor="middle" class="detail" fill="#1b5e20">Applications: Banking (Credit Scoring) • Healthcare (Diagnosis) • E-commerce (Recommendations)</text>
  </g>
</svg>