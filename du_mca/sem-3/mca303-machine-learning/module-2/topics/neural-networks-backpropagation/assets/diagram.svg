<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="neural-networks-backpropagation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5ddf2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="forwardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backwardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; opacity: 0.8; }
      50% { stroke-width: 3; opacity: 1; }
    }
    @keyframes flowRight {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes flowLeft {
      0% { stroke-dashoffset: -20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1e3a5f; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #334155; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #64748b; }
    .node { fill: #60a5fa; stroke: #3b82f6; stroke-width: 2; }
    .node-hidden { fill: #a78bfa; stroke: #8b5cf6; stroke-width: 2; }
    .node-output { fill: #34d399; stroke: #10b981; stroke-width: 2; }
    .arrow-forward { stroke: url(#forwardGrad); stroke-width: 2; fill: none; stroke-dasharray: 8,4; animation: arrowPulse 1.5s infinite, flowRight 1s linear infinite; }
    .arrow-backward { stroke: url(#backwardGrad); stroke-width: 2; fill: none; stroke-dasharray: 8,4; animation: arrowPulse 1.5s infinite, flowLeft 1s linear infinite; }
    .box { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 6; filter: url(#shadow); }
    .legend-box { fill: rgba(255,255,255,0.9); stroke: #cbd5e1; stroke-width: 1; rx: 4; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="0"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade">Neural Networks Backpropagation</text>
  
  <!-- Network Layers -->
  <g transform="translate(60, 100)">
    <!-- Input Layer -->
    <g class="anim-slide-left" style="animation-delay: 0.2s;">
      <text x="0" y="-15" class="label" font-weight="bold">Input Layer</text>
      <circle cx="0" cy="20" r="12" class="node" data-narration="Input features x1, x2, ... xn fed into the network"/>
      <circle cx="0" cy="55" r="12" class="node" data-narration="Each node represents one input feature"/>
      <circle cx="0" cy="90" r="12" class="node" data-narration="Input values are normalized and preprocessed"/>
    </g>
    
    <!-- Hidden Layer -->
    <g transform="translate(120, 0)" class="anim-fade" style="animation-delay: 0.4s;">
      <text x="0" y="-15" class="label" font-weight="bold">Hidden Layer</text>
      <circle cx="0" cy="20" r="14" class="node-hidden" data-narration="Hidden neurons apply weighted sum and activation"/>
      <circle cx="0" cy="55" r="14" class="node-hidden" data-narration="ReLU or Sigmoid activation functions applied"/>
      <circle cx="0" cy="90" r="14" class="node-hidden" data-narration="Multiple hidden layers enable deep learning"/>
    </g>
    
    <!-- Output Layer -->
    <g transform="translate(240, 0)" class="anim-slide-right" style="animation-delay: 0.6s;">
      <text x="0" y="-15" class="label" font-weight="bold">Output Layer</text>
      <circle cx="0" cy="20" r="14" class="node-output" data-narration="Output predictions generated from hidden features"/>
      <circle cx="0" cy="55" r="14" class="node-output" data-narration="Softmax for classification, linear for regression"/>
    </g>
    
    <!-- Forward Arrows (Blue) -->
    <g class="anim-fade" style="animation-delay: 0.8s;">
      <path d="M 20 20 Q 70 20 110 20" class="arrow-forward" data-narration="Forward pass: inputs propagate through network"/>
      <path d="M 20 55 Q 70 55 110 55" class="arrow-forward" data-narration="Each layer computes: z = W*a + b"/>
      <path d="M 20 90 Q 70 90 110 90" class="arrow-forward" data-narration="Activation function: a = σ(z)"/>
      
      <path d="M 140 20 Q 190 20 230 20" class="arrow-forward" data-narration="Hidden to output layer transformation"/>
      <path d="M 140 55 Q 190 55 230 55" class="arrow-forward" data-narration="Weights connect all neurons between layers"/>
      <path d="M 140 90 Q 190 90 230 90" class="arrow-forward" data-narration="Output computed from final layer activation"/>
    </g>
    
    <!-- Backward Arrows (Red) - appear after forward -->
    <g class="anim-fade" style="animation-delay: 1.2s; opacity: 0;">
      <path d="M 230 27 Q 190 27 140 27" class="arrow-backward" data-narration="Backward pass: gradients flow from output to input"/>
      <path d="M 230 62 Q 190 62 140 62" class="arrow-backward" data-narration="Chain rule computes ∂L/∂W for each weight"/>
      <path d="M 230 97 Q 190 97 140 97" class="arrow-backward" data-narration="Gradient indicates how to adjust weights"/>
      
      <path d="M 110 27 Q 70 27 20 27" class="arrow-backward" data-narration="Gradients propagate through all layers"/>
      <path d="M 110 62 Q 70 62 20 62" class="arrow-backward" data-narration="Weight update: W = W - α * ∂L/∂W"/>
      <path d="M 110 97 Q 70 97 20 97" class="arrow-backward" data-narration="Learning rate α controls update magnitude"/>
    </g>
  </g>
  
  <!-- Key Concepts Box 1 -->
  <g transform="translate(15, 280)" class="anim-fade" style="animation-delay: 0.5s;">
    <rect x="0" y="0" width="125" height="55" class="box"/>
    <text x="10" y="18" class="label" font-weight="bold" font-size="12">Forward Pass</text>
    <text x="10" y="35" class="detail">z = Wa + b</text>
    <text x="10" y="48" class="detail">a = σ(z)</text>
  </g>
  
  <!-- Key Concepts Box 2 -->
  <g transform="translate(150, 280)" class="anim-fade" style="animation-delay: 0.7s;">
    <rect x="0" y="0" width="125" height="55" class="box"/>
    <text x="10" y="18" class="label" font-weight="bold" font-size="12">Backward Pass</text>
    <text x="10" y="35" class="detail">∂L/∂W = δ · a</text>
    <text x="10" y="48" class="detail">Chain rule</text>
  </g>
  
  <!-- Key Concepts Box 3 -->
  <g transform="translate(285, 280)" class="anim-fade" style="animation-delay: 0.9s;">
    <rect x="0" y="0" width="120" height="55" class="box"/>
    <text x="10" y="18" class="label" font-weight="bold" font-size="12">Weight Update</text>
    <text x="10" y="35" class="detail">W := W - α∂L/∂W</text>
    <text x="10" y="48" class="detail">Gradient Descent</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 360)" class="anim-fade" style="animation-delay: 1s;">
    <rect x="0" y="0" width="180" height="30" class="legend-box"/>
    <line x1="15" y1="15" x2="45" y2="15" stroke="#3b82f6" stroke-width="3"/>
    <text x="55" y="19" class="detail" font-size="11">Forward (Input→Output)</text>
    <line x1="130" y1="15" x2="160" y2="15" stroke="#ef4444" stroke-width="3"/>
    <text x="168" y="19" class="detail" font-size="11">Backward</text>
  </g>
  
  <!-- Chain Rule Formula -->
  <g transform="translate(210, 355)" class="anim-fade" style="animation-delay: 1.2s;">
    <text x="0" y="12" class="detail" font-style="italic" fill="#475569">∂L/∂W = (∂L/∂a) ⊙ σ'(z) · a</text>
  </g>
</svg>