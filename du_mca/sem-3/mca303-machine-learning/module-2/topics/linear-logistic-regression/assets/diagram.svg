<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="linear-logistic-regression">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="linearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="logisticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bbf7d0"/>
      <stop offset="100%" style="stop-color:#86efac"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1e293b; }
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #334155; }
    .detail { font-family: 'Consolas', monospace; font-size: 11px; fill: #475569; }
    .formula { font-family: 'Consolas', monospace; font-size: 12px; fill: #1e293b; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; font-weight: bold; fill: #1e293b; }
    .panel { animation: slideInLeft 0.8s ease-out forwards; }
    .panel-right { animation: slideInRight 0.8s ease-out forwards; }
    .panel-bottom { animation: slideInUp 0.8s ease-out forwards; }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .point { animation: pulse 2s infinite; transform-origin: center; transform-box: fill-box; }
    .fade-element { animation: fadeIn 1.2s ease-out forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title title-anim">Linear vs Logistic Regression</text>
  
  <!-- Linear Regression Panel -->
  <g class="panel" data-narration="Linear Regression panel showing scatter plot with best-fit line for continuous prediction">
    <rect x="15" y="45" width="185" height="160" rx="8" fill="url(#linearGrad)" filter="url(#shadow)"/>
    <text x="25" y="65" class="section-title">Linear Regression</text>
    <text x="25" y="82" class="detail">Continuous Output</text>
    
    <!-- Scatter plot -->
    <g transform="translate(25, 95)">
      <line x1="0" y1="100" x2="160" y2="100" stroke="#64748b" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="100" stroke="#64748b" stroke-width="1"/>
      <!-- Data points -->
      <circle cx="20" cy="85" r="4" fill="#3b82f6" class="point"/>
      <circle cx="45" cy="70" r="4" fill="#3b82f6" class="point"/>
      <circle cx="70" cy="60" r="4" fill="#3b82f6" class="point"/>
      <circle cx="95" cy="45" r="4" fill="#3b82f6" class="point"/>
      <circle cx="120" cy="35" r="4" fill="#3b82f6" class="point"/>
      <circle cx="145" cy="20" r="4" fill="#3b82f6" class="point"/>
      <!-- Regression line -->
      <line x1="10" y1="90" x2="155" y2="15" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="5,3"/>
    </g>
    
    <!-- Formula box -->
    <rect x="25" y="145" width="165" height="45" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
    <text x="35" y="162" class="formula">hθ(x) = θ₀ + θ₁x</text>
    <text x="35" y="178" class="detail">MSE Cost Function</text>
  </g>
  
  <!-- Logistic Regression Panel -->
  <g class="panel-right" data-narration="Logistic Regression panel showing S-curve sigmoid function for binary classification">
    <rect x="220" y="45" width="185" height="160" rx="8" fill="url(#logisticGrad)" filter="url(#shadow)"/>
    <text x="230" y="65" class="section-title">Logistic Regression</text>
    <text x="230" y="82" class="detail">Binary Classification</text>
    
    <!-- Sigmoid curve -->
    <g transform="translate(230, 95)">
      <line x1="0" y1="100" x2="160" y2="100" stroke="#64748b" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="100" stroke="#64748b" stroke-width="1"/>
      <!-- S-curve -->
      <path d="M0,100 Q30,100 60,85 T120,15 T160,5" stroke="#16a34a" stroke-width="2.5" fill="none"/>
      <!-- Decision boundary -->
      <line x1="80" y1="0" x2="80" y2="100" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="82" y="95" class="detail" fill="#dc2626">threshold</text>
      <!-- Class points -->
      <circle cx="30" cy="92" r="4" fill="#16a34a" class="point"/>
      <circle cx="50" cy="88" r="4" fill="#16a34a" class="point"/>
      <circle cx="130" cy="12" r="4" fill="#16a34a" class="point"/>
      <circle cx="145" cy="8" r="4" fill="#16a34a" class="point"/>
    </g>
    
    <!-- Formula box -->
    <rect x="230" y="145" width="165" height="45" rx="4" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
    <text x="240" y="162" class="formula">σ(z) = 1/(1+e⁻ᶻ)</text>
    <text x="240" y="178" class="detail">Sigmoid Function</text>
  </g>
  
  <!-- Bottom Section - Comparison -->
  <g class="panel-bottom" data-narration="Comparison section showing evaluation metrics for both regression types">
    <rect x="15" y="220" width="390" height="165" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
    <text x="25" y="245" class="section-title">Model Evaluation &amp; Key Differences</text>
    
    <!-- Linear metrics -->
    <g transform="translate(25, 260)">
      <rect x="0" y="0" width="110" height="55" rx="4" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="8" y="18" class="label" font-size="12" font-weight="bold">Linear</text>
      <text x="8" y="35" class="detail">R² Score, RMSE</text>
      <text x="8" y="48" class="detail">MSE Loss</text>
    </g>
    
    <!-- Arrow -->
    <path d="M145,285 L165,285" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
      </marker>
    </defs>
    
    <!-- Logistic metrics -->
    <g transform="translate(175, 260)">
      <rect x="0" y="0" width="110" height="55" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="8" y="18" class="label" font-size="12" font-weight="bold">Logistic</text>
      <text x="8" y="35" class="detail">Confusion Matrix</text>
      <text x="8" y="48" class="detail">ROC-AUC</text>
    </g>
    
    <!-- Key difference box -->
    <g transform="translate(295, 260)">
      <rect x="0" y="0" width="100" height="55" rx="4" fill="#fef3c7" stroke="#fcd34d"/>
      <text x="8" y="18" class="label" font-size="11" font-weight="bold">Output Type</text>
      <text x="8" y="33" class="detail">Continuous</text>
      <text x="8" y="46" class="detail">Probability</text>
    </g>
    
    <!-- Applications -->
    <g transform="translate(25, 325)">
      <circle cx="8" cy="8" r="5" fill="#3b82f6"/>
      <text x="22" y="12" class="detail">Sales Forecasting</text>
      <circle cx="110" cy="8" r="5" fill="#16a34a"/>
      <text x="124" y="12" class="detail">Churn Prediction</text>
      <circle cx="210" cy="8" r="5" fill="#f59e0b"/>
      <text x="224" y="12" class="detail">Fraud Detection</text>
      <circle cx="320" cy="8" r="5" fill="#8b5cf6"/>
      <text x="334" y="12" class="detail">Disease Diagnosis</text>
    </g>
  </g>
  
  <!-- Gradient Descent Arrow -->
  <g class="fade-element" style="animation-delay: 0.5s" data-narration="Arrow showing gradient descent optimization process">
    <path d="M200,120 Q210,110 220,120" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
    <defs>
      <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
      </marker>
    </defs>
    <text x="175" y="115" class="detail" fill="#6366f1">Gradient Descent</text>
  </g>
</svg>