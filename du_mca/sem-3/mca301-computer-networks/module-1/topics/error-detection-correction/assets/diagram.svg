<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="error-detection-correction">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dff0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 2px #4a90d9); }
      50% { filter: drop-shadow(0 0 8px #4a90d9); }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.35s forwards; opacity: 0; }
    .box3 { animation: slideInUp 0.6s ease-out 0.5s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.65s forwards; opacity: 0; }
    .parity-bit { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .data-bit { animation: glow 3s ease-in-out infinite; }
    .arrow { animation: fadeIn 0.5s ease-out 0.8s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c5282" class="title">Error Detection &amp; Correction</text>
  
  <!-- Box 1: Parity Checking -->
  <g class="box1" filter="url(#shadow)">
    <rect x="10" y="50" width="120" height="70" fill="#fff" rx="6" stroke="#68d391" stroke-width="2"/>
    <text x="70" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2f855a">Parity Check</text>
    <text x="70" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a5568">Single &amp; 2D</text>
    <text x="70" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#718096">Detects odd errors</text>
  </g>
  
  <!-- Box 2: CRC -->
  <g class="box2" filter="url(#shadow)">
    <rect x="145" y="50" width="120" height="70" fill="#fff" rx="6" stroke="#f6ad55" stroke-width="2"/>
    <text x="205" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#c05621">CRC</text>
    <text x="205" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a5568">Polynomial Division</text>
    <text x="205" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#718096">32-bit Ethernet</text>
  </g>
  
  <!-- Box 3: Hamming Code (Key Diagram) -->
  <g class="box3" filter="url(#shadow)">
    <rect x="10" y="135" width="255" height="100" fill="#fff" rx="6" stroke="#667eea" stroke-width="2"/>
    <text x="137" y="155" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4c51bf">Hamming Code (7,4)</text>
    
    <!-- Bit positions -->
    <g transform="translate(25, 170)">
      <!-- Position 1: P1 -->
      <circle cx="15" cy="20" r="14" fill="#fc8181" class="parity-bit"/>
      <text x="15" y="24" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">P1</text>
      
      <!-- Position 2: P2 -->
      <circle cx="55" cy="20" r="14" fill="#fc8181" class="parity-bit"/>
      <text x="55" y="24" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">P2</text>
      
      <!-- Position 3: D3 -->
      <circle cx="95" cy="20" r="14" fill="#90cdf4" class="data-bit"/>
      <text x="95" y="24" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">D3</text>
      
      <!-- Position 4: P4 -->
      <circle cx="135" cy="20" r="14" fill="#fc8181" class="parity-bit"/>
      <text x="135" y="24" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">P4</text>
      
      <!-- Position 5: D5 -->
      <circle cx="175" cy="20" r="14" fill="#90cdf4" class="data-bit"/>
      <text x="175" y="24" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">D5</text>
      
      <!-- Position 6: D6 -->
      <circle cx="215" cy="20" r="14" fill="#90cdf4" class="data-bit"/>
      <text x="215" y="24" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">D6</text>
      
      <!-- Position 7: D7 -->
      <circle cx="255" cy="20" r="14" fill="#90cdf4" class="data-bit"/>
      <text x="255" y="24" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">D7</text>
    </g>
    
    <!-- Legend -->
    <rect x="50" y="195" width="12" height="12" fill="#fc8181" rx="2"/>
    <text x="68" y="205" font-family="Arial" font-size="10" fill="#4a5568">Parity</text>
    <rect x="110" y="195" width="12" height="12" fill="#90cdf4" rx="2"/>
    <text x="128" y="205" font-family="Arial" font-size="10" fill="#4a5568">Data</text>
    
    <!-- Arrow to show relationships -->
    <path d="M 60 185 Q 90 165 100 170" fill="none" stroke="#667eea" stroke-width="1.5" stroke-dasharray="3,2" class="arrow"/>
    <path d="M 180 185 Q 170 165 160 170" fill="none" stroke="#667eea" stroke-width="1.5" stroke-dasharray="3,2" class="arrow"/>
  </g>
  
  <!-- Box 4: ARQ -->
  <g class="box4" filter="url(#shadow)">
    <rect x="280" y="50" width="130" height="70" fill="#fff" rx="6" stroke="#b794f4" stroke-width="2"/>
    <text x="345" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6b46c1">ARQ</text>
    <text x="345" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#4a5568">Stop &amp; Wait</text>
    <text x="345" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#718096">Go-Back-N</text>
  </g>
  
  <!-- Connection arrows -->
  <path d="M 130 85 L 145 85" stroke="#4a5568" stroke-width="1.5" class="arrow"/>
  <path d="M 265 85 L 280 85" stroke="#4a5568" stroke-width="1.5" class="arrow"/>
  
  <!-- Error Type Indicators -->
  <g class="box1" transform="translate(10, 250)">
    <rect x="0" y="0" width="130" height="60" fill="#fff5f5" rx="5" stroke="#feb2b2" stroke-width="1.5"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c53030">Single-bit Error</text>
    <text x="65" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a5568">Correctable</text>
  </g>
  
  <g class="box2" transform="translate(145, 250)">
    <rect x="0" y="0" width="130" height="60" fill="#fffaf0" rx="5" stroke="#fbd38d" stroke-width="1.5"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c05621">Burst Error</text>
    <text x="65" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a5568">Detected by CRC</text>
  </g>
  
  <g class="box3" transform="translate(280, 250)">
    <rect x="0" y="0" width="130" height="60" fill="#f0fff4" rx="5" stroke="#9ae6b4" stroke-width="1.5"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2f855a">No Error</text>
    <text x="65" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a5568">Data Valid</text>
  </g>
  
  <!-- Correction capability note -->
  <g class="box4" transform="translate(10, 320)">
    <rect x="0" y="0" width="400" height="50" fill="#ebf8ff" rx="5" stroke="#90cdf4" stroke-width="1.5"/>
    <text x="200" y="18" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#2b6cb0">Hamming Distance: d = 3</text>
    <text x="200" y="35" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a5568">Can detect 2-bit errors and correct 1-bit error</text>
  </g>
  
  <!-- Data narration attributes for accessibility -->
  <title>Error Detection and Correction Overview</title>
  <desc data-narration="title">Educational diagram showing four main error detection and correction methods: Parity Checking, CRC, Hamming Code, and ARQ protocols</desc>
</svg>