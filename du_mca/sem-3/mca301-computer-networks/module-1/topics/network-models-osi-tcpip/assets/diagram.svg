<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-models-osi-tcpip">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#f0e8f8"/>
    </linearGradient>
    <linearGradient id="osiGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="100%" style="stop-color:#7ec8e3"/>
    </linearGradient>
    <linearGradient id="tcpGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a5a5"/>
      <stop offset="100%" style="stop-color:#c48888"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
    .label-bold { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 9px; fill: #555; }
    .section-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #34495e; }
    .box { rx: 5; ry: 5; }
    .osi-layer { animation: slideInLeft 0.5s ease-out forwards; opacity: 0; }
    .tcp-layer { animation: slideInRight 0.5s ease-out forwards; opacity: 0; }
    .arrow-line { stroke: #888; stroke-width: 1.5; stroke-dasharray: 4,3; animation: drawArrow 1s ease-out forwards; }
    .title-anim { animation: fadeIn 0.6s ease-out forwards; }
    .box-anim { animation: slideInUp 0.5s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="25" text-anchor="middle" class="title title-anim">Network Models: OSI vs TCP/IP</text>
  
  <!-- OSI Model Section -->
  <g class="box-anim" style="animation-delay: 0.2s" data-narration="The OSI Model is a 7-layer theoretical framework developed by ISO">
    <rect x="20" y="45" width="130" height="290" fill="#fff" stroke="#7ec8e3" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="85" y="62" text-anchor="middle" class="section-title">OSI Model</text>
    <line x1="25" y1="70" x2="145" y2="70" stroke="#7ec8e3" stroke-width="1"/>
    
    <!-- OSI Layers -->
    <g class="osi-layer" style="animation-delay: 0.4s">
      <rect x="25" y="75" width="120" height="35" fill="#fff5f5" stroke="#e57373" stroke-width="1"/>
      <text x="85" y="88" text-anchor="middle" class="label-bold">7. Application</text>
      <text x="85" y="100" text-anchor="middle" class="detail">HTTP, SMTP</text>
    </g>
    <g class="osi-layer" style="animation-delay: 0.5s">
      <rect x="25" y="110" width="120" height="35" fill="#fff5e6" stroke="#ffb74d" stroke-width="1"/>
      <text x="85" y="123" text-anchor="middle" class="label-bold">6. Presentation</text>
      <text x="85" y="135" text-anchor="middle" class="detail">SSL/TLS, JPEG</text>
    </g>
    <g class="osi-layer" style="animation-delay: 0.6s">
      <rect x="25" y="145" width="120" height="35" fill="#fffde7" stroke="#ffd54f" stroke-width="1"/>
      <text x="85" y="158" text-anchor="middle" class="label-bold">5. Session</text>
      <text x="85" y="170" text-anchor="middle" class="detail">RPC, NetBIOS</text>
    </g>
    <g class="osi-layer" style="animation-delay: 0.7s">
      <rect x="25" y="180" width="120" height="35" fill="#f1f8e9" stroke="#81c784" stroke-width="1"/>
      <text x="85" y="193" text-anchor="middle" class="label-bold">4. Transport</text>
      <text x="85" y="205" text-anchor="middle" class="detail">TCP, UDP</text>
    </g>
    <g class="osi-layer" style="animation-delay: 0.8s">
      <rect x="25" y="215" width="120" height="35" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1"/>
      <text x="85" y="228" text-anchor="middle" class="label-bold">3. Network</text>
      <text x="85" y="240" text-anchor="middle" class="detail">IP, ICMP</text>
    </g>
    <g class="osi-layer" style="animation-delay: 0.9s">
      <rect x="25" y="250" width="120" height="35" fill="#f3e5f5" stroke="#ba68c8" stroke-width="1"/>
      <text x="85" y="263" text-anchor="middle" class="label-bold">2. Data Link</text>
      <text x="85" y="275" text-anchor="middle" class="detail">MAC, Switches</text>
    </g>
    <g class="osi-layer" style="animation-delay: 1.0s">
      <rect x="25" y="285" width="120" height="35" fill="#e0f7fa" stroke="#4dd0e1" stroke-width="1"/>
      <text x="85" y="298" text-anchor="middle" class="label-bold">1. Physical</text>
      <text x="85" y="310" text-anchor="middle" class="detail">Ethernet, USB</text>
    </g>
  </g>
  
  <!-- TCP/IP Model Section -->
  <g class="box-anim" style="animation-delay: 0.3s" data-narration="The TCP/IP Model is a practical 4-layer implementation used in the internet">
    <rect x="270" y="45" width="130" height="290" fill="#fff" stroke="#c48888" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="335" y="62" text-anchor="middle" class="section-title">TCP/IP Model</text>
    <line x1="275" y1="70" x2="395" y2="70" stroke="#c48888" stroke-width="1"/>
    
    <!-- TCP/IP Layers -->
    <g class="tcp-layer" style="animation-delay: 0.4s">
      <rect x="275" y="75" width="120" height="70" fill="#fff5f5" stroke="#e57373" stroke-width="1"/>
      <text x="335" y="95" text-anchor="middle" class="label-bold">4. Application</text>
      <text x="335" y="110" text-anchor="middle" class="detail">HTTP, SMTP</text>
      <text x="335" y="122" text-anchor="middle" class="detail">FTP, DNS</text>
      <text x="335" y="134" text-anchor="middle" class="detail" font-style="italic">(OSI 5+6+7)</text>
    </g>
    <g class="tcp-layer" style="animation-delay: 0.5s">
      <rect x="275" y="145" width="120" height="70" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1"/>
      <text x="335" y="165" text-anchor="middle" class="label-bold">3. Transport</text>
      <text x="335" y="180" text-anchor="middle" class="detail">TCP, UDP</text>
      <text x="335" y="192" text-anchor="middle" class="detail" font-style="italic">(OSI 4)</text>
    </g>
    <g class="tcp-layer" style="animation-delay: 0.6s">
      <rect x="275" y="215" width="120" height="70" fill="#f3e5f5" stroke="#ba68c8" stroke-width="1"/>
      <text x="335" y="235" text-anchor="middle" class="label-bold">2. Internet</text>
      <text x="335" y="250" text-anchor="middle" class="detail">IP, ARP, ICMP</text>
      <text x="335" y="262" text-anchor="middle" class="detail" font-style="italic">(OSI 3)</text>
    </g>
    <g class="tcp-layer" style="animation-delay: 0.7s">
      <rect x="275" y="285" width="120" height="35" fill="#e0f7fa" stroke="#4dd0e1" stroke-width="1"/>
      <text x="335" y="298" text-anchor="middle" class="label-bold">1. Network Access</text>
      <text x="335" y="310" text-anchor="middle" class="detail" font-style="italic">(OSI 1+2)</text>
    </g>
  </g>
  
  <!-- Mapping Arrows -->
  <g data-narration="Arrows show how OSI layers map to TCP/IP layers">
    <!-- Arrow from Application (7) to Application (4) -->
    <line x1="145" y1="90" x2="270" y2="105" class="arrow-line" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="268,100 275,105 268,110" fill="#666"/>
    
    <!-- Arrow from Transport (4) to Transport (3) -->
    <line x1="145" y1="195" x2="270" y2="175" class="arrow-line" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="268,170 275,175 268,180" fill="#666"/>
    
    <!-- Arrow from Network (3) to Internet (2) -->
    <line x1="145" y1="230" x2="270" y2="240" class="arrow-line" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="268,235 275,240 268,245" fill="#666"/>
    
    <!-- Arrow from Physical+DataLink (1+2) to Network Access (1) -->
    <line x1="145" y1="300" x2="270" y2="300" class="arrow-line" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="268,295 275,300 268,305" fill="#666"/>
  </g>
  
  <!-- Key Concept Box -->
  <g class="box-anim" style="animation-delay: 1.1s" data-narration="Key differences between the models">
    <rect x="160" y="345" width="100" height="40" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
    <text x="210" y="360" text-anchor="middle" class="label-bold" font-size="10">Key Difference</text>
    <text x="210" y="374" text-anchor="middle" class="detail">OSI: Theoretical</text>
    <text x="210" y="382" text-anchor="middle" class="detail">TCP/IP: Practical</text>
  </g>
  
  <!-- Bottom labels -->
  <g class="box-anim" style="animation-delay: 1.2s">
    <text x="85" y="380" text-anchor="middle" class="label" font-size="9" fill="#7ec8e3">7 Layers</text>
    <text x="335" y="380" text-anchor="middle" class="label" font-size="9" fill="#c48888">4 Layers</text>
  </g>
</svg>