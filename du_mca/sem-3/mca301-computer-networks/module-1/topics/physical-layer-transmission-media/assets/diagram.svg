<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="physical-layer-transmission-media">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="copperGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b87333" />
      <stop offset="50%" style="stop-color:#da8a47" />
      <stop offset="100%" style="stop-color:#b87333" />
    </linearGradient>
    <linearGradient id="fiberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#87ceeb" />
      <stop offset="30%" style="stop-color:#00ced1" />
      <stop offset="70%" style="stop-color:#00ced1" />
      <stop offset="100%" style="stop-color:#87ceeb" />
    </linearGradient>
    <linearGradient id="coaxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a4a4a" />
      <stop offset="20%" style="stop-color:#6a6a6a" />
      <stop offset="50%" style="stop-color:#8a8a8a" />
      <stop offset="80%" style="stop-color:#6a6a6a" />
      <stop offset="100%" style="stop-color:#4a4a4a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes wave {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .section { animation: fadeIn 0.6s ease-out; animation-fill-mode: both; }
    .section1 { animation-delay: 0.2s; }
    .section2 { animation-delay: 0.4s; }
    .section3 { animation-delay: 0.6s; }
    .section4 { animation-delay: 0.8s; }
    .label { animation: slideIn 0.5s ease-out; animation-fill-mode: both; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .wireless-wave {
      stroke-dasharray: 10, 5;
      animation: wave 1s linear infinite;
    }
    text { font-family: Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c5282" class="title">Physical Layer Transmission Media</text>
  <line x1="40" y1="38" x2="380" y2="38" stroke="#4a90d9" stroke-width="2" class="title"/>
  
  <!-- Section 1: Twisted Pair (Top Left) -->
  <g class="section section1" data-narration="Twisted Pair Cables: Copper conductors twisted together to reduce EMI. UTP is common for Ethernet; STP adds foil shielding for industrial use.">
    <rect x="20" y="55" width="180" height="150" fill="#fff" stroke="#cbd5e0" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="30" y="75" font-size="14" font-weight="bold" fill="#2d3748">Twisted Pair</text>
    <!-- Cross-section view -->
    <circle cx="65" cy="125" r="25" fill="#f7fafc" stroke="#a0aec0" stroke-width="2"/>
    <circle cx="65" cy="125" r="8" fill="url(#copperGrad)"/>
    <circle cx="65" cy="125" r="3" fill="#8b4513"/>
    <text x="50" y="160" font-size="10" fill="#718096">Copper Conductor</text>
    <circle cx="110" cy="125" r="8" fill="url(#copperGrad)"/>
    <circle cx="110" cy="125" r="3" fill="#8b4513"/>
    <text x="100" y="160" font-size="10" fill="#718096">Twisted Pair</text>
    <!-- UTP Label -->
    <rect x="145" y="110" width="40" height="18" fill="#68d391" rx="3"/>
    <text x="165" y="123" text-anchor="middle" font-size="9" fill="#22543d" font-weight="bold">UTP</text>
    <!-- STP Label -->
    <rect x="145" y="132" width="40" height="18" fill="#fc8181" rx="3"/>
    <text x="165" y="145" text-anchor="middle" font-size="9" fill="#742a2a" font-weight="bold">STP</text>
    <text x="30" y="190" font-size="10" fill="#4a5568">Cat 6A: 10Gbps/100m</text>
  </g>
  
  <!-- Section 2: Coaxial Cable (Top Right) -->
  <g class="section section2" data-narration="Coaxial Cable: Central copper conductor with shielding. RG-6 used for cable TV at 550 MHz. 50Ω for data, 75Ω for video.">
    <rect x="220" y="55" width="180" height="150" fill="#fff" stroke="#cbd5e0" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="230" y="75" font-size="14" font-weight="bold" fill="#2d3748">Coaxial Cable</text>
    <!-- Cross-section -->
    <ellipse cx="310" cy="120" rx="40" ry="15" fill="#e2e8f0" stroke="#a0aec0" stroke-width="2"/>
    <ellipse cx="310" cy="120" rx="25" ry="9" fill="url(#copperGrad)"/>
    <ellipse cx="310" cy="120" rx="8" ry="3" fill="#8b4513"/>
    <text x="310" y="155" text-anchor="middle" font-size="10" fill="#718096">Center Conductor</text>
    <rect x="270" y="170" width="80" height="16" fill="#fc8181" rx="3"/>
    <text x="310" y="182" text-anchor="middle" font-size="9" fill="#742a2a" font-weight="bold">Shielded</text>
    <text x="230" y="190" font-size="10" fill="#4a5568">RG-6: 75Ω, 550 MHz</text>
  </g>
  
  <!-- Section 3: Fiber Optics (Bottom Left) -->
  <g class="section section3" data-narration="Fiber Optics: Light-based transmission via total internal reflection. Single-mode (9μm) for long haul; Multi-mode (50-62.5μm) for shorter distances.">
    <rect x="20" y="220" width="180" height="150" fill="#fff" stroke="#cbd5e0" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="30" y="240" font-size="14" font-weight="bold" fill="#2d3748">Fiber Optics</text>
    <!-- Fiber cross-section -->
    <ellipse cx="70" cy="300" rx="35" ry="12" fill="url(#fiberGrad)" opacity="0.6"/>
    <ellipse cx="70" cy="300" rx="20" ry="7" fill="#00ced1" opacity="0.8"/>
    <line x1="50" y1="300" x2="90" y2="300" stroke="#fff" stroke-width="2" stroke-dasharray="4,2" class="pulse"/>
    <text x="70" y="325" text-anchor="middle" font-size="10" fill="#2c5282">Core/Cladding</text>
    <!-- Labels -->
    <rect x="115" y="280" width="55" height="16" fill="#63b3ed" rx="3"/>
    <text x="142" y="292" text-anchor="middle" font-size="9" fill="#1a365d" font-weight="bold">Single-Mode</text>
    <rect x="115" y="300" width="55" height="16" fill="#f687b3" rx="3"/>
    <text x="142" y="312" text-anchor="middle" font-size="9" fill="#702459" font-weight="bold">Multi-Mode</text>
    <text x="30" y="355" font-size="10" fill="#4a5568">&lt;0.4 dB/km loss</text>
  </g>
  
  <!-- Section 4: Wireless Media (Bottom Right) -->
  <g class="section section4" data-narration="Wireless Media: Unguided transmission via radio waves, microwaves, and satellites. Wi-Fi 6 uses 2.4/5 GHz; 5G NR FR2 uses 24-52 GHz.">
    <rect x="220" y="220" width="180" height="150" fill="#fff" stroke="#cbd5e0" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="230" y="240" font-size="14" font-weight="bold" fill="#2d3748">Wireless Media</text>
    <!-- Radio waves representation -->
    <path d="M260 280 Q270 265 280 280 Q290 295 300 280 Q310 265 320 280" fill="none" stroke="#805ad5" stroke-width="2" class="wireless-wave"/>
    <path d="M260 295 Q270 280 280 295 Q290 310 300 295 Q310 280 320 295" fill="none" stroke="#805ad5" stroke-width="2" class="wireless-wave" style="animation-delay: 0.3s"/>
    <!-- Antenna icon -->
    <line x1="355" y1="260" x2="355" y2="290" stroke="#4a5568" stroke-width="2"/>
    <line x1="345" y1="270" x2="365" y2="270" stroke="#4a5568" stroke-width="2"/>
    <line x1="350" y1="275" x2="360" y2="275" stroke="#4a5568" stroke-width="2"/>
    <circle cx="355" cy="260" r="3" fill="#4a5568"/>
    <text x="310" y="320" font-size="10" fill="#718096">Wi-Fi 6</text>
    <!-- Labels -->
    <rect x="260" y="330" width="45" height="14" fill="#f6ad55" rx="3"/>
    <text x="282" y="341" text-anchor="middle" font-size="8" fill="#744210" font-weight="bold">2.4/5 GHz</text>
    <rect x="310" y="330" width="45" height="14" fill="#f6ad55" rx="3"/>
    <text x="332" y="341" text-anchor="middle" font-size="8" fill="#744210" font-weight="bold">5G FR2</text>
  </g>
  
  <!-- Key Concept Box -->
  <g class="label">
    <rect x="130" y="375" width="160" height="20" fill="#feebc8" stroke="#dd6b20" stroke-width="1" rx="4"/>
    <text x="210" y="389" text-anchor="middle" font-size="11" fill="#c05621" font-weight="bold">C = B × log₂(1+S/N)</text>
  </g>
  
  <!-- Connection Arrows -->
  <g stroke="#4a90d9" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M200 130 L220 130" marker-end="url(#arrow)"/>
    <path d="M200 290 L220 290"/>
    <path d="M110 205 L110 220"/>
    <path d="M310 205 L310 220"/>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="#4a90d9"/>
    </marker>
  </defs>
</svg>