<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="wireless-networks-mobile-ip">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c5ddf0"/>
    </linearGradient>
    <linearGradient id="homeNetGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95c9b3"/>
    </linearGradient>
    <linearGradient id="foreignNetGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4e8"/>
      <stop offset="100%" style="stop-color:#b8a5d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5a7a9a"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6bae"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveMN {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(140px, 0); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c4a6e; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .concept-box { rx: 8; ry: 8; }
    .section-1 { animation: fadeIn 0.8s ease-out forwards; }
    .section-2 { animation: slideInLeft 0.8s ease-out 0.3s forwards; opacity: 0; }
    .section-3 { animation: slideInRight 0.8s ease-out 0.5s forwards; opacity: 0; }
    .section-4 { animation: fadeIn 0.6s ease-out 0.7s forwards; opacity: 0; }
    .mn-icon { animation: pulse 2s ease-in-out infinite; }
    .tunnel-path { stroke-dasharray: 8,4; animation: dash 20s linear infinite; }
    @keyframes dash {
      to { stroke-dashoffset: -240; }
    }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Wireless Networks: Mobile IP</text>
  
  <!-- Home Network Section -->
  <g class="section-2" data-narration="The Home Network is the original network where the Mobile Node has its permanent home address. The Home Agent (HA) is a router that maintains the MN's location information.">
    <rect x="20" y="60" width="150" height="140" fill="url(#homeNetGradient)" rx="10" filter="url(#shadow)"/>
    <text x="95" y="85" text-anchor="middle" class="label">Home Network</text>
    <rect x="40" y="100" width="110" height="85" fill="#fff" rx="5" opacity="0.7"/>
    <!-- Home Agent Icon -->
    <rect x="60" y="115" width="70" height="35" fill="#6ba3a3" rx="4"/>
    <text x="95" y="130" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Home Agent</text>
    <text x="95" y="148" text-anchor="middle" fill="#fff" font-size="10">(HA)</text>
    <!-- Home Address -->
    <text x="95" y="175" text-anchor="middle" class="detail">Home Address: 192.168.1.50</text>
  </g>
  
  <!-- Foreign Network Section -->
  <g class="section-3" data-narration="The Foreign Network is a visited network where the Mobile Node temporarily attaches. The Foreign Agent (FA) assigns a Care-of Address (CoA) and helps route packets to the MN.">
    <rect x="250" y="60" width="150" height="140" fill="url(#foreignNetGradient)" rx="10" filter="url(#shadow)"/>
    <text x="325" y="85" text-anchor="middle" class="label">Foreign Network</text>
    <rect x="270" y="100" width="110" height="85" fill="#fff" rx="5" opacity="0.7"/>
    <!-- Foreign Agent Icon -->
    <rect x="290" y="115" width="70" height="35" fill="#8b6bae" rx="4"/>
    <text x="325" y="130" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Foreign Agent</text>
    <text x="325" y="148" text-anchor="middle" fill="#fff" font-size="10">(FA)</text>
    <!-- Care-of Address -->
    <text x="325" y="175" text-anchor="middle" class="detail">CoA: 10.0.5.100</text>
  </g>
  
  <!-- Mobile Node -->
  <g class="section-1" data-narration="The Mobile Node (MN) is a device that can move between different networks while maintaining its permanent IP address. It communicates its current location via Binding Updates.">
    <rect x="170" y="270" width="80" height="50" fill="#5a8ab5" rx="8" filter="url(#shadow)"/>
    <text x="210" y="295" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Mobile Node</text>
    <text x="210" y="310" text-anchor="middle" fill="#fff" font-size="10">(MN)</text>
    <g class="mn-icon">
      <circle cx="210" cy="340" r="8" fill="#4a7a9a"/>
      <path d="M206 340 L208 344 L214 344 L216 340" stroke="#4a7a9a" stroke-width="2" fill="none"/>
    </g>
  </g>
  
  <!-- Connection Lines / Tunnel -->
  <g class="section-4" data-narration="Tunneling is the encapsulation technique where the Home Agent wraps packets and sends them to the Foreign Agent's Care-of Address, ensuring continuous connectivity.">
    <!-- Tunnel line HA to FA -->
    <path d="M130 160 Q210 120 290 160" stroke="#5a7a9a" stroke-width="3" fill="none" marker-end="url(#arrowhead)" class="tunnel-path"/>
    <text x="210" y="145" text-anchor="middle" class="detail" fill="#5a7a9a">Tunnel (Encapsulation)</text>
    
    <!-- MN connections -->
    <path d="M180 270 L150 200" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
    <path d="M240 270 L270 200" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="section-4" data-narration="Key concepts: Binding Update notifies HA of MN's location; Triangle Routing occurs when CN sends via HA; Route Optimization bypasses HA after initial contact.">
    <rect x="20" y="330" width="380" height="60" fill="#fff" rx="8" stroke="#c5ddf0" stroke-width="2" filter="url(#shadow)"/>
    <text x="35" y="350" class="label" font-size="12">Key Concepts:</text>
    <text x="35" y="368" class="detail">• Binding Update: MN informs HA of new CoA</text>
    <text x="35" y="382" class="detail">• Triangle Routing: CN→HA→FA→MN (inefficient path)</text>
    <text x="220" y="382" class="detail">• Route Optimization: Direct path after binding</text>
  </g>
  
  <!-- Legend / Additional Info -->
  <g class="section-4">
    <circle cx="50" cy="230" r="5" fill="#5a8ab5"/>
    <text x="62" y="234" class="detail">MN moves between networks</text>
    
    <circle cx="250" cy="230" r="5" fill="#6ba3a3"/>
    <text x="262" y="234" class="detail">HA tracks MN location</text>
    
    <circle cx="250" cy="245" r="5" fill="#8b6bae"/>
    <text x="262" y="249" class="detail">FA provides CoA</text>
  </g>
  
  <!-- Arrow indicators for data flow -->
  <g class="section-4" data-narration="Data flow: When MN is away, packets destined for the home address are tunneled through HA to the CoA at the foreign network.">
    <!-- Data packet icons -->
    <rect x="95" y="205" width="20" height="12" fill="#4a7a9a" rx="2"/>
    <text x="105" y="213" fill="#fff" font-size="8">DATA</text>
    <path d="M115 211 L145 211" stroke="#4a7a9a" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="295" y="205" width="20" height="12" fill="#6b5a9a" rx="2"/>
    <text x="305" y="213" fill="#fff" font-size="8">DATA</text>
  </g>
</svg>