<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-management-snmp">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5aa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3d6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ba881;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8b63;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pduGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2944a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a67c3d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: white; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #1e3d6b; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
    .section-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: white; }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .anim-slide-up { animation: slideInUp 0.5s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }
    .delay-4 { animation-delay: 0.4s; opacity: 0; }
    .delay-5 { animation-delay: 0.5s; opacity: 0; }
    .delay-6 { animation-delay: 0.6s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" />
  
  <!-- Header -->
  <rect x="0" y="0" width="420" height="45" fill="url(#headerGrad)" rx="0" />
  <text x="210" y="30" text-anchor="middle" class="title-text">Network Management: SNMP</text>
  
  <!-- SNMP Message Format Box -->
  <g filter="url(#shadow)" class="anim-slide-up delay-1">
    <rect x="30" y="60" width="360" height="120" fill="white" rx="8" stroke="#2c5aa0" stroke-width="2" />
    <rect x="30" y="60" width="360" height="25" fill="url(#headerGrad)" rx="8" />
    <text x="210" y="77" text-anchor="middle" class="section-title">SNMP Message Format</text>
    
    <!-- Message fields -->
    <rect x="45" y="95" width="70" height="35" fill="url(#boxGrad1)" rx="4" />
    <text x="80" y="112" text-anchor="middle" class="label-text" fill="white" font-size="11">Version</text>
    <text x="80" y="125" text-anchor="middle" class="detail-text" fill="white" font-size="9">v1/v2c/v3</text>
    
    <rect x="125" y="95" width="70" height="35" fill="#7eb5a6" rx="4" />
    <text x="160" y="112" text-anchor="middle" class="label-text" fill="white" font-size="11">Community</text>
    <text x="160" y="125" text-anchor="middle" class="detail-text" fill="white" font-size="9">String</text>
    
    <rect x="205" y="95" width="70" height="35" fill="url(#pduGrad)" rx="4" />
    <text x="240" y="112" text-anchor="middle" class="label-text" fill="white" font-size="11">PDU Type</text>
    <text x="240" y="125" text-anchor="middle" class="detail-text" fill="white" font-size="9">GET/SET/TRAP</text>
    
    <rect x="285" y="95" width="90" height="35" fill="#9b7bb8" rx="4" />
    <text x="330" y="112" text-anchor="middle" class="label-text" fill="white" font-size="10">Request ID</text>
    <text x="330" y="125" text-anchor="middle" class="detail-text" fill="white" font-size="9">Transaction ID</text>
    
    <!-- Variable Bindings -->
    <rect x="45" y="140" width="330" height="30" fill="#e8f0e8" rx="4" stroke="#5ba881" stroke-width="1" />
    <text x="60" y="159" class="label-text" fill="#1e3d6b" font-size="11">Variable Bindings (OID = Value)</text>
    <text x="300" y="159" class="detail-text" fill="#555" font-size="9">1.3.6.1.2.1.1.5 = "Router1"</text>
  </g>
  
  <!-- Components - Manager -->
  <g class="anim-slide-left delay-2">
    <rect x="15" y="195" width="85" height="70" fill="white" rx="6" stroke="#4a90c2" stroke-width="2" />
    <rect x="15" y="195" width="85" height="22" fill="url(#boxGrad1)" rx="6" />
    <text x="57" y="210" text-anchor="middle" class="section-title" font-size="11">Manager</text>
    <text x="57" y="235" text-anchor="middle" class="detail-text" font-size="9">SolarWinds</text>
    <text x="57" y="248" text-anchor="middle" class="detail-text" font-size="8">PRTG</text>
  </g>
  
  <!-- Arrow Manager to Message -->
  <path d="M105 230 L135 230" stroke="#4a90c2" stroke-width="2" stroke-dasharray="4,2" class="anim-fade delay-3">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" fill="freeze" />
  </path>
  <polygon points="135,230 128,226 128,234" fill="#4a90c2" class="anim-fade delay-3" />
  
  <!-- Components - Agent -->
  <g class="anim-slide-right delay-2">
    <rect x="320" y="195" width="85" height="70" fill="white" rx="6" stroke="#5ba881" stroke-width="2" />
    <rect x="320" y="195" width="85" height="22" fill="url(#boxGrad2)" rx="6" />
    <text x="362" y="210" text-anchor="middle" class="section-title" font-size="11">Agent</text>
    <text x="362" y="235" text-anchor="middle" class="detail-text" font-size="9">snmpd</text>
    <text x="362" y="248" text-anchor="middle" class="detail-text" font-size="8">Cisco IOS</text>
  </g>
  
  <!-- Arrow Message to Agent -->
  <path d="M285 230 L315 230" stroke="#5ba881" stroke-width="2" stroke-dasharray="4,2" class="anim-fade delay-3">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" fill="freeze" />
  </path>
  <polygon points="285,230 292,226 292,234" fill="#5ba881" class="anim-fade delay-3" />
  
  <!-- MIB/OID Box -->
  <g class="anim-slide-up delay-4">
    <rect x="140" y="280" width="140" height="55" fill="white" rx="6" stroke="#c2944a" stroke-width="2" />
    <rect x="140" y="280" width="140" height="20" fill="url(#pduGrad)" rx="6" />
    <text x="210" y="294" text-anchor="middle" class="section-title" font-size="11">MIB Database</text>
    <text x="210" y="315" text-anchor="middle" class="detail-text" font-size="10">OID: 1.3.6.1.2.1.1.5</text>
    <text x="210" y="328" text-anchor="middle" class="detail-text" font-size="9">sysName = "DeviceName"</text>
  </g>
  
  <!-- Version Info -->
  <g class="anim-fade delay-5">
    <rect x="25" y="345" width="120" height="45" fill="white" rx="5" stroke="#7eb5a6" stroke-width="1" />
    <text x="85" y="358" text-anchor="middle" class="label-text" font-size="10">Versions</text>
    <text x="85" y="372" text-anchor="middle" class="detail-text" font-size="8">v1: Basic GET/SET</text>
    <text x="85" y="383" text-anchor="middle" class="detail-text" font-size="8">v2c: Bulk ops</text>
    <text x="85" y="394" text-anchor="middle" class="detail-text" font-size="8">v3: Auth/Encrypt</text>
  </g>
  
  <!-- Operations -->
  <g class="anim-fade delay-6">
    <rect x="275" y="345" width="120" height="45" fill="white" rx="5" stroke="#9b7bb8" stroke-width="1" />
    <text x="335" y="358" text-anchor="middle" class="label-text" font-size="10">Operations</text>
    <text x="335" y="372" text-anchor="middle" class="detail-text" font-size="8">GET, GETNEXT</text>
    <text x="335" y="383" text-anchor="middle" class="detail-text" font-size="8">SET, TRAP, INFORM</text>
  </g>
  
  <!-- Narration indicators -->
  <circle cx="20" cy="60" r="5" fill="#2c5aa0" class="anim-pulse" />
  <circle cx="20" cy="195" r="5" fill="#4a90c2" class="anim-pulse" style="animation-delay: 0.5s" />
  <circle cx="20" cy="280" r="5" fill="#c2944a" class="anim-pulse" style="animation-delay: 1s" />
  
  <!-- Data narration attributes (invisible for accessibility) -->
  <desc data-narration="SNMP Message Format showing Version, Community String, PDU Type, Request ID, and Variable Bindings fields"></desc>
  <desc data-narration="SNMP Manager - Central system that collects data using tools like SolarWinds and PRTG"></desc>
  <desc data-narration="SNMP Agent - Software running on managed devices like snmpd on Linux or Cisco IOS"></desc>
  <desc data-narration="MIB Database - Hierarchical database storing device parameters as OIDs like 1.3.6.1.2.1.1.5 for sysName"></desc>
</svg>