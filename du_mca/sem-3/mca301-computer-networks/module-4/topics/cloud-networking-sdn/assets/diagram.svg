<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="cloud-networking-sdn" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e9f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5e0f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sdnbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8ec5e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8d0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlaybg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0d4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5b8d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="automationbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8dcc8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowMove {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 10; }
    }
    .section { animation: fadeIn 0.8s ease-out forwards; }
    .title { animation: slideInUp 0.6s ease-out forwards; }
    .box-sdn { animation: slideInLeft 0.7s ease-out forwards; animation-delay: 0.2s; opacity: 0; }
    .box-cloud { animation: slideInRight 0.7s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .box-overlay { animation: slideInUp 0.7s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
    .box-automation { animation: slideInUp 0.7s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .arrow { stroke-dasharray: 8,4; animation: arrowMove 1.5s linear infinite; }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5f7c; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #1a3a4a; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: #2c5f7c; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <g class="title">
    <rect x="10" y="10" width="400" height="40" fill="#3a8fb7" rx="8" filter="url(#shadow)"/>
    <text x="210" y="35" text-anchor="middle" class="title-text" fill="white">Cloud Networking &amp; SDN</text>
  </g>
  
  <!-- SDN Architecture Box -->
  <g class="box-sdn" data-narration="SDN Architecture shows the separation of control plane (centralized controller) from data plane (switches), with northbound and southbound APIs">
    <rect x="15" y="65" width="180" height="150" fill="url(#sdnbg)" rx="8" stroke="#5ba3c6" stroke-width="2" filter="url(#shadow)"/>
    <text x="105" y="82" text-anchor="middle" class="label-text" fill="#1a5276">SDN Architecture</text>
    
    <!-- Control Plane -->
    <rect x="25" y="92" width="70" height="35" fill="#4a90b8" rx="4"/>
    <text x="60" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Control Plane</text>
    <text x="60" y="120" text-anchor="middle" font-size="9" fill="white">OpenDaylight</text>
    
    <!-- Data Plane -->
    <rect x="105" y="92" width="80" height="35" fill="#6ab0de" rx="4"/>
    <text x="145" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Data Plane</text>
    <text x="145" y="120" text-anchor="middle" font-size="9" fill="white">P4 Switches</text>
    
    <!-- Southbound API -->
    <rect x="55" y="135" width="100" height="18" fill="#88c4e0" rx="3"/>
    <text x="105" y="148" text-anchor="middle" font-size="9" fill="#1a5276">Southbound: OpenFlow</text>
    
    <!-- Northbound API -->
    <rect x="55" y="158" width="100" height="18" fill="#a0d4ec" rx="3"/>
    <text x="105" y="171" text-anchor="middle" font-size="9" fill="#1a5276">Northbound: REST API</text>
  </g>
  
  <!-- Cloud Components Box -->
  <g class="box-cloud" data-narration="Cloud Networking components include VPC, Load Balancers, and CDN for dynamic resource allocation">
    <rect x="210" y="65" width="195" height="150" fill="url(#cloudbg)" rx="8" stroke="#5ba3c6" stroke-width="2" filter="url(#shadow)"/>
    <text x="307" y="82" text-anchor="middle" class="label-text" fill="#1a5276">Cloud Components</text>
    
    <!-- VPC -->
    <rect x="220" y="92" width="55" height="30" fill="#5a9bbd" rx="4"/>
    <text x="247" y="107" text-anchor="middle" font-size="10" font-weight="bold" fill="white">VPC</text>
    <text x="247" y="118" text-anchor="middle" font-size="8" fill="white">10.0.0.0/16</text>
    
    <!-- Load Balancer -->
    <rect x="280" y="92" width="55" height="30" fill="#6aabcc" rx="4"/>
    <text x="307" y="107" text-anchor="middle" font-size="10" font-weight="bold" fill="white">ALB/NLB</text>
    <text x="307" y="118" text-anchor="middle" font-size="8" fill="white">Load Balance</text>
    
    <!-- CDN -->
    <rect x="340" y="92" width="55" height="30" fill="#7abbd9" rx="4"/>
    <text x="367" y="107" text-anchor="middle" font-size="10" font-weight="bold" fill="white">CDN</text>
    <text x="367" y="118" text-anchor="middle" font-size="8" fill="white">CloudFront</text>
    
    <!-- NFV -->
    <rect x="220" y="130" width="175" height="28" fill="#8acbe6" rx="4"/>
    <text x="307" y="146" text-anchor="middle" font-size="11" fill="#1a5276">Network Function Virtualization</text>
    <text x="307" y="154" text-anchor="middle" font-size="9" fill="#2c5f7c">Firewall, VPN, NAT as software</text>
  </g>
  
  <!-- Overlay vs Underlay Box -->
  <g class="box-overlay" data-narration="Overlay networks (VXLAN, GRE tunnels) run on top of underlay physical infrastructure (BGP, OSPF)">
    <rect x="15" y="225" width="190" height="75" fill="url(#overlaybg)" rx="8" stroke="#9575b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="243" text-anchor="middle" class="label-text" fill="#4a3570">Overlay vs Underlay</text>
    
    <rect x="25" y="252" width="80" height="40" fill="#b8a4d0" rx="4"/>
    <text x="65" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a3570">Underlay</text>
    <text x="65" y="280" text-anchor="middle" font-size="9" fill="#5a4578">BGP, OSPF</text>
    <text x="65" y="288" text-anchor="middle" font-size="8" fill="#5a4578">Physical</text>
    
    <text x="110" y="270" font-size="16" fill="#7c5a9e">→</text>
    
    <rect x="120" y="252" width="75" height="40" fill="#d4c4e4" rx="4"/>
    <text x="157" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a3570">Overlay</text>
    <text x="157" y="280" text-anchor="middle" font-size="9" fill="#5a4578">VXLAN, GRE</text>
    <text x="157" y="288" text-anchor="middle" font-size="8" fill="#5a4578">Virtual</text>
  </g>
  
  <!-- Network Automation Box -->
  <g class="box-automation" data-narration="Network Automation uses Infrastructure as Code (Terraform), Configuration Management (Ansible), and CI/CD pipelines">
    <rect x="215" y="225" width="190" height="75" fill="url(#automationbg)" rx="8" stroke="#7ba37b" stroke-width="2" filter="url(#shadow)"/>
    <text x="310" y="243" text-anchor="middle" class="label-text" fill="#2d4a2d">Network Automation</text>
    
    <!-- Three pillars -->
    <rect x="225" y="252" width="55" height="40" fill="#a8c8a8" rx="4"/>
    <text x="252" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#2d4a2d">Terraform</text>
    <text x="252" y="280" text-anchor="middle" font-size="8" fill="#3d5a3d">IaC</text>
    
    <rect x="285" y="252" width="55" height="40" fill="#b8d8b8" rx="4"/>
    <text x="312" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#2d4a2d">Ansible</text>
    <text x="312" y="280" text-anchor="middle" font-size="8" fill="#3d5a3d">Config Mgmt</text>
    
    <rect x="345" y="252" width="50" height="40" fill="#c8e8c8" rx="4"/>
    <text x="370" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#2d4a2d">CI/CD</text>
    <text x="370" y="280" text-anchor="middle" font-size="8" fill="#3d5a3d">Pipelines</text>
  </g>
  
  <!-- Market Stats Box -->
  <g class="section" data-narration="The global SDN market projection showing industry growth and demand">
    <rect x="15" y="310" width="390" height="40" fill="#f5e6d3" rx="8" stroke="#d4a574" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="332" font-size="12" font-weight="bold" fill="#8b5a2b">SDN Market 2025:</text>
    <text x="140" y="332" font-size="14" font-weight="bold" fill="#d35400">$32.7 Billion</text>
    <text x="250" y="332" font-size="11" fill="#7d5a3d">Major Players:</text>
    <circle cx="340" cy="328" r="8" fill="#3498db"/>
    <text x="340" y="331" text-anchor="middle" font-size="8" fill="white">AWS</text>
    <circle cx="365" cy="328" r="8" fill="#2ecc71"/>
    <text x="365" y="331" text-anchor="middle" font-size="8" fill="white">Azure</text>
  </g>
  
  <!-- Connection Arrows -->
  <g class="section">
    <path d="M200 100 L205 100" stroke="#5ba3c6" stroke-width="2" class="arrow" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#5ba3c6"/>
      </marker>
    </defs>
  </g>
  
  <!-- Flow indicators -->
  <g class="pulse-element">
    <circle cx="200" cy="90" r="5" fill="#e74c3c" opacity="0.8"/>
    <circle cx="220" cy="90" r="3" fill="#3498db" opacity="0.6"/>
  </g>
  
  <!-- Legend/Key -->
  <g class="section">
    <rect x="15" y="355" width="390" height="30" fill="#f0f0f0" rx="5"/>
    <text x="25" y="370" font-size="10" fill="#555">Key: 🔵 Control/Data Plane | 🟢 Cloud | 🟣 Overlay | 🟠 Automation</text>
    <text x="380" y="370" font-size="9" fill="#888" text-anchor="end">DU MCA</text>
  </g>
</svg>