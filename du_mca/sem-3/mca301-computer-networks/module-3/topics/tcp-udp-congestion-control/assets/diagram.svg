<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="tcp-udp-congestion-control">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a87;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="udpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558b2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="congGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e65100;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDash {
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Arial', sans-serif; font-size: 20px; font-weight: bold; fill: #1a3a5c; }
    .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #fff; }
    .detail { font-family: 'Arial', sans-serif; font-size: 11px; fill: #fff; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; }
    .box-tcp { fill: url(#tcpGrad); rx: 8; filter: url(#shadow); }
    .box-udp { fill: url(#udpGrad); rx: 8; filter: url(#shadow); }
    .box-cong { fill: url(#congGrad); rx: 8; filter: url(#shadow); }
    .box-states { fill: #f5f5f5; stroke: #ddd; stroke-width: 1; rx: 8; }
    .flow-line { stroke: #4a90d9; stroke-width: 2; stroke-dasharray: 5,5; animation: flowDash 1s linear infinite; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; opacity: 0; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; opacity: 0; }
    .slide-up { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title fade-in">TCP, UDP &amp; Congestion Control</text>
  <line x1="60" y1="38" x2="360" y2="38" stroke="#4a90d9" stroke-width="2" class="fade-in delay-1"/>
  
  <!-- TCP Section (Left) -->
  <g class="slide-left">
    <rect x="15" y="50" width="130" height="95" class="box-tcp" data-narration="TCP provides reliable, ordered, connection-oriented data delivery with flow control and congestion control mechanisms."/>
    <text x="80" y="68" text-anchor="middle" class="label" font-weight="bold">TCP</text>
    <text x="80" y="85" text-anchor="middle" class="detail">Reliable</text>
    <text x="80" y="100" text-anchor="middle" class="detail">Connection-oriented</text>
    <text x="80" y="115" text-anchor="middle" class="detail">Flow Control</text>
    <text x="80" y="130" text-anchor="middle" class="detail">Congestion Control</text>
  </g>
  
  <!-- UDP Section (Right) -->
  <g class="slide-right">
    <rect x="275" y="50" width="130" height="95" class="box-udp" data-narration="UDP is a lightweight, connectionless protocol suitable for real-time applications where speed matters more than reliability."/>
    <text x="340" y="68" text-anchor="middle" class="label" font-weight="bold">UDP</text>
    <text x="340" y="85" text-anchor="middle" class="detail">Unreliable</text>
    <text x="340" y="100" text-anchor="middle" class="detail">Connectionless</text>
    <text x="340" y="115" text-anchor="middle" class="detail">Low Overhead</text>
    <text x="340" y="130" text-anchor="middle" class="detail">Real-time Apps</text>
  </g>
  
  <!-- VS Symbol -->
  <circle cx="210" cy="97" r="18" fill="#fff" stroke="#333" stroke-width="2" class="pulse fade-in delay-2"/>
  <text x="210" y="102" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">VS</text>
  
  <!-- Arrow from TCP to Congestion -->
  <path d="M80 145 Q80 175 130 175" class="arrow" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <!-- TCP States Box -->
  <g class="slide-up delay-2">
    <rect x="15" y="155" width="190" height="110" class="box-states" data-narration="TCP uses a three-way handshake (SYN, SYN-ACK, ACK) to establish connections and transitions through states like LISTEN, SYN_SENT, ESTABLISHED, and FIN_WAIT."/>
    <text x="110" y="172" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">TCP States</text>
    
    <!-- State diagram simplified -->
    <ellipse cx="55" cy="195" rx="22" ry="12" fill="#4a90d9" opacity="0.8"/>
    <text x="55" y="198" text-anchor="middle" class="detail" font-size="9">LISTEN</text>
    
    <ellipse cx="110" cy="220" rx="25" ry="12" fill="#4a90d9" opacity="0.8"/>
    <text x="110" y="223" text-anchor="middle" class="detail" font-size="9">SYN_SENT</text>
    
    <ellipse cx="55" cy="245" rx="30" ry="12" fill="#2d5a87"/>
    <text x="55" y="248" text-anchor="middle" class="detail" font-size="9">ESTABLISHED</text>
    
    <ellipse cx="130" cy="248" rx="25" ry="12" fill="#4a90d9" opacity="0.8"/>
    <text x="130" y="251" text-anchor="middle" class="detail" font-size="9">FIN_WAIT</text>
    
    <!-- Arrows between states -->
    <path d="M70 195 L88 208" stroke="#666" stroke-width="1" fill="none"/>
    <path d="M85 220 L60 233" stroke="#666" stroke-width="1" fill="none"/>
    <path d="M85 220 L45 233" stroke="#666" stroke-width="1" fill="none"/>
    <path d="M80 245 L110 248" stroke="#666" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Three-way Handshake -->
  <g class="fade-in delay-3">
    <rect x="220" y="155" width="185" height="50" fill="#e3f2fd" stroke="#4a90d9" stroke-width="1" rx="5" data-narration="Three-way handshake: 1) Client sends SYN, 2) Server responds SYN-ACK, 3) Client sends ACK to establish connection."/>
    <text x="312" y="170" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a3a5c">3-Way Handshake</text>
    <text x="312" y="188" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">SYN → SYN-ACK → ACK</text>
  </g>
  
  <!-- Congestion Control Box -->
  <g class="slide-up delay-3">
    <rect x="220" y="215" width="185" height="95" class="box-cong" data-narration="Congestion control includes Slow Start (exponential growth), Congestion Avoidance (linear growth), Fast Retransmit (retransmit on 3 dup ACKs), and Fast Recovery."/>
    <text x="312" y="233" text-anchor="middle" class="label" font-weight="bold">Congestion Control</text>
    <text x="230" y="252" class="detail">• Slow Start (exponential)</text>
    <text x="230" y="267" class="detail">• Congestion Avoidance</text>
    <text x="230" y="282" class="detail">• Fast Retransmit</text>
    <text x="230" y="297" class="detail">• Fast Recovery</text>
  </g>
  
  <!-- AIMD Visualization -->
  <g class="fade-in delay-4">
    <rect x="15" y="275" width="190" height="50" fill="#fff8e1" stroke="#ff9800" stroke-width="1" rx="5" data-narration="AIMD (Additive Increase Multiplicative Decrease) is the fundamental TCP congestion control algorithm that ensures fairness and efficiency."/>
    <text x="110" y="292" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">AIMD Algorithm</text>
    <text x="110" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Add +1 / Mult × 0.5</text>
  </g>
  
  <!-- Bottom comparison bar -->
  <g class="slide-up delay-4">
    <rect x="15" y="335" width="390" height="55" fill="#263238" rx="8" data-narration="TCP uses 3-way handshake and provides reliability with congestion control. UDP skips handshake for speed, suitable for DNS, VoIP, and streaming."/>
    <text x="210" y="352" text-anchor="middle" font-family="Arial" font-size="11" fill="#90caf9">TCP: Handshake + Reliability + Congestion Control</text>
    <text x="210" y="368" text-anchor="middle" font-family="Arial" font-size="11" fill="#a5d6a7">UDP: No Handshake + Speed + No Built-in Control</text>
    <text x="210" y="383" text-anchor="middle" font-family="Arial" font-size="10" fill="#bdbdbd">Use DNS, DHCP, VoIP, Streaming | Use HTTP, FTP, Email</text>
  </g>
</svg>