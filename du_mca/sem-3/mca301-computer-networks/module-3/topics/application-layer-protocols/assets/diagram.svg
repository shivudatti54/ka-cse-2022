<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="application-layer-protocols">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dff5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba3c6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7bc47f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9a56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes moveRight {
      from { transform: translateX(0); }
      to { transform: translateX(100px); }
    }
    @keyframes moveLeft {
      from { transform: translateX(100px); }
      to { transform: translateX(0); }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .protocol { font-family: Arial, sans-serif; font-size: 12px; fill: #fff; font-weight: bold; }
    .box { rx: 8; ry: 8; stroke: #333; stroke-width: 1; }
    .arrow-line { stroke: #ff6b6b; stroke-width: 2; stroke-dasharray: 5,3; }
    .arrow-head { fill: #ff6b6b; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide-left { animation: slideInLeft 0.8s ease-out forwards; }
    .anim-slide-right { animation: slideInRight 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s infinite; }
    .anim-req { animation: moveRight 1.5s ease-in-out infinite; }
    .anim-resp { animation: moveLeft 1.5s ease-in-out infinite; }
  </style>
  
  <rect x="0" y="0" width="420" height="400" fill="url(#bgGradient)" />
  
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Application Layer Protocols</text>
  <line x1="30" y1="45" x2="390" y2="45" stroke="#888" stroke-width="1" class="anim-fade" style="animation-delay: 0.2s"/>
  
  <!-- Client Section -->
  <g class="anim-slide-left" data-narration="Client browser initiates HTTP request to server">
    <rect x="30" y="70" width="80" height="70" rx="8" fill="url(#clientGradient)" class="box"/>
    <text x="70" y="95" text-anchor="middle" class="label">Client</text>
    <text x="70" y="115" text-anchor="middle" class="detail">Browser</text>
    <rect x="40" y="125" width="60" height="8" rx="2" fill="#fff"/>
    <rect x="40" y="137" width="40" height="5" rx="1" fill="#fff"/>
  </g>
  
  <!-- Arrow to Server -->
  <g class="anim-fade" style="animation-delay: 0.5s" data-narration="TCP connection established, then HTTP request/response exchanged">
    <line x1="120" y1="105" x2="280" y2="105" class="arrow-line"/>
    <polygon points="275,100 285,105 275,110" class="arrow-head"/>
    <text x="200" y="95" text-anchor="middle" class="detail">HTTP Request</text>
    <text x="200" y="125" text-anchor="middle" class="detail" fill="#888">GET /index.html</text>
  </g>
  
  <!-- Server Section -->
  <g class="anim-slide-right" data-narration="Server processes request and sends HTTP response back to client">
    <rect x="310" y="70" width="80" height="70" rx="8" fill="url(#serverGradient)" class="box"/>
    <text x="350" y="95" text-anchor="middle" class="label">Server</text>
    <text x="350" y="115" text-anchor="middle" class="detail">Web Server</text>
    <rect x="320" y="125" width="60" height="8" rx="2" fill="#fff"/>
    <rect x="320" y="137" width="40" height="5" rx="1" fill="#fff"/>
  </g>
  
  <!-- Response Arrow -->
  <g class="anim-fade" style="animation-delay: 0.8s" data-narration="Server returns status code and content (HTML, JSON, etc.)">
    <line x1="280" y1="150" x2="130" y2="150" class="arrow-line"/>
    <polygon points="135,145 125,150 135,155" class="arrow-head"/>
    <text x="205" y="165" text-anchor="middle" class="detail">HTTP Response</text>
    <text x="205" y="180" text-anchor="middle" class="detail" fill="#888">200 OK + Content</text>
  </g>
  
  <!-- TCP Handshake indicator -->
  <g class="anim-pulse" style="animation-delay: 1s" data-narration="TCP three-way handshake (SYN, SYN-ACK, ACK) precedes HTTP">
    <rect x="150" y="195" width="120" height="25" rx="5" fill="#9b8fd9" opacity="0.8"/>
    <text x="210" y="212" text-anchor="middle" class="protocol">TCP Handshake</text>
  </g>
  
  <!-- Protocol Boxes -->
  <g class="anim-fade" style="animation-delay: 1.2s" data-narration="Other application layer protocols: HTTPS (secure web), SMTP (email send), DNS (name resolution), FTP (file transfer), WebSocket (real-time)">
    <rect x="30" y="235" width="70" height="28" rx="5" fill="#4a90d9" class="box"/>
    <text x="65" y="254" text-anchor="middle" class="protocol">HTTP</text>
    <text x="65" y="270" text-anchor="middle" class="detail" font-size="9">Port 80</text>
    
    <rect x="110" y="235" width="70" height="28" rx="5" fill="#27ae60" class="box"/>
    <text x="145" y="254" text-anchor="middle" class="protocol">HTTPS</text>
    <text x="145" y="270" text-anchor="middle" class="detail" font-size="9">Port 443</text>
    
    <rect x="190" y="235" width="70" height="28" rx="5" fill="#e74c3c" class="box"/>
    <text x="225" y="254" text-anchor="middle" class="protocol">SMTP</text>
    <text x="225" y="270" text-anchor="middle" class="detail" font-size="9">Port 25</text>
    
    <rect x="270" y="235" width="70" height="28" rx="5" fill="#f39c12" class="box"/>
    <text x="305" y="254" text-anchor="middle" class="protocol">DNS</text>
    <text x="305" y="270" text-anchor="middle" class="detail" font-size="9">Port 53</text>
    
    <rect x="60" y="275" width="70" height="28" rx="5" fill="#8e44ad" class="box"/>
    <text x="95" y="294" text-anchor="middle" class="protocol">FTP</text>
    <text x="95" y="310" text-anchor="middle" class="detail" font-size="9">Port 21</text>
    
    <rect x="140" y="275" width="70" height="28" rx="5" fill="#16a085" class="box"/>
    <text x="175" y="294" text-anchor="middle" class="protocol">WebSocket</text>
    <text x="175" y="310" text-anchor="middle" class="detail" font-size="9">Port 80/443</text>
    
    <rect x="220" y="275" width="70" height="28" rx="5" fill="#d35400" class="box"/>
    <text x="255" y="294" text-anchor="middle" class="protocol">IMAP</text>
    <text x="255" y="310" text-anchor="middle" class="detail" font-size="9">Port 143</text>
    
    <rect x="300" y="275" width="70" height="28" rx="5" fill="#7f8c8d" class="box"/>
    <text x="335" y="294" text-anchor="middle" class="protocol">SSH/SFTP</text>
    <text x="335" y="310" text-anchor="middle" class="detail" font-size="9">Port 22</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="anim-fade" style="animation-delay: 1.5s" data-narration="HTTP uses request-response cycle with methods like GET, POST, and status codes (200 OK, 404 Not Found, 500 Error)">
    <rect x="30" y="315" width="180" height="75" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="40" y="335" class="label" font-size="12">Key Concepts:</text>
    <text x="40" y="352" class="detail">• GET, POST, PUT, DELETE methods</text>
    <text x="40" y="367" class="detail">• Status codes: 2xx Success, 4xx Error</text>
    <text x="40" y="382" class="detail">• Stateless, TLS encryption for HTTPS</text>
  </g>
  
  <!-- OSI Model indicator -->
  <g class="anim-fade" style="animation-delay: 1.7s" data-narration="Application layer is Layer 7 in OSI model, the topmost layer closest to end users">
    <rect x="225" y="315" width="165" height="75" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="235" y="335" class="label" font-size="12">OSI Model:</text>
    <text x="235" y="352" class="detail">Layer 7 - Application</text>
    <text x="235" y="367" class="detail">Layer 6 - Presentation</text>
    <text x="235" y="382" class="detail">Layer 5 - Session</text>
  </g>
  
</svg>