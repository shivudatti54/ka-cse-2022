<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="network-security-basics">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5f6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ciaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cryptoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a9dfbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accessGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e79f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="defenseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d7bde2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="threatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b7b1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .title-anim { animation: fadeIn 1s ease-out forwards; }
    .section-anim { animation: slideIn 0.8s ease-out forwards; animation-delay: 0.3s; opacity: 0; }
    .pulse-anim { animation: pulse 2s infinite; transform-origin: center; }
    .rotate-anim { animation: rotate 20s linear infinite; }
    
    text { font-family: Arial, sans-serif; }
    .title { font-size: 18px; font-weight: bold; fill: white; }
    .section-title { font-size: 14px; font-weight: bold; }
    .section-label { font-size: 12px; }
    .detail-text { font-size: 10px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="420" height="45" fill="url(#headerGrad)" rx="10"/>
  <text x="210" y="28" text-anchor="middle" class="title title-anim">Network Security Basics</text>
  <circle cx="395" cy="22" r="8" fill="#fff" opacity="0.3" class="pulse-anim">
    <title>Protect Your Network</title>
  </circle>
  
  <!-- CIA Triad Section -->
  <g class="section-anim" data-narration="The CIA Triad forms the core objectives of network security: Confidentiality ensures data is accessible only to authorized users, Integrity guarantees data accuracy and consistency, Availability ensures systems and data are accessible when needed.">
    <rect x="10" y="55" width="125" height="75" fill="url(#ciaGrad)" rx="8" filter="url(#shadow)"/>
    <text x="72" y="72" text-anchor="middle" class="section-title" fill="white">CIA Triad</text>
    <circle cx="45" cy="95" r="12" fill="white" opacity="0.9" class="pulse-anim"/>
    <text x="45" y="99" text-anchor="middle" font-size="10" fill="#2c5f6e" font-weight="bold">C</text>
    <circle cx="72" cy="110" r="12" fill="white" opacity="0.9" class="pulse-anim"/>
    <text x="72" y="114" text-anchor="middle" font-size="10" fill="#2c5f6e" font-weight="bold">I</text>
    <circle cx="100" cy="95" r="12" fill="white" opacity="0.9" class="pulse-anim"/>
    <text x="100" y="99" text-anchor="middle" font-size="10" fill="#2c5f6e" font-weight="bold">A</text>
  </g>
  
  <!-- Cryptography Section -->
  <g class="section-anim" data-narration="Cryptography secures data through encryption. AES-256 uses symmetric encryption with a single key, while RSA 2048 uses asymmetric public/private key pairs. Digital Signatures using SHA-256 with RSA provide message authentication and integrity verification." style="animation-delay: 0.5s;">
    <rect x="145" y="55" width="130" height="75" fill="url(#cryptoGrad)" rx="8" filter="url(#shadow)"/>
    <text x="210" y="72" text-anchor="middle" class="section-title" fill="white">Cryptography</text>
    <rect x="155" y="80" width="110" height="12" fill="white" opacity="0.8" rx="3"/>
    <text x="160" y="89" font-size="9" fill="#1e8449">AES-256</text>
    <rect x="155" y="95" width="110" height="12" fill="white" opacity="0.8" rx="3"/>
    <text x="160" y="104" font-size="9" fill="#1e8449">RSA 2048</text>
    <rect x="155" y="110" width="110" height="12" fill="white" opacity="0.8" rx="3"/>
    <text x="160" y="119" font-size="9" fill="#1e8449">SHA-256+RSA</text>
  </g>
  
  <!-- Access Control Section -->
  <g class="section-anim" data-narration="Access Control implements the AAA Framework: Authentication verifies user identity, Authorization determines permissions, and Accounting tracks user activities. Technologies like RADIUS and TACACS+ manage network access, while RBAC assigns permissions based on roles." style="animation-delay: 0.7s;">
    <rect x="285" y="55" width="125" height="75" fill="url(#accessGrad)" rx="8" filter="url(#shadow)"/>
    <text x="347" y="72" text-anchor="middle" class="section-title" fill="white">Access Control</text>
    <circle cx="315" cy="92" r="10" fill="white" opacity="0.9"/>
    <text x="315" y="96" text-anchor="middle" font-size="10" fill="#9a7d0a" font-weight="bold">A</text>
    <circle cx="347" cy="92" r="10" fill="white" opacity="0.9"/>
    <text x="347" y="96" text-anchor="middle" font-size="10" fill="#9a7d0a" font-weight="bold">A</text>
    <circle cx="380" cy="92" r="10" fill="white" opacity="0.9"/>
    <text x="380" y="96" text-anchor="middle" font-size="10" fill="#9a7d0a" font-weight="bold">A</text>
    <text x="347" y="118" text-anchor="middle" font-size="9" fill="white" font-weight="bold">RBAC</text>
  </g>
  
  <!-- Network Defense Section -->
  <g class="section-anim" data-narration="Network Defense mechanisms include Firewalls (stateful inspection and packet filtering), IDS/IPS for intrusion detection/prevention using signature-based and anomaly-based detection, and VPNs using IPsec in transport/tunnel modes or SSL/TLS for secure communications." style="animation-delay: 0.9s;">
    <rect x="10" y="140" width="130" height="80" fill="url(#defenseGrad)" rx="8" filter="url(#shadow)"/>
    <text x="75" y="158" text-anchor="middle" class="section-title" fill="white">Network Defense</text>
    <rect x="20" y="168" width="35" height="35" fill="white" opacity="0.8" rx="5"/>
    <path d="M25 185 L37.5 175 L50 185 L37.5 195 Z" fill="#6c3483"/>
    <text x="58" y="180" font-size="8" fill="white">Firewall</text>
    <rect x="20" y="205" width="35" height="8" fill="white" opacity="0.8" rx="2"/>
    <text x="58" y="212" font-size="8" fill="white">IDS/IPS</text>
    <rect x="65" y="168" width="65" height="8" fill="white" opacity="0.8" rx="2"/>
    <rect x="65" y="180" width="65" height="8" fill="white" opacity="0.8" rx="2"/>
    <rect x="65" y="192" width="65" height="8" fill="white" opacity="0.8" rx="2"/>
    <rect x="65" y="204" width="65" height="8" fill="white" opacity="0.8" rx="2"/>
  </g>
  
  <!-- Threat Mitigation Section -->
  <g class="section-anim" data-narration="Threat Mitigation strategies include DDoS protection through rate limiting and Anycast DNS, Malware defense using sandboxing and heuristic analysis, and Social Engineering prevention via SPF/DKIM/DMARC protocols for email security." style="animation-delay: 1.1s;">
    <rect x="150" y="140" width="130" height="80" fill="url(#threatGrad)" rx="8" filter="url(#shadow)"/>
    <text x="215" y="158" text-anchor="middle" class="section-title" fill="white">Threat Mitigation</text>
    <circle cx="180" cy="180" r="15" fill="white" opacity="0.9" class="pulse-anim"/>
    <path d="M180 168 L185 178 L195 178 L187 185 L190 195 L180 189 L170 195 L173 185 L165 178 L175 178 Z" fill="#c0392b"/>
    <text x="210" y="178" font-size="8" fill="white">DDoS</text>
    <circle cx="180" cy="205" r="12" fill="white" opacity="0.9"/>
    <path d="M180 195 L183 202 L190 202 L184 207 L186 214 L180 210 L174 214 L176 207 L170 202 L177 202 Z" fill="#922b21"/>
    <text x="210" y="207" font-size="8" fill="white">Malware</text>
    <rect x="225" y="195" width="45" height="15" fill="white" opacity="0.8" rx="3"/>
    <text x="247" y="206" text-anchor="middle" font-size="8" fill="#7b241c">SPF/DKIM</text>
  </g>
  
  <!-- Firewall Architecture Diagram -->
  <g class="section-anim" data-narration="Firewall Architecture shows packet filtering between trusted and untrusted zones. Key elements include Screening router at the edge, DMZ for public services, and Internal network for sensitive data." style="animation-delay: 1.3s;">
    <rect x="290" y="140" width="120" height="80" fill="#ecf0f1" rx="8" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="158" text-anchor="middle" class="section-title" fill="#2c3e50">Firewall Architecture</text>
    <rect x="300" y="165" width="100" height="20" fill="#e74c3c" rx="3"/>
    <text x="350" y="180" text-anchor="middle" font-size="9" fill="white">Screening Router</text>
    <rect x="300" y="190" width="100" height="20" fill="#f39c12" rx="3"/>
    <text x="350" y="205" text-anchor="middle" font-size="9" fill="white">DMZ</text>
    <rect x="300" y="215" width="100" height="20" fill="#27ae60" rx="3"/>
    <text x="350" y="230" text-anchor="middle" font-size="9" fill="white">Internal Network</text>
  </g>
  
  <!-- Bottom Stats Bar -->
  <g class="section-anim" data-narration="Current threat statistics show the importance of network security: 15% YoY growth in cyber threats in India (CERT-In 2023), 74% of Indian organizations targeted by phishing (2022), and 13% of cyber incidents in financial sector (RBI 2023)." style="animation-delay: 1.5s;">
    <rect x="10" y="230" width="400" height="155" fill="white" rx="8" opacity="0.9" filter="url(#shadow)"/>
    
    <!-- Stats icons -->
    <circle cx="35" cy="255" r="12" fill="#e74c3c" opacity="0.2"/>
    <text x="35" y="259" text-anchor="middle" font-size="14" fill="#c0392b" font-weight="bold">!</text>
    <text x="55" y="259" font-size="10" fill="#2c3e50">15% YoY Threat Growth</text>
    <text x="55" y="271" font-size="8" fill="#7f8c8d">(CERT-In 2023)</text>
    
    <circle cx="35" cy="290" r="12" fill="#3498db" opacity="0.2"/>
    <text x="35" y="294" text-anchor="middle" font-size="14" fill="#2980b9" font-weight="bold">⚠</text>
    <text x="55" y="294" font-size="10" fill="#2c3e50">74% Phishing Targets</text>
    <text x="55" y="306" font-size="8" fill="#7f8c8d">(India 2022)</text>
    
    <circle cx="35" cy="325" r="12" fill="#f39c12" opacity="0.2"/>
    <text x="35" y="329" text-anchor="middle" font-size="14" fill="#d68910" font-weight="bold">$</text>
    <text x="55" y="329" font-size="10" fill="#2c3e50">13% Financial Sector</text>
    <text x="55" y="341" font-size="8" fill="#7f8c8d">(RBI 2023)</text>
    
    <!-- Key Protocols Box -->
    <rect x="150" y="245" width="250" height="130" fill="#f8f9fa" rx="5" stroke="#dee2e6" stroke-width="1"/>
    <text x="275" y="262" text-anchor="middle" font-size="11" fill="#2c3e50" font-weight="bold">Key Security Protocols</text>
    
    <g>
      <rect x="160" y="270" width="230" height="18" fill="#d5f5e3" rx="3"/>
      <text x="165" y="283" font-size="9" fill="#1e8449">IPsec (Transport/Tunnel) • SSL/TLS</text>
    </g>
    <g>
      <rect x="160" y="292" width="230" height="18" fill="#d4e6f1" rx="3"/>
      <text x="165" y="305" font-size="9" fill="#2471a3">RADIUS • TACACS+ • RBAC</text>
    </g>
    <g>
      <rect x="160" y="314" width="230" height="18" fill="#fdebd0" rx="3"/>
      <text x="165" y="327" font-size="9" fill="#b9770e">SPF • DKIM • DMARC</text>
    </g>
    <g>
      <rect x="160" y="336" width="230" height="18" fill="#e8daef" rx="3"/>
      <text x="165" y="349" font-size="9" fill="#7d3c98">Rate Limiting • Sandboxing • Heuristics</text>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <g class="pulse-anim">
    <circle cx="395" cy="380" r="5" fill="#4a90a4" opacity="0.5"/>
    <circle cx="380" cy="370" r="3" fill="#5dade2" opacity="0.4"/>
    <circle cx="410" cy="365" r="4" fill="#27ae60" opacity="0.4"/>
  </g>
  
  <!-- Connection arrows -->
  <g stroke="#bdc3c7" stroke-width="1.5" fill="none" class="section-anim" style="animation-delay: 1.7s;">
    <path d="M135 92 Q145 92 145 85" marker-end="url(#arrowhead)"/>
    <path d="M275 92 Q265 92 265 85" marker-end="url(#arrowhead)"/>
  </g>
</svg>