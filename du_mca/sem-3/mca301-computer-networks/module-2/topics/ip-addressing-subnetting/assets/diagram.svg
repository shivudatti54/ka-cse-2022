<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="ip-addressing-subnetting">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #2d3748; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .highlight { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #c53030; }
    .box { fill: url(#boxGradient); stroke: #4299e1; stroke-width: 1.5; rx: 6; }
    .arrow { stroke: #4299e1; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .network-node { fill: #48bb78; stroke: #2f855a; stroke-width: 2; }
    .subnet-node { fill: #ed8936; stroke: #c05621; stroke-width: 2; }
    .host-node { fill: #9f7aea; stroke: #6b46c1; stroke-width: 2; }
    .fade-in { animation: fadeIn 1s ease-out forwards; }
    .slide-in { animation: slideIn 0.8s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title slide-in">IP Addressing &amp; Subnetting</text>
  
  <!-- Section 1: IPv4 Address Structure -->
  <g class="fade-in" style="animation-delay: 0.2s" data-narration="IPv4 uses 32-bit addresses represented as 4 octets in dotted-decimal notation">
    <rect x="10" y="45" width="120" height="55" class="box" filter="url(#shadow)"/>
    <text x="70" y="60" text-anchor="middle" class="label" style="font-weight:bold">IPv4 Address</text>
    <text x="70" y="78" text-anchor="middle" class="detail">32-bit / 4 Octets</text>
    <text x="70" y="92" text-anchor="middle" class="highlight">192.168.1.1</text>
  </g>
  
  <!-- Arrow to Subnet Mask -->
  <path d="M130 72 L160 72" class="arrow" style="stroke-dasharray: 100; animation: drawLine 0.5s ease-out forwards; animation-delay: 0.5s"/>
  
  <!-- Section 2: Subnet Mask -->
  <g class="fade-in" style="animation-delay: 0.4s" data-narration="Subnet mask separates network and host portions of an IP address">
    <rect x="160" y="45" width="120" height="55" class="box" filter="url(#shadow)"/>
    <text x="220" y="60" text-anchor="middle" class="label" style="font-weight:bold">Subnet Mask</text>
    <text x="220" y="78" text-anchor="middle" class="detail">Network + Host bits</text>
    <text x="220" y="92" text-anchor="middle" class="highlight">255.255.255.0</text>
  </g>
  
  <!-- Arrow to CIDR -->
  <path d="M280 72 L310 72" class="arrow" style="stroke-dasharray: 100; animation: drawLine 0.5s ease-out forwards; animation-delay: 0.7s"/>
  
  <!-- Section 3: CIDR Notation -->
  <g class="fade-in" style="animation-delay: 0.6s" data-narration="CIDR notation combines IP address with prefix length for efficient addressing">
    <rect x="310" y="45" width="100" height="55" class="box" filter="url(#shadow)"/>
    <text x="360" y="60" text-anchor="middle" class="label" style="font-weight:bold">CIDR</text>
    <text x="360" y="78" text-anchor="middle" class="detail">Prefix Length</text>
    <text x="360" y="92" text-anchor="middle" class="highlight">/24</text>
  </g>
  
  <!-- Subnetting Tree Diagram -->
  <g class="fade-in" style="animation-delay: 0.8s" data-narration="This tree shows how 192.168.1.0/24 network is subdivided into 4 subnets">
    <!-- Root Network -->
    <circle cx="210" cy="150" r="22" class="network-node pulse" filter="url(#shadow)"/>
    <text x="210" y="145" text-anchor="middle" class="detail" fill="white" style="font-size:10px">Network</text>
    <text x="210" y="158" text-anchor="middle" class="detail" fill="white" style="font-size:10px">192.168.1.0/24</text>
    
    <!-- Branch lines -->
    <path d="M210 172 L120 210" stroke="#4299e1" stroke-width="2" fill="none"/>
    <path d="M210 172 L210 210" stroke="#4299e1" stroke-width="2" fill="none"/>
    <path d="M210 172 L300 210" stroke="#4299e1" stroke-width="2" fill="none"/>
    
    <!-- Subnet 1 -->
    <circle cx="120" cy="220" r="18" class="subnet-node" filter="url(#shadow)"/>
    <text x="120" y="216" text-anchor="middle" class="detail" fill="white" style="font-size:9px">Subnet 1</text>
    <text x="120" y="228" text-anchor="middle" class="detail" fill="white" style="font-size:8px">/26</text>
    
    <!-- Subnet 2 -->
    <circle cx="210" cy="220" r="18" class="subnet-node" filter="url(#shadow)"/>
    <text x="210" y="216" text-anchor="middle" class="detail" fill="white" style="font-size:9px">Subnet 2</text>
    <text x="210" y="228" text-anchor="middle" class="detail" fill="white" style="font-size:8px">/26</text>
    
    <!-- Subnet 3 -->
    <circle cx="300" cy="220" r="18" class="subnet-node" filter="url(#shadow)"/>
    <text x="300" y="216" text-anchor="middle" class="detail" fill="white" style="font-size:9px">Subnet 3</text>
    <text x="300" y="228" text-anchor="middle" class="detail" fill="white" style="font-size:8px">/26</text>
    
    <!-- Subnet branches to hosts -->
    <path d="M120 238 L90 270" stroke="#4299e1" stroke-width="1.5" fill="none"/>
    <path d="M120 238 L150 270" stroke="#4299e1" stroke-width="1.5" fill="none"/>
    <path d="M210 238 L180 270" stroke="#4299e1" stroke-width="1.5" fill="none"/>
    <path d="M210 238 L240 270" stroke="#4299e1" stroke-width="1.5" fill="none"/>
    <path d="M300 238 L270 270" stroke="#4299e1" stroke-width="1.5" fill="none"/>
    <path d="M300 238 L330 270" stroke="#4299e1" stroke-width="1.5" fill="none"/>
    
    <!-- Host leaves -->
    <circle cx="90" cy="280" r="10" class="host-node"/>
    <text x="90" y="283" text-anchor="middle" class="detail" fill="white" style="font-size:7px">H1</text>
    
    <circle cx="150" cy="280" r="10" class="host-node"/>
    <text x="150" y="283" text-anchor="middle" class="detail" fill="white" style="font-size:7px">H2</text>
    
    <circle cx="180" cy="280" r="10" class="host-node"/>
    <text x="180" y="283" text-anchor="middle" class="detail" fill="white" style="font-size:7px">H3</text>
    
    <circle cx="240" cy="280" r="10" class="host-node"/>
    <text x="240" y="283" text-anchor="middle" class="detail" fill="white" style="font-size:7px">H4</text>
    
    <circle cx="270" cy="280" r="10" class="host-node"/>
    <text x="270" y="283" text-anchor="middle" class="detail" fill="white" style="font-size:7px">H5</text>
    
    <circle cx="330" cy="280" r="10" class="host-node"/>
    <text x="330" y="283" text-anchor="middle" class="detail" fill="white" style="font-size:7px">H6</text>
  </g>
  
  <!-- Example Box -->
  <g class="fade-in" style="animation-delay: 1s" data-narration="Example: Dividing 192.168.1.0/24 into 4 equal subnets by borrowing 2 bits">
    <rect x="10" y="300" width="195" height="90" class="box" filter="url(#shadow)"/>
    <text x="107" y="320" text-anchor="middle" class="label" style="font-weight:bold">Example: /24 → 4 subnets</text>
    <text x="20" y="342" class="detail">1. Required: 4 subnets</text>
    <text x="20" y="358" class="detail">2. 2² = 4 → borrow 2 bits</text>
    <text x="20" y="374" class="detail">3. New mask: /26 (255.255.255.192)</text>
    <text x="20" y="388" class="detail">4. Each subnet: 62 hosts</text>
  </g>
  
  <!-- Private Ranges Box -->
  <g class="fade-in" style="animation-delay: 1.2s" data-narration="Private IP ranges are used for internal networks and are not routable on the internet">
    <rect x="215" y="300" width="195" height="90" class="box" filter="url(#shadow)"/>
    <text x="312" y="320" text-anchor="middle" class="label" style="font-weight:bold">Private IP Ranges</text>
    <text x="225" y="345" class="detail" style="fill:#c53030">Class A: 10.0.0.0/8</text>
    <text x="225" y="362" class="detail" style="fill:#c53030">Class B: 172.16.0.0/12</text>
    <text x="225" y="379" class="detail" style="fill:#c53030">Class C: 192.168.0.0/16</text>
    <text x="225" y="396" class="detail" style="font-size:10px">NAT used for internet access</text>
  </g>
  
  <!-- Legend -->
  <g class="fade-in" style="animation-delay: 1.4s">
    <rect x="10" y="355" width="12" height="12" fill="#48bb78" rx="2"/>
    <text x="26" y="365" class="detail">Network</text>
    <rect x="75" y="355" width="12" height="12" fill="#ed8936" rx="2"/>
    <text x="91" y="365" class="detail">Subnet</text>
    <rect x="140" y="355" width="12" height="12" fill="#9f7aea" rx="2"/>
    <text x="156" y="365" class="detail">Host</text>
  </g>
</svg>