<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="data-link-protocols-mac" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9dd0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c5e8c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8dca8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e0b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d098;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c5d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8a8c0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flowArrow {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 20; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #4a5568; }
    .box { rx: 8; ry: 8; stroke: #666; stroke-width: 1; }
    .section-box { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .section-box:nth-child(1) { animation-delay: 0.1s; }
    .section-box:nth-child(2) { animation-delay: 0.2s; }
    .section-box:nth-child(3) { animation-delay: 0.3s; }
    .section-box:nth-child(4) { animation-delay: 0.4s; }
    .protocol-text { animation: pulse 3s ease-in-out infinite; }
    .arrow-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 8,4; animation: flowArrow 1.5s linear infinite; }
    .csma-flow { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="28" text-anchor="middle" class="title" data-narration="Title: Data Link Protocols - MAC Layer overview">Data Link Protocols - MAC Layer</text>
  
  <!-- Protocol Categories -->
  <g class="section-box">
    <rect x="10" y="50" width="95" height="75" class="box" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="57" y="68" text-anchor="middle" class="label" data-narration="Channel Partitioning Protocols section">Channel</text>
    <text x="57" y="83" text-anchor="middle" class="label" data-narration="Partitioning">Partitioning</text>
    <text x="57" y="100" text-anchor="middle" class="detail">TDMA</text>
    <text x="57" y="113" text-anchor="middle" class="detail">FDMA</text>
    <text x="57" y="126" text-anchor="middle" class="detail">CDMA</text>
  </g>
  
  <g class="section-box">
    <rect x="115" y="50" width="95" height="75" class="box" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="162" y="68" text-anchor="middle" class="label">Random</text>
    <text x="162" y="83" text-anchor="middle" class="label">Access</text>
    <text x="162" y="100" text-anchor="middle" class="detail">ALOHA</text>
    <text x="162" y="113" text-anchor="middle" class="detail">CSMA/CD</text>
    <text x="162" y="126" text-anchor="middle" class="detail">CSMA/CA</text>
  </g>
  
  <g class="section-box">
    <rect x="220" y="50" width="95" height="75" class="box" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="267" y="68" text-anchor="middle" class="label">Controlled</text>
    <text x="267" y="83" text-anchor="middle" class="label">Access</text>
    <text x="267" y="100" text-anchor="middle" class="detail">Token Ring</text>
    <text x="267" y="113" text-anchor="middle" class="detail">Polling</text>
    <text x="267" y="126" text-anchor="middle" class="detail">Bluetooth</text>
  </g>
  
  <g class="section-box">
    <rect x="325" y="50" width="85" height="75" class="box" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="367" y="68" text-anchor="middle" class="label">Modern</text>
    <text x="367" y="83" text-anchor="middle" class="label">Hybrid</text>
    <text x="367" y="100" text-anchor="middle" class="detail">OFDMA</text>
    <text x="367" y="113" text-anchor="middle" class="detail">Wi-Fi 6</text>
    <text x="367" y="126" text-anchor="middle" class="detail">5G NR</text>
  </g>
  
  <!-- CSMA/CD Flow Diagram -->
  <g class="csma-flow" style="animation-delay: 0.5s;">
    <text x="210" y="155" text-anchor="middle" class="label" data-narration="CSMA/CD Flow Diagram showing collision detection process">CSMA/CD Flow Diagram</text>
    
    <!-- Node A -->
    <rect x="20" y="170" width="60" height="35" rx="5" fill="#6c9bcF" stroke="#3d5a80" stroke-width="2"/>
    <text x="50" y="185" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Node A</text>
    <text x="50" y="198" text-anchor="middle" fill="white" font-size="9" font-family="Arial">Sender</text>
    
    <!-- Node B -->
    <rect x="340" y="170" width="60" height="35" rx="5" fill="#6c9bcF" stroke="#3d5a80" stroke-width="2"/>
    <text x="370" y="185" text-anchor="middle" fill="white" font-size="11" font-family="Arial">Node B</text>
    <text x="370" y="198" text-anchor="middle" fill="white" font-size="9" font-family="Arial">Receiver</text>
    
    <!-- Channel Line -->
    <line x1="80" y1="187" x2="340" y2="187" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    <text x="210" y="180" text-anchor="middle" class="detail">Shared Channel</text>
    
    <!-- Flow Steps -->
    <g class="protocol-text">
      <rect x="120" y="220" width="180" height="22" rx="4" fill="#ffeaa7" stroke="#f39c12" stroke-width="1"/>
      <text x="210" y="235" text-anchor="middle" class="detail" data-narration="Step 1: Carrier Sense - Listen before transmitting">1. Carrier Sense: Listen first</text>
    </g>
    
    <g class="protocol-text" style="animation-delay: 0.5s;">
      <rect x="120" y="248" width="180" height="22" rx="4" fill="#ff7675" stroke="#d63031" stroke-width="1"/>
      <text x="210" y="263" text-anchor="middle" class="detail" data-narration="Step 2: Collision Detection - Detect if two nodes transmit simultaneously">2. Collision Detection</text>
    </g>
    
    <g class="protocol-text" style="animation-delay: 1s;">
      <rect x="120" y="276" width="180" height="22" rx="4" fill="#fdcb6e" stroke="#e17055" stroke-width="1"/>
      <text x="210" y="291" text-anchor="middle" class="detail" data-narration="Step 3: Jam Signal - Send jam signal to notify all nodes">3. Jam Signal broadcast</text>
    </g>
    
    <g class="protocol-text" style="animation-delay: 1.5s;">
      <rect x="120" y="304" width="180" height="22" rx="4" fill="#a29bfe" stroke="#6c5ce7" stroke-width="1"/>
      <text x="210" y="319" text-anchor="middle" class="detail" data-narration="Step 4: Random Backoff - Wait random time before retry">4. Random Backoff (wait)</text>
    </g>
    
    <!-- Arrow showing cycle -->
    <path d="M 330 320 Q 360 340 330 360 Q 300 380 270 360" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
    <text x="300" y="378" text-anchor="middle" class="detail" fill="#e74c3c">Retry</text>
  </g>
  
  <!-- Performance Metrics Box -->
  <g class="section-box">
    <rect x="10" y="340" width="130" height="50" rx="5" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="75" y="356" text-anchor="middle" class="label" font-size="12" data-narration="Performance metrics box">Key Metrics</text>
    <text x="75" y="372" text-anchor="middle" class="detail">Latency: &lt;1ms (5G)</text>
    <text x="75" y="385" text-anchor="middle" class="detail">Utilization: ~90% (Eth)</text>
  </g>
  
  <!-- Throughput Box -->
  <g class="section-box">
    <rect x="150" y="340" width="130" height="50" rx="5" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="215" y="356" text-anchor="middle" class="label" font-size="12" data-narration="Throughput comparison box">Throughput</text>
    <text x="215" y="372" text-anchor="middle" class="detail">Pure ALOHA: 18.4%</text>
    <text x="215" y="385" text-anchor="middle" class="detail">Slotted: 36.8%</text>
  </g>
  
  <!-- Legend -->
  <g class="section-box">
    <rect x="290" y="340" width="120" height="50" rx="5" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="350" y="356" text-anchor="middle" class="label" font-size="12">Legend</text>
    <circle cx="310" cy="372" r="4" fill="#ffeaa7" stroke="#f39c12"/>
    <text x="320" y="376" class="detail">CSMA/CD</text>
    <circle cx="310" cy="385" r="4" fill="#a29bfe" stroke="#6c5ce7"/>
    <text x="320" y="389" class="detail">CSMA/CA</text>
  </g>
</svg>