<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="routing-algorithms-protocols" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="area0Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="area1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558b2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="area2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a65;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e64a19;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a3a4a; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #fff; }
    .concept-box { animation: fadeIn 0.8s ease-out forwards; }
    .area-0 { animation: fadeIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .area-1 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .area-2 { animation: fadeIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .router { animation: pulse 2s ease-in-out infinite; }
    .connection { stroke-dasharray: 100; animation: drawLine 1s ease-out forwards; }
    .box-anim-1 { animation: slideInUp 0.5s ease-out 0.3s forwards; opacity: 0; }
    .box-anim-2 { animation: slideInUp 0.5s ease-out 0.5s forwards; opacity: 0; }
    .box-anim-3 { animation: slideInUp 0.5s ease-out 0.7s forwards; opacity: 0; }
    .box-anim-4 { animation: slideInUp 0.5s ease-out 0.9s forwards; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title" data-narration="Title: Routing Algorithms &amp; Protocols">Routing Algorithms &amp; Protocols</text>
  
  <!-- OSPF Network Hierarchy Diagram -->
  <g data-narration="OSPF Network Hierarchy showing backbone Area 0 connected to Area 1 and Area 2">
    <!-- Connection lines -->
    <line x1="150" y1="130" x2="270" y2="130" stroke="#555" stroke-width="2" class="connection" style="animation-delay: 0.3s"/>
    <line x1="210" y1="130" x2="210" y2="200" stroke="#555" stroke-width="2" class="connection" style="animation-delay: 0.5s"/>
    <line x1="210" y1="200" x2="140" y2="260" stroke="#555" stroke-width="2" class="connection" style="animation-delay: 0.7s"/>
    <line x1="210" y1="200" x2="280" y2="260" stroke="#555" stroke-width="2" class="connection" style="animation-delay: 0.7s"/>
    
    <!-- Area 0 (Backbone) -->
    <rect x="100" y="90" width="100" height="80" rx="8" fill="url(#area0Grad)" class="area-0"/>
    <text x="150" y="115" text-anchor="middle" class="section-title">Area 0</text>
    <text x="150" y="132" text-anchor="middle" class="section-title" style="font-size:10px">Backbone</text>
    
    <!-- Router in Area 0 -->
    <circle cx="150" cy="145" r="12" fill="#fff" stroke="#2d5a6b" stroke-width="3" class="router"/>
    <text x="150" y="149" text-anchor="middle" font-size="10" font-weight="bold" fill="#2d5a6b">R1</text>
    
    <!-- Area 1 -->
    <rect x="60" y="260" width="80" height="60" rx="6" fill="url(#area1Grad)" class="area-1"/>
    <text x="100" y="282" text-anchor="middle" class="section-title">Area 1</text>
    <text x="100" y="298" text-anchor="middle" style="font-size:9px;fill:#e8f5e9">Stub Area</text>
    <circle cx="100" cy="305" r="8" fill="#fff" stroke="#558b2f" stroke-width="2" class="router"/>
    <text x="100" y="308" text-anchor="middle" font-size="8" font-weight="bold" fill="#558b2f">R2</text>
    
    <!-- Area 2 -->
    <rect x="240" y="260" width="80" height="60" rx="6" fill="url(#area2Grad)" class="area-2"/>
    <text x="280" y="282" text-anchor="middle" class="section-title">Area 2</text>
    <text x="280" y="298" text-anchor="middle" style="font-size:9px;fill:#fbe9e7">Regular</text>
    <circle cx="280" cy="305" r="8" fill="#fff" stroke="#e64a19" stroke-width="2" class="router"/>
    <text x="280" y="308" text-anchor="middle" font-size="8" font-weight="bold" fill="#e64a19">R3</text>
    
    <!-- ABR Router -->
    <circle cx="210" cy="200" r="10" fill="#ffeb3b" stroke="#f57f17" stroke-width="2" class="router"/>
    <text x="210" y="204" text-anchor="middle" font-size="8" font-weight="bold" fill="#f57f17">ABR</text>
  </g>
  
  <!-- Algorithm Type Boxes - Left Side -->
  <g data-narration="Distance Vector algorithms use Bellman-Ford equation, periodic updates every 30 seconds">
    <rect x="10" y="330" width="95" height="60" rx="5" fill="url(#boxGrad)" filter="url(#shadow)" class="box-anim-1"/>
    <text x="57" y="348" text-anchor="middle" class="label" style="font-weight:bold;font-size:11px">Distance Vector</text>
    <text x="57" y="362" text-anchor="middle" class="detail">Bellman-Ford</text>
    <text x="57" y="376" text-anchor="middle" class="detail">RIP: 30s updates</text>
  </g>
  
  <g data-narration="Link State algorithms use Dijkstra's shortest path algorithm">
    <rect x="110" y="330" width="95" height="60" rx="5" fill="url(#boxGrad)" filter="url(#shadow)" class="box-anim-2"/>
    <text x="157" y="348" text-anchor="middle" class="label" style="font-weight:bold;font-size:11px">Link State</text>
    <text x="157" y="362" text-anchor="middle" class="detail">Dijkstra's SPF</text>
    <text x="157" y="376" text-anchor="middle" class="detail">OSPF: LSDB sync</text>
  </g>
  
  <g data-narration="Path Vector protocols like BGP use AS_PATH attribute for loop prevention">
    <rect x="210" y="330" width="95" height="60" rx="5" fill="url(#boxGrad)" filter="url(#shadow)" class="box-anim-3"/>
    <text x="257" y="348" text-anchor="middle" class="label" style="font-weight:bold;font-size:11px">Path Vector</text>
    <text x="257" y="362" text-anchor="middle" class="detail">BGP: AS_PATH</text>
    <text x="257" y="376" text-anchor="middle" class="detail">Policy-based</text>
  </g>
  
  <g data-narration="Hybrid protocols like EIGRP combine distance vector and link state features">
    <rect x="310" y="330" width="95" height="60" rx="5" fill="url(#boxGrad)" filter="url(#shadow)" class="box-anim-4"/>
    <text x="357" y="348" text-anchor="middle" class="label" style="font-weight:bold;font-size:11px">Hybrid</text>
    <text x="357" y="362" text-anchor="middle" class="detail">EIGRP: DUAL</text>
    <text x="357" y="376" text-anchor="middle" class="detail">Fast converge</text>
  </g>
  
  <!-- ABR Label -->
  <text x="225" y="195" class="detail" style="fill:#666;font-size:9px">Area Border Router</text>
  
  <!-- Arrow indicating hierarchy -->
  <path d="M 380 115 L 380 135 L 375 130 M 380 135 L 385 130" stroke="#666" stroke-width="1.5" fill="none"/>
  <text x="388" y="130" class="detail" style="font-size:9px">Hierarchy</text>
</svg>