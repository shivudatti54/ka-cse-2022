<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="software-metrics-quality-assurance">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d4e8f0"/>
      <stop offset="100%" style="stop-color:#c2dce8"/>
    </linearGradient>
    <linearGradient id="rootGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#2d5a6b"/>
    </linearGradient>
    <linearGradient id="cat1Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <linearGradient id="cat2Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#d58c2a"/>
    </linearGradient>
    <linearGradient id="cat3Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5bc0de"/>
      <stop offset="100%" style="stop-color:#2a7a94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInTop {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInBottom {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: white; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    .detail-text { font-family: Arial, sans-serif; font-size: 11px; fill: white; }
    .root-node { animation: fadeIn 0.8s ease-out forwards; }
    .cat-node { animation: slideInTop 0.6s ease-out forwards; }
    .sub-node { animation: slideInBottom 0.6s ease-out forwards; opacity: 0; }
    .arrow { animation: fadeIn 1s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .box-1 { animation: slideInLeft 0.7s ease-out 0.3s forwards; opacity: 0; }
    .box-2 { animation: slideInRight 0.7s ease-out 0.4s forwards; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <rect x="10" y="10" width="400" height="35" rx="8" fill="url(#rootGradient)" filter="url(#shadow)"/>
  <text x="210" y="33" text-anchor="middle" class="title-text">McCall Quality Model</text>
  
  <!-- Arrows from root to categories -->
  <g class="arrow">
    <line x1="210" y1="65" x2="90" y2="100" stroke="#4a90a4" stroke-width="2"/>
    <polygon points="85,95 90,105 80,105" fill="#4a90a4"/>
  </g>
  <g class="arrow">
    <line x1="210" y1="65" x2="210" y2="100" stroke="#4a90a4" stroke-width="2"/>
    <polygon points="205,95 210,105 215,95" fill="#4a90a4"/>
  </g>
  <g class="arrow">
    <line x1="210" y1="65" x2="330" y2="100" stroke="#4a90a4" stroke-width="2"/>
    <polygon points="335,95 330,105 340,105" fill="#4a90a4"/>
  </g>
  
  <!-- Root Node -->
  <rect class="root-node pulse" x="140" y="45" width="140" height="30" rx="15" fill="url(#rootGradient)" filter="url(#shadow)"/>
  <text x="210" y="65" text-anchor="middle" class="label-text" style="font-size:12px;">Software Quality</text>
  
  <!-- Category Nodes -->
  <g data-narration="Product Operation - Defines how well the software performs its intended functions">
    <rect class="cat-node" x="30" y="110" width="120" height="50" rx="8" fill="url(#cat1Gradient)" filter="url(#shadow)"/>
    <text x="90" y="130" text-anchor="middle" class="label-text">Product Operation</text>
    <text x="90" y="148" text-anchor="middle" class="detail-text">How software performs</text>
  </g>
  
  <g data-narration="Product Revision - Defines how well software can be corrected, adapted, or enhanced">
    <rect class="cat-node" x="150" y="110" width="120" height="50" rx="8" fill="url(#cat2Gradient)" filter="url(#shadow)"/>
    <text x="210" y="130" text-anchor="middle" class="label-text">Product Revision</text>
    <text x="210" y="148" text-anchor="middle" class="detail-text">Maintainability</text>
  </g>
  
  <g data-narration="Product Transition - Defines how well software can transfer to different environments">
    <rect class="cat-node" x="270" y="110" width="120" height="50" rx="8" fill="url(#cat3Gradient)" filter="url(#shadow)"/>
    <text x="330" y="130" text-anchor="middle" class="label-text">Product Transition</text>
    <text x="330" y="148" text-anchor="middle" class="detail-text">Portability</text>
  </g>
  
  <!-- Sub-factors arrows -->
  <g class="arrow">
    <line x1="90" y1="160" x2="50" y2="190" stroke="#5cb85c" stroke-width="1.5"/>
    <line x1="90" y1="160" x2="90" y2="190" stroke="#5cb85c" stroke-width="1.5"/>
    <line x1="90" y1="160" x2="130" y2="190" stroke="#5cb85c" stroke-width="1.5"/>
  </g>
  <g class="arrow">
    <line x1="210" y1="160" x2="170" y2="190" stroke="#f0ad4e" stroke-width="1.5"/>
    <line x1="210" y1="160" x2="210" y2="190" stroke="#f0ad4e" stroke-width="1.5"/>
    <line x1="210" y1="160" x2="250" y2="190" stroke="#f0ad4e" stroke-width="1.5"/>
  </g>
  <g class="arrow">
    <line x1="330" y1="160" x2="290" y2="190" stroke="#5bc0de" stroke-width="1.5"/>
    <line x1="330" y1="160" x2="330" y2="190" stroke="#5bc0de" stroke-width="1.5"/>
    <line x1="330" y1="160" x2="370" y2="190" stroke="#5bc0de" stroke-width="1.5"/>
  </g>
  
  <!-- Sub-factor Nodes - Product Operation -->
  <g data-narration="Correctness - Degree to which software meets specifications">
    <rect class="sub-node" x="30" y="195" width="55" height="35" rx="5" fill="#5cb85c" filter="url(#shadow)" style="animation-delay:0.5s"/>
    <text x="57" y="212" text-anchor="middle" class="detail-text" style="font-weight:bold;">Correctness</text>
    <text x="57" y="224" text-anchor="middle" class="detail-text" style="font-size:9px;">Meets specs</text>
  </g>
  
  <g data-narration="Reliability - Degree to which software maintains performance over time">
    <rect class="sub-node" x="90" y="195" width="55" height="35" rx="5" fill="#5cb85c" filter="url(#shadow)" style="animation-delay:0.6s"/>
    <text x="117" y="212" text-anchor="middle" class="detail-text" style="font-weight:bold;">Reliability</text>
    <text x="117" y="224" text-anchor="middle" class="detail-text" style="font-size:9px;">Consistency</text>
  </g>
  
  <g data-narration="Efficiency - Resource usage relative to performance">
    <rect class="sub-node" x="150" y="195" width="55" height="35" rx="5" fill="#5cb85c" filter="url(#shadow)" style="animation-delay:0.7s"/>
    <text x="177" y="212" text-anchor="middle" class="detail-text" style="font-weight:bold;">Efficiency</text>
    <text x="177" y="224" text-anchor="middle" class="detail-text" style="font-size:9px;">Resources</text>
  </g>
  
  <!-- Sub-factor Nodes - Product Revision -->
  <g data-narration="Maintainability - Ease of fixing defects">
    <rect class="sub-node" x="170" y="195" width="55" height="35" rx="5" fill="#f0ad4e" filter="url(#shadow)" style="animation-delay:0.5s"/>
    <text x="197" y="212" text-anchor="middle" class="detail-text" style="font-weight:bold;">Maintainability</text>
    <text x="197" y="224" text-anchor="middle" class="detail-text" style="font-size:9px;">Fix defects</text>
  </g>
  
  <g data-narration="Testability - Ease of verifying software correctness">
    <rect class="sub-node" x="230" y="195" width="55" height="35" rx="5" fill="#f0ad4e" filter="url(#shadow)" style="animation-delay:0.6s"/>
    <text x="257" y="212" text-anchor="middle" class="detail-text" style="font-weight:bold;">Testability</text>
    <text x="257" y="224" text-anchor="middle" class="detail-text" style="font-size:9px;">Verify</text>
  </g>
  
  <g data-narration="Flexibility - Ease of adaptation to new requirements">
    <rect class="sub-node" x="290" y="195" width="55" height="35" rx="5" fill="#f0ad4e" filter="url(#shadow)" style="animation-delay:0.7s"/>
    <text x="317" y="212" text-anchor="middle" class="detail-text" style="font-weight:bold;">Flexibility</text>
    <text x="317" y="224" text-anchor="middle" class="detail-text" style="font-size:9px;">Adapt</text>
  </g>
  
  <!-- Sub-factor Nodes - Product Transition -->
  <g data-narration="Portability - Ease of transferring to different environments">
    <rect class="sub-node" x="290" y="195" width="55" height="35" rx="5" fill="#5bc0de" filter="url(#shadow)" style="animation-delay:0.5s"/>
    <text x="317" y="212" text-anchor="middle" class="detail-text" style="font-weight:bold;">Portability</text>
    <text x="317" y="224" text-anchor="middle" class="detail-text" style="font-size:9px;">Transfer</text>
  </g>
  
  <g data-narration="Reusability - Degree to which components can be reused">
    <rect class="sub-node" x="350" y="195" width="55" height="35" rx="5" fill="#5bc0de" filter="url(#shadow)" style="animation-delay:0.6s"/>
    <text x="377" y="212" text-anchor="middle" class="detail-text" style="font-weight:bold;">Reusability</text>
    <text x="377" y="224" text-anchor="middle" class="detail-text" style="font-size:9px;">Components</text>
  </g>
  
  <!-- Additional Visual Sections - Key Metrics Box -->
  <g data-narration="Key Software Metrics types include Product, Process, and Project metrics for comprehensive quality assessment">
    <rect class="box-1" x="10" y="265" width="130" height="120" rx="8" fill="#ffffff" stroke="#4a90a4" stroke-width="2" filter="url(#shadow)"/>
    <text x="75" y="285" text-anchor="middle" class="label-text" style="fill:#2d5a6b;font-size:12px;">Key Metrics Types</text>
    <line x1="20" y1="295" x2="130" y2="295" stroke="#4a90a4" stroke-width="1"/>
    <text x="20" y1="315" class="detail-text" style="fill:#333;font-size:10px;">• Product Metrics</text>
    <text x="20" y1="330" class="detail-text" style="fill:#333;font-size:10px;">• Process Metrics</text>
    <text x="20" y1="345" class="detail-text" style="fill:#333;font-size:10px;">• Project Metrics</text>
    <text x="20" y1="360" class="detail-text" style="fill:#333;font-size:10px;">• Cyclomatic Complexity</text>
    <text x="20" y1="375" class="detail-text" style="fill:#333;font-size:10px;">• Defect Density</text>
  </g>
  
  <!-- QA Techniques Box -->
  <g data-narration="Quality Assurance techniques include formal inspections, SPC, Six Sigma, and automated testing for continuous improvement">
    <rect class="box-2" x="150" y="265" width="130" height="120" rx="8" fill="#ffffff" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="215" y="285" text-anchor="middle" class="label-text" style="fill:#d58c2a;font-size:12px;">QA Techniques</text>
    <line x1="160" y1="295" x2="270" y2="295" stroke="#f0ad4e" stroke-width="1"/>
    <text x="160" y1="315" class="detail-text" style="fill:#333;font-size:10px;">• Formal Inspections</text>
    <text x="160" y1="330" class="detail-text" style="fill:#333;font-size:10px;">• Statistical Process Ctrl</text>
    <text x="160" y1="345" class="detail-text" style="fill:#333;font-size:10px;">• Six Sigma (DMAIC)</text>
    <text x="160" y1="360" class="detail-text" style="fill:#333;font-size:10px;">• Code Coverage</text>
    <text x="160" y1="375" class="detail-text" style="fill:#333;font-size:10px;">• Mutation Score</text>
  </g>
  
  <!-- ISO 25010 Box -->
  <g data-narration="ISO 25010 defines quality attributes including Functional Suitability, Performance Efficiency, Compatibility, Security, and Maintainability">
    <rect class="box-1" x="290" y="265" width="120" height="120" rx="8" fill="#ffffff" stroke="#5bc0de" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="285" text-anchor="middle" class="label-text" style="fill:#2a7a94;font-size:12px;">ISO 25010</text>
    <line x1="300" y1="295" x2="410" y2="295" stroke="#5bc0de" stroke-width="1"/>
    <text x="300" y1="315" class="detail-text" style="fill:#333;font-size:10px;">• Functional Suitability</text>
    <text x="300" y1="330" class="detail-text" style="fill:#333;font-size:10px;">• Performance Efficiency</text>
    <text x="300" y1="345" class="detail-text" style="fill:#333;font-size:10px;">• Compatibility</text>
    <text x="300" y1="360" class="detail-text" style="fill:#333;font-size:10px;">• Security</text>
    <text x="300" y1="375" class="detail-text" style="fill:#333;font-size:10px;">• Maintainability</text>
  </g>
</svg>