<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="project-planning-estimation">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8fce8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5bc0de;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#31b0d5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    .slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line-anim { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out 0.5s forwards; }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #ffffff; }
    .wbs-text { font-family: Arial, sans-serif; font-size: 10px; fill: #333; font-weight: bold; }
    .wbs-detail { font-family: Arial, sans-serif; font-size: 8px; fill: #555; }
    .section-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #2c3e50; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title fade-in">Project Planning &amp; Estimation</text>
  <line x1="80" y1="40" x2="340" y2="40" stroke="#4a90d9" stroke-width="2" class="fade-in" style="animation-delay: 0.3s"/>
  
  <!-- WBS Tree Structure -->
  <g transform="translate(20, 60)" data-narration="Work Breakdown Structure - hierarchical decomposition of project into phases, deliverables, and work packages">
    <!-- Root Node -->
    <rect x="0" y="0" width="90" height="28" rx="5" fill="url(#nodeGrad)" filter="url(#shadow)" class="slide-left"/>
    <text x="45" y="18" text-anchor="middle" class="wbs-text" fill="white">PROJECT</text>
    
    <!-- Level 1 - Phases -->
    <line x1="45" y1="28" x2="45" y2="55" stroke="#666" stroke-width="1.5" class="line-anim"/>
    <line x1="45" y1="55" x2="15" y2="55" stroke="#666" stroke-width="1.5" class="line-anim"/>
    <line x1="45" y1="55" x2="75" y2="55" stroke="#666" stroke-width="1.5" class="line-anim"/>
    
    <rect x="0" y="55" width="50" height="22" rx="4" fill="#7cb3ea" class="slide-left delay-1"/>
    <text x="25" y="70" text-anchor="middle" class="wbs-text" font-size="9">Planning</text>
    
    <rect x="60" y="55" width="50" height="22" rx="4" fill="#7cb3ea" class="slide-left delay-1"/>
    <text x="85" y="70" text-anchor="middle" class="wbs-text" font-size="9">Development</text>
    
    <!-- Level 2 - Deliverables -->
    <line x1="25" y1="77" x2="25" y2="95" stroke="#666" stroke-width="1" class="line-anim"/>
    <line x1="25" y1="95" x2="5" y2="95" stroke="#666" stroke-width="1" class="line-anim"/>
    <line x1="25" y1="95" x2="45" y2="95" stroke="#666" stroke-width="1" class="line-anim"/>
    
    <rect x="0" y="95" width="40" height="18" rx="3" fill="#a8d4a8" class="slide-left delay-2"/>
    <text x="20" y="107" text-anchor="middle" class="wbs-detail">WBS</text>
    
    <rect x="45" y="95" width="40" height="18" rx="3" fill="#a8d4a8" class="slide-left delay-2"/>
    <text x="65" y="107" text-anchor="middle" class="wbs-detail">Estimation</text>
    
    <line x1="85" y1="77" x2="85" y2="95" stroke="#666" stroke-width="1" class="line-anim"/>
    <line x1="85" y1="95" x2="65" y2="95" stroke="#666" stroke-width="1" class="line-anim"/>
    <line x1="85" y1="95" x2="105" y2="95" stroke="#666" stroke-width="1" class="line-anim"/>
    
    <rect x="60" y="95" width="40" height="18" rx="3" fill="#a8d4a8" class="slide-left delay-2"/>
    <text x="80" y="107" text-anchor="middle" class="wbs-detail">Coding</text>
    
    <rect x="105" y="95" width="40" height="18" rx="3" fill="#a8d4a8" class="slide-left delay-2"/>
    <text x="125" y="107" text-anchor="middle" class="wbs-detail">Testing</text>
  </g>
  
  <!-- Estimation Techniques Box -->
  <g transform="translate(160, 200)" data-narration="Estimation techniques include COCOMO models and Function Point Analysis for effort quantification">
    <rect x="0" y="0" width="120" height="70" rx="6" fill="url(#boxGrad1)" filter="url(#shadow)" class="slide-right"/>
    <text x="60" y="18" text-anchor="middle" class="label">Estimation Techniques</text>
    <text x="10" y="35" class="detail">• COCOMO Models</text>
    <text x="10" y="48" class="detail">• Function Points</text>
    <text x="10" y="61" class="detail">• PERT/CPM</text>
  </g>
  
  <!-- Risk Management Box -->
  <g transform="translate(285, 200)" data-narration="Risk Management uses FMEA matrix and Risk Exposure formula (Probability × Impact)">
    <rect x="0" y="0" width="120" height="70" rx="6" fill="url(#boxGrad2)" filter="url(#shadow)" class="slide-right delay-1"/>
    <text x="60" y="18" text-anchor="middle" class="label">Risk Management</text>
    <text x="10" y="35" class="detail">• FMEA Matrix</text>
    <text x="10" y="48" class="detail">• Risk Exposure</text>
    <text x="10" y="61" class="detail">• Mitigation Plans</text>
  </g>
  
  <!-- COCOMO Formula Box -->
  <g transform="translate(160, 280)" data-narration="COCOMO model formulas for Organic, Semi-Detached, and Embedded project types">
    <rect x="0" y="0" width="120" height="55" rx="6" fill="url(#boxGrad3)" filter="url(#shadow)" class="slide-right delay-2"/>
    <text x="60" y="16" text-anchor="middle" class="label">COCOMO Models</text>
    <text x="10" y="32" class="detail" font-size="9">Organic: 2.4×(KLOC)^1.05</text>
    <text x="10" y="44" class="detail" font-size="9">Semi-Det: 3.0×(KLOC)^1.12</text>
  </g>
  
  <!-- Agile Box -->
  <g transform="translate(285, 280)" data-narration="Agile Estimation uses Story Points with Fibonacci sequence and velocity tracking in Scrum">
    <rect x="0" y="0" width="120" height="55" rx="6" fill="url(#nodeGrad)" filter="url(#shadow)" class="slide-right delay-3"/>
    <text x="60" y="16" text-anchor="middle" class="label">Agile Estimation</text>
    <text x="10" y="32" class="detail" font-size="9">• Story Points</text>
    <text x="10" y="44" class="detail" font-size="9">• Fibonacci Sequence</text>
  </g>
  
  <!-- Gantt Chart Icon -->
  <g transform="translate(30, 290)" data-narration="Gantt Charts provide visual timeline with dependencies for project scheduling">
    <rect x="0" y="0" width="80" height="50" rx="5" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" class="fade-in delay-4"/>
    <text x="40" y="12" text-anchor="middle" class="section-title" font-size="9">Gantt Chart</text>
    <rect x="5" y="18" width="15" height="4" fill="#5bc0de" rx="1"/>
    <rect x="22" y="18" width="20" height="4" fill="#5cb85c" rx="1"/>
    <rect x="44" y="18" width="30" height="4" fill="#f0ad4e" rx="1"/>
    <rect x="5" y="26" width="10" height="4" fill="#5cb85c" rx="1"/>
    <rect x="17" y="26" width="35" height="4" fill="#f0ad4e" rx="1"/>
    <rect x="54" y="26" width="20" height="4" fill="#d9534f" rx="1"/>
    <rect x="5" y="34" width="25" height="4" fill="#f0ad4e" rx="1"/>
    <rect x="32" y="34" width="42" height="4" fill="#d9534f" rx="1"/>
    <line x1="35" y1="16" x2="35" y2="45" stroke="#dee2e6" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Key Stats -->
  <g transform="translate(300, 60)" data-narration="Statistics show 71% of project failures are prevented by effective planning">
    <rect x="0" y="0" width="110" height="45" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="1" class="fade-in delay-3"/>
    <text x="55" y="15" text-anchor="middle" class="section-title" font-size="10">Key Statistics</text>
    <text x="55" y="28" text-anchor="middle" class="pulse" font-size="11" fill="#856404" font-weight="bold">71% failures prevented</text>
    <text x="55" y="40" text-anchor="middle" font-size="9" fill="#856404">with planning (PMI 2023)</text>
  </g>
  
  <!-- Arrow indicators -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Connecting lines between sections -->
  <path d="M 140 235 Q 150 200 160 200" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" class="line-anim"/>
  <path d="M 280 235 Q 285 215 285 210" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" class="line-anim"/>
  
</svg>