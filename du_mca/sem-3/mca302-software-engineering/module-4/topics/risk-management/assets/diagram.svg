<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="risk-management">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#f0e8f4"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4"/>
      <stop offset="100%" style="stop-color:#357a8c"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7cb342"/>
      <stop offset="100%" style="stop-color:#689f38"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a65"/>
      <stop offset="100%" style="stop-color:#f4511e"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ba68c8"/>
      <stop offset="100%" style="stop-color:#8e24aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotateIn {
      from { transform: rotate(-180deg); opacity: 0; }
      to { transform: rotate(0deg); opacity: 1; }
    }
    .title-text { animation: fadeIn 0.8s ease-out; }
    .section-box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .process-step { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .arrow-line { animation: fadeIn 0.8s ease-out; }
    .matrix-cell { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .technique-item { animation: slideIn 0.5s ease-out forwards; opacity: 0; }
    
    .section-box:nth-child(1) { animation-delay: 0.2s; }
    .section-box:nth-child(2) { animation-delay: 0.4s; }
    .section-box:nth-child(3) { animation-delay: 0.6s; }
    .section-box:nth-child(4) { animation-delay: 0.8s; }
    
    .process-step:nth-child(1) { animation-delay: 0.3s; }
    .process-step:nth-child(2) { animation-delay: 0.5s; }
    .process-step:nth-child(3) { animation-delay: 0.7s; }
    .process-step:nth-child(4) { animation-delay: 0.9s; }
    
    .matrix-cell:nth-child(1) { animation-delay: 0.4s; }
    .matrix-cell:nth-child(2) { animation-delay: 0.5s; }
    .matrix-cell:nth-child(3) { animation-delay: 0.6s; }
    .matrix-cell:nth-child(4) { animation-delay: 0.7s; }
    .matrix-cell:nth-child(5) { animation-delay: 0.8s; }
    .matrix-cell:nth-child(6) { animation-delay: 0.9s; }
    .matrix-cell:nth-child(7) { animation-delay: 1.0s; }
    .matrix-cell:nth-child(8) { animation-delay: 1.1s; }
    .matrix-cell:nth-child(9) { animation-delay: 1.2s; }
    
    .technique-item:nth-child(1) { animation-delay: 0.3s; }
    .technique-item:nth-child(2) { animation-delay: 0.4s; }
    .technique-item:nth-child(3) { animation-delay: 0.5s; }
    .technique-item:nth-child(4) { animation-delay: 0.6s; }
    
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .section-label { font-size: 14px; font-weight: bold; fill: #ffffff; }
    .section-detail { font-size: 11px; fill: #ffffff; }
    .process-label { font-size: 12px; font-weight: bold; fill: #ffffff; }
    .matrix-label { font-size: 9px; fill: #ffffff; font-weight: bold; }
    .technique-text { font-size: 10px; fill: #2c3e50; }
    .arrow-text { font-size: 9px; fill: #666; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text">Risk Management</text>
  <text x="210" y="44" text-anchor="middle" font-size="11" fill="#666">Software Engineering Process</text>
  
  <!-- Process Cycle - Center -->
  <g transform="translate(150, 200)">
    <!-- Circular arrow path -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Step 1: Identification -->
    <g class="process-step" data-narration="Risk Identification uses techniques like SWOT, Delphi, and FMEA to discover potential project risks">
      <circle cx="0" cy="-55" r="28" fill="url(#boxGradient1)" filter="url(#shadow)"/>
      <text x="0" y="-58" text-anchor="middle" class="process-label">IDENTIFY</text>
      <text x="0" y="-46" text-anchor="middle" font-size="9" fill="#fff">Risks</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M 20 -40 Q 50 -20 40 10" fill="none" stroke="#4a90a4" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
    
    <!-- Step 2: Analysis -->
    <g class="process-step" data-narration="Risk Analysis assesses probability and impact using the Probability-Impact Matrix">
      <circle cx="55" cy="0" r="28" fill="url(#boxGradient2)" filter="url(#shadow)"/>
      <text x="55" y="-3" text-anchor="middle" class="process-label">ANALYZE</text>
      <text x="55" y="9" text-anchor="middle" font-size="9" fill="#fff">Assess</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M 45 25 Q 20 50 -20 40" fill="none" stroke="#7cb342" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
    
    <!-- Step 3: Mitigation -->
    <g class="process-step" data-narration="Risk Mitigation applies strategies: Avoidance, Transference, or Mitigation to reduce risk impact">
      <circle cx="0" cy="55" r="28" fill="url(#boxGradient3)" filter="url(#shadow)"/>
      <text x="0" y="52" text-anchor="middle" class="process-label">MITIGATE</text>
      <text x="0" y="64" text-anchor="middle" font-size="9" fill="#fff">Strategies</text>
    </g>
    
    <!-- Arrow 3 -->
    <path d="M -40 40 Q -50 20 -40 -10" fill="none" stroke="#ff8a65" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
    
    <!-- Step 4: Monitoring -->
    <g class="process-step" data-narration="Risk Monitoring continuously tracks identified risks and watches for new emerging risks">
      <circle cx="-55" cy="0" r="28" fill="url(#boxGradient4)" filter="url(#shadow)"/>
      <text x="-55" y="-3" text-anchor="middle" class="process-label">MONITOR</text>
      <text x="-55" y="9" text-anchor="middle" font-size="9" fill="#fff">Track</text>
    </g>
    
    <!-- Arrow 4 -->
    <path d="M -45 -25 Q -20 -50 20 -40" fill="none" stroke="#ba68c8" stroke-width="2" marker-end="url(#arrowhead)" class="arrow-line"/>
    
    <!-- Center label -->
    <circle cx="0" cy="0" r="18" fill="#fff" stroke="#ddd" stroke-width="2"/>
    <text x="0" y="-4" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Risk</text>
    <text x="0" y="8" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Register</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Risk Assessment Matrix - Left Side -->
  <g transform="translate(10, 280)">
    <text x="60" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Assessment Matrix</text>
    
    <!-- Matrix grid -->
    <g transform="translate(5, 8)">
      <!-- Column headers -->
      <text x="18" y="8" class="matrix-label" text-anchor="middle">High</text>
      <text x="48" y="8" class="matrix-label" text-anchor="middle">Med</text>
      <text x="78" y="8" class="matrix-label" text-anchor="middle">Low</text>
      
      <!-- Row header -->
      <text x="-2" y="20" font-size="8" text-anchor="end" fill="#666">High</text>
      <text x="-2" y="38" font-size="8" text-anchor="end" fill="#666">Med</text>
      <text x="-2" y="56" font-size="8" text-anchor="end" fill="#666">Low</text>
      
      <!-- Cells -->
      <rect x="10" y="12" width="28" height="18" fill="#e74c3c" rx="3" class="matrix-cell" data-narration="Critical Risk: High probability, High impact - requires immediate action"/>
      <rect x="40" y="12" width="28" height="18" fill="#e67e22" rx="3" class="matrix-cell" data-narration="Major Risk: High probability, Medium impact - needs priority attention"/>
      <rect x="70" y="12" width="28" height="18" fill="#f1c40f" rx="3" class="matrix-cell" data-narration="Moderate Risk: High probability, Low impact - monitor periodically"/>
      
      <rect x="10" y="32" width="28" height="18" fill="#e67e22" rx="3" class="matrix-cell" data-narration="Major Risk: Medium probability, High impact - significant concern"/>
      <rect x="40" y="32" width="28" height="18" fill="#f1c40f" rx="3" class="matrix-cell" data-narration="Moderate Risk: Medium probability, Medium impact - manage actively"/>
      <rect x="70" y="32" width="28" height="18" fill="#2ecc71" rx="3" class="matrix-cell" data-narration="Minor Risk: Medium probability, Low impact - acceptable level"/>
      
      <rect x="10" y="52" width="28" height="18" fill="#f1c40f" rx="3" class="matrix-cell" data-narration="Moderate Risk: Low probability, High impact - contingency planning"/>
      <rect x="40" y="52" width="28" height="18" fill="#2ecc71" rx="3" class="matrix-cell" data-narration="Minor Risk: Low probability, Medium impact - routine monitoring"/>
      <rect x="70" y="52" width="28" height="18" fill="#27ae60" rx="3" class="matrix-cell" data-narration="Negligible Risk: Low probability, Low impact - minimal concern"/>
    </g>
  </g>
  
  <!-- Mitigation Strategies - Right Side -->
  <g transform="translate(265, 280)">
    <text x="60" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Mitigation Strategies</text>
    
    <g transform="translate(0, 10)">
      <!-- Avoidance -->
      <rect x="0" y="0" width="120" height="22" fill="#4a90a4" rx="4" class="section-box" data-narration="Avoidance: Change project plans to eliminate risk entirely"/>
      <text x="60" y="15" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">AVOIDANCE</text>
      
      <!-- Transference -->
      <rect x="0" y="27" width="120" height="22" fill="#7cb342" rx="4" class="section-box" data-narration="Transference: Transfer risk impact to third party (insurance, outsourcing)"/>
      <text x="60" y="42" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">TRANSFERENCE</text>
      
      <!-- Mitigation -->
      <rect x="0" y="54" width="120" height="22" fill="#ff8a65" rx="4" class="section-box" data-narration="Mitigation: Reduce probability or impact of risk through proactive measures"/>
      <text x="60" y="69" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">MITIGATION</text>
      
      <!-- Acceptance -->
      <rect x="0" y="81" width="120" height="22" fill="#ba68c8" rx="4" class="section-box" data-narration="Acceptance: Acknowledge risk and prepare contingency plans if it occurs"/>
      <text x="60" y="96" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">ACCEPTANCE</text>
    </g>
  </g>
  
  <!-- Identification Techniques - Top -->
  <g transform="translate(10, 70)">
    <text x="130" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Identification Techniques</text>
    
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="60" height="18" fill="#e8f4f8" rx="3" stroke="#4a90a4" stroke-width="1" class="technique-item" data-narration="SWOT: Analyze Strengths, Weaknesses, Opportunities, Threats"/>
      <text x="30" y="13" text-anchor="middle" font-size="9" fill="#2c3e50" font-weight="bold">SWOT</text>
      
      <rect x="65" y="0" width="60" height="18" fill="#e8f4f8" rx="3" stroke="#4a90a4" stroke-width="1" class="technique-item" data-narration="Delphi: Anonymous expert consensus method"/>
      <text x="95" y="13" text-anchor="middle" font-size="9" fill="#2c3e50" font-weight="bold">Delphi</text>
      
      <rect x="130" y="0" width="60" height="18" fill="#e8f4f8" rx="3" stroke="#4a90a4" stroke-width="1" class="technique-item" data-narration="FMEA: Failure Modes and Effects Analysis for critical systems"/>
      <text x="160" y="13" text-anchor="middle" font-size="9" fill="#2c3e50" font-weight="bold">FMEA</text>
      
      <rect x="195" y="0" width="60" height="18" fill="#e8f4f8" rx="3" stroke="#4a90a4" stroke-width="1" class="technique-item" data-narration="Checklist: Domain-specific risk catalogs like SEI's taxonomy"/>
      <text x="225" y="13" text-anchor="middle" font-size="9" fill="#2c3e50" font-weight="bold">Checklist</text>
    </g>
  </g>
  
  <!-- Statistics Box -->
  <g transform="translate(265, 70)">
    <rect x="0" y="0" width="120" height="45" fill="#fff" rx="5" stroke="#ddd" stroke-width="1"/>
    <text x="60" y="15" text-anchor="middle" font-size="10" fill="#666">Project Success Rate</text>
    <text x="35" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#7cb342">66%</text>
    <text x="35" y="42" text-anchor="middle" font-size="8" fill="#666">with Risk Mgmt</text>
    <text x="85" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#e74c3c">47%</text>
    <text x="85" y="42" text-anchor="middle" font-size="8" fill="#666">without</text>
  </g>
</svg>