<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="requirements-elicitation-analysis" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e6fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d9534f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9302c;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideIn {
      0% { transform: translateX(-20px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slideUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation: slideIn 0.6s ease-out 0.2s forwards; opacity: 0; }
    .box2 { animation: slideIn 0.6s ease-out 0.4s forwards; opacity: 0; }
    .box3 { animation: slideIn 0.6s ease-out 0.6s forwards; opacity: 0; }
    .box4 { animation: slideIn 0.6s ease-out 0.8s forwards; opacity: 0; }
    .atm-diagram { animation: slideUp 0.8s ease-out 1s forwards; opacity: 0; }
    .connector { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
    .arrow { animation: pulse 2s ease-in-out infinite; }
    text { font-family: Arial, sans-serif; }
    .title-text { font-size: 20px; font-weight: bold; }
    .section-title { font-size: 13px; font-weight: bold; }
    .section-desc { font-size: 10px; }
    .label { font-size: 11px; font-weight: bold; }
    .detail { font-size: 9px; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title-text" fill="#2c3e50">Requirements Elicitation</text>
  <text x="210" y="45" text-anchor="middle" class="title-text" fill="#2c3e50" style="font-size: 16px;">&amp; Analysis</text>
  
  <!-- Section 1: Stakeholder Identification -->
  <g class="box1" data-narration="First, identify stakeholders: Primary (end-users), Secondary (legal teams), Tertiary (regulators)">
    <rect x="15" y="60" width="90" height="70" rx="5" fill="url(#boxGradient1)"/>
    <text x="60" y="75" text-anchor="middle" fill="white" class="section-title">Stakeholder</text>
    <text x="60" y="90" text-anchor="middle" fill="white" class="section-title">Identification</text>
    <text x="60" y="108" text-anchor="middle" fill="#e8f4fc" class="section-desc">Primary, Secondary,</text>
    <text x="60" y="118" text-anchor="middle" fill="#e8f4fc" class="section-desc">Tertiary</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="105" y1="95" x2="135" y2="95" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Section 2: Elicitation Techniques -->
  <g class="box2" data-narration="Next, gather requirements using interviews, ethnography, and prototyping techniques">
    <rect x="135" y="60" width="90" height="70" rx="5" fill="url(#boxGradient2)"/>
    <text x="180" y="75" text-anchor="middle" fill="white" class="section-title">Elicitation</text>
    <text x="180" y="90" text-anchor="middle" fill="white" class="section-title">Techniques</text>
    <text x="180" y="108" text-anchor="middle" fill="#e8f4fc" class="section-desc">Interviews,</text>
    <text x="180" y="118" text-anchor="middle" fill="#e8f4fc" class="section-desc">Prototyping</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="225" y1="95" x2="255" y2="95" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Section 3: Requirements Analysis -->
  <g class="box3" data-narration="Analyze requirements using MoSCoW prioritization, Use Case modeling, and CRUD matrices">
    <rect x="255" y="60" width="90" height="70" rx="5" fill="url(#boxGradient3)"/>
    <text x="300" y="75" text-anchor="middle" fill="white" class="section-title">Requirements</text>
    <text x="300" y="90" text-anchor="middle" fill="white" class="section-title">Analysis</text>
    <text x="300" y="108" text-anchor="middle" fill="#5a4a00" class="section-desc">MoSCoW,</text>
    <text x="300" y="118" text-anchor="middle" fill="#5a4a00" class="section-desc">Use Cases</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="345" y1="95" x2="375" y2="95" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" class="arrow"/>
  
  <!-- Section 4: Validation Methods -->
  <g class="box4" data-narration="Finally, validate through walkthroughs, traceability matrices, and formal inspections">
    <rect x="375" y="60" width="35" height="70" rx="5" fill="url(#boxGradient4)"/>
    <text x="392" y="78" text-anchor="middle" fill="white" class="section-title" style="font-size:10px">Valid</text>
    <text x="392" y="90" text-anchor="middle" fill="white" class="section-title" style="font-size:10px">ation</text>
    <text x="392" y="115" text-anchor="middle" fill="#fce8e8" class="detail">SRS</text>
  </g>
  
  <!-- ATM Use Case Diagram -->
  <g class="atm-diagram" data-narration="Example: ATM Withdrawal Use Case showing Customer actor and system interactions">
    <rect x="15" y="145" width="390" height="240" rx="8" fill="white" stroke="#ddd" stroke-width="2"/>
    
    <text x="210" y="165" text-anchor="middle" fill="#2c3e50" class="section-title">ATM Withdrawal Use Case</text>
    
    <!-- Actor: Customer -->
    <circle cx="60" cy="220" r="18" fill="#4a90d9"/>
    <text x="60" y="224" text-anchor="middle" fill="white" class="label" style="font-size:10px">Customer</text>
    
    <!-- Use Case Boxes -->
    <rect x="130" y="195" width="80" height="40" rx="5" fill="#5cb85c" stroke="#449d44"/>
    <text x="170" y="212" text-anchor="middle" fill="white" class="label" style="font-size:10px">Validate PIN</text>
    
    <rect x="130" y="255" width="80" height="40" rx="5" fill="#5cb85c" stroke="#449d44"/>
    <text x="170" y="272" text-anchor="middle" fill="white" class="label" style="font-size:10px">Dispense</text>
    <text x="170" y="282" text-anchor="middle" fill="white" class="label" style="font-size:10px">Cash</text>
    
    <!-- Bank Database -->
    <rect x="300" y="200" width="80" height="50" rx="5" fill="#f0ad4e" stroke="#ec971f"/>
    <text x="340" y="218" text-anchor="middle" fill="white" class="label" style="font-size:9px">Bank</text>
    <text x="340" y="230" text-anchor="middle" fill="white" class="label" style="font-size:9px">Database</text>
    
    <!-- ATM System -->
    <rect x="280" y="300" width="100" height="60" rx="5" fill="#d9534f" stroke="#c9302c"/>
    <text x="330" y="322" text-anchor="middle" fill="white" class="label" style="font-size:10px">ATM System</text>
    <text x="330" y="342" text-anchor="middle" fill="#fce8e8" class="detail">Database</text>
    
    <!-- Actor Lines -->
    <line x1="60" y1="238" x2="130" y2="215" stroke="#333" stroke-width="1.5"/>
    <line x1="60" y1="238" x2="130" y2="275" stroke="#333" stroke-width="1.5"/>
    
    <!-- Extension Line -->
    <line x1="210" y1="235" x2="210" y2="255" stroke="#333" stroke-width="1.5"/>
    <text x="218" y="248" fill="#666" class="detail">extend</text>
    
    <!-- Bank Connection -->
    <line x1="210" y1="215" x2="300" y2="225" stroke="#333" stroke-width="1.5"/>
    <text x="250" y="215" fill="#666" class="detail">verify</text>
    
    <!-- Database Lines -->
    <line x1="340" y1="250" x2="340" y2="300" stroke="#333" stroke-width="1.5"/>
    <text x="345" y="280" fill="#666" class="detail">update</text>
    
    <!-- Key -->
    <text x="25" y="365" fill="#666" class="detail">Techniques: JAD, Interviews</text>
    <text x="25" y="378" fill="#666" class="detail">MoSCoW: Must have</text>
  </g>
</svg>