<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="use-cases-uml-diagrams">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="actorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec8e3"/>
      <stop offset="100%" style="stop-color:#5ba3c6"/>
    </linearGradient>
    <linearGradient id="usecaseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="boundaryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8f9fa"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="includeArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d63031"/>
    </marker>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
    .detail-text { font-family: Arial, sans-serif; font-size: 12px; fill: #7f8c8d; }
    .concept-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2c3e50; }
    .concept-text { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .section-box { fill: #fff; stroke: #dde1e7; stroke-width: 1; rx: 8; }
    .highlight { fill: #d63031; }
    .dashed-line {
      stroke: #666;
      stroke-width: 1.5;
      stroke-dasharray: 5,3;
      fill: none;
      animation: drawLine 1s ease-out forwards;
    }
    .assoc-line {
      stroke: #555;
      stroke-width: 1.5;
      fill: none;
      animation: drawLine 1s ease-out forwards;
    }
    .include-line {
      stroke: #d63031;
      stroke-width: 1.5;
      stroke-dasharray: 4,2;
      fill: none;
      animation: drawLine 1s ease-out 0.5s forwards;
    }
    .title-anim { animation: fadeIn 0.8s ease-out; }
    .actor-anim { animation: slideIn 0.6s ease-out; }
    .usecase-anim { animation: pulse 2s ease-in-out infinite; }
    .concept-anim { animation: fadeIn 1s ease-out 0.3s both; }
    .box-anim { animation: slideIn 0.5s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title Section -->
  <g class="title-anim">
    <text x="210" y="28" text-anchor="middle" class="title-text">Use Cases UML Diagrams</text>
    <text x="210" y="45" text-anchor="middle" class="detail-text">ATM Withdrawal System Example</text>
  </g>
  
  <!-- Main UML Diagram Area -->
  <g data-narration="UML diagram showing ATM withdrawal use case with actor and system interactions">
    <!-- System Boundary -->
    <rect x="140" y="70" width="260" height="180" fill="url(#boundaryGradient)" stroke="#bdc3c7" stroke-width="2" rx="5" class="box-anim" style="animation-delay: 0.1s"/>
    <text x="265" y="88" text-anchor="middle" class="label-text" style="font-size:12px;font-style:italic;">ATM System</text>
    
    <!-- Actor (Customer) -->
    <g class="actor-anim" data-narration="Customer actor - the primary actor initiating the withdrawal">
      <circle cx="45" cy="130" r="15" fill="url(#actorGradient)" stroke="#4a90a4" stroke-width="2"/>
      <line x1="45" y1="145" x2="45" y2="175" stroke="#5ba3c6" stroke-width="2"/>
      <line x1="30" y1="160" x2="60" y2="160" stroke="#5ba3c6" stroke-width="2"/>
      <line x1="45" y1="175" x2="30" y2="195" stroke="#5ba3c6" stroke-width="2"/>
      <line x1="45" y1="175" x2="60" y2="195" stroke="#5ba3c6" stroke-width="2"/>
      <text x="45" y="215" text-anchor="middle" class="label-text">Customer</text>
    </g>
    
    <!-- Use Cases (Ellipses) -->
    <g class="usecase-anim" data-narration="Withdraw Cash - main use case representing the primary goal">
      <ellipse cx="270" cy="120" rx="55" ry="25" fill="url(#usecaseGradient)" stroke="#7fb08a" stroke-width="2"/>
      <text x="270" y="125" text-anchor="middle" class="label-text" style="font-size:13px;">Withdraw Cash</text>
    </g>
    
    <g class="usecase-anim" data-narration="Balance Check - shows account balance inquiry functionality" style="animation-delay: 0.2s">
      <ellipse cx="210" cy="195" rx="45" ry="22" fill="#d4e6f1" stroke="#85c1e9" stroke-width="2"/>
      <text x="210" y="200" text-anchor="middle" class="label-text" style="font-size:12px;">Balance Check</text>
    </g>
    
    <g class="usecase-anim" data-narration="PIN Validation - included use case required for authentication" style="animation-delay: 0.3s">
      <ellipse cx="340" cy="195" rx="45" ry="22" fill="#fadbd8" stroke="#f1948a" stroke-width="2"/>
      <text x="340" y="200" text-anchor="middle" class="label-text" style="font-size:12px;">PIN Validation</text>
    </g>
    
    <!-- Association Lines -->
    <line x1="60" y1="140" x2="215" y2="120" class="assoc-line" data-narration="Association between Customer and Withdraw Cash"/>
    <line x1="60" y1="155" x2="165" y2="195" class="assoc-line" style="animation-delay: 0.2s"/>
    <line x1="60" y1="155" x2="295" y2="195" class="assoc-line" style="animation-delay: 0.3s"/>
    
    <!-- Include Relationship Arrow -->
    <line x1="270" y1="145" x2="295" y2="195" class="include-line" marker-end="url(#includeArrow)" data-narration="<<include>> relationship - PIN Validation is mandatory for withdrawal"/>
    <text x="300" y="175" class="detail-text" style="fill:#d63031;font-size:10px;">&lt;&lt;include&gt;&gt;</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g class="concept-anim" data-narration="Key UML concepts explained: Actor, Use Case, Include relationship">
    <rect x="10" y="265" width="400" height="125" fill="#fafbfc" stroke="#e0e4e8" stroke-width="1" rx="8"/>
    <text x="25" y="285" class="concept-title">Key UML Concepts</text>
    
    <!-- Concept Box 1 -->
    <rect x="20" y="295" width="115" height="45" class="section-box" rx="5"/>
    <text x="30" y="310" class="concept-title">Actor</text>
    <text x="30" y="325" class="concept-text">External entity interacting</text>
    <text x="30" y="337" class="concept-text">with the system (User/System)</text>
    
    <!-- Concept Box 2 -->
    <rect x="145" y="295" width="125" height="45" class="section-box" rx="5"/>
    <text x="155" y="310" class="concept-title">Use Case</text>
    <text x="155" y="325" class="concept-text">System functionality in</text>
    <text x="155" y="337" class="concept-text">ellipse notation</text>
    
    <!-- Concept Box 3 -->
    <rect x="280" y="295" width="120" height="45" class="section-box" rx="5"/>
    <text x="290" y="310" class="concept-title">&lt;&lt;include&gt;&gt;</text>
    <text x="290" y="325" class="concept-text">Mandatory dependency</text>
    <text x="290" y="337" class="concept-text">(always required)</text>
    
    <!-- Relationship Types -->
    <rect x="20" y="350" width="185" height="30" class="section-box" rx="5"/>
    <text x="30" y="365" class="concept-title">&lt;&lt;extend&gt;&gt;:</text>
    <text x="95" y="365" class="concept-text" style="font-size:10px;">Optional/conditional flow</text>
    
    <rect x="215" y="350" width="185" height="30" class="section-box" rx="5"/>
    <text x="225" y="365" class="concept-title">Generalization:</text>
    <text x="305" y="365" class="concept-text" style="font-size:10px;">Inheritance between actors/use cases</text>
  </g>
  
  <!-- Legend/Indicator -->
  <g class="title-anim" style="animation-delay: 0.5s">
    <circle cx="30" cy="365" r="4" fill="#b8e0d2" stroke="#7fb08a"/>
    <text x="42" y="368" class="detail-text" style="font-size:9px;">Use Case</text>
    <circle cx="100" cy="365" r="5" fill="url(#actorGradient)" stroke="#4a90a4"/>
    <text x="112" y="368" class="detail-text" style="font-size:9px;">Actor</text>
  </g>
</svg>