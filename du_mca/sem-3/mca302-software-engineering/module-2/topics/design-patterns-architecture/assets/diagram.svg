<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="design-patterns-architecture">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#fff5f0"/>
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e0d2"/>
      <stop offset="100%" style="stop-color:#95d5b2"/>
    </linearGradient>
    <linearGradient id="viewGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0b8e8"/>
      <stop offset="100%" style="stop-color:#b8a4d8"/>
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8c8c8"/>
      <stop offset="100%" style="stop-color:#e8a8a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { animation: fadeIn 0.8s ease-out; }
    .model-box { animation: slideInLeft 0.6s ease-out 0.2s both; }
    .view-box { animation: slideInRight 0.6s ease-out 0.4s both; }
    .controller-box { animation: slideInUp 0.6s ease-out 0.3s both; }
    .arrow { animation: fadeIn 0.5s ease-out 0.6s both; }
    .category-box { animation: fadeIn 0.7s ease-out 0.5s both; }
    .solid-box { animation: fadeIn 0.7s ease-out 0.7s both; }
    .box-pulse:hover { animation: pulse 1s infinite; cursor: pointer; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2d3748" class="title">Design Patterns &amp; Architecture</text>
  <line x1="60" y1="42" x2="360" y2="42" stroke="#718096" stroke-width="1" stroke-dasharray="4" class="title"/>
  
  <!-- MVC Architecture Section -->
  <text x="210" y="65" text-anchor="middle" font-size="14" font-weight="600" fill="#4a5568" data-narration="MVC separates concerns into Model, View, and Controller">MVC Architecture</text>
  
  <!-- Model Box -->
  <g class="model-box" data-narration="Model: Manages data and business logic">
    <rect x="30" y="80" width="90" height="70" rx="8" fill="url(#modelGrad)" filter="url(#shadow)"/>
    <text x="75" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#276749">MODEL</text>
    <text x="75" y="125" text-anchor="middle" font-size="10" fill="#2d3748">Data &amp; Logic</text>
  </g>
  
  <!-- View Box -->
  <g class="view-box" data-narration="View: Renders user interface">
    <rect x="300" y="80" width="90" height="70" rx="8" fill="url(#viewGrad)" filter="url(#shadow)"/>
    <text x="345" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#553c9a">VIEW</text>
    <text x="345" y="125" text-anchor="middle" font-size="10" fill="#2d3748">User Interface</text>
  </g>
  
  <!-- Controller Box -->
  <g class="controller-box box-pulse" data-narration="Controller: Handles user input and orchestrates Model and View">
    <rect x="165" y="150" width="90" height="70" rx="8" fill="url(#controllerGrad)" filter="url(#shadow)"/>
    <text x="210" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#9b2c2c">CONTROLLER</text>
    <text x="210" y="195" text-anchor="middle" font-size="10" fill="#2d3748">Input Handling</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow" data-narration="Arrows show data flow: Controller receives input, updates Model, then refreshes View">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#718096"/>
      </marker>
    </defs>
    <!-- Model to Controller -->
    <path d="M100 115 Q135 115 165 135" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- Controller to View -->
    <path d="M255 170 Q280 170 300 155" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- View to Controller -->
    <path d="M300 135 Q280 120 255 120" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- Controller to Model -->
    <path d="M165 185 Q135 195 120 195" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- Model to View -->
    <path d="M100 145 Q75 155 75 170" stroke="#718096" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="135" y="100" font-size="8" fill="#718096">1</text>
    <text x="285" y="145" font-size="8" fill="#718096">2</text>
    <text x="285" y="165" font-size="8" fill="#718096">3</text>
  </g>
  
  <!-- Design Pattern Categories -->
  <g class="category-box" data-narration="Three categories of design patterns: Creational, Structural, Behavioral">
    <rect x="20" y="240" width="120" height="80" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="80" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3748">Pattern Categories</text>
    <rect x="28" y="268" width="35" height="18" rx="3" fill="#fed7d7"/>
    <text x="45" y="281" text-anchor="middle" font-size="9" fill="#9b2c2c">Creational</text>
    <rect x="68" y="268" width="35" height="18" rx="3" fill="#e9d8fd"/>
    <text x="85" y="281" text-anchor="middle" font-size="9" fill="#6b46c1">Structural</text>
    <rect x="108" y="268" width="28" height="18" rx="3" fill="#c6f6d5"/>
    <text x="122" y="281" text-anchor="middle" font-size="9" fill="#276749">Behavioral</text>
    <text x="80" y="302" font-size="8" fill="#718096">Singleton, Factory</text>
    <text x="80" y="312" font-size="8" fill="#718096">Adapter, Decorator</text>
  </g>
  
  <!-- SOLID Principles -->
  <g class="solid-box" data-narration="SOLID principles guide object-oriented design">
    <rect x="150" y="240" width="130" height="80" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="215" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3748">SOLID Principles</text>
    <text x="160" y="275" font-size="9" fill="#e53e3e">S</text><text x="168" y="275" font-size="8" fill="#4a5568">Single Responsibility</text>
    <text x="160" y="288" font-size="9" fill="#3182ce">O</text><text x="168" y="288" font-size="8" fill="#4a5568">Open/Closed</text>
    <text x="160" y="301" font-size="9" fill="#38a169">L</text><text x="168" y="301" font-size="8" fill="#4a5568">Liskov Substitution</text>
    <text x="215" y="314" font-size="8" fill="#805ad5">I</text><text x="220" y="314" font-size="8" fill="#4a5568">Interface Segregation</text>
  </g>
  
  <!-- Architectural Styles -->
  <g class="category-box" data-narration="Architectural patterns: Microservices, Layered, Event-Driven">
    <rect x="290" y="240" width="115" height="80" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="347" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3748">Architecture Styles</text>
    <circle cx="310" cy="278" r="6" fill="#90cdf4"/>
    <text x="320" y="282" font-size="9" fill="#2d3748">MVC</text>
    <circle cx="310" cy="294" r="6" fill="#fbb6ce"/>
    <text x="320" y="298" font-size="9" fill="#2d3748">Microservices</text>
    <circle cx="310" cy="310" r="6" fill="#c6f6d5"/>
    <text x="320" y="314" font-size="9" fill="#2d3748">Event-Driven</text>
  </g>
  
  <!-- Key Stats -->
  <g class="solid-box" data-narration="Industry stats: 68% of enterprise systems use patterns to reduce technical debt">
    <rect x="150" y="330" width="130" height="40" rx="6" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1"/>
    <text x="215" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c5282">68% of Enterprise Systems</text>
    <text x="215" y="362" text-anchor="middle" font-size="9" fill="#4a5568">Use Patterns (2023 Survey)</text>
  </g>
  
  <!-- Legend -->
  <g class="title">
    <text x="35" y="385" font-size="8" fill="#718096">Data Flow:</text>
    <text x="80" y="385" font-size="8" fill="#4a5568">1. Input → Controller</text>
    <text x="165" y="385" font-size="8" fill="#4a5568">2. Controller → View</text>
    <text x="245" y="385" font-size="8" fill="#4a5568">3. Direct Model→View</text>
  </g>
</svg>