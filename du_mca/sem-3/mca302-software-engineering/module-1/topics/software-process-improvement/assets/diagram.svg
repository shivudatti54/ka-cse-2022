<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="software-process-improvement" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d1e8f0"/>
      <stop offset="100%" style="stop-color:#b8dce8"/>
    </linearGradient>
    <linearGradient id="level1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb3b3"/>
      <stop offset="100%" style="stop-color:#ff8080"/>
    </linearGradient>
    <linearGradient id="level2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd9b3"/>
      <stop offset="100%" style="stop-color:#ffb366"/>
    </linearGradient>
    <linearGradient id="level3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff5b3"/>
      <stop offset="100%" style="stop-color:#ffe066"/>
    </linearGradient>
    <linearGradient id="level4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c3e6cb"/>
      <stop offset="100%" style="stop-color:#8fdda3"/>
    </linearGradient>
    <linearGradient id="level5Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b3d9ff"/>
      <stop offset="100%" style="stop-color:#66b3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes growUp {
      from { transform: scaleY(0); transform-origin: bottom; }
      to { transform: scaleY(1); transform-origin: bottom; }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c5282; }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .section-box { fill: #fff; stroke: #4299e1; stroke-width: 1.5; rx: 8; }
    .pyramid { filter: url(#shadow); cursor: pointer; }
    .pyramid:hover { filter: url(#shadow) brightness(1.1); }
    .arrow { stroke: #4299e1; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .anim-fade { animation: fadeIn 1s ease-out forwards; }
    .anim-slide { animation: slideIn 0.8s ease-out forwards; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-grow { animation: growUp 0.6s ease-out forwards; }
    .delay-1 { animation-delay: 0.2s; opacity: 0; }
    .delay-2 { animation-delay: 0.4s; opacity: 0; }
    .delay-3 { animation-delay: 0.6s; opacity: 0; }
    .delay-4 { animation-delay: 0.8s; opacity: 0; }
    .delay-5 { animation-delay: 1s; opacity: 0; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title anim-fade" data-narration="Title showing the main topic: Software Process Improvement">Software Process Improvement</text>
  <line x1="40" y1="38" x2="380" y2="38" stroke="#4299e1" stroke-width="2" class="anim-fade" opacity="0.5"/>
  
  <!-- CMMI Pyramid Stack -->
  <g transform="translate(40, 55)">
    <!-- Level 1: Initial -->
    <g class="pyramid anim-grow delay-1" data-narration="Level 1 - Initial: Process is unpredictable, reactive, and ad-hoc">
      <polygon points="0,55 170,55 170,30 85,5 0,30" fill="url(#level1Grad)" opacity="0.9"/>
      <text x="85" y="25" text-anchor="middle" class="label" font-weight="bold">Level 1</text>
      <text x="85" y="40" text-anchor="middle" class="label" font-weight="bold">Initial</text>
      <text x="85" y="50" text-anchor="middle" class="detail">Unpredictable</text>
    </g>
    
    <!-- Level 2: Managed -->
    <g class="pyramid anim-grow delay-2" data-narration="Level 2 - Managed: Process is characterized for projects and often reactive">
      <polygon points="15,55 155,55 155,30 85,10 15,30" fill="url(#level2Grad)" opacity="0.9"/>
      <text x="85" y="30" text-anchor="middle" class="label" font-weight="bold">Level 2</text>
      <text x="85" y="44" text-anchor="middle" class="label" font-weight="bold">Managed</text>
      <text x="85" y="52" text-anchor="middle" class="detail">Project-level</text>
    </g>
    
    <!-- Level 3: Defined -->
    <g class="pyramid anim-grow delay-3" data-narration="Level 3 - Defined: Process is characterized organizationally and proactive">
      <polygon points="30,55 140,55 140,35 85,18 30,35" fill="url(#level3Grad)" opacity="0.9"/>
      <text x="85" y="32" text-anchor="middle" class="label" font-weight="bold">Level 3</text>
      <text x="85" y="45" text-anchor="middle" class="label" font-weight="bold">Defined</text>
      <text x="85" y="53" text-anchor="middle" class="detail">Organizational</text>
    </g>
    
    <!-- Level 4: Quantitatively Managed -->
    <g class="pyramid anim-grow delay-4" data-narration="Level 4 - Quantitatively Managed: Process is measured and controlled">
      <polygon points="45,55 125,55 125,40 85,26 45,40" fill="url(#level4Grad)" opacity="0.9"/>
      <text x="85" y="36" text-anchor="middle" class="label" font-weight="bold">Level 4</text>
      <text x="85" y="48" text-anchor="middle" class="label" font-weight="bold">Quantitatively</text>
      <text x="85" y="58" text-anchor="middle" class="detail">Managed</text>
    </g>
    
    <!-- Level 5: Optimizing -->
    <g class="pyramid anim-grow delay-5" data-narration="Level 5 - Optimizing: Focus on process improvement and innovation">
      <polygon points="60,55 110,55 110,45 85,35 60,45" fill="url(#level5Grad)" opacity="0.9"/>
      <text x="85" y="40" text-anchor="middle" class="label" font-weight="bold" font-size="11">Level 5</text>
      <text x="85" y="52" text-anchor="middle" class="label" font-weight="bold" font-size="11">Optimizing</text>
    </g>
  </g>
  
  <!-- Right side info boxes -->
  <g transform="translate(220, 55)">
    <!-- Box 1: Key Benefits -->
    <rect x="0" y="0" width="180" height="58" class="section-box anim-slide delay-1" data-narration="Key Benefits: Cost reduction of 18-25% and improved defect detection by 40-60%"/>
    <text x="10" y="18" class="label" font-weight="bold" fill="#2c5282">Key Benefits</text>
    <text x="10" y="32" class="detail">• Cost reduction: 18-25%</text>
    <text x="10" y="44" class="detail">• Defect detection: +40-60%</text>
    <text x="10" y="54" class="detail">• CMMI Level 5 target</text>
    
    <!-- Box 2: SPI Frameworks -->
    <rect x="0" y="68" width="180" height="70" class="section-box anim-slide delay-2" data-narration="SPI Frameworks include CMMI, ISO/IEC 15504 SPICE, Six Sigma DMAIC, and Agile methodologies"/>
    <text x="10" y="86" class="label" font-weight="bold" fill="#2c5282">SPI Frameworks</text>
    <text x="10" y="102" class="detail">• CMMI (5 maturity levels)</text>
    <text x="10" y="114" class="detail">• ISO/IEC 15504 (SPICE)</text>
    <text x="10" y="126" class="detail">• Six Sigma (DMAIC)</text>
    <text x="10" y="136" class="detail">• Agile SPI &amp; PSP</text>
    
    <!-- Box 3: Key Process Areas -->
    <rect x="0" y="148" width="180" height="55" class="section-box anim-slide delay-3" data-narration="CMMI Key Process Areas include Requirements Management, Project Planning, and Process Quality Assurance"/>
    <text x="10" y="166" class="label" font-weight="bold" fill="#2c5282">CMMI Key Process Areas</text>
    <text x="10" y="182" class="detail">• Requirements Management</text>
    <text x="10" y="194" class="detail">• Project Planning</text>
    <text x="10" y="204" class="detail">• Quality Assurance</text>
    
    <!-- Box 4: Six Sigma -->
    <rect x="0" y="213" width="180" height="50" class="section-box anim-slide delay-4" data-narration="Six Sigma uses DMAIC methodology: Define, Measure, Analyze, Improve, Control"/>
    <text x="10" y="231" class="label" font-weight="bold" fill="#2c5282">Six Sigma (DMAIC)</text>
    <text x="10" y="247" class="detail">D Define • M Measure • A Analyze</text>
    <text x="10" y="259" class="detail">I Improve • C Control</text>
  </g>
  
  <!-- Bottom info bar -->
  <g transform="translate(10, 365)">
    <rect x="0" y="0" width="400" height="25" fill="#2c5282" rx="5" class="anim-fade" data-narration="Indian IT companies like TCS and Infosys use SPI for CMMI Level 5 certification"/>
    <text x="200" y="16" text-anchor="middle" fill="#fff" class="detail" font-size="11">Indian IT: TCS • Infosys use SPI for CMMI Level 5</text>
  </g>
  
  <!-- Arrow indicators -->
  <g class="anim-fade" opacity="0.7">
    <path d="M130,340 L130,360 L150,360" fill="none" stroke="#4299e1" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4299e1"/>
    </marker>
  </defs>
</svg>