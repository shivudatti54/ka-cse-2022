<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="waterfall-agile-scrum">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f8f0"/>
    </linearGradient>
    <linearGradient id="waterfallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2c5aa0"/>
    </linearGradient>
    <linearGradient id="agileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c"/>
      <stop offset="100%" style="stop-color:#3d8b3d"/>
    </linearGradient>
    <linearGradient id="scrumGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#d98c1d"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes flowDown {
      0% { stroke-dashoffset: 30; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes iterate {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    .waterfall-box { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .agile-box { animation: fadeIn 0.8s ease-out 0.3s forwards; opacity: 0; }
    .scrum-box { animation: fadeIn 0.8s ease-out 0.5s forwards; opacity: 0; }
    .arrow-anim { animation: flowDown 1s linear infinite; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .iterate-anim { animation: iterate 1.5s ease-in-out infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" class="title">Waterfall, Agile &amp; Scrum</text>
  <line x1="20" y1="38" x2="400" y2="38" stroke="#ccc" stroke-width="1"/>
  
  <!-- Waterfall Section -->
  <g class="waterfall-box" data-narration="Waterfall Model: Sequential phases flowing downwards like water">
    <rect x="20" y="50" width="160" height="28" rx="4" fill="url(#waterfallGrad)"/>
    <text x="100" y="68" text-anchor="middle" class="section-title">WATERFALL</text>
    
    <!-- Waterfall phases -->
    <g transform="translate(30, 85)">
      <rect x="0" y="0" width="140" height="24" rx="3" fill="#d6eaf8" stroke="#4a90d9" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" class="label">Requirements</text>
    </g>
    <g transform="translate(30, 113)">
      <rect x="0" y="0" width="140" height="24" rx="3" fill="#d6eaf8" stroke="#4a90d9" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" class="label">Design</text>
    </g>
    <g transform="translate(30, 141)">
      <rect x="0" y="0" width="140" height="24" rx="3" fill="#d6eaf8" stroke="#4a90d9" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" class="label">Implementation</text>
    </g>
    <g transform="translate(30, 169)">
      <rect x="0" y="0" width="140" height="24" rx="3" fill="#d6eaf8" stroke="#4a90d9" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" class="label">Verification</text>
    </g>
    <g transform="translate(30, 197)">
      <rect x="0" y="0" width="140" height="24" rx="3" fill="#d6eaf8" stroke="#4a90d9" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" class="label">Maintenance</text>
    </g>
    
    <!-- Waterfall arrows -->
    <g stroke="#4a90d9" stroke-width="2" fill="none" class="arrow-anim">
      <path d="M100 109 L100 113"/>
      <polygon points="100,117 95,112 105,112" fill="#4a90d9"/>
      <path d="M100 137 L100 141"/>
      <polygon points="100,145 95,140 105,140" fill="#4a90d9"/>
      <path d="M100 165 L100 169"/>
      <polygon points="100,173 95,168 105,168" fill="#4a90d9"/>
      <path d="M100 193 L100 197"/>
      <polygon points="100,201 95,196 105,196" fill="#4a90d9"/>
    </g>
  </g>
  
  <!-- Agile Section -->
  <g class="agile-box" data-narration="Agile: Iterative approach with customer collaboration">
    <rect x="200" y="50" width="100" height="28" rx="4" fill="url(#agileGrad)"/>
    <text x="250" y="68" text-anchor="middle" class="section-title">AGILE</text>
    
    <!-- Agile iterative cycles -->
    <g class="iterate-anim">
      <g transform="translate(205, 85)">
        <rect x="0" y="0" width="90" height="35" rx="4" fill="#d4edda" stroke="#5cb85c" stroke-width="1"/>
        <text x="45" y="14" text-anchor="middle" class="label">Iteration 1</text>
        <text x="45" y="26" text-anchor="middle" class="detail">Plan → Build → Test</text>
      </g>
      <g transform="translate(205, 124)">
        <rect x="0" y="0" width="90" height="35" rx="4" fill="#d4edda" stroke="#5cb85c" stroke-width="1"/>
        <text x="45" y="14" text-anchor="middle" class="label">Iteration 2</text>
        <text x="45" y="26" text-anchor="middle" class="detail">Plan → Build → Test</text>
      </g>
      <g transform="translate(205, 163)">
        <rect x="0" y="0" width="90" height="35" rx="4" fill="#d4edda" stroke="#5cb85c" stroke-width="1"/>
        <text x="45" y="14" text-anchor="middle" class="label">Iteration 3</text>
        <text x="45" y="26" text-anchor="middle" class="detail">Plan → Build → Test</text>
      </g>
    </g>
    
    <!-- Curved arrows for iteration -->
    <g stroke="#5cb85c" stroke-width="2" fill="none" class="pulse-anim">
      <path d="M295 120 Q305 108 295 95"/>
      <polygon points="295,95 290,102 300,102" fill="#5cb85c"/>
      <path d="M295 159 Q305 147 295 134"/>
      <polygon points="295,134 290,141 300,141" fill="#5cb85c"/>
    </g>
  </g>
  
  <!-- Scrum Section -->
  <g class="scrum-box" data-narration="Scrum Framework: Sprint-based with defined roles and events">
    <rect x="310" y="50" width="95" height="28" rx="4" fill="url(#scrumGrad)"/>
    <text x="357" y="68" text-anchor="middle" class="section-title">SCRUM</text>
    
    <!-- Scrum elements -->
    <g transform="translate(310, 85)">
      <rect x="0" y="0" width="95" height="20" rx="3" fill="#fce4d4" stroke="#f0ad4e" stroke-width="1"/>
      <text x="47" y="14" text-anchor="middle" class="label">Sprint (2-4 wks)</text>
    </g>
    <g transform="translate(310, 109)">
      <rect x="0" y="0" width="45" height="20" rx="3" fill="#fce4d4" stroke="#f0ad4e" stroke-width="1"/>
      <text x="22" y="14" text-anchor="middle" class="detail">Daily Scrum</text>
    </g>
    <g transform="translate(358" y="109">
      <rect x="0" y="0" width="47" height="20" rx="3" fill="#fce4d4" stroke="#f0ad4e" stroke-width="1"/>
      <text x="23" y="14" text-anchor="middle" class="detail">Sprint Review</text>
    </g>
    <g transform="translate(310, 133)">
      <rect x="0" y="0" width="45" height="20" rx="3" fill="#fce4d4" stroke="#f0ad4e" stroke-width="1"/>
      <text x="22" y="14" text-anchor="middle" class="detail">Sprint Plan</text>
    </g>
    <g transform="translate(358" y="133">
      <rect x="0" y="0" width="47" height="20" rx="3" fill="#fce4d4" stroke="#f0ad4e" stroke-width="1"/>
      <text x="23" y="14" text-anchor="middle" class="detail">Retrospective</text>
    </g>
    
    <!-- Scrum roles -->
    <g transform="translate(310, 160)">
      <rect x="0" y="0" width="95" height="40" rx="3" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1"/>
      <text x="47" y="12" text-anchor="middle" class="label" font-weight="bold">Roles</text>
      <text x="47" y="24" text-anchor="middle" class="detail">Product Owner</text>
      <text x="47" y="34" text-anchor="middle" class="detail">Scrum Master</text>
    </g>
    <g transform="translate(310, 204)">
      <rect x="0" y="0" width="95" height="30" rx="3" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1"/>
      <text x="47" y="12" text-anchor="middle" class="label" font-weight="bold">Artifacts</text>
      <text x="47" y="22" text-anchor="middle" class="detail">Product Backlog</text>
    </g>
  </g>
  
  <!-- Key Stats Box -->
  <g data-narration="Industry statistics showing Agile adoption">
    <rect x="20" y="235" width="180" height="40" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="30" y="248" class="label" font-weight="bold">Agile Adoption</text>
    <text x="30" y="262" class="detail">85% of organizations use Agile</text>
    <text x="30" y="272" class="detail">66% implement Scrum</text>
  </g>
  
  <!-- Comparison Arrows -->
  <g data-narration="Comparison: Waterfall is sequential while Agile/Scrum is iterative">
    <path d="M180 260 L200 260" stroke="#999" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Agile Principles -->
  <g data-narration="Agile Manifesto values and principles">
    <rect x="210" y="235" width="195" height="50" rx="4" fill="#f8f9fa" stroke="#5cb85c" stroke-width="1"/>
    <text x="220" y="248" class="label" font-weight="bold">Agile Values</text>
    <text x="220" y="262" class="detail">Individuals &amp; interactions</text>
    <text x="220" y="274" class="detail">Working software</text>
    <text x="220" y="282" class="detail">Customer collaboration</text>
  </g>
  
  <!-- Legend/Key -->
  <g data-narration="Visual legend explaining diagram elements">
    <line x1="20" y1="300" x2="400" y2="300" stroke="#ccc" stroke-width="1"/>
    <rect x="20" y="308" width="12" height="12" rx="2" fill="#4a90d9"/>
    <text x="38" y="318" class="detail">Waterfall (Linear)</text>
    <rect x="120" y="308" width="12" height="12" rx="2" fill="#5cb85c"/>
    <text x="138" y="318" class="detail">Agile (Iterative)</text>
    <rect x="220" y="308" width="12" height="12" rx="2" fill="#f0ad4e"/>
    <text x="238" y="318" class="detail">Scrum (Framework)</text>
  </g>
  
  <!-- Bottom note -->
  <g data-narration="Key takeaway: Modern development embraces flexibility">
    <rect x="20" y="330" width="380" height="30" rx="4" fill="#e8f4fc" stroke="#4a90d9" stroke-width="1"/>
    <text x="210" y="350" text-anchor="middle" class="label">Shift from rigid to adaptable methodologies</text>
  </g>
</svg>