<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="software-development-lifecycle">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6cf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#88d8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcedc1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5e1a5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fab1a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e17055;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase5Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase6Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dfe6e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2bec3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3436; }
    .phase-label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #2d3436; }
    .phase-detail { font-family: Arial, sans-serif; font-size: 10px; fill: #636e72; }
    .model-text { font-family: Arial, sans-serif; font-size: 11px; fill: #636e72; }
    .stat-text { font-family: Arial, sans-serif; font-size: 10px; fill: #2d3436; font-weight: bold; }
    .title-group { animation: fadeIn 1s ease-out; }
    .phase-box { animation: slideIn 0.8s ease-out backwards; }
    .phase-1 { animation-delay: 0.2s; }
    .phase-2 { animation-delay: 0.35s; }
    .phase-3 { animation-delay: 0.5s; }
    .phase-4 { animation-delay: 0.65s; }
    .phase-5 { animation-delay: 0.8s; }
    .phase-6 { animation-delay: 0.95s; }
    .arrow-anim { animation: arrowPulse 2s infinite; }
    .feedback-loop { animation: pulse 3s infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <g class="title-group">
    <text x="210" y="28" text-anchor="middle" class="title-text">Software Development</text>
    <text x="210" y="48" text-anchor="middle" class="title-text" style="font-size: 18px;">Lifecycle (SDLC)</text>
  </g>
  
  <!-- Phase Boxes - Row 1: Requirements to Implementation -->
  <!-- Phase 1: Requirements -->
  <g class="phase-box phase-1" data-narration="Requirements Analysis: Gathering and documenting user needs, creating SRS (Software Requirements Specification)">
    <rect x="15" y="70" width="115" height="55" rx="8" fill="url(#phase1Grad)" stroke="#00b894" stroke-width="1.5"/>
    <text x="72" y="88" text-anchor="middle" class="phase-label">1. Requirements</text>
    <text x="72" y="103" text-anchor="middle" class="phase-detail">SRS Documentation</text>
    <text x="72" y="116" text-anchor="middle" class="phase-detail">User Needs Analysis</text>
  </g>
  
  <!-- Arrow 1 -->
  <g class="arrow-anim">
    <path d="M135 97 L155 97" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Phase 2: Design -->
  <g class="phase-box phase-2" data-narration="System Design: Creating architecture diagrams, ER models, and technical specifications">
    <rect x="160" y="70" width="115" height="55" rx="8" fill="url(#phase2Grad)" stroke="#00b894" stroke-width="1.5"/>
    <text x="217" y="88" text-anchor="middle" class="phase-label">2. Design</text>
    <text x="217" y="103" text-anchor="middle" class="phase-detail">Architecture Diagrams</text>
    <text x="217" y="116" text-anchor="middle" class="phase-detail">ER Models</text>
  </g>
  
  <!-- Arrow 2 -->
  <g class="arrow-anim">
    <path d="M280 97 L300 97" stroke="#636e72" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Phase 3: Implementation -->
  <g class="phase-box phase-3" data-narration="Implementation: Coding, version control with Git, following coding standards">
    <rect x="305" y="70" width="105" height="55" rx="8" fill="url(#phase3Grad)" stroke="#f39c12" stroke-width="1.5"/>
    <text x="357" y="88" text-anchor="middle" class="phase-label">3. Implementation</text>
    <text x="357" y="103" text-anchor="middle" class="phase-detail">Coding &amp; Git</text>
    <text x="357" y="116" text-anchor="middle" class="phase-detail">Code Standards</text>
  </g>
  
  <!-- Phase 4: Testing -->
  <g class="phase-box phase-4" data-narration="Testing: Unit, Integration, System, and UAT testing to find defects">
    <rect x="305" y="140" width="105" height="55" rx="8" fill="url(#phase4Grad)" stroke="#e17055" stroke-width="1.5"/>
    <text x="357" y="158" text-anchor="middle" class="phase-label">4. Testing</text>
    <text x="357" y="173" text-anchor="middle" class="phase-detail">Unit &amp; Integration</text>
    <text x="357" y="186" text-anchor="middle" class="phase-detail">UAT</text>
  </g>
  
  <!-- Arrow 4 -->
  <g class="arrow-anim">
    <path d="M357 130 L357 150" stroke="#636e72" stroke-width="2" fill="none"/>
    <polygon points="353,145 357,155 361,145" fill="#636e72"/>
  </g>
  
  <!-- Phase 5: Deployment -->
  <g class="phase-box phase-5" data-narration="Deployment: Releasing software to production environments">
    <rect x="160" y="140" width="115" height="55" rx="8" fill="url(#phase5Grad)" stroke="#0984e3" stroke-width="1.5"/>
    <text x="217" y="158" text-anchor="middle" class="phase-label" fill="white">5. Deployment</text>
    <text x="217" y="173" text-anchor="middle" class="phase-detail" fill="white">Production Release</text>
    <text x="217" y="186" text-anchor="middle" class="phase-detail" fill="white">CI/CD Pipelines</text>
  </g>
  
  <!-- Arrow 5 -->
  <g class="arrow-anim">
    <path d="M280 167 L300 167" stroke="#636e72" stroke-width="2" fill="none"/>
    <polygon points="296,163 306,167 296,171" fill="#636e72"/>
  </g>
  
  <!-- Phase 6: Maintenance -->
  <g class="phase-box phase-6" data-narration="Maintenance: Bug tracking, updates, and continuous improvement">
    <rect x="15" y="140" width="115" height="55" rx="8" fill="url(#phase6Grad)" stroke="#636e72" stroke-width="1.5"/>
    <text x="72" y="158" text-anchor="middle" class="phase-label">6. Maintenance</text>
    <text x="72" y="173" text-anchor="middle" class="phase-detail">Bug Tracking</text>
    <text x="72" y="186" text-anchor="middle" class="phase-detail">Updates &amp; Support</text>
  </g>
  
  <!-- Arrow 6 (down) -->
  <g class="arrow-anim">
    <path d="M72 130 L72 150" stroke="#636e72" stroke-width="2" fill="none"/>
    <polygon points="68,145 72,155 76,145" fill="#636e72"/>
  </g>
  
  <!-- Feedback Loop Arrow -->
  <g class="feedback-loop" data-narration="Feedback Loop: Maintenance phase feeds back to Requirements for continuous improvement">
    <path d="M45 205 Q45 225 90 225 Q140 225 140 205" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
    <text x="92" y="232" text-anchor="middle" class="model-text" fill="#e74c3c" font-size="9">Feedback Loop</text>
    <polygon points="140,200 148,208 140,216" fill="#e74c3c"/>
  </g>
  
  <!-- Models Section -->
  <g data-narration="SDLC Models: Waterfall (linear), Agile (iterative), Spiral (risk-driven), V-Model (verification & validation)">
    <rect x="15" y="250" width="390" height="80" rx="8" fill="#fff" stroke="#dfe6e9" stroke-width="1"/>
    <text x="210" y="270" text-anchor="middle" class="phase-label" style="font-size: 12px;">SDLC Models</text>
    
    <!-- Waterfall -->
    <rect x="25" y="280" width="85" height="40" rx="5" fill="#a29bfe" opacity="0.7"/>
    <text x="67" y="298" text-anchor="middle" class="model-text" fill="white" font-weight="bold">Waterfall</text>
    <text x="67" y="312" text-anchor="middle" class="model-text" fill="white" font-size="8">Linear Sequential</text>
    
    <!-- Agile -->
    <rect x="120" y="280" width="85" height="40" rx="5" fill="#81ecec" opacity="0.7"/>
    <text x="162" y="298" text-anchor="middle" class="model-text" fill="#2d3436" font-weight="bold">Agile</text>
    <text x="162" y="312" text-anchor="middle" class="model-text" fill="#2d3436" font-size="8">Iterative/Sprints</text>
    
    <!-- Spiral -->
    <rect x="215" y="280" width="85" height="40" rx="5" fill="#ffeaa7" opacity="0.7"/>
    <text x="257" y="298" text-anchor="middle" class="model-text" fill="#2d3436" font-weight="bold">Spiral</text>
    <text x="257" y="312" text-anchor="middle" class="model-text" fill="#2d3436" font-size="8">Risk-Driven</text>
    
    <!-- V-Model -->
    <rect x="310" y="280" width="85" height="40" rx="5" fill="#fd79a8" opacity="0.7"/>
    <text x="352" y="298" text-anchor="middle" class="model-text" fill="white" font-weight="bold">V-Model</text>
    <text x="352" y="312" text-anchor="middle" class="model-text" fill="white" font-size="8">Verify &amp; Validate</text>
  </g>
  
  <!-- Key Stats -->
  <g data-narration="Industry Statistics: 60% reduction in defects with SDLC, 70% of Indian IT companies use Agile">
    <rect x="15" y="340" width="390" height="45" rx="8" fill="#fff" stroke="#dfe6e9" stroke-width="1"/>
    <text x="30" y="360" class="stat-text">📊 60%</text>
    <text x="65" y="360" class="model-text">reduction in post-deployment defects</text>
    <text x="250" y="360" class="stat-text">📊 70%</text>
    <text x="285" y="360" class="model-text">Indian IT uses Agile</text>
    <text x="30" y="377" class="model-text" font-size="9">of Indian software exports: $200B (2023)</text>
  </g>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/>
    </marker>
  </defs>
</svg>