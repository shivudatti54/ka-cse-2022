<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="test-driven-development" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcccc"/>
      <stop offset="100%" style="stop-color:#ff9999"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ccffcc"/>
      <stop offset="100%" style="stop-color:#99ff99"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ccccff"/>
      <stop offset="100%" style="stop-color:#9999ff"/>
    </linearGradient>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5cc"/>
      <stop offset="100%" style="stop-color:#ffeb99"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .box { animation: slideIn 0.8s ease-out forwards; opacity: 0; }
    .box-1 { animation-delay: 0.2s; }
    .box-2 { animation-delay: 0.4s; }
    .box-3 { animation-delay: 0.6s; }
    .box-4 { animation-delay: 0.8s; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .arrow { stroke: #4a90a4; stroke-width: 2; fill: none; stroke-dasharray: 5,5; animation: drawArrow 2s linear infinite; }
    .center-circle { animation: pulse 2s ease-in-out infinite; }
    .cycle-text { animation: fadeIn 1.5s ease-out; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" class="title">Test-Driven Development</text>
  <text x="210" y="55" text-anchor="middle" class="detail" style="animation: fadeIn 1.2s ease-out;">Red-Green-Refactor Cycle</text>
  
  <!-- Central cycle indicator -->
  <circle cx="210" cy="200" r="70" fill="none" stroke="#4a90a4" stroke-width="2" stroke-dasharray="10,5" class="center-circle" opacity="0.3"/>
  <text x="210" y="195" text-anchor="middle" class="label" style="font-weight:bold;fill:#4a90a4;">TDD</text>
  <text x="210" y="215" text-anchor="middle" class="detail" style="fill:#4a90a4;">CYCLE</text>
  
  <!-- Red Phase - Write Test -->
  <g class="box box-1" data-narration="Write a failing test first (RED phase) - Define requirements before coding">
    <rect x="30" y="120" width="85" height="70" rx="8" fill="url(#redGradient)" filter="url(#shadow)"/>
    <text x="72" y="140" text-anchor="middle" class="label" style="font-weight:bold;">RED</text>
    <text x="72" y="158" text-anchor="middle" class="detail">Write Test</text>
    <text x="72" y="175" text-anchor="middle" class="detail" style="font-size:9px;">(fails first)</text>
  </g>
  
  <!-- Arrow from Red to Green -->
  <path d="M 120 155 Q 150 155 165 155" class="arrow" stroke="#ff6666"/>
  
  <!-- Green Phase - Write Code -->
  <g class="box box-2" data-narration="Write minimal code to pass the test (GREEN phase) - Implement only what's needed">
    <rect x="170" y="120" width="85" height="70" rx="8" fill="url(#greenGradient)" filter="url(#shadow)"/>
    <text x="212" y="140" text-anchor="middle" class="label" style="font-weight:bold;">GREEN</text>
    <text x="212" y="158" text-anchor="middle" class="detail">Write Code</text>
    <text x="212" y="175" text-anchor="middle" class="detail" style="font-size:9px;">(passes test)</text>
  </g>
  
  <!-- Arrow from Green to Refactor -->
  <path d="M 260 155 Q 290 155 305 180" class="arrow" stroke="#66cc66"/>
  
  <!-- Blue Phase - Refactor -->
  <g class="box box-3" data-narration="Refactor code to improve structure (BLUE phase) - Clean code without changing behavior">
    <rect x="290" y="260" width="85" height="70" rx="8" fill="url(#blueGradient)" filter="url(#shadow)"/>
    <text x="332" y="280" text-anchor="middle" class="label" style="font-weight:bold;">BLUE</text>
    <text x="332" y="298" text-anchor="middle" class="detail">Refactor</text>
    <text x="332" y="315" text-anchor="middle" class="detail" style="font-size:9px;">(improve)</text>
  </g>
  
  <!-- Arrow from Refactor back to Red -->
  <path d="M 290 295 Q 250 320 150 300 Q 80 280 72 230" class="arrow" stroke="#6666cc"/>
  
  <!-- Yellow Phase - Run Tests -->
  <g class="box box-4" data-narration="Run tests continuously - CI/CD integration ensures tests run on every commit">
    <rect x="60" y="260" width="85" height="70" rx="8" fill="url(#yellowGradient)" filter="url(#shadow)"/>
    <text x="102" y="280" text-anchor="middle" class="label" style="font-weight:bold;">YELLOW</text>
    <text x="102" y="298" text-anchor="middle" class="detail">Run Tests</text>
    <text x="102" y="315" text-anchor="middle" class="detail" style="font-size:9px;">(verify)</text>
  </g>
  
  <!-- Arrow from Run Tests to Write Test -->
  <path d="M 102 260 Q 102 200 85 175" class="arrow" stroke="#ccaa66"/>
  
  <!-- Key Concepts Box -->
  <g class="box" style="animation-delay:1s;" data-narration="Key concepts: Unit Testing Frameworks (JUnit, pytest), Mocking/Stubbing, Regression Testing, Code Coverage (80%)">
    <rect x="145" y="310" width="130" height="60" rx="5" fill="white" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
    <text x="210" y="328" text-anchor="middle" class="label" style="font-weight:bold;font-size:12px;">Key Concepts</text>
    <text x="210" y="344" text-anchor="middle" class="detail">JUnit • pytest • Mockito</text>
    <text x="210" y="358" text-anchor="middle" class="detail">Coverage: 80% • CI/CD</text>
  </g>
  
  <!-- Arrow from Refactor to Run Tests -->
  <path d="M 290 260 Q 220 260 145 295" class="arrow" stroke="#ccaa66" opacity="0.5"/>
  
  <!-- Cycle direction indicator -->
  <text x="210" y="290" text-anchor="middle" class="detail" style="font-size:9px;fill:#888;">Continuous</text>
  <text x="210" y="302" text-anchor="middle" class="detail" style="font-size:9px;fill:#888;">Iteration</text>
  
  <!-- Benefits highlight -->
  <g style="animation: fadeIn 1.5s ease-out;">
    <rect x="310" y="30" width="100" height="55" rx="5" fill="#f0f8ff" stroke="#4a90a4" stroke-width="1"/>
    <text x="360" y="48" text-anchor="middle" class="detail" style="font-weight:bold;fill:#2c3e50;">Benefits</text>
    <text x="360" y="63" text-anchor="middle" class="detail" style="font-size:10px;">• 40-90% fewer bugs</text>
    <text x="360" y="76" text-anchor="middle" class="detail" style="font-size:10px;">• Better design</text>
  </g>
</svg>