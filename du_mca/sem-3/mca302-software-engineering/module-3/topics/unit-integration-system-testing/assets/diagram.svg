<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="unit-integration-system-testing">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f0f8ff"/>
      <stop offset="100%" style="stop-color:#e8f0f8"/>
    </linearGradient>
    <linearGradient id="unitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="integrationGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#F57C00"/>
    </linearGradient>
    <linearGradient id="systemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes arrowPulse {
      0%, 100% { stroke-width: 2; }
      50% { stroke-width: 3; }
    }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; fill: white; }
    .percent { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: white; }
    .box { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.4s; }
    .box3 { animation-delay: 0.6s; }
    .arrow { stroke: #e74c3c; stroke-width: 2; fill: none; animation: arrowPulse 2s infinite; }
    .vline { stroke: #9b59b6; stroke-width: 2; stroke-dasharray: 5,3; }
    .section-rect { rx: 8; ry: 8; filter: url(#shadow); }
    .vmodel-text { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" class="title">Unit Integration System Testing</text>
  
  <!-- Testing Pyramid -->
  <!-- Unit Testing (Bottom - 70%) -->
  <g class="box box1" data-narration="Unit Testing: Tests individual functions/methods in isolation. White-box testing technique. 70% of tests.">
    <rect class="section-rect" x="30" y="280" width="180" height="70" fill="url(#unitGrad)"/>
    <text x="120" y="300" text-anchor="middle" class="label">UNIT TESTING</text>
    <text x="120" y="318" text-anchor="middle" class="detail">70% | JUnit, pytest, NUnit</text>
    <text x="120" y="332" text-anchor="middle" class="detail">White-box | Code Coverage</text>
    <text x="120" y="346" text-anchor="middle" class="detail">Individual components</text>
  </g>
  
  <!-- Integration Testing (Middle - 20%) -->
  <g class="box box2" data-narration="Integration Testing: Verifies interactions between integrated units. 20% of tests. Big Bang, Top-Down, Bottom-Up, Sandwich approaches.">
    <rect class="section-rect" x="60" y="200" width="150" height="65" fill="url(#integrationGrad)"/>
    <text x="135" y="220" text-anchor="middle" class="label">INTEGRATION TESTING</text>
    <text x="135" y="238" text-anchor="middle" class="detail">20% | API contracts, Data flow</text>
    <text x="135" y="252" text-anchor="middle" class="detail">Big Bang, Top-Down, Bottom-Up</text>
  </g>
  
  <!-- System Testing (Top - 10%) -->
  <g class="box box3" data-narration="System Testing: Validates complete system against requirements. 10% of tests. Functional, Non-functional, UAT.">
    <rect class="section-rect" x="100" y="130" width="110" height="55" fill="url(#systemGrad)"/>
    <text x="155" y="150" text-anchor="middle" class="label">SYSTEM TESTING</text>
    <text x="155" y="168" text-anchor="middle" class="detail">10% | Selenium, LoadRunner</text>
    <text x="155" y="180" text-anchor="middle" class="detail">Functional, UAT</text>
  </g>
  
  <!-- V-Model Section -->
  <g data-narration="V-Model: Shows parallel testing phases to development stages. Unit Test links to Coding, Integration to Design, System to Requirements.">
    <text x="290" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2c3e50">V-Model Testing</text>
    
    <!-- V shape lines -->
    <line x1="260" y1="80" x2="330" y2="160" class="vline"/>
    <line x1="390" y1="80" x2="330" y2="160" class="vline"/>
    <line x1="330" y1="160" x2="330" y2="180" class="vline"/>
    
    <!-- Left side - Development -->
    <text x="250" y="95" class="vmodel-text">Requirements</text>
    <text x="255" y="120" class="vmodel-text">Design</text>
    <text x="265" y="145" class="vmodel-text">Coding</text>
    
    <!-- Right side - Testing -->
    <text x="365" y="95" class="vmodel-text">System Test</text>
    <text x="360" y="120" class="vmodel-text">Integration Test</text>
    <text x="350" y="145" class="vmodel-text">Unit Test</text>
    
    <!-- Connecting arrows -->
    <line x1="250" y1="100" x2="365" y2="100" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="255" y1="125" x2="360" y2="125" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="265" y1="150" x2="350" y2="150" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Test Doubles Box -->
  <g class="box box2" data-narration="Test Doubles: Stubs simulate called components, Mocks have pre-programmed expectations, Fakes are functional but simplified.">
    <rect class="section-rect" x="250" y="200" width="150" height="85" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2" rx="6"/>
    <text x="325" y="218" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#34495e">Test Doubles</text>
    <circle cx="270" cy="240" r="4" fill="#e74c3c"/>
    <text x="280" y="244" font-family="Arial" font-size="10" fill="#2c3e50">Stubs: Simulate components</text>
    <circle cx="270" cy="260" r="4" fill="#3498db"/>
    <text x="280" y="264" font-family="Arial" font-size="10" fill="#2c3e50">Mocks: Pre-programmed</text>
    <circle cx="270" cy="280" r="4" fill="#9b59b6"/>
    <text x="280" y="284" font-family="Arial" font-size="10" fill="#2c3e50">Fakes: Simplified impl</text>
  </g>
  
  <!-- Key Metrics Box -->
  <g class="box box3" data-narration="Key Statistics: 85% of defects caught early, reducing costs significantly according to IBM System Sciences Institute.">
    <rect class="section-rect" x="250" y="300" width="150" height="70" fill="#fff3e0" stroke="#ffcc80" stroke-width="2" rx="6"/>
    <text x="325" y="318" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Key Metrics</text>
    <text x="260" y="338" font-family="Arial" font-size="10" fill="#bf360c">• 85% defects caught early</text>
    <text x="260" y="352" font-family="Arial" font-size="10" fill="#bf360c">• Cost reduction (IBM)</text>
    <text x="260" y="366" font-family="Arial" font-size="10" fill="#bf360c">• Test Pyramid: 70-20-10</text>
  </g>
  
  <!-- Decorative arrows between pyramid levels -->
  <g>
    <path d="M 120 275 L 135 270" class="arrow" marker-end="url(#arrowhead)"/>
    <path d="M 155 195 L 155 190" class="arrow" marker-end="url(#arrowhead)"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>