<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="coding-standards-reviews">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5dff0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="developerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44a08d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vcGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ciGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="reviewGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: 'Segoe UI', Arial, sans-serif; }
    .box { animation: slideInUp 0.6s ease-out backwards; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.35s; }
    .box3 { animation-delay: 0.5s; }
    .box4 { animation-delay: 0.65s; }
    .workflow-box { animation: slideInLeft 0.5s ease-out backwards; }
    .wf1 { animation-delay: 0.3s; }
    .wf2 { animation-delay: 0.45s; }
    .wf3 { animation-delay: 0.6s; }
    .wf4 { animation-delay: 0.75s; }
    .arrow { animation: drawLine 1s ease-out forwards; stroke-dasharray: 100; stroke-dashoffset: 100; }
    .pulse-item { animation: pulse 2s ease-in-out infinite; }
    .concept-box { animation: slideInUp 0.5s ease-out backwards; }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <text x="210" y="28" text-anchor="middle" class="title" font-size="20" font-weight="bold" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">Coding Standards &amp; Reviews</text>
  <line x1="30" y1="38" x2="390" y2="38" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Workflow Section -->
  <g data-narration="Code Review Workflow showing the process from developer to approval">
    <text x="210" y="58" text-anchor="middle" font-size="13" font-weight="600" fill="#34495e" font-family="Segoe UI, Arial, sans-serif">Code Review Workflow</text>
    
    <!-- Developer Box -->
    <g class="workflow-box wf1">
      <rect x="30" y="75" width="75" height="55" rx="8" fill="url(#developerGradient)" filter="url(#shadow)"/>
      <text x="67.5" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Segoe UI, Arial, sans-serif">Developer</text>
      <text x="67.5" y="110" text-anchor="middle" font-size="9" fill="white" font-family="Segoe UI, Arial, sans-serif">Write Code</text>
      <circle cx="67.5" cy="100" r="12" fill="white" opacity="0.3"/>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M110 102 L145 102" class="arrow" stroke="#95a5a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <polygon points="145,97 155,102 145,107" fill="#95a5a6"/>
    
    <!-- Version Control Box -->
    <g class="workflow-box wf2">
      <rect x="150" y="75" width="75" height="55" rx="8" fill="url(#vcGradient)" filter="url(#shadow)"/>
      <text x="187.5" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Segoe UI, Arial, sans-serif">Version</text>
      <text x="187.5" y="110" text-anchor="middle" font-size="9" fill="white" font-family="Segoe UI, Arial, sans-serif">Control</text>
      <path d="M180,95 L195,95 M187,88 L187,102 M180,109 L195,109" stroke="white" stroke-width="1.5" opacity="0.5"/>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M230 102 L265 102" class="arrow" stroke="#95a5a6" stroke-width="2" fill="none"/>
    <polygon points="265,97 275,102 265,107" fill="#95a5a6"/>
    
    <!-- CI Pipeline Box -->
    <g class="workflow-box wf3">
      <rect x="270" y="75" width="75" height="55" rx="8" fill="url(#ciGradient)" filter="url(#shadow)"/>
      <text x="307.5" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Segoe UI, Arial, sans-serif">CI Pipeline</text>
      <text x="307.5" y="108" text-anchor="middle" font-size="9" fill="white" font-family="Segoe UI, Arial, sans-serif">Auto Check</text>
      <g stroke="white" stroke-width="1.5" opacity="0.5">
        <circle cx="300" cy="100" r="4"/>
        <circle cx="307" cy="100" r="4"/>
        <circle cx="314" cy="100" r="4"/>
      </g>
    </g>
    
    <!-- Arrow 3 -->
    <path d="M350 102 L370 102 L370 145" class="arrow" stroke="#95a5a6" stroke-width="2" fill="none"/>
    <polygon points="365,140 370,150 375,140" fill="#95a5a6"/>
    
    <!-- Review Board Box -->
    <g class="workflow-box wf4">
      <rect x="315" y="150" width="90" height="50" rx="8" fill="url(#reviewGradient)" filter="url(#shadow)"/>
      <text x="360" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Segoe UI, Arial, sans-serif">Review Board</text>
      <text x="360" y="184" text-anchor="middle" font-size="9" fill="white" font-family="Segoe UI, Arial, sans-serif">Approve/Reject</text>
    </g>
    
    <!-- Feedback arrow -->
    <path d="M360,200 L360,230 L67,230 L67,140" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
    <polygon points="62,145 67,135 72,145" fill="#e74c3c"/>
    <text x="150" y="225" font-size="8" fill="#e74c3c" font-family="Segoe UI, Arial, sans-serif">Feedback Loop</text>
  </g>
  
  <!-- Key Concepts Section -->
  <g data-narration="Key concepts: Coding Standards including naming, formatting, documentation, and security">
    <!-- Coding Standards Box -->
    <g class="concept-box" transform="translate(15, 245)">
      <rect width="185" height="70" rx="6" fill="url(#boxGradient)" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
      <rect width="185" height="18" rx="6" fill="#27ae60"/>
      <rect x="0" y="12" width="185" height="6" fill="#27ae60"/>
      <text x="92.5" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Segoe UI, Arial, sans-serif">CODING STANDARDS</text>
      <text x="10" y="35" font-size="9" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">• Naming Conventions</text>
      <text x="10" y="47" font-size="9" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">• Formatting Rules</text>
      <text x="10" y="59" font-size="9" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">• Documentation</text>
    </g>
    
    <!-- Code Review Techniques Box -->
    <g class="concept-box" transform="translate(215, 245)">
      <rect width="185" height="70" rx="6" fill="url(#boxGradient)" stroke="#9b59b6" stroke-width="1.5" filter="url(#shadow)"/>
      <rect width="185" height="18" rx="6" fill="#9b59b6"/>
      <rect x="0" y="12" width="185" height="6" fill="#9b59b6"/>
      <text x="92.5" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Segoe UI, Arial, sans-serif">REVIEW TECHNIQUES</text>
      <text x="10" y="35" font-size="9" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">• Pair Programming</text>
      <text x="10" y="47" font-size="9" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">• Formal Inspections</text>
      <text x="10" y="59" font-size="9" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">• Tool-Assisted Reviews</text>
    </g>
    
    <!-- Static Analysis Tools Box -->
    <g class="concept-box" transform="translate(115, 320)">
      <rect width="185" height="45" rx="6" fill="url(#boxGradient)" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
      <rect width="185" height="16" rx="6" fill="#e67e22"/>
      <text x="92.5" y="12" text-anchor="middle" font-size="9" font-weight="bold" fill="white" font-family="Segoe UI, Arial, sans-serif">STATIC ANALYSIS TOOLS</text>
      <text x="15" y="32" font-size="9" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">Linters: ESLint, Pylint</text>
      <text x="15" y="44" font-size="9" fill="#2c3e50" font-family="Segoe UI, Arial, sans-serif">Complexity: CodeClimate</text>
    </g>
  </g>
  
  <!-- Stats Section -->
  <g data-narration="Industry statistics showing effectiveness of code reviews" class="pulse-item">
    <rect x="15" y="370" width="390" height="25" rx="4" fill="#2c3e50" opacity="0.9"/>
    <text x="210" y="382" text-anchor="middle" font-size="9" fill="white" font-family="Segoe UI, Arial, sans-serif">Microsoft: 60-70% defects caught | NASA: 20-30% more effective than testing</text>
  </g>
</svg>