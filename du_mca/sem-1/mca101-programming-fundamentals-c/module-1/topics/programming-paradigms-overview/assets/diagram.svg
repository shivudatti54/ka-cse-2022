<svg width="420" height="400" viewBox="0 0 420 400" data-topic-id="programming-paradigms-overview" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4eaf0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="imperativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fdcb6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74b9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="functionalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="declarativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#55efc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2d3436; }
    .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .section-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #fff; }
    .label { font-family: 'Consolas', monospace; font-size: 12px; font-weight: bold; fill: #2d3436; }
    .detail { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #636e72; }
    .box { filter: url(#shadow); }
    .anim-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-float { animation: float 3s ease-in-out infinite; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .arrow { stroke: #2d3436; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>
  
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <text x="210" y="30" text-anchor="middle" class="title anim-fade">Programming Paradigms</text>
  <text x="210" y="48" text-anchor="middle" class="detail anim-fade delay-1">Overview of Fundamental Programming Styles</text>
  
  <!-- Imperative Section -->
  <g class="anim-slide delay-1" data-narration="Imperative Programming: Based on explicit state changes through statements, uses procedural and structured approaches with Von Neumann memory model">
    <rect x="15" y="65" width="185" height="75" rx="8" fill="url(#imperativeGrad)" class="box"/>
    <text x="25" y="82" class="section-title">Imperative</text>
    <text x="25" y="98" class="section-text">State changes via statements</text>
    <text x="25" y="112" class="section-text">Procedural: C, Pascal</text>
    <text x="25" y="126" class="section-text">for/while loops</text>
  </g>
  
  <!-- Functional Section -->
  <g class="anim-slide delay-2" data-narration="Functional Programming: First-class functions, pure functions, immutability, higher-order functions like map, filter, reduce">
    <rect x="220" y="65" width="185" height="75" rx="8" fill="url(#functionalGrad)" class="box"/>
    <text x="230" y="82" class="section-title">Functional</text>
    <text x="230" y="98" class="section-text">First-class functions</text>
    <text x="230" y="112" class="section-text">Immutability, Pure functions</text>
    <text x="230" y="126" class="section-text">Haskell, Scala, F#</text>
  </g>
  
  <!-- OOP Section with Class Hierarchy -->
  <g class="anim-slide delay-3" data-narration="Object-Oriented Programming: Four pillars - Encapsulation, Abstraction, Inheritance, Polymorphism. Shows class hierarchy Vehicle to Car to ElectricCar">
    <rect x="15" y="155" width="185" height="130" rx="8" fill="url(#oopGrad)" class="box"/>
    <text x="25" y="172" class="section-title">Object-Oriented</text>
    <text x="25" y="188" class="section-text">Four Pillars:</text>
    <text x="25" y="202" class="section-text">Encapsulation, Abstraction</text>
    <text x="25" y="216" class="section-text">Inheritance, Polymorphism</text>
    <text x="25" y="230" class="section-text">Java, C++, Python</text>
    
    <!-- Class Hierarchy Diagram -->
    <g transform="translate(95, 245)" class="anim-pulse">
      <rect x="-30" y="0" width="60" height="20" rx="4" fill="#fff" stroke="#0984e3" stroke-width="1.5"/>
      <text x="0" y="14" text-anchor="middle" class="label" font-size="9">Vehicle</text>
    </g>
    <g transform="translate(95, 270)" class="anim-pulse delay-1">
      <rect x="-25" y="0" width="50" height="20" rx="4" fill="#fff" stroke="#0984e3" stroke-width="1.5"/>
      <text x="0" y="14" text-anchor="middle" class="label" font-size="9">Car</text>
    </g>
    <g transform="translate(95, 295)" class="anim-pulse delay-2">
      <rect x="-45" y="0" width="90" height="20" rx="4" fill="#fff" stroke="#0984e3" stroke-width="1.5"/>
      <text x="0" y="14" text-anchor="middle" class="label" font-size="9">ElectricCar</text>
    </g>
    <!-- Inheritance Arrows -->
    <path d="M95,265 L95,270" stroke="#2d3436" stroke-width="1.5" fill="none"/>
    <path d="M95,290 L95,295" stroke="#2d3436" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Declarative Section -->
  <g class="anim-slide delay-4" data-narration="Declarative Paradigms: Focus on what rather than how. Includes SQL queries, Logic programming with Prolog, and declarative UI frameworks like React">
    <rect x="220" y="155" width="185" height="130" rx="8" fill="url(#declarativeGrad)" class="box"/>
    <text x="230" y="172" class="section-title">Declarative</text>
    <text x="230" y="188" class="section-text">Focus on "what" not "how"</text>
    <text x="230" y="202" class="section-text">SQL Queries</text>
    <text x="230" y="216" class="section-text">Logic: Prolog</text>
    <text x="230" y="230" class="section-text">React.js Components</text>
    
    <!-- Visual indicator -->
    <g transform="translate(312, 250)" class="anim-float">
      <circle cx="0" cy="0" r="15" fill="none" stroke="#00b894" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="0" y="4" text-anchor="middle" font-size="16" fill="#00b894">?</text>
    </g>
  </g>
  
  <!-- Footer Stats -->
  <g class="anim-fade delay-4" data-narration="According to 2023 Stack Overflow data, 75% of professional projects use 2+ paradigms simultaneously">
    <rect x="15" y="300" width="390" height="40" rx="6" fill="#dfe6e9" opacity="0.8"/>
    <text x="210" y="318" text-anchor="middle" class="detail" font-size="11">2023 Stack Overflow: 75% of projects use 2+ paradigms</text>
    <text x="210" y="332" text-anchor="middle" class="detail" font-size="10">Multi-paradigm proficiency essential for modern development</text>
  </g>
  
  <!-- Legend/Direction indicator -->
  <g transform="translate(350, 380)">
    <text x="0" y="0" class="detail" font-size="9">Inheritance:</text>
    <line x1="50" y1="-4" x2="70" y2="-4" stroke="#2d3436" stroke-width="1.5"/>
    <polygon points="70,-4 65,-7 65,-1" fill="#2d3436"/>
  </g>
</svg>