<svg width="420" height="400" viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg" data-topic-id="tokens-data-types-variables">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5e6d3"/>
      <stop offset="100%" style="stop-color:#e6f0e8"/>
    </linearGradient>
    <linearGradient id="stackGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3"/>
      <stop offset="100%" style="stop-color:#8fb8cf"/>
    </linearGradient>
    <linearGradient id="heapGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9dba8"/>
      <stop offset="100%" style="stop-color:#a3c77a"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .title-anim { animation: fadeIn 0.8s ease-out forwards; }
    .tokens-anim { animation: slideInLeft 0.6s ease-out 0.2s forwards; opacity: 0; }
    .datatypes-anim { animation: slideInUp 0.6s ease-out 0.4s forwards; opacity: 0; }
    .memory-anim { animation: slideInRight 0.6s ease-out 0.6s forwards; opacity: 0; }
    .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    .token-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .token-box:nth-child(1) { animation-delay: 0.3s; }
    .token-box:nth-child(2) { animation-delay: 0.4s; }
    .token-box:nth-child(3) { animation-delay: 0.5s; }
    .token-box:nth-child(4) { animation-delay: 0.6s; }
    .token-box:nth-child(5) { animation-delay: 0.7s; }
    .type-box { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .type-box:nth-child(1) { animation-delay: 0.5s; }
    .type-box:nth-child(2) { animation-delay: 0.6s; }
    .type-box:nth-child(3) { animation-delay: 0.7s; }
    .type-box:nth-child(4) { animation-delay: 0.8s; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" class="title-anim">Tokens, Data Types &amp; Variables</text>
  <line x1="100" y1="38" x2="320" y2="38" stroke="#5d8aa8" stroke-width="2" class="title-anim"/>
  
  <!-- Section 1: Tokens -->
  <g class="tokens-anim" data-narration="Tokens are the smallest building blocks of code, including keywords, identifiers, literals, operators, and symbols.">
    <rect x="10" y="50" width="125" height="85" rx="8" fill="#fff" stroke="#7fb3d3" stroke-width="2" filter="url(#shadow)"/>
    <text x="72" y="68" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">TOKENS</text>
    <g class="token-box">
      <rect x="18" y="78" width="109" height="14" rx="3" fill="#e8f4fc"/>
      <text x="72" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Keywords: if, while, for</text>
    </g>
    <g class="token-box">
      <rect x="18" y="94" width="109" height="14" rx="3" fill="#e8f4fc"/>
      <text x="72" y="104" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Identifiers: myVar, func</text>
    </g>
    <g class="token-box">
      <rect x="18" y="110" width="109" height="14" rx="3" fill="#e8f4fc"/>
      <text x="72" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Literals: 42, "hello", 3.14</text>
    </g>
  </g>
  
  <!-- Arrow from Tokens to Data Types -->
  <g class="pulse-anim">
    <path d="M140 92 L170 92" stroke="#5d8aa8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d8aa8"/>
    </marker>
  </defs>
  
  <!-- Section 2: Data Types -->
  <g class="datatypes-anim" data-narration="Data types define what kind of values variables can hold, such as integers, floating-point numbers, characters, and booleans.">
    <rect x="175" y="50" width="130" height="85" rx="8" fill="#fff" stroke="#9dc183" stroke-width="2" filter="url(#shadow)"/>
    <text x="240" y="68" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">DATA TYPES</text>
    <g class="type-box">
      <rect x="183" y="78" width="55" height="24" rx="4" fill="#d4e6c3"/>
      <text x="210" y="91" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">int</text>
      <text x="210" y="102" text-anchor="middle" font-family="Arial" font-size="8" fill="#5a7a4a">4 bytes</text>
    </g>
    <g class="type-box">
      <rect x="242" y="78" width="55" height="24" rx="4" fill="#d4e6c3"/>
      <text x="270" y="91" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">float</text>
      <text x="270" y="102" text-anchor="middle" font-family="Arial" font-size="8" fill="#5a7a4a">4 bytes</text>
    </g>
    <g class="type-box">
      <rect x="183" y="106" width="55" height="24" rx="4" fill="#d4e6c3"/>
      <text x="210" y="119" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">char</text>
      <text x="210" y="130" text-anchor="middle" font-family="Arial" font-size="8" fill="#5a7a4a">1 byte</text>
    </g>
    <g class="type-box">
      <rect x="242" y="106" width="55" height="24" rx="4" fill="#d4e6c3"/>
      <text x="270" y="119" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">bool</text>
      <text x="270" y="130" text-anchor="middle" font-family="Arial" font-size="8" fill="#5a7a4a">1 byte</text>
    </g>
  </g>
  
  <!-- Arrow from Data Types to Variables/Memory -->
  <g class="pulse-anim">
    <path d="M310 92 L340 92" stroke="#5d8aa8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Section 3: Variables & Memory -->
  <g class="memory-anim" data-narration="Variables store data in memory. The stack stores primitive types with fixed sizes, while the heap stores dynamic objects.">
    <rect x="345" y="50" width="65" height="85" rx="8" fill="#fff" stroke="#d4a574" stroke-width="2" filter="url(#shadow)"/>
    <text x="377" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">VARIABLE</text>
    <text x="377" y="82" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a6a4a">myVar</text>
    <text x="377" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a6a4a">= 42</text>
    <text x="377" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#7a8a6a">Type: int</text>
  </g>
  
  <!-- Memory Stack/Heap Visualization -->
  <g data-narration="Memory allocation diagram showing stack for primitives (int, float) and heap for dynamic data structures.">
    <!-- Stack Section -->
    <rect x="30" y="150" width="170" height="110" rx="6" fill="url(#stackGradient)" stroke="#6a9ab8" stroke-width="2" filter="url(#shadow)"/>
    <text x="115" y="168" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">STACK</text>
    <text x="115" y="182" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Primitive Data</text>
    
    <!-- Stack memory addresses -->
    <g>
      <rect x="45" y="195" width="140" height="18" rx="3" fill="rgba(255,255,255,0.3)"/>
      <text x="55" y="207" font-family="monospace" font-size="9" fill="#fff">0x1000: int x = 10</text>
    </g>
    <g>
      <rect x="45" y="217" width="140" height="18" rx="3" fill="rgba(255,255,255,0.3)"/>
      <text x="55" y="229" font-family="monospace" font-size="9" fill="#fff">0x1004: float y = 3.14</text>
    </g>
    <g>
      <rect x="45" y="239" width="140" height="18" rx="3" fill="rgba(255,255,255,0.3)"/>
      <text x="55" y="251" font-family="monospace" font-size="9" fill="#fff">0x1008: char c = 'A'</text>
    </g>
    
    <!-- Arrow between Stack and Heap -->
    <path d="M205 185 L255 185 L255 200 L265 200" stroke="#888" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
    <text x="230" y="178" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">reference</text>
    
    <!-- Heap Section -->
    <rect x="270" y="150" width="130" height="110" rx="6" fill="url(#heapGradient)" stroke="#7a9a58" stroke-width="2" filter="url(#shadow)"/>
    <text x="335" y="168" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">HEAP</text>
    <text x="335" y="182" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Dynamic Data</text>
    
    <!-- Heap memory -->
    <g>
      <rect x="285" y="195" width="100" height="18" rx="3" fill="rgba(255,255,255,0.3)"/>
      <text x="335" y="207" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">0x2000: [ ]</text>
    </g>
    <g>
      <rect x="285" y="217" width="100" height="18" rx="3" fill="rgba(255,255,255,0.3)"/>
      <text x="335" y="229" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">0x2008: { }</text>
    </g>
    <g>
      <rect x="285" y="239" width="100" height="18" rx="3" fill="rgba(255,255,255,0.3)"/>
      <text x="335" y="251" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">0x2010: obj</text>
    </g>
  </g>
  
  <!-- Legend / Key Concepts -->
  <g data-narration="Key relationships: Tokens combine to form expressions, which create variables with specific data types stored in memory.">
    <rect x="30" y="275" width="370" height="115" rx="8" fill="rgba(255,255,255,0.7)" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
    <text x="215" y="293" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Key Concepts</text>
    
    <!-- Concept boxes -->
    <g>
      <rect x="45" y="305" width="105" height="35" rx="5" fill="#e8f4fc" stroke="#7fb3d3"/>
      <text x="97" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Token</text>
      <text x="97" y="333" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a7a8a">Smallest unit</text>
    </g>
    
    <g>
      <rect x="160" y="305" width="105" height="35" rx="5" fill="#d4e6c3" stroke="#9dc183"/>
      <text x="212" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Data Type</text>
      <text x="212" y="333" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a7a4a">Value category</text>
    </g>
    
    <g>
      <rect x="275" y="305" width="105" height="35" rx="5" fill="#fce8dc" stroke="#d4a574"/>
      <text x="327" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Variable</text>
      <text x="327" y="333" text-anchor="middle" font-family="Arial" font-size="9" fill="#8a6a4a">Named storage</text>
    </g>
    
    <!-- Relationship arrows -->
    <path d="M155 322 L158 322" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <path d="M270 322 L273 322" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <!-- Flow arrow -->
    <path d="M97 345 L327 345" stroke="#5d8aa8" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
    <polygon points="320,340 330,345 320,350" fill="#5d8aa8"/>
    <text x="212" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a6a7a">code → compile → execute</text>
  </g>
  
  <!-- Memory size indicator -->
  <g>
    <rect x="210" y="270" width="25" height="15" rx="3" fill="#e8f4fc" stroke="#7fb3d3"/>
    <text x="222" y="281" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">4B</text>
  </g>
  <g>
    <rect x="235" y="270" width="25" height="15" rx="3" fill="#d4e6c3" stroke="#9dc183"/>
    <text x="247" y="281" text-anchor="middle" font-family="Arial" font-size="8" fill="#2c3e50">8B</text>
  </g>
</svg>