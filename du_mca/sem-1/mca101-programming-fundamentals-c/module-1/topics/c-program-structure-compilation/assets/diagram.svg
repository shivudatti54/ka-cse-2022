<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="c-program-structure-compilation">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8f0f4"/>
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3"/>
      <stop offset="100%" style="stop-color:#8fb8cf"/>
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4e3b8"/>
      <stop offset="100%" style="stop-color:#b8cf8f"/>
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3d4b8"/>
      <stop offset="100%" style="stop-color:#cfb88f"/>
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b8e3"/>
      <stop offset="100%" style="stop-color:#cf8fcf"/>
    </linearGradient>
    <linearGradient id="boxGradient5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e3d4"/>
      <stop offset="100%" style="stop-color:#8fcfb8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .title { animation: fadeIn 0.8s ease-out; font-family: 'Segoe UI', sans-serif; }
    .box { animation: slideIn 0.6s ease-out forwards; opacity: 0; }
    .box1 { animation-delay: 0.2s; }
    .box2 { animation-delay: 0.4s; }
    .box3 { animation-delay: 0.6s; }
    .box4 { animation-delay: 0.8s; }
    .box5 { animation-delay: 1.0s; }
    .arrow { animation: fadeIn 0.5s ease-out 1.2s forwards; opacity: 0; }
    .label { animation: slideUp 0.5s ease-out forwards; opacity: 0; }
    .label1 { animation-delay: 0.3s; }
    .label2 { animation-delay: 0.5s; }
    .label3 { animation-delay: 0.7s; }
    .label4 { animation-delay: 0.9s; }
    .label5 { animation-delay: 1.1s; }
    .concept-box { animation: pulse 3s ease-in-out infinite; }
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="210" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" class="title">C Program Compilation Pipeline</text>
  
  <!-- Pipeline Flow Boxes -->
  <!-- Source Code -->
  <g class="box box1">
    <rect x="20" y="70" width="70" height="50" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)"/>
    <text x="55" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Source</text>
    <text x="55" y="105" text-anchor="middle" font-size="11" fill="#34495e">code.c</text>
  </g>
  
  <!-- Preprocessor -->
  <g class="box box2">
    <rect x="110" y="70" width="70" height="50" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)"/>
    <text x="145" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Preprocessor</text>
    <text x="145" y="105" text-anchor="middle" font-size="10" fill="#34495e">.i file</text>
  </g>
  
  <!-- Compiler -->
  <g class="box box3">
    <rect x="200" y="70" width="70" height="50" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)"/>
    <text x="235" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Compiler</text>
    <text x="235" y="105" text-anchor="middle" font-size="10" fill="#34495e">.s file</text>
  </g>
  
  <!-- Assembler -->
  <g class="box box4">
    <rect x="290" y="70" width="70" height="50" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)"/>
    <text x="325" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Assembler</text>
    <text x="325" y="105" text-anchor="middle" font-size="10" fill="#34495e">.o file</text>
  </g>
  
  <!-- Linker -->
  <g class="box box5">
    <rect x="200" y="145" width="70" height="50" rx="6" fill="url(#boxGradient5)" filter="url(#shadow)"/>
    <text x="235" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Linker</text>
    <text x="235" y="180" text-anchor="middle" font-size="10" fill="#34495e">exe/a.out</text>
  </g>
  
  <!-- Arrows -->
  <g class="arrow">
    <path d="M90 95 L105 95" stroke="#5d6d7e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M180 95 L195 95" stroke="#5d6d7e" stroke-width="2" fill="none"/>
    <path d="M270 95 L285 95" stroke="#5d6d7e" stroke-width="2" fill="none"/>
    <path d="M325 120 L325 140" stroke="#5d6d7e" stroke-width="2" fill="none"/>
    <polygon points="325,140 320,132 330,132" fill="#5d6d7e"/>
  </g>
  
  <!-- Key Labels below boxes -->
  <g class="label label1" data-narration="The C source code (.c file) contains preprocessor directives, the main function, and user-defined functions.">
    <text x="55" y="140" text-anchor="middle" font-size="9" fill="#5d6d7e">#include, #define</text>
  </g>
  <g class="label label2" data-narration="Preprocessor expands macros, includes header files, and removes comments producing expanded source.">
    <text x="145" y="140" text-anchor="middle" font-size="9" fill="#5d6d7e">Macro expansion</text>
  </g>
  <g class="label label3" data-narration="Compiler translates preprocessed code to assembly language, performing syntax and semantic analysis.">
    <text x="235" y="140" text-anchor="middle" font-size="9" fill="#5d6d7e">To assembly</text>
  </g>
  <g class="label label4" data-narration="Assembler converts assembly code to machine code object files containing binary instructions.">
    <text x="325" y="140" text-anchor="middle" font-size="9" fill="#5d6d7e">Object code</text>
  </g>
  <g class="label label5" data-narration="Linker combines object files, resolves external symbols, and creates the final executable.">
    <text x="235" y="210" text-anchor="middle" font-size="9" fill="#5d6d7e">Symbol resolution</text>
  </g>
  
  <!-- Key Concepts Box -->
  <g class="concept-box" data-narration="The GCC toolchain follows: cpp (preprocessor) → cc1 (compiler) → as (assembler) → ld (linker)">
    <rect x="20" y="230" width="180" height="75" rx="8" fill="#fff" stroke="#b8cfcf" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">GCC Toolchain</text>
    <text x="30" y="268" font-size="10" fill="#34495e">cpp → cc1 → as → ld</text>
    <text x="30" y="282" font-size="10" fill="#34495e">-E: preprocess only</text>
    <text x="30" y="296" font-size="10" fill="#34495e">-S: to assembly</text>
  </g>
  
  <!-- Memory Segments Box -->
  <g class="concept-box" data-narration="C program memory segments: Text (code), Data (initialized), BSS (uninitialized), Stack (functions), Heap (dynamic).">
    <rect x="220" y="230" width="180" height="75" rx="8" fill="#fff" stroke="#cfb8b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="310" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Memory Segments</text>
    <text x="230" y="268" font-size="10" fill="#34495e">Text: executable code</text>
    <text x="230" y="282" font-size="10" fill="#34495e">Data: initialized globals</text>
    <text x="230" y="296" font-size="10" fill="#34495e">Stack: function calls</text>
  </g>
  
  <!-- Error Types Box -->
  <g class="concept-box" data-narration="Three types of errors: Syntax (compile-time), Linker (undefined references), Runtime (segmentation faults).">
    <rect x="120" y="320" width="180" height="60" rx="8" fill="#fff" stroke="#b8c8cf" stroke-width="2" filter="url(#shadow)"/>
    <text x="210" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Error Types</text>
    <text x="130" y="358" font-size="10" fill="#c0392b">Syntax • Linker • Runtime</text>
    <text x="210" y="373" text-anchor="middle" font-size="9" fill="#7f8c8d">compile → link → execute</text>
  </g>
  
  <!-- Data narration indicators (invisible but accessible) -->
  <desc>Educational diagram showing C program compilation pipeline: Source code (.c) → Preprocessor → Compiler → Assembler → Linker → Executable. Includes GCC toolchain flow, memory segments, and error types.</desc>
</svg>