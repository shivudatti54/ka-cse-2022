<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="strings-manipulation-functions">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5e6d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fb8cf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9e4ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9fd4a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d5c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b49a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0d4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b0db;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    .title { animation: fadeIn 1s ease-out; }
    .box1 { animation: slideInLeft 0.8s ease-out 0.2s both; }
    .box2 { animation: slideInRight 0.8s ease-out 0.4s both; }
    .box3 { animation: slideInLeft 0.8s ease-out 0.6s both; }
    .box4 { animation: slideInRight 0.8s ease-out 0.8s both; }
    .center-box { animation: slideInUp 0.8s ease-out 0.3s both; }
    .arrow { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawLine 1s ease-out 1s forwards; }
    .subtitle { animation: fadeIn 1s ease-out 0.5s both; }
    .pulse-element { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    text { font-family: Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)" />

  <!-- Title -->
  <text x="210" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" class="title">Strings Manipulation Functions</text>
  <text x="210" y="55" text-anchor="middle" font-size="12" fill="#5d6d7e" class="subtitle">C Language Standard Library</text>

  <!-- Center String Visualization -->
  <g class="center-box">
    <rect x="160" y="155" width="100" height="50" rx="8" fill="#34495e" filter="url(#shadow)" />
    <text x="210" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#ecf0f1">String</text>
    <text x="210" y="192" text-anchor="middle" font-size="11" fill="#bdc3c7">char[]</text>
  </g>

  <!-- Function Box 1: strcpy - Copy -->
  <g class="box1" data-narration="strcpy() copies one string to another. Syntax: strcpy(dest, src)">
    <rect x="20" y="240" width="90" height="60" rx="6" fill="url(#boxGradient1)" filter="url(#shadow)" />
    <text x="65" y="260" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">strcpy()</text>
    <text x="65" y="278" text-anchor="middle" font-size="10" fill="#34495e">Copy String</text>
    <text x="65" y="292" text-anchor="middle" font-size="9" fill="#5d6d7e">dest = src</text>
  </g>

  <!-- Function Box 2: strcat - Concatenate -->
  <g class="box2" data-narration="strcat() concatenates two strings. Syntax: strcat(dest, src)">
    <rect x="310" y="240" width="90" height="60" rx="6" fill="url(#boxGradient2)" filter="url(#shadow)" />
    <text x="355" y="260" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">strcat()</text>
    <text x="355" y="278" text-anchor="middle" font-size="10" fill="#34495e">Concat String</text>
    <text x="355" y="292" text-anchor="middle" font-size="9" fill="#5d6d7e">dest + src</text>
  </g>

  <!-- Function Box 3: strcmp - Compare -->
  <g class="box3" data-narration="strcmp() compares two strings. Returns 0 if equal, negative/positive if different">
    <rect x="20" y="330" width="90" height="60" rx="6" fill="url(#boxGradient3)" filter="url(#shadow)" />
    <text x="65" y="350" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">strcmp()</text>
    <text x="65" y="368" text-anchor="middle" font-size="10" fill="#34495e">Compare String</text>
    <text x="65" y="382" text-anchor="middle" font-size="9" fill="#5d6d7e">s1 == s2?</text>
  </g>

  <!-- Function Box 4: strchr - Search -->
  <g class="box4" data-narration="strchr() searches for a character in a string. Returns pointer to first occurrence">
    <rect x="310" y="330" width="90" height="60" rx="6" fill="url(#boxGradient4)" filter="url(#shadow)" />
    <text x="355" y="350" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">strchr()</text>
    <text x="355" y="368" text-anchor="middle" font-size="10" fill="#34495e">Search Char</text>
    <text x="355" y="382" text-anchor="middle" font-size="9" fill="#5d6d7e">find 'c'</text>
  </g>

  <!-- Arrows from center to boxes -->
  <g class="arrow">
    <line x1="180" y1="180" x2="110" y2="240" stroke="#7f8c8d" stroke-width="2" fill="none" />
    <polygon points="105,240 115,232 112,243" fill="#7f8c8d" />
  </g>
  <g class="arrow">
    <line x1="240" y1="180" x2="310" y2="240" stroke="#7f8c8d" stroke-width="2" fill="none" />
    <polygon points="315,240 305,232 308,243" fill="#7f8c8d" />
  </g>
  <g class="arrow">
    <line x1="180" y1="205" x2="110" y2="330" stroke="#7f8c8d" stroke-width="2" fill="none" />
    <polygon points="105,330 115,322 112,333" fill="#7f8c8d" />
  </g>
  <g class="arrow">
    <line x1="240" y1="205" x2="310" y2="330" stroke="#7f8c8d" stroke-width="2" fill="none" />
    <polygon points="315,330 305,322 308,333" fill="#7f8c8d" />
  </g>

  <!-- Visual representation of string operations -->
  <g class="pulse-element" data-narration="Visual showing string operations flow">
    <!-- String characters visualization -->
    <rect x="25" y="75" width="370" height="60" rx="5" fill="#ffffff" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4" />
    <text x="40" y="95" font-size="10" fill="#7f8c8d">Operations:</text>
    <text x="40" y="115" font-size="9" fill="#2c3e50">• strcpy(s1,s2) - Copy s2 into s1</text>
    <text x="200" y="115" font-size="9" fill="#2c3e50">• strcat(s1,s2) - Append s2 to s1</text>
    <text x="40" y="128" font-size="9" fill="#2c3e50">• strcmp(s1,s2) - Compare s1 and s2</text>
    <text x="200" y="128" font-size="9" fill="#2c3e50">• strchr(s1,ch) - Find ch in s1</text>
  </g>

  <!-- Code example box -->
  <g data-narration="Example code showing how to use string functions in C">
    <rect x="140" y="230" width="140" height="130" rx="5" fill="#2c3e50" opacity="0.9" />
    <text x="210" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#f39c12">Example Code</text>
    <text x="148" y="268" font-size="9" fill="#e74c3c">#include</text>
    <text x="195" y="268" font-size="9" fill="#ecf0f1">&lt;string.h&gt;</text>
    <text x="148" y="285" font-size="9" fill="#ecf0f1">char s1[20] = "Hello";</text>
    <text x="148" y="300" font-size="9" fill="#ecf0f1">char s2[20] = "World";</text>
    <text x="148" y="315" font-size="9" fill="#3498db">strcpy(s1, s2);</text>
    <text x="148" y="330" font-size="9" fill="#2ecc71">strcat(s1, "!");</text>
    <text x="148" y="345" font-size="9" fill="#9b59b6">strcmp(s1, s2);</text>
    <text x="148" y="360" font-size="9" fill="#e67e22">strchr(s1, 'o');</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="4" fill="#bdc3c7" class="pulse-element" />
  <circle cx="370" cy="370" r="4" fill="#bdc3c7" class="pulse-element" />
  <circle cx="370" cy="50" r="3" fill="#95a5a6" class="pulse-element" />
  <circle cx="50" cy="370" r="3" fill="#95a5a6" class="pulse-element" />

</svg>