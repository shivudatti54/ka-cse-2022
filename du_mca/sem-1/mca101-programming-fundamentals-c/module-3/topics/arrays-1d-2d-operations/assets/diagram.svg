<svg xmlns="http://www.w3.org/2000/svg" width="420" height="400" viewBox="0 0 420 400" data-topic-id="arrays-1d-2d-operations">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#f5f0ff"/>
      <stop offset="100%" style="stop-color:#e0f2e9"/>
    </linearGradient>
    <linearGradient id="array1dGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb8da"/>
      <stop offset="100%" style="stop-color:#5a9bc4"/>
    </linearGradient>
    <linearGradient id="array2dGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8a9c9"/>
      <stop offset="100%" style="stop-color:#9485b0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes arrowFlow {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #34495e; }
    .sublabel { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #5d6d7e; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #2c3e50; }
    .section-rect { rx: 8; ry: 8; }
    .array-cell { rx: 3; ry: 3; }
    .animated-fade { animation: fadeIn 0.8s ease-out forwards; }
    .animated-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animated-slide-right { animation: slideInRight 0.6s ease-out forwards; }
    .animated-slide-up { animation: slideInUp 0.6s ease-out forwards; }
    .animated-pulse { animation: pulse 2s ease-in-out infinite; }
    .arrow-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 5,5; animation: arrowFlow 1s linear infinite; }
  </style>
  
  <!-- Background -->
  <rect width="420" height="400" fill="url(#bgGradient)"/>
  
  <!-- Title Section -->
  <g class="animated-fade" style="animation-delay: 0.1s;">
    <text x="210" y="28" text-anchor="middle" class="title">Arrays: 1D &amp; 2D Operations</text>
    <line x1="100" y1="38" x2="320" y2="38" stroke="#7f8c8d" stroke-width="1.5"/>
  </g>
  
  <!-- 1D Array Section -->
  <g class="animated-slide-left" style="animation-delay: 0.3s;" data-narration="One-dimensional array stores elements in contiguous memory locations with sequential indexing starting from 0.">
    <rect x="15" y="50" width="120" height="95" fill="#fff" stroke="#bdc3c7" stroke-width="1" class="section-rect" filter="url(#shadow)"/>
    <text x="75" y="68" text-anchor="middle" class="label" font-weight="bold">1D Array</text>
    <!-- Array cells -->
    <g transform="translate(25, 80)">
      <rect x="0" y="0" width="20" height="18" fill="url(#array1dGrad)" class="array-cell"/>
      <rect x="22" y="0" width="20" height="18" fill="url(#array1dGrad)" class="array-cell"/>
      <rect x="44" y="0" width="20" height="18" fill="url(#array1dGrad)" class="array-cell"/>
      <rect x="66" y="0" width="20" height="18" fill="url(#array1dGrad)" class="array-cell"/>
      <text x="10" y="13" text-anchor="middle" class="sublabel" fill="white">0</text>
      <text x="32" y="13" text-anchor="middle" class="sublabel" fill="white">1</text>
      <text x="54" y="13" text-anchor="middle" class="sublabel" fill="white">2</text>
      <text x="76" y="13" text-anchor="middle" class="sublabel" fill="white">3</text>
    </g>
    <text x="75" y="132" text-anchor="middle" class="code">int arr[4]</text>
  </g>
  
  <!-- 2D Array Section -->
  <g class="animated-slide-right" style="animation-delay: 0.4s;" data-narration="Two-dimensional arrays represent matrix structures with rows and columns, commonly used for game boards and images.">
    <rect x="285" y="50" width="120" height="95" fill="#fff" stroke="#bdc3c7" stroke-width="1" class="section-rect" filter="url(#shadow)"/>
    <text x="345" y="68" text-anchor="middle" class="label" font-weight="bold">2D Array</text>
    <!-- 2D Array grid -->
    <g transform="translate(305, 80)">
      <rect x="0" y="0" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <rect x="18" y="0" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <rect x="36" y="0" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <rect x="0" y="18" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <rect x="18" y="18" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <rect x="36" y="18" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <rect x="0" y="36" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <rect x="18" y="36" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <rect x="36" y="36" width="16" height="16" fill="url(#array2dGrad)" class="array-cell"/>
      <!-- Index labels -->
      <text x="8" y="-5" text-anchor="middle" class="sublabel" fill="#5d6d7e">0 1 2</text>
      <text x="-8" y="9" text-anchor="middle" class="sublabel" fill="#5d6d7e">0</text>
      <text x="-8" y="27" text-anchor="middle" class="sublabel" fill="#5d6d7e">1</text>
      <text x="-8" y="45" text-anchor="middle" class="sublabel" fill="#5d6d7e">2</text>
    </g>
    <text x="345" y="132" text-anchor="middle" class="code">int a[3][3]</text>
  </g>
  
  <!-- Row vs Column Major Section -->
  <g class="animated-fade" style="animation-delay: 0.5s;" data-narration="Row-major stores elements row by row (C/C++), while column-major stores column by column (Fortran). This affects memory access patterns.">
    <rect x="15" y="155" width="190" height="120" fill="#fff" stroke="#bdc3c7" stroke-width="1" class="section-rect" filter="url(#shadow)"/>
    <text x="110" y="175" text-anchor="middle" class="label" font-weight="bold">Row-Major (C/C++)</text>
    <!-- Row major visualization -->
    <g transform="translate(30, 185)">
      <rect x="0" y="0" width="22" height="16" fill="#27ae60" class="array-cell"/>
      <rect x="24" y="0" width="22" height="16" fill="#27ae60" class="array-cell"/>
      <rect x="48" y="0" width="22" height="16" fill="#2ecc71" class="array-cell"/>
      <rect x="72" y="0" width="22" height="16" fill="#2ecc71" class="array-cell"/>
      <rect x="0" y="18" width="22" height="16" fill="#3498db" class="array-cell"/>
      <rect x="24" y="18" width="22" height="16" fill="#3498db" class="array-cell"/>
      <rect x="48" y="18" width="22" height="16" fill="#5dade2" class="array-cell"/>
      <rect x="72" y="18" width="22" height="16" fill="#5dade2" class="array-cell"/>
      <text x="83" y="50" text-anchor="middle" class="sublabel" fill="#5d6d7e">Storage: 0,1,2,3,4,5...</text>
    </g>
    <!-- Arrow -->
    <path d="M 210 195 L 250 195" class="arrow-line"/>
    <polygon points="250,195 245,190 245,200" fill="#e74c3c"/>
    
    <!-- Column Major -->
    <rect x="255" y="155" width="150" height="120" fill="#fff" stroke="#bdc3c7" stroke-width="1" class="section-rect" filter="url(#shadow)"/>
    <text x="330" y="175" text-anchor="middle" class="label" font-weight="bold">Column-Major</text>
    <!-- Column major visualization -->
    <g transform="translate(275, 185)">
      <rect x="0" y="0" width="22" height="16" fill="#27ae60" class="array-cell"/>
      <rect x="24" y="0" width="22" height="16" fill="#3498db" class="array-cell"/>
      <rect x="48" y="0" width="22" height="16" fill="#9b59b6" class="array-cell"/>
      <rect x="0" y="18" width="22" height="16" fill="#27ae60" class="array-cell"/>
      <rect x="24" y="18" width="22" height="16" fill="#3498db" class="array-cell"/>
      <rect x="48" y="18" width="22" height="16" fill="#9b59b6" class="array-cell"/>
      <rect x="0" y="36" width="22" height="16" fill="#27ae60" class="array-cell"/>
      <rect x="24" y="36" width="22" height="16" fill="#3498db" class="array-cell"/>
      <rect x="48" y="36" width="22" height="16" fill="#9b59b6" class="array-cell"/>
      <text x="59" y="70" text-anchor="middle" class="sublabel" fill="#5d6d7e">Storage: 0,3,6,1,4,7...</text>
    </g>
  </g>
  
  <!-- Operations Section -->
  <g class="animated-slide-up" style="animation-delay: 0.6s;" data-narration="Core operations include traversal using nested loops, search algorithms like binary search, and insertion/deletion requiring element shifting.">
    <rect x="15" y="285" width="180" height="105" fill="#fff" stroke="#bdc3c7" stroke-width="1" class="section-rect" filter="url(#shadow)"/>
    <text x="105" y="305" text-anchor="middle" class="label" font-weight="bold">Core Operations</text>
    <g transform="translate(25, 315)">
      <circle cx="10" cy="10" r="4" fill="#e74c3c"/>
      <text x="22" y="14" class="sublabel">Traversal</text>
      <circle cx="10" cy="30" r="4" fill="#3498db"/>
      <text x="22" y="34" class="sublabel">Search O(n)/O(log n)</text>
      <circle cx="10" cy="50" r="4" fill="#27ae60"/>
      <text x="22" y="54" class="sublabel">Insert/Delete O(n)</text>
      <circle cx="10" cy="70" r="4" fill="#9b59b6"/>
      <text x="22" y="74" class="sublabel">Sort (Bubble/Quick)</text>
    </g>
  </g>
  
  <!-- Address Calculation -->
  <g class="animated-slide-up" style="animation-delay: 0.7s;" data-narration="Memory address calculation formula: base + (i * n + j) * size for row-major, enabling O(1) random access.">
    <rect x="205" y="285" width="200" height="105" fill="#fff" stroke="#bdc3c7" stroke-width="1" class="section-rect" filter="url(#shadow)"/>
    <text x="305" y="305" text-anchor="middle" class="label" font-weight="bold">Address Calculation</text>
    <text x="305" y="330" text-anchor="middle" class="code" font-size="12">Row-Major:</text>
    <text x="305" y="348" text-anchor="middle" class="code" font-size="11" fill="#c0392b">addr[i][j] = base +</text>
    <text x="305" y="362" text-anchor="middle" class="code" font-size="11" fill="#c0392b">(i × cols + j) × size</text>
    <text x="305" y="380" text-anchor="middle" class="sublabel" fill="#27ae60">Time: O(1) random access</text>
  </g>
  
  <!-- Binary Search Animation -->
  <g class="animated-pulse" style="animation-delay: 1s;" data-narration="Binary search demonstrates efficient searching in sorted arrays, reducing search space by half each iteration.">
    <rect x="145" y="52" width="130" height="50" fill="none" stroke="#e74c3c" stroke-width="2" rx="5" class="animated-pulse" style="animation-delay: 1.2s;"/>
    <text x="210" y="82" text-anchor="middle" class="sublabel" fill="#e74c3c">Binary Search: O(log n)</text>
  </g>
  
  <!-- Memory flow arrows -->
  <g class="animated-fade" style="animation-delay: 0.8s;" data-narration="Elements are stored sequentially in memory, enabling cache-friendly access patterns when traversing arrays.">
    <path d="M 140 115 Q 210 100 280 115" fill="none" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="280,115 275,110 275,120" fill="#95a5a6"/>
    <text x="210" y="108" text-anchor="middle" class="sublabel" fill="#7f8c8d">Linear Memory</text>
  </g>
</svg>